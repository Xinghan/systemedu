# SystemEdu Docker Compose
#
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml up -d --build
#
# Profiles:
#   - default: backend + web 两个核心服务
#   - with-qdrant: 加 qdrant (memory.backend=mem0 时启用)
#     docker compose -f docker/docker-compose.yml --profile with-qdrant up -d
#
# 卷:
#   systemedu-home  -> /data inside backend, 存 config.yaml / db / logs
#   qdrant-data     -> /qdrant/storage
#
# 第一次启动:
#   1. docker compose up -d
#   2. 把本地 ~/.systemedu/config.yaml 复制进去:
#      docker compose cp ~/.systemedu/config.yaml backend:/data/config.yaml
#   3. 重启 backend: docker compose restart backend

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: systemedu-backend:latest
    container_name: systemedu-backend
    restart: unless-stopped
    environment:
      SYSTEMEDU_HOME: /data
      # 容器内 backend 监听 0.0.0.0:18820 (Dockerfile 默认 CMD 已带)
    volumes:
      - systemedu-home:/data
      # 如果想直接复用宿主机的 ~/.systemedu 改成下面这行:
      # - ${HOME}/.systemedu:/data
    ports:
      - "18820:18820"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:18820/api/status',timeout=3); sys.exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        # 构建时 inline 进前端的网关地址.
        # 浏览器侧能访问到 backend 的地址 (容器名在浏览器解不出来):
        #   本机开发: http://localhost:18820
        #   生产 nginx 反代: 留空, 走 /api 同源
        NEXT_PUBLIC_GATEWAY_URL: "${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:18820}"
    image: systemedu-web:latest
    container_name: systemedu-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: systemedu-qdrant
    restart: unless-stopped
    profiles: ["with-qdrant"]
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  systemedu-home:
  qdrant-data:
