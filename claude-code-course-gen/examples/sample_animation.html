<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e14;
  font-family:'Noto Sans SC',system-ui,sans-serif;color:#fff}
canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay"></div>
<script>
(function(){
"use strict";
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var W=600,H=420,DPR=Math.min(window.devicePixelRatio||1,2);
function resize(){var r=canvas.getBoundingClientRect();
  canvas.width=r.width*DPR;canvas.height=r.height*DPR;
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(DPR*r.width/W,DPR*r.height/H)}
resize();window.addEventListener("resize",resize);

var COLORS={bg1:"#0a0e14",bg2:"#1a1035",neonBlue:"#00d2ff",
  neonGreen:"#00ff9d",purple:"#818cf8",gold:"#ffd700",red:"#ff4b2b",
  white:"rgba(255,255,255,0.9)",grid:"rgba(255,255,255,0.03)"};

function drawSciFiBg(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,COLORS.bg1);g.addColorStop(1,COLORS.bg2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=COLORS.grid;ctx.lineWidth=1;
  for(var x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}

function drawTitle(text){
  ctx.font="bold 16px 'Noto Sans SC',system-ui,sans-serif";
  ctx.textAlign="center";ctx.fillStyle=COLORS.white;ctx.fillText(text,W/2,28);
}

function glow(color,blur){ctx.shadowColor=color;ctx.shadowBlur=blur}
function noGlow(){ctx.shadowColor="transparent";ctx.shadowBlur=0}
function lerp(a,b,t){return a+(b-a)*t}

// 背景粒子
var bgParticles=[];
for(var i=0;i<30;i++){
  bgParticles.push({x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*2+1,a:Math.random()*0.2+0.05});
}
function drawBgParticles(){
  for(var i=0;i<bgParticles.length;i++){
    var p=bgParticles[i];p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,210,255,"+p.a+")";ctx.fill();
  }
}

var TITLE="火星地貌分类流程";

// --- 核心动画逻辑: 火星地貌分类流程 ---
// 1. 火星地表粒子升起
// 2. 汇聚到分类树节点
// 3. 节点亮起标签

// 地貌类型
var categories=[
  {name:"撞击坑",color:"#ff6b35",x:100,y:180},
  {name:"火山地貌",color:"#ff4b2b",x:250,y:140},
  {name:"峡谷/沟壑",color:"#ffd700",x:400,y:180},
  {name:"沙丘/风蚀",color:"#00ff9d",x:175,y:280},
  {name:"极冠冰层",color:"#00d2ff",x:425,y:280}
];

// 粒子从地表升起，最终归入分类节点
var classifyParticles=[];
var totalParticles=60;
for(var i=0;i<totalParticles;i++){
  var cat=categories[i%categories.length];
  classifyParticles.push({
    x:Math.random()*W,
    y:380+Math.random()*30,
    targetX:cat.x,
    targetY:cat.y,
    color:cat.color,
    catIndex:i%categories.length,
    delay:Math.random()*3,
    arrived:false,
    r:3
  });
}

// 树形连线（根节点在顶部中央）
var rootNode={x:W/2,y:70,name:"火星地貌"};

var t=0;
var phase=0; // 0=升起, 1=汇聚, 2=标签亮起

function drawTree(){
  ctx.strokeStyle="rgba(0,210,255,0.15)";
  ctx.lineWidth=2;
  // 从根到每个分类
  for(var i=0;i<categories.length;i++){
    var c=categories[i];
    ctx.beginPath();
    ctx.moveTo(rootNode.x,rootNode.y);
    // 贝塞尔曲线
    var cpx=(rootNode.x+c.x)/2;
    var cpy=(rootNode.y+c.y)/2-20;
    ctx.quadraticCurveTo(cpx,cpy,c.x,c.y);
    ctx.stroke();
  }
  // 二级连线
  ctx.strokeStyle="rgba(0,210,255,0.08)";
  ctx.beginPath();ctx.moveTo(categories[0].x,categories[0].y);
  ctx.lineTo(categories[3].x,categories[3].y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(categories[2].x,categories[2].y);
  ctx.lineTo(categories[4].x,categories[4].y);ctx.stroke();
}

function drawNodes(){
  // 根节点
  glow(COLORS.neonBlue,15);
  ctx.fillStyle=COLORS.neonBlue;
  ctx.beginPath();ctx.arc(rootNode.x,rootNode.y,12,0,Math.PI*2);ctx.fill();
  noGlow();
  ctx.font="bold 14px 'Noto Sans SC',system-ui,sans-serif";
  ctx.textAlign="center";ctx.fillStyle=COLORS.white;
  ctx.fillText(rootNode.name,rootNode.x,rootNode.y-20);

  // 分类节点
  for(var i=0;i<categories.length;i++){
    var c=categories[i];
    var nodeAlpha=phase>=2?1:0.3;
    glow(c.color,phase>=2?20:5);
    ctx.fillStyle=c.color;
    ctx.globalAlpha=nodeAlpha;
    ctx.beginPath();ctx.arc(c.x,c.y,10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    noGlow();

    if(phase>=2){
      ctx.font="12px 'Noto Sans SC',system-ui,sans-serif";
      ctx.textAlign="center";ctx.fillStyle=c.color;
      ctx.fillText(c.name,c.x,c.y+25);
    }
  }
}

function updateParticles(dt){
  for(var i=0;i<classifyParticles.length;i++){
    var p=classifyParticles[i];
    if(t<p.delay)continue;
    var elapsed=t-p.delay;

    if(phase===0){
      // 升起阶段: 粒子缓慢上飘
      p.y-=0.5;
      p.x+=Math.sin(elapsed*2+i)*0.3;
      if(elapsed>2)phase=1;
    }else if(phase===1){
      // 汇聚阶段: 粒子飞向目标
      var progress=Math.min((elapsed-2)/2,1);
      var ease=progress<0.5?2*progress*progress:(4-2*progress)*progress-1;
      var startX=p.x;
      var startY=p.y;
      p.x=lerp(startX,p.targetX,ease*0.05);
      p.y=lerp(startY,p.targetY,ease*0.05);
      if(Math.abs(p.x-p.targetX)<3&&Math.abs(p.y-p.targetY)<3){
        p.arrived=true;
      }
      // 检查是否所有粒子到达
      var allArrived=true;
      for(var j=0;j<classifyParticles.length;j++){
        if(!classifyParticles[j].arrived){allArrived=false;break}
      }
      if(allArrived)phase=2;
    }else{
      // 标签亮起后，粒子在节点附近轻微漂浮
      p.x=p.targetX+Math.sin(t*1.5+i)*6;
      p.y=p.targetY+Math.cos(t*1.2+i*0.7)*4;
    }
  }
}

function drawClassifyParticles(){
  for(var i=0;i<classifyParticles.length;i++){
    var p=classifyParticles[i];
    if(t<p.delay)continue;
    glow(p.color,8);
    ctx.fillStyle=p.color;
    ctx.globalAlpha=0.7;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    noGlow();
  }
}

// 底部火星地表
function drawMarsGround(){
  var g=ctx.createLinearGradient(0,370,0,H);
  g.addColorStop(0,"rgba(180,60,20,0.0)");
  g.addColorStop(0.5,"rgba(180,60,20,0.15)");
  g.addColorStop(1,"rgba(120,30,10,0.3)");
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(0,385);
  // 不规则地表曲线
  for(var x=0;x<=W;x+=20){
    var y=385+Math.sin(x*0.02)*8+Math.sin(x*0.05)*4;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
}

// HUD
function drawHUD(){
  ctx.font="11px 'Noto Sans SC',system-ui,sans-serif";
  ctx.textAlign="left";ctx.fillStyle="rgba(255,255,255,0.4)";
  var phaseText=[">> 采集火星地表样本...",">> 分类汇聚中...",">> 分类完成"][phase];
  ctx.fillText(phaseText,12,H-12);
}

function frame(){
  var dt=1/60;
  t+=dt;
  drawSciFiBg();
  drawBgParticles();
  drawMarsGround();
  drawTree();
  drawNodes();
  updateParticles(dt);
  drawClassifyParticles();
  drawTitle(TITLE);
  drawHUD();
  requestAnimationFrame(frame);
}
frame();

})();
</script>
</body>
</html>
