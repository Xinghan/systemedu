description: 面向约10岁起步的学习者，经过12-24个月持续学习，最终按照全国青少年航天创新大赛"逐梦太空"火箭设计制作比赛规则，亲手完成一枚单级或多级固体燃料火箭的设计、制造、现场组装、发射和回收全过程。整棵树从最基础的"力是什么"、"东西为什么会掉下来"开始建立物理直觉，逐步引入空气动力、推进、结构、气动稳定、回收伞、测高模块和飞行性能评估等工业级航天工程概念，最终在成人监督和安全员配合下完成一次真实发射与高度数据采集。固体发动机、点火头等危险品的保管、运输和安装严格限定在指导教师与赛事安全员范围内，学生只负责箭体与非金属部件的设计、制造、组装、回收与复盘。
