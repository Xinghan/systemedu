category: aerospace
description: 这是一棵面向单个前沿工业项目的超细版知识树。学习者从约 10 岁儿童可进入的观察、标注、规则法和小型硬件实践起步，逐步掌握 NASA 公开火星图像与标签数据的理解方法，把火星地貌图像转成风险地图与安全路径，并最终在真实小型行星车平台上完成感知、规划、联调、试跑、复盘和系统发布。项目不是玩具：它连接真实的行星车感知与导航工业母题，前期使用公开数据和数字实验降低门槛，中后期必须进入真实底盘、真实传感器、真实场地与真实工程验证，以长期规划逐步弥补儿童与工业级系统研发之间的知识差距。
estimated_hours: 432
knowledge_tree: ./knowledge_tree.json
