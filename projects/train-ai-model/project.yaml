name: train-ai-model
version: "1.0.0"
title: 训练AI模型
description: 训练一个图片识别模型，能够区分不同树种的树叶
category: ai
age_range: [10, 18]
estimated_hours: 40
author: admin
tags: [machine-learning, computer-vision, beginner]

agents:
  tutor:
    type: builtin:tutor
    llm: qwen
    skills:
      - ./skills/tutor
    mcp_servers:
      - code-runner
  assessor:
    type: builtin:assessor
    llm: qwen

mcp:
  code-runner:
    command: python
    args: [-m, mcp_code_runner]

knowledge_tree: ./knowledge_tree.json
