description: 面向企业一线工人和安全管理人员的工伤预防与职业健康培训项目。从安全意识和法规基础出发，系统覆盖机械伤害、电气安全、化学品安全、高处作业、密闭空间、火灾爆炸等典型工伤场景的危险源辨识与预防措施，以及粉尘、噪声、化学性职业病的防治基础和个体防护装备（PPE）的选择、穿戴与维护。所有知识点均锚定在真实工伤案例和国家标准（GB、GBZ、AQ）上，强调"能识别、会操作、知应急"的实操能力。
