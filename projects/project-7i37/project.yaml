description: 欢迎来到《量子力学初学者》！在这里，9岁的小科学家们将用彩虹泡泡、跳舞的电子和会分身的小球，探索光为什么像粒子又像波、猫怎么可以‘又睡又醒’、以及小小粒子如何玩起捉迷藏！你将亲手画量子轨道、设计薛定谔小剧场，理解原子世界的奇妙规则。不背公式，只种好奇——原来最酷的科学，就藏在看不见的微小世界里！
