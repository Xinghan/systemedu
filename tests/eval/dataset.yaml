# spec 031 P7 — tutor eval 数据集 (10 条 PurpleAir demo)
# 字段 schema 见 README.md

cases:
  # ---------- learn page (5) ----------
  - id: learn_aqi_basics
    page_kind: learn
    library_slug: purpleair-airquality-node
    module_id: M01
    setup_facts:
      - {scope: global, category: interest, key: outdoor, value: "喜欢户外活动"}
    question: "AQI 是什么意思?"
    expected_facets:
      - "AQI 是空气质量指数 (Air Quality Index) 的缩写"
      - "把 PM2.5/PM10/O3 等数值映射到 0-500 标尺"
      - "数值越大空气越差"
    bad_facets:
      - "AQI 是 Air Quality Inspector"
      - "AQI 只针对一氧化碳"

  - id: learn_pm25_vs_pm10
    page_kind: learn
    library_slug: purpleair-airquality-node
    module_id: M02
    setup_facts:
      - {scope: global, category: family, key: brother_asthma, value: "弟弟有哮喘"}
    question: "PM2.5 和 PM10 有什么区别?"
    expected_facets:
      - "数字表示颗粒直径上限 (微米)"
      - "PM2.5 更小, 能进入肺泡甚至血液"
      - "PM10 包含 PM2.5"
    bad_facets:
      - "PM2.5 和 PM10 是一样的"
      - "PM10 比 PM2.5 危险"

  - id: learn_sensor_principle
    page_kind: learn
    library_slug: purpleair-airquality-node
    module_id: M03
    question: "光散射传感器怎么数颗粒?"
    expected_facets:
      - "颗粒通过激光束散射光"
      - "光电二极管测散射强度"
      - "强度 / 频率推断颗粒数量和大小"
    bad_facets: []

  - id: learn_calibration
    page_kind: learn
    library_slug: purpleair-airquality-node
    module_id: M04
    question: "为什么需要校准?"
    expected_facets:
      - "传感器原始读数 ≠ 真实浓度"
      - "环境温湿度影响"
      - "对比参考站调系数"
    bad_facets:
      - "不需要校准, 出厂就准"

  - id: learn_wifi_upload
    page_kind: learn
    library_slug: purpleair-airquality-node
    module_id: M05
    question: "传感器怎么上传数据?"
    expected_facets:
      - "ESP32 或类似 MCU"
      - "WiFi STA 模式连家用路由器"
      - "HTTP POST JSON 到云端"
    bad_facets: []

  # ---------- library_detail (3) ----------
  - id: lib_project_overview
    page_kind: library_detail
    library_slug: purpleair-airquality-node
    question: "这个项目我能学到什么?"
    expected_facets:
      - "空气质量监测"
      - "传感器 + ESP32 + WiFi"
      - "数据上云可视化"
    bad_facets:
      - "学 Java"
      - "学单片机汇编"

  - id: lib_what_now
    page_kind: library_detail
    library_slug: purpleair-airquality-node
    setup_facts:
      - {scope: project, category: goal, key: finish_by_summer,
         value: "暑假前做完", library_slug: "purpleair-airquality-node"}
    question: "我现在应该学哪一步?"
    expected_facets:
      - "应该参考学生当前的进度 (last_visited)"
      - "建议从 M01 / 下一个未完模块开始"
    bad_facets:
      - "建议你从 Java 开始"

  - id: lib_kit_question
    page_kind: library_detail
    library_slug: purpleair-airquality-node
    question: "需要买什么硬件?"
    expected_facets:
      - "PM2.5 传感器 (PMS5003 类)"
      - "ESP32 / NodeMCU"
      - "杜邦线 / 面包板 / 电源"
    bad_facets: []

  # ---------- global (2) ----------
  - id: global_who_am_i
    page_kind: global
    setup_facts:
      - {scope: global, category: interest, key: outdoor, value: "喜欢户外"}
      - {scope: global, category: skill_level, key: python, value: "初级"}
      - {scope: global, category: family, key: brother_asthma, value: "弟弟哮喘"}
    question: "你了解我什么?"
    expected_facets:
      - "提到喜欢户外"
      - "提到 Python 初级"
      - "提到弟弟哮喘"
    bad_facets:
      - "我什么都不了解"
      - "捏造未存在的事实 (例如你住在北京)"

  - id: global_recommend
    page_kind: global
    setup_facts:
      - {scope: global, category: interest, key: outdoor, value: "喜欢户外"}
      - {scope: global, category: family, key: brother_asthma, value: "弟弟哮喘"}
    question: "你觉得我应该做哪个项目?"
    expected_facets:
      - "结合户外兴趣 + 哮喘背景"
      - "推荐空气质量 / 户外环境监测"
    bad_facets:
      - "推荐做网游"
      - "推荐做美食评分"
