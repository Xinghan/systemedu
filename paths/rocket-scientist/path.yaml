name: rocket-scientist
title: "Astral Ascendant - 星际升阶者"
description: "从观察火星表面的第一眼开始，穿越感知、规划与控制的三重试炼，最终成为驾驭星际机器的 Archon。"
category: aerospace
age_range: [10, 18]
estimated_months: 24

stages:
  - order: 0
    project_name: mars-risk-map
    required: true
    badge:
      name: "Nyx Sight - 夜神之眼"
      description: "掌握地形感知，如同 Nyx 在黑暗中洞察一切"
      icon: badges/nyx-sight.svg
    avatar_stage: 0

  - order: 1
    project_name: orbital-mechanics-101
    required: true
    badge:
      name: "Ouranos Compass - 天穹罗盘"
      description: "理解轨道运动的法则，获得 Ouranos 的导航之力"
      icon: badges/ouranos-compass.svg
    avatar_stage: 1

  - order: 2
    project_name: rocket-propulsion-basics
    required: true
    badge:
      name: "Prometheus Flame - 普罗米修斯之焰"
      description: "掌握推进原理，窃取推动文明前行的火种"
      icon: badges/prometheus-flame.svg
    avatar_stage: 2

  - order: 3
    project_name: flight-control-systems
    required: true
    badge:
      name: "Archon Seal - 执政官印记"
      description: "完成飞控系统设计，获得星际自主导航的最终权柄"
      icon: badges/archon-seal.svg
    avatar_stage: 3

avatar_stages:
  - stage: 0
    title: "Neophyte - 启蒙者"
    description: "你的双眼刚刚睁开，开始感知这颗红色星球的轮廓"
    image: avatars/stage-0.svg
    xp_threshold: 0

  - stage: 1
    title: "Acolyte - 侍从"
    description: "你已经学会解读地形的语言，准备踏上更远的旅途"
    image: avatars/stage-1.svg
    xp_threshold: 500

  - stage: 2
    title: "Adept - 行者"
    description: "轨道与推进的知识在你手中交汇，你开始触摸星辰"
    image: avatars/stage-2.svg
    xp_threshold: 1500

  - stage: 3
    title: "Archon - 执政官"
    description: "感知、规划、控制三位一体，你已经成为星际机器的主宰"
    image: avatars/stage-3.svg
    xp_threshold: 3000
