name: rocket-scientist
title: "成为火箭科学家"
description: "从认识火星地貌开始，逐步掌握轨道力学、推进系统、飞行控制，最终设计一次完整的火星任务。"
category: aerospace
age_range: [10, 18]
estimated_months: 24

stages:
  - order: 0
    project_name: mars-risk-map
    required: true
    badge:
      name: "火星探索者"
      description: "完成火星地貌风险地图项目，掌握地形分析基础"
      icon: badges/mars-explorer.svg
    avatar_stage: 0

  - order: 1
    project_name: orbital-mechanics-101
    required: true
    badge:
      name: "轨道入门"
      description: "掌握基础轨道计算与开普勒定律"
      icon: badges/orbital-mechanics.svg
    avatar_stage: 1

  - order: 2
    project_name: rocket-propulsion-basics
    required: true
    badge:
      name: "推进新手"
      description: "理解化学推进原理与齐奥尔科夫斯基方程"
      icon: badges/propulsion-basics.svg
    avatar_stage: 1

  - order: 3
    project_name: flight-control-systems
    required: true
    badge:
      name: "飞控工程师"
      description: "设计基础姿态控制与导航系统"
      icon: badges/flight-control.svg
    avatar_stage: 2

avatar_stages:
  - stage: 0
    title: "太空学员"
    description: "你已经踏上了太空探索的第一步"
    image: avatars/stage-0.svg
  - stage: 1
    title: "见习研究员"
    description: "你开始理解火箭科学的基础原理"
    image: avatars/stage-1.svg
  - stage: 2
    title: "火箭科学家"
    description: "你已经成为一名火箭科学家"
    image: avatars/stage-2.svg
