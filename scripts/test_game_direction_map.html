<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:250px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.top-bar .title-text{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;letter-spacing:1px;}
.top-bar .score-text{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#10b981;}
.game-content{flex:1;min-height:0;display:flex;flex-direction:column;padding:12px 16px;gap:10px;overflow:hidden;}
.scenario-box{
  background:rgba(28,27,27,0.7);
  border:1px solid rgba(138,136,134,0.15);
  padding:12px;
}
.scenario-box .scenario-title{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#00daf3;letter-spacing:1px;margin-bottom:6px;}
.scenario-box .scenario-desc{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#c6c6c6;line-height:1.5;}
.drag-area{flex:1;min-height:0;display:flex;gap:12px;}
.source-col{
  width:180px;display:flex;flex-direction:column;gap:6px;
}
.source-col .col-title{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886;letter-spacing:1px;margin-bottom:4px;}
.drag-item{
  padding:8px 12px;
  background:rgba(53,53,52,0.6);
  border:1px solid rgba(138,136,134,0.2);
  cursor:grab;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:#e5e2e1;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  transition:background 0.15s;
}
.drag-item:hover{background:rgba(53,53,52,0.9);}
.drag-item.dragging{opacity:0.4;}
.target-area{flex:1;display:flex;flex-direction:column;gap:8px;}
.drop-zone{
  flex:1;
  display:flex;flex-direction:column;gap:4px;
  padding:8px;
  border:1px dashed rgba(138,136,134,0.3);
  background:rgba(20,20,20,0.5);
  min-height:60px;
}
.drop-zone .zone-title{
  font-family:'Space Grotesk',sans-serif;font-size:11px;
  color:#ffb59c;letter-spacing:1px;margin-bottom:2px;
}
.drop-zone.hover{border-color:#ff5f1f;background:rgba(255,95,31,0.08);}
.drop-zone .placed-item{
  padding:6px 10px;
  background:rgba(255,95,31,0.15);
  border:1px solid rgba(255,95,31,0.3);
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  color:#ffb59c;
  display:flex;justify-content:space-between;align-items:center;
}
.drop-zone .placed-item .remove-btn{
  cursor:pointer;color:#8a8886;font-size:14px;padding:0 4px;
}
.controls-bar{
  display:flex;align-items:center;gap:8px;justify-content:center;
  padding:6px 12px;
  background:rgba(28,27,27,0.92);
  border-top:1px solid rgba(138,136,134,0.15);
}
.controls-bar button{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:4px 16px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#ffb59c;
}
.controls-bar button:hover{background:#353534;}
.controls-bar button.primary{background:rgba(255,95,31,0.2);border-color:#ff5f1f;}
.hud{
  display:flex;align-items:center;justify-content:space-around;
  height:48px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
}
.hud .hud-col{text-align:center;}
.hud .hud-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;}
.hud .hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#e5e2e1;}
.result-item{padding:6px 10px;font-family:'Noto Sans SC',sans-serif;font-size:12px;display:flex;justify-content:space-between;}
.result-item.correct{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#10b981;}
.result-item.wrong{background:rgba(255,95,31,0.12);border:1px solid rgba(255,95,31,0.3);color:#ff5f1f;}
.feedback-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;
  background:rgba(0,0,0,0.8);justify-content:center;align-items:center;
}
.feedback-overlay.show{display:flex;}
.feedback-box{
  padding:28px;max-width:400px;text-align:center;
  background:rgba(20,20,35,0.95);backdrop-filter:blur(12px);
  border:1px solid rgba(16,185,129,0.3);
}
.feedback-box h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#10b981;margin-bottom:12px;}
.feedback-box p{font-family:'Noto Sans SC',sans-serif;font-size:14px;color:#c6c6c6;line-height:1.6;margin-bottom:16px;}
.feedback-box button{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;cursor:pointer;letter-spacing:1px;
  border:1px solid #10b981;background:rgba(16,185,129,0.15);color:#10b981;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideWhat"></p>
    <ul id="guidePoints"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="top-bar">
    <span class="title-text" id="titleText"></span>
    <span class="score-text" id="scoreText"></span>
  </div>
  <div class="game-content game-area">
    <div class="scenario-box">
      <div class="scenario-title" id="scenarioTitle"></div>
      <div class="scenario-desc" id="scenarioDesc"></div>
    </div>
    <div class="drag-area">
      <div class="source-col" id="sourceCol">
        <div class="col-title" id="sourceTitle"></div>
      </div>
      <div class="target-area" id="targetArea"></div>
    </div>
  </div>
  <div class="controls-bar">
    <button id="btnCheck" class="primary"></button>
    <button id="btnNext"></button>
  </div>
  <div class="hud" id="hud"></div>
</div>
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-box">
    <h2 id="fbTitle"></h2>
    <p id="fbText"></p>
    <button id="fbBtn"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideWhat:{en:'Drag direction labels into the correct coordinate frame zone. Verify you understand how directions map between world, body, and camera frames.',cn:'\u5c06\u65b9\u5411\u6807\u7b7e\u62d6\u62fd\u5230\u6b63\u786e\u7684\u5750\u6807\u7cfb\u533a\u57df\u3002\u9a8c\u8bc1\u4f60\u662f\u5426\u7406\u89e3\u4e16\u754c\u3001\u8f66\u4f53\u3001\u76f8\u673a\u5750\u6807\u7cfb\u4e4b\u95f4\u7684\u65b9\u5411\u6620\u5c04\u3002'},
  guideStep1:{en:'Drag each label to where it belongs',cn:'\u5c06\u6bcf\u4e2a\u6807\u7b7e\u62d6\u5230\u5b83\u5c5e\u4e8e\u7684\u533a\u57df'},
  guideStep2:{en:'Click CHECK to verify your answers',cn:'\u70b9\u51fb\u68c0\u67e5\u9a8c\u8bc1\u7b54\u6848'},
  guideStep3:{en:'Complete all 3 scenarios to pass',cn:'\u5b8c\u6210\u5168\u90e8 3 \u4e2a\u573a\u666f\u5373\u53ef\u901a\u5173'},
  title:{en:'DIRECTION MAPPING',cn:'\u65b9\u5411\u6620\u5c04\u9a8c\u8bc1'},
  sourceTitle:{en:'DIRECTION LABELS',cn:'\u65b9\u5411\u6807\u7b7e'},
  btnCheck:{en:'CHECK',cn:'\u68c0\u67e5'},
  btnNext:{en:'NEXT SCENARIO',cn:'\u4e0b\u4e00\u573a\u666f'},
  hudScenario:{en:'SCENARIO',cn:'\u573a\u666f'},
  hudScore:{en:'SCORE',cn:'\u5f97\u5206'},
  hudCorrect:{en:'CORRECT',cn:'\u6b63\u786e'},
  hudTotal:{en:'TOTAL',cn:'\u603b\u8ba1'},
  fbWinTitle:{en:'ALL SCENARIOS COMPLETE!',cn:'\u5168\u90e8\u573a\u666f\u5b8c\u6210!'},
  fbWinText:{en:'You correctly mapped directions across all 3 coordinate frames. Understanding these mappings is essential for rover navigation -- without it, "turn left" in the map could mean "turn right" for the rover.',cn:'\u4f60\u6b63\u786e\u6620\u5c04\u4e86\u6240\u6709 3 \u4e2a\u5750\u6807\u7cfb\u7684\u65b9\u5411\u3002\u7406\u89e3\u8fd9\u4e9b\u6620\u5c04\u5bf9\u706b\u661f\u8f66\u5bfc\u822a\u81f3\u5173\u91cd\u8981 -- \u5426\u5219\u5730\u56fe\u4e0a\u7684\u201c\u5de6\u8f6c\u201d\u53ef\u80fd\u53d8\u6210\u706b\u661f\u8f66\u7684\u201c\u53f3\u8f6c\u201d\u3002'},
  fbClose:{en:'CLOSE',cn:'\u5173\u95ed'},
  sc1title:{en:'SCENARIO 1: Rover facing North',cn:'\u573a\u666f 1: \u706b\u661f\u8f66\u671d\u5317'},
  sc1desc:{en:'Rover heading = 0 deg (facing North). Camera mounted forward. Map each direction label to the correct coordinate frame.',cn:'\u706b\u661f\u8f66\u671d\u5411 = 0\u00b0 (\u671d\u5317)\u3002\u76f8\u673a\u671d\u524d\u5b89\u88c5\u3002\u5c06\u6bcf\u4e2a\u65b9\u5411\u6807\u7b7e\u6620\u5c04\u5230\u6b63\u786e\u7684\u5750\u6807\u7cfb\u3002'},
  sc2title:{en:'SCENARIO 2: Rover facing East',cn:'\u573a\u666f 2: \u706b\u661f\u8f66\u671d\u4e1c'},
  sc2desc:{en:'Rover heading = 90 deg (facing East). Now body-X points East. Which world direction does body-Y correspond to?',cn:'\u706b\u661f\u8f66\u671d\u5411 = 90\u00b0 (\u671d\u4e1c)\u3002\u73b0\u5728\u8f66\u4f53 X \u6307\u5411\u4e1c\u3002\u8f66\u4f53 Y \u5bf9\u5e94\u54ea\u4e2a\u4e16\u754c\u65b9\u5411\uff1f'},
  sc3title:{en:'SCENARIO 3: Rover facing 45 deg NE',cn:'\u573a\u666f 3: \u706b\u661f\u8f66\u671d\u4e1c\u5317 45\u00b0'},
  sc3desc:{en:'Rover heading = 45 deg (NE). Camera rotated 5 deg clockwise relative to body. Assign the direction labels correctly.',cn:'\u706b\u661f\u8f66\u671d\u5411 = 45\u00b0 (\u4e1c\u5317)\u3002\u76f8\u673a\u76f8\u5bf9\u8f66\u4f53\u987a\u65f6\u9488\u65cb\u8f6c 5\u00b0\u3002\u6b63\u786e\u5206\u914d\u65b9\u5411\u6807\u7b7e\u3002'},
  zoneWorld:{en:'WORLD FRAME',cn:'\u4e16\u754c\u5750\u6807\u7cfb'},
  zoneBody:{en:'BODY FRAME',cn:'\u8f66\u4f53\u5750\u6807\u7cfb'},
  zoneCam:{en:'CAMERA FRAME',cn:'\u76f8\u673a\u5750\u6807\u7cfb'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

/* scenarios data */
var scenarios=[
  {
    titleKey:'sc1title', descKey:'sc1desc',
    items:[
      {id:'d1',label:{en:'+X body = Forward',cn:'+X \u8f66\u4f53 = \u524d\u8fdb'},zone:'body'},
      {id:'d2',label:{en:'+Y body = Right',cn:'+Y \u8f66\u4f53 = \u53f3\u4fa7'},zone:'body'},
      {id:'d3',label:{en:'North = +Y world',cn:'\u5317 = +Y \u4e16\u754c'},zone:'world'},
      {id:'d4',label:{en:'East = +X world',cn:'\u4e1c = +X \u4e16\u754c'},zone:'world'},
      {id:'d5',label:{en:'Cam Z = Forward',cn:'\u76f8\u673a Z = \u524d\u65b9'},zone:'cam'},
      {id:'d6',label:{en:'Cam X = Right',cn:'\u76f8\u673a X = \u53f3\u65b9'},zone:'cam'}
    ],
    zones:['world','body','cam']
  },
  {
    titleKey:'sc2title', descKey:'sc2desc',
    items:[
      {id:'e1',label:{en:'Body +X = East (world)',cn:'\u8f66\u4f53 +X = \u4e1c (\u4e16\u754c)'},zone:'body'},
      {id:'e2',label:{en:'Body +Y = South (world)',cn:'\u8f66\u4f53 +Y = \u5357 (\u4e16\u754c)'},zone:'body'},
      {id:'e3',label:{en:'World +X = East',cn:'\u4e16\u754c +X = \u4e1c'},zone:'world'},
      {id:'e4',label:{en:'World +Y = North',cn:'\u4e16\u754c +Y = \u5317'},zone:'world'},
      {id:'e5',label:{en:'Cam Z = East (world)',cn:'\u76f8\u673a Z = \u4e1c (\u4e16\u754c)'},zone:'cam'},
      {id:'e6',label:{en:'Cam X = South (world)',cn:'\u76f8\u673a X = \u5357 (\u4e16\u754c)'},zone:'cam'}
    ],
    zones:['world','body','cam']
  },
  {
    titleKey:'sc3title', descKey:'sc3desc',
    items:[
      {id:'f1',label:{en:'Body +X = NE 45 deg',cn:'\u8f66\u4f53 +X = \u4e1c\u5317 45\u00b0'},zone:'body'},
      {id:'f2',label:{en:'Body +Y = SE 135 deg',cn:'\u8f66\u4f53 +Y = \u4e1c\u5357 135\u00b0'},zone:'body'},
      {id:'f3',label:{en:'World N = body cos45 X - sin45 Y',cn:'\u4e16\u754c N = cos45*\u8f66X - sin45*\u8f66Y'},zone:'world'},
      {id:'f4',label:{en:'Cam Z = ~50 deg (body + 5 deg offset)',cn:'\u76f8\u673a Z = ~50\u00b0 (\u8f66\u4f53 + 5\u00b0 \u504f\u79fb)'},zone:'cam'},
      {id:'f5',label:{en:'Cam X = ~140 deg (perpendicular to cam Z)',cn:'\u76f8\u673a X = ~140\u00b0 (\u5782\u76f4\u4e8e\u76f8\u673a Z)'},zone:'cam'},
      {id:'f6',label:{en:'World axes are fixed regardless of rover heading',cn:'\u4e16\u754c\u5750\u6807\u8f74\u4e0d\u968f\u8f66\u5934\u671d\u5411\u53d8\u5316'},zone:'world'}
    ],
    zones:['world','body','cam']
  }
];

var currentScenario=0, totalCorrect=0, totalAnswered=0;
var placements={};/* zoneId -> [itemId, ...] */
var checkedState=false;

function shuffleArray(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
  return arr;
}

function buildScenario(idx){
  var sc=scenarios[idx];
  checkedState=false;
  placements={world:[],body:[],cam:[]};
  document.getElementById('scenarioTitle').textContent=t(sc.titleKey);
  document.getElementById('scenarioDesc').textContent=t(sc.descKey);
  /* build source items */
  var srcCol=document.getElementById('sourceCol');
  srcCol.innerHTML='<div class="col-title" id="sourceTitle">'+t('sourceTitle')+'</div>';
  var shuffled=shuffleArray(sc.items.slice());
  shuffled.forEach(function(item){
    var el=document.createElement('div');
    el.className='drag-item';
    el.setAttribute('data-id',item.id);
    el.textContent=item.label[LANG]||item.label['en'];
    el.draggable=true;
    /* drag events */
    el.addEventListener('dragstart',function(e){
      e.dataTransfer.setData('text/plain',item.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend',function(){el.classList.remove('dragging');});
    /* touch events */
    var touchClone=null;
    el.addEventListener('touchstart',function(e){
      e.preventDefault();
      var touch=e.touches[0];
      touchClone=el.cloneNode(true);
      touchClone.style.position='fixed';
      touchClone.style.zIndex='999';
      touchClone.style.width=el.offsetWidth+'px';
      touchClone.style.pointerEvents='none';
      touchClone.style.opacity='0.8';
      touchClone.style.left=(touch.clientX-el.offsetWidth/2)+'px';
      touchClone.style.top=(touch.clientY-20)+'px';
      document.body.appendChild(touchClone);
      el.classList.add('dragging');
      el._dragItemId=item.id;
    });
    el.addEventListener('touchmove',function(e){
      e.preventDefault();
      if(!touchClone)return;
      var touch=e.touches[0];
      touchClone.style.left=(touch.clientX-el.offsetWidth/2)+'px';
      touchClone.style.top=(touch.clientY-20)+'px';
      /* highlight zones */
      document.querySelectorAll('.drop-zone').forEach(function(dz){
        var r=dz.getBoundingClientRect();
        if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
          dz.classList.add('hover');
        }else{dz.classList.remove('hover');}
      });
    });
    el.addEventListener('touchend',function(e){
      if(touchClone){document.body.removeChild(touchClone);touchClone=null;}
      el.classList.remove('dragging');
      var touch=e.changedTouches[0];
      document.querySelectorAll('.drop-zone').forEach(function(dz){
        dz.classList.remove('hover');
        var r=dz.getBoundingClientRect();
        if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
          var zid=dz.getAttribute('data-zone');
          if(placements[zid].indexOf(item.id)===-1){
            placements[zid].push(item.id);
            el.style.display='none';
            renderPlacements();
          }
        }
      });
    });
    srcCol.appendChild(el);
  });

  /* build drop zones */
  var tgt=document.getElementById('targetArea');
  tgt.innerHTML='';
  var zoneKeys=['world','body','cam'];
  var zoneLabels=[t('zoneWorld'),t('zoneBody'),t('zoneCam')];
  zoneKeys.forEach(function(zk,zi){
    var dz=document.createElement('div');
    dz.className='drop-zone';
    dz.setAttribute('data-zone',zk);
    dz.innerHTML='<div class="zone-title">'+zoneLabels[zi]+'</div>';
    dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('hover');});
    dz.addEventListener('dragleave',function(){dz.classList.remove('hover');});
    dz.addEventListener('drop',function(e){
      e.preventDefault();dz.classList.remove('hover');
      var itemId=e.dataTransfer.getData('text/plain');
      if(placements[zk].indexOf(itemId)===-1){
        placements[zk].push(itemId);
        var srcItem=document.querySelector('.drag-item[data-id="'+itemId+'"]');
        if(srcItem)srcItem.style.display='none';
        renderPlacements();
      }
    });
    tgt.appendChild(dz);
  });

  updateHUD();
}

function renderPlacements(){
  var sc=scenarios[currentScenario];
  var zoneKeys=['world','body','cam'];
  zoneKeys.forEach(function(zk){
    var dz=document.querySelector('.drop-zone[data-zone="'+zk+'"]');
    /* clear placed items but keep title */
    var placed=dz.querySelectorAll('.placed-item,.result-item');
    placed.forEach(function(p){p.remove();});
    placements[zk].forEach(function(itemId){
      var item=sc.items.find(function(it){return it.id===itemId;});
      if(!item)return;
      var pe=document.createElement('div');
      if(checkedState){
        var isCorrect=item.zone===zk;
        pe.className='result-item '+(isCorrect?'correct':'wrong');
        pe.innerHTML='<span>'+(item.label[LANG]||item.label['en'])+'</span><span>'+(isCorrect?'OK':'X')+'</span>';
      }else{
        pe.className='placed-item';
        pe.innerHTML='<span>'+(item.label[LANG]||item.label['en'])+'</span><span class="remove-btn">x</span>';
        pe.querySelector('.remove-btn').addEventListener('click',function(){
          var idx=placements[zk].indexOf(itemId);
          if(idx>=0)placements[zk].splice(idx,1);
          var srcItem=document.querySelector('.drag-item[data-id="'+itemId+'"]');
          if(srcItem)srcItem.style.display='';
          renderPlacements();
        });
      }
      dz.appendChild(pe);
    });
  });
}

function checkAnswers(){
  if(checkedState)return;
  var sc=scenarios[currentScenario];
  var allPlaced=true;
  sc.items.forEach(function(item){
    var found=false;
    ['world','body','cam'].forEach(function(zk){
      if(placements[zk].indexOf(item.id)>=0)found=true;
    });
    if(!found)allPlaced=false;
  });
  if(!allPlaced)return;/* don't check until all placed */
  checkedState=true;
  var correct=0;
  sc.items.forEach(function(item){
    if(placements[item.zone]&&placements[item.zone].indexOf(item.id)>=0)correct++;
  });
  totalCorrect+=correct;totalAnswered+=sc.items.length;
  renderPlacements();updateHUD();

  if(currentScenario>=scenarios.length-1&&correct===sc.items.length){
    setTimeout(function(){showFeedback();},500);
  }
}

function nextScenario(){
  if(!checkedState)return;
  if(currentScenario<scenarios.length-1){
    currentScenario++;
    buildScenario(currentScenario);
  }
}

function updateHUD(){
  var html='';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudScenario')+'</div><div class="hud-val">'+(currentScenario+1)+'/'+scenarios.length+'</div></div>';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudScore')+'</div><div class="hud-val">'+totalCorrect+'</div></div>';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudCorrect')+'</div><div class="hud-val">'+(totalAnswered>0?Math.round(totalCorrect/totalAnswered*100)+'%':'--')+'</div></div>';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudTotal')+'</div><div class="hud-val">'+totalAnswered+'</div></div>';
  document.getElementById('hud').innerHTML=html;
  document.getElementById('scoreText').textContent=totalCorrect+' pts';
}

function updateGuide(){
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideWhat').textContent=t('guideWhat');
  var ul=document.getElementById('guidePoints');
  ul.innerHTML='<li>'+t('guideStep1')+'</li><li>'+t('guideStep2')+'</li><li>'+t('guideStep3')+'</li>';
}

function showFeedback(){
  document.getElementById('fbTitle').textContent=t('fbWinTitle');
  document.getElementById('fbText').textContent=t('fbWinText');
  document.getElementById('fbBtn').textContent=t('fbClose');
  document.getElementById('feedbackOverlay').classList.add('show');
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('btnCheck').textContent=t('btnCheck');
  document.getElementById('btnNext').textContent=t('btnNext');
  updateGuide();
  buildScenario(currentScenario);
}

document.getElementById('btnCheck').addEventListener('click',checkAnswers);
document.getElementById('btnNext').addEventListener('click',nextScenario);
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('guideHeader').addEventListener('click',function(){
  var gc=document.getElementById('guideContent');var gt=document.getElementById('guideToggle');
  if(gc.classList.contains('collapsed')){gc.classList.remove('collapsed');gt.textContent='[-]';}
  else{gc.classList.add('collapsed');gt.textContent='[+]';}
});
document.getElementById('fbBtn').addEventListener('click',function(){
  document.getElementById('feedbackOverlay').classList.remove('show');
});

refreshI18N();
})();
</script>
</body>
</html>
