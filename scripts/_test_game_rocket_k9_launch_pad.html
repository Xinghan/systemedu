<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Plane Launch Pad</title>
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#05070a;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;background:#070a14;flex-shrink:0;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#ffb000;letter-spacing:-0.02em;}
.header .sub{font-size:10px;color:#8e90a6;letter-spacing:0.08em;text-transform:uppercase;}
.header-right{display:flex;gap:8px;align-items:center;}
.hdr-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border:none;cursor:pointer;background:rgba(32,31,31,0.85);backdrop-filter:blur(12px);color:#8e90a6;letter-spacing:0.08em;text-transform:uppercase;}
.hdr-btn:hover{color:#ffb000;}
.main{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;padding:6px 16px;overflow:hidden;}
.plane-chooser{display:flex;gap:6px;justify-content:center;align-items:center;flex-shrink:0;}
.plane-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;background:#171a1f;color:#8e90a6;border:1px solid transparent;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
.plane-btn.active{background:rgba(255,176,0,0.18);color:#ffb000;border-color:#ffb000;}
.stage-row{flex:1;min-height:0;display:flex;flex-direction:column;}
.stage{flex:1;min-height:0;position:relative;background:linear-gradient(180deg,#0b1020 0%,#1a2240 60%,#253659 100%);border:1px solid rgba(255,176,0,0.18);overflow:hidden;display:flex;flex-direction:column;}
.stage canvas{flex:1;min-height:0;display:block;width:100%;}
.controls-row{display:flex;gap:12px;align-items:center;justify-content:center;padding:8px;background:rgba(17,20,37,0.85);flex-shrink:0;flex-wrap:wrap;}
.slider-group{display:flex;align-items:center;gap:8px;}
.slider-group label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8e90a6;letter-spacing:0.06em;text-transform:uppercase;}
.slider-group input[type=range]{width:110px;-webkit-appearance:none;appearance:none;background:#3a3d4a;height:4px;outline:none;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:#ffb000;cursor:pointer;}
.slider-group .val{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:#ffb000;min-width:30px;text-align:right;}
.launch-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 24px;border:none;cursor:pointer;background:linear-gradient(135deg,#ffb000,#ff7a00);color:#05070a;letter-spacing:0.1em;text-transform:uppercase;}
.launch-btn:hover{box-shadow:0 0 12px rgba(255,176,0,0.6);}
.launch-btn:disabled{opacity:0.5;cursor:not-allowed;box-shadow:none;}
.stats-row{display:flex;gap:12px;padding:6px 16px;background:#070a14;border-top:1px solid rgba(255,176,0,0.18);flex-shrink:0;flex-wrap:wrap;justify-content:center;}
.stat-card{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:70px;}
.stat-card .lbl{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8e90a6;letter-spacing:0.1em;text-transform:uppercase;}
.stat-card .val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#ffb000;}
.history{display:flex;flex-direction:column;gap:3px;max-height:90px;overflow-y:auto;padding:4px 12px;background:rgba(17,20,37,0.6);}
.history .row{display:flex;gap:10px;font-family:'Space Grotesk',sans-serif;font-size:10px;color:#aaa;}
.history .row.best{color:#50ffb0;}
.banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(5,7,10,0.85);backdrop-filter:blur(8px);padding:6px 18px;font-family:'Space Grotesk',sans-serif;font-size:12px;color:#ffb000;letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(255,176,0,0.4);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:5;}
.banner.show{opacity:1;}
</style>
</head>
<body>
<div class="wrapper">
<div class="header">
<div>
<h1 id="gameTitle">\u7eb8\u98de\u673a\u8bd5\u98de\u573a</h1>
<div class="sub" id="gameSub">\u9009\u673a\u578b \u00b7 \u8c03\u89d2\u5ea6 \u00b7 \u8c03\u529b\u5ea6 \u00b7 \u6254\u51fa\u53bb</div>
</div>
<div class="header-right">
<button class="hdr-btn" id="langBtn">EN</button>
<button class="hdr-btn" id="resetBtn">RESET</button>
</div>
</div>

<div class="main">
<div class="plane-chooser">
<button class="plane-btn active" data-plane="dart">\u5c16\u5934\u6b3e DART</button>
<button class="plane-btn" data-plane="glider">\u5bbd\u7ffc\u6ed1\u7fd4 GLIDER</button>
<button class="plane-btn" data-plane="lock">\u9501\u5e95\u6b3e LOCK-BOTTOM</button>
</div>

<div class="stage-row">
<div class="stage">
<div class="banner" id="banner"></div>
<canvas id="c"></canvas>
</div>
</div>

<div class="controls-row">
<div class="slider-group">
<label id="angleLbl">\u89d2\u5ea6</label>
<input type="range" id="angleS" min="0" max="60" value="20">
<span class="val" id="angleV">20°</span>
</div>
<div class="slider-group">
<label id="powerLbl">\u529b\u5ea6</label>
<input type="range" id="powerS" min="1" max="10" value="5">
<span class="val" id="powerV">5</span>
</div>
<button class="launch-btn" id="launchBtn">\u6254\uff01 LAUNCH</button>
</div>

<div class="stats-row">
<div class="stat-card"><div class="lbl" id="sc1L">\u672c\u6b21\u8ddd\u79bb</div><div class="val" id="sc1V">-</div></div>
<div class="stat-card"><div class="lbl" id="sc2L">\u672c\u6b21\u7a33\u5b9a</div><div class="val" id="sc2V">-</div></div>
<div class="stat-card"><div class="lbl" id="sc3L">\u6700\u597d\u8bb0\u5f55</div><div class="val" id="sc3V">-</div></div>
<div class="stat-card"><div class="lbl" id="sc4L">\u8bd5\u98de\u6b21\u6570</div><div class="val" id="sc4V">0</div></div>
</div>

<div class="history" id="history"></div>
</div>
</div>

<script>
// i18n
var LANG = 'cn';
var I18N = {
  gameTitle:     {cn:'\u7eb8\u98de\u673a\u8bd5\u98de\u573a',             en:'Paper Plane Launch Pad'},
  gameSub:       {cn:'\u9009\u673a\u578b \u00b7 \u8c03\u89d2\u5ea6 \u00b7 \u8c03\u529b\u5ea6 \u00b7 \u6254\u51fa\u53bb', en:'PICK \u00b7 AIM \u00b7 POWER \u00b7 LAUNCH'},
  plane_dart:    {cn:'\u5c16\u5934\u6b3e DART',      en:'DART'},
  plane_glider:  {cn:'\u5bbd\u7ffc\u6ed1\u7fd4 GLIDER', en:'GLIDER'},
  plane_lock:    {cn:'\u9501\u5e95\u6b3e LOCK-BOTTOM', en:'LOCK-BOTTOM'},
  angleLbl:      {cn:'\u89d2\u5ea6',    en:'Angle'},
  powerLbl:      {cn:'\u529b\u5ea6',    en:'Power'},
  launch:        {cn:'\u6254\uff01 LAUNCH', en:'LAUNCH'},
  reset:         {cn:'RESET',            en:'RESET'},
  sc1L:          {cn:'\u672c\u6b21\u8ddd\u79bb',        en:'Last Distance'},
  sc2L:          {cn:'\u672c\u6b21\u7a33\u5b9a',        en:'Stability'},
  sc3L:          {cn:'\u6700\u597d\u8bb0\u5f55',        en:'Personal Best'},
  sc4L:          {cn:'\u8bd5\u98de\u6b21\u6570',        en:'Flights'},
  stab_stable:   {cn:'\u7a33', en:'STABLE'},
  stab_wobbly:   {cn:'\u6643', en:'WOBBLY'},
  stab_flip:     {cn:'\u7ffb', en:'FLIP'},
  stab_crash:    {cn:'\u6804\u5934', en:'NOSE-DIVE'},
  banner_far:    {cn:'\u98de\u5f97\u592a\u8fdc\u4e86\uff01', en:'AMAZING DISTANCE!'},
  banner_wobble: {cn:'\u6447\u6447\u6643\u6643\uff0c\u4e0b\u6b21\u8c03\u5c0f\u89d2\u5ea6', en:'WOBBLY! TRY LOWER ANGLE'},
  banner_flip:   {cn:'\u7ffb\u4e86\uff01\u529b\u5ea6\u592a\u5927', en:'IT FLIPPED! TOO MUCH POWER'},
  banner_crash:  {cn:'\u6804\u4e86\u673a\u5934\uff0c\u89d2\u5ea6\u624b\u9ad8\u4e9b', en:'NOSE-DIVE! LIFT THE ANGLE'},
  banner_ok:     {cn:'\u7a33\u7a33\u843d\u5730\uff0c\u4e0d\u9519', en:'NICE AND STEADY'},
};
function T(k) { return (I18N[k] && I18N[k][LANG]) || k; }

function refreshStaticText() {
  document.getElementById('gameTitle').textContent = T('gameTitle');
  document.getElementById('gameSub').textContent = T('gameSub');
  document.getElementById('angleLbl').textContent = T('angleLbl');
  document.getElementById('powerLbl').textContent = T('powerLbl');
  document.getElementById('launchBtn').textContent = T('launch');
  document.getElementById('resetBtn').textContent = T('reset');
  document.getElementById('sc1L').textContent = T('sc1L');
  document.getElementById('sc2L').textContent = T('sc2L');
  document.getElementById('sc3L').textContent = T('sc3L');
  document.getElementById('sc4L').textContent = T('sc4L');
  document.getElementById('langBtn').textContent = LANG === 'cn' ? 'EN' : 'CN';
  var chooser = document.querySelectorAll('.plane-btn');
  chooser[0].textContent = T('plane_dart');
  chooser[1].textContent = T('plane_glider');
  chooser[2].textContent = T('plane_lock');
}

// Plane physics profiles
// Each plane has: cruiseSpeed (base), angleSweet (optimal angle), powerSweet,
// wobbleSensitivity (how quickly off-sweet -> wobble), liftBias (glider stays up).
var PLANES = {
  dart:   {color:'#ffb000', cruiseBase:30, angleSweet:15, powerSweet:7, wobbleK:0.12, liftBias:0.9,  name:'DART'},
  glider: {color:'#50ffb0', cruiseBase:20, angleSweet:25, powerSweet:4, wobbleK:0.07, liftBias:1.6,  name:'GLIDER'},
  lock:   {color:'#ffb59c', cruiseBase:25, angleSweet:20, powerSweet:5, wobbleK:0.05, liftBias:1.2,  name:'LOCK-BOTTOM'},
};

var currentPlane = 'dart';
var flightCount = 0;
var bestDist = 0;
var bestPlane = null;
var flying = false;
var planeState = null;  // { x, y, vx, vy, rot, wobble, phase, dist, outcome }

// Canvas setup
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

function resizeCanvas() {
  var rect = canvas.getBoundingClientRect();
  canvas.width  = Math.max(300, Math.floor(rect.width));
  canvas.height = Math.max(240, Math.floor(rect.height));
}
window.addEventListener('resize', resizeCanvas);

// Stage metrics: world coordinates map to canvas pixels.
// Ground at y = H - 40. Launch point at x = 60, y = ground - 30.
function draw() {
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sky is drawn by CSS background. Add cloud hints.
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (var i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(80 + i * (W / 5), 50 + (i % 2) * 20, 30, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Distance markers on the ground: 1m, 2m, ... mapped to pixels
  var groundY = H - 40;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,176,0,0.25)';
  ctx.fillStyle = 'rgba(255,176,0,0.7)';
  ctx.font = "11px 'Space Grotesk', sans-serif";
  ctx.lineWidth = 1;
  var pxPerMeter = (W - 100) / 12;  // 12m total range
  for (var m = 1; m <= 12; m++) {
    var mx = 60 + m * pxPerMeter;
    if (mx > W - 10) break;
    ctx.beginPath();
    ctx.moveTo(mx, groundY);
    ctx.lineTo(mx, groundY + 8);
    ctx.stroke();
    if (m % 2 === 0) ctx.fillText(m + 'm', mx - 8, groundY + 24);
  }
  ctx.restore();

  // Ground line
  ctx.save();
  ctx.strokeStyle = 'rgba(255,176,0,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.restore();

  // Launch mark
  ctx.save();
  ctx.fillStyle = '#50ffb0';
  ctx.fillRect(58, groundY - 32, 4, 32);
  ctx.restore();

  // Plane
  if (planeState) {
    drawPlane(planeState.x, planeState.y, planeState.rot, PLANES[currentPlane].color);
    // trail dots
    if (planeState.trail) {
      ctx.save();
      for (var p = 0; p < planeState.trail.length; p++) {
        var tp = planeState.trail[p];
        var alpha = p / planeState.trail.length;
        ctx.fillStyle = 'rgba(255,176,0,' + (alpha * 0.5).toFixed(2) + ')';
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  } else {
    // Ready-to-launch plane at start
    drawPlane(60, groundY - 30, -parseFloat(document.getElementById('angleS').value) * Math.PI / 180, PLANES[currentPlane].color);
  }
}

function drawPlane(x, y, rot, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.fillStyle = color;
  ctx.strokeStyle = '#05070a';
  ctx.lineWidth = 1.2;
  // Simple paper plane silhouette (nose right).
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(-10, -7);
  ctx.lineTo(-4, 0);
  ctx.lineTo(-10, 7);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // centerline
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(16, 0);
  ctx.lineTo(-10, 0);
  ctx.stroke();
  ctx.restore();
}

// Compute flight outcome + trajectory
function startFlight() {
  if (flying) return;
  var angleDeg = parseFloat(document.getElementById('angleS').value);
  var power    = parseFloat(document.getElementById('powerS').value);
  var P = PLANES[currentPlane];

  // Distance: base + bonus for matching sweet spots (angle + power),
  // minus wobble penalty. Range roughly 2-12 meters.
  var angleErr = Math.abs(angleDeg - P.angleSweet);
  var powerErr = Math.abs(power    - P.powerSweet);
  var sweetness = Math.max(0, 1 - angleErr / 25) * Math.max(0, 1 - powerErr / 6);

  var distance = 2 + sweetness * 7 + P.liftBias * (power / 10) * 3;
  // Cap: about 12m
  distance = Math.max(1.5, Math.min(12, distance));

  // Outcome classification
  var outcome = 'ok';
  if (angleDeg > P.angleSweet + 20)       outcome = 'flip';
  else if (angleDeg < P.angleSweet - 12) outcome = 'crash';
  else if (power > P.powerSweet + 3)      outcome = 'flip';
  else if (angleErr > 8 || powerErr > 2) outcome = 'wobble';

  if (outcome === 'flip' || outcome === 'crash') {
    distance = Math.min(distance, outcome === 'flip' ? 3 + Math.random() : 2 + Math.random());
  }

  // Build trajectory
  var W = canvas.width, H = canvas.height;
  var groundY = H - 40;
  var pxPerMeter = (W - 100) / 12;
  var maxPxX = 60 + distance * pxPerMeter;

  // Simulate step-by-step
  planeState = {
    x: 60, y: groundY - 30,
    vx: 0, vy: 0,
    rot: -angleDeg * Math.PI / 180,
    wobble: 0, phase: 0,
    dist: distance, outcome: outcome, trail: [], finished: false, startX: 60
  };

  // Initial velocity (px/sec)
  var speed = 120 + power * 25 + P.cruiseBase * 1.5;
  planeState.vx =  speed * Math.cos(planeState.rot);
  planeState.vy =  speed * Math.sin(planeState.rot);

  flying = true;
  document.getElementById('launchBtn').disabled = true;
  planeState.tStart = performance.now();
  // Duration scaled with distance & outcome
  planeState.duration = 900 + distance * 250;
}

function tick(now) {
  if (planeState && flying) {
    var W = canvas.width, H = canvas.height;
    var groundY = H - 40;
    var pxPerMeter = (W - 100) / 12;
    var P = PLANES[currentPlane];
    var tElapsed = (now - planeState.tStart);
    var progress = Math.min(1, tElapsed / planeState.duration);

    // Horizontal progress follows easeOut
    var ease = 1 - Math.pow(1 - progress, 1.6);
    var targetX = 60 + planeState.dist * pxPerMeter * ease;
    planeState.x = targetX;

    // Vertical: parabolic arc. Apex higher if liftBias larger.
    // Arc height tuned so the plane peaks near mid-flight then lands on ground.
    var h = groundY - 30 - 120 * P.liftBias * (1 - Math.pow(2 * progress - 1, 2));
    // Crash outcome: dive quickly.
    if (planeState.outcome === 'crash') {
      h = groundY - 30 + progress * progress * 80;
    } else if (planeState.outcome === 'flip') {
      // tumble: oscillate rotation and drop steeply after mid-flight
      var tumbleStart = 0.4;
      if (progress > tumbleStart) {
        h = (groundY - 30 - 120 * P.liftBias * (1 - Math.pow(2 * tumbleStart - 1, 2))) + (progress - tumbleStart) * 280;
      }
    }
    planeState.y = Math.min(h, groundY - 4);

    // Rotation / wobble
    var baseRot = planeState.rot * (1 - progress) + progress * 0.15;
    if (planeState.outcome === 'wobble') {
      baseRot += Math.sin(tElapsed / 60) * 0.25;
    } else if (planeState.outcome === 'flip') {
      if (progress > 0.4) baseRot += (progress - 0.4) * 8 * Math.PI;
    } else if (planeState.outcome === 'crash') {
      baseRot = progress * 1.2;  // nose-dive
    }
    planeState.curRot = baseRot;

    // Trail
    if (tElapsed > 40) {
      if (!planeState.trail || planeState.trail.length === 0 || now - (planeState.lastTrail || 0) > 40) {
        planeState.trail.push({ x: planeState.x, y: planeState.y });
        if (planeState.trail.length > 40) planeState.trail.shift();
        planeState.lastTrail = now;
      }
    }

    // Draw (use curRot for this frame)
    var W2 = canvas.width, H2 = canvas.height;
    ctx.clearRect(0, 0, W2, H2);
    drawStageWithPlane(planeState.curRot);

    if (progress >= 1 && !planeState.finished) {
      planeState.finished = true;
      flying = false;
      document.getElementById('launchBtn').disabled = false;
      onFlightEnd();
    }
  } else {
    draw();
  }
  requestAnimationFrame(tick);
}

function drawStageWithPlane(rot) {
  var W = canvas.width, H = canvas.height;
  var groundY = H - 40;

  // background cloud hints
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (var i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(80 + i * (W / 5), 50 + (i % 2) * 20, 30, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // ruler
  ctx.save();
  ctx.strokeStyle = 'rgba(255,176,0,0.25)';
  ctx.fillStyle = 'rgba(255,176,0,0.7)';
  ctx.font = "11px 'Space Grotesk', sans-serif";
  ctx.lineWidth = 1;
  var pxPerMeter = (W - 100) / 12;
  for (var m = 1; m <= 12; m++) {
    var mx = 60 + m * pxPerMeter;
    if (mx > W - 10) break;
    ctx.beginPath();
    ctx.moveTo(mx, groundY);
    ctx.lineTo(mx, groundY + 8);
    ctx.stroke();
    if (m % 2 === 0) ctx.fillText(m + 'm', mx - 8, groundY + 24);
  }
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = 'rgba(255,176,0,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#50ffb0';
  ctx.fillRect(58, groundY - 32, 4, 32);
  ctx.restore();

  // Trail
  if (planeState && planeState.trail) {
    for (var p = 0; p < planeState.trail.length; p++) {
      var tp = planeState.trail[p];
      var alpha = p / planeState.trail.length;
      ctx.fillStyle = 'rgba(255,176,0,' + (alpha * 0.6).toFixed(2) + ')';
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Plane itself
  if (planeState) drawPlane(planeState.x, planeState.y, rot, PLANES[currentPlane].color);
}

function onFlightEnd() {
  flightCount += 1;
  var dist = planeState.dist;
  var outcome = planeState.outcome;
  var stabKey = outcome === 'flip'   ? 'stab_flip'
              : outcome === 'crash'  ? 'stab_crash'
              : outcome === 'wobble' ? 'stab_wobbly'
              :                        'stab_stable';
  document.getElementById('sc1V').textContent = dist.toFixed(1) + 'm';
  document.getElementById('sc2V').textContent = T(stabKey);
  document.getElementById('sc4V').textContent = flightCount;

  if (dist > bestDist && (outcome === 'ok' || outcome === 'wobble')) {
    bestDist = dist;
    bestPlane = currentPlane;
    document.getElementById('sc3V').textContent = dist.toFixed(1) + 'm ' + PLANES[currentPlane].name;
  }

  // Banner feedback
  var bannerKey = 'banner_ok';
  if (outcome === 'flip')   bannerKey = 'banner_flip';
  else if (outcome === 'crash')  bannerKey = 'banner_crash';
  else if (outcome === 'wobble') bannerKey = 'banner_wobble';
  else if (dist >= 8)            bannerKey = 'banner_far';
  showBanner(T(bannerKey));

  // History row
  var row = document.createElement('div');
  row.className = 'row' + (dist === bestDist ? ' best' : '');
  row.textContent = '#' + flightCount + ' ' + PLANES[currentPlane].name +
    '  angle=' + document.getElementById('angleS').value + '°' +
    '  power=' + document.getElementById('powerS').value +
    '  \u2192 ' + dist.toFixed(1) + 'm ' + T(stabKey);
  var hist = document.getElementById('history');
  hist.insertBefore(row, hist.firstChild);
  while (hist.children.length > 8) hist.removeChild(hist.lastChild);
}

function showBanner(text) {
  var b = document.getElementById('banner');
  b.textContent = text;
  b.classList.add('show');
  setTimeout(function() { b.classList.remove('show'); }, 1800);
}

// Wire up
function wire() {
  document.querySelectorAll('.plane-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (flying) return;
      document.querySelectorAll('.plane-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentPlane = btn.dataset.plane;
      planeState = null;
      draw();
    });
  });

  var angleS = document.getElementById('angleS');
  var angleV = document.getElementById('angleV');
  var powerS = document.getElementById('powerS');
  var powerV = document.getElementById('powerV');
  angleS.addEventListener('input', function() { angleV.textContent = angleS.value + '°'; if (!flying) draw(); });
  powerS.addEventListener('input', function() { powerV.textContent = powerS.value; });

  document.getElementById('launchBtn').addEventListener('click', startFlight);
  document.getElementById('resetBtn').addEventListener('click', function() {
    if (flying) return;
    flightCount = 0; bestDist = 0; bestPlane = null;
    document.getElementById('sc1V').textContent = '-';
    document.getElementById('sc2V').textContent = '-';
    document.getElementById('sc3V').textContent = '-';
    document.getElementById('sc4V').textContent = '0';
    document.getElementById('history').innerHTML = '';
    planeState = null;
    draw();
  });
  document.getElementById('langBtn').addEventListener('click', function() {
    LANG = LANG === 'cn' ? 'en' : 'cn';
    refreshStaticText();
  });
}

// Init
window.addEventListener('load', function() {
  resizeCanvas();
  wire();
  refreshStaticText();
  draw();
  requestAnimationFrame(tick);
});
// Also respond if canvas is inside iframe being resized
setTimeout(function() { resizeCanvas(); draw(); }, 100);
</script>
</body>
</html>
