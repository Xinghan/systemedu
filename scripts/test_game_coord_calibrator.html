<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.header{
  padding:8px 16px;text-align:center;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;
  color:#ffb59c;letter-spacing:2px;
}
.header p{font-size:12px;color:#8a8886;margin-top:2px;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
.canvas-wrap canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
.toolbar{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;
  background:rgba(28,27,27,0.92);
  border-top:1px solid rgba(138,136,134,0.15);
}
.toolbar button{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 12px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#8a8886;
}
.toolbar button.active{color:#ffb59c;border-color:rgba(255,181,156,0.3);}
.toolbar button:hover{background:#353534;}
.toolbar .sep{flex:1;}
.toolbar .info{
  font-family:'Noto Sans SC',sans-serif;font-size:11px;
  color:#8a8886;
}
.hud{
  display:flex;align-items:center;justify-content:space-around;
  height:52px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
}
.hud .hud-col{text-align:center;}
.hud .hud-label{
  font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:#8a8886;letter-spacing:1px;text-transform:uppercase;
}
.hud .hud-val{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#e5e2e1;
}
.win-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:none;z-index:200;
  align-items:center;justify-content:center;
}
.win-overlay.show{display:flex;}
.win-card{
  width:380px;max-width:90%;padding:24px;
  background:linear-gradient(180deg,rgba(28,27,27,0.98),rgba(20,20,30,0.98));
  border:1px solid rgba(255,181,156,0.2);
  text-align:center;
}
.win-card h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;
  color:#ffb59c;margin-bottom:12px;letter-spacing:2px;
}
.win-card p{
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  color:#c6c6c6;line-height:1.6;margin-bottom:16px;
}
.win-card button{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:linear-gradient(180deg,#ff7f50,#ff5f1f);
  color:#131313;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideGoal"></p>
    <ul id="guideSteps"></ul>
    <p id="guideTips" style="margin-top:6px;color:#ffb59c;"></p>
  </div>
</div>
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <button id="winBtn"></button>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="gameTitle"></h1>
    <p id="gameSubtitle"></p>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div class="toolbar" id="toolbar">
    <button id="btnRef" class="active"></button>
    <button id="btnStart"></button>
    <button id="btnGoal"></button>
    <button id="btnWaypoint"></button>
    <button id="btnMeasure"></button>
    <span class="sep"></span>
    <button id="btnClear"></button>
    <span class="info" id="toolInfo"></span>
  </div>
  <div class="hud" id="hud"></div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideGoal:{en:'Click on the field to place reference markers, start/goal points, and waypoints. Then measure distances between them.',cn:'\u5728\u573a\u5730\u4e0a\u70b9\u51fb\u653e\u7f6e\u53c2\u8003\u6807\u5fd7\u3001\u8d77\u70b9/\u7ec8\u70b9\u548c\u4efb\u52a1\u70b9\u3002\u7136\u540e\u6d4b\u91cf\u5b83\u4eec\u4e4b\u95f4\u7684\u8ddd\u79bb\u3002'},
  guideStep1:{en:'Step 1: Place 4 reference markers (corners)',cn:'\u7b2c1\u6b65\uff1a\u653e\u7f6e 4 \u4e2a\u53c2\u8003\u6807\u5fd7\uff08\u89d2\u70b9\uff09'},
  guideStep2:{en:'Step 2: Place START and GOAL markers',cn:'\u7b2c2\u6b65\uff1a\u653e\u7f6e\u8d77\u70b9\u548c\u7ec8\u70b9\u6807\u8bb0'},
  guideStep3:{en:'Step 3: Add waypoints and measure distances',cn:'\u7b2c3\u6b65\uff1a\u6dfb\u52a0\u4efb\u52a1\u70b9\u5e76\u6d4b\u91cf\u8ddd\u79bb'},
  guideTips:{en:'Tip: Use MEASURE tool -- click two points to see the distance between them.',cn:'\u63d0\u793a\uff1a\u4f7f\u7528\u6d4b\u91cf\u5de5\u5177\u2014\u2014\u70b9\u51fb\u4e24\u4e2a\u70b9\u67e5\u770b\u5b83\u4eec\u4e4b\u95f4\u7684\u8ddd\u79bb\u3002'},
  gameTitle:{en:'COORDINATE CALIBRATOR',cn:'\u5750\u6807\u6807\u5b9a\u5de5\u5177'},
  gameSubtitle:{en:'Place markers and measure your test field',cn:'\u653e\u7f6e\u6807\u5fd7\u70b9\u5e76\u6d4b\u91cf\u573a\u5730\u5c3a\u5bf8'},
  btnRef:{en:'REF',cn:'\u53c2\u8003\u70b9'},
  btnStart:{en:'START',cn:'\u8d77\u70b9'},
  btnGoal:{en:'GOAL',cn:'\u7ec8\u70b9'},
  btnWaypoint:{en:'WPT',cn:'\u4efb\u52a1\u70b9'},
  btnMeasure:{en:'MEASURE',cn:'\u6d4b\u91cf'},
  btnClear:{en:'CLEAR',cn:'\u6e05\u9664'},
  hudMarkers:{en:'MARKERS',cn:'\u6807\u5fd7'},
  hudMeasures:{en:'MEASURES',cn:'\u6d4b\u91cf'},
  hudCoverage:{en:'COVERAGE',cn:'\u8986\u76d6\u7387'},
  hudStatus:{en:'STATUS',cn:'\u72b6\u6001'},
  statusIncomplete:{en:'INCOMPLETE',cn:'\u672a\u5b8c\u6210'},
  statusCalibrated:{en:'CALIBRATED',cn:'\u5df2\u6807\u5b9a'},
  toolInfoRef:{en:'Click field to place reference marker',cn:'\u70b9\u51fb\u573a\u5730\u653e\u7f6e\u53c2\u8003\u6807\u5fd7'},
  toolInfoStart:{en:'Click field to place START',cn:'\u70b9\u51fb\u573a\u5730\u653e\u7f6e\u8d77\u70b9'},
  toolInfoGoal:{en:'Click field to place GOAL',cn:'\u70b9\u51fb\u573a\u5730\u653e\u7f6e\u7ec8\u70b9'},
  toolInfoWpt:{en:'Click field to place waypoint',cn:'\u70b9\u51fb\u573a\u5730\u653e\u7f6e\u4efb\u52a1\u70b9'},
  toolInfoMeasure:{en:'Click two markers to measure distance',cn:'\u70b9\u51fb\u4e24\u4e2a\u6807\u5fd7\u6d4b\u91cf\u8ddd\u79bb'},
  winTitle:{en:'CALIBRATION COMPLETE',cn:'\u6807\u5b9a\u5b8c\u6210'},
  winMsg:{en:'Your field now has reference coordinates, start/goal markers, and measured distances. This calibration data enables repeatable, quantitative navigation tests.',cn:'\u573a\u5730\u73b0\u5728\u5177\u6709\u53c2\u8003\u5750\u6807\u3001\u8d77\u70b9/\u7ec8\u70b9\u6807\u8bb0\u548c\u6d4b\u91cf\u8ddd\u79bb\u3002\u6b64\u6807\u5b9a\u6570\u636e\u4f7f\u5f97\u53ef\u91cd\u590d\u7684\u5b9a\u91cf\u5bfc\u822a\u6d4b\u8bd5\u6210\u4e3a\u53ef\u80fd\u3002'},
  winBtn:{en:'RECALIBRATE',cn:'\u91cd\u65b0\u6807\u5b9a'},
  mUnit:{en:'m',cn:'m'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W=0,H=0;
var DPR=Math.min(window.devicePixelRatio||1,2);

// Field dimensions (in meters): 4m x 3m
var FIELD_W=4.0,FIELD_H=3.0;
var fieldRect={x:0,y:0,w:0,h:0};// pixel coords of field area

var markers=[];// {type:'ref'|'start'|'goal'|'waypoint', px, py, worldX, worldY, label}
var measurements=[];// {from, to, dist}
var currentTool='ref';
var measureFirst=null;// marker index for measure tool
var won=false;
var refCount=0,startPlaced=false,goalPlaced=false;

function worldToPixel(wx,wy){
  return{
    x:fieldRect.x+wx/FIELD_W*fieldRect.w,
    y:fieldRect.y+(FIELD_H-wy)/FIELD_H*fieldRect.h
  };
}
function pixelToWorld(px,py){
  var wx=(px-fieldRect.x)/fieldRect.w*FIELD_W;
  var wy=FIELD_H-(py-fieldRect.y)/fieldRect.h*FIELD_H;
  return{x:Math.round(wx*100)/100,y:Math.round(wy*100)/100};
}

function computeFieldRect(){
  var margin=40;
  var availW=W-margin*2;
  var availH=H-margin*2;
  var scale=Math.min(availW/FIELD_W,availH/FIELD_H);
  var fw=FIELD_W*scale;
  var fh=FIELD_H*scale;
  fieldRect={x:(W-fw)/2,y:(H-fh)/2,w:fw,h:fh};
}

function drawBg(){
  var grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#131313');
  grd.addColorStop(1,'#1a1510');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  var step=40;
  for(var x=0;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawField(){
  var grd=ctx.createLinearGradient(fieldRect.x,fieldRect.y,fieldRect.x,fieldRect.y+fieldRect.h);
  grd.addColorStop(0,'#5a3a20');
  grd.addColorStop(0.5,'#7a4a28');
  grd.addColorStop(1,'#4a2a15');
  ctx.fillStyle=grd;
  ctx.fillRect(fieldRect.x,fieldRect.y,fieldRect.w,fieldRect.h);

  // Terrain features (decorative)
  // Slope area
  ctx.save();
  var slGrd=ctx.createLinearGradient(fieldRect.x+fieldRect.w*0.5,fieldRect.y+fieldRect.h*0.1,
    fieldRect.x+fieldRect.w*0.8,fieldRect.y+fieldRect.h*0.5);
  slGrd.addColorStop(0,'#8a6030');
  slGrd.addColorStop(1,'#6a4020');
  ctx.fillStyle=slGrd;
  ctx.beginPath();
  ctx.moveTo(fieldRect.x+fieldRect.w*0.5,fieldRect.y+fieldRect.h*0.5);
  ctx.lineTo(fieldRect.x+fieldRect.w*0.8,fieldRect.y+fieldRect.h*0.5);
  ctx.lineTo(fieldRect.x+fieldRect.w*0.8,fieldRect.y+fieldRect.h*0.15);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Some rocks
  drawSmallRock(fieldRect.x+fieldRect.w*0.3,fieldRect.y+fieldRect.h*0.6,8);
  drawSmallRock(fieldRect.x+fieldRect.w*0.6,fieldRect.y+fieldRect.h*0.7,10);
  drawSmallRock(fieldRect.x+fieldRect.w*0.45,fieldRect.y+fieldRect.h*0.35,6);

  // Sand texture
  ctx.fillStyle='rgba(200,160,96,0.15)';
  for(var i=0;i<20;i++){
    var sx=fieldRect.x+Math.random()*fieldRect.w;
    var sy=fieldRect.y+Math.random()*fieldRect.h;
    ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();
  }

  // Border
  ctx.strokeStyle='rgba(255,181,156,0.3)';
  ctx.lineWidth=2;
  ctx.strokeRect(fieldRect.x,fieldRect.y,fieldRect.w,fieldRect.h);

  // Axis labels
  ctx.font="11px 'Space Grotesk'";
  ctx.fillStyle='rgba(255,181,156,0.5)';
  ctx.textAlign='center';
  for(var m=0;m<=FIELD_W;m++){
    var px=fieldRect.x+m/FIELD_W*fieldRect.w;
    ctx.fillText(m+t('mUnit'),px,fieldRect.y+fieldRect.h+16);
  }
  ctx.textAlign='right';
  for(var m2=0;m2<=FIELD_H;m2++){
    var py=fieldRect.y+(FIELD_H-m2)/FIELD_H*fieldRect.h;
    ctx.fillText(m2+t('mUnit'),fieldRect.x-8,py+4);
  }

  // Minor grid lines within field
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=0.5;
  for(var mx=0;mx<=FIELD_W;mx+=0.5){
    var gpx=fieldRect.x+mx/FIELD_W*fieldRect.w;
    ctx.beginPath();ctx.moveTo(gpx,fieldRect.y);ctx.lineTo(gpx,fieldRect.y+fieldRect.h);ctx.stroke();
  }
  for(var my=0;my<=FIELD_H;my+=0.5){
    var gpy=fieldRect.y+(FIELD_H-my)/FIELD_H*fieldRect.h;
    ctx.beginPath();ctx.moveTo(fieldRect.x,gpy);ctx.lineTo(fieldRect.x+fieldRect.w,gpy);ctx.stroke();
  }
}

function drawSmallRock(cx,cy,r){
  var grd=ctx.createRadialGradient(cx-r*0.2,cy-r*0.2,r*0.1,cx,cy,r);
  grd.addColorStop(0,'#777');
  grd.addColorStop(1,'#444');
  ctx.beginPath();
  ctx.moveTo(cx-r,cy);
  ctx.bezierCurveTo(cx-r*0.8,cy-r*0.8,cx+r*0.5,cy-r,cx+r,cy-r*0.2);
  ctx.bezierCurveTo(cx+r,cy+r*0.5,cx+r*0.3,cy+r*0.8,cx-r*0.2,cy+r*0.6);
  ctx.bezierCurveTo(cx-r*0.8,cy+r*0.6,cx-r*1.1,cy+r*0.3,cx-r,cy);
  ctx.fillStyle=grd;ctx.fill();
}

function drawMarkers(){
  markers.forEach(function(m,idx){
    var colors={ref:'#00daf3',start:'#10b981',goal:'#ff5f1f',waypoint:'#ffb59c'};
    var color=colors[m.type]||'#fff';
    var s=10;

    // Crosshair
    ctx.save();
    ctx.strokeStyle=color;
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(m.px-s,m.py);ctx.lineTo(m.px+s,m.py);ctx.stroke();
    ctx.beginPath();ctx.moveTo(m.px,m.py-s);ctx.lineTo(m.px,m.py+s);ctx.stroke();
    ctx.beginPath();ctx.arc(m.px,m.py,s*0.6,0,Math.PI*2);ctx.stroke();

    // Glow
    ctx.shadowColor=color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(m.px,m.py,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.shadowBlur=0;

    // Label
    ctx.font="bold 10px 'Space Grotesk'";
    ctx.fillStyle=color;
    ctx.textAlign='left';
    ctx.fillText(m.label,m.px+s+4,m.py-4);
    ctx.font="9px 'Space Grotesk'";
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('('+m.worldX.toFixed(1)+','+m.worldY.toFixed(1)+')',m.px+s+4,m.py+8);
    ctx.restore();

    // Highlight if measure first
    if(currentTool==='measure'&&measureFirst===idx){
      ctx.save();
      ctx.strokeStyle=color;
      ctx.lineWidth=2;
      ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(m.px,m.py,s+4,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  });
}

function drawMeasurements(){
  measurements.forEach(function(ms){
    var a=markers[ms.from];
    var b=markers[ms.to];
    if(!a||!b)return;
    ctx.save();
    ctx.strokeStyle='rgba(255,181,156,0.5)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(a.px,a.py);ctx.lineTo(b.px,b.py);ctx.stroke();
    ctx.setLineDash([]);

    // Distance label at midpoint
    var mx=(a.px+b.px)/2;
    var my=(a.py+b.py)/2;
    ctx.font="bold 11px 'Space Grotesk'";
    ctx.fillStyle='#ffb59c';
    ctx.textAlign='center';
    ctx.shadowColor='#131313';ctx.shadowBlur=4;
    ctx.fillText(ms.dist.toFixed(2)+t('mUnit'),mx,my-6);
    ctx.shadowBlur=0;
    ctx.restore();
  });
}

function drawScene(){
  drawBg();
  computeFieldRect();
  drawField();
  drawMarkers();
  drawMeasurements();
}

function findNearestMarker(px,py,threshold){
  var best=-1,bestD=Infinity;
  markers.forEach(function(m,i){
    var d=Math.sqrt((m.px-px)*(m.px-px)+(m.py-py)*(m.py-py));
    if(d<bestD){bestD=d;best=i;}
  });
  if(bestD<(threshold||20))return best;
  return -1;
}

function isInField(px,py){
  return px>=fieldRect.x&&px<=fieldRect.x+fieldRect.w&&
         py>=fieldRect.y&&py<=fieldRect.y+fieldRect.h;
}

function handleClick(px,py){
  if(won)return;
  if(!isInField(px,py))return;

  if(currentTool==='measure'){
    var idx=findNearestMarker(px,py,25);
    if(idx<0)return;
    if(measureFirst===null){
      measureFirst=idx;
      drawScene();
    }else{
      if(measureFirst!==idx){
        var a=markers[measureFirst],b=markers[idx];
        var dist=Math.sqrt((a.worldX-b.worldX)*(a.worldX-b.worldX)+(a.worldY-b.worldY)*(a.worldY-b.worldY));
        measurements.push({from:measureFirst,to:idx,dist:dist});
      }
      measureFirst=null;
      drawScene();
      updateHUD();
      checkWin();
    }
    return;
  }

  var world=pixelToWorld(px,py);
  // Snap to 0.5m grid
  world.x=Math.round(world.x*2)/2;
  world.y=Math.round(world.y*2)/2;
  var snapped=worldToPixel(world.x,world.y);

  if(currentTool==='ref'){
    if(refCount>=4)return;
    refCount++;
    markers.push({type:'ref',px:snapped.x,py:snapped.y,worldX:world.x,worldY:world.y,label:'P'+refCount});
  }else if(currentTool==='start'){
    if(startPlaced)return;
    startPlaced=true;
    markers.push({type:'start',px:snapped.x,py:snapped.y,worldX:world.x,worldY:world.y,label:'START'});
  }else if(currentTool==='goal'){
    if(goalPlaced)return;
    goalPlaced=true;
    markers.push({type:'goal',px:snapped.x,py:snapped.y,worldX:world.x,worldY:world.y,label:'GOAL'});
  }else if(currentTool==='waypoint'){
    var wptNum=markers.filter(function(m){return m.type==='waypoint';}).length+1;
    markers.push({type:'waypoint',px:snapped.x,py:snapped.y,worldX:world.x,worldY:world.y,label:'W'+wptNum});
  }

  drawScene();
  updateHUD();
  checkWin();
}

function checkWin(){
  if(won)return;
  if(refCount>=4&&startPlaced&&goalPlaced&&measurements.length>=2){
    won=true;
    document.getElementById('winTitle').textContent=t('winTitle');
    document.getElementById('winMsg').textContent=t('winMsg');
    document.getElementById('winBtn').textContent=t('winBtn');
    document.getElementById('winOverlay').classList.add('show');
  }
}

function clearAll(){
  markers=[];
  measurements=[];
  refCount=0;
  startPlaced=false;
  goalPlaced=false;
  measureFirst=null;
  won=false;
  document.getElementById('winOverlay').classList.remove('show');
  drawScene();
  updateHUD();
}

function setTool(tool){
  currentTool=tool;
  measureFirst=null;
  ['btnRef','btnStart','btnGoal','btnWaypoint','btnMeasure'].forEach(function(id){
    document.getElementById(id).classList.remove('active');
  });
  var toolMap={ref:'btnRef',start:'btnStart',goal:'btnGoal',waypoint:'btnWaypoint',measure:'btnMeasure'};
  if(toolMap[tool])document.getElementById(toolMap[tool]).classList.add('active');
  var infoMap={ref:'toolInfoRef',start:'toolInfoStart',goal:'toolInfoGoal',waypoint:'toolInfoWpt',measure:'toolInfoMeasure'};
  document.getElementById('toolInfo').textContent=t(infoMap[tool]||'');
}

/* ── HUD ── */
function updateHUD(){
  var hud=document.getElementById('hud');
  hud.innerHTML='';
  var coverage=Math.min(100,Math.round((refCount/4*40)+(startPlaced?15:0)+(goalPlaced?15:0)+(Math.min(measurements.length,3)/3*30)));
  var status=won?t('statusCalibrated'):t('statusIncomplete');
  var cols=[
    [t('hudMarkers'),markers.length+''],
    [t('hudMeasures'),measurements.length+''],
    [t('hudCoverage'),coverage+'%'],
    [t('hudStatus'),status]
  ];
  cols.forEach(function(c){
    var div=document.createElement('div');div.className='hud-col';
    var lbl=document.createElement('div');lbl.className='hud-label';lbl.textContent=c[0];
    var val=document.createElement('div');val.className='hud-val';val.textContent=c[1];
    if(c[1]===t('statusCalibrated'))val.style.color='#10b981';
    div.appendChild(lbl);div.appendChild(val);hud.appendChild(div);
  });
}

/* ── Canvas events ── */
canvas.addEventListener('click',function(e){
  var rect=canvas.getBoundingClientRect();
  var px=(e.clientX-rect.left);
  var py=(e.clientY-rect.top);
  handleClick(px,py);
});
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  var rect=canvas.getBoundingClientRect();
  var touch=e.changedTouches[0];
  var px=touch.clientX-rect.left;
  var py=touch.clientY-rect.top;
  handleClick(px,py);
});

/* ── Toolbar events ── */
document.getElementById('btnRef').addEventListener('click',function(){setTool('ref');});
document.getElementById('btnStart').addEventListener('click',function(){setTool('start');});
document.getElementById('btnGoal').addEventListener('click',function(){setTool('goal');});
document.getElementById('btnWaypoint').addEventListener('click',function(){setTool('waypoint');});
document.getElementById('btnMeasure').addEventListener('click',function(){setTool('measure');});
document.getElementById('btnClear').addEventListener('click',function(){clearAll();});
document.getElementById('winBtn').addEventListener('click',function(){clearAll();});

/* ── Guide panel ── */
function refreshGuide(){
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  var steps=document.getElementById('guideSteps');
  steps.innerHTML='';
  ['guideStep1','guideStep2','guideStep3'].forEach(function(k){
    var li=document.createElement('li');li.textContent=t(k);steps.appendChild(li);
  });
  document.getElementById('guideTips').textContent=t('guideTips');
}
var guideCollapsed=false;
document.getElementById('guideHeader').addEventListener('click',function(){
  guideCollapsed=!guideCollapsed;
  document.getElementById('guideContent').className='guide-content'+(guideCollapsed?' collapsed':'');
  document.getElementById('guideToggle').textContent=guideCollapsed?'[+]':'[-]';
});

/* ── i18n ── */
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
function refreshI18N(){
  document.getElementById('gameTitle').textContent=t('gameTitle');
  document.getElementById('gameSubtitle').textContent=t('gameSubtitle');
  document.getElementById('btnRef').textContent=t('btnRef');
  document.getElementById('btnStart').textContent=t('btnStart');
  document.getElementById('btnGoal').textContent=t('btnGoal');
  document.getElementById('btnWaypoint').textContent=t('btnWaypoint');
  document.getElementById('btnMeasure').textContent=t('btnMeasure');
  document.getElementById('btnClear').textContent=t('btnClear');
  refreshGuide();
  setTool(currentTool);
  updateHUD();
  // Recompute marker pixel positions after potential resize
  markers.forEach(function(m){
    var p=worldToPixel(m.worldX,m.worldY);
    m.px=p.x;m.py=p.y;
  });
  drawScene();
}

/* ── Resize ── */
function resize(){
  var wrap=document.getElementById('canvasWrap');
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;
  H=rect.height;
  canvas.width=W*DPR;
  canvas.height=H*DPR;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  computeFieldRect();
  // Update marker pixel positions
  markers.forEach(function(m){
    var p=worldToPixel(m.worldX,m.worldY);
    m.px=p.x;m.py=p.y;
  });
  drawScene();
}

var ro=new ResizeObserver(function(){resize();});
ro.observe(document.getElementById('canvasWrap'));
setTimeout(resize,200);
setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});

/* ── Init ── */
refreshGuide();
setTool('ref');
updateHUD();
resize();
})();
</script>
</body>
</html>
