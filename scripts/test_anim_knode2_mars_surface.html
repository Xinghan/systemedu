<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#ffb59c);text-shadow:0 0 15px var(--glow,rgba(255,181,156,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:#1a0e08;background:linear-gradient(135deg,#ffb59c,#ff8a6a);transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px rgba(255,181,156,0.3);}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:rgba(23,26,31,0.92);color:#aaabb0;box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:#ffb59c;}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#aaabb0;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:#ffb59c;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide"><h3 id="guideTitle"></h3><div class="guide-content" id="guideContent"></div></div>
<div class="wrapper">
<div class="header"><div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div><div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:#aaabb0;letter-spacing:0.1em;"></div></div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
<script src="animation_runtime.js"></script>
<script>
var CONFIG = {
  style: 'ares_mission',
  totalFrames: 5,
  i18n: {
    title:    {en:'MARS vs EARTH', cn:'火星 vs 地球'},
    subtitle: {en:'SURFACE COMPARISON', cn:'地面对比'},
    f0_title: {en:'EARTH: PARK PATH', cn:'地球：公园小路'},
    f1_title: {en:'EARTH: BEACH', cn:'地球：沙滩'},
    f2_title: {en:'MARS: GALE CRATER', cn:'火星：盖尔陨石坑'},
    f3_title: {en:'MARS: ROCK FIELD', cn:'火星：岩石阵'},
    f4_title: {en:'COMPARISON CHART', cn:'对比总结'},
    f0_desc: {en:'Flat, paved, easy to traverse', cn:'平坦铺装，轻松通行'},
    f1_desc: {en:'Soft sand, moderate difficulty', cn:'松软沙地，中等难度'},
    f2_desc: {en:'Fine dust, hidden rocks, very soft', cn:'细尘覆盖，暗藏岩石，极其松软'},
    f3_desc: {en:'Sharp rocks everywhere, extreme danger', cn:'尖锐岩石遍布，极度危险'},
    f4_desc: {en:'5 key differences between Mars and Earth surfaces', cn:'火星与地球地面的5个关键差异'},
    diff1: {en:'Atmosphere', cn:'大气'},
    diff2: {en:'Gravity', cn:'重力'},
    diff3: {en:'Weather erosion', cn:'风化侵蚀'},
    diff4: {en:'Surface material', cn:'地面材质'},
    diff5: {en:'Water presence', cn:'水的存在'},
    earth_v: {en:'Dense', cn:'浓厚'},
    mars_v:  {en:'1% of Earth', cn:'仅地球1%'},
    earth_g: {en:'9.8 m/s\u00B2', cn:'9.8 m/s\u00B2'},
    mars_g:  {en:'3.7 m/s\u00B2', cn:'3.7 m/s\u00B2'},
    earth_w: {en:'Rain/Wind/Ice', cn:'雨/风/冰'},
    mars_w:  {en:'Dust storms only', cn:'仅沙尘暴'},
    earth_m: {en:'Soil/Rock/Sand', cn:'土壤/岩石/沙'},
    mars_m:  {en:'Regolith/Basalt', cn:'风化层/玄武岩'},
    earth_wa:{en:'Abundant', cn:'丰富'},
    mars_wa: {en:'Ice only (poles)', cn:'仅极地冰'},
    hudL1k:{en:'LOCATION',cn:'地点'}, hudL2k:{en:'HARDNESS',cn:'硬度'}, hudL3k:{en:'ROUGHNESS',cn:'粗糙度'}, hudL4k:{en:'RISK',cn:'风险'},
    park:{en:'PARK',cn:'公园'}, beach:{en:'BEACH',cn:'沙滩'}, gale:{en:'GALE',cn:'盖尔坑'}, rocks:{en:'ROCK FIELD',cn:'岩石阵'}, summary:{en:'SUMMARY',cn:'总结'},
    h45:{en:'4/5',cn:'4/5'}, h25:{en:'2/5',cn:'2/5'}, h15:{en:'1/5',cn:'1/5'}, h35:{en:'3/5',cn:'3/5'},
    r25:{en:'2/5',cn:'2/5'}, r35:{en:'3/5',cn:'3/5'}, r45:{en:'4/5',cn:'4/5'}, r55:{en:'5/5',cn:'5/5'},
    low:{en:'LOW',cn:'低'}, med:{en:'MEDIUM',cn:'中'}, high:{en:'HIGH',cn:'高'}, extreme:{en:'EXTREME',cn:'极高'}, na:{en:'--',cn:'--'},
    guideTitle:{en:'OBSERVE',cn:'观察要点'},
    g1:{en:'Compare surface textures between Earth and Mars',cn:'对比地球和火星的地面纹理'},
    g2:{en:'Notice how Mars surfaces are more dangerous',cn:'注意火星地面为什么更危险'},
    g3:{en:'The final frame summarizes 5 key differences',cn:'最后一帧总结5个关键差异'},
  },
  hudLabels: ['hudL1k','hudL2k','hudL3k','hudL4k'],
  hudValues: [
    ['park','h45','r25','low'],
    ['beach','h25','r35','med'],
    ['gale','h15','r45','high'],
    ['rocks','h35','r55','extreme'],
    ['summary','na','na','na'],
  ],
  guideTitle:'guideTitle',
  guideItems:['g1','g2','g3'],
};

function drawBg(ctx, W, H) {
  var PAL = AnimRuntime.PAL;
  var grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, PAL.bg);
  grd.addColorStop(1, PAL.bg2 || '#0a0c10');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);
}

function getFrameElements(f, W, H) {
  var PAL = AnimRuntime.PAL;
  var t = AnimRuntime.t;
  var els = [];
  var titles = ['f0_title','f1_title','f2_title','f3_title','f4_title'];
  var descs = ['f0_desc','f1_desc','f2_desc','f3_desc','f4_desc'];

  // Title
  els.push({id:'title_text', type:'custom', x:W*0.5, y:H*0.1, w:1, h:1, draw:function(ctx,el){
    ctx.font='700 clamp(15px,2.2vw,20px) "Space Grotesk"';
    ctx.fillStyle=PAL.text; ctx.textAlign='center';
    ctx.fillText(t(titles[f]), el.x, el.y);
    ctx.font='400 clamp(10px,1.3vw,13px) "Noto Sans SC"';
    ctx.fillStyle=PAL.muted;
    ctx.fillText(t(descs[f]), el.x, el.y+20);
  }});

  if (f < 4) {
    // Terrain visualization
    var groundY = H*0.65;
    var colors = [
      {ground:'rgba(120,140,100,0.4)', particles:'rgba(100,120,80,0.3)', pSize:2, pCount:30}, // park
      {ground:'rgba(210,190,150,0.4)', particles:'rgba(200,180,140,0.35)', pSize:3, pCount:50}, // beach
      {ground:'rgba(180,120,80,0.45)', particles:'rgba(160,100,60,0.4)', pSize:2, pCount:60},  // gale
      {ground:'rgba(140,100,70,0.5)', particles:'rgba(120,80,50,0.45)', pSize:5, pCount:40},   // rocks
    ];
    var c = colors[f];

    els.push({id:'ground', type:'custom', x:0, y:groundY, w:W, h:H-groundY, draw:function(ctx,el){
      var grd=ctx.createLinearGradient(0,el.y,0,el.y+el.h);
      grd.addColorStop(0, c.ground);
      grd.addColorStop(1, c.ground.replace('0.4','0.2'));
      ctx.fillStyle=grd;
      ctx.fillRect(0,el.y,el.w,el.h);
      ctx.fillStyle=c.particles;
      for(var i=0;i<c.pCount;i++){
        ctx.beginPath();
        ctx.arc(Math.random()*el.w, el.y+3+Math.random()*(el.h-6), c.pSize*(0.5+Math.random()), 0, Math.PI*2);
        ctx.fill();
      }
    }});

    // Risk bar
    var risks = [0.2, 0.4, 0.7, 0.95];
    var riskColors = [PAL.secondary||'#00cc88', '#ffaa00', PAL.error||'#ff4444', '#ff0000'];
    els.push({id:'risk_bar', type:'custom', x:W*0.1, y:H*0.4, w:W*0.35, h:16, draw:function(ctx,el){
      ctx.fillStyle='rgba(255,255,255,0.05)';
      ctx.fillRect(el.x,el.y,el.w,el.h);
      var grd=ctx.createLinearGradient(el.x,0,el.x+el.w*risks[f],0);
      grd.addColorStop(0, riskColors[f]);
      grd.addColorStop(1, riskColors[f]);
      ctx.fillStyle=grd;
      ctx.fillRect(el.x,el.y,el.w*risks[f],el.h);
      ctx.font='500 10px "Space Grotesk"';
      ctx.fillStyle=PAL.muted;
      ctx.textAlign='left';
      ctx.fillText('RISK: '+(risks[f]*100).toFixed(0)+'%', el.x, el.y-5);
    }});

    // Planet label
    var planet = f < 2 ? 'EARTH' : 'MARS';
    var planetCn = f < 2 ? '地球' : '火星';
    els.push({id:'planet_label', type:'custom', x:W*0.85, y:H*0.35, w:1, h:1, draw:function(ctx,el){
      ctx.fillStyle='rgba(20,20,35,0.6)';
      ctx.beginPath();
      ctx.arc(el.x, el.y, 30, 0, Math.PI*2);
      ctx.fill();
      ctx.font='700 11px "Space Grotesk"';
      ctx.fillStyle = f<2 ? (PAL.secondary||'#00cc88') : PAL.primary;
      ctx.textAlign='center';
      ctx.fillText(AnimRuntime.lang==='en'?planet:planetCn, el.x, el.y+4);
    }});
  } else {
    // Frame 4: comparison chart
    var diffs = ['diff1','diff2','diff3','diff4','diff5'];
    var earthVals = ['earth_v','earth_g','earth_w','earth_m','earth_wa'];
    var marsVals = ['mars_v','mars_g','mars_w','mars_m','mars_wa'];
    var startY = H*0.22;
    var rowH = (H*0.65)/5;

    els.push({id:'chart_header', type:'custom', x:0, y:startY-25, w:W, h:20, draw:function(ctx,el){
      ctx.font='700 11px "Space Grotesk"';
      ctx.fillStyle=PAL.muted; ctx.textAlign='center';
      ctx.fillText(AnimRuntime.lang==='en'?'ATTRIBUTE':'属性', W*0.2, el.y);
      ctx.fillStyle=PAL.secondary||'#00cc88';
      ctx.fillText(AnimRuntime.lang==='en'?'EARTH':'地球', W*0.5, el.y);
      ctx.fillStyle=PAL.primary;
      ctx.fillText(AnimRuntime.lang==='en'?'MARS':'火星', W*0.8, el.y);
    }});

    for(var r=0;r<5;r++){
      (function(row){
        els.push({id:'row_'+row, type:'custom', x:0, y:startY+row*rowH, w:W, h:rowH-4, draw:function(ctx,el){
          ctx.fillStyle = row%2===0 ? 'rgba(255,255,255,0.03)' : 'transparent';
          ctx.fillRect(W*0.05, el.y, W*0.9, el.h);
          ctx.font='600 12px "Noto Sans SC"';
          ctx.fillStyle=PAL.text; ctx.textAlign='center';
          ctx.fillText(t(diffs[row]), W*0.2, el.y+el.h/2+4);
          ctx.font='400 11px "Noto Sans SC"';
          ctx.fillStyle=PAL.secondary||'#00cc88';
          ctx.fillText(t(earthVals[row]), W*0.5, el.y+el.h/2+4);
          ctx.fillStyle=PAL.primary;
          ctx.fillText(t(marsVals[row]), W*0.8, el.y+el.h/2+4);
        }});
      })(r);
    }
  }

  return els;
}

AnimRuntime.boot();
</script>
</body>
</html>
