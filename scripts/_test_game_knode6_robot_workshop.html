<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Workshop 机器人工坊</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(130,220,170,0.10), transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(255,200,100,0.10), transparent 55%),
    linear-gradient(180deg,#070b12 0%,#0e1426 50%,#07080f 100%);
  color:#f2f4fa;
  font-family:'Inter','Noto Sans SC',sans-serif;
  display:flex;flex-direction:column;
}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;}

.header{
  padding:10px 18px 6px;display:flex;justify-content:space-between;align-items:flex-end;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);
}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:clamp(16px,2.2vw,22px);font-weight:700;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,#7cf0b5,#40c897);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px rgba(120,220,160,0.35));
}
.header .sub{font-size:10px;color:#aaabb0;letter-spacing:0.18em;text-transform:uppercase;margin-top:3px;}
.header-right{display:flex;align-items:center;gap:10px;}
.lang-btn{
  background:rgba(255,255,255,0.05);border:1px solid rgba(120,220,160,0.35);
  color:#7cf0b5;padding:5px 10px;font-family:'Space Grotesk',sans-serif;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;
}
.lang-btn:hover{background:rgba(120,220,160,0.15);}
.level-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.18em;
  text-transform:uppercase;color:#aaabb0;}
.level-ind strong{color:#7cf0b5;font-size:13px;}

.main{
  flex:1;display:grid;grid-template-columns:260px 1fr 260px;
  gap:0;overflow:hidden;min-height:0;
}

.panel{
  padding:10px 14px;overflow-y:auto;
  background:rgba(255,255,255,0.02);
  border-right:1px solid rgba(255,255,255,0.06);
}
.panel.right{border-right:none;border-left:1px solid rgba(255,255,255,0.06);}
.panel::-webkit-scrollbar{width:6px;}
.panel::-webkit-scrollbar-thumb{background:rgba(120,220,160,0.3);}

.panel h2{
  font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.18em;
  text-transform:uppercase;color:#7cf0b5;margin-bottom:8px;
  padding-bottom:5px;border-bottom:1px solid rgba(120,220,160,0.18);
}
.panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.12em;
  text-transform:uppercase;color:#a0e8cc;margin:10px 0 5px;
}

.level-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.level-card{
  padding:7px 9px;background:rgba(255,255,255,0.03);
  border-left:2px solid rgba(255,255,255,0.1);cursor:pointer;
  transition:all 0.15s;font-size:11px;
}
.level-card:hover{background:rgba(120,220,160,0.08);}
.level-card.active{background:rgba(120,220,160,0.14);border-left-color:#7cf0b5;}
.level-card.done{border-left-color:#ffd080;}
.level-card .num{
  font-family:'Space Grotesk',sans-serif;font-size:9px;
  color:#7cf0b5;letter-spacing:0.15em;
}
.level-card .tt{color:#eef1fa;margin-top:2px;line-height:1.3;}

.stat-row{
  display:flex;justify-content:space-between;padding:4px 0;
  font-size:11px;color:#c8c8d0;border-bottom:1px dashed rgba(255,255,255,0.06);
}
.stat-row b{color:#7cf0b5;font-family:'Space Grotesk',sans-serif;}

/* Parts toolbox */
.parts-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;
}
.part-card{
  padding:7px 6px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);cursor:grab;
  font-size:10px;text-align:center;transition:all 0.12s;
  user-select:none;
}
.part-card:hover{border-color:#7cf0b5;background:rgba(120,220,160,0.12);}
.part-card:active{cursor:grabbing;}
.part-card.equipped{opacity:0.35;pointer-events:none;}
.part-card .ic{font-family:'Space Grotesk',sans-serif;color:#7cf0b5;font-size:14px;font-weight:700;display:block;}
.part-card .nm{color:#eef1fa;margin-top:2px;}
.part-card .dt{color:#9aa;font-size:8px;margin-top:2px;line-height:1.2;}
.part-card.sensor .ic{color:#7cf0b5;}
.part-card.actuator .ic{color:#ffb060;}

/* Wiring / rule list */
.rule-list{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.rule-row{
  display:flex;align-items:center;gap:3px;padding:5px 7px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  font-size:9px;
}
.rule-row select{
  background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.12);
  color:#eef1fa;font-family:'Space Grotesk',sans-serif;
  font-size:9px;padding:2px 3px;
}
.rule-row select:focus{outline:none;border-color:#7cf0b5;}
.rule-row .del{
  background:rgba(255,100,100,0.15);border:none;color:#ff8080;
  cursor:pointer;padding:2px 5px;font-size:11px;
}
.rule-row .del:hover{background:rgba(255,100,100,0.3);}
.rule-row .kw{color:#a0e8cc;font-family:'Space Grotesk',sans-serif;font-size:9px;}

.add-rule-btn{
  padding:6px;background:rgba(120,220,160,0.14);
  border:1px dashed rgba(120,220,160,0.4);
  color:#a0e8cc;font-family:'Space Grotesk',sans-serif;
  font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;text-align:center;margin-top:5px;
}
.add-rule-btn:hover{background:rgba(120,220,160,0.25);}

/* Center stage */
.stage-area{position:relative;display:flex;flex-direction:column;min-height:0;background:rgba(0,0,0,0.18);}
.stage-top{
  padding:8px 14px;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;background:rgba(0,0,0,0.28);border-bottom:1px solid rgba(255,255,255,0.05);
}
.task{font-size:12px;color:#eef1fa;max-width:56%;line-height:1.4;}
.task .tag{
  display:inline-block;background:rgba(120,220,160,0.14);color:#7cf0b5;
  font-family:'Space Grotesk',sans-serif;font-size:9px;
  letter-spacing:0.14em;padding:2px 6px;margin-right:5px;text-transform:uppercase;
}
.readout{display:flex;gap:12px;font-family:'Space Grotesk',sans-serif;font-size:11px;}
.readout .it{color:#aaabb0;letter-spacing:0.08em;text-transform:uppercase;}
.readout .it b{color:#7cf0b5;font-size:13px;margin-left:4px;}
.readout .it.warn b{color:#ffb060;}

.canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  padding:10px;min-height:0;}
#stage{
  max-width:100%;max-height:100%;
  background:linear-gradient(135deg,#0a0e1c 0%,#0e1730 100%);
  border:1px solid rgba(120,220,160,0.22);
  box-shadow:0 8px 30px rgba(0,0,0,0.5), inset 0 0 60px rgba(80,200,150,0.04);
}

.controls{
  padding:8px 14px;display:flex;justify-content:space-between;align-items:center;
  gap:10px;flex-shrink:0;background:rgba(0,0,0,0.3);
  border-top:1px solid rgba(255,255,255,0.05);
}
.action-btns{display:flex;gap:6px;}
.btn{
  padding:6px 12px;background:rgba(120,220,160,0.10);border:1px solid rgba(120,220,160,0.35);
  color:#e8f0ea;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;cursor:pointer;transition:all 0.12s;
}
.btn:hover{background:rgba(120,220,160,0.22);border-color:#7cf0b5;}
.btn.primary{background:#7cf0b5;color:#0a0e1e;font-weight:700;border-color:#7cf0b5;}
.btn.primary:hover{background:#6ce0a5;}
.btn.danger{border-color:rgba(255,120,80,0.5);color:#ffa090;}
.btn.danger:hover{background:rgba(255,120,80,0.2);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}

.feedback{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);
  background:rgba(10,14,30,0.96);border:2px solid #7cf0b5;padding:12px 22px;
  color:#7cf0b5;font-family:'Space Grotesk',sans-serif;font-size:14px;
  letter-spacing:0.1em;text-transform:uppercase;pointer-events:none;
  opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:20;
}
.feedback.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.feedback.bad{border-color:#ff7888;color:#ff7888;}
.feedback.good{border-color:#ffd080;color:#ffd080;}
.feedback.info{border-color:#80d0ff;color:#80d0ff;}

/* Right panel */
.loop-panel{
  display:flex;flex-direction:column;gap:5px;margin-bottom:10px;
}
.loop-box{
  padding:7px 9px;background:rgba(255,255,255,0.04);
  border-left:2px solid rgba(255,255,255,0.15);
}
.loop-box.active{background:rgba(120,220,160,0.1);border-left-color:#7cf0b5;
  box-shadow:0 0 15px rgba(120,220,160,0.1) inset;}
.loop-box .ph{font-family:'Space Grotesk',sans-serif;font-size:9px;
  color:#7cf0b5;letter-spacing:0.15em;}
.loop-box .dt{color:#c8c8d0;font-size:10px;margin-top:2px;line-height:1.35;}

.log{
  background:rgba(0,0,0,0.3);padding:6px 9px;font-family:'Space Grotesk',sans-serif;
  font-size:10px;max-height:180px;overflow-y:auto;
}
.log .ln{padding:2px 0;border-bottom:1px dashed rgba(255,255,255,0.05);color:#c8c8d0;}
.log .ln.ok{color:#70e090;}
.log .ln.bad{color:#ff7888;}
.log .ln.info{color:#a0e8cc;}

.modal{
  position:fixed;inset:0;background:rgba(5,7,18,0.85);
  display:none;align-items:center;justify-content:center;z-index:50;
}
.modal.show{display:flex;}
.modal-box{
  max-width:580px;padding:26px 30px;background:linear-gradient(135deg,#0a0e1e 0%,#14251f 100%);
  border:1px solid rgba(120,220,160,0.35);box-shadow:0 10px 60px rgba(80,200,150,0.25);
}
.modal-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:17px;color:#7cf0b5;
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;
}
.modal-box p{font-size:12px;color:#c8c8d0;line-height:1.6;margin-bottom:8px;}
.modal-box .key{color:#7cf0b5;font-family:'Space Grotesk',sans-serif;}
.modal-box .btn{margin-top:8px;}

.part-slots{
  display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;
}
.slot{
  padding:4px 8px;background:rgba(120,220,160,0.1);
  border:1px dashed rgba(120,220,160,0.4);
  font-size:9px;color:#7cf0b5;font-family:'Space Grotesk',sans-serif;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
}
.slot.filled{background:rgba(120,220,160,0.2);border-style:solid;color:#eef1fa;}
.slot.filled:hover{background:rgba(255,100,100,0.15);border-color:#ff8080;color:#ff8080;}

.helper{font-size:9px;color:#aaabb0;line-height:1.45;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div>
      <h1 id="title">Robot Workshop 机器人工坊</h1>
      <div class="sub" id="subtitle">KNODE 6 · Sense-Think-Act Sandbox</div>
    </div>
    <div class="header-right">
      <div class="level-ind" id="levelInd"></div>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </div>
  <div class="main">
    <!-- LEFT: levels + parts inventory -->
    <div class="panel left">
      <h2 id="labLevels">LEVELS</h2>
      <div class="level-list" id="levelList"></div>
      <h2 id="labSensors">SENSORS · 感知</h2>
      <div class="parts-grid" id="sensorGrid"></div>
      <h2 id="labActuators">ACTUATORS · 行动</h2>
      <div class="parts-grid" id="actuatorGrid"></div>
      <h3 id="labStats">STATS</h3>
      <div class="stat-row"><span id="labTicks">Ticks</span><b id="statTicks">0</b></div>
      <div class="stat-row"><span id="labAttempts">Attempts</span><b id="statAttempts">0</b></div>
      <div class="stat-row"><span id="labWins">Wins</span><b id="statWins">0</b></div>
    </div>

    <!-- CENTER: stage -->
    <div class="stage-area">
      <div class="stage-top">
        <div class="task" id="taskText"></div>
        <div class="readout">
          <div class="it"><span id="labTick">TICK</span><b id="readTick">0</b></div>
          <div class="it"><span id="labScore">PROGRESS</span><b id="readScore">0%</b></div>
          <div class="it warn"><span id="labPhase">PHASE</span><b id="readPhase">STOP</b></div>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="stage" width="720" height="440"></canvas>
      </div>
      <div class="controls">
        <div class="action-btns">
          <button class="btn" id="btnReset">RESET</button>
          <button class="btn primary" id="btnRun">RUN</button>
          <button class="btn danger" id="btnStop">STOP</button>
          <button class="btn" id="btnHint">HINT</button>
        </div>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>

    <!-- RIGHT: equipped parts + rules + loop monitor + log -->
    <div class="panel right">
      <h2 id="labEquipped">EQUIPPED · 已装备</h2>
      <h3 id="labSlotsS">SENSORS</h3>
      <div class="part-slots" id="equippedSensors"></div>
      <h3 id="labSlotsA">ACTUATORS</h3>
      <div class="part-slots" id="equippedActuators"></div>

      <h2 id="labRules" style="margin-top:10px;">RULES · 决策</h2>
      <div class="helper" id="rulesHelp"></div>
      <div class="rule-list" id="ruleList"></div>
      <div class="add-rule-btn" id="btnAddRule">+ ADD RULE</div>

      <h2 id="labLoop" style="margin-top:10px;">SENSE-THINK-ACT</h2>
      <div class="loop-panel">
        <div class="loop-box" id="loopSense">
          <div class="ph">SENSE · 感知</div>
          <div class="dt" id="loopSenseDt">-</div>
        </div>
        <div class="loop-box" id="loopThink">
          <div class="ph">THINK · 决策</div>
          <div class="dt" id="loopThinkDt">-</div>
        </div>
        <div class="loop-box" id="loopAct">
          <div class="ph">ACT · 行动</div>
          <div class="dt" id="loopActDt">-</div>
        </div>
      </div>

      <h3 id="labLog">LOG</h3>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Welcome to Robot Workshop</h2>
    <p id="modalP1"></p>
    <p id="modalP2"></p>
    <p id="modalP3"></p>
    <p id="modalP4"></p>
    <button class="btn primary" id="btnStart">START</button>
  </div>
</div>

function buildPartsPanels(){
  var sg=$('sensorGrid'); sg.innerHTML='';
  for(var i=0;i<SENSORS.length;i++){
    var p=SENSORS[i];
    var el=document.createElement('div');
    el.className='part-card sensor';
    if(state.equipped.sensors.indexOf(p.id)>=0) el.classList.add('equipped');
    el.innerHTML='<div class="ic">'+p.icon+'</div>'+
                 '<div class="nm">'+t(p.nk)+'</div>'+
                 '<div class="dt">'+t(p.dk)+'</div>';
    (function(id){
      el.addEventListener('click',function(){ equipSensor(id); });
    })(p.id);
    sg.appendChild(el);
  }
  var ag=$('actuatorGrid'); ag.innerHTML='';
  for(var j=0;j<ACTUATORS.length;j++){
    var q=ACTUATORS[j];
    var el2=document.createElement('div');
    el2.className='part-card actuator';
    if(state.equipped.actuators.indexOf(q.id)>=0) el2.classList.add('equipped');
    el2.innerHTML='<div class="ic">'+q.icon+'</div>'+
                  '<div class="nm">'+t(q.nk)+'</div>'+
                  '<div class="dt">'+t(q.dk)+'</div>';
    (function(id){
      el2.addEventListener('click',function(){ equipActuator(id); });
    })(q.id);
    ag.appendChild(el2);
  }
}

function equipSensor(id){
  if(state.equipped.sensors.indexOf(id)>=0) return;
  state.equipped.sensors.push(id);
  buildPartsPanels();
  updateEquippedUI();
  buildRuleList();
}
function equipActuator(id){
  if(state.equipped.actuators.indexOf(id)>=0) return;
  state.equipped.actuators.push(id);
  buildPartsPanels();
  updateEquippedUI();
  buildRuleList();
}
function unequipSensor(id){
  state.equipped.sensors=state.equipped.sensors.filter(function(x){return x!==id;});
  // drop rules referencing this sensor
  state.rules=state.rules.filter(function(r){
    var cond=r.cond; var s=SENSORS.find(function(s){return s.conds.indexOf(cond)>=0;});
    return !s || s.id!==id;
  });
  buildPartsPanels();
  updateEquippedUI();
  buildRuleList();
}
function unequipActuator(id){
  state.equipped.actuators=state.equipped.actuators.filter(function(x){return x!==id;});
  state.rules=state.rules.filter(function(r){
    var act=r.act; var a=ACTUATORS.find(function(a){return a.acts.indexOf(act)>=0;});
    return !a || a.id!==id;
  });
  buildPartsPanels();
  updateEquippedUI();
  buildRuleList();
}

function updateEquippedUI(){
  var es=$('equippedSensors'); es.innerHTML='';
  for(var i=0;i<state.equipped.sensors.length;i++){
    var p=SENSORS.find(function(s){return s.id===state.equipped.sensors[i];});
    var el=document.createElement('div');
    el.className='slot filled';
    el.textContent=t(p.nk);
    (function(id){ el.addEventListener('click',function(){ unequipSensor(id); }); })(p.id);
    es.appendChild(el);
  }
  if(!state.equipped.sensors.length){
    var slot=document.createElement('div'); slot.className='slot'; slot.textContent='--'; es.appendChild(slot);
  }
  var ea=$('equippedActuators'); ea.innerHTML='';
  for(var j=0;j<state.equipped.actuators.length;j++){
    var q=ACTUATORS.find(function(a){return a.id===state.equipped.actuators[j];});
    var el2=document.createElement('div');
    el2.className='slot filled';
    el2.textContent=t(q.nk);
    (function(id){ el2.addEventListener('click',function(){ unequipActuator(id); }); })(q.id);
    ea.appendChild(el2);
  }
  if(!state.equipped.actuators.length){
    var slot2=document.createElement('div'); slot2.className='slot'; slot2.textContent='--'; ea.appendChild(slot2);
  }
}

function buildRuleList(){
  var list=$('ruleList'); list.innerHTML='';
  for(var i=0;i<state.rules.length;i++){
    var r=state.rules[i];
    var row=document.createElement('div');
    row.className='rule-row';
    // IF
    var ifLbl=document.createElement('span'); ifLbl.className='kw'; ifLbl.textContent=t('ifLbl');
    row.appendChild(ifLbl);
    var condSel=document.createElement('select');
    var allConds=getAvailableConds();
    for(var c=0;c<allConds.length;c++){
      var o=document.createElement('option'); o.value=allConds[c]; o.textContent=t(allConds[c]);
      if(allConds[c]===r.cond) o.selected=true;
      condSel.appendChild(o);
    }
    (function(idx){
      condSel.addEventListener('change',function(){ state.rules[idx].cond=condSel.value; });
    })(i);
    row.appendChild(condSel);
    // THEN
    var th=document.createElement('span'); th.className='kw'; th.textContent=t('thenLbl');
    row.appendChild(th);
    var actSel=document.createElement('select');
    var allActs=getAvailableActs();
    for(var a=0;a<allActs.length;a++){
      var o2=document.createElement('option'); o2.value=allActs[a]; o2.textContent=t(allActs[a]);
      if(allActs[a]===r.act) o2.selected=true;
      actSel.appendChild(o2);
    }
    (function(idx){
      actSel.addEventListener('change',function(){ state.rules[idx].act=actSel.value; });
    })(i);
    row.appendChild(actSel);
    // delete
    var del=document.createElement('button'); del.className='del'; del.textContent='x';
    (function(idx){
      del.addEventListener('click',function(){
        state.rules.splice(idx,1); buildRuleList();
      });
    })(i);
    row.appendChild(del);
    list.appendChild(row);
  }
}

function getAvailableConds(){
  var out=[];
  for(var i=0;i<state.equipped.sensors.length;i++){
    var s=SENSORS.find(function(s){return s.id===state.equipped.sensors[i];});
    if(s) out=out.concat(s.conds);
  }
  return out;
}
function getAvailableActs(){
  var out=[];
  for(var i=0;i<state.equipped.actuators.length;i++){
    var a=ACTUATORS.find(function(a){return a.id===state.equipped.actuators[i];});
    if(a) out=out.concat(a.acts);
  }
  return out;
}

function addRule(){
  var conds=getAvailableConds();
  var acts=getAvailableActs();
  if(!conds.length){ flash(t('fbNoSensor'),'bad'); return; }
  if(!acts.length){ flash(t('fbNoActuator'),'bad'); return; }
  state.rules.push({cond:conds[0],act:acts[0]});
  buildRuleList();
}

function buildLevelList(){
  var list=$('levelList'); list.innerHTML='';
  var cards=t('levelCards');
  for(var i=0;i<LEVELS.length;i++){
    var card=document.createElement('div');
    card.className='level-card';
    if(i===state.lv) card.classList.add('active');
    if(state.levelWin[i]) card.classList.add('done');
    card.innerHTML='<div class="num">'+cards[i].num+'</div><div class="tt">'+cards[i].tt+'</div>';

    list.appendChild(card);
  }
}

function loadLevel(idx){
  stopSim();
  state.lv=idx;
  var L=LEVELS[idx];
  state.world={cols:L.worldW,rows:L.worldH,walls:JSON.parse(JSON.stringify(L.walls||[])),
               lights:JSON.parse(JSON.stringify(L.lights||[])),
               lines:JSON.parse(JSON.stringify(L.lines||[])),
               balls:JSON.parse(JSON.stringify(L.balls||[]))};
  state.robot={x:L.robot.x,y:L.robot.y,dir:L.robot.dir||0};

  state.tick=0;

function updateTask(){
  var L=LEVELS[state.lv];
  var cards=t('levelCards');
  $('taskText').innerHTML='<span class="tag">'+cards[state.lv].num+'</span>'+t(L.taskKey);
}
function updateLevelInd(){
  $('levelInd').innerHTML='<strong>'+(state.lv+1)+'</strong> / '+LEVELS.length;
}
function updateReadout(){
  $('readTick').textContent=state.tick;
  var L=LEVELS[state.lv];
  var pct=0;
  if(L.needCoverage){
    pct=Math.round((state.covered.length/Math.max(1,L.worldW*L.worldH-L.walls.length))*100);
  } else if(L.needGrabRed){
    pct=Math.round((state.grabbed/L.needGrabRed)*100);
  } else if(L.needSeekLight){
    var lr=L.lights[0]; var d=Math.abs(state.robot.x-lr.x)+Math.abs(state.robot.y-lr.y);
    pct=Math.max(0,100-Math.round(d*8));
  } else if(L.needReachGoal){
    var g=L.goal; var d2=Math.abs(state.robot.x-g.x)+Math.abs(state.robot.y-g.y);
    pct=Math.max(0,100-Math.round(d2*8));
  } else if(L.needWallFollowTicks){
    pct=Math.round(Math.min(1,state.tick/L.needWallFollowTicks)*100);
  }
  $('readScore').textContent=pct+'%';
  var ph=t('phase'+(state.phase.charAt(0)+state.phase.slice(1).toLowerCase())) || state.phase;
  // map
  var map={'STOP':t('phaseStop'),'SENSE':t('phaseSense'),'THINK':t('phaseThink'),'ACT':t('phaseAct'),'WIN':t('phaseWin')};
  $('readPhase').textContent=map[state.phase]||state.phase;
  // highlight loop box
  $('loopSense').classList.toggle('active',state.phase==='SENSE');
  $('loopThink').classList.toggle('active',state.phase==='THINK');
  $('loopAct').classList.toggle('active',state.phase==='ACT');
  $('loopSenseDt').textContent=state.lastSense||'-';
  $('loopThinkDt').textContent=state.lastThink||'-';
  $('loopActDt').textContent=state.lastAct||'-';
}

function fitCanvas(){
  var wrap=canvas.parentElement;
  var w=wrap.clientWidth-20;
  var h=wrap.clientHeight-20;
  var cellW=Math.floor(w/state.world.cols);
  var cellH=Math.floor(h/state.world.rows);
  CELL=Math.max(24,Math.min(cellW,cellH,50));
  canvas.width=state.world.cols*CELL;
  canvas.height=state.world.rows*CELL;
}
window.addEventListener('resize',function(){ if(state.world) fitCanvas(); });

/* ======================= SIM LOOP ======================= */
function runSim(){
  // Validate minimal parts
  var L=LEVELS[state.lv];
  if(!state.equipped.sensors.length){ flash(t('fbNoSensor'),'bad'); return; }
  if(!state.equipped.actuators.length){ flash(t('fbNoActuator'),'bad'); return; }
  if(!state.rules.length){ flash(t('fbNoRule'),'bad'); return; }
  state.attempts++;
  state.running=true;
  if(state.animTimer) clearInterval(state.animTimer);
  state.animTimer=setInterval(function(){
    if(!state.running) return;
    tickSim();
    if(state.tick>=LEVELS[state.lv].targetTicks){
      stopSim();
      evalResult();
    }
  },80);
  log('run start','info');
}
function stopSim(){
  state.running=false;
  state.phase='STOP';
  if(state.animTimer){ clearInterval(state.animTimer); state.animTimer=null; }
  updateReadout();
}

function tickSim(){
  state.tick++;
  // SENSE
  state.phase='SENSE';
  var sr=senseWorld();
  state.lastSense=describeSense(sr);
  // THINK
  state.phase='THINK';
  var act=think(sr);
  state.lastThink=act?t(act):'no-match';
  // ACT
  state.phase='ACT';
  doAct(act);
  updateReadout();
  // update coverage
  var key=state.robot.x+','+state.robot.y;
  if(state.covered.indexOf(key)<0) state.covered.push(key);
  // check mid-win conditions
  var L=LEVELS[state.lv];
  if(L.needGrabRed && state.grabbed>=L.needGrabRed){
    stopSim(); evalResult(); return;
  }
  if(L.needReachGoal){
    if(state.robot.x===L.goal.x && state.robot.y===L.goal.y){
      stopSim(); evalResult(); return;
    }
  }
  if(L.needSeekLight){
    var lt=L.lights[0];
    if(Math.abs(state.robot.x-lt.x)<=1 && Math.abs(state.robot.y-lt.y)<=1){
      stopSim(); evalResult(); return;
    }
  }
}

function senseWorld(){
  var r={};
  var rx=state.robot.x, ry=state.robot.y;
  // distance: front cells until wall/border
  var dx=[1,0,-1,0][state.robot.dir];
  var dy=[0,1,0,-1][state.robot.dir];
  var d=0;
  for(var i=1;i<=6;i++){
    var nx=rx+dx*i, ny=ry+dy*i;
    if(nx<0||ny<0||nx>=state.world.cols||ny>=state.world.rows){ d=i-1; break; }
    var blocked=false;
    for(var w=0;w<state.world.walls.length;w++){
      if(state.world.walls[w][0]===nx && state.world.walls[w][1]===ny){ blocked=true; break; }
    }
    if(blocked){ d=i-1; break; }
    d=i;
  }
  r.distance=d;
  r.bumped=(d===0);
  // light
  if(state.world.lights.length){
    var L=state.world.lights[0];
    var dd=Math.abs(rx-L.x)+Math.abs(ry-L.y);
    r.light=Math.max(0,100-dd*12);
  } else r.light=0;
  // line at current
  r.lineC=false; r.lineL=false; r.lineR=false;
  for(var l=0;l<state.world.lines.length;l++){
    if(state.world.lines[l][0]===rx && state.world.lines[l][1]===ry){ r.lineC=true; }
  }
  // look left/right of robot direction
  var leftDir=(state.robot.dir+3)%4;
  var rightDir=(state.robot.dir+1)%4;
  var lx=rx+[1,0,-1,0][leftDir], ly=ry+[0,1,0,-1][leftDir];
  var rxr=rx+[1,0,-1,0][rightDir], ryr=ry+[0,1,0,-1][rightDir];
  for(var l2=0;l2<state.world.lines.length;l2++){
    if(state.world.lines[l2][0]===lx && state.world.lines[l2][1]===ly) r.lineL=true;
    if(state.world.lines[l2][0]===rxr && state.world.lines[l2][1]===ryr) r.lineR=true;
  }
  // color: look at robot cell and forward
  r.red=false; r.green=false;
  var fx=rx+dx, fy=ry+dy;
  for(var b=0;b<state.world.balls.length;b++){
    var bb=state.world.balls[b];
    if((bb.x===rx&&bb.y===ry)||(bb.x===fx&&bb.y===fy)){
      if(bb.c==='red') r.red=true;
      if(bb.c==='green') r.green=true;
    }
  }
  return r;
}
function describeSense(s){
  var parts=[];
  if(state.equipped.sensors.indexOf('dist')>=0) parts.push('d='+s.distance);
  if(state.equipped.sensors.indexOf('bump')>=0) parts.push('b='+(s.bumped?'Y':'N'));
  if(state.equipped.sensors.indexOf('light')>=0) parts.push('l='+s.light+'%');
  if(state.equipped.sensors.indexOf('line')>=0) parts.push('L='+(s.lineC?'C':s.lineL?'L':s.lineR?'R':'-'));
  if(state.equipped.sensors.indexOf('color')>=0) parts.push('c='+(s.red?'R':s.green?'G':'-'));
  return parts.join(' ');
}

function think(s){
  // Evaluate rules in order, return first matching act
  for(var i=0;i<state.rules.length;i++){
    var r=state.rules[i];
    var match=false;
    switch(r.cond){
      case 'condClose': match=(s.distance<3); break;
      case 'condFar':   match=(s.distance>=3); break;
      case 'condBump':  match=s.bumped; break;
      case 'condNoBump':match=!s.bumped; break;
      case 'condBright':match=s.light>50; break;
      case 'condDark':  match=s.light<=50; break;
      case 'condLineL': match=s.lineL; break;
      case 'condLineR': match=s.lineR; break;
      case 'condLineC': match=s.lineC; break;
      case 'condNoLine':match=!(s.lineL||s.lineR||s.lineC); break;
      case 'condRed':   match=s.red; break;
      case 'condGreen': match=s.green; break;
    }
    if(match) return r.act;
  }
  return null;
}

function doAct(act){
  if(!act){ state.lastAct='idle'; return; }
  state.lastAct=t(act);
  var rb=state.robot;
  var dx=[1,0,-1,0][rb.dir], dy=[0,1,0,-1][rb.dir];
  if(act==='actForward'){
    var nx=rb.x+dx, ny=rb.y+dy;
    if(inBounds(nx,ny)&&!isWall(nx,ny)){ rb.x=nx; rb.y=ny; }
  } else if(act==='actBackward'){
    var bx=rb.x-dx, by=rb.y-dy;
    if(inBounds(bx,by)&&!isWall(bx,by)){ rb.x=bx; rb.y=by; }
  } else if(act==='actTurnL'){
    rb.dir=(rb.dir+3)%4;
  } else if(act==='actTurnR'){
    rb.dir=(rb.dir+1)%4;
  } else if(act==='actStop'){
    // nothing
  } else if(act==='actGrab'){
    // grab red ball at current cell or front
    var fx=rb.x+dx, fy=rb.y+dy;
    for(var i=state.world.balls.length-1;i>=0;i--){
      var b=state.world.balls[i];
      if(b.c==='red' && ((b.x===rb.x&&b.y===rb.y)||(b.x===fx&&b.y===fy))){
        state.world.balls.splice(i,1);
        state.grabbed++;
        log('grabbed red','ok');
        break;
      }
    }
  } else if(act==='actRelease'){
    // noop for simplicity
  } else if(act==='actLightOn' || act==='actLightOff' || act==='actBeep'){
    // signals only
  }
}

function inBounds(x,y){ return x>=0&&y>=0&&x<state.world.cols&&y<state.world.rows; }
function isWall(x,y){
  for(var i=0;i<state.world.walls.length;i++){
    if(state.world.walls[i][0]===x && state.world.walls[i][1]===y) return true;
  }
  return false;
}

function evalResult(){
  var L=LEVELS[state.lv];
  var win=false;
  if(L.needCoverage){
    var cov=state.covered.length / Math.max(1, L.worldW*L.worldH - L.walls.length);
    win=(cov>=L.needCoverage);
    log('coverage='+Math.round(cov*100)+'%', win?'ok':'bad');
  } else if(L.needWallFollowTicks){
    // L1: need to reach target ticks with no fatal collision - already ran
    win=true;
  } else if(L.needSeekLight){
    var ll=L.lights[0];
    win=(Math.abs(state.robot.x-ll.x)<=1 && Math.abs(state.robot.y-ll.y)<=1);
  } else if(L.needReachGoal){
    win=(state.robot.x===L.goal.x && state.robot.y===L.goal.y);
  } else if(L.needGrabRed){
    win=(state.grabbed>=L.needGrabRed);
  }
  if(win){
    state.wins++;
    state.levelWin[state.lv]=true;
    state.phase='WIN';
    flash(t('fbWin'),'ok');
    log('level '+(state.lv+1)+' complete','ok');
  } else {
    flash(t('fbFail'),'bad');
    log('level '+(state.lv+1)+' failed','bad');
  }
  updateStats();
  buildLevelList();
  updateReadout();
}

function updateStats(){
  $('statTicks').textContent=state.tick;
  $('statAttempts').textContent=state.attempts;
  $('statWins').textContent=state.wins;
}

/* ======================= DRAW ======================= */
function frame(){
  if(state.world) draw();
  requestAnimationFrame(frame);
}
function draw(){
  var W=canvas.width, H=canvas.height;
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0a0e1c');
  bg.addColorStop(1,'#0d1626');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(120,220,160,0.1)';
  ctx.lineWidth=1;
  for(var x=0;x<=state.world.cols;x++){
    ctx.beginPath(); ctx.moveTo(x*CELL+0.5,0); ctx.lineTo(x*CELL+0.5,state.world.rows*CELL); ctx.stroke();
  }
  for(var y=0;y<=state.world.rows;y++){
    ctx.beginPath(); ctx.moveTo(0,y*CELL+0.5); ctx.lineTo(state.world.cols*CELL,y*CELL+0.5); ctx.stroke();
  }
  // covered cells
  ctx.fillStyle='rgba(120,220,160,0.08)';
  for(var c=0;c<state.covered.length;c++){
    var p=state.covered[c].split(',');
    ctx.fillRect(parseInt(p[0])*CELL,parseInt(p[1])*CELL,CELL,CELL);
  }
  // lines (tape)
  ctx.fillStyle='#1a1c24';
  for(var l=0;l<state.world.lines.length;l++){
    ctx.fillRect(state.world.lines[l][0]*CELL+CELL*0.15,state.world.lines[l][1]*CELL+CELL*0.15,CELL*0.7,CELL*0.7);
  }
  // walls
  for(var w=0;w<state.world.walls.length;w++){
    var wx=state.world.walls[w][0], wy=state.world.walls[w][1];
    var gg=ctx.createLinearGradient(wx*CELL,wy*CELL,wx*CELL+CELL,wy*CELL+CELL);
    gg.addColorStop(0,'#4a3b28');
    gg.addColorStop(1,'#6a4a30');
    ctx.fillStyle=gg;
    ctx.fillRect(wx*CELL+2,wy*CELL+2,CELL-4,CELL-4);
    ctx.strokeStyle='#8a6a40';
    ctx.lineWidth=1;
    ctx.strokeRect(wx*CELL+2,wy*CELL+2,CELL-4,CELL-4);
  }
  // lights
  for(var lt=0;lt<state.world.lights.length;lt++){
    var lg=state.world.lights[lt];
    var cx=lg.x*CELL+CELL/2, cy=lg.y*CELL+CELL/2;
    var rg=ctx.createRadialGradient(cx,cy,2,cx,cy,CELL*lg.r*0.35);
    rg.addColorStop(0,'rgba(255,240,150,0.8)');
    rg.addColorStop(0.3,'rgba(255,220,100,0.35)');
    rg.addColorStop(1,'rgba(255,200,80,0)');
    ctx.fillStyle=rg;
    ctx.beginPath();
    ctx.arc(cx,cy,CELL*lg.r*0.35,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ffec80';
    ctx.beginPath();
    ctx.arc(cx,cy,CELL*0.25,0,Math.PI*2);
    ctx.fill();
  }
  // balls
  for(var bb=0;bb<state.world.balls.length;bb++){
    var b=state.world.balls[bb];
    var bxx=b.x*CELL+CELL/2, byy=b.y*CELL+CELL/2;
    ctx.fillStyle=(b.c==='red')?'#ff6080':'#70e090';
    ctx.beginPath();
    ctx.arc(bxx,byy,CELL*0.25,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
  // goal for L3
  var LL=LEVELS[state.lv];
  if(LL.goal){
    var g=LL.goal;
    ctx.strokeStyle='#ffd080';
    ctx.lineWidth=2;
    ctx.strokeRect(g.x*CELL+4,g.y*CELL+4,CELL-8,CELL-8);
    ctx.fillStyle='#ffd080';
    ctx.font='bold '+Math.floor(CELL*0.4)+'px "Space Grotesk",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('G',g.x*CELL+CELL/2,g.y*CELL+CELL/2);
  }
  // robot
  drawRobot();
}
function drawRobot(){
  var rb=state.robot;
  var cx=rb.x*CELL+CELL/2, cy=rb.y*CELL+CELL/2;
  var dx=[1,0,-1,0][rb.dir], dy=[0,1,0,-1][rb.dir];
  ctx.save();
  // chassis
  var rg=ctx.createRadialGradient(cx,cy,3,cx,cy,CELL*0.45);
  rg.addColorStop(0,'#a0f0d0');
  rg.addColorStop(1,'#3a8070');
  ctx.fillStyle=rg;
  ctx.beginPath();
  ctx.arc(cx,cy,CELL*0.36,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=2;
  ctx.stroke();
  // facing triangle
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(cx+dx*CELL*0.28,cy+dy*CELL*0.28);
  ctx.lineTo(cx-dy*CELL*0.14+dx*CELL*0.05,cy+dx*CELL*0.14+dy*CELL*0.05);
  ctx.lineTo(cx+dy*CELL*0.14+dx*CELL*0.05,cy-dx*CELL*0.14+dy*CELL*0.05);
  ctx.closePath();
  ctx.fill();
  // sensor ring glow if active
  if(state.phase==='SENSE'){
    ctx.strokeStyle='rgba(120,220,160,0.6)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(cx,cy,CELL*0.48,0,Math.PI*2);
    ctx.stroke();
  }
  // act ring (orange) if acting
  if(state.phase==='ACT'){
    ctx.strokeStyle='rgba(255,180,80,0.6)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(cx,cy,CELL*0.52,0,Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

/* ======================= FEEDBACK ======================= */
var fbTimer=null;
function flash(msg,kind){
  var el=$('feedback');
  el.textContent=msg;
  el.className='feedback show '+(kind==='ok'?'good':kind||'');
  if(fbTimer) clearTimeout(fbTimer);
  fbTimer=setTimeout(function(){ el.classList.remove('show'); },900);
}
function log(msg,kind){
  var el=$('log');
  var d=document.createElement('div');
  d.className='ln '+(kind||'');
  d.textContent='['+state.tick+'] '+msg;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
  while(el.children.length>60) el.removeChild(el.firstChild);
}

window.addEventListener('load',function(){ setTimeout(init,30); });
})();
</script>
