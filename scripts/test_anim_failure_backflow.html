<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Failure Backflow Path</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1;}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%;}
.header{padding:8px 16px;background:rgba(28,27,27,0.92);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#ffb59c;letter-spacing:1px;text-transform:uppercase;}
.header .frame-info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{display:block;width:100%;height:100%;}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:rgba(28,27,27,0.92);flex-shrink:0;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 16px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(53,53,52,0.4);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;text-transform:uppercase;border-radius:0;}
.ctrl-btn:hover{background:rgba(255,127,80,0.2);}
.hud{display:flex;align-items:center;justify-content:space-around;padding:6px 16px;background:rgba(0,0,0,0.55);height:48px;flex-shrink:0;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;}
.hud-value{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#00daf3;font-weight:700;}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;border-radius:0;}
.guide-panel{position:fixed;top:8px;right:8px;width:260px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:rgba(255,255,255,0.85);border-radius:0;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content{transition:max-height 0.3s;overflow:hidden;}
.guide-panel .collapsed .guide-content{max-height:0;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideDesc" style="margin-bottom:8px;"></p>
    <ul id="guideList"></ul>
    <p id="guideTakeaway" style="margin-top:8px;font-style:italic;color:#ffb59c;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="titleText"></h1>
    <span class="frame-info" id="frameInfo"></span>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btnPrev"></button>
    <button class="ctrl-btn" id="btnPlay"></button>
    <button class="ctrl-btn" id="btnNext"></button>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL0"></div><div class="hud-value" id="hudV0"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3"></div></div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'FAILURE BACKFLOW PATH',cn:'\u5931\u8d25\u56de\u6d41\u8def\u5f84'},
  guide:{en:'GUIDE',cn:'\u89c2\u770b\u6307\u5357'},
  guideDesc:{en:'This animation shows how a single rover test failure is decomposed and traced back to data, model, cost map, and interface layers.',cn:'\u672c\u52a8\u753b\u5c55\u793a\u4e00\u6b21\u706b\u661f\u8f66\u8bd5\u8dd1\u5931\u8d25\u5982\u4f55\u88ab\u62c6\u89e3\u5e76\u8ffd\u6eaf\u5230\u6570\u636e\u3001\u6a21\u578b\u3001\u4ee3\u4ef7\u5730\u56fe\u3001\u63a5\u53e3\u56db\u4e2a\u5c42\u7684\u5177\u4f53\u4fee\u6b63\u52a8\u4f5c\u3002'},
  guideObs1:{en:'Observe how a surface failure symptom maps to multiple root causes',cn:'\u89c2\u5bdf\u8868\u5c42\u5931\u8d25\u75c7\u72b6\u5982\u4f55\u6620\u5c04\u5230\u591a\u4e2a\u6839\u56e0'},
  guideObs2:{en:'Notice the four target layers: data, model, cost map, interface',cn:'\u6ce8\u610f\u56db\u4e2a\u76ee\u6807\u5c42\uff1a\u6570\u636e\u3001\u6a21\u578b\u3001\u4ee3\u4ef7\u5730\u56fe\u3001\u63a5\u53e3'},
  guideObs3:{en:'Each corrective action includes a verification method',cn:'\u6bcf\u4e2a\u4fee\u6b63\u52a8\u4f5c\u90fd\u5305\u542b\u9a8c\u8bc1\u65b9\u5f0f'},
  guideTakeaway:{en:'A single failure can trigger corrections across multiple upstream stages.',cn:'\u4e00\u6b21\u5931\u8d25\u53ef\u4ee5\u89e6\u53d1\u591a\u4e2a\u4e0a\u6e38\u9636\u6bb5\u7684\u4fee\u6b63\u3002'},
  controls:{en:'PLAY / PREV / NEXT to navigate frames',cn:'\u64ad\u653e / \u4e0a\u4e00\u5e27 / \u4e0b\u4e00\u5e27 \u5207\u6362\u753b\u9762'},

  hudPhase:{en:'PHASE',cn:'\u9636\u6bb5'},
  hudLayers:{en:'LAYERS',cn:'\u5c42\u7ea7'},

  f0Layers:{en:'1',cn:'1'},
  f1Layers:{en:'4',cn:'4'},
  f2Layers:{en:'4',cn:'4'},
  f3Layers:{en:'4+',cn:'4+'},
  f4Layers:{en:'ALL',cn:'\u5168\u90e8'},
  f0Actions:{en:'0',cn:'0'},

  f0Loop:{en:'OPEN',cn:'\u5f00\u653e'},
  f1Loop:{en:'OPEN',cn:'\u5f00\u653e'},
  f2Loop:{en:'OPEN',cn:'\u5f00\u653e'},
  f3Loop:{en:'OPEN',cn:'\u5f00\u653e'},
  f4Loop:{en:'CLOSED',cn:'\u95ed\u5408'},
  frameOf:{en:' OF ',cn:' / '},
  frame:{en:'FRAME ',cn:'\u5e27 '},
  // Frame titles
  ft0:{en:'Test Failure: Rover stuck on soft sand',cn:'\u8bd5\u8dd1\u5931\u8d25\uff1a\u706b\u661f\u8f66\u9677\u5165\u677e\u8f6f\u6c99\u5730'},
  ft1:{en:'Classify: Map failure to 4 upstream layers',cn:'\u5206\u7c7b\uff1a\u5c06\u5931\u8d25\u6620\u5c04\u5230 4 \u4e2a\u4e0a\u6e38\u5c42'},
  ft2:{en:'Trace: Identify root causes per layer',cn:'\u8ffd\u6eaf\uff1a\u5b9a\u4f4d\u6bcf\u5c42\u7684\u6839\u56e0'},
  ft3:{en:'Correct: Design fix + verification for each',cn:'\u4fee\u6b63\uff1a\u4e3a\u6bcf\u5c42\u8bbe\u8ba1\u4fee\u590d + \u9a8c\u8bc1'},
  ft4:{en:'Closed Loop: Failure feeds improvement cycle',cn:'\u95ed\u73af\uff1a\u5931\u8d25\u9a71\u52a8\u6301\u7eed\u6539\u8fdb\u5faa\u73af'},
  // Layer names
  layerData:{en:'DATA',cn:'\u6570\u636e'},
  layerModel:{en:'MODEL',cn:'\u6a21\u578b'},
  layerCost:{en:'COST MAP',cn:'\u4ee3\u4ef7\u5730\u56fe'},
  layerInterface:{en:'INTERFACE',cn:'\u63a5\u53e3'},
  // Descriptions per frame
  desc0:{en:'Rover enters soft sand terrain. Wheels lose traction. Path planner did not flag this area as high-risk.',cn:'\u706b\u661f\u8f66\u8fdb\u5165\u677e\u8f6f\u6c99\u5730\u3002\u8f6e\u5b50\u5931\u53bb\u7275\u5f15\u529b\u3002\u8def\u5f84\u89c4\u5212\u5668\u672a\u5c06\u6b64\u533a\u57df\u6807\u8bb0\u4e3a\u9ad8\u98ce\u9669\u3002'},
  desc1:{en:'Ask: Is this a data gap? A model error? A cost underestimate? An interface drift?',cn:'\u8ffd\u95ee\uff1a\u8fd9\u662f\u6570\u636e\u7f3a\u53e3\uff1f\u6a21\u578b\u9519\u8bef\uff1f\u4ee3\u4ef7\u4f4e\u4f30\uff1f\u8fd8\u662f\u63a5\u53e3\u6f02\u79fb\uff1f'},
  desc2:{en:'Data: no soft-sand samples. Model: overfits to rock terrain. Cost: inflation too low. Interface: coordinate offset.',cn:'\u6570\u636e\uff1a\u7f3a\u5c11\u8f6f\u6c99\u6837\u672c\u3002\u6a21\u578b\uff1a\u5bf9\u5ca9\u77f3\u5730\u5f62\u8fc7\u62df\u5408\u3002\u4ee3\u4ef7\uff1a\u81a8\u80c0\u7cfb\u6570\u592a\u4f4e\u3002\u63a5\u53e3\uff1a\u5750\u6807\u504f\u79fb\u3002'},
  desc3:{en:'Fix: add 200 sand images / retrain with augmentation / raise inflation 1.5x / calibrate GPS offset. Each has a test.',cn:'\u4fee\u590d\uff1a\u52a0 200 \u5f20\u6c99\u5730\u56fe / \u589e\u5f3a\u91cd\u8bad / \u81a8\u80c0\u7cfb\u6570 x1.5 / \u6821\u51c6 GPS\u3002\u6bcf\u9879\u90fd\u6709\u9a8c\u8bc1\u65b9\u5f0f\u3002'},
  desc4:{en:'Re-run the same scenario. If all fixes verified, the failure loop is closed. System improves.',cn:'\u91cd\u8dd1\u540c\u4e00\u573a\u666f\u3002\u82e5\u6240\u6709\u4fee\u590d\u901a\u8fc7\u9a8c\u8bc1\uff0c\u5931\u8d25\u95ed\u73af\u5b8c\u6210\u3002\u7cfb\u7edf\u8fdb\u5316\u3002'},
  // Root cause details
  rcData:{en:'Missing soft-sand terrain in training set',cn:'\u8bad\u7ec3\u96c6\u7f3a\u5c11\u677e\u8f6f\u6c99\u5730\u5730\u5f62'},
  rcModel:{en:'Model overfits to rocky terrain only',cn:'\u6a21\u578b\u4ec5\u5bf9\u5ca9\u77f3\u5730\u5f62\u8fc7\u62df\u5408'},
  rcCost:{en:'Cost inflation radius too small',cn:'\u4ee3\u4ef7\u81a8\u80c0\u534a\u5f84\u8fc7\u5c0f'},
  rcInterface:{en:'GPS coordinate drift 3m',cn:'GPS \u5750\u6807\u6f02\u79fb 3m'},
  // Fix details
  fixData:{en:'+200 sand images',cn:'\u52a0 200 \u5f20\u6c99\u5730\u56fe'},
  fixModel:{en:'Retrain + augment',cn:'\u589e\u5f3a\u91cd\u8bad'},
  fixCost:{en:'Inflate x1.5',cn:'\u81a8\u80c0 x1.5'},
  fixInterface:{en:'Calibrate GPS',cn:'\u6821\u51c6 GPS'},
  verifyData:{en:'Test: sand recall >90%',cn:'\u9a8c\u8bc1\uff1a\u6c99\u5730\u53ec\u56de >90%'},
  verifyModel:{en:'Test: cross-val F1 >0.85',cn:'\u9a8c\u8bc1\uff1a\u4ea4\u53c9\u9a8c\u8bc1 F1 >0.85'},
  verifyCost:{en:'Test: no-go zone covers sand',cn:'\u9a8c\u8bc1\uff1a\u7981\u884c\u533a\u8986\u76d6\u6c99\u5730'},
  verifyInterface:{en:'Test: offset <0.5m',cn:'\u9a8c\u8bc1\uff1a\u504f\u79fb <0.5m'},
  closedLabel:{en:'IMPROVEMENT CYCLE',cn:'\u6539\u8fdb\u5faa\u73af'},
  failureLabel:{en:'FAILURE',cn:'\u5931\u8d25'},
  classifyLabel:{en:'CLASSIFY',cn:'\u5206\u7c7b'},
  traceLabel:{en:'TRACE',cn:'\u8ffd\u6eaf'},
  correctLabel:{en:'CORRECT',cn:'\u4fee\u6b63'},
  verifyLabel:{en:'VERIFY',cn:'\u9a8c\u8bc1'},
  rerunLabel:{en:'RE-RUN',cn:'\u91cd\u8dd1'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvasWrap');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
var totalFrames=5,currentFrame=0;
var playing=false,playTimer=null;
var transitioning=false;

function resize(){
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;H=rect.height;
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawFrame(currentFrame);
}

function drawBg(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#131313');g.addColorStop(1,'#1a1015');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,218,243,0.03)';ctx.lineWidth=0.5;
  for(var x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function lerp(a,b,p){return a+(b-a)*p;}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function merge(base,over){var r={};for(var k in base)r[k]=base[k];for(var k2 in over)r[k2]=over[k2];return r;}

// Colors
var COL={
  data:'#ff7f50',model:'#00daf3',cost:'#ffb59c',iface:'#10b981',
  fail:'#ff5f1f',success:'#10b981',muted:'#8a8886',text:'#e5e2e1',
  bg:'rgba(28,27,27,0.92)',glass:'rgba(53,53,52,0.6)'
};

// Primitive draw functions
function drawLabelPrimitive(text,x,y,color,size,align){
  ctx.save();ctx.font=(size||14)+'px "Space Grotesk",sans-serif';
  ctx.fillStyle=color||COL.text;ctx.textAlign=align||'center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y);ctx.restore();
}
function drawTextPrimitive(text,x,y,color,size,align,maxW){
  ctx.save();ctx.font=(size||12)+'px "Noto Sans SC","Inter",sans-serif';
  ctx.fillStyle=color||COL.text;ctx.textAlign=align||'center';ctx.textBaseline='middle';
  if(maxW)ctx.fillText(text,x,y,maxW);else ctx.fillText(text,x,y);ctx.restore();
}
function drawBox(x,y,w,h,borderColor,fillColor){
  ctx.save();
  if(fillColor){ctx.fillStyle=fillColor;ctx.fillRect(x,y,w,h);}
  if(borderColor){ctx.strokeStyle=borderColor;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);}
  ctx.restore();
}
function drawGlowBox(x,y,w,h,color,glowAmt){
  ctx.save();
  ctx.shadowColor=color;ctx.shadowBlur=glowAmt||12;
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,color+'33');g.addColorStop(1,color+'11');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.shadowBlur=0;ctx.strokeStyle=color+'88';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
  ctx.restore();
}
function drawArrowPrimitive(x1,y1,x2,y2,color){
  ctx.save();ctx.strokeStyle=color||COL.text;ctx.lineWidth=2;
  ctx.shadowColor=color||COL.text;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  var angle=Math.atan2(y2-y1,x2-x1);var hl=8;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hl*Math.cos(angle-0.4),y2-hl*Math.sin(angle-0.4));
  ctx.lineTo(x2-hl*Math.cos(angle+0.4),y2-hl*Math.sin(angle+0.4));
  ctx.closePath();ctx.fillStyle=color||COL.text;ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
}
function drawRoverIcon(x,y,size,stuck){
  ctx.save();
  var s=size||30;
  // Body
  var g=ctx.createLinearGradient(x-s*0.6,y-s*0.3,x+s*0.6,y+s*0.3);
  g.addColorStop(0,'#c6c6c6');g.addColorStop(0.5,'#8a8886');g.addColorStop(1,'#555');
  ctx.fillStyle=g;
  ctx.fillRect(x-s*0.6,y-s*0.3,s*1.2,s*0.6);
  // Wheels
  ctx.fillStyle='#353534';
  ctx.fillRect(x-s*0.7,y+s*0.2,s*0.3,s*0.2);
  ctx.fillRect(x+s*0.4,y+s*0.2,s*0.3,s*0.2);
  // Antenna
  ctx.strokeStyle='#c6c6c6';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y-s*0.3);ctx.lineTo(x+s*0.2,y-s*0.6);ctx.stroke();
  ctx.fillStyle='#00daf3';ctx.beginPath();ctx.arc(x+s*0.2,y-s*0.6,3,0,Math.PI*2);ctx.fill();
  if(stuck){
    ctx.fillStyle='#ff5f1f';ctx.font='bold '+(s*0.35)+'px "Space Grotesk"';ctx.textAlign='center';
    ctx.fillText('!',x,y);
  }
  ctx.restore();
}

// Layer box positions (computed per frame)
var layerKeys=['data','model','cost','iface'];
var layerColors=[COL.data,COL.model,COL.cost,COL.iface];

function getFrameElements(f){
  var cx=W/2,cy=H/2;
  var bw=Math.min(W*0.18,140);
  var bh=Math.min(H*0.12,60);
  var gap=12;
  var totalW=bw*4+gap*3;
  var startX=cx-totalW/2;
  var layerY=cy+H*0.15;
  var elems=[];

  // Title per frame
  var ftKeys=['ft0','ft1','ft2','ft3','ft4'];
  elems.push({id:'title',type:'label',text:t(ftKeys[f]),x:cx,y:H*0.06,color:'#ffb59c',size:Math.min(18,W*0.025),align:'center'});

  // Description
  var descKeys=['desc0','desc1','desc2','desc3','desc4'];
  elems.push({id:'desc',type:'text',text:t(descKeys[f]),x:cx,y:H*0.13,color:'#c6c6c6',size:Math.min(13,W*0.017),align:'center'});

  if(f===0){
    // Frame 0: Show rover stuck
    elems.push({id:'rover',type:'custom',x:cx,y:cy-H*0.05,w:60,h:60,alpha:1,draw:function(a){
      ctx.globalAlpha=a;drawRoverIcon(cx,cy-H*0.05,40,true);
    }});
    // Failure indicator
    elems.push({id:'failBox',type:'custom',x:cx-60,y:cy+H*0.1,w:120,h:36,alpha:1,draw:function(a){
      ctx.globalAlpha=a;drawGlowBox(cx-60,cy+H*0.1,120,36,COL.fail,16);
      drawLabelPrimitive(t('failureLabel'),cx,cy+H*0.1+18,'#ff5f1f',14,'center');
    }});
    // Faded layer boxes (preview)
    for(var i=0;i<4;i++){
      var lx=startX+i*(bw+gap);
      (function(idx,lxx){
        elems.push({id:'layer'+idx,type:'custom',x:lxx,y:layerY,w:bw,h:bh,alpha:0.2,draw:function(a){
          ctx.globalAlpha=a;drawBox(lxx,layerY,bw,bh,layerColors[idx]+'44',COL.glass);
          var lnames=['layerData','layerModel','layerCost','layerInterface'];
          drawLabelPrimitive(t(lnames[idx]),lxx+bw/2,layerY+bh/2,layerColors[idx]+'66',11,'center');
        }});
      })(i,lx);
    }
  }
  else if(f===1){
    // Frame 1: Classify - rover shrinks up, 4 layer boxes light up
    elems.push({id:'rover',type:'custom',x:cx,y:H*0.25,w:40,h:40,alpha:1,draw:function(a){
      ctx.globalAlpha=a;drawRoverIcon(cx,H*0.25,25,true);
    }});
    // Question marks leading to layers
    for(var i=0;i<4;i++){
      var lx=startX+i*(bw+gap);
      (function(idx,lxx){
        elems.push({id:'arrow'+idx,type:'arrow',x1:cx,y1:H*0.32,x2:lxx+bw/2,y2:layerY-8,color:layerColors[idx]+'88'});
        elems.push({id:'layer'+idx,type:'custom',x:lxx,y:layerY,w:bw,h:bh,alpha:1,draw:function(a){
          ctx.globalAlpha=a;drawGlowBox(lxx,layerY,bw,bh,layerColors[idx],10);
          var lnames=['layerData','layerModel','layerCost','layerInterface'];
          drawLabelPrimitive(t(lnames[idx]),lxx+bw/2,layerY+bh/2,layerColors[idx],12,'center');
        }});
      })(i,lx);
    }
    // "?" icons
    elems.push({id:'qmark',type:'label',text:'?  ?  ?  ?',x:cx,y:cy-H*0.02,color:'#ffb59c',size:20,align:'center'});
  }
  else if(f===2){
    // Frame 2: Trace root causes - each layer gets a root cause label
    elems.push({id:'rover',type:'custom',x:cx,y:H*0.2,w:30,h:30,alpha:0.6,draw:function(a){
      ctx.globalAlpha=a;drawRoverIcon(cx,H*0.2,20,true);
    }});
    var rcKeys=['rcData','rcModel','rcCost','rcInterface'];
    for(var i=0;i<4;i++){
      var lx=startX+i*(bw+gap);
      (function(idx,lxx){
        elems.push({id:'arrow'+idx,type:'arrow',x1:cx,y1:H*0.27,x2:lxx+bw/2,y2:layerY-8,color:layerColors[idx]});
        elems.push({id:'layer'+idx,type:'custom',x:lxx,y:layerY,w:bw,h:bh,alpha:1,draw:function(a){
          ctx.globalAlpha=a;drawGlowBox(lxx,layerY,bw,bh,layerColors[idx],14);
          var lnames=['layerData','layerModel','layerCost','layerInterface'];
          drawLabelPrimitive(t(lnames[idx]),lxx+bw/2,layerY+14,layerColors[idx],11,'center');
          drawTextPrimitive(t(rcKeys[idx]),lxx+bw/2,layerY+bh-14,'#e5e2e1',Math.min(10,bw*0.08),'center',bw-8);
        }});
      })(i,lx);
    }
  }
  else if(f===3){
    // Frame 3: Correct - each layer gets fix + verification
    elems.push({id:'rover',type:'custom',x:cx,y:H*0.18,w:25,h:25,alpha:0.4,draw:function(a){
      ctx.globalAlpha=a;drawRoverIcon(cx,H*0.18,18,true);
    }});
    var fixKeys=['fixData','fixModel','fixCost','fixInterface'];
    var verKeys=['verifyData','verifyModel','verifyCost','verifyInterface'];
    var layerYUp=cy-H*0.02;
    var fixY=layerYUp+bh+8;
    for(var i=0;i<4;i++){
      var lx=startX+i*(bw+gap);
      (function(idx,lxx){
        elems.push({id:'layer'+idx,type:'custom',x:lxx,y:layerYUp,w:bw,h:bh,alpha:1,draw:function(a){
          ctx.globalAlpha=a;drawGlowBox(lxx,layerYUp,bw,bh,layerColors[idx],14);
          var lnames=['layerData','layerModel','layerCost','layerInterface'];
          drawLabelPrimitive(t(lnames[idx]),lxx+bw/2,layerYUp+bh/2,layerColors[idx],11,'center');
        }});
        // Fix box
        elems.push({id:'fix'+idx,type:'custom',x:lxx,y:fixY,w:bw,h:bh*0.7,alpha:1,draw:function(a){
          ctx.globalAlpha=a;drawBox(lxx,fixY,bw,bh*0.7,COL.success+'88',COL.glass);
          drawTextPrimitive(t(fixKeys[idx]),lxx+bw/2,fixY+bh*0.2,'#10b981',Math.min(10,bw*0.08),'center',bw-6);
          drawTextPrimitive(t(verKeys[idx]),lxx+bw/2,fixY+bh*0.5,'#8a8886',Math.min(9,bw*0.07),'center',bw-6);
        }});
        // Arrow from layer to fix
        elems.push({id:'fixArr'+idx,type:'arrow',x1:lxx+bw/2,y1:layerYUp+bh,x2:lxx+bw/2,y2:fixY,color:COL.success+'88'});
      })(i,lx);
    }
  }
  else if(f===4){
    // Frame 4: Closed loop - circular flow
    var loopCX=cx,loopCY=cy+H*0.02;
    var loopR=Math.min(W,H)*0.22;
    // Draw circular loop
    elems.push({id:'loop',type:'custom',x:loopCX,y:loopCY,w:loopR*2,h:loopR*2,alpha:1,draw:function(a){
      ctx.globalAlpha=a;
      ctx.save();
      // Circular path with glow
      ctx.strokeStyle='#ffb59c44';ctx.lineWidth=3;ctx.shadowColor='#ffb59c';ctx.shadowBlur=12;
      ctx.beginPath();ctx.arc(loopCX,loopCY,loopR,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
      // 5 nodes around the circle
      var labels=['failureLabel','classifyLabel','traceLabel','correctLabel','verifyLabel'];
      var nodeColors=[COL.fail,'#ffb59c',COL.model,COL.success,'#00daf3'];
      for(var i=0;i<5;i++){
        var angle=-Math.PI/2+i*(Math.PI*2/5);
        var nx=loopCX+Math.cos(angle)*loopR;
        var ny=loopCY+Math.sin(angle)*loopR;
        var nr=Math.min(28,loopR*0.22);
        // Node circle
        ctx.beginPath();ctx.arc(nx,ny,nr,0,Math.PI*2);
        ctx.fillStyle=nodeColors[i]+'33';ctx.fill();
        ctx.strokeStyle=nodeColors[i];ctx.lineWidth=2;ctx.stroke();
        drawLabelPrimitive(t(labels[i]),nx,ny,nodeColors[i],Math.min(10,nr*0.6),'center');
        // Arrow to next node
        if(i<4){
          var nextAngle=-Math.PI/2+(i+1)*(Math.PI*2/5);
          var midAngle=(angle+nextAngle)/2;
          var ax=loopCX+Math.cos(midAngle)*(loopR+12);
          var ay=loopCY+Math.sin(midAngle)*(loopR+12);
          // small directional indicator
          ctx.fillStyle='#ffb59c88';ctx.beginPath();
          ctx.moveTo(ax,ay);
          ctx.lineTo(ax-5*Math.cos(midAngle-0.5),ay-5*Math.sin(midAngle-0.5));
          ctx.lineTo(ax-5*Math.cos(midAngle+0.5),ay-5*Math.sin(midAngle+0.5));
          ctx.closePath();ctx.fill();
        }
      }
      // Center label
      drawLabelPrimitive(t('closedLabel'),loopCX,loopCY,'#ffb59c',Math.min(14,loopR*0.14),'center');
      ctx.restore();
    }});
    // Re-run arrow back to failure
    elems.push({id:'rerunLabel',type:'label',text:t('rerunLabel'),x:cx,y:cy+loopR+30,color:'#10b981',size:12,align:'center'});
    // Rover recovered
    elems.push({id:'rover',type:'custom',x:cx+loopR+40,y:H*0.2,w:30,h:30,alpha:0.8,draw:function(a){
      ctx.globalAlpha=a;drawRoverIcon(cx+loopR+40,H*0.2,22,false);
    }});
  }

  return elems;
}

function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  switch(el.type){
    case 'label':drawLabelPrimitive(el.text,el.x,el.y,el.color,el.size,el.align);break;
    case 'text':drawTextPrimitive(el.text,el.x,el.y,el.color,el.size,el.align);break;
    case 'arrow':drawArrowPrimitive(el.x1,el.y1,el.x2,el.y2,el.color);break;
    case 'custom':if(el.draw)el.draw(el.alpha);break;
    case 'box':drawBox(el.x,el.y,el.w,el.h,el.borderColor,el.fillColor);break;
  }
  ctx.restore();
}

function drawFrame(f){
  drawBg();
  var elems=getFrameElements(f);
  elems.forEach(function(el){drawElement(el);});
}

function transitionTo(newFrame){
  if(newFrame<0)newFrame=0;
  if(newFrame>=totalFrames)newFrame=totalFrames-1;
  if(newFrame===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return;}
  if(transitioning)return;
  var oldElems=getFrameElements(currentFrame);
  var newElems=getFrameElements(newFrame);
  var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e;});
  var newMap={};newElems.forEach(function(e){newMap[e.id]=e;});
  currentFrame=newFrame;
  updateHUD(newFrame);
  transitioning=true;
  var startTime=null;var duration=500;
  function step(timestamp){
    if(!startTime)startTime=timestamp;
    var raw=Math.min((timestamp-startTime)/duration,1);
    var p=easeInOut(raw);
    drawBg();
    oldElems.forEach(function(oe){if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}));});
    newElems.forEach(function(ne){
      var oe=oldMap[ne.id];
      if(oe){
        var merged=merge(ne,{x:lerp(oe.x||0,ne.x||0,p),y:lerp(oe.y||0,ne.y||0,p),w:lerp(oe.w||0,ne.w||0,p),h:lerp(oe.h||0,ne.h||0,p),alpha:1});
        if(ne.type==='arrow'&&oe.type==='arrow'){merged.x1=lerp(oe.x1,ne.x1,p);merged.y1=lerp(oe.y1,ne.y1,p);merged.x2=lerp(oe.x2,ne.x2,p);merged.y2=lerp(oe.y2,ne.y2,p);}
        if((ne.type==='label'||ne.type==='text')&&oe.text!==ne.text){drawElement(merge(oe,{alpha:1-p}));drawElement(merge(ne,{alpha:p}));}
        else{drawElement(merged);}
      }else{drawElement(merge(ne,{alpha:p}));}
    });
    if(raw<1){requestAnimationFrame(step);}else{transitioning=false;}
  }
  requestAnimationFrame(step);
}

function updateHUD(f){
  var phaseKeys=['f'+f+'Phase','f'+f+'Layers','f'+f+'Actions','f'+f+'Loop'];
  var hudLabels=['hudPhase','hudLayers','hudActions','hudLoop'];
  for(var i=0;i<4;i++){
    document.getElementById('hudL'+i).textContent=t(hudLabels[i]);
    document.getElementById('hudV'+i).textContent=t(phaseKeys[i]);
  }
  document.getElementById('frameInfo').textContent=t('frame')+(f+1)+t('frameOf')+totalFrames;
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('btnPrev').textContent=t('prev');
  document.getElementById('btnPlay').textContent=playing?t('pause'):t('play');
  document.getElementById('btnNext').textContent=t('next');
  document.getElementById('guideTitle').textContent=t('guide');
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var listEl=document.getElementById('guideList');
  listEl.innerHTML='';
  ['guideObs1','guideObs2','guideObs3'].forEach(function(k){
    var li=document.createElement('li');li.textContent=t(k);listEl.appendChild(li);
  });
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  updateHUD(currentFrame);
  drawFrame(currentFrame);
}

// Events
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});

document.getElementById('btnPrev').addEventListener('click',function(){
  if(playing)stopPlay();
  transitionTo(currentFrame-1);
});
document.getElementById('btnNext').addEventListener('click',function(){
  if(playing)stopPlay();
  transitionTo(currentFrame+1);
});
document.getElementById('btnPlay').addEventListener('click',function(){
  if(playing){stopPlay();}
  else{startPlay();}
});

function startPlay(){
  playing=true;
  document.getElementById('btnPlay').textContent=t('pause');
  if(currentFrame>=totalFrames-1)currentFrame=-1;
  function tick(){
    if(!playing)return;
    if(currentFrame<totalFrames-1){
      transitionTo(currentFrame+1);
      playTimer=setTimeout(tick,2000);
    }else{
      stopPlay();
    }
  }
  tick();
}
function stopPlay(){
  playing=false;
  if(playTimer){clearTimeout(playTimer);playTimer=null;}
  document.getElementById('btnPlay').textContent=t('play');
}

// Guide toggle
document.getElementById('guideToggle').addEventListener('click',function(){
  var panel=document.getElementById('guidePanel');
  var content=document.getElementById('guideContent');
  var arrow=document.getElementById('guideArrow');
  if(content.style.maxHeight==='0px'){content.style.maxHeight='300px';arrow.textContent='-';}
  else{content.style.maxHeight='0px';arrow.textContent='+';}
});

// Init
window.addEventListener('resize',resize);
resize();
setTimeout(resize,200);
setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});
refreshI18N();

})();
</script>
