<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<title>Balloon Rocket Contest</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:#05070a;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;background:#070a14;border-bottom:1px solid rgba(255,176,0,0.15);}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,17px);font-weight:700;color:#ffb000;letter-spacing:-0.02em;}
.header .sub{font-size:10px;color:#8e90a6;letter-spacing:0.08em;text-transform:uppercase;}
.header .right{display:flex;align-items:center;gap:14px;}
.header .stat{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8e90a6;letter-spacing:0.06em;}
.header .stat b{display:block;font-size:15px;color:#ffb000;font-weight:700;}
.header .progress{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8e90a6;letter-spacing:0.08em;}
.header .progress .count{color:#ffb000;font-size:14px;font-weight:700;}
.lang-btn{font-family:'Space Grotesk',sans-serif;font-size:10px;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,176,0,0.3);background:rgba(17,20,37,0.85);color:#ffb59c;letter-spacing:1px;}
.lang-btn:hover{border-color:#ffb000;color:#ffb000;}
.stage-wrap{flex:1;min-height:0;display:flex;gap:6px;padding:6px;}
.panel-box{background:rgba(17,20,37,0.85);border:1px solid rgba(142,144,166,0.15);display:flex;flex-direction:column;overflow:hidden;}
.panel-box .panel-title{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.14em;color:#ffb000;padding:6px 10px 4px;text-transform:uppercase;border-bottom:1px solid rgba(255,176,0,0.18);}
.panel-box .panel-body{flex:1;min-height:0;display:flex;flex-direction:column;padding:8px 10px;gap:8px;}
.left-panel{width:220px;flex-shrink:0;}
.right-panel{width:280px;flex-shrink:0;}
.center-panel{flex:1;min-width:0;display:flex;flex-direction:column;}
.center-panel .panel-body{padding:0;position:relative;display:flex;flex-direction:column;flex:1;min-height:0;}
#flightCanvas{flex:1;min-height:0;width:100%;display:block;}
canvas{display:block;}
.balloon-stage{display:flex;align-items:center;justify-content:center;height:130px;background:rgba(3,4,8,0.6);border:1px solid rgba(142,144,166,0.1);user-select:none;cursor:pointer;position:relative;}
.balloon-stage .tag{position:absolute;top:4px;left:6px;font-family:'Space Grotesk';font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:#8e90a6;}
.balloon-stage.blowing{background:rgba(255,176,0,0.06);border-color:rgba(255,176,0,0.3);}
.blow-hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-family:'Space Grotesk';font-size:9px;letter-spacing:0.1em;color:#8e90a6;text-transform:uppercase;pointer-events:none;}
.meter-row{display:flex;flex-direction:column;gap:3px;}
.meter-label{display:flex;justify-content:space-between;font-family:'Space Grotesk';font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#8e90a6;}
.meter-label .val{color:#ffb000;font-weight:700;}
.meter-bar{height:8px;background:rgba(255,255,255,0.07);position:relative;overflow:hidden;}
.meter-fill{height:100%;width:0%;background:linear-gradient(90deg,#50ffb0,#ffb000 60%,#ff716c);transition:width .08s linear;}
.meter-bar.danger .meter-fill{background:#ff716c;}
.warning{font-size:10px;color:#ff716c;font-family:'Space Grotesk';letter-spacing:0.1em;text-transform:uppercase;animation:blink 0.6s infinite;min-height:12px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.straw-control{display:flex;flex-direction:column;gap:4px;}
.straw-label{font-family:'Space Grotesk';font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#8e90a6;}
.straw-buttons{display:flex;gap:4px;}
.straw-btn{flex:1;background:rgba(7,10,20,0.85);border:1px solid rgba(142,144,166,0.25);color:#e2e2e9;padding:6px 4px;font-family:'Space Grotesk';font-size:10px;cursor:pointer;letter-spacing:0.04em;transition:border-color .1s, color .1s;}
.straw-btn:hover{border-color:#ffb000;}
.straw-btn.selected{border-color:#50ffb0;color:#50ffb0;background:rgba(80,255,176,0.08);}
.straw-btn .hint{display:block;font-size:8px;color:#8e90a6;margin-top:2px;letter-spacing:0.06em;}
.straw-btn.selected .hint{color:#8e90a6;}
.hud-mini{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:2px;}
.hud-chip{background:rgba(7,10,20,0.75);padding:4px 6px;border:1px solid rgba(142,144,166,0.15);}
.hud-chip .hl{font-family:'Space Grotesk';font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:#8e90a6;}
.hud-chip .hv{font-family:'Space Grotesk';font-size:13px;color:#ffb000;font-weight:700;margin-top:1px;}
.guide-panel{position:absolute;top:8px;right:8px;background:rgba(17,20,37,0.94);backdrop-filter:blur(8px);border:1px solid rgba(255,176,0,0.3);z-index:10;font-size:10px;color:#e2e2e9;max-width:200px;}
.guide-panel .guide-head{font-family:'Space Grotesk';font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#ffb000;padding:5px 10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.guide-panel .guide-head .t{display:inline-block;transition:transform .2s;}
.guide-panel.collapsed .guide-head .t{transform:rotate(-90deg);}
.guide-panel ul{list-style:none;padding:6px 10px 8px;line-height:1.6;display:block;}
.guide-panel.collapsed ul{display:none;}
.guide-panel li{font-size:10px;color:#e2e2e9;padding:1px 0;}
.guide-panel li b{color:#ffb000;}
.data-table{width:100%;border-collapse:collapse;font-size:10px;font-family:'Space Grotesk',sans-serif;}
.data-table th{background:rgba(255,176,0,0.12);color:#ffb000;padding:5px 3px;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;text-align:center;font-weight:700;border-bottom:1px solid rgba(255,176,0,0.3);}
.data-table td{padding:5px 3px;border-bottom:1px solid rgba(142,144,166,0.1);text-align:center;color:#e2e2e9;}
.data-table tr.empty td{color:#3a3d4f;}
.data-table tr.new td{animation:flashNew 0.8s ease-out;}
@keyframes flashNew{0%{background:rgba(255,176,0,0.3);}100%{background:transparent;}}
.data-table td.note{font-size:9px;color:#8e90a6;}
.data-table td.note.ok{color:#50ffb0;}
.data-table td.note.warn{color:#ffb000;}
.data-table td.note.bad{color:#ff716c;}
.launch-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:10px 14px;border:none;cursor:pointer;color:#05070a;background:linear-gradient(135deg,#ffb000,#ff5f1f);transition:transform 0.1s, opacity 0.15s;margin-top:2px;}
.launch-btn:hover:not(:disabled){transform:scale(1.02);}
.launch-btn:disabled{opacity:0.4;cursor:not-allowed;}
.reset-btn{font-family:'Space Grotesk',sans-serif;font-size:9px;padding:5px 9px;background:transparent;border:1px solid rgba(142,144,166,0.3);color:#8e90a6;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.reset-btn:hover{color:#ff716c;border-color:#ff716c;}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(3,4,8,0.95);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.overlay .overlay-title{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#ffb000;letter-spacing:0.06em;margin-bottom:10px;font-weight:700;text-align:center;}
.overlay .overlay-sub{font-size:11px;color:#8e90a6;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;}
.overlay .chart-box{background:rgba(17,20,37,0.9);border:1px solid rgba(255,176,0,0.3);padding:12px;width:min(90%,520px);}
.overlay .caption{font-size:12px;color:#e2e2e9;line-height:1.7;margin-top:14px;max-width:520px;text-align:center;}
.overlay .caption b{color:#ffb000;}
.overlay .done-btn{margin-top:18px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:10px 24px;border:none;cursor:pointer;color:#05070a;background:linear-gradient(135deg,#50ffb0,#00daf3);transition:transform 0.1s;}
.overlay .done-btn:hover{transform:scale(1.04);}
.toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(17,20,37,0.95);border:1px solid #ffb000;padding:8px 16px;font-size:11px;color:#ffb000;letter-spacing:0.05em;z-index:25;display:none;font-family:'Space Grotesk';}
.toast.show{display:block;animation:toastIn 0.3s ease-out;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}
@media (max-width: 920px){
  .left-panel{width:180px;}
  .right-panel{width:230px;}
  .data-table{font-size:9px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <header class="header">
    <div>
      <h1 id="title"></h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <div class="right">
      <div class="progress" id="progressLabel"></div>
      <div class="stat"><span id="bestLabel"></span><b id="bestVal">0.00 m</b></div>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </header>
  <div class="stage-wrap">
    <!-- LEFT CONTROL PANEL -->
    <aside class="panel-box left-panel">
      <div class="panel-title" id="leftTitle"></div>
      <div class="panel-body">
        <div class="balloon-stage" id="balloonStage">
          <span class="tag" id="balloonTag"></span>
          <svg id="balloonSvg" width="100%" height="100%" viewBox="0 0 200 130" preserveAspectRatio="xMidYMid meet">
            <defs>
              <radialGradient id="balloonGrad" cx="0.35" cy="0.35">
                <stop offset="0%" stop-color="#ffc96b"/>
                <stop offset="60%" stop-color="#ff9d3d"/>
                <stop offset="100%" stop-color="#d45a1e"/>
              </radialGradient>
            </defs>
            <g id="balloonGroup" transform="translate(100,70)">
              <ellipse id="balloonShape" cx="0" cy="0" rx="18" ry="22" fill="url(#balloonGrad)" opacity="0.92"/>
              <ellipse cx="-6" cy="-8" rx="4" ry="6" fill="#ffe0a6" opacity="0.45"/>
              <path id="balloonNeck" d="M -4 21 L -3 32 L 3 32 L 4 21 Z" fill="#aa4a1e"/>
            </g>
          </svg>
          <span class="blow-hint" id="blowHint"></span>
        </div>
        <div class="meter-row">
          <div class="meter-label"><span id="pressureLabel"></span><span class="val"><span id="pressureVal">0</span>%</span></div>
          <div class="meter-bar" id="pressureBar"><div class="meter-fill" id="pressureFill"></div></div>
        </div>
        <div class="warning" id="warningText">&nbsp;</div>
        <div class="straw-control">
          <div class="straw-label" id="strawLabel"></div>
          <div class="straw-buttons">
            <button class="straw-btn" data-straw="5"><span id="straw5Label">5cm</span><span class="hint" id="straw5Hint"></span></button>
            <button class="straw-btn selected" data-straw="10"><span id="straw10Label">10cm</span><span class="hint" id="straw10Hint"></span></button>
            <button class="straw-btn" data-straw="15"><span id="straw15Label">15cm</span><span class="hint" id="straw15Hint"></span></button>
          </div>
        </div>
        <div class="hud-mini">
          <div class="hud-chip"><div class="hl" id="hudPressureLabel"></div><div class="hv"><span id="hudPressureVal">0</span>%</div></div>
          <div class="hud-chip"><div class="hl" id="hudStrawLabel"></div><div class="hv"><span id="hudStrawVal">10</span>cm</div></div>
        </div>
        <button class="launch-btn" id="launchBtn" disabled></button>
        <button class="reset-btn" id="resetBtn"></button>
      </div>
    </aside>

    <!-- CENTER: FLIGHT CANVAS -->
    <section class="panel-box center-panel">
      <div class="panel-title" id="centerTitle"></div>
      <div class="panel-body">
        <canvas id="flightCanvas"></canvas>
        <div class="guide-panel" id="guidePanel">
          <div class="guide-head" id="guideHead"><span id="guideTitle"></span><span class="t">v</span></div>
          <ul>
            <li id="guide1"></li>
            <li id="guide2"></li>
            <li id="guide3"></li>
            <li id="guide4"></li>
          </ul>
        </div>
        <div class="toast" id="toast"></div>
        <div class="overlay" id="overlay">
          <div class="overlay-title" id="overlayTitle"></div>
          <div class="overlay-sub" id="overlaySub"></div>
          <div class="chart-box">
            <canvas id="chartCanvas" width="520" height="240"></canvas>
          </div>
          <div class="caption" id="overlayCaption"></div>
          <button class="done-btn" id="doneBtn"></button>
        </div>
      </div>
    </section>

    <!-- RIGHT DATA TABLE -->
    <aside class="panel-box right-panel">
      <div class="panel-title" id="rightTitle"></div>
      <div class="panel-body">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th>#</th>
              <th id="colInflation"></th>
              <th id="colStraw"></th>
              <th id="colDist"></th>
              <th id="colNote"></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div style="flex:1;"></div>
        <div style="font-size:9px;color:#8e90a6;font-family:'Space Grotesk';letter-spacing:0.06em;line-height:1.6;padding-top:4px;border-top:1px solid rgba(142,144,166,0.15);margin-top:6px;" id="tableFooter"></div>
      </div>
    </aside>
  </div>
</div>

<script>
'use strict';

var I18N = {
  cn: {
    title: '气球火箭大赛',
    subtitle: 'Launch 5 · Discover the law',
    progressLabel: '发射次数',
    bestLabel: '最远纪录',
    leftTitle: '控制台',
    centerTitle: '飞行轨道',
    rightTitle: '数据记录表',
    pressureLabel: '压强',
    strawLabel: '吸管长度',
    straw5Hint: '短·不稳',
    straw10Hint: '标准',
    straw15Hint: '长·阻力大',
    hudPressureLabel: '当前压强',
    hudStrawLabel: '吸管长度',
    launchBtn: '松手发射',
    launchBtnHold: '按住空格吹气',
    launchBtnFlying: '飞行中…',
    resetBtn: '重置',
    warningDanger: '小心爆炸!',
    warningClose: '压强偏高',
    balloonTag: '气球',
    blowHintIdle: '按住鼠标吹气',
    blowHintBlowing: '松开发射',
    guideTitle: '怎么玩',
    guide1: '1. <b>按住吹气区</b>吹气球',
    guide2: '2. <b>松开</b>发射',
    guide3: '3. 发射 <b>5 次</b>记录数据',
    guide4: '4. 看看你能不能找到规律',
    colInflation: '吹气量',
    colStraw: '吸管',
    colDist: '距离',
    colNote: '备注',
    notePerfect: '完美发射',
    noteLeak: '漏气',
    noteGreat: '刚刚好',
    noteOver: '吹太饱了',
    noteWeak: '吹太少',
    noteUnstable: '不稳定',
    noteDrag: '阻力大',
    tableFooter: '完成 5 次发射后可看规律',
    overlayTitle: '你发现规律了!',
    overlaySub: 'You found the pattern',
    overlayCaption: '你发现了：<b>吹得越饱，飞得越远</b>——但吹得太猛反而会漏气。<br>More inflation = farther flight — but over-inflation causes leaks.',
    doneBtn: '完成',
    toastLaunched: '发射成功',
    toastLeak: '早泄气了！',
    toastTooLow: '压强太低飞不动',
    arrowBalloon: '气球→空气',
    arrowAir: '空气→气球',
    bestHint: '打破纪录！'
  },
  en: {
    title: 'Balloon Rocket Contest',
    subtitle: 'Launch 5 · Discover the law',
    progressLabel: 'Launches',
    bestLabel: 'Best Record',
    leftTitle: 'Control Console',
    centerTitle: 'Flight Track',
    rightTitle: 'Data Log',
    pressureLabel: 'Pressure',
    strawLabel: 'Straw Length',
    straw5Hint: 'short·unstable',
    straw10Hint: 'standard',
    straw15Hint: 'long·drag',
    hudPressureLabel: 'Current Pressure',
    hudStrawLabel: 'Straw Length',
    launchBtn: 'Release to Launch',
    launchBtnHold: 'Hold to Inflate',
    launchBtnFlying: 'Flying…',
    resetBtn: 'Reset',
    warningDanger: 'May Pop!',
    warningClose: 'High Pressure',
    balloonTag: 'Balloon',
    blowHintIdle: 'Hold mouse to inflate',
    blowHintBlowing: 'Release to launch',
    guideTitle: 'How to play',
    guide1: '1. <b>Hold on balloon</b> to inflate',
    guide2: '2. <b>Release</b> to launch',
    guide3: '3. Launch <b>5 times</b>',
    guide4: '4. Can you find the pattern?',
    colInflation: 'Inflate',
    colStraw: 'Straw',
    colDist: 'Dist.',
    colNote: 'Note',
    notePerfect: 'perfect',
    noteLeak: 'leaked',
    noteGreat: 'just right',
    noteOver: 'overblown',
    noteWeak: 'weak blow',
    noteUnstable: 'unstable',
    noteDrag: 'drag high',
    tableFooter: 'After 5 launches, see the law',
    overlayTitle: 'You found the law!',
    overlaySub: '你发现规律了',
    overlayCaption: 'You discovered: <b>More inflation = farther flight</b> — but over-inflation causes leaks.<br>吹得越饱，飞得越远——但吹得太猛反而会漏气。',
    doneBtn: 'Done',
    toastLaunched: 'Launched!',
    toastLeak: 'Premature leak!',
    toastTooLow: 'Too weak to fly',
    arrowBalloon: 'balloon→air',
    arrowAir: 'air→balloon',
    bestHint: 'NEW RECORD!'
  }
};

var LANG = 'cn';
function T(key) { return (I18N[LANG] && I18N[LANG][key]) || (I18N.en[key] || key); }

// ============ State ============
var state = {
  launches: [],        // array of {idx, pressure, straw, dist, note, noteKey}
  pressure: 0,         // 0-100
  blowing: false,
  blowStart: 0,
  straw: 10,
  flying: false,
  best: 0,
  flight: null,        // {start, duration, dist, leaked, pressure, straw}
  animationRunning: true
};

// ============ i18n apply ============
function applyI18N() {
  document.getElementById('title').textContent = T('title');
  document.getElementById('subtitle').textContent = T('subtitle');
  updateProgressLabel();
  document.getElementById('bestLabel').textContent = T('bestLabel') + ' ';
  document.getElementById('leftTitle').textContent = T('leftTitle');
  document.getElementById('centerTitle').textContent = T('centerTitle');
  document.getElementById('rightTitle').textContent = T('rightTitle');
  document.getElementById('pressureLabel').textContent = T('pressureLabel');
  document.getElementById('strawLabel').textContent = T('strawLabel');
  document.getElementById('straw5Hint').textContent = T('straw5Hint');
  document.getElementById('straw10Hint').textContent = T('straw10Hint');
  document.getElementById('straw15Hint').textContent = T('straw15Hint');
  document.getElementById('hudPressureLabel').textContent = T('hudPressureLabel');
  document.getElementById('hudStrawLabel').textContent = T('hudStrawLabel');
  document.getElementById('resetBtn').textContent = T('resetBtn');
  document.getElementById('balloonTag').textContent = T('balloonTag');
  document.getElementById('guideTitle').textContent = T('guideTitle');
  document.getElementById('guide1').innerHTML = T('guide1');
  document.getElementById('guide2').innerHTML = T('guide2');
  document.getElementById('guide3').innerHTML = T('guide3');
  document.getElementById('guide4').innerHTML = T('guide4');
  document.getElementById('colInflation').textContent = T('colInflation');
  document.getElementById('colStraw').textContent = T('colStraw');
  document.getElementById('colDist').textContent = T('colDist');
  document.getElementById('colNote').textContent = T('colNote');
  document.getElementById('tableFooter').textContent = T('tableFooter');
  document.getElementById('langBtn').textContent = LANG === 'cn' ? 'EN' : '中';
  updateLaunchBtnLabel();
  updateBlowHint();
  renderTable();
  updateBest();
}

function updateProgressLabel() {
  var n = state.launches.length;
  document.getElementById('progressLabel').innerHTML =
    T('progressLabel') + ' <span class="count">' + n + '/5</span>';
}

function updateBest() {
  var v = state.best > 0 ? state.best.toFixed(2) + ' m' : '0.00 m';
  document.getElementById('bestVal').textContent = v;
}

function updateLaunchBtnLabel() {
  var btn = document.getElementById('launchBtn');
  if (state.flying) {
    btn.textContent = T('launchBtnFlying');
    btn.disabled = true;
  } else if (state.pressure > 5) {
    btn.textContent = T('launchBtn');
    btn.disabled = false;
  } else {
    btn.textContent = T('launchBtnHold');
    btn.disabled = true;
  }
}

function updateBlowHint() {
  var h = document.getElementById('blowHint');
  if (state.flying) { h.textContent = ''; return; }
  h.textContent = state.blowing ? T('blowHintBlowing') : T('blowHintIdle');
}

// ============ Balloon inflation ============
function setPressure(p) {
  state.pressure = Math.max(0, Math.min(100, p));
  document.getElementById('pressureVal').textContent = Math.round(state.pressure);
  document.getElementById('hudPressureVal').textContent = Math.round(state.pressure);
  var fill = document.getElementById('pressureFill');
  fill.style.width = state.pressure + '%';
  var bar = document.getElementById('pressureBar');
  bar.classList.toggle('danger', state.pressure > 85);

  var w = document.getElementById('warningText');
  if (state.pressure > 85) w.textContent = T('warningDanger');
  else if (state.pressure > 70) w.textContent = T('warningClose');
  else w.innerHTML = '&nbsp;';

  updateBalloonVisual();
  updateLaunchBtnLabel();
}

function updateBalloonVisual() {
  var shape = document.getElementById('balloonShape');
  if (!shape) return;
  var p = state.pressure / 100;
  var rx = 14 + p * 38;
  var ry = 18 + p * 42;
  shape.setAttribute('rx', rx.toFixed(1));
  shape.setAttribute('ry', ry.toFixed(1));
  var group = document.getElementById('balloonGroup');
  var cy = 60 - p * 6;
  group.setAttribute('transform', 'translate(100,' + cy.toFixed(1) + ')');
  var neck = document.getElementById('balloonNeck');
  var neckTop = ry - 2;
  var neckBot = neckTop + 10;
  neck.setAttribute('d', 'M -4 ' + neckTop + ' L -3 ' + neckBot + ' L 3 ' + neckBot + ' L 4 ' + neckTop + ' Z');
  // Tint shifts toward red as pressure high
  if (state.pressure > 85) {
    shape.setAttribute('fill', '#ff716c');
  } else {
    shape.setAttribute('fill', 'url(#balloonGrad)');
  }
}

function startBlowing() {
  if (state.flying) return;
  if (state.launches.length >= 5) return;
  state.blowing = true;
  state.blowStart = performance.now();
  document.getElementById('balloonStage').classList.add('blowing');
  updateBlowHint();
}

function stopBlowing(launch) {
  if (!state.blowing) return;
  state.blowing = false;
  document.getElementById('balloonStage').classList.remove('blowing');
  updateBlowHint();
  if (launch && state.pressure >= 5) {
    doLaunch();
  } else if (launch) {
    // Too weak — deflate slowly
    state.pressure = 0;
    setPressure(0);
  }
}

// ============ Physics ============
function calcDistance(pressurePct, strawLen) {
  var base = 1.5 + (pressurePct / 100) * 3.5;
  var leakPenalty = 1.0;
  var leaked = false;
  if (pressurePct > 85 && Math.random() < 0.3) {
    leakPenalty = 0.55;
    leaked = true;
  }
  var strawMul = 1.0;
  if (strawLen === 5) {
    strawMul = 1.0 + (Math.random() - 0.5) * 0.3;
  } else if (strawLen === 15) {
    strawMul = 0.9;
  }
  var dist = base * leakPenalty * strawMul;
  dist = Math.max(0.3, Math.min(5, dist));
  return { dist: dist, leaked: leaked, strawMul: strawMul };
}

function pickNoteKey(pressurePct, strawLen, leaked, strawMul) {
  if (leaked) return 'noteLeak';
  if (pressurePct > 85) return 'noteOver';
  if (pressurePct < 25) return 'noteWeak';
  if (strawLen === 5 && Math.abs(strawMul - 1.0) > 0.08) return 'noteUnstable';
  if (pressurePct >= 70 && pressurePct <= 85) return 'notePerfect';
  if (strawLen === 15) return 'noteDrag';
  if (pressurePct >= 50) return 'noteGreat';
  return 'noteGreat';
}

// ============ Launch animation ============
function doLaunch() {
  if (state.flying) return;
  state.flying = true;
  var result = calcDistance(state.pressure, state.straw);
  state.flight = {
    start: performance.now(),
    duration: result.leaked ? 900 : 1500,
    dist: result.dist,
    maxDist: 5,
    leaked: result.leaked,
    pressure: state.pressure,
    straw: state.straw,
    strawMul: result.strawMul,
    flyX: 0
  };
  updateLaunchBtnLabel();
  showToast(result.leaked ? T('toastLeak') : T('toastLaunched'));
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1200);
}

function finishLaunch() {
  var f = state.flight;
  if (!f) return;
  var noteKey = pickNoteKey(f.pressure, f.straw, f.leaked, f.strawMul);
  var entry = {
    idx: state.launches.length + 1,
    pressure: Math.round(f.pressure),
    straw: f.straw,
    dist: f.dist,
    noteKey: noteKey
  };
  state.launches.push(entry);
  var isBest = f.dist > state.best;
  if (isBest) {
    state.best = f.dist;
    updateBest();
    if (state.launches.length > 1) showToast(T('bestHint'));
  }
  state.flying = false;
  state.pressure = 0;
  setPressure(0);
  state.flight = null;
  updateProgressLabel();
  renderTable();
  updateLaunchBtnLabel();
  if (state.launches.length >= 5) {
    setTimeout(showOverlay, 700);
  }
}

// ============ Data table ============
function renderTable() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var e = state.launches[i];
    var tr = document.createElement('tr');
    if (!e) {
      tr.className = 'empty';
      tr.innerHTML = '<td>' + (i+1) + '</td><td>—</td><td>—</td><td>—</td><td>—</td>';
    } else {
      var noteText = T(e.noteKey);
      var noteClass = 'note';
      if (e.noteKey === 'notePerfect' || e.noteKey === 'noteGreat') noteClass += ' ok';
      else if (e.noteKey === 'noteLeak' || e.noteKey === 'noteWeak') noteClass += ' bad';
      else noteClass += ' warn';
      var newClass = (i === state.launches.length - 1) ? 'new' : '';
      tr.className = newClass;
      tr.innerHTML = '<td>' + e.idx + '</td>' +
                     '<td>' + e.pressure + '%</td>' +
                     '<td>' + e.straw + 'cm</td>' +
                     '<td><b style="color:#ffb000">' + e.dist.toFixed(2) + '</b>m</td>' +
                     '<td class="' + noteClass + '">' + noteText + '</td>';
    }
    tbody.appendChild(tr);
  }
}

// ============ Flight Canvas ============
var cv = document.getElementById('flightCanvas');
var ctx = cv.getContext('2d');
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var CW = 800, CH = 400;

function fit() {
  var rect = cv.getBoundingClientRect();
  CW = Math.max(200, rect.width);
  CH = Math.max(200, rect.height);
  cv.width = CW * DPR;
  cv.height = CH * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);

function drawFlightTrack() {
  ctx.clearRect(0, 0, CW, CH);

  // Background subtle vertical gradient
  var grad = ctx.createLinearGradient(0, 0, 0, CH);
  grad.addColorStop(0, 'rgba(8,12,24,0.2)');
  grad.addColorStop(1, 'rgba(3,4,8,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CW, CH);

  // Fishing line coord system
  var pad = 40;
  var lineY = CH * 0.58;
  var xStart = pad;
  var xEnd = CW - pad;
  var totalDistMeters = 5;

  // Distance tick marks & line
  ctx.strokeStyle = 'rgba(255,176,0,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(xStart, lineY);
  ctx.lineTo(xEnd, lineY);
  ctx.stroke();

  // Dashed trajectory shadow line
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = 'rgba(142,144,166,0.25)';
  ctx.beginPath();
  ctx.moveTo(xStart, lineY);
  ctx.lineTo(xEnd, lineY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Tick marks
  ctx.font = '11px "Space Grotesk", sans-serif';
  ctx.fillStyle = '#8e90a6';
  ctx.textAlign = 'center';
  for (var m = 0; m <= totalDistMeters; m++) {
    var x = xStart + (m / totalDistMeters) * (xEnd - xStart);
    ctx.strokeStyle = 'rgba(255,176,0,0.4)';
    ctx.beginPath();
    ctx.moveTo(x, lineY - 6);
    ctx.lineTo(x, lineY + 6);
    ctx.stroke();
    ctx.fillText(m + 'm', x, lineY + 22);
  }

  // Label axis
  ctx.fillStyle = 'rgba(142,144,166,0.6)';
  ctx.font = '10px "Space Grotesk", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(LANG === 'cn' ? '钓鱼线 / Fishing line' : 'Fishing Line', xStart, lineY - 14);

  // Previous landings
  ctx.fillStyle = 'rgba(142,144,166,0.5)';
  for (var i = 0; i < state.launches.length; i++) {
    var e = state.launches[i];
    var dx = xStart + (e.dist / totalDistMeters) * (xEnd - xStart);
    ctx.beginPath();
    ctx.arc(dx, lineY + 38, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '9px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(142,144,166,0.6)';
    ctx.fillText('#' + e.idx, dx, lineY + 52);
  }

  // Draw balloon: flying or waiting at start
  var bx, by;
  var flightProg = 0;
  if (state.flight) {
    var elapsed = performance.now() - state.flight.start;
    flightProg = Math.min(1, elapsed / state.flight.duration);
    // ease-out curve for travel
    var eased = 1 - Math.pow(1 - flightProg, 2.3);
    var distRatio = state.flight.dist / totalDistMeters;
    bx = xStart + eased * distRatio * (xEnd - xStart);
    by = lineY;
    state.flight.flyX = bx;
    if (flightProg >= 1) {
      drawLandedBalloon(bx, by);
      drawFinalDistance(bx, by, state.flight.dist);
      finishLaunch();
      requestAnimationFrame(drawFlightTrack);
      return;
    }
    // Balloon shrinks as air escapes
    var sizeRatio = 1 - flightProg * 0.7;
    drawFlyingBalloon(bx, by, state.flight.pressure, sizeRatio, state.flight.leaked, flightProg);
    // Reaction force arrows
    drawReactionArrows(bx, by, sizeRatio);
    // Motion blur trail
    drawTrail(xStart, lineY, bx, by, flightProg);
    // Air puffs behind
    drawAirPuffs(bx, by, flightProg);
  } else {
    bx = xStart + 10;
    by = lineY;
    drawStationaryBalloon(bx, by, state.pressure);
  }

  // Launch counter overlay text (bottom-left)
  ctx.fillStyle = 'rgba(255,176,0,0.85)';
  ctx.font = '11px "Space Grotesk", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('LAUNCH ' + (state.launches.length + (state.flight ? 1 : 0)) + ' / 5',
               12, CH - 14);

  // Continue animation
  if (state.animationRunning) requestAnimationFrame(drawFlightTrack);
}

function drawStationaryBalloon(x, y, pressure) {
  var scale = 0.6 + (pressure / 100) * 0.8;
  drawBalloonShape(x, y, scale, '#ff9d3d', 0);
  // String down to line
  ctx.strokeStyle = 'rgba(142,144,166,0.4)';
  ctx.beginPath();
  ctx.moveTo(x, y - 4);
  ctx.lineTo(x, y);
  ctx.stroke();
}

function drawFlyingBalloon(x, y, pressure, sizeRatio, leaked, prog) {
  var scale = (0.6 + (pressure / 100) * 0.8) * sizeRatio;
  var wobble = Math.sin(prog * 14) * 2;
  var color = leaked && prog > 0.35 ? '#ff716c' : '#ff9d3d';
  drawBalloonShape(x, y + wobble, scale, color, prog * 0.4);
}

function drawLandedBalloon(x, y) {
  drawBalloonShape(x, y, 0.35, '#aa4a1e', 0);
}

function drawBalloonShape(cx, cy, scale, fillColor, squish) {
  var rx = 18 * scale;
  var ry = 22 * scale * (1 - squish * 0.3);
  ctx.save();
  ctx.translate(cx, cy - ry - 6);
  // Main body
  ctx.fillStyle = fillColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.fillStyle = 'rgba(255,224,166,0.4)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.3, -ry * 0.35, rx * 0.25, ry * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Neck
  ctx.fillStyle = '#8a3a12';
  ctx.beginPath();
  ctx.moveTo(-3, ry - 1);
  ctx.lineTo(-2.5, ry + 6);
  ctx.lineTo(2.5, ry + 6);
  ctx.lineTo(3, ry - 1);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawReactionArrows(x, y, sizeRatio) {
  // Arrow back (blue, balloon→air, points LEFT/BACKWARD)
  var ay = y - 22 - 22 * sizeRatio;
  var arrowLen = 44;
  // Blue: balloon pushes air backward
  drawArrow(x - 6, ay, x - 6 - arrowLen, ay, '#00daf3', T('arrowBalloon'));
  // Red: air pushes balloon forward
  drawArrow(x + 6, ay - 16, x + 6 + arrowLen, ay - 16, '#ff716c', T('arrowAir'));
}

function drawArrow(x1, y1, x2, y2, color, label) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // Arrow head
  var angle = Math.atan2(y2 - y1, x2 - x1);
  var hs = 7;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hs * Math.cos(angle - Math.PI / 6), y2 - hs * Math.sin(angle - Math.PI / 6));
  ctx.lineTo(x2 - hs * Math.cos(angle + Math.PI / 6), y2 - hs * Math.sin(angle + Math.PI / 6));
  ctx.closePath();
  ctx.fill();
  // Label
  ctx.font = '9px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  var midx = (x1 + x2) / 2;
  var midy = (y1 + y2) / 2;
  ctx.fillText(label, midx, midy - 4);
  ctx.restore();
}

function drawTrail(xStart, y, x, yy, prog) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,176,0,0.22)';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(xStart + 12, y - 14);
  ctx.lineTo(x - 14, yy - 14);
  ctx.stroke();
  ctx.restore();
}

function drawAirPuffs(x, y, prog) {
  var puffs = 5;
  for (var i = 0; i < puffs; i++) {
    var frac = (i + (prog * 2) % 1) / puffs;
    var px = x - 22 - frac * 38;
    var py = y - 20 + (Math.sin(i * 1.3 + prog * 10) * 3);
    var r = 3 + frac * 6;
    ctx.fillStyle = 'rgba(0,218,243,' + (0.35 - frac * 0.3).toFixed(2) + ')';
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFinalDistance(x, y, dist) {
  ctx.save();
  ctx.fillStyle = '#ffb000';
  ctx.font = 'bold 14px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(dist.toFixed(2) + ' m', x, y - 60);
  ctx.restore();
}

// ============ Overlay chart ============
function showOverlay() {
  var overlay = document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent = T('overlayTitle');
  document.getElementById('overlaySub').textContent = T('overlaySub');
  document.getElementById('overlayCaption').innerHTML = T('overlayCaption');
  document.getElementById('doneBtn').textContent = T('doneBtn');
  overlay.classList.add('show');
  drawChart();
}

function drawChart() {
  var c = document.getElementById('chartCanvas');
  var cx = c.getContext('2d');
  var W = c.width, H = c.height;
  cx.clearRect(0, 0, W, H);

  var pad = { l: 42, r: 14, t: 16, b: 36 };
  var plotW = W - pad.l - pad.r;
  var plotH = H - pad.t - pad.b;

  // Axes
  cx.strokeStyle = 'rgba(255,176,0,0.5)';
  cx.lineWidth = 1.5;
  cx.beginPath();
  cx.moveTo(pad.l, pad.t);
  cx.lineTo(pad.l, pad.t + plotH);
  cx.lineTo(pad.l + plotW, pad.t + plotH);
  cx.stroke();

  // Y-axis label
  cx.save();
  cx.translate(12, pad.t + plotH / 2);
  cx.rotate(-Math.PI / 2);
  cx.fillStyle = '#8e90a6';
  cx.font = '10px "Space Grotesk", sans-serif';
  cx.textAlign = 'center';
  cx.fillText(LANG === 'cn' ? '距离 Distance (m)' : 'Distance (m)', 0, 0);
  cx.restore();

  // X-axis label
  cx.fillStyle = '#8e90a6';
  cx.font = '10px "Space Grotesk", sans-serif';
  cx.textAlign = 'center';
  cx.fillText(LANG === 'cn' ? '吹气量 Inflation (%)' : 'Inflation (%)',
              pad.l + plotW / 2, H - 8);

  // Gridlines
  cx.strokeStyle = 'rgba(142,144,166,0.15)';
  cx.lineWidth = 1;
  for (var i = 1; i <= 5; i++) {
    var gy = pad.t + plotH - (i / 5) * plotH;
    cx.beginPath();
    cx.moveTo(pad.l, gy);
    cx.lineTo(pad.l + plotW, gy);
    cx.stroke();
    cx.fillStyle = '#8e90a6';
    cx.font = '9px "Space Grotesk", sans-serif';
    cx.textAlign = 'right';
    cx.fillText(i + 'm', pad.l - 4, gy + 3);
  }
  for (var j = 0; j <= 4; j++) {
    var gx = pad.l + (j / 4) * plotW;
    var label = (j * 25) + '%';
    cx.fillStyle = '#8e90a6';
    cx.font = '9px "Space Grotesk", sans-serif';
    cx.textAlign = 'center';
    cx.fillText(label, gx, pad.t + plotH + 14);
  }

  // Theoretical curve (dashed): y = 1.5 + x * 3.5  (for 0-100% input)
  cx.strokeStyle = 'rgba(0,218,243,0.55)';
  cx.lineWidth = 1.5;
  cx.setLineDash([5, 4]);
  cx.beginPath();
  for (var p = 0; p <= 100; p += 2) {
    var y = 1.5 + (p / 100) * 3.5;
    var px = pad.l + (p / 100) * plotW;
    var py = pad.t + plotH - (y / 5) * plotH;
    if (p === 0) cx.moveTo(px, py);
    else cx.lineTo(px, py);
  }
  cx.stroke();
  cx.setLineDash([]);
  cx.fillStyle = 'rgba(0,218,243,0.7)';
  cx.font = '9px "Space Grotesk", sans-serif';
  cx.textAlign = 'left';
  cx.fillText(LANG === 'cn' ? '理论曲线' : 'Theory curve', pad.l + 6, pad.t + 10);

  // Player points
  for (var k = 0; k < state.launches.length; k++) {
    var e = state.launches[k];
    var ppx = pad.l + (e.pressure / 100) * plotW;
    var ppy = pad.t + plotH - (e.dist / 5) * plotH;
    cx.fillStyle = '#ffb000';
    cx.beginPath();
    cx.arc(ppx, ppy, 5, 0, Math.PI * 2);
    cx.fill();
    cx.strokeStyle = '#05070a';
    cx.lineWidth = 2;
    cx.stroke();
    cx.fillStyle = '#ffb000';
    cx.font = 'bold 10px "Space Grotesk", sans-serif';
    cx.textAlign = 'center';
    cx.fillText('#' + e.idx, ppx, ppy - 10);
  }
}

// ============ Events ============
function setStraw(n) {
  state.straw = n;
  document.getElementById('hudStrawVal').textContent = n;
  var btns = document.querySelectorAll('.straw-btn');
  btns.forEach(function(b) {
    b.classList.toggle('selected', +b.getAttribute('data-straw') === n);
  });
}

function resetBalloon() {
  state.pressure = 0;
  state.blowing = false;
  setPressure(0);
  document.getElementById('balloonStage').classList.remove('blowing');
  updateBlowHint();
}

function bindEvents() {
  var stage = document.getElementById('balloonStage');
  stage.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startBlowing();
  });
  window.addEventListener('mouseup', function() {
    stopBlowing(true);
  });
  stage.addEventListener('mouseleave', function() {
    if (state.blowing) stopBlowing(true);
  });
  // Touch
  stage.addEventListener('touchstart', function(e) {
    e.preventDefault();
    startBlowing();
  });
  stage.addEventListener('touchend', function(e) {
    e.preventDefault();
    stopBlowing(true);
  });

  // Space key blow
  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && !e.repeat) {
      e.preventDefault();
      startBlowing();
    }
  });
  window.addEventListener('keyup', function(e) {
    if (e.code === 'Space') {
      e.preventDefault();
      stopBlowing(true);
    }
  });

  document.getElementById('launchBtn').addEventListener('click', function() {
    if (!state.flying && state.pressure > 5) doLaunch();
  });
  document.getElementById('resetBtn').addEventListener('click', function() {
    if (state.flying) return;
    resetBalloon();
  });
  document.querySelectorAll('.straw-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      if (state.flying) return;
      setStraw(+b.getAttribute('data-straw'));
    });
  });
  document.getElementById('langBtn').addEventListener('click', function() {
    LANG = LANG === 'cn' ? 'en' : 'cn';
    applyI18N();
  });
  document.getElementById('guideHead').addEventListener('click', function() {
    document.getElementById('guidePanel').classList.toggle('collapsed');
  });
  document.getElementById('doneBtn').addEventListener('click', function() {
    document.getElementById('overlay').classList.remove('show');
    // Allow restart
    state.launches = [];
    state.best = 0;
    state.pressure = 0;
    updateProgressLabel();
    updateBest();
    renderTable();
    setPressure(0);
  });
}

// ============ Blow tick ============
function blowTick() {
  if (state.blowing && !state.flying) {
    var rate = 1.1; // percent per frame tick
    // Slightly harder to push past 85%
    if (state.pressure > 85) rate = 0.55;
    if (state.pressure > 95) rate = 0.3;
    setPressure(state.pressure + rate);
  }
  requestAnimationFrame(blowTick);
}

// ============ Init ============
function init() {
  fit();
  applyI18N();
  renderTable();
  bindEvents();
  setPressure(0);
  setStraw(10);
  requestAnimationFrame(drawFlightTrack);
  requestAnimationFrame(blowTick);
}

window.addEventListener('load', function() {
  setTimeout(init, 30);
});

// Refit canvas after fonts load to avoid initial 0-size
setTimeout(function(){ fit(); }, 400);

</script>
