<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fault Diagnosis Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:8px 16px 4px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .sub{font-size:10px;color:#8a8886;margin-top:2px}
.game-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:8px 16px;gap:6px;overflow-y:auto}
.log-preview{background:rgba(28,27,27,0.92);padding:10px;border:1px solid rgba(255,255,255,0.05);flex-shrink:0;max-height:120px;overflow-y:auto;font-family:'Space Grotesk',monospace;font-size:10px;line-height:1.6;color:#8a8886}
.log-preview .log-err{color:#ff5f1f}
.log-preview .log-warn{color:#f59e0b}
.log-preview .log-info{color:#00daf3}
.step-list{flex:1;min-height:0;display:flex;flex-direction:column;gap:4px;overflow-y:auto;padding:4px 0}
.step-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(53,53,52,0.3);border:1px solid rgba(255,255,255,0.05);cursor:grab;user-select:none;-webkit-user-select:none;transition:background 0.15s,border-color 0.15s}
.step-card:active{cursor:grabbing}
.step-card.dragging{opacity:0.5;background:rgba(255,127,80,0.1);border-color:#ff7f50}
.step-card.drop-target{border-color:#00daf3;background:rgba(0,218,243,0.08)}
.step-card .step-num{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;min-width:24px;text-align:center}
.step-card .step-text{font-size:12px;flex:1;line-height:1.4}
.step-card .step-icon{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8a8886;padding:2px 6px;border:1px solid rgba(138,136,134,0.2)}
.step-card.correct{border-color:#10b981;background:rgba(16,185,129,0.08)}
.step-card.wrong{border-color:#ff5f1f;background:rgba(255,95,31,0.08)}
.btn-row{display:flex;gap:8px;flex-shrink:0;padding:6px 16px;background:rgba(28,27,27,0.92)}
.btn-row button{flex:1;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(53,53,52,0.6);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;border-radius:0}
.btn-row button:hover{background:rgba(255,127,80,0.15)}
.hud{display:flex;justify-content:space-around;padding:6px 16px;background:rgba(0,0,0,0.55);flex-shrink:0}
.hud .col{text-align:center}
.hud .col .label{font-family:'Space Grotesk',sans-serif;font-size:8px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.hud .col .value{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#ffb59c;font-weight:700;margin-top:1px}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;border-radius:0}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);border-radius:0}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel .guide-content ul{padding-left:14px;line-height:1.6}
.guide-panel .guide-content p{margin-bottom:4px;line-height:1.5}
.guide-toggle{font-size:10px;color:#8a8886}
.feedback-panel{display:none;padding:12px 16px;background:rgba(28,27,27,0.95);border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.feedback-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#ffb59c;margin-bottom:6px}
.feedback-panel p{font-size:12px;line-height:1.5;color:#c6c6c6}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span class="guide-toggle" id="guideArrow">[-]</span></h3>
  <div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="mainTitle"></h1>
    <div class="sub" id="mainSub"></div>
  </div>
  <div class="game-area" id="gameArea">
    <div class="log-preview" id="logPreview"></div>
    <div class="step-list" id="stepList"></div>
  </div>
  <div class="feedback-panel" id="feedbackPanel">
    <h3 id="feedbackTitle"></h3>
    <p id="feedbackText"></p>
  </div>
  <div class="btn-row">
    <button id="btnCheck"></button>
    <button id="btnReset"></button>
  </div>
  <div class="hud">
    <div class="col"><div class="label" id="hudL0"></div><div class="value" id="hudV0">--</div></div>
    <div class="col"><div class="label" id="hudL1"></div><div class="value" id="hudV1">--</div></div>
    <div class="col"><div class="label" id="hudL2"></div><div class="value" id="hudV2">--</div></div>
    <div class="col"><div class="label" id="hudL3"></div><div class="value" id="hudV3">--</div></div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'FAULT DIAGNOSIS TIMELINE',cn:'\u8bd5\u8dd1\u6545\u969c\u6392\u67e5'},
  sub:{en:'Arrange the troubleshooting steps in correct order',cn:'\u5c06\u6545\u969c\u6392\u67e5\u6b65\u9aa4\u6309\u6b63\u786e\u987a\u5e8f\u6392\u5217'},
  guideTitle:{en:'OPERATION GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{en:'<p>A test run failed. Read the log excerpt above, then drag the troubleshooting steps into the correct order.</p><ul><li>Drag cards to reorder them</li><li>Click CHECK to verify your order</li><li>Green = correct position, Red = wrong</li></ul><p>Goal: All 6 steps in the correct diagnostic sequence.</p>',cn:'<p>\u4e00\u6b21\u8bd5\u8dd1\u5931\u8d25\u4e86\u3002\u9605\u8bfb\u4e0a\u65b9\u7684\u65e5\u5fd7\u6458\u5f55\uff0c\u7136\u540e\u5c06\u6545\u969c\u6392\u67e5\u6b65\u9aa4\u62d6\u62fd\u5230\u6b63\u786e\u987a\u5e8f\u3002</p><ul><li>\u62d6\u62fd\u5361\u7247\u91cd\u65b0\u6392\u5e8f</li><li>\u70b9\u51fb\u201c\u68c0\u67e5\u201d\u9a8c\u8bc1\u987a\u5e8f</li><li>\u7eff\u8272 = \u6b63\u786e\u4f4d\u7f6e\uff0c\u7ea2\u8272 = \u9519\u8bef</li></ul><p>\u76ee\u6807\uff1a\u5168\u90e8 6 \u4e2a\u6b65\u9aa4\u6b63\u786e\u6392\u5e8f\u3002</p>'},
  btnCheck:{en:'CHECK ORDER',cn:'\u68c0\u67e5\u987a\u5e8f'},
  btnReset:{en:'RESET',cn:'\u91cd\u7f6e'},
  hudL0:{en:'ATTEMPTS',cn:'\u5c1d\u8bd5\u6b21\u6570'},
  hudL1:{en:'CORRECT',cn:'\u6b63\u786e'},
  hudL2:{en:'WRONG',cn:'\u9519\u8bef'},
  hudL3:{en:'STATUS',cn:'\u72b6\u6001'},
  statusReady:{en:'READY',cn:'\u5c31\u7eea'},
  statusPass:{en:'PASS',cn:'\u901a\u8fc7'},
  statusRetry:{en:'RETRY',cn:'\u91cd\u8bd5'},
  feedbackPass:{en:'DIAGNOSIS COMPLETE',cn:'\u8bca\u65ad\u5b8c\u6210'},
  feedbackFail:{en:'INCORRECT ORDER',cn:'\u987a\u5e8f\u4e0d\u6b63\u786e'},
  feedbackPassText:{en:'Correct diagnostic sequence! A systematic approach to fault diagnosis -- observe symptoms, check logs, isolate subsystem, reproduce issue, apply fix, verify fix -- is the foundation of reliable engineering.',cn:'\u6b63\u786e\u7684\u8bca\u65ad\u5e8f\u5217\uff01\u7cfb\u7edf\u6027\u7684\u6545\u969c\u8bca\u65ad\u65b9\u6cd5\u2014\u2014\u89c2\u5bdf\u75c7\u72b6\u3001\u68c0\u67e5\u65e5\u5fd7\u3001\u9694\u79bb\u5b50\u7cfb\u7edf\u3001\u590d\u73b0\u95ee\u9898\u3001\u5e94\u7528\u4fee\u590d\u3001\u9a8c\u8bc1\u4fee\u590d\u2014\u2014\u662f\u53ef\u9760\u5de5\u7a0b\u7684\u57fa\u7840\u3002'},
  feedbackFailText:{en:'Review the log carefully: what symptom appeared first? Which subsystem failed? Try to follow the standard diagnostic flow.',cn:'\u4ed4\u7ec6\u67e5\u770b\u65e5\u5fd7\uff1a\u4ec0\u4e48\u75c7\u72b6\u5148\u51fa\u73b0\uff1f\u54ea\u4e2a\u5b50\u7cfb\u7edf\u5931\u8d25\uff1f\u8bd5\u7740\u6309\u6807\u51c6\u8bca\u65ad\u6d41\u7a0b\u64cd\u4f5c\u3002'},
  // Log lines
  log0:{en:'[T+12.3s] WARN: Perception latency spike: 680ms (budget: 200ms)',cn:'[T+12.3s] WARN: \u611f\u77e5\u5ef6\u8fdf\u5c16\u5cf0: 680ms (\u9884\u7b97: 200ms)'},
  log1:{en:'[T+12.5s] ERR: Path planner timeout -- no valid path found',cn:'[T+12.5s] ERR: \u8def\u5f84\u89c4\u5212\u5668\u8d85\u65f6 -- \u672a\u627e\u5230\u6709\u6548\u8def\u5f84'},
  log2:{en:'[T+12.8s] WARN: Chassis E-STOP triggered, velocity zeroed',cn:'[T+12.8s] WARN: \u5e95\u76d8\u7d27\u6025\u505c\u6b62\u89e6\u53d1\uff0c\u901f\u5ea6\u5f52\u96f6'},
  log3:{en:'[T+13.0s] INFO: IMU heading: 127.3 deg (expected: 45.0 deg)',cn:'[T+13.0s] INFO: IMU \u822a\u5411: 127.3 \u5ea6 (\u671f\u671b: 45.0 \u5ea6)'},
  log4:{en:'[T+13.2s] ERR: Odometry drift > 20cm, position unreliable',cn:'[T+13.2s] ERR: \u91cc\u7a0b\u8ba1\u6f02\u79fb > 20cm\uff0c\u4f4d\u7f6e\u4e0d\u53ef\u9760'},
  log5:{en:'[T+13.5s] INFO: Mission aborted, saving diagnostic package',cn:'[T+13.5s] INFO: \u4efb\u52a1\u4e2d\u6b62\uff0c\u4fdd\u5b58\u8bca\u65ad\u5305'},
  // Steps (correct order: 0-5)
  step0:{en:'Observe symptom: rover stopped mid-route with E-STOP',cn:'\u89c2\u5bdf\u75c7\u72b6\uff1a\u884c\u661f\u8f66\u5728\u9014\u4e2d\u7d27\u6025\u505c\u6b62'},
  step1:{en:'Check timestamped logs: find perception latency spike at T+12.3s',cn:'\u68c0\u67e5\u65f6\u95f4\u6233\u65e5\u5fd7\uff1a\u53d1\u73b0 T+12.3s \u611f\u77e5\u5ef6\u8fdf\u5c16\u5cf0'},
  step2:{en:'Isolate subsystem: perception module caused planner timeout cascade',cn:'\u9694\u79bb\u5b50\u7cfb\u7edf\uff1a\u611f\u77e5\u6a21\u5757\u5bfc\u81f4\u89c4\u5212\u5668\u8d85\u65f6\u7ea7\u8054'},
  step3:{en:'Reproduce: run perception on same image set, confirm 680ms spike',cn:'\u590d\u73b0\uff1a\u5bf9\u76f8\u540c\u56fe\u50cf\u96c6\u8fd0\u884c\u611f\u77e5\uff0c\u786e\u8ba4 680ms \u5c16\u5cf0'},
  step4:{en:'Fix: reduce CNN input resolution or switch to lighter model',cn:'\u4fee\u590d\uff1a\u964d\u4f4e CNN \u8f93\u5165\u5206\u8fa8\u7387\u6216\u5207\u6362\u8f7b\u91cf\u6a21\u578b'},
  step5:{en:'Verify: re-run full test, confirm latency < 200ms and no E-STOP',cn:'\u9a8c\u8bc1\uff1a\u91cd\u65b0\u8fd0\u884c\u5b8c\u6574\u6d4b\u8bd5\uff0c\u786e\u8ba4\u5ef6\u8fdf < 200ms \u4e14\u65e0\u7d27\u505c'},
  // Step icons
  icon0:{en:'OBSERVE',cn:'\u89c2\u5bdf'},
  icon1:{en:'LOG',cn:'\u65e5\u5fd7'},
  icon2:{en:'ISOLATE',cn:'\u9694\u79bb'},
  icon3:{en:'REPRODUCE',cn:'\u590d\u73b0'},
  icon4:{en:'FIX',cn:'\u4fee\u590d'},
  icon5:{en:'VERIFY',cn:'\u9a8c\u8bc1'},
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var correctOrder=[0,1,2,3,4,5];
var currentOrder=[];
var attempts=0;
var solved=false;
var dragIdx=-1;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  // Make sure it's not already in correct order
  var isCorrect=true;
  for(var k=0;k<a.length;k++){if(a[k]!==correctOrder[k]){isCorrect=false;break;}}
  if(isCorrect)return shuffle(a);
  return a;
}

function renderLog(){
  var html='';
  var classes=['log-warn','log-err','log-warn','log-info','log-err','log-info'];
  for(var i=0;i<6;i++){
    html+='<div class="'+classes[i]+'">'+t('log'+i)+'</div>';
  }
  document.getElementById('logPreview').innerHTML=html;
}

function renderSteps(){
  var list=document.getElementById('stepList');
  list.innerHTML='';
  for(var i=0;i<currentOrder.length;i++){
    var si=currentOrder[i];
    var card=document.createElement('div');
    card.className='step-card';
    card.dataset.idx=i+'';
    card.dataset.stepId=si+'';
    card.innerHTML='<span class="step-num">'+(i+1)+'</span>'+
      '<span class="step-text">'+t('step'+si)+'</span>'+
      '<span class="step-icon">'+t('icon'+si)+'</span>';
    card.draggable=true;
    list.appendChild(card);
  }
  bindDragEvents();
}

function bindDragEvents(){
  var cards=document.querySelectorAll('.step-card');
  cards.forEach(function(card){
    card.addEventListener('dragstart',function(e){
      dragIdx=parseInt(e.target.closest('.step-card').dataset.idx);
      e.target.closest('.step-card').classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',dragIdx+'');
    });
    card.addEventListener('dragend',function(e){
      e.target.closest('.step-card').classList.remove('dragging');
      document.querySelectorAll('.step-card').forEach(function(c){c.classList.remove('drop-target');});
    });
    card.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      e.target.closest('.step-card').classList.add('drop-target');
    });
    card.addEventListener('dragleave',function(e){
      e.target.closest('.step-card').classList.remove('drop-target');
    });
    card.addEventListener('drop',function(e){
      e.preventDefault();
      var dropIdx=parseInt(e.target.closest('.step-card').dataset.idx);
      document.querySelectorAll('.step-card').forEach(function(c){c.classList.remove('drop-target');});
      if(dragIdx>=0&&dragIdx!==dropIdx&&!solved){
        // Swap
        var tmp=currentOrder[dragIdx];
        currentOrder[dragIdx]=currentOrder[dropIdx];
        currentOrder[dropIdx]=tmp;
        renderSteps();
        clearFeedback();
      }
      dragIdx=-1;
    });
    // Touch events for mobile
    var touchStartY=0;
    var touchIdx=-1;
    card.addEventListener('touchstart',function(e){
      touchIdx=parseInt(e.target.closest('.step-card').dataset.idx);
      touchStartY=e.touches[0].clientY;
      e.target.closest('.step-card').classList.add('dragging');
    });
    card.addEventListener('touchmove',function(e){
      e.preventDefault();
    });
    card.addEventListener('touchend',function(e){
      e.target.closest('.step-card').classList.remove('dragging');
      if(touchIdx<0)return;
      var endY=e.changedTouches[0].clientY;
      var diff=endY-touchStartY;
      if(Math.abs(diff)>30&&!solved){
        var dir=diff>0?1:-1;
        var newIdx=touchIdx+dir;
        if(newIdx>=0&&newIdx<currentOrder.length){
          var tmp2=currentOrder[touchIdx];
          currentOrder[touchIdx]=currentOrder[newIdx];
          currentOrder[newIdx]=tmp2;
          renderSteps();
          clearFeedback();
        }
      }
      touchIdx=-1;
    });
  });
}

function checkOrder(){
  if(solved)return;
  attempts++;
  var correct=0,wrong=0;
  var cards=document.querySelectorAll('.step-card');
  for(var i=0;i<currentOrder.length;i++){
    if(currentOrder[i]===correctOrder[i]){
      correct++;
      cards[i].classList.add('correct');
      cards[i].classList.remove('wrong');
    }else{
      wrong++;
      cards[i].classList.add('wrong');
      cards[i].classList.remove('correct');
    }
  }
  document.getElementById('hudV0').textContent=attempts+'';
  document.getElementById('hudV1').textContent=correct+'';
  document.getElementById('hudV2').textContent=wrong+'';
  var fb=document.getElementById('feedbackPanel');
  fb.style.display='block';
  if(correct===6){
    solved=true;
    document.getElementById('hudV3').textContent=t('statusPass');
    document.getElementById('feedbackTitle').textContent=t('feedbackPass');
    document.getElementById('feedbackText').textContent=t('feedbackPassText');
  }else{
    document.getElementById('hudV3').textContent=t('statusRetry');
    document.getElementById('feedbackTitle').textContent=t('feedbackFail');
    document.getElementById('feedbackText').textContent=t('feedbackFailText');
  }
}

function clearFeedback(){
  document.querySelectorAll('.step-card').forEach(function(c){
    c.classList.remove('correct','wrong');
  });
  document.getElementById('feedbackPanel').style.display='none';
}

function resetGame(){
  currentOrder=shuffle([0,1,2,3,4,5]);
  attempts=0;solved=false;
  document.getElementById('hudV0').textContent='0';
  document.getElementById('hudV1').textContent='--';
  document.getElementById('hudV2').textContent='--';
  document.getElementById('hudV3').textContent=t('statusReady');
  clearFeedback();
  renderSteps();
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSub').textContent=t('sub');
  document.getElementById('btnCheck').textContent=t('btnCheck');
  document.getElementById('btnReset').textContent=t('btnReset');
  document.getElementById('guideTitle').innerHTML='<span>'+t('guideTitle')+'</span><span class="guide-toggle">[-]</span>';
  document.getElementById('guideContent').innerHTML=t('guideDesc');
  document.getElementById('hudL0').textContent=t('hudL0');
  document.getElementById('hudL1').textContent=t('hudL1');
  document.getElementById('hudL2').textContent=t('hudL2');
  document.getElementById('hudL3').textContent=t('hudL3');
  renderLog();
  renderSteps();
  if(solved)document.getElementById('hudV3').textContent=t('statusPass');
  else if(attempts===0)document.getElementById('hudV3').textContent=t('statusReady');
}

// Events
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('btnCheck').addEventListener('click',checkOrder);
document.getElementById('btnReset').addEventListener('click',resetGame);
document.getElementById('guideToggle').addEventListener('click',function(){
  var gc=document.getElementById('guideContent');
  var ar=document.getElementById('guideArrow');
  if(gc.style.display==='none'){gc.style.display='block';ar.textContent='[-]';}
  else{gc.style.display='none';ar.textContent='[+]';}
});

// Init
resetGame();
refreshI18N();
})();
</script>
</body>
</html>
