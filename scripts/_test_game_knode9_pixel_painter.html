<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:#131313;color:#e5e2e1;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* Header */
.header{padding:8px 16px 4px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);backdrop-filter:blur(12px);}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;letter-spacing:-0.02em;color:#ffb59c;text-shadow:0 0 12px rgba(255,127,80,0.3);}
.header .sub{font-size:10px;color:#dec0b6;letter-spacing:0.1em;text-transform:uppercase;}

/* Main area: 3 columns */
.main{flex:1;display:flex;min-height:0;overflow:hidden;}

/* Left: tools palette */
.tools{width:60px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);}
.tool-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:rgba(255,255,255,0.05);color:#dec0b6;font-size:18px;transition:background 0.15s;}
.tool-btn:hover{background:rgba(255,127,80,0.15);}
.tool-btn.active{background:rgba(255,127,80,0.25);color:#ffb59c;box-shadow:inset 0 0 0 1px #ff7f50;}
.tool-label{font-family:'Space Grotesk',sans-serif;font-size:8px;color:#a68b82;letter-spacing:0.1em;text-transform:uppercase;text-align:center;}

/* Center: canvas grid */
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;position:relative;}
.grid-container{position:relative;border:1px solid rgba(255,127,80,0.3);}
.grid-canvas{display:block;cursor:crosshair;}
.res-tabs{display:flex;gap:8px;margin-bottom:8px;}
.res-tab{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;padding:4px 14px;border:none;cursor:pointer;background:rgba(255,255,255,0.05);color:#dec0b6;transition:all 0.15s;}
.res-tab:hover{background:rgba(255,127,80,0.15);}
.res-tab.active{background:rgba(255,127,80,0.25);color:#ffb59c;box-shadow:inset 0 0 0 1px #ff7f50;}

/* Right: color palette + info */
.sidebar{width:180px;display:flex;flex-direction:column;gap:8px;padding:8px;background:rgba(0,0,0,0.3);backdrop-filter:blur(12px);overflow-y:auto;}
.sidebar-section{margin-bottom:4px;}
.sidebar-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#a68b82;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;}
.color-grid{display:flex;flex-wrap:wrap;gap:4px;}
.color-swatch{width:28px;height:28px;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.1s;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.active{border-color:#ffb59c;box-shadow:0 0 8px rgba(255,127,80,0.4);}
.current-color{width:100%;height:32px;margin-top:4px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:10px;color:#e5e2e1;letter-spacing:0.1em;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.info-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#a68b82;letter-spacing:0.1em;text-transform:uppercase;}
.info-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#ffb59c;}

/* Footer HUD */
.hud{height:42px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#a68b82;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#ffb59c;}

/* Lang button */
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}

/* Action buttons */
.action-btn{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border:none;cursor:pointer;color:#131313;background:linear-gradient(135deg,#ffb59c,#ff7f50);transition:transform 0.1s;box-shadow:0 0 8px rgba(255,127,80,0.2);}
.action-btn:hover{transform:scale(1.04);}
.action-btn:active{transform:scale(0.96);}
.action-btn.secondary{background:rgba(32,31,31,0.8);color:#dec0b6;box-shadow:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div style="display:flex;gap:6px;">
  <button class="action-btn secondary" id="btnUndo"></button>
  <button class="action-btn secondary" id="btnClear"></button>
</div>
</div>

<div class="main">
<!-- Left: Tools -->
<div class="tools">
  <div class="tool-label" id="toolsLabel"></div>
  <button class="tool-btn active" id="toolBrush" title="Brush">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
  </button>
  <button class="tool-btn" id="toolFill" title="Fill">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l14-14M5.45 5.11L2 12v6l4 4h6l6.84-6.84"/><path d="M18 12l4-4"/></svg>
  </button>
  <button class="tool-btn" id="toolEraser" title="Eraser">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l7-7 10 10-3 1z"/><path d="M6.5 13.5l5-5"/></svg>
  </button>
  <button class="tool-btn" id="toolPicker" title="Eyedropper">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>
  </button>
</div>

<!-- Center: Canvas -->
<div class="canvas-area">
  <div class="res-tabs" id="resTabs"></div>
  <div class="grid-container" id="gridContainer">
    <canvas class="grid-canvas" id="gridCanvas"></canvas>
  </div>
</div>

<!-- Right: Palette & Info -->
<div class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label" id="paletteLabel"></div>
    <div class="color-grid" id="colorGrid"></div>
    <div class="current-color" id="currentColor"></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label" id="infoLabel"></div>
    <div class="info-row"><span class="info-label" id="infoResLabel"></span><span class="info-val" id="infoResVal"></span></div>
    <div class="info-row"><span class="info-label" id="infoPxLabel"></span><span class="info-val" id="infoPxVal"></span></div>
    <div class="info-row"><span class="info-label" id="infoSizeLabel"></span><span class="info-val" id="infoSizeVal"></span></div>
    <div class="info-row"><span class="info-label" id="infoPaintedLabel"></span><span class="info-val" id="infoPaintedVal"></span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label" id="tipLabel"></div>
    <div id="tipText" style="font-size:11px;color:#dec0b6;line-height:1.5;"></div>
  </div>
</div>
</div>

<!-- HUD -->
<div class="hud">
  <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
  <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
  <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
  <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script>
// ============================================================
// Pixel Painter Workshop -- Pattern 1 Sandbox
// Paint Mars landscapes at different resolutions
// ============================================================

// --- I18N ---
var I18N = {
  title:      {en:'PIXEL PAINTER WORKSHOP', cn:'\u50cf\u7d20\u753b\u5bb6\u5de5\u4f5c\u5ba4'},
  subtitle:   {en:'PAINT MARS AT DIFFERENT RESOLUTIONS', cn:'\u7528\u4e0d\u540c\u5206\u8fa8\u7387\u7ed8\u5236\u706b\u661f'},
  undo:       {en:'UNDO', cn:'\u64a4\u9500'},
  clear:      {en:'CLEAR', cn:'\u6e05\u7a7a'},
  tools:      {en:'TOOLS', cn:'\u5de5\u5177'},
  palette:    {en:'MARS PALETTE', cn:'\u706b\u661f\u8272\u677f'},
  info:       {en:'CANVAS INFO', cn:'\u753b\u5e03\u4fe1\u606f'},
  res:        {en:'RESOLUTION', cn:'\u5206\u8fa8\u7387'},
  totalPx:    {en:'TOTAL PX', cn:'\u603b\u50cf\u7d20'},
  dataSize:   {en:'DATA SIZE', cn:'\u6570\u636e\u5927\u5c0f'},
  painted:    {en:'PAINTED', cn:'\u5df2\u7ed8\u5236'},
  tip:        {en:'TIP', cn:'\u63d0\u793a'},
  tipText:    {en:'Try painting the same scene at 8x8 then 16x16 -- notice how more pixels means more detail!',
               cn:'\u8bd5\u8bd5\u5148\u57288x8\u518d\u572816x16\u4e0a\u753b\u540c\u4e00\u4e2a\u573a\u666f\uff0c\u611f\u53d7\u50cf\u7d20\u8d8a\u591a\u7ec6\u8282\u8d8a\u4e30\u5bcc\uff01'},
  hudTool:    {en:'TOOL', cn:'\u5de5\u5177'},
  hudColor:   {en:'COLOR', cn:'\u989c\u8272'},
  hudRes:     {en:'GRID', cn:'\u7f51\u683c'},
  hudPercent: {en:'FILLED', cn:'\u586b\u5145\u7387'},
  brush:      {en:'Brush', cn:'\u753b\u7b14'},
  fill:       {en:'Fill', cn:'\u586b\u5145'},
  eraser:     {en:'Eraser', cn:'\u6a61\u76ae\u64e6'},
  picker:     {en:'Picker', cn:'\u5438\u7ba1'},
  tab8:       {en:'8 x 8', cn:'8 x 8'},
  tab16:      {en:'16 x 16', cn:'16 x 16'},
  tab32:      {en:'32 x 32', cn:'32 x 32'},
};

var LANG = 'cn';
function t(key) { return (I18N[key] && I18N[key][LANG]) || key; }

// --- Mars color palette ---
var COLORS = [
  '#c47a5a', // Mars sky pinkish
  '#b06840', // darker sky
  '#ffb59c', // highlight
  '#ff7f50', // bright coral
  '#c08050', // sand
  '#a0522d', // rust ground
  '#8b4513', // darker ground
  '#7a4020', // hill
  '#6b3518', // dark peak
  '#5a3010', // rock
  '#3a2008', // shadow
  '#1a0c06', // dark
  '#dec0b6', // light dust
  '#e5c8a0', // pale sand
  '#506070', // blue-gray rock
  '#2c3540', // dark blue
];

var EMPTY_COLOR = '#201f1f'; // empty cell

// --- State ---
var resolutions = [{cols:8, rows:8}, {cols:16, rows:16}, {cols:32, rows:32}];
var currentRes = 0;
var grids = [null, null, null]; // pixel data per resolution
var undoStacks = [[], [], []];
var currentColor = COLORS[5]; // default rust
var currentTool = 'brush'; // brush, fill, eraser, picker
var isDrawing = false;

// Initialize grids
function initGrids() {
  for (var i = 0; i < resolutions.length; i++) {
    var r = resolutions[i];
    if (!grids[i]) {
      grids[i] = [];
      for (var row = 0; row < r.rows; row++) {
        grids[i][row] = [];
        for (var col = 0; col < r.cols; col++) {
          grids[i][row][col] = null; // null = empty
        }
      }
    }
  }
}

function getGrid() { return grids[currentRes]; }
function getRes() { return resolutions[currentRes]; }

// --- Canvas ---
var canvas, ctx;
var cellSize = 0;

function calcCellSize() {
  var area = document.getElementById('gridContainer');
  var parent = area.parentElement;
  var maxW = parent.clientWidth - 20;
  var maxH = parent.clientHeight - 60; // leave room for tabs
  var res = getRes();
  cellSize = Math.floor(Math.min(maxW / res.cols, maxH / res.rows));
  if (cellSize < 4) cellSize = 4;
  canvas.width = res.cols * cellSize;
  canvas.height = res.rows * cellSize;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}

function drawGrid() {
  var res = getRes();
  var grid = getGrid();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw cells
  for (var r = 0; r < res.rows; r++) {
    for (var c = 0; c < res.cols; c++) {
      var x = c * cellSize, y = r * cellSize;
      ctx.fillStyle = grid[r][c] || EMPTY_COLOR;
      ctx.fillRect(x, y, cellSize, cellSize);
    }
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 0.5;
  for (var c = 0; c <= res.cols; c++) {
    ctx.beginPath(); ctx.moveTo(c * cellSize, 0); ctx.lineTo(c * cellSize, res.rows * cellSize); ctx.stroke();
  }
  for (var r = 0; r <= res.rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * cellSize); ctx.lineTo(res.cols * cellSize, r * cellSize); ctx.stroke();
  }
}

// --- Paint actions ---
function getCellFromEvent(e) {
  var rect = canvas.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var y = e.clientY - rect.top;
  var res = getRes();
  var col = Math.floor(x / cellSize);
  var row = Math.floor(y / cellSize);
  if (col < 0 || col >= res.cols || row < 0 || row >= res.rows) return null;
  return {row:row, col:col};
}

function saveUndo() {
  var grid = getGrid();
  var copy = grid.map(function(row) { return row.slice(); });
  undoStacks[currentRes].push(copy);
  if (undoStacks[currentRes].length > 50) undoStacks[currentRes].shift();
}

function paintCell(row, col) {
  var grid = getGrid();
  if (currentTool === 'brush') {
    grid[row][col] = currentColor;
  } else if (currentTool === 'eraser') {
    grid[row][col] = null;
  }
}

function floodFill(row, col) {
  var grid = getGrid();
  var res = getRes();
  var targetColor = grid[row][col];
  if (targetColor === currentColor) return;
  var stack = [[row, col]];
  var visited = {};
  while (stack.length > 0) {
    var cell = stack.pop();
    var r = cell[0], c = cell[1];
    var key = r + ',' + c;
    if (visited[key]) continue;
    visited[key] = true;
    if (r < 0 || r >= res.rows || c < 0 || c >= res.cols) continue;
    if (grid[r][c] !== targetColor) continue;
    grid[r][c] = currentColor;
    stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1]);
  }
}

function pickColor(row, col) {
  var grid = getGrid();
  var color = grid[row][col];
  if (color) {
    currentColor = color;
    updateColorUI();
  }
}

function undo() {
  if (undoStacks[currentRes].length === 0) return;
  grids[currentRes] = undoStacks[currentRes].pop();
  drawGrid();
  updateInfo();
}

function clearGrid() {
  saveUndo();
  var res = getRes();
  var grid = getGrid();
  for (var r = 0; r < res.rows; r++) {
    for (var c = 0; c < res.cols; c++) {
      grid[r][c] = null;
    }
  }
  drawGrid();
  updateInfo();
}

// --- Events ---
function onMouseDown(e) {
  var cell = getCellFromEvent(e);
  if (!cell) return;
  if (currentTool === 'picker') {
    pickColor(cell.row, cell.col);
    return;
  }
  if (currentTool === 'fill') {
    saveUndo();
    floodFill(cell.row, cell.col);
    drawGrid();
    updateInfo();
    return;
  }
  isDrawing = true;
  saveUndo();
  paintCell(cell.row, cell.col);
  drawGrid();
  updateInfo();
}

function onMouseMove(e) {
  if (!isDrawing) return;
  var cell = getCellFromEvent(e);
  if (!cell) return;
  paintCell(cell.row, cell.col);
  drawGrid();
  updateInfo();
}

function onMouseUp() {
  isDrawing = false;
}

// Touch support
function onTouchStart(e) {
  e.preventDefault();
  var touch = e.touches[0];
  onMouseDown(touch);
}
function onTouchMove(e) {
  e.preventDefault();
  var touch = e.touches[0];
  if (!isDrawing) return;
  var cell = getCellFromEvent(touch);
  if (!cell) return;
  paintCell(cell.row, cell.col);
  drawGrid();
  updateInfo();
}
function onTouchEnd(e) {
  e.preventDefault();
  isDrawing = false;
}

// --- UI Updates ---
function updateColorUI() {
  var swatches = document.querySelectorAll('.color-swatch');
  swatches.forEach(function(sw) {
    sw.classList.toggle('active', sw.dataset.color === currentColor);
  });
  var cur = document.getElementById('currentColor');
  cur.style.background = 'linear-gradient(135deg,' + currentColor + ',' + currentColor + 'cc)';
  cur.textContent = currentColor.toUpperCase();
  cur.style.color = isLightColor(currentColor) ? '#131313' : '#e5e2e1';
  // Update HUD
  document.getElementById('hudV2').textContent = currentColor.toUpperCase();
}

function isLightColor(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 150;
}

function updateInfo() {
  var res = getRes();
  var grid = getGrid();
  var total = res.rows * res.cols;
  var painted = 0;
  for (var r = 0; r < res.rows; r++) {
    for (var c = 0; c < res.cols; c++) {
      if (grid[r][c]) painted++;
    }
  }
  document.getElementById('infoResVal').textContent = res.cols + ' x ' + res.rows;
  document.getElementById('infoPxVal').textContent = total.toString();
  document.getElementById('infoSizeVal').textContent = (total * 3) + ' B';
  document.getElementById('infoPaintedVal').textContent = painted + ' / ' + total;
  // HUD
  document.getElementById('hudV1').textContent = t(currentTool);
  document.getElementById('hudV3').textContent = res.cols + 'x' + res.rows;
  document.getElementById('hudV4').textContent = Math.round(painted/total*100) + '%';
}

function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  var map = {brush:'toolBrush', fill:'toolFill', eraser:'toolEraser', picker:'toolPicker'};
  document.getElementById(map[tool]).classList.add('active');
  canvas.style.cursor = tool === 'picker' ? 'crosshair' : tool === 'eraser' ? 'cell' : 'crosshair';
  updateInfo();
}

function switchResolution(idx) {
  currentRes = idx;
  calcCellSize();
  drawGrid();
  updateInfo();
  // Update tabs
  var tabs = document.querySelectorAll('.res-tab');
  tabs.forEach(function(tab, i) {
    tab.classList.toggle('active', i === idx);
  });
}

// --- Build UI ---
function buildUI() {
  // Title
  document.getElementById('title').textContent = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');

  // Buttons
  document.getElementById('btnUndo').textContent = t('undo');
  document.getElementById('btnClear').textContent = t('clear');
  document.getElementById('toolsLabel').textContent = t('tools');
  document.getElementById('paletteLabel').textContent = t('palette');
  document.getElementById('infoLabel').textContent = t('info');
  document.getElementById('infoResLabel').textContent = t('res');
  document.getElementById('infoPxLabel').textContent = t('totalPx');
  document.getElementById('infoSizeLabel').textContent = t('dataSize');
  document.getElementById('infoPaintedLabel').textContent = t('painted');
  document.getElementById('tipLabel').textContent = t('tip');
  document.getElementById('tipText').textContent = t('tipText');

  // HUD labels
  document.getElementById('hudL1').textContent = t('hudTool');
  document.getElementById('hudL2').textContent = t('hudColor');
  document.getElementById('hudL3').textContent = t('hudRes');
  document.getElementById('hudL4').textContent = t('hudPercent');

  // Resolution tabs
  var tabsEl = document.getElementById('resTabs');
  tabsEl.innerHTML = '';
  var tabKeys = ['tab8','tab16','tab32'];
  resolutions.forEach(function(res, i) {
    var btn = document.createElement('button');
    btn.className = 'res-tab' + (i === currentRes ? ' active' : '');
    btn.textContent = t(tabKeys[i]);
    btn.addEventListener('click', function() { switchResolution(i); });
    tabsEl.appendChild(btn);
  });

  // Color swatches
  var colorGrid = document.getElementById('colorGrid');
  colorGrid.innerHTML = '';
  COLORS.forEach(function(color) {
    var swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (color === currentColor ? ' active' : '');
    swatch.style.background = 'linear-gradient(135deg,' + color + ',' + color + 'cc)';
    swatch.dataset.color = color;
    swatch.addEventListener('click', function() {
      currentColor = color;
      updateColorUI();
    });
    colorGrid.appendChild(swatch);
  });
  updateColorUI();

  // Lang
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
}

// --- Init ---
function init() {
  canvas = document.getElementById('gridCanvas');
  ctx = canvas.getContext('2d');

  initGrids();
  buildUI();
  calcCellSize();
  drawGrid();
  updateInfo();

  // Canvas events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('touchstart', onTouchStart, {passive:false});
  canvas.addEventListener('touchmove', onTouchMove, {passive:false});
  canvas.addEventListener('touchend', onTouchEnd, {passive:false});

  // Tool buttons
  document.getElementById('toolBrush').addEventListener('click', function() { setTool('brush'); });
  document.getElementById('toolFill').addEventListener('click', function() { setTool('fill'); });
  document.getElementById('toolEraser').addEventListener('click', function() { setTool('eraser'); });
  document.getElementById('toolPicker').addEventListener('click', function() { setTool('picker'); });

  // Action buttons
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnClear').addEventListener('click', clearGrid);

  // Language toggle
  document.getElementById('langBtn').addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    buildUI();
    updateInfo();
  });

  // Resize
  window.addEventListener('resize', function() {
    calcCellSize();
    drawGrid();
  });
}

// Boot
setTimeout(init, 100);
document.fonts.ready.then(function() {
  if (canvas) { calcCellSize(); drawGrid(); }
});
</script>
</body>
</html>
