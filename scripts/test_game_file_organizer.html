<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>File Organizer Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:6px 16px;background:rgba(28,27,27,0.92);border-bottom:1px solid rgba(138,136,134,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.game-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:8px;gap:6px;overflow:hidden}
.source-zone{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;padding:6px;background:rgba(53,53,52,0.2);border:1px solid rgba(138,136,134,0.1);min-height:60px;flex-shrink:0}
.target-zone{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:6px;min-height:0}
.folder-drop{display:flex;flex-direction:column;background:rgba(28,27,27,0.6);border:1px solid rgba(138,136,134,0.15);padding:4px;overflow-y:auto;min-height:0}
.folder-drop.drag-over{border-color:#ff7f50;background:rgba(255,127,80,0.06)}
.folder-drop.correct{border-color:#10b981;background:rgba(16,185,129,0.05)}
.folder-header{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#ffb59c;letter-spacing:1px;text-transform:uppercase;padding:2px 4px;border-bottom:1px solid rgba(138,136,134,0.1);flex-shrink:0;display:flex;align-items:center;gap:4px}
.folder-header .icon{width:14px;height:11px;display:inline-block;vertical-align:middle}
.folder-items{flex:1;display:flex;flex-wrap:wrap;gap:3px;padding:3px 0;align-content:flex-start}
.file-chip{font-family:'Space Grotesk',monospace;font-size:10px;padding:3px 8px;cursor:grab;user-select:none;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px);letter-spacing:0.5px;white-space:nowrap;transition:opacity 0.2s}
.file-chip:active{cursor:grabbing;opacity:0.7}
.file-chip.dragging{opacity:0.3}
.file-chip.wrong{border-color:#ef4444;animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.feedback-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:rgba(0,0,0,0.55);flex-shrink:0;height:40px}
.score-display{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#00daf3;font-weight:700}
.progress-bar{width:200px;height:6px;background:rgba(53,53,52,0.4);position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#ffb59c,#ff7f50);transition:width 0.3s}
.reset-btn{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:4px 12px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(53,53,52,0.4);color:#ffb59c;letter-spacing:1px;text-transform:uppercase}
.reset-btn:hover{background:rgba(255,127,80,0.15)}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:35vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:14px;line-height:1.5}
.win-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
.win-overlay.show{display:flex}
.win-box{background:rgba(28,27,27,0.95);border:1px solid #10b981;padding:24px 32px;text-align:center;max-width:400px}
.win-box h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#10b981;margin-bottom:12px;letter-spacing:2px}
.win-box p{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#e5e2e1;line-height:1.6;margin-bottom:16px}
.win-box button{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 24px;cursor:pointer;border:1px solid #10b981;background:rgba(16,185,129,0.1);color:#10b981;letter-spacing:1px;text-transform:uppercase}
.win-box button:hover{background:rgba(16,185,129,0.2)}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideDesc" style="margin-bottom:6px"></p>
    <ul id="guideList"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="header"><h1 id="mainTitle"></h1></div>
  <div class="game-area">
    <div class="source-zone" id="sourceZone"></div>
    <div class="target-zone" id="targetZone"></div>
  </div>
  <div class="feedback-bar">
    <span class="score-display" id="scoreDisplay"></span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="reset-btn" id="resetBtn"></button>
  </div>
</div>
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winText"></p>
    <button id="winBtn"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'FILE ORGANIZER CHALLENGE',cn:'\u6587\u4ef6\u76ee\u5f55\u6574\u7406\u6311\u6218'},
  guide:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{en:'Drag each file into the correct directory folder.',cn:'\u5c06\u6bcf\u4e2a\u6587\u4ef6\u62d6\u62fd\u5230\u6b63\u786e\u7684\u76ee\u5f55\u6587\u4ef6\u5939\u4e2d\u3002'},
  guideP1:{en:'Drag files from the top zone into folders',cn:'\u4ece\u9876\u90e8\u533a\u57df\u62d6\u62fd\u6587\u4ef6\u5230\u6587\u4ef6\u5939'},
  guideP2:{en:'Each file belongs to exactly one folder',cn:'\u6bcf\u4e2a\u6587\u4ef6\u53ea\u5c5e\u4e8e\u4e00\u4e2a\u6587\u4ef6\u5939'},
  guideP3:{en:'Wrong placement shows a red shake',cn:'\u653e\u9519\u4f1a\u663e\u793a\u7ea2\u8272\u6296\u52a8'},
  guideP4:{en:'Sort all 12 files to win!',cn:'\u6574\u7406\u5b8c\u5168\u90e8 12 \u4e2a\u6587\u4ef6\u5373\u53ef\u83b7\u80dc\uff01'},
  score:{en:'SORTED',cn:'\u5df2\u6574\u7406'},
  reset:{en:'RESET',cn:'\u91cd\u7f6e'},
  winTitle:{en:'DIRECTORY ORGANIZED!',cn:'\u76ee\u5f55\u6574\u7406\u5b8c\u6210\uff01'},
  winText:{en:'All files are in the correct folders. A well-organized directory is the foundation of version control. Now you can tag versions and track changes with confidence.',cn:'\u6240\u6709\u6587\u4ef6\u90fd\u5df2\u653e\u5165\u6b63\u786e\u7684\u6587\u4ef6\u5939\u3002\u89c4\u8303\u7684\u76ee\u5f55\u7ed3\u6784\u662f\u7248\u672c\u63a7\u5236\u7684\u57fa\u7840\u3002\u73b0\u5728\u4f60\u53ef\u4ee5\u81ea\u4fe1\u5730\u7ed9\u6587\u4ef6\u6253\u7248\u672c\u5e76\u8ffd\u8e2a\u53d8\u66f4\u3002'},
  winBtn:{en:'PLAY AGAIN',cn:'\u518d\u6765\u4e00\u6b21'},
  folder_models:{en:'models/',cn:'models/'},
  folder_configs:{en:'configs/',cn:'configs/'},
  folder_logs:{en:'logs/',cn:'logs/'},
  folder_scripts:{en:'scripts/',cn:'scripts/'},
  folder_terrain:{en:'terrain/',cn:'terrain/'},
  folder_tests:{en:'tests/'}
};
function t(key){return(I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}

var FILES=[
  {name:'risk_model_v1.2.pt',folder:'models',color:'#ff7f50'},
  {name:'baseline_v0.9.pt',folder:'models',color:'#ff7f50'},
  {name:'cost_config_v3.yaml',folder:'configs',color:'#ffb59c'},
  {name:'deploy_params.yaml',folder:'configs',color:'#ffb59c'},
  {name:'train_2026-04-01.log',folder:'logs',color:'#00daf3'},
  {name:'eval_2026-03-28.log',folder:'logs',color:'#00daf3'},
  {name:'train.py',folder:'scripts',color:'#10b981'},
  {name:'evaluate.py',folder:'scripts',color:'#10b981'},
  {name:'gale_crater_v1.tif',folder:'terrain',color:'#f59e0b'},
  {name:'jezero_delta_v2.tif',folder:'terrain',color:'#f59e0b'},
  {name:'regression_v1.2.csv',folder:'tests',color:'#a78bfa'},
  {name:'accuracy_report.json',folder:'tests',color:'#a78bfa'}
];

var FOLDERS=['models','configs','logs','scripts','terrain','tests'];
var FOLDER_COLORS={models:'#ff7f50',configs:'#ffb59c',logs:'#00daf3',scripts:'#10b981',terrain:'#f59e0b',tests:'#a78bfa'};

var sorted=0;
var totalFiles=FILES.length;
var draggedEl=null;
var draggedFile=null;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}

function buildUI(){
  var src=document.getElementById('sourceZone');
  src.innerHTML='';
  var shuffled=shuffle(FILES);
  shuffled.forEach(function(f){
    var chip=document.createElement('div');
    chip.className='file-chip';
    chip.textContent=f.name;
    chip.style.background='rgba('+hexToRgb(f.color)+',0.15)';
    chip.style.color=f.color;
    chip.setAttribute('data-folder',f.folder);
    chip.setAttribute('data-name',f.name);
    // Mouse drag
    chip.addEventListener('mousedown',function(e){startDrag(e,chip,f);});
    // Touch drag
    chip.addEventListener('touchstart',function(e){startDrag(e,chip,f);},{passive:false});
    src.appendChild(chip);
  });

  var tgt=document.getElementById('targetZone');
  tgt.innerHTML='';
  FOLDERS.forEach(function(fname){
    var drop=document.createElement('div');
    drop.className='folder-drop';
    drop.setAttribute('data-folder',fname);
    var hdr=document.createElement('div');
    hdr.className='folder-header';
    // Folder icon
    var icon=document.createElement('span');
    icon.className='icon';
    icon.style.background=FOLDER_COLORS[fname];
    hdr.appendChild(icon);
    var lbl=document.createElement('span');
    lbl.className='folder-label';
    lbl.textContent=t('folder_'+fname);
    hdr.appendChild(lbl);
    drop.appendChild(hdr);
    var items=document.createElement('div');
    items.className='folder-items';
    drop.appendChild(items);
    // Drop events
    drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag-over');});
    drop.addEventListener('dragleave',function(){drop.classList.remove('drag-over');});
    drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag-over');handleDrop(drop,fname);});
    tgt.appendChild(drop);
  });

  sorted=0;
  updateScore();
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16);var g=parseInt(hex.slice(3,5),16);var b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

var ghostEl=null;
var offsetX=0,offsetY=0;

function startDrag(e,chip,file){
  e.preventDefault();
  draggedEl=chip;
  draggedFile=file;
  chip.classList.add('dragging');
  // Create ghost
  ghostEl=chip.cloneNode(true);
  ghostEl.style.position='fixed';
  ghostEl.style.zIndex='300';
  ghostEl.style.pointerEvents='none';
  ghostEl.style.opacity='0.85';
  ghostEl.classList.remove('dragging');
  document.body.appendChild(ghostEl);
  var pt=e.touches?e.touches[0]:e;
  var rect=chip.getBoundingClientRect();
  offsetX=pt.clientX-rect.left;
  offsetY=pt.clientY-rect.top;
  ghostEl.style.left=(pt.clientX-offsetX)+'px';
  ghostEl.style.top=(pt.clientY-offsetY)+'px';
  if(e.touches){
    document.addEventListener('touchmove',onDragMove,{passive:false});
    document.addEventListener('touchend',onDragEnd);
  }else{
    document.addEventListener('mousemove',onDragMove);
    document.addEventListener('mouseup',onDragEnd);
  }
}

function onDragMove(e){
  e.preventDefault();
  var pt=e.touches?e.touches[0]:e;
  if(ghostEl){
    ghostEl.style.left=(pt.clientX-offsetX)+'px';
    ghostEl.style.top=(pt.clientY-offsetY)+'px';
  }
  // Highlight folder under cursor
  var folders=document.querySelectorAll('.folder-drop');
  folders.forEach(function(f){f.classList.remove('drag-over');});
  var el=document.elementFromPoint(pt.clientX,pt.clientY);
  if(el){
    var drop=el.closest('.folder-drop');
    if(drop)drop.classList.add('drag-over');
  }
}

function onDragEnd(e){
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  var pt=e.changedTouches?e.changedTouches[0]:e;
  var el=document.elementFromPoint(pt.clientX,pt.clientY);
  if(el){
    var drop=el.closest('.folder-drop');
    if(drop){
      var fname=drop.getAttribute('data-folder');
      handleDrop(drop,fname);
      return;
    }
  }
  // Not dropped on folder
  if(draggedEl)draggedEl.classList.remove('dragging');
  draggedEl=null;draggedFile=null;
  document.querySelectorAll('.folder-drop').forEach(function(f){f.classList.remove('drag-over');});
}

function handleDrop(drop,folderName){
  drop.classList.remove('drag-over');
  if(!draggedEl||!draggedFile)return;
  var correct=draggedFile.folder===folderName;
  if(correct){
    // Move chip into folder
    var items=drop.querySelector('.folder-items');
    draggedEl.classList.remove('dragging');
    draggedEl.style.cursor='default';
    // Remove all event listeners by cloning
    var newChip=draggedEl.cloneNode(true);
    newChip.style.cursor='default';
    newChip.style.opacity='1';
    items.appendChild(newChip);
    draggedEl.remove();
    drop.classList.add('correct');
    setTimeout(function(){drop.classList.remove('correct');},600);
    sorted++;
    updateScore();
    if(sorted>=totalFiles){
      setTimeout(showWin,500);
    }
  }else{
    draggedEl.classList.remove('dragging');
    draggedEl.classList.add('wrong');
    setTimeout(function(){draggedEl.classList.remove('wrong');},500);
  }
  draggedEl=null;draggedFile=null;
}

function updateScore(){
  document.getElementById('scoreDisplay').textContent=t('score')+': '+sorted+' / '+totalFiles;
  document.getElementById('progressFill').style.width=(sorted/totalFiles*100)+'%';
}

function showWin(){
  document.getElementById('winOverlay').classList.add('show');
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('guideTitle').textContent=t('guide');
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var list=document.getElementById('guideList');list.innerHTML='';
  ['guideP1','guideP2','guideP3','guideP4'].forEach(function(k){var li=document.createElement('li');li.textContent=t(k);list.appendChild(li);});
  document.getElementById('resetBtn').textContent=t('reset');
  document.getElementById('winTitle').textContent=t('winTitle');
  document.getElementById('winText').textContent=t('winText');
  document.getElementById('winBtn').textContent=t('winBtn');
  // Update folder labels
  document.querySelectorAll('.folder-label').forEach(function(el){
    var drop=el.closest('.folder-drop');
    if(drop){el.textContent=t('folder_'+drop.getAttribute('data-folder'));}
  });
  updateScore();
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';document.getElementById('langBtn').textContent=LANG.toUpperCase();refreshI18N();
});
document.getElementById('resetBtn').addEventListener('click',function(){
  document.getElementById('winOverlay').classList.remove('show');buildUI();refreshI18N();
});
document.getElementById('winBtn').addEventListener('click',function(){
  document.getElementById('winOverlay').classList.remove('show');buildUI();refreshI18N();
});
var guideOpen=true;
document.getElementById('guideToggle').addEventListener('click',function(){guideOpen=!guideOpen;document.getElementById('guideContent').style.display=guideOpen?'block':'none';document.getElementById('guideArrow').textContent=guideOpen?'-':'+';});

buildUI();
refreshI18N();
})();
</script>
</body>
</html>
