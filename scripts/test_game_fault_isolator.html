<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.game-header{
  padding:10px 16px;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
  display:flex;align-items:center;justify-content:space-between;
}
.game-header h2{
  font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;
}
.game-header .score-display{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  color:#e5e2e1;
}
.game-area{
  flex:1;min-height:0;display:flex;overflow:hidden;
}
.log-panel{
  flex:1;display:flex;flex-direction:column;
  border-right:1px solid rgba(138,136,134,0.15);
  background:rgba(0,0,0,0.3);
  overflow-y:auto;padding:12px;
}
.log-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  color:#ffb59c;margin-bottom:8px;letter-spacing:1px;
}
.log-entry{
  font-family:'Space Grotesk',monospace;font-size:11px;
  padding:3px 6px;margin-bottom:2px;
  color:#c6c6c6;
  border-left:2px solid transparent;
  cursor:pointer;
  transition:background 0.15s;
}
.log-entry:hover{background:rgba(255,181,156,0.08);}
.log-entry.error{color:#ff5f1f;border-left-color:#ff5f1f;}
.log-entry.warn{color:#ffb59c;border-left-color:#ffb59c;}
.log-entry.selected{background:rgba(255,181,156,0.15);border-left-color:#00daf3;}
.diagnosis-panel{
  width:280px;display:flex;flex-direction:column;
  padding:12px;overflow-y:auto;
}
.diagnosis-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  color:#ffb59c;margin-bottom:10px;letter-spacing:1px;
}
.layer-btn{
  display:block;width:100%;padding:10px 14px;margin-bottom:8px;
  font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:1px;text-align:left;
  border:1px solid rgba(138,136,134,0.15);
  background:rgba(28,27,27,0.6);color:#e5e2e1;
  transition:border-color 0.2s,background 0.2s;
}
.layer-btn:hover{border-color:#ffb59c;background:rgba(255,181,156,0.08);}
.layer-btn.correct{border-color:#10b981;background:rgba(16,185,129,0.15);color:#10b981;}
.layer-btn.wrong{border-color:#ff5f1f;background:rgba(255,95,31,0.15);color:#ff5f1f;}
.layer-btn .layer-desc{
  font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:400;
  color:#8a8886;margin-top:4px;display:block;
}
.feedback-bar{
  padding:8px 16px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:#e5e2e1;min-height:40px;
  display:flex;align-items:center;
}
.feedback-bar .fb-text{flex:1;}
.next-case-btn{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:6px 16px;cursor:pointer;letter-spacing:1px;
  border:1px solid #ffb59c;background:transparent;color:#ffb59c;
  display:none;
}
.next-case-btn:hover{background:rgba(255,181,156,0.15);}
.summary-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
  display:none;z-index:200;
  justify-content:center;align-items:center;
  flex-direction:column;
}
.summary-overlay.visible{display:flex;}
.summary-box{
  background:rgba(28,27,27,0.95);border:1px solid rgba(138,136,134,0.15);
  padding:32px 40px;max-width:420px;width:90%;text-align:center;
}
.summary-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
  color:#ffb59c;margin-bottom:12px;letter-spacing:1px;
}
.summary-box .final-score{
  font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;
  color:#10b981;margin:12px 0;
}
.summary-box p{
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  color:#c6c6c6;line-height:1.6;margin-top:8px;
}
.summary-box .restart-btn{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;margin-top:16px;cursor:pointer;letter-spacing:1px;
  border:1px solid #ffb59c;background:transparent;color:#ffb59c;
}
.summary-box .restart-btn:hover{background:rgba(255,181,156,0.15);}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideWhat"></p>
    <ul id="guidePoints"></ul>
    <p id="guideTakeaway" style="margin-top:6px;font-weight:700;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="game-header">
    <h2 id="gameTitle"></h2>
    <span class="score-display" id="scoreDisplay"></span>
  </div>
  <div class="game-area">
    <div class="log-panel" id="logPanel">
      <h3 id="logPanelTitle"></h3>
      <div id="logEntries"></div>
    </div>
    <div class="diagnosis-panel" id="diagnosisPanel">
      <h3 id="diagTitle"></h3>
      <div id="layerButtons"></div>
    </div>
  </div>
  <div class="feedback-bar" id="feedbackBar">
    <span class="fb-text" id="fbText"></span>
    <button class="next-case-btn" id="nextCaseBtn"></button>
  </div>
</div>
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-box">
    <h2 id="summaryTitle"></h2>
    <div class="final-score" id="finalScore"></div>
    <p id="summaryText"></p>
    <button class="restart-btn" id="restartBtn"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  gameTitle:{en:'FAULT ISOLATOR',cn:'\u6545\u969c\u5c42\u5b9a\u4f4d\u5668'},
  score:{en:'SCORE',cn:'\u5f97\u5206'},
  logTitle:{en:'TRIAL LOG',cn:'\u8bd5\u8dd1\u65e5\u5fd7'},
  diagTitle:{en:'WHICH LAYER?',cn:'\u6545\u969c\u5728\u54ea\u4e00\u5c42\uff1f'},
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideWhat:{en:'Read the trial log, identify error patterns, then select the faulty layer.',cn:'\u9605\u8bfb\u8bd5\u8dd1\u65e5\u5fd7\uff0c\u8bc6\u522b\u9519\u8bef\u6a21\u5f0f\uff0c\u7136\u540e\u9009\u62e9\u6545\u969c\u5c42\u3002'},
  guideStep1:{en:'Read log entries carefully',cn:'\u4ed4\u7ec6\u9605\u8bfb\u65e5\u5fd7\u6761\u76ee'},
  guideStep2:{en:'Click error/warn lines for hints',cn:'\u70b9\u51fb\u9519\u8bef/\u8b66\u544a\u884c\u83b7\u53d6\u63d0\u793a'},
  guideStep3:{en:'Select the root-cause layer on the right',cn:'\u5728\u53f3\u4fa7\u9009\u62e9\u6839\u56e0\u5c42'},
  guideTakeaway:{en:'Master bottom-up fault isolation in rover systems.',cn:'\u638c\u63e1 rover \u7cfb\u7edf\u7684\u81ea\u5e95\u5411\u4e0a\u6545\u969c\u5206\u79bb\u65b9\u6cd5\u3002'},
  nextCase:{en:'NEXT CASE',cn:'\u4e0b\u4e00\u9898'},
  layerPerception:{en:'PERCEPTION',cn:'\u611f\u77e5\u5c42'},
  layerPlanning:{en:'PLANNING',cn:'\u89c4\u5212\u5c42'},
  layerDeployment:{en:'DEPLOYMENT',cn:'\u90e8\u7f72\u5c42'},
  layerChassis:{en:'CHASSIS',cn:'\u5e95\u76d8\u5c42'},
  descPerception:{en:'Camera, model inference, classification',cn:'\u76f8\u673a\u3001\u6a21\u578b\u63a8\u7406\u3001\u5206\u7c7b'},
  descPlanning:{en:'Cost map, path, replanning',cn:'\u4ee3\u4ef7\u56fe\u3001\u8def\u5f84\u3001\u91cd\u89c4\u5212'},
  descDeployment:{en:'Model config, resource, version',cn:'\u6a21\u578b\u914d\u7f6e\u3001\u8d44\u6e90\u3001\u7248\u672c'},
  descChassis:{en:'Motor, encoder, wheel, power',cn:'\u7535\u673a\u3001\u7f16\u7801\u5668\u3001\u8f6e\u5b50\u3001\u7535\u6e90'},
  correct:{en:'Correct! ',cn:'\u6b63\u786e\uff01'},
  wrong:{en:'Wrong. ',cn:'\u9519\u8bef\u3002'},
  summaryTitle:{en:'DIAGNOSIS COMPLETE',cn:'\u8bca\u65ad\u5b8c\u6210'},
  summaryText:{en:'You\'ve completed all fault isolation cases. This skill is essential for real rover field testing.',cn:'\u4f60\u5df2\u5b8c\u6210\u6240\u6709\u6545\u969c\u5b9a\u4f4d\u6848\u4f8b\u3002\u8fd9\u9879\u6280\u80fd\u5bf9\u771f\u5b9e\u7684 rover \u73b0\u573a\u8bd5\u8dd1\u81f3\u5173\u91cd\u8981\u3002'},
  restart:{en:'RESTART',cn:'\u91cd\u65b0\u5f00\u59cb'},
  caseLabel:{en:'CASE',cn:'\u6848\u4f8b'},
  readyPrompt:{en:'Read the log and select the fault layer.',cn:'\u9605\u8bfb\u65e5\u5fd7\u5e76\u9009\u62e9\u6545\u969c\u5c42\u3002'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var cases=[
  {
    logs:[
      {time:'T+00.0s',msg:'System boot OK',level:'info'},
      {time:'T+01.2s',msg:'Camera init: 640x480 @15fps',level:'info'},
      {time:'T+02.0s',msg:'Perception model loaded: v2.3',level:'info'},
      {time:'T+03.5s',msg:'Start navigation to waypoint A',level:'info'},
      {time:'T+05.1s',msg:'Frame #42: confidence=0.28 (threshold=0.5)',level:'warn'},
      {time:'T+05.3s',msg:'Class output: rock -> classified as SAFE_TERRAIN',level:'error'},
      {time:'T+05.8s',msg:'Planner: path OK, no hazard detected',level:'info'},
      {time:'T+06.2s',msg:'Motor cmd: forward 0.3m/s',level:'info'},
      {time:'T+07.0s',msg:'COLLISION DETECTED: front bumper',level:'error'},
      {time:'T+07.1s',msg:'E-STOP triggered',level:'error'}
    ],
    answer:'perception',
    explanation:{
      en:'The confidence was only 0.28 (below 0.5 threshold) and rock was misclassified as safe terrain. This is a perception fault -- the model failed to identify the hazard.',
      cn:'\u7f6e\u4fe1\u5ea6\u53ea\u6709 0.28\uff08\u4f4e\u4e8e 0.5 \u9608\u503c\uff09\uff0c\u5ca9\u77f3\u88ab\u8bef\u5206\u7c7b\u4e3a\u5b89\u5168\u5730\u5f62\u3002\u8fd9\u662f\u611f\u77e5\u5c42\u6545\u969c -- \u6a21\u578b\u672a\u80fd\u8bc6\u522b\u5371\u9669\u3002'
    }
  },
  {
    logs:[
      {time:'T+00.0s',msg:'System boot OK',level:'info'},
      {time:'T+01.5s',msg:'Perception: all clear, confidence=0.91',level:'info'},
      {time:'T+02.0s',msg:'Cost map updated: 40x40 grid',level:'info'},
      {time:'T+02.5s',msg:'Path planned: 12 waypoints, length=3.2m',level:'info'},
      {time:'T+03.0s',msg:'Motor cmd: forward 0.3m/s',level:'info'},
      {time:'T+04.2s',msg:'Odometry: expected=0.36m, actual=0.12m',level:'warn'},
      {time:'T+04.5s',msg:'Motor current: 4.8A (max rated: 3.0A)',level:'error'},
      {time:'T+05.0s',msg:'Wheel encoder: 0 ticks/s (expected: 120)',level:'error'},
      {time:'T+05.2s',msg:'Motor thermal warning: 72C',level:'warn'},
      {time:'T+05.5s',msg:'Navigation timeout: rover stuck',level:'error'}
    ],
    answer:'chassis',
    explanation:{
      en:'Odometry shows 0.12m vs expected 0.36m. Motor current spiked to 4.8A (max 3.0A) and wheel encoder reads 0 -- the wheel is physically stuck. This is a chassis fault.',
      cn:'\u91cc\u7a0b\u8ba1\u663e\u793a 0.12m vs \u9884\u671f 0.36m\u3002\u7535\u673a\u7535\u6d41\u98d9\u5347\u81f3 4.8A\uff08\u989d\u5b9a 3.0A\uff09\u4e14\u8f6e\u5b50\u7f16\u7801\u5668\u8bfb\u6570\u4e3a 0 -- \u8f6e\u5b50\u88ab\u7269\u7406\u5361\u4f4f\u3002\u8fd9\u662f\u5e95\u76d8\u5c42\u6545\u969c\u3002'
    }
  },
  {
    logs:[
      {time:'T+00.0s',msg:'System boot OK',level:'info'},
      {time:'T+01.0s',msg:'Perception: confidence=0.85, terrain clear',level:'info'},
      {time:'T+01.5s',msg:'Cost map updated',level:'info'},
      {time:'T+02.0s',msg:'Path planned: 8 waypoints',level:'info'},
      {time:'T+02.5s',msg:'Motor cmd: forward, heading=045',level:'info'},
      {time:'T+03.0s',msg:'Replan triggered: obstacle appeared',level:'info'},
      {time:'T+03.5s',msg:'Replan triggered: new obstacle',level:'warn'},
      {time:'T+04.0s',msg:'Replan triggered: path oscillation detected',level:'warn'},
      {time:'T+04.5s',msg:'replan_count=7 in 2s (threshold=3)',level:'error'},
      {time:'T+05.0s',msg:'Path length anomaly: 0.1m (was 3.2m)',level:'error'},
      {time:'T+05.5s',msg:'Goal marked UNREACHABLE',level:'error'}
    ],
    answer:'planning',
    explanation:{
      en:'7 replans in 2 seconds with oscillating path and shrinking length indicates the cost map or planner is stuck in a loop. Perception is fine (confidence 0.85). This is a planning layer fault.',
      cn:'2 \u79d2\u5185 7 \u6b21\u91cd\u89c4\u5212\uff0c\u8def\u5f84\u632f\u8361\u4e14\u957f\u5ea6\u7f29\u77ed\uff0c\u8bf4\u660e\u4ee3\u4ef7\u56fe\u6216\u89c4\u5212\u5668\u9677\u5165\u5faa\u73af\u3002\u611f\u77e5\u6b63\u5e38\uff08\u7f6e\u4fe1\u5ea6 0.85\uff09\u3002\u8fd9\u662f\u89c4\u5212\u5c42\u6545\u969c\u3002'
    }
  },
  {
    logs:[
      {time:'T+00.0s',msg:'System boot OK',level:'info'},
      {time:'T+00.5s',msg:'Loading model: perception_v3.onnx',level:'info'},
      {time:'T+01.0s',msg:'Model file not found: perception_v3.onnx',level:'error'},
      {time:'T+01.2s',msg:'Fallback: loading perception_v2.onnx',level:'warn'},
      {time:'T+01.5s',msg:'Model loaded but input shape mismatch: expected 320x240, got 640x480',level:'error'},
      {time:'T+02.0s',msg:'Inference timeout: 5200ms (max: 1000ms)',level:'error'},
      {time:'T+02.5s',msg:'Perception pipeline STALLED',level:'error'},
      {time:'T+03.0s',msg:'Planner: no perception data, waiting...',level:'warn'},
      {time:'T+05.0s',msg:'Navigation timeout: no valid path',level:'error'}
    ],
    answer:'deployment',
    explanation:{
      en:'The model file was missing (v3) and the fallback (v2) had wrong input shape. This is not a perception algorithm problem but a deployment/configuration error -- wrong model version deployed.',
      cn:'\u6a21\u578b\u6587\u4ef6\u7f3a\u5931\uff08v3\uff09\uff0c\u56de\u9000\u7248\u672c\uff08v2\uff09\u8f93\u5165\u5c3a\u5bf8\u4e0d\u5339\u914d\u3002\u8fd9\u4e0d\u662f\u611f\u77e5\u7b97\u6cd5\u95ee\u9898\uff0c\u800c\u662f\u90e8\u7f72/\u914d\u7f6e\u9519\u8bef -- \u90e8\u7f72\u4e86\u9519\u8bef\u7684\u6a21\u578b\u7248\u672c\u3002'
    }
  }
];

var currentCase=0;
var score=0;
var answered=false;
var layers=['perception','planning','deployment','chassis'];

function renderCase(){
  answered=false;
  var c=cases[currentCase];
  var entries=document.getElementById('logEntries');
  entries.innerHTML='';
  c.logs.forEach(function(log,i){
    var div=document.createElement('div');
    div.className='log-entry'+(log.level==='error'?' error':log.level==='warn'?' warn':'');
    div.textContent='['+log.time+'] '+log.msg;
    div.addEventListener('click',function(){
      var all=entries.querySelectorAll('.log-entry');
      all.forEach(function(el){el.classList.remove('selected');});
      div.classList.add('selected');
    });
    entries.appendChild(div);
  });
  var btns=document.getElementById('layerButtons');
  btns.innerHTML='';
  layers.forEach(function(layer){
    var btn=document.createElement('button');
    btn.className='layer-btn';
    btn.dataset.layer=layer;
    var nameKey='layer'+layer.charAt(0).toUpperCase()+layer.slice(1);
    var descKey='desc'+layer.charAt(0).toUpperCase()+layer.slice(1);
    btn.innerHTML='<span class="layer-name">'+t(nameKey)+'</span><span class="layer-desc">'+t(descKey)+'</span>';
    btn.addEventListener('click',function(){
      if(answered)return;
      answered=true;
      var isCorrect=(layer===c.answer);
      if(isCorrect){score++;}
      btn.classList.add(isCorrect?'correct':'wrong');
      if(!isCorrect){
        var correctBtn=btns.querySelector('[data-layer="'+c.answer+'"]');
        if(correctBtn)correctBtn.classList.add('correct');
      }
      var fbText=document.getElementById('fbText');
      fbText.textContent=(isCorrect?t('correct'):t('wrong'))+c.explanation[LANG];
      fbText.style.color=isCorrect?'#10b981':'#ff5f1f';
      updateScore();
      if(currentCase<cases.length-1){
        document.getElementById('nextCaseBtn').style.display='inline-block';
      }else{
        setTimeout(showSummary,1500);
      }
    });
    btns.appendChild(btn);
  });
  document.getElementById('fbText').textContent=t('readyPrompt');
  document.getElementById('fbText').style.color='#c6c6c6';
  document.getElementById('nextCaseBtn').style.display='none';
  updateScore();
}

function updateScore(){
  document.getElementById('scoreDisplay').textContent=t('score')+': '+score+'/'+cases.length;
  document.getElementById('logPanelTitle').textContent=t('logTitle')+' - '+t('caseLabel')+' '+(currentCase+1)+'/'+cases.length;
}

function showSummary(){
  document.getElementById('summaryOverlay').classList.add('visible');
  document.getElementById('summaryTitle').textContent=t('summaryTitle');
  document.getElementById('finalScore').textContent=score+'/'+cases.length;
  document.getElementById('summaryText').textContent=t('summaryText');
  document.getElementById('restartBtn').textContent=t('restart');
}

function refreshI18N(){
  document.getElementById('gameTitle').textContent=t('gameTitle');
  document.getElementById('diagTitle').textContent=t('diagTitle');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideWhat').textContent=t('guideWhat');
  var pts=document.getElementById('guidePoints');
  pts.innerHTML='<li>'+t('guideStep1')+'</li><li>'+t('guideStep2')+'</li><li>'+t('guideStep3')+'</li>';
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  document.getElementById('nextCaseBtn').textContent=t('nextCase');
  renderCase();
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('guideHeader').addEventListener('click',function(){
  var c=document.getElementById('guideContent');var tog=document.getElementById('guideToggle');
  if(c.classList.contains('collapsed')){c.classList.remove('collapsed');tog.textContent='[-]';}
  else{c.classList.add('collapsed');tog.textContent='[+]';}
});
document.getElementById('nextCaseBtn').addEventListener('click',function(){
  currentCase++;renderCase();
});
document.getElementById('restartBtn').addEventListener('click',function(){
  currentCase=0;score=0;answered=false;
  document.getElementById('summaryOverlay').classList.remove('visible');
  renderCase();
});

refreshI18N();
})();
