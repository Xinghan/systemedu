<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#05070a);color:var(--text,#e2e2e9);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#ffb000);text-shadow:0 0 15px var(--glow,rgba(255,176,0,0.3));}
.header .sub{font-size:11px;color:var(--muted,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#05070a);background:linear-gradient(135deg,var(--primary,#ffb000),var(--primary-dim,#cc8d00));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(255,176,0,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(255,176,0,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(17,20,37,0.92));color:var(--muted,#8e90a6);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#ffb000);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#8e90a6);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#ffb000);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb08e;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(17,20,37,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#ffb000);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>

//   5 2021 祝融 — 红色火星地面 + 降落伞尾迹 + 小巡视车

    f6_s1:    {en:'1500', cn:'1500'},

// ============================================================
// Helpers — time scale for 600-year timeline (1500 → 2025)
// ============================================================

// Map a year in [1500, 2025] → x coordinate in [xL, xR].
// Linear scale so Wan Hu (1500) ends up far left and the modern
// cluster (1961, 1969, 2013, 2021) clumps on the right.
function yearToX(year, xL, xR) {
  var t = (year - 1500) / (2025 - 1500);
  if (t < 0) t = 0;
  if (t > 1) t = 1;
  return xL + (xR - xL) * t;
}

// Easing for pulse
function pulse(phase) {
  // phase 0..1 → 0..1..0 breathing
  var p = phase - Math.floor(phase);
  return 0.5 - 0.5 * Math.cos(p * Math.PI * 2);
}

// Global animation clock
var T0 = performance.now();
function now() { return (performance.now() - T0) / 1000; }

// Request continuous redraw while the tab is visible, so the
// pulse / comet / smoke keep animating without needing a frame
// transition. Detect transitions by watching currentFrame change
// and suppress our own rAF redraw during the runtime's 500ms
// transition window (otherwise we'd fight the transition render).
var _lastFrameSeen = 0;
var _transitionEndsAt = 0;
function _rafLoop() {
  if (!AnimRuntime) { requestAnimationFrame(_rafLoop); return; }
  var cf = AnimRuntime.currentFrame;
  if (cf !== _lastFrameSeen) {
    // A transition just started — skip redraws for 550ms.
    _transitionEndsAt = performance.now() + 550;
    _lastFrameSeen = cf;
  }
  if (performance.now() > _transitionEndsAt &&
      typeof AnimRuntime.drawFrame === 'function') {
    AnimRuntime.drawFrame(cf);
  }
  requestAnimationFrame(_rafLoop);
}
function onReady() {
  _lastFrameSeen = AnimRuntime.currentFrame;
  requestAnimationFrame(_rafLoop);
}

// ============================================================
// Custom element: wrapped multi-line text (CJK-aware char wrap)
// Use: {type:'wrap', text, x, y, color, size, maxWidth, lineHeight, align}
// For CJK we break per character; for ASCII we break per word.
// ============================================================

function customDrawElement(ctx, el) {
  if (el.type !== 'wrap') return false;
  var color = el.color || '#fff';
  var size = el.size || 12;
  var mw = el.maxWidth || 300;
  var lh = el.lineHeight || size * 1.45;
  var align = el.align || 'center';
  var bold = el.bold || false;
  ctx.fillStyle = color;
  ctx.font = (bold ? 'bold ' : '') + size + "px 'Inter','Noto Sans SC',sans-serif";
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  var text = el.text || '';
  var lines = [];
  // Greedy wrapping: walk characters, push when width would exceed mw.
  // This treats CJK as per-character and still lets ASCII break at spaces.
  var cur = '';
  function flush() { if (cur.length) { lines.push(cur); cur = ''; } }
  for (var i = 0; i < text.length; i++) {
    var ch = text.charAt(i);
    if (ch === '\n') { flush(); continue; }
    var next = cur + ch;
    var w = ctx.measureText(next).width;
    if (w > mw && cur.length > 0) {
      // If the current ends mid-word (ASCII), try to split at last space.
      var lastSp = cur.lastIndexOf(' ');
      if (lastSp > 0 && ch !== ' ' && /[a-zA-Z0-9]/.test(ch)) {
        var before = cur.slice(0, lastSp);
        var after  = cur.slice(lastSp + 1);
        lines.push(before);
        cur = after + ch;
      } else {
        lines.push(cur);
        cur = ch;
      }
    } else {
      cur = next;
    }
  }
  flush();
  var total = lines.length;
  var startY = el.y - ((total - 1) * lh) / 2;
  for (var li = 0; li < total; li++) {
    ctx.fillText(lines[li], el.x, startY + li * lh);
  }
  return true;
}

// ============================================================
// FRAME ELEMENTS
// ============================================================

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;
  var elems = [];

  // Shared timeline band y-location (we vary it per frame)
  var TL_Y_FULL = 320; // for synthesis frame

  if (f === 0) {
    // ---- Frame 0: cover card ----
    // Main title, subtitle, a small preview timeline.
    elems.push({
      id:'f0_title', type:'label',
      text:t('f0_main'), x:cx, y:cy-70,
      color:P.primary, size:24, align:'center', bold:true,
      glow:P.glowStrong,
    });
    elems.push({
      id:'f0_sub', type:'label',
      text:t('f0_sub'), x:cx, y:cy-38,
      color:P.text, size:14, align:'center',
    });

    // Mini preview line (simple linear, 5 stations)
    var halfW = Math.min(380, W * 0.45);
    var xL = cx - halfW, xR = cx + halfW;
    elems.push({
      id:'f0_line', type:'line',
      x1:xL, y1:cy+30, x2:xR, y2:cy+30,
      color:P.primaryDim, lineWidth:2,
    });
    // Five mini stations on the preview
    var yrs0 = [1500, 1961, 1969, 2013, 2021];
    var cols0 = [P.secondary, P.primary, P.primary, P.tertiary, P.secondaryDim];
    // Alternate label y-offsets so crowded years (1961/1969 and 2013/2021) don't overlap
    var lblDy0 = [22, 22, 42, 22, 42];
    for (var i0 = 0; i0 < yrs0.length; i0++) {
      var px = yearToX(yrs0[i0], xL, xR);
      elems.push({
        id:'f0_stn_'+i0, type:'circle',
        x:px, y:cy+30, r:5,
        fill:cols0[i0], stroke:P.text, lineWidth:1,
        glow:P.glowStrong, glowSize:10,
      });
      elems.push({
        id:'f0_yr_'+i0, type:'label',
        text:yrs0[i0]+'', x:px, y:cy+30+lblDy0[i0],
        color:P.muted, size:10, align:'center',
      });
    }

    elems.push({
      id:'f0_hint', type:'label',
      text:t('f0_tag'), x:cx, y:cy+90,
      color:P.primary, size:12, align:'center',
    });

  } else if (f === 1) {
    // ---- Frame 1: Wan Hu, 1500 AD ----
    // Tiny seated figure on a chair loaded with 47 firework sticks,
    // flames / smoke around him.
    // Composition: scene left, caption block right.
    var sceneCX = W * 0.32;
    var groundY = 270;

    // Ground line

    // Mars sky (ochre)
    elems.push({
      id:'f5_sky', type:'custom',
      draw: function(ctx){
        ctx.save();
        ctx.translate(sceneCX, sceneCY);
        var sky = ctx.createLinearGradient(0, -120, 0, 0);
        sky.addColorStop(0, '#3a1509');
        sky.addColorStop(1, '#8a3a1c');
        ctx.fillStyle = sky;
        ctx.fillRect(-180, -120, 360, 135);
        ctx.restore();
      }
    });

    // Mars ground + rover + parachute trail
    elems.push({
      id:'f5_marsScene', type:'custom',
      draw: function(ctx){
        ctx.save();
        ctx.translate(sceneCX, sceneCY);

        // Ground (reddish-ochre)
        var g = ctx.createLinearGradient(0, 10, 0, 130);
        g.addColorStop(0, '#c56a3d');
        g.addColorStop(1, '#6a2e13');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(-180, 130);
        ctx.lineTo(-180, 20);
        ctx.quadraticCurveTo(0, 5, 180, 20);
        ctx.lineTo(180, 130);
        ctx.closePath();
        ctx.fill();

        // Small rocks
        ctx.fillStyle = 'rgba(90,40,20,0.7)';
        [[-100,80,7],[40,100,5],[-20,50,4],[90,65,6],[-60,40,3]].forEach(function(r){
          ctx.beginPath();
          ctx.ellipse(r[0], r[1], r[2], r[2]*0.5, 0, 0, Math.PI*2);
          ctx.fill();
        });

        // Parachute trail (descending arc, stylized)
        ctx.save();
        ctx.translate(80, -70);
        // Parachute canopy
        ctx.fillStyle = '#f0f0f0';
        ctx.strokeStyle = '#ffb000';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.quadraticCurveTo(0, -22, 18, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // Red segment
        ctx.fillStyle = '#d52e2e';
        ctx.beginPath();
        ctx.moveTo(-9, -11);
        ctx.quadraticCurveTo(0, -22, 9, -11);
        ctx.quadraticCurveTo(0, -6, -9, -11);
        ctx.closePath();
        ctx.fill();
        // Lines to capsule
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-15, -1); ctx.lineTo(0, 14);
        ctx.moveTo(-5, -1);  ctx.lineTo(0, 14);
        ctx.moveTo(5, -1);   ctx.lineTo(0, 14);
        ctx.moveTo(15, -1);  ctx.lineTo(0, 14);
        ctx.stroke();
        // Capsule
        ctx.fillStyle = '#d0b060';
        ctx.beginPath();
        ctx.moveTo(-6, 12); ctx.lineTo(6, 12);
        ctx.lineTo(4, 20); ctx.lineTo(-4, 20);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Dashed descent line from parachute to ground
        ctx.strokeStyle = 'rgba(255,176,0,0.35)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3,4]);
        ctx.beginPath();
        ctx.moveTo(80, -40);
        ctx.quadraticCurveTo(60, -10, 20, 55);
        ctx.stroke();
        ctx.setLineDash([]);

        // Zhurong rover (box + 6 wheels + solar wings + mast)
        ctx.save();
        ctx.translate(0, 62);

        // Wheel tracks behind
        ctx.strokeStyle = 'rgba(60,25,10,0.7)';
        ctx.lineWidth = 2;
        ctx.setLineDash([5,4]);
        ctx.beginPath();
        ctx.moveTo(-80, 14);
        ctx.lineTo(-8, 14);
        ctx.stroke();
        ctx.setLineDash([]);

        // Main body
        ctx.fillStyle = '#d7c06c';
        ctx.strokeStyle = '#6b5510';
        ctx.lineWidth = 1.2;
        ctx.fillRect(-14, -10, 28, 15);
        ctx.strokeRect(-14, -10, 28, 15);
        // Solar wings (butterfly)
        ctx.fillStyle = '#1a3a7a';
        ctx.strokeStyle = '#6990d0';
        ctx.fillRect(-30, -6, 14, 8);
        ctx.strokeRect(-30, -6, 14, 8);
        ctx.fillRect(16, -6, 14, 8);
        ctx.strokeRect(16, -6, 14, 8);
        // Panel stripes
        ctx.strokeStyle = '#a7c0e8';
        ctx.lineWidth = 0.5;
        for (var pl = 0; pl < 3; pl++) {
          var plx = -26 + pl*4;
          ctx.beginPath();
          ctx.moveTo(plx, -6); ctx.lineTo(plx, 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(plx+46, -6); ctx.lineTo(plx+46, 2);
          ctx.stroke();
        }
        // Mast
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(0, -10); ctx.lineTo(0, -20);
        ctx.stroke();
        // Camera head
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(-4, -24, 8, 4);
        // Red "祝融" stripe / CNSA marking
        ctx.fillStyle = '#d52e2e';
        ctx.fillRect(-10, -4, 20, 3);
        // Wheels (6 visible sides)
        ctx.fillStyle = '#2a2a2a';
        for (var zw = 0; zw < 3; zw++) {
          var zwx = -10 + zw*10;
          ctx.beginPath();
          ctx.arc(zwx, 8, 3, 0, Math.PI*2);
          ctx.fill();
          ctx.strokeStyle = '#999';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
        ctx.restore();

        ctx.restore();
      }
    });

    // Rover label
    elems.push({
      id:'f5_roverLabel', type:'label',
      text:t('f5_chip2'), x:sceneCX, y:sceneCY + 90,
      color:P.primary, size:11, align:'center',
    });

    // Caption right
    var capX5 = W * 0.78;
    elems.push({
      id:'f5_yearTag', type:'label',
      text:t('f5_year'), x:capX5, y:70,
      color:P.primary, size:18, align:'center', bold:true,
      glow:P.glowStrong,
    });
    elems.push({
      id:'f5_who', type:'label',
      text:t('f5_who'), x:capX5, y:108,
      color:P.text, size:14, align:'center', bold:true,
    });
    elems.push({
      id:'f5_place', type:'label',
      text:t('f5_place'), x:capX5, y:140,
      color:P.secondaryDim, size:11, align:'center',
    });
    elems.push({
      id:'f5_why', type:'wrap',
      text:t('f5_why'), x:capX5, y:215,
      color:P.muted, size:12, align:'center',
      maxWidth: Math.max(180, W*0.28), lineHeight: 18,
    });

    addMiniTimeline(elems, 'f5', W, 2021, P);

  } else if (f === 6) {
    // ---- Frame 6: synthesis — full 600-year timeline with comet sweep ----
    var xL = W * 0.06, xR = W * 0.94;

    // Title
    elems.push({
      id:'f6_title', type:'label',
      text:t('f6_title'), x:cx, y:70,
      color:P.primary, size:20, align:'center', bold:true,
      glow:P.glowStrong,
    });
    elems.push({
      id:'f6_sub', type:'wrap',
      text:t('f6_sub'), x:cx, y:105,
      color:P.text, size:13, align:'center',
      maxWidth: W*0.8, lineHeight: 20,
    });

    // Main timeline band
    var lineY = 220;

    // Gradient "rail"
    elems.push({
      id:'f6_rail', type:'custom',
      draw: function(ctx){
        ctx.save();
        var g = ctx.createLinearGradient(xL, 0, xR, 0);
        g.addColorStop(0.0, 'rgba(255,176,0,0.15)');
        g.addColorStop(0.5, 'rgba(255,176,0,0.3)');
        g.addColorStop(1.0, 'rgba(255,176,0,0.8)');
        ctx.strokeStyle = g;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(xL, lineY);
        ctx.lineTo(xR, lineY);
        ctx.stroke();
        ctx.restore();
      }
    });

    // Year ticks every 100 years 1500..2000
    var ticksYears = [1500,1600,1700,1800,1900,2000];
    ticksYears.forEach(function(y, i) {
      var tx = yearToX(y, xL, xR);
      elems.push({
        id:'f6_tick_'+i, type:'line',
        x1:tx, y1:lineY-6, x2:tx, y2:lineY+6,
        color:'rgba(255,255,255,0.4)', lineWidth:1,
      });
      elems.push({
        id:'f6_tickL_'+i, type:'label',
        text:y+'', x:tx, y:lineY+22,
        color:P.muted, size:10, align:'center',
      });
    });

    // Gap annotation (1500..1961 = 461 years)
    var gx1 = yearToX(1500, xL, xR);
    var gx2 = yearToX(1961, xL, xR);
    elems.push({
      id:'f6_gapBracket', type:'custom',
      draw: function(ctx){
        ctx.save();
        ctx.strokeStyle = 'rgba(255,176,142,0.6)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3,3]);
        ctx.beginPath();
        ctx.moveTo(gx1, lineY-30); ctx.lineTo(gx2, lineY-30);
        ctx.moveTo(gx1, lineY-30); ctx.lineTo(gx1, lineY-6);
        ctx.moveTo(gx2, lineY-30); ctx.lineTo(gx2, lineY-6);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    });
    elems.push({
      id:'f6_gapLabel', type:'label',
      text:t('f6_gap'), x:(gx1+gx2)/2, y:lineY-42,
      color:'#ffb08e', size:12, align:'center',
    });

    // 5 stations with names + years
    var stations = [
      {y:1500, key:'f6_s1', name:'Wan Hu', nameCn:'\u4e07\u6237',  col:P.secondary,   dy:48},
      {y:1961, key:'f6_s2', name:'Gagarin',nameCn:'\u52a0\u52a0\u6797', col:P.primary, dy:48},
      {y:1969, key:'f6_s3', name:'Apollo', nameCn:'\u963f\u6ce2\u7f57', col:P.primary, dy:82},
      {y:2013, key:'f6_s4', name:"Chang'e",nameCn:'\u5ae6\u5a25',   col:P.tertiary,   dy:48},
      {y:2021, key:'f6_s5', name:'Zhurong',nameCn:'\u795d\u878d',   col:P.secondaryDim, dy:82},
    ];
    var lang = (AnimRuntime && AnimRuntime.LANG) || 'cn';
    stations.forEach(function(st, i){
      var sx = yearToX(st.y, xL, xR);
      // Pulsing station
      var ph = pulse(now()*0.5 + i*0.15);
      var r = 7 + ph*3;
      // Halo
      elems.push({
        id:'f6_halo_'+i, type:'circle',
        x:sx, y:lineY, r:14 + ph*6,
        fill:'rgba(255,176,0,' + (0.1 + ph*0.1) + ')',
      });
      // Core
      elems.push({
        id:'f6_st_'+i, type:'circle',
        x:sx, y:lineY, r:r,
        fill:st.col, stroke:P.text, lineWidth:1.2,
        glow:st.col, glowSize:14,
      });
      // Year label (alt y-offset for crowded pairs 1961/1969 and 2013/2021)
      elems.push({
        id:'f6_yr_'+i, type:'label',
        text:st.y+'', x:sx, y:lineY+st.dy,
        color:P.primary, size:12, align:'center', bold:true,
      });
      // Figure name (language-aware)
      elems.push({
        id:'f6_nm_'+i, type:'label',
        text: (lang === 'en' ? st.name : st.nameCn),
        x:sx, y:lineY+st.dy+18,
        color:P.text, size:11, align:'center',
      });
      // Vertical tick
      elems.push({
        id:'f6_vt_'+i, type:'line',
        x1:sx, y1:lineY-12, x2:sx, y2:lineY+12,
        color:st.col, lineWidth:1.5,
      });
    });

    // Moving comet (baton sweep)
    var sweep = (now() * 0.16) % 1.2; // slight pause between sweeps
    var sweepP = Math.min(1, sweep / 1);
    var cmx = xL + (xR - xL) * sweepP;
    if (sweepP < 1) {
      // Tail
      elems.push({
        id:'f6_cometTail', type:'custom',
        draw: function(ctx){
          ctx.save();
          var tailLen = 110;
          var gr = ctx.createLinearGradient(cmx - tailLen, lineY, cmx, lineY);
          gr.addColorStop(0, 'rgba(255,176,0,0)');
          gr.addColorStop(1, 'rgba(255,220,120,0.9)');
          ctx.fillStyle = gr;
          ctx.beginPath();
          ctx.moveTo(cmx - tailLen, lineY);
          ctx.quadraticCurveTo(cmx - tailLen/2, lineY-8, cmx, lineY-3);
          ctx.lineTo(cmx, lineY+3);
          ctx.quadraticCurveTo(cmx - tailLen/2, lineY+8, cmx - tailLen, lineY);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      });
      // Comet head
      elems.push({
        id:'f6_comet', type:'circle',
        x:cmx, y:lineY, r:6,
        fill:'#fff3c4', stroke:'#ffb000', lineWidth:1.5,
        glow:'#ffb000', glowSize:18,
      });
    }

    // Arrow "You are here" pointing to 2025 end
    var nowX = yearToX(2025, xL, xR);
    elems.push({
      id:'f6_nowMark', type:'custom',
      draw: function(ctx){
        ctx.save();
        // Pulsing vertical mark
        var p = pulse(now()*0.8);
        ctx.strokeStyle = 'rgba(255,220,120,' + (0.5 + p*0.4) + ')';
        ctx.lineWidth = 2;
        ctx.setLineDash([3,3]);
        ctx.beginPath();
        ctx.moveTo(nowX, lineY-40);
        ctx.lineTo(nowX, lineY+40);
        ctx.stroke();
        ctx.setLineDash([]);
        // Arrow head down
        ctx.fillStyle = P.primary;
        ctx.beginPath();
        ctx.moveTo(nowX, lineY-14);
        ctx.lineTo(nowX - 5, lineY-22);
        ctx.lineTo(nowX + 5, lineY-22);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    });
    elems.push({
      id:'f6_now', type:'label',
      text:t('f6_now'), x:nowX, y:lineY-32,
      color:P.primary, size:11, align:'center', bold:true,
    });

    // Legend chip bar top-right of canvas (but still inside safe area)
    // We skip a legend to keep it clean; stations already labeled.

  }

  return elems;
}

// ============================================================
// Shared mini-timeline helper — appears on frames 1..5 at y≈370
// The active year is highlighted.
// ============================================================

function addMiniTimeline(elems, prefix, W, activeYear, P) {
  var xL = W * 0.08, xR = W * 0.92;
  var y = 372;
  // Base line
  elems.push({
    id:prefix+'_mini_line', type:'line',
    x1:xL, y1:y, x2:xR, y2:y,
    color:'rgba(255,176,0,0.3)', lineWidth:2,
  });
  // Stations
  var years = [1500, 1961, 1969, 2013, 2021];
  years.forEach(function(yr, i){
    var px = yearToX(yr, xL, xR);
    var active = (yr === activeYear);
    elems.push({
      id:prefix+'_mini_st_'+i, type:'circle',
      x:px, y:y, r: active ? 6 : 3,
      fill: active ? P.primary : P.secondaryDim,
      stroke: active ? P.text : null,
      lineWidth: active ? 1.2 : 0,
      glow: active ? P.primary : null,
      glowSize: active ? 14 : 0,
    });
    if (active) {
      elems.push({
        id:prefix+'_mini_year_'+i, type:'label',
        text: yr+'',
        x:px, y:y-14,
        color:P.primary, size:10, align:'center', bold:true,
      });
    }
  });
}

// ============================================================
// Custom background — starfield + subtle warm glow
// ============================================================

function drawBg(ctx, W, H) {
  var P = AnimRuntime.PAL;
  // Deep background gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, P.bg);
  g.addColorStop(1, P.bg2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Subtle stars
  for (var i = 0; i < 60; i++) {
    var sx = ((i*113) % W);
    var sy = ((i*197) % H);
    var a = 0.15 + ((i*7) % 10) / 50;
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Warm radial glow at bottom
  var rg = ctx.createRadialGradient(W*0.5, H*1.1, H*0.2, W*0.5, H*1.1, H*1.2);
  rg.addColorStop(0, 'rgba(255,120,40,0.12)');
  rg.addColorStop(1, 'rgba(255,120,40,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);
}

// ============================================================
// BOOT
// ============================================================

AnimRuntime.boot();
</script>
