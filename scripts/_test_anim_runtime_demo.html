<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<!-- Shared Runtime -->
<script src="animation_runtime.js"></script>

<!-- Content: Capability Boundary Map (ares_mission theme) -->
<script>
// Pipeline stage confidence per frame
var stages = ['stageImage','stageSeg','stageRisk','stagePath','stageCtrl','stageOutput'];
var frameConf = [
  [0.98, 0.96, 0.95, 0.94, 0.96, 0.95],
  [0.85, 0.65, 0.72, 0.70, 0.74, 0.72],
  [0.40, 0.38, 0.42, 0.35, 0.39, 0.41],
  [0.80, 0.75, 0.35, 0.30, 0.42, 0.38],
  [0.30, 0.20, 0.15, 0.12, 0.10, 0.15]
];

function confColor(c) {
  if (c >= 0.7) return {main: '#10b981', glow: 'rgba(16,185,129,0.3)'};
  if (c >= 0.4) return {main: '#fbbf24', glow: 'rgba(251,191,36,0.3)'};
  return {main: '#ef4444', glow: 'rgba(239,68,68,0.3)'};
}
function confLabel(c) {
  var t = AnimRuntime.t;
  if (c >= 0.7) return t('labelTrust');
  if (c >= 0.4) return t('labelDegraded');
  return t('labelFail');
}

var CONFIG = {
  style: 'ares_mission',
  totalFrames: 5,

  i18n: {
    title:    {en: 'CAPABILITY BOUNDARY MAP', cn: '\u7cfb\u7edf\u80fd\u529b\u8fb9\u754c\u56fe'},
    subtitle: {en: 'End-to-End Pipeline Trust Analysis', cn: '\u7aef\u5230\u7aef\u7ba1\u7ebf\u4fe1\u4efb\u5206\u6790'},
    guideTitle: {en: 'OBSERVATION GUIDE', cn: '\u89c2\u5bdf\u6307\u5357'},
    g1: {en: 'Green = trusted, Yellow = degraded, Red = untrusted', cn: '\u7eff\u8272=\u53ef\u4fe1\u4efb\u3001\u9ec4\u8272=\u9000\u5316\u3001\u7ea2\u8272=\u4e0d\u53ef\u4fe1\u4efb'},
    g2: {en: 'Each stage passes confidence to the next', cn: '\u6bcf\u4e2a\u9636\u6bb5\u7684\u7f6e\u4fe1\u5ea6\u4f20\u9012\u5230\u4e0b\u4e00\u9636\u6bb5'},
    g3: {en: 'Notice cascade failures in later frames', cn: '\u6ce8\u610f\u540e\u7eed\u5e27\u4e2d\u7684\u7ea7\u8054\u5931\u8d25'},
    f0_cond: {en: 'IDEAL',           cn: '\u7406\u60f3\u6761\u4ef6'},
    f1_cond: {en: 'LOW LIGHT',       cn: '\u4f4e\u5149\u7167'},
    f2_cond: {en: 'DUST STORM',      cn: '\u6c99\u5c18\u66b4'},
    f3_cond: {en: 'UNKNOWN TERRAIN', cn: '\u672a\u77e5\u5730\u5f62'},
    f4_cond: {en: 'COMBINED STRESS', cn: '\u590d\u5408\u538b\u529b'},
    stageImage:  {en: 'IMAGE',    cn: '\u56fe\u50cf'},
    stageSeg:    {en: 'SEGMENT',  cn: '\u5206\u5272'},
    stageRisk:   {en: 'RISK MAP', cn: '\u98ce\u9669\u56fe'},
    stagePath:   {en: 'PATH',     cn: '\u8def\u5f84'},
    stageCtrl:   {en: 'CONTROL',  cn: '\u8f66\u63a7'},
    stageOutput: {en: 'OUTPUT',   cn: '\u8f93\u51fa'},
    labelTrust:    {en: 'TRUST',    cn: '\u4fe1\u4efb'},
    labelDegraded: {en: 'DEGRADED', cn: '\u9000\u5316'},
    labelFail:     {en: 'FAIL',     cn: '\u5931\u8d25'},
    hudL1: {en: 'CONDITION',     cn: '\u8f93\u5165\u6761\u4ef6'},
    hudL2: {en: 'WEAKEST STAGE', cn: '\u6700\u5f31\u73af\u8282'},
    hudL3: {en: 'OVERALL TRUST', cn: '\u6574\u4f53\u4fe1\u4efb'},
    hudL4: {en: 'DEFECTS HIT',   cn: '\u547d\u4e2d\u7f3a\u9677'},
    f0_weak: {en: 'NONE',           cn: '\u65e0'},
    f1_weak: {en: 'SEGMENTATION',   cn: '\u8bed\u4e49\u5206\u5272'},
    f2_weak: {en: 'IMAGE INPUT',    cn: '\u56fe\u50cf\u8f93\u5165'},
    f3_weak: {en: 'RISK MAPPING',   cn: '\u98ce\u9669\u5efa\u56fe'},
    f4_weak: {en: 'FULL CASCADE',   cn: '\u5168\u94fe\u7ea7\u8054'},
    f0_trust: {en: 'HIGH (95%)',     cn: '\u9ad8 (95%)'},
    f1_trust: {en: 'MEDIUM (72%)',   cn: '\u4e2d (72%)'},
    f2_trust: {en: 'LOW (41%)',      cn: '\u4f4e (41%)'},
    f3_trust: {en: 'LOW (38%)',      cn: '\u4f4e (38%)'},
    f4_trust: {en: 'CRITICAL (15%)', cn: '\u4e25\u91cd (15%)'},
    f0_defects: {en: '0 / 6', cn: '0 / 6'},
    f1_defects: {en: '1 / 6', cn: '1 / 6'},
    f2_defects: {en: '2 / 6', cn: '2 / 6'},
    f3_defects: {en: '3 / 6', cn: '3 / 6'},
    f4_defects: {en: '5 / 6', cn: '5 / 6'},
  },

  hudLabels: ['hudL1', 'hudL2', 'hudL3', 'hudL4'],
  hudValues: [
    ['f0_cond', 'f0_weak', 'f0_trust', 'f0_defects'],
    ['f1_cond', 'f1_weak', 'f1_trust', 'f1_defects'],
    ['f2_cond', 'f2_weak', 'f2_trust', 'f2_defects'],
    ['f3_cond', 'f3_weak', 'f3_trust', 'f3_defects'],
    ['f4_cond', 'f4_weak', 'f4_trust', 'f4_defects'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

// Custom element: stage box with confidence bar
function customDrawElement(ctx, el) {
  if (el.type !== 'stageBox') return false;
  var P = AnimRuntime.PAL;
  var cc = confColor(el.conf);
  // Glow
  ctx.shadowColor = cc.glow; ctx.shadowBlur = 16;
  // Box background
  var grad = ctx.createLinearGradient(el.x, el.y, el.x, el.y + el.h);
  grad.addColorStop(0, 'rgba(53,53,52,0.9)');
  grad.addColorStop(1, P.surface);
  ctx.fillStyle = grad;
  ctx.fillRect(el.x, el.y, el.w, el.h);
  ctx.shadowBlur = 0;
  // Top confidence bar
  var barGrad = ctx.createLinearGradient(el.x, el.y, el.x + el.w, el.y);
  barGrad.addColorStop(0, cc.main);
  barGrad.addColorStop(1, cc.glow);
  ctx.fillStyle = barGrad;
  ctx.fillRect(el.x, el.y, el.w * el.conf, 4);
  // Ghost border
  ctx.strokeStyle = 'rgba(138,136,134,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(el.x, el.y, el.w, el.h);
  return true;
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var confs = frameConf[f];
  var elems = [];
  var stageCount = stages.length;
  var boxW = Math.min(80, W * 0.11);
  var gap = Math.max(12, (W - stageCount * boxW) / (stageCount + 1));
  var totalWidth = stageCount * boxW + (stageCount - 1) * gap;
  var startX = (W - totalWidth) / 2;
  var cy = H * 0.38;
  var boxH = boxW * 1.1;

  // Title
  elems.push({id: 'title', type: 'label', text: t('title'), x: W / 2, y: H * 0.08,
    color: P.primary, size: Math.max(14, W * 0.022), align: 'center', alpha: 1});

  // Condition label
  elems.push({id: 'condition', type: 'label', text: t('f' + f + '_cond'), x: W / 2, y: H * 0.16,
    color: P.tertiary || '#00daf3', size: Math.max(12, W * 0.016), align: 'center', alpha: 1});

  // Pipeline stages
  for (var i = 0; i < stageCount; i++) {
    var sx = startX + i * (boxW + gap);
    var conf = confs[i];
    var cc = confColor(conf);

    // Stage box (custom type)
    elems.push({id: 'box' + i, type: 'stageBox', x: sx, y: cy - boxH / 2, w: boxW, h: boxH,
      conf: conf, alpha: 1});

    // Stage label
    elems.push({id: 'slabel' + i, type: 'label', text: t(stages[i]),
      x: sx + boxW / 2, y: cy + boxH / 2 + 16, color: P.muted, size: Math.max(9, W * 0.01),
      align: 'center', alpha: 1});

    // Confidence percentage
    elems.push({id: 'cpct' + i, type: 'label', text: Math.round(conf * 100) + '%',
      x: sx + boxW / 2, y: cy + 4, color: cc.main, size: Math.max(13, W * 0.018),
      align: 'center', alpha: 1});

    // Confidence status
    elems.push({id: 'cstat' + i, type: 'label', text: confLabel(conf),
      x: sx + boxW / 2, y: cy + 22, color: cc.main, size: Math.max(8, W * 0.009),
      align: 'center', alpha: 1});

    // Arrow to next stage
    if (i < stageCount - 1) {
      var ax1 = sx + boxW + 4;
      var ax2 = sx + boxW + gap - 4;
      var arrowColor = confColor(Math.min(conf, confs[i + 1])).main;
      elems.push({id: 'arrow' + i, type: 'arrow', x1: ax1, y1: cy, x2: ax2, y2: cy,
        color: arrowColor, alpha: 1});
    }
  }

  // Boundary line (custom draw)
  var boundaryY = H * 0.72;
  elems.push({id: 'boundary', type: 'custom', x: startX, y: boundaryY, w: totalWidth, h: 2,
    alpha: 1, draw: function(alpha) {
      var c = AnimRuntime.ctx;
      c.globalAlpha = alpha * 0.6;
      var grad = c.createLinearGradient(startX, 0, startX + totalWidth, 0);
      grad.addColorStop(0, 'rgba(255,95,31,0)');
      grad.addColorStop(0.2, P.secondary || '#ff5f1f');
      grad.addColorStop(0.8, P.secondary || '#ff5f1f');
      grad.addColorStop(1, 'rgba(255,95,31,0)');
      c.fillStyle = grad;
      c.fillRect(startX, boundaryY, totalWidth, 2);
      c.globalAlpha = alpha;
    }});

  // Boundary label
  elems.push({id: 'blabel', type: 'label',
    text: t('labelTrust') + ' / ' + t('labelFail') + ' BOUNDARY',
    x: W / 2, y: boundaryY + 18, color: P.secondary || '#ff5f1f',
    size: Math.max(9, W * 0.01), align: 'center', alpha: 1});

  return elems;
}

AnimRuntime.boot();
</script>
</body>
</html>
