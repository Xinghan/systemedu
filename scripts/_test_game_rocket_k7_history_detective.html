<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<title>Spaceflight History Detective</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:#05070a;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:#070a14;border-bottom:1px solid rgba(255,176,0,0.18);flex-shrink:0;}
.header h1{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;color:#ffb000;letter-spacing:-0.02em;}
.header .sub{font-size:10px;color:#8e90a6;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
.header .right{display:flex;align-items:center;gap:18px;}
.header .stat{font-family:'Space Grotesk';font-size:10px;color:#8e90a6;letter-spacing:0.08em;text-align:right;}
.header .stat b{display:block;font-size:16px;color:#ffb000;font-weight:700;font-family:'Space Grotesk';letter-spacing:0.02em;}
.hearts{display:flex;gap:3px;}
.heart{width:14px;height:14px;transition:opacity .3s;}
.heart.lost{opacity:0.18;filter:grayscale(1);}
.lang-btn{font-family:'Space Grotesk';font-size:10px;padding:5px 11px;cursor:pointer;border:1px solid rgba(255,176,0,0.35);background:rgba(17,20,37,0.85);color:#ffb59c;letter-spacing:1px;}
.lang-btn:hover{border-color:#ffb000;color:#ffb000;}
.reset-btn{font-family:'Space Grotesk';font-size:9px;padding:5px 10px;background:transparent;border:1px solid rgba(142,144,166,0.3);color:#8e90a6;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;}
.reset-btn:hover{color:#ff716c;border-color:#ff716c;}
.stage-wrap{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px;padding:10px 14px;overflow:hidden;}
.round-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 0;flex-shrink:0;}
.round-label{font-family:'Space Grotesk';font-size:10px;letter-spacing:0.14em;color:#8e90a6;text-transform:uppercase;}
.round-label b{color:#ffb000;font-size:13px;margin:0 4px;}
.round-dots{display:flex;gap:5px;}
.round-dot{width:8px;height:8px;border-radius:50%;background:rgba(142,144,166,0.2);}
.round-dot.active{background:#ffb000;box-shadow:0 0 6px rgba(255,176,0,0.55);}
.round-dot.done{background:#50ffb0;}
.round-dot.missed{background:#ff716c;}
.section-title{font-family:'Space Grotesk';font-size:10px;letter-spacing:0.16em;color:#ffb000;text-transform:uppercase;padding:2px 0 4px;display:flex;align-items:center;gap:10px;}
.section-title .sep{flex:1;height:1px;background:rgba(255,176,0,0.15);}

/* Candidates */
.candidates-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;flex-shrink:0;}
.cand-card{background:rgba(17,20,37,0.85);border:1.5px solid rgba(142,144,166,0.22);padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:border-color .15s,transform .1s,background .15s;position:relative;overflow:hidden;}
.cand-card:hover:not(.locked):not(.disabled){border-color:#ffb000;background:rgba(255,176,0,0.05);transform:translateY(-2px);}
.cand-card.locked{cursor:not-allowed;opacity:0.55;}
.cand-card.disabled{cursor:not-allowed;opacity:0.35;}
.cand-card.correct{border-color:#50ffb0;background:rgba(80,255,176,0.1);animation:flashCorrect 0.6s ease-out;}
.cand-card.wrong{border-color:#ff716c;background:rgba(255,113,108,0.08);animation:shakeWrong 0.45s ease-out;}
@keyframes flashCorrect{0%,100%{box-shadow:0 0 0 0 rgba(80,255,176,0);}50%{box-shadow:0 0 0 6px rgba(80,255,176,0.3);}}
@keyframes shakeWrong{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.cand-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(7,10,20,0.9);border:1px solid rgba(255,176,0,0.25);border-radius:50%;flex-shrink:0;}
.cand-icon svg{width:30px;height:30px;}
.cand-name{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:12px;font-weight:700;color:#e2e2e9;text-align:center;line-height:1.25;}
.cand-year{font-family:'Space Grotesk';font-size:9px;color:#8e90a6;letter-spacing:0.12em;}
.cand-card.correct .cand-name,.cand-card.correct .cand-year{color:#50ffb0;}
.cand-card.wrong .cand-name,.cand-card.wrong .cand-year{color:#ff716c;}

/* Clues */
.clues-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex-shrink:0;}
.clue-card{aspect-ratio:1.6;background:linear-gradient(135deg,#141831,#0a0d1d);border:1.5px solid rgba(255,176,0,0.22);position:relative;cursor:pointer;perspective:800px;transition:transform .15s,border-color .15s;}
.clue-card:hover:not(.revealed):not(.locked){border-color:#ffb000;transform:translateY(-2px);}
.clue-card.locked{cursor:not-allowed;opacity:0.45;}
.clue-card.revealed{cursor:default;border-color:rgba(255,176,0,0.45);}
.clue-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,.1,.2,1);}
.clue-card.revealed .clue-inner{transform:rotateY(180deg);}
.clue-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;}
.clue-face.back{transform:rotateY(180deg);background:rgba(7,10,20,0.92);justify-content:flex-start;align-items:flex-start;padding:8px 10px 10px;}
.clue-icon{width:32px;height:32px;margin-bottom:6px;opacity:0.7;display:flex;align-items:center;justify-content:center;}
.clue-icon svg{width:100%;height:100%;}
.clue-kind{font-family:'Space Grotesk';font-size:10px;letter-spacing:0.16em;color:#ffb000;text-transform:uppercase;}
.clue-hint-front{font-family:'Space Grotesk';font-size:9px;color:#8e90a6;letter-spacing:0.08em;margin-top:4px;}
.clue-face.back .clue-kind-small{font-family:'Space Grotesk';font-size:8px;letter-spacing:0.2em;color:#ff9d3d;text-transform:uppercase;margin-bottom:4px;opacity:0.75;}
.clue-face.back .clue-text{font-size:12px;color:#e2e2e9;line-height:1.5;text-align:left;font-family:'Inter','Noto Sans SC',sans-serif;}

/* Prompt banner */
.prompt-banner{background:rgba(17,20,37,0.85);border:1px solid rgba(255,176,0,0.25);border-left:3px solid #ffb000;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.prompt-banner .icon{width:22px;height:22px;flex-shrink:0;opacity:0.85;}
.prompt-banner .txt{flex:1;font-size:12px;color:#e2e2e9;line-height:1.5;}
.prompt-banner .txt b{color:#ffb000;}
.prompt-banner.ok{border-left-color:#50ffb0;}
.prompt-banner.ok .txt b{color:#50ffb0;}
.prompt-banner.warn{border-left-color:#ff716c;}
.prompt-banner.warn .txt b{color:#ff716c;}

/* Bottom actions */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 4px;flex-shrink:0;gap:10px;margin-top:auto;}
.bottom-bar .hint{font-size:10px;color:#8e90a6;font-family:'Space Grotesk';letter-spacing:0.1em;text-transform:uppercase;}
.bottom-actions{display:flex;gap:8px;align-items:center;}

/* Overlay (recap + synthesis) */
.overlay{position:fixed;inset:0;background:rgba(3,4,8,0.96);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.overlay.show{display:flex;}
.overlay-card{background:rgba(17,20,37,0.95);border:1px solid rgba(255,176,0,0.35);padding:22px 28px;max-width:min(92%,720px);width:100%;max-height:92vh;overflow-y:auto;}
.overlay-title{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:20px;color:#ffb000;letter-spacing:0.02em;font-weight:700;text-align:center;margin-bottom:4px;}
.overlay-sub{font-size:11px;color:#8e90a6;letter-spacing:0.12em;text-transform:uppercase;text-align:center;margin-bottom:18px;}
.recap-head{display:flex;align-items:center;gap:12px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid rgba(255,176,0,0.18);}
.recap-head .icon-big{width:56px;height:56px;flex-shrink:0;background:rgba(7,10,20,0.9);border:1px solid rgba(255,176,0,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.recap-head .icon-big svg{width:38px;height:38px;}
.recap-head .name-block h2{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:20px;color:#ffb000;font-weight:700;letter-spacing:-0.01em;}
.recap-head .name-block .y{font-family:'Space Grotesk';font-size:11px;color:#8e90a6;letter-spacing:0.14em;margin-top:2px;}
.recap-story{font-size:13px;color:#e2e2e9;line-height:1.75;margin-bottom:14px;}
.recap-story p{margin-bottom:8px;}
.recap-quote{border-left:3px solid #ffb000;padding:8px 14px;font-family:'Inter','Noto Sans SC',sans-serif;font-style:italic;color:#ffb59c;background:rgba(255,176,0,0.05);font-size:13px;line-height:1.7;margin:10px 0 14px;}
.recap-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag-chip{font-family:'Space Grotesk';font-size:10px;padding:3px 8px;border:1px solid rgba(142,144,166,0.3);color:#8e90a6;letter-spacing:0.08em;text-transform:uppercase;}
.round-score{text-align:center;font-family:'Space Grotesk';font-size:14px;color:#50ffb0;letter-spacing:0.06em;padding:8px;background:rgba(80,255,176,0.06);border:1px solid rgba(80,255,176,0.25);margin-bottom:14px;}
.round-score b{font-size:22px;font-weight:700;color:#50ffb0;}
.round-score.zero{color:#ff716c;background:rgba(255,113,108,0.06);border-color:rgba(255,113,108,0.25);}
.round-score.zero b{color:#ff716c;}
.done-btn{display:block;margin:6px auto 0;font-family:'Space Grotesk';font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:10px 28px;border:none;cursor:pointer;color:#05070a;background:linear-gradient(135deg,#ffb000,#ff5f1f);transition:transform .1s;}
.done-btn:hover{transform:scale(1.04);}
.done-btn.final{background:linear-gradient(135deg,#50ffb0,#00daf3);}

/* Synthesis timeline */
.timeline-box{padding:18px 0 10px;position:relative;}
.timeline-svg{width:100%;height:auto;display:block;}
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 16px;}
.stat-box{background:rgba(7,10,20,0.7);border:1px solid rgba(255,176,0,0.18);padding:10px;text-align:center;}
.stat-box .lab{font-family:'Space Grotesk';font-size:9px;letter-spacing:0.14em;color:#8e90a6;text-transform:uppercase;}
.stat-box .val{font-family:'Space Grotesk';font-size:22px;color:#ffb000;font-weight:700;margin-top:3px;}
.stat-box.good .val{color:#50ffb0;}
.synthesis-caption{text-align:center;font-size:13px;color:#e2e2e9;line-height:1.7;margin-top:10px;padding:0 10px;}
.synthesis-caption b{color:#ffb000;}

/* Toast */
.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(17,20,37,0.95);border:1px solid #ffb000;padding:8px 18px;font-size:12px;color:#ffb000;letter-spacing:0.04em;z-index:50;display:none;font-family:'Space Grotesk','Noto Sans SC',sans-serif;}
.toast.show{display:block;animation:toastIn 0.3s ease-out;}
.toast.ok{border-color:#50ffb0;color:#50ffb0;}
.toast.bad{border-color:#ff716c;color:#ff716c;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}

/* Intro overlay */
.intro-card{text-align:center;max-width:520px;}
.intro-card h2{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:22px;color:#ffb000;margin-bottom:6px;font-weight:700;}
.intro-card .intro-sub{font-size:11px;color:#8e90a6;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:18px;}
.intro-rules{text-align:left;margin:14px 0 22px;padding:14px 18px;background:rgba(7,10,20,0.6);border:1px solid rgba(255,176,0,0.2);font-size:13px;line-height:1.8;color:#e2e2e9;}
.intro-rules li{list-style:none;padding-left:22px;position:relative;margin-bottom:4px;}
.intro-rules li::before{content:"";position:absolute;left:4px;top:9px;width:6px;height:6px;background:#ffb000;border-radius:50%;}
.intro-rules b{color:#ffb000;}

@media (max-width:780px){
  .candidates-row{grid-template-columns:repeat(5,1fr);gap:5px;}
  .cand-icon{width:36px;height:36px;}
  .cand-icon svg{width:24px;height:24px;}
  .cand-name{font-size:11px;}
  .cand-year{font-size:8px;}
  .clues-row{grid-template-columns:repeat(2,1fr);}
  .clue-face.back .clue-text{font-size:11px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <header class="header">
    <div>
      <h1 id="titleText"></h1>
      <div class="sub" id="subtitleText"></div>
    </div>
    <div class="right">
      <div class="stat"><span id="scoreLabel"></span><b id="scoreVal">0</b></div>
      <div>
        <div class="stat" style="text-align:left;"><span id="heartsLabel"></span></div>
        <div class="hearts" id="heartsBox"></div>
      </div>
      <button class="reset-btn" id="resetBtn"></button>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </header>

  <main class="stage-wrap">
    <div class="round-bar">
      <div class="round-label"><span id="roundWord"></span> <b id="roundNum">1</b> / <span id="roundTotal">5</span></div>
      <div class="round-dots" id="roundDots"></div>
      <div class="round-label"><span id="cluesUsedLabel"></span> <b id="cluesUsedVal">0</b>/4</div>
    </div>

    <div class="section-title"><span id="suspectsTitle"></span><span class="sep"></span><span id="suspectsHint"></span></div>
    <div class="candidates-row" id="candidatesRow"></div>

    <div class="section-title"><span id="cluesTitle"></span><span class="sep"></span><span id="cluesHint"></span></div>
    <div class="clues-row" id="cluesRow"></div>

    <div class="prompt-banner" id="promptBanner">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ffb000" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
      <div class="txt" id="promptText"></div>
    </div>

    <div class="bottom-bar">
      <div class="hint" id="bottomHint"></div>
      <div class="bottom-actions">
        <button class="reset-btn" id="newCaseBtn" style="display:none;"></button>
      </div>
    </div>
  </main>
</div>

<!-- Intro overlay -->
<div class="overlay show" id="introOverlay">
  <div class="overlay-card intro-card">
    <h2 id="introTitle"></h2>
    <div class="intro-sub" id="introSub"></div>
    <ul class="intro-rules">
      <li id="introRule1"></li>
      <li id="introRule2"></li>
      <li id="introRule3"></li>
      <li id="introRule4"></li>
    </ul>
    <button class="done-btn" id="introStartBtn"></button>
  </div>
</div>

<!-- Recap overlay -->
<div class="overlay" id="recapOverlay">
  <div class="overlay-card">
    <div id="recapBody"></div>
    <button class="done-btn" id="recapNextBtn"></button>
  </div>
</div>

<!-- Final synthesis overlay -->
<div class="overlay" id="finalOverlay">
  <div class="overlay-card">
    <div class="overlay-title" id="finalTitle"></div>
    <div class="overlay-sub" id="finalSub"></div>
    <div class="summary-stats">
      <div class="stat-box good"><div class="lab" id="finalScoreLab"></div><div class="val" id="finalScoreVal">0</div></div>
      <div class="stat-box"><div class="lab" id="finalSolvedLab"></div><div class="val" id="finalSolvedVal">0/5</div></div>
      <div class="stat-box"><div class="lab" id="finalAvgLab"></div><div class="val" id="finalAvgVal">0.0</div></div>
    </div>
    <div class="timeline-box">
      <svg class="timeline-svg" id="timelineSvg" viewBox="0 0 720 220" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="synthesis-caption" id="synthesisCaption"></div>
    <button class="done-btn final" id="finalRestartBtn"></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========================= DATA =========================
const CANDIDATES = [
  {
    id:'wanhu',
    year:1500,
    yearLabel:{zh:'约 1500 年·明朝', en:'c. 1500 · Ming Dynasty'},
    name:{zh:'万户', en:'Wan Hu'},
    icon:'chair',
    color:'#d45a1e',
    clues:{
      time:{
        zh:['这是中国古代的事情，比美国独立还要早两百多年。','大约发生在 1500 年前后的明朝中期。'],
        en:['Ancient China, more than two centuries before the USA existed.','Around the year 1500, middle of the Ming Dynasty.']
      },
      place:{
        zh:['故事发生在中国一个安静的院子里。','一间明朝官员自家的后院，地上铺着青砖。'],
        en:['A quiet courtyard somewhere in China.','The back yard of a Ming Dynasty official, paved with grey brick.']
      },
      event:{
        zh:['这个人把自己绑在了一件家具上——那是一张椅子。','他把 47 支火药筒绑到椅子背上，两手各拎一只风筝。'],
        en:['He strapped himself to a chair.','He tied 47 gunpowder rockets behind the chair, held a kite in each hand.']
      },
      outcome:{
        zh:['点火之后一声巨响，人没能活下来。','但六百年后，月球背面有一座环形山用他的名字命名。'],
        en:['After ignition there was a loud boom; he did not survive.','Yet six centuries later a crater on the far side of the Moon was named after him.']
      }
    },
    story:{
      zh:[
        '大约在 1500 年前后的明朝中期，有一位名叫万户（也写作"万虎"）的官员。他痴迷于一个念头：人能不能飞上天？',
        '于是他把自己绑在一把木椅上，在椅子背后绑了 47 支当时最强的火药筒，两只手各拿一只风筝——他希望火药把他推上去，风筝让他飘下来。',
        '点火的那一刻，浓烟翻滚，爆炸声震动院子。等烟散去的时候，万户已经不在了。',
        '他的实验没有成功，可是故事被传了下来。1970 年，国际天文学联合会把月球背面一座环形山命名为 "Wan-Hoo"，用来纪念这位敢想敢做的古代先驱。'
      ],
      en:[
        'Around 1500 AD, during the middle of the Ming Dynasty, a Chinese official named Wan Hu became obsessed with one question: could a person fly?',
        'He strapped himself to a wooden chair, tied 47 of the strongest gunpowder rockets of his era to its back, and held a kite in each hand. The rockets would lift him; the kites would let him glide down.',
        'At the moment of ignition, smoke billowed and a thunderous boom shook the courtyard. When the smoke cleared, Wan Hu was gone.',
        'The experiment failed, but the story was passed down. In 1970, the International Astronomical Union named a crater on the far side of the Moon "Wan-Hoo" to honor this ancient dreamer.'
      ]
    },
    quote:{zh:'"一个六百年前，敢把自己绑在火药上的人。"', en:'"A man who, six centuries ago, dared to strap himself to gunpowder."'},
    tags:{zh:['明朝','中国','第一次尝试','梦想先驱'], en:['Ming Dynasty','China','First Attempt','Pioneer']}
  },
  {
    id:'gagarin',
    year:1961,
    yearLabel:{zh:'1961 年·苏联', en:'1961 · USSR'},
    name:{zh:'尤里·加加林', en:'Yuri Gagarin'},
    icon:'capsule',
    color:'#ff716c',
    clues:{
      time:{
        zh:['事情发生在冷战时期，大约是 20 世纪 60 年代初。','1961 年 4 月 12 日的早上，一个春天的清晨。'],
        en:['During the Cold War, early 1960s.','On the morning of April 12, 1961, a spring dawn.']
      },
      place:{
        zh:['发射地点在苏联，拜科努尔航天中心。','飞船叫"东方一号"（Vostok 1），沿着椭圆轨道绕地球飞了 108 分钟。'],
        en:['Launched from the Baikonur Cosmodrome in the Soviet Union.','The spacecraft, Vostok 1, orbited Earth once in 108 minutes.']
      },
      event:{
        zh:['他成为人类历史上第一个进入外太空的人。','从轨道上俯瞰，他说了一句著名的话。'],
        en:['He became the first human ever to enter outer space.','Looking down from orbit, he said one famous thing.']
      },
      outcome:{
        zh:['他说："地球是蓝色的。"','这句话成了整个 20 世纪最被引用的航天语录之一。'],
        en:['He said: "The Earth is blue."','That sentence became one of the most quoted lines of the space age.']
      }
    },
    story:{

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toast(msg, kind){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show';
  if(kind) el.classList.add(kind);
  clearTimeout(el._to);
  el._to = setTimeout(() => el.classList.remove('show'), 1800);
}

  document.getElementById('introRule4').innerHTML = t('introRule4');
  document.getElementById('introStartBtn').textContent = t('introStart');
  document.getElementById('finalTitle').textContent = t('finalTitle');
  document.getElementById('finalSub').textContent = t('finalSub');
  document.getElementById('finalScoreLab').textContent = t('finalScoreLab');
  document.getElementById('finalSolvedLab').textContent = t('finalSolvedLab');
  document.getElementById('finalAvgLab').textContent = t('finalAvgLab');
  document.getElementById('synthesisCaption').innerHTML = t('synthesisCap');
  document.getElementById('finalRestartBtn').textContent = t('finalRestart');
  document.title = t('title');
}

function renderHearts(){
  const box = document.getElementById('heartsBox');
  box.innerHTML = '';
  for(let i = 0; i < 3; i++){
    const span = document.createElement('span');
    span.innerHTML = ICON_SVGS.heart;
    const svg = span.firstElementChild;
    svg.classList.add('heart');
    if(i >= STATE.hearts) svg.classList.add('lost');
    box.appendChild(svg);
  }
}

function renderRoundDots(){
  const box = document.getElementById('roundDots');
  box.innerHTML = '';
  for(let i = 0; i < 5; i++){
    const dot = document.createElement('span');
    dot.className = 'round-dot';
    if(i < STATE.currentIdx){
      const ok = STATE.roundOutcome[i];
      dot.classList.add(ok === 'solved' ? 'done' : 'missed');
    } else if(i === STATE.currentIdx){
      dot.classList.add('active');
    }
    box.appendChild(dot);
  }
}

function renderCandidates(){
  const row = document.getElementById('candidatesRow');
  row.innerHTML = '';
  CANDIDATES.forEach(c => {
    const card = document.createElement('div');
    card.className = 'cand-card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="cand-icon">${ICON_SVGS[c.icon]}</div>
      <div class="cand-name">${c.name[LANG]}</div>
      <div class="cand-year">${c.yearLabel[LANG]}</div>
    `;
    card.addEventListener('click', () => handleGuess(c.id));
    row.appendChild(card);
  });
}

function renderClues(){
  const row = document.getElementById('cluesRow');
  row.innerHTML = '';
  STATE.clueOrder.forEach((kind, i) => {
    const card = document.createElement('div');
    card.className = 'clue-card';
    if(STATE.revealed[i]) card.classList.add('revealed');
    const kindDef = CLUE_KINDS.find(k => k.key === kind);
    const clueTexts = STATE.target.clues[kind][LANG];
    // Earlier click order = vaguer clue (index 0); later click = precise (index 1)
    const order = STATE.revealOrder[i];
    const textIdx = order === null ? 0 : (order < 2 ? 0 : 1);
    const txt = clueTexts[Math.min(textIdx, clueTexts.length-1)];
    card.innerHTML = `
      <div class="clue-inner">
        <div class="clue-face front">
          <div class="clue-icon">${ICON_SVGS[kindDef.icon]}</div>
          <div class="clue-kind">${kindDef.label[LANG]}</div>
          <div class="clue-hint-front">${LANG === 'zh' ? '点击翻开' : 'Click to flip'}</div>
        </div>
        <div class="clue-face back">
          <div class="clue-kind-small">${kindDef.label[LANG]}</div>
          <div class="clue-text">${txt}</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => handleClueClick(i));
    row.appendChild(card);
  });
  document.getElementById('cluesUsedVal').textContent = STATE.revealed.filter(Boolean).length;
}

function updatePrompt(kind, text){
  const banner = document.getElementById('promptBanner');
  banner.classList.remove('ok','warn');
  if(kind === 'ok') banner.classList.add('ok');
  if(kind === 'warn') banner.classList.add('warn');
  document.getElementById('promptText').innerHTML = text;
}

function updateScore(){
  document.getElementById('scoreVal').textContent = STATE.score;
}

function updateRoundNum(){
  document.getElementById('roundNum').textContent = STATE.currentIdx + 1;
}

// ========================= GAME LOGIC =========================
function startRound(){
  STATE.target = CANDIDATES.find(c => c.id === STATE.order[STATE.currentIdx]);
  STATE.revealed = [false,false,false,false];
  STATE.revealOrder = [null,null,null,null];
  STATE.nextReveal = 0;
  STATE.clueOrder = shuffle(CLUE_KINDS.map(k => k.key));
  STATE.locked = false;
  STATE.answered = false;
  renderCandidates();
  renderClues();
  renderRoundDots();
  updateRoundNum();
  updatePrompt(null, t('promptInit'));
  document.getElementById('cluesUsedVal').textContent = 0;
  document.getElementById('newCaseBtn').style.display = 'none';
}

function handleClueClick(i){
  if(STATE.locked || STATE.answered) return;
  if(STATE.revealed[i]) return;
  STATE.revealed[i] = true;
  STATE.revealOrder[i] = STATE.nextReveal;
  STATE.nextReveal += 1;
  renderClues();
  const used = STATE.revealed.filter(Boolean).length;
  if(used >= 4){
    updatePrompt('warn', t('promptOutOfClues'));
  } else {
    updatePrompt(null, t('promptAfterClue'));
  }
}

function handleGuess(candId){
  if(STATE.locked || STATE.answered) return;
  const isCorrect = candId === STATE.target.id;
  const row = document.getElementById('candidatesRow');
  const card = row.querySelector(`[data-id="${candId}"]`);
  if(!card) return;
  if(isCorrect){
    card.classList.add('correct');
    STATE.answered = true;
    STATE.locked = true;
    const cluesUsed = STATE.revealed.filter(Boolean).length;
    const effective = Math.max(1, cluesUsed); // if guessed at 0 clues revealed, count as 1
    const roundPts = (5 - effective) * 25;
    STATE.score += roundPts;
    STATE.roundScores.push(roundPts);
    STATE.roundClueCounts.push(cluesUsed);
    STATE.roundOutcome.push('solved');
    updateScore();
    updatePrompt('ok', t('promptCorrect'));
    toast(t('toastCorrect', {n: roundPts}), 'ok');
    row.querySelectorAll('.cand-card').forEach(c => { if(c !== card) c.classList.add('locked'); });
    // reveal all clues for consolidation then show recap
    setTimeout(() => {
      STATE.revealed = [true,true,true,true];
      // fill in revealOrder for any still-null positions as "late" so they show precise text
      for(let k = 0; k < 4; k++){
        if(STATE.revealOrder[k] === null){ STATE.revealOrder[k] = STATE.nextReveal++; }
      }
      renderClues();
      document.getElementById('cluesUsedVal').textContent = cluesUsed;
      setTimeout(() => openRecap(true, roundPts, cluesUsed), 650);
    }, 900);
  } else {
    card.classList.add('wrong');
    STATE.hearts -= 1;
    renderHearts();
    toast(t('toastWrong'), 'bad');
    if(STATE.hearts <= 0){
      STATE.answered = true;
      STATE.locked = true;
      STATE.roundScores.push(0);
      STATE.roundClueCounts.push(STATE.revealed.filter(Boolean).length);
      STATE.roundOutcome.push('missed');
      updatePrompt('warn', t('promptNoHearts'));
      setTimeout(() => {
        STATE.revealed = [true,true,true,true];
        for(let k = 0; k < 4; k++){
          if(STATE.revealOrder[k] === null){ STATE.revealOrder[k] = STATE.nextReveal++; }
        }
        renderClues();
        setTimeout(() => openRecap(false, 0, STATE.roundClueCounts[STATE.roundClueCounts.length-1]), 700);
      }, 700);
    } else {
      setTimeout(() => {
        card.classList.remove('wrong');
        card.classList.add('disabled');
        card.style.pointerEvents = 'none';
        updatePrompt('warn', t('promptWrong'));
      }, 650);
    }
  }
}

function openRecap(solved, pts, cluesUsed){
  const body = document.getElementById('recapBody');
  const c = STATE.target;
  const scoreClass = solved ? '' : 'zero';
  const scoreTxt = solved ? t('scoreBreakdown', {n: pts, c: cluesUsed}) : t('scoreZero');
  body.innerHTML = `
    <div class="overlay-title">${solved ? t('promptCorrect') : t('revealedAs')}</div>
    <div class="overlay-sub">${c.yearLabel[LANG]}</div>
    <div class="recap-head">
      <div class="icon-big">${ICON_SVGS[c.icon]}</div>
      <div class="name-block">
        <h2>${c.name[LANG]}</h2>
        <div class="y">${c.yearLabel[LANG]}</div>
      </div>
    </div>
    <div class="recap-story">
      ${c.story[LANG].map(p => `<p>${p}</p>`).join('')}
    </div>
    <div class="recap-quote">${c.quote[LANG]}</div>
    <div class="recap-tags">
      ${c.tags[LANG].map(tag => `<span class="tag-chip">${tag}</span>`).join('')}
    </div>
    <div class="round-score ${scoreClass}">
      <b>${solved ? '+' + pts : 0}</b>
      <div>${scoreTxt}</div>
    </div>
  `;
  const isLast = STATE.currentIdx >= 4;
  document.getElementById('recapNextBtn').textContent = isLast ? t('recapFinish') : t('recapNext');
  document.getElementById('recapOverlay').classList.add('show');
}

function nextRound(){
  document.getElementById('recapOverlay').classList.remove('show');
  STATE.currentIdx += 1;
  STATE.hearts = 3;  // refill hearts per round so single bad round doesn't doom game
  renderHearts();
  if(STATE.currentIdx >= 5){
    openFinal();
  } else {
    startRound();
  }
}

function openFinal(){
  const solved = STATE.roundOutcome.filter(o => o === 'solved').length;
  const totalClues = STATE.roundClueCounts.reduce((a,b) => a+b, 0);
  const avg = solved > 0 ? (STATE.roundClueCounts.filter((_,i) => STATE.roundOutcome[i] === 'solved').reduce((a,b) => a+b, 0) / solved).toFixed(1) : '—';
  document.getElementById('finalScoreVal').textContent = STATE.score;
  document.getElementById('finalSolvedVal').textContent = solved + '/5';
  document.getElementById('finalAvgVal').textContent = avg;
  drawTimeline();
  document.getElementById('finalOverlay').classList.add('show');
}

function drawTimeline(){
  const svg = document.getElementById('timelineSvg');
  const W = 720, H = 220;
  const marginL = 40, marginR = 40, marginT = 40, marginB = 70;
  const baseY = H - marginB;
  // sort by year
  const sorted = CANDIDATES.slice().sort((a,b) => a.year - b.year);
  const yearMin = sorted[0].year - 40;  // 1460
  const yearMax = sorted[sorted.length-1].year + 30;  // 2051
  const xFor = y => marginL + (y - yearMin)/(yearMax - yearMin) * (W - marginL - marginR);

  let html = '';
  // background axis
  html += `<line x1="${marginL-10}" y1="${baseY}" x2="${W-marginR+10}" y2="${baseY}" stroke="rgba(255,176,0,0.5)" stroke-width="1.5"/>`;
  // decorative tick marks at century boundaries
  [1500,1600,1700,1800,1900,2000].forEach(yr => {
    const x = xFor(yr);
    html += `<line x1="${x}" y1="${baseY-4}" x2="${x}" y2="${baseY+4}" stroke="rgba(142,144,166,0.5)" stroke-width="1"/>`;
    html += `<text x="${x}" y="${baseY+18}" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#8e90a6">${yr}</text>`;
  });

  // distribute labels to avoid overlap — alternate above / below
  const bubbles = sorted.map((c, i) => {
    const x = xFor(c.year);
    const above = i % 2 === 0;
    const y = above ? baseY - 60 : baseY - 30;
    const labelY = above ? y - 18 : baseY + 40;
    return {c, x, y, labelY, above};
  });
  // stems + dots
  bubbles.forEach(({c,x,y}) => {
    html += `<line x1="${x}" y1="${baseY}" x2="${x}" y2="${y}" stroke="rgba(255,176,0,0.35)" stroke-width="1" stroke-dasharray="2 2"/>`;
    html += `<circle cx="${x}" cy="${baseY}" r="4.5" fill="${c.color}" stroke="#05070a" stroke-width="1.5"/>`;
  });
  // icons / name bubbles
  bubbles.forEach(({c,x,y,labelY,above}, idx) => {
    const solvedIdx = STATE.order.indexOf(c.id);
    const wasSolved = STATE.roundOutcome[solvedIdx] === 'solved';
    const outlineColor = wasSolved ? '#50ffb0' : (STATE.roundOutcome[solvedIdx] === 'missed' ? '#ff716c' : c.color);
    html += `<g transform="translate(${x},${y})">`;
    html += `<circle r="14" fill="rgba(7,10,20,0.95)" stroke="${outlineColor}" stroke-width="1.5"/>`;
    // inline the icon SVG at scale: replace root viewBox with positioned attributes
    const iconMarkup = ICON_SVGS[c.icon].replace('<svg ', '<svg x="-10" y="-10" width="20" height="20" ');
    html += iconMarkup;
    html += `</g>`;
    // label (name + year)
    const labelAnchor = 'middle';
    html += `<text x="${x}" y="${labelY}" text-anchor="${labelAnchor}" font-family="'Space Grotesk','Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="${c.color}">${c.name[LANG]}</text>`;
    html += `<text x="${x}" y="${labelY + 13}" text-anchor="${labelAnchor}" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#8e90a6" letter-spacing="0.08em">${c.year}</text>`;
  });
  // arrows showing direction of time
  html += `<polygon points="${W-marginR+5},${baseY} ${W-marginR-2},${baseY-4} ${W-marginR-2},${baseY+4}" fill="rgba(255,176,0,0.7)"/>`;
  html += `<text x="${W-marginR+2}" y="${baseY-8}" text-anchor="end" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#8e90a6" letter-spacing="0.1em">${LANG === 'zh' ? '时间' : 'TIME'}</text>`;

  svg.innerHTML = html;
}

function resetGame(){
  STATE.order = shuffle(CANDIDATES.map(c => c.id));
  STATE.currentIdx = 0;
  STATE.score = 0;
  STATE.hearts = 3;
  STATE.roundScores = [];
  STATE.roundClueCounts = [];
  STATE.roundOutcome = [];
  renderHearts();
  updateScore();
  renderRoundDots();
  startRound();
  document.getElementById('recapOverlay').classList.remove('show');
  document.getElementById('finalOverlay').classList.remove('show');
}

// ========================= EVENTS =========================
document.getElementById('langBtn').addEventListener('click', () => {
  LANG = LANG === 'zh' ? 'en' : 'zh';
  document.getElementById('langBtn').textContent = LANG === 'zh' ? 'EN' : 'ZH';
  document.documentElement.lang = LANG;
  renderStaticLabels();
  renderCandidates();
  if(STATE.target) renderClues();
  if(document.getElementById('recapOverlay').classList.contains('show')){
    // refresh recap
    const last = STATE.roundOutcome[STATE.currentIdx];
    const solved = last === 'solved';
    const pts = STATE.roundScores[STATE.roundScores.length-1] || 0;
    const cluesUsed = STATE.roundClueCounts[STATE.roundClueCounts.length-1] || 0;
    openRecap(solved, pts, cluesUsed);
  }
  if(document.getElementById('finalOverlay').classList.contains('show')){
    drawTimeline();
    document.getElementById('synthesisCaption').innerHTML = t('synthesisCap');
  }
  // current-state-aware prompt
  if(STATE.answered){
    // leave last prompt alone
  } else if(STATE.revealed.some(Boolean) && STATE.revealed.every(Boolean)){
    updatePrompt('warn', t('promptOutOfClues'));
  } else if(STATE.revealed.some(Boolean)){
    updatePrompt(null, t('promptAfterClue'));
  } else if(STATE.target){
    updatePrompt(null, t('promptInit'));
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  resetGame();
});

document.getElementById('newCaseBtn').addEventListener('click', () => {
  nextRound();
});

document.getElementById('recapNextBtn').addEventListener('click', () => {
  nextRound();
});

document.getElementById('finalRestartBtn').addEventListener('click', () => {
  document.getElementById('finalOverlay').classList.remove('show');
  resetGame();
});

document.getElementById('introStartBtn').addEventListener('click', () => {
  document.getElementById('introOverlay').classList.remove('show');
  resetGame();
});

// ========================= INIT =========================
STATE.order = shuffle(CANDIDATES.map(c => c.id));
renderStaticLabels();
renderHearts();
updateScore();
renderRoundDots();
// placeholder first render (no target yet until user starts)
STATE.target = CANDIDATES[0];
STATE.clueOrder = CLUE_KINDS.map(k => k.key);
renderCandidates();
renderClues();
// Lock board until intro dismissed
STATE.locked = true;
document.getElementById('promptText').innerHTML = t('promptInit');
</script>
