<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Regression Protocol Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh}
.header{padding:8px 16px 4px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .subtitle{font-size:11px;color:#8a8886;margin-top:2px}
.game-area{flex:1;min-height:0;display:flex;gap:8px;padding:8px 12px;overflow:hidden}
.panel{background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);padding:10px;display:flex;flex-direction:column;overflow-y:auto}
.panel-left{flex:0 0 32%}
.panel-center{flex:1}
.panel-right{flex:0 0 26%}
.panel h2{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#00daf3;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;flex-shrink:0}
.task-item{display:flex;align-items:center;gap:6px;padding:6px 8px;margin-bottom:4px;cursor:pointer;border:1px solid rgba(138,136,134,0.1);background:rgba(53,53,52,0.3);transition:all 0.2s}
.task-item:hover{background:rgba(255,127,80,0.1)}
.task-item.selected{border-color:#ff7f50;background:rgba(255,127,80,0.15)}
.task-item .task-check{width:16px;height:16px;border:1px solid #8a8886;display:flex;align-items:center;justify-content:center;font-size:10px;color:#10b981;flex-shrink:0}
.task-item .task-check.checked{border-color:#10b981;background:rgba(16,185,129,0.15)}
.task-item .task-name{font-size:11px;color:#e5e2e1;flex:1}
.task-item .task-diff{font-size:9px;color:#8a8886;font-family:'Space Grotesk',sans-serif}
.slider-group{margin-bottom:10px}
.slider-group label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;margin-bottom:4px}
.slider-group label span{color:#ffb59c;font-weight:700}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;background:rgba(53,53,52,0.6);height:6px;outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#ff7f50;cursor:pointer}
.run-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:10px;cursor:pointer;border:1px solid #ff7f50;background:rgba(255,127,80,0.15);color:#ffb59c;letter-spacing:1px;text-transform:uppercase;margin-top:8px;text-align:center;transition:background 0.2s}
.run-btn:hover{background:rgba(255,127,80,0.3)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.results-area{flex:1;overflow-y:auto;margin-top:8px}
.result-row{display:flex;align-items:center;gap:4px;padding:4px 6px;margin-bottom:3px;font-size:10px;font-family:'Space Grotesk',sans-serif}
.result-row .r-task{flex:1;color:#c6c6c6}
.result-row .r-score{width:40px;text-align:right;font-weight:700}
.result-row .r-status{width:32px;text-align:center;font-weight:700;font-size:9px}
.verdict-box{margin-top:8px;padding:10px;border:1px solid rgba(138,136,134,0.15);text-align:center}
.verdict-box .v-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.verdict-box .v-score{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin:4px 0}
.verdict-box .v-status{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px}
.hud{display:flex;justify-content:space-around;padding:6px 16px;flex-shrink:0;background:rgba(0,0,0,0.55);height:40px;align-items:center}
.hud-item{text-align:center}
.hud-item .hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.hud-item .hud-value{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#00daf3;font-weight:700}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:36vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:14px;line-height:1.5}
.feedback-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;background:rgba(20,20,35,0.95);backdrop-filter:blur(16px);border:1px solid rgba(0,218,243,0.3);padding:20px;z-index:200;text-align:center}
.feedback-panel h2{font-family:'Space Grotesk',sans-serif;font-size:16px;color:#00daf3;margin-bottom:12px}
.feedback-panel p{font-size:12px;color:#c6c6c6;line-height:1.6;margin-bottom:8px}
.feedback-panel .close-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;padding:6px 20px;cursor:pointer;border:1px solid #00daf3;background:rgba(0,218,243,0.1);color:#00daf3;margin-top:8px}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideGoal" style="margin-bottom:6px"></p>
    <ul id="guideSteps"></ul>
    <p id="guideTips" style="margin-top:6px;color:#ffb59c;font-size:10px"></p>
  </div>
</div>
<div class="feedback-panel" id="feedbackPanel">
  <h2 id="fbTitle"></h2>
  <p id="fbBody"></p>
  <p id="fbScore" style="font-size:18px;font-weight:700;color:#00daf3"></p>
  <button class="close-btn" id="fbClose"></button>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="mainTitle"></h1>
    <div class="subtitle" id="mainSubtitle"></div>
  </div>
  <div class="game-area">
    <div class="panel panel-left" id="taskPanel">
      <h2 id="taskPanelTitle"></h2>
      <div id="taskList"></div>
    </div>
    <div class="panel panel-center" id="configPanel">
      <h2 id="configTitle"></h2>
      <div id="sliders"></div>
      <button class="run-btn" id="runBtn" disabled></button>
    </div>
    <div class="panel panel-right" id="resultPanel">
      <h2 id="resultTitle"></h2>
      <div class="results-area" id="resultsArea"></div>
      <div class="verdict-box" id="verdictBox" style="display:none">
        <div class="v-label" id="vLabel"></div>
        <div class="v-score" id="vScore"></div>
        <div class="v-status" id="vStatus"></div>
      </div>
    </div>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1">0</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2">--</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3">--</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-value" id="hudV4">0</div></div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'REGRESSION PROTOCOL DESIGNER',cn:'\u56DE\u5F52\u6D4B\u8BD5\u534F\u8BAE\u8BBE\u8BA1\u5668'},
  subtitle:{en:'Select tasks, set thresholds, run the test, judge the result',cn:'\u9009\u62E9\u4EFB\u52A1\u3001\u8BBE\u5B9A\u9608\u503C\u3001\u8DD1\u6D4B\u8BD5\u3001\u5224\u5B9A\u7ED3\u679C'},
  guideTitle:{en:'GAME GUIDE',cn:'\u6E38\u620F\u6307\u5357'},
  guideGoal:{en:'Design a regression test protocol by selecting fixed tasks and setting scoring thresholds.',cn:'\u901A\u8FC7\u9009\u62E9\u56FA\u5B9A\u4EFB\u52A1\u548C\u8BBE\u5B9A\u8BC4\u5206\u9608\u503C\uFF0C\u8BBE\u8BA1\u4E00\u4E2A\u56DE\u5F52\u6D4B\u8BD5\u534F\u8BAE\u3002'},
  guideS1:{en:'1. Select at least 3 tasks from the left panel',cn:'1. \u4ECE\u5DE6\u4FA7\u9762\u677F\u9009\u62E9\u81F3\u5C113\u4E2A\u4EFB\u52A1'},
  guideS2:{en:'2. Adjust safety/efficiency/coverage/time thresholds',cn:'2. \u8C03\u6574\u5B89\u5168/\u6548\u7387/\u8986\u76D6/\u7528\u65F6\u9608\u503C'},
  guideS3:{en:'3. Click RUN TEST to simulate both versions',cn:'3. \u70B9\u51FB\u8FD0\u884C\u6D4B\u8BD5\u6A21\u62DF\u4E24\u4E2A\u7248\u672C'},
  guideS4:{en:'4. Review results and see which version passes',cn:'4. \u67E5\u770B\u7ED3\u679C\uFF0C\u770B\u54EA\u4E2A\u7248\u672C\u901A\u8FC7'},
  guideTips:{en:'Tip: Choose tasks that cover different terrains for better coverage.',cn:'\u63D0\u793A\uFF1A\u9009\u62E9\u8986\u76D6\u4E0D\u540C\u5730\u5F62\u7684\u4EFB\u52A1\u4EE5\u83B7\u5F97\u66F4\u597D\u7684\u8986\u76D6\u7387\u3002'},
  winCond:{en:'Win: Create a protocol that correctly differentiates v1.0 from v2.0',cn:'\u80DC\u5229\u6761\u4EF6\uFF1A\u521B\u5EFA\u80FD\u6B63\u786E\u533A\u5206 v1.0 \u548C v2.0 \u7684\u534F\u8BAE'},
  taskPanelTitle:{en:'TEST TASKS',cn:'\u6D4B\u8BD5\u4EFB\u52A1'},
  configTitle:{en:'SCORING THRESHOLDS',cn:'\u8BC4\u5206\u9608\u503C'},
  resultTitle:{en:'TEST RESULTS',cn:'\u6D4B\u8BD5\u7ED3\u679C'},
  runBtn:{en:'RUN REGRESSION TEST',cn:'\u8FD0\u884C\u56DE\u5F52\u6D4B\u8BD5'},
  hudSelected:{en:'SELECTED',cn:'\u5DF2\u9009\u4EFB\u52A1'},
  hudSafetyTh:{en:'SAFETY TH',cn:'\u5B89\u5168\u9608\u503C'},
  hudTotalTh:{en:'TOTAL TH',cn:'\u603B\u5206\u9608\u503C'},
  hudRuns:{en:'RUNS',cn:'\u8FD0\u884C\u6B21\u6570'},
  safety:{en:'SAFETY',cn:'\u5B89\u5168\u6027'},
  efficiency:{en:'EFFICIENCY',cn:'\u6548\u7387'},
  coverage:{en:'COVERAGE',cn:'\u8986\u76D6\u7387'},
  time:{en:'TIME',cn:'\u7528\u65F6'},
  safetyThLabel:{en:'SAFETY THRESHOLD',cn:'\u5B89\u5168\u6027\u9608\u503C'},
  efficiencyThLabel:{en:'EFFICIENCY THRESHOLD',cn:'\u6548\u7387\u9608\u503C'},
  coverageThLabel:{en:'COVERAGE THRESHOLD',cn:'\u8986\u76D6\u7387\u9608\u503C'},
  timeThLabel:{en:'TIME THRESHOLD',cn:'\u7528\u65F6\u9608\u503C'},
  totalThLabel:{en:'TOTAL SCORE THRESHOLD',cn:'\u603B\u5206\u9608\u503C'},
  safetyWLabel:{en:'SAFETY WEIGHT',cn:'\u5B89\u5168\u6027\u6743\u91CD'},
  pass:{en:'PASS',cn:'\u901A\u8FC7'},
  fail:{en:'FAIL',cn:'\u5931\u8D25'},
  verdict:{en:'VERDICT',cn:'\u5224\u5B9A'},
  v1Label:{en:'v1.0',cn:'v1.0'},
  v2Label:{en:'v2.0',cn:'v2.0'},
  fbTitleWin:{en:'PROTOCOL EFFECTIVE!',cn:'\u534F\u8BAE\u6709\u6548\uFF01'},
  fbTitlePartial:{en:'PARTIALLY EFFECTIVE',cn:'\u90E8\u5206\u6709\u6548'},
  fbTitleFail:{en:'NEEDS IMPROVEMENT',cn:'\u9700\u8981\u6539\u8FDB'},
  fbWin:{en:'Your protocol successfully differentiated the two versions with clear pass/fail results. This is exactly how regression testing works in production.',cn:'\u4F60\u7684\u534F\u8BAE\u6210\u529F\u533A\u5206\u4E86\u4E24\u4E2A\u7248\u672C\uFF0C\u7ED9\u51FA\u4E86\u660E\u786E\u7684\u901A\u8FC7/\u5931\u8D25\u7ED3\u679C\u3002\u8FD9\u6B63\u662F\u751F\u4EA7\u73AF\u5883\u4E2D\u56DE\u5F52\u6D4B\u8BD5\u7684\u5DE5\u4F5C\u65B9\u5F0F\u3002'},
  fbPartial:{en:'Both versions got the same result. Try adjusting thresholds to differentiate them.',cn:'\u4E24\u4E2A\u7248\u672C\u5F97\u5230\u4E86\u76F8\u540C\u7ED3\u679C\u3002\u8BD5\u8BD5\u8C03\u6574\u9608\u503C\u6765\u533A\u5206\u5B83\u4EEC\u3002'},
  fbFailBody:{en:'Not enough tasks selected or thresholds too extreme. Add more tasks and balance your thresholds.',cn:'\u4EFB\u52A1\u9009\u62E9\u4E0D\u8DB3\u6216\u9608\u503C\u8FC7\u4E8E\u6781\u7AEF\u3002\u589E\u52A0\u4EFB\u52A1\u5E76\u5E73\u8861\u9608\u503C\u3002'},
  close:{en:'CLOSE',cn:'\u5173\u95ED'},
  minTasks:{en:'Select at least 3 tasks',cn:'\u81F3\u5C11\u9009\u62E93\u4E2A\u4EFB\u52A1'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k}

var TASKS=[
  {id:'flat',name:{en:'Flat terrain navigation',cn:'\u5E73\u5766\u5730\u5F62\u5BFC\u822A'},diff:'D3',v1:{s:92,e:85,c:90,t:88},v2:{s:95,e:90,c:92,t:91}},
  {id:'rock',name:{en:'Rock field bypass',cn:'\u5CA9\u77F3\u573A\u7ED5\u884C'},diff:'D6',v1:{s:78,e:72,c:80,t:70},v2:{s:88,e:80,c:85,t:82}},
  {id:'dune',name:{en:'Sand dune climbing',cn:'\u6C99\u4E18\u722C\u5347'},diff:'D7',v1:{s:85,e:65,c:70,t:60},v2:{s:82,e:78,c:75,t:75}},
  {id:'crater',name:{en:'Crater edge traversal',cn:'\u9668\u77F3\u5751\u8FB9\u7F18\u7A7F\u8D8A'},diff:'D8',v1:{s:70,e:60,c:65,t:55},v2:{s:90,e:75,c:88,t:72}},
  {id:'hazard',name:{en:'Hazard zone detection',cn:'\u5371\u9669\u533A\u68C0\u6D4B'},diff:'D5',v1:{s:88,e:80,c:75,t:82},v2:{s:91,e:82,c:80,t:85}},
  {id:'slope',name:{en:'Steep slope descent',cn:'\u9661\u5761\u4E0B\u964D'},diff:'D7',v1:{s:75,e:68,c:72,t:65},v2:{s:86,e:76,c:78,t:78}},
  {id:'estop',name:{en:'Emergency stop test',cn:'\u7D27\u6025\u505C\u8F66\u6D4B\u8BD5'},diff:'D4',v1:{s:95,e:90,c:85,t:92},v2:{s:93,e:88,c:82,t:90}},
  {id:'night',name:{en:'Low-light navigation',cn:'\u4F4E\u5149\u7167\u5BFC\u822A'},diff:'D8',v1:{s:65,e:55,c:60,t:50},v2:{s:80,e:72,c:75,t:70}}
];

var selectedTasks=[];
var thresholds={safety:85,efficiency:70,coverage:75,time:60,total:80,safetyW:30};
var runs=0;

function buildTaskList(){
  var list=document.getElementById('taskList');list.innerHTML='';
  TASKS.forEach(function(task,idx){
    var div=document.createElement('div');
    div.className='task-item'+(selectedTasks.indexOf(idx)>=0?' selected':'');
    var chk=document.createElement('div');
    chk.className='task-check'+(selectedTasks.indexOf(idx)>=0?' checked':'');
    chk.textContent=selectedTasks.indexOf(idx)>=0?'V':'';
    var name=document.createElement('div');name.className='task-name';name.textContent=task.name[LANG]||task.name.en;
    var diff=document.createElement('div');diff.className='task-diff';diff.textContent=task.diff;
    div.appendChild(chk);div.appendChild(name);div.appendChild(diff);
    div.addEventListener('click',function(){toggleTask(idx)});
    list.appendChild(div);
  });
}

function toggleTask(idx){
  var pos=selectedTasks.indexOf(idx);
  if(pos>=0)selectedTasks.splice(pos,1);else selectedTasks.push(idx);
  buildTaskList();updateHUD();
  document.getElementById('runBtn').disabled=selectedTasks.length<3;
  document.getElementById('runBtn').textContent=selectedTasks.length<3?t('minTasks'):t('runBtn');
}

function buildSliders(){
  var container=document.getElementById('sliders');container.innerHTML='';
  var sliderDefs=[
    {key:'safety',label:'safetyThLabel',min:50,max:100,val:thresholds.safety},
    {key:'efficiency',label:'efficiencyThLabel',min:40,max:100,val:thresholds.efficiency},
    {key:'coverage',label:'coverageThLabel',min:40,max:100,val:thresholds.coverage},
    {key:'time',label:'timeThLabel',min:30,max:100,val:thresholds.time},
    {key:'total',label:'totalThLabel',min:50,max:100,val:thresholds.total},
    {key:'safetyW',label:'safetyWLabel',min:10,max:50,val:thresholds.safetyW}
  ];
  sliderDefs.forEach(function(sd){
    var grp=document.createElement('div');grp.className='slider-group';
    var lbl=document.createElement('label');
    var labelText=document.createElement('span');labelText.style.color='#8a8886';labelText.textContent=t(sd.label);
    var valSpan=document.createElement('span');valSpan.id='val_'+sd.key;valSpan.textContent=sd.val+(sd.key==='safetyW'?'%':'');
    lbl.appendChild(labelText);lbl.appendChild(valSpan);
    var inp=document.createElement('input');inp.type='range';inp.min=sd.min;inp.max=sd.max;inp.value=sd.val;
    inp.addEventListener('input',function(){
      thresholds[sd.key]=parseInt(inp.value);
      valSpan.textContent=inp.value+(sd.key==='safetyW'?'%':'');
      updateHUD();
    });
    grp.appendChild(lbl);grp.appendChild(inp);
    container.appendChild(grp);
  });
}

function runTest(){
  if(selectedTasks.length<3)return;
  runs++;
  var sw=thresholds.safetyW/100;
  var ew=(1-sw)*0.35;var cw=(1-sw)*0.35;var tw=(1-sw)*0.3;
  var area=document.getElementById('resultsArea');area.innerHTML='';

  function computeVersion(vKey,label){
    var scores=[];var totalS=0;var totalE=0;var totalC=0;var totalT=0;
    selectedTasks.forEach(function(idx){
      var task=TASKS[idx];
      var v=task[vKey];
      scores.push({name:task.name[LANG]||task.name.en,s:v.s,e:v.e,c:v.c,t:v.t});
      totalS+=v.s;totalE+=v.e;totalC+=v.c;totalT+=v.t;
    });
    var n=selectedTasks.length;
    var avgS=totalS/n;var avgE=totalE/n;var avgC=totalC/n;var avgT=totalT/n;
    var total=avgS*sw+avgE*ew+avgC*cw+avgT*tw;
    var safetyPass=avgS>=thresholds.safety;
    var effPass=avgE>=thresholds.efficiency;
    var covPass=avgC>=thresholds.coverage;
    var timePass=avgT>=thresholds.time;
    var totalPass=total>=thresholds.total&&safetyPass;

    var header=document.createElement('div');
    header.style.cssText='font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:700;color:'+(vKey==='v1'?'#ff7f50':'#00daf3')+';margin:8px 0 4px;letter-spacing:1px';
    header.textContent=label;
    area.appendChild(header);

    scores.forEach(function(sc){
      var row=document.createElement('div');row.className='result-row';
      row.style.background='rgba(53,53,52,0.2)';
      var taskN=document.createElement('div');taskN.className='r-task';taskN.textContent=sc.name;
      var sV=document.createElement('div');sV.className='r-score';sV.textContent=sc.s;sV.style.color=sc.s>=thresholds.safety?'#10b981':'#ff5f1f';
      row.appendChild(taskN);row.appendChild(sV);
      area.appendChild(row);
    });

    var dimRow=document.createElement('div');dimRow.style.cssText='display:flex;gap:4px;margin:4px 0;font-size:9px;font-family:"Space Grotesk",sans-serif';
    [[t('safety'),avgS.toFixed(1),safetyPass],[t('efficiency'),avgE.toFixed(1),effPass],[t('coverage'),avgC.toFixed(1),covPass],[t('time'),avgT.toFixed(1),timePass]].forEach(function(d){
      var chip=document.createElement('span');
      chip.style.cssText='padding:2px 6px;border:1px solid '+(d[2]?'rgba(16,185,129,0.3)':'rgba(255,95,31,0.3)')+';color:'+(d[2]?'#10b981':'#ff5f1f');
      chip.textContent=d[0]+':'+d[1];
      dimRow.appendChild(chip);
    });
    area.appendChild(dimRow);

    return{total:total,pass:totalPass,avgS:avgS};
  }

  var r1=computeVersion('v1',t('v1Label'));
  var r2=computeVersion('v2',t('v2Label'));

  var vbox=document.getElementById('verdictBox');vbox.style.display='block';
  document.getElementById('vLabel').textContent=t('verdict');
  var differentiated=(r1.pass!==r2.pass);
  if(differentiated){
    var winner=r2.pass?t('v2Label'):t('v1Label');
    document.getElementById('vScore').textContent=winner;
    document.getElementById('vScore').style.color='#10b981';
    document.getElementById('vStatus').textContent=t('pass');
    document.getElementById('vStatus').style.color='#10b981';
    vbox.style.borderColor='rgba(16,185,129,0.3)';
  }else{
    document.getElementById('vScore').textContent=r1.total.toFixed(1)+' vs '+r2.total.toFixed(1);
    document.getElementById('vScore').style.color='#ff5f1f';
    document.getElementById('vStatus').textContent=r1.pass?t('pass')+'/'+t('pass'):t('fail')+'/'+t('fail');
    document.getElementById('vStatus').style.color='#ff5f1f';
    vbox.style.borderColor='rgba(255,95,31,0.3)';
  }

  updateHUD();

  if(runs>=1){
    var fb=document.getElementById('feedbackPanel');
    fb.style.display='block';
    if(differentiated){
      document.getElementById('fbTitle').textContent=t('fbTitleWin');
      document.getElementById('fbBody').textContent=t('fbWin');
      document.getElementById('fbScore').textContent=t('v1Label')+': '+r1.total.toFixed(1)+' | '+t('v2Label')+': '+r2.total.toFixed(1);
    }else if(r1.pass&&r2.pass){
      document.getElementById('fbTitle').textContent=t('fbTitlePartial');
      document.getElementById('fbBody').textContent=t('fbPartial');
      document.getElementById('fbScore').textContent=t('v1Label')+': '+r1.total.toFixed(1)+' | '+t('v2Label')+': '+r2.total.toFixed(1);
    }else{
      document.getElementById('fbTitle').textContent=t('fbTitleFail');
      document.getElementById('fbBody').textContent=t('fbFailBody');
      document.getElementById('fbScore').textContent='';
    }
    document.getElementById('fbClose').textContent=t('close');
  }
}

function updateHUD(){
  document.getElementById('hudV1').textContent=selectedTasks.length;
  document.getElementById('hudV2').textContent=thresholds.safety;
  document.getElementById('hudV3').textContent=thresholds.total;
  document.getElementById('hudV4').textContent=runs;
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSubtitle').textContent=t('subtitle');
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  document.getElementById('guideTips').textContent=t('guideTips');
  var list=document.getElementById('guideSteps');list.innerHTML='';
  [t('guideS1'),t('guideS2'),t('guideS3'),t('guideS4')].forEach(function(s){
    var li=document.createElement('li');li.textContent=s;list.appendChild(li)
  });
  document.getElementById('taskPanelTitle').textContent=t('taskPanelTitle');
  document.getElementById('configTitle').textContent=t('configTitle');
  document.getElementById('resultTitle').textContent=t('resultTitle');
  document.getElementById('runBtn').textContent=selectedTasks.length<3?t('minTasks'):t('runBtn');
  document.getElementById('hudL1').textContent=t('hudSelected');
  document.getElementById('hudL2').textContent=t('hudSafetyTh');
  document.getElementById('hudL3').textContent=t('hudTotalTh');
  document.getElementById('hudL4').textContent=t('hudRuns');
  document.getElementById('fbClose').textContent=t('close');
  buildTaskList();buildSliders();
}

document.getElementById('langBtn').addEventListener('click',function(){LANG=LANG==='en'?'cn':'en';refreshI18N()});
document.getElementById('guideToggle').addEventListener('click',function(){
  var c=document.getElementById('guideContent');var a=document.getElementById('guideArrow');
  if(c.style.display==='none'){c.style.display='block';a.textContent='-'}else{c.style.display='none';a.textContent='+'}
});
document.getElementById('runBtn').addEventListener('click',runTest);
document.getElementById('fbClose').addEventListener('click',function(){document.getElementById('feedbackPanel').style.display='none'});

refreshI18N();updateHUD();
})();
</script>
</body>
</html>
