<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e12;color:#f6f6fc;font-family:'Inter','Noto Sans SC',sans-serif;}

:root{
  --bg:#0c0e12;
  --bg2:#12151d;
  --panel:#171a22;
  --panel2:#1d2130;
  --border:#2a2f3c;
  --border2:#3a3f4c;
  --text:#f6f6fc;
  --muted:#8a8f9c;
  --muted2:#5a5f6c;
  --primary:#50ffb0;
  --primary-dim:#17df93;
  --primary-glow:rgba(80,255,176,0.35);
  --sense:#50ffb0;
  --sense-glow:rgba(80,255,176,0.35);
  --think:#ffd050;
  --think-glow:rgba(255,208,80,0.35);
  --act:#ff6b9d;
  --act-glow:rgba(255,107,157,0.35);
  --danger:#ff5050;
  --warn:#ff9040;
  --accent:#70e0ff;
}

body{display:flex;flex-direction:column;}

/* ---------- HEADER ---------- */
.topbar{
  height:52px;display:flex;align-items:center;padding:0 16px;gap:16px;
  background:linear-gradient(180deg,#141821,#0c0e12);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand h1{
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:-0.01em;
  color:var(--primary);text-shadow:0 0 12px var(--primary-glow);
}
.brand .sub{font-size:9px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:2px;}

.top-levels{display:flex;gap:4px;margin-left:12px;flex:1;}
.lvl-btn{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:6px 10px;border:1px solid var(--border2);background:var(--panel);
  color:var(--muted);cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;
  min-width:36px;
}
.lvl-btn:hover{color:var(--primary);border-color:var(--primary-dim);}
.lvl-btn.active{color:var(--bg);background:var(--primary);border-color:var(--primary);}
.lvl-btn.locked{color:var(--muted2);cursor:not-allowed;opacity:0.4;}

.top-controls{display:flex;gap:6px;align-items:center;}
.ctl-btn{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;padding:8px 14px;border:1px solid var(--border2);
  background:var(--panel);color:var(--text);cursor:pointer;transition:all 0.15s;
}
.ctl-btn:hover{background:var(--panel2);color:var(--primary);border-color:var(--primary-dim);}
.ctl-btn.primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dim));
  color:var(--bg);border-color:var(--primary);
  box-shadow:0 0 16px var(--primary-glow);
}
.ctl-btn.primary:hover{transform:translateY(-1px);box-shadow:0 0 20px var(--primary-glow);}
.ctl-btn.danger{color:var(--danger);border-color:#6a2020;}
.ctl-btn.danger:hover{background:#2a1010;}
.ctl-btn.ghost{background:transparent;}
.ctl-btn:disabled{opacity:0.35;cursor:not-allowed;}

.lang-btn{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:6px 10px;border:1px solid var(--border2);background:var(--panel);
  color:#ffb59c;cursor:pointer;letter-spacing:1px;
}
.lang-btn:hover{color:var(--primary);}

/* ---------- MAIN 3-COLUMN LAYOUT ---------- */
.main{flex:1;display:flex;min-height:0;overflow:hidden;}

.col{
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
  border-right:1px solid var(--border);
}
.col.left{width:280px;flex-shrink:0;background:var(--panel);}
.col.center{flex:1;min-width:0;background:var(--bg);}
.col.right{width:320px;flex-shrink:0;background:var(--panel);border-right:none;}

.col-section{
  padding:12px 14px;border-bottom:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;
}
.col-section.flex{flex:1;min-height:0;}
.col-section::-webkit-scrollbar{width:6px;}
.col-section::-webkit-scrollbar-thumb{background:var(--border2);}

.section-title{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
}
.section-title .hint{color:var(--muted2);font-size:9px;text-transform:none;letter-spacing:0;}

/* ---------- PARTS INVENTORY ---------- */
.parts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.part{
  background:var(--panel2);border:1px solid var(--border2);padding:8px 6px;
  cursor:pointer;transition:all 0.15s;font-size:11px;text-align:center;
  position:relative;
}
.part:hover{border-color:var(--primary-dim);background:var(--panel);}
.part.equipped{border-color:var(--primary);box-shadow:inset 0 0 0 1px var(--primary-glow);}
.part.sensor .icon{color:var(--sense);}
.part.actuator .icon{color:var(--act);}
.part .icon{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:0.05em;margin-bottom:2px;
}
.part .name{color:var(--muted);font-size:9px;}
.part.equipped .name{color:var(--text);}
.part.disabled{opacity:0.35;cursor:not-allowed;}

/* ---------- EQUIPPED SLOTS ---------- */
.slots-row{
  display:flex;flex-wrap:wrap;gap:4px;min-height:28px;
  padding:6px;background:var(--bg2);border:1px dashed var(--border2);
}
.slot-chip{
  font-size:10px;padding:3px 8px;background:var(--panel2);color:var(--text);
  border:1px solid var(--border2);cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:0.05em;
}
.slot-chip.sensor{border-color:var(--sense);color:var(--sense);}
.slot-chip.actuator{border-color:var(--act);color:var(--act);}
.slot-chip:hover{background:var(--panel);}
.slot-empty{color:var(--muted2);font-size:10px;padding:4px;font-style:italic;}

/* ---------- TASK BRIEFING ---------- */
.task-box{
  background:var(--bg2);border:1px solid var(--border2);padding:10px 12px;
  font-size:12px;line-height:1.55;color:var(--text);
}
.task-box .task-title{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  color:var(--primary);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;
}
.task-box .task-desc{color:var(--muted);font-size:11px;line-height:1.6;}
.task-box .task-win{color:var(--accent);font-size:11px;margin-top:6px;font-weight:500;}

/* ---------- CANVAS / WORLD ---------- */
.world-wrap{flex:1;position:relative;min-height:0;}
.world-canvas{width:100%;height:100%;display:block;background:#0a0c10;}

.world-overlay{
  position:absolute;top:12px;left:12px;z-index:10;
  background:rgba(12,14,18,0.85);backdrop-filter:blur(8px);
  padding:8px 12px;border:1px solid var(--border2);
  font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.05em;
}
.world-overlay .w-label{color:var(--muted);font-size:9px;text-transform:uppercase;}
.world-overlay .w-val{color:var(--primary);font-weight:700;font-size:13px;}
.world-overlay .w-row{display:flex;gap:16px;}
.world-overlay .w-cell{text-align:left;}

.editor-hint{
  position:absolute;top:12px;right:12px;z-index:10;
  background:rgba(80,255,176,0.1);border:1px solid var(--primary-dim);
  padding:8px 12px;font-size:11px;color:var(--primary);max-width:220px;
  font-family:'Inter','Noto Sans SC',sans-serif;display:none;
}
.editor-hint.show{display:block;}

/* ---------- PHASE INDICATOR (inside right col) ---------- */
.phase-stack{display:flex;flex-direction:column;gap:6px;}
.phase-box{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:var(--bg2);border:1px solid var(--border2);
  transition:all 0.2s;
}
.phase-box .p-icon{
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:0.1em;width:44px;text-align:center;padding:3px 0;
  background:var(--panel2);color:var(--muted);
}
.phase-box.sense.active{border-color:var(--sense);box-shadow:0 0 14px var(--sense-glow);}
.phase-box.sense.active .p-icon{background:var(--sense);color:var(--bg);}
.phase-box.think.active{border-color:var(--think);box-shadow:0 0 14px var(--think-glow);}
.phase-box.think.active .p-icon{background:var(--think);color:var(--bg);}
.phase-box.act.active{border-color:var(--act);box-shadow:0 0 14px var(--act-glow);}
.phase-box.act.active .p-icon{background:var(--act);color:var(--bg);}
.phase-box .p-text{font-size:11px;color:var(--muted);flex:1;}
.phase-box.active .p-text{color:var(--text);}
.phase-box .p-val{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text);font-weight:700;}

/* ---------- RULES EDITOR ---------- */
.rules-list{display:flex;flex-direction:column;gap:4px;}
.rule-row{
  display:flex;align-items:center;gap:4px;padding:5px;
  background:var(--bg2);border:1px solid var(--border2);
  cursor:grab;font-size:10px;
  transition:all 0.15s;
}
.rule-row:hover{border-color:var(--border2);}
.rule-row.active{border-color:var(--think);box-shadow:0 0 10px var(--think-glow);}
.rule-row.dragging{opacity:0.4;}
.rule-row.disabled{opacity:0.35;}
.rule-handle{
  font-family:'Space Grotesk',sans-serif;font-size:9px;color:var(--muted2);
  cursor:grab;padding:2px 4px;user-select:none;font-weight:700;
}
.rule-if-label{color:var(--think);font-size:9px;font-weight:700;letter-spacing:0.05em;}
.rule-then-label{color:var(--act);font-size:9px;font-weight:700;letter-spacing:0.05em;}
.rule-row select{
  background:var(--panel2);color:var(--text);border:1px solid var(--border2);
  font-size:10px;padding:3px 4px;cursor:pointer;font-family:'Inter','Noto Sans SC',sans-serif;
  outline:none;min-width:0;flex:1;
}
.rule-row select:focus{border-color:var(--primary-dim);}
.rule-count{
  font-family:'Space Grotesk',sans-serif;font-size:9px;color:var(--muted);
  background:var(--panel2);padding:2px 5px;min-width:28px;text-align:center;font-weight:700;
}
.rule-row.active .rule-count{background:var(--think);color:var(--bg);}
.rule-del{
  background:transparent;border:none;color:var(--danger);cursor:pointer;
  font-size:14px;padding:0 4px;line-height:1;
}
.rule-del:hover{color:#ff8080;}
.rule-toggle{
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  cursor:pointer;font-size:8px;padding:2px 4px;font-family:'Space Grotesk',sans-serif;font-weight:700;
}
.rule-toggle.on{color:var(--primary);border-color:var(--primary-dim);}

.add-rule-btn{
  margin-top:6px;padding:6px;background:transparent;border:1px dashed var(--border2);
  color:var(--muted);cursor:pointer;font-size:10px;font-family:'Space Grotesk',sans-serif;
  text-transform:uppercase;letter-spacing:0.1em;width:100%;font-weight:700;
}
.add-rule-btn:hover{color:var(--primary);border-color:var(--primary-dim);}

/* ---------- ROBOT TABS (L8 multi-robot) ---------- */
.robot-tabs{display:flex;gap:2px;margin-bottom:8px;}
.robot-tab{
  flex:1;padding:6px;background:var(--bg2);border:1px solid var(--border2);
  color:var(--muted);font-size:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;
  letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;
}
.robot-tab.active{background:var(--primary);color:var(--bg);border-color:var(--primary);}
.robot-tab:hover:not(.active){background:var(--panel2);color:var(--text);}

/* ---------- TIMELINE ---------- */
.timeline{
  height:56px;background:var(--panel);border-top:1px solid var(--border);
  display:flex;flex-direction:column;padding:6px 12px;gap:4px;flex-shrink:0;
}
.timeline-header{
  display:flex;justify-content:space-between;align-items:center;
  font-size:9px;color:var(--muted);font-family:'Space Grotesk',sans-serif;letter-spacing:0.1em;text-transform:uppercase;
}
.timeline-header .tl-actions{display:flex;gap:4px;}
.timeline-header button{
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;
  padding:2px 6px;background:var(--panel2);border:1px solid var(--border2);
  color:var(--muted);cursor:pointer;letter-spacing:0.05em;
}
.timeline-header button:hover{color:var(--primary);}
.timeline-track{
  flex:1;background:var(--bg2);border:1px solid var(--border2);position:relative;cursor:pointer;
}
.timeline-track .tl-fill{
  position:absolute;left:0;top:0;bottom:0;
  background:linear-gradient(90deg,rgba(80,255,176,0.2),rgba(80,255,176,0.4));
}
.timeline-track .tl-head{
  position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--primary);
  box-shadow:0 0 8px var(--primary-glow);
}
.timeline-track .tl-marks{
  position:absolute;left:0;right:0;top:50%;height:0;
  border-top:1px dashed rgba(80,255,176,0.2);
}

/* ---------- NARRATION BAR ---------- */
.narration{
  height:30px;padding:0 14px;background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);display:flex;align-items:center;
  font-size:11px;color:var(--text);font-family:'Inter','Noto Sans SC',sans-serif;
  border-top:1px solid var(--border);flex-shrink:0;
}
.narration .n-tag{
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;margin-right:10px;
  background:var(--panel);color:var(--primary);border:1px solid var(--border2);
}
.narration.sense .n-tag{background:var(--sense);color:var(--bg);}
.narration.think .n-tag{background:var(--think);color:var(--bg);}
.narration.act .n-tag{background:var(--act);color:var(--bg);}

/* ---------- MODAL ---------- */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:1000;
  font-family:'Inter','Noto Sans SC',sans-serif;
}
.modal.show{display:flex;}
.modal-box{
  background:var(--panel);border:1px solid var(--primary-dim);
  box-shadow:0 0 32px var(--primary-glow);
  max-width:560px;padding:28px 32px;
}
.modal-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;
  color:var(--primary);text-shadow:0 0 10px var(--primary-glow);
  margin-bottom:12px;
}
.modal-box p{
  font-size:13px;color:var(--text);line-height:1.7;margin-bottom:10px;
}
.modal-box .m-key{color:var(--accent);font-weight:500;}
.modal-box .m-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

/* ---------- EDITOR TOOLBAR (L9) ---------- */
.editor-toolbar{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(12,14,18,0.95);backdrop-filter:blur(8px);
  padding:8px 12px;border:1px solid var(--border2);display:flex;gap:6px;z-index:20;
}
.editor-toolbar.hidden{display:none;}
.tool-btn{
  padding:6px 10px;background:var(--panel2);border:1px solid var(--border2);
  color:var(--text);cursor:pointer;font-size:10px;font-family:'Space Grotesk',sans-serif;
  letter-spacing:0.05em;text-transform:uppercase;font-weight:700;
}
.tool-btn.active{background:var(--primary);color:var(--bg);border-color:var(--primary);}
.tool-btn:hover:not(.active){background:var(--panel);}

/* Scrollbar styling for webkit */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);}
::-webkit-scrollbar-thumb:hover{background:var(--muted2);}
</style>
</head>
<body>

<!-- ======================= MODAL (Welcome) ======================= -->
<div class="modal show" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle"></h2>
    <p id="modalP1"></p>
    <p id="modalP2"></p>
    <p id="modalP3"></p>
    <p id="modalP4"></p>
    <div class="m-actions">
      <button class="ctl-btn primary" id="modalStart"></button>
    </div>
  </div>
</div>

<!-- ======================= TOP BAR ======================= -->
<div class="topbar">
  <div class="brand">
    <h1 id="brandTitle"></h1>
    <div class="sub" id="brandSub"></div>
  </div>
  <div class="top-levels" id="topLevels"></div>
  <div class="top-controls">
    <button class="ctl-btn" id="btnHint"></button>
    <button class="ctl-btn danger" id="btnReset"></button>
    <button class="ctl-btn" id="btnStep"></button>
    <button class="ctl-btn primary" id="btnRun"></button>
    <button class="lang-btn" id="btnLang">CN</button>
  </div>
</div>

<!-- ======================= MAIN AREA ======================= -->
<div class="main">

  <!-- LEFT COLUMN: parts + slots -->
  <div class="col left">
    <div class="col-section">
      <div class="section-title"><span id="labSensors"></span><span class="hint" id="hintSensors"></span></div>
      <div class="parts-grid" id="gridSensors"></div>
    </div>
    <div class="col-section">
      <div class="section-title"><span id="labActuators"></span><span class="hint" id="hintActuators"></span></div>
      <div class="parts-grid" id="gridActuators"></div>
    </div>
    <div class="col-section flex">
      <div class="section-title"><span id="labEquipped"></span></div>
      <div style="font-size:9px;color:var(--muted2);margin-bottom:4px;" id="labEqSensors"></div>
      <div class="slots-row" id="slotsSensors"></div>
      <div style="font-size:9px;color:var(--muted2);margin:8px 0 4px;" id="labEqActuators"></div>
      <div class="slots-row" id="slotsActuators"></div>
    </div>
  </div>

  <!-- CENTER COLUMN: world + timeline -->
  <div class="col center">
    <div class="world-wrap">
      <canvas class="world-canvas" id="world"></canvas>

      <div class="world-overlay">
        <div class="w-row">
          <div class="w-cell"><div class="w-label" id="lblTick"></div><div class="w-val" id="valTick">0</div></div>
          <div class="w-cell"><div class="w-label" id="lblScore"></div><div class="w-val" id="valScore">--</div></div>
          <div class="w-cell"><div class="w-label" id="lblBattery"></div><div class="w-val" id="valBattery">--</div></div>
          <div class="w-cell"><div class="w-label" id="lblFPS"></div><div class="w-val" id="valFPS">--</div></div>
        </div>
      </div>

      <div class="editor-hint" id="editorHint"></div>

      <div class="editor-toolbar hidden" id="editorToolbar">
        <span style="color:var(--muted);font-size:10px;font-family:'Space Grotesk',sans-serif;letter-spacing:0.05em;text-transform:uppercase;">EDIT:</span>
        <button class="tool-btn active" data-tool="wall" id="toolWall"></button>
        <button class="tool-btn" data-tool="light" id="toolLight"></button>
        <button class="tool-btn" data-tool="charge" id="toolCharge"></button>
        <button class="tool-btn" data-tool="red" id="toolRed"></button>
        <button class="tool-btn" data-tool="green" id="toolGreen"></button>
        <button class="tool-btn" data-tool="start" id="toolStart"></button>
        <button class="tool-btn" data-tool="erase" id="toolErase"></button>
      </div>
    </div>

    <div class="timeline">
      <div class="timeline-header">
        <span id="lblTimeline"></span>
        <div class="tl-actions">
          <button id="btnStepBack"></button>
          <button id="btnStepFwd"></button>
          <button id="btnRecord"></button>
          <button id="btnClear"></button>
        </div>
      </div>
      <div class="timeline-track" id="timelineTrack">
        <div class="tl-marks"></div>
        <div class="tl-fill" id="tlFill"></div>
        <div class="tl-head" id="tlHead"></div>
      </div>
    </div>

    <div class="narration" id="narration">
      <span class="n-tag" id="narrTag"></span>
      <span id="narrText"></span>
    </div>
  </div>

  <!-- RIGHT COLUMN: task + phases + rules -->
  <div class="col right">
    <div class="col-section">
      <div class="task-box">
        <div class="task-title" id="taskTitle"></div>
        <div class="task-desc" id="taskDesc"></div>
        <div class="task-win" id="taskWin"></div>
      </div>
    </div>

    <div class="col-section">
      <div class="section-title" id="labLoop"></div>
      <div class="phase-stack">
        <div class="phase-box sense" id="phSense"><div class="p-icon">SENSE</div><div class="p-text" id="txtSense"></div><div class="p-val" id="valSense">--</div></div>
        <div class="phase-box think" id="phThink"><div class="p-icon">THINK</div><div class="p-text" id="txtThink"></div><div class="p-val" id="valThink">--</div></div>
        <div class="phase-box act" id="phAct"><div class="p-icon">ACT</div><div class="p-text" id="txtAct"></div><div class="p-val" id="valAct">--</div></div>
      </div>
    </div>

    <div class="col-section flex">
      <div class="robot-tabs" id="robotTabs" style="display:none;">
        <button class="robot-tab active" data-robot="0" id="tabRobotA"></button>

//   . empty   # wall   L light   C charge   R red ball   G green ball
//   S start   T goal (L3)        D second-start (L8)
// Each level defines: id, required parts (hint), winCheck(state) -> bool/number

function buildMap(rows){
  var W = rows[0].length, H = rows.length;
  var cells = [];
  for (var y = 0; y < H; y++){
    var row = [];
    for (var x = 0; x < W; x++){
      var c = rows[y].charAt(x);
      row.push(c);
    }
    cells.push(row);
  }
  return {W:W, H:H, cells:cells};
}

var canvas = document.getElementById('world');

function resize(){
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.floor(rect.width  * dpr);
  canvas.height = Math.floor(rect.height * dpr);

// =====================================================================
// WORLD INITIALIZATION
// =====================================================================

function loadLevel(idx){
  state.levelIndex = idx;
  var lvl = LEVELS[idx];
  var map = {W: lvl.map.W, H: lvl.map.H, cells: []};
  // deep copy cells
  for (var y = 0; y < lvl.map.H; y++){
    map.cells.push(lvl.map.cells[y].slice());
  }

  var walls = {};
  var lights = [];
  var charges = [];
  var balls = [];
  var lineCells = [];
  var starts = [];
  var ballId = 0;

  for (var yy = 0; yy < map.H; yy++){
    for (var xx = 0; xx < map.W; xx++){
      var c = map.cells[yy][xx];
      if (c === '#') walls[xx+','+yy] = true;
      else if (c === 'L') lights.push({x:xx,y:yy});
      else if (c === 'C') charges.push({x:xx,y:yy});
      else if (c === 'R') balls.push({id:ballId++,x:xx,y:yy,type:'red',taken:false,heldBy:-1});
      else if (c === 'G') balls.push({id:ballId++,x:xx,y:yy,type:'green',taken:false,heldBy:-1});
      else if (c === '-') lineCells.push({x:xx,y:yy});
      else if (c === 'S') starts.push({x:xx,y:yy});
      else if (c === 'D') starts.push({x:xx,y:yy});
    }
  }

  state.world = {
    W: map.W, H: map.H, cells: map.cells,
    walls: walls, lights: lights, charges: charges,
    balls: balls, lineCells: lineCells, starts: starts
  };

  // init robots
  state.robots = [];
  var nRobots = lvl.multiRobot ? 2 : 1;
  for (var r = 0; r < nRobots; r++){
    var sp = starts[r] || starts[0] || {x:1,y:1};
    state.robots.push({
      x: sp.x, y: sp.y, dir: 0,  // 0=E 1=S 2=W 3=N
      battery: lvl.battery ? (lvl.batteryStart || 100) : 100,
      held: -1, lastAction: '', ledOn: false
    });
  }

  // dynamic obstacles
  state.dynObstacles = [];
  if (lvl.dynamic){
    for (var d = 0; d < (lvl.dynamicCount || 3); d++){
      // pick random open cell
      var tries = 0, ox, oy;
      do {
        ox = 2 + Math.floor(Math.random() * (map.W - 4));
        oy = 2 + Math.floor(Math.random() * (map.H - 4));
        tries++;
      } while (walls[ox+','+oy] && tries < 20);
      var ddir = Math.floor(Math.random() * 4);
      state.dynObstacles.push({x:ox, y:oy, dir:ddir, tick:0});
    }
  }

  // Reset simulation
  state.tick = 0;
  state.phase = 'idle';
  state.lastSense = null;
  state.lastThinkRule = -1;
  state.lastAction = '';
  state.winCoverage = 0;
  state.winCells = {};
  state.winCollectRed = 0;
  state.winCollectGreen = 0;
  state.alive = true;
  state.score = '--';
  state.status = 'idle';
  state.history = [];
  state.playbackMode = false;
  state.playbackIdx = -1;

  state.editorActive = !!lvl.editable;
  document.getElementById('editorToolbar').classList.toggle('hidden', !state.editorActive);
  document.getElementById('editorHint').classList.toggle('show', !!state.editorActive);
  if (state.editorActive){
    document.getElementById('editorHint').textContent = t('narrEditor');
  }

  // Multi-robot UI
  document.getElementById('robotTabs').style.display = lvl.multiRobot ? 'flex' : 'none';
  state.activeRobot = 0;

  // Rules: if the level changed, keep old rules but reset counts
  for (var rb = 0; rb < 2; rb++){
    for (var ri = 0; ri < state.rules[rb].length; ri++){
      state.rules[rb][ri].count = 0;
    }
  }

  updateTaskPanel();
  updateRulesPanel();
  updatePhasePanel();
  updateLevelButtons();
  updateHUD();
}

// =====================================================================
// COVERAGE / WIN TRACKING
// =====================================================================

function markCovered(rx, ry){
  var key = rx + ',' + ry;
  if (!state.winCells[key]){
    state.winCells[key] = true;
    // coverage ratio denominator: free cells
    var free = 0;
    for (var yy = 0; yy < state.world.H; yy++){
      for (var xx = 0; xx < state.world.W; xx++){
        if (!state.world.walls[xx+','+yy]) free++;
      }
    }
    state.winCoverage = Object.keys(state.winCells).length / Math.max(free, 1);
  }
}

function evalWin(){
  var lvl = LEVELS[state.levelIndex];
  var goal = lvl.goal;

  if (goal.type === 'survive'){
    if (state.tick >= goal.target){ return 'won'; }
    return 'playing';
  }
  if (goal.type === 'reach'){
    // Check if any robot is on a light cell
    for (var ri = 0; ri < state.robots.length; ri++){
      var rb = state.robots[ri];
      for (var li = 0; li < state.world.lights.length; li++){
        var lg = state.world.lights[li];
        if (rb.x === lg.x && rb.y === lg.y) return 'won';
      }
    }
    return 'playing';
  }
  if (goal.type === 'collectRed'){
    var red = 0;
    for (var bi = 0; bi < state.world.balls.length; bi++){
      if (state.world.balls[bi].type === 'red' && state.world.balls[bi].taken) red++;
    }
    state.winCollectRed = red;
    if (red >= goal.target) return 'won';
    return 'playing';
  }
  if (goal.type === 'collectRG'){
    var rr = 0, gg = 0;
    for (var bj = 0; bj < state.world.balls.length; bj++){
      var b = state.world.balls[bj];
      if (b.taken){
        if (b.type === 'red') rr++;
        else if (b.type === 'green') gg++;
      }
    }
    state.winCollectRed = rr;
    state.winCollectGreen = gg;
    if (rr >= goal.target.red && gg >= goal.target.green) return 'won';
    return 'playing';
  }
  if (goal.type === 'coverage'){
    if (state.winCoverage >= goal.target) return 'won';
    return 'playing';
  }
  if (goal.type === 'coverageAlive'){
    if (state.winCoverage >= goal.target && state.robots[0].battery > 0) return 'won';
    return 'playing';
  }
  return 'playing';
}

// =====================================================================
// SENSING
// =====================================================================

function senseWorld(robotIdx){
  var rb = state.robots[robotIdx];
  var w = state.world;
  var eq = state.equippedSensors;
  var s = {
    distance: 99,
    bumped: false,
    light: 0,
    lineL: false, lineR: false, lineC: false,
    color: 'none',
    battery: rb.battery,
    peerDist: 99, peerDir: 0
  };

  // Forward direction vector
  var dx = [1, 0, -1, 0][rb.dir];
  var dy = [0, 1, 0, -1][rb.dir];

  // Distance: step forward until wall/border/dyn obstacle
  if (eq.dist){
    var maxD = Math.max(w.W, w.H);
    var ds = 0;
    for (var step = 1; step <= maxD; step++){
      var nx = rb.x + dx * step;
      var ny = rb.y + dy * step;
      if (nx < 0 || nx >= w.W || ny < 0 || ny >= w.H){ ds = step - 1; break; }
      if (w.walls[nx+','+ny]){ ds = step - 1; break; }
      // dynamic obstacle
      var hitDyn = false;
      for (var di = 0; di < state.dynObstacles.length; di++){
        var dob = state.dynObstacles[di];
        if (dob.x === nx && dob.y === ny){ hitDyn = true; break; }
      }
      if (hitDyn){ ds = step - 1; break; }
      ds = step;
    }
    s.distance = ds;
  }

  if (eq.bump){
    // Bumped if something directly forward touching
    var nx2 = rb.x + dx, ny2 = rb.y + dy;
    if (nx2 < 0 || nx2 >= w.W || ny2 < 0 || ny2 >= w.H) s.bumped = true;
    else if (w.walls[nx2+','+ny2]) s.bumped = true;
  }

  if (eq.light){
    // Inverse-manhattan brightness from nearest light
    var best = 0;
    for (var li = 0; li < w.lights.length; li++){
      var lg = w.lights[li];
      var md = Math.abs(lg.x - rb.x) + Math.abs(lg.y - rb.y);
      var brightness = Math.max(0, 100 - md * 12);
      if (brightness > best) best = brightness;
    }
    s.light = best;
  }

  if (eq.line){
    // Line sensor: read cell at robot and cells left/right relative to facing
    // Left direction
    var ldx = [0, 1, 0, -1][rb.dir]; // 90 degrees clockwise of forward
    var ldy = [-1, 0, 1, 0][rb.dir];
    var rdx = -ldx, rdy = -ldy;
    var onLine = function(x, y){
      for (var k = 0; k < w.lineCells.length; k++){
        if (w.lineCells[k].x === x && w.lineCells[k].y === y) return true;
      }
      return false;
    };
    s.lineC = onLine(rb.x + dx, rb.y + dy);
    s.lineL = onLine(rb.x + ldx, rb.y + ldy) || onLine(rb.x + dx + ldx, rb.y + dy + ldy);
    s.lineR = onLine(rb.x + rdx, rb.y + rdy) || onLine(rb.x + dx + rdx, rb.y + dy + rdy);
    if (!s.lineC && !s.lineL && !s.lineR){
      // Also check current robot cell
      if (onLine(rb.x, rb.y)) s.lineC = true;
    }
  }

  if (eq.color){
    // Look at robot cell and forward cell for colored balls
    for (var bi = 0; bi < w.balls.length; bi++){
      var bl = w.balls[bi];
      if (bl.taken) continue;
      if ((bl.x === rb.x && bl.y === rb.y) ||
          (bl.x === rb.x + dx && bl.y === rb.y + dy)){
        s.color = bl.type;
        break;
      }
    }
  }

  if (eq.peer && state.robots.length > 1){
    var other = state.robots[1 - robotIdx];
    s.peerDist = Math.abs(other.x - rb.x) + Math.abs(other.y - rb.y);
  }

  return s;
}

// =====================================================================
// THINKING (rule evaluation)
// =====================================================================

function evalCond(cond, s){
  switch (cond){
    case 'always': return true;
    case 'distClose': return s.distance < 3;
    case 'distZero':  return s.distance === 0;
    case 'distFar':   return s.distance >= 3;
    case 'bumped':    return s.bumped;
    case 'noBump':    return !s.bumped;
    case 'bright':    return s.light > 50;
    case 'dark':      return s.light <= 50;
    case 'lineL':     return s.lineL;
    case 'lineR':     return s.lineR;
    case 'lineC':     return s.lineC;
    case 'noLine':    return !s.lineL && !s.lineR && !s.lineC;
    case 'seeRed':    return s.color === 'red';
    case 'seeGreen':  return s.color === 'green';
    case 'noColor':   return s.color === 'none';
    case 'batLow':    return s.battery < 30;
    case 'batHigh':   return s.battery >= 30;
    case 'peerNear':  return s.peerDist < 3;
    case 'peerFar':   return s.peerDist >= 3;
  }
  return false;
}

function think(s, robotIdx){
  var rules = state.rules[robotIdx] || [];
  for (var i = 0; i < rules.length; i++){
    var r = rules[i];
    if (!r.enabled) continue;
    if (!r.cond || !r.act) continue;
    if (evalCond(r.cond, s)){
      r.count = (r.count || 0) + 1;
      return {index: i, action: r.act};
    }
  }
  return null;
}

// =====================================================================
// ACTING
// =====================================================================

function doAct(robotIdx, action){
  var rb = state.robots[robotIdx];
  var lvl = LEVELS[state.levelIndex];
  var w = state.world;
  var cost = 0;

  var dx = [1, 0, -1, 0][rb.dir];
  var dy = [0, 1, 0, -1][rb.dir];

  switch (action){
    case 'forward': {
      var nx = rb.x + dx, ny = rb.y + dy;
      if (nx >= 0 && nx < w.W && ny >= 0 && ny < w.H && !w.walls[nx+','+ny]){
        // check dyn obstacles
        var blocked = false;
        for (var di = 0; di < state.dynObstacles.length; di++){
          if (state.dynObstacles[di].x === nx && state.dynObstacles[di].y === ny){ blocked = true; break; }
        }
        // check other robot
        for (var ri = 0; ri < state.robots.length; ri++){
          if (ri !== robotIdx && state.robots[ri].x === nx && state.robots[ri].y === ny){ blocked = true; break; }
        }
        if (!blocked){
          rb.x = nx; rb.y = ny;
        }
      }
      cost = 1;
      break;
    }
    case 'backward': {
      var bx = rb.x - dx, by = rb.y - dy;
      if (bx >= 0 && bx < w.W && by >= 0 && by < w.H && !w.walls[bx+','+by]){
        rb.x = bx; rb.y = by;
      }
      cost = 1;
      break;
    }
    case 'turnL': rb.dir = (rb.dir + 3) % 4; cost = 0.5; break;
    case 'turnR': rb.dir = (rb.dir + 1) % 4; cost = 0.5; break;
    case 'stop':  cost = 0.2; break;
    case 'grab': {
      // grab ball at current or forward cell
      if (rb.held === -1){
        for (var bi = 0; bi < w.balls.length; bi++){
          var bl = w.balls[bi];
          if (bl.taken) continue;
          if ((bl.x === rb.x && bl.y === rb.y) || (bl.x === rb.x + dx && bl.y === rb.y + dy)){
            bl.taken = true;
            bl.heldBy = robotIdx;
            rb.held = bl.id;
            break;
          }
        }
      }
      cost = 2;
      break;
    }
    case 'release': {
      if (rb.held !== -1){
        for (var bj = 0; bj < w.balls.length; bj++){
          if (w.balls[bj].id === rb.held){
            w.balls[bj].taken = false;
            w.balls[bj].heldBy = -1;
            w.balls[bj].x = rb.x;
            w.balls[bj].y = rb.y;
          }
        }
        rb.held = -1;
      }
      cost = 0.5;
      break;
    }
    case 'ledOn':  rb.ledOn = true;  cost = 0.1; break;
    case 'ledOff': rb.ledOn = false; cost = 0.1; break;
    case 'beep':   cost = 0.3; break;
    case 'chargeNow': {
      // Only works if robot is on a charge dock
      for (var ci = 0; ci < w.charges.length; ci++){
        if (rb.x === w.charges[ci].x && rb.y === w.charges[ci].y){
          rb.battery = Math.min(100, rb.battery + 3);
          cost = -0.5; // net gain
          break;
        }
      }
      if (cost === 0) cost = 0.2;
      break;
    }
    case 'rad0': case 'rad1': cost = 0.1; break;
  }

  if (lvl.battery){
    rb.battery = Math.max(0, rb.battery - cost);
    if (rb.battery <= 0){
      state.status = 'batdead';
      state.alive = false;
    }
  }
  rb.lastAction = action;
  markCovered(rb.x, rb.y);
}

// =====================================================================
// DYNAMIC OBSTACLES UPDATE (L7)
// =====================================================================

function updateDynObstacles(){
  for (var i = 0; i < state.dynObstacles.length; i++){
    var d = state.dynObstacles[i];
    d.tick++;
    if (d.tick % 3 !== 0) continue;
    // Random new direction occasionally
    if (Math.random() < 0.25){
      d.dir = Math.floor(Math.random() * 4);
    }
    var dx = [1, 0, -1, 0][d.dir];
    var dy = [0, 1, 0, -1][d.dir];
    var nx = d.x + dx, ny = d.y + dy;
    var w = state.world;
    if (nx < 1 || nx >= w.W - 1 || ny < 1 || ny >= w.H - 1 || w.walls[nx+','+ny]){
      d.dir = (d.dir + 2) % 4;
      continue;
    }
    // don't run into robots
    var onRobot = false;
    for (var ri = 0; ri < state.robots.length; ri++){
      if (state.robots[ri].x === nx && state.robots[ri].y === ny){ onRobot = true; break; }
    }
    if (onRobot){
      d.dir = (d.dir + 1) % 4;
      continue;
    }
    d.x = nx; d.y = ny;
  }
}

// =====================================================================
// TICK (Sense -> Think -> Act)
// =====================================================================

function runOneTick(){
  if (!state.alive) return;

  state.tick++;
  state.phase = 'sense';

  // Update dyn obstacles
  updateDynObstacles();

  for (var r = 0; r < state.robots.length; r++){
    var s = senseWorld(r);
    if (r === 0){
      state.lastSense = s;
    }

    state.phase = 'think';
    var decision = think(s, r);

    state.phase = 'act';
    if (decision){
      doAct(r, decision.action);
      if (r === 0){
        state.lastThinkRule = decision.index;
        state.lastAction = decision.action;
      }
    } else {
      if (r === 0){
        state.lastThinkRule = -1;
        state.lastAction = '';
      }
    }
  }

  // Coverage marking done inside doAct. Also mark all robot cells.
  for (var rk = 0; rk < state.robots.length; rk++){
    markCovered(state.robots[rk].x, state.robots[rk].y);
  }

  // Win check
  var result = evalWin();
  if (result === 'won'){
    state.status = 'won';
    state.alive = false;
  }

  // Record snapshot
  if (state.recording){
    var snap = {
      tick: state.tick,
      robots: JSON.parse(JSON.stringify(state.robots)),
      balls: JSON.parse(JSON.stringify(state.world.balls)),
      dynObstacles: JSON.parse(JSON.stringify(state.dynObstacles)),
      winCoverage: state.winCoverage,
      winCollectRed: state.winCollectRed,
      winCollectGreen: state.winCollectGreen,
      lastSense: state.lastSense,
      lastThinkRule: state.lastThinkRule,
      lastAction: state.lastAction
    };
    state.history.push(snap);
    if (state.history.length > state.historyCap){
      state.history.shift();
    }
  }

  // Update score string
  var lvl = LEVELS[state.levelIndex];
  var g = lvl.goal;
  if (g.type === 'survive') state.score = state.tick + '/' + g.target;
  else if (g.type === 'coverage' || g.type === 'coverageAlive') state.score = Math.floor(state.winCoverage * 100) + '%';
  else if (g.type === 'collectRed') state.score = state.winCollectRed + '/' + g.target;
  else if (g.type === 'collectRG') state.score = state.winCollectRed + 'R+' + state.winCollectGreen + 'G';
  else if (g.type === 'reach') state.score = (state.status === 'won' ? 'DONE' : '...');

  updateHUD();
  updatePhasePanel();
  updateNarration();
  updateRulesPanel();
  if (state.recording) updateTimeline();
}

// =====================================================================
// PLAYBACK
// =====================================================================

function seekPlayback(idx){
  if (state.history.length === 0) return;
  idx = Math.max(0, Math.min(state.history.length - 1, idx));
  state.playbackIdx = idx;
  var snap = state.history[idx];
  state.tick = snap.tick;
  state.robots = JSON.parse(JSON.stringify(snap.robots));
  state.world.balls = JSON.parse(JSON.stringify(snap.balls));
  state.dynObstacles = JSON.parse(JSON.stringify(snap.dynObstacles));
  state.winCoverage = snap.winCoverage;
  state.winCollectRed = snap.winCollectRed;
  state.winCollectGreen = snap.winCollectGreen;
  state.lastSense = snap.lastSense;
  state.lastThinkRule = snap.lastThinkRule;
  state.lastAction = snap.lastAction;
  updateHUD();
  updatePhasePanel();
  updateTimeline();
}

// =====================================================================
// RENDERING
// =====================================================================

function draw(){
  var w = state.world;
  if (!w) return;

  // Background gradient
  var bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0e1118');
  bgGrad.addColorStop(1, '#070910');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Compute cell size to fit
  var marginX = 40, marginY = 40;
  var availW = W - marginX * 2;
  var availH = H - marginY * 2;
  cellSize = Math.floor(Math.min(availW / w.W, availH / w.H));
  offX = (W - cellSize * w.W) / 2;
  offY = (H - cellSize * w.H) / 2;

  // Grid background
  ctx.fillStyle = '#12151d';
  ctx.fillRect(offX, offY, cellSize * w.W, cellSize * w.H);

  // Grid lines
  ctx.strokeStyle = 'rgba(80,100,140,0.12)';
  ctx.lineWidth = 1;
  for (var gx = 0; gx <= w.W; gx++){
    ctx.beginPath();
    ctx.moveTo(offX + gx * cellSize, offY);
    ctx.lineTo(offX + gx * cellSize, offY + w.H * cellSize);
    ctx.stroke();
  }
  for (var gy = 0; gy <= w.H; gy++){
    ctx.beginPath();
    ctx.moveTo(offX, offY + gy * cellSize);
    ctx.lineTo(offX + w.W * cellSize, offY + gy * cellSize);
    ctx.stroke();
  }

  // Coverage overlay
  ctx.fillStyle = 'rgba(80,255,176,0.08)';
  for (var key in state.winCells){
    if (!state.winCells.hasOwnProperty(key)) continue;
    var parts = key.split(',');
    var cx = +parts[0], cy = +parts[1];
    ctx.fillRect(offX + cx * cellSize, offY + cy * cellSize, cellSize, cellSize);
  }

  // Line cells (tape)
  for (var li = 0; li < w.lineCells.length; li++){
    var lc = w.lineCells[li];
    var lx = offX + lc.x * cellSize;
    var ly = offY + lc.y * cellSize;
    ctx.fillStyle = '#0a0c12';
    ctx.fillRect(lx + cellSize * 0.2, ly + cellSize * 0.2, cellSize * 0.6, cellSize * 0.6);
    ctx.fillStyle = '#1a1c24';
    ctx.fillRect(lx + cellSize * 0.3, ly + cellSize * 0.3, cellSize * 0.4, cellSize * 0.4);
  }

  // Walls
  for (var yy = 0; yy < w.H; yy++){
    for (var xx = 0; xx < w.W; xx++){
      if (w.walls[xx+','+yy]){
        drawWall(xx, yy);
      }
    }
  }

  // Charges (blue dock)
  for (var ci = 0; ci < w.charges.length; ci++){
    drawCharge(w.charges[ci].x, w.charges[ci].y);
  }

  // Lights (radial glow)
  for (var li2 = 0; li2 < w.lights.length; li2++){
    drawLight(w.lights[li2].x, w.lights[li2].y);
  }

  // Balls
  for (var bi = 0; bi < w.balls.length; bi++){
    var b = w.balls[bi];
    if (b.taken && b.heldBy >= 0) continue; // drawn on robot
    if (b.taken) continue;
    drawBall(b.x, b.y, b.type);
  }

  // Dynamic obstacles
  for (var di = 0; di < state.dynObstacles.length; di++){
    drawDynObstacle(state.dynObstacles[di].x, state.dynObstacles[di].y);
  }

  // Sensor visualization for active phase
  if (state.phase === 'sense' && state.lastSense && state.equippedSensors.dist){
    drawSensorBeam(state.robots[0]);
  }

  // Robots
  for (var rk = 0; rk < state.robots.length; rk++){
    drawRobot(rk);
  }

  // Win overlay
  if (state.status === 'won'){
    drawWinOverlay();
  }
  if (state.status === 'batdead'){
    drawFailOverlay('NO POWER');
  }
}

function drawWall(cx, cy){
  var x = offX + cx * cellSize;
  var y = offY + cy * cellSize;
  var grad = ctx.createLinearGradient(x, y, x + cellSize, y + cellSize);
  grad.addColorStop(0, '#3a2515');
  grad.addColorStop(1, '#1a0e08');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, cellSize, cellSize);
  // Diagonal stripes
  ctx.strokeStyle = 'rgba(255,150,80,0.2)';
  ctx.lineWidth = 1;
  var stripeStep = 4;
  for (var s = -cellSize; s < cellSize; s += stripeStep){
    ctx.beginPath();
    ctx.moveTo(x + s, y);
    ctx.lineTo(x + s + cellSize, y + cellSize);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,150,80,0.3)';
  ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
}

function drawCharge(cx, cy){
  var x = offX + cx * cellSize + cellSize / 2;
  var y = offY + cy * cellSize + cellSize / 2;
  var r = cellSize * 0.38;
  // Glow ring
  var gr = ctx.createRadialGradient(x, y, 0, x, y, r * 1.4);
  gr.addColorStop(0, 'rgba(112,224,255,0.45)');
  gr.addColorStop(1, 'rgba(112,224,255,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.arc(x, y, r * 1.4, 0, Math.PI * 2); ctx.fill();
  // Inner circle
  ctx.strokeStyle = '#70e0ff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  // Lightning bolt
  ctx.fillStyle = '#70e0ff';
  ctx.font = "bold " + Math.floor(cellSize * 0.55) + "px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u26A1', x, y);
}

function drawLight(cx, cy){
  var x = offX + cx * cellSize + cellSize / 2;
  var y = offY + cy * cellSize + cellSize / 2;
  var pulse = 0.85 + 0.15 * Math.sin(state.tick * 0.2);
  var r = cellSize * 0.55 * pulse;
  var gr = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
  gr.addColorStop(0, 'rgba(255,236,128,0.85)');
  gr.addColorStop(0.4, 'rgba(255,200,80,0.35)');
  gr.addColorStop(1, 'rgba(255,180,60,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2); ctx.fill();
  // Core
  ctx.fillStyle = '#ffec80';
  ctx.shadowColor = '#ffec80';
  ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.arc(x, y, cellSize * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall(cx, cy, type){
  var x = offX + cx * cellSize + cellSize / 2;
  var y = offY + cy * cellSize + cellSize / 2;
  var r = cellSize * 0.28;
  var col = (type === 'red') ? '#ff5080' : '#70e090';
  var glow = (type === 'red') ? 'rgba(255,80,128,0.5)' : 'rgba(112,224,144,0.5)';
  var gr = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
  gr.addColorStop(0, '#ffffff');
  gr.addColorStop(0.3, col);
  gr.addColorStop(1, (type === 'red' ? '#801828' : '#205a30'));
  ctx.fillStyle = gr;
  ctx.shadowColor = glow;
  ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawDynObstacle(cx, cy){
  var x = offX + cx * cellSize + cellSize / 2;
  var y = offY + cy * cellSize + cellSize / 2;
  var r = cellSize * 0.38;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(state.tick * 0.1);
  // Gear/wheel shape
  var teeth = 6;
  ctx.fillStyle = '#ff9040';
  ctx.shadowColor = 'rgba(255,144,64,0.5)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  for (var i = 0; i < teeth * 2; i++){
    var rad = (i % 2 === 0) ? r : r * 0.72;
    var theta = (i / (teeth * 2)) * Math.PI * 2;
    if (i === 0) ctx.moveTo(Math.cos(theta) * rad, Math.sin(theta) * rad);
    else ctx.lineTo(Math.cos(theta) * rad, Math.sin(theta) * rad);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Center
  ctx.fillStyle = '#0c0e12';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawSensorBeam(rb){
  var w = state.world;
  var dx = [1, 0, -1, 0][rb.dir];
  var dy = [0, 1, 0, -1][rb.dir];
  var x1 = offX + rb.x * cellSize + cellSize / 2 + dx * cellSize * 0.4;
  var y1 = offY + rb.y * cellSize + cellSize / 2 + dy * cellSize * 0.4;
  var d = state.lastSense ? Math.min(state.lastSense.distance, 10) : 0;
  var x2 = x1 + dx * cellSize * d;
  var y2 = y1 + dy * cellSize * d;

  ctx.save();
  ctx.strokeStyle = '#50ffb0';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(80,255,176,0.6)';
  ctx.shadowBlur = 14;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawRobot(idx){
  var rb = state.robots[idx];
  var x = offX + rb.x * cellSize + cellSize / 2;
  var y = offY + rb.y * cellSize + cellSize / 2;
  var r = cellSize * 0.38;

  ctx.save();

  // Phase rings (sense/think/act glow based on state.phase for robot 0)
  if (idx === 0 && state.phase !== 'idle'){
    var ringCol = '#ffffff', ringGlow = 'rgba(255,255,255,0.3)';
    if (state.phase === 'sense'){ ringCol = '#50ffb0'; ringGlow = 'rgba(80,255,176,0.5)'; }
    else if (state.phase === 'think'){ ringCol = '#ffd050'; ringGlow = 'rgba(255,208,80,0.5)'; }
    else if (state.phase === 'act'){ ringCol = '#ff6b9d'; ringGlow = 'rgba(255,107,157,0.5)'; }
    ctx.strokeStyle = ringCol;
    ctx.lineWidth = 2;
    ctx.shadowColor = ringGlow;
    ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.arc(x, y, r * 1.35, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Body with unique color per robot
  var baseCol = (idx === 0) ? '#60ffc0' : '#70b0ff';
  var darkCol = (idx === 0) ? '#17a070' : '#2060a0';
  var glowCol = (idx === 0) ? 'rgba(80,255,176,0.5)' : 'rgba(112,176,255,0.5)';

  ctx.translate(x, y);
  ctx.rotate(rb.dir * Math.PI / 2);

  var grad = ctx.createLinearGradient(-r, -r, r, r);
  grad.addColorStop(0, baseCol);
  grad.addColorStop(1, darkCol);
  ctx.fillStyle = grad;
  ctx.shadowColor = glowCol;
  ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // Facing triangle
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(r * 0.85, 0);
  ctx.lineTo(-r * 0.35, r * 0.55);
  ctx.lineTo(-r * 0.35, -r * 0.55);
  ctx.closePath();
  ctx.fill();

  // Robot ID label
  ctx.fillStyle = '#0c0e12';
  ctx.font = "bold " + Math.floor(r * 0.7) + "px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.save();
  ctx.rotate(-rb.dir * Math.PI / 2);
  ctx.fillText(idx === 0 ? 'A' : 'B', 0, 0);
  ctx.restore();

  ctx.restore();

  // LED light
  if (rb.ledOn){
    ctx.fillStyle = 'rgba(255,255,80,0.9)';
    ctx.shadowColor = '#ffff80';
    ctx.shadowBlur = 18;
    ctx.beginPath(); ctx.arc(x, y - r * 1.1, r * 0.15, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Held ball
  if (rb.held !== -1){
    var bx = x;
    var by = y - r * 1.4;
    var heldBall = null;
    for (var bi = 0; bi < state.world.balls.length; bi++){
      if (state.world.balls[bi].id === rb.held){ heldBall = state.world.balls[bi]; break; }
    }
    if (heldBall){
      var hc = (heldBall.type === 'red') ? '#ff5080' : '#70e090';
      ctx.fillStyle = hc;
      ctx.beginPath(); ctx.arc(bx, by, r * 0.32, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Battery bar (if level uses battery)
  var lvl = LEVELS[state.levelIndex];
  if (lvl.battery){
    var bbW = cellSize * 0.7;
    var bbH = 4;
    var bbX = x - bbW / 2;
    var bbY = y + r * 1.2;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bbX, bbY, bbW, bbH);
    var batCol = rb.battery > 50 ? '#50ffb0' : (rb.battery > 20 ? '#ffd050' : '#ff5050');
    ctx.fillStyle = batCol;
    ctx.fillRect(bbX, bbY, bbW * (rb.battery / 100), bbH);
  }
}

function drawWinOverlay(){
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#50ffb0';
  ctx.font = "bold 48px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(80,255,176,0.6)';
  ctx.shadowBlur = 30;
  ctx.fillText(t('narrWin'), W / 2, H / 2);
  ctx.shadowBlur = 0;
}

function drawFailOverlay(msg){
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff5050';
  ctx.font = "bold 36px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,80,80,0.6)';
  ctx.shadowBlur = 20;
  ctx.fillText(msg, W / 2, H / 2);
  ctx.shadowBlur = 0;
}

// =====================================================================
// UI BUILDERS
// =====================================================================

function buildPartsPanels(){
  // Sensors
  var gs = document.getElementById('gridSensors');
  gs.innerHTML = '';
  for (var i = 0; i < SENSOR_DEFS.length; i++){
    var def = SENSOR_DEFS[i];
    var d = document.createElement('div');
    d.className = 'part sensor' + (state.equippedSensors[def.id] ? ' equipped' : '');
    d.innerHTML = '<div class="icon">' + t(def.nameKey).toUpperCase() + '</div><div class="name">' + t(def.descKey) + '</div>';
    (function(id){ d.onclick = function(){ toggleSensor(id); }; })(def.id);
    gs.appendChild(d);
  }

  // Actuators
  var ga = document.getElementById('gridActuators');
  ga.innerHTML = '';
  for (var j = 0; j < ACTUATOR_DEFS.length; j++){
    var def2 = ACTUATOR_DEFS[j];
    var d2 = document.createElement('div');
    d2.className = 'part actuator' + (state.equippedActuators[def2.id] ? ' equipped' : '');
    d2.innerHTML = '<div class="icon">' + t(def2.nameKey).toUpperCase() + '</div><div class="name">' + t(def2.descKey) + '</div>';
    (function(id){ d2.onclick = function(){ toggleActuator(id); }; })(def2.id);
    ga.appendChild(d2);
  }

  updateSlots();
}

function updateSlots(){
  var sSlot = document.getElementById('slotsSensors');
  var aSlot = document.getElementById('slotsActuators');
  sSlot.innerHTML = '';
  aSlot.innerHTML = '';

  var sCount = 0;
  for (var s in state.equippedSensors){
    if (!state.equippedSensors.hasOwnProperty(s)) continue;
    var def = findSensorDef(s);
    if (!def) continue;
    var chip = document.createElement('div');
    chip.className = 'slot-chip sensor';
    chip.textContent = t(def.nameKey);
    (function(id){ chip.onclick = function(){ toggleSensor(id); }; })(s);
    sSlot.appendChild(chip);
    sCount++;
  }
  if (sCount === 0){
    var e1 = document.createElement('div');
    e1.className = 'slot-empty';
    e1.textContent = LANG === 'zh' ? '尚未装配传感器' : 'No sensors equipped';
    sSlot.appendChild(e1);
  }

  var aCount = 0;
  for (var a in state.equippedActuators){
    if (!state.equippedActuators.hasOwnProperty(a)) continue;
    var def2 = findActuatorDef(a);
    if (!def2) continue;
    var chip2 = document.createElement('div');
    chip2.className = 'slot-chip actuator';
    chip2.textContent = t(def2.nameKey);
    (function(id){ chip2.onclick = function(){ toggleActuator(id); }; })(a);
    aSlot.appendChild(chip2);
    aCount++;
  }
  if (aCount === 0){
    var e2 = document.createElement('div');
    e2.className = 'slot-empty';
    e2.textContent = LANG === 'zh' ? '尚未装配执行器' : 'No actuators equipped';
    aSlot.appendChild(e2);
  }
}

function findSensorDef(id){
  for (var i = 0; i < SENSOR_DEFS.length; i++) if (SENSOR_DEFS[i].id === id) return SENSOR_DEFS[i];
  return null;
}
function findActuatorDef(id){
  for (var i = 0; i < ACTUATOR_DEFS.length; i++) if (ACTUATOR_DEFS[i].id === id) return ACTUATOR_DEFS[i];
  return null;
}

function toggleSensor(id){
  if (state.equippedSensors[id]) delete state.equippedSensors[id];
  else state.equippedSensors[id] = true;
  buildPartsPanels();
  updateRulesPanel();
}
function toggleActuator(id){
  if (state.equippedActuators[id]) delete state.equippedActuators[id];
  else state.equippedActuators[id] = true;
  buildPartsPanels();
  updateRulesPanel();
}

function buildLevelButtons(){
  var container = document.getElementById('topLevels');
  container.innerHTML = '';
  for (var i = 0; i < LEVELS.length; i++){
    var b = document.createElement('button');
    b.className = 'lvl-btn' + (i === state.levelIndex ? ' active' : '');
    b.textContent = 'L' + LEVELS[i].id;
    (function(idx){ b.onclick = function(){ loadLevel(idx); }; })(i);
    container.appendChild(b);
  }
}

function updateLevelButtons(){
  var btns = document.querySelectorAll('#topLevels .lvl-btn');
  for (var i = 0; i < btns.length; i++){
    btns[i].classList.toggle('active', i === state.levelIndex);
  }
}

function updateTaskPanel(){
  var lvl = LEVELS[state.levelIndex];
  document.getElementById('taskTitle').textContent = t('l' + lvl.id + 'Title');
  document.getElementById('taskDesc').textContent = t('l' + lvl.id + 'Desc');
  document.getElementById('taskWin').textContent = t('l' + lvl.id + 'Win');
}

function updatePhasePanel(){
  var phases = ['sense', 'think', 'act'];
  for (var i = 0; i < phases.length; i++){
    var el = document.getElementById('ph' + phases[i].charAt(0).toUpperCase() + phases[i].slice(1));
    el.classList.toggle('active', state.phase === phases[i]);
  }
  // Text inside each phase
  document.getElementById('txtSense').textContent = t('phSenseTxt');
  document.getElementById('txtThink').textContent = t('phThinkTxt');
  document.getElementById('txtAct').textContent   = t('phActTxt');

  // Values
  var vSense = '--', vThink = '--', vAct = '--';
  if (state.lastSense){
    var s = state.lastSense;
    var parts = [];
    if (state.equippedSensors.dist)    parts.push('d=' + s.distance);
    if (state.equippedSensors.bump)    parts.push(s.bumped ? 'hit' : 'ok');
    if (state.equippedSensors.light)   parts.push(Math.floor(s.light) + '%');
    if (state.equippedSensors.line)    parts.push(s.lineC ? 'C' : (s.lineL ? 'L' : (s.lineR ? 'R' : '-')));
    if (state.equippedSensors.color)   parts.push(s.color === 'none' ? '-' : s.color.charAt(0).toUpperCase());
    if (state.equippedSensors.battery) parts.push('B=' + Math.floor(s.battery));
    if (state.equippedSensors.peer)    parts.push('P=' + s.peerDist);
    vSense = parts.join(' ');
  }
  if (state.lastThinkRule >= 0){
    vThink = '#' + (state.lastThinkRule + 1);
  } else if (state.tick > 0){
    vThink = 'none';
  }
  if (state.lastAction){
    var adef = findActDef(state.lastAction);
    vAct = adef ? t(adef.labelKey) : state.lastAction;
  }
  document.getElementById('valSense').textContent = vSense;
  document.getElementById('valThink').textContent = vThink;
  document.getElementById('valAct').textContent = vAct;
}

function findActDef(id){
  for (var i = 0; i < ACT_DEFS.length; i++) if (ACT_DEFS[i].id === id) return ACT_DEFS[i];
  return null;
}
function findCondDef(id){
  for (var i = 0; i < COND_DEFS.length; i++) if (COND_DEFS[i].id === id) return COND_DEFS[i];
  return null;
}

function updateRulesPanel(){
  var list = document.getElementById('rulesList');
  list.innerHTML = '';
  var rules = state.rules[state.activeRobot];

  // Update tab labels
  if (LEVELS[state.levelIndex].multiRobot){
    document.getElementById('tabRobotA').textContent = (LANG === 'zh' ? '机器人 A' : 'Robot A');
    document.getElementById('tabRobotB').textContent = (LANG === 'zh' ? '机器人 B' : 'Robot B');
    document.getElementById('tabRobotA').classList.toggle('active', state.activeRobot === 0);
    document.getElementById('tabRobotB').classList.toggle('active', state.activeRobot === 1);
  }

  for (var i = 0; i < rules.length; i++){
    var r = rules[i];
    var row = document.createElement('div');
    row.className = 'rule-row';
    if (i === state.lastThinkRule && state.activeRobot === 0) row.classList.add('active');
    if (!r.enabled) row.classList.add('disabled');
    row.setAttribute('draggable', 'true');
    row.dataset.ruleId = r.id;

    // Handle
    var handle = document.createElement('div');
    handle.className = 'rule-handle';
    handle.textContent = (i + 1);
    row.appendChild(handle);

    // IF label
    var ifL = document.createElement('span');
    ifL.className = 'rule-if-label';
    ifL.textContent = t('ruleIf');
    row.appendChild(ifL);

    // Condition select
    var condSel = document.createElement('select');
    condSel.innerHTML = '<option value="">--</option>';
    for (var c = 0; c < COND_DEFS.length; c++){
      var cd = COND_DEFS[c];
      if (cd.requires && !state.equippedSensors[cd.requires]) continue;
      var opt = document.createElement('option');
      opt.value = cd.id;
      opt.textContent = t(cd.labelKey);
      if (cd.id === r.cond) opt.selected = true;
      condSel.appendChild(opt);
    }
    (function(rr){ condSel.onchange = function(e){ rr.cond = e.target.value; }; })(r);
    row.appendChild(condSel);

    // THEN label
    var thenL = document.createElement('span');
    thenL.className = 'rule-then-label';
    thenL.textContent = t('ruleThen');
    row.appendChild(thenL);

    // Action select
    var actSel = document.createElement('select');
    actSel.innerHTML = '<option value="">--</option>';
    for (var ai = 0; ai < ACT_DEFS.length; ai++){
      var ad = ACT_DEFS[ai];
      if (ad.requires && !state.equippedActuators[ad.requires]) continue;
      var opt2 = document.createElement('option');
      opt2.value = ad.id;
      opt2.textContent = t(ad.labelKey);
      if (ad.id === r.act) opt2.selected = true;
      actSel.appendChild(opt2);
    }
    (function(rr){ actSel.onchange = function(e){ rr.act = e.target.value; }; })(r);
    row.appendChild(actSel);

    // Count
    var count = document.createElement('div');
    count.className = 'rule-count';
    count.textContent = r.count || 0;
    row.appendChild(count);

    // Toggle enable
    var tg = document.createElement('button');
    tg.className = 'rule-toggle' + (r.enabled ? ' on' : '');
    tg.textContent = r.enabled ? 'ON' : 'OFF';
    (function(rr){ tg.onclick = function(){ rr.enabled = !rr.enabled; updateRulesPanel(); }; })(r);
    row.appendChild(tg);

    // Delete
    var del = document.createElement('button');
    del.className = 'rule-del';
    del.textContent = '\u00D7';
    (function(idx){ del.onclick = function(){ deleteRule(idx); }; })(i);
    row.appendChild(del);

    // Drag events for sorting
    row.addEventListener('dragstart', function(e){
      state.draggingRuleId = parseInt(this.dataset.ruleId);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function(){ this.classList.remove('dragging'); state.draggingRuleId = null; });
    row.addEventListener('dragover', function(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      var targetId = parseInt(this.dataset.ruleId);
      if (state.draggingRuleId !== null && state.draggingRuleId !== targetId){
        reorderRule(state.draggingRuleId, targetId);
      }
    });

    list.appendChild(row);
  }
}

function addRule(){
  var r = {
    id: state.nextRuleId++,
    cond: '', act: '', enabled: true, count: 0
  };
  state.rules[state.activeRobot].push(r);
  updateRulesPanel();
}

function deleteRule(idx){
  state.rules[state.activeRobot].splice(idx, 1);
  updateRulesPanel();
}

function reorderRule(fromId, toId){
  var arr = state.rules[state.activeRobot];
  var fromIdx = -1, toIdx = -1;
  for (var i = 0; i < arr.length; i++){
    if (arr[i].id === fromId) fromIdx = i;
    if (arr[i].id === toId) toIdx = i;
  }
  if (fromIdx === -1 || toIdx === -1) return;
  var item = arr.splice(fromIdx, 1)[0];
  arr.splice(toIdx, 0, item);
  updateRulesPanel();
}

function updateHUD(){
  document.getElementById('valTick').textContent = state.tick;
  document.getElementById('valScore').textContent = state.score;
  if (LEVELS[state.levelIndex].battery && state.robots[0]){
    document.getElementById('valBattery').textContent = Math.floor(state.robots[0].battery);
  } else {
    document.getElementById('valBattery').textContent = '--';
  }
  document.getElementById('valFPS').textContent = state.fps;
}

function updateNarration(){
  var tag = document.getElementById('narrTag');
  var txt = document.getElementById('narrText');
  var narr = document.getElementById('narration');
  narr.className = 'narration';
  if (state.status === 'won'){
    tag.textContent = 'WIN';
    txt.textContent = t('narrWin');
    narr.classList.add('sense');
    return;
  }
  if (state.status === 'batdead'){
    tag.textContent = '!';
    txt.textContent = t('narrBatOut');
    return;
  }
  if (state.tick === 0){
    tag.textContent = 'IDLE';
    txt.textContent = t('narrIdle');
    return;
  }
  if (state.phase === 'sense'){
    tag.textContent = t('phaseSense');
    txt.textContent = t('narrSense');
    narr.classList.add('sense');
  } else if (state.phase === 'think'){
    tag.textContent = t('phaseThink');
    if (state.lastThinkRule >= 0){
      txt.textContent = t('narrThink').replace('{n}', state.lastThinkRule + 1);
    } else {
      txt.textContent = t('narrThinkNone');
    }
    narr.classList.add('think');
  } else if (state.phase === 'act'){
    tag.textContent = t('phaseAct');
    var adef = findActDef(state.lastAction);
    txt.textContent = t('narrAct').replace('{a}', adef ? t(adef.labelKey) : state.lastAction);
    narr.classList.add('act');
  }
}

function updateTimeline(){
  var track = document.getElementById('timelineTrack');
  var fill = document.getElementById('tlFill');
  var head = document.getElementById('tlHead');
  var pct = state.history.length > 0 ? ((state.playbackIdx >= 0 ? state.playbackIdx : state.history.length - 1) / state.historyCap * 100) : 0;
  fill.style.width = (state.history.length / state.historyCap * 100) + '%';
  head.style.left = pct + '%';
  var lbl = document.getElementById('lblTimeline');
  lbl.textContent = t('labTimeline') + ' · ' + state.history.length + '/' + state.historyCap;
}

// =====================================================================
// EDITOR (L9)
// =====================================================================

function editorClick(e){
  if (!state.editorActive) return;
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var cx = Math.floor((mx - offX) / cellSize);
  var cy = Math.floor((my - offY) / cellSize);
  var w = state.world;
  if (cx < 0 || cx >= w.W || cy < 0 || cy >= w.H) return;
  // Don't allow editing border
  if (cx === 0 || cy === 0 || cx === w.W - 1 || cy === w.H - 1) return;

  var tool = state.editorTool;
  var key = cx + ',' + cy;

  // Clear any existing item at this cell
  w.walls[key] = false; delete w.walls[key];
  w.lights = w.lights.filter(function(l){ return !(l.x === cx && l.y === cy); });
  w.charges = w.charges.filter(function(c){ return !(c.x === cx && c.y === cy); });
  w.balls = w.balls.filter(function(b){ return !(b.x === cx && b.y === cy && !b.taken); });

  if (tool === 'wall') w.walls[key] = true;
  else if (tool === 'light') w.lights.push({x:cx, y:cy});
  else if (tool === 'charge') w.charges.push({x:cx, y:cy});
  else if (tool === 'red') w.balls.push({id:Date.now()+cx*100+cy, x:cx, y:cy, type:'red', taken:false, heldBy:-1});
  else if (tool === 'green') w.balls.push({id:Date.now()+cx*100+cy+1, x:cx, y:cy, type:'green', taken:false, heldBy:-1});
  else if (tool === 'start'){
    state.robots[0].x = cx;
    state.robots[0].y = cy;
  }
  // erase = just clear (already done)
}

function setEditorTool(tool){
  state.editorTool = tool;
  var btns = document.querySelectorAll('.tool-btn');
  for (var i = 0; i < btns.length; i++){
    btns[i].classList.toggle('active', btns[i].dataset.tool === tool);
  }
}

// =====================================================================
// EVENT HANDLING
// =====================================================================

var runInterval = null;
function startRun(){
  if (state.running) return;
  if (!state.alive){ resetLevel(false); }
  state.running = true;
  document.getElementById('btnRun').textContent = t('btnStop');
  runInterval = setInterval(function(){ runOneTick(); }, state.tickInterval);
}
function stopRun(){
  state.running = false;
  if (runInterval){ clearInterval(runInterval); runInterval = null; }
  document.getElementById('btnRun').textContent = t('btnRun');
  state.phase = 'idle';
  updatePhasePanel();
}

function resetLevel(keepRules){
  stopRun();
  loadLevel(state.levelIndex);
  if (!keepRules){
    // keep rules but reset counts
    for (var rb = 0; rb < 2; rb++){
      for (var i = 0; i < state.rules[rb].length; i++){
        state.rules[rb][i].count = 0;
      }
    }
  }
  updateRulesPanel();
}

function stepOnce(){
  if (state.running) stopRun();
  if (!state.alive){ resetLevel(false); }
  runOneTick();
}

function toggleRecord(){
  state.recording = !state.recording;
  document.getElementById('btnRecord').textContent = state.recording ? t('btnRecordOn') : t('btnRecord');
}

function clearHistory(){
  state.history = [];
  state.playbackIdx = -1;
  updateTimeline();
}

function timelineSeek(e){
  if (state.history.length === 0) return;
  var rect = document.getElementById('timelineTrack').getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  var cap = state.historyCap;
  var idx = Math.floor(pct * Math.min(state.history.length, cap));
  idx = Math.max(0, Math.min(state.history.length - 1, idx));
  if (state.running) stopRun();
  seekPlayback(idx);
}

function stepBackPlayback(){
  if (state.running) stopRun();
  var idx = state.playbackIdx >= 0 ? state.playbackIdx - 1 : state.history.length - 2;
  seekPlayback(idx);
}
function stepFwdPlayback(){
  if (state.running) stopRun();
  var idx = state.playbackIdx >= 0 ? state.playbackIdx + 1 : 0;
  seekPlayback(idx);
}

function toggleLang(){
  LANG = (LANG === 'zh') ? 'en' : 'zh';
  document.getElementById('btnLang').textContent = LANG === 'zh' ? 'EN' : 'CN';
  applyI18n();
}

function showHint(){
  var lvl = LEVELS[state.levelIndex];
  var tag = document.getElementById('narrTag');
  var txt = document.getElementById('narrText');
  var narr = document.getElementById('narration');
  narr.className = 'narration think';
  tag.textContent = (LANG === 'zh' ? '提示' : 'HINT');
  txt.textContent = t('hintL' + lvl.id);
}

function attachEvents(){
  document.getElementById('btnRun').onclick = function(){
    if (state.running) stopRun();
    else startRun();
  };
  document.getElementById('btnReset').onclick = function(){ resetLevel(false); };
  document.getElementById('btnStep').onclick = stepOnce;
  document.getElementById('btnHint').onclick = showHint;
  document.getElementById('btnLang').onclick = toggleLang;
  document.getElementById('btnAddRule').onclick = addRule;
  document.getElementById('btnStepBack').onclick = stepBackPlayback;
  document.getElementById('btnStepFwd').onclick = stepFwdPlayback;
  document.getElementById('btnRecord').onclick = toggleRecord;
  document.getElementById('btnClear').onclick = clearHistory;

  document.getElementById('timelineTrack').onclick = timelineSeek;

  document.getElementById('tabRobotA').onclick = function(){
    state.activeRobot = 0;
    updateRulesPanel();
  };
  document.getElementById('tabRobotB').onclick = function(){
    state.activeRobot = 1;
    updateRulesPanel();
  };

  // Editor tool buttons
  var toolBtns = document.querySelectorAll('.tool-btn');
  for (var i = 0; i < toolBtns.length; i++){
    (function(btn){
      btn.onclick = function(){ setEditorTool(btn.dataset.tool); };
    })(toolBtns[i]);
  }

  canvas.onclick = editorClick;

  // Modal
  document.getElementById('modalStart').onclick = function(){
    document.getElementById('modal').classList.remove('show');
  };

  window.addEventListener('resize', resize);
}

// =====================================================================
// MAIN LOOP
// =====================================================================

function frame(ts){
  resize();
  draw();
  state.frameCount++;
  if (!state.lastFpsTime) state.lastFpsTime = ts;
  if (ts - state.lastFpsTime > 1000){
    state.fps = state.frameCount;
    state.frameCount = 0;
    state.lastFpsTime = ts;
    updateHUD();
  }
  requestAnimationFrame(frame);
}

// =====================================================================
// BOOT
// =====================================================================

function init(){
  resize();
  applyI18n();
  buildLevelButtons();
  attachEvents();
  loadLevel(0);
  // Seed with 2 empty rules so students see the structure
  if (state.rules[0].length === 0){
    addRule();
    addRule();
  }
  requestAnimationFrame(frame);
}

window.addEventListener('load', function(){ setTimeout(init, 30); });
</script>
