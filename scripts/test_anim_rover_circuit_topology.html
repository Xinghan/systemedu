<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'CIRCUIT TOPOLOGY',cn:'\u7535\u8def\u62d3\u6251\u4e0e\u7535\u6d41\u65b9\u5411'},

  btnPause:{en:'PAUSE',cn:'\u6682\u505c'},
  btnPrev:{en:'PREV',cn:'\u4e0a\u4e00\u5e27'},
  btnNext:{en:'NEXT',cn:'\u4e0b\u4e00\u5e27'},
  guideTitle:{en:'VIEWING GUIDE',cn:'\u89c2\u770b\u6307\u5357'},
  guideDesc:{en:'Visualizes the rover power circuit: battery, motor driver, motors, and emergency stop relay. Watch current flow and see what happens when E-STOP is triggered.',cn:'\u53ef\u89c6\u5316 rover \u7535\u6e90\u7535\u8def\uff1a\u7535\u6c60\u3001\u7535\u673a\u9a71\u52a8\u3001\u7535\u673a\u3001\u6025\u505c\u7ee7\u7535\u5668\u3002\u89c2\u5bdf\u7535\u6d41\u6d41\u5411\uff0c\u4ee5\u53ca\u6025\u505c\u89e6\u53d1\u65f6\u7684\u53d8\u5316\u3002'},
  guideObs1:{en:'Follow animated current dots',cn:'\u8ddf\u968f\u7535\u6d41\u7c92\u5b50\u52a8\u753b'},
  guideObs2:{en:'E-STOP breaks the circuit loop',cn:'\u6025\u505c\u65ad\u5f00\u56de\u8def'},
  guideObs3:{en:'Notice voltage labels change',cn:'\u6ce8\u610f\u7535\u538b\u6807\u6ce8\u53d8\u5316'},
  guideTakeaway:{en:'E-STOP must cut ALL motor power instantly',cn:'\u6025\u505c\u5fc5\u987b\u77ac\u95f4\u5207\u65ad\u6240\u6709\u7535\u673a\u7535\u6e90'},
  guideToggle:{en:'[collapse]',cn:'[\u6536\u8d77]'},
  hudL1:{en:'FRAME',cn:'\u5e27'},
  hudL2:{en:'VOLTAGE',cn:'\u7535\u538b'},
  hudL3:{en:'CURRENT',cn:'\u7535\u6d41'},
  hudL4:{en:'E-STOP',cn:'\u6025\u505c'},
  f0title:{en:'CIRCUIT OVERVIEW',cn:'\u7535\u8def\u603b\u89c8'},
  f0desc:{en:'Complete rover power circuit layout',cn:'\u5b8c\u6574\u7684 rover \u7535\u6e90\u7535\u8def\u5e03\u5c40'},
  f1title:{en:'POWER ON: CURRENT FLOW',cn:'\u4e0a\u7535\uff1a\u7535\u6d41\u6d41\u52a8'},
  f1desc:{en:'Battery supplies 12V through driver to motors',cn:'\u7535\u6c60\u901a\u8fc7\u9a71\u52a8\u677f\u5411\u7535\u673a\u4f9b\u7535 12V'},
  f2title:{en:'E-STOP RELAY: ARMED',cn:'\u6025\u505c\u7ee7\u7535\u5668\uff1a\u5f85\u547d'},
  f2desc:{en:'E-STOP relay sits in main power line',cn:'\u6025\u505c\u7ee7\u7535\u5668\u4f4d\u4e8e\u4e3b\u7535\u6e90\u7ebf\u8def\u4e2d'},
  f3title:{en:'E-STOP TRIGGERED!',cn:'\u6025\u505c\u89e6\u53d1\uff01'},
  f3desc:{en:'Relay opens, all current stops instantly',cn:'\u7ee7\u7535\u5668\u65ad\u5f00\uff0c\u6240\u6709\u7535\u6d41\u77ac\u95f4\u505c\u6b62'},
  f4title:{en:'CIRCUIT SAFE STATE',cn:'\u7535\u8def\u5b89\u5168\u72b6\u6001'},
  f4desc:{en:'Motors de-energized, system can be inspected',cn:'\u7535\u673a\u65ad\u7535\uff0c\u7cfb\u7edf\u53ef\u5b89\u5168\u68c0\u67e5'},
  lblBattery:{en:'BATTERY\n12V',cn:'\u7535\u6c60\n12V'},
  lblDriver:{en:'MOTOR\nDRIVER',cn:'\u7535\u673a\n\u9a71\u52a8'},
  lblMotorL:{en:'MOTOR L',cn:'\u5de6\u7535\u673a'},
  lblMotorR:{en:'MOTOR R',cn:'\u53f3\u7535\u673a'},
  lblEstop:{en:'E-STOP\nRELAY',cn:'\u6025\u505c\n\u7ee7\u7535\u5668'},
  lblGND:{en:'GND',cn:'GND'},
  lblVcc:{en:'+12V',cn:'+12V'},
  lblOpen:{en:'OPEN',cn:'\u65ad\u5f00'},
  lblClosed:{en:'CLOSED',cn:'\u95ed\u5408'},
  voltNormal:{en:'12.0V',cn:'12.0V'},
  voltZero:{en:'0.0V',cn:'0.0V'},
  curNormal:{en:'2.4A',cn:'2.4A'},
  curZero:{en:'0.0A',cn:'0.0A'},
  estopOff:{en:'NORMAL',cn:'\u6b63\u5e38'},
  estopOn:{en:'TRIGGERED',cn:'\u5df2\u89e6\u53d1'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvasWrap');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
var currentFrame=0,totalFrames=5;
var transitioning=false;
var playing=false,playTimer=null;
var animTime=0,lastTs=0;

function lerp(a,b,p){return a+(b-a)*p;}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function merge(base,ov){var r={};for(var k in base)r[k]=base[k];for(var k2 in ov)r[k2]=ov[k2];return r;}

function resize(){
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;H=rect.height;
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawFrame(currentFrame);
}

function drawBg(){
  var grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#121318');grd.addColorStop(1,'#0d0e13');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

/* --- Component Drawing --- */
function drawComponentBox(x,y,w,h,label,color,glowColor,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var grd=ctx.createLinearGradient(x,y,x+w,y+h);
  grd.addColorStop(0,color);grd.addColorStop(1,shadeColor(color,-30));
  ctx.fillStyle=grd;ctx.fillRect(x,y,w,h);
  if(glowColor){
    ctx.shadowColor=glowColor;ctx.shadowBlur=10;
    ctx.strokeStyle=glowColor;ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
    ctx.shadowBlur=0;
  }
  // label
  var lines=label.split('\n');
  ctx.font='bold 10px "Space Grotesk",sans-serif';ctx.fillStyle='#e8e8ec';ctx.textAlign='center';ctx.textBaseline='middle';
  lines.forEach(function(line,i){
    ctx.fillText(line,x+w/2,y+h/2+(i-(lines.length-1)/2)*13);
  });
  ctx.restore();
}

function shadeColor(c,pct){
  var num=parseInt(c.replace('#',''),16);
  var r=Math.min(255,Math.max(0,((num>>16)&0xFF)+pct));
  var g=Math.min(255,Math.max(0,((num>>8)&0xFF)+pct));
  var b=Math.min(255,Math.max(0,(num&0xFF)+pct));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function drawCurrentDots(pts,color,alpha,speed){
  if(alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  var now=performance.now()*speed;
  // draw line path
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.globalAlpha=alpha*0.4;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
  // draw moving dots
  ctx.globalAlpha=alpha;
  var totalLen=0;var segs=[];
  for(var j=1;j<pts.length;j++){
    var dx=pts[j][0]-pts[j-1][0],dy=pts[j][1]-pts[j-1][1];
    var sl=Math.sqrt(dx*dx+dy*dy);segs.push(sl);totalLen+=sl;
  }
  for(var d=0;d<4;d++){
    var pos=((now/1000+d*0.25)%1)*totalLen;
    var accum=0;
    for(var s=0;s<segs.length;s++){
      if(accum+segs[s]>=pos){
        var frac=(pos-accum)/segs[s];
        var px=lerp(pts[s][0],pts[s+1][0],frac);
        var py=lerp(pts[s][1],pts[s+1][1],frac);
        ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
        ctx.fillStyle=color;ctx.fill();
        ctx.shadowColor=color;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
        break;
      }
      accum+=segs[s];
    }
  }
  ctx.restore();
}

function drawEstopBtn(x,y,r,triggered,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var grd=ctx.createRadialGradient(x,y,r*0.2,x,y,r);
  if(triggered){
    grd.addColorStop(0,'#ff6666');grd.addColorStop(0.6,'#cc0000');grd.addColorStop(1,'#880000');
  } else {
    grd.addColorStop(0,'#66ff66');grd.addColorStop(0.6,'#008800');grd.addColorStop(1,'#004400');
  }
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  if(triggered){
    ctx.shadowColor='#ff0000';ctx.shadowBlur=15;
    ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  }
  ctx.font='bold 8px "Space Grotesk",sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('E-STOP',x,y);
  ctx.restore();
}

function drawBrokenLine(x1,y1,x2,y2,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.setLineDash([4,4]);
  var mx=(x1+x2)/2,my=(y1+y2)/2;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(mx-8,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+8,my);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.setLineDash([]);
  // X mark
  ctx.strokeStyle='#ef4444';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(mx-5,my-5);ctx.lineTo(mx+5,my+5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+5,my-5);ctx.lineTo(mx-5,my+5);ctx.stroke();
  ctx.restore();
}

function drawLabelPrimitive(text,x,y,color,size,align){
  ctx.save();ctx.font=(size||12)+'px "Space Grotesk",sans-serif';
  ctx.fillStyle=color||'#dbfcff';ctx.textAlign=align||'center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y);ctx.restore();
}

/* --- Frame Elements --- */
function getFrameElements(f){
  var cx=W/2,cy=H/2;
  var bw=70,bh=45; // component box size
  // positions
  var batX=cx-W*0.32,batY=cy-20;
  var estopX=cx-W*0.12,estopY=cy-20;
  var drvX=cx+W*0.08,drvY=cy-20;
  var mlX=cx+W*0.28,mlY=cy-50;
  var mrX=cx+W*0.28,mrY=cy+20;
  var estopTriggered=(f>=3);
  var showCurrent=(f===1||f===2);
  var elems=[];

  // title & desc
  var titles=['f0title','f1title','f2title','f3title','f4title'];
  var descs=['f0desc','f1desc','f2desc','f3desc','f4desc'];
  elems.push({id:'title',type:'label',text:t(titles[f]),x:cx,y:22,color:'#dbfcff',size:15,align:'center',alpha:1});
  elems.push({id:'desc',type:'label',text:t(descs[f]),x:cx,y:H-16,color:'#8a8a90',size:11,align:'center',alpha:1});

  // battery
  elems.push({id:'battery',type:'custom',x:batX,y:batY,w:bw,h:bh,alpha:1,
    draw:function(a){drawComponentBox(batX,batY,bw,bh,t('lblBattery'),'#2d5016',estopTriggered?null:'#2ff801',a);}});

  // e-stop relay
  elems.push({id:'estop',type:'custom',x:estopX,y:estopY,w:bw,h:bh,alpha:1,
    draw:function(a){drawComponentBox(estopX,estopY,bw,bh,t('lblEstop'),estopTriggered?'#5c1a1a':'#1a3a5c',estopTriggered?'#ef4444':'#00F0FF',a);}});

  // e-stop button
  elems.push({id:'estopBtn',type:'custom',x:estopX+bw/2,y:estopY-25,w:20,h:20,alpha:f>=2?1:0,
    draw:function(a){if(a>0.01)drawEstopBtn(estopX+bw/2,estopY-25,12,estopTriggered,a);}});

  // driver
  elems.push({id:'driver',type:'custom',x:drvX,y:drvY,w:bw,h:bh,alpha:1,
    draw:function(a){drawComponentBox(drvX,drvY,bw,bh,t('lblDriver'),'#1a472a',estopTriggered?null:'#00F0FF',a);}});

  // motors
  elems.push({id:'motorL',type:'custom',x:mlX,y:mlY,w:60,h:30,alpha:1,
    draw:function(a){drawComponentBox(mlX,mlY,60,30,t('lblMotorL'),'#4a3520',estopTriggered?null:'#ebb2ff',a);}});
  elems.push({id:'motorR',type:'custom',x:mrX,y:mrY,w:60,h:30,alpha:1,
    draw:function(a){drawComponentBox(mrX,mrY,60,30,t('lblMotorR'),'#4a3520',estopTriggered?null:'#ebb2ff',a);}});

  // connection lines (always present)
  // bat -> estop
  if(!estopTriggered){
    elems.push({id:'line_bat_estop',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
      draw:function(a){
        ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=showCurrent?'#2ff801':'#4a5568';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(batX+bw,batY+bh/2);ctx.lineTo(estopX,estopY+bh/2);ctx.stroke();ctx.restore();
      }});
  } else {
    elems.push({id:'line_bat_estop',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
      draw:function(a){drawBrokenLine(batX+bw,batY+bh/2,estopX,estopY+bh/2,a);}});
  }

  // estop -> driver
  elems.push({id:'line_estop_drv',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
    draw:function(a){
      ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=(!estopTriggered&&showCurrent)?'#2ff801':'#4a5568';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(estopX+bw,estopY+bh/2);ctx.lineTo(drvX,drvY+bh/2);ctx.stroke();ctx.restore();
    }});

  // driver -> motors
  elems.push({id:'line_drv_ml',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
    draw:function(a){
      ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=(!estopTriggered&&showCurrent)?'#ebb2ff':'#4a5568';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(drvX+bw,drvY+bh*0.3);ctx.lineTo(mlX,mlY+15);ctx.stroke();ctx.restore();
    }});
  elems.push({id:'line_drv_mr',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
    draw:function(a){
      ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=(!estopTriggered&&showCurrent)?'#ebb2ff':'#4a5568';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(drvX+bw,drvY+bh*0.7);ctx.lineTo(mrX,mrY+15);ctx.stroke();ctx.restore();
    }});

  // GND return line (bottom)
  var gndY=cy+bh+20;
  elems.push({id:'line_gnd',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
    draw:function(a){
      ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#4a5568';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(mlX+30,mlY+30);ctx.lineTo(mlX+30,gndY);ctx.lineTo(batX+bw/2,gndY);ctx.lineTo(batX+bw/2,batY+bh);ctx.stroke();
      ctx.setLineDash([]);
      drawLabelPrimitive(t('lblGND'),cx,gndY+12,'#8a8a90',9,'center');
      ctx.restore();
    }});

  // current flow dots (only when powered and not stopped)
  if(showCurrent){
    elems.push({id:'dots_main',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
      draw:function(a){
        drawCurrentDots([
          [batX+bw,batY+bh/2],[estopX,estopY+bh/2],[estopX+bw,estopY+bh/2],
          [drvX,drvY+bh/2],[drvX+bw,drvY+bh*0.3],[mlX,mlY+15]
        ],'#2ff801',a,0.6);
      }});
    elems.push({id:'dots_mr',type:'custom',x:0,y:0,w:1,h:1,alpha:1,
      draw:function(a){
        drawCurrentDots([
          [drvX+bw,drvY+bh*0.7],[mrX,mrY+15]
        ],'#ebb2ff',a,0.5);
      }});
  }

  // voltage labels
  if(f>=1){
    var vLabel=estopTriggered?t('voltZero'):t('voltNormal');
    var vColor=estopTriggered?'#ef4444':'#2ff801';
    elems.push({id:'lbl_vcc',type:'label',text:t('lblVcc')+': '+vLabel,x:cx-W*0.22,y:estopY-10,color:vColor,size:10,align:'center',alpha:1});
  }

  // estop status label
  if(f>=2){
    var stLabel=estopTriggered?t('lblOpen'):t('lblClosed');
    var stColor=estopTriggered?'#ef4444':'#2ff801';
    elems.push({id:'lbl_estop_st',type:'label',text:stLabel,x:estopX+bw/2,y:estopY+bh+12,color:stColor,size:10,align:'center',alpha:1});
  }

  // safe state indicator
  if(f===4){
    elems.push({id:'safe_label',type:'label',text:'SAFE',x:cx,y:cy-H*0.3,color:'#2ff801',size:18,align:'center',alpha:1});
  }

  return elems;
}

function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  switch(el.type){
    case 'label':drawLabelPrimitive(el.text,el.x,el.y,el.color,el.size,el.align);break;
    case 'custom':el.draw(el.alpha);break;
  }
  ctx.restore();
}

function drawFrame(f){
  drawBg();
  var elems=getFrameElements(f);
  elems.forEach(function(el){drawElement(el);});
}

function transitionTo(newFrame){
  if(newFrame<0)newFrame=0;
  if(newFrame>=totalFrames)newFrame=totalFrames-1;
  if(newFrame===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return;}
  if(transitioning)return;
  var oldElems=getFrameElements(currentFrame);
  var newElems=getFrameElements(newFrame);
  var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e;});
  var newMap={};newElems.forEach(function(e){newMap[e.id]=e;});
  currentFrame=newFrame;updateHUD(newFrame);
  transitioning=true;
  var startTime=null,duration=500;
  function step(ts){
    if(!startTime)startTime=ts;
    var raw=Math.min((ts-startTime)/duration,1);
    var p=easeInOut(raw);
    drawBg();
    oldElems.forEach(function(oe){if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}));});
    newElems.forEach(function(ne){
      var oe=oldMap[ne.id];
      if(oe){
        var merged=merge(ne,{x:lerp(oe.x||0,ne.x||0,p),y:lerp(oe.y||0,ne.y||0,p),
          w:lerp(oe.w||0,ne.w||0,p),h:lerp(oe.h||0,ne.h||0,p),alpha:1});
        if((ne.type==='label')&&oe.text!==ne.text){
          drawElement(merge(oe,{alpha:1-p}));drawElement(merge(ne,{alpha:p}));
        } else {drawElement(merged);}
      } else {drawElement(merge(ne,{alpha:p}));}
    });
    if(raw<1){requestAnimationFrame(step);}else{transitioning=false;}
  }
  requestAnimationFrame(step);
}

// continuous animation for current dots
var continuousRAF=null;
function continuousRender(){
  if(currentFrame===1||currentFrame===2){
    if(!transitioning)drawFrame(currentFrame);
  }
  continuousRAF=requestAnimationFrame(continuousRender);
}
continuousRAF=requestAnimationFrame(continuousRender);

function updateHUD(f){
  document.getElementById('hudV1').textContent=(f+1)+'/'+totalFrames;
  var estopTriggered=(f>=3);
  document.getElementById('hudV2').textContent=estopTriggered?t('voltZero'):t('voltNormal');
  document.getElementById('hudV3').textContent=estopTriggered?t('curZero'):((f>=1)?t('curNormal'):'--');
  document.getElementById('hudV4').textContent=estopTriggered?t('estopOn'):t('estopOff');
  document.getElementById('hudV4').style.color=estopTriggered?'#ef4444':'#2ff801';
  document.getElementById('frameInd').textContent=(f+1)+' / '+totalFrames;
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('subtitleText').textContent=t('subtitle');
  document.getElementById('btnPrev').textContent=t('btnPrev');
  document.getElementById('btnNext').textContent=t('btnNext');
  document.getElementById('btnPlay').textContent=playing?t('btnPause'):t('btnPlay');
  document.getElementById('hudL1').textContent=t('hudL1');
  document.getElementById('hudL2').textContent=t('hudL2');
  document.getElementById('hudL3').textContent=t('hudL3');
  document.getElementById('hudL4').textContent=t('hudL4');
  document.getElementById('guideTitle').innerHTML=t('guideTitle')+' <span class="guide-toggle">'+t('guideToggle')+'</span>';
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var list=document.getElementById('guideList');
  list.innerHTML='<li>'+t('guideObs1')+'</li><li>'+t('guideObs2')+'</li><li>'+t('guideObs3')+'</li>';
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  updateHUD(currentFrame);
  drawFrame(currentFrame);
}

document.getElementById('btnPrev').addEventListener('click',function(){
  if(playing)stopPlay();transitionTo(currentFrame-1);
});
document.getElementById('btnNext').addEventListener('click',function(){
  if(playing)stopPlay();transitionTo(currentFrame+1);
});
document.getElementById('btnPlay').addEventListener('click',function(){
  if(playing){stopPlay();}else{startPlay();}
});
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('guideTitle').addEventListener('click',function(){
  var c=document.getElementById('guideContent');
  c.style.display=c.style.display==='none'?'':'none';
});

function startPlay(){
  playing=true;document.getElementById('btnPlay').textContent=t('btnPause');
  if(currentFrame>=totalFrames-1)currentFrame=-1;
  function advance(){
    if(!playing)return;
    if(currentFrame<totalFrames-1){transitionTo(currentFrame+1);playTimer=setTimeout(advance,2000);}
    else{stopPlay();}
  }
  advance();
}
function stopPlay(){
  playing=false;if(playTimer){clearTimeout(playTimer);playTimer=null;}
  document.getElementById('btnPlay').textContent=t('btnPlay');
}

window.addEventListener('resize',resize);
refreshI18N();resize();
setTimeout(resize,200);setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});
})();
</script>
