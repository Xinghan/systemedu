<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scenario Classify</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:10px 16px 6px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .sub{font-size:11px;color:#8a8886;margin-top:2px}
.game-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:8px 12px;gap:8px;overflow:hidden}
.source-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:4px 0;min-height:40px;align-content:flex-start}
.drop-zones{display:flex;gap:8px;flex:1;min-height:0}
.drop-zone{flex:1;display:flex;flex-direction:column;background:rgba(28,27,27,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:0;padding:6px;min-height:0}
.drop-zone.highlight{border-color:#ffb59c;background:rgba(255,127,80,0.06)}
.drop-zone h3{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-align:center;padding:4px 0;flex-shrink:0;text-transform:uppercase;border-radius:0}
.zone-normal h3{color:#10b981}
.zone-boundary h3{color:#ffb59c}
.zone-fault h3{color:#ff5f1f}
.zone-items{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:4px 0}
.card{padding:6px 8px;font-size:11px;line-height:1.4;cursor:grab;background:rgba(53,53,52,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:0;user-select:none;-webkit-user-select:none;transition:transform 0.15s,box-shadow 0.15s}
.card:active{cursor:grabbing}
.card.dragging{opacity:0.4}
.card .card-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;color:#ffb59c;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px}
.card .card-desc{color:#c6c6c6;font-size:10px}
.feedback-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.55);flex-shrink:0}
.feedback-bar .score{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#ffb59c;font-weight:700}
.feedback-bar .msg{font-size:12px;color:#8a8886}
.feedback-bar button{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:5px 14px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(53,53,52,0.6);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;border-radius:0}
.feedback-bar button:hover{background:rgba(255,127,80,0.15)}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;border-radius:0}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);border-radius:0}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel .guide-content ul{padding-left:16px;line-height:1.7}
.guide-panel .guide-content p{margin-bottom:6px;line-height:1.6}
.guide-toggle{font-size:10px;color:#8a8886}
.result-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
.result-overlay.show{display:flex}
.result-box{background:rgba(28,27,27,0.95);border:1px solid rgba(255,255,255,0.08);padding:24px 32px;max-width:420px;text-align:center;border-radius:0}
.result-box h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#ffb59c;margin-bottom:12px;letter-spacing:2px}
.result-box p{font-size:13px;line-height:1.6;color:#c6c6c6;margin-bottom:8px}
.result-box .detail{font-size:11px;color:#8a8886;line-height:1.5;text-align:left;margin-top:8px}
.result-box button{margin-top:12px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 24px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(53,53,52,0.6);color:#ffb59c;letter-spacing:1px;border-radius:0}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span class="guide-toggle" id="guideArrow">[-]</span></h3>
  <div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="mainTitle"></h1>
    <div class="sub" id="mainSub"></div>
  </div>
  <div class="game-area">
    <div class="source-row" id="sourceRow"></div>
    <div class="drop-zones">
      <div class="drop-zone zone-normal" id="zoneNormal">
        <h3 id="zoneNormalTitle"></h3>
        <div class="zone-items" id="zoneNormalItems"></div>
      </div>
      <div class="drop-zone zone-boundary" id="zoneBoundary">
        <h3 id="zoneBoundaryTitle"></h3>
        <div class="zone-items" id="zoneBoundaryItems"></div>
      </div>
      <div class="drop-zone zone-fault" id="zoneFault">
        <h3 id="zoneFaultTitle"></h3>
        <div class="zone-items" id="zoneFaultItems"></div>
      </div>
    </div>
  </div>
  <div class="feedback-bar">
    <span class="score" id="scoreDisplay"></span>
    <span class="msg" id="msgDisplay"></span>
    <button id="btnCheck"></button>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <h2 id="resultTitle"></h2>
    <p id="resultMsg"></p>
    <div class="detail" id="resultDetail"></div>
    <button id="btnRetry"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'SCENARIO CLASSIFIER',cn:'\u9a8c\u6536\u573a\u666f\u5206\u7c7b\u5668'},
  sub:{en:'Drag each scenario card into the correct category zone',cn:'\u5c06\u6bcf\u4e2a\u573a\u666f\u5361\u7247\u62d6\u62fd\u5230\u6b63\u786e\u7684\u5206\u7c7b\u533a\u57df'},
  guideTitle:{en:'GAME GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{
    en:'<p>Classify 12 acceptance test scenarios into three categories.</p><ul><li>Drag cards from top into the correct zone below</li><li>Normal: standard conditions, expected results</li><li>Boundary: extreme inputs or edge cases</li><li>Fault Injection: deliberately broken interfaces</li><li>Click CHECK to verify your answers</li></ul>',
    cn:'<p>\u5c06 12 \u4e2a\u9a8c\u6536\u6d4b\u8bd5\u573a\u666f\u5206\u7c7b\u5230\u4e09\u4e2a\u7c7b\u522b\u4e2d\u3002</p><ul><li>\u4ece\u9876\u90e8\u62d6\u62fd\u5361\u7247\u5230\u4e0b\u65b9\u5bf9\u5e94\u533a\u57df</li><li>\u6b63\u5e38\u901a\u884c\uff1a\u6807\u51c6\u6761\u4ef6\u3001\u9884\u671f\u7ed3\u679c</li><li>\u8fb9\u754c\u5730\u8c8c\uff1a\u6781\u7aef\u8f93\u5165\u6216\u8fb9\u7f18\u60c5\u51b5</li><li>\u6545\u969c\u6ce8\u5165\uff1a\u4e3b\u52a8\u7834\u574f\u63a5\u53e3\u5951\u7ea6</li><li>\u70b9\u51fb\u201c\u68c0\u67e5\u201d\u9a8c\u8bc1\u7b54\u6848</li></ul>'
  },
  zoneNormal:{en:'NORMAL',cn:'\u6b63\u5e38\u901a\u884c'},
  zoneBoundary:{en:'BOUNDARY',cn:'\u8fb9\u754c\u5730\u8c8c'},
  zoneFault:{en:'FAULT INJECTION',cn:'\u6545\u969c\u6ce8\u5165'},
  btnCheck:{en:'CHECK',cn:'\u68c0\u67e5'},
  btnRetry:{en:'RETRY',cn:'\u91cd\u8bd5'},
  scoreLabel:{en:'SCORE',cn:'\u5f97\u5206'},
  msgReady:{en:'Drag all 12 cards into zones, then click CHECK',cn:'\u5c06 12 \u5f20\u5361\u7247\u62d6\u5165\u533a\u57df\u540e\u70b9\u51fb\u68c0\u67e5'},
  msgIncomplete:{en:'Place all cards first!',cn:'\u8bf7\u5148\u653e\u7f6e\u6240\u6709\u5361\u7247\uff01'},
  resultPerfect:{en:'PERFECT!',cn:'\u6ee1\u5206\uff01'},
  resultGood:{en:'WELL DONE!',cn:'\u5e72\u5f97\u6f02\u4eae\uff01'},
  resultTry:{en:'KEEP TRYING',cn:'\u7ee7\u7eed\u52a0\u6cb9'},
  resultPerfectMsg:{en:'All 12 scenarios correctly classified!',cn:'\u5168\u90e8 12 \u4e2a\u573a\u666f\u5206\u7c7b\u6b63\u786e\uff01'},
  resultGoodMsg:{en:'scenarios correctly classified.',cn:'\u4e2a\u573a\u666f\u5206\u7c7b\u6b63\u786e\u3002'},
  resultWrong:{en:'Incorrect:',cn:'\u9519\u8bef\uff1a'},
  resultShouldBe:{en:'should be',cn:'\u5e94\u4e3a'},
  // Scenario titles and descriptions
  s0t:{en:'Flat terrain, clear sky',cn:'\u5e73\u5766\u5730\u5f62\uff0c\u6674\u6717\u5929\u7a7a'},
  s0d:{en:'Standard Navcam image, well-lit, no obstacles',cn:'\u6807\u51c6 Navcam \u56fe\u50cf\uff0c\u5149\u7ebf\u826f\u597d\uff0c\u65e0\u969c\u788d\u7269'},
  s1t:{en:'Rocky path with clear markers',cn:'\u5ca9\u77f3\u8def\u5f84\uff0c\u6807\u8bb0\u6e05\u6670'},
  s1d:{en:'Moderate rocks, all terrain classes visible',cn:'\u4e2d\u7b49\u5ca9\u77f3\uff0c\u6240\u6709\u5730\u5f62\u7c7b\u522b\u53ef\u89c1'},
  s2t:{en:'Sand dunes at dusk',cn:'\u9ec4\u660f\u65f6\u5206\u7684\u6c99\u4e18'},
  s2d:{en:'Low contrast, all-sand terrain, shadows dominate',cn:'\u4f4e\u5bf9\u6bd4\u5ea6\uff0c\u5168\u6c99\u5730\u5f62\uff0c\u9634\u5f71\u4e3b\u5bfc'},
  s3t:{en:'Extreme dark (night-side)',cn:'\u6781\u7aef\u6697\u5149\uff08\u80cc\u5149\u9762\uff09'},
  s3d:{en:'Near-zero illumination, sensor noise dominates',cn:'\u63a5\u8fd1\u96f6\u7167\u660e\uff0c\u4f20\u611f\u5668\u566a\u58f0\u4e3b\u5bfc'},
  s4t:{en:'Obstacle at image edge only',cn:'\u969c\u788d\u7269\u4ec5\u5728\u56fe\u50cf\u8fb9\u7f18'},
  s4d:{en:'Hazard partially visible at frame boundary',cn:'\u5371\u9669\u7269\u90e8\u5206\u53ef\u89c1\u4e8e\u753b\u9762\u8fb9\u754c'},
  s5t:{en:'Single-class terrain (all unknown)',cn:'\u5355\u7c7b\u5730\u5f62\uff08\u5168\u672a\u77e5\uff09'},
  s5d:{en:'Entire image classified as unknown, no gradient',cn:'\u6574\u5f20\u56fe\u50cf\u5206\u7c7b\u4e3a\u672a\u77e5\uff0c\u65e0\u68af\u5ea6'},
  s6t:{en:'Coord sys pixel->world mismatch',cn:'\u5750\u6807\u7cfb pixel->world \u4e0d\u5339\u914d'},
  s6d:{en:'Segmentation outputs pixel coords but risk map expects world coords',cn:'\u5206\u5272\u8f93\u51fa\u50cf\u7d20\u5750\u6807\u4f46\u98ce\u9669\u5730\u56fe\u671f\u671b\u4e16\u754c\u5750\u6807'},
  s7t:{en:'Timestamp out of order',cn:'\u65f6\u95f4\u6233\u4e71\u5e8f'},
  s7d:{en:'Path planner receives timestamps in wrong order',cn:'\u8def\u5f84\u89c4\u5212\u5668\u6536\u5230\u4e71\u5e8f\u65f6\u95f4\u6233'},
  s8t:{en:'Empty segmentation mask',cn:'\u7a7a\u5206\u5272\u63a9\u8180'},
  s8d:{en:'Segmentation returns zero-size tensor to risk map',cn:'\u5206\u5272\u8fd4\u56de\u96f6\u5c3a\u5bf8\u5f20\u91cf\u7ed9\u98ce\u9669\u5730\u56fe'},
  s9t:{en:'JSON/protobuf format swap',cn:'JSON/protobuf \u683c\u5f0f\u4e92\u6362'},
  s9d:{en:'Path planner sends JSON but vehicle ctrl expects protobuf',cn:'\u8def\u5f84\u89c4\u5212\u53d1 JSON \u4f46\u8f66\u63a7\u671f\u671b protobuf'},
  s10t:{en:'Gentle slope with scattered pebbles',cn:'\u7f13\u5761\u6563\u77f3\u5730\u5f62'},
  s10d:{en:'Normal driving conditions, slight elevation change',cn:'\u6b63\u5e38\u884c\u9a76\u6761\u4ef6\uff0c\u8f7b\u5fae\u6d77\u62d4\u53d8\u5316'},
  s11t:{en:'Mixed terrain with clear path',cn:'\u6df7\u5408\u5730\u5f62\u4e0e\u6e05\u6670\u8def\u5f84'},
  s11d:{en:'Multiple terrain types, safe corridor well-defined',cn:'\u591a\u79cd\u5730\u5f62\u7c7b\u578b\uff0c\u5b89\u5168\u901a\u9053\u660e\u786e'}
};
function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

// Scenario data: id, titleKey, descKey, correctZone
var scenarios=[
  {id:0,tk:'s0t',dk:'s0d',zone:'normal'},
  {id:1,tk:'s1t',dk:'s1d',zone:'normal'},
  {id:2,tk:'s2t',dk:'s2d',zone:'boundary'},
  {id:3,tk:'s3t',dk:'s3d',zone:'boundary'},
  {id:4,tk:'s4t',dk:'s4d',zone:'boundary'},
  {id:5,tk:'s5t',dk:'s5d',zone:'boundary'},
  {id:6,tk:'s6t',dk:'s6d',zone:'fault'},
  {id:7,tk:'s7t',dk:'s7d',zone:'fault'},
  {id:8,tk:'s8t',dk:'s8d',zone:'fault'},
  {id:9,tk:'s9t',dk:'s9d',zone:'fault'},
  {id:10,tk:'s10t',dk:'s10d',zone:'normal'},
  {id:11,tk:'s11t',dk:'s11d',zone:'normal'}
];

// Shuffle
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
  return arr;
}

var dragItem=null;
var dragGhost=null;
var dragOffX=0,dragOffY=0;

function createCard(sc){
  var card=document.createElement('div');
  card.className='card';
  card.dataset.id=sc.id;
  card.innerHTML='<div class="card-title" data-tk="'+sc.tk+'">'+t(sc.tk)+'</div><div class="card-desc" data-dk="'+sc.dk+'">'+t(sc.dk)+'</div>';
  // Mouse events
  card.addEventListener('mousedown',function(e){startDrag(e,card);});
  // Touch events
  card.addEventListener('touchstart',function(e){startDragTouch(e,card);},{passive:false});
  return card;
}

function startDrag(e,card){
  e.preventDefault();
  dragItem=card;
  var rect=card.getBoundingClientRect();
  dragOffX=e.clientX-rect.left;
  dragOffY=e.clientY-rect.top;
  dragGhost=card.cloneNode(true);
  dragGhost.style.position='fixed';
  dragGhost.style.width=rect.width+'px';
  dragGhost.style.zIndex='500';
  dragGhost.style.pointerEvents='none';
  dragGhost.style.opacity='0.85';
  dragGhost.style.boxShadow='0 0 20px rgba(255,181,156,0.3)';
  dragGhost.style.left=(e.clientX-dragOffX)+'px';
  dragGhost.style.top=(e.clientY-dragOffY)+'px';
  document.body.appendChild(dragGhost);
  card.classList.add('dragging');
  document.addEventListener('mousemove',onMouseMove);
  document.addEventListener('mouseup',onMouseUp);
}

function startDragTouch(e,card){
  e.preventDefault();
  var touch=e.touches[0];
  dragItem=card;
  var rect=card.getBoundingClientRect();
  dragOffX=touch.clientX-rect.left;
  dragOffY=touch.clientY-rect.top;
  dragGhost=card.cloneNode(true);
  dragGhost.style.position='fixed';
  dragGhost.style.width=rect.width+'px';
  dragGhost.style.zIndex='500';
  dragGhost.style.pointerEvents='none';
  dragGhost.style.opacity='0.85';
  dragGhost.style.boxShadow='0 0 20px rgba(255,181,156,0.3)';
  dragGhost.style.left=(touch.clientX-dragOffX)+'px';
  dragGhost.style.top=(touch.clientY-dragOffY)+'px';
  document.body.appendChild(dragGhost);
  card.classList.add('dragging');
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchEnd);
}

function onMouseMove(e){
  if(!dragGhost)return;
  dragGhost.style.left=(e.clientX-dragOffX)+'px';
  dragGhost.style.top=(e.clientY-dragOffY)+'px';
  highlightZone(e.clientX,e.clientY);
}

function onTouchMove(e){
  e.preventDefault();
  if(!dragGhost)return;
  var touch=e.touches[0];
  dragGhost.style.left=(touch.clientX-dragOffX)+'px';
  dragGhost.style.top=(touch.clientY-dragOffY)+'px';
  highlightZone(touch.clientX,touch.clientY);
}

function highlightZone(cx,cy){
  var zones=['zoneNormal','zoneBoundary','zoneFault'];
  zones.forEach(function(zid){
    var z=document.getElementById(zid);
    var r=z.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
      z.classList.add('highlight');
    }else{
      z.classList.remove('highlight');
    }
  });
}

function clearHighlights(){
  ['zoneNormal','zoneBoundary','zoneFault'].forEach(function(zid){
    document.getElementById(zid).classList.remove('highlight');
  });
}

function dropCard(cx,cy){
  if(!dragItem)return;
  var zones=[
    {id:'zoneNormalItems',el:document.getElementById('zoneNormal')},
    {id:'zoneBoundaryItems',el:document.getElementById('zoneBoundary')},
    {id:'zoneFaultItems',el:document.getElementById('zoneFault')}
  ];
  var dropped=false;
  zones.forEach(function(z){
    var r=z.el.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
      document.getElementById(z.id).appendChild(dragItem);
      dropped=true;
    }
  });
  if(!dropped){
    // Return to source
    document.getElementById('sourceRow').appendChild(dragItem);
  }
  dragItem.classList.remove('dragging');
  if(dragGhost&&dragGhost.parentNode)dragGhost.parentNode.removeChild(dragGhost);
  dragGhost=null;dragItem=null;
  clearHighlights();
  updateScore();
}

function onMouseUp(e){
  dropCard(e.clientX,e.clientY);
  document.removeEventListener('mousemove',onMouseMove);
  document.removeEventListener('mouseup',onMouseUp);
}

function onTouchEnd(e){
  var touch=e.changedTouches[0];
  dropCard(touch.clientX,touch.clientY);
  document.removeEventListener('touchmove',onTouchMove);
  document.removeEventListener('touchend',onTouchEnd);
}

function getCardZone(cardEl){
  var parent=cardEl.parentNode;
  if(!parent)return null;
  if(parent.id==='zoneNormalItems')return 'normal';
  if(parent.id==='zoneBoundaryItems')return 'boundary';
  if(parent.id==='zoneFaultItems')return 'fault';
  return null;
}

function updateScore(){
  var placed=0;
  scenarios.forEach(function(sc){
    var card=document.querySelector('.card[data-id="'+sc.id+'"]');
    if(card&&getCardZone(card))placed++;
  });
  document.getElementById('scoreDisplay').textContent=t('scoreLabel')+': '+placed+'/12';
  if(placed<12){
    document.getElementById('msgDisplay').textContent=t('msgReady');
  }
}

function checkAnswers(){
  var placed=0,correct=0;
  var wrongs=[];
  scenarios.forEach(function(sc){
    var card=document.querySelector('.card[data-id="'+sc.id+'"]');
    var zone=getCardZone(card);
    if(zone){
      placed++;
      if(zone===sc.zone){
        correct++;
        card.style.borderColor='#10b981';
      }else{
        card.style.borderColor='#ff5f1f';
        wrongs.push({title:t(sc.tk),got:zone,expected:sc.zone});
      }
    }
  });
  if(placed<12){
    document.getElementById('msgDisplay').textContent=t('msgIncomplete');
    return;
  }
  // Show result
  var overlay=document.getElementById('resultOverlay');
  overlay.classList.add('show');
  if(correct===12){
    document.getElementById('resultTitle').textContent=t('resultPerfect');
    document.getElementById('resultMsg').textContent=t('resultPerfectMsg');
    document.getElementById('resultDetail').textContent='';
  }else{
    document.getElementById('resultTitle').textContent=correct>=9?t('resultGood'):t('resultTry');
    document.getElementById('resultMsg').textContent=correct+'/12 '+t('resultGoodMsg');
    var detail=wrongs.map(function(w){
      var zoneNames={normal:t('zoneNormal'),boundary:t('zoneBoundary'),fault:t('zoneFault')};
      return '- '+w.title+': '+zoneNames[w.got]+' -> '+t('resultShouldBe')+' '+zoneNames[w.expected];
    }).join('\n');
    document.getElementById('resultDetail').textContent=detail;
    document.getElementById('resultDetail').style.whiteSpace='pre-wrap';
  }
}

function resetGame(){
  document.getElementById('resultOverlay').classList.remove('show');
  var sourceRow=document.getElementById('sourceRow');
  var cards=document.querySelectorAll('.card');
  cards.forEach(function(c){
    c.style.borderColor='';
    sourceRow.appendChild(c);
  });
  shuffle(scenarios);
  // Re-order cards in source
  scenarios.forEach(function(sc){
    var card=document.querySelector('.card[data-id="'+sc.id+'"]');
    if(card)sourceRow.appendChild(card);
  });
  updateScore();
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSub').textContent=t('sub');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideContent').innerHTML=t('guideDesc');
  document.getElementById('zoneNormalTitle').textContent=t('zoneNormal');
  document.getElementById('zoneBoundaryTitle').textContent=t('zoneBoundary');
  document.getElementById('zoneFaultTitle').textContent=t('zoneFault');
  document.getElementById('btnCheck').textContent=t('btnCheck');
  document.getElementById('btnRetry').textContent=t('btnRetry');
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  // Update card texts
  document.querySelectorAll('.card').forEach(function(c){
    var titleEl=c.querySelector('.card-title');
    var descEl=c.querySelector('.card-desc');
    if(titleEl)titleEl.textContent=t(titleEl.dataset.tk);
    if(descEl)descEl.textContent=t(descEl.dataset.dk);
  });
  updateScore();
}

// Init
function init(){
  shuffle(scenarios);
  var sourceRow=document.getElementById('sourceRow');
  scenarios.forEach(function(sc){
    sourceRow.appendChild(createCard(sc));
  });
  refreshI18N();
}

// Event bindings
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';refreshI18N();
});

document.getElementById('btnCheck').addEventListener('click',checkAnswers);
document.getElementById('btnRetry').addEventListener('click',resetGame);

var guideOpen=true;
document.getElementById('guideToggle').addEventListener('click',function(){
  guideOpen=!guideOpen;
  document.getElementById('guideContent').style.display=guideOpen?'block':'none';
  document.getElementById('guideArrow').textContent=guideOpen?'[-]':'[+]';
});

init();
})();
</script>
</body>
</html>
