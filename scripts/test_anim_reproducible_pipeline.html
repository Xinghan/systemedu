<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reproducible Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0!important}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:10px 16px 6px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .sub{font-size:12px;color:#8a8886;margin-top:2px}
.canvas-wrap{flex:1;min-height:0;position:relative}
canvas{display:block;width:100%;height:100%}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;flex-shrink:0;background:rgba(28,27,27,0.92)}
.controls button{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,20,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;text-transform:uppercase}
.controls button:hover{background:rgba(255,127,80,0.15);border-color:rgba(255,127,80,0.3)}
.hud{display:flex;justify-content:space-around;padding:8px 16px;background:rgba(0,0,0,0.55);flex-shrink:0}
.hud-item{text-align:center}
.hud-item .label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.hud-item .value{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#ffb59c;font-weight:700}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:16px;line-height:1.7}
.guide-content.collapsed{display:none}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideDesc" style="margin-bottom:8px"></p>
    <ul id="guideList"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="titleText"></h1>
    <div class="sub" id="subtitleText"></div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <button id="btnPrev"></button>
    <button id="btnPlay"></button>
    <button id="btnNext"></button>
    <span id="frameInfo" style="font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886;margin-left:8px"></span>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="label" id="hudLabel0"></div><div class="value" id="hudValue0"></div></div>
    <div class="hud-item"><div class="label" id="hudLabel1"></div><div class="value" id="hudValue1"></div></div>
    <div class="hud-item"><div class="label" id="hudLabel2"></div><div class="value" id="hudValue2"></div></div>
    <div class="hud-item"><div class="label" id="hudLabel3"></div><div class="value" id="hudValue3"></div></div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'REPRODUCIBLE PIPELINE',cn:'\u53ef\u590d\u73b0\u6d41\u6c34\u7ebf'},
  subtitle:{en:'From Checkout to Verified Release in 5 Steps',cn:'\u4ece\u68c0\u51fa\u5230\u9a8c\u8bc1\u53d1\u5e03\u7684 5 \u4e2a\u6b65\u9aa4'},
  btnPrev:{en:'PREV',cn:'\u4e0a\u4e00\u5e27'},
  btnPlay:{en:'PLAY',cn:'\u64ad\u653e'},
  btnPause:{en:'PAUSE',cn:'\u6682\u505c'},
  btnNext:{en:'NEXT',cn:'\u4e0b\u4e00\u5e27'},
  guideTitle:{en:'VIEWING GUIDE',cn:'\u89c2\u770b\u6307\u5357'},
  guideDesc:{en:'Watch a complete reproducible build: checkout, build, test, compare, and tag.',cn:'\u89c2\u770b\u4e00\u6b21\u5b8c\u6574\u7684\u53ef\u590d\u73b0\u6784\u5efa\uff1a\u68c0\u51fa\u3001\u6784\u5efa\u3001\u6d4b\u8bd5\u3001\u6bd4\u5bf9\u3001\u6253\u6807\u7b7e\u3002'},
  guideObs1:{en:'Each step produces verifiable artifacts',cn:'\u6bcf\u4e2a\u6b65\u9aa4\u90fd\u4ea7\u751f\u53ef\u9a8c\u8bc1\u7684\u4ea7\u7269'},
  guideObs2:{en:'Compare old vs new results for consistency',cn:'\u5bf9\u6bd4\u65b0\u65e7\u7ed3\u679c\u786e\u8ba4\u4e00\u81f4\u6027'},
  guideObs3:{en:'The final tag makes everything traceable',cn:'\u6700\u7ec8\u6807\u7b7e\u8ba9\u4e00\u5207\u53ef\u8ffd\u6eaf'},
  hudStep:{en:'STEP',cn:'\u6b65\u9aa4'},
  hudArtifact:{en:'ARTIFACTS',cn:'\u4ea7\u7269'},
  hudTime:{en:'TIME',cn:'\u65f6\u95f4'},
  hudResult:{en:'RESULT',cn:'\u7ed3\u679c'},
  step1:{en:'CHECKOUT',cn:'\u68c0\u51fa\u4ee3\u7801'},
  step1Desc:{en:'Clone repo, checkout v1.0 tag, verify file integrity',cn:'\u514b\u9686\u4ed3\u5e93\u3001\u68c0\u51fa v1.0 \u6807\u7b7e\u3001\u9a8c\u8bc1\u6587\u4ef6\u5b8c\u6574\u6027'},
  step2:{en:'BUILD',cn:'\u6784\u5efa\u7cfb\u7edf'},
  step2Desc:{en:'Install dependencies, build risk classifier, generate cost map',cn:'\u5b89\u88c5\u4f9d\u8d56\u3001\u6784\u5efa\u98ce\u9669\u5206\u7c7b\u5668\u3001\u751f\u6210\u4ee3\u4ef7\u5730\u56fe'},
  step3:{en:'TEST',cn:'\u8fd0\u884c\u6d4b\u8bd5'},
  step3Desc:{en:'Execute regression suite, run rover simulation, check all pass',cn:'\u6267\u884c\u56de\u5f52\u5957\u4ef6\u3001\u8fd0\u884c\u706b\u661f\u8f66\u4eff\u771f\u3001\u68c0\u67e5\u5168\u90e8\u901a\u8fc7'},
  step4:{en:'COMPARE',cn:'\u7ed3\u679c\u6bd4\u5bf9'},
  step4Desc:{en:'Diff current output vs baseline: risk map, paths, scores must match',cn:'\u5bf9\u6bd4\u5f53\u524d\u8f93\u51fa\u4e0e\u57fa\u7ebf\uff1a\u98ce\u9669\u56fe\u3001\u8def\u5f84\u3001\u5206\u6570\u5fc5\u987b\u4e00\u81f4'},
  step5:{en:'TAG & RELEASE',cn:'\u6253\u6807\u7b7e\u4e0e\u53d1\u5e03'},
  step5Desc:{en:'Create version tag, write changelog, package demo bundle',cn:'\u521b\u5efa\u7248\u672c\u6807\u7b7e\u3001\u64b0\u5199\u53d8\u66f4\u65e5\u5fd7\u3001\u6253\u5305\u6f14\u793a\u5305'},
  pass:{en:'PASS',cn:'\u901a\u8fc7'},
  running:{en:'RUNNING',cn:'\u8fd0\u884c\u4e2d'},
  waiting:{en:'WAITING',cn:'\u7b49\u5f85'},
  released:{en:'RELEASED',cn:'\u5df2\u53d1\u5e03'},
  gitClone:{en:'git clone',cn:'git clone'},
  gitTag:{en:'git tag v1.0',cn:'git tag v1.0'},
  pipInstall:{en:'pip install',cn:'pip install'},
  pytest:{en:'pytest --regression',cn:'pytest --regression'},
  diff:{en:'diff baseline/',cn:'diff baseline/'},
  package:{en:'tar -czf release.tar.gz',cn:'tar -czf release.tar.gz'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvasWrap');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
var currentFrame=0,totalFrames=5;
var transitioning=false,playing=false;

function resize(){
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;H=rect.height;
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawFrame(currentFrame);
}

function lerp(a,b,p){return a+(b-a)*p;}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function merge(base,over){var r={};for(var k in base)r[k]=base[k];for(var k2 in over)r[k2]=over[k2];return r;}

function hexToRgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

var STEP_COLORS=['#00daf3','#ff7f50','#10b981','#ffb59c','#ff5f1f'];
var STEP_KEYS=['step1','step2','step3','step4','step5'];
var STEP_DESC_KEYS=['step1Desc','step2Desc','step3Desc','step4Desc','step5Desc'];
var CMD_KEYS=['gitClone','pipInstall','pytest','diff','package'];

function drawBg(){
  var grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#131313');grd.addColorStop(1,'#1a1020');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawPipelineStep(x,y,w,h,color,stepLabel,cmdLabel,statusLabel,active,alpha){
  if(alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  if(active){ctx.shadowColor=color;ctx.shadowBlur=18;}
  var grd=ctx.createLinearGradient(x,y,x+w,y);
  grd.addColorStop(0,hexToRgba(color,active?0.3:0.1));
  grd.addColorStop(1,hexToRgba(color,active?0.12:0.04));
  ctx.fillStyle=grd;ctx.fillRect(x,y,w,h);
  ctx.shadowBlur=0;
  // left accent bar
  ctx.fillStyle=hexToRgba(color,active?0.8:0.3);
  ctx.fillRect(x,y,3,h);
  // step label
  ctx.font="bold 13px 'Space Grotesk',sans-serif";
  ctx.fillStyle=active?color:hexToRgba(color,0.5);
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(stepLabel,x+14,y+h*0.3);
  // command
  ctx.font="11px 'Space Grotesk',sans-serif";
  ctx.fillStyle=hexToRgba('#c6c6c6',active?0.8:0.3);
  ctx.fillText('$ '+cmdLabel,x+14,y+h*0.6);
  // status badge
  if(statusLabel){
    var sw=ctx.measureText(statusLabel).width+16;
    var sx=x+w-sw-8,sy=y+h/2-10;
    ctx.fillStyle=hexToRgba(color,0.15);ctx.fillRect(sx,sy,sw,20);
    ctx.font="bold 10px 'Space Grotesk',sans-serif";
    ctx.fillStyle=color;ctx.textAlign='center';
    ctx.fillText(statusLabel,sx+sw/2,sy+10);
  }
  // border
  ctx.strokeStyle=hexToRgba(color,active?0.4:0.1);ctx.lineWidth=1;
  ctx.strokeRect(x,y,w,h);
  ctx.restore();
}

function drawArrow(x1,y1,x2,y2,color,alpha){
  if(alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;ctx.lineWidth=1.5;
  ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.setLineDash([]);
  var ang=Math.atan2(y2-y1,x2-x1);var sz=5;
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-sz*Math.cos(ang-0.4),y2-sz*Math.sin(ang-0.4));
  ctx.lineTo(x2-sz*Math.cos(ang+0.4),y2-sz*Math.sin(ang+0.4));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

function getStepLayout(idx){
  var margin=30;
  var gap=10;
  var stepH=Math.min(50,(H-margin*2-gap*4)/5);
  var stepW=Math.min(400,W*0.65);
  var x=(W-stepW)/2;
  var y=margin+idx*(stepH+gap);
  return{x:x,y:y,w:stepW,h:stepH};
}

function getFrameElements(f){
  var elems=[];
  for(var i=0;i<5;i++){
    var lay=getStepLayout(i);
    var active=i<=f;
    var statusKey=i<f?'pass':(i===f?'running':'waiting');
    if(f===4&&i===4)statusKey='released';
    if(f===4&&i<4)statusKey='pass';
    (function(idx,la,act,sk){
      elems.push({id:'step'+idx,type:'custom',x:la.x,y:la.y,w:la.w,h:la.h,
        draw:function(a){drawPipelineStep(la.x,la.y,la.w,la.h,STEP_COLORS[idx],t(STEP_KEYS[idx]),t(CMD_KEYS[idx]),t(sk),act,a);},alpha:1});
    })(i,lay,active,statusKey);
    // arrow between steps
    if(i<4){
      var nextLay=getStepLayout(i+1);
      var showArrow=i<f;
      (function(la,nla,show,idx){
        if(show){
          elems.push({id:'arrow'+idx,type:'custom',
            draw:function(a){drawArrow(la.x+la.w/2,la.y+la.h,nla.x+nla.w/2,nla.y,hexToRgba(STEP_COLORS[idx],0.5),a);},alpha:1});
        }
      })(lay,nextLay,showArrow,i);
    }
  }
  // Description text
  elems.push({id:'descTitle',type:'label',text:t(STEP_KEYS[f]),x:W/2,y:H-55,color:'#ffb59c',size:14,align:'center',alpha:1});
  elems.push({id:'descText',type:'label',text:t(STEP_DESC_KEYS[f]),x:W/2,y:H-35,color:'#8a8886',size:11,align:'center',alpha:1});
  return elems;
}

function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  if(el.type==='custom'){el.draw(el.alpha);}
  else if(el.type==='label'){
    ctx.font=(el.size>=14?'bold ':'')+el.size+"px "+(el.size>=14?"'Space Grotesk'":"'Noto Sans SC','Inter'")+",sans-serif";
    ctx.fillStyle=el.color;ctx.textAlign=el.align||'center';ctx.textBaseline='middle';
    ctx.fillText(el.text,el.x,el.y);
  }
  ctx.restore();
}

function drawFrame(f){drawBg();getFrameElements(f).forEach(function(el){drawElement(el);});}

function transitionTo(nf){
  if(nf<0)nf=0;if(nf>=totalFrames)nf=totalFrames-1;
  if(nf===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return;}
  if(transitioning)return;
  var oldE=getFrameElements(currentFrame),newE=getFrameElements(nf);
  var oMap={},nMap={};
  oldE.forEach(function(e){oMap[e.id]=e;});newE.forEach(function(e){nMap[e.id]=e;});
  currentFrame=nf;updateHUD(nf);transitioning=true;
  var st=null,dur=500;
  function step(ts){
    if(!st)st=ts;var raw=Math.min((ts-st)/dur,1),p=easeInOut(raw);
    drawBg();
    oldE.forEach(function(oe){if(!nMap[oe.id])drawElement(merge(oe,{alpha:1-p}));});
    newE.forEach(function(ne){
      var oe=oMap[ne.id];
      if(oe){
        if(ne.type==='label'&&oe.text!==ne.text){drawElement(merge(oe,{alpha:1-p}));drawElement(merge(ne,{alpha:p}));}
        else drawElement(ne);
      }else drawElement(merge(ne,{alpha:p}));
    });
    if(raw<1)requestAnimationFrame(step);else transitioning=false;
  }
  requestAnimationFrame(step);
}

function updateHUD(f){
  var artifacts=[1,3,6,8,10];
  var times=['0:30','2:00','5:00','6:30','7:00'];
  var results=[t('running'),t('running'),t('running'),t('running'),t('released')];
  document.getElementById('hudValue0').textContent=(f+1)+'/5';
  document.getElementById('hudValue1').textContent=artifacts[f];
  document.getElementById('hudValue2').textContent=times[f];
  document.getElementById('hudValue3').textContent=results[f];
  document.getElementById('frameInfo').textContent=(f+1)+' / '+totalFrames;
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('subtitleText').textContent=t('subtitle');
  document.getElementById('btnPrev').textContent=t('btnPrev');
  document.getElementById('btnNext').textContent=t('btnNext');
  document.getElementById('btnPlay').textContent=playing?t('btnPause'):t('btnPlay');
  document.getElementById('hudLabel0').textContent=t('hudStep');
  document.getElementById('hudLabel1').textContent=t('hudArtifact');
  document.getElementById('hudLabel2').textContent=t('hudTime');
  document.getElementById('hudLabel3').textContent=t('hudResult');
  document.getElementById('guideTitle').innerHTML='<span>'+t('guideTitle')+'</span><span id="guideArrow">-</span>';
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var list=document.getElementById('guideList');
  list.innerHTML='<li>'+t('guideObs1')+'</li><li>'+t('guideObs2')+'</li><li>'+t('guideObs3')+'</li>';
  updateHUD(currentFrame);drawFrame(currentFrame);
}

document.getElementById('btnPrev').addEventListener('click',function(){if(!transitioning)transitionTo(currentFrame-1);});
document.getElementById('btnNext').addEventListener('click',function(){if(!transitioning)transitionTo(currentFrame+1);});
document.getElementById('btnPlay').addEventListener('click',function(){
  if(playing){playing=false;document.getElementById('btnPlay').textContent=t('btnPlay');}
  else{
    playing=true;document.getElementById('btnPlay').textContent=t('btnPause');
    if(currentFrame>=totalFrames-1)currentFrame=-1;
    function ap(){if(!playing)return;if(currentFrame<totalFrames-1){transitionTo(currentFrame+1);setTimeout(function(){if(playing)ap();},1200);}else{playing=false;document.getElementById('btnPlay').textContent=t('btnPlay');}}
    ap();
  }
});
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';document.getElementById('langBtn').textContent=LANG.toUpperCase();refreshI18N();
});
document.getElementById('guideToggle').addEventListener('click',function(){
  var c=document.getElementById('guideContent');c.classList.toggle('collapsed');
  document.getElementById('guideArrow').textContent=c.classList.contains('collapsed')?'+':'-';
});

window.addEventListener('resize',resize);
refreshI18N();resize();
setTimeout(resize,200);setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});
})();
</script>
</body>
</html>
