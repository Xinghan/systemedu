<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>

<div class="controls">

// ============================================================
// HELPER DRAWING FUNCTIONS
// ============================================================

function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawArrowLine(ctx, x1, y1, x2, y2, color, label) {
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  var angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10 * Math.cos(angle - 0.4), y2 - 10 * Math.sin(angle - 0.4));
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10 * Math.cos(angle + 0.4), y2 - 10 * Math.sin(angle + 0.4));
  ctx.stroke();
  if (label) {
    ctx.fillStyle = color;
    ctx.font = '700 11px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, (x1 + x2) / 2, (y1 + y2) / 2 - 10);
  }
}

function drawWaveform(ctx, x, y, w, h, time, color, freq, amp) {
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath();
  for (var i = 0; i < w; i++) {
    var px = x + i;
    var py = y + Math.sin((i * freq + time * 80) * 0.05) * amp;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();
}

function drawThermometer(ctx, x, y, size, tempPct) {
  var s = size;
  // Bulb
  ctx.fillStyle = AnimRuntime.PAL.error;
  ctx.beginPath(); ctx.arc(x, y + s * 0.6, s * 0.22, 0, Math.PI * 2); ctx.fill();
  // Tube
  ctx.fillStyle = AnimRuntime.PAL.surface;
  ctx.fillRect(x - s * 0.06, y - s * 0.4, s * 0.12, s);
  ctx.strokeStyle = AnimRuntime.PAL.outline;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x - s * 0.06, y - s * 0.4, s * 0.12, s);
  // Mercury level
  var mH = s * tempPct * 0.85;
  ctx.fillStyle = AnimRuntime.PAL.error;
  ctx.fillRect(x - s * 0.04, y + s * 0.6 - mH, s * 0.08, mH);
  // Tick marks
  ctx.strokeStyle = AnimRuntime.PAL.muted; ctx.lineWidth = 1;
  for (var i = 0; i < 5; i++) {
    var ty = y + s * 0.55 - i * s * 0.2;
    ctx.beginPath(); ctx.moveTo(x + s * 0.08, ty); ctx.lineTo(x + s * 0.15, ty); ctx.stroke();
  }
}

function drawChipBox(ctx, x, y, w, h, label, color) {
  drawRoundedRect(ctx, x - w/2, y - h/2, w, h, 4, AnimRuntime.PAL.surface, color);
  // Pins
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  var pins = 3;
  for (var i = 0; i < pins; i++) {
    var py = y - h/2 + h * (i + 1) / (pins + 1);
    ctx.beginPath(); ctx.moveTo(x - w/2, py); ctx.lineTo(x - w/2 - 8, py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + w/2, py); ctx.lineTo(x + w/2 + 8, py); ctx.stroke();
  }
  ctx.fillStyle = color;
  ctx.font = '700 ' + Math.min(12, w * 0.28) + 'px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.textBaseline = 'alphabetic';
}

// ============================================================
// FRAME ELEMENTS
// ============================================================

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  if (f === 0) return buildFrame0(W, H, t, P, cx, cy);
  if (f === 1) return buildFrame1(W, H, t, P, cx, cy);
  if (f === 2) return buildFrame2(W, H, t, P, cx, cy);
  if (f === 3) return buildFrame3(W, H, t, P, cx, cy);
  if (f === 4) return buildFrame4(W, H, t, P, cx, cy);
  return [];
}

// Helper: create a box centered at (cx, cy) with width w, height h
// Runtime box type uses (x,y) as top-left corner, so we offset
function cbox(id, cx, cy, w, h, fill, stroke) {
  return {id:id, type:'box', x:cx-w/2, y:cy-h/2, w:w, h:h, fill:fill, stroke:stroke};
}

// --- Frame 0: Overview - The Translation Chain ---
function buildFrame0(W, H, t, P, cx, cy) {
  var bw = Math.min(140, W * 0.16);
  var bh = Math.min(100, H * 0.22);
  var gap = Math.min(80, W * 0.1);
  var x1 = cx - bw - gap;
  var x2 = cx;
  var x3 = cx + bw + gap;
  var y = cy - 10;

  return [
    // Three main boxes (centered)
    cbox('box_phys', x1, y, bw, bh, P.surface, P.error),
    {id:'lbl_phys', type:'label', text:t('f0_physical'), x:x1, y:y-bh/2+14, color:P.error, size:14, align:'center', bold:true},
    cbox('box_sens', x2, y, bw, bh, P.surface, P.primary),
    {id:'lbl_sens', type:'label', text:t('f0_sensor'), x:x2, y:y-bh/2+14, color:P.primary, size:16, align:'center', bold:true},
    cbox('box_digi', x3, y, bw, bh, P.surface, P.tertiary),
    {id:'lbl_digi', type:'label', text:t('f0_digital'), x:x3, y:y-bh/2+14, color:P.tertiary, size:14, align:'center', bold:true},

    // Physical examples inside left box
    {id:'ex_light', type:'label', text:t('f0_light'), x:x1, y:y-5, color:P.error, size:11, align:'center'},
    {id:'ex_sound', type:'label', text:t('f0_sound'), x:x1, y:y+10, color:P.error, size:11, align:'center'},
    {id:'ex_heat',  type:'label', text:t('f0_heat'),  x:x1, y:y+25, color:P.error, size:11, align:'center'},
    {id:'ex_force', type:'label', text:t('f0_force'), x:x1, y:y+40, color:P.error, size:11, align:'center'},

    // Digital output inside right box
    {id:'ex_nums', type:'label', text:t('f0_numbers'), x:x3, y:y+5, color:P.tertiary, size:13, align:'center'},
    {id:'ex_code', type:'label', text:'0110 1001', x:x3, y:y+25, color:P.tertiary, size:11, align:'center', font:'monospace'},

    // Arrows between boxes
    {id:'arr1', type:'arrow', x1:x1+bw/2+6, y1:y, x2:x2-bw/2-6, y2:y, color:P.muted, label:t('f0_arrow1')},
    {id:'arr2', type:'arrow', x1:x2+bw/2+6, y1:y, x2:x3-bw/2-6, y2:y, color:P.muted, label:t('f0_arrow2')},

    // Question at bottom
    {id:'question', type:'label', text:t('f0_question'), x:cx, y:y+bh/2+40, color:P.secondary, size:14, align:'center', bold:true},
  ];
}

// --- Frame 1: Temperature Sensor Deep Dive ---
function buildFrame1(W, H, t, P, cx, cy) {
  var stepW = Math.min(120, W * 0.13);
  var stepH = 80;
  var stepGap = Math.min(40, W * 0.04);
  var totalW = stepW * 4 + stepGap * 3;
  var startX = cx - totalW / 2 + stepW / 2;
  var topY = cy - 10;
  var els = [];

  // Title
  els.push({id:'f1_ttl', type:'label', text:t('f1_title'), x:cx, y:topY - stepH/2 - 30, color:P.primary, size:15, align:'center', bold:true});

  var steps = [
    {label: t('f1_thermo'), sub: t('f1_step1'), color: P.error, icon: 'thermo'},
    {label: t('f1_resist') + ' / ' + t('f1_voltage'), sub: t('f1_step2'), color: P.secondary, icon: 'wave'},
    {label: t('f1_adc'), sub: t('f1_step3'), color: P.primary, icon: 'chip'},
    {label: t('f1_celsius'), sub: t('f1_step4'), color: P.tertiary, icon: 'number'},
  ];

  for (var i = 0; i < 4; i++) {
    var sx = startX + i * (stepW + stepGap);
    var s = steps[i];
    // Box centered at (sx, topY)
    els.push(cbox('f1_box'+i, sx, topY, stepW, stepH, P.surface, s.color));
    // Label near top of box
    els.push({id:'f1_lbl'+i, type:'label', text:s.label, x:sx, y:topY-stepH/2+16, color:s.color, size:11, align:'center', bold:true});
    // Sub label near bottom of box
    els.push({id:'f1_sub'+i, type:'label', text:s.sub, x:sx, y:topY+stepH/2-12, color:P.muted, size:9, align:'center'});

    if (s.icon === 'number') {
      els.push({id:'f1_num', type:'label', text:'36.5', x:sx, y:topY+5, color:s.color, size:22, align:'center', bold:true, font:'monospace'});
    }

    // Arrow between boxes
    if (i < 3) {
      var arrStartX = sx + stepW/2 + 4;
      var arrEndX = sx + stepW/2 + stepGap - 4;
      els.push({id:'f1_arr'+i, type:'arrow', x1:arrStartX, y1:topY, x2:arrEndX, y2:topY, color:P.muted});
    }
  }

  return els;
}

// --- Frame 2: Analog vs Digital ---
function buildFrame2(W, H, t, P, cx, cy) {
  var boxW = Math.min(W * 0.32, 240);
  var boxH = 80;
  var spacing = Math.min(60, W * 0.06);
  var els = [];

  // Title
  els.push({id:'f2_ttl', type:'label', text:t('f2_title'), x:cx, y:cy-100, color:P.primary, size:15, align:'center', bold:true});

  // Left: Analog
  var lx = cx - boxW/2 - spacing/2;
  els.push({id:'f2_albl', type:'label', text:t('f2_analog'), x:lx, y:cy-55, color:P.error, size:14, align:'center', bold:true});
  els.push({id:'f2_adesc', type:'label', text:t('f2_continuous'), x:lx, y:cy-35, color:P.muted, size:10, align:'center'});
  els.push(cbox('f2_abox', lx, cy+20, boxW, boxH, P.bg2, P.outline));

  // Right: Digital
  var rx = cx + boxW/2 + spacing/2;
  els.push({id:'f2_dlbl', type:'label', text:t('f2_digital'), x:rx, y:cy-55, color:P.tertiary, size:14, align:'center', bold:true});
  els.push({id:'f2_ddesc', type:'label', text:t('f2_discrete'), x:rx, y:cy-35, color:P.muted, size:10, align:'center'});
  els.push(cbox('f2_dbox', rx, cy+20, boxW, boxH, P.bg2, P.outline));

  // Center: ADC arrow
  els.push({id:'f2_arrow', type:'arrow', x1:lx+boxW/2+6, y1:cy+20, x2:rx-boxW/2-6, y2:cy+20, color:P.primary, label:t('f1_adc')});
  els.push({id:'f2_adc', type:'label', text:t('f2_adc_role'), x:cx, y:cy+80, color:P.primary, size:12, align:'center', bold:true});

  return els;
}

// --- Frame 3: Multiple sensor types, same pattern ---
function buildFrame3(W, H, t, P, cx, cy) {
  var els = [];
  els.push({id:'f3_ttl', type:'label', text:t('f3_title'), x:cx, y:cy-110, color:P.primary, size:15, align:'center', bold:true});

  var rows = [
    {name:t('f3_camera'), input:t('f3_light_in'), output:t('f3_pix_out'), color:'#f97583'},
    {name:t('f3_mic'),    input:t('f3_sound_in'), output:t('f3_wav_out'), color:'#d2a8ff'},
    {name:t('f3_force'),  input:t('f3_press_in'), output:t('f3_n_out'),   color:'#79c0ff'},
    {name:t('f3_imu'),    input:t('f3_motion_in'),output:t('f3_xyz_out'), color:'#7ee787'},
  ];

  var rowH = Math.min(40, H * 0.08);
  var startY = cy - rows.length * rowH / 2 - 20;
  var colSpan = Math.min(200, W * 0.22);
  var colIn = cx - colSpan;
  var colSens = cx;
  var colOut = cx + colSpan;

  // Column headers
  els.push({id:'f3_hIn', type:'label', text:t('f0_physical'), x:colIn, y:startY-25, color:P.error, size:11, align:'center', bold:true});
  els.push({id:'f3_hS',  type:'label', text:t('f0_sensor'),   x:colSens, y:startY-25, color:P.primary, size:11, align:'center', bold:true});
  els.push({id:'f3_hOut', type:'label', text:t('f0_digital'),  x:colOut, y:startY-25, color:P.tertiary, size:11, align:'center', bold:true});

  for (var i = 0; i < rows.length; i++) {
    var ry = startY + i * rowH;
    var r = rows[i];
    els.push({id:'f3_in'+i,   type:'label', text:r.input, x:colIn,   y:ry, color:r.color, size:12, align:'center'});
    els.push({id:'f3_arr1_'+i, type:'arrow', x1:colIn+50, y1:ry-4, x2:colSens-50, y2:ry-4, color:P.muted});
    els.push({id:'f3_sens'+i, type:'label', text:r.name,  x:colSens, y:ry, color:r.color, size:12, align:'center', bold:true});
    els.push({id:'f3_arr2_'+i, type:'arrow', x1:colSens+50, y1:ry-4, x2:colOut-45, y2:ry-4, color:P.muted});
    els.push({id:'f3_out'+i,  type:'label', text:r.output, x:colOut,  y:ry, color:r.color, size:12, align:'center', font:'monospace'});
  }

  els.push({id:'f3_same', type:'label', text:t('f3_same'), x:cx, y:startY + rows.length * rowH + 30, color:P.secondary, size:13, align:'center', bold:true});

  return els;
}

// --- Frame 4: Mars Rover Sensor Fusion ---
function buildFrame4(W, H, t, P, cx, cy) {
  var els = [];
  els.push({id:'f4_ttl', type:'label', text:t('f4_title'), x:cx, y:cy-120, color:P.primary, size:15, align:'center', bold:true});

  // Rover body centered
  var roverW = Math.min(100, W * 0.12);
  var roverH = Math.min(60, H * 0.12);
  var roverY = cy - 20;
  els.push(cbox('f4_rover', cx, roverY, roverW, roverH, P.surface, P.primary));
  els.push({id:'f4_rlbl', type:'label', text:t('f4_rover'), x:cx, y:roverY, color:P.primary, size:11, align:'center', bold:true});

  // Sensor boxes around rover (spread in an arc above)
  var sensors = [
    {name:t('f4_cam'),  color:'#f97583'},
    {name:t('f4_temp'), color:'#7ee787'},
    {name:t('f4_wind'), color:'#79c0ff'},
    {name:t('f4_lidar'),color:'#d2a8ff'},
  ];

  var sensorW = 70, sensorH = 30;
  var arcRadius = Math.min(130, W * 0.15);
  var arcStart = -Math.PI * 0.85;
  var arcEnd = -Math.PI * 0.15;

  for (var i = 0; i < sensors.length; i++) {
    var s = sensors[i];
    var angle = arcStart + (arcEnd - arcStart) * i / (sensors.length - 1);
    var sx = cx + Math.cos(angle) * arcRadius;
    var sy = roverY + Math.sin(angle) * arcRadius * 0.65;
    els.push(cbox('f4_s'+i, sx, sy, sensorW, sensorH, P.bg2, s.color));
    els.push({id:'f4_sl'+i, type:'label', text:s.name, x:sx, y:sy, color:s.color, size:10, align:'center', bold:true});
    // Arrow from sensor to rover
    var arrowEndY = roverY - roverH/2;
    els.push({id:'f4_sa'+i, type:'arrow', x1:sx, y1:sy+sensorH/2+2, x2:cx, y2:arrowEndY, color:s.color});
  }

  // Brain box below rover
  var brainY = roverY + roverH/2 + 50;
  var brainW = Math.min(160, W*0.2);
  var brainH = 36;
  els.push(cbox('f4_brain', cx, brainY, brainW, brainH, P.surface, P.secondary));
  els.push({id:'f4_blbl', type:'label', text:t('f4_brain'), x:cx, y:brainY, color:P.secondary, size:12, align:'center', bold:true});
  els.push({id:'f4_barr', type:'arrow', x1:cx, y1:roverY+roverH/2, x2:cx, y2:brainY-brainH/2, color:P.muted, label:t('f4_decision')});

  // Bottom summary
  els.push({id:'f4_fusion', type:'label', text:t('f4_fusion'), x:cx, y:brainY+brainH/2+25, color:P.primary, size:13, align:'center', bold:true});

  return els;
}

// ============================================================
// CUSTOM DRAW: analog wave & digital steps, thermometer, chip
// ============================================================

function customDrawElement(ctx, el) {
  // No custom element types needed -- all handled by runtime built-in types
  return false;
}

// ============================================================
// CUSTOM BACKGROUND: dark with subtle grid
// ============================================================

function drawBg(ctx, W, H) {
  var P = AnimRuntime.PAL;
  // Dark gradient
  var grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, P.bg);
  grd.addColorStop(1, P.bg2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  var gs = 40;
  for (var x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Frame-specific custom drawing
  var f = AnimRuntime.currentFrame !== undefined ? AnimRuntime.currentFrame : 0;
  var time = (performance.now() / 1000) % 1000;

  if (f === 1) {
    // Coordinates match buildFrame1: boxes centered at (sx, topY=H/2-10)
    var stepW = Math.min(120, W * 0.13);
    var stepGap = Math.min(40, W * 0.04);
    var totalW = stepW * 4 + stepGap * 3;
    var firstX = W/2 - totalW/2 + stepW/2;
    var topY = H/2 - 10;
    var tempPct = 0.5 + Math.sin(time * 1.5) * 0.3;
    drawThermometer(ctx, firstX, topY - 10, 50, tempPct);

    // Draw wave in second box (centered)
    var secondX = firstX + stepW + stepGap;
    drawWaveform(ctx, secondX - stepW/2 + 10, topY, stepW - 20, 30, time, AnimRuntime.PAL.secondary, 2, 15);

    // Draw ADC chip in third box (centered)
    var thirdX = secondX + stepW + stepGap;
    drawChipBox(ctx, thirdX, topY, 50, 35, 'ADC', AnimRuntime.PAL.primary);
  }

  if (f === 2) {
    // Coordinates match buildFrame2: boxes centered at (lx/rx, cy+20)
    var boxW = Math.min(W * 0.32, 240);
    var spacing = Math.min(60, W * 0.06);
    var lx = W/2 - boxW/2 - spacing/2;
    var rx = W/2 + boxW/2 + spacing/2;
    var waveY = H/2 + 20;
    var wW = boxW - 30;

    // Analog: smooth sine wave
    drawWaveform(ctx, lx - wW/2, waveY, wW, 30, time, AnimRuntime.PAL.error, 1.5, 25);

    // Digital: stepped signal
    ctx.strokeStyle = AnimRuntime.PAL.tertiary; ctx.lineWidth = 2;
    ctx.beginPath();
    var steps = 10;
    var sw = wW / steps;
    for (var i = 0; i < steps; i++) {
      var px = rx - wW/2 + i * sw;
      var level = Math.round(Math.sin((i * 0.8 + time * 1.5) * 0.5) * 3 + 3);
      var py = waveY - level * 7;
      if (i === 0) ctx.moveTo(px, py);
      else { ctx.lineTo(px, py); }
      ctx.lineTo(px + sw, py);
    }
    ctx.stroke();

    // Sample points on analog wave
    ctx.fillStyle = AnimRuntime.PAL.secondary;
    for (var i = 0; i < 8; i++) {
      var sx = lx - wW/2 + i * (wW / 8) + wW/16;
      var sy = waveY + Math.sin((sx - lx + wW/2) * 0.05 + time * 1.5 * 0.05 * 80) * 25;
      ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// ============================================================
// BOOT
// ============================================================

AnimRuntime.boot();
