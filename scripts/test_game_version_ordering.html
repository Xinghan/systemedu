<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Version Ordering Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:6px 16px;background:rgba(28,27,27,0.92);border-bottom:1px solid rgba(138,136,134,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.scenario-bar{padding:6px 12px;background:rgba(53,53,52,0.3);border-bottom:1px solid rgba(138,136,134,0.08);flex-shrink:0;text-align:center}
.scenario-bar p{font-family:'Noto Sans SC',sans-serif;font-size:12px;color:#c6c6c6;line-height:1.5}
.game-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:8px 16px;gap:6px;overflow:hidden}
.instruction{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886;text-align:center;padding:4px 0;flex-shrink:0;letter-spacing:1px}
.order-list{flex:1;display:flex;flex-direction:column;gap:4px;min-height:0;overflow-y:auto}
.order-card{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(28,27,27,0.7);border:1px solid rgba(138,136,134,0.15);cursor:grab;user-select:none;flex-shrink:0;transition:transform 0.2s,border-color 0.2s}
.order-card:active{cursor:grabbing}
.order-card.drag-over-top{border-top:2px solid #ff7f50}
.order-card.drag-over-bottom{border-bottom:2px solid #ff7f50}
.order-card.correct{border-color:#10b981;background:rgba(16,185,129,0.05)}
.order-card.wrong{border-color:#ef4444;animation:cardShake 0.4s}
@keyframes cardShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.card-num{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#00daf3;min-width:24px;text-align:center}
.card-content{flex:1}
.card-title{font-family:'Space Grotesk',monospace;font-size:11px;color:#ffb59c;font-weight:700}
.card-desc{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:#8a8886;margin-top:2px}
.card-handle{color:#8a8886;font-size:14px;cursor:grab;padding:0 4px}
.check-area{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px;flex-shrink:0}
.check-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 24px;cursor:pointer;border:1px solid rgba(255,127,80,0.3);background:linear-gradient(45deg,rgba(255,181,156,0.1),rgba(255,127,80,0.15));color:#ffb59c;letter-spacing:1px;text-transform:uppercase}
.check-btn:hover{background:linear-gradient(45deg,rgba(255,181,156,0.2),rgba(255,127,80,0.25))}
.feedback-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:rgba(0,0,0,0.55);flex-shrink:0;height:40px}
.score-display{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#00daf3;font-weight:700}
.attempts-display{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:35vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:14px;line-height:1.5}
.win-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column}
.win-overlay.show{display:flex}
.win-box{background:rgba(28,27,27,0.95);border:1px solid #10b981;padding:24px 32px;text-align:center;max-width:420px}
.win-box h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#10b981;margin-bottom:12px;letter-spacing:2px}
.win-box p{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#e5e2e1;line-height:1.6;margin-bottom:16px}
.win-box button{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 24px;cursor:pointer;border:1px solid #10b981;background:rgba(16,185,129,0.1);color:#10b981;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideDesc" style="margin-bottom:6px"></p>
    <ul id="guideList"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="header"><h1 id="mainTitle"></h1></div>
  <div class="scenario-bar"><p id="scenarioText"></p></div>
  <div class="game-area">
    <div class="instruction" id="instructionText"></div>
    <div class="order-list" id="orderList"></div>
    <div class="check-area">
      <button class="check-btn" id="checkBtn"></button>
    </div>
  </div>
  <div class="feedback-bar">
    <span class="score-display" id="scoreDisplay"></span>
    <span class="attempts-display" id="attemptsDisplay"></span>
  </div>
</div>
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winText"></p>
    <button id="winBtn"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'VERSION ORDERING CHALLENGE',cn:'\u7248\u672c\u53d8\u66f4\u6392\u5e8f\u6311\u6218'},
  guide:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{en:'Drag the version change cards into the correct chronological order.',cn:'\u5c06\u7248\u672c\u53d8\u66f4\u5361\u7247\u62d6\u62fd\u5230\u6b63\u786e\u7684\u65f6\u95f4\u987a\u5e8f\u3002'},
  guideP1:{en:'Read each card\'s description carefully',cn:'\u4ed4\u7ec6\u9605\u8bfb\u6bcf\u5f20\u5361\u7247\u7684\u63cf\u8ff0'},
  guideP2:{en:'Drag cards up/down to reorder them',cn:'\u4e0a\u4e0b\u62d6\u62fd\u5361\u7247\u8c03\u6574\u987a\u5e8f'},
  guideP3:{en:'Click CHECK to verify your ordering',cn:'\u70b9\u51fb\u68c0\u67e5\u9a8c\u8bc1\u987a\u5e8f'},
  guideP4:{en:'Green = correct position, Red = wrong',cn:'\u7eff\u8272 = \u4f4d\u7f6e\u6b63\u786e\uff0c\u7ea2\u8272 = \u4f4d\u7f6e\u9519\u8bef'},
  scenario:{en:'Scenario: Mars rover risk map project underwent multiple iterations. A new team member needs to understand the version history. Arrange the following version changes in correct chronological order.',cn:'\u573a\u666f\uff1a\u706b\u661f\u8f66\u98ce\u9669\u5730\u56fe\u9879\u76ee\u7ecf\u5386\u4e86\u591a\u6b21\u8fed\u4ee3\u3002\u65b0\u56e2\u961f\u6210\u5458\u9700\u8981\u7406\u89e3\u7248\u672c\u5386\u53f2\u3002\u8bf7\u5c06\u4ee5\u4e0b\u7248\u672c\u53d8\u66f4\u6309\u6b63\u786e\u7684\u65f6\u95f4\u987a\u5e8f\u6392\u5217\u3002'},
  instruction:{en:'DRAG TO REORDER (TOP = EARLIEST)',cn:'\u62d6\u62fd\u8c03\u6574\u987a\u5e8f\uff08\u9876\u90e8 = \u6700\u65e9\uff09'},
  check:{en:'CHECK ORDER',cn:'\u68c0\u67e5\u987a\u5e8f'},
  score:{en:'STATUS',cn:'\u72b6\u6001'},
  attempts:{en:'ATTEMPTS',cn:'\u5c1d\u8bd5\u6b21\u6570'},
  pending:{en:'PENDING',cn:'\u5f85\u68c0\u67e5'},
  correct:{en:'ALL CORRECT!',cn:'\u5168\u90e8\u6b63\u786e\uff01'},
  partial:{en:'PARTIALLY CORRECT',cn:'\u90e8\u5206\u6b63\u786e'},
  winTitle:{en:'VERSION HISTORY MASTERED!',cn:'\u7248\u672c\u5386\u53f2\u638c\u63e1\uff01'},
  winText:{en:'You correctly ordered all version changes. Understanding version history is essential for debugging, rollback, and collaboration. Each version tells a story of what changed and why.',cn:'\u4f60\u6b63\u786e\u5730\u6392\u5217\u4e86\u6240\u6709\u7248\u672c\u53d8\u66f4\u3002\u7406\u89e3\u7248\u672c\u5386\u53f2\u5bf9\u4e8e\u8c03\u8bd5\u3001\u56de\u6eda\u548c\u534f\u4f5c\u81f3\u5173\u91cd\u8981\u3002\u6bcf\u4e2a\u7248\u672c\u90fd\u8bb2\u8ff0\u4e86\u201c\u6539\u4e86\u4ec0\u4e48\u201d\u548c\u201c\u4e3a\u4ec0\u4e48\u6539\u201d\u7684\u6545\u4e8b\u3002'},
  winBtn:{en:'PLAY AGAIN',cn:'\u518d\u6765\u4e00\u6b21'}
};
function t(key){return(I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}

// Cards in correct order (index = correct position)
var CARDS=[
  {id:'c0',ver:'v0.1',title_en:'Project init',title_cn:'\u9879\u76ee\u521d\u59cb\u5316',desc_en:'Create directory structure, add README and empty configs',desc_cn:'\u521b\u5efa\u76ee\u5f55\u7ed3\u6784\uff0c\u6dfb\u52a0 README \u548c\u7a7a\u914d\u7f6e\u6587\u4ef6'},
  {id:'c1',ver:'v0.5',title_en:'Baseline model trained',title_cn:'\u57fa\u7ebf\u6a21\u578b\u8bad\u7ec3\u5b8c\u6210',desc_en:'First terrain classifier on AI4Mars dataset, accuracy 72%',desc_cn:'\u5728 AI4Mars \u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u7b2c\u4e00\u4e2a\u5730\u5f62\u5206\u7c7b\u5668\uff0c\u51c6\u786e\u7387 72%'},
  {id:'c2',ver:'v0.8',title_en:'Cost map integrated',title_cn:'\u4ee3\u4ef7\u5730\u56fe\u96c6\u6210',desc_en:'Added cost_config.yaml with terrain penalties, path planner uses cost map',desc_cn:'\u6dfb\u52a0 cost_config.yaml \u5730\u5f62\u60e9\u7f5a\uff0c\u8def\u5f84\u89c4\u5212\u5668\u4f7f\u7528\u4ee3\u4ef7\u5730\u56fe'},
  {id:'c3',ver:'v1.0',title_en:'First release',title_cn:'\u9996\u6b21\u53d1\u5e03',desc_en:'System 1.0 release with model, configs, test suite, and regression baseline',desc_cn:'\u7cfb\u7edf 1.0 \u53d1\u5e03\uff0c\u5305\u542b\u6a21\u578b\u3001\u914d\u7f6e\u3001\u6d4b\u8bd5\u5957\u4ef6\u548c\u56de\u5f52\u57fa\u7ebf'},
  {id:'c4',ver:'v1.1',title_en:'Rock penalty tuning',title_cn:'\u5ca9\u77f3\u60e9\u7f5a\u8c03\u4f18',desc_en:'Increased rock_penalty 8->12, retrained model on expanded dataset',desc_cn:'\u5ca9\u77f3\u60e9\u7f5a\u4ece 8 \u8c03\u81f3 12\uff0c\u5728\u6269\u5c55\u6570\u636e\u96c6\u4e0a\u91cd\u65b0\u8bad\u7ec3'},
  {id:'c5',ver:'v1.1-hotfix',title_en:'Emergency rollback',title_cn:'\u7d27\u6025\u56de\u6eda',desc_en:'v1.1 caused accuracy drop to 78%, rolled back rock_penalty to 9',desc_cn:'v1.1 \u5bfc\u81f4\u51c6\u786e\u7387\u964d\u81f3 78%\uff0c\u56de\u6eda rock_penalty \u5230 9'},
  {id:'c6',ver:'v1.2',title_en:'Stable release',title_cn:'\u7a33\u5b9a\u53d1\u5e03',desc_en:'Keep retrained model + tuned penalty, accuracy 93%, new regression passed',desc_cn:'\u4fdd\u7559\u91cd\u65b0\u8bad\u7ec3\u7684\u6a21\u578b + \u8c03\u4f18\u60e9\u7f5a\uff0c\u51c6\u786e\u7387 93%\uff0c\u65b0\u56de\u5f52\u6d4b\u8bd5\u901a\u8fc7'}
];

var attempts=0;
var currentOrder=[];
var dragIdx=-1;
var dragCard=null;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}

function buildCards(){
  currentOrder=shuffle(CARDS.map(function(c,i){return i;}));
  renderCards();
  attempts=0;
  updateStatus();
}

function renderCards(){
  var list=document.getElementById('orderList');
  list.innerHTML='';
  currentOrder.forEach(function(ci,pos){
    var card=CARDS[ci];
    var el=document.createElement('div');
    el.className='order-card';
    el.setAttribute('data-pos',pos);
    el.setAttribute('data-ci',ci);
    el.innerHTML='<span class="card-num">'+(pos+1)+'</span>'+
      '<div class="card-content"><div class="card-title">['+card.ver+'] '+(LANG==='cn'?card.title_cn:card.title_en)+'</div>'+
      '<div class="card-desc">'+(LANG==='cn'?card.desc_cn:card.desc_en)+'</div></div>'+
      '<span class="card-handle">::</span>';
    // Drag events
    el.addEventListener('mousedown',function(e){startCardDrag(e,pos);});
    el.addEventListener('touchstart',function(e){startCardDrag(e,pos);},{passive:false});
    list.appendChild(el);
  });
}

var dragGhost=null;
var dragOffY=0;
var dragStartY=0;

function startCardDrag(e,pos){
  e.preventDefault();
  dragIdx=pos;
  var cards=document.querySelectorAll('.order-card');
  dragCard=cards[pos];
  dragCard.style.opacity='0.4';
  var pt=e.touches?e.touches[0]:e;
  dragStartY=pt.clientY;
  dragOffY=pt.clientY-dragCard.getBoundingClientRect().top;
  if(e.touches){
    document.addEventListener('touchmove',onCardDragMove,{passive:false});
    document.addEventListener('touchend',onCardDragEnd);
  }else{
    document.addEventListener('mousemove',onCardDragMove);
    document.addEventListener('mouseup',onCardDragEnd);
  }
}

function onCardDragMove(e){
  e.preventDefault();
  var pt=e.touches?e.touches[0]:e;
  var cards=document.querySelectorAll('.order-card');
  cards.forEach(function(c){c.classList.remove('drag-over-top','drag-over-bottom');});
  var target=document.elementFromPoint(pt.clientX,pt.clientY);
  if(target){
    var card=target.closest('.order-card');
    if(card&&card!==dragCard){
      var rect=card.getBoundingClientRect();
      var mid=rect.top+rect.height/2;
      if(pt.clientY<mid){card.classList.add('drag-over-top');}
      else{card.classList.add('drag-over-bottom');}
    }
  }
}

function onCardDragEnd(e){
  document.removeEventListener('mousemove',onCardDragMove);
  document.removeEventListener('mouseup',onCardDragEnd);
  document.removeEventListener('touchmove',onCardDragMove);
  document.removeEventListener('touchend',onCardDragEnd);
  var pt=e.changedTouches?e.changedTouches[0]:e;
  var target=document.elementFromPoint(pt.clientX,pt.clientY);
  if(target){
    var card=target.closest('.order-card');
    if(card&&card!==dragCard){
      var targetPos=parseInt(card.getAttribute('data-pos'));
      var rect=card.getBoundingClientRect();
      var mid=rect.top+rect.height/2;
      var insertBefore=pt.clientY<mid;
      // Reorder
      var item=currentOrder.splice(dragIdx,1)[0];
      var newPos=insertBefore?targetPos:targetPos+1;
      if(dragIdx<targetPos)newPos--;
      if(newPos<0)newPos=0;
      if(newPos>currentOrder.length)newPos=currentOrder.length;
      currentOrder.splice(newPos,0,item);
      renderCards();
    }else{
      if(dragCard)dragCard.style.opacity='1';
    }
  }else{
    if(dragCard)dragCard.style.opacity='1';
  }
  var allCards=document.querySelectorAll('.order-card');
  allCards.forEach(function(c){c.classList.remove('drag-over-top','drag-over-bottom');c.style.opacity='1';});
  dragIdx=-1;dragCard=null;
}

function checkOrder(){
  attempts++;
  var allCorrect=true;
  var cards=document.querySelectorAll('.order-card');
  cards.forEach(function(el,pos){
    var ci=currentOrder[pos];
    if(ci===pos){
      el.classList.add('correct');el.classList.remove('wrong');
    }else{
      el.classList.add('wrong');el.classList.remove('correct');
      allCorrect=false;
    }
  });
  if(allCorrect){
    document.getElementById('scoreDisplay').textContent=t('score')+': '+t('correct');
    document.getElementById('scoreDisplay').style.color='#10b981';
    setTimeout(function(){document.getElementById('winOverlay').classList.add('show');},800);
  }else{
    document.getElementById('scoreDisplay').textContent=t('score')+': '+t('partial');
    document.getElementById('scoreDisplay').style.color='#ff5f1f';
    setTimeout(function(){cards.forEach(function(el){el.classList.remove('wrong','correct');});},1200);
  }
  document.getElementById('attemptsDisplay').textContent=t('attempts')+': '+attempts;
}

function updateStatus(){
  document.getElementById('scoreDisplay').textContent=t('score')+': '+t('pending');
  document.getElementById('scoreDisplay').style.color='#00daf3';
  document.getElementById('attemptsDisplay').textContent=t('attempts')+': '+attempts;
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('guideTitle').textContent=t('guide');
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var list=document.getElementById('guideList');list.innerHTML='';
  ['guideP1','guideP2','guideP3','guideP4'].forEach(function(k){var li=document.createElement('li');li.textContent=t(k);list.appendChild(li);});
  document.getElementById('scenarioText').textContent=t('scenario');
  document.getElementById('instructionText').textContent=t('instruction');
  document.getElementById('checkBtn').textContent=t('check');
  document.getElementById('winTitle').textContent=t('winTitle');
  document.getElementById('winText').textContent=t('winText');
  document.getElementById('winBtn').textContent=t('winBtn');
  renderCards();
  updateStatus();
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';document.getElementById('langBtn').textContent=LANG.toUpperCase();refreshI18N();
});
document.getElementById('checkBtn').addEventListener('click',checkOrder);
document.getElementById('winBtn').addEventListener('click',function(){
  document.getElementById('winOverlay').classList.remove('show');buildCards();refreshI18N();
});
var guideOpen=true;
document.getElementById('guideToggle').addEventListener('click',function(){guideOpen=!guideOpen;document.getElementById('guideContent').style.display=guideOpen?'block':'none';document.getElementById('guideArrow').textContent=guideOpen?'-':'+';});

buildCards();
refreshI18N();
})();
</script>
</body>
</html>
