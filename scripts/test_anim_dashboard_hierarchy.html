<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Three-Level Information Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:10px 16px 6px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .subtitle{font-size:12px;color:#8a8886;margin-top:2px;font-family:'Space Grotesk',sans-serif;letter-spacing:1px}
.canvas-wrap{flex:1;min-height:0;position:relative}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 0;flex-shrink:0;background:rgba(28,27,27,0.92);border-top:1px solid rgba(138,136,134,0.15)}
.controls button{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:6px 18px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;text-transform:uppercase}
.controls button:hover{background:rgba(255,181,156,0.12)}
.controls .frame-info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886;min-width:60px;text-align:center}
.hud{display:flex;justify-content:space-around;align-items:center;height:48px;background:rgba(0,0,0,0.55);flex-shrink:0;border-top:1px solid rgba(138,136,134,0.15)}
.hud .hud-item{text-align:center}
.hud .hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.hud .hud-value{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#ffb59c;font-weight:700}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:16px;line-height:1.6}
.guide-panel .guide-content{transition:max-height 0.3s}
.guide-panel.collapsed .guide-content{max-height:0;overflow:hidden}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
<h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
<div class="guide-content" id="guideContent">
<p id="guideDesc" style="margin-bottom:8px"></p>
<ul id="guideList"></ul>
<p id="guideTakeaway" style="margin-top:8px;color:#ffb59c;font-size:11px"></p>
</div>
</div>
<div class="wrapper">
<div class="header">
<h1 id="titleText"></h1>
<div class="subtitle" id="subtitleText"></div>
</div>
<div class="canvas-wrap" id="canvasWrap">
<canvas id="c"></canvas>
</div>
<div class="controls">
<button id="btnPrev"></button>
<button id="btnPlay"></button>
<button id="btnNext"></button>
<span class="frame-info" id="frameInfo"></span>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudLabel0"></div><div class="hud-value" id="hudValue0"></div></div>
<div class="hud-item"><div class="hud-label" id="hudLabel1"></div><div class="hud-value" id="hudValue1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudLabel2"></div><div class="hud-value" id="hudValue2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudLabel3"></div><div class="hud-value" id="hudValue3"></div></div>
</div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'DASHBOARD INFORMATION HIERARCHY',cn:'\u770b\u677f\u4e09\u7ea7\u4fe1\u606f\u67b6\u6784'},
  subtitle:{en:'From Status Overview to Decision Support',cn:'\u4ece\u72b6\u6001\u603b\u89c8\u5230\u51b3\u7b56\u652f\u6301'},
  btnPrev:{en:'PREV',cn:'\u4e0a\u4e00\u5e27'},
  btnPlay:{en:'PLAY',cn:'\u64ad\u653e'},
  btnPause:{en:'PAUSE',cn:'\u6682\u505c'},
  btnNext:{en:'NEXT',cn:'\u4e0b\u4e00\u5e27'},
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{en:'Watch how a mission dashboard builds up through three information levels: status, trends, and alerts.',cn:'\u89c2\u5bdf\u4efb\u52a1\u770b\u677f\u5982\u4f55\u901a\u8fc7\u4e09\u7ea7\u4fe1\u606f\u5c42\u6b21\u9010\u6b65\u642d\u5efa\uff1a\u72b6\u6001\u3001\u8d8b\u52bf\u3001\u544a\u8b66\u3002'},
  guideObs1:{en:'Level 1: Status lights answer "Is it running?"',cn:'\u7b2c\u4e00\u7ea7\uff1a\u72b6\u6001\u706f\u56de\u7b54\u201c\u8fd0\u884c\u4e2d\u5417\uff1f\u201d'},
  guideObs2:{en:'Level 2: Trend charts answer "Getting better or worse?"',cn:'\u7b2c\u4e8c\u7ea7\uff1a\u8d8b\u52bf\u56fe\u56de\u7b54\u201c\u53d8\u597d\u8fd8\u662f\u53d8\u5dee\uff1f\u201d'},
  guideObs3:{en:'Level 3: Alerts answer "Should I intervene?"',cn:'\u7b2c\u4e09\u7ea7\uff1a\u544a\u8b66\u56de\u7b54\u201c\u8be5\u4e0d\u8be5\u5e72\u9884\uff1f\u201d'},
  guideTakeaway:{en:'A good dashboard answers status, trend, and alert questions at a glance.',cn:'\u597d\u7684\u770b\u677f\u4e00\u773c\u5c31\u80fd\u56de\u7b54\u72b6\u6001\u3001\u8d8b\u52bf\u548c\u544a\u8b66\u4e09\u4e2a\u95ee\u9898\u3002'},
  frame0Title:{en:'EMPTY CONSOLE FRAME',cn:'\u7a7a\u767d\u63a7\u5236\u53f0\u6846\u67b6'},
  frame1Title:{en:'LEVEL 1: STATUS OVERVIEW',cn:'\u7b2c\u4e00\u7ea7\uff1a\u72b6\u6001\u603b\u89c8'},
  frame2Title:{en:'LEVEL 2: TREND COMPARISON',cn:'\u7b2c\u4e8c\u7ea7\uff1a\u8d8b\u52bf\u5bf9\u6bd4'},
  frame3Title:{en:'LEVEL 3: ALERTS & DECISIONS',cn:'\u7b2c\u4e09\u7ea7\uff1a\u544a\u8b66\u4e0e\u51b3\u7b56'},
  frame4Title:{en:'COMPLETE MISSION CONTROL',cn:'\u5b8c\u6574\u4efb\u52a1\u63a7\u5236\u53f0'},
  frame0Desc:{en:'The skeleton of a mission control dashboard',cn:'\u4efb\u52a1\u63a7\u5236\u53f0\u7684\u9aa8\u67b6'},
  frame1Desc:{en:'Health lights: is each module running?',cn:'\u5065\u5eb7\u72b6\u6001\u706f\uff1a\u6bcf\u4e2a\u6a21\u5757\u5728\u8fd0\u884c\u5417\uff1f'},
  frame2Desc:{en:'Trend lines: improving or degrading?',cn:'\u8d8b\u52bf\u7ebf\uff1a\u5728\u53d8\u597d\u8fd8\u662f\u53d8\u5dee\uff1f'},
  frame3Desc:{en:'Alert panel: what needs immediate attention?',cn:'\u544a\u8b66\u9762\u677f\uff1a\u4ec0\u4e48\u9700\u8981\u7acb\u5373\u5173\u6ce8\uff1f'},
  frame4Desc:{en:'All three levels working together',cn:'\u4e09\u7ea7\u4fe1\u606f\u534f\u540c\u5de5\u4f5c'},
  hudLevel:{en:'LEVEL',cn:'\u5c42\u7ea7'},
  hudPanels:{en:'PANELS',cn:'\u9762\u677f'},
  hudQuestion:{en:'ANSWERS',cn:'\u56de\u7b54'},
  hudStatus:{en:'STATUS',cn:'\u72b6\u6001'},
  modRiskMap:{en:'RISK MAP',cn:'\u98ce\u9669\u56fe'},
  modPathPlan:{en:'PATH PLAN',cn:'\u8def\u5f84\u89c4\u5212'},
  modSpeedCtrl:{en:'SPEED CTRL',cn:'\u901f\u5ea6\u63a7\u5236'},
  modTrialRun:{en:'TRIAL RUN',cn:'\u8bd5\u8dd1\u5668'},
  alertTitle:{en:'ACTIVE ALERTS',cn:'\u6d3b\u8dc3\u544a\u8b66'},
  alert1:{en:'Path fail x3 -- update risk map?',cn:'\u8def\u5f84\u5931\u8d25x3 -- \u66f4\u65b0\u98ce\u9669\u56fe\uff1f'},
  alert2:{en:'Delay > 500ms -- degrade speed?',cn:'\u5ef6\u8fdf>500ms -- \u964d\u7ea7\u901f\u5ea6\uff1f'},
  alert3:{en:'Coverage dropped 12% since v0.8',cn:'\u8986\u76d6\u7387\u6bd4v0.8\u4e0b\u964d12%'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k}

var canvas,ctx,W,H,dpr;
var currentFrame=0,totalFrames=5;
var transitioning=false,playing=false,playRaf=null;

function lerp(a,b,p){return a+(b-a)*p}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2}
function merge(base,ov){var r={};for(var k in base)r[k]=base[k];for(var k2 in ov)r[k2]=ov[k2];return r}

function hexToRgb(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return r+','+g+','+b}

function resize(){
  var wrap=document.getElementById('canvasWrap');
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  canvas=document.getElementById('c');
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=rect.width;H=rect.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawFrame(currentFrame);
}

function drawBg(){
  var grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#131313');grd.addColorStop(1,'#1a1510');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,181,156,0.03)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.fillStyle='rgba(255,95,31,0.015)';
  for(var sy=0;sy<H;sy+=4){ctx.fillRect(0,sy,W,2)}
}

function drawRoundRect(x,y,w,h,fill,border){
  ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);
  if(border){ctx.strokeStyle=border;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h)}
}

function drawGlowText(text,x,y,color,size,align,glow){
  ctx.font=(size<14?'500':'700')+' '+size+'px "Space Grotesk",sans-serif';
  ctx.textAlign=align||'left';ctx.textBaseline='middle';
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=glow}
  ctx.fillStyle=color;ctx.fillText(text,x,y);ctx.shadowBlur=0
}

// Dashboard geometry
function getDash(){
  var dw=W*0.82,dh=H*0.78;
  var dx=(W-dw)/2,dy=H*0.08;
  return{dx:dx,dy:dy,dw:dw,dh:dh}
}

function getFrameElements(f){
  var cx=W/2,cy=H/2;
  var d=getDash();
  var elems=[];
  var titleKeys=['frame0Title','frame1Title','frame2Title','frame3Title','frame4Title'];
  var descKeys=['frame0Desc','frame1Desc','frame2Desc','frame3Desc','frame4Desc'];
  elems.push({id:'stepTitle',type:'label',text:t(titleKeys[f]),x:cx,y:d.dy-6,color:'#ffb59c',size:13,align:'center',alpha:1});

  // console frame always present
  elems.push({id:'consoleFrame',type:'custom',x:d.dx,y:d.dy,w:d.dw,h:d.dh,alpha:1,draw:function(al){
    ctx.save();ctx.globalAlpha=al;
    drawRoundRect(d.dx,d.dy,d.dw,d.dh,'rgba(28,27,27,0.4)','rgba(255,181,156,0.15)');
    // title bar
    drawRoundRect(d.dx,d.dy,d.dw,26,'rgba(255,181,156,0.06)','rgba(255,181,156,0.1)');
    ctx.font='700 10px "Space Grotesk",sans-serif';ctx.fillStyle='#ffb59c';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('ARES MISSION CONTROL',cx,d.dy+13);
    ctx.restore()
  }});

  var modNames=[t('modRiskMap'),t('modPathPlan'),t('modSpeedCtrl'),t('modTrialRun')];
  var modColors=['#ff5f1f','#10b981','#00daf3','#ffb59c'];
  var statusColors=f>=1?['#10b981','#10b981','#ff5f1f','#10b981']:['#353534','#353534','#353534','#353534'];
  var topY=d.dy+36;
  var modW=(d.dw-50)/4;

  // Level 1: Status lights (visible from frame 1 onward)
  if(f>=1){
    for(var i=0;i<4;i++){
      (function(i2){
        var mx=d.dx+10+i2*(modW+10);
        elems.push({id:'mod'+i2,type:'custom',x:mx,y:topY,w:modW,h:50,alpha:1,draw:function(al){
          ctx.save();ctx.globalAlpha=al;
          drawRoundRect(mx,topY,modW,50,'rgba(0,0,0,0.3)','rgba('+hexToRgb(modColors[i2])+',0.2)');
          // status circle
          var circX=mx+modW/2,circY=topY+20;
          ctx.beginPath();ctx.arc(circX,circY,8,0,Math.PI*2);
          ctx.fillStyle=statusColors[i2];
          ctx.shadowColor=statusColors[i2];ctx.shadowBlur=12;
          ctx.fill();ctx.shadowBlur=0;
          // label
          ctx.font='700 8px "Space Grotesk",sans-serif';ctx.fillStyle=modColors[i2];ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(modNames[i2],mx+modW/2,topY+42);
          ctx.restore()
        }})
      })(i)
    }
  } else {
    // placeholder slots
    for(var i=0;i<4;i++){
      (function(i2){
        var mx=d.dx+10+i2*(modW+10);
        elems.push({id:'mod'+i2,type:'custom',x:mx,y:topY,w:modW,h:50,alpha:1,draw:function(al){
          ctx.save();ctx.globalAlpha=al*0.3;
          ctx.strokeStyle='rgba(138,136,134,0.15)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
          ctx.strokeRect(mx,topY,modW,50);ctx.setLineDash([]);
          ctx.font='400 8px "Space Grotesk",sans-serif';ctx.fillStyle='#8a8886';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('?',mx+modW/2,topY+25);
          ctx.restore()
        }})
      })(i)
    }
  }

  // Level 2: Trend charts (visible from frame 2 onward)
  var trendY=topY+62;
  var trendH=d.dh*0.28;
  if(f>=2){
    var trendW=(d.dw-30)/2;
    var trends=[
      {label:t('modRiskMap')+' SCORE',color:'#ff5f1f',data:[0.8,0.75,0.7,0.65,0.6,0.55,0.5]},
      {label:'DELAY (ms)',color:'#00daf3',data:[100,120,150,180,230,210,190]}
    ];
    for(var ti=0;ti<2;ti++){
      (function(ti2){
        var tx=d.dx+10+ti2*(trendW+10);
        elems.push({id:'trend'+ti2,type:'custom',x:tx,y:trendY,w:trendW,h:trendH,alpha:1,draw:function(al){
          ctx.save();ctx.globalAlpha=al;
          drawRoundRect(tx,trendY,trendW,trendH,'rgba(0,0,0,0.3)','rgba('+hexToRgb(trends[ti2].color)+',0.15)');
          ctx.font='700 8px "Space Grotesk",sans-serif';ctx.fillStyle=trends[ti2].color;ctx.textAlign='left';ctx.textBaseline='middle';
          ctx.fillText(trends[ti2].label,tx+8,trendY+14);
          // draw line chart
          var data=trends[ti2].data;
          var maxV=Math.max.apply(null,data)*1.2;
          var minV=Math.min.apply(null,data)*0.8;
          var chartX=tx+10,chartY=trendY+28,chartW=trendW-20,chartH=trendH-40;
          ctx.strokeStyle=trends[ti2].color;ctx.lineWidth=2;
          ctx.shadowColor=trends[ti2].color;ctx.shadowBlur=6;
          ctx.beginPath();
          for(var di=0;di<data.length;di++){
            var px=chartX+di*(chartW/(data.length-1));
            var py=chartY+chartH-(data[di]-minV)/(maxV-minV)*chartH;
            if(di===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)
          }
          ctx.stroke();ctx.shadowBlur=0;
          // dots
          for(var di=0;di<data.length;di++){
            var px=chartX+di*(chartW/(data.length-1));
            var py=chartY+chartH-(data[di]-minV)/(maxV-minV)*chartH;
            ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle=trends[ti2].color;ctx.fill()
          }
          ctx.restore()
        }})
      })(ti)
    }
  } else {
    // placeholder
    var trendW=(d.dw-30)/2;
    for(var ti=0;ti<2;ti++){
      (function(ti2){
        var tx=d.dx+10+ti2*(trendW+10);
        elems.push({id:'trend'+ti2,type:'custom',x:tx,y:trendY,w:trendW,h:trendH,alpha:1,draw:function(al){
          ctx.save();ctx.globalAlpha=al*0.2;
          ctx.strokeStyle='rgba(138,136,134,0.15)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
          ctx.strokeRect(tx,trendY,trendW,trendH);ctx.setLineDash([]);
          ctx.restore()
        }})
      })(ti)
    }
  }

  // Level 3: Alerts (visible from frame 3 onward)
  var alertY=trendY+trendH+10;
  var alertH=d.dh-(alertY-d.dy)-10;
  if(f>=3){
    elems.push({id:'alertPanel',type:'custom',x:d.dx+10,y:alertY,w:d.dw-20,h:alertH,alpha:1,draw:function(al){
      ctx.save();ctx.globalAlpha=al;
      drawRoundRect(d.dx+10,alertY,d.dw-20,alertH,'rgba(255,95,31,0.04)','rgba(255,95,31,0.2)');
      ctx.font='700 10px "Space Grotesk",sans-serif';ctx.fillStyle='#ff5f1f';ctx.textAlign='left';ctx.textBaseline='middle';
      // blinking effect
      var blink=Math.sin(Date.now()/300)>0?1:0.5;
      ctx.globalAlpha=al*blink;
      ctx.fillText(t('alertTitle'),d.dx+20,alertY+14);
      ctx.globalAlpha=al;
      // alert items
      var alerts=[t('alert1'),t('alert2'),t('alert3')];
      var alertIcons=['!!','!','i'];
      var alertColors=['#ff5f1f','#ffb59c','#00daf3'];
      for(var ai=0;ai<alerts.length;ai++){
        var ay=alertY+32+ai*22;
        ctx.fillStyle=alertColors[ai];
        ctx.font='700 9px "Space Grotesk",sans-serif';
        ctx.fillText(alertIcons[ai],d.dx+22,ay);
        ctx.fillStyle='#c6c6c6';ctx.font='400 10px "Noto Sans SC",sans-serif';
        ctx.fillText(alerts[ai],d.dx+42,ay)
      }
      ctx.restore()
    }})
  } else {
    elems.push({id:'alertPanel',type:'custom',x:d.dx+10,y:alertY,w:d.dw-20,h:alertH,alpha:1,draw:function(al){
      ctx.save();ctx.globalAlpha=al*0.2;
      ctx.strokeStyle='rgba(138,136,134,0.15)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.strokeRect(d.dx+10,alertY,d.dw-20,alertH);ctx.setLineDash([]);
      ctx.restore()
    }})
  }

  // Frame 4: add glow border to indicate "complete"
  if(f===4){
    elems.push({id:'completeBorder',type:'custom',alpha:1,draw:function(al){
      ctx.save();ctx.globalAlpha=al*0.5;
      ctx.strokeStyle='#ffb59c';ctx.lineWidth=2;ctx.shadowColor='#ffb59c';ctx.shadowBlur=16;
      ctx.strokeRect(d.dx-2,d.dy-2,d.dw+4,d.dh+4);
      ctx.shadowBlur=0;ctx.restore()
    }});
    // "OPERATIONAL" badge
    elems.push({id:'opBadge',type:'custom',x:cx,y:d.dy+d.dh+4,alpha:1,draw:function(al){
      ctx.save();ctx.globalAlpha=al;
      var bw=140,bh=20;
      var grd=ctx.createLinearGradient(cx-bw/2,0,cx+bw/2,0);
      grd.addColorStop(0,'#ffb59c');grd.addColorStop(1,'#ff7f50');
      ctx.fillStyle=grd;ctx.fillRect(cx-bw/2,d.dy+d.dh-16,bw,bh);
      ctx.font='700 10px "Space Grotesk",sans-serif';ctx.fillStyle='#131313';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('OPERATIONAL',cx,d.dy+d.dh-6);
      ctx.restore()
    }})
  }

  // step description
  elems.push({id:'stepDesc',type:'label',text:t(descKeys[f]),x:cx,y:d.dy+d.dh+14,color:'#8a8886',size:10,align:'center',alpha:1});

  return elems
}

function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  if(el.type==='label'){drawGlowText(el.text,el.x,el.y,el.color,el.size,el.align,el.size>12?8:0)}
  else if(el.type==='custom'){el.draw.call(el,el.alpha)}
  ctx.restore()
}

function drawFrame(f){if(!ctx)return;drawBg();var elems=getFrameElements(f);elems.forEach(function(el){drawElement(el)})}

function transitionTo(newFrame){
  if(newFrame<0)newFrame=0;
  if(newFrame>=totalFrames)newFrame=totalFrames-1;
  if(newFrame===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return}
  if(transitioning)return;
  var oldElems=getFrameElements(currentFrame);
  var newElems=getFrameElements(newFrame);
  var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e});
  var newMap={};newElems.forEach(function(e){newMap[e.id]=e});
  currentFrame=newFrame;updateHUD(newFrame);transitioning=true;
  var startTime=null,duration=500;
  function step(ts){
    if(!startTime)startTime=ts;
    var raw=Math.min((ts-startTime)/duration,1);var p=easeInOut(raw);
    drawBg();
    oldElems.forEach(function(oe){if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}))});
    newElems.forEach(function(ne){
      var oe=oldMap[ne.id];
      if(oe){
        var m=merge(ne,{x:lerp(oe.x||0,ne.x||0,p),y:lerp(oe.y||0,ne.y||0,p),w:lerp(oe.w||0,ne.w||0,p),h:lerp(oe.h||0,ne.h||0,p),alpha:1});
        if((ne.type==='label')&&oe.text!==ne.text){drawElement(merge(oe,{alpha:1-p}));drawElement(merge(ne,{alpha:p}))}
        else{drawElement(m)}
      } else {drawElement(merge(ne,{alpha:p}))}
    });
    if(raw<1)requestAnimationFrame(step);else transitioning=false
  }
  requestAnimationFrame(step)
}

var hudData=[
  [{l:'hudLevel',v:function(){return '0/3'}},{l:'hudPanels',v:function(){return '0'}},{l:'hudQuestion',v:function(){return '--'}},{l:'hudStatus',v:function(){return 'INIT'}}],
  [{l:'hudLevel',v:function(){return '1/3'}},{l:'hudPanels',v:function(){return '4'}},{l:'hudQuestion',v:function(){return LANG==='cn'?'\u5728\u8fd0\u884c\u5417?':'Running?'}},{l:'hudStatus',v:function(){return 'PARTIAL'}}],
  [{l:'hudLevel',v:function(){return '2/3'}},{l:'hudPanels',v:function(){return '6'}},{l:'hudQuestion',v:function(){return LANG==='cn'?'\u53d8\u597d/\u53d8\u5dee?':'Better?'}},{l:'hudStatus',v:function(){return 'PARTIAL'}}],
  [{l:'hudLevel',v:function(){return '3/3'}},{l:'hudPanels',v:function(){return '7'}},{l:'hudQuestion',v:function(){return LANG==='cn'?'\u8be5\u5e72\u9884\u5417?':'Intervene?'}},{l:'hudStatus',v:function(){return 'PARTIAL'}}],
  [{l:'hudLevel',v:function(){return '3/3'}},{l:'hudPanels',v:function(){return '7'}},{l:'hudQuestion',v:function(){return LANG==='cn'?'\u5168\u90e8':'ALL'}},{l:'hudStatus',v:function(){return 'READY'}}]
];

function updateHUD(f){
  var d=hudData[f];
  for(var i=0;i<4;i++){
    document.getElementById('hudLabel'+i).textContent=t(d[i].l);
    document.getElementById('hudValue'+i).textContent=d[i].v()
  }
  document.getElementById('frameInfo').textContent=(f+1)+' / '+totalFrames
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('subtitleText').textContent=t('subtitle');
  document.getElementById('btnPrev').textContent=t('btnPrev');
  document.getElementById('btnPlay').textContent=playing?t('btnPause'):t('btnPlay');
  document.getElementById('btnNext').textContent=t('btnNext');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var list=document.getElementById('guideList');list.innerHTML='';
  ['guideObs1','guideObs2','guideObs3'].forEach(function(k){var li=document.createElement('li');li.textContent=t(k);list.appendChild(li)});
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  updateHUD(currentFrame);drawFrame(currentFrame)
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';document.getElementById('langBtn').textContent=LANG.toUpperCase();refreshI18N()
});
document.getElementById('btnPrev').addEventListener('click',function(){if(playing)stopPlay();transitionTo(currentFrame-1)});
document.getElementById('btnNext').addEventListener('click',function(){if(playing)stopPlay();transitionTo(currentFrame+1)});
document.getElementById('btnPlay').addEventListener('click',function(){if(playing){stopPlay()}else{startPlay()}});

function startPlay(){
  playing=true;document.getElementById('btnPlay').textContent=t('btnPause');
  if(currentFrame>=totalFrames-1)currentFrame=-1;
  function advance(){if(!playing)return;if(currentFrame>=totalFrames-1){stopPlay();return}transitionTo(currentFrame+1);playRaf=setTimeout(advance,1200)}
  advance()
}
function stopPlay(){playing=false;document.getElementById('btnPlay').textContent=t('btnPlay');if(playRaf){clearTimeout(playRaf);playRaf=null}}

document.getElementById('guideToggle').addEventListener('click',function(){
  document.getElementById('guidePanel').classList.toggle('collapsed');
  document.getElementById('guideArrow').textContent=document.getElementById('guidePanel').classList.contains('collapsed')?'+':'-'
});

window.addEventListener('resize',resize);refreshI18N();resize();
setTimeout(resize,200);setTimeout(resize,600);document.fonts.ready.then(function(){resize()})
})();
</script>

</html>
