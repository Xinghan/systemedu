<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.header{
  padding:8px 16px;text-align:center;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;
  color:#ffb59c;letter-spacing:2px;
}
.header p{font-size:12px;color:#8a8886;margin-top:2px;}
.game-area{flex:1;min-height:0;display:flex;overflow:hidden;}
.palette{
  width:160px;min-width:120px;
  background:rgba(20,20,30,0.9);
  border-right:1px solid rgba(138,136,134,0.15);
  padding:10px;
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
}
.palette-item{
  padding:10px 8px;
  border:1px solid rgba(138,136,134,0.15);
  background:linear-gradient(135deg,rgba(40,38,36,0.9),rgba(28,27,27,0.9));
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  text-align:center;
  font-size:12px;
  font-family:'Noto Sans SC',sans-serif;
  color:#e5e2e1;
  position:relative;
}
.palette-item:active{cursor:grabbing;}
.palette-item .p-icon{
  font-size:20px;display:block;margin-bottom:4px;
  font-family:'Space Grotesk',sans-serif;font-weight:700;
}
.palette-item.placed{opacity:0.3;pointer-events:none;}
.field-grid{
  flex:1;position:relative;
  background:linear-gradient(180deg,#1a1510,#131313);
  overflow:hidden;
}
.grid-cell{
  position:absolute;
  border:1px solid rgba(138,136,134,0.1);
  transition:border-color 0.15s;
}
.grid-cell.highlight{border-color:rgba(255,181,156,0.4);}
.grid-cell.filled{border-color:rgba(255,95,31,0.3);}
.cell-content{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:10px;color:#8a8886;
  font-family:'Noto Sans SC',sans-serif;
}
.cell-content .cell-icon{
  font-size:18px;font-weight:700;
  font-family:'Space Grotesk',sans-serif;
}
.feedback-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
  min-height:52px;
}
.score-display{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;
}
.btn-check{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:6px 18px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:linear-gradient(180deg,#ff7f50,#ff5f1f);
  color:#131313;
}
.btn-check:hover{opacity:0.9;}
.btn-reset{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:6px 14px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#8a8886;
}
.feedback-msg{
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  color:#8a8886;flex:1;text-align:center;
}
.win-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:none;z-index:200;
  align-items:center;justify-content:center;
}
.win-overlay.show{display:flex;}
.win-card{
  width:360px;max-width:90%;padding:24px;
  background:linear-gradient(180deg,rgba(28,27,27,0.98),rgba(20,20,30,0.98));
  border:1px solid rgba(255,181,156,0.2);
  text-align:center;
}
.win-card h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;
  color:#ffb59c;margin-bottom:12px;letter-spacing:2px;
}
.win-card p{
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  color:#c6c6c6;line-height:1.6;margin-bottom:16px;
}
.win-card button{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:linear-gradient(180deg,#ff7f50,#ff5f1f);
  color:#131313;
}
.drag-ghost{
  position:fixed;z-index:300;pointer-events:none;
  padding:8px 12px;
  background:rgba(255,95,31,0.85);
  border:1px solid #ffb59c;
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  color:#131313;font-weight:700;
  opacity:0.9;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideGoal"></p>
    <ul id="guideSteps"></ul>
    <p id="guideTips" style="margin-top:6px;color:#ffb59c;"></p>
  </div>
</div>
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <button id="winBtn"></button>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="gameTitle"></h1>
    <p id="gameSubtitle"></p>
  </div>
  <div class="game-area" id="gameArea">
    <div class="palette" id="palette"></div>
    <div class="field-grid" id="fieldGrid"></div>
  </div>
  <div class="feedback-bar">
    <span class="score-display" id="scoreDisplay"></span>
    <span class="feedback-msg" id="feedbackMsg"></span>
    <button class="btn-reset" id="btnReset"></button>
    <button class="btn-check" id="btnCheck"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideGoal:{en:'Drag terrain items from the palette onto the 4x3 grid to build a Mars test field with terrain diversity.',cn:'\u4ece\u5de6\u4fa7\u9762\u677f\u62d6\u62fd\u5730\u5f62\u5143\u7d20\u5230 4x3 \u7f51\u683c\u4e2d\uff0c\u642d\u5efa\u4e00\u4e2a\u5177\u6709\u5730\u8c8c\u5dee\u5f02\u7684\u6a21\u62df\u706b\u661f\u573a\u5730\u3002'},
  guideStep1:{en:'Step 1: Place sand, slope, rock, and flat zones',cn:'\u7b2c1\u6b65\uff1a\u653e\u7f6e\u6c99\u77f3\u3001\u5761\u9762\u3001\u5ca9\u77f3\u548c\u5e73\u5766\u533a\u57df'},
  guideStep2:{en:'Step 2: Ensure at least 3 different terrain types exist',cn:'\u7b2c2\u6b65\uff1a\u786e\u4fdd\u81f3\u5c11\u5b58\u5728 3 \u79cd\u4e0d\u540c\u5730\u5f62\u7c7b\u578b'},
  guideStep3:{en:'Step 3: Click CHECK to validate your field layout',cn:'\u7b2c3\u6b65\uff1a\u70b9\u51fb\u68c0\u67e5\u9a8c\u8bc1\u573a\u5730\u5e03\u5c40'},
  guideTips:{en:'Tip: A good field needs variety -- do not fill all cells with the same type!',cn:'\u63d0\u793a\uff1a\u597d\u7684\u573a\u5730\u9700\u8981\u591a\u6837\u6027\u2014\u2014\u4e0d\u8981\u7528\u540c\u4e00\u79cd\u5730\u5f62\u586b\u6ee1\u6240\u6709\u7f51\u683c\uff01'},
  gameTitle:{en:'MARS FIELD BUILDER',cn:'\u706b\u661f\u573a\u5730\u642d\u5efa'},
  gameSubtitle:{en:'Drag terrain elements to build a test arena',cn:'\u62d6\u62fd\u5730\u5f62\u5143\u7d20\u642d\u5efa\u6d4b\u8bd5\u573a\u5730'},
  btnCheck:{en:'CHECK',cn:'\u68c0\u67e5'},
  btnReset:{en:'RESET',cn:'\u91cd\u7f6e'},
  score:{en:'PLACED',cn:'\u5df2\u653e\u7f6e'},
  sand:{en:'SAND',cn:'\u6c99\u77f3\u533a'},
  slope:{en:'SLOPE',cn:'\u5761\u9762\u533a'},
  rock:{en:'ROCK',cn:'\u5ca9\u77f3\u533a'},
  flat:{en:'FLAT',cn:'\u5e73\u5766\u533a'},
  boundary:{en:'BOUNDARY',cn:'\u8fb9\u754c'},
  start:{en:'START',cn:'\u8d77\u70b9'},
  goal:{en:'GOAL',cn:'\u7ec8\u70b9'},
  waypoint:{en:'WAYPOINT',cn:'\u4efb\u52a1\u70b9'},
  emptyCell:{en:'EMPTY',cn:'\u7a7a'},
  feedbackEmpty:{en:'Place terrain elements to fill the field!',cn:'\u5c06\u5730\u5f62\u5143\u7d20\u62d6\u653e\u5230\u573a\u5730\u4e2d\uff01'},
  feedbackNeedMore:{en:'Need at least 3 different terrain types and 6 cells filled.',cn:'\u9700\u8981\u81f3\u5c11 3 \u79cd\u4e0d\u540c\u5730\u5f62\u7c7b\u578b\u4e14\u586b\u6ee1 6 \u4e2a\u7f51\u683c\u3002'},
  feedbackNeedStart:{en:'Place a START and a GOAL marker!',cn:'\u8bf7\u653e\u7f6e\u8d77\u70b9\u548c\u7ec8\u70b9\u6807\u8bb0\uff01'},
  feedbackMonotone:{en:'Too monotone! Use more terrain variety.',cn:'\u592a\u5355\u8c03\uff01\u8bf7\u4f7f\u7528\u66f4\u591a\u5730\u5f62\u79cd\u7c7b\u3002'},
  feedbackGood:{en:'Great field layout! Terrain diversity is sufficient.',cn:'\u573a\u5730\u5e03\u5c40\u4f18\u79c0\uff01\u5730\u8c8c\u5dee\u5f02\u8db3\u591f\u3002'},
  winTitle:{en:'FIELD APPROVED',cn:'\u573a\u5730\u5ba1\u6838\u901a\u8fc7'},
  winMsg:{en:'Your test arena has sufficient terrain diversity for meaningful rover navigation validation. The variety of sand, slopes, and obstacles will expose real-world challenges that flat ground cannot reveal.',cn:'\u4f60\u7684\u6d4b\u8bd5\u573a\u5730\u5177\u6709\u8db3\u591f\u7684\u5730\u8c8c\u5dee\u5f02\uff0c\u53ef\u4ee5\u8fdb\u884c\u6709\u610f\u4e49\u7684\u706b\u661f\u8f66\u5bfc\u822a\u9a8c\u8bc1\u3002\u6c99\u77f3\u3001\u5761\u9762\u548c\u969c\u788d\u7684\u591a\u6837\u6027\u5c06\u66b4\u9732\u5e73\u5730\u65e0\u6cd5\u53d1\u73b0\u7684\u771f\u5b9e\u6311\u6218\u3002'},
  winBtn:{en:'REBUILD',cn:'\u91cd\u65b0\u642d\u5efa'},
  sandIcon:{en:'~',cn:'~'},
  slopeIcon:{en:'/',cn:'/'},
  rockIcon:{en:'#',cn:'#'},
  flatIcon:{en:'_',cn:'_'},
  boundaryIcon:{en:'|',cn:'|'},
  startIcon:{en:'S',cn:'S'},
  goalIcon:{en:'G',cn:'G'},
  waypointIcon:{en:'W',cn:'W'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var COLS=4,ROWS=3;
var grid=[];// grid[row][col] = null | {type:'sand'|'slope'|...}
var placedCount=0;
var won=false;

var TERRAIN_TYPES=[
  {type:'sand',icon:'sandIcon',label:'sand',color:'#c4a060',bg:'linear-gradient(135deg,#8a6030,#c4a060)'},
  {type:'slope',icon:'slopeIcon',label:'slope',color:'#b07840',bg:'linear-gradient(135deg,#6a4020,#b07840)'},
  {type:'rock',icon:'rockIcon',label:'rock',color:'#888',bg:'linear-gradient(135deg,#444,#777)'},
  {type:'flat',icon:'flatIcon',label:'flat',color:'#5a3a20',bg:'linear-gradient(135deg,#3a2a15,#5a3a20)'},
  {type:'boundary',icon:'boundaryIcon',label:'boundary',color:'#ff5f1f',bg:'linear-gradient(135deg,#8b3000,#ff5f1f)'},
  {type:'start',icon:'startIcon',label:'start',color:'#10b981',bg:'linear-gradient(135deg,#065f46,#10b981)'},
  {type:'goal',icon:'goalIcon',label:'goal',color:'#10b981',bg:'linear-gradient(135deg,#065f46,#10b981)'},
  {type:'waypoint',icon:'waypointIcon',label:'waypoint',color:'#00daf3',bg:'linear-gradient(135deg,#006070,#00daf3)'}
];

var dragging=null;// {type, ghostEl, originPaletteIdx}
var highlightCell=null;

function initGrid(){
  grid=[];
  for(var r=0;r<ROWS;r++){
    grid[r]=[];
    for(var c=0;c<COLS;c++){
      grid[r][c]=null;
    }
  }
  placedCount=0;
  won=false;
}

function renderPalette(){
  var pal=document.getElementById('palette');
  pal.innerHTML='';
  TERRAIN_TYPES.forEach(function(tt,idx){
    var div=document.createElement('div');
    div.className='palette-item';
    div.setAttribute('data-type',tt.type);
    div.setAttribute('data-idx',idx);
    var iconSpan=document.createElement('span');
    iconSpan.className='p-icon';
    iconSpan.style.color=tt.color;
    iconSpan.textContent=t(tt.icon);
    div.appendChild(iconSpan);
    var lbl=document.createElement('span');
    lbl.textContent=t(tt.label);
    div.appendChild(lbl);

    // Drag events
    div.addEventListener('mousedown',function(e){startDrag(e,tt);});
    div.addEventListener('touchstart',function(e){startDrag(e,tt);},{passive:false});
    pal.appendChild(div);
  });
}

function renderGrid(){
  var container=document.getElementById('fieldGrid');
  container.innerHTML='';
  var rect=container.getBoundingClientRect();
  var cellW=rect.width/COLS;
  var cellH=rect.height/ROWS;

  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var cell=document.createElement('div');
      cell.className='grid-cell'+(grid[r][c]?' filled':'');
      cell.style.left=(c*cellW)+'px';
      cell.style.top=(r*cellH)+'px';
      cell.style.width=cellW+'px';
      cell.style.height=cellH+'px';
      cell.setAttribute('data-row',r);
      cell.setAttribute('data-col',c);

      var content=document.createElement('div');
      content.className='cell-content';

      if(grid[r][c]){
        var tt=TERRAIN_TYPES.find(function(x){return x.type===grid[r][c].type;});
        if(tt){
          cell.style.background=tt.bg;
          var ic=document.createElement('span');
          ic.className='cell-icon';
          ic.style.color=tt.color==='#5a3a20'?'#8a6030':tt.color;
          ic.textContent=t(tt.icon);
          content.appendChild(ic);
          var lb=document.createElement('span');
          lb.textContent=t(tt.label);
          lb.style.color='rgba(255,255,255,0.7)';
          content.appendChild(lb);
        }
      }else{
        var emptyLbl=document.createElement('span');
        emptyLbl.textContent=t('emptyCell');
        emptyLbl.style.opacity='0.3';
        content.appendChild(emptyLbl);
      }
      cell.appendChild(content);
      container.appendChild(cell);
    }
  }
}

function getGridCellAt(x,y){
  var container=document.getElementById('fieldGrid');
  var rect=container.getBoundingClientRect();
  var cellW=rect.width/COLS;
  var cellH=rect.height/ROWS;
  var c=Math.floor((x-rect.left)/cellW);
  var r=Math.floor((y-rect.top)/cellH);
  if(r>=0&&r<ROWS&&c>=0&&c<COLS)return{row:r,col:c};
  return null;
}

function startDrag(e,terrainType){
  if(won)return;
  e.preventDefault();
  var clientX,clientY;
  if(e.touches){clientX=e.touches[0].clientX;clientY=e.touches[0].clientY;}
  else{clientX=e.clientX;clientY=e.clientY;}

  var ghost=document.createElement('div');
  ghost.className='drag-ghost';
  ghost.textContent=t(terrainType.label);
  ghost.style.left=(clientX-30)+'px';
  ghost.style.top=(clientY-15)+'px';
  document.body.appendChild(ghost);

  dragging={type:terrainType.type,ghostEl:ghost};

  function onMove(ev){
    ev.preventDefault();
    var cx,cy;
    if(ev.touches){cx=ev.touches[0].clientX;cy=ev.touches[0].clientY;}
    else{cx=ev.clientX;cy=ev.clientY;}
    ghost.style.left=(cx-30)+'px';
    ghost.style.top=(cy-15)+'px';

    // Highlight cell
    var cell=getGridCellAt(cx,cy);
    clearHighlight();
    if(cell){
      var cells=document.querySelectorAll('.grid-cell');
      cells.forEach(function(el){
        if(parseInt(el.getAttribute('data-row'))===cell.row&&parseInt(el.getAttribute('data-col'))===cell.col){
          el.classList.add('highlight');
        }
      });
      highlightCell=cell;
    }
  }

  function onEnd(ev){
    var cx,cy;
    if(ev.changedTouches){cx=ev.changedTouches[0].clientX;cy=ev.changedTouches[0].clientY;}
    else{cx=ev.clientX;cy=ev.clientY;}

    var cell=getGridCellAt(cx,cy);
    if(cell){
      grid[cell.row][cell.col]={type:dragging.type};
      updatePlacedCount();
      renderGrid();
    }

    clearHighlight();
    if(ghost.parentNode)ghost.parentNode.removeChild(ghost);
    dragging=null;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onEnd);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    updateScore();
  }

  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

function clearHighlight(){
  document.querySelectorAll('.grid-cell.highlight').forEach(function(el){
    el.classList.remove('highlight');
  });
  highlightCell=null;
}

function updatePlacedCount(){
  placedCount=0;
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c])placedCount++;
}

function updateScore(){
  document.getElementById('scoreDisplay').textContent=t('score')+': '+placedCount+'/'+COLS*ROWS;
}

function checkField(){
  if(won)return;
  var types={};
  var hasStart=false,hasGoal=false;
  var filled=0;
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      if(grid[r][c]){
        types[grid[r][c].type]=true;
        filled++;
        if(grid[r][c].type==='start')hasStart=true;
        if(grid[r][c].type==='goal')hasGoal=true;
      }
    }
  }

  var terrainTypes=0;
  ['sand','slope','rock','flat'].forEach(function(tt){if(types[tt])terrainTypes++;});

  var msg=document.getElementById('feedbackMsg');

  if(filled<6){
    msg.textContent=t('feedbackNeedMore');
    msg.style.color='#ff5f1f';
    return;
  }
  if(!hasStart||!hasGoal){
    msg.textContent=t('feedbackNeedStart');
    msg.style.color='#ff5f1f';
    return;
  }
  if(terrainTypes<3){
    msg.textContent=t('feedbackMonotone');
    msg.style.color='#ff5f1f';
    return;
  }

  msg.textContent=t('feedbackGood');
  msg.style.color='#10b981';
  won=true;
  showWin();
}

function showWin(){
  document.getElementById('winTitle').textContent=t('winTitle');
  document.getElementById('winMsg').textContent=t('winMsg');
  document.getElementById('winBtn').textContent=t('winBtn');
  document.getElementById('winOverlay').classList.add('show');
}

function resetGame(){
  initGrid();
  renderGrid();
  updateScore();
  document.getElementById('feedbackMsg').textContent=t('feedbackEmpty');
  document.getElementById('feedbackMsg').style.color='#8a8886';
  document.getElementById('winOverlay').classList.remove('show');
}

/* ── Event bindings ── */
document.getElementById('btnCheck').addEventListener('click',function(){checkField();});
document.getElementById('btnReset').addEventListener('click',function(){resetGame();});
document.getElementById('winBtn').addEventListener('click',function(){resetGame();});

/* ── Guide panel ── */
function refreshGuide(){
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  var steps=document.getElementById('guideSteps');
  steps.innerHTML='';
  ['guideStep1','guideStep2','guideStep3'].forEach(function(k){
    var li=document.createElement('li');
    li.textContent=t(k);
    steps.appendChild(li);
  });
  document.getElementById('guideTips').textContent=t('guideTips');
}

var guideCollapsed=false;
document.getElementById('guideHeader').addEventListener('click',function(){
  guideCollapsed=!guideCollapsed;
  document.getElementById('guideContent').className='guide-content'+(guideCollapsed?' collapsed':'');
  document.getElementById('guideToggle').textContent=guideCollapsed?'[+]':'[-]';
});

/* ── i18n ── */
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});

function refreshI18N(){
  document.getElementById('gameTitle').textContent=t('gameTitle');
  document.getElementById('gameSubtitle').textContent=t('gameSubtitle');
  document.getElementById('btnCheck').textContent=t('btnCheck');
  document.getElementById('btnReset').textContent=t('btnReset');
  refreshGuide();
  renderPalette();
  renderGrid();
  updateScore();
  if(!won){
    document.getElementById('feedbackMsg').textContent=t('feedbackEmpty');
  }
}

/* ── Resize handler ── */
function onResize(){
  renderGrid();
}
var ro=new ResizeObserver(function(){onResize();});
ro.observe(document.getElementById('fieldGrid'));

/* ── Init ── */
initGrid();
refreshI18N();
})();
</script>
</body>
</html>
