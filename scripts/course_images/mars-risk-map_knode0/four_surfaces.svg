<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Four ground surface materials: mud, stone, sand, grass">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0e14"/>
      <stop offset="50%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </linearGradient>
    <pattern id="mudPattern" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#5a3a28"/>
      <circle cx="4" cy="4" r="2" fill="#7a4a30" opacity="0.7"/>
      <circle cx="12" cy="10" r="1.6" fill="#3a2418" opacity="0.7"/>
      <circle cx="8" cy="14" r="1.2" fill="#6a3c24"/>
    </pattern>
    <pattern id="stonePattern" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#505458"/>
      <polygon points="4,6 10,2 14,8 8,14" fill="#707478" stroke="#2a2c30" stroke-width="0.8"/>
      <polygon points="14,12 22,10 20,20 12,18" fill="#606468" stroke="#2a2c30" stroke-width="0.8"/>
      <polygon points="2,18 8,20 6,24 0,22" fill="#787c80" stroke="#2a2c30" stroke-width="0.8"/>
    </pattern>
    <pattern id="sandPattern" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#c8a468"/>
      <circle cx="3" cy="3" r="0.9" fill="#e8c488"/>
      <circle cx="9" cy="6" r="0.7" fill="#a88448"/>
      <circle cx="6" cy="10" r="0.8" fill="#d8b478"/>
      <circle cx="12" cy="12" r="0.6" fill="#b89458"/>
    </pattern>
    <pattern id="grassPattern" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#2a5c28"/>
      <path d="M 3 18 L 4 8 M 8 18 L 9 6 M 13 18 L 14 10 M 6 18 L 5 12 M 11 18 L 12 8" stroke="#4ade80" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M 2 18 L 2.5 14 M 15 18 L 15.5 12" stroke="#7bf098" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="800" height="520" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="2">FOUR GROUND SURFACES</text>
  <text x="400" y="62" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#aaabb0" text-anchor="middle">四种脚下的大地 / Touch, look, compare</text>

  <!-- Grid of 4 surfaces -->
  <!-- Mud (top-left) -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="320" height="160" fill="url(#mudPattern)" stroke="#5a3a28" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="160" fill="none" stroke="#ffb59c" stroke-width="1" opacity="0.3"/>
    <!-- footprint silhouette -->
    <ellipse cx="80" cy="130" rx="28" ry="14" fill="#2a1810" opacity="0.6"/>
    <ellipse cx="80" cy="128" rx="22" ry="10" fill="#1a0e08" opacity="0.7"/>
    <!-- label -->
    <rect x="8" y="8" width="90" height="26" fill="rgba(12,14,20,0.85)" stroke="#ffb59c" stroke-width="1"/>
    <text x="53" y="26" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="1">MUD 泥土</text>
    <!-- caption -->
    <text x="160" y="182" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" text-anchor="middle">软、滑、会陷进去 / Soft, slippery, sinks</text>
  </g>

  <!-- Stone (top-right) -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="320" height="160" fill="url(#stonePattern)" stroke="#505458" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="160" fill="none" stroke="#ffb59c" stroke-width="1" opacity="0.3"/>
    <!-- footprint -->
    <ellipse cx="80" cy="130" rx="26" ry="12" fill="#1a1c20" opacity="0.5"/>
    <!-- label -->
    <rect x="8" y="8" width="100" height="26" fill="rgba(12,14,20,0.85)" stroke="#ffb59c" stroke-width="1"/>
    <text x="58" y="26" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="1">STONE 石头</text>
    <text x="160" y="182" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" text-anchor="middle">硬、粗糙、凹凸 / Hard, rough, bumpy</text>
  </g>

  <!-- Sand (bottom-left) -->
  <g transform="translate(60, 300)">
    <rect x="0" y="0" width="320" height="160" fill="url(#sandPattern)" stroke="#c8a468" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="160" fill="none" stroke="#ffb59c" stroke-width="1" opacity="0.3"/>
    <!-- sunken footprint -->
    <ellipse cx="80" cy="132" rx="32" ry="16" fill="#8a6838" opacity="0.7"/>
    <ellipse cx="80" cy="130" rx="26" ry="12" fill="#684820" opacity="0.6"/>
    <!-- label -->
    <rect x="8" y="8" width="90" height="26" fill="rgba(12,14,20,0.85)" stroke="#ffb59c" stroke-width="1"/>
    <text x="53" y="26" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="1">SAND 沙子</text>
    <text x="160" y="182" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" text-anchor="middle">松、深、脚会陷下 / Loose, deep, feet sink</text>
  </g>

  <!-- Grass (bottom-right) -->
  <g transform="translate(420, 300)">
    <rect x="0" y="0" width="320" height="160" fill="url(#grassPattern)" stroke="#2a5c28" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="160" fill="none" stroke="#ffb59c" stroke-width="1" opacity="0.3"/>
    <!-- pressed grass footprint area -->
    <ellipse cx="80" cy="130" rx="28" ry="14" fill="#1a3c18" opacity="0.5"/>
    <!-- label -->
    <rect x="8" y="8" width="100" height="26" fill="rgba(12,14,20,0.85)" stroke="#ffb59c" stroke-width="1"/>
    <text x="58" y="26" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="1">GRASS 草地</text>
    <text x="160" y="182" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" text-anchor="middle">弹、软、藏物体 / Springy, soft, hides stuff</text>
  </g>
</svg>
