<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
// ============================================================
// Animation: Light Journey -- How camera turns light into photo
// Concept: camera imaging pipeline (light -> lens -> sensor -> photo)
// 4 frames, each a stage of the same pipeline
// ============================================================

var CONFIG = {
  style: 'ares_mission',
  totalFrames: 4,

  i18n: {
    title:      {en:'LIGHT JOURNEY', cn:'\u5149\u7684\u65c5\u7a0b'},
    subtitle:   {en:'HOW CAMERAS CAPTURE IMAGES', cn:'\u76f8\u673a\u5982\u4f55\u6355\u6349\u56fe\u50cf'},
    // Frame 0
    f0_q:       {en:'What happens when you press the shutter?', cn:'\u6309\u4e0b\u5feb\u95e8\u7684\u77ac\u95f4\u53d1\u751f\u4e86\u4ec0\u4e48\uff1f'},
    f0_sub:     {en:'A chain of translations: Light to Photo', cn:'\u4e00\u6761\u7ffb\u8bd1\u94fe\uff1a\u5149 \u2192 \u7167\u7247'},
    f0_step1:   {en:'Light', cn:'\u5149\u7ebf'},
    f0_step2:   {en:'Lens', cn:'\u955c\u5934'},
    f0_step3:   {en:'Sensor', cn:'\u4f20\u611f\u5668'},
    f0_step4:   {en:'Photo', cn:'\u7167\u7247'},
    // Frame 1
    f1_title:   {en:'STEP 1: LIGHT REFLECTION', cn:'\u7b2c1\u6b65\uff1a\u5149\u7ebf\u53cd\u5c04'},
    f1_desc:    {en:'Light bounces off the Mars rock surface', cn:'\u5149\u7ebf\u4ece\u706b\u661f\u5ca9\u77f3\u8868\u9762\u53cd\u5c04\u51fa\u6765'},
    f1_sun:     {en:'Sunlight', cn:'\u592a\u9633\u5149'},
    f1_rock:    {en:'Mars Rock', cn:'\u706b\u661f\u5ca9\u77f3'},
    f1_reflect: {en:'Reflected rays carry color info', cn:'\u53cd\u5c04\u5149\u7ebf\u643a\u5e26\u989c\u8272\u4fe1\u606f'},
    // Frame 2
    f2_title:   {en:'STEP 2: LENS FOCUSES LIGHT', cn:'\u7b2c2\u6b65\uff1a\u955c\u5934\u805a\u7126'},
    f2_desc:    {en:'Convex lens bends light rays to converge', cn:'\u51f8\u900f\u955c\u628a\u5149\u7ebf\u5f2f\u66f2\u6c47\u805a'},
    f2_lens:    {en:'Convex Lens', cn:'\u51f8\u900f\u955c'},
    f2_focal:   {en:'Focal Point', cn:'\u7126\u70b9'},
    f2_note:    {en:'Like your eye\'s crystalline lens!', cn:'\u548c\u4f60\u773c\u775b\u7684\u6676\u4f53\u4e00\u6837\uff01'},
    // Frame 3
    f3_title:   {en:'STEP 3: SENSOR RECORDS', cn:'\u7b2c3\u6b65\uff1a\u4f20\u611f\u5668\u8bb0\u5f55'},
    f3_desc:    {en:'Each pixel captures brightness and color', cn:'\u6bcf\u4e2a\u50cf\u7d20\u8bb0\u5f55\u4eae\u5ea6\u548c\u989c\u8272'},
    f3_grid:    {en:'Sensor Grid', cn:'\u4f20\u611f\u5668\u7f51\u683c'},
    f3_pixel:   {en:'1 pixel = 1 color', cn:'1\u50cf\u7d20 = 1\u79cd\u989c\u8272'},
    f3_bayer:   {en:'Bayer Filter: R G G B', cn:'\u62dc\u8033\u6ee4\u955c\uff1aR G G B'},
    f3_result:  {en:'Digital Photo!', cn:'\u6570\u5b57\u7167\u7247\uff01'},
    // HUD labels
    hudL_phase:  {en:'PHASE', cn:'\u9636\u6bb5'},
    hudL_photons:{en:'PHOTONS', cn:'\u5149\u5b50\u6570'},
    hudL_focal:  {en:'FOCAL', cn:'\u7126\u8ddd'},
    hudL_pixels: {en:'PIXELS', cn:'\u50cf\u7d20'},
    // HUD values
    hud_overview: {en:'Overview', cn:'\u603b\u89c8'},
    hud_reflect:  {en:'Reflection', cn:'\u53cd\u5c04'},
    hud_focus:    {en:'Focusing', cn:'\u805a\u7126'},
    hud_record:   {en:'Recording', cn:'\u8bb0\u5f55'},
    // Guide
    guideTitle: {en:'VIEWING GUIDE', cn:'\u89c2\u770b\u6307\u5357'},
    g1: {en:'Frame 1: See how light bounces off objects', cn:'\u7b2c1\u5e27\uff1a\u89c2\u5bdf\u5149\u7ebf\u5982\u4f55\u4ece\u7269\u4f53\u53cd\u5c04'},
    g2: {en:'Frame 2: Watch the lens bend and focus light', cn:'\u7b2c2\u5e27\uff1a\u89c2\u5bdf\u955c\u5934\u5982\u4f55\u5f2f\u66f2\u548c\u805a\u7126\u5149\u7ebf'},
    g3: {en:'Frame 3: See the sensor grid recording colors', cn:'\u7b2c3\u5e27\uff1a\u89c2\u5bdf\u4f20\u611f\u5668\u7f51\u683c\u8bb0\u5f55\u989c\u8272'},
    g4: {en:'Notice how each step is like a translation', cn:'\u6ce8\u610f\u6bcf\u4e00\u6b65\u90fd\u50cf\u4e00\u6b21\u201c\u7ffb\u8bd1\u201d'},
  },

  hudLabels: ['hudL_phase', 'hudL_photons', 'hudL_focal', 'hudL_pixels'],
  hudValues: [
    ['hud_overview', '--', '--', '--'],
    ['hud_reflect', '~10^15/s', '--', '--'],
    ['hud_focus', '~10^15/s', '26-110mm', '--'],
    ['hud_record', '~10^15/s', '26-110mm', '1600x1200'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],
};

// ============================================================
// FRAME ELEMENTS
// ============================================================

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;
  var lerp = AnimRuntime.lerp;

  // ---- Frame 0: Title + Pipeline Overview ----
  if (f === 0) {
    var els = [
      {id:'mainQ', type:'label', text:t('f0_q'), x:cx, y:cy*0.35, color:P.primary, size:20, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f0_sub'), x:cx, y:cy*0.35+30, color:P.muted, size:13, align:'center'},
    ];
    // Pipeline boxes
    var boxW = W * 0.15, boxH = 44;
    var startX = cx - boxW * 2 - 30;
    var pipeY = cy * 0.75;
    var labels = ['f0_step1','f0_step2','f0_step3','f0_step4'];
    var colors = ['#ffdb3c','#85ecff','#ff7f50','#50ffb0'];
    for (var i = 0; i < 4; i++) {
      var bx = startX + i * (boxW + 20);
      els.push({id:'pipe_box'+i, type:'box', x:bx, y:pipeY - boxH/2, w:boxW, h:boxH,
        fill:'rgba(255,255,255,0.06)', stroke:colors[i]});
      els.push({id:'pipe_label'+i, type:'label', text:t(labels[i]), x:bx+boxW/2, y:pipeY,
        color:colors[i], size:14, align:'center', glow:colors[i]+'40'});
      if (i < 3) {
        els.push({id:'pipe_arrow'+i, type:'arrow', x1:bx+boxW+2, y1:pipeY, x2:bx+boxW+18, y2:pipeY,
          color:P.muted, lineWidth:1.5, headSize:5});
      }
    }
    // Camera icon (simple)
    els.push({id:'cam_body', type:'box', x:cx-30, y:cy*1.15, w:60, h:40, fill:'rgba(255,127,80,0.15)', stroke:P.primary});
    els.push({id:'cam_lens', type:'circle', x:cx, y:cy*1.15+20, r:12, stroke:P.tertiary, lineWidth:2});
    els.push({id:'cam_label', type:'text', text:'Mastcam-Z', x:cx, y:cy*1.15+50, color:P.muted, size:10, align:'center'});
    return els;
  }

  // ---- Frame 1: Light Reflection ----
  if (f === 1) {
    var els = [
      {id:'mainQ', type:'label', text:t('f1_title'), x:cx, y:36, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f1_desc'), x:cx, y:58, color:P.muted, size:12, align:'center'},
    ];
    // Sun in top-right
    var sunX = W * 0.82, sunY = H * 0.15;
    els.push({id:'sun', type:'circle', x:sunX, y:sunY, r:28, fill:'#ffdb3c', glow:'rgba(255,219,60,0.4)', glowSize:30});
    els.push({id:'sun_label', type:'text', text:t('f1_sun'), x:sunX, y:sunY+42, color:'#ffdb3c', size:11, align:'center'});
    // Mars rock at bottom-left
    var rockX = W * 0.25, rockY = H * 0.72;
    els.push({id:'rock', type:'custom', x:rockX, y:rockY, draw:function(ctx, el) {
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.moveTo(el.x-60, el.y+30); ctx.lineTo(el.x-40, el.y-20); ctx.lineTo(el.x-10, el.y-35);
      ctx.lineTo(el.x+20, el.y-25); ctx.lineTo(el.x+50, el.y-10); ctx.lineTo(el.x+60, el.y+30);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#A0522D';
      ctx.beginPath();
      ctx.moveTo(el.x-30, el.y+10); ctx.lineTo(el.x-15, el.y-10); ctx.lineTo(el.x+5, el.y-5);
      ctx.lineTo(el.x+15, el.y+10); ctx.closePath(); ctx.fill();
    }, alpha:1});
    els.push({id:'rock_label', type:'text', text:t('f1_rock'), x:rockX, y:rockY+48, color:'#A0522D', size:11, align:'center'});
    // Sunlight rays (incident)
    els.push({id:'ray_in1', type:'arrow', x1:sunX-20, y1:sunY+28, x2:rockX+10, y2:rockY-30, color:'#ffdb3c', lineWidth:1.5, headSize:5});
    els.push({id:'ray_in2', type:'arrow', x1:sunX-30, y1:sunY+25, x2:rockX-10, y2:rockY-25, color:'rgba(255,219,60,0.5)', lineWidth:1, headSize:4});
    // Reflected rays (toward camera/right side)
    var camX = W * 0.75, camY = H * 0.6;
    els.push({id:'ray_out1', type:'arrow', x1:rockX+10, y1:rockY-30, x2:camX-15, y2:camY-5, color:'#ff7f50', lineWidth:1.5, headSize:5});
    els.push({id:'ray_out2', type:'arrow', x1:rockX+20, y1:rockY-25, x2:camX-10, y2:camY+10, color:'rgba(255,127,80,0.5)', lineWidth:1, headSize:4});
    els.push({id:'ray_out3', type:'arrow', x1:rockX, y1:rockY-30, x2:camX-20, y2:camY-15, color:'rgba(255,127,80,0.3)', lineWidth:1, headSize:3});
    // Camera body (simple)
    els.push({id:'cam_body', type:'box', x:camX-25, y:camY-20, w:50, h:40, fill:'rgba(255,127,80,0.12)', stroke:P.primaryDim});
    els.push({id:'cam_lens', type:'circle', x:camX, y:camY, r:10, stroke:P.tertiary, lineWidth:2});
    // Explanation
    els.push({id:'reflect_note', type:'text', text:t('f1_reflect'), x:cx, y:H*0.92, color:P.secondary, size:12, align:'center'});
    return els;
  }

  // ---- Frame 2: Lens Focuses Light ----
  if (f === 2) {
    var els = [
      {id:'mainQ', type:'label', text:t('f2_title'), x:cx, y:36, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f2_desc'), x:cx, y:58, color:P.muted, size:12, align:'center'},
    ];
    // Convex lens in center
    var lensX = cx, lensTop = H * 0.22, lensBot = H * 0.78;
    els.push({id:'lens', type:'custom', x:lensX, y:cy, draw:function(ctx, el) {
      // Draw convex lens shape
      ctx.strokeStyle = P.tertiary; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(el.x, lensTop);
      ctx.quadraticCurveTo(el.x + 30, cy, el.x, lensBot);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(el.x, lensTop);
      ctx.quadraticCurveTo(el.x - 30, cy, el.x, lensBot);
      ctx.stroke();
      // Fill with glass effect
      ctx.fillStyle = 'rgba(133,236,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(el.x, lensTop);
      ctx.quadraticCurveTo(el.x + 30, cy, el.x, lensBot);
      ctx.quadraticCurveTo(el.x - 30, cy, el.x, lensTop);
      ctx.fill();
    }, alpha:1});
    els.push({id:'lens_label', type:'label', text:t('f2_lens'), x:lensX, y:lensTop-16, color:P.tertiary, size:12, align:'center'});
    // Incoming parallel rays (left side)
    var rayStartX = W * 0.08;
    var rayColors = ['#ff7f50','#ffdb3c','#ff7f50'];
    var rayYs = [cy - 60, cy, cy + 60];
    for (var i = 0; i < 3; i++) {
      els.push({id:'ray_in'+i, type:'arrow', x1:rayStartX, y1:rayYs[i], x2:lensX-15, y2:rayYs[i],
        color:rayColors[i], lineWidth:1.5, headSize:5});
    }
    // Converging rays (right side) -> focal point
    var focalX = W * 0.72, focalY = cy;
    for (var i = 0; i < 3; i++) {
      els.push({id:'ray_out'+i, type:'arrow', x1:lensX+15, y1:rayYs[i], x2:focalX, y2:focalY,
        color:rayColors[i], lineWidth:1.5, headSize:5});
    }
    // Focal point glow
    els.push({id:'focal', type:'circle', x:focalX, y:focalY, r:8, fill:P.primary, glow:P.glowStrong, glowSize:20});
    els.push({id:'focal_label', type:'label', text:t('f2_focal'), x:focalX, y:focalY+24, color:P.primary, size:11, align:'center'});
    // Sensor plane behind focal point
    var sensorX = W * 0.85;
    els.push({id:'sensor_plane', type:'line', x1:sensorX, y1:cy-70, x2:sensorX, y2:cy+70, color:P.secondary, lineWidth:2});
    els.push({id:'sensor_label', type:'text', text:'SENSOR', x:sensorX, y:cy+86, color:P.secondary, size:10, align:'center'});
    // Diverging rays from focal to sensor
    els.push({id:'ray_div0', type:'line', x1:focalX, y1:focalY, x2:sensorX, y2:cy-50, color:'rgba(255,127,80,0.3)', lineWidth:1, dash:[4,4]});
    els.push({id:'ray_div1', type:'line', x1:focalX, y1:focalY, x2:sensorX, y2:cy, color:'rgba(255,127,80,0.3)', lineWidth:1, dash:[4,4]});
    els.push({id:'ray_div2', type:'line', x1:focalX, y1:focalY, x2:sensorX, y2:cy+50, color:'rgba(255,127,80,0.3)', lineWidth:1, dash:[4,4]});
    // Eye comparison note
    els.push({id:'reflect_note', type:'text', text:t('f2_note'), x:cx, y:H*0.92, color:P.secondary, size:12, align:'center'});
    return els;
  }

  // ---- Frame 3: Sensor Records Pixels ----
  if (f === 3) {
    var els = [
      {id:'mainQ', type:'label', text:t('f3_title'), x:cx, y:36, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f3_desc'), x:cx, y:58, color:P.muted, size:12, align:'center'},
    ];
    // Sensor grid (8x6 pixel grid)
    var gridCols = 8, gridRows = 6;
    var cellSize = Math.min(W * 0.06, H * 0.08);
    var gridW = gridCols * cellSize, gridH = gridRows * cellSize;
    var gridX = cx - gridW / 2, gridY = cy * 0.55;
    // Bayer pattern colors
    var bayerColors = [
      ['R','G','R','G','R','G','R','G'],
      ['G','B','G','B','G','B','G','B'],
      ['R','G','R','G','R','G','R','G'],
      ['G','B','G','B','G','B','G','B'],
      ['R','G','R','G','R','G','R','G'],
      ['G','B','G','B','G','B','G','B'],
    ];
    var colorMap = {
      'R': 'rgba(255,80,80,0.5)',
      'G': 'rgba(80,255,80,0.4)',
      'B': 'rgba(80,120,255,0.5)'
    };
    // Draw grid cells
    for (var r = 0; r < gridRows; r++) {
      for (var c = 0; c < gridCols; c++) {
        var px = gridX + c * cellSize;
        var py = gridY + r * cellSize;
        var bayer = bayerColors[r][c];
        els.push({id:'cell_'+r+'_'+c, type:'box', x:px, y:py, w:cellSize-1, h:cellSize-1,
          fill:colorMap[bayer], stroke:'rgba(255,255,255,0.15)'});
      }
    }
    // Grid label
    els.push({id:'grid_label', type:'label', text:t('f3_grid'), x:cx, y:gridY-14, color:P.secondary, size:12, align:'center'});
    // Bayer filter explanation
    var bayerY = gridY + gridH + 20;
    els.push({id:'bayer_note', type:'text', text:t('f3_bayer'), x:cx, y:bayerY, color:P.muted, size:11, align:'center'});
    // Pixel = 1 color note
    els.push({id:'pixel_note', type:'text', text:t('f3_pixel'), x:cx, y:bayerY+20, color:P.tertiary, size:11, align:'center'});
    // Arrow from grid to "photo" result
    var photoY = H * 0.82;
    els.push({id:'grid_to_photo', type:'arrow', x1:cx, y1:bayerY+35, x2:cx, y2:photoY-18, color:P.primary, lineWidth:2, headSize:7});
    // Photo result
    els.push({id:'photo_box', type:'box', x:cx-50, y:photoY-10, w:100, h:30, fill:'rgba(80,255,176,0.12)', stroke:P.primary});
    els.push({id:'photo_label', type:'label', text:t('f3_result'), x:cx, y:photoY+5, color:P.primary, size:14, align:'center', glow:P.glowStrong});
    return els;
  }

  return [];
}

// ============================================================
// CUSTOM BACKGROUND: Mars-themed dark gradient
// ============================================================

function drawBg(ctx, W, H) {
  var P = AnimRuntime.PAL;
  // Dark gradient with warm Mars undertone
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0806');
  g.addColorStop(0.5, '#131010');
  g.addColorStop(1, '#1a0c06');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Subtle grid
  ctx.strokeStyle = 'rgba(255,127,80,0.04)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (var y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // Subtle stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  var seed = 42;
  for (var i = 0; i < 30; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    var sx = (seed % W);
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    var sy = (seed % (H * 0.4));
    ctx.beginPath(); ctx.arc(sx, sy, 0.8, 0, Math.PI * 2); ctx.fill();
  }
}

// ============================================================
// BOOT
// ============================================================

AnimRuntime.boot();
