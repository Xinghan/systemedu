// Concept: camera imaging pipeline (light -> lens -> sensor -> photo)
// 5 frames expanding ONE concept: the translation chain

// --- Animated photon particles (persistent state for requestAnimationFrame) ---
var photons = [];
var _animFrame = 0;
var _animRunning = false;

function initPhotons(W, H, count, region) {
  photons = [];
  for (var i = 0; i < count; i++) {
    photons.push({
      x: region.x + Math.random() * region.w,
      y: region.y + Math.random() * region.h,
      vx: (region.vx || 0) + (Math.random() - 0.5) * 0.3,
      vy: (region.vy || 0) + (Math.random() - 0.5) * 0.3,
      r: 1 + Math.random() * 1.5,
      alpha: 0.3 + Math.random() * 0.7,
      color: region.color || '#ffdb3c',
      life: 60 + Math.floor(Math.random() * 120),
      age: Math.floor(Math.random() * 60),
    });
  }
}

function updatePhotons(W, H) {
  for (var i = photons.length - 1; i >= 0; i--) {
    var p = photons[i];
    p.x += p.vx;
    p.y += p.vy;
    p.age++;
    if (p.age > p.life) p.alpha *= 0.95;
    if (p.alpha < 0.01 || p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) {
      photons.splice(i, 1);
    }
  }
}

function drawPhotons(ctx) {
  for (var i = 0; i < photons.length; i++) {
    var p = photons[i];
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// ============================================================
// Helper drawing functions
// ============================================================

function drawMarsRock(ctx, cx, cy, scale) {
  var s = scale || 1;
  // Multi-layered rock with texture
  // Base shadow
  ctx.fillStyle = 'rgba(40,20,5,0.6)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 35*s, 70*s, 12*s, 0, 0, Math.PI*2);
  ctx.fill();
  // Main rock body
  var g = ctx.createLinearGradient(cx-50*s, cy-30*s, cx+50*s, cy+30*s);
  g.addColorStop(0, '#8B4513'); g.addColorStop(0.4, '#A0522D'); g.addColorStop(1, '#6b3518');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(cx-65*s, cy+30*s); ctx.lineTo(cx-45*s, cy-15*s); ctx.lineTo(cx-20*s, cy-35*s);
  ctx.lineTo(cx+15*s, cy-30*s); ctx.lineTo(cx+40*s, cy-15*s);
  ctx.lineTo(cx+55*s, cy+5*s); ctx.lineTo(cx+65*s, cy+30*s);
  ctx.closePath(); ctx.fill();
  // Highlight layer
  ctx.fillStyle = '#c08050';
  ctx.beginPath();
  ctx.moveTo(cx-25*s, cy+5*s); ctx.lineTo(cx-10*s, cy-12*s);
  ctx.lineTo(cx+10*s, cy-8*s); ctx.lineTo(cx+15*s, cy+8*s);
  ctx.closePath(); ctx.fill();
  // Iron oxide streak
  ctx.fillStyle = 'rgba(180,60,30,0.5)';
  ctx.beginPath();
  ctx.moveTo(cx+20*s, cy-20*s); ctx.lineTo(cx+35*s, cy-10*s);
  ctx.lineTo(cx+30*s, cy); ctx.lineTo(cx+15*s, cy-5*s);
  ctx.closePath(); ctx.fill();
}

function drawCamera(ctx, cx, cy, scale) {
  var s = scale || 1;
  // Camera body
  var g = ctx.createLinearGradient(cx-30*s, cy-18*s, cx+30*s, cy+18*s);
  g.addColorStop(0, '#2a2520'); g.addColorStop(1, '#1a1510');
  ctx.fillStyle = g;
  ctx.fillRect(cx-30*s, cy-18*s, 60*s, 36*s);
  ctx.strokeStyle = '#ff7f50';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(cx-30*s, cy-18*s, 60*s, 36*s);
  // Lens barrel
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(cx-5*s, cy, 14*s, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#85ecff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx-5*s, cy, 14*s, 0, Math.PI*2); ctx.stroke();
  // Inner lens glass
  var lg = ctx.createRadialGradient(cx-5*s, cy, 0, cx-5*s, cy, 10*s);
  lg.addColorStop(0, 'rgba(133,236,255,0.2)'); lg.addColorStop(1, 'rgba(133,236,255,0.02)');
  ctx.fillStyle = lg;
  ctx.beginPath(); ctx.arc(cx-5*s, cy, 10*s, 0, Math.PI*2); ctx.fill();
  // Viewfinder bump
  ctx.fillStyle = '#2a2520';
  ctx.fillRect(cx+5*s, cy-24*s, 18*s, 8*s);
  ctx.strokeStyle = '#ff7f50';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(cx+5*s, cy-24*s, 18*s, 8*s);
}

function drawEye(ctx, cx, cy, scale) {
  var s = scale || 1;
  // Eye shape
  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath();
  ctx.moveTo(cx-30*s, cy);
  ctx.quadraticCurveTo(cx, cy-22*s, cx+30*s, cy);
  ctx.quadraticCurveTo(cx, cy+22*s, cx-30*s, cy);
  ctx.fill();
  // Iris
  var ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, 12*s);
  ig.addColorStop(0, '#4a2810'); ig.addColorStop(0.6, '#6b4020'); ig.addColorStop(1, '#2a1808');
  ctx.fillStyle = ig;
  ctx.beginPath(); ctx.arc(cx, cy, 12*s, 0, Math.PI*2); ctx.fill();
  // Pupil
  ctx.fillStyle = '#0a0804';
  ctx.beginPath(); ctx.arc(cx, cy, 5*s, 0, Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(cx+3*s, cy-3*s, 2*s, 0, Math.PI*2); ctx.fill();
}

function drawSun(ctx, cx, cy, r) {
  // Glow layers
  for (var i = 3; i > 0; i--) {
    ctx.fillStyle = 'rgba(255,219,60,' + (0.05 * i) + ')';
    ctx.beginPath(); ctx.arc(cx, cy, r + i * 15, 0, Math.PI*2); ctx.fill();
  }
  // Core
  var sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  sg.addColorStop(0, '#fff8e0'); sg.addColorStop(0.5, '#ffdb3c'); sg.addColorStop(1, '#e0a000');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
}

function drawConvexLens(ctx, cx, topY, botY) {
  var h = botY - topY;
  var bulge = h * 0.12;
  // Glass fill
  ctx.fillStyle = 'rgba(133,236,255,0.06)';
  ctx.beginPath();
  ctx.moveTo(cx, topY);
  ctx.quadraticCurveTo(cx + bulge, topY + h/2, cx, botY);
  ctx.quadraticCurveTo(cx - bulge, topY + h/2, cx, topY);
  ctx.fill();
  // Edges
  ctx.strokeStyle = '#85ecff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx, topY);
  ctx.quadraticCurveTo(cx + bulge, topY + h/2, cx, botY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, topY);
  ctx.quadraticCurveTo(cx - bulge, topY + h/2, cx, topY);
  // re-draw left edge
  ctx.moveTo(cx, topY);
  ctx.quadraticCurveTo(cx - bulge, topY + h/2, cx, botY);
  ctx.stroke();
  // Center axis
  ctx.strokeStyle = 'rgba(133,236,255,0.15)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(cx - h*0.4, topY + h/2); ctx.lineTo(cx + h*0.4, topY + h/2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawBayerGrid(ctx, x, y, cellSize, cols, rows) {
  var pattern = [['R','G'],['G','B']];
  var colors = {'R':'rgba(255,60,60,0.55)','G':'rgba(60,220,60,0.45)','B':'rgba(60,100,255,0.55)'};
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var ch = pattern[r%2][c%2];
      ctx.fillStyle = colors[ch];
      ctx.fillRect(x + c*cellSize, y + r*cellSize, cellSize-0.5, cellSize-0.5);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x + c*cellSize, y + r*cellSize, cellSize-0.5, cellSize-0.5);
      // Letter
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = "bold " + Math.max(8, cellSize*0.35) + "px 'Space Grotesk',sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(ch, x + c*cellSize + cellSize/2, y + r*cellSize + cellSize/2);
    }
  }
}

// ============================================================
// FRAME ELEMENTS
// ============================================================

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  // ---- Frame 0: Overview -- eye vs camera parallel ----
  if (f === 0) {
    return [
      {id:'mainQ', type:'label', text:t('f0_q'), x:cx, y:H*0.08, color:P.primary, size:20, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f0_sub'), x:cx, y:H*0.08+28, color:P.muted, size:12, align:'center'},
      // Pipeline chain across middle
      {id:'chain', type:'custom', x:0, y:0, draw:function(ctx) {
        var boxW = W * 0.14, boxH = 38;
        var gap = 16;
        var totalW = boxW * 4 + gap * 3;
        var startX = cx - totalW/2;
        var pipeY = H * 0.32;
        var labels = ['f0_step1','f0_step2','f0_step3','f0_step4'];
        var colors = ['#ffdb3c','#85ecff','#ff7f50','#50ffb0'];
        var icons = ['\u2600','\u25CE','\u25A6','\u25A3']; // sun, lens, grid, photo
        for (var i = 0; i < 4; i++) {
          var bx = startX + i * (boxW + gap);
          // Box with gradient
          var g = ctx.createLinearGradient(bx, pipeY, bx+boxW, pipeY+boxH);
          g.addColorStop(0, 'rgba(255,255,255,0.04)'); g.addColorStop(1, 'rgba(255,255,255,0.01)');
          ctx.fillStyle = g; ctx.fillRect(bx, pipeY, boxW, boxH);
          ctx.strokeStyle = colors[i]; ctx.lineWidth = 1.5; ctx.strokeRect(bx, pipeY, boxW, boxH);
          // Icon
          ctx.fillStyle = colors[i]; ctx.font = "16px sans-serif"; ctx.textAlign = 'center';
          ctx.fillText(icons[i], bx + 16, pipeY + boxH/2 + 5);
          // Label
          ctx.font = "bold 12px 'Space Grotesk',sans-serif";
          ctx.fillStyle = colors[i]; ctx.textAlign = 'left';
          ctx.fillText(t(labels[i]), bx + 30, pipeY + boxH/2 + 4);
          // Arrow
          if (i < 3) {
            ctx.strokeStyle = P.muted; ctx.lineWidth = 1.5;
            var ax = bx + boxW + 2, ay = pipeY + boxH/2;
            ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax+gap-4, ay); ctx.stroke();
            ctx.fillStyle = P.muted;
            ctx.beginPath(); ctx.moveTo(ax+gap-4, ay-4); ctx.lineTo(ax+gap, ay); ctx.lineTo(ax+gap-4, ay+4); ctx.fill();
          }
        }
      }, alpha:1},
      // Eye-camera comparison below
      {id:'comparison', type:'custom', x:0, y:0, draw:function(ctx) {
        var rowY = H * 0.58;
        // Left: eye
        var eyeX = W * 0.28;
        drawEye(ctx, eyeX, rowY, 1.2);
        ctx.fillStyle = P.tertiary;
        ctx.font = "bold 11px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText(t('f0_eye'), eyeX, rowY + 35);
        // Labels for eye parts
        ctx.font = "9px 'Inter','Noto Sans SC',sans-serif";
        ctx.fillStyle = P.muted;
        ctx.fillText(t('f0_eye_lens'), eyeX, rowY + 48);
        ctx.fillText(t('f0_eye_ret'), eyeX, rowY + 60);
        ctx.fillText(t('f0_eye_brain'), eyeX, rowY + 72);
        // = sign
        ctx.fillStyle = P.primary; ctx.font = "bold 24px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText('=', cx, rowY);
        // Right: camera
        var camX = W * 0.72;
        drawCamera(ctx, camX, rowY, 1.3);
        ctx.fillStyle = P.primary;
        ctx.font = "bold 11px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText('Mastcam-Z', camX, rowY + 35);
        // Connection lines
        ctx.strokeStyle = 'rgba(255,181,156,0.2)'; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(eyeX+35, rowY-5); ctx.lineTo(camX-35, rowY-5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(eyeX+35, rowY+5); ctx.lineTo(camX-35, rowY+5); ctx.stroke();
        ctx.setLineDash([]);
      }, alpha:1},
    ];
  }

  // ---- Frame 1: Light reflection from Mars rock ----
  if (f === 1) {
    return [
      {id:'mainQ', type:'label', text:t('f1_title'), x:cx, y:H*0.06, color:P.primary, size:17, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f1_desc'), x:cx, y:H*0.06+24, color:P.muted, size:11, align:'center'},
      {id:'scene', type:'custom', x:0, y:0, draw:function(ctx) {
        // Sun
        var sunX = W * 0.83, sunY = H * 0.12;
        drawSun(ctx, sunX, sunY, 22);
        ctx.fillStyle = '#ffdb3c'; ctx.font = "bold 10px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.fillText(t('f1_sun'), sunX, sunY + 35);
        // Mars rock
        var rockX = W * 0.3, rockY = H * 0.6;
        drawMarsRock(ctx, rockX, rockY, 1.3);
        ctx.fillStyle = '#A0522D'; ctx.font = "bold 10px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.fillText(t('f1_rock'), rockX, rockY + 55);
        // Incident rays (sun -> rock)
        ctx.strokeStyle = 'rgba(255,219,60,0.6)'; ctx.lineWidth = 1.5;
        var rays = [[sunX-15,sunY+22, rockX+10,rockY-32],[sunX-25,sunY+20, rockX-15,rockY-28],[sunX-10,sunY+24, rockX+25,rockY-20]];
        for (var i = 0; i < rays.length; i++) {
          var r = rays[i];
          ctx.beginPath(); ctx.moveTo(r[0],r[1]); ctx.lineTo(r[2],r[3]); ctx.stroke();
          // arrowhead
          var a = Math.atan2(r[3]-r[1],r[2]-r[0]);
          ctx.fillStyle = 'rgba(255,219,60,0.6)';
          ctx.beginPath(); ctx.moveTo(r[2],r[3]);
          ctx.lineTo(r[2]-6*Math.cos(a-0.4),r[3]-6*Math.sin(a-0.4));
          ctx.lineTo(r[2]-6*Math.cos(a+0.4),r[3]-6*Math.sin(a+0.4)); ctx.fill();
        }
        // Reflected rays (rock -> camera, scattered)
        var camX = W * 0.75, camY = H * 0.55;
        var refRays = [
          [rockX+15,rockY-30, camX-20,camY-8, '#ff7f50'],
          [rockX+20,rockY-25, camX-15,camY+5, '#c08050'],
          [rockX+5,rockY-32, camX-25,camY-15, '#ff9060'],
          // Scattered rays not hitting camera
          [rockX-15,rockY-30, W*0.1,H*0.3, 'rgba(255,127,80,0.15)'],
          [rockX+30,rockY-18, W*0.9,H*0.85, 'rgba(255,127,80,0.1)'],
          [rockX-5,rockY-35, W*0.15,H*0.08, 'rgba(255,127,80,0.1)'],
        ];
        for (var i = 0; i < refRays.length; i++) {
          var r = refRays[i];
          ctx.strokeStyle = r[4]; ctx.lineWidth = i < 3 ? 1.5 : 0.8;
          ctx.beginPath(); ctx.moveTo(r[0],r[1]); ctx.lineTo(r[2],r[3]); ctx.stroke();
          if (i < 3) {
            var a = Math.atan2(r[3]-r[1],r[2]-r[0]);
            ctx.fillStyle = r[4];
            ctx.beginPath(); ctx.moveTo(r[2],r[3]);
            ctx.lineTo(r[2]-5*Math.cos(a-0.4),r[3]-5*Math.sin(a-0.4));
            ctx.lineTo(r[2]-5*Math.cos(a+0.4),r[3]-5*Math.sin(a+0.4)); ctx.fill();
          }
        }
        // Camera
        drawCamera(ctx, camX, camY, 1);
        ctx.fillStyle = P.primary; ctx.font = "bold 10px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.fillText(t('f1_cam'), camX, camY + 28);
        // Mineral color key (bottom)
        var keyY = H * 0.85;
        var keys = [['f1_iron','#B03C1E'],['f1_basalt','#505050'],['f1_sulfate','#D4C870']];
        var keyStartX = cx - 180;
        for (var i = 0; i < keys.length; i++) {
          var kx = keyStartX + i * 140;
          ctx.fillStyle = keys[i][1];
          ctx.fillRect(kx, keyY, 12, 12);
          ctx.fillStyle = P.muted; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'left';
          ctx.fillText(t(keys[i][0]), kx + 16, keyY + 10);
        }
        ctx.fillStyle = P.secondary; ctx.font = "11px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f1_note'), cx, keyY - 14);
      }, alpha:1},
    ];
  }

  // ---- Frame 2: Lens focuses light ----
  if (f === 2) {
    return [
      {id:'mainQ', type:'label', text:t('f2_title'), x:cx, y:H*0.06, color:P.primary, size:17, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f2_desc'), x:cx, y:H*0.06+24, color:P.muted, size:11, align:'center'},
      {id:'lens_scene', type:'custom', x:0, y:0, draw:function(ctx) {
        var lensX = cx * 0.85;
        var topY = H * 0.18, botY = H * 0.75;
        var lensH = botY - topY;
        var lensCY = topY + lensH/2;
        // Draw lens
        drawConvexLens(ctx, lensX, topY, botY);
        ctx.fillStyle = P.tertiary; ctx.font = "bold 10px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.fillText(t('f2_lens'), lensX, topY - 10);
        // Incoming scattered rays (left)
        var rayStartX = W * 0.05;
        var rayYs = [lensCY - lensH*0.35, lensCY - lensH*0.12, lensCY + lensH*0.12, lensCY + lensH*0.35];
        var rayColors = ['#ff7f50','#ffdb3c','#c08050','#ff9060'];
        ctx.font = "9px 'Inter','Noto Sans SC',sans-serif";
        ctx.fillStyle = P.muted; ctx.textAlign = 'left';
        ctx.fillText(t('f2_parallel'), rayStartX, lensCY - lensH*0.42);
        for (var i = 0; i < rayYs.length; i++) {
          ctx.strokeStyle = rayColors[i]; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(rayStartX + 20, rayYs[i]); ctx.lineTo(lensX - 8, rayYs[i]); ctx.stroke();
          var a = 0;
          ctx.fillStyle = rayColors[i];
          ctx.beginPath(); ctx.moveTo(lensX-8, rayYs[i]);
          ctx.lineTo(lensX-14, rayYs[i]-3); ctx.lineTo(lensX-14, rayYs[i]+3); ctx.fill();
        }
        // Focal point
        var focalX = W * 0.72;
        // Converging rays
        ctx.fillStyle = P.muted; ctx.textAlign = 'left';
        ctx.fillText(t('f2_converge'), focalX + 12, lensCY - lensH*0.42);
        for (var i = 0; i < rayYs.length; i++) {
          ctx.strokeStyle = rayColors[i]; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(lensX + 8, rayYs[i]); ctx.lineTo(focalX, lensCY); ctx.stroke();
        }
        // Focal glow
        for (var g = 3; g > 0; g--) {
          ctx.fillStyle = 'rgba(80,255,176,' + (0.08*g) + ')';
          ctx.beginPath(); ctx.arc(focalX, lensCY, 5+g*6, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = P.primary;
        ctx.beginPath(); ctx.arc(focalX, lensCY, 5, 0, Math.PI*2); ctx.fill();
        ctx.font = "bold 10px 'Space Grotesk',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f2_focal'), focalX, lensCY + 20);
        // Sensor plane
        var sensorX = W * 0.88;
        ctx.strokeStyle = P.secondary; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sensorX, topY+10); ctx.lineTo(sensorX, botY-10); ctx.stroke();
        // Diverging rays to sensor
        ctx.setLineDash([3,3]);
        for (var i = 0; i < 3; i++) {
          var sy = topY + 20 + i * (lensH-40)/2;
          ctx.strokeStyle = 'rgba(255,127,80,0.25)'; ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.moveTo(focalX+5, lensCY); ctx.lineTo(sensorX, sy); ctx.stroke();
        }
        ctx.setLineDash([]);
        ctx.fillStyle = P.secondary; ctx.font = "9px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.fillText('SENSOR', sensorX, botY+4);
        // Focal length comparison (bottom panel)
        var panelY = H * 0.84;
        var panelW = W * 0.35;
        // Short focal
        ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(cx - panelW - 10, panelY, panelW, 28);
        ctx.strokeStyle = P.tertiary; ctx.lineWidth = 0.5; ctx.strokeRect(cx - panelW - 10, panelY, panelW, 28);
        ctx.fillStyle = P.tertiary; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f2_short') + '  [26mm]', cx - panelW/2 - 10, panelY + 17);
        // Long focal
        ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(cx + 10, panelY, panelW, 28);
        ctx.strokeStyle = P.primary; ctx.lineWidth = 0.5; ctx.strokeRect(cx + 10, panelY, panelW, 28);
        ctx.fillStyle = P.primary; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f2_long') + '  [110mm]', cx + panelW/2 + 10, panelY + 17);
        // Eye note
        ctx.fillStyle = P.secondary; ctx.font = "11px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f2_eye'), cx, panelY - 8);
      }, alpha:1},
    ];
  }

  // ---- Frame 3: Sensor grid + Bayer filter ----
  if (f === 3) {
    return [
      {id:'mainQ', type:'label', text:t('f3_title'), x:cx, y:H*0.06, color:P.primary, size:17, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f3_desc'), x:cx, y:H*0.06+24, color:P.muted, size:11, align:'center'},
      {id:'sensor', type:'custom', x:0, y:0, draw:function(ctx) {
        // Left: Bayer grid
        var gridCols = 8, gridRows = 6;
        var cellSize = Math.min(W * 0.05, H * 0.07);
        var gridW = gridCols * cellSize, gridH = gridRows * cellSize;
        var gridX = W * 0.08, gridY = H * 0.22;
        // Grid title
        ctx.fillStyle = P.secondary; ctx.font = "bold 10px 'Space Grotesk',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f3_bayer'), gridX + gridW/2, gridY - 10);
        drawBayerGrid(ctx, gridX, gridY, cellSize, gridCols, gridRows);
        // Per-pixel annotation
        ctx.fillStyle = P.muted; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f3_pixel'), gridX + gridW/2, gridY + gridH + 16);
        // Color legend (right side of grid)
        var legX = gridX + gridW + 15;
        var legItems = [['f3_red','rgba(255,60,60,0.7)'],['f3_green','rgba(60,220,60,0.6)'],['f3_blue','rgba(60,100,255,0.7)']];
        for (var i = 0; i < legItems.length; i++) {
          var ly = gridY + 8 + i * 22;
          ctx.fillStyle = legItems[i][1];
          ctx.fillRect(legX, ly, 10, 10);
          ctx.fillStyle = P.muted; ctx.font = "9px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'left';
          ctx.fillText(t(legItems[i][0]), legX + 14, ly + 9);
        }
        // Why green note
        ctx.fillStyle = P.secondary; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'left';
        ctx.fillText(t('f3_why'), legX, gridY + 8 + 3*22 + 8);
        // Right: Demosaicing arrow + result
        var arrowX = cx + W*0.08;
        ctx.strokeStyle = P.primary; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(arrowX, cy); ctx.lineTo(arrowX + 40, cy); ctx.stroke();
        ctx.fillStyle = P.primary; ctx.beginPath();
        ctx.moveTo(arrowX+40, cy-5); ctx.lineTo(arrowX+48, cy); ctx.lineTo(arrowX+40, cy+5); ctx.fill();
        ctx.fillStyle = P.primary; ctx.font = "bold 9px 'Space Grotesk',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f3_demo'), arrowX + 24, cy - 12);
        // Result: reconstructed color grid
        var resX = arrowX + 60, resY = gridY;
        var rCellSize = cellSize;
        // Simulated full-color pixels
        var marsColors = [
          ['#c47a5a','#c47a5a','#c47a5a','#b06840','#b06840','#c47a5a','#c47a5a','#c47a5a'],
          ['#c47a5a','#b06840','#b06840','#7a4020','#6b3518','#b06840','#c47a5a','#b06840'],
          ['#a0522d','#a0522d','#7a4020','#7a4020','#7a4020','#7a4020','#a0522d','#a0522d'],
          ['#a0522d','#8b4513','#a0522d','#c08050','#a0522d','#8b4513','#a0522d','#a0522d'],
          ['#8b4513','#5a3010','#5a3010','#8b4513','#a0522d','#5a3010','#8b4513','#a0522d'],
          ['#5a3010','#3a2008','#5a3010','#6b3518','#8b4513','#5a3010','#3a2008','#5a3010'],
        ];
        for (var r = 0; r < 6; r++) {
          for (var c = 0; c < 8; c++) {
            ctx.fillStyle = marsColors[r][c];
            ctx.fillRect(resX + c*rCellSize, resY + r*rCellSize, rCellSize-0.5, rCellSize-0.5);
          }
        }
        ctx.strokeStyle = P.primary; ctx.lineWidth = 1;
        ctx.strokeRect(resX, resY, 8*rCellSize, 6*rCellSize);
        ctx.fillStyle = P.primary; ctx.font = "bold 10px 'Space Grotesk',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f3_grid'), resX + 4*rCellSize, resY - 10);
        // Demosaicing explanation
        ctx.fillStyle = P.muted; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f3_demo_d'), cx + W*0.15, resY + 6*rCellSize + 16);
      }, alpha:1},
    ];
  }

  // ---- Frame 4: Complete chain + Mastcam-Z specs ----
  if (f === 4) {
    return [
      {id:'mainQ', type:'label', text:t('f4_title'), x:cx, y:H*0.06, color:P.primary, size:17, align:'center', glow:P.glowStrong},
      {id:'subQ', type:'text', text:t('f4_desc'), x:cx, y:H*0.06+24, color:P.muted, size:11, align:'center'},
      {id:'mastcam', type:'custom', x:0, y:0, draw:function(ctx) {
        // Mini pipeline recap at top
        var pipeY = H * 0.18;
        var steps = [
          ['\u2600',t('f0_step1'),'#ffdb3c'],
          ['\u25CE',t('f0_step2'),'#85ecff'],
          ['\u25A6',t('f0_step3'),'#ff7f50'],
          ['\u25A3',t('f0_step4'),'#50ffb0'],
        ];
        var stepW = 60, gap = W * 0.04;
        var totalW = stepW * 4 + gap * 3;
        var sx = cx - totalW/2;
        for (var i = 0; i < 4; i++) {
          var x = sx + i * (stepW + gap);
          ctx.strokeStyle = steps[i][2]; ctx.lineWidth = 1;
          ctx.strokeRect(x, pipeY, stepW, 22);
          ctx.fillStyle = steps[i][2]; ctx.font = "bold 10px 'Space Grotesk',sans-serif"; ctx.textAlign = 'center';
          ctx.fillText(steps[i][0] + ' ' + steps[i][1], x + stepW/2, pipeY + 14);
          if (i < 3) {
            ctx.strokeStyle = P.muted; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x+stepW+2, pipeY+11); ctx.lineTo(x+stepW+gap-2, pipeY+11); ctx.stroke();
            ctx.fillStyle = P.muted; ctx.beginPath();
            ctx.moveTo(x+stepW+gap-2,pipeY+8); ctx.lineTo(x+stepW+gap+2,pipeY+11); ctx.lineTo(x+stepW+gap-2,pipeY+14); ctx.fill();
          }
        }
        // Mastcam-Z dual camera illustration
        var mastY = H * 0.45;
        // Left camera
        drawCamera(ctx, cx - 50, mastY, 0.9);
        // Right camera
        drawCamera(ctx, cx + 50, mastY, 0.9);
        // Baseline indicator
        ctx.strokeStyle = P.primary; ctx.lineWidth = 1;
        ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(cx-50, mastY+25); ctx.lineTo(cx+50, mastY+25); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = P.primary; ctx.font = "bold 10px 'Space Grotesk',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText('24.2 cm', cx, mastY + 38);
        // Title
        ctx.fillStyle = P.primary; ctx.font = "bold 14px 'Space Grotesk',sans-serif";
        ctx.fillText(t('f4_mast'), cx, mastY - 30);
        ctx.fillStyle = P.muted; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
        ctx.fillText(t('f4_mast_d'), cx, mastY - 16);
        // Spec cards (right side)
        var specX = W * 0.08, specY = H * 0.65;
        var specs = [
          [t('f4_stereo'), P.tertiary],
          [t('f4_zoom'), P.secondary],
          [t('f4_filter'), '#c9bfff'],
        ];
        for (var i = 0; i < specs.length; i++) {
          var sy = specY + i * 28;
          ctx.fillStyle = 'rgba(255,255,255,0.03)';
          ctx.fillRect(specX, sy, W * 0.84, 24);
          ctx.strokeStyle = specs[i][1]; ctx.lineWidth = 0.5;
          ctx.strokeRect(specX, sy, W * 0.84, 24);
          // Dot indicator
          ctx.fillStyle = specs[i][1];
          ctx.beginPath(); ctx.arc(specX + 12, sy + 12, 3, 0, Math.PI*2); ctx.fill();
          // Text
          ctx.fillStyle = specs[i][1]; ctx.font = "11px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'left';
          ctx.fillText(specs[i][0], specX + 22, sy + 16);
        }
        // Distance note (bottom)
        var distY = specY + 3 * 28 + 12;
        ctx.fillStyle = P.primary; ctx.font = "bold 12px 'Inter','Noto Sans SC',sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(t('f4_dist'), cx, distY);
        ctx.fillStyle = P.muted; ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
        ctx.fillText(t('f4_time'), cx, distY + 16);
      }, alpha:1},
    ];
  }

  return [];
}

// ============================================================
// CUSTOM BACKGROUND: Mars-themed dark gradient with stars
// ============================================================

function drawBg(ctx, W, H) {
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0806');
  g.addColorStop(0.4, '#110d0a');
  g.addColorStop(1, '#1a0c06');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = 'rgba(255,127,80,0.03)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (var y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  var seed = 42;
  for (var i = 0; i < 40; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    var sx = (seed % W);
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    var sy = (seed % (H * 0.5));
    var sz = 0.5 + (seed % 10) / 10;
    ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
  }
}

// BOOT
// ============================================================

AnimRuntime.boot();
</script>
