<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Improvement Roadmap Priority</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:8px 16px;background:rgba(28,27,27,0.92);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;letter-spacing:1.5px;text-transform:uppercase}
.header .tag{font-size:10px;color:#8a8886;font-family:'Space Grotesk',sans-serif;letter-spacing:1px}
.game-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:12px 16px;gap:8px;overflow:hidden}
.instruction{font-size:12px;color:#8a8886;font-family:'Noto Sans SC',sans-serif;flex-shrink:0}
.list-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.item{display:flex;align-items:stretch;background:linear-gradient(135deg,rgba(53,53,52,0.9),rgba(28,27,27,0.95));border:1px solid rgba(138,136,134,0.15);cursor:grab;user-select:none;touch-action:none;position:relative}
.item.dragging{opacity:0.4}
.item.correct{border-color:#10b981;background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(16,185,129,0.04))}
.item.wrong{border-color:#ef4444;background:linear-gradient(135deg,rgba(239,68,68,0.12),rgba(239,68,68,0.04))}
.item .rank{width:36px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;background:rgba(255,181,156,0.08);flex-shrink:0}
.item .content{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:2px}
.item .content .item-title{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#e5e2e1;font-weight:500}
.item .content .item-meta{font-size:10px;color:#8a8886;font-family:'Space Grotesk',sans-serif;letter-spacing:0.5px}
.item .severity{width:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.severity-dot{width:10px;height:10px}
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.55);flex-shrink:0;height:48px}
.score-area{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#00daf3;font-weight:700}
.btn-group{display:flex;gap:8px}
.check-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 20px;cursor:pointer;border:none;background:linear-gradient(135deg,#ff7f50,#ffb59c);color:#131313;letter-spacing:1px}
.check-btn:hover{background:linear-gradient(135deg,#ffb59c,#ff7f50)}
.reset-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 16px;cursor:pointer;border:1px solid rgba(138,136,134,0.3);background:rgba(53,53,52,0.8);color:#e5e2e1;letter-spacing:1px}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:16px;line-height:1.7}
.guide-content.collapsed{display:none}
.hud{display:flex;align-items:center;justify-content:space-around;padding:4px 16px;background:rgba(28,27,27,0.92);flex-shrink:0;height:36px}
.hud-item{text-align:center}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1.5px;text-transform:uppercase}
.hud-value{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#00daf3;font-weight:700}
.success-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
.success-overlay.show{display:flex}
.success-box{background:rgba(28,27,27,0.95);border:1px solid rgba(16,185,129,0.3);padding:24px 32px;max-width:420px;text-align:center}
.success-box h2{font-family:'Space Grotesk',sans-serif;font-size:16px;color:#10b981;margin-bottom:12px;letter-spacing:1px}
.success-box p{font-size:13px;line-height:1.7;color:#e5e2e1}
.placeholder{height:48px;background:rgba(255,181,156,0.08);border:1px dashed rgba(255,181,156,0.3)}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideDesc" style="margin-bottom:8px"></p>
    <ul id="guidePoints"></ul>
  </div>
</div>
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <h2 id="successTitle"></h2>
    <p id="successMsg"></p>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <div>
      <h1 id="mainTitle"></h1>
      <div class="tag">P-MARS-01-M45 / CAPSTONE</div>
    </div>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1">--</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2">--</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3">--</div></div>
  </div>
  <div class="game-area">
    <div class="instruction" id="instruction"></div>
    <div class="list-area" id="listArea"></div>
  </div>
  <div class="bottom-bar">
    <div class="score-area" id="scoreArea"></div>
    <div class="btn-group">
      <button class="reset-btn" id="btnReset"></button>
      <button class="check-btn" id="btnCheck"></button>
    </div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'ROADMAP PRIORITY SORT',cn:'\u6539\u8fdb\u8def\u7ebf\u56fe\u4f18\u5148\u7ea7\u6392\u5e8f'},
  instruction:{en:'Drag items to sort by priority: highest impact + most urgent first.',cn:'\u62d6\u62fd\u6392\u5e8f\uff1a\u5f71\u54cd\u6700\u5927\u3001\u6700\u7d27\u8feb\u7684\u653e\u5728\u6700\u524d\u9762\u3002'},
  guideTitle:{en:'HOW TO PLAY',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{en:'Sort improvement items by priority. Consider both severity and impact when ordering.',cn:'\u6309\u4f18\u5148\u7ea7\u5bf9\u6539\u8fdb\u9879\u6392\u5e8f\u3002\u6392\u5e8f\u65f6\u540c\u65f6\u8003\u8651\u4e25\u91cd\u7a0b\u5ea6\u548c\u5f71\u54cd\u8303\u56f4\u3002'},
  guideP1:{en:'Drag items up or down to reorder',cn:'\u4e0a\u4e0b\u62d6\u62fd\u9879\u76ee\u91cd\u65b0\u6392\u5e8f'},
  guideP2:{en:'Safety-critical defects should come first',cn:'\u5b89\u5168\u5173\u952e\u7f3a\u9677\u5e94\u6392\u5728\u6700\u524d'},
  guideP3:{en:'Click CHECK to verify your ordering',cn:'\u70b9\u51fb\u68c0\u67e5\u9a8c\u8bc1\u6392\u5e8f\u662f\u5426\u6b63\u786e'},
  btnCheck:{en:'CHECK',cn:'\u68c0\u67e5'},
  btnReset:{en:'RESET',cn:'\u91cd\u7f6e'},
  score:{en:'SCORE',cn:'\u5f97\u5206'},
  successTitle:{en:'ROADMAP SORTED',cn:'\u8def\u7ebf\u56fe\u5df2\u6392\u5e8f'},
  successMsg:{en:'Correct! A good improvement roadmap prioritizes safety-critical defects first, then high-impact reliability issues, then enhancements. Each item must trace back to test findings.',cn:'\u6b63\u786e\uff01\u597d\u7684\u6539\u8fdb\u8def\u7ebf\u56fe\u5e94\u5148\u89e3\u51b3\u5b89\u5168\u5173\u952e\u7f3a\u9677\uff0c\u518d\u5904\u7406\u9ad8\u5f71\u54cd\u53ef\u9760\u6027\u95ee\u9898\uff0c\u6700\u540e\u662f\u589e\u5f3a\u529f\u80fd\u3002\u6bcf\u9879\u5fc5\u987b\u53ef\u8ffd\u6eaf\u5230\u6d4b\u8bd5\u53d1\u73b0\u3002'},
  hudL1:{en:'ITEMS',cn:'\u6761\u76ee'},
  hudL2:{en:'ATTEMPTS',cn:'\u5c1d\u8bd5'},
  hudL3:{en:'BEST',cn:'\u6700\u4f73'},
  sevCritical:{en:'CRITICAL',cn:'\u4e25\u91cd'},
  sevHigh:{en:'HIGH',cn:'\u9ad8'},
  sevMedium:{en:'MEDIUM',cn:'\u4e2d'},
  sevLow:{en:'LOW',cn:'\u4f4e'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

// Items in correct priority order (index = correct position)
var items=[
  {id:'i0',title:{en:'Fix path planner slope > 25deg failure',cn:'\u4fee\u590d\u8def\u5f84\u89c4\u5212\u5668\u5761\u5ea6>25\u00b0\u5931\u8d25'},meta:{en:'Safety / Reproducible / Path Module',cn:'\u5b89\u5168 / \u53ef\u590d\u73b0 / \u8def\u5f84\u6a21\u5757'},sev:'critical',color:'#ef4444'},
  {id:'i1',title:{en:'Fix vehicle control 200ms latency spikes',cn:'\u4fee\u590d\u8f66\u63a7 200ms \u5ef6\u8fdf\u5c16\u5cf0'},meta:{en:'Safety / 5% occurrence / Control Module',cn:'\u5b89\u5168 / 5%\u51fa\u73b0\u7387 / \u63a7\u5236\u6a21\u5757'},sev:'critical',color:'#ef4444'},
  {id:'i2',title:{en:'Retrain segmentation with dust-augmented data',cn:'\u7528\u6c99\u5c18\u589e\u5f3a\u6570\u636e\u91cd\u8bad\u7ec3\u5206\u5272\u6a21\u578b'},meta:{en:'Reliability / Accuracy < 60% in dust / Segmentation',cn:'\u53ef\u9760\u6027 / \u6c99\u5c18\u4e0b\u51c6\u786e\u7387<60% / \u5206\u5272\u6a21\u5757'},sev:'high',color:'#fbbf24'},
  {id:'i3',title:{en:'Reduce unknown terrain false negative rate',cn:'\u964d\u4f4e\u672a\u77e5\u5730\u5f62\u6f0f\u62a5\u7387'},meta:{en:'Reliability / 40% FN rate / Risk Mapping',cn:'\u53ef\u9760\u6027 / 40%\u6f0f\u62a5\u7387 / \u98ce\u9669\u5efa\u56fe'},sev:'high',color:'#fbbf24'},
  {id:'i4',title:{en:'Fix sensor fusion drift in 30-min sessions',cn:'\u4fee\u590d 30 \u5206\u949f\u4f1a\u8bdd\u4f20\u611f\u5668\u878d\u5408\u6f02\u79fb'},meta:{en:'Reliability / Accumulating error / Sensor Fusion',cn:'\u53ef\u9760\u6027 / \u7d2f\u79ef\u8bef\u5dee / \u4f20\u611f\u5668\u878d\u5408'},sev:'medium',color:'#00daf3'},
  {id:'i5',title:{en:'Add night vision preprocessing module',cn:'\u589e\u52a0\u591c\u89c6\u9884\u5904\u7406\u6a21\u5757'},meta:{en:'Enhancement / New capability / Image Input',cn:'\u589e\u5f3a / \u65b0\u80fd\u529b / \u56fe\u50cf\u8f93\u5165'},sev:'low',color:'#8a8886'},
  {id:'i6',title:{en:'Implement slope-aware path cost function',cn:'\u5b9e\u73b0\u5761\u5ea6\u611f\u77e5\u8def\u5f84\u4ee3\u4ef7\u51fd\u6570'},meta:{en:'Enhancement / Better path quality / Path Module',cn:'\u589e\u5f3a / \u8def\u5f84\u8d28\u91cf\u63d0\u5347 / \u8def\u5f84\u6a21\u5757'},sev:'low',color:'#8a8886'}
];

var currentOrder=[];
var attempts=0;
var bestScore=0;
var checked=false;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}

function buildUI(){
  currentOrder=shuffle(items.map(function(_,i){return i;}));
  checked=false;
  renderList();
  updateHUD();
}

function renderList(){
  var area=document.getElementById('listArea');
  area.innerHTML='';
  currentOrder.forEach(function(idx,pos){
    var item=items[idx];
    var el=document.createElement('div');
    el.className='item';
    el.setAttribute('data-idx',idx);
    el.setAttribute('draggable','true');
    var sevLabel=item.sev==='critical'?t('sevCritical'):item.sev==='high'?t('sevHigh'):item.sev==='medium'?t('sevMedium'):t('sevLow');
    el.innerHTML='<div class="rank">'+(pos+1)+'</div><div class="content"><div class="item-title">'+
      (typeof item.title==='object'?item.title[LANG]||item.title['en']:item.title)+
      '</div><div class="item-meta">'+
      (typeof item.meta==='object'?item.meta[LANG]||item.meta['en']:item.meta)+
      '</div></div><div class="severity"><div class="severity-dot" style="background:'+item.color+'"></div></div>';
    area.appendChild(el);
  });
  bindDragSort();
}

function bindDragSort(){
  var listArea=document.getElementById('listArea');
  var dragIdx=null;
  var placeholder=null;

  var itemEls=listArea.querySelectorAll('.item');
  itemEls.forEach(function(el,pos){
    el.addEventListener('dragstart',function(e){
      dragIdx=pos;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',pos.toString());
    });
    el.addEventListener('dragend',function(){
      el.classList.remove('dragging');
      if(placeholder&&placeholder.parentNode)placeholder.parentNode.removeChild(placeholder);
      placeholder=null;dragIdx=null;
    });
    el.addEventListener('dragover',function(e){
      e.preventDefault();
      if(dragIdx===null)return;
      var rect=el.getBoundingClientRect();
      var midY=rect.top+rect.height/2;
      if(!placeholder){
        placeholder=document.createElement('div');
        placeholder.className='placeholder';
      }
      if(e.clientY<midY){
        listArea.insertBefore(placeholder,el);
      }else{
        listArea.insertBefore(placeholder,el.nextSibling);
      }
    });
  });

  listArea.addEventListener('drop',function(e){
    e.preventDefault();
    if(dragIdx===null||!placeholder)return;
    var fromPos=parseInt(e.dataTransfer.getData('text/plain'));
    // Get new order from DOM
    var children=Array.from(listArea.children).filter(function(c){return c.classList.contains('item');});
    var draggedEl=children[fromPos];
    if(placeholder.parentNode)listArea.insertBefore(draggedEl,placeholder);
    if(placeholder.parentNode)placeholder.parentNode.removeChild(placeholder);
    placeholder=null;
    // Rebuild currentOrder from DOM
    var newItems=listArea.querySelectorAll('.item');
    currentOrder=Array.from(newItems).map(function(el){return parseInt(el.getAttribute('data-idx'));});
    renderList();
  });

  // Touch drag support
  var touchDragEl=null,touchIdx=null,ghostEl=null;
  itemEls.forEach(function(el,pos){
    el.addEventListener('touchstart',function(e){
      touchDragEl=el;touchIdx=pos;
      ghostEl=el.cloneNode(true);
      ghostEl.style.position='fixed';
      ghostEl.style.pointerEvents='none';
      ghostEl.style.opacity='0.7';
      ghostEl.style.zIndex='500';
      ghostEl.style.width=el.offsetWidth+'px';
      document.body.appendChild(ghostEl);
      var touch=e.touches[0];
      ghostEl.style.left=el.getBoundingClientRect().left+'px';
      ghostEl.style.top=(touch.clientY-24)+'px';
      el.classList.add('dragging');
    },{passive:true});
  });
  document.addEventListener('touchmove',function(e){
    if(!touchDragEl||!ghostEl)return;
    e.preventDefault();
    var touch=e.touches[0];
    ghostEl.style.top=(touch.clientY-24)+'px';
    // Find drop position
    var allItems=listArea.querySelectorAll('.item:not(.dragging)');
    allItems.forEach(function(it){
      var rect=it.getBoundingClientRect();
      if(touch.clientY>rect.top&&touch.clientY<rect.bottom){
        var midY=rect.top+rect.height/2;
        if(touch.clientY<midY){listArea.insertBefore(touchDragEl,it);}
        else if(it.nextSibling){listArea.insertBefore(touchDragEl,it.nextSibling);}
        else{listArea.appendChild(touchDragEl);}
      }
    });
  },{passive:false});
  document.addEventListener('touchend',function(){
    if(!touchDragEl)return;
    touchDragEl.classList.remove('dragging');
    if(ghostEl&&ghostEl.parentNode)ghostEl.parentNode.removeChild(ghostEl);
    ghostEl=null;
    // Rebuild order
    var newItems=listArea.querySelectorAll('.item');
    currentOrder=Array.from(newItems).map(function(el){return parseInt(el.getAttribute('data-idx'));});
    renderList();
    touchDragEl=null;touchIdx=null;
  });
}

function checkOrder(){
  if(checked)return;
  checked=true;
  attempts++;
  var correct=0;
  var itemEls=document.querySelectorAll('#listArea .item');
  itemEls.forEach(function(el,pos){
    var idx=parseInt(el.getAttribute('data-idx'));
    if(idx===pos){el.classList.add('correct');correct++;}
    else{el.classList.add('wrong');}
  });
  var score=Math.round((correct/items.length)*100);
  if(score>bestScore)bestScore=score;
  document.getElementById('scoreArea').textContent=t('score')+': '+score+'%';
  updateHUD();
  if(score>=85){
    document.getElementById('successOverlay').classList.add('show');
  }
}

function updateHUD(){
  document.getElementById('hudL1').textContent=t('hudL1');
  document.getElementById('hudV1').textContent=items.length.toString();
  document.getElementById('hudL2').textContent=t('hudL2');
  document.getElementById('hudV2').textContent=attempts.toString();
  document.getElementById('hudL3').textContent=t('hudL3');
  document.getElementById('hudV3').textContent=bestScore+'%';
}

function resetGame(){
  document.getElementById('successOverlay').classList.remove('show');
  checked=false;
  document.getElementById('scoreArea').textContent=t('score')+': --';
  buildUI();
}

function refreshI18N(){
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('instruction').textContent=t('instruction');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideDesc').textContent=t('guideDesc');
  var pts=document.getElementById('guidePoints');
  pts.innerHTML='<li>'+t('guideP1')+'</li><li>'+t('guideP2')+'</li><li>'+t('guideP3')+'</li>';
  document.getElementById('btnCheck').textContent=t('btnCheck');
  document.getElementById('btnReset').textContent=t('btnReset');
  document.getElementById('successTitle').textContent=t('successTitle');
  document.getElementById('successMsg').textContent=t('successMsg');
  updateHUD();
  if(!checked)renderList();
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  refreshI18N();
});
document.getElementById('guideToggle').addEventListener('click',function(){
  var c=document.getElementById('guideContent');
  var a=document.getElementById('guideArrow');
  if(c.classList.contains('collapsed')){c.classList.remove('collapsed');a.textContent='-';}
  else{c.classList.add('collapsed');a.textContent='+';}
});
document.getElementById('btnCheck').addEventListener('click',checkOrder);
document.getElementById('btnReset').addEventListener('click',resetGame);
document.getElementById('successOverlay').addEventListener('click',function(e){
  if(e.target===document.getElementById('successOverlay'))document.getElementById('successOverlay').classList.remove('show');
});

refreshI18N();
buildUI();
})();
</script>
</body>
</html>
