<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB Color Mixer</title>
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;color:#e5e2e1;font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 6px;flex-shrink:0;}
.header-left h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#ffb59c;text-shadow:0 0 12px rgba(255,127,80,0.3);letter-spacing:-0.02em;}
.header-left .sub{font-size:10px;color:#dec0b6;letter-spacing:0.1em;text-transform:uppercase;}
.header-right{display:flex;gap:8px;align-items:center;}
.hdr-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border:none;cursor:pointer;background:rgba(32,31,31,0.85);backdrop-filter:blur(12px);color:#dec0b6;letter-spacing:0.08em;text-transform:uppercase;}
.hdr-btn:hover{color:#ffb59c;}
.main{flex:1;min-height:0;display:flex;gap:16px;align-items:center;justify-content:center;padding:8px 16px;overflow:hidden;}
.color-panel{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;}
.color-block{border:2px solid #454747;display:flex;align-items:center;justify-content:center;}
.color-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#dec0b6;text-align:center;letter-spacing:0.08em;text-transform:uppercase;}
.color-value{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#ffb59c;font-weight:700;text-align:center;min-height:16px;}
.sliders{display:flex;flex-direction:column;gap:10px;flex:0 0 auto;min-width:160px;}
.slider-row{display:flex;align-items:center;gap:8px;}
.slider-label{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;width:16px;text-align:center;}
.slider-val{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;width:32px;text-align:right;color:#ffb59c;}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#454747;outline:none;flex:1;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;cursor:pointer;}
.slider-r input::-webkit-slider-thumb{background:#ff4444;}
.slider-g input::-webkit-slider-thumb{background:#44ff44;}
.slider-b input::-webkit-slider-thumb{background:#4444ff;}
.match-bar{width:100%;height:6px;background:#454747;margin-top:4px;overflow:hidden;}
.match-fill{height:100%;background:linear-gradient(90deg,#ff7f50,#ffb59c);transition:width 0.3s;}
.match-text{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#dec0b6;text-align:center;margin-top:2px;}
.match-text span{color:#ffb59c;font-weight:700;}
.feedback{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-align:center;min-height:20px;color:#ffb59c;margin-top:2px;}
.hud{height:44px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;flex-shrink:0;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#dec0b6;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#ffb59c;}
.next-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 20px;border:none;cursor:pointer;color:#131313;background:linear-gradient(135deg,#ffb59c,#ff7f50);letter-spacing:0.08em;text-transform:uppercase;display:none;}
.next-btn:hover{transform:scale(1.04);}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <h1 id="gameTitle"></h1>
      <div class="sub" id="gameSub"></div>
    </div>
    <div class="header-right">
      <button class="hdr-btn" id="resetBtn">RESET</button>
      <button class="hdr-btn" id="langBtn">CN</button>
    </div>
  </div>

  <div class="main">
    <div class="color-panel" id="targetPanel">
      <div class="color-label" id="targetLabel"></div>
      <div class="color-block" id="targetBlock"></div>
      <div class="color-value" id="targetValue"></div>
    </div>

    <div class="sliders">
      <div class="slider-row slider-r">
        <div class="slider-label" style="color:#ff4444">R</div>
        <input type="range" id="sliderR" min="0" max="255" value="128">
        <div class="slider-val" id="valR">128</div>
      </div>
      <div class="slider-row slider-g">
        <div class="slider-label" style="color:#44ff44">G</div>
        <input type="range" id="sliderG" min="0" max="255" value="128">
        <div class="slider-val" id="valG">128</div>
      </div>
      <div class="slider-row slider-b">
        <div class="slider-label" style="color:#4444ff">B</div>
        <input type="range" id="sliderB" min="0" max="255" value="128">
        <div class="slider-val" id="valB">128</div>
      </div>
      <div class="match-bar"><div class="match-fill" id="matchFill"></div></div>
      <div class="match-text" id="matchText"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn"></button>
    </div>

    <div class="color-panel" id="yourPanel">
      <div class="color-label" id="yourLabel"></div>
      <div class="color-block" id="yourBlock"></div>
      <div class="color-value" id="yourValue"></div>
    </div>
  </div>

  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var LANG = 'cn';
  var I18N = {
    title:      {en:'RGB COLOR MIXER', cn:'RGB \u8c03\u8272\u5927\u5e08'},
    subtitle:   {en:'MATCH THE TARGET COLOR', cn:'\u8c03\u51fa\u76ee\u6807\u989c\u8272'},
    target:     {en:'TARGET', cn:'\u76ee\u6807'},
    yours:      {en:'YOURS', cn:'\u4f60\u7684'},
    match:      {en:'Match:', cn:'\u5339\u914d\u5ea6:'},
    perfect:    {en:'PERFECT!', cn:'\u5b8c\u7f8e!'},
    close:      {en:'Very close!', cn:'\u975e\u5e38\u63a5\u8fd1!'},
    keepTrying: {en:'Keep adjusting...', cn:'\u7ee7\u7eed\u8c03\u6574...'},
    next:       {en:'NEXT COLOR', cn:'\u4e0b\u4e00\u4e2a\u989c\u8272'},
    reset:      {en:'RESET', cn:'\u91cd\u7f6e'},
    hudRound:   {en:'ROUND', cn:'\u5173\u5361'},
    hudMatch:   {en:'MATCH', cn:'\u5339\u914d'},
    hudBest:    {en:'BEST', cn:'\u6700\u4f73'},
    hudTotal:   {en:'CLEARED', cn:'\u5df2\u8fc7\u5173'},
    complete:   {en:'ALL 8 COLORS DONE!', cn:'\u5168\u90e88\u5173\u901a\u5173!'},
    hint:       {en:'Hidden: try to find it!', cn:'\u9690\u85cf: \u8bd5\u8bd5\u627e\u5230\u5b83!'},
  };
  function t(key) { return (I18N[key] && I18N[key][LANG]) || key; }

  // 8 target colors with names
  var TARGETS = [
    {r:255, g:0,   b:0,   name:{en:'Pure Red',   cn:'\u7eaf\u7ea2'}},
    {r:0,   g:255, b:0,   name:{en:'Pure Green',  cn:'\u7eaf\u7eff'}},
    {r:0,   g:0,   b:255, name:{en:'Pure Blue',   cn:'\u7eaf\u84dd'}},
    {r:255, g:255, b:0,   name:{en:'Yellow (R+G)', cn:'\u9ec4\u8272 (R+G)'}},
    {r:255, g:0,   b:255, name:{en:'Magenta (R+B)',cn:'\u54c1\u7ea2 (R+B)'}},
    {r:0,   g:255, b:255, name:{en:'Cyan (G+B)',   cn:'\u9752\u8272 (G+B)'}},
    {r:255, g:127, b:80,  name:{en:'Mars Orange',  cn:'\u706b\u661f\u6a59'}},
    {r:255, g:255, b:255, name:{en:'White (All)',   cn:'\u767d\u8272 (\u5168\u5f00)'}},
  ];

  var round = 0;
  var bestMatch = 0;
  var cleared = 0;
  var roundCleared = false;
  var BLOCK_SIZE = 100;

  var slR = document.getElementById('sliderR');
  var slG = document.getElementById('sliderG');
  var slB = document.getElementById('sliderB');

  function resizeBlocks() {
    var main = document.querySelector('.main');
    var rect = main.getBoundingClientRect();
    var sz = Math.min(rect.height * 0.55, rect.width * 0.25);
    sz = Math.max(sz, 60);
    BLOCK_SIZE = Math.floor(sz);
    document.getElementById('targetBlock').style.width = BLOCK_SIZE + 'px';
    document.getElementById('targetBlock').style.height = BLOCK_SIZE + 'px';
    document.getElementById('yourBlock').style.width = BLOCK_SIZE + 'px';
    document.getElementById('yourBlock').style.height = BLOCK_SIZE + 'px';
  }

  function setTarget() {
    var tgt = TARGETS[round];
    var showValues = (round < 3);
    document.getElementById('targetBlock').style.background = 'rgb(' + tgt.r + ',' + tgt.g + ',' + tgt.b + ')';
    document.getElementById('targetValue').textContent = showValues
      ? '(' + tgt.r + ', ' + tgt.g + ', ' + tgt.b + ')'
      : (tgt.name[LANG] || tgt.name.en);
    slR.value = 128; slG.value = 128; slB.value = 128;
    roundCleared = false;
    document.getElementById('nextBtn').style.display = 'none';
    bestMatch = 0;
    updateColor();
  }

  function calcMatch() {
    var tgt = TARGETS[round];
    var r = parseInt(slR.value), g = parseInt(slG.value), b = parseInt(slB.value);
    var dist = Math.sqrt(Math.pow(r - tgt.r, 2) + Math.pow(g - tgt.g, 2) + Math.pow(b - tgt.b, 2));
    var maxDist = Math.sqrt(3 * 255 * 255);
    return Math.max(0, Math.round((1 - dist / maxDist) * 100));
  }

  function updateColor() {
    var r = parseInt(slR.value), g = parseInt(slG.value), b = parseInt(slB.value);
    document.getElementById('valR').textContent = r;
    document.getElementById('valG').textContent = g;
    document.getElementById('valB').textContent = b;
    document.getElementById('yourBlock').style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
    document.getElementById('yourValue').textContent = '(' + r + ', ' + g + ', ' + b + ')';

    var match = calcMatch();
    if (match > bestMatch) bestMatch = match;
    document.getElementById('matchFill').style.width = match + '%';
    document.getElementById('matchText').innerHTML = t('match') + ' <span>' + match + '%</span>';

    if (match >= 95 && !roundCleared) {
      roundCleared = true;
      cleared++;
      document.getElementById('feedback').textContent = t('perfect');
      document.getElementById('nextBtn').style.display = round < TARGETS.length - 1 ? 'block' : 'none';
      if (round >= TARGETS.length - 1) {
        document.getElementById('feedback').textContent = t('complete');
      }
    } else if (match >= 80) {
      document.getElementById('feedback').textContent = t('close');
    } else {
      document.getElementById('feedback').textContent = t('keepTrying');
    }
    updateHud();
  }

  function updateHud() {
    document.getElementById('hudV1').textContent = (round + 1) + ' / ' + TARGETS.length;
    document.getElementById('hudV2').textContent = calcMatch() + '%';
    document.getElementById('hudV3').textContent = bestMatch + '%';
    document.getElementById('hudV4').textContent = cleared.toString();
  }

  function applyI18n() {
    document.getElementById('gameTitle').textContent = t('title');
    document.getElementById('gameSub').textContent = t('subtitle');
    document.getElementById('targetLabel').textContent = t('target');
    document.getElementById('yourLabel').textContent = t('yours');
    document.getElementById('resetBtn').textContent = t('reset');
    document.getElementById('nextBtn').textContent = t('next');
    document.getElementById('hudL1').textContent = t('hudRound');
    document.getElementById('hudL2').textContent = t('hudMatch');
    document.getElementById('hudL3').textContent = t('hudBest');
    document.getElementById('hudL4').textContent = t('hudTotal');
    setTarget();
  }

  slR.addEventListener('input', updateColor);
  slG.addEventListener('input', updateColor);
  slB.addEventListener('input', updateColor);

  document.getElementById('nextBtn').addEventListener('click', function() {
    if (round < TARGETS.length - 1) {
      round++;
      setTarget();
    }
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    round = 0; cleared = 0; bestMatch = 0;
    setTarget();
  });

  document.getElementById('langBtn').addEventListener('click', function() {
    LANG = LANG === 'cn' ? 'en' : 'cn';
    this.textContent = LANG === 'cn' ? 'CN' : 'EN';
    applyI18n();
  });

  applyI18n();
  requestAnimationFrame(function() { resizeBlocks(); });
  window.addEventListener('resize', function() { resizeBlocks(); });
})();
</script>
</body>
</html>
