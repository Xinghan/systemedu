<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.game-header{
  padding:10px 16px;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
  display:flex;align-items:center;justify-content:space-between;
}
.game-header h2{
  font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;
}
.game-header .info{
  font-family:'Space Grotesk',sans-serif;font-size:13px;color:#c6c6c6;
}
.game-body{
  flex:1;min-height:0;display:flex;flex-direction:column;
  padding:16px 20px;overflow-y:auto;
}
.instruction{
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:#8a8886;margin-bottom:12px;
}
.sortable-list{
  flex:1;display:flex;flex-direction:column;gap:6px;
}
.sort-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:rgba(28,27,27,0.6);
  border:1px solid rgba(138,136,134,0.15);
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  transition:border-color 0.2s,transform 0.15s;
}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:0.5;border-color:#ffb59c;}
.sort-item.drag-over{border-color:#00daf3;transform:translateY(2px);}
.sort-item .order-num{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;min-width:24px;text-align:center;
}
.sort-item .event-text{
  font-family:'Space Grotesk','Noto Sans SC',monospace;font-size:12px;
  color:#e5e2e1;flex:1;
}
.sort-item .drag-handle{
  font-family:'Space Grotesk',sans-serif;font-size:16px;
  color:#8a8886;cursor:grab;
}
.sort-item.correct-pos{border-color:#10b981;background:rgba(16,185,129,0.08);}
.sort-item.wrong-pos{border-color:#ff5f1f;background:rgba(255,95,31,0.08);}
.bottom-bar{
  padding:10px 16px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:12px;
}
.check-btn{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 20px;cursor:pointer;letter-spacing:1px;
  border:1px solid #ffb59c;background:transparent;color:#ffb59c;
}
.check-btn:hover{background:rgba(255,181,156,0.15);}
.check-btn:disabled{opacity:0.4;cursor:not-allowed;}
.bottom-msg{
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:#c6c6c6;flex:1;
}
.round-indicator{
  font-family:'Space Grotesk',sans-serif;font-size:12px;
  color:#8a8886;
}
.summary-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
  display:none;z-index:200;
  justify-content:center;align-items:center;
  flex-direction:column;
}
.summary-overlay.visible{display:flex;}
.summary-box{
  background:rgba(28,27,27,0.95);border:1px solid rgba(138,136,134,0.15);
  padding:32px 40px;max-width:420px;width:90%;text-align:center;
}
.summary-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
  color:#ffb59c;margin-bottom:12px;letter-spacing:1px;
}
.summary-box .final-score{
  font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;
  color:#10b981;margin:12px 0;
}
.summary-box p{
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  color:#c6c6c6;line-height:1.6;margin-top:8px;
}
.summary-box .restart-btn{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;margin-top:16px;cursor:pointer;letter-spacing:1px;
  border:1px solid #ffb59c;background:transparent;color:#ffb59c;
}
.summary-box .restart-btn:hover{background:rgba(255,181,156,0.15);}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideWhat"></p>
    <ul id="guidePoints"></ul>
    <p id="guideTakeaway" style="margin-top:6px;font-weight:700;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="game-header">
    <h2 id="gameTitle"></h2>
    <span class="info" id="roundInfo"></span>
  </div>
  <div class="game-body game-area">
    <p class="instruction" id="instruction"></p>
    <div class="sortable-list" id="sortableList"></div>
  </div>
  <div class="bottom-bar">
    <button class="check-btn" id="checkBtn"></button>
    <span class="bottom-msg" id="bottomMsg"></span>
    <span class="round-indicator" id="roundIndicator"></span>
  </div>
</div>
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-box">
    <h2 id="summaryTitle"></h2>
    <div class="final-score" id="finalScore"></div>
    <p id="summaryText"></p>
    <button class="restart-btn" id="restartBtn"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  gameTitle:{en:'LOG EVENT SORT',cn:'\u65e5\u5fd7\u4e8b\u4ef6\u6392\u5e8f'},
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideWhat:{en:'Drag log events into correct chronological order. Understanding event sequence is key to fault diagnosis.',cn:'\u628a\u65e5\u5fd7\u4e8b\u4ef6\u62d6\u62fd\u6210\u6b63\u786e\u7684\u65f6\u95f4\u987a\u5e8f\u3002\u7406\u89e3\u4e8b\u4ef6\u5e8f\u5217\u662f\u6545\u969c\u8bca\u65ad\u7684\u5173\u952e\u3002'},
  guideStep1:{en:'Read each log event carefully',cn:'\u4ed4\u7ec6\u9605\u8bfb\u6bcf\u6761\u65e5\u5fd7\u4e8b\u4ef6'},
  guideStep2:{en:'Drag to reorder by time sequence',cn:'\u62d6\u62fd\u91cd\u65b0\u6392\u5217\u6210\u65f6\u95f4\u987a\u5e8f'},
  guideStep3:{en:'Click CHECK to verify your order',cn:'\u70b9\u51fb\u68c0\u67e5\u9a8c\u8bc1\u987a\u5e8f'},
  guideTakeaway:{en:'Can reconstruct event timeline from shuffled logs.',cn:'\u80fd\u591f\u4ece\u6253\u4e71\u7684\u65e5\u5fd7\u4e2d\u91cd\u5efa\u4e8b\u4ef6\u65f6\u95f4\u7ebf\u3002'},
  instruction:{en:'Drag the log events into the correct time order (earliest first):',cn:'\u5c06\u65e5\u5fd7\u4e8b\u4ef6\u62d6\u62fd\u6210\u6b63\u786e\u7684\u65f6\u95f4\u987a\u5e8f\uff08\u6700\u65e9\u7684\u5728\u4e0a\u65b9\uff09\uff1a'},
  checkBtn:{en:'CHECK',cn:'\u68c0\u67e5'},
  nextBtn:{en:'NEXT ROUND',cn:'\u4e0b\u4e00\u8f6e'},
  perfect:{en:'Perfect! All in correct order.',cn:'\u5b8c\u7f8e\uff01\u5168\u90e8\u987a\u5e8f\u6b63\u786e\u3002'},
  tryAgain:{en:' events in wrong position. Try again!',cn:' \u4e2a\u4e8b\u4ef6\u4f4d\u7f6e\u9519\u8bef\u3002\u518d\u8bd5\u4e00\u6b21\uff01'},
  round:{en:'ROUND',cn:'\u7b2c'},
  roundSuffix:{en:'',cn:'\u8f6e'},
  summaryTitle:{en:'SORTING COMPLETE',cn:'\u6392\u5e8f\u5b8c\u6210'},
  summaryText:{en:'Understanding log event order is essential for tracing failures back to root causes in rover field tests.',cn:'\u7406\u89e3\u65e5\u5fd7\u4e8b\u4ef6\u987a\u5e8f\u5bf9\u4e8e\u5728 rover \u73b0\u573a\u8bd5\u8dd1\u4e2d\u8ffd\u6eaf\u5931\u8d25\u6839\u56e0\u81f3\u5173\u91cd\u8981\u3002'},
  restart:{en:'RESTART',cn:'\u91cd\u65b0\u5f00\u59cb'},
  score:{en:'SCORE',cn:'\u5f97\u5206'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var rounds=[
  {
    events:[
      {id:0,text:{en:'System boot, hardware check OK',cn:'\u7cfb\u7edf\u542f\u52a8\uff0c\u786c\u4ef6\u81ea\u68c0\u901a\u8fc7'}},
      {id:1,text:{en:'Camera initialized at 15fps',cn:'\u76f8\u673a\u521d\u59cb\u5316 15fps'}},
      {id:2,text:{en:'Perception model loaded v2.3',cn:'\u611f\u77e5\u6a21\u578b v2.3 \u52a0\u8f7d'}},
      {id:3,text:{en:'Navigate to waypoint A',cn:'\u5f00\u59cb\u5bfc\u822a\u5230\u822a\u70b9 A'}},
      {id:4,text:{en:'Confidence drop to 0.28',cn:'\u7f6e\u4fe1\u5ea6\u4e0b\u964d\u81f3 0.28'}},
      {id:5,text:{en:'Rock misclassified as safe',cn:'\u5ca9\u77f3\u88ab\u8bef\u5206\u7c7b\u4e3a\u5b89\u5168'}},
      {id:6,text:{en:'Collision detected, E-STOP',cn:'\u68c0\u6d4b\u5230\u78b0\u649e\uff0c\u7d27\u6025\u505c\u6b62'}}
    ]
  },
  {
    events:[
      {id:0,text:{en:'Motor command: forward 0.3m/s',cn:'\u7535\u673a\u6307\u4ee4\uff1a\u524d\u8fdb 0.3m/s'}},
      {id:1,text:{en:'Odometry mismatch: 0.12m vs 0.36m',cn:'\u91cc\u7a0b\u8ba1\u504f\u5dee\uff1a0.12m vs 0.36m'}},
      {id:2,text:{en:'Motor current spike: 4.8A',cn:'\u7535\u673a\u7535\u6d41\u5c16\u5cf0\uff1a4.8A'}},
      {id:3,text:{en:'Wheel encoder: 0 ticks/s',cn:'\u8f6e\u5b50\u7f16\u7801\u5668\uff1a0 ticks/s'}},
      {id:4,text:{en:'Thermal warning: 72C',cn:'\u6e29\u5ea6\u8b66\u544a\uff1a72C'}},
      {id:5,text:{en:'Navigation timeout: rover stuck',cn:'\u5bfc\u822a\u8d85\u65f6\uff1arover \u88ab\u5361\u4f4f'}}
    ]
  },
  {
    events:[
      {id:0,text:{en:'Cost map updated: 40x40',cn:'\u4ee3\u4ef7\u56fe\u66f4\u65b0\uff1a40x40'}},
      {id:1,text:{en:'Path planned: 12 waypoints',cn:'\u8def\u5f84\u89c4\u5212\uff1a12 \u4e2a\u822a\u70b9'}},
      {id:2,text:{en:'First replan: new obstacle',cn:'\u7b2c\u4e00\u6b21\u91cd\u89c4\u5212\uff1a\u65b0\u969c\u788d'}},
      {id:3,text:{en:'Path oscillation detected',cn:'\u68c0\u6d4b\u5230\u8def\u5f84\u632f\u8361'}},
      {id:4,text:{en:'replan_count=7, threshold=3',cn:'\u91cd\u89c4\u5212\u6b21\u6570=7\uff0c\u9608\u503c=3'}},
      {id:5,text:{en:'Path length anomaly: 0.1m',cn:'\u8def\u5f84\u957f\u5ea6\u5f02\u5e38\uff1a0.1m'}},
      {id:6,text:{en:'Goal marked UNREACHABLE',cn:'\u76ee\u6807\u6807\u8bb0\u4e3a\u4e0d\u53ef\u8fbe'}}
    ]
  }
];

var currentRound=0;
var totalScore=0;
var checked=false;
var dragSrcIdx=null;
var currentOrder=[];

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  if(a.every(function(e,i){return e.id===i;})){
    var t2=a[0];a[0]=a[a.length-1];a[a.length-1]=t2;
  }
  return a;
}

function renderRound(){
  checked=false;
  var r=rounds[currentRound];
  currentOrder=shuffle(r.events);
  renderList();
  document.getElementById('bottomMsg').textContent='';
  document.getElementById('bottomMsg').style.color='#c6c6c6';
  document.getElementById('checkBtn').textContent=t('checkBtn');
  document.getElementById('checkBtn').disabled=false;
  document.getElementById('roundInfo').textContent=t('round')+' '+(currentRound+1)+' '+t('roundSuffix')+' ('+t('score')+': '+totalScore+')';
  document.getElementById('roundIndicator').textContent=(currentRound+1)+'/'+rounds.length;
}

function renderList(){
  var list=document.getElementById('sortableList');
  list.innerHTML='';
  currentOrder.forEach(function(evt,idx){
    var item=document.createElement('div');
    item.className='sort-item';
    item.draggable=true;
    item.dataset.idx=idx;
    item.innerHTML='<span class="order-num">'+(idx+1)+'</span>'+
      '<span class="event-text">'+evt.text[LANG]+'</span>'+
      '<span class="drag-handle">:::</span>';
    item.addEventListener('dragstart',function(e){
      dragSrcIdx=idx;item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',function(){item.classList.remove('dragging');});
    item.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';item.classList.add('drag-over');});
    item.addEventListener('dragleave',function(){item.classList.remove('drag-over');});
    item.addEventListener('drop',function(e){
      e.preventDefault();item.classList.remove('drag-over');
      if(dragSrcIdx!==null&&dragSrcIdx!==idx){
        var moved=currentOrder.splice(dragSrcIdx,1)[0];
        currentOrder.splice(idx,0,moved);
        renderList();
      }
      dragSrcIdx=null;
    });
    item.addEventListener('touchstart',function(e){
      dragSrcIdx=idx;item.classList.add('dragging');
    },{passive:true});
    item.addEventListener('touchmove',function(e){
      e.preventDefault();
      var touch=e.touches[0];
      var el=document.elementFromPoint(touch.clientX,touch.clientY);
      if(el){
        var si=el.closest('.sort-item');
        if(si){
          var all=list.querySelectorAll('.sort-item');
          all.forEach(function(s){s.classList.remove('drag-over');});
          si.classList.add('drag-over');
        }
      }
    });
    item.addEventListener('touchend',function(e){
      item.classList.remove('dragging');
      var all=list.querySelectorAll('.sort-item');
      var targetIdx=-1;
      all.forEach(function(s,i){
        if(s.classList.contains('drag-over')){targetIdx=i;s.classList.remove('drag-over');}
      });
      if(dragSrcIdx!==null&&targetIdx>=0&&targetIdx!==dragSrcIdx){
        var moved=currentOrder.splice(dragSrcIdx,1)[0];
        currentOrder.splice(targetIdx,0,moved);
        renderList();
      }
      dragSrcIdx=null;
    });
    list.appendChild(item);
  });
}

function checkOrder(){
  if(checked){
    if(currentRound<rounds.length-1){
      currentRound++;renderRound();
    }else{
      showSummary();
    }
    return;
  }
  checked=true;
  var wrongCount=0;
  var items=document.getElementById('sortableList').querySelectorAll('.sort-item');
  currentOrder.forEach(function(evt,idx){
    if(evt.id===idx){
      items[idx].classList.add('correct-pos');
    }else{
      items[idx].classList.add('wrong-pos');
      wrongCount++;
    }
  });
  if(wrongCount===0){
    totalScore++;
    document.getElementById('bottomMsg').textContent=t('perfect');
    document.getElementById('bottomMsg').style.color='#10b981';
  }else{
    document.getElementById('bottomMsg').textContent=wrongCount+t('tryAgain');
    document.getElementById('bottomMsg').style.color='#ff5f1f';
  }
  document.getElementById('roundInfo').textContent=t('round')+' '+(currentRound+1)+' '+t('roundSuffix')+' ('+t('score')+': '+totalScore+')';
  if(currentRound<rounds.length-1){
    document.getElementById('checkBtn').textContent=t('nextBtn');
  }else{
    document.getElementById('checkBtn').textContent=t('checkBtn');
    document.getElementById('checkBtn').disabled=true;
    setTimeout(showSummary,1200);
  }
}

function showSummary(){
  document.getElementById('summaryOverlay').classList.add('visible');
  document.getElementById('summaryTitle').textContent=t('summaryTitle');
  document.getElementById('finalScore').textContent=totalScore+'/'+rounds.length;
  document.getElementById('summaryText').textContent=t('summaryText');
  document.getElementById('restartBtn').textContent=t('restart');
}

function refreshI18N(){
  document.getElementById('gameTitle').textContent=t('gameTitle');
  document.getElementById('instruction').textContent=t('instruction');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideWhat').textContent=t('guideWhat');
  var pts=document.getElementById('guidePoints');
  pts.innerHTML='<li>'+t('guideStep1')+'</li><li>'+t('guideStep2')+'</li><li>'+t('guideStep3')+'</li>';
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  document.getElementById('checkBtn').textContent=checked?t('nextBtn'):t('checkBtn');
  renderList();
  document.getElementById('roundInfo').textContent=t('round')+' '+(currentRound+1)+' '+t('roundSuffix')+' ('+t('score')+': '+totalScore+')';
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('guideHeader').addEventListener('click',function(){
  var c=document.getElementById('guideContent');var tog=document.getElementById('guideToggle');
  if(c.classList.contains('collapsed')){c.classList.remove('collapsed');tog.textContent='[-]';}
  else{c.classList.add('collapsed');tog.textContent='[+]';}
});
document.getElementById('checkBtn').addEventListener('click',checkOrder);
document.getElementById('restartBtn').addEventListener('click',function(){
  currentRound=0;totalScore=0;checked=false;
  document.getElementById('summaryOverlay').classList.remove('visible');
  renderRound();
});

renderRound();
refreshI18N();
})();
</script>
</body>
</html>
