<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ROUTE NARRATION CHALLENGE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;margin:0;padding:0;
  background:#131313;color:#e5e2e1;
  font-family:'Noto Sans SC','PingFang SC',system-ui,sans-serif}

.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* lang toggle */
.lang-btn{position:fixed;top:6px;left:6px;z-index:300;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px}

/* guide panel */
.guide-panel{position:fixed;top:6px;right:6px;width:230px;max-height:36vh;
  overflow-y:auto;z-index:200;padding:10px 12px;
  background:rgba(28,27,27,0.88);backdrop-filter:blur(14px);
  border:1px solid rgba(138,136,134,0.15);font-size:11px;line-height:1.55;
  color:rgba(229,226,225,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  color:#ffb59c;text-transform:uppercase;letter-spacing:0.05em}
.guide-panel .arrow{transition:transform .2s;font-size:10px}
.guide-panel .arrow.collapsed{transform:rotate(-90deg)}
.guide-panel ul{padding-left:14px;margin:4px 0}
.guide-panel .gl{color:#8a8886;font-size:10px;text-transform:uppercase;
  letter-spacing:0.08em;margin-top:6px;font-family:'Space Grotesk',sans-serif}
.guide-body{transition:max-height .3s;overflow:hidden}
.guide-body.collapsed{max-height:0 !important}

/* header */
.header{height:40px;min-height:40px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.1);flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;text-transform:uppercase;letter-spacing:0.06em;
  padding-left:40px}
.header .qnum{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886}
.header .qnum span{color:#00daf3}

/* main area */
.main-area{flex:1;min-height:0;display:flex;overflow:hidden}

/* map panel */
.map-panel{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;
  padding:10px;position:relative;overflow:hidden}
.map-panel svg{width:100%;height:100%;max-width:700px;max-height:100%}

/* label panel */
.label-panel{width:220px;min-width:220px;padding:10px;overflow-y:auto;
  background:rgba(19,19,19,0.95);border-left:1px solid rgba(138,136,134,0.08);
  display:flex;flex-direction:column;gap:6px}
.label-panel-title{font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:#8a8886;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;padding:0 4px}

/* draggable label */
.drag-label{padding:10px 12px;cursor:grab;user-select:none;-webkit-user-select:none;
  background:linear-gradient(135deg,rgba(53,53,52,0.7),rgba(28,27,27,0.9));
  border:1px solid rgba(138,136,134,0.15);position:relative;
  transition:box-shadow .15s,opacity .15s}
.drag-label:hover{box-shadow:0 0 18px rgba(255,127,80,0.15)}
.drag-label:active{cursor:grabbing}
.drag-label.dragging{opacity:0.3}
.drag-label.placed{opacity:0.25;pointer-events:none;cursor:default}
.drag-label .dl-name{font-family:'Space Grotesk',sans-serif;font-size:11px;
  font-weight:700;color:#ffb59c;text-transform:uppercase;letter-spacing:0.04em}
.drag-label .dl-desc{font-size:10px;color:#8a8886;margin-top:2px;line-height:1.4}

/* ghost (drag clone) */
.ghost{position:fixed;pointer-events:none;z-index:400;opacity:0.88;
  transform:rotate(-2deg);
  padding:10px 12px;
  background:linear-gradient(135deg,rgba(53,53,52,0.9),rgba(28,27,27,0.95));
  border:1px solid rgba(255,181,156,0.3);
  box-shadow:0 0 24px rgba(255,127,80,0.25);max-width:200px}
.ghost .dl-name{font-family:'Space Grotesk',sans-serif;font-size:11px;
  font-weight:700;color:#ffb59c;text-transform:uppercase;letter-spacing:0.04em}
.ghost .dl-desc{font-size:10px;color:#8a8886;margin-top:2px;line-height:1.4}

/* toast */
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);
  padding:8px 20px;font-size:12px;z-index:300;
  backdrop-filter:blur(12px);opacity:0;transition:opacity .3s;pointer-events:none;
  font-family:'Space Grotesk',sans-serif;letter-spacing:0.03em;max-width:460px;text-align:center}
.toast.show{opacity:1}
.toast.correct{background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);color:#10b981}
.toast.wrong{background:rgba(255,95,31,0.2);border:1px solid rgba(255,95,31,0.4);color:#ff5f1f}

/* HUD */
.hud{height:48px;min-height:48px;flex-shrink:0;display:flex;align-items:center;
  background:rgba(0,0,0,0.55);border-top:1px solid rgba(255,255,255,0.06);padding:0 16px}
.hud-col{flex:1;text-align:center}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:rgba(255,181,156,0.5);text-transform:uppercase;letter-spacing:0.1em}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:rgba(229,226,225,0.88)}

/* win panel */
.win-panel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;
  display:none;align-items:center;justify-content:center;
  background:rgba(19,19,19,0.85);backdrop-filter:blur(16px)}
.win-panel.show{display:flex}
.win-content{width:460px;max-height:80vh;overflow-y:auto;padding:24px;
  background:linear-gradient(135deg,rgba(53,53,52,0.9),rgba(28,27,27,0.95));
  border:1px solid rgba(255,127,80,0.2)}
.win-content h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#ffb59c;
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
.win-content p{font-size:13px;line-height:1.7;margin-bottom:10px;color:#c6c6c6}
.win-content .highlight{color:#00daf3;font-weight:700}
.win-close{margin-top:14px;padding:8px 20px;
  background:linear-gradient(45deg,#ffb59c,#ff7f50);color:#131313;border:none;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.06em}
.win-close:hover{box-shadow:0 0 20px rgba(255,127,80,0.4)}

/* segment label placed on map */
.seg-placed-label{font-family:'Space Grotesk',sans-serif;font-size:9px;
  font-weight:700;fill:#131313;pointer-events:none}

/* SVG drop zone pulse */
@keyframes dropPulse{
  0%,100%{stroke-opacity:0.3}
  50%{stroke-opacity:0.9}
}
.drop-zone-rect{cursor:pointer;transition:fill .2s}
.drop-zone-rect.hover{fill:rgba(255,181,156,0.15)}
.drop-zone-rect.correct-flash{fill:rgba(16,185,129,0.25)}
.drop-zone-rect.wrong-flash{fill:rgba(255,95,31,0.25)}
</style>
</head>

/* ===== SVG MAP ===== */
function buildMapSVG(){
  /* viewBox: 0 0 600 400 */
  var svg = '';
  svg += '<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" id="terrainSVG">';

  /* defs: gradients, filters, noise */
  svg += '<defs>';
  /* noise filter for mars surface */
  svg += '<filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>';
  svg += '<feColorMatrix type="saturate" values="0"/>';
  svg += '<feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>';
  svg += '<feBlend in="SourceGraphic" mode="overlay"/></filter>';

  /* boulder gradient */
  svg += '<radialGradient id="boulderGrad" cx="0.4" cy="0.3" r="0.6">';
  svg += '<stop offset="0" stop-color="#9B7924"/><stop offset="0.6" stop-color="#8B6914"/><stop offset="1" stop-color="#5A4410"/>';
  svg += '</radialGradient>';

  /* sand gradient */
  svg += '<linearGradient id="sandGrad" x1="0" y1="0" x2="0.3" y2="1">';
  svg += '<stop offset="0" stop-color="#D4B56A"/><stop offset="0.5" stop-color="#C4A35A"/><stop offset="1" stop-color="#A88840"/>';
  svg += '</linearGradient>';

  /* bare rock gradient */
  svg += '<linearGradient id="rockGrad" x1="0" y1="0" x2="1" y2="1">';
  svg += '<stop offset="0" stop-color="#5A5A5A"/><stop offset="0.5" stop-color="#4A4A4A"/><stop offset="1" stop-color="#3A3A3A"/>';
  svg += '</linearGradient>';

  /* crater gradient */
  svg += '<radialGradient id="craterGrad" cx="0.5" cy="0.5" r="0.5">';
  svg += '<stop offset="0" stop-color="#0A0A0A"/><stop offset="0.6" stop-color="#1A1815"/><stop offset="0.85" stop-color="#3A3025"/><stop offset="1" stop-color="#5A4A35"/>';
  svg += '</radialGradient>';

  /* crater rim highlight */
  svg += '<radialGradient id="craterRimGrad" cx="0.5" cy="0.5" r="0.5">';
  svg += '<stop offset="0.7" stop-color="transparent"/><stop offset="0.88" stop-color="rgba(180,150,100,0.3)"/><stop offset="1" stop-color="rgba(120,100,70,0.15)"/>';
  svg += '</radialGradient>';

  /* glow filter for correct segments */
  svg += '<filter id="glowGreen"><feGaussianBlur stdDeviation="4" result="blur"/>';
  svg += '<feFlood flood-color="#10b981" flood-opacity="0.5" result="color"/>';
  svg += '<feComposite in="color" in2="blur" operator="in" result="glow"/>';
  svg += '<feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';

  /* glow filter for hover */
  svg += '<filter id="glowOrange"><feGaussianBlur stdDeviation="3" result="blur"/>';
  svg += '<feFlood flood-color="#ffb59c" flood-opacity="0.4" result="color"/>';
  svg += '<feComposite in="color" in2="blur" operator="in" result="glow"/>';
  svg += '<feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';

  /* segment route gradient */

  svg += '<text class="seg-placed-label" x="335" y="88" text-anchor="middle" id="placedText-s2"></text></g>';

  svg += '<g id="placed-s3" opacity="0"><rect x="410" y="170" width="80" height="22" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.6)" stroke-width="1"/>';
  svg += '<text class="seg-placed-label" x="450" y="185" text-anchor="middle" id="placedText-s3"></text></g>';

}

/* ===== BUILD LABELS ===== */
function buildLabels(){
  var html = '<div class="label-panel-title" id="labelPanelTitle">' + t('labelPanelTitle') + '</div>';
  /* Shuffle labels for variety */
  var shuffled = LABELS.slice();
  for(var i = shuffled.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
  }
  for(var k=0; k<shuffled.length; k++){
    var lb = shuffled[k];
    html += '<div class="drag-label" data-label-id="' + lb.id + '" id="dl-' + lb.id + '">';
    html += '<div class="dl-name">' + t(lb.nameKey) + '</div>';
    html += '<div class="dl-desc">' + t(lb.descKey) + '</div>';
    html += '</div>';
  }
  labelPanel.innerHTML = html;
}

/* ===== RENDER ALL ===== */
function renderAll(){
  /* header */
  document.getElementById('headerTitle').textContent = t('headerTitle');
  document.getElementById('qProgress').innerHTML = (LANG === 'cn' ? '\u5df2\u5339\u914d: ' : 'MATCHED: ') + '<span>' + score + '</span>/4';

  /* guide */
  document.getElementById('guideTitle').textContent = t('guideTitle');
  document.getElementById('guideGoalLabel').textContent = t('goalLabel');
  document.getElementById('guideGoalText').textContent = t('guideGoal');
  document.getElementById('guideCtrlLabel').textContent = t('ctrlLabel');
  document.getElementById('guideCtrl1').textContent = t('guideCtrl1');
  document.getElementById('guideCtrl2').textContent = t('guideCtrl2');
  document.getElementById('guideCtrl3').textContent = t('guideCtrl3');
  document.getElementById('guideStepLabel').textContent = t('stepsLabel');
  document.getElementById('guideStep1').textContent = t('guideStep1');
  document.getElementById('guideStep2').textContent = t('guideStep2');
  document.getElementById('guideStep3').textContent = t('guideStep3');
  document.getElementById('guideWinLabel').textContent = t('winLabel');
  document.getElementById('guideWinText').textContent = t('guideWin');
  document.getElementById('guideTipsLabel').textContent = t('tipsLabel');
  document.getElementById('guideTipsText').textContent = t('guideTips');

  /* HUD */
  document.getElementById('hudScoreLabel').textContent = t('hudScore');
  document.getElementById('hudAccLabel').textContent = t('hudAccuracy');
  document.getElementById('hudTimeLabel').textContent = t('hudTime');
  document.getElementById('hudStatusLabel').textContent = t('hudStatus');
  document.getElementById('hudStatus').textContent = gameComplete ? t('statusComplete') : t('statusPlaying');

  /* win panel */
  document.getElementById('winTitle').textContent = t('winTitle');
  document.getElementById('winSummary').textContent = t('winSummary');
  document.getElementById('winTakeaway').textContent = t('winTakeaway');
  document.getElementById('winClose').textContent = t('winClose');

  /* lang btn */
  document.getElementById('langBtn').textContent = LANG === 'cn' ? 'CN' : 'EN';

  /* map */
  mapPanel.innerHTML = buildMapSVG();

  /* labels */
  buildLabels();

  /* re-apply placed state */
  for(var seg in solved){
    var labelId = solved[seg];
    var dlEl = document.getElementById('dl-' + labelId);
    if(dlEl) dlEl.classList.add('placed');
    /* show placed label on map */
    var placedG = document.getElementById('placed-' + seg);
    if(placedG){
      placedG.setAttribute('opacity', '1');
      var ptxt = document.getElementById('placedText-' + seg);
      if(ptxt) ptxt.textContent = t(labelId);
    }
    /* hide drop zone animation */
    var dzRect = document.querySelector('.drop-zone-rect[data-seg="' + seg + '"]');
    if(dzRect){
      var anims = dzRect.querySelectorAll('animate');
      for(var a=0;a<anims.length;a++) anims[a].remove();
      dzRect.setAttribute('stroke-opacity', '0');
      dzRect.setAttribute('fill', 'rgba(16,185,129,0.08)');
    }
  }

  /* re-bind drag events */
  bindDragEvents();
}

/* ===== TOAST ===== */
var toastTimer = null;
function showToast(msg, type){
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className = 'toast show ' + type;
  toastTimer = setTimeout(function(){ toastEl.className = 'toast'; }, 2200);
}

/* ===== TIMER ===== */
function updateTimer(){
  if(gameComplete) return;
  var elapsed = Math.floor((Date.now() - timerStart) / 1000);
  var mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  var ss = String(elapsed % 60).padStart(2, '0');
  document.getElementById('hudTime').textContent = mm + ':' + ss;
}

/* ===== HUD UPDATE ===== */
function updateHUD(){
  document.getElementById('hudScore').textContent = score + '/4';
  document.getElementById('hudAccuracy').textContent = attempts > 0 ? Math.round(score / attempts * 100) + '%' : '--';
  document.getElementById('hudStatus').textContent = gameComplete ? t('statusComplete') : t('statusPlaying');
  document.getElementById('qProgress').innerHTML = (LANG === 'cn' ? '\u5df2\u5339\u914d: ' : 'MATCHED: ') + '<span>' + score + '</span>/4';
}

/* ===== CHECK DROP ===== */
function checkDrop(segId, labelId){
  attempts++;
  var seg = null;
  for(var i=0;i<SEGMENTS.length;i++){
    if(SEGMENTS[i].id === segId){ seg = SEGMENTS[i]; break; }
  }
  if(!seg) return false;

  if(seg.correctLabel === labelId){
    /* correct */
    score++;
    solved[segId] = labelId;

    /* mark label as placed */
    var dlEl = document.getElementById('dl-' + labelId);
    if(dlEl) dlEl.classList.add('placed');

    /* show placed label on map */
    var placedG = document.getElementById('placed-' + segId);
    if(placedG){
      placedG.setAttribute('opacity', '1');
      var ptxt = document.getElementById('placedText-' + segId);
      if(ptxt) ptxt.textContent = t(labelId);
    }

    /* flash green on drop zone */
    var dzRect = document.querySelector('.drop-zone-rect[data-seg="' + segId + '"]');
    if(dzRect){
      var anims = dzRect.querySelectorAll('animate');
      for(var a=0;a<anims.length;a++) anims[a].remove();
      dzRect.setAttribute('stroke-opacity', '0');
      dzRect.setAttribute('fill', 'rgba(16,185,129,0.15)');
      dzRect.classList.add('correct-flash');
      setTimeout(function(){
        dzRect.classList.remove('correct-flash');
        dzRect.setAttribute('fill', 'rgba(16,185,129,0.08)');
      }, 600);
    }

    /* glow the route segment path */
    var pathEl = document.getElementById('path' + segId.charAt(0).toUpperCase() + segId.slice(1));
    if(pathEl){
      pathEl.setAttribute('filter', 'url(#glowGreen)');
      pathEl.setAttribute('opacity', '1');
      pathEl.setAttribute('stroke', '#10b981');
      pathEl.setAttribute('stroke-dasharray', 'none');
    }

    showToast((LANG==='cn' ? '\u6b63\u786e! ' : 'Correct! ') + t(seg.id === 's1' ? 'seg1Name' : seg.id === 's2' ? 'seg2Name' : seg.id === 's3' ? 'seg3Name' : 'seg4Name'), 'correct');

    updateHUD();

    /* check win */
    if(score >= 4){
      gameComplete = true;
      updateHUD();
      setTimeout(function(){
        document.getElementById('winPanel').classList.add('show');
      }, 800);
    }

    return true;
  } else {
    /* wrong */
    var dzRect2 = document.querySelector('.drop-zone-rect[data-seg="' + segId + '"]');
    if(dzRect2){
      dzRect2.classList.add('wrong-flash');
      setTimeout(function(){ dzRect2.classList.remove('wrong-flash'); }, 500);
    }

    var hints = [t('hintWrong'), t('hintTryAgain')];
    showToast(hints[Math.floor(Math.random() * hints.length)], 'wrong');

    updateHUD();
    return false;
  }
}

/* ===== DRAG AND DROP ===== */
function bindDragEvents(){
  var labels = document.querySelectorAll('.drag-label');
  for(var i=0;i<labels.length;i++){
    (function(el){
      el.addEventListener('mousedown', function(e){ startDrag(e, el); });
      el.addEventListener('touchstart', function(e){ startDrag(e, el); }, {passive:false});
    })(labels[i]);
  }
}

function startDrag(e, el){
  if(el.classList.contains('placed') || gameComplete) return;
  e.preventDefault();

  var labelId = el.getAttribute('data-label-id');
  dragging = labelId;
  el.classList.add('dragging');

  /* create ghost */
  ghost = document.createElement('div');
  ghost.className = 'ghost';
  ghost.innerHTML = '<div class="dl-name">' + t(labelId) + '</div><div class="dl-desc">' + t(labelId + 'Desc') + '</div>';
  document.body.appendChild(ghost);

  var clientX, clientY;
  if(e.touches){
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }

  var rect = el.getBoundingClientRect();
  dragOffsetX = clientX - rect.left;
  dragOffsetY = clientY - rect.top;

  ghost.style.left = (clientX - dragOffsetX) + 'px';
  ghost.style.top = (clientY - dragOffsetY) + 'px';
  ghost.style.width = rect.width + 'px';
}

function moveDrag(e){
  if(!dragging || !ghost) return;
  if(e.touches) e.preventDefault();

  var clientX, clientY;
  if(e.touches){
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }

  ghost.style.left = (clientX - dragOffsetX) + 'px';
  ghost.style.top = (clientY - dragOffsetY) + 'px';

  /* highlight drop zones under cursor */
  var svgEl = document.getElementById('terrainSVG');
  if(!svgEl) return;
  var dropZones = svgEl.querySelectorAll('.drop-zone-rect');
  for(var i=0;i<dropZones.length;i++){
    var dz = dropZones[i];
    var segId = dz.getAttribute('data-seg');
    if(solved[segId]) continue;

    var dzRect = dz.getBoundingClientRect();
    if(clientX >= dzRect.left && clientX <= dzRect.right && clientY >= dzRect.top && clientY <= dzRect.bottom){
      dz.classList.add('hover');
    } else {
      dz.classList.remove('hover');
    }
  }
}

function endDrag(e){
  if(!dragging || !ghost) return;

  var clientX, clientY;
  if(e.changedTouches){
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }

  var labelId = dragging;
  var labelEl = document.getElementById('dl-' + labelId);

  /* check which drop zone we're over */
  var svgEl = document.getElementById('terrainSVG');
  var hitSeg = null;
  if(svgEl){
    var dropZones = svgEl.querySelectorAll('.drop-zone-rect');
    for(var i=0;i<dropZones.length;i++){
      var dz = dropZones[i];
      var segId = dz.getAttribute('data-seg');
      if(solved[segId]) continue;
      dz.classList.remove('hover');

      var dzRect = dz.getBoundingClientRect();
      if(clientX >= dzRect.left && clientX <= dzRect.right && clientY >= dzRect.top && clientY <= dzRect.bottom){
        hitSeg = segId;
      }
    }
  }

  if(hitSeg){
    var correct = checkDrop(hitSeg, labelId);
    if(!correct && labelEl){
      labelEl.classList.remove('dragging');
    }
  } else {
    if(labelEl) labelEl.classList.remove('dragging');
  }

  /* cleanup */
  if(ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
  ghost = null;
  dragging = null;

  if(labelEl && labelEl.classList.contains('placed')){
    labelEl.classList.remove('dragging');
  }
}

/* global mouse/touch move/end */
document.addEventListener('mousemove', moveDrag);
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchmove', moveDrag, {passive:false});
document.addEventListener('touchend', endDrag);

/* ===== GUIDE TOGGLE ===== */
document.getElementById('guideToggle').addEventListener('click', function(){
  var body = document.getElementById('guideBody');
  var arrow = document.getElementById('guideArrow');
  body.classList.toggle('collapsed');
  arrow.classList.toggle('collapsed');
});

/* ===== LANG TOGGLE ===== */
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = (LANG === 'cn') ? 'en' : 'cn';
  renderAll();
});

/* ===== WIN CLOSE ===== */
document.getElementById('winClose').addEventListener('click', function(){
  document.getElementById('winPanel').classList.remove('show');
});

/* ===== INIT ===== */
renderAll();
timerInterval = setInterval(updateTimer, 1000);

})();
