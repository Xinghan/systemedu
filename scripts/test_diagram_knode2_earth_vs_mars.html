<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth vs Mars Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(60,140,255,0.1), transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(255,100,60,0.12), transparent 55%),
    linear-gradient(180deg,#080a12 0%,#0f0812 50%,#080a12 100%);
  color:#f6f6fc;
  font-family:'Inter','Noto Sans SC',sans-serif;
}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{
  padding:12px 24px 8px;display:flex;justify-content:space-between;align-items:flex-end;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);
}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:clamp(16px,2.2vw,22px);
  font-weight:700;letter-spacing:-0.02em;
  background:linear-gradient(90deg,#6ab0ff,#ffb59c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header .sub{font-size:11px;color:#aaabb0;letter-spacing:0.15em;text-transform:uppercase;margin-top:3px;}
.lang-btn{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  padding:5px 12px;cursor:pointer;border:none;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(14px);
  color:#ffb59c;letter-spacing:2px;
  border:1px solid rgba(255,181,156,0.25);
}
.main{
  flex:1;min-height:0;display:flex;padding:10px 24px 12px;gap:14px;
  overflow:hidden;
}
.planet-col{
  flex:1;min-width:0;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.01));
  border:1px solid rgba(255,255,255,0.07);
  padding:10px 14px 12px;
  position:relative;
  overflow:hidden;
}
.planet-col.earth{border-top:3px solid #6ab0ff;box-shadow:inset 0 20px 40px rgba(60,140,255,0.08);}
.planet-col.mars{border-top:3px solid #ff6a3a; box-shadow:inset 0 20px 40px rgba(255,120,60,0.08);}
.planet-col::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  box-shadow:0 0 20px var(--glow);
}
.planet-col.earth::before{--glow:#6ab0ff;}
.planet-col.mars::before{--glow:#ff6a3a;}
.planet-head{
  display:flex;align-items:center;gap:12px;margin-bottom:8px;
  padding-bottom:8px;border-bottom:1px dashed rgba(255,255,255,0.08);
}
.planet-orb{
  width:68px;height:68px;flex-shrink:0;
  filter:drop-shadow(0 0 14px var(--glow));
}
.planet-label{flex:1;min-width:0;}
.planet-name{
  font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:-0.01em;color:var(--glow);
}
.planet-sub{font-size:10px;color:#aaabb0;letter-spacing:0.08em;text-transform:uppercase;}

.vs-divider{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;padding:0 6px;position:relative;
}
.vs-divider .vs-pill{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:0.2em;padding:6px 12px;
  background:linear-gradient(135deg,rgba(106,176,255,0.2),rgba(255,106,58,0.2));
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  writing-mode:vertical-rl;
  text-orientation:mixed;
}

.dim-rows{
  flex:1;min-height:0;display:flex;flex-direction:column;gap:3px;
  overflow-y:auto;padding-right:2px;
}
.dim-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 4px;border-bottom:1px dashed rgba(255,255,255,0.06);
}
.dim-row:last-child{border-bottom:none;}
.dim-icon{
  width:26px;height:26px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.dim-icon svg{width:100%;height:100%;}
.dim-label{
  font-family:'Space Grotesk',sans-serif;font-size:10px;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);flex-shrink:0;width:72px;
}
.dim-label .zh{
  display:block;font-family:'Noto Sans SC',sans-serif;
  font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:0;
  text-transform:none;font-weight:500;margin-top:1px;
}
.dim-value{
  flex:1;font-size:11px;line-height:1.45;
  color:rgba(255,255,255,0.88);
}
.dim-value strong{
  display:block;font-family:'Space Grotesk',sans-serif;
  font-size:13px;color:var(--row-color,#fff);margin-bottom:1px;
  font-weight:700;
}
.planet-col.earth .dim-row{--row-color:#8cc0ff;}
.planet-col.mars  .dim-row{--row-color:#ffb59c;}

.footer{
  flex-shrink:0;padding:8px 24px 10px;
  display:flex;justify-content:space-between;align-items:center;gap:18px;
  background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(14px);
}
.footer .takeaway{
  font-family:'Noto Sans SC',sans-serif;font-size:11px;line-height:1.55;
  color:rgba(255,255,255,0.75);flex:1;min-width:0;
}
.footer .takeaway strong{color:#ffb59c;font-family:'Space Grotesk',sans-serif;
  text-transform:uppercase;letter-spacing:0.1em;font-size:9px;display:block;margin-bottom:2px;}
.footer .scale-bar{
  font-family:'Space Grotesk',sans-serif;font-size:9px;
  color:rgba(255,255,255,0.5);letter-spacing:0.1em;
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;flex-shrink:0;
}
.footer .scale-bar svg{width:120px;height:22px;}

@media (max-width:900px){
  .vs-divider .vs-pill{font-size:10px;padding:4px 8px;}
  .dim-label{width:60px;font-size:9px;}
  .planet-orb{width:54px;height:54px;}
}
</style>
</head>
<body>
<div class="wrapper">
<div class="header">
  <div>
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <button class="lang-btn" id="langBtn">CN</button>
</div>
<div class="main">
  <div class="planet-col earth">
    <div class="planet-head">
      <svg class="planet-orb" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="earthGrad" cx="0.3" cy="0.3" r="0.85">
            <stop offset="0%" stop-color="#8acfff"/>
            <stop offset="60%" stop-color="#2a70c8"/>
            <stop offset="100%" stop-color="#0a1a35"/>
          </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#earthGrad)"/>
        <!-- Africa -->
        <path d="M 45 35 Q 55 32 60 42 Q 66 52 58 62 Q 50 68 42 58 Q 38 48 45 35 Z" fill="#4aa050" opacity="0.85"/>
        <!-- Eurasia stub -->
        <path d="M 28 30 Q 40 28 52 32 Q 48 40 36 42 Q 28 38 28 30 Z" fill="#4aa050" opacity="0.85"/>
        <!-- Americas stub -->
        <path d="M 68 38 Q 74 48 70 60 Q 64 58 66 48 Q 66 42 68 38 Z" fill="#4aa050" opacity="0.85"/>
        <!-- Cloud wisps -->
        <ellipse cx="32" cy="62" rx="8" ry="2" fill="#fff" opacity="0.55"/>
        <ellipse cx="62" cy="72" rx="10" ry="2" fill="#fff" opacity="0.45"/>
        <ellipse cx="48" cy="22" rx="6" ry="1.5" fill="#fff" opacity="0.5"/>
        <!-- Atmosphere -->
        <circle cx="50" cy="50" r="46" fill="none" stroke="#8acfff" stroke-width="1" opacity="0.4"/>
        <circle cx="50" cy="50" r="48" fill="none" stroke="#8acfff" stroke-width="0.5" opacity="0.25"/>
      </svg>
      <div class="planet-label">
        <div class="planet-name" id="earthName"></div>
        <div class="planet-sub" id="earthSub"></div>
      </div>
    </div>
    <div class="dim-rows" id="earthRows"></div>
  </div>
  <div class="vs-divider">
    <div class="vs-pill">VS</div>
  </div>
  <div class="planet-col mars">
    <div class="planet-head">
      <svg class="planet-orb" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="marsGrad" cx="0.3" cy="0.3" r="0.85">
            <stop offset="0%" stop-color="#ffc28a"/>
            <stop offset="55%" stop-color="#c8502a"/>
            <stop offset="100%" stop-color="#2a0802"/>
          </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#marsGrad)"/>
        <!-- Valles Marineris style scar -->
        <path d="M 20 48 Q 40 45 60 48 Q 75 50 82 52" stroke="#6a1a08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Olympus Mons (circular feature) -->
        <circle cx="30" cy="40" r="4" fill="#f08060" opacity="0.7"/>
        <circle cx="30" cy="40" r="2" fill="#2a0802"/>
        <!-- Dark dunes / craters scatter -->
        <circle cx="62" cy="30" r="2.5" fill="#3a0a04" opacity="0.75"/>
        <circle cx="70" cy="60" r="2" fill="#3a0a04" opacity="0.75"/>
        <circle cx="40" cy="65" r="1.8" fill="#3a0a04" opacity="0.75"/>
        <circle cx="55" cy="72" r="1.5" fill="#3a0a04" opacity="0.75"/>
        <!-- North polar cap -->
        <ellipse cx="50" cy="12" rx="14" ry="4" fill="#f0d4c4" opacity="0.7"/>
        <!-- South polar cap -->
        <ellipse cx="50" cy="86" rx="10" ry="3" fill="#f0d4c4" opacity="0.55"/>
        <!-- Thin atmosphere -->
        <circle cx="50" cy="50" r="46" fill="none" stroke="#ffb59c" stroke-width="0.6" opacity="0.35"/>
      </svg>
      <div class="planet-label">
        <div class="planet-name" id="marsName"></div>
        <div class="planet-sub" id="marsSub"></div>
      </div>
    </div>
    <div class="dim-rows" id="marsRows"></div>
  </div>
</div>
<div class="footer">
  <div class="takeaway">
    <strong id="takeawayLabel"></strong>
    <span id="takeawayText"></span>
  </div>
  <div class="scale-bar">
    <span id="scaleLabel"></span>
    <svg viewBox="0 0 120 22" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="12" width="74" height="8" fill="#6ab0ff" opacity="0.8"/>
      <text x="40" y="9" text-anchor="middle" font-family="Space Grotesk" font-size="7" fill="#8cc0ff">12,742 KM</text>
      <rect x="80" y="13" width="38" height="6" fill="#ff6a3a" opacity="0.8"/>
      <text x="100" y="9" text-anchor="middle" font-family="Space Grotesk" font-size="7" fill="#ffb59c">6,779 KM</text>
    </svg>
  </div>
</div>
</div>
<script>
(function(){
'use strict';
var LANG = 'cn';
var I18N = {
  title:     {en:'EARTH vs MARS -- A FIRST-LOOK COMPARISON', cn:'地球 vs 火星 -- 第一印象对比'},
  subtitle:  {en:'THE 6 DIMENSIONS YOUR COMPARISON CARD NEEDS', cn:'对比卡要用的 6 个维度'},
  earthName: {en:'EARTH', cn:'地球'},
  earthSub:  {en:'Home planet', cn:'我们的家园'},
  marsName:  {en:'MARS', cn:'火星'},
  marsSub:   {en:'The rusty neighbour', cn:'锈色邻居'},
  takeawayLabel:{en:'WHY THIS MATTERS', cn:'为什么重要'},
  takeawayText: {en:'A Mars rover meets none of the Earth-like comforts: thin air, bone-cold temperatures, no plants, and an ancient surface covered in iron-oxide dust. Every design choice on the rover exists because Mars is NOT Earth.', cn:'火星车得不到地球上的任何"便利"：稀薄的空气、冰冷的温度、零植被，加上铺满氧化铁的亘古地表。它的每一项设计，都是因为火星"不是地球"。'},
  scaleLabel: {en:'DIAMETER', cn:'直径对比'},
  /* dimension labels */
  d_color_label:{en:'COLOR', cn:'颜色'},
  d_color_e:    {en:'Blue / Green', cn:'蓝绿为主'},
  d_color_e_d:  {en:'Oceans reflect blue sky, plants give green continents.', cn:'海洋反射蓝天，植物让大陆呈现绿色。'},
  d_color_m:    {en:'Rusty Red', cn:'铁锈红'},
  d_color_m_d:  {en:'Iron-oxide dust coats almost the entire surface.', cn:'氧化铁尘土几乎覆盖整个地表。'},

  d_atm_label:{en:'ATMOSPHERE', cn:'大气'},
  d_atm_e:    {en:'Thick / 1 atm', cn:'浓厚 / 1 个大气压'},
  d_atm_e_d:  {en:'Nitrogen 78% + Oxygen 21%, enough to breathe.', cn:'氮气 78% + 氧气 21%，可以直接呼吸。'},
  d_atm_m:    {en:'Thin / 0.006 atm', cn:'稀薄 / 0.006 个大气压'},
  d_atm_m_d:  {en:'Mostly CO2, less than 1% of Earth pressure. No breathing.', cn:'几乎全是二氧化碳，不到地球 1%。无法呼吸。'},

  d_temp_label:{en:'TEMP', cn:'温度'},
  d_temp_e:    {en:'+15 degC', cn:'平均 +15 摄氏度'},
  d_temp_e_d:  {en:'Comfortable for life; water is usually liquid.', cn:'适合生命；水通常是液态。'},
  d_temp_m:    {en:'-63 degC', cn:'平均 -63 摄氏度'},
  d_temp_m_d:  {en:'Day/night swings up to 80 degC. Metal parts expand and contract every sol.', cn:'昼夜温差可达 80 度。金属零件每天都要热胀冷缩。'},

  d_water_label:{en:'WATER', cn:'液态水'},
  d_water_e:    {en:'Everywhere', cn:'到处都是'},
  d_water_e_d:  {en:'Oceans, rivers, lakes, rain, snow.', cn:'海洋、河流、湖泊、雨和雪。'},
  d_water_m:    {en:'Frozen only', cn:'只有冰'},
  d_water_m_d:  {en:'Water exists only as polar ice and underground frost. No rivers today.', cn:'只存在于极冠冰和地下冰霜。今天火星没有河流。'},

  d_life_label:{en:'LIFE', cn:'植被生命'},
  d_life_e:    {en:'Full biosphere', cn:'完整的生物圈'},
  d_life_e_d:  {en:'Forests, animals, bacteria in every environment.', cn:'森林、动物、细菌布满每个角落。'},
  d_life_m:    {en:'None observed', cn:'未发现'},
  d_life_m_d:  {en:'No confirmed life yet; rovers search for chemical fossils.', cn:'尚未找到生命；火星车正在寻找化学"化石"。'},

  d_terrain_label:{en:'TERRAIN', cn:'地形'},
  d_terrain_e:    {en:'Maintained + worn', cn:'维护过 + 被侵蚀'},
  d_terrain_e_d:  {en:'Mountains, plains, oceans, but also roads, fields and cities.', cn:'山脉、平原、海洋，也有公路、农田和城市。'},
  d_terrain_m:    {en:'Untouched / ancient', cn:'原始 / 远古'},
  d_terrain_m_d:  {en:'Craters, dunes, shield volcanoes, canyons -- unchanged for billions of years.', cn:'陨石坑、沙丘、盾状火山、峡谷——几十亿年几乎没变过。'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

var DIMS = [
  {key:'color',  icon:'palette'},
  {key:'atm',    icon:'cloud'},
  {key:'temp',   icon:'thermo'},
  {key:'water',  icon:'drop'},
  {key:'life',   icon:'leaf'},
  {key:'terrain',icon:'mountain'},
];

function iconSvg(name) {
  switch (name) {
    case 'palette':
      return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M12 3 A9 9 0 0 0 3 12 A9 9 0 0 0 12 21 A2 2 0 0 0 14 19 L14 17 A1 1 0 0 1 15 16 L18 16 A3 3 0 0 0 21 13 A10 10 0 0 0 12 3" fill="none" stroke="#ffb59c" stroke-width="1.4"/>'
        +'<circle cx="7" cy="11" r="1.2" fill="#6ab0ff"/>'
        +'<circle cx="10" cy="7" r="1.2" fill="#4ade80"/>'
        +'<circle cx="15" cy="7" r="1.2" fill="#fbbf24"/>'
        +'<circle cx="17" cy="12" r="1.2" fill="#f87171"/>'
        +'</svg>';
    case 'cloud':
      return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M6 15 Q3 15 3 12 Q3 9 6 9 Q6 6 10 6 Q14 6 15 10 Q19 10 19 14 Q19 17 16 17 L7 17 Q5 17 6 15 Z" fill="none" stroke="#ffb59c" stroke-width="1.4"/>'
        +'</svg>';
    case 'thermo':
      return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M12 4 Q10 4 10 6 L10 14 Q8 15 8 17 Q8 20 12 20 Q16 20 16 17 Q16 15 14 14 L14 6 Q14 4 12 4 Z" fill="none" stroke="#ffb59c" stroke-width="1.4"/>'
        +'<circle cx="12" cy="17" r="2" fill="#f87171"/>'
        +'<line x1="12" y1="8" x2="12" y2="15" stroke="#f87171" stroke-width="1.5"/>'
        +'</svg>';
    case 'drop':
      return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M12 3 Q7 10 7 15 A5 5 0 0 0 17 15 Q17 10 12 3 Z" fill="none" stroke="#ffb59c" stroke-width="1.4"/>'
        +'<path d="M10 14 Q10 17 12 17" stroke="#6ab0ff" stroke-width="1.2" fill="none" stroke-linecap="round"/>'
        +'</svg>';
    case 'leaf':
      return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M5 19 Q4 10 12 4 Q20 7 19 16 Q16 20 5 19 Z" fill="none" stroke="#ffb59c" stroke-width="1.4"/>'
        +'<path d="M5 19 Q10 12 18 7" stroke="#4ade80" stroke-width="1.2" fill="none"/>'
        +'</svg>';
    case 'mountain':
      return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M3 19 L9 9 L13 14 L16 10 L21 19 Z" fill="none" stroke="#ffb59c" stroke-width="1.4" stroke-linejoin="miter"/>'
        +'<line x1="9" y1="9" x2="11" y2="12" stroke="#ffb59c" stroke-width="1" opacity="0.6"/>'
        +'</svg>';
  }
  return '';
}

function buildRows(planet, targetId) {
  var target = document.getElementById(targetId);
  target.innerHTML = '';
  DIMS.forEach(function(dim) {
    var label = t('d_' + dim.key + '_label');
    var head  = t('d_' + dim.key + '_' + planet);
    var desc  = t('d_' + dim.key + '_' + planet + '_d');
    var row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML =
      '<div class="dim-icon">' + iconSvg(dim.icon) + '</div>' +
      '<div class="dim-label">' + label + '</div>' +
      '<div class="dim-value"><strong>' + head + '</strong>' + desc + '</div>';
    target.appendChild(row);
  });
}

function refreshI18N() {
  document.getElementById('title').textContent = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('earthName').textContent = t('earthName');
  document.getElementById('earthSub').textContent = t('earthSub');
  document.getElementById('marsName').textContent = t('marsName');
  document.getElementById('marsSub').textContent = t('marsSub');
  document.getElementById('takeawayLabel').textContent = t('takeawayLabel');
  document.getElementById('takeawayText').textContent = t('takeawayText');
  document.getElementById('scaleLabel').textContent = t('scaleLabel');
  buildRows('e', 'earthRows');
  buildRows('m', 'marsRows');
}

document.getElementById('langBtn').addEventListener('click', function() {
  LANG = LANG === 'en' ? 'cn' : 'en';
  this.textContent = LANG.toUpperCase();
  refreshI18N();
});

refreshI18N();
})();
</script>
</body>
</html>
