<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path Surveyor 路径测量所</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(120,200,255,0.10), transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(255,160,100,0.10), transparent 55%),
    linear-gradient(180deg,#070915 0%,#0d1330 50%,#070814 100%);
  color:#f4f6fc;
  font-family:'Inter','Noto Sans SC',sans-serif;
  display:flex;flex-direction:column;
}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;}

.header{
  padding:10px 18px 6px;display:flex;justify-content:space-between;align-items:flex-end;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);
}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:clamp(16px,2.2vw,22px);font-weight:700;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,#80d8ff,#4088ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px rgba(100,180,255,0.4));
}
.header .sub{font-size:10px;color:#aaabb0;letter-spacing:0.18em;text-transform:uppercase;margin-top:3px;}
.header-right{display:flex;align-items:center;gap:10px;}
.lang-btn{
  background:rgba(255,255,255,0.05);border:1px solid rgba(120,200,255,0.3);
  color:#80d8ff;padding:5px 10px;font-family:'Space Grotesk',sans-serif;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;
  transition:background 0.2s,border-color 0.2s;
}
.lang-btn:hover{background:rgba(120,200,255,0.15);border-color:#80d8ff;}
.level-ind{
  font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.18em;
  text-transform:uppercase;color:#aaabb0;
}
.level-ind strong{color:#80d8ff;font-size:13px;}

.main{
  flex:1;display:grid;grid-template-columns:240px 1fr 240px;
  gap:0;overflow:hidden;min-height:0;
}

.panel{
  padding:12px 14px;overflow-y:auto;
  background:rgba(255,255,255,0.02);
  border-right:1px solid rgba(255,255,255,0.06);
}
.panel.right{border-right:none;border-left:1px solid rgba(255,255,255,0.06);}
.panel::-webkit-scrollbar{width:6px;}
.panel::-webkit-scrollbar-thumb{background:rgba(120,200,255,0.3);}

.panel h2{
  font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.18em;
  text-transform:uppercase;color:#80d8ff;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid rgba(120,200,255,0.18);
}
.panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.12em;
  text-transform:uppercase;color:#a0d8ff;margin:10px 0 6px;
}

.mode-toggle{display:flex;gap:6px;margin-bottom:10px;}
.mode-btn{
  flex:1;padding:8px 4px;font-size:10px;text-align:center;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  color:#c8c8d0;font-family:'Space Grotesk',sans-serif;letter-spacing:0.08em;
  text-transform:uppercase;cursor:pointer;transition:all 0.15s;
}
.mode-btn:hover{border-color:rgba(120,200,255,0.4);}
.mode-btn.active{background:rgba(120,200,255,0.18);border-color:#80d8ff;color:#80d8ff;}

.level-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.level-card{
  padding:8px 10px;background:rgba(255,255,255,0.03);
  border-left:2px solid rgba(255,255,255,0.1);cursor:pointer;
  transition:all 0.15s;font-size:11px;
}
.level-card:hover{background:rgba(120,200,255,0.08);}
.level-card.active{background:rgba(120,200,255,0.14);border-left-color:#80d8ff;}
.level-card.done{border-left-color:#70e090;}
.level-card .num{
  font-family:'Space Grotesk',sans-serif;font-size:9px;
  color:#80d8ff;letter-spacing:0.15em;
}
.level-card .tt{color:#eef1fa;margin-top:2px;line-height:1.35;}
.level-card .prog{
  font-family:'Space Grotesk',sans-serif;font-size:9px;color:#aaabb0;margin-top:3px;
}

.stat-row{
  display:flex;justify-content:space-between;padding:5px 0;
  font-size:11px;color:#c8c8d0;border-bottom:1px dashed rgba(255,255,255,0.06);
}
.stat-row b{color:#80d8ff;font-family:'Space Grotesk',sans-serif;}

.stage-area{position:relative;display:flex;flex-direction:column;min-height:0;background:rgba(0,0,0,0.15);}
.stage-top{
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.05);
}
.task{
  font-size:13px;color:#eef1fa;max-width:60%;line-height:1.4;
}
.task .tag{
  display:inline-block;background:rgba(120,200,255,0.14);color:#80d8ff;
  font-family:'Space Grotesk',sans-serif;font-size:9px;
  letter-spacing:0.15em;padding:2px 7px;margin-right:6px;text-transform:uppercase;
}
.readout{
  display:flex;gap:14px;font-family:'Space Grotesk',sans-serif;font-size:11px;
}
.readout .it{color:#aaabb0;letter-spacing:0.1em;text-transform:uppercase;}
.readout .it b{color:#80d8ff;font-size:13px;margin-left:5px;}
.readout .it.warn b{color:#ffb060;}

.canvas-wrap{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  padding:12px;min-height:0;
}
#stage{
  max-width:100%;max-height:100%;
  background:linear-gradient(135deg,#0a0e1e 0%,#0e1530 100%);
  border:1px solid rgba(120,200,255,0.2);
  box-shadow:0 8px 30px rgba(0,0,0,0.5), inset 0 0 60px rgba(80,140,220,0.04);
  cursor:crosshair;
}

.controls{
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  gap:14px;flex-shrink:0;background:rgba(0,0,0,0.3);
  border-top:1px solid rgba(255,255,255,0.05);
}
.action-btns{display:flex;gap:8px;}
.btn{
  padding:7px 14px;background:rgba(120,200,255,0.10);border:1px solid rgba(120,200,255,0.35);
  color:#e8f0ff;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:0.12em;
  text-transform:uppercase;cursor:pointer;transition:all 0.15s;
}
.btn:hover{background:rgba(120,200,255,0.22);border-color:#80d8ff;}
.btn.primary{background:rgba(120,200,255,0.3);border-color:#80d8ff;color:#0a0e1e;font-weight:700;}
.btn.primary:hover{background:#80d8ff;}
.btn.warn{border-color:rgba(255,160,80,0.5);color:#ffc080;}
.btn.warn:hover{background:rgba(255,160,80,0.2);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

.compass{
  display:grid;grid-template-columns:repeat(3,32px);grid-template-rows:repeat(3,32px);
  gap:3px;
}
.comp-btn{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  color:#c8c8d0;font-family:'Space Grotesk',sans-serif;font-size:10px;
  letter-spacing:0.05em;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;
}
.comp-btn:hover:not(:disabled){border-color:#80d8ff;color:#80d8ff;background:rgba(120,200,255,0.12);}
.comp-btn:disabled{opacity:0.25;cursor:not-allowed;}
.comp-btn.center{background:rgba(120,200,255,0.15);border-color:rgba(120,200,255,0.3);font-size:11px;color:#80d8ff;}
.comp-btn.center:hover{background:rgba(120,200,255,0.25);}

.log{
  background:rgba(0,0,0,0.3);padding:8px 10px;font-family:'Space Grotesk',sans-serif;
  font-size:10px;max-height:160px;overflow-y:auto;
}
.log .ln{padding:3px 0;border-bottom:1px dashed rgba(255,255,255,0.05);color:#c8c8d0;}
.log .ln.ok{color:#70e090;}
.log .ln.bad{color:#ff7888;}
.log .ln.info{color:#80d8ff;}
.log::-webkit-scrollbar{width:6px;}
.log::-webkit-scrollbar-thumb{background:rgba(120,200,255,0.3);}

.direction-keys{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;
}
.dir-key{
  padding:6px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  color:#c8c8d0;font-family:'Space Grotesk',sans-serif;font-size:10px;
  cursor:pointer;transition:all 0.12s;
}
.dir-key:hover{border-color:#80d8ff;color:#80d8ff;}

.feedback{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);
  background:rgba(10,14,30,0.96);border:2px solid #80d8ff;padding:14px 24px;
  color:#80d8ff;font-family:'Space Grotesk',sans-serif;font-size:16px;
  letter-spacing:0.1em;text-transform:uppercase;pointer-events:none;
  opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:20;
  box-shadow:0 0 40px rgba(120,200,255,0.35);
}
.feedback.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.feedback.bad{border-color:#ff7888;color:#ff7888;box-shadow:0 0 40px rgba(255,100,120,0.35);}
.feedback.good{border-color:#70e090;color:#70e090;box-shadow:0 0 40px rgba(110,220,140,0.35);}

.modal{
  position:fixed;inset:0;background:rgba(5,7,18,0.85);
  display:none;align-items:center;justify-content:center;z-index:50;
}
.modal.show{display:flex;}
.modal-box{
  max-width:560px;padding:26px 30px;background:linear-gradient(135deg,#0a0e1e 0%,#141b38 100%);
  border:1px solid rgba(120,200,255,0.3);box-shadow:0 10px 60px rgba(80,140,220,0.25);
}
.modal-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:18px;color:#80d8ff;
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;
}
.modal-box p{font-size:12px;color:#c8c8d0;line-height:1.6;margin-bottom:9px;}
.modal-box .key{color:#80d8ff;font-family:'Space Grotesk',sans-serif;}
.modal-box .btn{margin-top:10px;}

.distance-card{
  background:rgba(120,200,255,0.06);padding:10px 12px;
  border-left:2px solid rgba(120,200,255,0.4);margin-bottom:10px;
}
.distance-card .row{
  display:flex;justify-content:space-between;font-size:11px;color:#c8c8d0;padding:2px 0;
}
.distance-card .row b{color:#80d8ff;font-family:'Space Grotesk',sans-serif;}
.distance-card .row .val{font-family:'Space Grotesk',sans-serif;color:#eef1fa;}

.direction-panel{
  margin-top:10px;padding:10px 12px;background:rgba(255,255,255,0.03);
  border-left:2px solid rgba(255,160,80,0.4);
}
.direction-panel .sub{font-size:9px;color:#aaabb0;letter-spacing:0.15em;margin-bottom:8px;}

.cmd-input{
  width:100%;padding:7px 9px;background:rgba(0,0,0,0.4);border:1px solid rgba(120,200,255,0.3);
  color:#eef1fa;font-family:'Space Grotesk',sans-serif;font-size:11px;
  letter-spacing:0.05em;margin-top:6px;
}
.cmd-input:focus{outline:none;border-color:#80d8ff;}

.helper{font-size:9px;color:#aaabb0;line-height:1.5;margin-top:4px;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div>
      <h1 id="title">Path Surveyor 路径测量所</h1>
      <div class="sub" id="subtitle">KNODE 5 · Distance & Direction Sandbox</div>
    </div>
    <div class="header-right">
      <div class="level-ind" id="levelInd"></div>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </div>
  <div class="main">
    <!-- LEFT PANEL: levels + mode -->
    <div class="panel left">
      <h2 id="labMode">MODE</h2>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="measure" id="btnModeMeasure">Measure</button>
        <button class="mode-btn" data-mode="drive" id="btnModeDrive">Drive</button>
      </div>
      <div class="helper" id="modeHint"></div>

      <h2 id="labLevels" style="margin-top:14px;">LEVELS</h2>
      <div class="level-list" id="levelList"></div>

      <h3 id="labStats">STATS</h3>
      <div class="stat-row"><span id="labCorrect">Correct</span><b id="statCorrect">0</b></div>
      <div class="stat-row"><span id="labAttempts">Attempts</span><b id="statAttempts">0</b></div>
      <div class="stat-row"><span id="labStreak">Streak</span><b id="statStreak">0</b></div>
    </div>

    <!-- CENTER STAGE -->
    <div class="stage-area">
      <div class="stage-top">
        <div class="task" id="taskText"></div>
        <div class="readout">
          <div class="it"><span id="labGrid">GRID</span><b id="readGrid">-</b></div>
          <div class="it"><span id="labDiag">DIAG</span><b id="readDiag">-</b></div>
          <div class="it warn"><span id="labDir">DIR</span><b id="readDir">-</b></div>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="stage" width="760" height="480"></canvas>
      </div>
      <div class="controls">
        <div class="action-btns">
          <button class="btn" id="btnReset">Reset</button>
          <button class="btn primary" id="btnSubmit">Submit</button>
          <button class="btn warn" id="btnHint">Hint</button>
        </div>
        <div id="driveControls" style="display:none;">
          <div class="compass" id="compass"></div>
        </div>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>

    <!-- RIGHT PANEL: data + log -->
    <div class="panel right">
      <h2 id="labMeasure">MEASURE</h2>
      <div class="distance-card">
        <div class="row"><span id="rowStart">Start</span><span class="val" id="valStart">-</span></div>
        <div class="row"><span id="rowEnd">End</span><span class="val" id="valEnd">-</span></div>
        <div class="row"><span id="rowDx">Δcol</span><span class="val" id="valDx">-</span></div>
        <div class="row"><span id="rowDy">Δrow</span><span class="val" id="valDy">-</span></div>
        <div class="row"><span id="rowManhattan">Manhattan</span><b id="valMan">-</b></div>
        <div class="row"><span id="rowEuclid">Diagonal</span><b id="valEuc">-</b></div>
      </div>

      <div class="direction-panel" id="dirPanel">
        <div class="sub" id="labDirectionHint">DIRECTION KEYS</div>
        <div class="helper" id="dirHelp"></div>
        <div class="direction-keys">
          <span class="dir-key" id="kN">N · 北</span>
          <span class="dir-key" id="kS">S · 南</span>
          <span class="dir-key" id="kE">E · 东</span>
          <span class="dir-key" id="kW">W · 西</span>
        </div>
      </div>

      <h3 id="labLog" style="margin-top:14px;">LOG</h3>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Welcome to Path Surveyor</h2>
    <p id="modalP1"></p>
    <p id="modalP2"></p>
    <p id="modalP3"></p>
    <p id="modalP4"></p>
    <button class="btn primary" id="btnStart">START</button>
  </div>
</div>

    fbCorrect:'REACHED', fbWrong:'NOT YET', fbSame:'SAME DISTANCE', fbOver:'OUT OF BOUNDS',
    submitPick:'Click two cells first',
    submitDone:'Level complete',
    directionZero:'Pick a direction first',
    dirN:'North', dirS:'South', dirE:'East', dirW:'West',

    modalP3:'Drive mode: issue N/S/E/W commands and watch the rover walk. Learn to measure first, then drive.',

    start2:'START',

function t(k){ return I18N[LANG][k] || k; }

/* ======================= CONFIG ======================= */
var CELL=44;
var COLS=16, ROWS=10;

var LEVELS=[
  {
    id:1, mode:'measure', grid:[12,8],
    fixed:false, target:null,
    needCorrect:3,

  },

  },

  },

  }
];

/* ======================= STATE ======================= */
var state={
  lv:0, mode:'measure',
  grid:{cols:12,rows:8},
  pick1:null, pick2:null,
  rover:null, target:null,
  pathTrail:[], pathsDone:[],
  queue:[], dirSel:null,
  correct:0, attempts:0, streak:0,
  levelCorrect:[0,0,0,0,0],
  lastSubmitted:null,
  hintShown:false,
  running:false,
  animStep:null,
};

/* ======================= DOM ======================= */
var $=function(id){return document.getElementById(id);};
var canvas=$('stage'), ctx=canvas.getContext('2d');

/* ======================= INIT ======================= */
function init(){
  applyI18n();
  buildLevelList();

}

function buildLevelList(){
  var list=$('levelList');
  list.innerHTML='';
  var cards=t('levelCards');
  for(var i=0;i<LEVELS.length;i++){
    var card=document.createElement('div');
    card.className='level-card';
    if(i===state.lv) card.classList.add('active');
    if(state.levelCorrect[i]>=LEVELS[i].needCorrect) card.classList.add('done');
    card.innerHTML='<div class="num">'+cards[i].num+'</div>'+
                   '<div class="tt">'+cards[i].tt+'</div>'+
                   '<div class="prog">'+state.levelCorrect[i]+' / '+LEVELS[i].needCorrect+'</div>';
    (function(idx){
      card.addEventListener('click',function(){ loadLevel(idx); });
    })(i);
    list.appendChild(card);
  }
}

function buildCompass(){
  var c=$('compass');
  c.innerHTML='';
  var cells=[
    {l:'NW',d:'NW'},{l:'N',d:'N'},{l:'NE',d:'NE'},
    {l:'W',d:'W'},{l:'·',d:'CENTER'},{l:'E',d:'E'},
    {l:'SW',d:'SW'},{l:'S',d:'S'},{l:'SE',d:'SE'}
  ];
  for(var i=0;i<cells.length;i++){
    var b=document.createElement('button');
    b.className='comp-btn'+(cells[i].d==='CENTER'?' center':'');
    b.textContent=cells[i].l;
    b.dataset.d=cells[i].d;
    if(cells[i].d==='CENTER') b.textContent='GO';
    (function(dir){
      b.addEventListener('click',function(){ onCompass(dir); });
    })(cells[i].d);
    c.appendChild(b);
  }
}

function attachEvents(){
  $('langBtn').addEventListener('click',function(){
    LANG = (LANG==='zh'?'en':'zh');
    $('langBtn').textContent = LANG==='zh' ? 'EN' : '中';
    applyI18n();
  });
  $('btnStart').addEventListener('click',function(){
    $('modal').classList.remove('show');
  });
  $('btnModeMeasure').addEventListener('click',function(){ setMode('measure'); });
  $('btnModeDrive').addEventListener('click',function(){ setMode('drive'); });
  $('btnReset').addEventListener('click',resetCurrent);
  $('btnSubmit').addEventListener('click',submitAnswer);
  $('btnHint').addEventListener('click',showHint);

  canvas.addEventListener('click',onCanvasClick);
}

/* ======================= LEVEL / MODE ======================= */
function loadLevel(idx){
  state.lv=idx;
  var L=LEVELS[idx];
  state.mode=L.mode;
  state.grid.cols=L.grid[0];
  state.grid.rows=L.grid[1];
  state.pick1=null; state.pick2=null;
  state.pathTrail=[]; state.pathsDone=[];
  state.queue=[]; state.dirSel=null;
  state.hintShown=false;
  state.lastSubmitted=null;
  state.running=false;

  if(L.mode==='drive'){
    state.rover={x:L.rover.x,y:L.rover.y};
    state.target={x:L.target.x,y:L.target.y};
    $('driveControls').style.display='block';
  } else {
    state.rover=null;
    state.target=null;
    $('driveControls').style.display='none';
  }
  if(L.fixed){
    state.pick1={x:L.start.x,y:L.start.y};
    state.pick2={x:L.end.x,y:L.end.y};
  }
  setMode(L.mode, true);
  fitCanvas();
  updateTask();
  updateReadout();
  updateLevelInd();
  buildLevelList();
}

function setMode(m, silent){
  state.mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.mode===m);
  });
  $('driveControls').style.display = m==='drive' ? 'block' : 'none';
  updateModeHint();
  updateReadout();
  if(!silent) log(m==='measure'?t('measure'):t('drive'),'info');
}

function updateModeHint(){
  $('modeHint').textContent = state.mode==='measure' ? t('modeHintMeasure') : t('modeHintDrive');
  $('dirHelp').textContent = state.mode==='measure' ? t('dirHelpMeasure') : t('dirHelpDrive');
}

function updateLevelInd(){
  $('levelInd').innerHTML='<strong>'+(state.lv+1)+'</strong> / '+LEVELS.length;
}

function updateTask(){
  var L=LEVELS[state.lv];
  var cards=t('levelCards');
  var tag=cards[state.lv].num;
  $('taskText').innerHTML='<span class="tag">'+tag+'</span>'+t(L.taskKey);
}

/* ======================= CANVAS FIT ======================= */
function fitCanvas(){
  var wrap=canvas.parentElement;
  var w=wrap.clientWidth-24;
  var h=wrap.clientHeight-24;
  var cellW=Math.floor(w/state.grid.cols);
  var cellH=Math.floor(h/state.grid.rows);
  CELL=Math.max(28, Math.min(cellW, cellH, 54));
  canvas.width = state.grid.cols*CELL;
  canvas.height = state.grid.rows*CELL;
}
window.addEventListener('resize',function(){
  fitCanvas();
});

/* ======================= CANVAS DRAW ======================= */
function frame(){
  draw();
  requestAnimationFrame(frame);
}

function draw(){
  var W=canvas.width, H=canvas.height;
  // full background to avoid black samples
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0a0e1e');
  bg.addColorStop(1,'#0e1a35');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // grid background
  drawGrid();

  // picks / paths / rover
  if(state.pick1) drawCellMark(state.pick1.x,state.pick1.y,'#80d8ff','S');
  if(state.pick2) drawCellMark(state.pick2.x,state.pick2.y,'#ffd080','E');

  if(state.pick1 && state.pick2){
    drawDistanceOverlay();
  }
  // L2: draw stored paths
  if(LEVELS[state.lv].id===2){
    for(var i=0;i<state.pathsDone.length;i++){
      drawPathLine(state.pathsDone[i], '#70e090', 3);
    }
    if(state.pathTrail.length) drawPathLine(state.pathTrail,'#80d8ff', 4);
  }

  if(state.mode==='drive'){
    if(state.target) drawCellMark(state.target.x,state.target.y,'#ffd080','T');
    if(state.rover) drawRover(state.rover.x,state.rover.y);
    // queue path for L5
    if(state.queue.length){
      drawQueuePath();
    }
  }
  // axis labels
  drawAxisLabels();
}

function drawGrid(){
  var cols=state.grid.cols, rows=state.grid.rows;
  ctx.strokeStyle='rgba(120,200,255,0.12)';
  ctx.lineWidth=1;
  for(var x=0;x<=cols;x++){
    ctx.beginPath(); ctx.moveTo(x*CELL+0.5,0); ctx.lineTo(x*CELL+0.5,rows*CELL); ctx.stroke();
  }
  for(var y=0;y<=rows;y++){
    ctx.beginPath(); ctx.moveTo(0,y*CELL+0.5); ctx.lineTo(cols*CELL,y*CELL+0.5); ctx.stroke();
  }
  // alternate fill for parity
  for(var yy=0;yy<rows;yy++){
    for(var xx=0;xx<cols;xx++){
      if((xx+yy)%2===0){
        ctx.fillStyle='rgba(255,255,255,0.014)';
        ctx.fillRect(xx*CELL,yy*CELL,CELL,CELL);
      }
    }
  }
}

function drawCellMark(cx,cy,color,letter){
  var x=cx*CELL+CELL/2, y=cy*CELL+CELL/2;
  ctx.save();
  ctx.fillStyle=color+'22';
  ctx.fillRect(cx*CELL+2,cy*CELL+2,CELL-4,CELL-4);
  ctx.strokeStyle=color;
  ctx.lineWidth=2;
  ctx.strokeRect(cx*CELL+2,cy*CELL+2,CELL-4,CELL-4);
  ctx.fillStyle=color;
  ctx.font='bold '+Math.floor(CELL*0.4)+'px "Space Grotesk",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(letter,x,y);
  ctx.restore();
}

function drawRover(cx,cy){
  var x=cx*CELL+CELL/2, y=cy*CELL+CELL/2;
  ctx.save();
  // body
  var g=ctx.createRadialGradient(x,y,2,x,y,CELL*0.45);
  g.addColorStop(0,'#a0e8ff');
  g.addColorStop(1,'#2070c8');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,CELL*0.32,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=2;
  ctx.stroke();
  // antenna
  ctx.beginPath();
  ctx.moveTo(x,y-CELL*0.32);
  ctx.lineTo(x,y-CELL*0.5);
  ctx.stroke();
  ctx.fillStyle='#ff6080';
  ctx.beginPath(); ctx.arc(x,y-CELL*0.5,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawDistanceOverlay(){
  var p1=state.pick1, p2=state.pick2;
  var x1=p1.x*CELL+CELL/2, y1=p1.y*CELL+CELL/2;
  var x2=p2.x*CELL+CELL/2, y2=p2.y*CELL+CELL/2;
  ctx.save();
  // diagonal line
  ctx.strokeStyle='rgba(255,180,120,0.6)';
  ctx.lineWidth=2;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  // manhattan L path
  ctx.strokeStyle='rgba(120,200,255,0.55)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
  // delta labels
  var dx=Math.abs(p2.x-p1.x), dy=Math.abs(p2.y-p1.y);
  ctx.fillStyle='#80d8ff';
  ctx.font='bold '+Math.floor(CELL*0.32)+'px "Space Grotesk",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Δx='+dx,(x1+x2)/2,y1-CELL*0.35);
  ctx.fillText('Δy='+dy,x2+CELL*0.45,(y1+y2)/2);
  var man=dx+dy, euc=Math.sqrt(dx*dx+dy*dy);
  ctx.fillStyle='#ffd080';
  ctx.font='bold '+Math.floor(CELL*0.36)+'px "Space Grotesk",sans-serif';
  var mx=(x1+x2)/2, my=(y1+y2)/2;
  ctx.fillText('M='+man+'  D='+euc.toFixed(2),mx,my);
  ctx.restore();
}

function drawPathLine(pts,color,lw){
  if(!pts||pts.length<2) return;
  ctx.save();
  ctx.strokeStyle=color;
  ctx.lineWidth=lw;
  ctx.beginPath();
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    var x=p.x*CELL+CELL/2, y=p.y*CELL+CELL/2;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawQueuePath(){
  if(!state.rover) return;
  var x=state.rover.x, y=state.rover.y;
  var pts=[{x:x,y:y}];
  for(var i=0;i<state.queue.length;i++){
    var cmd=state.queue[i];
    var step=cmd.step||1;
    for(var s=0;s<step;s++){
      if(cmd.d==='N') y-=1;
      else if(cmd.d==='S') y+=1;
      else if(cmd.d==='E') x+=1;
      else if(cmd.d==='W') x-=1;
      pts.push({x:x,y:y});
    }
  }
  drawPathLine(pts,'rgba(255,208,128,0.7)',3);
}

function drawAxisLabels(){
  ctx.save();
  ctx.fillStyle='rgba(200,200,215,0.35)';
  ctx.font='9px "Space Grotesk",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(var i=0;i<state.grid.cols;i++){
    ctx.fillText(i, i*CELL+CELL/2, 8);
  }
  ctx.textAlign='left';
  for(var j=0;j<state.grid.rows;j++){
    ctx.fillText(j, 3, j*CELL+CELL/2);
  }
  ctx.restore();
}

/* ======================= INTERACTIONS ======================= */
function onCanvasClick(e){
  var r=canvas.getBoundingClientRect();
  var cx=Math.floor((e.clientX-r.left)/CELL);
  var cy=Math.floor((e.clientY-r.top)/CELL);
  if(cx<0||cy<0||cx>=state.grid.cols||cy>=state.grid.rows) return;
  if(state.running) return;

  var L=LEVELS[state.lv];
  if(state.mode==='measure'){
    if(L.fixed){
      // L2: draw path from fixed start to fixed end via click sequence
      if(state.pathTrail.length===0) state.pathTrail.push({x:state.pick1.x,y:state.pick1.y});
      var last=state.pathTrail[state.pathTrail.length-1];
      var dx=cx-last.x, dy=cy-last.y;
      if(Math.abs(dx)+Math.abs(dy)!==1){
        flash(t('fbWrong'),'bad');
        return;
      }
      state.pathTrail.push({x:cx,y:cy});
      if(cx===state.pick2.x&&cy===state.pick2.y){
        // finished one path
        state.pathsDone.push(state.pathTrail.slice());
        state.pathTrail=[];
        log('path length = '+(state.pathsDone[state.pathsDone.length-1].length-1),'info');
      }
    } else {
      if(!state.pick1){ state.pick1={x:cx,y:cy}; }
      else if(!state.pick2){ state.pick2={x:cx,y:cy}; }
      else {
        state.pick1={x:cx,y:cy};
        state.pick2=null;
      }
    }
    updateReadout();
  }
}

function onCompass(dir){
  if(state.mode!=='drive') return;
  if(state.running) return;
  if(dir==='CENTER'){
    runQueue();
    return;
  }
  if(dir==='NE'||dir==='NW'||dir==='SE'||dir==='SW'){
    flash('Split diagonal into N/S + E/W','bad');
    return;
  }
  var step=1;
  // default one step; in queue mode ask how many (use prompt)
  if(LEVELS[state.lv].queue){
    var n=parseInt(window.prompt('Steps for '+dir+':','1'),10);
    if(isNaN(n)||n<=0) return;
    step=n;
  }
  state.queue.push({d:dir,step:step});
  log(dir+' '+step,'info');
  if(!LEVELS[state.lv].queue){
    runQueue();
  }
}

function runQueue(){
  if(!state.queue.length){
    flash(t('directionZero'),'bad');
    return;
  }
  state.running=true;
  var idx=0, step=0;
  var cmd=state.queue[idx];
  var tickMs=120;
  state.animStep=setInterval(function(){
    if(idx>=state.queue.length){
      clearInterval(state.animStep);
      state.running=false;
      evalDriveResult();
      state.queue=[];
      return;
    }
    cmd=state.queue[idx];
    var nx=state.rover.x, ny=state.rover.y;
    if(cmd.d==='N') ny-=1;
    else if(cmd.d==='S') ny+=1;
    else if(cmd.d==='E') nx+=1;
    else if(cmd.d==='W') nx-=1;
    if(nx<0||ny<0||nx>=state.grid.cols||ny>=state.grid.rows){
      clearInterval(state.animStep);
      state.running=false;
      flash(t('fbOver'),'bad');
      log('out of bounds','bad');
      state.queue=[];
      return;
    }
    state.rover.x=nx; state.rover.y=ny;
    step++;
    if(step>=cmd.step){ idx++; step=0; }
  },tickMs);
}

function evalDriveResult(){
  state.attempts++;
  if(state.rover.x===state.target.x&&state.rover.y===state.target.y){
    state.correct++;
    state.streak++;
    state.levelCorrect[state.lv]++;
    flash(t('fbCorrect'),'good');
    log('reached target','ok');
  } else {
    state.streak=0;
    flash(t('fbWrong'),'bad');
    log('missed target at ('+state.rover.x+','+state.rover.y+')','bad');
  }
  updateStats();
  buildLevelList();
}

/* ======================= ACTIONS ======================= */
function submitAnswer(){
  var L=LEVELS[state.lv];
  if(state.mode==='drive'){
    runQueue();
    return;
  }
  if(L.id===1){
    if(!state.pick1||!state.pick2){ flash(t('submitPick'),'bad'); return; }
    state.attempts++;
    var dx=Math.abs(state.pick2.x-state.pick1.x);
    var dy=Math.abs(state.pick2.y-state.pick1.y);
    var m=dx+dy;
    if(m>=3){
      state.correct++;
      state.streak++;
      state.levelCorrect[state.lv]++;
      flash(t('fbCorrect')+' · M='+m,'good');
      log('Manhattan='+m+' Diagonal='+Math.sqrt(dx*dx+dy*dy).toFixed(2),'ok');
      // reset for next
      state.pick1=null; state.pick2=null;
    } else {
      state.streak=0;
      flash('need more distance','bad');
    }
  } else if(L.id===2){
    // need at least 2 different paths both equal Manhattan
    if(state.pathsDone.length<1){ flash('draw a path first','bad'); return; }
    state.attempts++;
    var unique={};
    var refLen=Math.abs(L.end.x-L.start.x)+Math.abs(L.end.y-L.start.y);
    var allOk=true;
    for(var i=0;i<state.pathsDone.length;i++){
      var p=state.pathsDone[i];
      var len=p.length-1;
      var sig=p.map(function(pt){return pt.x+','+pt.y;}).join('-');
      if(len!==refLen) allOk=false;
      unique[sig]=true;
    }
    if(allOk && Object.keys(unique).length>=2 && state.pathsDone.length>=2){
      state.correct++;
      state.streak++;
      state.levelCorrect[state.lv]++;
      flash(t('fbSame')+' · M='+refLen,'good');
      log('2 different paths, both Manhattan='+refLen,'ok');
      // clear for next attempt if not done
      if(state.levelCorrect[state.lv]<L.needCorrect){
        state.pathsDone=[]; state.pathTrail=[];
      }
    } else if(!allOk){
      state.streak=0;
      flash('path length differs','bad');
    } else {
      flash('draw a second different path','info');
    }
  } else if(L.id===3){
    if(!state.pick1||!state.pick2){ flash(t('submitPick'),'bad'); return; }
    state.attempts++;
    var ddx=Math.abs(state.pick2.x-state.pick1.x);
    var ddy=Math.abs(state.pick2.y-state.pick1.y);
    var euc=Math.sqrt(ddx*ddx+ddy*ddy);
    var man=ddx+ddy;
    // want pair where euc < man (i.e. both nonzero)
    if(ddx>0 && ddy>0 && euc < man - 0.2){
      state.correct++;
      state.streak++;
      state.levelCorrect[state.lv]++;
      flash('M='+man+' D='+euc.toFixed(2),'good');
      log('Manhattan '+man+' > Diagonal '+euc.toFixed(2),'ok');
      state.pick1=null; state.pick2=null;
    } else {
      state.streak=0;
      flash('need a non-aligned pair','bad');
    }
  }
  updateStats();
  updateReadout();
  buildLevelList();
  if(state.levelCorrect[state.lv]>=L.needCorrect){
    flash(t('submitDone'),'good');
    log('level '+(state.lv+1)+' complete','ok');
    setTimeout(function(){
      if(state.lv<LEVELS.length-1) loadLevel(state.lv+1);
    },1000);
  }
}

function resetCurrent(){
  loadLevel(state.lv);
}

function showHint(){
  var L=LEVELS[state.lv];
  flash(t(L.hintKey),'info');
  log(t(L.hintKey),'info');
}

/* ======================= READOUTS ======================= */
function updateReadout(){
  if(state.pick1 && state.pick2){
    var p1=state.pick1, p2=state.pick2;
    var dx=p2.x-p1.x, dy=p2.y-p1.y;
    $('valStart').textContent='('+p1.x+','+p1.y+')';
    $('valEnd').textContent='('+p2.x+','+p2.y+')';
    $('valDx').textContent=dx;
    $('valDy').textContent=dy;
    var man=Math.abs(dx)+Math.abs(dy);
    var euc=Math.sqrt(dx*dx+dy*dy);
    $('valMan').textContent=man;
    $('valEuc').textContent=euc.toFixed(2);
    $('readGrid').textContent=man;
    $('readDiag').textContent=euc.toFixed(2);
    $('readDir').textContent=directionWord(dx,dy);
  } else if(state.mode==='drive' && state.rover && state.target){
    var dxr=state.target.x-state.rover.x;
    var dyr=state.target.y-state.rover.y;
    $('valStart').textContent='('+state.rover.x+','+state.rover.y+')';
    $('valEnd').textContent='('+state.target.x+','+state.target.y+')';
    $('valDx').textContent=dxr;
    $('valDy').textContent=dyr;
    var manR=Math.abs(dxr)+Math.abs(dyr);
    var eucR=Math.sqrt(dxr*dxr+dyr*dyr);
    $('valMan').textContent=manR;
    $('valEuc').textContent=eucR.toFixed(2);
    $('readGrid').textContent=manR;
    $('readDiag').textContent=eucR.toFixed(2);
    $('readDir').textContent=directionWord(dxr,dyr);
  } else {
    $('valStart').textContent='-';
    $('valEnd').textContent='-';
    $('valDx').textContent='-';
    $('valDy').textContent='-';
    $('valMan').textContent='-';
    $('valEuc').textContent='-';
    $('readGrid').textContent='-';
    $('readDiag').textContent='-';
    $('readDir').textContent='-';
  }
}

function directionWord(dx,dy){
  if(dx===0 && dy===0) return '·';
  var h = dx>0 ? 'E' : (dx<0 ? 'W' : '');
  var v = dy>0 ? 'S' : (dy<0 ? 'N' : '');
  return v+h;
}

function updateStats(){
  $('statCorrect').textContent=state.correct;
  $('statAttempts').textContent=state.attempts;
  $('statStreak').textContent=state.streak;
}

/* ======================= FEEDBACK ======================= */
var fbTimer=null;
function flash(msg,kind){
  var el=$('feedback');
  el.textContent=msg;
  el.className='feedback show '+(kind||'');
  if(fbTimer) clearTimeout(fbTimer);
  fbTimer=setTimeout(function(){
    el.classList.remove('show');
  },900);
}

function log(msg,kind){
  var el=$('log');
  var d=document.createElement('div');
  d.className='ln '+(kind||'');
  d.textContent=msg;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
  while(el.children.length>60) el.removeChild(el.firstChild);
}

/* ======================= BOOT ======================= */
window.addEventListener('load',function(){
  setTimeout(init,30);
});

})();
</script>
