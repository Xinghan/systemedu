<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars Annotation Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e12;color:#f6f6fc;font-family:'Inter','Noto Sans SC',sans-serif;user-select:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px 4px;flex-shrink:0;}
.header-left h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#50ffb0;text-shadow:0 0 12px rgba(80,255,176,0.3);letter-spacing:-0.02em;}
.header-left .sub{font-size:10px;color:#aaabb0;letter-spacing:0.1em;text-transform:uppercase;}
.header-right{display:flex;gap:8px;align-items:center;}
.lang-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#50ffb0;letter-spacing:1px;}
.lang-btn:hover{color:#fff;}

/* Main content */
.game-area{flex:1;min-height:0;display:flex;overflow:hidden;padding:4px 12px 8px;gap:10px;}

/* Left: canvas area */
.canvas-panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.canvas-wrap{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;}
.canvas-wrap canvas{border:2px solid rgba(80,255,176,0.2);background:#0f0a14;cursor:crosshair;}

/* Right: toolbar */
.toolbar{width:180px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:4px 0;}
.tool-section-title{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;color:#aaabb0;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
.terrain-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.04em;padding:8px 12px;border:2px solid rgba(80,255,176,0.2);background:rgba(20,20,35,0.85);color:#aaabb0;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.terrain-btn:hover{border-color:rgba(80,255,176,0.5);color:#ddd;}
.terrain-btn.active{border-color:#50ffb0;color:#50ffb0;box-shadow:0 0 12px rgba(80,255,176,0.2);}
.terrain-swatch{width:16px;height:16px;border:1px solid rgba(255,255,255,0.15);flex-shrink:0;}
.terrain-swatch.soil{background:rgba(184,154,106,0.7);}
.terrain-swatch.bedrock{background:rgba(138,125,110,0.7);}
.terrain-swatch.bigrock{background:rgba(74,74,80,0.8);}
.terrain-swatch.sand{background:rgba(212,168,68,0.7);}

.action-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;padding:8px 14px;border:none;cursor:pointer;transition:all 0.2s;}
.undo-btn{background:rgba(255,107,74,0.12);color:#ff6b4a;border:1px solid rgba(255,107,74,0.3);}
.undo-btn:hover{background:rgba(255,107,74,0.2);border-color:#ff6b4a;}
.undo-btn:disabled{opacity:0.3;cursor:default;}
.clear-btn{background:rgba(255,200,60,0.1);color:#ffc83c;border:1px solid rgba(255,200,60,0.3);}
.clear-btn:hover{background:rgba(255,200,60,0.18);border-color:#ffc83c;}
.clear-btn:disabled{opacity:0.3;cursor:default;}
.submit-btn{background:linear-gradient(135deg,#50ffb0,#17df93);color:#0c0e12;font-size:12px;box-shadow:0 0 12px rgba(80,255,176,0.3);}
.submit-btn:hover{transform:scale(1.03);}
.submit-btn:disabled{opacity:0.4;cursor:default;transform:none;}

.divider{height:1px;background:rgba(80,255,176,0.1);margin:4px 0;}

/* HUD */
.hud{display:flex;flex-direction:column;gap:3px;margin-top:auto;}
.hud-row{display:flex;justify-content:space-between;align-items:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:500;color:#aaabb0;letter-spacing:0.05em;}
.hud-value{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;}

/* Result overlay */
.result-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(12,14,18,0.94);backdrop-filter:blur(10px);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;}
.result-overlay.visible{display:flex;}
.result-overlay h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#50ffb0;text-shadow:0 0 20px rgba(80,255,176,0.4);}
.score-big{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:#f6f6fc;}
.result-stats{display:flex;gap:20px;margin:6px 0;}
.stat-item{text-align:center;}
.stat-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#aaabb0;letter-spacing:0.08em;text-transform:uppercase;}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#50ffb0;}
.result-msg{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#aaabb0;max-width:380px;text-align:center;line-height:1.6;}
.result-detail{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:4px 0;}
.detail-chip{font-family:'Space Grotesk',sans-serif;font-size:10px;padding:3px 8px;border:1px solid rgba(80,255,176,0.15);background:rgba(20,20,35,0.8);color:#aaabb0;}
.detail-chip .chip-label{color:#50ffb0;font-weight:700;}
.restart-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:10px 28px;border:none;cursor:pointer;color:#0c0e12;background:linear-gradient(135deg,#50ffb0,#17df93);box-shadow:0 0 12px rgba(80,255,176,0.3);margin-top:6px;}
.restart-btn:hover{transform:scale(1.04);}

/* Intro overlay */
.intro-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(12,14,18,0.96);backdrop-filter:blur(12px);z-index:60;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;}
.intro-overlay.visible{display:flex;}
.intro-overlay h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#50ffb0;text-shadow:0 0 20px rgba(80,255,176,0.4);}
.intro-text{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#ccc;max-width:440px;text-align:center;line-height:1.8;}
.intro-legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;font-size:11px;color:#aaabb0;}
.legend-swatch{width:18px;height:18px;border:1px solid rgba(255,255,255,0.2);}
.start-btn{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:12px 32px;border:none;cursor:pointer;color:#0c0e12;background:linear-gradient(135deg,#50ffb0,#17df93);box-shadow:0 0 16px rgba(80,255,176,0.3);margin-top:8px;letter-spacing:0.05em;}
.start-btn:hover{transform:scale(1.05);}

/* Tooltip */
.tooltip{position:absolute;font-family:'Noto Sans SC',sans-serif;font-size:11px;padding:4px 8px;background:rgba(20,20,35,0.95);border:1px solid rgba(80,255,176,0.3);color:#ddd;pointer-events:none;z-index:40;white-space:nowrap;display:none;}

@media (max-width: 640px) {
  .game-area{flex-direction:column;padding:4px 8px 6px;}
  .toolbar{width:100%;flex-direction:row;flex-wrap:wrap;gap:4px;align-items:center;}
  .tool-section-title{display:none;}
  .terrain-btn{padding:6px 10px;font-size:11px;}
  .hud{flex-direction:row;gap:10px;margin-top:0;}
  .divider{display:none;}
  .action-btn{padding:6px 10px;font-size:10px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <h1 id="title"></h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <div class="header-right">
      <button class="lang-btn" id="langBtn">CN</button>
    </div>
  </div>

  <div class="game-area" id="gameArea">
    <div class="canvas-panel">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="terrainCanvas"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>
    </div>

    <div class="toolbar" id="toolbar">
      <div class="tool-section-title" id="sectionLabel"></div>
      <button class="terrain-btn active" data-type="soil" id="btnSoil">
        <span class="terrain-swatch soil"></span><span id="labelSoil"></span>
      </button>
      <button class="terrain-btn" data-type="bedrock" id="btnBedrock">
        <span class="terrain-swatch bedrock"></span><span id="labelBedrock"></span>
      </button>
      <button class="terrain-btn" data-type="bigrock" id="btnBigrock">
        <span class="terrain-swatch bigrock"></span><span id="labelBigrock"></span>
      </button>
      <button class="terrain-btn" data-type="sand" id="btnSand">
        <span class="terrain-swatch sand"></span><span id="labelSand"></span>
      </button>

      <div class="divider"></div>
      <button class="action-btn undo-btn" id="undoBtn" disabled></button>
      <button class="action-btn clear-btn" id="clearBtn" disabled></button>
      <button class="action-btn submit-btn" id="submitBtn" disabled></button>

      <div class="divider"></div>
      <div class="hud">
        <div class="hud-row">
          <span class="hud-label" id="hudLabelAnnotated"></span>
          <span class="hud-value" id="hudAnnotated">0</span>
        </div>
        <div class="hud-row">
          <span class="hud-label" id="hudLabelCoverage"></span>
          <span class="hud-value" id="hudCoverage">0%</span>
        </div>
        <div class="hud-row">
          <span class="hud-label" id="hudLabelCurrent"></span>
          <span class="hud-value" id="hudCurrent"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Intro overlay -->
  <div class="intro-overlay visible" id="introOverlay">
    <h2 id="introTitle"></h2>
    <div class="intro-text" id="introText"></div>
    <div class="intro-legend" id="introLegend"></div>
    <button class="start-btn" id="startBtn"></button>
  </div>

  <!-- Result overlay -->
  <div class="result-overlay" id="resultOverlay">
    <h2 id="resultTitle"></h2>
    <div class="score-big" id="resultScore"></div>
    <div class="result-stats" id="resultStats"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="restart-btn" id="restartBtn"></button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ===== i18n ===== */
var lang = 'cn';
function t(k) { return (I18N[k] && I18N[k][lang]) || k; }

var I18N = {
  title:          {en:'MARS ANNOTATION WORKSHOP', cn:'火星标注工作坊'},
  subtitle:       {en:'AI4MARS TERRAIN LABELING SIMULATION', cn:'AI4Mars 地形标注模拟'},
  sectionLabel:   {en:'ANNOTATION TOOL', cn:'标注工具'},
  soil:           {en:'Soil', cn:'土壤'},
  bedrock:        {en:'Bedrock', cn:'基岩'},
  bigrock:        {en:'Big Rock', cn:'大石块'},
  sand:           {en:'Sand', cn:'沙地'},
  undo:           {en:'UNDO', cn:'撤销'},
  clearAll:       {en:'CLEAR ALL', cn:'全部清除'},
  submit:         {en:'SUBMIT', cn:'提交标注'},
  annotated:      {en:'Annotated', cn:'已标注'},
  coverage:       {en:'Coverage', cn:'覆盖率'},
  current:        {en:'Current', cn:'当前类别'},
  introTitle:     {en:'Mars Annotation Workshop', cn:'火星标注工作坊'},
  introText:      {en:'You are a NASA AI4Mars annotation volunteer. Your mission: label terrain types on a procedurally generated Mars surface map by dragging rectangles over grid cells. Select a terrain category, then click-drag to annotate regions. Aim for both high accuracy and full coverage.',
                   cn:'你是 NASA AI4Mars 标注志愿者。任务: 在程序生成的火星地形图上，用鼠标拖拽矩形框来标注不同地形区域。选择一种地形类别，然后按住鼠标拖动来标注区域。目标: 尽量提高准确率和覆盖率。'},
  startBtn:       {en:'START MISSION', cn:'开始任务'},
  resultTitle:    {en:'Annotation Report', cn:'标注报告'},
  accuracy:       {en:'Accuracy', cn:'准确率'},
  coverageLabel:  {en:'Coverage', cn:'覆盖率'},
  composite:      {en:'Score', cn:'综合得分'},
  perfect:        {en:'Outstanding! Your annotations are extremely accurate. This is the quality real AI training data needs.',
                   cn:'非常出色! 你的标注非常准确。这正是训练 AI 所需的高质量数据。'},
  good:           {en:'Good work! But notice the errors -- different annotators often disagree, which is why real projects use multiple labelers.',
                   cn:'不错! 但注意那些错误 -- 不同标注者经常存在分歧，这就是为什么真实项目需要多人标注。'},
  average:        {en:'Annotation is harder than it looks! This is why manual labeling is so time-consuming and why AI-assisted labeling tools are being developed.',
                   cn:'标注比看起来要难! 这就是为什么手工标注如此耗时，也是人们开发 AI 辅助标注工具的原因。'},
  restart:        {en:'NEW MAP', cn:'再来一张'},
  tooltipDrag:    {en:'Click & drag to annotate', cn:'按住拖动以标注'},
  showAnswer:     {en:'Show Answer', cn:'显示答案'},
  hideAnswer:     {en:'Hide Answer', cn:'隐藏答案'},
  correct:        {en:'Correct', cn:'正确'},
  wrong:          {en:'Wrong', cn:'错误'},
  missed:         {en:'Missed', cn:'未标注'},
};

/* ===== Constants ===== */
var COLS = 12, ROWS = 8;
var TOTAL_CELLS = COLS * ROWS;
var TERRAIN_TYPES = ['soil', 'bedrock', 'bigrock', 'sand'];
var TERRAIN_PROBS = {soil: 0.35, bedrock: 0.25, bigrock: 0.15, sand: 0.25};

/* Overlay colors for annotations */
var OVERLAY_COLORS = {
  soil:    'rgba(184, 154, 106, 0.45)',
  bedrock: 'rgba(138, 125, 110, 0.45)',
  bigrock: 'rgba(74, 74, 80, 0.55)',
  sand:    'rgba(212, 168, 68, 0.45)'
};
var OVERLAY_BORDER = {
  soil:    'rgba(184, 154, 106, 0.8)',
  bedrock: 'rgba(138, 125, 110, 0.8)',
  bigrock: 'rgba(100, 100, 110, 0.8)',
  sand:    'rgba(212, 168, 68, 0.8)'
};

/* ===== State ===== */
var groundTruth = [];       // ROWS x COLS ground truth terrain
var annotations = [];       // ROWS x COLS player annotations (null = not annotated)
var annotationHistory = []; // stack for undo: each entry = {row, col, prev}
var selectedType = 'soil';
var isDragging = false;
var dragStart = null;       // {col, row}
var dragEnd = null;         // {col, row}
var submitted = false;
var showingAnswer = false;

/* Canvas */
var canvas = document.getElementById('terrainCanvas');
var ctx2d = canvas.getContext('2d');
var cellW = 0, cellH = 0;
var canvasLogW = 0, canvasLogH = 0;

/* ===== Seeded RNG ===== */
function seededRandom(seed) {
  var s = seed;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

/* ===== Generate terrain ===== */
function generateTerrain() {
  var seed = Math.floor(Math.random() * 999999);
  var rng = seededRandom(seed);
  groundTruth = [];
  for (var r = 0; r < ROWS; r++) {
    groundTruth[r] = [];
    for (var c = 0; c < COLS; c++) {
      var roll = rng();
      if (roll < TERRAIN_PROBS.soil) groundTruth[r][c] = 'soil';
      else if (roll < TERRAIN_PROBS.soil + TERRAIN_PROBS.bedrock) groundTruth[r][c] = 'bedrock';
      else if (roll < TERRAIN_PROBS.soil + TERRAIN_PROBS.bedrock + TERRAIN_PROBS.bigrock) groundTruth[r][c] = 'bigrock';
      else groundTruth[r][c] = 'sand';
    }
  }
  /* Make terrain slightly more clustered: smooth pass */
  var smoothed = [];
  for (var r = 0; r < ROWS; r++) {
    smoothed[r] = [];
    for (var c = 0; c < COLS; c++) {
      var counts = {};
      for (var dr = -1; dr <= 1; dr++) {
        for (var dc = -1; dc <= 1; dc++) {
          var nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            var tt = groundTruth[nr][nc];
            counts[tt] = (counts[tt] || 0) + 1;
          }
        }
      }
      /* Current cell has extra weight */
      counts[groundTruth[r][c]] = (counts[groundTruth[r][c]] || 0) + 2;
      var best = groundTruth[r][c], bestN = 0;
      for (var k in counts) {
        if (counts[k] > bestN) { bestN = counts[k]; best = k; }
      }
      smoothed[r][c] = best;
    }
  }
  groundTruth = smoothed;
  return seed;
}

/* ===== Clear annotations ===== */
function clearAnnotations() {
  annotations = [];
  for (var r = 0; r < ROWS; r++) {
    annotations[r] = [];
    for (var c = 0; c < COLS; c++) {
      annotations[r][c] = null;
    }
  }
  annotationHistory = [];
}

/* ===== Canvas sizing ===== */
function sizeCanvas() {
  var wrap = document.getElementById('canvasWrap');
  var rect = wrap.getBoundingClientRect();
  var availW = rect.width - 8;
  var availH = rect.height - 8;
  /* Maintain 12:8 aspect ratio */
  var aspect = COLS / ROWS;
  var w, h;
  if (availW / availH > aspect) {
    h = availH;
    w = h * aspect;
  } else {
    w = availW;
    h = w / aspect;
  }
  w = Math.max(Math.floor(w), 120);
  h = Math.max(Math.floor(h), 80);
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
  canvasLogW = w;
  canvasLogH = h;
  cellW = w / COLS;
  cellH = h / ROWS;
}

/* ===== Draw terrain cell texture ===== */
function drawCellTexture(col, row, rng) {
  var x = col * cellW;
  var y = row * cellH;

  switch (groundTruth[row][col]) {
    case 'soil': {
      /* Light brown base + scattered dots */
      var grd = ctx2d.createLinearGradient(x, y, x + cellW, y + cellH);
      grd.addColorStop(0, '#8B6A4B');
      grd.addColorStop(1, '#7A5C3D');
      ctx2d.fillStyle = grd;
      ctx2d.fillRect(x, y, cellW, cellH);
      /* Dots */
      ctx2d.fillStyle = 'rgba(160,130,90,0.6)';
      for (var i = 0; i < 8; i++) {
        var dx = x + rng() * cellW;
        var dy = y + rng() * cellH;
        ctx2d.beginPath();
        ctx2d.arc(dx, dy, 0.5 + rng() * 1.2, 0, Math.PI * 2);
        ctx2d.fill();
      }
      /* Subtle noise */
      ctx2d.fillStyle = 'rgba(100,70,40,0.15)';
      for (var i = 0; i < 4; i++) {
        var dx = x + rng() * cellW;
        var dy = y + rng() * cellH;
        ctx2d.fillRect(dx, dy, 1 + rng() * 2, 1);
      }
      break;
    }
    case 'bedrock': {
      /* Gray-brown base + horizontal lines */
      var grd = ctx2d.createLinearGradient(x, y, x, y + cellH);
      grd.addColorStop(0, '#6E635A');
      grd.addColorStop(0.5, '#5A504A');
      grd.addColorStop(1, '#6E635A');
      ctx2d.fillStyle = grd;
      ctx2d.fillRect(x, y, cellW, cellH);
      /* Horizontal layers */
      ctx2d.strokeStyle = 'rgba(90,75,65,0.5)';
      ctx2d.lineWidth = 0.8;
      for (var i = 0; i < 4; i++) {
        var ly = y + (i + 0.5) * (cellH / 4) + (rng() - 0.5) * 2;
        ctx2d.beginPath();
        ctx2d.moveTo(x, ly);
        ctx2d.lineTo(x + cellW, ly + (rng() - 0.5) * 1.5);
        ctx2d.stroke();
      }
      /* Subtle cracks */
      ctx2d.strokeStyle = 'rgba(40,35,30,0.3)';
      ctx2d.lineWidth = 0.5;
      var cx = x + rng() * cellW;
      var cy = y + rng() * cellH;
      ctx2d.beginPath();
      ctx2d.moveTo(cx, cy);
      ctx2d.lineTo(cx + (rng() - 0.5) * cellW * 0.5, cy + rng() * cellH * 0.4);
      ctx2d.stroke();
      break;
    }
    case 'bigrock': {
      /* Dark gray base + irregular blocks */
      ctx2d.fillStyle = '#3A3A40';
      ctx2d.fillRect(x, y, cellW, cellH);
      /* Lighter ground around */
      ctx2d.fillStyle = 'rgba(80,70,60,0.4)';
      ctx2d.fillRect(x, y + cellH * 0.6, cellW, cellH * 0.4);
      /* Rock shapes */
      ctx2d.fillStyle = '#2A2A30';
      var rx = x + cellW * 0.15 + rng() * cellW * 0.2;
      var ry = y + cellH * 0.1 + rng() * cellH * 0.15;
      var rw = cellW * 0.4 + rng() * cellW * 0.3;
      var rh = cellH * 0.4 + rng() * cellH * 0.25;
      ctx2d.beginPath();
      ctx2d.moveTo(rx, ry + rh);
      ctx2d.lineTo(rx + rw * 0.2, ry);
      ctx2d.lineTo(rx + rw * 0.8, ry + rh * 0.1);
      ctx2d.lineTo(rx + rw, ry + rh * 0.7);
      ctx2d.lineTo(rx + rw * 0.6, ry + rh);
      ctx2d.closePath();
      ctx2d.fill();
      /* Shadow */
      ctx2d.fillStyle = 'rgba(0,0,0,0.2)';
      ctx2d.fillRect(rx + rw * 0.3, ry + rh, rw * 0.5, cellH * 0.08);
      /* Highlight edge */
      ctx2d.strokeStyle = 'rgba(110,110,120,0.4)';
      ctx2d.lineWidth = 0.6;
      ctx2d.beginPath();
      ctx2d.moveTo(rx + rw * 0.2, ry);
      ctx2d.lineTo(rx + rw * 0.8, ry + rh * 0.1);
      ctx2d.stroke();
      break;
    }
    case 'sand': {
      /* Orange-yellow base + wavy lines */
      var grd = ctx2d.createLinearGradient(x, y, x + cellW, y + cellH);
      grd.addColorStop(0, '#B08838');
      grd.addColorStop(0.5, '#C89840');
      grd.addColorStop(1, '#A07830');
      ctx2d.fillStyle = grd;
      ctx2d.fillRect(x, y, cellW, cellH);
      /* Wave ripples */
      ctx2d.strokeStyle = 'rgba(180,140,60,0.45)';
      ctx2d.lineWidth = 0.7;
      for (var i = 0; i < 4; i++) {
        var wy = y + (i + 0.5) * (cellH / 4);
        ctx2d.beginPath();
        ctx2d.moveTo(x, wy);
        for (var wx = 0; wx < cellW; wx += 3) {
          ctx2d.lineTo(x + wx, wy + Math.sin(wx * 0.3 + rng() * 2) * 1.5);
        }
        ctx2d.stroke();
      }
      /* Fine grain */
      ctx2d.fillStyle = 'rgba(220,180,80,0.25)';
      for (var i = 0; i < 5; i++) {
        ctx2d.beginPath();
        ctx2d.arc(x + rng() * cellW, y + rng() * cellH, 0.4 + rng() * 0.6, 0, Math.PI * 2);
        ctx2d.fill();
      }
      break;
    }
  }
}

/* ===== Full render ===== */
function render() {
  sizeCanvas();
  var rng = seededRandom(42);

  /* Draw all terrain cells */
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      drawCellTexture(c, r, rng);
    }
  }

  /* Grid lines */
  ctx2d.strokeStyle = 'rgba(80,255,176,0.08)';
  ctx2d.lineWidth = 0.5;
  for (var c = 0; c <= COLS; c++) {
    ctx2d.beginPath();
    ctx2d.moveTo(c * cellW, 0);
    ctx2d.lineTo(c * cellW, canvasLogH);
    ctx2d.stroke();
  }
  for (var r = 0; r <= ROWS; r++) {
    ctx2d.beginPath();
    ctx2d.moveTo(0, r * cellH);
    ctx2d.lineTo(canvasLogW, r * cellH);
    ctx2d.stroke();
  }

  /* Draw annotations */
  if (!showingAnswer) {
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (annotations[r][c]) {
          var tp = annotations[r][c];
          ctx2d.fillStyle = OVERLAY_COLORS[tp];
          ctx2d.fillRect(c * cellW, r * cellH, cellW, cellH);
          /* Border */
          ctx2d.strokeStyle = OVERLAY_BORDER[tp];
          ctx2d.lineWidth = 1;
          ctx2d.strokeRect(c * cellW + 0.5, r * cellH + 0.5, cellW - 1, cellH - 1);
        }
      }
    }
  }

  /* If submitted, show comparison */
  if (submitted) {
    if (showingAnswer) {
      /* Show ground truth */
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          var gt = groundTruth[r][c];
          ctx2d.fillStyle = OVERLAY_COLORS[gt];
          ctx2d.fillRect(c * cellW, r * cellH, cellW, cellH);
          ctx2d.strokeStyle = OVERLAY_BORDER[gt];
          ctx2d.lineWidth = 1;
          ctx2d.strokeRect(c * cellW + 0.5, r * cellH + 0.5, cellW - 1, cellH - 1);
        }
      }
    } else {
      /* Show diff: highlight errors in red */
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (annotations[r][c] && annotations[r][c] !== groundTruth[r][c]) {
            /* Wrong annotation - red highlight */
            ctx2d.fillStyle = 'rgba(255, 70, 50, 0.35)';
            ctx2d.fillRect(c * cellW, r * cellH, cellW, cellH);
            ctx2d.strokeStyle = 'rgba(255, 70, 50, 0.8)';
            ctx2d.lineWidth = 1.5;
            ctx2d.strokeRect(c * cellW + 0.5, r * cellH + 0.5, cellW - 1, cellH - 1);
            /* Cross mark */
            ctx2d.strokeStyle = 'rgba(255, 70, 50, 0.6)';
            ctx2d.lineWidth = 1;
            ctx2d.beginPath();
            ctx2d.moveTo(c * cellW + 3, r * cellH + 3);
            ctx2d.lineTo((c + 1) * cellW - 3, (r + 1) * cellH - 3);
            ctx2d.moveTo((c + 1) * cellW - 3, r * cellH + 3);
            ctx2d.lineTo(c * cellW + 3, (r + 1) * cellH - 3);
            ctx2d.stroke();
          } else if (annotations[r][c] && annotations[r][c] === groundTruth[r][c]) {
            /* Correct - green subtle checkmark */
            ctx2d.fillStyle = 'rgba(80, 255, 176, 0.1)';
            ctx2d.fillRect(c * cellW, r * cellH, cellW, cellH);
          }
        }
      }
    }
  }

  /* Draw drag preview */
  if (isDragging && dragStart && dragEnd) {
    var minC = Math.min(dragStart.col, dragEnd.col);
    var maxC = Math.max(dragStart.col, dragEnd.col);
    var minR = Math.min(dragStart.row, dragEnd.row);
    var maxR = Math.max(dragStart.row, dragEnd.row);
    for (var r = minR; r <= maxR; r++) {
      for (var c = minC; c <= maxC; c++) {
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          ctx2d.fillStyle = OVERLAY_COLORS[selectedType];
          ctx2d.fillRect(c * cellW, r * cellH, cellW, cellH);
        }
      }
    }
    /* Dashed rectangle border */
    ctx2d.setLineDash([4, 3]);
    ctx2d.strokeStyle = '#50ffb0';
    ctx2d.lineWidth = 1.5;
    ctx2d.strokeRect(
      minC * cellW, minR * cellH,
      (maxC - minC + 1) * cellW, (maxR - minR + 1) * cellH
    );
    ctx2d.setLineDash([]);
  }
}

/* ===== Mouse helpers ===== */
function getCellFromEvent(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var scaleX = canvasLogW / rect.width;
  var scaleY = canvasLogH / rect.height;
  var col = Math.floor(mx * scaleX / cellW);
  var row = Math.floor(my * scaleY / cellH);
  col = Math.max(0, Math.min(col, COLS - 1));
  row = Math.max(0, Math.min(row, ROWS - 1));
  return {col: col, row: row};
}

/* ===== Mouse events ===== */
canvas.addEventListener('mousedown', function(e) {
  if (submitted) return;
  e.preventDefault();
  isDragging = true;
  dragStart = getCellFromEvent(e);
  dragEnd = dragStart;
  render();
});

canvas.addEventListener('mousemove', function(e) {
  if (submitted) return;
  var cell = getCellFromEvent(e);

  /* Update tooltip */
  var tooltip = document.getElementById('tooltip');
  if (!isDragging && !submitted) {
    tooltip.style.display = 'block';
    var rect = canvas.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + canvas.offsetLeft + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top + canvas.offsetTop - 8) + 'px';
    if (annotations[cell.row][cell.col]) {
      tooltip.textContent = t(annotations[cell.row][cell.col]);
    } else {
      tooltip.textContent = t('tooltipDrag');
    }
  } else {
    tooltip.style.display = 'none';
  }

  if (isDragging) {
    dragEnd = cell;
    render();
  }
});

canvas.addEventListener('mouseup', function(e) {
  if (!isDragging || submitted) return;
  isDragging = false;
  dragEnd = getCellFromEvent(e);

  /* Apply annotation */
  var minC = Math.min(dragStart.col, dragEnd.col);
  var maxC = Math.max(dragStart.col, dragEnd.col);
  var minR = Math.min(dragStart.row, dragEnd.row);
  var maxR = Math.max(dragStart.row, dragEnd.row);

  var batch = [];
  for (var r = minR; r <= maxR; r++) {
    for (var c = minC; c <= maxC; c++) {
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        batch.push({row: r, col: c, prev: annotations[r][c]});
        annotations[r][c] = selectedType;
      }
    }
  }
  if (batch.length > 0) {
    annotationHistory.push(batch);
  }

  dragStart = null;
  dragEnd = null;
  updateHUD();
  render();
});

canvas.addEventListener('mouseleave', function() {
  document.getElementById('tooltip').style.display = 'none';
  if (isDragging) {
    isDragging = false;
    dragStart = null;
    dragEnd = null;
    render();
  }
});

/* Touch support */
canvas.addEventListener('touchstart', function(e) {
  if (submitted) return;
  e.preventDefault();
  var touch = e.touches[0];
  isDragging = true;
  dragStart = getCellFromEvent(touch);
  dragEnd = dragStart;
  render();
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
  if (!isDragging || submitted) return;
  e.preventDefault();
  var touch = e.touches[0];
  dragEnd = getCellFromEvent(touch);
  render();
}, {passive: false});

canvas.addEventListener('touchend', function(e) {
  if (!isDragging || submitted) return;
  isDragging = false;
  if (!dragStart || !dragEnd) { render(); return; }

  var minC = Math.min(dragStart.col, dragEnd.col);
  var maxC = Math.max(dragStart.col, dragEnd.col);
  var minR = Math.min(dragStart.row, dragEnd.row);
  var maxR = Math.max(dragStart.row, dragEnd.row);

  var batch = [];
  for (var r = minR; r <= maxR; r++) {
    for (var c = minC; c <= maxC; c++) {
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        batch.push({row: r, col: c, prev: annotations[r][c]});
        annotations[r][c] = selectedType;
      }
    }
  }
  if (batch.length > 0) {
    annotationHistory.push(batch);
  }

  dragStart = null;
  dragEnd = null;
  updateHUD();
  render();
});

/* ===== Toolbar events ===== */
var terrainBtns = document.querySelectorAll('.terrain-btn');
terrainBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    if (submitted) return;
    selectedType = btn.dataset.type;
    terrainBtns.forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    updateHUD();
  });
});

/* Undo */
document.getElementById('undoBtn').addEventListener('click', function() {
  if (submitted || annotationHistory.length === 0) return;
  var batch = annotationHistory.pop();
  for (var i = 0; i < batch.length; i++) {
    annotations[batch[i].row][batch[i].col] = batch[i].prev;
  }
  updateHUD();
  render();
});

/* Clear all */
document.getElementById('clearBtn').addEventListener('click', function() {
  if (submitted) return;
  clearAnnotations();
  updateHUD();
  render();
});

/* Submit */
document.getElementById('submitBtn').addEventListener('click', function() {
  if (submitted) return;
  submitted = true;
  showResults();
  render();
});

/* Restart */
document.getElementById('restartBtn').addEventListener('click', function() {
  document.getElementById('resultOverlay').classList.remove('visible');
  startGame();
});

/* Start button */
document.getElementById('startBtn').addEventListener('click', function() {
  document.getElementById('introOverlay').classList.remove('visible');
  startGame();
});

/* Lang */
document.getElementById('langBtn').addEventListener('click', function() {
  lang = lang === 'cn' ? 'en' : 'cn';
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  applyI18N();
  updateHUD();
  render();
});

/* ===== HUD ===== */
function updateHUD() {
  var annotated = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (annotations[r][c]) annotated++;
    }
  }
  var coverage = (annotated / TOTAL_CELLS * 100).toFixed(0);

  document.getElementById('hudAnnotated').textContent = annotated + '/' + TOTAL_CELLS;
  document.getElementById('hudCoverage').textContent = coverage + '%';
  document.getElementById('hudCurrent').textContent = t(selectedType);

  document.getElementById('undoBtn').disabled = annotationHistory.length === 0 || submitted;
  document.getElementById('clearBtn').disabled = annotated === 0 || submitted;
  document.getElementById('submitBtn').disabled = annotated === 0 || submitted;
}

/* ===== Results ===== */
function showResults() {
  var annotatedCount = 0, correctCount = 0;
  var perType = {};
  TERRAIN_TYPES.forEach(function(tt) {
    perType[tt] = {annotated: 0, correct: 0, total: 0};
  });

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      perType[groundTruth[r][c]].total++;
      if (annotations[r][c]) {
        annotatedCount++;
        perType[annotations[r][c]].annotated++;
        if (annotations[r][c] === groundTruth[r][c]) {
          correctCount++;
          perType[groundTruth[r][c]].correct++;
        }
      }
    }
  }

  var accuracy = annotatedCount > 0 ? (correctCount / annotatedCount * 100) : 0;
  var coverage = annotatedCount / TOTAL_CELLS * 100;
  var composite = accuracy * coverage / 100;

  document.getElementById('resultScore').textContent = composite.toFixed(0);

  /* Stats */
  var statsEl = document.getElementById('resultStats');
  statsEl.innerHTML = '';
  var statsData = [
    {label: t('accuracy'), value: accuracy.toFixed(1) + '%'},
    {label: t('coverageLabel'), value: coverage.toFixed(1) + '%'},
  ];
  statsData.forEach(function(sd) {
    var item = document.createElement('div');
    item.className = 'stat-item';
    item.innerHTML = '<div class="stat-label">' + sd.label + '</div><div class="stat-value">' + sd.value + '</div>';
    statsEl.appendChild(item);
  });

  /* Detail chips */
  var detailEl = document.getElementById('resultDetail');
  detailEl.innerHTML = '';
  TERRAIN_TYPES.forEach(function(tt) {
    var d = perType[tt];
    var chip = document.createElement('span');
    chip.className = 'detail-chip';
    chip.innerHTML = '<span class="chip-label">' + t(tt) + '</span> ' +
      d.correct + '/' + d.total + ' ' + t('correct');
    detailEl.appendChild(chip);
  });

  /* Add show/hide answer toggle button */
  var toggleBtn = document.createElement('button');
  toggleBtn.className = 'action-btn';
  toggleBtn.style.cssText = 'margin-top:4px;background:rgba(80,255,176,0.1);color:#50ffb0;border:1px solid rgba(80,255,176,0.3);font-family:Space Grotesk,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;padding:6px 14px;cursor:pointer;';
  toggleBtn.textContent = t('showAnswer');
  toggleBtn.id = 'toggleAnswerBtn';
  toggleBtn.addEventListener('click', function() {
    showingAnswer = !showingAnswer;
    toggleBtn.textContent = showingAnswer ? t('hideAnswer') : t('showAnswer');
    render();
  });
  detailEl.appendChild(document.createElement('br'));
  detailEl.appendChild(toggleBtn);

  /* Message */
  var msg = '';
  if (composite >= 85) msg = t('perfect');
  else if (composite >= 55) msg = t('good');
  else msg = t('average');
  document.getElementById('resultMsg').textContent = msg;

  document.getElementById('resultOverlay').classList.add('visible');
}

/* ===== i18n apply ===== */
function applyI18N() {
  document.getElementById('title').textContent = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('sectionLabel').textContent = t('sectionLabel');
  document.getElementById('labelSoil').textContent = t('soil');
  document.getElementById('labelBedrock').textContent = t('bedrock');
  document.getElementById('labelBigrock').textContent = t('bigrock');
  document.getElementById('labelSand').textContent = t('sand');
  document.getElementById('undoBtn').textContent = t('undo');
  document.getElementById('clearBtn').textContent = t('clearAll');
  document.getElementById('submitBtn').textContent = t('submit');
  document.getElementById('hudLabelAnnotated').textContent = t('annotated');
  document.getElementById('hudLabelCoverage').textContent = t('coverage');
  document.getElementById('hudLabelCurrent').textContent = t('current');
  document.getElementById('resultTitle').textContent = t('resultTitle');
  document.getElementById('restartBtn').textContent = t('restart');

  /* Intro */
  document.getElementById('introTitle').textContent = t('introTitle');
  document.getElementById('introText').textContent = t('introText');
  document.getElementById('startBtn').textContent = t('startBtn');

  /* Legend */
  var legendEl = document.getElementById('introLegend');
  legendEl.innerHTML = '';
  TERRAIN_TYPES.forEach(function(tt) {
    var item = document.createElement('div');
    item.className = 'legend-item';
    var swatch = document.createElement('div');
    swatch.className = 'legend-swatch';
    var colors = {soil: '#8B6A4B', bedrock: '#5A504A', bigrock: '#3A3A40', sand: '#B08838'};
    swatch.style.background = colors[tt];
    var label = document.createElement('span');
    label.textContent = t(tt);
    item.appendChild(swatch);
    item.appendChild(label);
    legendEl.appendChild(item);
  });

  /* Update toggle button if exists */
  var toggleBtn = document.getElementById('toggleAnswerBtn');
  if (toggleBtn) {
    toggleBtn.textContent = showingAnswer ? t('hideAnswer') : t('showAnswer');
  }
}

/* ===== Start game ===== */
function startGame() {
  submitted = false;
  showingAnswer = false;
  generateTerrain();
  clearAnnotations();
  selectedType = 'soil';
  terrainBtns.forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-type="soil"]').classList.add('active');
  updateHUD();
  render();
}

/* ===== Init ===== */
function init() {
  generateTerrain();
  clearAnnotations();
  applyI18N();
  updateHUD();
  sizeCanvas();
  render();
}

window.addEventListener('resize', function() {
  render();
});

init();

})();
</script>
