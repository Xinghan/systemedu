<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>Risk Mapping Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;color:#e5e2e1;font-family:'Noto Sans SC','Inter',sans-serif}
.wrapper{display:flex;flex-direction:column;height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px 6px;border-bottom:1px solid rgba(138,136,134,0.15);flex-shrink:0}
.title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;letter-spacing:0.5px}
.subtitle{font-size:10px;color:#8a8886;margin-top:1px}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.main-area{flex:1;min-height:0;display:flex;padding:8px 16px;gap:16px;overflow:hidden}
.grid-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0}
.grid-title{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#ffb59c;margin-bottom:6px;letter-spacing:0.5px}
.grid-container{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(6,1fr);gap:2px;width:100%;max-width:340px;aspect-ratio:1}
.grid-cell{display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.9);transition:background 0.3s ease;position:relative}
.grid-header{background:transparent !important;color:#8a8886;font-size:9px;font-weight:400}
.controls-section{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;justify-content:center;overflow-y:auto}
.slider-group{background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);padding:8px 10px}
.slider-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.slider-name{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#e5e2e1;display:flex;align-items:center;gap:6px}
.slider-swatch{width:12px;height:12px;display:inline-block;flex-shrink:0}
.slider-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;min-width:20px;text-align:right}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:rgba(138,136,134,0.3);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;background:#ffb59c;cursor:pointer}
input[type=range]::-moz-range-thumb{width:16px;height:16px;background:#ffb59c;border:none;cursor:pointer}
.stats-panel{background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);padding:8px 10px;flex-shrink:0}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:2px 0}
.stat-label{color:#8a8886;font-family:'Space Grotesk',sans-serif;font-size:10px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px}
.challenge-panel{background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);padding:8px 10px;flex-shrink:0}
.challenge-title{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#ffb59c;margin-bottom:4px}
.challenge-item{font-size:11px;padding:3px 0;display:flex;align-items:center;gap:6px}
.challenge-check{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886}
.challenge-check.done{color:#22c55e}
.hud{display:flex;justify-content:space-around;align-items:center;padding:6px 16px;background:rgba(0,0,0,0.55);min-height:38px;flex-shrink:0}
.hud-item{display:flex;flex-direction:column;align-items:center}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#8a8886}
.hud-value{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#e5e2e1;font-weight:500;margin-top:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:36vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:14px;font-size:10px;line-height:1.6}
.guide-content.collapsed{display:none}
.complete-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.complete-card{background:rgba(28,27,27,0.95);border:1px solid rgba(255,181,156,0.3);padding:24px;max-width:380px;text-align:center}
.complete-card h2{font-family:'Space Grotesk',sans-serif;color:#ffb59c;font-size:18px;margin-bottom:12px}
.complete-card p{font-size:13px;line-height:1.6;margin-bottom:8px}
.complete-card .btn-close{margin-top:12px;padding:8px 20px;font-family:'Space Grotesk',sans-serif;font-size:12px;background:rgba(255,181,156,0.15);border:1px solid #ffb59c;color:#ffb59c;cursor:pointer}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
<h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
<div class="guide-content" id="guideContent">
<p id="guideGoal" style="margin-bottom:6px"></p>
<ul id="guideSteps"></ul>
<p id="guideTip" style="margin-top:6px;font-style:italic;color:#ffb59c;font-size:10px"></p>
</div>
</div>
<div class="complete-overlay" id="completeOverlay">
<div class="complete-card">
<h2 id="completeTitle"></h2>
<p id="completeMsg"></p>
<p id="completeSummary" style="color:#ffb59c;font-size:12px"></p>
<button class="btn-close" id="completeClose"></button>
</div>
</div>
<div class="wrapper">
<div class="header">
<div>
<div class="title" id="mainTitle"></div>
<div class="subtitle" id="mainSubtitle"></div>
</div>
</div>
<div class="main-area game-area">
<div class="grid-section">
<div class="grid-title" id="gridTitle"></div>
<div class="grid-container" id="gridContainer"></div>
</div>
<div class="controls-section" id="controlsSection">
</div>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-value" id="hudV4"></div></div>
</div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'RISK MAPPING SIMULATOR',cn:'\u98ce\u9669\u6620\u5c04\u8c03\u8282\u5668'},
  subtitle:{en:'P-MARS-01-M21 \u00b7 Tune LUT, observe risk map changes',cn:'P-MARS-01-M21 \u00b7 \u8c03\u8282 LUT\uff0c\u89c2\u5bdf\u98ce\u9669\u5730\u56fe\u53d8\u5316'},
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideGoal:{en:'Adjust risk values for 5 terrain types via sliders. Observe real-time risk map and passable area changes.',cn:'\u901a\u8fc7\u62d6\u52a8 5 \u4e2a\u6ed1\u5757\u8c03\u8282\u5404\u5730\u8c8c\u7c7b\u578b\u7684\u98ce\u9669\u503c\uff0c\u5b9e\u65f6\u89c2\u5bdf\u98ce\u9669\u5730\u56fe\u548c\u53ef\u901a\u884c\u9762\u79ef\u7684\u53d8\u5316\u3002'},
  guideS1:{en:'Step 1: Observe default LUT configuration',cn:'\u7b2c1\u6b65\uff1a\u89c2\u5bdf\u9ed8\u8ba4 LUT \u914d\u7f6e'},
  guideS2:{en:'Step 2: Drag a single slider, watch local changes',cn:'\u7b2c2\u6b65\uff1a\u62d6\u52a8\u5355\u4e2a\u6ed1\u5757\uff0c\u89c2\u5bdf\u5c40\u90e8\u53d8\u5316'},
  guideS3:{en:'Step 3: Complete two challenge missions',cn:'\u7b2c3\u6b65\uff1a\u5b8c\u6210\u4e24\u4e2a\u6311\u6218\u4efb\u52a1'},
  guideTip:{en:'Tip: Setting unknown too low ignores potential danger; too high makes too many areas impassable',cn:'\u63d0\u793a\uff1aunknown \u8bbe\u5f97\u592a\u4f4e\u53ef\u80fd\u5ffd\u7565\u6f5c\u5728\u5371\u9669\uff0c\u8bbe\u5f97\u592a\u9ad8\u4f1a\u8ba9\u592a\u591a\u533a\u57df\u4e0d\u53ef\u901a\u884c'},
  gridTitle:{en:'MARS TERRAIN RISK MAP (6x6)',cn:'\u706b\u661f\u5730\u8c8c\u98ce\u9669\u5730\u56fe (6\u00d76)'},
  soil:{en:'SOIL',cn:'\u571f\u58e4'},
  bedrock:{en:'BEDROCK',cn:'\u57fa\u5ca9'},
  sand:{en:'SAND',cn:'\u6c99\u5730'},
  bigRock:{en:'BIG ROCK',cn:'\u5927\u5ca9\u77f3'},
  unknown:{en:'UNKNOWN',cn:'\u672a\u77e5'},
  passableArea:{en:'PASSABLE AREA',cn:'\u53ef\u901a\u884c\u9762\u79ef'},
  avgRisk:{en:'AVG RISK',cn:'\u5e73\u5747\u98ce\u9669'},
  safeCount:{en:'SAFE CELLS',cn:'\u5b89\u5168\u7f51\u683c'},
  dangerCount:{en:'DANGER CELLS',cn:'\u5371\u9669\u7f51\u683c'},
  challengeTitle:{en:'CHALLENGES',cn:'\u6311\u6218\u4efb\u52a1'},
  ch1:{en:'Aggressive: passable > 70%',cn:'\u6fc0\u8fdb\u65b9\u6848\uff1a\u53ef\u901a\u884c > 70%'},
  ch2:{en:'Conservative: passable < 30%',cn:'\u4fdd\u5b88\u65b9\u6848\uff1a\u53ef\u901a\u884c < 30%'},
  notDone:{en:'[ ]',cn:'[ ]'},
  done:{en:'[OK]',cn:'[\u5b8c\u6210]'},
  hL1:{en:'TERRAIN TYPES',cn:'\u5730\u8c8c\u7c7b\u578b'},
  hL2:{en:'RISK RANGE',cn:'\u98ce\u9669\u8303\u56f4'},
  hL3:{en:'THRESHOLD',cn:'\u53ef\u901a\u884c\u9608\u503c'},
  hL4:{en:'STATUS',cn:'\u72b6\u6001'},
  hV1:{en:'5 classes',cn:'5 \u79cd'},
  hV2:{en:'0 - 4',cn:'0 - 4'},
  hV3:{en:'risk \u2264 1',cn:'\u98ce\u9669 \u2264 1'},
  completeTitle:{en:'MISSION COMPLETE',cn:'\u4efb\u52a1\u5b8c\u6210'},
  completeMsg:{en:'You discovered that different LUT configurations can shift passable area from <30% to >70%. This is the core engineering trade-off in risk remapping: safety vs efficiency.',cn:'\u4f60\u53d1\u73b0\u4e86\u4e0d\u540c\u7684 LUT \u914d\u7f6e\u53ef\u4ee5\u8ba9\u53ef\u901a\u884c\u9762\u79ef\u4ece <30% \u53d8\u5230 >70%\u3002\u8fd9\u5c31\u662f\u98ce\u9669\u91cd\u7f16\u7801\u7684\u6838\u5fc3\u5de5\u7a0b\u6743\u8861\uff1a\u5b89\u5168\u6027 vs \u901a\u884c\u6548\u7387\u3002'},
  completeSummary:{en:'Mapping design is mission-dependent, not fixed.',cn:'\u6620\u5c04\u65b9\u6848\u662f\u4efb\u52a1\u76f8\u5173\u7684\uff0c\u800c\u4e0d\u662f\u56fa\u5b9a\u7684\u3002'},
  closeBtn:{en:'CLOSE',cn:'\u5173\u95ed'},
  inProgress:{en:'IN PROGRESS',cn:'\u8fdb\u884c\u4e2d'},
  allDone:{en:'ALL DONE',cn:'\u5168\u90e8\u5b8c\u6210'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

// 6x6 terrain grid (0=soil,1=bedrock,2=sand,3=big_rock,4=unknown)
var terrainGrid=[
  [1,1,0,0,2,4],
  [0,1,1,0,2,2],
  [0,0,1,0,2,4],
  [2,0,0,3,0,4],
  [1,0,3,3,0,0],
  [1,1,0,0,4,4]
];
var terrainLabels=['SOL','BED','SND','ROK','UNK'];
var semanticColors=['#c4a882','#8b9dc3','#e8d44d','#d35400','#7f8c8d'];
var riskColors=['#22c55e','#84cc16','#eab308','#f97316','#ef4444'];
// Current LUT values
var lut=[1,0,2,4,3]; // soil=1,bedrock=0,sand=2,bigrock=4,unknown=3
var defaultLut=[1,0,2,4,3];
var sliderKeys=['soil','bedrock','sand','bigRock','unknown'];

var ch1Done=false, ch2Done=false;

function buildGrid(){
  var container=document.getElementById('gridContainer');
  container.innerHTML='';
  // header row
  var corner=document.createElement('div');corner.className='grid-cell grid-header';corner.textContent='';
  container.appendChild(corner);
  for(var c=0;c<5;c++){
    var hdr=document.createElement('div');hdr.className='grid-cell grid-header';hdr.textContent=(c+1);
    container.appendChild(hdr);
  }
  // data rows
  for(var r=0;r<5;r++){
    var rowHdr=document.createElement('div');rowHdr.className='grid-cell grid-header';rowHdr.textContent=String.fromCharCode(65+r);
    container.appendChild(rowHdr);
    for(var c2=0;c2<5;c2++){
      var cell=document.createElement('div');
      cell.className='grid-cell';
      cell.dataset.row=''+r;cell.dataset.col=''+c2;
      container.appendChild(cell);
    }
  }
  updateGrid();
}

function updateGrid(){
  var cells=document.querySelectorAll('.grid-cell:not(.grid-header)');
  cells.forEach(function(cell){
    var r=parseInt(cell.dataset.row);
    var c=parseInt(cell.dataset.col);
    var ti=terrainGrid[r][c];
    var rv=lut[ti];
    var bg=riskColors[rv];
    // gradient
    cell.style.background='linear-gradient(135deg, '+bg+', '+darken(bg,0.25)+')';
    cell.textContent=''+rv;
    cell.title=terrainLabels[ti]+' -> risk '+rv;
  });
  updateStats();
  checkChallenges();
}

function darken(hex,amount){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*(1-amount));g=Math.round(g*(1-amount));b=Math.round(b*(1-amount));
  return'#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

function calcStats(){
  var total=25;
  var safe=0,danger=0,sum=0;
  for(var r=0;r<5;r++){
    for(var c=0;c<5;c++){
      var rv=lut[terrainGrid[r][c]];
      sum+=rv;
      if(rv<=1)safe++;
      if(rv>=3)danger++;
    }
  }
  return{passable:Math.round(safe/total*100),avg:(sum/total).toFixed(1),safe:safe,danger:danger};
}

function updateStats(){
  var s=calcStats();
  document.getElementById('statPassable').textContent=s.passable+'%';
  document.getElementById('statPassable').style.color=s.passable>50?'#22c55e':'#ef4444';
  document.getElementById('statAvg').textContent=s.avg;
  document.getElementById('statSafe').textContent=''+s.safe;
  document.getElementById('statDanger').textContent=''+s.danger;
  document.getElementById('hudV4').textContent=(!ch1Done||!ch2Done)?t('inProgress'):t('allDone');
}

function checkChallenges(){
  var s=calcStats();
  if(s.passable>70&&!ch1Done){ch1Done=true;}
  if(s.passable<30&&!ch2Done){ch2Done=true;}
  updateChallengeUI();
  if(ch1Done&&ch2Done){
    showComplete();
  }
}

function updateChallengeUI(){
  var c1=document.getElementById('ch1Status');
  var c2=document.getElementById('ch2Status');
  c1.textContent=ch1Done?t('done'):t('notDone');
  c1.className='challenge-check'+(ch1Done?' done':'');
  c2.textContent=ch2Done?t('done'):t('notDone');
  c2.className='challenge-check'+(ch2Done?' done':'');
}

var completeShown=false;
function showComplete(){
  if(completeShown)return;
  completeShown=true;
  document.getElementById('completeOverlay').style.display='flex';
}

function buildControls(){
  var section=document.getElementById('controlsSection');
  section.innerHTML='';
  // Sliders
  for(var i=0;i<5;i++){
    (function(idx){
      var group=document.createElement('div');group.className='slider-group';
      var label=document.createElement('div');label.className='slider-label';
      var nameSpan=document.createElement('span');nameSpan.className='slider-name';
      var swatch=document.createElement('span');swatch.className='slider-swatch';
      swatch.style.background=semanticColors[idx];
      nameSpan.appendChild(swatch);
      var nameText=document.createElement('span');nameText.id='sliderName'+idx;
      nameSpan.appendChild(nameText);
      var valSpan=document.createElement('span');valSpan.className='slider-val';valSpan.id='sliderVal'+idx;
      valSpan.style.color=riskColors[lut[idx]];
      label.appendChild(nameSpan);label.appendChild(valSpan);
      var slider=document.createElement('input');slider.type='range';slider.min='0';slider.max='4';slider.value=''+lut[idx];
      slider.id='slider'+idx;
      slider.addEventListener('input',function(){
        var v=parseInt(this.value);
        lut[idx]=v;
        valSpan.textContent=''+v;
        valSpan.style.color=riskColors[v];
        updateGrid();
      });
      group.appendChild(label);group.appendChild(slider);
      section.appendChild(group);
    })(i);
  }
  // Stats panel
  var sp=document.createElement('div');sp.className='stats-panel';
  sp.innerHTML='<div class="stat-row"><span class="stat-label" id="statLabelPass"></span><span class="stat-value" id="statPassable"></span></div>'
    +'<div class="stat-row"><span class="stat-label" id="statLabelAvg"></span><span class="stat-value" id="statAvg"></span></div>'
    +'<div class="stat-row"><span class="stat-label" id="statLabelSafe"></span><span class="stat-value" id="statSafe"></span></div>'
    +'<div class="stat-row"><span class="stat-label" id="statLabelDanger"></span><span class="stat-value" id="statDanger"></span></div>';
  section.appendChild(sp);
  // Challenge panel
  var cp=document.createElement('div');cp.className='challenge-panel';
  cp.innerHTML='<div class="challenge-title" id="challengeTitle"></div>'
    +'<div class="challenge-item"><span class="challenge-check" id="ch1Status"></span><span id="ch1Text"></span></div>'
    +'<div class="challenge-item"><span class="challenge-check" id="ch2Status"></span><span id="ch2Text"></span></div>';
  section.appendChild(cp);
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSubtitle').textContent=t('subtitle');
  document.getElementById('gridTitle').textContent=t('gridTitle');
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  // slider names
  for(var i=0;i<5;i++){
    var el=document.getElementById('sliderName'+i);
    if(el)el.textContent=t(sliderKeys[i]);
    var vl=document.getElementById('sliderVal'+i);
    if(vl){vl.textContent=''+lut[i];vl.style.color=riskColors[lut[i]];}
  }
  // stat labels
  var sl1=document.getElementById('statLabelPass');if(sl1)sl1.textContent=t('passableArea');
  var sl2=document.getElementById('statLabelAvg');if(sl2)sl2.textContent=t('avgRisk');
  var sl3=document.getElementById('statLabelSafe');if(sl3)sl3.textContent=t('safeCount');
  var sl4=document.getElementById('statLabelDanger');if(sl4)sl4.textContent=t('dangerCount');
  // challenge
  var ct=document.getElementById('challengeTitle');if(ct)ct.textContent=t('challengeTitle');
  var c1t=document.getElementById('ch1Text');if(c1t)c1t.textContent=t('ch1');
  var c2t=document.getElementById('ch2Text');if(c2t)c2t.textContent=t('ch2');
  updateChallengeUI();
  // guide
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  document.getElementById('guideTip').textContent=t('guideTip');
  var pts=document.getElementById('guideSteps');pts.innerHTML='';
  ['guideS1','guideS2','guideS3'].forEach(function(k){var li=document.createElement('li');li.textContent=t(k);pts.appendChild(li);});
  // hud
  document.getElementById('hudL1').textContent=t('hL1');
  document.getElementById('hudL2').textContent=t('hL2');
  document.getElementById('hudL3').textContent=t('hL3');
  document.getElementById('hudL4').textContent=t('hL4');
  document.getElementById('hudV1').textContent=t('hV1');
  document.getElementById('hudV2').textContent=t('hV2');
  document.getElementById('hudV3').textContent=t('hV3');
  // complete
  document.getElementById('completeTitle').textContent=t('completeTitle');
  document.getElementById('completeMsg').textContent=t('completeMsg');
  document.getElementById('completeSummary').textContent=t('completeSummary');
  document.getElementById('completeClose').textContent=t('closeBtn');
  updateStats();
}

// Events
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  refreshI18N();
});

document.getElementById('guideToggle').addEventListener('click',function(){
  var gc=document.getElementById('guideContent');
  var arr=document.getElementById('guideArrow');
  if(gc.classList.contains('collapsed')){gc.classList.remove('collapsed');arr.textContent='-';}
  else{gc.classList.add('collapsed');arr.textContent='+';}
});

document.getElementById('completeClose').addEventListener('click',function(){
  document.getElementById('completeOverlay').style.display='none';
});

// Init
buildControls();
buildGrid();
refreshI18N();
})();
</script>
