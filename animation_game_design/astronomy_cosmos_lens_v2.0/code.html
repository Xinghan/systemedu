<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cosmos Lens | Infinite Horizon</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#1a0063",
              "on-secondary-container": "#725f00",
              "on-surface": "#e2e0f5",
              "tertiary": "#c5c6cc",
              "tertiary-fixed-dim": "#c5c6cc",
              "on-primary": "#2e009c",
              "on-tertiary-container": "#84878c",
              "error-container": "#93000a",
              "on-primary-fixed-variant": "#441cc8",
              "primary": "#c9bfff",
              "on-error": "#690005",
              "background": "#0a0a14",
              "on-secondary-fixed-variant": "#544600",
              "surface-container": "#1e1e2d",
              "outline-variant": "#47464e",
              "surface-container-high": "#282938",
              "error": "#ffb4ab",
              "on-tertiary": "#2e3135",
              "primary-container": "#1e006e",
              "on-secondary-fixed": "#221b00",
              "surface": "#0a0a14",
              "on-primary-container": "#8771ff",
              "secondary-container": "#ffdb3c",
              "tertiary-container": "#1c1f24",
              "outline": "#918f99",
              "primary-fixed": "#e5deff",
              "secondary": "#fff9ef",
              "on-error-container": "#ffdad6",
              "surface-container-low": "#191a29",
              "tertiary-fixed": "#e1e2e8",
              "on-tertiary-fixed": "#191c20",
              "surface-container-lowest": "#0c0d1b",
              "surface-bright": "#373848",
              "inverse-surface": "#e2e0f5",
              "on-background": "#e2e0f5",
              "on-secondary": "#3a3000",
              "primary-fixed-dim": "#c9bfff",
              "surface-container-highest": "#333343",
              "on-tertiary-fixed-variant": "#44474c",
              "on-surface-variant": "#c8c5cf",
              "secondary-fixed": "#ffe16d",
              "surface-dim": "#111220",
              "surface-tint": "#c9bfff",
              "inverse-primary": "#5d3fe0",
              "secondary-fixed-dim": "#e9c400",
              "surface-variant": "#333343",
              "inverse-on-surface": "#2e2f3f"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        .gravitational-lens {
            background: radial-gradient(circle at center, transparent 30%, rgba(201, 191, 255, 0.05) 50%, transparent 70%);
            backdrop-filter: blur(2px) contrast(1.1);
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .star-cluster {
            animation: pulse-slow 8s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-hidden selection:bg-primary/30">
<div class="fixed inset-0 noise-overlay z-[100]"></div>
<!-- Infinite Horizon Background Environment -->
<div class="fixed inset-0 z-0 overflow-hidden bg-[#05050a]">
<!-- Deep Space Core Base -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#1a0033]/30 to-[#05050a]"></div>
<!-- High-Fidelity Galaxy Core Visualization -->
<div class="absolute inset-0 opacity-80 mix-blend-screen bg-cover bg-center" data-alt="stunning ultra-high resolution galactic core with intense white-blue light radiating from the center through deep indigo and violet space dust" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AA72580a5676a08f5127f87968393e83b499ca0921f009968413f27f80f68d6e_b77e235e1564f89d31d45c58b4728f3a')"></div>
<!-- Star Clusters (Ethereal overlays) -->
<div class="absolute top-[10%] left-[15%] w-[300px] h-[300px] bg-primary/10 rounded-full blur-[80px] star-cluster"></div>
<div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px] star-cluster" style="animation-delay: 2s;"></div>
<!-- Gravitational Lenses (Subtle visual distortions) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] gravitational-lens rounded-full opacity-40"></div>
<div class="absolute top-1/4 right-1/4 w-96 h-96 gravitational-lens rounded-full opacity-20"></div>
<!-- Atmospheric Glows -->
<div class="absolute inset-0 bg-radial-gradient from-transparent via-background/40 to-background"></div>
</div>
<!-- TopNavBar -->
<header class="fixed top-0 w-full bg-[#0a0a14]/60 backdrop-blur-xl z-50 flex justify-between items-center px-12 py-6 border-b border-white/5">
<div class="text-2xl font-bold tracking-widest text-[#c9bfff] font-headline uppercase">Cosmos Lens</div>
<nav class="hidden md:flex items-center gap-10 font-headline tracking-[0.05em] uppercase text-sm">
<a class="text-[#fff9ef] border-b-2 border-[#ffdb3c] pb-1 transition-all" href="#">Planetary</a>
<a class="text-[#c9bfff]/60 hover:text-[#c9bfff] transition-colors duration-300" href="#">Stellar</a>
<a class="text-[#c9bfff]/60 hover:text-[#c9bfff] transition-colors duration-300" href="#">Galactic</a>
</nav>
<div class="flex items-center gap-6">
<button class="hover:bg-surface-container-high p-2 rounded-full transition-all duration-300">
<span class="material-symbols-outlined text-[#c9bfff]" data-icon="settings">settings</span>
</button>
<button class="hover:bg-surface-container-high p-2 rounded-full transition-all duration-300">
<span class="material-symbols-outlined text-[#c9bfff]" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- SideNavBar (HUD Console) -->
<aside class="fixed left-0 top-1/2 -translate-y-1/2 w-64 flex flex-col p-6 z-40 bg-[#1e1e2d]/60 backdrop-blur-2xl rounded-r-3xl h-[716px] my-auto border-r border-[#c9bfff]/10 shadow-[20px_0_40px_rgba(0,0,0,0.4)] font-headline tracking-wider">
<div class="mb-10 px-3">
<h3 class="text-[#c9bfff] font-bold text-lg">HUD Console</h3>
<p class="text-[#c9bfff]/50 text-xs uppercase tracking-widest">Real-time Telemetry</p>
</div>
<div class="flex flex-col gap-4">
<div class="flex items-center gap-4 bg-primary-container/40 text-[#ffdb3c] rounded-lg p-3 cursor-pointer group transition-all duration-300 hover:translate-x-2">
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
<span class="text-sm">Orbital Data</span>
</div>
<div class="flex items-center gap-4 text-[#c9bfff]/70 p-3 cursor-pointer group transition-all duration-300 hover:translate-x-2 hover:text-[#c9bfff]">
<span class="material-symbols-outlined" data-icon="wb_sunny">wb_sunny</span>
<span class="text-sm">Luminosity</span>
</div>
<div class="flex items-center gap-4 text-[#c9bfff]/70 p-3 cursor-pointer group transition-all duration-300 hover:translate-x-2 hover:text-[#c9bfff]">
<span class="material-symbols-outlined" data-icon="blur_circular">blur_circular</span>
<span class="text-sm">Gravity Wells</span>
</div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="relative h-screen flex items-center justify-center pt-20 px-12 ml-64 mb-24">
<!-- Central Stage: Solar System Visualization -->
<div class="relative w-full max-w-4xl aspect-square flex items-center justify-center">
<!-- Stellar Core -->
<div class="absolute w-32 h-32 rounded-full bg-secondary shadow-[0_0_100px_rgba(255,249,239,0.6)] z-10"></div>
<div class="absolute w-40 h-40 rounded-full border border-primary/20 animate-[spin_20s_linear_infinite]"></div>
<!-- Orbital Paths -->
<div class="absolute w-64 h-64 border border-primary/10 rounded-full"></div>
<div class="absolute w-[450px] h-[450px] border border-primary/10 rounded-full"></div>
<div class="absolute w-[650px] h-[650px] border border-primary/10 rounded-full"></div>
<!-- Planets (Symbolic) -->
<div class="absolute w-6 h-6 bg-primary rounded-full blur-[1px]" style="transform: translate(110px, -60px)"></div>
<div class="absolute w-10 h-10 bg-primary-fixed-dim rounded-full blur-[1px]" style="transform: translate(-200px, 100px)"></div>
<div class="absolute w-4 h-4 bg-secondary-container rounded-full shadow-[0_0_15px_rgba(255,219,60,0.8)]" style="transform: translate(280px, 150px)"></div>
<!-- SVG Diagram Overlay -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-20" viewbox="0 0 1000 1000">
<circle class="text-primary/10" cx="500" cy="500" fill="none" r="150" stroke="currentColor" stroke-dasharray="10 10"></circle>
<circle class="text-primary/10" cx="500" cy="500" fill="none" r="300" stroke="currentColor" stroke-dasharray="2 5"></circle>
<line class="text-primary/10" stroke="currentColor" stroke-width="0.5" x1="500" x2="500" y1="0" y2="1000"></line>
<line class="text-primary/10" stroke="currentColor" stroke-width="0.5" x1="0" x2="1000" y1="500" y2="500"></line>
</svg>
</div>
<!-- HUD Widgets -->
<div class="absolute top-12 right-12 w-80 space-y-6">
<!-- Luminosity Chart -->
<div class="bg-surface-container/60 backdrop-blur-xl rounded-xl p-6 border border-primary/20 shadow-xl">
<div class="flex justify-between items-center mb-4">
<span class="font-label text-xs tracking-widest text-primary/80 uppercase">Luminosity Index</span>
<span class="material-symbols-outlined text-secondary-container text-sm" data-icon="trending_up">trending_up</span>
</div>
<div class="h-24 w-full flex items-end gap-1 px-1">
<div class="w-full bg-primary/20 h-[60%] rounded-sm"></div>
<div class="w-full bg-primary/20 h-[40%] rounded-sm"></div>
<div class="w-full bg-primary/20 h-[80%] rounded-sm"></div>
<div class="w-full bg-primary/40 h-[95%] rounded-sm border-t-2 border-secondary-container"></div>
<div class="w-full bg-primary/20 h-[70%] rounded-sm"></div>
<div class="w-full bg-primary/20 h-[50%] rounded-sm"></div>
</div>
<div class="mt-4 flex justify-between font-label text-[10px] text-primary/40">
<span>400nm</span>
<span>700nm</span>
</div>
</div>
<!-- Gravity Well Monitor -->
<div class="bg-surface-container/60 backdrop-blur-xl rounded-xl p-6 border border-primary/20 shadow-xl">
<span class="font-label text-xs tracking-widest text-primary/80 uppercase block mb-4">Gravity Resonance</span>
<div class="relative h-32 w-full flex items-center justify-center">
<div class="absolute w-20 h-20 border border-secondary-container/30 rounded-full animate-ping"></div>
<div class="absolute w-12 h-12 border border-secondary-container/60 rounded-full"></div>
<div class="w-2 h-2 bg-secondary-container rounded-full"></div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="text-3xl font-headline font-bold text-secondary">0.98<span class="text-xs font-normal text-primary/50 ml-1">G</span></span>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Playback Controls) -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-[#0a0a14]/80 backdrop-blur-md rounded-t-[2.5rem] flex justify-center gap-16 items-center px-10 pb-8 pt-4 border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<button class="flex flex-col items-center justify-center text-[#c9bfff]/40 hover:text-[#c9bfff] transition-all group active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="fast_rewind">fast_rewind</span>
<span class="font-label text-[10px] uppercase tracking-widest">Rewind</span>
</button>
<button class="flex flex-col items-center justify-center text-[#c9bfff]/40 hover:text-[#c9bfff] transition-all group active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1 text-3xl" data-icon="play_circle">play_circle</span>
<span class="font-label text-[10px] uppercase tracking-widest">Play/Pause</span>
</button>
<button class="flex flex-col items-center justify-center text-[#c9bfff]/40 hover:text-[#c9bfff] transition-all group active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="fast_forward">fast_forward</span>
<span class="font-label text-[10px] uppercase tracking-widest">Fast Forward</span>
</button>
<button class="flex flex-col items-center justify-center scale-110 text-[#ffdb3c] group active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="history_toggle_off">history_toggle_off</span>
<span class="font-label text-[10px] uppercase tracking-widest">Time-lapse</span>
</button>
</footer>
<!-- Global Progress Bar -->
<div class="fixed top-[88px] left-0 w-full h-[1px] bg-white/5 overflow-hidden z-[60]">
<div class="h-full w-1/3 bg-gradient-to-r from-transparent via-primary to-transparent animate-[lightspeed_3s_linear_infinite]"></div>
</div>
<style>
        @keyframes lightspeed {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
</body></html>
