<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>配对连线</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg1:#0f172a;--bg2:#1e1b4b;--accent:#818cf8;--green:#4ADE80;--red:#F87171;--card:#ffffff0e;--border:#ffffff1a;--text:#f1f5f9;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;font-family:'Nunito','PingFang SC',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);user-select:none}

#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:52px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--border);flex-shrink:0}
#topic{font-size:15px;font-weight:800;color:#e0e7ff}
.badge{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1);font-size:12px;font-weight:700}
.badge.pts{color:#fbbf24}
.badge.prog{color:#a5f3fc}

#prompt-bar{padding:7px 16px;background:rgba(129,140,248,.2);border-bottom:1px solid rgba(129,140,248,.25);font-size:13px;font-weight:600;color:#c7d2fe;flex-shrink:0;min-height:34px;display:flex;align-items:center}

#game{flex:1;display:flex;gap:0;min-height:0;overflow:hidden;position:relative}

/* SVG connector layer */
#svg-layer{position:absolute;inset:0;pointer-events:none;z-index:5}

/* columns */
.col{flex:1;display:flex;flex-direction:column;gap:6px;padding:10px 8px;overflow-y:auto}
.col-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);text-align:center;padding-bottom:4px;flex-shrink:0}

.pair-card{border-radius:14px;padding:10px 12px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:border-color .15s,background .15s;position:relative;text-align:center;line-height:1.3;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px;will-change:transform}
.pair-card:hover:not(.matched):not(.selected){background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.pair-card.selected{border-color:var(--accent);background:rgba(129,140,248,.2);box-shadow:0 0 0 2px rgba(129,140,248,.4)}
.pair-card.matched{border-color:var(--green);background:rgba(74,222,128,.12);cursor:default;opacity:.75}
.pair-card.wrong-flash{border-color:var(--red)}

.pair-emoji{font-size:20px;line-height:1;flex-shrink:0}

/* win */
#win{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%)}
#win-title{font-size:26px;font-weight:900;color:#e0e7ff;text-align:center}
#win-sub{font-size:14px;color:var(--dim)}
#win-btn{padding:11px 32px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #4f46e5}
#win-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #4f46e5}

#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div style="display:flex;flex-direction:column;height:100vh">
  <div id="header">
    <span id="topic"></span>
    <div style="display:flex;gap:8px">
      <span class="badge pts" id="score-el">0 分</span>
      <span class="badge prog" id="prog-el">0/0</span>
    </div>
  </div>
  <div id="prompt-bar"></div>
  <div id="game">
    <svg id="svg-layer"></svg>
    <div class="col" id="left-col">
      <div class="col-label">概念</div>
    </div>
    <div class="col" id="right-col">
      <div class="col-label">定义</div>
    </div>
  </div>
</div>
<div id="win">
  <div id="win-title"></div>
  <div id="win-sub"></div>
  <button id="win-btn">再来一次</button>
</div>

<script>
const SPEC = "__GAME_SPEC__";

const PALETTE = ["#818cf8","#4ADE80","#FB923C","#A78BFA","#FCD34D","#F87171","#06B6D4","#EC4899","#34D399"];
let score = 0, matched = new Set(), selectedLeft = null;
const total = SPEC.entities.length;

document.getElementById("topic").textContent = SPEC.topic;
document.getElementById("prompt-bar").textContent = SPEC.levels[0]?.prompt || "点击左侧概念，再点击右侧配对定义";
document.getElementById("prog-el").textContent = `0/${total}`;

// shuffle helper
function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }

// Build cards
const leftCol  = document.getElementById("left-col");
const rightCol = document.getElementById("right-col");
const svgLayer = document.getElementById("svg-layer");

// left = terms in original order, right = definitions shuffled
const rightOrder = shuffle(SPEC.entities.map(e => e.id));

SPEC.entities.forEach((entity, i) => {
  const color = PALETTE[i % PALETTE.length];
  const lCard = makeCard(entity.id, entity.emoji || "", entity.term, "left", color, i);
  leftCol.appendChild(lCard);
});
rightOrder.forEach((id, i) => {
  const entity = SPEC.entities.find(e => e.id === id);
  const color = PALETTE[SPEC.entities.findIndex(e => e.id === id) % PALETTE.length];
  const rCard = makeCard(id, "", entity.definition, "right", color, i);
  rightCol.appendChild(rCard);
});

function makeCard(id, emoji, text, side, color, i) {
  const card = document.createElement("div");
  card.className = "pair-card";
  card.id = `card-${side}-${id}`;
  card.dataset.id = id;
  card.dataset.side = side;
  if (emoji) card.innerHTML = `<span class="pair-emoji">${emoji}</span><span>${text}</span>`;
  else card.innerHTML = `<span>${text}</span>`;
  card.style.borderColor = color + "55";
  card.addEventListener("click", () => onCardClick(card, id, side, color));
  gsap.from(card, { opacity: 0, y: 15, duration: .3, delay: i * .05, ease: "back.out(1.4)" });
  return card;
}

function onCardClick(card, id, side, color) {
  if (matched.has(id)) return;

  if (side === "left") {
    // deselect previous left
    if (selectedLeft) {
      const prev = document.getElementById(`card-left-${selectedLeft.id}`);
      if (prev) { prev.classList.remove("selected"); gsap.to(prev, { scale: 1, duration: .15 }); }
    }
    if (selectedLeft?.id === id) { selectedLeft = null; return; }
    selectedLeft = { id, color };
    card.classList.add("selected");
    gsap.to(card, { scale: 1.04, duration: .15, ease: "back.out(2)" });
  } else {
    // right clicked
    if (!selectedLeft) {
      // no left selected, pulse hint
      gsap.timeline().to(card, { x: -5, duration: .06 }).to(card, { x: 5, duration: .06 }).to(card, { x: 0, duration: .06 });
      return;
    }
    if (selectedLeft.id === id) {
      // ✅ correct match
      const lCard = document.getElementById(`card-left-${id}`);
      const rCard = card;
      const color = selectedLeft.color;

      matched.add(id);
      score += SPEC.rules.correct_points || 10;
      document.getElementById("score-el").textContent = `${score} 分`;
      document.getElementById("prog-el").textContent = `${matched.size}/${total}`;

      // animate both
      [lCard, rCard].forEach(c => {
        c.classList.remove("selected");
        c.classList.add("matched");
        c.style.borderColor = color;
        c.style.background = color + "22";
        gsap.to(c, { scale: 1.08, duration: .15, yoyo: true, repeat: 1 });
      });

      // draw connector line
      drawLine(lCard, rCard, color);

      // score pop
      scorePopAt(rCard, `+${SPEC.rules.correct_points || 10}`, color);

      selectedLeft = null;

      if (matched.size === total) setTimeout(showWin, 350);
    } else {
      // ❌ wrong
      const lCard = document.getElementById(`card-left-${selectedLeft.id}`);
      gsap.timeline()
        .to([lCard, card], { x: -8, duration: .07 })
        .to([lCard, card], { x: 8, duration: .07 })
        .to([lCard, card], { x: -5, duration: .07 })
        .to([lCard, card], { x: 0, duration: .07 });
      [lCard, card].forEach(c => {
        c.classList.add("wrong-flash");
        setTimeout(() => c.classList.remove("wrong-flash"), 500);
      });
      selectedLeft = null;
      if (lCard) { lCard.classList.remove("selected"); gsap.to(lCard, { scale: 1, duration: .15 }); }
    }
  }
}

// draw SVG line between two cards
function drawLine(lCard, rCard, color) {
  const svgRect = svgLayer.getBoundingClientRect();
  const lRect = lCard.getBoundingClientRect();
  const rRect = rCard.getBoundingClientRect();
  const x1 = lRect.right - svgRect.left;
  const y1 = lRect.top + lRect.height / 2 - svgRect.top;
  const x2 = rRect.left - svgRect.left;
  const y2 = rRect.top + rRect.height / 2 - svgRect.top;
  const cx = (x1 + x2) / 2;

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
  path.setAttribute("stroke", color);
  path.setAttribute("stroke-width", "2.5");
  path.setAttribute("fill", "none");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("opacity", "0");
  const len = path.getTotalLength ? path.getTotalLength() : 200;
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  svgLayer.appendChild(path);
  gsap.to(path, { strokeDashoffset: 0, opacity: .8, duration: .4, ease: "power2.out" });
}

function scorePopAt(el, text, color) {
  const pop = document.createElement("div");
  pop.textContent = text;
  pop.style.cssText = `position:fixed;font-size:18px;font-weight:900;color:${color};pointer-events:none;z-index:200;text-shadow:0 2px 8px rgba(0,0,0,.5)`;
  const r = el.getBoundingClientRect();
  pop.style.left = r.left + r.width / 2 - 15 + "px";
  pop.style.top = r.top + "px";
  document.body.appendChild(pop);
  gsap.to(pop, { y: -45, opacity: 0, duration: .7, ease: "power2.out", onComplete: () => pop.remove() });
}

function showWin() {
  document.getElementById("win-title").textContent = SPEC.feedback.complete_text;
  document.getElementById("win-sub").textContent = `得分 ${score} · 全部 ${total} 对配对成功`;
  const win = document.getElementById("win");
  win.style.display = "flex";
  gsap.from(win.children, { opacity: 0, y: 28, stagger: .1, duration: .5, ease: "back.out(1.4)" });
  launchParticles();
}

document.getElementById("win-btn").addEventListener("click", () => {
  score = 0; matched = new Set(); selectedLeft = null;
  document.getElementById("score-el").textContent = "0 分";
  document.getElementById("prog-el").textContent = `0/${total}`;
  svgLayer.innerHTML = "";
  document.getElementById("win").style.display = "none";
  // rebuild
  leftCol.querySelectorAll(".pair-card").forEach(c => c.remove());
  rightCol.querySelectorAll(".pair-card").forEach(c => c.remove());
  SPEC.entities.forEach((entity, i) => {
    const color = PALETTE[i % PALETTE.length];
    leftCol.appendChild(makeCard(entity.id, entity.emoji || "", entity.term, "left", color, i));
  });
  const ro = shuffle(SPEC.entities.map(e => e.id));
  ro.forEach((id, i) => {
    const entity = SPEC.entities.find(e => e.id === id);
    const color = PALETTE[SPEC.entities.findIndex(e => e.id === id) % PALETTE.length];
    rightCol.appendChild(makeCard(id, "", entity.definition, "right", color, i));
  });
});

function launchParticles() {
  const canvas = document.getElementById("particle-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = innerWidth; canvas.height = innerHeight;
  const P = PALETTE;
  const parts = Array.from({length:100}, () => ({
    x: Math.random()*canvas.width, y:-10,
    vx:(Math.random()-.5)*5, vy:Math.random()*4+2,
    size:Math.random()*8+4, color:P[Math.floor(Math.random()*P.length)],
    rot:Math.random()*360, rotV:(Math.random()-.5)*7, life:1
  }));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.rot+=p.rotV; p.life-=.009;
      if(p.y<canvas.height&&p.life>0) alive=true;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.6);
      ctx.restore();
    }
    if(alive) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
