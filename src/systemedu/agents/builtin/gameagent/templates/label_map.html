<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>探索地图</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg1:#0a1628;--bg2:#0d2137;--accent:#34d399;--border:#ffffff18;--text:#f1f5f9;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;font-family:'Nunito','PingFang SC',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);user-select:none}

#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:52px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-shrink:0}
#topic{font-size:15px;font-weight:800;color:#a7f3d0}
.badge{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}

#prompt-bar{padding:7px 16px;background:rgba(52,211,153,.12);border-bottom:1px solid rgba(52,211,153,.2);font-size:13px;font-weight:600;color:#a7f3d0;flex-shrink:0;min-height:34px;display:flex;align-items:center}

#game{flex:1;display:flex;gap:10px;padding:10px 12px;min-height:0;overflow:hidden}

/* scene */
#scene{flex:1;position:relative;border-radius:16px;border:1px solid var(--border);background:rgba(0,0,0,.4);overflow:hidden;cursor:crosshair}
#scene-canvas{position:absolute;inset:0;width:100%;height:100%}
#scene-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dim);pointer-events:none;white-space:nowrap}

/* dot markers */
.dot-marker{position:absolute;transform:translate(-50%,-50%);z-index:10;cursor:pointer}
.dot-ring{width:22px;height:22px;border-radius:50%;border:2.5px solid;display:flex;align-items:center;justify-content:center;transition:transform .2s;background:rgba(0,0,0,.5)}
.dot-ring:hover{transform:scale(1.3)}
.dot-pulse{position:absolute;inset:-6px;border-radius:50%;border:2px solid;opacity:0}
.dot-marker.explored .dot-ring{background:rgba(52,211,153,.25);border-color:var(--accent) !important}

/* bubble tooltip */
.bubble{position:absolute;z-index:30;background:rgba(10,22,40,.95);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 14px;min-width:120px;max-width:200px;pointer-events:none;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.bubble-name{font-size:13px;font-weight:800;margin-bottom:4px}
.bubble-desc{font-size:11px;color:var(--dim);line-height:1.45}
.bubble-arrow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:rgba(10,22,40,.95);border-right:1px solid rgba(255,255,255,.2);border-bottom:1px solid rgba(255,255,255,.2);transform:translateX(-50%) rotate(45deg)}

/* right: explored list */
#explored-list{flex:0 0 130px;display:flex;flex-direction:column;gap:5px;overflow-y:auto}
#explored-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);padding-bottom:4px;flex-shrink:0}
.exp-item{border-radius:10px;padding:6px 9px;font-size:11px;font-weight:700;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;gap:5px;transition:background .2s,color .2s}
.exp-item.found{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:#a7f3d0}
.exp-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .2s}
.exp-item.found .exp-dot{background:var(--accent)}

#win{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;background:rgba(10,22,40,.92);backdrop-filter:blur(6px)}
#win-title{font-size:26px;font-weight:900;color:#a7f3d0;text-align:center}
#win-sub{font-size:14px;color:var(--dim)}
#win-btn{padding:11px 32px;border-radius:14px;border:none;background:var(--accent);color:#0a1628;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #059669}
#win-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #059669}
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div style="display:flex;flex-direction:column;height:100vh">
  <div id="header">
    <span id="topic"></span>
    <span class="badge" id="prog-badge" style="color:#a7f3d0">0/0</span>
  </div>
  <div id="prompt-bar"></div>
  <div id="game">
    <div id="scene">
      <canvas id="scene-canvas"></canvas>
      <div id="scene-label"></div>
    </div>
    <div id="explored-list">
      <div id="explored-label">已探索</div>
    </div>
  </div>
</div>
<div id="win">
  <div id="win-title"></div>
  <div id="win-sub"></div>
  <button id="win-btn">再次探索</button>
</div>

<script>
const SPEC = "__GAME_SPEC__";

const PALETTE = ["#34d399","#38bdf8","#FB923C","#A78BFA","#FCD34D","#F87171","#06B6D4","#EC4899"];
const entities = SPEC.entities;
const total = entities.length;
let explored = new Set();
let activeBubble = null;

document.getElementById("topic").textContent = SPEC.topic;
document.getElementById("prompt-bar").textContent = SPEC.levels[0]?.prompt || "点击闪光圆点，探索各个部分";
document.getElementById("scene-label").textContent = SPEC.scene_description || "";
document.getElementById("prog-badge").textContent = `0/${total}`;

// ── scene canvas background ───────────────────────────────
const sceneEl = document.getElementById("scene");
const sceneCanvas = document.getElementById("scene-canvas");
const sCtx = sceneCanvas.getContext("2d");

function resizeScene() {
  sceneCanvas.width = sceneEl.clientWidth;
  sceneCanvas.height = sceneEl.clientHeight;
  drawSceneBackground();
  repositionDots();
}
window.addEventListener("resize", resizeScene);
setTimeout(resizeScene, 50);

function drawSceneBackground() {
  const W = sceneCanvas.width, H = sceneCanvas.height;
  if (!W || !H) return;
  const ctx = sCtx;
  ctx.clearRect(0, 0, W, H);

  // deep space gradient
  const bg = ctx.createRadialGradient(W * .4, H * .35, 20, W * .5, H * .5, W * .9);
  bg.addColorStop(0, "rgba(20,40,80,.6)");
  bg.addColorStop(1, "rgba(5,10,20,.9)");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // subtle grid
  ctx.strokeStyle = "rgba(255,255,255,.025)";
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // concentric rings (spatial hint)
  ctx.strokeStyle = "rgba(52,211,153,.06)";
  ctx.lineWidth = 1;
  for (let r = 60; r < W; r += 70) {
    ctx.beginPath();
    ctx.arc(W * .5, H * .45, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // draw entity region hints as faint circles
  entities.forEach((e, i) => {
    const color = PALETTE[i % PALETTE.length];
    const x = e.x / 100 * W, y = e.y / 100 * H;
    const g = ctx.createRadialGradient(x, y, 0, x, y, 40);
    g.addColorStop(0, color + "18");
    g.addColorStop(1, "transparent");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, 40, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── dot markers ───────────────────────────────────────────
let dotEls = [];

function buildDots() {
  dotEls.forEach(d => d.remove());
  dotEls = [];

  entities.forEach((entity, i) => {
    const color = PALETTE[i % PALETTE.length];
    const marker = document.createElement("div");
    marker.className = "dot-marker";
    marker.id = `dot-${entity.id}`;
    marker.style.left = entity.x + "%";
    marker.style.top = entity.y + "%";

    marker.innerHTML = `
      <div class="dot-pulse" style="border-color:${color}"></div>
      <div class="dot-ring" style="border-color:${color}">
        <span style="font-size:14px">${entity.emoji || "•"}</span>
      </div>
    `;

    marker.addEventListener("click", (ev) => {
      ev.stopPropagation();
      onDotClick(entity, marker, color);
    });

    sceneEl.appendChild(marker);
    dotEls.push(marker);

    // entrance stagger
    gsap.from(marker, { opacity: 0, scale: .3, duration: .4, delay: i * .1, ease: "back.out(2)" });

    // pulse animation (unexplored only)
    animatePulse(marker, color, i);
  });

  // right list
  const listEl = document.getElementById("explored-list");
  listEl.querySelectorAll(".exp-item").forEach(e => e.remove());
  entities.forEach((entity, i) => {
    const color = PALETTE[i % PALETTE.length];
    const item = document.createElement("div");
    item.className = "exp-item";
    item.id = `exp-${entity.id}`;
    item.innerHTML = `<span class="exp-dot" style="background:${color}66"></span><span>${entity.name}</span>`;
    listEl.appendChild(item);
    gsap.from(item, { opacity: 0, x: 12, duration: .3, delay: i * .06 });
  });
}

function animatePulse(marker, color, i) {
  const pulse = marker.querySelector(".dot-pulse");
  if (!pulse) return;
  gsap.to(pulse, {
    opacity: .6, scale: 1.8, duration: .8,
    repeat: -1, yoyo: true, delay: i * .3,
    ease: "sine.inOut",
    onUpdate() { pulse.style.borderColor = color; }
  });
}

function repositionDots() {
  // dots use % so they auto-reposition; just redraw background
  drawSceneBackground();
}

buildDots();

// dismiss bubble on scene click
sceneEl.addEventListener("click", () => dismissBubble());

function onDotClick(entity, markerEl, color) {
  // dismiss existing
  dismissBubble();

  // explore
  const alreadyExplored = explored.has(entity.id);
  if (!alreadyExplored) {
    explored.add(entity.id);
    markerEl.classList.add("explored");
    gsap.timeline()
      .to(markerEl, { scale: 1.4, duration: .15, ease: "back.out(2)" })
      .to(markerEl, { scale: 1, duration: .2, ease: "elastic.out(1,.5)" });

    // update list
    const item = document.getElementById(`exp-${entity.id}`);
    if (item) {
      item.classList.add("found");
      gsap.from(item, { x: 8, duration: .3, ease: "back.out(1.4)" });
    }

    document.getElementById("prog-badge").textContent = `${explored.size}/${total}`;

    // score pop
    const pop = document.createElement("div");
    pop.textContent = `+${SPEC.rules.correct_points || 10}`;
    pop.style.cssText = `position:absolute;font-size:16px;font-weight:900;color:${color};pointer-events:none;z-index:100;left:${entity.x}%;top:${entity.y}%;transform:translate(-50%,-100%)`;
    sceneEl.appendChild(pop);
    gsap.to(pop, { y: -40, opacity: 0, duration: .8, ease: "power2.out", onComplete: () => pop.remove() });

    if (explored.size === total) { setTimeout(showWin, 400); return; }
  } else {
    gsap.to(markerEl, { scale: 1.2, duration: .1, yoyo: true, repeat: 1 });
  }

  // show bubble
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.id = "active-bubble";
  bubble.innerHTML = `<div class="bubble-name" style="color:${color}">${entity.emoji || ""} ${entity.name}</div><div class="bubble-desc">${entity.description || ""}</div><div class="bubble-arrow"></div>`;
  sceneEl.appendChild(bubble);
  activeBubble = bubble;

  // position above dot, centered
  const markerRect = markerEl.getBoundingClientRect();
  const sceneRect = sceneEl.getBoundingClientRect();
  let left = markerRect.left - sceneRect.left + markerRect.width / 2;
  let top  = markerRect.top  - sceneRect.top  - 10;

  bubble.style.left = left + "px";
  bubble.style.top  = top + "px";
  bubble.style.transform = "translate(-50%, -100%)";

  gsap.from(bubble, { opacity: 0, y: 8, scale: .9, duration: .25, ease: "back.out(2)" });
}

function dismissBubble() {
  if (activeBubble) {
    gsap.to(activeBubble, { opacity: 0, y: 5, scale: .9, duration: .15, onComplete: () => { activeBubble?.remove(); activeBubble = null; } });
  }
}

function showWin() {
  document.getElementById("win-title").textContent = SPEC.feedback.complete_text;
  document.getElementById("win-sub").textContent = `全部 ${total} 个部分探索完毕！`;
  const win = document.getElementById("win");
  win.style.display = "flex";
  gsap.from(win.children, { opacity: 0, y: 26, stagger: .1, duration: .5, ease: "back.out(1.4)" });
  launchParticles();
}

document.getElementById("win-btn").addEventListener("click", () => {
  explored = new Set();
  activeBubble = null;
  document.getElementById("prog-badge").textContent = `0/${total}`;
  document.getElementById("win").style.display = "none";
  buildDots();
});

function launchParticles() {
  const c = document.getElementById("particle-canvas");
  const x = c.getContext("2d");
  c.width = innerWidth; c.height = innerHeight;
  const parts = Array.from({length:100}, () => ({
    px: Math.random()*c.width, py:-10,
    vx:(Math.random()-.5)*5, vy:Math.random()*4+2,
    sz:Math.random()*8+4, col:PALETTE[Math.floor(Math.random()*PALETTE.length)],
    rot:Math.random()*360, rv:(Math.random()-.5)*7, life:1
  }));
  function draw() {
    x.clearRect(0,0,c.width,c.height);
    let alive=false;
    for(const p of parts){
      p.px+=p.vx; p.py+=p.vy; p.vy+=.1; p.rot+=p.rv; p.life-=.009;
      if(p.py<c.height&&p.life>0) alive=true;
      x.save(); x.globalAlpha=Math.max(0,p.life);
      x.translate(p.px,p.py); x.rotate(p.rot*Math.PI/180);
      x.fillStyle=p.col; x.fillRect(-p.sz/2,-p.sz/3,p.sz,p.sz*.6);
      x.restore();
    }
    if(alive) requestAnimationFrame(draw);
    else x.clearRect(0,0,c.width,c.height);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
