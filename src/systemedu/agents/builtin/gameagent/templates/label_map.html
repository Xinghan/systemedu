<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>探索地图</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg1:#0a1628;--bg2:#0d2137;--accent:#34d399;--border:#ffffff18;--text:#f1f5f9;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;font-family:'Nunito','PingFang SC',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);user-select:none}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:52px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-shrink:0}
#topic{font-size:15px;font-weight:800;color:#a7f3d0}
.badge{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}
#prompt-bar{padding:7px 16px;background:rgba(52,211,153,.12);border-bottom:1px solid rgba(52,211,153,.2);font-size:13px;font-weight:600;color:#a7f3d0;flex-shrink:0;min-height:34px;display:flex;align-items:center}
#game{flex:1;display:flex;gap:10px;padding:10px 12px;min-height:0;overflow:hidden}
#scene{flex:1;position:relative;border-radius:16px;border:1px solid var(--border);background:rgba(0,0,0,.5);overflow:hidden;cursor:crosshair}
#scene-svg{position:absolute;inset:0;width:100%;height:100%}
.dot-marker{position:absolute;transform:translate(-50%,-50%);z-index:10;cursor:pointer}
.dot-ring{width:24px;height:24px;border-radius:50%;border:2.5px solid;display:flex;align-items:center;justify-content:center;transition:transform .2s;background:rgba(0,0,0,.55)}
.dot-ring:hover{transform:scale(1.3)}
.dot-pulse{position:absolute;inset:-7px;border-radius:50%;border:2px solid;opacity:0}
.dot-core{width:8px;height:8px;border-radius:50%}
.dot-marker.explored .dot-ring{background:rgba(52,211,153,.3);border-color:var(--accent)!important}
.dot-marker.explored .dot-pulse{animation:none!important;opacity:0!important}
.bubble{position:absolute;z-index:30;background:rgba(8,18,35,.96);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:11px 15px;min-width:130px;max-width:220px;pointer-events:none;backdrop-filter:blur(10px);box-shadow:0 8px 28px rgba(0,0,0,.6)}
.bubble-name{font-size:13px;font-weight:900;margin-bottom:5px}
.bubble-desc{font-size:11px;color:var(--dim);line-height:1.5}
.bubble-hint{font-size:10px;color:#7dd3fc;margin-top:5px;font-style:italic}
.bubble-arrow{position:absolute;bottom:-6px;left:50%;width:12px;height:12px;background:rgba(8,18,35,.96);border-right:1px solid rgba(255,255,255,.2);border-bottom:1px solid rgba(255,255,255,.2);transform:translateX(-50%) rotate(45deg)}
#explored-list{flex:0 0 128px;display:flex;flex-direction:column;gap:5px;overflow-y:auto}
#explored-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);padding-bottom:4px;flex-shrink:0}
.exp-item{border-radius:10px;padding:6px 9px;font-size:11px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;gap:5px;transition:all .25s}
.exp-item.found{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:#a7f3d0}
.exp-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .25s}
.exp-item.found .exp-dot{background:var(--accent)}
#win{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;background:rgba(8,18,35,.93);backdrop-filter:blur(8px)}
#win-title{font-size:26px;font-weight:900;color:#a7f3d0;text-align:center}
#win-sub{font-size:14px;color:var(--dim)}
#win-btn{padding:11px 32px;border-radius:14px;border:none;background:var(--accent);color:#0a1628;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #059669}
#win-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #059669}
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div style="display:flex;flex-direction:column;height:100vh">
  <div id="header">
    <span id="topic"></span>
    <span class="badge" id="prog-badge" style="color:#a7f3d0">0/0</span>
  </div>
  <div id="prompt-bar"></div>
  <div id="game">
    <div id="scene">
      <svg id="scene-svg" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect id="svg-bg" fill="#07101f"/>
        <g id="scene-group"></g>
        <g id="highlight-group"></g>
      </svg>
    </div>
    <div id="explored-list">
      <div id="explored-label">已探索</div>
    </div>
  </div>
</div>
<div id="win">
  <div id="win-title"></div>
  <div id="win-sub"></div>
  <button id="win-btn">再次探索</button>
</div>

<script>
const SPEC = "__GAME_SPEC__";
const RENDER_SPEC = "__RENDER_SPEC__";

const PALETTE = ["#34d399","#38bdf8","#FB923C","#A78BFA","#FCD34D","#F87171","#06B6D4","#EC4899"];

// ── SVG shape renderer ─────────────────────────────────────────────────────────
// Converts RenderSpec.shapes (Python Pydantic -> JSON) into SVG elements.
// Supports: rect, ellipse, polygon, path, line

function shapeToSVG(s) {
  const fill = s.fill || "none";
  const stroke = s.stroke ? `stroke="${s.stroke}" stroke-width="${s.stroke_width||1}"` : "";
  const opacity = (s.opacity !== undefined && s.opacity !== 1) ? `opacity="${s.opacity}"` : "";
  const pid = s.part_id ? `data-part="${s.part_id}"` : "";

  switch (s.type) {
    case "rect":
      return `<rect ${pid} id="${s.id}" x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="${s.rx||0}" fill="${fill}" ${stroke} ${opacity}/>`;
    case "ellipse":
      return `<ellipse ${pid} id="${s.id}" cx="${s.cx}" cy="${s.cy}" rx="${s.rx}" ry="${s.ry}" fill="${fill}" ${stroke} ${opacity}/>`;
    case "polygon": {
      const pts = s.points.map(p => `${p[0]},${p[1]}`).join(" ");
      return `<polygon ${pid} id="${s.id}" points="${pts}" fill="${fill}" ${stroke} ${opacity}/>`;
    }
    case "path":
      return `<path ${pid} id="${s.id}" d="${s.d}" fill="${fill}" ${stroke} ${opacity}/>`;
    case "line":
      return `<line ${pid} id="${s.id}" x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" stroke="${s.stroke||'#ccc'}" stroke-width="${s.stroke_width||1}" ${opacity}/>`;
    default:
      return "";
  }
}

function renderShapes(shapes) {
  return shapes.map(shapeToSVG).join("\n");
}

// ── Build entity list from object_spec + render_spec ──────────────────────────
// Labels/descriptions come from RENDER_SPEC anchors + SPEC.object_spec,
// NOT from LLM free text. Label text pulled from part metadata injected
// into the SPEC (via compiler enrichment pass). Fallback: part_id.

function buildEntities() {
  // If we have a RenderSpec, use its anchors + object_spec label_part_ids
  if (RENDER_SPEC && RENDER_SPEC.anchors && SPEC.object_spec) {
    const labelIds = SPEC.object_spec.label_part_ids || [];
    // Filter anchors to only the parts requested for labeling
    const anchors = RENDER_SPEC.anchors.filter(a => labelIds.includes(a.part_id));
    return anchors.map((anchor, i) => {
      // Resolve display info: prefer enriched entities list, fallback to part_id
      const enriched = (SPEC.entities || []).find(e => e.part_id === anchor.part_id);
      return {
        id: anchor.part_id,
        part_id: anchor.part_id,
        x: anchor.x,
        y: anchor.y,
        name: enriched ? enriched.name : anchor.part_id.replace(/_/g, " "),
        description: enriched ? enriched.description : "",
        hint: enriched ? (enriched.hint || "") : "",
      };
    });
  }
  // Legacy fallback: use SPEC.entities directly (old scene_type path)
  return (SPEC.entities || []).map(e => ({
    id: e.id,
    part_id: null,
    x: e.x, y: e.y,
    name: e.name, description: e.description || "", hint: "",
  }));
}

// ── Init scene SVG ─────────────────────────────────────────────────────────────
const svgEl = document.getElementById("scene-svg");
const bgEl  = document.getElementById("svg-bg");
const sceneGroup = document.getElementById("scene-group");
const highlightGroup = document.getElementById("highlight-group");

if (RENDER_SPEC && RENDER_SPEC.viewbox) {
  svgEl.setAttribute("viewBox", RENDER_SPEC.viewbox);
  const parts = RENDER_SPEC.viewbox.split(" ");
  bgEl.setAttribute("width", parts[2]);
  bgEl.setAttribute("height", parts[3]);
  sceneGroup.innerHTML = renderShapes(RENDER_SPEC.shapes);
} else {
  // Legacy: viewBox fallback
  svgEl.setAttribute("viewBox", "0 0 560 420");
  bgEl.setAttribute("width", "560");
  bgEl.setAttribute("height", "420");
}

// Highlight requested parts
if (RENDER_SPEC && SPEC.object_spec && SPEC.object_spec.highlight_part_ids) {
  SPEC.object_spec.highlight_part_ids.forEach(pid => {
    const el = sceneGroup.querySelector(`[data-part="${pid}"]`);
    if (el) {
      el.setAttribute("filter", "url(#glow)");
      const orig = el.getAttribute("fill");
      if (orig && orig !== "none") {
        // Brighten highlight parts slightly
        el.setAttribute("opacity", "1");
      }
    }
  });
}

// ── Build main entity list ─────────────────────────────────────────────────────
const entities = buildEntities();
const total = entities.length;
let explored = new Set();
let activeBubble = null;

document.getElementById("topic").textContent = SPEC.topic;
document.getElementById("prompt-bar").textContent = SPEC.levels[0]?.prompt || "点击闪光圆点，探索各个部分";
document.getElementById("prog-badge").textContent = `0/${total}`;

// ── Dot markers ────────────────────────────────────────────────────────────────
const sceneEl = document.getElementById("scene");

function buildDots() {
  sceneEl.querySelectorAll(".dot-marker").forEach(d => d.remove());
  const listEl = document.getElementById("explored-list");
  listEl.querySelectorAll(".exp-item").forEach(e => e.remove());

  entities.forEach((entity, i) => {
    const color = PALETTE[i % PALETTE.length];
    const marker = document.createElement("div");
    marker.className = "dot-marker";
    marker.id = `dot-${entity.id}`;
    marker.style.left = entity.x + "%";
    marker.style.top  = entity.y + "%";
    marker.innerHTML = `
      <div class="dot-pulse" style="border-color:${color}"></div>
      <div class="dot-ring" style="border-color:${color}">
        <div class="dot-core" style="background:${color}"></div>
      </div>`;
    marker.addEventListener("click", ev => { ev.stopPropagation(); onDotClick(entity, marker, color); });
    sceneEl.appendChild(marker);
    gsap.from(marker, { opacity:0, scale:.3, duration:.4, delay:i*.1, ease:"back.out(2.5)" });
    animatePulse(marker, color, i);

    const item = document.createElement("div");
    item.className = "exp-item";
    item.id = `exp-${entity.id}`;
    item.innerHTML = `<span class="exp-dot" style="background:${color}55"></span><span>${entity.name}</span>`;
    listEl.appendChild(item);
    gsap.from(item, { opacity:0, x:14, duration:.3, delay:i*.06 });
  });
}

function animatePulse(marker, color, i) {
  const pulse = marker.querySelector(".dot-pulse");
  if (!pulse) return;
  gsap.to(pulse, { opacity:.65, scale:1.9, duration:.85, repeat:-1, yoyo:true, delay:i*.28, ease:"sine.inOut" });
}

sceneEl.addEventListener("click", () => dismissBubble());

function onDotClick(entity, markerEl, color) {
  dismissBubble();
  const already = explored.has(entity.id);
  if (!already) {
    explored.add(entity.id);
    markerEl.classList.add("explored");
    gsap.timeline()
      .to(markerEl, { scale:1.5, duration:.18, ease:"back.out(2)" })
      .to(markerEl, { scale:1, duration:.25, ease:"elastic.out(1,.5)" });
    const item = document.getElementById(`exp-${entity.id}`);
    if (item) { item.classList.add("found"); gsap.from(item, { x:8, duration:.3, ease:"back.out(1.4)" }); }
    document.getElementById("prog-badge").textContent = `${explored.size}/${total}`;
    const pop = document.createElement("div");
    pop.textContent = `+${SPEC.rules.correct_points || 10}`;
    pop.style.cssText = `position:absolute;font-size:16px;font-weight:900;color:${color};pointer-events:none;z-index:100;left:${entity.x}%;top:${entity.y}%;transform:translate(-50%,-100%)`;
    sceneEl.appendChild(pop);
    gsap.to(pop, { y:-42, opacity:0, duration:.9, ease:"power2.out", onComplete:() => pop.remove() });
    if (explored.size === total) { setTimeout(showWin, 400); return; }
  } else {
    gsap.to(markerEl, { scale:1.2, duration:.1, yoyo:true, repeat:1 });
  }

  const bubble = document.createElement("div");
  const hintHtml = entity.hint ? `<div class="bubble-hint">${entity.hint}</div>` : "";
  bubble.className = "bubble";
  bubble.innerHTML = `<div class="bubble-name" style="color:${color}">${entity.name}</div><div class="bubble-desc">${entity.description}</div>${hintHtml}<div class="bubble-arrow"></div>`;
  sceneEl.appendChild(bubble);
  activeBubble = bubble;

  const mr = markerEl.getBoundingClientRect();
  const sr = sceneEl.getBoundingClientRect();
  const left = mr.left - sr.left + mr.width / 2;
  const top  = mr.top  - sr.top  - 10;
  bubble.style.left = left + "px";
  bubble.style.top  = top + "px";
  bubble.style.transform = "translate(-50%, -100%)";

  requestAnimationFrame(() => {
    const bw = bubble.offsetWidth;
    const bl = parseFloat(bubble.style.left) - bw / 2;
    if (bl < 4) bubble.style.left = bw / 2 + 4 + "px";
    if (bl + bw > sr.width - 4) bubble.style.left = sr.width - bw / 2 - 4 + "px";
  });
  gsap.from(bubble, { opacity:0, y:10, scale:.88, duration:.28, ease:"back.out(2)" });
}

function dismissBubble() {
  if (activeBubble) {
    const b = activeBubble; activeBubble = null;
    gsap.to(b, { opacity:0, y:6, scale:.9, duration:.15, onComplete:() => b.remove() });
  }
}

function showWin() {
  document.getElementById("win-title").textContent = SPEC.feedback.complete_text;
  document.getElementById("win-sub").textContent = `全部 ${total} 个部分探索完毕！`;
  const win = document.getElementById("win");
  win.style.display = "flex";
  gsap.from(win.children, { opacity:0, y:26, stagger:.1, duration:.5, ease:"back.out(1.4)" });
  launchParticles();
}

document.getElementById("win-btn").addEventListener("click", () => {
  explored = new Set();
  activeBubble = null;
  document.getElementById("prog-badge").textContent = `0/${total}`;
  document.getElementById("win").style.display = "none";
  buildDots();
});

buildDots();

function launchParticles() {
  const c = document.getElementById("particle-canvas");
  const ctx = c.getContext("2d");
  c.width = innerWidth; c.height = innerHeight;
  const parts = Array.from({length:100}, () => ({
    px:Math.random()*c.width, py:-10,
    vx:(Math.random()-.5)*5, vy:Math.random()*4+2,
    sz:Math.random()*8+4, col:PALETTE[Math.floor(Math.random()*PALETTE.length)],
    rot:Math.random()*360, rv:(Math.random()-.5)*7, life:1
  }));
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    let alive=false;
    for(const p of parts){
      p.px+=p.vx; p.py+=p.vy; p.vy+=.1; p.rot+=p.rv; p.life-=.009;
      if(p.py<c.height&&p.life>0) alive=true;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.px,p.py); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.col; ctx.fillRect(-p.sz/2,-p.sz/3,p.sz,p.sz*.6);
      ctx.restore();
    }
    if(alive) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
