<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>分类挑战</title>
<script src="gsap.min.js"></script>
<style>
:root{--accent:#6366F1;--accent2:#4ADE80;--red:#F87171;--bg1:#1e1b4b;--bg2:#312e81;--card:#ffffff12;--card-border:#ffffff22;--text:#f8fafc;--text-dim:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100vh;overflow:hidden;font-family:system-ui,'PingFang SC',sans-serif;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);user-select:none}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:52px;flex-shrink:0;background:rgba(0,0,0,.2);border-bottom:1px solid var(--card-border)}
#topic{font-size:15px;font-weight:800;color:#e0e7ff}
#scoreboard{display:flex;gap:12px;font-size:12px;font-weight:700}
.score-badge{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1)}
.score-badge.pts{color:#fbbf24}
.score-badge.err{color:#f87171}

/* PROMPT */
#prompt-bar{padding:7px 16px;background:rgba(99,102,241,.25);border-bottom:1px solid rgba(99,102,241,.3);font-size:13px;font-weight:600;color:#c7d2fe;flex-shrink:0;min-height:34px;display:flex;align-items:center}

/* GAME AREA */
#game{flex:1;display:flex;gap:10px;padding:10px 12px;min-height:0;overflow:hidden}

/* SOURCE COLUMN */
#source{flex:0 0 148px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding-right:4px}
#source-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);padding-bottom:2px}
.card{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:14px;padding:9px 11px;font-size:13px;font-weight:700;cursor:grab;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:7px;position:relative;will-change:transform}
.card:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35)}
.card.dragging{opacity:.35;cursor:grabbing}
.card .card-emoji{font-size:18px;line-height:1;flex-shrink:0}
.card .card-label{flex:1;line-height:1.2}

/* CATEGORIES */
#categories{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.cat-zone{flex:1;min-height:64px;border-radius:16px;border:2px dashed rgba(255,255,255,.2);padding:8px 10px;display:flex;flex-direction:column;gap:6px;transition:border-color .2s,background .2s;position:relative;background:rgba(255,255,255,.04)}
.cat-zone.drag-over{border-color:var(--accent2);background:rgba(74,222,128,.1)}
.cat-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.cat-items{display:flex;flex-wrap:wrap;gap:4px}
.placed-chip{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;color:#fff;display:inline-flex;align-items:center;gap:4px;opacity:0;transform:scale(.6)}
.placed-chip .chip-emoji{font-size:13px}

/* WIN SCREEN */
#win{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%)}
#win-title{font-size:26px;font-weight:900;color:#e0e7ff;text-align:center}
#win-sub{font-size:14px;color:var(--text-dim);text-align:center}
#win-btn{padding:11px 32px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 0 #4338ca;transition:transform .1s,box-shadow .1s}
#win-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #4338ca}

/* CANVAS for particles */
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:60}

/* DRAG GHOST */
#drag-ghost{position:fixed;pointer-events:none;z-index:100;padding:9px 11px;border-radius:14px;background:rgba(99,102,241,.9);border:2px solid rgba(255,255,255,.5);font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;opacity:0;will-change:transform;backdrop-filter:blur(8px)}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div id="drag-ghost"></div>

<div style="display:flex;flex-direction:column;height:100vh">
  <div id="header">
    <span id="topic"></span>
    <div id="scoreboard">
      <span class="score-badge pts" id="score-el">0 分</span>
      <span class="score-badge err" id="err-el">0 错</span>
    </div>
  </div>
  <div id="prompt-bar"></div>
  <div id="game">
    <div id="source"><div id="source-label">待分类</div></div>
    <div id="categories"></div>
  </div>
</div>

<div id="win">
  <div id="win-title"></div>
  <div id="win-sub"></div>
  <button id="win-btn">再来一次</button>
</div>

<script>
const SPEC = "__GAME_SPEC__";

// ── palette ──────────────────────────────────────────────
const PALETTE = ["#6366F1","#4ADE80","#FB923C","#A78BFA","#FCD34D","#F87171","#06B6D4","#EC4899","#34D399","#F59E0B"];
const DARK_PALETTE = ["#4338CA","#16A34A","#C2410C","#7C3AED","#B45309","#B91C1C","#0E7490","#BE185D","#047857","#B45309"];

// ── state ─────────────────────────────────────────────────
let score = 0, mistakes = 0, placed = {};
let dragId = null, ghostEl, activeGhostX = 0, activeGhostY = 0;

// ── DOM refs ──────────────────────────────────────────────
const sourceCol = document.getElementById("source");
const catCol    = document.getElementById("categories");
const scoreEl   = document.getElementById("score-el");
const errEl     = document.getElementById("err-el");
const promptBar = document.getElementById("prompt-bar");
const winDiv    = document.getElementById("win");
ghostEl         = document.getElementById("drag-ghost");

// ── init ──────────────────────────────────────────────────
document.getElementById("topic").textContent = SPEC.topic;
promptBar.textContent = SPEC.levels[0]?.prompt || "将卡片拖入正确的类别";

function getLevelPrompt() {
  const n = Object.keys(placed).length;
  const total = SPEC.entities.length;
  const idx = Math.min(Math.floor(n / Math.max(total / Math.max(SPEC.levels.length, 1), 1)), SPEC.levels.length - 1);
  return SPEC.levels[idx]?.prompt || "继续分类";
}

// Build category zones
(SPEC.categories || []).forEach((cat, ci) => {
  const zone = document.createElement("div");
  zone.className = "cat-zone";
  zone.dataset.catId = cat.id;
  const color = PALETTE[ci % PALETTE.length];
  zone.innerHTML = `<div class="cat-title" style="color:${color}">${cat.label}</div><div class="cat-items" id="cat-items-${cat.id}"></div>`;
  zone.style.borderColor = color + "66";
  catCol.appendChild(zone);

  // Touch/mouse drop zone events
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
  zone.addEventListener("drop", e => { e.preventDefault(); zone.classList.remove("drag-over"); handleDrop(cat.id, zone); });
});

// Build cards
function buildCards() {
  // clear existing cards
  const oldCards = sourceCol.querySelectorAll(".card");
  oldCards.forEach(c => c.remove());

  SPEC.entities.filter(e => !placed[e.id]).forEach((entity, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = `card-${entity.id}`;
    card.dataset.entityId = entity.id;
    card.draggable = true;
    const color = PALETTE[i % PALETTE.length];
    card.style.borderColor = color + "88";
    card.innerHTML = `<span class="card-emoji">${entity.emoji || "📦"}</span><span class="card-label">${entity.label}</span>`;

    // Desktop drag
    card.addEventListener("dragstart", e => {
      dragId = entity.id;
      card.classList.add("dragging");
      e.dataTransfer.setData("text/plain", entity.id);
      e.dataTransfer.effectAllowed = "move";
      // Show ghost
      ghostEl.innerHTML = card.innerHTML;
      ghostEl.style.opacity = "1";
      moveGhost(e.clientX, e.clientY);
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      ghostEl.style.opacity = "0";
      dragId = null;
    });

    // Touch drag
    card.addEventListener("touchstart", onTouchStart, { passive: false });

    sourceCol.appendChild(card);

    // entrance animation
    gsap.from(card, { opacity: 0, x: -20, duration: .3, delay: i * .06, ease: "back.out(1.5)" });
  });
}

buildCards();

// ── ghost follows mouse on desktop ───────────────────────
function moveGhost(x, y) {
  gsap.set(ghostEl, { x: x + 14, y: y - 14 });
}
document.addEventListener("dragover", e => { if (dragId) moveGhost(e.clientX, e.clientY); });

// ── touch drag ────────────────────────────────────────────
let touchCard = null, touchEntityId = null;
function onTouchStart(e) {
  e.preventDefault();
  const card = e.currentTarget;
  touchEntityId = card.dataset.entityId;
  touchCard = card;
  ghostEl.innerHTML = card.innerHTML;
  const t = e.touches[0];
  gsap.set(ghostEl, { x: t.clientX + 14, y: t.clientY - 14, opacity: 1 });
  gsap.to(card, { opacity: .35, scale: .95, duration: .15 });
  document.addEventListener("touchmove", onTouchMove, { passive: false });
  document.addEventListener("touchend", onTouchEnd);
}
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  gsap.set(ghostEl, { x: t.clientX + 14, y: t.clientY - 14 });
  // highlight zone under finger
  document.querySelectorAll(".cat-zone").forEach(z => z.classList.remove("drag-over"));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el?.closest(".cat-zone");
  if (zone) zone.classList.add("drag-over");
}
function onTouchEnd(e) {
  document.removeEventListener("touchmove", onTouchMove);
  document.removeEventListener("touchend", onTouchEnd);
  gsap.to(ghostEl, { opacity: 0, duration: .15 });
  if (touchCard) gsap.to(touchCard, { opacity: 1, scale: 1, duration: .15 });

  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el?.closest(".cat-zone");
  document.querySelectorAll(".cat-zone").forEach(z => z.classList.remove("drag-over"));
  if (zone && touchEntityId) handleDrop(zone.dataset.catId, zone);
  touchCard = null; touchEntityId = null;
}

// ── drop logic ────────────────────────────────────────────
function handleDrop(catId, zoneEl) {
  const entityId = dragId || touchEntityId;
  if (!entityId) return;
  const entity = SPEC.entities.find(e => e.id === entityId);
  if (!entity || placed[entityId]) return;

  const ci = (SPEC.categories || []).findIndex(c => c.id === catId);
  const color = PALETTE[ci % PALETTE.length];
  const darkColor = DARK_PALETTE[ci % DARK_PALETTE.length];

  if (entity.category === catId) {
    // ✅ correct
    placed[entityId] = catId;
    score += SPEC.rules.correct_points || 10;
    scoreEl.textContent = `${score} 分`;
    promptBar.textContent = getLevelPrompt();

    // Remove from source
    const cardEl = document.getElementById(`card-${entityId}`);
    if (cardEl) {
      gsap.to(cardEl, {
        scale: 1.15, opacity: 0, y: -10, duration: .25, ease: "back.in(2)",
        onComplete: () => cardEl.remove()
      });
    }

    // Add chip to zone
    const chip = document.createElement("div");
    chip.className = "placed-chip";
    chip.style.background = color;
    chip.style.boxShadow = `0 3px 0 ${darkColor}`;
    chip.innerHTML = `<span class="chip-emoji">${entity.emoji || ""}</span>${entity.label}`;
    document.getElementById(`cat-items-${catId}`).appendChild(chip);
    gsap.to(chip, { opacity: 1, scale: 1, duration: .35, ease: "back.out(2)" });

    // Flash zone green
    gsap.to(zoneEl, { background: "rgba(74,222,128,.18)", duration: .2, yoyo: true, repeat: 1 });

    // Score pop
    popScore(`+${SPEC.rules.correct_points || 10}`, zoneEl, color);

    // Check win
    if (Object.keys(placed).length === SPEC.entities.length) {
      setTimeout(showWin, 300);
    }
  } else {
    // ❌ wrong
    mistakes++;
    errEl.textContent = `${mistakes} 错`;
    const cardEl = document.getElementById(`card-${entityId}`);
    if (cardEl) {
      gsap.timeline()
        .to(cardEl, { x: -10, duration: .07 })
        .to(cardEl, { x: 10, duration: .07 })
        .to(cardEl, { x: -8, duration: .07 })
        .to(cardEl, { x: 8, duration: .07 })
        .to(cardEl, { x: 0, duration: .07 });
      gsap.to(cardEl, { borderColor: "#F87171", duration: .1, yoyo: true, repeat: 3 });
    }
    gsap.to(zoneEl, { background: "rgba(248,113,113,.15)", duration: .15, yoyo: true, repeat: 1 });
  }
}

// ── score pop ─────────────────────────────────────────────
function popScore(text, el, color) {
  const pop = document.createElement("div");
  pop.textContent = text;
  pop.style.cssText = `position:fixed;font-size:18px;font-weight:900;color:${color};pointer-events:none;z-index:200;text-shadow:0 2px 8px rgba(0,0,0,.5)`;
  const r = el.getBoundingClientRect();
  pop.style.left = (r.left + r.width / 2 - 20) + "px";
  pop.style.top = (r.top + 20) + "px";
  document.body.appendChild(pop);
  gsap.to(pop, { y: -50, opacity: 0, duration: .8, ease: "power2.out", onComplete: () => pop.remove() });
}

// ── win ───────────────────────────────────────────────────
function showWin() {
  document.getElementById("win-title").textContent = SPEC.feedback.complete_text;
  document.getElementById("win-sub").textContent = `得分 ${score} · 错误 ${mistakes} 次`;
  winDiv.style.display = "flex";
  gsap.from(winDiv.children, { opacity: 0, y: 30, stagger: .12, duration: .5, ease: "back.out(1.4)" });
  launchParticles();
}

document.getElementById("win-btn").addEventListener("click", () => {
  placed = {}; score = 0; mistakes = 0;
  scoreEl.textContent = "0 分"; errEl.textContent = "0 错";
  promptBar.textContent = SPEC.levels[0]?.prompt || "";
  // clear chips
  (SPEC.categories || []).forEach(cat => {
    const el = document.getElementById(`cat-items-${cat.id}`);
    if (el) el.innerHTML = "";
  });
  winDiv.style.display = "none";
  buildCards();
});

// ── canvas particles ──────────────────────────────────────
function launchParticles() {
  const canvas = document.getElementById("particle-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    vx: (Math.random() - .5) * 6,
    vy: Math.random() * 4 + 2,
    size: Math.random() * 9 + 4,
    color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
    rot: Math.random() * 360,
    rotV: (Math.random() - .5) * 8,
    shape: Math.random() > .5 ? "rect" : "circle",
    life: 1
  }));

  let raf;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vy += .12;
      p.rot += p.rotV; p.life -= .008;
      if (p.y < canvas.height + 20 && p.life > 0) { alive = true; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === "rect") {
        ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * .6);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (alive) raf = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  raf = requestAnimationFrame(draw);
}
</script>
</body>
</html>
