<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>参数实验室</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg1:#0c1425;--bg2:#0f2040;--accent:#38bdf8;--green:#4ADE80;--red:#F87171;--yellow:#FCD34D;--border:#ffffff18;--text:#f1f5f9;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;font-family:'Nunito','PingFang SC',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);user-select:none}

#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:52px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-shrink:0}
#topic{font-size:15px;font-weight:800;color:#bae6fd}
.badge{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}

#prompt-bar{padding:7px 16px;background:rgba(56,189,248,.15);border-bottom:1px solid rgba(56,189,248,.2);font-size:13px;font-weight:600;color:#bae6fd;flex-shrink:0;min-height:34px;display:flex;align-items:center}

#game{flex:1;display:flex;gap:10px;padding:10px 12px;min-height:0;overflow:hidden}

/* left controls */
#controls{flex:0 0 168px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-right:2px}
.ctrl-card{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:14px;padding:10px 12px;transition:border-color .3s}
.ctrl-card.healthy{border-color:rgba(74,222,128,.4)}
.ctrl-card.warning{border-color:rgba(252,211,77,.4)}
.ctrl-card.danger{border-color:rgba(248,113,113,.4)}
.ctrl-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ctrl-label{font-size:12px;font-weight:700;color:#e0f2fe}
.ctrl-value{font-size:14px;font-weight:900}
.ctrl-range{width:100%;appearance:none;height:5px;border-radius:3px;outline:none;cursor:pointer}
.ctrl-range::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:3px solid #0c1425;transition:transform .1s}
.ctrl-range::-webkit-slider-thumb:hover{transform:scale(1.2)}

/* right SVG scene */
#scene-wrap{flex:1;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#scene-svg{width:100%;height:100%;display:block}
#goal-badge{position:absolute;top:10px;right:12px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--green);opacity:0;pointer-events:none}
#progress-ring-wrap{position:absolute;bottom:12px;right:14px}

/* win */
#win{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;background:rgba(12,20,37,.92);backdrop-filter:blur(6px)}
#win-title{font-size:26px;font-weight:900;color:#bae6fd;text-align:center}
#win-sub{font-size:14px;color:var(--dim)}
#win-btn{padding:11px 32px;border-radius:14px;border:none;background:var(--accent);color:#0c1425;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #0284c7}
#win-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #0284c7}
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div style="display:flex;flex-direction:column;height:100vh">
  <div id="header">
    <span id="topic"></span>
    <span class="badge" id="prog-badge" style="color:#fbbf24">0%</span>
  </div>
  <div id="prompt-bar"></div>
  <div id="game">
    <div id="controls"></div>
    <div id="scene-wrap">
      <!-- SVG scene injected by JS -->
      <svg id="scene-svg" viewBox="0 0 560 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sceneBg" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#0d2040"/>
            <stop offset="100%" stop-color="#060c18"/>
          </radialGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow2"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="560" height="420" fill="url(#sceneBg)"/>
        <g id="scene-static"></g>
        <g id="scene-dynamic"></g>
      </svg>
      <div id="goal-badge">目标达成!</div>
      <div id="progress-ring-wrap">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="5"/>
          <circle id="pring" cx="28" cy="28" r="22" fill="none" stroke="#38bdf8" stroke-width="5"
            stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="138.2"
            transform="rotate(-90 28 28)"/>
          <text id="pring-txt" x="28" y="33" text-anchor="middle" font-size="11" font-weight="900" fill="#38bdf8" font-family="Nunito,sans-serif">0%</text>
        </svg>
      </div>
    </div>
  </div>
</div>
<div id="win">
  <div id="win-title"></div>
  <div id="win-sub"></div>
  <button id="win-btn">再次实验</button>
</div>

<script>
const SPEC = "__GAME_SPEC__";

const PALETTE = ["#38bdf8","#4ADE80","#FB923C","#A78BFA","#FCD34D","#F87171","#06B6D4","#EC4899"];
const entities = SPEC.entities;
let params = {};
entities.forEach(e => { params[e.param_name] = e.default !== undefined ? e.default : Math.floor((e.min + e.max) / 2); });
let won = false;

document.getElementById("topic").textContent = SPEC.topic;
document.getElementById("prompt-bar").textContent = SPEC.levels[0]?.prompt || SPEC.target_condition || "调节参数，观察效果变化";

// ── Scene library ─────────────────────────────────────────────────────────────
// Each scene returns { static: svgString, dynamic: (params,progress) => svgString }
const SCENES = {

  rocket: {
    static: `
      <!-- Ground -->
      <rect x="0" y="370" width="560" height="50" fill="#1e293b"/>
      <rect x="0" y="368" width="560" height="4" fill="#334155"/>
      <!-- Launch pad -->
      <rect x="240" y="340" width="80" height="30" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
      <rect x="256" y="320" width="8" height="24" fill="#475569"/>
      <rect x="296" y="320" width="8" height="24" fill="#475569"/>
      <!-- Rocket body static -->
      <path d="M268,320 L268,160 Q268,120 280,90 Q292,120 292,160 L292,320 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
      <path d="M268,320 L268,160 Q268,120 280,90 L280,320 Z" fill="#94a3b8" opacity=".3"/>
      <circle cx="280" cy="190" r="18" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
      <circle cx="280" cy="190" r="12" fill="#1e3a5f"/>
      <!-- Fins -->
      <path d="M268,300 L248,330 L268,260 Z" fill="#94a3b8"/>
      <path d="M292,300 L312,330 L292,260 Z" fill="#94a3b8"/>
      <!-- Grid fins -->
      <rect x="252" y="225" width="16" height="22" rx="3" fill="#64748b"/>
      <rect x="292" y="225" width="16" height="22" rx="3" fill="#64748b"/>
      <!-- Atmosphere indicator -->
      <text x="460" y="30" text-anchor="end" font-size="10" fill="#64748b" font-family="Nunito,sans-serif">高度</text>
      <rect x="450" y="35" width="8" height="300" rx="4" fill="#1e293b"/>
    `,
    dynamic: (p, progress) => {
      const thrust = p.thrust !== undefined ? p.thrust : p[Object.keys(p)[0]];
      const thrustPct = entities.find(e=>e.param_name==="thrust") ? (p.thrust - entities.find(e=>e.param_name==="thrust").min) / Math.max(entities.find(e=>e.param_name==="thrust").max - entities.find(e=>e.param_name==="thrust").min, 1) : progress;
      const fuelPct   = entities.find(e=>e.param_name==="fuel")   ? (p.fuel   - entities.find(e=>e.param_name==="fuel").min)   / Math.max(entities.find(e=>e.param_name==="fuel").max   - entities.find(e=>e.param_name==="fuel").min, 1)   : progress;
      const altitude = progress;

      // Rocket position (rises with progress)
      const rocketY = 60 + (1 - altitude) * 240;
      const flameH  = thrustPct * 55 + 5;
      const flameColor = thrustPct > 0.6 ? "#f97316" : thrustPct > 0.3 ? "#fbbf24" : "#dc2626";

      // Exhaust trail
      let trail = "";
      if (thrustPct > 0.1) {
        for (let i = 0; i < 5; i++) {
          const ty = rocketY + 242 + flameH + i * 18;
          const ta = (0.4 - i * 0.08) * thrustPct;
          trail += `<ellipse cx="280" cy="${ty}" rx="${6-i}" ry="8" fill="${flameColor}" opacity="${ta}"/>`;
        }
      }

      // Flame
      const flame = thrustPct > 0.05 ? `
        <ellipse cx="280" cy="${rocketY + 238}" rx="${flameH * 0.4}" ry="${flameH}" fill="${flameColor}" opacity=".75" filter="url(#glow)"/>
        <ellipse cx="280" cy="${rocketY + 246}" rx="${flameH * 0.25}" ry="${flameH * 0.6}" fill="#fcd34d" opacity=".9"/>
        <ellipse cx="280" cy="${rocketY + 250}" rx="${flameH * 0.12}" ry="${flameH * 0.3}" fill="white" opacity=".8"/>
      ` : "";

      // Altitude bar
      const altH = altitude * 280;
      const altColor = altitude > 0.7 ? "#4ADE80" : altitude > 0.4 ? "#FCD34D" : "#38bdf8";

      // Stars appear at high altitude
      let stars = "";
      if (altitude > 0.3) {
        const starAlpha = (altitude - 0.3) / 0.7;
        stars = `
          <circle cx="80" cy="50" r="1.5" fill="white" opacity="${starAlpha * .8}"/>
          <circle cx="140" cy="100" r="1" fill="white" opacity="${starAlpha * .6}"/>
          <circle cx="400" cy="60" r="1.5" fill="white" opacity="${starAlpha * .7}"/>
          <circle cx="480" cy="120" r="1" fill="white" opacity="${starAlpha * .5}"/>
          <circle cx="60" cy="180" r="1" fill="white" opacity="${starAlpha * .5}"/>
          <circle cx="500" cy="200" r="1.5" fill="white" opacity="${starAlpha * .6}"/>
        `;
      }

      // Move entire rocket group
      return `
        ${stars}
        <g transform="translate(0, ${rocketY - 60})">
          <path d="M268,320 L268,160 Q268,120 280,90 Q292,120 292,160 L292,320 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
          <path d="M268,320 L268,160 Q268,120 280,90 L280,320 Z" fill="#94a3b8" opacity=".3"/>
          <circle cx="280" cy="190" r="18" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
          <circle cx="280" cy="190" r="12" fill="#1e3a5f"/>
          <circle cx="280" cy="190" r="6" fill="#60a5fa" opacity="${0.3 + progress * 0.7}"/>
          <path d="M268,300 L248,330 L268,260 Z" fill="#94a3b8"/>
          <path d="M292,300 L312,330 L292,260 Z" fill="#94a3b8"/>
          <rect x="252" y="225" width="16" height="22" rx="3" fill="#64748b"/>
          <rect x="292" y="225" width="16" height="22" rx="3" fill="#64748b"/>
          ${flame}
        </g>
        ${trail}
        <rect x="450" y="${335 - altH}" width="8" height="${altH}" rx="4" fill="${altColor}" filter="url(#glow)"/>
        <text x="454" y="${330 - altH}" text-anchor="middle" font-size="9" fill="${altColor}" font-family="Nunito,sans-serif">${Math.round(altitude*100)}%</text>
      `;
    }
  },

  photosynthesis: {
    static: `
      <!-- Sky -->
      <rect x="0" y="0" width="560" height="420" fill="#0a1f0d" opacity=".5"/>
      <!-- Soil -->
      <rect x="0" y="340" width="560" height="80" fill="#451a03" opacity=".7"/>
      <rect x="0" y="338" width="560" height="6" fill="#78350f"/>
      <!-- Stem -->
      <rect x="274" y="200" width="12" height="142" rx="5" fill="#166534"/>
      <!-- Leaf left -->
      <path d="M280,280 Q220,250 200,260 Q230,300 280,295Z" fill="#15803d" stroke="#166534" stroke-width="1"/>
      <!-- Leaf right -->
      <path d="M280,240 Q340,215 360,225 Q335,265 280,258Z" fill="#15803d" stroke="#166534" stroke-width="1"/>
    `,
    dynamic: (p, progress) => {
      const light = p.light !== undefined ? (p.light - (entities.find(e=>e.param_name==="light")?.min||0)) / Math.max((entities.find(e=>e.param_name==="light")?.max||100) - (entities.find(e=>e.param_name==="light")?.min||0), 1) : progress;
      const co2   = p.co2   !== undefined ? (p.co2   - (entities.find(e=>e.param_name==="co2")?.min||0))   / Math.max((entities.find(e=>e.param_name==="co2")?.max||100)   - (entities.find(e=>e.param_name==="co2")?.min||0), 1)   : progress;
      const water = p.water !== undefined ? (p.water - (entities.find(e=>e.param_name==="water")?.min||0)) / Math.max((entities.find(e=>e.param_name==="water")?.max||100) - (entities.find(e=>e.param_name==="water")?.min||0), 1) : progress;

      // Sun brightness
      const sunR = 30 + light * 30;
      const sunA = 0.3 + light * 0.7;

      // Bubble count (O2 production)
      const bubbleCount = Math.round(progress * 8);
      let bubbles = "";
      for (let i = 0; i < bubbleCount; i++) {
        const bx = 250 + (i % 4) * 18;
        const by = 160 - Math.floor(i / 4) * 24;
        bubbles += `<circle cx="${bx}" cy="${by}" r="6" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="${0.5 + i*0.06}"/>
                    <text x="${bx}" y="${by+4}" text-anchor="middle" font-size="8" fill="#38bdf8" opacity=".8">O₂</text>`;
      }

      // Water roots
      const waterH = water * 50;
      // CO2 arrows
      const co2A = co2;

      // Leaf color (greener with more progress)
      const leafG = Math.round(100 + progress * 55);
      const leafColor = `rgb(30,${leafG},50)`;

      // Flower blooms at high progress
      const flowerOpacity = Math.max(0, (progress - 0.6) / 0.4);

      return `
        <!-- Sun -->
        <circle cx="460" cy="60" r="${sunR + 15}" fill="#fde68a" opacity="${sunA * 0.15}" filter="url(#glow2)"/>
        <circle cx="460" cy="60" r="${sunR}" fill="#fbbf24" opacity="${sunA}"/>
        <circle cx="460" cy="60" r="${sunR - 10}" fill="#fcd34d" opacity="${sunA}"/>
        <!-- Sunlight rays -->
        ${light > 0.2 ? `
          <line x1="460" y1="${60+sunR}" x2="330" y2="220" stroke="#fcd34d" stroke-width="${1.5*light}" opacity="${light*0.35}" stroke-dasharray="6,4"/>
          <line x1="460" y1="${60+sunR}" x2="290" y2="250" stroke="#fcd34d" stroke-width="${1.5*light}" opacity="${light*0.3}" stroke-dasharray="6,4"/>
          <line x1="460" y1="${60+sunR}" x2="260" y2="240" stroke="#fcd34d" stroke-width="${light}" opacity="${light*0.25}" stroke-dasharray="6,4"/>
        ` : ""}
        <!-- CO2 arrows coming in -->
        ${co2 > 0.1 ? `
          <text x="80" y="210" font-size="11" fill="#94a3b8" font-family="Nunito,sans-serif" opacity="${co2A}">CO₂</text>
          <line x1="118" y1="208" x2="200" y2="258" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" opacity="${co2A*0.7}" marker-end="url(#arr)"/>
          <text x="80" y="240" font-size="11" fill="#94a3b8" font-family="Nunito,sans-serif" opacity="${co2A*0.7}">CO₂</text>
          <line x1="118" y1="238" x2="200" y2="268" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" opacity="${co2A*0.5}"/>
        ` : ""}
        <!-- Water uptake in roots -->
        <rect x="268" y="${342 - waterH}" width="24" height="${waterH}" rx="5" fill="#38bdf8" opacity="${0.2 + water*0.6}"/>
        <!-- Leaf color update -->
        <path d="M280,280 Q220,250 200,260 Q230,300 280,295Z" fill="${leafColor}" stroke="#166534" stroke-width="1"/>
        <path d="M280,240 Q340,215 360,225 Q335,265 280,258Z" fill="${leafColor}" stroke="#166534" stroke-width="1"/>
        <!-- Chloroplasts visible at high progress -->
        ${progress > 0.3 ? `
          <circle cx="245" cy="272" r="5" fill="#4ADE80" opacity="${(progress-0.3)*1.4}"/>
          <circle cx="258" cy="265" r="4" fill="#4ADE80" opacity="${(progress-0.3)*1.3}"/>
          <circle cx="320" cy="248" r="5" fill="#4ADE80" opacity="${(progress-0.3)*1.4}"/>
          <circle cx="308" cy="255" r="4" fill="#4ADE80" opacity="${(progress-0.3)*1.3}"/>
        ` : ""}
        <!-- O2 bubbles -->
        ${bubbles}
        <!-- Flower -->
        ${flowerOpacity > 0 ? `
          <circle cx="280" cy="170" r="22" fill="#fde68a" opacity="${flowerOpacity*0.9}"/>
          <circle cx="260" cy="152" r="11" fill="#fbbf24" opacity="${flowerOpacity*0.8}"/>
          <circle cx="300" cy="152" r="11" fill="#fbbf24" opacity="${flowerOpacity*0.8}"/>
          <circle cx="257" cy="178" r="10" fill="#fbbf24" opacity="${flowerOpacity*0.8}"/>
          <circle cx="303" cy="178" r="10" fill="#fbbf24" opacity="${flowerOpacity*0.8}"/>
          <circle cx="280" cy="148" r="11" fill="#fbbf24" opacity="${flowerOpacity*0.8}"/>
          <circle cx="280" cy="170" r="16" fill="#f97316" opacity="${flowerOpacity}"/>
        ` : ""}
        <!-- Rate indicator -->
        <text x="28" y="24" font-size="10" fill="#64748b" font-family="Nunito,sans-serif">光合速率</text>
        <rect x="20" y="30" width="8" height="280" rx="4" fill="#1e293b"/>
        <rect x="20" y="${310 - progress*280}" width="8" height="${progress*280}" rx="4" fill="#4ADE80" filter="url(#glow)"/>
      `;
    }
  },

  default: {
    static: `
      <!-- Grid -->
      ${(() => { let s=""; for(let x=0;x<=560;x+=40) s+=`<line x1="${x}" y1="0" x2="${x}" y2="420" stroke="rgba(255,255,255,.03)" stroke-width="1"/>`; for(let y=0;y<=420;y+=40) s+=`<line x1="0" y1="${y}" x2="560" y2="${y}" stroke="rgba(255,255,255,.03)" stroke-width="1"/>`; return s; })()}
    `,
    dynamic: (p, progress) => {
      const hue = Math.round(progress * 120);
      const barCount = entities.length;
      const barW = Math.min(40, 280 / barCount);
      const startX = 280 - (barCount * (barW + 10)) / 2;
      let bars = "";
      entities.forEach((e, i) => {
        const color = PALETTE[i % PALETTE.length];
        const pct = (p[e.param_name] - e.min) / Math.max(e.max - e.min, 1);
        const bH = pct * 260 + 4;
        const bX = startX + i * (barW + 10);
        const bY = 310 - bH;
        bars += `<rect x="${bX}" y="${bY}" width="${barW}" height="${bH}" rx="6" fill="${color}" opacity="${0.5 + pct*0.5}" filter="url(#glow)"/>
                 <text x="${bX + barW/2}" y="326" text-anchor="middle" font-size="9" fill="${color}" font-family="Nunito,sans-serif">${e.label.slice(0,4)}</text>`;
      });
      return `
        ${bars}
        <circle cx="420" cy="150" r="${20 + progress*50}" fill="hsl(${hue},80%,50%)" opacity="${0.15 + progress*0.2}" filter="url(#glow2)"/>
        <circle cx="420" cy="150" r="${10 + progress*25}" fill="hsl(${hue},90%,65%)" opacity="${0.4 + progress*0.4}" filter="url(#glow)"/>
        <text x="420" y="155" text-anchor="middle" font-size="11" font-weight="900" fill="white" font-family="Nunito,sans-serif">${Math.round(progress*100)}%</text>
      `;
    }
  }
};

function detectScene(spec) {
  const t = ((spec.scene_type||"") + " " + (spec.visual_description||"") + " " + spec.topic + " " + spec.theme).toLowerCase();
  if (/rocket|火箭|航天|推进|发射|spacecraft/.test(t)) return "rocket";
  if (/光合|植物|photosyn|叶绿|chloro|plant/.test(t)) return "photosynthesis";
  return "default";
}

const sceneKey = detectScene(SPEC);
const scene = SCENES[sceneKey] || SCENES.default;

// inject static SVG
document.getElementById("scene-static").innerHTML = scene.static;

// ── sliders ───────────────────────────────────────────────────────────────────
const ctrlContainer = document.getElementById("controls");
entities.forEach((e, i) => {
  const color = PALETTE[i % PALETTE.length];
  const card = document.createElement("div");
  card.className = "ctrl-card";
  card.id = `card-${e.param_name}`;
  card.innerHTML = `
    <div class="ctrl-header">
      <span class="ctrl-label">${e.label}</span>
      <span class="ctrl-value" id="val-${e.param_name}" style="color:${color}">${params[e.param_name]}${e.unit||""}</span>
    </div>
    <input class="ctrl-range" type="range" id="range-${e.param_name}"
      min="${e.min}" max="${e.max}" value="${params[e.param_name]}"
      style="background:linear-gradient(to right,${color} 0%,${color} ${pct(e)}%,#1e293b ${pct(e)}%,#1e293b 100%)">
  `;
  card.style.borderColor = color + "44";
  ctrlContainer.appendChild(card);

  const style = document.createElement("style");
  style.textContent = `#range-${e.param_name}::-webkit-slider-thumb{background:${color}}`;
  document.head.appendChild(style);

  const range = card.querySelector(`#range-${e.param_name}`);
  range.addEventListener("input", () => {
    params[e.param_name] = Number(range.value);
    document.getElementById(`val-${e.param_name}`).textContent = `${params[e.param_name]}${e.unit||""}`;
    const p2 = pct(e);
    range.style.background = `linear-gradient(to right,${color} 0%,${color} ${p2}%,#1e293b ${p2}%,#1e293b 100%)`;
    // card health color
    const card2 = document.getElementById(`card-${e.param_name}`);
    card2.className = "ctrl-card " + (p2 > 60 ? "healthy" : p2 > 30 ? "warning" : "danger");
    onParamChange();
  });

  gsap.from(card, { opacity: 0, x: -20, duration: .3, delay: i * .07, ease: "back.out(1.5)" });
});

function pct(e) { return Math.round((params[e.param_name] - e.min) / Math.max(e.max - e.min, 1) * 100); }

// ── render loop ───────────────────────────────────────────────────────────────
let rafId;
function render() {
  const progress = overallProgress();
  const dynEl = document.getElementById("scene-dynamic");
  if (dynEl) dynEl.innerHTML = scene.dynamic(params, progress);

  // progress ring
  const circ = 2 * Math.PI * 22;
  const offset = circ * (1 - progress);
  const pring = document.getElementById("pring");
  const ptxt  = document.getElementById("pring-txt");
  if (pring) {
    pring.setAttribute("stroke-dashoffset", offset);
    const col = progress >= .8 ? "#4ADE80" : progress >= .5 ? "#FCD34D" : "#38bdf8";
    pring.setAttribute("stroke", col);
    if (ptxt) { ptxt.textContent = Math.round(progress*100) + "%"; ptxt.setAttribute("fill", col); }
  }

  rafId = requestAnimationFrame(render);
}
render();

function overallProgress() {
  const vals = entities.map(e => (params[e.param_name] - e.min) / Math.max(e.max - e.min, 1));
  return vals.reduce((a, b) => a + b, 0) / Math.max(vals.length, 1);
}

function onParamChange() {
  const p = overallProgress();
  document.getElementById("prog-badge").textContent = Math.round(p * 100) + "%";
  gsap.to(document.getElementById("prog-badge"), { color: p >= .8 ? "#4ADE80" : p >= .5 ? "#FCD34D" : "#fbbf24", duration: .3 });
  if (p >= .75 && !won) {
    won = true;
    const badge = document.getElementById("goal-badge");
    gsap.to(badge, { opacity: 1, scale: 1.1, duration: .4, yoyo: true, repeat: 1, onComplete: () => gsap.set(badge, { opacity: 1, scale: 1 }) });
    setTimeout(showWin, 700);
  }
}

function showWin() {
  cancelAnimationFrame(rafId);
  document.getElementById("win-title").textContent = SPEC.feedback.complete_text;
  document.getElementById("win-sub").textContent = `实验成功 · 效率达到 ${Math.round(overallProgress()*100)}%`;
  const win = document.getElementById("win");
  win.style.display = "flex";
  gsap.from(win.children, { opacity: 0, y: 28, stagger: .1, duration: .5, ease: "back.out(1.4)" });
  launchParticles();
}

document.getElementById("win-btn").addEventListener("click", () => {
  won = false;
  entities.forEach(e => {
    params[e.param_name] = e.default !== undefined ? e.default : Math.floor((e.min + e.max) / 2);
    const r = document.getElementById(`range-${e.param_name}`);
    if (r) { r.value = params[e.param_name]; r.dispatchEvent(new Event("input")); }
  });
  document.getElementById("prog-badge").textContent = "0%";
  document.getElementById("goal-badge").style.opacity = "0";
  document.getElementById("win").style.display = "none";
  render();
});

function launchParticles() {
  const c = document.getElementById("particle-canvas");
  const ctx2 = c.getContext("2d");
  c.width = innerWidth; c.height = innerHeight;
  const parts = Array.from({length:100}, () => ({
    px:Math.random()*c.width, py:-10,
    vx:(Math.random()-.5)*5, vy:Math.random()*4+2,
    sz:Math.random()*8+4, col:PALETTE[Math.floor(Math.random()*PALETTE.length)],
    rot:Math.random()*360, rv:(Math.random()-.5)*7, life:1
  }));
  function draw() {
    ctx2.clearRect(0,0,c.width,c.height);
    let alive=false;
    for(const p of parts){
      p.px+=p.vx; p.py+=p.vy; p.vy+=.1; p.rot+=p.rv; p.life-=.009;
      if(p.py<c.height&&p.life>0) alive=true;
      ctx2.save(); ctx2.globalAlpha=Math.max(0,p.life);
      ctx2.translate(p.px,p.py); ctx2.rotate(p.rot*Math.PI/180);
      ctx2.fillStyle=p.col; ctx2.fillRect(-p.sz/2,-p.sz/3,p.sz,p.sz*.6);
      ctx2.restore();
    }
    if(alive) requestAnimationFrame(draw);
    else ctx2.clearRect(0,0,c.width,c.height);
  }
  requestAnimationFrame(draw);
}
</script>
