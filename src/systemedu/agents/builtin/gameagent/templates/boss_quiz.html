<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Boss 挑战</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg1:#1a0533;--bg2:#2d0a5a;--accent:#c084fc;--green:#4ade80;--red:#f87171;--gold:#fbbf24;--card:#ffffff0d;--border:#ffffff18;--text:#f1f5f9;--dim:#94a3b8;--boss-hp:#ef4444;--boss-hp2:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;font-family:'Nunito','PingFang SC',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);user-select:none}

#header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;height:48px;background:rgba(0,0,0,.35);border-bottom:1px solid var(--border);flex-shrink:0}
#topic{font-size:14px;font-weight:800;color:#e9d5ff}
.badge{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1);font-size:12px;font-weight:700}
.badge.pts{color:var(--gold)}
.badge.prog{color:#c4b5fd}

/* Boss area */
#boss-area{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:10px 14px 6px;gap:6px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
#boss-row{display:flex;align-items:center;gap:10px;width:100%}
#boss-icon{width:48px;height:48px;border-radius:14px;background:rgba(192,132,252,.15);border:2px solid rgba(192,132,252,.4);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;position:relative}
#boss-name-hp{flex:1;display:flex;flex-direction:column;gap:4px}
#boss-name{font-size:13px;font-weight:800;color:#e9d5ff}
#hp-bar-wrap{height:10px;border-radius:8px;background:rgba(255,255,255,.1);overflow:hidden;position:relative}
#hp-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--boss-hp2),var(--boss-hp));transition:width .5s ease,background .5s;width:100%}
#hp-text{font-size:10px;color:var(--dim);font-weight:700;text-align:right}
#damage-flash{position:absolute;inset:0;border-radius:14px;background:rgba(248,113,113,.5);opacity:0;pointer-events:none}

/* Question area */
#q-area{flex:1;display:flex;flex-direction:column;padding:10px 12px;gap:8px;overflow-y:auto}
#q-num{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
#q-text{font-size:15px;font-weight:800;color:var(--text);line-height:1.4;padding:8px 10px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid var(--border);min-height:48px;display:flex;align-items:center}
#options-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1;align-content:start}
.opt-btn{padding:10px 8px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:inherit;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;line-height:1.3;transition:border-color .15s,background .15s;will-change:transform}
.opt-btn:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:var(--accent)}
.opt-btn.correct{border-color:var(--green);background:rgba(74,222,128,.15);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.15);color:var(--red)}
.opt-btn:disabled{cursor:default}

/* Feedback bar */
#feedback-bar{padding:6px 12px;font-size:13px;font-weight:700;min-height:34px;display:flex;align-items:center;flex-shrink:0;transition:background .3s;background:transparent}

/* Win / Lose */
#end-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%)}
#end-icon{font-size:56px}
#end-title{font-size:24px;font-weight:900;text-align:center}
#end-sub{font-size:13px;color:var(--dim)}
#end-btn{padding:11px 32px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #7c3aed}
#end-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #7c3aed}

#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div style="display:flex;flex-direction:column;height:100vh">
  <div id="header">
    <span id="topic"></span>
    <div style="display:flex;gap:8px">
      <span class="badge pts" id="score-el">0 分</span>
      <span class="badge prog" id="prog-el">0/0</span>
    </div>
  </div>

  <div id="boss-area">
    <div id="boss-row">
      <div id="boss-icon">
        <span id="boss-emoji-el"></span>
        <div id="damage-flash"></div>
      </div>
      <div id="boss-name-hp">
        <div id="boss-name"></div>
        <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
        <div id="hp-text"></div>
      </div>
    </div>
  </div>

  <div id="q-area">
    <div id="q-num"></div>
    <div id="q-text"></div>
    <div id="options-grid"></div>
  </div>
  <div id="feedback-bar"></div>
</div>

<div id="end-screen">
  <div id="end-icon"></div>
  <div id="end-title"></div>
  <div id="end-sub"></div>
  <button id="end-btn">再来一次</button>
</div>

<script>
const SPEC = "__GAME_SPEC__";

document.getElementById("topic").textContent = SPEC.topic;

const questions = SPEC.questions || SPEC.entities;
const total = questions.length;
const bossName = SPEC.boss_name || SPEC.theme || "Boss";
const bossEmoji = SPEC.boss_emoji || "👾";
const pts = SPEC.rules?.correct_points || 10;
const maxMistakes = SPEC.rules?.max_mistakes || 3;

document.getElementById("boss-name").textContent = bossName;
document.getElementById("boss-emoji-el").textContent = bossEmoji;

let score = 0, qIdx = 0, mistakes = 0;
let bossHp = 100;
const dmgPerQ = 100 / total;

function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }

// Shuffle question order each game
let qOrder = shuffle(questions.map((_, i) => i));

function updateProgress() {
  document.getElementById("score-el").textContent = `${score} 分`;
  document.getElementById("prog-el").textContent = `${qIdx}/${total}`;
}
updateProgress();

function renderBossHp() {
  const bar = document.getElementById("hp-bar");
  const pct = Math.max(0, bossHp);
  bar.style.width = pct + "%";
  const r = Math.round(255 * (pct / 100));
  const g = Math.round(255 * (1 - pct / 100));
  bar.style.background = `linear-gradient(90deg,rgb(${r},${g},34),rgb(${Math.max(0,r-60)},${g+60},34))`;
  document.getElementById("hp-text").textContent = `HP ${Math.round(pct)}%`;
}
renderBossHp();

function renderQuestion() {
  if (qIdx >= total) { endGame(true); return; }
  const q = questions[qOrder[qIdx]];
  document.getElementById("q-num").textContent = `问题 ${qIdx + 1} / ${total}`;
  document.getElementById("q-text").textContent = q.question;

  const grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  const opts = shuffle(q.options);
  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = opt;
    btn.addEventListener("click", () => onAnswer(btn, opt, q.correct));
    gsap.from(btn, { opacity: 0, y: 10, duration: .25, ease: "back.out(1.4)" });
    grid.appendChild(btn);
  });

  document.getElementById("feedback-bar").textContent = "";
  document.getElementById("feedback-bar").style.background = "transparent";
  document.getElementById("feedback-bar").style.color = "var(--dim)";

  gsap.from(document.getElementById("q-text"), { opacity: 0, x: 20, duration: .3, ease: "power2.out" });
}
renderQuestion();

function onAnswer(btn, chosen, correct) {
  // Disable all
  document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
  const isCorrect = chosen === correct;
  const feedBar = document.getElementById("feedback-bar");

  if (isCorrect) {
    btn.classList.add("correct");
    score += pts;
    bossHp = Math.max(0, bossHp - dmgPerQ);
    renderBossHp();
    feedBar.textContent = SPEC.feedback?.correct_text || "正确！";
    feedBar.style.background = "rgba(74,222,128,.1)";
    feedBar.style.color = "var(--green)";

    // Boss damage animation
    gsap.timeline()
      .to("#damage-flash", { opacity: 1, duration: .08 })
      .to("#damage-flash", { opacity: 0, duration: .25 });
    gsap.timeline()
      .to("#boss-icon", { x: -6, duration: .07 })
      .to("#boss-icon", { x: 6, duration: .07 })
      .to("#boss-icon", { x: -4, duration: .07 })
      .to("#boss-icon", { x: 0, duration: .07 });

    // Score pop
    scorePopAt(btn, `+${pts}`);

    gsap.to(btn, { scale: 1.08, duration: .15, yoyo: true, repeat: 1 });
    qIdx++;
    updateProgress();
    setTimeout(renderQuestion, 900);
  } else {
    btn.classList.add("wrong");
    // highlight correct
    document.querySelectorAll(".opt-btn").forEach(b => {
      if (b.textContent === correct) b.classList.add("correct");
    });
    mistakes++;
    feedBar.textContent = SPEC.feedback?.wrong_text || "错了，继续加油！";
    feedBar.style.background = "rgba(248,113,113,.1)";
    feedBar.style.color = "var(--red)";

    gsap.timeline()
      .to(btn, { x: -8, duration: .06 })
      .to(btn, { x: 8, duration: .06 })
      .to(btn, { x: -5, duration: .06 })
      .to(btn, { x: 0, duration: .06 });

    if (mistakes >= maxMistakes) {
      setTimeout(() => endGame(false), 900);
      return;
    }
    qIdx++;
    updateProgress();
    setTimeout(renderQuestion, 1000);
  }
}

function scorePopAt(el, text) {
  const pop = document.createElement("div");
  pop.textContent = text;
  pop.style.cssText = `position:fixed;font-size:20px;font-weight:900;color:var(--green);pointer-events:none;z-index:200;text-shadow:0 2px 8px rgba(0,0,0,.5)`;
  const r = el.getBoundingClientRect();
  pop.style.left = r.left + r.width / 2 - 15 + "px";
  pop.style.top = r.top + "px";
  document.body.appendChild(pop);
  gsap.to(pop, { y: -50, opacity: 0, duration: .8, ease: "power2.out", onComplete: () => pop.remove() });
}

function endGame(won) {
  const es = document.getElementById("end-screen");
  document.getElementById("end-icon").textContent = won ? "🏆" : "💀";
  document.getElementById("end-title").textContent = won
    ? (SPEC.feedback?.complete_text || "Boss 已击败！")
    : "挑战失败";
  document.getElementById("end-sub").textContent = won
    ? `得分 ${score} · ${mistakes} 次错误 · ${total} 题全部完成`
    : `得分 ${score} · 错误 ${mistakes} 次，超过上限`;
  es.style.display = "flex";
  gsap.from(es.children, { opacity: 0, y: 28, stagger: .12, duration: .5, ease: "back.out(1.4)" });
  if (won) launchParticles();
}

document.getElementById("end-btn").addEventListener("click", () => {
  score = 0; qIdx = 0; mistakes = 0; bossHp = 100;
  qOrder = shuffle(questions.map((_, i) => i));
  document.getElementById("end-screen").style.display = "none";
  document.getElementById("feedback-bar").textContent = "";
  document.getElementById("feedback-bar").style.background = "transparent";
  renderBossHp();
  updateProgress();
  renderQuestion();
});

function launchParticles() {
  const canvas = document.getElementById("particle-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = innerWidth; canvas.height = innerHeight;
  const colors = ["#c084fc","#4ade80","#fbbf24","#f87171","#a78bfa","#34d399"];
  const parts = Array.from({length:100}, () => ({
    x: Math.random()*canvas.width, y:-10,
    vx:(Math.random()-.5)*5, vy:Math.random()*4+2,
    size:Math.random()*8+4, color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360, rotV:(Math.random()-.5)*8, life:1
  }));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.rot+=p.rotV; p.life-=.009;
      if(p.y<canvas.height&&p.life>0) alive=true;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.6);
      ctx.restore();
    }
    if(alive) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
