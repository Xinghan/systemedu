<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Traversability legend: green safe / yellow caution / red no-go">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0e14"/>
      <stop offset="50%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22a357"/>
    </linearGradient>
    <linearGradient id="yellowG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d48a10"/>
    </linearGradient>
    <linearGradient id="redG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#c43838"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="400" y="42" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="2">TRAVERSABILITY LEGEND</text>
  <text x="400" y="66" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#aaabb0" text-anchor="middle">通行性三色图例 / Three-color zones</text>

  <!-- GREEN row -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="80" height="80" fill="url(#greenG)" stroke="#22a357" stroke-width="2"/>
    <text x="40" y="48" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700" fill="#0c2014" text-anchor="middle"></text>
    <text x="100" y="28" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="700" fill="#4ade80">SAFE 安全</text>
    <text x="100" y="48" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#c8c8d0">平整、干燥、硬实的地面 / Flat, dry, firm ground</text>
    <text x="100" y="66" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" font-style="italic">例：水泥人行道、操场、平整草坪</text>
  </g>

  <!-- YELLOW row -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="80" height="80" fill="url(#yellowG)" stroke="#d48a10" stroke-width="2"/>
    <text x="100" y="28" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="700" fill="#fbbf24">CAUTION 谨慎</text>
    <text x="100" y="48" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#c8c8d0">斜坡、湿滑、小障碍物 / Slopes, wet, small obstacles</text>
    <text x="100" y="66" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" font-style="italic">例：坡道、湿草地、石子路</text>
  </g>

  <!-- RED row -->
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="80" height="80" fill="url(#redG)" stroke="#c43838" stroke-width="2"/>
    <text x="100" y="28" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="700" fill="#f87171">NO-GO 禁行</text>
    <text x="100" y="48" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#c8c8d0">深坑、悬崖、水塘、深沙 / Pits, cliffs, water, deep sand</text>
    <text x="100" y="66" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#aaabb0" font-style="italic">例：深水坑、悬崖边、泥沼</text>
  </g>

  <!-- Three-question decision box on the right -->
  <g transform="translate(480, 110)">
    <rect x="0" y="0" width="280" height="300" fill="rgba(255,181,156,0.06)" stroke="#ffb59c" stroke-width="1.5"/>
    <text x="140" y="28" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700" fill="#ffb59c" text-anchor="middle" letter-spacing="1">THREE QUESTIONS 三问</text>

    <text x="20" y="62" font-family="Noto Sans SC, sans-serif" font-size="12" font-weight="700" fill="#ffb59c">1. 地面平吗？</text>
    <text x="28" y="80" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#c8c8d0">平 → 绿/黄 | 陡 → 红</text>

    <text x="20" y="112" font-family="Noto Sans SC, sans-serif" font-size="12" font-weight="700" fill="#ffb59c">2. 会陷吗？</text>
    <text x="28" y="130" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#c8c8d0">硬 → 绿 | 软 → 黄 | 深陷 → 红</text>

    <text x="20" y="162" font-family="Noto Sans SC, sans-serif" font-size="12" font-weight="700" fill="#ffb59c">3. 摔了会怎样？</text>
    <text x="28" y="180" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#c8c8d0">擦破皮 → 绿/黄 | 掉下去 → 红</text>

    <line x1="20" y1="210" x2="260" y2="210" stroke="#ffb59c" stroke-width="0.6" opacity="0.4"/>

    <text x="140" y="232" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#ffb59c" text-anchor="middle">SCORE → COLOR</text>
    <text x="140" y="252" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">3个「好」 → 绿</text>
    <text x="140" y="270" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">部分风险 → 黄</text>
    <text x="140" y="288" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#f87171" text-anchor="middle">任一危险 → 红</text>
  </g>

  <!-- Footer -->
  <text x="400" y="480" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#8a8a92" text-anchor="middle">记住：任何一项是红，整片就是红 / Remember: any red = whole red</text>
</svg>
