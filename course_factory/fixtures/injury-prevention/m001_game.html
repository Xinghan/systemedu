<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:oklch(0.75 0.16 15);
  --primary-dim:oklch(0.60 0.18 15);
  --bg:oklch(0.14 0.035 265);
  --bg-2:oklch(0.20 0.04 265);
  --fg:oklch(0.96 0.01 265);
  --fg-dim:oklch(0.75 0.02 265);
  --fg-mute:oklch(0.55 0.03 265);
  --line:oklch(0.35 0.05 265 / 0.35);
  --gold:oklch(0.85 0.14 85);
  --error:oklch(0.68 0.20 25);
  --glow-strong:oklch(0.75 0.16 15 / 0.5);
}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);color:var(--fg);font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,var(--line));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;line-height:1.3;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,var(--fg-mute));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,var(--fg-dim));line-height:1.55;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:18px;padding:8px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,var(--line));flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--fg-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.12em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
#c{width:100%;height:100%;display:block;cursor:crosshair;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,var(--line));}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:6px 14px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;border-radius:999px;box-shadow:0 0 12px var(--glow-strong);}
.ctrl-btn:hover{transform:scale(1.03);}
.ctrl-btn.secondary{background:transparent;border:1px solid var(--primary);color:var(--fg);box-shadow:none;}
.ctrl-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,6,15,0.82);backdrop-filter:blur(6px);z-index:10;}
.overlay.hidden{display:none;}
.panel{background:linear-gradient(180deg,oklch(0.19 0.04 265 / 0.92),oklch(0.15 0.035 265 / 0.92));border:1px solid var(--line);border-radius:14px;padding:24px 28px;max-width:640px;width:92%;position:relative;}
.panel::before,.panel::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--primary);opacity:0.6;}
.panel::before{top:10px;left:10px;border-right:none;border-bottom:none;}
.panel::after{bottom:10px;right:10px;border-left:none;border-top:none;}
.panel h2{font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--primary);margin-bottom:10px;letter-spacing:0.02em;}
.panel p{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:var(--fg-dim);line-height:1.7;margin-bottom:12px;}
.panel .summary-list{font-family:'Noto Sans SC',sans-serif;font-size:12px;color:var(--fg-dim);line-height:1.8;margin-bottom:16px;padding-left:18px;}
.panel .summary-list li{margin-bottom:4px;}
.panel .actions{display:flex;gap:12px;justify-content:center;margin-top:8px;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="opsLabel"></div>
    <div class="sidebar-guide" id="guideContent"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="legendLabel"></div>
    <div class="sidebar-guide" id="legendContent"></div>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="sceneTag"></div>
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
    </div>
    <div class="game-body">
      <canvas id="c"></canvas>
      <div class="overlay hidden" id="overlay">
        <div class="panel">
          <h2 id="ovTitle"></h2>
          <p id="ovBody"></p>
          <ul class="summary-list" id="ovList"></ul>
          <div class="actions">
            <button class="ctrl-btn" id="ovPrimary"></button>
            <button class="ctrl-btn secondary" id="ovSecondary"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn secondary" id="btnHint"></button>
      <button class="ctrl-btn" id="btnSubmit"></button>
      <button class="ctrl-btn secondary" id="btnReset"></button>
    </div>
  </div>
</div>

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var DPR = 1;
var sceneIdx = 0;

var hinted = false;
var scoreTotal = 0;

// particle helper
function spawnParticles(wx, wy, color){
  for (var i=0;i<10;i++){
    var ang = Math.random()*Math.PI*2;
    var sp = 1 + Math.random()*2;
    particles.push({
      x:wx, y:wy, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
      life:1, color: (i%4===0?'oklch(0.85 0.14 85)':color),
    });
  }
}

function resizeCanvas(){
  var body = document.querySelector('.game-body');
  if(!body) return;
  var rect = body.getBoundingClientRect();
  if(rect.width<1||rect.height<1){setTimeout(resizeCanvas,80);return;}
  DPR = Math.max(1, window.devicePixelRatio||1);
  canvas.width  = Math.round(rect.width * DPR);
  canvas.height = Math.round(rect.height * DPR);
  canvas.style.width = rect.width+'px';
  canvas.style.height = rect.height+'px';
  draw();
}
window.addEventListener('resize', resizeCanvas);

// world -> screen helpers (world = 1000x600, preserve aspect via uniform scale)
function worldTransform(){
  var W = canvas.width, H = canvas.height;
  var targetW = 1000, targetH = 600;
  var s = Math.min(W/targetW, H/targetH);
  var ox = (W - targetW*s)/2;
  var oy = (H - targetH*s)/2;
  return {s:s, ox:ox, oy:oy, W:W, H:H};
}

function clientToWorld(cx, cy){
  var rect = canvas.getBoundingClientRect();
  var x = (cx - rect.left) * DPR;
  var y = (cy - rect.top)  * DPR;
  var tf = worldTransform();
  return {x: (x - tf.ox)/tf.s, y: (y - tf.oy)/tf.s};
}

// ============================================================
// Background scenes (drawn in world coords 0..1000 x 0..600)
// ============================================================
function drawGrid(ctx, W, H, tf){
  var cm = gameModeColors();
  ctx.save();
  ctx.strokeStyle = cm.gridColor;
  ctx.lineWidth = 0.5;
  var step = cm.gridStep;
  for(var x=0;x<=1000;x+=step){
    var p = toScr(tf, x, 0), q = toScr(tf, x, 600);
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
  }
  for(var y=0;y<=600;y+=step){
    var p = toScr(tf, 0, y), q = toScr(tf, 1000, y);
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
  }
  ctx.restore();
}

function toScr(tf, wx, wy){ return {x: tf.ox + wx*tf.s, y: tf.oy + wy*tf.s}; }

function drawRect(ctx, tf, x, y, w, h, fill, stroke, lw){
  var p = toScr(tf, x, y);
  ctx.fillStyle = fill || 'transparent';
  if (fill) ctx.fillRect(p.x, p.y, w*tf.s, h*tf.s);
  if (stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = (lw||1);
    ctx.strokeRect(p.x, p.y, w*tf.s, h*tf.s);
  }
}
function drawLine(ctx, tf, x1,y1,x2,y2, stroke, lw){
  var a=toScr(tf,x1,y1), b=toScr(tf,x2,y2);
  ctx.strokeStyle = stroke; ctx.lineWidth = lw||1;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
}
function drawText(ctx, tf, wx, wy, txt, color, size, align, font){
  var p = toScr(tf, wx, wy);
  ctx.fillStyle = color;
  ctx.font = (font||('600 '+(size||11)+'px "JetBrains Mono", monospace'));
  ctx.textAlign = align||'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(txt, p.x, p.y);
}

function drawWorkshopBg(ctx, W, H){
  var tf = worldTransform();
  var cm = gameModeColors();

  // floor gradient
  var p0 = toScr(tf, 0, 0), p1 = toScr(tf, 1000, 600);
  var g = ctx.createLinearGradient(p0.x, p0.y, p0.x, p1.y);
  g.addColorStop(0, cm.bg1); g.addColorStop(1, cm.bg2);
  ctx.fillStyle = g;
  ctx.fillRect(p0.x, p0.y, 1000*tf.s, 600*tf.s);

  drawGrid(ctx, W, H, tf);

  // CNC machine body (right)
  drawRect(ctx, tf, 370, 250, 260, 200, 'oklch(0.28 0.04 265 / 0.6)', cm.dim, 1);
  drawRect(ctx, tf, 390, 270, 220, 140, 'oklch(0.20 0.035 265)', cm.mute, 0.8);
  // spinning blade indicator
  var blade = toScr(tf, 500, 340);
  ctx.save(); ctx.translate(blade.x, blade.y);
  ctx.strokeStyle = cm.accent; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for(var i=0;i<6;i++){ ctx.moveTo(0,0); var a=i*Math.PI/3; ctx.lineTo(Math.cos(a)*18*tf.s, Math.sin(a)*18*tf.s); }
  ctx.stroke();
  ctx.restore();
  drawText(ctx, tf, 500, 240, 'CNC-03', cm.accent, 10, 'center', '700 10px "JetBrains Mono",monospace');

  // worker silhouette (left)
  var head = toScr(tf, 200, 260);
  ctx.fillStyle = cm.gold; ctx.globalAlpha = 0.85;
  ctx.beginPath(); ctx.arc(head.x, head.y, 18*tf.s, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  drawRect(ctx, tf, 180, 285, 40, 80, cm.gold+' / 0.7', cm.gold, 0);
  // arms to machine
  drawLine(ctx, tf, 220, 310, 380, 320, cm.gold, 2);
  drawText(ctx, tf, 200, 400, 'OPERATOR', cm.dim, 10, 'center', '700 10px "JetBrains Mono",monospace');

  // floor line
  drawLine(ctx, tf, 0, 500, 1000, 500, cm.mute, 1);

  // exit sign
  drawRect(ctx, tf, 860, 60, 100, 40, 'oklch(0.28 0.04 265 / 0.4)', cm.dim, 1);
  drawText(ctx, tf, 910, 85, 'EXIT', cm.dim, 11, 'center', '700 11px "JetBrains Mono",monospace');
}

function drawHighWorkBg(ctx, W, H){
  var tf = worldTransform();
  var cm = gameModeColors();
  var p0 = toScr(tf, 0, 0);
  var g = ctx.createLinearGradient(p0.x, p0.y, p0.x, p0.y + 600*tf.s);
  g.addColorStop(0, cm.bg1); g.addColorStop(1, cm.bg2);
  ctx.fillStyle = g; ctx.fillRect(p0.x, p0.y, 1000*tf.s, 600*tf.s);
  drawGrid(ctx, W, H, tf);

  // scaffold frame (center)
  drawRect(ctx, tf, 340, 130, 360, 340, 'transparent', cm.dim, 1);
  // horizontal boards

  drawRect(ctx, tf, 340, 300, 360, 10, cm.mute, null, 0);
  drawRect(ctx, tf, 340, 400, 360, 10, cm.mute, null, 0);
  // vertical poles
  drawRect(ctx, tf, 340, 130, 6, 340, cm.dim, null, 0);
  drawRect(ctx, tf, 694, 130, 6, 340, cm.dim, null, 0);
  drawRect(ctx, tf, 517, 130, 6, 340, cm.mute, null, 0);
  // worker on scaffold
  var h2 = toScr(tf, 420, 250);
  ctx.fillStyle = cm.gold;
  ctx.beginPath(); ctx.arc(h2.x, h2.y, 15*tf.s, 0, Math.PI*2); ctx.fill();
  drawRect(ctx, tf, 404, 270, 32, 60, cm.gold+' / 0.6', cm.gold, 0);
  drawText(ctx, tf, 420, 345, 'WORKER', cm.dim, 9, 'center', '700 9px "JetBrains Mono",monospace');
  // ground
  drawLine(ctx, tf, 0, 520, 1000, 520, cm.mute, 1);
  drawText(ctx, tf, 50, 540, 'H = 6 m', cm.dim, 10, 'left', '700 10px "JetBrains Mono",monospace');
  // sky tag
  drawText(ctx, tf, 920, 60, 'SKY', cm.dim, 10, 'center', '400 10px "JetBrains Mono",monospace');
}

function drawChemStoreBg(ctx, W, H){
  var tf = worldTransform();
  var cm = gameModeColors();
  var p0 = toScr(tf, 0, 0);
  var g = ctx.createLinearGradient(p0.x, p0.y, p0.x, p0.y + 600*tf.s);
  g.addColorStop(0, cm.bg1); g.addColorStop(1, cm.bg2);
  ctx.fillStyle = g; ctx.fillRect(p0.x, p0.y, 1000*tf.s, 600*tf.s);
  drawGrid(ctx, W, H, tf);

  // shelves
  drawRect(ctx, tf, 500, 180, 380, 240, 'oklch(0.24 0.035 265 / 0.4)', cm.dim, 1);
  drawLine(ctx, tf, 500, 260, 880, 260, cm.mute, 0.8);
  drawLine(ctx, tf, 500, 340, 880, 340, cm.mute, 0.8);

  // drums on shelf + floor
  function drum(x, y, r, leak){
    var p = toScr(tf, x, y);
    ctx.fillStyle = 'oklch(0.40 0.08 265)'; ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(p.x, p.y, r*tf.s, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = cm.dim; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(p.x, p.y, r*tf.s, 0, Math.PI*2); ctx.stroke();
    if (leak){
      ctx.fillStyle = cm.error; ctx.globalAlpha = 0.4;
      var pp = toScr(tf, x, y+r+10);
      ctx.beginPath(); ctx.ellipse(pp.x, pp.y, 40*tf.s, 8*tf.s, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  drum(570, 220, 18, false);
  drum(700, 220, 18, false);
  drum(830, 220, 18, false);
  drum(570, 300, 18, false);
  drum(700, 300, 18, false);
  drum(830, 300, 18, false);
  drum(430, 360, 22, true); // leaking drum on floor left

  // worker on left
  var h3 = toScr(tf, 150, 320);
  ctx.fillStyle = cm.gold;
  ctx.beginPath(); ctx.arc(h3.x, h3.y, 18*tf.s, 0, Math.PI*2); ctx.fill();
  drawRect(ctx, tf, 130, 345, 40, 80, cm.gold+' / 0.6', cm.gold, 0);
  drawText(ctx, tf, 150, 450, 'WORKER', cm.dim, 10, 'center', '700 10px "JetBrains Mono",monospace');
  // door
  drawRect(ctx, tf, 60, 160, 60, 260, 'oklch(0.18 0.03 265 / 0.6)', cm.dim, 1);
  drawText(ctx, tf, 90, 150, 'DOOR', cm.dim, 9, 'center', '400 9px "JetBrains Mono",monospace');
  // ventilation vent (top right, closed)
  drawRect(ctx, tf, 740, 140, 80, 30, 'oklch(0.20 0.04 265 / 0.6)', cm.mute, 1);
  drawText(ctx, tf, 780, 160, 'VENT OFF', cm.error, 9, 'center', '700 9px "JetBrains Mono",monospace');
  // floor
  drawLine(ctx, tf, 0, 500, 1000, 500, cm.mute, 1);
}

// ============================================================
// Draw hazard hotspots + corner ticks + HUD redraw
// ============================================================
function drawHotspots(ctx, hazards, tf){
  var cm = gameModeColors();
  for(var i=0;i<hazards.length;i++){
    var hz = hazards[i];
    var p = toScr(tf, hz.x, hz.y);
    var r = hz.r*tf.s;
    var isFound = found.indexOf(i) >= 0;
    var isHover = hoverIdx === i;
    // pulsing ring
    if(!isFound){
      ctx.save();
      var pulse = 0.5 + 0.5*Math.sin(performance.now()/400 + i);
      ctx.globalAlpha = 0.25 + 0.35*pulse;
      ctx.strokeStyle = cm.error;
      ctx.lineWidth = isHover ? 2.5 : 1.5;
      ctx.setLineDash(isHover?[]:[4,4]);
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      // inner fill subtle
      ctx.globalAlpha = 0.08 + 0.08*pulse;
      ctx.fillStyle = cm.error;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.88, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      if (hinted && !isFound){
        // show question mark
        ctx.fillStyle = cm.error;
        ctx.font = '700 '+Math.max(12,r*0.5)+'px "Space Grotesk",sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('?', p.x, p.y);
      }
    } else {
      // found: solid green-ish + check
      ctx.save();
      ctx.strokeStyle = cm.accent;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = cm.accent; ctx.globalAlpha = 0.18;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.9, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // factor tag
      var tag = t(hz.factor);
      ctx.fillStyle = cm.accent;
      ctx.font = '700 11px "JetBrains Mono",monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(tag, p.x, p.y - r - 12);
      // name
      ctx.fillStyle = cm.text;
      ctx.font = '500 10px "Noto Sans SC",sans-serif';
      ctx.fillText(t(hz.nameKey), p.x, p.y + r + 14);
      ctx.restore();
    }
  }
}

function drawParticles(ctx){
  for(var i=particles.length-1;i>=0;i--){
    var p = particles[i];
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy -= 0.04;
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawFlash(ctx){
  if (flashAlpha > 0){
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor||'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
    flashAlpha = Math.max(0, flashAlpha - 0.04);
  }
}

function draw(){
  if (!canvas.width || !canvas.height) return;
  var tf = worldTransform();
  ctx.fillStyle = gameModeColors().bg1;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var scene = SCENES[sceneIdx];
  scene.bg(ctx, canvas.width, canvas.height);
  drawHotspots(ctx, scene.hazards, tf);
  drawParticles(ctx);
  drawFlash(ctx);
}

function tick(){
  draw();
  requestAnimationFrame(tick);
}

// ============================================================
// Interaction
// ============================================================
canvas.addEventListener('click', function(e){
  var wp = clientToWorld(e.clientX, e.clientY);
  var scene = SCENES[sceneIdx];
  for(var i=0;i<scene.hazards.length;i++){
    if (found.indexOf(i) >= 0) continue;
    var hz = scene.hazards[i];
    var dx = wp.x - hz.x, dy = wp.y - hz.y;
    if (dx*dx + dy*dy <= hz.r*hz.r){
      found.push(i);
      var tf = worldTransform();
      var sp = toScr(tf, hz.x, hz.y);
      spawnParticles(sp.x, sp.y, gameModeColors().accent);
      flashAlpha = 0.18; flashColor = gameModeColors().accent;
      updateHud();
      playTone(620, 0.12, 'sine');
      return;
    }
  }
  // miss -> small shake effect by subtle flash
  flashAlpha = 0.08; flashColor = gameModeColors().mute;
  playTone(180, 0.08, 'triangle');
});
canvas.addEventListener('mousemove', function(e){
  var wp = clientToWorld(e.clientX, e.clientY);
  var scene = SCENES[sceneIdx];
  var newHover = -1;
  for(var i=0;i<scene.hazards.length;i++){
    var hz = scene.hazards[i];
    var dx = wp.x-hz.x, dy = wp.y-hz.y;
    if (dx*dx+dy*dy <= hz.r*hz.r){ newHover = i; break; }
  }
  if (newHover !== hoverIdx){
    hoverIdx = newHover;
    canvas.style.cursor = hoverIdx >= 0 ? 'pointer' : 'crosshair';
  }
});

// ============================================================
// Sound (Web Audio)
// ============================================================
var soundMuted = false;
function playTone(freq, dur, type){
  if (soundMuted) return;
  try{
    var a = window._audioCtx || (window._audioCtx = new (window.AudioContext||window.webkitAudioContext)());
    var o = a.createOscillator(); var g = a.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.14, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  }catch(e){}
}

// ============================================================
// HUD + buttons
// ============================================================
function updateHud(){
  var scene = SCENES[sceneIdx];
  document.getElementById('sceneTag').textContent = t(scene.titleKey);
  document.getElementById('hudL1').textContent = t('hudL1');
  document.getElementById('hudL2').textContent = t('hudL2');
  document.getElementById('hudL3').textContent = t('hudL3');
  document.getElementById('hudL4').textContent = t('hudL4');
  document.getElementById('hudV1').textContent = (sceneIdx+1) + '/3';
  document.getElementById('hudV2').textContent = found.length + '/' + scene.hazards.length;
  var missed = scene.hazards.length - found.length;
  document.getElementById('hudV3').textContent = String(missed);
  document.getElementById('hudV4').textContent = String(scoreTotal);

  // submit button label
  var btnS = document.getElementById('btnSubmit');
  if (sceneIdx === SCENES.length - 1){
    btnS.textContent = t('btnSubmit');
  } else {
    btnS.textContent = t('btnSubmit');
  }
}

function refreshI18N(){
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  document.getElementById('sidebarTitle').textContent = t('title');
  document.getElementById('opsLabel').textContent = t('opsLabel');
  document.getElementById('guideContent').textContent = t('guide');
  document.getElementById('legendLabel').textContent = t('legendLabel');
  document.getElementById('legendContent').innerText = t('legend');
  document.getElementById('btnSubmit').textContent = t('btnSubmit');
  document.getElementById('btnHint').textContent = t('btnHint');
  document.getElementById('btnReset').textContent = t('btnReset');
  updateHud();
  draw();
}

document.getElementById('langBtn').addEventListener('click', function(){
  LANG = (LANG === 'cn') ? 'en' : 'cn';
  refreshI18N();
});

document.getElementById('btnHint').addEventListener('click', function(){
  if (!hinted){
    hinted = true;
    scoreTotal = Math.max(0, scoreTotal - 1);
    playTone(400, 0.1, 'sine');
    updateHud();
  }
});

document.getElementById('btnReset').addEventListener('click', function(){
  sceneIdx = 0; found = []; scoreTotal = 0; scenesDone = []; hinted = false;
  hideOverlay();
  refreshI18N();
});

document.getElementById('btnSubmit').addEventListener('click', function(){
  var scene = SCENES[sceneIdx];
  var missedList = [];
  var missedFactors = [];
  for(var i=0;i<scene.hazards.length;i++){
    if (found.indexOf(i) < 0){
      missedList.push(t(scene.hazards[i].nameKey));
      missedFactors.push(t(scene.hazards[i].factor));
    }
  }
  var gained = found.length * 3 - (missedList.length * 1);
  scoreTotal += Math.max(0, gained);
  scenesDone.push({
    idx: sceneIdx,
    found: found.length,
    total: scene.hazards.length,
    missed: missedList,
    factors: missedFactors,
  });

  if (sceneIdx < SCENES.length - 1){
    showSceneResult(missedList);
  } else {
    showFinalReview();
  }
});

// ============================================================
// Overlay
// ============================================================
var ov = document.getElementById('overlay');
function hideOverlay(){ ov.classList.add('hidden'); }
function showOverlay(title, body, listItems, primaryText, primaryHandler, secondaryText, secondaryHandler){
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovBody').textContent = body;
  var listEl = document.getElementById('ovList');
  listEl.innerHTML = '';
  if (listItems && listItems.length){
    listItems.forEach(function(it){
      var li = document.createElement('li');
      li.textContent = it;
      listEl.appendChild(li);
    });
  }
  var p = document.getElementById('ovPrimary');
  var s = document.getElementById('ovSecondary');
  p.textContent = primaryText;
  p.onclick = primaryHandler;
  if (secondaryText){
    s.style.display = '';
    s.textContent = secondaryText;
    s.onclick = secondaryHandler;
  } else {
    s.style.display = 'none';
  }
  ov.classList.remove('hidden');
}

function showSceneResult(missedList){
  var scene = SCENES[sceneIdx];
  var allGot = missedList.length === 0;
  var body = (allGot ? t('allFound') : t('someMissed')) + ' ' + t('scoreMsg') + ': ' + scoreTotal;
  showOverlay(
    t('sceneDone'),
    body,
    missedList.length ? missedList.map(function(m){ return t('missedThem') + ' ' + m; }) : [],
    t('btnSubmitNext'),
    function(){
      sceneIdx += 1;
      found = []; hinted = false;
      hideOverlay();
      refreshI18N();
    },
    null, null
  );
  playTone(allGot?720:360, 0.18, 'sine');
}

function showFinalReview(){
  var lines = [];
  var totalFound = 0, totalCount = 0;
  scenesDone.forEach(function(s){
    var sc = SCENES[s.idx];
    lines.push(t(sc.titleKey) + ' — ' + s.found + '/' + s.total);
    totalFound += s.found; totalCount += s.total;
    if (s.missed && s.missed.length){
      s.missed.forEach(function(m, i){
        lines.push('  · ' + m + ' (' + (s.factors[i]||'') + ')');
      });
    }
  });
  lines.push('');
  lines.push(t('scoreMsg') + ': ' + scoreTotal + '    ' + totalFound + '/' + totalCount);
  showOverlay(
    t('reviewTitle'),
    t('reviewBody') + ' ' + t('reviewPrompt'),
    lines,
    t('btnReset'),
    function(){
      sceneIdx = 0; found = []; scoreTotal = 0; scenesDone = []; hinted = false;
      hideOverlay(); refreshI18N();
    },
    null, null
  );
  playTone(640, 0.25, 'sine');
  setTimeout(function(){ playTone(800, 0.20, 'sine'); }, 160);
  setTimeout(function(){ playTone(960, 0.28, 'sine'); }, 340);
}

// ============================================================
// Boot
// ============================================================
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
refreshI18N();
resizeCanvas();
requestAnimationFrame(tick);
document.fonts && document.fonts.ready && document.fonts.ready.then(function(){ resizeCanvas(); });
setTimeout(resizeCanvas, 200);
setTimeout(resizeCanvas, 600);
</script>
