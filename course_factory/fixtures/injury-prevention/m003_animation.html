<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(112,160,255,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#70a0ff));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#70a0ff));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#70a0ff));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#70a0ff)),var(--primary-dim,#4b72c8));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(112,160,255,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#70a0ff));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#70a0ff)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script src="animation_runtime.js"></script>
<script>
var CONFIG = {
  style: 'math',
  totalFrames: 5,
  i18n: {
    title:    {en:'JHA + LEC WORKFLOW', cn:'JHA + LEC 风险识别流水线'},
    subtitle: {en:'Job -> Steps -> Hazards -> Score -> Matrix', cn:'作业 · 步骤 · 危险源 · 打分 · 矩阵'},

    hudL1: {en:'STAGE',     cn:'阶段'},
    hudL2: {en:'INPUT',     cn:'输入'},
    hudL3: {en:'OUTPUT',    cn:'输出'},
    hudL4: {en:'TOOL',      cn:'工具'},

    guideTitle: {en:'OBSERVE', cn:'观看指南'},
    g1: {en:'Follow one job from start to matrix', cn:'跟随一项作业从拆解到风险矩阵'},
    g2: {en:'Watch LEC multiply three numbers',    cn:'看 LEC 如何把三个分数相乘'},
    g3: {en:'See risk cells move across the grid', cn:'看危险源在矩阵格子间移动'},

    // common labels
    lblJob:     {en:'JOB: CHANGE CNC TOOL', cn:'作业：更换数控刀具'},
    lblStart:   {en:'STEP 0  SELECT JOB', cn:'步骤 0  选定作业'},

    // frame 1 steps decomposition
    lblStepsT:  {en:'STEP 1  DECOMPOSE INTO SUB-STEPS', cn:'步骤 1  拆分为子步骤'},
    s1:         {en:'1. Shut down machine', cn:'1. 停机断电'},
    s2:         {en:'2. Remove guard',      cn:'2. 打开防护罩'},
    s3:         {en:'3. Loosen collet',     cn:'3. 松开夹头'},
    s4:         {en:'4. Swap tool',         cn:'4. 更换刀具'},
    s5:         {en:'5. Re-install guard',  cn:'5. 复位防护罩'},
    s6:         {en:'6. Dry run',           cn:'6. 空运行校验'},

    // frame 2 hazards
    lblHazT:    {en:'STEP 2  IDENTIFY HAZARDS (GB/T 13861)', cn:'步骤 2  按 GB/T 13861 辨识危险源'},
    h1:         {en:'Sudden restart (human)',   cn:'误启动 (人)'},
    h2:         {en:'Cut by blade (mech)',      cn:'刀具切割 (机械)'},
    h3:         {en:'Spring release (mech)',    cn:'弹簧回弹 (机械)'},
    h4:         {en:'Oil splash (chem)',        cn:'切削液飞溅 (化学)'},
    h5:         {en:'Missing guard (mgmt)',     cn:'防护缺失 (管理)'},

    // frame 3 LEC
    lblLecT:    {en:'STEP 3  LEC SCORING  D = L x E x C', cn:'步骤 3  LEC 打分  D = L × E × C'},
    lblL:       {en:'L · Likelihood',    cn:'L · 可能性'},
    lblE:       {en:'E · Exposure freq', cn:'E · 暴露频率'},
    lblC:       {en:'C · Consequence',   cn:'C · 后果严重度'},
    lblD:       {en:'D · Danger value',  cn:'D · 危险值'},

    // frame 4 matrix
    lblMxT:     {en:'STEP 4  MAP TO RISK MATRIX', cn:'步骤 4  映射到风险矩阵'},
    lblLow:     {en:'LOW',           cn:'低'},
    lblMed:     {en:'MEDIUM',        cn:'中'},
    lblHigh:    {en:'HIGH',          cn:'高'},
    lblCrit:    {en:'CRITICAL',      cn:'极高'},
    lblProb:    {en:'PROBABILITY',   cn:'可能性'},
    lblSev:     {en:'SEVERITY',      cn:'后果严重度'},
    lblAha:     {en:'ACT ON HIGH FIRST', cn:'高风险优先处置'},
    lblTake:    {en:'RISK = LIKELIHOOD x SEVERITY', cn:'风险 = 可能性 × 严重度'},

    // HUD values per frame
    vStage0: {en:'Kickoff',   cn:'起步'},
    vStage1: {en:'Decompose', cn:'拆分步骤'},
    vStage2: {en:'Hazards',   cn:'识别危险源'},
    vStage3: {en:'LEC Score', cn:'LEC 打分'},
    vStage4: {en:'Matrix',    cn:'风险矩阵'},

    vIn0: {en:'1 job', cn:'1 项作业'},
    vIn1: {en:'1 job', cn:'1 项作业'},
    vIn2: {en:'6 steps', cn:'6 步骤'},
    vIn3: {en:'5 hazards', cn:'5 危险源'},
    vIn4: {en:'5 D-values', cn:'5 D 值'},

    vOut0: {en:'step list',   cn:'步骤清单'},
    vOut1: {en:'6 sub-steps', cn:'6 子步骤'},
    vOut2: {en:'5 hazards',   cn:'5 危险源'},
    vOut3: {en:'D: 10-320',   cn:'D: 10-320'},
    vOut4: {en:'4 cells',     cn:'4 等级'},

    vTool0: {en:'brain',         cn:'头脑'},
    vTool1: {en:'JHA form',      cn:'JHA 表'},
    vTool2: {en:'GB/T 13861',    cn:'GB/T 13861'},
    vTool3: {en:'LEC formula',   cn:'LEC 公式'},
    vTool4: {en:'Risk matrix',   cn:'风险矩阵'},
  },

  hudLabels: ['hudL1','hudL2','hudL3','hudL4'],
  hudValues: [
    ['vStage0','vIn0','vOut0','vTool0'],
    ['vStage1','vIn1','vOut1','vTool1'],
    ['vStage2','vIn2','vOut2','vTool2'],
    ['vStage3','vIn3','vOut3','vTool3'],
    ['vStage4','vIn4','vOut4','vTool4'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1','g2','g3'],
};

function getFrameElements(f, W, H){
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W/2, cy = H/2;
  var GOLD = 'oklch(0.85 0.14 85)';
  var RED  = P.error || 'oklch(0.68 0.20 25)';

  if (f === 0){
    // Kickoff: name the job, show a simple factory pictogram
    return [
      {id:'stage', type:'text', text:t('lblStart'), x:cx, y:46, color:P.primary, size:14, align:'center', font:'mono', tracking:0.15},
      {id:'job',   type:'text', text:t('lblJob'),   x:cx, y:cy-20, color:P.text, size:20, align:'center', font:'display'},
      // machine outline
      {id:'mach',  type:'rect', x:cx-90, y:cy+8, w:180, h:100, fill:P.primary, alpha:0.14, stroke:P.primary, strokeW:1.4},
      {id:'tool',  type:'circle', x:cx, y:cy+50, r:12, fill:GOLD, alpha:0.9},
      {id:'toolLb',type:'text', text:'TOOL', x:cx, y:cy+82, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},
      {id:'note',  type:'text', text:t('g1'), x:cx, y:H-40, color:P.muted, size:11, align:'center', font:'body'},
    ];
  }

  if (f === 1){
    // Decompose job into 6 steps: show vertical number list
    var steps = ['s1','s2','s3','s4','s5','s6'];
    var els = [
      {id:'stage', type:'text', text:t('lblStepsT'), x:cx, y:40, color:P.primary, size:14, align:'center', font:'mono', tracking:0.15},
      {id:'job',   type:'text', text:t('lblJob'),   x:cx, y:62, color:P.muted, size:11, align:'center', font:'mono', tracking:0.1},
    ];
    var bx = cx - 180, by = 90, bw = 360, bh = 36, gap = 6;
    for (var i=0;i<6;i++){
      var y = by + i*(bh+gap);
      els.push({id:'sBox'+i, type:'rect', x:bx, y:y, w:bw, h:bh, fill:P.primary, alpha:0.09, stroke:P.primary, strokeW:1});
      // step number
      els.push({id:'sNum'+i, type:'text', text:(i+1)+'', x:bx+24, y:y+bh/2+5, color:GOLD, size:14, align:'center', font:'display'});
      els.push({id:'sTxt'+i, type:'text', text:t(steps[i]).replace(/^\d+\.\s*/,''), x:bx+52, y:y+bh/2+5, color:P.text, size:12, align:'left', font:'body'});
    }
    return els;
  }

  if (f === 2){
    // Hazards: around each step map to 1-2 hazards (GB/T 13861)
    var hazards = [
      {k:'h1', step:0, col:RED},
      {k:'h2', step:3, col:RED},
      {k:'h3', step:2, col:GOLD},
      {k:'h4', step:3, col:P.primary},
      {k:'h5', step:1, col:RED},
    ];
    var els = [
      {id:'stage', type:'text', text:t('lblHazT'), x:cx, y:38, color:P.primary, size:14, align:'center', font:'mono', tracking:0.15},
    ];
    // left column: compressed steps
    var lx = 120, ly = 80, lbh = 30, lgap = 4;
    var stepKeys = ['s1','s2','s3','s4','s5','s6'];
    for (var i=0;i<6;i++){
      var y = ly + i*(lbh+lgap);
      els.push({id:'sBox'+i, type:'rect', x:lx, y:y, w:220, h:lbh, fill:P.primary, alpha:0.09, stroke:P.primary, strokeW:1});
      els.push({id:'sNum'+i, type:'text', text:(i+1)+'', x:lx+18, y:y+lbh/2+5, color:GOLD, size:12, align:'center', font:'display'});
      els.push({id:'sTxt'+i, type:'text', text:t(stepKeys[i]).replace(/^\d+\.\s*/,''), x:lx+38, y:y+lbh/2+5, color:P.text, size:10, align:'left', font:'body'});
    }
    // right column: hazards with arrows
    var rx = W - 280, hw = 260, hh = 36, hgap = 10;
    var ry0 = 80;
    for (var j=0;j<hazards.length;j++){
      var y = ry0 + j*(hh+hgap);
      // step anchor
      var sy = ly + hazards[j].step*(lbh+lgap) + lbh/2;
      els.push({id:'arrow'+j, type:'line', x:lx+220, y:sy, x2:rx, y2:y+hh/2, stroke:hazards[j].col, strokeW:1, dash:[4,4], alpha:0.65});
      els.push({id:'hBox'+j, type:'rect', x:rx, y:y, w:hw, h:hh, fill:hazards[j].col, alpha:0.16, stroke:hazards[j].col, strokeW:1.2});
      els.push({id:'hTxt'+j, type:'text', text:t(hazards[j].k), x:rx+hw/2, y:y+hh/2+5, color:hazards[j].col, size:11, align:'center', font:'display'});
    }
    return els;
  }

  if (f === 3){
    // LEC: show formula + 3 dials + one worked example
    var els = [
      {id:'stage', type:'text', text:t('lblLecT'), x:cx, y:40, color:P.primary, size:14, align:'center', font:'mono', tracking:0.15},
    ];
    // big formula panel
    els.push({id:'fBg', type:'rect', x:cx-280, y:70, w:560, h:60, fill:P.primary, alpha:0.10, stroke:P.primary, strokeW:1.2});
    els.push({id:'fTxt', type:'text', text:'D = L  ×  E  ×  C', x:cx, y:108, color:GOLD, size:26, align:'center', font:'display'});

    // three dials
    var labels = [{k:'lblL', v:'6', rng:'0.1-10'}, {k:'lblE', v:'6', rng:'0.5-10'}, {k:'lblC', v:'15', rng:'1-100'}];
    var dx0 = cx - 260, dy = 180, dw = 150, dh = 130, dgap = 20;
    for (var i=0;i<3;i++){
      var x = dx0 + i*(dw+dgap);
      els.push({id:'dBg'+i, type:'rect', x:x, y:dy, w:dw, h:dh, fill:P.primary, alpha:0.08, stroke:P.primary, strokeW:1});
      els.push({id:'dLb'+i, type:'text', text:t(labels[i].k), x:x+dw/2, y:dy+22, color:P.text, size:11, align:'center', font:'mono', tracking:0.1});
      els.push({id:'dVal'+i, type:'text', text:labels[i].v, x:x+dw/2, y:dy+74, color:GOLD, size:36, align:'center', font:'display'});
      els.push({id:'dRg'+i, type:'text', text:labels[i].rng, x:x+dw/2, y:dy+110, color:P.muted, size:10, align:'center', font:'mono', tracking:0.1});
    }
    // result D
    els.push({id:'dRes', type:'rect', x:cx-120, y:H-90, w:240, h:56, fill:RED, alpha:0.20, stroke:RED, strokeW:1.5});
    els.push({id:'dResL', type:'text', text:t('lblD'), x:cx, y:H-66, color:P.text, size:12, align:'center', font:'mono', tracking:0.15});
    els.push({id:'dResV', type:'text', text:'540', x:cx, y:H-38, color:RED, size:24, align:'center', font:'display'});
    return els;
  }

  // frame 4: Risk matrix 4x4 with 5 dots mapped
  var matX = cx - 220, matY = 90, cellW = 90, cellH = 70;
  var levels = [
    {key:'lblLow',  col:'oklch(0.72 0.17 155)'}, // green
    {key:'lblMed',  col:GOLD},
    {key:'lblHigh', col:'oklch(0.75 0.18 55)'},  // amber
    {key:'lblCrit', col:RED},
  ];
  // cell level map (col=0..3 likelihood low->high, row=0..3 severity low->high)
  var cellLevel = [
    [0,0,1,1],
    [0,1,1,2],
    [1,1,2,3],
    [1,2,3,3],
  ];
  var els = [
    {id:'stage', type:'text', text:t('lblMxT'), x:cx, y:44, color:P.primary, size:14, align:'center', font:'mono', tracking:0.15},
  ];
  // axes labels
  els.push({id:'axX', type:'text', text:t('lblProb'), x:matX + 2*cellW, y:matY + 4*cellH + 26, color:P.muted, size:11, align:'center', font:'mono', tracking:0.15});
  els.push({id:'axY', type:'text', text:t('lblSev'), x:matX - 46, y:matY + 2*cellH, color:P.muted, size:11, align:'center', font:'mono', tracking:0.15});
  // cells
  for (var r=0;r<4;r++){
    for (var c=0;c<4;c++){
      var lvl = cellLevel[r][c];
      var col = levels[lvl].col;
      var x = matX + c*cellW;
      // row 0 is top (low severity), we invert so severity grows upward
      var y = matY + (3-r)*cellH;
      els.push({id:'cell'+r+'_'+c, type:'rect', x:x, y:y, w:cellW-2, h:cellH-2, fill:col, alpha:0.14, stroke:col, strokeW:0.8});
    }
  }
  // legend right side
  var legX = matX + 4*cellW + 30, legY = matY;
  for (var i=0;i<4;i++){
    els.push({id:'lg'+i+'Bg', type:'rect', x:legX, y:legY+i*36, w:140, h:28, fill:levels[i].col, alpha:0.22, stroke:levels[i].col, strokeW:1});
    els.push({id:'lg'+i+'Tx', type:'text', text:t(levels[i].key), x:legX+70, y:legY+i*36+19, color:levels[i].col, size:12, align:'center', font:'display'});
  }
  // map 5 hazards
  var dots = [
    {k:'h1', c:1, r:3, col:RED},   // sudden restart — low-mid L, high severity
    {k:'h2', c:2, r:3, col:RED},   // cut by blade — mid L, high severity
    {k:'h3', c:1, r:1, col:GOLD},  // spring release — mid
    {k:'h4', c:2, r:0, col:levels[0].col}, // oil splash — low severity
    {k:'h5', c:3, r:2, col:RED},   // missing guard — high L, high severity
  ];
  for (var i=0;i<dots.length;i++){
    var d = dots[i];
    var dxp = matX + d.c*cellW + cellW/2 - 1;
    var dyp = matY + (3-d.r)*cellH + cellH/2 - 1;
    els.push({id:'dot'+i, type:'circle', x:dxp, y:dyp, r:8, fill:d.col, alpha:0.95, stroke:d.col, strokeW:1.5});
    els.push({id:'dotL'+i, type:'text', text:t(d.k).split('(')[0].trim(), x:dxp, y:dyp+22, color:d.col, size:10, align:'center', font:'mono', tracking:0.1});
  }
  // aha summary strip
  els.push({id:'ahaBar', type:'rect', x:cx-280, y:H-54, w:560, h:36, fill:GOLD, alpha:0.2, stroke:GOLD, strokeW:1.2});
  els.push({id:'ahaTx',  type:'text', text:t('lblAha'), x:cx, y:H-32, color:GOLD, size:14, align:'center', font:'display'});
