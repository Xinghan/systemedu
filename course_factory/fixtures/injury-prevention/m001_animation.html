<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(255,128,170,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#ff80aa));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#ff80aa));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#ff80aa));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#ff80aa)),var(--primary-dim,#c43e6c));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(255,128,170,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#ff80aa));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#ff80aa)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script src="animation_runtime.js"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
var CONFIG = {
  style: 'med',
  totalFrames: 5,
  i18n: {
    title:    {en:'THE CHAIN OF ONE INJURY', cn:'一次工伤的连锁代价'},
    subtitle: {en:'From one unsafe second to a lifetime of regret', cn:'一秒违章 · 一生遗憾'},

    hudL1: {en:'TIMELINE',   cn:'时间线'},
    hudL2: {en:'SCOPE',      cn:'影响范围'},
    hudL3: {en:'COST',       cn:'代价'},
    hudL4: {en:'REVERSIBLE', cn:'可逆性'},

    guideTitle: {en:'OBSERVE', cn:'观看指南'},
    g1: {en:'Watch how one second spreads into years', cn:'看一秒如何扩散成数十年'},
    g2: {en:'Track the three circles: self / family / firm', cn:'追踪三圈：本人/家庭/企业'},
    g3: {en:'Notice what cannot be undone', cn:'留意哪些无法挽回'},

    // frame 0 labels
    lblSecond: {en:'T = 0s', cn:'T = 0秒'},
    lblNormal: {en:'A NORMAL SHIFT', cn:'一班普通工作'},
    lblWorker: {en:'WORKER', cn:'操作工'},
    lblMachine:{en:'MACHINE', cn:'机器'},
    lblGuard:  {en:'GUARD REMOVED', cn:'防护罩被取下'},
    lblHint0:  {en:'"Just one adjustment, no need to power off."', cn:'"随手调一下，不关机了。"'},

    // frame 1 labels (the instant)
    lblInstant:{en:'1 SECOND LATER', cn:'1秒之后'},
    lblImpact: {en:'HAND CAUGHT', cn:'手被卷入'},
    lblScream: {en:'SCREAM', cn:'惨叫'},
    lblHelp:   {en:'CALL FOR HELP', cn:'呼救'},

    // frame 2 personal
    lblPerson: {en:'PERSONAL COST', cn:'本人代价'},
    lblAmp:    {en:'AMPUTATION', cn:'截肢'},
    lblGrade:  {en:'GRADE 5 DISABILITY', cn:'伤残 五级'},
    lblPain:   {en:'CHRONIC PAIN', cn:'长期疼痛'},
    lblSkill:  {en:'LOST SKILL', cn:'技能失能'},

    // frame 3 family
    lblFamily: {en:'FAMILY COST', cn:'家庭代价'},
    lblIncome: {en:'INCOME LOST', cn:'收入中断'},
    lblCare:   {en:'CARE BURDEN', cn:'照护负担'},
    lblChild:  {en:'CHILD TUITION', cn:'子女学费'},
    lblStress: {en:'MARITAL STRESS', cn:'家庭压力'},

    // frame 4 firm + aha
    lblFirm:   {en:'FIRM COST', cn:'企业代价'},
    lblPay:    {en:'LIABILITY 600k-2M CNY', cn:'赔付 60万-200万'},
    lblShut:   {en:'LINE SHUTDOWN', cn:'停产整顿'},
    lblFine:   {en:'FINE', cn:'行政罚款'},
    lblTrust:  {en:'TRUST LOST', cn:'信誉受损'},
    lblAha:    {en:'ONE SECOND -> DECADES', cn:'一秒 -> 数十年'},
    lblTake:   {en:'SAFETY IS NOT A SLOGAN', cn:'安全不是口号'},

    // HUD values
    vT0: {en:'T=0s',    cn:'T=0秒'},
    vT1: {en:'T=1s',    cn:'T=1秒'},
    vT2: {en:'T=30d',   cn:'T=30天'},
    vT3: {en:'T=5y',    cn:'T=5年'},
    vT4: {en:'T=Life',  cn:'T=一生'},

    vS0: {en:'Self',        cn:'本人'},
    vS1: {en:'Self',        cn:'本人'},
    vS2: {en:'Self',        cn:'本人'},
    vS3: {en:'+Family',     cn:'+家庭'},
    vS4: {en:'+Family+Firm',cn:'+家庭+企业'},

    vC0: {en:'0 CNY',       cn:'0 元'},
    vC1: {en:'Health',      cn:'身体'},
    vC2: {en:'Disability',  cn:'伤残'},
    vC3: {en:'Income Gap',  cn:'收入缺口'},
    vC4: {en:'Millions',    cn:'百万级'},

    vR0: {en:'Yes',         cn:'可逆'},
    vR1: {en:'Yes',         cn:'可逆'},
    vR2: {en:'No',          cn:'不可逆'},
    vR3: {en:'Partial',     cn:'部分可补'},
    vR4: {en:'No',          cn:'不可逆'},
  },

  hudLabels: ['hudL1','hudL2','hudL3','hudL4'],
  hudValues: [
    ['vT0','vS0','vC0','vR0'],
    ['vT1','vS1','vC1','vR1'],
    ['vT2','vS2','vC2','vR2'],
    ['vT3','vS3','vC3','vR3'],
    ['vT4','vS4','vC4','vR4'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1','g2','g3'],
};

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H){
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W/2, cy = H/2;
  var GOLD = 'oklch(0.85 0.14 85)';
  var RED  = P.error || 'oklch(0.68 0.20 25)';

  if (f === 0){
    // Normal shift: worker at machine, a small red "guard removed" label hangs above
    return [
      {id:'titleBar', type:'text', text:t('lblNormal'), x:cx, y:30, color:P.text, size:15, align:'center', font:'display'},
      {id:'tstamp',   type:'text', text:t('lblSecond'), x:cx, y:52, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},

      // factory floor line
      {id:'floor', type:'rect', x:W*0.1, y:H*0.72, w:W*0.8, h:2, fill:P.muted, alpha:0.4},

      // machine box
      {id:'machine', type:'rect', x:cx+40, y:H*0.42, w:130, h:120, fill:P.primaryDim||P.primary, alpha:0.25, stroke:P.primary, strokeW:1.5},
      {id:'mLabel',  type:'text', text:t('lblMachine'), x:cx+105, y:H*0.42-6, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},

      // worker (head + body simplified)
      {id:'workerH', type:'circle', x:cx-40, y:H*0.5, r:14, fill:GOLD, alpha:0.9},
      {id:'workerB', type:'rect',   x:cx-52, y:H*0.5+14, w:24, h:52, fill:GOLD, alpha:0.7},
      {id:'workerL', type:'text', text:t('lblWorker'), x:cx-40, y:H*0.5+82, color:P.text, size:10, align:'center', font:'mono', tracking:0.12},

      // guard removed flag (hanging)
      {id:'guardTag', type:'rect', x:cx+30, y:H*0.22, w:140, h:22, fill:RED, alpha:0.25, stroke:RED, strokeW:1.2},
      {id:'guardTxt', type:'text', text:t('lblGuard'), x:cx+100, y:H*0.22+14, color:RED, size:10, align:'center', font:'mono', tracking:0.15},

      // hint bubble
      {id:'hintBx', type:'rect', x:cx-240, y:H*0.8, w:480, h:26, fill:P.text, alpha:0.06, stroke:P.muted, strokeW:0.6},
      {id:'hintTx', type:'text', text:t('lblHint0'), x:cx, y:H*0.8+17, color:P.text, size:11, align:'center', font:'body'},
    ];
  }

  if (f === 1){
    // The instant: flash, worker hand at machine, scream icon
    return [
      {id:'titleBar', type:'text', text:t('lblInstant'), x:cx, y:30, color:RED, size:16, align:'center', font:'display'},
      {id:'tstamp',   type:'text', text:t('vT1'),        x:cx, y:52, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},

      {id:'floor', type:'rect', x:W*0.1, y:H*0.72, w:W*0.8, h:2, fill:P.muted, alpha:0.4},

      // machine with flash
      {id:'machine', type:'rect',   x:cx-10, y:H*0.4, w:140, h:130, fill:RED, alpha:0.35, stroke:RED, strokeW:2},
      {id:'flash',   type:'circle', x:cx+35, y:H*0.5, r:56, fill:RED, alpha:0.45},
      {id:'impactL', type:'text', text:t('lblImpact'), x:cx+35, y:H*0.5+4, color:P.text, size:13, align:'center', font:'display'},

      // worker (now drawn closer, pulled in)
      {id:'workerH', type:'circle', x:cx-30, y:H*0.45, r:13, fill:GOLD, alpha:0.9},
      {id:'workerB', type:'rect',   x:cx-42, y:H*0.45+13, w:22, h:46, fill:GOLD, alpha:0.7},
      {id:'workerL', type:'text', text:t('lblScream'), x:cx-30, y:H*0.45-18, color:RED, size:11, align:'center', font:'mono', tracking:0.15},

      // help cry
      {id:'helpBx', type:'rect', x:cx-230, y:H*0.85, w:460, h:22, fill:RED, alpha:0.18, stroke:RED, strokeW:0.8},
      {id:'helpTx', type:'text', text:t('lblHelp'), x:cx, y:H*0.85+14, color:RED, size:11, align:'center', font:'mono', tracking:0.2},
    ];
  }

  if (f === 2){
    // Personal cost: four chips under a "PERSONAL COST" banner
    var bx = cx - 280, by = H*0.5;
    var cw = 130, ch = 58, gap = 12;
    var chips = [
      {k:'lblAmp',   col:RED},
      {k:'lblGrade', col:P.primary},
      {k:'lblPain',  col:P.primary},
      {k:'lblSkill', col:P.primary},
    ];
    var els = [
      {id:'titleBar', type:'text', text:t('lblPerson'), x:cx, y:40, color:RED, size:18, align:'center', font:'display'},
      {id:'tstamp',   type:'text', text:t('vT2'), x:cx, y:64, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},
      // person silhouette at left
      {id:'workerH', type:'circle', x:W*0.12, y:H*0.45, r:22, fill:GOLD, alpha:0.85},
      {id:'workerB', type:'rect',   x:W*0.12-18, y:H*0.45+22, w:36, h:70, fill:GOLD, alpha:0.6},
      {id:'workerL', type:'text', text:t('lblWorker'), x:W*0.12, y:H*0.45+112, color:P.text, size:10, align:'center', font:'mono', tracking:0.12},
    ];
    for (var i=0;i<4;i++){
      var x = bx + i*(cw+gap);
      els.push({id:'chip'+i+'Bg',  type:'rect', x:x, y:by, w:cw, h:ch, fill:chips[i].col, alpha:0.15, stroke:chips[i].col, strokeW:1.2});
      els.push({id:'chip'+i+'Txt', type:'text', text:t(chips[i].k), x:x+cw/2, y:by+ch/2+5, color:chips[i].col, size:13, align:'center', font:'display'});
    }
    return els;
  }

  if (f === 3){
    // Family cost: radial spread from worker to family nodes
    var nodes = [
      {k:'lblIncome', ang:-Math.PI/2,  col:GOLD},
      {k:'lblCare',   ang:-Math.PI/6,  col:P.primary},
      {k:'lblChild',  ang: Math.PI/6,  col:P.primary},
      {k:'lblStress', ang: Math.PI/2,  col:RED},
    ];
    var els = [
      {id:'titleBar', type:'text', text:t('lblFamily'), x:cx, y:40, color:P.primary, size:18, align:'center', font:'display'},
      {id:'tstamp',   type:'text', text:t('vT3'), x:cx, y:64, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},
      // center: worker
      {id:'workerH', type:'circle', x:cx-200, y:cy+10, r:22, fill:GOLD, alpha:0.85},
      {id:'workerL', type:'text', text:t('lblWorker'), x:cx-200, y:cy+54, color:P.text, size:10, align:'center', font:'mono', tracking:0.12},
    ];
    var ox = cx+40, oy = cy+10, R = 150;
    for (var i=0;i<4;i++){
      var nx = ox + Math.cos(nodes[i].ang)*R;
      var ny = oy + Math.sin(nodes[i].ang)*R*0.65;
      // connector (dashed)
      els.push({id:'conn'+i, type:'line', x:cx-200, y:cy+10, x2:nx, y2:ny, stroke:nodes[i].col, strokeW:1, dash:[4,4], alpha:0.6});
      // node chip
      els.push({id:'node'+i+'Bg',  type:'rect', x:nx-78, y:ny-18, w:156, h:36, fill:nodes[i].col, alpha:0.18, stroke:nodes[i].col, strokeW:1.2});
      els.push({id:'node'+i+'Txt', type:'text', text:t(nodes[i].k), x:nx, y:ny+5, color:nodes[i].col, size:12, align:'center', font:'display'});
    }
    return els;
  }

  // f === 4: Firm + Aha summary
  var fnodes = [
    {k:'lblPay',   col:RED},
    {k:'lblShut',  col:RED},
    {k:'lblFine',  col:P.primary},
    {k:'lblTrust', col:P.primary},
  ];
  var els = [
    {id:'titleBar', type:'text', text:t('lblFirm'), x:cx, y:36, color:P.primary, size:18, align:'center', font:'display'},
    {id:'tstamp',   type:'text', text:t('vT4'), x:cx, y:58, color:P.muted, size:10, align:'center', font:'mono', tracking:0.15},
  ];
  // firm as factory icon (two stacks)
  els.push({id:'firmBody', type:'rect',   x:cx-90, y:cy-30, w:180, h:80, fill:P.primaryDim||P.primary, alpha:0.18, stroke:P.primary, strokeW:1.3});
  els.push({id:'firmStackA', type:'rect', x:cx-40, y:cy-70, w:20, h:40, fill:P.primary, alpha:0.5});
  els.push({id:'firmStackB', type:'rect', x:cx+20, y:cy-62, w:20, h:32, fill:P.primary, alpha:0.5});

  // four firm cost chips (above and below the factory)
  var positions = [
    {x:cx-220, y:cy-30},
    {x:cx+220, y:cy-30},
    {x:cx-220, y:cy+60},
    {x:cx+220, y:cy+60},
  ];
  for (var i=0;i<4;i++){
    var p = positions[i];
    els.push({id:'fchip'+i+'Bg',  type:'rect', x:p.x-90, y:p.y-18, w:180, h:36, fill:fnodes[i].col, alpha:0.18, stroke:fnodes[i].col, strokeW:1.2});
    els.push({id:'fchip'+i+'Txt', type:'text', text:t(fnodes[i].k), x:p.x, y:p.y+5, color:fnodes[i].col, size:12, align:'center', font:'display'});
  }

  // Aha strip at bottom
  els.push({id:'ahaBar', type:'rect', x:cx-260, y:H-54, w:520, h:36, fill:GOLD, alpha:0.2, stroke:GOLD, strokeW:1.2});
  els.push({id:'ahaTxt', type:'text', text:t('lblAha'), x:cx, y:H-32, color:GOLD, size:14, align:'center', font:'display'});
  els.push({id:'takeTxt',type:'text', text:t('lblTake'), x:cx, y:H-14, color:P.text, size:11, align:'center', font:'mono', tracking:0.18});
  return els;
}

AnimRuntime.boot();
</script>
</body>
</html>
