<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.55;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;position:relative;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.board-overlay{position:absolute;left:20px;right:20px;bottom:18px;display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:stretch;}
.glass-panel{background:var(--panel-bg,rgba(8,10,18,0.72));border:1px solid var(--panel-border,rgba(255,176,0,0.16));backdrop-filter:blur(12px);border-radius:14px;box-shadow:0 0 14px var(--panel-glow,rgba(255,176,0,0.08));position:relative;}
.glass-panel::before,.glass-panel::after{content:"";position:absolute;width:12px;height:12px;border-color:var(--panel-tick,rgba(255,176,0,0.38));pointer-events:none;}
.glass-panel::before{left:10px;top:10px;border-left:1px solid var(--panel-tick,rgba(255,176,0,0.38));border-top:1px solid var(--panel-tick,rgba(255,176,0,0.38));}
.glass-panel::after{right:10px;bottom:10px;border-right:1px solid var(--panel-tick,rgba(255,176,0,0.38));border-bottom:1px solid var(--panel-tick,rgba(255,176,0,0.38));}
.evidence-panel{padding:16px 16px 14px;display:flex;flex-direction:column;gap:12px;min-height:292px;}
.factor-panel{padding:16px 16px 14px;display:flex;flex-direction:column;gap:12px;min-height:292px;}
.case-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.case-title{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--title-color,#f4efe6);letter-spacing:0.02em;line-height:1.15;}
.case-sub{font-size:12px;color:var(--body-dim,#aab1bf);line-height:1.6;}
.case-pill{display:inline-flex;align-items:center;justify-content:center;padding:5px 11px;border-radius:999px;border:1px solid var(--pill-border,rgba(255,176,0,0.35));background:var(--pill-bg,rgba(255,176,0,0.12));font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--pill-text,#ffd580);}
.panel-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--sb-accent,var(--primary));}
.deck{display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start;min-height:110px;}
.evidence-card{padding:10px 12px;border-radius:14px;border:1px solid var(--card-border,rgba(255,176,0,0.25));background:var(--card-bg,rgba(255,176,0,0.08));color:var(--card-text,#eef1f5);font-size:12px;line-height:1.45;cursor:grab;max-width:calc(50% - 5px);user-select:none;transition:transform 0.12s,border-color 0.12s,box-shadow 0.12s,background 0.12s;}
.evidence-card:hover{transform:translateY(-2px);border-color:var(--sb-accent,var(--primary));box-shadow:0 0 10px var(--panel-glow,rgba(255,176,0,0.08));}
.evidence-card:active{cursor:grabbing;}
.evidence-card.dragging{opacity:0.55;transform:scale(0.98);}
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:188px;}
.factor-bin{padding:10px;border-radius:14px;border:1px dashed var(--bin-border,rgba(255,176,0,0.24));background:var(--bin-bg,rgba(255,255,255,0.03));display:flex;flex-direction:column;gap:8px;min-height:128px;transition:border-color 0.12s,background 0.12s;}
.factor-bin.active{border-color:var(--sb-accent,var(--primary));background:rgba(255,176,0,0.08);}
.bin-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--sb-accent,var(--primary));}
.bin-desc{font-size:11px;line-height:1.45;color:var(--body-dim,#aab1bf);}
.bin-slot{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;min-height:52px;}
.mini-card{padding:6px 8px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);font-size:11px;line-height:1.25;color:var(--card-text,#eef1f5);cursor:grab;}
.chain-strip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);}
.chain-cell{flex:1;min-width:0;height:32px;border-radius:999px;border:1px solid rgba(255,176,0,0.18);background:rgba(255,176,0,0.04);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--chain-text,#95a0b3);}
.chain-cell.ready{background:rgba(255,176,0,0.14);color:#ffdda0;border-color:rgba(255,176,0,0.34);}
.chain-cell.fail{background:rgba(255,90,60,0.18);color:#ffb49b;border-color:rgba(255,90,60,0.38);}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
.action-row{display:flex;gap:8px;margin-top:auto;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);flex:1;border-radius:999px;}
.action-btn:hover{box-shadow:0 0 18px var(--glow-strong);}
.action-btn:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:8px 12px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.12em;text-transform:uppercase;border-radius:999px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.result-panel{display:none;position:absolute;top:22px;right:24px;width:min(360px,42%);padding:18px 18px 16px;border-radius:18px;background:rgba(8,10,18,0.92);border:1px solid rgba(255,176,0,0.2);backdrop-filter:blur(12px);z-index:10;box-shadow:0 0 24px rgba(0,0,0,0.28);}
.result-panel.show{display:block;}
.result-title{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:18px;font-weight:700;color:#f7f0de;}
.result-body{margin-top:8px;font-size:12px;line-height:1.65;color:#d4dae4;}
.result-foot{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#ffd580;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">INCIDENT TEARDOWN LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel"></div>
    <div class="sidebar-sub" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="legendLabel"></div>
    <div class="sidebar-sub" id="legendText"></div>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="gameTitle"></div>
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body">
      <canvas id="gc"></canvas>
      <div class="board-overlay">
        <div class="glass-panel evidence-panel">
          <div class="case-header">
            <div>
              <div class="case-title" id="caseTitle"></div>
              <div class="case-sub" id="caseSubtitle"></div>
            </div>
            <div class="case-pill" id="casePill"></div>
          </div>
          <div class="panel-title" id="deckLabel"></div>
          <div class="deck" id="evidenceDeck"></div>
          <div class="panel-title" id="chainLabel"></div>
          <div class="chain-strip" id="chainStrip">
            <div class="chain-cell" data-chain="human"></div>
            <div class="chain-cell" data-chain="machine"></div>
            <div class="chain-cell" data-chain="environment"></div>
            <div class="chain-cell" data-chain="management"></div>
          </div>
          <div class="action-row">
            <button class="action-btn" id="btnAction"></button>
            <button class="reset-btn" id="btnReset"></button>
          </div>
        </div>
        <div class="glass-panel factor-panel">
          <div class="panel-title" id="binsLabel"></div>
          <div class="factor-grid">
            <div class="factor-bin" data-bin="human">
              <div class="bin-title" id="binHumanTitle"></div>
              <div class="bin-desc" id="binHumanDesc"></div>
              <div class="bin-slot" data-slot="human"></div>
            </div>
            <div class="factor-bin" data-bin="machine">
              <div class="bin-title" id="binMachineTitle"></div>
              <div class="bin-desc" id="binMachineDesc"></div>
              <div class="bin-slot" data-slot="machine"></div>
            </div>
            <div class="factor-bin" data-bin="environment">
              <div class="bin-title" id="binEnvTitle"></div>
              <div class="bin-desc" id="binEnvDesc"></div>
              <div class="bin-slot" data-slot="environment"></div>
            </div>
            <div class="factor-bin" data-bin="management">
              <div class="bin-title" id="binMgmtTitle"></div>
              <div class="bin-desc" id="binMgmtDesc"></div>
              <div class="bin-slot" data-slot="management"></div>
            </div>
          </div>
          <div class="panel-title" id="hintLabel"></div>
          <div class="sidebar-sub" id="hintText"></div>
        </div>
      </div>
      <div class="result-panel" id="resultPanel">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-body" id="resultBody"></div>
        <div class="result-foot" id="resultFoot"></div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-label" id="statusLabel"></div>
      <div class="status-val" id="statusValue"></div>
      <div class="status-result" id="statusResult"></div>
    </div>
  </div>
</div>

<script>

var ACCENT = '#ffb000';
var ACCENT_DIM = '#ff7b2c';
var LANG = 'cn';

var I18N = {
  gameTitle:{en:'INCIDENT TEARDOWN LAB',cn:'事故拆解台'},

function shuffle(list) {
  var arr = list.slice();
  for (var i = arr.length - 1; i > 0; i -= 1) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

function modeColors() {
  var m = VISUAL_MODES[MODE];
  return {
    bg1:m.canvasBg1, bg2:m.canvasBg2, grid:m.canvasGrid, text:m.text, dim:m.dim, stroke:m.stroke,
    accent:ACCENT, accent2:ACCENT_DIM

}

function buildStyleSwitcher() {

  });

function drawBg(c, W, H) {
  var mc = modeColors();
  var g = c.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, mc.bg1);
  g.addColorStop(1, mc.bg2);
  c.fillStyle = g;
  c.fillRect(0, 0, W, H);
  c.strokeStyle = mc.grid;
  c.lineWidth = 0.6;
  for (var x = 0; x < W; x += 34) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke(); }
  for (var y = 0; y < H; y += 34) { c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke(); }
  if (MODE === 'cyberpunk') {
    c.strokeStyle = 'rgba(255,255,255,0.025)';
    for (var sy = 0; sy < H; sy += 3) { c.beginPath(); c.moveTo(0, sy); c.lineTo(W, sy); c.stroke(); }
  }
}

function rounded(c, x, y, w, h, r, fill, stroke) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
  if (fill) { c.fillStyle = fill; c.fill(); }
  if (stroke) { c.strokeStyle = stroke; c.lineWidth = 1; c.stroke(); }
}

function drawBarrierStack(c, W, H) {
  var keys = ['human','machine','environment','management'];
  var x = W - 210;
  var baseY = 118;
  for (var i = 0; i < keys.length; i += 1) {
    var good = state.phase === 'result' && chainVerdict(keys[i]);
    rounded(c, x, baseY + i * 50, 138, 34, 999, good ? 'rgba(34,197,94,0.18)' : 'rgba(255,176,0,0.08)', good ? 'rgba(34,197,94,0.42)' : 'rgba(255,176,0,0.22)');
    c.fillStyle = good ? '#bcf7d0' : '#ffd580';
    c.font = "700 10px 'JetBrains Mono','Noto Sans SC',sans-serif";
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(t('chain' + keys[i].charAt(0).toUpperCase() + keys[i].slice(1)), x + 69, baseY + i * 50 + 17);
  }
  if (state.phase === 'running' || state.phase === 'result') {
    var progress = state.phase === 'running' ? state.animProgress : 1;
    var stopIndex = state.resultData ? state.resultData.stopIndex : keys.length;
    var beamX = 56 + Math.min(progress * (W - 300), W - 300);
    c.strokeStyle = 'rgba(255,120,60,0.92)';
    c.lineWidth = 6;
    c.shadowColor = 'rgba(255,120,60,0.45)';
    c.shadowBlur = 18;
    c.beginPath();
    c.moveTo(72, 205);
    c.lineTo(Math.min(beamX, x + stopIndex * 0), 205);
    c.stroke();
    c.shadowBlur = 0;
    if (state.phase === 'result') {
      c.fillStyle = state.resultData.allCorrect ? '#22c55e' : '#ef4444';
      c.font = "700 12px 'JetBrains Mono','Noto Sans SC',sans-serif";
      c.fillText(state.resultData.allCorrect ? t('perfect') : t('partial'), x + 69, baseY + 214);
    }
  }
}

function chainVerdict(binKey) {
  if (!state.resultData) return false;
  return state.resultData.correctBins.indexOf(binKey) >= 0;
}

function draw() {
  var rect = canvas.getBoundingClientRect();
  var W = rect.width;
  var H = rect.height;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawBg(ctx, W, H);
  drawSceneLabel(ctx, W);
  if (currentRound().scene === 'forklift') drawForklift(ctx, W, H);
  if (currentRound().scene === 'mechanical') drawMechanical(ctx, W, H);
  if (currentRound().scene === 'fall') drawFall(ctx, W, H);
  if (currentRound().scene === 'space') drawSpace(ctx, W, H);
  drawBarrierStack(ctx, W, H);
}

function allCardsPlaced() {
  return Object.keys(state.placed).length === currentRound().cards.length;
}

function buildDeck() {
  var host = document.getElementById('evidenceDeck');
  host.innerHTML = '';
  var placed = state.placed;
  currentRound().cards.forEach(function(card){
    if (placed[card.id]) return;
    var el = document.createElement('div');
    el.className = 'evidence-card';
    el.draggable = true;
    el.dataset.cardId = card.id;
    el.textContent = t(card.labelKey);
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
    host.appendChild(el);
  });
}

function buildBins() {
  document.querySelectorAll('.bin-slot').forEach(function(slot){
    slot.innerHTML = '';
  });
  Object.keys(state.placed).forEach(function(cardId){
    var bin = state.placed[cardId];
    var card = currentRound().cards.find(function(item){ return item.id === cardId; });
    if (!card) return;
    var mini = document.createElement('div');
    mini.className = 'mini-card';
    mini.draggable = true;
    mini.dataset.cardId = card.id;
    mini.textContent = t(card.labelKey);
    mini.addEventListener('dragstart', onDragStart);
    mini.addEventListener('dragend', onDragEnd);
    var slot = document.querySelector('.bin-slot[data-slot="'+bin+'"]');
    if (slot) slot.appendChild(mini);
  });
}

function setHint() {
  document.getElementById('hintText').textContent = t(state.phase === 'sort' ? currentRound().hintKey : 'solvedHint');
}

function refreshI18N() {
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  document.getElementById('gameTitle').textContent = t('gameTitle');
  document.getElementById('sideTitle').textContent = t('sideTitle');
  document.getElementById('sideSub').textContent = t('sideSub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('legendLabel').textContent = t('legendLabel');
  document.getElementById('legendText').textContent = t('legendText');
  document.getElementById('hudL1').textContent = t('hudRound');
  document.getElementById('hudL2').textContent = t('hudScore');
  document.getElementById('hudL3').textContent = t('hudPlaced');
  document.getElementById('hudL4').textContent = t('hudState');
  document.getElementById('deckLabel').textContent = t('deckLabel');
  document.getElementById('chainLabel').textContent = t('chainLabel');
  document.getElementById('binsLabel').textContent = t('binsLabel');
  document.getElementById('hintLabel').textContent = t('hintLabel');
  document.getElementById('binHumanTitle').textContent = t('binHumanTitle');
  document.getElementById('binHumanDesc').textContent = t('binHumanDesc');
  document.getElementById('binMachineTitle').textContent = t('binMachineTitle');
  document.getElementById('binMachineDesc').textContent = t('binMachineDesc');
  document.getElementById('binEnvTitle').textContent = t('binEnvTitle');
  document.getElementById('binEnvDesc').textContent = t('binEnvDesc');
  document.getElementById('binMgmtTitle').textContent = t('binMgmtTitle');
  document.getElementById('binMgmtDesc').textContent = t('binMgmtDesc');
  document.querySelector('[data-chain="human"]').textContent = t('chainHuman');
  document.querySelector('[data-chain="machine"]').textContent = t('chainMachine');
  document.querySelector('[data-chain="environment"]').textContent = t('chainEnvironment');
  document.querySelector('[data-chain="management"]').textContent = t('chainManagement');
  updateRoundText();
  draw();
}

function updateHud() {
  document.getElementById('hudV1').textContent = (state.round + 1) + ' / ' + ROUNDS.length;
  document.getElementById('hudV2').textContent = String(state.totalScore);
  document.getElementById('hudV3').textContent = Object.keys(state.placed).length + ' / ' + currentRound().cards.length;
  document.getElementById('hudV4').textContent = t(state.phase === 'sort' ? (allCardsPlaced() ? 'stateSorted' : 'stateReady') : state.phase === 'running' ? 'stateRunning' : 'stateDone');
  document.getElementById('statusLabel').textContent = t('statusLabel');
  document.getElementById('statusValue').textContent = t(state.phase === 'sort' ? (allCardsPlaced() ? 'stateSorted' : 'stateReady') : state.phase === 'running' ? 'stateRunning' : 'stateDone');
  document.getElementById('statusResult').textContent = state.lastVerdict === '--' ? '--' : state.lastVerdict;
  document.getElementById('statusResult').className = 'status-result ' + (state.lastVerdict === t('perfect') ? 'pass' : state.lastVerdict === t('partial') ? 'fail' : '');
}

function updateRoundText() {
  document.getElementById('caseTitle').textContent = t(currentRound().titleKey);
  document.getElementById('caseSubtitle').textContent = t(currentRound().subKey);
  document.getElementById('casePill').textContent = t(currentRound().pillKey);
  document.getElementById('btnAction').textContent = t(state.phase === 'result' ? 'nextCase' : 'runChain');
  document.getElementById('btnReset').textContent = t('restart');
  setHint();
  updateHud();
  updateChainStrip();
}

function updateChainStrip() {
  var correctBins = state.resultData ? state.resultData.correctBins : [];
  var hasPlacedCards = Object.keys(state.placed).length > 0;
  document.querySelectorAll('.chain-cell').forEach(function(cell){
    var key = cell.dataset.chain;
    cell.classList.remove('ready','fail');
    if (state.phase === 'result') {
      cell.classList.add(correctBins.indexOf(key) >= 0 ? 'ready' : 'fail');
    } else if (hasPlacedCards) {
      cell.classList.add('ready');
    }
  });
}

function onDragStart(e) {
  e.dataTransfer.setData('text/plain', e.target.dataset.cardId);
  e.target.classList.add('dragging');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.factor-bin').forEach(function(bin){ bin.classList.remove('active'); });
}

function placeCard(cardId, binKey) {
  state.placed[cardId] = binKey;
  state.placedCount = Object.keys(state.placed).length;
  buildDeck();
  buildBins();
  updateHud();
}

function attachDropTargets() {
  document.querySelectorAll('.factor-bin').forEach(function(bin){
    bin.addEventListener('dragover', function(e){ e.preventDefault(); bin.classList.add('active'); });
    bin.addEventListener('dragleave', function(){ bin.classList.remove('active'); });
    bin.addEventListener('drop', function(e){
      e.preventDefault();
      var cardId = e.dataTransfer.getData('text/plain');
      bin.classList.remove('active');
      if (cardId) placeCard(cardId, bin.dataset.bin);
    });
  });
  document.getElementById('evidenceDeck').addEventListener('dragover', function(e){ e.preventDefault(); });
  document.getElementById('evidenceDeck').addEventListener('drop', function(e){
    e.preventDefault();
    var cardId = e.dataTransfer.getData('text/plain');
    if (cardId && state.placed[cardId]) {
      delete state.placed[cardId];
      state.placedCount = Object.keys(state.placed).length;
      buildDeck();
      buildBins();
      updateHud();
    }
  });
}

function evaluateRound() {
  var correctBins = [];
  currentRound().cards.forEach(function(card){
    if (state.placed[card.id] === card.bin && correctBins.indexOf(card.bin) < 0) {
      correctBins.push(card.bin);
    }
  });
  var exact = currentRound().cards.filter(function(card){ return state.placed[card.id] === card.bin; }).length;
  return {
    exact: exact,
    allCorrect: exact === currentRound().cards.length,
    correctBins: correctBins,
    stopIndex: correctBins.length
  };
}

function showResult() {
  var panel = document.getElementById('resultPanel');
  document.getElementById('resultTitle').textContent = state.resultData.allCorrect ? t('perfect') : t('partial');
  document.getElementById('resultBody').textContent = state.resultData.allCorrect ? t(currentRound().resultPassKey) : t(currentRound().resultFailKey);
  document.getElementById('resultFoot').textContent = t('resultFoot');
  panel.classList.add('show');
}

function hideResult() {
  document.getElementById('resultPanel').classList.remove('show');
}

function runChain() {
  if (!allCardsPlaced()) return;
  hideResult();
  state.phase = 'running';
  state.animProgress = 0;
  state.animStart = performance.now();
  state.resultData = evaluateRound();
  function tick(now) {
    var dt = Math.min((now - state.animStart) / 1200, 1);
    state.animProgress = dt;
    draw();
    updateHud();
    if (dt < 1) {
      requestAnimationFrame(tick);
      return;
    }
    state.phase = 'result';
    state.totalScore += state.resultData.exact;
    state.lastVerdict = state.resultData.allCorrect ? t('perfect') : t('partial');
    updateRoundText();
    showResult();
    draw();
  }
  requestAnimationFrame(tick);
}

function resetRound() {
  hideResult();
  state.placed = {};
  state.placedCount = 0;
  state.phase = 'sort';
  state.resultData = null;
  state.lastVerdict = '--';
  buildDeck();
  buildBins();
  updateRoundText();
  draw();
}

function nextRound() {
  if (state.round >= ROUNDS.length - 1) {
    state.round = 0;
    state.totalScore = 0;
  } else {
    state.round += 1;
  }
  resetRound();
}

function initRound() {
  var shuffled = shuffle(currentRound().cards);
  currentRound().cards = shuffled;
  resetRound();
}

document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG === 'cn' ? 'en' : 'cn';
  refreshI18N();
  buildDeck();
  buildBins();
});

document.getElementById('btnAction').addEventListener('click', function(){
  if (state.phase === 'result') nextRound();
  else runChain();
});

document.getElementById('btnReset').addEventListener('click', function(){
  state.totalScore = 0;
  resetRound();
});

window.__CF_SOLVE_CURRENT_ROUND = function() {
  currentRound().cards.forEach(function(card){ placeCard(card.id, card.bin); });
  if (state.phase !== 'result') runChain();
};

buildStyleSwitcher();
attachDropTargets();
applyMode('cyberpunk');
refreshI18N();
initRound();
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
