<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">INERTIA LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="objectLabel">OBJECT</div>
    <div class="slider-group">
      <label id="massLabel">MASS</label>
      <input type="range" id="massSlider" min="1" max="10" value="3" step="1">
      <div class="val" id="massVal">3 kg</div>
    </div>
    <div class="slider-group">
      <label id="frictionLabel">FRICTION</label>
      <input type="range" id="frictionSlider" min="1" max="10" value="3" step="1">
      <div class="val" id="frictionVal">0.3</div>
    </div>
    <div class="slider-group">
      <label id="speedLabel">PULL SPEED</label>
      <input type="range" id="speedSlider" min="1" max="10" value="7" step="1">
      <div class="val" id="speedVal">7</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="itemLabel">ITEMS ON TABLE</div>
    <div style="display:flex;flex-direction:column;gap:4px;" id="itemButtons"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="pullBtn">PULL!</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">INERTIA LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">TRIALS</div><div class="hud-val" id="hudV1">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">SUCCESS</div><div class="hud-val" id="hudV2">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">OBJECT</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">RESULT</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusText">--</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? 'rgba(91,163,217,0.06)' : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#3d7bb5');
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:      {en:'INERTIA LAB', cn:'\u60ef\u6027\u5b9e\u9a8c\u5ba4'},
  subtitle:   {en:'Tablecloth Pull Simulator', cn:'\u62bd\u684c\u5e03\u6a21\u62df\u5668'},

  massLbl:    {en:'MASS', cn:'\u8d28\u91cf'},
  frictionLbl:{en:'FRICTION', cn:'\u6469\u64e6\u7cfb\u6570'},
  speedLbl:   {en:'PULL SPEED', cn:'\u62bd\u62c9\u901f\u5ea6'},

  stayed:     {en:'STAYED! Object remained on table.', cn:'\u7559\u4e0b\u4e86\uff01\u7269\u4f53\u4ecd\u5728\u684c\u4e0a\u3002'},
  fell:       {en:'FELL! Object was dragged off.', cn:'\u98de\u4e86\uff01\u7269\u4f53\u88ab\u62d6\u8d70\u4e86\u3002'},
  pulling:    {en:'PULLING...', cn:'\u62bd\u62c9\u4e2d...'},

  vase:       {en:'Vase', cn:'\u82b1\u74f6'},

  inertiaWins:{en:'Inertia > Friction: heavy object + low friction + fast pull = stays', cn:'\u60ef\u6027 > \u6469\u64e6: \u91cd\u7269\u4f53 + \u4f4e\u6469\u64e6 + \u5feb\u62bd = \u7559\u4e0b'},
  frictionWins:{en:'Friction > Inertia: light object + high friction + slow pull = dragged', cn:'\u6469\u64e6 > \u60ef\u6027: \u8f7b\u7269\u4f53 + \u9ad8\u6469\u64e6 + \u6162\u62bd = \u88ab\u62d6\u8d70'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    if (typeof refreshI18N === 'function') refreshI18N();
  });
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, gctx;
var trialCount = 0, successCount = 0;
var isAnimating = false;
var animStep = 0;
var animTotalSteps = 60;

var ITEMS = [
  {id:'cup',   massBase:2, color:'#ecf0f1', accent:'#bdc3c7'},
  {id:'book',  massBase:4, color:'#3498db', accent:'#2980b9'},
  {id:'phone', massBase:1, color:'#2c3e50', accent:'#34495e'},
  {id:'vase',  massBase:5, color:'#e67e22', accent:'#d35400'},
  {id:'bowl',  massBase:3, color:'#1abc9c', accent:'#16a085'},
];
var currentItem = 0;

var sim = {
  clothX: 0,
  objX: 0,
  objVy: 0,
  objY: 0,
  objStays: true,
  stage: 'idle',
};

function getMass() { return parseInt(document.getElementById('massSlider').value); }
function getFric() { return parseInt(document.getElementById('frictionSlider').value) / 10; }
function getSpeed() { return parseInt(document.getElementById('speedSlider').value); }

// Physics model:
// contact_time proportional to 1/speed. Impulse = friction * mass * g * contact_time.
// Object stays if impulse < mass * inertia_threshold.
// Simplification: stays = (friction / speed) < threshold
// Threshold scales with mass (heavier = more inertia).
function doesObjectStay(mass, friction, speed) {
  var contactTime = 1.0 / (speed * 0.8 + 0.5);
  var impulse = friction * mass * 9.8 * contactTime;
  var threshold = mass * 2.5;
  return impulse < threshold;
}

function resetSim() {
  sim.clothX = 0;
  sim.objX = 0;
  sim.objVy = 0;
  sim.objY = 0;
  sim.objStays = true;
  sim.stage = 'idle';
  animStep = 0;
  isAnimating = false;
  document.getElementById('pullBtn').disabled = false;
  document.getElementById('statusText').textContent = t('ready');
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('hudV4').textContent = '--';
  renderScene();
}

function doPull() {
  if (isAnimating) return;
  var mass = getMass();
  var friction = getFric();
  var speed = getSpeed();
  sim.objStays = doesObjectStay(mass, friction, speed);
  sim.stage = 'pulling';
  sim.clothX = 0;
  sim.objX = 0;
  sim.objVy = 0;
  sim.objY = 0;
  animStep = 0;
  animTotalSteps = Math.max(30, 80 - speed * 5);
  isAnimating = true;
  document.getElementById('pullBtn').disabled = true;
  document.getElementById('statusText').textContent = t('pulling');
  document.getElementById('statusResult').textContent = '';
  trialCount++;
  document.getElementById('hudV1').textContent = trialCount;
  document.getElementById('hudV3').textContent = t(ITEMS[currentItem].id);
  runAnimation();
}

function runAnimation() {
  if (!isAnimating) return;
  animStep++;
  var prog = Math.min(animStep / animTotalSteps, 1);
  var eased = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;

  var speed = getSpeed();
  sim.clothX = eased * (400 + speed * 30);

  if (!sim.objStays) {
    var delay = 0.15;
    var dp = Math.max(0, (prog - delay) / (1 - delay));
    sim.objX = dp * dp * 200;
    if (prog > 0.7) {
      var fp = (prog - 0.7) / 0.3;
      sim.objVy = fp * fp * 120;
      sim.objY = fp * fp * 80;
    }
  } else {
    var wobble = Math.sin(prog * Math.PI * 4) * Math.max(0, 1 - prog * 2) * 3;
    sim.objX = wobble;
  }

  renderScene();

  if (prog < 1) {
    requestAnimationFrame(runAnimation);
  } else {
    sim.stage = 'done';
    isAnimating = false;
    document.getElementById('pullBtn').disabled = false;
    if (sim.objStays) {
      successCount++;
      document.getElementById('hudV2').textContent = successCount;
      document.getElementById('hudV4').textContent = LANG === 'cn' ? '\u6210\u529f' : 'PASS';
      document.getElementById('statusText').textContent = t('stayed') + ' ' + t('inertiaWins');
      document.getElementById('statusResult').textContent = LANG === 'cn' ? '\u6210\u529f' : 'PASS';
      document.getElementById('statusResult').className = 'status-result pass';
    } else {
      document.getElementById('hudV4').textContent = LANG === 'cn' ? '\u5931\u8d25' : 'FAIL';
      document.getElementById('statusText').textContent = t('fell') + ' ' + t('frictionWins');
      document.getElementById('statusResult').textContent = LANG === 'cn' ? '\u5931\u8d25' : 'FAIL';
      document.getElementById('statusResult').className = 'status-result fail';
    }
  }
}

// ================================================================
// RENDERING
// ================================================================
function renderScene() {
  var w = canvas.width, h = canvas.height;
  var c = gctx;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var dw = w / dpr, dh = h / dpr;

  drawGameBg(c, w, h);

  var mc = gameModeColors();
  var tblY = dh * 0.6 * dpr;
  var tblW = dw * 0.7 * dpr;
  var tblX = (w - tblW) / 2;
  var tblH = 14 * dpr;

  // Table legs
  c.fillStyle = mc.dim;
  c.globalAlpha = 0.5;
  c.fillRect(tblX + 30*dpr, tblY + tblH, 10*dpr, dh*0.22*dpr);
  c.fillRect(tblX + tblW - 40*dpr, tblY + tblH, 10*dpr, dh*0.22*dpr);
  c.globalAlpha = 1;

  // Table surface
  c.fillStyle = mc.strokeDim;
  c.fillRect(tblX, tblY, tblW, tblH);
  c.fillStyle = mc.accent;
  c.globalAlpha = 0.15;
  c.fillRect(tblX, tblY, tblW, 3*dpr);
  c.globalAlpha = 1;

  // Tablecloth
  var clothOff = sim.clothX * dpr;
  c.fillStyle = '#c0392b';
  c.globalAlpha = 0.85;
  var clW = tblW * 0.85;
  var clX = tblX + (tblW - clW) / 2 + clothOff;
  var clH = 8 * dpr;
  c.fillRect(clX, tblY - clH + 2*dpr, clW, clH);
  c.fillStyle = '#a93226';
  c.beginPath();
  c.moveTo(clX + clW, tblY - clH + 2*dpr);
  c.lineTo(clX + clW + 10*dpr, tblY + 5*dpr);
  c.lineTo(clX + clW + 12*dpr, tblY + 30*dpr);
  c.lineTo(clX + clW + 2*dpr, tblY + 25*dpr);
  c.closePath();
  c.fill();
  c.globalAlpha = 1;

  // Object
  var objCX = w/2 + sim.objX * dpr;
  var objBY = tblY - clH + 2*dpr + sim.objY * dpr;
  var item = ITEMS[currentItem];
  var mass = getMass();
  var sc = (0.7 + mass * 0.06) * dpr;

  drawObj(c, item, objCX, objBY, sc, mc);

  // Force arrows during pulling
  if (sim.stage === 'pulling' && animStep < animTotalSteps * 0.8) {
    var fLen = getFric() * 30 * dpr;
    c.strokeStyle = '#e67e22'; c.lineWidth = 2*dpr;
    c.beginPath(); c.moveTo(objCX, objBY - 10*dpr); c.lineTo(objCX + fLen, objBY - 10*dpr); c.stroke();
    c.fillStyle = '#e67e22';
    c.beginPath();
    c.moveTo(objCX + fLen, objBY - 10*dpr);
    c.lineTo(objCX + fLen - 6*dpr, objBY - 14*dpr);
    c.lineTo(objCX + fLen - 6*dpr, objBY - 6*dpr);
    c.closePath(); c.fill();
    c.font = 'bold ' + (11*dpr) + "px 'JetBrains Mono',monospace";
    c.fillStyle = '#e67e22'; c.textAlign = 'center';
    c.fillText(LANG === 'cn' ? '\u6469\u64e6\u529b' : 'Friction', objCX + fLen/2, objBY - 20*dpr);

    var iLen = mass * 8 * dpr;
    c.strokeStyle = mc.accent; c.lineWidth = 2.5*dpr;
    c.setLineDash([4*dpr, 3*dpr]);
    c.beginPath(); c.moveTo(objCX, objBY - 35*sc); c.lineTo(objCX - iLen, objBY - 35*sc); c.stroke();
    c.setLineDash([]);
    c.fillStyle = mc.accent;
    c.beginPath();
    c.moveTo(objCX - iLen, objBY - 35*sc);
    c.lineTo(objCX - iLen + 6*dpr, objBY - 35*sc - 4*dpr);
    c.lineTo(objCX - iLen + 6*dpr, objBY - 35*sc + 4*dpr);
    c.closePath(); c.fill();
    c.fillText(LANG === 'cn' ? '\u60ef\u6027' : 'Inertia', objCX - iLen/2, objBY - 35*sc - 12*dpr);
  }

  // Pull arrow on cloth
  if (sim.stage === 'pulling' && animStep < animTotalSteps) {
    c.strokeStyle = '#f39c12'; c.lineWidth = 3*dpr;
    var ax = clX + clW + 15*dpr, ay = tblY - 2*dpr;
    c.beginPath(); c.moveTo(ax, ay); c.lineTo(ax + 40*dpr, ay); c.stroke();
    c.fillStyle = '#f39c12';
    c.beginPath();
    c.moveTo(ax + 40*dpr, ay);
    c.lineTo(ax + 32*dpr, ay - 6*dpr);
    c.lineTo(ax + 32*dpr, ay + 6*dpr);
    c.closePath(); c.fill();
  }

  // Result text
  if (sim.stage === 'done') {
    c.font = 'bold ' + (14*dpr) + "px 'Space Grotesk','Noto Sans SC',sans-serif";
    c.textAlign = 'center';
    if (sim.objStays) {
      c.fillStyle = '#22c55e';
      c.fillText(LANG === 'cn' ? '\u60ef\u6027\u83b7\u80dc! \u7269\u4f53\u7559\u5728\u684c\u4e0a' : 'Inertia wins! Object stays', w/2, tblY - 80*dpr);
    } else {
      c.fillStyle = '#ef4444';
      c.fillText(LANG === 'cn' ? '\u6469\u64e6\u529b\u83b7\u80dc! \u7269\u4f53\u88ab\u62d6\u8d70' : 'Friction wins! Object dragged', w/2, tblY - 80*dpr);
    }
  }

  // Floor
  c.strokeStyle = mc.strokeDim; c.lineWidth = dpr;
  c.beginPath(); c.moveTo(0, h*0.88); c.lineTo(w, h*0.88); c.stroke();
}

function drawObj(c, item, cx, by, s, mc) {
  switch(item.id) {
    case 'cup':
      c.fillStyle = item.color;
      c.beginPath();
      c.moveTo(cx-18*s, by-50*s); c.lineTo(cx+18*s, by-50*s);
      c.lineTo(cx+14*s, by); c.lineTo(cx-14*s, by);
      c.closePath(); c.fill();
      c.strokeStyle = item.accent; c.lineWidth = 2*s;
      c.beginPath(); c.moveTo(cx-20*s, by-50*s); c.lineTo(cx+20*s, by-50*s); c.stroke();
      c.beginPath(); c.arc(cx+22*s, by-28*s, 9*s, -0.5, 0.5); c.stroke();
      c.fillStyle = 'rgba(91,163,217,0.5)';
      c.beginPath();
      c.moveTo(cx-16*s, by-32*s); c.lineTo(cx+16*s, by-32*s);
      c.lineTo(cx+14*s, by-2*s); c.lineTo(cx-14*s, by-2*s);
      c.closePath(); c.fill();
      break;
    case 'book':
      c.fillStyle = item.color;
      c.fillRect(cx-25*s, by-18*s, 50*s, 18*s);
      c.fillStyle = item.accent;
      c.fillRect(cx-25*s, by-18*s, 50*s, 3*s);
      c.fillStyle = '#f5f5dc';
      c.fillRect(cx-23*s, by-15*s, 46*s, 12*s);
      break;
    case 'phone':
      c.fillStyle = item.color;
      var pw=22*s, ph=40*s;
      c.fillRect(cx-pw/2, by-ph, pw, ph);
      c.fillStyle = '#1a1a2e';
      c.fillRect(cx-pw/2+2*s, by-ph+4*s, pw-4*s, ph-8*s);
      c.fillStyle = 'rgba(91,163,217,0.2)';
      c.fillRect(cx-pw/2+3*s, by-ph+5*s, pw-6*s, ph-10*s);
      break;
    case 'vase':
      c.fillStyle = item.color;
      c.beginPath();
      c.moveTo(cx-12*s, by);
      c.quadraticCurveTo(cx-20*s, by-30*s, cx-10*s, by-50*s);
      c.lineTo(cx+10*s, by-50*s);
      c.quadraticCurveTo(cx+20*s, by-30*s, cx+12*s, by);
      c.closePath(); c.fill();
      c.fillStyle = item.accent;
      c.fillRect(cx-12*s, by-52*s, 24*s, 4*s);
      break;
    case 'bowl':
      c.fillStyle = item.color;
      c.beginPath();
      c.moveTo(cx-22*s, by-5*s);
      c.quadraticCurveTo(cx-25*s, by-25*s, cx, by-28*s);
      c.quadraticCurveTo(cx+25*s, by-25*s, cx+22*s, by-5*s);
      c.lineTo(cx+18*s, by); c.lineTo(cx-18*s, by);
      c.closePath(); c.fill();
      c.fillStyle = 'rgba(0,0,0,0.15)';
      c.beginPath();
      c.ellipse(cx, by-10*s, 16*s, 8*s, 0, 0, Math.PI*2);
      c.fill();
      break;
  }
}

// ================================================================
// ITEM BUTTONS
// ================================================================
function buildItemBtns() {
  var ct = document.getElementById('itemButtons');
  ct.innerHTML = '';
  ITEMS.forEach(function(item, idx) {
    var btn = document.createElement('button');
    btn.className = 'reset-btn';
    btn.textContent = t(item.id);
    if (idx === currentItem) {
      btn.style.borderColor = ACCENT;
      btn.style.color = ACCENT;
    }
    btn.dataset.idx = idx;
    btn.addEventListener('click', function() {
      currentItem = parseInt(this.dataset.idx);
      document.getElementById('massSlider').value = ITEMS[currentItem].massBase;
      updateSliders();
      buildItemBtns();
      if (!isAnimating) renderScene();
    });
    ct.appendChild(btn);
  });
}

function updateSliders() {
  document.getElementById('massVal').textContent = getMass() + ' kg';
  document.getElementById('frictionVal').textContent = getFric().toFixed(1);
  document.getElementById('speedVal').textContent = getSpeed();
}

// ================================================================
// I18N REFRESH
// ================================================================
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('objectLabel').textContent = t('objectSec');
  document.getElementById('massLabel').textContent = t('massLbl');
  document.getElementById('frictionLabel').textContent = t('frictionLbl');
  document.getElementById('speedLabel').textContent = t('speedLbl');
  document.getElementById('itemLabel').textContent = t('itemSec');
  document.getElementById('pullBtn').textContent = t('pullBtn');
  document.getElementById('resetBtn').textContent = t('resetBtn');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('trialsLbl');
  document.getElementById('hudL2').textContent = t('successLbl');
  document.getElementById('hudL3').textContent = t('objectLbl');
  document.getElementById('hudL4').textContent = t('resultLbl');
  document.getElementById('statusLabel').textContent = t('statusLbl');
  if (sim.stage === 'idle') {
    document.getElementById('statusText').textContent = t('ready');
  }
  buildItemBtns();
  renderScene();
}

function onModeChange() { renderScene(); }

// ================================================================
// INIT
// ================================================================
function initGame() {
  canvas = document.getElementById('gc');
  gctx = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  function resizeCanvas() {
    var body = canvas.parentElement;
    var rect = body.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    renderScene();
  }

  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 400);
  document.fonts.ready.then(resizeCanvas);

  ['massSlider','frictionSlider','speedSlider'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      updateSliders();
      if (!isAnimating) renderScene();
    });
  });

  document.getElementById('pullBtn').addEventListener('click', doPull);
  document.getElementById('resetBtn').addEventListener('click', resetSim);

  buildItemBtns();
  updateSliders();
  refreshI18N();
  resetSim();
}

initGame();
</script>
