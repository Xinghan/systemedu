<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#f97316));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">LAUNCH CONTROL</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="scoreLabel">SCORE</div>
    <div class="sidebar-guide" id="scoreDisplay" style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--sb-accent,var(--primary));text-align:center;">0 / 0</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="streakLabel">STREAK</div>
    <div class="sidebar-guide" id="streakDisplay" style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#22c55e;text-align:center;">0</div>
    <div class="sidebar-divider"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">LAUNCH CONTROL</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ROUND</div><div class="hud-val" id="hudV1">1/8</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">MASS</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">ENGINE</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">THRUST</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">TWR</div><div class="hud-val" id="hudV5">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">CALCULATE TWR, DECIDE GO OR NO-GO</span>
      <span class="status-val" id="statusTrials">0 / 8</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#c2410c');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.35)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'LAUNCH CONTROL', cn:'\u53d1\u5c04\u63a7\u5236\u53f0'},
  subtitle:    {en:'Thrust-to-Weight Ratio Decision', cn:'\u63a8\u91cd\u6bd4\u51b3\u7b56\u5ba4'},
  guide:       {en:'GUIDE', cn:'\u6307\u5357'},
  guideText:   {en:'Review mission briefing: check rocket mass & engine thrust. Calculate weight (mg) and TWR (T/W). Decide GO or NO-GO. TWR<1 = cannot lift off. TWR 1~2 = marginal. TWR>2 = stable launch.',
                cn:'\u5ba1\u67e5\u4efb\u52a1\u7b80\u62a5\uff1a\u68c0\u67e5\u706b\u7bad\u8d28\u91cf\u548c\u53d1\u52a8\u673a\u63a8\u529b\u3002\u8ba1\u7b97\u91cd\u529b (mg) \u548c\u63a8\u91cd\u6bd4 (T/W)\u3002\u51b3\u5b9a GO \u6216 NO-GO\u3002TWR<1 = \u65e0\u6cd5\u8d77\u98de\u3002TWR 1~2 = \u52c9\u5f3a\u3002TWR>2 = \u7a33\u5b9a\u53d1\u5c04\u3002'},
  scoreLabel:  {en:'SCORE', cn:'\u5f97\u5206'},
  streakLabel: {en:'STREAK', cn:'\u8fde\u80dc'},
  roundLabel:  {en:'ROUND', cn:'\u56de\u5408'},
  massLabel:   {en:'MASS', cn:'\u8d28\u91cf'},
  engineLabel: {en:'ENGINE', cn:'\u53d1\u52a8\u673a'},
  thrustLabel: {en:'THRUST', cn:'\u63a8\u529b'},
  twrLabel:    {en:'TWR', cn:'\u63a8\u91cd\u6bd4'},
  statusReady: {en:'CALCULATE TWR, DECIDE GO OR NO-GO', cn:'\u8ba1\u7b97\u63a8\u91cd\u6bd4\uff0c\u51b3\u5b9a GO \u6216 NO-GO'},
  go:          {en:'GO', cn:'GO'},
  nogo:        {en:'NO-GO', cn:'NO-GO'},
  correct:     {en:'CORRECT!', cn:'\u6b63\u786e\uff01'},
  wrong:       {en:'WRONG!', cn:'\u9519\u8bef\uff01'},
  nextRound:   {en:'NEXT ROUND', cn:'\u4e0b\u4e00\u56de\u5408'},
  missionBrief:{en:'MISSION BRIEFING', cn:'\u4efb\u52a1\u7b80\u62a5'},
  weightCalc:  {en:'WEIGHT', cn:'\u91cd\u529b'},
  twrCalc:     {en:'TWR CALC', cn:'\u63a8\u91cd\u6bd4\u8ba1\u7b97'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  complete:    {en:'ALL MISSIONS COMPLETE!', cn:'\u5168\u90e8\u4efb\u52a1\u5b8c\u6210\uff01'},
  finalScore:  {en:'FINAL SCORE', cn:'\u6700\u7ec8\u5f97\u5206'},
  noLift:      {en:'Cannot lift off!', cn:'\u65e0\u6cd5\u8d77\u98de\uff01'},
  marginal:    {en:'Marginal launch', cn:'\u52c9\u5f3a\u8d77\u98de'},
  stableLaunch:{en:'Stable launch!', cn:'\u7a33\u5b9a\u53d1\u5c04\uff01'},
  crashed:     {en:'Launched with low TWR -- unstable!', cn:'\u4f4e\u63a8\u91cd\u6bd4\u5f3a\u884c\u53d1\u5c04 -- \u5931\u63a7\uff01'},
  wastedDay:   {en:'Good conditions wasted!', cn:'\u6d6a\u8d39\u4e86\u597d\u5929\u6c14\uff01'},
  rocketMass:  {en:'Rocket mass', cn:'\u706b\u7bad\u8d28\u91cf'},
  engineName:  {en:'Engine', cn:'\u53d1\u52a8\u673a'},
  thrustForce: {en:'Thrust', cn:'\u63a8\u529b'},
  gravity:     {en:'g = 9.8 m/s\u00b2', cn:'g = 9.8 m/s\u00b2'},
  twrZoneRed:  {en:'TWR < 1: NO LIFT', cn:'TWR < 1: \u65e0\u6cd5\u8d77\u98de'},
  twrZoneOrg:  {en:'1 \u2264 TWR < 2: MARGINAL', cn:'1 \u2264 TWR < 2: \u52c9\u5f3a'},
  twrZoneYlw:  {en:'2 \u2264 TWR < 4: STABLE', cn:'2 \u2264 TWR < 4: \u7a33\u5b9a'},
  twrZoneGrn:  {en:'TWR \u2265 4: IDEAL', cn:'TWR \u2265 4: \u7406\u60f3'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
    draw();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('scoreLabel').textContent = t('scoreLabel');
  document.getElementById('streakLabel').textContent = t('streakLabel');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('roundLabel');
  document.getElementById('hudL2').textContent = t('massLabel');
  document.getElementById('hudL3').textContent = t('engineLabel');
  document.getElementById('hudL4').textContent = t('thrustLabel');
  document.getElementById('hudL5').textContent = t('twrLabel');
  document.getElementById('statusLabel').textContent = t('statusReady');
  document.getElementById('btnReset').textContent = t('reset');
}

// ================================================================
// GAME DATA
// ================================================================
var ROUNDS = [
  { massG: 200, engine: 'C5',  thrustN: 5.0 },
  { massG: 500, engine: 'HT-0', thrustN: 3.0 },
  { massG: 200, engine: 'HT-0', thrustN: 3.0 },
  { massG: 300, engine: 'C5',  thrustN: 5.0 },
  { massG: 400, engine: 'HT-0', thrustN: 3.0 },
  { massG: 150, engine: 'C5',  thrustN: 5.0 },
  { massG: 100, engine: 'C5',  thrustN: 5.0 },
  { massG: 600, engine: 'C5',  thrustN: 5.0 },
];

function calcWeight(massG) { return (massG / 1000) * 9.8; }
function calcTWR(thrustN, weightN) { return thrustN / weightN; }
function correctAnswer(twr) { return twr >= 1.0 ? 'go' : 'nogo'; }

// ================================================================
// STATE
// ================================================================
var currentRound = 0;
var totalScore = 0;
var currentStreak = 0;
var answered = false;
var playerAnswer = null;
var animPhase = 'idle';
var animTime = 0;
var rocketY = 0;
var shakeX = 0;
var shakeIntensity = 0;
var resultText = '';
var resultCorrect = false;
var showNextBtn = false;
var gameComplete = false;
var goHover = false;
var nogoHover = false;
var nextHover = false;
var sliderValue = 0;
var sliderDragging = false;
var twrRevealed = false;

// canvas dimensions
var cvs, ctx, W, H;

// ================================================================
// DRAWING
// ================================================================
function draw() {
  if (!ctx) return;
  var mc = gameModeColors();

  drawGameBg(ctx, W, H);

  var round = ROUNDS[currentRound] || ROUNDS[0];
  var massKg = round.massG / 1000;
  var weightN = calcWeight(round.massG);
  var twr = calcTWR(round.thrustN, weightN);

  // Layout zones
  var padCenterX = W * 0.28;
  var padBottomY = H * 0.78;
  var calcStartX = W * 0.52;
  var calcWidth = W * 0.44;
  var gaugeX = W * 0.52;
  var gaugeW = calcWidth;

  if (gameComplete) {
    drawCompleteScreen(mc);
    return;
  }

  // -- MISSION BRIEFING PANEL (top-left) --
  drawMissionBriefing(mc, round, 20, 20, padCenterX * 1.6);

  // -- ROCKET ON PAD --
  drawRocketOnPad(mc, round, padCenterX, padBottomY, weightN, twr);

  // -- CALCULATION WORKSPACE (right side) --
  drawCalcWorkspace(mc, round, calcStartX, 20, calcWidth, massKg, weightN, twr);

  // -- TWR GAUGE (right side, below calc) --
  drawTwrGauge(mc, gaugeX, H * 0.44, gaugeW, H * 0.12, twr);

  // -- GO / NO-GO BUTTONS --
  drawDecisionButtons(mc);

  // -- RESULT OVERLAY --
  if (answered) {
    drawResultOverlay(mc, twr, round);
  }
}

function drawMissionBriefing(mc, round, x, y, maxW) {
  ctx.save();
  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'left';
  ctx.fillText(t('missionBrief') + ' #' + (currentRound + 1), x, y + 14);

  ctx.font = '500 13px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.text;
  var lineY = y + 38;

  ctx.fillText(t('rocketMass') + ': ' + round.massG + 'g (' + (round.massG / 1000).toFixed(3) + ' kg)', x, lineY);
  lineY += 22;
  ctx.fillText(t('engineName') + ': ' + round.engine, x, lineY);
  lineY += 22;
  ctx.fillText(t('thrustForce') + ': ' + round.thrustN.toFixed(1) + ' N', x, lineY);
  lineY += 22;
  ctx.font = '400 11px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('gravity'), x, lineY);
  ctx.restore();
}

function drawRocketOnPad(mc, round, cx, bottomY, weightN, twr) {
  ctx.save();
  var rocketH = 90;
  var rocketW = 28;
  var baseY = bottomY;

  // Pad / ground
  ctx.fillStyle = mc.strokeDim;
  ctx.fillRect(cx - 50, baseY, 100, 4);
  ctx.fillStyle = mc.dim;
  ctx.font = '700 9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LAUNCH PAD', cx, baseY + 16);

  // Rocket body offset
  var offsetY = 0;
  var offsetX = 0;
  if (animPhase === 'launch') {
    offsetY = -rocketY;
  } else if (animPhase === 'shake') {
    offsetX = shakeX;
    offsetY = -2 * Math.sin(animTime * 8);
  } else if (animPhase === 'crash') {
    offsetY = -rocketY;
    offsetX = shakeX;
  }

  var rocketTopY = baseY - rocketH + offsetY;
  var rocketCX = cx + offsetX;

  // Rocket body
  ctx.fillStyle = '#d4d4d8';
  ctx.beginPath();
  ctx.moveTo(rocketCX, rocketTopY);
  ctx.lineTo(rocketCX - rocketW / 2, rocketTopY + rocketH * 0.75);
  ctx.lineTo(rocketCX - rocketW / 2, rocketTopY + rocketH);
  ctx.lineTo(rocketCX + rocketW / 2, rocketTopY + rocketH);
  ctx.lineTo(rocketCX + rocketW / 2, rocketTopY + rocketH * 0.75);
  ctx.closePath();
  ctx.fill();

  // Nose cone
  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.moveTo(rocketCX, rocketTopY);
  ctx.lineTo(rocketCX - rocketW * 0.35, rocketTopY + rocketH * 0.25);
  ctx.lineTo(rocketCX + rocketW * 0.35, rocketTopY + rocketH * 0.25);
  ctx.closePath();
  ctx.fill();

  // Fins
  ctx.fillStyle = '#a1a1aa';
  ctx.beginPath();
  ctx.moveTo(rocketCX - rocketW / 2, rocketTopY + rocketH * 0.8);
  ctx.lineTo(rocketCX - rocketW / 2 - 10, rocketTopY + rocketH + 5);
  ctx.lineTo(rocketCX - rocketW / 2, rocketTopY + rocketH);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(rocketCX + rocketW / 2, rocketTopY + rocketH * 0.8);
  ctx.lineTo(rocketCX + rocketW / 2 + 10, rocketTopY + rocketH + 5);
  ctx.lineTo(rocketCX + rocketW / 2, rocketTopY + rocketH);
  ctx.closePath();
  ctx.fill();

  // Engine label
  ctx.font = '700 8px "JetBrains Mono", monospace';
  ctx.fillStyle = '#3f3f46';
  ctx.textAlign = 'center';
  ctx.fillText(round.engine, rocketCX, rocketTopY + rocketH * 0.6);

  // Force arrows (only when not animating away)
  if (animPhase === 'idle' || animPhase === 'shake') {
    // Weight arrow (downward, red)
    var arrowStartY = rocketTopY + rocketH * 0.5;
    var weightArrowLen = Math.min(60, weightN * 15);
    drawForceArrow(rocketCX - 40, arrowStartY, rocketCX - 40, arrowStartY + weightArrowLen, '#ef4444', 2.5);
    ctx.font = '700 10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#ef4444';
    ctx.textAlign = 'right';
    ctx.fillText('W=' + weightN.toFixed(2) + 'N', rocketCX - 46, arrowStartY + weightArrowLen / 2 + 4);

    // Thrust arrow (upward, green/orange)
    var thrustColor = twr >= 1.0 ? '#22c55e' : ACCENT;
    var thrustArrowLen = Math.min(60, round.thrustN * 15);
    drawForceArrow(rocketCX + 40, arrowStartY, rocketCX + 40, arrowStartY - thrustArrowLen, thrustColor, 2.5);
    ctx.font = '700 10px "JetBrains Mono", monospace';
    ctx.fillStyle = thrustColor;
    ctx.textAlign = 'left';
    ctx.fillText('T=' + round.thrustN.toFixed(1) + 'N', rocketCX + 46, arrowStartY - thrustArrowLen / 2 + 4);
  }

  // Exhaust flame during launch
  if (animPhase === 'launch' || (animPhase === 'crash' && rocketY < 80)) {
    drawFlame(rocketCX + offsetX, rocketTopY + rocketH);
  }

  ctx.restore();
}

function drawForceArrow(x1, y1, x2, y2, color, lineW) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lineW;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  var angle = Math.atan2(y2 - y1, x2 - x1);
  var headLen = 8;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
  ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawFlame(cx, topY) {
  ctx.save();
  var t2 = performance.now() * 0.01;
  var flameH = 20 + Math.sin(t2) * 8;
  var flameW = 10 + Math.cos(t2 * 1.3) * 3;
  var grad = ctx.createLinearGradient(cx, topY, cx, topY + flameH);
  grad.addColorStop(0, '#fbbf24');
  grad.addColorStop(0.4, ACCENT);
  grad.addColorStop(1, 'rgba(239,68,68,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx - flameW, topY);
  ctx.quadraticCurveTo(cx - flameW * 0.5, topY + flameH * 0.7, cx, topY + flameH);
  ctx.quadraticCurveTo(cx + flameW * 0.5, topY + flameH * 0.7, cx + flameW, topY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawCalcWorkspace(mc, round, x, y, maxW, massKg, weightN, twr) {
  ctx.save();
  var panelY = y;

  // Section: Weight calculation
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'left';
  ctx.fillText(t('weightCalc'), x, panelY + 14);

  panelY += 30;
  ctx.font = '500 13px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.text;
  ctx.fillText('W = m x g', x, panelY);
  panelY += 20;
  ctx.fillText('W = ' + massKg.toFixed(3) + ' x 9.8', x, panelY);
  panelY += 20;
  ctx.fillStyle = '#ef4444';
  ctx.font = '700 14px "JetBrains Mono", monospace';
  ctx.fillText('W = ' + weightN.toFixed(2) + ' N', x, panelY);

  // Slider for verification
  panelY += 30;
  ctx.font = '700 9px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.dim;
  ctx.fillText(LANG === 'cn' ? 'SLIDER \u9a8c\u8bc1\u91cd\u529b\u8ba1\u7b97' : 'SLIDER VERIFY WEIGHT', x, panelY);
  panelY += 14;
  drawSlider(x, panelY, maxW - 20, weightN, round.massG);

  // Section: TWR calculation
  panelY += 40;
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('twrCalc'), x, panelY);

  panelY += 22;
  ctx.font = '500 13px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.text;
  ctx.fillText('TWR = T / W', x, panelY);
  panelY += 20;
  ctx.fillText('TWR = ' + round.thrustN.toFixed(1) + ' / ' + weightN.toFixed(2), x, panelY);
  panelY += 22;

  // TWR result (large, colored)
  var twrColor = twr < 1.0 ? '#ef4444' : twr < 2.0 ? '#f97316' : twr < 4.0 ? '#eab308' : '#22c55e';
  ctx.font = '700 22px "JetBrains Mono", monospace';
  ctx.fillStyle = twrColor;
  if (twrRevealed || answered) {
    ctx.fillText('TWR = ' + twr.toFixed(2), x, panelY);
  } else {
    ctx.fillText('TWR = ???', x, panelY);
    ctx.font = '400 10px "Noto Sans SC", sans-serif';
    ctx.fillStyle = mc.dim;
    ctx.fillText(LANG === 'cn' ? '\u62d6\u52a8\u6ed1\u5757\u9a8c\u8bc1\u91cd\u529b\u540e\u663e\u793a' : 'Verify weight with slider to reveal', x, panelY + 16);
  }

  ctx.restore();
}

function drawSlider(x, y, sliderW, targetWeight, massG) {
  ctx.save();
  var trackH = 6;
  var knobR = 8;
  var minVal = 0;
  var maxVal = 10;

  // Track
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(x, y, sliderW, trackH);

  // Filled portion
  var fillFrac = sliderValue / maxVal;
  var fillColor = ACCENT;
  ctx.fillStyle = fillColor;
  ctx.fillRect(x, y, sliderW * fillFrac, trackH);

  // Knob
  var knobX = x + sliderW * fillFrac;
  var knobY = y + trackH / 2;
  ctx.beginPath();
  ctx.arc(knobX, knobY, knobR, 0, Math.PI * 2);
  ctx.fillStyle = sliderDragging ? '#fb923c' : ACCENT;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Value display
  var displayWeight = sliderValue;
  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = gameModeColors().text;
  ctx.textAlign = 'left';
  ctx.fillText(massG + 'g x 9.8 / 1000 = ' + displayWeight.toFixed(2) + ' N', x, y + trackH + 20);

  // Check if close enough
  var diff = Math.abs(displayWeight - targetWeight);
  if (diff < 0.15) {
    twrRevealed = true;
    ctx.fillStyle = '#22c55e';
    ctx.font = '700 10px "JetBrains Mono", monospace';
    ctx.fillText(LANG === 'cn' ? 'TWR \u5df2\u89e3\u9501' : 'TWR UNLOCKED', x + sliderW - 90, y + trackH + 20);
  }

  // Store slider geometry for hit testing
  sliderGeo = { x: x, y: y - knobR, w: sliderW, h: trackH + knobR * 2, minVal: minVal, maxVal: maxVal };
  ctx.restore();
}

var sliderGeo = null;

function drawTwrGauge(mc, x, y, gaugeW, gaugeH, twr) {
  ctx.save();
  var barW = gaugeW - 20;
  var barH = 16;
  var barX = x;
  var barY = y;

  // Zone backgrounds
  var zones = [
    { start: 0, end: 1, color: 'rgba(239,68,68,0.35)', label: t('twrZoneRed') },
    { start: 1, end: 2, color: 'rgba(249,115,22,0.35)', label: t('twrZoneOrg') },
    { start: 2, end: 4, color: 'rgba(234,179,8,0.25)', label: t('twrZoneYlw') },
    { start: 4, end: 6, color: 'rgba(34,197,94,0.3)', label: t('twrZoneGrn') },
  ];

  var maxTwr = 6;
  zones.forEach(function(z) {
    var sx = barX + (z.start / maxTwr) * barW;
    var sw = ((z.end - z.start) / maxTwr) * barW;
    ctx.fillStyle = z.color;
    ctx.fillRect(sx, barY, sw, barH);
  });

  // Border
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // Marker for current TWR (if revealed)
  if (twrRevealed || answered) {
    var markerX = barX + Math.min(twr / maxTwr, 1) * barW;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(markerX, barY - 4);
    ctx.lineTo(markerX - 5, barY - 12);
    ctx.lineTo(markerX + 5, barY - 12);
    ctx.closePath();
    ctx.fill();
    ctx.font = '700 10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(twr.toFixed(2), markerX, barY - 15);
  }

  // Zone labels below gauge
  ctx.font = '400 9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  var labelY = barY + barH + 14;
  ctx.fillStyle = '#ef4444'; ctx.fillText('< 1', barX + (0.5 / maxTwr) * barW, labelY);
  ctx.fillStyle = '#f97316'; ctx.fillText('1-2', barX + (1.5 / maxTwr) * barW, labelY);
  ctx.fillStyle = '#eab308'; ctx.fillText('2-4', barX + (3 / maxTwr) * barW, labelY);
  ctx.fillStyle = '#22c55e'; ctx.fillText('4+', barX + (5 / maxTwr) * barW, labelY);

  ctx.restore();
}

function drawDecisionButtons(mc) {
  if (answered) return;
  ctx.save();

  var btnW = 140;
  var btnH = 50;
  var gap = 30;
  var totalW = btnW * 2 + gap;
  var startX = (W - totalW) / 2;
  var btnY = H * 0.84;

  // GO button
  goButtonGeo = { x: startX, y: btnY, w: btnW, h: btnH };
  var goFill = goHover ? 'rgba(34,197,94,0.45)' : 'rgba(34,197,94,0.25)';
  ctx.fillStyle = goFill;
  ctx.fillRect(startX, btnY, btnW, btnH);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = goHover ? 2.5 : 1.5;
  ctx.strokeRect(startX, btnY, btnW, btnH);
  if (goHover) {
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 12;
    ctx.strokeRect(startX, btnY, btnW, btnH);
    ctx.shadowBlur = 0;
  }
  ctx.font = '700 20px "JetBrains Mono", monospace';
  ctx.fillStyle = '#22c55e';
  ctx.textAlign = 'center';
  ctx.fillText('GO', startX + btnW / 2, btnY + btnH / 2 + 7);

  // NO-GO button
  var nogoX = startX + btnW + gap;
  nogoButtonGeo = { x: nogoX, y: btnY, w: btnW, h: btnH };
  var nogoFill = nogoHover ? 'rgba(239,68,68,0.45)' : 'rgba(239,68,68,0.25)';
  ctx.fillStyle = nogoFill;
  ctx.fillRect(nogoX, btnY, btnW, btnH);
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = nogoHover ? 2.5 : 1.5;
  ctx.strokeRect(nogoX, btnY, btnW, btnH);
  if (nogoHover) {
    ctx.shadowColor = '#ef4444';
    ctx.shadowBlur = 12;
    ctx.strokeRect(nogoX, btnY, btnW, btnH);
    ctx.shadowBlur = 0;
  }
  ctx.font = '700 20px "JetBrains Mono", monospace';
  ctx.fillStyle = '#ef4444';
  ctx.textAlign = 'center';
  ctx.fillText('NO-GO', nogoX + btnW / 2, btnY + btnH / 2 + 7);

  ctx.restore();
}

var goButtonGeo = null;
var nogoButtonGeo = null;
var nextButtonGeo = null;

function drawResultOverlay(mc, twr, round) {
  ctx.save();

  // Semi-transparent overlay at bottom
  var overlayH = H * 0.28;
  var overlayY = H - overlayH;
  ctx.fillStyle = 'rgba(5,6,15,0.88)';
  ctx.fillRect(0, overlayY, W, overlayH);
  ctx.strokeStyle = resultCorrect ? '#22c55e' : '#ef4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, overlayY);
  ctx.lineTo(W, overlayY);
  ctx.stroke();

  var centerX = W / 2;
  var textY = overlayY + 30;

  // Correct / Wrong
  ctx.font = '700 22px "JetBrains Mono", monospace';
  ctx.fillStyle = resultCorrect ? '#22c55e' : '#ef4444';
  ctx.textAlign = 'center';
  ctx.fillText(resultCorrect ? t('correct') : t('wrong'), centerX, textY);

  // Explanation
  textY += 26;
  ctx.font = '500 13px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.text;
  ctx.fillText('TWR = ' + twr.toFixed(2) + '  --  ' + resultText, centerX, textY);

  // Detailed explanation
  textY += 22;
  ctx.font = '400 11px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.dim;
  if (twr < 1.0) {
    ctx.fillText(LANG === 'cn' ? '\u63a8\u529b ' + round.thrustN.toFixed(1) + 'N < \u91cd\u529b ' + calcWeight(round.massG).toFixed(2) + 'N\uff0c\u706b\u7bad\u4e0d\u53ef\u80fd\u79bb\u5f00\u53d1\u5c04\u67b6' : 'Thrust ' + round.thrustN.toFixed(1) + 'N < Weight ' + calcWeight(round.massG).toFixed(2) + 'N, rocket cannot leave the pad', centerX, textY);
  } else if (twr < 2.0) {
    ctx.fillText(LANG === 'cn' ? 'TWR \u5728 1~2 \u4e4b\u95f4\uff0c\u52c9\u5f3a\u53ef\u4ee5\u8d77\u98de\uff0c\u4f46\u52a0\u901f\u7f13\u6162\uff0c\u6297\u98ce\u80fd\u529b\u5dee' : 'TWR between 1~2, barely lifts off, slow acceleration, poor wind resistance', centerX, textY);
  } else if (twr < 4.0) {
    ctx.fillText(LANG === 'cn' ? 'TWR \u5728 2~4 \u4e4b\u95f4\uff0c\u7a33\u5b9a\u53d1\u5c04\uff0c\u52a0\u901f\u826f\u597d' : 'TWR between 2~4, stable launch, good acceleration', centerX, textY);
  } else {
    ctx.fillText(LANG === 'cn' ? 'TWR \u2265 4\uff0c\u7406\u60f3\u53d1\u5c04\u6761\u4ef6\uff0c\u52a0\u901f\u5feb\u901f\u4e14\u7a33\u5b9a' : 'TWR >= 4, ideal launch conditions, fast and stable acceleration', centerX, textY);
  }

  // Next button
  if (showNextBtn) {
    var nbW = 160;
    var nbH = 36;
    var nbX = centerX - nbW / 2;
    var nbY = overlayY + overlayH - 50;
    nextButtonGeo = { x: nbX, y: nbY, w: nbW, h: nbH };

    ctx.fillStyle = nextHover ? 'rgba(249,115,22,0.4)' : 'rgba(249,115,22,0.2)';
    ctx.fillRect(nbX, nbY, nbW, nbH);
    ctx.strokeStyle = ACCENT;
    ctx.lineWidth = nextHover ? 2 : 1;
    ctx.strokeRect(nbX, nbY, nbW, nbH);

    var btnText = currentRound >= ROUNDS.length - 1 ? t('finalScore') : t('nextRound');
    ctx.font = '700 13px "JetBrains Mono", monospace';
    ctx.fillStyle = ACCENT;
    ctx.textAlign = 'center';
    ctx.fillText(btnText, centerX, nbY + nbH / 2 + 5);
  }

  ctx.restore();
}

function drawCompleteScreen(mc) {
  ctx.save();
  var cx = W / 2;
  var cy = H / 2;

  ctx.font = '700 28px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.fillText(t('complete'), cx, cy - 40);

  ctx.font = '700 48px "JetBrains Mono", monospace';
  ctx.fillStyle = '#22c55e';
  ctx.fillText(totalScore + ' / ' + ROUNDS.length, cx, cy + 20);

  var pct = Math.round(totalScore / ROUNDS.length * 100);
  ctx.font = '500 16px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.dim;
  ctx.fillText(pct + '%' + (LANG === 'cn' ? ' \u6b63\u786e\u7387' : ' accuracy'), cx, cy + 55);

  // Summary of each round
  var summaryY = cy + 90;
  ctx.font = '400 11px "JetBrains Mono", monospace';
  ROUNDS.forEach(function(r, i) {
    var w2 = calcWeight(r.massG);
    var tw = calcTWR(r.thrustN, w2);
    var ans = correctAnswer(tw);
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'left';
    var rowX = cx - 200;
    ctx.fillText('#' + (i + 1) + '  ' + r.massG + 'g + ' + r.engine + '  TWR=' + tw.toFixed(2) + '  ' + ans.toUpperCase(), rowX, summaryY);
    summaryY += 16;
  });

  ctx.restore();
}

// ================================================================
// ANIMATION
// ================================================================
var animRAF = null;

function startAnimation(correct, twr) {
  animTime = 0;
  rocketY = 0;
  shakeX = 0;
  shakeIntensity = 0;

  if (correct) {
    if (twr < 1.0) {
      // Correct NO-GO: rocket shakes on pad
      animPhase = 'shake';
      shakeIntensity = 3;
    } else {
      // Correct GO: rocket launches
      animPhase = 'launch';
    }
  } else {
    if (playerAnswer === 'go' && twr < 1.0) {
      // Wrong GO on low TWR: rocket shakes and tips
      animPhase = 'crash';
      shakeIntensity = 6;
    } else {
      // Wrong NO-GO on good TWR: just shake disappointedly
      animPhase = 'shake';
      shakeIntensity = 2;
    }
  }

  if (animRAF) cancelAnimationFrame(animRAF);
  animRAF = requestAnimationFrame(animate);
}

function animate() {
  animTime += 0.016;

  if (animPhase === 'launch') {
    var accel = 80 + animTime * 60;
    rocketY += accel * 0.016;
    if (rocketY > H + 100) {
      animPhase = 'done';
      showNextBtn = true;
    }
  } else if (animPhase === 'shake') {
    shakeX = Math.sin(animTime * 25) * shakeIntensity * Math.max(0, 1 - animTime * 0.5);
    if (animTime > 2.0) {
      animPhase = 'done';
      shakeX = 0;
      showNextBtn = true;
    }
  } else if (animPhase === 'crash') {
    if (animTime < 0.8) {
      rocketY += 30 * 0.016;
      shakeX = Math.sin(animTime * 30) * shakeIntensity;
    } else {
      rocketY -= 10 * 0.016;
      shakeX = Math.sin(animTime * 15) * shakeIntensity * 2 * Math.max(0, 1 - (animTime - 0.8));
      if (animTime > 2.5) {
        animPhase = 'done';
        shakeX = 0;
        showNextBtn = true;
      }
    }
  }

  draw();

  if (animPhase !== 'done') {
    animRAF = requestAnimationFrame(animate);
  }
}

// ================================================================
// INTERACTION
// ================================================================
function hitTest(mx, my, geo) {
  if (!geo) return false;
  return mx >= geo.x && mx <= geo.x + geo.w && my >= geo.y && my <= geo.y + geo.h;
}

function handleClick(mx, my) {
  if (gameComplete) return;

  if (!answered) {
    if (hitTest(mx, my, goButtonGeo)) {
      submitAnswer('go');
      return;
    }
    if (hitTest(mx, my, nogoButtonGeo)) {
      submitAnswer('nogo');
      return;
    }
  }

  if (showNextBtn && hitTest(mx, my, nextButtonGeo)) {
    advanceRound();
    return;
  }
}

function submitAnswer(ans) {
  if (answered) return;
  answered = true;
  playerAnswer = ans;
  twrRevealed = true;

  var round = ROUNDS[currentRound];
  var weightN = calcWeight(round.massG);
  var twr = calcTWR(round.thrustN, weightN);
  var correct = correctAnswer(twr);

  resultCorrect = (ans === correct);
  if (resultCorrect) {
    totalScore++;
    currentStreak++;
  } else {
    currentStreak = 0;
  }

  // Result text
  if (twr < 1.0) {
    if (resultCorrect) {
      resultText = t('noLift');
    } else {
      resultText = t('crashed');
    }
  } else if (twr < 2.0) {
    if (resultCorrect) {
      resultText = t('marginal');
    } else {
      resultText = t('wastedDay');
    }
  } else {
    if (resultCorrect) {
      resultText = t('stableLaunch');
    } else {
      resultText = t('wastedDay');
    }
  }

  updateHUD(round, twr);
  updateSidebar();
  startAnimation(resultCorrect, twr);
}

function advanceRound() {
  currentRound++;
  if (currentRound >= ROUNDS.length) {
    gameComplete = true;
    document.getElementById('statusLabel').textContent = t('complete');
    draw();
    return;
  }
  answered = false;
  playerAnswer = null;
  animPhase = 'idle';
  animTime = 0;
  rocketY = 0;
  shakeX = 0;
  showNextBtn = false;
  resultText = '';
  twrRevealed = false;
  sliderValue = 0;

  var round = ROUNDS[currentRound];
  updateHUD(round, null);
  document.getElementById('statusTrials').textContent = currentRound + ' / ' + ROUNDS.length;
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  draw();
}

function updateHUD(round, twr) {
  document.getElementById('hudV1').textContent = (currentRound + 1) + '/' + ROUNDS.length;
  document.getElementById('hudV2').textContent = round.massG + 'g';
  document.getElementById('hudV3').textContent = round.engine;
  document.getElementById('hudV4').textContent = round.thrustN.toFixed(1) + 'N';
  document.getElementById('hudV5').textContent = twr !== null ? twr.toFixed(2) : '--';
  document.getElementById('statusTrials').textContent = currentRound + ' / ' + ROUNDS.length;
  if (answered) {
    document.getElementById('statusResult').textContent = resultCorrect ? t('correct') : t('wrong');
    document.getElementById('statusResult').className = 'status-result ' + (resultCorrect ? 'pass' : 'fail');
  }
}

function updateSidebar() {
  document.getElementById('scoreDisplay').textContent = totalScore + ' / ' + (currentRound + 1);
  document.getElementById('streakDisplay').textContent = String(currentStreak);
  document.getElementById('streakDisplay').style.color = currentStreak >= 3 ? '#22c55e' : currentStreak > 0 ? ACCENT : gameModeColors().dim;
}

function resetGame() {
  currentRound = 0;
  totalScore = 0;
  currentStreak = 0;
  answered = false;
  playerAnswer = null;
  animPhase = 'idle';
  animTime = 0;
  rocketY = 0;
  shakeX = 0;
  showNextBtn = false;
  resultText = '';
  gameComplete = false;
  twrRevealed = false;
  sliderValue = 0;

  var round = ROUNDS[0];
  updateHUD(round, null);
  updateSidebar();
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('statusLabel').textContent = t('statusReady');
  document.getElementById('statusTrials').textContent = '0 / ' + ROUNDS.length;
  draw();
}

// ================================================================
// CANVAS SETUP AND EVENT BINDING
// ================================================================
function initCanvas() {
  cvs = document.getElementById('gc');
  ctx = cvs.getContext('2d');
  resizeCanvas();
}

function resizeCanvas() {
  var parent = cvs.parentElement;
  var dpr = window.devicePixelRatio || 1;
  cvs.width = parent.clientWidth * dpr;
  cvs.height = parent.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  W = parent.clientWidth;
  H = parent.clientHeight;
  cvs.style.width = parent.clientWidth + 'px';
  cvs.style.height = parent.clientHeight + 'px';
  draw();
}

function canvasCoords(e) {
  var rect = cvs.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left),
    y: (e.clientY - rect.top)
  };
}

function onMouseDown(e) {
  var pos = canvasCoords(e);

  // Slider interaction
  if (sliderGeo && !answered && hitTest(pos.x, pos.y, sliderGeo)) {
    sliderDragging = true;
    updateSliderFromMouse(pos.x);
    return;
  }

  handleClick(pos.x, pos.y);
}

function onMouseMove(e) {
  var pos = canvasCoords(e);

  if (sliderDragging) {
    updateSliderFromMouse(pos.x);
    return;
  }

  goHover = hitTest(pos.x, pos.y, goButtonGeo) && !answered;
  nogoHover = hitTest(pos.x, pos.y, nogoButtonGeo) && !answered;
  nextHover = showNextBtn && hitTest(pos.x, pos.y, nextButtonGeo);

  cvs.style.cursor = (goHover || nogoHover || nextHover) ? 'pointer' : (sliderGeo && hitTest(pos.x, pos.y, sliderGeo) && !answered ? 'grab' : 'default');

  if (animPhase === 'idle' || animPhase === 'done') draw();
}

function onMouseUp() {
  sliderDragging = false;
}

function updateSliderFromMouse(mx) {
  if (!sliderGeo) return;
  var frac = Math.max(0, Math.min(1, (mx - sliderGeo.x) / sliderGeo.w));
  sliderValue = sliderGeo.minVal + frac * (sliderGeo.maxVal - sliderGeo.minVal);
  draw();
}

// Touch support
function onTouchStart(e) {
  e.preventDefault();
  var touch = e.touches[0];
  var pos = canvasCoords(touch);
  if (sliderGeo && !answered && hitTest(pos.x, pos.y, sliderGeo)) {
    sliderDragging = true;
    updateSliderFromMouse(pos.x);
    return;
  }
  handleClick(pos.x, pos.y);
}

function onTouchMove(e) {
  e.preventDefault();
  if (sliderDragging) {
    var touch = e.touches[0];
    var pos = canvasCoords(touch);
    updateSliderFromMouse(pos.x);
  }
}

function onTouchEnd(e) {
  sliderDragging = false;
}

// ================================================================
// INIT
// ================================================================
function init() {
  initCanvas();
  buildGameStyleSwitcher();
  setupLangToggle();
  refreshI18N();
  applyGameMode(GAME_MODE);

  var round = ROUNDS[0];
  updateHUD(round, null);
  updateSidebar();

  cvs.addEventListener('mousedown', onMouseDown);
  cvs.addEventListener('mousemove', onMouseMove);
  cvs.addEventListener('mouseup', onMouseUp);
  cvs.addEventListener('mouseleave', onMouseUp);
  cvs.addEventListener('touchstart', onTouchStart, { passive: false });
  cvs.addEventListener('touchmove', onTouchMove, { passive: false });
  cvs.addEventListener('touchend', onTouchEnd);

  document.getElementById('btnReset').addEventListener('click', resetGame);

  window.addEventListener('resize', function() {
    resizeCanvas();
  });

  draw();
}

init();
</script>
