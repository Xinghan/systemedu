<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">CG LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="cgLabel">CG POSITION</div>
    <div class="slider-group">
      <label id="sliderLabel">WEIGHT POS</label>
      <input type="range" id="cgSlider" min="0" max="100" value="65">
      <div class="val" id="cgVal">65%</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnLaunch">LAUNCH</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">CG LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">TRIAL</div><div class="hud-val" id="hudV1">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">DISTANCE</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">RESULT</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">BEST</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">DRAG SLIDER TO SET WEIGHT POSITION</span>
      <span class="status-val" id="statusDist"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1:m.canvasBg1, bg2:m.canvasBg2,
    grid:m.canvasGrid, gridStep:m.gridStep||64,
    text:m.canvasText||'#e2e8f0', dim:m.canvasTextDim||'#a3a3a3',
    stroke:m.canvasStroke||'#e2e8f0', strokeDim:m.canvasStrokeDim||'rgba(255,255,255,0.12)',
    accent:ACCENT,
    glow:!!m.canvasGlow, scanlines:!!m.canvasScanlines,
    cornerBrackets:!!m.canvasCornerBrackets,
    innerBorder:!!m.canvasInnerBorder,
    innerBorderColor:m.canvasInnerBorderColor||'rgba(0,0,0,0.15)',
    topLine:!!m.canvasTopLine,
  };
}

// Custom drawGameBg with deep space stars
var _stars = [];
(function(){for(var i=0;i<35;i++){_stars.push({x:Math.random(),y:Math.random(),r:0.3+Math.random()*1.2,a:0.3+Math.random()*0.7,spd:0.5+Math.random()*2,off:Math.random()*Math.PI*2});}})();

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  // Background
  if (GAME_MODE === 'cyberpunk') {
    var gBg = c.createLinearGradient(0,0,0,h);
    gBg.addColorStop(0,'oklch(0.10 0.04 280)');
    gBg.addColorStop(1,'oklch(0.20 0.10 290)');
    c.fillStyle = gBg; c.fillRect(0,0,w,h);
  } else {
    var g=c.createLinearGradient(0,0,0,h);
    g.addColorStop(0,mc.bg1);g.addColorStop(1,mc.bg2);
    c.fillStyle=g;c.fillRect(0,0,w,h);
  }
  // Grid
  var gc2=mc.grid||(mc.accent?mc.accent.replace(/[\d.]+\)$/,'0.06)'):'rgba(255,255,255,0.04)');
  c.strokeStyle=gc2;c.lineWidth=0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // Stars (cyberpunk/dark only)
  if(GAME_MODE!=='light'){
    var now=Date.now()/1000;
    for(var si=0;si<_stars.length;si++){
      var s=_stars[si];
      var tw=0.5+0.5*Math.sin(now*s.spd+s.off);
      var al=s.a*tw*(GAME_MODE==='dark'?0.5:1);
      c.fillStyle=si%5===0?'rgba(215,195,120,'+al+')':'rgba(200,200,255,'+al+')';
      c.beginPath();c.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);c.fill();
    }
  }
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.02)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg||'#05060f');
  r.style.setProperty('--sb-bg', m.sbBg||'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder||ACCENT);
  r.style.setProperty('--sb-text', m.sbText||'#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim||'#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute||'#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder||'transparent');
  r.style.setProperty('--hud-bg', m.hudBg||'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder||'transparent');
  r.style.setProperty('--hud-label', m.hudLabel||'#5e6070');
  r.style.setProperty('--hud-value', m.hudValue||ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg||ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor||'#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#7c3aed');
  r.style.setProperty('--glow-strong', 'rgba(167,139,250,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode===mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if(!c) return;
  c.innerHTML='';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn=document.createElement('button');
    btn.className='vm-btn'+(k===GAME_MODE?' vm-active':'');
    btn.dataset.mode=k;
    btn.textContent=GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click',function(){applyGameMode(k);});
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'CG WEIGHT LAB', cn:'\u914d\u91cd\u5b9e\u9a8c\u5ba4'},
  subtitle:  {en:'Find the best CG position for stable flight', cn:'\u627e\u5230\u6700\u4f73\u914d\u91cd\u4f4d\u7f6e\uff0c\u5b9e\u73b0\u7a33\u5b9a\u98de\u884c'},
  guide:     {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  g1:        {en:'Drag the slider to move the weight (paper clip) along the plane', cn:'\u62d6\u52a8\u6ed1\u5757\u79fb\u52a8\u914d\u91cd\uff08\u56de\u5f62\u9488\uff09\u5728\u673a\u8eab\u4e0a\u7684\u4f4d\u7f6e'},
  g2:        {en:'Click LAUNCH to test-fly', cn:'\u70b9\u51fb\u8bd5\u98de\u53d1\u5c04'},
  g3:        {en:'Watch how CG position affects flight', cn:'\u89c2\u5bdf\u91cd\u5fc3\u4f4d\u7f6e\u5982\u4f55\u5f71\u54cd\u98de\u884c'},
  g4:        {en:'Goal: find the farthest stable flight', cn:'\u76ee\u6807\uff1a\u627e\u5230\u98de\u5f97\u6700\u8fdc\u6700\u7a33\u7684\u914d\u91cd'},
  cgPos:     {en:'CG POSITION', cn:'CG\u4f4d\u7f6e'},
  weightPos: {en:'WEIGHT POS', cn:'\u914d\u91cd\u4f4d\u7f6e'},
  launch:    {en:'LAUNCH', cn:'\u8bd5\u98de'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  trial:     {en:'TRIAL', cn:'\u8bd5\u98de'},
  distance:  {en:'DISTANCE', cn:'\u8ddd\u79bb'},
  result:    {en:'RESULT', cn:'\u7ed3\u679c'},
  best:      {en:'BEST', cn:'\u6700\u4f73'},
  stable:    {en:'STABLE', cn:'\u7a33\u5b9a'},
  nosedive:  {en:'NOSE-DIVE', cn:'\u683d\u5934'},
  tumble:    {en:'TUMBLE', cn:'\u7ffb\u8f6c'},
  neutral:   {en:'UNSTABLE', cn:'\u4e0d\u7a33\u5b9a'},
  dragSlider:{en:'DRAG SLIDER TO SET WEIGHT POSITION', cn:'\u62d6\u52a8\u6ed1\u5757\u8bbe\u7f6e\u914d\u91cd\u4f4d\u7f6e'},
  flying:    {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  complete:  {en:'FLIGHT COMPLETE', cn:'\u98de\u884c\u7ed3\u675f'},
  bestFound: {en:'BEST DISTANCE FOUND!', cn:'\u627e\u5230\u6700\u4f73\u8ddd\u79bb\uff01'},
};
function t(key){return(I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}
function setupLangToggle(){
  var btn=document.getElementById('langBtn');
  if(!btn)return;
  btn.textContent=LANG.toUpperCase();
  btn.addEventListener('click',function(){
    LANG=LANG==='en'?'cn':'en';
    btn.textContent=LANG.toUpperCase();
    refreshI18N();
  });
}
function refreshI18N(){
  document.getElementById('sideTitle').textContent=t('title');
  document.getElementById('sideSub').textContent=t('subtitle');
  document.getElementById('guideLabel').textContent=t('guide');
  document.getElementById('guideText').innerHTML=
    '<ul><li>'+t('g1')+'</li><li>'+t('g2')+'</li><li>'+t('g3')+'</li><li>'+t('g4')+'</li></ul>';
  document.getElementById('cgLabel').textContent=t('cgPos');
  document.getElementById('sliderLabel').textContent=t('weightPos');
  document.getElementById('btnLaunch').textContent=t('launch');
  document.getElementById('btnReset').textContent=t('reset');
  document.getElementById('hudTag').textContent=t('title');
  document.getElementById('hudL1').textContent=t('trial');
  document.getElementById('hudL2').textContent=t('distance');
  document.getElementById('hudL3').textContent=t('result');
  document.getElementById('hudL4').textContent=t('best');
  if(!isFlying) document.getElementById('statusLabel').textContent=t('dragSlider');
  draw();
}

// ================================================================
// GAME STATE
// ================================================================
var gc, c2d, cw=0, ch=0;
var cgPercent = 65; // 0=tail, 100=nose. CP is at ~55%.
var CP_PERCENT = 55;
var isFlying = false;
var flightTime = 0;
var flightDuration = 0;
var flightPath = [];
var trailParticles = [];
var launchParticles = [];
var trials = [];
var bestDist = 0;
var planeState = {x:0, y:0, angle:0, vx:0, vy:0, omega:0};

// ================================================================
// CANVAS SETUP
// ================================================================
function initCanvas() {
  gc = document.getElementById('gc');
  c2d = gc.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  var body = gc.parentElement;
  var rect = body.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  cw=rect.width; ch=rect.height;
  var dpr=Math.min(window.devicePixelRatio||1,2);
  gc.width=cw*dpr; gc.height=ch*dpr;
  gc.style.width=cw+'px'; gc.style.height=ch+'px';
  c2d.setTransform(dpr,0,0,dpr,0,0);
  draw();
}

// ================================================================
// DRAWING
// ================================================================

// Corner ticks for completion panel
function drawCornerTicks(ctx, x, y, w, h, color) {
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.5;
  var s=10;
  ctx.beginPath();ctx.moveTo(x+8,y+8);ctx.lineTo(x+8,y+8+s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+8,y+8);ctx.lineTo(x+8+s,y+8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+w-8,y+h-8);ctx.lineTo(x+w-8,y+h-8-s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+w-8,y+h-8);ctx.lineTo(x+w-8-s,y+h-8);ctx.stroke();
  ctx.globalAlpha=1;
}

// Draw the large paper airplane preview with CG/CP indicators
function drawPlanePreview(c, centerX, centerY, scale) {
  var mc = gameModeColors();
  c.save();
  c.translate(centerX, centerY);
  c.scale(scale, scale);

  // Airplane body (side view)
  c.beginPath();
  c.moveTo(80, 0);      // nose
  c.lineTo(-50, -24);   // top wing trailing edge
  c.lineTo(-60, 0);     // tail
  c.lineTo(-50, 16);    // bottom trailing edge
  c.closePath();
  c.fillStyle = 'rgba(167,139,250,0.15)';
  c.fill();
  c.strokeStyle = ACCENT;
  c.lineWidth = 1.2;
  c.stroke();

  // Center line
  c.beginPath();
  c.moveTo(80, 0); c.lineTo(-60, 0);
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 0.5;
  c.setLineDash([4,4]); c.stroke(); c.setLineDash([]);

  // CG position dot (accent)
  var planeLen = 140; // from -60 to +80
  var cgPos = -60 + (cgPercent/100)*planeLen;
  c.shadowColor = ACCENT; c.shadowBlur = 12;
  c.fillStyle = ACCENT;
  c.beginPath(); c.arc(cgPos, 0, 6, 0, Math.PI*2); c.fill();
  c.shadowBlur = 0;
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillStyle = ACCENT; c.textAlign = 'center';
  c.fillText('CG', cgPos, -18);

  // CP position dot (gold)
  var cpPos = -60 + (CP_PERCENT/100)*planeLen;
  c.shadowColor = 'oklch(0.85 0.14 85)'; c.shadowBlur = 10;
  c.fillStyle = 'oklch(0.85 0.14 85)';
  c.beginPath(); c.arc(cpPos, 0, 5, 0, Math.PI*2); c.fill();
  c.shadowBlur = 0;
  c.fillStyle = 'oklch(0.85 0.14 85)';
  c.fillText('CP', cpPos, 24);

  // Weight (paper clip) at CG position
  c.strokeStyle = ACCENT; c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(cgPos-4, -8); c.lineTo(cgPos-4, 8);
  c.lineTo(cgPos+4, 8); c.lineTo(cgPos+4, -6);
  c.lineTo(cgPos-2, -6); c.lineTo(cgPos-2, 6);
  c.stroke();

  c.restore();
}

// Draw CG/CP indicator bar
function drawCgCpBar(c, x, y, barW, barH) {
  var mc = gameModeColors();
  // Bar background
  c.fillStyle = 'rgba(50,40,80,0.4)';
  c.fillRect(x, y, barW, barH);
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 0.5;
  c.strokeRect(x, y, barW, barH);

  // Labels
  c.font = "8px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim; c.textAlign = 'left';
  c.fillText('TAIL', x, y-4);
  c.textAlign = 'right';
  c.fillText('NOSE', x+barW, y-4);

  // CP marker (gold)
  var cpX = x + (CP_PERCENT/100)*barW;
  c.fillStyle = 'oklch(0.85 0.14 85)';
  c.beginPath(); c.arc(cpX, y+barH/2, 5, 0, Math.PI*2); c.fill();
  c.font = "bold 8px 'JetBrains Mono',monospace";
  c.textAlign = 'center';
  c.fillText('CP', cpX, y+barH+12);

  // CG marker (accent)
  var cgX = x + (cgPercent/100)*barW;
  c.shadowColor = ACCENT; c.shadowBlur = 8;
  c.fillStyle = ACCENT;
  c.beginPath(); c.arc(cgX, y+barH/2, 6, 0, Math.PI*2); c.fill();
  c.shadowBlur = 0;
  c.fillText('CG', cgX, y-12);

  // Optimal zone (subtle highlight)
  var optStart = x + 0.58*barW;
  var optEnd = x + 0.75*barW;
  c.fillStyle = 'rgba(34,197,94,0.08)';
  c.fillRect(optStart, y, optEnd-optStart, barH);
}

// Draw small flying airplane
function drawFlyingPlane(c, px, py, angle, scale, color, alpha) {
  c.save();
  c.translate(px, py); c.rotate(angle); c.scale(scale, scale);
  c.globalAlpha = alpha||1;
  c.beginPath();
  c.moveTo(20, 0); c.lineTo(-12, -6); c.lineTo(-15, 0); c.lineTo(-12, 4);
  c.closePath();
  c.fillStyle = color||ACCENT;
  c.globalAlpha *= 0.3; c.fill();
  c.globalAlpha = alpha||1;
  c.strokeStyle = color||ACCENT; c.lineWidth = 1; c.stroke();
  c.restore();
}

function draw() {
  if(!c2d||!isFinite(cw)||!isFinite(ch)) return;
  var mc = gameModeColors();
  drawGameBg(c2d, cw, ch);

  if(isFlying) {
    // Draw all previous flight paths
    for(var ti=0;ti<trials.length;ti++){
      var tr = trials[ti];
      if(tr.path.length<2) continue;
      c2d.strokeStyle = tr.result==='stable' ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.15)';
      c2d.lineWidth = 0.5;
      c2d.setLineDash([4,4]);
      c2d.beginPath();
      c2d.moveTo(tr.path[0].x, tr.path[0].y);
      for(var pi=1;pi<tr.path.length;pi++) c2d.lineTo(tr.path[pi].x, tr.path[pi].y);
      c2d.stroke();
      c2d.setLineDash([]);
    }

    // Current flight path
    if(flightPath.length>1){
      var resultColor = getFlightResult(cgPercent)==='stable' ? '#22c55e' : '#ef4444';
      c2d.strokeStyle = resultColor;
      c2d.lineWidth = 1;
      c2d.setLineDash([6,4]);
      c2d.globalAlpha = 0.6;
      c2d.beginPath();
      c2d.moveTo(flightPath[0].x, flightPath[0].y);
      for(var fi=1;fi<flightPath.length;fi++) c2d.lineTo(flightPath[fi].x, flightPath[fi].y);
      c2d.stroke();
      c2d.setLineDash([]);
      c2d.globalAlpha = 1;
    }

    // Trail particles
    for(var tp=trailParticles.length-1;tp>=0;tp--){
      var p = trailParticles[tp];
      p.life -= 0.02;
      if(p.life<=0){trailParticles.splice(tp,1);continue;}
      c2d.fillStyle = p.color;
      c2d.globalAlpha = p.life*0.5;
      c2d.beginPath(); c2d.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); c2d.fill();
      c2d.globalAlpha = 1;
    }

    // Launch particles
    for(var lp=launchParticles.length-1;lp>=0;lp--){
      var lpart = launchParticles[lp];
      lpart.life -= 0.03;
      lpart.x += lpart.vx; lpart.y += lpart.vy;
      lpart.vy += 0.1;
      if(lpart.life<=0){launchParticles.splice(lp,1);continue;}
      c2d.fillStyle = lpart.color;
      c2d.globalAlpha = lpart.life;
      c2d.beginPath(); c2d.arc(lpart.x, lpart.y, lpart.r*lpart.life, 0, Math.PI*2); c2d.fill();
      c2d.globalAlpha = 1;
    }

    // Flying airplane
    drawFlyingPlane(c2d, planeState.x, planeState.y, planeState.angle, 2, ACCENT, 1);

  } else {
    // Idle state: show plane preview + CG/CP bar + previous trails

    // Previous flight paths
    for(var ti2=0;ti2<trials.length;ti2++){
      var tr2 = trials[ti2];
      if(tr2.path.length<2) continue;
      c2d.strokeStyle = tr2.result==='stable' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.1)';
      c2d.lineWidth = 0.5;
      c2d.setLineDash([4,4]);
      c2d.beginPath();
      c2d.moveTo(tr2.path[0].x, tr2.path[0].y);
      for(var pi2=1;pi2<tr2.path.length;pi2++) c2d.lineTo(tr2.path[pi2].x, tr2.path[pi2].y);
      c2d.stroke();
      c2d.setLineDash([]);
    }

    // Plane preview (upper area)
    drawPlanePreview(c2d, cw*0.4, ch*0.38, Math.min(cw/500, ch/300)*0.9);

    // CG/CP bar (lower area)
    var barW = Math.min(cw*0.5, 300);
    var barX = cw*0.4 - barW/2;
    var barY = ch*0.72;
    drawCgCpBar(c2d, barX, barY, barW, 8);

    // Trial log (right side if space)
    if(trials.length>0 && cw>500){
      var logX = cw*0.75;
      var logY = 40;
      c2d.font = "bold 9px 'JetBrains Mono',monospace";
      c2d.fillStyle = mc.dim; c2d.textAlign = 'left';
      c2d.fillText('FLIGHT LOG', logX, logY);
      c2d.font = "8px 'JetBrains Mono',monospace";
      var visibleTrials = trials.slice(-8);
      for(var tl=0;tl<visibleTrials.length;tl++){
        var tri = visibleTrials[tl];
        var ty = logY+16+tl*14;
        c2d.fillStyle = tri.result==='stable' ? '#22c55e' : '#ef4444';
        c2d.fillText('#'+(trials.indexOf(tri)+1)+' CG:'+tri.cgPos+'%  '+tri.dist.toFixed(0)+'m  '+tri.result.toUpperCase(), logX, ty);
      }
    }
  }

  // Station window frame (subtle decorative element, top-right corner)
  c2d.save();
  c2d.strokeStyle = mc.strokeDim; c2d.lineWidth = 0.4;
  c2d.globalAlpha = 0.3;
  var wx = cw-80, wy = ch-60, ww = 50, wh = 35;
  c2d.strokeRect(wx, wy, ww, wh);
  // Cross-hatch for window
  c2d.beginPath(); c2d.moveTo(wx,wy); c2d.lineTo(wx+ww,wy+wh); c2d.stroke();
  c2d.beginPath(); c2d.moveTo(wx+ww,wy); c2d.lineTo(wx,wy+wh); c2d.stroke();
  c2d.globalAlpha = 1;
  c2d.restore();
}

// ================================================================
// FLIGHT PHYSICS
// ================================================================

function getFlightResult(cgPct) {
  var delta = cgPct - CP_PERCENT; // positive = CG ahead of CP
  if(delta >= 8 && delta <= 25) return 'stable';
  if(delta > 25) return 'nosedive';
  if(delta < -3) return 'tumble';
  return 'neutral'; // delta -3 to 8
}

function calcFlightDistance(cgPct) {
  var delta = cgPct - CP_PERCENT;
  // Best at delta ~15 (CG 70%), degrades away from optimal
  if(delta >= 8 && delta <= 25) {
    // Stable: distance peaks around delta=15
    var optDelta = 15;
    var quality = 1 - Math.abs(delta - optDelta)/15;
    return 150 + quality * 200; // 150-350m
  }
  if(delta > 25) {
    // Nose-dive: short distance
    return Math.max(20, 100 - (delta-25)*3);
  }
  if(delta < -3) {
    // Tumble: very short
    return Math.max(10, 50 + delta*2);
  }
  // Neutral: medium-short, wobbly
  return 80 + Math.random()*40;
}

function launchFlight() {
  if(isFlying) return;
  isFlying = true;
  flightPath = [];
  trailParticles = [];
  launchParticles = [];
  flightTime = 0;

  var resultType = getFlightResult(cgPercent);
  var dist = calcFlightDistance(cgPercent);
  flightDuration = 120 + dist * 0.8; // frames

  // Starting position (left side)
  var startX = 80;
  var startY = ch * 0.5;
  planeState = {x: startX, y: startY, angle: -0.08, vx: 3, vy: 0, omega: 0};

  // Launch particles burst
  for(var i=0;i<10;i++){
    var isGold = i%4===0;
    launchParticles.push({
      x:startX, y:startY,
      vx: -2-Math.random()*3, vy: (Math.random()-0.5)*4,
      r: 2+Math.random()*3,
      life: 0.7+Math.random()*0.3,
      color: isGold ? 'oklch(0.85 0.14 85)' : ACCENT,
    });
  }

  document.getElementById('statusLabel').textContent = t('flying');
  document.getElementById('btnLaunch').disabled = true;
  document.getElementById('cgSlider').disabled = true;

  var totalSteps = Math.floor(flightDuration);
  var stepCount = 0;

  function stepFlight() {
    if(stepCount >= totalSteps) {
      finishFlight(resultType, dist);
      return;
    }
    var prog = stepCount / totalSteps;
    var eased = 1 - Math.pow(1-prog, 3); // easeOutCubic

    if(resultType === 'stable') {
      planeState.x = 80 + eased * (cw - 160);
      planeState.y = ch*0.5 + Math.sin(prog*8)*5*(1-prog); // damped wave
      planeState.angle = -0.02 + Math.sin(prog*6)*0.03*(1-prog);
    } else if(resultType === 'nosedive') {
      var diveProg = Math.min(prog*2.5, 1);
      planeState.x = 80 + eased * (cw*0.5);
      planeState.y = ch*0.4 + diveProg*diveProg*(ch*0.5);
      planeState.angle = diveProg * 1.2;
    } else if(resultType === 'tumble') {
      var tumbleProg = Math.min(prog*3, 1);
      planeState.x = 80 + eased * (cw*0.35);
      planeState.y = ch*0.5 - Math.sin(tumbleProg*Math.PI)*ch*0.2 + tumbleProg*tumbleProg*ch*0.3;
      planeState.angle = -0.5 + tumbleProg*tumbleProg*Math.PI*2;
    } else { // neutral
      planeState.x = 80 + eased * (cw*0.45);
      planeState.y = ch*0.5 + Math.sin(prog*12)*20;
      planeState.angle = Math.sin(prog*10)*0.3;
    }

    flightPath.push({x: planeState.x, y: planeState.y});

    // Trail particles
    if(stepCount%3===0){
      trailParticles.push({
        x: planeState.x - 10*Math.cos(planeState.angle),
        y: planeState.y - 10*Math.sin(planeState.angle),
        r: 1.5+Math.random(), life: 0.6+Math.random()*0.4,
        color: stepCount%12===0 ? 'oklch(0.85 0.14 85)' : 'rgba(167,139,250,0.6)',
      });
    }

    // Distance HUD update
    var currentDist = (eased * dist).toFixed(0);
    document.getElementById('hudV2').textContent = currentDist + 'm';

    stepCount++;
    draw();
    requestAnimationFrame(stepFlight);
  }
  requestAnimationFrame(stepFlight);
}

function finishFlight(resultType, dist) {
  isFlying = false;
  var trial = {
    cgPos: cgPercent,
    dist: dist,
    result: resultType,
    path: flightPath.slice(),
  };
  trials.push(trial);

  if(resultType === 'stable' && dist > bestDist) {
    bestDist = dist;
    document.getElementById('hudV4').textContent = dist.toFixed(0) + 'm';
    document.getElementById('statusLabel').textContent = t('bestFound');
  } else {
    document.getElementById('statusLabel').textContent = t('complete');
  }

  document.getElementById('hudV1').textContent = trials.length.toString();
  document.getElementById('hudV2').textContent = dist.toFixed(0) + 'm';

  var resultLabel = t(resultType);
  document.getElementById('hudV3').textContent = resultLabel;

  var statusResult = document.getElementById('statusResult');
  statusResult.textContent = resultLabel;
  statusResult.className = 'status-result ' + (resultType==='stable' ? 'pass' : 'fail');

  document.getElementById('statusDist').textContent = dist.toFixed(0) + 'm';

  document.getElementById('btnLaunch').disabled = false;
  document.getElementById('cgSlider').disabled = false;

  draw();
}

function resetGame() {
  isFlying = false;
  trials = [];
  bestDist = 0;
  flightPath = [];
  trailParticles = [];
  launchParticles = [];
  cgPercent = 65;
  document.getElementById('cgSlider').value = 65;
  document.getElementById('cgVal').textContent = '65%';
  document.getElementById('hudV1').textContent = '0';
  document.getElementById('hudV2').textContent = '--';
  document.getElementById('hudV3').textContent = '--';
  document.getElementById('hudV4').textContent = '--';
  document.getElementById('statusLabel').textContent = t('dragSlider');
  document.getElementById('statusDist').textContent = '';
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('btnLaunch').disabled = false;
  document.getElementById('cgSlider').disabled = false;
  draw();
}

// ================================================================
// INIT
// ================================================================
(function init(){
  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  initCanvas();
  refreshI18N();

  // Slider
  var slider = document.getElementById('cgSlider');
  slider.addEventListener('input', function(){
    cgPercent = parseInt(this.value);
    document.getElementById('cgVal').textContent = cgPercent + '%';
    draw();
  });

  // Buttons
  document.getElementById('btnLaunch').addEventListener('click', launchFlight);
  document.getElementById('btnReset').addEventListener('click', resetGame);

  // Idle redraw for star twinkling
  function idleLoop(){draw();requestAnimationFrame(idleLoop);}
  requestAnimationFrame(idleLoop);
})();
</script>
