<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="idea-id" content="game_1745049600000_n2lw">
<title>Newton's Second Law Cart Lab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#05060f;color:#e2e2e9;font-family:'Noto Sans SC','JetBrains Mono',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:rgba(5,6,15,0.95);border-right:1px solid rgba(91,163,217,0.2);overflow-y:auto;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(91,163,217,0.3);background:transparent;color:#5ba3d9;letter-spacing:1px;text-transform:uppercase;}
.sidebar-lang:hover{border-color:#5ba3d9;background:rgba(91,163,217,0.1);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#5ba3d9;letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;text-shadow:0 0 8px rgba(91,163,217,0.5);}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:#8e90a6;margin-top:2px;}
.sidebar-divider{height:1px;background:rgba(91,163,217,0.12);margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:rgba(91,163,217,0.6);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:#8e90a6;line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8e90a6;letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(91,163,217,0.15);height:4px;outline:none;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:#5ba3d9;cursor:pointer;box-shadow:0 0 6px rgba(91,163,217,0.6);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#5ba3d9;letter-spacing:0.15em;text-align:right;}
.push-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,#5ba3d9,#3b82c4);color:#05060f;letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px rgba(91,163,217,0.4);margin-top:6px;width:100%;}
.push-btn:hover{box-shadow:0 0 20px rgba(91,163,217,0.7);}
.push-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid rgba(91,163,217,0.25);cursor:pointer;color:#8e90a6;background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:#5ba3d9;border-color:#5ba3d9;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:rgba(5,6,15,0.9);border-bottom:1px solid rgba(91,163,217,0.12);flex-shrink:0;flex-wrap:wrap;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#5ba3d9;letter-spacing:0.15em;text-transform:uppercase;text-shadow:0 0 6px rgba(91,163,217,0.4);}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:#5e6070;text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#5ba3d9;letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%;height:100%;display:block;}
.log-bar{display:flex;align-items:center;gap:8px;padding:5px 16px;background:rgba(5,6,15,0.9);border-top:1px solid rgba(91,163,217,0.12);flex-shrink:0;overflow-x:auto;}
.log-entry{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8e90a6;white-space:nowrap;padding:2px 6px;border:1px solid rgba(91,163,217,0.1);flex-shrink:0;}
.log-entry .log-a{color:#5ba3d9;font-weight:700;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="sidebar-title" id="sideTitle">CART LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="forceSection">FORCE</div>
    <div class="slider-group">
      <label id="forceLabel"></label>
      <input type="range" id="forceSlider" min="1" max="100" value="30" step="1">
      <div class="val" id="forceVal">30 N</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="massSection">MASS</div>
    <div class="slider-group">
      <label id="massLabel"></label>
      <input type="range" id="massSlider" min="1" max="50" value="10" step="1">
      <div class="val" id="massVal">10 kg</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="push-btn" id="pushBtn"></button>
    <button class="reset-btn" id="resetBtn"></button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag"></div>
      <div class="hud-item"><div class="hud-label" id="hL1">FORCE</div><div class="hud-val" id="hV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hL2">MASS</div><div class="hud-val" id="hV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hL3">ACCEL</div><div class="hud-val" id="hV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hL4">VELOCITY</div><div class="hud-val" id="hV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hL5">TIME</div><div class="hud-val" id="hV5">--</div></div>
    </div>
    <div class="game-body" id="gameBody">
      <canvas id="cv"></canvas>
    </div>
    <div class="log-bar" id="logBar"></div>
  </div>
</div>

<script>
// ============================================================
// K20 Game: Newton's Second Law Cart Lab
// idea_id: game_1745049600000_n2lw
//
// Sliders for Force (1-100N) and Mass (1-50kg).
// Cart on a track accelerates by a = F/m after pressing PUSH.
// HUD shows real-time F, m, a, v, t.
// Finish line + timer: how fast can you reach it?
// Data log at bottom records each run.
// ============================================================

// ---------- I18N ----------
var LANG = 'cn';
var I18N = {
  sideTitle:    {cn:'CART LAB',          en:'CART LAB'},
  sideSub:      {cn:'\u63a8\u8f66\u5b9e\u9a8c\u5ba4',           en:'Push Cart Experiment'},
  guideLabel:   {cn:'GUIDE',             en:'GUIDE'},
  guide:        {cn:'\u8c03\u8282\u529b\u548c\u8d28\u91cf\u6ed1\u5757\uff0c\u6309\u201c\u63a8\uff01\u201d\u89c2\u5bdf\u5c0f\u8f66\u52a0\u901f\u8fd0\u52a8\u3002\u53cd\u590d\u5b9e\u9a8c\u53d1\u73b0\u89c4\u5f8b\uff1a\u529b\u5927\u52a0\u901f\u5feb\uff0c\u8d28\u91cf\u5927\u52a0\u901f\u6162\u3002\u8bd5\u8bd5\u8c01\u80fd\u6700\u5feb\u5230\u8fbe\u7ec8\u70b9\uff01', en:'Adjust Force and Mass sliders, press PUSH to watch the cart accelerate. Experiment to discover: bigger force = faster acceleration, bigger mass = slower acceleration. Race to the finish line!'},
  forceSection: {cn:'FORCE \u529b',      en:'FORCE'},
  forceLabel:   {cn:'\u8c03\u8282\u529b\u5927\u5c0f',           en:'Adjust force'},
  massSection:  {cn:'MASS \u8d28\u91cf',  en:'MASS'},
  massLabel:    {cn:'\u8c03\u8282\u8d28\u91cf',                 en:'Adjust mass'},
  push:         {cn:'PUSH \u63a8\uff01',  en:'PUSH!'},
  reset:        {cn:'RESET \u91cd\u7f6e', en:'RESET'},
  hudTag:       {cn:'F = m a',           en:'F = m a'},
  hL1:          {cn:'FORCE',             en:'FORCE'},
  hL2:          {cn:'MASS',              en:'MASS'},
  hL3:          {cn:'ACCEL',             en:'ACCEL'},
  hL4:          {cn:'VELOCITY',          en:'VELOCITY'},
  hL5:          {cn:'TIME',              en:'TIME'},
  finish:       {cn:'FINISH!',           en:'FINISH!'},
  finishMsg:    {cn:'\u5230\u8fbe\u7ec8\u70b9\uff01\u7528\u65f6 ',  en:'Reached finish! Time: '},
  sec:          {cn:' \u79d2',            en:' s'},
  logF:         {cn:'F',                 en:'F'},
  logM:         {cn:'m',                 en:'m'},
  logA:         {cn:'a',                 en:'a'},
  logT:         {cn:'t',                 en:'t'},
  running:      {cn:'\u8fd0\u884c\u4e2d...', en:'Running...'},
  ready:        {cn:'\u5c31\u7eea',      en:'Ready'},
  insight:      {cn:'a = F/m: \u529b\u8d8a\u5927\u52a0\u901f\u8d8a\u5feb\uff0c\u8d28\u91cf\u8d8a\u5927\u52a0\u901f\u8d8a\u6162', en:'a = F/m: Bigger force = more accel, bigger mass = less accel'},
};

function t(key) {
  return (I18N[key] && I18N[key][LANG]) || key;
}

// ---------- DOM ----------
var cv = document.getElementById('cv');
var c = cv.getContext('2d');
var forceSlider = document.getElementById('forceSlider');
var massSlider = document.getElementById('massSlider');
var forceVal = document.getElementById('forceVal');
var massVal = document.getElementById('massVal');
var pushBtn = document.getElementById('pushBtn');
var resetBtn = document.getElementById('resetBtn');
var logBar = document.getElementById('logBar');

// ---------- State ----------
var ACCENT = '#5ba3d9';
var ACCENT_DIM = 'rgba(91,163,217,0.3)';
var BG1 = '#05060f';
var BG2 = '#0d0e1a';
var TEXT = '#e2e8f0';
var DIM = '#64748b';
var MUTE = '#334155';
var GOLD = '#eab308';
var RED = '#ef4444';
var GREEN = '#22c55e';

var forceN = 30;
var massKg = 10;
var accel = 0;
var velocity = 0;
var cartPos = 0; // 0..1 normalized
var simTime = 0;
var simRunning = false;
var finishReached = false;
var finishTime = 0;
var runCount = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var cW = 800, cH = 400;
var animId = null;
var lastTs = 0;

// Finish line position (normalized)
var FINISH_POS = 0.85;

// ---------- Resize ----------
function resize() {
  var wrap = cv.parentElement;
  var rect = wrap.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  cW = rect.width;
  cH = rect.height;
  cv.width = cW * DPR;
  cv.height = cH * DPR;
  cv.style.width = cW + 'px';
  cv.style.height = cH + 'px';
  c.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

// ---------- Drawing ----------
function draw() {
  // Background
  var g = c.createLinearGradient(0, 0, 0, cH);
  g.addColorStop(0, BG1);
  g.addColorStop(1, BG2);
  c.fillStyle = g;
  c.fillRect(0, 0, cW, cH);

  // Grid
  c.strokeStyle = 'rgba(91,163,217,0.04)';
  c.lineWidth = 0.5;
  for (var gx = 0; gx < cW; gx += 60) {
    c.beginPath(); c.moveTo(gx, 0); c.lineTo(gx, cH); c.stroke();
  }
  for (var gy = 0; gy < cH; gy += 60) {
    c.beginPath(); c.moveTo(0, gy); c.lineTo(cW, gy); c.stroke();
  }

  // Scanlines
  c.strokeStyle = 'rgba(255,255,255,0.015)';
  c.lineWidth = 1;
  for (var sy = 0; sy < cH; sy += 3) {
    c.beginPath(); c.moveTo(0, sy); c.lineTo(cW, sy); c.stroke();
  }

  // Track
  var trackY = cH * 0.65;
  var trackLeft = 50;
  var trackRight = cW - 50;
  var trackW = trackRight - trackLeft;

  // Track surface
  c.fillStyle = 'rgba(91,163,217,0.06)';
  c.fillRect(trackLeft, trackY, trackW, 4);
  c.strokeStyle = ACCENT_DIM;
  c.lineWidth = 1;
  c.strokeRect(trackLeft, trackY, trackW, 4);

  // Track tick marks
  c.strokeStyle = 'rgba(91,163,217,0.15)';
  c.lineWidth = 0.5;
  for (var tx = 0; tx <= 10; tx++) {
    var tickX = trackLeft + (trackW * tx / 10);
    c.beginPath();
    c.moveTo(tickX, trackY + 4);
    c.lineTo(tickX, trackY + 12);
    c.stroke();
  }

  // Finish line
  var finishX = trackLeft + trackW * FINISH_POS;
  c.strokeStyle = finishReached ? GREEN : GOLD;
  c.lineWidth = 2;
  c.setLineDash([4, 3]);
  c.beginPath();
  c.moveTo(finishX, trackY - 60);
  c.lineTo(finishX, trackY + 15);
  c.stroke();
  c.setLineDash([]);

  // Finish label
  c.fillStyle = finishReached ? GREEN : GOLD;
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.textAlign = 'center';
  c.fillText(t('finish'), finishX, trackY - 65);

  // Cart
  var cartW = 60 + massKg * 1.2; // heavier = wider cart
  var cartH = 30 + massKg * 0.4;
  var cartX = trackLeft + trackW * cartPos;
  var cartY = trackY - cartH;

  // Cart body
  c.fillStyle = ACCENT;
  c.globalAlpha = 0.85;
  c.fillRect(cartX, cartY, cartW, cartH);
  c.globalAlpha = 1;
  c.strokeStyle = ACCENT;
  c.lineWidth = 1.5;
  c.strokeRect(cartX, cartY, cartW, cartH);

  // Mass label on cart
  c.fillStyle = BG1;
  c.font = "bold 11px 'JetBrains Mono',monospace";
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(massKg + ' kg', cartX + cartW / 2, cartY + cartH / 2);

  // Wheels
  var wheelR = 6;
  c.fillStyle = DIM;
  c.strokeStyle = ACCENT;
  c.lineWidth = 1;
  c.beginPath();
  c.arc(cartX + cartW * 0.25, trackY + 2, wheelR, 0, Math.PI * 2);
  c.fill(); c.stroke();
  c.beginPath();
  c.arc(cartX + cartW * 0.75, trackY + 2, wheelR, 0, Math.PI * 2);
  c.fill(); c.stroke();

  // Force arrow (only when running or before push)
  if (simRunning || !finishReached) {
    var arrowLen = forceN * 1.5;
    if (arrowLen > 180) arrowLen = 180;
    var arrY = cartY + cartH / 2;
    var arrX1 = cartX - 8;
    var arrX2 = arrX1 - arrowLen;

    // Arrow shaft
    c.strokeStyle = ACCENT;
    c.lineWidth = 2 + forceN / 30;
    c.beginPath();
    c.moveTo(arrX2, arrY);
    c.lineTo(arrX1, arrY);
    c.stroke();

    // Arrow head
    var headSize = 6 + forceN / 20;
    c.fillStyle = ACCENT;
    c.beginPath();
    c.moveTo(arrX1, arrY);
    c.lineTo(arrX1 - headSize, arrY - headSize * 0.6);
    c.lineTo(arrX1 - headSize, arrY + headSize * 0.6);
    c.closePath();
    c.fill();

    // Force label above arrow
    c.fillStyle = ACCENT;
    c.font = "bold 12px 'JetBrains Mono',monospace";
    c.textAlign = 'center';
    c.textBaseline = 'bottom';
    c.fillText('F = ' + forceN + ' N', (arrX1 + arrX2) / 2, arrY - 10);
  }

  // Acceleration arrow (when running)
  if (simRunning && accel > 0) {
    var accelArrowLen = accel * 8;
    if (accelArrowLen > 120) accelArrowLen = 120;
    var aaY = cartY - 15;
    var aaX1 = cartX + cartW / 2;
    var aaX2 = aaX1 + accelArrowLen;

    c.strokeStyle = GREEN;
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(aaX1, aaY);
    c.lineTo(aaX2, aaY);
    c.stroke();

    c.fillStyle = GREEN;
    c.beginPath();
    c.moveTo(aaX2, aaY);
    c.lineTo(aaX2 - 5, aaY - 4);
    c.lineTo(aaX2 - 5, aaY + 4);
    c.closePath();
    c.fill();

    c.font = "bold 10px 'JetBrains Mono',monospace";
    c.textAlign = 'center';
    c.fillText('a = ' + accel.toFixed(1) + ' m/s\u00b2', (aaX1 + aaX2) / 2, aaY - 8);
  }

  // Velocity trail dots
  if (velocity > 0) {
    var dotCount = Math.min(Math.floor(velocity / 2), 8);
    for (var di = 0; di < dotCount; di++) {
      var dotX = cartX - 15 - di * 12;
      if (dotX < trackLeft) break;
      c.fillStyle = 'rgba(91,163,217,' + (0.4 - di * 0.04) + ')';
      c.beginPath();
      c.arc(dotX, cartY + cartH / 2, 2, 0, Math.PI * 2);
      c.fill();
    }
  }

  // Finish message
  if (finishReached) {
    c.fillStyle = GREEN;
    c.font = "bold 16px 'JetBrains Mono',monospace";
    c.textAlign = 'center';
    c.shadowColor = GREEN;
    c.shadowBlur = 12;
    c.fillText(t('finishMsg') + finishTime.toFixed(2) + t('sec'), cW / 2, cH * 0.25);
    c.shadowBlur = 0;

    // Insight text
    c.fillStyle = DIM;
    c.font = "12px 'Noto Sans SC',sans-serif";
    c.fillText(t('insight'), cW / 2, cH * 0.32);
  }

  // Running indicator
  if (simRunning) {
    c.fillStyle = GREEN;
    c.font = "10px 'JetBrains Mono',monospace";
    c.textAlign = 'left';
    c.fillText(t('running'), trackLeft, trackY + 30);
  }

  c.textBaseline = 'alphabetic';
}

// ---------- Simulation ----------
function startSim() {
  if (simRunning || finishReached) return;
  forceN = parseInt(forceSlider.value);
  massKg = parseInt(massSlider.value);
  accel = forceN / massKg;
  velocity = 0;
  cartPos = 0;
  simTime = 0;
  simRunning = true;
  finishReached = false;
  pushBtn.disabled = true;
  lastTs = performance.now();
  runCount++;
  updateHUD();
  animate();
}

function animate() {
  if (!simRunning) return;
  var now = performance.now();
  var dt = (now - lastTs) / 1000;
  lastTs = now;

  // Cap dt to avoid huge jumps
  if (dt > 0.05) dt = 0.05;

  // Physics: constant acceleration
  simTime += dt;
  velocity += accel * dt;

  // Scale: 1 normalized unit = ~10 meters conceptually
  // cartPos moves from 0 to 1 across the track
  cartPos += (velocity * dt) / 80; // scale factor for visual

  // Check finish
  if (cartPos >= FINISH_POS) {
    cartPos = FINISH_POS;
    finishReached = true;
    finishTime = simTime;
    simRunning = false;
    pushBtn.disabled = false;
    addLogEntry();
    updateHUD();
    draw();
    return;
  }

  updateHUD();
  draw();
  animId = requestAnimationFrame(animate);
}

function resetSim() {
  simRunning = false;
  finishReached = false;
  if (animId) cancelAnimationFrame(animId);
  cartPos = 0;
  velocity = 0;
  accel = 0;
  simTime = 0;
  pushBtn.disabled = false;
  updateHUD();
  draw();
}

// ---------- HUD ----------
function updateHUD() {
  document.getElementById('hV1').textContent = forceN + ' N';
  document.getElementById('hV2').textContent = massKg + ' kg';
  document.getElementById('hV3').textContent = accel > 0 ? accel.toFixed(2) + ' m/s\u00b2' : '--';
  document.getElementById('hV4').textContent = velocity > 0 ? velocity.toFixed(1) + ' m/s' : '--';
  document.getElementById('hV5').textContent = simTime > 0 ? simTime.toFixed(1) + ' s' : '--';
}

// ---------- Log ----------
function addLogEntry() {
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = '#' + runCount + ' ' +
    t('logF') + '=' + forceN + 'N ' +
    t('logM') + '=' + massKg + 'kg ' +
    '<span class="log-a">' + t('logA') + '=' + accel.toFixed(1) + '</span> ' +
    t('logT') + '=' + finishTime.toFixed(2) + 's';
  logBar.insertBefore(entry, logBar.firstChild);
  // Keep max 10 entries
  while (logBar.children.length > 10) {
    logBar.removeChild(logBar.lastChild);
  }
}

// ---------- UI setup ----------
function refreshUI() {
  document.getElementById('sideTitle').textContent = t('sideTitle');
  document.getElementById('sideSub').textContent = t('sideSub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('forceSection').textContent = t('forceSection');
  document.getElementById('forceLabel').textContent = t('forceLabel');
  document.getElementById('massSection').textContent = t('massSection');
  document.getElementById('massLabel').textContent = t('massLabel');
  pushBtn.textContent = t('push');
  resetBtn.textContent = t('reset');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hL1').textContent = t('hL1');
  document.getElementById('hL2').textContent = t('hL2');
  document.getElementById('hL3').textContent = t('hL3');
  document.getElementById('hL4').textContent = t('hL4');
  document.getElementById('hL5').textContent = t('hL5');
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  draw();
}

// Slider events
forceSlider.addEventListener('input', function() {
  forceN = parseInt(this.value);
  forceVal.textContent = forceN + ' N';
  if (!simRunning) draw();
});
massSlider.addEventListener('input', function() {
  massKg = parseInt(this.value);
  massVal.textContent = massKg + ' kg';
  if (!simRunning) draw();
});

// Buttons
pushBtn.addEventListener('click', startSim);
resetBtn.addEventListener('click', resetSim);

// Lang toggle
document.getElementById('langBtn').addEventListener('click', function() {
  LANG = LANG === 'cn' ? 'en' : 'cn';
  refreshUI();
});

// Init
refreshUI();
setTimeout(resize, 100);
setTimeout(resize, 400);
document.fonts.ready.then(resize);
</script>
</body>
</html>
