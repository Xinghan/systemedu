<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">FORCE DETECTIVE</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="levelLabel">LEVEL</div>
    <div class="sidebar-guide" id="levelText" style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--sb-accent,var(--primary));"></div>
    <button class="action-btn" id="btnConfirm">CONFIRM</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">FORCE DETECTIVE</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">LEVEL</div><div class="hud-val" id="hudV1">1/5</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">SCORE</div><div class="hud-val" id="hudV2">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">STATUS</div><div class="hud-val" id="hudV3">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">DRAG TO ROTATE ARROW</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316'; // mech orange

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,mc.accent.replace(/[\d.]+\)$/,'0.06)'));rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#c2410c');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'FORCE DETECTIVE', cn:'\u529b\u573a\u5927\u4fa6\u63a2'},
  subtitle:    {en:'Find the direction of force!', cn:'\u627e\u51fa\u529b\u7684\u65b9\u5411\uff01'},
  guide:       {en:'GUIDE', cn:'\u73a9\u6cd5\u6307\u5357'},
  g1:          {en:'Look at the scene: what is pushing or pulling?', cn:'\u89c2\u5bdf\u573a\u666f\uff1a\u4ec0\u4e48\u5728\u63a8\u6216\u62c9\uff1f'},
  g2:          {en:'Drag on the canvas to rotate the arrow', cn:'\u5728\u753b\u9762\u4e0a\u62d6\u52a8\u65cb\u8f6c\u7bad\u5934'},
  g3:          {en:'Point the arrow where the force goes', cn:'\u8ba9\u7bad\u5934\u6307\u5411\u529b\u7684\u65b9\u5411'},
  g4:          {en:'Click CONFIRM to check', cn:'\u70b9\u51fb\u786e\u8ba4\u68c0\u67e5\u7b54\u6848'},
  confirm:     {en:'CONFIRM', cn:'\u786e\u8ba4'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  replay:      {en:'PLAY AGAIN', cn:'\u518d\u73a9\u4e00\u6b21'},
  level:       {en:'LEVEL', cn:'\u5173\u5361'},
  score:       {en:'SCORE', cn:'\u5f97\u5206'},
  status:      {en:'STATUS', cn:'\u72b6\u6001'},
  ready:       {en:'READY', cn:'\u5c31\u7eea'},
  correct:     {en:'CORRECT!', cn:'\u6b63\u786e\uff01'},
  wrong:       {en:'Try again...', cn:'\u518d\u8bd5\u8bd5\u2026\u2026'},
  dragHint:    {en:'Drag to rotate the arrow', cn:'\u62d6\u52a8\u65cb\u8f6c\u7bad\u5934'},
  complete:    {en:'ALL DONE!', cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  completeMsg: {en:'You found all the force directions!', cn:'\u4f60\u627e\u5230\u4e86\u6240\u6709\u529b\u7684\u65b9\u5411\uff01'},
  summary:     {en:'What you learned:', cn:'\u4f60\u5b66\u5230\u4e86\uff1a'},
  s1:          {en:'Springs push things away', cn:'\u5f39\u7c27\u628a\u7269\u4f53\u63a8\u5f00'},
  s2:          {en:'Magnets pull metal closer', cn:'\u78c1\u94c1\u628a\u91d1\u5c5e\u62c9\u8fc7\u6765'},
  s3:          {en:'Wind pushes in its direction', cn:'\u98ce\u628a\u7269\u4f53\u5439\u5411\u98ce\u7684\u65b9\u5411'},
  s4:          {en:'Gravity pulls everything down', cn:'\u91cd\u529b\u628a\u4e1c\u897f\u62c9\u5411\u4e0b\u65b9'},
  s5:          {en:'Rockets push upward', cn:'\u706b\u7bad\u5411\u4e0a\u63a8'},
};

function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

// ================================================================
// SCENE DEFINITIONS
// ================================================================
var SCENES = [
  // Level 1: Spring pushes ball right
  {
    label: {en:'Spring Push', cn:'\u5f39\u7c27\u63a8\u7403'},
    hint:  {en:'The spring pushes the ball. Where does the force go?', cn:'\u5f39\u7c27\u628a\u7403\u63a8\u51fa\u53bb\u3002\u529b\u671d\u54ea\u8fb9\uff1f'},
    correctAngle: 0,
    tolerance: 35,
    arrowCenter: {x: 0.58, y: 0.48},
    draw: function(c, W, H, time, mc) {
      var groundY = H * 0.78;
      // Ground
      c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
      c.beginPath(); c.moveTo(20, groundY); c.lineTo(W - 20, groundY); c.stroke();
      c.globalAlpha = 0.3;
      for (var hx = 30; hx < W - 20; hx += 18) { c.beginPath(); c.moveTo(hx, groundY+2); c.lineTo(hx-4, groundY+10); c.stroke(); }
      c.globalAlpha = 1;
      // Wall
      c.fillStyle = mc.dim; c.globalAlpha = 0.3;
      c.fillRect(W*0.13-10, groundY*0.3, 10, groundY*0.7);
      c.globalAlpha = 0.12; c.strokeStyle = mc.strokeDim; c.lineWidth=1;
      for (var wy = groundY*0.3; wy < groundY; wy += 7) { c.beginPath(); c.moveTo(W*0.13-10, wy); c.lineTo(W*0.13-2, wy+5); c.stroke(); }
      c.globalAlpha = 1;
      // Spring (animated pulsing)
      var springX = W * 0.13;
      var springLen = W * 0.18 + Math.sin(time * 5) * W * 0.015;
      var ballR = Math.min(W, H) * 0.065;
      var ballX = springX + springLen + ballR + 5;
      var ballY = groundY - ballR;
      c.save(); c.strokeStyle = mc.accent; c.lineWidth = 3;
      c.lineCap = 'round'; c.lineJoin = 'round';
      c.beginPath(); c.moveTo(springX, ballY);
      var seg = springLen / 16;
      for (var si = 0; si < 16; si++) { c.lineTo(springX + (si+1)*seg, ballY + (si%2===0 ? -10 : 10)); }
      c.lineTo(springX + springLen, ballY); c.stroke(); c.restore();
      // Ball
      c.save();
      c.shadowColor = 'rgba(0,0,0,0.3)'; c.shadowBlur = ballR*0.4;
      var bg = c.createRadialGradient(ballX-ballR*0.3, ballY-ballR*0.35, ballR*0.08, ballX, ballY, ballR);
      bg.addColorStop(0, '#ffcc80'); bg.addColorStop(0.55, '#f97316'); bg.addColorStop(1, '#1a1a28');
      c.fillStyle = bg; c.beginPath(); c.arc(ballX, ballY, ballR, 0, Math.PI*2); c.fill();
      c.restore();
      c.save(); c.globalAlpha=0.5; c.fillStyle='#fff';
      c.beginPath(); c.arc(ballX-ballR*0.25, ballY-ballR*0.3, ballR*0.13, 0, Math.PI*2); c.fill();
      c.restore();
      // Labels
      c.font = "bold 11px 'JetBrains Mono',monospace";
      c.fillStyle = mc.dim; c.textAlign = 'center';
      c.fillText(LANG==='cn' ? '\u5f39\u7c27' : 'Spring', springX+springLen*0.5, groundY+18);
      c.fillText(LANG==='cn' ? '\u7403' : 'Ball', ballX, groundY+18);
      // Motion lines
      c.save(); c.strokeStyle = mc.strokeDim; c.lineWidth = 1.5;
      for (var mi=0; mi<3; mi++) {
        var mOff = ((time*50 + mi*12) % 30);
        c.globalAlpha = (1 - mOff/30) * 0.3;
        c.beginPath(); c.moveTo(ballX+ballR+6+mOff, ballY-5+mi*5);
        c.lineTo(ballX+ballR+18+mOff, ballY-5+mi*5); c.stroke();
      }
      c.restore();
    }
  },
  // Level 2: Magnet pulls metal ball left
  {
    label: {en:'Magnet Pull', cn:'\u78c1\u94c1\u5438\u5f15'},
    hint:  {en:'The magnet attracts the metal ball. Which way is the force?', cn:'\u78c1\u94c1\u5438\u5f15\u91d1\u5c5e\u7403\u3002\u529b\u671d\u54ea\u8fb9\uff1f'},
    correctAngle: 180,
    tolerance: 35,
    arrowCenter: {x: 0.60, y: 0.48},
    draw: function(c, W, H, time, mc) {
      var groundY = H * 0.78;
      c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
      c.beginPath(); c.moveTo(20, groundY); c.lineTo(W-20, groundY); c.stroke();
      // Table
      var tableY = H * 0.55;
      c.fillStyle = mc.dim; c.globalAlpha = 0.2;
      c.fillRect(W*0.1, tableY, W*0.8, 8);
      c.globalAlpha = 1;
      c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
      c.beginPath(); c.moveTo(W*0.1, tableY); c.lineTo(W*0.9, tableY); c.stroke();
      // Magnet (horseshoe shape)
      var magX = W*0.25, magY = tableY - 24;
      c.save(); c.translate(magX, magY);
      var mw = 28, mh = 50, armW = 10;
      // Top arm (N - red)
      c.fillStyle = '#cc2222';
      c.fillRect(-mw/2, -mh/2, mw, armW);
      // Bottom arm (S - blue)
      c.fillStyle = '#2244cc';
      c.fillRect(-mw/2, mh/2-armW, mw, armW);
      // Back
      var cg = c.createLinearGradient(-mw/2,-mh/2,-mw/2,mh/2);
      cg.addColorStop(0,'#cc2222'); cg.addColorStop(0.5,'#888'); cg.addColorStop(1,'#2244cc');
      c.fillStyle = cg; c.fillRect(-mw/2, -mh/2, armW, mh);
      c.font = "bold 9px 'JetBrains Mono',monospace"; c.textAlign='center'; c.fillStyle='#fff';
      c.fillText('N', mw/2-armW*0.5, -mh/2+armW*0.7);
      c.fillText('S', mw/2-armW*0.5, mh/2-armW*0.3);
      c.restore();
      // Metal ball
      var ballR = Math.min(W,H)*0.05;
      var drift = Math.sin(time*2)*3;
      var ballX = W*0.62 - drift, ballY = tableY - ballR;
      c.save(); c.shadowColor='rgba(0,0,0,0.25)'; c.shadowBlur=ballR*0.3;
      var bg2 = c.createRadialGradient(ballX-ballR*0.25,ballY-ballR*0.3,ballR*0.05,ballX,ballY,ballR);
      bg2.addColorStop(0,'#eef4ff'); bg2.addColorStop(0.5,'#aabbcc'); bg2.addColorStop(1,'#1a1a28');
      c.fillStyle=bg2; c.beginPath(); c.arc(ballX,ballY,ballR,0,Math.PI*2); c.fill(); c.restore();
      // Magnetic field lines
      c.save(); c.strokeStyle = mc.accent; c.lineWidth = 0.8; c.globalAlpha = 0.25;
      for (var fi=0; fi<4; fi++) {
        var fy = magY - 15 + fi*10;
        c.beginPath();
        c.moveTo(magX+mw/2, fy);
        c.quadraticCurveTo((magX+ballX)/2, fy - 8 + fi*4, ballX - ballR, ballY);
        c.stroke();
      }
      c.restore();
      // Labels
      c.font = "bold 11px 'JetBrains Mono',monospace"; c.fillStyle = mc.dim; c.textAlign='center';
      c.fillText(LANG==='cn' ? '\u78c1\u94c1' : 'Magnet', magX, groundY+18);
      c.fillText(LANG==='cn' ? '\u91d1\u5c5e\u7403' : 'Metal ball', ballX, groundY+18);
    }
  },
  // Level 3: Fan blows leaf right
  {
    label: {en:'Wind Blow', cn:'\u98ce\u5439\u53f6\u5b50'},
    hint:  {en:'The fan blows the leaf. Which direction does the wind push?', cn:'\u98ce\u6247\u5439\u53f6\u5b50\u3002\u98ce\u628a\u53f6\u5b50\u5439\u5411\u54ea\u8fb9\uff1f'},
    correctAngle: 0,
    tolerance: 35,
    arrowCenter: {x: 0.58, y: 0.50},
    draw: function(c, W, H, time, mc) {
      var groundY = H * 0.78;
      c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
      c.beginPath(); c.moveTo(20, groundY); c.lineTo(W-20, groundY); c.stroke();
      // Fan
      var fanX = W*0.2, fanY = H*0.45, fanR = Math.min(W,H)*0.1;
      // Housing
      c.strokeStyle = mc.dim; c.lineWidth = 3;
      c.beginPath(); c.arc(fanX, fanY, fanR, 0, Math.PI*2); c.stroke();
      c.fillStyle = mc.bg1 || '#05060f'; c.globalAlpha = 0.7;
      c.beginPath(); c.arc(fanX, fanY, fanR, 0, Math.PI*2); c.fill(); c.globalAlpha = 1;
      // Blades (spinning)
      c.save(); c.translate(fanX, fanY); c.rotate(time * 6);
      for (var b=0; b<5; b++) {
        c.save(); c.rotate(b * Math.PI*2/5);
        c.fillStyle = mc.dim;
        c.beginPath(); c.moveTo(4,-3); c.lineTo(fanR*0.8,-fanR*0.15);
        c.lineTo(fanR*0.8,fanR*0.08); c.lineTo(4,3); c.closePath(); c.fill();
        c.restore();
      }
      c.fillStyle = mc.accent;
      c.beginPath(); c.arc(0,0,fanR*0.15,0,Math.PI*2); c.fill();
      c.restore();
      // Wind lines
      c.save(); c.strokeStyle = mc.accent; c.lineWidth = 1.5;
      for (var wi=0; wi<5; wi++) {
        var wx = fanX + fanR + 15 + ((time*80 + wi*25) % (W*0.4));
        var wy = fanY - 20 + wi * 10;
        var wAlpha = 1 - ((time*80+wi*25) % (W*0.4)) / (W*0.4);
        c.globalAlpha = wAlpha * 0.35;
        c.beginPath(); c.moveTo(wx, wy); c.lineTo(wx+20, wy); c.stroke();
      }
      c.restore();
      // Leaf
      var leafX = W*0.6 + Math.sin(time*3)*8;
      var leafY = H*0.48 + Math.cos(time*2)*5;
      c.save(); c.translate(leafX, leafY); c.rotate(Math.sin(time*2)*0.15);
      c.fillStyle = '#4ade80';
      c.beginPath(); c.moveTo(0, -12); c.quadraticCurveTo(14, -6, 0, 12);
      c.quadraticCurveTo(-14, -6, 0, -12); c.fill();
      c.strokeStyle = '#22c55e'; c.lineWidth = 1;
      c.beginPath(); c.moveTo(0, -10); c.lineTo(0, 10); c.stroke();
      c.restore();
      // Labels
      c.font = "bold 11px 'JetBrains Mono',monospace"; c.fillStyle = mc.dim; c.textAlign='center';
      c.fillText(LANG==='cn' ? '\u98ce\u6247' : 'Fan', fanX, groundY+18);
      c.fillText(LANG==='cn' ? '\u53f6\u5b50' : 'Leaf', leafX, groundY+18);
    }
  },
  // Level 4: Gravity pulls ball down
  {
    label: {en:'Gravity Drop', cn:'\u91cd\u529b\u4e0b\u843d'},
    hint:  {en:'The ball is falling. Which direction does gravity pull?', cn:'\u7403\u5728\u4e0b\u843d\u3002\u91cd\u529b\u62c9\u5411\u54ea\u8fb9\uff1f'},
    correctAngle: 90,
    tolerance: 35,
    arrowCenter: {x: 0.45, y: 0.38},
    draw: function(c, W, H, time, mc) {
      var groundY = H * 0.82;
      c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
      c.beginPath(); c.moveTo(20, groundY); c.lineTo(W-20, groundY); c.stroke();
      // Table edge at top
      var tableY = H * 0.22;
      c.fillStyle = mc.dim; c.globalAlpha = 0.2;
      c.fillRect(W*0.05, tableY, W*0.35, 6); c.globalAlpha = 1;
      c.strokeStyle = mc.strokeDim; c.lineWidth=1;
      c.beginPath(); c.moveTo(W*0.05, tableY); c.lineTo(W*0.4, tableY); c.stroke();
      // Ball falling (animated bounce position)
      var ballR = Math.min(W, H) * 0.055;
      var fallT = (time * 0.6) % 2;
      var ballFallY;
      if (fallT < 1) { ballFallY = tableY + ballR + (groundY - tableY - ballR*2) * fallT * fallT; }
      else { var bt = fallT - 1; ballFallY = groundY - ballR - (groundY - tableY - ballR*2) * 0.3 * Math.sin(bt * Math.PI); }
      var ballX = W * 0.42;
      c.save(); c.shadowColor='rgba(0,0,0,0.3)'; c.shadowBlur=ballR*0.4;
      var bg3 = c.createRadialGradient(ballX-ballR*0.3,ballFallY-ballR*0.35,ballR*0.08,ballX,ballFallY,ballR);
      bg3.addColorStop(0,'#ffcc80'); bg3.addColorStop(0.55,'#f97316'); bg3.addColorStop(1,'#1a1a28');
      c.fillStyle=bg3; c.beginPath(); c.arc(ballX,ballFallY,ballR,0,Math.PI*2); c.fill(); c.restore();
      // Dashed trail
      c.save(); c.strokeStyle = mc.strokeDim; c.lineWidth = 1; c.setLineDash([4,4]); c.globalAlpha = 0.3;
      c.beginPath(); c.moveTo(ballX, tableY+ballR); c.lineTo(ballX, ballFallY-ballR); c.stroke();
      c.setLineDash([]); c.restore();
      // "g" label
      c.font = "bold 14px 'JetBrains Mono',monospace"; c.fillStyle = mc.accent; c.textAlign='center';
      c.fillText('g', W*0.55, H*0.55);
      // downward arrow for gravity indicator
      c.save(); c.strokeStyle = mc.accent; c.lineWidth = 1.5; c.globalAlpha = 0.4;
      c.beginPath(); c.moveTo(W*0.55, H*0.58); c.lineTo(W*0.55, H*0.68); c.stroke();
      c.beginPath(); c.moveTo(W*0.55, H*0.68); c.lineTo(W*0.55-5, H*0.68-6); c.stroke();
      c.beginPath(); c.moveTo(W*0.55, H*0.68); c.lineTo(W*0.55+5, H*0.68-6); c.stroke();
      c.restore();
      // Labels
      c.font = "bold 11px 'JetBrains Mono',monospace"; c.fillStyle = mc.dim; c.textAlign='center';
      c.fillText(LANG==='cn' ? '\u684c\u5b50' : 'Table', W*0.2, tableY-10);
      c.fillText(LANG==='cn' ? '\u7403' : 'Ball', ballX, groundY+18);
      c.fillText(LANG==='cn' ? '\u5730\u9762' : 'Ground', W*0.5, groundY+18);
    }
  },
  // Level 5: Rocket thrust pushes up
  {
    label: {en:'Rocket Launch', cn:'\u706b\u7bad\u53d1\u5c04'},
    hint:  {en:'The rocket launches upward. Which direction is the thrust?', cn:'\u706b\u7bad\u5411\u4e0a\u53d1\u5c04\u3002\u63a8\u529b\u671d\u54ea\u4e2a\u65b9\u5411\uff1f'},
    correctAngle: 270,
    tolerance: 35,
    arrowCenter: {x: 0.45, y: 0.35},
    draw: function(c, W, H, time, mc) {
      var groundY = H * 0.85;
      c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
      c.beginPath(); c.moveTo(20, groundY); c.lineTo(W-20, groundY); c.stroke();
      // Launch pad
      c.fillStyle = mc.dim; c.globalAlpha = 0.3;
      c.fillRect(W*0.35, groundY-4, W*0.15, 4); c.globalAlpha = 1;
      // Rocket
      var rocketX = W * 0.425;
      var rocketY = H * 0.45 - Math.sin(time * 4) * 3;
      var rSize = Math.min(W, H) * 0.22;
      var rw = rSize * 0.3, rh = rSize;
      // Body
      var bodyGrad = c.createLinearGradient(rocketX-rw/2, rocketY, rocketX+rw/2, rocketY);
      bodyGrad.addColorStop(0,'#aab'); bodyGrad.addColorStop(0.3,'#dde');
      bodyGrad.addColorStop(0.7,'#ccd'); bodyGrad.addColorStop(1,'#889');
      c.fillStyle = bodyGrad;
      c.beginPath();
      c.moveTo(rocketX, rocketY - rh*0.5);
      c.quadraticCurveTo(rocketX + rw*0.6, rocketY - rh*0.3, rocketX + rw/2, rocketY + rh*0.2);
      c.lineTo(rocketX + rw/2, rocketY + rh*0.4);
      c.lineTo(rocketX - rw/2, rocketY + rh*0.4);
      c.lineTo(rocketX - rw/2, rocketY + rh*0.2);
      c.quadraticCurveTo(rocketX - rw*0.6, rocketY - rh*0.3, rocketX, rocketY - rh*0.5);
      c.closePath(); c.fill();
      // Window
      c.save(); c.shadowColor='rgba(34,211,238,0.5)'; c.shadowBlur=8;
      c.fillStyle = '#22d3ee';
      c.beginPath(); c.arc(rocketX, rocketY - rh*0.15, rw*0.22, 0, Math.PI*2); c.fill(); c.restore();
      // Fins
      c.fillStyle = '#cc2222';
      c.beginPath(); c.moveTo(rocketX-rw/2, rocketY+rh*0.25); c.lineTo(rocketX-rw*0.85, rocketY+rh*0.45);
      c.lineTo(rocketX-rw/2, rocketY+rh*0.4); c.closePath(); c.fill();
      c.beginPath(); c.moveTo(rocketX+rw/2, rocketY+rh*0.25); c.lineTo(rocketX+rw*0.85, rocketY+rh*0.45);
      c.lineTo(rocketX+rw/2, rocketY+rh*0.4); c.closePath(); c.fill();
      // Flame
      var fh = rh*0.25*(0.7+0.3*Math.sin(time*15));
      var fw = rw*0.6;
      var fg = c.createLinearGradient(rocketX, rocketY+rh*0.4, rocketX, rocketY+rh*0.4+fh);
      fg.addColorStop(0,'#ffcc00'); fg.addColorStop(0.4,'#ff6600'); fg.addColorStop(1,'rgba(255,0,0,0)');
      c.fillStyle = fg; c.beginPath();
      c.moveTo(rocketX-fw/2, rocketY+rh*0.4);
      c.quadraticCurveTo(rocketX, rocketY+rh*0.4+fh*1.2, rocketX+fw/2, rocketY+rh*0.4);
      c.closePath(); c.fill();
      // Labels
      c.font = "bold 11px 'JetBrains Mono',monospace"; c.fillStyle = mc.dim; c.textAlign='center';
      c.fillText(LANG==='cn' ? '\u706b\u7bad' : 'Rocket', rocketX, groundY+18);
      c.fillText(LANG==='cn' ? '\u53d1\u5c04\u53f0' : 'Launch pad', W*0.425, groundY+32);
    }
  },
];

// ================================================================
// GAME STATE
// ================================================================
var canvas, cctx;
var currentLevel = 0;
var totalScore = 0;
var playerAngle = 0; // degrees, 0=right, 90=down, 180=left, 270=up
var dragging = false;
var answered = false;
var lastCorrect = false;
var feedbackTimer = 0;
var gameComplete = false;
var animTime = 0;
var levelResults = []; // true/false per level

// ================================================================
// CANVAS SETUP
// ================================================================
function initCanvas() {
  canvas = document.getElementById('gc');
  cctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  var parent = canvas.parentElement;
  var rect = parent.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

// ================================================================
// DRAWING
// ================================================================
function draw() {
  if (!canvas) return;
  var rect = canvas.parentElement.getBoundingClientRect();
  var W = rect.width, H = rect.height;
  if (W < 1 || H < 1) return;

  var mc = gameModeColors();

  // Background
  drawGameBg(cctx, W, H);

  if (gameComplete) {
    drawCompletionScreen(cctx, W, H, mc);
    return;
  }

  var scene = SCENES[currentLevel];
  if (!scene) return;

  // Draw scene
  cctx.save();
  scene.draw(cctx, W, H, animTime, mc);
  cctx.restore();

  // Scene label
  cctx.save();
  cctx.font = "bold 13px 'JetBrains Mono',monospace";
  cctx.fillStyle = mc.accent; cctx.textAlign = 'left';
  if (mc.glow) { cctx.shadowColor = mc.accent; cctx.shadowBlur = 10; }
  var levelTxt = (LANG==='cn' ? '\u5173\u5361' : 'LEVEL') + ' ' + (currentLevel+1) + '/5';
  cctx.fillText(levelTxt, 16, 24);
  cctx.restore();

  // Hint text at bottom
  cctx.save();
  cctx.font = "12px 'Noto Sans SC','Inter',sans-serif";
  cctx.fillStyle = mc.dim; cctx.textAlign = 'center';
  var hintText = scene.hint[LANG] || scene.hint.en;
  cctx.fillText(hintText, W/2, H - 16);
  cctx.restore();

  // Player arrow
  if (!answered || feedbackTimer > 0) {
    var arrowCx = W * scene.arrowCenter.x;
    var arrowCy = H * scene.arrowCenter.y;
    var arrowLen = Math.min(W, H) * 0.12;
    var rad = playerAngle * Math.PI / 180;
    var ax2 = arrowCx + Math.cos(rad) * arrowLen;
    var ay2 = arrowCy + Math.sin(rad) * arrowLen;

    // Arrow shaft
    cctx.save();
    if (mc.glow) { cctx.shadowColor = mc.accent; cctx.shadowBlur = 14; }
    cctx.strokeStyle = mc.accent; cctx.lineWidth = 4;
    cctx.beginPath(); cctx.moveTo(arrowCx, arrowCy); cctx.lineTo(ax2, ay2); cctx.stroke();
    // Arrow head
    var headSize = 12;
    cctx.fillStyle = mc.accent;
    cctx.beginPath();
    cctx.moveTo(ax2, ay2);
    cctx.lineTo(ax2 - headSize * Math.cos(rad - 0.4), ay2 - headSize * Math.sin(rad - 0.4));
    cctx.lineTo(ax2 - headSize * Math.cos(rad + 0.4), ay2 - headSize * Math.sin(rad + 0.4));
    cctx.closePath(); cctx.fill();
    // Center dot
    cctx.fillStyle = mc.text;
    cctx.beginPath(); cctx.arc(arrowCx, arrowCy, 5, 0, Math.PI*2); cctx.fill();
    cctx.restore();

    // Angle display
    cctx.save();
    cctx.font = "bold 12px 'JetBrains Mono',monospace";
    cctx.fillStyle = mc.accent; cctx.textAlign = 'right';
    cctx.fillText(Math.round(playerAngle) + '\u00b0', W - 16, 24);
    cctx.restore();
  }

  // Feedback overlay
  if (feedbackTimer > 0) {
    cctx.save();
    cctx.globalAlpha = Math.min(feedbackTimer / 0.3, 1) * 0.85;
    cctx.font = "bold 32px 'Space Grotesk','Inter',sans-serif";
    cctx.textAlign = 'center'; cctx.textBaseline = 'middle';
    if (lastCorrect) {
      cctx.fillStyle = '#22c55e';
      if (mc.glow) { cctx.shadowColor = '#22c55e'; cctx.shadowBlur = 20; }
      cctx.fillText(t('correct'), W/2, H/2);
    } else {
      cctx.fillStyle = '#ef4444';
      if (mc.glow) { cctx.shadowColor = '#ef4444'; cctx.shadowBlur = 20; }
      cctx.fillText(t('wrong'), W/2, H/2);
    }
    cctx.restore();
  }
}

function drawCompletionScreen(c, W, H, mc) {
  // Title
  c.save();
  c.font = "bold 28px 'Space Grotesk','Inter',sans-serif";
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = mc.accent;
  if (mc.glow) { c.shadowColor = mc.accent; c.shadowBlur = 20; }
  c.fillText(t('complete'), W/2, H*0.15);
  c.restore();

  // Score
  c.font = "bold 48px 'JetBrains Mono',monospace";
  c.textAlign = 'center'; c.fillStyle = mc.accent;
  c.fillText(totalScore + '/5', W/2, H*0.28);

  // Message
  c.font = "14px 'Noto Sans SC','Inter',sans-serif";
  c.fillStyle = mc.text; c.textAlign = 'center';
  c.fillText(t('completeMsg'), W/2, H*0.38);

  // Level dots
  var dotY = H*0.45;
  var dotSpacing = 30;
  var dotStartX = W/2 - (4 * dotSpacing) / 2;
  for (var di=0; di<5; di++) {
    var dx = dotStartX + di * dotSpacing;
    c.beginPath(); c.arc(dx, dotY, 6, 0, Math.PI*2);
    if (levelResults[di]) { c.fillStyle = '#22c55e'; }
    else { c.fillStyle = '#ef4444'; }
    c.fill();
    c.strokeStyle = mc.strokeDim; c.lineWidth = 1; c.stroke();
  }

  // Summary
  c.font = "bold 12px 'JetBrains Mono',monospace";
  c.fillStyle = mc.accent; c.textAlign = 'center';
  c.fillText(t('summary'), W/2, H*0.55);

  var summaryKeys = ['s1','s2','s3','s4','s5'];
  c.font = "12px 'Noto Sans SC','Inter',sans-serif";
  c.fillStyle = mc.dim; c.textAlign = 'center';
  for (var si=0; si<summaryKeys.length; si++) {
    c.fillText(t(summaryKeys[si]), W/2, H*0.62 + si * 22);
  }
}

// ================================================================
// INPUT HANDLING
// ================================================================
function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
  else { clientX = e.clientX; clientY = e.clientY; }
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function onPointerDown(e) {
  if (gameComplete || answered) return;
  e.preventDefault();
  dragging = true;
  updateAngleFromPointer(e);
}

function onPointerMove(e) {
  if (!dragging || gameComplete || answered) return;
  e.preventDefault();
  updateAngleFromPointer(e);
}

function onPointerUp(e) {
  dragging = false;
}

function updateAngleFromPointer(e) {
  var pos = getCanvasPos(e);
  var scene = SCENES[currentLevel];
  var rect = canvas.parentElement.getBoundingClientRect();
  var cx = rect.width * scene.arrowCenter.x;
  var cy = rect.height * scene.arrowCenter.y;
  var dx = pos.x - cx, dy = pos.y - cy;
  if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
  playerAngle = Math.atan2(dy, dx) * 180 / Math.PI;
  if (playerAngle < 0) playerAngle += 360;
  draw();
}

// ================================================================
// GAME LOGIC
// ================================================================
function checkAnswer() {
  if (gameComplete || answered) return;
  var scene = SCENES[currentLevel];
  var diff = Math.abs(playerAngle - scene.correctAngle);
  if (diff > 180) diff = 360 - diff;
  lastCorrect = diff <= scene.tolerance;
  answered = true;

  if (lastCorrect) {
    totalScore++;
    levelResults.push(true);
  } else {
    levelResults.push(false);
  }

  feedbackTimer = 1.5;
  updateHUD();
  draw();

  // After feedback, advance
  setTimeout(function() {
    feedbackTimer = 0;
    answered = false;
    currentLevel++;
    if (currentLevel >= SCENES.length) {
      gameComplete = true;
      document.getElementById('btnConfirm').textContent = t('replay');
    }
    playerAngle = 0;
    updateHUD();
    draw();
  }, 1500);
}

function resetArrow() {
  if (gameComplete || answered) return;
  playerAngle = 0;
  draw();
}

function replayGame() {
  currentLevel = 0;
  totalScore = 0;
  playerAngle = 0;
  answered = false;
  lastCorrect = false;
  feedbackTimer = 0;
  gameComplete = false;
  levelResults = [];
  document.getElementById('btnConfirm').textContent = t('confirm');
  updateHUD();
  draw();
}

// ================================================================
// UI UPDATES
// ================================================================
function updateHUD() {
  document.getElementById('hudV1').textContent = (currentLevel+1) + '/' + SCENES.length;
  document.getElementById('hudV2').textContent = totalScore.toString();
  document.getElementById('hudV3').textContent = answered ? (lastCorrect ? t('correct') : t('wrong')) : t('ready');
  document.getElementById('levelText').textContent = (currentLevel+1) + ' / ' + SCENES.length;

  var statusEl = document.getElementById('statusLabel');
  if (gameComplete) { statusEl.textContent = t('completeMsg'); }
  else { statusEl.textContent = t('dragHint'); }

  var resultEl = document.getElementById('statusResult');
  if (answered) {
    resultEl.textContent = lastCorrect ? t('correct') : t('wrong');
    resultEl.className = 'status-result ' + (lastCorrect ? 'pass' : 'fail');
  } else {
    resultEl.textContent = '';
    resultEl.className = 'status-result';
  }
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').innerHTML =
    '<ul style="padding-left:14px;margin:0;">' +
    '<li>' + t('g1') + '</li>' +
    '<li>' + t('g2') + '</li>' +
    '<li>' + t('g3') + '</li>' +
    '<li>' + t('g4') + '</li></ul>';
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('level');
  document.getElementById('hudL2').textContent = t('score');
  document.getElementById('hudL3').textContent = t('status');
  document.getElementById('levelLabel').textContent = t('level');

  if (gameComplete) {
    document.getElementById('btnConfirm').textContent = t('replay');
  } else {
    document.getElementById('btnConfirm').textContent = t('confirm');
  }
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  updateHUD();
  draw();
}

// ================================================================
// ANIMATION LOOP
// ================================================================
var lastTs = 0;
function gameLoop(ts) {
  var dt = (ts - lastTs) / 1000;
  lastTs = ts;
  if (dt > 0.1) dt = 0.1;
  animTime += dt;

  if (feedbackTimer > 0) {
    feedbackTimer -= dt;
    if (feedbackTimer < 0) feedbackTimer = 0;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ================================================================
// INIT
// ================================================================
function init() {
  initCanvas();
  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');

  // Lang toggle
  var langBtn = document.getElementById('langBtn');
  langBtn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    refreshI18N();
  });

  // Controls
  document.getElementById('btnConfirm').addEventListener('click', function() {
    if (gameComplete) { replayGame(); }
    else { checkAnswer(); }
  });
  document.getElementById('btnReset').addEventListener('click', resetArrow);

  // Canvas input
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, {passive:false});
  canvas.addEventListener('touchmove', onPointerMove, {passive:false});
  window.addEventListener('touchend', onPointerUp);

  refreshI18N();
  requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>
