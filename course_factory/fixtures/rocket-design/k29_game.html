<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(249,115,22,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(249,115,22,0.35));background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#f97316));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.08);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.sidebar-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:2px;}
.sidebar-info .val{color:var(--sb-accent,var(--primary));font-weight:700;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang lang-btn" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">IMPULSE ARCHITECT</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideContent"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="targetLabel">TARGET</div>
    <div class="sidebar-info" id="targetInfo"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="impulseLabel">CURRENT</div>
    <div class="sidebar-info" id="impulseInfo"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnCheck">CHECK</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">IMPULSE ARCHITECT</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ROUND</div><div class="hud-val" id="hudV1">1/4</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">TARGET</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">IMPULSE</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">CLASS</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">SCORE</div><div class="hud-val" id="hudV5">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">ROUND</span>
      <span class="status-val" id="statusVal">1 / 4</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// K29 Game: Impulse Architect / 冲量建造师
// Total Impulse = area under thrust-time curve
// Player drags control points to shape a thrust curve matching a target impulse.
// 4 rounds: A(2.5), B(5.0), C(10.0), match real engine curve.
// ================================================================

// ================================================================
// VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.06)',gridStep:1,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.04)',gridStep:1,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:'rgba(249,115,22,0.04)',gridStep:1,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316';
var ACCENT_RGB = '249,115,22';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 1,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawCanvasBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.02)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.05;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.4;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.35,0,w*0.5,h*0.35,w*0.5);rg.addColorStop(0,'rgba('+ACCENT_RGB+',0.05)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#ea580c');
  r.style.setProperty('--glow-strong', 'rgba('+ACCENT_RGB+',0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  drawScene();
}

function buildStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// I18N
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'IMPULSE ARCHITECT', cn:'\u51b2\u91cf\u5efa\u9020\u5e08'},
  subtitle:    {en:'Shape thrust curves to match target impulse', cn:'\u8c03\u6574\u63a8\u529b\u66f2\u7ebf\uff0c\u5339\u914d\u76ee\u6807\u603b\u51b2'},
  guide:       {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:   {en:'Drag control points on the thrust-time graph to shape the curve. The shaded area = total impulse. Match the target within 10% to pass. Bonus points for realistic curve shapes!',
                cn:'\u62d6\u62fd\u63a8\u529b-\u65f6\u95f4\u56fe\u4e0a\u7684\u63a7\u5236\u70b9\u6765\u8c03\u6574\u66f2\u7ebf\u3002\u9634\u5f71\u9762\u79ef = \u603b\u51b2\u3002\u8bef\u5dee\u5728 10% \u4ee5\u5185\u5373\u901a\u8fc7\u3002\u66f2\u7ebf\u8d8a\u50cf\u771f\u5b9e\u53d1\u52a8\u673a\uff0c\u5956\u52b1\u8d8a\u9ad8\uff01'},
  targetLbl:   {en:'TARGET', cn:'\u76ee\u6807'},
  currentLbl:  {en:'CURRENT', cn:'\u5f53\u524d'},
  round:       {en:'ROUND', cn:'\u56de\u5408'},
  target:      {en:'TARGET', cn:'\u76ee\u6807'},
  impulse:     {en:'IMPULSE', cn:'\u603b\u51b2'},
  narClass:    {en:'CLASS', cn:'\u7b49\u7ea7'},
  score:       {en:'SCORE', cn:'\u5f97\u5206'},
  check:       {en:'CHECK', cn:'\u68c0\u67e5'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  next:        {en:'NEXT ROUND', cn:'\u4e0b\u4e00\u8f6e'},
  pass:        {en:'PASS!', cn:'\u901a\u8fc7\uff01'},
  fail:        {en:'MISS - TRY AGAIN', cn:'\u672a\u547d\u4e2d - \u518d\u8bd5'},
  complete:    {en:'ALL ROUNDS COMPLETE!', cn:'\u5168\u90e8\u56de\u5408\u5b8c\u6210\uff01'},
  tag:         {en:'IMPULSE ARCHITECT', cn:'\u51b2\u91cf\u5efa\u9020\u5e08'},
  dragHint:    {en:'Drag the orange points to shape the curve', cn:'\u62d6\u52a8\u6a59\u8272\u63a7\u5236\u70b9\u6765\u5851\u9020\u66f2\u7ebf'},
  thrust:      {en:'Thrust (N)', cn:'\u63a8\u529b (N)'},
  time:        {en:'Time (s)', cn:'\u65f6\u95f4 (s)'},
  totalImpulse:{en:'Total Impulse', cn:'\u603b\u51b2'},
  targetImpulse:{en:'Target', cn:'\u76ee\u6807'},
  r1Name:      {en:'A-Class Motor', cn:'A\u7ea7\u53d1\u52a8\u673a'},
  r2Name:      {en:'B-Class Motor', cn:'B\u7ea7\u53d1\u52a8\u673a'},
  r3Name:      {en:'C-Class Motor', cn:'C\u7ea7\u53d1\u52a8\u673a'},
  r4Name:      {en:'Match Real Engine', cn:'\u590d\u523b\u771f\u5b9e\u53d1\u52a8\u673a'},
  whyLimit:    {en:'Competitions limit total impulse, not peak thrust -- same energy budget, different strategies!',
                cn:'\u6bd4\u8d5b\u9650\u5236\u603b\u51b2\u800c\u4e0d\u662f\u5cf0\u503c\u63a8\u529b\u2014\u2014\u540c\u6837\u7684\u80fd\u91cf\u9884\u7b97\uff0c\u4e0d\u540c\u7684\u7b56\u7565\uff01'},
  accuracy:    {en:'ACCURACY', cn:'\u7cbe\u5ea6'},
  bonus:       {en:'SHAPE BONUS', cn:'\u66f2\u7ebf\u5956\u52b1'},
};
function t(k) { return I18N[k] ? (I18N[k][LANG] || I18N[k].en || k) : k; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideContent').textContent = t('guideText');
  document.getElementById('targetLabel').textContent = t('targetLbl');
  document.getElementById('impulseLabel').textContent = t('currentLbl');
  document.getElementById('hudTag').textContent = t('tag');
  document.getElementById('hudL1').textContent = t('round');
  document.getElementById('hudL2').textContent = t('target');
  document.getElementById('hudL3').textContent = t('impulse');
  document.getElementById('hudL4').textContent = t('narClass');
  document.getElementById('hudL5').textContent = t('score');
  document.getElementById('statusLabel').textContent = t('round');
  updateCheckBtn();
  updateSidebarInfo();
  drawScene();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// ROUNDS CONFIG
// ================================================================
// NAR motor classification: A=2.5, B=5.0, C=10.0, D=20.0 (max total impulse in N*s)
var ROUNDS = [
  { targetImpulse: 2.5, maxThrust: 8,  maxTime: 1.5, className: 'A', nameKey:'r1Name',
    initPoints: [{t:0,f:0},{t:0.3,f:3},{t:0.7,f:4},{t:1.2,f:2},{t:1.5,f:0}] },
  { targetImpulse: 5.0, maxThrust: 10, maxTime: 2.0, className: 'B', nameKey:'r2Name',
    initPoints: [{t:0,f:0},{t:0.4,f:4},{t:0.9,f:5},{t:1.5,f:3},{t:2.0,f:0}] },
  { targetImpulse: 10.0, maxThrust: 15, maxTime: 3.0, className: 'C', nameKey:'r3Name',
    initPoints: [{t:0,f:0},{t:0.5,f:5},{t:1.2,f:6},{t:2.2,f:4},{t:3.0,f:0}] },
  { targetImpulse: 7.2, maxThrust: 15, maxTime: 2.5, className: '?', nameKey:'r4Name',
    // "real engine" reference curve the player must match
    refCurve: [{t:0,f:0},{t:0.05,f:12},{t:0.15,f:11},{t:0.5,f:6},{t:1.0,f:4.5},{t:1.8,f:3},{t:2.3,f:1},{t:2.5,f:0}],
    initPoints: [{t:0,f:0},{t:0.3,f:5},{t:0.8,f:6},{t:1.5,f:4},{t:2.5,f:0}] },
];

// NAR class boundaries for the class indicator bar
var NAR_CLASSES = [
  {name:'1/4A', max:0.625},
  {name:'1/2A', max:1.25},
  {name:'A', max:2.5},
  {name:'B', max:5.0},
  {name:'C', max:10.0},
  {name:'D', max:20.0},
];

// ================================================================
// GAME STATE
// ================================================================
var canvas, ctx;
var currentRound = 0;
var totalScore = 0;
var phase = 'building'; // building, result, complete
var controlPoints = [];  // {t, f} -- user's draggable points
var dragIdx = -1;        // index of point being dragged, -1 = none
var lastResult = null;   // {passed, accuracy, bonus, score}

// Graph layout (in canvas logical coords) -- set during resize
var graphLeft = 0, graphRight = 0, graphTop = 0, graphBottom = 0;
var CW = 100, CH = 100;
var dpr = 1;

function initRound() {
  var rd = ROUNDS[currentRound];
  controlPoints = rd.initPoints.map(function(p){ return {t:p.t, f:p.f}; });
  phase = 'building';
  lastResult = null;
  dragIdx = -1;
  updateHUD();
  updateSidebarInfo();
  updateCheckBtn();
  drawScene();
}

// ================================================================
// IMPULSE CALCULATION (trapezoidal integration)
// ================================================================
function calcImpulse(pts) {
  if (pts.length < 2) return 0;
  var sorted = pts.slice().sort(function(a,b){return a.t - b.t;});
  var sum = 0;
  for (var i = 1; i < sorted.length; i++) {
    var dt = sorted[i].t - sorted[i-1].t;
    var avgF = (sorted[i].f + sorted[i-1].f) / 2;
    sum += dt * avgF;
  }
  return Math.max(0, sum);
}

function getNARClass(impulse) {
  for (var i = 0; i < NAR_CLASSES.length; i++) {
    if (impulse <= NAR_CLASSES[i].max) return NAR_CLASSES[i].name;
  }
  return 'D+';
}

// ================================================================
// SHAPE BONUS: reward realistic rocket motor curve shapes
// ================================================================
function calcShapeBonus(pts) {
  // A good motor curve: rises quickly, sustains, then tails off
  // Penalize: flat lines, spikes only at one point, negative slopes early
  if (pts.length < 3) return 0;
  var sorted = pts.slice().sort(function(a,b){return a.t - b.t;});
  var maxF = 0, maxIdx = 0;
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].f > maxF) { maxF = sorted[i].f; maxIdx = i; }
  }
  if (maxF < 0.5) return 0;
  // Peak should be in first 40% of time span
  var totalTime = sorted[sorted.length-1].t - sorted[0].t;
  if (totalTime <= 0) return 0;
  var peakFrac = (sorted[maxIdx].t - sorted[0].t) / totalTime;
  var peakScore = 0;
  if (peakFrac < 0.4) peakScore = 20;
  else if (peakFrac < 0.6) peakScore = 10;
  // Smooth decline after peak
  var declineScore = 0;
  var declining = true;
  for (var j = maxIdx + 1; j < sorted.length; j++) {
    if (sorted[j].f > sorted[j-1].f + 0.5) declining = false;
  }
  if (declining && sorted.length - maxIdx >= 2) declineScore = 10;
  // Starts near zero and ends near zero
  var endsScore = 0;
  if (sorted[0].f < 1 && sorted[sorted.length-1].f < 1) endsScore = 10;
  return peakScore + declineScore + endsScore;
}

// ================================================================
// CHECK / SUBMIT
// ================================================================
function checkImpulse() {
  if (phase !== 'building') return;
  var rd = ROUNDS[currentRound];
  var impulse = calcImpulse(controlPoints);
  var diff = Math.abs(impulse - rd.targetImpulse);
  var pct = rd.targetImpulse > 0 ? diff / rd.targetImpulse : 1;
  var passed = pct <= 0.10;
  var accuracy = Math.max(0, Math.round((1 - pct) * 100));
  var bonus = calcShapeBonus(controlPoints);
  var roundScore = passed ? accuracy + bonus : 0;
  totalScore += roundScore;
  lastResult = { passed: passed, accuracy: accuracy, bonus: bonus, score: roundScore, impulse: impulse };
  phase = 'result';
  updateHUD();
  updateSidebarInfo();
  updateCheckBtn();
  drawScene();
}

function nextRound() {
  if (currentRound < ROUNDS.length - 1) {
    currentRound++;
    initRound();
  } else {
    phase = 'complete';
    updateHUD();
    updateSidebarInfo();
    updateCheckBtn();
    drawScene();
  }
}

function resetRound() {
  initRound();
}

// ================================================================
// HUD + SIDEBAR UPDATES
// ================================================================
function updateHUD() {
  var rd = ROUNDS[currentRound];
  var impulse = calcImpulse(controlPoints);
  document.getElementById('hudV1').textContent = (currentRound+1) + '/' + ROUNDS.length;
  document.getElementById('hudV2').textContent = rd.targetImpulse.toFixed(1) + ' N\u00b7s';
  document.getElementById('hudV3').textContent = impulse.toFixed(2) + ' N\u00b7s';
  document.getElementById('hudV4').textContent = getNARClass(impulse);
  document.getElementById('hudV5').textContent = totalScore + '';
  document.getElementById('statusVal').textContent = (currentRound+1) + ' / ' + ROUNDS.length;
  var sr = document.getElementById('statusResult');
  if (phase === 'result' && lastResult) {
    sr.textContent = lastResult.passed ? t('pass') : t('fail');
    sr.className = 'status-result ' + (lastResult.passed ? 'pass' : 'fail');
  } else if (phase === 'complete') {
    sr.textContent = t('complete');
    sr.className = 'status-result pass';
  } else {
    sr.textContent = '';
    sr.className = 'status-result';
  }
}

function updateSidebarInfo() {
  var rd = ROUNDS[currentRound];
  var impulse = calcImpulse(controlPoints);
  var targetEl = document.getElementById('targetInfo');
  var impulseEl = document.getElementById('impulseInfo');
  targetEl.innerHTML = t(rd.nameKey) + ': <span class="val">' + rd.targetImpulse.toFixed(1) + ' N\u00b7s</span>';
  impulseEl.innerHTML = t('totalImpulse') + ': <span class="val">' + impulse.toFixed(2) + ' N\u00b7s</span>';
}

function updateCheckBtn() {
  var btn = document.getElementById('btnCheck');
  if (phase === 'result' && lastResult && lastResult.passed) {
    btn.textContent = currentRound < ROUNDS.length - 1 ? t('next') : t('complete');
    btn.disabled = false;
  } else if (phase === 'complete') {
    btn.textContent = t('complete');
    btn.disabled = true;
  } else {
    btn.textContent = t('check');
    btn.disabled = false;
  }
}

// ================================================================
// CANVAS RESIZE
// ================================================================
function resizeCanvas() {
  var wrap = canvas.parentElement;
  var rect = wrap.getBoundingClientRect();
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  CW = Math.max(rect.width, 200);
  CH = Math.max(rect.height, 150);
  canvas.width = CW * dpr;
  canvas.height = CH * dpr;
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Graph margins
  graphLeft = 70;
  graphRight = CW - 40;
  graphTop = 40;
  graphBottom = CH - 60;
  drawScene();
}

// ================================================================
// COORDINATE MAPPING
// ================================================================
function timeToX(tVal) {
  var rd = ROUNDS[currentRound];
  return graphLeft + (tVal / rd.maxTime) * (graphRight - graphLeft);
}
function thrustToY(fVal) {
  var rd = ROUNDS[currentRound];
  return graphBottom - (fVal / rd.maxThrust) * (graphBottom - graphTop);
}
function xToTime(x) {
  var rd = ROUNDS[currentRound];
  return Math.max(0, Math.min(rd.maxTime, ((x - graphLeft) / (graphRight - graphLeft)) * rd.maxTime));
}
function yToThrust(y) {
  var rd = ROUNDS[currentRound];
  return Math.max(0, Math.min(rd.maxThrust, ((graphBottom - y) / (graphBottom - graphTop)) * rd.maxThrust));
}

// ================================================================
// DRAWING
// ================================================================
function drawScene() {
  if (!ctx) return;
  var mc = gameModeColors();
  var rd = ROUNDS[currentRound];

  // Background
  drawCanvasBg(ctx, CW, CH);

  // Graph grid
  drawGrid(mc, rd);

  // Reference curve for round 4
  if (rd.refCurve && phase === 'building') {
    drawCurve(rd.refCurve, 'rgba(34,197,94,0.3)', 2, true);
    // Label
    ctx.save();
    ctx.font = "bold 11px 'JetBrains Mono',monospace";
    ctx.fillStyle = 'rgba(34,197,94,0.6)';
    ctx.textAlign = 'left';
    var refLabelX = timeToX(rd.refCurve[1].t) + 10;
    var refLabelY = thrustToY(rd.refCurve[1].f) - 8;
    ctx.fillText(LANG === 'cn' ? '\u76ee\u6807\u66f2\u7ebf' : 'TARGET CURVE', refLabelX, refLabelY);
    ctx.restore();
  }

  // Shaded area under player curve
  drawShadedArea(controlPoints, mc);

  // Player curve
  drawCurve(controlPoints, ACCENT, 3, false);

  // Control points
  drawControlPoints(mc);

  // Impulse readout on graph
  drawImpulseReadout(mc, rd);

  // NAR class bar
  drawNARBar(mc, rd);

  // Result overlay
  if (phase === 'result' && lastResult) {
    drawResultOverlay(mc);
  }
  if (phase === 'complete') {
    drawCompleteOverlay(mc);
  }

  // Drag hint (only on first interaction)
  if (phase === 'building' && dragIdx < 0) {
    ctx.save();
    ctx.font = "12px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillStyle = mc.dim;
    ctx.globalAlpha = 0.6;
    ctx.textAlign = 'center';
    ctx.fillText(t('dragHint'), (graphLeft + graphRight) / 2, graphBottom + 45);
    ctx.restore();
  }
}

function drawGrid(mc, rd) {
  ctx.save();

  // Axes
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(graphLeft, graphTop - 10);
  ctx.lineTo(graphLeft, graphBottom);
  ctx.lineTo(graphRight + 10, graphBottom);
  ctx.stroke();

  // Horizontal grid lines (thrust)
  var thrustStep = rd.maxThrust <= 10 ? 2 : 5;
  ctx.lineWidth = 0.5;
  ctx.font = "10px 'JetBrains Mono',monospace";
  ctx.textAlign = 'right';
  for (var f = 0; f <= rd.maxThrust; f += thrustStep) {
    var y = thrustToY(f);
    ctx.strokeStyle = f === 0 ? mc.strokeDim : (mc.grid || 'rgba('+ACCENT_RGB+',0.06)');
    ctx.beginPath();
    ctx.moveTo(graphLeft, y);
    ctx.lineTo(graphRight, y);
    ctx.stroke();
    ctx.fillStyle = mc.dim;
    ctx.fillText(f + '', graphLeft - 8, y + 4);
  }

  // Vertical grid lines (time)
  var timeStep = rd.maxTime <= 2 ? 0.5 : (rd.maxTime <= 3 ? 0.5 : 1);
  ctx.textAlign = 'center';
  for (var tVal = 0; tVal <= rd.maxTime + 0.01; tVal += timeStep) {
    var x = timeToX(tVal);
    ctx.strokeStyle = tVal === 0 ? mc.strokeDim : (mc.grid || 'rgba('+ACCENT_RGB+',0.06)');
    ctx.beginPath();
    ctx.moveTo(x, graphTop);
    ctx.lineTo(x, graphBottom);
    ctx.stroke();
    ctx.fillStyle = mc.dim;
    ctx.fillText(tVal.toFixed(1), x, graphBottom + 18);
  }

  // Axis labels
  ctx.font = "bold 11px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.text;
  ctx.textAlign = 'center';
  ctx.fillText(t('time'), (graphLeft + graphRight) / 2, graphBottom + 35);
  ctx.save();
  ctx.translate(18, (graphTop + graphBottom) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(t('thrust'), 0, 0);
  ctx.restore();

  ctx.restore();
}

function drawCurve(pts, color, lw, dashed) {
  if (pts.length < 2) return;
  var sorted = pts.slice().sort(function(a,b){return a.t - b.t;});
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  if (dashed) ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(timeToX(sorted[0].t), thrustToY(sorted[0].f));
  // Catmull-Rom spline through the points for smooth curve
  if (sorted.length >= 3) {
    for (var i = 0; i < sorted.length - 1; i++) {
      var p0 = sorted[Math.max(0, i - 1)];
      var p1 = sorted[i];
      var p2 = sorted[i + 1];
      var p3 = sorted[Math.min(sorted.length - 1, i + 2)];
      var tension = 0.3;
      var x1 = timeToX(p1.t), y1 = thrustToY(p1.f);
      var x2 = timeToX(p2.t), y2 = thrustToY(p2.f);
      var cp1x = x1 + (timeToX(p2.t) - timeToX(p0.t)) * tension;
      var cp1y = y1 + (thrustToY(p2.f) - thrustToY(p0.f)) * tension;
      var cp2x = x2 - (timeToX(p3.t) - timeToX(p1.t)) * tension;
      var cp2y = y2 - (thrustToY(p3.f) - thrustToY(p1.f)) * tension;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
    }
  } else {
    for (var j = 1; j < sorted.length; j++) {
      ctx.lineTo(timeToX(sorted[j].t), thrustToY(sorted[j].f));
    }
  }
  ctx.stroke();
  if (dashed) ctx.setLineDash([]);
  ctx.restore();
}

function drawShadedArea(pts, mc) {
  if (pts.length < 2) return;
  var sorted = pts.slice().sort(function(a,b){return a.t - b.t;});
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(timeToX(sorted[0].t), graphBottom);
  // Use same Catmull-Rom spline for shading
  ctx.lineTo(timeToX(sorted[0].t), thrustToY(sorted[0].f));
  if (sorted.length >= 3) {
    for (var i = 0; i < sorted.length - 1; i++) {
      var p0 = sorted[Math.max(0, i - 1)];
      var p1 = sorted[i];
      var p2 = sorted[i + 1];
      var p3 = sorted[Math.min(sorted.length - 1, i + 2)];
      var tension = 0.3;
      var x1 = timeToX(p1.t), y1 = thrustToY(p1.f);
      var x2 = timeToX(p2.t), y2 = thrustToY(p2.f);
      var cp1x = x1 + (timeToX(p2.t) - timeToX(p0.t)) * tension;
      var cp1y = y1 + (thrustToY(p2.f) - thrustToY(p0.f)) * tension;
      var cp2x = x2 - (timeToX(p3.t) - timeToX(p1.t)) * tension;
      var cp2y = y2 - (thrustToY(p3.f) - thrustToY(p1.f)) * tension;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
    }
  } else {
    for (var j = 1; j < sorted.length; j++) {
      ctx.lineTo(timeToX(sorted[j].t), thrustToY(sorted[j].f));
    }
  }
  ctx.lineTo(timeToX(sorted[sorted.length-1].t), graphBottom);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, graphTop, 0, graphBottom);
  grad.addColorStop(0, 'rgba('+ACCENT_RGB+',0.35)');
  grad.addColorStop(1, 'rgba('+ACCENT_RGB+',0.05)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawControlPoints(mc) {
  var canDrag = phase === 'building';
  for (var i = 0; i < controlPoints.length; i++) {
    var p = controlPoints[i];
    var px = timeToX(p.t);
    var py = thrustToY(p.f);
    var isEndpoint = (i === 0 || i === controlPoints.length - 1);

    // Glow
    if (mc.glow && canDrag) {
      ctx.save();
      var rg = ctx.createRadialGradient(px, py, 0, px, py, 20);
      rg.addColorStop(0, 'rgba('+ACCENT_RGB+',0.3)');
      rg.addColorStop(1, 'transparent');
      ctx.fillStyle = rg;
      ctx.fillRect(px - 20, py - 20, 40, 40);
      ctx.restore();
    }

    // Point circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, isEndpoint ? 6 : 8, 0, Math.PI * 2);
    ctx.fillStyle = dragIdx === i ? '#fff' : ACCENT;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Value label near each point (only interior points)
    if (!isEndpoint && canDrag) {
      ctx.save();
      ctx.font = "9px 'JetBrains Mono',monospace";
      ctx.fillStyle = mc.dim;
      ctx.textAlign = 'center';
      ctx.fillText(p.f.toFixed(1) + 'N', px, py - 14);
      ctx.restore();
    }
  }
}

function drawImpulseReadout(mc, rd) {
  var impulse = calcImpulse(controlPoints);
  var diff = Math.abs(impulse - rd.targetImpulse);
  var pct = rd.targetImpulse > 0 ? diff / rd.targetImpulse : 1;
  var color = pct <= 0.10 ? '#22c55e' : (pct <= 0.25 ? '#eab308' : ACCENT);

  // Current impulse
  ctx.save();
  ctx.font = "bold 14px 'JetBrains Mono',monospace";
  ctx.textAlign = 'right';
  ctx.fillStyle = color;
  var readoutX = graphRight;
  var readoutY = graphTop - 10;
  ctx.fillText(t('totalImpulse') + ': ' + impulse.toFixed(2) + ' N\u00b7s', readoutX, readoutY);

  // Target impulse
  ctx.font = "bold 12px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('targetImpulse') + ': ' + rd.targetImpulse.toFixed(1) + ' N\u00b7s', readoutX, readoutY - 18);
  ctx.restore();
}

function drawNARBar(mc, rd) {
  // Draw a horizontal class indicator bar at the very top of the graph area
  var impulse = calcImpulse(controlPoints);
  var barY = graphTop - 25;
  var barH = 6;
  var barLeft = graphLeft;
  var barRight = graphRight;
  var barW = barRight - barLeft;

  // Bar background
  ctx.save();
  ctx.fillStyle = 'rgba('+ACCENT_RGB+',0.08)';
  ctx.fillRect(barLeft, barY - barH/2, barW, barH);

  // Class boundaries
  var maxImpulseBar = 20; // D class max
  for (var i = 0; i < NAR_CLASSES.length; i++) {
    var nc = NAR_CLASSES[i];
    var bx = barLeft + (nc.max / maxImpulseBar) * barW;
    ctx.strokeStyle = 'rgba('+ACCENT_RGB+',0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx, barY - barH/2 - 2);
    ctx.lineTo(bx, barY + barH/2 + 2);
    ctx.stroke();
    // Class label
    ctx.font = "7px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'center';
    var prevMax = i > 0 ? NAR_CLASSES[i-1].max : 0;
    var labelX = barLeft + ((prevMax + nc.max) / 2 / maxImpulseBar) * barW;
    ctx.fillText(nc.name, labelX, barY - barH/2 - 5);
  }

  // Current impulse marker
  var markerX = barLeft + Math.min(impulse / maxImpulseBar, 1) * barW;
  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.moveTo(markerX, barY + barH/2 + 2);
  ctx.lineTo(markerX - 4, barY + barH/2 + 8);
  ctx.lineTo(markerX + 4, barY + barH/2 + 8);
  ctx.closePath();
  ctx.fill();

  // Target marker
  var targetX = barLeft + Math.min(rd.targetImpulse / maxImpulseBar, 1) * barW;
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(targetX, barY - barH/2 - 2);
  ctx.lineTo(targetX, barY + barH/2 + 2);
  ctx.stroke();

  ctx.restore();
}

function drawResultOverlay(mc) {
  if (!lastResult) return;
  ctx.save();
  // Semi-transparent backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(graphLeft, graphTop, graphRight - graphLeft, graphBottom - graphTop);

  var cx = (graphLeft + graphRight) / 2;
  var cy = (graphTop + graphBottom) / 2;

  // Result box
  var bw = 280, bh = 140;
  ctx.fillStyle = mc.bg1 || '#05060f';
  ctx.fillRect(cx - bw/2, cy - bh/2, bw, bh);
  ctx.strokeStyle = lastResult.passed ? '#22c55e' : '#ef4444';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - bw/2, cy - bh/2, bw, bh);

  // Title
  ctx.font = "bold 18px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = lastResult.passed ? '#22c55e' : '#ef4444';
  ctx.fillText(lastResult.passed ? t('pass') : t('fail'), cx, cy - 40);

  // Impulse value
  ctx.font = "14px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.text;
  ctx.fillText(t('totalImpulse') + ': ' + lastResult.impulse.toFixed(2) + ' N\u00b7s', cx, cy - 10);

  if (lastResult.passed) {
    // Accuracy + bonus
    ctx.font = "12px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.dim;
    ctx.fillText(t('accuracy') + ': ' + lastResult.accuracy + '%   ' + t('bonus') + ': +' + lastResult.bonus, cx, cy + 16);
    ctx.font = "bold 14px 'JetBrains Mono',monospace";
    ctx.fillStyle = ACCENT;
    ctx.fillText(t('score') + ': ' + lastResult.score, cx, cy + 42);
  } else {
    ctx.font = "12px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillStyle = mc.dim;
    var targetVal = ROUNDS[currentRound].targetImpulse;
    var diffPct = Math.abs(lastResult.impulse - targetVal) / targetVal * 100;
    ctx.fillText((LANG === 'cn' ? '\u504f\u5dee: ' : 'Off by: ') + diffPct.toFixed(1) + '%', cx, cy + 16);
  }

  ctx.restore();
}

function drawCompleteOverlay(mc) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(graphLeft, graphTop, graphRight - graphLeft, graphBottom - graphTop);
  var cx = (graphLeft + graphRight) / 2;
  var cy = (graphTop + graphBottom) / 2;
  ctx.font = "bold 20px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = '#22c55e';
  ctx.fillText(t('complete'), cx, cy - 20);
  ctx.font = "bold 16px 'JetBrains Mono',monospace";
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('score') + ': ' + totalScore, cx, cy + 14);
  ctx.font = "13px 'Inter','Noto Sans SC',sans-serif";
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('whyLimit'), cx, cy + 44);
  ctx.restore();
}

// ================================================================
// MOUSE / TOUCH INTERACTION
// ================================================================
var POINT_RADIUS = 14; // hit area radius (px)

function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

function hitTestPoint(mx, my) {
  for (var i = 0; i < controlPoints.length; i++) {
    var px = timeToX(controlPoints[i].t);
    var py = thrustToY(controlPoints[i].f);
    var dx = mx - px, dy = my - py;
    if (dx * dx + dy * dy <= POINT_RADIUS * POINT_RADIUS) return i;
  }
  return -1;
}

function onPointerDown(e) {
  if (phase !== 'building') return;
  e.preventDefault();
  var pos = getCanvasPos(e);
  var idx = hitTestPoint(pos.x, pos.y);
  if (idx >= 0) {
    dragIdx = idx;
    canvas.style.cursor = 'grabbing';
  }
}

function onPointerMove(e) {
  if (phase !== 'building') return;
  var pos = getCanvasPos(e);
  if (dragIdx >= 0) {
    e.preventDefault();
    var rd = ROUNDS[currentRound];
    var pt = controlPoints[dragIdx];
    var isFirst = dragIdx === 0;
    var isLast = dragIdx === controlPoints.length - 1;
    // First and last points: time is locked, thrust locked to 0
    if (isFirst) {
      pt.t = 0;
      pt.f = 0;
    } else if (isLast) {
      pt.t = rd.maxTime;
      pt.f = 0;
    } else {
      // Interior points: can move both axes
      var newT = xToTime(pos.x);
      var newF = yToThrust(pos.y);
      // Constrain time between neighbors
      var prevT = controlPoints[dragIdx - 1].t + 0.02;
      var nextT = controlPoints[dragIdx + 1].t - 0.02;
      pt.t = Math.max(prevT, Math.min(nextT, newT));
      pt.f = Math.max(0, Math.min(rd.maxThrust, newF));
    }
    updateHUD();
    updateSidebarInfo();
    drawScene();
  } else {
    // Hover cursor
    var hIdx = hitTestPoint(pos.x, pos.y);
    canvas.style.cursor = hIdx >= 0 ? 'grab' : 'default';
  }
}

function onPointerUp(e) {
  if (dragIdx >= 0) {
    dragIdx = -1;
    canvas.style.cursor = 'default';
    drawScene();
  }
}

// ================================================================
// EVENT WIRING
// ================================================================
function wireEvents() {
  // Canvas drag
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('touchcancel', onPointerUp);

  // Buttons
  document.getElementById('btnCheck').addEventListener('click', function() {
    if (phase === 'building') {
      checkImpulse();
    } else if (phase === 'result' && lastResult && lastResult.passed) {
      nextRound();
    }
  });
  document.getElementById('btnReset').addEventListener('click', function() {
    if (phase === 'complete') {
      currentRound = 0;
      totalScore = 0;
    }
    resetRound();
  });

  // Resize
  window.addEventListener('resize', resizeCanvas);
}

// ================================================================
// INIT
// ================================================================
canvas = document.getElementById('gc');
ctx = canvas.getContext('2d');
setupLangToggle();
buildStyleSwitcher();
applyGameMode(GAME_MODE);
wireEvents();
resizeCanvas();
initRound();
refreshI18N();
</script>
