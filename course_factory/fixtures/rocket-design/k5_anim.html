<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* ── Main area: canvas + controls + hud ── */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, style switcher, title, guide -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<!-- Runtime (inlined) -->
<script>
/**
 * Animation Runtime -- shared skeleton for all course factory animations.
 *
 * Layout: sidebar (200px left column) contains lang-btn, style-mode
 * switcher, title, subtitle, frame indicator, and guide panel. The canvas
 * occupies the remaining right area with ZERO overlapping elements.
 *
 * Visual Modes: three built-in visual modes switchable via sidebar buttons:
 *   - 'light'     Technical Blueprint -- light bg, dark linework, CAD grid
 *   - 'dark'      Dark Editorial -- near-black, single-hue accent, minimal
 *   - 'cyberpunk' Sci-Fi Hologram -- deep blue, glow, scanlines, brackets
 *
 * Required globals before boot():
 *   - CONFIG: { title, subtitle, totalFrames, hudLabels, hudValues, guideItems, style }
 *   - getFrameElements(f, W, H): returns element array for frame f
 *
 * Optional globals:
 *   - drawBg(ctx, W, H, mode): draws background (mode = 'light'|'dark'|'cyberpunk')
 *   - customDrawElement(ctx, el, W, H): return true if handled
 *   - onReady(): called after boot
 */

var AnimRuntime = (function () {
  'use strict';

  // --- State ---
  var cv, ctx, W = 800, H = 400;
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var currentFrame = 0, totalFrames = 4;
  var transitioning = false, playing = false, playTimer = null;
  var LANG = 'cn';
  var I18N = {};

  // --- Visual Mode ---
  var VISUAL_MODE = 'cyberpunk';
  var VISUAL_MODES = {
    light: {
      label: 'LIGHT',
      canvasBg1: '#fafaf5', canvasBg2: '#f0f0ea',
      canvasGrid: 'rgba(15,23,42,0.04)', canvasGridWidth: 0.5,
      canvasText: '#0f172a', canvasTextDim: '#475569', canvasTextMute: '#94a3b8',
      canvasStroke: '#0f172a', canvasStrokeDim: 'rgba(15,23,42,0.3)',
      canvasAccent: null, canvasGlow: false, canvasCornerBrackets: false, canvasScanlines: false,
      canvasInnerBorder: true, canvasInnerBorderColor: 'rgba(15,23,42,0.2)',
      sidebarBg: 'rgba(250,250,245,0.96)', sidebarBorder: '#d4d4c8',
      sidebarText: '#0f172a', sidebarTextDim: '#475569', sidebarTextMute: '#94a3b8',
      sidebarAccent: null, sidebarBtnBg: 'transparent', sidebarBtnBorder: null,
      hudBg: 'rgba(250,250,245,0.92)', hudBorder: '#d4d4c8', hudLabel: '#64748b', hudValue: '#0f172a',
      ctrlBg: '#0f172a', ctrlColor: '#fafaf5',
    },
    dark: {
      label: 'DARK',
      canvasBg1: '#0a0a0a', canvasBg2: '#111111',
      canvasGrid: 'rgba(255,255,255,0.03)', canvasGridWidth: 0.5,
      canvasText: '#e5e5e5', canvasTextDim: '#a3a3a3', canvasTextMute: '#525252',
      canvasStroke: '#e5e5e5', canvasStrokeDim: 'rgba(255,255,255,0.2)',
      canvasAccent: null, canvasGlow: false, canvasCornerBrackets: false, canvasScanlines: false,
      canvasInnerBorder: false, canvasTopLine: true,
      sidebarBg: 'rgba(10,10,10,0.96)', sidebarBorder: '#1f1f1f',
      sidebarText: '#fafafa', sidebarTextDim: '#737373', sidebarTextMute: '#525252',
      sidebarAccent: null, sidebarBtnBg: 'transparent', sidebarBtnBorder: '#262626',
      hudBg: 'rgba(10,10,10,0.9)', hudBorder: '#1f1f1f', hudLabel: '#525252', hudValue: null,
      ctrlBg: null, ctrlColor: null,
    },
    cyberpunk: {
      label: 'CYBER',
      canvasBg1: '#05060f', canvasBg2: '#0d0e1a',
      canvasGrid: null, canvasGridWidth: 0.5,
      canvasText: '#e2e8f0', canvasTextDim: '#cbd5e1', canvasTextMute: '#64748b',
      canvasStroke: '#e2e8f0', canvasStrokeDim: 'rgba(255,255,255,0.12)',
      canvasAccent: null, canvasGlow: true, canvasCornerBrackets: true, canvasScanlines: true,
      canvasInnerBorder: false, canvasTopLine: false,
      sidebarBg: 'rgba(5,6,15,0.92)', sidebarBorder: null,
      sidebarText: null, sidebarTextDim: null, sidebarTextMute: null,
      sidebarAccent: null, sidebarBtnBg: 'transparent', sidebarBtnBorder: null,
      hudBg: 'rgba(5,6,15,0.9)', hudBorder: null, hudLabel: null, hudValue: null,
      ctrlBg: null, ctrlColor: '#05060f',
    },
  };

  var REF_W = 700, REF_H = 400;
  var _vw = REF_W, _vh = REF_H;

  // --- Palette presets ---
  var _BASE = {
    bg: 'oklch(0.14 0.035 265)', bg2: 'oklch(0.18 0.04 265)', surface: 'oklch(0.22 0.045 265)',
    text: 'oklch(0.96 0.01 265)', muted: 'oklch(0.55 0.03 265)',
    error: 'oklch(0.70 0.18 25)', outline: 'oklch(0.55 0.03 265)',
    glass: 'oklch(0.18 0.04 265 / 0.7)', glassBlur: 12, radius: '14px',
  };
  function _theme(primary, primaryDim, secondary, secondaryDim, tertiary, tertiaryDim, glow, glowStrong) {
    return Object.assign({}, _BASE, {
      primary: primary, primaryDim: primaryDim,
      secondary: secondary, secondaryDim: secondaryDim,
      tertiary: tertiary, tertiaryDim: tertiaryDim,
      glow: glow, glowStrong: glowStrong,
    });
  }
  var PALETTES = {
    mech: _theme(
      'oklch(0.75 0.17 55)', 'oklch(0.55 0.16 50)',
      'oklch(0.92 0.08 60)', 'oklch(0.35 0.10 60)',
      'oklch(0.85 0.14 85)', 'oklch(0.65 0.12 85)',
      'oklch(0.75 0.17 55 / 0.1)', 'oklch(0.75 0.17 55 / 0.25)'),
    cs: _theme(
      'oklch(0.75 0.17 200)', 'oklch(0.55 0.16 200)',
      'oklch(0.92 0.08 190)', 'oklch(0.35 0.10 210)',
      'oklch(0.85 0.14 85)', 'oklch(0.65 0.12 85)',
      'oklch(0.75 0.17 200 / 0.1)', 'oklch(0.75 0.17 200 / 0.25)'),
    bio: _theme(
      'oklch(0.75 0.17 155)', 'oklch(0.55 0.16 155)',
      'oklch(0.92 0.08 150)', 'oklch(0.35 0.10 160)',
      'oklch(0.85 0.14 85)', 'oklch(0.65 0.12 85)',
      'oklch(0.75 0.17 155 / 0.1)', 'oklch(0.75 0.17 155 / 0.25)'),
    space: _theme(
      'oklch(0.72 0.17 295)', 'oklch(0.52 0.16 295)',
      'oklch(0.92 0.08 295)', 'oklch(0.35 0.10 290)',
      'oklch(0.85 0.14 85)', 'oklch(0.65 0.12 85)',
      'oklch(0.72 0.17 295 / 0.1)', 'oklch(0.72 0.17 295 / 0.25)'),
    phys: _theme(
      'oklch(0.78 0.13 215)', 'oklch(0.55 0.13 215)',
      'oklch(0.92 0.08 215)', 'oklch(0.35 0.10 215)',
      'oklch(0.85 0.14 85)', 'oklch(0.65 0.12 85)',
      'oklch(0.78 0.13 215 / 0.1)', 'oklch(0.78 0.13 215 / 0.25)'),
  };
  // Legacy aliases
  PALETTES.helix_lab = PALETTES.bio;
  PALETTES.ember_forge = PALETTES.mech;
  PALETTES.rocketry_control = PALETTES.space;

  var PAL = PALETTES.mech;

  // --- Math helpers ---
  function lerp(a, b, p) { return a + (b - a) * p; }
  function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }
  function interpolate(value, input, output, opts) {
    var n = input.length;
    var easing = (opts && opts.easing) || null;
    var clamp = !(opts && opts.extrapolate === 'extend');
    if (value <= input[0]) { if (clamp) return output[0]; var p0 = (value - input[0]) / (input[1] - input[0]); return lerp(output[0], output[1], easing ? easing(p0) : p0); }
    if (value >= input[n - 1]) { if (clamp) return output[n - 1]; var pn = (value - input[n - 2]) / (input[n - 1] - input[n - 2]); return lerp(output[n - 2], output[n - 1], easing ? easing(pn) : pn); }
    for (var i = 1; i < n; i++) { if (value <= input[i]) { var p = (value - input[i - 1]) / (input[i] - input[i - 1]); if (easing) p = easing(p); return lerp(output[i - 1], output[i], p); } }
    return output[n - 1];
  }
  function merge(base, ov) { var r = {}; for (var k in base) r[k] = base[k]; for (var k2 in ov) r[k2] = ov[k2]; return r; }

  // --- i18n ---
  function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
  function _buildI18N(cfg) {
    I18N = {
      btnPlay:  { en: 'PLAY',  cn: '\u64ad\u653e' },
      btnPause: { en: 'PAUSE', cn: '\u6682\u505c' },
      btnPrev:  { en: 'PREV',  cn: '\u4e0a\u4e00\u5e27' },
      btnNext:  { en: 'NEXT',  cn: '\u4e0b\u4e00\u5e27' },
      guideDefault: { en: 'GUIDE', cn: '\u89c2\u770b\u6307\u5357' },
    };
    if (cfg.i18n) { for (var k in cfg.i18n) I18N[k] = cfg.i18n[k]; }
  }

  // --- Visual Mode helpers ---
  function _modeColors() {
    var m = VISUAL_MODES[VISUAL_MODE] || VISUAL_MODES.cyberpunk;
    return {
      bg1: m.canvasBg1, bg2: m.canvasBg2, grid: m.canvasGrid,
      gridW: m.canvasGridWidth || 0.5,
      text: m.canvasText || PAL.text, dim: m.canvasTextDim || PAL.muted,
      mute: m.canvasTextMute || PAL.muted,
      stroke: m.canvasStroke || PAL.text, strokeDim: m.canvasStrokeDim || PAL.muted,
      accent: m.canvasAccent || PAL.primary,
      glow: !!m.canvasGlow, cornerBrackets: !!m.canvasCornerBrackets,
      scanlines: !!m.canvasScanlines, innerBorder: !!m.canvasInnerBorder,
      innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
      topLine: !!m.canvasTopLine,
    };
  }

  function _applyVisualMode(mode) {
    VISUAL_MODE = mode;
    var m = VISUAL_MODES[mode] || VISUAL_MODES.cyberpunk;
    var root = document.documentElement;
    root.style.setProperty('--sb-bg', m.sidebarBg || 'rgba(5,6,15,0.92)');
    root.style.setProperty('--sb-border', m.sidebarBorder || (m.canvasAccent || PAL.primary));
    root.style.setProperty('--sb-text', m.sidebarText || PAL.text);
    root.style.setProperty('--sb-dim', m.sidebarTextDim || PAL.muted);
    root.style.setProperty('--sb-mute', m.sidebarTextMute || PAL.muted);
    root.style.setProperty('--sb-accent', m.sidebarAccent || PAL.primary);
    root.style.setProperty('--sb-btn-bg', m.sidebarBtnBg || 'transparent');
    root.style.setProperty('--sb-btn-bd', m.sidebarBtnBorder || 'transparent');
    root.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
    root.style.setProperty('--hud-border', m.hudBorder || 'transparent');
    root.style.setProperty('--hud-label', m.hudLabel || PAL.muted);
    root.style.setProperty('--hud-value', m.hudValue || PAL.text);
    root.style.setProperty('--ctrl-bg', m.ctrlBg || PAL.primary);
    root.style.setProperty('--ctrl-color', m.ctrlColor || PAL.bg);
    document.querySelectorAll('.vm-btn').forEach(function(b) {
      b.classList.toggle('vm-active', b.dataset.mode === mode);
    });
    drawFrame(currentFrame);
  }

  function _buildStyleSwitcher() {
    var container = document.getElementById('styleSwitcher');
    if (!container) return;
    container.innerHTML = '';
    ['light', 'dark', 'cyberpunk'].forEach(function(mKey) {
      var m = VISUAL_MODES[mKey];
      var btn = document.createElement('button');
      btn.className = 'vm-btn' + (mKey === VISUAL_MODE ? ' vm-active' : '');
      btn.dataset.mode = mKey;
      btn.textContent = m.label;
      btn.addEventListener('click', function() { _applyVisualMode(mKey); });
      container.appendChild(btn);
    });
  }

  // --- Default background (mode-aware) ---
  function _defaultDrawBg(c, w, h) {
    var mc = _modeColors();
    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
    c.fillStyle = g; c.fillRect(0, 0, w, h);
    var gridColor = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/, '0.06)') : 'rgba(255,255,255,0.04)');
    c.strokeStyle = gridColor; c.lineWidth = mc.gridW;
    var step = VISUAL_MODE === 'light' ? 24 : 64;
    for (var x = 0; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
    for (var y = 0; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }
    if (mc.innerBorder) { c.strokeStyle = mc.innerBorderColor; c.lineWidth = 0.5; c.strokeRect(6, 6, w - 12, h - 12); }
    if (mc.topLine) {
      var tg = c.createLinearGradient(w * 0.15, 0, w * 0.85, 0);
      tg.addColorStop(0, 'transparent'); tg.addColorStop(0.4, mc.accent); tg.addColorStop(0.6, mc.accent); tg.addColorStop(1, 'transparent');
      c.strokeStyle = tg; c.lineWidth = 1; c.beginPath(); c.moveTo(0, 0.5); c.lineTo(w, 0.5); c.stroke();
    }
    if (mc.scanlines) { c.strokeStyle = 'rgba(255,255,255,0.025)'; c.lineWidth = 1; for (var sy = 0; sy < h; sy += 3) { c.beginPath(); c.moveTo(0, sy); c.lineTo(w, sy); c.stroke(); } }
    if (mc.cornerBrackets) {
      var bLen = Math.min(w, h) * 0.06;
      c.strokeStyle = mc.accent; c.lineWidth = 1.5; c.globalAlpha = 0.5;
      c.beginPath(); c.moveTo(8, 8 + bLen); c.lineTo(8, 8); c.lineTo(8 + bLen, 8); c.stroke();
      c.beginPath(); c.moveTo(w - 8 - bLen, 8); c.lineTo(w - 8, 8); c.lineTo(w - 8, 8 + bLen); c.stroke();
      c.beginPath(); c.moveTo(8, h - 8 - bLen); c.lineTo(8, h - 8); c.lineTo(8 + bLen, h - 8); c.stroke();
      c.beginPath(); c.moveTo(w - 8 - bLen, h - 8); c.lineTo(w - 8, h - 8); c.lineTo(w - 8, h - 8 + bLen); c.stroke();
      c.globalAlpha = 1;
    }
    if (mc.glow) {
      var rg = c.createRadialGradient(w * 0.5, h * 0.3, 0, w * 0.5, h * 0.3, w * 0.6);
      rg.addColorStop(0, PAL.glow || 'rgba(100,100,255,0.06)'); rg.addColorStop(1, 'transparent');
      c.fillStyle = rg; c.fillRect(0, 0, w, h);
    }
  }

  // --- Element drawing ---
  function drawElement(el) {
    if (!el || el.alpha <= 0.01) return;
    ctx.save();
    ctx.globalAlpha = el.alpha;
    if (typeof customDrawElement === 'function' && customDrawElement(ctx, el, _vw, _vh)) { ctx.restore(); return; }
    switch (el.type) {
      case 'label':
        ctx.fillStyle = el.color || _modeColors().text;
        var isBold = el.bold !== undefined ? el.bold : (el.size >= 14);
        ctx.font = (isBold ? 'bold ' : '') + (el.size || 12) + "px " + (isBold ? "'Space Grotesk','Inter','Noto Sans SC'" : "'Inter','Noto Sans SC'") + ",sans-serif";
        ctx.textAlign = el.align || 'center'; ctx.textBaseline = el.baseline || 'middle';
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = 10; }
        ctx.fillText(el.text, el.x, el.y);
        break;
      case 'text':
        ctx.fillStyle = el.color || _modeColors().dim;
        ctx.font = (el.size || 11) + "px 'Inter','Noto Sans SC',sans-serif";
        ctx.textAlign = el.align || 'left'; ctx.textBaseline = el.baseline || 'middle';
        ctx.fillText(el.text, el.x, el.y);
        break;
      case 'box':
        if (el.fill) { ctx.fillStyle = el.fill; ctx.fillRect(el.x, el.y, el.w, el.h); }
        if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.lineWidth || 1; ctx.strokeRect(el.x, el.y, el.w, el.h); }
        break;
      case 'circle':
        ctx.beginPath(); ctx.arc(el.x, el.y, el.r || 10, 0, Math.PI * 2);
        if (el.fill) { ctx.fillStyle = el.fill; ctx.fill(); }
        if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.lineWidth || 1; ctx.stroke(); }
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = el.glowSize || 12; ctx.fill(); ctx.shadowBlur = 0; }
        break;
      case 'arrow':
        _drawArrow(el.x1, el.y1, el.x2, el.y2, el.color || PAL.primary, el.lineWidth || 1.5, el.headSize || 6);
        break;
      case 'line':
        ctx.strokeStyle = el.color || PAL.muted; ctx.lineWidth = el.lineWidth || 1;
        if (el.dash) ctx.setLineDash(el.dash);
        ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
        if (el.dash) ctx.setLineDash([]);
        break;
      case 'gradient_box':
        var gb = ctx.createLinearGradient(el.x, el.y, el.x + el.w, el.y + el.h);
        gb.addColorStop(0, el.color1 || PAL.primary); gb.addColorStop(1, el.color2 || PAL.secondary);
        ctx.fillStyle = gb; ctx.fillRect(el.x, el.y, el.w, el.h);
        break;
      case 'custom':
        if (typeof el.draw === 'function') el.draw(ctx, el);
        break;
      default:
        if (typeof el.draw === 'function') el.draw(ctx, el);
        break;
    }
    ctx.restore();
  }

  function _drawArrow(x1, y1, x2, y2, color, lw, hs) {
    var angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.strokeStyle = color; ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.fillStyle = color; ctx.beginPath();

    ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
    ctx.fill();
  }

  // --- Content scaling ---
  function _contentTransform() {
    var s = H / REF_H;
    _vh = REF_H; _vw = W / s;
    if (_vw < REF_W) _vw = REF_W;
    return { s: s, ox: 0, oy: 0, vw: _vw, vh: _vh };

  function _applyContentScale(ct) { ctx.save(); ctx.scale(ct.s, ct.s); }

  // --- Frame rendering ---
  function drawFrame(f) {
    var bgFn = (typeof drawBg === 'function') ? drawBg : _defaultDrawBg;
    bgFn(ctx, W, H, VISUAL_MODE);
    var ct = _contentTransform();

    var elems = getFrameElements(f, ct.vw, ct.vh);
    elems.forEach(function (el) { drawElement(el); });
    ctx.restore();

  // --- Shared element transition ---
  function transitionTo(nf) {
    if (nf < 0) nf = 0;

    if (nf === currentFrame && !transitioning) { drawFrame(currentFrame); _updateHUD(currentFrame); return; }
    if (transitioning) return;
    var ct0 = _contentTransform();
    var oldElems = getFrameElements(currentFrame, ct0.vw, ct0.vh);
    var newElems = getFrameElements(nf, ct0.vw, ct0.vh);
    var oldMap = {}; oldElems.forEach(function (e) { oldMap[e.id] = e; });
    var newMap = {}; newElems.forEach(function (e) { newMap[e.id] = e; });
    currentFrame = nf; _updateHUD(nf); transitioning = true;
    var startTime = null, duration = 500;
    var bgFn = (typeof drawBg === 'function') ? drawBg : _defaultDrawBg;
    function step(ts) {
      if (!startTime) startTime = ts;
      var raw = Math.min((ts - startTime) / duration, 1);
      var p = easeInOut(raw);
      bgFn(ctx, W, H, VISUAL_MODE);
      var ct = _contentTransform(); _applyContentScale(ct);
      oldElems.forEach(function (oe) { if (!newMap[oe.id]) drawElement(merge(oe, { alpha: 1 - p })); });
      newElems.forEach(function (ne) {
        var oe = oldMap[ne.id];
        if (oe) {
          var merged = merge(ne, { x: lerp(oe.x||0,ne.x||0,p), y: lerp(oe.y||0,ne.y||0,p), w: lerp(oe.w||0,ne.w||0,p), h: lerp(oe.h||0,ne.h||0,p), r: lerp(oe.r||0,ne.r||0,p), alpha: 1 });
          if (ne.type === 'arrow' && oe.type === 'arrow') { merged.x1=lerp(oe.x1,ne.x1,p);merged.y1=lerp(oe.y1,ne.y1,p);merged.x2=lerp(oe.x2,ne.x2,p);merged.y2=lerp(oe.y2,ne.y2,p); }
          if (ne.type === 'line' && oe.type === 'line') { merged.x1=lerp(oe.x1,ne.x1,p);merged.y1=lerp(oe.y1,ne.y1,p);merged.x2=lerp(oe.x2,ne.x2,p);merged.y2=lerp(oe.y2,ne.y2,p); }
          if ((ne.type==='label'||ne.type==='text') && oe.text!==ne.text) { drawElement(merge(oe,{alpha:1-p}));drawElement(merge(ne,{alpha:p})); }
          else { drawElement(merged); }
        } else { drawElement(merge(ne, { alpha: p })); }
      });
      ctx.restore();
      if (raw < 1) requestAnimationFrame(step); else transitioning = false;
    }
    requestAnimationFrame(step);
  }

  // --- HUD ---
  function _updateHUD(f) {
    var cfg = window.CONFIG || {};
    var labels = cfg.hudLabels || []; var values = cfg.hudValues || [];
    for (var i = 0; i < 4; i++) {
      var lEl = document.getElementById('hudL' + (i + 1));
      var vEl = document.getElementById('hudV' + (i + 1));
      if (lEl && labels[i]) lEl.textContent = t(labels[i]);
      if (vEl && values[f] && values[f][i] !== undefined) { var val = values[f][i]; vEl.textContent = (typeof val === 'string' && I18N[val]) ? t(val) : val; }
    }
    var fi = document.getElementById('frameIndicator');
    if (fi) fi.textContent = (f + 1) + ' / ' + totalFrames;
  }

  // --- Guide panel ---
  function _buildGuide() {
    var cfg = window.CONFIG || {};
    var guideTitle = document.getElementById('guideTitle');
    var guideContent = document.getElementById('guideContent');
    if (!guideContent) return;
    if (guideTitle) guideTitle.textContent = t(cfg.guideTitle || 'guideDefault');
    var items = cfg.guideItems || [];
    var html = '<ul>'; items.forEach(function (key) { html += '<li>' + t(key) + '</li>'; }); html += '</ul>';
    guideContent.innerHTML = html;
  }

  // --- refreshI18N ---
  function refreshI18N() {
    var titleEl = document.getElementById('title');
    var subEl = document.getElementById('subtitle');
    if (titleEl) titleEl.textContent = t('title');
    if (subEl) subEl.textContent = t('subtitle');
    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var btnPlay = document.getElementById('btnPlay');
    if (btnPrev) btnPrev.textContent = t('btnPrev');
    if (btnNext) btnNext.textContent = t('btnNext');
    if (btnPlay) btnPlay.textContent = playing ? t('btnPause') : t('btnPlay');
    var langBtn = document.getElementById('langBtn');
    if (langBtn) langBtn.textContent = LANG.toUpperCase();
    _buildGuide(); _updateHUD(currentFrame); drawFrame(currentFrame);
  }

  // --- Resize ---
  function _resize() {
    var wrap = cv.parentElement;
    var rect = wrap.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    W = rect.width; H = rect.height;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    drawFrame(currentFrame);
  }

  // --- Play / Pause ---
  function _togglePlay() {
    if (playing) { playing = false; if (playTimer) clearTimeout(playTimer); document.getElementById('btnPlay').textContent = t('btnPlay'); return; }
    playing = true; document.getElementById('btnPlay').textContent = t('btnPause');
    function autoNext() {
      if (!playing) return;
      if (currentFrame < totalFrames - 1) { transitionTo(currentFrame + 1); playTimer = setTimeout(autoNext, 1800); }
      else { playing = false; document.getElementById('btnPlay').textContent = t('btnPlay'); }
    }
    if (currentFrame >= totalFrames - 1) { currentFrame = -1; }
    autoNext();
  }

  // --- Boot ---
  function boot() {
    var cfg = window.CONFIG || {};
    totalFrames = cfg.totalFrames || 4;
    if (cfg.style && PALETTES[cfg.style]) PAL = PALETTES[cfg.style];
    var root = document.documentElement;
    root.style.setProperty('--bg', PAL.bg); root.style.setProperty('--bg2', PAL.bg2);
    root.style.setProperty('--surface', PAL.surface); root.style.setProperty('--primary', PAL.primary);
    root.style.setProperty('--primary-dim', PAL.primaryDim); root.style.setProperty('--secondary', PAL.secondary);
    root.style.setProperty('--secondary-dim', PAL.secondaryDim); root.style.setProperty('--text', PAL.text);
    root.style.setProperty('--muted', PAL.muted); root.style.setProperty('--error', PAL.error);
    root.style.setProperty('--outline', PAL.outline); root.style.setProperty('--glow', PAL.glow);
    root.style.setProperty('--glow-strong', PAL.glowStrong); root.style.setProperty('--glass', PAL.glass);
    root.style.setProperty('--glass-blur', PAL.glassBlur + 'px'); root.style.setProperty('--radius', PAL.radius);
    _buildI18N(cfg);
    cv = document.getElementById('c'); ctx = cv.getContext('2d');
    if (cfg.visualMode && VISUAL_MODES[cfg.visualMode]) VISUAL_MODE = cfg.visualMode;
    _buildStyleSwitcher();
    var _m = VISUAL_MODES[VISUAL_MODE] || VISUAL_MODES.cyberpunk;
    var _r = document.documentElement;
    _r.style.setProperty('--sb-bg', _m.sidebarBg || 'rgba(5,6,15,0.92)');
    _r.style.setProperty('--sb-border', _m.sidebarBorder || (_m.canvasAccent || PAL.primary));
    _r.style.setProperty('--sb-text', _m.sidebarText || PAL.text);
    _r.style.setProperty('--sb-dim', _m.sidebarTextDim || PAL.muted);
    _r.style.setProperty('--sb-mute', _m.sidebarTextMute || PAL.muted);
    _r.style.setProperty('--sb-accent', _m.sidebarAccent || PAL.primary);
    _r.style.setProperty('--sb-btn-bg', _m.sidebarBtnBg || 'transparent');
    _r.style.setProperty('--sb-btn-bd', _m.sidebarBtnBorder || 'transparent');
    _r.style.setProperty('--hud-bg', _m.hudBg || 'rgba(5,6,15,0.9)');
    _r.style.setProperty('--hud-border', _m.hudBorder || 'transparent');
    _r.style.setProperty('--hud-label', _m.hudLabel || PAL.muted);
    _r.style.setProperty('--hud-value', _m.hudValue || PAL.text);
    _r.style.setProperty('--ctrl-bg', _m.ctrlBg || PAL.primary);
    _r.style.setProperty('--ctrl-color', _m.ctrlColor || PAL.bg);
    window.addEventListener('resize', _resize);
    setTimeout(_resize, 200); setTimeout(_resize, 600);
    document.fonts.ready.then(function () { _resize(); });
    var langBtn = document.getElementById('langBtn');
    if (langBtn) langBtn.addEventListener('click', function () { LANG = LANG === 'en' ? 'cn' : 'en'; refreshI18N(); });
    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var btnPlay = document.getElementById('btnPlay');
    if (btnPrev) btnPrev.addEventListener('click', function () { if (playing) { playing = false; if (playTimer) clearTimeout(playTimer); } transitionTo(currentFrame - 1); });
    if (btnNext) btnNext.addEventListener('click', function () { if (playing) { playing = false; if (playTimer) clearTimeout(playTimer); } transitionTo(currentFrame + 1); });
    if (btnPlay) btnPlay.addEventListener('click', _togglePlay);

    if (typeof onReady === 'function') onReady();
  }

  return {
    boot: boot, t: t, lerp: lerp, interpolate: interpolate, easeInOut: easeInOut,

    transitionTo: transitionTo, refreshI18N: refreshI18N,
    get PAL() { return PAL; }, get W() { return _vw; }, get H() { return _vh; },
    get ctx() { return ctx; }, get currentFrame() { return currentFrame; },
    get totalFrames() { return totalFrames; }, get LANG() { return LANG; },
    get _lang() { return LANG; }, get lang() { return LANG; },

  };
})();

<script>
// ============================================================
// CONFIG
// ============================================================
var CONFIG = {
  style: 'mech',
  totalFrames: 5,
  i18n: {
    title:    {en:'THREE SHAPES OF PATH', cn:'\u8def\u5f84\u7684\u4e09\u79cd\u5f62\u72b6'},
    subtitle: {en:'From A to B, different lines', cn:'\u4ece A \u5230 B\uff0c\u8d70\u7ebf\u4e0d\u540c'},
    frame0sub: {en:'How many ways can you go from A to B?', cn:'\u4ece A \u5230 B\uff0c\u6709\u591a\u5c11\u79cd\u8d70\u6cd5\uff1f'},
    straightLabel: {en:'Straight Line', cn:'\u76f4\u7ebf'},
    straightDesc:  {en:'Shortest distance, no turning', cn:'\u6700\u77ed\u8ddd\u79bb\uff0c\u4e0d\u8f6c\u5f2f'},
    curvedLabel:   {en:'Curved Arc', cn:'\u5f27\u7ebf'},

    compareLabel:  {en:'All Three Paths', cn:'\u4e09\u79cd\u8def\u5f84\u5bf9\u6bd4'},
    compareDesc:   {en:'Same start and end, different routes', cn:'\u540c\u6837\u7684\u8d77\u70b9\u548c\u7ec8\u70b9\uff0c\u4e0d\u540c\u7684\u8def\u7ebf'},
    markerA: {en:'A', cn:'A'},
    markerB: {en:'B', cn:'B'},
    direction: {en:'Direction', cn:'\u65b9\u5411'},
    hudType:   {en:'TYPE', cn:'\u7c7b\u578b'},
    hudTurns:  {en:'TURNS', cn:'\u8f6c\u5f2f\u6570'},
    hudShape:  {en:'SHAPE', cn:'\u5f62\u72b6'},

    g2: {en:'Notice the trail it leaves behind', cn:'\u6ce8\u610f\u5b83\u7559\u4e0b\u7684\u8f68\u8ff9'},

    vStraight: {en:'STRAIGHT', cn:'\u76f4\u7ebf'},

    ['--', '--', '--', '0'],
    ['vStraight', '0', 'vStraight', '1'],
    ['vCurved', '1', 'vCurved', '2'],
    ['vZigzag', '3', 'vZigzag', '3'],
    ['vAll', '--', 'vAll', '4'],
  ],
  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

// ============================================================
// Animation state for ball motion
// ============================================================
var _animT = 0;
var _animRunning = false;
var _animRaf = null;
var _lastFrameForAnim = -1;

function startBallAnim() {
  _animT = 0;
  _animRunning = true;
  if (_animRaf) cancelAnimationFrame(_animRaf);
  var last = performance.now();
  function tick(now) {
    var dt = (now - last) / 1000;
    last = now;
    _animT = Math.min(_animT + dt * 0.4, 1);
    AnimRuntime.drawFrame(AnimRuntime.currentFrame);
    if (_animT < 1 && _animRunning) _animRaf = requestAnimationFrame(tick);
    else _animRunning = false;
  }
  _animRaf = requestAnimationFrame(tick);
}

function onReady() {
  // Start ball animation when frame changes
  var origTransition = AnimRuntime.transitionTo;
  // Watch for frame changes via polling
  setInterval(function() {
    if (AnimRuntime.currentFrame !== _lastFrameForAnim) {
      _lastFrameForAnim = AnimRuntime.currentFrame;
      if (_lastFrameForAnim > 0) startBallAnim();
    }
  }, 100);
}

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var MC = AnimRuntime.modeColors;
  var cx = W / 2, cy = H / 2;

  // Common positions for A and B markers
  var ax = W * 0.15, ay = H * 0.55;
  var bx = W * 0.85, by = H * 0.55;

  // Ball position along path based on _animT
  var ballProgress = Math.min(_animT, 1);

  if (f === 0) {
    // Title frame
    return [
      {id:'title0', type:'label', text:t('title'), x:cx, y:cy - 50, color:P.primary, size:22, align:'center', glow:P.glowStrong},
      {id:'sub0', type:'label', text:t('subtitle'), x:cx, y:cy - 15, color:MC.dim, size:14, align:'center'},
      {id:'desc0', type:'text', text:t('frame0sub'), x:cx, y:cy + 30, color:MC.mute, size:12, align:'center'},
      // Decorative dots for the three path types
      {id:'dot1', type:'circle', x:cx - 80, y:cy + 80, r:6, fill:P.primary, glow:P.glowStrong},
      {id:'dot1l', type:'text', text:t('straightLabel'), x:cx - 80, y:cy + 100, color:MC.dim, size:10, align:'center'},
      {id:'dot2', type:'circle', x:cx, y:cy + 80, r:6, fill:P.secondary, glow:P.glowStrong},
      {id:'dot2l', type:'text', text:t('curvedLabel'), x:cx, y:cy + 100, color:MC.dim, size:10, align:'center'},
      {id:'dot3', type:'circle', x:cx + 80, y:cy + 80, r:6, fill:P.tertiary, glow:P.glowStrong},
      {id:'dot3l', type:'text', text:t('zigzagLabel'), x:cx + 80, y:cy + 100, color:MC.dim, size:10, align:'center'},
    ];
  }

  if (f === 1) {
    // Straight line path
    var bp = easeProgress(ballProgress);
    var ballX = ax + (bx - ax) * bp;
    var ballY = ay;
    var els = [
      {id:'fLabel', type:'label', text:t('straightLabel'), x:cx, y:35, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'fDesc', type:'text', text:t('straightDesc'), x:cx, y:55, color:MC.dim, size:11, align:'center'},
      // A and B markers
      {id:'markerA', type:'custom', x:ax, y:ay, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'A', P.primary, MC); }},
      {id:'markerB', type:'custom', x:bx, y:by, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'B', P.primary, MC); }},
      // Dotted trail
      {id:'trail1', type:'custom', draw: function(c) {
        drawDottedStraight(c, ax, ay, bx, by, P.primary, bp);
      }},
      // Direction arrow at midpoint
      {id:'dirArrow', type:'arrow', x1:cx - 40, y1:ay, x2:cx + 40, y2:ay, color:P.primary, lineWidth:2, headSize:10},
      // Ball
      {id:'ball', type:'circle', x:ballX, y:ballY, r:8, fill:P.primary, glow:P.glowStrong},
    ];
    return els;
  }

  if (f === 2) {
    // Curved arc path
    var bp2 = easeProgress(ballProgress);
    // Quadratic bezier from A to B with peak
    var peakY = ay - H * 0.35;
    var ctrlX = cx, ctrlY = peakY;
    var bpx = quadBezierX(ax, ctrlX, bx, bp2);
    var bpy = quadBezierY(ay, ctrlY, by, bp2);
    return [
      {id:'fLabel', type:'label', text:t('curvedLabel'), x:cx, y:35, color:P.secondary, size:16, align:'center', glow:P.glowStrong},
      {id:'fDesc', type:'text', text:t('curvedDesc'), x:cx, y:55, color:MC.dim, size:11, align:'center'},
      {id:'markerA', type:'custom', x:ax, y:ay, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'A', P.secondary, MC); }},
      {id:'markerB', type:'custom', x:bx, y:by, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'B', P.secondary, MC); }},
      {id:'trail2', type:'custom', draw: function(c) {
        drawDottedCurve(c, ax, ay, ctrlX, ctrlY, bx, by, P.secondary, bp2);
      }},
      // Direction arrow along curve tangent at midpoint
      {id:'dirArrow', type:'custom', draw: function(c) {
        var t1 = 0.45, t2 = 0.55;
        var x1 = quadBezierX(ax, ctrlX, bx, t1), y1 = quadBezierY(ay, ctrlY, by, t1);
        var x2 = quadBezierX(ax, ctrlX, bx, t2), y2 = quadBezierY(ay, ctrlY, by, t2);
        drawArrowHead(c, x1, y1, x2, y2, P.secondary, 2, 10);
      }},
      {id:'ball', type:'circle', x:bpx, y:bpy, r:8, fill:P.secondary, glow:P.glowStrong},
    ];
  }

  if (f === 3) {
    // Zigzag path
    var bp3 = easeProgress(ballProgress);
    // Zigzag waypoints
    var zPoints = [
      {x:ax, y:ay},
      {x:ax + (bx-ax)*0.25, y:ay - H*0.28},
      {x:ax + (bx-ax)*0.5, y:ay + H*0.12},
      {x:ax + (bx-ax)*0.75, y:ay - H*0.22},
      {x:bx, y:by},
    ];
    var zPos = getPointOnZigzag(zPoints, bp3);
    return [
      {id:'fLabel', type:'label', text:t('zigzagLabel'), x:cx, y:35, color:P.tertiary, size:16, align:'center', glow:P.glowStrong},
      {id:'fDesc', type:'text', text:t('zigzagDesc'), x:cx, y:55, color:MC.dim, size:11, align:'center'},
      {id:'markerA', type:'custom', x:ax, y:ay, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'A', P.tertiary, MC); }},
      {id:'markerB', type:'custom', x:bx, y:by, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'B', P.tertiary, MC); }},
      {id:'trail3', type:'custom', draw: function(c) {
        drawDottedZigzag(c, zPoints, P.tertiary, bp3);
      }},
      // Direction arrows at each segment midpoint
      {id:'dirArrow', type:'custom', draw: function(c) {
        for (var i = 0; i < zPoints.length - 1; i++) {
          var mx = (zPoints[i].x + zPoints[i+1].x) / 2;
          var my = (zPoints[i].y + zPoints[i+1].y) / 2;
          drawArrowHead(c, zPoints[i].x, zPoints[i].y, zPoints[i+1].x, zPoints[i+1].y, P.tertiary, 1.5, 8);
        }
      }},
      // Bounce walls
      {id:'walls', type:'custom', draw: function(c) {
        c.strokeStyle = MC.strokeDim; c.lineWidth = 1; c.setLineDash([4,4]);
        // Top wall
        c.beginPath(); c.moveTo(ax, ay - H*0.32); c.lineTo(bx, ay - H*0.32); c.stroke();
        // Bottom wall
        c.beginPath(); c.moveTo(ax, ay + H*0.16); c.lineTo(bx, ay + H*0.16); c.stroke();
        c.setLineDash([]);
      }},
      {id:'ball', type:'circle', x:zPos.x, y:zPos.y, r:8, fill:P.tertiary, glow:P.glowStrong},
    ];
  }

  if (f === 4) {
    // Comparison frame - all three paths overlaid
    var peakY4 = ay - H * 0.35;
    var ctrlX4 = cx, ctrlY4 = peakY4;
    var zPoints4 = [
      {x:ax, y:ay},
      {x:ax + (bx-ax)*0.25, y:ay - H*0.28},
      {x:ax + (bx-ax)*0.5, y:ay + H*0.12},
      {x:ax + (bx-ax)*0.75, y:ay - H*0.22},
      {x:bx, y:by},
    ];
    return [
      {id:'fLabel', type:'label', text:t('compareLabel'), x:cx, y:35, color:MC.text, size:16, align:'center'},
      {id:'fDesc', type:'text', text:t('compareDesc'), x:cx, y:55, color:MC.dim, size:11, align:'center'},
      {id:'markerA', type:'custom', x:ax, y:ay, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'A', MC.text, MC); }},
      {id:'markerB', type:'custom', x:bx, y:by, draw: function(c, el) { drawEndpoint(c, el.x, el.y, 'B', MC.text, MC); }},
      // All three trails
      {id:'trail1c', type:'custom', draw: function(c) {
        drawDottedStraight(c, ax, ay, bx, by, P.primary, 1);
      }},
      {id:'trail2c', type:'custom', draw: function(c) {
        drawDottedCurve(c, ax, ay, ctrlX4, ctrlY4, bx, by, P.secondary, 1);
      }},
      {id:'trail3c', type:'custom', draw: function(c) {
        drawDottedZigzag(c, zPoints4, P.tertiary, 1);
      }},
      // Labels for each path
      {id:'lab1', type:'text', text:t('straightLabel'), x:cx, y:ay + 18, color:P.primary, size:10, align:'center'},
      {id:'lab2', type:'text', text:t('curvedLabel'), x:cx, y:peakY4 - 12, color:P.secondary, size:10, align:'center'},
      {id:'lab3', type:'text', text:t('zigzagLabel'), x:cx + 60, y:ay - H*0.06, color:P.tertiary, size:10, align:'center'},
    ];
  }

  return [];
}

// ============================================================
// Helper functions
// ============================================================

function easeProgress(p) {
  // Smooth ease-in-out
  return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
}

function drawEndpoint(c, x, y, label, color, MC) {
  // Outer glow ring
  c.beginPath(); c.arc(x, y, 14, 0, Math.PI * 2);
  c.fillStyle = color.replace ? color : 'rgba(255,200,100,0.15)';
  c.globalAlpha = 0.2; c.fill(); c.globalAlpha = 1;
  // Solid circle
  c.beginPath(); c.arc(x, y, 10, 0, Math.PI * 2);
  c.fillStyle = color; c.fill();
  // Label
  c.fillStyle = MC.bg1 || '#05060f';
  c.font = "bold 12px 'JetBrains Mono',monospace";
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, x, y);
}

function drawDottedStraight(c, x1, y1, x2, y2, color, progress) {
  c.save();
  c.strokeStyle = color;
  c.lineWidth = 2.5;
  c.setLineDash([6, 8]);
  c.globalAlpha = 0.7;
  c.beginPath();
  c.moveTo(x1, y1);
  var ex = x1 + (x2 - x1) * progress;
  var ey = y1 + (y2 - y1) * progress;
  c.lineTo(ex, ey);
  c.stroke();
  c.setLineDash([]);
  c.restore();
}

function quadBezierX(x0, cx, x1, t) {
  return (1-t)*(1-t)*x0 + 2*(1-t)*t*cx + t*t*x1;
}
function quadBezierY(y0, cy, y1, t) {
  return (1-t)*(1-t)*y0 + 2*(1-t)*t*cy + t*t*y1;
}

function drawDottedCurve(c, x1, y1, ctrlX, ctrlY, x2, y2, color, progress) {
  c.save();
  c.strokeStyle = color;
  c.lineWidth = 2.5;
  c.setLineDash([6, 8]);
  c.globalAlpha = 0.7;
  c.beginPath();
  c.moveTo(x1, y1);
  var steps = Math.floor(60 * progress);
  for (var i = 1; i <= steps; i++) {
    var tt = (i / 60);
    c.lineTo(quadBezierX(x1, ctrlX, x2, tt), quadBezierY(y1, ctrlY, y2, tt));
  }
  c.stroke();
  c.setLineDash([]);
  c.restore();
}

function drawDottedZigzag(c, points, color, progress) {
  c.save();
  c.strokeStyle = color;
  c.lineWidth = 2.5;
  c.setLineDash([6, 8]);
  c.globalAlpha = 0.7;
  // Compute total length
  var segs = [];
  var totalLen = 0;
  for (var i = 0; i < points.length - 1; i++) {
    var dx = points[i+1].x - points[i].x;
    var dy = points[i+1].y - points[i].y;
    var len = Math.sqrt(dx*dx + dy*dy);
    segs.push(len);
    totalLen += len;
  }
  var drawLen = totalLen * progress;
  c.beginPath();
  c.moveTo(points[0].x, points[0].y);
  var accumulated = 0;
  for (var j = 0; j < segs.length; j++) {
    if (accumulated + segs[j] <= drawLen) {
      c.lineTo(points[j+1].x, points[j+1].y);
      accumulated += segs[j];
    } else {
      var remaining = drawLen - accumulated;
      var frac = remaining / segs[j];
      var ex = points[j].x + (points[j+1].x - points[j].x) * frac;
      var ey = points[j].y + (points[j+1].y - points[j].y) * frac;
      c.lineTo(ex, ey);
      break;
    }
  }
  c.stroke();
  c.setLineDash([]);
  c.restore();
}

function getPointOnZigzag(points, progress) {
  var segs = [];
  var totalLen = 0;
  for (var i = 0; i < points.length - 1; i++) {
    var dx = points[i+1].x - points[i].x;
    var dy = points[i+1].y - points[i].y;
    segs.push(Math.sqrt(dx*dx + dy*dy));
    totalLen += segs[i];
  }
  var target = totalLen * progress;
  var accumulated = 0;
  for (var j = 0; j < segs.length; j++) {
    if (accumulated + segs[j] >= target) {
      var frac = (target - accumulated) / segs[j];
      return {
        x: points[j].x + (points[j+1].x - points[j].x) * frac,
        y: points[j].y + (points[j+1].y - points[j].y) * frac,
      };
    }
    accumulated += segs[j];
  }
  return points[points.length - 1];
}

function drawArrowHead(c, x1, y1, x2, y2, color, lw, hs) {
  var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  var angle = Math.atan2(y2 - y1, x2 - x1);
  c.save();
  c.fillStyle = color;
  c.globalAlpha = 0.6;
  c.beginPath();
  c.moveTo(mx + hs * Math.cos(angle), my + hs * Math.sin(angle));
  c.lineTo(mx - hs * 0.6 * Math.cos(angle - 0.5), my - hs * 0.6 * Math.sin(angle - 0.5));
  c.lineTo(mx - hs * 0.6 * Math.cos(angle + 0.5), my - hs * 0.6 * Math.sin(angle + 0.5));
  c.closePath();
  c.fill();
  c.restore();
}

AnimRuntime.boot();
