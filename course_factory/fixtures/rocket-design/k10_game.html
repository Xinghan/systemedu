<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.plane-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:6px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:3px;transition:all 0.2s;}
.plane-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.plane-btn.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(167,139,250,0.12);}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">WIND TUNNEL LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="planeLabel">SELECT PLANE</div>
    <button class="plane-btn active" id="btnDart" data-plane="dart">CLASSIC DART</button>
    <button class="plane-btn" id="btnGlider" data-plane="glider">WIDE GLIDER</button>
    <button class="plane-btn" id="btnSpeed" data-plane="speed">SPEED NEEDLE</button>
    <div class="sidebar-divider"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">WIND TUNNEL LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">TYPE</div><div class="hud-val" id="hudV1">DART</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">ANGLE</div><div class="hud-val" id="hudV2">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">POWER</div><div class="hud-val" id="hudV3">0%</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">DIST</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">BEST</div><div class="hud-val" id="hudV5">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">DRAG TO AIM, HOLD TO CHARGE</span>
      <span class="status-val" id="statusTrials">0 / 9</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'WIND TUNNEL LAB', cn:'\u98ce\u6d1e\u5b9e\u9a8c\u5ba4'},
  subtitle:    {en:'Space Station Test Chamber', cn:'\u592a\u7a7a\u7ad9\u6d4b\u8bd5\u8231'},
  guide:       {en:'GUIDE', cn:'\u6307\u5357'},
  guideText:   {en:'Select a plane type, drag to aim, hold to charge power, release to launch. Complete 3 flights per type (9 total).', cn:'\u9009\u62e9\u673a\u578b\uff0c\u62d6\u62fd\u8c03\u6574\u89d2\u5ea6\uff0c\u6309\u4f4f\u84c4\u529b\uff0c\u677e\u624b\u53d1\u5c04\u3002\u6bcf\u6b3e3\u6b21\uff0c\u5171\u98de9\u6b21\u3002'},
  selectPlane: {en:'SELECT PLANE', cn:'\u9009\u62e9\u673a\u578b'},
  dart:        {en:'CLASSIC DART', cn:'\u7ecf\u5178\u98de\u9556'},
  glider:      {en:'WIDE GLIDER', cn:'\u5bbd\u7ffc\u6ed1\u7fd4'},
  speed:       {en:'SPEED NEEDLE', cn:'\u5c16\u5934\u7ade\u901f'},
  type:        {en:'TYPE', cn:'\u673a\u578b'},
  angle:       {en:'ANGLE', cn:'\u89d2\u5ea6'},
  power:       {en:'POWER', cn:'\u529b\u5ea6'},
  dist:        {en:'DIST', cn:'\u8ddd\u79bb'},
  best:        {en:'BEST', cn:'\u6700\u8fdc'},
  dragToAim:   {en:'DRAG TO AIM, HOLD TO CHARGE', cn:'\u62d6\u62fd\u7784\u51c6\uff0c\u6309\u4f4f\u84c4\u529b'},
  charging:    {en:'CHARGING...', cn:'\u84c4\u529b\u4e2d...'},
  flying:      {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  landed:      {en:'LANDED!', cn:'\u843d\u5730\uff01'},
  complete:    {en:'ALL 9 FLIGHTS COMPLETE!', cn:'\u51689\u6b21\u8bd5\u98de\u5b8c\u6210\uff01'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  results:     {en:'RESULTS', cn:'\u7ed3\u679c'},
  avgDist:     {en:'AVG', cn:'\u5e73\u5747'},
  trials:      {en:'TRIALS', cn:'\u8bd5\u98de'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('planeLabel').textContent = t('selectPlane');
  document.getElementById('btnDart').textContent = t('dart');
  document.getElementById('btnGlider').textContent = t('glider');
  document.getElementById('btnSpeed').textContent = t('speed');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('type');
  document.getElementById('hudL2').textContent = t('angle');
  document.getElementById('hudL3').textContent = t('power');
  document.getElementById('hudL4').textContent = t('dist');
  document.getElementById('hudL5').textContent = t('best');
  updateStatusBar();
}

// ================================================================
// Game state
// ================================================================
var PLANES = {
  dart:   {lift:0.35, drag:0.025, mass:5, wobble:0.02, label:'DART'},
  glider: {lift:0.55, drag:0.020, mass:4, wobble:0.01, label:'GLIDER'},
  speed:  {lift:0.20, drag:0.018, mass:6, wobble:0.06, label:'SPEED'},
};

var selectedPlane = 'dart';
var launchAngle = 15;       // degrees
var launchPower = 0;        // 0-1
var isCharging = false;
var isFlying = false;
var isDragging = false;
var showResults = false;

// Flight simulation state
var planeX = 0, planeY = 0, velX = 0, velY = 0;
var flightTrail = [];
var trailParticles = [];
var launchParticles = [];

// Trial tracking
var trialData = {dart:[], glider:[], speed:[]};
var totalTrials = 0;
var lastDist = 0;
var bestDist = 0;

// Star field
var starField = [];
for (var si=0; si<30; si++) {
  starField.push({x:Math.random(), y:Math.random(), r:0.3+Math.random()*1, a:0.2+Math.random()*0.5, sp:0.5+Math.random()*1.5});
}

// Canvas
var canvas, c2d, cw, ch;
var animId = null;

// Launch position (computed from canvas size)
var launchX, launchBaseY;

// ================================================================
// Corner ticks
// ================================================================
function drawCornerTicks(c, x, y, w, h, color) {
  c.strokeStyle = color; c.lineWidth = 1; c.globalAlpha = 0.5;
  var s = 10;
  c.beginPath(); c.moveTo(x+8, y+8); c.lineTo(x+8, y+8+s); c.stroke();
  c.beginPath(); c.moveTo(x+8, y+8); c.lineTo(x+8+s, y+8); c.stroke();
  c.beginPath(); c.moveTo(x+w-8, y+h-8); c.lineTo(x+w-8, y+h-8-s); c.stroke();
  c.beginPath(); c.moveTo(x+w-8, y+h-8); c.lineTo(x+w-8-s, y+h-8); c.stroke();
  c.globalAlpha = 1;
}

// ================================================================
// Easing
// ================================================================
function easeOutCubic(x) { return 1 - Math.pow(1-x, 3); }

// ================================================================
// Drawing helpers
// ================================================================
function drawPlaneShape(c, px, py, scale, angle, type, mc) {
  c.save();
  c.translate(px, py);
  c.rotate(angle);
  c.scale(scale, scale);

  var fillC = 'rgba(167,139,250,0.15)';
  var strokeC = ACCENT;

  if (type === 'dart') {
    c.beginPath();
    c.moveTo(40, 0);
    c.lineTo(-25, -18);
    c.lineTo(-15, 0);
    c.lineTo(-25, 18);
    c.closePath();
  } else if (type === 'glider') {
    c.beginPath();
    c.moveTo(30, 0);
    c.lineTo(-10, -28);
    c.lineTo(-30, -25);
    c.lineTo(-20, 0);
    c.lineTo(-30, 25);
    c.lineTo(-10, 28);
    c.closePath();
    fillC = 'rgba(167,139,250,0.12)';
  } else {
    c.beginPath();
    c.moveTo(50, 0);
    c.lineTo(-15, -12);
    c.lineTo(-25, -10);
    c.lineTo(-18, 0);
    c.lineTo(-25, 10);
    c.lineTo(-15, 12);
    c.closePath();
    fillC = 'rgba(167,139,250,0.18)';
  }

  c.fillStyle = fillC;
  c.fill();
  c.strokeStyle = strokeC;
  c.lineWidth = 1.2;
  c.stroke();

  // Center fold
  c.strokeStyle = strokeC;
  c.lineWidth = 0.6;
  c.globalAlpha = 0.5;
  c.beginPath();
  if (type === 'dart') { c.moveTo(40,0); c.lineTo(-15,0); }
  else if (type === 'glider') { c.moveTo(30,0); c.lineTo(-20,0); }
  else { c.moveTo(50,0); c.lineTo(-18,0); }
  c.stroke();
  c.globalAlpha = 1;

  c.restore();
}

function drawStationWindow(c, w, h, mc) {
  // Window frame at top-right -- stars visible outside
  var wx = w * 0.7, wy = 15, ww = w * 0.25, wh = h * 0.25;
  c.fillStyle = 'rgba(10,10,30,0.5)';
  c.fillRect(wx, wy, ww, wh);
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.strokeRect(wx, wy, ww, wh);
  // Stars through window
  var now = Date.now() * 0.001;
  for (var i=0; i<starField.length; i++) {
    var st = starField[i];
    var sx = wx + st.x * ww;
    var sy = wy + st.y * wh;
    if (sx > wx && sx < wx+ww && sy > wy && sy < wy+wh) {
      var twinkle = 0.5+0.5*Math.sin(now*st.sp+i);
      c.globalAlpha = st.a * twinkle;
      c.fillStyle = (i%5===0) ? 'oklch(0.85 0.14 85)' : '#e2e8f0';
      c.beginPath(); c.arc(sx, sy, st.r, 0, Math.PI*2); c.fill();
    }
  }
  c.globalAlpha = 1;
  // Window cross frame
  c.strokeStyle = mc.strokeDim; c.lineWidth = 0.5;
  c.beginPath(); c.moveTo(wx+ww/2, wy); c.lineTo(wx+ww/2, wy+wh); c.stroke();
  c.beginPath(); c.moveTo(wx, wy+wh/2); c.lineTo(wx+ww, wy+wh/2); c.stroke();
}

function drawFloor(c, w, h, mc) {
  var floorY = h * 0.78;
  // Floor line
  c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
  c.beginPath(); c.moveTo(0, floorY); c.lineTo(w, floorY); c.stroke();
  // Distance markers
  c.font = "8px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'center';
  var step = w / 10;
  for (var i=1; i<10; i++) {
    var mx = i * step;
    c.globalAlpha = 0.3;
    c.beginPath(); c.moveTo(mx, floorY); c.lineTo(mx, floorY+6); c.stroke();
    c.globalAlpha = 0.5;
    c.fillText((i*2)+'m', mx, floorY+14);
  }
  c.globalAlpha = 1;
  return floorY;
}

function drawLaunchPad(c, lx, ly, mc) {
  // Launch platform
  c.fillStyle = 'rgba(167,139,250,0.1)';
  c.fillRect(lx-15, ly-3, 30, 6);
  c.strokeStyle = ACCENT; c.lineWidth = 1;
  c.strokeRect(lx-15, ly-3, 30, 6);
}

function drawAimLine(c, lx, ly, angleDeg) {
  var rad = -angleDeg * Math.PI / 180;
  var len = 80;
  var ex = lx + len * Math.cos(rad);
  var ey = ly + len * Math.sin(rad);
  c.strokeStyle = ACCENT; c.lineWidth = 1;
  c.setLineDash([3, 3]);
  c.beginPath(); c.moveTo(lx, ly); c.lineTo(ex, ey); c.stroke();
  c.setLineDash([]);
  // Arrowhead
  var angle = Math.atan2(ey-ly, ex-lx);
  c.fillStyle = ACCENT;
  c.beginPath();
  c.moveTo(ex, ey);
  c.lineTo(ex - 6*Math.cos(angle-0.4), ey - 6*Math.sin(angle-0.4));
  c.lineTo(ex - 6*Math.cos(angle+0.4), ey - 6*Math.sin(angle+0.4));
  c.fill();
  // Angle label
  c.font = "10px 'JetBrains Mono',monospace";
  c.fillStyle = ACCENT; c.textAlign = 'left';
  c.fillText(angleDeg.toFixed(0) + '\u00b0', lx+15, ly-25);
}

function drawPowerBar(c, lx, ly, pwr) {
  var barW = 8, barH = 60;
  var bx = lx - 35, by = ly - barH - 10;
  c.strokeStyle = 'rgba(167,139,250,0.3)'; c.lineWidth = 1;
  c.strokeRect(bx, by, barW, barH);
  var fillH = barH * pwr;
  var grad = c.createLinearGradient(bx, by+barH, bx, by);
  grad.addColorStop(0, ACCENT);
  grad.addColorStop(1, 'oklch(0.85 0.14 85)');
  c.fillStyle = grad;
  c.fillRect(bx, by+barH-fillH, barW, fillH);
  // Glow at top
  if (pwr > 0.1) {
    c.shadowColor = ACCENT; c.shadowBlur = 8;
    c.fillRect(bx, by+barH-fillH, barW, 2);
    c.shadowBlur = 0;
  }
}

// ================================================================
// Particles
// ================================================================
function spawnLaunchParticles(x, y) {
  for (var i=0; i<10; i++) {
    var isGold = (i%4 === 0);
    launchParticles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*4,
      vy: (Math.random()-0.5)*4 - 2,
      life: 1,
      decay: 0.015 + Math.random()*0.02,
      r: 1.5 + Math.random()*2,
      color: isGold ? 'oklch(0.85 0.14 85)' : ACCENT,
    });
  }
}

function spawnTrailParticle(x, y) {
  if (Math.random() > 0.3) return;
  trailParticles.push({
    x: x + (Math.random()-0.5)*4,
    y: y + (Math.random()-0.5)*4,
    life: 1,
    decay: 0.03 + Math.random()*0.02,
    r: 0.5 + Math.random()*1.5,
    color: (Math.random()<0.2) ? 'oklch(0.85 0.14 85)' : ACCENT,
  });
}

function updateParticles(arr) {
  for (var i=arr.length-1; i>=0; i--) {
    var p = arr[i];
    p.life -= p.decay;
    if (p.vx !== undefined) { p.x += p.vx; p.vy += 0.1; p.y += p.vy; }
    if (p.life <= 0) arr.splice(i, 1);
  }
}

function drawParticles(c, arr) {
  for (var i=0; i<arr.length; i++) {
    var p = arr[i];
    c.globalAlpha = p.life * 0.8;
    c.fillStyle = p.color;
    c.beginPath(); c.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); c.fill();
  }
  c.globalAlpha = 1;
}

// ================================================================
// Flight simulation
// ================================================================
var GRAVITY = 0.15;
var DT = 1;
var SCALE_FACTOR = 1; // px per sim unit

function startFlight() {
  var spec = PLANES[selectedPlane];
  var rad = -launchAngle * Math.PI / 180;
  var v0 = launchPower * 15 + 3;  // initial speed
  planeX = launchX;
  planeY = launchBaseY;
  velX = v0 * Math.cos(rad);
  velY = v0 * Math.sin(rad);
  flightTrail = [{x:planeX, y:planeY}];
  isFlying = true;
  isCharging = false;
  spawnLaunchParticles(launchX, launchBaseY);
}

function updateFlight() {
  if (!isFlying) return;
  var spec = PLANES[selectedPlane];
  var speed = Math.sqrt(velX*velX + velY*velY);
  if (speed < 0.01) speed = 0.01;

  // Drag
  var dragForce = spec.drag * speed * speed;
  var dx = -velX/speed * dragForce;
  var dy = -velY/speed * dragForce;

  // Lift (perpendicular to velocity, upward component)
  var liftMag = spec.lift * speed;
  var liftX = (velY/speed) * liftMag;
  var liftY = (-velX/speed) * liftMag;
  // Only upward lift when moving forward
  if (velX > 0 && liftY > 0) liftY = -liftY;
  if (velX > 0 && liftY > 0) liftY = 0;

  // Wobble
  dx += (Math.random()-0.5) * spec.wobble * speed;
  dy += (Math.random()-0.5) * spec.wobble * speed;

  // Apply forces
  velX += (dx + liftX) / spec.mass * DT;
  velY += (dy + liftY + GRAVITY * spec.mass) / spec.mass * DT;

  planeX += velX * DT * SCALE_FACTOR;
  planeY += velY * DT * SCALE_FACTOR;

  flightTrail.push({x:planeX, y:planeY});
  spawnTrailParticle(planeX, planeY);

  // Check landing
  if (planeY >= launchBaseY && flightTrail.length > 5) {
    planeY = launchBaseY;
    isFlying = false;
    // Calculate distance
    var distPx = planeX - launchX;
    var distM = Math.max(0, distPx / (cw / 20));
    lastDist = distM;
    trialData[selectedPlane].push(distM);
    totalTrials++;
    if (distM > bestDist) bestDist = distM;
    updateHUD();
    updateStatusBar();

    if (totalTrials >= 9) {
      showResults = true;
    }
  }
}

// ================================================================
// Results panel
// ================================================================
function drawResultsPanel(c, w, h, mc) {
  var pw = w * 0.7, ph = h * 0.6;
  var px = (w-pw)/2, py = (h-ph)/2;

  c.fillStyle = 'rgba(5,6,15,0.9)';
  c.fillRect(px, py, pw, ph);
  c.strokeStyle = ACCENT; c.lineWidth = 1;
  c.strokeRect(px, py, pw, ph);
  drawCornerTicks(c, px, py, pw, ph, ACCENT);

  c.font = "bold 16px 'Space Grotesk','Noto Sans SC',sans-serif";
  c.fillStyle = ACCENT; c.textAlign = 'center';
  c.fillText(t('results'), w/2, py+30);

  var types = ['dart','glider','speed'];
  var colW = pw / 3;
  for (var i=0; i<3; i++) {
    var colX = px + colW*i + colW/2;
    var typ = types[i];
    var data = trialData[typ];
    var avg = 0;
    if (data.length > 0) {
      var sum = 0;
      for (var j=0; j<data.length; j++) sum += data[j];
      avg = sum / data.length;
    }

    // Plane icon
    drawPlaneShape(c, colX, py+70, 1.2, -0.1, typ, mc);

    // Name
    c.font = "bold 11px 'JetBrains Mono',monospace";
    c.fillStyle = ACCENT; c.textAlign = 'center';
    c.fillText(t(typ), colX, py+100);

    // Trial distances
    c.font = "10px 'JetBrains Mono',monospace";
    c.fillStyle = mc.dim;
    for (var k=0; k<data.length; k++) {
      c.fillText('#' + (k+1) + ': ' + data[k].toFixed(1) + 'm', colX, py+120+k*16);
    }

    // Average
    c.font = "bold 12px 'JetBrains Mono',monospace";
    c.fillStyle = 'oklch(0.85 0.14 85)';
    c.fillText(t('avgDist') + ': ' + avg.toFixed(1) + 'm', colX, py+ph-25);
  }

  // Dividers
  c.strokeStyle = 'rgba(167,139,250,0.15)'; c.lineWidth = 0.5;
  c.beginPath(); c.moveTo(px+colW, py+20); c.lineTo(px+colW, py+ph-15); c.stroke();
  c.beginPath(); c.moveTo(px+colW*2, py+20); c.lineTo(px+colW*2, py+ph-15); c.stroke();
}

// ================================================================
// HUD / Status updates
// ================================================================
function updateHUD() {
  document.getElementById('hudV1').textContent = PLANES[selectedPlane].label;
  document.getElementById('hudV2').textContent = launchAngle.toFixed(0) + '\u00b0';
  document.getElementById('hudV3').textContent = Math.round(launchPower*100) + '%';
  document.getElementById('hudV4').textContent = lastDist > 0 ? lastDist.toFixed(1)+'m' : '--';
  document.getElementById('hudV5').textContent = bestDist > 0 ? bestDist.toFixed(1)+'m' : '--';
}

function updateStatusBar() {
  var lbl = document.getElementById('statusLabel');
  var trials = document.getElementById('statusTrials');
  var result = document.getElementById('statusResult');

  trials.textContent = totalTrials + ' / 9';

  if (showResults) {
    lbl.textContent = t('complete');
    result.textContent = '';
    result.className = 'status-result pass';
  } else if (isFlying) {
    lbl.textContent = t('flying');
    result.textContent = '';
  } else if (isCharging) {
    lbl.textContent = t('charging');
    result.textContent = '';
  } else if (lastDist > 0) {
    lbl.textContent = t('landed') + ' ' + lastDist.toFixed(1) + 'm';
    result.textContent = '';
  } else {
    lbl.textContent = t('dragToAim');
    result.textContent = '';
  }
}

// ================================================================
// Main draw
// ================================================================
function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  var mc = gameModeColors();

  drawGameBg(c2d, cw, ch);

  // Space station elements
  drawStationWindow(c2d, cw, ch, mc);

  // Floor and launch pad
  var floorY = drawFloor(c2d, cw, ch, mc);
  launchX = cw * 0.08;
  launchBaseY = floorY;

  drawLaunchPad(c2d, launchX, launchBaseY, mc);

  // Aim line (when not flying)
  if (!isFlying && !showResults) {
    drawAimLine(c2d, launchX, launchBaseY, launchAngle);
  }

  // Power bar
  if (isCharging) {
    drawPowerBar(c2d, launchX, launchBaseY, launchPower);
  }

  // Flight trail
  if (flightTrail.length > 1) {
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 1;
    c2d.setLineDash([3,3]);
    c2d.globalAlpha = 0.4;
    c2d.beginPath();
    c2d.moveTo(flightTrail[0].x, flightTrail[0].y);
    for (var i=1; i<flightTrail.length; i++) {
      c2d.lineTo(flightTrail[i].x, flightTrail[i].y);
    }
    c2d.stroke();
    c2d.setLineDash([]);
    c2d.globalAlpha = 1;
  }

  // Update & draw particles
  updateParticles(launchParticles);
  updateParticles(trailParticles);
  drawParticles(c2d, launchParticles);
  drawParticles(c2d, trailParticles);

  // Flying plane
  if (isFlying) {
    updateFlight();
    var fAngle = Math.atan2(velY, velX);
    drawPlaneShape(c2d, planeX, planeY, 1.5, fAngle, selectedPlane, mc);
  }

  // Idle plane on launch pad
  if (!isFlying && !showResults) {
    var breathScale = 0.98 + 0.04 * Math.sin(Date.now()*0.001*Math.PI);
    var idleAngle = -launchAngle * Math.PI / 180;
    drawPlaneShape(c2d, launchX, launchBaseY - 8, breathScale*1.3, idleAngle, selectedPlane, mc);
  }

  // Charging power animation
  if (isCharging && !isFlying) {
    launchPower = Math.min(1, launchPower + 0.012);
    updateHUD();
  }

  // Results panel overlay
  if (showResults) {
    drawResultsPanel(c2d, cw, ch, mc);
  }

  animId = requestAnimationFrame(draw);
}

// ================================================================
// Input handling
// ================================================================
function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * (cw / rect.width),
    y: (clientY - rect.top) * (ch / rect.height),
  };
}

function onPointerDown(e) {
  if (isFlying || showResults || totalTrials >= 9) return;
  e.preventDefault();
  var pos = getCanvasPos(e);

  // Check if near launch area for angle drag
  var dx = pos.x - launchX;
  var dy = pos.y - launchBaseY;
  var dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 120) {
    isDragging = true;
  }
}

function onPointerMove(e) {
  if (!isDragging || isFlying || isCharging) return;
  e.preventDefault();
  var pos = getCanvasPos(e);
  var dx = pos.x - launchX;
  var dy = -(pos.y - launchBaseY);
  var angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;
  launchAngle = Math.max(0, Math.min(45, angleDeg));
  updateHUD();
}

function onPointerUp(e) {
  if (isFlying) return;
  e.preventDefault();

  if (isDragging && !isCharging) {
    // Start charging
    isDragging = false;
    isCharging = true;
    launchPower = 0;
    updateStatusBar();
    return;
  }

  if (isCharging) {
    // Launch
    startFlight();
    updateStatusBar();
    return;
  }

  isDragging = false;
}

// ================================================================
// Plane selection
// ================================================================
function selectPlane(type) {
  selectedPlane = type;
  document.querySelectorAll('.plane-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.plane === type);
  });
  flightTrail = [];
  lastDist = 0;
  updateHUD();
}

// ================================================================
// Reset
// ================================================================
function resetGame() {
  trialData = {dart:[], glider:[], speed:[]};
  totalTrials = 0;
  lastDist = 0;
  bestDist = 0;
  launchPower = 0;
  isCharging = false;
  isFlying = false;
  isDragging = false;
  showResults = false;
  flightTrail = [];
  launchParticles = [];
  trailParticles = [];
  selectPlane('dart');
  updateHUD();
  updateStatusBar();
}

// ================================================================
// Resize
// ================================================================
function resizeCanvas() {
  var body = canvas.parentElement;
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = rect.width;
  ch = rect.height;
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  c2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ================================================================
// Init
// ================================================================
function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  // Plane buttons
  document.getElementById('btnDart').addEventListener('click', function(){ selectPlane('dart'); });
  document.getElementById('btnGlider').addEventListener('click', function(){ selectPlane('glider'); });
  document.getElementById('btnSpeed').addEventListener('click', function(){ selectPlane('speed'); });
  document.getElementById('btnReset').addEventListener('click', resetGame);

  // Input
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, {passive:false});
  canvas.addEventListener('touchmove', onPointerMove, {passive:false});
  canvas.addEventListener('touchend', onPointerUp, {passive:false});

  // Resize
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  setTimeout(resizeCanvas, 200);
  setTimeout(resizeCanvas, 600);
  document.fonts.ready.then(resizeCanvas);

  updateHUD();
  draw();
}

init();
</script>
