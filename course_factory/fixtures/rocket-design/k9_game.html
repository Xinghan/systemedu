<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
/* Hypothesis input overlay */
.hypo-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,6,15,0.85);z-index:10;justify-content:center;align-items:center;flex-direction:column;gap:12px;}
.hypo-overlay.visible{display:flex;}
.hypo-overlay textarea{width:280px;height:80px;background:rgba(20,15,40,0.9);border:1px solid #a78bfa;color:#e2e8f0;font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:10px;resize:none;outline:none;}
.hypo-overlay textarea:focus{border-color:oklch(0.85 0.14 85);box-shadow:0 0 10px rgba(167,139,250,0.3);}
.hypo-overlay .hypo-title{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#a78bfa;letter-spacing:0.1em;text-transform:uppercase;}
.hypo-overlay .hypo-hint{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:#8e90a6;}
.hypo-overlay .hypo-submit{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 24px;border:none;cursor:pointer;background:linear-gradient(135deg,#a78bfa,oklch(0.52 0.16 295));color:#05060f;letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px rgba(167,139,250,0.3);}
.hypo-overlay .hypo-submit:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.hypo-overlay .hypo-counter{font-family:'JetBrains Mono',monospace;font-size:10px;color:#5e6070;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">FLIGHT LOG WORKSHOP</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="progressLabel">PROGRESS</div>
    <div class="sidebar-guide" id="progressText" style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--sb-accent,var(--primary));">0 / 8</div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">FLIGHT LOG WORKSHOP</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">PLACED</div><div class="hud-val" id="hudV1">0/8</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">NEXT</div><div class="hud-val" id="hudV2">CH.1</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">STATUS</div><div class="hud-val" id="hudV3">--</div></div>
    </div>
    <div class="game-body" style="position:relative;">
      <canvas id="gc"></canvas>
      <div class="hypo-overlay" id="hypoOverlay">
        <div class="hypo-title" id="hypoTitle">ROCKET HYPOTHESIS</div>
        <div class="hypo-hint" id="hypoHint">Write your first hypothesis (10+ chars)</div>
        <textarea id="hypoInput" maxlength="200" placeholder="..."></textarea>
        <div class="hypo-counter" id="hypoCounter">0 / 10</div>
        <button class="hypo-submit" id="hypoSubmit" disabled>SUBMIT</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">DRAG CHAPTERS TO THE LOG BOOK</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa'; // space purple

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  // Deep space gradient
  if (GAME_MODE === 'cyberpunk') {
    var gb = c.createLinearGradient(0, 0, 0, h);
    gb.addColorStop(0, 'oklch(0.10 0.04 280)'); gb.addColorStop(1, 'oklch(0.20 0.10 290)');
    c.fillStyle = gb; c.fillRect(0, 0, w, h);
  } else {
    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
    c.fillStyle = g; c.fillRect(0, 0, w, h);
  }
  // Grid
  var gc2 = mc.grid || 'rgba(167,139,250,0.08)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for (var x = 0; x < w; x += mc.gridStep) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
  for (var y = 0; y < h; y += mc.gridStep) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }
  if (mc.innerBorder) { c.strokeStyle = mc.innerBorderColor; c.lineWidth = 0.5; c.strokeRect(6, 6, w - 12, h - 12); }
  if (mc.topLine) { var tg = c.createLinearGradient(w * 0.15, 0, w * 0.85, 0); tg.addColorStop(0, 'transparent'); tg.addColorStop(0.4, ACCENT); tg.addColorStop(0.6, ACCENT); tg.addColorStop(1, 'transparent'); c.strokeStyle = tg; c.lineWidth = 1; c.beginPath(); c.moveTo(0, 0.5); c.lineTo(w, 0.5); c.stroke(); }
  if (mc.scanlines) { c.strokeStyle = 'rgba(255,255,255,0.025)'; c.lineWidth = 1; for (var sy = 0; sy < h; sy += 3) { c.beginPath(); c.moveTo(0, sy); c.lineTo(w, sy); c.stroke(); } }
  if (mc.cornerBrackets) { var bl = Math.min(w, h) * 0.06; c.strokeStyle = ACCENT; c.lineWidth = 1.5; c.globalAlpha = 0.5; c.beginPath(); c.moveTo(8, 8 + bl); c.lineTo(8, 8); c.lineTo(8 + bl, 8); c.stroke(); c.beginPath(); c.moveTo(w - 8 - bl, 8); c.lineTo(w - 8, 8); c.lineTo(w - 8, 8 + bl); c.stroke(); c.beginPath(); c.moveTo(8, h - 8 - bl); c.lineTo(8, h - 8); c.lineTo(8 + bl, h - 8); c.stroke(); c.beginPath(); c.moveTo(w - 8 - bl, h - 8); c.lineTo(w - 8, h - 8); c.lineTo(w - 8, h - 8 + bl); c.stroke(); c.globalAlpha = 1; }
  if (mc.glow) { var rg = c.createRadialGradient(w * 0.5, h * 0.3, 0, w * 0.5, h * 0.3, w * 0.6); rg.addColorStop(0, 'rgba(167,139,250,0.06)'); rg.addColorStop(1, 'transparent'); c.fillStyle = rg; c.fillRect(0, 0, w, h); }
  // Stars
  drawStars(c, w, h);
}

// Star field
var _gameStars = [];
(function() {
  for (var i = 0; i < 30; i++) {
    _gameStars.push({ x: Math.random(), y: Math.random(), r: 0.3 + Math.random() * 1, a: 0.2 + Math.random() * 0.5, sp: 0.5 + Math.random() * 2 });
  }
})();
function drawStars(c, w, h) {
  var time = Date.now() * 0.001;
  for (var i = 0; i < _gameStars.length; i++) {
    var s = _gameStars[i];
    c.save();
    c.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(time * s.sp + i));
    c.fillStyle = i % 5 === 0 ? 'oklch(0.85 0.14 85)' : '#e2e8f0';
    c.beginPath(); c.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2); c.fill();
    c.restore();
  }
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', 'oklch(0.52 0.16 295)');
  r.style.setProperty('--glow-strong', 'rgba(167,139,250,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b) {
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light', 'dark', 'cyberpunk'].forEach(function(k) {
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function() { applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'FLIGHT LOG WORKSHOP', cn:'\u822a\u884c\u65e5\u5fd7\u88c5\u8ba2\u5de5\u574a'},
  subtitle:  {en:'Assemble your flight log at the space station', cn:'\u5728\u592a\u7a7a\u7ad9\u88c5\u8ba2\u4f60\u7684\u822a\u884c\u65e5\u5fd7'},
  guide:     {en:'GUIDE', cn:'\u73a9\u6cd5\u6307\u5357'},
  g1:        {en:'Drag floating chapter pages to the log book', cn:'\u62d6\u62fd\u6f02\u6d6e\u7684\u7ae0\u8282\u9875\u5230\u65e5\u5fd7\u672c'},
  g2:        {en:'Place them in order: Chapter 1 first!', cn:'\u6309\u987a\u5e8f\u653e\u7f6e\uff1a\u5148\u653e\u7b2c1\u7ae0\uff01'},
  g3:        {en:'Wrong order = page bounces back', cn:'\u987a\u5e8f\u9519\u8bef = \u9875\u9762\u5f39\u56de'},
  g4:        {en:'After all 8: write your rocket hypothesis', cn:'\u5168\u90e88\u9875\u653e\u597d\u540e\uff1a\u5199\u706b\u7bad\u731c\u60f3'},
  progress:  {en:'PROGRESS', cn:'\u8fdb\u5ea6'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  placed:    {en:'PLACED', cn:'\u5df2\u653e\u7f6e'},
  nextCh:    {en:'NEXT', cn:'\u4e0b\u4e00\u7ae0'},
  statusDrag:{en:'DRAG CHAPTERS TO THE LOG BOOK', cn:'\u62d6\u62fd\u7ae0\u8282\u9875\u5230\u65e5\u5fd7\u672c'},
  statusDone:{en:'ALL PLACED! WRITE YOUR HYPOTHESIS', cn:'\u5168\u90e8\u653e\u597d\uff01\u5199\u4e0b\u4f60\u7684\u731c\u60f3'},
  statusWin: {en:'MISSION COMPLETE!', cn:'\u4efb\u52a1\u5b8c\u6210\uff01'},
  wrongOrder:{en:'WRONG ORDER! NEED CH.', cn:'\u987a\u5e8f\u9519\u8bef\uff01\u9700\u8981\u7b2c'},
  wrongSuffix:{en:'', cn:'\u7ae0'},
  correct:   {en:'CORRECT!', cn:'\u6b63\u786e\uff01'},
  hypoTitle: {en:'ROCKET HYPOTHESIS', cn:'\u706b\u7bad\u731c\u60f3'},
  hypoHint:  {en:'Write your first hypothesis (10+ chars)', cn:'\u5199\u4e0b\u4f60\u5bf9\u706b\u7bad\u7684\u7b2c\u4e00\u6b21\u731c\u60f3\uff0810\u5b57\u4ee5\u4e0a\uff09'},
  hypoSubmit:{en:'SUBMIT', cn:'\u63d0\u4ea4'},
  // Topic names
  t1: {en:'Push & Pull', cn:'\u63a8\u4e0e\u62c9'},
  t2: {en:'Weight', cn:'\u91cd\u91cf'},
  t3: {en:'Falling', cn:'\u4e0b\u843d'},
  t4: {en:'Friction', cn:'\u6469\u64e6\u529b'},
  t5: {en:'Elasticity', cn:'\u5f39\u529b'},
  t6: {en:'Balance', cn:'\u5e73\u8861'},
  t7: {en:'Inertia', cn:'\u60ef\u6027'},
  t8: {en:'Action-React', cn:'\u4f5c\u7528\u53cd\u4f5c\u7528'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').innerHTML = '<ul><li>' + t('g1') + '</li><li>' + t('g2') + '</li><li>' + t('g3') + '</li><li>' + t('g4') + '</li></ul>';
  document.getElementById('progressLabel').textContent = t('progress');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('placed');
  document.getElementById('hudL2').textContent = t('nextCh');
  document.getElementById('hypoTitle').textContent = t('hypoTitle');
  document.getElementById('hypoHint').textContent = t('hypoHint');
  document.getElementById('hypoSubmit').textContent = t('hypoSubmit');
  updateHUD();
  draw();
}

// ================================================================
// GAME STATE
// ================================================================

var TOPIC_COLORS = [
  '#a78bfa', '#f97316', '#38bdf8', '#f472b6',
  '#34d399', '#fbbf24', '#818cf8', '#fb7185',
];

var canvas, c2d, cw, ch;
var placedCount = 0;
var gamePhase = 'drag'; // 'drag' | 'hypothesis' | 'done'
var dragging = null; // index of page being dragged, or null
var dragOffX = 0, dragOffY = 0;
var shakeTimer = 0;
var shakeIdx = -1;
var correctFlash = -1;
var correctTimer = 0;
var particles = [];
var hypothesis = '';

// Page objects: { x, y, placed, homeX, homeY, angle }
var pages = [];

// Log book zone (right side of canvas)
var logBookX, logBookY, logBookW, logBookH;

function initPages() {
  pages = [];
  placedCount = 0;
  gamePhase = 'drag';
  dragging = null;
  particles = [];
  hypothesis = '';
  shakeIdx = -1;
  correctFlash = -1;
  // Place pages at random floating positions (left 65% of canvas)
  for (var i = 0; i < 8; i++) {
    var margin = 40;
    var areaW = cw * 0.58;
    var areaH = ch - margin * 2;
    pages.push({
      x: margin + Math.random() * (areaW - 80),
      y: margin + Math.random() * (areaH - 70),
      placed: false,
      homeX: 0, homeY: 0,
      floatPhase: Math.random() * Math.PI * 2,
      floatSpeed: 0.3 + Math.random() * 0.5,
    });
  }
  // Hide hypothesis overlay
  document.getElementById('hypoOverlay').classList.remove('visible');
  document.getElementById('hypoInput').value = '';
  updateHUD();
}

function updateLogBookZone() {
  // Log book on the right side
  logBookW = Math.min(120, cw * 0.18);
  logBookH = ch * 0.75;
  logBookX = cw - logBookW - 30;
  logBookY = (ch - logBookH) / 2;
}

function updateHUD() {
  document.getElementById('hudV1').textContent = placedCount + '/8';
  var nextCh = placedCount < 8 ? 'CH.' + (placedCount + 1) : '--';
  document.getElementById('hudV2').textContent = nextCh;
  document.getElementById('progressText').textContent = placedCount + ' / 8';
  var statusEl = document.getElementById('statusLabel');
  var resultEl = document.getElementById('statusResult');
  if (gamePhase === 'done') {
    statusEl.textContent = t('statusWin');
    resultEl.textContent = ''; resultEl.className = 'status-result pass';
  } else if (gamePhase === 'hypothesis') {
    statusEl.textContent = t('statusDone');
    resultEl.textContent = ''; resultEl.className = 'status-result';
  } else {
    statusEl.textContent = t('statusDrag');
    resultEl.textContent = ''; resultEl.className = 'status-result';
  }
  document.getElementById('hudV3').textContent = gamePhase === 'done' ? 'OK' : (gamePhase === 'hypothesis' ? 'WRITE' : '--');
}

// ================================================================
// PARTICLES
// ================================================================

function spawnParticles(x, y, color) {
  var count = 10;
  for (var i = 0; i < count; i++) {
    var isGold = i >= 8; // last 2 are gold (1:4 ratio)
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.015 + Math.random() * 0.015,
      r: 1.5 + Math.random() * 2,
      color: isGold ? 'oklch(0.85 0.14 85)' : color,
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.03; // slight gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(c) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    c.save(); c.globalAlpha = p.life;
    c.fillStyle = p.color;
    c.beginPath(); c.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); c.fill();
    c.restore();
  }
}

// ================================================================
// DRAWING
// ================================================================

function drawPageCard(c, x, y, w, h, idx, highlight) {
  var color = TOPIC_COLORS[idx];
  c.save();
  // Card body
  c.fillStyle = highlight ? 'rgba(40,30,70,0.95)' : 'rgba(20,15,40,0.85)';
  c.fillRect(x, y, w, h);
  // Color accent bar
  c.fillStyle = color;
  c.fillRect(x, y, w, 3);
  // Border
  c.strokeStyle = color; c.lineWidth = highlight ? 1.2 : 0.6;
  c.globalAlpha = highlight ? 0.9 : 0.6;
  c.strokeRect(x, y, w, h);
  c.globalAlpha = 1;
  // Page number
  c.font = "bold 11px 'JetBrains Mono',monospace";
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillStyle = color;
  c.fillText('CH.' + (idx + 1), x + w / 2, y + 8);
  // Topic name
  c.font = "10px 'Noto Sans SC',sans-serif";
  c.fillStyle = gameModeColors().dim;
  c.fillText(t('t' + (idx + 1)), x + w / 2, y + h - 14);
  c.restore();
}

function drawLogBook(c) {
  var mc = gameModeColors();
  c.save();
  // Book frame
  c.fillStyle = 'rgba(15,10,35,0.7)';
  c.fillRect(logBookX, logBookY, logBookW, logBookH);
  c.strokeStyle = ACCENT; c.lineWidth = 1;
  c.strokeRect(logBookX, logBookY, logBookW, logBookH);
  // Corner ticks
  var tl = 10;
  c.strokeStyle = ACCENT; c.lineWidth = 1; c.globalAlpha = 0.5;
  c.beginPath(); c.moveTo(logBookX, logBookY + tl); c.lineTo(logBookX, logBookY); c.lineTo(logBookX + tl, logBookY); c.stroke();
  c.beginPath(); c.moveTo(logBookX + logBookW - tl, logBookY); c.lineTo(logBookX + logBookW, logBookY); c.lineTo(logBookX + logBookW, logBookY + tl); c.stroke();
  c.beginPath(); c.moveTo(logBookX, logBookY + logBookH - tl); c.lineTo(logBookX, logBookY + logBookH); c.lineTo(logBookX + tl, logBookY + logBookH); c.stroke();
  c.beginPath(); c.moveTo(logBookX + logBookW - tl, logBookY + logBookH); c.lineTo(logBookX + logBookW, logBookY + logBookH); c.lineTo(logBookX + logBookW, logBookY + logBookH - tl); c.stroke();
  c.globalAlpha = 1;
  // Title
  c.font = "bold 9px 'JetBrains Mono',monospace";
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillStyle = ACCENT;
  c.fillText('FLIGHT LOG', logBookX + logBookW / 2, logBookY + 8);
  // Binding stitches on left edge
  c.strokeStyle = ACCENT; c.lineWidth = 0.8; c.globalAlpha = 0.6;
  for (var sy = logBookY + 20; sy < logBookY + logBookH - 10; sy += 8) {
    c.beginPath(); c.moveTo(logBookX + 3, sy); c.lineTo(logBookX + 7, sy + 4); c.stroke();
  }
  c.globalAlpha = 1;
  // Placed page slots
  var slotH = (logBookH - 40) / 8;
  for (var i = 0; i < 8; i++) {
    var sy2 = logBookY + 28 + i * slotH;
    if (i < placedCount) {
      // Filled slot
      c.fillStyle = TOPIC_COLORS[i]; c.globalAlpha = 0.7;
      c.fillRect(logBookX + 12, sy2, logBookW - 20, slotH - 3);
      c.globalAlpha = 1;
      c.font = "bold 8px 'JetBrains Mono',monospace";
      c.textAlign = 'left'; c.textBaseline = 'middle';
      c.fillStyle = '#e2e8f0';
      c.fillText((i + 1) + '. ' + t('t' + (i + 1)), logBookX + 16, sy2 + (slotH - 3) / 2);
    } else {
      // Empty slot (dashed)
      c.strokeStyle = mc.strokeDim; c.lineWidth = 0.5; c.globalAlpha = 0.3;
      c.setLineDash([3, 3]);
      c.strokeRect(logBookX + 12, sy2, logBookW - 20, slotH - 3);
      c.setLineDash([]); c.globalAlpha = 1;
    }
  }
  c.restore();
}

// Starfield window (cosmetic) behind floating pages
function drawSpaceWindow(c) {
  var mc = gameModeColors();
  if (GAME_MODE !== 'cyberpunk') return;
  // Subtle "window" frame top-left
  c.save();
  c.strokeStyle = mc.strokeDim; c.lineWidth = 0.5; c.globalAlpha = 0.2;
  c.strokeRect(20, 20, cw * 0.55, ch - 40);
  c.globalAlpha = 1;
  c.restore();
}

// Completion panel
function drawCompletionPanel(c) {
  if (gamePhase !== 'done') return;
  var mc = gameModeColors();
  var pw = 260, ph = 100;
  var px = (cw - pw) / 2, py = (ch - ph) / 2;
  c.save();
  c.fillStyle = 'rgba(10,8,30,0.92)';
  c.fillRect(px, py, pw, ph);
  c.strokeStyle = ACCENT; c.lineWidth = 1.5;
  c.strokeRect(px, py, pw, ph);
  // Corner ticks
  var tl = 10; c.globalAlpha = 0.5;
  c.beginPath(); c.moveTo(px, py + tl); c.lineTo(px, py); c.lineTo(px + tl, py); c.stroke();
  c.beginPath(); c.moveTo(px + pw - tl, py); c.lineTo(px + pw, py); c.lineTo(px + pw, py + tl); c.stroke();
  c.beginPath(); c.moveTo(px, py + ph - tl); c.lineTo(px, py + ph); c.lineTo(px + tl, py + ph); c.stroke();
  c.beginPath(); c.moveTo(px + pw - tl, py + ph); c.lineTo(px + pw, py + ph); c.lineTo(px + pw, py + ph - tl); c.stroke();
  c.globalAlpha = 1;
  // Title
  c.font = "bold 16px 'Space Grotesk',sans-serif";
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = ACCENT;
  c.fillText(t('statusWin'), px + pw / 2, py + 30);
  // Hypothesis snippet
  c.font = "12px 'Noto Sans SC',sans-serif";
  c.fillStyle = mc.dim;
  var display = hypothesis.length > 30 ? hypothesis.substring(0, 30) + '...' : hypothesis;
  c.fillText('"' + display + '"', px + pw / 2, py + 60);
  // Rocket icon
  drawMiniRocket(c, px + pw / 2, py + ph - 12, 8);
  c.restore();
}

function drawMiniRocket(c, x, y, s) {
  c.save();
  c.fillStyle = 'oklch(0.85 0.14 85)'; c.globalAlpha = 0.7;
  c.beginPath(); c.moveTo(x, y - s); c.lineTo(x - s * 0.4, y); c.lineTo(x + s * 0.4, y); c.closePath(); c.fill();
  c.fillStyle = ACCENT; c.globalAlpha = 0.5;
  c.fillRect(x - s * 0.3, y, s * 0.6, s * 0.5);
  c.globalAlpha = 1; c.restore();
}

function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  if (pages.length === 0) { drawGameBg(c2d, cw, ch); return; }
  drawGameBg(c2d, cw, ch);
  drawSpaceWindow(c2d);
  drawLogBook(c2d);

  var time = Date.now() * 0.001;

  // Draw floating (unplaced) pages
  for (var i = 0; i < 8; i++) {
    var pg = pages[i];
    if (pg.placed) continue;
    if (dragging === i) continue;
    // Floating wobble (zero-g)
    var wy = Math.sin(time * pg.floatSpeed + pg.floatPhase) * 5;
    var wx = Math.cos(time * pg.floatSpeed * 0.7 + pg.floatPhase) * 3;
    var dx = pg.x + wx, dy = pg.y + wy;
    // Shake effect
    if (shakeIdx === i && shakeTimer > 0) {
      dx += (Math.random() - 0.5) * 6;
      dy += (Math.random() - 0.5) * 6;
    }
    drawPageCard(c2d, dx, dy, 70, 50, i, false);
  }

  // Draw dragged page on top
  if (dragging !== null && dragging >= 0 && dragging < 8) {
    var dp = pages[dragging];
    drawPageCard(c2d, dp.x, dp.y, 70, 50, dragging, true);
  }

  // Particles
  updateParticles();
  drawParticles(c2d);

  // Shake timer decay
  if (shakeTimer > 0) {
    shakeTimer--;
    if (shakeTimer <= 0) shakeIdx = -1;
  }

  // Correct flash
  if (correctFlash >= 0 && correctTimer > 0) {
    correctTimer--;
    c2d.save();
    c2d.globalAlpha = correctTimer / 30;
    c2d.font = "bold 20px 'Space Grotesk',sans-serif";
    c2d.textAlign = 'center'; c2d.textBaseline = 'middle';
    c2d.fillStyle = TOPIC_COLORS[correctFlash];
    c2d.fillText(t('correct'), cw / 2, ch / 2);
    c2d.restore();
    if (correctTimer <= 0) correctFlash = -1;
  }

  drawCompletionPanel(c2d);

  requestAnimationFrame(draw);
}

// ================================================================
// INTERACTION
// ================================================================

function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = cw / rect.width;
  var scaleY = ch / rect.height;
  var clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (gamePhase !== 'drag') return;
  var pos = getCanvasPos(e);
  // Check pages in reverse order (topmost first)
  for (var i = 7; i >= 0; i--) {
    var pg = pages[i];
    if (pg.placed) continue;
    if (pos.x >= pg.x && pos.x <= pg.x + 70 && pos.y >= pg.y && pos.y <= pg.y + 50) {
      dragging = i;
      dragOffX = pos.x - pg.x;
      dragOffY = pos.y - pg.y;
      e.preventDefault();
      return;
    }
  }
}

function onPointerMove(e) {
  if (dragging === null) return;
  var pos = getCanvasPos(e);
  pages[dragging].x = pos.x - dragOffX;
  pages[dragging].y = pos.y - dragOffY;
  e.preventDefault();
}

function onPointerUp(e) {
  if (dragging === null) return;
  var idx = dragging;
  dragging = null;
  var pg = pages[idx];
  var pgCx = pg.x + 35;
  var pgCy = pg.y + 25;

  // Check if dropped in log book zone
  if (pgCx >= logBookX && pgCx <= logBookX + logBookW &&
      pgCy >= logBookY && pgCy <= logBookY + logBookH) {
    // Check order
    if (idx === placedCount) {
      // Correct!
      pg.placed = true;
      placedCount++;
      spawnParticles(logBookX + logBookW / 2, logBookY + 28 + (placedCount - 1) * ((logBookH - 40) / 8) + 10, TOPIC_COLORS[idx]);
      correctFlash = idx;
      correctTimer = 30;
      updateHUD();
      // Check if all placed
      if (placedCount === 8) {
        gamePhase = 'hypothesis';
        updateHUD();
        // Show hypothesis overlay after a short delay
        setTimeout(function() {
          document.getElementById('hypoOverlay').classList.add('visible');
        }, 800);
      }
    } else {
      // Wrong order -- bounce back with shake
      shakeIdx = idx;
      shakeTimer = 20;
      // Show error in status
      var resultEl = document.getElementById('statusResult');
      resultEl.textContent = t('wrongOrder') + (placedCount + 1) + t('wrongSuffix');
      resultEl.className = 'status-result fail';
      setTimeout(function() { resultEl.textContent = ''; resultEl.className = 'status-result'; }, 1500);
      // Move page back to a random position in the left area
      pg.x = 30 + Math.random() * (cw * 0.5 - 80);
      pg.y = 30 + Math.random() * (ch - 100);
    }
  }
}

// ================================================================
// HYPOTHESIS INPUT
// ================================================================

function setupHypothesisInput() {
  var input = document.getElementById('hypoInput');
  var counter = document.getElementById('hypoCounter');
  var submit = document.getElementById('hypoSubmit');

  input.addEventListener('input', function() {
    var len = input.value.length;
    counter.textContent = len + ' / 10';
    submit.disabled = len < 10;
  });

  submit.addEventListener('click', function() {
    if (input.value.length < 10) return;
    hypothesis = input.value;
    gamePhase = 'done';
    document.getElementById('hypoOverlay').classList.remove('visible');
    updateHUD();
    // Celebration particles
    for (var i = 0; i < 5; i++) {
      spawnParticles(cw * (0.2 + Math.random() * 0.6), ch * (0.2 + Math.random() * 0.6), TOPIC_COLORS[Math.floor(Math.random() * 8)]);
    }
  });
}

// ================================================================
// INIT
// ================================================================

function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  function resize() {
    var parent = canvas.parentElement;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    cw = parent.clientWidth;
    ch = parent.clientHeight;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    c2d.setTransform(dpr, 0, 0, dpr, 0, 0);
    updateLogBookZone();
  }

  resize();
  window.addEventListener('resize', resize);

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  initPages();
  setupHypothesisInput();

  // Mouse events
  canvas.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  // Touch events
  canvas.addEventListener('touchstart', onPointerDown, {passive: false});
  window.addEventListener('touchmove', onPointerMove, {passive: false});
  window.addEventListener('touchend', onPointerUp);

  // Reset button
  document.getElementById('btnReset').addEventListener('click', function() {
    initPages();
    updateHUD();
  });

  draw();
}

window.addEventListener('DOMContentLoaded', init);
</script>
