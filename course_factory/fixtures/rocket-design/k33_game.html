<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#8b5cf6));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">ALTITUDE PREDICTOR</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="scoreLabel">SCORE</div>
    <div class="sidebar-guide" id="scoreDisplay" style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--sb-accent,var(--primary));text-align:center;">0</div>
    <div class="sidebar-divider"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">ALTITUDE PREDICTOR</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ROUND</div><div class="hud-val" id="hudV1">1/8</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">ENGINE</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">MASS</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">IMPULSE</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">SELECT ENGINE AND MASS</span>
      <span class="status-val" id="statusTrials">0 / 8</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#8b5cf6';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? 'rgba(139,92,246,0.06)' : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(139,92,246,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#6d28d9');
  r.style.setProperty('--glow-strong', 'rgba(139,92,246,0.35)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'ALTITUDE PREDICTOR', cn:'\u5c04\u9ad8\u9884\u62a5\u7ad9'},
  subtitle:    {en:'Ideal Altitude Estimation', cn:'\u7406\u60f3\u5c04\u9ad8\u4f30\u7b97'},
  guide:       {en:'GUIDE', cn:'\u6307\u5357'},
  guideText:   {en:'Select engine & mass. Use formula h = I/(mg) to estimate ideal altitude. Drag the marker on the height scale to your prediction, then press LAUNCH. After seeing ideal height, apply a drag correction factor (0.5~0.7) to predict real altitude.',
                cn:'\u9009\u62e9\u53d1\u52a8\u673a\u548c\u8d28\u91cf\u3002\u7528\u516c\u5f0f h = I/(mg) \u4f30\u7b97\u7406\u60f3\u5c04\u9ad8\u3002\u62d6\u52a8\u9ad8\u5ea6\u6807\u5c3a\u4e0a\u7684\u9884\u6d4b\u6807\u8bb0\uff0c\u7136\u540e\u6309\u53d1\u5c04\u3002\u770b\u5230\u7406\u60f3\u9ad8\u5ea6\u540e\uff0c\u7528\u4fee\u6b63\u7cfb\u6570(0.5~0.7)\u9884\u6d4b\u771f\u5b9e\u5c04\u9ad8\u3002'},
  scoreLabel:  {en:'SCORE', cn:'\u5f97\u5206'},
  roundLabel:  {en:'ROUND', cn:'\u56de\u5408'},
  engineLabel: {en:'ENGINE', cn:'\u53d1\u52a8\u673a'},
  massLabel:   {en:'MASS', cn:'\u8d28\u91cf'},
  impulseLabel:{en:'IMPULSE', cn:'\u603b\u51b2'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  formula:     {en:'h = I / (m x g)', cn:'h = I / (m x g)'},
  idealH:      {en:'IDEAL HEIGHT', cn:'\u7406\u60f3\u5c04\u9ad8'},
  realH:       {en:'REAL HEIGHT', cn:'\u771f\u5b9e\u5c04\u9ad8'},
  yourPred:    {en:'YOUR PREDICTION', cn:'\u4f60\u7684\u9884\u6d4b'},
  launch:      {en:'LAUNCH', cn:'\u53d1\u5c04'},
  predict:     {en:'PREDICT', cn:'\u9884\u6d4b'},
  confirm:     {en:'CONFIRM', cn:'\u786e\u8ba4'},
  nextRound:   {en:'NEXT ROUND', cn:'\u4e0b\u4e00\u56de\u5408'},
  perfect:     {en:'PERFECT!', cn:'\u5b8c\u7f8e\uff01'},
  good:        {en:'GOOD!', cn:'\u4e0d\u9519\uff01'},
  tryAgain:    {en:'KEEP TRYING', cn:'\u7ee7\u7eed\u52a0\u6cb9'},
  selectEngine:{en:'SELECT ENGINE AND MASS', cn:'\u9009\u62e9\u53d1\u52a8\u673a\u548c\u8d28\u91cf'},
  dragMarker:  {en:'DRAG MARKER TO PREDICT HEIGHT', cn:'\u62d6\u52a8\u6807\u8bb0\u9884\u6d4b\u5c04\u9ad8'},
  phase2:      {en:'APPLY CORRECTION FACTOR', cn:'\u5e94\u7528\u4fee\u6b63\u7cfb\u6570'},
  correction:  {en:'CORRECTION', cn:'\u4fee\u6b63\u7cfb\u6570'},
  complete:    {en:'ALL ROUNDS COMPLETE!', cn:'\u5168\u90e8\u56de\u5408\u5b8c\u6210\uff01'},
  finalScore:  {en:'FINAL SCORE', cn:'\u6700\u7ec8\u5f97\u5206'},
  dragHint:    {en:'Drag the triangle marker', cn:'\u62d6\u52a8\u4e09\u89d2\u6807\u8bb0'},
  corrHint:    {en:'Drag correction slider', cn:'\u62d6\u52a8\u4fee\u6b63\u6ed1\u5757'},
  meter:       {en:'m', cn:'m'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
    draw();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('scoreLabel').textContent = t('scoreLabel');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('roundLabel');
  document.getElementById('hudL2').textContent = t('engineLabel');
  document.getElementById('hudL3').textContent = t('massLabel');
  document.getElementById('hudL4').textContent = t('impulseLabel');
  document.getElementById('btnReset').textContent = t('reset');
  updateHUD();
  updateStatus();
}

// ================================================================
// ENGINES & ROUNDS
// ================================================================
var ENGINES = [
  {idx:0, impulse:10, label:'A8-3',   color:'#60a5fa'},
  {idx:1, impulse:20, label:'B6-4',   color:'#34d399'},
  {idx:2, impulse:30, label:'C6-5',   color:'#fbbf24'},
  {idx:3, impulse:40, label:'D12-5',  color:'#f87171'},
];
var MASS_MIN = 200, MASS_MAX = 500, MASS_STEP = 50;
var SCALE_MAX = 200; // meters on the height scale
var G = 9.8;
var TOTAL_ROUNDS = 8;

// Pre-designed round configs (engine index, mass in grams)
var ROUND_CONFIGS = [
  {ei:2, massG:300},  // 30/(0.3*9.8) = 10.2m -- easy intro
  {ei:0, massG:200},  // 10/(0.2*9.8) = 5.1m
  {ei:3, massG:250},  // 40/(0.25*9.8) = 16.3m
  {ei:1, massG:400},  // 20/(0.4*9.8) = 5.1m
  {ei:3, massG:500},  // 40/(0.5*9.8) = 8.2m
  {ei:2, massG:200},  // 30/(0.2*9.8) = 15.3m
  {ei:0, massG:450},  // 10/(0.45*9.8) = 2.3m
  {ei:1, massG:250},  // 20/(0.25*9.8) = 8.2m
];

function idealHeight(impulse, massG) {
  var massKg = massG / 1000;
  return impulse / (massKg * G);
}

// ================================================================
// STATE
// ================================================================
var currentRound = 0;
var totalScore = 0;
var selectedEngine = -1;
var selectedMass = 300;
var markerH = 50;        // predicted height on scale (meters)
var corrFactor = 0.6;    // correction factor
var corrMarkerH = 0;     // correction-phase predicted real height

// Phases: 'select' -> 'predict' -> 'launching' -> 'reveal' -> 'correct' -> 'corrReveal' -> 'next'
var phase = 'select';
var animTime = 0;
var rocketAnimY = 0;     // 0..1 progress of rocket flight animation
var rocketAnimTarget = 0;
var corrAnimY = 0;
var corrAnimTarget = 0;
var roundScore = 0;
var corrScore = 0;
var gameComplete = false;

// Interaction state
var draggingMarker = false;
var draggingCorr = false;
var hoverLaunch = false;
var hoverConfirm = false;
var hoverNext = false;
var hoverEngines = [-1,-1,-1,-1]; // hover state per engine button

// Particles for rocket trail
var particles = [];

// Canvas
var cvs, ctx, W, H;
var dpr = Math.min(window.devicePixelRatio || 1, 2);

// ================================================================
// LAYOUT HELPERS
// ================================================================
function scaleZone() {
  // Height scale is on the left portion of canvas
  var left = W * 0.04;
  var right = W * 0.14;
  var top = H * 0.06;
  var bottom = H * 0.82;
  return {x: left, x2: right, y: top, y2: bottom, w: right - left, h: bottom - top};
}

function rocketZone() {
  // Rocket launch area in center-left
  var cx = W * 0.32;
  var bottom = H * 0.82;
  return {cx: cx, bottom: bottom};
}

function engineBtnZone(idx) {
  // Engine selector buttons on the right side
  var startX = W * 0.55;
  var startY = H * 0.08;
  var btnW = W * 0.18;
  var btnH = H * 0.08;
  var gap = H * 0.02;
  return {x: startX, y: startY + idx * (btnH + gap), w: btnW, h: btnH};
}

function massSliderZone() {
  var startX = W * 0.55;
  var y = H * 0.50;
  var slW = W * 0.36;
  return {x: startX, y: y, w: slW, h: 30, trackY: y + 20, trackH: 6};
}

function launchBtnZone() {
  var startX = W * 0.58;
  var y = H * 0.70;
  return {x: startX, y: y, w: W * 0.30, h: H * 0.08};
}

function corrSliderZone() {
  var startX = W * 0.55;
  var y = H * 0.55;
  var slW = W * 0.36;
  return {x: startX, y: y, w: slW, h: 30, trackY: y + 20, trackH: 6};
}

function confirmBtnZone() {
  var startX = W * 0.58;
  var y = H * 0.72;
  return {x: startX, y: y, w: W * 0.30, h: H * 0.08};
}

function nextBtnZone() {
  var cx = W * 0.5;
  var cy = H * 0.88;
  return {x: cx - W * 0.12, y: cy - H * 0.035, w: W * 0.24, h: H * 0.07};
}

// meters -> canvas Y
function metersToY(m) {
  var sz = scaleZone();
  var frac = Math.min(m / SCALE_MAX, 1);
  return sz.y2 - frac * sz.h;
}

// canvas Y -> meters
function yToMeters(canvasY) {
  var sz = scaleZone();
  var frac = (sz.y2 - canvasY) / sz.h;
  return Math.max(0, Math.min(SCALE_MAX, frac * SCALE_MAX));
}

// ================================================================
// DRAWING
// ================================================================
function draw() {
  if (!ctx) return;
  var mc = gameModeColors();
  drawGameBg(ctx, W, H);

  if (gameComplete) {
    drawCompleteScreen(mc);
    return;
  }

  var round = ROUND_CONFIGS[currentRound];
  var eng = ENGINES[round.ei];
  var ih = idealHeight(eng.impulse, round.massG);

  drawHeightScale(mc, ih);
  drawRocket(mc, ih);
  drawFormulaPanel(mc, round, eng, ih);

  if (phase === 'select' || phase === 'predict') {
    drawEngineSelector(mc, round);
    drawMassDisplay(mc, round);
    if (phase === 'predict') {
      drawMarker(mc);
      drawLaunchBtn(mc);
    }
  } else if (phase === 'launching' || phase === 'reveal') {
    drawMarker(mc);
    drawRevealInfo(mc, ih);
  } else if (phase === 'correct') {
    drawMarker(mc);
    drawRevealInfo(mc, ih);
    drawCorrSlider(mc, ih);
    drawConfirmBtn(mc);
  } else if (phase === 'corrReveal') {
    drawMarker(mc);
    drawRevealInfo(mc, ih);
    drawCorrResult(mc, ih);
  }

  if (phase === 'corrReveal' || (phase === 'reveal' && currentRound >= TOTAL_ROUNDS - 1)) {
    // no next btn on last corrReveal -- handled in drawCorrResult
  }
  if (phase === 'corrReveal') {
    drawNextBtn(mc);
  }

  drawParticles(mc);
}

function drawHeightScale(mc, idealH) {
  var sz = scaleZone();
  ctx.save();

  // Scale background strip
  ctx.fillStyle = mc.strokeDim || 'rgba(255,255,255,0.05)';
  ctx.fillRect(sz.x, sz.y, sz.w, sz.h);

  // Tick marks and labels
  var ticks = [0, 25, 50, 75, 100, 125, 150, 175, 200];
  ctx.font = '700 9px "JetBrains Mono", monospace';
  ctx.textAlign = 'right';
  for (var i = 0; i < ticks.length; i++) {
    var ty = metersToY(ticks[i]);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(sz.x, ty);
    ctx.lineTo(sz.x2 + 6, ty);
    ctx.stroke();
    ctx.fillStyle = mc.dim;
    ctx.fillText(ticks[i] + 'm', sz.x - 4, ty + 3);
  }

  // Minor ticks every 5m
  for (var m = 0; m <= SCALE_MAX; m += 5) {
    if (m % 25 === 0) continue;
    var my = metersToY(m);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.3;
    ctx.beginPath();
    ctx.moveTo(sz.x2 - 2, my);
    ctx.lineTo(sz.x2 + 3, my);
    ctx.stroke();
  }

  // Ideal height line (shown after launch)
  if (phase === 'launching' || phase === 'reveal' || phase === 'correct' || phase === 'corrReveal') {
    var clampedIdeal = Math.min(idealH, SCALE_MAX);
    var idealY = metersToY(clampedIdeal);
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath();
    ctx.moveTo(sz.x - 8, idealY);
    ctx.lineTo(W * 0.48, idealY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label
    ctx.font = '700 10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#fbbf24';
    ctx.textAlign = 'left';
    ctx.fillText(t('idealH') + ': ' + idealH.toFixed(1) + t('meter'), W * 0.16, idealY - 6);
  }

  // Correction result line (shown in corrReveal)
  if (phase === 'corrReveal') {
    var realH = idealH * corrFactor;
    var clampedReal = Math.min(realH, SCALE_MAX);
    var realY = metersToY(clampedReal);
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(sz.x - 8, realY);
    ctx.lineTo(W * 0.48, realY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = '700 10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#22c55e';
    ctx.textAlign = 'left';
    ctx.fillText(t('realH') + ': ' + realH.toFixed(1) + t('meter'), W * 0.16, realY + 14);
  }

  // Scale title
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'center';
  ctx.fillText('ALTITUDE (m)', (sz.x + sz.x2) / 2, sz.y - 8);

  ctx.restore();
}

function drawMarker(mc) {
  if (phase === 'select') return;
  var sz = scaleZone();
  var predY = metersToY(Math.min(markerH, SCALE_MAX));
  var triSize = 10;

  ctx.save();

  // Horizontal prediction line
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 2]);
  ctx.beginPath();
  ctx.moveTo(sz.x2 + 8, predY);
  ctx.lineTo(W * 0.48, predY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Triangle marker on the right edge of scale
  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.moveTo(sz.x2 + 8, predY);
  ctx.lineTo(sz.x2 + 8 + triSize, predY - triSize * 0.7);
  ctx.lineTo(sz.x2 + 8 + triSize, predY + triSize * 0.7);
  ctx.closePath();
  ctx.fill();

  // Glow
  if (gameModeColors().glow) {
    ctx.shadowColor = ACCENT;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Label
  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'left';
  ctx.fillText(markerH.toFixed(1) + t('meter'), sz.x2 + 22, predY + 4);

  // Drag hint
  if (phase === 'predict' && !draggingMarker) {
    ctx.font = '400 10px "Noto Sans SC", sans-serif';
    ctx.fillStyle = mc.dim;
    ctx.fillText(t('dragHint'), sz.x2 + 22, predY + 18);
  }

  ctx.restore();
}

function drawRocket(mc, idealH) {
  var rz = rocketZone();
  var sz = scaleZone();
  ctx.save();

  // Launch pad
  ctx.fillStyle = mc.strokeDim;
  ctx.fillRect(rz.cx - 40, rz.bottom, 80, 4);
  ctx.font = '700 8px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText('LAUNCH PAD', rz.cx, rz.bottom + 14);

  // Rocket position
  var rocketBaseY = rz.bottom;
  if (phase === 'launching' || phase === 'reveal' || phase === 'correct' || phase === 'corrReveal') {
    var targetY = metersToY(Math.min(idealH, SCALE_MAX));
    var travelDist = rz.bottom - targetY;
    rocketBaseY = rz.bottom - travelDist * rocketAnimY;
  }

  var rH = 50;
  var rW = 16;
  var tipY = rocketBaseY - rH;
  var bodyCX = rz.cx;

  // Rocket body
  ctx.fillStyle = '#d4d4d8';
  ctx.beginPath();
  ctx.moveTo(bodyCX, tipY);
  ctx.lineTo(bodyCX - rW / 2, tipY + rH * 0.7);
  ctx.lineTo(bodyCX - rW / 2, rocketBaseY);
  ctx.lineTo(bodyCX + rW / 2, rocketBaseY);
  ctx.lineTo(bodyCX + rW / 2, tipY + rH * 0.7);
  ctx.closePath();
  ctx.fill();

  // Nose cone
  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.moveTo(bodyCX, tipY);
  ctx.lineTo(bodyCX - rW / 2, tipY + rH * 0.25);
  ctx.lineTo(bodyCX + rW / 2, tipY + rH * 0.25);
  ctx.closePath();
  ctx.fill();

  // Fins
  ctx.fillStyle = ACCENT;
  ctx.globalAlpha = 0.7;
  // Left fin
  ctx.beginPath();
  ctx.moveTo(bodyCX - rW / 2, rocketBaseY - 8);
  ctx.lineTo(bodyCX - rW / 2 - 8, rocketBaseY + 2);
  ctx.lineTo(bodyCX - rW / 2, rocketBaseY);
  ctx.closePath();
  ctx.fill();
  // Right fin
  ctx.beginPath();
  ctx.moveTo(bodyCX + rW / 2, rocketBaseY - 8);
  ctx.lineTo(bodyCX + rW / 2 + 8, rocketBaseY + 2);
  ctx.lineTo(bodyCX + rW / 2, rocketBaseY);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Flame during launch
  if (phase === 'launching' && rocketAnimY < 0.98) {
    var flameH = 12 + Math.random() * 8;
    var flameW = 6 + Math.random() * 3;
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.moveTo(bodyCX - flameW, rocketBaseY);
    ctx.lineTo(bodyCX, rocketBaseY + flameH);
    ctx.lineTo(bodyCX + flameW, rocketBaseY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f97316';
    ctx.beginPath();
    ctx.moveTo(bodyCX - flameW * 0.5, rocketBaseY);
    ctx.lineTo(bodyCX, rocketBaseY + flameH * 0.7);
    ctx.lineTo(bodyCX + flameW * 0.5, rocketBaseY);
    ctx.closePath();
    ctx.fill();

    // Spawn particles
    if (Math.random() < 0.6) {
      particles.push({
        x: bodyCX + (Math.random() - 0.5) * 10,
        y: rocketBaseY + flameH * 0.5,
        vx: (Math.random() - 0.5) * 1.5,
        vy: Math.random() * 2 + 1,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
      });
    }
  }

  ctx.restore();
}

function drawParticles(mc) {
  ctx.save();
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.life * 0.6;
    ctx.fillStyle = p.life > 0.5 ? '#fbbf24' : '#f97316';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEngineSelector(mc, round) {
  ctx.save();
  var titleX = W * 0.55;
  var titleY = H * 0.04;
  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'left';
  ctx.fillText(t('engineLabel') + ' / ' + t('impulseLabel'), titleX, titleY);

  for (var i = 0; i < ENGINES.length; i++) {
    var ez = engineBtnZone(i);
    var eng = ENGINES[i];
    var selected = (round.ei === i);
    var isHover = (hoverEngines[i] === 1);

    // Button background
    if (selected) {
      ctx.fillStyle = eng.color + '33';
      ctx.strokeStyle = eng.color;
      ctx.lineWidth = 2;
    } else {
      ctx.fillStyle = isHover ? 'rgba(128,128,128,0.12)' : 'rgba(128,128,128,0.06)';
      ctx.strokeStyle = isHover ? mc.strokeDim : 'rgba(128,128,128,0.15)';
      ctx.lineWidth = 1;
    }
    ctx.beginPath();
    ctx.rect(ez.x, ez.y, ez.w, ez.h);
    ctx.fill();
    ctx.stroke();

    // Engine label
    ctx.font = '700 12px "JetBrains Mono", monospace';
    ctx.fillStyle = selected ? eng.color : mc.text;
    ctx.textAlign = 'left';
    ctx.fillText(eng.label, ez.x + 10, ez.y + ez.h * 0.42);

    // Impulse value
    ctx.font = '500 11px "JetBrains Mono", monospace';
    ctx.fillStyle = selected ? eng.color : mc.dim;
    ctx.textAlign = 'right';
    ctx.fillText(eng.impulse + ' N\u00b7s', ez.x + ez.w - 10, ez.y + ez.h * 0.42);

    // Color indicator bar
    ctx.fillStyle = eng.color;
    ctx.globalAlpha = selected ? 1 : 0.3;
    ctx.fillRect(ez.x, ez.y, 3, ez.h);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawMassDisplay(mc, round) {
  ctx.save();
  var mz = massSliderZone();

  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'left';
  ctx.fillText(t('massLabel'), mz.x, mz.y);

  // Mass value
  ctx.font = '700 18px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.text;
  ctx.fillText(round.massG + 'g', mz.x + 60, mz.y);
  ctx.font = '400 11px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.dim;
  ctx.fillText('(' + (round.massG / 1000).toFixed(3) + ' kg)', mz.x + 130, mz.y);

  ctx.restore();
}

function drawFormulaPanel(mc, round, eng, ih) {
  ctx.save();
  var fx = W * 0.55;
  var fy = H * 0.58;

  // Formula box
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.strokeRect(fx, fy, W * 0.40, H * 0.10);
  ctx.setLineDash([]);

  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'left';
  ctx.fillText(t('formula'), fx + 8, fy + 14);

  ctx.font = '500 11px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.text;
  var massKg = (round.massG / 1000).toFixed(3);

  if (phase === 'launching' || phase === 'reveal' || phase === 'correct' || phase === 'corrReveal') {
    // Show full calculation
    ctx.fillText('h = ' + eng.impulse + ' / (' + massKg + ' x 9.8) = ' + ih.toFixed(1) + t('meter'), fx + 8, fy + 32);
  } else {
    // Show partial -- let kid calculate
    ctx.fillText('h = ' + eng.impulse + ' / (' + massKg + ' x 9.8) = ?', fx + 8, fy + 32);
  }

  ctx.restore();
}

function drawLaunchBtn(mc) {
  var bz = launchBtnZone();
  ctx.save();

  var canLaunch = (phase === 'predict');
  ctx.fillStyle = canLaunch ? (hoverLaunch ? '#a78bfa' : ACCENT) : 'rgba(128,128,128,0.3)';
  ctx.beginPath();
  ctx.rect(bz.x, bz.y, bz.w, bz.h);
  ctx.fill();

  if (gameModeColors().glow && canLaunch) {
    ctx.shadowColor = ACCENT;
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.font = '700 14px "JetBrains Mono", monospace';
  ctx.fillStyle = GAME_MODE === 'light' ? '#fafaf5' : '#05060f';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t('launch'), bz.x + bz.w / 2, bz.y + bz.h / 2);

  ctx.restore();
}

function drawRevealInfo(mc, ih) {
  ctx.save();
  var rx = W * 0.55;
  var ry = H * 0.10;

  // Reveal panel
  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = '#fbbf24';
  ctx.textAlign = 'left';
  ctx.fillText(t('idealH'), rx, ry);
  ctx.font = '700 22px "JetBrains Mono", monospace';
  ctx.fillText(ih.toFixed(1) + t('meter'), rx, ry + 24);

  // Player prediction
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('yourPred') + ': ' + markerH.toFixed(1) + t('meter'), rx, ry + 44);

  // Difference
  var diff = Math.abs(markerH - ih);
  var grade = diff <= 5 ? t('perfect') : diff <= 20 ? t('good') : t('tryAgain');
  var gradeColor = diff <= 5 ? '#22c55e' : diff <= 20 ? '#fbbf24' : '#ef4444';
  ctx.font = '700 12px "JetBrains Mono", monospace';
  ctx.fillStyle = gradeColor;
  ctx.fillText(grade + ' (' + (diff <= 5 ? '+30' : diff <= 20 ? '+15' : '+5') + 'pts)', rx, ry + 64);

  ctx.restore();
}

function drawCorrSlider(mc, ih) {
  ctx.save();
  var cz = corrSliderZone();

  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'left';
  ctx.fillText(t('correction') + ': ' + corrFactor.toFixed(2), cz.x, cz.y);

  // Slider track
  ctx.fillStyle = 'rgba(128,128,128,0.15)';
  ctx.fillRect(cz.x, cz.trackY, cz.w, cz.trackH);

  // Slider labels
  ctx.font = '400 9px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'left';
  ctx.fillText('0.50', cz.x, cz.trackY + cz.trackH + 12);
  ctx.textAlign = 'right';
  ctx.fillText('0.70', cz.x + cz.w, cz.trackY + cz.trackH + 12);

  // Filled portion
  var frac = (corrFactor - 0.5) / 0.2;
  ctx.fillStyle = '#22c55e44';
  ctx.fillRect(cz.x, cz.trackY, cz.w * frac, cz.trackH);

  // Thumb
  var thumbX = cz.x + cz.w * frac;
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.arc(thumbX, cz.trackY + cz.trackH / 2, 8, 0, Math.PI * 2);
  ctx.fill();

  if (gameModeColors().glow) {
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Predicted real height
  corrMarkerH = ih * corrFactor;
  ctx.font = '500 11px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.text;
  ctx.textAlign = 'left';
  ctx.fillText(t('realH') + ' = ' + ih.toFixed(1) + ' x ' + corrFactor.toFixed(2) + ' = ' + corrMarkerH.toFixed(1) + t('meter'), cz.x, cz.trackY + cz.trackH + 28);

  // Hint
  if (!draggingCorr) {
    ctx.font = '400 10px "Noto Sans SC", sans-serif';
    ctx.fillStyle = mc.dim;
    ctx.fillText(t('corrHint'), cz.x, cz.trackY - 8);
  }

  ctx.restore();
}

function drawConfirmBtn(mc) {
  var bz = confirmBtnZone();
  ctx.save();

  ctx.fillStyle = hoverConfirm ? '#4ade80' : '#22c55e';
  ctx.beginPath();
  ctx.rect(bz.x, bz.y, bz.w, bz.h);
  ctx.fill();

  if (gameModeColors().glow) {
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.font = '700 14px "JetBrains Mono", monospace';
  ctx.fillStyle = GAME_MODE === 'light' ? '#fafaf5' : '#05060f';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t('confirm'), bz.x + bz.w / 2, bz.y + bz.h / 2);
  ctx.restore();
}

function drawCorrResult(mc, ih) {
  ctx.save();
  var rx = W * 0.55;
  var ry = H * 0.46;

  // Actual "real" height (we use a fixed answer factor of 0.6 as the "correct" one)
  var trueCorr = 0.6;
  var trueReal = ih * trueCorr;
  var predicted = ih * corrFactor;
  var diff = Math.abs(predicted - trueReal);

  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = '#22c55e';
  ctx.textAlign = 'left';
  ctx.fillText(t('realH') + ' (' + t('correction') + ' ~0.60)', rx, ry);
  ctx.font = '700 18px "JetBrains Mono", monospace';
  ctx.fillText(trueReal.toFixed(1) + t('meter'), rx, ry + 20);

  ctx.font = '500 10px "JetBrains Mono", monospace';
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('yourPred') + ': ' + predicted.toFixed(1) + t('meter'), rx, ry + 38);

  var grade2 = diff <= 3 ? t('perfect') : diff <= 10 ? t('good') : t('tryAgain');
  var gradeColor2 = diff <= 3 ? '#22c55e' : diff <= 10 ? '#fbbf24' : '#ef4444';
  ctx.font = '700 11px "JetBrains Mono", monospace';
  ctx.fillStyle = gradeColor2;
  ctx.fillText(grade2 + ' (' + (diff <= 3 ? '+20' : diff <= 10 ? '+10' : '+5') + 'pts)', rx, ry + 56);

  ctx.restore();
}

function drawNextBtn(mc) {
  var bz = nextBtnZone();
  ctx.save();
  ctx.fillStyle = hoverNext ? '#a78bfa' : ACCENT;
  ctx.beginPath();
  ctx.rect(bz.x, bz.y, bz.w, bz.h);
  ctx.fill();

  if (gameModeColors().glow) {
    ctx.shadowColor = ACCENT;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.font = '700 12px "JetBrains Mono", monospace';
  ctx.fillStyle = GAME_MODE === 'light' ? '#fafaf5' : '#05060f';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var label = (currentRound >= TOTAL_ROUNDS - 1) ? t('complete') : t('nextRound');
  ctx.fillText(label, bz.x + bz.w / 2, bz.y + bz.h / 2);
  ctx.restore();
}

function drawCompleteScreen(mc) {
  ctx.save();
  var cx = W / 2;
  var cy = H * 0.35;

  ctx.font = '700 28px "Space Grotesk", sans-serif';
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'center';
  ctx.fillText(t('complete'), cx, cy);

  ctx.font = '700 14px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.text;
  ctx.fillText(t('finalScore'), cx, cy + 40);

  ctx.font = '700 48px "JetBrains Mono", monospace';
  ctx.fillStyle = '#fbbf24';
  ctx.fillText(totalScore + ' / ' + (TOTAL_ROUNDS * 50), cx, cy + 90);

  // Rating
  var pct = totalScore / (TOTAL_ROUNDS * 50);
  var rating = pct >= 0.85 ? 'S' : pct >= 0.7 ? 'A' : pct >= 0.5 ? 'B' : 'C';
  var ratingColor = pct >= 0.85 ? '#fbbf24' : pct >= 0.7 ? '#22c55e' : pct >= 0.5 ? '#60a5fa' : mc.dim;
  ctx.font = '700 64px "Space Grotesk", sans-serif';
  ctx.fillStyle = ratingColor;
  ctx.fillText(rating, cx, cy + 160);

  // Stars visualized as bars
  var bars = Math.ceil(pct * 5);
  var barW = 20;
  var barGap = 6;
  var totalBarW = bars * barW + (bars - 1) * barGap;
  var bStartX = cx - totalBarW / 2;
  for (var b = 0; b < bars; b++) {
    ctx.fillStyle = ratingColor;
    ctx.globalAlpha = 0.3 + 0.7 * ((b + 1) / bars);
    ctx.fillRect(bStartX + b * (barW + barGap), cy + 180, barW, 8);
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ================================================================
// HUD & STATUS
// ================================================================
function updateHUD() {
  var round = ROUND_CONFIGS[currentRound];
  var eng = ENGINES[round.ei];
  document.getElementById('hudV1').textContent = (currentRound + 1) + '/' + TOTAL_ROUNDS;
  document.getElementById('hudV2').textContent = eng.label;
  document.getElementById('hudV3').textContent = round.massG + 'g';
  document.getElementById('hudV4').textContent = eng.impulse + ' N\u00b7s';
  document.getElementById('scoreDisplay').textContent = totalScore;
}

function updateStatus() {
  var statusEl = document.getElementById('statusLabel');
  var trialsEl = document.getElementById('statusTrials');
  var resultEl = document.getElementById('statusResult');
  trialsEl.textContent = currentRound + ' / ' + TOTAL_ROUNDS;

  if (phase === 'select') {
    statusEl.textContent = t('selectEngine');
    resultEl.textContent = '';
    resultEl.className = 'status-result';
  } else if (phase === 'predict') {
    statusEl.textContent = t('dragMarker');
    resultEl.textContent = '';
    resultEl.className = 'status-result';
  } else if (phase === 'launching') {
    statusEl.textContent = t('launch') + '...';
  } else if (phase === 'reveal' || phase === 'correct') {
    statusEl.textContent = phase === 'correct' ? t('phase2') : t('idealH');
  } else if (phase === 'corrReveal') {
    statusEl.textContent = t('realH');
    resultEl.textContent = '+' + (roundScore + corrScore);
    resultEl.className = 'status-result pass';
  }
}

// ================================================================
// ANIMATION LOOP
// ================================================================
var lastFrameTime = 0;
function gameLoop(ts) {
  var dt = (ts - lastFrameTime) / 1000;
  lastFrameTime = ts;
  if (dt > 0.1) dt = 0.1;

  if (phase === 'launching') {
    rocketAnimY += dt * 1.2;
    if (rocketAnimY >= 1) {
      rocketAnimY = 1;
      phase = 'reveal';
      // Calculate score for ideal prediction
      var round = ROUND_CONFIGS[currentRound];
      var eng = ENGINES[round.ei];
      var ih = idealHeight(eng.impulse, round.massG);
      var diff = Math.abs(markerH - ih);
      roundScore = diff <= 5 ? 30 : diff <= 20 ? 15 : 5;
      totalScore += roundScore;
      updateHUD();
      updateStatus();
      // Transition to correction phase after a brief pause
      setTimeout(function() {
        if (phase === 'reveal') {
          phase = 'correct';
          corrFactor = 0.6;
          updateStatus();
          draw();
        }
      }, 1200);
    }
    draw();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Keep drawing if particles remain
  if (particles.length > 0) {
    draw();
  }

  requestAnimationFrame(gameLoop);
}

// ================================================================
// INPUT HANDLING
// ================================================================
function getCanvasPos(e) {
  var rect = cvs.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height),
  };
}

function hitRect(pos, zone) {
  return pos.x >= zone.x && pos.x <= zone.x + zone.w &&
         pos.y >= zone.y && pos.y <= zone.y + zone.h;
}

function onPointerDown(e) {
  e.preventDefault();
  var pos = getCanvasPos(e);

  if (gameComplete) return;

  if (phase === 'predict') {
    // Check if clicking near the marker triangle
    var sz = scaleZone();
    var markerY = metersToY(Math.min(markerH, SCALE_MAX));
    // Generous hit area for dragging
    if (pos.x >= sz.x - 20 && pos.x <= sz.x2 + 60 && Math.abs(pos.y - markerY) < 25) {
      draggingMarker = true;
      return;
    }
    // Also allow clicking anywhere on the scale strip to set the marker
    if (pos.x >= sz.x - 20 && pos.x <= sz.x2 + 60 && pos.y >= sz.y && pos.y <= sz.y2) {
      draggingMarker = true;
      markerH = Math.round(yToMeters(pos.y));
      draw();
      return;
    }
    // Launch button
    if (hitRect(pos, launchBtnZone())) {
      doLaunch();
      return;
    }
  }

  if (phase === 'correct') {
    var cz = corrSliderZone();
    // Correction slider hit
    if (pos.x >= cz.x - 10 && pos.x <= cz.x + cz.w + 10 &&
        pos.y >= cz.trackY - 15 && pos.y <= cz.trackY + cz.trackH + 15) {
      draggingCorr = true;
      var frac = Math.max(0, Math.min(1, (pos.x - cz.x) / cz.w));
      corrFactor = 0.5 + frac * 0.2;
      corrFactor = Math.round(corrFactor * 100) / 100;
      draw();
      return;
    }
    // Confirm button
    if (hitRect(pos, confirmBtnZone())) {
      doConfirm();
      return;
    }
  }

  if (phase === 'corrReveal') {
    if (hitRect(pos, nextBtnZone())) {
      doNext();
      return;
    }
  }

  if (phase === 'select') {
    // Transition to predict (the round config is pre-selected)
    phase = 'predict';
    markerH = 50;
    updateStatus();
    draw();
  }
}

function onPointerMove(e) {
  e.preventDefault();
  var pos = getCanvasPos(e);

  if (draggingMarker) {
    var sz = scaleZone();
    markerH = yToMeters(pos.y);
    markerH = Math.round(markerH * 10) / 10;
    markerH = Math.max(0, Math.min(SCALE_MAX, markerH));
    draw();
    return;
  }

  if (draggingCorr) {
    var cz = corrSliderZone();
    var frac = Math.max(0, Math.min(1, (pos.x - cz.x) / cz.w));
    corrFactor = 0.5 + frac * 0.2;
    corrFactor = Math.round(corrFactor * 100) / 100;
    draw();
    return;
  }

  // Hover states
  var needRedraw = false;

  if (phase === 'predict') {
    var newHoverLaunch = hitRect(pos, launchBtnZone());
    if (newHoverLaunch !== hoverLaunch) { hoverLaunch = newHoverLaunch; needRedraw = true; }
  }
  if (phase === 'correct') {
    var newHoverConfirm = hitRect(pos, confirmBtnZone());
    if (newHoverConfirm !== hoverConfirm) { hoverConfirm = newHoverConfirm; needRedraw = true; }
  }
  if (phase === 'corrReveal') {
    var newHoverNext = hitRect(pos, nextBtnZone());
    if (newHoverNext !== hoverNext) { hoverNext = newHoverNext; needRedraw = true; }
  }

  if (needRedraw) draw();
}

function onPointerUp(e) {
  draggingMarker = false;
  draggingCorr = false;
}

// ================================================================
// ACTIONS
// ================================================================
function doLaunch() {
  if (phase !== 'predict') return;
  phase = 'launching';
  rocketAnimY = 0;
  particles = [];
  updateStatus();
}

function doConfirm() {
  if (phase !== 'correct') return;
  phase = 'corrReveal';
  // Score correction prediction
  var round = ROUND_CONFIGS[currentRound];
  var eng = ENGINES[round.ei];
  var ih = idealHeight(eng.impulse, round.massG);
  var trueReal = ih * 0.6; // reference correction factor
  var predicted = ih * corrFactor;
  var diff = Math.abs(predicted - trueReal);
  corrScore = diff <= 3 ? 20 : diff <= 10 ? 10 : 5;
  totalScore += corrScore;
  updateHUD();
  updateStatus();
  draw();
}

function doNext() {
  currentRound++;
  if (currentRound >= TOTAL_ROUNDS) {
    gameComplete = true;
    updateStatus();
    draw();
    return;
  }
  phase = 'select';
  roundScore = 0;
  corrScore = 0;
  rocketAnimY = 0;
  markerH = 50;
  corrFactor = 0.6;
  particles = [];
  hoverLaunch = false;
  hoverConfirm = false;
  hoverNext = false;
  updateHUD();
  updateStatus();
  draw();
}

function doReset() {
  currentRound = 0;
  totalScore = 0;
  phase = 'select';
  roundScore = 0;
  corrScore = 0;
  rocketAnimY = 0;
  markerH = 50;
  corrFactor = 0.6;
  particles = [];
  gameComplete = false;
  hoverLaunch = false;
  hoverConfirm = false;
  hoverNext = false;
  updateHUD();
  updateStatus();
  draw();
}

// ================================================================
// INIT
// ================================================================
function initCanvas() {
  cvs = document.getElementById('gc');
  ctx = cvs.getContext('2d');
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  var parent = cvs.parentElement;
  W = parent.clientWidth;
  H = parent.clientHeight;
  cvs.width = W * dpr;
  cvs.height = H * dpr;
  ctx.scale(dpr, dpr);
}

function onResize() {
  initCanvas();
  draw();
}

(function init() {
  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  initCanvas();
  window.addEventListener('resize', onResize);

  // Mouse events
  cvs.addEventListener('mousedown', onPointerDown);
  cvs.addEventListener('mousemove', onPointerMove);
  cvs.addEventListener('mouseup', onPointerUp);

  // Touch events
  cvs.addEventListener('touchstart', onPointerDown, {passive: false});
  cvs.addEventListener('touchmove', onPointerMove, {passive: false});
  cvs.addEventListener('touchend', onPointerUp);

  // Reset button
  document.getElementById('btnReset').addEventListener('click', doReset);

  updateHUD();
  updateStatus();
  draw();

  // Start animation loop
  requestAnimationFrame(gameLoop);

  // Auto-advance from select to predict on first load after short delay
  setTimeout(function() {
    if (phase === 'select') {
      phase = 'predict';
      updateStatus();
      draw();
    }
  }, 600);
})();
</script>
