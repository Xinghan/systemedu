<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

// ============================================================
// CUSTOM BACKGROUND: deep space with stars + purple nebula
// ============================================================
function drawBg(ctx, W, H) {
  // Dark base
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#050510');
  g.addColorStop(0.5, '#0a0820');
  g.addColorStop(1, '#060412');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Purple nebula glow
  var ng = ctx.createRadialGradient(W * 0.6, H * 0.3, 0, W * 0.6, H * 0.3, W * 0.5);
  ng.addColorStop(0, 'rgba(167,139,250,0.08)');
  ng.addColorStop(0.5, 'rgba(120,80,200,0.04)');
  ng.addColorStop(1, 'transparent');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, W, H);

  // Second nebula
  var ng2 = ctx.createRadialGradient(W * 0.2, H * 0.7, 0, W * 0.2, H * 0.7, W * 0.4);
  ng2.addColorStop(0, 'rgba(100,60,180,0.06)');
  ng2.addColorStop(1, 'transparent');
  ctx.fillStyle = ng2;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < _stars.length; i++) {
    var s = _stars[i];
    ctx.fillStyle = 'rgba(220,220,255,' + s.b + ')';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Corner brackets (cyberpunk mode)
  var mc = AnimRuntime.modeColors;
  if (mc.cornerBrackets) {
    var bLen = Math.min(W, H) * 0.06;
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(8, 8 + bLen); ctx.lineTo(8, 8); ctx.lineTo(8 + bLen, 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-8-bLen, 8); ctx.lineTo(W-8, 8); ctx.lineTo(W-8, 8+bLen); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, H-8-bLen); ctx.lineTo(8, H-8); ctx.lineTo(8+bLen, H-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-8-bLen, H-8); ctx.lineTo(W-8, H-8); ctx.lineTo(W-8, H-8+bLen); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Scanlines
  if (mc.scanlines) {
    ctx.strokeStyle = 'rgba(255,255,255,0.018)';
    ctx.lineWidth = 1;
    for (var sy = 0; sy < H; sy += 3) {
      ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
    }
  }
}

// ============================================================
// CUSTOM DRAW ELEMENT
// ============================================================
function customDrawElement(ctx, el, W, H) {
  var P = AnimRuntime.PAL;

  // Capsule shape
  if (el.type === 'capsule') {
    var cx = el.x, cy = el.y, sz = el.sz || 20;
    ctx.save();
    // Body
    ctx.fillStyle = el.color || '#8b8b9e';
    ctx.beginPath();
    ctx.moveTo(cx - sz * 0.4, cy - sz * 0.6);
    ctx.lineTo(cx + sz * 0.4, cy - sz * 0.6);
    ctx.lineTo(cx + sz * 0.5, cy + sz * 0.4);
    ctx.lineTo(cx - sz * 0.5, cy + sz * 0.4);
    ctx.closePath();
    ctx.fill();
    // Heat shield
    ctx.fillStyle = el.shieldColor || '#e85050';
    ctx.fillRect(cx - sz * 0.55, cy + sz * 0.4, sz * 1.1, sz * 0.15);
    // Window
    ctx.fillStyle = 'rgba(160,200,255,0.6)';
    ctx.beginPath();
    ctx.arc(cx, cy - sz * 0.2, sz * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return true;
  }

  // Parachute canopy
  if (el.type === 'parachute') {
    var cx = el.x, cy = el.y, pw = el.pw || 50, ph = el.ph || 30;
    ctx.save();
    // Canopy
    ctx.fillStyle = el.color || 'rgba(167,139,250,0.7)';
    ctx.beginPath();
    ctx.moveTo(cx - pw / 2, cy);
    ctx.quadraticCurveTo(cx - pw / 3, cy - ph, cx, cy - ph * 0.9);
    ctx.quadraticCurveTo(cx + pw / 3, cy - ph, cx + pw / 2, cy);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = el.stroke || '#a78bfa';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Canopy stripes
    var stripes = 5;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 0.5;
    for (var i = 1; i < stripes; i++) {
      var frac = i / stripes;
      var sx = cx - pw / 2 + frac * pw;
      ctx.beginPath();
      ctx.moveTo(sx, cy);
      var cpx = cx - pw / 3 + frac * (pw * 2 / 3);
      ctx.quadraticCurveTo(cpx, cy - ph * 0.8, sx, cy - ph * 0.85 + Math.abs(frac - 0.5) * ph * 0.3);
      ctx.stroke();
    }
    // Cords
    if (el.cordY !== undefined) {
      ctx.strokeStyle = 'rgba(200,200,220,0.4)';
      ctx.lineWidth = 0.5;
      for (var j = 0; j < 4; j++) {
        var lx = cx - pw * 0.35 + j * (pw * 0.7 / 3);
        ctx.beginPath();
        ctx.moveTo(lx, cy);
        ctx.lineTo(el.cordX || cx, el.cordY);
        ctx.stroke();
      }
    }
    ctx.restore();
    return true;
  }

  // Airfoil cross-section
  if (el.type === 'airfoil') {
    var cx = el.x, cy = el.y, aw = el.aw || 120, ah = el.ah || 20;
    ctx.save();
    ctx.fillStyle = el.color || '#8b8b9e';
    ctx.beginPath();
    // Leading edge (rounded)
    ctx.moveTo(cx - aw / 2, cy);
    // Top surface (curved)
    ctx.bezierCurveTo(cx - aw * 0.3, cy - ah, cx + aw * 0.1, cy - ah * 0.8, cx + aw / 2, cy);
    // Bottom surface (slightly curved)
    ctx.bezierCurveTo(cx + aw * 0.1, cy + ah * 0.3, cx - aw * 0.3, cy + ah * 0.2, cx - aw / 2, cy);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = el.stroke || '#a78bfa';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
    return true;
  }

  // Flow lines
  if (el.type === 'flowlines') {
    ctx.save();
    var lines = el.lines || [];
    ctx.strokeStyle = el.color || 'rgba(167,139,250,0.4)';
    ctx.lineWidth = el.lineWidth || 1;
    for (var li = 0; li < lines.length; li++) {
      var ln = lines[li];
      ctx.beginPath();
      if (ln.length === 4) {
        ctx.moveTo(ln[0], ln[1]);
        ctx.lineTo(ln[2], ln[3]);
      } else if (ln.length === 6) {
        ctx.moveTo(ln[0], ln[1]);
        ctx.quadraticCurveTo(ln[2], ln[3], ln[4], ln[5]);
      }
      ctx.stroke();
      // Arrow tip
      if (ln.length >= 4) {
        var ex = ln[ln.length - 2], ey = ln[ln.length - 1];
        var px = ln[ln.length - 4], py = ln[ln.length - 3];
        var ag = Math.atan2(ey - py, ex - px);
        ctx.fillStyle = el.color || 'rgba(167,139,250,0.4)';
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex - 4 * Math.cos(ag - 0.4), ey - 4 * Math.sin(ag - 0.4));
        ctx.lineTo(ex - 4 * Math.cos(ag + 0.4), ey - 4 * Math.sin(ag + 0.4));
        ctx.fill();
      }
    }
    ctx.restore();
    return true;
  }

  // Descent path (curved or straight)
  if (el.type === 'path') {
    ctx.save();
    ctx.strokeStyle = el.color || '#a78bfa';
    ctx.lineWidth = el.lineWidth || 1.5;
    if (el.dash) ctx.setLineDash(el.dash);
    ctx.beginPath();
    if (el.curve) {
      ctx.moveTo(el.x1, el.y1);
      ctx.quadraticCurveTo(el.cpx, el.cpy, el.x2, el.y2);
    } else {
      ctx.moveTo(el.x1, el.y1);
      ctx.lineTo(el.x2, el.y2);
    }
    ctx.stroke();
    if (el.dash) ctx.setLineDash([]);
    ctx.restore();
    return true;
  }

  // Mini illustration box
  if (el.type === 'minibox') {
    ctx.save();
    ctx.strokeStyle = el.stroke || 'rgba(167,139,250,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(el.x, el.y, el.w, el.h);
    ctx.fillStyle = el.fill || 'rgba(167,139,250,0.05)';
    ctx.fillRect(el.x, el.y, el.w, el.h);
    ctx.restore();
    return true;
  }

  // Flame / impact particles
  if (el.type === 'impact') {
    ctx.save();
    var colors = ['#ff4444','#ff8800','#ffcc00'];
    for (var pi = 0; pi < 8; pi++) {
      var angle = (pi / 8) * Math.PI;
      var dist = el.r * (0.5 + Math.sin(pi * 3.7) * 0.5);
      ctx.fillStyle = colors[pi % 3];
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(el.x + Math.cos(angle) * dist, el.y - Math.sin(angle) * dist, 2 + pi % 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    return true;
  }

  return false;
}

    // Drag up
    els.push({id:'f2_dragA', type:'arrow', x1:pCx, y1:pCy+100, x2:pCx, y2:pCy+45, color:'#22c55e', lineWidth:2, headSize:8, alpha:1});
    els.push({id:'f2_dragL', type:'text', text:t('f2_drag'), x:pCx+18, y:pCy+60, color:'#22c55e', size:10, align:'left', alpha:1});

    // Large area label
    els.push({id:'f2_area', type:'text', text:t('f2_area'), x:cx+100, y:100, color:P.secondary, size:11, align:'center', alpha:1});

    // Terminal velocity equation
    els.push({id:'f2_eq', type:'label', text:t('f2_eq'), x:cx+80, y:H-55, color:P.tertiary, size:11, align:'center', alpha:1});

    // Equals sign between arrows
    els.push({id:'f2_eqSign', type:'label', text:'=', x:cx+80, y:H-35, color:P.primary, size:18, align:'center', alpha:1});
  }

  if (f === 3) {
    // How a glider works
    els.push({id:'f3_title', type:'label', text:t('f3_title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong, alpha:1});

    // Airfoil cross-section
    var aCx = cx - 30, aCy = cy + 10;
    els.push({id:'f3_wing', type:'airfoil', x:aCx, y:aCy, aw:160, ah:25, color:'#6e6e84', stroke:'#a78bfa', alpha:1});

    // Flow lines over wing (faster on top, curve up)
    var topFlow = 'rgba(120,180,255,0.5)';
    var botFlow = 'rgba(255,180,120,0.35)';
    els.push({id:'f3_topFlow', type:'flowlines', color:topFlow, lineWidth:1, lines:[
      [aCx-120, aCy-30, aCx-40, aCy-35, aCx+100, aCy-15],
      [aCx-120, aCy-18, aCx-40, aCy-25, aCx+100, aCy-8],
      [aCx-120, aCy-8, aCx-40, aCy-16, aCx+100, aCy-2],
    ], alpha:1});

    // Flow lines under wing (slower, straighter)
    els.push({id:'f3_botFlow', type:'flowlines', color:botFlow, lineWidth:1, lines:[
      [aCx-120, aCy+10, aCx-20, aCy+14, aCx+100, aCy+8],
      [aCx-120, aCy+22, aCx-20, aCy+20, aCx+100, aCy+18],
    ], alpha:1});

    // Labels for fast/slow
    els.push({id:'f3_fastL', type:'text', text:t('f3_fast'), x:aCx+110, y:aCy-25, color:topFlow, size:9, align:'left', alpha:1});
    els.push({id:'f3_slowL', type:'text', text:t('f3_slow'), x:aCx+110, y:aCy+18, color:botFlow, size:9, align:'left', alpha:1});

    // Force arrows
    // Lift up
    els.push({id:'f3_liftA', type:'arrow', x1:aCx, y1:aCy, x2:aCx, y2:aCy-70, color:'#22c55e', lineWidth:2, headSize:8, alpha:1});
    els.push({id:'f3_liftL', type:'text', text:t('f3_lift'), x:aCx-25, y:aCy-55, color:'#22c55e', size:10, align:'right', alpha:1});
    // Gravity down
    els.push({id:'f3_gravA', type:'arrow', x1:aCx, y1:aCy, x2:aCx, y2:aCy+60, color:'#ef4444', lineWidth:2, headSize:8, alpha:1});
    els.push({id:'f3_gravL', type:'text', text:t('f3_grav'), x:aCx-25, y:aCy+45, color:'#ef4444', size:10, align:'right', alpha:1});

    // Explanation
    els.push({id:'f3_exp', type:'text', text:t('f3_exp'), x:cx, y:H-35, color:P.muted, size:10, align:'center', alpha:1});

    // Flow direction label
    els.push({id:'f3_flowL', type:'text', text:t('f3_flow'), x:cx, y:70, color:P.secondary, size:11, align:'center', alpha:1});
  }

  if (f === 4) {
    // Parachute vs Glider comparison
    els.push({id:'f4_title', type:'label', text:t('f4_title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong, alpha:1});

    var leftX = cx - 140, rightX = cx + 140;
    var startY = 70, endY = 320;

    // LEFT: Parachute path (straight down)
    els.push({id:'f4_pLabel', type:'label', text:t('f4_pLabel'), x:leftX, y:startY, color:'#a78bfa', size:11, align:'center', alpha:1});
    els.push({id:'f4_pPara', type:'parachute', x:leftX, y:startY+35, pw:35, ph:18, color:'rgba(167,139,250,0.5)', stroke:'#a78bfa', cordY:startY+60, cordX:leftX, alpha:1});
    els.push({id:'f4_pCap', type:'capsule', x:leftX, y:startY+65, sz:12, color:'#7e7e94', shieldColor:'#a78bfa', alpha:1});
    // Straight down path
    els.push({id:'f4_pPath', type:'path', x1:leftX, y1:startY+80, x2:leftX, y2:endY-30, color:'rgba(167,139,250,0.3)', lineWidth:1.5, dash:[4,4], alpha:1});
    // Landing spot
    els.push({id:'f4_pGnd', type:'line', x1:leftX-40, y1:endY-20, x2:leftX+40, y2:endY-20, color:'rgba(167,139,250,0.4)', lineWidth:1, alpha:1});
    els.push({id:'f4_pDesc', type:'text', text:t('f4_pDesc'), x:leftX, y:endY, color:P.muted, size:9, align:'center', alpha:1});

    // Divider
    els.push({id:'f4_div', type:'line', x1:cx, y1:60, x2:cx, y2:endY+10, color:'rgba(167,139,250,0.12)', lineWidth:0.5, dash:[4,4], alpha:1});

    // RIGHT: Glider path (diagonal glide)
    els.push({id:'f4_gLabel', type:'label', text:t('f4_gLabel'), x:rightX-60, y:startY, color:P.tertiary, size:11, align:'center', alpha:1});
    // Glider shape (simplified)
    els.push({id:'f4_gWing', type:'airfoil', x:rightX-60, y:startY+55, aw:60, ah:8, color:'#6e6e84', stroke:P.tertiary, alpha:1});
    // Glide path (curved, forward + down)
    els.push({id:'f4_gPath', type:'path', x1:rightX-60, y1:startY+65, x2:rightX+60, y2:endY-30, curve:true, cpx:rightX, cpy:startY+150, color:'rgba(212,188,92,0.35)', lineWidth:1.5, dash:[4,4], alpha:1});
    // Landing spot (further right)
    els.push({id:'f4_gGnd', type:'line', x1:rightX+20, y1:endY-20, x2:rightX+100, y2:endY-20, color:'rgba(212,188,92,0.4)', lineWidth:1, alpha:1});
    els.push({id:'f4_gDesc', type:'text', text:t('f4_gDesc'), x:rightX+20, y:endY, color:P.muted, size:9, align:'center', alpha:1});

    // Height markers
    els.push({id:'f4_hTop', type:'text', text:'H', x:cx-20, y:startY+30, color:P.muted, size:9, align:'center', alpha:1});
    els.push({id:'f4_hBot', type:'text', text:'0', x:cx-20, y:endY-25, color:P.muted, size:9, align:'center', alpha:1});
    els.push({id:'f4_hLine', type:'line', x1:cx-20, y1:startY+40, x2:cx-20, y2:endY-35, color:'rgba(167,139,250,0.15)', lineWidth:0.5, alpha:1});
  }

  if (f === 5) {
    // Real-world applications -- 4 mini illustrations
    els.push({id:'f5_title', type:'label', text:t('f5_title'), x:cx, y:28, color:P.primary, size:16, align:'center', glow:P.glowStrong, alpha:1});

    var bw = 130, bh = 110, gap = 20;
    var totalW = bw * 2 + gap;
    var sx = cx - totalW / 2;
    var row1y = 55, row2y = 55 + bh + gap;

    // Box 1: Shenzhou capsule
    els.push({id:'f5_b1', type:'minibox', x:sx, y:row1y, w:bw, h:bh, stroke:'rgba(167,139,250,0.3)', fill:'rgba(167,139,250,0.04)', alpha:1});
    els.push({id:'f5_sz_para', type:'parachute', x:sx+bw/2, y:row1y+25, pw:45, ph:22, color:'rgba(220,80,80,0.5)', stroke:'#e05050', cordY:row1y+55, cordX:sx+bw/2, alpha:1});
    els.push({id:'f5_sz_cap', type:'capsule', x:sx+bw/2, y:row1y+60, sz:10, color:'#8b8b9e', shieldColor:'#c44040', alpha:1});
    els.push({id:'f5_szL', type:'text', text:t('f5_sz'), x:sx+bw/2, y:row1y+bh-12, color:P.secondary, size:9, align:'center', alpha:1});

    // Box 2: Mars rover sky crane
    els.push({id:'f5_b2', type:'minibox', x:sx+bw+gap, y:row1y, w:bw, h:bh, stroke:'rgba(167,139,250,0.3)', fill:'rgba(167,139,250,0.04)', alpha:1});
    var m2cx = sx+bw+gap+bw/2;
    els.push({id:'f5_mars_para', type:'parachute', x:m2cx, y:row1y+18, pw:38, ph:18, color:'rgba(200,120,60,0.5)', stroke:'#c87840', cordY:row1y+42, cordX:m2cx, alpha:1});
    // Rover (small box)
    els.push({id:'f5_mars_rov', type:'box', x:m2cx-12, y:row1y+55, w:24, h:14, fill:'#6e6e84', stroke:'#a78bfa', lineWidth:0.5, alpha:1});
    // Crane cables
    els.push({id:'f5_mars_cab', type:'flowlines', color:'rgba(200,200,220,0.3)', lineWidth:0.5, lines:[
      [m2cx-6, row1y+45, m2cx-10, row1y+55],
      [m2cx+6, row1y+45, m2cx+10, row1y+55],
    ], alpha:1});
    els.push({id:'f5_marsL', type:'text', text:t('f5_mars'), x:m2cx, y:row1y+bh-12, color:P.secondary, size:9, align:'center', alpha:1});

    // Box 3: Hang glider
    els.push({id:'f5_b3', type:'minibox', x:sx, y:row2y, w:bw, h:bh, stroke:'rgba(167,139,250,0.3)', fill:'rgba(167,139,250,0.04)', alpha:1});
    var h3cx = sx+bw/2;
    // Triangle wing
    els.push({id:'f5_hang_wing', type:'custom', x:h3cx, y:row2y+30, draw:function(c, el) {
      c.strokeStyle = '#a78bfa'; c.lineWidth = 1.5;
      c.beginPath();
      c.moveTo(el.x - 40, el.y + 12);
      c.lineTo(el.x, el.y - 8);
      c.lineTo(el.x + 40, el.y + 12);
      c.closePath();
      c.fillStyle = 'rgba(167,139,250,0.2)';
      c.fill(); c.stroke();
      // Person hanging below
      c.strokeStyle = 'rgba(200,200,220,0.5)'; c.lineWidth = 0.5;
      c.beginPath(); c.moveTo(el.x, el.y+5); c.lineTo(el.x, el.y+25); c.stroke();
      c.fillStyle = '#8b8b9e';
      c.beginPath(); c.arc(el.x, el.y+28, 3, 0, Math.PI*2); c.fill();
    }, alpha:1});
    els.push({id:'f5_hangL', type:'text', text:t('f5_hang'), x:h3cx, y:row2y+bh-12, color:P.secondary, size:9, align:'center', alpha:1});

    // Box 4: Maple seed
    els.push({id:'f5_b4', type:'minibox', x:sx+bw+gap, y:row2y, w:bw, h:bh, stroke:'rgba(167,139,250,0.3)', fill:'rgba(167,139,250,0.04)', alpha:1});
    var m4cx = sx+bw+gap+bw/2;
    els.push({id:'f5_maple_seed', type:'custom', x:m4cx, y:row2y+35, draw:function(c, el) {
      // Seed body
      c.fillStyle = '#8b6e3e';
      c.beginPath(); c.arc(el.x, el.y+10, 4, 0, Math.PI*2); c.fill();
      // Wing (elongated curved shape)
      c.fillStyle = 'rgba(120,160,80,0.6)';
      c.beginPath();
      c.moveTo(el.x, el.y+8);
      c.quadraticCurveTo(el.x+12, el.y-5, el.x+35, el.y-15);
      c.quadraticCurveTo(el.x+15, el.y-2, el.x+2, el.y+10);
      c.closePath();
      c.fill();
      c.strokeStyle = 'rgba(120,160,80,0.8)'; c.lineWidth = 0.5; c.stroke();
      // Rotation arrow
      c.strokeStyle = 'rgba(167,139,250,0.4)'; c.lineWidth = 0.5;
      c.beginPath();
      c.arc(el.x+5, el.y+5, 18, -0.5, 2.5);
      c.stroke();
      // Arrow tip on rotation
      c.fillStyle = 'rgba(167,139,250,0.4)';
      var tipX = el.x+5 + 18*Math.cos(2.5);
      var tipY = el.y+5 + 18*Math.sin(2.5);
      c.beginPath();
      c.moveTo(tipX, tipY);
      c.lineTo(tipX-3, tipY-4);
      c.lineTo(tipX+4, tipY-2);
      c.fill();
    }, alpha:1});
    els.push({id:'f5_mapleL', type:'text', text:t('f5_maple'), x:m4cx, y:row2y+bh-12, color:P.secondary, size:9, align:'center', alpha:1});
  }

  return els;
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
</body>
</html>
