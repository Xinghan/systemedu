<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* ── Slider / button controls ── */
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
/* ── Main area ── */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">GAME TITLE</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>

    <div class="sidebar-section" id="levelLabel">LEVEL</div>
    <div class="sidebar-guide" id="levelDesc"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="launchBtn">LAUNCH</button>
    <button class="reset-btn" id="resetBtn">RESET</button>

  </div>
  <div class="game-main">
    <div class="game-hud">

      <div class="hud-tag" id="hudTag">ROCKET LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">LEVEL</div><div class="hud-val" id="hudV1">1/3</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">WEIGHT</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">RESULT</div><div class="hud-val" id="hudV3">--</div></div>

    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">

      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">READY</span>
      <span class="status-result" id="statusResult"></span>

    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM (inline -- games don't use shared runtime)
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

// Primary accent color -- set by game init (e.g. '#f97316' for mech)
var ACCENT = '#50ffb0';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  // Grid
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // Inner border (light)
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  // Top line (dark)
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  // Scanlines (cyberpunk)
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  // Corner brackets (cyberpunk)
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  // Glow (cyberpunk)
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,mc.accent.replace(/[\d.]+\)$/,'0.06)'));rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n helper
// ================================================================
var LANG = 'cn';
var I18N = {};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    if (typeof refreshI18N === 'function') refreshI18N();
  });
}

// ================================================================
// LLM fills in everything below this line:
// - ACCENT color
// - I18N table
// - Game CONFIG
// - Canvas drawing logic (using gameModeColors() for adaptive colors)
// - refreshI18N()
// - onModeChange(mode) -- optional, called when user switches mode
// ================================================================

// ================================================================
// GAME: Rocket Weight Position Simulator
// ================================================================

ACCENT = '#818cf8'; // space indigo
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();

// ---- i18n ----
I18N = {
  gameTitle: {en:'ROCKET WEIGHT LAB', cn:'\u706b\u7bad\u914d\u91cd\u5b9e\u9a8c\u5ba4'},
  gameSub: {en:'Drag the weight to find stable flight', cn:'\u62d6\u62fd\u914d\u91cd\u5757\uff0c\u627e\u5230\u7a33\u5b9a\u98de\u884c\u7684\u79d8\u5bc6'},
  guide: {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText1: {en:'Drag the blue block up/down on the rocket to change weight position.', cn:'\u62d6\u62fd\u706b\u7bad\u4e0a\u7684\u84dd\u8272\u914d\u91cd\u5757\uff0c\u6539\u53d8\u5b83\u7684\u4f4d\u7f6e\u3002'},
  guideText2: {en:'Press LAUNCH to see the flight trajectory.', cn:'\u70b9\u51fb\u201c\u53d1\u5c04\u201d\u89c2\u5bdf\u98de\u884c\u8f68\u8ff9\u3002'},
  guideText3: {en:'Complete 3 levels to master stability!', cn:'\u5b8c\u6210 3 \u5173\u638c\u63e1\u7a33\u5b9a\u6027\uff01'},
  launch: {en:'LAUNCH', cn:'\u53d1\u5c04'},
  reset: {en:'RESET', cn:'\u91cd\u7f6e'},
  level: {en:'LEVEL', cn:'\u5173\u5361'},
  weight: {en:'WEIGHT POS', cn:'\u914d\u91cd\u4f4d\u7f6e'},
  result: {en:'RESULT', cn:'\u7ed3\u679c'},
  status: {en:'STATUS', cn:'\u72b6\u6001'},
  ready: {en:'READY', cn:'\u5c31\u7eea'},
  flying: {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  front: {en:'FRONT', cn:'\u524d\u90e8'},
  middle: {en:'MIDDLE', cn:'\u4e2d\u90e8'},
  rear: {en:'REAR', cn:'\u5c3e\u90e8'},
  stable: {en:'STABLE!', cn:'\u7a33\u5b9a\uff01'},
  shaky: {en:'SHAKY', cn:'\u6447\u6643'},
  tumble: {en:'TUMBLE!', cn:'\u7ffb\u6eda\uff01'},
  pass: {en:'PASS', cn:'\u901a\u8fc7'},
  fail: {en:'TRY AGAIN', cn:'\u518d\u8bd5\u4e00\u6b21'},
  lv1_title: {en:'Level 1: Find Stable Position', cn:'\u7b2c1\u5173\uff1a\u627e\u5230\u6700\u7a33\u5b9a\u7684\u4f4d\u7f6e'},
  lv1_desc: {en:'Drag weight to make the rocket fly straight!', cn:'\u62d6\u52a8\u914d\u91cd\u8ba9\u706b\u7bad\u76f4\u98de\uff01'},
  lv2_title: {en:'Level 2: Compare Front vs Rear', cn:'\u7b2c2\u5173\uff1a\u5bf9\u6bd4\u524d\u540e\u914d\u91cd'},
  lv2_desc: {en:'Launch with front weight, then rear weight. See the difference!', cn:'\u5206\u522b\u7528\u524d\u914d\u91cd\u548c\u540e\u914d\u91cd\u53d1\u5c04\uff0c\u89c2\u5bdf\u5dee\u5f02\uff01'},
  lv3_title: {en:'Level 3: Predict Middle Weight', cn:'\u7b2c3\u5173\uff1a\u9884\u6d4b\u4e2d\u914d\u91cd'},
  lv3_desc: {en:'What happens with middle weight? Predict first, then verify!', cn:'\u4e2d\u90e8\u914d\u91cd\u4f1a\u600e\u6837\uff1f\u5148\u9884\u6d4b\u518d\u9a8c\u8bc1\uff01'},
  complete: {en:'ALL LEVELS COMPLETE!', cn:'\u5168\u90e8\u5173\u5361\u5b8c\u6210\uff01'},
  hudTag: {en:'ROCKET LAB', cn:'\u706b\u7bad\u5b9e\u9a8c\u5ba4'},
};

// ---- Game state ----
var currentLevel = 0;
var weightY = 0.3; // 0=top(nose), 1=bottom(tail), normalized
var rocketX = 0, rocketBaseY = 0;
var rocketLen = 0, rocketW = 0;
var dragging = false;
var launching = false;
var launchT = 0;
var launchTrail = [];
var launchResult = '';
var lv2Front = false, lv2Rear = false;
var levelPassed = [false, false, false];
var allComplete = false;

// Level configs
var levels = [
  {target:'front', passes:function(){ return weightY < 0.25; }},
  {target:'both', passes:function(){ return lv2Front && lv2Rear; }},
  {target:'middle', passes:function(){ return weightY >= 0.3 && weightY <= 0.6; }},
];

// ---- Canvas ----
var gc = document.getElementById('gc');
var gctx = gc.getContext('2d');
var gW = 800, gH = 600;

function resizeCanvas() {
  var parent = gc.parentElement;
  var rect = parent.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  gW = rect.width;
  gH = rect.height;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  gc.width = gW * dpr;
  gc.height = gH * dpr;
  gc.style.width = gW + 'px';
  gc.style.height = gH + 'px';
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Update rocket position
  rocketX = gW * 0.25;
  rocketBaseY = gH * 0.55;
  rocketLen = Math.max(gH * 0.35, 100);
  rocketW = Math.max(rocketLen * 0.16, 20);
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);
setTimeout(resizeCanvas, 400);

// ---- Drawing helpers ----
function getWeightLabel() {
  if (weightY < 0.25) return t('front');
  if (weightY > 0.65) return t('rear');
  return t('middle');
}

function getStabilityResult(wy) {
  if (wy < 0.25) return {label: t('stable'), color: '#22c55e', angle: -0.08, wobble: 0};
  if (wy > 0.65) return {label: t('tumble'), color: '#ef4444', angle: 0, wobble: 3.5};
  return {label: t('shaky'), color: '#fbbf24', angle: -0.05, wobble: 1.2};
}

function drawRocketBody(c, x, y, length, width, wy) {
  var mc = gameModeColors();
  var noseLen = length * 0.2;
  var bodyLen = length * 0.65;
  var finLen = length * 0.15;
  var halfW = width / 2;

  c.save();
  c.translate(x, y);

  // Nose
  c.fillStyle = mc.strokeDim;
  c.strokeStyle = mc.stroke;
  c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(0, -noseLen);
  c.lineTo(halfW, 0);
  c.lineTo(-halfW, 0);
  c.closePath();
  c.fill(); c.stroke();

  // Body
  c.fillStyle = mc.strokeDim;
  c.fillRect(-halfW, 0, width, bodyLen);
  c.strokeRect(-halfW, 0, width, bodyLen);

  // Fins
  c.beginPath();
  c.moveTo(-halfW, bodyLen);
  c.lineTo(-halfW - 10, bodyLen + finLen);
  c.lineTo(-halfW, bodyLen + finLen * 0.7);
  c.closePath();
  c.fill(); c.stroke();

  c.beginPath();
  c.moveTo(halfW, bodyLen);
  c.lineTo(halfW + 10, bodyLen + finLen);
  c.lineTo(halfW, bodyLen + finLen * 0.7);
  c.closePath();
  c.fill(); c.stroke();

  // Weight block
  var weightYPx = -noseLen + (noseLen + bodyLen) * wy;
  c.fillStyle = ACCENT;
  if (mc.glow) {
    c.shadowColor = ACCENT;
    c.shadowBlur = 12;
  }
  c.fillRect(-halfW + 3, weightYPx - 6, width - 6, 12);
  c.shadowBlur = 0;

  // Weight label
  c.fillStyle = mc.text;
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.textAlign = 'left';
  c.fillText(getWeightLabel(), halfW + 18, weightYPx + 4);

  // CG marker triangle
  var cgY = weightYPx;
  c.fillStyle = ACCENT;
  c.beginPath();
  c.moveTo(-halfW - 5, cgY);
  c.lineTo(-halfW - 18, cgY - 6);
  c.lineTo(-halfW - 18, cgY + 6);
  c.closePath();
  c.fill();
  c.font = "bold 9px 'JetBrains Mono',monospace";
  c.textAlign = 'right';
  c.fillText('CG', -halfW - 22, cgY + 4);

  c.restore();
}

function drawLaunchScene(c) {
  var mc = gameModeColors();
  if (launchTrail.length < 2) return;

  var stab = getStabilityResult(weightY);

  // Draw trajectory
  c.strokeStyle = stab.color;
  c.lineWidth = 2;
  c.setLineDash([4, 4]);
  c.beginPath();
  c.moveTo(launchTrail[0].x, launchTrail[0].y);
  for (var i = 1; i < launchTrail.length; i++) {
    c.lineTo(launchTrail[i].x, launchTrail[i].y);
  }
  c.stroke();
  c.setLineDash([]);

  // Draw rocket at current position along trail
  var idx = Math.min(Math.floor(launchT * launchTrail.length), launchTrail.length - 1);
  var pt = launchTrail[idx];

  c.save();
  c.translate(pt.x, pt.y);
  var angle = stab.angle + Math.sin(launchT * Math.PI * 2 * stab.wobble * 4) * stab.wobble * 0.3;
  c.rotate(angle);

  var miniLen = rocketLen * 0.4;
  var miniW = rocketW * 0.5;
  // Mini rocket
  c.fillStyle = mc.strokeDim;
  c.strokeStyle = mc.stroke;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(0, -miniLen * 0.3);
  c.lineTo(miniW / 2, 0);
  c.lineTo(miniW / 2, miniLen * 0.5);
  c.lineTo(-miniW / 2, miniLen * 0.5);
  c.lineTo(-miniW / 2, 0);
  c.closePath();
  c.fill(); c.stroke();

  c.restore();

  // Result label
  if (launchT >= 1) {
    c.fillStyle = stab.color;
    c.font = "bold 16px 'JetBrains Mono',monospace";
    c.textAlign = 'center';
    c.fillText(stab.label, gW * 0.65, gH * 0.25);
  }
}

function generateTrail(wy) {
  var trail = [];
  var startX = rocketX;
  var startY = rocketBaseY - rocketLen * 0.5;
  var endX = gW * 0.7;
  var endY = gH * 0.15;

  var stab = getStabilityResult(wy);
  var steps = 60;

  for (var i = 0; i <= steps; i++) {
    var p = i / steps;
    var x = startX + (endX - startX) * p;
    var y = startY + (endY - startY) * p;
    // Add wobble
    if (stab.wobble > 0) {
      var wAmp = stab.wobble * 25 * p;
      x += Math.sin(p * Math.PI * 2 * (stab.wobble + 1)) * wAmp;
      if (stab.wobble > 2) {
        // Tumble: arc back down
        y += p * p * gH * 0.5;
        x -= p * p * gW * 0.1;
      }
    }
    trail.push({x: x, y: y});
  }
  return trail;
}

function drawGround(c) {
  var mc = gameModeColors();
  var groundY = rocketBaseY + rocketLen * 0.35;
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(0, groundY);
  c.lineTo(gW, groundY);
  c.stroke();
  // Pad
  c.fillStyle = mc.strokeDim;
  c.fillRect(rocketX - 25, groundY - 3, 50, 6);
}

// ---- Main draw loop ----
function draw() {
  var mc = gameModeColors();
  drawGameBg(gctx, gW, gH);
  drawGround(gctx);

  if (!launching) {
    drawRocketBody(gctx, rocketX, rocketBaseY, rocketLen, rocketW, weightY);
    // Drag zone indicator
    if (!allComplete) {
      gctx.strokeStyle = ACCENT;
      gctx.lineWidth = 1;
      gctx.globalAlpha = 0.3;
      gctx.setLineDash([3, 3]);
      var noseLen = rocketLen * 0.2;
      var bodyLen = rocketLen * 0.65;
      var topY = rocketBaseY - noseLen;
      var botY = rocketBaseY + bodyLen;
      gctx.strokeRect(rocketX - rocketW / 2 - 5, topY, rocketW + 10, bodyLen + noseLen);
      gctx.setLineDash([]);
      gctx.globalAlpha = 1;
    }
  } else {
    drawLaunchScene(gctx);
    // Still show stationary rocket faintly
    gctx.globalAlpha = 0.2;
    drawRocketBody(gctx, rocketX, rocketBaseY, rocketLen, rocketW, weightY);
    gctx.globalAlpha = 1;
  }

  // Level complete overlay
  if (allComplete) {
    gctx.fillStyle = mc.text;
    gctx.font = "bold 20px 'Space Grotesk','Noto Sans SC',sans-serif";
    gctx.textAlign = 'center';
    gctx.fillText(t('complete'), gW / 2, gH / 2);
  }

  requestAnimationFrame(draw);
}

// ---- Interaction: Drag weight ----
gc.addEventListener('mousedown', function(e) {
  if (launching || allComplete) return;
  var rect = gc.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  // Check if click is near the weight
  var noseLen = rocketLen * 0.2;
  var bodyLen = rocketLen * 0.65;
  var weightYPx = rocketBaseY - noseLen + (noseLen + bodyLen) * weightY;
  if (Math.abs(mx - rocketX) < rocketW && Math.abs(my - weightYPx) < 20) {
    dragging = true;
  }
});

gc.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var rect = gc.getBoundingClientRect();
  var my = e.clientY - rect.top;
  var noseLen = rocketLen * 0.2;
  var bodyLen = rocketLen * 0.65;
  var topY = rocketBaseY - noseLen;
  var range = noseLen + bodyLen;
  weightY = Math.max(0.05, Math.min(0.92, (my - topY) / range));
  updateHUD();
});

gc.addEventListener('mouseup', function() { dragging = false; });
gc.addEventListener('mouseleave', function() { dragging = false; });

// Touch support
gc.addEventListener('touchstart', function(e) {
  if (launching || allComplete) return;
  e.preventDefault();
  var rect = gc.getBoundingClientRect();
  var touch = e.touches[0];
  var mx = touch.clientX - rect.left;
  var my = touch.clientY - rect.top;
  var noseLen = rocketLen * 0.2;
  var bodyLen = rocketLen * 0.65;
  var weightYPx = rocketBaseY - noseLen + (noseLen + bodyLen) * weightY;
  if (Math.abs(mx - rocketX) < rocketW + 20 && Math.abs(my - weightYPx) < 30) {
    dragging = true;
  }
}, {passive: false});

gc.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  e.preventDefault();
  var rect = gc.getBoundingClientRect();
  var touch = e.touches[0];
  var my = touch.clientY - rect.top;
  var noseLen = rocketLen * 0.2;
  var bodyLen = rocketLen * 0.65;
  var topY = rocketBaseY - noseLen;
  var range = noseLen + bodyLen;
  weightY = Math.max(0.05, Math.min(0.92, (my - topY) / range));
  updateHUD();
}, {passive: false});

gc.addEventListener('touchend', function() { dragging = false; });

// ---- Launch ----
document.getElementById('launchBtn').addEventListener('click', function() {
  if (launching || allComplete) return;
  launching = true;
  launchT = 0;
  launchTrail = generateTrail(weightY);
  launchResult = '';

  document.getElementById('statusVal').textContent = t('flying');

  var start = null;
  var duration = 2000;
  function animate(ts) {
    if (!start) start = ts;
    launchT = Math.min((ts - start) / duration, 1);
    if (launchT < 1) {
      requestAnimationFrame(animate);
    } else {
      // Evaluate result
      var stab = getStabilityResult(weightY);
      launchResult = stab.label;
      document.getElementById('statusVal').textContent = stab.label;

      var resultEl = document.getElementById('statusResult');
      // Check level pass
      var lv = levels[currentLevel];
      if (currentLevel === 1) {
        // Level 2: need both front and rear
        if (weightY < 0.25) lv2Front = true;
        if (weightY > 0.65) lv2Rear = true;
        if (lv.passes()) {
          resultEl.textContent = t('pass');
          resultEl.className = 'status-result pass';
          levelPassed[currentLevel] = true;
          setTimeout(function(){ advanceLevel(); }, 1200);
        } else {
          var needed = '';
          if (!lv2Front) needed = t('front');
          else if (!lv2Rear) needed = t('rear');
          resultEl.textContent = needed + '?';
          resultEl.className = 'status-result fail';
          setTimeout(function(){ launching = false; }, 1000);
        }
      } else {
        if (lv.passes()) {
          resultEl.textContent = t('pass');
          resultEl.className = 'status-result pass';
          levelPassed[currentLevel] = true;
          setTimeout(function(){ advanceLevel(); }, 1200);
        } else {
          resultEl.textContent = t('fail');
          resultEl.className = 'status-result fail';
          setTimeout(function(){ launching = false; }, 1000);
        }
      }
    }
  }
  requestAnimationFrame(animate);
});

// ---- Reset ----
document.getElementById('resetBtn').addEventListener('click', function() {
  launching = false;
  launchT = 0;
  launchTrail = [];
  launchResult = '';
  weightY = 0.3;
  document.getElementById('statusVal').textContent = t('ready');
  document.getElementById('statusResult').textContent = '';
  updateHUD();
});

// ---- Level management ----
function advanceLevel() {
  launching = false;
  launchTrail = [];
  if (currentLevel < 2) {
    currentLevel++;
    weightY = 0.3;
    lv2Front = false;
    lv2Rear = false;
    updateLevelUI();
  } else {
    allComplete = true;
    document.getElementById('statusVal').textContent = t('complete');
  }
  updateHUD();
}

function updateLevelUI() {
  var keys = ['lv1', 'lv2', 'lv3'];
  var key = keys[currentLevel];
  document.getElementById('levelLabel').textContent = t(key + '_title');
  document.getElementById('levelDesc').textContent = t(key + '_desc');
  document.getElementById('statusVal').textContent = t('ready');
  document.getElementById('statusResult').textContent = '';
}

function updateHUD() {
  document.getElementById('hudV1').textContent = (currentLevel + 1) + '/3';
  document.getElementById('hudV2').textContent = getWeightLabel();
}

// ---- refreshI18N ----
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('gameTitle');
  document.getElementById('sideSub').textContent = t('gameSub');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').innerHTML =
    '<p>' + t('guideText1') + '</p>' +
    '<p>' + t('guideText2') + '</p>' +
    '<p>' + t('guideText3') + '</p>';
  document.getElementById('launchBtn').textContent = t('launch');
  document.getElementById('resetBtn').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hudL1').textContent = t('level');
  document.getElementById('hudL2').textContent = t('weight');
  document.getElementById('hudL3').textContent = t('result');
  document.getElementById('statusLabel').textContent = t('status');
  updateLevelUI();
  updateHUD();
}

function onModeChange() {
  // Redraw handles mode change automatically
}

// ---- Init ----
refreshI18N();
resizeCanvas();
draw();
</script>
