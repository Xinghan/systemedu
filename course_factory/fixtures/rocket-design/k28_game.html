<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#f97316));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.mass-group{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.mass-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:4px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:transparent;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-align:left;transition:all 0.2s;}
.mass-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.mass-btn.selected{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.1);}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle"></div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="thrustLabel">THRUST</div>
    <div class="slider-group">
      <input type="range" id="thrustSlider" min="10" max="100" value="50" step="1">
      <div class="val" id="thrustVal">5.0 N</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="massLabel">ROCKET MASS</div>
    <div class="mass-group" id="massGroup"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnLaunch">LAUNCH</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag"></div>
      <div class="hud-item"><div class="hud-label" id="hudL1">TRIAL</div><div class="hud-val" id="hudV1">0/5</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">TWR</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">MAX H</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">BEST</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel"></span>
      <span class="status-val" id="statusVal">--</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// VISUAL MODE SYSTEM (mech theme: orange #f97316)
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.4,0,w*0.5,h*0.4,w*0.5);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#c2410c');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof draw === 'function') draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'THRUST LAB', cn:'\u63a8\u529b\u5b9e\u9a8c\u5ba4'},
  subtitle:    {en:'Force, Mass & Acceleration', cn:'\u529b\u3001\u8d28\u91cf\u4e0e\u52a0\u901f\u5ea6'},
  guide:       {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:   {en:'1. Set engine thrust (1-10N)\n2. Pick rocket mass\n3. Press LAUNCH\n4. Find the minimum thrust!', cn:'1. \u8bbe\u7f6e\u53d1\u52a8\u673a\u63a8\u529b (1-10N)\n2. \u9009\u62e9\u706b\u7bad\u8d28\u91cf\n3. \u70b9\u51fb\u53d1\u5c04\n4. \u627e\u5230\u6700\u5c0f\u8d77\u98de\u63a8\u529b\uff01'},
  thrust:      {en:'THRUST', cn:'\u63a8\u529b'},
  mass:        {en:'ROCKET MASS', cn:'\u706b\u7bad\u8d28\u91cf'},
  launch:      {en:'LAUNCH', cn:'\u53d1\u5c04'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  trial:       {en:'TRIAL', cn:'\u5b9e\u9a8c'},
  twr:         {en:'TWR', cn:'\u63a8\u91cd\u6bd4'},
  maxH:        {en:'MAX H', cn:'\u6700\u9ad8'},
  best:        {en:'BEST', cn:'\u6700\u4f73'},
  statusReady: {en:'Set thrust and mass, then launch', cn:'\u8bbe\u7f6e\u63a8\u529b\u548c\u8d28\u91cf\uff0c\u7136\u540e\u53d1\u5c04'},
  statusLaunch:{en:'Launching...', cn:'\u53d1\u5c04\u4e2d...'},
  statusFail:  {en:'Thrust insufficient!', cn:'\u63a8\u529b\u4e0d\u8db3\uff01'},
  statusDone:  {en:'Flight complete!', cn:'\u98de\u884c\u5b8c\u6210\uff01'},
  allDone:     {en:'All 5 mass classes tested!', cn:'\u51685\u4e2a\u8d28\u91cf\u7b49\u7ea7\u5b8c\u6210\uff01'},
  netForce:    {en:'Net Force', cn:'\u5408\u529b'},
  accel:       {en:'Accel', cn:'\u52a0\u901f\u5ea6'},
  weightForce: {en:'Weight', cn:'\u91cd\u529b'},
  thrustForce: {en:'Thrust', cn:'\u63a8\u529b'},
  height:      {en:'Height', cn:'\u9ad8\u5ea6'},
  timeLabel:   {en:'Time', cn:'\u65f6\u95f4'},
  twrVal:      {en:'TWR', cn:'\u63a8\u91cd\u6bd4'},
  massG:       {en:'g', cn:'g'},
  success:     {en:'LIFTOFF!', cn:'\u8d77\u98de\uff01'},
  fail:        {en:'NO LIFTOFF', cn:'\u65e0\u6cd5\u8d77\u98de'},
  shaking:     {en:'Shaking... thrust < weight', cn:'\u632f\u52a8\u4e2d... \u63a8\u529b < \u91cd\u529b'},
  record:      {en:'New record!', cn:'\u65b0\u7eaa\u5f55\uff01'},
  minThrust:   {en:'Min thrust found!', cn:'\u627e\u5230\u6700\u5c0f\u63a8\u529b\uff01'},
  complete:    {en:'COMPLETE', cn:'\u5b8c\u6210'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('thrustLabel').textContent = t('thrust');
  document.getElementById('massLabel').textContent = t('mass');
  document.getElementById('btnLaunch').textContent = t('launch');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('trial');
  document.getElementById('hudL2').textContent = t('twr');
  document.getElementById('hudL3').textContent = t('maxH');
  document.getElementById('hudL4').textContent = t('best');
  buildMassButtons();
  draw();
}

// ================================================================
// MASS OPTIONS
// ================================================================
var MASS_OPTIONS = [
  {value: 0.1, label: '100g'},
  {value: 0.2, label: '200g'},
  {value: 0.3, label: '300g'},
  {value: 0.4, label: '400g'},
  {value: 0.5, label: '500g'},
];
var selectedMass = 0.1;
var thrustN = 5.0;

function buildMassButtons() {
  var group = document.getElementById('massGroup');
  group.innerHTML = '';
  MASS_OPTIONS.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'mass-btn' + (selectedMass === opt.value ? ' selected' : '');
    btn.textContent = opt.label;
    btn.addEventListener('click', function() {
      if (gamePhase === 'flying' || gamePhase === 'shaking') return;
      selectedMass = opt.value;
      buildMassButtons();
      updateHUD();
      draw();
    });
    group.appendChild(btn);
  });
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, c2d, cw = 0, ch = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var G = 9.8;
var gamePhase = 'ready'; // ready | flying | shaking | result
var trialCount = 0;
var maxTrials = 5;
var rocketY = 0;       // meters above pad
var rocketVel = 0;     // m/s upward
var flightTime = 0;
var maxHeight = 0;
var apexTime = 0;
var shakeTimer = 0;
var shakeIntensity = 0;
var engineBurnTime = 3.0; // seconds of thrust
var burnElapsed = 0;
var particles = [];
var starField = [];
var bestHeights = {};  // mass -> best height
var completedMasses = [];

// ================================================================
// STARS
// ================================================================
function initStars() {
  starField = [];
  for (var i = 0; i < 60; i++) {
    starField.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.0 + 0.2,
      a: Math.random() * 0.4 + 0.1,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
    });
  }
}

// ================================================================
// PARTICLE SYSTEM (exhaust)
// ================================================================
function spawnExhaust(x, y, thrust) {
  var count = Math.floor(thrust * 2) + 3;
  for (var i = 0; i < count; i++) {
    var angle = Math.PI / 2 + (Math.random() - 0.5) * 0.8;
    var spd = (Math.random() * 0.5 + 0.5) * (thrust * 0.3 + 2);
    particles.push({
      x: x + (Math.random() - 0.5) * 8,
      y: y,
      vx: Math.cos(angle) * spd * (Math.random() > 0.5 ? 1 : -1),
      vy: Math.sin(angle) * spd,
      life: 1.0,
      decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 3 + 1,
      color: Math.random() > 0.5 ? ACCENT : '#fbbf24',
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ================================================================
// FORCE ARROW
// ================================================================
function drawArrow(ctx, x, y1, y2, color, lw, dashed) {
  lw = lw || 2;
  var len = Math.abs(y2 - y1);
  if (len < 3) return;
  var dir = y2 > y1 ? 1 : -1;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  if (dashed) ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = color;
  var hs = Math.min(8, len * 0.4);
  ctx.beginPath();
  ctx.moveTo(x, y2);
  ctx.lineTo(x - hs * 0.6, y2 - hs * dir);
  ctx.lineTo(x + hs * 0.6, y2 - hs * dir);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ================================================================
// ROCKET DRAWING
// ================================================================
function drawRocket(ctx, cx, baseY, scale) {
  scale = scale || 1;
  ctx.save();
  ctx.translate(cx, baseY);
  ctx.scale(scale, scale);

  // Body
  ctx.fillStyle = '#d4d4d8';
  ctx.strokeStyle = '#a1a1aa';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.lineTo(-12, -50);
  ctx.quadraticCurveTo(-12, -70, 0, -80);
  ctx.quadraticCurveTo(12, -70, 12, -50);
  ctx.lineTo(12, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Nose cone accent
  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.moveTo(-8, -55);
  ctx.quadraticCurveTo(-8, -70, 0, -78);
  ctx.quadraticCurveTo(8, -70, 8, -55);
  ctx.closePath();
  ctx.fill();

  // Window
  ctx.fillStyle = '#38bdf8';
  ctx.strokeStyle = '#0ea5e9';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, -40, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Window highlight
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(-1.5, -41.5, 2, 0, Math.PI * 2);
  ctx.fill();

  // Fins
  ctx.fillStyle = ACCENT;
  ctx.strokeStyle = '#c2410c';
  ctx.lineWidth = 0.8;
  // Left fin
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.lineTo(-22, 12);
  ctx.lineTo(-16, 12);
  ctx.lineTo(-12, -5);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Right fin
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.lineTo(22, 12);
  ctx.lineTo(16, 12);
  ctx.lineTo(12, -5);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Engine nozzle
  ctx.fillStyle = '#52525b';
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.lineTo(-10, 8);
  ctx.lineTo(10, 8);
  ctx.lineTo(8, 0);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ================================================================
// LAUNCH PAD DRAWING
// ================================================================
function drawLaunchPad(ctx, cx, groundY, w) {
  var mc = gameModeColors();
  // Ground
  ctx.fillStyle = 'rgba(60,58,70,0.5)';
  ctx.fillRect(0, groundY, w, 40);
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(w, groundY);
  ctx.stroke();

  // Pad structure
  ctx.fillStyle = '#3f3f46';
  ctx.fillRect(cx - 35, groundY - 6, 70, 8);
  ctx.strokeStyle = '#52525b';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - 35, groundY - 6, 70, 8);

  // Pad legs
  ctx.fillStyle = '#52525b';
  ctx.fillRect(cx - 30, groundY + 2, 4, 12);
  ctx.fillRect(cx + 26, groundY + 2, 4, 12);

  // Pad grating lines
  ctx.strokeStyle = 'rgba(120,115,140,0.2)';
  ctx.lineWidth = 0.5;
  for (var gx = cx - 32; gx < cx + 33; gx += 5) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY - 5);
    ctx.lineTo(gx, groundY + 1);
    ctx.stroke();
  }
}

// ================================================================
// DATA PANEL
// ================================================================
function drawDataPanel(ctx, x, y, panelW, panelH) {
  var mc = gameModeColors();
  var weight = selectedMass * G;
  var netForce = thrustN - weight;
  var accel = netForce > 0 ? netForce / selectedMass : 0;
  var twrVal = thrustN / weight;

  // Panel background
  ctx.fillStyle = 'rgba(15,15,25,0.7)';
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.fillRect(x, y, panelW, panelH);
  ctx.strokeRect(x, y, panelW, panelH);

  // Title
  ctx.font = "bold 12px 'JetBrains Mono',monospace";
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'left';
  ctx.fillText(LANG === 'cn' ? '-- \u7269\u7406\u53c2\u6570 --' : '-- PHYSICS --', x + 10, y + 18);

  var lineH = 22;
  var startY = y + 40;

  // Thrust
  ctx.font = "11px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('thrustForce') + ':', x + 10, startY);
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'right';
  ctx.fillText(thrustN.toFixed(1) + ' N', x + panelW - 10, startY);

  // Weight
  ctx.textAlign = 'left';
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('weightForce') + ':', x + 10, startY + lineH);
  ctx.fillStyle = '#ef4444';
  ctx.textAlign = 'right';
  ctx.fillText(weight.toFixed(2) + ' N', x + panelW - 10, startY + lineH);

  // Divider
  ctx.strokeStyle = mc.strokeDim;
  ctx.beginPath();
  ctx.moveTo(x + 10, startY + lineH + 8);
  ctx.lineTo(x + panelW - 10, startY + lineH + 8);
  ctx.stroke();

  // Net force
  ctx.textAlign = 'left';
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('netForce') + ':', x + 10, startY + lineH * 2 + 4);
  ctx.fillStyle = netForce > 0 ? '#22c55e' : '#ef4444';
  ctx.textAlign = 'right';
  ctx.fillText((netForce > 0 ? '+' : '') + netForce.toFixed(2) + ' N', x + panelW - 10, startY + lineH * 2 + 4);

  // Acceleration
  ctx.textAlign = 'left';
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('accel') + ':', x + 10, startY + lineH * 3 + 4);
  ctx.fillStyle = accel > 0 ? '#22c55e' : mc.dim;
  ctx.textAlign = 'right';
  ctx.fillText(accel.toFixed(1) + ' m/s\u00B2', x + panelW - 10, startY + lineH * 3 + 4);

  // TWR
  ctx.textAlign = 'left';
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('twrVal') + ':', x + 10, startY + lineH * 4 + 4);
  ctx.fillStyle = twrVal >= 1 ? '#22c55e' : '#ef4444';
  ctx.textAlign = 'right';
  ctx.fillText(twrVal.toFixed(2), x + panelW - 10, startY + lineH * 4 + 4);

  // TWR indicator bar
  var barX = x + 10;
  var barY = startY + lineH * 5 + 4;
  var barW = panelW - 20;
  var barH = 6;
  ctx.fillStyle = 'rgba(128,128,128,0.2)';
  ctx.fillRect(barX, barY, barW, barH);
  var fillW = Math.min(twrVal / 3, 1) * barW;
  ctx.fillStyle = twrVal >= 1 ? '#22c55e' : '#ef4444';
  ctx.fillRect(barX, barY, fillW, barH);
  // 1.0 mark
  var markX = barX + (1 / 3) * barW;
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(markX, barY - 2);
  ctx.lineTo(markX, barY + barH + 2);
  ctx.stroke();
  ctx.fillStyle = '#fbbf24';
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillText('1.0', markX, barY + barH + 12);

  // Flight data (during / after flight)
  if (gamePhase === 'flying' || gamePhase === 'result') {
    var fy = barY + 28;
    ctx.font = "bold 11px 'JetBrains Mono',monospace";
    ctx.fillStyle = ACCENT;
    ctx.textAlign = 'left';
    ctx.fillText(LANG === 'cn' ? '-- \u98de\u884c\u6570\u636e --' : '-- FLIGHT --', x + 10, fy);

    ctx.font = "11px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.dim;
    ctx.fillText(t('height') + ':', x + 10, fy + lineH);
    ctx.fillStyle = mc.text;
    ctx.textAlign = 'right';
    ctx.fillText(rocketY.toFixed(1) + ' m', x + panelW - 10, fy + lineH);

    ctx.textAlign = 'left';
    ctx.fillStyle = mc.dim;
    ctx.fillText(t('timeLabel') + ':', x + 10, fy + lineH * 2);
    ctx.fillStyle = mc.text;
    ctx.textAlign = 'right';
    ctx.fillText(flightTime.toFixed(1) + ' s', x + panelW - 10, fy + lineH * 2);

    if (gamePhase === 'result' && maxHeight > 0) {
      ctx.textAlign = 'left';
      ctx.fillStyle = mc.dim;
      ctx.fillText(t('maxH') + ':', x + 10, fy + lineH * 3);
      ctx.fillStyle = '#22c55e';
      ctx.textAlign = 'right';
      ctx.fillText(maxHeight.toFixed(1) + ' m', x + panelW - 10, fy + lineH * 3);
    }
  }

  ctx.textAlign = 'left';
}

// ================================================================
// ALTITUDE SCALE
// ================================================================
function drawAltScale(ctx, rocketScreenY, groundY, rocketAlt, scaleX) {
  var mc = gameModeColors();
  if (rocketAlt <= 0) return;

  ctx.save();
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);

  // Altitude line from ground to rocket
  ctx.beginPath();
  ctx.moveTo(scaleX, groundY);
  ctx.lineTo(scaleX, rocketScreenY);
  ctx.stroke();

  ctx.setLineDash([]);

  // Altitude label
  ctx.font = "10px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText(rocketAlt.toFixed(1) + 'm', scaleX, (groundY + rocketScreenY) / 2);

  ctx.restore();
}

// ================================================================
// RESULT OVERLAY
// ================================================================
function drawResultOverlay(ctx, w, h) {
  var mc = gameModeColors();
  var weight = selectedMass * G;
  var twrVal = thrustN / weight;

  ctx.save();
  ctx.fillStyle = 'rgba(5,6,15,0.6)';
  ctx.fillRect(0, 0, w, h);

  var bw = Math.min(320, w * 0.5);
  var bh = 180;
  var bx = (w - bw) / 2;
  var by = (h - bh) / 2;

  ctx.fillStyle = 'rgba(15,15,30,0.95)';
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);

  ctx.font = "bold 16px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';

  if (maxHeight > 0) {
    ctx.fillStyle = '#22c55e';
    ctx.fillText(t('success'), bx + bw / 2, by + 30);

    ctx.font = "12px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.text;
    ctx.fillText(t('maxH') + ': ' + maxHeight.toFixed(1) + ' m', bx + bw / 2, by + 58);
    ctx.fillText(t('timeLabel') + ': ' + apexTime.toFixed(1) + ' s', bx + bw / 2, by + 80);
    ctx.fillText(t('twrVal') + ': ' + twrVal.toFixed(2), bx + bw / 2, by + 102);

    var massKey = selectedMass.toFixed(1);
    if (bestHeights[massKey] && maxHeight >= bestHeights[massKey]) {
      ctx.fillStyle = '#fbbf24';
      ctx.font = "bold 11px 'JetBrains Mono',monospace";
      ctx.fillText(t('record'), bx + bw / 2, by + 126);
    }
  } else {
    ctx.fillStyle = '#ef4444';
    ctx.fillText(t('fail'), bx + bw / 2, by + 30);
    ctx.font = "12px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.text;
    ctx.fillText(t('thrustForce') + ': ' + thrustN.toFixed(1) + ' N < ' + t('weightForce') + ': ' + weight.toFixed(2) + ' N', bx + bw / 2, by + 58);
    ctx.fillText(t('twrVal') + ': ' + twrVal.toFixed(2) + ' < 1.00', bx + bw / 2, by + 80);
  }

  // Next button hint
  ctx.font = "11px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.fillText(LANG === 'cn' ? '\u70b9\u51fb\u91cd\u7f6e\u6216\u8c03\u6574\u53c2\u6570\u518d\u6b21\u53d1\u5c04' : 'Click RESET or adjust and launch again', bx + bw / 2, by + bh - 16);

  ctx.restore();
}

// ================================================================
// HUD
// ================================================================
function updateHUD() {
  document.getElementById('hudV1').textContent = trialCount + '/' + maxTrials;
  var weight = selectedMass * G;
  var twrVal = thrustN / weight;
  document.getElementById('hudV2').textContent = twrVal.toFixed(2);
  document.getElementById('hudV3').textContent = maxHeight > 0 ? maxHeight.toFixed(1) + 'm' : '--';
  var massKey = selectedMass.toFixed(1);
  document.getElementById('hudV4').textContent = bestHeights[massKey] ? bestHeights[massKey].toFixed(1) + 'm' : '--';
}

// ================================================================
// STATUS BAR
// ================================================================
function updateStatus(text, result) {
  document.getElementById('statusLabel').textContent = text || '';
  document.getElementById('statusVal').textContent = '';
  var el = document.getElementById('statusResult');
  el.textContent = result || '';
  el.className = 'status-result';
  if (result === t('success') || result === t('complete')) el.className = 'status-result pass';
  if (result === t('fail') || result === t('statusFail')) el.className = 'status-result fail';
}

// ================================================================
// PHYSICS SIMULATION
// ================================================================
var lastFrameTime = 0;
var animId = null;

function resetFlight() {
  rocketY = 0;
  rocketVel = 0;
  flightTime = 0;
  maxHeight = 0;
  apexTime = 0;
  burnElapsed = 0;
  shakeTimer = 0;
  shakeIntensity = 0;
  particles = [];
  gamePhase = 'ready';
  updateStatus(t('statusReady'), '');
  updateHUD();
  draw();
}

function doLaunch() {
  if (gamePhase === 'flying' || gamePhase === 'shaking') return;

  var weight = selectedMass * G;
  var netForce = thrustN - weight;

  rocketY = 0;
  rocketVel = 0;
  flightTime = 0;
  maxHeight = 0;
  apexTime = 0;
  burnElapsed = 0;
  particles = [];

  if (netForce <= 0) {
    // Cannot lift -- shake
    gamePhase = 'shaking';
    shakeTimer = 2.0;
    shakeIntensity = Math.min(3, (weight - thrustN) * 2 + 1);
    updateStatus(t('shaking'), t('statusFail'));
    lastFrameTime = performance.now();
    animate();
    return;
  }

  gamePhase = 'flying';
  trialCount++;
  updateStatus(t('statusLaunch'), t('success'));
  updateHUD();
  lastFrameTime = performance.now();
  animate();
}

function physicsStep(dt) {
  if (gamePhase === 'shaking') {
    shakeTimer -= dt;
    if (shakeTimer <= 0) {
      gamePhase = 'result';
      updateStatus(t('statusFail'), t('fail'));
      updateHUD();
      draw();
      return false;
    }
    return true;
  }

  if (gamePhase !== 'flying') return false;

  burnElapsed += dt;
  var currentThrust = burnElapsed <= engineBurnTime ? thrustN : 0;
  var weight = selectedMass * G;
  var netForce = currentThrust - weight;
  var accel = netForce / selectedMass;

  rocketVel += accel * dt;
  rocketY += rocketVel * dt;
  flightTime += dt;

  if (rocketY > maxHeight) {
    maxHeight = rocketY;
    apexTime = flightTime;
  }

  // Rocket has come back down
  if (rocketY <= 0 && flightTime > 0.1) {
    rocketY = 0;
    rocketVel = 0;
    gamePhase = 'result';

    // Record best
    var massKey = selectedMass.toFixed(1);
    if (!bestHeights[massKey] || maxHeight > bestHeights[massKey]) {
      bestHeights[massKey] = maxHeight;
    }
    if (completedMasses.indexOf(massKey) < 0) {
      completedMasses.push(massKey);
    }

    updateStatus(t('statusDone'), completedMasses.length >= maxTrials ? t('complete') : t('success'));
    updateHUD();
    draw();
    return false;
  }

  return true;
}

function animate() {
  var now = performance.now();
  var dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;

  var running = physicsStep(dt);
  updateParticles();
  draw();

  if (running) {
    animId = requestAnimationFrame(animate);
  }
}

// ================================================================
// MAIN DRAW
// ================================================================
function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  c2d.clearRect(0, 0, cw, ch);

  var mc = gameModeColors();
  drawGameBg(c2d, cw, ch);

  // Stars
  var now = Date.now() * 0.001;
  for (var i = 0; i < starField.length; i++) {
    var s = starField[i];
    var twinkle = 0.5 + 0.5 * Math.sin(now * s.twinkleSpeed * 60 + s.twinklePhase);
    c2d.globalAlpha = s.a * twinkle;
    c2d.fillStyle = mc.text;
    c2d.beginPath();
    c2d.arc(s.x * cw, s.y * ch * 0.7, s.r, 0, Math.PI * 2);
    c2d.fill();
  }
  c2d.globalAlpha = 1;

  // Layout
  var groundY = ch - 60;
  var rocketBaseX = cw * 0.33;
  var panelX = cw * 0.58;
  var panelW = Math.min(220, cw * 0.36);
  var panelH = gamePhase === 'flying' || gamePhase === 'result' ? 290 : 210;

  // Launch pad
  drawLaunchPad(c2d, rocketBaseX, groundY, cw);

  // Rocket position on screen
  var maxVisualHeight = groundY - 80;
  var scaleM = 1; // pixels per meter
  if (maxHeight > 5 || rocketY > 5) {
    var refH = Math.max(maxHeight, rocketY, 10);
    scaleM = maxVisualHeight / (refH * 1.2);
  } else {
    scaleM = maxVisualHeight / 15;
  }
  var rocketScreenY = groundY - 14 - rocketY * scaleM;
  rocketScreenY = Math.max(60, rocketScreenY);

  // Shake offset
  var sx = 0, sy = 0;
  if (gamePhase === 'shaking') {
    sx = (Math.random() - 0.5) * shakeIntensity * 2;
    sy = (Math.random() - 0.5) * shakeIntensity;
  }

  // Exhaust particles during flight or shaking
  if (gamePhase === 'flying' && burnElapsed <= engineBurnTime) {
    spawnExhaust(rocketBaseX + sx, rocketScreenY + 8 * 1 + sy, thrustN);
  }
  if (gamePhase === 'shaking') {
    spawnExhaust(rocketBaseX + sx, groundY - 14 + 8 + sy, thrustN * 0.3);
  }

  drawParticles(c2d);

  // Force arrows (next to rocket)
  var arrowX = rocketBaseX + 35;
  var arrowBaseY = gamePhase === 'flying' ? rocketScreenY - 30 : groundY - 14 - 30;

  // Thrust arrow (pointing up, orange)
  var thrustLen = thrustN * 8;
  drawArrow(c2d, arrowX, arrowBaseY, arrowBaseY - thrustLen, ACCENT, 2.5, false);
  c2d.font = "10px 'JetBrains Mono',monospace";
  c2d.fillStyle = ACCENT;
  c2d.textAlign = 'left';
  c2d.fillText(thrustN.toFixed(1) + 'N', arrowX + 6, arrowBaseY - thrustLen + 4);

  // Weight arrow (pointing down, red)
  var weightVal = selectedMass * G;
  var weightLen = weightVal * 8;
  drawArrow(c2d, arrowX, arrowBaseY + 10, arrowBaseY + 10 + weightLen, '#ef4444', 2.5, false);
  c2d.fillStyle = '#ef4444';
  c2d.fillText(weightVal.toFixed(2) + 'N', arrowX + 6, arrowBaseY + 10 + weightLen - 2);

  // Net force arrow (dashed)
  var netVal = thrustN - weightVal;
  if (Math.abs(netVal) > 0.01) {
    var netArrowX = arrowX + 25;
    var netLen = Math.abs(netVal) * 8;
    var netEndY = netVal > 0 ? arrowBaseY - netLen : arrowBaseY + netLen;
    var netColor = netVal > 0 ? '#22c55e' : '#ef4444';
    drawArrow(c2d, netArrowX, arrowBaseY, netEndY, netColor, 2, true);
    c2d.fillStyle = netColor;
    c2d.fillText((netVal > 0 ? '+' : '') + netVal.toFixed(2) + 'N', netArrowX + 6, netEndY + (netVal > 0 ? 4 : -4));
    c2d.fillStyle = mc.dim;
    c2d.font = "9px 'JetBrains Mono',monospace";
    c2d.fillText('F_net', netArrowX + 6, netEndY + (netVal > 0 ? -6 : 14));
  }

  // Rocket
  if (gamePhase === 'shaking') {
    drawRocket(c2d, rocketBaseX + sx, groundY - 14 + sy, 1);
  } else if (gamePhase === 'flying') {
    drawRocket(c2d, rocketBaseX, rocketScreenY, 1);
  } else {
    drawRocket(c2d, rocketBaseX, groundY - 14, 1);
  }

  // Altitude scale during flight
  if (gamePhase === 'flying' && rocketY > 0.5) {
    drawAltScale(c2d, rocketScreenY, groundY - 14, rocketY, rocketBaseX - 30);
  }

  // Data panel
  drawDataPanel(c2d, panelX, 30, panelW, panelH);

  // Result overlay
  if (gamePhase === 'result') {
    drawResultOverlay(c2d, cw, ch);
  }
}

// ================================================================
// CANVAS RESIZE
// ================================================================
function resize() {
  canvas = document.getElementById('gc');
  if (!canvas) return;
  var rect = canvas.parentElement.getBoundingClientRect();
  cw = Math.round(rect.width * DPR);
  ch = Math.round(rect.height * DPR);
  canvas.width = cw;
  canvas.height = ch;
  c2d = canvas.getContext('2d');
  c2d.scale(DPR, DPR);
  cw = Math.round(rect.width);
  ch = Math.round(rect.height);
  draw();
}

// ================================================================
// INIT
// ================================================================
function init() {
  initStars();
  buildGameStyleSwitcher();
  setupLangToggle();
  refreshI18N();
  buildMassButtons();

  // Thrust slider
  var thrustSlider = document.getElementById('thrustSlider');
  var thrustValEl = document.getElementById('thrustVal');
  thrustSlider.addEventListener('input', function() {
    if (gamePhase === 'flying' || gamePhase === 'shaking') return;
    thrustN = parseFloat(thrustSlider.value) / 10;
    thrustValEl.textContent = thrustN.toFixed(1) + ' N';
    updateHUD();
    draw();
  });
  thrustN = parseFloat(thrustSlider.value) / 10;
  thrustValEl.textContent = thrustN.toFixed(1) + ' N';

  // Launch button
  document.getElementById('btnLaunch').addEventListener('click', function() {
    doLaunch();
  });

  // Reset button
  document.getElementById('btnReset').addEventListener('click', function() {
    if (animId) cancelAnimationFrame(animId);
    animId = null;
    resetFlight();
  });

  resize();
  applyGameMode(GAME_MODE);
  updateHUD();
  updateStatus(t('statusReady'), '');
}

window.addEventListener('resize', resize);
window.addEventListener('load', init);
</script>
