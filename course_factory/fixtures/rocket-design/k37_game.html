<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
.mission-text{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.5;margin-top:2px;}
.option-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:6px 10px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.05em;width:100%;margin-top:3px;text-align:left;transition:all 0.2s;}
.option-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.08);}
.option-btn.selected{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.12);}
.option-btn:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">DIAMETER WORKSHOP</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="missionLabel">MISSION 1/3</div>
    <div class="mission-text" id="missionText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="diamLabel">DIAMETER</div>
    <div class="slider-group">
      <label id="sliderLabel">D (mm)</label>
      <input type="range" id="diamSlider" min="15" max="50" value="20" step="1">
      <div class="val" id="diamVal">20 mm</div>
    </div>
    <div class="sidebar-divider"></div>
    <div id="optionsWrap"></div>
    <button class="action-btn" id="btnLaunch">CONFIRM</button>
    <button class="reset-btn" id="btnReset">RESET</button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">DIAMETER WORKSHOP</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">LEVEL</div><div class="hud-val" id="hudV1">1/3</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">AREA</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">DRAG RATIO</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">ALTITUDE</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">ADJUST DIAMETER TO BEGIN</span>
      <span class="status-val" id="statusVal"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(249,115,22,0.06)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', 'rgba(249,115,22,0.6)');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.4)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  sideTitle:   {en:'DIAMETER WORKSHOP', cn:'\u76f4\u5f84\u5de5\u574a'},
  sideSub:     {en:'Explore how diameter affects drag & altitude', cn:'\u63a2\u7d22\u76f4\u5f84\u5982\u4f55\u5f71\u54cd\u963b\u529b\u4e0e\u9ad8\u5ea6'},
  guideLabel:  {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:   {en:'Drag the slider to adjust rocket diameter. Watch the cross-section and altitude chart update in real-time. Complete 3 missions to master frontal area!', cn:'\u62d6\u52a8\u6ed1\u5757\u8c03\u6574\u706b\u7bad\u76f4\u5f84\uff0c\u89c2\u5bdf\u622a\u9762\u548c\u9ad8\u5ea6\u66f2\u7ebf\u5b9e\u65f6\u53d8\u5316\u3002\u5b8c\u6210 3 \u4e2a\u4efb\u52a1\u6765\u638c\u63e1\u8fce\u98ce\u9762\u79ef\uff01'},
  diamLabel:   {en:'DIAMETER', cn:'\u76f4\u5f84'},
  sliderLabel: {en:'D (mm)', cn:'D (mm)'},
  btnLaunch:   {en:'CONFIRM', cn:'\u786e\u8ba4'},
  btnReset:    {en:'RESET', cn:'\u91cd\u7f6e'},
  hudTag:      {en:'DIAMETER WORKSHOP', cn:'\u76f4\u5f84\u5de5\u574a'},
  hudL1:       {en:'LEVEL', cn:'\u5173\u5361'},
  hudL2:       {en:'AREA', cn:'\u9762\u79ef'},
  hudL3:       {en:'DRAG RATIO', cn:'\u963b\u529b\u6bd4'},
  hudL4:       {en:'ALTITUDE', cn:'\u9ad8\u5ea6'},
  statusReady: {en:'ADJUST DIAMETER TO EXPLORE', cn:'\u8c03\u6574\u76f4\u5f84\u5f00\u59cb\u63a2\u7d22'},
  statusPass:  {en:'MISSION COMPLETE!', cn:'\u4efb\u52a1\u5b8c\u6210\uff01'},
  statusFail:  {en:'NOT QUITE -- TRY AGAIN', cn:'\u8fd8\u4e0d\u5bf9\u2014\u2014\u518d\u8bd5\u8bd5'},
  statusAll:   {en:'ALL MISSIONS COMPLETE!', cn:'\u5168\u90e8\u4efb\u52a1\u5b8c\u6210\uff01'},
  missionLabel:{en:'MISSION', cn:'\u4efb\u52a1'},
  mission1:    {en:'Find the diameter whose frontal area is exactly 2x that of a 20mm rocket', cn:'\u627e\u5230\u8fce\u98ce\u9762\u79ef\u6070\u597d\u662f 20mm \u706b\u7bad 2 \u500d\u7684\u76f4\u5f84'},
  mission2:    {en:'With B6-4 engine (5Ns impulse), find the max diameter that can still reach 80m', cn:'\u4f7f\u7528 B6-4 \u53d1\u52a8\u673a(5Ns\u51b2\u91cf)\uff0c\u627e\u5230\u4ecd\u80fd\u8fbe\u5230 80m \u7684\u6700\u5927\u76f4\u5f84'},
  mission3:    {en:'How much altitude is lost (%) going from D=20mm to D=40mm?', cn:'\u76f4\u5f84\u4ece 20mm \u589e\u5927\u5230 40mm\uff0c\u9ad8\u5ea6\u4e0b\u964d\u767e\u5206\u6bd4\u662f\u591a\u5c11\uff1f'},
  opt3a:       {en:'A. About 15%', cn:'A. \u7ea6 15%'},
  opt3b:       {en:'B. About 29%', cn:'B. \u7ea6 29%'},
  opt3c:       {en:'C. About 50%', cn:'C. \u7ea6 50%'},
  opt3d:       {en:'D. About 70%', cn:'D. \u7ea6 70%'},
  crossLabel:  {en:'CROSS-SECTION', cn:'\u622a\u9762\u56fe'},
  chartLabel:  {en:'ALTITUDE vs DIAMETER', cn:'\u9ad8\u5ea6-\u76f4\u5f84\u66f2\u7ebf'},
  refLabel:    {en:'REF 20mm', cn:'\u53c2\u8003 20mm'},
  curLabel:    {en:'CURRENT', cn:'\u5f53\u524d'},
  levelDone:   {en:'PASSED', cn:'\u5df2\u901a\u8fc7'},

};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    if (typeof refreshI18N === 'function') refreshI18N();
  });
}

// ================================================================
// PHYSICS MODEL
// A = pi * (D/2)^2           frontal area (mm^2)
// H = H0 / (1 + k * A)       predicted altitude (m)
// drag ratio = A / A_ref      relative to D=20mm baseline
// ================================================================
var H0 = 150;
var K_DRAG = 0.0005;
var D_REF = 20;
var A_REF = Math.PI * Math.pow(D_REF / 2, 2);

function frontalArea(d) { return Math.PI * Math.pow(d / 2, 2); }
function dragRatio(d) { return frontalArea(d) / A_REF; }
function altitude(d) { return H0 / (1 + K_DRAG * frontalArea(d)); }

// ================================================================
// GAME STATE
// ================================================================
var currentLevel = 0;
var levelPassed = [false, false, false];
var currentDiam = 20;
var selectedOption = -1;

// Level answers (verified by Python):
// L1: 2x area => D = 20*sqrt(2) = 28.28mm => accept 28-29
// L2: max D for H>=80m => D = 47.2mm => H(47)=80.3m, H(48)=78.8m => accept 46-47 with H>=80
// L3: H(20)=129.6m, H(40)=92.1m, drop=28.9% => option B (~29%)
function checkLevel(level, diam) {
  if (level === 0) {
    return diam >= 28 && diam <= 29;
  } else if (level === 1) {
    return altitude(diam) >= 80 && diam >= 45;
  } else if (level === 2) {
    return selectedOption === 1;
  }
  return false;
}

// ================================================================
// CANVAS DRAWING
// ================================================================
var gc, ctx;

function resizeCanvas() {
  gc = document.getElementById('gc');
  ctx = gc.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = gc.parentElement.getBoundingClientRect();
  gc.width = rect.width * dpr;
  gc.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  return { w: rect.width, h: rect.height };
}

function draw() {
  var size = resizeCanvas();
  var W = size.w;
  var H = size.h;
  if (W < 10 || H < 10) return;

  drawGameBg(ctx, W, H);
  var mc = gameModeColors();

  var pad = 30;
  var divX = W * 0.38;

  // Separator
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(divX, pad);
  ctx.lineTo(divX, H - pad);
  ctx.stroke();
  ctx.setLineDash([]);

  drawCrossSection(ctx, mc, divX, W, H, pad);
  drawAltitudeChart(ctx, mc, divX, W, H, pad);
}

// ================================================================
// LEFT PANEL: Cross-section circle visualization
// ================================================================
function drawCrossSection(ctx, mc, divX, W, H, pad) {
  var crossCx = divX * 0.5;
  var crossCy = H * 0.48;
  var maxVisR = Math.min(divX * 0.35, (H - pad * 4) * 0.38);

  var visR = (currentDiam / 50) * maxVisR;
  var refVisR = (D_REF / 50) * maxVisR;

  // Title
  ctx.font = "bold 10px 'JetBrains Mono', monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText(t('crossLabel'), crossCx, pad + 14);

  // Scale grid behind the circle
  var gridSize = maxVisR * 0.15;
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 0.3;
  var gridExt = maxVisR + 10;
  var gxs, gys;
  for (gxs = crossCx; gxs <= crossCx + gridExt; gxs += gridSize) {
    ctx.beginPath(); ctx.moveTo(gxs, crossCy - gridExt); ctx.lineTo(gxs, crossCy + gridExt); ctx.stroke();
  }
  for (gxs = crossCx - gridSize; gxs >= crossCx - gridExt; gxs -= gridSize) {
    ctx.beginPath(); ctx.moveTo(gxs, crossCy - gridExt); ctx.lineTo(gxs, crossCy + gridExt); ctx.stroke();
  }
  for (gys = crossCy; gys <= crossCy + gridExt; gys += gridSize) {
    ctx.beginPath(); ctx.moveTo(crossCx - gridExt, gys); ctx.lineTo(crossCx + gridExt, gys); ctx.stroke();
  }
  for (gys = crossCy - gridSize; gys >= crossCy - gridExt; gys -= gridSize) {
    ctx.beginPath(); ctx.moveTo(crossCx - gridExt, gys); ctx.lineTo(crossCx + gridExt, gys); ctx.stroke();
  }

  // Reference circle (20mm) -- dashed
  ctx.strokeStyle = mc.dim;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.arc(crossCx, crossCy, refVisR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Reference label
  ctx.font = "9px 'JetBrains Mono', monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'left';
  var rlx = crossCx + refVisR + 6;
  if (rlx + 55 > divX - 5) rlx = crossCx - 30;
  ctx.fillText(t('refLabel'), rlx, crossCy - 4);

  // Current circle -- filled
  ctx.beginPath();
  ctx.arc(crossCx, crossCy, visR, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(249,115,22,0.18)';
  ctx.fill();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2;
  if (mc.glow) { ctx.shadowColor = ACCENT; ctx.shadowBlur = 12; }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Diameter line through circle
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(crossCx - visR, crossCy);
  ctx.lineTo(crossCx + visR, crossCy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Dimension annotation below circle
  var dimY = crossCy + visR + 20;
  ctx.strokeStyle = mc.text;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(crossCx - visR, crossCy + visR + 5); ctx.lineTo(crossCx - visR, dimY + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(crossCx + visR, crossCy + visR + 5); ctx.lineTo(crossCx + visR, dimY + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(crossCx - visR, dimY); ctx.lineTo(crossCx + visR, dimY); ctx.stroke();
  // Arrowheads
  var ah = 4;
  ctx.fillStyle = mc.text;
  ctx.beginPath(); ctx.moveTo(crossCx - visR, dimY); ctx.lineTo(crossCx - visR + ah, dimY - ah / 2); ctx.lineTo(crossCx - visR + ah, dimY + ah / 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(crossCx + visR, dimY); ctx.lineTo(crossCx + visR - ah, dimY - ah / 2); ctx.lineTo(crossCx + visR - ah, dimY + ah / 2); ctx.fill();

  // Diameter text
  ctx.font = "bold 13px 'JetBrains Mono', monospace";
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.fillText(currentDiam + ' mm', crossCx, dimY + 18);

  // Area
  var area = frontalArea(currentDiam);
  ctx.font = "11px 'JetBrains Mono', monospace";
  ctx.fillStyle = mc.text;
  ctx.fillText('A = ' + area.toFixed(1) + ' mm\u00B2', crossCx, dimY + 34);

  // Drag ratio with color coding
  var ratio = dragRatio(currentDiam);
  var ratioColor = ratio > 3 ? '#ef4444' : (ratio > 1.8 ? '#eab308' : mc.text);
  ctx.fillStyle = ratioColor;
  ctx.fillText(t('hudL3') + ': ' + ratio.toFixed(2) + 'x', crossCx, dimY + 50);

  // Level 1: show area ratio to reference
  if (currentLevel === 0) {
    var areaRatio = area / A_REF;
    ctx.font = "bold 10px 'JetBrains Mono', monospace";
    ctx.fillStyle = (areaRatio >= 1.95 && areaRatio <= 2.05) ? '#22c55e' : mc.dim;
    ctx.fillText('A/A_ref = ' + areaRatio.toFixed(3) + 'x', crossCx, dimY + 66);
  }
}

// ================================================================
// RIGHT PANEL: Altitude vs Diameter chart
// ================================================================
function drawAltitudeChart(ctx, mc, divX, W, H, pad) {
  var chartLeft = divX + pad + 20;
  var chartRight = W - pad - 10;
  var chartTop = pad + 28;
  var chartBot = H - pad - 24;
  var chartW = chartRight - chartLeft;
  var chartH = chartBot - chartTop;
  if (chartW < 50 || chartH < 50) return;

  // Title
  ctx.font = "bold 10px 'JetBrains Mono', monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText(t('chartLabel'), (chartLeft + chartRight) / 2, pad + 14);

  // Axes
  ctx.strokeStyle = mc.stroke;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(chartLeft, chartTop);
  ctx.lineTo(chartLeft, chartBot);
  ctx.lineTo(chartRight, chartBot);
  ctx.stroke();

  // Y-axis label
  ctx.save();
  ctx.translate(chartLeft - 18, (chartTop + chartBot) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.font = "9px 'JetBrains Mono', monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText('H (m)', 0, 0);
  ctx.restore();

  // X-axis label
  ctx.font = "9px 'JetBrains Mono', monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText('D (mm)', (chartLeft + chartRight) / 2, chartBot + 20);

  var yMin = 60, yMax = 140;
  function mapX(d) { return chartLeft + ((d - 15) / (50 - 15)) * chartW; }
  function mapY(h) { return chartBot - ((h - yMin) / (yMax - yMin)) * chartH; }

  // Y gridlines and ticks
  ctx.font = "8px 'JetBrains Mono', monospace";
  ctx.textAlign = 'right';
  var yt, yy;
  for (yt = 60; yt <= 140; yt += 20) {
    yy = mapY(yt);
    ctx.fillStyle = mc.dim;
    ctx.fillText(yt + '', chartLeft - 4, yy + 3);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 4]);
    ctx.beginPath(); ctx.moveTo(chartLeft, yy); ctx.lineTo(chartRight, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // X ticks
  ctx.textAlign = 'center';
  var xt, xx;
  for (xt = 15; xt <= 50; xt += 5) {
    xx = mapX(xt);
    ctx.fillStyle = mc.dim;
    ctx.fillText(xt + '', xx, chartBot + 10);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(xx, chartBot); ctx.lineTo(xx, chartBot - 3); ctx.stroke();
  }

  // Altitude curve
  ctx.beginPath();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2.5;
  if (mc.glow) { ctx.shadowColor = ACCENT; ctx.shadowBlur = 8; }
  var dd, hh, px, py, firstPt = true;
  for (dd = 15; dd <= 50; dd += 0.5) {
    hh = altitude(dd);
    px = mapX(dd); py = mapY(hh);
    if (firstPt) { ctx.moveTo(px, py); firstPt = false; }
    else { ctx.lineTo(px, py); }
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Fill under curve
  ctx.lineTo(mapX(50), chartBot);
  ctx.lineTo(mapX(15), chartBot);
  ctx.closePath();
  ctx.fillStyle = 'rgba(249,115,22,0.06)';
  ctx.fill();

  // Reference dots at 20, 25, 30, 40mm
  var refDots = [20, 25, 30, 40];
  var ri, rd, rh, rx, ry;
  for (ri = 0; ri < refDots.length; ri++) {
    rd = refDots[ri]; rh = altitude(rd);
    rx = mapX(rd); ry = mapY(rh);
    ctx.beginPath();
    ctx.arc(rx, ry, 4, 0, Math.PI * 2);
    ctx.fillStyle = mc.strokeDim;
    ctx.fill();
    ctx.strokeStyle = mc.stroke;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = "8px 'JetBrains Mono', monospace";
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'center';
    ctx.fillText(rh.toFixed(1) + 'm', rx, ry - 9);
  }

  // Current position marker
  var curX = mapX(currentDiam);
  var curH = altitude(currentDiam);
  var curY = mapY(curH);

  // Vertical dashed line
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(curX, chartTop); ctx.lineTo(curX, chartBot); ctx.stroke();
  ctx.setLineDash([]);

  // Current dot
  ctx.beginPath();
  ctx.arc(curX, curY, 6, 0, Math.PI * 2);
  ctx.fillStyle = ACCENT;
  if (mc.glow) { ctx.shadowColor = ACCENT; ctx.shadowBlur = 14; }
  ctx.fill();
  ctx.shadowBlur = 0;

  // Current altitude label
  ctx.font = "bold 10px 'JetBrains Mono', monospace";
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'left';
  var labelDir = curY > chartTop + 30 ? -14 : 18;
  ctx.fillText(curH.toFixed(1) + ' m', curX + 8, curY + labelDir);

  // "CURRENT" tag
  ctx.font = "8px 'JetBrains Mono', monospace";
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.fillText(t('curLabel'), curX, chartTop - 6);

  // Level 2: 80m target line
  if (currentLevel === 1) {
    var line80y = mapY(80);
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 3]);
    ctx.beginPath(); ctx.moveTo(chartLeft, line80y); ctx.lineTo(chartRight, line80y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = "bold 9px 'JetBrains Mono', monospace";
    ctx.fillStyle = '#22c55e';
    ctx.textAlign = 'right';
    ctx.fillText(t('targetLine'), chartRight, line80y - 5);
  }

  // Level 3: D=20 vs D=40 comparison overlay
  if (currentLevel === 2) {
    var h20 = altitude(20), h40 = altitude(40);
    var x20 = mapX(20), x40 = mapX(40);
    var y20 = mapY(h20), y40 = mapY(h40);

    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(x20, chartTop); ctx.lineTo(x20, chartBot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x40, chartTop); ctx.lineTo(x40, chartBot); ctx.stroke();
    ctx.setLineDash([]);

    // Bracket showing drop
    var bracketX = x40 + 18;
    if (bracketX + 50 > chartRight) bracketX = x40 + 8;
    ctx.strokeStyle = '#eab308';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bracketX - 4, y20); ctx.lineTo(bracketX, y20);
    ctx.lineTo(bracketX, y40); ctx.lineTo(bracketX - 4, y40);
    ctx.stroke();
    ctx.fillStyle = '#eab308';
    ctx.beginPath();
    ctx.moveTo(bracketX, y40);
    ctx.lineTo(bracketX - 3, y40 - 5);
    ctx.lineTo(bracketX + 3, y40 - 5);
    ctx.fill();
    var dropPct = ((h20 - h40) / h20 * 100).toFixed(1);
    ctx.font = "bold 9px 'JetBrains Mono', monospace";
    ctx.fillStyle = '#eab308';
    ctx.textAlign = 'left';
    ctx.fillText('-' + dropPct + '%', bracketX + 4, (y20 + y40) / 2 + 3);

    ctx.font = "8px 'JetBrains Mono', monospace";
    ctx.fillStyle = '#22c55e';
    ctx.textAlign = 'center';
    ctx.fillText('D=20', x20, chartBot + 18);
    ctx.fillText(h20.toFixed(1) + 'm', x20, y20 - 12);
    ctx.fillText('D=40', x40, chartBot + 18);
    ctx.fillText(h40.toFixed(1) + 'm', x40, y40 - 12);
  }

  // Level pass indicators
  var li;
  for (li = 0; li < levelPassed.length; li++) {
    if (levelPassed[li]) {
      ctx.font = "bold 8px 'JetBrains Mono', monospace";
      ctx.fillStyle = '#22c55e';
      ctx.textAlign = 'right';
      ctx.fillText('L' + (li + 1) + ' ' + t('levelDone'), chartRight, chartTop + 14 + li * 13);
    }
  }
}

// ================================================================
// HUD
// ================================================================
function updateHUD() {
  var area = frontalArea(currentDiam);
  var ratio = dragRatio(currentDiam);
  var alt = altitude(currentDiam);
  document.getElementById('hudV1').textContent = (currentLevel >= 3 ? 3 : currentLevel + 1) + '/3';
  document.getElementById('hudV2').textContent = area.toFixed(0) + ' mm\u00B2';
  document.getElementById('hudV3').textContent = ratio.toFixed(2) + 'x';
  document.getElementById('hudV4').textContent = alt.toFixed(1) + ' m';
  document.getElementById('hudL1').textContent = t('hudL1');
  document.getElementById('hudL2').textContent = t('hudL2');
  document.getElementById('hudL3').textContent = t('hudL3');
  document.getElementById('hudL4').textContent = t('hudL4');
  document.getElementById('hudTag').textContent = t('hudTag');
}

// ================================================================
// MISSION / OPTIONS
// ================================================================
function updateMission() {
  var ml = document.getElementById('missionLabel');
  var mt = document.getElementById('missionText');
  if (currentLevel >= 3) {
    ml.textContent = t('missionLabel') + ' -- ' + t('levelDone');
    mt.textContent = t('statusAll');
    document.getElementById('btnLaunch').disabled = true;
    document.getElementById('optionsWrap').innerHTML = '';
    return;
  }
  ml.textContent = t('missionLabel') + ' ' + (currentLevel + 1) + '/3';
  var mKeys = ['mission1', 'mission2', 'mission3'];
  mt.textContent = t(mKeys[currentLevel]);

  var ow = document.getElementById('optionsWrap');
  ow.innerHTML = '';
  selectedOption = -1;

  if (currentLevel === 2) {
    var opts = ['opt3a', 'opt3b', 'opt3c', 'opt3d'];
    var oi;
    for (oi = 0; oi < opts.length; oi++) {
      var ob = document.createElement('button');
      ob.className = 'option-btn';
      ob.textContent = t(opts[oi]);
      ob.dataset.idx = '' + oi;
      ob.addEventListener('click', function() {
        selectedOption = parseInt(this.dataset.idx);
        document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('selected'); });
        this.classList.add('selected');
      });
      ow.appendChild(ob);
    }
    var odiv = document.createElement('div');
    odiv.className = 'sidebar-divider';
    ow.appendChild(odiv);
  }
}

// ================================================================
// STATUS BAR
// ================================================================
var lastResult = '';
function updateStatus() {
  var sl = document.getElementById('statusLabel');
  var sv = document.getElementById('statusVal');
  var sr = document.getElementById('statusResult');
  if (currentLevel >= 3) {
    sl.textContent = t('statusAll');
    sv.textContent = '3/3';
    sr.textContent = '';
    sr.className = 'status-result pass';
    return;
  }
  if (lastResult === 'pass') {
    sl.textContent = ''; sv.textContent = '';
    sr.textContent = t('statusPass');
    sr.className = 'status-result pass';
  } else if (lastResult === 'fail') {
    sl.textContent = ''; sv.textContent = '';
    sr.textContent = t('statusFail');
    sr.className = 'status-result fail';
  } else {
    sl.textContent = t('statusReady');
    sv.textContent = (currentLevel + 1) + '/3';
    sr.textContent = '';
    sr.className = 'status-result';
  }
}

// ================================================================
// refreshI18N / onModeChange
// ================================================================
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('sideTitle');
  document.getElementById('sideSub').textContent = t('sideSub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('diamLabel').textContent = t('diamLabel');
  document.getElementById('sliderLabel').textContent = t('sliderLabel');
  document.getElementById('btnLaunch').textContent = t('btnLaunch');
  document.getElementById('btnReset').textContent = t('btnReset');
  updateHUD();
  updateMission();
  updateStatus();
  draw();
}

function onModeChange() { draw(); }

// ================================================================
// INIT
// ================================================================
(function init() {
  document.documentElement.style.setProperty('--primary', ACCENT);
  document.documentElement.style.setProperty('--primary-dim', 'rgba(249,115,22,0.6)');
  document.documentElement.style.setProperty('--glow-strong', 'rgba(249,115,22,0.4)');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  document.getElementById('sideTitle').textContent = t('sideTitle');
  document.getElementById('sideSub').textContent = t('sideSub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('diamLabel').textContent = t('diamLabel');
  document.getElementById('sliderLabel').textContent = t('sliderLabel');
  document.getElementById('btnLaunch').textContent = t('btnLaunch');
  document.getElementById('btnReset').textContent = t('btnReset');

  var slider = document.getElementById('diamSlider');
  var diamValEl = document.getElementById('diamVal');

  // Real-time slider update
  slider.addEventListener('input', function() {
    currentDiam = parseInt(this.value);
    diamValEl.textContent = currentDiam + ' mm';
    updateHUD();
    draw();
  });

  // Confirm button
  document.getElementById('btnLaunch').addEventListener('click', function() {
    if (currentLevel >= 3) return;
    var passed = checkLevel(currentLevel, currentDiam);
    if (passed) {
      levelPassed[currentLevel] = true;
      lastResult = 'pass';
      updateStatus();
      draw();
      setTimeout(function() {
        currentLevel++;
        lastResult = '';
        if (currentLevel < 3) {
          currentDiam = 20;
          slider.value = 20;
          diamValEl.textContent = '20 mm';
        }
        updateMission();
        updateHUD();
        updateStatus();
        draw();
      }, 1200);
    } else {
      lastResult = 'fail';
      updateStatus();
      setTimeout(function() {
        lastResult = '';
        updateStatus();
      }, 1500);
    }
  });

  // Reset button
  document.getElementById('btnReset').addEventListener('click', function() {
    currentLevel = 0;
    levelPassed = [false, false, false];
    currentDiam = 20;
    slider.value = 20;
    diamValEl.textContent = '20 mm';
    lastResult = '';
    selectedOption = -1;
    document.getElementById('btnLaunch').disabled = false;
    updateMission();
    updateHUD();
    updateStatus();
    draw();
  });

  updateMission();
  updateHUD();
  updateStatus();
  draw();

  window.addEventListener('resize', function() { draw(); });
})();
</script>
