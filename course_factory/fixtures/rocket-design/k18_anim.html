<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* ── Main area: canvas + controls + hud ── */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, style switcher, title, guide -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<!-- Runtime (inlined) -->

  function lerp(a, b, p) { return a + (b - a) * p; }
  function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

  function _modeColors() {

  function _defaultDrawBg(c, w, h) {

    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);

    for (var x = 0; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
    for (var y = 0; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }

      c.beginPath(); c.moveTo(8, 8 + bLen); c.lineTo(8, 8); c.lineTo(8 + bLen, 8); c.stroke();
      c.beginPath(); c.moveTo(w - 8 - bLen, 8); c.lineTo(w - 8, 8); c.lineTo(w - 8, 8 + bLen); c.stroke();

  }

  function drawCup(ctx, el) {
    var cupX = el.x, cupY = el.y;
    // Cup body
    ctx.fillStyle = '#ecf0f1';
    ctx.beginPath();
    ctx.moveTo(cupX - 18, cupY - 45);
    ctx.lineTo(cupX + 18, cupY - 45);
    ctx.lineTo(cupX + 15, cupY);
    ctx.lineTo(cupX - 15, cupY);
    ctx.closePath();
    ctx.fill();
    // Cup rim
    ctx.strokeStyle = '#bdc3c7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cupX - 20, cupY - 45);
    ctx.lineTo(cupX + 20, cupY - 45);
    ctx.stroke();
    // Handle
    ctx.strokeStyle = '#bdc3c7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cupX + 22, cupY - 25, 10, -Math.PI * 0.4, Math.PI * 0.4);
    ctx.stroke();
    // Liquid inside
    ctx.fillStyle = 'rgba(91,163,217,0.5)';
    ctx.beginPath();
    ctx.moveTo(cupX - 16, cupY - 30);
    ctx.lineTo(cupX + 16, cupY - 30);
    ctx.lineTo(cupX + 15, cupY - 2);
    ctx.lineTo(cupX - 15, cupY - 2);
    ctx.closePath();
    ctx.fill();
  }

  // ----- Frame 0: Title -----
  if (f === 0) {
    var lines = t('f0_main').split('\n');
    var els = [
      {id:'title0', type:'label', text:t('title'), x:cx, y:cy-80, color:P.primary, size:22, align:'center', glow:P.glowStrong},
    ];
    for (var i = 0; i < lines.length; i++) {
      els.push({id:'f0_l'+i, type:'label', text:lines[i], x:cx, y:cy-20+i*28, color:P.text, size:16, align:'center'});
    }
    els.push({id:'f0_tap', type:'text', text:t('f0_tap'), x:cx, y:cy+80, color:P.muted, size:11, align:'center'});
    // Decorative question mark
    els.push({id:'f0_q', type:'label', text:'?', x:cx+180, y:cy-60, color:P.primaryDim, size:60, align:'center', bold:true});
    return els;
  }

  // ----- Frame 1: Objects at rest -----
  if (f === 1) {
    var tableY = cy + 40;
    var cupBaseY = tableY - 5;
    return [
      {id:'f1_title', type:'label', text:t('f1_title'), x:cx, y:40, color:P.primary, size:16, align:'center'},
      {id:'f1_desc', type:'text', text:t('f1_desc'), x:cx, y:65, color:P.muted, size:11, align:'center'},
      // Table
      {id:'table', type:'custom', x:cx, y:tableY, draw: drawTable, alpha:1},
      // Tablecloth
      {id:'cloth', type:'custom', x:cx, y:tableY-1, offsetX:0, clothColor:'#c0392b', draw: drawCloth, alpha:1},
      // Cup
      {id:'cup', type:'custom', x:cx, y:cupBaseY, draw: drawCup, alpha:1},
      // Labels
      {id:'lbl_cup', type:'text', text:t('f1_cup'), x:cx+45, y:cupBaseY-25, color:P.primary, size:10, align:'left'},
      {id:'lbl_cloth', type:'text', text:t('f1_cloth'), x:cx-190, y:tableY, color:'#c0392b', size:10, align:'left'},
      {id:'lbl_table', type:'text', text:t('f1_table'), x:cx+185, y:tableY+30, color:'#6b4226', size:10, align:'left'},
      // Force arrows
      {id:'gravity', type:'arrow', x1:cx, y1:cupBaseY-20, x2:cx, y2:cupBaseY+25, color:'#e74c3c', lineWidth:2, headSize:8},
      {id:'normal', type:'arrow', x1:cx, y1:cupBaseY+10, x2:cx, y2:cupBaseY-35, color:'#2ecc71', lineWidth:2, headSize:8},
      {id:'lbl_grav', type:'text', text:t('f1_gravity'), x:cx+8, y:cupBaseY+30, color:'#e74c3c', size:9, align:'left'},
      {id:'lbl_norm', type:'text', text:t('f1_normal'), x:cx+8, y:cupBaseY-42, color:'#2ecc71', size:9, align:'left'},
      // Law statement
      {id:'f1_law', type:'label', text:t('f1_law'), x:cx, y:H-35, color:P.secondary, size:12, align:'center'},
    ];
  }

  // ----- Frame 2: Pull the tablecloth -----
  if (f === 2) {
    var tableY2 = cy + 40;
    var cupBaseY2 = tableY2 - 5;
    return [
      {id:'f1_title', type:'label', text:t('f2_title'), x:cx, y:40, color:'#e74c3c', size:16, align:'center'},
      {id:'f1_desc', type:'text', text:t('f2_desc'), x:cx, y:65, color:P.muted, size:11, align:'center'},
      // Table
      {id:'table', type:'custom', x:cx, y:tableY2, draw: drawTable, alpha:1},
      // Tablecloth pulled to the right
      {id:'cloth', type:'custom', x:cx, y:tableY2-1, offsetX:220, clothColor:'#c0392b', draw: drawCloth, alpha:0.7},
      // Cup stays!
      {id:'cup', type:'custom', x:cx, y:cupBaseY2, draw: drawCup, alpha:1},
      // Pull arrow
      {id:'pull_arrow', type:'arrow', x1:cx+170, y1:tableY2-1, x2:cx+280, y2:tableY2-1, color:'#f39c12', lineWidth:3, headSize:10},
      {id:'lbl_pull', type:'label', text:t('f2_pull'), x:cx+290, y:tableY2-15, color:'#f39c12', size:14, align:'left', bold:true},
      {id:'lbl_fast', type:'text', text:t('f2_fast'), x:cx+290, y:tableY2+5, color:'#f39c12', size:10, align:'left'},
      // Friction annotation
      {id:'friction_line', type:'line', x1:cx-25, y1:cupBaseY2+5, x2:cx+25, y2:cupBaseY2+5, color:'#e67e22', lineWidth:1.5, dash:[4,3]},
      {id:'lbl_friction', type:'text', text:t('f2_friction'), x:cx-120, y:cupBaseY2+20, color:'#e67e22', size:10, align:'center'},
      // Inertia annotation
      {id:'inertia_box', type:'box', x:cx-70, y:cupBaseY2-80, w:140, h:24, stroke:P.primary, lineWidth:1.5, alpha:1},
      {id:'lbl_inertia', type:'label', text:t('f2_inertia'), x:cx, y:cupBaseY2-68, color:P.primary, size:11, align:'center'},
      // Inertia arrow pointing down to cup
      {id:'inertia_arrow', type:'arrow', x1:cx, y1:cupBaseY2-56, x2:cx, y2:cupBaseY2-48, color:P.primaryDim, lineWidth:1, headSize:5},
    ];
  }

  // ----- Frame 3: Summary + life examples -----
  if (f === 3) {
    var lines3 = t('f3_law').split('\n');
    var els3 = [
      {id:'f1_title', type:'label', text:t('f3_title'), x:cx, y:35, color:P.primary, size:18, align:'center', glow:P.glowStrong},
    ];
    for (var j = 0; j < lines3.length; j++) {
      els3.push({id:'f3_law_'+j, type:'label', text:lines3[j], x:cx, y:70+j*22, color:P.text, size:13, align:'center'});
    }
    // Divider
    els3.push({id:'f3_div', type:'line', x1:cx-180, y1:125, x2:cx+180, y2:125, color:P.primaryDim, lineWidth:1, dash:[6,4]});
    // Life examples with icons
    var exY = 155;
    // Example 1: Emergency brake
    els3.push({id:'ex1_icon', type:'circle', x:cx-180, y:exY, r:14, fill:P.primaryDim, alpha:0.6});
    els3.push({id:'ex1_num', type:'label', text:'1', x:cx-180, y:exY, color:P.bg, size:12, align:'center'});
    els3.push({id:'ex1_txt', type:'text', text:t('f3_ex1'), x:cx-160, y:exY, color:P.text, size:11, align:'left'});
    // Example 2: Coin on card
    els3.push({id:'ex2_icon', type:'circle', x:cx-180, y:exY+40, r:14, fill:P.primaryDim, alpha:0.6});
    els3.push({id:'ex2_num', type:'label', text:'2', x:cx-180, y:exY+40, color:P.bg, size:12, align:'center'});
    els3.push({id:'ex2_txt', type:'text', text:t('f3_ex2'), x:cx-160, y:exY+40, color:P.text, size:11, align:'left'});
    // Example 3: Spacecraft
    els3.push({id:'ex3_icon', type:'circle', x:cx-180, y:exY+80, r:14, fill:P.primaryDim, alpha:0.6});
    els3.push({id:'ex3_num', type:'label', text:'3', x:cx-180, y:exY+80, color:P.bg, size:12, align:'center'});
    els3.push({id:'ex3_txt', type:'text', text:t('f3_ex3'), x:cx-160, y:exY+80, color:P.text, size:11, align:'left'});
    // Summary box
    els3.push({id:'f3_sumbox', type:'box', x:cx-200, y:H-55, w:400, h:30, stroke:P.primary, lineWidth:1.5, alpha:0.8});
    els3.push({id:'f3_sum', type:'label', text:t('f3_summary'), x:cx, y:H-40, color:P.primary, size:12, align:'center'});
    return els3;
  }

  return [];
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
