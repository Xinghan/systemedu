<!DOCTYPE html>
<html lang="zh">
<head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* ── Slider / button controls ── */
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
/* ── Main area ── */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">GAME TITLE</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <!-- LLM adds game-specific controls here (sliders, buttons, etc.) -->
  </div>
  <div class="game-main">
    <div class="game-hud">
      <!-- LLM adds HUD items here -->
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <!-- LLM adds status items here -->
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM (inline -- games don't use shared runtime)
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

// Primary accent color -- set by game init (e.g. '#f97316' for mech)
var ACCENT = '#50ffb0';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  // Grid
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // Inner border (light)
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  // Top line (dark)
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  // Scanlines (cyberpunk)
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  // Corner brackets (cyberpunk)
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  // Glow (cyberpunk)
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,mc.accent.replace(/[\d.]+\)$/,'0.06)'));rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  // Derived vars used by .action-btn / slider-thumb
  var dimColor = (m.ctrlBg || ACCENT).replace(/^#/, '');
  if (dimColor.length === 6) {
    var rr = parseInt(dimColor.slice(0,2),16), gg = parseInt(dimColor.slice(2,4),16), bb = parseInt(dimColor.slice(4,6),16);
    r.style.setProperty('--primary-dim', 'rgba('+Math.round(rr*0.6)+','+Math.round(gg*0.6)+','+Math.round(bb*0.6)+',0.8)');
    r.style.setProperty('--glow-strong', 'rgba('+rr+','+gg+','+bb+',0.5)');
  } else {
    r.style.setProperty('--primary-dim', ACCENT);
    r.style.setProperty('--glow-strong', ACCENT);
  }
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n helper
// ================================================================
var LANG = 'cn';
var I18N = {};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    if (typeof refreshI18N === 'function') refreshI18N();
  });
}

// ================================================================
// LLM fills in everything below this line:
// - ACCENT color
// - I18N table
// - Game CONFIG
// - Canvas drawing logic (using gameModeColors() for adaptive colors)
// - refreshI18N()
// - onModeChange(mode) -- optional, called when user switches mode
// ================================================================

var ACCENT = '#f97316';
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();

I18N = {
  gameTitle:   {en:'BALANCE POINT', cn:'平衡点挑战'},
  gameSub:     {en:'Find the center of mass', cn:'找到质心位置'},
  guide:       {en:'GUIDE', cn:'操作指南'},
  guideBody:   {en:'Move the slider to position the fulcrum under the rocket. When the fulcrum is at the center of mass, the rocket balances.', cn:'拖动滑块调整支点位置。当支点位于质心时，火箭将保持平衡。找到平衡点即可过关。'},
  fulcrum:     {en:'FULCRUM', cn:'支点位置'},
  resetTxt:    {en:'RESET', cn:'重置'},
  hudTag:      {en:'CG FINDER', cn:'质心探索'},
  hudLevel:    {en:'LEVEL', cn:'关卡'},
  hudTilt:     {en:'TILT', cn:'倾斜角'},
  hudFulcrum:  {en:'FULCRUM', cn:'支点'},
  hudCG:       {en:'CG POS', cn:'质心'},
  statusLabel: {en:'STATUS', cn:'状态'},
  searching:   {en:'SEARCHING...', cn:'寻找中...'},
  balanced:    {en:'BALANCED!', cn:'平衡！'},
  pass:        {en:'PASS', cn:'通过'},
  allClear:    {en:'ALL CLEAR!', cn:'全部通过！'},
  clickNext:   {en:'CLICK TO CONTINUE', cn:'点击继续'},
  lvl1name:    {en:'UNIFORM ROD', cn:'均匀棒'},
  lvl1desc:    {en:'A simple uniform rod. CG is at the center.', cn:'一根均匀棒。质心在正中间。'},
  lvl2name:    {en:'BASIC ROCKET', cn:'基本火箭'},
  lvl2desc:    {en:'Nose 15g + Body 25g + Engine 24g', cn:'鼻锥 15g + 箭体 25g + 发动机 24g'},
  lvl3name:    {en:'WEIGHTED NOSE', cn:'加重火箭'},
  lvl3desc:    {en:'Nose 15g + Clay 20g + Body 25g + Engine 24g', cn:'鼻锥 15g + 橡皮泥 20g + 箭体 25g + 发动机 24g'},
  noseLabel:   {en:'NOSE', cn:'鼻锥'},
  bodyLabel:   {en:'BODY', cn:'箭体'},
  engineLabel: {en:'ENGINE', cn:'发动机'},
  clayLabel:   {en:'CLAY', cn:'橡皮泥'},
  rodLabel:    {en:'ROD', cn:'棒'},
};

var LEVELS = [
  { nameKey:'lvl1name', descKey:'lvl1desc',
    segments:[{key:'rodLabel',mass:50,lenFrac:1.0,color:'#64748b'}], hasNoseCone:false },
  { nameKey:'lvl2name', descKey:'lvl2desc',
    segments:[
      {key:'noseLabel',mass:15,lenFrac:0.2,color:'#ef4444'},
      {key:'bodyLabel',mass:25,lenFrac:0.55,color:'#64748b'},
      {key:'engineLabel',mass:24,lenFrac:0.25,color:'#a855f7'}
    ], hasNoseCone:true },
  { nameKey:'lvl3name', descKey:'lvl3desc',
    segments:[
      {key:'noseLabel',mass:15,lenFrac:0.15,color:'#ef4444'},
      {key:'clayLabel',mass:20,lenFrac:0.1,color:'#eab308'},
      {key:'bodyLabel',mass:25,lenFrac:0.5,color:'#64748b'},
      {key:'engineLabel',mass:24,lenFrac:0.25,color:'#a855f7'}
    ], hasNoseCone:true },
];

var currentLevel = 0, fulcrumFrac = 0.5;
var levelPassed = [false, false, false];
var allCleared = false, passFlashTimer = 0;
var PASS_THRESHOLD = 0.03;

function computeCG(li) {
  var lvl = LEVELS[li], totalM = 0, wSum = 0, pos = 0;
  for (var i = 0; i < lvl.segments.length; i++) {
    var s = lvl.segments[i];
    wSum += s.mass * (pos + s.lenFrac / 2);
    totalM += s.mass;
    pos += s.lenFrac;
  }
  return wSum / totalM;
}

function computeTilt(li, fPos) {
  var lvl = LEVELS[li], net = 0, totalM = 0, pos = 0;
  for (var i = 0; i < lvl.segments.length; i++) {
    var s = lvl.segments[i];
    net += s.mass * (pos + s.lenFrac / 2 - fPos);
    totalM += s.mass;
    pos += s.lenFrac;
  }
  return Math.max(-30, Math.min(30, (net / (totalM * 0.5)) * 30));
}

function isBalanced(li, fPos) { return Math.abs(fPos - computeCG(li)) <= PASS_THRESHOLD; }

// DOM setup
var sidebar = document.querySelector('.game-sidebar');

var div1 = document.createElement('div'); div1.className = 'sidebar-divider'; sidebar.appendChild(div1);
var lvlSection = document.createElement('div'); lvlSection.className = 'sidebar-section'; lvlSection.id = 'lvlSectionLabel'; sidebar.appendChild(lvlSection);
var lvlName = document.createElement('div'); lvlName.className = 'sidebar-guide'; lvlName.id = 'lvlNameText'; lvlName.style.fontWeight = '700'; lvlName.style.color = 'var(--sb-accent,var(--primary))'; sidebar.appendChild(lvlName);
var lvlDesc = document.createElement('div'); lvlDesc.className = 'sidebar-guide'; lvlDesc.id = 'lvlDescText'; lvlDesc.style.fontSize = '10px'; lvlDesc.style.marginTop = '2px'; sidebar.appendChild(lvlDesc);
var div2 = document.createElement('div'); div2.className = 'sidebar-divider'; sidebar.appendChild(div2);
var sLabel = document.createElement('div'); sLabel.className = 'sidebar-section'; sLabel.id = 'fulcrumLabel'; sidebar.appendChild(sLabel);
var sGroup = document.createElement('div'); sGroup.className = 'slider-group'; sidebar.appendChild(sGroup);
var fSlider = document.createElement('input'); fSlider.type = 'range'; fSlider.min = '0'; fSlider.max = '1000'; fSlider.value = '500'; fSlider.step = '1'; sGroup.appendChild(fSlider);
var fVal = document.createElement('div'); fVal.className = 'val'; fVal.id = 'fulcrumVal'; sGroup.appendChild(fVal);
var rBtn = document.createElement('button'); rBtn.className = 'reset-btn'; rBtn.id = 'resetBtn'; sidebar.appendChild(rBtn);

var hud = document.querySelector('.game-hud'); hud.innerHTML = '';
var hudTag = document.createElement('span'); hudTag.className = 'hud-tag'; hudTag.id = 'hudTag'; hud.appendChild(hudTag);
function makeHI(lid, vid) {
  var item = document.createElement('div'); item.className = 'hud-item';
  var lbl = document.createElement('div'); lbl.className = 'hud-label'; lbl.id = lid;
  var val = document.createElement('div'); val.className = 'hud-val'; val.id = vid;
  item.appendChild(lbl); item.appendChild(val); hud.appendChild(item);
}
makeHI('hl1','hv1'); makeHI('hl2','hv2'); makeHI('hl3','hv3'); makeHI('hl4','hv4');

var statusBar = document.querySelector('.status-bar'); statusBar.innerHTML = '';
var sLbl = document.createElement('span'); sLbl.className = 'status-label'; sLbl.id = 'statusLabel'; statusBar.appendChild(sLbl);
var sVal = document.createElement('span'); sVal.className = 'status-val'; sVal.id = 'statusVal'; statusBar.appendChild(sVal);
var sRes = document.createElement('span'); sRes.className = 'status-result'; sRes.id = 'statusResult'; statusBar.appendChild(sRes);

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('gameTitle');
  document.getElementById('sideSub').textContent = t('gameSub');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').innerHTML = t('guideBody');
  document.getElementById('fulcrumLabel').textContent = t('fulcrum');
  document.getElementById('resetBtn').textContent = t('resetTxt');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hl1').textContent = t('hudLevel');
  document.getElementById('hl2').textContent = t('hudTilt');
  document.getElementById('hl3').textContent = t('hudFulcrum');
  document.getElementById('hl4').textContent = t('hudCG');
  document.getElementById('statusLabel').textContent = t('statusLabel');
  document.getElementById('lvlSectionLabel').textContent = t('hudLevel');
  updateLevelInfo(); updateHUD();
}

function updateLevelInfo() {
  document.getElementById('lvlNameText').textContent = (currentLevel+1)+'. '+t(LEVELS[currentLevel].nameKey);
  document.getElementById('lvlDescText').textContent = t(LEVELS[currentLevel].descKey);
}

function updateHUD() {
  var tiltDeg = computeTilt(currentLevel, fulcrumFrac);
  var passed = levelPassed[currentLevel];
  document.getElementById('hv1').textContent = (currentLevel+1)+' / 3';
  document.getElementById('hv2').textContent = tiltDeg.toFixed(1)+'\u00b0';
  document.getElementById('hv3').textContent = (fulcrumFrac*100).toFixed(1)+'%';
  document.getElementById('hv4').textContent = passed ? (computeCG(currentLevel)*100).toFixed(1)+'%' : '??';
  document.getElementById('fulcrumVal').textContent = (fulcrumFrac*100).toFixed(1)+'%';
  var sr = document.getElementById('statusResult'), sv = document.getElementById('statusVal');
  if (allCleared) { sv.textContent = t('allClear'); sr.textContent = ''; sr.className = 'status-result pass'; }
  else if (passed) { sv.textContent = t('balanced'); sr.textContent = t('pass'); sr.className = 'status-result pass'; }
  else { sv.textContent = t('searching'); sr.textContent = ''; sr.className = 'status-result'; }
}

var gc = document.getElementById('gc');
var ctx = gc.getContext('2d');

function resizeCanvas() {
  var parent = gc.parentElement, rect = parent.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  gc.width = rect.width * dpr; gc.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function draw() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w = gc.width / dpr, h = gc.height / dpr;
  ctx.save(); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawGameBg(ctx, w, h);
  var mc = gameModeColors();
  var lvl = LEVELS[currentLevel], passed = levelPassed[currentLevel];
  var rocketLen = Math.min(w * 0.7, 500);
  var rocketH = Math.min(h * 0.08, 40);
  var rocketCX = w / 2, rocketCY = h * 0.4;
  var rocketLeft = rocketCX - rocketLen / 2;
  var tiltDeg = computeTilt(currentLevel, fulcrumFrac);
  var tiltRad = tiltDeg * Math.PI / 180;
  var fScreenX = rocketLeft + fulcrumFrac * rocketLen;
  var fScreenY = rocketCY + rocketH / 2 + 5;

  // Fulcrum triangle
  var triH = Math.min(h * 0.08, 35);
  ctx.fillStyle = mc.accent; ctx.globalAlpha = passed ? 1 : 0.7;
  if (mc.glow) { ctx.shadowColor = mc.accent; ctx.shadowBlur = 12; }
  ctx.beginPath(); ctx.moveTo(fScreenX, fScreenY); ctx.lineTo(fScreenX - triH * 0.4, fScreenY + triH); ctx.lineTo(fScreenX + triH * 0.4, fScreenY + triH); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  // Ground line
  var groundY = fScreenY + triH + 2;
  ctx.strokeStyle = mc.dim; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(rocketLeft - 30, groundY); ctx.lineTo(rocketLeft + rocketLen + 30, groundY); ctx.stroke();
  ctx.setLineDash([]);

  // Rocket (tilted)
  ctx.save(); ctx.translate(fScreenX, rocketCY); ctx.rotate(tiltRad);
  var segStartX = -fulcrumFrac * rocketLen, segY = -rocketH / 2, segPos = 0;
  for (var si = 0; si < lvl.segments.length; si++) {
    var seg = lvl.segments[si], segW = seg.lenFrac * rocketLen, segX = segStartX + segPos * rocketLen;
    if (si === 0 && lvl.hasNoseCone) {
      var noseW = segW * 0.5, bodyW2 = segW - noseW;
      ctx.fillStyle = seg.color; ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.moveTo(segX, segY + rocketH / 2); ctx.lineTo(segX + noseW, segY); ctx.lineTo(segX + noseW, segY + rocketH); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = mc.stroke; ctx.lineWidth = 1; ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 0.85;
      ctx.fillRect(segX + noseW, segY, bodyW2, rocketH);
      ctx.globalAlpha = 0.5; ctx.strokeRect(segX + noseW, segY, bodyW2, rocketH); ctx.globalAlpha = 1;
    } else if (si === lvl.segments.length - 1 && lvl.hasNoseCone) {
      ctx.fillStyle = seg.color; ctx.globalAlpha = 0.85;
      ctx.fillRect(segX, segY, segW * 0.75, rocketH);
      ctx.beginPath(); ctx.moveTo(segX + segW * 0.75, segY); ctx.lineTo(segX + segW, segY - rocketH * 0.15); ctx.lineTo(segX + segW, segY + rocketH * 1.15); ctx.lineTo(segX + segW * 0.75, segY + rocketH); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = mc.stroke; ctx.lineWidth = 1; ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = seg.color; ctx.globalAlpha = 0.85; ctx.fillRect(segX, segY, segW, rocketH);
      ctx.strokeStyle = mc.stroke; ctx.lineWidth = 1; ctx.globalAlpha = 0.5; ctx.strokeRect(segX, segY, segW, rocketH); ctx.globalAlpha = 1;
    }
    var labelX = segX + segW / 2; if (si === 0 && lvl.hasNoseCone) labelX = segX + segW * 0.6;
    ctx.font = '700 10px "JetBrains Mono",monospace'; ctx.fillStyle = mc.text; ctx.globalAlpha = 0.9; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(seg.mass + 'g', labelX, segY + rocketH / 2); ctx.globalAlpha = 1;
    ctx.font = '500 9px "Noto Sans SC",sans-serif'; ctx.fillStyle = mc.dim;
    ctx.fillText(t(seg.key), labelX, segY + rocketH + 14);
    segPos += seg.lenFrac;
  }
  if (passed) {
    var cgFrac = computeCG(currentLevel), cgSX = segStartX + cgFrac * rocketLen;
    ctx.fillStyle = '#22c55e';
    if (mc.glow) { ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 8; }
    ctx.beginPath(); ctx.moveTo(cgSX, segY - 18); ctx.lineTo(cgSX - 6, segY - 28); ctx.lineTo(cgSX + 6, segY - 28); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(cgSX, segY - 28); ctx.lineTo(cgSX, segY - 40); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.font = '700 10px "JetBrains Mono",monospace'; ctx.fillStyle = '#22c55e'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('CG', cgSX, segY - 42);
  }
  ctx.restore();

  // Pass flash
  if (passed && passFlashTimer > 0) {
    ctx.font = '700 28px "JetBrains Mono",monospace'; ctx.fillStyle = '#22c55e'; ctx.globalAlpha = Math.min(1, passFlashTimer / 0.5);
    if (mc.glow) { ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 20; }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('balanced'), w / 2, h * 0.72);
    if (!allCleared && currentLevel < 2) {
      ctx.font = '500 12px "Noto Sans SC",sans-serif'; ctx.globalAlpha *= 0.7;
      ctx.fillText(t('clickNext'), w / 2, h * 0.72 + 28);
    }
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  if (allCleared) {
    ctx.font = '700 24px "JetBrains Mono",monospace'; ctx.fillStyle = '#22c55e'; ctx.globalAlpha = 0.9;
    if (mc.glow) { ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 16; }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('allClear'), w / 2, h * 0.78);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  // Level dots
  for (var li = 0; li < 3; li++) {
    var dx = 30 + li * 22, dy = h - 30;
    ctx.beginPath(); ctx.arc(dx, dy, 6, 0, Math.PI * 2);
    if (levelPassed[li]) { ctx.fillStyle = '#22c55e'; ctx.fill(); }
    else if (li === currentLevel) { ctx.strokeStyle = mc.accent; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = mc.accent; ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1; }
    else { ctx.strokeStyle = mc.dim; ctx.lineWidth = 1; ctx.stroke(); }
  }
  ctx.restore();
}

var lastTime = 0;
function gameLoop(ts) {
  var dt = lastTime ? (ts - lastTime) / 1000 : 0.016; lastTime = ts;
  if (passFlashTimer > 0) { passFlashTimer -= dt; if (passFlashTimer < 0) passFlashTimer = 0; }
  draw(); requestAnimationFrame(gameLoop);
}

fSlider.addEventListener('input', function() {
  if (levelPassed[currentLevel]) return;
  fulcrumFrac = parseInt(this.value) / 1000;
  updateHUD();
  if (isBalanced(currentLevel, fulcrumFrac)) {
    levelPassed[currentLevel] = true; passFlashTimer = 2.5;
    if (levelPassed[0] && levelPassed[1] && levelPassed[2]) allCleared = true;
    updateHUD();
  }
});

rBtn.addEventListener('click', function() {
  currentLevel = 0; fulcrumFrac = 0.5; levelPassed = [false, false, false]; allCleared = false; passFlashTimer = 0;
  fSlider.value = '500'; updateLevelInfo(); updateHUD();
});

gc.addEventListener('click', function() {
  if (levelPassed[currentLevel] && !allCleared && currentLevel < 2) {
    currentLevel++; fulcrumFrac = 0.5; fSlider.value = '500'; passFlashTimer = 0;
    updateLevelInfo(); updateHUD();
  }
});

refreshI18N(); resizeCanvas();
window.addEventListener('resize', function() { resizeCanvas(); });
setTimeout(resizeCanvas, 100);
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
