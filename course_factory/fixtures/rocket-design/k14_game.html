<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">LANDER DESIGNER</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="missionLabel">MISSION</div>
    <div class="sidebar-guide" id="missionText" style="font-weight:700;color:var(--sb-accent,var(--primary))"></div>
    <div class="sidebar-divider"></div>
    <div class="slider-group">
      <label id="paraLabel">PARACHUTE</label>
      <input type="range" id="paraSlider" min="1" max="3" step="1" value="2">
      <div class="val" id="paraVal">M</div>
    </div>
    <div class="slider-group" style="margin-top:6px">
      <label id="cargoLabel">CARGO</label>
      <input type="range" id="cargoSlider" min="1" max="3" step="1" value="2">
      <div class="val" id="cargoVal">M</div>
    </div>
    <button class="action-btn" id="deployBtn">DEPLOY</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">LANDER DESIGNER</div>
      <div class="hud-item"><div class="hud-label" id="hudAltLabel">ALT</div><div class="hud-val" id="hudAlt">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudVelLabel">VEL</div><div class="hud-val" id="hudVel">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudGLabel">G</div><div class="hud-val" id="hudG">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudMsnLabel">MSN</div><div class="hud-val" id="hudMsn">1/6</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">--</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:      {en:'LANDER DESIGNER', cn:'\u7740\u9646\u5668\u8bbe\u8ba1\u5e08'},
  sub:        {en:'Design a safe landing system', cn:'\u8bbe\u8ba1\u5b89\u5168\u7684\u7740\u9646\u7cfb\u7edf'},
  guide:      {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:  {en:'Choose parachute size and cargo weight, then press DEPLOY to test your design. Land under 5 m/s for a perfect score!',
               cn:'\u9009\u62e9\u964d\u843d\u4f1e\u5c3a\u5bf8\u548c\u8d27\u7269\u91cd\u91cf\uff0c\u7136\u540e\u6309\u201c\u90e8\u7f72\u201d\u6d4b\u8bd5\u4f60\u7684\u8bbe\u8ba1\u3002\u7740\u9646\u901f\u5ea6\u4f4e\u4e8e 5 m/s \u5c31\u662f\u6ee1\u5206\uff01'},
  msnLabel:   {en:'MISSION', cn:'\u4efb\u52a1'},
  paraLabel:  {en:'PARACHUTE SIZE', cn:'\u964d\u843d\u4f1e\u5c3a\u5bf8'},
  cargoLabel: {en:'CARGO WEIGHT', cn:'\u8d27\u7269\u91cd\u91cf'},
  deploy:     {en:'DEPLOY', cn:'\u90e8\u7f72'},
  resetLabel: {en:'RESET', cn:'\u91cd\u7f6e'},
  altLabel:   {en:'ALT', cn:'\u9ad8\u5ea6'},
  velLabel:   {en:'VEL', cn:'\u901f\u5ea6'},
  gLabel:     {en:'GRAVITY', cn:'\u91cd\u529b'},
  msnHud:     {en:'MSN', cn:'\u4efb\u52a1'},
  statusLbl:  {en:'STATUS', cn:'\u72b6\u6001'},
  ready:      {en:'READY', cn:'\u5c31\u7eea'},
  descending: {en:'DESCENDING...', cn:'\u4e0b\u964d\u4e2d...'},
  perfect:    {en:'PERFECT LANDING!', cn:'\u5b8c\u7f8e\u7740\u9646\uff01'},
  rough:      {en:'ROUGH LANDING', cn:'\u7c97\u66b4\u7740\u9646'},
  crashed:    {en:'CRASHED!', cn:'\u5760\u6bc1\uff01'},
  small:      {en:'S', cn:'\u5c0f'},
  medium:     {en:'M', cn:'\u4e2d'},
  large:      {en:'L', cn:'\u5927'},
  light:      {en:'LIGHT', cn:'\u8f7b'},
  med:        {en:'MEDIUM', cn:'\u4e2d'},
  heavy:      {en:'HEAVY', cn:'\u91cd'},
  nextMsn:    {en:'NEXT MISSION >>>', cn:'\u4e0b\u4e00\u4e2a\u4efb\u52a1 >>>'},
  allDone:    {en:'ALL MISSIONS COMPLETE!', cn:'\u5168\u90e8\u4efb\u52a1\u5b8c\u6210\uff01'},
  score:      {en:'SCORE', cn:'\u5f97\u5206'},
  landed:     {en:'LANDED', cn:'\u5df2\u7740\u9646'},
};

function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('missionLabel').textContent = t('msnLabel');
  document.getElementById('paraLabel').textContent = t('paraLabel');
  document.getElementById('cargoLabel').textContent = t('cargoLabel');
  document.getElementById('deployBtn').textContent = t('deploy');
  document.getElementById('resetBtn').textContent = t('resetLabel');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudAltLabel').textContent = t('altLabel');
  document.getElementById('hudVelLabel').textContent = t('velLabel');
  document.getElementById('hudGLabel').textContent = t('gLabel');
  document.getElementById('hudMsnLabel').textContent = t('msnHud');
  document.getElementById('statusLabel').textContent = t('statusLbl');
  updateParaVal();
  updateCargoVal();
  updateMissionText();
  updateStatusBar();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// MISSIONS
// ================================================================
var MISSIONS = [
  {planet:{en:'Earth',cn:'\u5730\u7403'}, gravity:9.8, color:'#3b82f6', groundColor:'#2d5a27'},
  {planet:{en:'Mars',cn:'\u706b\u661f'}, gravity:3.7, color:'#ef4444', groundColor:'#8b3a1a'},
  {planet:{en:'Moon',cn:'\u6708\u7403'}, gravity:1.6, color:'#94a3b8', groundColor:'#4a4a4a'},
  {planet:{en:'Earth (heavy)',cn:'\u5730\u7403\uff08\u91cd\u8f7d\uff09'}, gravity:9.8, color:'#3b82f6', groundColor:'#2d5a27'},
  {planet:{en:'Mars (storm)',cn:'\u706b\u661f\uff08\u6c99\u66b4\uff09'}, gravity:3.7, color:'#f97316', groundColor:'#8b3a1a', dragMult:0.6},
  {planet:{en:'Titan',cn:'\u571f\u536b\u516d'}, gravity:1.35, color:'#f59e0b', groundColor:'#5a4520', dragMult:2.5},
];

var missionIdx = 0;
var missionResults = []; // {speed, rating}

// ================================================================
// PHYSICS STATE
// ================================================================
var SIM = {
  running: false,
  finished: false,
  altitude: 1000,   // meters
  velocity: 0,      // m/s (positive = downward)
  paraSize: 2,      // 1=S, 2=M, 3=L
  cargoWeight: 2,   // 1=light, 2=med, 3=heavy
  dt: 1/60,
  time: 0,
  trail: [],        // [{y, v}]
  ghostTrails: [],   // previous attempts [{trail, paraSize, cargoWeight}]
  particles: [],
  impactParticles: [],
  landingSpeed: 0,
};

var PARA_AREAS = [8, 20, 45];    // m^2
var CARGO_MASSES = [50, 120, 250]; // kg
var Cd = 1.2; // drag coefficient
var AIR_DENSITY = 1.225; // kg/m^3 (Earth default, scaled per planet)

function getPhysics() {
  var msn = MISSIONS[missionIdx];
  var grav = msn.gravity;
  var area = PARA_AREAS[SIM.paraSize - 1];
  var mass = CARGO_MASSES[SIM.cargoWeight - 1];
  var dragMult = msn.dragMult || 1.0;
  return {grav: grav, area: area, mass: mass, dragMult: dragMult};
}

function stepPhysics() {
  if (!SIM.running) return;
  var ph = getPhysics();
  var gForce = ph.mass * ph.grav;
  var dragForce = 0.5 * Cd * ph.area * AIR_DENSITY * ph.dragMult * SIM.velocity * Math.abs(SIM.velocity);
  var netForce = gForce - dragForce;
  var accel = netForce / ph.mass;
  SIM.velocity += accel * SIM.dt;
  if (SIM.velocity < 0) SIM.velocity = 0;
  SIM.altitude -= SIM.velocity * SIM.dt;
  SIM.time += SIM.dt;

  // Trail
  if (Math.floor(SIM.time * 10) % 2 === 0) {
    SIM.trail.push({alt: SIM.altitude, vel: SIM.velocity});
  }

  // Parachute flutter particles
  if (Math.random() < 0.3) {
    SIM.particles.push({
      x: (Math.random() - 0.5) * 30,
      y: -20 - Math.random() * 10,
      vx: (Math.random() - 0.5) * 2,
      vy: -1 - Math.random() * 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
    });
  }

  // Update particles
  for (var i = SIM.particles.length - 1; i >= 0; i--) {
    var p = SIM.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) SIM.particles.splice(i, 1);
  }

  // Landing
  if (SIM.altitude <= 0) {
    SIM.altitude = 0;
    SIM.landingSpeed = SIM.velocity;
    SIM.running = false;
    SIM.finished = true;
    // Impact dust
    for (var j = 0; j < 20; j++) {
      SIM.impactParticles.push({
        x: 0, y: 0,
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 6 - 2,
        life: 40 + Math.random() * 30,
        maxLife: 70,
        r: 1 + Math.random() * 3,
      });
    }
    // Record result
    var rating = SIM.landingSpeed < 5 ? 'perfect' : SIM.landingSpeed < 10 ? 'rough' : 'crashed';
    missionResults[missionIdx] = {speed: SIM.landingSpeed, rating: rating};
    // Save ghost trail
    SIM.ghostTrails.push({trail: SIM.trail.slice(), paraSize: SIM.paraSize, cargoWeight: SIM.cargoWeight});
    updateStatusBar();
    document.getElementById('deployBtn').disabled = false;
    document.getElementById('deployBtn').textContent = missionIdx < MISSIONS.length - 1 ? t('nextMsn') : t('allDone');
  }
}

// ================================================================
// CANVAS DRAWING
// ================================================================
var canvas, c2d, cw, ch, DPR;
var starField = [];

function initStars() {
  starField = [];
  var rng = 54321;
  function sr(){ rng = (rng * 16807) % 2147483647; return (rng & 0x7fffffff) / 0x7fffffff; }
  for (var i = 0; i < 80; i++) {
    starField.push({x: sr(), y: sr() * 0.7, r: 0.3 + sr() * 1.0, b: 0.15 + sr() * 0.5});
  }
}

function resizeCanvas() {
  var body = document.querySelector('.game-body');
  if (!body) return;
  var rect = body.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  cw = rect.width;
  ch = rect.height;
  if (cw < 1 || ch < 1) return;
  canvas.width = cw * DPR;
  canvas.height = ch * DPR;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  c2d.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  if (cw < 1 || ch < 1) return;

  var mc = gameModeColors();
  var msn = MISSIONS[missionIdx];

  // Background: space gradient
  var bgG = c2d.createLinearGradient(0, 0, 0, ch);
  bgG.addColorStop(0, mc.bg1);
  bgG.addColorStop(0.7, mc.bg2);
  bgG.addColorStop(1, msn.groundColor);
  c2d.fillStyle = bgG;
  c2d.fillRect(0, 0, cw, ch);

  // Stars (top 70% only)
  for (var i = 0; i < starField.length; i++) {
    var s = starField[i];
    c2d.fillStyle = 'rgba(220,220,255,' + s.b + ')';
    c2d.beginPath();
    c2d.arc(s.x * cw, s.y * ch, s.r, 0, Math.PI * 2);
    c2d.fill();
  }

  // Purple nebula glow
  var neb = c2d.createRadialGradient(cw * 0.7, ch * 0.2, 0, cw * 0.7, ch * 0.2, cw * 0.4);
  neb.addColorStop(0, 'rgba(167,139,250,0.06)');
  neb.addColorStop(1, 'transparent');
  c2d.fillStyle = neb;
  c2d.fillRect(0, 0, cw, ch);

  // Grid overlay
  var gridC = mc.grid || 'rgba(167,139,250,0.04)';
  c2d.strokeStyle = gridC;
  c2d.lineWidth = 0.5;
  var gs = mc.gridStep;
  for (var gx = 0; gx < cw; gx += gs) { c2d.beginPath(); c2d.moveTo(gx, 0); c2d.lineTo(gx, ch); c2d.stroke(); }
  for (var gy = 0; gy < ch; gy += gs) { c2d.beginPath(); c2d.moveTo(0, gy); c2d.lineTo(cw, gy); c2d.stroke(); }

  // Ground surface
  var groundY = ch * 0.88;
  var grdG = c2d.createLinearGradient(0, groundY, 0, ch);
  grdG.addColorStop(0, msn.groundColor);
  grdG.addColorStop(1, 'rgba(0,0,0,0.8)');
  c2d.fillStyle = grdG;
  c2d.fillRect(0, groundY, cw, ch - groundY);
  // Ground line
  c2d.strokeStyle = msn.color;
  c2d.lineWidth = 1.5;
  c2d.globalAlpha = 0.6;
  c2d.beginPath(); c2d.moveTo(0, groundY); c2d.lineTo(cw, groundY); c2d.stroke();
  c2d.globalAlpha = 1;
  // Ground texture dots
  c2d.fillStyle = 'rgba(255,255,255,0.05)';
  for (var di = 0; di < 30; di++) {
    var dx = ((di * 137) % 100) / 100 * cw;
    var dy = groundY + 5 + ((di * 53) % 40);
    c2d.beginPath(); c2d.arc(dx, dy, 1, 0, Math.PI * 2); c2d.fill();
  }

  // Planet label
  c2d.fillStyle = msn.color;
  c2d.globalAlpha = 0.5;
  c2d.font = "bold 10px 'JetBrains Mono',monospace";
  c2d.textAlign = 'right';
  c2d.fillText((msn.planet[LANG] || msn.planet.en).toUpperCase() + ' | g=' + msn.gravity + ' m/s\u00b2', cw - 15, groundY + 15);
  c2d.globalAlpha = 1;

  // Landing target zone
  var targetX = cw * 0.5;
  c2d.strokeStyle = 'rgba(34,197,94,0.4)';
  c2d.lineWidth = 1;
  c2d.setLineDash([4, 4]);
  c2d.beginPath();
  c2d.moveTo(targetX - 25, groundY);
  c2d.lineTo(targetX - 25, groundY - 8);
  c2d.stroke();
  c2d.beginPath();
  c2d.moveTo(targetX + 25, groundY);
  c2d.lineTo(targetX + 25, groundY - 8);
  c2d.stroke();
  c2d.setLineDash([]);
  c2d.strokeStyle = 'rgba(34,197,94,0.6)';
  c2d.lineWidth = 2;
  c2d.beginPath();
  c2d.moveTo(targetX - 25, groundY);
  c2d.lineTo(targetX + 25, groundY);
  c2d.stroke();

  // Map altitude to screen Y
  var maxAlt = 1000;
  var topMargin = ch * 0.05;
  function altToY(alt) {
    return topMargin + (1 - alt / maxAlt) * (groundY - topMargin);
  }

  // Ghost trails (previous attempts)
  for (var gi = 0; gi < SIM.ghostTrails.length; gi++) {
    var ghost = SIM.ghostTrails[gi];
    c2d.strokeStyle = 'rgba(167,139,250,0.12)';
    c2d.lineWidth = 1;
    c2d.beginPath();
    for (var gti = 0; gti < ghost.trail.length; gti++) {
      var gpt = ghost.trail[gti];
      var gy2 = altToY(gpt.alt);
      if (gti === 0) c2d.moveTo(targetX, gy2);
      else c2d.lineTo(targetX, gy2);
    }
    c2d.stroke();
  }

  // Current trail
  if (SIM.trail.length > 1) {
    c2d.strokeStyle = 'rgba(167,139,250,0.35)';
    c2d.lineWidth = 1.5;
    c2d.beginPath();
    for (var ti = 0; ti < SIM.trail.length; ti++) {
      var tp = SIM.trail[ti];
      var ty = altToY(tp.alt);
      if (ti === 0) c2d.moveTo(targetX, ty);
      else c2d.lineTo(targetX, ty);
    }
    c2d.stroke();
  }

  // Capsule position
  var capY = altToY(SIM.altitude);
  var capX = targetX;
  var capSz = Math.min(cw, ch) * 0.04;
  if (capSz < 12) capSz = 12;

  // Parachute (when deploying or waiting)
  if (!SIM.finished || SIM.altitude > 0) {
    var paraW = [capSz * 1.5, capSz * 2.5, capSz * 4][SIM.paraSize - 1];
    var paraH = paraW * 0.55;

    // Parachute canopy
    c2d.fillStyle = 'rgba(167,139,250,0.55)';
    c2d.beginPath();
    c2d.moveTo(capX - paraW / 2, capY - capSz * 1.2);
    c2d.quadraticCurveTo(capX - paraW / 3, capY - capSz * 1.2 - paraH, capX, capY - capSz * 1.2 - paraH * 0.9);
    c2d.quadraticCurveTo(capX + paraW / 3, capY - capSz * 1.2 - paraH, capX + paraW / 2, capY - capSz * 1.2);
    c2d.closePath();
    c2d.fill();
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 1;
    c2d.stroke();

    // Canopy stripes
    c2d.strokeStyle = 'rgba(255,255,255,0.15)';
    c2d.lineWidth = 0.5;
    for (var si = 1; si < 5; si++) {
      var sf = si / 5;
      var spx = capX - paraW / 2 + sf * paraW;
      c2d.beginPath();
      c2d.moveTo(spx, capY - capSz * 1.2);
      var scpx = capX - paraW / 3 + sf * (paraW * 2 / 3);
      c2d.quadraticCurveTo(scpx, capY - capSz * 1.2 - paraH * 0.7, spx, capY - capSz * 1.2 - paraH * 0.8);
      c2d.stroke();
    }

    // Cords
    c2d.strokeStyle = 'rgba(200,200,220,0.3)';
    c2d.lineWidth = 0.5;
    for (var ci = 0; ci < 4; ci++) {
      var clx = capX - paraW * 0.35 + ci * (paraW * 0.7 / 3);
      c2d.beginPath();
      c2d.moveTo(clx, capY - capSz * 1.2);
      c2d.lineTo(capX, capY - capSz * 0.5);
      c2d.stroke();
    }

    // Flutter particles
    for (var pi = 0; pi < SIM.particles.length; pi++) {
      var pp = SIM.particles[pi];
      var pa = pp.life / pp.maxLife * 0.4;
      c2d.fillStyle = 'rgba(167,139,250,' + pa + ')';
      c2d.beginPath();
      c2d.arc(capX + pp.x, capY - capSz * 1.2 + pp.y, 1.5, 0, Math.PI * 2);
      c2d.fill();
    }
  }

  // Capsule body
  c2d.fillStyle = '#7e7e94';
  c2d.beginPath();
  c2d.moveTo(capX - capSz * 0.4, capY - capSz * 0.5);
  c2d.lineTo(capX + capSz * 0.4, capY - capSz * 0.5);
  c2d.lineTo(capX + capSz * 0.5, capY + capSz * 0.3);
  c2d.lineTo(capX - capSz * 0.5, capY + capSz * 0.3);
  c2d.closePath();
  c2d.fill();
  // Heat shield
  c2d.fillStyle = msn.color;
  c2d.fillRect(capX - capSz * 0.55, capY + capSz * 0.3, capSz * 1.1, capSz * 0.12);
  // Window
  c2d.fillStyle = 'rgba(160,200,255,0.5)';
  c2d.beginPath();
  c2d.arc(capX, capY - capSz * 0.15, capSz * 0.12, 0, Math.PI * 2);
  c2d.fill();

  // Force arrows during descent
  if (SIM.running) {
    var ph = getPhysics();
    var gMag = ph.grav / 15 * ch * 0.08;
    var dMag = (0.5 * Cd * ph.area * AIR_DENSITY * ph.dragMult * SIM.velocity * SIM.velocity) / (ph.mass * 15) * ch * 0.08;
    if (dMag > ch * 0.15) dMag = ch * 0.15;

    // Gravity arrow (down, red)
    var gArrY1 = capY + capSz * 0.5;
    var gArrY2 = gArrY1 + gMag;
    c2d.strokeStyle = '#ef4444'; c2d.lineWidth = 2;
    c2d.beginPath(); c2d.moveTo(capX + capSz * 0.8, gArrY1); c2d.lineTo(capX + capSz * 0.8, gArrY2); c2d.stroke();
    var ga = Math.PI / 2;
    c2d.fillStyle = '#ef4444'; c2d.beginPath();
    c2d.moveTo(capX + capSz * 0.8, gArrY2);
    c2d.lineTo(capX + capSz * 0.8 - 4, gArrY2 - 6);
    c2d.lineTo(capX + capSz * 0.8 + 4, gArrY2 - 6);
    c2d.fill();
    // Label (positioned to the right of arrow, no overlap with capsule)
    c2d.fillStyle = '#ef4444';
    c2d.font = "9px 'JetBrains Mono',monospace";
    c2d.textAlign = 'left';
    c2d.fillText('G', capX + capSz * 0.8 + 8, gArrY1 + gMag / 2);

    // Drag arrow (up, green)
    var dArrY1 = capY - capSz * 0.7;
    var dArrY2 = dArrY1 - dMag;
    if (dMag > 3) {
      c2d.strokeStyle = '#22c55e'; c2d.lineWidth = 2;
      c2d.beginPath(); c2d.moveTo(capX + capSz * 0.8, dArrY1); c2d.lineTo(capX + capSz * 0.8, dArrY2); c2d.stroke();
      c2d.fillStyle = '#22c55e'; c2d.beginPath();
      c2d.moveTo(capX + capSz * 0.8, dArrY2);
      c2d.lineTo(capX + capSz * 0.8 - 4, dArrY2 + 6);
      c2d.lineTo(capX + capSz * 0.8 + 4, dArrY2 + 6);
      c2d.fill();
      c2d.fillStyle = '#22c55e';
      c2d.textAlign = 'left';
      c2d.fillText('D', capX + capSz * 0.8 + 8, dArrY1 - dMag / 2);
    }
  }

  // Impact dust particles
  if (SIM.impactParticles.length > 0) {
    for (var ipi = SIM.impactParticles.length - 1; ipi >= 0; ipi--) {
      var ip = SIM.impactParticles[ipi];
      ip.x += ip.vx; ip.y += ip.vy;
      ip.vy += 0.15;
      ip.life--;
      var ipa = ip.life / ip.maxLife * 0.6;
      c2d.fillStyle = 'rgba(180,160,140,' + ipa + ')';
      c2d.beginPath();
      c2d.arc(capX + ip.x, groundY + ip.y, ip.r, 0, Math.PI * 2);
      c2d.fill();
      if (ip.life <= 0) SIM.impactParticles.splice(ipi, 1);
    }
  }

  // Speedometer gauge (right side)
  var gaugeX = cw * 0.88;
  var gaugeTop = ch * 0.15;
  var gaugeH = ch * 0.55;
  var gaugeW = 8;

  // Gauge background
  c2d.fillStyle = 'rgba(255,255,255,0.05)';
  c2d.fillRect(gaugeX - gaugeW / 2, gaugeTop, gaugeW, gaugeH);

  // Gauge fill (velocity mapped to gauge)
  var maxV = 50;
  var vFrac = Math.min(SIM.velocity / maxV, 1);
  var vColor = vFrac < 0.1 ? '#22c55e' : vFrac < 0.2 ? '#eab308' : '#ef4444';
  var fillH = vFrac * gaugeH;
  c2d.fillStyle = vColor;
  c2d.globalAlpha = 0.7;
  c2d.fillRect(gaugeX - gaugeW / 2, gaugeTop + gaugeH - fillH, gaugeW, fillH);
  c2d.globalAlpha = 1;

  // Gauge border
  c2d.strokeStyle = 'rgba(167,139,250,0.3)';
  c2d.lineWidth = 0.5;
  c2d.strokeRect(gaugeX - gaugeW / 2, gaugeTop, gaugeW, gaugeH);

  // Gauge labels
  c2d.fillStyle = mc.dim;
  c2d.font = "8px 'JetBrains Mono',monospace";
  c2d.textAlign = 'left';
  c2d.fillText('0', gaugeX + gaugeW, gaugeTop + gaugeH);
  c2d.fillText(maxV + '', gaugeX + gaugeW, gaugeTop + 8);
  c2d.fillText('m/s', gaugeX + gaugeW, gaugeTop + gaugeH / 2);

  // Speed threshold lines
  var th5 = gaugeTop + gaugeH - (5 / maxV) * gaugeH;
  var th10 = gaugeTop + gaugeH - (10 / maxV) * gaugeH;
  c2d.strokeStyle = '#22c55e'; c2d.lineWidth = 0.5;
  c2d.setLineDash([2, 2]);
  c2d.beginPath(); c2d.moveTo(gaugeX - gaugeW, th5); c2d.lineTo(gaugeX + gaugeW + 2, th5); c2d.stroke();
  c2d.strokeStyle = '#eab308';
  c2d.beginPath(); c2d.moveTo(gaugeX - gaugeW, th10); c2d.lineTo(gaugeX + gaugeW + 2, th10); c2d.stroke();
  c2d.setLineDash([]);

  // Altitude bar (left side)
  var altX = cw * 0.06;
  c2d.fillStyle = 'rgba(255,255,255,0.05)';
  c2d.fillRect(altX - gaugeW / 2, gaugeTop, gaugeW, gaugeH);
  var altFrac = SIM.altitude / maxAlt;
  c2d.fillStyle = ACCENT;
  c2d.globalAlpha = 0.5;
  c2d.fillRect(altX - gaugeW / 2, gaugeTop + gaugeH - altFrac * gaugeH, gaugeW, altFrac * gaugeH);
  c2d.globalAlpha = 1;
  c2d.strokeStyle = 'rgba(167,139,250,0.3)';
  c2d.lineWidth = 0.5;
  c2d.strokeRect(altX - gaugeW / 2, gaugeTop, gaugeW, gaugeH);
  c2d.fillStyle = mc.dim;
  c2d.font = "8px 'JetBrains Mono',monospace";
  c2d.textAlign = 'right';
  c2d.fillText('1000m', altX - gaugeW, gaugeTop + 8);
  c2d.fillText('0m', altX - gaugeW, gaugeTop + gaugeH);

  // Corner brackets
  if (mc.cornerBrackets) {
    var bl = Math.min(cw, ch) * 0.04;
    c2d.strokeStyle = ACCENT; c2d.lineWidth = 1.5; c2d.globalAlpha = 0.4;
    c2d.beginPath(); c2d.moveTo(8, 8+bl); c2d.lineTo(8, 8); c2d.lineTo(8+bl, 8); c2d.stroke();
    c2d.beginPath(); c2d.moveTo(cw-8-bl, 8); c2d.lineTo(cw-8, 8); c2d.lineTo(cw-8, 8+bl); c2d.stroke();
    c2d.beginPath(); c2d.moveTo(8, ch-8-bl); c2d.lineTo(8, ch-8); c2d.lineTo(8+bl, ch-8); c2d.stroke();
    c2d.beginPath(); c2d.moveTo(cw-8-bl, ch-8); c2d.lineTo(cw-8, ch-8); c2d.lineTo(cw-8, ch-8+bl); c2d.stroke();
    c2d.globalAlpha = 1;
  }

  // Mission results panel (bottom-right, compact)
  if (missionResults.length > 0) {
    var rpX = cw * 0.7;
    var rpY = ch * 0.82;
    c2d.font = "bold 8px 'JetBrains Mono',monospace";
    c2d.textAlign = 'left';
    c2d.fillStyle = mc.dim;
    c2d.fillText(t('score'), rpX, rpY);
    for (var ri = 0; ri < missionResults.length; ri++) {
      if (!missionResults[ri]) continue;
      var mr = missionResults[ri];
      var mColor = mr.rating === 'perfect' ? '#22c55e' : mr.rating === 'rough' ? '#eab308' : '#ef4444';
      c2d.fillStyle = mColor;
      c2d.font = "9px 'JetBrains Mono',monospace";
      c2d.fillText('M' + (ri + 1) + ': ' + mr.speed.toFixed(1) + ' m/s', rpX, rpY + 12 + ri * 11);
    }
  }

  // Landing result overlay
  if (SIM.finished) {
    var resultText = SIM.landingSpeed < 5 ? t('perfect') : SIM.landingSpeed < 10 ? t('rough') : t('crashed');
    var resultColor = SIM.landingSpeed < 5 ? '#22c55e' : SIM.landingSpeed < 10 ? '#eab308' : '#ef4444';
    c2d.font = "bold 18px 'Space Grotesk','Inter','Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillStyle = resultColor;
    c2d.globalAlpha = 0.9;
    c2d.fillText(resultText, cw / 2, ch * 0.4);
    c2d.font = "bold 14px 'JetBrains Mono',monospace";
    c2d.fillText(SIM.landingSpeed.toFixed(1) + ' m/s', cw / 2, ch * 0.4 + 25);
    c2d.globalAlpha = 1;
  }
}

// ================================================================
// UPDATE LOOP
// ================================================================
var animFrameId = null;
function gameLoop() {
  if (SIM.running) {
    stepPhysics();
    updateHUD();
  }
  draw();
  animFrameId = requestAnimationFrame(gameLoop);
}

function updateHUD() {
  document.getElementById('hudAlt').textContent = Math.max(0, SIM.altitude).toFixed(0) + 'm';
  document.getElementById('hudVel').textContent = SIM.velocity.toFixed(1) + ' m/s';
  document.getElementById('hudG').textContent = MISSIONS[missionIdx].gravity + ' m/s\u00b2';
  document.getElementById('hudMsn').textContent = (missionIdx + 1) + '/6';
}

function updateStatusBar() {
  var sv = document.getElementById('statusVal');
  var sr = document.getElementById('statusResult');
  if (SIM.running) {
    sv.textContent = t('descending');
    sr.textContent = '';
    sr.className = 'status-result';
  } else if (SIM.finished) {
    sv.textContent = SIM.landingSpeed.toFixed(1) + ' m/s';
    if (SIM.landingSpeed < 5) { sr.textContent = t('perfect'); sr.className = 'status-result pass'; }
    else if (SIM.landingSpeed < 10) { sr.textContent = t('rough'); sr.className = 'status-result'; sr.style.color = '#eab308'; }
    else { sr.textContent = t('crashed'); sr.className = 'status-result fail'; }
  } else {
    sv.textContent = t('ready');
    sr.textContent = '';
    sr.className = 'status-result';
  }
}

function updateMissionText() {
  var msn = MISSIONS[missionIdx];
  var txt = (msn.planet[LANG] || msn.planet.en) + ' | g = ' + msn.gravity + ' m/s\u00b2';
  document.getElementById('missionText').textContent = txt;
}

function updateParaVal() {
  var labels = [t('small'), t('medium'), t('large')];
  document.getElementById('paraVal').textContent = labels[parseInt(document.getElementById('paraSlider').value) - 1];
}

function updateCargoVal() {
  var labels = [t('light'), t('med'), t('heavy')];
  document.getElementById('cargoVal').textContent = labels[parseInt(document.getElementById('cargoSlider').value) - 1];
}

function resetSim() {
  SIM.altitude = 1000;
  SIM.velocity = 0;
  SIM.time = 0;
  SIM.trail = [];
  SIM.particles = [];
  SIM.impactParticles = [];
  SIM.running = false;
  SIM.finished = false;
  SIM.landingSpeed = 0;
  SIM.paraSize = parseInt(document.getElementById('paraSlider').value);
  SIM.cargoWeight = parseInt(document.getElementById('cargoSlider').value);
  document.getElementById('deployBtn').disabled = false;
  document.getElementById('deployBtn').textContent = t('deploy');
  document.getElementById('paraSlider').disabled = false;
  document.getElementById('cargoSlider').disabled = false;
  updateHUD();
  updateStatusBar();
}

function deployLander() {
  if (SIM.finished) {
    // Advance to next mission
    if (missionIdx < MISSIONS.length - 1) {
      missionIdx++;
      SIM.ghostTrails = [];
      resetSim();
      updateMissionText();
      return;
    } else {
      // All done -- stay on last mission, just reset
      resetSim();
      return;
    }
  }
  if (SIM.running) return;

  SIM.paraSize = parseInt(document.getElementById('paraSlider').value);
  SIM.cargoWeight = parseInt(document.getElementById('cargoSlider').value);
  SIM.altitude = 1000;
  SIM.velocity = 0;
  SIM.time = 0;
  SIM.trail = [];
  SIM.particles = [];
  SIM.impactParticles = [];
  SIM.running = true;
  SIM.finished = false;
  document.getElementById('deployBtn').disabled = true;
  document.getElementById('paraSlider').disabled = true;
  document.getElementById('cargoSlider').disabled = true;
  updateStatusBar();
}

function fullReset() {
  missionIdx = 0;
  missionResults = [];
  SIM.ghostTrails = [];
  resetSim();
  updateMissionText();
}

// ================================================================
// INIT
// ================================================================
function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  initStars();

  resizeCanvas();
  window.addEventListener('resize', function() { resizeCanvas(); });

  // Slider events
  document.getElementById('paraSlider').addEventListener('input', function() {
    SIM.paraSize = parseInt(this.value);
    updateParaVal();
  });
  document.getElementById('cargoSlider').addEventListener('input', function() {
    SIM.cargoWeight = parseInt(this.value);
    updateCargoVal();
  });

  // Buttons
  document.getElementById('deployBtn').addEventListener('click', deployLander);
  document.getElementById('resetBtn').addEventListener('click', fullReset);

  refreshI18N();
  updateHUD();
  updateMissionText();
  updateStatusBar();

  // Delayed resize for layout settle
  setTimeout(resizeCanvas, 200);
  setTimeout(resizeCanvas, 600);

  gameLoop();
}

function onModeChange() {
  // Redraw handled by gameLoop
}

init();
</script>
