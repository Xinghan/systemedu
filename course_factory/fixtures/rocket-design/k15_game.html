<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.plane-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:6px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:3px;text-align:left;transition:all 0.2s;}
.plane-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.plane-btn.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(167,139,250,0.1);}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">FLIGHT LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="planeLabel">SELECT PLANE</div>
    <button class="plane-btn active" id="btnDart" data-plane="dart">DART</button>
    <button class="plane-btn" id="btnGlider" data-plane="glider">GLIDER</button>
    <button class="plane-btn" id="btnWide" data-plane="wide">WIDE WING</button>
    <div class="sidebar-divider"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">FLIGHT DATA LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">PLANE</div><div class="hud-val" id="hudV1">DART</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">TRIAL</div><div class="hud-val" id="hudV2">0/3</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">FLIGHTS</div><div class="hud-val" id="hudV3">0/9</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">PHASE</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">CLICK & DRAG TO AIM</span>
      <span class="status-val" id="statusDist"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'FLIGHT DATA LAB', cn:'\u98de\u884c\u6570\u636e\u5b9e\u9a8c\u5ba4'},
  subtitle:  {en:'Measure, Record, Compare', cn:'\u6d4b\u91cf\u3001\u8bb0\u5f55\u3001\u6bd4\u8f83'},
  guide:     {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideTxt:  {en:'Select a plane type, then click & drag on the launch pad to aim. Release to launch. Complete 3 trials per plane (9 total). A chart will show which plane wins!',
              cn:'\u9009\u62e9\u98de\u673a\u7c7b\u578b\uff0c\u5728\u53d1\u5c04\u53f0\u70b9\u51fb\u62d6\u62fd\u7784\u51c6\u3002\u677e\u624b\u53d1\u5c04\u3002\u6bcf\u79cd\u98de\u673a\u5b8c\u62103\u6b21\u8bd5\u98de\uff08\u51719\u6b21\uff09\u3002\u6700\u540e\u770b\u56fe\u8868\u5206\u6790\u54ea\u79cd\u98de\u673a\u6700\u597d\uff01'},
  selectPlane: {en:'SELECT PLANE', cn:'\u9009\u62e9\u98de\u673a'},
  dart:      {en:'DART', cn:'\u98de\u9556'},
  glider:    {en:'GLIDER', cn:'\u6ed1\u7fd4\u673a'},
  wide:      {en:'WIDE WING', cn:'\u5bbd\u7ffc'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  plane:     {en:'PLANE', cn:'\u98de\u673a'},
  trial:     {en:'TRIAL', cn:'\u8bd5\u98de'},
  flights:   {en:'FLIGHTS', cn:'\u98de\u884c'},
  phase:     {en:'PHASE', cn:'\u9636\u6bb5'},
  aimDrag:   {en:'CLICK & DRAG TO AIM', cn:'\u70b9\u51fb\u62d6\u62fd\u7784\u51c6'},
  charging:  {en:'HOLD TO CHARGE POWER', cn:'\u6301\u7eed\u6309\u4f4f\u84c4\u529b'},
  flying:    {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  landed:    {en:'LANDED!', cn:'\u843d\u5730\uff01'},
  complete:  {en:'ALL FLIGHTS COMPLETE!', cn:'\u6240\u6709\u98de\u884c\u5b8c\u6210\uff01'},
  best:      {en:'BEST:', cn:'\u6700\u4f73:'},
  distance:  {en:'DIST', cn:'\u8ddd\u79bb'},
  time:      {en:'TIME', cn:'\u65f6\u95f4'},
  avg:       {en:'AVG', cn:'\u5e73\u5747'},
  dataPhase: {en:'TESTING', cn:'\u6d4b\u8bd5\u4e2d'},
  chartPhase:{en:'RESULTS', cn:'\u7ed3\u679c'},
  freePhase: {en:'FREE FLY', cn:'\u81ea\u7531\u98de\u884c'},
  winner:    {en:'WINNER', cn:'\u80dc\u51fa'},
  freeTip:   {en:'FREE FLIGHTS: verify your results!', cn:'\u81ea\u7531\u98de\u884c\uff1a\u9a8c\u8bc1\u4f60\u7684\u7ed3\u679c\uff01'},
  freeLeft:  {en:'FREE LEFT', cn:'\u5269\u4f59'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideTxt');
  document.getElementById('planeLabel').textContent = t('selectPlane');
  document.getElementById('btnDart').textContent = t('dart');
  document.getElementById('btnGlider').textContent = t('glider');
  document.getElementById('btnWide').textContent = t('wide');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('plane');
  document.getElementById('hudL2').textContent = t('trial');
  document.getElementById('hudL3').textContent = t('flights');
  document.getElementById('hudL4').textContent = t('phase');
  updateHUD();
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, c2d, cw = 0, ch = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

var PLANE_TYPES = {
  dart:   {drag:0.012, lift:0.6, speedMul:1.15, color:'#a78bfa', colorDim:'rgba(167,139,250,0.5)'},
  glider: {drag:0.008, lift:1.0, speedMul:0.85, color:'#22c55e', colorDim:'rgba(34,197,94,0.5)'},
  wide:   {drag:0.015, lift:0.85, speedMul:0.95, color:'#fbbf24', colorDim:'rgba(251,191,36,0.5)'},
};
var PLANE_ORDER = ['dart','glider','wide'];

var currentPlane = 'dart';
var gamePhase = 'data'; // 'data', 'chart', 'free'
var flightData = { dart:[], glider:[], wide:[] };
var totalFlights = 0;
var freeFlightsLeft = 3;

// Launch state
var launchPadX = 0, launchPadY = 0, launchPadR = 0;
var isDragging = false;
var aimAngle = -Math.PI / 4;
var powerLevel = 0;
var isCharging = false;
var chargeStart = 0;

// Flight sim state
var simRunning = false;
var simPlane = null; // {x,y,vx,vy,trail:[],type,startTime}
var simStartTime = 0;
var simLandedTime = 0;
var simShowResult = false;

// Stars for background
var bgStars = [];
for (var bsi = 0; bsi < 80; bsi++) {
  bgStars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.0 + 0.3, b: Math.random() * 0.5 + 0.5 });
}

// ================================================================
// INIT
// ================================================================
function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  // Plane buttons
  document.querySelectorAll('.plane-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (simRunning) return;
      var pType = btn.dataset.plane;
      if (gamePhase === 'data' && flightData[pType].length >= 3) return;
      currentPlane = pType;
      document.querySelectorAll('.plane-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      updateHUD();
    });
  });

  // Reset button
  document.getElementById('btnReset').addEventListener('click', resetGame);

  // Canvas events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('mouseleave', onMouseUp);
  canvas.addEventListener('touchstart', onTouchStart, {passive:false});
  canvas.addEventListener('touchmove', onTouchMove, {passive:false});
  canvas.addEventListener('touchend', onTouchEnd);

  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 400);
  document.fonts.ready.then(resizeCanvas);

  requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
  var wrap = canvas.parentElement;
  var rect = wrap.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  cw = rect.width; ch = rect.height;
  canvas.width = cw * DPR; canvas.height = ch * DPR;
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
  c2d.setTransform(DPR, 0, 0, DPR, 0, 0);
  // Update launch pad position
  launchPadX = cw * 0.08;
  launchPadY = ch * 0.72;
  launchPadR = Math.min(cw, ch) * 0.05;
}

function resetGame() {
  flightData = { dart:[], glider:[], wide:[] };
  totalFlights = 0;
  freeFlightsLeft = 3;
  gamePhase = 'data';
  simRunning = false;
  simPlane = null;
  simShowResult = false;
  currentPlane = 'dart';
  document.querySelectorAll('.plane-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('btnDart').classList.add('active');
  updateHUD();
  setStatus(t('aimDrag'), '', '');
}

// ================================================================
// INPUT HANDLING
// ================================================================
function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function isOnLaunchPad(pos) {
  var dx = pos.x - launchPadX, dy = pos.y - launchPadY;
  return (dx * dx + dy * dy) <= (launchPadR * 2.5) * (launchPadR * 2.5);
}

function onMouseDown(e) {
  if (simRunning) return;
  var pos = getCanvasPos(e);
  if (isOnLaunchPad(pos) && canLaunch()) {
    isDragging = true;
    isCharging = false;
    updateAim(pos);
  }
}

function onMouseMove(e) {
  if (!isDragging) return;
  var pos = getCanvasPos(e);
  updateAim(pos);
}

function onMouseUp(e) {
  if (!isDragging) return;
  isDragging = false;
  if (isCharging) {
    var elapsed = (Date.now() - chargeStart) / 1000;
    powerLevel = Math.min(elapsed / 1.5, 1.0);
    isCharging = false;
    launchPlane();
  } else {
    // Start charging
    isCharging = true;
    chargeStart = Date.now();
    setStatus(t('charging'), '', '');
    // Auto launch after brief hold -- actually just launch immediately for simplicity
    powerLevel = 0.5 + Math.random() * 0.3;
    isCharging = false;
    launchPlane();
  }
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length > 0) {
    var touch = e.touches[0];
    onMouseDown({clientX: touch.clientX, clientY: touch.clientY});
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length > 0) {
    var touch = e.touches[0];
    onMouseMove({clientX: touch.clientX, clientY: touch.clientY});
  }
}
function onTouchEnd(e) {
  onMouseUp({});
}

function updateAim(pos) {
  var dx = pos.x - launchPadX;
  var dy = pos.y - launchPadY;
  aimAngle = Math.atan2(dy, dx);
  // Clamp to upper-right quadrant
  if (aimAngle > -0.05) aimAngle = -0.05;
  if (aimAngle < -Math.PI * 0.48) aimAngle = -Math.PI * 0.48;
  // Power from drag distance
  var dist = Math.sqrt(dx * dx + dy * dy);
  powerLevel = Math.min(dist / (cw * 0.2), 1.0);
}

function canLaunch() {
  if (gamePhase === 'data') {
    return flightData[currentPlane].length < 3;
  }
  if (gamePhase === 'free') {
    return freeFlightsLeft > 0;
  }
  return false;
}

// ================================================================
// FLIGHT PHYSICS
// ================================================================
function launchPlane() {
  if (!canLaunch()) return;

  var pt = PLANE_TYPES[currentPlane];
  var baseSpeed = (3 + powerLevel * 5) * pt.speedMul;
  var vx = Math.cos(aimAngle) * baseSpeed;
  var vy = Math.sin(aimAngle) * baseSpeed;

  simPlane = {
    x: launchPadX,
    y: launchPadY,
    vx: vx,
    vy: vy,
    trail: [{x: launchPadX, y: launchPadY}],
    planeType: currentPlane,
    startTime: Date.now(),
    landed: false,
    landX: 0,
    flightTime: 0,
    flightDist: 0,
  };
  simRunning = true;
  simShowResult = false;
  setStatus(t('flying'), '', '');
}

function updateSim(dt) {
  if (!simPlane || simPlane.landed) return;

  var pt = PLANE_TYPES[simPlane.planeType];
  var gravity = 0.15;
  var groundY = ch * 0.72;

  // Physics step
  var speed = Math.sqrt(simPlane.vx * simPlane.vx + simPlane.vy * simPlane.vy);
  var dragForce = pt.drag * speed * speed;
  var liftForce = pt.lift * speed * 0.04;

  if (speed > 0.01) {
    simPlane.vx -= (simPlane.vx / speed) * dragForce * dt;
    simPlane.vy -= (simPlane.vy / speed) * dragForce * dt;
  }
  simPlane.vy += gravity * dt;
  simPlane.vy -= liftForce * dt;

  simPlane.x += simPlane.vx * dt * 60;
  simPlane.y += simPlane.vy * dt * 60;

  // Trail
  simPlane.trail.push({x: simPlane.x, y: simPlane.y});
  if (simPlane.trail.length > 300) simPlane.trail.shift();

  // Landing check
  if (simPlane.y >= groundY && simPlane.trail.length > 5) {
    simPlane.y = groundY;
    simPlane.landed = true;
    simPlane.landX = simPlane.x;
    simPlane.flightTime = (Date.now() - simPlane.startTime) / 1000;
    // Distance in "meters" -- scale canvas pixels to meters
    var pixelDist = simPlane.landX - launchPadX;
    simPlane.flightDist = Math.max(0, pixelDist / (cw * 0.08));
    simPlane.flightDist = Math.round(simPlane.flightDist * 10) / 10;
    simPlane.flightTime = Math.round(simPlane.flightTime * 100) / 100;

    simLandedTime = Date.now();
    simShowResult = true;

    // Record data
    if (gamePhase === 'data') {
      flightData[simPlane.planeType].push({
        dist: simPlane.flightDist,
        time: simPlane.flightTime,
      });
      totalFlights++;
    } else if (gamePhase === 'free') {
      freeFlightsLeft--;
    }

    setStatus(t('landed'), simPlane.flightDist + 'm / ' + simPlane.flightTime + 's', '');
    updateHUD();

    // Check if all data flights done
    if (gamePhase === 'data' && totalFlights >= 9) {
      setTimeout(function() {
        gamePhase = 'chart';
        updateHUD();
      }, 1500);
    }

    // Auto clear after delay
    setTimeout(function() {
      simRunning = false;
      simPlane = null;
      simShowResult = false;
      if (gamePhase === 'data') {
        // Auto switch to next plane if current is done
        if (flightData[currentPlane].length >= 3) {
          for (var pi = 0; pi < PLANE_ORDER.length; pi++) {
            if (flightData[PLANE_ORDER[pi]].length < 3) {
              currentPlane = PLANE_ORDER[pi];
              document.querySelectorAll('.plane-btn').forEach(function(b){ b.classList.remove('active'); });
              document.querySelector('[data-plane="' + currentPlane + '"]').classList.add('active');
              break;
            }
          }
        }
        setStatus(t('aimDrag'), '', '');
      } else if (gamePhase === 'chart') {
        setStatus(t('complete'), '', '');
        // Enable free flights after viewing chart
        setTimeout(function() {
          gamePhase = 'free';
          setStatus(t('freeTip'), '', '');
          updateHUD();
        }, 3000);
      } else if (gamePhase === 'free') {
        if (freeFlightsLeft > 0) {
          setStatus(t('freeTip'), '', '');
        } else {
          setStatus(t('complete'), '', '');
        }
      }
      updateHUD();
    }, 2000);
  }

  // Off-screen check
  if (simPlane && !simPlane.landed && (simPlane.x > cw * 1.1 || simPlane.y > ch * 1.1)) {
    simPlane.y = groundY;
    simPlane.landed = true;
    simPlane.landX = Math.min(simPlane.x, cw * 0.95);
    simPlane.flightTime = (Date.now() - simPlane.startTime) / 1000;
    simPlane.flightDist = Math.max(0, (simPlane.landX - launchPadX) / (cw * 0.08));
    simPlane.flightDist = Math.round(simPlane.flightDist * 10) / 10;
    simPlane.flightTime = Math.round(simPlane.flightTime * 100) / 100;
    simLandedTime = Date.now();
    simShowResult = true;
    if (gamePhase === 'data') {
      flightData[simPlane.planeType].push({ dist: simPlane.flightDist, time: simPlane.flightTime });
      totalFlights++;
    } else if (gamePhase === 'free') { freeFlightsLeft--; }
    setStatus(t('landed'), simPlane.flightDist + 'm / ' + simPlane.flightTime + 's', '');
    updateHUD();
  }
}

// ================================================================
// HUD / STATUS
// ================================================================
function updateHUD() {
  var planeNames = {dart: t('dart'), glider: t('glider'), wide: t('wide')};
  document.getElementById('hudV1').textContent = planeNames[currentPlane] || currentPlane.toUpperCase();
  var trialCount = gamePhase === 'free' ? (3 - freeFlightsLeft) + '/3' : (flightData[currentPlane].length + '/3');
  document.getElementById('hudV2').textContent = trialCount;
  document.getElementById('hudV3').textContent = totalFlights + '/9';
  var phaseNames = {data: t('dataPhase'), chart: t('chartPhase'), free: t('freePhase')};
  document.getElementById('hudV4').textContent = phaseNames[gamePhase] || '--';
}

function setStatus(label, val, result) {
  document.getElementById('statusLabel').textContent = label;
  document.getElementById('statusDist').textContent = val;
  var rEl = document.getElementById('statusResult');
  rEl.textContent = result;
  rEl.className = 'status-result';
}

// ================================================================
// DRAWING
// ================================================================
var lastTime = 0;
function gameLoop(ts) {
  var dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0.016;
  lastTime = ts;

  if (!c2d || !isFinite(cw) || !isFinite(ch)) { requestAnimationFrame(gameLoop); return; }

  // Update sim
  if (simRunning && simPlane && !simPlane.landed) {
    updateSim(dt);
  }

  // Draw
  draw();

  requestAnimationFrame(gameLoop);
}

function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;

  // Background
  drawGameBg(c2d, cw, ch);

  // Stars
  var mc = gameModeColors();
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var blink = 0.4 + 0.6 * Math.abs(Math.sin(Date.now() * 0.001 + i * 1.7));
    c2d.globalAlpha = s.b * blink * (GAME_MODE === 'light' ? 0.12 : 0.5);
    c2d.fillStyle = GAME_MODE === 'light' ? '#334155' : '#e2e8f0';
    c2d.beginPath(); c2d.arc(s.x * cw, s.y * ch * 0.6, s.r, 0, Math.PI * 2); c2d.fill();
  }
  c2d.globalAlpha = 1;

  // Nebula glow
  if (GAME_MODE !== 'light') {
    var ng = c2d.createRadialGradient(cw * 0.6, ch * 0.2, 0, cw * 0.6, ch * 0.2, cw * 0.4);
    ng.addColorStop(0, 'rgba(167,139,250,0.05)');
    ng.addColorStop(1, 'transparent');
    c2d.fillStyle = ng; c2d.fillRect(0, 0, cw, ch);
  }

  var groundY = ch * 0.72;

  // Ground line with measuring grid
  drawGround(groundY);

  // Data table (right side)
  if (gamePhase === 'data' || gamePhase === 'free') {
    drawDataTable(groundY);
  }

  // Chart phase
  if (gamePhase === 'chart' || gamePhase === 'free') {
    drawBarChart();
  }

  // Launch pad
  drawLaunchPad(groundY);

  // Aim line
  if (isDragging && !simRunning) {
    drawAimLine();
  }

  // Flying plane + trail
  if (simPlane) {
    drawFlightTrail();
    drawPlane(simPlane.x, simPlane.y, simPlane.vx, simPlane.vy, simPlane.planeType);

    // Landing marker
    if (simPlane.landed && simShowResult) {
      drawLandingMarker(simPlane.landX, groundY, simPlane.flightDist, simPlane.flightTime);
    }
  }

  // Free flights indicator
  if (gamePhase === 'free') {
    c2d.font = "bold 11px 'JetBrains Mono',monospace";
    c2d.fillStyle = '#fbbf24';
    c2d.textAlign = 'left'; c2d.textBaseline = 'top';
    c2d.fillText(t('freeLeft') + ': ' + freeFlightsLeft, 20, 20);
  }
}

function drawGround(groundY) {
  var mc = gameModeColors();

  // Ground line
  c2d.strokeStyle = mc.accent;
  c2d.lineWidth = 1.5;
  c2d.globalAlpha = 0.5;
  c2d.beginPath();
  c2d.moveTo(0, groundY);
  c2d.lineTo(cw, groundY);
  c2d.stroke();
  c2d.globalAlpha = 1;

  // Measuring grid below ground
  c2d.strokeStyle = mc.strokeDim;
  c2d.lineWidth = 0.5;
  var meterPx = cw * 0.08;
  for (var m = 0; m < 15; m++) {
    var mx = launchPadX + m * meterPx;
    if (mx > cw) break;
    var isMajor = m % 5 === 0;
    c2d.globalAlpha = isMajor ? 0.4 : 0.15;
    c2d.beginPath();
    c2d.moveTo(mx, groundY);
    c2d.lineTo(mx, groundY + (isMajor ? 18 : 10));
    c2d.stroke();
    if (isMajor && m > 0) {
      c2d.globalAlpha = 0.3;
      c2d.font = "9px 'JetBrains Mono',monospace";
      c2d.fillStyle = mc.dim;
      c2d.textAlign = 'center'; c2d.textBaseline = 'top';
      c2d.fillText(m + 'm', mx, groundY + 20);
    }
  }
  c2d.globalAlpha = 1;
}

function drawLaunchPad(groundY) {
  var mc = gameModeColors();
  var pt = PLANE_TYPES[currentPlane];

  // Platform
  c2d.fillStyle = 'rgba(167,139,250,0.1)';
  c2d.fillRect(launchPadX - 20, groundY - 4, 40, 4);
  c2d.strokeStyle = pt.color;
  c2d.lineWidth = 1;
  c2d.strokeRect(launchPadX - 20, groundY - 4, 40, 4);

  // Circular launch zone
  c2d.beginPath();
  c2d.arc(launchPadX, launchPadY, launchPadR, 0, Math.PI * 2);
  c2d.fillStyle = 'rgba(167,139,250,0.08)';
  c2d.fill();
  c2d.strokeStyle = pt.color;
  c2d.lineWidth = 1.5;
  c2d.globalAlpha = 0.6;
  c2d.stroke();
  c2d.globalAlpha = 1;

  // Cross hair
  c2d.strokeStyle = pt.color;
  c2d.lineWidth = 0.5;
  c2d.globalAlpha = 0.4;
  c2d.beginPath();
  c2d.moveTo(launchPadX - launchPadR * 0.6, launchPadY);
  c2d.lineTo(launchPadX + launchPadR * 0.6, launchPadY);
  c2d.stroke();
  c2d.beginPath();
  c2d.moveTo(launchPadX, launchPadY - launchPadR * 0.6);
  c2d.lineTo(launchPadX, launchPadY + launchPadR * 0.6);
  c2d.stroke();
  c2d.globalAlpha = 1;

  // Resting plane on pad (if not flying)
  if (!simRunning) {
    drawPlane(launchPadX + 10, launchPadY - 8, 1, 0, currentPlane);
  }
}

function drawAimLine() {
  var pt = PLANE_TYPES[currentPlane];
  var lineLen = 40 + powerLevel * 120;

  // Aim line
  c2d.strokeStyle = pt.color;
  c2d.lineWidth = 1.5;
  c2d.globalAlpha = 0.7;
  c2d.setLineDash([6, 4]);
  c2d.beginPath();
  c2d.moveTo(launchPadX, launchPadY);
  c2d.lineTo(launchPadX + Math.cos(aimAngle) * lineLen, launchPadY + Math.sin(aimAngle) * lineLen);
  c2d.stroke();
  c2d.setLineDash([]);
  c2d.globalAlpha = 1;

  // Arrow head
  var ax = launchPadX + Math.cos(aimAngle) * lineLen;
  var ay = launchPadY + Math.sin(aimAngle) * lineLen;
  c2d.fillStyle = pt.color;
  c2d.beginPath();
  c2d.moveTo(ax, ay);
  c2d.lineTo(ax - 8 * Math.cos(aimAngle - 0.4), ay - 8 * Math.sin(aimAngle - 0.4));
  c2d.lineTo(ax - 8 * Math.cos(aimAngle + 0.4), ay - 8 * Math.sin(aimAngle + 0.4));
  c2d.fill();

  // Power bar
  var barX = launchPadX + 30, barY = launchPadY + 20, barW = 60, barH = 6;
  c2d.fillStyle = 'rgba(255,255,255,0.05)';
  c2d.fillRect(barX, barY, barW, barH);
  c2d.strokeStyle = 'rgba(255,255,255,0.2)';
  c2d.lineWidth = 0.5;
  c2d.strokeRect(barX, barY, barW, barH);
  // Fill
  var fillColor = powerLevel < 0.5 ? '#22c55e' : (powerLevel < 0.8 ? '#fbbf24' : '#ef4444');
  c2d.fillStyle = fillColor;
  c2d.fillRect(barX, barY, barW * powerLevel, barH);
  // Label
  c2d.font = "8px 'JetBrains Mono',monospace";
  c2d.fillStyle = 'rgba(255,255,255,0.5)';
  c2d.textAlign = 'left'; c2d.textBaseline = 'top';
  c2d.fillText('PWR', barX, barY + barH + 2);

  // Angle display
  var angleDeg = Math.round(-aimAngle * 180 / Math.PI);
  c2d.font = "9px 'JetBrains Mono',monospace";
  c2d.fillStyle = pt.color;
  c2d.textAlign = 'left'; c2d.textBaseline = 'bottom';
  c2d.fillText(angleDeg + '\u00b0', launchPadX + 25, launchPadY - 5);
}

function drawPlane(px, py, vx, vy, planeType) {
  var pt = PLANE_TYPES[planeType];
  var angle = Math.atan2(vy, vx);

  c2d.save();
  c2d.translate(px, py);
  c2d.rotate(angle);

  var sc = planeType === 'wide' ? 1.3 : (planeType === 'glider' ? 1.1 : 1.0);
  c2d.scale(sc, sc);

  c2d.beginPath();
  if (planeType === 'dart') {
    c2d.moveTo(16, 0);
    c2d.lineTo(-8, -5);
    c2d.lineTo(-4, 0);
    c2d.lineTo(-8, 5);
  } else if (planeType === 'glider') {
    c2d.moveTo(14, 0);
    c2d.lineTo(-6, -8);
    c2d.lineTo(-2, -2);
    c2d.lineTo(-10, -2);
    c2d.lineTo(-10, 2);
    c2d.lineTo(-2, 2);
    c2d.lineTo(-6, 8);
  } else {
    c2d.moveTo(12, 0);
    c2d.lineTo(-4, -10);
    c2d.lineTo(-2, -3);
    c2d.lineTo(-8, -3);
    c2d.lineTo(-8, 3);
    c2d.lineTo(-2, 3);
    c2d.lineTo(-4, 10);
  }
  c2d.closePath();
  c2d.fillStyle = pt.color;
  c2d.fill();
  c2d.strokeStyle = 'rgba(255,255,255,0.4)';
  c2d.lineWidth = 0.8;
  c2d.stroke();
  // Fold line
  c2d.beginPath();
  c2d.moveTo(planeType === 'dart' ? 16 : 14, 0);
  c2d.lineTo(-4, 0);
  c2d.strokeStyle = 'rgba(255,255,255,0.25)';
  c2d.lineWidth = 0.5;
  c2d.stroke();

  c2d.restore();
}

function drawFlightTrail() {
  if (!simPlane || simPlane.trail.length < 2) return;
  var pt = PLANE_TYPES[simPlane.planeType];
  var trail = simPlane.trail;
  var len = trail.length;

  c2d.lineWidth = 1;
  for (var ti = 1; ti < len; ti++) {
    var alpha = ti / len * 0.5;
    c2d.strokeStyle = pt.color;
    c2d.globalAlpha = alpha;
    c2d.beginPath();
    c2d.moveTo(trail[ti - 1].x, trail[ti - 1].y);
    c2d.lineTo(trail[ti].x, trail[ti].y);
    c2d.stroke();
  }
  c2d.globalAlpha = 1;
}

function drawLandingMarker(lx, gy, dist, time) {
  // Vertical landing line
  c2d.setLineDash([4, 3]);
  c2d.strokeStyle = '#ef4444';
  c2d.lineWidth = 1;
  c2d.globalAlpha = 0.6;
  c2d.beginPath();
  c2d.moveTo(lx, gy - 20);
  c2d.lineTo(lx, gy + 10);
  c2d.stroke();
  c2d.setLineDash([]);
  c2d.globalAlpha = 1;

  // Landing dot
  c2d.beginPath();
  c2d.arc(lx, gy, 4, 0, Math.PI * 2);
  c2d.fillStyle = '#ef4444';
  c2d.fill();

  // Distance measurement line
  c2d.setLineDash([3, 3]);
  c2d.strokeStyle = '#fbbf24';
  c2d.lineWidth = 1;
  c2d.globalAlpha = 0.5;
  c2d.beginPath();
  c2d.moveTo(launchPadX, gy + 30);
  c2d.lineTo(lx, gy + 30);
  c2d.stroke();
  c2d.setLineDash([]);
  c2d.globalAlpha = 1;

  // Measurement label
  var pulse = 0.8 + 0.2 * Math.sin(Date.now() * 0.005);
  c2d.globalAlpha = pulse;
  c2d.font = "bold 12px 'JetBrains Mono',monospace";
  c2d.fillStyle = '#fbbf24';
  c2d.textAlign = 'center'; c2d.textBaseline = 'top';
  c2d.fillText(dist + 'm', (launchPadX + lx) / 2, gy + 34);

  c2d.font = "10px 'JetBrains Mono',monospace";
  c2d.fillStyle = '#a78bfa';
  c2d.fillText(time + 's', (launchPadX + lx) / 2, gy + 50);
  c2d.globalAlpha = 1;
}

function drawDataTable(groundY) {
  var mc = gameModeColors();
  var tableX = cw * 0.55;
  var tableY = 16;
  var colW = 62;
  var rowH = 16;
  var cols = [t('plane'), '#', t('distance'), t('time')];
  var totalW = colW * cols.length;

  // Clamp table width
  if (tableX + totalW > cw - 10) tableX = cw - totalW - 10;

  // Header
  c2d.fillStyle = 'rgba(167,139,250,0.15)';
  c2d.fillRect(tableX, tableY, totalW, rowH);
  c2d.strokeStyle = 'rgba(167,139,250,0.3)';
  c2d.lineWidth = 0.5;
  c2d.strokeRect(tableX, tableY, totalW, rowH);

  c2d.font = "bold 8px 'JetBrains Mono',monospace";
  c2d.fillStyle = '#a78bfa';
  c2d.textAlign = 'center'; c2d.textBaseline = 'middle';
  for (var ci = 0; ci < cols.length; ci++) {
    c2d.fillText(cols[ci], tableX + colW * ci + colW / 2, tableY + rowH / 2);
  }

  // Data rows
  var row = 0;
  var planeNames = {dart: t('dart'), glider: t('glider'), wide: t('wide')};
  for (var pi = 0; pi < PLANE_ORDER.length; pi++) {
    var pKey = PLANE_ORDER[pi];
    var pts = PLANE_TYPES[pKey];
    var data = flightData[pKey];
    for (var di = 0; di < data.length; di++) {
      var ry = tableY + rowH * (row + 1);
      c2d.fillStyle = row % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.01)';
      c2d.fillRect(tableX, ry, totalW, rowH);
      c2d.strokeStyle = 'rgba(167,139,250,0.1)';
      c2d.lineWidth = 0.3;
      c2d.strokeRect(tableX, ry, totalW, rowH);

      c2d.font = "8px 'JetBrains Mono',monospace";
      c2d.fillStyle = pts.color;
      c2d.textAlign = 'center'; c2d.textBaseline = 'middle';
      c2d.fillText(planeNames[pKey], tableX + colW * 0 + colW / 2, ry + rowH / 2);
      c2d.fillStyle = mc.text;
      c2d.fillText((di + 1).toString(), tableX + colW * 1 + colW / 2, ry + rowH / 2);
      c2d.fillText(data[di].dist.toFixed(1), tableX + colW * 2 + colW / 2, ry + rowH / 2);
      c2d.fillText(data[di].time.toFixed(2), tableX + colW * 3 + colW / 2, ry + rowH / 2);
      row++;
    }
    // Average row for completed plane
    if (data.length === 3) {
      var avgDist = (data[0].dist + data[1].dist + data[2].dist) / 3;
      var avgTime = (data[0].time + data[1].time + data[2].time) / 3;
      var ry = tableY + rowH * (row + 1);
      c2d.fillStyle = 'rgba(251,191,36,0.08)';
      c2d.fillRect(tableX, ry, totalW, rowH);
      c2d.strokeStyle = 'rgba(251,191,36,0.2)';
      c2d.lineWidth = 0.5;
      c2d.strokeRect(tableX, ry, totalW, rowH);

      c2d.font = "bold 8px 'JetBrains Mono',monospace";
      c2d.fillStyle = '#fbbf24';
      c2d.textAlign = 'center'; c2d.textBaseline = 'middle';
      c2d.fillText(t('avg'), tableX + colW * 0 + colW / 2, ry + rowH / 2);
      c2d.fillText('--', tableX + colW * 1 + colW / 2, ry + rowH / 2);
      c2d.fillText(avgDist.toFixed(1), tableX + colW * 2 + colW / 2, ry + rowH / 2);
      c2d.fillText(avgTime.toFixed(2), tableX + colW * 3 + colW / 2, ry + rowH / 2);
      row++;
    }
  }

  // Column separators
  c2d.strokeStyle = 'rgba(167,139,250,0.08)';
  c2d.lineWidth = 0.3;
  for (var si = 1; si < cols.length; si++) {
    c2d.beginPath();
    c2d.moveTo(tableX + colW * si, tableY);
    c2d.lineTo(tableX + colW * si, tableY + rowH * (row + 1));
    c2d.stroke();
  }
}

function drawBarChart() {
  var mc = gameModeColors();
  // Compute averages
  var avgs = {};
  var maxDist = 0;
  var bestPlane = '';
  var bestDist = 0;

  for (var pi = 0; pi < PLANE_ORDER.length; pi++) {
    var pKey = PLANE_ORDER[pi];
    var data = flightData[pKey];
    if (data.length === 0) continue;
    var sum = 0, minD = Infinity, maxD = 0;
    for (var di = 0; di < data.length; di++) {
      sum += data[di].dist;
      if (data[di].dist < minD) minD = data[di].dist;
      if (data[di].dist > maxD) maxD = data[di].dist;
    }
    var avg = sum / data.length;
    avgs[pKey] = { avg: avg, min: minD, max: maxD };
    if (avg > maxDist) maxDist = avg;
    if (avg > bestDist) { bestDist = avg; bestPlane = pKey; }
  }

  if (maxDist === 0) return;

  // Chart area
  var chartX = cw * 0.15;
  var chartY = ch * 0.1;
  var chartW = cw * 0.35;
  var chartH = ch * 0.5;
  var barW = chartW / 5;
  var planeNames = {dart: t('dart'), glider: t('glider'), wide: t('wide')};

  // Chart background
  c2d.fillStyle = 'rgba(167,139,250,0.04)';
  c2d.fillRect(chartX, chartY, chartW, chartH);
  c2d.strokeStyle = 'rgba(167,139,250,0.15)';
  c2d.lineWidth = 0.5;
  c2d.strokeRect(chartX, chartY, chartW, chartH);

  // Title
  c2d.font = "bold 11px 'JetBrains Mono',monospace";
  c2d.fillStyle = '#a78bfa';
  c2d.textAlign = 'center'; c2d.textBaseline = 'bottom';
  c2d.fillText(t('avg') + ' ' + t('distance') + ' (m)', chartX + chartW / 2, chartY - 6);

  // Horizontal grid lines
  var gridCount = 5;
  for (var gi = 0; gi <= gridCount; gi++) {
    var gy = chartY + chartH - (gi / gridCount) * chartH;
    c2d.strokeStyle = 'rgba(167,139,250,0.08)';
    c2d.lineWidth = 0.5;
    c2d.beginPath();
    c2d.moveTo(chartX, gy);
    c2d.lineTo(chartX + chartW, gy);
    c2d.stroke();
    // Scale label
    var val = (gi / gridCount) * maxDist * 1.2;
    c2d.font = "8px 'JetBrains Mono',monospace";
    c2d.fillStyle = mc.dim;
    c2d.textAlign = 'right'; c2d.textBaseline = 'middle';
    c2d.fillText(val.toFixed(1), chartX - 5, gy);
  }

  // Bars
  for (var bi = 0; bi < PLANE_ORDER.length; bi++) {
    var bKey = PLANE_ORDER[bi];
    if (!avgs[bKey]) continue;
    var bpt = PLANE_TYPES[bKey];
    var bx = chartX + (bi + 0.5) * (chartW / 3) - barW / 2;
    var barHeight = (avgs[bKey].avg / (maxDist * 1.2)) * chartH;
    var by = chartY + chartH - barHeight;

    // Bar fill
    var barGrad = c2d.createLinearGradient(bx, by, bx, chartY + chartH);
    barGrad.addColorStop(0, bpt.color);
    barGrad.addColorStop(1, bpt.colorDim);
    c2d.fillStyle = barGrad;
    c2d.fillRect(bx, by, barW, barHeight);

    // Glow
    if (GAME_MODE === 'cyberpunk') {
      c2d.shadowColor = bpt.color;
      c2d.shadowBlur = 8;
      c2d.fillRect(bx, by, barW, barHeight);
      c2d.shadowBlur = 0;
    }

    // Error bars (min-max range)
    var minH = (avgs[bKey].min / (maxDist * 1.2)) * chartH;
    var maxH = (avgs[bKey].max / (maxDist * 1.2)) * chartH;
    var errX = bx + barW / 2;
    var errTop = chartY + chartH - maxH;
    var errBot = chartY + chartH - minH;
    c2d.strokeStyle = bpt.color;
    c2d.lineWidth = 1;
    c2d.globalAlpha = 0.6;
    c2d.beginPath();
    c2d.moveTo(errX, errTop);
    c2d.lineTo(errX, errBot);
    c2d.stroke();
    // Caps
    c2d.beginPath();
    c2d.moveTo(errX - 4, errTop);
    c2d.lineTo(errX + 4, errTop);
    c2d.stroke();
    c2d.beginPath();
    c2d.moveTo(errX - 4, errBot);
    c2d.lineTo(errX + 4, errBot);
    c2d.stroke();
    c2d.globalAlpha = 1;

    // Value label
    c2d.font = "bold 10px 'JetBrains Mono',monospace";
    c2d.fillStyle = bpt.color;
    c2d.textAlign = 'center'; c2d.textBaseline = 'bottom';
    c2d.fillText(avgs[bKey].avg.toFixed(1) + 'm', bx + barW / 2, by - 4);

    // Plane name label
    c2d.font = "bold 9px 'JetBrains Mono',monospace";
    c2d.fillStyle = mc.text;
    c2d.textAlign = 'center'; c2d.textBaseline = 'top';
    c2d.fillText(planeNames[bKey], bx + barW / 2, chartY + chartH + 6);

    // Winner star
    if (bKey === bestPlane) {
      c2d.font = "bold 10px 'JetBrains Mono',monospace";
      c2d.fillStyle = '#fbbf24';
      c2d.textAlign = 'center'; c2d.textBaseline = 'bottom';
      c2d.fillText(t('winner'), bx + barW / 2, by - 18);
    }
  }
}
