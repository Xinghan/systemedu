<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout = true;</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'IBM Plex Sans','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:208px;min-width:208px;max-width:208px;display:flex;flex-direction:column;gap:7px;padding:12px;background:rgba(8,8,12,.96);border-right:1px solid rgba(255,176,0,.28);overflow-y:auto;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:4px 9px;cursor:pointer;border:1px solid rgba(255,176,0,.45);background:rgba(255,176,0,.08);color:#ffb000;letter-spacing:.14em;text-transform:uppercase;}
.style-switcher{display:flex;gap:4px;margin:3px 0 2px;}
.vm-btn{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid rgba(255,255,255,.14);background:transparent;color:rgba(255,255,255,.45);transition:all .2s;}
.vm-btn.vm-active{color:#ffb000;border-color:#ffb000;background:rgba(255,176,0,.1);}
.sidebar h1{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:12px;font-weight:700;color:#ffb000;margin-top:4px;line-height:1.35;text-transform:uppercase;letter-spacing:.04em;}
.sidebar .sub{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.04em;line-height:1.5;}
.sidebar .frame-ind{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.46);letter-spacing:.12em;margin-top:2px;}
.sidebar .guide-label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#00daf3;margin-top:8px;}
.sidebar .guide-content{font-size:11px;color:rgba(255,255,255,.76);line-height:1.55;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:4px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;background:radial-gradient(circle at 72% 18%,rgba(255,176,0,.12),transparent 34%),linear-gradient(135deg,#090b12,#161016 70%,#241409);}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:10px;padding:6px 12px;background:rgba(0,0,0,.32);border-top:1px solid rgba(255,255,255,.06);}
.ctrl-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border:0;cursor:pointer;color:#120a03;background:linear-gradient(135deg,#ffcf66,#ff8a38);transition:transform .1s,box-shadow .2s;box-shadow:0 0 13px rgba(255,176,0,.25);}
.ctrl-btn.secondary{background:rgba(255,255,255,.05);color:rgba(255,255,255,.68);box-shadow:none;border:1px solid rgba(255,255,255,.16);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,.52);border-top:1px solid rgba(255,255,255,.06);padding:0 14px;}
.hud-item{text-align:center;min-width:0;}
.hud-label{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.42);}
.hud-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#ffb000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
#frameInd{display:none;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="sidebar">
    <button class="lang-btn" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <div class="frame-ind" id="frameIndicator"></div>
    <div id="frameInd"></div>
    <div class="guide-label" id="guideTitle"></div>
    <div class="guide-content" id="guideContent"></div>
  </div>
  <div class="anim-main">
    <div class="canvas-wrap"><canvas id="c"></canvas></div>
    <div class="controls">
      <button class="ctrl-btn secondary" id="btnPrev"></button>
      <button class="ctrl-btn" id="btnPlay"></button>
      <button class="ctrl-btn secondary" id="btnNext"></button>
    </div>
    <div class="hud">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
    </div>
  </div>
</div>
<script src="../../runtime/animation_runtime.js"></script>
<script>
const START_TS = performance.now();
const STAGE_KEYS = ['stageApply','stageCure','stageHeat','stagePeel'];

window.CONFIG = {
  style: 'rocketry_control',
  visualMode: 'cyberpunk',
  totalFrames: 4,
  guideTitle: 'guideTitle',
  guideItems: ['guide1','guide2','guide3','guide4'],
  hudLabels: ['hudStage','hudTemp','hudStrength','hudFailure'],
  hudValues: [
    ['stageApply','25 ℃','soft bead','not tested'],
    ['stageCure','25 ℃','holds by hand','looks ok'],
    ['stageHeat','95 ℃','softening','danger'],
    ['stagePeel','110 ℃','below load','fin peels']
  ],
  i18n: {
    title: {cn:'尾翼热熔胶失效演示', en:'Hot-Glue Fin Failure Demo'},
    subtitle: {cn:'同一个测试台：上胶、冷却、受热、受力，然后看尾翼为什么会被剥离。', en:'One test bench: apply, cool, heat, load, then watch why the fin peels.'},
    guideTitle: {cn:'观看指南', en:'Guide'},
    guide1: {cn:'橙色喷嘴是热熔胶枪，黄色胶层是刚打上的热熔胶。', en:'Orange nozzle = glue gun; amber bead = hot glue.'},
    guide2: {cn:'红色热雾来自发动机舱方向，表示高温沿箭体传到尾翼根部。', en:'Red heat haze comes from the motor side and reaches the fin root.'},
    guide3: {cn:'蓝色箭头是飞行中的气流剪切力，裂纹从胶层边缘开始扩展。', en:'Blue arrows are airflow shear; cracks start at the adhesive edge.'},
    guide4: {cn:'重点不是“热熔胶粘不住”，而是“受热后强度跌破载荷”。', en:'The point: hot glue can hold cold, but loses margin when heated.'},
    hudStage: {cn:'阶段', en:'Stage'}, hudTemp: {cn:'胶层温度', en:'Bond Temp'}, hudStrength: {cn:'强度状态', en:'Strength'}, hudFailure: {cn:'失效模式', en:'Failure'},
    stageApply: {cn:'上胶定位', en:'Apply'}, stageCure: {cn:'冷却看似牢固', en:'Cold Hold'}, stageHeat: {cn:'发动机热脉冲', en:'Heat Pulse'}, stagePeel: {cn:'剪切剥离', en:'Shear Peel'},
    tube: {cn:'箭体纸管', en:'body tube'}, fin: {cn:'尾翼', en:'fin'}, bead: {cn:'热熔胶层', en:'hot-glue bead'}, engineHeat: {cn:'发动机热', en:'motor heat'}, airflow: {cn:'气流剪切', en:'airflow shear'}, crack: {cn:'边缘裂纹', en:'edge crack'}, clamp: {cn:'手拉测试：冷的时候还能撑住', en:'Hand pull: it holds when cold'}, soft: {cn:'胶层变软：开始滑移', en:'Soft bond: sliding starts'}, peel: {cn:'剥离：尾翼根部打开', en:'Peel: fin root opens'}, better: {cn:'工程结论：尾翼不要用热熔胶做主结构粘接', en:'Conclusion: do not use hot glue as the main fin bond'},
    legendGlue: {cn:'黄色=胶层', en:'amber=bond'}, legendHeat: {cn:'红色=热', en:'red=heat'}, legendLoad: {cn:'蓝色=载荷', en:'blue=load'}, legendCrack: {cn:'白/红线=裂纹', en:'white/red=crack'}
  }
};

function nowPulse() { return (performance.now() - START_TS) / 1000; }
function t(key) { return AnimRuntime.t(key); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function ease(x){ return x < .5 ? 2*x*x : 1 - Math.pow(-2*x+2,2)/2; }
function wave(a,s,o){ return Math.sin(nowPulse()*s + o) * a; }
function roundRect(ctx,x,y,w,h,r){ const rr=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.arcTo(x+w,y,x+w,y+h,rr); ctx.arcTo(x+w,y+h,x,y+h,rr); ctx.arcTo(x,y+h,x,y,rr); ctx.arcTo(x,y,x+w,y,rr); ctx.closePath(); }
function label(ctx,txt,x,y,size,color,align='center',bold=false){ ctx.save(); ctx.fillStyle=color; ctx.font=(bold?'700 ':'')+size+"px 'IBM Plex Sans','Noto Sans SC',sans-serif"; ctx.textAlign=align; ctx.textBaseline='middle'; ctx.fillText(txt,x,y); ctx.restore(); }
function mono(ctx,txt,x,y,size,color,align='left'){ ctx.save(); ctx.fillStyle=color; ctx.font='700 '+size+"px 'IBM Plex Mono','Noto Sans SC',monospace"; ctx.textAlign=align; ctx.textBaseline='middle'; ctx.fillText(txt,x,y); ctx.restore(); }
function arrow(ctx,x1,y1,x2,y2,color,lw=2){ const a=Math.atan2(y2-y1,x2-x1); ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lw; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2-9*Math.cos(a-.45),y2-9*Math.sin(a-.45)); ctx.lineTo(x2-9*Math.cos(a+.45),y2-9*Math.sin(a+.45)); ctx.closePath(); ctx.fill(); ctx.restore(); }

function drawBg(ctx, W, H) {
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#070914'); g.addColorStop(.55,'#11131f'); g.addColorStop(1,'#261407');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.035)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=42){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=42){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const rg=ctx.createRadialGradient(W*.68,H*.30,0,W*.68,H*.30,Math.max(W,H)*.55);
  rg.addColorStop(0,'rgba(255,176,0,.12)'); rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
}

function getFrameElements(f, W, H) {
  return [{ id:'bench-scene', type:'custom', frame:f, x:0, y:0, w:W, h:H }];
}

function drawWorkbench(ctx,W,H){
  const tableY=H*0.70;
  const tg=ctx.createLinearGradient(0,tableY,W,H);
  tg.addColorStop(0,'rgba(64,44,28,.58)'); tg.addColorStop(1,'rgba(24,20,19,.85)');
  ctx.fillStyle=tg; ctx.fillRect(36,tableY,W-72,H-tableY-26);
  ctx.strokeStyle='rgba(255,176,0,.18)'; ctx.lineWidth=1; ctx.strokeRect(36,tableY,W-72,H-tableY-26);
  mono(ctx,'FIN ROOT BOND TEST BENCH',54,tableY+22,10,'rgba(255,176,0,.72)');
}

function drawRocket(ctx,W,H,stage,p){
  const cx=W*.48, cy=H*.43, tubeW=Math.min(W*.56,560), tubeH=64;
  const tubeX=cx-tubeW/2, tubeY=cy-tubeH/2;
  ctx.save();
  const body=ctx.createLinearGradient(tubeX,tubeY,tubeX,tubeY+tubeH);
  body.addColorStop(0,'#f7f0dd'); body.addColorStop(.52,'#b9aa86'); body.addColorStop(1,'#5c503d');
  roundRect(ctx,tubeX,tubeY,tubeW,tubeH,32); ctx.fillStyle=body; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fillRect(tubeX+28,tubeY+6,42,tubeH-12);
  label(ctx,t('tube'),tubeX+tubeW*.50,tubeY-18,12,'rgba(255,255,255,.78)');

  // Motor heat source at tail, always same physical location.
  const tailX=tubeX+42, heatBaseY=tubeY+tubeH/2;
  if(stage>=2){
    for(let i=0;i<7;i++){
      const r=28+i*17+p*20+wave(3,3,i);
      const alpha=clamp(.30-i*.035,0,.3);
      const grad=ctx.createRadialGradient(tailX,heatBaseY,4,tailX,heatBaseY,r);
      grad.addColorStop(0,'rgba(255,95,48,'+alpha+')'); grad.addColorStop(1,'rgba(255,95,48,0)');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(tailX,heatBaseY,r,0,Math.PI*2); ctx.fill();
    }
    label(ctx,t('engineHeat'),tailX-8,heatBaseY-52,12,'#ff8d63','center',true);
  }

  // Fin root geometry.
  const rootX=tubeX+tubeW*.68;
  const rootY=tubeY+tubeH-2;
  const peel = stage===3 ? ease(clamp(p,0,1)) : 0;
  const soften = stage>=2 ? ease(clamp(p,0,1)) : 0;
  ctx.translate(rootX,rootY);
  ctx.rotate(peel*.34);
  const finGrad=ctx.createLinearGradient(-42,0,54,110);
  finGrad.addColorStop(0,'#d8f3ff'); finGrad.addColorStop(.55,'#59c7e8'); finGrad.addColorStop(1,'#14506c');
  ctx.beginPath(); ctx.moveTo(-50,0); ctx.lineTo(56,0); ctx.lineTo(24,112+peel*28); ctx.lineTo(-20,104+peel*18); ctx.closePath();
  ctx.fillStyle=finGrad; ctx.fill(); ctx.strokeStyle='rgba(219,252,255,.9)'; ctx.lineWidth=1.5; ctx.stroke();
  label(ctx,t('fin'),12,74,13,'rgba(3,16,24,.82)','center',true);
  ctx.restore();

  // Adhesive bead stays in the same place; it changes shape/color with heat.
  const beadX=rootX-55, beadY=rootY-9, beadW=118, beadH=17+soften*7;
  const beadGrad=ctx.createLinearGradient(beadX,beadY,beadX+beadW,beadY+beadH);
  beadGrad.addColorStop(0,stage>=2?'#ff6a35':'#ffd66e');
  beadGrad.addColorStop(.55,stage>=2?'#ffb000':'#ffb000');
  beadGrad.addColorStop(1,stage>=2?'#8b1e12':'#8a5a16');
  ctx.save();
  ctx.shadowColor=stage>=2?'rgba(255,95,48,.55)':'rgba(255,176,0,.45)'; ctx.shadowBlur=16;
  roundRect(ctx,beadX,beadY,beadW,beadH,beadH/2); ctx.fillStyle=beadGrad; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.stroke();
  if(stage>=2){
    ctx.fillStyle='rgba(255,97,55,.45)';
    for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(beadX+16+i*19,beadY+beadH+5+Math.sin(nowPulse()*4+i)*3,5,10+soften*8,0,0,Math.PI*2);ctx.fill();}
  }
  ctx.restore();
  label(ctx,t('bead'),beadX+beadW/2,beadY-17,12,'#ffd166','center',true);

  // Crack appears from the adhesive edge.
  if(stage===3){
    ctx.save(); ctx.strokeStyle='#fff7ed'; ctx.lineWidth=2; ctx.shadowColor='#ff4b2b'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(beadX+beadW*.73,beadY+2); ctx.lineTo(beadX+beadW*.80+24*p,beadY+15+16*p); ctx.lineTo(beadX+beadW*.90+38*p,beadY+22+32*p); ctx.stroke();
    label(ctx,t('crack'),beadX+beadW*.86+48*p,beadY+44+20*p,12,'#ff8d63','left',true);
    ctx.restore();
  }
}

function drawTooling(ctx,W,H,stage,p){
  const cx=W*.48, cy=H*.43;
  const tubeW=Math.min(W*.56,560), tubeH=64;
  const tubeX=cx-tubeW/2, tubeY=cy-tubeH/2;
  const rootX=tubeX+tubeW*.68, rootY=tubeY+tubeH-2;
  if(stage===0){
    const gunX=rootX-110+90*p+wave(3,5,0), gunY=rootY-102+8*Math.sin(p*Math.PI);
    ctx.save(); ctx.translate(gunX,gunY);
    const gg=ctx.createLinearGradient(-48,-16,44,20); gg.addColorStop(0,'#24242e'); gg.addColorStop(1,'#ff8a38');
    roundRect(ctx,-50,-18,80,34,5); ctx.fillStyle=gg; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.stroke();
    ctx.fillStyle='#ffb000'; ctx.beginPath(); ctx.moveTo(30,-8); ctx.lineTo(70,0); ctx.lineTo(30,8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,176,0,.8)'; ctx.beginPath(); ctx.ellipse(74,2+20*p,5,9,0,0,Math.PI*2); ctx.fill();
    mono(ctx,langShort(),-42,-32,9,'rgba(255,255,255,.75)');
    ctx.restore();
  }
  if(stage===1){
    // Pull clamp, but the cold bead holds.
    arrow(ctx,rootX+18,rootY+64,rootX+110+18*p,rootY+64,'#00daf3',2.6);
    label(ctx,t('clamp'),rootX+122,rootY+43,12,'#00daf3','left',true);
    ctx.strokeStyle='rgba(0,218,243,.55)'; ctx.strokeRect(rootX+72,rootY+28,52,28);
  }
  if(stage===2){
    for(let i=0;i<5;i++){
      const x=rootX-140+i*48+p*48;
      arrow(ctx,x,rootY-78+Math.sin(nowPulse()*4+i)*6,x+38,rootY-42,'rgba(255,95,48,.75)',1.8);
    }
    label(ctx,t('soft'),rootX+68,rootY-78,12,'#ff8d63','left',true);
  }
  if(stage===3){
    for(let i=0;i<4;i++){
      arrow(ctx,rootX+18+i*24,rootY+44+i*8,rootX+128+i*20,rootY+40+i*10,'#00daf3',2.4);
    }
    label(ctx,t('airflow'),rootX+164,rootY+58,12,'#00daf3','left',true);
    label(ctx,t('peel'),rootX+70,rootY+124,13,'#ff8d63','left',true);
  }
}

function langShort(){return AnimRuntime.LANG==='en'?'HOT GLUE':'热熔胶';}

function drawMeters(ctx,W,H,stage,p){
  const x=54,y=54,w=Math.min(258,W*.30),h=124;
  ctx.save(); roundRect(ctx,x,y,w,h,10); ctx.fillStyle='rgba(0,0,0,.34)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.stroke();
  mono(ctx,'LIVE READOUT',x+14,y+18,10,'rgba(255,176,0,.78)');
  const temp=[25,25,95+Math.round(16*Math.sin(p*Math.PI)),110][stage];
  const strength=[30+Math.round(24*p),58,Math.round(58-28*p),Math.round(30-20*p)][stage];
  drawBar(ctx,x+16,y+43,w-32,12,temp/130,'#ff6a35',t('hudTemp')+' '+temp+' ℃');
  drawBar(ctx,x+16,y+78,w-32,12,strength/70,strength<36?'#ff8d63':'#8df8c2',t('hudStrength')+' '+strength+' N');
  const load= stage<3?32:52+Math.round(8*p);
  mono(ctx,'LOAD '+load+' N',x+16,y+112,10,load>strength?'#ff8d63':'rgba(255,255,255,.72)');
  ctx.restore();
}
function drawBar(ctx,x,y,w,h,p,color,txt){
  ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(x,y,w,h);
  const g=ctx.createLinearGradient(x,0,x+w,0); g.addColorStop(0,color); g.addColorStop(1,'rgba(255,255,255,.75)');
  ctx.fillStyle=g; ctx.fillRect(x,y,w*clamp(p,0,1),h);
  ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.strokeRect(x,y,w,h);
  mono(ctx,txt,x,y-9,9,'rgba(255,255,255,.76)');
}

function drawLegend(ctx,W,H){
  const items=[['#ffb000',t('legendGlue')],['#ff6040',t('legendHeat')],['#00daf3',t('legendLoad')],['#fff7ed',t('legendCrack')]];
  const x=W-252, y=54;
  ctx.save(); roundRect(ctx,x,y,202,104,8); ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.stroke();
  items.forEach((it,i)=>{ctx.fillStyle=it[0];ctx.fillRect(x+14,y+18+i*20,20,8);label(ctx,it[1],x+44,y+22+i*20,11,'rgba(255,255,255,.78)','left');});
  ctx.restore();
}

function drawConclusion(ctx,W,H,stage,p){
  const text = stage===3 ? t('better') : t(STAGE_KEYS[stage]);
  const y=H-54;
  ctx.save();
  roundRect(ctx,W*.18,y-18,W*.64,36,8);
  ctx.fillStyle=stage===3?'rgba(255,95,48,.12)':'rgba(255,176,0,.10)'; ctx.fill();
  ctx.strokeStyle=stage===3?'rgba(255,95,48,.42)':'rgba(255,176,0,.32)'; ctx.stroke();
  label(ctx,text,W*.5,y,14,stage===3?'#ffb59c':'#ffd166','center',true);
  ctx.restore();
}

function customDrawElement(ctx, el, W, H) {
  if(el.id !== 'bench-scene') return false;
  const stage = el.frame || 0;
  const local = (nowPulse()%1.8)/1.8;
  const p = ease(local);
  drawWorkbench(ctx,W,H);
  drawMeters(ctx,W,H,stage,p);
  drawLegend(ctx,W,H);
  drawRocket(ctx,W,H,stage,p);
  drawTooling(ctx,W,H,stage,p);
  drawConclusion(ctx,W,H,stage,p);
  return true;
}

function onReady(){
  const frameInd = document.getElementById('frameIndicator');
  const hidden = document.getElementById('frameInd');
  if(frameInd && hidden){
    const sync=()=>{hidden.textContent=frameInd.textContent||'';};
    sync(); new MutationObserver(sync).observe(frameInd,{childList:true,subtree:true,characterData:true});
  }
  let raf=0;
  function loop(){
    AnimRuntime.drawFrame(AnimRuntime.currentFrame);
    raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

AnimRuntime.boot();
</script>
</body>
