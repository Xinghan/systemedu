<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.obj-shelf{display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.obj-slot{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));cursor:grab;transition:all 0.2s;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);}
.obj-slot:hover{border-color:var(--sb-accent,var(--primary));color:var(--sb-accent,var(--primary));}
.obj-slot.selected{border-color:var(--sb-accent,var(--primary));background:rgba(167,139,250,0.1);color:var(--sb-accent,var(--primary));}
.obj-slot .dot{width:8px;height:8px;border-radius:50%;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">DROP LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="objLabel">OBJECT A</div>
    <div class="obj-shelf" id="shelfA"></div>
    <div class="sidebar-section" id="objLabelB" style="margin-top:6px;">OBJECT B</div>
    <div class="obj-shelf" id="shelfB"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="airLabel">AIR DENSITY</div>
    <div class="slider-group">
      <input type="range" id="airSlider" min="0" max="100" value="50">
      <div class="val" id="airVal">50%</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnRelease">RELEASE</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">DROP LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">TRIAL</div><div class="hud-val" id="hudV1">0/8</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">OBJ A</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">OBJ B</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">WINNER</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">--</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#7c5cbf');
  r.style.setProperty('--glow-strong', 'rgba(167,139,250,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof draw === 'function') draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

var I18N = {
  title:       {en:'DROP LAB', cn:'\u4e0b\u843d\u5b9e\u9a8c\u5ba4'},
  subtitle:    {en:'Space Station Laboratory', cn:'\u7a7a\u95f4\u7ad9\u5b9e\u9a8c\u8231'},
  guide:       {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:   {en:'1. Pick Object A and B\n2. Adjust air density\n3. Click RELEASE\n4. Watch them fall!', cn:'1. \u9009\u62e9\u7269\u4f53 A \u548c B\n2. \u8c03\u8282\u7a7a\u6c14\u5bc6\u5ea6\n3. \u70b9\u51fb\u91ca\u653e\n4. \u89c2\u5bdf\u4e0b\u843d\uff01'},
  objA:        {en:'OBJECT A', cn:'\u7269\u4f53 A'},
  objB:        {en:'OBJECT B', cn:'\u7269\u4f53 B'},
  airDensity:  {en:'AIR DENSITY', cn:'\u7a7a\u6c14\u5bc6\u5ea6'},
  release:     {en:'RELEASE', cn:'\u91ca\u653e'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  trial:       {en:'TRIAL', cn:'\u5b9e\u9a8c'},
  winner:      {en:'WINNER', cn:'\u5148\u843d\u5730'},
  tie:         {en:'TIE!', cn:'\u540c\u65f6\uff01'},
  statusReady: {en:'Select two objects and release', cn:'\u9009\u62e9\u4e24\u4e2a\u7269\u4f53\u5e76\u91ca\u653e'},
  statusFall:  {en:'Falling...', cn:'\u4e0b\u843d\u4e2d...'},
  statusDone:  {en:'Experiment complete!', cn:'\u5b9e\u9a8c\u5b8c\u6210\uff01'},
  allDone:     {en:'All 8 experiments done!', cn:'\u51688\u4e2a\u5b9e\u9a8c\u5b8c\u6210\uff01'},
  vacuum:      {en:'VACUUM', cn:'\u771f\u7a7a'},
  thin:        {en:'THIN', cn:'\u7a00\u8584'},
  earth:       {en:'EARTH', cn:'\u5730\u7403'},
  thick:       {en:'THICK', cn:'\u6d53\u5bc6'},
  venus:       {en:'VENUS', cn:'\u91d1\u661f'},
  speed:       {en:'Speed', cn:'\u901f\u5ea6'},
  time:        {en:'Time', cn:'\u65f6\u95f4'},
  feather:     {en:'Feather', cn:'\u7fbd\u6bdb'},
  coin:        {en:'Coin', cn:'\u786c\u5e01'},
  paperBall:   {en:'Paper Ball', cn:'\u7eb8\u7403'},
  rock:        {en:'Rock', cn:'\u77f3\u5934'},
  balloon:     {en:'Balloon', cn:'\u6c14\u7403'},
  parachute:   {en:'Parachute', cn:'\u964d\u843d\u4f1e'},
  selectBoth:  {en:'Select both objects first!', cn:'\u8bf7\u5148\u9009\u62e9\u4e24\u4e2a\u7269\u4f53\uff01'},
  complete:    {en:'COMPLETE', cn:'\u5b8c\u6210'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('objLabel').textContent = t('objA');
  document.getElementById('objLabelB').textContent = t('objB');
  document.getElementById('airLabel').textContent = t('airDensity');
  document.getElementById('btnRelease').textContent = t('release');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('trial');
  document.getElementById('statusLabel').textContent = t('statusReady');
  updateAirLabel();
  buildShelves();
  draw();
}

// ================================================================
// OBJECTS DATA
// ================================================================
var OBJECTS = [
  {id:'feather',   key:'feather',   mass:0.003, dragCd:0.8, area:0.012, color:'#e8d5b0'},
  {id:'coin',      key:'coin',      mass:0.008, dragCd:0.5, area:0.0005, color:'#d4a74a'},
  {id:'paperBall', key:'paperBall', mass:0.005, dragCd:0.45, area:0.003, color:'#e0d8c8'},
  {id:'rock',      key:'rock',      mass:0.2,   dragCd:0.4, area:0.001, color:'#7a7568'},
  {id:'balloon',   key:'balloon',   mass:0.003, dragCd:0.47, area:0.02, color:'#f87171'},
  {id:'parachute', key:'parachute', mass:0.08,  dragCd:1.4, area:0.08, color:'#60a5fa'},
];

// ================================================================
// EXPERIMENT CHALLENGES
// ================================================================
var CHALLENGES = [
  {a:'feather', b:'coin',      air:50,  hint:{en:'Classic! Feather vs Coin in normal air', cn:'\u7ecf\u5178\uff01\u666e\u901a\u7a7a\u6c14\u4e2d\u7fbd\u6bdb vs \u786c\u5e01'}},
  {a:'feather', b:'coin',      air:0,   hint:{en:'Now try in VACUUM -- same result?', cn:'\u771f\u7a7a\u4e2d\u518d\u8bd5 -- \u7ed3\u679c\u4e00\u6837\u5417\uff1f'}},

// ================================================================
// PHYSICS
// ================================================================
var G = 9.81;
var AIR_DENSITY_BASE = 1.225; // kg/m^3 at sea level

function calcAccel(obj, velocity, airFrac) {
  var rho = AIR_DENSITY_BASE * (airFrac / 50); // 50% = earth normal
  var dragForce = 0.5 * rho * velocity * velocity * obj.dragCd * obj.area;
  var gravForce = obj.mass * G;
  var netForce = gravForce - dragForce;
  if (netForce < 0) netForce = 0; // terminal velocity reached
  return netForce / obj.mass;
}

function getTerminalVelocity(obj, airFrac) {
  if (airFrac === 0) return Infinity;
  var rho = AIR_DENSITY_BASE * (airFrac / 50);
  var vt = Math.sqrt((2 * obj.mass * G) / (rho * obj.dragCd * obj.area));
  return vt;
}

// ================================================================
// OBJECT DRAWING
// ================================================================
function drawObject(ctx, objId, x, y, scale) {
  scale = scale || 1;
  ctx.save();
  if (objId === 'feather') {
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.strokeStyle = '#e8d5b0'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 14); ctx.stroke();
    ctx.fillStyle = 'rgba(232,213,176,0.5)';
    ctx.beginPath();
    ctx.moveTo(0, -12); ctx.quadraticCurveTo(-9, -5, -7, 4);
    ctx.quadraticCurveTo(-4, 10, 0, 12); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -12); ctx.quadraticCurveTo(7, -3, 6, 5);
    ctx.quadraticCurveTo(3, 11, 0, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(232,213,176,0.25)'; ctx.lineWidth = 0.4;
    for (var i = -10; i < 10; i += 3) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(-7, i+2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(6, i+2); ctx.stroke();
    }
  } else if (objId === 'coin') {
    ctx.beginPath(); ctx.arc(x, y, 10 * scale, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a74a'; ctx.fill();
    ctx.strokeStyle = '#c49a3a'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y, 7 * scale, 0, Math.PI * 2);
    ctx.strokeStyle = '#b8902e'; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.fillStyle = '#8b6914';
    ctx.font = 'bold ' + Math.round(8 * scale) + "px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('1', x, y + 1);
  } else if (objId === 'paperBall') {
    ctx.beginPath(); ctx.arc(x, y, 8 * scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(235,225,210,0.8)'; ctx.fill();
    ctx.strokeStyle = '#b8a880'; ctx.lineWidth = 0.7; ctx.stroke();
    ctx.strokeStyle = 'rgba(160,140,110,0.4)'; ctx.lineWidth = 0.4;
    ctx.beginPath(); ctx.moveTo(x - 4*scale, y - 3*scale); ctx.lineTo(x + 3*scale, y + 4*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 3*scale, y - 5*scale); ctx.lineTo(x - 2*scale, y + 3*scale); ctx.stroke();
  } else if (objId === 'rock') {
    ctx.beginPath();
    ctx.moveTo(x - 9*scale, y + 3*scale);
    ctx.lineTo(x - 6*scale, y - 7*scale);
    ctx.lineTo(x + 4*scale, y - 8*scale);
    ctx.lineTo(x + 9*scale, y - 2*scale);
    ctx.lineTo(x + 7*scale, y + 6*scale);
    ctx.lineTo(x - 4*scale, y + 7*scale);
    ctx.closePath();
    ctx.fillStyle = '#6b6560'; ctx.fill();
    ctx.strokeStyle = '#4a4540'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(100,95,88,0.6)';
    ctx.beginPath(); ctx.arc(x - 2*scale, y - 1*scale, 3*scale, 0, Math.PI*2); ctx.fill();
  } else if (objId === 'balloon') {
    ctx.beginPath(); ctx.ellipse(x, y - 4*scale, 10*scale, 13*scale, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(248,113,113,0.7)'; ctx.fill();
    ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 1; ctx.stroke();
    // Highlight
    ctx.fillStyle = 'rgba(255,200,200,0.3)';
    ctx.beginPath(); ctx.ellipse(x - 3*scale, y - 8*scale, 3*scale, 4*scale, -0.3, 0, Math.PI*2); ctx.fill();
    // String
    ctx.strokeStyle = '#888'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, y + 9*scale); ctx.lineTo(x, y + 18*scale); ctx.stroke();
    // Knot
    ctx.fillStyle = '#dc2626';
    ctx.beginPath(); ctx.arc(x, y + 9*scale, 1.5*scale, 0, Math.PI*2); ctx.fill();
  } else if (objId === 'parachute') {
    // Canopy
    ctx.fillStyle = 'rgba(96,165,250,0.5)';
    ctx.beginPath();
    ctx.arc(x, y - 6*scale, 14*scale, Math.PI, 0);
    ctx.lineTo(x + 14*scale, y - 6*scale);
    ctx.lineTo(x - 14*scale, y - 6*scale);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1; ctx.stroke();
    // Panels
    ctx.strokeStyle = 'rgba(59,130,246,0.4)'; ctx.lineWidth = 0.5;
    for (var i = -10; i <= 10; i += 5) {
      ctx.beginPath(); ctx.moveTo(x + i*scale, y - 6*scale);
      ctx.quadraticCurveTo(x + i*scale, y - 14*scale, x + (i+2)*scale, y - 18*scale);
      ctx.stroke();
    }
    // Cords
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x - 12*scale, y - 6*scale); ctx.lineTo(x, y + 10*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 12*scale, y - 6*scale); ctx.lineTo(x, y + 10*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y - 6*scale); ctx.lineTo(x, y + 10*scale); ctx.stroke();
    // Figure
    ctx.fillStyle = '#e0e0e0';
    ctx.beginPath(); ctx.arc(x, y + 12*scale, 3*scale, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(x - 2*scale, y + 15*scale, 4*scale, 5*scale);
  }
  ctx.restore();
}

// ================================================================
// FORCE ARROWS
// ================================================================
function drawForceArrow(ctx, x, y1, y2, color, lw) {
  lw = lw || 1.5;
  var angle = y2 > y1 ? Math.PI / 2 : -Math.PI / 2;
  var hs = 6;
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y2);
  ctx.lineTo(x - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(x - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

// ================================================================
// PARTICLE SYSTEM
// ================================================================
function spawnParticles(x, y, speed, color) {
  var count = Math.min(Math.floor(speed * 3) + 5, 30);
  for (var i = 0; i < count; i++) {
    var angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.2;
    var spd = (Math.random() * 0.5 + 0.5) * Math.min(speed * 0.4, 5);
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 1.0,
      decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 2 + 0.5,
      color: color,
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ================================================================
// SPACE STATION DECORATIONS
// ================================================================
function drawSpaceStation(ctx, w, h) {
  var mc = gameModeColors();
  // Stars with twinkling
  var now = Date.now() * 0.001;
  for (var i = 0; i < starField.length; i++) {
    var s = starField[i];
    var twinkle = 0.5 + 0.5 * Math.sin(now * s.twinkleSpeed * 60 + s.twinklePhase);
    ctx.globalAlpha = s.a * twinkle;
    ctx.fillStyle = mc.text;
    ctx.beginPath();
    ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Station window frame (top and bottom)
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 2;
  // Top frame
  ctx.beginPath();
  ctx.moveTo(20, 18); ctx.lineTo(w - 20, 18);
  ctx.stroke();
  // Bottom platform
  ctx.fillStyle = 'rgba(60,58,70,0.4)';
  ctx.fillRect(0, h - 40, w, 40);
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, h - 40); ctx.lineTo(w, h - 40); ctx.stroke();

  // Platform grid lines
  ctx.strokeStyle = 'rgba(120,115,140,0.15)';
  ctx.lineWidth = 0.5;
  for (var gx = 30; gx < w; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, h - 38); ctx.lineTo(gx, h - 2); ctx.stroke();
  }
}

// ================================================================
// MAIN DRAW
// ================================================================
function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  c2d.clearRect(0, 0, cw, ch);

  // Background
  drawGameBg(c2d, cw, ch);
  drawSpaceStation(c2d, cw, ch);

  var mc = gameModeColors();
  var dropZoneTop = 50;
  var dropZoneBot = ch - 60;
  var dropHeight = dropZoneBot - dropZoneTop;
  var colA = cw * 0.35;
  var colB = cw * 0.65;

  // Drop zone markers
  c2d.setLineDash([4, 4]);
  c2d.strokeStyle = mc.strokeDim; c2d.lineWidth = 0.5;
  c2d.beginPath(); c2d.moveTo(cw * 0.15, dropZoneTop); c2d.lineTo(cw * 0.85, dropZoneTop); c2d.stroke();
  c2d.setLineDash([]);

  // Ground line
  c2d.strokeStyle = mc.accent; c2d.lineWidth = 1;
  c2d.globalAlpha = 0.4;
  c2d.beginPath(); c2d.moveTo(cw * 0.15, dropZoneBot); c2d.lineTo(cw * 0.85, dropZoneBot); c2d.stroke();
  c2d.globalAlpha = 1;

  // Height ruler
  c2d.strokeStyle = mc.strokeDim; c2d.lineWidth = 0.5;
  c2d.beginPath(); c2d.moveTo(cw * 0.1, dropZoneTop); c2d.lineTo(cw * 0.1, dropZoneBot); c2d.stroke();
  for (var tick = 0; tick <= 4; tick++) {
    var ty = dropZoneTop + (dropHeight * tick / 4);
    c2d.beginPath(); c2d.moveTo(cw * 0.08, ty); c2d.lineTo(cw * 0.1, ty); c2d.stroke();
  }

  // Column labels
  if (selectedA || selectedB) {
    c2d.font = "bold 11px 'JetBrains Mono',monospace";
    c2d.textAlign = 'center';
    if (selectedA) {
      var oA = OBJECTS.find(function(o){return o.id === selectedA;});
      c2d.fillStyle = oA ? oA.color : mc.text;
      c2d.fillText(t('objA') + ': ' + (oA ? t(oA.key) : ''), colA, dropZoneTop - 10);
    }
    if (selectedB) {
      var oB = OBJECTS.find(function(o){return o.id === selectedB;});
      c2d.fillStyle = oB ? oB.color : mc.text;
      c2d.fillText(t('objB') + ': ' + (oB ? t(oB.key) : ''), colB, dropZoneTop - 10);
    }
  }

  // Air density visualization -- background tint
  if (airDensity > 0) {
    c2d.fillStyle = 'rgba(150,160,220,' + (airDensity * 0.001) + ')';
    c2d.fillRect(cw * 0.14, dropZoneTop, cw * 0.72, dropHeight);
  }

  // Air density label in drop zone
  c2d.font = "9px 'JetBrains Mono',monospace";
  c2d.textAlign = 'right';
  c2d.fillStyle = mc.dim;
  var airLabel = '';
  if (airDensity === 0) airLabel = t('vacuum');
  else if (airDensity <= 20) airLabel = t('thin');
  else if (airDensity <= 60) airLabel = t('earth');
  else if (airDensity <= 85) airLabel = t('thick');
  else airLabel = t('venus');
  c2d.fillText(airLabel + ' ' + airDensity + '%', cw * 0.86, dropZoneTop + 14);

  // Draw objects
  if (gamePhase === 'select') {
    // Show objects at starting position
    if (selectedA) drawObject(c2d, selectedA, colA, dropZoneTop + 20, 1.2);
    if (selectedB) drawObject(c2d, selectedB, colB, dropZoneTop + 20, 1.2);
  } else if (gamePhase === 'falling' || gamePhase === 'done') {
    // Draw at current positions
    if (objAState) {
      var ayPos = dropZoneTop + (objAState.pos / objAState.maxDist) * dropHeight;
      if (ayPos > dropZoneBot) ayPos = dropZoneBot;
      drawObject(c2d, selectedA, colA, ayPos, 1.2);

      // Force arrows during fall
      if (gamePhase === 'falling' && !objAState.landed) {
        var oA = OBJECTS.find(function(o){return o.id === selectedA;});
        // Gravity arrow (down)
        var gravLen = Math.min(30, 15 + oA.mass * 80);
        drawForceArrow(c2d, colA + 18, ayPos + 8, ayPos + 8 + gravLen, '#f87171', 1.5);
        // Drag arrow (up)
        if (airDensity > 0) {
          var dragLen = Math.min(40, objAState.vel * 2 * (airDensity / 50));
          if (dragLen > 3) drawForceArrow(c2d, colA - 18, ayPos - 8, ayPos - 8 - dragLen, '#60a5fa', 1.5);
        }
      }

      // Speed indicator
      c2d.font = "bold 10px 'JetBrains Mono',monospace";
      c2d.textAlign = 'left';
      c2d.fillStyle = mc.accent;
      c2d.fillText(objAState.vel.toFixed(1) + ' m/s', colA + 25, ayPos);
    }

    if (objBState) {
      var byPos = dropZoneTop + (objBState.pos / objBState.maxDist) * dropHeight;
      if (byPos > dropZoneBot) byPos = dropZoneBot;
      drawObject(c2d, selectedB, colB, byPos, 1.2);

      if (gamePhase === 'falling' && !objBState.landed) {
        var oB = OBJECTS.find(function(o){return o.id === selectedB;});
        var gravLenB = Math.min(30, 15 + oB.mass * 80);
        drawForceArrow(c2d, colB + 18, byPos + 8, byPos + 8 + gravLenB, '#f87171', 1.5);
        if (airDensity > 0) {
          var dragLenB = Math.min(40, objBState.vel * 2 * (airDensity / 50));
          if (dragLenB > 3) drawForceArrow(c2d, colB - 18, byPos - 8, byPos - 8 - dragLenB, '#60a5fa', 1.5);
        }
      }

      c2d.font = "bold 10px 'JetBrains Mono',monospace";
      c2d.textAlign = 'left';
      c2d.fillStyle = mc.accent;
      c2d.fillText(objBState.vel.toFixed(1) + ' m/s', colB + 25, byPos);
    }
  }

  // Particles
  drawParticles(c2d);

  // Result display
  if (gamePhase === 'done' && objAState && objBState) {
    c2d.font = "bold 14px 'Space Grotesk','Inter',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillStyle = mc.accent;
    var winnerText = '';
    if (Math.abs(objAState.landTime - objBState.landTime) < 0.05) {
      winnerText = t('tie');
    } else if (objAState.landTime < objBState.landTime) {
      var oAw = OBJECTS.find(function(o){return o.id === selectedA;});
      winnerText = t('winner') + ': ' + t(oAw.key);
    } else {
      var oBw = OBJECTS.find(function(o){return o.id === selectedB;});
      winnerText = t('winner') + ': ' + t(oBw.key);
    }
    c2d.fillText(winnerText, cw / 2, ch / 2 - 20);

    // Time comparison
    c2d.font = "11px 'JetBrains Mono',monospace";
    c2d.fillStyle = mc.dim;
    var oAr = OBJECTS.find(function(o){return o.id === selectedA;});
    var oBr = OBJECTS.find(function(o){return o.id === selectedB;});
    c2d.fillText(t(oAr.key) + ': ' + objAState.landTime.toFixed(2) + 's', cw / 2 - 80, ch / 2 + 5);
    c2d.fillText(t(oBr.key) + ': ' + objBState.landTime.toFixed(2) + 's', cw / 2 + 80, ch / 2 + 5);
  }

  // Challenge progress indicators
  var progY = ch - 18;
  c2d.font = "8px 'JetBrains Mono',monospace";
  c2d.textAlign = 'center';
  for (var ci = 0; ci < CHALLENGES.length; ci++) {
    var px = cw * 0.25 + ci * (cw * 0.5 / (CHALLENGES.length - 1));
    if (completedChallenges.indexOf(ci) >= 0) {
      c2d.fillStyle = mc.accent;
      c2d.beginPath(); c2d.arc(px, progY, 4, 0, Math.PI * 2); c2d.fill();
    } else {
      c2d.strokeStyle = mc.strokeDim; c2d.lineWidth = 1;
      c2d.beginPath(); c2d.arc(px, progY, 4, 0, Math.PI * 2); c2d.stroke();
    }
    c2d.fillStyle = mc.dim;
    c2d.fillText((ci + 1).toString(), px, progY - 10);
  }

  // Current challenge hint
  if (trialCount < CHALLENGES.length && gamePhase === 'select') {
    var ch_ = CHALLENGES[trialCount];
    c2d.font = "10px 'Noto Sans SC','Inter',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillStyle = mc.dim;
    var hintText = ch_.hint[LANG] || ch_.hint['en'];
    c2d.fillText(hintText, cw / 2, dropZoneBot + 25);
  }
}

// ================================================================
// SIMULATION LOOP
// ================================================================
var simDt = 1 / 60;
var FALL_DISTANCE = 10; // meters (virtual)

function startFall() {
  if (!selectedA || !selectedB) {
    document.getElementById('statusVal').textContent = t('selectBoth');
    return;
  }
  if (gamePhase === 'falling') return;

  var oA = OBJECTS.find(function(o){return o.id === selectedA;});
  var oB = OBJECTS.find(function(o){return o.id === selectedB;});

  objAState = {pos: 0, vel: 0, accel: 0, landed: false, landTime: 0, maxDist: FALL_DISTANCE};
  objBState = {pos: 0, vel: 0, accel: 0, landed: false, landTime: 0, maxDist: FALL_DISTANCE};
  particles = [];
  gamePhase = 'falling';
  fallStartTime = 0;

  document.getElementById('statusLabel').textContent = t('statusFall');
  document.getElementById('statusVal').textContent = '';
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('btnRelease').disabled = true;

  var simTime = 0;

  function simStep() {
    if (gamePhase !== 'falling') return;

    simTime += simDt;

    // Update A
    if (!objAState.landed) {
      objAState.accel = calcAccel(oA, objAState.vel, airDensity);
      objAState.vel += objAState.accel * simDt;
      objAState.pos += objAState.vel * simDt;
      if (objAState.pos >= FALL_DISTANCE) {
        objAState.pos = FALL_DISTANCE;
        objAState.landed = true;
        objAState.landTime = simTime;
        var colA = cw * 0.35;
        var dropBot = ch - 60;
        spawnParticles(colA, dropBot, objAState.vel, oA.color);
      }
    }

    // Update B
    if (!objBState.landed) {
      objBState.accel = calcAccel(oB, objBState.vel, airDensity);
      objBState.vel += objBState.accel * simDt;
      objBState.pos += objBState.vel * simDt;
      if (objBState.pos >= FALL_DISTANCE) {
        objBState.pos = FALL_DISTANCE;
        objBState.landed = true;
        objBState.landTime = simTime;
        var colB = cw * 0.65;
        var dropBot2 = ch - 60;
        spawnParticles(colB, dropBot2, objBState.vel, oB.color);
      }
    }

    updateParticles();
    draw();

    if (objAState.landed && objBState.landed) {
      gamePhase = 'done';
      trialCount++;

      // Check if this matches a challenge
      for (var ci = 0; ci < CHALLENGES.length; ci++) {
        var ch_ = CHALLENGES[ci];
        if (completedChallenges.indexOf(ci) < 0) {
          if (((selectedA === ch_.a && selectedB === ch_.b) || (selectedA === ch_.b && selectedB === ch_.a)) &&
              airDensity === ch_.air) {
            completedChallenges.push(ci);
          }
        }
      }

      // Update HUD
      updateHUD();
      document.getElementById('hudV4').textContent =
        Math.abs(objAState.landTime - objBState.landTime) < 0.05 ? t('tie') :
        (objAState.landTime < objBState.landTime ? t(oA.key) : t(oB.key));

      document.getElementById('statusLabel').textContent = t('statusDone');
      document.getElementById('statusVal').textContent =
        t(oA.key) + ': ' + objAState.landTime.toFixed(2) + 's | ' +
        t(oB.key) + ': ' + objBState.landTime.toFixed(2) + 's';

      if (completedChallenges.length >= CHALLENGES.length) {
        document.getElementById('statusResult').textContent = t('allDone');
        document.getElementById('statusResult').className = 'status-result pass';
      }

      document.getElementById('btnRelease').disabled = false;
      draw();
      return;
    }

    requestAnimationFrame(simStep);
  }

  requestAnimationFrame(simStep);
}

// ================================================================
// RESET
// ================================================================
function resetExperiment() {
  gamePhase = 'select';
  objAState = null;
  objBState = null;
  particles = [];
  document.getElementById('btnRelease').disabled = false;
  document.getElementById('statusLabel').textContent = t('statusReady');
  document.getElementById('statusVal').textContent = '';
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('hudV4').textContent = '--';

  // If we have a current challenge, pre-select its objects and air density
  if (trialCount < CHALLENGES.length) {
    var ch_ = CHALLENGES[trialCount];
    selectedA = ch_.a;
    selectedB = ch_.b;
    airDensity = ch_.air;
    document.getElementById('airSlider').value = airDensity;
    updateAirLabel();
    buildShelves();
  }

  updateHUD();
  draw();
}

// ================================================================
// CANVAS RESIZE
// ================================================================
function resizeCanvas() {
  var body = document.querySelector('.game-body');
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  cw = rect.width;
  ch = rect.height;
  canvas.width = cw * DPR;
  canvas.height = ch * DPR;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  c2d.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}

// ================================================================
// INIT
// ================================================================
function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  // Set CSS vars
  var r = document.documentElement;
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#7c5cbf');
  r.style.setProperty('--glow-strong', 'rgba(167,139,250,0.3)');

  initStars();
  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  // Slider
  var airSlider = document.getElementById('airSlider');
  airSlider.addEventListener('input', function() {
    airDensity = parseInt(airSlider.value, 10);
    updateAirLabel();
    draw();
  });

  // Buttons
  document.getElementById('btnRelease').addEventListener('click', startFall);
  document.getElementById('btnReset').addEventListener('click', resetExperiment);

  // Build shelves
  buildShelves();

  // Pre-select first challenge
  if (CHALLENGES.length > 0) {
    selectedA = CHALLENGES[0].a;
    selectedB = CHALLENGES[0].b;
    airDensity = CHALLENGES[0].air;
    airSlider.value = airDensity;
    updateAirLabel();
    buildShelves();
  }

  updateHUD();
  refreshI18N();

  // Resize
  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 500);
  document.fonts.ready.then(resizeCanvas);
}

init();
</script>
