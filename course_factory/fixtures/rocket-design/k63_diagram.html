<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;background:#07101a;color:#eef6ff;font-family:Helvetica,'Noto Sans SC',sans-serif}.wrap{min-height:100vh;padding:26px;background:radial-gradient(circle at 80% 0,rgba(78,214,255,.16),transparent 35%),linear-gradient(135deg,#07101a,#121827)}h1{font-size:22px;color:#4ed6ff;margin:0 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}article{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);padding:16px;min-height:120px}b{display:block;color:#ffd166;margin-bottom:10px}p{margin:0;line-height:1.55;color:rgba(255,255,255,.76)}.arrow{text-align:center;color:#4ed6ff;font-size:30px;margin:14px 0}</style></head><body><main class="wrap"><h1>减10克后的同推力发射对比：静态决策图</h1><div class="grid"><article><b>质量预算</b><p>按头锥、箭身、尾翼、胶水和回收系统拆分质量。</p></article><article><b>减重收益</b><p>记录原质量、目标质量和减重克数。</p></article><article><b>风险检查</b><p>每条减重都检查强度、重心、压心和制造难度。</p></article><article><b>采用决策</b><p>低风险先采用，高风险先做小样测试。</p></article></div><div class="arrow">检查顺序：观察 → 估算 → 测试 → 记录 → 修订</div></main></body></html>
