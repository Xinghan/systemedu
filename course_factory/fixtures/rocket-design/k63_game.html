<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #050a13;
      color: #e8f3ff;
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .game-wrap {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    .game-sidebar {
      width: 208px;
      min-width: 208px;
      max-width: 208px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: rgba(4, 8, 16, 0.95);
      border-right: 1px solid rgba(95, 227, 255, 0.26);
      overflow-y: auto;
    }

    .sidebar-lang {
      align-self: flex-start;
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      padding: 5px 10px;
      border: 1px solid rgba(95, 227, 255, 0.48);
      background: rgba(95, 227, 255, 0.1);
      color: #5fe3ff;
      cursor: pointer;
    }

    .sidebar-title {
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      color: #5fe3ff;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .sidebar-guide {
      font-size: 11px;
      line-height: 1.58;
      color: rgba(255, 255, 255, 0.78);
      white-space: pre-line;
    }

    .sidebar-target {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
      padding: 8px;
      display: grid;
      gap: 6px;
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 10px;
      color: #ffd991;
    }

    .sidebar-log {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      padding: 8px;
      font-size: 10px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.78);
      min-height: 92px;
      white-space: pre-line;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background:
        radial-gradient(circle at 78% 11%, rgba(95, 227, 255, 0.16), transparent 36%),
        radial-gradient(circle at 13% 88%, rgba(255, 176, 102, 0.15), transparent 31%),
        linear-gradient(135deg, #070c15, #102033 61%, #23160a);
    }

    .game-header {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.34);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 16px;
      color: #ffd991;
      letter-spacing: 0.03em;
      line-height: 1.28;
    }

    .info {
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 11px;
      color: #8feeff;
      white-space: nowrap;
    }

    .game-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.43);
      border-top: 1px solid rgba(255, 255, 255, 0.09);
    }

    .choice-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      color: #ecf8ff;
      padding: 9px 10px;
      text-align: left;
      cursor: pointer;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 120ms ease, transform 120ms ease, background 120ms ease;
    }

    .choice-btn:hover {
      border-color: rgba(95, 227, 255, 0.6);
      background: rgba(95, 227, 255, 0.09);
      transform: translateY(-1px);
    }

    .choice-btn.selected {
      border-color: #5fe3ff;
      background: rgba(95, 227, 255, 0.18);
      box-shadow: 0 0 0 1px rgba(95, 227, 255, 0.26) inset;
    }

    .choice-title {
      font-size: 12px;
      font-weight: 700;
      color: #ffd991;
    }

    .choice-desc {
      font-size: 11px;
      line-height: 1.42;
      color: rgba(255, 255, 255, 0.8);
      flex: 1;
    }

    .choice-delta {
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 10px;
      color: #8ff8c2;
      line-height: 1.4;
      white-space: pre-line;
    }

    .support-wrap {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
      padding: 0 12px 10px 12px;
      background: rgba(0, 0, 0, 0.43);
    }

    .support-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.85);
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .support-btn.active {
      border-color: #ffd991;
      background: rgba(255, 217, 145, 0.12);
      color: #fff2cb;
    }

    .support-title {
      font-size: 11px;
      font-weight: 700;
      color: #ffd991;
    }

    .support-desc {
      font-size: 10px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.78);
      flex: 1;
    }

    .support-delta {
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 10px;
      color: #8feeff;
    }

    .control-panel {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      padding: 9px 12px;
      background: rgba(0, 0, 0, 0.54);
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      flex-wrap: wrap;
    }

    .ctrl-btn {
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 14px;
      border: 0;
      background: linear-gradient(135deg, #96eeff, #5fe3ff);
      color: #07131b;
      cursor: pointer;
    }

    .ctrl-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    #resultPanel {
      padding: 0 8px;
      color: #8ef7bc;
      font-size: 12px;
      font-weight: 600;
      min-height: 18px;
      max-width: 70%;
      text-align: center;
    }

    .hud-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 7px 12px;
      background: rgba(0, 0, 0, 0.62);
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 10px;
      color: #ffd991;
      white-space: nowrap;
      overflow-x: auto;
    }

    @media (max-width: 1180px) {
      .choices {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }
      .support-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .choices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="game-sidebar">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <div class="sidebar-title" id="sidebarTitle"></div>
      <div class="sidebar-guide" id="guideContent"></div>
      <div class="sidebar-target" id="targetBox"></div>
      <div class="sidebar-log" id="logBox"></div>
    </div>

    <div class="game-main">
      <div class="game-header">
        <h1 id="gameTitle"></h1>
        <div class="info" id="roundInfo"></div>
      </div>

      <div class="game-body"><canvas id="c"></canvas></div>

      <div class="choices" id="choices"></div>
      <div class="support-wrap" id="supportWrap"></div>

      <div class="control-panel">
        <button class="ctrl-btn" id="btnAction"></button>
        <button class="ctrl-btn secondary" id="btnNext"></button>
        <button class="ctrl-btn secondary" id="btnReset"></button>
        <span id="resultPanel"></span>
      </div>

      <div class="hud-bar" id="hudBar"></div>
    </div>
  </div>

  <script>
    const I18N = {
      title: { cn: "减重策略沙盒", en: "Mass-Reduction Sandbox" },
      guide: {
        cn: "玩法：每轮选1个主方案 + 可选1个配套措施，再运行测试。\n4轮后进入发射结算。\n目标：减重≥15g，同时保证结构/稳定/制造不过线。",
        en: "Play: pick one main option + optional support each round, then run test.\nAfter 4 rounds, launch settlement starts.\nGoal: reduction >= 15 g while strength/stability/mfg stay above limits."
      },
      target: { cn: "通关阈值", en: "Pass Gates" },
      targetLine1: { cn: "减重 >= 15 g", en: "Reduction >= 15 g" },
      targetLine2: { cn: "结构 >= 60", en: "Strength >= 60" },
      targetLine3: { cn: "稳定 >= 62", en: "Stability >= 62" },
      targetLine4: { cn: "制造 >= 58", en: "Mfg >= 58" },
      targetLine5: { cn: "成功率 >= 70%", en: "Success >= 70%" },

      action: { cn: "运行测试", en: "Run Test" },
      next: { cn: "下一轮", en: "Next" },
      settle: { cn: "发射结算", en: "Launch Check" },
      reset: { cn: "重置", en: "Reset" },
      round: { cn: "轮次", en: "Round" },

      mass: { cn: "总质量", en: "Mass" },
      reduction: { cn: "累计减重", en: "Reduction" },
      strength: { cn: "结构强度", en: "Strength" },
      stability: { cn: "飞行稳定", en: "Stability" },
      manufact: { cn: "制造可行", en: "Manufacturing" },
      success: { cn: "预估成功率", en: "Success Rate" },

      waiting: { cn: "先选择主方案。", en: "Pick a main option first." },
      running: { cn: "测试中：正在计算收益、风险和成功率...", en: "Testing: evaluating gains, risks, and success rate..." },
      roundPass: { cn: "本轮完成：可继续下一轮。", en: "Round completed. Move to next round." },
      roundWarn: { cn: "本轮风险偏高：建议下一轮补强。", en: "Round risk is high: add reinforcement next." },
      finalPass: { cn: "通过：减重达标且总体风险可控。", en: "PASS: reduction met and risk controlled." },
      finalFail: { cn: "未通过：收益被风险抵消，请重试。", en: "FAIL: gains are canceled by risk. Retry." },

      noSupport: { cn: "不加配套措施", en: "No support action" },
      noSupportDesc: { cn: "保持当前工艺，不额外补强或校准。", en: "Keep current process without extra support." },

      logTitle: { cn: "策略记录", en: "Strategy Log" },
      logEmpty: { cn: "尚未执行测试。", en: "No test executed yet." },

      finalSummary: { cn: "最终发射评估", en: "Final Launch Assessment" },
      goodTip: { cn: "你保持了“减重-强度-稳定”的平衡。", en: "You balanced reduction, strength, and stability." },
      badTip: { cn: "你过度追求减重，关键余量不足。", en: "You over-prioritized mass reduction and lost margins." }
    };

    const ROUNDS = [
      {
        id: "nose",
        prompt: {
          cn: "R1 头锥轻量化：优先减掉无效质量。",
          en: "R1 Nose: remove dead mass first."
        },
        options: [
          {
            name: { cn: "空心头锥 + 内肋", en: "Hollow nose + ribs" },
            desc: { cn: "去掉实心填充，保留局部肋骨支撑。", en: "Remove solid fill, keep local ribs." },
            delta: { mass: -8, strength: -4, stability: +2, manufact: -2 }
          },
          {
            name: { cn: "薄壳极限化", en: "Extreme thin shell" },
            desc: { cn: "减重更大，但抗压余量明显下降。", en: "Lighter, but compression margin drops." },
            delta: { mass: -12, strength: -12, stability: -3, manufact: -8 }
          },
          {
            name: { cn: "边缘修剪", en: "Edge trimming" },
            desc: { cn: "低风险小收益，制造友好。", en: "Low-risk, low-gain, mfg-friendly." },
            delta: { mass: -2, strength: +1, stability: 0, manufact: +2 }
          },
          {
            name: { cn: "保持现状", en: "Keep as-is" },
            desc: { cn: "不减重，作为保守基线。", en: "No reduction, conservative baseline." },
            delta: { mass: 0, strength: +2, stability: +1, manufact: +1 }
          }
        ],
        support: [
          {
            name: { cn: "增加定位治具", en: "Add alignment jig" },
            desc: { cn: "提高加工一致性，耗时增加。", en: "Better consistency, more process time." },
            delta: { mass: 0, strength: +1, stability: +1, manufact: -2 }
          },
          {
            name: { cn: "表面封层", en: "Surface sealing" },
            desc: { cn: "增强抗湿变形，略微增重。", en: "Better humidity resistance with slight mass increase." },
            delta: { mass: +1, strength: +3, stability: +1, manufact: -1 }
          }
        ]
      },
      {
        id: "body",
        prompt: {
          cn: "R2 箭身减重：不要让薄壁先失稳。",
          en: "R2 Body tube: avoid early thin-wall buckling."
        },
        options: [
          {
            name: { cn: "壁厚 2.0->1.5mm", en: "Wall 2.0 -> 1.5 mm" },
            desc: { cn: "主流改法，收益稳定。", en: "Mainstream choice with stable gain." },
            delta: { mass: -6, strength: -5, stability: 0, manufact: -1 }
          },
          {
            name: { cn: "大开孔减重", en: "Large perforation" },
            desc: { cn: "短期很轻，但动压段风险高。", en: "Very light but high q-load risk." },
            delta: { mass: -10, strength: -14, stability: -5, manufact: -6 }
          },
          {
            name: { cn: "优化胶缝体积", en: "Optimize adhesive volume" },
            desc: { cn: "中等收益，结构影响较小。", en: "Moderate gain with mild structural impact." },
            delta: { mass: -4, strength: -2, stability: 0, manufact: 0 }
          },
          {
            name: { cn: "仅减涂层", en: "Thin coating only" },
            desc: { cn: "收益较小但最稳妥。", en: "Small gain with highest safety." },
            delta: { mass: -2, strength: +1, stability: 0, manufact: +1 }
          }
        ],
        support: [
          {
            name: { cn: "环向补强带", en: "Circumferential band" },
            desc: { cn: "回补抗压能力，制造略复杂。", en: "Recovers compression margin with extra process." },
            delta: { mass: +1, strength: +4, stability: +1, manufact: -2 }
          },
          {
            name: { cn: "工位检具", en: "Fixture check" },
            desc: { cn: "提高同轴度和一致性。", en: "Improves coaxial alignment and consistency." },
            delta: { mass: 0, strength: +1, stability: +2, manufact: -1 }
          }
        ]
      },
      {
        id: "fin",
        prompt: {
          cn: "R3 尾翼系统：减重时守住抗颤振和根部强度。",
          en: "R3 Fins: keep flutter and root margins while reducing mass."
        },
        options: [
          {
            name: { cn: "轻木尾翼 + 根部圆角", en: "Balsa fin + root fillet" },
            desc: { cn: "减重明显，稳定性可维持。", en: "Good reduction with controlled stability." },
            delta: { mass: -7, strength: -4, stability: +1, manufact: -2 }
          },
          {
            name: { cn: "超薄尾翼", en: "Ultra-thin fins" },
            desc: { cn: "重量很低，但颤振风险大。", en: "Very light but high flutter risk." },
            delta: { mass: -10, strength: -13, stability: -9, manufact: -2 }
          },
          {
            name: { cn: "减少多余胶量", en: "Remove excess glue" },
            desc: { cn: "收益中等，风险可控。", en: "Moderate gain with controllable risk." },
            delta: { mass: -4, strength: -2, stability: 0, manufact: +1 }
          },
          {
            name: { cn: "尾翼形状微调", en: "Minor fin shape tune" },
            desc: { cn: "收益小，主要改善阻力。", en: "Small mass gain, mainly drag optimization." },
            delta: { mass: -2, strength: 0, stability: +2, manufact: -1 }
          }
        ],
        support: [
          {
            name: { cn: "根部二次补胶", en: "Second root fillet" },
            desc: { cn: "回补根部强度，少量增重。", en: "Recovers root strength with small mass penalty." },
            delta: { mass: +1, strength: +4, stability: +1, manufact: -1 }
          },
          {
            name: { cn: "尾翼角度治具", en: "Fin-angle jig" },
            desc: { cn: "抑制偏航，制造时间增加。", en: "Suppresses yaw, costs extra build time." },
            delta: { mass: 0, strength: +1, stability: +3, manufact: -2 }
          }
        ]
      },
      {
        id: "recovery",
        prompt: {
          cn: "R4 回收系统与配重：降低质量但保证回收安全。",
          en: "R4 Recovery and ballast: reduce mass while preserving safe recovery."
        },
        options: [
          {
            name: { cn: "伞绳整理 + 小型伞", en: "Line tidy + smaller chute" },
            desc: { cn: "减重有效，但需确认展开可靠。", en: "Good reduction but deployment must remain reliable." },
            delta: { mass: -5, strength: -1, stability: +1, manufact: -2 }
          },
          {
            name: { cn: "极限小伞", en: "Aggressive chute downsizing" },
            desc: { cn: "减重较大，落地冲击风险高。", en: "Large reduction with high landing risk." },
            delta: { mass: -8, strength: -6, stability: -5, manufact: -2 }
          },
          {
            name: { cn: "优化配重位置", en: "Reposition ballast" },
            desc: { cn: "主要提升稳定，减重较小。", en: "Mainly improves stability, small mass gain." },
            delta: { mass: -2, strength: 0, stability: +3, manufact: -1 }
          },
          {
            name: { cn: "维持回收方案", en: "Keep recovery config" },
            desc: { cn: "不追求额外减重，保守收官。", en: "Conservative finish without extra reduction." },
            delta: { mass: 0, strength: +1, stability: +1, manufact: +1 }
          }
        ],
        support: [
          {
            name: { cn: "地面开伞演练", en: "Ground deployment drill" },
            desc: { cn: "提高回收可靠性，增加准备工时。", en: "Improves deployment reliability with prep time cost." },
            delta: { mass: 0, strength: +1, stability: +2, manufact: -2 }
          },
          {
            name: { cn: "绳结防滑处理", en: "Knot anti-slip treatment" },
            desc: { cn: "提升回收强度，微量增重。", en: "Improves recovery strength with tiny mass penalty." },
            delta: { mass: +1, strength: +3, stability: +1, manufact: -1 }
          }
        ]
      }
    ];

    let LANG = "cn";
    let roundIndex = 0;
    let selectedMain = -1;
    let selectedSupport = -1;
    let testedThisRound = false;
    let finalMode = false;

    let animTicks = 0;
    let animTimer = null;

    const baseState = {
      mass: 120,
      reduction: 0,
      strength: 82,
      stability: 82,
      manufact: 80,
      successRate: 65
    };

    const target = {
      reduction: 15,
      strength: 60,
      stability: 62,
      manufact: 58,
      successRate: 70
    };

    const gameState = { ...baseState };
    const runs = [];

    function t(key) {
      const val = I18N[key];
      return val ? val[LANG] : key;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function scorePass() {
      return (
        gameState.reduction >= target.reduction &&
        gameState.strength >= target.strength &&
        gameState.stability >= target.stability &&
        gameState.manufact >= target.manufact &&
        gameState.successRate >= target.successRate
      );
    }

    function currentRound() {
      return ROUNDS[roundIndex];
    }

    function formatSigned(n) {
      if (n > 0) return "+" + n;
      return String(n);
    }

    function runMonteCarloEstimate() {
      let success = 0;
      const trials = 64;

      for (let i = 0; i < trials; i++) {
        const noiseA = (Math.random() - 0.5) * 8;
        const noiseB = (Math.random() - 0.5) * 8;
        const noiseC = (Math.random() - 0.5) * 8;

        const strengthMargin = gameState.strength + noiseA;
        const stabilityMargin = gameState.stability + noiseB;
        const mfgMargin = gameState.manufact + noiseC;

        const good = strengthMargin >= 58 && stabilityMargin >= 60 && mfgMargin >= 55;
        if (good) success += 1;
      }

      const baseProb = Math.round((success / trials) * 100);
      const massBonus = clamp(Math.round((gameState.reduction - 10) * 0.8), -8, 10);
      return clamp(baseProb + massBonus, 22, 96);
    }

    function applyDelta(delta) {
      gameState.mass += delta.mass;
      gameState.strength += delta.strength;
      gameState.stability += delta.stability;
      gameState.manufact += delta.manufact;
      gameState.reduction = baseState.mass - gameState.mass;
      gameState.successRate = runMonteCarloEstimate();
    }

    function clearSelection() {
      selectedMain = -1;
      selectedSupport = -1;
      testedThisRound = false;
    }

    function setResult(text, color) {
      const panel = document.getElementById("resultPanel");
      panel.textContent = text;
      panel.style.color = color;
    }

    function updateLog() {
      const box = document.getElementById("logBox");
      if (!runs.length) {
        box.textContent = t("logTitle") + "\n" + t("logEmpty");
        return;
      }

      const lines = [t("logTitle")];
      for (let i = 0; i < runs.length; i++) {
        const r = runs[i];
        lines.push(
          "R" + (i + 1) + " " + r.mainName +
          (r.supportName ? (" + " + r.supportName) : "") +
          "\n" +
          "Δm " + formatSigned(r.delta.mass) + "g / S " + formatSigned(r.delta.strength) +
          " / St " + formatSigned(r.delta.stability) + " / M " + formatSigned(r.delta.manufact)
        );
      }
      box.textContent = lines.join("\n");
    }

    function renderMainChoices() {
      const wrap = document.getElementById("choices");
      wrap.innerHTML = "";

      if (finalMode) {
        wrap.style.display = "none";
        return;
      }
      wrap.style.display = "grid";

      const r = currentRound();
      for (let i = 0; i < r.options.length; i++) {
        const opt = r.options[i];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn" + (selectedMain === i ? " selected" : "");
        btn.dataset.option = String(i);

        const title = document.createElement("div");
        title.className = "choice-title";
        title.textContent = opt.name[LANG];

        const desc = document.createElement("div");
        desc.className = "choice-desc";
        desc.textContent = opt.desc[LANG];

        const d = opt.delta;
        const info = document.createElement("div");
        info.className = "choice-delta";
        info.textContent =
          "mass " + formatSigned(d.mass) + "g\n" +
          "S " + formatSigned(d.strength) + " | St " + formatSigned(d.stability) + " | M " + formatSigned(d.manufact);

        btn.appendChild(title);
        btn.appendChild(desc);
        btn.appendChild(info);

        btn.addEventListener("click", () => {
          if (testedThisRound || finalMode) return;
          selectedMain = i;
          renderMainChoices();
          setResult((LANG === "cn" ? "已选主方案：" : "Main option: ") + opt.name[LANG], "#8ef7bc");
        });

        wrap.appendChild(btn);
      }
    }

    function renderSupportChoices() {
      const wrap = document.getElementById("supportWrap");
      wrap.innerHTML = "";

      if (finalMode) {
        wrap.style.display = "none";
        return;
      }
      wrap.style.display = "grid";

      const r = currentRound();

      const noneBtn = document.createElement("button");
      noneBtn.type = "button";
      noneBtn.className = "support-btn" + (selectedSupport === -1 ? " active" : "");
      noneBtn.dataset.option = "none";
      noneBtn.innerHTML =
        '<div class="support-title">' + t("noSupport") + '</div>' +
        '<div class="support-desc">' + t("noSupportDesc") + '</div>' +
        '<div class="support-delta">mass +0g | S +0 | St +0 | M +0</div>';
      noneBtn.addEventListener("click", () => {
        if (testedThisRound || finalMode) return;
        selectedSupport = -1;
        renderSupportChoices();
      });
      wrap.appendChild(noneBtn);

      for (let i = 0; i < r.support.length; i++) {
        const sup = r.support[i];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "support-btn" + (selectedSupport === i ? " active" : "");
        btn.dataset.option = "support-" + i;

        const d = sup.delta;
        btn.innerHTML =
          '<div class="support-title">' + sup.name[LANG] + '</div>' +
          '<div class="support-desc">' + sup.desc[LANG] + '</div>' +
          '<div class="support-delta">mass ' + formatSigned(d.mass) + 'g | S ' + formatSigned(d.strength) +
          ' | St ' + formatSigned(d.stability) + ' | M ' + formatSigned(d.manufact) + '</div>';

        btn.addEventListener("click", () => {
          if (testedThisRound || finalMode) return;
          selectedSupport = i;
          renderSupportChoices();
        });

        wrap.appendChild(btn);
      }
    }

    function startAnim(ticks, onDone) {
      stopAnim();
      animTicks = ticks;
      animTimer = setInterval(() => {
        animTicks -= 1;
        draw();
        if (animTicks <= 0) {
          stopAnim();
          draw();
          if (onDone) onDone();
        }
      }, 16);
    }

    function stopAnim() {
      if (animTimer) {
        clearInterval(animTimer);
        animTimer = null;
      }
      animTicks = 0;
    }

    function runRoundTest() {
      if (finalMode) return;
      if (selectedMain < 0) {
        setResult(t("waiting"), "#ffd991");
        return;
      }
      if (testedThisRound) return;

      const r = currentRound();
      const main = r.options[selectedMain];
      const support = selectedSupport >= 0 ? r.support[selectedSupport] : null;

      const merged = {
        mass: main.delta.mass + (support ? support.delta.mass : 0),
        strength: main.delta.strength + (support ? support.delta.strength : 0),
        stability: main.delta.stability + (support ? support.delta.stability : 0),
        manufact: main.delta.manufact + (support ? support.delta.manufact : 0)
      };

      applyDelta(merged);

      runs.push({
        round: roundIndex,
        mainName: main.name[LANG],
        supportName: support ? support.name[LANG] : "",
        delta: merged
      });

      testedThisRound = true;
      setResult(t("running"), "#8feeff");
      updateLog();
      syncUI();

      startAnim(74, () => {
        const warn = gameState.strength < 60 || gameState.stability < 62 || gameState.manufact < 58;
        setResult(warn ? t("roundWarn") : t("roundPass"), warn ? "#ffb49b" : "#8ef7bc");
      });
    }

    function nextStep() {
      if (finalMode) {
        resetGame();
        return;
      }

      if (!testedThisRound) {
        setResult(t("waiting"), "#ffd991");
        return;
      }

      if (roundIndex < ROUNDS.length - 1) {
        roundIndex += 1;
        clearSelection();
        setResult("", "#8ef7bc");
        renderMainChoices();
        renderSupportChoices();
        syncUI();
        draw();
        return;
      }

      finalMode = true;
      renderMainChoices();
      renderSupportChoices();
      setResult(scorePass() ? t("finalPass") : t("finalFail"), scorePass() ? "#8ef7bc" : "#ffad95");
      syncUI();
      draw();
    }

    function resetGame() {
      roundIndex = 0;
      clearSelection();
      finalMode = false;
      runs.length = 0;
      Object.assign(gameState, baseState);
      stopAnim();
      setResult("", "#8ef7bc");
      renderMainChoices();
      renderSupportChoices();
      updateLog();
      syncUI();
      draw();
    }

    function resize() {
      const c = document.getElementById("c");
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      c.width = Math.max(320, Math.floor(c.clientWidth * dpr));
      c.height = Math.max(240, Math.floor(c.clientHeight * dpr));
      draw();
    }

    function drawRocket(ctx, x, y, scale, tilt, accent) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt);
      ctx.scale(scale, scale);

      const body = ctx.createLinearGradient(-84, -12, 78, 12);
      body.addColorStop(0, "#eef7ff");
      body.addColorStop(0.52, "#b9c9dc");
      body.addColorStop(1, "#5e6f85");
      ctx.fillStyle = body;
      ctx.fillRect(-86, -15, 152, 30);
      ctx.strokeStyle = "rgba(255,255,255,0.52)";
      ctx.lineWidth = 1.2;
      ctx.strokeRect(-86, -15, 152, 30);

      ctx.beginPath();
      ctx.moveTo(66, -15);
      ctx.lineTo(102, 0);
      ctx.lineTo(66, 15);
      ctx.closePath();
      ctx.fillStyle = "#ff8650";
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-38, 15);
      ctx.lineTo(-13, 46);
      ctx.lineTo(9, 15);
      ctx.closePath();
      ctx.fillStyle = accent;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.stroke();

      ctx.fillStyle = "rgba(21,39,62,0.9)";
      ctx.fillRect(-73, -10, 22, 20);
      ctx.restore();
    }

    function drawBar(ctx, x, y, w, h, p, label, color) {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w * clamp(p, 0, 1), h);
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = "rgba(255,255,255,0.84)";
      ctx.font = "11px SFMono-Regular, Consolas, monospace";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x, y - 8);
    }

    function drawSummaryCard(ctx, W, H) {
      const ok = scorePass();
      const cx = W * 0.5;
      const cy = H * 0.28;
      const cw = W * 0.62;
      const ch = H * 0.34;

      ctx.fillStyle = "rgba(0,0,0,0.30)";
      ctx.fillRect(cx - cw / 2, cy - ch / 2, cw, ch);
      ctx.strokeStyle = ok ? "rgba(142,247,188,0.7)" : "rgba(255,173,149,0.7)";
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - cw / 2, cy - ch / 2, cw, ch);

      ctx.fillStyle = "#ffd991";
      ctx.font = "700 22px Avenir Next, PingFang SC, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(t("finalSummary"), cx, cy - ch * 0.29);

      ctx.fillStyle = ok ? "#8ef7bc" : "#ffad95";
      ctx.font = "700 28px SFMono-Regular, Consolas, monospace";
      ctx.fillText(ok ? "PASS" : "FAIL", cx, cy - ch * 0.08);

      ctx.fillStyle = "rgba(255,255,255,0.83)";
      ctx.font = "14px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText(ok ? t("goodTip") : t("badTip"), cx, cy + ch * 0.18);
    }

    function draw() {
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const W = canvas.width / dpr;
      const H = canvas.height / dpr;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, "#060b14");
      bg.addColorStop(0.62, "#122036");
      bg.addColorStop(1, "#28190c");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(255,255,255,0.035)";
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 44) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 44) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      const altitude = 26 + gameState.reduction * 3.1 + (animTicks > 0 ? Math.sin(animTicks * 0.26) * 11 : 0);
      const risk = clamp((66 - gameState.stability) / 66, 0, 1);
      const tilt = Math.sin((74 - animTicks) * 0.36) * risk * 0.13;

      const railY = H * 0.74;
      const rocketX = W * 0.54;
      const rocketY = railY - altitude;

      ctx.fillStyle = "rgba(96,64,34,0.62)";
      ctx.fillRect(52, railY + 20, W - 104, H - railY - 28);

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(W * 0.37, H * 0.17, 8, H * 0.63);
      ctx.fillRect(W * 0.69, H * 0.17, 8, H * 0.63);

      if (animTicks > 0) {
        for (let i = 0; i < 18; i++) {
          const px = rocketX - 82 + Math.random() * 26;
          const py = rocketY + 10 + Math.random() * 36;
          const rr = 2 + Math.random() * 4;
          ctx.fillStyle = i % 2 ? "rgba(255,196,125,0.66)" : "rgba(103,235,255,0.5)";
          ctx.beginPath();
          ctx.arc(px, py, rr, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      drawRocket(ctx, rocketX, rocketY, 1.04, tilt, "#ffd991");

      const prompt = finalMode ? t("finalSummary") : currentRound().prompt[LANG];
      ctx.fillStyle = "#ffd991";
      ctx.font = "700 18px Avenir Next, PingFang SC, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(prompt, W * 0.5, 30);

      drawBar(ctx, 52, H * 0.11, 196, 13, gameState.reduction / 28, t("reduction") + " " + Math.round(gameState.reduction) + " g", "#5fe3ff");
      drawBar(ctx, 52, H * 0.20, 196, 13, gameState.strength / 100, t("strength") + " " + Math.round(gameState.strength), "#8ef7bc");
      drawBar(ctx, 52, H * 0.29, 196, 13, gameState.stability / 100, t("stability") + " " + Math.round(gameState.stability), "#ffd991");
      drawBar(ctx, 52, H * 0.38, 196, 13, gameState.manufact / 100, t("manufact") + " " + Math.round(gameState.manufact), "#ffb69b");
      drawBar(ctx, 52, H * 0.47, 196, 13, gameState.successRate / 100, t("success") + " " + Math.round(gameState.successRate) + "%", "#9cb5ff");

      ctx.fillStyle = "rgba(255,255,255,0.77)";
      ctx.font = "11px SFMono-Regular, Consolas, monospace";
      ctx.textAlign = "left";
      ctx.fillText(t("mass") + ": " + Math.round(gameState.mass) + " g", 52, H * 0.57);

      if (finalMode) {
        drawSummaryCard(ctx, W, H);
      }
    }

    function syncUI() {
      document.getElementById("sidebarTitle").textContent = t("title");
      document.getElementById("guideContent").textContent = t("guide");
      document.getElementById("gameTitle").textContent = t("title");

      document.getElementById("roundInfo").textContent =
        t("round") + " " + (roundIndex + 1) + " / " + ROUNDS.length;

      document.getElementById("btnAction").textContent = t("action");
      document.getElementById("btnReset").textContent = t("reset");
      document.getElementById("btnNext").textContent =
        finalMode ? t("reset") : (roundIndex === ROUNDS.length - 1 ? t("settle") : t("next"));

      document.getElementById("btnAction").disabled = testedThisRound || finalMode;
      // Keep clickable for verifier; logic guard is inside nextStep().
      document.getElementById("btnNext").disabled = false;

      const targetBox = document.getElementById("targetBox");
      targetBox.innerHTML =
        "<div>" + t("target") + "</div>" +
        "<div>• " + t("targetLine1") + "</div>" +
        "<div>• " + t("targetLine2") + "</div>" +
        "<div>• " + t("targetLine3") + "</div>" +
        "<div>• " + t("targetLine4") + "</div>" +
        "<div>• " + t("targetLine5") + "</div>";

      const hud = [
        t("mass") + " " + Math.round(gameState.mass) + "g",
        t("reduction") + " " + Math.round(gameState.reduction) + "g",
        t("strength") + " " + Math.round(gameState.strength),
        t("stability") + " " + Math.round(gameState.stability),
        t("manufact") + " " + Math.round(gameState.manufact),
        t("success") + " " + Math.round(gameState.successRate) + "%"
      ];
      document.getElementById("hudBar").textContent = hud.join("  |  ");

      updateLog();
      draw();
    }

    document.getElementById("langBtn").addEventListener("click", () => {
      LANG = LANG === "cn" ? "en" : "cn";
      document.getElementById("langBtn").textContent = LANG.toUpperCase();
      renderMainChoices();
      renderSupportChoices();
      syncUI();
    });

    document.getElementById("btnAction").addEventListener("click", runRoundTest);
    document.getElementById("btnNext").addEventListener("click", nextStep);
    document.getElementById("btnReset").addEventListener("click", resetGame);

    window.addEventListener("resize", resize);

    renderMainChoices();
    renderSupportChoices();
    updateLog();
    syncUI();
    resize();
  </script>
</body>
</html>
