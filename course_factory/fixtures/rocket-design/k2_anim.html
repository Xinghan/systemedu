<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* -- Outer: sidebar + main -- */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* -- Style switcher -- */
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* -- Sidebar text -- */
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* -- Main area: canvas + controls + hud -- */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* -- Controls + HUD -- */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, style switcher, title, guide -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script>

  i18n: {

    f2light:  {en:'LIGHT', cn:'\u8f7b'},

    f3line1:  {en:'Size and weight are two different things.', cn:'\u5927\u5c0f\u548c\u91cd\u91cf\u662f\u4e24\u4ef6\u4e0d\u540c\u7684\u4e8b\u3002'},
    f3line2:  {en:'Big things can be light.', cn:'\u5927\u7684\u4e1c\u897f\u53ef\u4ee5\u5f88\u8f7b\u3002'},

    // HUD labels
    hudObj:   {en:'OBJECT', cn:'\u7269\u4f53'},
    hudSize:  {en:'SIZE', cn:'\u5927\u5c0f'},

    // HUD values
    hBalloon: {en:'Balloon', cn:'\u6c14\u7403'},

    // Guide
    guideTitle:{en:'GUIDE', cn:'\u89c2\u770b\u6307\u5357'},
    g1:       {en:'Frame 1: See two objects side by side', cn:'\u7b2c1\u5e27\uff1a\u770b\u4e24\u4e2a\u7269\u4f53\u7684\u5927\u5c0f'},
    g2:       {en:'Frame 2: Compare their actual size', cn:'\u7b2c2\u5e27\uff1a\u6bd4\u8f83\u5b9e\u9645\u5927\u5c0f'},
    g3:       {en:'Frame 3: Weigh them on a scale', cn:'\u7b2c3\u5e27\uff1a\u79f0\u91cd\u91cf\u63ed\u6653\u7b54\u6848'},

// ============================================================
// CUSTOM DRAW: balloon and iron ball shapes
// ============================================================
function customDrawElement(ctx, el, W, H) {
  var mc = AnimRuntime.modeColors;

  if (el.type === 'balloon') {
    // Draw a balloon: oval body + string + highlight
    var r = el.r || 50;
    ctx.save();
    // Body
    ctx.beginPath();
    ctx.ellipse(el.x, el.y, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.fillStyle = el.fill || 'rgba(255,100,100,0.7)';
    ctx.fill();
    ctx.strokeStyle = el.stroke || mc.stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(el.x - r * 0.25, el.y - r * 0.3, r * 0.2, r * 0.35, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
    // Knot
    ctx.beginPath();
    ctx.moveTo(el.x, el.y + r);
    ctx.lineTo(el.x - 4, el.y + r + 6);
    ctx.lineTo(el.x + 4, el.y + r + 6);
    ctx.closePath();
    ctx.fillStyle = el.fill || 'rgba(255,100,100,0.9)';
    ctx.fill();
    // String
    ctx.beginPath();
    ctx.moveTo(el.x, el.y + r + 6);
    ctx.quadraticCurveTo(el.x + 8, el.y + r + 30, el.x - 3, el.y + r + 50);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
    return true;
  }

  if (el.type === 'ironball') {
    // Draw a metallic iron ball with shading
    var r = el.r || 18;
    ctx.save();
    // Shadow
    ctx.beginPath();
    ctx.ellipse(el.x + 2, el.y + r + 4, r * 0.7, r * 0.15, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
    // Body gradient
    var grad = ctx.createRadialGradient(el.x - r * 0.3, el.y - r * 0.3, 0, el.x, el.y, r);
    grad.addColorStop(0, '#b0b8c8');
    grad.addColorStop(0.5, '#6a7080');
    grad.addColorStop(1, '#3a3f4a');
    ctx.beginPath();
    ctx.arc(el.x, el.y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Specular highlight
    ctx.beginPath();
    ctx.arc(el.x - r * 0.3, el.y - r * 0.3, r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
    ctx.restore();
    return true;
  }

  if (el.type === 'scale_beam') {
    // Draw a simple balance scale showing weight difference
    var cx = el.x, cy = el.y;
    var bw = el.beamW || 200;
    var tilt = el.tilt || 0; // degrees, positive = left side down
    var angle = tilt * Math.PI / 180;
    var cosA = Math.cos(angle), sinA = Math.sin(angle);
    var pivotH = 60;

    ctx.save();
    // Base
    ctx.fillStyle = mc.dim;
    ctx.fillRect(cx - 35, cy, 70, 8);
    // Pivot triangle
    ctx.fillStyle = mc.accent;
    ctx.beginPath();
    ctx.moveTo(cx - 15, cy);
    ctx.lineTo(cx + 15, cy);
    ctx.lineTo(cx, cy - pivotH);
    ctx.fill();
    // Beam
    var lx = cx - bw / 2 * cosA;
    var ly = cy - pivotH + bw / 2 * sinA;
    var rx = cx + bw / 2 * cosA;
    var ry = cy - pivotH - bw / 2 * sinA;
    ctx.strokeStyle = mc.accent;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(rx, ry);
    ctx.stroke();
    // Pans (ellipses)
    var panR = 30;
    var panDrop = 20;
    // Left pan
    ctx.beginPath();
    ctx.ellipse(lx, ly + panDrop, panR, panR * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = mc.bg1 || '#0a0a0a';
    ctx.fill();
    ctx.strokeStyle = mc.accent;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Chains
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx - 20, ly); ctx.lineTo(lx - 20, ly + panDrop); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx + 20, ly); ctx.lineTo(lx + 20, ly + panDrop); ctx.stroke();
    // Right pan
    ctx.beginPath();
    ctx.ellipse(rx, ry + panDrop, panR, panR * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = mc.bg1 || '#0a0a0a';
    ctx.fill();
    ctx.strokeStyle = mc.accent;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx - 20, ry); ctx.lineTo(rx - 20, ry + panDrop); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx + 20, ry); ctx.lineTo(rx + 20, ry + panDrop); ctx.stroke();

    // Store pan positions for labels
    el._lx = lx; el._ly = ly + panDrop;
    el._rx = rx; el._ry = ry + panDrop;
    ctx.restore();
    return true;
  }

  return false;
}

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var mc = AnimRuntime.modeColors;
  var cx = W / 2, cy = H / 2;

  // Frame 0: Title
  if (f === 0) {
    return [
      {id:'title0', type:'label', text:t('title'), x:cx, y:cy - 50, color:mc.accent, size:28, align:'center', glow:P.glowStrong},
      {id:'sub0', type:'label', text:t('subtitle'), x:cx, y:cy, color:mc.dim, size:16, align:'center', bold:false},
      {id:'q0', type:'text', text:t('f0q'), x:cx, y:cy + 50, color:mc.text, size:14, align:'center'},
      // Decorative balloon on left
      {id:'balloon_deco', type:'balloon', x:cx - 120, y:cy - 20, r:35, fill:'rgba(255,120,90,0.6)', stroke:mc.strokeDim, alpha:0.6},
      // Decorative iron ball on right
      {id:'iron_deco', type:'ironball', x:cx + 120, y:cy - 10, r:14, alpha:0.6},
    ];
  }

  // Frame 1: Side by side comparison - big balloon vs tiny iron ball
  if (f === 1) {
    var leftX = cx - 140;
    var rightX = cx + 140;
    return [
      {id:'f1title', type:'label', text:t('f1title'), x:cx, y:30, color:mc.accent, size:16, align:'center'},
      // Big balloon
      {id:'balloon_main', type:'balloon', x:leftX, y:cy - 20, r:70, fill:'rgba(255,120,90,0.65)', stroke:mc.stroke},
      {id:'balloon_label', type:'label', text:t('balloon'), x:leftX, y:cy + 80, color:mc.text, size:14, align:'center'},
      {id:'balloon_size', type:'label', text:t('f1big'), x:leftX, y:cy + 100, color:mc.accent, size:18, align:'center', glow:P.glowStrong},
      // Tiny iron ball
      {id:'iron_main', type:'ironball', x:rightX, y:cy + 10, r:18},
      {id:'iron_label', type:'label', text:t('ironball'), x:rightX, y:cy + 50, color:mc.text, size:14, align:'center'},
      {id:'iron_size', type:'text', text:t('f1small'), x:rightX, y:cy + 70, color:mc.dim, size:12, align:'center'},
      // Question
      {id:'ask1', type:'text', text:t('f1ask'), x:cx, y:H - 30, color:mc.dim, size:13, align:'center'},
      // vs
      {id:'vs1', type:'label', text:'VS', x:cx, y:cy, color:mc.mute, size:22, align:'center', bold:true},
    ];
  }

  // Frame 2: Scale reveal - weighing both objects
  if (f === 2) {
    return [
      {id:'f2title', type:'label', text:t('f2title'), x:cx, y:30, color:mc.accent, size:16, align:'center'},
      // Scale tilting right (iron ball heavier)
      {id:'scale2', type:'scale_beam', x:cx, y:cy + 90, beamW:240, tilt:-18, alpha:1},
      // Balloon on left pan (goes up - light)
      {id:'balloon_pan', type:'balloon', x:cx - 100, y:cy - 30, r:30, fill:'rgba(255,120,90,0.55)', stroke:mc.strokeDim},
      {id:'bw_label', type:'label', text:t('f2bw'), x:cx - 100, y:cy + 15, color:mc.accent, size:16, align:'center'},
      {id:'bw_tag', type:'text', text:t('f2light'), x:cx - 100, y:cy + 35, color:mc.dim, size:11, align:'center'},
      // Iron ball on right pan (goes down - heavy)
      {id:'iron_pan', type:'ironball', x:cx + 100, y:cy + 30, r:18},
      {id:'iw_label', type:'label', text:t('f2iw'), x:cx + 100, y:cy + 60, color:mc.accent, size:16, align:'center'},
      {id:'iw_tag', type:'text', text:t('f2heavy'), x:cx + 100, y:cy + 80, color:mc.dim, size:11, align:'center'},
      // Arrow showing iron is heavier
      {id:'arrow_heavy', type:'arrow', x1:cx + 50, y1:cy + 110, x2:cx + 100, y2:cy + 100, color:mc.accent, lineWidth:2, headSize:8},
      // Reveal text
      {id:'reveal2', type:'label', text:t('f2reveal'), x:cx, y:H - 25, color:mc.text, size:14, align:'center'},
    ];
  }

  // Frame 3: Conclusion - size != weight
  if (f === 3) {
    return [
      {id:'f3title', type:'label', text:t('f3title'), x:cx, y:40, color:mc.accent, size:16, align:'center'},
      // Key message box
      {id:'keybox', type:'box', x:cx - 130, y:cy - 50, w:260, h:50, fill:'rgba(0,0,0,0)', stroke:mc.accent, lineWidth:2},
      {id:'f3key_text', type:'label', text:t('f3key'), x:cx, y:cy - 25, color:mc.accent, size:22, align:'center', glow:P.glowStrong},
      // Three lines of explanation
      {id:'line1', type:'text', text:t('f3line1'), x:cx, y:cy + 30, color:mc.text, size:14, align:'center'},
      {id:'line2', type:'text', text:t('f3line2'), x:cx, y:cy + 55, color:mc.dim, size:13, align:'center'},
      {id:'line3', type:'text', text:t('f3line3'), x:cx, y:cy + 80, color:mc.dim, size:13, align:'center'},
      // Small decorative objects
      {id:'balloon_small', type:'balloon', x:cx - 180, y:cy + 60, r:25, fill:'rgba(255,120,90,0.4)', stroke:mc.strokeDim, alpha:0.5},
      {id:'iron_small', type:'ironball', x:cx + 180, y:cy + 70, r:12, alpha:0.5},
      // Arrow: balloon -> "light"
      {id:'arr_b', type:'arrow', x1:cx - 155, y1:cy + 50, x2:cx - 130, y2:cy + 35, color:mc.dim, lineWidth:1, headSize:5},
      // Arrow: iron -> "heavy"
      {id:'arr_i', type:'arrow', x1:cx + 170, y1:cy + 58, x2:cx + 145, y2:cy + 45, color:mc.dim, lineWidth:1, headSize:5},
    ];
  }

  return [];
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
