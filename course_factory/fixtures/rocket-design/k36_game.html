<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#f97316));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.obj-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:5px 6px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.08em;text-transform:uppercase;flex:1;text-align:center;transition:all 0.2s;}
.obj-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.obj-btn.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.12);}
.obj-row{display:flex;gap:4px;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">WIND TUNNEL</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="objectLabel">OBJECT</div>
    <div class="obj-row" id="objRow">
      <button class="obj-btn active" data-obj="0" id="objBtn0"></button>
      <button class="obj-btn" data-obj="1" id="objBtn1"></button>
    </div>
    <div class="obj-row">
      <button class="obj-btn" data-obj="2" id="objBtn2"></button>
      <button class="obj-btn" data-obj="3" id="objBtn3"></button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="slider-group">
      <label id="speedLabel">WIND SPEED</label>
      <input type="range" id="speedSlider" min="0" max="120" value="30">
      <div class="val" id="speedVal">30 m/s</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="challengeLabel">CHALLENGE</div>
    <div class="sidebar-guide" id="challengeText" style="font-size:10px;"></div>
    <div id="btnArea"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">WIND TUNNEL LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ROUND</div><div class="hud-val" id="hudV1">1/6</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">SPEED</div><div class="hud-val" id="hudV2">30 m/s</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">DRAG</div><div class="hud-val" id="hudV3">-- N</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">Cd</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">SCORE</div><div class="hud-val" id="hudV5">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">EXPLORE THE WIND TUNNEL</span>
      <span class="status-val" id="statusTrials">0 / 6</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? 'rgba(249,115,22,0.06)' : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       { cn: 'WIND TUNNEL', en: 'WIND TUNNEL' },
  sub:         { cn: '风洞实验室', en: 'Wind Tunnel Lab' },
  guide:       { cn: '拖动滑块改变风速，观察阻力如何随速度变化。切换不同物体比较阻力系数Cd。完成6个挑战任务来掌握空气阻力公式。', en: 'Drag the slider to change wind speed. Observe how drag changes with velocity. Switch objects to compare drag coefficient Cd. Complete 6 challenges to master the drag formula.' },
  guideLabel:  { cn: 'GUIDE / 指南', en: 'GUIDE' },
  objectLabel: { cn: 'OBJECT / 物体', en: 'OBJECT' },
  speedLabel:  { cn: 'WIND SPEED / 风速', en: 'WIND SPEED' },
  challengeLabel: { cn: 'CHALLENGE / 挑战', en: 'CHALLENGE' },
  hudTag:      { cn: 'WIND TUNNEL LAB / 风洞实验室', en: 'WIND TUNNEL LAB' },
  hudRound:    { cn: '关卡', en: 'ROUND' },
  hudSpeed:    { cn: '风速', en: 'SPEED' },
  hudDrag:     { cn: '阻力', en: 'DRAG' },
  hudCd:       { cn: 'Cd', en: 'Cd' },

  statusExplore: { cn: '自由探索风洞', en: 'EXPLORE THE WIND TUNNEL' },

  ch2:         { cn: '在 50 m/s 风速下，哪个物体阻力最小? 选中它', en: 'At 50 m/s, which object has the lowest drag? Select it' },

  ch5:         { cn: '在 80 m/s 下，方块和球体的阻力差是多少? 切换比较', en: 'At 80 m/s, what is drag difference between cube and sphere? Compare them' },
  ch6:         { cn: '找到一个速度使平板阻力恰好超过 10 N', en: 'Find a speed where plate drag just exceeds 10 N' },
  formulaTitle:{ cn: '阻力公式', en: 'DRAG FORMULA' },
  tunnelLabel: { cn: '风洞', en: 'TUNNEL' },
  graphLabel:  { cn: 'F-v 曲线', en: 'F-v CURVE' },
  gaugeLabel:  { cn: '力计', en: 'GAUGE' },
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    if (typeof refreshI18N === 'function') refreshI18N();
  });
}

// ================================================================
// GAME CONFIG
// ================================================================
var RHO = 1.225; // air density kg/m^3
var A_REF = 0.01; // reference area m^2

var OBJECTS = [
  { key: 'sphere', cd: 0.47, color: '#60a5fa' },
  { key: 'plate',  cd: 1.28, color: '#f472b6' },
  { key: 'rocket', cd: 0.15, color: '#34d399' },
  { key: 'cube',   cd: 1.05, color: '#a78bfa' },
];

var objNames = ['objSphere','objPlate','objRocket','objCube'];

function calcDrag(cd, v) {
  return 0.5 * RHO * cd * A_REF * v * v;
}

// ================================================================
// STATE
// ================================================================
var curObj = 0;
var windSpeed = 30;
var round = 0; // 0 = free explore, 1-6 = challenges
var score = 0;
var roundPassed = false;
var gameComplete = false;
var particles = [];
var graphPoints = []; // {v, f} for current object
var lastFrameTime = 0;
var challengeStarted = false;

// Challenges
var CHALLENGES = [
  { key: 'ch1', objLock: 0, checkFn: function() {
    var drag = calcDrag(OBJECTS[0].cd, windSpeed);
    return Math.abs(drag - 2.0) < 0.3;
  }},
  { key: 'ch2', speedLock: 50, checkFn: function() {
    return curObj === 2; // rocket has lowest cd
  }},
  { key: 'ch3', objLock: 0, checkFn: function() {
    // at 50 m/s -> ratio is (50/10)^2 = 25
    return windSpeed >= 48 && windSpeed <= 52;
  }},
  { key: 'ch4', objLock: 2, checkFn: function() {
    var drag = calcDrag(OBJECTS[2].cd, windSpeed);
    return Math.abs(drag - 5.0) < 0.5;
  }},
  { key: 'ch5', speedLock: 80, checkFn: function() {
    // just need to have viewed both -- check if they toggled to cube or sphere
    var dCube = calcDrag(OBJECTS[3].cd, 80);
    var dSphere = calcDrag(OBJECTS[0].cd, 80);
    // Accept either object selected, player just needs to compare
    return curObj === 0 || curObj === 3;
  }},
  { key: 'ch6', objLock: 1, checkFn: function() {
    var drag = calcDrag(OBJECTS[1].cd, windSpeed);
    return drag > 10.0 && drag < 12.0;
  }},
];

var MAX_PARTICLES = 200;

function initParticles(w, h) {
  particles = [];
  for (var i = 0; i < MAX_PARTICLES; i++) {
    particles.push(makeParticle(w, h, true));
  }
}

function makeParticle(w, h, randomX) {
  var tunnelTop = h * 0.08;
  var tunnelBot = h * 0.62;
  return {
    x: randomX ? Math.random() * w : -Math.random() * 20,
    y: tunnelTop + Math.random() * (tunnelBot - tunnelTop),
    size: 1.5 + Math.random() * 2,
    alpha: 0.3 + Math.random() * 0.5,
  };
}

var cvs = document.getElementById('gc');
var ctx = cvs.getContext('2d');

function resizeCanvas() {
  var parent = cvs.parentElement;
  var dpr = window.devicePixelRatio || 1;
  var pw = parent.clientWidth;
  var ph = parent.clientHeight;
  cvs.width = pw * dpr;
  cvs.height = ph * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initParticles(pw, ph);
}

function getW() { return cvs.parentElement.clientWidth; }
function getH() { return cvs.parentElement.clientHeight; }

function drawTunnel(c, w, h) {
  var mc = gameModeColors();
  var tTop = h * 0.08;
  var tBot = h * 0.62;
  var tLeft = w * 0.02;
  var tRight = w * 0.62;

  // Tunnel body
  c.save();
  c.strokeStyle = mc.accent;
  c.lineWidth = 2;
  c.globalAlpha = 0.6;

  // Top wall
  c.beginPath();
  c.moveTo(tLeft, tTop);
  c.lineTo(tLeft + (tRight - tLeft) * 0.15, tTop);
  // Contraction
  c.quadraticCurveTo(tLeft + (tRight - tLeft) * 0.22, tTop + (tBot - tTop) * 0.1, tLeft + (tRight - tLeft) * 0.28, tTop + (tBot - tTop) * 0.12);
  c.lineTo(tLeft + (tRight - tLeft) * 0.72, tTop + (tBot - tTop) * 0.12);
  // Expansion
  c.quadraticCurveTo(tLeft + (tRight - tLeft) * 0.78, tTop + (tBot - tTop) * 0.1, tLeft + (tRight - tLeft) * 0.85, tTop);
  c.lineTo(tRight, tTop);
  c.stroke();

  // Bottom wall
  c.beginPath();
  c.moveTo(tLeft, tBot);
  c.lineTo(tLeft + (tRight - tLeft) * 0.15, tBot);
  c.quadraticCurveTo(tLeft + (tRight - tLeft) * 0.22, tBot - (tBot - tTop) * 0.1, tLeft + (tRight - tLeft) * 0.28, tBot - (tBot - tTop) * 0.12);
  c.lineTo(tLeft + (tRight - tLeft) * 0.72, tBot - (tBot - tTop) * 0.12);
  c.quadraticCurveTo(tLeft + (tRight - tLeft) * 0.78, tBot - (tBot - tTop) * 0.1, tLeft + (tRight - tLeft) * 0.85, tBot);
  c.lineTo(tRight, tBot);
  c.stroke();

  c.globalAlpha = 1;
  c.restore();

  // Tunnel label
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'left';
  c.fillText(t('tunnelLabel'), tLeft + 4, tTop - 4);
}

function drawObject(c, w, h) {
  var mc = gameModeColors();
  var obj = OBJECTS[curObj];
  var cx = w * 0.32;
  var tTop = h * 0.08;
  var tBot = h * 0.62;
  var cy = (tTop + tBot) / 2;
  var sz = Math.min(w, h) * 0.06;

  c.save();
  c.fillStyle = obj.color;
  c.strokeStyle = obj.color;
  c.lineWidth = 2;

  if (curObj === 0) {
    // Sphere
    c.beginPath();
    c.arc(cx, cy, sz, 0, Math.PI * 2);
    c.globalAlpha = 0.3;
    c.fill();
    c.globalAlpha = 1;
    c.stroke();
  } else if (curObj === 1) {
    // Flat plate
    c.globalAlpha = 0.3;
    c.fillRect(cx - 3, cy - sz, 6, sz * 2);
    c.globalAlpha = 1;
    c.strokeRect(cx - 3, cy - sz, 6, sz * 2);
  } else if (curObj === 2) {
    // Streamlined rocket
    c.beginPath();
    c.moveTo(cx - sz * 1.5, cy);
    c.quadraticCurveTo(cx - sz * 1.2, cy - sz * 0.5, cx - sz * 0.3, cy - sz * 0.4);
    c.lineTo(cx + sz * 0.8, cy - sz * 0.15);
    c.lineTo(cx + sz * 1.2, cy);
    c.lineTo(cx + sz * 0.8, cy + sz * 0.15);
    c.lineTo(cx - sz * 0.3, cy + sz * 0.4);
    c.quadraticCurveTo(cx - sz * 1.2, cy + sz * 0.5, cx - sz * 1.5, cy);
    c.closePath();
    c.globalAlpha = 0.3;
    c.fill();
    c.globalAlpha = 1;
    c.stroke();
    // Fins
    c.beginPath();
    c.moveTo(cx + sz * 0.6, cy - sz * 0.15);
    c.lineTo(cx + sz * 1.0, cy - sz * 0.5);
    c.lineTo(cx + sz * 1.2, cy);
    c.stroke();
    c.beginPath();
    c.moveTo(cx + sz * 0.6, cy + sz * 0.15);
    c.lineTo(cx + sz * 1.0, cy + sz * 0.5);
    c.lineTo(cx + sz * 1.2, cy);
    c.stroke();
  } else if (curObj === 3) {
    // Cube
    c.globalAlpha = 0.3;
    c.fillRect(cx - sz, cy - sz, sz * 2, sz * 2);
    c.globalAlpha = 1;
    c.strokeRect(cx - sz, cy - sz, sz * 2, sz * 2);
  }

  c.restore();

  // Object label
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillStyle = obj.color;
  c.textAlign = 'center';
  c.fillText(t(objNames[curObj]) + '  Cd=' + obj.cd.toFixed(2), cx, cy + sz + 18);
}

function drawParticles(c, w, h, dt) {
  var mc = gameModeColors();
  var tTop = h * 0.08;
  var tBot = h * 0.62;
  var speedFactor = windSpeed / 120;
  var baseSpeed = w * 0.3;
  var objCx = w * 0.32;
  var objCy = (tTop + tBot) / 2;
  var obj = OBJECTS[curObj];
  var sz = Math.min(w, h) * 0.06;

  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var vx = baseSpeed * speedFactor * dt;

    // Deflect around object
    var dx = p.x - objCx;
    var dy = p.y - objCy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var deflectR = sz * 1.8;
    if (dist < deflectR && dist > 0) {
      var pushStr = (1 - dist / deflectR) * 2.5;
      var ny = dy / dist;
      p.y += ny * pushStr * speedFactor * 60 * dt;
      vx *= 0.4 + 0.6 * (dist / deflectR);
    }

    p.x += vx;

    // Wrap
    if (p.x > w + 10) {
      p.x = -Math.random() * 20;
      p.y = tTop + Math.random() * (tBot - tTop);
    }
    // Keep in tunnel
    if (p.y < tTop + 5) p.y = tTop + 5;
    if (p.y > tBot - 5) p.y = tBot - 5;

    c.beginPath();
    c.arc(p.x, p.y, p.size * (0.5 + speedFactor * 0.5), 0, Math.PI * 2);
    c.fillStyle = mc.accent;
    c.globalAlpha = p.alpha * (0.3 + speedFactor * 0.7);
    c.fill();
  }
  c.globalAlpha = 1;

  // Speed streaks at high speeds
  if (windSpeed > 60) {
    c.strokeStyle = mc.accent;
    c.globalAlpha = (windSpeed - 60) / 120 * 0.3;
    c.lineWidth = 1;
    for (var j = 0; j < 8; j++) {
      var sy = tTop + 20 + Math.random() * (tBot - tTop - 40);
      var sx = Math.random() * w * 0.6;
      var sl = 10 + speedFactor * 30;
      c.beginPath();
      c.moveTo(sx, sy);
      c.lineTo(sx + sl, sy);
      c.stroke();
    }
    c.globalAlpha = 1;
  }
}

function drawForceGauge(c, w, h) {
  var mc = gameModeColors();
  var drag = calcDrag(OBJECTS[curObj].cd, windSpeed);
  var maxDrag = 15;
  var gaugeX = w * 0.68;
  var gaugeY = h * 0.08;
  var gaugeW = w * 0.06;
  var gaugeH = h * 0.54;

  // Label
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'center';
  c.fillText(t('gaugeLabel'), gaugeX + gaugeW / 2, gaugeY - 4);

  // Background
  c.fillStyle = mc.strokeDim;
  c.globalAlpha = 0.15;
  c.fillRect(gaugeX, gaugeY, gaugeW, gaugeH);
  c.globalAlpha = 1;

  // Border
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.strokeRect(gaugeX, gaugeY, gaugeW, gaugeH);

  // Fill
  var fillRatio = Math.min(drag / maxDrag, 1);
  var fillH = gaugeH * fillRatio;
  var gFill = c.createLinearGradient(gaugeX, gaugeY + gaugeH - fillH, gaugeX, gaugeY + gaugeH);
  gFill.addColorStop(0, mc.accent);
  gFill.addColorStop(1, OBJECTS[curObj].color);
  c.fillStyle = gFill;
  c.globalAlpha = 0.7;
  c.fillRect(gaugeX + 2, gaugeY + gaugeH - fillH, gaugeW - 4, fillH);
  c.globalAlpha = 1;

  // Scale marks
  c.font = "9px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'right';
  for (var n = 0; n <= 15; n += 3) {
    var my = gaugeY + gaugeH - (n / maxDrag) * gaugeH;
    c.fillText(n + 'N', gaugeX - 4, my + 3);
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.beginPath();
    c.moveTo(gaugeX, my);
    c.lineTo(gaugeX + 4, my);
    c.stroke();
  }

  // Value
  c.font = "bold 14px 'JetBrains Mono',monospace";
  c.fillStyle = mc.accent;
  c.textAlign = 'center';
  c.fillText(drag.toFixed(2) + ' N', gaugeX + gaugeW / 2, gaugeY + gaugeH + 18);
}

function drawGraph(c, w, h) {
  var mc = gameModeColors();
  var gx = w * 0.78;
  var gy = h * 0.08;
  var gw = w * 0.20;
  var gh = h * 0.54;
  var maxV = 120;
  var maxF = 12;

  // Label
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'center';
  c.fillText(t('graphLabel'), gx + gw / 2, gy - 4);

  // Background
  c.fillStyle = mc.strokeDim;
  c.globalAlpha = 0.08;
  c.fillRect(gx, gy, gw, gh);
  c.globalAlpha = 1;

  // Axes
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(gx, gy);
  c.lineTo(gx, gy + gh);
  c.lineTo(gx + gw, gy + gh);
  c.stroke();

  // Axis labels
  c.font = "8px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'center';
  c.fillText('v (m/s)', gx + gw / 2, gy + gh + 14);
  c.save();
  c.translate(gx - 10, gy + gh / 2);
  c.rotate(-Math.PI / 2);
  c.fillText('F (N)', 0, 0);
  c.restore();

  // Axis ticks
  c.font = "7px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.textAlign = 'center';
  for (var vt = 0; vt <= maxV; vt += 30) {
    var tx = gx + (vt / maxV) * gw;
    c.fillText(vt.toString(), tx, gy + gh + 8);
  }
  c.textAlign = 'right';
  for (var ft = 0; ft <= maxF; ft += 3) {
    var ty = gy + gh - (ft / maxF) * gh;
    c.fillText(ft.toString(), gx - 3, ty + 3);
  }

  // Draw theoretical v^2 curve (faint)
  var obj = OBJECTS[curObj];
  c.strokeStyle = obj.color;
  c.globalAlpha = 0.25;
  c.lineWidth = 1;
  c.setLineDash([4, 4]);
  c.beginPath();
  for (var vi = 0; vi <= maxV; vi += 2) {
    var fi = calcDrag(obj.cd, vi);
    var px = gx + (vi / maxV) * gw;
    var py = gy + gh - Math.min(fi / maxF, 1) * gh;
    if (vi === 0) c.moveTo(px, py); else c.lineTo(px, py);
  }
  c.stroke();
  c.setLineDash([]);
  c.globalAlpha = 1;

  // Plot collected points
  for (var pi = 0; pi < graphPoints.length; pi++) {
    var pt = graphPoints[pi];
    var ptx = gx + (pt.v / maxV) * gw;
    var pty = gy + gh - Math.min(pt.f / maxF, 1) * gh;
    c.beginPath();
    c.arc(ptx, pty, 3, 0, Math.PI * 2);
    c.fillStyle = obj.color;
    c.globalAlpha = 0.6;
    c.fill();
  }
  c.globalAlpha = 1;

  // Current point (bright)
  var curF = calcDrag(obj.cd, windSpeed);
  var cpx = gx + (windSpeed / maxV) * gw;
  var cpy = gy + gh - Math.min(curF / maxF, 1) * gh;
  c.beginPath();
  c.arc(cpx, cpy, 5, 0, Math.PI * 2);
  c.fillStyle = mc.accent;
  c.fill();
  if (mc.glow) {
    c.beginPath();
    c.arc(cpx, cpy, 10, 0, Math.PI * 2);
    c.strokeStyle = mc.accent;
    c.globalAlpha = 0.3;
    c.stroke();
    c.globalAlpha = 1;
  }
}

  c.fillText('v = ' + windSpeed + ' m/s', fx, fy + 56);

  c.font = "bold 13px 'JetBrains Mono',monospace";

    c.fillText('F(10)=' + f10.toFixed(3) + 'N   F(50)=' + f50.toFixed(3) + 'N   ratio=' + (f50/f10).toFixed(1) + 'x', fx, fy + 96);

function drawChallengeOverlay(c, w, h) {
  if (round === 0 || gameComplete) return;
  var mc = gameModeColors();

  // Challenge box at bottom-right
  var bw = Math.min(w * 0.4, 340);
  var bh = 60;
  var bx = w - bw - 20;
  var by = h * 0.72;

  c.fillStyle = mc.bg1;
  c.globalAlpha = 0.85;
  c.fillRect(bx, by, bw, bh);
  c.globalAlpha = 1;
  c.strokeStyle = mc.accent;
  c.lineWidth = 1;
  c.strokeRect(bx, by, bw, bh);

  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillStyle = mc.accent;
  c.textAlign = 'left';
  c.fillText('CHALLENGE ' + round + '/6', bx + 10, by + 16);

  c.font = "11px 'Noto Sans SC','Inter',sans-serif";
  c.fillStyle = mc.text;
  // Word wrap
  var txt = t(CHALLENGES[round - 1].key);
  var maxW = bw - 20;
  var words = txt.split('');
  var line = '';
  var ly = by + 34;
  for (var wi = 0; wi < words.length; wi++) {
    var test = line + words[wi];
    if (c.measureText(test).width > maxW && line.length > 0) {
      c.fillText(line, bx + 10, ly);
      line = words[wi];
      ly += 15;
    } else {
      line = test;
    }
  }
  if (line) c.fillText(line, bx + 10, ly);

  // Result feedback
  if (roundPassed) {
    c.font = "bold 14px 'JetBrains Mono',monospace";
    c.fillStyle = '#22c55e';
    c.textAlign = 'center';
    c.fillText(t('correct'), w / 2, h * 0.92);
  }
}

function drawComplete(c, w, h) {
  if (!gameComplete) return;
  var mc = gameModeColors();
  c.font = "bold 18px 'JetBrains Mono','Noto Sans SC',monospace";
  c.fillStyle = '#22c55e';
  c.textAlign = 'center';
  c.fillText(t('complete'), w / 2, h * 0.88);
  c.font = "bold 28px 'JetBrains Mono',monospace";
  c.fillText(score + ' / 6', w / 2, h * 0.94);
}

// ================================================================
// MAIN DRAW
// ================================================================
function draw(timestamp) {
  var dt = (timestamp - lastFrameTime) / 1000;
  if (dt > 0.1) dt = 0.016;
  lastFrameTime = timestamp;

  var w = getW();
  var h = getH();

  drawGameBg(ctx, w, h);
  drawTunnel(ctx, w, h);
  drawParticles(ctx, w, h, dt);
  drawObject(ctx, w, h);
  drawForceGauge(ctx, w, h);
  drawGraph(ctx, w, h);
  drawFormula(ctx, w, h);
  drawChallengeOverlay(ctx, w, h);
  drawComplete(ctx, w, h);

  requestAnimationFrame(draw);
}

  if (graphPoints.length >= 40) graphPoints.shift();

}

function selectObject(idx) {
  // Check if locked by challenge
  if (round > 0 && round <= 6) {
    var ch = CHALLENGES[round - 1];
    if (ch.objLock !== undefined && ch.objLock !== idx) return;
  }
  curObj = idx;
  graphPoints = [];
  lastRecordedSpeed = -1;
  document.querySelectorAll('.obj-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.obj) === idx);
  });
  recordPoint();
  updateHUD();
}

function applyChallengeLocks() {
  if (round === 0 || round > 6) return;
  var ch = CHALLENGES[round - 1];
  if (ch.objLock !== undefined) {
    selectObject(ch.objLock);
  }
  if (ch.speedLock !== undefined) {
    windSpeed = ch.speedLock;
    document.getElementById('speedSlider').value = windSpeed;
    document.getElementById('speedSlider').disabled = true;
  } else {
    document.getElementById('speedSlider').disabled = false;
  }
}

// ================================================================
// CHALLENGE SYSTEM
// ================================================================
function startChallenges() {
  round = 1;
  score = 0;
  roundPassed = false;
  gameComplete = false;
  challengeStarted = true;
  showCheckBtn();
  applyChallengeLocks();
  updateChallengeText();
  updateHUD();
  refreshI18N();
}

function checkAnswer() {
  if (round === 0 || round > 6 || roundPassed) return;
  var ch = CHALLENGES[round - 1];
  var pass = ch.checkFn();
  if (pass) {
    roundPassed = true;
    score++;
    document.getElementById('statusResult').textContent = t('correct');
    document.getElementById('statusResult').className = 'status-result pass';
    showNextBtn();
  } else {
    document.getElementById('statusResult').textContent = t('wrong');
    document.getElementById('statusResult').className = 'status-result fail';
    setTimeout(function() {
      document.getElementById('statusResult').textContent = '';
    }, 1500);
  }
  updateHUD();
}

function nextRound() {
  roundPassed = false;
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('speedSlider').disabled = false;

  if (round >= 6) {
    gameComplete = true;
    hideActionBtns();
    updateChallengeText();
    updateHUD();
    return;
  }

  round++;
  showCheckBtn();
  graphPoints = [];
  lastRecordedSpeed = -1;
  applyChallengeLocks();
  updateChallengeText();
  updateHUD();
  refreshI18N();
}

function resetGame() {
  round = 0;
  score = 0;
  roundPassed = false;
  gameComplete = false;
  challengeStarted = false;
  windSpeed = 30;
  curObj = 0;
  graphPoints = [];
  lastRecordedSpeed = -1;
  document.getElementById('speedSlider').value = 30;
  document.getElementById('speedSlider').disabled = false;
  showCheckBtn();
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  selectObject(0);
  updateChallengeText();
  updateHUD();
  refreshI18N();
}

// ================================================================
// EVENT HANDLERS
// ================================================================
var slider = document.getElementById('speedSlider');
slider.addEventListener('input', function() {
  windSpeed = parseInt(this.value);
  recordPoint();
  updateHUD();
});

// Touch support for slider
slider.addEventListener('touchstart', function(e) { e.stopPropagation(); }, { passive: true });
slider.addEventListener('touchmove', function(e) { e.stopPropagation(); }, { passive: true });

document.querySelectorAll('.obj-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    selectObject(parseInt(this.dataset.obj));
  });
});

document.getElementById('btnReset').addEventListener('click', resetGame);

function onModeChange() {
  // redraw happens in animation loop
}

// ================================================================
// RESIZE
// ================================================================
var resizeTimer = 0;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeCanvas, 100);
});

// ================================================================
// INIT
// ================================================================
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();
resizeCanvas();
refreshI18N();
recordPoint();
updateHUD();

// Auto-start challenges after a brief explore period
setTimeout(function() {
  if (!challengeStarted) {
    startChallenges();
  }
}, 800);

requestAnimationFrame(draw);

</script>
</body>
</html>
