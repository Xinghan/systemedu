<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* -- Outer: sidebar + main -- */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* -- Style switcher -- */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* -- Sidebar text -- */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* -- Buttons -- */
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
/* -- Main area -- */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">BALANCE LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">BALANCE LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">COMPARED</div><div class="hud-val" id="hudV1">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">SCORE</div><div class="hud-val" id="hudV2">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">OBJECTS</div><div class="hud-val" id="hudV3">8</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316'; // mech orange

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,mc.accent.replace(/[\d.]+\)$/,'0.06)'));rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'BALANCE LAB', cn:'\u5929\u79e4\u5b9e\u9a8c\u5ba4'},
  subtitle:  {en:'Drag objects to compare weight', cn:'\u62d6\u62fd\u7269\u54c1\u6bd4\u8f83\u8f7b\u91cd'},
  guide:     {en:'Drag objects from the shelf onto the left or right pan of the balance scale. The scale tilts toward the heavier side. Bigger does not always mean heavier!', cn:'\u4ece\u67b6\u5b50\u4e0a\u62d6\u52a8\u7269\u54c1\u5230\u5929\u79e4\u7684\u5de6\u53f3\u6258\u76d8\u4e0a\u3002\u5929\u79e4\u4f1a\u5411\u91cd\u7684\u4e00\u8fb9\u503e\u659c\u3002\u5927\u4e0d\u4e00\u5b9a\u91cd\uff01'},
  guideLabel:{en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  compared:  {en:'COMPARED', cn:'\u5df2\u6bd4\u8f83'},
  score:     {en:'SCORE', cn:'\u5f97\u5206'},
  objects:   {en:'OBJECTS', cn:'\u7269\u54c1'},
  status:    {en:'STATUS', cn:'\u72b6\u6001'},
  dragHint:  {en:'Drag an object to a pan', cn:'\u62d6\u52a8\u7269\u54c1\u5230\u6258\u76d8\u4e0a'},
  leftPan:   {en:'LEFT', cn:'\u5de6'},
  rightPan:  {en:'RIGHT', cn:'\u53f3'},
  heavier:   {en:' is heavier!', cn:'\u66f4\u91cd\uff01'},
  lighter:   {en:' is lighter!', cn:'\u66f4\u8f7b\uff01'},
  equal:     {en:'About the same weight!', cn:'\u5dee\u4e0d\u591a\u91cd\uff01'},
  surprise:  {en:'Big but light! Size and weight are different!', cn:'\u5927\u4f46\u662f\u8f7b\uff01\u5927\u5c0f\u548c\u91cd\u91cf\u771f\u7684\u4e0d\u4e00\u6837\uff01'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  shelf:     {en:'SHELF', cn:'\u67b6\u5b50'},
  grams:     {en:'g', cn:'\u514b'},
  waiting:   {en:'Place two objects to compare', cn:'\u653e\u4e24\u4e2a\u7269\u54c1\u5f00\u59cb\u6bd4\u8f83'},
  allDone:   {en:'All compared! Great job!', cn:'\u5168\u90e8\u6bd4\u8f83\u5b8c\u6210\uff01\u771f\u68d2\uff01'},
};
function t(k) { return (I18N[k] && I18N[k][LANG]) || (I18N[k] && I18N[k]['en']) || k; }

// ================================================================
// GAME DATA
// ================================================================
var OBJECTS = [
  {id:'feather',  name:{en:'Feather',      cn:'\u7fbd\u6bdb'},     weight:1,   visualSize:2.0, color:'#e8e0d0'},
  {id:'balloon',  name:{en:'Balloon',      cn:'\u6c14\u7403'},     weight:3,   visualSize:3.5, color:'#ff6b6b'},
  {id:'coin',     name:{en:'Coin',         cn:'\u786c\u5e01'},     weight:8,   visualSize:1.0, color:'#ffd700'},
  {id:'sponge',   name:{en:'Sponge',       cn:'\u6d77\u7ef5'},     weight:15,  visualSize:3.0, color:'#98d8c8'},
  {id:'apple',    name:{en:'Apple',        cn:'\u82f9\u679c'},     weight:200, visualSize:2.5, color:'#e74c3c'},
  {id:'ironball', name:{en:'Iron Ball',    cn:'\u94c1\u7403'},     weight:310, visualSize:1.5, color:'#7f8c8d'},
  {id:'bottle',   name:{en:'Water Bottle', cn:'\u6c34\u74f6'},     weight:500, visualSize:2.8, color:'#3498db'},
  {id:'rock',     name:{en:'Rock',         cn:'\u77f3\u5934'},     weight:450, visualSize:2.2, color:'#8b7355'},
];

// ================================================================
// GAME STATE
// ================================================================
var cv, ctx, W, H, DPR;
var leftPanObj = null, rightPanObj = null;
var comparisons = 0, totalScore = 0;
var tiltAngle = 0, targetTilt = 0;
var dragObj = null, dragOffX = 0, dragOffY = 0, dragScreenX = 0, dragScreenY = 0;
var shelfSlots = []; // {obj, x, y, w, h} for each object on shelf
var leftDropZone = {}, rightDropZone = {};
var feedbackMsg = '';
var feedbackTimer = null;
var comparedPairs = {}; // track unique pairs compared

function init() {
  cv = document.getElementById('gc');
  ctx = cv.getContext('2d');
  DPR = Math.min(window.devicePixelRatio || 1, 2);

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  resize();
  window.addEventListener('resize', resize);

  // Pointer events on canvas
  cv.addEventListener('pointerdown', onPointerDown);
  cv.addEventListener('pointermove', onPointerMove);
  cv.addEventListener('pointerup', onPointerUp);
  cv.addEventListener('pointercancel', onPointerUp);

  document.getElementById('resetBtn').addEventListener('click', resetGame);

  refreshI18N();
  requestAnimationFrame(gameLoop);
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('compared');
  document.getElementById('hudL2').textContent = t('score');
  document.getElementById('hudL3').textContent = t('objects');
  document.getElementById('resetBtn').textContent = t('reset');
  document.getElementById('statusLabel').textContent = t('status');
  updateHUD();
}

function onModeChange() {
  // redraw on mode change
}

function resize() {
  var wrap = cv.parentElement;
  var r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
  if (W < 1 || H < 1) return;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  computeLayout();
}

function computeLayout() {
  // Scale occupies upper 60% of canvas
  // Shelf occupies bottom 30%
  var scaleY = H * 0.45;
  var beamW = Math.min(W * 0.55, 280);
  var scaleCX = W / 2;

  // Drop zones for pans
  leftDropZone = {x: scaleCX - beamW / 2 - 50, y: scaleY - 100, w: 100, h: 120};
  rightDropZone = {x: scaleCX + beamW / 2 - 50, y: scaleY - 100, w: 100, h: 120};

  // Shelf slots
  var shelfY = H * 0.78;
  var slotW = Math.min(W / (OBJECTS.length + 1), 80);
  var totalW = slotW * OBJECTS.length;
  var startX = (W - totalW) / 2;

  shelfSlots = [];
  for (var i = 0; i < OBJECTS.length; i++) {
    var obj = OBJECTS[i];
    // Skip objects currently on pans
    if ((leftPanObj && leftPanObj.id === obj.id) || (rightPanObj && rightPanObj.id === obj.id)) {
      shelfSlots.push(null);
      continue;
    }
    shelfSlots.push({
      obj: obj,
      x: startX + i * slotW,
      y: shelfY - 20,
      w: slotW,
      h: 50,
    });
  }
}

// ================================================================
// POINTER HANDLING (drag & drop)
// ================================================================
function onPointerDown(e) {
  e.preventDefault();
  var rect = cv.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  // Check if clicking on a shelf object
  for (var i = 0; i < shelfSlots.length; i++) {
    var slot = shelfSlots[i];
    if (!slot) continue;
    if (mx >= slot.x && mx <= slot.x + slot.w && my >= slot.y && my <= slot.y + slot.h) {
      dragObj = slot.obj;
      dragScreenX = mx;
      dragScreenY = my;
      cv.setPointerCapture(e.pointerId);
      return;
    }
  }

  // Check if clicking on left pan object (to remove it)
  if (leftPanObj && isNearPan('left', mx, my)) {
    var removed = leftPanObj;
    leftPanObj = null;
    targetTilt = 0;
    computeLayout();
    return;
  }
  // Check right pan
  if (rightPanObj && isNearPan('right', mx, my)) {
    var removed2 = rightPanObj;
    rightPanObj = null;
    targetTilt = 0;
    computeLayout();
    return;
  }
}

function onPointerMove(e) {
  if (!dragObj) return;
  var rect = cv.getBoundingClientRect();
  dragScreenX = e.clientX - rect.left;
  dragScreenY = e.clientY - rect.top;
}

function onPointerUp(e) {
  if (!dragObj) return;
  var rect = cv.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  // Check drop on left pan
  if (hitZone(mx, my, leftDropZone)) {
    placeOnPan('left', dragObj);
  }
  // Check drop on right pan
  else if (hitZone(mx, my, rightDropZone)) {
    placeOnPan('right', dragObj);
  }

  dragObj = null;
  computeLayout();
}

function hitZone(x, y, zone) {
  return x >= zone.x && x <= zone.x + zone.w && y >= zone.y && y <= zone.y + zone.h;
}

function isNearPan(side, mx, my) {
  var zone = side === 'left' ? leftDropZone : rightDropZone;
  return hitZone(mx, my, zone);
}

function placeOnPan(side, obj) {
  if (side === 'left') {
    leftPanObj = obj;
  } else {
    rightPanObj = obj;
  }

  if (leftPanObj && rightPanObj) {
    doComparison();
  } else {
    targetTilt = 0;
  }
}

function doComparison() {
  var pairKey = [leftPanObj.id, rightPanObj.id].sort().join('-');
  var isNew = !comparedPairs[pairKey];
  comparedPairs[pairKey] = true;

  comparisons++;
  if (isNew) totalScore += 10;

  var diff = leftPanObj.weight - rightPanObj.weight;
  var maxTilt = 20;

  if (Math.abs(diff) < 3) {
    targetTilt = 0;
    showFeedback(t('equal'));
  } else if (diff > 0) {
    targetTilt = Math.min(maxTilt, diff / 20 + 5);
    var heavierName = leftPanObj.name[LANG];
    showFeedback(heavierName + t('heavier') + ' (' + leftPanObj.weight + t('grams') + ' vs ' + rightPanObj.weight + t('grams') + ')');
  } else {
    targetTilt = -Math.min(maxTilt, Math.abs(diff) / 20 + 5);
    var heavierName2 = rightPanObj.name[LANG];
    showFeedback(heavierName2 + t('heavier') + ' (' + rightPanObj.weight + t('grams') + ' vs ' + leftPanObj.weight + t('grams') + ')');
  }

  // Surprise detection: big visual but lighter
  var big = leftPanObj.visualSize > rightPanObj.visualSize ? leftPanObj : rightPanObj;
  var small = leftPanObj.visualSize > rightPanObj.visualSize ? rightPanObj : leftPanObj;
  if (big.weight < small.weight && big.visualSize - small.visualSize >= 1.0) {
    setTimeout(function() { showFeedback(t('surprise')); }, 2000);
  }

  updateHUD();
}

function showFeedback(msg) {
  feedbackMsg = msg;
  if (feedbackTimer) clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(function() { feedbackMsg = ''; }, 3000);
}

function resetGame() {
  leftPanObj = null;
  rightPanObj = null;
  comparisons = 0;
  totalScore = 0;
  tiltAngle = 0;
  targetTilt = 0;
  feedbackMsg = '';
  comparedPairs = {};
  computeLayout();
  updateHUD();
}

function updateHUD() {
  document.getElementById('hudV1').textContent = comparisons;
  document.getElementById('hudV2').textContent = totalScore;
  document.getElementById('hudV3').textContent = OBJECTS.length;
  var statusText = feedbackMsg || (leftPanObj || rightPanObj ? t('waiting') : t('dragHint'));
  document.getElementById('statusVal').textContent = statusText;
}

// ================================================================
// GAME LOOP + DRAWING
// ================================================================
function gameLoop() {
  // Smooth tilt animation
  tiltAngle += (targetTilt - tiltAngle) * 0.08;
  drawScene();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function drawScene() {
  var mc = gameModeColors();
  drawGameBg(ctx, W, H);

  var scaleCX = W / 2;
  var scaleY = H * 0.45;
  var beamW = Math.min(W * 0.55, 280);
  var pivotH = Math.min(H * 0.2, 80);
  var angle = tiltAngle * Math.PI / 180;
  var cosA = Math.cos(angle), sinA = Math.sin(angle);

  var leftX = scaleCX - beamW / 2 * cosA;
  var leftY = scaleY - pivotH + beamW / 2 * sinA;
  var rightX = scaleCX + beamW / 2 * cosA;
  var rightY = scaleY - pivotH - beamW / 2 * sinA;

  // Base platform
  ctx.fillStyle = mc.dim;
  ctx.fillRect(scaleCX - 45, scaleY, 90, 8);

  // Pivot triangle
  ctx.fillStyle = mc.accent;
  ctx.beginPath();
  ctx.moveTo(scaleCX - 18, scaleY);
  ctx.lineTo(scaleCX + 18, scaleY);
  ctx.lineTo(scaleCX, scaleY - pivotH);
  ctx.fill();

  // Beam
  ctx.strokeStyle = mc.accent;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(leftX, leftY);
  ctx.lineTo(rightX, rightY);
  ctx.stroke();

  // Chains + pans
  var panDrop = 25;
  var panR = 35;

  // Left chains
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(leftX - 25, leftY); ctx.lineTo(leftX - 25, leftY + panDrop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(leftX + 25, leftY); ctx.lineTo(leftX + 25, leftY + panDrop); ctx.stroke();
  // Left pan
  drawPan(ctx, leftX, leftY + panDrop, panR, mc);
  // Left pan label
  ctx.fillStyle = mc.dim;
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillText(t('leftPan'), leftX, leftY + panDrop + panR * 0.3 + 18);

  // Right chains
  ctx.beginPath(); ctx.moveTo(rightX - 25, rightY); ctx.lineTo(rightX - 25, rightY + panDrop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rightX + 25, rightY); ctx.lineTo(rightX + 25, rightY + panDrop); ctx.stroke();
  // Right pan
  drawPan(ctx, rightX, rightY + panDrop, panR, mc);
  // Right pan label
  ctx.fillStyle = mc.dim;
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillText(t('rightPan'), rightX, rightY + panDrop + panR * 0.3 + 18);

  // Drop zone indicators (dashed rectangles when dragging)
  if (dragObj) {
    ctx.save();
    ctx.strokeStyle = mc.accent;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.globalAlpha = 0.5;
    roundRect(ctx, leftDropZone.x, leftDropZone.y, leftDropZone.w, leftDropZone.h, 6);
    ctx.stroke();
    roundRect(ctx, rightDropZone.x, rightDropZone.y, rightDropZone.w, rightDropZone.h, 6);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Draw objects on pans
  if (leftPanObj) {
    drawObject(ctx, leftPanObj, leftX, leftY + panDrop - 15, mc);
  }
  if (rightPanObj) {
    drawObject(ctx, rightPanObj, rightX, rightY + panDrop - 15, mc);
  }

  // Shelf area
  var shelfY = H * 0.72;
  ctx.fillStyle = mc.strokeDim;
  ctx.fillRect(W * 0.08, shelfY, W * 0.84, 2);

  // Shelf label
  ctx.fillStyle = mc.dim;
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillText(t('shelf'), W / 2, shelfY - 6);

  // Draw shelf objects
  for (var i = 0; i < shelfSlots.length; i++) {
    var slot = shelfSlots[i];
    if (!slot) continue;
    var objCX = slot.x + slot.w / 2;
    var objCY = shelfY + 25;
    drawObject(ctx, slot.obj, objCX, objCY, mc);
    // Object name below
    ctx.fillStyle = mc.dim;
    ctx.font = "10px 'Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(slot.obj.name[LANG], objCX, objCY + 28);
  }

  // Dragged object follows cursor
  if (dragObj) {
    ctx.save();
    ctx.globalAlpha = 0.75;
    drawObject(ctx, dragObj, dragScreenX, dragScreenY, mc);
    ctx.restore();
  }

  // Feedback message
  if (feedbackMsg) {
    ctx.save();
    var msgW = ctx.measureText(feedbackMsg).width + 40;
    ctx.font = "bold 14px 'Inter','Noto Sans SC',sans-serif";
    msgW = ctx.measureText(feedbackMsg).width + 40;
    var msgH = 36;
    var msgX = W / 2 - msgW / 2;
    var msgY = H * 0.12;
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    roundRect(ctx, msgX, msgY, msgW, msgH, 4);
    ctx.fill();
    ctx.strokeStyle = mc.accent;
    ctx.lineWidth = 1;
    roundRect(ctx, msgX, msgY, msgW, msgH, 4);
    ctx.stroke();
    ctx.fillStyle = mc.accent;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(feedbackMsg, W / 2, msgY + msgH / 2);
    ctx.restore();
  }
}

function drawPan(c, cx, cy, r, mc) {
  c.save();
  c.beginPath();
  c.ellipse(cx, cy, r, r * 0.25, 0, 0, Math.PI * 2);
  c.fillStyle = mc.bg1;
  c.fill();
  c.strokeStyle = mc.accent;
  c.lineWidth = 1.5;
  c.stroke();
  c.restore();
}

function drawObject(c, obj, cx, cy, mc) {
  var baseR = 12;
  var r = baseR * obj.visualSize * 0.5;

  c.save();

  if (obj.id === 'feather') {
    // Feather: elongated teardrop
    c.beginPath();
    c.ellipse(cx, cy, r * 0.3, r * 1.2, 0.2, 0, Math.PI * 2);
    c.fillStyle = obj.color;
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.stroke();
    // Quill line
    c.beginPath();
    c.moveTo(cx, cy - r * 1.2);
    c.lineTo(cx, cy + r * 1.2);
    c.strokeStyle = mc.dim;
    c.lineWidth = 0.5;
    c.stroke();
  } else if (obj.id === 'balloon') {
    // Balloon: large oval + string
    c.beginPath();
    c.ellipse(cx, cy - r * 0.2, r * 0.8, r, 0, 0, Math.PI * 2);
    c.fillStyle = obj.color + 'aa';
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 1;
    c.stroke();
    // Highlight
    c.beginPath();
    c.ellipse(cx - r * 0.2, cy - r * 0.5, r * 0.15, r * 0.3, -0.3, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,255,255,0.3)';
    c.fill();
    // String
    c.beginPath();
    c.moveTo(cx, cy + r * 0.8);
    c.quadraticCurveTo(cx + 4, cy + r * 1.2, cx - 2, cy + r * 1.5);
    c.strokeStyle = mc.dim;
    c.lineWidth = 0.8;
    c.stroke();
  } else if (obj.id === 'coin') {
    // Coin: small thick circle
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    var grad = c.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
    grad.addColorStop(0, '#fff8dc');
    grad.addColorStop(0.5, obj.color);
    grad.addColorStop(1, '#b8860b');
    c.fillStyle = grad;
    c.fill();
    c.strokeStyle = '#b8860b';
    c.lineWidth = 1;
    c.stroke();
  } else if (obj.id === 'sponge') {
    // Sponge: rounded rectangle with dots
    var sw = r * 1.6, sh = r * 1.2;
    roundRect(c, cx - sw / 2, cy - sh / 2, sw, sh, 4);
    c.fillStyle = obj.color;
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.stroke();
    // Pores
    for (var pi = 0; pi < 5; pi++) {
      c.beginPath();
      c.arc(cx + (Math.random() - 0.5) * sw * 0.7, cy + (Math.random() - 0.5) * sh * 0.6, 1.5, 0, Math.PI * 2);
      c.fillStyle = 'rgba(0,0,0,0.15)';
      c.fill();
    }
  } else if (obj.id === 'apple') {
    // Apple: circle with stem
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    var aGrad = c.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
    aGrad.addColorStop(0, '#ff6b6b');
    aGrad.addColorStop(1, obj.color);
    c.fillStyle = aGrad;
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.stroke();
    // Stem
    c.beginPath();
    c.moveTo(cx, cy - r);
    c.quadraticCurveTo(cx + 3, cy - r - 5, cx + 2, cy - r - 8);
    c.strokeStyle = '#654321';
    c.lineWidth = 1.5;
    c.stroke();
  } else if (obj.id === 'ironball') {
    // Iron ball: metallic sphere
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    var ibGrad = c.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
    ibGrad.addColorStop(0, '#b0b8c8');
    ibGrad.addColorStop(0.5, '#6a7080');
    ibGrad.addColorStop(1, '#3a3f4a');
    c.fillStyle = ibGrad;
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.stroke();
    // Specular
    c.beginPath();
    c.arc(cx - r * 0.25, cy - r * 0.25, r * 0.2, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,255,255,0.35)';
    c.fill();
  } else if (obj.id === 'bottle') {
    // Water bottle: rectangle with rounded top
    var bw = r * 0.7, bh = r * 2;
    roundRect(c, cx - bw / 2, cy - bh / 2, bw, bh, 3);
    c.fillStyle = obj.color + '88';
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.8;
    roundRect(c, cx - bw / 2, cy - bh / 2, bw, bh, 3);
    c.stroke();
    // Cap
    c.fillStyle = '#2980b9';
    c.fillRect(cx - bw * 0.3, cy - bh / 2 - 4, bw * 0.6, 4);
    // Water level
    c.fillStyle = obj.color + 'cc';
    var waterTop = cy - bh / 2 + bh * 0.2;
    roundRect(c, cx - bw / 2 + 1, waterTop, bw - 2, bh * 0.75, 2);
    c.fill();
  } else if (obj.id === 'rock') {
    // Rock: irregular polygon
    c.beginPath();
    c.moveTo(cx - r, cy + r * 0.3);
    c.lineTo(cx - r * 0.7, cy - r * 0.6);
    c.lineTo(cx - r * 0.1, cy - r);
    c.lineTo(cx + r * 0.6, cy - r * 0.7);
    c.lineTo(cx + r, cy - r * 0.1);
    c.lineTo(cx + r * 0.8, cy + r * 0.6);
    c.lineTo(cx + r * 0.2, cy + r);
    c.lineTo(cx - r * 0.5, cy + r * 0.8);
    c.closePath();
    var rGrad = c.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r * 1.2);
    rGrad.addColorStop(0, '#a08060');
    rGrad.addColorStop(1, obj.color);
    c.fillStyle = rGrad;
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.stroke();
  } else {
    // Fallback circle
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    c.fillStyle = obj.color;
    c.fill();
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 1;
    c.stroke();
  }

  c.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
