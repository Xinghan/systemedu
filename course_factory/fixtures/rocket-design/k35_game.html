<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#5ba3d9));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">DROP LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="densityLabel">AIR DENSITY</div>
    <div class="slider-group">
      <input type="range" id="densitySlider" min="0" max="250" value="123" step="1">
      <div class="val" id="densityVal">1.23 kg/m3</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnVacuum">VACUUM MODE</button>
    <button class="action-btn" id="btnDrop" style="margin-top:4px">DROP</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">DROP LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">MISSION</div><div class="hud-val" id="hudV1">1/6</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">OBJECT</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">VELOCITY</div><div class="hud-val" id="hudV3">0 m/s</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">TIME</div><div class="hud-val" id="hudV4">0.0s</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">DRAG OBJECT TO DROP ZONE</span>
      <span class="status-val" id="statusMission"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? 'rgba(91,163,217,0.06)' : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.5)');
  r.style.setProperty('--primary-dim', 'rgba(91,163,217,0.7)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:        {cn:'落体实验室', en:'DROP LAB'},
  sub:          {cn:'空气是有重量的', en:'Air Has Weight'},
  guide:        {cn:'从架子上拖拽物体到投放区，调节空气密度，按下 DROP 观察下落。完成 6 个实验任务！', en:'Drag objects from the shelf to the drop zone, adjust air density, press DROP to observe. Complete 6 experiment missions!'},
  density:      {cn:'空气密度', en:'AIR DENSITY'},
  vacuum:       {cn:'真空模式', en:'VACUUM MODE'},
  drop:         {cn:'投放', en:'DROP'},
  reset:        {cn:'重置', en:'RESET'},
  mission:      {cn:'任务', en:'MISSION'},
  obj:          {cn:'物体', en:'OBJECT'},
  vel:          {cn:'速度', en:'VELOCITY'},
  time:         {cn:'时间', en:'TIME'},
  dragHint:     {cn:'拖拽物体到投放区', en:'DRAG OBJECT TO DROP ZONE'},
  watching:     {cn:'观察下落中...', en:'WATCHING DROP...'},
  landed:       {cn:'落地！', en:'LANDED!'},
  missionDone:  {cn:'任务完成！', en:'MISSION COMPLETE!'},
  missionFail:  {cn:'再试一次', en:'TRY AGAIN'},
  allDone:      {cn:'全部任务完成！', en:'ALL MISSIONS DONE!'},
  nextMission:  {cn:'下一任务', en:'NEXT MISSION'},
  flat:         {cn:'平纸片', en:'Flat Paper'},
  crumpled:     {cn:'纸团', en:'Paper Ball'},
  coin:         {cn:'硬币', en:'Coin'},
  feather:      {cn:'羽毛', en:'Feather'},
  airplane:     {cn:'纸飞机', en:'Paper Plane'},
  balloon:      {cn:'气球', en:'Balloon'},
  m1title:      {cn:'投放纸片和纸团对比', en:'Drop flat paper vs paper ball'},
  m2title:      {cn:'真空中纸片和硬币同时落地', en:'Paper & coin fall equally in vacuum'},
  m3title:      {cn:'找出阻力最小的形状', en:'Find the shape with lowest drag'},
  m4title:      {cn:'真空中羽毛和硬币同时落地', en:'Feather & coin fall equally in vacuum'},
  m5title:      {cn:'调高空气密度观察差异放大', en:'Increase air density to amplify differences'},
  m6title:      {cn:'纸飞机 vs 气球下落对比', en:'Paper plane vs balloon drop comparison'},
  graphTitle:   {cn:'速度-时间图', en:'Velocity-Time Graph'},
  vacuumOn:     {cn:'真空开启', en:'VACUUM ON'},
  vacuumOff:    {cn:'恢复空气', en:'AIR RESTORED'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    if (typeof refreshI18N === 'function') refreshI18N();
  });
}

// ================================================================
// OBJECT DEFINITIONS (physics)
// ================================================================
// mass(kg), frontalArea(m^2), dragCoeff (Cd), visual shape
var OBJECTS = [
  { id:'flat',     mass:0.005, area:0.06,   cd:1.28, color:'#e8e8e8', shape:'flat',     labelKey:'flat' },
  { id:'crumpled', mass:0.005, area:0.002,  cd:0.47, color:'#d4c9a0', shape:'ball',     labelKey:'crumpled' },
  { id:'coin',     mass:0.007, area:0.0005, cd:0.40, color:'#fbbf24', shape:'coin',     labelKey:'coin' },
  { id:'feather',  mass:0.0003,area:0.003,  cd:1.10, color:'#c4b5fd', shape:'feather',  labelKey:'feather' },
  { id:'airplane', mass:0.004, area:0.008,  cd:0.28, color:'#93c5fd', shape:'airplane', labelKey:'airplane' },
  { id:'balloon',  mass:0.003, area:0.03,   cd:0.50, color:'#f87171', shape:'balloon',  labelKey:'balloon' },
];

// ================================================================
// MISSIONS
// ================================================================
var MISSIONS = [
  { id:1, titleKey:'m1title', required:['flat','crumpled'], density:'any', goal:'compare',
    check: function(results,dens){ return results.length >= 2 && hasObj(results,'flat') && hasObj(results,'crumpled'); }},
  { id:2, titleKey:'m2title', required:['flat','coin'], density:'vacuum', goal:'equal',
    check: function(results,dens){ return dens < 0.01 && results.length >= 2 && hasObj(results,'flat') && hasObj(results,'coin') && Math.abs(landTime(results,'flat') - landTime(results,'coin')) < 0.15; }},
  { id:3, titleKey:'m3title', required:[], density:'normal', goal:'findLowest',
    check: function(results,dens){ if(dens < 0.5) return false; var best = null; var bestT = 999;
      results.forEach(function(r){ if(r.landTime < bestT){bestT=r.landTime; best=r.id;} });
      return best === 'coin' || best === 'airplane'; }},
  { id:4, titleKey:'m4title', required:['feather','coin'], density:'vacuum', goal:'equal',
    check: function(results,dens){ return dens < 0.01 && results.length >= 2 && hasObj(results,'feather') && hasObj(results,'coin') && Math.abs(landTime(results,'feather') - landTime(results,'coin')) < 0.15; }},
  { id:5, titleKey:'m5title', required:['flat','crumpled'], density:'high', goal:'amplify',
    check: function(results,dens){ return dens >= 2.0 && results.length >= 2 && hasObj(results,'flat') && hasObj(results,'crumpled'); }},
  { id:6, titleKey:'m6title', required:['airplane','balloon'], density:'any', goal:'compare',
    check: function(results,dens){ return results.length >= 2 && hasObj(results,'airplane') && hasObj(results,'balloon'); }},
];
function hasObj(r,id){ return r.some(function(x){return x.id===id;}); }
function landTime(r,id){ var f=r.filter(function(x){return x.id===id;}); return f.length ? f[0].landTime : 999; }

// ================================================================
// GAME STATE
// ================================================================
var cvs, ctx;
var W = 800, H = 600;
var currentMission = 0;
var missionResults = []; // results for current mission
var missionCompleted = [false,false,false,false,false,false];
var simRunning = false;
var simTime = 0;
var airDensity = 1.225;
var isVacuum = false;

// Drop chamber geometry (computed in resize)
var CHAMBER_X = 0, CHAMBER_Y = 0, CHAMBER_W = 0, CHAMBER_H = 0;
var SHELF_Y = 0, SHELF_H = 0;
var GRAPH_X = 0, GRAPH_Y = 0, GRAPH_W = 0, GRAPH_H = 0;
var GROUND_Y = 0;
var DROP_ZONE_Y = 0;

// Shelf objects (positions computed each frame)
var shelfItems = [];
// Dropped objects (in simulation)
var droppedObjects = []; // max 2
// Drag state
var dragging = null; // index in OBJECTS
var dragX = 0, dragY = 0;

// Velocity-time graph data
var graphData = []; // [{id, color, points:[{t,v}]}]

// ================================================================
// PHYSICS SIMULATION
// ================================================================
var G = 9.81;
var DROP_HEIGHT_M = 8; // 8 meters tall chamber
var PHYS_DT = 1/60;

function stepPhysics() {
  if (!simRunning) return;
  simTime += PHYS_DT;
  var allLanded = true;
  var rho = isVacuum ? 0 : airDensity;

  droppedObjects.forEach(function(obj) {
    if (obj.landed) return;
    allLanded = false;

    // Drag force: Fd = 0.5 * rho * v^2 * Cd * A
    var v = obj.vy;
    var dragForce = 0.5 * rho * v * Math.abs(v) * obj.cd * obj.area;
    // Net force = mg - Fd (downward positive)
    var netForce = obj.mass * G - dragForce;
    var acc = netForce / obj.mass;

    obj.vy += acc * PHYS_DT;
    obj.posY += obj.vy * PHYS_DT;

    // Flutter effect for flat paper in air
    if (obj.shape === 'flat' && rho > 0.1) {
      obj.flutter = (obj.flutter || 0) + obj.vy * 0.3;
      obj.offsetX = Math.sin(obj.flutter) * 12;
      obj.angle = Math.sin(obj.flutter) * 0.4;
    }
    // Feather sway
    if (obj.shape === 'feather' && rho > 0.1) {
      obj.flutter = (obj.flutter || 0) + obj.vy * 0.15;
      obj.offsetX = Math.sin(obj.flutter) * 8;
      obj.angle = Math.sin(obj.flutter) * 0.25;
    }

    // Record graph data
    var gd = graphData.filter(function(g){return g.id===obj.id;})[0];
    if (gd) {
      gd.points.push({t: simTime, v: Math.abs(obj.vy)});
    }

    // Check ground
    if (obj.posY >= DROP_HEIGHT_M) {
      obj.posY = DROP_HEIGHT_M;
      obj.vy = 0;
      obj.landed = true;
      obj.landTime = simTime;
    }
  });

  if (allLanded && droppedObjects.length > 0) {
    simRunning = false;
    checkMissionCompletion();
  }
}

function checkMissionCompletion() {
  var m = MISSIONS[currentMission];
  if (!m) return;
  var results = droppedObjects.map(function(o){return {id:o.id, landTime:o.landTime||999};});
  // Merge with previous results for this mission
  results.forEach(function(r){ if(!hasObj(missionResults,r.id)) missionResults.push(r); else { var idx=missionResults.findIndex(function(x){return x.id===r.id;}); missionResults[idx]=r; }});

  if (m.check(missionResults, isVacuum ? 0 : airDensity)) {
    missionCompleted[currentMission] = true;
    document.getElementById('statusResult').textContent = t('missionDone');
    document.getElementById('statusResult').className = 'status-result pass';
  }
}

// ================================================================
// CANVAS DRAWING
// ================================================================
function resize() {
  var parent = cvs.parentElement;
  W = parent.clientWidth;
  H = parent.clientHeight;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  cvs.width = W * dpr;
  cvs.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Layout: left 60% = drop chamber, right 40% = graph
  CHAMBER_X = 20;
  CHAMBER_W = Math.floor(W * 0.55);
  CHAMBER_Y = 20;
  CHAMBER_H = H - 40;
  SHELF_Y = CHAMBER_Y;
  SHELF_H = Math.floor(CHAMBER_H * 0.12);
  DROP_ZONE_Y = SHELF_Y + SHELF_H;
  GROUND_Y = CHAMBER_Y + CHAMBER_H;

  GRAPH_X = CHAMBER_X + CHAMBER_W + 30;
  GRAPH_Y = CHAMBER_Y + 30;
  GRAPH_W = W - GRAPH_X - 20;
  GRAPH_H = H - 70;

  // Position shelf items evenly
  var itemW = Math.floor((CHAMBER_W - 20) / OBJECTS.length);
  shelfItems = OBJECTS.map(function(o, i){
    return { id: o.id, x: CHAMBER_X + 10 + i * itemW + itemW/2, y: SHELF_Y + SHELF_H/2, w: itemW - 8 };
  });
}

function drawShelf(mc) {
  // Shelf background
  ctx.fillStyle = mc.glow ? 'rgba(91,163,217,0.08)' : 'rgba(128,128,128,0.06)';
  ctx.fillRect(CHAMBER_X, SHELF_Y, CHAMBER_W, SHELF_H);
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.strokeRect(CHAMBER_X, SHELF_Y, CHAMBER_W, SHELF_H);

  // Label
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'left';
  ctx.fillText(LANG === 'cn' ? '--- 物体架 ---' : '--- SHELF ---', CHAMBER_X + 6, SHELF_Y + 12);

  // Draw each shelf item
  shelfItems.forEach(function(si, i) {
    var obj = OBJECTS[i];
    // Skip if currently being dragged
    if (dragging && dragging.id === obj.id) return;
    // Skip if already in drop zone
    if (droppedObjects.some(function(d){return d.id===obj.id && !d.fromShelfReturn;})) return;

    drawObjectShape(obj, si.x, si.y + 6, 1.0);
    ctx.font = "9px 'Noto Sans SC',sans-serif";
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'center';
    ctx.fillText(t(obj.labelKey), si.x, si.y + 26);
  });
}

function drawObjectShape(obj, x, y, scale) {
  var s = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  if (obj.angle) ctx.rotate(obj.angle);
  ctx.fillStyle = obj.color;
  ctx.strokeStyle = obj.color;

  if (obj.shape === 'flat') {
    // Flat rectangle (paper sheet)
    ctx.fillRect(-18*s, -2*s, 36*s, 4*s);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-18*s, -2*s, 36*s, 4*s);
    // lines on paper
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    for(var li=0;li<3;li++){ctx.beginPath();ctx.moveTo(-14*s,(li-1)*1.2*s);ctx.lineTo(14*s,(li-1)*1.2*s);ctx.stroke();}
  } else if (obj.shape === 'ball') {
    // Crumpled ball
    ctx.beginPath(); ctx.arc(0, 0, 8*s, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    // Crumple lines
    ctx.beginPath(); ctx.moveTo(-4*s,-5*s); ctx.lineTo(2*s,0); ctx.lineTo(-3*s,5*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4*s,-4*s); ctx.lineTo(-1*s,1*s); ctx.lineTo(5*s,4*s); ctx.stroke();
  } else if (obj.shape === 'coin') {
    // Shiny coin
    ctx.beginPath(); ctx.arc(0, 0, 7*s, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#d97706'; ctx.lineWidth = 1.5*s;
    ctx.beginPath(); ctx.arc(0, 0, 7*s, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#d97706';
    ctx.font = (8*s)+"px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 1*s);
  } else if (obj.shape === 'feather') {
    // Feather
    ctx.beginPath();
    ctx.moveTo(0, -12*s);
    ctx.quadraticCurveTo(10*s, -4*s, 6*s, 8*s);
    ctx.lineTo(0, 12*s);
    ctx.quadraticCurveTo(-2*s, 4*s, 0, -12*s);
    ctx.fill();
    // Stem
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.8*s;
    ctx.beginPath(); ctx.moveTo(0,-12*s); ctx.lineTo(0,12*s); ctx.stroke();
  } else if (obj.shape === 'airplane') {
    // Paper airplane
    ctx.beginPath();
    ctx.moveTo(0, -10*s);
    ctx.lineTo(14*s, 6*s);
    ctx.lineTo(0, 2*s);
    ctx.lineTo(-14*s, 6*s);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0,-10*s); ctx.lineTo(0,6*s); ctx.stroke();
  } else if (obj.shape === 'balloon') {
    // Round balloon
    ctx.beginPath(); ctx.arc(0, -2*s, 10*s, 0, Math.PI*2); ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(-3*s, -5*s, 3*s, 0, Math.PI*2); ctx.fill();
    // String
    ctx.strokeStyle = obj.color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,8*s); ctx.lineTo(0,16*s); ctx.stroke();
    // Knot
    ctx.fillStyle = obj.color;
    ctx.beginPath(); ctx.arc(0,8*s,1.5*s,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawChamber(mc) {
  // Chamber walls
  ctx.strokeStyle = mc.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.4;
  ctx.strokeRect(CHAMBER_X, SHELF_Y + SHELF_H, CHAMBER_W, CHAMBER_H - SHELF_H);
  ctx.globalAlpha = 1;

  // Ground line
  ctx.strokeStyle = mc.accent;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(CHAMBER_X, GROUND_Y);
  ctx.lineTo(CHAMBER_X + CHAMBER_W, GROUND_Y);
  ctx.stroke();
  ctx.font = "bold 9px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText(LANG === 'cn' ? 'GROUND / 地面' : 'GROUND', CHAMBER_X + CHAMBER_W/2, GROUND_Y - 4);

  // Drop zone indicator
  if (!simRunning && droppedObjects.length < 2) {
    ctx.save();
    ctx.setLineDash([4,4]);
    ctx.strokeStyle = mc.accent;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    var dzW = 60, dzH = 40;
    var dzX = CHAMBER_X + CHAMBER_W/2 - dzW/2 + (droppedObjects.length === 1 ? 50 : -30);
    var dzY2 = DROP_ZONE_Y + 10;
    ctx.strokeRect(dzX, dzY2, dzW, dzH);
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = mc.accent;
    ctx.fillRect(dzX, dzY2, dzW, dzH);
    ctx.globalAlpha = 1;
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Air density indicator
  var rho = isVacuum ? 0 : airDensity;
  if (rho > 0.01) {
    // Draw air particles
    ctx.globalAlpha = Math.min(rho / 2.5, 1) * 0.15;
    ctx.fillStyle = mc.accent;
    var particleCount = Math.floor(rho * 30);
    for (var pi = 0; pi < particleCount; pi++) {
      var px = CHAMBER_X + 10 + ((pi * 137) % (CHAMBER_W - 20));
      var py = DROP_ZONE_Y + 20 + ((pi * 251 + simTime * 50) % (CHAMBER_H - SHELF_H - 40));
      ctx.beginPath();
      ctx.arc(px, py, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Vacuum label
  if (isVacuum) {
    ctx.font = "bold 14px 'JetBrains Mono',monospace";
    ctx.fillStyle = '#ef4444';
    ctx.textAlign = 'center';
    ctx.fillText('VACUUM', CHAMBER_X + CHAMBER_W/2, DROP_ZONE_Y + 30);
    ctx.font = "11px 'Noto Sans SC',sans-serif";
    ctx.fillText(LANG==='cn' ? '(无空气阻力)' : '(no air resistance)', CHAMBER_X + CHAMBER_W/2, DROP_ZONE_Y + 46);
  }

  // Height scale on left
  ctx.font = "8px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'right';
  var chamberInnerH = GROUND_Y - DROP_ZONE_Y;
  for (var hm = 0; hm <= DROP_HEIGHT_M; hm += 2) {
    var yPos = DROP_ZONE_Y + (hm / DROP_HEIGHT_M) * chamberInnerH;
    ctx.fillText(hm + 'm', CHAMBER_X - 4, yPos + 3);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(CHAMBER_X, yPos);
    ctx.lineTo(CHAMBER_X + 6, yPos);
    ctx.stroke();
  }
}

function drawDroppedObjects(mc) {
  var chamberInnerH = GROUND_Y - DROP_ZONE_Y;
  droppedObjects.forEach(function(obj, idx) {
    var fraction = obj.posY / DROP_HEIGHT_M;
    var screenY = DROP_ZONE_Y + fraction * chamberInnerH;
    var screenX = CHAMBER_X + CHAMBER_W * (idx === 0 ? 0.35 : 0.65) + (obj.offsetX || 0);

    // Trail
    if (obj.posY > 0.1) {
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = obj.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      var trailTop = DROP_ZONE_Y;
      ctx.moveTo(screenX, trailTop);
      ctx.lineTo(screenX, screenY);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    drawObjectShape(obj, screenX, screenY, 1.2);

    // Label
    ctx.font = "bold 10px 'JetBrains Mono',monospace";
    ctx.fillStyle = obj.color;
    ctx.textAlign = 'center';
    ctx.fillText(t(obj.labelKey), screenX, screenY - 18);

    // Velocity readout
    if (simRunning || obj.landed) {
      ctx.font = "9px 'JetBrains Mono',monospace";
      ctx.fillStyle = mc.dim;
      ctx.fillText(Math.abs(obj.vy).toFixed(1) + ' m/s', screenX, screenY + 22);
    }
  });
}

function drawGraph(mc) {
  if (GRAPH_W < 50 || GRAPH_H < 50) return;

  // Graph border
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.strokeRect(GRAPH_X, GRAPH_Y, GRAPH_W, GRAPH_H);

  // Title
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.accent;
  ctx.textAlign = 'center';
  ctx.fillText(t('graphTitle'), GRAPH_X + GRAPH_W/2, GRAPH_Y - 8);

  // Axes labels
  ctx.font = "8px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText(LANG==='cn' ? 't (s)' : 't (s)', GRAPH_X + GRAPH_W/2, GRAPH_Y + GRAPH_H + 14);
  ctx.save();
  ctx.translate(GRAPH_X - 12, GRAPH_Y + GRAPH_H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('v (m/s)', 0, 0);
  ctx.restore();

  // Determine max time and velocity for scaling
  var maxT = 3;
  var maxV = 15;
  graphData.forEach(function(gd) {
    gd.points.forEach(function(p) {
      if (p.t > maxT) maxT = p.t;
      if (p.v > maxV) maxV = p.v;
    });
  });
  maxT = Math.ceil(maxT + 0.5);
  maxV = Math.ceil(maxV / 5) * 5 + 5;

  // Grid lines
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 0.3;
  // Horizontal (velocity)
  for (var gv = 0; gv <= maxV; gv += 5) {
    var yy = GRAPH_Y + GRAPH_H - (gv / maxV) * GRAPH_H;
    ctx.beginPath(); ctx.moveTo(GRAPH_X, yy); ctx.lineTo(GRAPH_X + GRAPH_W, yy); ctx.stroke();
    ctx.fillStyle = mc.dim;
    ctx.font = "7px 'JetBrains Mono',monospace";
    ctx.textAlign = 'right';
    ctx.fillText(gv.toString(), GRAPH_X - 3, yy + 3);
  }
  // Vertical (time)
  for (var gt = 0; gt <= maxT; gt += 0.5) {
    var xx = GRAPH_X + (gt / maxT) * GRAPH_W;
    ctx.beginPath(); ctx.moveTo(xx, GRAPH_Y); ctx.lineTo(xx, GRAPH_Y + GRAPH_H); ctx.stroke();
    if (gt === Math.floor(gt)) {
      ctx.fillStyle = mc.dim;
      ctx.font = "7px 'JetBrains Mono',monospace";
      ctx.textAlign = 'center';
      ctx.fillText(gt.toString(), xx, GRAPH_Y + GRAPH_H + 8);
    }
  }

  // Plot data
  graphData.forEach(function(gd) {
    if (gd.points.length < 2) return;
    ctx.strokeStyle = gd.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    gd.points.forEach(function(p, i) {
      var px = GRAPH_X + (p.t / maxT) * GRAPH_W;
      var py = GRAPH_Y + GRAPH_H - (p.v / maxV) * GRAPH_H;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    });
    ctx.stroke();

    // Legend dot at end
    var last = gd.points[gd.points.length - 1];
    var lx = GRAPH_X + (last.t / maxT) * GRAPH_W;
    var ly = GRAPH_Y + GRAPH_H - (last.v / maxV) * GRAPH_H;
    ctx.fillStyle = gd.color;
    ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI*2); ctx.fill();
    ctx.font = "8px 'JetBrains Mono',monospace";
    ctx.textAlign = 'left';
    ctx.fillText(t(gd.labelKey), lx + 6, ly + 3);
  });

  // If no data, placeholder
  if (graphData.length === 0) {
    ctx.font = "11px 'Noto Sans SC',sans-serif";
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'center';
    ctx.fillText(LANG==='cn' ? '投放物体后显示图表' : 'Graph appears after drop', GRAPH_X + GRAPH_W/2, GRAPH_Y + GRAPH_H/2);
  }
}

function drawMissionInfo(mc) {
  var m = MISSIONS[currentMission];
  if (!m) return;

  // Mission title at top-right of chamber
  ctx.font = "bold 11px 'Noto Sans SC',sans-serif";
  ctx.fillStyle = mc.text;
  ctx.textAlign = 'left';
  var mText = (LANG==='cn'?'任务 ':'Mission ') + (currentMission+1) + '/6: ' + t(m.titleKey);
  ctx.fillText(mText, CHAMBER_X + 6, CHAMBER_Y + CHAMBER_H + 16);

  // Required objects hint
  if (m.required.length > 0 && !missionCompleted[currentMission]) {
    ctx.font = "9px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.dim;
    var hint = (LANG==='cn' ? '需要: ' : 'Need: ') + m.required.map(function(r){return t(r);}).join(' + ');
    if (m.density === 'vacuum') hint += (LANG==='cn' ? ' (真空)' : ' (vacuum)');
    if (m.density === 'high') hint += (LANG==='cn' ? ' (高密度)' : ' (high density)');
  }
}

function drawDragging(mc) {
  if (!dragging) return;
  drawObjectShape(dragging, dragX, dragY, 1.4);
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.fillStyle = dragging.color;
  ctx.textAlign = 'center';
  ctx.fillText(t(dragging.labelKey), dragX, dragY - 22);
}

function draw() {
  var mc = gameModeColors();

  // Use parent dimensions, not canvas dimensions
  var parent = cvs.parentElement;
  W = parent.clientWidth;
  H = parent.clientHeight;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (cvs.width !== Math.floor(W * dpr) || cvs.height !== Math.floor(H * dpr)) {
    resize();
  }

  drawGameBg(ctx, W, H);
  drawChamber(mc);
  drawShelf(mc);
  drawDroppedObjects(mc);
  drawGraph(mc);
  drawMissionInfo(mc);
  drawDragging(mc);
}

// ================================================================
// INPUT HANDLING (mouse + touch)
// ================================================================
function getCanvasPos(e) {
  var rect = cvs.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height)
  };
}

function handlePointerDown(e) {
  if (simRunning) return;
  var pos = getCanvasPos(e);

  // Check if clicking a shelf item
  for (var i = 0; i < shelfItems.length; i++) {
    var si = shelfItems[i];
    var obj = OBJECTS[i];
    // Skip if already dropped
    if (droppedObjects.some(function(d){return d.id===obj.id;})) continue;
    var dx = pos.x - si.x;
    var dy = pos.y - (si.y + 6);
    if (Math.abs(dx) < 25 && Math.abs(dy) < 20) {
      dragging = { id: obj.id, mass: obj.mass, area: obj.area, cd: obj.cd, color: obj.color, shape: obj.shape, labelKey: obj.labelKey, angle: 0 };
      dragX = pos.x;
      dragY = pos.y;
      e.preventDefault();
      return;
    }
  }
}

function handlePointerMove(e) {
  if (!dragging) return;
  var pos = getCanvasPos(e);
  dragX = pos.x;
  dragY = pos.y;
  e.preventDefault();
}

function handlePointerUp(e) {
  if (!dragging) return;
  var pos = getCanvasPos(e);

  // Check if dropped in the chamber area (below shelf)
  if (pos.y > DROP_ZONE_Y && pos.y < GROUND_Y &&
      pos.x > CHAMBER_X && pos.x < CHAMBER_X + CHAMBER_W &&
      droppedObjects.length < 2) {
    // Place object at top of chamber
    droppedObjects.push({
      id: dragging.id,
      mass: dragging.mass,
      area: dragging.area,
      cd: dragging.cd,
      color: dragging.color,
      shape: dragging.shape,
      labelKey: dragging.labelKey,
      posY: 0,
      vy: 0,
      landed: false,
      landTime: 0,
      offsetX: 0,
      angle: 0,
      flutter: 0
    });
    graphData.push({ id: dragging.id, color: dragging.color, labelKey: dragging.labelKey, points: [{t:0,v:0}] });
    updateHUD();
  }
  dragging = null;
  e.preventDefault();
}

// ================================================================
// CONTROLS
// ================================================================
function doDrop() {
  if (simRunning || droppedObjects.length === 0) return;
  // Reset positions
  droppedObjects.forEach(function(o){ o.posY = 0; o.vy = 0; o.landed = false; o.landTime = 0; o.offsetX = 0; o.angle = 0; o.flutter = 0; });
  graphData.forEach(function(g){ g.points = [{t:0,v:0}]; });
  simTime = 0;
  simRunning = true;
  document.getElementById('statusLabel').textContent = t('watching');
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
}

function doReset() {
  simRunning = false;
  simTime = 0;
  droppedObjects = [];
  graphData = [];
  missionResults = [];
  document.getElementById('statusLabel').textContent = t('dragHint');
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  updateHUD();
}

function doVacuum() {
  isVacuum = !isVacuum;
  var btn = document.getElementById('btnVacuum');
  if (isVacuum) {
    document.getElementById('densitySlider').disabled = true;
    document.getElementById('densityVal').textContent = '0.00 kg/m3';
    btn.textContent = t('vacuumOff');
    btn.style.boxShadow = '0 0 14px rgba(239,68,68,0.5)';
  } else {
    document.getElementById('densitySlider').disabled = false;
    updateDensityDisplay();
    btn.textContent = t('vacuum');
    btn.style.boxShadow = '';
  }
}

function nextMission() {
  if (currentMission < 5) {
    currentMission++;
    doReset();
    refreshI18N();
  }
}

function updateDensityDisplay() {
  var val = document.getElementById('densitySlider').value;
  airDensity = val / 100;
  document.getElementById('densityVal').textContent = airDensity.toFixed(2) + ' kg/m3';
}

function updateHUD() {
  document.getElementById('hudV1').textContent = (currentMission+1) + '/6';
  var names = droppedObjects.map(function(o){return t(o.labelKey);}).join(', ');
  document.getElementById('hudV2').textContent = names || '--';
  document.getElementById('hudV3').textContent = '0 m/s';
  document.getElementById('hudV4').textContent = '0.0s';
}

// ================================================================
// REFRESH i18n
// ================================================================
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('guideLabel').textContent = LANG==='cn' ? '操作指南' : 'GUIDE';
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('densityLabel').textContent = t('density');
  document.getElementById('btnVacuum').textContent = isVacuum ? t('vacuumOff') : t('vacuum');
  document.getElementById('btnDrop').textContent = t('drop');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('mission');
  document.getElementById('hudL2').textContent = t('obj');
  document.getElementById('hudL3').textContent = t('vel');
  document.getElementById('hudL4').textContent = t('time');
  if (!simRunning) document.getElementById('statusLabel').textContent = t('dragHint');
  document.getElementById('statusMission').textContent = t(MISSIONS[currentMission].titleKey);
  updateHUD();
}

function onModeChange() {
  // Redraw handles itself via the game loop
}

// ================================================================
// GAME LOOP
// ================================================================
function gameLoop() {
  stepPhysics();

  // Update HUD velocity/time
  if (droppedObjects.length > 0) {
    var maxV = 0;
    droppedObjects.forEach(function(o){ if(Math.abs(o.vy) > maxV) maxV = Math.abs(o.vy); });
    document.getElementById('hudV3').textContent = maxV.toFixed(1) + ' m/s';
    document.getElementById('hudV4').textContent = simTime.toFixed(1) + 's';
  }

  // Check if all objects landed
  if (!simRunning && droppedObjects.length > 0 && droppedObjects.every(function(o){return o.landed;})) {
    document.getElementById('statusLabel').textContent = t('landed');
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ================================================================
// INIT
// ================================================================
function init() {
  cvs = document.getElementById('gc');
  ctx = cvs.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  resize();

  // Density slider
  document.getElementById('densitySlider').addEventListener('input', updateDensityDisplay);
  updateDensityDisplay();

  // Buttons
  document.getElementById('btnDrop').addEventListener('click', doDrop);
  document.getElementById('btnReset').addEventListener('click', doReset);
  document.getElementById('btnVacuum').addEventListener('click', doVacuum);

  // Mouse events
  cvs.addEventListener('mousedown', handlePointerDown);
  cvs.addEventListener('mousemove', handlePointerMove);
  cvs.addEventListener('mouseup', handlePointerUp);

  // Touch events
  cvs.addEventListener('touchstart', handlePointerDown, {passive:false});
  cvs.addEventListener('touchmove', handlePointerMove, {passive:false});
  cvs.addEventListener('touchend', handlePointerUp, {passive:false});

  // Resize
  window.addEventListener('resize', resize);

  refreshI18N();

  // Auto-drop initial objects for visual verification (first pair)
  droppedObjects.push({
    id: 'flat', mass: 0.005, area: 0.06, cd: 1.28, color: '#e8e8e8',
    shape: 'flat', labelKey: 'flat',
    posY: 0, vy: 0, landed: false, landTime: 0, offsetX: 0, angle: 0, flutter: 0
  });
  droppedObjects.push({
    id: 'crumpled', mass: 0.005, area: 0.002, cd: 0.47, color: '#d4c9a0',
    shape: 'ball', labelKey: 'crumpled',
    posY: 0, vy: 0, landed: false, landTime: 0, offsetX: 0, angle: 0, flutter: 0
  });
  graphData.push({ id: 'flat', color: '#e8e8e8', labelKey: 'flat', points: [{t:0,v:0}] });
  graphData.push({ id: 'crumpled', color: '#d4c9a0', labelKey: 'crumpled', points: [{t:0,v:0}] });
  updateHUD();

  // Auto-start the first drop for visual richness
  simTime = 0;
  simRunning = true;
  document.getElementById('statusLabel').textContent = t('watching');

  gameLoop();
}

init();
</script>
</body>
</html>
