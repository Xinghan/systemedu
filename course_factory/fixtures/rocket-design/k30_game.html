<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#f97316));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.engine-card{padding:6px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));cursor:pointer;background:transparent;transition:all 0.2s;margin-bottom:4px;}
.engine-card:hover{border-color:var(--sb-accent,var(--primary));}
.engine-card.selected{border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.12);box-shadow:0 0 8px rgba(249,115,22,0.2);}
.engine-card .ec-name{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.1em;text-transform:uppercase;}
.engine-card .ec-stat{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sb-dim,#8e90a6);letter-spacing:0.08em;margin-top:2px;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang lang-btn" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">ISP RACE</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="roundInfo">ROUND 1 / 3</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="engLabel">ENGINES</div>
    <div id="engineCards"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnLaunch">LAUNCH</button>
    <div id="nextWrap"></div>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">ISP RACE</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ISP</div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">THRUST</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">ALTITUDE</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">FUEL</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">SCORE</div><div class="hud-val" id="hudV5">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">ROUND</span>
      <span class="status-val" id="statusVal">1 / 3</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316';
var ACCENT_DIM = '#c25a0e';
var ACCENT_GLOW = 'rgba(249,115,22,0.3)';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(249,115,22,0.04)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', ACCENT_DIM);
  r.style.setProperty('--glow-strong', ACCENT_GLOW);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  drawScene();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

  tag:         {en:'ISP RACE',           cn:'\u6bd4\u51b2\u7ade\u8d5b'},
  r1Title:     {en:'R1: SAME FUEL',      cn:'R1: \u76f8\u540c\u71c3\u6599'},

  r3Title:     {en:'R3: TARGET HEIGHT',  cn:'R3: \u76ee\u6807\u9ad8\u5ea6'},
  fuelBudget:  {en:'FUEL BUDGET',        cn:'\u71c3\u6599\u9884\u7b97'},

};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('engLabel').textContent = t('engines');
  document.getElementById('btnLaunch').textContent = t('launch');
  var existingNext = document.getElementById('btnNext');
  if (existingNext) existingNext.textContent = t('nextRound');
  document.getElementById('hudTag').textContent = t('tag');
  document.getElementById('hudL1').textContent = t('isp');
  document.getElementById('hudL2').textContent = t('thrust');
  document.getElementById('hudL3').textContent = t('altitude');
  document.getElementById('hudL4').textContent = t('fuel');
  document.getElementById('hudL5').textContent = t('score');
  document.getElementById('statusLabel').textContent = t('round');
  updateRoundInfo();
  updateGuideText();
  buildEngineCards();
  drawScene();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// ENGINE DATA
// ================================================================
var ENGINES = [
  { id:'eduA',   isp:70,  mdot:0.012, color:'#60a5fa' },
  { id:'eduB',   isp:90,  mdot:0.010, color:'#34d399' },
  { id:'amateur',isp:150, mdot:0.006, color:'#a78bfa' },
  { id:'pro',    isp:280, mdot:0.003, color:'#f97316' },
];
// mdot = propellant mass flow rate in kg/s
// Thrust = Isp * g0 * mdot
var G0 = 9.81; // m/s^2

// ================================================================
// ROUND DEFINITIONS
// ================================================================
var ROUNDS = [
  { fuelBudget:0.050, thrustLimit:Infinity, targetH:null },
  { fuelBudget:0.050, thrustLimit:0.5,      targetH:null },
  { fuelBudget:0.200, thrustLimit:Infinity, targetH:200  },
];

// ================================================================
// GAME STATE
// ================================================================
var canvas, ctx;
var currentRound = 0;
var totalScore = 0;
var selectedEngines = [];
var simState = 'idle'; // 'idle', 'running', 'done'
var simTime = 0;
var animId = null;
var lastTimestamp = 0;

// Simulation state for 2 rockets
var rockets = [null, null];

function resetRocketSim(engineIdx, roundDef) {
  var eng = ENGINES[engineIdx];
  var mdot = eng.mdot;
  var thrustRaw = eng.isp * G0 * mdot;
  var thrustEff = Math.min(thrustRaw, roundDef.thrustLimit);
  // If thrust is capped, reduce mdot proportionally
  var mdotEff = (thrustEff < thrustRaw) ? (thrustEff / (eng.isp * G0)) : mdot;
  return {
    engineIdx: engineIdx,
    isp: eng.isp,
    thrust: thrustEff,
    mdot: mdotEff,
    fuelRemaining: roundDef.fuelBudget,
    fuelBudget: roundDef.fuelBudget,
    altitude: 0,
    velocity: 0,
    maxAlt: 0,
    totalImpulse: 0,
    fuelUsed: 0,
    rocketMass: 0.100, // dry mass 100g
    phase: 'burn', // 'burn' | 'coast' | 'fall' | 'landed'
    trail: [],
    flameParticles: [],
    reachedTarget: false,
  };
}

// ================================================================
// ENGINE CARD UI
// ================================================================
function buildEngineCards() {
  var container = document.getElementById('engineCards');
  container.innerHTML = '';
  ENGINES.forEach(function(eng, idx) {
    var card = document.createElement('div');
    card.className = 'engine-card' + (selectedEngines.indexOf(idx) >= 0 ? ' selected' : '');
    card.dataset.option = idx;

    var thrustVal = (eng.isp * G0 * eng.mdot).toFixed(2);

    card.innerHTML =
      '<div class="ec-name" style="color:' + eng.color + '">' + t(eng.id) + '</div>' +
      '<div class="ec-stat">Isp: ' + eng.isp + ' ' + t('ispUnit') + '</div>' +
      '<div class="ec-stat">' + t('thrust') + ': ' + thrustVal + ' N</div>';

    card.addEventListener('click', function() {
      if (simState !== 'idle') return;
      var pos = selectedEngines.indexOf(idx);
      if (pos >= 0) {
        selectedEngines.splice(pos, 1);
      } else if (selectedEngines.length < 2) {
        selectedEngines.push(idx);
      }
      buildEngineCards();
      updateHUD();
      drawScene();
    });
    container.appendChild(card);
  });
}

function updateRoundInfo() {
  var info = document.getElementById('roundInfo');
  info.textContent = t('round') + ' ' + (currentRound + 1) + ' / 3';
  document.getElementById('statusVal').textContent = (currentRound + 1) + ' / 3';
}

function updateGuideText() {
  var key = 'guideR' + (currentRound + 1);
  document.getElementById('guideText').textContent = t(key);
}

function updateHUD() {
  if (selectedEngines.length > 0) {
    var eng = ENGINES[selectedEngines[0]];
    document.getElementById('hudV1').textContent = eng.isp + 's';
    document.getElementById('hudV2').textContent = (eng.isp * G0 * eng.mdot).toFixed(2) + 'N';
  } else {
    document.getElementById('hudV1').textContent = '--';
    document.getElementById('hudV2').textContent = '--';
  }
  document.getElementById('hudV3').textContent = simState === 'idle' ? '--' : '0m';
  document.getElementById('hudV4').textContent = ROUNDS[currentRound].fuelBudget * 1000 + 'g';
  document.getElementById('hudV5').textContent = totalScore + '';
}

// ================================================================
// CANVAS
// ================================================================
function resizeCanvas() {
  var wrap = canvas.parentElement;
  var rect = wrap.getBoundingClientRect();
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var cw = Math.max(rect.width, 100);
  var ch = Math.max(rect.height, 80);
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawScene();
}

// ================================================================
// DRAWING
// ================================================================
function drawRocket(cx, baseY, alt, maxSimAlt, rk, mc, cw, ch) {
  // Map altitude to canvas Y position
  var groundY = baseY;
  var skyY = 60;
  var scaleMax = Math.max(maxSimAlt, 50);
  var rocketY = groundY - (alt / scaleMax) * (groundY - skyY);
  rocketY = Math.max(skyY, Math.min(groundY, rocketY));

  var rw = 14;
  var rh = 40;

  // Flame particles
  if (rk.phase === 'burn' && rk.fuelRemaining > 0) {
    for (var fp = 0; fp < 3; fp++) {
      rk.flameParticles.push({
        px: cx + (Math.random() - 0.5) * 8,
        py: rocketY + rh / 2 + Math.random() * 5,
        vy: 1 + Math.random() * 2,
        life: 1.0,
        size: 2 + Math.random() * 4,
      });
    }
  }

  // Update and draw flame particles
  var eng = ENGINES[rk.engineIdx];
  for (var pi = rk.flameParticles.length - 1; pi >= 0; pi--) {
    var p = rk.flameParticles[pi];
    p.py += p.vy;
    p.life -= 0.05;
    if (p.life <= 0) { rk.flameParticles.splice(pi, 1); continue; }
    ctx.globalAlpha = p.life * 0.8;
    var flameColor = p.life > 0.5 ? eng.color : ACCENT;
    ctx.fillStyle = flameColor;
    ctx.fillRect(p.px - p.size / 2, p.py - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Rocket body
  ctx.fillStyle = eng.color;
  ctx.fillRect(cx - rw / 2, rocketY - rh / 2, rw, rh);

  // Nose cone
  ctx.beginPath();
  ctx.moveTo(cx - rw / 2, rocketY - rh / 2);
  ctx.lineTo(cx, rocketY - rh / 2 - 14);
  ctx.lineTo(cx + rw / 2, rocketY - rh / 2);
  ctx.closePath();
  ctx.fillStyle = eng.color;
  ctx.fill();

  // Fins
  ctx.beginPath();
  ctx.moveTo(cx - rw / 2, rocketY + rh / 2);
  ctx.lineTo(cx - rw / 2 - 8, rocketY + rh / 2 + 8);
  ctx.lineTo(cx - rw / 2, rocketY + rh / 2 - 6);
  ctx.closePath();
  ctx.fillStyle = eng.color;
  ctx.globalAlpha = 0.7;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + rw / 2, rocketY + rh / 2);
  ctx.lineTo(cx + rw / 2 + 8, rocketY + rh / 2 + 8);
  ctx.lineTo(cx + rw / 2, rocketY + rh / 2 - 6);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Engine name label
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = mc.text;
  ctx.fillText(t(eng.id), cx, rocketY + rh / 2 + 24);

  // Altitude label
  ctx.font = "bold 11px 'JetBrains Mono',monospace";
  ctx.fillStyle = eng.color;
  ctx.fillText(alt.toFixed(1) + 'm', cx, rocketY - rh / 2 - 22);

  // Trail
  rk.trail.push({ y: rocketY, alpha: 1.0 });
  if (rk.trail.length > 40) rk.trail.shift();
  for (var ti = 0; ti < rk.trail.length; ti++) {
    var tp = rk.trail[ti];
    tp.alpha -= 0.015;
    if (tp.alpha > 0) {
      ctx.globalAlpha = tp.alpha * 0.3;
      ctx.fillStyle = eng.color;
      ctx.fillRect(cx - 1, tp.y, 2, 3);
    }
  }
  ctx.globalAlpha = 1;
}

function drawFuelGauge(cx, baseY, rk, mc) {
  var gaugeW = 20;
  var gaugeH = 60;
  var gx = cx - gaugeW / 2;
  var gy = baseY + 40;
  var frac = rk.fuelRemaining / rk.fuelBudget;

  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.strokeRect(gx, gy, gaugeW, gaugeH);

  var fillH = gaugeH * frac;
  var eng = ENGINES[rk.engineIdx];
  ctx.fillStyle = eng.color;
  ctx.globalAlpha = 0.6;
  ctx.fillRect(gx + 1, gy + gaugeH - fillH, gaugeW - 2, fillH);
  ctx.globalAlpha = 1;

  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = mc.dim;
  ctx.fillText(t('fuel'), cx, gy - 4);
  ctx.fillStyle = mc.text;
  ctx.fillText((rk.fuelRemaining * 1000).toFixed(1) + 'g', cx, gy + gaugeH + 14);
}

function drawResultPanel(mc, cw, ch) {
  if (simState !== 'done' || !rockets[0] || !rockets[1]) return;

  var r0 = rockets[0];
  var r1 = rockets[1];
  var panelW = Math.min(cw * 0.6, 400);
  var panelH = 120;
  var px = (cw - panelW) / 2;
  var py = 30;

  ctx.fillStyle = mc.bg1;
  ctx.globalAlpha = 0.92;
  ctx.fillRect(px, py, panelW, panelH);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(px, py, panelW, panelH);

  var eng0 = ENGINES[r0.engineIdx];
  var eng1 = ENGINES[r1.engineIdx];

  // Round constraint info
  var roundDef = ROUNDS[currentRound];
  ctx.font = "bold 12px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('r' + (currentRound + 1) + 'Title'), cw / 2, py + 18);

  // Column headers
  var col1x = px + panelW * 0.35;
  var col2x = px + panelW * 0.7;
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.fillStyle = eng0.color;
  ctx.fillText(t(eng0.id), col1x, py + 36);
  ctx.fillStyle = eng1.color;
  ctx.fillText(t(eng1.id), col2x, py + 36);

  // Stats
  var labels = [t('maxH'), t('fuelUsed'), t('totalImp')];
  var vals0 = [r0.maxAlt.toFixed(1) + 'm', (r0.fuelUsed * 1000).toFixed(1) + 'g', r0.totalImpulse.toFixed(2) + 'Ns'];
  var vals1 = [r1.maxAlt.toFixed(1) + 'm', (r1.fuelUsed * 1000).toFixed(1) + 'g', r1.totalImpulse.toFixed(2) + 'Ns'];

  ctx.font = "10px 'JetBrains Mono',monospace";
  for (var si = 0; si < labels.length; si++) {
    var row = py + 52 + si * 18;
    ctx.textAlign = 'left';
    ctx.fillStyle = mc.dim;
    ctx.fillText(labels[si], px + 10, row);
    ctx.textAlign = 'center';
    ctx.fillStyle = eng0.color;
    ctx.fillText(vals0[si], col1x, row);
    ctx.fillStyle = eng1.color;
    ctx.fillText(vals1[si], col2x, row);
  }

  // Winner
  var winnerText;
  if (roundDef.targetH) {
    // R3: winner is the one that reached target with less fuel
    if (r0.reachedTarget && !r1.reachedTarget) winnerText = t(eng0.id);
    else if (!r0.reachedTarget && r1.reachedTarget) winnerText = t(eng1.id);
    else if (r0.reachedTarget && r1.reachedTarget) winnerText = r0.fuelUsed < r1.fuelUsed ? t(eng0.id) : (r0.fuelUsed > r1.fuelUsed ? t(eng1.id) : t('tie'));
    else winnerText = r0.maxAlt > r1.maxAlt ? t(eng0.id) : (r0.maxAlt < r1.maxAlt ? t(eng1.id) : t('tie'));
  } else {
    winnerText = r0.maxAlt > r1.maxAlt ? t(eng0.id) : (r0.maxAlt < r1.maxAlt ? t(eng1.id) : t('tie'));
  }

  ctx.font = "bold 12px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('winner') + ': ' + winnerText, cw / 2, py + panelH - 10);
}

function drawGroundAndScale(mc, cw, ch) {
  var groundY = ch - 120;

  // Ground line
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(30, groundY);
  ctx.lineTo(cw - 30, groundY);
  ctx.stroke();

  // Ground hash marks
  ctx.strokeStyle = mc.dim;
  ctx.lineWidth = 1;
  for (var gx = 30; gx < cw - 30; gx += 20) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY);
    ctx.lineTo(gx - 5, groundY + 8);
    ctx.stroke();
  }

  // Altitude scale
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'right';
  ctx.fillStyle = mc.dim;
  var maxSimAlt = getMaxSimAlt();
  var scaleSteps = 5;
  var stepSize = Math.ceil(maxSimAlt / scaleSteps / 10) * 10;
  if (stepSize < 10) stepSize = 10;
  for (var si = 0; si <= scaleSteps; si++) {
    var altMark = si * stepSize;
    var markY = groundY - (altMark / Math.max(maxSimAlt, 50)) * (groundY - 60);
    if (markY < 50) break;
    ctx.fillText(altMark + 'm', 28, markY + 3);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 6]);
    ctx.beginPath();
    ctx.moveTo(30, markY);
    ctx.lineTo(cw - 30, markY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Round-specific constraint indicator
  var roundDef = ROUNDS[currentRound];
  if (roundDef.targetH && simState !== 'idle') {
    var targetY = groundY - (roundDef.targetH / Math.max(maxSimAlt, 50)) * (groundY - 60);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(30, targetY);
    ctx.lineTo(cw - 30, targetY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = "bold 10px 'JetBrains Mono',monospace";
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ef4444';
    ctx.fillText(t('targetH') + ' ' + roundDef.targetH + 'm', 34, targetY - 6);
  }

  return groundY;
}

function getMaxSimAlt() {
  var ma = 50;
  if (rockets[0]) ma = Math.max(ma, rockets[0].maxAlt);
  if (rockets[1]) ma = Math.max(ma, rockets[1].maxAlt);
  // Add some headroom
  return ma * 1.2 + 20;
}

function drawConstraintInfo(mc, cw) {
  var roundDef = ROUNDS[currentRound];
  var infoY = 22;
  ctx.font = "bold 11px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = ACCENT;
  ctx.fillText(t('r' + (currentRound + 1) + 'Title'), cw / 2, infoY);

  ctx.font = "10px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  var constraints = [];
  constraints.push(t('fuelBudget') + ': ' + (roundDef.fuelBudget * 1000) + 'g');
  if (roundDef.thrustLimit < Infinity) {
    constraints.push(t('thrustLimit') + ': ' + roundDef.thrustLimit + 'N');
  }
  if (roundDef.targetH) {
    constraints.push(t('targetH') + ': ' + roundDef.targetH + 'm');
  }
  ctx.fillText(constraints.join('  |  '), cw / 2, infoY + 16);
}

function drawScene() {
  if (!ctx) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var cw = canvas.width / dpr;
  var ch = canvas.height / dpr;
  var mc = gameModeColors();

  drawGameBg(ctx, cw, ch);
  drawConstraintInfo(mc, cw);
  var groundY = drawGroundAndScale(mc, cw, ch);

  if (simState === 'idle') {
    // Show placeholder rockets in starting position
    if (selectedEngines.length >= 1) {
      var eng0 = ENGINES[selectedEngines[0]];
      var cx0 = cw * 0.35;
      ctx.fillStyle = eng0.color;
      drawIdleRocket(cx0, groundY, eng0, mc);
    }
    if (selectedEngines.length >= 2) {
      var eng1 = ENGINES[selectedEngines[1]];
      var cx1 = cw * 0.65;
      ctx.fillStyle = eng1.color;
      drawIdleRocket(cx1, groundY, eng1, mc);
    }

    // Prompt text
    if (selectedEngines.length < 2) {
      ctx.font = "14px 'Inter','Noto Sans SC',sans-serif";
      ctx.textAlign = 'center';
      ctx.fillStyle = mc.dim;
      ctx.fillText(t('select2'), cw / 2, ch / 2);
    }
  } else {
    // Draw running/done rockets
    var maxSimAlt = getMaxSimAlt();
    if (rockets[0]) {
      var cx0r = cw * 0.35;
      drawRocket(cx0r, groundY, rockets[0].altitude, maxSimAlt, rockets[0], mc, cw, ch);
      drawFuelGauge(cx0r, groundY, rockets[0], mc);
    }
    if (rockets[1]) {
      var cx1r = cw * 0.65;
      drawRocket(cx1r, groundY, rockets[1].altitude, maxSimAlt, rockets[1], mc, cw, ch);
      drawFuelGauge(cx1r, groundY, rockets[1], mc);
    }

    if (simState === 'done') {
      drawResultPanel(mc, cw, ch);
    }
  }
}

function drawIdleRocket(cx, groundY, eng, mc) {
  var rw = 14;
  var rh = 40;
  var ry = groundY - rh / 2 - 4;

  // Body
  ctx.fillStyle = eng.color;
  ctx.fillRect(cx - rw / 2, ry - rh / 2, rw, rh);

  // Nose
  ctx.beginPath();
  ctx.moveTo(cx - rw / 2, ry - rh / 2);
  ctx.lineTo(cx, ry - rh / 2 - 14);
  ctx.lineTo(cx + rw / 2, ry - rh / 2);
  ctx.closePath();
  ctx.fill();

  // Fins
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(cx - rw / 2, ry + rh / 2);
  ctx.lineTo(cx - rw / 2 - 8, ry + rh / 2 + 8);
  ctx.lineTo(cx - rw / 2, ry + rh / 2 - 6);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + rw / 2, ry + rh / 2);
  ctx.lineTo(cx + rw / 2 + 8, ry + rh / 2 + 8);
  ctx.lineTo(cx + rw / 2, ry + rh / 2 - 6);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Label
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = mc.text;
  ctx.fillText(t(eng.id), cx, groundY + 20);
  ctx.fillStyle = mc.dim;
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.fillText('Isp: ' + eng.isp + 's', cx, groundY + 34);
}

// ================================================================
// SIMULATION
// ================================================================
var SIM_DT = 0.02; // seconds per physics step
var SIM_SPEED = 3;  // time multiplier for visual speed

function stepRocket(rk) {
  if (rk.phase === 'landed') return;

  var totalMass = rk.rocketMass + rk.fuelRemaining;
  var roundDef = ROUNDS[currentRound];

  if (rk.phase === 'burn' && rk.fuelRemaining > 0) {
    var fuelConsumed = Math.min(rk.mdot * SIM_DT, rk.fuelRemaining);
    rk.fuelRemaining -= fuelConsumed;
    rk.fuelUsed += fuelConsumed;

    var thrustForce = rk.thrust;
    var netForce = thrustForce - totalMass * G0;
    var accel = netForce / totalMass;
    rk.velocity += accel * SIM_DT;
    rk.totalImpulse += thrustForce * SIM_DT;

    if (rk.fuelRemaining <= 0.0001) {
      rk.fuelRemaining = 0;
      rk.phase = 'coast';
    }
  } else if (rk.phase === 'coast' || rk.phase === 'burn') {
    // Coasting or burn with no fuel
    if (rk.phase === 'burn') rk.phase = 'coast';
    rk.velocity -= G0 * SIM_DT;
    if (rk.velocity < 0) rk.phase = 'fall';
  } else if (rk.phase === 'fall') {
    rk.velocity -= G0 * SIM_DT;
  }

  rk.altitude += rk.velocity * SIM_DT;

  if (rk.altitude < 0) {
    rk.altitude = 0;
    rk.velocity = 0;
    rk.phase = 'landed';
  }

  if (rk.altitude > rk.maxAlt) rk.maxAlt = rk.altitude;

  // Check target
  if (roundDef.targetH && rk.altitude >= roundDef.targetH) {
    rk.reachedTarget = true;
  }
}

function startSimulation() {
  if (selectedEngines.length !== 2) return;
  if (simState !== 'idle') return;

  var roundDef = ROUNDS[currentRound];
  rockets[0] = resetRocketSim(selectedEngines[0], roundDef);
  rockets[1] = resetRocketSim(selectedEngines[1], roundDef);

  simState = 'running';
  simTime = 0;
  document.getElementById('btnLaunch').disabled = true;
  document.getElementById('statusResult').textContent = t('simulating');
  document.getElementById('statusResult').className = 'status-result';

  lastTimestamp = 0;
  animId = requestAnimationFrame(simLoop);
}

function simLoop(ts) {
  if (!lastTimestamp) lastTimestamp = ts;
  var dt = (ts - lastTimestamp) / 1000;
  lastTimestamp = ts;
  if (dt > 0.1) dt = 0.1;

  var stepsPerFrame = Math.max(1, Math.round(dt * SIM_SPEED / SIM_DT));
  for (var si = 0; si < stepsPerFrame; si++) {
    stepRocket(rockets[0]);
    stepRocket(rockets[1]);
    simTime += SIM_DT;
  }

  // Update HUD with first rocket info
  var rk0 = rockets[0];
  document.getElementById('hudV3').textContent = rk0.altitude.toFixed(1) + 'm';
  document.getElementById('hudV4').textContent = (rk0.fuelRemaining * 1000).toFixed(1) + 'g';

  drawScene();

  // Check if both landed
  if (rockets[0].phase === 'landed' && rockets[1].phase === 'landed') {
    finishRound();
    return;
  }

  // Timeout at 60s sim time
  if (simTime > 60) {
    finishRound();
    return;
  }

  animId = requestAnimationFrame(simLoop);
}

function finishRound() {
  simState = 'done';
  document.getElementById('btnLaunch').disabled = true;
  document.getElementById('statusResult').textContent = t('complete');
  document.getElementById('statusResult').className = 'status-result pass';

  // Score: bonus for picking the higher-Isp engine
  var r0 = rockets[0];
  var r1 = rockets[1];
  var roundDef = ROUNDS[currentRound];
  var roundScore = 0;

  if (roundDef.targetH) {
    // R3: score based on fuel efficiency to target
    if (r0.reachedTarget || r1.reachedTarget) roundScore += 50;
    var better = r0.maxAlt > r1.maxAlt ? r0 : r1;
    var betterEng = ENGINES[better.engineIdx];
    if (betterEng.isp >= 150) roundScore += 50;
  } else {
    // R1/R2: higher altitude = better
    var better2 = r0.maxAlt > r1.maxAlt ? r0 : r1;
    var betterEng2 = ENGINES[better2.engineIdx];
    roundScore = Math.min(100, Math.round(better2.maxAlt));
    if (betterEng2.isp >= 150) roundScore += 30;
  }
  totalScore += roundScore;
  document.getElementById('hudV5').textContent = totalScore + '';

  // Show next button or final message
  if (currentRound < 2) {
    showNextButton();
  } else {
    document.getElementById('statusResult').textContent = t('allDone');
  }

  drawScene();
}

function showNextButton() {
  var wrap = document.getElementById('nextWrap');
  wrap.innerHTML = '';
  var btn = document.createElement('button');
  btn.className = 'reset-btn';
  btn.id = 'btnNext';
  btn.textContent = t('nextRound');
  btn.addEventListener('click', nextRound);
  wrap.appendChild(btn);
}

function hideNextButton() {
  var wrap = document.getElementById('nextWrap');
  wrap.innerHTML = '';
}

function nextRound() {
  if (currentRound >= 2) return;
  currentRound++;
  simState = 'idle';
  selectedEngines = [];
  rockets = [null, null];
  simTime = 0;

  document.getElementById('btnLaunch').disabled = false;
  hideNextButton();
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';

  updateRoundInfo();
  updateGuideText();
  buildEngineCards();
  updateHUD();
  drawScene();
}

// ================================================================
// INIT
// ================================================================
function init() {
  canvas = document.getElementById('gc');
  ctx = canvas.getContext('2d');

  buildGameStyleSwitcher();
  setupLangToggle();
  applyGameMode(GAME_MODE);

  document.getElementById('btnLaunch').addEventListener('click', startSimulation);

  updateRoundInfo();
  updateGuideText();
  buildEngineCards();
  updateHUD();
  resizeCanvas();

  window.addEventListener('resize', resizeCanvas);
  refreshI18N();
}

init();
</script>
