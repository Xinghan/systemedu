<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

    var n = input.length;
    var easing = (opts && opts.easing) || null;
    var clamp = !(opts && opts.extrapolate === 'extend');

      if (clamp) return output[0];
      var p0 = (value - input[0]) / (input[1] - input[0]);

    }
    if (value >= input[n - 1]) {
      if (clamp) return output[n - 1];

      return lerp(output[n - 2], output[n - 1], easing ? easing(pn) : pn);

    for (var i = 1; i < n; i++) {
      if (value <= input[i]) {

// ============================================================
// DRAWING HELPERS
// ============================================================

// Draw a rocket side view (nose pointing right)
// cx, cy = center of body; bodyLen = cylinder length; bodyR = half-diameter
function _drawRocketSide(ctx, cx, cy, bodyLen, bodyR, P, mc) {
  var halfLen = bodyLen / 2;
  var noseLen = bodyR * 2.2;

  // Body cylinder
  ctx.fillStyle = P.primaryDim;
  ctx.strokeStyle = mc.stroke;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.rect(cx - halfLen, cy - bodyR, bodyLen, bodyR * 2);
  ctx.fill(); ctx.stroke();

  // Body center stripe (visual detail)
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = P.primary;
  ctx.fillRect(cx - halfLen, cy - 1, bodyLen, 2);
  ctx.restore();

  // Nose cone (right)
  ctx.fillStyle = P.primary;
  ctx.beginPath();
  ctx.moveTo(cx + halfLen, cy - bodyR);
  ctx.quadraticCurveTo(cx + halfLen + noseLen * 0.8, cy - bodyR * 0.3, cx + halfLen + noseLen, cy);
  ctx.quadraticCurveTo(cx + halfLen + noseLen * 0.8, cy + bodyR * 0.3, cx + halfLen, cy + bodyR);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Fins (rear/left side)
  var finH = bodyR * 0.8;
  var finW = bodyR * 1.0;
  ctx.fillStyle = P.secondaryDim;
  // Top fin
  ctx.beginPath();
  ctx.moveTo(cx - halfLen + finW * 0.4, cy - bodyR);
  ctx.lineTo(cx - halfLen - finW * 0.2, cy - bodyR - finH);
  ctx.lineTo(cx - halfLen - finW * 0.1, cy - bodyR);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Bottom fin
  ctx.beginPath();
  ctx.moveTo(cx - halfLen + finW * 0.4, cy + bodyR);
  ctx.lineTo(cx - halfLen - finW * 0.2, cy + bodyR + finH);
  ctx.lineTo(cx - halfLen - finW * 0.1, cy + bodyR);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Nozzle (left end)
  var nozW = bodyR * 0.5;
  var nozR = bodyR * 0.55;
  ctx.fillStyle = mc.mute;
  ctx.beginPath();
  ctx.moveTo(cx - halfLen, cy - nozR);
  ctx.lineTo(cx - halfLen - nozW, cy - nozR * 1.2);
  ctx.lineTo(cx - halfLen - nozW, cy + nozR * 1.2);
  ctx.lineTo(cx - halfLen, cy + nozR);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Diameter dimension bracket (right of nose)
  var dimX = cx + halfLen + noseLen + 16;
  ctx.strokeStyle = P.primary;
  ctx.lineWidth = 0.7;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(cx + halfLen + 4, cy - bodyR); ctx.lineTo(dimX + 6, cy - bodyR); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + halfLen + 4, cy + bodyR); ctx.lineTo(dimX + 6, cy + bodyR); ctx.stroke();
  ctx.setLineDash([]);
  // Vertical bar
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(dimX, cy - bodyR + 4); ctx.lineTo(dimX, cy + bodyR - 4); ctx.stroke();
  // Arrow tips
  ctx.fillStyle = P.primary;
  ctx.beginPath(); ctx.moveTo(dimX, cy - bodyR); ctx.lineTo(dimX - 3, cy - bodyR + 5); ctx.lineTo(dimX + 3, cy - bodyR + 5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(dimX, cy + bodyR); ctx.lineTo(dimX - 3, cy + bodyR - 5); ctx.lineTo(dimX + 3, cy + bodyR - 5); ctx.closePath(); ctx.fill();
}

// Draw frontal cross-section circle
function _drawCrossSection(ctx, cx, cy, r, P, mc, alpha) {
  // Outer glow
  ctx.save();
  ctx.globalAlpha = (alpha || 1) * 0.12;
  ctx.fillStyle = P.primary;
  ctx.shadowColor = P.primary;
  ctx.shadowBlur = 22;
  ctx.beginPath(); ctx.arc(cx, cy, r + 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Filled area (semi-transparent)
  ctx.save();
  ctx.globalAlpha = (alpha || 1) * 0.22;
  ctx.fillStyle = P.primary;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Main ring
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.strokeStyle = P.primary;
  ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  // Center cross-hair
  ctx.save();
  ctx.globalAlpha = (alpha || 1) * 0.35;
  ctx.strokeStyle = mc.stroke;
  ctx.lineWidth = 0.7;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Center dot
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.fillStyle = P.primary;
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ============================================================
// customDrawElement
// ============================================================
function customDrawElement(ctx, el, W, H) {
  var P = AnimRuntime.PAL;
  var mc = AnimRuntime.modeColors;

  if (el.type === 'rocket_side') {
    _drawRocketSide(ctx, el.x, el.y, el.bodyLen, el.bodyR, P, mc);
    return true;
  }

  if (el.type === 'cross_section') {
    _drawCrossSection(ctx, el.x, el.y, el.r, P, mc, el.alpha || 1);
    return true;
  }

  if (el.type === 'overlay_circles') {
    // Draw all 4 circles concentrically, largest first (bottom) to smallest (top)
    var radii = el.radii;
    var alphaFills = [0.10, 0.13, 0.17, 0.30];
    var alphaStrokes = [0.5, 0.55, 0.65, 1.0];
    for (var i = radii.length - 1; i >= 0; i--) {
      var ri = radii[i];
      // Fill
      ctx.save();
      ctx.globalAlpha = alphaFills[i];
      ctx.fillStyle = P.primary;
      ctx.beginPath(); ctx.arc(el.x, el.y, ri, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      // Stroke ring
      ctx.save();
      ctx.globalAlpha = alphaStrokes[i];
      ctx.strokeStyle = i === radii.length - 1 ? P.primary : P.primaryDim;
      ctx.lineWidth = i === radii.length - 1 ? 2.5 : 1.0;
      if (i < radii.length - 1) ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.arc(el.x, el.y, ri, 0, Math.PI * 2); ctx.stroke();
      if (i < radii.length - 1) ctx.setLineDash([]);
      ctx.restore();
    }
    // Center dot
    ctx.fillStyle = P.primary;
    ctx.beginPath(); ctx.arc(el.x, el.y, 3, 0, Math.PI * 2); ctx.fill();
    // Crosshairs on largest
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = mc.stroke;
    ctx.lineWidth = 0.6;
    ctx.setLineDash([5, 5]);
    var rMax = radii[radii.length - 1];
    ctx.beginPath(); ctx.moveTo(el.x - rMax, el.y); ctx.lineTo(el.x + rMax, el.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(el.x, el.y - rMax); ctx.lineTo(el.x, el.y + rMax); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    return true;
  }

  return false;
}

// ============================================================
// getFrameElements
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var mc = AnimRuntime.modeColors;
  var cx = W / 2, cy = H / 2;

  var rk = ROCKETS[f];
  var bodyR = rk.d * SCALE / 2;
  var bodyLen = bodyR * 4.5;
  var circleR = bodyR;

  // Layout: rocket on left third, circle on right third
  var rocketCx = W * 0.27;
  var rocketCy = cy + 8;
  var circleCx = W * 0.73;
  var circleCy = cy + 8;

  var els = [];

  // --- Top frame label ---
  els.push({id:'frameLabel', type:'label', text:t('fLabel'+f),
    x:cx, y:26, color:P.primary, size:14, align:'center'});

  // --- Section headers ---
  els.push({id:'sideLabel', type:'text', text:t('sideLabel'),
    x:rocketCx, y:50, color:mc.mute, size:9, align:'center'});
  els.push({id:'frontLabel', type:'text', text:t('frontLabel'),
    x:circleCx, y:50, color:mc.mute, size:9, align:'center'});

  // --- Rocket side view (all frames) ---
  els.push({id:'rocket', type:'rocket_side',
    x:rocketCx, y:rocketCy, bodyLen:bodyLen, bodyR:bodyR});

  // --- Diameter label beside rocket ---
  var noseTipX = rocketCx + bodyLen / 2 + bodyR * 2.2;
  var dimLabelX = noseTipX + 26;
  els.push({id:'dimLabel', type:'label',
    text:'D=' + rk.d + 'mm', x:dimLabelX, y:rocketCy,
    color:P.primary, size:11, align:'left'});

  if (f < 3) {
    // ========== FRAMES 0-2: single cross-section ==========

    // Cross-section circle
    els.push({id:'circle', type:'cross_section',
      x:circleCx, y:circleCy, r:circleR});

    // Connecting dotted line
    var lineStartX = noseTipX + 6;
    var lineEndX = circleCx - circleR - 14;
    els.push({id:'connectLine', type:'line',
      x1:lineStartX, y1:rocketCy, x2:lineEndX, y2:circleCy,
      color:mc.dim, lineWidth:1, dash:[5, 4]});
    els.push({id:'connectText', type:'text',
      text:t('connectLabel'),
      x:(lineStartX + lineEndX) / 2, y:rocketCy - 13,
      color:mc.mute, size:8, align:'center'});

    // Formula below circle
    els.push({id:'formula', type:'text',
      text:t('formulaLabel'),
      x:circleCx, y:circleCy + circleR + 26,
      color:mc.dim, size:10, align:'center'});

    // Computed area value
    els.push({id:'areaVal', type:'label',
      text:'A = ' + rk.area + ' mm\u00b2',
      x:circleCx, y:circleCy + circleR + 44,
      color:P.primary, size:13, align:'center'});

  } else {
    // ========== FRAME 3: overlay all 4 sizes ==========

    // Concentric overlay
    var allRadii = [];
    for (var i = 0; i < 4; i++) {
      allRadii.push(ROCKETS[i].d * SCALE / 2);
    }
    els.push({id:'circle', type:'overlay_circles',
      x:circleCx, y:circleCy, r:circleR, radii:allRadii});

    // Connecting dotted line (to largest)
    var lineStartX3 = noseTipX + 6;
    var lineEndX3 = circleCx - circleR - 14;
    els.push({id:'connectLine', type:'line',
      x1:lineStartX3, y1:rocketCy, x2:lineEndX3, y2:circleCy,
      color:mc.dim, lineWidth:1, dash:[5, 4]});
    els.push({id:'connectText', type:'text',
      text:t('connectLabel'),
      x:(lineStartX3 + lineEndX3) / 2, y:rocketCy - 13,
      color:mc.mute, size:8, align:'center'});

    // Ring diameter labels (smallest + largest visible)
    els.push({id:'ringLabel0', type:'text',
      text:'20mm', x:circleCx + allRadii[0] + 6, y:circleCy - allRadii[0] + 2,
      color:mc.dim, size:8, align:'left'});
    els.push({id:'ringLabel3', type:'text',
      text:'40mm', x:circleCx + allRadii[3] + 6, y:circleCy - allRadii[3] + 2,
      color:P.primary, size:9, align:'left'});

    // "D x2 --> A x4" highlight
    els.push({id:'compareLabel', type:'label',
      text:t('compareLabel'),
      x:circleCx, y:circleCy + circleR + 28,
      color:P.primary, size:16, align:'center', glow:P.glowStrong});

    // Largest area value
    els.push({id:'areaVal', type:'label',
      text:'A = ' + rk.area + ' mm\u00b2',
      x:circleCx, y:circleCy + circleR + 50,
      color:P.primary, size:12, align:'center'});

    // Formula
    els.push({id:'formula', type:'text',
      text:t('formulaLabel'),
      x:circleCx, y:circleCy + circleR + 68,
      color:mc.dim, size:9, align:'center'});
  }

  return els;
}
