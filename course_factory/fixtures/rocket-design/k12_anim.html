<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

// ============================================================
// STARS SEED (deterministic)
// ============================================================
var _stars = [];
(function() {
  var rng = 12345;
  function rand() { rng = (rng * 16807 + 0) % 2147483647; return rng / 2147483647; }
  for (var i = 0; i < 120; i++) {
    _stars.push({ x: rand(), y: rand(), r: rand() * 1.2 + 0.3, a: rand() * 0.5 + 0.3 });
  }
})();

// ============================================================
// DRAW BACKGROUND -- space theme with stars and nebula
// ============================================================
function drawBg(ctx, W, H) {
  // Deep space gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#06050f');
  g.addColorStop(0.5, '#0a0918');
  g.addColorStop(1, '#080714');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Purple nebula glow
  var ng = ctx.createRadialGradient(W * 0.6, H * 0.3, 0, W * 0.6, H * 0.3, W * 0.5);
  ng.addColorStop(0, 'rgba(167,139,250,0.08)');
  ng.addColorStop(0.5, 'rgba(139,92,246,0.04)');
  ng.addColorStop(1, 'transparent');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, W, H);

  // Second nebula (bottom-left)
  var ng2 = ctx.createRadialGradient(W * 0.2, H * 0.8, 0, W * 0.2, H * 0.8, W * 0.35);
  ng2.addColorStop(0, 'rgba(139,92,246,0.05)');
  ng2.addColorStop(1, 'transparent');
  ctx.fillStyle = ng2;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < _stars.length; i++) {
    var s = _stars[i];
    var sx = s.x * W, sy = s.y * H;
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#e8e4f0';
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Scanlines (subtle)
  ctx.strokeStyle = 'rgba(167,139,250,0.02)';
  ctx.lineWidth = 1;
  for (var sy2 = 0; sy2 < H; sy2 += 3) {
    ctx.beginPath(); ctx.moveTo(0, sy2); ctx.lineTo(W, sy2); ctx.stroke();
  }

  // Corner brackets
  var bLen = Math.min(W, H) * 0.05;
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.4;
  ctx.beginPath(); ctx.moveTo(8, 8 + bLen); ctx.lineTo(8, 8); ctx.lineTo(8 + bLen, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - 8 - bLen, 8); ctx.lineTo(W - 8, 8); ctx.lineTo(W - 8, 8 + bLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, H - 8 - bLen); ctx.lineTo(8, H - 8); ctx.lineTo(8 + bLen, H - 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - 8 - bLen, H - 8); ctx.lineTo(W - 8, H - 8); ctx.lineTo(W - 8, H - 8 + bLen); ctx.stroke();
  ctx.globalAlpha = 1;
}

// ============================================================
// HELPER: compute parabolic trajectory points
// ============================================================
function parabolicArc(x0, y0, v0, angleDeg, g, steps) {
  var pts = [];
  var rad = angleDeg * Math.PI / 180;
  var vx = v0 * Math.cos(rad);
  var vy = -v0 * Math.sin(rad);
  var tMax = (-vy + Math.sqrt(vy * vy + 2 * g * (400 - y0))) / g;
  if (!isFinite(tMax) || tMax <= 0) tMax = 3;
  for (var i = 0; i <= steps; i++) {
    var tt = (i / steps) * tMax;
    var px = x0 + vx * tt;
    var py = y0 + vy * tt + 0.5 * g * tt * tt;
    if (py > 400) py = 400;
    pts.push({ x: px, y: py });
    if (py >= 400) break;
  }
  return pts;
}

// ============================================================
// CUSTOM DRAW ELEMENT
// ============================================================
function customDrawElement(ctx, el, W, H) {
  if (el.type === 'trajectory') {
    // Draw trajectory dots
    var pts = el.points || [];
    ctx.globalAlpha = el.alpha || 1;
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      ctx.fillStyle = el.color || '#a78bfa';
      ctx.beginPath();
      ctx.arc(p.x, p.y, el.dotR || 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      if (el.glowColor) {
        ctx.save();
        ctx.shadowColor = el.glowColor;
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.restore();
      }
    }
    return true;
  }
  if (el.type === 'dashedPath') {
    ctx.strokeStyle = el.color || '#a78bfa';
    ctx.lineWidth = el.lineWidth || 1;
    ctx.setLineDash(el.dash || [4, 4]);
    ctx.globalAlpha = el.alpha || 1;
    var pts2 = el.points || [];
    if (pts2.length > 1) {
      ctx.beginPath();
      ctx.moveTo(pts2[0].x, pts2[0].y);
      for (var j = 1; j < pts2.length; j++) {
        ctx.lineTo(pts2[j].x, pts2[j].y);
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);
    return true;
  }
  if (el.type === 'ball') {
    ctx.globalAlpha = el.alpha || 1;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(el.x + 2, el.y + 2, el.r || 8, 0, Math.PI * 2);
    ctx.fill();
    // Ball body
    var bg = ctx.createRadialGradient(el.x - 2, el.y - 3, 1, el.x, el.y, el.r || 8);
    bg.addColorStop(0, el.highlight || '#f0e6ff');
    bg.addColorStop(0.5, el.color || '#a78bfa');
    bg.addColorStop(1, el.shadow || '#6d28d9');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(el.x, el.y, el.r || 8, 0, Math.PI * 2);
    ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(el.x - 2, el.y - 3, (el.r || 8) * 0.3, 0, Math.PI * 2);
    ctx.fill();
    return true;
  }
  if (el.type === 'ground') {
    ctx.globalAlpha = el.alpha || 1;
    ctx.strokeStyle = el.color || 'rgba(167,139,250,0.3)';
    ctx.lineWidth = el.lineWidth || 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(el.x1, el.y1);
    ctx.lineTo(el.x2, el.y2);
    ctx.stroke();
    ctx.setLineDash([]);
    return true;
  }
  if (el.type === 'basketballHoop') {
    ctx.globalAlpha = el.alpha || 1;
    // Backboard
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(el.x, el.y - 20);
    ctx.lineTo(el.x, el.y + 20);
    ctx.stroke();
    // Rim
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(el.x, el.y + 5);
    ctx.lineTo(el.x - 18, el.y + 5);
    ctx.stroke();
    // Net (simplified)
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.8;
    for (var n = 0; n < 4; n++) {
      ctx.beginPath();
      ctx.moveTo(el.x - 18 + n * 6, el.y + 5);
      ctx.lineTo(el.x - 14 + n * 4, el.y + 20);
      ctx.stroke();
    }
    return true;
  }
  if (el.type === 'fountain') {
    ctx.globalAlpha = el.alpha || 1;
    // Base
    ctx.fillStyle = '#64748b';
    ctx.fillRect(el.x - 15, el.y, 30, 8);
    // Water streams (3 arcs)
    var streams = [-0.3, 0, 0.3];
    for (var si = 0; si < streams.length; si++) {
      ctx.strokeStyle = 'rgba(96,165,250,' + (0.6 + si * 0.1) + ')';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      var sx0 = el.x + streams[si] * 10;
      for (var ft = 0; ft <= 20; ft++) {
        var ftt = ft / 20;
        var fx2 = sx0 + streams[si] * 25 * ftt;
        var fy2 = el.y - 35 * ftt * (1 - ftt) * 4;
        if (ft === 0) ctx.moveTo(fx2, fy2);
        else ctx.lineTo(fx2, fy2);
      }
      ctx.stroke();
    }
    return true;
  }
  if (el.type === 'rocketIcon') {
    ctx.globalAlpha = el.alpha || 1;
    ctx.save();
    ctx.translate(el.x, el.y);
    ctx.rotate(el.rotation || -0.5);
    // Body
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(5, 0);
    ctx.lineTo(3, 10);
    ctx.lineTo(-3, 10);
    ctx.lineTo(-5, 0);
    ctx.closePath();
    ctx.fill();
    // Nose
    ctx.fillStyle = '#a78bfa';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(3, -6);
    ctx.lineTo(-3, -6);
    ctx.closePath();
    ctx.fill();
    // Fins
    ctx.fillStyle = '#7c3aed';
    ctx.beginPath();
    ctx.moveTo(5, 6);
    ctx.lineTo(9, 12);
    ctx.lineTo(3, 10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-5, 6);
    ctx.lineTo(-9, 12);
    ctx.lineTo(-3, 10);
    ctx.closePath();
    ctx.fill();
    // Flame
    ctx.fillStyle = 'oklch(0.85 0.14 85)';
    ctx.beginPath();
    ctx.moveTo(-2, 10);
    ctx.lineTo(0, 18);
    ctx.lineTo(2, 10);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return true;
  }
  return false;
}

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;
  var groundY = H * 0.82;

  // ---- Frame 0: Title ----
  if (f === 0) {
    return [
      {id:'title0', type:'label', text:t('title'), x:cx, y:cy - 50, color:P.primary, size:22, align:'center', glow:P.glowStrong},
      {id:'sub0', type:'label', text:t('f0sub'), x:cx, y:cy + 5, color:P.muted, size:13, align:'center', bold:false},
      {id:'ball0', type:'ball', x:cx - 80, y:cy + 50, r:10, color:'#a78bfa', highlight:'#e8d5ff', shadow:'#6d28d9', alpha:1},
      {id:'ball0trail', type:'trajectory', points:parabolicArc(cx - 80, cy + 50, 120, 35, 200, 30), color:'rgba(167,139,250,0.4)', dotR:1.8, glowColor:'rgba(167,139,250,0.3)', alpha:1},
      {id:'ground0', type:'ground', x1:30, y1:groundY + 30, x2:W - 30, y2:groundY + 30, color:'rgba(167,139,250,0.15)', alpha:1},
    ];
  }

  // ---- Frame 1: Ball thrown horizontally, curves down ----
  if (f === 1) {
    var launchX = 60, launchY = H * 0.25;
    var trajPts = parabolicArc(launchX, launchY, 160, 0, 280, 40);
    var ballEnd = trajPts[Math.min(trajPts.length - 1, 25)];
    return [
      {id:'title1', type:'label', text:t('f1title'), x:cx, y:28, color:P.primary, size:15, align:'center'},
      {id:'note1', type:'text', text:t('f1note'), x:cx, y:50, color:P.muted, size:10, align:'center'},
      {id:'ground1', type:'ground', x1:30, y1:groundY, x2:W - 30, y2:groundY, color:'rgba(167,139,250,0.25)', alpha:1},
      {id:'traj1', type:'trajectory', points:trajPts, color:'#a78bfa', dotR:2.2, glowColor:'rgba(167,139,250,0.4)', alpha:1},
      {id:'ball1', type:'ball', x:ballEnd.x, y:ballEnd.y, r:9, color:'#a78bfa', highlight:'#e8d5ff', shadow:'#6d28d9', alpha:1},
      // Horizontal arrow (constant speed)
      {id:'arrowH1', type:'arrow', x1:launchX, y1:launchY - 18, x2:launchX + 120, y2:launchY - 18, color:'oklch(0.85 0.14 85)', lineWidth:1.5, headSize:6},
      {id:'labelH1', type:'text', text:t('f1hx'), x:launchX + 130, y:launchY - 18, color:'oklch(0.85 0.14 85)', size:9, align:'left'},
      // Vertical arrow (accelerating)
      {id:'arrowV1', type:'arrow', x1:launchX - 18, y1:launchY, x2:launchX - 18, y2:launchY + 100, color:'#ef4444', lineWidth:1.5, headSize:6},
      {id:'labelV1', type:'text', text:t('f1vy'), x:launchX - 14, y:launchY + 115, color:'#ef4444', size:9, align:'left'},
      // Hand/launcher indicator
      {id:'launcher1', type:'circle', x:launchX, y:launchY, r:5, fill:'rgba(167,139,250,0.5)', stroke:'#a78bfa', lineWidth:1, alpha:1},
    ];
  }

  // ---- Frame 2: Decomposed X and Y components ----
  if (f === 2) {
    var lx2 = 80, ly2 = H * 0.2;
    var trajPts2 = parabolicArc(lx2, ly2, 150, 0, 280, 40);
    // X component: equal spacing ticks along horizontal
    var xTicks = [];
    var yTicks = [];
    var spacing = 30;
    for (var xi = 0; xi < 12; xi++) {
      xTicks.push({ x: lx2 + xi * spacing, y: groundY + 14 });
    }
    // Y component: increasing spacing ticks along vertical
    var ySpacing = [0, 8, 20, 36, 56, 80, 108, 140, 176];
    for (var yi = 0; yi < ySpacing.length; yi++) {
      yTicks.push({ x: lx2 - 20, y: ly2 + ySpacing[yi] });
    }

    var elems = [
      {id:'title2', type:'label', text:t('f2title'), x:cx, y:28, color:P.primary, size:15, align:'center'},
      {id:'note2', type:'text', text:t('f2note'), x:cx, y:50, color:P.muted, size:10, align:'center'},
      {id:'ground2', type:'ground', x1:30, y1:groundY, x2:W - 30, y2:groundY, color:'rgba(167,139,250,0.25)', alpha:1},
      {id:'traj2', type:'trajectory', points:trajPts2, color:'rgba(167,139,250,0.3)', dotR:1.8, alpha:1},
      // X-axis decomposition line (dotted, along top)
      {id:'xLine2', type:'line', x1:lx2, y1:ly2, x2:lx2 + 11 * spacing, y2:ly2, color:'oklch(0.85 0.14 85)', lineWidth:1, dash:[4,4]},
      {id:'labelX2', type:'text', text:t('f2xlabel'), x:lx2 + 11 * spacing + 10, y:ly2 - 12, color:'oklch(0.85 0.14 85)', size:9, align:'left'},
      // Y-axis decomposition line (dotted, along left)
      {id:'yLine2', type:'line', x1:lx2, y1:ly2, x2:lx2, y2:ly2 + 176, color:'#ef4444', lineWidth:1, dash:[4,4]},
      {id:'labelY2', type:'text', text:t('f2ylabel'), x:lx2 + 8, y:ly2 + 190, color:'#ef4444', size:9, align:'left'},
    ];

    // X tick marks (equal spacing)
    for (var ti = 0; ti < xTicks.length; ti++) {
      elems.push({id:'xtick'+ti, type:'line', x1:xTicks[ti].x, y1:groundY + 8, x2:xTicks[ti].x, y2:groundY + 20, color:'oklch(0.85 0.14 85)', lineWidth:1.5});
    }
    // Y tick marks (increasing spacing)
    for (var tj = 0; tj < yTicks.length; tj++) {
      elems.push({id:'ytick'+tj, type:'line', x1:lx2 - 26, y1:yTicks[tj].y, x2:lx2 - 14, y2:yTicks[tj].y, color:'#ef4444', lineWidth:1.5});
    }
    // Ball at start
    elems.push({id:'ball2', type:'ball', x:lx2, y:ly2, r:8, color:'#a78bfa', highlight:'#e8d5ff', shadow:'#6d28d9', alpha:1});

    return elems;
  }

  // ---- Frame 3: Different launch angles (15, 45, 75) ----
  if (f === 3) {
    var lx3 = 60, ly3 = groundY;
    var arc15 = parabolicArc(lx3, ly3, 200, 15, 280, 50);
    var arc45 = parabolicArc(lx3, ly3, 200, 45, 280, 50);
    var arc75 = parabolicArc(lx3, ly3, 200, 75, 280, 50);

    return [
      {id:'title3', type:'label', text:t('f3title'), x:cx, y:28, color:P.primary, size:15, align:'center'},
      {id:'note3', type:'text', text:t('f3note'), x:cx, y:50, color:P.muted, size:10, align:'center'},
      {id:'ground3', type:'ground', x1:30, y1:groundY, x2:W - 30, y2:groundY, color:'rgba(167,139,250,0.25)', alpha:1},
      // 15-degree arc (orange)
      {id:'arc15', type:'trajectory', points:arc15, color:'#f97316', dotR:2, alpha:1},
      {id:'label15', type:'text', text:t('f3a15'), x:arc15[Math.min(arc15.length-1, 15)].x + 5, y:arc15[Math.min(arc15.length-1, 15)].y - 14, color:'#f97316', size:9, align:'left'},
      // 45-degree arc (gold/primary -- farthest)
      {id:'arc45', type:'trajectory', points:arc45, color:'oklch(0.85 0.14 85)', dotR:2.8, glowColor:'rgba(234,179,8,0.3)', alpha:1},
      {id:'label45', type:'text', text:t('f3a45'), x:arc45[Math.floor(arc45.length * 0.4)].x, y:arc45[Math.floor(arc45.length * 0.4)].y - 14, color:'oklch(0.85 0.14 85)', size:10, align:'center'},
      // 75-degree arc (cyan)
      {id:'arc75', type:'trajectory', points:arc75, color:'#22d3ee', dotR:2, alpha:1},
      {id:'label75', type:'text', text:t('f3a75'), x:arc75[Math.min(arc75.length-1, 8)].x + 8, y:arc75[Math.min(arc75.length-1, 8)].y - 14, color:'#22d3ee', size:9, align:'left'},
      // Launch point
      {id:'launch3', type:'circle', x:lx3, y:ly3, r:5, fill:'rgba(167,139,250,0.6)', stroke:'#a78bfa', lineWidth:1.5, alpha:1},
    ];
  }

  // ---- Frame 4: Real-world parabolas ----
  if (f === 4) {
    var secW = W / 3;
    return [
      {id:'title4', type:'label', text:t('f4title'), x:cx, y:28, color:P.primary, size:15, align:'center'},
      // Basketball section
      {id:'baskLabel', type:'text', text:t('f4bask'), x:secW * 0.5, y:H * 0.25, color:'oklch(0.85 0.14 85)', size:11, align:'center'},
      {id:'baskBall', type:'ball', x:secW * 0.2, y:H * 0.65, r:7, color:'#f97316', highlight:'#fed7aa', shadow:'#c2410c', alpha:1},
      {id:'baskArc', type:'trajectory', points:parabolicArc(secW * 0.2, H * 0.65, 120, 55, 280, 30), color:'#f97316', dotR:1.5, alpha:0.7},
      {id:'hoop', type:'basketballHoop', x:secW * 0.8, y:H * 0.45, alpha:1},
      // Fountain section
      {id:'fountLabel', type:'text', text:t('f4fount'), x:secW * 1.5, y:H * 0.25, color:'#60a5fa', size:11, align:'center'},
      {id:'fount', type:'fountain', x:secW * 1.5, y:H * 0.7, alpha:1},
      // Rocket section
      {id:'rockLabel', type:'text', text:t('f4rock'), x:secW * 2.5, y:H * 0.25, color:P.primary, size:11, align:'center'},
      {id:'rocket4', type:'rocketIcon', x:secW * 2.2, y:H * 0.6, rotation:-0.6, alpha:1},
      {id:'rocketArc', type:'trajectory', points:parabolicArc(secW * 2.2, H * 0.6, 130, 50, 200, 30), color:P.primary, dotR:1.5, alpha:0.5},
      // Dividers
      {id:'div1', type:'line', x1:secW, y1:H * 0.18, x2:secW, y2:H * 0.85, color:'rgba(167,139,250,0.15)', lineWidth:0.5},
      {id:'div2', type:'line', x1:secW * 2, y1:H * 0.18, x2:secW * 2, y2:H * 0.85, color:'rgba(167,139,250,0.15)', lineWidth:0.5},
    ];
  }

  // ---- Frame 5: Summary ----
  if (f === 5) {
    var sumY = H * 0.15;
    var diagCx = cx, diagY = H * 0.52;
    var sumArc = parabolicArc(diagCx - 160, diagY + 60, 170, 40, 280, 40);

    return [
      {id:'title5', type:'label', text:t('f5title'), x:cx, y:sumY, color:P.primary, size:14, align:'center', glow:P.glowStrong},
      {id:'eq5', type:'label', text:t('f5eq'), x:cx, y:sumY + 32, color:'oklch(0.85 0.14 85)', size:13, align:'center', bold:true},
      {id:'sum5', type:'text', text:t('f5sum'), x:cx, y:sumY + 58, color:P.muted, size:10, align:'center'},
      // Diagram: combined trajectory
      {id:'ground5', type:'ground', x1:diagCx - 200, y1:diagY + 60, x2:diagCx + 200, y2:diagY + 60, color:'rgba(167,139,250,0.25)', alpha:1},
      {id:'arcSum', type:'trajectory', points:sumArc, color:'#a78bfa', dotR:2.5, glowColor:'rgba(167,139,250,0.4)', alpha:1},
      {id:'ball5', type:'ball', x:diagCx - 160, y:diagY + 60, r:8, color:'#a78bfa', highlight:'#e8d5ff', shadow:'#6d28d9', alpha:1},
      // Horizontal arrow
      {id:'arrowH5', type:'arrow', x1:diagCx - 160, y1:diagY + 80, x2:diagCx + 100, y2:diagY + 80, color:'oklch(0.85 0.14 85)', lineWidth:1.5, headSize:6},
      {id:'labelH5', type:'text', text:'v\u2080t', x:diagCx + 110, y:diagY + 80, color:'oklch(0.85 0.14 85)', size:10, align:'left'},
      // Vertical arrow
      {id:'arrowV5', type:'arrow', x1:diagCx - 180, y1:diagY - 40, x2:diagCx - 180, y2:diagY + 60, color:'#ef4444', lineWidth:1.5, headSize:6},
      {id:'labelV5', type:'text', text:'\u00bdgt\u00b2', x:diagCx - 176, y:diagY + 75, color:'#ef4444', size:10, align:'left'},
      // Launch point
      {id:'launch5', type:'circle', x:diagCx - 160, y:diagY + 60, r:4, fill:'rgba(167,139,250,0.6)', stroke:'#a78bfa', lineWidth:1, alpha:1},
    ];
  }

  return [];
}

AnimRuntime.boot();
</script>
