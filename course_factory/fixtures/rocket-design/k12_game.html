<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
.power-bar-wrap{margin-top:4px;width:100%;height:18px;background:rgba(128,128,128,0.1);border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));position:relative;overflow:hidden;}
.power-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),oklch(0.85 0.14 85));transition:none;}
.power-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">TRAJECTORY LAUNCHER</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="powerLabel">POWER</div>
    <div class="power-bar-wrap"><div class="power-bar-fill" id="powerFill"></div></div>
    <div class="power-label" id="powerHint">HOLD TO CHARGE</div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnFire">FIRE</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">TRAJECTORY LAUNCHER</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ROUND</div><div class="hud-val" id="hudV1">1/7</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">ANGLE</div><div class="hud-val" id="hudV2">45</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">POWER</div><div class="hud-val" id="hudV3">0%</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">SCORE</div><div class="hud-val" id="hudV4">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">CLICK AND DRAG ON CANVAS TO AIM</span>
      <span class="status-val" id="statusDist"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  sideTitle:  {en:'TRAJECTORY LAUNCHER', cn:'\u8f68\u8ff9\u53d1\u5c04\u5668'},
  sideSub:    {en:'Aim and fire to hit the target', cn:'\u7784\u51c6\u76ee\u6807\uff0c\u8c03\u6574\u89d2\u5ea6\u548c\u529b\u5ea6'},
  guideLabel: {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:  {en:'Drag on canvas to aim angle. Hold FIRE to charge power, release to launch. Hit the target zone!', cn:'\u5728\u753b\u5e03\u4e0a\u62d6\u62fd\u8c03\u6574\u53d1\u5c04\u89d2\u5ea6\u3002\u6309\u4f4f\u201c\u53d1\u5c04\u201d\u84c4\u529b\uff0c\u677e\u5f00\u53d1\u5c04\u3002\u547d\u4e2d\u76ee\u6807\u533a\u57df\uff01'},
  powerLabel: {en:'POWER', cn:'\u529b\u5ea6'},
  powerHint:  {en:'HOLD FIRE TO CHARGE', cn:'\u6309\u4f4f\u53d1\u5c04\u84c4\u529b'},
  btnFire:    {en:'FIRE', cn:'\u53d1\u5c04'},
  btnReset:   {en:'RESET', cn:'\u91cd\u7f6e'},
  hudTag:     {en:'TRAJECTORY LAUNCHER', cn:'\u8f68\u8ff9\u53d1\u5c04\u5668'},
  hudL1:      {en:'ROUND', cn:'\u56de\u5408'},
  hudL2:      {en:'ANGLE', cn:'\u89d2\u5ea6'},
  hudL3:      {en:'POWER', cn:'\u529b\u5ea6'},
  hudL4:      {en:'SCORE', cn:'\u5f97\u5206'},
  statusAim:  {en:'DRAG ON CANVAS TO AIM, THEN HOLD FIRE', cn:'\u5728\u753b\u5e03\u4e0a\u62d6\u62fd\u7784\u51c6\uff0c\u7136\u540e\u6309\u4f4f\u53d1\u5c04'},
  statusFly:  {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  statusHit:  {en:'HIT!', cn:'\u547d\u4e2d\uff01'},
  statusMiss: {en:'MISS!', cn:'\u672a\u547d\u4e2d\uff01'},
  statusDone: {en:'ALL ROUNDS COMPLETE!', cn:'\u5168\u90e8\u56de\u5408\u5b8c\u6210\uff01'},
  statusScore:{en:'FINAL SCORE', cn:'\u6700\u7ec8\u5f97\u5206'},
  distLabel:  {en:'DISTANCE', cn:'\u8ddd\u79bb'},
  vxLabel:    {en:'Vx', cn:'Vx'},
  vyLabel:    {en:'Vy', cn:'Vy'},
  resultTitle:{en:'RESULTS', cn:'\u7ed3\u679c'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('sideTitle');
  document.getElementById('sideSub').textContent = t('sideSub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('powerLabel').textContent = t('powerLabel');
  document.getElementById('powerHint').textContent = t('powerHint');
  document.getElementById('btnFire').textContent = t('btnFire');
  document.getElementById('btnReset').textContent = t('btnReset');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hudL1').textContent = t('hudL1');
  document.getElementById('hudL2').textContent = t('hudL2');
  document.getElementById('hudL3').textContent = t('hudL3');
  document.getElementById('hudL4').textContent = t('hudL4');
  updateHUD();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, c2d, cw = 0, ch = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

// Stars (deterministic seed)
var bgStars = [];
(function(){
  var rng = 54321;
  function rand(){ rng = (rng * 16807) % 2147483647; return rng / 2147483647; }
  for(var i=0; i<100; i++) bgStars.push({x:rand(), y:rand(), r:rand()*1.2+0.3, a:rand()*0.4+0.2});
})();

var GRAVITY = 400; // px/s^2 in game coords
var TOTAL_ROUNDS = 7;
var TRAIL_COLORS = ['#a78bfa','#f97316','#22d3ee','#f472b6','#34d399','#fbbf24','#818cf8'];

var gameState = {
  round: 0,
  score: 0,
  phase: 'aim', // aim, charging, flying, landed, done
  launchAngle: 45,
  powerPct: 0,
  chargeDir: 1,
  // Ball flight
  ballX: 0, ballY: 0,
  ballVx: 0, ballVy: 0,
  flightTime: 0,
  trailDots: [],
  // Ghost trails from previous rounds
  ghostTrails: [],
  // Target
  targetX: 0, targetW: 0,
  // Aiming drag
  isDragging: false,
  // Particles
  particles: [],
  // Screen shake
  shakeAmount: 0,
  shakeDuration: 0,
  shakeStart: 0,
  // Results
  roundResults: [],
};

// Coordinate system: launcher at left, ground at bottom
function launcherX() { return cw * 0.08; }
function groundY() { return ch * 0.85; }
function scaleUnit() { return cw * 0.001; } // for velocity scaling

function generateTarget(round) {
  // Targets get progressively farther
  var minDist = cw * 0.15 + round * cw * 0.08;
  var maxDist = minDist + cw * 0.12;
  var dist = minDist + Math.random() * (maxDist - minDist);
  var tw = Math.max(cw * 0.04, cw * 0.08 - round * cw * 0.005);
  gameState.targetX = launcherX() + dist;
  gameState.targetW = tw;
}

function resetRound() {
  gameState.phase = 'aim';
  gameState.launchAngle = 45;
  gameState.powerPct = 0;
  gameState.ballX = launcherX();
  gameState.ballY = groundY();
  gameState.ballVx = 0;
  gameState.ballVy = 0;
  gameState.flightTime = 0;
  gameState.trailDots = [];
  gameState.particles = [];
  gameState.shakeAmount = 0;
  generateTarget(gameState.round);
  updateHUD();
  setStatus(t('statusAim'), '', '');
  document.getElementById('btnFire').disabled = false;
  document.getElementById('powerFill').style.width = '0%';
}

function resetGame() {
  gameState.round = 0;
  gameState.score = 0;
  gameState.ghostTrails = [];
  gameState.roundResults = [];
  resetRound();
}

// ================================================================
// PARTICLES
// ================================================================
function spawnParticles(px, py, col, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 40 + Math.random() * 120;
    gameState.particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 60,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      r: 1 + Math.random() * 2.5,
      color: col,
    });
  }
}

function updateParticles(dt) {
  for (var i = gameState.particles.length - 1; i >= 0; i--) {
    var p = gameState.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= p.decay;
    if (p.life <= 0) gameState.particles.splice(i, 1);
  }
}

// ================================================================
// SCREEN SHAKE
// ================================================================
function triggerShake(amount, dur) {
  gameState.shakeAmount = amount;
  gameState.shakeDuration = dur;
  gameState.shakeStart = performance.now();
}

function getShakeOffset() {
  if (gameState.shakeAmount <= 0) return {x:0, y:0};
  var elapsed = (performance.now() - gameState.shakeStart) / 1000;
  if (elapsed > gameState.shakeDuration) { gameState.shakeAmount = 0; return {x:0, y:0}; }
  var decay = 1 - elapsed / gameState.shakeDuration;
  var amp = gameState.shakeAmount * decay;
  return { x: (Math.random() - 0.5) * amp * 2, y: (Math.random() - 0.5) * amp * 2 };
}

// ================================================================
// HUD UPDATE
// ================================================================
function updateHUD() {
  document.getElementById('hudV1').textContent = (gameState.round + 1) + '/' + TOTAL_ROUNDS;
  document.getElementById('hudV2').textContent = Math.round(gameState.launchAngle) + '\u00b0';
  document.getElementById('hudV3').textContent = Math.round(gameState.powerPct) + '%';
  document.getElementById('hudV4').textContent = gameState.score;
}

function setStatus(label, dist, result) {
  document.getElementById('statusLabel').textContent = label;
  document.getElementById('statusDist').textContent = dist;
  var rEl = document.getElementById('statusResult');
  rEl.textContent = result;
  rEl.className = 'status-result' + (result === t('statusHit') ? ' pass' : result === t('statusMiss') ? ' fail' : '');
}

// ================================================================
// DRAWING
// ================================================================
function drawSpaceBackground(c, w, h) {
  // Deep space gradient
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);

  // Stars
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    c.globalAlpha = s.a;
    c.fillStyle = mc.text;
    c.beginPath();
    c.arc(s.x * w, s.y * h * 0.8, s.r, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;

  // Nebula
  if (mc.glow) {
    var ng = c.createRadialGradient(w*0.7, h*0.2, 0, w*0.7, h*0.2, w*0.4);
    ng.addColorStop(0, 'rgba(167,139,250,0.07)');
    ng.addColorStop(1, 'transparent');
    c.fillStyle = ng; c.fillRect(0,0,w,h);
  }

  // Planet in corner (decorative)
  c.save();
  c.globalAlpha = 0.15;
  var planetR = Math.min(w, h) * 0.08;
  c.fillStyle = '#7c3aed';
  c.beginPath();
  c.arc(w - planetR * 0.7, planetR * 0.7, planetR, 0, Math.PI * 2);
  c.fill();
  // Planet ring
  c.strokeStyle = '#a78bfa';
  c.lineWidth = 1.5;
  c.beginPath();
  c.ellipse(w - planetR * 0.7, planetR * 0.7, planetR * 1.5, planetR * 0.3, 0.3, 0, Math.PI * 2);
  c.stroke();
  c.restore();

  // Ground (mode-aware)
  drawGameBg(c, w, h);
}

function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  if (cw < 10 || ch < 10) { drawGameBg(c2d, cw, ch); return; }

  var c = c2d;
  var shake = getShakeOffset();
  c.save();
  c.translate(shake.x, shake.y);

  // Background
  drawSpaceBackground(c, cw, ch);

  var mc = gameModeColors();
  var gY = groundY();
  var lX = launcherX();

  // Corner brackets (cyberpunk)
  if (mc.cornerBrackets) {
    var bl = Math.min(cw,ch)*0.05;
    c.strokeStyle = ACCENT; c.lineWidth = 1.5; c.globalAlpha = 0.4;
    c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();
    c.beginPath();c.moveTo(cw-8-bl,8);c.lineTo(cw-8,8);c.lineTo(cw-8,8+bl);c.stroke();
    c.beginPath();c.moveTo(8,ch-8-bl);c.lineTo(8,ch-8);c.lineTo(8+bl,ch-8);c.stroke();
    c.beginPath();c.moveTo(cw-8-bl,ch-8);c.lineTo(cw-8,ch-8);c.lineTo(cw-8,ch-8+bl);c.stroke();
    c.globalAlpha = 1;
  }

  // Ground line
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.setLineDash([6, 4]);
  c.beginPath();
  c.moveTo(20, gY);
  c.lineTo(cw - 20, gY);
  c.stroke();
  c.setLineDash([]);

  // Target zone
  if (gameState.phase !== 'done') {
    var tX = gameState.targetX;
    var tW = gameState.targetW;
    c.fillStyle = 'rgba(34,197,94,0.12)';
    c.fillRect(tX - tW/2, gY - 4, tW, 8);
    c.strokeStyle = '#22c55e';
    c.lineWidth = 1.5;
    c.strokeRect(tX - tW/2, gY - 4, tW, 8);
    // Target center marker
    c.fillStyle = '#22c55e';
    c.beginPath();
    c.moveTo(tX, gY - 12);
    c.lineTo(tX - 4, gY - 4);
    c.lineTo(tX + 4, gY - 4);
    c.closePath();
    c.fill();
  }

  // Ghost trails from previous rounds
  for (var gi = 0; gi < gameState.ghostTrails.length; gi++) {
    var gt = gameState.ghostTrails[gi];
    c.globalAlpha = 0.25;
    c.fillStyle = gt.color;
    for (var gj = 0; gj < gt.dots.length; gj++) {
      c.beginPath();
      c.arc(gt.dots[gj].x, gt.dots[gj].y, 1.5, 0, Math.PI * 2);
      c.fill();
    }
    c.globalAlpha = 1;
  }

  // Current trail
  var trailColor = TRAIL_COLORS[gameState.round % TRAIL_COLORS.length];
  for (var ti = 0; ti < gameState.trailDots.length; ti++) {
    var td = gameState.trailDots[ti];
    c.fillStyle = trailColor;
    c.globalAlpha = 0.7;
    c.beginPath();
    c.arc(td.x, td.y, 2, 0, Math.PI * 2);
    c.fill();
    // Glow
    c.save();
    c.shadowColor = trailColor;
    c.shadowBlur = 5;
    c.fill();
    c.restore();
    c.globalAlpha = 1;
  }

  // Launcher
  c.save();
  c.translate(lX, gY);
  // Base
  c.fillStyle = mc.strokeDim;
  c.fillRect(-8, -4, 16, 8);
  // Barrel (rotates with angle)
  var barrelLen = 30;
  var rad = -gameState.launchAngle * Math.PI / 180;
  c.save();
  c.rotate(rad);
  c.fillStyle = ACCENT;
  c.fillRect(0, -3, barrelLen, 6);
  // Muzzle tip
  c.fillStyle = 'oklch(0.85 0.14 85)';
  c.fillRect(barrelLen - 4, -4, 4, 8);
  c.restore();
  c.restore();

  // Angle guide arc (while aiming)
  if (gameState.phase === 'aim' || gameState.phase === 'charging') {
    c.save();
    c.strokeStyle = ACCENT;
    c.globalAlpha = 0.3;
    c.lineWidth = 1;
    c.setLineDash([3, 3]);
    c.beginPath();
    c.arc(lX, gY, 50, -Math.PI, 0);
    c.stroke();
    c.setLineDash([]);
    // Angle indicator line
    c.globalAlpha = 0.5;
    c.strokeStyle = ACCENT;
    c.lineWidth = 0.8;
    var aRad = -gameState.launchAngle * Math.PI / 180;
    c.beginPath();
    c.moveTo(lX, gY);
    c.lineTo(lX + Math.cos(aRad) * 55, gY + Math.sin(aRad) * 55);
    c.stroke();
    // Angle text
    c.fillStyle = mc.text;
    c.font = "bold 11px 'JetBrains Mono', monospace";
    c.textAlign = 'left';
    c.globalAlpha = 0.7;
    c.fillText(Math.round(gameState.launchAngle) + '\u00b0', lX + 58, gY - 10);
    c.restore();
  }

  // Predicted trajectory (while aiming/charging, subtle dotted line)
  if (gameState.phase === 'aim' || gameState.phase === 'charging') {
    var predV = (gameState.phase === 'charging' ? gameState.powerPct : 50) / 100 * 600 + 100;
    var predRad = gameState.launchAngle * Math.PI / 180;
    var predVx = predV * Math.cos(predRad);
    var predVy = -predV * Math.sin(predRad);
    c.save();
    c.globalAlpha = 0.2;
    c.fillStyle = ACCENT;
    for (var pi = 0; pi < 30; pi++) {
      var pt = pi * 0.05;
      var ppx = lX + predVx * pt;
      var ppy = gY + predVy * pt + 0.5 * GRAVITY * pt * pt;
      if (ppy > gY) break;
      if (ppx > cw) break;
      c.beginPath();
      c.arc(ppx, ppy, 1.5, 0, Math.PI * 2);
      c.fill();
    }
    c.restore();
  }

  // Ball (during flight or at landing)
  if (gameState.phase === 'flying' || gameState.phase === 'landed') {
    var bx = gameState.ballX;
    var by = gameState.ballY;

    // Velocity vectors during flight
    if (gameState.phase === 'flying') {
      var vecScale = 0.12;
      // Vx arrow (horizontal, gold)
      var vxLen = gameState.ballVx * vecScale;
      if (Math.abs(vxLen) > 5) {
        c.strokeStyle = 'oklch(0.85 0.14 85)';
        c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(bx, by); c.lineTo(bx + vxLen, by); c.stroke();
        // Arrowhead
        var ahx = bx + vxLen;
        c.fillStyle = 'oklch(0.85 0.14 85)';
        c.beginPath();
        c.moveTo(ahx, by);
        c.lineTo(ahx - 5, by - 3);
        c.lineTo(ahx - 5, by + 3);
        c.closePath(); c.fill();
        // Label (positioned above to avoid overlap)
        c.font = "9px 'JetBrains Mono', monospace";
        c.fillStyle = 'oklch(0.85 0.14 85)';
        c.textAlign = 'center';
        c.fillText(t('vxLabel'), bx + vxLen/2, by - 10);
      }

      // Vy arrow (vertical, red)
      var vyLen = gameState.ballVy * vecScale;
      if (Math.abs(vyLen) > 5) {
        c.strokeStyle = '#ef4444';
        c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(bx, by); c.lineTo(bx, by + vyLen); c.stroke();
        var ahy = by + vyLen;
        c.fillStyle = '#ef4444';
        c.beginPath();
        c.moveTo(bx, ahy);
        c.lineTo(bx - 3, ahy - 5 * Math.sign(vyLen));
        c.lineTo(bx + 3, ahy - 5 * Math.sign(vyLen));
        c.closePath(); c.fill();
        // Label (positioned to the right to avoid overlap with Vx)
        c.font = "9px 'JetBrains Mono', monospace";
        c.fillStyle = '#ef4444';
        c.textAlign = 'left';
        c.fillText(t('vyLabel'), bx + 8, by + vyLen/2);
      }
    }

    // Ball shadow
    c.fillStyle = 'rgba(0,0,0,0.3)';
    c.beginPath();
    c.arc(bx + 2, by + 2, 8, 0, Math.PI * 2);
    c.fill();

    // Ball body (gradient)
    var ballGrad = c.createRadialGradient(bx - 2, by - 3, 1, bx, by, 8);
    ballGrad.addColorStop(0, '#e8d5ff');
    ballGrad.addColorStop(0.5, trailColor);
    ballGrad.addColorStop(1, '#4c1d95');
    c.fillStyle = ballGrad;
    c.beginPath();
    c.arc(bx, by, 8, 0, Math.PI * 2);
    c.fill();

    // Ball shine
    c.fillStyle = 'rgba(255,255,255,0.4)';
    c.beginPath();
    c.arc(bx - 2, by - 3, 2.5, 0, Math.PI * 2);
    c.fill();

    // Glow
    c.save();
    c.shadowColor = trailColor;
    c.shadowBlur = 10;
    c.fillStyle = trailColor;
    c.globalAlpha = 0.3;
    c.beginPath();
    c.arc(bx, by, 8, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  // Particles
  for (var pk = 0; pk < gameState.particles.length; pk++) {
    var pp = gameState.particles[pk];
    c.globalAlpha = pp.life;
    c.fillStyle = pp.color;
    c.beginPath();
    c.arc(pp.x, pp.y, pp.r, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;

  // Results overlay (when done)
  if (gameState.phase === 'done') {
    drawResultsPanel(c, cw, ch);
  }

  c.restore(); // shake
}

function drawResultsPanel(c, w, h) {
  var mc = gameModeColors();
  // Semi-transparent overlay
  c.fillStyle = 'rgba(5,6,15,0.7)';
  c.fillRect(0, 0, w, h);

  var panelW = Math.min(w * 0.6, 400);
  var panelH = Math.min(h * 0.7, 300);
  var px = (w - panelW) / 2;
  var py = (h - panelH) / 2;

  // Panel bg
  c.fillStyle = 'rgba(15,15,30,0.95)';
  c.fillRect(px, py, panelW, panelH);
  c.strokeStyle = ACCENT;
  c.lineWidth = 1.5;
  c.strokeRect(px, py, panelW, panelH);

  // Title
  c.fillStyle = ACCENT;
  c.font = "bold 16px 'Space Grotesk', 'Noto Sans SC', sans-serif";
  c.textAlign = 'center';
  c.fillText(t('resultTitle'), w/2, py + 30);

  // Score
  c.fillStyle = 'oklch(0.85 0.14 85)';
  c.font = "bold 24px 'JetBrains Mono', monospace";
  c.fillText(t('statusScore') + ': ' + gameState.score, w/2, py + 65);

  // Mini trajectory map (all trails overlaid)
  var mapY = py + 85;
  var mapH = panelH - 110;
  var mapX = px + 20;
  var mapW = panelW - 40;

  // Mini ground line
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 0.5;
  c.beginPath();
  c.moveTo(mapX, mapY + mapH);
  c.lineTo(mapX + mapW, mapY + mapH);
  c.stroke();

  // Draw all ghost trails scaled to fit mini map
  for (var ri = 0; ri < gameState.ghostTrails.length; ri++) {
    var gt2 = gameState.ghostTrails[ri];
    c.fillStyle = gt2.color;
    c.globalAlpha = 0.6;
    for (var rj = 0; rj < gt2.dots.length; rj++) {
      var rd = gt2.dots[rj];
      // Scale from game coords to mini map
      var mx = mapX + (rd.x - launcherX()) / (cw - launcherX()) * mapW;
      var my = mapY + (rd.y / groundY()) * mapH;
      if (mx >= mapX && mx <= mapX + mapW) {
        c.beginPath();
        c.arc(mx, my, 1.5, 0, Math.PI * 2);
        c.fill();
      }
    }
    // Round label
    c.globalAlpha = 0.8;
    c.font = "8px 'JetBrains Mono', monospace";
    c.textAlign = 'left';
    c.fillText('R' + (ri + 1), mapX + mapW + 4, mapY + 10 + ri * 12);
  }
  c.globalAlpha = 1;
}

// ================================================================
// GAME LOOP
// ================================================================
var lastTime = 0;
var chargeTimer = null;

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // Update flight physics
  if (gameState.phase === 'flying') {
    gameState.flightTime += dt;
    gameState.ballVy += GRAVITY * dt;
    gameState.ballX += gameState.ballVx * dt;
    gameState.ballY += gameState.ballVy * dt;

    // Trail dots (every few frames)
    if (gameState.trailDots.length === 0 ||
        Math.hypot(gameState.ballX - gameState.trailDots[gameState.trailDots.length-1].x,
                    gameState.ballY - gameState.trailDots[gameState.trailDots.length-1].y) > 12) {
      gameState.trailDots.push({x: gameState.ballX, y: gameState.ballY});
    }

    // Check landing
    if (gameState.ballY >= groundY()) {
      gameState.ballY = groundY();
      gameState.phase = 'landed';

      // Calculate distance from target center
      var dist = Math.abs(gameState.ballX - gameState.targetX);
      var halfW = gameState.targetW / 2;
      var isHit = dist <= halfW;

      // Score: 100 for center, down to 10 for edge, 0 for miss
      var roundScore = 0;
      if (isHit) {
        roundScore = Math.round(100 * (1 - dist / halfW));
        roundScore = Math.max(10, roundScore);
        spawnParticles(gameState.ballX, gameState.ballY, '#22c55e', 30);
        spawnParticles(gameState.ballX, gameState.ballY, 'oklch(0.85 0.14 85)', 15);
        setStatus(t('statusHit'), t('distLabel') + ': ' + Math.round(dist) + 'px', t('statusHit'));
      } else {
        spawnParticles(gameState.ballX, gameState.ballY, '#ef4444', 20);
        triggerShake(6, 0.3);
        setStatus(t('statusMiss'), t('distLabel') + ': ' + Math.round(dist) + 'px', t('statusMiss'));
      }
      gameState.score += roundScore;
      gameState.roundResults.push({ round: gameState.round, score: roundScore, hit: isHit, dist: dist });

      // Save trail as ghost
      gameState.ghostTrails.push({
        dots: gameState.trailDots.slice(),
        color: TRAIL_COLORS[gameState.round % TRAIL_COLORS.length],
      });

      // Next round after delay
      setTimeout(function() {
        gameState.round++;
        if (gameState.round >= TOTAL_ROUNDS) {
          gameState.phase = 'done';
          setStatus(t('statusDone'), t('statusScore') + ': ' + gameState.score, '');
          document.getElementById('btnFire').disabled = true;
        } else {
          resetRound();
        }
        updateHUD();
      }, 1200);
    }

    // Out of bounds (too far right)
    if (gameState.ballX > cw + 50) {
      gameState.ballY = groundY();
      gameState.phase = 'landed';
      spawnParticles(cw - 10, groundY(), '#ef4444', 15);
      triggerShake(4, 0.2);
      setStatus(t('statusMiss'), '', t('statusMiss'));
      gameState.ghostTrails.push({
        dots: gameState.trailDots.slice(),
        color: TRAIL_COLORS[gameState.round % TRAIL_COLORS.length],
      });
      setTimeout(function() {
        gameState.round++;
        if (gameState.round >= TOTAL_ROUNDS) {
          gameState.phase = 'done';
          setStatus(t('statusDone'), t('statusScore') + ': ' + gameState.score, '');
          document.getElementById('btnFire').disabled = true;
        } else { resetRound(); }
        updateHUD();
      }, 1000);
    }
  }

  // Charging power
  if (gameState.phase === 'charging') {
    gameState.powerPct += gameState.chargeDir * 120 * dt;
    if (gameState.powerPct >= 100) { gameState.powerPct = 100; gameState.chargeDir = -1; }
    if (gameState.powerPct <= 0) { gameState.powerPct = 0; gameState.chargeDir = 1; }
    document.getElementById('powerFill').style.width = gameState.powerPct + '%';
    updateHUD();
  }

  // Particles
  updateParticles(dt);

  draw();
  requestAnimationFrame(gameLoop);
}

// ================================================================
// INPUT HANDLING
// ================================================================
function canvasMousePos(e) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / DPR) / rect.width * DPR / DPR,
    y: (e.clientY - rect.top) * (canvas.height / DPR) / rect.height * DPR / DPR,
  };
}

function handleAimStart(e) {
  if (gameState.phase !== 'aim' && gameState.phase !== 'charging') return;
  gameState.isDragging = true;
  handleAimMove(e);
}

function handleAimMove(e) {
  if (!gameState.isDragging) return;
  if (gameState.phase !== 'aim' && gameState.phase !== 'charging') return;
  var pos = canvasMousePos(e);
  var lX = launcherX();
  var gY = groundY();
  var dx = pos.x - lX;
  var dy = gY - pos.y;
  if (dx < 5) dx = 5;
  var angle = Math.atan2(dy, dx) * 180 / Math.PI;
  angle = Math.max(5, Math.min(80, angle));
  gameState.launchAngle = angle;
  updateHUD();
}

function handleAimEnd() {
  gameState.isDragging = false;
}

function startCharging() {
  if (gameState.phase !== 'aim') return;
  gameState.phase = 'charging';
  gameState.powerPct = 0;
  gameState.chargeDir = 1;
  document.getElementById('btnFire').textContent = '...';
}

function fireBall() {
  if (gameState.phase !== 'charging') return;
  gameState.phase = 'flying';
  document.getElementById('btnFire').disabled = true;

  var maxV = 700;
  var vel = (gameState.powerPct / 100) * maxV + 80;
  var rad = gameState.launchAngle * Math.PI / 180;
  gameState.ballX = launcherX();
  gameState.ballY = groundY();
  gameState.ballVx = vel * Math.cos(rad);
  gameState.ballVy = -vel * Math.sin(rad);
  gameState.flightTime = 0;
  gameState.trailDots = [{x: gameState.ballX, y: gameState.ballY}];

  setStatus(t('statusFly'), '', '');
}

// Touch support
function touchPos(e) {
  var touch = e.touches[0] || e.changedTouches[0];
  return { clientX: touch.clientX, clientY: touch.clientY };
}

// ================================================================
// INIT
// ================================================================
function resizeCanvas() {
  var body = document.querySelector('.game-body');
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  cw = rect.width;
  ch = rect.height;
  canvas.width = cw * DPR;
  canvas.height = ch * DPR;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  c2d.setTransform(DPR, 0, 0, DPR, 0, 0);
  // Regenerate target for new dimensions
  if (gameState.phase === 'aim') {
    generateTarget(gameState.round);
  }
}

function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 400);
  document.fonts.ready.then(resizeCanvas);

  // Canvas input: drag to aim
  canvas.addEventListener('mousedown', function(e) { handleAimStart(e); });
  canvas.addEventListener('mousemove', function(e) { handleAimMove(e); });
  canvas.addEventListener('mouseup', function(e) { handleAimEnd(); });
  canvas.addEventListener('mouseleave', function(e) { handleAimEnd(); });

  // Touch
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    handleAimStart(touchPos(e));
  }, {passive: false});
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    handleAimMove(touchPos(e));
  }, {passive: false});
  canvas.addEventListener('touchend', function(e) { handleAimEnd(); }, {passive: false});

  // Fire button: hold to charge, release to fire
  var fireBtn = document.getElementById('btnFire');
  fireBtn.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startCharging();
  });
  fireBtn.addEventListener('mouseup', function(e) {
    e.preventDefault();
    fireBall();
    fireBtn.textContent = t('btnFire');
  });
  fireBtn.addEventListener('mouseleave', function(e) {
    if (gameState.phase === 'charging') {
      fireBall();
      fireBtn.textContent = t('btnFire');
    }
  });
  // Touch on fire button
  fireBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    startCharging();
  }, {passive: false});
  fireBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    fireBall();
    fireBtn.textContent = t('btnFire');
  }, {passive: false});

  // Reset
  document.getElementById('btnReset').addEventListener('click', function() {
    resetGame();
  });

  resetGame();
  requestAnimationFrame(gameLoop);
}

function onModeChange() {
  // Redraw on mode change
}

init();
</script>
</body>
</html>
