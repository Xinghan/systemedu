<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#5ba3d9));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang lang-btn" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">FORCE DIAGRAM STUDIO</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="paletteLabel">FORCES</div>
    <div id="paletteSidebar"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnCheck">CHECK</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">FORCE DIAGRAM STUDIO</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">SCENARIO</div><div class="hud-val" id="hudV1">1/4</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">PLACED</div><div class="hud-val" id="hudV2">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">NEEDED</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">SCORE</div><div class="hud-val" id="hudV4">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">--</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(ctx, w, h) {
  var mc = gameModeColors();
  var g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(91,163,217,0.04)';
  ctx.strokeStyle = gc2; ctx.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  if(mc.innerBorder){ctx.strokeStyle=mc.innerBorderColor;ctx.lineWidth=0.5;ctx.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=ctx.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');ctx.strokeStyle=tg;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,0.5);ctx.lineTo(w,0.5);ctx.stroke();}
  if(mc.scanlines){ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;for(var sy=0;sy<h;sy+=3){ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(w,sy);ctx.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;ctx.strokeStyle=mc.accent;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;ctx.beginPath();ctx.moveTo(8,8+bl);ctx.lineTo(8,8);ctx.lineTo(8+bl,8);ctx.stroke();ctx.beginPath();ctx.moveTo(w-8-bl,8);ctx.lineTo(w-8,8);ctx.lineTo(w-8,8+bl);ctx.stroke();ctx.beginPath();ctx.moveTo(8,h-8-bl);ctx.lineTo(8,h-8);ctx.lineTo(8+bl,h-8);ctx.stroke();ctx.beginPath();ctx.moveTo(w-8-bl,h-8);ctx.lineTo(w-8,h-8);ctx.lineTo(w-8,h-8+bl);ctx.stroke();ctx.globalAlpha=1;}
  if(mc.glow){var rg=ctx.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#3d7ab5');
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  drawScene();
}

function buildGameStyleSwitcher() {
  var cont = document.getElementById('styleSwitcher');
  if (!cont) return;
  cont.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    cont.appendChild(btn);
  });
}

// i18n

  congrats:    {en:'Congratulations! You mastered free body diagrams!', cn:'\u606d\u559c\uff01\u4f60\u5df2\u638c\u63e1\u53d7\u529b\u793a\u610f\u56fe\uff01'},
  replay:      {en:'REPLAY', cn:'\u91cd\u65b0\u5f00\u59cb'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('paletteLabel').textContent = t('palette');
  document.getElementById('btnCheck').textContent = t('check');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('tag');
  document.getElementById('hudL1').textContent = t('scenario');
  document.getElementById('hudL2').textContent = t('placed');
  document.getElementById('hudL3').textContent = t('needed');
  document.getElementById('hudL4').textContent = t('scoreLabel');
  document.getElementById('statusLabel').textContent = t('statusLbl');
  buildPaletteSidebar();
  drawScene();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

var placedForces = [];

var dragX = 0, dragY = 0;

var feedbackTimer = 0;
var feedbackOk = false;
var scenarioComplete = false;
var allComplete = false;
var showNextBtn = false;
var nextBtnRect = { x: 0, y: 0, w: 0, h: 0 };
var replayBtnRect = { x: 0, y: 0, w: 0, h: 0 };
var bounceAnims = [];
var glowAnims = [];
var canvasEl, ctx2d, W, H, DPR;

// Palette items on canvas (force arrows available to drag)
var paletteItems = [];

// Drop zones: where forces snap to on the rocket
function getDropZones(rCx, rCy, arrowLen) {
  return {
    up:    { x: rCx, y: rCy - arrowLen * 0.7 },
    down:  { x: rCx, y: rCy + arrowLen * 0.7 },
  };
}

// ================================================================
// CANVAS SETUP
// ================================================================
function initCanvas() {
  canvasEl = document.getElementById('gc');
  var main = document.querySelector('.game-body');
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = main.clientWidth;
  H = main.clientHeight;
  canvasEl.width = W * DPR;
  canvasEl.height = H * DPR;
  canvasEl.style.width = W + 'px';
  canvasEl.style.height = H + 'px';
  ctx2d = canvasEl.getContext('2d');
  ctx2d.scale(DPR, DPR);
}

// ================================================================
// DRAWING: ROCKET
// ================================================================
function drawRocket(cx, cy, scale, rocketState) {
  var mc = gameModeColors();
  var s = scale;
  ctx2d.save();
  ctx2d.translate(cx, cy);

  // Rocket body dimensions
  var bodyW = 36 * s;
  var bodyH = 90 * s;
  var noseH = 30 * s;
  var finW = 16 * s;
  var finH = 24 * s;

  // Body
  ctx2d.fillStyle = '#c8d6e5';
  ctx2d.strokeStyle = mc.stroke;
  ctx2d.lineWidth = 1.5;
  ctx2d.fillRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);
  ctx2d.strokeRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);

  // Nose cone
  ctx2d.fillStyle = '#e06060';
  ctx2d.beginPath();
  ctx2d.moveTo(-bodyW / 2, -bodyH / 2);
  ctx2d.lineTo(0, -bodyH / 2 - noseH);
  ctx2d.lineTo(bodyW / 2, -bodyH / 2);
  ctx2d.closePath();
  ctx2d.fill();
  ctx2d.stroke();

  // Window
  ctx2d.fillStyle = '#5ba3d9';
  ctx2d.strokeStyle = mc.strokeDim;
  ctx2d.beginPath();
  ctx2d.arc(0, -bodyH * 0.15, 8 * s, 0, Math.PI * 2);
  ctx2d.fill();
  ctx2d.stroke();

  // Fins
  ctx2d.fillStyle = '#e06060';
  ctx2d.strokeStyle = mc.stroke;
  // Left fin
  ctx2d.beginPath();
  ctx2d.moveTo(-bodyW / 2, bodyH / 2);
  ctx2d.lineTo(-bodyW / 2 - finW, bodyH / 2 + finH * 0.3);
  ctx2d.lineTo(-bodyW / 2, bodyH / 2 - finH);
  ctx2d.closePath();
  ctx2d.fill(); ctx2d.stroke();
  // Right fin
  ctx2d.beginPath();
  ctx2d.moveTo(bodyW / 2, bodyH / 2);
  ctx2d.lineTo(bodyW / 2 + finW, bodyH / 2 + finH * 0.3);
  ctx2d.lineTo(bodyW / 2, bodyH / 2 - finH);
  ctx2d.closePath();
  ctx2d.fill(); ctx2d.stroke();

  // Flame (for ascent)
  if (rocketState === 'ascent') {
    var flameH = 30 * s + Math.random() * 10 * s;
    var flameW = bodyW * 0.5;
    ctx2d.fillStyle = '#ffcc33';
    ctx2d.globalAlpha = 0.9;
    ctx2d.beginPath();
    ctx2d.moveTo(-flameW / 2, bodyH / 2);
    ctx2d.lineTo(0, bodyH / 2 + flameH);
    ctx2d.lineTo(flameW / 2, bodyH / 2);
    ctx2d.closePath();
    ctx2d.fill();
    // Inner flame
    ctx2d.fillStyle = '#ff8844';
    ctx2d.beginPath();
    ctx2d.moveTo(-flameW / 4, bodyH / 2);
    ctx2d.lineTo(0, bodyH / 2 + flameH * 0.6);
    ctx2d.lineTo(flameW / 4, bodyH / 2);
    ctx2d.closePath();
    ctx2d.fill();
    ctx2d.globalAlpha = 1;
  }

  // Launch pad base (for pad scenario)
  if (rocketState === 'pad') {
    ctx2d.fillStyle = '#555';
    ctx2d.fillRect(-bodyW * 0.9, bodyH / 2 + 4, bodyW * 1.8, 8 * s);
    ctx2d.strokeStyle = mc.strokeDim;
    ctx2d.strokeRect(-bodyW * 0.9, bodyH / 2 + 4, bodyW * 1.8, 8 * s);
  }

  // Parachute (for parachute scenario)
  if (rocketState === 'parachute') {
    var paraW = bodyW * 2.2;
    var paraH = 40 * s;
    ctx2d.strokeStyle = '#aaa';
    ctx2d.lineWidth = 1;
    // Lines from nose to canopy
    ctx2d.beginPath();
    ctx2d.moveTo(0, -bodyH / 2 - noseH);
    ctx2d.lineTo(-paraW / 2, -bodyH / 2 - noseH - paraH);
    ctx2d.stroke();
    ctx2d.beginPath();
    ctx2d.moveTo(0, -bodyH / 2 - noseH);
    ctx2d.lineTo(paraW / 2, -bodyH / 2 - noseH - paraH);
    ctx2d.stroke();
    ctx2d.beginPath();
    ctx2d.moveTo(0, -bodyH / 2 - noseH);
    ctx2d.lineTo(0, -bodyH / 2 - noseH - paraH * 1.05);
    ctx2d.stroke();
    // Canopy
    ctx2d.fillStyle = 'rgba(255,204,51,0.25)';
    ctx2d.strokeStyle = '#ffcc33';
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();
    ctx2d.moveTo(-paraW / 2, -bodyH / 2 - noseH - paraH);
    ctx2d.quadraticCurveTo(0, -bodyH / 2 - noseH - paraH * 1.6, paraW / 2, -bodyH / 2 - noseH - paraH);
    ctx2d.fill();
    ctx2d.stroke();
  }

  ctx2d.restore();
}

// ================================================================
// DRAWING: FORCE ARROWS
// ================================================================
function drawForceArrow(x, y, dir, forceType, arrowLen, alpha, label) {
  var mc = gameModeColors();
  var color = FORCE_TYPES[forceType].color;
  var headLen = 14;
  var headW = 12;
  var shaftW = 8;

  ctx2d.save();
  ctx2d.globalAlpha = alpha || 1;
  ctx2d.translate(x, y);

  var angle = 0;
  if (dir === 'up') angle = -Math.PI / 2;
  else if (dir === 'down') angle = Math.PI / 2;
  else if (dir === 'left') angle = Math.PI;
  else angle = 0;

  ctx2d.rotate(angle);

  // Shaft
  ctx2d.fillStyle = color;
  ctx2d.fillRect(0, -shaftW / 2, arrowLen - headLen, shaftW);

  // Arrowhead
  ctx2d.beginPath();
  ctx2d.moveTo(arrowLen - headLen, -headW / 2);
  ctx2d.lineTo(arrowLen, 0);
  ctx2d.lineTo(arrowLen - headLen, headW / 2);
  ctx2d.closePath();
  ctx2d.fill();

  ctx2d.restore();

  // Label
  if (label) {
    ctx2d.save();
    ctx2d.font = '700 ' + Math.round(12) + 'px "JetBrains Mono", monospace';
    ctx2d.fillStyle = color;
    ctx2d.textAlign = 'center';
    var labelX = x;
    var labelY = y;
    if (dir === 'up') { labelX = x + arrowLen * 0.5 + 8; labelY = y - arrowLen * 0.3; }
    else if (dir === 'down') { labelX = x + arrowLen * 0.5 + 8; labelY = y + arrowLen * 0.3; }
    ctx2d.fillText(label, labelX, labelY);
    ctx2d.restore();
  }
}

// ================================================================
// PALETTE
// ================================================================
function buildPaletteItems() {
  paletteItems = [];
  var scenario = SCENARIOS[currentScenario];
  // Always offer all 4 force types in the palette
  var types = ['thrust', 'weight', 'normal', 'drag'];
  var paletteY = H * 0.85;
  var spacing = W / (types.length + 1);
  for (var i = 0; i < types.length; i++) {
    var ft = types[i];
    paletteItems.push({
      type: ft,
      // Palette home position
      homeX: spacing * (i + 1),
      homeY: paletteY,
      // Current position (for bounce-back)
      currentX: spacing * (i + 1),
      currentY: paletteY,
      used: false,
      arrowLen: 50,
    });
  }
}

function buildPaletteSidebar() {
  var cont = document.getElementById('paletteSidebar');
  if (!cont) return;
  cont.innerHTML = '';
  var types = ['thrust', 'weight', 'normal', 'drag'];
  types.forEach(function(ft) {
    var div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:6px;margin:3px 0;';
    var swatch = document.createElement('div');
    swatch.style.cssText = 'width:12px;height:12px;background:' + FORCE_TYPES[ft].color + ';flex-shrink:0;';
    var lbl = document.createElement('span');
    lbl.style.cssText = 'font-family:"JetBrains Mono",monospace;font-size:10px;color:' + FORCE_TYPES[ft].color + ';letter-spacing:0.1em;text-transform:uppercase;';
    lbl.textContent = t(ft);
    div.appendChild(swatch);
    div.appendChild(lbl);
    cont.appendChild(div);
  });
}

// ================================================================
// DRAWING: SCENE
// ================================================================
function drawScene() {
  if (!ctx2d) return;
  var mc = gameModeColors();
  ctx2d.clearRect(0, 0, W, H);
  drawGameBg(ctx2d, W, H);

  if (allComplete) {
    drawCompletionScreen();
    return;
  }

  var scenario = SCENARIOS[currentScenario];

  // Scenario title at top
  ctx2d.save();
  ctx2d.font = '700 ' + Math.round(Math.min(W, H) * 0.032) + 'px "Space Grotesk", "Noto Sans SC", sans-serif';
  ctx2d.fillStyle = mc.accent;
  ctx2d.textAlign = 'center';
  ctx2d.fillText(t(scenario.titleKey), W / 2, H * 0.07);
  ctx2d.restore();

  // Hint text below title
  if (!scenarioComplete && placedForces.length === 0) {
    ctx2d.save();
    ctx2d.font = '400 ' + Math.round(Math.min(W, H) * 0.022) + 'px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = mc.dim;
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t('dragHint'), W / 2, H * 0.11);
    ctx2d.restore();
  }

  // Rocket center
  var rCx = W / 2;
  var rCy = H * 0.42;
  var rScale = Math.min(W, H) / 500;
  if (rScale < 0.6) rScale = 0.6;

  drawRocket(rCx, rCy, rScale, scenario.rocketState);

  // Draw dashed circle as "drop zone" hint
  if (!scenarioComplete) {
    ctx2d.save();
    ctx2d.strokeStyle = mc.strokeDim;
    ctx2d.lineWidth = 1;
    ctx2d.setLineDash([6, 4]);
    ctx2d.beginPath();
    ctx2d.arc(rCx, rCy, 80 * rScale, 0, Math.PI * 2);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.restore();
  }

  // Placed forces
  var arrowLen = 55 * rScale;
  for (var i = 0; i < placedForces.length; i++) {
    var pf = placedForces[i];
    var startX = rCx;
    var startY = rCy;
    drawForceArrow(startX, startY, pf.dir, pf.type, arrowLen, 1, t(pf.type));
  }

  // Glow animations on placed forces
  for (var gi = glowAnims.length - 1; gi >= 0; gi--) {
    var ga = glowAnims[gi];
    ga.timer -= 16;
    if (ga.timer <= 0) { glowAnims.splice(gi, 1); continue; }
    var alpha = ga.timer / ga.duration * 0.5;
    ctx2d.save();
    ctx2d.strokeStyle = FORCE_TYPES[ga.type].color;
    ctx2d.globalAlpha = alpha;
    ctx2d.lineWidth = 3;
    var glowR = (1 - ga.timer / ga.duration) * 30 + 20;
    ctx2d.beginPath();
    ctx2d.arc(rCx, rCy, glowR * rScale, 0, Math.PI * 2);
    ctx2d.stroke();
    ctx2d.globalAlpha = 1;
    ctx2d.restore();
  }

  // Palette items (only unused ones)
  for (var pi = 0; pi < paletteItems.length; pi++) {
    var item = paletteItems[pi];
    if (item.used) continue;
    if (dragging && dragging.paletteIdx === pi) continue;
    drawPaletteForceIcon(item.currentX, item.currentY, item.type, item.arrowLen);
  }

  // Bounce animations
  for (var bi = bounceAnims.length - 1; bi >= 0; bi--) {
    var ba = bounceAnims[bi];
    ba.timer -= 16;
    if (ba.timer <= 0) {
      paletteItems[ba.paletteIdx].currentX = paletteItems[ba.paletteIdx].homeX;
      paletteItems[ba.paletteIdx].currentY = paletteItems[ba.paletteIdx].homeY;
      bounceAnims.splice(bi, 1);
      continue;
    }
    var progress = 1 - ba.timer / ba.duration;
    // Ease out bounce
    var ep = 1 - Math.pow(1 - progress, 3);
    var shakeX = Math.sin(progress * Math.PI * 6) * (1 - progress) * 12;
    paletteItems[ba.paletteIdx].currentX = ba.startX + (paletteItems[ba.paletteIdx].homeX - ba.startX) * ep + shakeX;
    paletteItems[ba.paletteIdx].currentY = ba.startY + (paletteItems[ba.paletteIdx].homeY - ba.startY) * ep;
  }

  // Dragging item
  if (dragging) {
    drawPaletteForceIcon(dragX, dragY, dragging.type, dragging.arrowLen);
  }

  // Feedback message
  if (feedbackMsg) {
    ctx2d.save();
    var fbSize = Math.round(Math.min(W, H) * 0.028);
    ctx2d.font = '700 ' + fbSize + 'px "JetBrains Mono", "Noto Sans SC", monospace';
    ctx2d.textAlign = 'center';
    ctx2d.fillStyle = feedbackOk ? '#22c55e' : '#ef4444';
    ctx2d.fillText(feedbackMsg, W / 2, H * 0.62);
    ctx2d.restore();
  }

  // Net force result (when scenario complete)
  if (scenarioComplete) {
    ctx2d.save();
    var resSize = Math.round(Math.min(W, H) * 0.022);
    ctx2d.font = '500 ' + resSize + 'px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = '#22c55e';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t(scenario.resultKey), W / 2, H * 0.67);
    ctx2d.restore();

    // Draw net force dashed arrow
    drawNetForceArrow(rCx, rCy, arrowLen, rScale, scenario);

    // Next button
    if (currentScenario < SCENARIOS.length - 1) {
      drawCanvasButton(W / 2, H * 0.75, t('next'), ACCENT, nextBtnRect);
    }
  }

  // Palette background strip
  if (!scenarioComplete) {
    ctx2d.save();
    ctx2d.fillStyle = 'rgba(0,0,0,0.25)';
    ctx2d.fillRect(0, H * 0.78, W, H * 0.22);
    ctx2d.strokeStyle = mc.strokeDim;
    ctx2d.lineWidth = 0.5;
    ctx2d.beginPath();
    ctx2d.moveTo(0, H * 0.78);
    ctx2d.lineTo(W, H * 0.78);
    ctx2d.stroke();

    // "Available Forces" label in palette area
    ctx2d.font = '700 10px "JetBrains Mono", monospace';
    ctx2d.fillStyle = mc.dim;
    ctx2d.textAlign = 'center';
    ctx2d.letterSpacing = '0.15em';
    ctx2d.fillText(LANG === 'cn' ? '\u53ef\u7528\u529b\u7bad\u5934' : 'AVAILABLE FORCES', W / 2, H * 0.81);
    ctx2d.restore();
  }

  // Update HUD
  updateHUD();
}

function drawPaletteForceIcon(cx, cy, forceType, arrowLen) {
  var mc = gameModeColors();
  var color = FORCE_TYPES[forceType].color;
  var iconR = arrowLen * 0.5;

  // Background circle
  ctx2d.save();
  ctx2d.fillStyle = 'rgba(0,0,0,0.4)';
  ctx2d.strokeStyle = color;
  ctx2d.lineWidth = 2;
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, iconR, 0, Math.PI * 2);
  ctx2d.fill();
  ctx2d.stroke();

  // Small arrow inside circle pointing in default direction
  var defDir = FORCE_TYPES[forceType].dir;
  var showDir = defDir || 'up';
  var miniLen = iconR * 0.65;
  var headLen = 8;
  var headW = 8;
  var shaftW = 4;

  ctx2d.translate(cx, cy);
  var angle = 0;
  if (showDir === 'up') angle = -Math.PI / 2;
  else if (showDir === 'down') angle = Math.PI / 2;
  ctx2d.rotate(angle);

  ctx2d.fillStyle = color;
  ctx2d.fillRect(-miniLen / 2, -shaftW / 2, miniLen - headLen, shaftW);
  ctx2d.beginPath();
  ctx2d.moveTo(miniLen / 2 - headLen, -headW / 2);
  ctx2d.lineTo(miniLen / 2, 0);
  ctx2d.lineTo(miniLen / 2 - headLen, headW / 2);
  ctx2d.closePath();
  ctx2d.fill();

  ctx2d.restore();

  // Label below circle
  ctx2d.save();
  ctx2d.font = '700 11px "JetBrains Mono", "Noto Sans SC", monospace';
  ctx2d.fillStyle = color;
  ctx2d.textAlign = 'center';
  ctx2d.fillText(t(forceType), cx, cy + iconR + 14);
  ctx2d.restore();
}

function drawNetForceArrow(rCx, rCy, arrowLen, rScale, scenario) {
  // Calculate net direction
  var netUp = 0;
  for (var i = 0; i < scenario.needed.length; i++) {
    var f = scenario.needed[i];
    if (f.dir === 'up') netUp += 1;
    else netUp -= 1;
  }
  if (netUp === 0) {
    // Balanced: draw = sign
    ctx2d.save();
    ctx2d.font = '700 24px "JetBrains Mono", monospace';
    ctx2d.fillStyle = '#22c55e';
    ctx2d.textAlign = 'center';
    ctx2d.fillText('= 0', rCx + arrowLen + 30, rCy);
    ctx2d.restore();
    return;
  }
  var netDir = netUp > 0 ? 'up' : 'down';
  var netLen = arrowLen * 0.7;
  var offsetX = arrowLen + 40;
  ctx2d.save();
  ctx2d.setLineDash([5, 3]);
  ctx2d.strokeStyle = '#22c55e';
  ctx2d.lineWidth = 3;
  var sx = rCx + offsetX;
  var sy = rCy;
  var ey = netDir === 'up' ? sy - netLen : sy + netLen;
  ctx2d.beginPath();
  ctx2d.moveTo(sx, sy);
  ctx2d.lineTo(sx, ey);
  ctx2d.stroke();
  // Arrowhead
  ctx2d.setLineDash([]);
  ctx2d.fillStyle = '#22c55e';
  ctx2d.beginPath();
  if (netDir === 'up') {
    ctx2d.moveTo(sx - 6, ey + 10);
    ctx2d.lineTo(sx, ey);
    ctx2d.lineTo(sx + 6, ey + 10);
  } else {
    ctx2d.moveTo(sx - 6, ey - 10);
    ctx2d.lineTo(sx, ey);
    ctx2d.lineTo(sx + 6, ey - 10);
  }
  ctx2d.closePath();
  ctx2d.fill();
  // Label
  ctx2d.font = '700 11px "JetBrains Mono", monospace';
  ctx2d.fillStyle = '#22c55e';
  ctx2d.textAlign = 'left';
  ctx2d.fillText(LANG === 'cn' ? '\u5408\u529b' : 'Net', sx + 10, (sy + ey) / 2 + 4);
  ctx2d.restore();
}

function drawCanvasButton(cx, cy, text, color, rectOut) {
  ctx2d.save();
  ctx2d.font = '700 14px "JetBrains Mono", monospace';
  var tw = ctx2d.measureText(text).width;
  var bw = tw + 40;
  var bh = 36;
  var bx = cx - bw / 2;
  var by = cy - bh / 2;
  rectOut.x = bx; rectOut.y = by; rectOut.w = bw; rectOut.h = bh;

  ctx2d.fillStyle = color;
  ctx2d.fillRect(bx, by, bw, bh);
  ctx2d.fillStyle = '#05060f';
  ctx2d.textAlign = 'center';
  ctx2d.textBaseline = 'middle';
  ctx2d.fillText(text, cx, cy);
  ctx2d.restore();
}

function drawCompletionScreen() {
  var mc = gameModeColors();
  ctx2d.save();
  // Big congratulation
  ctx2d.font = '700 ' + Math.round(Math.min(W, H) * 0.04) + 'px "Space Grotesk", "Noto Sans SC", sans-serif';
  ctx2d.fillStyle = '#22c55e';
  ctx2d.textAlign = 'center';
  ctx2d.fillText(t('congrats'), W / 2, H * 0.35);

  // Score
  ctx2d.font = '700 ' + Math.round(Math.min(W, H) * 0.06) + 'px "JetBrains Mono", monospace';
  ctx2d.fillStyle = mc.accent;
  ctx2d.fillText(totalScore + ' / ' + (SCENARIOS.length * 100), W / 2, H * 0.48);

  // Small rocket celebration
  drawRocket(W / 2, H * 0.2, 0.5, 'ascent');

  // Replay button
  drawCanvasButton(W / 2, H * 0.62, t('replay'), ACCENT, replayBtnRect);
  ctx2d.restore();
}

// ================================================================
// HUD UPDATE
// ================================================================
function updateHUD() {
  var scenario = SCENARIOS[currentScenario];
  document.getElementById('hudV1').textContent = (currentScenario + 1) + '/' + SCENARIOS.length;
  document.getElementById('hudV2').textContent = '' + placedForces.length;
  document.getElementById('hudV3').textContent = '' + (scenario ? scenario.needed.length : '--');
  document.getElementById('hudV4').textContent = '' + totalScore;

  var sv = document.getElementById('statusVal');
  var sr = document.getElementById('statusResult');
  if (allComplete) {
    sv.textContent = t('complete');
    sr.textContent = '';
    sr.className = 'status-result';
  } else if (scenarioComplete) {
    sv.textContent = t('correct');
    sr.textContent = '';
    sr.className = 'status-result pass';
  } else {
    sv.textContent = t('dragHint');
    sr.textContent = '';
    sr.className = 'status-result';
  }
}

// ================================================================
// INTERACTION: DRAG & DROP
// ================================================================
function getMousePos(e) {
  var rect = canvasEl.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height),
  };
}

function getTouchPos(e) {
  var touch = e.touches[0] || e.changedTouches[0];
  var rect = canvasEl.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top) * (H / rect.height),
  };
}

function hitPaletteItem(px, py) {
  for (var i = 0; i < paletteItems.length; i++) {
    var item = paletteItems[i];
    if (item.used) continue;
    var dx = px - item.currentX;
    var dy = py - item.currentY;
    if (Math.sqrt(dx * dx + dy * dy) < item.arrowLen * 0.6) {
      return i;
    }
  }
  return -1;
}

function hitButton(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

function onPointerDown(px, py) {
  if (allComplete) {
    if (hitButton(px, py, replayBtnRect)) {
      resetGame();
    }
    return;
  }
  if (scenarioComplete) {
    if (hitButton(px, py, nextBtnRect)) {
      advanceScenario();
    }
    return;
  }
  var idx = hitPaletteItem(px, py);
  if (idx >= 0) {
    dragging = {
      paletteIdx: idx,
      type: paletteItems[idx].type,
      arrowLen: paletteItems[idx].arrowLen,
    };
    dragX = px;
    dragY = py;
  }
}

function onPointerMove(px, py) {
  if (!dragging) return;
  dragX = px;
  dragY = py;
}

function onPointerUp(px, py) {
  if (!dragging) return;
  // Check if dropped near rocket center
  var rCx = W / 2;
  var rCy = H * 0.42;
  var rScale = Math.min(W, H) / 500;
  if (rScale < 0.6) rScale = 0.6;
  var snapDist = 80 * rScale;

  var dx = px - rCx;
  var dy = py - rCy;
  var dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < snapDist) {
    // Determine intended direction from drop position relative to rocket center
    var dir = determineDirection(px, py, rCx, rCy);
    // Check if this force+direction combo is needed
    var matched = checkForceMatch(dragging.type, dir);
    if (matched) {
      // Correct placement
      placedForces.push({ type: dragging.type, dir: dir });
      paletteItems[dragging.paletteIdx].used = true;
      glowAnims.push({ type: dragging.type, timer: 500, duration: 500 });
      feedbackMsg = '';
      // Check if all needed forces placed
      if (checkAllPlaced()) {
        scenarioComplete = true;
        totalScore += 100;
        feedbackMsg = t('correct');
        feedbackOk = true;
        feedbackTimer = 3000;
      }
    } else {
      // Wrong: bounce back
      triggerBounceBack(dragging.paletteIdx, px, py);
      feedbackMsg = t('wrong');
      feedbackOk = false;
      feedbackTimer = 2000;
    }
  } else {
    // Not near rocket: bounce back
    triggerBounceBack(dragging.paletteIdx, px, py);
  }

  dragging = null;
}

function determineDirection(px, py, rCx, rCy) {
  var dy = py - rCy;
  // Simple: above center = up, below center = down
  if (dy < 0) return 'up';
  return 'down';
}

function checkForceMatch(type, dir) {
  var scenario = SCENARIOS[currentScenario];
  for (var i = 0; i < scenario.needed.length; i++) {
    var n = scenario.needed[i];
    if (n.type === type && n.dir === dir) {
      // Check not already placed
      var alreadyPlaced = false;
      for (var j = 0; j < placedForces.length; j++) {
        if (placedForces[j].type === type && placedForces[j].dir === dir) {
          alreadyPlaced = true;
          break;
        }
      }
      if (!alreadyPlaced) return true;
    }
  }
  return false;
}

function checkAllPlaced() {
  var scenario = SCENARIOS[currentScenario];
  if (placedForces.length < scenario.needed.length) return false;
  for (var i = 0; i < scenario.needed.length; i++) {
    var n = scenario.needed[i];
    var found = false;
    for (var j = 0; j < placedForces.length; j++) {
      if (placedForces[j].type === n.type && placedForces[j].dir === n.dir) {
        found = true;
        break;
      }
    }
    if (!found) return false;
  }
  return true;
}

function triggerBounceBack(paletteIdx, fromX, fromY) {
  bounceAnims.push({
    paletteIdx: paletteIdx,
    startX: fromX,
    startY: fromY,
    timer: 500,
    duration: 500,
  });
}

function advanceScenario() {
  currentScenario++;
  if (currentScenario >= SCENARIOS.length) {
    allComplete = true;
  }
  placedForces = [];
  scenarioComplete = false;
  feedbackMsg = '';
  showNextBtn = false;
  buildPaletteItems();
}

function resetScenario() {
  placedForces = [];
  scenarioComplete = false;
  feedbackMsg = '';
  bounceAnims = [];
  glowAnims = [];
  buildPaletteItems();
}

function resetGame() {
  currentScenario = 0;
  totalScore = 0;
  allComplete = false;
  resetScenario();
}

// ================================================================
// CHECK BUTTON (sidebar)
// ================================================================
function onCheck() {
  if (scenarioComplete || allComplete) return;
  var scenario = SCENARIOS[currentScenario];
  if (checkAllPlaced()) {
    scenarioComplete = true;
    totalScore += 100;
    feedbackMsg = t('correct');
    feedbackOk = true;
    feedbackTimer = 3000;
  } else {
    feedbackMsg = t('wrong');
    feedbackOk = false;
    feedbackTimer = 2000;
  }
}

// ================================================================
// EVENT LISTENERS
// ================================================================
function setupEvents() {
  // Mouse
  canvasEl.addEventListener('mousedown', function(e) {
    var p = getMousePos(e);
    onPointerDown(p.x, p.y);
  });
  canvasEl.addEventListener('mousemove', function(e) {
    var p = getMousePos(e);
    onPointerMove(p.x, p.y);
    if (dragging) canvasEl.style.cursor = 'grabbing';
    else if (hitPaletteItem(p.x, p.y) >= 0) canvasEl.style.cursor = 'grab';
    else canvasEl.style.cursor = 'default';
  });
  canvasEl.addEventListener('mouseup', function(e) {
    var p = getMousePos(e);
    onPointerUp(p.x, p.y);
    canvasEl.style.cursor = 'default';
  });
  canvasEl.addEventListener('mouseleave', function() {
    if (dragging) {
      triggerBounceBack(dragging.paletteIdx, dragX, dragY);
      dragging = null;
    }
  });

  // Touch
  canvasEl.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var p = getTouchPos(e);
    onPointerDown(p.x, p.y);
  }, { passive: false });
  canvasEl.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var p = getTouchPos(e);
    onPointerMove(p.x, p.y);
  }, { passive: false });
  canvasEl.addEventListener('touchend', function(e) {
    e.preventDefault();
    var p = getTouchPos(e);
    onPointerUp(p.x, p.y);
  }, { passive: false });

  // Sidebar buttons
  document.getElementById('btnCheck').addEventListener('click', onCheck);
  document.getElementById('btnReset').addEventListener('click', function() {
    if (allComplete) { resetGame(); return; }
    resetScenario();
  });

  // Resize
  window.addEventListener('resize', function() {
    initCanvas();
    buildPaletteItems();
    // Re-mark used palette items
    for (var i = 0; i < paletteItems.length; i++) {
      for (var j = 0; j < placedForces.length; j++) {
        if (paletteItems[i].type === placedForces[j].type) {
          paletteItems[i].used = true;
          break;
        }
      }
    }
    drawScene();
  });
}

// ================================================================
// GAME LOOP
// ================================================================
var lastTime = 0;
function gameLoop(timestamp) {
  if (timestamp - lastTime >= 16) {
    lastTime = timestamp;
    // Tick feedback timer
    if (feedbackTimer > 0) {
      feedbackTimer -= 16;
      if (feedbackTimer <= 0) {
        feedbackMsg = '';
        feedbackTimer = 0;
      }
    }
    drawScene();
  }
  requestAnimationFrame(gameLoop);
}

// ================================================================
// INIT
// ================================================================
function init() {
  initCanvas();
  buildGameStyleSwitcher();
  setupLangToggle();
  refreshI18N();
  buildPaletteItems();
  setupEvents();
  applyGameMode(GAME_MODE);
  requestAnimationFrame(gameLoop);
}

init();
</script>
