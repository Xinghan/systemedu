<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100vh;overflow:hidden;background:#070a12;color:#eef6ff;font-family:'IBM Plex Sans','Noto Sans SC',sans-serif}.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden}.game-sidebar{width:208px;min-width:208px;max-width:208px;display:flex;flex-direction:column;gap:8px;padding:12px;background:rgba(3,6,14,.96);border-right:1px solid rgba(78,214,255,.22);overflow-y:auto}.sidebar-lang{align-self:flex-start;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.14em;padding:4px 9px;border:1px solid rgba(78,214,255,.45);background:rgba(78,214,255,.08);color:#4ed6ff;cursor:pointer}.sidebar-title{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:12px;font-weight:700;line-height:1.35;color:#4ed6ff;text-transform:uppercase}.sidebar-guide{font-size:11px;line-height:1.55;color:rgba(255,255,255,.74)}.game-main{flex:1;display:flex;flex-direction:column;min-width:0;background:radial-gradient(circle at 78% 16%,rgba(255,209,102,.13),transparent 34%),linear-gradient(135deg,#080b13,#111827 68%,#17110a)}.game-header{padding:9px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.36);border-bottom:1px solid rgba(255,255,255,.06)}h1{font-size:15px;margin:0;font-family:'IBM Plex Mono','Noto Sans SC',monospace;color:#ffd166}.info{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8be9ff}.game-body{flex:1;display:flex;min-height:0}canvas{width:100%;height:100%;display:block}.control-panel{display:flex;gap:10px;justify-content:center;align-items:center;padding:8px;background:rgba(0,0,0,.42);border-top:1px solid rgba(255,255,255,.06)}.ctrl-btn{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;padding:7px 14px;border:0;background:linear-gradient(135deg,#8be9ff,#4ed6ff);color:#061018;cursor:pointer}.ctrl-btn.secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.16)}.hud-bar{display:flex;gap:12px;justify-content:center;padding:7px 12px;background:rgba(0,0,0,.56);font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ffd166}#resultPanel{padding:0 12px;color:#10b981}
</style></head><body><div class="game-wrap"><div class="game-sidebar"><button class="sidebar-lang" id="langBtn">CN</button><div class="sidebar-title" id="sidebarTitle"></div><div class="sidebar-guide" id="guideContent"></div></div><div class="game-main"><div class="game-header"><h1 id="gameTitle"></h1><div class="info" id="roundInfo"></div></div><div class="game-body"><canvas id="c"></canvas></div><div class="control-panel"><button class="ctrl-btn" id="btnAction"></button><button class="ctrl-btn secondary" id="btnNext">下一关 Next</button><button class="ctrl-btn secondary" id="btnReset"></button><span id="resultPanel"></span></div><div class="hud-bar" id="hudBar"></div></div></div><script>
const KIND="failure";const ROUNDS=[{"prompt": "尾翼根部出现细裂纹，选择发射前检查动作。", "result": "通过：轻拉+放大镜检查可提前发现。"}, {"prompt": "发动机固定块有间隙，选择预防措施。", "result": "通过：加挡块并记录推杆检查。"}, {"prompt": "降落伞装舱紧，选择检查动作。", "result": "通过：完整抽出一次，确认无缠绕。"}];let LANG='cn',round=0,score=0,last='';const I18N={title:{cn:"发射前失效预防检查台",en:"\u53d1\u5c04\u524d\u5931\u6548\u9884\u9632\u68c0\u67e5\u53f0"},guide:{cn:"先阅读当前关卡的工程情境，点击“运行测试”观察后果，再进入下一关。目标不是答题速度，而是把动作、证据和验收标准连起来。",en:"Read the engineering situation, run the test, then move to the next round. Connect action, evidence, and acceptance."},action:{cn:'运行测试',en:'Run test'},reset:{cn:'重置',en:'Reset'},round:{cn:'关卡',en:'Round'}};function t(k){let v=I18N[k];return v?v[LANG]:k}function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,h,r):(ctx.rect(x,y,w,h));}function label(ctx,s,x,y,n,c,a='center',b=false){ctx.save();ctx.fillStyle=c;ctx.font=(b?'700 ':'')+n+"px IBM Plex Sans, Noto Sans SC, sans-serif";ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y);ctx.restore();}function mono(ctx,s,x,y,n,c,a='left'){ctx.save();ctx.fillStyle=c;ctx.font='700 '+n+'px IBM Plex Mono, Noto Sans SC, monospace';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y);ctx.restore();}function arrow(ctx,x1,y1,x2,y2,c){let a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-9*Math.cos(a-.45),y2-9*Math.sin(a-.45));ctx.lineTo(x2-9*Math.cos(a+.45),y2-9*Math.sin(a+.45));ctx.closePath();ctx.fill();}function rocket(ctx,x,y,s,tilt=0){ctx.save();ctx.translate(x,y);ctx.rotate(tilt);ctx.scale(s,s);ctx.fillStyle='#dfe8f5';ctx.fillRect(-70,-14,132,28);ctx.beginPath();ctx.moveTo(62,-14);ctx.lineTo(96,0);ctx.lineTo(62,14);ctx.fillStyle='#ff7848';ctx.fill();ctx.beginPath();ctx.moveTo(-36,14);ctx.lineTo(-12,43);ctx.lineTo(8,14);ctx.fillStyle='#ffd166';ctx.fill();ctx.restore();}function resize(){const c=document.getElementById('c'),dpr=Math.min(devicePixelRatio||1,2);c.width=c.clientWidth*dpr;c.height=c.clientHeight*dpr;draw();}function draw(){const c=document.getElementById('c'),ctx=c.getContext('2d'),dpr=Math.min(devicePixelRatio||1,2),W=c.width/dpr,H=c.height/dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);let g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#070a12');g.addColorStop(1,'#172033');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let x=0;x<W;x+=44){ctx.strokeStyle='rgba(255,255,255,.035)';ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}let r=ROUNDS[round];label(ctx,r.prompt,W/2,34,18,'#ffd166','center',true);rocket(ctx,W*.50,H*.48,.95,0);if(KIND==='mass'){let mass=120-(round*6)-(score*4);label(ctx,'mass '+mass+' g',W*.20,H*.28,24,'#4ed6ff','center',true);arrow(ctx,W*.42,H*.50,W*.42,H*.34,'#ff7848');arrow(ctx,W*.58,H*.50,W*.58,H*.28,'#4ed6ff');}if(KIND==='failure'){for(let i=0;i<=round;i++){ctx.strokeStyle=i<score?'#10b981':'#ff5f3c';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W*.45+i*12,H*.54);ctx.lineTo(W*.47+i*12,H*.59+i*6);ctx.stroke();}}if(KIND==='package'){ctx.fillStyle='rgba(78,214,255,.16)';ctx.fillRect(W*.16,H*.23,170,210);['BOM','尺寸图','连接表','安全页'].forEach((s,i)=>label(ctx,s,W*.16+85,H*.28+i*42,14,i<score?'#10b981':'#ffd166'));label(ctx,last||'等待审查',W*.68,H*.30,18,'#8be9ff','center',true);}if(KIND==='aero'){for(let i=0;i<7;i++){ctx.strokeStyle='rgba(78,214,255,.35)';ctx.beginPath();ctx.moveTo(70,H*.30+i*32);ctx.bezierCurveTo(W*.36,H*.30+i*32+20-score*4,W*.62,H*.30+i*32-18+score*3,W-80,H*.30+i*32);ctx.stroke();}label(ctx,'drag '+(70-score*8)+'%',W*.72,H*.30,18,'#ffb199');}label(ctx,last,W/2,H-38,15,last.includes('通过')||last.includes('PASS')?'#10b981':'#ffd166','center',true);document.getElementById('hudBar').textContent='score '+score+' / '+ROUNDS.length;}function update(){document.getElementById('sidebarTitle').textContent=t('title');document.getElementById('guideContent').textContent=t('guide');document.getElementById('gameTitle').textContent=t('title');document.getElementById('roundInfo').textContent=t('round')+' '+(round+1)+' / '+ROUNDS.length;document.getElementById('btnAction').textContent=t('action');document.getElementById('btnReset').textContent=t('reset');draw();}document.getElementById('langBtn').onclick=()=>{LANG=LANG==='cn'?'en':'cn';document.getElementById('langBtn').textContent=LANG.toUpperCase();update();};document.getElementById('btnAction').onclick=()=>{let r=ROUNDS[round];score+=1;last=r.result;document.getElementById('resultPanel').textContent=r.result;draw();};document.getElementById('btnNext').onclick=()=>{round=(round+1)%ROUNDS.length;last='';document.getElementById('resultPanel').textContent='';update();};document.getElementById('btnReset').onclick=()=>{round=0;score=0;last='';document.getElementById('resultPanel').textContent='';update();};window.addEventListener('resize',resize);update();resize();
</script></body></html>
