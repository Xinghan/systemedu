<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#070914;color:#eef2ff;font-family:'Inter','Noto Sans SC',sans-serif;}
button,select,input{font:inherit;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;background:linear-gradient(135deg,#070914 0%,#12111c 55%,#1d130b 100%);}
.game-sidebar{width:208px;min-width:208px;max-width:208px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(5,6,15,.94);border-right:1px solid rgba(255,181,156,.22);overflow-y:auto;}
.sidebar-lang{align-self:flex-start;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:4px 9px;cursor:pointer;border:1px solid rgba(255,181,156,.35);background:rgba(255,181,156,.08);color:#ffb59c;letter-spacing:.14em;text-transform:uppercase;}
.sidebar-title{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:16px;font-weight:700;line-height:1.15;color:#ffb59c;letter-spacing:.02em;}
.sidebar-sub{font-size:11px;line-height:1.5;color:#b9b7c8;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:#00daf3;letter-spacing:.14em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:#c8c5d6;line-height:1.55;}
.sidebar-guide ul{padding-left:16px;}
.control-group{display:flex;flex-direction:column;gap:5px;}
.control-group label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:#807d91;letter-spacing:.12em;text-transform:uppercase;}
.control-group select{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#eef2ff;padding:7px 8px;border-radius:0;outline:none;}
.control-group input[type=range]{width:100%;height:5px;appearance:none;background:rgba(255,255,255,.13);outline:none;border-radius:0;}
.control-group input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:0;background:#ffb59c;box-shadow:0 0 12px rgba(255,181,156,.55);cursor:pointer;}
.value-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:#ffb59c;}
.run-btn,.next-btn,.reset-btn{width:100%;cursor:pointer;border-radius:0;text-transform:uppercase;letter-spacing:.12em;font-family:'JetBrains Mono',monospace;font-weight:700;}
.run-btn{border:0;background:linear-gradient(135deg,#ffb59c,#ff7f50);color:#130905;padding:9px 8px;box-shadow:0 0 18px rgba(255,127,80,.28);}
.next-btn{border:1px solid rgba(0,218,243,.45);background:rgba(0,218,243,.08);color:#00daf3;padding:7px 8px;}
.reset-btn{border:1px solid rgba(255,255,255,.16);background:transparent;color:#a9a7b7;padding:6px 8px;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 16px;background:rgba(0,0,0,.34);border-bottom:1px solid rgba(255,255,255,.08);}
.game-title{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:21px;font-weight:700;color:#fff2e8;}
.info{font-family:'JetBrains Mono',monospace;font-size:12px;color:#00daf3;letter-spacing:.12em;text-transform:uppercase;}
.game-body{flex:1;min-height:0;display:flex;}
canvas{width:100%;height:100%;display:block;}
.hud-bar{height:52px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));background:rgba(0,0,0,.48);border-top:1px solid rgba(255,255,255,.08);}
.hud-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:0;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:#777489;letter-spacing:.15em;text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#ffb59c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.result-panel{display:flex;flex-direction:column;gap:6px;padding:8px 10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);}
.result-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#00daf3;letter-spacing:.1em;text-transform:uppercase;}
.result-copy{font-size:11px;line-height:1.45;color:#d7d4e5;}
.status-pass{color:#8df8c2;}.status-fail{color:#ff8d63;}.status-warn{color:#ffd166;}
@media (max-width:860px){.game-sidebar{width:190px;min-width:190px;max-width:190px}.game-title{font-size:17px}.hud-bar{grid-template-columns:repeat(2,minmax(0,1fr));height:70px}}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-sub" id="sidebarSub"></div>
    <div class="sidebar-section" id="guideLabel"></div>
    <div class="sidebar-guide" id="guideContent"></div>
    <div class="sidebar-section" id="jointLabel"></div>
    <div class="control-group"><label id="methodLabel" for="methodSelect"></label><select id="methodSelect"></select></div>
    <div class="control-group"><label id="prepLabel" for="prepSelect"></label><select id="prepSelect"></select></div>
    <div class="control-group"><label id="cureLabel" for="cureSlider"></label><input id="cureSlider" type="range" min="0" max="24" step="1" value="4"><div class="value-row"><span id="cureMin">0h</span><span id="cureValue">4h</span></div></div>
    <button class="run-btn" id="runBtn"></button>
    <button class="next-btn" id="nextBtn"></button>
    <button class="reset-btn" id="resetBtn"></button>
    <div class="result-panel" id="resultPanel"><div class="result-title" id="resultTitle"></div><div class="result-copy" id="resultCopy"></div></div>
  </div>
  <div class="game-main">
    <div class="game-header"><div class="game-title" id="gameTitle"></div><div class="info" id="roundInfo"></div></div>
    <div class="game-body"><canvas id="c"></canvas></div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
    </div>
  </div>
</div>
<script>
const I18N={
 title:{cn:'粘接测试台',en:'Bond Test Bench'}, subtitle:{cn:'调胶种、固化时间和表面处理，再运行热/拉载荷。',en:'Tune adhesive, cure time, and prep, then run heat/load tests.'},
 guideLabel:{cn:'游戏指南',en:'Guide'}, guide:{cn:'先读当前部位工况。选择连接方式、表面处理和固化时间。点击“运行测试 GO”，观察强度曲线是否跌破载荷线。',en:'Read the current joint condition. Choose connector, surface prep, and cure time. Press “Run Test GO” and watch whether strength falls below load.'},
 jointLabel:{cn:'当前测试',en:'Current Test'}, methodLabel:{cn:'连接方式',en:'Connector'}, prepLabel:{cn:'表面处理',en:'Surface Prep'}, cureLabel:{cn:'固化时间',en:'Cure Time'},
 run:{cn:'运行测试 GO',en:'Run Test GO'}, next:{cn:'下一测试',en:'Next Test'}, reset:{cn:'重新开始',en:'Restart'},
 resultReady:{cn:'等待测试',en:'Waiting'}, resultReadyCopy:{cn:'选择方案后运行，系统会模拟拉伸、热冲击和失效模式。',en:'Choose a setup and run. The system simulates tension, heat pulse, and failure mode.'},
 pass:{cn:'通过',en:'PASS'}, fail:{cn:'失效',en:'FAIL'}, warn:{cn:'临界',en:'MARGIN'},
 hudJoint:{cn:'部位',en:'Joint'}, hudLoad:{cn:'载荷',en:'Load'}, hudHeat:{cn:'温度',en:'Heat'}, hudMargin:{cn:'余量',en:'Margin'},
 round:{cn:'测试',en:'Round'},
};
const METHODS=[
 {id:'wood',cn:'木工白胶',en:'PVA wood glue',base:68,heat:65,cure:18,flex:0.82,mass:1.0,note:{cn:'木材/纸材友好，需耐心固化。',en:'Great for wood/paper; needs patient curing.'}},
 {id:'hot',cn:'热熔胶',en:'Hot glue',base:48,heat:58,cure:0.3,flex:0.75,mass:1.2,note:{cn:'快但怕热，关键结构慎用。',en:'Fast but heat-sensitive; risky for structure.'}},
 {id:'epoxy',cn:'双组分环氧',en:'Two-part epoxy',base:92,heat:135,cure:6,flex:0.78,mass:1.8,note:{cn:'强度和耐热好，但更重且需配比。',en:'Strong and heat-resistant, but heavier and needs mixing.'}},
 {id:'tape',cn:'双面胶/电工胶带',en:'Tape',base:32,heat:55,cure:0,flex:0.96,mass:0.6,note:{cn:'适合临时定位，不做结构主连接。',en:'Good for temporary positioning, not primary structure.'}},
 {id:'flameTape',cn:'防火胶带',en:'Flame tape',base:58,heat:210,cure:0,flex:1.05,mass:0.7,note:{cn:'适合短时火花附近的包扎和保护。',en:'Useful near brief sparks for wrapping/protection.'}},
 {id:'screw',cn:'螺丝/机械限位',en:'Screw / retainer',base:76,heat:180,cure:0,flex:0.7,mass:2.6,note:{cn:'可拆可靠，但要确认规则允许和防烫。',en:'Repeatable and reliable, but check rules and heat safety.'}}
];
const PREPS=[
 {id:'none',cn:'不打磨',en:'No prep',factor:0.78},
 {id:'sand',cn:'轻微打磨+除尘',en:'Sand + dust off',factor:1.0},
 {id:'clamp',cn:'打磨+夹具压紧',en:'Sand + clamp',factor:1.12}
];
const JOINTS=[
 {id:'fin',cn:'尾翼根部',en:'Fin root',load:62,temp:45,mode:{cn:'剪切+剥离',en:'shear + peel'},best:['wood','epoxy'],danger:['hot'],note:{cn:'尾翼要抗剪切和剥离，快干不是第一目标。',en:'Fins need shear and peel resistance; quick cure is not the main goal.'}},
 {id:'motor',cn:'发动机舱',en:'Motor mount',load:78,temp:125,mode:{cn:'高温+推力',en:'heat + thrust'},best:['epoxy','screw'],danger:['hot','tape'],note:{cn:'发动机附近先排除低温软化材料。',en:'Near the motor, rule out low-softening materials first.'}},
 {id:'recovery',cn:'降落伞连接绳',en:'Recovery cord',load:54,temp:160,mode:{cn:'火花+冲击',en:'spark + shock'},best:['flameTape','screw'],danger:['tape','hot'],note:{cn:'普通胶带会怕火花，柔性和阻燃更重要。',en:'Regular tape fears sparks; flexibility and flame resistance matter.'}}
];
let lang='cn';
let roundIndex=0;
let running=false;
let progress=0;
let lastResult=null;
let raf=0;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function tr(key){return (I18N[key]&&I18N[key][lang])||key;}
function method(){return METHODS.find(m=>m.id===document.getElementById('methodSelect').value)||METHODS[0];}
function prep(){return PREPS.find(p=>p.id===document.getElementById('prepSelect').value)||PREPS[0];}
function joint(){return JOINTS[roundIndex]||JOINTS[0];}
function scoreSetup(m,p,j,cure){
 const cureFactor=m.cure<=0?1:Math.min(1,cure/m.cure);
 const thermal=j.temp<=m.heat?1:Math.max(0.08,1-(j.temp-m.heat)/95);
 const bestBonus=j.best.includes(m.id)?1.12:1;
 const dangerPenalty=j.danger.includes(m.id)?0.55:1;
 const firePenalty=(j.id==='recovery'&&!['flameTape','screw'].includes(m.id))?0.72:1;
 const strength=m.base*(0.45+0.55*cureFactor)*p.factor*thermal*bestBonus*dangerPenalty*firePenalty;
 const margin=strength-j.load;
 return {strength,margin,cureFactor,thermal,passed:margin>=8,critical:margin>=0&&margin<8};
}
function resizeCanvas(){
 const rect=canvas.parentElement.getBoundingClientRect();
 const dpr=Math.min(window.devicePixelRatio||1,2);
 canvas.width=Math.max(1,Math.floor(rect.width*dpr));
 canvas.height=Math.max(1,Math.floor(rect.height*dpr));
 canvas.style.width=rect.width+'px';
 canvas.style.height=rect.height+'px';
 ctx.setTransform(dpr,0,0,dpr,0,0);
 draw();
}
function fillOptions(){
 const ms=document.getElementById('methodSelect');
 const ps=document.getElementById('prepSelect');
 ms.innerHTML=''; ps.innerHTML='';
 METHODS.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m[lang];ms.appendChild(o);});
 PREPS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p[lang];ps.appendChild(o);});
 if(joint().id==='fin') ms.value='wood';
 if(joint().id==='motor') ms.value='epoxy';
 if(joint().id==='recovery') ms.value='flameTape';
 ps.value='sand';
}
function refreshText(){
 document.getElementById('langBtn').textContent=lang.toUpperCase();
 document.getElementById('sidebarTitle').textContent=tr('title');
 document.getElementById('sidebarSub').textContent=tr('subtitle');
 document.getElementById('guideLabel').textContent=tr('guideLabel');
 document.getElementById('guideContent').innerHTML='<ul><li>'+tr('guide')+'</li><li>'+joint().note[lang]+'</li></ul>';
 document.getElementById('jointLabel').textContent=tr('jointLabel')+': '+joint()[lang];
 document.getElementById('methodLabel').textContent=tr('methodLabel');
 document.getElementById('prepLabel').textContent=tr('prepLabel');
 document.getElementById('cureLabel').textContent=tr('cureLabel');
 document.getElementById('runBtn').textContent=tr('run');
 document.getElementById('nextBtn').textContent=tr('next');
 document.getElementById('resetBtn').textContent=tr('reset');
 document.getElementById('gameTitle').textContent=joint()[lang]+' · '+joint().mode[lang];
 document.getElementById('roundInfo').textContent=tr('round')+' '+(roundIndex+1)+' / '+JOINTS.length;
 document.getElementById('hudL1').textContent=tr('hudJoint');
 document.getElementById('hudL2').textContent=tr('hudLoad');
 document.getElementById('hudL3').textContent=tr('hudHeat');
 document.getElementById('hudL4').textContent=tr('hudMargin');
 updateHud();
 updateResultPanel();
}
function updateHud(){
 const j=joint(); const r=lastResult||scoreSetup(method(),prep(),j,Number(document.getElementById('cureSlider').value));
 document.getElementById('hudV1').textContent=j[lang];
 document.getElementById('hudV2').textContent=j.load.toFixed(0)+' N';
 document.getElementById('hudV3').textContent=j.temp.toFixed(0)+' ℃';
 document.getElementById('hudV4').textContent=(r.margin>=0?'+':'')+r.margin.toFixed(1)+' N';
}
function updateResultPanel(){
 const title=document.getElementById('resultTitle');
 const copy=document.getElementById('resultCopy');
 if(!lastResult){title.textContent=tr('resultReady'); title.className='result-title status-warn'; copy.textContent=tr('resultReadyCopy'); return;}
 const key=lastResult.passed?'pass':(lastResult.critical?'warn':'fail');
 title.textContent=tr(key);
 title.className='result-title '+(lastResult.passed?'status-pass':(lastResult.critical?'status-warn':'status-fail'));
 const m=method(); const p=prep(); const j=joint();
 copy.textContent=(lang==='cn')
  ? `${m.cn} / ${p.cn}：估算强度 ${lastResult.strength.toFixed(1)} N，对比载荷 ${j.load} N。${m.note.cn}`
  : `${m.en} / ${p.en}: estimated strength ${lastResult.strength.toFixed(1)} N vs load ${j.load} N. ${m.note.en}`;
}
function drawBg(w,h){
 const g=ctx.createLinearGradient(0,0,w,h);g.addColorStop(0,'#080a16');g.addColorStop(.55,'#12111c');g.addColorStop(1,'#26160d');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
 ctx.strokeStyle='rgba(255,255,255,.035)';ctx.lineWidth=1;for(let x=0;x<w;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}for(let y=0;y<h;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
 const rg=ctx.createRadialGradient(w*.76,h*.25,0,w*.76,h*.25,Math.max(w,h)*.55);rg.addColorStop(0,'rgba(255,181,156,.11)');rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);
}
function rect(x,y,w,h,stroke,fill){ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);}
function label(txt,x,y,size,color,align='left',bold=false){ctx.fillStyle=color;ctx.font=(bold?'700 ':'')+size+"px 'Inter','Noto Sans SC',sans-serif";ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(txt,x,y);}
function drawRocket(w,h){
 const cx=w*.5, cy=h*.34, bodyW=w*.48, bodyH=h*.12;
 ctx.save();ctx.translate(cx-bodyW*.5,cy-bodyH*.5);
 rect(0,0,bodyW,bodyH,'rgba(255,255,255,.35)','rgba(255,255,255,.08)');
 ctx.beginPath();ctx.moveTo(bodyW,0);ctx.lineTo(bodyW+bodyH*.9,bodyH*.5);ctx.lineTo(bodyW,bodyH);ctx.closePath();ctx.fillStyle='rgba(255,181,156,.18)';ctx.fill();ctx.strokeStyle='rgba(255,181,156,.65)';ctx.stroke();
 ctx.fillStyle='rgba(0,218,243,.2)';ctx.fillRect(bodyW*.12,bodyH*.15,bodyW*.18,bodyH*.7);
 ctx.fillStyle='rgba(255,127,80,.2)';ctx.fillRect(bodyW*.02,bodyH*.22,bodyW*.14,bodyH*.56);
 ctx.fillStyle='rgba(141,248,194,.18)';ctx.beginPath();ctx.moveTo(bodyW*.18,bodyH);ctx.lineTo(bodyW*.28,bodyH+bodyH*.95);ctx.lineTo(bodyW*.08,bodyH);ctx.fill();ctx.stroke();
 ctx.restore();
 const j=joint(); let x=cx-bodyW*.5+bodyW*.2, y=cy+bodyH*.64;
 if(j.id==='motor'){x=cx-bodyW*.5+bodyW*.09;y=cy;}
 if(j.id==='recovery'){x=cx-bodyW*.5+bodyW*.23;y=cy-bodyH*.15;}
 ctx.strokeStyle='#00daf3';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,26+Math.sin(progress*8)*3,0,Math.PI*2);ctx.stroke();
 label(j[lang],x,y-40,13,'#00daf3','center',true);
}
function drawBars(w,h){
 const j=joint(); const m=method(); const p=prep(); const cure=Number(document.getElementById('cureSlider').value); const r=lastResult||scoreSetup(m,p,j,cure);
 const baseX=w*.18, baseY=h*.58, barW=w*.64, barH=18;
 label(lang==='cn'?'强度余量曲线':'Strength Margin Trace',baseX,baseY-34,16,'#fff2e8','left',true);
 ctx.strokeStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.moveTo(baseX,baseY+barH+18);ctx.lineTo(baseX+barW,baseY+barH+18);ctx.stroke();
 const loadX=baseX+barW*(j.load/115);ctx.strokeStyle='#ff8d63';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(loadX,baseY-8);ctx.lineTo(loadX,baseY+barH+34);ctx.stroke();label(lang==='cn'?'载荷线':'load',loadX,baseY-18,11,'#ff8d63','center');
 const dynamicStrength=running? r.strength*(.35+.65*progress):r.strength;
 const sx=baseX+barW*Math.max(0,Math.min(1,dynamicStrength/115));
 const grad=ctx.createLinearGradient(baseX,0,sx,0);grad.addColorStop(0,'#00daf3');grad.addColorStop(1,r.margin>=0?'#8df8c2':'#ff8d63');ctx.fillStyle=grad;ctx.fillRect(baseX,baseY,sx-baseX,barH);ctx.strokeStyle='rgba(255,255,255,.22)';ctx.strokeRect(baseX,baseY,barW,barH);
 label(`${dynamicStrength.toFixed(1)} N`,sx+8,baseY+barH*.5,12,r.margin>=0?'#8df8c2':'#ff8d63');
 const heatY=baseY+72;label(lang==='cn'?'热冲击':'Heat pulse',baseX,heatY-18,13,'#b9b7c8');
 ctx.strokeStyle='rgba(255,181,156,.25)';ctx.beginPath();for(let i=0;i<=80;i++){const x=baseX+barW*i/80;const pulse=Math.sin(i/80*Math.PI);const tempLine=heatY-36*pulse*(j.temp/170)*(running?progress:1);if(i===0)ctx.moveTo(x,tempLine);else ctx.lineTo(x,tempLine);}ctx.stroke();
 label(`${j.temp} ℃`,baseX+barW+8,heatY-26,12,'#ffb59c');
}
function drawSpecimen(w,h){
 const y=h*.82; const mid=w*.5; const pull=running?progress*46:0; const r=lastResult;
 rect(mid-175-pull,y-24,160,48,'rgba(255,255,255,.25)','rgba(255,255,255,.06)');
 rect(mid+15+pull,y-24,160,48,'rgba(255,255,255,.25)','rgba(255,255,255,.06)');
 const ok=!r||r.margin>=0; ctx.fillStyle=ok?'rgba(0,218,243,.35)':'rgba(255,141,99,.36)';ctx.fillRect(mid-30,y-19,60,38);ctx.strokeStyle=ok?'#00daf3':'#ff8d63';ctx.strokeRect(mid-30,y-19,60,38);
 ctx.strokeStyle='#ffb59c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(mid-190-pull,y);ctx.lineTo(mid-230-pull,y);ctx.moveTo(mid+190+pull,y);ctx.lineTo(mid+230+pull,y);ctx.stroke();
 label(lang==='cn'?'搭接试样：慢慢拉，看胶层还是界面先失效':'Lap sample: pull slowly and observe layer/interface failure',mid,y+50,13,'#c8c5d6','center');
}
function draw(){
 const w=canvas.clientWidth, h=canvas.clientHeight; drawBg(w,h); drawRocket(w,h); drawBars(w,h); drawSpecimen(w,h);
}
function runTest(){
 if(running)return; running=true; progress=0; lastResult=null; updateResultPanel(); const start=performance.now();
 function tick(now){progress=Math.min(1,(now-start)/1800); draw(); if(progress<1){raf=requestAnimationFrame(tick);}else{running=false; lastResult=scoreSetup(method(),prep(),joint(),Number(document.getElementById('cureSlider').value)); updateHud(); updateResultPanel(); draw();}}
 raf=requestAnimationFrame(tick);
}
function nextRound(){roundIndex=(roundIndex+1)%JOINTS.length; running=false; progress=0; lastResult=null; fillOptions(); refreshText(); draw();}
function resetGame(){roundIndex=0; running=false; progress=0; lastResult=null; fillOptions(); refreshText(); draw();}
function setup(){
 fillOptions(); refreshText(); resizeCanvas();
 document.getElementById('langBtn').addEventListener('click',()=>{lang=lang==='cn'?'en':'cn'; const curM=method().id; const curP=prep().id; fillOptions(); document.getElementById('methodSelect').value=curM; document.getElementById('prepSelect').value=curP; refreshText(); draw();});
 document.getElementById('methodSelect').addEventListener('change',()=>{lastResult=null; updateHud(); updateResultPanel(); draw();});
 document.getElementById('prepSelect').addEventListener('change',()=>{lastResult=null; updateHud(); updateResultPanel(); draw();});
 document.getElementById('cureSlider').addEventListener('input',e=>{document.getElementById('cureValue').textContent=e.target.value+'h'; lastResult=null; updateHud(); updateResultPanel(); draw();});
 document.getElementById('runBtn').addEventListener('click',runTest);
 document.getElementById('nextBtn').addEventListener('click',nextRound);
 document.getElementById('resetBtn').addEventListener('click',resetGame);
 window.addEventListener('resize',resizeCanvas);
 if(document.fonts&&document.fonts.ready){document.fonts.ready.then(resizeCanvas);} setTimeout(resizeCanvas,80); setTimeout(resizeCanvas,400);
}
setup();
</script>
</body>
</html>
