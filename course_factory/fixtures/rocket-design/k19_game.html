<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.planet-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:6px 8px;cursor:pointer;border:1px solid rgba(91,163,217,0.2);background:rgba(91,163,217,0.04);color:#8e90a6;letter-spacing:0.04em;text-align:left;transition:all 0.15s;margin-top:2px;}
.planet-btn:hover{color:var(--sb-accent);border-color:rgba(91,163,217,0.4);background:rgba(91,163,217,0.08);}
.planet-btn.active{color:var(--bg,#05060f);background:linear-gradient(135deg,var(--primary),var(--primary-dim,#3a8abf));border-color:var(--primary);box-shadow:0 0 10px var(--glow-strong);}
.planet-btn .p-grav{display:block;font-size:8px;color:inherit;opacity:0.6;margin-top:1px;font-weight:400;}
.item-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:5px 8px;cursor:pointer;border:1px solid rgba(91,163,217,0.15);background:transparent;color:#8e90a6;letter-spacing:0.04em;text-align:left;transition:all 0.15s;margin-top:2px;display:flex;justify-content:space-between;align-items:center;}
.item-btn:hover{color:var(--sb-accent);border-color:rgba(91,163,217,0.3);}
.item-btn.active{color:var(--sb-accent);border-color:var(--primary);background:rgba(91,163,217,0.08);}
.item-btn .item-mass{font-size:8px;opacity:0.7;}
.sidebar-data{margin-top:auto;padding-top:8px;border-top:1px solid rgba(91,163,217,0.1);}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;}
.data-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:#8e90a6;letter-spacing:0.08em;text-transform:uppercase;}
.data-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.1em;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
</style>
</head>
<body>

      <span class="hud-tag" id="hudTitle">PLANET WEIGHING STATION</span>
      <div class="hud-item"><div class="hud-label" id="hudL1">PLANET</div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">MASS</div><div class="hud-val" id="hudV2">--</div></div>

</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES={light:{label:'LIGHT',bg:'#fafaf5',canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',ctrlBg:'#0f172a',ctrlColor:'#fafaf5'},dark:{label:'DARK',bg:'#0a0a0a',canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,canvasTopLine:true,sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',ctrlBg:null,ctrlColor:null},cyberpunk:{label:'CYBER',bg:'#05060f',canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,hudBg:'rgba(5,6,15,0.9)',hudBorder:null,ctrlColor:'#05060f'}};
var GAME_MODE='cyberpunk';
var ACCENT='#5ba3d9';
function gameModeColors(){var m=GAME_VISUAL_MODES[GAME_MODE]||GAME_VISUAL_MODES.cyberpunk;return{bg1:m.canvasBg1,bg2:m.canvasBg2,grid:m.canvasGrid,gridStep:m.gridStep||64,text:m.canvasText||'#e2e8f0',dim:m.canvasTextDim||'#a3a3a3',stroke:m.canvasStroke||'#e2e8f0',strokeDim:m.canvasStrokeDim||'rgba(255,255,255,0.12)',accent:ACCENT,glow:!!m.canvasGlow,scanlines:!!m.canvasScanlines,cornerBrackets:!!m.canvasCornerBrackets,innerBorder:!!m.canvasInnerBorder,innerBorderColor:m.canvasInnerBorderColor||'rgba(0,0,0,0.15)',topLine:!!m.canvasTopLine};}
function drawGameBg(c,w,h){var mc=gameModeColors();var g=c.createLinearGradient(0,0,0,h);g.addColorStop(0,mc.bg1);g.addColorStop(1,mc.bg2);c.fillStyle=g;c.fillRect(0,0,w,h);var gc2=mc.grid||'rgba(91,163,217,0.04)';c.strokeStyle=gc2;c.lineWidth=0.5;for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}}
function applyGameMode(mode){GAME_MODE=mode;var m=GAME_VISUAL_MODES[mode]||GAME_VISUAL_MODES.cyberpunk;var r=document.documentElement;r.style.setProperty('--bg',m.bg||'#05060f');r.style.setProperty('--sb-bg',m.sbBg||'rgba(5,6,15,0.92)');r.style.setProperty('--sb-border',m.sbBorder||ACCENT);r.style.setProperty('--sb-text',m.sbText||'#e2e8f0');r.style.setProperty('--sb-dim',m.sbDim||'#8e90a6');r.style.setProperty('--sb-mute',m.sbMute||'#5e6070');r.style.setProperty('--sb-accent',ACCENT);r.style.setProperty('--sb-btn-bg','transparent');r.style.setProperty('--sb-btn-bd',m.sbBorder||'transparent');r.style.setProperty('--hud-bg',m.hudBg||'rgba(5,6,15,0.9)');r.style.setProperty('--hud-border',m.hudBorder||'transparent');r.style.setProperty('--hud-label',m.hudLabel||'#5e6070');r.style.setProperty('--hud-value',m.hudValue||ACCENT);r.style.setProperty('--ctrl-bg',m.ctrlBg||ACCENT);r.style.setProperty('--ctrl-color',m.ctrlColor||'#05060f');r.style.setProperty('--primary',ACCENT);document.querySelectorAll('.vm-btn').forEach(function(b){b.classList.toggle('vm-active',b.dataset.mode===mode);});if(typeof onModeChange==='function')onModeChange(mode);}
function buildGameStyleSwitcher(){var c=document.getElementById('styleSwitcher');if(!c)return;c.innerHTML='';['light','dark','cyberpunk'].forEach(function(k){var btn=document.createElement('button');btn.className='vm-btn'+(k===GAME_MODE?' vm-active':'');btn.dataset.mode=k;btn.textContent=GAME_VISUAL_MODES[k].label;btn.addEventListener('click',function(){applyGameMode(k);});c.appendChild(btn);});}
var LANG='cn';
var I18N={
  title:{en:'PLANET WEIGHING STATION',cn:'\u661f\u7403\u79f0\u91cd\u7ad9'},
  sub:{en:'Drag items onto the scale to weigh them on different planets',cn:'\u628a\u7269\u54c1\u62d6\u5230\u79e4\u4e0a\uff0c\u770b\u770b\u5728\u4e0d\u540c\u661f\u7403\u4e0a\u91cd\u591a\u5c11'},
  guide:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:{en:'1. Select a planet on the left\n2. Click an item to place it on the scale\n3. Watch how weight changes but mass stays the same\n4. Try all 4 planets to discover the pattern!',cn:'1. \u5728\u5de6\u4fa7\u9009\u62e9\u4e00\u4e2a\u661f\u7403\n2. \u70b9\u51fb\u7269\u54c1\u653e\u5230\u79e4\u4e0a\n3. \u89c2\u5bdf\u91cd\u91cf\u5982\u4f55\u53d8\u5316\uff0c\u4f46\u8d28\u91cf\u4e0d\u53d8\n4. \u8bd5\u8bd5\u5168\u90e8 4 \u4e2a\u661f\u7403\uff0c\u53d1\u73b0\u89c4\u5f8b\uff01'},
  planets:{en:'PLANETS',cn:'\u661f\u7403'},
  items:{en:'ITEMS',cn:'\u7269\u54c1'},
  planet:{en:'PLANET',cn:'\u661f\u7403'},
  mass:{en:'MASS',cn:'\u8d28\u91cf'},
  weight:{en:'WEIGHT',cn:'\u91cd\u91cf'},
  gravity:{en:'g',cn:'g'},
  tried:{en:'TRIED',cn:'\u5df2\u79f0'},
  statusIdle:{en:'Select a planet and item',cn:'\u9009\u62e9\u661f\u7403\u548c\u7269\u54c1'},
  statusWeighing:{en:'Weighing...',cn:'\u79f0\u91cd\u4e2d...'},
  statusDone:{en:'Weight measured!',cn:'\u79f0\u91cd\u5b8c\u6210\uff01'},
  statusDiscovery:{en:'Discovery: mass never changes, only weight does!',cn:'\u53d1\u73b0\uff1a\u8d28\u91cf\u6c38\u8fdc\u4e0d\u53d8\uff0c\u53ea\u6709\u91cd\u91cf\u4f1a\u53d8\uff01'},
  earth:{en:'Earth',cn:'\u5730\u7403'},
  moon:{en:'Moon',cn:'\u6708\u7403'},
  mars:{en:'Mars',cn:'\u706b\u661f'},
  jupiter:{en:'Jupiter',cn:'\u6728\u661f'},
  apple:{en:'Apple',cn:'\u82f9\u679c'},
  backpack:{en:'Backpack',cn:'\u4e66\u5305'},
  cat:{en:'Cat',cn:'\u732b'},
  ironball:{en:'Iron Ball',cn:'\u94c1\u7403'},
  watermelon:{en:'Watermelon',cn:'\u897f\u74dc'},
  hudTitle:{en:'PLANET WEIGHING STATION',cn:'\u661f\u7403\u79f0\u91cd\u7ad9'},
  formula:{en:'W = m x g',cn:'W = m x g'},
  dragHint:{en:'Click an item to weigh it!',cn:'\u70b9\u51fb\u7269\u54c1\u6765\u79f0\u91cd\uff01'},
};
function t(key){return(I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}
function setupLangToggle(){var btn=document.getElementById('langBtn');if(!btn)return;btn.textContent=LANG.toUpperCase();btn.addEventListener('click',function(){LANG=LANG==='en'?'cn':'en';btn.textContent=LANG.toUpperCase();refreshI18N();});}

// ================================================================
// GAME DATA
// ================================================================
var PLANETS=[
  {id:'earth',  g:9.8,  color:'#4a9eff', radius:40},
  {id:'moon',   g:1.6,  color:'#b0b0b0', radius:22},
  {id:'mars',   g:3.7,  color:'#e06050', radius:30},
  {id:'jupiter',g:24.8, color:'#d4a060', radius:55},
];
var ITEMS=[
  {id:'apple',      mass:0.2,  symbol:'A', color:'#ff6b6b'},
  {id:'backpack',   mass:5,    symbol:'B', color:'#ffa94d'},
  {id:'cat',        mass:4,    symbol:'C', color:'#69db7c'},
  {id:'ironball',   mass:10,   symbol:'Fe',color:'#868e96'},
  {id:'watermelon', mass:8,    symbol:'W', color:'#66d9e8'},
];

var currentPlanet=0;
var currentItem=-1;
var scaleReading=0;
var targetReading=0;
var weighing=false;
var triedCount=0;
var triedSet=new Set();
var animFrame=0;
var bouncePhase=0;
var itemOnScale=false;

// ================================================================
// CANVAS
// ================================================================
var cv,c2d,cW,cH;
var DPR=Math.min(window.devicePixelRatio||1,2);

function initCanvas(){
  cv=document.getElementById('gc');
  c2d=cv.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
}

function resizeCanvas(){
  var body=cv.parentElement;
  var rect=body.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  cW=rect.width;cH=rect.height;
  cv.width=cW*DPR;cv.height=cH*DPR;
  cv.style.width=cW+'px';cv.style.height=cH+'px';
  c2d.setTransform(DPR,0,0,DPR,0,0);
  draw();
}

function draw(){
  if(!c2d)return;
  var mc=gameModeColors();
  drawGameBg(c2d,cW,cH);

  var planet=PLANETS[currentPlanet];
  var cx=cW/2, cy=cH/2;

  // Draw planet in background
  var pX=cx, pY=cy+cH*0.18;
  c2d.save();
  c2d.globalAlpha=0.15;
  c2d.beginPath();
  c2d.arc(pX,pY+planet.radius*2,planet.radius*2.5,0,Math.PI*2);
  c2d.fillStyle=planet.color;
  c2d.fill();
  c2d.restore();

  // Planet name and g value
  c2d.font="bold 14px 'Space Grotesk','Noto Sans SC',sans-serif";
  c2d.fillStyle=planet.color;
  c2d.textAlign='center';
  c2d.fillText(t(planet.id),cx,35);
  c2d.font="11px 'JetBrains Mono',monospace";
  c2d.fillStyle=mc.dim;
  c2d.fillText('g = '+planet.g+' m/s\u00b2',cx,52);

  // Draw scale base
  var scaleBaseY=cy+cH*0.12;
  var scaleW=Math.min(cW*0.35,180);
  var scaleH=Math.min(cH*0.45,200);

  // Scale platform
  c2d.fillStyle=mc.strokeDim;
  c2d.fillRect(cx-scaleW/2,scaleBaseY,scaleW,4);

  // Scale pillar
  c2d.strokeStyle=ACCENT;
  c2d.lineWidth=2;
  c2d.beginPath();
  c2d.moveTo(cx,scaleBaseY+4);
  c2d.lineTo(cx,scaleBaseY+scaleH*0.7);
  c2d.stroke();

  // Scale base wider
  c2d.fillStyle=mc.strokeDim;
  var baseW=scaleW*0.6;
  c2d.fillRect(cx-baseW/2,scaleBaseY+scaleH*0.7,baseW,6);

  // Spring gauge (vertical bar on right side of scale)
  var gaugeX=cx+scaleW/2+30;
  var gaugeTop=scaleBaseY-10;
  var gaugeH=scaleH*0.7+10;
  c2d.strokeStyle=mc.strokeDim;
  c2d.lineWidth=1;
  c2d.strokeRect(gaugeX-8,gaugeTop,16,gaugeH);

  // Gauge fill based on current reading
  var maxN=250; // max display Newton
  var fillRatio=Math.min(scaleReading/maxN,1);
  var fillH=gaugeH*fillRatio;
  if(fillH>0){
    var grd=c2d.createLinearGradient(0,gaugeTop+gaugeH-fillH,0,gaugeTop+gaugeH);
    grd.addColorStop(0,ACCENT);
    grd.addColorStop(1,planet.color);
    c2d.fillStyle=grd;
    c2d.fillRect(gaugeX-6,gaugeTop+gaugeH-fillH,12,fillH);
  }

  // Reading value next to gauge
  c2d.font="bold 16px 'JetBrains Mono',monospace";
  c2d.fillStyle=ACCENT;
  c2d.textAlign='left';
  c2d.textBaseline='middle';
  var readingStr=scaleReading.toFixed(1)+' N';
  c2d.fillText(readingStr,gaugeX+14,gaugeTop+gaugeH/2);

  // Gauge scale marks
  c2d.font="8px 'JetBrains Mono',monospace";
  c2d.fillStyle=mc.dim;
  c2d.textAlign='right';
  for(var i=0;i<=5;i++){
    var markY=gaugeTop+gaugeH-gaugeH*(i/5);
    c2d.fillText((maxN*i/5).toFixed(0),gaugeX-12,markY);
    c2d.strokeStyle=mc.strokeDim;
    c2d.lineWidth=0.5;
    c2d.beginPath();c2d.moveTo(gaugeX-8,markY);c2d.lineTo(gaugeX+8,markY);c2d.stroke();
  }

  // Draw item on scale if selected
  if(currentItem>=0){
    var item=ITEMS[currentItem];
    var itemY=scaleBaseY-30-bouncePhase*8;
    var itemR=Math.max(15,Math.min(item.mass*3+8,35));

    // Item circle
    c2d.save();
    if(mc.glow){
      c2d.shadowColor=item.color;
      c2d.shadowBlur=12;
    }
    c2d.beginPath();
    c2d.arc(cx,itemY,itemR,0,Math.PI*2);
    c2d.fillStyle=item.color+'40';
    c2d.fill();
    c2d.strokeStyle=item.color;
    c2d.lineWidth=2;
    c2d.stroke();
    c2d.restore();

    // Item symbol
    c2d.font="bold 14px 'JetBrains Mono',monospace";
    c2d.fillStyle=item.color;
    c2d.textAlign='center';
    c2d.textBaseline='middle';
    c2d.fillText(item.symbol,cx,itemY);

    // Item name and mass below scale
    c2d.font="11px 'Noto Sans SC',sans-serif";
    c2d.fillStyle=mc.text;
    c2d.textBaseline='top';
    c2d.fillText(t(item.id),cx-60,scaleBaseY+scaleH*0.7+20);

    c2d.font="bold 12px 'JetBrains Mono',monospace";
    c2d.fillStyle=ACCENT;
    c2d.fillText(t('mass')+': '+item.mass+' kg',cx-60,scaleBaseY+scaleH*0.7+38);

    // Formula display
    c2d.font="12px 'JetBrains Mono',monospace";
    c2d.fillStyle=mc.dim;
    c2d.textAlign='center';
    var formulaY=scaleBaseY+scaleH*0.7+60;
    if(formulaY<cH-20){
      c2d.fillText('W = '+item.mass+' kg x '+planet.g+' m/s\u00b2 = '+(item.mass*planet.g).toFixed(1)+' N',cx,formulaY);
    }
  } else {
    // Hint text when no item selected
    c2d.font="13px 'Noto Sans SC',sans-serif";
    c2d.fillStyle=mc.dim;
    c2d.textAlign='center';
    c2d.textBaseline='middle';
    c2d.fillText(t('dragHint'),cx,scaleBaseY-40);
  }

  c2d.textBaseline='alphabetic';
}

// ================================================================
// ANIMATION LOOP
// ================================================================
var lastTime=0;
function gameLoop(ts){
  var dt=(ts-lastTime)/1000;
  lastTime=ts;

  if(weighing){
    var diff=targetReading-scaleReading;
    if(Math.abs(diff)<0.1){
      scaleReading=targetReading;
      weighing=false;
      bouncePhase=0;
      updateStatus('statusDone');
      // Check discovery
      if(triedSet.size>=8){
        updateStatus('statusDiscovery');
      }
    } else {
      scaleReading+=diff*4*dt;
      bouncePhase=Math.sin(ts/120)*Math.max(0,1-scaleReading/targetReading)*0.5;
    }
    draw();
  }

  requestAnimationFrame(gameLoop);
}

// ================================================================
// UI
// ================================================================
function buildPlanetButtons(){
  var container=document.getElementById('planetBtns');
  container.innerHTML='';
  PLANETS.forEach(function(p,i){
    var btn=document.createElement('button');
    btn.className='planet-btn'+(i===currentPlanet?' active':'');
    btn.innerHTML='<span>'+t(p.id)+'</span><span class="p-grav">g = '+p.g+' m/s\u00b2</span>';
    btn.addEventListener('click',function(){selectPlanet(i);});
    container.appendChild(btn);
  });
}

function buildItemButtons(){
  var container=document.getElementById('itemBtns');
  container.innerHTML='';
  ITEMS.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.className='item-btn'+(i===currentItem?' active':'');
    btn.innerHTML='<span>'+t(item.id)+'</span><span class="item-mass">'+item.mass+' kg</span>';
    btn.addEventListener('click',function(){selectItem(i);});
    container.appendChild(btn);
  });
}

function selectPlanet(idx){
  currentPlanet=idx;
  // Update planet buttons
  document.querySelectorAll('.planet-btn').forEach(function(b,i){
    b.classList.toggle('active',i===idx);
  });
  // Re-weigh current item if any
  if(currentItem>=0){
    weighItem(currentItem);
  }
  updateSidebarData();
  draw();
}

function selectItem(idx){
  currentItem=idx;
  document.querySelectorAll('.item-btn').forEach(function(b,i){
    b.classList.toggle('active',i===idx);
  });
  weighItem(idx);
}

function weighItem(idx){
  var item=ITEMS[idx];
  var planet=PLANETS[currentPlanet];
  targetReading=item.mass*planet.g;
  weighing=true;
  bouncePhase=1;
  itemOnScale=true;

  var key=planet.id+'_'+item.id;
  if(!triedSet.has(key)){
    triedSet.add(key);
    triedCount=triedSet.size;
  }

  updateSidebarData();
  updateHUD();
  updateStatus('statusWeighing');
}

function updateSidebarData(){
  var planet=PLANETS[currentPlanet];
  document.getElementById('valPlanet').textContent=t(planet.id);
  document.getElementById('valGrav').textContent=planet.g+' m/s\u00b2';
  document.getElementById('valTried').textContent=triedCount.toString();
  if(currentItem>=0){
    var item=ITEMS[currentItem];
    document.getElementById('valMass').textContent=item.mass+' kg';
    document.getElementById('valWeight').textContent=(item.mass*planet.g).toFixed(1)+' N';
  } else {
    document.getElementById('valMass').textContent='--';
    document.getElementById('valWeight').textContent='--';
  }
}

function updateHUD(){
  var planet=PLANETS[currentPlanet];
  document.getElementById('hudV1').textContent=t(planet.id);
  document.getElementById('hudV4').textContent=planet.g+' m/s\u00b2';
  if(currentItem>=0){
    var item=ITEMS[currentItem];
    document.getElementById('hudV2').textContent=item.mass+' kg';
    document.getElementById('hudV3').textContent=(item.mass*planet.g).toFixed(1)+' N';
  }
}

function updateStatus(key){
  document.getElementById('statusVal').textContent=t(key);
}

function refreshI18N(){
  document.getElementById('sideTitle').textContent=t('title');
  document.getElementById('sideSub').textContent=t('sub');
  document.getElementById('guideLabel').textContent=t('guide');
  document.getElementById('guideText').textContent=t('guideText');
  document.getElementById('planetLabel').textContent=t('planets');
  document.getElementById('itemLabel').textContent=t('items');
  document.getElementById('lblPlanet').textContent=t('planet');
  document.getElementById('lblMass').textContent=t('mass');
  document.getElementById('lblWeight').textContent=t('weight');
  document.getElementById('lblGrav').textContent=t('gravity');
  document.getElementById('lblTried').textContent=t('tried');
  document.getElementById('hudTitle').textContent=t('hudTitle');
  document.getElementById('hudL1').textContent=t('planet');
  document.getElementById('hudL2').textContent=t('mass');
  document.getElementById('hudL3').textContent=t('weight');
  document.getElementById('hudL4').textContent=t('gravity');
  document.getElementById('statusLbl').textContent='STATUS';
  buildPlanetButtons();
  buildItemButtons();
  updateSidebarData();
  updateStatus('statusIdle');
  draw();
}

function onModeChange(){
  draw();
}

// ================================================================
// INIT
// ================================================================
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();
initCanvas();
refreshI18N();
requestAnimationFrame(gameLoop);
</script>
