.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:5px 14px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.22));border-radius:999px;}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.72));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.18));}
.hud{height:38px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.5));border-top:1px solid var(--hud-border,transparent);padding:0 14px;}

<script>

window.CONFIG = {

    },

    hudL2: { cn: "工况", en: "Condition" },
    hudL3: { cn: "风险", en: "Risk" },
    hudL4: { cn: "优先方案", en: "Preferred" }
  }
};

function roundedRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

function drawChip(ctx, x, y, text, color, bg, align) {
  ctx.save();
  ctx.font = "11px 'JetBrains Mono','Noto Sans SC',sans-serif";
  const padX = 9;
  const padY = 6;
  const width = ctx.measureText(text).width + padX * 2;
  const left = align === "right" ? x - width : x;
  roundedRect(ctx, left, y, width, 24, 8);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText(text, left + padX, y + 12);
  ctx.restore();
}

function drawPanel(ctx, x, y, w, h, stroke, fill) {
  ctx.save();
  roundedRect(ctx, x, y, w, h, 18);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawForceArrow(ctx, x1, y1, x2, y2, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const head = 8;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - head * Math.cos(angle - 0.45), y2 - head * Math.sin(angle - 0.45));
  ctx.lineTo(x2 - head * Math.cos(angle + 0.45), y2 - head * Math.sin(angle + 0.45));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawHeatGlow(ctx, x, y, r, color) {
  ctx.save();
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, color);
  grad.addColorStop(1, "transparent");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawRocketBody(ctx, x, y, w, h, stroke, fill) {
  ctx.save();
  roundedRect(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + w, y);
  ctx.lineTo(x + w + 38, y + h / 2);
  ctx.lineTo(x + w, y + h);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawFin(ctx, x, y, stroke, fill) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + 70, y + 26);
  ctx.lineTo(x + 14, y + 92);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawBolt(ctx, x, y, scale, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = color;
  ctx.fillStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i + Math.PI / 6;
    const px = Math.cos(a) * 8 * scale;
    const py = Math.sin(a) * 8 * scale;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 10 * scale);
  ctx.lineTo(0, 28 * scale);
  ctx.stroke();
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-5 * scale, (14 + i * 4) * scale);
    ctx.lineTo(5 * scale, (12 + i * 4) * scale);
    ctx.stroke();
  }
  ctx.restore();
}

function drawTapeRoll(ctx, x, y, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 18, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 14);
  ctx.lineTo(x + 26, y + 30);
  ctx.stroke();
  ctx.restore();
}

function drawEpoxyToken(ctx, x, y, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.bezierCurveTo(12, -8, 14, 8, 0, 16);
  ctx.bezierCurveTo(-14, 8, -12, -8, 0, -16);
  ctx.fill();
  ctx.restore();
}

function drawFooter(ctx, W, H, text, color, dim) {
  ctx.save();
  const y = H - 44;
  drawPanel(ctx, 34, y, W - 68, 30, color, "rgba(6,10,18,0.48)");
  ctx.fillStyle = dim;
  ctx.font = "12px 'Inter','Noto Sans SC',sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, W / 2, y + 15);
  ctx.restore();
}

function drawStageDots(ctx, frame, W, color, mute) {
  ctx.save();
  const startX = W - 160;
  for (let i = 0; i < 4; i++) {
    const x = startX + i * 26;
    ctx.beginPath();
    ctx.arc(x, 30, i === frame ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = i === frame ? color : mute;
    ctx.fill();
  }
  ctx.restore();
}

function drawFrameOne(ctx, W, H, lang, P, M) {
  drawPanel(ctx, 42, 58, W - 84, H - 118, P.strokeDim, "rgba(8,12,22,0.34)");

  drawRocketBody(ctx, 94, 156, 292, 54, P.stroke, "rgba(255,255,255,0.04)");
  drawFin(ctx, 180, 208, P.secondary, "rgba(0,218,243,0.16)");

  ctx.save();
  ctx.fillStyle = "rgba(255,181,156,0.22)";
  ctx.fillRect(178, 195, 18, 24);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = "rgba(255,181,156,0.85)";
  ctx.beginPath();
  ctx.moveTo(184, 219);
  ctx.bezierCurveTo(192, 226, 194, 240, 186, 248);
  ctx.bezierCurveTo(176, 242, 176, 226, 184, 219);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = P.primary;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(196, 192);
  ctx.lineTo(208, 206);
  ctx.lineTo(218, 232);
  ctx.stroke();
  ctx.restore();

  drawForceArrow(ctx, 60, 120, 170, 160, P.secondary);
  drawForceArrow(ctx, 64, 254, 174, 224, P.secondary);
  drawForceArrow(ctx, 258, 110, 230, 162, P.primary);
  drawForceArrow(ctx, 258, 278, 230, 236, P.primary);

  drawChip(ctx, 88, 118, lang === "en" ? "side flow" : "侧风", P.secondary, "rgba(0,218,243,0.12)");
  drawChip(ctx, 138, 274, lang === "en" ? "shear path" : "剪切路径", P.primary, "rgba(255,181,156,0.12)");

  drawPanel(ctx, 434, 92, 176, 188, P.strokeDim, "rgba(255,255,255,0.03)");
  ctx.save();
  ctx.fillStyle = M.text;
  ctx.font = "600 13px 'JetBrains Mono','Noto Sans SC',sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(lang === "en" ? "joint test" : "接头测试", 454, 118);
  ctx.restore();

  drawChip(ctx, 454, 136, lang === "en" ? "hot glue" : "热熔胶", "#ff8d63", "rgba(255,141,99,0.12)");
  ctx.save();
  ctx.fillStyle = "rgba(255,141,99,0.18)";
  ctx.fillRect(456, 160, 54, 16);
  ctx.fillRect(494, 160, 20, 52);
  ctx.strokeStyle = "#ff8d63";
  ctx.lineWidth = 2;
  ctx.strokeRect(456, 160, 54, 16);
  ctx.strokeRect(494, 160, 20, 52);
  ctx.strokeStyle = M.accent;
  ctx.beginPath();
  ctx.moveTo(468, 192);
  ctx.lineTo(498, 214);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(468, 214);
  ctx.lineTo(498, 192);
  ctx.stroke();
  ctx.restore();

  drawChip(ctx, 454, 222, lang === "en" ? "epoxy" : "环氧", P.primary, "rgba(255,181,156,0.12)");
  ctx.save();
  ctx.fillStyle = "rgba(255,181,156,0.18)";
  ctx.fillRect(456, 246, 54, 16);
  ctx.beginPath();
  ctx.moveTo(494, 246);
  ctx.lineTo(514, 246);
  ctx.lineTo(514, 276);
  ctx.lineTo(496, 296);
  ctx.lineTo(494, 296);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = P.primary;
  ctx.lineWidth = 2;
  ctx.strokeRect(456, 246, 54, 16);
  ctx.beginPath();
  ctx.moveTo(494, 246);
  ctx.lineTo(514, 246);
  ctx.lineTo(514, 276);
  ctx.lineTo(496, 296);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = P.secondary;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(548, 264);
  ctx.lineTo(566, 282);
  ctx.lineTo(590, 236);
  ctx.stroke();
  ctx.restore();
}

function drawFrameTwo(ctx, W, H, lang, P, M) {
  drawPanel(ctx, 42, 58, W - 84, H - 118, P.strokeDim, "rgba(8,12,22,0.34)");
  drawRocketBody(ctx, 92, 164, 246, 48, P.stroke, "rgba(255,255,255,0.035)");
  ctx.save();
  ctx.fillStyle = "rgba(255,110,110,0.18)";
  ctx.fillRect(118, 176, 64, 24);
  ctx.restore();
  drawHeatGlow(ctx, 148, 188, 84, "rgba(255,90,90,0.34)");
  drawHeatGlow(ctx, 208, 188, 64, "rgba(255,140,64,0.22)");
  drawForceArrow(ctx, 58, 188, 116, 188, "#ff8d63");
  drawChip(ctx, 58, 138, "100°C+", "#ff8d63", "rgba(255,141,99,0.14)");

  ctx.save();
  ctx.fillStyle = "rgba(255,181,156,0.85)";
  ctx.beginPath();
  ctx.moveTo(250, 156);
  ctx.bezierCurveTo(270, 172, 270, 198, 248, 220);
  ctx.bezierCurveTo(232, 200, 234, 176, 250, 156);
  ctx.fill();
  ctx.restore();
  drawChip(ctx, 228, 126, lang === "en" ? "softening" : "软化", "#ff8d63", "rgba(255,141,99,0.12)");

  drawPanel(ctx, 404, 92, 210, 210, P.strokeDim, "rgba(255,255,255,0.03)");
  ctx.save();
  ctx.strokeStyle = P.primary;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(510, 172, 54, Math.PI * 0.8, Math.PI * 2.1);
  ctx.stroke();
  ctx.strokeStyle = "#ff8d63";
  ctx.beginPath();
  ctx.arc(510, 172, 54, Math.PI * 1.4, Math.PI * 2.1);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.fillStyle = M.text;
  ctx.font = "700 28px 'JetBrains Mono',sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("120", 510, 176);
  ctx.font = "11px 'JetBrains Mono',sans-serif";
  ctx.fillText(lang === "en" ? "zone temp" : "区温", 510, 196);
  ctx.restore();

  drawChip(ctx, 438, 224, lang === "en" ? "hot glue no-go" : "热熔禁用", "#ff8d63", "rgba(255,141,99,0.12)");
  drawChip(ctx, 438, 256, lang === "en" ? "epoxy holds" : "环氧可用", P.primary, "rgba(255,181,156,0.12)");
}

function drawFrameThree(ctx, W, H, lang, P, M) {
  drawPanel(ctx, 42, 58, W - 84, H - 118, P.strokeDim, "rgba(8,12,22,0.34)");
  drawPanel(ctx, 58, 88, 270, 218, P.strokeDim, "rgba(255,255,255,0.03)");
  drawPanel(ctx, 372, 88, 250, 218, P.strokeDim, "rgba(255,255,255,0.03)");

  ctx.save();
  ctx.fillStyle = M.text;
  ctx.font = "600 12px 'JetBrains Mono','Noto Sans SC',sans-serif";
  ctx.fillText(lang === "en" ? "recovery wrap" : "回收包扎", 76, 112);
  ctx.fillText(lang === "en" ? "removable hatch" : "可拆舱盖", 390, 112);
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = P.stroke;
  ctx.lineWidth = 2;
  ctx.strokeRect(86, 148, 108, 62);
  ctx.beginPath();
  ctx.moveTo(194, 180);
  ctx.lineTo(254, 180);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.strokeStyle = P.secondary;
  ctx.beginPath();
  ctx.moveTo(188, 180);
  ctx.lineTo(246, 180);
  ctx.stroke();
  ctx.restore();

  drawHeatGlow(ctx, 110, 180, 52, "rgba(255,90,90,0.18)");
  ctx.save();
  ctx.strokeStyle = "#ff8d63";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(120, 138);
  ctx.lineTo(132, 122);
  ctx.lineTo(144, 138);
  ctx.lineTo(156, 122);
  ctx.lineTo(168, 138);
  ctx.stroke();
  ctx.restore();
  drawChip(ctx, 208, 146, lang === "en" ? "flame tape" : "防火胶带", P.secondary, "rgba(0,218,243,0.12)");
  drawChip(ctx, 208, 180, lang === "en" ? "regular tape fails" : "普通胶带失效", "#ff8d63", "rgba(255,141,99,0.12)");

  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.03)";
  ctx.fillRect(424, 148, 146, 84);
  ctx.strokeStyle = P.stroke;
  ctx.lineWidth = 2;
  ctx.strokeRect(424, 148, 146, 84);
  ctx.strokeRect(446, 164, 102, 52);
  ctx.restore();
  drawBolt(ctx, 444, 132, 0.9, P.primary);
  drawBolt(ctx, 550, 132, 0.9, P.primary);
  drawForceArrow(ctx, 444, 142, 444, 168, P.secondary);
  drawForceArrow(ctx, 550, 142, 550, 168, P.secondary);
  drawChip(ctx, 392, 248, lang === "en" ? "repeatable clamp" : "重复锁紧", P.primary, "rgba(255,181,156,0.12)");
  drawChip(ctx, 392, 280, lang === "en" ? "easy service" : "便于拆装", P.secondary, "rgba(0,218,243,0.12)");
}

function drawFrameFour(ctx, W, H, lang, P, M) {
  drawPanel(ctx, 42, 58, W - 84, H - 118, P.strokeDim, "rgba(8,12,22,0.34)");
  drawRocketBody(ctx, 116, 164, 326, 48, P.stroke, "rgba(255,255,255,0.04)");
  drawFin(ctx, 198, 212, P.secondary, "rgba(0,218,243,0.14)");
  drawFin(ctx, 254, 212, P.secondary, "rgba(0,218,243,0.08)");

  ctx.save();
  ctx.strokeStyle = P.secondary;
  ctx.lineWidth = 3;
  ctx.strokeRect(196, 194, 22, 26);
  ctx.strokeRect(138, 172, 44, 30);
  ctx.strokeRect(334, 172, 38, 30);
  ctx.strokeRect(268, 162, 36, 24);
  ctx.restore();

  drawEpoxyToken(ctx, 86, 122, P.primary);
  drawChip(ctx, 108, 108, lang === "en" ? "epoxy" : "环氧", P.primary, "rgba(255,181,156,0.12)");
  drawForceArrow(ctx, 132, 126, 204, 196, P.primary);
  drawForceArrow(ctx, 132, 132, 150, 176, P.primary);

  drawTapeRoll(ctx, 516, 110, P.secondary);
  drawChip(ctx, 540, 96, lang === "en" ? "flame tape" : "防火胶带", P.secondary, "rgba(0,218,243,0.12)");
  drawForceArrow(ctx, 528, 120, 352, 182, P.secondary);

  drawBolt(ctx, 550, 264, 1, "#ffd166");
  drawChip(ctx, 572, 250, lang === "en" ? "screws" : "螺丝", "#ffd166", "rgba(255,209,102,0.12)");
  drawForceArrow(ctx, 534, 254, 356, 188, "#ffd166");

  ctx.save();
  ctx.strokeStyle = M.mute;
  ctx.setLineDash([5, 5]);
  ctx.strokeRect(76, 246, 82, 42);
  ctx.setLineDash([]);
  ctx.restore();
  drawChip(ctx, 76, 292, lang === "en" ? "temp tape only" : "临时定位", M.mute, "rgba(255,255,255,0.04)");
  drawForceArrow(ctx, 158, 266, 274, 176, M.mute);
}

function drawScene(ctx, frame, W, H, lang) {
  const P = AnimRuntime.PAL;
  const M = AnimRuntime.modeColors;
  if (frame === 0) drawFrameOne(ctx, W, H, lang, P, M);
  else if (frame === 1) drawFrameTwo(ctx, W, H, lang, P, M);
  else if (frame === 2) drawFrameThree(ctx, W, H, lang, P, M);
  else drawFrameFour(ctx, W, H, lang, P, M);
}

function getFrameElements(f, W, H) {
  const lang = AnimRuntime.LANG === "en" ? "en" : "cn";
  const M = AnimRuntime.modeColors;
  const fr = FRAME_COPY[f] || FRAME_COPY[0];
  return [
    {
      id: "frame-title-" + f,
      type: "label",
      x: W / 2,
      y: 30,
      text: fr.title[lang],
      size: 22,
      color: M.text,
      bold: true
    },
    {
      id: "scene-" + f,
      type: "custom",
      draw: function (ctx) { drawScene(ctx, f, W, H, lang); }
    },
    {
      id: "stage-" + f,
      type: "custom",
      draw: function (ctx) { drawStageDots(ctx, f, W, M.accent, M.mute); }
    },
    {
      id: "footer-" + f,
      type: "custom",
      draw: function (ctx) { drawFooter(ctx, W, H, fr.footer[lang], M.accent, M.dim); }
    }
  ];
}

function onReady() {
  const src = document.getElementById("frameIndicator");
  const dst = document.getElementById("frameInd");
  if (src && dst) {
    const sync = () => { dst.textContent = src.textContent || ""; };
    sync();
    new MutationObserver(sync).observe(src, { childList: true, subtree: true, characterData: true });
  }
}

AnimRuntime.boot();
</script>
</body>
</html>
