<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* -- Outer: sidebar + main -- */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* -- Style switcher -- */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* -- Sidebar text -- */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* -- Object shelf in sidebar -- */
.obj-shelf{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.obj-card{display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(128,128,128,0.06);border:1px solid rgba(128,128,128,0.1);cursor:pointer;user-select:none;transition:all 0.15s;}
.obj-card:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.obj-card.selected{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.15);}
.obj-card.used{opacity:0.35;cursor:default;pointer-events:none;}
.obj-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
.obj-name{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.05em;}
.obj-info{font-size:9px;color:var(--sb-dim,#8e90a6);}
/* -- Slider / button controls -- */
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vacuum-toggle{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid rgba(128,128,128,0.25);cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;transition:all 0.2s;}
.vacuum-toggle:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vacuum-toggle.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.15);}
/* -- Main area -- */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">DROP LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="shelfLabel">OBJECTS</div>
    <div class="obj-shelf" id="objShelf"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="dropBtn" disabled>DROP</button>
    <button class="vacuum-toggle" id="vacuumBtn">VACUUM: OFF</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">DROP LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">HEIGHT</div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">SPEED</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">TIME</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">DROPPED</div><div class="hud-val" id="hudV4">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <div class="status-label" id="statusLabel">STATUS</div>
      <div class="status-val" id="statusVal">--</div>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM (inline -- games don't use shared runtime)
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

// Primary accent color -- mech orange
var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (ACCENT ? ACCENT.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,ACCENT);tg.addColorStop(0.6,ACCENT);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=ACCENT;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#ea580c');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'DROP LAB', cn:'\u4e0b\u843d\u5b9e\u9a8c\u5ba4'},
  subtitle:  {en:'Physics Drop Simulator', cn:'\u7269\u7406\u4e0b\u843d\u6a21\u62df\u5668'},
  guide:     {en:'Select an object from the shelf, then click DROP to release it. Toggle VACUUM to remove air resistance.', cn:'\u4ece\u7269\u4f53\u67b6\u9009\u62e9\u4e00\u4e2a\u7269\u4f53\uff0c\u7136\u540e\u70b9\u51fb\u201c\u91ca\u653e\u201d\u6309\u94ae\u3002\u5207\u6362\u201c\u771f\u7a7a\u201d\u6a21\u5f0f\u53ef\u4ee5\u53bb\u9664\u7a7a\u6c14\u963b\u529b\u3002'},
  guideLabel:{en:'GUIDE', cn:'\u6307\u5357'},
  shelfLabel:{en:'OBJECTS', cn:'\u7269\u4f53\u67b6'},
  dropBtn:   {en:'DROP', cn:'\u91ca\u653e'},
  resetBtn:  {en:'RESET', cn:'\u91cd\u7f6e'},
  vacuumOff: {en:'VACUUM: OFF', cn:'\u771f\u7a7a: \u5173'},
  vacuumOn:  {en:'VACUUM: ON', cn:'\u771f\u7a7a: \u5f00'},
  hudTag:    {en:'DROP LAB', cn:'\u4e0b\u843d\u5b9e\u9a8c\u5ba4'},
  hudHeight: {en:'HEIGHT', cn:'\u9ad8\u5ea6'},
  hudSpeed:  {en:'SPEED', cn:'\u901f\u5ea6'},
  hudTime:   {en:'TIME', cn:'\u65f6\u95f4'},
  hudDropped:{en:'DROPPED', cn:'\u5df2\u91ca\u653e'},
  statusLbl: {en:'STATUS', cn:'\u72b6\u6001'},
  ready:     {en:'Select an object', cn:'\u9009\u62e9\u4e00\u4e2a\u7269\u4f53'},
  falling:   {en:'Falling...', cn:'\u4e0b\u843d\u4e2d...'},
  landed:    {en:'Landed!', cn:'\u843d\u5730\uff01'},
  allDone:   {en:'All objects dropped! Gravity always wins.', cn:'\u6240\u6709\u7269\u4f53\u90fd\u843d\u5730\u4e86\uff01\u91cd\u529b\u603b\u662f\u8d62\u5bb6\u3002'},
  selectFirst:{en:'Select an object first', cn:'\u5148\u9009\u62e9\u4e00\u4e2a\u7269\u4f53'},
  unit_m:    {en:'m', cn:'\u7c73'},
  unit_ms:   {en:'m/s', cn:'\u7c73/\u79d2'},
  unit_s:    {en:'s', cn:'\u79d2'},
  // Object names
  feather:   {en:'Feather', cn:'\u7fbd\u6bdb'},
  paper:     {en:'Paper', cn:'\u7eb8\u7247'},
  ball:      {en:'Ball', cn:'\u7403'},
  rock:      {en:'Rock', cn:'\u77f3\u5934'},
  hammer:    {en:'Hammer', cn:'\u9524\u5b50'},
  leaf:      {en:'Leaf', cn:'\u6811\u53f6'},
  coin:      {en:'Coin', cn:'\u786c\u5e01'},
  apple:     {en:'Apple', cn:'\u82f9\u679c'},
  // Weight descriptions
  wVeryLight:{en:'very light', cn:'\u5f88\u8f7b'},
  wLight:    {en:'light', cn:'\u8f7b'},
  wMedium:   {en:'medium', cn:'\u4e2d\u7b49'},
  wHeavy:    {en:'heavy', cn:'\u91cd'},
};
function t(k){return(I18N[k]&&I18N[k][LANG])||k;}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// OBJECT DATA
// ================================================================
var OBJECTS = [
  {id:'feather', nameKey:'feather', weightKey:'wVeryLight', color:'#85ecff', r:10, dragCoeff:2.5,  mass:0.003},
  {id:'paper',   nameKey:'paper',   weightKey:'wVeryLight', color:'#e2e8f0', r:11, dragCoeff:1.8,  mass:0.005},
  {id:'leaf',    nameKey:'leaf',    weightKey:'wVeryLight', color:'#4ade80', r:10, dragCoeff:2.0,  mass:0.002},
  {id:'ball',    nameKey:'ball',    weightKey:'wMedium',    color:'#f97316', r:14, dragCoeff:0.10, mass:0.40},
  {id:'apple',   nameKey:'apple',   weightKey:'wMedium',    color:'#ef4444', r:13, dragCoeff:0.12, mass:0.20},
  {id:'coin',    nameKey:'coin',    weightKey:'wMedium',    color:'#fbbf24', r:8,  dragCoeff:0.05, mass:0.05},
  {id:'rock',    nameKey:'rock',    weightKey:'wHeavy',     color:'#94a3b8', r:16, dragCoeff:0.08, mass:1.00},
  {id:'hammer',  nameKey:'hammer',  weightKey:'wHeavy',     color:'#a78bfa', r:15, dragCoeff:0.06, mass:1.50},
];

// ================================================================
// GAME STATE
// ================================================================
var cv, ctx, canvasW = 800, canvasH = 600;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

var selectedObj = null;    // currently selected from shelf
var vacuumMode = false;
var dropCount = 0;

// Physics
var GRAVITY_ACCEL = 9.81;  // m/s^2 real physics
var DROP_HEIGHT = 20;      // meters (virtual)
var PX_PER_METER = 0;     // computed on resize

// Falling objects on screen
var fallingObjs = [];  // {obj, x, y, vy, landed, elapsed, trail, startPx, peakSpeed}
var usedObjIds = {};   // track which objects have been used

var simRunning = false;
var lastPhysTime = null;
var animFrameId = null;

// ================================================================
// INIT
// ================================================================
function init() {
  cv = document.getElementById('gc');
  ctx = cv.getContext('2d');

  ACCENT = '#f97316';
  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  resize();
  window.addEventListener('resize', resize);

  buildObjectShelf();
  setupControls();
  refreshI18N();
  draw();
}

function resize() {
  var body = document.querySelector('.game-body');
  var rect = body.getBoundingClientRect();
  canvasW = rect.width;
  canvasH = rect.height;
  if (canvasW < 1 || canvasH < 1) return;
  cv.width = canvasW * DPR;
  cv.height = canvasH * DPR;
  cv.style.width = canvasW + 'px';
  cv.style.height = canvasH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // Ruler area: 50px left margin, 40px right margin, 60px ground
  PX_PER_METER = (canvasH - 120) / DROP_HEIGHT;

  draw();
}

// ================================================================
// OBJECT SHELF (sidebar)
// ================================================================
function buildObjectShelf() {
  var shelf = document.getElementById('objShelf');
  shelf.innerHTML = '';
  OBJECTS.forEach(function(obj) {
    var card = document.createElement('div');
    card.className = 'obj-card';
    card.id = 'card-' + obj.id;
    card.innerHTML = '<div class="obj-dot" style="background:' + obj.color + '"></div>' +
      '<div><div class="obj-name">' + t(obj.nameKey) + '</div>' +
      '<div class="obj-info">' + t(obj.weightKey) + ' | ' + obj.mass + 'kg</div></div>';
    card.addEventListener('click', function() {
      if (usedObjIds[obj.id]) return;
      selectObject(obj);
    });
    shelf.appendChild(card);
  });
}

function selectObject(obj) {
  selectedObj = obj;
  // Update card highlights
  document.querySelectorAll('.obj-card').forEach(function(c) {
    c.classList.remove('selected');
  });
  var card = document.getElementById('card-' + obj.id);
  if (card) card.classList.add('selected');
  document.getElementById('dropBtn').disabled = false;
  document.getElementById('statusVal').textContent = t(obj.nameKey);
  draw();
}

// ================================================================
// CONTROLS
// ================================================================
function setupControls() {
  document.getElementById('dropBtn').addEventListener('click', dropSelected);
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('vacuumBtn').addEventListener('click', toggleVacuum);
}

function dropSelected() {
  if (!selectedObj) return;
  if (usedObjIds[selectedObj.id]) return;

  // Mark as used
  usedObjIds[selectedObj.id] = true;
  var card = document.getElementById('card-' + selectedObj.id);
  if (card) {
    card.classList.remove('selected');
    card.classList.add('used');
  }

  // Compute x position: spread objects evenly across drop zone
  var dropZoneLeft = 80;
  var dropZoneRight = canvasW - 40;
  var dropZoneW = dropZoneRight - dropZoneLeft;
  var idx = dropCount;
  var xPos = dropZoneLeft + dropZoneW * (0.1 + 0.8 * (idx / Math.max(OBJECTS.length - 1, 1)));

  var startPx = 50; // starting pixel Y (near top)

  fallingObjs.push({
    obj: selectedObj,
    x: xPos,
    y: startPx,
    vy: 0,        // m/s
    yMeters: 0,   // meters fallen
    landed: false,
    elapsed: 0,
    peakSpeed: 0,
    trail: [{x: xPos, y: startPx}],
    startPx: startPx,
  });

  dropCount++;
  selectedObj = null;
  document.getElementById('dropBtn').disabled = true;
  document.getElementById('hudV4').textContent = dropCount + '/' + OBJECTS.length;
  document.getElementById('statusVal').textContent = t('falling');

  if (!simRunning) startSim();
}

function toggleVacuum() {
  vacuumMode = !vacuumMode;
  var btn = document.getElementById('vacuumBtn');
  btn.textContent = vacuumMode ? t('vacuumOn') : t('vacuumOff');
  btn.classList.toggle('active', vacuumMode);
  draw();
}

function resetGame() {
  fallingObjs = [];
  usedObjIds = {};
  selectedObj = null;
  dropCount = 0;
  simRunning = false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = null;
  lastPhysTime = null;

  // Reset shelf cards
  document.querySelectorAll('.obj-card').forEach(function(c) {
    c.classList.remove('used', 'selected');
  });
  document.getElementById('dropBtn').disabled = true;

  document.getElementById('hudV1').textContent = '--';
  document.getElementById('hudV2').textContent = '--';
  document.getElementById('hudV3').textContent = '--';
  document.getElementById('hudV4').textContent = '0';
  document.getElementById('statusVal').textContent = t('ready');

  draw();
}

// ================================================================
// PHYSICS LOOP
// ================================================================
function startSim() {
  simRunning = true;
  lastPhysTime = performance.now();
  animFrameId = requestAnimationFrame(physicsLoop);
}

function physicsLoop(now) {
  var dt = Math.min((now - lastPhysTime) / 1000, 0.05);
  lastPhysTime = now;

  var anyMoving = false;
  var groundPx = canvasH - 60;

  fallingObjs.forEach(function(fo) {
    if (fo.landed) return;
    anyMoving = true;

    fo.elapsed += dt;

    // Physics in m/s
    var dragC = vacuumMode ? 0 : fo.obj.dragCoeff;
    var mass = fo.obj.mass;

    // F_net = m*g - drag*v^2  =>  a = g - (drag*v^2)/m
    var dragDecel = dragC * fo.vy * fo.vy / (mass + 0.0001);
    var netAccel = GRAVITY_ACCEL - (fo.vy > 0 ? dragDecel : 0);
    fo.vy += netAccel * dt;

    // Terminal velocity clamp
    if (dragC > 0) {
      var termV = Math.sqrt(mass * GRAVITY_ACCEL / (dragC + 0.0001));
      if (fo.vy > termV) fo.vy = termV;
    }

    fo.yMeters += fo.vy * dt;
    if (fo.vy > fo.peakSpeed) fo.peakSpeed = fo.vy;

    // Convert to pixels
    fo.y = fo.startPx + fo.yMeters * PX_PER_METER;

    // Trail
    fo.trail.push({x: fo.x, y: fo.y});

    // Landing check
    if (fo.y + fo.obj.r >= groundPx) {
      fo.y = groundPx - fo.obj.r;
      fo.landed = true;
      fo.vy = 0;
    }
  });

  // Update HUD with most recent non-landed or last object
  var active = fallingObjs.filter(function(fo){return !fo.landed;});
  var display = active.length > 0 ? active[active.length - 1] : fallingObjs[fallingObjs.length - 1];
  if (display) {
    var heightM = Math.max(0, DROP_HEIGHT - display.yMeters).toFixed(1);
    document.getElementById('hudV1').textContent = heightM + t('unit_m');
    document.getElementById('hudV2').textContent = display.vy.toFixed(1) + t('unit_ms');
    document.getElementById('hudV3').textContent = display.elapsed.toFixed(1) + t('unit_s');
  }

  // Check if all done
  if (!anyMoving) {
    simRunning = false;
    if (dropCount >= OBJECTS.length) {
      document.getElementById('statusVal').textContent = t('allDone');
    } else {
      document.getElementById('statusVal').textContent = t('landed');
    }
  } else {
    document.getElementById('statusVal').textContent = t('falling');
  }

  draw();

  if (anyMoving) {
    animFrameId = requestAnimationFrame(physicsLoop);
  }
}

// ================================================================
// DRAWING
// ================================================================
function draw() {
  var w = canvasW, h = canvasH;
  var mc = gameModeColors();
  var groundPx = h - 60;

  // Background
  drawGameBg(ctx, w, h);

  // Height ruler on left
  drawRuler(ctx, w, h, groundPx, mc);

  // Ground line
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60, groundPx);
  ctx.lineTo(w - 20, groundPx);
  ctx.stroke();

  // Ground label
  ctx.fillStyle = mc.dim;
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.fillText(LANG === 'cn' ? '\u5730\u9762' : 'GROUND', w / 2, groundPx + 18);

  // Drop zone top line (release height)
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(60, 50);
  ctx.lineTo(w - 20, 50);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = mc.dim;
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'right';
  ctx.fillText(DROP_HEIGHT + (LANG === 'cn' ? '\u7c73' : 'm'), w - 25, 46);

  // Vacuum mode indicator
  if (vacuumMode) {
    ctx.save();
    ctx.strokeStyle = ACCENT;
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.globalAlpha = 0.4;
    ctx.strokeRect(65, 45, w - 90, groundPx - 42);
    ctx.setLineDash([]);
    ctx.fillStyle = ACCENT;
    ctx.font = "bold 12px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.7;
    ctx.fillText(LANG === 'cn' ? '\u771f\u7a7a\u73af\u5883' : 'VACUUM', w / 2, 38);
    ctx.restore();
  }

  // Draw falling objects
  fallingObjs.forEach(function(fo) {
    drawFallingObj(ctx, fo, mc, groundPx);
  });

  // Selected object preview (if any)
  if (selectedObj && !usedObjIds[selectedObj.id]) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = selectedObj.color;
    ctx.beginPath();
    ctx.arc(w / 2, 50, selectedObj.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = mc.text;
    ctx.font = "10px 'Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t(selectedObj.nameKey), w / 2, 50 + selectedObj.r + 14);
    ctx.restore();
  }

  // If no objects and no selection, show prompt
  if (fallingObjs.length === 0 && !selectedObj) {
    ctx.fillStyle = mc.dim;
    ctx.font = "14px 'Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('ready'), w / 2, h / 2);
  }
}

function drawRuler(c, w, h, groundPx, mc) {
  var rulerX = 50;
  var topY = 50;
  var rulerH = groundPx - topY;

  // Vertical ruler line
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(rulerX, topY);
  c.lineTo(rulerX, groundPx);
  c.stroke();

  // Tick marks every 5 meters
  c.fillStyle = mc.dim;
  c.font = "8px 'JetBrains Mono',monospace";
  c.textAlign = 'right';

  for (var m = 0; m <= DROP_HEIGHT; m += 5) {
    var py = groundPx - (m / DROP_HEIGHT) * rulerH;
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(rulerX - 6, py);
    c.lineTo(rulerX, py);
    c.stroke();
    c.fillText(m + '', rulerX - 8, py + 3);
  }

  // Small ticks every 1m
  for (var m2 = 0; m2 <= DROP_HEIGHT; m2++) {
    if (m2 % 5 === 0) continue;
    var py2 = groundPx - (m2 / DROP_HEIGHT) * rulerH;
    c.strokeStyle = mc.strokeDim;
    c.lineWidth = 0.5;
    c.beginPath();
    c.moveTo(rulerX - 3, py2);
    c.lineTo(rulerX, py2);
    c.stroke();
  }
}

function drawFallingObj(c, fo, mc, groundPx) {
  var obj = fo.obj;

  // Trail
  if (fo.trail.length > 1) {
    c.save();
    c.globalAlpha = 0.25;
    c.strokeStyle = obj.color;
    c.lineWidth = obj.r * 0.6;
    c.lineCap = 'round';
    c.beginPath();
    var tStart = Math.max(0, fo.trail.length - 60);
    c.moveTo(fo.trail[tStart].x, fo.trail[tStart].y);
    for (var ti = tStart + 1; ti < fo.trail.length; ti++) {
      c.lineTo(fo.trail[ti].x, fo.trail[ti].y);
    }
    c.stroke();
    c.restore();
  }

  // Object circle
  c.save();
  c.fillStyle = obj.color;
  c.beginPath();
  c.arc(fo.x, fo.y, obj.r, 0, Math.PI * 2);
  c.fill();

  // Glow for active objects
  if (!fo.landed && gameModeColors().glow) {
    c.shadowColor = obj.color;
    c.shadowBlur = 12;
    c.beginPath();
    c.arc(fo.x, fo.y, obj.r, 0, Math.PI * 2);
    c.fill();
    c.shadowBlur = 0;
  }

  // Object name label
  c.fillStyle = mc.text;
  c.font = "bold 9px 'JetBrains Mono',monospace";
  c.textAlign = 'center';
  var labelY = fo.landed ? fo.y - obj.r - 6 : fo.y + obj.r + 14;
  c.fillText(t(obj.nameKey), fo.x, labelY);

  // Speed indicator while falling
  if (!fo.landed && fo.vy > 0.5) {
    c.fillStyle = ACCENT;
    c.font = "bold 8px 'JetBrains Mono',monospace";
    c.textAlign = 'center';
    c.fillText(fo.vy.toFixed(1) + (LANG === 'cn' ? '\u7c73/\u79d2' : 'm/s'), fo.x, fo.y - obj.r - 6);
  }

  // Gravity arrow (small, pointing down from object)
  if (!fo.landed) {
    var arrowLen = 20;
    c.strokeStyle = ACCENT;
    c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(fo.x + obj.r + 6, fo.y);
    c.lineTo(fo.x + obj.r + 6, fo.y + arrowLen);
    c.stroke();
    // Arrowhead
    c.fillStyle = ACCENT;
    c.beginPath();
    c.moveTo(fo.x + obj.r + 6, fo.y + arrowLen + 4);
    c.lineTo(fo.x + obj.r + 2, fo.y + arrowLen - 2);
    c.lineTo(fo.x + obj.r + 10, fo.y + arrowLen - 2);
    c.fill();
  }

  c.restore();
}

// ================================================================
// REFRESH I18N
// ================================================================
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('shelfLabel').textContent = t('shelfLabel');
  document.getElementById('dropBtn').textContent = t('dropBtn');
  document.getElementById('resetBtn').textContent = t('resetBtn');
  document.getElementById('vacuumBtn').textContent = vacuumMode ? t('vacuumOn') : t('vacuumOff');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hudL1').textContent = t('hudHeight');
  document.getElementById('hudL2').textContent = t('hudSpeed');
  document.getElementById('hudL3').textContent = t('hudTime');
  document.getElementById('hudL4').textContent = t('hudDropped');
  document.getElementById('statusLabel').textContent = t('statusLbl');
  if (fallingObjs.length === 0) {
    document.getElementById('statusVal').textContent = t('ready');
  }
  // Rebuild shelf labels
  OBJECTS.forEach(function(obj) {
    var card = document.getElementById('card-' + obj.id);
    if (card) {
      card.querySelector('.obj-name').textContent = t(obj.nameKey);
      card.querySelector('.obj-info').textContent = t(obj.weightKey) + ' | ' + obj.mass + 'kg';
    }
  });
  draw();
}

// ================================================================
// BOOT
// ================================================================
window.addEventListener('DOMContentLoaded', init);
</script>
