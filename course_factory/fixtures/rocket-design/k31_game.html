<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#f97316));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">MOTOR BUILDER</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="roundLabel">ROUND</div>
    <div class="sidebar-guide" id="roundInfo"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="igniteBtn" disabled>IGNITE</button>
    <div id="nextBtnSlot"></div>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">MOTOR BUILDER</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">ROUND</div><div class="hud-val" id="hudV1">1/3</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">PLACED</div><div class="hud-val" id="hudV2">0/6</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">STATUS</div><div class="hud-val" id="hudV3">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusText">--</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(249,115,22,0.06)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#c2610f');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  renderScene();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

                  cn:'\u5355\u7ea7\u98de\u884c\u81f3 100m\u3002\u53d1\u52a8\u673a\u71c3\u70e7 1.5\u79d2\u3002\u9009\u54ea\u4e2a\u5ef6\u65f6\uff1f'},
  delayCorrect:  {en:'Correct! ~5s delay lets the rocket coast to apogee before chute deploys.',

  choose:        {en:'CHOOSE DELAY',    cn:'\u9009\u62e9\u5ef6\u65f6'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function updateGuideText() {

  document.getElementById('guideText').textContent = t(key);

// ================================================================
// GAME STATE
// ================================================================
var canvas, gctx;
var currentRound = 1;
var totalRounds = 3;

// Part definitions: id, label key, color, height fraction of casing
var PARTS_R1 = [
  {id:'igniter',    labelKey:'igniter',    color:'#fbbf24', accentColor:'#f59e0b', slot:0, hFrac:0.06},
  {id:'nozzle',     labelKey:'nozzle',     color:'#9ca3af', accentColor:'#6b7280', slot:1, hFrac:0.14},
  {id:'propellant', labelKey:'propellant', color:'#c2610f', accentColor:'#f97316', slot:2, hFrac:0.40},
  {id:'delay',      labelKey:'delay',      color:'#a3e635', accentColor:'#84cc16', slot:3, hFrac:0.10},
  {id:'ejection',   labelKey:'ejection',   color:'#ef4444', accentColor:'#dc2626', slot:4, hFrac:0.12},
  {id:'clayCap',    labelKey:'clayCap',    color:'#a16207', accentColor:'#92400e', slot:5, hFrac:0.06},
];

// R2 configs: HT-0 (no delay) and HT-3 (with delay)
var PARTS_HT0 = [
  {id:'igniter',    labelKey:'igniter',    color:'#fbbf24', accentColor:'#f59e0b', slot:0, hFrac:0.07},
  {id:'nozzle',     labelKey:'nozzle',     color:'#9ca3af', accentColor:'#6b7280', slot:1, hFrac:0.16},
  {id:'propellant', labelKey:'propellant', color:'#c2610f', accentColor:'#f97316', slot:2, hFrac:0.45},
  {id:'ejection',   labelKey:'ejection',   color:'#ef4444', accentColor:'#dc2626', slot:3, hFrac:0.14},
  {id:'clayCap',    labelKey:'clayCap',    color:'#a16207', accentColor:'#92400e', slot:4, hFrac:0.07},
];

var PARTS_HT3 = PARTS_R1; // same as standard motor

// Current round parts
var currentParts = [];
var placedParts = [];   // parts placed in casing (in order)
var dragParts = [];     // parts available to drag (canvas positions)
var dragging = null;    // {partIdx, offX, offY, curX, curY}
var bounceAnim = null;  // {partIdx, startX, startY, endX, endY, t, msg}
var snapAnim = null;    // {partIdx, startX, startY, endX, endY, t}
var burnAnim = null;    // {t, phase} -- for ignition sequence
var isAssembled = false;
var feedbackMsg = '';
var feedbackTimer = 0;

// R2 sub-round
var r2Sub = 0; // 0 = HT-0, 1 = HT-3
var r2Results = [];

// R3 state
var r3Choice = -1;
var r3Submitted = false;
var r3Options = [0, 3, 5, 7];

// ================================================================
// LAYOUT CALCULATIONS
// ================================================================
function getLayout() {
  var w = canvas.width, h = canvas.height;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var dw = w / dpr, dh = h / dpr;

  // Casing: centered, 35% of canvas height
  var casingW = Math.min(dw * 0.18, 120);
  var casingH = dh * 0.65;
  var casingX = dw * 0.5 - casingW / 2;
  var casingY = dh * 0.12;

  // Drag source positions: scattered on left and right of casing
  var partW = casingW * 0.85;
  var partSourceH = 30;

  return {dw:dw, dh:dh, dpr:dpr, casingX:casingX, casingY:casingY, casingW:casingW, casingH:casingH, partW:partW, partSourceH:partSourceH};
}

function getPartSourcePositions(layout) {
  var positions = [];
  var n = currentParts.length;
  var leftX = layout.casingX - layout.partW - 60;
  var rightX = layout.casingX + layout.casingW + 60;
  var startY = layout.casingY + 20;
  var gap = Math.min(55, (layout.casingH - 40) / n);

  // Shuffle indices for randomized placement
  var indices = [];
  for (var i = 0; i < n; i++) indices.push(i);
  // Use a seeded shuffle based on round
  var seed = currentRound * 31 + r2Sub * 7;
  for (var j = n - 1; j > 0; j--) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    var k = seed % (j + 1);
    var tmp = indices[j]; indices[j] = indices[k]; indices[k] = tmp;
  }

  for (var i = 0; i < n; i++) {
    var side = i % 2 === 0 ? 'left' : 'right';
    var row = Math.floor(i / 2);
    var px = side === 'left' ? leftX : rightX;
    var py = startY + row * gap;
    positions.push({x: px, y: py, origIdx: indices[i]});
  }
  return positions;
}

function getSlotY(slotIdx, layout) {
  // Bottom of casing is nozzle end, top is cap end
  // Slots go from bottom (slot 0 = igniter at very bottom) to top
  var totalSlots = currentParts.length;
  var usableH = layout.casingH - 8;
  var yBottom = layout.casingY + layout.casingH - 4;
  var cumH = 0;
  for (var i = 0; i < slotIdx; i++) {
    cumH += currentParts[i].hFrac * usableH;
  }
  var slotH = currentParts[slotIdx].hFrac * usableH;
  return {y: yBottom - cumH - slotH, h: slotH};
}

// ================================================================
// HIT TESTING
// ================================================================
function hitTestDragParts(mx, my) {
  var layout = getLayout();
  for (var i = dragParts.length - 1; i >= 0; i--) {
    var dp = dragParts[i];
    if (dp.placed) continue;
    var pw = layout.partW;
    var ph = layout.partSourceH;
    if (mx >= dp.x && mx <= dp.x + pw && my >= dp.y && my <= dp.y + ph) {
      return i;
    }
  }
  return -1;
}

function hitTestCasing(mx, my) {
  var layout = getLayout();
  return mx >= layout.casingX && mx <= layout.casingX + layout.casingW &&
         my >= layout.casingY && my <= layout.casingY + layout.casingH;
}

function hitTestR3Options(mx, my) {
  var layout = getLayout();
  var optW = 100, optH = 50, gap = 20;
  var totalW = r3Options.length * optW + (r3Options.length - 1) * gap;
  var startX = layout.dw / 2 - totalW / 2;
  var optY = layout.dh * 0.72;
  for (var i = 0; i < r3Options.length; i++) {
    var ox = startX + i * (optW + gap);
    if (mx >= ox && mx <= ox + optW && my >= optY && my <= optY + optH) {
      return i;
    }
  }
  return -1;
}

// ================================================================
// GAME LOGIC
// ================================================================
function initRound() {
  isAssembled = false;
  burnAnim = null;
  feedbackMsg = '';
  feedbackTimer = 0;
  dragging = null;
  bounceAnim = null;
  snapAnim = null;
  placedParts = [];
  r3Choice = -1;
  r3Submitted = false;

  document.getElementById('igniteBtn').disabled = true;
  document.getElementById('igniteBtn').style.display = currentRound === 3 ? 'none' : '';
  document.getElementById('nextBtnSlot').innerHTML = '';

  if (currentRound === 1) {
    currentParts = PARTS_R1.slice();
  } else if (currentRound === 2) {
    currentParts = r2Sub === 0 ? PARTS_HT0.slice() : PARTS_HT3.slice();
  } else {
    currentParts = PARTS_R1.slice();
    isAssembled = true; // pre-assembled for R3
    placedParts = currentParts.slice();
  }

  // Build drag parts from source positions
  dragParts = [];
  if (!isAssembled) {
    var layout = getLayout();
    var srcPos = getPartSourcePositions(layout);
    for (var i = 0; i < currentParts.length; i++) {
      var sp = srcPos[i];
      dragParts.push({
        partRef: currentParts[sp.origIdx],
        x: sp.x, y: sp.y,
        homeX: sp.x, homeY: sp.y,
        placed: false
      });
    }
  }

  updateHUD();
  updateGuideText();
  renderScene();
}

function tryPlacePart(dpIdx) {
  var dp = dragParts[dpIdx];
  var part = dp.partRef;
  var nextSlot = placedParts.length;

  // Check if this part belongs in the next slot
  var expectedPart = currentParts[nextSlot];
  if (part.id !== expectedPart.id) {
    // Wrong order -- bounce back with feedback
    var hintKey = 'wrong' + expectedPart.id.charAt(0).toUpperCase() + expectedPart.id.slice(1);
    // Try specific wrong-part hints
    var wrongKey = 'wrong' + part.id.charAt(0).toUpperCase() + part.id.slice(1);
    feedbackMsg = I18N[wrongKey] ? t(wrongKey) : t('wrongOrder');

    feedbackTimer = 120;
    bounceAnim = {
      dpIdx: dpIdx,
      startX: dp.x, startY: dp.y,
      endX: dp.homeX, endY: dp.homeY,
      t: 0
    };
    return;
  }

  // Correct -- snap into place
  var layout = getLayout();
  var slotInfo = getSlotY(nextSlot, layout);
  snapAnim = {
    dpIdx: dpIdx,
    startX: dp.x, startY: dp.y,
    endX: layout.casingX + (layout.casingW - layout.partW) / 2,
    endY: slotInfo.y,
    t: 0
  };
  dp.placed = true;
  placedParts.push(part);

  // Show hint for placed part
  var hintKeys = ['igniterHint','nozzleHint','propHint','delayHint','ejectHint','capHint'];
  var hintMap = {igniter:0, nozzle:1, propellant:2, delay:3, ejection:4, clayCap:5};
  var hIdx = hintMap[part.id];
  if (hIdx !== undefined && hintKeys[hIdx]) {
    feedbackMsg = t(hintKeys[hIdx]);
    feedbackTimer = 90;
  }

  updateHUD();

  if (placedParts.length === currentParts.length) {
    isAssembled = true;
    document.getElementById('igniteBtn').disabled = false;
    document.getElementById('statusText').textContent = t('complete');
    document.getElementById('statusResult').textContent = '';
    document.getElementById('statusResult').className = 'status-result pass';
  }
}

function startBurnSequence() {
  if (!isAssembled || burnAnim) return;
  document.getElementById('igniteBtn').disabled = true;
  burnAnim = {t: 0, phase: 'thrust', totalFrames: 240};
  document.getElementById('statusText').textContent = t('burning');
  document.getElementById('hudV3').textContent = t('burning');
}

function updateHUD() {
  document.getElementById('hudV1').textContent = currentRound + '/' + totalRounds;
  if (currentRound <= 2) {
    var total = currentParts.length;
    document.getElementById('hudV2').textContent = placedParts.length + '/' + total;
  } else {
    document.getElementById('hudV2').textContent = '--';
  }
  document.getElementById('hudV3').textContent = isAssembled ? t('complete') : t('ready');
  document.getElementById('statusText').textContent = isAssembled ? t('complete') : t('ready');
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
}

// ================================================================
// RENDERING
// ================================================================
function renderScene() {
  if (!canvas || !gctx) return;
  var w = canvas.width, h = canvas.height;
  var c = gctx;
  var layout = getLayout();
  var dw = layout.dw, dh = layout.dh;

  drawGameBg(c, w, h);

  var mc = gameModeColors();

  if (currentRound <= 2) {
    drawAssemblyView(c, layout, mc);
  } else {
    drawDelaySelectionView(c, layout, mc);
  }

  // Feedback message
  if (feedbackMsg && feedbackTimer > 0) {
    c.save();
    c.font = 'bold 13px "Noto Sans SC","Space Grotesk",sans-serif';
    c.textAlign = 'center';
    var alpha = Math.min(1, feedbackTimer / 30);
    c.globalAlpha = alpha;
    var isWrong = feedbackMsg.indexOf(t('wrongOrder')) >= 0 ||
                  feedbackMsg.indexOf('!') >= 0 && feedbackMsg.indexOf(t('complete')) < 0;
    c.fillStyle = isWrong ? '#ef4444' : mc.accent;

    // Background for readability
    var tm = c.measureText(feedbackMsg);
    var fbX = dw / 2;
    var fbY = layout.casingY + layout.casingH + 30;
    c.fillStyle = mc.bg1 || '#05060f';
    c.globalAlpha = alpha * 0.85;
    c.fillRect(fbX - tm.width / 2 - 10, fbY - 16, tm.width + 20, 24);
    c.globalAlpha = alpha;
    c.fillStyle = isWrong ? '#ef4444' : '#22c55e';
    c.fillText(feedbackMsg, fbX, fbY);
    c.restore();
  }
}

function drawAssemblyView(c, layout, mc) {
  var dw = layout.dw, dh = layout.dh;

  // Draw motor casing outline
  drawCasing(c, layout, mc);

  // Draw placed parts inside casing
  for (var i = 0; i < placedParts.length; i++) {
    var part = placedParts[i];
    var slotInfo = getSlotY(i, layout);
    drawPartInCasing(c, part, layout.casingX + 4, slotInfo.y, layout.casingW - 8, slotInfo.h, mc, true);
  }

  // Draw drop zone indicators for next slot
  if (!isAssembled && placedParts.length < currentParts.length) {
    var nextSlot = placedParts.length;
    var slotInfo = getSlotY(nextSlot, layout);
    c.save();
    c.setLineDash([4, 4]);
    c.strokeStyle = mc.accent;
    c.globalAlpha = 0.4 + 0.2 * Math.sin(Date.now() * 0.004);
    c.lineWidth = 1.5;
    c.strokeRect(layout.casingX + 4, slotInfo.y, layout.casingW - 8, slotInfo.h);
    c.restore();
  }

  // Draw drag parts (not placed)
  for (var i = 0; i < dragParts.length; i++) {
    var dp = dragParts[i];
    if (dp.placed) continue;
    if (dragging && dragging.dpIdx === i) continue; // drawn last
    drawDragPart(c, dp, layout, mc, false);
  }

  // Draw currently dragging part on top
  if (dragging) {
    var dp = dragParts[dragging.dpIdx];
    drawDragPart(c, {partRef: dp.partRef, x: dragging.curX, y: dragging.curY}, layout, mc, true);
  }

  // Burn sequence overlay
  if (burnAnim) {
    drawBurnSequence(c, layout, mc);
  }

  // R2 sub-round label
  if (currentRound === 2) {
    c.save();
    c.font = 'bold 14px "Space Grotesk","Noto Sans SC",sans-serif';
    c.textAlign = 'center';
    c.fillStyle = mc.accent;
    var subLabel = r2Sub === 0 ? 'HT-0' : 'HT-3';
    c.fillText(subLabel, dw / 2, layout.casingY - 8);
    c.restore();
  }
}

function drawCasing(c, layout, mc) {
  var cx = layout.casingX, cy = layout.casingY, cw = layout.casingW, ch = layout.casingH;

  // Outer casing body
  c.save();
  c.strokeStyle = mc.stroke;
  c.lineWidth = 2;
  c.strokeRect(cx, cy, cw, ch);

  // Nozzle cone at bottom
  var nozzleW = cw * 0.4;
  var nozzleH = 18;
  c.beginPath();
  c.moveTo(cx + cw / 2 - nozzleW / 2, cy + ch);
  c.lineTo(cx + cw / 2 - nozzleW * 0.25, cy + ch + nozzleH);
  c.lineTo(cx + cw / 2 + nozzleW * 0.25, cy + ch + nozzleH);
  c.lineTo(cx + cw / 2 + nozzleW / 2, cy + ch);
  c.strokeStyle = mc.dim;
  c.lineWidth = 1.5;
  c.stroke();

  // Label
  c.font = '9px "JetBrains Mono",monospace';
  c.textAlign = 'center';
  c.fillStyle = mc.dim;
  c.globalAlpha = 0.6;
  c.fillText(LANG === 'cn' ? '\u53d1\u52a8\u673a\u58f3\u4f53' : 'MOTOR CASING', cx + cw / 2, cy - 14);

  // Top/bottom indicators
  c.fillText(LANG === 'cn' ? '\u9876\u90e8 (TOP)' : 'TOP', cx + cw / 2, cy - 3);
  c.fillText(LANG === 'cn' ? '\u5e95\u90e8 (BTM)' : 'BOTTOM', cx + cw / 2, cy + ch + nozzleH + 14);
  c.globalAlpha = 1;
  c.restore();
}

function drawPartInCasing(c, part, x, y, w, h, mc, glowEffect) {
  c.save();

  // Part body
  var grad = c.createLinearGradient(x, y, x + w, y);
  grad.addColorStop(0, part.color);
  grad.addColorStop(1, part.accentColor);
  c.fillStyle = grad;
  c.fillRect(x, y, w, h);

  // Glow edge
  if (glowEffect) {
    c.shadowColor = part.color;
    c.shadowBlur = 8;
    c.strokeStyle = part.color;
    c.lineWidth = 1;
    c.strokeRect(x, y, w, h);
    c.shadowBlur = 0;
  }

  // Label
  c.font = 'bold 10px "JetBrains Mono",monospace';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = h < 18 ? mc.text : '#fff';
  if (h >= 14) {
    var label = t(part.labelKey);
    c.fillText(label, x + w / 2, y + h / 2);
  }

  c.restore();
}

function drawDragPart(c, dp, layout, mc, isDragging) {
  c.save();
  var pw = layout.partW;
  var ph = layout.partSourceH;
  var part = dp.partRef;

  // Shadow for dragging
  if (isDragging) {
    c.shadowColor = mc.accent;
    c.shadowBlur = 12;
  }

  // Body
  var grad = c.createLinearGradient(dp.x, dp.y, dp.x + pw, dp.y);
  grad.addColorStop(0, part.color);
  grad.addColorStop(1, part.accentColor);
  c.fillStyle = grad;

  var radius = 4;
  c.beginPath();
  c.moveTo(dp.x + radius, dp.y);
  c.lineTo(dp.x + pw - radius, dp.y);
  c.arcTo(dp.x + pw, dp.y, dp.x + pw, dp.y + radius, radius);
  c.lineTo(dp.x + pw, dp.y + ph - radius);
  c.arcTo(dp.x + pw, dp.y + ph, dp.x + pw - radius, dp.y + ph, radius);
  c.lineTo(dp.x + radius, dp.y + ph);
  c.arcTo(dp.x, dp.y + ph, dp.x, dp.y + ph - radius, radius);
  c.lineTo(dp.x, dp.y + radius);
  c.arcTo(dp.x, dp.y, dp.x + radius, dp.y, radius);
  c.closePath();
  c.fill();

  c.shadowBlur = 0;

  // Border
  c.strokeStyle = isDragging ? mc.accent : mc.strokeDim;
  c.lineWidth = isDragging ? 2 : 1;
  c.stroke();

  // Label
  c.font = 'bold 11px "JetBrains Mono","Noto Sans SC",monospace';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#fff';
  c.fillText(t(part.labelKey), dp.x + pw / 2, dp.y + ph / 2);

  c.restore();
}

function drawBurnSequence(c, layout, mc) {
  if (!burnAnim) return;
  var progress = burnAnim.t / burnAnim.totalFrames;
  var cx = layout.casingX, cy = layout.casingY, cw = layout.casingW, ch = layout.casingH;

  // Three phases: thrust (0-0.4), coast/delay (0.4-0.7), ejection (0.7-1.0)
  var hasDelay = currentParts.some(function(p){ return p.id === 'delay'; });
  var thrustEnd = 0.40;
  var coastEnd = hasDelay ? 0.70 : 0.45;
  var ejectEnd = 1.0;

  // Phase label
  c.save();
  c.font = 'bold 12px "Space Grotesk","Noto Sans SC",sans-serif';
  c.textAlign = 'center';
  var phaseLabel = '';
  if (progress < thrustEnd) {
    phaseLabel = t('burnPhase');
    c.fillStyle = '#ef4444';
  } else if (progress < coastEnd) {
    phaseLabel = t('coastPhase');
    c.fillStyle = '#fbbf24';
  } else {
    phaseLabel = t('ejectPhase');
    c.fillStyle = '#22c55e';
  }
  c.fillText(phaseLabel, layout.dw / 2, cy - 24);

  // Burn glow inside casing
  if (progress < thrustEnd) {
    var burnFrac = progress / thrustEnd;
    // Propellant burns from bottom to top
    var propSlot = null;
    for (var i = 0; i < currentParts.length; i++) {
      if (currentParts[i].id === 'propellant') { propSlot = getSlotY(i, layout); break; }
    }
    if (propSlot) {
      var burnH = propSlot.h * burnFrac;
      var burnY = propSlot.y + propSlot.h - burnH;
      var burnGrad = c.createLinearGradient(cx, burnY, cx, burnY + burnH);
      burnGrad.addColorStop(0, 'rgba(249,115,22,0.8)');
      burnGrad.addColorStop(0.5, 'rgba(239,68,68,0.6)');
      burnGrad.addColorStop(1, 'rgba(251,191,36,0.9)');
      c.fillStyle = burnGrad;
      c.fillRect(cx + 4, burnY, cw - 8, burnH);

      // Exhaust flame from nozzle
      var flameH = 30 + burnFrac * 40;
      var flameW = cw * 0.3;
      var flameX = cx + cw / 2;
      var flameY = cy + ch;
      var flameGrad = c.createLinearGradient(flameX, flameY, flameX, flameY + flameH);
      flameGrad.addColorStop(0, 'rgba(251,191,36,0.9)');
      flameGrad.addColorStop(0.4, 'rgba(249,115,22,0.7)');
      flameGrad.addColorStop(1, 'rgba(239,68,68,0)');
      c.fillStyle = flameGrad;
      c.beginPath();
      c.moveTo(flameX - flameW / 2, flameY);
      c.quadraticCurveTo(flameX - flameW * 0.6, flameY + flameH * 0.5, flameX, flameY + flameH);
      c.quadraticCurveTo(flameX + flameW * 0.6, flameY + flameH * 0.5, flameX + flameW / 2, flameY);
      c.closePath();
      c.fill();

      // Particles
      for (var pi = 0; pi < 3; pi++) {
        var px = flameX + (Math.random() - 0.5) * flameW;
        var py = flameY + Math.random() * flameH * 0.8;
        c.fillStyle = 'rgba(251,191,36,' + (0.3 + Math.random() * 0.5) + ')';
        c.beginPath();
        c.arc(px, py, 1 + Math.random() * 2, 0, Math.PI * 2);
        c.fill();
      }
    }
  } else if (progress < coastEnd) {
    // Delay charge burning (slow glow)
    var delaySlot = null;
    for (var i = 0; i < currentParts.length; i++) {
      if (currentParts[i].id === 'delay') { delaySlot = getSlotY(i, layout); break; }
    }
    if (delaySlot) {
      var coastFrac = (progress - thrustEnd) / (coastEnd - thrustEnd);
      c.fillStyle = 'rgba(163,230,53,' + (0.3 + 0.3 * Math.sin(coastFrac * Math.PI * 4)) + ')';
      c.fillRect(cx + 4, delaySlot.y, cw - 8, delaySlot.h);
    }
    // Small residual smoke from nozzle
    c.fillStyle = 'rgba(156,163,175,0.2)';
    c.beginPath();
    c.arc(cx + cw / 2, cy + ch + 8, 4, 0, Math.PI * 2);
    c.fill();
  } else {
    // Ejection phase -- flash at top
    var ejectFrac = (progress - coastEnd) / (ejectEnd - coastEnd);
    var ejectSlot = null;
    for (var i = 0; i < currentParts.length; i++) {
      if (currentParts[i].id === 'ejection') { ejectSlot = getSlotY(i, layout); break; }
    }
    if (ejectSlot) {
      c.fillStyle = 'rgba(239,68,68,' + (0.8 - ejectFrac * 0.6) + ')';
      c.fillRect(cx + 4, ejectSlot.y, cw - 8, ejectSlot.h);
    }

    // Ejection flash at top
    if (ejectFrac < 0.5) {
      var flashR = 20 + ejectFrac * 40;
      var flashGrad = c.createRadialGradient(cx + cw / 2, cy, 0, cx + cw / 2, cy, flashR);
      flashGrad.addColorStop(0, 'rgba(251,191,36,0.9)');
      flashGrad.addColorStop(1, 'rgba(251,191,36,0)');
      c.fillStyle = flashGrad;
      c.fillRect(cx + cw / 2 - flashR, cy - flashR, flashR * 2, flashR * 2);
    }

    // Parachute deploying upward
    if (ejectFrac > 0.3) {
      var chuteFrac = Math.min(1, (ejectFrac - 0.3) / 0.7);
      var chuteY = cy - 20 - chuteFrac * 50;
      var chuteW = 20 + chuteFrac * 30;
      c.strokeStyle = '#22c55e';
      c.lineWidth = 2;
      // Canopy
      c.beginPath();
      c.arc(cx + cw / 2, chuteY, chuteW / 2, Math.PI, 0);
      c.stroke();
      // Lines
      c.beginPath();
      c.moveTo(cx + cw / 2 - chuteW / 2, chuteY);
      c.lineTo(cx + cw / 2, chuteY + 25);
      c.lineTo(cx + cw / 2 + chuteW / 2, chuteY);
      c.strokeStyle = '#22c55e';
      c.lineWidth = 1;
      c.stroke();
      // Nose cone
      c.fillStyle = mc.dim;
      c.beginPath();
      c.arc(cx + cw / 2, chuteY + 28, 4, 0, Math.PI * 2);
      c.fill();
    }
  }

  c.restore();
}

function drawDelaySelectionView(c, layout, mc) {
  var dw = layout.dw, dh = layout.dh;

  // Draw pre-assembled motor in center (smaller)
  var smallCasingW = layout.casingW * 0.7;
  var smallCasingH = layout.casingH * 0.45;
  var smallCasingX = dw / 2 - smallCasingW / 2;
  var smallCasingY = dh * 0.05;

  c.save();
  c.strokeStyle = mc.stroke;
  c.lineWidth = 1.5;
  c.strokeRect(smallCasingX, smallCasingY, smallCasingW, smallCasingH);

  // Draw parts inside
  var usableH = smallCasingH - 6;
  var yBottom = smallCasingY + smallCasingH - 3;
  var cumH = 0;
  for (var i = 0; i < currentParts.length; i++) {
    var part = currentParts[i];
    var partH = part.hFrac * usableH;
    var partY = yBottom - cumH - partH;
    var grad = c.createLinearGradient(smallCasingX, partY, smallCasingX + smallCasingW, partY);
    grad.addColorStop(0, part.color);
    grad.addColorStop(1, part.accentColor);
    c.fillStyle = grad;
    c.fillRect(smallCasingX + 3, partY, smallCasingW - 6, partH);
    cumH += partH;
  }
  c.restore();

  // Scenario text
  c.save();
  c.font = '13px "Noto Sans SC","Space Grotesk",sans-serif';
  c.textAlign = 'center';
  c.fillStyle = mc.text;
  c.fillText(t('r3Scenario'), dw / 2, dh * 0.55);

  // Flight trajectory diagram
  var trajY = dh * 0.60;
  var trajW = dw * 0.6;
  var trajStartX = dw / 2 - trajW / 2;

  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  // Ground line
  c.beginPath();
  c.moveTo(trajStartX, trajY + 40);
  c.lineTo(trajStartX + trajW, trajY + 40);
  c.stroke();

  // Trajectory curve
  c.strokeStyle = mc.accent;
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(trajStartX, trajY + 40);
  c.quadraticCurveTo(trajStartX + trajW * 0.35, trajY - 30, trajStartX + trajW * 0.5, trajY - 20);
  c.quadraticCurveTo(trajStartX + trajW * 0.65, trajY - 10, trajStartX + trajW, trajY + 40);
  c.stroke();

  // Labels on trajectory
  c.font = '9px "JetBrains Mono",monospace';
  c.fillStyle = mc.dim;
  c.textAlign = 'left';
  c.fillText(LANG === 'cn' ? '\u71c3\u70e7 1.5s' : 'Burn 1.5s', trajStartX + 5, trajY + 55);
  c.textAlign = 'center';
  c.fillText(LANG === 'cn' ? '\u6700\u9ad8\u70b9' : 'Apogee', trajStartX + trajW * 0.5, trajY - 32);
  c.fillText('100m', trajStartX + trajW * 0.5, trajY - 44);

  // Delay options
  var optW = 80, optH = 44, gap = 16;
  var totalOptW = r3Options.length * optW + (r3Options.length - 1) * gap;
  var startX = dw / 2 - totalOptW / 2;
  var optY = dh * 0.75;

  c.font = 'bold 9px "JetBrains Mono",monospace';
  c.textAlign = 'center';
  c.fillStyle = mc.dim;
  c.fillText(t('choose'), dw / 2, optY - 8);

  for (var i = 0; i < r3Options.length; i++) {
    var ox = startX + i * (optW + gap);
    var isSelected = r3Choice === i;
    var isCorrect = r3Submitted && r3Options[i] === 5;
    var isWrong = r3Submitted && r3Choice === i && r3Options[i] !== 5;

    c.save();
    if (isCorrect && r3Submitted) {
      c.fillStyle = 'rgba(34,197,94,0.15)';
      c.strokeStyle = '#22c55e';
    } else if (isWrong) {
      c.fillStyle = 'rgba(239,68,68,0.15)';
      c.strokeStyle = '#ef4444';
    } else if (isSelected) {
      c.fillStyle = 'rgba(249,115,22,0.15)';
      c.strokeStyle = mc.accent;
    } else {
      c.fillStyle = 'rgba(128,128,128,0.08)';
      c.strokeStyle = mc.strokeDim;
    }
    c.lineWidth = isSelected || (r3Submitted && (isCorrect || isWrong)) ? 2 : 1;

    // Rounded rect
    var rr = 6;
    c.beginPath();
    c.moveTo(ox + rr, optY); c.lineTo(ox + optW - rr, optY);
    c.arcTo(ox + optW, optY, ox + optW, optY + rr, rr);
    c.lineTo(ox + optW, optY + optH - rr);
    c.arcTo(ox + optW, optY + optH, ox + optW - rr, optY + optH, rr);
    c.lineTo(ox + rr, optY + optH);
    c.arcTo(ox, optY + optH, ox, optY + optH - rr, rr);
    c.lineTo(ox, optY + rr);
    c.arcTo(ox, optY, ox + rr, optY, rr);
    c.closePath();
    c.fill();
    c.stroke();

    c.font = 'bold 14px "JetBrains Mono",monospace';
    c.textAlign = 'center';
    c.fillStyle = isSelected ? mc.accent : mc.text;
    c.fillText('HT-' + r3Options[i], ox + optW / 2, optY + 18);

    c.font = '10px "JetBrains Mono",monospace';
    c.fillStyle = mc.dim;
    c.fillText(r3Options[i] + 's ' + (LANG === 'cn' ? '\u5ef6\u65f6' : 'delay'), ox + optW / 2, optY + 34);

    c.restore();
  }

  // R3 feedback
  if (r3Submitted) {
    c.save();
    c.font = '12px "Noto Sans SC","Space Grotesk",sans-serif';
    c.textAlign = 'center';
    var fbKey = r3Options[r3Choice] === 5 ? 'delayCorrect' :
                r3Options[r3Choice] === 0 ? 'delayWrong0' :
                r3Options[r3Choice] === 3 ? 'delayWrong3' : 'delayWrong7';
    var fbColor = r3Options[r3Choice] === 5 ? '#22c55e' : '#ef4444';
    c.fillStyle = fbColor;

    // Word wrap the feedback
    var fbText = t(fbKey);
    var maxW = dw * 0.7;
    var words = fbText.split('');
    var lines = [];
    var currentLine = '';
    for (var wi = 0; wi < fbText.length; wi++) {
      var testLine = currentLine + fbText[wi];
      if (c.measureText(testLine).width > maxW) {
        lines.push(currentLine);
        currentLine = fbText[wi];
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);

    var fbStartY = optY + optH + 24;
    for (var li = 0; li < lines.length; li++) {
      c.fillText(lines[li], dw / 2, fbStartY + li * 18);
    }
    c.restore();
  }

  c.restore();
}

// ================================================================
// ANIMATION LOOP
// ================================================================
var animFrameId = null;

function animLoop() {
  var needRedraw = false;

  // Bounce animation
  if (bounceAnim) {
    bounceAnim.t += 1;
    var bProg = Math.min(bounceAnim.t / 15, 1);
    var ease = 1 - Math.pow(1 - bProg, 3);
    var dp = dragParts[bounceAnim.dpIdx];
    dp.x = bounceAnim.startX + (bounceAnim.endX - bounceAnim.startX) * ease;
    dp.y = bounceAnim.startY + (bounceAnim.endY - bounceAnim.startY) * ease;
    if (bProg >= 1) bounceAnim = null;
    needRedraw = true;
  }

  // Snap animation
  if (snapAnim) {
    snapAnim.t += 1;
    var sProg = Math.min(snapAnim.t / 12, 1);
    var ease = 1 - Math.pow(1 - sProg, 3);
    var dp = dragParts[snapAnim.dpIdx];
    dp.x = snapAnim.startX + (snapAnim.endX - snapAnim.startX) * ease;
    dp.y = snapAnim.startY + (snapAnim.endY - snapAnim.startY) * ease;
    if (sProg >= 1) snapAnim = null;
    needRedraw = true;
  }

  // Burn animation
  if (burnAnim) {
    burnAnim.t += 1;
    if (burnAnim.t >= burnAnim.totalFrames) {
      burnAnim = null;
      onBurnComplete();
    }
    needRedraw = true;
  }

  // Feedback timer
  if (feedbackTimer > 0) {
    feedbackTimer--;
    needRedraw = true;
  }

  // Drop zone pulse
  if (!isAssembled && currentRound <= 2) needRedraw = true;

  if (needRedraw) renderScene();
  animFrameId = requestAnimationFrame(animLoop);
}

function onBurnComplete() {
  if (currentRound === 1) {
    document.getElementById('statusText').textContent = t('complete');
    document.getElementById('statusResult').textContent = 'PASS';
    document.getElementById('statusResult').className = 'status-result pass';
    showNextButton();
  } else if (currentRound === 2) {
    var label = r2Sub === 0 ? 'HT-0' : 'HT-3';
    r2Results.push(label);
    if (r2Sub === 0) {
      // Show HT-0 explanation, then switch to HT-3
      feedbackMsg = t('ht0Explain');
      feedbackTimer = 150;
      document.getElementById('statusText').textContent = 'HT-0 ' + t('complete');
      setTimeout(function() {
        r2Sub = 1;
        initRound();
      }, 3000);
    } else {
      feedbackMsg = t('ht3Explain');
      feedbackTimer = 150;
      document.getElementById('statusText').textContent = 'HT-3 ' + t('complete');
      showNextButton();
    }
  }
}

function showNextButton() {
  var slot = document.getElementById('nextBtnSlot');
  slot.innerHTML = '';
  var btn = document.createElement('button');
  btn.className = 'action-btn';
  btn.id = 'nextBtn';
  btn.textContent = t('next');
  btn.addEventListener('click', goNextRound);
  slot.appendChild(btn);
  document.getElementById('igniteBtn').style.display = 'none';
}

function goNextRound() {
  currentRound++;
  r2Sub = 0;
  if (currentRound > totalRounds) {
    document.getElementById('statusText').textContent = t('allDone');
    document.getElementById('statusResult').textContent = 'PASS';
    document.getElementById('statusResult').className = 'status-result pass';
    document.getElementById('hudV3').textContent = t('allDone');
    document.getElementById('nextBtnSlot').innerHTML = '';
    document.getElementById('igniteBtn').style.display = 'none';
    return;
  }
  initRound();
}

// ================================================================
// INPUT HANDLING (mouse + touch)
// ================================================================
function getCanvasCoords(e) {
  var rect = canvas.getBoundingClientRect();
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left),
    y: (clientY - rect.top)
  };
}

function onPointerDown(e) {
  e.preventDefault();
  var pos = getCanvasCoords(e);

  if (currentRound === 3) {
    if (!r3Submitted) {
      var optIdx = hitTestR3Options(pos.x, pos.y);
      if (optIdx >= 0) {
        r3Choice = optIdx;
        r3Submitted = true;
        var isCorrect = r3Options[r3Choice] === 5;
        document.getElementById('statusText').textContent = isCorrect ? t('delayCorrect').substring(0, 30) : t('wrongOrder');
        document.getElementById('statusResult').textContent = isCorrect ? 'PASS' : 'FAIL';
        document.getElementById('statusResult').className = 'status-result ' + (isCorrect ? 'pass' : 'fail');
        if (isCorrect) {
          document.getElementById('hudV3').textContent = 'PASS';
          showNextButton();
        } else {
          // Allow retry after 2s
          setTimeout(function() {
            r3Submitted = false;
            r3Choice = -1;
            renderScene();
          }, 2500);
        }
        renderScene();
      }
    }
    return;
  }

  if (isAssembled || bounceAnim || snapAnim) return;

  var hitIdx = hitTestDragParts(pos.x, pos.y);
  if (hitIdx >= 0) {
    var dp = dragParts[hitIdx];
    dragging = {
      dpIdx: hitIdx,
      offX: pos.x - dp.x,
      offY: pos.y - dp.y,
      curX: dp.x,
      curY: dp.y
    };
    renderScene();
  }
}

function onPointerMove(e) {
  if (!dragging) return;
  e.preventDefault();
  var pos = getCanvasCoords(e);
  dragging.curX = pos.x - dragging.offX;
  dragging.curY = pos.y - dragging.offY;
  renderScene();
}

function onPointerUp(e) {
  if (!dragging) return;
  e.preventDefault();
  var pos = getCanvasCoords(e);
  var dp = dragParts[dragging.dpIdx];
  dp.x = dragging.curX;
  dp.y = dragging.curY;

  // Check if dropped on casing
  var dropX = dragging.curX + getLayout().partW / 2;
  var dropY = dragging.curY + getLayout().partSourceH / 2;
  if (hitTestCasing(dropX, dropY)) {
    var dpIdx = dragging.dpIdx;
    dragging = null;
    tryPlacePart(dpIdx);
  } else {
    // Bounce back to home
    var dpIdx = dragging.dpIdx;
    bounceAnim = {
      dpIdx: dpIdx,
      startX: dp.x, startY: dp.y,
      endX: dp.homeX, endY: dp.homeY,
      t: 0
    };
    dragging = null;
  }
  renderScene();
}

// ================================================================
// INIT
// ================================================================
function initGame() {
  canvas = document.getElementById('gc');
  gctx = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  function resizeCanvas() {
    var body = canvas.parentElement;
    var rect = body.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    gctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Recalculate drag part positions when not mid-drag
    if (!dragging && currentRound <= 2 && !isAssembled) {
      var layout = getLayout();
      var srcPos = getPartSourcePositions(layout);
      for (var i = 0; i < dragParts.length; i++) {
        if (!dragParts[i].placed) {
          var sp = srcPos[i];
          dragParts[i].x = sp.x;
          dragParts[i].y = sp.y;
          dragParts[i].homeX = sp.x;
          dragParts[i].homeY = sp.y;
        }
      }
    }
    renderScene();
  }

  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 400);
  document.fonts.ready.then(resizeCanvas);

  // Input events
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, {passive: false});
  canvas.addEventListener('touchmove', onPointerMove, {passive: false});
  canvas.addEventListener('touchend', onPointerUp, {passive: false});

  // Buttons
  document.getElementById('igniteBtn').addEventListener('click', startBurnSequence);
  document.getElementById('resetBtn').addEventListener('click', function() {
    currentRound = 1;
    r2Sub = 0;
    r2Results = [];
    initRound();
  });

  refreshI18N();
  initRound();
  animLoop();
}

initGame();
