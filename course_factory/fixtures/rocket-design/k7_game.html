<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
.gauge-fill{transition:height 0.15s ease-out;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">BALLOON ROCKET</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="gaugeLabel">INFLATION</div>
    <div style="width:100%;height:80px;position:relative;border:1px solid rgba(167,139,250,0.3);margin:4px 0;">
      <div id="gaugeFill" class="gauge-fill" style="position:absolute;bottom:0;left:0;width:100%;height:0%;background:linear-gradient(0deg,rgba(167,139,250,0.3),rgba(167,139,250,0.6));"></div>
      <div id="gaugeVal" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#a78bfa;letter-spacing:0.15em;">0%</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="recordLabel">LAUNCH LOG</div>
    <div id="launchLog" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);line-height:1.6;max-height:120px;overflow-y:auto;"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">BALLOON ROCKET LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">LAUNCH</div><div class="hud-val" id="hudV1">0/5</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">BEST</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">STATUS</div><div class="hud-val" id="hudV3">READY</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">DRAG ON BALLOON TO INFLATE</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa'; // space purple
var GOLD = '#d4a843';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

// Stars cache
var _stars = [];
function ensureStars(w, h) {
  if (_stars.length > 0) return;
  var count = 25 + Math.floor(Math.random() * 16);
  for (var i = 0; i < count; i++) {
    _stars.push({ x: Math.random() * w, y: Math.random() * h, r: 0.5 + Math.random(), a: 0.3 + Math.random() * 0.4 });
  }
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  if (GAME_MODE === 'cyberpunk') {
    g.addColorStop(0, 'oklch(0.10 0.04 280)');
    g.addColorStop(1, 'oklch(0.20 0.10 290)');
  } else {
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  }
  c.fillStyle = g; c.fillRect(0,0,w,h);
  // Grid
  var gc2 = mc.grid || 'rgba(167,139,250,0.06)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // Stars
  if (GAME_MODE !== 'light') {
    ensureStars(w, h);
    var time = Date.now() * 0.001;
    for (var i = 0; i < _stars.length; i++) {
      var s = _stars[i];
      var tw = s.a + Math.sin(time * 1.5 + i * 0.7) * 0.15;
      c.save(); c.globalAlpha = Math.max(0.1, Math.min(tw, 0.8));
      c.fillStyle = '#e2e8f0';
      c.beginPath(); c.arc(s.x, s.y, s.r, 0, Math.PI * 2); c.fill();
      c.restore();
    }
  }
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.07)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#7c3aed');
  r.style.setProperty('--glow-strong', 'rgba(167,139,250,0.25)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'BALLOON ROCKET LAB', cn:'\u6c14\u7403\u706b\u7bad\u5b9e\u9a8c\u5ba4'},
  sub:       {en:'Inflate & Launch!', cn:'\u5145\u6c14\u53d1\u5c04\uff01'},
  guide:     {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  gText:     {en:'Drag down on the balloon to inflate it, then release to launch. Find the optimal inflation!', cn:'\u5728\u6c14\u7403\u4e0a\u5411\u4e0b\u62d6\u52a8\u5145\u6c14\uff0c\u677e\u624b\u53d1\u5c04\u3002\u627e\u5230\u6700\u4f73\u5145\u6c14\u91cf\uff01'},
  inflation: {en:'INFLATION', cn:'\u5145\u6c14\u91cf'},
  log:       {en:'LAUNCH LOG', cn:'\u53d1\u5c04\u8bb0\u5f55'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  launch:    {en:'LAUNCH', cn:'\u53d1\u5c04'},
  best:      {en:'BEST', cn:'\u6700\u4f73'},
  status:    {en:'STATUS', cn:'\u72b6\u6001'},
  ready:     {en:'READY', cn:'\u5c31\u7eea'},
  inflating: {en:'INFLATING...', cn:'\u5145\u6c14\u4e2d...'},
  flying:    {en:'FLYING!', cn:'\u98de\u884c\u4e2d\uff01'},
  popped:    {en:'POPPED!', cn:'\u7206\u4e86\uff01'},
  done:      {en:'COMPLETE!', cn:'\u5b8c\u6210\uff01'},
  drag:      {en:'DRAG ON BALLOON TO INFLATE', cn:'\u5728\u6c14\u7403\u4e0a\u5411\u4e0b\u62d6\u52a8\u5145\u6c14'},
  release:   {en:'RELEASE TO LAUNCH', cn:'\u677e\u624b\u53d1\u5c04'},
  tapAgain:  {en:'TAP BALLOON FOR NEXT LAUNCH', cn:'\u70b9\u51fb\u6c14\u7403\u51c6\u5907\u4e0b\u6b21\u53d1\u5c04'},
  results:   {en:'RESULTS', cn:'\u7ed3\u679c'},
  dist:      {en:'DIST', cn:'\u8ddd\u79bb'},
  actionLbl: {en:'ACTION', cn:'\u4f5c\u7528\u529b'},
  reactLbl:  {en:'REACTION', cn:'\u53cd\u4f5c\u7528\u529b'},
  airBack:   {en:'AIR BACKWARD', cn:'\u7a7a\u6c14\u5411\u540e'},
  balloonFwd:{en:'BALLOON FORWARD', cn:'\u6c14\u7403\u5411\u524d'},
  logEntry:  {en:'#%d: %s m (%d%%)', cn:'#%d: %s m (%d%%)'},
  summary:   {en:'5 LAUNCHES DONE - SEE YOUR RESULTS!', cn:'5\u6b21\u53d1\u5c04\u5b8c\u6210 - \u67e5\u770b\u7ed3\u679c\uff01'},
  optimal:   {en:'OPTIMAL ZONE: 60-80%', cn:'\u6700\u4f73\u533a\u95f4\uff1a60-80%'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('gText');
  document.getElementById('gaugeLabel').textContent = t('inflation');
  document.getElementById('recordLabel').textContent = t('log');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('launch');
  document.getElementById('hudL2').textContent = t('best');
  document.getElementById('hudL3').textContent = t('status');
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  updateStatus();
  updateLog();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    refreshI18N();
  });
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, c2d, cw = 0, ch = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

var STATE = {
  phase: 'idle',        // idle | inflating | flying | result | done
  inflation: 0,         // 0-100
  balloonX: 0,
  balloonY: 0,
  balloonVx: 0,
  dragStartY: 0,
  launches: [],         // [{inflation, distance}]
  bestDist: 0,
  particles: [],
  trailParticles: [],
  popParticles: [],
  lineY: 0,             // fish line Y position
  startX: 0,            // balloon start X
  time: 0,
};

// Physics constants
var MAX_LAUNCHES = 5;
var LINE_MARGIN = 60;    // from left
var BALLOON_R_MIN = 12;
var BALLOON_R_MAX = 30;
var MAX_THRUST = 12;     // px per frame at 100% inflation
var DRAG_COEFF = 0.015;  // air resistance coefficient
var POP_THRESHOLD = 95;  // above this, balloon might pop

// ================================================================
// PHYSICS
// ================================================================

function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

// Compute distance for a given inflation level (physics model)
// Thrust = inflation * MAX_THRUST / 100
// Drag = DRAG_COEFF * v^2 (increases with balloon size)
// Larger balloon = more thrust but more drag -> optimal at ~70%
function computeFlightPhysics(inflation) {
  var thrust = (inflation / 100) * MAX_THRUST;
  var dragMult = 1 + (inflation / 100) * 1.5; // bigger balloon = more drag
  var fuelFrames = Math.floor(inflation * 0.8); // how many frames thrust lasts
  var vx = 0;
  var dist = 0;
  var maxFrames = 300;

  for (var i = 0; i < maxFrames; i++) {
    var currentThrust = (i < fuelFrames) ? thrust : 0;
    var drag = DRAG_COEFF * dragMult * vx * vx;
    vx += currentThrust - drag;
    if (vx < 0.05 && i > fuelFrames) break;
    dist += vx;
  }
  return dist;
}

// ================================================================
// DRAWING
// ================================================================

function drawBalloon(c, x, y, rx, ry, alpha) {
  c.save();
  c.globalAlpha = alpha || 0.85;
  c.fillStyle = ACCENT;
  c.beginPath();
  c.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.3)';
  c.lineWidth = 0.8;
  c.stroke();
  // Highlight
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.beginPath();
  c.ellipse(x - rx * 0.25, y - ry * 0.3, rx * 0.3, ry * 0.2, -0.3, 0, Math.PI * 2);
  c.fill();
  // Nozzle
  c.fillStyle = ACCENT;
  c.globalAlpha = 0.9;
  c.beginPath();
  c.moveTo(x - rx * 0.25, y + ry);
  c.lineTo(x, y + ry + 5);
  c.lineTo(x + rx * 0.25, y + ry);
  c.closePath();
  c.fill();
  c.restore();
}

function drawStraw(c, x, y, len) {
  c.save();
  c.strokeStyle = 'rgba(255,255,255,0.35)';
  c.lineWidth = 4;
  c.beginPath();
  c.moveTo(x, y);
  c.lineTo(x + len, y);
  c.stroke();
  // Inner line
  c.strokeStyle = 'rgba(255,255,255,0.1)';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(x + 2, y);
  c.lineTo(x + len - 2, y);
  c.stroke();
  c.restore();
}

function drawFishLine(c, x1, x2, y) {
  c.save();
  c.strokeStyle = gameModeColors().dim;
  c.lineWidth = 0.8;
  c.setLineDash([6, 4]);
  c.beginPath();
  c.moveTo(x1, y);
  c.lineTo(x2, y);
  c.stroke();
  c.setLineDash([]);
  c.restore();
}

function drawForceArrows(c, bx, by, inflation, vx) {
  if (inflation <= 0 && vx <= 0) return;
  var mc = gameModeColors();
  c.save();
  // Air backward arrow
  if (vx > 0.5) {
    var airLen = Math.min(vx * 4, 80);
    c.strokeStyle = GOLD;
    c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(bx, by + 25);
    c.lineTo(bx - airLen, by + 25);
    c.stroke();
    // Arrowhead
    c.fillStyle = GOLD;
    c.beginPath();
    c.moveTo(bx - airLen, by + 25);
    c.lineTo(bx - airLen + 6, by + 21);
    c.lineTo(bx - airLen + 6, by + 29);
    c.closePath();
    c.fill();
    // Label
    c.font = "bold 9px 'JetBrains Mono',monospace";
    c.fillStyle = GOLD;
    c.textAlign = 'center';
    c.fillText(t('airBack'), bx - airLen / 2, by + 40);
  }
  // Balloon forward arrow
  if (vx > 0.5) {
    var fwdLen = Math.min(vx * 4, 80);
    c.strokeStyle = ACCENT;
    c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(bx, by - 25);
    c.lineTo(bx + fwdLen, by - 25);
    c.stroke();
    c.fillStyle = ACCENT;
    c.beginPath();
    c.moveTo(bx + fwdLen, by - 25);
    c.lineTo(bx + fwdLen - 6, by - 29);
    c.lineTo(bx + fwdLen - 6, by - 21);
    c.closePath();
    c.fill();
    c.font = "bold 9px 'JetBrains Mono',monospace";
    c.fillStyle = ACCENT;
    c.textAlign = 'center';
    c.fillText(t('balloonFwd'), bx + fwdLen / 2, by - 35);
  }
  c.restore();
}

function spawnParticles(x, y, count, color1, color2) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 3;
    STATE.particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.02 + Math.random() * 0.02,
      color: (i % 5 === 0) ? color2 : color1,
      r: 1 + Math.random() * 1.5,
    });
  }
}

function spawnTrail(x, y) {
  STATE.trailParticles.push({
    x: x + (Math.random() - 0.5) * 6,
    y: y + (Math.random() - 0.5) * 6,
    life: 1.0,
    decay: 0.03 + Math.random() * 0.02,
    r: 1 + Math.random(),
  });
}

function updateParticles() {
  for (var i = STATE.particles.length - 1; i >= 0; i--) {
    var p = STATE.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) STATE.particles.splice(i, 1);
  }
  for (var j = STATE.trailParticles.length - 1; j >= 0; j--) {
    var tp = STATE.trailParticles[j];
    tp.life -= tp.decay;
    if (tp.life <= 0) STATE.trailParticles.splice(j, 1);
  }
  for (var k = STATE.popParticles.length - 1; k >= 0; k--) {
    var pp = STATE.popParticles[k];
    pp.x += pp.vx; pp.y += pp.vy;
    pp.vy += 0.15; // gravity
    pp.life -= pp.decay;
    if (pp.life <= 0) STATE.popParticles.splice(k, 1);
  }
}

function drawParticles(c) {
  // Trail particles
  for (var j = 0; j < STATE.trailParticles.length; j++) {
    var tp = STATE.trailParticles[j];
    c.save();
    c.globalAlpha = tp.life * 0.4;
    c.fillStyle = ACCENT;
    c.beginPath();
    c.arc(tp.x, tp.y, tp.r * tp.life, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }
  // Burst particles
  for (var i = 0; i < STATE.particles.length; i++) {
    var p = STATE.particles[i];
    c.save();
    c.globalAlpha = p.life * 0.7;
    c.fillStyle = p.color;
    c.beginPath();
    c.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }
  // Pop particles
  for (var k = 0; k < STATE.popParticles.length; k++) {
    var pp = STATE.popParticles[k];
    c.save();
    c.globalAlpha = pp.life * 0.8;
    c.fillStyle = pp.color;
    c.beginPath();
    c.arc(pp.x, pp.y, pp.r, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }
}

function drawCornerTicks(c, x, y, w, h) {
  c.save();
  c.strokeStyle = ACCENT; c.lineWidth = 1; c.globalAlpha = 0.5;
  var L = 10;
  c.beginPath(); c.moveTo(x, y + L); c.lineTo(x, y); c.lineTo(x + L, y); c.stroke();
  c.beginPath(); c.moveTo(x + w - L, y); c.lineTo(x + w, y); c.lineTo(x + w, y + L); c.stroke();
  c.beginPath(); c.moveTo(x, y + h - L); c.lineTo(x, y + h); c.lineTo(x + L, y + h); c.stroke();
  c.beginPath(); c.moveTo(x + w - L, y + h); c.lineTo(x + w, y + h); c.lineTo(x + w, y + h - L); c.stroke();
  c.restore();
}

function drawResultsPanel(c, w, h) {
  var mc = gameModeColors();
  var pw = Math.min(w * 0.8, 500);
  var ph = Math.min(h * 0.7, 300);
  var px = (w - pw) / 2;
  var py = (h - ph) / 2;

  // Panel bg
  c.save();
  c.fillStyle = (GAME_MODE === 'light') ? 'rgba(250,250,245,0.95)' : 'rgba(10,10,20,0.92)';
  c.fillRect(px, py, pw, ph);
  c.strokeStyle = ACCENT; c.lineWidth = 1;
  c.strokeRect(px, py, pw, ph);
  drawCornerTicks(c, px, py, pw, ph);

  // Title
  c.font = "bold 14px 'JetBrains Mono',monospace";
  c.fillStyle = ACCENT; c.textAlign = 'center';
  c.fillText(t('results'), w / 2, py + 25);

  // Bar chart
  var barAreaX = px + 40;
  var barAreaW = pw - 80;
  var barAreaY = py + 50;
  var barAreaH = ph - 110;
  var maxDist = 0;
  for (var i = 0; i < STATE.launches.length; i++) {
    if (STATE.launches[i].distance > maxDist) maxDist = STATE.launches[i].distance;
  }
  if (maxDist < 1) maxDist = 1;

  var barW = Math.min(barAreaW / STATE.launches.length - 10, 40);
  var gap = (barAreaW - barW * STATE.launches.length) / (STATE.launches.length + 1);

  for (var j = 0; j < STATE.launches.length; j++) {
    var l = STATE.launches[j];
    var barH = (l.distance / maxDist) * barAreaH * 0.85;
    var bx = barAreaX + gap + j * (barW + gap);
    var by = barAreaY + barAreaH - barH;

    // Bar
    var isOptimal = l.inflation >= 60 && l.inflation <= 80;
    c.fillStyle = isOptimal ? ACCENT : (l.distance <= 0 ? '#ef4444' : mc.dim);
    c.fillRect(bx, by, barW, barH);

    // Value label
    c.font = "bold 10px 'JetBrains Mono',monospace";
    c.fillStyle = mc.text;
    c.textAlign = 'center';
    c.fillText(l.distance.toFixed(1) + 'm', bx + barW / 2, by - 8);

    // Inflation label
    c.font = "9px 'JetBrains Mono',monospace";
    c.fillStyle = mc.dim;
    c.fillText(l.inflation + '%', bx + barW / 2, barAreaY + barAreaH + 14);

    // Launch number
    c.fillText('#' + (j + 1), bx + barW / 2, barAreaY + barAreaH + 26);
  }

  // Optimal zone hint
  c.font = "10px 'JetBrains Mono',monospace";
  c.fillStyle = GOLD;
  c.textAlign = 'center';
  c.fillText(t('optimal'), w / 2, py + ph - 15);

  c.restore();
}

// ================================================================
// GAME LOOP
// ================================================================

function updateStatus() {
  var v3 = document.getElementById('hudV3');
  var sl = document.getElementById('statusLabel');
  if (STATE.phase === 'idle') {
    v3.textContent = t('ready');
    sl.textContent = (STATE.launches.length >= MAX_LAUNCHES) ? t('summary') : t('drag');
  } else if (STATE.phase === 'inflating') {
    v3.textContent = t('inflating');
    sl.textContent = t('release');
  } else if (STATE.phase === 'flying') {
    v3.textContent = t('flying');
    sl.textContent = '';
  } else if (STATE.phase === 'result') {
    v3.textContent = t('ready');
    sl.textContent = t('tapAgain');
  } else if (STATE.phase === 'done') {
    v3.textContent = t('done');
    sl.textContent = t('summary');
  }
}

function updateLog() {
  var logEl = document.getElementById('launchLog');
  var html = '';
  for (var i = 0; i < STATE.launches.length; i++) {
    var l = STATE.launches[i];
    var color = (l.distance <= 0) ? '#ef4444' : ACCENT;
    html += '<div style="color:' + color + '">';
    html += '#' + (i + 1) + ': ' + l.distance.toFixed(1) + ' m (' + l.inflation + '%)';
    html += '</div>';
  }
  logEl.innerHTML = html;
}

function updateHUD() {
  document.getElementById('hudV1').textContent = STATE.launches.length + '/' + MAX_LAUNCHES;
  document.getElementById('hudV2').textContent = STATE.bestDist > 0 ? STATE.bestDist.toFixed(1) + 'm' : '--';

  // Gauge
  document.getElementById('gaugeFill').style.height = STATE.inflation + '%';
  document.getElementById('gaugeVal').textContent = STATE.inflation + '%';
  if (STATE.inflation > POP_THRESHOLD) {
    document.getElementById('gaugeVal').style.color = '#ef4444';
  } else {
    document.getElementById('gaugeVal').style.color = ACCENT;
  }
}

// Flight simulation state
var flightVx = 0;
var flightFuelLeft = 0;
var flightDragMult = 1;
var flightDist = 0;
var flightInflation = 0;
var flightPopped = false;

function startFlight() {
  flightInflation = STATE.inflation;

  // Check for pop
  if (flightInflation > POP_THRESHOLD && Math.random() < (flightInflation - POP_THRESHOLD) / 20) {
    flightPopped = true;
    STATE.phase = 'flying';
    // Pop particles
    for (var i = 0; i < 15; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 2 + Math.random() * 4;
      STATE.popParticles.push({
        x: STATE.balloonX, y: STATE.balloonY,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
        life: 1.0, decay: 0.015 + Math.random() * 0.01,
        color: (i % 4 === 0) ? GOLD : ACCENT,
        r: 1.5 + Math.random() * 2,
      });
    }
    setTimeout(function() {
      recordLaunch(0);
    }, 800);
    return;
  }

  flightPopped = false;
  flightVx = 0;
  flightFuelLeft = Math.floor(flightInflation * 0.8);
  flightDragMult = 1 + (flightInflation / 100) * 1.5;
  flightDist = 0;
  STATE.phase = 'flying';

  // Launch particles
  spawnParticles(STATE.balloonX, STATE.balloonY, 10, ACCENT, GOLD);
  updateStatus();
}

function tickFlight() {
  if (flightPopped) return;

  var thrust = (flightFuelLeft > 0) ? (flightInflation / 100) * MAX_THRUST : 0;
  if (flightFuelLeft > 0) flightFuelLeft--;
  var drag = DRAG_COEFF * flightDragMult * flightVx * flightVx;
  flightVx += thrust - drag;
  if (flightVx < 0) flightVx = 0;

  STATE.balloonVx = flightVx;
  STATE.balloonX += flightVx;
  flightDist += flightVx;

  // Trail
  if (flightVx > 0.3) {
    spawnTrail(STATE.balloonX - BALLOON_R_MIN, STATE.balloonY);
  }

  // Check stop
  if (flightVx < 0.05 && flightFuelLeft <= 0) {
    var distMeters = flightDist / 15; // scale to meters
    recordLaunch(distMeters);
  }
}

function recordLaunch(dist) {
  STATE.launches.push({ inflation: flightInflation, distance: parseFloat(dist.toFixed(1)) });
  if (dist > STATE.bestDist) STATE.bestDist = parseFloat(dist.toFixed(1));
  STATE.inflation = 0;
  STATE.balloonVx = 0;

  if (STATE.launches.length >= MAX_LAUNCHES) {
    STATE.phase = 'done';
  } else {
    STATE.phase = 'result';
  }

  updateHUD();
  updateLog();
  updateStatus();

  // Reposition balloon for next launch
  if (STATE.phase !== 'done') {
    setTimeout(function() {
      STATE.balloonX = STATE.startX;
    }, 300);
  }
}

function resetGame() {
  STATE.phase = 'idle';
  STATE.inflation = 0;
  STATE.launches = [];
  STATE.bestDist = 0;
  STATE.particles = [];
  STATE.trailParticles = [];
  STATE.popParticles = [];
  STATE.balloonVx = 0;
  STATE.balloonX = STATE.startX;
  flightPopped = false;
  updateHUD();
  updateLog();
  updateStatus();
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
}

// ================================================================
// INPUT
// ================================================================

var isDragging = false;

function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var x = ((e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0) - rect.left) * (cw / rect.width);
  var y = ((e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0) - rect.top) * (ch / rect.height);
  return { x: x / DPR, y: y / DPR };
}

function onPointerDown(e) {
  e.preventDefault();
  var pos = getCanvasPos(e);
  var bx = STATE.balloonX;
  var by = STATE.balloonY;
  var rx = BALLOON_R_MIN + (STATE.inflation / 100) * (BALLOON_R_MAX - BALLOON_R_MIN);

  if (STATE.phase === 'done') return;

  if (STATE.phase === 'result') {
    STATE.phase = 'idle';
    STATE.balloonX = STATE.startX;
    updateStatus();
    return;
  }

  if (STATE.phase !== 'idle') return;

  // Check if click is near balloon
  var dx = pos.x - bx;
  var dy = pos.y - by;
  if (Math.sqrt(dx * dx + dy * dy) < rx + 30) {
    isDragging = true;
    STATE.dragStartY = pos.y;
    STATE.phase = 'inflating';
    updateStatus();
  }
}

function onPointerMove(e) {
  e.preventDefault();
  if (!isDragging || STATE.phase !== 'inflating') return;
  var pos = getCanvasPos(e);
  var dragDist = pos.y - STATE.dragStartY;
  STATE.inflation = Math.max(0, Math.min(100, Math.floor(dragDist * 0.8)));
  updateHUD();
}

function onPointerUp(e) {
  e.preventDefault();
  if (!isDragging) return;
  isDragging = false;
  if (STATE.phase === 'inflating' && STATE.inflation > 5) {
    startFlight();
  } else {
    STATE.phase = 'idle';
    STATE.inflation = 0;
    updateHUD();
    updateStatus();
  }
}

// ================================================================
// DRAW LOOP
// ================================================================

function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;

  var w = cw / DPR;
  var h = ch / DPR;

  drawGameBg(c2d, w, h);

  var mc = gameModeColors();
  STATE.time = Date.now() * 0.001;

  // Fish line
  STATE.lineY = h * 0.55;
  STATE.startX = LINE_MARGIN + 30;
  if (STATE.phase === 'idle' && STATE.launches.length === 0 && STATE.balloonX === 0) {
    STATE.balloonX = STATE.startX;
  }
  STATE.balloonY = STATE.lineY;

  drawFishLine(c2d, 20, w - 20, STATE.lineY);

  // Supports (left/right posts)
  c2d.save();
  c2d.strokeStyle = mc.dim; c2d.lineWidth = 1;
  c2d.beginPath(); c2d.moveTo(25, STATE.lineY - 15); c2d.lineTo(25, STATE.lineY + 15); c2d.stroke();
  c2d.beginPath(); c2d.moveTo(w - 25, STATE.lineY - 15); c2d.lineTo(w - 25, STATE.lineY + 15); c2d.stroke();
  c2d.restore();

  // Distance markers
  c2d.save();
  c2d.font = "8px 'JetBrains Mono',monospace";
  c2d.fillStyle = mc.dim;
  c2d.textAlign = 'center';
  var markerCount = Math.floor((w - LINE_MARGIN * 2) / 60);
  for (var m = 0; m <= markerCount; m++) {
    var mx = LINE_MARGIN + m * 60;
    var dist = (m * 60 / 15).toFixed(0);
    c2d.fillText(dist + 'm', mx, STATE.lineY + 20);
    // Tick mark
    c2d.strokeStyle = mc.strokeDim || 'rgba(255,255,255,0.1)';
    c2d.lineWidth = 0.5;
    c2d.beginPath();
    c2d.moveTo(mx, STATE.lineY + 3);
    c2d.lineTo(mx, STATE.lineY + 8);
    c2d.stroke();
  }
  c2d.restore();

  // Flight physics tick
  if (STATE.phase === 'flying') {
    tickFlight();
  }

  // Balloon
  if (STATE.phase !== 'done' || STATE.popParticles.length > 0) {
    var inf = STATE.inflation;
    var brx = BALLOON_R_MIN + (inf / 100) * (BALLOON_R_MAX - BALLOON_R_MIN);
    var bry = brx * 1.2;

    if (!flightPopped || STATE.phase !== 'flying') {
      // Breathing effect when idle
      var breath = 1;
      if (STATE.phase === 'idle' || STATE.phase === 'result') {
        breath = 0.98 + Math.sin(STATE.time * 3.14) * 0.02;
      }

      drawBalloon(c2d, STATE.balloonX, STATE.balloonY - bry - 3, brx * breath, bry * breath, 0.85);

      // Straw
      drawStraw(c2d, STATE.balloonX - 12, STATE.balloonY, 24);

      // Inflation warning glow
      if (inf > POP_THRESHOLD) {
        c2d.save();
        var warn = Math.sin(STATE.time * 10) * 0.3 + 0.3;
        c2d.shadowColor = '#ef4444';
        c2d.shadowBlur = 15;
        c2d.globalAlpha = warn;
        c2d.strokeStyle = '#ef4444';
        c2d.lineWidth = 1.5;
        c2d.beginPath();
        c2d.ellipse(STATE.balloonX, STATE.balloonY - bry - 3, brx + 3, bry + 3, 0, 0, Math.PI * 2);
        c2d.stroke();
        c2d.restore();
      }

      // Force arrows during flight
      if (STATE.phase === 'flying' && !flightPopped) {
        drawForceArrows(c2d, STATE.balloonX, STATE.balloonY - bry - 3, inf, STATE.balloonVx);
      }
    }
  }

  // Draw particles
  updateParticles();
  drawParticles(c2d);

  // Results panel
  if (STATE.phase === 'done' && STATE.launches.length >= MAX_LAUNCHES) {
    drawResultsPanel(c2d, w, h);
  }

  // HUD labels on canvas
  c2d.save();
  c2d.font = "10px 'JetBrains Mono',monospace";
  c2d.fillStyle = ACCENT;
  c2d.textAlign = 'left';
  c2d.globalAlpha = 0.7;
  c2d.fillText('K7 // ' + t('title'), 15, 20);
  c2d.restore();

  requestAnimationFrame(draw);
}

// ================================================================
// INIT
// ================================================================

function resizeCanvas() {
  var body = document.querySelector('.game-body');
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  cw = rect.width * DPR;
  ch = rect.height * DPR;
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  c2d.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  setTimeout(resizeCanvas, 200);
  setTimeout(resizeCanvas, 600);

  // Input events
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });

  // Reset button
  document.getElementById('btnReset').addEventListener('click', resetGame);

  updateHUD();
  draw();
}

init();

</script>
</body>
</html>
