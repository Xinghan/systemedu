<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* ── Main area: canvas + controls + hud ── */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, style switcher, title, guide -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

      if (clamp) return output[0];

// ============================================================
// CUSTOM DRAW -- handles complex rendering for seesaw, gauge,
// matrix grid, and answer panel
// ============================================================

function customDrawElement(ctx, el, W, H) {
  if (el.type !== 'custom') return false;
  var kind = el.kind;

  // --- Seesaw (Frame 1) ---
  if (kind === 'seesaw') {
    var P = AnimRuntime.PAL;
    var MC = AnimRuntime.modeColors;
    var cx = el.cx, cy = el.cy;
    var beamW = el.beamW || 260;
    var tilt = el.tilt || 0; // -1 to 1 (negative = left heavy)

    // Fulcrum triangle
    ctx.fillStyle = MC.strokeDim;
    ctx.beginPath();
    ctx.moveTo(cx, cy + 10);
    ctx.lineTo(cx - 16, cy + 35);
    ctx.lineTo(cx + 16, cy + 35);
    ctx.closePath();
    ctx.fill();

    // Ground line
    ctx.strokeStyle = MC.strokeDim;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - beamW * 0.7, cy + 35);
    ctx.lineTo(cx + beamW * 0.7, cy + 35);
    ctx.stroke();

    // Beam (tilted)
    ctx.save();
    ctx.translate(cx, cy + 10);
    ctx.rotate(tilt * 0.18);

    // Beam bar
    ctx.fillStyle = MC.strokeDim;
    ctx.fillRect(-beamW / 2, -3, beamW, 6);

    // Left side -- Thrust (orange arrow up)
    var leftX = -beamW / 2 + 20;
    // Thrust arrow pointing up
    ctx.strokeStyle = P.primary;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(leftX, 20);
    ctx.lineTo(leftX, -50);
    ctx.stroke();
    // Arrowhead
    ctx.fillStyle = P.primary;
    ctx.beginPath();
    ctx.moveTo(leftX, -55);
    ctx.lineTo(leftX - 8, -42);
    ctx.lineTo(leftX + 8, -42);
    ctx.closePath();
    ctx.fill();
    // Label
    ctx.fillStyle = P.primary;
    ctx.font = "bold 11px 'Space Grotesk','Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(AnimRuntime.t('f1_thrust'), leftX, 32);

    // Right side -- Weight (red arrow down)
    var rightX = beamW / 2 - 20;
    var redColor = P.error || '#ef4444';
    ctx.strokeStyle = redColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(rightX, -50);
    ctx.lineTo(rightX, 20);
    ctx.stroke();
    // Arrowhead
    ctx.fillStyle = redColor;
    ctx.beginPath();
    ctx.moveTo(rightX, 25);
    ctx.lineTo(rightX - 8, 12);
    ctx.lineTo(rightX + 8, 12);
    ctx.closePath();
    ctx.fill();
    // Label
    ctx.fillStyle = redColor;
    ctx.fillText(AnimRuntime.t('f1_weight'), rightX, -58);

    ctx.restore();
    return true;
  }

  // --- Rocket icon (small) ---
  if (kind === 'rocket_icon') {
    var rx = el.rx, ry = el.ry, rscale = el.rscale || 1;
    var rcolor = el.rcolor || AnimRuntime.PAL.primary;
    ctx.save();
    ctx.translate(rx, ry);
    ctx.scale(rscale, rscale);
    // Body
    ctx.fillStyle = rcolor;
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(6, -4);
    ctx.lineTo(6, 10);
    ctx.lineTo(-6, 10);
    ctx.lineTo(-6, -4);
    ctx.closePath();
    ctx.fill();
    // Nose cone
    ctx.beginPath();
    ctx.moveTo(0, -24);
    ctx.lineTo(4, -18);
    ctx.lineTo(-4, -18);
    ctx.closePath();
    ctx.fill();
    // Fins
    ctx.beginPath();
    ctx.moveTo(-6, 8); ctx.lineTo(-11, 14); ctx.lineTo(-6, 14);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(6, 8); ctx.lineTo(11, 14); ctx.lineTo(6, 14);
    ctx.closePath();
    ctx.fill();
    // Flame (if flying)
    if (el.flame) {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.moveTo(-4, 14); ctx.lineTo(0, 24); ctx.lineTo(4, 14);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.moveTo(-2, 14); ctx.lineTo(0, 20); ctx.lineTo(2, 14);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    return true;
  }

  // --- TWR gauge (Frame 2) ---
  if (kind === 'twr_gauge') {
    var P = AnimRuntime.PAL;
    var MC = AnimRuntime.modeColors;
    var gx = el.gx, gy = el.gy, gw = el.gw || 50, gh = el.gh || 260;
    var zones = [
      { lo: 0, hi: 1, color: '#ef4444', label: AnimRuntime.t('f2_red'), range: '< 1' },
      { lo: 1, hi: 3, color: '#f97316', label: AnimRuntime.t('f2_orange'), range: '1~3' },
      { lo: 3, hi: 5, color: '#eab308', label: AnimRuntime.t('f2_yellow'), range: '3~5' },
      { lo: 5, hi: 8, color: '#22c55e', label: AnimRuntime.t('f2_green'), range: '>= 5' },
    ];
    var maxVal = 8;

    // Draw gauge background
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(gx, gy, gw, gh);
    ctx.strokeStyle = MC.strokeDim;
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gw, gh);

    // Draw colored zones (bottom = 0, top = maxVal)
    zones.forEach(function(z) {
      var yTop = gy + gh * (1 - z.hi / maxVal);
      var yBot = gy + gh * (1 - z.lo / maxVal);
      var zoneH = yBot - yTop;
      ctx.fillStyle = z.color;
      ctx.globalAlpha = 0.35;
      ctx.fillRect(gx, yTop, gw, zoneH);
      ctx.globalAlpha = 1;

      // Zone border line
      ctx.strokeStyle = z.color;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(gx, yTop);
      ctx.lineTo(gx + gw, yTop);
      ctx.stroke();

      // Range label (left of gauge)
      ctx.fillStyle = z.color;
      ctx.font = "bold 9px 'JetBrains Mono',monospace";
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(z.range, gx - 6, (yTop + yBot) / 2);

      // Description label (right of gauge)
      ctx.fillStyle = MC.dim;
      ctx.font = "11px 'Noto Sans SC','Inter',sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(z.label, gx + gw + 10, (yTop + yBot) / 2);
    });

    // Scale marks
    ctx.fillStyle = MC.mute;
    ctx.font = "8px 'JetBrains Mono',monospace";
    ctx.textAlign = 'right';
    for (var v = 0; v <= maxVal; v++) {
      var yy = gy + gh * (1 - v / maxVal);
      ctx.beginPath();
      ctx.moveTo(gx - 2, yy);
      ctx.lineTo(gx, yy);
      ctx.strokeStyle = MC.mute;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    return true;
  }

  // --- Matrix grid (Frame 3) ---
  if (kind === 'matrix_grid') {
    var P = AnimRuntime.PAL;
    var MC = AnimRuntime.modeColors;
    var mx = el.mx, my = el.my;
    var cellW = el.cellW || 75, cellH = el.cellH || 36;
    var engines = el.engines; // [{name, thrust}]
    var masses = el.masses;   // [{label, kg}]

    var cols = engines.length;
    var rows = masses.length;
    var headerH = 28;
    var labelW = 52;

    // Column headers (engines)
    ctx.font = "bold 9px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var c = 0; c < cols; c++) {
      ctx.fillStyle = P.primary;
      ctx.fillText(engines[c].name, mx + labelW + c * cellW + cellW / 2, my + headerH / 2 - 4);
      ctx.fillStyle = MC.dim;
      ctx.font = "8px 'JetBrains Mono',monospace";
      ctx.fillText(engines[c].thrust + 'N', mx + labelW + c * cellW + cellW / 2, my + headerH / 2 + 8);
      ctx.font = "bold 9px 'JetBrains Mono',monospace";
    }

    // Row headers (masses)
    ctx.textAlign = 'right';
    for (var r = 0; r < rows; r++) {
      ctx.fillStyle = MC.dim;
      ctx.font = "10px 'Noto Sans SC','Inter',sans-serif";
      ctx.fillText(masses[r].label, mx + labelW - 6, my + headerH + r * cellH + cellH / 2);
    }

    // Grid cells
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var twr = engines[c].thrust / (masses[r].kg * 9.8);
        var twrStr = twr.toFixed(2);
        var cellX = mx + labelW + c * cellW;
        var cellY = my + headerH + r * cellH;

        // Cell color based on TWR
        var cellColor, textColor;
        if (twr < 1) {
          cellColor = 'rgba(239,68,68,0.2)';
          textColor = '#ef4444';
        } else if (twr < 3) {
          cellColor = 'rgba(249,115,22,0.15)';
          textColor = '#f97316';
        } else if (twr < 5) {
          cellColor = 'rgba(234,179,8,0.15)';
          textColor = '#eab308';
        } else {
          cellColor = 'rgba(34,197,94,0.15)';
          textColor = '#22c55e';
        }

        ctx.fillStyle = cellColor;
        ctx.fillRect(cellX + 1, cellY + 1, cellW - 2, cellH - 2);
        ctx.strokeStyle = MC.strokeDim;
        ctx.lineWidth = 0.5;
        ctx.strokeRect(cellX, cellY, cellW, cellH);

        // TWR value
        ctx.fillStyle = textColor;
        ctx.font = "bold 12px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(twrStr, cellX + cellW / 2, cellY + cellH / 2);

        // X mark for < 1
        if (twr < 1) {
          ctx.strokeStyle = '#ef4444';
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.4;
          ctx.beginPath();
          ctx.moveTo(cellX + 4, cellY + 4);
          ctx.lineTo(cellX + cellW - 4, cellY + cellH - 4);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cellX + cellW - 4, cellY + 4);
          ctx.lineTo(cellX + 4, cellY + cellH - 4);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }

    // Grid outer border
    ctx.strokeStyle = MC.stroke;
    ctx.lineWidth = 1;
    ctx.strokeRect(mx + labelW, my + headerH, cols * cellW, rows * cellH);

    return true;
  }

  // --- Answer comparison (Frame 4) ---
  if (kind === 'answer_panel') {
    var P = AnimRuntime.PAL;
    var MC = AnimRuntime.modeColors;
    var ax = el.ax, ay = el.ay;

    // Big red X for fail
    var failX = ax, failY = ay;
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(failX - 18, failY - 18);
    ctx.lineTo(failX + 18, failY + 18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(failX + 18, failY - 18);
    ctx.lineTo(failX - 18, failY + 18);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Red circle around X
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(failX, failY, 26, 0, Math.PI * 2);
    ctx.stroke();

    return true;
  }

  // --- Solution arrow ---
  if (kind === 'solution_arrow') {
    var MC = AnimRuntime.modeColors;
    var sx = el.sx, sy = el.sy, ex = el.ex, ey = el.ey;
    ctx.strokeStyle = el.arrowColor || MC.accent;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.setLineDash([]);
    // Arrowhead
    var angle = Math.atan2(ey - sy, ex - sx);
    ctx.fillStyle = el.arrowColor || MC.accent;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - 8 * Math.cos(angle - 0.4), ey - 8 * Math.sin(angle - 0.4));
    ctx.lineTo(ex - 8 * Math.cos(angle + 0.4), ey - 8 * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();
    return true;
  }

  return false;
}


// ============================================================
// FRAME ELEMENTS
// ============================================================

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var MC = AnimRuntime.modeColors;
  var cx = W / 2, cy = H / 2;

  // ---------- Frame 0: Title ----------
  if (f === 0) {
    return [
      {id:'t0', type:'label', text:t('f0_main'), x:cx, y:cy - 70, color:P.primary, size:22, align:'center', glow:P.glow},
      {id:'f0', type:'label', text:t('f0_formula'), x:cx, y:cy - 30, color:P.secondary, size:15, align:'center', bold:true},
      {id:'s0', type:'label', text:t('f0_sub'), x:cx, y:cy + 20, color:MC.dim, size:13, align:'center'},
      {id:'k0', type:'label', text:t('f0_key'), x:cx, y:cy + 60, color:P.tertiary, size:12, align:'center'},
      // Balance scale icon (decorative)
      {id:'sc0', type:'line', x1:cx - 50, y1:cy + 100, x2:cx + 50, y2:cy + 100, color:MC.strokeDim, lineWidth:2},
      {id:'sc1', type:'line', x1:cx, y1:cy + 80, x2:cx, y2:cy + 100, color:MC.strokeDim, lineWidth:2},
      {id:'sc2', type:'line', x1:cx - 50, y1:cy + 95, x2:cx, y2:cy + 80, color:MC.strokeDim, lineWidth:1.5},
      {id:'sc3', type:'line', x1:cx + 50, y1:cy + 95, x2:cx, y2:cy + 80, color:MC.strokeDim, lineWidth:1.5},
      // Thrust label on left arm
      {id:'sc4', type:'label', text:'F', x:cx - 50, y:cy + 88, color:P.primary, size:10, align:'center'},
      // Weight label on right arm
      {id:'sc5', type:'label', text:'mg', x:cx + 50, y:cy + 88, color:P.error || '#ef4444', size:10, align:'center'},
    ];
  }

  // ---------- Frame 1: Seesaw Concept ----------
  if (f === 1) {
    var seesawCy = cy - 20;
    return [
      {id:'f1t', type:'label', text:t('f1_title'), x:cx, y:22, color:P.primary, size:14, align:'center'},
      // Left half: TWR < 1 (weight wins)
      {id:'ss1', type:'custom', kind:'seesaw', cx:W * 0.25, cy:seesawCy, beamW:180, tilt:0.7, alpha:1},
      {id:'lt1', type:'label', text:t('f1_lt1'), x:W * 0.25, y:seesawCy + 55, color:'#ef4444', size:10, align:'center'},
      {id:'st1', type:'label', text:t('f1_stay'), x:W * 0.25, y:seesawCy + 72, color:MC.mute, size:9, align:'center'},
      // Sad rocket (grounded)
      {id:'rk1', type:'custom', kind:'rocket_icon', rx:W * 0.25, ry:seesawCy - 70, rscale:0.9, rcolor:'#ef4444', flame:false, alpha:1},
      // Divider
      {id:'div1', type:'line', x1:cx, y1:40, x2:cx, y2:H - 20, color:MC.strokeDim, lineWidth:0.5, dash:[4,4]},
      // Right half: TWR > 1 (thrust wins)
      {id:'ss2', type:'custom', kind:'seesaw', cx:W * 0.75, cy:seesawCy, beamW:180, tilt:-0.7, alpha:1},
      {id:'gt1', type:'label', text:t('f1_gt1'), x:W * 0.75, y:seesawCy + 55, color:'#22c55e', size:10, align:'center'},
      {id:'fl1', type:'label', text:t('f1_fly'), x:W * 0.75, y:seesawCy + 72, color:MC.mute, size:9, align:'center'},
      // Happy rocket (flying with flame)
      {id:'rk2', type:'custom', kind:'rocket_icon', rx:W * 0.75, ry:seesawCy - 80, rscale:0.9, rcolor:'#22c55e', flame:true, alpha:1},
      // Bottom note
      {id:'nt1', type:'label', text:t('f1_note'), x:cx, y:H - 20, color:MC.mute, size:10, align:'center'},
    ];
  }

  // ---------- Frame 2: TWR Zones ----------
  if (f === 2) {
    var gaugeX = W * 0.3;
    var gaugeY = 50;
    var gaugeH = H - 100;
    return [
      {id:'f2t', type:'label', text:t('f2_title'), x:cx, y:22, color:P.primary, size:14, align:'center'},
      // Vertical gauge
      {id:'gauge', type:'custom', kind:'twr_gauge', gx:gaugeX, gy:gaugeY, gw:45, gh:gaugeH, alpha:1},
      // Rocket icons at each zone level
      // Red zone (TWR < 1): grounded rocket with X
      {id:'rz1', type:'custom', kind:'rocket_icon', rx:gaugeX + 150, ry:gaugeY + gaugeH * (1 - 0.5/8), rscale:0.7, rcolor:'#ef4444', flame:false, alpha:1},
      // Orange zone (1 < TWR < 3): wobbly rocket
      {id:'rz2', type:'custom', kind:'rocket_icon', rx:gaugeX + 150, ry:gaugeY + gaugeH * (1 - 2/8), rscale:0.7, rcolor:'#f97316', flame:true, alpha:1},
      // Yellow zone (3 < TWR < 5): stable rocket
      {id:'rz3', type:'custom', kind:'rocket_icon', rx:gaugeX + 185, ry:gaugeY + gaugeH * (1 - 4/8), rscale:0.7, rcolor:'#eab308', flame:true, alpha:1},
      // Green zone (TWR >= 5): fast rocket with checkmark
      {id:'rz4', type:'custom', kind:'rocket_icon', rx:gaugeX + 185, ry:gaugeY + gaugeH * (1 - 6.5/8), rscale:0.8, rcolor:'#22c55e', flame:true, alpha:1},
      // Engineering rule at bottom
      {id:'rule', type:'label', text:t('f2_rule'), x:cx, y:H - 18, color:P.tertiary, size:11, align:'center', bold:true},
    ];
  }

  // ---------- Frame 3: Engine x Rocket Matrix ----------
  if (f === 3) {
    var engines = [
      {name:'HT-0', thrust:3},
      {name:'HT-3', thrust:3},
      {name:'C5-0', thrust:5},
      {name:'C5-3', thrust:5},
    ];
    var masses = [
      {label:'200g', kg:0.2},
      {label:'300g', kg:0.3},
      {label:'400g', kg:0.4},
      {label:'500g', kg:0.5},
    ];
    var matrixX = cx - 200;
    var matrixY = 42;

    return [
      {id:'f3t', type:'label', text:t('f3_title'), x:cx, y:22, color:P.primary, size:14, align:'center'},
      {id:'grid', type:'custom', kind:'matrix_grid', mx:matrixX, my:matrixY, cellW:72, cellH:38,
        engines:engines, masses:masses, alpha:1},
      // Legend at bottom
      {id:'lg1', type:'box', x:matrixX + 30, y:H - 40, w:14, h:14, fill:'rgba(239,68,68,0.25)', stroke:'#ef4444'},
      {id:'lg1t', type:'label', text:t('f3_cant'), x:matrixX + 52, y:H - 33, color:'#ef4444', size:9, align:'left', bold:false},
      {id:'lg2', type:'box', x:matrixX + 130, y:H - 40, w:14, h:14, fill:'rgba(249,115,22,0.2)', stroke:'#f97316'},
      {id:'lg2t', type:'label', text:t('f3_ok'), x:matrixX + 152, y:H - 33, color:'#f97316', size:9, align:'left', bold:false},
      {id:'lg3', type:'box', x:matrixX + 220, y:H - 40, w:14, h:14, fill:'rgba(234,179,8,0.2)', stroke:'#eab308'},
      {id:'lg3t', type:'label', text:t('f3_good'), x:matrixX + 242, y:H - 33, color:'#eab308', size:9, align:'left', bold:false},
      {id:'lg4', type:'box', x:matrixX + 300, y:H - 40, w:14, h:14, fill:'rgba(34,197,94,0.2)', stroke:'#22c55e'},
      {id:'lg4t', type:'label', text:t('f3_great'), x:matrixX + 322, y:H - 33, color:'#22c55e', size:9, align:'left', bold:false},
    ];
  }

  // ---------- Frame 4: The Answer ----------
  if (f === 4) {
    var leftCol = W * 0.28;
    var rightCol = W * 0.72;
    var topY = 50;

    return [
      {id:'f4t', type:'label', text:t('f4_title'), x:cx, y:22, color:P.primary, size:14, align:'center'},
      // Left: the failing calculation
      {id:'f4c', type:'label', text:t('f4_calc'), x:leftCol, y:topY + 10, color:MC.text, size:12, align:'center'},
      // Big red X
      {id:'f4x', type:'custom', kind:'answer_panel', ax:leftCol, ay:topY + 60, alpha:1},
      {id:'f4f', type:'label', text:t('f4_fail'), x:leftCol, y:topY + 100, color:'#ef4444', size:16, align:'center', bold:true},
      // Grounded rocket
      {id:'f4rk', type:'custom', kind:'rocket_icon', rx:leftCol, ry:topY + 140, rscale:1.0, rcolor:'#ef4444', flame:false, alpha:1},

      // Arrow to solutions
      {id:'sa1', type:'custom', kind:'solution_arrow', sx:leftCol + 60, sy:topY + 100, ex:rightCol - 80, ey:topY + 30, arrowColor:P.primary, alpha:1},
      {id:'sa2', type:'custom', kind:'solution_arrow', sx:leftCol + 60, sy:topY + 120, ex:rightCol - 80, ey:topY + 130, arrowColor:P.tertiary, alpha:1},

      // Right: Solution 1 - Switch engine
      {id:'s1t', type:'label', text:t('f4_sol1'), x:rightCol, y:topY + 10, color:P.primary, size:11, align:'center'},
      {id:'s1v', type:'label', text:t('f4_sol1v'), x:rightCol, y:topY + 30, color:'#f97316', size:12, align:'center', bold:true},
      // Barely-OK rocket
      {id:'s1rk', type:'custom', kind:'rocket_icon', rx:rightCol + 80, ry:topY + 20, rscale:0.7, rcolor:'#f97316', flame:true, alpha:1},

      // Divider
      {id:'sdiv', type:'line', x1:rightCol - 70, y1:topY + 70, x2:rightCol + 70, y2:topY + 70, color:MC.strokeDim, lineWidth:0.5, dash:[3,3]},

      // Right: Solution 2 - Reduce mass
      {id:'s2t', type:'label', text:t('f4_sol2'), x:rightCol, y:topY + 100, color:P.tertiary, size:11, align:'center'},
      {id:'s2v', type:'label', text:t('f4_sol2v'), x:rightCol, y:topY + 120, color:'#22c55e', size:12, align:'center', bold:true},
      // Better rocket
      {id:'s2rk', type:'custom', kind:'rocket_icon', rx:rightCol + 80, ry:topY + 110, rscale:0.7, rcolor:'#22c55e', flame:true, alpha:1},

      // Bottom message
      {id:'f4tr', type:'label', text:t('f4_trade'), x:cx, y:H - 22, color:P.secondary, size:13, align:'center', bold:true},
    ];
  }

  return [];
}

// ============================================================
// BOOT
// ============================================================

AnimRuntime.boot();
</script>
<script>

(function () {
  if (window.__systemedu_resize_patched) return;
  window.__systemedu_resize_patched = true;

  const canvas =
    document.querySelector('canvas#c') ||
    document.querySelector('canvas');
  if (!canvas || !canvas.parentElement) return;
  let container = canvas.parentElement;

  try {
    const siblings = container.querySelectorAll('.controls, .hud, button');
    if (siblings.length > 0 && container.children.length > 1) {
      const host = document.createElement('div');
      host.style.cssText = 'flex:1;min-height:0;min-width:0;';
      container.insertBefore(host, canvas);
      host.appendChild(canvas);
      container = host;
    }
  } catch (e) {}

  try {
    const style = document.createElement('style');
    style.setAttribute('data-systemedu-resize-patch', '1');
    style.textContent =
      '.systemedu-canvas-host{position:relative!important;width:100%!important;min-width:0!important;min-height:0!important;overflow:hidden!important;}' +
      '.systemedu-canvas-host > canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;}' +
      '.lang-btn{top:auto!important;bottom:8px!important;left:8px!important;right:auto!important;' +
      'background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;' +
      'border:1px solid rgba(255,181,156,0.45)!important;box-shadow:none!important;opacity:0.75!important;z-index:50!important;}' +
      '.lang-btn:hover{opacity:1!important;background:rgba(20,20,35,0.7)!important;}' +
      '.guide-panel.systemedu-guide-collapsed{max-width:28px!important;max-height:28px!important;min-width:28px!important;min-height:28px!important;' +
      'padding:0!important;overflow:hidden!important;cursor:pointer!important;display:flex!important;align-items:center!important;justify-content:center!important;' +
      'border-radius:50%!important;background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;' +
      'border:1px solid rgba(56,189,248,0.55)!important;box-shadow:none!important;opacity:0.75!important;}' +
      '.guide-panel.systemedu-guide-collapsed:hover{opacity:1!important;background:rgba(20,20,35,0.7)!important;}' +
      '.guide-panel.systemedu-guide-collapsed > *{display:none!important;}' +
      '.guide-panel.systemedu-guide-collapsed::before{content:"?";color:#38bdf8;font-weight:700;font-size:14px;}' +
      '.guide-panel{max-width:min(220px,35vw)!important;z-index:50!important;}';
    document.head.appendChild(style);
    container.classList.add('systemedu-canvas-host');
  } catch (e) {}

  try {
    const guides = document.querySelectorAll('.guide-panel');
    guides.forEach(function (g) {
      g.classList.add('systemedu-guide-collapsed');
      g.setAttribute('title', '点击查看操作指南');
      g.addEventListener('click', function (e) {
        if (g.classList.contains('systemedu-guide-collapsed')) {
          g.classList.remove('systemedu-guide-collapsed');
          e.stopPropagation();
        } else {
          if (e.target === g) {
            g.classList.add('systemedu-guide-collapsed');
          }
        }
      });
    });
  } catch (e) {}

  const redraw = function () {
    try { if (typeof window.drawCurrent === 'function') { window.drawCurrent(); return; } } catch (e) {}
    try {
      if (typeof window.gotoFrame === 'function' &&
          typeof window.currentFrame !== 'undefined') {
        window.gotoFrame(window.currentFrame); return;
      }
    } catch (e) {}
    try { if (typeof window.draw === 'function') { window.draw(); return; } } catch (e) {}
    try { if (typeof window.render === 'function') { window.render(); return; } } catch (e) {}
  };

  let rafId = 0;
  let prevW = 0, prevH = 0;

  const enforceSizeConsistency = function () {
    const rect = canvas.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return false;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const targetW = Math.round(rect.width * dpr);
    const targetH = Math.round(rect.height * dpr);
    if (Math.abs(canvas.width - targetW) > 1 || Math.abs(canvas.height - targetH) > 1) {
      return true;
    }
    return false;
  };

  const callInternalResize = function () {
    try { if (typeof window.resize === 'function') { window.resize(); return true; } } catch (e) {}
    try { window.dispatchEvent(new Event('resize')); return true; } catch (e) {}
    return false;
  };

  const doResize = function () {
    callInternalResize();
    try {
      let guard = 0;
      while (enforceSizeConsistency() && guard < 3) {
        guard++;
        void canvas.offsetHeight;
        callInternalResize();
      }
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const tw = Math.round(rect.width * dpr);
      const th = Math.round(rect.height * dpr);
      if (rect.width >= 1 && rect.height >= 1 &&
          (Math.abs(canvas.width - tw) > 1 || Math.abs(canvas.height - th) > 1)) {
        canvas.width = tw;
        canvas.height = th;
        try {
          if (typeof window.W !== 'undefined') window.W = rect.width;
          if (typeof window.H !== 'undefined') window.H = rect.height;
        } catch (e) {}
        callInternalResize();
      }
    } catch (e) {}
    redraw();
  };

  const ro = new ResizeObserver(function (entries) {
    const entry = entries[0];
    if (!entry) return;
    const cr = entry.contentRect;
    const w = cr.width, h = cr.height;
    if (w < 1 || h < 1) return;
    if (Math.abs(w - prevW) < 1 && Math.abs(h - prevH) < 1) return;
    prevW = w; prevH = h;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(function () {
      rafId = 0;
      doResize();
    });
  });

  try { ro.observe(container); } catch (e) {}

  window.addEventListener('load', function () {
    setTimeout(function () { doResize(); }, 50);
  });
})();

</script>
