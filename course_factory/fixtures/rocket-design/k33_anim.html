<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* ── Main area: canvas + controls + hud ── */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, style switcher, title, guide -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<!-- Runtime (inlined) -->

  function lerp(a, b, p) { return a + (b - a) * p; }
  function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

  function _modeColors() {

  function _defaultDrawBg(c, w, h) {

    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);

    for (var x = 0; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
    for (var y = 0; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }

      c.beginPath(); c.moveTo(8, 8 + bLen); c.lineTo(8, 8); c.lineTo(8 + bLen, 8); c.stroke();
      c.beginPath(); c.moveTo(w - 8 - bLen, 8); c.lineTo(w - 8, 8); c.lineTo(w - 8, 8 + bLen); c.stroke();

    ctx.fill();
    // Flame (if el.flame)
    if (el.flame) {
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.moveTo(-6, 20);
      ctx.lineTo(0, 38);
      ctx.lineTo(6, 20);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.moveTo(-4, 22);
      ctx.lineTo(0, 32);
      ctx.lineTo(4, 22);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // Helper: draw ground line
  function drawGround(ctx, el) {
    ctx.strokeStyle = P.muted;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(el.x1, el.y);
    ctx.lineTo(el.x2, el.y);
    ctx.stroke();
    // Hash marks
    for (var i = el.x1; i < el.x2; i += 12) {
      ctx.beginPath();
      ctx.moveTo(i, el.y);
      ctx.lineTo(i - 4, el.y + 6);
      ctx.stroke();
    }
  }

  // Helper: draw bar chart segment for frame 4
  function drawDualBar(ctx, el) {
    var bx = el.x, by = el.y, bw = el.bw, maxH = el.maxH;
    var idealH = el.idealH, realH = el.realH;
    // Ideal bar (full, dimmer)
    ctx.fillStyle = P.primaryDim;
    ctx.globalAlpha = 0.35;
    ctx.fillRect(bx, by - idealH, bw, idealH);
    ctx.globalAlpha = 1;
    // Real bar (brighter)
    ctx.fillStyle = P.primary;
    ctx.fillRect(bx, by - realH, bw, realH);
    // Border
    ctx.strokeStyle = P.primary;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by - idealH, bw, idealH);
  }

  // ----- Frame 0: Title -----
  if (f === 0) {
    var lines = t('f0_question').split('\n');
    var els = [
      {id:'title0', type:'label', text:t('title'), x:cx, y:cy-90, color:P.primary, size:20, align:'center', glow:P.glowStrong},
      {id:'f0_rocket', type:'custom', x:cx+200, y:cy-20, scale:1.2, flame:true, draw:drawRocket, alpha:1},
    ];
    for (var i = 0; i < lines.length; i++) {
      els.push({id:'f0_l'+i, type:'label', text:lines[i], x:cx, y:cy-30+i*28, color:P.text, size:16, align:'center'});
    }
    els.push({id:'f0_tap', type:'text', text:t('f0_tap'), x:cx, y:cy+80, color:P.muted, size:11, align:'center'});
    els.push({id:'f0_q', type:'label', text:'?', x:cx+260, y:cy+40, color:P.primaryDim, size:48, align:'center', bold:true});
    return els;
  }

  // ----- Frame 1: Energy Conservation Concept -----
  if (f === 1) {
    var groundY = H - 60;
    return [
      {id:'f1_title', type:'label', text:t('f1_title'), x:cx, y:30, color:P.primary, size:16, align:'center'},
      // Left side: Thrust work
      {id:'f1_thrustBox', type:'box', x:cx-290, y:70, w:180, h:80, fill:'rgba(139,92,246,0.1)', stroke:P.primaryDim, lineWidth:1.5},
      {id:'f1_thrustLabel', type:'label', text:t('f1_thrust'), x:cx-200, y:90, color:P.primary, size:13, align:'center'},
      {id:'f1_eq1', type:'text', text:t('f1_eq1'), x:cx-200, y:115, color:P.text, size:11, align:'center'},
      {id:'f1_noteI', type:'text', text:t('f1_note'), x:cx-200, y:138, color:P.muted, size:9, align:'center'},
      // Arrow connecting
      {id:'f1_bigArrow', type:'arrow', x1:cx-100, y1:110, x2:cx+80, y2:110, color:P.primary, lineWidth:2.5, headSize:10},
      {id:'f1_arrowLabel', type:'label', text:t('f1_arrow_label'), x:cx-10, y:96, color:P.secondary, size:9, align:'center'},
      // Right side: Potential energy
      {id:'f1_peBox', type:'box', x:cx+90, y:70, w:180, h:80, fill:'rgba(139,92,246,0.1)', stroke:P.primaryDim, lineWidth:1.5},
      {id:'f1_peLabel', type:'label', text:t('f1_potential'), x:cx+180, y:90, color:P.primary, size:13, align:'center'},
      {id:'f1_eq2', type:'text', text:t('f1_eq2'), x:cx+180, y:115, color:P.text, size:11, align:'center'},
      {id:'f1_convert', type:'text', text:t('f1_convert'), x:cx+180, y:138, color:P.muted, size:9, align:'center'},
      // Rocket illustration
      {id:'f1_rocket', type:'custom', x:cx-200, y:groundY-40, scale:0.8, flame:true, draw:drawRocket, alpha:1},
      {id:'f1_ground', type:'custom', x1:cx-260, x2:cx-140, y:groundY, draw:drawGround, alpha:1},
      // Height arrow on right
      {id:'f1_hArrow', type:'arrow', x1:cx+180, y1:groundY, x2:cx+180, y2:groundY-120, color:P.secondary, lineWidth:2, headSize:8},
      {id:'f1_hLabel', type:'label', text:'h', x:cx+195, y:groundY-60, color:P.secondary, size:14, align:'left', bold:true},
      // Formula at bottom
      {id:'f1_formulaBox', type:'box', x:cx-130, y:H-50, w:260, h:30, stroke:P.primary, lineWidth:2},
      {id:'f1_formula', type:'label', text:t('f1_formula'), x:cx, y:H-35, color:P.primary, size:14, align:'center', bold:true},
    ];
  }

  // ----- Frame 2: Worked Example -----
  if (f === 2) {
    var stepX = cx - 120;
    return [
      {id:'f1_title', type:'label', text:t('f2_title'), x:cx, y:30, color:P.primary, size:16, align:'center'},
      // Given values
      {id:'f2_givenLabel', type:'label', text:t('f2_given'), x:stepX-30, y:70, color:P.secondary, size:13, align:'left', bold:true},
      {id:'f2_impulse', type:'text', text:t('f2_impulse'), x:stepX, y:95, color:P.text, size:12, align:'left'},
      {id:'f2_mass', type:'text', text:t('f2_mass'), x:stepX, y:115, color:P.text, size:12, align:'left'},
      {id:'f2_gravity', type:'text', text:t('f2_gravity'), x:stepX, y:135, color:P.text, size:12, align:'left'},
      // Divider
      {id:'f2_div', type:'line', x1:stepX-30, y1:155, x2:stepX+280, y2:155, color:P.primaryDim, lineWidth:1, dash:[6,4]},
      // Calculation steps
      {id:'f2_s1', type:'label', text:t('f2_step1'), x:stepX, y:180, color:P.text, size:13, align:'left'},
      {id:'f2_s2', type:'label', text:t('f2_step2'), x:stepX, y:210, color:P.text, size:13, align:'left'},
      // Result highlight
      {id:'f2_resultBox', type:'box', x:stepX-15, y:235, w:200, h:35, fill:'rgba(139,92,246,0.15)', stroke:P.primary, lineWidth:2},
      {id:'f2_result', type:'label', text:t('f2_result'), x:stepX+85, y:252, color:P.primary, size:18, align:'center', bold:true, glow:P.glowStrong},
      // Fun comparison
      {id:'f2_about', type:'text', text:t('f2_about'), x:stepX+85, y:285, color:P.secondary, size:12, align:'center'},
      // Rocket + height bar on right
      {id:'f2_rocket', type:'custom', x:cx+200, y:90, scale:0.7, flame:true, draw:drawRocket, alpha:1},
      {id:'f2_hBar', type:'gradient_box', x:cx+190, y:100, w:20, h:220, color1:P.primary, color2:P.primaryDim, glow:P.glow},
      {id:'f2_hTop', type:'label', text:'102 m', x:cx+210, y:90, color:P.primary, size:11, align:'left'},
      {id:'f2_hBot', type:'label', text:'0 m', x:cx+210, y:325, color:P.muted, size:10, align:'left'},
      {id:'f2_ground2', type:'custom', x1:cx+160, x2:cx+240, y:325, draw:drawGround, alpha:1},
    ];
  }

  // ----- Frame 3: 4x4 Matrix -----
  if (f === 3) {
    var els3 = [];
    els3.push({id:'f1_title', type:'label', text:t('f3_title'), x:cx, y:28, color:P.primary, size:16, align:'center'});

    var engines = [10, 20, 30, 40];
    var masses = [0.2, 0.3, 0.4, 0.5];
    var massLabels = ['200g', '300g', '400g', '500g'];
    var g = 9.8;

    // Grid layout
    var gridLeft = cx - 220;
    var gridTop = 65;
    var cellW = 95;
    var cellH = 55;
    var headerH = 30;
    var headerW = 60;

    // Column headers (engine impulse)
    els3.push({id:'f3_engLabel', type:'label', text:t('f3_engine'), x:gridLeft + headerW + (cellW * 2), y:gridTop + 6, color:P.secondary, size:10, align:'center'});
    for (var c = 0; c < 4; c++) {
      els3.push({id:'f3_ch'+c, type:'label', text:engines[c] + '', x:gridLeft + headerW + c * cellW + cellW/2, y:gridTop + headerH - 6, color:P.primary, size:12, align:'center', bold:true});
    }

    // Row headers (mass)
    els3.push({id:'f3_massLabel', type:'label', text:t('f3_mass_label'), x:gridLeft + headerW/2, y:gridTop + headerH + 8, color:P.secondary, size:10, align:'center'});

    for (var r = 0; r < 4; r++) {
      var rowY = gridTop + headerH + 10 + r * cellH;
      els3.push({id:'f3_rh'+r, type:'text', text:massLabels[r], x:gridLeft + 10, y:rowY + cellH/2, color:P.text, size:11, align:'left'});

      for (var cc = 0; cc < 4; cc++) {
        var altitude = engines[cc] / (masses[r] * g) * 10;
        var altRounded = Math.round(altitude);
        var maxAlt = engines[3] / (masses[0] * g) * 10; // max possible: 40/(0.2*9.8)*10
        var intensity = altitude / maxAlt;

        // Color interpolation: dim purple -> bright violet -> gold for highest
        var hue, sat, light;
        if (intensity < 0.5) {
          hue = 275; sat = 30 + intensity * 80; light = 20 + intensity * 40;
        } else {
          hue = 275 + (intensity - 0.5) * 40; sat = 70; light = 40 + (intensity - 0.5) * 30;
        }
        var cellFill = 'hsl(' + hue + ',' + sat + '%,' + light + '%)';

        var cellX = gridLeft + headerW + cc * cellW;
        var cellY = rowY;
        els3.push({id:'f3_cell_'+r+'_'+cc, type:'box', x:cellX, y:cellY, w:cellW-4, h:cellH-4, fill:cellFill, stroke:'rgba(139,92,246,0.3)', lineWidth:1});
        els3.push({id:'f3_val_'+r+'_'+cc, type:'label', text:altRounded + ' ' + t('f3_unit'), x:cellX + (cellW-4)/2, y:cellY + (cellH-4)/2, color:'#f0f0f0', size:12, align:'center', bold:true});
      }
    }

    // Annotation: highlight the 30 N*s / 300g cell
    var hlX = gridLeft + headerW + 2 * cellW;
    var hlY = gridTop + headerH + 10 + 1 * cellH;
    els3.push({id:'f3_highlight', type:'box', x:hlX-2, y:hlY-2, w:cellW, h:cellH, stroke:P.primary, lineWidth:2.5});

    return els3;
  }

  // ----- Frame 4: Air Resistance Correction -----
  if (f === 4) {
    var barBase = H - 70;
    var barMaxH = 230;
    var idealPx = barMaxH;
    var realLoPx = barMaxH * 0.5;
    var realHiPx = barMaxH * 0.7;
    var barW = 50;
    var barGap = 100;

    return [
      {id:'f1_title', type:'label', text:t('f4_title'), x:cx, y:30, color:P.primary, size:16, align:'center'},

      // Ideal bar
      {id:'f4_idealBar', type:'custom', x:cx-barGap, y:barBase, bw:barW, maxH:barMaxH, idealH:idealPx, realH:idealPx, draw:drawDualBar, alpha:1},
      {id:'f4_idealLabel', type:'label', text:t('f4_ideal'), x:cx-barGap+barW/2, y:barBase+18, color:P.muted, size:10, align:'center'},
      {id:'f4_idealTop', type:'label', text:'102 m', x:cx-barGap+barW/2, y:barBase-idealPx-12, color:P.text, size:12, align:'center', bold:true},

      // Arrow showing reduction
      {id:'f4_reduceArrow', type:'arrow', x1:cx-barGap+barW+15, y1:barBase-idealPx/2, x2:cx+barGap-15, y2:barBase-realHiPx/2-20, color:'#ef4444', lineWidth:2, headSize:8},
      {id:'f4_dragLabel', type:'label', text:t('f4_drag'), x:cx, y:barBase-idealPx/2-25, color:'#ef4444', size:11, align:'center', bold:true},
      {id:'f4_lostLabel', type:'text', text:t('f4_lost'), x:cx, y:barBase-idealPx/2-8, color:'#ef4444', size:9, align:'center'},

      // Real bar (shows range)
      {id:'f4_realBarLo', type:'custom', x:cx+barGap, y:barBase, bw:barW, maxH:barMaxH, idealH:realHiPx, realH:realLoPx, draw:drawDualBar, alpha:1},
      {id:'f4_realLabel', type:'label', text:t('f4_real'), x:cx+barGap+barW/2, y:barBase+18, color:P.muted, size:10, align:'center'},
      {id:'f4_realTop', type:'label', text:'51-71 m', x:cx+barGap+barW/2, y:barBase-realHiPx-12, color:P.primary, size:12, align:'center', bold:true},

      // Factor info
      {id:'f4_factorBox', type:'box', x:cx-130, y:barBase+35, w:260, h:28, stroke:P.primaryDim, lineWidth:1.5},
      {id:'f4_factor', type:'label', text:t('f4_factor'), x:cx, y:barBase+49, color:P.primary, size:12, align:'center'},

      // Explanation
      {id:'f4_whyLine1', type:'text', text:t('f4_why').split('\n')[0] || '', x:cx+200, y:cy-20, color:P.text, size:11, align:'center'},
      {id:'f4_whyLine2', type:'text', text:t('f4_why').split('\n')[1] || '', x:cx+200, y:cy+2, color:P.text, size:11, align:'center'},

      // Mini rocket with drag lines
      {id:'f4_rocket', type:'custom', x:cx+200, y:cy+55, scale:0.7, flame:true, draw:drawRocket, alpha:1},
      // Drag arrows pointing down
      {id:'f4_drag1', type:'arrow', x1:cx+185, y1:cy+35, x2:cx+185, y2:cy+55, color:'#ef4444', lineWidth:1.5, headSize:5},
      {id:'f4_drag2', type:'arrow', x1:cx+215, y1:cy+35, x2:cx+215, y2:cy+55, color:'#ef4444', lineWidth:1.5, headSize:5},
    ];
  }

  return [];
}

// ============================================================
// CUSTOM DRAW (dispatches custom draw functions)
// ============================================================
function customDrawElement(ctx, el, W, H) {
  if (typeof el.draw === 'function') {
    el.draw(ctx, el);
    return true;
  }
  return false;
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
</body>
</html>
