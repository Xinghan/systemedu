<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

// ============================================================
// CUSTOM BACKGROUND -- space theme with stars and nebula
// ============================================================
var _stars = [];
for (var si = 0; si < 120; si++) {
  _stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.2 + 0.3, b: Math.random() * 0.5 + 0.5 });
}

function drawBg(ctx, W, H, mode) {
  var mc = AnimRuntime.modeColors;
  // Background gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < _stars.length; i++) {
    var s = _stars[i];
    var blink = 0.4 + 0.6 * Math.abs(Math.sin(Date.now() * 0.001 + i * 2.1));
    ctx.globalAlpha = s.b * blink * (mode === 'light' ? 0.15 : 0.7);
    ctx.fillStyle = mode === 'light' ? '#334155' : '#e2e8f0';
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Purple nebula glow
  if (mode !== 'light') {
    var ng = ctx.createRadialGradient(W * 0.3, H * 0.35, 0, W * 0.3, H * 0.35, W * 0.45);
    ng.addColorStop(0, 'rgba(167,139,250,0.08)');
    ng.addColorStop(0.5, 'rgba(167,139,250,0.03)');
    ng.addColorStop(1, 'transparent');
    ctx.fillStyle = ng; ctx.fillRect(0, 0, W, H);

    var ng2 = ctx.createRadialGradient(W * 0.75, H * 0.6, 0, W * 0.75, H * 0.6, W * 0.35);
    ng2.addColorStop(0, 'rgba(139,92,246,0.06)');
    ng2.addColorStop(1, 'transparent');
    ctx.fillStyle = ng2; ctx.fillRect(0, 0, W, H);
  }

  // Grid
  if (mode === 'light') {
    ctx.strokeStyle = 'rgba(15,23,42,0.04)'; ctx.lineWidth = 0.5;
    for (var x = 0; x < W; x += 24) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (var y = 0; y < H; y += 24) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    ctx.strokeStyle = 'rgba(15,23,42,0.2)'; ctx.lineWidth = 0.5;
    ctx.strokeRect(6, 6, W - 12, H - 12);
  }

  // Top accent line (dark mode)
  if (mc.topLine) {
    var tg = ctx.createLinearGradient(W * 0.15, 0, W * 0.85, 0);
    tg.addColorStop(0, 'transparent'); tg.addColorStop(0.4, '#a78bfa'); tg.addColorStop(0.6, '#a78bfa'); tg.addColorStop(1, 'transparent');
    ctx.strokeStyle = tg; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, 0.5); ctx.lineTo(W, 0.5); ctx.stroke();
  }

  // Scanlines (cyberpunk)
  if (mc.scanlines) {
    ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1;
    for (var sy = 0; sy < H; sy += 3) { ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke(); }
  }

  // Corner brackets (cyberpunk)
  if (mc.cornerBrackets) {
    var bLen = Math.min(W, H) * 0.06;
    ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(8, 8 + bLen); ctx.lineTo(8, 8); ctx.lineTo(8 + bLen, 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - 8 - bLen, 8); ctx.lineTo(W - 8, 8); ctx.lineTo(W - 8, 8 + bLen); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, H - 8 - bLen); ctx.lineTo(8, H - 8); ctx.lineTo(8 + bLen, H - 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - 8 - bLen, H - 8); ctx.lineTo(W - 8, H - 8); ctx.lineTo(W - 8, H - 8 + bLen); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// CUSTOM DRAW ELEMENT -- paper plane, ruler, stopwatch, table, icons
// ============================================================
function customDrawElement(ctx, el, W, H) {
  if (el.type === 'plane') {
    // Draw a paper airplane
    ctx.save();
    ctx.translate(el.x, el.y);
    ctx.rotate((el.angle || 0) * Math.PI / 180);
    var sc = el.scale || 1;
    ctx.scale(sc, sc);
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(-12, -8);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-12, 8);
    ctx.closePath();
    ctx.fillStyle = el.color || '#a78bfa';
    ctx.fill();
    ctx.strokeStyle = el.stroke || 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Fold line
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(-6, 0);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
    return true;
  }

  if (el.type === 'stopwatch') {
    ctx.save();
    var cx = el.x, cy = el.y, r = el.r || 28;
    // Outer ring
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = el.fill || 'rgba(167,139,250,0.15)';
    ctx.fill();
    ctx.strokeStyle = el.ringColor || '#a78bfa';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Button on top
    ctx.beginPath();
    ctx.moveTo(cx - 4, cy - r - 2);
    ctx.lineTo(cx + 4, cy - r - 2);
    ctx.lineTo(cx + 4, cy - r - 8);
    ctx.lineTo(cx - 4, cy - r - 8);
    ctx.closePath();
    ctx.fillStyle = el.ringColor || '#a78bfa';
    ctx.fill();
    // Inner tick marks
    for (var ti = 0; ti < 12; ti++) {
      var a = (ti / 12) * Math.PI * 2 - Math.PI / 2;
      var inner = r - 5, outer = r - 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
      ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    // Hand
    if (el.handAngle !== undefined) {
      var ha = (el.handAngle / 60) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(ha) * (r - 8), cy + Math.sin(ha) * (r - 8));
      ctx.strokeStyle = '#fbbf24';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    // Center dot
    ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#fbbf24'; ctx.fill();
    // Time text
    if (el.timeText) {
      ctx.font = "bold 11px 'JetBrains Mono',monospace";
      ctx.fillStyle = '#a78bfa';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(el.timeText, cx, cy + r + 6);
    }
    ctx.restore();
    return true;
  }

  if (el.type === 'dataTable') {
    ctx.save();
    var tx = el.x, ty = el.y, tw = el.tw || 280, rh = el.rowH || 22;
    var cols = el.cols || [];
    var rows = el.rows || [];
    var colW = tw / cols.length;
    var mc = AnimRuntime.modeColors;

    // Header background
    ctx.fillStyle = el.headerBg || 'rgba(167,139,250,0.2)';
    ctx.fillRect(tx, ty, tw, rh);
    ctx.strokeStyle = el.borderColor || '#a78bfa';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, ty, tw, rh);

    // Header text
    ctx.font = "bold 10px 'JetBrains Mono',monospace";
    ctx.fillStyle = el.headerColor || '#a78bfa';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (var ci = 0; ci < cols.length; ci++) {
      ctx.fillText(cols[ci], tx + colW * ci + colW / 2, ty + rh / 2);
    }

    // Rows
    for (var ri = 0; ri < rows.length; ri++) {
      var ry = ty + rh * (ri + 1);
      var isAvg = rows[ri].isAvg;
      ctx.fillStyle = isAvg ? 'rgba(167,139,250,0.12)' : (ri % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.01)');
      ctx.fillRect(tx, ry, tw, rh);
      ctx.strokeStyle = 'rgba(167,139,250,0.15)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(tx, ry, tw, rh);

      ctx.font = isAvg ? "bold 10px 'JetBrains Mono',monospace" : "10px 'JetBrains Mono',monospace";
      ctx.fillStyle = isAvg ? '#fbbf24' : (mc.text || '#e2e8f0');
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var vals = rows[ri].vals || [];
      for (var vi = 0; vi < vals.length; vi++) {
        ctx.fillText(vals[vi], tx + colW * vi + colW / 2, ry + rh / 2);
      }
    }

    // Column separators
    ctx.strokeStyle = 'rgba(167,139,250,0.1)';
    ctx.lineWidth = 0.5;
    for (var si = 1; si < cols.length; si++) {
      ctx.beginPath();
      ctx.moveTo(tx + colW * si, ty);
      ctx.lineTo(tx + colW * si, ty + rh * (rows.length + 1));
      ctx.stroke();
    }
    ctx.restore();
    return true;
  }

  if (el.type === 'icon_pin') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(el.x, el.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = el.color || '#a78bfa';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Stem
    ctx.beginPath();
    ctx.moveTo(el.x, el.y + 5);
    ctx.lineTo(el.x, el.y + 14);
    ctx.strokeStyle = el.color || '#a78bfa';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
    return true;
  }

  if (el.type === 'ruler') {
    ctx.save();
    var rx = el.x1, ry = el.y1, rx2 = el.x2;
    var rw = rx2 - rx;
    // Ruler body
    ctx.fillStyle = el.fill || 'rgba(251,191,36,0.15)';
    ctx.fillRect(rx, ry - 6, rw, 12);
    ctx.strokeStyle = el.color || '#fbbf24';
    ctx.lineWidth = 1;
    ctx.strokeRect(rx, ry - 6, rw, 12);
    // Tick marks
    var tickCount = Math.floor(rw / 15);
    for (var ti = 0; ti <= tickCount; ti++) {
      var tx2 = rx + (ti / tickCount) * rw;
      var th = (ti % 5 === 0) ? 5 : 3;
      ctx.beginPath();
      ctx.moveTo(tx2, ry - th);
      ctx.lineTo(tx2, ry + th);
      ctx.strokeStyle = el.color || '#fbbf24';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.restore();
    return true;
  }

  if (el.type === 'varIcon') {
    ctx.save();
    var vx = el.x, vy = el.y, vr = el.r || 14;
    // Circle
    ctx.beginPath(); ctx.arc(vx, vy, vr, 0, Math.PI * 2);
    ctx.fillStyle = el.fill || 'rgba(167,139,250,0.2)';
    ctx.fill();
    ctx.strokeStyle = el.borderColor || '#a78bfa';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Icon symbol
    ctx.font = "bold " + (el.iconSize || 14) + "px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillStyle = el.iconColor || '#a78bfa';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(el.icon || '?', vx, vy + 1);
    ctx.restore();
    return true;
  }

  if (el.type === 'questionMark') {
    ctx.save();
    ctx.font = "bold " + (el.size || 24) + "px 'Space Grotesk',sans-serif";
    ctx.fillStyle = el.color || '#fbbf24';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var bob = Math.sin(Date.now() * 0.003 + (el.phase || 0)) * 4;
    ctx.fillText('?', el.x, el.y + bob);
    ctx.restore();
    return true;
  }

  return false;
}

    return [
      {id:'title0', type:'label', text:t('f0title'), x:cx, y:cy - 50, color:P.primary, size:22, align:'center', glow:P.glowStrong},

      {id:'q1b', type:'questionMark', x:cx + 50, y:cy - 60, size:20, color:'#a78bfa', phase:1.5, alpha:1},

      {id:'f1science', type:'label', text:t('f1sci'), x:cx, y:cy + 100, color:P.tertiary, size:14, align:'center', glow:'rgba(251,191,36,0.3)'},
      // VS divider
      {id:'vs', type:'label', text:'VS', x:cx, y:cy - 20, color:'rgba(255,255,255,0.3)', size:20, align:'center', bold:true},
    ];
  }

  // ----- Frame 2: Measuring Distance -----
  if (f === 2) {
    var groundY = cy + 60;
    return [
      {id:'title2', type:'label', text:t('f2title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      // Ground line
      {id:'ground', type:'line', x1:40, y1:groundY, x2:W - 40, y2:groundY, color:'rgba(167,139,250,0.3)', lineWidth:1, dash:[4,4], alpha:1},
      // Launch point
      {id:'launchPin', type:'icon_pin', x:120, y:groundY, color:'#22c55e', alpha:1},
      {id:'launchLabel', type:'text', text:t('f2launch'), x:120, y:groundY + 22, color:'#22c55e', size:9, align:'center'},
      // Landing point
      {id:'landPin', type:'icon_pin', x:W - 160, y:groundY, color:'#ef4444', alpha:1},
      {id:'landLabel', type:'text', text:t('f2land'), x:W - 160, y:groundY + 22, color:'#ef4444', size:9, align:'center'},
      // Ruler between points
      {id:'ruler2', type:'ruler', x1:120, y1:groundY - 20, x2:W - 160, color:'#fbbf24', fill:'rgba(251,191,36,0.08)', alpha:1},
      // Distance label
      {id:'distLabel', type:'label', text:t('f2dist'), x:cx, y:groundY - 36, color:'#fbbf24', size:14, align:'center', glow:'rgba(251,191,36,0.3)'},
      // Dotted measurement line
      {id:'measLine', type:'line', x1:120, y1:groundY - 8, x2:W - 160, y2:groundY - 8, color:'rgba(251,191,36,0.5)', lineWidth:1, dash:[6,3], alpha:1},
      // Paper plane in flight arc
      {id:'plane2', type:'plane', x:cx - 30, y:cy - 30, angle:-25, scale:1.4, color:'#a78bfa', alpha:1},
      // Flight arc (dotted)
      {id:'arc2a', type:'line', x1:130, y1:groundY - 15, x2:cx - 50, y2:cy - 50, color:'rgba(167,139,250,0.2)', lineWidth:1, dash:[3,3], alpha:0.6},
      {id:'arc2b', type:'line', x1:cx - 50, y1:cy - 50, x2:W - 170, y2:groundY - 15, color:'rgba(167,139,250,0.2)', lineWidth:1, dash:[3,3], alpha:0.6},
      // Steps
      {id:'step1', type:'text', text:t('f2step1'), x:40, y:cy - 65, color:P.text, size:10, align:'left'},
      {id:'step2', type:'text', text:t('f2step2'), x:40, y:cy - 48, color:P.text, size:10, align:'left'},
      {id:'step3', type:'text', text:t('f2step3'), x:40, y:cy - 31, color:P.text, size:10, align:'left'},
    ];
  }

  // ----- Frame 3: Measuring Time -----
  if (f === 3) {
    return [
      {id:'title3', type:'label', text:t('f3title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'desc3', type:'text', text:t('f3desc'), x:cx, y:55, color:P.muted, size:10, align:'center'},
      // Stopwatch
      {id:'sw3', type:'stopwatch', x:cx, y:cy - 10, r:40, fill:'rgba(167,139,250,0.1)', ringColor:'#a78bfa', handAngle:32, timeText:t('f3sw'), alpha:1},
      // Trial results
      {id:'t3r1', type:'label', text:t('f3t1'), x:cx - 140, y:cy + 60, color:P.text, size:12, align:'center', bold:false},
      {id:'t3r2', type:'label', text:t('f3t2'), x:cx, y:cy + 60, color:P.text, size:12, align:'center', bold:false},
      {id:'t3r3', type:'label', text:t('f3t3'), x:cx + 140, y:cy + 60, color:P.text, size:12, align:'center', bold:false},
      // Connector lines
      {id:'t3c1', type:'line', x1:cx - 140, y1:cy + 48, x2:cx - 140, y2:cy + 53, color:'rgba(167,139,250,0.3)', lineWidth:1, alpha:1},
      {id:'t3c2', type:'line', x1:cx, y1:cy + 48, x2:cx, y2:cy + 53, color:'rgba(167,139,250,0.3)', lineWidth:1, alpha:1},
      {id:'t3c3', type:'line', x1:cx + 140, y1:cy + 48, x2:cx + 140, y2:cy + 53, color:'rgba(167,139,250,0.3)', lineWidth:1, alpha:1},
      // Average result
      {id:'avgLine3', type:'line', x1:cx - 180, y1:cy + 82, x2:cx + 180, y2:cy + 82, color:'rgba(251,191,36,0.3)', lineWidth:1, alpha:1},
      {id:'avg3', type:'label', text:t('f3avg'), x:cx, y:cy + 100, color:'#fbbf24', size:14, align:'center', glow:'rgba(251,191,36,0.3)'},
      // Why multiple trials
      {id:'why3', type:'text', text:t('f3why'), x:cx, y:cy + 125, color:P.tertiary, size:11, align:'center'},
      // Small planes showing 3 launches
      {id:'p3a', type:'plane', x:cx - 150, y:cy + 30, angle:-15, scale:0.8, color:'#a78bfa', alpha:0.5},
      {id:'p3b', type:'plane', x:cx, y:cy + 30, angle:-20, scale:0.8, color:'#a78bfa', alpha:0.5},
      {id:'p3c', type:'plane', x:cx + 150, y:cy + 30, angle:-12, scale:0.8, color:'#a78bfa', alpha:0.5},
    ];
  }

  // ----- Frame 4: Data Table -----
  if (f === 4) {
    var tableW = 260;
    var tableX = cx - tableW / 2;
    var tableY = 70;
    return [
      {id:'title4', type:'label', text:t('f4title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'table4', type:'dataTable', x:tableX, y:tableY, tw:tableW, rowH:24,
        cols:[t('f4trial'), t('f4dist'), t('f4time')],
        rows:[
          {vals:['1', '7.8', '2.1']},
          {vals:['2', '8.3', '2.4']},
          {vals:['3', '8.9', '1.9']},
          {vals:[t('f4avgL'), '8.33', '2.13'], isAvg:true},
        ],
        headerBg:'rgba(167,139,250,0.2)', headerColor:'#a78bfa',
        borderColor:'#a78bfa', alpha:1},
      // Highlight note
      {id:'note4', type:'text', text:t('f4note'), x:cx, y:tableY + 24 * 5 + 18, color:P.tertiary, size:11, align:'center'},
      // Mini bar chart to the right
      {id:'bar4bg', type:'box', x:cx + 160, y:tableY + 10, w:120, h:100, fill:'rgba(167,139,250,0.05)', stroke:'rgba(167,139,250,0.15)', lineWidth:0.5, alpha:1},
      {id:'bar4a', type:'gradient_box', x:cx + 175, y:tableY + 70, w:22, h:40, color1:'#a78bfa', color2:'rgba(167,139,250,0.5)', glow:'rgba(167,139,250,0.2)', alpha:1},
      {id:'bar4b', type:'gradient_box', x:cx + 207, y:tableY + 55, w:22, h:55, color1:'#a78bfa', color2:'rgba(167,139,250,0.5)', glow:'rgba(167,139,250,0.2)', alpha:1},
      {id:'bar4c', type:'gradient_box', x:cx + 239, y:tableY + 40, w:22, h:70, color1:'#fbbf24', color2:'rgba(251,191,36,0.5)', glow:'rgba(251,191,36,0.2)', alpha:1},
      // Bar labels
      {id:'bar4l1', type:'text', text:'7.8', x:cx + 186, y:tableY + 68, color:P.muted, size:8, align:'center'},
      {id:'bar4l2', type:'text', text:'8.3', x:cx + 218, y:tableY + 53, color:P.muted, size:8, align:'center'},
      {id:'bar4l3', type:'text', text:'8.9', x:cx + 250, y:tableY + 38, color:'#fbbf24', size:8, align:'center'},
      // Arrow pointing to average
      {id:'avgArrow4', type:'arrow', x1:cx + 155, y1:tableY + 24 * 4 + 12, x2:cx + 140, y2:tableY + 24 * 4 + 12, color:'#fbbf24', lineWidth:1, headSize:5, alpha:1},
    ];
  }

  // ----- Frame 5: Fair Test -----
  if (f === 5) {
    var ctrlX = cx - 140;
    var measX = cx + 100;
    var startY = 80;
    return [
      {id:'title5', type:'label', text:t('f5title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      // Controlled variables column
      {id:'ctrlHeader', type:'label', text:t('f5ctrl'), x:ctrlX, y:startY, color:'#22c55e', size:12, align:'center'},
      {id:'ctrlLine', type:'line', x1:ctrlX - 80, y1:startY + 12, x2:ctrlX + 80, y2:startY + 12, color:'rgba(34,197,94,0.3)', lineWidth:1, alpha:1},
      // Controlled variable icons
      {id:'v5c1', type:'varIcon', x:ctrlX - 50, y:startY + 50, r:16, fill:'rgba(34,197,94,0.1)', borderColor:'#22c55e', icon:'\u2316', iconColor:'#22c55e', iconSize:14, alpha:1},
      {id:'v5c1t', type:'text', text:t('f5c1'), x:ctrlX - 50, y:startY + 75, color:P.text, size:10, align:'center'},
      {id:'v5c2', type:'varIcon', x:ctrlX, y:startY + 50, r:16, fill:'rgba(34,197,94,0.1)', borderColor:'#22c55e', icon:'\u2195', iconColor:'#22c55e', iconSize:14, alpha:1},
      {id:'v5c2t', type:'text', text:t('f5c2'), x:ctrlX, y:startY + 75, color:P.text, size:10, align:'center'},
      {id:'v5c3', type:'varIcon', x:ctrlX + 50, y:startY + 50, r:16, fill:'rgba(34,197,94,0.1)', borderColor:'#22c55e', icon:'\u2192', iconColor:'#22c55e', iconSize:14, alpha:1},
      {id:'v5c3t', type:'text', text:t('f5c3'), x:ctrlX + 50, y:startY + 75, color:P.text, size:10, align:'center'},
      // Lock icons (=) for controlled
      {id:'lock1', type:'text', text:'=', x:ctrlX - 50, y:startY + 95, color:'rgba(34,197,94,0.5)', size:14, align:'center'},
      {id:'lock2', type:'text', text:'=', x:ctrlX, y:startY + 95, color:'rgba(34,197,94,0.5)', size:14, align:'center'},
      {id:'lock3', type:'text', text:'=', x:ctrlX + 50, y:startY + 95, color:'rgba(34,197,94,0.5)', size:14, align:'center'},
      // Measured variables column
      {id:'measHeader', type:'label', text:t('f5meas'), x:measX, y:startY, color:'#fbbf24', size:12, align:'center'},
      {id:'measLine', type:'line', x1:measX - 80, y1:startY + 12, x2:measX + 80, y2:startY + 12, color:'rgba(251,191,36,0.3)', lineWidth:1, alpha:1},
      {id:'v5m1', type:'varIcon', x:measX - 30, y:startY + 50, r:16, fill:'rgba(251,191,36,0.1)', borderColor:'#fbbf24', icon:'m', iconColor:'#fbbf24', iconSize:12, alpha:1},
      {id:'v5m1t', type:'text', text:t('f5m1'), x:measX - 30, y:startY + 75, color:P.text, size:10, align:'center'},
      {id:'v5m2', type:'varIcon', x:measX + 30, y:startY + 50, r:16, fill:'rgba(251,191,36,0.1)', borderColor:'#fbbf24', icon:'s', iconColor:'#fbbf24', iconSize:12, alpha:1},
      {id:'v5m2t', type:'text', text:t('f5m2'), x:measX + 30, y:startY + 75, color:P.text, size:10, align:'center'},
      // Divider
      {id:'divider5', type:'line', x1:cx - 10, y1:startY + 20, x2:cx - 10, y2:startY + 100, color:'rgba(255,255,255,0.1)', lineWidth:1, dash:[4,4], alpha:1},
      // Bottom message
      {id:'why5', type:'label', text:t('f5why'), x:cx, y:startY + 135, color:P.tertiary, size:13, align:'center', glow:'rgba(251,191,36,0.2)'},
      // Two planes side by side at bottom
      {id:'plane5a', type:'plane', x:cx - 50, y:startY + 170, angle:-15, scale:1.2, color:'#a78bfa', alpha:0.7},
      {id:'plane5b', type:'plane', x:cx + 50, y:startY + 170, angle:-15, scale:1.2, color:'#fbbf24', alpha:0.7},
      {id:'arrow5', type:'arrow', x1:cx - 20, y1:startY + 170, x2:cx + 20, y2:startY + 170, color:'rgba(255,255,255,0.2)', lineWidth:1, headSize:4, alpha:0.5},
    ];
  }

  return [];
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
