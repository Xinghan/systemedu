<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;background:#07101a;color:#eef6ff;font-family:Helvetica,'Noto Sans SC',sans-serif}.wrap{min-height:100vh;padding:26px;background:radial-gradient(circle at 80% 0,rgba(78,214,255,.16),transparent 35%),linear-gradient(135deg,#07101a,#121827)}h1{font-size:22px;color:#4ed6ff;margin:0 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}article{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);padding:16px;min-height:120px}b{display:block;color:#ffd166;margin-bottom:10px}p{margin:0;line-height:1.55;color:rgba(255,255,255,.76)}.arrow{text-align:center;color:#4ed6ff;font-size:30px;margin:14px 0}</style></head><body><main class="wrap"><h1>风洞里的 v1 到 v2 外形迭代：静态决策图</h1><div class="grid"><article><b>观察现象</b><p>把“太重、太粗、难做”写成具体证据。</p></article><article><b>深层原因</b><p>判断来自阻力、稳定、质量还是工艺。</p></article><article><b>量化目标</b><p>写当前值、目标值和测量方法。</p></article><article><b>三平衡检查</b><p>每个目标至少检查两个维度的副作用。</p></article></div><div class="arrow">检查顺序：观察 → 估算 → 测试 → 记录 → 修订</div></main></body></html>
