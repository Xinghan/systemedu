<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">SPACE DETECTIVE</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="checkBtn">CHECK</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <span class="hud-tag" id="hudTag">SPACE DETECTIVE</span>
      <div class="hud-item"><div class="hud-label" id="hudL1">PHASE</div><div class="hud-val" id="hudV1">1</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">MATCHED</div><div class="hud-val" id="hudV2">0/15</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">SCORE</div><div class="hud-val" id="hudV3">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">--</span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  if (GAME_MODE === 'cyberpunk') {
    g.addColorStop(0, 'oklch(0.10 0.04 280)'); g.addColorStop(1, 'oklch(0.20 0.10 290)');
  } else {
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  }
  c.fillStyle = g; c.fillRect(0,0,w,h);
  // Grid
  var gc2 = mc.grid || 'rgba(167,139,250,0.06)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // Stars (dark/cyber only)
  if (GAME_MODE !== 'light') {
    var now = Date.now() * 0.001;
    for (var si = 0; si < GAME_STARS.length; si++) {
      var st = GAME_STARS[si];
      c.globalAlpha = 0.2 + 0.4 * Math.abs(Math.sin(now * 0.6 + st.p));
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(st.x * w, st.y * h, st.r, 0, Math.PI*2); c.fill();
    }
    c.globalAlpha = 1;
  }
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', 'oklch(0.52 0.16 295)');
  r.style.setProperty('--glow-strong', 'oklch(0.72 0.17 295 / 0.25)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:    {en:'SPACE DETECTIVE', cn:'\u822a\u5929\u53f2\u4fa6\u63a2'},
  sub:      {en:'Match clues to stories, then sort by time', cn:'\u5c06\u7ebf\u7d22\u5339\u914d\u5230\u6545\u4e8b\uff0c\u518d\u6309\u65f6\u95f4\u6392\u5e8f'},
  guide1:   {en:'Phase 1: Drag clue cards to the correct story slot', cn:'\u7b2c\u4e00\u9636\u6bb5\uff1a\u62d6\u62fd\u7ebf\u7d22\u5361\u5230\u6b63\u786e\u7684\u6545\u4e8b\u69fd\u4f4d'},
  guide2:   {en:'Phase 2: Sort stories by time order', cn:'\u7b2c\u4e8c\u9636\u6bb5\uff1a\u628a\u6545\u4e8b\u6309\u65f6\u95f4\u987a\u5e8f\u6392\u5217'},
  guide3:   {en:'Correct = particle burst! Wrong = shake!', cn:'\u6b63\u786e = \u7c92\u5b50\u7206\u53d1\uff01\u9519\u8bef = \u5c4f\u5e55\u6296\u52a8\uff01'},
  phase:    {en:'PHASE', cn:'\u9636\u6bb5'},
  matched:  {en:'MATCHED', cn:'\u5339\u914d'},
  score:    {en:'SCORE', cn:'\u5f97\u5206'},
  statusIdle:   {en:'DRAG CLUES TO SLOTS', cn:'\u62d6\u62fd\u7ebf\u7d22\u5230\u69fd\u4f4d'},
  statusSort:   {en:'DRAG TO REORDER BY TIME', cn:'\u62d6\u62fd\u6392\u5e8f\uff08\u6309\u65f6\u95f4\uff09'},
  statusDone:   {en:'ALL COMPLETE!', cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  check:    {en:'CHECK', cn:'\u68c0\u67e5'},
  reset:    {en:'RESET', cn:'\u91cd\u7f6e'},
  correct:  {en:'CORRECT!', cn:'\u6b63\u786e\uff01'},
  wrong:    {en:'TRY AGAIN', cn:'\u518d\u8bd5\u8bd5'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('guideText').innerHTML = '<ul style="padding-left:14px;margin:0"><li>' + t('guide1') + '</li><li>' + t('guide2') + '</li><li>' + t('guide3') + '</li></ul>';
  document.getElementById('guideLabel').textContent = LANG === 'cn' ? '\u64cd\u4f5c\u6307\u5357' : 'GUIDE';
  document.getElementById('hudL1').textContent = t('phase');
  document.getElementById('hudL2').textContent = t('matched');
  document.getElementById('hudL3').textContent = t('score');
  document.getElementById('checkBtn').textContent = t('check');
  document.getElementById('resetBtn').textContent = t('reset');
  updateHUD();
}

// ================================================================
// Stars (pre-generated)
// ================================================================
var GAME_STARS = [];
(function(){
  var s = 77;
  function rng(){ s = (s * 16807) % 2147483647; return (s-1)/2147483646; }
  for(var i=0;i<28;i++) GAME_STARS.push({x:rng(),y:rng(),r:0.3+rng()*1,p:rng()*6.28});
})();

// ================================================================
// Game data
// ================================================================
var STORIES = [
  {id:0, nameEn:'Wan Hu',      nameCn:'\u4e07\u6237',       year:'~1500', order:0, color:'#f59e0b'},
  {id:1, nameEn:'Gagarin',     nameCn:'\u52a0\u52a0\u6797', year:'1961',  order:1, color:'#3b82f6'},
  {id:2, nameEn:'Apollo 11',   nameCn:'\u963f\u6ce2\u7f5711',year:'1969', order:2, color:'#e5e5e5'},
  {id:3, nameEn:"Chang'e-4",   nameCn:'\u5ae6\u5a25\u56db\u53f7',year:'2019',order:3, color:'#ef4444'},
  {id:4, nameEn:'Zhurong',     nameCn:'\u795d\u878d\u53f7', year:'2021',  order:4, color:'#f97316'},
];

// 15 clue cards (3 per story: time, place, event)
var CLUES = [
  // Wan Hu

  {storyId:0, typeEn:'EVENT', typeCn:'\u4e8b\u4ef6', textEn:'47 rockets on a chair',  textCn:'47\u652f\u706b\u7bad\u7ed1\u6905\u5b50'},
  // Gagarin
  {storyId:1, typeEn:'TIME',  typeCn:'\u65f6\u95f4', textEn:'April 12, 1961',         textCn:'1961\u5e744\u670812\u65e5'},
  {storyId:1, typeEn:'PLACE', typeCn:'\u5730\u70b9', textEn:'Earth orbit (USSR)',      textCn:'\u5730\u7403\u8f68\u9053\uff08\u82cf\u8054\uff09'},
  {storyId:1, typeEn:'EVENT', typeCn:'\u4e8b\u4ef6', textEn:'"Earth is blue!"',       textCn:'"\u5730\u7403\u662f\u84dd\u8272\u7684\uff01"'},
  // Apollo 11
  {storyId:2, typeEn:'TIME',  typeCn:'\u65f6\u95f4', textEn:'July 20, 1969',          textCn:'1969\u5e747\u670820\u65e5'},
  {storyId:2, typeEn:'PLACE', typeCn:'\u5730\u70b9', textEn:'Moon surface (USA)',      textCn:'\u6708\u7403\u8868\u9762\uff08\u7f8e\u56fd\uff09'},
  {storyId:2, typeEn:'EVENT', typeCn:'\u4e8b\u4ef6', textEn:'First Moon footprint',   textCn:'\u6708\u7403\u7b2c\u4e00\u4e2a\u811a\u5370'},
  // Chang'e-4
  {storyId:3, typeEn:'TIME',  typeCn:'\u65f6\u95f4', textEn:'January 3, 2019',        textCn:'2019\u5e741\u67083\u65e5'},
  {storyId:3, typeEn:'PLACE', typeCn:'\u5730\u70b9', textEn:'Moon far side (China)',   textCn:'\u6708\u7403\u80cc\u9762\uff08\u4e2d\u56fd\uff09'},
  {storyId:3, typeEn:'EVENT', typeCn:'\u4e8b\u4ef6', textEn:'Yutu-2 rover deployed',  textCn:'\u7389\u5154\u4e8c\u53f7\u5de1\u89c6'},
  // Zhurong
  {storyId:4, typeEn:'TIME',  typeCn:'\u65f6\u95f4', textEn:'May 15, 2021',           textCn:'2021\u5e745\u670815\u65e5'},
  {storyId:4, typeEn:'PLACE', typeCn:'\u5730\u70b9', textEn:'Mars, Utopia Planitia',  textCn:'\u706b\u661f\u4e4c\u6258\u90a6\u5e73\u539f'},
  {storyId:4, typeEn:'EVENT', typeCn:'\u4e8b\u4ef6', textEn:'China rover on Mars',    textCn:'\u4e2d\u56fd\u706b\u661f\u8f66\u7740\u9646'},
];

// ================================================================
// Game state
// ================================================================
var gamePhase = 1; // 1=clue matching, 2=time sorting, 3=done
var totalScore = 0;
var matchedCount = 0;
var shakeTimer = 0;
var particles = [];

// Phase 1: clue cards and story slots
var clueCards = [];   // {clueIdx, x, y, w, h, placed, slotId}
var storySlots = [];  // {storyId, x, y, w, h, cards:[]}

// Phase 2: story tiles for sorting
var sortTiles = [];   // {storyId, x, y, w, h, currentOrder}

// Drag state
var dragging = null;  // {type:'clue'|'sort', idx, offsetX, offsetY}

// Canvas
var cv, c2d, cw, ch;

function initGame() {
  // Shuffle clue order
  var indices = [];
  for (var i = 0; i < CLUES.length; i++) indices.push(i);
  // Fisher-Yates shuffle
  for (var j = indices.length - 1; j > 0; j--) {
    var k = Math.floor(Math.random() * (j + 1));
    var tmp = indices[j]; indices[j] = indices[k]; indices[k] = tmp;
  }

  clueCards = [];
  matchedCount = 0;
  gamePhase = 1;
  totalScore = 0;
  particles = [];

  // Layout will be set in draw based on canvas size
  for (var ci = 0; ci < indices.length; ci++) {
    clueCards.push({clueIdx: indices[ci], placed: false, slotId: -1, x:0, y:0, w:0, h:0});
  }

  storySlots = [];
  for (var si = 0; si < STORIES.length; si++) {
    storySlots.push({storyId: si, cards: [], x:0, y:0, w:0, h:0});
  }

  sortTiles = [];
  updateHUD();
}

function updateHUD() {
  var v1 = document.getElementById('hudV1');
  var v2 = document.getElementById('hudV2');
  var v3 = document.getElementById('hudV3');
  var sv = document.getElementById('statusVal');
  if (v1) v1.textContent = gamePhase <= 2 ? gamePhase : '---';
  if (v2) v2.textContent = gamePhase === 1 ? matchedCount + '/15' : (gamePhase === 2 ? '---' : '15/15');
  if (v3) v3.textContent = totalScore;
  if (sv) sv.textContent = gamePhase === 1 ? t('statusIdle') : (gamePhase === 2 ? t('statusSort') : t('statusDone'));
}

// ================================================================
// Particle system
// ================================================================
function spawnParticles(x, y, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 3;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: (i % 5 === 0) ? 'oklch(0.85 0.14 85)' : ACCENT,
      r: 1.5 + Math.random() * 2,
    });
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ================================================================
// Corner tick marks
// ================================================================
function drawCornerTicks(ctx, x, y, w, h, color) {
  var L = 10;
  ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(x, y+L); ctx.lineTo(x, y); ctx.lineTo(x+L, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w-L, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+L); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y+h-L); ctx.lineTo(x, y+h); ctx.lineTo(x+L, y+h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w-L, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-L); ctx.stroke();
  ctx.restore();
}

// ================================================================
// Layout calculation
// ================================================================
function layoutPhase1() {
  if (!isFinite(cw) || !isFinite(ch)) return;
  var mc = gameModeColors();

  // Story slots on the right side (5 rows)
  var slotW = Math.min(180, cw * 0.25);
  var slotH = (ch - 40) / 5 - 8;
  var slotX = cw - slotW - 15;
  for (var i = 0; i < storySlots.length; i++) {
    storySlots[i].x = slotX;
    storySlots[i].y = 20 + i * (slotH + 8);
    storySlots[i].w = slotW;
    storySlots[i].h = slotH;
  }

  // Clue cards scattered on the left area
  var cardW = Math.min(140, (cw - slotW - 50) * 0.42);
  var cardH = 28;
  var areaW = cw - slotW - 60;
  var cols = Math.max(2, Math.floor(areaW / (cardW + 8)));
  for (var ci = 0; ci < clueCards.length; ci++) {
    if (clueCards[ci].placed) continue;
    var col = ci % cols;
    var row = Math.floor(ci / cols);
    clueCards[ci].w = cardW;
    clueCards[ci].h = cardH;
    clueCards[ci].x = 15 + col * (cardW + 8);
    clueCards[ci].y = 15 + row * (cardH + 6);
  }
}

function layoutPhase2() {
  if (!isFinite(cw) || !isFinite(ch)) return;
  var tileW = Math.min(500, cw * 0.7);
  var tileH = 50;
  var startX = (cw - tileW) / 2;
  var startY = 60;
  for (var i = 0; i < sortTiles.length; i++) {
    sortTiles[i].x = startX;
    sortTiles[i].y = startY + i * (tileH + 12);
    sortTiles[i].w = tileW;
    sortTiles[i].h = tileH;
  }
}

// ================================================================
// Drawing
// ================================================================
function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  var mc = gameModeColors();

  // Apply shake
  c2d.save();
  if (shakeTimer > 0) {
    var sx = (Math.random() - 0.5) * 8 * shakeTimer;
    var sy = (Math.random() - 0.5) * 8 * shakeTimer;
    c2d.translate(sx, sy);
    shakeTimer -= 0.05;
    if (shakeTimer < 0) shakeTimer = 0;
  }

  drawGameBg(c2d, cw, ch);

  if (gamePhase === 1) {
    drawPhase1(c2d, mc);
  } else if (gamePhase === 2) {
    drawPhase2(c2d, mc);
  } else {
    drawPhase3(c2d, mc);
  }

  drawParticles(c2d);
  c2d.restore();
}

function drawPhase1(ctx, mc) {
  layoutPhase1();

  // Draw story slots
  for (var si = 0; si < storySlots.length; si++) {
    var sl = storySlots[si];
    var st = STORIES[sl.storyId];

    // Slot background
    ctx.fillStyle = mc.glow ? 'rgba(0,0,0,0.3)' : 'rgba(0,0,0,0.15)';
    ctx.fillRect(sl.x, sl.y, sl.w, sl.h);
    // Border
    ctx.strokeStyle = st.color; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
    ctx.strokeRect(sl.x, sl.y, sl.w, sl.h); ctx.globalAlpha = 1;
    // Corner ticks
    drawCornerTicks(ctx, sl.x, sl.y, sl.w, sl.h, st.color);
    // Story name
    ctx.font = "bold 11px 'JetBrains Mono',monospace";
    ctx.fillStyle = st.color; ctx.textAlign = 'left';
    ctx.fillText((LANG === 'cn' ? st.nameCn : st.nameEn) + ' [' + st.year + ']', sl.x + 8, sl.y + 15);
    // Show matched cards count
    ctx.font = "9px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.dim; ctx.textAlign = 'right';
    ctx.fillText(sl.cards.length + '/3', sl.x + sl.w - 8, sl.y + 15);
    // Draw placed cards inside slot
    for (var ci = 0; ci < sl.cards.length; ci++) {
      var clue = CLUES[sl.cards[ci]];
      ctx.font = "8px 'JetBrains Mono',monospace";
      ctx.fillStyle = ACCENT; ctx.textAlign = 'left';
      var clueText = LANG === 'cn' ? (clue.typeCn + ': ' + clue.textCn) : (clue.typeEn + ': ' + clue.textEn);
      ctx.fillText(clueText, sl.x + 12, sl.y + 28 + ci * 13);
    }
  }

  // Draw unplaced clue cards
  for (var i = 0; i < clueCards.length; i++) {
    var card = clueCards[i];
    if (card.placed) continue;
    if (dragging && dragging.type === 'clue' && dragging.idx === i) continue;
    drawClueCard(ctx, card, mc, false);
  }

  // Draw dragging card on top
  if (dragging && dragging.type === 'clue') {
    drawClueCard(ctx, clueCards[dragging.idx], mc, true);
  }
}

function drawClueCard(ctx, card, mc, isDragging) {
  var clue = CLUES[card.clueIdx];
  var stColor = STORIES[clue.storyId].color;

  // Card background
  ctx.fillStyle = isDragging ? 'rgba(167,139,250,0.2)' : 'rgba(0,0,0,0.4)';
  ctx.fillRect(card.x, card.y, card.w, card.h);
  // Left color stripe
  ctx.fillStyle = stColor; ctx.globalAlpha = 0.6;
  ctx.fillRect(card.x, card.y, 3, card.h); ctx.globalAlpha = 1;
  // Border
  ctx.strokeStyle = isDragging ? ACCENT : mc.strokeDim;
  ctx.lineWidth = isDragging ? 1.5 : 0.5;
  ctx.strokeRect(card.x, card.y, card.w, card.h);
  // Type badge
  ctx.font = "bold 7px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim; ctx.textAlign = 'left';
  ctx.fillText(LANG === 'cn' ? clue.typeCn : clue.typeEn, card.x + 8, card.y + 10);
  // Text
  ctx.font = "9px 'Noto Sans SC',sans-serif";
  ctx.fillStyle = mc.text; ctx.textAlign = 'left';
  var txt = LANG === 'cn' ? clue.textCn : clue.textEn;
  ctx.fillText(txt, card.x + 8, card.y + 22);
}

function drawPhase2(ctx, mc) {
  layoutPhase2();

  // Title
  ctx.font = "bold 14px 'Space Grotesk','Noto Sans SC',sans-serif";
  ctx.fillStyle = ACCENT; ctx.textAlign = 'center';
  ctx.fillText(LANG === 'cn' ? '\u6309\u65f6\u95f4\u987a\u5e8f\u6392\u5217\u4e94\u4e2a\u6545\u4e8b' : 'SORT THE 5 STORIES BY TIME', cw/2, 35);

  // Draw tiles
  for (var i = 0; i < sortTiles.length; i++) {
    if (dragging && dragging.type === 'sort' && dragging.idx === i) continue;
    drawSortTile(ctx, sortTiles[i], i, mc, false);
  }
  // Draw dragging tile on top
  if (dragging && dragging.type === 'sort') {
    drawSortTile(ctx, sortTiles[dragging.idx], dragging.idx, mc, true);
  }
}

function drawSortTile(ctx, tile, idx, mc, isDragging) {
  var st = STORIES[tile.storyId];

  ctx.fillStyle = isDragging ? 'rgba(167,139,250,0.15)' : 'rgba(0,0,0,0.35)';
  ctx.fillRect(tile.x, tile.y, tile.w, tile.h);
  ctx.strokeStyle = isDragging ? ACCENT : st.color;
  ctx.lineWidth = isDragging ? 1.5 : 1;
  ctx.globalAlpha = isDragging ? 1 : 0.6;
  ctx.strokeRect(tile.x, tile.y, tile.w, tile.h);
  ctx.globalAlpha = 1;
  drawCornerTicks(ctx, tile.x, tile.y, tile.w, tile.h, st.color);

  // Position number
  ctx.font = "bold 16px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim; ctx.textAlign = 'center';
  ctx.fillText('' + (idx + 1), tile.x + 25, tile.y + tile.h/2 + 5);

  // Story name + year
  ctx.font = "bold 13px 'Space Grotesk','Noto Sans SC',sans-serif";
  ctx.fillStyle = st.color; ctx.textAlign = 'left';
  ctx.fillText(LANG === 'cn' ? st.nameCn : st.nameEn, tile.x + 50, tile.y + 20);
  ctx.font = "11px 'JetBrains Mono',monospace";
  ctx.fillStyle = mc.dim;
  ctx.fillText(st.year, tile.x + 50, tile.y + 38);

  // Drag handle
  ctx.fillStyle = mc.strokeDim; ctx.globalAlpha = 0.5;
  for (var hi = 0; hi < 3; hi++) {
    ctx.fillRect(tile.x + tile.w - 25, tile.y + 14 + hi * 8, 12, 2);
  }
  ctx.globalAlpha = 1;
}

function drawPhase3(ctx, mc) {
  // Completion screen with timeline
  var centerX = cw / 2, centerY = ch / 2 - 20;

  // Panel
  var pW = Math.min(500, cw * 0.8), pH = 200;
  var pX = centerX - pW/2, pY = centerY - pH/2;
  ctx.fillStyle = mc.glow ? 'rgba(0,0,0,0.45)' : 'rgba(0,0,0,0.25)';
  ctx.fillRect(pX, pY, pW, pH);
  drawCornerTicks(ctx, pX, pY, pW, pH, ACCENT);

  ctx.font = "bold 18px 'Space Grotesk','Noto Sans SC',sans-serif";
  ctx.fillStyle = ACCENT; ctx.textAlign = 'center';
  ctx.fillText(t('statusDone'), centerX, pY + 30);

  // Draw timeline inside panel
  var lineY = pY + 80;
  var x0 = pX + 30, x1 = pX + pW - 30;
  ctx.strokeStyle = ACCENT; ctx.lineWidth = 1; ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.moveTo(x0, lineY); ctx.lineTo(x1, lineY); ctx.stroke(); ctx.globalAlpha = 1;

  for (var i = 0; i < STORIES.length; i++) {
    var px = x0 + (x1 - x0) * i / (STORIES.length - 1);
    ctx.fillStyle = STORIES[i].color;
    ctx.beginPath(); ctx.arc(px, lineY, 5, 0, Math.PI*2); ctx.fill();
    // Glow
    if (mc.glow) {
      ctx.save(); ctx.shadowColor = STORIES[i].color; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(px, lineY, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.font = "bold 9px 'JetBrains Mono',monospace";
    ctx.fillStyle = mc.text; ctx.textAlign = 'center';
    ctx.fillText(STORIES[i].year, px, lineY - 14);
    ctx.font = "9px 'Noto Sans SC',sans-serif";
    ctx.fillStyle = mc.dim;
    ctx.fillText(LANG === 'cn' ? STORIES[i].nameCn : STORIES[i].nameEn, px, lineY + 18);
  }

  // Score
  ctx.font = "bold 13px 'JetBrains Mono',monospace";
  ctx.fillStyle = ACCENT; ctx.textAlign = 'center';
  ctx.fillText((LANG === 'cn' ? '\u603b\u5206: ' : 'TOTAL SCORE: ') + totalScore, centerX, pY + pH - 20);
}

// ================================================================
// Input handling
// ================================================================
function getCanvasPos(e) {
  var rect = cv.getBoundingClientRect();
  var scaleX = cw / rect.width;
  var scaleY = ch / rect.height;
  var clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY};
}

function hitTest(px, py, obj) {
  return px >= obj.x && px <= obj.x + obj.w && py >= obj.y && py <= obj.y + obj.h;
}

function onPointerDown(e) {
  e.preventDefault();
  var pos = getCanvasPos(e);

  if (gamePhase === 1) {
    // Check clue cards (unplaced, from top/last drawn to bottom)
    for (var i = clueCards.length - 1; i >= 0; i--) {
      if (clueCards[i].placed) continue;
      if (hitTest(pos.x, pos.y, clueCards[i])) {
        dragging = {type:'clue', idx:i, offsetX: pos.x - clueCards[i].x, offsetY: pos.y - clueCards[i].y};
        return;
      }
    }
  } else if (gamePhase === 2) {
    for (var j = sortTiles.length - 1; j >= 0; j--) {
      if (hitTest(pos.x, pos.y, sortTiles[j])) {
        dragging = {type:'sort', idx:j, offsetX: pos.x - sortTiles[j].x, offsetY: pos.y - sortTiles[j].y};
        return;
      }
    }
  }
}

function onPointerMove(e) {
  if (!dragging) return;
  e.preventDefault();
  var pos = getCanvasPos(e);

  if (dragging.type === 'clue') {
    clueCards[dragging.idx].x = pos.x - dragging.offsetX;
    clueCards[dragging.idx].y = pos.y - dragging.offsetY;
  } else if (dragging.type === 'sort') {
    sortTiles[dragging.idx].x = pos.x - dragging.offsetX;
    sortTiles[dragging.idx].y = pos.y - dragging.offsetY;
  }
}

function onPointerUp(e) {
  if (!dragging) return;
  e.preventDefault();
  var pos = getCanvasPos(e);

  if (dragging.type === 'clue') {
    var card = clueCards[dragging.idx];
    var clue = CLUES[card.clueIdx];
    var placed = false;

    // Check if dropped on correct slot
    for (var si = 0; si < storySlots.length; si++) {
      var sl = storySlots[si];
      if (hitTest(pos.x, pos.y, sl)) {
        if (sl.storyId === clue.storyId) {
          // Correct match
          card.placed = true;
          card.slotId = si;
          sl.cards.push(card.clueIdx);
          matchedCount++;
          totalScore += 10;
          spawnParticles(pos.x, pos.y, 10);
          placed = true;

          // Check if phase 1 complete
          if (matchedCount >= 15) {
            setTimeout(function(){ startPhase2(); }, 600);
          }
        } else {
          // Wrong slot -- shake
          shakeTimer = 1;
        }
        break;
      }
    }

    // If not placed, snap back (relayout will handle)
  } else if (dragging.type === 'sort') {
    // Find which position the tile was dropped at
    var dragIdx = dragging.idx;
    var tile = sortTiles[dragIdx];
    var dropY = tile.y + tile.h / 2;

    // Find target position by Y
    var targetIdx = sortTiles.length - 1;
    for (var ti = 0; ti < sortTiles.length; ti++) {
      if (ti === dragIdx) continue;
      if (dropY < sortTiles[ti].y + sortTiles[ti].h / 2) {
        targetIdx = ti > dragIdx ? ti - 1 : ti;
        break;
      }
    }
    if (targetIdx !== dragIdx) {
      // Move tile
      var removed = sortTiles.splice(dragIdx, 1)[0];
      sortTiles.splice(targetIdx, 0, removed);
    }
    layoutPhase2();
  }

  dragging = null;
  updateHUD();
}

function startPhase2() {
  gamePhase = 2;
  // Create sort tiles with shuffled order
  var order = [0,1,2,3,4];
  for (var i = order.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
  }
  sortTiles = [];
  for (var k = 0; k < order.length; k++) {
    sortTiles.push({storyId: order[k], x:0, y:0, w:0, h:0});
  }
  layoutPhase2();
  updateHUD();
}

function checkSortOrder() {
  if (gamePhase !== 2) return;
  var correct = true;
  for (var i = 0; i < sortTiles.length; i++) {
    if (STORIES[sortTiles[i].storyId].order !== i) {
      correct = false;
      break;
    }
  }
  if (correct) {
    totalScore += 50;
    gamePhase = 3;
    spawnParticles(cw/2, ch/2, 12);
    updateHUD();
  } else {
    shakeTimer = 1;
  }
}

function resetGame() {
  initGame();
  layoutPhase1();
}

// ================================================================
// Resize
// ================================================================
function resizeCanvas() {
  var body = cv.parentElement;
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = rect.width;
  ch = rect.height;
  cv.width = cw * dpr;
  cv.height = ch * dpr;
  cv.style.width = cw + 'px';
  cv.style.height = ch + 'px';
  c2d.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (gamePhase === 1) layoutPhase1();
  else if (gamePhase === 2) layoutPhase2();
}

// ================================================================
// Game loop
// ================================================================
var lastTime = 0;
function gameLoop(ts) {
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  updateParticles(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ================================================================
// Init
// ================================================================
(function() {
  cv = document.getElementById('gc');
  c2d = cv.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();
  initGame();

  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 400);
  document.fonts.ready.then(resizeCanvas);

  // Mouse events
  cv.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  // Touch events
  cv.addEventListener('touchstart', onPointerDown, {passive:false});
  window.addEventListener('touchmove', onPointerMove, {passive:false});
  window.addEventListener('touchend', onPointerUp, {passive:false});

  // Buttons
  document.getElementById('checkBtn').addEventListener('click', function() {
    if (gamePhase === 2) checkSortOrder();
  });
  document.getElementById('resetBtn').addEventListener('click', resetGame);

  requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
