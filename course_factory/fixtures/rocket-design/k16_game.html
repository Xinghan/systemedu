<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">EXPERIMENT</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="phaseLabel">PHASE</div>
    <div class="sidebar-guide" id="phaseText" style="font-weight:700;color:var(--sb-accent,var(--primary));"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnAction">START</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">EXPERIMENT SIM</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">PHASE</div><div class="hud-val" id="hudV1">1/4</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">PLANE</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">TRIAL</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">SCORE</div><div class="hud-val" id="hudV4">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">--</span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#a78bfa';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(167,139,250,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('phaseLabel').textContent = t('phase');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('phase');
  document.getElementById('hudL2').textContent = t('plane');
  document.getElementById('hudL3').textContent = t('trial');
  document.getElementById('hudL4').textContent = t('score');
  document.getElementById('btnReset').textContent = t('reset');
  updatePhaseUI();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, c2d, cw = 0, ch = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

// Phases: 'hypothesis', 'experiment', 'analysis', 'conclusion'
var gamePhase = 'hypothesis';
var hypothesisChoice = -1; // 0=dart, 1=glider, 2=wide

// Plane physics profiles
var PLANES = [
  { key:'dart',   speed:1.0,  lift:0.3,  drag:0.015, gravity:0.12, color:'#a78bfa' },
  { key:'glider', speed:0.7,  lift:0.7,  drag:0.010, gravity:0.06, color:'oklch(0.85 0.14 85)' },
  { key:'wide',   speed:0.55, lift:0.5,  drag:0.020, gravity:0.09, color:'oklch(0.92 0.08 295)' },
];

// Experiment data
var expData = [[],[],[]]; // 3 planes x up to 5 trials
var currentPlaneIdx = 0;
var currentTrial = 0;
var TRIALS_PER_PLANE = 5;

// Flight state
var flightState = 'idle'; // 'idle','aiming','charging','flying','landed'
var aimAngle = -Math.PI / 6;
var chargePower = 0;
var chargeDir = 1;
var planeX = 0, planeY = 0, planeVX = 0, planeVY = 0;
var flightTrail = [];
var landedDist = 0;

// Drag state for hypothesis badge
var badgeDragging = false;
var badgeX = 0, badgeY = 0;
var badgeSnapTarget = -1;

// Stars for space background
var _stars = [];
for (var si = 0; si < 80; si++) {
  _stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.0 + 0.2, a: Math.random() * 0.4 + 0.2 });
}

// Analysis animation
var analysisProgress = 0;
var analysisTimer = null;

// Score
var totalScore = 0;

// ================================================================
// CANVAS SETUP
// ================================================================
function resizeCanvas() {
  var body = document.querySelector('.game-body');
  var rect = body.getBoundingClientRect();
  cw = rect.width;
  ch = rect.height;
  canvas.width = cw * DPR;
  canvas.height = ch * DPR;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  c2d = canvas.getContext('2d');
  c2d.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}

function onModeChange() {
  draw();
}

// ================================================================
// DRAWING
// ================================================================
function draw() {
  if (!c2d || !isFinite(cw) || !isFinite(ch)) return;
  if (cw < 1 || ch < 1) return;

  // Background with space theme
  drawGameBg(c2d, cw, ch);
  drawSpaceDecor(c2d, cw, ch);

  if (gamePhase === 'hypothesis') drawHypothesis();
  else if (gamePhase === 'experiment') drawExperiment();
  else if (gamePhase === 'analysis') drawAnalysis();
  else if (gamePhase === 'conclusion') drawConclusion();
}

function drawSpaceDecor(c, w, h) {
  // Extra stars
  for (var i = 0; i < _stars.length; i++) {
    var s = _stars[i];
    c.beginPath();
    c.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,255,255,' + s.a + ')';
    c.fill();
  }
  // Purple nebula
  var ng = c.createRadialGradient(w * 0.7, h * 0.2, 0, w * 0.7, h * 0.2, w * 0.4);
  ng.addColorStop(0, 'rgba(167,139,250,0.04)');
  ng.addColorStop(1, 'transparent');
  c.fillStyle = ng;
  c.fillRect(0, 0, w, h);
}

// Draw a paper plane silhouette
function drawPlane(c, cx, cy, scale, planeType, color, angle) {
  c.save();
  c.translate(cx, cy);
  c.scale(scale, scale);
  if (angle) c.rotate(angle);
  c.fillStyle = color;
  c.strokeStyle = color;
  c.lineWidth = 1.5;
  c.beginPath();
  if (planeType === 'dart') {
    c.moveTo(18, 0); c.lineTo(-10, -8); c.lineTo(-6, 0); c.lineTo(-10, 8); c.closePath();
  } else if (planeType === 'glider') {
    c.moveTo(16, 0); c.lineTo(-6, -16); c.lineTo(-8, -10); c.lineTo(-12, 0); c.lineTo(-8, 10); c.lineTo(-6, 16); c.closePath();
  } else {
    c.moveTo(14, 0); c.lineTo(-4, -18); c.lineTo(-8, -12); c.lineTo(-12, 0); c.lineTo(-8, 12); c.lineTo(-4, 18); c.closePath();
  }
  c.fill();
  c.stroke();
  c.restore();
}

function drawRoundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ================================================================
// PHASE 1: HYPOTHESIS
// ================================================================
function drawHypothesis() {
  var mc = gameModeColors();
  var w = cw, h = ch;

  // Title
  c2d.fillStyle = mc.text;
  c2d.font = "bold 18px 'Space Grotesk','Noto Sans SC',sans-serif";
  c2d.textAlign = 'center';
  c2d.fillText(t('phaseH'), w / 2, 40);

  // 3 planes with stats preview
  var planeW = Math.min(w / 4, 180);
  var planeGap = (w - planeW * 3) / 4;
  var planeNames = ['dart', 'glider', 'wide'];
  var planeTitles = [t('dart'), t('glider'), t('wide')];
  var planeStats = [
    {spd: 90, lift: 30, stab: 50},
    {spd: 55, lift: 85, stab: 70},
    {spd: 40, lift: 55, stab: 85},
  ];

  for (var pi = 0; pi < 3; pi++) {
    var px = planeGap + pi * (planeW + planeGap) + planeW / 2;
    var py = h * 0.30;

    // Card background
    drawRoundRect(c2d, px - planeW / 2, py - 50, planeW, h * 0.48, 8);
    c2d.fillStyle = hypothesisChoice === pi ? 'rgba(167,139,250,0.15)' : 'rgba(255,255,255,0.03)';
    c2d.fill();
    c2d.strokeStyle = hypothesisChoice === pi ? ACCENT : 'rgba(255,255,255,0.1)';
    c2d.lineWidth = hypothesisChoice === pi ? 2 : 1;
    c2d.stroke();

    // Plane icon
    drawPlane(c2d, px, py, 2.5, planeNames[pi], PLANES[pi].color, 0);

    // Name
    c2d.fillStyle = PLANES[pi].color;
    c2d.font = "bold 13px 'Space Grotesk','Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillText(planeTitles[pi], px, py + 40);

    // Stats bars
    var statLabels = ['SPD', 'LIFT', 'STAB'];
    var statVals = [planeStats[pi].spd, planeStats[pi].lift, planeStats[pi].stab];
    var barY = py + 60;
    for (var bi = 0; bi < 3; bi++) {
      var bx = px - planeW / 2 + 12;
      var bw = planeW - 24;
      c2d.fillStyle = mc.dim;
      c2d.font = "8px 'JetBrains Mono',monospace";
      c2d.textAlign = 'left';
      c2d.fillText(statLabels[bi], bx, barY + bi * 22);
      // Bar bg
      c2d.fillStyle = 'rgba(255,255,255,0.06)';
      c2d.fillRect(bx + 32, barY + bi * 22 - 5, bw - 32, 6);
      // Bar fill
      c2d.fillStyle = PLANES[pi].color;
      c2d.fillRect(bx + 32, barY + bi * 22 - 5, (bw - 32) * statVals[bi] / 100, 6);
    }

    // Drop zone indicator
    if (badgeDragging) {
      var dropR = planeW / 2 - 5;
      c2d.strokeStyle = badgeSnapTarget === pi ? ACCENT : 'rgba(167,139,250,0.2)';
      c2d.lineWidth = badgeSnapTarget === pi ? 2 : 1;
      c2d.setLineDash([4, 4]);
      c2d.strokeRect(px - dropR, py - 55, dropR * 2, h * 0.50);
      c2d.setLineDash([]);
    }
  }

  // Badge
  var bw = 60, bh = 28;
  var bx = badgeDragging ? badgeX - bw / 2 : w / 2 - bw / 2;
  var by = badgeDragging ? badgeY - bh / 2 : h * 0.85;

  if (hypothesisChoice < 0) {
    drawRoundRect(c2d, bx, by, bw, bh, 4);
    c2d.fillStyle = 'rgba(167,139,250,0.3)';
    c2d.fill();
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 2;
    c2d.stroke();
    c2d.fillStyle = '#fff';
    c2d.font = "bold 11px 'JetBrains Mono',monospace";
    c2d.textAlign = 'center';
    c2d.textBaseline = 'middle';
    c2d.fillText(t('best'), bx + bw / 2, by + bh / 2);

    // Hint
    c2d.fillStyle = mc.dim;
    c2d.font = "11px 'Inter','Noto Sans SC',sans-serif";
    c2d.textBaseline = 'top';
    c2d.fillText(t('dragHint'), w / 2, h * 0.92);
  }
}

// ================================================================
// PHASE 2: EXPERIMENT
// ================================================================
function drawExperiment() {
  var mc = gameModeColors();
  var w = cw, h = ch;
  var pl = PLANES[currentPlaneIdx];
  var groundY = h * 0.78;

  // Ground line
  c2d.strokeStyle = 'rgba(167,139,250,0.2)';
  c2d.lineWidth = 1;
  c2d.beginPath();
  c2d.moveTo(0, groundY);
  c2d.lineTo(w, groundY);
  c2d.stroke();

  // Distance markers
  c2d.fillStyle = mc.dim;
  c2d.font = "8px 'JetBrains Mono',monospace";
  c2d.textAlign = 'center';
  for (var dm = 0; dm <= 10; dm++) {
    var mx = 60 + (w - 80) * dm / 10;
    c2d.fillText(dm + 'm', mx, groundY + 14);
    c2d.strokeStyle = 'rgba(255,255,255,0.05)';
    c2d.beginPath();
    c2d.moveTo(mx, groundY - 3);
    c2d.lineTo(mx, groundY + 3);
    c2d.stroke();
  }

  // Launch platform
  var launchX = 50;
  var launchY = groundY - 2;
  c2d.fillStyle = 'rgba(167,139,250,0.15)';
  c2d.fillRect(launchX - 15, launchY - 40, 30, 42);
  c2d.strokeStyle = ACCENT;
  c2d.lineWidth = 1;
  c2d.strokeRect(launchX - 15, launchY - 40, 30, 42);

  // Plane name + trial info
  c2d.fillStyle = pl.color;
  c2d.font = "bold 14px 'Space Grotesk','Noto Sans SC',sans-serif";
  c2d.textAlign = 'left';
  var plName = t(pl.key);
  c2d.fillText(plName + ' - ' + t('trial') + ' ' + (currentTrial + 1) + '/' + TRIALS_PER_PLANE, 20, 30);

  // Previous trial distances as markers
  var trials = expData[currentPlaneIdx];
  for (var ti = 0; ti < trials.length; ti++) {
    var tdx = 60 + (w - 80) * trials[ti] / 10;
    c2d.fillStyle = pl.color;
    c2d.globalAlpha = 0.4;
    c2d.beginPath();
    c2d.arc(tdx, groundY - 8, 4, 0, Math.PI * 2);
    c2d.fill();
    c2d.globalAlpha = 1;
    c2d.fillStyle = mc.dim;
    c2d.font = "7px 'JetBrains Mono',monospace";
    c2d.textAlign = 'center';
    c2d.fillText(trials[ti].toFixed(1), tdx, groundY - 16);
  }

  if (flightState === 'idle' || flightState === 'aiming') {
    // Draw aim line
    var aimLen = 60;
    var ax2 = launchX + Math.cos(aimAngle) * aimLen;
    var ay2 = (launchY - 30) + Math.sin(aimAngle) * aimLen;
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 1.5;
    c2d.setLineDash([4, 4]);
    c2d.beginPath();
    c2d.moveTo(launchX, launchY - 30);
    c2d.lineTo(ax2, ay2);
    c2d.stroke();
    c2d.setLineDash([]);

    // Plane at launch position
    drawPlane(c2d, launchX, launchY - 30, 2, pl.key, pl.color, aimAngle);

    // Instruction
    c2d.fillStyle = mc.text;
    c2d.font = "12px 'Inter','Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillText(t('aimDrag'), w / 2, h * 0.15);
  }

  if (flightState === 'charging') {
    // Power bar
    var barW = 120, barH = 12;
    var barX = launchX + 50, barY = launchY - 60;
    c2d.fillStyle = 'rgba(255,255,255,0.06)';
    c2d.fillRect(barX, barY, barW, barH);
    c2d.fillStyle = ACCENT;
    c2d.fillRect(barX, barY, barW * chargePower, barH);
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 1;
    c2d.strokeRect(barX, barY, barW, barH);
    // Power label
    c2d.fillStyle = mc.text;
    c2d.font = "bold 10px 'JetBrains Mono',monospace";
    c2d.textAlign = 'left';
    c2d.fillText(Math.round(chargePower * 100) + '%', barX + barW + 8, barY + barH / 2 + 3);

    // Plane
    drawPlane(c2d, launchX, launchY - 30, 2, pl.key, pl.color, aimAngle);

    // Instruction
    c2d.fillStyle = mc.text;
    c2d.font = "12px 'Inter','Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillText(t('release'), w / 2, h * 0.15);
  }

  if (flightState === 'flying' || flightState === 'landed') {
    // Trail
    c2d.strokeStyle = pl.color;
    c2d.lineWidth = 1;
    c2d.globalAlpha = 0.3;
    c2d.beginPath();
    for (var fi = 0; fi < flightTrail.length; fi++) {
      if (fi === 0) c2d.moveTo(flightTrail[fi].x, flightTrail[fi].y);
      else c2d.lineTo(flightTrail[fi].x, flightTrail[fi].y);
    }
    c2d.stroke();
    c2d.globalAlpha = 1;

    // Plane at current position
    var fAngle = Math.atan2(planeVY, planeVX);
    drawPlane(c2d, planeX, planeY, 2, pl.key, pl.color, fAngle);

    if (flightState === 'landed') {
      // Show distance
      c2d.fillStyle = pl.color;
      c2d.font = "bold 16px 'JetBrains Mono',monospace";
      c2d.textAlign = 'center';
      c2d.fillText(landedDist.toFixed(1) + 'm', planeX, planeY - 25);
    }
  }

  // Data summary sidebar (mini table)
  var summX = w - 160;
  var summY = 50;
  c2d.fillStyle = 'rgba(0,0,0,0.3)';
  drawRoundRect(c2d, summX - 10, summY - 10, 160, 100, 6);
  c2d.fill();
  c2d.fillStyle = mc.text;
  c2d.font = "bold 9px 'JetBrains Mono',monospace";
  c2d.textAlign = 'left';
  for (var di = 0; di < 3; di++) {
    var dy = summY + di * 28;
    c2d.fillStyle = PLANES[di].color;
    c2d.fillText(t(PLANES[di].key), summX, dy);
    c2d.fillStyle = mc.dim;
    c2d.font = "8px 'JetBrains Mono',monospace";
    var dStr = expData[di].map(function(v){ return v.toFixed(1); }).join(' | ');
    c2d.fillText(dStr || '--', summX, dy + 12);
    c2d.font = "bold 9px 'JetBrains Mono',monospace";
  }
}

// ================================================================
// PHASE 3: ANALYSIS
// ================================================================
function drawAnalysis() {
  var mc = gameModeColors();
  var w = cw, h = ch;

  c2d.fillStyle = mc.text;
  c2d.font = "bold 16px 'Space Grotesk','Noto Sans SC',sans-serif";
  c2d.textAlign = 'center';
  c2d.fillText(t('phaseA'), w / 2, 35);

  // Data table
  var tableX = 30;
  var tableY = 60;
  var colW = Math.min(55, (w * 0.45 - 30) / 7);
  var rowH = 22;
  var cols = ['', 'T1', 'T2', 'T3', 'T4', 'T5', t('avgDist')];

  // Header
  c2d.fillStyle = 'rgba(167,139,250,0.2)';
  c2d.fillRect(tableX, tableY, colW * 7, rowH);
  c2d.fillStyle = ACCENT;
  c2d.font = "bold 9px 'JetBrains Mono',monospace";
  c2d.textAlign = 'center';
  for (var ci = 0; ci < cols.length; ci++) {
    c2d.fillText(cols[ci], tableX + ci * colW + colW / 2, tableY + rowH / 2 + 3);
  }

  // Rows
  var averages = [];
  for (var ri = 0; ri < 3; ri++) {
    var ry = tableY + (ri + 1) * rowH;
    c2d.fillStyle = ri % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.01)';
    c2d.fillRect(tableX, ry, colW * 7, rowH);

    var sum = 0;
    var rowData = expData[ri];
    for (var rj = 0; rj < rowData.length; rj++) sum += rowData[rj];
    var avg = rowData.length > 0 ? sum / rowData.length : 0;
    averages.push(avg);

    // Name
    c2d.fillStyle = PLANES[ri].color;
    c2d.font = "bold 9px 'Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillText(t(PLANES[ri].key), tableX + colW / 2, ry + rowH / 2 + 3);

    // Values
    c2d.font = "9px 'JetBrains Mono',monospace";
    for (var rk = 0; rk < 5; rk++) {
      c2d.fillStyle = rk < rowData.length ? mc.text : 'rgba(255,255,255,0.1)';
      var val = rk < rowData.length ? rowData[rk].toFixed(1) : '--';
      c2d.fillText(val, tableX + (rk + 1) * colW + colW / 2, ry + rowH / 2 + 3);
    }

    // Average
    c2d.fillStyle = ACCENT;
    c2d.font = "bold 10px 'JetBrains Mono',monospace";
    c2d.fillText(avg.toFixed(1) + 'm', tableX + 6 * colW + colW / 2, ry + rowH / 2 + 3);
  }

  // Border
  c2d.strokeStyle = 'rgba(167,139,250,0.2)';
  c2d.lineWidth = 1;
  c2d.strokeRect(tableX, tableY, colW * 7, rowH * 4);

  // Bar chart
  var chartX = w * 0.52;
  var chartY = 70;
  var chartW = w * 0.42;
  var chartH = h * 0.45;
  var maxVal = Math.max(averages[0], averages[1], averages[2], 1) * 1.2;
  var barW = chartW / 7;
  var gap = barW;

  // Axis
  c2d.strokeStyle = 'rgba(255,255,255,0.15)';
  c2d.lineWidth = 1;
  c2d.beginPath();
  c2d.moveTo(chartX, chartY);
  c2d.lineTo(chartX, chartY + chartH);
  c2d.lineTo(chartX + chartW, chartY + chartH);
  c2d.stroke();

  // Bars with animation
  var animP = Math.min(analysisProgress, 1);
  for (var bi = 0; bi < 3; bi++) {
    var bx = chartX + gap + bi * (barW + gap);
    var barH = (averages[bi] / maxVal) * (chartH - 15) * animP;
    var by = chartY + chartH - barH;
    c2d.fillStyle = PLANES[bi].color;
    c2d.fillRect(bx, by, barW, barH);
    // Glow
    c2d.shadowColor = PLANES[bi].color;
    c2d.shadowBlur = 8;
    c2d.fillRect(bx, by, barW, barH);
    c2d.shadowBlur = 0;
    // Value
    if (animP > 0.5) {
      c2d.fillStyle = mc.text;
      c2d.font = "bold 10px 'JetBrains Mono',monospace";
      c2d.textAlign = 'center';
      c2d.fillText(averages[bi].toFixed(1) + 'm', bx + barW / 2, by - 8);
    }
    // Label
    c2d.fillStyle = mc.dim;
    c2d.font = "9px 'Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillText(t(PLANES[bi].key), bx + barW / 2, chartY + chartH + 16);
  }

  // Error bars (std dev)
  if (animP > 0.8) {
    for (var ei = 0; ei < 3; ei++) {
      var eData = expData[ei];
      if (eData.length < 2) continue;
      var eMean = averages[ei];
      var variance = 0;
      for (var ej = 0; ej < eData.length; ej++) variance += (eData[ej] - eMean) * (eData[ej] - eMean);
      var stdDev = Math.sqrt(variance / eData.length);
      var ebx = chartX + gap + ei * (barW + gap) + barW / 2;
      var eCenter = chartY + chartH - (eMean / maxVal) * (chartH - 15);
      var eTop = chartY + chartH - ((eMean + stdDev) / maxVal) * (chartH - 15);
      var eBot = chartY + chartH - ((eMean - stdDev) / maxVal) * (chartH - 15);
      c2d.strokeStyle = mc.text;
      c2d.lineWidth = 1.5;
      c2d.beginPath();
      c2d.moveTo(ebx, eTop);
      c2d.lineTo(ebx, eBot);
      c2d.stroke();
      c2d.beginPath();
      c2d.moveTo(ebx - 4, eTop);
      c2d.lineTo(ebx + 4, eTop);
      c2d.stroke();
      c2d.beginPath();
      c2d.moveTo(ebx - 4, eBot);
      c2d.lineTo(ebx + 4, eBot);
      c2d.stroke();
    }
  }

  // Winner highlight
  if (animP >= 1) {
    var winIdx = 0;
    for (var wi = 1; wi < 3; wi++) {
      if (averages[wi] > averages[winIdx]) winIdx = wi;
    }
    c2d.fillStyle = mc.text;
    c2d.font = "bold 12px 'Space Grotesk','Noto Sans SC',sans-serif";
    c2d.textAlign = 'center';
    c2d.fillText(t('winner') + ': ' + t(PLANES[winIdx].key) + ' (' + averages[winIdx].toFixed(1) + 'm)', w / 2, h - 30);
  }
}

// ================================================================
// PHASE 4: CONCLUSION
// ================================================================
function drawConclusion() {
  var mc = gameModeColors();
  var w = cw, h = ch;

  c2d.fillStyle = mc.text;
  c2d.font = "bold 16px 'Space Grotesk','Noto Sans SC',sans-serif";
  c2d.textAlign = 'center';
  c2d.fillText(t('phaseC'), w / 2, 35);

  // Compute winner
  var averages = [];
  for (var ai = 0; ai < 3; ai++) {
    var sum = 0;
    for (var aj = 0; aj < expData[ai].length; aj++) sum += expData[ai][aj];
    averages.push(expData[ai].length > 0 ? sum / expData[ai].length : 0);
  }
  var winIdx = 0;
  for (var wi = 1; wi < 3; wi++) {
    if (averages[wi] > averages[winIdx]) winIdx = wi;
  }

  var isCorrect = hypothesisChoice === winIdx;

  // Hypothesis vs Result comparison
  var boxW = Math.min(w * 0.35, 240);
  var boxH = 120;
  var gap = 40;

  // Hypothesis box
  var hx = w / 2 - boxW - gap / 2;
  var hy = 70;
  drawRoundRect(c2d, hx, hy, boxW, boxH, 8);
  c2d.fillStyle = 'rgba(167,139,250,0.06)';
  c2d.fill();
  c2d.strokeStyle = 'rgba(167,139,250,0.3)';
  c2d.lineWidth = 1;
  c2d.stroke();

  c2d.fillStyle = ACCENT;
  c2d.font = "bold 10px 'JetBrains Mono',monospace";
  c2d.textAlign = 'center';
  c2d.fillText('HYPOTHESIS', hx + boxW / 2, hy + 20);

  // Draw predicted plane
  drawPlane(c2d, hx + boxW / 2, hy + 55, 2.5, PLANES[hypothesisChoice].key, PLANES[hypothesisChoice].color, 0);
  c2d.fillStyle = PLANES[hypothesisChoice].color;
  c2d.font = "bold 12px 'Noto Sans SC',sans-serif";
  c2d.fillText(t(PLANES[hypothesisChoice].key), hx + boxW / 2, hy + 90);

  // Result box
  var rx = w / 2 + gap / 2;
  drawRoundRect(c2d, rx, hy, boxW, boxH, 8);
  c2d.fillStyle = isCorrect ? 'rgba(34,197,94,0.06)' : 'rgba(239,68,68,0.06)';
  c2d.fill();
  c2d.strokeStyle = isCorrect ? '#22c55e' : '#ef4444';
  c2d.lineWidth = 1;
  c2d.stroke();

  c2d.fillStyle = isCorrect ? '#22c55e' : '#ef4444';
  c2d.font = "bold 10px 'JetBrains Mono',monospace";
  c2d.textAlign = 'center';
  c2d.fillText('RESULT', rx + boxW / 2, hy + 20);

  drawPlane(c2d, rx + boxW / 2, hy + 55, 2.5, PLANES[winIdx].key, PLANES[winIdx].color, 0);
  c2d.fillStyle = PLANES[winIdx].color;
  c2d.font = "bold 12px 'Noto Sans SC',sans-serif";
  c2d.fillText(t(PLANES[winIdx].key) + ' (' + averages[winIdx].toFixed(1) + 'm)', rx + boxW / 2, hy + 90);

  // Arrow between
  c2d.strokeStyle = mc.dim;
  c2d.lineWidth = 1.5;
  c2d.beginPath();
  c2d.moveTo(hx + boxW + 5, hy + boxH / 2);
  c2d.lineTo(rx - 5, hy + boxH / 2);
  c2d.stroke();
  c2d.fillStyle = mc.dim;
  c2d.beginPath();
  c2d.moveTo(rx - 5, hy + boxH / 2);
  c2d.lineTo(rx - 12, hy + boxH / 2 - 4);
  c2d.lineTo(rx - 12, hy + boxH / 2 + 4);
  c2d.fill();

  // Match result
  c2d.fillStyle = isCorrect ? '#22c55e' : '#ef4444';
  c2d.font = "bold 12px 'JetBrains Mono',monospace";
  c2d.textAlign = 'center';
  c2d.fillText(isCorrect ? 'CONFIRMED' : 'REJECTED', w / 2, hy + boxH + 25);

  // Message
  var msgY = hy + boxH + 55;
  drawRoundRect(c2d, w * 0.15, msgY, w * 0.7, 50, 8);
  c2d.fillStyle = isCorrect ? 'rgba(34,197,94,0.08)' : 'rgba(167,139,250,0.08)';
  c2d.fill();
  c2d.strokeStyle = isCorrect ? 'rgba(34,197,94,0.3)' : 'rgba(167,139,250,0.3)';
  c2d.lineWidth = 1;
  c2d.stroke();

  c2d.fillStyle = mc.text;
  c2d.font = "13px 'Inter','Noto Sans SC',sans-serif";
  c2d.textAlign = 'center';
  c2d.fillText(isCorrect ? t('correct') : t('wrong'), w / 2, msgY + 28);

  // Score
  var scoreY = msgY + 75;
  c2d.fillStyle = ACCENT;
  c2d.font = "bold 14px 'JetBrains Mono',monospace";
  c2d.fillText(t('finalScore') + ': ' + totalScore, w / 2, scoreY);

  // Score breakdown
  c2d.fillStyle = mc.dim;
  c2d.font = "10px 'Inter','Noto Sans SC',sans-serif";
  c2d.fillText(t('consistency') + ' + ' + (isCorrect ? 'Correct Prediction' : 'Discovery Bonus'), w / 2, scoreY + 20);
}

// ================================================================
// INTERACTION HANDLERS
// ================================================================
function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

var pointerDown = false;
var pointerStartX = 0, pointerStartY = 0;

function onPointerDown(e) {
  e.preventDefault();
  var pos = getCanvasPos(e);
  pointerDown = true;
  pointerStartX = pos.x;
  pointerStartY = pos.y;

  if (gamePhase === 'hypothesis' && hypothesisChoice < 0) {
    // Check if clicking on badge
    var bx = cw / 2 - 30, by = ch * 0.85 - 14;
    if (pos.x >= bx && pos.x <= bx + 60 && pos.y >= by && pos.y <= by + 28) {
      badgeDragging = true;
      badgeX = pos.x;
      badgeY = pos.y;
    }
  }

  if (gamePhase === 'experiment' && flightState === 'idle') {
    flightState = 'aiming';
  }
}

function onPointerMove(e) {
  e.preventDefault();
  var pos = getCanvasPos(e);

  if (gamePhase === 'hypothesis' && badgeDragging) {
    badgeX = pos.x;
    badgeY = pos.y;
    // Check snap targets
    var planeW = Math.min(cw / 4, 180);
    var planeGap = (cw - planeW * 3) / 4;
    badgeSnapTarget = -1;
    for (var pi = 0; pi < 3; pi++) {
      var px = planeGap + pi * (planeW + planeGap) + planeW / 2;
      if (Math.abs(pos.x - px) < planeW / 2 && pos.y < ch * 0.75) {
        badgeSnapTarget = pi;
      }
    }
    draw();
    return;
  }

  if (gamePhase === 'experiment' && flightState === 'aiming') {
    // Compute aim angle from launch point
    var launchX = 50, launchY = ch * 0.78 - 30;
    var dx = pos.x - launchX;
    var dy = pos.y - launchY;
    aimAngle = Math.atan2(dy, dx);
    // Clamp angle between -60 and 0 degrees
    if (aimAngle < -Math.PI / 3) aimAngle = -Math.PI / 3;
    if (aimAngle > -Math.PI / 30) aimAngle = -Math.PI / 30;
    draw();
  }
}

function onPointerUp(e) {
  e.preventDefault();
  pointerDown = false;

  if (gamePhase === 'hypothesis' && badgeDragging) {
    badgeDragging = false;
    if (badgeSnapTarget >= 0) {
      hypothesisChoice = badgeSnapTarget;
      updatePhaseUI();
      // Update button
      document.getElementById('btnAction').textContent = t('confirm');
      document.getElementById('btnAction').disabled = false;
    }
    badgeSnapTarget = -1;
    draw();
    return;
  }

  if (gamePhase === 'experiment' && flightState === 'aiming') {
    flightState = 'charging';
    chargePower = 0;
    chargeDir = 1;
    startCharging();
  } else if (gamePhase === 'experiment' && flightState === 'charging') {
    // Launch!
    flightState = 'flying';
    stopCharging();
    launchPlane();
  }
}

// ================================================================
// CHARGING MECHANIC
// ================================================================
var chargeInterval = null;

function startCharging() {
  stopCharging();
  chargeInterval = setInterval(function() {
    chargePower += 0.02 * chargeDir;
    if (chargePower >= 1) { chargePower = 1; chargeDir = -1; }
    if (chargePower <= 0) { chargePower = 0; chargeDir = 1; }
    draw();
  }, 30);
}

function stopCharging() {
  if (chargeInterval) {
    clearInterval(chargeInterval);
    chargeInterval = null;
  }
}

// ================================================================
// FLIGHT PHYSICS
// ================================================================
function launchPlane() {
  var pl = PLANES[currentPlaneIdx];
  var groundY = ch * 0.78;
  planeX = 50;
  planeY = groundY - 32;
  var power = 4 + chargePower * 8;
  planeVX = Math.cos(aimAngle) * power * pl.speed;
  planeVY = Math.sin(aimAngle) * power * pl.speed;
  flightTrail = [{x: planeX, y: planeY}];

  var flightFrame = function() {
    if (flightState !== 'flying') return;

    // Physics
    planeVY += pl.gravity;
    planeVX *= (1 - pl.drag);
    planeVY -= pl.lift * 0.3 * Math.max(0, planeVX / 5);

    planeX += planeVX;
    planeY += planeVY;
    flightTrail.push({x: planeX, y: planeY});

    var groundY = ch * 0.78;
    if (planeY >= groundY || planeX > cw + 20) {
      planeY = Math.min(planeY, groundY);
      flightState = 'landed';
      // Calculate distance in meters (scale: canvas width = ~10m)
      landedDist = Math.max(0, (planeX - 60) / ((cw - 80) / 10));
      landedDist = Math.round(landedDist * 10) / 10;
      landedDist = Math.max(0.5, Math.min(landedDist, 9.9));
      expData[currentPlaneIdx].push(landedDist);
      updateHUD();
      draw();

      // Auto advance after delay
      setTimeout(function() {
        advanceTrial();
      }, 1200);
      return;
    }

    draw();
    requestAnimationFrame(flightFrame);
  };
  requestAnimationFrame(flightFrame);
}

function advanceTrial() {
  currentTrial++;
  if (currentTrial >= TRIALS_PER_PLANE) {
    // Next plane or analysis
    currentTrial = 0;
    currentPlaneIdx++;
    if (currentPlaneIdx >= 3) {
      // All done, go to analysis
      gamePhase = 'analysis';
      analysisProgress = 0;
      updatePhaseUI();
      startAnalysisAnimation();
      return;
    }
  }
  flightState = 'idle';
  aimAngle = -Math.PI / 6;
  updateHUD();
  updatePhaseUI();
  draw();
}

function startAnalysisAnimation() {
  analysisProgress = 0;
  var startTime = null;
  var duration = 2000;
  var animFrame = function(ts) {
    if (!startTime) startTime = ts;
    analysisProgress = Math.min((ts - startTime) / duration, 1);
    draw();
    if (analysisProgress < 1) {
      requestAnimationFrame(animFrame);
    } else {
      // Show "see results" button
      document.getElementById('btnAction').textContent = t('seeResult');
      document.getElementById('btnAction').disabled = false;
    }
  };
  requestAnimationFrame(animFrame);
}

// ================================================================
// UI UPDATES
// ================================================================
function updateHUD() {
  document.getElementById('hudV1').textContent =
    gamePhase === 'hypothesis' ? '1/4' :
    gamePhase === 'experiment' ? '2/4' :
    gamePhase === 'analysis' ? '3/4' : '4/4';
  document.getElementById('hudV2').textContent =
    gamePhase === 'experiment' ? t(PLANES[currentPlaneIdx].key) : '--';
  document.getElementById('hudV3').textContent =
    gamePhase === 'experiment' ? (currentTrial + 1) + '/' + TRIALS_PER_PLANE : '--';
  document.getElementById('hudV4').textContent = totalScore;
  document.getElementById('statusVal').textContent =
    flightState === 'flying' ? t('flying') :
    flightState === 'landed' ? landedDist.toFixed(1) + 'm' :
    gamePhase === 'analysis' ? t('analyzing') :
    gamePhase === 'conclusion' ? t('done') : t('ready');
}

function updatePhaseUI() {
  var phaseText = document.getElementById('phaseText');
  var guideText = document.getElementById('guideText');
  var btn = document.getElementById('btnAction');
  if (gamePhase === 'hypothesis') {
    phaseText.textContent = t('phaseH');
    guideText.textContent = t('guideP1');
    btn.textContent = hypothesisChoice >= 0 ? t('confirm') : t('start');
    btn.disabled = hypothesisChoice < 0;
  } else if (gamePhase === 'experiment') {
    phaseText.textContent = t('phaseE');
    guideText.textContent = t('guideP2');
    btn.textContent = t('launch');
    btn.disabled = true;
  } else if (gamePhase === 'analysis') {
    phaseText.textContent = t('phaseA');
    guideText.textContent = t('guideP3');
    btn.textContent = t('seeResult');
    btn.disabled = true;
  } else {
    phaseText.textContent = t('phaseC');
    guideText.textContent = t('guideP4');
    btn.textContent = t('reset');
    btn.disabled = false;
  }
  updateHUD();
  draw();
}

// ================================================================
// BUTTON HANDLERS
// ================================================================
function onActionBtn() {
  if (gamePhase === 'hypothesis' && hypothesisChoice >= 0) {
    // Confirm hypothesis -> start experiment
    gamePhase = 'experiment';
    currentPlaneIdx = 0;
    currentTrial = 0;
    flightState = 'idle';
    aimAngle = -Math.PI / 6;
    updatePhaseUI();
    return;
  }
  if (gamePhase === 'analysis' && analysisProgress >= 1) {
    // Compute score and go to conclusion
    computeScore();
    gamePhase = 'conclusion';
    updatePhaseUI();
    return;
  }
  if (gamePhase === 'conclusion') {
    resetGame();
    return;
  }
}

function computeScore() {
  // Consistency score: lower std dev across all flights = higher score
  var consistencyScore = 0;
  for (var pi = 0; pi < 3; pi++) {
    var data = expData[pi];
    if (data.length < 2) continue;
    var sum = 0;
    for (var di = 0; di < data.length; di++) sum += data[di];
    var mean = sum / data.length;
    var variance = 0;
    for (var dj = 0; dj < data.length; dj++) variance += (data[dj] - mean) * (data[dj] - mean);
    var stdDev = Math.sqrt(variance / data.length);
    // Lower stdDev = more consistent = higher score (max 20 per plane)
    consistencyScore += Math.max(0, Math.round(20 - stdDev * 8));
  }

  // Correct prediction bonus
  var averages = [];
  for (var ai = 0; ai < 3; ai++) {
    var sum2 = 0;
    for (var aj = 0; aj < expData[ai].length; aj++) sum2 += expData[ai][aj];
    averages.push(expData[ai].length > 0 ? sum2 / expData[ai].length : 0);
  }
  var winIdx = 0;
  for (var wi = 1; wi < 3; wi++) {
    if (averages[wi] > averages[winIdx]) winIdx = wi;
  }

  var predictionBonus = hypothesisChoice === winIdx ? 20 : 10; // discovery bonus if wrong

  totalScore = consistencyScore + predictionBonus;
  updateHUD();
}

function resetGame() {
  gamePhase = 'hypothesis';
  hypothesisChoice = -1;
  expData = [[], [], []];
  currentPlaneIdx = 0;
  currentTrial = 0;
  flightState = 'idle';
  aimAngle = -Math.PI / 6;
  chargePower = 0;
  badgeDragging = false;
  badgeSnapTarget = -1;
  analysisProgress = 0;
  totalScore = 0;
  landedDist = 0;
  flightTrail = [];
  stopCharging();
  updatePhaseUI();
}

// ================================================================
// INIT
// ================================================================
(function init() {
  canvas = document.getElementById('gc');
  c2d = canvas.getContext('2d');

  // Set CSS vars
  var r = document.documentElement;
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', 'oklch(0.52 0.16 295)');
  r.style.setProperty('--glow-strong', 'rgba(167,139,250,0.25)');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();

  // Canvas events
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, {passive: false});
  canvas.addEventListener('touchmove', onPointerMove, {passive: false});
  canvas.addEventListener('touchend', onPointerUp, {passive: false});

  // Buttons
  document.getElementById('btnAction').addEventListener('click', onActionBtn);
  document.getElementById('btnReset').addEventListener('click', resetGame);

  // Resize
  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);
  setTimeout(resizeCanvas, 400);
  document.fonts.ready.then(resizeCanvas);

  updatePhaseUI();
})();
</script>
