<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#5ba3d9));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* ── Slider / button controls ── */
.slider-group{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
/* ── Main area ── */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">BALLOON ROCKET LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <!-- Controls -->
    <div class="slider-group">
      <label id="lblSize">BALLOON SIZE</label>
      <input type="range" id="sliderSize" min="1" max="5" step="1" value="3">
      <div class="val" id="valSize">3</div>
    </div>
    <div class="slider-group">
      <label id="lblAngle">RAIL ANGLE</label>
      <input type="range" id="sliderAngle" min="0" max="45" step="5" value="0">
      <div class="val" id="valAngle">0 deg</div>
    </div>
    <div class="slider-group">
      <label id="lblFriction">FRICTION</label>
      <input type="range" id="sliderFriction" min="1" max="5" step="1" value="2">
      <div class="val" id="valFriction">2</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnLaunch">LAUNCH</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">BALLOON ROCKET LAB</div>
      <div class="hud-item"><div class="hud-label" id="hThrust">THRUST</div><div class="hud-val" id="vThrust">0 N</div></div>
      <div class="hud-item"><div class="hud-label" id="hReaction">REACTION</div><div class="hud-val" id="vReaction">0 N</div></div>
      <div class="hud-item"><div class="hud-label" id="hSpeed">SPEED</div><div class="hud-val" id="vSpeed">0 m/s</div></div>
      <div class="hud-item"><div class="hud-label" id="hDist">DISTANCE</div><div class="hud-val" id="vDist">0 m</div></div>
      <div class="hud-item"><div class="hud-label" id="hBest">BEST</div><div class="hud-val" id="vBest">0 m</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">READY</span>
      <span class="status-val" id="statusVal"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM (inline -- games don't use shared runtime)
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(91,163,217,0.04)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y2=0;y2<h;y2+=mc.gridStep){c.beginPath();c.moveTo(0,y2);c.lineTo(w,y2);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#3d7bb0');
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'BALLOON ROCKET LAB', cn:'\u6c14\u7403\u706b\u7bad\u53d1\u5c04\u53f0'},
  subtitle:  {en:'Newton\'s Third Law Simulator', cn:'\u725b\u987f\u7b2c\u4e09\u5b9a\u5f8b\u6a21\u62df\u5668'},
  guide:     {en:'Adjust balloon size (air volume), rail angle, and friction. Press LAUNCH to fire! The balloon ejects air backward (action force), and the reaction force pushes it forward. Try to set the distance record!', cn:'\u8c03\u8282\u6c14\u7403\u5927\u5c0f\uff08\u6c14\u91cf\uff09\u3001\u5bfc\u8f68\u89d2\u5ea6\u548c\u6469\u64e6\u529b\u3002\u6309\u201c\u53d1\u5c04\u201d\uff01\u6c14\u7403\u5411\u540e\u55b7\u6c14\uff08\u4f5c\u7528\u529b\uff09\uff0c\u53cd\u4f5c\u7528\u529b\u63a8\u52a8\u6c14\u7403\u524d\u8fdb\u3002\u8bd5\u8bd5\u6253\u7834\u8ddd\u79bb\u8bb0\u5f55\uff01'},
  launch:    {en:'LAUNCH', cn:'\u53d1\u5c04'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  ready:     {en:'READY', cn:'\u5c31\u7eea'},
  flying:    {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  landed:    {en:'LANDED', cn:'\u5df2\u7740\u9646'},
  newRecord: {en:'NEW RECORD!', cn:'\u65b0\u8bb0\u5f55\uff01'},
  lblSize:   {en:'BALLOON SIZE', cn:'\u6c14\u7403\u5927\u5c0f'},
  lblAngle:  {en:'RAIL ANGLE', cn:'\u5bfc\u8f68\u89d2\u5ea6'},
  lblFriction:{en:'FRICTION', cn:'\u6469\u64e6\u529b'},
  thrust:    {en:'THRUST', cn:'\u55b7\u6c14\u63a8\u529b'},
  reaction:  {en:'REACTION', cn:'\u53cd\u4f5c\u7528\u529b'},
  speed:     {en:'SPEED', cn:'\u901f\u5ea6'},
  dist:      {en:'DISTANCE', cn:'\u8ddd\u79bb'},
  best:      {en:'BEST', cn:'\u6700\u4f73'},
  hudTag:    {en:'BALLOON ROCKET LAB', cn:'\u6c14\u7403\u706b\u7bad\u53d1\u5c04\u53f0'},
  actionLbl: {en:'Action: air ejects backward', cn:'\u4f5c\u7528\u529b\uff1a\u7a7a\u6c14\u5411\u540e\u55b7\u51fa'},
  reactLbl:  {en:'Reaction: balloon forward', cn:'\u53cd\u4f5c\u7528\u529b\uff1a\u6c14\u7403\u524d\u8fdb'},
  frictionLbl:{en:'Friction slows it down', cn:'\u6469\u64e6\u529b\u8ba9\u5b83\u51cf\u901f'},
  sizeUnit:  {en:' L', cn:' L'},
  degUnit:   {en:' deg', cn:'\u00b0'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = 'GUIDE';
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('lblSize').textContent = t('lblSize');
  document.getElementById('lblAngle').textContent = t('lblAngle');
  document.getElementById('lblFriction').textContent = t('lblFriction');
  document.getElementById('btnLaunch').textContent = t('launch');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('hThrust').textContent = t('thrust');
  document.getElementById('hReaction').textContent = t('reaction');
  document.getElementById('hSpeed').textContent = t('speed');
  document.getElementById('hDist').textContent = t('dist');
  document.getElementById('hBest').textContent = t('best');
  document.getElementById('hudTag').textContent = t('hudTag');
  draw();
}

// ================================================================
// Game State
// ================================================================
var cv, ctx;
var balloonSize = 3;    // 1-5: air volume in liters
var railAngle = 0;      // 0-45 degrees
var frictionLevel = 2;  // 1-5
var bestDistance = 0;

// Physics simulation state
var simState = 'ready'; // ready | flying | landed
var simTime = 0;
var balloonX = 0;       // position along rail (meters)
var balloonVel = 0;     // velocity (m/s)
var airRemaining = 0;   // remaining air (0-1)
var thrustForce = 0;    // current thrust N
var reactionForce = 0;
var currentSpeed = 0;
var currentDist = 0;
var particles = [];     // exhaust particles
var flights = [];       // flight log for data display

var DPR = Math.min(window.devicePixelRatio || 1, 2);
var canvasW = 800, canvasH = 400;

// ================================================================
// Physics constants
// ================================================================
var THRUST_PER_SIZE = 0.12;     // N per balloon size level
var AIR_DURATION_PER_SIZE = 0.6; // seconds of thrust per size level
var FRICTION_COEFF = [0, 0.01, 0.03, 0.06, 0.10, 0.16]; // friction level -> mu
var BALLOON_MASS_BASE = 0.005;   // 5 grams base
var BALLOON_MASS_PER_SIZE = 0.003; // extra mass per size level
var GRAVITY = 9.81;
var DT = 1/60;

// ================================================================
// Canvas setup
// ================================================================
function resizeCanvas() {
  cv = document.getElementById('gc');
  if (!cv) return;
  var parent = cv.parentElement;
  var rect = parent.getBoundingClientRect();
  var availW = Math.floor(rect.width);
  var availH = Math.floor(rect.height);
  canvasW = Math.max(availW, 200);
  canvasH = Math.max(availH, 150);
  cv.width = canvasW * DPR;
  cv.height = canvasH * DPR;
  cv.style.width = canvasW + 'px';
  cv.style.height = canvasH + 'px';
  ctx = cv.getContext('2d');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}

// ================================================================
// Drawing
// ================================================================
function draw() {
  if (!ctx) return;
  var mc = gameModeColors();
  var w = canvasW, h = canvasH;

  // Background
  drawGameBg(ctx, w, h);

  // Ground plane
  var groundY = h * 0.72;
  ctx.fillStyle = mc.strokeDim;
  ctx.fillRect(0, groundY, w, h - groundY);

  // Rail
  var railStartX = w * 0.08;
  var railEndX = w * 0.92;
  var railLen = railEndX - railStartX;
  var angleRad = railAngle * Math.PI / 180;
  var railStartY = groundY - 10;
  var railEndY = railStartY - Math.sin(angleRad) * railLen;
  var railEndXActual = railStartX + Math.cos(angleRad) * railLen;

  // Draw straw/rail
  ctx.strokeStyle = mc.dim;
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(railStartX, railStartY);
  ctx.lineTo(railEndXActual, railEndY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Support stands for angled rail
  if (railAngle > 0) {
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 1.5;
    var midX = (railStartX + railEndXActual) / 2;
    var midY = (railStartY + railEndY) / 2;
    ctx.beginPath();
    ctx.moveTo(midX, midY);
    ctx.lineTo(midX, groundY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(railEndXActual, railEndY);
    ctx.lineTo(railEndXActual, groundY);
    ctx.stroke();
  }

  // Rail label
  ctx.font = '500 9px "JetBrains Mono", monospace';
  ctx.fillStyle = mc.dim;
  ctx.textAlign = 'center';
  ctx.fillText(railAngle + '\u00b0', railStartX + 30, railStartY + 20);

  // Balloon position along rail
  var maxRailMeters = 5 + balloonSize * 2; // visual scale
  var progress = Math.min(currentDist / maxRailMeters, 1);
  var bx = railStartX + progress * (railEndXActual - railStartX);
  var by = railStartY + progress * (railEndY - railStartY);

  // Draw exhaust particles
  for (var pi = 0; pi < particles.length; pi++) {
    var p = particles[pi];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = 'rgba(180,210,255,' + (p.life * 0.6) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw balloon
  var bRadius = 10 + balloonSize * 4;
  if (simState === 'flying' && airRemaining > 0) {
    bRadius *= (0.5 + airRemaining * 0.5); // shrinks as air depletes
  } else if (simState === 'flying' && airRemaining <= 0) {
    bRadius *= 0.4; // deflated
  }

  // Balloon body
  var bGrad = ctx.createRadialGradient(bx - bRadius*0.2, by - bRadius*0.2, bRadius*0.1, bx, by, bRadius);
  bGrad.addColorStop(0, 'oklch(0.72 0.18 25)');
  bGrad.addColorStop(1, 'oklch(0.50 0.20 15)');
  ctx.fillStyle = bGrad;
  ctx.beginPath();
  ctx.ellipse(bx, by, bRadius, bRadius * 0.7, -angleRad, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'oklch(0.40 0.15 15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Balloon neck
  var neckDirX = -Math.cos(angleRad);
  var neckDirY = Math.sin(angleRad);
  ctx.fillStyle = 'oklch(0.45 0.12 15)';
  ctx.beginPath();
  ctx.moveTo(bx + neckDirX * bRadius * 0.9, by + neckDirY * bRadius * 0.9 - 4);
  ctx.lineTo(bx + neckDirX * (bRadius + 8), by + neckDirY * (bRadius + 8));
  ctx.lineTo(bx + neckDirX * bRadius * 0.9, by + neckDirY * bRadius * 0.9 + 4);
  ctx.closePath();
  ctx.fill();

  // String attaching balloon to rail
  ctx.strokeStyle = mc.dim;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(bx, by + bRadius * 0.5);
  ctx.lineTo(bx, by + bRadius * 0.5 + 6);
  ctx.stroke();

  // Force arrows during flight
  if (simState === 'flying' && airRemaining > 0) {
    var arrowLen = 30 + thrustForce * 100;
    arrowLen = Math.min(arrowLen, 120);

    // Action arrow: air backward (opposite to travel direction)
    var ax1 = bx + neckDirX * (bRadius + 12);
    var ay1 = by + neckDirY * (bRadius + 12);
    var ax2 = ax1 + neckDirX * arrowLen;
    var ay2 = ay1 + neckDirY * arrowLen;

    drawForceArrow(ctx, ax1, ay1, ax2, ay2, '#ef4444');

    // Reaction arrow: balloon forward
    var rx1 = bx - neckDirX * (bRadius + 12);
    var ry1 = by - neckDirY * (bRadius + 12);
    var rx2 = rx1 - neckDirX * arrowLen;
    var ry2 = ry1 - neckDirY * arrowLen;

    drawForceArrow(ctx, rx1, ry1, rx2, ry2, ACCENT);

    // Labels for arrows -- positioned to avoid overlap
    ctx.font = '600 10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ef4444';
    ctx.fillText(t('actionLbl'), ax1 + neckDirX * arrowLen * 0.5, ay1 + neckDirY * arrowLen * 0.5 + 22);
    ctx.fillStyle = ACCENT;
    ctx.fillText(t('reactLbl'), rx1 - neckDirX * arrowLen * 0.5, ry1 - neckDirY * arrowLen * 0.5 - 14);
  }

  // Friction indicator during flight
  if (simState === 'flying' && currentSpeed > 0.01) {
    var mu = FRICTION_COEFF[frictionLevel] || 0.03;
    if (mu > 0.02) {
      ctx.font = '500 9px "JetBrains Mono", monospace';
      ctx.fillStyle = '#f59e0b';
      ctx.textAlign = 'center';
      ctx.fillText(t('frictionLbl') + ' (\u03bc=' + mu.toFixed(2) + ')', bx, by + bRadius + 30);
    }
  }

  // Flight log (last 5 flights)
  if (flights.length > 0) {
    var logX = w - 160;
    var logY = 30;
    ctx.font = '600 9px "JetBrains Mono", monospace';
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'left';
    ctx.fillText('FLIGHT LOG', logX, logY);
    ctx.font = '500 9px "JetBrains Mono", monospace';
    var showFlights = flights.slice(-5);
    for (var fi = 0; fi < showFlights.length; fi++) {
      var fl = showFlights[fi];
      ctx.fillStyle = mc.dim;
      ctx.fillText('#' + fl.num + '  ' + fl.dist.toFixed(2) + ' m  ' + fl.maxSpeed.toFixed(1) + ' m/s', logX, logY + 16 + fi * 14);
    }
  }

  // Update HUD
  document.getElementById('vThrust').textContent = thrustForce.toFixed(3) + ' N';
  document.getElementById('vReaction').textContent = reactionForce.toFixed(3) + ' N';
  document.getElementById('vSpeed').textContent = currentSpeed.toFixed(2) + ' m/s';
  document.getElementById('vDist').textContent = currentDist.toFixed(2) + ' m';
  document.getElementById('vBest').textContent = bestDistance.toFixed(2) + ' m';
}

function drawForceArrow(c, x1, y1, x2, y2, color) {
  var headLen = 10;
  var angle = Math.atan2(y2 - y1, x2 - x1);
  c.strokeStyle = color;
  c.lineWidth = 2.5;
  c.beginPath();
  c.moveTo(x1, y1);
  c.lineTo(x2, y2);
  c.stroke();
  c.fillStyle = color;
  c.beginPath();
  c.moveTo(x2, y2);
  c.lineTo(x2 - headLen * Math.cos(angle - 0.35), y2 - headLen * Math.sin(angle - 0.35));
  c.lineTo(x2 - headLen * Math.cos(angle + 0.35), y2 - headLen * Math.sin(angle + 0.35));
  c.closePath();
  c.fill();
}

// ================================================================
// Physics simulation
// ================================================================
function startSimulation() {
  if (simState === 'flying') return;
  simState = 'flying';
  simTime = 0;
  balloonX = 0;
  balloonVel = 0;
  airRemaining = 1;
  currentDist = 0;
  currentSpeed = 0;
  thrustForce = 0;
  reactionForce = 0;
  particles = [];
  document.getElementById('btnLaunch').disabled = true;
  document.getElementById('statusLabel').textContent = t('flying');
  document.getElementById('statusVal').textContent = '';
  document.getElementById('statusVal').className = 'status-val';
  requestAnimationFrame(simLoop);
}

var maxSpeedThisRun = 0;

function simLoop() {
  if (simState !== 'flying') return;

  simTime += DT;
  var angleRad = railAngle * Math.PI / 180;
  var mass = BALLOON_MASS_BASE + BALLOON_MASS_PER_SIZE * balloonSize;
  var mu = FRICTION_COEFF[frictionLevel] || 0.03;

  // Thrust from air ejection
  var thrustDuration = AIR_DURATION_PER_SIZE * balloonSize;
  if (simTime < thrustDuration) {
    airRemaining = 1 - simTime / thrustDuration;
    thrustForce = THRUST_PER_SIZE * balloonSize * airRemaining;
  } else {
    airRemaining = 0;
    thrustForce = 0;
  }
  reactionForce = thrustForce; // Newton's Third Law!

  // Net force along rail
  var gravityComponent = mass * GRAVITY * Math.sin(angleRad); // opposes uphill
  var normalForce = mass * GRAVITY * Math.cos(angleRad);
  var frictionForce = mu * normalForce;

  // Only apply friction when moving
  var netForce = reactionForce - gravityComponent;
  if (balloonVel > 0.001) {
    netForce -= frictionForce;
  } else if (netForce < frictionForce && reactionForce > 0) {
    // Static friction -- not enough force to move
    netForce = 0;
  }

  var accel = netForce / mass;
  balloonVel += accel * DT;
  if (balloonVel < 0) balloonVel = 0; // can't go backward on rail
  currentDist += balloonVel * DT;
  currentSpeed = balloonVel;
  if (currentSpeed > maxSpeedThisRun) maxSpeedThisRun = currentSpeed;

  // Generate exhaust particles
  if (airRemaining > 0 && thrustForce > 0) {
    var railStartX = canvasW * 0.08;
    var railEndX = canvasW * 0.92;
    var railLen = railEndX - railStartX;
    var maxRailMeters = 5 + balloonSize * 2;
    var progress = Math.min(currentDist / maxRailMeters, 1);
    var bx = railStartX + progress * (railEndX - railStartX) * Math.cos(angleRad);
    var railStartY = canvasH * 0.72 - 10;
    var by = railStartY - progress * Math.sin(angleRad) * (railEndX - railStartX);
    var neckDirX = -Math.cos(angleRad);
    var neckDirY = Math.sin(angleRad);
    for (var pp = 0; pp < 2; pp++) {
      particles.push({
        x: bx + neckDirX * 20 + (Math.random() - 0.5) * 6,
        y: by + neckDirY * 20 + (Math.random() - 0.5) * 6,
        vx: neckDirX * (60 + Math.random() * 40),
        vy: neckDirY * (60 + Math.random() * 40) - Math.random() * 10,
        r: 2 + Math.random() * 2,
        life: 1,
      });
    }
  }

  // Update particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var pt = particles[i];
    pt.x += pt.vx * DT;
    pt.y += pt.vy * DT;
    pt.life -= DT * 2;
    if (pt.life <= 0) particles.splice(i, 1);
  }

  // Check stop conditions
  if (balloonVel <= 0.001 && airRemaining <= 0 && simTime > 0.5) {
    land();
    return;
  }
  if (currentDist > 50) {
    land();
    return;
  }
  if (simTime > 15) {
    land();
    return;
  }

  draw();
  requestAnimationFrame(simLoop);
}

function land() {
  simState = 'landed';
  thrustForce = 0;
  reactionForce = 0;
  currentSpeed = 0;
  var isRecord = currentDist > bestDistance;
  if (isRecord) bestDistance = currentDist;

  flights.push({
    num: flights.length + 1,
    dist: currentDist,
    maxSpeed: maxSpeedThisRun,
    size: balloonSize,
    angle: railAngle,
    friction: frictionLevel,
  });
  maxSpeedThisRun = 0;

  document.getElementById('btnLaunch').disabled = false;
  document.getElementById('statusLabel').textContent = t('landed');
  if (isRecord) {
    document.getElementById('statusVal').textContent = t('newRecord');
    document.getElementById('statusVal').className = 'status-result pass';
  } else {
    document.getElementById('statusVal').textContent = currentDist.toFixed(2) + ' m';
    document.getElementById('statusVal').className = 'status-val';
  }
  draw();
}

function resetGame() {
  simState = 'ready';
  simTime = 0;
  balloonX = 0;
  balloonVel = 0;
  airRemaining = 0;
  thrustForce = 0;
  reactionForce = 0;
  currentSpeed = 0;
  currentDist = 0;
  particles = [];
  document.getElementById('btnLaunch').disabled = false;
  document.getElementById('statusLabel').textContent = t('ready');
  document.getElementById('statusVal').textContent = '';
  document.getElementById('statusVal').className = 'status-val';
  draw();
}

// ================================================================
// Event binding
// ================================================================
function init() {
  var r = document.documentElement;
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#3d7bb0');
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  // Sliders
  var sSize = document.getElementById('sliderSize');
  var sAngle = document.getElementById('sliderAngle');
  var sFric = document.getElementById('sliderFriction');

  sSize.addEventListener('input', function() {
    balloonSize = parseInt(this.value);
    document.getElementById('valSize').textContent = balloonSize + t('sizeUnit');
    if (simState !== 'flying') draw();
  });

  sAngle.addEventListener('input', function() {
    railAngle = parseInt(this.value);
    document.getElementById('valAngle').textContent = railAngle + t('degUnit');
    if (simState !== 'flying') draw();
  });

  sFric.addEventListener('input', function() {
    frictionLevel = parseInt(this.value);
    document.getElementById('valFriction').textContent = frictionLevel;
    if (simState !== 'flying') draw();
  });

  // Buttons
  document.getElementById('btnLaunch').addEventListener('click', startSimulation);
  document.getElementById('btnReset').addEventListener('click', resetGame);

  // Resize
  window.addEventListener('resize', resizeCanvas);

  // Initial
  refreshI18N();
  resizeCanvas();
}

// Font + delay redraw
document.fonts.ready.then(function() {
  setTimeout(function() {
    init();
  }, 60);
});
</script>
