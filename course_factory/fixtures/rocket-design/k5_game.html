<!DOCTYPE html>
<html lang="zh">
<head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* ── Buttons ── */
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
/* ── Main area ── */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;cursor:crosshair;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
/* ── Challenge indicator ── */
.challenge-chips{display:flex;gap:4px;margin-top:4px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));color:var(--sb-dim,#8e90a6);letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;}
.chip.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.chip.done{color:#22c55e;border-color:#22c55e;background:rgba(34,197,94,0.08);}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle"></div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel"></div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="challengeLabel"></div>
    <div class="challenge-chips" id="challengeChips"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnCheck" disabled></button>
    <button class="reset-btn" id="btnClear"></button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag"></div>
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel"></span>
      <span class="status-val" id="statusVal"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = 'oklch(0.75 0.17 55)'; // mech orange

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(200,140,50,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:        {en:'PATH DRAWER', cn:'\u8def\u5f84\u7ed8\u56fe\u5458'},
  subtitle:     {en:'Draw paths from A to B', cn:'\u4ece A \u753b\u5230 B'},
  guide:        {en:'Click on the canvas to place waypoints.\nYour path will connect the dots.\nMatch the required shape to pass.', cn:'\u5728\u753b\u5e03\u4e0a\u70b9\u51fb\u653e\u7f6e\u8def\u70b9\u3002\n\u8def\u5f84\u4f1a\u8fde\u63a5\u8fd9\u4e9b\u70b9\u3002\n\u5339\u914d\u8981\u6c42\u7684\u5f62\u72b6\u5373\u53ef\u8fc7\u5173\u3002'},
  guideLabel:   {en:'HOW TO PLAY', cn:'\u73a9\u6cd5\u8bf4\u660e'},
  challengeLabel:{en:'CHALLENGES', cn:'\u6311\u6218'},
  hudTag:       {en:'PATH DRAWER', cn:'\u8def\u5f84\u7ed8\u56fe\u5458'},
  hudRound:     {en:'ROUND', cn:'\u5173\u5361'},
  hudScore:     {en:'SCORE', cn:'\u5f97\u5206'},
  hudPaths:     {en:'PATHS', cn:'\u8def\u5f84'},
  statusChallenge:{en:'CHALLENGE', cn:'\u6311\u6218'},
  btnCheck:     {en:'CHECK PATH', cn:'\u68c0\u67e5\u8def\u5f84'},
  btnClear:     {en:'CLEAR', cn:'\u6e05\u9664'},
  chipStraight: {en:'STRAIGHT', cn:'\u76f4\u7ebf'},
  chipCurved:   {en:'CURVED', cn:'\u5f27\u7ebf'},
  chipZigzag:   {en:'ZIGZAG', cn:'\u6298\u7ebf'},
  drawStraight: {en:'Draw a STRAIGHT line from A to B', cn:'\u4ece A \u5230 B \u753b\u4e00\u6761\u76f4\u7ebf'},
  drawCurved:   {en:'Draw a CURVED arc from A to B', cn:'\u4ece A \u5230 B \u753b\u4e00\u6761\u5f27\u7ebf'},
  drawZigzag:   {en:'Draw a ZIGZAG path from A to B', cn:'\u4ece A \u5230 B \u753b\u4e00\u6761\u6298\u7ebf'},
  passMsg:      {en:'PASS!', cn:'\u901a\u8fc7\uff01'},
  failShape:    {en:'Shape does not match. Try again!', cn:'\u5f62\u72b6\u4e0d\u5339\u914d\uff0c\u518d\u8bd5\u4e00\u6b21\uff01'},
  failNoPoints: {en:'Place at least 2 waypoints!', cn:'\u81f3\u5c11\u653e\u7f6e 2 \u4e2a\u8def\u70b9\uff01'},
  failNotA:     {en:'Start your path near A!', cn:'\u8def\u5f84\u8981\u4ece A \u9644\u8fd1\u5f00\u59cb\uff01'},
  failNotB:     {en:'End your path near B!', cn:'\u8def\u5f84\u8981\u5728 B \u9644\u8fd1\u7ed3\u675f\uff01'},
  allDone:      {en:'ALL DONE! Great job!', cn:'\u5168\u90e8\u5b8c\u6210\uff01\u592a\u68d2\u4e86\uff01'},
  nextRound:    {en:'Next challenge starting...', cn:'\u4e0b\u4e00\u4e2a\u6311\u6218\u5f00\u59cb...'},
  startA:       {en:'A', cn:'A'},
  endB:         {en:'B', cn:'B'},
  animating:    {en:'Traveling...', cn:'\u884c\u8fdb\u4e2d...'},
};
function t(k) { return (I18N[k] && I18N[k][LANG]) || (I18N[k] && I18N[k]['en']) || k; }

// ================================================================
// Game state
// ================================================================
var cv = document.getElementById('gc');
var ctx = cv.getContext('2d');
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var W = 0, H = 0;

// Rounds: 5 rounds with different A/B positions
var ROUND_CONFIGS = [
  {shape:'straight', ax:0.15, ay:0.50, bx:0.85, by:0.50},
  {shape:'curved',   ax:0.12, ay:0.65, bx:0.88, by:0.65},
  {shape:'zigzag',   ax:0.15, ay:0.50, bx:0.85, by:0.50},
  {shape:'straight', ax:0.20, ay:0.30, bx:0.80, by:0.70},
  {shape:'curved',   ax:0.10, ay:0.55, bx:0.90, by:0.40},
];

var round = 0;
var score = 0;
var pathsCompleted = 0;
var waypoints = [];    // [{x, y}, ...]
var checkResult = null; // {pass:bool, msg:string} or null
var animDot = null;     // {progress:0..1} or null for traveling dot animation
var animRaf = null;

// A/B positions in pixels (recomputed on resize)
var Ax = 0, Ay = 0, Bx = 0, By = 0;

function computeAB() {
  var cfg = ROUND_CONFIGS[round];
  Ax = Math.round(W * cfg.ax);
  Ay = Math.round(H * cfg.ay);
  Bx = Math.round(W * cfg.bx);
  By = Math.round(H * cfg.by);
}

// ================================================================
// Resize
// ================================================================
function resize() {
  var body = cv.parentElement;
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  W = rect.width; H = rect.height;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  computeAB();
  draw();
}
window.addEventListener('resize', resize);

// ================================================================
// Drawing
// ================================================================
function draw() {
  var mc = gameModeColors();

  // Background
  drawGameBg(ctx, W, H);

  // Target shape hint (dashed, faded)
  drawTargetHint(ctx, mc);

  // User waypoints and path
  if (waypoints.length > 0) {
    var pathColor = mc.accent;
    if (checkResult) pathColor = checkResult.pass ? '#22c55e' : '#ef4444';

    // Draw path lines
    ctx.save();
    ctx.strokeStyle = pathColor;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(waypoints[0].x, waypoints[0].y);
    for (var i = 1; i < waypoints.length; i++) {
      ctx.lineTo(waypoints[i].x, waypoints[i].y);
    }
    ctx.stroke();
    ctx.restore();

    // Draw waypoint dots
    for (var j = 0; j < waypoints.length; j++) {
      ctx.beginPath();
      ctx.arc(waypoints[j].x, waypoints[j].y, 5, 0, Math.PI * 2);
      ctx.fillStyle = pathColor;
      ctx.fill();
      ctx.strokeStyle = mc.text;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Direction arrows along the path
    if (waypoints.length >= 2) {
      for (var k = 0; k < waypoints.length - 1; k++) {
        var p1 = waypoints[k], p2 = waypoints[k+1];
        var mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        var angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        ctx.save();
        ctx.fillStyle = pathColor;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(mx + 7 * Math.cos(angle), my + 7 * Math.sin(angle));
        ctx.lineTo(mx - 5 * Math.cos(angle - 0.5), my - 5 * Math.sin(angle - 0.5));
        ctx.lineTo(mx - 5 * Math.cos(angle + 0.5), my - 5 * Math.sin(angle + 0.5));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }
  }

  // Animated traveling dot
  if (animDot && waypoints.length >= 2) {
    var pos = getPointAlongPath(waypoints, animDot.progress);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 9, 0, Math.PI * 2);
    ctx.fillStyle = '#22c55e';
    ctx.fill();
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Trail
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(34,197,94,0.15)';
    ctx.fill();
  }

  // A and B markers (drawn on top)
  drawMarker(ctx, Ax, Ay, t('startA'), mc);
  drawMarker(ctx, Bx, By, t('endB'), mc);

  // Challenge text on canvas
  var cfg = ROUND_CONFIGS[round];
  var challengeKey = 'draw' + cfg.shape.charAt(0).toUpperCase() + cfg.shape.slice(1);
  ctx.save();
  ctx.font = "bold 13px 'JetBrains Mono','Noto Sans SC',monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = mc.text;
  ctx.globalAlpha = 0.7;
  ctx.fillText(t(challengeKey), W / 2, 30);
  ctx.restore();
}

function drawMarker(c, x, y, label, mc) {
  // Outer glow
  c.beginPath(); c.arc(x, y, 16, 0, Math.PI * 2);
  c.fillStyle = mc.accent; c.globalAlpha = 0.15; c.fill(); c.globalAlpha = 1;
  // Main circle
  c.beginPath(); c.arc(x, y, 12, 0, Math.PI * 2);
  c.fillStyle = mc.accent; c.fill();
  c.strokeStyle = mc.text; c.lineWidth = 2; c.stroke();
  // Label
  c.fillStyle = mc.bg1 || '#05060f';
  c.font = "bold 13px 'JetBrains Mono',monospace";
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, x, y);
}

function drawTargetHint(c, mc) {
  var cfg = ROUND_CONFIGS[round];
  c.save();
  c.strokeStyle = mc.accent;
  c.globalAlpha = 0.15;
  c.lineWidth = 2;
  c.setLineDash([8, 8]);
  c.beginPath();
  if (cfg.shape === 'straight') {
    c.moveTo(Ax, Ay);
    c.lineTo(Bx, By);
  } else if (cfg.shape === 'curved') {
    var peakY = Math.min(Ay, By) - H * 0.3;
    var ctrlXc = (Ax + Bx) / 2;
    c.moveTo(Ax, Ay);
    c.quadraticCurveTo(ctrlXc, peakY, Bx, By);
  } else if (cfg.shape === 'zigzag') {
    var segW = (Bx - Ax) / 4;
    c.moveTo(Ax, Ay);
    c.lineTo(Ax + segW, Ay - H * 0.25);
    c.lineTo(Ax + segW * 2, Ay + H * 0.1);
    c.lineTo(Ax + segW * 3, Ay - H * 0.2);
    c.lineTo(Bx, By);
  }
  c.stroke();
  c.setLineDash([]);
  c.restore();
}

// ================================================================
// Path analysis
// ================================================================
function getPointAlongPath(pts, progress) {
  if (pts.length < 2) return pts[0] || {x:0, y:0};
  var segs = [], totalLen = 0;
  for (var i = 0; i < pts.length - 1; i++) {
    var dx = pts[i+1].x - pts[i].x, dy = pts[i+1].y - pts[i].y;
    var len = Math.sqrt(dx*dx + dy*dy);
    segs.push(len);
    totalLen += len;
  }
  var target = totalLen * progress;
  var acc = 0;
  for (var j = 0; j < segs.length; j++) {
    if (acc + segs[j] >= target) {
      var frac = (target - acc) / segs[j];
      return {
        x: pts[j].x + (pts[j+1].x - pts[j].x) * frac,
        y: pts[j].y + (pts[j+1].y - pts[j].y) * frac,
      };
    }
    acc += segs[j];
  }
  return pts[pts.length - 1];
}

function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1));
}

function detectShape(pts) {
  // Returns 'straight', 'curved', or 'zigzag'
  if (pts.length < 3) return 'straight';

  // Compute direction changes
  var angles = [];
  for (var i = 1; i < pts.length; i++) {
    angles.push(Math.atan2(pts[i].y - pts[i-1].y, pts[i].x - pts[i-1].x));
  }

  // Count direction sign changes in the perpendicular component
  var dirChanges = 0;
  for (var j = 1; j < angles.length; j++) {
    var diff = angles[j] - angles[j-1];
    // Normalize to [-PI, PI]
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    if (Math.abs(diff) > 0.15) dirChanges++;
  }

  // Compute max deviation from straight line A->B
  var startPt = pts[0], endPt = pts[pts.length - 1];
  var lineLen = dist(startPt.x, startPt.y, endPt.x, endPt.y);
  var maxDev = 0;
  if (lineLen > 1) {
    for (var k = 1; k < pts.length - 1; k++) {
      // Point-to-line distance
      var d = Math.abs(
        (endPt.y - startPt.y) * pts[k].x -
        (endPt.x - startPt.x) * pts[k].y +
        endPt.x * startPt.y -
        endPt.y * startPt.x
      ) / lineLen;
      if (d > maxDev) maxDev = d;
    }
  }
  var devRatio = maxDev / Math.max(lineLen, 1);

  // Compute curvature sign changes (for zigzag detection)
  var crossSigns = [];
  for (var m = 1; m < pts.length - 1; m++) {
    var v1x = pts[m].x - pts[m-1].x, v1y = pts[m].y - pts[m-1].y;
    var v2x = pts[m+1].x - pts[m].x, v2y = pts[m+1].y - pts[m].y;
    var cross = v1x * v2y - v1y * v2x;
    if (Math.abs(cross) > 0.5) crossSigns.push(cross > 0 ? 1 : -1);
  }
  var signChanges = 0;
  for (var n = 1; n < crossSigns.length; n++) {
    if (crossSigns[n] !== crossSigns[n-1]) signChanges++;
  }

  // Classification
  // Zigzag: multiple direction reversals (sign changes >= 2)
  if (signChanges >= 2 && devRatio > 0.05) return 'zigzag';
  // Straight: very low deviation from straight line
  if (devRatio < 0.08 && dirChanges < pts.length * 0.3) return 'straight';
  // Curved: consistent curvature (few sign changes), noticeable deviation
  if (devRatio >= 0.08 && signChanges <= 1) return 'curved';
  // Fallback: if high deviation but some sign changes, likely zigzag
  if (signChanges >= 2) return 'zigzag';
  if (devRatio >= 0.05) return 'curved';
  return 'straight';
}

function checkPath() {
  if (waypoints.length < 2) {
    checkResult = {pass: false, msg: t('failNoPoints')};
    updateStatus();
    draw();
    return;
  }

  var threshold = Math.max(W, H) * 0.08;
  var firstPt = waypoints[0];
  var lastPt = waypoints[waypoints.length - 1];

  // Check start near A
  if (dist(firstPt.x, firstPt.y, Ax, Ay) > threshold) {
    checkResult = {pass: false, msg: t('failNotA')};
    updateStatus();
    draw();
    return;
  }

  // Check end near B
  if (dist(lastPt.x, lastPt.y, Bx, By) > threshold) {
    checkResult = {pass: false, msg: t('failNotB')};
    updateStatus();
    draw();
    return;
  }

  var detected = detectShape(waypoints);
  var required = ROUND_CONFIGS[round].shape;

  if (detected === required) {
    checkResult = {pass: true, msg: t('passMsg')};
    score += 100;
    pathsCompleted++;
    updateHUD();
    updateStatus();
    draw();
    // Animate traveling dot
    startTravelAnimation();
  } else {
    checkResult = {pass: false, msg: t('failShape')};
    updateStatus();
    draw();
  }
}

function startTravelAnimation() {
  animDot = {progress: 0};
  var last = performance.now();
  function tick(now) {
    var dt = (now - last) / 1000;
    last = now;
    animDot.progress = Math.min(animDot.progress + dt * 0.5, 1);
    draw();
    if (animDot.progress < 1) {
      animRaf = requestAnimationFrame(tick);
    } else {
      animDot = null;
      // After animation, advance to next round
      setTimeout(function() {
        if (round < ROUND_CONFIGS.length - 1) {
          round++;
          waypoints = [];
          checkResult = null;
          computeAB();
          updateAll();
        } else {
          // All done
          checkResult = {pass: true, msg: t('allDone')};
          updateStatus();
          draw();
        }
      }, 600);
    }
  }
  animRaf = requestAnimationFrame(tick);
}

// ================================================================
// Input handling -- click to place waypoints
// ================================================================
function getCanvasPos(e) {
  var rect = cv.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: clientX - rect.left,
    y: clientY - rect.top,
  };
}

cv.addEventListener('click', function(e) {
  if (animDot) return; // Don't place points during animation
  if (checkResult && checkResult.pass) return; // Already passed

  var pos = getCanvasPos(e);
  waypoints.push(pos);

  // Reset any previous fail result
  if (checkResult && !checkResult.pass) checkResult = null;

  document.getElementById('btnCheck').disabled = (waypoints.length < 2);
  updateStatus();
  draw();
});

// Touch support
cv.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (animDot) return;
  if (checkResult && checkResult.pass) return;

  var pos = getCanvasPos(e.changedTouches ? {clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY} : e);
  waypoints.push(pos);
  if (checkResult && !checkResult.pass) checkResult = null;
  document.getElementById('btnCheck').disabled = (waypoints.length < 2);
  updateStatus();
  draw();
});

// ================================================================
// UI updates
// ================================================================
function updateHUD() {
  document.getElementById('hudV1').textContent = (round + 1) + ' / ' + ROUND_CONFIGS.length;
  document.getElementById('hudV2').textContent = score;
  document.getElementById('hudV3').textContent = pathsCompleted + ' / ' + ROUND_CONFIGS.length;
}

function updateStatus() {
  var statusResult = document.getElementById('statusResult');
  if (checkResult) {
    statusResult.textContent = checkResult.msg;
    statusResult.className = 'status-result ' + (checkResult.pass ? 'pass' : 'fail');
  } else if (animDot) {
    statusResult.textContent = t('animating');
    statusResult.className = 'status-result';
  } else {
    statusResult.textContent = '';
    statusResult.className = 'status-result';
  }
}

function updateChips() {
  var container = document.getElementById('challengeChips');
  container.innerHTML = '';
  var shapes = ['straight', 'curved', 'zigzag'];
  var chipKeys = ['chipStraight', 'chipCurved', 'chipZigzag'];
  for (var i = 0; i < shapes.length; i++) {
    var chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = t(chipKeys[i]);
    // Mark current shape as active
    if (ROUND_CONFIGS[round].shape === shapes[i]) chip.classList.add('active');
    // Mark completed shapes
    var completedThisShape = false;
    for (var r = 0; r < round; r++) {
      if (ROUND_CONFIGS[r].shape === shapes[i]) completedThisShape = true;
    }
    if (completedThisShape) chip.classList.add('done');
    container.appendChild(chip);
  }
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('challengeLabel').textContent = t('challengeLabel');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hudL1').textContent = t('hudRound');
  document.getElementById('hudL2').textContent = t('hudScore');
  document.getElementById('hudL3').textContent = t('hudPaths');
  document.getElementById('statusLabel').textContent = t('statusChallenge');
  document.getElementById('btnCheck').textContent = t('btnCheck');
  document.getElementById('btnClear').textContent = t('btnClear');
  document.getElementById('langBtn').textContent = LANG === 'cn' ? 'EN' : 'CN';
  updateChips();
  updateHUD();
  updateStatus();
  draw();
}

function updateAll() {
  refreshI18N();
  document.getElementById('btnCheck').disabled = (waypoints.length < 2);
}

// ================================================================
// Button handlers
// ================================================================
document.getElementById('btnCheck').addEventListener('click', function() {
  checkPath();
});

document.getElementById('btnClear').addEventListener('click', function() {
  if (animDot) return;
  waypoints = [];
  checkResult = null;
  document.getElementById('btnCheck').disabled = true;
  updateStatus();
  draw();
});

document.getElementById('langBtn').addEventListener('click', function() {
  LANG = LANG === 'en' ? 'cn' : 'en';
  refreshI18N();
});

// ================================================================
// Init
// ================================================================
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();

function setupLangToggle() {
  // Already handled above
}

// Initial sizing and render
setTimeout(function() { resize(); updateAll(); }, 100);
setTimeout(resize, 400);
document.fonts.ready.then(function() { resize(); updateAll(); });

</script>
