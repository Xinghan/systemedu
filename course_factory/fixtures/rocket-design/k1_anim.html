<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script>
/**
 * Animation Runtime -- shared skeleton for all course factory animations.
 *
 * Layout: sidebar (200px left column) contains lang-btn, style-mode
 * switcher, title, subtitle, frame indicator, and guide panel. The canvas
 * occupies the remaining right area with ZERO overlapping elements.
 *
 * Visual Modes: three built-in visual modes switchable via sidebar buttons:
 *   - 'light'     Technical Blueprint -- light bg, dark linework, CAD grid
 *   - 'dark'      Dark Editorial -- near-black, single-hue accent, minimal
 *   - 'cyberpunk' Sci-Fi Hologram -- deep blue, glow, scanlines, brackets
 *
 * Required globals before boot():
 *   - CONFIG: { title, subtitle, totalFrames, hudLabels, hudValues, guideItems, style }
 *   - getFrameElements(f, W, H): returns element array for frame f
 *
 * Optional globals:
 *   - drawBg(ctx, W, H, mode): draws background (mode = 'light'|'dark'|'cyberpunk')
 *   - customDrawElement(ctx, el, W, H): return true if handled
 *   - onReady(): called after boot
 */

var AnimRuntime = (function () {
  'use strict';

  var cv, ctx, W = 800, H = 400;
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var currentFrame = 0, totalFrames = 4;
  var transitioning = false, playing = false, playTimer = null;
  var LANG = 'cn';
  var I18N = {};

  var VISUAL_MODE = 'cyberpunk';
  var VISUAL_MODES = {
    light: {
      label: 'LIGHT',
      canvasBg1: '#fafaf5', canvasBg2: '#f0f0ea',
      canvasGrid: 'rgba(15,23,42,0.04)', canvasGridWidth: 0.5,
      canvasText: '#0f172a', canvasTextDim: '#475569', canvasTextMute: '#94a3b8',
      canvasStroke: '#0f172a', canvasStrokeDim: 'rgba(15,23,42,0.3)',
      canvasAccent: null, canvasGlow: false,
      canvasCornerBrackets: false, canvasScanlines: false,
      canvasInnerBorder: true, canvasInnerBorderColor: 'rgba(15,23,42,0.2)',
      sidebarBg: 'rgba(250,250,245,0.96)', sidebarBorder: '#d4d4c8',
      sidebarText: '#0f172a', sidebarTextDim: '#475569', sidebarTextMute: '#94a3b8',
      sidebarAccent: null, sidebarBtnBg: 'transparent', sidebarBtnBorder: null,
      hudBg: 'rgba(250,250,245,0.92)', hudBorder: '#d4d4c8',
      hudLabel: '#64748b', hudValue: '#0f172a',
      ctrlBg: '#0f172a', ctrlColor: '#fafaf5',
    },
    dark: {
      label: 'DARK',
      canvasBg1: '#0a0a0a', canvasBg2: '#111111',
      canvasGrid: 'rgba(255,255,255,0.03)', canvasGridWidth: 0.5,
      canvasText: '#e5e5e5', canvasTextDim: '#a3a3a3', canvasTextMute: '#525252',
      canvasStroke: '#e5e5e5', canvasStrokeDim: 'rgba(255,255,255,0.2)',
      canvasAccent: null, canvasGlow: false,
      canvasCornerBrackets: false, canvasScanlines: false,
      canvasInnerBorder: false, canvasTopLine: true,
      sidebarBg: 'rgba(10,10,10,0.96)', sidebarBorder: '#1f1f1f',
      sidebarText: '#fafafa', sidebarTextDim: '#737373', sidebarTextMute: '#525252',
      sidebarAccent: null, sidebarBtnBg: 'transparent', sidebarBtnBorder: '#262626',
      hudBg: 'rgba(10,10,10,0.9)', hudBorder: '#1f1f1f',
      hudLabel: '#525252', hudValue: null,
      ctrlBg: null, ctrlColor: null,
    },
    cyberpunk: {
      label: 'CYBER',
      canvasBg1: '#05060f', canvasBg2: '#0d0e1a',
      canvasGrid: null, canvasGridWidth: 0.5,
      canvasText: '#e2e8f0', canvasTextDim: '#cbd5e1', canvasTextMute: '#64748b',
      canvasStroke: '#e2e8f0', canvasStrokeDim: 'rgba(255,255,255,0.12)',
      canvasAccent: null, canvasGlow: true,
      canvasCornerBrackets: true, canvasScanlines: true,
      canvasInnerBorder: false, canvasTopLine: false,
      sidebarBg: 'rgba(5,6,15,0.92)', sidebarBorder: null,
      sidebarText: null, sidebarTextDim: null, sidebarTextMute: null,
      sidebarAccent: null, sidebarBtnBg: 'transparent', sidebarBtnBorder: null,
      hudBg: 'rgba(5,6,15,0.9)', hudBorder: null,
      hudLabel: null, hudValue: null,
      ctrlBg: null, ctrlColor: '#05060f',
    },
  };

  var REF_W = 700, REF_H = 400;
  var _vw = REF_W, _vh = REF_H;

  var _BASE = {
    bg: 'oklch(0.14 0.035 265)', bg2: 'oklch(0.18 0.04 265)', surface: 'oklch(0.22 0.045 265)',
    text: 'oklch(0.96 0.01 265)', muted: 'oklch(0.55 0.03 265)',
    error: 'oklch(0.70 0.18 25)', outline: 'oklch(0.55 0.03 265)',
    glass: 'oklch(0.18 0.04 265 / 0.7)', glassBlur: 12, radius: '14px',
  };
  function _theme(primary, primaryDim, secondary, secondaryDim, tertiary, tertiaryDim, glow, glowStrong) {
    return Object.assign({}, _BASE, {
      primary: primary, primaryDim: primaryDim,
      secondary: secondary, secondaryDim: secondaryDim,
      tertiary: tertiary, tertiaryDim: tertiaryDim,
      glow: glow, glowStrong: glowStrong,
    });
  }
  var PALETTES = {
    cs: _theme('oklch(0.75 0.17 200)','oklch(0.55 0.16 200)','oklch(0.92 0.08 190)','oklch(0.35 0.10 210)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.75 0.17 200 / 0.1)','oklch(0.75 0.17 200 / 0.25)'),
    bio: _theme('oklch(0.75 0.17 155)','oklch(0.55 0.16 155)','oklch(0.92 0.08 150)','oklch(0.35 0.10 160)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.75 0.17 155 / 0.1)','oklch(0.75 0.17 155 / 0.25)'),
    space: _theme('oklch(0.72 0.17 295)','oklch(0.52 0.16 295)','oklch(0.92 0.08 295)','oklch(0.35 0.10 290)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.72 0.17 295 / 0.1)','oklch(0.72 0.17 295 / 0.25)'),
    mech: _theme('oklch(0.75 0.17 55)','oklch(0.55 0.16 50)','oklch(0.92 0.08 60)','oklch(0.35 0.10 60)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.75 0.17 55 / 0.1)','oklch(0.75 0.17 55 / 0.25)'),
    ai: _theme('oklch(0.72 0.17 335)','oklch(0.52 0.16 335)','oklch(0.92 0.08 335)','oklch(0.35 0.10 330)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.72 0.17 335 / 0.1)','oklch(0.72 0.17 335 / 0.25)'),
    math: _theme('oklch(0.72 0.17 245)','oklch(0.52 0.16 245)','oklch(0.92 0.08 240)','oklch(0.35 0.10 245)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.72 0.17 245 / 0.1)','oklch(0.72 0.17 245 / 0.25)'),
    med: _theme('oklch(0.75 0.16 15)','oklch(0.55 0.15 15)','oklch(0.92 0.08 15)','oklch(0.35 0.10 15)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.75 0.16 15 / 0.1)','oklch(0.75 0.16 15 / 0.25)'),
    chem: _theme('oklch(0.82 0.17 125)','oklch(0.62 0.16 125)','oklch(0.95 0.08 120)','oklch(0.35 0.10 130)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.82 0.17 125 / 0.1)','oklch(0.82 0.17 125 / 0.25)'),
    phys: _theme('oklch(0.78 0.13 215)','oklch(0.55 0.13 215)','oklch(0.92 0.08 215)','oklch(0.35 0.10 215)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.78 0.13 215 / 0.1)','oklch(0.78 0.13 215 / 0.25)'),
    env: _theme('oklch(0.72 0.15 140)','oklch(0.52 0.13 140)','oklch(0.92 0.08 140)','oklch(0.35 0.10 140)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.72 0.15 140 / 0.1)','oklch(0.72 0.15 140 / 0.25)'),
    robo: _theme('oklch(0.82 0.15 95)','oklch(0.55 0.14 95)','oklch(0.95 0.08 95)','oklch(0.35 0.10 95)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.82 0.15 95 / 0.1)','oklch(0.82 0.15 95 / 0.25)'),
    elec: _theme('oklch(0.72 0.17 275)','oklch(0.52 0.16 275)','oklch(0.92 0.08 275)','oklch(0.35 0.10 275)','oklch(0.85 0.14 85)','oklch(0.65 0.12 85)','oklch(0.72 0.17 275 / 0.1)','oklch(0.72 0.17 275 / 0.25)'),
    helix_lab: null, aether_clinic: null, ares_mission: null,
    celestial_observatory: null, neural_circuit: null, subatomic_matrix: null,
    rocketry_control: null, aqua_flow: null, ember_forge: null, flora_pulse: null,
  };
  PALETTES.helix_lab = PALETTES.bio;
  PALETTES.aether_clinic = PALETTES.med;
  PALETTES.ares_mission = PALETTES.space;
  PALETTES.celestial_observatory = PALETTES.phys;
  PALETTES.neural_circuit = PALETTES.ai;
  PALETTES.subatomic_matrix = PALETTES.math;
  PALETTES.rocketry_control = PALETTES.space;
  PALETTES.aqua_flow = PALETTES.env;
  PALETTES.ember_forge = PALETTES.mech;
  PALETTES.flora_pulse = PALETTES.bio;

  var PAL = PALETTES.cs;

  function lerp(a, b, p) { return a + (b - a) * p; }
  function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

  function interpolate(value, input, output, opts) {
    var n = input.length;
    var easing = (opts && opts.easing) || null;
    var clamp = !(opts && opts.extrapolate === 'extend');
    if (value <= input[0]) {
      if (clamp) return output[0];
      var p0 = (value - input[0]) / (input[1] - input[0]);
      return lerp(output[0], output[1], easing ? easing(p0) : p0);
    }
    if (value >= input[n - 1]) {
      if (clamp) return output[n - 1];
      var pn = (value - input[n - 2]) / (input[n - 1] - input[n - 2]);
      return lerp(output[n - 2], output[n - 1], easing ? easing(pn) : pn);
    }
    for (var i = 1; i < n; i++) {
      if (value <= input[i]) {
        var p = (value - input[i - 1]) / (input[i] - input[i - 1]);
        if (easing) p = easing(p);
        return lerp(output[i - 1], output[i], p);
      }
    }
    return output[n - 1];
  }
  function merge(base, ov) { var r = {}; for (var k in base) r[k] = base[k]; for (var k2 in ov) r[k2] = ov[k2]; return r; }

  function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

  function _buildI18N(cfg) {
    I18N = {
      btnPlay:  { en: 'PLAY',  cn: '\u64ad\u653e' },
      btnPause: { en: 'PAUSE', cn: '\u6682\u505c' },
      btnPrev:  { en: 'PREV',  cn: '\u4e0a\u4e00\u5e27' },
      btnNext:  { en: 'NEXT',  cn: '\u4e0b\u4e00\u5e27' },
      guideDefault: { en: 'GUIDE', cn: '\u89c2\u770b\u6307\u5357' },
    };
    if (cfg.i18n) { for (var k in cfg.i18n) I18N[k] = cfg.i18n[k]; }
  }

  function _modeColors() {
    var m = VISUAL_MODES[VISUAL_MODE] || VISUAL_MODES.cyberpunk;
    return {
      bg1: m.canvasBg1, bg2: m.canvasBg2,
      grid: m.canvasGrid, gridW: m.canvasGridWidth || 0.5,
      text: m.canvasText || PAL.text, dim: m.canvasTextDim || PAL.muted,
      mute: m.canvasTextMute || PAL.muted,
      stroke: m.canvasStroke || PAL.text, strokeDim: m.canvasStrokeDim || PAL.muted,
      accent: m.canvasAccent || PAL.primary,
      glow: !!m.canvasGlow, cornerBrackets: !!m.canvasCornerBrackets,
      scanlines: !!m.canvasScanlines, innerBorder: !!m.canvasInnerBorder,
      innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
      topLine: !!m.canvasTopLine,
    };
  }

  function _applyVisualMode(mode) {
    VISUAL_MODE = mode;
    var m = VISUAL_MODES[mode] || VISUAL_MODES.cyberpunk;
    var root = document.documentElement;
    root.style.setProperty('--sb-bg',     m.sidebarBg || 'rgba(5,6,15,0.92)');
    root.style.setProperty('--sb-border', m.sidebarBorder || (m.canvasAccent || PAL.primary));
    root.style.setProperty('--sb-text',   m.sidebarText || PAL.text);
    root.style.setProperty('--sb-dim',    m.sidebarTextDim || PAL.muted);
    root.style.setProperty('--sb-mute',   m.sidebarTextMute || PAL.muted);
    root.style.setProperty('--sb-accent', m.sidebarAccent || PAL.primary);
    root.style.setProperty('--sb-btn-bg', m.sidebarBtnBg || 'transparent');
    root.style.setProperty('--sb-btn-bd', m.sidebarBtnBorder || 'transparent');
    root.style.setProperty('--hud-bg',    m.hudBg || 'rgba(5,6,15,0.9)');
    root.style.setProperty('--hud-border',m.hudBorder || 'transparent');
    root.style.setProperty('--hud-label', m.hudLabel || PAL.muted);
    root.style.setProperty('--hud-value', m.hudValue || PAL.text);
    root.style.setProperty('--ctrl-bg',   m.ctrlBg || PAL.primary);
    root.style.setProperty('--ctrl-color',m.ctrlColor || PAL.bg);
    document.querySelectorAll('.vm-btn').forEach(function(b) {
      b.classList.toggle('vm-active', b.dataset.mode === mode);
    });
    drawFrame(currentFrame);
  }

  function _buildStyleSwitcher() {
    var container = document.getElementById('styleSwitcher');
    if (!container) return;
    container.innerHTML = '';
    ['light', 'dark', 'cyberpunk'].forEach(function(mKey) {
      var m = VISUAL_MODES[mKey];
      var btn = document.createElement('button');
      btn.className = 'vm-btn' + (mKey === VISUAL_MODE ? ' vm-active' : '');
      btn.dataset.mode = mKey;
      btn.textContent = m.label;
      btn.addEventListener('click', function() { _applyVisualMode(mKey); });
      container.appendChild(btn);
    });
  }

  function _defaultDrawBg(c, w, h) {
    var mc = _modeColors();
    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
    c.fillStyle = g; c.fillRect(0, 0, w, h);
    var gridColor = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/, '0.06)') : 'rgba(255,255,255,0.04)');
    c.strokeStyle = gridColor; c.lineWidth = mc.gridW;
    var step = VISUAL_MODE === 'light' ? 24 : 64;
    for (var x = 0; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
    for (var y = 0; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }
    if (mc.innerBorder) { c.strokeStyle = mc.innerBorderColor; c.lineWidth = 0.5; c.strokeRect(6, 6, w - 12, h - 12); }
    if (mc.topLine) {
      var tg = c.createLinearGradient(w * 0.15, 0, w * 0.85, 0);
      tg.addColorStop(0, 'transparent'); tg.addColorStop(0.4, mc.accent); tg.addColorStop(0.6, mc.accent); tg.addColorStop(1, 'transparent');
      c.strokeStyle = tg; c.lineWidth = 1; c.beginPath(); c.moveTo(0, 0.5); c.lineTo(w, 0.5); c.stroke();
    }
    if (mc.scanlines) { c.strokeStyle = 'rgba(255,255,255,0.025)'; c.lineWidth = 1; for (var sy = 0; sy < h; sy += 3) { c.beginPath(); c.moveTo(0, sy); c.lineTo(w, sy); c.stroke(); } }
    if (mc.cornerBrackets) {

// Draw a coil spring horizontally
function drawSpringCoil(c, x, y, len, coils, amp, thick, color) {
  c.save();
  c.strokeStyle = color; c.lineWidth = thick;
  c.lineCap = 'round'; c.lineJoin = 'round';
  c.beginPath(); c.moveTo(x, y);
  var seg = len / (coils * 2);

    c.lineTo(x + (i + 1) * seg, y + (i % 2 === 0 ? -amp : amp));
  }
  c.lineTo(x + len, y); c.stroke();
  c.restore();
}

  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fill();
  c.restore();

  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x - r * 0.25, y - r * 0.3, r * 0.13, 0, Math.PI * 2); c.fill();
  c.restore();
}

// Draw wall bracket with hatch lines
function drawWallBracket(c, x, y, h, mc) {
  c.save();
  c.fillStyle = mc.dim;
  c.globalAlpha = 0.35;
  c.fillRect(x - 10, y - h / 2, 10, h);
  c.globalAlpha = 0.12;
  c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
  for (var hy = y - h / 2; hy < y + h / 2; hy += 7) {
    c.beginPath(); c.moveTo(x - 10, hy); c.lineTo(x - 2, hy + 5); c.stroke();
  }
  c.restore();
}

// Draw a ground line
function drawGroundLine(c, y, W, mc) {
  c.save();
  c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
  c.beginPath(); c.moveTo(20, y); c.lineTo(W - 20, y); c.stroke();
  // hatch marks
  c.globalAlpha = 0.3;
  for (var hx = 30; hx < W - 20; hx += 18) {
    c.beginPath(); c.moveTo(hx, y + 2); c.lineTo(hx - 4, y + 10); c.stroke();
  }
  c.restore();
}

// Draw a force arrow with label (thick, colored, with glow in cyber mode)
function drawForceArrow(c, x1, y1, x2, y2, color, label, labelY, mc) {
  var angle = Math.atan2(y2 - y1, x2 - x1);
  var headSize = 10;

  c.save();
  if (mc.glow) { c.shadowColor = color; c.shadowBlur = 12; }
  c.strokeStyle = color; c.lineWidth = 3;
  c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
  c.fillStyle = color; c.beginPath();
  c.moveTo(x2, y2);
  c.lineTo(x2 - headSize * Math.cos(angle - 0.35), y2 - headSize * Math.sin(angle - 0.35));
  c.lineTo(x2 - headSize * Math.cos(angle + 0.35), y2 - headSize * Math.sin(angle + 0.35));
  c.closePath(); c.fill();
  c.restore();

  // Label
  if (label) {
    c.save();
    c.font = "bold 11px 'JetBrains Mono',monospace";
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillStyle = color;
    c.fillText(label, (x1 + x2) / 2, labelY);
    c.restore();
  }
}

// Draw a simple box (crate)
function drawCrate(c, x, y, w, h, mc) {
  c.save();
  var g = c.createLinearGradient(x, y, x + w, y);
  g.addColorStop(0, '#5a4a32'); g.addColorStop(0.5, '#7a6a52'); g.addColorStop(1, '#4a3a22');
  c.fillStyle = g;
  c.fillRect(x, y, w, h);
  // cross lines
  c.strokeStyle = mc.strokeDim; c.lineWidth = 1;
  c.beginPath(); c.moveTo(x, y); c.lineTo(x + w, y + h); c.stroke();
  c.beginPath(); c.moveTo(x + w, y); c.lineTo(x, y + h); c.stroke();
  // border
  c.strokeStyle = mc.stroke; c.lineWidth = 1.5; c.globalAlpha = 0.4;
  c.strokeRect(x, y, w, h);
  c.restore();
}

// Draw rope (dashed line with knots)
function drawRope(c, x1, y1, x2, y2, mc) {
  c.save();
  c.strokeStyle = mc.dim; c.lineWidth = 3; c.lineCap = 'round';
  c.setLineDash([6, 4]);
  c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
  c.setLineDash([]);
  // knots at ends
  c.fillStyle = mc.dim;
  c.beginPath(); c.arc(x1, y1, 3, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x2, y2, 3, 0, Math.PI * 2); c.fill();
  c.restore();
}

// ============================================================
// FRAME ELEMENTS
// ============================================================

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var mc = AnimRuntime.modeColors;
  var cx = W / 2, cy = H / 2;

  // Frame 0: Title screen
  if (f === 0) {
    return [
      {id:'title0', type:'label', text:t('title'), x:cx, y:cy - 50, color:mc.accent, size:28, align:'center', glow: mc.glow ? mc.accent : null},
      {id:'sub0', type:'label', text:t('f0sub'), x:cx, y:cy, color:mc.dim, size:14, align:'center', bold:false},
      {id:'deco0a', type:'line', x1:cx - 100, y1:cy + 30, x2:cx + 100, y2:cy + 30, color:mc.strokeDim, lineWidth:1},
      {id:'hint0', type:'text', text:t('g1'), x:cx, y:cy + 55, color:mc.mute, size:11, align:'center'},
      // Decorative arrows showing push and pull concept
      {id:'pushArr0', type:'arrow', x1:cx - 120, y1:cy + 100, x2:cx - 50, y2:cy + 100, color:P.primary, lineWidth:2, headSize:8},
      {id:'pushLbl0', type:'text', text:t('f3push'), x:cx - 85, y:cy + 85, color:P.primary, size:10, align:'center'},
      {id:'pullArr0', type:'arrow', x1:cx + 120, y1:cy + 100, x2:cx + 50, y2:cy + 100, color:P.secondary, lineWidth:2, headSize:8},
      {id:'pullLbl0', type:'text', text:t('f3pull'), x:cx + 85, y:cy + 85, color:P.secondary, size:10, align:'center'},
    ];
  }

  // Frame 1: Spring push demo
  if (f === 1) {
    var groundY = H * 0.78;
    var wallX = W * 0.15;
    var springEnd = W * 0.38;
    var ballR = 18;
    var ballX = springEnd + ballR + 6;
    var ballY = groundY - ballR;

    return [
      {id:'f1t', type:'label', text:t('f1title'), x:cx, y:30, color:mc.accent, size:16, align:'center'},
      {id:'f1desc', type:'text', text:t('f1desc'), x:cx, y:52, color:mc.dim, size:11, align:'center'},
      // Wall
      {id:'wall1', type:'custom', x:wallX, y:groundY * 0.55, alpha:1, draw: function(c) {
        drawWallBracket(c, wallX, groundY * 0.55, groundY * 0.7, mc);
      }},
      // Ground
      {id:'ground1', type:'custom', x:0, y:groundY, alpha:1, draw: function(c) {
        drawGroundLine(c, groundY, W, mc);
      }},
      // Spring
      {id:'spring1', type:'custom', x:wallX, y:ballY, alpha:1, draw: function(c) {
        drawSpringCoil(c, wallX, ballY, springEnd - wallX, 8, 10, 3, P.primary);
      }},
      // Ball
      {id:'ball1', type:'custom', x:ballX, y:ballY, r:ballR, alpha:1, draw: function(c) {
        drawMetalBall(c, ballX, ballY, ballR, '#f97316', '#ffcc80');
      }},
      // Force arrow (push to right)
      {id:'forceArr1', type:'custom', x:ballX, y:ballY, alpha:1, draw: function(c) {
        drawForceArrow(c, ballX + ballR + 8, ballY, ballX + ballR + 70, ballY, P.primary, t('f1force'), ballY - 20, mc);
      }},
      // Labels
      {id:'lbl_spring', type:'text', text:t('f1spring'), x:(wallX + springEnd) / 2, y:groundY + 16, color:mc.mute, size:10, align:'center'},
      {id:'lbl_ball', type:'text', text:t('f1ball'), x:ballX, y:groundY + 16, color:mc.mute, size:10, align:'center'},
      {id:'lbl_wall', type:'text', text:t('f1wall'), x:wallX - 16, y:groundY + 16, color:mc.mute, size:10, align:'center'},
      // Motion lines
      {id:'motion1a', type:'line', x1:ballX + ballR + 80, y1:ballY - 6, x2:ballX + ballR + 100, y2:ballY - 6, color:mc.strokeDim, lineWidth:1},
      {id:'motion1b', type:'line', x1:ballX + ballR + 84, y1:ballY, x2:ballX + ballR + 104, y2:ballY, color:mc.strokeDim, lineWidth:1},
      {id:'motion1c', type:'line', x1:ballX + ballR + 80, y1:ballY + 6, x2:ballX + ballR + 100, y2:ballY + 6, color:mc.strokeDim, lineWidth:1},
    ];
  }

  // Frame 2: Rope pull demo
  if (f === 2) {
    var groundY2 = H * 0.78;
    var hookX = W * 0.18;
    var ropeEndX = W * 0.42;
    var boxW = 40, boxH = 36;
    var boxX = ropeEndX + 4;
    var boxY = groundY2 - boxH;

    return [
      {id:'f2t', type:'label', text:t('f2title'), x:cx, y:30, color:mc.accent, size:16, align:'center'},
      {id:'f2desc', type:'text', text:t('f2desc'), x:cx, y:52, color:mc.dim, size:11, align:'center'},
      // Ground
      {id:'ground2', type:'custom', x:0, y:groundY2, alpha:1, draw: function(c) {
        drawGroundLine(c, groundY2, W, mc);
      }},
      // Hook on wall
      {id:'hook2', type:'custom', x:hookX, y:groundY2 - boxH / 2, alpha:1, draw: function(c) {
        drawWallBracket(c, hookX, groundY2 - boxH / 2, boxH * 1.5, mc);
        // hook curve
        c.save();
        c.strokeStyle = mc.accent; c.lineWidth = 2.5;
        c.beginPath();
        c.arc(hookX + 4, groundY2 - boxH / 2, 6, -Math.PI / 2, Math.PI / 2);
        c.stroke();
        c.restore();
      }},
      // Rope
      {id:'rope2', type:'custom', x:hookX, y:groundY2 - boxH / 2, alpha:1, draw: function(c) {
        drawRope(c, hookX + 10, groundY2 - boxH / 2, boxX, boxY + boxH / 2, mc);
      }},
      // Box
      {id:'box2', type:'custom', x:boxX, y:boxY, alpha:1, draw: function(c) {
        drawCrate(c, boxX, boxY, boxW, boxH, mc);
      }},
      // Force arrow (pull to left)
      {id:'forceArr2', type:'custom', x:boxX, y:boxY, alpha:1, draw: function(c) {
        drawForceArrow(c, boxX - 8, boxY + boxH / 2, boxX - 70, boxY + boxH / 2, P.secondary, t('f2force'), boxY + boxH / 2 - 20, mc);
      }},
      // Labels
      {id:'lbl_hook', type:'text', text:t('f2hook'), x:hookX - 14, y:groundY2 + 16, color:mc.mute, size:10, align:'center'},
      {id:'lbl_rope', type:'text', text:t('f2rope'), x:(hookX + boxX) / 2, y:groundY2 + 16, color:mc.mute, size:10, align:'center'},
      {id:'lbl_box', type:'text', text:t('f2box'), x:boxX + boxW / 2, y:groundY2 + 16, color:mc.mute, size:10, align:'center'},
      // Motion lines (to the left)
      {id:'motion2a', type:'line', x1:boxX - 80, y1:boxY + boxH / 2 - 6, x2:boxX - 100, y2:boxY + boxH / 2 - 6, color:mc.strokeDim, lineWidth:1},
      {id:'motion2b', type:'line', x1:boxX - 76, y1:boxY + boxH / 2, x2:boxX - 96, y2:boxY + boxH / 2, color:mc.strokeDim, lineWidth:1},
      {id:'motion2c', type:'line', x1:boxX - 80, y1:boxY + boxH / 2 + 6, x2:boxX - 100, y2:boxY + boxH / 2 + 6, color:mc.strokeDim, lineWidth:1},
    ];
  }

  // Frame 3: Push vs Pull comparison
  if (f === 3) {
    var midY = cy;
    var topY = midY - 60;
    var botY = midY + 60;

    return [
      {id:'f3t', type:'label', text:t('f3title'), x:cx, y:30, color:mc.accent, size:16, align:'center'},
      {id:'f3desc', type:'text', text:t('f3desc'), x:cx, y:52, color:mc.dim, size:11, align:'center'},
      // Dividing line
      {id:'divLine', type:'line', x1:40, y1:midY, x2:W - 40, y2:midY, color:mc.strokeDim, lineWidth:1, dash:[4,4]},
      // TOP: Push
      {id:'pushLabel3', type:'label', text:t('f3push'), x:80, y:topY, color:P.primary, size:18, align:'center'},
      {id:'pushDesc3', type:'text', text:t('f3away'), x:80, y:topY + 22, color:mc.dim, size:10, align:'center'},
      // Push illustration: source -> object ->
      {id:'pushSrc3', type:'circle', x:cx - 80, y:topY, r:12, fill:mc.strokeDim, stroke:mc.stroke, lineWidth:1},
      {id:'pushObj3', type:'circle', x:cx + 40, y:topY, r:16, fill:P.primary, stroke:P.primaryDim, lineWidth:1.5},
      {id:'pushForce3', type:'arrow', x1:cx - 60, y1:topY, x2:cx + 16, y2:topY, color:P.primary, lineWidth:2.5, headSize:8},
      {id:'pushMotion3', type:'arrow', x1:cx + 60, y1:topY, x2:cx + 120, y2:topY, color:mc.strokeDim, lineWidth:1.5, headSize:6},
      // BOTTOM: Pull
      {id:'pullLabel3', type:'label', text:t('f3pull'), x:80, y:botY, color:P.secondary, size:18, align:'center'},
      {id:'pullDesc3', type:'text', text:t('f3toward'), x:80, y:botY + 22, color:mc.dim, size:10, align:'center'},
      // Pull illustration: <- object <- source
      {id:'pullSrc3', type:'circle', x:cx - 80, y:botY, r:12, fill:mc.strokeDim, stroke:mc.stroke, lineWidth:1},
      {id:'pullObj3', type:'circle', x:cx + 40, y:botY, r:16, fill:P.secondary, stroke:P.secondaryDim, lineWidth:1.5},
      {id:'pullForce3', type:'arrow', x1:cx + 20, y1:botY, x2:cx - 60, y2:botY, color:P.secondary, lineWidth:2.5, headSize:8},
      {id:'pullMotion3', type:'arrow', x1:cx + 60, y1:botY, x2:cx, y2:botY, color:mc.strokeDim, lineWidth:1.5, headSize:6},
      // VS badge
      {id:'vsBadge', type:'label', text:'VS', x:cx, y:midY, color:mc.accent, size:14, align:'center', bold:true},
    ];
  }

  // Frame 4: Summary
  if (f === 4) {
    return [
      {id:'f4t', type:'label', text:t('f4title'), x:cx, y:40, color:mc.accent, size:20, align:'center', glow: mc.glow ? mc.accent : null},
      {id:'sep4', type:'line', x1:cx - 80, y1:65, x2:cx + 80, y2:65, color:mc.strokeDim, lineWidth:1},
      // Key point 1
      {id:'bullet1', type:'circle', x:cx - 170, y:cy - 60, r:4, fill:P.primary},
      {id:'f4t1', type:'text', text:t('f4p1'), x:cx - 155, y:cy - 60, color:mc.text, size:13, align:'left'},
      // Key point 2
      {id:'bullet2', type:'circle', x:cx - 170, y:cy - 20, r:4, fill:P.primary},
      {id:'f4t2', type:'text', text:t('f4p2'), x:cx - 155, y:cy - 20, color:mc.text, size:13, align:'left'},
      // Key point 3
      {id:'bullet3', type:'circle', x:cx - 170, y:cy + 20, r:4, fill:P.primary},
      {id:'f4t3', type:'text', text:t('f4p3'), x:cx - 155, y:cy + 20, color:mc.text, size:13, align:'left'},
      // Question
      {id:'sep4b', type:'line', x1:cx - 80, y1:cy + 60, x2:cx + 80, y2:cy + 60, color:mc.strokeDim, lineWidth:1},
      {id:'f4q', type:'label', text:t('f4q'), x:cx, y:cy + 90, color:P.secondary, size:14, align:'center', bold:false},
      // Decorative arrows
      {id:'decoArrow4a', type:'arrow', x1:cx - 60, y1:cy + 130, x2:cx - 20, y2:cy + 130, color:P.primary, lineWidth:2, headSize:7},
      {id:'decoArrow4b', type:'arrow', x1:cx + 60, y1:cy + 130, x2:cx + 20, y2:cy + 130, color:P.secondary, lineWidth:2, headSize:7},
    ];
  }

  return [];
}

AnimRuntime.boot();
