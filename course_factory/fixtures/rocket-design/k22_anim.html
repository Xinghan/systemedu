<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* ── Style switcher ── */
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* ── Sidebar text ── */
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* ── Main area: canvas + controls + hud ── */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, style switcher, title, guide -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<!-- Runtime (inlined) -->
<script>
/**
 * Animation Runtime -- shared skeleton for all course factory animations.
 *
 * Layout: sidebar (200px left column) contains lang-btn, style-mode

 *
 * Visual Modes: three built-in visual modes switchable via sidebar buttons:
 *   - 'light'     Technical Blueprint -- light bg, dark linework, CAD grid
 *   - 'dark'      Dark Editorial -- near-black, single-hue accent, minimal
 *   - 'cyberpunk' Sci-Fi Hologram -- deep blue, glow, scanlines, brackets
 *
 * Required globals before boot():
 *   - CONFIG: { title, subtitle, totalFrames, hudLabels, hudValues, guideItems, style }
 *   - getFrameElements(f, W, H): returns element array for frame f
 *
 * Optional globals:
 *   - drawBg(ctx, W, H, mode): draws background (mode = 'light'|'dark'|'cyberpunk')
 *   - customDrawElement(ctx, el, W, H): return true if handled

  var I18N = {};

      canvasInnerBorder: false,
      canvasTopLine: false,

  PALETTES.ares_mission = PALETTES.space;
  PALETTES.celestial_observatory = PALETTES.phys;
  PALETTES.neural_circuit = PALETTES.ai;
  PALETTES.subatomic_matrix = PALETTES.math;
  PALETTES.rocketry_control = PALETTES.space;
  PALETTES.aqua_flow = PALETTES.env;
  PALETTES.ember_forge = PALETTES.mech;
  PALETTES.flora_pulse = PALETTES.bio;

  var PAL = PALETTES.cs;

  // --- Math helpers ---
  function lerp(a, b, p) { return a + (b - a) * p; }
  function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

  /**
   * interpolate -- Remotion-style multi-segment frame interpolation.
   */
  function interpolate(value, input, output, opts) {
    var n = input.length;
    var easing = (opts && opts.easing) || null;
    var clamp = !(opts && opts.extrapolate === 'extend');

    if (value <= input[0]) {
      if (clamp) return output[0];
      var p0 = (value - input[0]) / (input[1] - input[0]);
      return lerp(output[0], output[1], easing ? easing(p0) : p0);
    }
    if (value >= input[n - 1]) {
      if (clamp) return output[n - 1];
      var pn = (value - input[n - 2]) / (input[n - 1] - input[n - 2]);
      return lerp(output[n - 2], output[n - 1], easing ? easing(pn) : pn);
    }

    for (var i = 1; i < n; i++) {
      if (value <= input[i]) {
        var p = (value - input[i - 1]) / (input[i] - input[i - 1]);
        if (easing) p = easing(p);
        return lerp(output[i - 1], output[i], p);
      }
    }
    return output[n - 1];
  }
  function merge(base, ov) { var r = {}; for (var k in base) r[k] = base[k]; for (var k2 in ov) r[k2] = ov[k2]; return r; }

  // --- i18n ---
  function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

  function _buildI18N(cfg) {
    I18N = {
      btnPlay:  { en: 'PLAY',  cn: '\u64ad\u653e' },
      btnPause: { en: 'PAUSE', cn: '\u6682\u505c' },
      btnPrev:  { en: 'PREV',  cn: '\u4e0a\u4e00\u5e27' },
      btnNext:  { en: 'NEXT',  cn: '\u4e0b\u4e00\u5e27' },
      guideDefault: { en: 'GUIDE', cn: '\u89c2\u770b\u6307\u5357' },
    };
    if (cfg.i18n) {
      for (var k in cfg.i18n) I18N[k] = cfg.i18n[k];
    }
  }

  // --- Visual Mode helpers ---
  function _modeColors() {
    var m = VISUAL_MODES[VISUAL_MODE] || VISUAL_MODES.cyberpunk;
    return {
      bg1:   m.canvasBg1,
      bg2:   m.canvasBg2,
      grid:  m.canvasGrid,
      gridW: m.canvasGridWidth || 0.5,
      text:  m.canvasText  || PAL.text,
      dim:   m.canvasTextDim || PAL.muted,
      mute:  m.canvasTextMute || PAL.muted,
      stroke:    m.canvasStroke || PAL.text,
      strokeDim: m.canvasStrokeDim || PAL.muted,
      accent:    m.canvasAccent || PAL.primary,
      glow:          !!m.canvasGlow,
      cornerBrackets:!!m.canvasCornerBrackets,
      scanlines:     !!m.canvasScanlines,
      innerBorder:   !!m.canvasInnerBorder,
      innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
      topLine:       !!m.canvasTopLine,
    };
  }

  // Apply visual mode to sidebar / HUD / controls via CSS custom properties
  function _applyVisualMode(mode) {
    VISUAL_MODE = mode;
    var m = VISUAL_MODES[mode] || VISUAL_MODES.cyberpunk;
    var root = document.documentElement;

    // Sidebar
    root.style.setProperty('--sb-bg',     m.sidebarBg || 'rgba(5,6,15,0.92)');
    root.style.setProperty('--sb-border', m.sidebarBorder || (m.canvasAccent || PAL.primary));
    root.style.setProperty('--sb-text',   m.sidebarText || PAL.text);
    root.style.setProperty('--sb-dim',    m.sidebarTextDim || PAL.muted);
    root.style.setProperty('--sb-mute',   m.sidebarTextMute || PAL.muted);
    root.style.setProperty('--sb-accent', m.sidebarAccent || PAL.primary);
    root.style.setProperty('--sb-btn-bg', m.sidebarBtnBg || 'transparent');
    root.style.setProperty('--sb-btn-bd', m.sidebarBtnBorder || 'transparent');

    // HUD
    root.style.setProperty('--hud-bg',    m.hudBg || 'rgba(5,6,15,0.9)');
    root.style.setProperty('--hud-border',m.hudBorder || 'transparent');
    root.style.setProperty('--hud-label', m.hudLabel || PAL.muted);
    root.style.setProperty('--hud-value', m.hudValue || PAL.text);

    // Controls
    root.style.setProperty('--ctrl-bg',   m.ctrlBg || PAL.primary);
    root.style.setProperty('--ctrl-color',m.ctrlColor || PAL.bg);

    // Update switcher button active states
    var btns = document.querySelectorAll('.vm-btn');
    btns.forEach(function(b) {
      b.classList.toggle('vm-active', b.dataset.mode === mode);
    });

    // Redraw canvas with new mode
    drawFrame(currentFrame);
  }

  // Build style-mode switcher in sidebar
  function _buildStyleSwitcher() {
    var container = document.getElementById('styleSwitcher');
    if (!container) return;
    container.innerHTML = '';
    var modes = ['light', 'dark', 'cyberpunk'];
    modes.forEach(function(mKey) {
      var m = VISUAL_MODES[mKey];
      var btn = document.createElement('button');
      btn.className = 'vm-btn' + (mKey === VISUAL_MODE ? ' vm-active' : '');
      btn.dataset.mode = mKey;
      btn.textContent = m.label;
      btn.addEventListener('click', function() { _applyVisualMode(mKey); });
      container.appendChild(btn);
    });
  }

  // --- Default background (mode-aware) ---
  function _defaultDrawBg(c, w, h) {
    var mc = _modeColors();

    // Background gradient
    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Grid
    var gridColor = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/, '0.06)') : 'rgba(255,255,255,0.04)');
    c.strokeStyle = gridColor; c.lineWidth = mc.gridW;
    var step = VISUAL_MODE === 'light' ? 24 : 64;
    for (var x = 0; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
    for (var y = 0; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }

    // Inner border (light / technical blueprint)
    if (mc.innerBorder) {
      c.strokeStyle = mc.innerBorderColor; c.lineWidth = 0.5;
      c.strokeRect(6, 6, w - 12, h - 12);
    }

    // Top accent line (dark editorial)
    if (mc.topLine) {
      var tg = c.createLinearGradient(w * 0.15, 0, w * 0.85, 0);
      tg.addColorStop(0, 'transparent');
      tg.addColorStop(0.4, mc.accent); tg.addColorStop(0.6, mc.accent);
      tg.addColorStop(1, 'transparent');
      c.strokeStyle = tg; c.lineWidth = 1;
      c.beginPath(); c.moveTo(0, 0.5); c.lineTo(w, 0.5); c.stroke();
    }

    // Scanlines (cyberpunk)
    if (mc.scanlines) {
      c.strokeStyle = 'rgba(255,255,255,0.025)'; c.lineWidth = 1;
      for (var sy = 0; sy < h; sy += 3) {
        c.beginPath(); c.moveTo(0, sy); c.lineTo(w, sy); c.stroke();
      }
    }

    // Corner brackets (cyberpunk)
    if (mc.cornerBrackets) {
      var bLen = Math.min(w, h) * 0.06;
      c.strokeStyle = mc.accent; c.lineWidth = 1.5; c.globalAlpha = 0.5;
      // top-left
      c.beginPath(); c.moveTo(8, 8 + bLen); c.lineTo(8, 8); c.lineTo(8 + bLen, 8); c.stroke();
      // top-right
      c.beginPath(); c.moveTo(w - 8 - bLen, 8); c.lineTo(w - 8, 8); c.lineTo(w - 8, 8 + bLen); c.stroke();
      // bottom-left
      c.beginPath(); c.moveTo(8, h - 8 - bLen); c.lineTo(8, h - 8); c.lineTo(8 + bLen, h - 8); c.stroke();
      // bottom-right
      c.beginPath(); c.moveTo(w - 8 - bLen, h - 8); c.lineTo(w - 8, h - 8); c.lineTo(w - 8, h - 8 + bLen); c.stroke();
      c.globalAlpha = 1;
    }

    // Radial glow (cyberpunk)
    if (mc.glow) {
      var rg = c.createRadialGradient(w * 0.5, h * 0.3, 0, w * 0.5, h * 0.3, w * 0.6);
      rg.addColorStop(0, PAL.glow || 'rgba(100,100,255,0.06)');
      rg.addColorStop(1, 'transparent');
      c.fillStyle = rg; c.fillRect(0, 0, w, h);
    }
  }

  // --- Element drawing ---
  function drawElement(el) {
    if (!el || el.alpha <= 0.01) return;
    ctx.save();
    ctx.globalAlpha = el.alpha;

    // Allow user override -- pass virtual W/H (same as getFrameElements receives)
    if (typeof customDrawElement === 'function' && customDrawElement(ctx, el, _vw, _vh)) {
      ctx.restore();
      return;
    }

    switch (el.type) {
      case 'label':
        ctx.fillStyle = el.color || _modeColors().text;
        var isBold = el.bold !== undefined ? el.bold : (el.size >= 14);
        ctx.font = (isBold ? 'bold ' : '') + (el.size || 12) + "px " +
          (isBold ? "'Space Grotesk','Inter','Noto Sans SC'" : "'Inter','Noto Sans SC'") + ",sans-serif";
        ctx.textAlign = el.align || 'center';
        ctx.textBaseline = el.baseline || 'middle';
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = 10; }
        ctx.fillText(el.text, el.x, el.y);
        break;

      case 'text':
        ctx.fillStyle = el.color || _modeColors().dim;
        ctx.font = (el.size || 11) + "px 'Inter','Noto Sans SC',sans-serif";
        ctx.textAlign = el.align || 'left';
        ctx.textBaseline = el.baseline || 'middle';
        ctx.fillText(el.text, el.x, el.y);
        break;

      case 'box':
        if (el.fill) { ctx.fillStyle = el.fill; ctx.fillRect(el.x, el.y, el.w, el.h); }
        if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.lineWidth || 1; ctx.strokeRect(el.x, el.y, el.w, el.h); }
        break;

      case 'circle':
        ctx.beginPath(); ctx.arc(el.x, el.y, el.r || 10, 0, Math.PI * 2);
        if (el.fill) { ctx.fillStyle = el.fill; ctx.fill(); }
        if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.lineWidth || 1; ctx.stroke(); }
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = el.glowSize || 12; ctx.fill(); ctx.shadowBlur = 0; }
        break;

      case 'arrow':
        _drawArrow(el.x1, el.y1, el.x2, el.y2, el.color || PAL.primary, el.lineWidth || 1.5, el.headSize || 6);
        break;

      case 'line':
        ctx.strokeStyle = el.color || PAL.muted;
        ctx.lineWidth = el.lineWidth || 1;
        if (el.dash) ctx.setLineDash(el.dash);
        ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
        if (el.dash) ctx.setLineDash([]);
        break;

      case 'gradient_box':
        var gb = ctx.createLinearGradient(el.x, el.y, el.x + el.w, el.y + el.h);
        gb.addColorStop(0, el.color1 || PAL.primary); gb.addColorStop(1, el.color2 || PAL.secondary);
        ctx.fillStyle = gb; ctx.fillRect(el.x, el.y, el.w, el.h);
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = 8; ctx.fillRect(el.x, el.y, el.w, el.h); ctx.shadowBlur = 0; }
        break;

      case 'sprite':
        _drawSprite(el);
        break;

      case 'custom':
        if (typeof el.draw === 'function') el.draw(ctx, el);
        break;

      default:
        if (typeof el.draw === 'function') el.draw(ctx, el);
        break;
    }
    ctx.restore();
  }

  function _drawArrow(x1, y1, x2, y2, color, lw, hs) {
    var angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.strokeStyle = color; ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.fillStyle = color; ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
    ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
    ctx.fill();
  }

  // --- Sprite drawing ---
  // Usage: {type:'sprite', name:'bicycle', x:100, y:200, w:80, h:50}
  // The sprite SVG must be embedded in the HTML as:
  //   <svg id="sprite-bicycle" style="display:none" viewBox="0 0 ...">...</svg>
  // Optional: flipX (boolean), opacity (0-1), rotate (degrees)
  function _drawSprite(el) {
    var name = el.name;
    if (!name) return;
    var img = _spriteCache[name];
    if (!img) {
      // Try to find and rasterize the SVG element
      var svgEl = document.getElementById('sprite-' + name);
      if (!svgEl) return;
      var svgStr = new XMLSerializer().serializeToString(svgEl);
      var blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      img = new Image();
      img._loaded = false;
      img.onload = function () { img._loaded = true; drawFrame(currentFrame); URL.revokeObjectURL(url); };
      img.src = url;
      _spriteCache[name] = img;
      return; // will render on next frame when image is loaded
    }
    if (!img._loaded) return;
    var w = el.w || img.naturalWidth;
    var h = el.h || img.naturalHeight;
    // Maintain aspect ratio if only w or h is specified
    if (el.w && !el.h) h = (img.naturalHeight / img.naturalWidth) * w;
    if (el.h && !el.w) w = (img.naturalWidth / img.naturalHeight) * h;
    ctx.save();
    if (el.opacity !== undefined) ctx.globalAlpha = el.opacity;
    ctx.translate(el.x, el.y);
    if (el.rotate) ctx.rotate(el.rotate * Math.PI / 180);
    if (el.flipX) ctx.scale(-1, 1);
    ctx.drawImage(img, -w / 2, -h / 2, w, h);
    ctx.restore();
  }

  // --- Content scaling ---
  // Scale based on canvas height to fit REF_H. Virtual width adapts
  // to fill the actual canvas width so content uses the full area.
  // No safe-area offsets -- nothing overlaps the canvas.
  function _contentTransform() {
    var s = H / REF_H;
    _vh = REF_H;
    _vw = W / s;
    if (_vw < REF_W) _vw = REF_W;
    return { s: s, ox: 0, oy: 0, vw: _vw, vh: _vh };
  }

  function _applyContentScale(ct) {
    ctx.save();
    ctx.scale(ct.s, ct.s);
  }

  // --- Frame rendering ---
  function drawFrame(f) {
    var bgFn = (typeof drawBg === 'function') ? drawBg : _defaultDrawBg;
    bgFn(ctx, W, H, VISUAL_MODE);
    var ct = _contentTransform();
    _applyContentScale(ct);
    var elems = getFrameElements(f, ct.vw, ct.vh);
    elems.forEach(function (el) { drawElement(el); });
    ctx.restore();
  }

  // --- Shared element transition ---
  function transitionTo(nf) {
    if (nf < 0) nf = 0;
    if (nf >= totalFrames) nf = totalFrames - 1;
    if (nf === currentFrame && !transitioning) { drawFrame(currentFrame); _updateHUD(currentFrame); return; }
    if (transitioning) return;

    var ct0 = _contentTransform();
    var oldElems = getFrameElements(currentFrame, ct0.vw, ct0.vh);
    var newElems = getFrameElements(nf, ct0.vw, ct0.vh);
    var oldMap = {}; oldElems.forEach(function (e) { oldMap[e.id] = e; });
    var newMap = {}; newElems.forEach(function (e) { newMap[e.id] = e; });

    currentFrame = nf;
    _updateHUD(nf);
    transitioning = true;

    var startTime = null, duration = 500;
    var bgFn = (typeof drawBg === 'function') ? drawBg : _defaultDrawBg;

    function step(ts) {
      if (!startTime) startTime = ts;
      var raw = Math.min((ts - startTime) / duration, 1);
      var p = easeInOut(raw);

      bgFn(ctx, W, H, VISUAL_MODE);
      var ct = _contentTransform();
      _applyContentScale(ct);

      oldElems.forEach(function (oe) {
        if (!newMap[oe.id]) drawElement(merge(oe, { alpha: 1 - p }));
      });

      newElems.forEach(function (ne) {
        var oe = oldMap[ne.id];
        if (oe) {
          var merged = merge(ne, {
            x: lerp(oe.x || 0, ne.x || 0, p),
            y: lerp(oe.y || 0, ne.y || 0, p),
            w: lerp(oe.w || 0, ne.w || 0, p),
            h: lerp(oe.h || 0, ne.h || 0, p),
            r: lerp(oe.r || 0, ne.r || 0, p),
            alpha: 1
          });
          if (ne.type === 'arrow' && oe.type === 'arrow') {
            merged.x1 = lerp(oe.x1, ne.x1, p); merged.y1 = lerp(oe.y1, ne.y1, p);
            merged.x2 = lerp(oe.x2, ne.x2, p); merged.y2 = lerp(oe.y2, ne.y2, p);
          }
          if (ne.type === 'line' && oe.type === 'line') {
            merged.x1 = lerp(oe.x1, ne.x1, p); merged.y1 = lerp(oe.y1, ne.y1, p);
            merged.x2 = lerp(oe.x2, ne.x2, p); merged.y2 = lerp(oe.y2, ne.y2, p);
          }
          if ((ne.type === 'label' || ne.type === 'text') && oe.text !== ne.text) {
            drawElement(merge(oe, { alpha: 1 - p }));
            drawElement(merge(ne, { alpha: p }));
          } else {
            drawElement(merged);
          }
        } else {
          drawElement(merge(ne, { alpha: p }));
        }
      });

      ctx.restore();

      if (raw < 1) { requestAnimationFrame(step); }
      else { transitioning = false; }
    }
    requestAnimationFrame(step);
  }

  // --- HUD ---
  function _updateHUD(f) {
    var cfg = window.CONFIG || {};
    var labels = cfg.hudLabels || [];
    var values = cfg.hudValues || [];
    for (var i = 0; i < 4; i++) {
      var lEl = document.getElementById('hudL' + (i + 1));
      var vEl = document.getElementById('hudV' + (i + 1));
      if (lEl && labels[i]) lEl.textContent = t(labels[i]);
      if (vEl && values[f] && values[f][i] !== undefined) {
        var val = values[f][i];
        vEl.textContent = (typeof val === 'string' && I18N[val]) ? t(val) : val;
      }
    }
    var fi = document.getElementById('frameIndicator');
    if (fi) fi.textContent = (f + 1) + ' / ' + totalFrames;
  }

  // --- Guide panel (sidebar layout -- always visible, no collapse) ---
  function _buildGuide() {
    var cfg = window.CONFIG || {};
    var guideTitle = document.getElementById('guideTitle');
    var guideContent = document.getElementById('guideContent');
    if (!guideContent) return;

    if (guideTitle) guideTitle.textContent = t(cfg.guideTitle || 'guideDefault');

    var items = cfg.guideItems || [];
    var html = '<ul>';
    items.forEach(function (key) { html += '<li>' + t(key) + '</li>'; });
    html += '</ul>';
    guideContent.innerHTML = html;
  }

  // --- refreshI18N ---
  function refreshI18N() {
    var titleEl = document.getElementById('title');
    var subEl = document.getElementById('subtitle');
    if (titleEl) titleEl.textContent = t('title');
    if (subEl) subEl.textContent = t('subtitle');

    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var btnPlay = document.getElementById('btnPlay');
    if (btnPrev) btnPrev.textContent = t('btnPrev');
    if (btnNext) btnNext.textContent = t('btnNext');
    if (btnPlay) btnPlay.textContent = playing ? t('btnPause') : t('btnPlay');

    var langBtn = document.getElementById('langBtn');
    if (langBtn) langBtn.textContent = LANG.toUpperCase();

    _buildGuide();
    _updateHUD(currentFrame);
    drawFrame(currentFrame);
  }

  // --- Resize ---
  function _resize() {
    var wrap = cv.parentElement;
    var rect = wrap.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    W = rect.width; H = rect.height;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    drawFrame(currentFrame);
  }

  // --- Play / Pause ---
  function _togglePlay() {
    if (playing) {
      playing = false;
      if (playTimer) clearTimeout(playTimer);
      document.getElementById('btnPlay').textContent = t('btnPlay');
      return;
    }
    playing = true;
    document.getElementById('btnPlay').textContent = t('btnPause');
    function autoNext() {
      if (!playing) return;
      if (currentFrame < totalFrames - 1) {
        transitionTo(currentFrame + 1);
        playTimer = setTimeout(autoNext, 1800);
      } else {
        playing = false;
        document.getElementById('btnPlay').textContent = t('btnPlay');
      }
    }
    if (currentFrame >= totalFrames - 1) { currentFrame = -1; }
    autoNext();
  }

  // --- Boot ---
  function boot() {
    var cfg = window.CONFIG || {};
    totalFrames = cfg.totalFrames || 4;

    // Apply palette
    if (cfg.style && PALETTES[cfg.style]) {
      PAL = PALETTES[cfg.style];
    }

    // Inject CSS custom properties (palette + theme_style shared tokens)
    var root = document.documentElement;
    // Palette-specific
    root.style.setProperty('--bg', PAL.bg);
    root.style.setProperty('--bg2', PAL.bg2);
    root.style.setProperty('--surface', PAL.surface);
    root.style.setProperty('--primary', PAL.primary);
    root.style.setProperty('--primary-dim', PAL.primaryDim);
    root.style.setProperty('--secondary', PAL.secondary);
    root.style.setProperty('--secondary-dim', PAL.secondaryDim);
    root.style.setProperty('--text', PAL.text);
    root.style.setProperty('--muted', PAL.muted);
    root.style.setProperty('--error', PAL.error);
    root.style.setProperty('--outline', PAL.outline);
    root.style.setProperty('--glow', PAL.glow);
    root.style.setProperty('--glow-strong', PAL.glowStrong);
    root.style.setProperty('--glass', PAL.glass);
    root.style.setProperty('--glass-blur', PAL.glassBlur + 'px');
    root.style.setProperty('--radius', PAL.radius);
    // theme_style shared tokens
    root.style.setProperty('--bg-0', 'oklch(0.14 0.035 265)');
    root.style.setProperty('--bg-1', 'oklch(0.18 0.04 265)');
    root.style.setProperty('--bg-2', 'oklch(0.22 0.045 265)');
    root.style.setProperty('--bg-3', 'oklch(0.28 0.05 265)');
    root.style.setProperty('--line', 'oklch(0.35 0.05 265 / 0.35)');
    root.style.setProperty('--fg', 'oklch(0.96 0.01 265)');
    root.style.setProperty('--fg-dim', 'oklch(0.75 0.02 265)');
    root.style.setProperty('--fg-mute', 'oklch(0.55 0.03 265)');
    root.style.setProperty('--gold', 'oklch(0.85 0.14 85)');

    _buildI18N(cfg);

    // Canvas init (must be before _applyVisualMode which calls drawFrame)
    cv = document.getElementById('c');
    ctx = cv.getContext('2d');

    // Visual mode: default to cyberpunk, allow CONFIG override
    if (cfg.visualMode && VISUAL_MODES[cfg.visualMode]) {
      VISUAL_MODE = cfg.visualMode;
    }

    // Build style switcher UI and apply initial mode CSS vars (no draw yet)
    _buildStyleSwitcher();
    // Set CSS vars without redrawing (canvas size not yet set)
    var _m = VISUAL_MODES[VISUAL_MODE] || VISUAL_MODES.cyberpunk;
    var _r = document.documentElement;
    _r.style.setProperty('--sb-bg',     _m.sidebarBg || 'rgba(5,6,15,0.92)');
    _r.style.setProperty('--sb-border', _m.sidebarBorder || (_m.canvasAccent || PAL.primary));
    _r.style.setProperty('--sb-text',   _m.sidebarText || PAL.text);
    _r.style.setProperty('--sb-dim',    _m.sidebarTextDim || PAL.muted);
    _r.style.setProperty('--sb-mute',   _m.sidebarTextMute || PAL.muted);
    _r.style.setProperty('--sb-accent', _m.sidebarAccent || PAL.primary);
    _r.style.setProperty('--sb-btn-bg', _m.sidebarBtnBg || 'transparent');
    _r.style.setProperty('--sb-btn-bd', _m.sidebarBtnBorder || 'transparent');
    _r.style.setProperty('--hud-bg',    _m.hudBg || 'rgba(5,6,15,0.9)');
    _r.style.setProperty('--hud-border',_m.hudBorder || 'transparent');
    _r.style.setProperty('--hud-label', _m.hudLabel || PAL.muted);
    _r.style.setProperty('--hud-value', _m.hudValue || PAL.text);
    _r.style.setProperty('--ctrl-bg',   _m.ctrlBg || PAL.primary);
    _r.style.setProperty('--ctrl-color',_m.ctrlColor || PAL.bg);

    // Events
    window.addEventListener('resize', _resize);
    setTimeout(_resize, 200);
    setTimeout(_resize, 600);
    document.fonts.ready.then(function () { _resize(); });

    // Lang toggle
    var langBtn = document.getElementById('langBtn');
    if (langBtn) {
      langBtn.addEventListener('click', function () {
        LANG = LANG === 'en' ? 'cn' : 'en';
        refreshI18N();
      });
    }

    // Controls
    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var btnPlay = document.getElementById('btnPlay');

    if (btnPrev) btnPrev.addEventListener('click', function () {
      if (playing) { playing = false; if (playTimer) clearTimeout(playTimer); }
      transitionTo(currentFrame - 1);
    });
    if (btnNext) btnNext.addEventListener('click', function () {
      if (playing) { playing = false; if (playTimer) clearTimeout(playTimer); }
      transitionTo(currentFrame + 1);
    });
    if (btnPlay) btnPlay.addEventListener('click', _togglePlay);

    // Guide
    _buildGuide();

    // Initial render
    refreshI18N();

    // Callback
    if (typeof onReady === 'function') onReady();
  }

  // --- Public API ---
  return {
    boot: boot,
    t: t,
    lerp: lerp,
    interpolate: interpolate,
    easeInOut: easeInOut,
    merge: merge,
    drawElement: drawElement,
    drawFrame: drawFrame,
    transitionTo: transitionTo,
    refreshI18N: refreshI18N,
    get PAL() { return PAL; },
    get W() { return _vw; },
    get H() { return _vh; },
    get ctx() { return ctx; },
    get currentFrame() { return currentFrame; },
    get totalFrames() { return totalFrames; },
    get LANG() { return LANG; },
    get _lang() { return LANG; },
    get lang() { return LANG; },
    get mode() { return VISUAL_MODE; },
    get modeColors() { return _modeColors(); },
    setMode: function(m) { if (VISUAL_MODES[m]) _applyVisualMode(m); },
    get REF_W() { return REF_W; },
    get REF_H() { return REF_H; },
    get realW() { return W; },
    get realH() { return H; },
    applyContentScale: function () { var ct = _contentTransform(); _applyContentScale(ct); },
    restoreContentScale: function () { ctx.restore(); },
  };
})();

</script>

  var P = AnimRuntime.PAL;

      {id:'f4gl', type:'label', text:t('f4_gas'), x:rocketX - rocketW / 2 - 48, y:rocketY + 30, color:MC.dim, size:9, align:'center'},
      // Gas momentum arrow (left)
      {id:'f4ga', type:'label', text:'\u2190\u2190\u2190', x:rocketX - rocketW / 2 - 48, y:rocketY - 30, color:P.tertiary, size:14, align:'center'},
      {id:'f4gp', type:'label', text:t('f4_gasP'), x:rocketX - rocketW / 2 - 48, y:rocketY - 48, color:P.tertiary, size:10, align:'center'},
      // Rocket momentum arrow (right)
      {id:'f4ra', type:'label', text:'\u2192\u2192\u2192', x:rocketX + rocketW / 2 + 40, y:rocketY - 30, color:P.primary, size:14, align:'center'},
      {id:'f4rp', type:'label', text:t('f4_rocketP'), x:rocketX + rocketW / 2 + 40, y:rocketY - 48, color:P.primary, size:10, align:'center'},
      // Conservation equation
      {id:'f4eq', type:'label', text:t('f4_eq'), x:cx, y:H * 0.72, color:P.secondary, size:14, align:'center', bold:true},
      // Note
      {id:'f4n', type:'label', text:t('f4_note'), x:cx, y:H * 0.85, color:MC.dim, size:11, align:'center'},
    ];
  }

  return [];
}

// ============================================================
// BOOT
// ============================================================

AnimRuntime.boot();
</script>
<script>

(function () {
  if (window.__systemedu_resize_patched) return;
  window.__systemedu_resize_patched = true;

  const canvas =
    document.querySelector('canvas#c') ||
    document.querySelector('canvas');
  if (!canvas || !canvas.parentElement) return;
  let container = canvas.parentElement;

  // 如果 canvas 的父容器还包含 controls/hud 等兄弟元素，
  // 就给 canvas 包一层 div 作为 host，避免 position:absolute 覆盖按钮
  try {
    const siblings = container.querySelectorAll('.controls, .hud, button');
    if (siblings.length > 0 && container.children.length > 1) {
      const host = document.createElement('div');
      host.style.cssText = 'flex:1;min-height:0;min-width:0;';
      container.insertBefore(host, canvas);
      host.appendChild(canvas);
      container = host;
    }
  } catch (e) {}

  // 注入防撑大 CSS：canvas 脱离流，父容器约束高度
  // 同时把浮动的操作指南面板（.guide-panel 等）改成可折叠，避免
  // 在小视口（iframe 缩小）下覆盖标题栏和控件。
  try {
    const style = document.createElement('style');
    style.setAttribute('data-systemedu-resize-patch', '1');
    style.textContent =
      // canvas 防撑大
      '.systemedu-canvas-host{position:relative!important;width:100%!important;min-width:0!important;min-height:0!important;overflow:hidden!important;}' +
      '.systemedu-canvas-host > canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;}' +
      // lang-btn 移到左下角，避免遮挡标题；背景完全透明只留细边框
      '.lang-btn{top:auto!important;bottom:8px!important;left:8px!important;right:auto!important;' +
      'background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;' +
      'border:1px solid rgba(255,181,156,0.45)!important;box-shadow:none!important;opacity:0.75!important;z-index:50!important;}' +
      '.lang-btn:hover{opacity:1!important;background:rgba(20,20,35,0.7)!important;}' +
      // 浮动指南面板折叠态（默认折叠为一个小按钮，避免遮挡）；背景透明只留圆圈
      '.guide-panel.systemedu-guide-collapsed{max-width:28px!important;max-height:28px!important;min-width:28px!important;min-height:28px!important;' +
      'padding:0!important;overflow:hidden!important;cursor:pointer!important;display:flex!important;align-items:center!important;justify-content:center!important;' +
      'border-radius:50%!important;background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;' +
      'border:1px solid rgba(56,189,248,0.55)!important;box-shadow:none!important;opacity:0.75!important;}' +
      '.guide-panel.systemedu-guide-collapsed:hover{opacity:1!important;background:rgba(20,20,35,0.7)!important;}' +
      '.guide-panel.systemedu-guide-collapsed > *{display:none!important;}' +
      '.guide-panel.systemedu-guide-collapsed::before{content:"?";color:#38bdf8;font-weight:700;font-size:14px;}' +
      // 小视口时强制 guide-panel 宽度收紧（展开态仍保留毛玻璃背景以便阅读）
      '.guide-panel{max-width:min(220px,35vw)!important;z-index:50!important;}';
    document.head.appendChild(style);
    container.classList.add('systemedu-canvas-host');
  } catch (e) {}

  // 让 .guide-panel 默认折叠为问号按钮，点击展开/收起
  try {
    const guides = document.querySelectorAll('.guide-panel');
    guides.forEach(function (g) {
      g.classList.add('systemedu-guide-collapsed');
      g.setAttribute('title', '点击查看操作指南');
      g.addEventListener('click', function (e) {
        // 折叠时点击任意处展开；展开时只有点击面板本身（不是内部链接）才收回
        if (g.classList.contains('systemedu-guide-collapsed')) {
          g.classList.remove('systemedu-guide-collapsed');
          e.stopPropagation();
        } else {
          // 展开状态下点击面板空白区域也能再次折叠
          if (e.target === g) {
            g.classList.add('systemedu-guide-collapsed');
          }
        }
      });
    });
  } catch (e) {}

  const redraw = function () {
    try { if (typeof window.drawCurrent === 'function') { window.drawCurrent(); return; } } catch (e) {}
    try {
      if (typeof window.gotoFrame === 'function' &&
          typeof window.currentFrame !== 'undefined') {
        window.gotoFrame(window.currentFrame); return;
      }
    } catch (e) {}
    try { if (typeof window.draw === 'function') { window.draw(); return; } } catch (e) {}
    try { if (typeof window.render === 'function') { window.render(); return; } } catch (e) {}
  };

  let rafId = 0;
  let prevW = 0, prevH = 0;

  // 校正 canvas backing store 与 CSS 显示尺寸，保证宽高比一致。
  // 防止 canvas 被浏览器按不同比例拉伸（典型症状：文字被水平拉宽或压扁）。
  // 必要时重新调用原 resize() 让动画内部坐标系也更新。
  const enforceSizeConsistency = function () {
    const rect = canvas.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return false;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const targetW = Math.round(rect.width * dpr);
    const targetH = Math.round(rect.height * dpr);
    // 允许 1 像素误差
    if (Math.abs(canvas.width - targetW) > 1 || Math.abs(canvas.height - targetH) > 1) {
      return true; // 需要修复
    }
    return false;
  };

  // 调用动画内部的 resize 钩子。优先级：
  //   1) window.resize（老式全局挂载）
  //   2) window 上的 'resize' 事件（addEventListener 注册的 local resize）
  // 多数 knode 动画通过 addEventListener('resize', resize) 挂事件监听，
  // 此时 window.resize 是 undefined，唯一能驱动它的方式是 dispatchEvent。
  const callInternalResize = function () {
    try {
      if (typeof window.resize === 'function') {
        window.resize();
        return true;
      }
    } catch (e) {}
    try {
      window.dispatchEvent(new Event('resize'));
      return true;
    } catch (e) {}
    return false;
  };

  const doResize = function () {
    // 让动画的 local resize 读最新 rect 并重写 canvas backing store
    callInternalResize();

    // 校正 backing store：若 canvas.width/height 与 CSS 显示尺寸不一致
    // （典型症状：文字被水平或垂直拉伸），反复触发 local resize 让它
    // 重新计算。浏览器 layout 已稳定时通常一次就能修复。
    try {
      let guard = 0;
      while (enforceSizeConsistency() && guard < 3) {
        guard++;
        // 触发 reflow 让 getBoundingClientRect 读到最新值
        void canvas.offsetHeight;
        callInternalResize();
      }
      // 最终保障：某些动画的 resize 可能读到错值（例如 parentElement 被
      // 缓存，或 CSS !important 锁死尺寸）。此时直接硬写 canvas.width/height
      // 保证宽高比正确；drawCurrent 会把内容重新画到正确的 backing store。
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const tw = Math.round(rect.width * dpr);
      const th = Math.round(rect.height * dpr);
      if (rect.width >= 1 && rect.height >= 1 &&
          (Math.abs(canvas.width - tw) > 1 || Math.abs(canvas.height - th) > 1)) {
        canvas.width = tw;
        canvas.height = th;
        // 同步动画内部坐标系变量（若挂在 window 上）
        try {
          if (typeof window.W !== 'undefined') window.W = rect.width;
          if (typeof window.H !== 'undefined') window.H = rect.height;
        } catch (e) {}
        // 再跑一次 local resize，让它重新 setTransform 并更新自身 W/H
        callInternalResize();
      }
    } catch (e) {}

    redraw();
  };

  const ro = new ResizeObserver(function (entries) {
    const entry = entries[0];
    if (!entry) return;
    const cr = entry.contentRect;
    const w = cr.width, h = cr.height;
    if (w < 1 || h < 1) return;
    if (Math.abs(w - prevW) < 1 && Math.abs(h - prevH) < 1) return;
    prevW = w; prevH = h;

    // 第一次回调也要处理：iframe 内的动画可能把错值写到 canvas backing
    // store（例如 load 时 parent rect 还不稳定），第一次 RO 回调正是
    // layout 已稳定的时机，必须借此纠正。
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(function () {
      rafId = 0;
      doResize();
    });
  });

  try { ro.observe(container); } catch (e) {}

  // iframe 初始化阶段 parent rect 可能不稳定，导致动画原始 resize()
  // 写入错误的 canvas.width/height（尤其在 iframe 外层 div 宽高变化时）。
  // load 后始终跑一次 doResize 做最终校正，不依赖 canvas.width<4 的判断。
  window.addEventListener('load', function () {
    setTimeout(function () { doResize(); }, 50);
  });
})();

</script>
