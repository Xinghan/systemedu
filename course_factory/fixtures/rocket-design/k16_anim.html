<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

// Star field for deep space background
var _stars = [];
for (var si = 0; si < 120; si++) {
  _stars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.2 + 0.3,
    a: Math.random() * 0.5 + 0.3,
  });
}

function drawBg(ctx, W, H) {
  // Deep space gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#05060f');
  g.addColorStop(0.5, '#0d0e1a');
  g.addColorStop(1, '#08091a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Purple nebula glow
  var ng = ctx.createRadialGradient(W * 0.6, H * 0.3, 0, W * 0.6, H * 0.3, W * 0.5);
  ng.addColorStop(0, 'rgba(167,139,250,0.07)');
  ng.addColorStop(0.5, 'rgba(139,92,246,0.03)');
  ng.addColorStop(1, 'transparent');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, W, H);

  // Second nebula
  var ng2 = ctx.createRadialGradient(W * 0.2, H * 0.7, 0, W * 0.2, H * 0.7, W * 0.4);
  ng2.addColorStop(0, 'rgba(167,139,250,0.04)');
  ng2.addColorStop(1, 'transparent');
  ctx.fillStyle = ng2;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < _stars.length; i++) {
    var s = _stars[i];
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + s.a + ')';
    ctx.fill();
  }

  // Scanlines
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (var sy = 0; sy < H; sy += 3) {
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W, sy);
    ctx.stroke();
  }

  // Corner brackets
  var bLen = Math.min(W, H) * 0.05;
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.4;
  ctx.beginPath(); ctx.moveTo(8, 8 + bLen); ctx.lineTo(8, 8); ctx.lineTo(8 + bLen, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - 8 - bLen, 8); ctx.lineTo(W - 8, 8); ctx.lineTo(W - 8, 8 + bLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, H - 8 - bLen); ctx.lineTo(8, H - 8); ctx.lineTo(8 + bLen, H - 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - 8 - bLen, H - 8); ctx.lineTo(W - 8, H - 8); ctx.lineTo(W - 8, H - 8 + bLen); ctx.stroke();
  ctx.globalAlpha = 1;
}

// Helper: draw a paper plane silhouette
function _drawPlane(ctx, cx, cy, scale, type, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (type === 'dart') {
    // Narrow, sleek dart
    ctx.moveTo(0, -18);
    ctx.lineTo(8, 12);
    ctx.lineTo(3, 8);
    ctx.lineTo(0, 14);
    ctx.lineTo(-3, 8);
    ctx.lineTo(-8, 12);
    ctx.closePath();
  } else if (type === 'glider') {
    // Wide wings, slender body
    ctx.moveTo(0, -16);
    ctx.lineTo(18, 6);
    ctx.lineTo(14, 8);
    ctx.lineTo(3, 4);
    ctx.lineTo(2, 14);
    ctx.lineTo(0, 16);
    ctx.lineTo(-2, 14);
    ctx.lineTo(-3, 4);
    ctx.lineTo(-14, 8);
    ctx.lineTo(-18, 6);
    ctx.closePath();
  } else {
    // Wide wing: broad, square-ish
    ctx.moveTo(0, -14);
    ctx.lineTo(20, 4);
    ctx.lineTo(16, 8);
    ctx.lineTo(6, 6);
    ctx.lineTo(4, 14);
    ctx.lineTo(0, 16);
    ctx.lineTo(-4, 14);
    ctx.lineTo(-6, 6);
    ctx.lineTo(-16, 8);
    ctx.lineTo(-20, 4);
    ctx.closePath();
  }
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

// Helper: draw a rounded rect
function _roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function customDrawElement(ctx, el, W, H) {
  if (el.type === 'plane') {
    _drawPlane(ctx, el.x, el.y, el.scale || 1, el.planeType, el.color || '#a78bfa');
    return true;
  }
  if (el.type === 'flow_box') {
    ctx.save();
    _roundRect(ctx, el.x - el.w / 2, el.y - el.h / 2, el.w, el.h, 4);
    ctx.fillStyle = el.fill || 'rgba(167,139,250,0.15)';
    ctx.fill();
    ctx.strokeStyle = el.stroke || '#a78bfa';
    ctx.lineWidth = el.lineWidth || 1.5;
    ctx.stroke();
    // text
    ctx.fillStyle = el.textColor || '#e2e8f0';
    ctx.font = 'bold ' + (el.fontSize || 11) + "px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(el.text || '', el.x, el.y);
    ctx.restore();
    return true;
  }
  if (el.type === 'check_item') {
    ctx.save();
    // Check mark
    var chkX = el.x;
    var chkY = el.y;
    ctx.strokeStyle = el.checkColor || '#22c55e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(chkX - 6, chkY);
    ctx.lineTo(chkX - 2, chkY + 4);
    ctx.lineTo(chkX + 6, chkY - 4);
    ctx.stroke();
    // Text
    ctx.fillStyle = el.color || '#e2e8f0';
    ctx.font = (el.size || 11) + "px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(el.text || '', chkX + 14, chkY);
    ctx.restore();
    return true;
  }
  if (el.type === 'data_table') {
    _drawDataTable(ctx, el);
    return true;
  }
  if (el.type === 'bar_chart') {
    _drawBarChart(ctx, el);
    return true;
  }
  if (el.type === 'report_template') {
    _drawReport(ctx, el);
    return true;
  }
  if (el.type === 'hypothesis_bubble') {
    ctx.save();
    _roundRect(ctx, el.x - el.w / 2, el.y - el.h / 2, el.w, el.h, 6);
    ctx.fillStyle = el.fill || 'rgba(167,139,250,0.08)';
    ctx.fill();
    ctx.strokeStyle = el.stroke || 'rgba(167,139,250,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Pointer triangle at top
    ctx.fillStyle = el.fill || 'rgba(167,139,250,0.08)';
    ctx.beginPath();
    ctx.moveTo(el.x - 6, el.y - el.h / 2);
    ctx.lineTo(el.x, el.y - el.h / 2 - 8);
    ctx.lineTo(el.x + 6, el.y - el.h / 2);
    ctx.fill();
    ctx.strokeStyle = el.stroke || 'rgba(167,139,250,0.3)';
    ctx.beginPath();
    ctx.moveTo(el.x - 6, el.y - el.h / 2);
    ctx.lineTo(el.x, el.y - el.h / 2 - 8);
    ctx.lineTo(el.x + 6, el.y - el.h / 2);
    ctx.stroke();
    // Text
    ctx.fillStyle = el.textColor || '#cbd5e1';
    ctx.font = (el.fontSize || 9) + "px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Word wrap simple
    var words = (el.text || '').split('');
    var lineW = el.w - 12;
    var lines = [];
    var cur = '';
    for (var wi = 0; wi < words.length; wi++) {
      var test = cur + words[wi];
      if (ctx.measureText(test).width > lineW && cur.length > 0) {
        lines.push(cur);
        cur = words[wi];
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
    var lh = (el.fontSize || 9) + 3;
    var startY = el.y - ((lines.length - 1) * lh) / 2;
    for (var li = 0; li < lines.length; li++) {
      ctx.fillText(lines[li], el.x, startY + li * lh);
    }
    ctx.restore();
    return true;
  }
  return false;
}

// Data table renderer
function _drawDataTable(ctx, el) {
  ctx.save();
  var x = el.x, y = el.y;
  var colW = el.colW || 52;
  var rowH = el.rowH || 18;
  var t = AnimRuntime.t;
  var cols = ['', 'T1', 'T2', 'T3', 'T4', 'T5', t('f4avg')];
  var rows = [
    [t('f2dart'),   '7.2', '6.8', '7.5', '7.0', '7.3', '7.2'],
    [t('f2glider'), '4.5', '5.1', '4.8', '4.6', '5.0', '4.8'],
    [t('f2wide'),   '3.8', '4.0', '3.5', '3.9', '3.7', '3.8'],
  ];
  // Header
  ctx.fillStyle = 'rgba(167,139,250,0.2)';
  ctx.fillRect(x, y, colW * cols.length, rowH);
  ctx.fillStyle = '#a78bfa';
  ctx.font = "bold 9px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var ci = 0; ci < cols.length; ci++) {
    ctx.fillText(cols[ci], x + ci * colW + colW / 2, y + rowH / 2);
  }
  // Data rows
  for (var ri = 0; ri < rows.length; ri++) {
    var ry = y + (ri + 1) * rowH;
    ctx.fillStyle = ri % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.01)';
    ctx.fillRect(x, ry, colW * cols.length, rowH);
    for (var cj = 0; cj < rows[ri].length; cj++) {
      ctx.fillStyle = cj === 0 ? '#cbd5e1' : (cj === rows[ri].length - 1 ? '#a78bfa' : '#94a3b8');
      ctx.font = (cj === 0 ? "bold 9px 'Noto Sans SC',sans-serif" : "9px 'JetBrains Mono',monospace");
      ctx.textAlign = 'center';
      ctx.fillText(rows[ri][cj], x + cj * colW + colW / 2, ry + rowH / 2);
    }
  }
  // Border
  ctx.strokeStyle = 'rgba(167,139,250,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, colW * cols.length, rowH * (rows.length + 1));
  ctx.restore();
}

// Bar chart renderer
function _drawBarChart(ctx, el) {
  ctx.save();
  var x = el.x, y = el.y, cw = el.cw || 200, ch = el.ch || 100;
  var t = AnimRuntime.t;
  var data = [
    { label: t('f2dart'),   val: 7.2, color: '#a78bfa' },
    { label: t('f2glider'), val: 4.8, color: 'oklch(0.85 0.14 85)' },
    { label: t('f2wide'),   val: 3.8, color: 'oklch(0.92 0.08 295)' },
  ];
  var maxVal = 8;
  var barW = cw / (data.length * 2 + 1);
  var gap = barW;
  // Axis
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + ch);
  ctx.lineTo(x + cw, y + ch);
  ctx.stroke();
  // Bars
  for (var bi = 0; bi < data.length; bi++) {
    var bx = x + gap + bi * (barW + gap);
    var bh = (data[bi].val / maxVal) * (ch - 10);
    var by = y + ch - bh;
    ctx.fillStyle = data[bi].color;
    ctx.fillRect(bx, by, barW, bh);
    // Glow
    ctx.shadowColor = data[bi].color;
    ctx.shadowBlur = 6;
    ctx.fillRect(bx, by, barW, bh);
    ctx.shadowBlur = 0;
    // Value
    ctx.fillStyle = '#e2e8f0';
    ctx.font = "bold 9px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.fillText(data[bi].val + 'm', bx + barW / 2, by - 6);
    // Label
    ctx.fillStyle = '#94a3b8';
    ctx.font = "8px 'Noto Sans SC',sans-serif";
    ctx.fillText(data[bi].label, bx + barW / 2, y + ch + 12);
  }
  // Y-axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = "8px 'JetBrains Mono',monospace";
  ctx.textAlign = 'right';
  for (var yi = 0; yi <= 4; yi++) {
    var yv = (maxVal / 4) * yi;
    var yp = y + ch - (yv / maxVal) * (ch - 10);
    ctx.fillText(yv.toFixed(0) + 'm', x - 4, yp + 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(x, yp);
    ctx.lineTo(x + cw, yp);
    ctx.stroke();
  }
  ctx.restore();
}

// Report template renderer
function _drawReport(ctx, el) {
  ctx.save();
  var x = el.x, y = el.y, w = el.rw || 200, h = el.rh || 180;
  var t = AnimRuntime.t;
  // Background
  _roundRect(ctx, x, y, w, h, 6);
  ctx.fillStyle = 'rgba(167,139,250,0.06)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(167,139,250,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Title bar
  ctx.fillStyle = 'rgba(167,139,250,0.15)';
  ctx.fillRect(x, y, w, 22);
  ctx.fillStyle = '#a78bfa';
  ctx.font = "bold 10px 'JetBrains Mono',monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('EXPERIMENT REPORT', x + w / 2, y + 11);
  // Sections
  var sections = ['f5r1', 'f5r2', 'f5r3', 'f5r4', 'f5r5', 'f5r6'];
  var lineH = 22;
  ctx.textAlign = 'left';
  for (var si = 0; si < sections.length; si++) {
    var sy = y + 28 + si * lineH;
    // Bullet
    ctx.fillStyle = '#a78bfa';
    ctx.beginPath();
    ctx.arc(x + 14, sy + 4, 3, 0, Math.PI * 2);
    ctx.fill();
    // Section name
    ctx.fillStyle = '#cbd5e1';
    ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillText(t(sections[si]), x + 22, sy + 5);
    // Line placeholder
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    var tw = ctx.measureText(t(sections[si])).width;
    ctx.moveTo(x + 24 + tw + 4, sy + 5);
    ctx.lineTo(x + w - 10, sy + 5);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  if (f === 0) {
    // Title frame
    return [
      {id:'t0', type:'label', text:t('f0title'), x:cx, y:cy - 50, color:P.primary, size:22, align:'center', glow:P.glowStrong},
      {id:'s0', type:'label', text:t('f0sub'), x:cx, y:cy - 20, color:P.tertiary, size:14, align:'center'},
      {id:'q0', type:'text',  text:t('f0q'), x:cx, y:cy + 20, color:P.muted, size:12, align:'center'},
      {id:'p0d', type:'plane', x:cx - 120, y:cy + 80, planeType:'dart',   color:P.primary, scale:1.8, alpha:1},
      {id:'p0g', type:'plane', x:cx,       y:cy + 80, planeType:'glider', color:P.tertiary, scale:1.8, alpha:1},
      {id:'p0w', type:'plane', x:cx + 120, y:cy + 80, planeType:'wide',   color:P.secondary, scale:1.8, alpha:1},
      {id:'vs1', type:'label', text:'VS', x:cx - 60, y:cy + 80, color:P.muted, size:10, alpha:0.5},
      {id:'vs2', type:'label', text:'VS', x:cx + 60, y:cy + 80, color:P.muted, size:10, alpha:0.5},
    ];
  }

  if (f === 1) {
    // Scientific Method flow diagram
    var flowY = cy - 20;
    var boxW = 85, boxH = 32;
    var steps = ['f1q', 'f1h', 'f1e', 'f1d', 'f1c'];
    var colors = [P.primary, P.tertiary, P.secondary, P.primary, P.tertiary];
    var fills = [
      'rgba(167,139,250,0.12)', 'rgba(213,196,100,0.10)', 'rgba(200,180,250,0.10)',
      'rgba(167,139,250,0.12)', 'rgba(213,196,100,0.10)'
    ];
    var startX = cx - (steps.length * (boxW + 20)) / 2 + boxW / 2;
    var elems = [
      {id:'t1', type:'label', text:t('f1title'), x:cx, y:35, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'d1', type:'text',  text:t('f1desc'),  x:cx, y:H - 30, color:P.muted, size:11, align:'center'},
    ];
    for (var si = 0; si < steps.length; si++) {
      var sx = startX + si * (boxW + 20);
      elems.push({
        id:'fb' + si, type:'flow_box', x:sx, y:flowY, w:boxW, h:boxH,
        text:t(steps[si]), fill:fills[si], stroke:colors[si],
        textColor:'#e2e8f0', fontSize:12, alpha:1, lineWidth:1.5
      });
      if (si < steps.length - 1) {
        elems.push({
          id:'fa' + si, type:'arrow', x1:sx + boxW / 2 + 4, y1:flowY,
          x2:sx + boxW / 2 + 16, y2:flowY,
          color:P.muted, lineWidth:1.5, headSize:5, alpha:1
        });
      }
    }
    // Circular arrow from conclusion back to question
    elems.push({
      id:'loop1', type:'custom', x:0, y:0, alpha:1,
      draw: function(ctx) {
        ctx.save();
        ctx.strokeStyle = P.muted;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        var lx = startX - boxW / 2;
        var rx = startX + (steps.length - 1) * (boxW + 20) + boxW / 2;
        var loopY = flowY + boxH / 2 + 20;
        ctx.beginPath();
        ctx.moveTo(rx, flowY + boxH / 2);
        ctx.lineTo(rx, loopY);
        ctx.lineTo(lx, loopY);
        ctx.lineTo(lx, flowY + boxH / 2 + 2);
        ctx.stroke();
        // Arrow head
        ctx.setLineDash([]);
        ctx.fillStyle = P.muted;
        ctx.beginPath();
        ctx.moveTo(lx, flowY + boxH / 2 + 2);
        ctx.lineTo(lx - 4, flowY + boxH / 2 + 8);
        ctx.lineTo(lx + 4, flowY + boxH / 2 + 8);
        ctx.fill();
        ctx.restore();
      }
    });
    // Icons for each step
    var iconDescs = [
      {id:'ic0', sym:'?', x:startX, y:flowY - 28},
      {id:'ic1', sym:'!', x:startX + (boxW + 20), y:flowY - 28},
      {id:'ic2', sym:'~', x:startX + 2 * (boxW + 20), y:flowY - 28},
      {id:'ic3', sym:'#', x:startX + 3 * (boxW + 20), y:flowY - 28},
      {id:'ic4', sym:'>', x:startX + 4 * (boxW + 20), y:flowY - 28},
    ];
    for (var ii = 0; ii < iconDescs.length; ii++) {
      elems.push({
        id:iconDescs[ii].id, type:'label', text:iconDescs[ii].sym,
        x:iconDescs[ii].x, y:iconDescs[ii].y,
        color:colors[ii], size:16, align:'center', alpha:0.6
      });
    }
    return elems;
  }

  if (f === 2) {
    // Hypothesis: 3 planes with hypothesis bubbles
    var planeY = cy - 30;
    var sp = 180;
    var planes = [
      {id:'p2d', x:cx - sp, type:'dart',   color:P.primary,   label:'f2dart',   hypo:'f2dartH'},
      {id:'p2g', x:cx,      type:'glider', color:P.tertiary,  label:'f2glider', hypo:'f2gliderH'},
      {id:'p2w', x:cx + sp, type:'wide',   color:P.secondary, label:'f2wide',   hypo:'f2wideH'},
    ];
    var elems = [
      {id:'t2', type:'label', text:t('f2title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
    ];
    for (var pi = 0; pi < planes.length; pi++) {
      var pp = planes[pi];
      elems.push({id:pp.id, type:'plane', x:pp.x, y:planeY, planeType:pp.type, color:pp.color, scale:2.2, alpha:1});
      elems.push({id:pp.id+'l', type:'label', text:t(pp.label), x:pp.x, y:planeY + 45, color:pp.color, size:12, align:'center'});
      elems.push({
        id:pp.id+'h', type:'hypothesis_bubble',
        x:pp.x, y:planeY + 100, w:150, h:46,
        text:t(pp.hypo), fill:'rgba(167,139,250,0.06)',
        stroke:'rgba(167,139,250,0.2)', textColor:'#94a3b8', fontSize:9, alpha:1
      });
    }
    // Wing shape comparison lines
    elems.push({id:'ws1', type:'line', x1:cx - sp + 30, y1:planeY, x2:cx - 30, y2:planeY, color:'rgba(167,139,250,0.1)', lineWidth:1, dash:[4,4], alpha:1});
    elems.push({id:'ws2', type:'line', x1:cx + 30, y1:planeY, x2:cx + sp - 30, y2:planeY, color:'rgba(167,139,250,0.1)', lineWidth:1, dash:[4,4], alpha:1});
    return elems;
  }

  if (f === 3) {
    // Controlled experiment: checklist
    var checkX = cx - 160;
    var checkY = 70;
    var items = ['f3c1', 'f3c2', 'f3c3', 'f3c4', 'f3c5'];
    var elems = [
      {id:'t3', type:'label', text:t('f3title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
    ];
    for (var ci = 0; ci < items.length; ci++) {
      elems.push({
        id:'ck' + ci, type:'check_item',
        x:checkX, y:checkY + ci * 32,
        text:t(items[ci]), color:'#cbd5e1', size:12,
        checkColor:'#22c55e', alpha:1
      });
    }
    // Fair test highlight box
    var fairY = checkY + items.length * 32 + 20;
    elems.push({
      id:'fair', type:'flow_box',
      x:cx, y:fairY + 10, w:W - 100, h:36,
      text:t('f3fair'), fill:'rgba(167,139,250,0.08)',
      stroke:'#a78bfa', textColor:'#a78bfa', fontSize:10,
      lineWidth:1.5, alpha:1
    });
    // Diagram: 3 planes on right side with arrows to single test setup
    var diagX = cx + 120;
    var diagY = 90;
    elems.push({id:'dp3d', type:'plane', x:diagX, y:diagY,      planeType:'dart',   color:P.primary,   scale:1.2, alpha:1});
    elems.push({id:'dp3g', type:'plane', x:diagX, y:diagY + 50, planeType:'glider', color:P.tertiary,  scale:1.2, alpha:1});
    elems.push({id:'dp3w', type:'plane', x:diagX, y:diagY + 100,planeType:'wide',   color:P.secondary, scale:1.2, alpha:1});
    // x5 labels
    elems.push({id:'x5a', type:'label', text:'x5', x:diagX + 35, y:diagY,      color:P.muted, size:10, alpha:0.7});
    elems.push({id:'x5b', type:'label', text:'x5', x:diagX + 35, y:diagY + 50, color:P.muted, size:10, alpha:0.7});
    elems.push({id:'x5c', type:'label', text:'x5', x:diagX + 35, y:diagY + 100,color:P.muted, size:10, alpha:0.7});
    // Total
    elems.push({id:'total', type:'label', text:'= 15', x:diagX + 35, y:diagY + 140, color:P.primary, size:14, alpha:1});
    return elems;
  }

  if (f === 4) {
    // Data table + bar chart
    var tableX = 30;
    var tableY = 70;
    var chartX = cx + 40;
    var chartY = 80;
    var elems = [
      {id:'t4', type:'label', text:t('f4title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'dt4', type:'data_table', x:tableX, y:tableY, colW:48, rowH:20, alpha:1},
      {id:'bc4', type:'bar_chart', x:chartX, y:chartY, cw:220, ch:130, alpha:1},
      {id:'w4', type:'text', text:t('f4winner'), x:cx, y:H - 30, color:P.tertiary, size:11, align:'center', alpha:1},
    ];
    // Distance label for chart
    elems.push({id:'dl4', type:'label', text:'DISTANCE (m)', x:chartX + 110, y:chartY - 12, color:P.muted, size:8, align:'center', alpha:0.6});
    return elems;
  }

  if (f === 5) {
    // Conclusion & report
    var elems = [
      {id:'t5', type:'label', text:t('f5title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong},
    ];
    // Report template on left
    elems.push({
      id:'rpt', type:'report_template',
      x:40, y:60, rw:240, rh:170, alpha:1
    });
    // Key message on right
    var msgX = cx + 100;
    var msgY = cy - 20;
    // Highlight box for the key message
    elems.push({
      id:'msg_box', type:'flow_box',
      x:msgX, y:msgY + 40, w:260, h:60,
      text:t('f5wrong'),
      fill:'rgba(167,139,250,0.08)', stroke:P.tertiary,
      textColor:P.tertiary, fontSize:11, lineWidth:1.5, alpha:1
    });
    // Confirmed / rejected illustration
    elems.push({id:'hc1', type:'label', text:'Hypothesis A', x:msgX - 60, y:msgY - 30, color:P.muted, size:10, alpha:0.6});
    elems.push({id:'hc2', type:'label', text:'CONFIRMED', x:msgX + 50, y:msgY - 30, color:'#22c55e', size:10, alpha:0.8});
    elems.push({id:'hr1', type:'label', text:'Hypothesis B', x:msgX - 60, y:msgY - 8, color:P.muted, size:10, alpha:0.6});
    elems.push({id:'hr2', type:'label', text:'REJECTED', x:msgX + 50, y:msgY - 8, color:'#ef4444', size:10, alpha:0.8});
    // Small plane icons
    elems.push({id:'p5d', type:'plane', x:msgX - 100, y:msgY - 30, planeType:'dart', color:'#22c55e', scale:0.8, alpha:0.7});
    elems.push({id:'p5g', type:'plane', x:msgX - 100, y:msgY - 8, planeType:'glider', color:'#ef4444', scale:0.8, alpha:0.7});
    return elems;
  }

  return [];
}

AnimRuntime.boot();
</script>
</body>
</html>
