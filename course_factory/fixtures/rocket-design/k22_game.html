<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.mode-toggle{display:flex;gap:4px;margin-top:4px;}
.mode-toggle button{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:4px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));background:transparent;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;flex:1;transition:all 0.2s;}
.mode-toggle button.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">COLLISION LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <!-- Ball 1 controls -->
    <div class="sidebar-section" id="ball1Label">BALL 1</div>
    <div class="slider-group">
      <label id="m1Label">MASS</label>
      <input type="range" id="m1Slider" min="1" max="20" value="8" step="1">
      <div class="val" id="m1Val">8 kg</div>
    </div>
    <div class="slider-group">
      <label id="v1Label">VELOCITY</label>
      <input type="range" id="v1Slider" min="0" max="10" value="6" step="0.5">
      <div class="val" id="v1Val">6 m/s</div>
    </div>
    <div class="sidebar-divider"></div>
    <!-- Ball 2 controls -->
    <div class="sidebar-section" id="ball2Label">BALL 2</div>
    <div class="slider-group">
      <label id="m2Label">MASS</label>
      <input type="range" id="m2Slider" min="1" max="20" value="2" step="1">
      <div class="val" id="m2Val">2 kg</div>
    </div>
    <div class="slider-group">
      <label id="v2Label">VELOCITY</label>
      <input type="range" id="v2Slider" min="-10" max="0" value="0" step="0.5">
      <div class="val" id="v2Val">0 m/s</div>
    </div>
    <div class="sidebar-divider"></div>
    <!-- Collision mode -->
    <div class="sidebar-section" id="modeLabel">MODE</div>
    <div class="mode-toggle">
      <button class="active" id="btnElastic" data-mode="elastic">ELASTIC</button>
      <button id="btnInelastic" data-mode="inelastic">INELASTIC</button>
    </div>
    <button class="action-btn" id="btnCollide">COLLIDE!</button>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">MOMENTUM LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">P1 BEFORE</div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">P2 BEFORE</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">P1 AFTER</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">P2 AFTER</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">TOTAL</div><div class="hud-val" id="hudV5">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">EXPERIMENTS</span>
      <span class="status-val" id="statusVal">0</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(91,163,217,0.04)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#3d7ab5');
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  drawScene();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:       {en:'COLLISION LAB', cn:'\u78b0\u649e\u5b9e\u9a8c\u5ba4'},
  subtitle:    {en:'Explore momentum conservation', cn:'\u63a2\u7d22\u52a8\u91cf\u5b88\u6052'},
  guide:       {en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  guideText:   {en:'Set mass and velocity for two balls using sliders. Choose elastic or inelastic collision. Press COLLIDE to watch! Observe how momentum transfers between balls.', cn:'\u7528\u6ed1\u5757\u8bbe\u7f6e\u4e24\u4e2a\u7403\u7684\u8d28\u91cf\u548c\u901f\u5ea6\u3002\u9009\u62e9\u5f39\u6027\u6216\u5b8c\u5168\u975e\u5f39\u6027\u78b0\u649e\u3002\u70b9\u51fb\u201c\u78b0\u649e\uff01\u201d\u89c2\u5bdf\uff01\u6ce8\u610f\u52a8\u91cf\u5982\u4f55\u5728\u4e24\u7403\u4e4b\u95f4\u8f6c\u79fb\u3002'},
  ball1:       {en:'BALL 1', cn:'\u7403 1'},
  ball2:       {en:'BALL 2', cn:'\u7403 2'},
  mass:        {en:'MASS', cn:'\u8d28\u91cf'},
  velocity:    {en:'VELOCITY', cn:'\u901f\u5ea6'},
  collide:     {en:'COLLIDE!', cn:'\u78b0\u649e\uff01'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},
  elastic:     {en:'ELASTIC', cn:'\u5f39\u6027'},
  inelastic:   {en:'INELASTIC', cn:'\u975e\u5f39\u6027'},
  modeLabel:   {en:'MODE', cn:'\u6a21\u5f0f'},
  p1before:    {en:'P1 BEFORE', cn:'\u78b0\u524d P1'},
  p2before:    {en:'P2 BEFORE', cn:'\u78b0\u524d P2'},
  p1after:     {en:'P1 AFTER', cn:'\u78b0\u540e P1'},
  p2after:     {en:'P2 AFTER', cn:'\u78b0\u540e P2'},
  totalMom:    {en:'TOTAL', cn:'\u603b\u52a8\u91cf'},
  expLabel:    {en:'EXPERIMENTS', cn:'\u5b9e\u9a8c\u6b21\u6570'},
  conserved:   {en:'MOMENTUM CONSERVED!', cn:'\u52a8\u91cf\u5b88\u6052\uff01'},
  waiting:     {en:'SET PARAMS & COLLIDE', cn:'\u8bbe\u7f6e\u53c2\u6570\u5e76\u78b0\u649e'},
  running:     {en:'SIMULATING...', cn:'\u6a21\u62df\u4e2d...'},
  tag:         {en:'MOMENTUM LAB', cn:'\u52a8\u91cf\u5b9e\u9a8c\u5ba4'},
  ball1Right:  {en:'Ball 1 \u2192', cn:'\u7403 1 \u2192'},
  ball2Left:   {en:'\u2190 Ball 2', cn:'\u2190 \u7403 2'},
  beforeLabel: {en:'BEFORE COLLISION', cn:'\u78b0\u649e\u524d'},
  afterLabel:  {en:'AFTER COLLISION', cn:'\u78b0\u649e\u540e'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('ball1Label').textContent = t('ball1');
  document.getElementById('ball2Label').textContent = t('ball2');
  document.getElementById('m1Label').textContent = t('mass');
  document.getElementById('v1Label').textContent = t('velocity');
  document.getElementById('m2Label').textContent = t('mass');
  document.getElementById('v2Label').textContent = t('velocity');
  document.getElementById('btnCollide').textContent = t('collide');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('btnElastic').textContent = t('elastic');
  document.getElementById('btnInelastic').textContent = t('inelastic');
  document.getElementById('modeLabel').textContent = t('modeLabel');
  document.getElementById('hudTag').textContent = t('tag');
  document.getElementById('hudL1').textContent = t('p1before');
  document.getElementById('hudL2').textContent = t('p2before');
  document.getElementById('hudL3').textContent = t('p1after');
  document.getElementById('hudL4').textContent = t('p2after');
  document.getElementById('hudL5').textContent = t('totalMom');
  document.getElementById('statusLabel').textContent = t('expLabel');
  drawScene();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// GAME STATE
// ================================================================
var canvas, ctx;
var collisionMode = 'elastic'; // 'elastic' or 'inelastic'
var experimentCount = 0;
var simState = 'idle'; // 'idle', 'running', 'done'
var simTime = 0;
var simDuration = 3; // seconds
var animId = null;
var lastTimestamp = 0;

// Ball positions and velocities during simulation
var ball1 = { m:8, v0:6, v:6, x:0, vAfter:0 };
var ball2 = { m:2, v0:0, v:0, x:0, vAfter:0 };
var collided = false;
var collisionX = 0;

function readSliders() {
  ball1.m = parseFloat(document.getElementById('m1Slider').value);
  ball1.v0 = parseFloat(document.getElementById('v1Slider').value);
  ball2.m = parseFloat(document.getElementById('m2Slider').value);
  ball2.v0 = parseFloat(document.getElementById('v2Slider').value);
  document.getElementById('m1Val').textContent = ball1.m + ' kg';
  document.getElementById('v1Val').textContent = ball1.v0 + ' m/s';
  document.getElementById('m2Val').textContent = ball2.m + ' kg';
  document.getElementById('v2Val').textContent = ball2.v0 + ' m/s';
}

function computeCollision() {
  var m1 = ball1.m, m2 = ball2.m;
  var v1 = ball1.v0, v2 = ball2.v0;

  if (collisionMode === 'elastic') {
    // Elastic collision formulas
    ball1.vAfter = ((m1 - m2) * v1 + 2 * m2 * v2) / (m1 + m2);
    ball2.vAfter = ((m2 - m1) * v2 + 2 * m1 * v1) / (m1 + m2);
  } else {
    // Perfectly inelastic -- balls stick together
    var vf = (m1 * v1 + m2 * v2) / (m1 + m2);
    ball1.vAfter = vf;
    ball2.vAfter = vf;
  }
}

function ballRadius(mass) {
  // radius proportional to cube root of mass, scaled
  return 12 + Math.pow(mass, 0.5) * 5;
}

function resizeCanvas() {
  var wrap = canvas.parentElement;
  var rect = wrap.getBoundingClientRect();
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var cw = Math.max(rect.width, 100);
  var ch = Math.max(rect.height, 80);
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawScene();
}

function drawScene() {
  if (!ctx) return;
  var cw = canvas.width / (Math.min(window.devicePixelRatio || 1, 2));
  var ch = canvas.height / (Math.min(window.devicePixelRatio || 1, 2));
  var mc = gameModeColors();

  // Background
  drawGameBg(ctx, cw, ch);

  // Track line
  var trackY = ch * 0.5;
  var trackLeft = 40;
  var trackRight = cw - 40;
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(trackLeft, trackY);
  ctx.lineTo(trackRight, trackY);
  ctx.stroke();

  // Track center mark
  var trackCenter = (trackLeft + trackRight) / 2;
  ctx.strokeStyle = mc.dim;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(trackCenter, trackY - 30);
  ctx.lineTo(trackCenter, trackY + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  var r1 = ballRadius(ball1.m);
  var r2 = ballRadius(ball2.m);

  if (simState === 'idle') {
    // Show balls at starting positions
    var x1 = trackLeft + (trackRight - trackLeft) * 0.25;
    var x2 = trackLeft + (trackRight - trackLeft) * 0.75;

    drawBall(x1, trackY, r1, ACCENT, t('ball1Right'), mc);
    drawBall(x2, trackY, r2, '#e8a838', t('ball2Left'), mc);

    // Velocity arrows
    if (ball1.v0 > 0) drawArrow(x1 + r1 + 5, trackY, x1 + r1 + 5 + ball1.v0 * 6, trackY, ACCENT);
    if (ball2.v0 < 0) drawArrow(x2 - r2 - 5, trackY, x2 - r2 - 5 + ball2.v0 * 6, trackY, '#e8a838');

    // Momentum labels below track
    var p1 = ball1.m * ball1.v0;
    var p2 = ball2.m * ball2.v0;
    ctx.font = "bold 11px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = ACCENT;
    ctx.fillText('p = ' + p1.toFixed(1) + ' kg\u00b7m/s', x1, trackY + r1 + 30);
    ctx.fillStyle = '#e8a838';
    ctx.fillText('p = ' + p2.toFixed(1) + ' kg\u00b7m/s', x2, trackY + r2 + 30);

    // Status text
    ctx.font = "12px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillStyle = mc.dim;
    ctx.textAlign = 'center';
    ctx.fillText(t('waiting'), cw / 2, ch - 20);

  } else if (simState === 'running' || simState === 'done') {
    // Animated positions
    drawBall(ball1.x, trackY, r1, ACCENT, '', mc);
    drawBall(ball2.x, trackY, r2, '#e8a838', '', mc);

    // In inelastic mode after collision, draw combined
    if (collisionMode === 'inelastic' && collided) {
      // Draw a ring around the combined ball
      var combinedR = ballRadius(ball1.m + ball2.m);
      ctx.strokeStyle = mc.accent;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ball1.x, trackY, combinedR + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Velocity arrows during simulation
    if (!collided) {
      if (ball1.v > 0.1) drawArrow(ball1.x + r1 + 3, trackY - r1 - 8, ball1.x + r1 + 3 + ball1.v * 4, trackY - r1 - 8, ACCENT);
      if (ball2.v < -0.1) drawArrow(ball2.x - r2 - 3, trackY - r2 - 8, ball2.x - r2 - 3 + ball2.v * 4, trackY - r2 - 8, '#e8a838');
    } else {
      if (Math.abs(ball1.vAfter) > 0.1) {
        var dir1 = ball1.vAfter > 0 ? 1 : -1;
        drawArrow(ball1.x + dir1 * (r1 + 3), trackY - r1 - 8, ball1.x + dir1 * (r1 + 3) + ball1.vAfter * 4, trackY - r1 - 8, ACCENT);
      }
      if (collisionMode === 'elastic' && Math.abs(ball2.vAfter) > 0.1) {
        var dir2 = ball2.vAfter > 0 ? 1 : -1;
        drawArrow(ball2.x + dir2 * (r2 + 3), trackY - r2 - 8, ball2.x + dir2 * (r2 + 3) + ball2.vAfter * 4, trackY - r2 - 8, '#e8a838');
      }
    }

    // Momentum labels
    var cp1, cp2;
    if (!collided) {
      cp1 = ball1.m * ball1.v;
      cp2 = ball2.m * ball2.v;
    } else {
      cp1 = ball1.m * ball1.vAfter;
      cp2 = ball2.m * ball2.vAfter;
    }
    ctx.font = "bold 10px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = ACCENT;
    ctx.fillText('p=' + cp1.toFixed(1), ball1.x, trackY + r1 + 22);
    ctx.fillStyle = '#e8a838';
    if (collisionMode === 'elastic' || !collided) {
      ctx.fillText('p=' + cp2.toFixed(1), ball2.x, trackY + r2 + 22);
    }

    if (simState === 'done') {
      // Conservation badge
      ctx.font = "bold 13px 'JetBrains Mono',monospace";
      ctx.fillStyle = '#22c55e';
      ctx.textAlign = 'center';
      ctx.fillText(t('conserved'), cw / 2, ch - 20);

      // Draw before/after bar comparison at bottom
      drawMomentumBars(ctx, cw, ch, trackY, mc);
    } else {
      ctx.font = "12px 'Inter','Noto Sans SC',sans-serif";
      ctx.fillStyle = mc.dim;
      ctx.textAlign = 'center';
      ctx.fillText(t('running'), cw / 2, ch - 20);
    }
  }
}

function drawMomentumBars(c, cw, ch, trackY, mc) {
  var barTop = trackY + 60;
  var barH = 16;
  var maxW = (cw - 120) / 2;
  var p1b = ball1.m * ball1.v0;
  var p2b = ball2.m * ball2.v0;
  var p1a = ball1.m * ball1.vAfter;
  var p2a = collisionMode === 'elastic' ? ball2.m * ball2.vAfter : 0;
  var totalBefore = p1b + p2b;
  var totalAfter = p1a + p2a;
  if (collisionMode === 'inelastic') {
    totalAfter = (ball1.m + ball2.m) * ball1.vAfter;
  }
  var maxP = Math.max(Math.abs(totalBefore), Math.abs(totalAfter), 1);
  var scale = maxW / maxP;

  // Before
  c.font = "9px 'JetBrains Mono',monospace";
  c.textAlign = 'left';
  c.fillStyle = mc.dim;
  c.fillText(t('beforeLabel'), 20, barTop - 4);
  var bw = Math.abs(totalBefore) * scale;
  c.fillStyle = ACCENT;
  c.globalAlpha = 0.6;
  c.fillRect(20, barTop, bw, barH);
  c.globalAlpha = 1;
  c.fillStyle = mc.text;
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillText(totalBefore.toFixed(1), 24 + bw, barTop + 12);

  // After
  c.font = "9px 'JetBrains Mono',monospace";
  c.fillStyle = mc.dim;
  c.fillText(t('afterLabel'), 20, barTop + barH + 14);
  var aw = Math.abs(totalAfter) * scale;
  c.fillStyle = '#22c55e';
  c.globalAlpha = 0.6;
  c.fillRect(20, barTop + barH + 18, aw, barH);
  c.globalAlpha = 1;
  c.fillStyle = mc.text;
  c.font = "bold 10px 'JetBrains Mono',monospace";
  c.fillText(totalAfter.toFixed(1), 24 + aw, barTop + barH + 30);
}

function drawBall(x, y, r, color, labelText, mc) {
  // Gradient fill
  var g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, adjustBrightness(color, -40));
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  if (gameModeColors().glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Label
  if (labelText) {
    ctx.font = "bold 10px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = mc.text;
    ctx.fillText(labelText, x, y - r - 10);
  }
}

function drawArrow(x1, y1, x2, y2, color) {
  var dx = x2 - x1, dy = y2 - y1;
  var len = Math.sqrt(dx * dx + dy * dy);
  if (len < 3) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // Arrowhead
  var angle = Math.atan2(dy, dx);
  var hs = 8;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

function adjustBrightness(hex, amount) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ================================================================
// SIMULATION
// ================================================================
function startCollision() {
  if (simState === 'running') return;
  readSliders();
  computeCollision();

  var cw = canvas.width / (Math.min(window.devicePixelRatio || 1, 2));
  var trackLeft = 40, trackRight = cw - 40;
  var r1 = ballRadius(ball1.m), r2 = ballRadius(ball2.m);

  ball1.x = trackLeft + (trackRight - trackLeft) * 0.25;
  ball2.x = trackLeft + (trackRight - trackLeft) * 0.75;
  ball1.v = ball1.v0;
  ball2.v = ball2.v0;
  collided = false;
  simState = 'running';
  simTime = 0;

  // Update HUD before values
  var p1b = ball1.m * ball1.v0;
  var p2b = ball2.m * ball2.v0;
  document.getElementById('hudV1').textContent = p1b.toFixed(1);
  document.getElementById('hudV2').textContent = p2b.toFixed(1);
  document.getElementById('hudV3').textContent = '--';
  document.getElementById('hudV4').textContent = '--';
  document.getElementById('hudV5').textContent = (p1b + p2b).toFixed(1);

  document.getElementById('btnCollide').disabled = true;
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';

  lastTimestamp = 0;
  animId = requestAnimationFrame(simLoop);
}

function simLoop(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  var dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
  lastTimestamp = timestamp;
  simTime += dt;

  var cw = canvas.width / (Math.min(window.devicePixelRatio || 1, 2));
  var trackLeft = 40, trackRight = cw - 40;
  var r1 = ballRadius(ball1.m), r2 = ballRadius(ball2.m);
  var pixelsPerMeter = (trackRight - trackLeft) / 20; // scale factor

  if (!collided) {
    // Move balls towards each other
    ball1.x += ball1.v * pixelsPerMeter * dt;
    ball2.x += ball2.v * pixelsPerMeter * dt;

    // Check for collision (balls touching)
    var dist = ball2.x - ball1.x;
    if (dist <= r1 + r2) {
      collided = true;
      collisionX = (ball1.x + ball2.x) / 2;

      if (collisionMode === 'inelastic') {
        // Balls stick together at collision point
        ball1.x = collisionX;
        ball2.x = collisionX;
      }

      // Switch to post-collision velocities
      ball1.v = ball1.vAfter;
      ball2.v = ball2.vAfter;
    }
  } else {
    // Post-collision movement
    if (collisionMode === 'elastic') {
      ball1.x += ball1.vAfter * pixelsPerMeter * dt;
      ball2.x += ball2.vAfter * pixelsPerMeter * dt;
    } else {
      // Inelastic: both move together
      ball1.x += ball1.vAfter * pixelsPerMeter * dt;
      ball2.x = ball1.x; // stuck together
    }
  }

  drawScene();

  // End condition: either timeout or balls off screen
  var offScreen = ball1.x < trackLeft - 50 || ball1.x > trackRight + 50 ||
                  ball2.x < trackLeft - 50 || ball2.x > trackRight + 50;

  if (simTime > simDuration || (collided && simTime > 1.5) || offScreen) {
    simState = 'done';
    experimentCount++;
    document.getElementById('statusVal').textContent = experimentCount;
    document.getElementById('btnCollide').disabled = false;

    // Update HUD after values
    var p1a = ball1.m * ball1.vAfter;
    var p2a = collisionMode === 'elastic' ? ball2.m * ball2.vAfter : 0;
    var totalAfter = collisionMode === 'elastic' ? p1a + p2a : (ball1.m + ball2.m) * ball1.vAfter;
    document.getElementById('hudV3').textContent = p1a.toFixed(1);
    document.getElementById('hudV4').textContent = collisionMode === 'elastic' ? p2a.toFixed(1) : '--';
    document.getElementById('hudV5').textContent = totalAfter.toFixed(1);

    document.getElementById('statusResult').textContent = t('conserved');
    document.getElementById('statusResult').className = 'status-result pass';

    drawScene();
    return;
  }

  animId = requestAnimationFrame(simLoop);
}

function resetSim() {
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  simState = 'idle';
  collided = false;
  document.getElementById('btnCollide').disabled = false;
  document.getElementById('hudV1').textContent = '--';
  document.getElementById('hudV2').textContent = '--';
  document.getElementById('hudV3').textContent = '--';
  document.getElementById('hudV4').textContent = '--';
  document.getElementById('hudV5').textContent = '--';
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  readSliders();
  drawScene();
}

// ================================================================
// INIT
// ================================================================
function init() {
  canvas = document.getElementById('gc');
  ctx = canvas.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();
  readSliders();

  // Slider listeners
  ['m1Slider','v1Slider','m2Slider','v2Slider'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      readSliders();
      if (simState === 'idle') drawScene();
    });
  });

  // Mode toggle
  document.getElementById('btnElastic').addEventListener('click', function() {
    collisionMode = 'elastic';
    document.getElementById('btnElastic').classList.add('active');
    document.getElementById('btnInelastic').classList.remove('active');
  });
  document.getElementById('btnInelastic').addEventListener('click', function() {
    collisionMode = 'inelastic';
    document.getElementById('btnInelastic').classList.add('active');
    document.getElementById('btnElastic').classList.remove('active');
  });

  // Action buttons
  document.getElementById('btnCollide').addEventListener('click', startCollision);
  document.getElementById('btnReset').addEventListener('click', resetSim);

  // Resize handling
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Font-ready redraw
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() {
      setTimeout(function() { drawScene(); }, 100);
    });
  } else {
    setTimeout(function() { drawScene(); }, 300);
  }
}

init();
</script>
