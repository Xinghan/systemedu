<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#8b5cf6));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">ENGINE SELECT</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="scoreLabel">SCORE</div>
    <div class="sidebar-guide" id="scoreDisplay" style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--sb-accent,var(--primary));text-align:center;">0 / 5</div>
    <div class="sidebar-divider"></div>
    <button class="reset-btn" id="btnReset">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">ENGINE SELECT</div>
      <div class="hud-item"><div class="hud-label" id="hudL1">MISSION</div><div class="hud-val" id="hudV1">1/5</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">MASS</div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">TARGET</div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">TWR</div><div class="hud-val" id="hudV4">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL5">ALT</div><div class="hud-val" id="hudV5">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">SELECT AN ENGINE</span>
      <span class="status-val" id="statusTrials">0 / 5</span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';

var ACCENT = '#8b5cf6';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(139,92,246,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#6d28d9');
  r.style.setProperty('--glow-strong', 'rgba(139,92,246,0.35)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {

                cn:'\u70b9\u51fb\u53d1\u52a8\u673a\u5361\u7247\u9009\u62e9\u5b83\u3002\u7cfb\u7edf\u8ba1\u7b97\u63a8\u91cd\u6bd4\u548c\u9884\u6d4b\u9ad8\u5ea6\u3002\u4fee\u6b63\u540e\u9ad8\u5ea6\u5728\u76ee\u6807\u00b120%\u5185\u5373\u4efb\u52a1\u6210\u529f\uff01'},
  scoreLabel:  {en:'SCORE', cn:'\u5f97\u5206'},
  missionLabel:{en:'MISSION', cn:'\u4efb\u52a1'},
  massLabel:   {en:'MASS', cn:'\u8d28\u91cf'},
  targetLabel: {en:'TARGET', cn:'\u76ee\u6807'},
  twrLabel:    {en:'TWR', cn:'\u63a8\u91cd\u6bd4'},
  altLabel:    {en:'ALT', cn:'\u9ad8\u5ea6'},
  statusReady: {en:'SELECT AN ENGINE', cn:'\u9009\u62e9\u4e00\u6b3e\u53d1\u52a8\u673a'},
  reset:       {en:'RESET', cn:'\u91cd\u7f6e'},

  tooHigh:     {en:'Overshoot! Engine too powerful / expensive.', cn:'\u8d85\u8fc7\u76ee\u6807\uff01\u53d1\u52a8\u673a\u8fc7\u5f3a/\u6d6a\u8d39\u3002'},

  perfect:     {en:'Right on target!', cn:'\u6b63\u4e2d\u76ee\u6807\uff01'},
  briefing:    {en:'MISSION BRIEFING', cn:'\u4efb\u52a1\u7b80\u62a5'},
  rocketMass:  {en:'Rocket', cn:'\u706b\u7bad'},
  targetAlt:   {en:'Target Alt', cn:'\u76ee\u6807\u9ad8\u5ea6'},
  impulse:     {en:'Impulse', cn:'\u51b2\u91cf'},
  peakThrust:  {en:'Peak Thrust', cn:'\u5cf0\u503c\u63a8\u529b'},
  burnTime:    {en:'Burn', cn:'\u71c3\u70e7\u65f6\u95f4'},
  isp:         {en:'Isp', cn:'\u6bd4\u51b2'},
  engMass:     {en:'Mass', cn:'\u8d28\u91cf'},
  price:       {en:'Price', cn:'\u4ef7\u683c'},
  corrAlt:     {en:'Corrected Alt', cn:'\u4fee\u6b63\u9ad8\u5ea6'},
  idealAlt:    {en:'Ideal Alt', cn:'\u7406\u60f3\u9ad8\u5ea6'},
  launching:   {en:'LAUNCHING...', cn:'\u53d1\u5c04\u4e2d...'},
  clickEngine: {en:'Click an engine card below', cn:'\u70b9\u51fb\u4e0b\u65b9\u53d1\u52a8\u673a\u5361\u7247'},
  missionPass: {en:' PASSED', cn:' \u901a\u8fc7'},
  missionFail: {en:' FAILED', cn:' \u5931\u8d25'},
  summary:     {en:'SELECTION SUMMARY', cn:'\u9009\u578b\u603b\u7ed3'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
    draw();
  });
}

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideLabel').textContent = t('guide');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('scoreLabel').textContent = t('scoreLabel');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('hudL1').textContent = t('missionLabel');
  document.getElementById('hudL2').textContent = t('massLabel');
  document.getElementById('hudL3').textContent = t('targetLabel');
  document.getElementById('hudL4').textContent = t('twrLabel');
  document.getElementById('hudL5').textContent = t('altLabel');
  document.getElementById('statusLabel').textContent = t('statusReady');
  document.getElementById('btnReset').textContent = t('reset');
}

// ================================================================
// ENGINE DATABASE
// ================================================================
var ENGINES = [
  { id:'A8-3', nameEn:'Estes A8-3', nameCn:'Estes A8-3', impulse:2.5, peakThrust:8, burnTime:0.5, isp:80, mass:16, price:3 },
  { id:'B6-4', nameEn:'Estes B6-4', nameCn:'Estes B6-4', impulse:5.0, peakThrust:6, burnTime:0.9, isp:90, mass:18, price:4 },
  { id:'C6-5', nameEn:'Estes C6-5', nameCn:'Estes C6-5', impulse:10.0, peakThrust:6, burnTime:1.8, isp:100, mass:24, price:6 },
  { id:'D12-5', nameEn:'Estes D12-5', nameCn:'Estes D12-5', impulse:20.0, peakThrust:12, burnTime:1.7, isp:110, mass:44, price:10 },
];

// ================================================================
// MISSIONS (5 progressively harder)
// ================================================================
var MISSIONS = [
  { rocketMassG:100, targetAlt:50,  desc_en:'Light scout rocket', desc_cn:'\u8f7b\u578b\u4fa6\u5bdf\u706b\u7bad' },
  { rocketMassG:200, targetAlt:80,  desc_en:'Standard payload', desc_cn:'\u6807\u51c6\u8f7d\u8377\u706b\u7bad' },
  { rocketMassG:300, targetAlt:150, desc_en:'Heavy lifter challenge', desc_cn:'\u91cd\u578b\u706b\u7bad\u6311\u6218' },
  { rocketMassG:150, targetAlt:200, desc_en:'High altitude probe', desc_cn:'\u9ad8\u7a7a\u63a2\u6d4b\u706b\u7bad' },
  { rocketMassG:400, targetAlt:100, desc_en:'Max mass, low orbit', desc_cn:'\u6700\u5927\u8d28\u91cf\u4f4e\u8f68\u9053' },
];

// ================================================================
// GAME STATE
// ================================================================
var cvs = document.getElementById('gc');
var ctx = cvs.getContext('2d');
var W = 800, H = 600;
var dpr = window.devicePixelRatio || 1;

var missionIdx = 0;
var score = 0;
var phase = 'select'; // select, launching, result, complete
var selectedEngine = -1;
var hoverEngine = -1;
var launchAnim = { t:0, maxT:120, rocketY:0, targetY:0, gaugeY:0 };
var missionResults = [];
var calcTWR = 0;
var calcIdealAlt = 0;
var calcCorrAlt = 0;
var resultMsg = '';
var resultOk = false;
var cardRects = []; // {x,y,w,h} for each engine card
var nextBtnRect = {x:0,y:0,w:0,h:0};
var showNextBtn = false;

function resize() {
  var parent = cvs.parentElement;
  W = parent.clientWidth;
  H = parent.clientHeight;
  cvs.width = W * dpr;
  cvs.height = H * dpr;
  ctx.scale(dpr, dpr);
  draw();
}

// ================================================================
// PHYSICS
// ================================================================
function calcPhysics(engineIdx, rocketMassG) {
  var eng = ENGINES[engineIdx];
  var totalMassKg = (rocketMassG + eng.mass) / 1000;
  var weightN = totalMassKg * 9.8;
  var twr = eng.peakThrust / weightN;
  // Ideal altitude from energy: h = impulse / (m * g) * (impulse / (2 * m))
  // Simplified: h_ideal = (impulse^2) / (2 * m^2 * g) -- Tsiolkovsky-lite
  // Actually use: v_exhaust = impulse / totalMass, h = v^2 / (2g)
  var v = eng.impulse / totalMassKg;
  var idealAlt = (v * v) / (2 * 9.8);
  var corrAlt = idealAlt * 0.6; // drag correction factor
  return { twr: twr, idealAlt: idealAlt, corrAlt: corrAlt, weightN: weightN, eng: eng, totalMassKg: totalMassKg };
}

function checkMission(corrAlt, targetAlt) {
  if (corrAlt < 0.01) return { ok: false, msgKey: 'noLift' };
  var ratio = corrAlt / targetAlt;
  if (ratio >= 0.8 && ratio <= 1.2) return { ok: true, msgKey: 'perfect' };
  if (ratio < 0.8) return { ok: false, msgKey: 'tooLow' };
  return { ok: false, msgKey: 'tooHigh' };
}

// ================================================================
// DRAWING
// ================================================================
function draw() {
  ctx.save();
  drawGameBg(ctx, W, H);
  var mc = gameModeColors();

  if (phase === 'complete') {
    drawCompleteScreen(mc);
    ctx.restore();
    return;
  }

  var mission = MISSIONS[missionIdx];
  // Layout zones
  var briefH = H * 0.18;
  var cardsH = H * 0.42;
  var launchH = H * 0.40;
  var briefY = 0;
  var cardsY = briefH;
  var launchY = briefH + cardsH;

  // ---- Mission briefing area ----
  drawBriefing(mc, mission, 0, briefY, W, briefH);

  // ---- Engine cards ----
  drawEngineCards(mc, cardsY, cardsH);

  // ---- Launch / result area ----
  if (phase === 'launching' || phase === 'result') {
    drawLaunchZone(mc, launchY, launchH);
  } else {
    // Prompt text
    ctx.fillStyle = mc.dim;
    ctx.font = '14px "Noto Sans SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('clickEngine'), W / 2, launchY + launchH / 2);
  }

  ctx.restore();
}

function drawBriefing(mc, mission, x, y, w, h) {
  // Background panel
  ctx.fillStyle = mc.accent + '10';
  ctx.fillRect(x + 20, y + 8, w - 40, h - 16);
  ctx.strokeStyle = mc.accent + '40';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 20, y + 8, w - 40, h - 16);

  // Title
  ctx.fillStyle = mc.accent;
  ctx.font = 'bold 13px "JetBrains Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(t('briefing'), x + 36, y + 28);

  // Mission description
  ctx.fillStyle = mc.text;
  ctx.font = '13px "Noto Sans SC", sans-serif';
  var desc = LANG === 'cn' ? mission.desc_cn : mission.desc_en;
  ctx.fillText('M' + (missionIdx + 1) + ': ' + desc, x + 36, y + 50);

  // Rocket mass + target
  var col1x = x + 36;
  var col2x = x + w * 0.35;
  var col3x = x + w * 0.65;
  var rowY = y + 74;

  ctx.fillStyle = mc.dim;
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillText(t('rocketMass') + ':', col1x, rowY);
  ctx.fillStyle = mc.text;
  ctx.font = 'bold 14px "JetBrains Mono", monospace';
  ctx.fillText(mission.rocketMassG + 'g', col1x + 80, rowY);

  ctx.fillStyle = mc.dim;
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillText(t('targetAlt') + ':', col2x, rowY);
  ctx.fillStyle = '#22c55e';
  ctx.font = 'bold 14px "JetBrains Mono", monospace';
  ctx.fillText(mission.targetAlt + 'm', col2x + 90, rowY);

  // Tolerance hint
  ctx.fillStyle = mc.dim;
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.fillText('+/- 20%  =  [' + Math.round(mission.targetAlt * 0.8) + 'm ~ ' + Math.round(mission.targetAlt * 1.2) + 'm]', col3x, rowY);

  // Mission progress dots
  var dotStartX = x + w - 140;
  for (var i = 0; i < MISSIONS.length; i++) {
    var dx = dotStartX + i * 22;
    var dy = y + 28;
    ctx.beginPath();
    ctx.arc(dx, dy, 6, 0, Math.PI * 2);
    if (i < missionResults.length) {
      ctx.fillStyle = missionResults[i] ? '#22c55e' : '#ef4444';
      ctx.fill();
    } else if (i === missionIdx) {
      ctx.strokeStyle = mc.accent;
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      ctx.fillStyle = mc.strokeDim;
      ctx.fill();
    }
  }
}

function drawEngineCards(mc, cardsY, cardsH) {
  var cardCount = ENGINES.length;
  var totalPad = 40;
  var gap = 12;
  var availW = W - totalPad * 2 - gap * (cardCount - 1);
  var cardW = Math.min(availW / cardCount, 220);
  var cardH = cardsH - 24;
  var startX = (W - (cardW * cardCount + gap * (cardCount - 1))) / 2;

  cardRects = [];
  for (var i = 0; i < cardCount; i++) {
    var eng = ENGINES[i];
    var cx = startX + i * (cardW + gap);
    var cy = cardsY + 12;
    cardRects.push({ x: cx, y: cy, w: cardW, h: cardH });

    var isHover = hoverEngine === i && phase === 'select';
    var isSelected = selectedEngine === i;

    // Card background
    if (isSelected) {
      ctx.fillStyle = mc.accent + '25';
      ctx.strokeStyle = mc.accent;
      ctx.lineWidth = 2;
    } else if (isHover) {
      ctx.fillStyle = mc.accent + '12';
      ctx.strokeStyle = mc.accent + '80';
      ctx.lineWidth = 1.5;
    } else {
      ctx.fillStyle = mc.bg1 + 'cc';
      ctx.strokeStyle = mc.strokeDim;
      ctx.lineWidth = 1;
    }

    // Rounded rect
    drawRoundRect(ctx, cx, cy, cardW, cardH, 6);
    ctx.fill();
    ctx.stroke();

    // Engine name header
    ctx.fillStyle = isSelected ? mc.accent : mc.text;
    ctx.font = 'bold 13px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(eng.id, cx + cardW / 2, cy + 24);

    // Divider
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx + 10, cy + 34);
    ctx.lineTo(cx + cardW - 10, cy + 34);
    ctx.stroke();

    // Specs
    var specs = [
      { label: t('impulse'),    val: eng.impulse + ' Ns' },
      { label: t('peakThrust'), val: eng.peakThrust + ' N' },
      { label: t('burnTime'),   val: eng.burnTime + ' s' },
      { label: t('isp'),        val: eng.isp + ' s' },
      { label: t('engMass'),    val: eng.mass + ' g' },
      { label: t('price'),      val: '$' + eng.price },
    ];

    var specY = cy + 50;
    var lineH = (cardH - 60) / specs.length;
    lineH = Math.min(lineH, 26);
    for (var j = 0; j < specs.length; j++) {
      var sy = specY + j * lineH;
      ctx.fillStyle = mc.dim;
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillText(specs[j].label, cx + 10, sy);
      ctx.fillStyle = mc.text;
      ctx.font = 'bold 11px "JetBrains Mono", monospace';
      ctx.textAlign = 'right';
      ctx.fillText(specs[j].val, cx + cardW - 10, sy);
    }

    // Hover glow effect
    if (isHover && phase === 'select') {
      ctx.shadowColor = mc.accent;
      ctx.shadowBlur = 12;
      ctx.strokeStyle = mc.accent + '60';
      ctx.lineWidth = 1;
      drawRoundRect(ctx, cx, cy, cardW, cardH, 6);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }
}

function drawLaunchZone(mc, launchY, launchH) {
  var mission = MISSIONS[missionIdx];
  var eng = ENGINES[selectedEngine];

  // Divide: left = rocket + altitude gauge, right = data panel
  var leftW = W * 0.5;
  var rightW = W * 0.5;
  var rightX = leftW;

  // ---- Left: Launch animation + altitude gauge ----
  var gaugeX = 60;
  var gaugeW = 24;
  var gaugeTop = launchY + 20;
  var gaugeBot = launchY + launchH - 20;
  var gaugeH = gaugeBot - gaugeTop;

  // Altitude scale on gauge
  var maxDisplayAlt = Math.max(mission.targetAlt * 1.5, calcCorrAlt * 1.2, 50);
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.strokeRect(gaugeX, gaugeTop, gaugeW, gaugeH);

  // Target zone on gauge
  var tgtLow = mission.targetAlt * 0.8;
  var tgtHigh = mission.targetAlt * 1.2;
  var tgtLowY = gaugeBot - (tgtLow / maxDisplayAlt) * gaugeH;
  var tgtHighY = gaugeBot - (tgtHigh / maxDisplayAlt) * gaugeH;
  ctx.fillStyle = '#22c55e20';
  ctx.fillRect(gaugeX, tgtHighY, gaugeW, tgtLowY - tgtHighY);
  ctx.strokeStyle = '#22c55e60';
  ctx.lineWidth = 1;
  ctx.strokeRect(gaugeX, tgtHighY, gaugeW, tgtLowY - tgtHighY);

  // Target line label
  ctx.fillStyle = '#22c55e';
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(mission.targetAlt + 'm', gaugeX + gaugeW + 4, gaugeBot - (mission.targetAlt / maxDisplayAlt) * gaugeH + 3);

  // Scale ticks
  ctx.fillStyle = mc.dim;
  ctx.font = '8px "JetBrains Mono", monospace';
  ctx.textAlign = 'right';
  var tickStep = maxDisplayAlt > 200 ? 50 : (maxDisplayAlt > 100 ? 25 : 10);
  for (var alt = 0; alt <= maxDisplayAlt; alt += tickStep) {
    var ty = gaugeBot - (alt / maxDisplayAlt) * gaugeH;
    ctx.beginPath();
    ctx.moveTo(gaugeX - 3, ty);
    ctx.lineTo(gaugeX, ty);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillText(alt + '', gaugeX - 6, ty + 3);
  }

  // Current altitude indicator on gauge
  var currentAlt = 0;
  if (phase === 'launching') {
    var progress = launchAnim.t / launchAnim.maxT;
    if (progress < 0.4) {
      currentAlt = calcCorrAlt * (progress / 0.4);
    } else {
      currentAlt = calcCorrAlt;
    }
  } else if (phase === 'result') {
    currentAlt = calcTWR < 1 ? 0 : calcCorrAlt;
  }

  var altY = gaugeBot - (currentAlt / maxDisplayAlt) * gaugeH;
  altY = Math.max(gaugeTop, Math.min(gaugeBot, altY));
  ctx.fillStyle = mc.accent;
  ctx.fillRect(gaugeX, altY, gaugeW, gaugeBot - altY);
  ctx.globalAlpha = 0.3;
  ctx.fillRect(gaugeX, altY, gaugeW, gaugeBot - altY);
  ctx.globalAlpha = 1;

  // Altitude number
  ctx.fillStyle = mc.accent;
  ctx.font = 'bold 12px "JetBrains Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(Math.round(currentAlt) + 'm', gaugeX + gaugeW + 4, altY - 4);

  // ---- Rocket ----
  var rocketCX = gaugeX + gaugeW + 80;
  var rocketBaseY = gaugeBot;
  var rocketTopY = gaugeTop + 30;
  var rocketDrawY = rocketBaseY;

  if (phase === 'launching') {
    var progress = launchAnim.t / launchAnim.maxT;
    if (calcTWR < 1) {
      // Shake but don't lift
      rocketDrawY = rocketBaseY + Math.sin(progress * 30) * 3;
    } else {
      if (progress < 0.4) {
        rocketDrawY = rocketBaseY - (rocketBaseY - rocketTopY) * (progress / 0.4) * (calcCorrAlt / maxDisplayAlt);
      } else {
        rocketDrawY = rocketBaseY - (rocketBaseY - rocketTopY) * (calcCorrAlt / maxDisplayAlt);
      }
    }
  } else if (phase === 'result') {
    if (calcTWR < 1) {
      rocketDrawY = rocketBaseY;
    } else {
      rocketDrawY = rocketBaseY - (rocketBaseY - rocketTopY) * (calcCorrAlt / maxDisplayAlt);
    }
  }

  rocketDrawY = Math.max(rocketTopY, Math.min(rocketBaseY, rocketDrawY));
  drawRocket(mc, rocketCX, rocketDrawY, phase === 'launching');

  // Ground line
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(gaugeX - 10, rocketBaseY);
  ctx.lineTo(rocketCX + 60, rocketBaseY);
  ctx.stroke();

  // ---- Right: Data panel ----
  var panelX = rightX + 20;
  var panelY = launchY + 10;
  var panelW = rightW - 40;
  var panelH = launchH - 20;

  ctx.fillStyle = mc.bg1 + 'cc';
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 1;
  drawRoundRect(ctx, panelX, panelY, panelW, panelH, 4);
  ctx.fill();
  ctx.stroke();

  // Panel title
  ctx.fillStyle = mc.accent;
  ctx.font = 'bold 12px "JetBrains Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(eng.id + ' >> ' + t('rocketMass') + ' ' + mission.rocketMassG + 'g', panelX + 12, panelY + 22);

  // Data rows
  var rows = [
    { lbl: t('peakThrust'), val: eng.peakThrust + ' N', color: mc.text },
    { lbl: 'Weight', val: (calcTWR > 0 ? ((ENGINES[selectedEngine].peakThrust / calcTWR).toFixed(2)) : '--') + ' N', color: mc.text },
    { lbl: 'TWR', val: calcTWR.toFixed(2), color: calcTWR < 1 ? '#ef4444' : (calcTWR < 2 ? '#f59e0b' : '#22c55e') },
    { lbl: t('idealAlt'), val: Math.round(calcIdealAlt) + ' m', color: mc.dim },
    { lbl: 'x0.6 = ' + t('corrAlt'), val: Math.round(calcCorrAlt) + ' m', color: mc.accent },
    { lbl: t('targetAlt'), val: mission.targetAlt + ' m', color: '#22c55e' },
  ];

  var ry = panelY + 44;
  var rLineH = Math.min((panelH - 80) / rows.length, 24);
  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    ctx.fillStyle = mc.dim;
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(row.lbl, panelX + 12, ry + r * rLineH);
    ctx.fillStyle = row.color;
    ctx.font = 'bold 12px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(row.val, panelX + panelW - 12, ry + r * rLineH);
  }

  // Result message
  if (phase === 'result') {
    var msgY = ry + rows.length * rLineH + 14;
    ctx.fillStyle = resultOk ? '#22c55e' : '#ef4444';
    ctx.font = 'bold 14px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(resultOk ? t('success') : t('fail'), panelX + panelW / 2, msgY);

    ctx.fillStyle = mc.dim;
    ctx.font = '11px "Noto Sans SC", sans-serif';
    ctx.fillText(t(resultMsg), panelX + panelW / 2, msgY + 20);

    // Next button
    var btnW = 140;
    var btnH = 30;
    var btnX = panelX + (panelW - btnW) / 2;
    var btnY = msgY + 34;
    nextBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };
    showNextBtn = true;

    ctx.fillStyle = mc.accent;
    drawRoundRect(ctx, btnX, btnY, btnW, btnH, 4);
    ctx.fill();
    ctx.fillStyle = GAME_MODE === 'light' ? '#fafaf5' : '#05060f';
    ctx.font = 'bold 11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(missionIdx < MISSIONS.length - 1 ? t('nextMission') : t('complete'), btnX + btnW / 2, btnY + 19);
  } else {
    showNextBtn = false;
  }
}

function drawRocket(mc, cx, baseY, firing) {
  var rw = 14;
  var rh = 40;
  var noseH = 12;
  var finH = 10;

  // Body
  ctx.fillStyle = mc.text;
  ctx.fillRect(cx - rw / 2, baseY - rh, rw, rh);

  // Nose cone
  ctx.beginPath();
  ctx.moveTo(cx, baseY - rh - noseH);
  ctx.lineTo(cx - rw / 2, baseY - rh);
  ctx.lineTo(cx + rw / 2, baseY - rh);
  ctx.closePath();
  ctx.fillStyle = mc.accent;
  ctx.fill();

  // Fins
  ctx.fillStyle = mc.dim;
  ctx.beginPath();
  ctx.moveTo(cx - rw / 2, baseY);
  ctx.lineTo(cx - rw / 2 - 8, baseY + finH);
  ctx.lineTo(cx - rw / 2, baseY - finH);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + rw / 2, baseY);
  ctx.lineTo(cx + rw / 2 + 8, baseY + finH);
  ctx.lineTo(cx + rw / 2, baseY - finH);
  ctx.closePath();
  ctx.fill();

  // Window
  ctx.beginPath();
  ctx.arc(cx, baseY - rh * 0.55, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#38bdf8';
  ctx.fill();

  // Flame
  if (firing) {
    var flameH = 15 + Math.random() * 10;
    var fg = ctx.createLinearGradient(cx, baseY, cx, baseY + flameH);
    fg.addColorStop(0, '#fbbf24');
    fg.addColorStop(0.4, '#f97316');
    fg.addColorStop(1, 'rgba(239,68,68,0)');
    ctx.beginPath();
    ctx.moveTo(cx - 6, baseY);
    ctx.quadraticCurveTo(cx - 3, baseY + flameH * 0.6, cx, baseY + flameH);
    ctx.quadraticCurveTo(cx + 3, baseY + flameH * 0.6, cx + 6, baseY);
    ctx.closePath();
    ctx.fillStyle = fg;
    ctx.fill();

    // Smoke particles
    for (var p = 0; p < 3; p++) {
      var px = cx + (Math.random() - 0.5) * 20;
      var py = baseY + flameH + Math.random() * 10;
      ctx.beginPath();
      ctx.arc(px, py, 2 + Math.random() * 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(160,160,160,' + (0.2 + Math.random() * 0.2) + ')';
      ctx.fill();
    }
  }
}

function drawCompleteScreen(mc) {
  // Title
  ctx.fillStyle = mc.accent;
  ctx.font = 'bold 24px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('complete'), W / 2, 60);

  // Score
  ctx.fillStyle = mc.text;
  ctx.font = 'bold 36px "JetBrains Mono", monospace';
  ctx.fillText(score + ' / ' + MISSIONS.length, W / 2, 110);

  ctx.fillStyle = mc.dim;
  ctx.font = '14px "Noto Sans SC", sans-serif';
  ctx.fillText(t('finalScore'), W / 2, 135);

  // Summary table
  ctx.fillStyle = mc.accent;
  ctx.font = 'bold 13px "JetBrains Mono", monospace';
  ctx.fillText(t('summary'), W / 2, 175);

  var tableW = Math.min(W * 0.8, 700);
  var tableX = (W - tableW) / 2;
  var tableY = 195;
  var rowH = 36;

  // Header
  ctx.fillStyle = mc.accent + '20';
  ctx.fillRect(tableX, tableY, tableW, rowH);
  ctx.strokeStyle = mc.strokeDim;
  ctx.lineWidth = 0.5;
  ctx.strokeRect(tableX, tableY, tableW, rowH);

  var cols = [tableX + 10, tableX + tableW * 0.15, tableX + tableW * 0.30, tableX + tableW * 0.50, tableX + tableW * 0.70, tableX + tableW * 0.85];
  var headers = ['M#', t('rocketMass'), t('targetAlt'), 'Engine', t('corrAlt'), 'Result'];
  ctx.fillStyle = mc.accent;
  ctx.font = 'bold 10px "JetBrains Mono", monospace';
  ctx.textAlign = 'left';
  for (var hi = 0; hi < headers.length; hi++) {
    ctx.fillText(headers[hi], cols[hi], tableY + 22);
  }

  // Rows
  for (var ri = 0; ri < missionResults.length; ri++) {
    var mr = missionResults[ri];
    var rry = tableY + rowH + ri * rowH;
    ctx.fillStyle = mr.ok ? '#22c55e10' : '#ef444410';
    ctx.fillRect(tableX, rry, tableW, rowH);
    ctx.strokeStyle = mc.strokeDim;
    ctx.lineWidth = 0.5;
    ctx.strokeRect(tableX, rry, tableW, rowH);

    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = mc.text;
    ctx.fillText('M' + (ri + 1), cols[0], rry + 22);
    ctx.fillText(mr.massG + 'g', cols[1], rry + 22);
    ctx.fillText(mr.targetAlt + 'm', cols[2], rry + 22);
    ctx.fillText(mr.engineId, cols[3], rry + 22);
    ctx.fillText(Math.round(mr.corrAlt) + 'm', cols[4], rry + 22);
    ctx.fillStyle = mr.ok ? '#22c55e' : '#ef4444';
    ctx.font = 'bold 11px "JetBrains Mono", monospace';
    ctx.fillText(mr.ok ? 'PASS' : 'FAIL', cols[5], rry + 22);
  }

  // Reset hint at bottom
  var bottomY = tableY + rowH + missionResults.length * rowH + 40;
  showNextBtn = false;
}

function drawRoundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ================================================================
// INTERACTION
// ================================================================
function getPointerPos(e) {
  var rect = cvs.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height)
  };
}

function hitTestCards(mx, my) {
  for (var i = 0; i < cardRects.length; i++) {
    var r = cardRects[i];
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
      return i;
    }
  }
  return -1;
}

function hitTestNextBtn(mx, my) {
  if (!showNextBtn) return false;
  var r = nextBtnRect;
  return mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h;
}

function onPointerMove(e) {
  e.preventDefault();
  var pos = getPointerPos(e);
  var oldHover = hoverEngine;
  if (phase === 'select') {
    hoverEngine = hitTestCards(pos.x, pos.y);
    cvs.style.cursor = hoverEngine >= 0 ? 'pointer' : 'default';
  } else if (phase === 'result' && showNextBtn) {
    cvs.style.cursor = hitTestNextBtn(pos.x, pos.y) ? 'pointer' : 'default';
  } else {
    cvs.style.cursor = 'default';
  }
  if (hoverEngine !== oldHover) draw();
}

function onPointerDown(e) {
  e.preventDefault();
  var pos = getPointerPos(e);

  if (phase === 'select') {
    var idx = hitTestCards(pos.x, pos.y);
    if (idx >= 0) {
      selectedEngine = idx;
      var mission = MISSIONS[missionIdx];
      var phys = calcPhysics(idx, mission.rocketMassG);
      calcTWR = phys.twr;
      calcIdealAlt = phys.idealAlt;
      calcCorrAlt = phys.corrAlt;

      updateHUD(mission, phys);

      // Start launch animation
      phase = 'launching';
      launchAnim.t = 0;
      launchAnim.maxT = 90;
      document.getElementById('statusLabel').textContent = t('launching');
      requestAnimationFrame(animLaunch);
    }
  } else if (phase === 'result' && hitTestNextBtn(pos.x, pos.y)) {
    advanceMission();
  }
}

function updateHUD(mission, phys) {
  document.getElementById('hudV1').textContent = (missionIdx + 1) + '/' + MISSIONS.length;
  document.getElementById('hudV2').textContent = mission.rocketMassG + 'g';
  document.getElementById('hudV3').textContent = mission.targetAlt + 'm';
  document.getElementById('hudV4').textContent = phys.twr.toFixed(2);
  document.getElementById('hudV5').textContent = Math.round(phys.corrAlt) + 'm';
}

function animLaunch() {
  launchAnim.t++;
  draw();
  if (launchAnim.t < launchAnim.maxT) {
    requestAnimationFrame(animLaunch);
  } else {
    finishLaunch();
  }
}

function finishLaunch() {
  phase = 'result';
  var mission = MISSIONS[missionIdx];
  var res = checkMission(calcTWR < 1 ? 0 : calcCorrAlt, mission.targetAlt);
  resultOk = res.ok;
  resultMsg = res.msgKey;

  if (resultOk) score++;

  missionResults.push({
    ok: resultOk,
    engineId: ENGINES[selectedEngine].id,
    massG: mission.rocketMassG,
    targetAlt: mission.targetAlt,
    corrAlt: calcCorrAlt,
    twr: calcTWR,
  });

  document.getElementById('scoreDisplay').textContent = score + ' / ' + MISSIONS.length;
  document.getElementById('statusTrials').textContent = missionResults.length + ' / ' + MISSIONS.length;

  var sr = document.getElementById('statusResult');
  sr.textContent = resultOk ? 'PASS' : 'FAIL';
  sr.className = 'status-result ' + (resultOk ? 'pass' : 'fail');
  document.getElementById('statusLabel').textContent = resultOk ? t('success') : t('fail');

  draw();
}

function advanceMission() {
  missionIdx++;
  if (missionIdx >= MISSIONS.length) {
    phase = 'complete';
    document.getElementById('statusLabel').textContent = t('complete');
    document.getElementById('statusResult').textContent = '';
    draw();
    return;
  }
  phase = 'select';
  selectedEngine = -1;
  hoverEngine = -1;
  calcTWR = 0;
  calcIdealAlt = 0;
  calcCorrAlt = 0;
  showNextBtn = false;

  document.getElementById('hudV1').textContent = (missionIdx + 1) + '/' + MISSIONS.length;
  document.getElementById('hudV2').textContent = MISSIONS[missionIdx].rocketMassG + 'g';
  document.getElementById('hudV3').textContent = MISSIONS[missionIdx].targetAlt + 'm';
  document.getElementById('hudV4').textContent = '--';
  document.getElementById('hudV5').textContent = '--';
  document.getElementById('statusLabel').textContent = t('statusReady');
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';

  draw();
}

function resetGame() {
  missionIdx = 0;
  score = 0;
  phase = 'select';
  selectedEngine = -1;
  hoverEngine = -1;
  calcTWR = 0;
  calcIdealAlt = 0;
  calcCorrAlt = 0;
  missionResults = [];
  showNextBtn = false;

  document.getElementById('scoreDisplay').textContent = '0 / ' + MISSIONS.length;
  document.getElementById('statusTrials').textContent = '0 / ' + MISSIONS.length;
  document.getElementById('statusResult').textContent = '';
  document.getElementById('statusResult').className = 'status-result';
  document.getElementById('hudV1').textContent = '1/' + MISSIONS.length;
  document.getElementById('hudV2').textContent = MISSIONS[0].rocketMassG + 'g';
  document.getElementById('hudV3').textContent = MISSIONS[0].targetAlt + 'm';
  document.getElementById('hudV4').textContent = '--';
  document.getElementById('hudV5').textContent = '--';
  document.getElementById('statusLabel').textContent = t('statusReady');

  draw();
}

// ================================================================
// INIT
// ================================================================
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();
refreshI18N();

// Canvas sizing
resize();
window.addEventListener('resize', resize);

// Input
cvs.addEventListener('mousemove', onPointerMove);
cvs.addEventListener('mousedown', onPointerDown);
cvs.addEventListener('touchmove', onPointerMove, { passive: false });
cvs.addEventListener('touchstart', onPointerDown, { passive: false });

document.getElementById('btnReset').addEventListener('click', resetGame);

// Initial HUD
document.getElementById('hudV2').textContent = MISSIONS[0].rocketMassG + 'g';
document.getElementById('hudV3').textContent = MISSIONS[0].targetAlt + 'm';

draw();
</script>
</body>
