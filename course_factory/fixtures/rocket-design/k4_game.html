<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
/* -- Outer: sidebar + main -- */
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
/* -- Style switcher -- */
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
/* -- Sidebar text -- */
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* -- Toggle -- */
.mode-toggle{display:flex;gap:0;margin:6px 0;}
.mode-toggle button{flex:1;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:6px 4px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,#8e90a6);letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;}
.mode-toggle button.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.mode-toggle button:first-child{border-right:none;}
/* -- Action buttons -- */
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
/* -- Pick buttons -- */
.pick-area{display:flex;gap:4px;margin-top:6px;}
.pick-btn{flex:1;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:6px 4px;cursor:pointer;border:2px solid;background:transparent;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;}
.pick-btn:hover{background:rgba(128,128,128,0.1);}
.pick-btn:disabled{opacity:0.35;cursor:not-allowed;}
.pick-btn.obj-a{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.pick-btn.obj-b{color:var(--secondary,#92d0f0);border-color:var(--secondary,#92d0f0);}
/* -- Main area -- */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">FINISH JUDGE</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="modeLabel">RACE MODE</div>
    <div class="mode-toggle">
      <button class="active" id="btnModeA"></button>
      <button id="btnModeB"></button>
    </div>
    <button class="action-btn" id="btnGo"></button>
    <div class="pick-area">
      <button class="pick-btn obj-a" id="pickA" disabled></button>
      <button class="pick-btn obj-b" id="pickB" disabled></button>
    </div>
    <button class="reset-btn" id="btnReset"></button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">SPEED LAB</div>
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel"></span>
      <span class="status-val" id="statusVal"></span>
      <span class="status-result" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM (inline)
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316'; // mech orange

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || (mc.accent ? mc.accent.replace(/[\d.]+\)$/,'0.06)') : 'rgba(255,255,255,0.04)');
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,mc.accent.replace(/[\d.]+\)$/,'0.06)'));rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#ea580c');
  r.style.setProperty('--secondary', '#38bdf8');
  r.style.setProperty('--glow-strong', 'rgba(249,115,22,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof onModeChange === 'function') onModeChange(mode);
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'FINISH LINE JUDGE', cn:'\u7ec8\u70b9\u88c1\u5224'},
  sub:       {en:'Who is faster? You decide!', cn:'\u8c01\u66f4\u5feb\uff1f\u4f60\u6765\u5224\uff01'},
  guide:     {en:'Toggle race mode, click START, watch the race, then pick the faster one.', cn:'\u9009\u62e9\u6bd4\u8d5b\u6a21\u5f0f\uff0c\u70b9\u5f00\u59cb\uff0c\u89c2\u5bdf\u6bd4\u8d5b\uff0c\u518d\u9009\u51fa\u66f4\u5feb\u7684\u3002'},
  guideLabel:{en:'GUIDE', cn:'\u6307\u5357'},
  modeLabel: {en:'RACE MODE', cn:'\u6bd4\u8d5b\u6a21\u5f0f'},
  modeA:     {en:'SAME DIST', cn:'\u540c\u8ddd\u79bb'},
  modeB:     {en:'SAME TIME', cn:'\u540c\u65f6\u95f4'},
  btnGo:     {en:'START', cn:'\u5f00\u59cb'},
  btnReset:  {en:'RESET', cn:'\u91cd\u7f6e'},
  pickA:     {en:'A FASTER', cn:'A \u66f4\u5feb'},
  pickB:     {en:'B FASTER', cn:'B \u66f4\u5feb'},
  hudTag:    {en:'SPEED LAB', cn:'\u901f\u5ea6\u5b9e\u9a8c\u5ba4'},
  hudRule:   {en:'MODE', cn:'\u6a21\u5f0f'},
  hudTrial:  {en:'TRIAL', cn:'\u7b2c\u51e0\u5c40'},
  hudCorrect:{en:'CORRECT', cn:'\u7b54\u5bf9'},
  hudTotal:  {en:'TOTAL', cn:'\u603b\u5c40'},
  statusIdle:     {en:'Press START to begin', cn:'\u6309\u201c\u5f00\u59cb\u201d\u53d1\u8d77\u6bd4\u8d5b'},
  statusRunning:  {en:'Racing...', cn:'\u6bd4\u8d5b\u4e2d...'},
  statusPick:     {en:'Who is faster? Click below.', cn:'\u8c01\u66f4\u5feb\uff1f\u70b9\u4e0b\u65b9\u6309\u94ae\u3002'},
  statusCorrect:  {en:'CORRECT!', cn:'\u7b54\u5bf9\u4e86\uff01'},
  statusWrong:    {en:'Not quite. Try the next one!', cn:'\u518d\u60f3\u60f3\uff0c\u8bd5\u8bd5\u4e0b\u4e00\u5c40\uff01'},
  statusDone:     {en:'All done!', cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  objNames: {
    en:['Runner','Ball','Toy Car','Bicycle','Skateboard','Scooter'],
    cn:['\u8dd1\u6b65\u8005','\u7403','\u73a9\u5177\u8f66','\u81ea\u884c\u8f66','\u6ed1\u677f','\u6ed1\u677f\u8f66'],
  },
  distUnit:  {en:' m', cn:' \u7c73'},
  timeUnit:  {en:' s', cn:' \u79d2'},
  resultDist:{en:'went', cn:'\u8dd1\u4e86'},
  resultTime:{en:'in', cn:'\u7528\u65f6'},
};

function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

// ================================================================
// Game State
// ================================================================
var cv, g;
var cssW = 0, cssH = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

var raceMode = 'A'; // A = same distance, B = same time
var state = 'idle';  // idle | running | pick | feedback | done
var trialNum = 0;
var correctCount = 0;
var totalTrials = 8;

// Per-trial data
var objA = {}, objB = {};
var raceDist = 50;   // meters (for mode A)
var raceTime = 6;    // seconds (for mode B)
var elapsed = 0;
var lastTs = 0;
var feedbackTimer = 0;
var lastCorrect = false;

// Object visuals (type index for drawing)
var objTypeA = 0, objTypeB = 1;

// Speed ranges per object type (m/s)
var SPEED_RANGES = [
  [3.0, 6.0],   // runner
  [2.0, 7.0],   // ball
  [4.0, 9.0],   // toy car
  [5.0, 10.0],  // bicycle
  [2.5, 5.5],   // skateboard
  [3.5, 7.5],   // scooter
];

function randRange(lo, hi) { return lo + Math.random() * (hi - lo); }

function newTrial() {
  trialNum++;
  if (trialNum > totalTrials) { state = 'done'; refreshUI(); draw(); return; }

  // Pick two different object types
  objTypeA = Math.floor(Math.random() * SPEED_RANGES.length);
  do { objTypeB = Math.floor(Math.random() * SPEED_RANGES.length); } while (objTypeB === objTypeA);

  var sA = randRange(SPEED_RANGES[objTypeA][0], SPEED_RANGES[objTypeA][1]);
  var sB = randRange(SPEED_RANGES[objTypeB][0], SPEED_RANGES[objTypeB][1]);
  // Ensure they are not too close
  while (Math.abs(sA - sB) < 0.8) { sB = randRange(SPEED_RANGES[objTypeB][0], SPEED_RANGES[objTypeB][1]); }

  raceDist = 20 + Math.floor(Math.random() * 40); // 20-59 m
  raceTime = 3 + Math.floor(Math.random() * 5);   // 3-7 s

  objA = { speed: sA, pos: 0, time: 0, finished: false };
  objB = { speed: sB, pos: 0, time: 0, finished: false };

  elapsed = 0;
  state = 'idle';
  refreshUI();
  draw();
}

function getWinner() {
  if (raceMode === 'A') {
    // Same distance: faster = less time
    return objA.time < objB.time ? 'A' : 'B';
  } else {
    // Same time: faster = more distance
    return objA.pos > objB.pos ? 'A' : 'B';
  }
}

// ================================================================
// Drawing
// ================================================================
function resize() {
  var rect = cv.parentElement.getBoundingClientRect();
  cssW = rect.width; cssH = rect.height;
  if (cssW < 80) cssW = 80;
  if (cssH < 80) cssH = 80;
  cv.width = Math.round(cssW * DPR);
  cv.height = Math.round(cssH * DPR);
  cv.style.width = cssW + 'px';
  cv.style.height = cssH + 'px';
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}

function draw() {
  if (!g) return;
  g.clearRect(0, 0, cssW, cssH);
  drawGameBg(g, cssW, cssH);

  var mc = gameModeColors();
  var padL = 60, padR = 60;
  var trackX1 = padL, trackX2 = cssW - padR;
  var trackW = trackX2 - trackX1;
  var laneH = 36;
  var yA = cssH * 0.38;
  var yB = cssH * 0.62;

  // Track distance scale
  var maxDist;
  if (raceMode === 'A') {
    maxDist = raceDist;
  } else {
    maxDist = Math.max(objA.speed, objB.speed) * raceTime * 1.15;
    if (maxDist < 10) maxDist = 10;
  }

  // --- Draw track lanes ---
  g.fillStyle = 'rgba(255,255,255,0.03)';
  g.strokeStyle = mc.strokeDim;
  g.lineWidth = 0.5;
  g.fillRect(trackX1, yA - laneH / 2, trackW, laneH);
  g.strokeRect(trackX1, yA - laneH / 2, trackW, laneH);
  g.fillRect(trackX1, yB - laneH / 2, trackW, laneH);
  g.strokeRect(trackX1, yB - laneH / 2, trackW, laneH);

  // Lane labels
  var nameA = I18N.objNames[LANG][objTypeA] || 'A';
  var nameB = I18N.objNames[LANG][objTypeB] || 'B';
  g.font = "bold 10px 'JetBrains Mono',monospace";
  g.textAlign = 'right';
  g.textBaseline = 'middle';
  g.fillStyle = mc.accent;
  g.fillText('A: ' + nameA, trackX1 - 6, yA);
  g.fillStyle = '#38bdf8';
  g.fillText('B: ' + nameB, trackX1 - 6, yB);

  // --- Start line ---
  g.strokeStyle = mc.dim;
  g.lineWidth = 1;
  g.setLineDash([3, 3]);
  g.beginPath(); g.moveTo(trackX1, yA - laneH / 2 - 6); g.lineTo(trackX1, yB + laneH / 2 + 6); g.stroke();
  g.setLineDash([]);

  g.font = "8px 'JetBrains Mono',monospace";
  g.textAlign = 'center';
  g.fillStyle = mc.dim;
  g.fillText('START', trackX1, yB + laneH / 2 + 18);

  // --- Finish / distance markers ---
  if (raceMode === 'A') {
    // Draw finish line at raceDist
    var finishX = trackX1 + trackW;
    g.strokeStyle = mc.accent;
    g.lineWidth = 2;
    g.beginPath(); g.moveTo(finishX, yA - laneH / 2 - 6); g.lineTo(finishX, yB + laneH / 2 + 6); g.stroke();
    g.font = "bold 10px 'JetBrains Mono',monospace";
    g.textAlign = 'center';
    g.fillStyle = mc.accent;
    g.fillText(raceDist + t('distUnit'), finishX, yB + laneH / 2 + 18);
  } else {
    // Timer display
    var timerVal = state === 'running' ? Math.min(elapsed, raceTime) : raceTime;
    g.font = "bold 14px 'JetBrains Mono',monospace";
    g.textAlign = 'center';
    g.fillStyle = mc.accent;
    g.fillText(timerVal.toFixed(1) + t('timeUnit'), cssW / 2, yA - laneH / 2 - 16);
    // Countdown bar
    var barW = trackW * 0.6;
    var barX = cssW / 2 - barW / 2;
    var barY = yA - laneH / 2 - 8;
    g.fillStyle = 'rgba(255,255,255,0.06)';
    g.fillRect(barX, barY, barW, 4);
    var prog = state === 'running' ? Math.min(elapsed / raceTime, 1) : (state === 'idle' ? 0 : 1);
    g.fillStyle = mc.accent;
    g.fillRect(barX, barY, barW * prog, 4);
  }

  // --- Distance tick marks ---
  g.font = "7px 'JetBrains Mono',monospace";
  g.textAlign = 'center';
  g.fillStyle = mc.dim;
  var tickInterval = maxDist <= 30 ? 5 : (maxDist <= 60 ? 10 : 20);
  for (var d = 0; d <= maxDist; d += tickInterval) {
    var tx = trackX1 + (d / maxDist) * trackW;
    g.beginPath();
    g.moveTo(tx, yB + laneH / 2 + 2);
    g.lineTo(tx, yB + laneH / 2 + 6);
    g.strokeStyle = mc.dim;
    g.lineWidth = 0.5;
    g.stroke();
    if (d > 0 && d < maxDist) g.fillText(d + '', tx, yB + laneH / 2 + 14);
  }

  // --- Draw objects ---
  var posAx = trackX1 + (objA.pos / maxDist) * trackW;
  var posBx = trackX1 + (objB.pos / maxDist) * trackW;
  // Clamp to track
  if (posAx > trackX2) posAx = trackX2;
  if (posBx > trackX2) posBx = trackX2;

  _drawObject(g, posAx, yA, objTypeA, mc.accent, nameA);
  _drawObject(g, posBx, yB, '#38bdf8', objTypeB, nameB);

  // --- Data readouts during/after race ---
  if (state === 'pick' || state === 'feedback') {
    g.font = "bold 11px 'JetBrains Mono',monospace";
    g.textAlign = 'left';

    if (raceMode === 'A') {
      g.fillStyle = mc.accent;
      g.fillText('A: ' + objA.time.toFixed(1) + t('timeUnit'), posAx + 14, yA - 4);
      g.fillStyle = '#38bdf8';
      g.fillText('B: ' + objB.time.toFixed(1) + t('timeUnit'), posBx + 14, yB - 4);
    } else {
      g.fillStyle = mc.accent;
      g.fillText('A: ' + objA.pos.toFixed(1) + t('distUnit'), posAx + 14, yA - 4);
      g.fillStyle = '#38bdf8';
      g.fillText('B: ' + objB.pos.toFixed(1) + t('distUnit'), posBx + 14, yB - 4);
    }

    // Highlight winner
    if (state === 'feedback') {
      var winner = getWinner();
      var wy = winner === 'A' ? yA : yB;
      var wx = winner === 'A' ? posAx : posBx;
      var wc = winner === 'A' ? mc.accent : '#38bdf8';
      g.strokeStyle = wc;
      g.lineWidth = 2;
      g.beginPath();
      g.arc(wx, wy, 20, 0, Math.PI * 2);
      g.stroke();
    }
  }

  // --- "All done" overlay ---
  if (state === 'done') {
    g.fillStyle = 'rgba(0,0,0,0.6)';
    g.fillRect(0, 0, cssW, cssH);
    g.font = "bold 22px 'Space Grotesk','Noto Sans SC',sans-serif";
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.fillStyle = mc.accent;
    g.fillText(t('statusDone'), cssW / 2, cssH / 2 - 16);
    g.font = "14px 'Inter','Noto Sans SC',sans-serif";
    g.fillStyle = mc.text;
    g.fillText(correctCount + ' / ' + totalTrials, cssW / 2, cssH / 2 + 16);
  }
}

function _drawObject(ctx, x, y, typeOrColor, typeIdx, label) {
  // Simple geometric representations for each object type
  var color = typeof typeOrColor === 'string' ? typeOrColor : ACCENT;
  var type = typeof typeOrColor === 'number' ? typeOrColor : typeIdx;

  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;

  switch (type) {
    case 0: // Runner -- stick figure
      ctx.beginPath(); ctx.arc(x, y - 12, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x, y - 7); ctx.lineTo(x, y + 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 6, y - 2); ctx.lineTo(x, y - 4); ctx.lineTo(x + 6, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 5, y + 12); ctx.lineTo(x, y + 4); ctx.lineTo(x + 6, y + 10); ctx.stroke();
      break;
    case 1: // Ball
      ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(x - 2, y - 2, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = color;
      break;
    case 2: // Toy car
      ctx.fillRect(x - 12, y - 6, 24, 10);
      ctx.fillRect(x - 8, y - 12, 14, 7);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.arc(x - 7, y + 5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 7, y + 5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = color;
      break;
    case 3: // Bicycle
      ctx.beginPath(); ctx.arc(x - 8, y + 2, 6, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + 8, y + 2, 6, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 8, y + 2); ctx.lineTo(x, y - 6); ctx.lineTo(x + 8, y + 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y - 6); ctx.lineTo(x - 2, y - 12); ctx.stroke();
      break;
    case 4: // Skateboard
      ctx.fillRect(x - 12, y - 2, 24, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.arc(x - 8, y + 4, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 8, y + 4, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = color;
      break;
    case 5: // Scooter
      ctx.beginPath(); ctx.arc(x - 6, y + 4, 4, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + 6, y + 4, 4, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 6, y + 4); ctx.lineTo(x + 2, y - 4); ctx.lineTo(x + 2, y - 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 2, y - 12); ctx.lineTo(x + 6, y - 12); ctx.stroke();
      break;
  }
}

// ================================================================
// Game loop
// ================================================================
function gameLoop(ts) {
  if (state === 'running') {
    if (lastTs === 0) lastTs = ts;
    var dt = (ts - lastTs) / 1000;
    lastTs = ts;
    elapsed += dt;

    // Update positions
    objA.pos = objA.speed * elapsed;
    objB.pos = objB.speed * elapsed;
    objA.time = elapsed;
    objB.time = elapsed;

    var raceOver = false;

    if (raceMode === 'A') {
      // Same distance: check if either reached raceDist
      if (objA.pos >= raceDist && !objA.finished) {
        objA.finished = true;
        objA.time = elapsed;
        objA.pos = raceDist;
      }
      if (objB.pos >= raceDist && !objB.finished) {
        objB.finished = true;
        objB.time = elapsed;
        objB.pos = raceDist;
      }
      if (objA.finished && objB.finished) raceOver = true;
    } else {
      // Same time: stop when elapsed >= raceTime
      if (elapsed >= raceTime) {
        objA.pos = objA.speed * raceTime;
        objB.pos = objB.speed * raceTime;
        objA.time = raceTime;
        objB.time = raceTime;
        raceOver = true;
      }
    }

    if (raceOver) {
      state = 'pick';
      document.getElementById('pickA').disabled = false;
      document.getElementById('pickB').disabled = false;
    }

    refreshUI();
    draw();
  }

  if (state === 'feedback') {
    feedbackTimer -= 16;
    if (feedbackTimer <= 0) {
      newTrial();
    }
  }

  requestAnimationFrame(gameLoop);
}

// ================================================================
// UI refresh
// ================================================================
function refreshUI() {
  var mc = gameModeColors();

  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('modeLabel').textContent = t('modeLabel');
  document.getElementById('btnModeA').textContent = t('modeA');
  document.getElementById('btnModeB').textContent = t('modeB');
  document.getElementById('btnGo').textContent = t('btnGo');
  document.getElementById('btnReset').textContent = t('btnReset');
  document.getElementById('pickA').textContent = t('pickA');
  document.getElementById('pickB').textContent = t('pickB');
  document.getElementById('langBtn').textContent = LANG.toUpperCase();

  // HUD
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hudL1').textContent = t('hudRule');
  document.getElementById('hudV1').textContent = raceMode === 'A' ? t('modeA') : t('modeB');
  document.getElementById('hudL2').textContent = t('hudTrial');
  document.getElementById('hudV2').textContent = Math.min(trialNum, totalTrials) + '/' + totalTrials;
  document.getElementById('hudL3').textContent = t('hudCorrect');
  document.getElementById('hudV3').textContent = '' + correctCount;
  document.getElementById('hudL4').textContent = t('hudTotal');
  document.getElementById('hudV4').textContent = '' + totalTrials;

  // Status bar
  var sLabel = document.getElementById('statusLabel');
  var sVal = document.getElementById('statusVal');
  var sRes = document.getElementById('statusResult');
  sRes.className = 'status-result';

  if (state === 'idle') {
    sLabel.textContent = t('statusIdle');
    sVal.textContent = '';
    sRes.textContent = '';
  } else if (state === 'running') {
    sLabel.textContent = t('statusRunning');
    sVal.textContent = elapsed.toFixed(1) + t('timeUnit');
    sRes.textContent = '';
  } else if (state === 'pick') {
    sLabel.textContent = t('statusPick');
    sVal.textContent = '';
    sRes.textContent = '';
  } else if (state === 'feedback') {
    sLabel.textContent = '';
    sVal.textContent = '';
    if (lastCorrect) {
      sRes.textContent = t('statusCorrect');
      sRes.className = 'status-result pass';
    } else {
      sRes.textContent = t('statusWrong');
      sRes.className = 'status-result fail';
    }
  } else if (state === 'done') {
    sLabel.textContent = t('statusDone');
    sVal.textContent = correctCount + ' / ' + totalTrials;
    sRes.textContent = '';
  }

  // Button states
  document.getElementById('btnGo').disabled = (state !== 'idle');
  document.getElementById('btnModeA').disabled = (state === 'running');
  document.getElementById('btnModeB').disabled = (state === 'running');

  // Mode toggle active state
  document.getElementById('btnModeA').classList.toggle('active', raceMode === 'A');
  document.getElementById('btnModeB').classList.toggle('active', raceMode === 'B');
}

function refreshI18N() {
  refreshUI();
  draw();
}

function onModeChange() {
  draw();
}

// ================================================================
// Event handlers
// ================================================================
function init() {
  cv = document.getElementById('gc');
  g = cv.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  window.addEventListener('resize', resize);
  setTimeout(resize, 100);
  setTimeout(resize, 400);
  document.fonts.ready.then(resize);

  // Mode toggle
  document.getElementById('btnModeA').addEventListener('click', function() {
    if (state !== 'idle') return;
    raceMode = 'A';
    refreshUI();
    draw();
  });
  document.getElementById('btnModeB').addEventListener('click', function() {
    if (state !== 'idle') return;
    raceMode = 'B';
    refreshUI();
    draw();
  });

  // Start
  document.getElementById('btnGo').addEventListener('click', function() {
    if (state !== 'idle') return;
    state = 'running';
    elapsed = 0;
    lastTs = 0;
    objA.pos = 0; objA.time = 0; objA.finished = false;
    objB.pos = 0; objB.time = 0; objB.finished = false;
    document.getElementById('pickA').disabled = true;
    document.getElementById('pickB').disabled = true;
    refreshUI();
  });

  // Pick winner
  document.getElementById('pickA').addEventListener('click', function() {
    if (state !== 'pick') return;
    handlePick('A');
  });
  document.getElementById('pickB').addEventListener('click', function() {
    if (state !== 'pick') return;
    handlePick('B');
  });

  // Reset
  document.getElementById('btnReset').addEventListener('click', function() {
    trialNum = 0;
    correctCount = 0;
    newTrial();
  });

  // First trial
  newTrial();
  requestAnimationFrame(gameLoop);
}

function handlePick(choice) {
  var winner = getWinner();
  lastCorrect = (choice === winner);
  if (lastCorrect) correctCount++;
  state = 'feedback';
  feedbackTimer = 1800;
  document.getElementById('pickA').disabled = true;
  document.getElementById('pickB').disabled = true;
  refreshUI();
  draw();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

init();
</script>
