<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<title>分压电路实验室 · Circuit Grid · ELC-12</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === theme: elec (Circuit Grid / 电路之网) ELC-12 oklch 275 === */
:root{
  --signal:   oklch(0.72 0.17 275);
  --core:     oklch(0.52 0.16 275);
  --depth:    oklch(0.35 0.10 275);
  --flash:    oklch(0.92 0.08 275);
  --query:    oklch(0.85 0.14 85);
  --bg:       oklch(0.13 0.025 275);
  --bg2:      oklch(0.16 0.030 275);
  --surface:  oklch(0.20 0.035 275);
  --ink:      oklch(0.96 0.012 275);
  --ink-dim:  oklch(0.62 0.020 275);
  --ink-mute: oklch(0.50 0.015 275);
  --danger:   oklch(0.65 0.180 25);
  --success:  oklch(0.72 0.17 145);
  --grid:     oklch(0.72 0.17 275 / 0.06);
  --glow:     oklch(0.72 0.17 275 / 0.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;}

.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{
  width:220px;min-width:220px;max-width:220px;
  display:flex;flex-direction:column;gap:6px;padding:10px;
  background:var(--bg2);overflow-y:auto;
}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--signal);letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--signal);background:var(--glow);}
.code-tag{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.18em;color:var(--query);text-transform:uppercase;margin-top:6px;}
.game-sidebar h1{font-family:'Space Grotesk','JetBrains Mono',sans-serif;font-size:14px;font-weight:700;color:var(--signal);margin-top:2px;line-height:1.25;letter-spacing:0.02em;}
.tagline{font-family:'Inter','Noto Sans SC',sans-serif;font-size:10px;color:var(--ink-dim);margin-top:6px;line-height:1.4;font-style:italic;}
.divider{height:1px;background:var(--grid);margin:8px 0 4px;}

.level-block{padding:6px 0;}
.level-ind{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--query);}
.level-dots{display:flex;gap:6px;margin-top:8px;}
.level-dot{flex:1;height:3px;background:var(--core);transition:background 0.4s ease;}
.level-dot.on{background:var(--query);}
.level-dot.done{background:var(--success);}
.level-dot.fail{background:var(--danger);}

.task-block{margin-top:8px;padding:8px;background:var(--surface);}
.task-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--signal);}
.task-text{font-family:'Noto Sans SC',sans-serif;font-size:12px;color:var(--ink);line-height:1.5;margin-top:4px;}
.hint-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--query);margin-top:6px;line-height:1.4;}

.score-block{margin-top:8px;padding:8px;background:var(--surface);}
.score-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-dim);}
.score-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--signal);letter-spacing:0.05em;}

.sliders{margin-top:8px;display:flex;flex-direction:column;gap:8px;}
.slider-row{display:flex;flex-direction:column;gap:3px;}
.slider-row label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-dim);letter-spacing:0.1em;text-transform:uppercase;}
.slider-row .val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--signal);text-align:right;}
.slider-row input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:var(--depth);height:4px;outline:none;border-radius:2px;}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--signal);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow);}
.slider-row input[type=range]::-moz-range-thumb{width:14px;height:14px;background:var(--signal);cursor:pointer;border:none;border-radius:0;}

.check-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:var(--signal);color:var(--bg);letter-spacing:0.15em;text-transform:uppercase;margin-top:10px;width:100%;}
.check-btn:hover{background:var(--flash);}
.check-btn:disabled{opacity:0.4;cursor:not-allowed;}
.next-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:6px 12px;border:1px solid var(--query);background:transparent;color:var(--query);cursor:pointer;letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;width:100%;}
.next-btn:hover{background:var(--query);color:var(--bg);}
.next-btn:disabled{opacity:0.3;cursor:not-allowed;}

.game-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%!important;height:100%!important;display:block;}

.feedback-bar{
  height:60px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);padding:0 20px;
  font-family:'JetBrains Mono','Noto Sans SC',monospace;font-size:13px;
  color:var(--ink-dim);letter-spacing:0.05em;text-align:center;line-height:1.4;
}
.feedback-bar.pass{color:var(--success);}
.feedback-bar.fail{color:var(--danger);}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="lang-btn" id="langBtn">CN</button>
    <div class="code-tag">ELC-12 · LAB</div>
    <h1 id="sideTitle">VOLTAGE DIVIDER LAB</h1>
    <div class="tagline" id="sideSub">Two resistors. One Vout. Six levels.</div>
    <div class="divider"></div>

    <div class="level-block">
      <div class="level-ind"><span id="levelLabel">LEVEL</span> <span id="levelIdx">1</span> / 6</div>
      <div class="level-dots" id="levelDots"></div>
    </div>

    <div class="task-block">
      <div class="task-label" id="taskLabel">TARGET</div>
      <div class="task-text" id="taskText">--</div>
      <div class="hint-text" id="hintText">--</div>
    </div>

    <div class="score-block">
      <div class="score-label" id="scoreLabel">SCORE</div>
      <div class="score-val"><span id="scoreVal">0</span> / 6</div>
    </div>

    <div class="sliders">
      <div class="slider-row">
        <label><span id="r1Lbl">R1</span> <span class="val" id="r1Val">1.8k</span></label>
        <input type="range" id="r1" min="0" max="11" value="3">
      </div>
      <div class="slider-row">
        <label><span id="r2Lbl">R2</span> <span class="val" id="r2Val">3.3k</span></label>
        <input type="range" id="r2" min="0" max="11" value="5">
      </div>
      <button class="check-btn" id="checkBtn">CHECK</button>
      <button class="next-btn"  id="nextBtn" disabled>NEXT →</button>
    </div>
  </div>

  <div class="game-main">
    <div class="canvas-wrap"><canvas id="gc"></canvas></div>
    <div class="feedback-bar" id="feedback">Pick R1 and R2 to hit the target Vout. Hit CHECK.</div>
  </div>
</div>

<script>
// ===================== i18n =====================
var LANG = 'cn';
var I18N = {
  title:       {en:'VOLTAGE DIVIDER LAB',       cn:'分压电路实验室'},
  subtitle:    {en:'Two resistors. One Vout. Six levels.', cn:'两个电阻、一个 Vout、六关闯关。'},
  levelLabel:  {en:'LEVEL',  cn:'关卡'},
  taskLabel:   {en:'TARGET', cn:'目标'},
  scoreLabel:  {en:'SCORE',  cn:'得分'},
  r1Lbl:       {en:'R1 (top, kΩ)',    cn:'R1 (上, kΩ)'},
  r2Lbl:       {en:'R2 (bottom, kΩ)', cn:'R2 (下, kΩ)'},
  check:       {en:'CHECK',  cn:'验收'},
  next:        {en:'NEXT →', cn:'下一关 →'},
  intro:       {en:'Pick R1 and R2 to hit the target Vout. Hit CHECK.', cn:'调整 R1, R2 让 Vout 达标. 按 CHECK 验收.'},

  // Per-level targets and hints
  lvl1_task:   {en:'Get Vout ≈ 3.30 V (the Pi-safe target)', cn:'让 Vout ≈ 3.30 V (Pi 安全电压)'},
  lvl1_hint:   {en:'Hint: R2 / (R1+R2) should be 0.66', cn:'提示: R2 / (R1+R2) 应该是 0.66'},
  lvl2_task:   {en:'Get Vout ≈ 2.50 V (half of Vin)', cn:'让 Vout ≈ 2.50 V (Vin 的一半)'},
  lvl2_hint:   {en:'Hint: equal resistors split evenly', cn:'提示: 相同电阻把电压一刀切两半'},
  lvl3_task:   {en:'Get Vout ≈ 1.00 V (low signal)', cn:'让 Vout ≈ 1.00 V (低电压信号)'},
  lvl3_hint:   {en:'Hint: R1 four times R2', cn:'提示: R1 大约是 R2 的 4 倍'},
  lvl4_task:   {en:'Get Vout ≈ 4.00 V (close to Vin)', cn:'让 Vout ≈ 4.00 V (接近 Vin)'},
  lvl4_hint:   {en:'Hint: R2 much larger than R1', cn:'提示: R2 远大于 R1'},
  lvl5_task:   {en:'Get Vout ≈ 1.65 V (3.3V halved)', cn:'让 Vout ≈ 1.65 V (3.3V 的一半)'},
  lvl5_hint:   {en:'Wait: Vin is 5V, target 1.65V — pick R1 = 2·R2', cn:'注意 Vin 是 5V, 目标 1.65V — 试 R1 = 2·R2'},

  lvl6_task:   {en:'TRAP: same R1=R2 for 2.5V — but a 220Ω LED is now wired across Vout. Hit CHECK and watch what happens.', cn:'陷阱: R1=R2 = 1kΩ 给 2.5V, 但 Vout 现在接了一个 220Ω 负载 LED. 按 CHECK 看会怎样.'},
  lvl6_hint:   {en:'Hint: divider has no muscle. Vout will collapse when a load draws current.', cn:'提示: 分压器没"力气", 一旦负载抢电流, Vout 立刻塌下来.'},

  pass:        {en:'PASS — within ±0.10 V of target',  cn:'通过 — 距目标 ±0.10 V 内'},
  fail_high:   {en:'FAIL — Vout too HIGH. Increase R1 or decrease R2.', cn:'未通过 — Vout 偏高. 加大 R1 或减小 R2.'},
  fail_low:    {en:'FAIL — Vout too LOW. Decrease R1 or increase R2.',  cn:'未通过 — Vout 偏低. 减小 R1 或加大 R2.'},
  trap_msg:    {en:'COLLAPSE! Vout fell from 2.5V to ~0.36V the moment the LED was connected. Divider only splits voltage — it cannot SUPPLY power.', cn:'崩塌! LED 一接, Vout 从 2.5V 掉到约 0.36V. 分压器只切电压, 不出力气, 不能给负载供电.'},
  trap_pass:   {en:'GOOD — you saw the collapse. The lesson sticks.', cn:'通过 — 你亲眼看到了崩塌. 这条铁律记住了.'},
  win:         {en:'ALL LEVELS CLEAR — you have mastered the voltage divider.', cn:'通关 — 分压电路你已经吃透了.'},

  vin:    {en:'Vin', cn:'Vin'},
  vout:   {en:'Vout', cn:'Vout'},
  gnd:    {en:'GND', cn:'GND'},
  r1cap:  {en:'R1', cn:'R1'},
  r2cap:  {en:'R2', cn:'R2'},
  i_lbl:  {en:'I', cn:'I'},
  load:   {en:'LOAD\n(LED + 220Ω)', cn:'负载\n(LED+220Ω)'},
  formula:{en:'Vout = Vin × R2 / (R1+R2)', cn:'Vout = Vin × R2 / (R1+R2)'},
};

function t(k){return (I18N[k] && I18N[k][LANG]) || (I18N[k] && I18N[k].en) || k;}

// ===================== game state =====================
var R_OPTIONS = [0.1, 0.22, 0.33, 0.47, 1.0, 1.8, 2.2, 3.3, 4.7, 6.8, 10.0, 22.0]; // kΩ
var VIN = 5.0;

var LEVELS = [
  {target:3.30, taskKey:'lvl1_task', hintKey:'lvl1_hint', tolerance:0.10, trap:false},
  {target:2.50, taskKey:'lvl2_task', hintKey:'lvl2_hint', tolerance:0.10, trap:false},
  {target:1.00, taskKey:'lvl3_task', hintKey:'lvl3_hint', tolerance:0.10, trap:false},
  {target:4.00, taskKey:'lvl4_task', hintKey:'lvl4_hint', tolerance:0.10, trap:false},
  {target:1.65, taskKey:'lvl5_task', hintKey:'lvl5_hint', tolerance:0.10, trap:false},
  {target:2.50, taskKey:'lvl6_task', hintKey:'lvl6_hint', tolerance:0.20, trap:true,  loadR:0.220},
];

var state = {
  level: 0,
  r1Idx: 5,    // start 1.8k
  r2Idx: 7,    // start 3.3k
  attempts: [0,0,0,0,0,0],
  cleared: [false,false,false,false,false,false],
};

// ===================== compute Vout =====================
function currentVout(level){
  var R1 = R_OPTIONS[state.r1Idx];
  var R2 = R_OPTIONS[state.r2Idx];
  var L = LEVELS[level];
  if (L.trap){
    // R2 is in parallel with loadR (LED 220Ω)
    var Rl = L.loadR;
    var R2eff = (R2 * Rl) / (R2 + Rl);
    return VIN * R2eff / (R1 + R2eff);
  }
  return VIN * R2 / (R1 + R2);
}
function currentVoutNoLoad(){
  var R1 = R_OPTIONS[state.r1Idx], R2 = R_OPTIONS[state.r2Idx];
  return VIN * R2 / (R1 + R2);
}
function currentI_mA(){
  var R1 = R_OPTIONS[state.r1Idx], R2 = R_OPTIONS[state.r2Idx];
  var L = LEVELS[state.level];
  if (L && L.trap){
    var Rl = L.loadR;
    var R2eff = (R2 * Rl) / (R2 + Rl);
    return VIN / (R1 + R2eff); // mA, since R in kΩ
  }
  return VIN / (R1 + R2); // mA
}

// ===================== canvas drawing =====================
var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var DPR = window.devicePixelRatio || 1;
var CW = 800, CH = 500;

function resizeCanvas(){
  var rect = canvas.parentNode.getBoundingClientRect();
  CW = Math.max(400, rect.width);
  CH = Math.max(300, rect.height);
  canvas.width = CW * DPR;
  canvas.height = CH * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}
window.addEventListener('resize', resizeCanvas);

function getCSSVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function drawBg(){
  ctx.fillStyle = getCSSVar('--bg');
  ctx.fillRect(0,0,CW,CH);

  // Subtle grid
  ctx.strokeStyle = getCSSVar('--grid');
  ctx.lineWidth = 0.5;
  var step = 40;
  for(var x=0;x<CW;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(var y=0;y<CH;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
}

function drawCircuit(){
  var INK = getCSSVar('--ink');
  var DIM = getCSSVar('--ink-dim');
  var SIG = getCSSVar('--signal');
  var FLA = getCSSVar('--flash');
  var QRY = getCSSVar('--query');
  var DNG = getCSSVar('--danger');

  // Layout
  var cx = CW * 0.50;
  var topY = CH * 0.18;
  var midY = CH * 0.50;
  var botY = CH * 0.82;
  var vinX = cx - 180, vinY = topY;
  var gndX = cx - 180, gndY = botY;
  var voutX = cx + 180;
  // Wire from Vin down to R1
  ctx.strokeStyle = INK; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(vinX, vinY);
  ctx.lineTo(cx, vinY);
  ctx.lineTo(cx, topY + 30);
  ctx.stroke();

  // R1 (zigzag)
  drawResistor(cx, topY + 30, cx, midY - 20, 'R1', R_OPTIONS[state.r1Idx]);

  // Wire from R1 bottom to mid junction, then right to Vout
  ctx.beginPath();
  ctx.moveTo(cx, midY - 20);
  ctx.lineTo(cx, midY);
  ctx.lineTo(voutX, midY);
  ctx.stroke();

  // Junction dot
  ctx.fillStyle = SIG;
  ctx.beginPath(); ctx.arc(cx, midY, 5, 0, Math.PI*2); ctx.fill();

  // R2 (zigzag) from junction down
  ctx.strokeStyle = INK;
  ctx.beginPath();
  ctx.moveTo(cx, midY);
  ctx.lineTo(cx, midY + 20);
  ctx.stroke();
  drawResistor(cx, midY + 20, cx, botY - 30, 'R2', R_OPTIONS[state.r2Idx]);

  // Wire from R2 to GND
  ctx.beginPath();
  ctx.moveTo(cx, botY - 30);
  ctx.lineTo(cx, botY);
  ctx.lineTo(gndX, botY);
  ctx.stroke();

  // Vin label + node
  ctx.fillStyle = FLA;
  ctx.beginPath(); ctx.arc(vinX, vinY, 6, 0, Math.PI*2); ctx.fill();
  ctx.font = "bold 16px 'JetBrains Mono', monospace";
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = FLA;
  ctx.fillText(t('vin') + ' = ' + VIN.toFixed(1) + ' V', vinX - 12, vinY);

  // GND symbol
  ctx.strokeStyle = DIM; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(gndX, gndY, 5, 0, Math.PI*2); ctx.stroke();
  // Three horizontal lines (GND symbol)
  for (var i = 0; i < 3; i++){
    var ly = gndY + 8 + i*4;
    var lw = 18 - i*5;
    ctx.beginPath();
    ctx.moveTo(gndX - lw/2, ly);
    ctx.lineTo(gndX + lw/2, ly);
    ctx.stroke();
  }
  ctx.font = "11px 'JetBrains Mono', monospace";
  ctx.fillStyle = DIM; ctx.textAlign = 'right';
  ctx.fillText(t('gnd'), gndX - 12, gndY);

  // Vout label
  ctx.fillStyle = SIG;
  ctx.beginPath(); ctx.arc(voutX, midY, 6, 0, Math.PI*2); ctx.fill();
  ctx.font = "bold 16px 'JetBrains Mono', monospace";
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var vout = currentVout(state.level);
  var voutColor = SIG;
  if (LEVELS[state.level].trap && state.attempts[state.level] > 0){
    // After CHECK on trap level, show the dramatic drop
    voutColor = DNG;
  }
  ctx.fillStyle = voutColor;
  ctx.fillText(t('vout') + ' = ' + vout.toFixed(2) + ' V', voutX + 12, midY);

  // Current annotation (top of R1)
  var I = currentI_mA();
  ctx.font = "11px 'JetBrains Mono', monospace";
  ctx.fillStyle = DIM;
  ctx.textAlign = 'left';
  ctx.fillText(t('i_lbl') + ' = ' + I.toFixed(2) + ' mA', cx + 10, topY + 30);

  // If trap level, draw the LOAD on Vout side
  var L = LEVELS[state.level];
  if (L.trap){
    var loadX = voutX + 130;
    var loadY = midY;
    // wire from Vout to load
    ctx.strokeStyle = DNG; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(voutX + 8, midY);
    ctx.lineTo(loadX - 30, midY);
    ctx.stroke();
    // LED + 220Ω stacked
    ctx.strokeStyle = DNG;
    ctx.strokeRect(loadX - 30, midY - 30, 60, 60);
    ctx.fillStyle = DNG;
    ctx.font = "bold 10px 'JetBrains Mono', monospace";
    ctx.textAlign = 'center';
    var loadLines = t('load').split('\n');
    loadLines.forEach(function(line, idx){
      ctx.fillText(line, loadX, midY - 5 + idx * 14);
    });
    // load to GND
    ctx.strokeStyle = DIM; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(loadX, midY + 30);
    ctx.lineTo(loadX, botY);
    ctx.lineTo(gndX + 50, botY);
    ctx.stroke();
  }

  // Formula at bottom right
  ctx.font = "12px 'JetBrains Mono', monospace";
  ctx.fillStyle = DIM;
  ctx.textAlign = 'right';
  ctx.fillText(t('formula'), CW - 20, CH - 16);
}

function drawResistor(x1, y1, x2, y2, label, value){
  var INK = getCSSVar('--ink');
  var SIG = getCSSVar('--signal');
  var FLA = getCSSVar('--flash');
  var DIM = getCSSVar('--ink-dim');

  ctx.strokeStyle = INK;
  ctx.lineWidth = 2;
  // Zigzag from (x1,y1) to (x2,y2). Assume vertical.
  var n = 6; // peaks
  var span = y2 - y1;
  var amp = 10;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  for (var i = 0; i < n; i++){
    var yy = y1 + (i + 0.5) * span / n;
    var xx = x1 + (i % 2 === 0 ? amp : -amp);
    ctx.lineTo(xx, yy);
  }
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // Label box on right side
  var lx = x1 + amp + 20;
  var ly = (y1 + y2) / 2;
  ctx.font = "bold 12px 'JetBrains Mono', monospace";
  ctx.fillStyle = FLA;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, lx, ly - 8);
  ctx.font = "11px 'JetBrains Mono', monospace";
  ctx.fillStyle = SIG;
  var vStr = (value < 1) ? (value*1000).toFixed(0) + ' Ω' : value.toFixed(2) + ' kΩ';
  ctx.fillText(vStr, lx, ly + 8);
}

function draw(){
  drawBg();
  drawCircuit();
}

// ===================== UI wiring =====================
function fmtR(k){
  if (k < 1) return (k * 1000).toFixed(0) + 'Ω';
  return k.toFixed(2) + 'k';
}
function refreshSliders(){
  document.getElementById('r1Val').textContent = fmtR(R_OPTIONS[state.r1Idx]);
  document.getElementById('r2Val').textContent = fmtR(R_OPTIONS[state.r2Idx]);
}
function refreshLevelUI(){
  document.getElementById('levelIdx').textContent = (state.level + 1);
  var L = LEVELS[state.level];
  document.getElementById('taskText').textContent = t(L.taskKey);
  document.getElementById('hintText').textContent = t(L.hintKey);

  // Level dots
  var dots = document.getElementById('levelDots');
  dots.innerHTML = '';
  for (var i = 0; i < LEVELS.length; i++){
    var d = document.createElement('div');
    d.className = 'level-dot';
    if (state.cleared[i]) d.classList.add('done');
    else if (i === state.level) d.classList.add('on');
    dots.appendChild(d);
  }
  document.getElementById('scoreVal').textContent = state.cleared.filter(Boolean).length;
}
function refreshI18N(){
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('levelLabel').textContent = t('levelLabel');
  document.getElementById('taskLabel').textContent = t('taskLabel');
  document.getElementById('scoreLabel').textContent = t('scoreLabel');
  document.getElementById('r1Lbl').textContent = t('r1Lbl');
  document.getElementById('r2Lbl').textContent = t('r2Lbl');
  document.getElementById('checkBtn').textContent = t('check');
  document.getElementById('nextBtn').textContent = t('next');
  refreshLevelUI();
  if (state.attempts[state.level] === 0){
    document.getElementById('feedback').textContent = t('intro');
    document.getElementById('feedback').className = 'feedback-bar';
  }
  draw();
}

document.getElementById('r1').addEventListener('input', function(e){
  state.r1Idx = +e.target.value;
  refreshSliders();
  draw();
});
document.getElementById('r2').addEventListener('input', function(e){
  state.r2Idx = +e.target.value;
  refreshSliders();
  draw();
});

document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG === 'cn' ? 'en' : 'cn';
  this.textContent = LANG.toUpperCase();
  refreshI18N();
});

document.getElementById('checkBtn').addEventListener('click', function(){
  var L = LEVELS[state.level];
  state.attempts[state.level]++;
  var fb = document.getElementById('feedback');
  if (L.trap){
    var voutNoLoad = currentVoutNoLoad();
    var vout = currentVout(state.level);
    // Pass if user chose R1≈R2 (which gives 2.5V no-load) AND saw the collapse
    var halved = Math.abs(voutNoLoad - 2.5) < 0.15;
    if (halved){
      state.cleared[state.level] = true;
      fb.className = 'feedback-bar pass';
      fb.innerHTML = t('trap_msg') + '<br>' + t('trap_pass');
      document.getElementById('nextBtn').disabled = false;
    } else {
      fb.className = 'feedback-bar fail';
      fb.textContent = 'Set R1 = R2 (try 1k + 1k) so no-load Vout would be 2.5V, then watch the load pull it down.';
    }
    draw();
    return;
  }
  var vout = currentVout(state.level);
  var diff = vout - L.target;
  if (Math.abs(diff) <= L.tolerance){
    state.cleared[state.level] = true;
    fb.className = 'feedback-bar pass';
    fb.textContent = t('pass') + '  (Vout = ' + vout.toFixed(2) + ' V)';
    document.getElementById('nextBtn').disabled = false;
  } else if (diff > 0){
    fb.className = 'feedback-bar fail';
    fb.textContent = t('fail_high') + '  (Vout = ' + vout.toFixed(2) + ' V)';
  } else {
    fb.className = 'feedback-bar fail';
    fb.textContent = t('fail_low') + '  (Vout = ' + vout.toFixed(2) + ' V)';
  }
  refreshLevelUI();
  draw();
});

document.getElementById('nextBtn').addEventListener('click', function(){
  if (state.level < LEVELS.length - 1){
    state.level++;
    this.disabled = true;
    document.getElementById('feedback').className = 'feedback-bar';
    document.getElementById('feedback').textContent = t('intro');
    refreshLevelUI();
    draw();
  } else {
    document.getElementById('feedback').className = 'feedback-bar pass';
    document.getElementById('feedback').textContent = t('win');
  }
});

// init
resizeCanvas();
refreshSliders();
refreshI18N();
</script>
</body>
</html>
