<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- cargo body -->
  <rect x="4" y="8" width="100" height="48" rx="3" fill="#2a4a6a" stroke="#5ba3d9"/>
  <!-- cargo detail lines -->
  <line x1="4" y1="32" x2="104" y2="32" stroke="#5ba3d9" stroke-width="0.8" opacity="0.4"/>
  <!-- cabin -->
  <path d="M104 20 L104 56 L140 56 L140 30 L125 20 Z" fill="#1e3a54" stroke="#5ba3d9"/>
  <!-- windshield -->
  <path d="M125 22 L138 30 L138 42 L118 42 L118 30 Z" fill="#3a6a8e" stroke="#78b8e8" stroke-width="1.5" opacity="0.7"/>
  <!-- headlight -->
  <rect x="138" y="42" width="6" height="6" rx="1" fill="#ffd866" stroke="none" opacity="0.9"/>
  <!-- chassis -->
  <line x1="4" y1="56" x2="140" y2="56" stroke="#5ba3d9" stroke-width="2.5"/>
  <!-- rear wheels (dual) -->
  <circle cx="30" cy="64" r="12" fill="#1a2a3a" stroke="#78b8e8" stroke-width="2.5"/>
  <circle cx="30" cy="64" r="5" fill="#2a4a6a" stroke="#5ba3d9" stroke-width="1.5"/>
  <circle cx="52" cy="64" r="12" fill="#1a2a3a" stroke="#78b8e8" stroke-width="2.5"/>
  <circle cx="52" cy="64" r="5" fill="#2a4a6a" stroke="#5ba3d9" stroke-width="1.5"/>
  <!-- front wheel -->
  <circle cx="124" cy="64" r="12" fill="#1a2a3a" stroke="#78b8e8" stroke-width="2.5"/>
  <circle cx="124" cy="64" r="5" fill="#2a4a6a" stroke="#5ba3d9" stroke-width="1.5"/>
  <!-- bumper -->
  <line x1="140" y1="52" x2="148" y2="52" stroke="#5ba3d9" stroke-width="3"/>
  <line x1="148" y1="52" x2="148" y2="58" stroke="#5ba3d9" stroke-width="3"/>
</svg>
