<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- wrist/arm -->
  <rect x="26" y="0" width="28" height="35" rx="8" fill="#f0c4a8" stroke="#d4a080" stroke-width="1.5"/>
  <!-- palm -->
  <ellipse cx="40" cy="50" rx="22" ry="18" fill="#f0c4a8" stroke="#d4a080" stroke-width="1.5"/>
  <!-- fingers -->
  <rect x="14" y="48" width="10" height="28" rx="5" fill="#e8b898" stroke="#d4a080" stroke-width="1.2"/>
  <rect x="26" y="52" width="9" height="30" rx="4.5" fill="#e8b898" stroke="#d4a080" stroke-width="1.2"/>
  <rect x="37" y="54" width="9" height="30" rx="4.5" fill="#e8b898" stroke="#d4a080" stroke-width="1.2"/>
  <rect x="48" y="52" width="9" height="28" rx="4.5" fill="#e8b898" stroke="#d4a080" stroke-width="1.2"/>
  <rect x="58" y="48" width="9" height="24" rx="4.5" fill="#e8b898" stroke="#d4a080" stroke-width="1.2"/>
  <!-- thumb -->
  <ellipse cx="16" cy="42" rx="7" ry="10" fill="#e8b898" stroke="#d4a080" stroke-width="1.2" transform="rotate(-20 16 42)"/>
  <!-- palm lines -->
  <path d="M28 50 Q36 54 52 48" stroke="#d4a080" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M30 56 Q38 58 50 55" stroke="#d4a080" stroke-width="0.6" fill="none" opacity="0.4"/>
</svg>
