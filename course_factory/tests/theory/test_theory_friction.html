<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#f8f5ff;color:#19227d;font-family:'Inter',sans-serif;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:16px;padding:10px 20px;background:#f1efff;}
.ctrl-btn{
  font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;
  padding:8px 20px;border:none;cursor:pointer;border-radius:8px;
  transition:all 0.3s cubic-bezier(0.2,0.8,0.2,1);
}
.ctrl-btn.primary{
  background:linear-gradient(135deg,#6a1cf6,#ac8eff);color:#fff;
  box-shadow:0 4px 12px rgba(106,28,246,0.25);
}
.ctrl-btn.primary:hover{transform:scale(1.04);box-shadow:0 6px 16px rgba(106,28,246,0.35);}
.ctrl-btn.primary:active{transform:scale(0.96);}
.ctrl-btn.ghost{
  background:#e6e6ff;color:#4953ac;
}
.ctrl-btn.ghost:hover{background:#d9daff;color:#6a1cf6;}
.hud{
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 20px;background:#f1efff;
}
.hud-item{text-align:center;}
.hud-label{font-family:'Manrope',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#4953ac;}
.hud-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;color:#6a1cf6;}
.frame-ind{
  position:absolute;top:6px;left:16px;
  font-family:'Manrope',sans-serif;font-size:11px;color:#9ea6ff;letter-spacing:0.1em;
}
</style>
</head>
<body>
<div class="wrapper">
<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="frame-ind" id="fi"></div>
</div>
<div class="controls">
  <button class="ctrl-btn ghost" id="btnPrev">上一帧</button>
  <button class="ctrl-btn primary" id="btnPlay">播放</button>
  <button class="ctrl-btn ghost" id="btnNext">下一帧</button>
</div>
<div class="hud">
  <div class="hud-item"><div class="hud-label">地面</div><div class="hud-val" id="h1">--</div></div>
  <div class="hud-item"><div class="hud-label">摩擦系数 μ</div><div class="hud-val" id="h2">--</div></div>
  <div class="hud-item"><div class="hud-label">摩擦力</div><div class="hud-val" id="h3">--</div></div>
  <div class="hud-item"><div class="hud-label">打滑风险</div><div class="hud-val" id="h4">--</div></div>
</div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W, H;

  var currentFrame = 0;
  var totalFrames = 3;
  var playing = false;
  var playTimer = null;

  var frames = [
    {name:'冰面', mu:0.03, friction:'极低', risk:'高', color:'#b3d4fc', slideRatio:0.55, surfaceType:'ice'},
    {name:'水泥路', mu:0.6, friction:'中等', risk:'低', color:'#c8c0b8', slideRatio:0.22, surfaceType:'concrete'},
    {name:'碎石路', mu:0.8, friction:'高', risk:'极低', color:'#b09878', slideRatio:0.08, surfaceType:'gravel'},
  ];

  function resize(){
    var rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    draw();
  }

  function draw(){
    var f = frames[currentFrame];
    ctx.clearRect(0,0,W,H);

    // Background gradient (light purple)
    var bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#f8f5ff');
    bg.addColorStop(1,'#f1efff');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Subtle grid
    ctx.strokeStyle = 'rgba(158,166,255,0.12)';
    ctx.lineWidth = 1;
    var step = 30;
    for(var gx=0;gx<W;gx+=step){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<H;gy+=step){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

    var groundY = H * 0.7;

    // Surface
    drawSurface(f.surfaceType, groundY, f.color);

    // Ground line
    ctx.strokeStyle = '#9ea6ff';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(W,groundY);ctx.stroke();
    ctx.setLineDash([]);

    // Block
    var blockW = W*0.09; var blockH = blockW*0.75;
    var startX = W*0.13;
    var slideX = startX + f.slideRatio * W * 0.7;
    var blockY = groundY - blockH;

    // Block shadow
    ctx.fillStyle = 'rgba(106,28,246,0.08)';
    ctx.beginPath();
    ctx.ellipse(slideX + blockW/2, groundY+3, blockW*0.55, 4, 0, 0, Math.PI*2);
    ctx.fill();

    // Block
    var bGrd = ctx.createLinearGradient(slideX, blockY, slideX, blockY+blockH);
    bGrd.addColorStop(0,'#6a1cf6');
    bGrd.addColorStop(1,'#5000c8');
    ctx.fillStyle = bGrd;
    roundRect(ctx, slideX, blockY, blockW, blockH, 4);
    ctx.fill();
    // Block highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    roundRect(ctx, slideX+2, blockY+2, blockW-4, blockH*0.35, 3);
    ctx.fill();

    // Push arrow (→ blue)
    drawArrow(startX - 35, blockY+blockH/2, startX - 4, blockY+blockH/2, '#6a1cf6', 2.5);
    // Label
    ctx.font = '600 11px "Manrope"';
    ctx.fillStyle = '#6a1cf6';
    ctx.textAlign = 'center';
    ctx.fillText('F', startX - 20, blockY + blockH/2 - 8);

    // Friction arrow (← red, proportional to mu)
    var frLen = Math.max(f.mu * 70, 6);
    drawArrow(slideX+blockW+frLen+4, blockY+blockH/2, slideX+blockW+4, blockY+blockH/2, '#b41340', 2.5);
    // Friction label
    ctx.font = '700 12px "Plus Jakarta Sans"';
    ctx.fillStyle = '#b41340';
    ctx.textAlign = 'left';
    ctx.fillText('f = '+f.mu.toFixed(2)+'N', slideX+blockW+frLen+10, blockY+blockH/2+4);

    // Normal force arrow (↑ teal)
    drawArrow(slideX+blockW/2, blockY, slideX+blockW/2, blockY-35, '#006859', 2);
    ctx.font = '600 11px "Manrope"';
    ctx.fillStyle = '#006859';
    ctx.textAlign = 'left';
    ctx.fillText('N', slideX+blockW/2+6, blockY-25);

    // Slide distance indicator
    if(f.slideRatio > 0.05){
      ctx.setLineDash([3,3]);
      ctx.strokeStyle = '#9ea6ff';
      ctx.lineWidth = 1;
      ctx.beginPath();ctx.moveTo(startX, groundY+14);ctx.lineTo(slideX+blockW/2, groundY+14);ctx.stroke();
      ctx.setLineDash([]);
      var dists = ['~10m','~2m','~0.5m'];
      ctx.font = '500 10px "Manrope"';
      ctx.fillStyle = '#4953ac';
      ctx.textAlign = 'center';
      ctx.fillText(dists[currentFrame], (startX+slideX+blockW/2)/2, groundY+26);
    }

    // Surface label (top center)
    ctx.font = '800 clamp(16px,2.5vw,22px) "Plus Jakarta Sans"';
    ctx.fillStyle = '#19227d';
    ctx.textAlign = 'center';
    ctx.fillText(f.name, W/2, H*0.15);

    // Formula box (right side, below title)
    var fxW = W*0.26; var fxH = H*0.28;
    var fxX = W*0.68; var fxY = H*0.2;
    // Glass bg
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    roundRect(ctx, fxX, fxY, fxW, fxH, 8);
    ctx.fill();
    // Title
    ctx.font = '700 9px "Manrope"';
    ctx.fillStyle = '#6a1cf6';
    ctx.textAlign = 'left';
    ctx.letterSpacing = '0.1em';
    ctx.fillText('MATHEMATICAL FORMULA', fxX+12, fxY+18);
    // Formula
    ctx.font = 'italic 20px "Times New Roman", serif';
    ctx.fillStyle = '#19227d';
    ctx.textAlign = 'center';
    ctx.fillText('f = \u03BC \u00B7 N', fxX+fxW/2, fxY+fxH*0.5);
    // Current mu highlight
    ctx.font = '700 12px "Plus Jakarta Sans"';
    ctx.fillStyle = '#b41340';
    ctx.fillText('\u03BC = '+f.mu.toFixed(2), fxX+fxW/2, fxY+fxH*0.75);

    // Update HUD
    document.getElementById('h1').textContent = f.name;
    document.getElementById('h2').textContent = f.mu.toFixed(2);
    document.getElementById('h3').textContent = f.friction;
    document.getElementById('h4').textContent = f.risk;
    document.getElementById('fi').textContent = (currentFrame+1)+' / '+totalFrames;
  }

  function drawSurface(type, groundY, baseColor){
    var grd = ctx.createLinearGradient(0,groundY,0,H);
    if(type==='ice'){
      grd.addColorStop(0,'rgba(180,215,255,0.25)');
      grd.addColorStop(1,'rgba(200,230,255,0.15)');
      ctx.fillStyle = grd;
      ctx.fillRect(0,groundY,W,H-groundY);
      ctx.strokeStyle='rgba(180,215,255,0.3)';ctx.lineWidth=1;
      for(var i=0;i<10;i++){
        var lx=W*0.05+(W*0.9/10)*i;
        ctx.beginPath();ctx.moveTo(lx,groundY+4);ctx.lineTo(lx+25,groundY+4);ctx.stroke();
      }
    } else if(type==='concrete'){
      grd.addColorStop(0,'rgba(190,185,175,0.3)');
      grd.addColorStop(1,'rgba(170,165,155,0.2)');
      ctx.fillStyle = grd;
      ctx.fillRect(0,groundY,W,H-groundY);
      ctx.fillStyle='rgba(160,155,145,0.15)';
      for(var j=0;j<50;j++){
        ctx.beginPath();ctx.arc(Math.random()*W, groundY+Math.random()*(H-groundY), 1.5, 0, Math.PI*2);ctx.fill();
      }
    } else {
      grd.addColorStop(0,'rgba(176,152,120,0.3)');
      grd.addColorStop(1,'rgba(150,130,100,0.2)');
      ctx.fillStyle = grd;
      ctx.fillRect(0,groundY,W,H-groundY);
      var cs=['rgba(190,165,130,0.3)','rgba(165,145,115,0.25)','rgba(200,175,140,0.2)'];
      for(var k=0;k<70;k++){
        ctx.fillStyle=cs[k%3];
        ctx.beginPath();ctx.arc(Math.random()*W, groundY+3+Math.random()*(H-groundY-6), 1.5+Math.random()*3, 0, Math.PI*2);ctx.fill();
      }
    }
  }

  function drawArrow(x1,y1,x2,y2,color,lw){
    var dx=x2-x1,dy=y2-y1;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len<2)return;
    var ux=dx/len,uy=dy/len;
    ctx.strokeStyle=color;ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    // arrowhead
    var hs=7;
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-ux*hs-uy*hs*0.5, y2-uy*hs+ux*hs*0.5);
    ctx.lineTo(x2-ux*hs+uy*hs*0.5, y2-uy*hs-ux*hs*0.5);
    ctx.closePath();ctx.fill();
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
    c.closePath();
  }

  function goTo(n){
    currentFrame = Math.max(0, Math.min(totalFrames-1, n));
    draw();
  }

  document.getElementById('btnPrev').addEventListener('click', function(){
    if(playing) stopPlay();
    goTo(currentFrame-1);
  });
  document.getElementById('btnNext').addEventListener('click', function(){
    if(playing) stopPlay();
    goTo(currentFrame+1);
  });
  document.getElementById('btnPlay').addEventListener('click', function(){
    if(playing){ stopPlay(); return; }
    playing = true;
    document.getElementById('btnPlay').textContent = '暂停';
    playTimer = setInterval(function(){
      if(currentFrame >= totalFrames-1){ stopPlay(); return; }
      goTo(currentFrame+1);
    }, 2000);
  });

  function stopPlay(){
    playing = false;
    clearInterval(playTimer);
    document.getElementById('btnPlay').textContent = '播放';
  }

  window.addEventListener('resize', resize);
  document.fonts.ready.then(function(){ resize(); });
  setTimeout(resize, 100);
})();
</script>
</body>
</html>
