<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#f8f5ff;color:#19227d;font-family:'Inter',sans-serif;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:16px;padding:10px 20px;background:#f1efff;}
.ctrl-btn{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;padding:8px 20px;border:none;cursor:pointer;border-radius:8px;transition:all 0.3s;}
.ctrl-btn.primary{background:linear-gradient(135deg,#6a1cf6,#ac8eff);color:#fff;box-shadow:0 4px 12px rgba(106,28,246,0.25);}
.ctrl-btn.primary:hover{transform:scale(1.04);}
.ctrl-btn.ghost{background:#e6e6ff;color:#4953ac;}
.ctrl-btn.ghost:hover{background:#d9daff;color:#6a1cf6;}
.hud{display:flex;align-items:center;justify-content:space-around;padding:8px 20px;background:#f1efff;}
.hud-item{text-align:center;}
.hud-label{font-family:'Manrope',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#4953ac;}
.hud-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;color:#6a1cf6;}
.frame-ind{position:absolute;top:6px;left:16px;font-family:'Manrope',sans-serif;font-size:11px;color:#9ea6ff;letter-spacing:0.1em;}
</style>
</head>
<body>
<div class="wrapper">
<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="frame-ind" id="fi"></div>
</div>
<div class="controls">
  <button class="ctrl-btn ghost" id="btnPrev">上一帧</button>
  <button class="ctrl-btn primary" id="btnPlay">播放</button>
  <button class="ctrl-btn ghost" id="btnNext">下一帧</button>
</div>
<div class="hud">
  <div class="hud-item"><div class="hud-label">比例尺</div><div class="hud-val" id="h1">--</div></div>
  <div class="hud-item"><div class="hud-label">真实距离</div><div class="hud-val" id="h2">--</div></div>
  <div class="hud-item"><div class="hud-label">地图距离</div><div class="hud-val" id="h3">--</div></div>
</div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W, H;
  var currentFrame = 0;
  var totalFrames = 3;
  var playing = false;
  var playTimer = null;

  var frames = [
    {scale:'1:100', real:'10 m', map:'10 cm', ratio:100, realM:10, mapCm:10},
    {scale:'1:1000', real:'100 m', map:'10 cm', ratio:1000, realM:100, mapCm:10},
    {scale:'1:10000', real:'1 km', map:'10 cm', ratio:10000, realM:1000, mapCm:10},
  ];

  function resize(){
    var rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    draw();
  }

  function draw(){
    var f = frames[currentFrame];
    ctx.clearRect(0,0,W,H);

    // Background
    var bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#f8f5ff'); bg.addColorStop(1,'#f1efff');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle = 'rgba(158,166,255,0.12)'; ctx.lineWidth = 1;
    for(var gx=0;gx<W;gx+=30){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<H;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

    // Title
    ctx.font = '800 clamp(16px,2.5vw,22px) "Plus Jakarta Sans"';
    ctx.fillStyle = '#19227d'; ctx.textAlign = 'center';
    ctx.fillText('比例尺 ' + f.scale, W/2, H*0.1);

    // Real world bar (top)
    var barY1 = H*0.22;
    var realBarW = W*0.7;
    ctx.font = '600 11px "Manrope"'; ctx.fillStyle = '#4953ac'; ctx.textAlign = 'center';
    ctx.fillText('真实世界', W/2, barY1 - 8);

    ctx.fillStyle = '#6a1cf6';
    roundRect(ctx, W*0.15, barY1, realBarW, 20, 4); ctx.fill();

    // Real distance labels
    ctx.fillStyle = '#fff'; ctx.font = '700 11px "Plus Jakarta Sans"'; ctx.textAlign = 'center';
    ctx.fillText(f.real, W*0.15 + realBarW/2, barY1 + 14);

    // Arrow connecting
    var midY = barY1 + 60;
    ctx.strokeStyle = '#9ea6ff'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(W*0.15, barY1+20); ctx.lineTo(W*0.15, midY+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W*0.15+realBarW, barY1+20); ctx.lineTo(W*0.15+realBarW, midY+30); ctx.stroke();
    ctx.setLineDash([]);

    // Ratio text
    ctx.font = '700 14px "Plus Jakarta Sans"'; ctx.fillStyle = '#b41340'; ctx.textAlign = 'center';
    ctx.fillText('\u00F7 ' + f.ratio, W/2, midY + 15);

    // Map bar (bottom)
    var barY2 = midY + 35;
    var mapBarW = realBarW / Math.pow(f.ratio/100, 0.5);  // visual scaling
    if(currentFrame === 0) mapBarW = realBarW;
    else if(currentFrame === 1) mapBarW = realBarW * 0.35;
    else mapBarW = realBarW * 0.12;

    ctx.font = '600 11px "Manrope"'; ctx.fillStyle = '#4953ac'; ctx.textAlign = 'center';
    ctx.fillText('地图上', W/2, barY2 - 8);

    ctx.fillStyle = '#006859';
    roundRect(ctx, W/2 - mapBarW/2, barY2, mapBarW, 20, 4); ctx.fill();

    ctx.fillStyle = '#fff'; ctx.font = '700 11px "Plus Jakarta Sans"'; ctx.textAlign = 'center';
    ctx.fillText(f.map, W/2, barY2 + 14);

    // Formula panel
    var fxW = W*0.28; var fxH = H*0.22;
    var fxX = W*0.68; var fxY = H*0.55;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    roundRect(ctx, fxX, fxY, fxW, fxH, 8); ctx.fill();
    ctx.font = '700 9px "Manrope"'; ctx.fillStyle = '#6a1cf6'; ctx.textAlign = 'left';
    ctx.fillText('SCALE FORMULA', fxX+12, fxY+18);
    ctx.font = 'italic 16px "Times New Roman", serif';
    ctx.fillStyle = '#19227d'; ctx.textAlign = 'center';
    ctx.fillText('1 : n', fxX+fxW/2, fxY+fxH*0.45);
    ctx.font = '500 11px "Inter"'; ctx.fillStyle = '#4953ac';
    ctx.fillText('地图1cm = 真实n cm', fxX+fxW/2, fxY+fxH*0.7);
    ctx.font = '700 12px "Plus Jakarta Sans"'; ctx.fillStyle = '#b41340';
    ctx.fillText('n = '+f.ratio, fxX+fxW/2, fxY+fxH*0.9);

    // Example illustration
    var exY = H*0.58;
    ctx.font = '500 11px "Inter"'; ctx.fillStyle = '#4953ac'; ctx.textAlign = 'left';
    if(currentFrame === 0){
      ctx.fillText('1cm 地图距离 = 1m 真实距离', W*0.08, exY);
      ctx.fillText('适合画教室地图', W*0.08, exY+18);
    } else if(currentFrame === 1){
      ctx.fillText('1cm 地图距离 = 10m 真实距离', W*0.08, exY);
      ctx.fillText('适合画校园地图', W*0.08, exY+18);
    } else {
      ctx.fillText('1cm 地图距离 = 100m 真实距离', W*0.08, exY);
      ctx.fillText('适合画城市街区', W*0.08, exY+18);
    }

    // HUD
    document.getElementById('h1').textContent = f.scale;
    document.getElementById('h2').textContent = f.real;
    document.getElementById('h3').textContent = f.map;
    document.getElementById('fi').textContent = (currentFrame+1)+' / '+totalFrames;
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
    c.closePath();
  }

  function goTo(n){ currentFrame = Math.max(0, Math.min(totalFrames-1, n)); draw(); }

  document.getElementById('btnPrev').addEventListener('click', function(){ if(playing) stopPlay(); goTo(currentFrame-1); });
  document.getElementById('btnNext').addEventListener('click', function(){ if(playing) stopPlay(); goTo(currentFrame+1); });
  document.getElementById('btnPlay').addEventListener('click', function(){
    if(playing){ stopPlay(); return; }
    playing = true; document.getElementById('btnPlay').textContent = '暂停';
    playTimer = setInterval(function(){ if(currentFrame >= totalFrames-1){ stopPlay(); return; } goTo(currentFrame+1); }, 2500);
  });
  function stopPlay(){ playing = false; clearInterval(playTimer); document.getElementById('btnPlay').textContent = '播放'; }

  window.addEventListener('resize', resize);
  document.fonts.ready.then(function(){ resize(); });
  setTimeout(resize, 100);
})();
</script>
</body>
</html>
