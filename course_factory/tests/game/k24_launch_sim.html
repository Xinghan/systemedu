<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">LAUNCH SIM</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <!-- Controls -->
    <div class="slider-group">
      <label id="angleLabel">ANGLE</label>
      <input type="range" id="angleSlider" min="30" max="90" value="75" step="1">
      <div class="val" id="angleVal">75</div>
    </div>
    <div class="slider-group" style="margin-top:6px;">
      <label id="speedLabel">SPEED</label>
      <input type="range" id="speedSlider" min="20" max="100" value="60" step="1">
      <div class="val" id="speedVal">60 m/s</div>
    </div>
    <button class="action-btn" id="launchBtn">LAUNCH</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <div class="hud-tag" id="hudTag">ROCKET LAUNCH</div>
      <div class="hud-item"><div class="hud-label" id="hl1">MAX HEIGHT</div><div class="hud-val" id="hv1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hl2">RANGE</div><div class="hud-val" id="hv2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hl3">FLIGHT TIME</div><div class="hud-val" id="hv3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hl4">LAUNCHES</div><div class="hud-val" id="hv4">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">READY</span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(91,163,217,0.06)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  r.style.setProperty('--primary-dim', '#3d7ab0');
  r.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  sideTitle:   {en:'LAUNCH SIMULATOR', cn:'\u706b\u7bad\u53d1\u5c04\u6a21\u62df\u5668'},
  sideSub:     {en:'Adjust angle and speed to launch', cn:'\u8c03\u6574\u89d2\u5ea6\u548c\u901f\u5ea6\uff0c\u89c2\u5bdf\u98de\u884c\u8f68\u8ff9'},
  guideLabel:  {en:'HOW TO PLAY', cn:'\u73a9\u6cd5\u8bf4\u660e'},
  guideText:   {en:'1. Adjust launch angle (30-90 deg)\n2. Adjust initial speed (20-100 m/s)\n3. Click LAUNCH to fire\n4. Observe trajectory, max height, range\n5. Try different combos!', cn:'1. \u8c03\u6574\u53d1\u5c04\u89d2\u5ea6 (30-90\u5ea6)\n2. \u8c03\u6574\u521d\u901f\u5ea6 (20-100 m/s)\n3. \u70b9\u51fb\u201c\u53d1\u5c04\u201d\u6309\u94ae\n4. \u89c2\u5bdf\u8f68\u8ff9\u3001\u5c04\u9ad8\u3001\u5c04\u7a0b\n5. \u8bd5\u8bd5\u4e0d\u540c\u7ec4\u5408!'},
  angleLabel:  {en:'LAUNCH ANGLE', cn:'\u53d1\u5c04\u89d2\u5ea6'},
  speedLabel:  {en:'INITIAL SPEED', cn:'\u521d\u901f\u5ea6'},
  launchBtn:   {en:'LAUNCH', cn:'\u53d1\u5c04'},
  resetBtn:    {en:'RESET', cn:'\u91cd\u7f6e'},
  hudTag:      {en:'ROCKET LAUNCH SIMULATOR', cn:'\u706b\u7bad\u53d1\u5c04\u6a21\u62df\u5668'},
  hl1:         {en:'MAX HEIGHT', cn:'\u5c04\u9ad8'},
  hl2:         {en:'RANGE', cn:'\u5c04\u7a0b'},
  hl3:         {en:'FLIGHT TIME', cn:'\u98de\u884c\u65f6\u95f4'},
  hl4:         {en:'LAUNCHES', cn:'\u53d1\u5c04\u6b21\u6570'},
  statusLabel: {en:'STATUS', cn:'\u72b6\u6001'},
  ready:       {en:'READY', cn:'\u5c31\u7eea'},
  flying:      {en:'IN FLIGHT', cn:'\u98de\u884c\u4e2d'},
  landed:      {en:'LANDED', cn:'\u5df2\u7740\u9646'},
  lblGround:   {en:'Ground', cn:'\u5730\u9762'},
  lblApex:     {en:'Apex', cn:'\u6700\u9ad8\u70b9'},
  lblAngle:    {en:'Angle', cn:'\u89d2\u5ea6'},
  lblSpeed:    {en:'Speed', cn:'\u901f\u5ea6'},
  lblHeight:   {en:'Height', cn:'\u9ad8\u5ea6'},
  lblRange:    {en:'Range', cn:'\u5c04\u7a0b'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('sideTitle');
  document.getElementById('sideSub').textContent = t('sideSub');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guideText').textContent = t('guideText');
  document.getElementById('angleLabel').textContent = t('angleLabel');
  document.getElementById('speedLabel').textContent = t('speedLabel');
  document.getElementById('launchBtn').textContent = t('launchBtn');
  document.getElementById('resetBtn').textContent = t('resetBtn');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hl1').textContent = t('hl1');
  document.getElementById('hl2').textContent = t('hl2');
  document.getElementById('hl3').textContent = t('hl3');
  document.getElementById('hl4').textContent = t('hl4');
  document.getElementById('statusLabel').textContent = t('statusLabel');
  draw();
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// PHYSICS SIMULATION
// ================================================================
var G = 9.81; // gravity m/s^2
var launchAngle = 75; // degrees
var launchSpeed = 60; // m/s
var simRunning = false;
var simTime = 0;
var simDt = 0.03;
var rocketPos = {x: 0, y: 0}; // meters (physics space)
var rocketVel = {x: 0, y: 0};
var trajectoryPts = []; // [{x, y}] physics coords
var prevTrajectories = []; // array of trajectory arrays for previous launches
var maxHeight = 0;
var flightRange = 0;
var flightTime = 0;
var launchCount = 0;
var simPhase = 'ready'; // ready | flying | landed
var apexMarked = false;
var apexPos = null;

function resetSim() {
  simRunning = false;
  simTime = 0;
  rocketPos = {x: 0, y: 0};
  rocketVel = {x: 0, y: 0};
  trajectoryPts = [];
  maxHeight = 0;
  flightRange = 0;
  flightTime = 0;
  simPhase = 'ready';
  apexMarked = false;
  apexPos = null;
  document.getElementById('hv1').textContent = '--';
  document.getElementById('hv2').textContent = '--';
  document.getElementById('hv3').textContent = '--';
  document.getElementById('statusVal').textContent = t('ready');
  document.getElementById('launchBtn').disabled = false;
  draw();
}

function launchRocket() {
  if (simPhase === 'flying') return;
  launchAngle = parseInt(document.getElementById('angleSlider').value);
  launchSpeed = parseInt(document.getElementById('speedSlider').value);
  var rad = launchAngle * Math.PI / 180;
  rocketPos = {x: 0, y: 0};
  rocketVel = {x: launchSpeed * Math.cos(rad), y: launchSpeed * Math.sin(rad)};
  trajectoryPts = [{x: 0, y: 0}];
  maxHeight = 0;
  flightRange = 0;
  flightTime = 0;
  simTime = 0;
  simPhase = 'flying';
  apexMarked = false;
  apexPos = null;
  launchCount++;
  document.getElementById('hv4').textContent = String(launchCount);
  document.getElementById('launchBtn').disabled = true;
  document.getElementById('statusVal').textContent = t('flying');
  simRunning = true;
  simLoop();
}

function simLoop() {
  if (!simRunning) return;
  // Euler integration
  rocketVel.y -= G * simDt;
  rocketPos.x += rocketVel.x * simDt;
  rocketPos.y += rocketVel.y * simDt;
  simTime += simDt;

  // Track max height
  if (rocketPos.y > maxHeight) {
    maxHeight = rocketPos.y;
  }
  // Detect apex
  if (!apexMarked && rocketVel.y <= 0) {
    apexMarked = true;
    apexPos = {x: rocketPos.x, y: maxHeight};
  }

  trajectoryPts.push({x: rocketPos.x, y: rocketPos.y});

  // Ground hit
  if (rocketPos.y <= 0 && simTime > 0.1) {
    rocketPos.y = 0;
    simRunning = false;
    simPhase = 'landed';
    flightRange = rocketPos.x;
    flightTime = simTime;
    // Save trajectory for ghost trails
    prevTrajectories.push(trajectoryPts.slice());
    if (prevTrajectories.length > 4) prevTrajectories.shift();
    document.getElementById('hv1').textContent = maxHeight.toFixed(1) + ' m';
    document.getElementById('hv2').textContent = flightRange.toFixed(1) + ' m';
    document.getElementById('hv3').textContent = flightTime.toFixed(1) + ' s';
    document.getElementById('statusVal').textContent = t('landed');
    document.getElementById('launchBtn').disabled = false;
    draw();
    return;
  }

  // Update HUD live
  document.getElementById('hv1').textContent = rocketPos.y.toFixed(1) + ' m';
  document.getElementById('hv2').textContent = rocketPos.x.toFixed(1) + ' m';
  document.getElementById('hv3').textContent = simTime.toFixed(1) + ' s';

  draw();
  requestAnimationFrame(simLoop);
}

// ================================================================
// CANVAS RENDERING
// ================================================================
var canvas, c2d;

function initCanvas() {
  canvas = document.getElementById('gc');
  if (!canvas) return;
  c2d = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', function(){ resizeCanvas(); draw(); });
}

function resizeCanvas() {
  if (!canvas) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  c2d.setTransform(1,0,0,1,0,0);
}

function draw() {
  if (!c2d) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w = canvas.width / dpr;
  var h = canvas.height / dpr;
  c2d.save();
  c2d.setTransform(1,0,0,1,0,0);
  c2d.scale(dpr, dpr);

  // Background
  drawGameBg(c2d, w, h);

  var mc = gameModeColors();
  var margin = 50;
  var plotL = margin;
  var plotR = w - margin;
  var plotB = h - margin;
  var plotT = margin;
  var plotW = plotR - plotL;
  var plotH = plotB - plotT;

  // Compute scale from physics to screen
  // Max physics range we show
  var physMaxX = 800; // meters
  var physMaxY = 400; // meters
  // Auto-scale if we have trajectories
  if (trajectoryPts.length > 1 || prevTrajectories.length > 0) {
    var allPts = trajectoryPts.slice();
    for (var ti = 0; ti < prevTrajectories.length; ti++) {
      allPts = allPts.concat(prevTrajectories[ti]);
    }
    var maxPX = 0, maxPY = 0;
    for (var pi = 0; pi < allPts.length; pi++) {
      if (allPts[pi].x > maxPX) maxPX = allPts[pi].x;
      if (allPts[pi].y > maxPY) maxPY = allPts[pi].y;
    }
    physMaxX = Math.max(maxPX * 1.2, 100);
    physMaxY = Math.max(maxPY * 1.2, 50);
  }
  // Keep aspect reasonable
  if (physMaxY / physMaxX > plotH / plotW) {
    physMaxX = physMaxY * plotW / plotH;
  } else {
    physMaxY = physMaxX * plotH / plotW;
  }

  function toScreenX(px) { return plotL + (px / physMaxX) * plotW; }
  function toScreenY(py) { return plotB - (py / physMaxY) * plotH; }

  // Ground line
  c2d.strokeStyle = mc.dim || '#a3a3a3';
  c2d.lineWidth = 1;
  c2d.setLineDash([4, 4]);
  c2d.beginPath();
  c2d.moveTo(plotL, plotB);
  c2d.lineTo(plotR, plotB);
  c2d.stroke();
  c2d.setLineDash([]);
  c2d.font = '500 10px "Noto Sans SC", sans-serif';
  c2d.fillStyle = mc.dim;
  c2d.fillText(t('lblGround'), plotL + 4, plotB + 14);

  // Axis labels
  c2d.font = '500 9px "JetBrains Mono", monospace';
  c2d.fillStyle = mc.dim;
  // X axis ticks
  var xStep = Math.pow(10, Math.floor(Math.log10(physMaxX / 4)));
  if (physMaxX / xStep > 8) xStep *= 2;
  for (var xv = xStep; xv < physMaxX; xv += xStep) {
    var sx = toScreenX(xv);
    c2d.fillText(xv.toFixed(0) + 'm', sx - 10, plotB + 14);
    c2d.strokeStyle = mc.strokeDim || 'rgba(255,255,255,0.08)';
    c2d.lineWidth = 0.5;
    c2d.beginPath();
    c2d.moveTo(sx, plotT);
    c2d.lineTo(sx, plotB);
    c2d.stroke();
  }
  // Y axis ticks
  var yStep = Math.pow(10, Math.floor(Math.log10(physMaxY / 4)));
  if (physMaxY / yStep > 8) yStep *= 2;
  for (var yv = yStep; yv < physMaxY; yv += yStep) {
    var sy = toScreenY(yv);
    c2d.fillText(yv.toFixed(0) + 'm', plotL - 35, sy + 4);
    c2d.strokeStyle = mc.strokeDim || 'rgba(255,255,255,0.08)';
    c2d.lineWidth = 0.5;
    c2d.beginPath();
    c2d.moveTo(plotL, sy);
    c2d.lineTo(plotR, sy);
    c2d.stroke();
  }

  // Draw ghost trails (previous trajectories)
  for (var gi = 0; gi < prevTrajectories.length; gi++) {
    var ghost = prevTrajectories[gi];
    if (ghost.length < 2) continue;
    c2d.strokeStyle = mc.dim;
    c2d.lineWidth = 1;
    c2d.globalAlpha = 0.2 + 0.1 * gi / prevTrajectories.length;
    c2d.setLineDash([3, 3]);
    c2d.beginPath();
    c2d.moveTo(toScreenX(ghost[0].x), toScreenY(ghost[0].y));
    for (var gj = 1; gj < ghost.length; gj++) {
      c2d.lineTo(toScreenX(ghost[gj].x), toScreenY(ghost[gj].y));
    }
    c2d.stroke();
    c2d.setLineDash([]);
    c2d.globalAlpha = 1;
  }

  // Draw current trajectory
  if (trajectoryPts.length > 1) {
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 2.5;
    c2d.shadowColor = ACCENT;
    c2d.shadowBlur = mc.glow ? 6 : 0;
    c2d.beginPath();
    c2d.moveTo(toScreenX(trajectoryPts[0].x), toScreenY(trajectoryPts[0].y));
    for (var ti2 = 1; ti2 < trajectoryPts.length; ti2++) {
      c2d.lineTo(toScreenX(trajectoryPts[ti2].x), toScreenY(trajectoryPts[ti2].y));
    }
    c2d.stroke();
    c2d.shadowBlur = 0;
  }

  // Draw apex marker
  if (apexPos) {
    var ax = toScreenX(apexPos.x);
    var ay = toScreenY(apexPos.y);
    c2d.fillStyle = '#ffcc33';
    c2d.beginPath();
    c2d.arc(ax, ay, 5, 0, Math.PI * 2);
    c2d.fill();
    c2d.strokeStyle = '#ffcc33';
    c2d.globalAlpha = 0.3;
    c2d.lineWidth = 1;
    c2d.beginPath();
    c2d.arc(ax, ay, 8, 0, Math.PI * 2);
    c2d.stroke();
    c2d.globalAlpha = 1;
    // Apex label
    c2d.font = '700 10px "JetBrains Mono", monospace';
    c2d.fillStyle = '#ffcc33';
    c2d.textAlign = 'center';
    c2d.fillText(t('lblApex') + ': ' + apexPos.y.toFixed(1) + 'm', ax, ay - 14);
    c2d.textAlign = 'start';
    // Height line
    c2d.strokeStyle = '#ffcc33';
    c2d.lineWidth = 0.8;
    c2d.setLineDash([3, 3]);
    c2d.beginPath();
    c2d.moveTo(ax, ay);
    c2d.lineTo(ax, plotB);
    c2d.stroke();
    c2d.setLineDash([]);
  }

  // Draw rocket
  if (simPhase === 'flying' || simPhase === 'landed') {
    var rx = toScreenX(rocketPos.x);
    var ry = toScreenY(rocketPos.y);
    // Rocket direction from velocity
    var rAngle = -Math.atan2(rocketVel.y, rocketVel.x) + Math.PI / 2;
    if (simPhase === 'landed') rAngle = 0;
    drawRocket(c2d, rx, ry, rAngle, mc);
  } else {
    // Ready state: show rocket at origin with angle guide
    var ox = toScreenX(0);
    var oy = toScreenY(0);
    var curAngle = parseInt(document.getElementById('angleSlider').value);
    var guideLen = 60;
    var rad = curAngle * Math.PI / 180;
    // Angle arc
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 1;
    c2d.globalAlpha = 0.5;
    c2d.beginPath();
    c2d.arc(ox, oy, 30, -Math.PI / 2, -rad, true);
    c2d.stroke();
    c2d.globalAlpha = 1;
    // Direction line
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 1.5;
    c2d.setLineDash([4, 3]);
    c2d.beginPath();
    c2d.moveTo(ox, oy);
    c2d.lineTo(ox + guideLen * Math.cos(rad), oy - guideLen * Math.sin(rad));
    c2d.stroke();
    c2d.setLineDash([]);
    // Angle text
    c2d.font = '700 11px "JetBrains Mono", monospace';
    c2d.fillStyle = ACCENT;
    c2d.fillText(curAngle + '\u00b0', ox + 36, oy - 10);
    // Rocket
    drawRocket(c2d, ox, oy, -(Math.PI / 2 - rad), mc);
  }

  // Launch angle & speed info panel (top right)
  if (simPhase === 'ready') {
    c2d.font = '500 11px "Noto Sans SC", sans-serif';
    c2d.fillStyle = mc.text;
    c2d.textAlign = 'right';
    var curA = document.getElementById('angleSlider').value;
    var curS = document.getElementById('speedSlider').value;
    c2d.fillText(t('lblAngle') + ': ' + curA + '\u00b0   ' + t('lblSpeed') + ': ' + curS + ' m/s', w - margin, margin - 10);
    c2d.textAlign = 'start';
  }

  c2d.restore();
}

function drawRocket(ctx, x, y, angle, mc) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  var s = 0.9;
  // Body
  ctx.fillStyle = '#c0c8d8';
  ctx.beginPath();
  ctx.moveTo(0, -18*s);
  ctx.lineTo(-5*s, 0);
  ctx.lineTo(-4*s, 14*s);
  ctx.lineTo(4*s, 14*s);
  ctx.lineTo(5*s, 0);
  ctx.closePath();
  ctx.fill();
  // Nose cone
  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.moveTo(0, -26*s);
  ctx.lineTo(-4*s, -16*s);
  ctx.lineTo(4*s, -16*s);
  ctx.closePath();
  ctx.fill();
  // Fins
  ctx.fillStyle = '#3d7ab0';
  ctx.beginPath();
  ctx.moveTo(-4*s, 10*s); ctx.lineTo(-10*s, 18*s); ctx.lineTo(-4*s, 14*s); ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(4*s, 10*s); ctx.lineTo(10*s, 18*s); ctx.lineTo(4*s, 14*s); ctx.closePath();
  ctx.fill();
  // Flame (only when flying upward)
  if (simPhase === 'flying' && simTime < 0.5) {
    var flameH = 10*s + Math.random()*5*s;
    var grd = ctx.createLinearGradient(0, 14*s, 0, 14*s+flameH);
    grd.addColorStop(0, 'rgba(255,200,50,0.9)');
    grd.addColorStop(1, 'rgba(255,60,10,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(-3*s, 14*s); ctx.lineTo(0, 14*s+flameH); ctx.lineTo(3*s, 14*s); ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ================================================================
// INIT
// ================================================================
function init() {
  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  refreshI18N();
  initCanvas();

  // Slider events
  var as = document.getElementById('angleSlider');
  var ss = document.getElementById('speedSlider');
  as.addEventListener('input', function() {
    document.getElementById('angleVal').textContent = as.value + '\u00b0';
    if (simPhase === 'ready') draw();
  });
  ss.addEventListener('input', function() {
    document.getElementById('speedVal').textContent = ss.value + ' m/s';
    if (simPhase === 'ready') draw();
  });

  document.getElementById('launchBtn').addEventListener('click', launchRocket);
  document.getElementById('resetBtn').addEventListener('click', function() {
    prevTrajectories = [];
    launchCount = 0;
    document.getElementById('hv4').textContent = '0';
    resetSim();
  });

  draw();
}

init();
</script>
