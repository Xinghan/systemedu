<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下一项目规划师 — Stretch 选型</title>
<style>
  :root{
    /* Surfaces — Claude warm cream */
    --paper:    #FAF9F5;
    --paper-2:  #F1EDDF;
    --card:     #FFFFFF;
    --ink:      #191814;
    --ink-2:    #2B2924;
    --sub:      #6B6557;
    --sub-2:    #9D978A;
    --border:   #EBE5D6;
    --border-2: #D9D1BD;
    --hairline: #F2EDE0;

    /* Primary — Claude coral */
    --primary:      #D97757;
    --primary-ink:  #9A4A2E;
    --primary-soft: #F8EDE5;
    --primary-line: #ECCFB8;

    /* Domain accent — climate */
    --accent:       #527B95;
    --accent-soft:  #DEE5EC;
    --accent-ink:   #2F5871;

    /* States */
    --safe:    #6F8B5C;
    --safe-soft:#E3ECDB;
    --warn:    #B0593F;
    --warn-soft:#F3DDD2;

    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgba(25,24,20,.04);
    --shadow:    0 1px 3px 0 rgba(25,24,20,.06), 0 1px 2px -1px rgba(25,24,20,.04);
    --shadow-md: 0 4px 8px -2px rgba(25,24,20,.06), 0 2px 4px -2px rgba(25,24,20,.04);
    --shadow-lg: 0 12px 24px -6px rgba(25,24,20,.1), 0 4px 8px -4px rgba(25,24,20,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;width:100vw;overflow:hidden;
    background:var(--paper);color:var(--ink);
    font-family:'Inter','PingFang SC','Noto Sans SC',sans-serif;
    display:flex;
  }
  .mono{font-family:'JetBrains Mono','Menlo',monospace;}

  /* Sidebar — 200px left */
  .game-sidebar{
    width:200px;flex-shrink:0;
    background:var(--paper-2);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    padding:18px 14px;gap:16px;
    overflow:hidden;
  }
  .brand{display:flex;flex-direction:column;gap:4px;}
  .brand-tag{
    font-size:10px;letter-spacing:.16em;color:var(--accent);font-weight:700;
    font-family:'JetBrains Mono',monospace;
  }
  .brand-name{font-size:14px;font-weight:700;color:var(--ink);line-height:1.35;}

  /* Persona switcher */
  .persona-block{display:flex;flex-direction:column;gap:6px;}
  .block-label{
    font-size:10px;color:var(--sub);letter-spacing:.12em;font-weight:600;
    font-family:'JetBrains Mono',monospace;text-transform:uppercase;
  }
  .persona-btn{
    border:1px solid var(--border-2);background:var(--card);
    border-radius:7px;padding:9px 10px;
    text-align:left;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;gap:2px;
    transition:border-color 200ms, background 200ms;
  }
  .persona-btn:hover{border-color:var(--accent);}
  .persona-btn.active{
    border-color:var(--accent);background:var(--accent-soft);
  }
  .persona-name{font-size:12px;font-weight:700;color:var(--ink-2);line-height:1.3;}
  .persona-btn.active .persona-name{color:var(--accent-ink);}
  .persona-meta{
    font-size:10px;color:var(--sub);
    font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
  }

  /* Progress */
  .progress-block{display:flex;flex-direction:column;gap:8px;}
  .progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--primary);width:0%;transition:width 300ms ease;}
  .progress-dots{display:flex;gap:5px;flex-wrap:wrap;}
  .pd{
    width:16px;height:16px;border-radius:50%;
    border:1.5px solid var(--border-2);background:var(--card);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;color:var(--sub-2);
    font-family:'JetBrains Mono',monospace;
    transition:all 200ms;
  }
  .pd.rated{
    border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink);
  }

  .guide{
    display:flex;flex-direction:column;gap:5px;
    font-size:10.5px;color:var(--sub);line-height:1.5;
    padding-left:0;list-style:none;margin:0;
  }
  .guide-li{padding-left:8px;border-left:2px solid var(--accent);}

  .lang-btn{
    margin-top:auto;
    border:1px solid var(--border-2);background:var(--card);
    color:var(--ink-2);font-size:11px;font-weight:600;
    padding:8px 12px;border-radius:6px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
    transition:background 200ms;
  }
  .lang-btn:hover{background:var(--paper);}

  /* Main */
  .game-main{
    flex:1;display:flex;flex-direction:column;
    padding:24px 32px 20px;overflow:hidden;min-width:0;
  }
  .scene-header{
    display:flex;align-items:flex-end;justify-content:space-between;
    padding-bottom:10px;border-bottom:1px solid var(--hairline);margin-bottom:16px;
    flex-shrink:0;
  }
  .scene-title-block{display:flex;flex-direction:column;gap:4px;max-width:70%;}
  .scene-num{
    font-size:10.5px;letter-spacing:.18em;color:var(--accent);font-weight:700;
    text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  }
  .scene-title{font-size:20px;font-weight:700;color:var(--ink);line-height:1.3;}
  .scene-sub{font-size:12px;color:var(--sub);margin-top:2px;}
  .scene-counter{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--sub);padding:5px 10px;background:var(--card);
    border:1px solid var(--border);border-radius:6px;
  }

  /* Content split: stretches list + recommendation panel */
  .scene-stage{
    flex:1;display:grid;grid-template-columns:1fr 280px;gap:18px;
    overflow:hidden;min-height:0;
  }

  .stretches-col{
    overflow-y:auto;display:flex;flex-direction:column;gap:12px;
    padding-right:4px;
  }
  .stretches-col::-webkit-scrollbar{width:8px;}
  .stretches-col::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px;}
  .stretches-col::-webkit-scrollbar-track{background:transparent;}

  .stretch-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;box-shadow:var(--shadow-sm);
    padding:14px 18px;display:flex;gap:14px;align-items:flex-start;
    transition:border-color 200ms, box-shadow 200ms;
  }
  .stretch-card.hover{border-color:var(--accent);box-shadow:var(--shadow);}
  .stretch-card.recommended{
    border-color:var(--primary);background:linear-gradient(180deg, var(--primary-soft) 0%, var(--card) 35%);
    box-shadow:var(--shadow);
  }

  .stretch-illu{
    flex-shrink:0;width:60px;height:60px;border-radius:8px;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .stretch-card.recommended .stretch-illu{
    background:var(--primary-soft);
  }
  .stretch-body{flex:1;min-width:0;}
  .stretch-head{
    display:flex;justify-content:space-between;align-items:baseline;gap:10px;
    margin-bottom:4px;
  }
  .stretch-tag{
    font-size:9.5px;letter-spacing:.14em;font-weight:700;
    color:var(--accent);background:var(--accent-soft);
    padding:2px 7px;border-radius:4px;
    text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  }
  .stretch-card.recommended .stretch-tag{
    color:var(--primary-ink);background:var(--primary-soft);
  }
  .stretch-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:3px;}
  .stretch-desc{font-size:12.5px;line-height:1.55;color:var(--ink-2);}
  .stretch-cost{
    display:flex;gap:10px;margin-top:6px;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--sub);
  }
  .cost-item{display:flex;gap:3px;}
  .cost-key{color:var(--sub-2);}
  .cost-val{color:var(--ink-2);font-weight:600;}

  /* Rating row */
  .rating-row{
    margin-top:10px;display:flex;align-items:center;gap:10px;
  }
  .rating-label{
    font-size:10.5px;color:var(--sub);letter-spacing:.06em;
    font-family:'JetBrains Mono',monospace;font-weight:600;
    width:88px;flex-shrink:0;
  }
  .rating-btns{display:flex;gap:5px;}
  .rate-btn{
    width:26px;height:26px;border-radius:5px;
    border:1.2px solid var(--border-2);background:var(--card);
    font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;
    color:var(--sub);cursor:pointer;
    transition:all 150ms;
  }
  .rate-btn:hover{border-color:var(--accent);color:var(--accent-ink);}
  .rate-btn.picked{
    border-color:var(--accent);background:var(--accent);color:#fff;
  }
  .rate-btn.dim{opacity:.5;}

  .fit-bar-wrap{
    margin-top:8px;display:flex;align-items:center;gap:8px;
    height:20px;
  }
  .fit-bar-label{
    font-size:10px;color:var(--sub);
    font-family:'JetBrains Mono',monospace;letter-spacing:.06em;
    width:48px;
  }
  .fit-bar-track{
    flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;
  }
  .fit-bar-fill{
    height:100%;background:var(--accent);width:0%;
    transition:width 350ms ease, background 200ms;
  }
  .stretch-card.recommended .fit-bar-fill{background:var(--primary);}
  .fit-bar-val{
    width:38px;text-align:right;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    color:var(--ink-2);
  }

  /* Recommendation panel */
  .reco-col{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;box-shadow:var(--shadow-sm);
    padding:18px 18px;display:flex;flex-direction:column;gap:14px;
    overflow-y:auto;
  }
  .reco-head{
    display:flex;flex-direction:column;gap:4px;
    padding-bottom:10px;border-bottom:1px solid var(--hairline);
  }
  .reco-tag{
    font-size:10px;letter-spacing:.16em;font-weight:700;
    color:var(--accent);text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;
  }
  .reco-title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;}

  .reco-progress{
    background:var(--paper-2);border-radius:7px;padding:10px 12px;
    display:flex;flex-direction:column;gap:6px;
  }
  .reco-prog-label{
    font-size:11px;color:var(--sub);letter-spacing:.04em;
    display:flex;justify-content:space-between;
  }
  .reco-prog-val{
    font-family:'JetBrains Mono',monospace;color:var(--ink-2);font-weight:700;
  }

  .reco-empty{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;
    text-align:center;color:var(--sub);
    padding:12px;
  }
  .reco-empty-icon{
    width:54px;height:54px;border-radius:50%;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .reco-empty-txt{
    font-size:11.5px;line-height:1.55;max-width:200px;
  }

  /* Result blocks (after pick) */
  .reco-result{display:none;flex-direction:column;gap:12px;}
  .reco-result.show{display:flex;}
  .reco-ranking{display:flex;flex-direction:column;gap:6px;}
  .rank-row{
    display:flex;align-items:center;gap:8px;
    padding:7px 9px;border-radius:6px;background:var(--paper-2);
    font-size:11.5px;
  }
  .rank-row.top{
    background:var(--primary-soft);border:1px solid var(--primary-line);
  }
  .rank-pos{
    width:20px;height:20px;border-radius:50%;
    background:var(--card);border:1px solid var(--border-2);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
    color:var(--sub);flex-shrink:0;
  }
  .rank-row.top .rank-pos{
    background:var(--primary);border-color:var(--primary);color:#fff;
  }
  .rank-name{flex:1;font-weight:600;color:var(--ink-2);min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank-score{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;color:var(--ink);font-size:11px;
  }

  .reco-rationale{
    background:var(--paper-2);border-radius:7px;padding:10px 12px;
    border-left:3px solid var(--accent);
    font-size:11.5px;line-height:1.6;color:var(--ink-2);
  }
  .reco-rationale strong{color:var(--accent-ink);font-weight:700;}

  /* Pick button + badge */
  .pick-btn{
    background:var(--primary);color:#fff;border:none;border-radius:7px;
    padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:inherit;letter-spacing:.03em;
    transition:background 200ms;
  }
  .pick-btn:hover{background:var(--primary-ink);}
  .pick-btn:disabled{
    background:var(--border-2);cursor:not-allowed;
  }

  .badge-block{
    display:none;flex-direction:column;align-items:center;gap:10px;
    padding:14px 8px;background:var(--primary-soft);border-radius:8px;
    border:1px solid var(--primary-line);
  }
  .badge-block.show{display:flex;}
  .badge{
    width:74px;height:74px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--primary);
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-md);
    animation:badgePulse 2.4s ease-in-out infinite;
  }
  @keyframes badgePulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
  }
  .badge-title{font-size:12.5px;font-weight:700;color:var(--primary-ink);
    text-align:center;line-height:1.35;}
  .badge-sub{
    font-size:10.5px;color:var(--sub);
    font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
  }

  .reset-btn{
    background:var(--card);color:var(--ink-2);
    border:1px solid var(--border-2);border-radius:6px;
    padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;
    font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
    transition:border-color 200ms;
  }
  .reset-btn:hover{border-color:var(--accent);}

  /* SVG illustration helpers */
  .ill-svg{width:38px;height:38px;}
  .badge-svg{width:42px;height:42px;}
  .empty-svg{width:28px;height:28px;}
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="brand">
      <div class="brand-tag" id="brandTag">CLIMATE · M48</div>
      <div class="brand-name" id="brandName">下一项目<br/>规划师</div>
    </div>

    <div class="persona-block">
      <div class="block-label" id="personaLabel">你的资源</div>
      <button class="persona-btn" data-persona="summer" type="button">
        <span class="persona-name" id="pSummerN">学生暑假</span>
        <span class="persona-meta" id="pSummerM">time:60d  money:M</span>
      </button>
      <button class="persona-btn" data-persona="weekend" type="button">
        <span class="persona-name" id="pWeekendN">学生周末</span>
        <span class="persona-meta" id="pWeekendM">time:8d  money:S</span>
      </button>
      <button class="persona-btn" data-persona="app" type="button">
        <span class="persona-name" id="pAppN">升学申请</span>
        <span class="persona-meta" id="pAppM">time:90d  money:L</span>
      </button>
    </div>

    <div class="progress-block">
      <div class="block-label" id="progLabel">评分进度</div>
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-dots" id="progDots"></div>
    </div>

    <ul class="guide">
      <li class="guide-li" id="g1">选你的 persona</li>
      <li class="guide-li" id="g2">每方向打 1-5 分</li>
      <li class="guide-li" id="g3">系统排序推荐</li>
    </ul>

    <button class="lang-btn" id="langBtn">中 / EN</button>
  </aside>

  <main class="game-main">
    <div class="scene-header">
      <div class="scene-title-block">
        <div class="scene-num" id="sceneNum">SCENE 01 · NEXT-PROJECT PLAN</div>
        <div class="scene-title" id="sceneTitle">PurpleAir 之后，下一步去哪？</div>
        <div class="scene-sub" id="sceneSub">为每个 stretch 方向按你当前资源打 1-5 分。</div>
      </div>
      <div class="scene-counter" id="sceneCounter"><span id="counterRated">0</span> / 5</div>
    </div>

    <div class="scene-stage">
      <div class="stretches-col" id="stretchesCol"></div>

      <aside class="reco-col">
        <div class="reco-head">
          <div class="reco-tag" id="recoTag">RECOMMENDATION</div>
          <div class="reco-title" id="recoTitle">智能匹配你的下一步</div>
        </div>

        <div class="reco-progress">
          <div class="reco-prog-label">
            <span id="recoPersonaLabel">当前 persona</span>
            <span class="reco-prog-val" id="recoPersonaVal">学生暑假</span>
          </div>
          <div class="reco-prog-label">
            <span id="recoRatedLabel">已评</span>
            <span class="reco-prog-val" id="recoRatedVal">0 / 5</span>
          </div>
        </div>

        <div class="reco-empty" id="recoEmpty">
          <div class="reco-empty-icon">
            <svg class="empty-svg" viewBox="0 0 24 24" fill="none" stroke="#527B95" stroke-width="1.8">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 7v5l3 3"/>
            </svg>
          </div>
          <div class="reco-empty-txt" id="recoEmptyTxt">
            为 5 个方向都打分后，系统会按你的 persona 加权排序，推荐下一项目。
          </div>
        </div>

        <div class="reco-result" id="recoResult">
          <div class="reco-ranking" id="recoRanking"></div>
          <div class="reco-rationale" id="recoRationale"></div>
          <button class="pick-btn" id="pickBtn" type="button">
            <span id="pickBtnTxt">确认这个方向</span>
          </button>
          <div class="badge-block" id="badgeBlock">
            <div class="badge">
              <svg class="badge-svg" viewBox="0 0 32 32" fill="none" stroke="#9A4A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 24L12 14L18 19L26 8"/>
                <circle cx="6" cy="24" r="1.6" fill="#9A4A2E"/>
                <circle cx="12" cy="14" r="1.6" fill="#9A4A2E"/>
                <circle cx="18" cy="19" r="1.6" fill="#9A4A2E"/>
                <circle cx="26" cy="8" r="1.6" fill="#9A4A2E"/>
              </svg>
            </div>
            <div class="badge-title" id="badgeTitle">项目规划师 徽章</div>
            <div class="badge-sub" id="badgeSub">PROJECT · PLANNER</div>
            <button class="reset-btn" id="resetBtn" type="button">重新评估</button>
          </div>
        </div>
      </aside>
    </div>
  </main>

<script>
(function(){
  'use strict';

  // ===== 数据: 5 个 stretch 方向 =====
  const STRETCHES = [
    {
      id: 'sensors',
      cn: { tag: 'MULTI-SENSOR', title: '多传感器扩展',
        desc: '在同一节点加 SCD30 (CO2) / SHT45 (湿度) / NO2 传感器，从 PM 单一指标拓展到综合空气质量。',
        cost: { time: '中', money: 'M', tech: '低' } },
      en: { tag: 'MULTI-SENSOR', title: 'Multi-sensor Expansion',
        desc: 'Add SCD30 (CO2) / SHT45 / NO2 to the same node — go from PM-only to full air quality index.',
        cost: { time: 'med', money: 'M', tech: 'low' } },
      // weights: 不同 persona 下这个 stretch 的"自然契合度" (1-5, 越高 = 越适合)
      personaFit: { summer: 4, weekend: 5, app: 3 },
      // rationale per persona
      reasonCN: {
        summer: '中等改造量，1-2 周搞定，留时间做数据分析。',
        weekend: '硬件加传感器最快出新结果，最适合零碎时间。',
        app: '升学要的是深度，单纯加传感器深度有限，不够亮眼。'
      },
      reasonEN: {
        summer: 'Modest upgrade, 1-2 weeks to ship, leaves time for analysis.',
        weekend: 'Adding sensors is the quickest new result for spare-time work.',
        app: 'For admissions, raw sensor count lacks depth — not the strongest story.'
      },
      svg: 'sensors'
    },
    {
      id: 'mesh',
      cn: { tag: 'MULTI-NODE', title: '多节点联网',
        desc: '在街区/学校部署 3-5 个节点，用 MQTT/HTTP 汇聚，做空间分布热力图与节点交叉验证。',
        cost: { time: '中', money: 'L', tech: '中' } },
      en: { tag: 'MULTI-NODE', title: 'Multi-node Mesh',
        desc: 'Deploy 3-5 nodes around a block/school, aggregate via MQTT/HTTP, build heatmap + cross-validation.',
        cost: { time: 'med', money: 'L', tech: 'med' } },
      personaFit: { summer: 5, weekend: 2, app: 4 },
      reasonCN: {
        summer: '暑假时间正好，3-5 个节点装完能做完整空间分析。',
        weekend: '多节点需要持续维护，周末断续做容易掉链子。',

    {

      },
      reasonEN: {

    {

      cn: { tag: 'MOBILE', title: '移动监测',
        desc: '把节点装在自行车/书包上，配 GPS 走街扫描，做"线状"污染地图（地铁口/早晚高峰路线）。',

      en: { tag: 'MOBILE', title: 'Mobile Monitoring',
        desc: 'Mount node on a bike/backpack + GPS, scan along routes — line-shaped pollution maps (subway entry, rush hour).',

      personaFit: { summer: 3, weekend: 5, app: 4 },
      reasonCN: {

      },
      reasonEN: {
        summer: 'Light retrofit, one weekend trip is enough — no conflict with bigger plans.',
        weekend: 'Perfect fit — weekend bike rides double as data collection.',
        app: 'Visual route maps look sharp; story is thin, lean on the narrative.'
      },
      svg: 'mobile'
    },
    {
      id: 'longterm',
      cn: { tag: 'LONG-TERM', title: '长期监测',
        desc: '同节点跑 90+ 天，做季节性 / 早晚高峰 / 极端天气事件的时间序列分析，建立本地基线。',
        cost: { time: '极高', money: 'S', tech: '低' } },
      en: { tag: 'LONG-TERM', title: 'Long-term Study',
        desc: 'Run the same node 90+ days, do seasonal / rush-hour / extreme-weather time series, build local baseline.',
        cost: { time: 'very high', money: 'S', tech: 'low' } },
      personaFit: { summer: 2, weekend: 4, app: 5 },
      reasonCN: {
        summer: '暑假只有 60 天，做不出长期效应。',
        weekend: '周末维护成本最低，90 天慢工出细活很合适。',
        app: '时间序列 + 基线 = 严谨科研味儿，申请最看重这种持续投入。'
      },
      reasonEN: {
        summer: 'Summer is only 60 days — too short for long-term effects.',
        weekend: 'Lowest upkeep, perfect for 90-day slow-burn weekend work.',
        app: 'Time series + baseline = serious research signal — admissions love sustained effort.'
      },
      svg: 'longterm'
    }
  ];

  // ===== Persona 配置 =====
  const PERSONAS = {
    summer:  { cn: '学生暑假', en: 'Summer Break',  meta: 'time:60d  money:M' },
    weekend: { cn: '学生周末', en: 'Weekends Only', meta: 'time:8d  money:S' },
    app:     { cn: '升学申请', en: 'College App',   meta: 'time:90d  money:L' }
  };

  // ===== i18n =====
  const I18N = {
    cn: {
      brandTag:'CLIMATE · M48', brandName:'下一项目<br/>规划师',
      personaLabel:'你的资源', progLabel:'评分进度',
      g1:'选你的 persona', g2:'每方向打 1-5 分', g3:'系统排序推荐',
      pSummerN:'学生暑假',  pSummerM:'time:60d  money:M',
      pWeekendN:'学生周末', pWeekendM:'time:8d  money:S',
      pAppN:'升学申请',    pAppM:'time:90d  money:L',
      sceneNum:'SCENE 01 · NEXT-PROJECT PLAN',
      sceneTitle:'PurpleAir 之后，下一步去哪？',
      sceneSub:'为每个 stretch 方向按你当前资源打 1-5 分。',
      recoTag:'RECOMMENDATION', recoTitle:'智能匹配你的下一步',
      recoPersonaLabel:'当前 persona', recoRatedLabel:'已评',
      recoEmptyTxt:'先选 persona，再给 5 个方向打分，系统会加权排序推荐下一项目。',
      pickBtnTxt:'确认这个方向',
      badgeTitle:'项目规划师 徽章', badgeSub:'PROJECT · PLANNER',
      resetBtn:'重新评估',
      rateLabel:'我的评分',
      fitLabel:'契合',
      costTime:'time', costMoney:'cost', costTech:'tech',
      rationalePrefix:'<strong>推荐理由</strong>：'
    },
    en: {
      brandTag:'CLIMATE · M48', brandName:'Next-Project<br/>Planner',
      personaLabel:'YOUR RESOURCES', progLabel:'RATING PROGRESS',
      g1:'Pick your persona', g2:'Rate each 1-5', g3:'See ranked recommendation',
      pSummerN:'Summer Break',  pSummerM:'time:60d  money:M',
      pWeekendN:'Weekends Only', pWeekendM:'time:8d  money:S',
      pAppN:'College App',     pAppM:'time:90d  money:L',
      sceneNum:'SCENE 01 · NEXT-PROJECT PLAN',
      sceneTitle:'After PurpleAir, where next?',
      sceneSub:'Rate each stretch 1-5 based on your current resources.',
      recoTag:'RECOMMENDATION', recoTitle:'Smart match for your next step',
      recoPersonaLabel:'Current persona', recoRatedLabel:'Rated',
      recoEmptyTxt:'Pick a persona, then rate all 5 stretches — the system ranks by best fit.',
      pickBtnTxt:'Commit to this direction',
      badgeTitle:'Project Planner Badge', badgeSub:'PROJECT · PLANNER',
      resetBtn:'Reset ratings',
      rateLabel:'MY RATING',
      fitLabel:'fit',
      costTime:'time', costMoney:'cost', costTech:'tech',
      rationalePrefix:'<strong>Why</strong>: '
    }
  };

  // ===== SVG icons (no emoji) =====
  function illuSVG(kind){
    // returns SVG markup for stretch illustration
    const stroke = '#527B95';
    const acc = '#2F5871';
    if(kind === 'sensors'){
      return '<svg class="ill-svg" viewBox="0 0 40 40" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round">'
        +'<rect x="6" y="10" width="28" height="20" rx="3"/>'
        +'<circle cx="13" cy="20" r="2.5" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="20" cy="20" r="2.5" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="27" cy="20" r="2.5" fill="'+acc+'" stroke="none"/>'
        +'<path d="M20 10v-4M14 6h12"/></svg>';
    }
    if(kind === 'mesh'){
      return '<svg class="ill-svg" viewBox="0 0 40 40" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round">'
        +'<circle cx="10" cy="12" r="3" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="30" cy="12" r="3" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="20" cy="28" r="3" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="10" cy="32" r="2" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="32" cy="30" r="2" fill="'+acc+'" stroke="none"/>'
        +'<path d="M10 12L30 12M10 12L20 28M30 12L20 28M20 28L10 32M20 28L32 30" stroke-dasharray="2 2"/></svg>';
    }
    if(kind === 'ai'){
      return '<svg class="ill-svg" viewBox="0 0 40 40" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round">'
        +'<rect x="10" y="8" width="20" height="20" rx="4"/>'
        +'<circle cx="16" cy="17" r="1.6" fill="'+acc+'" stroke="none"/>'
        +'<circle cx="24" cy="17" r="1.6" fill="'+acc+'" stroke="none"/>'
        +'<path d="M16 22q4 3 8 0"/>'
        +'<path d="M20 28v4M14 32h12"/></svg>';
    }
    if(kind === 'mobile'){
      return '<svg class="ill-svg" viewBox="0 0 40 40" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round">'
        +'<circle cx="10" cy="28" r="5"/>'
        +'<circle cx="30" cy="28" r="5"/>'
        +'<path d="M10 28L20 14L30 28M20 14h6M14 28l6-14"/>'
        +'<circle cx="26" cy="14" r="2" fill="'+acc+'" stroke="none"/></svg>';
    }
    // longterm
    return '<svg class="ill-svg" viewBox="0 0 40 40" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round">'
      +'<path d="M6 30 L12 22 L18 26 L24 14 L30 20 L34 12"/>'
      +'<circle cx="6" cy="30" r="1.6" fill="'+acc+'" stroke="none"/>'
      +'<circle cx="18" cy="26" r="1.6" fill="'+acc+'" stroke="none"/>'
      +'<circle cx="34" cy="12" r="1.6" fill="'+acc+'" stroke="none"/>'
      +'<path d="M6 34h28" stroke-dasharray="2 2"/></svg>';
  }

  // ===== State =====
  const stateGame = {
    lang: 'cn',
    persona: null,  // 初始未选, 引导用户先点
    ratings: {},   // id -> 1..5
    picked: null,  // id once user pressed pick
  };

  // ===== DOM build =====
  const stretchesCol = document.getElementById('stretchesCol');

  function buildCards(){
    stretchesCol.innerHTML = '';
    STRETCHES.forEach(function(s){
      const card = document.createElement('article');
      card.className = 'stretch-card';
      card.id = 'card-' + s.id;
      const lang = stateGame.lang;
      const d = s[lang];
      card.innerHTML =
        '<div class="stretch-illu">' + illuSVG(s.svg) + '</div>'
       +'<div class="stretch-body">'
       + '<div class="stretch-head">'
       +   '<div>'
       +     '<div class="stretch-tag">' + d.tag + '</div>'
       +     '<div class="stretch-title" data-key="title">' + d.title + '</div>'
       +   '</div>'
       + '</div>'
       + '<div class="stretch-desc" data-key="desc">' + d.desc + '</div>'
       + '<div class="stretch-cost">'
       +   '<span class="cost-item"><span class="cost-key">time:</span><span class="cost-val">'+d.cost.time+'</span></span>'
       +   '<span class="cost-item"><span class="cost-key">cost:</span><span class="cost-val">'+d.cost.money+'</span></span>'
       +   '<span class="cost-item"><span class="cost-key">tech:</span><span class="cost-val">'+d.cost.tech+'</span></span>'
       + '</div>'
       + '<div class="rating-row">'
       +   '<span class="rating-label" data-key="rateLabel">' + I18N[lang].rateLabel + '</span>'
       +   '<div class="rating-btns" data-id="'+s.id+'">'
       +     [1,2,3,4,5].map(function(n){
              return '<button class="rate-btn" type="button" data-val="'+n+'">'+n+'</button>';
            }).join('')
       +   '</div>'
       + '</div>'
       + '<div class="fit-bar-wrap">'
       +   '<span class="fit-bar-label">' + I18N[lang].fitLabel + '</span>'
       +   '<div class="fit-bar-track"><div class="fit-bar-fill" id="fit-'+s.id+'"></div></div>'
       +   '<span class="fit-bar-val" id="fitv-'+s.id+'">—</span>'
       + '</div>'
       +'</div>';
      stretchesCol.appendChild(card);
    });

    // attach rating handlers
    stretchesCol.querySelectorAll('.rating-btns').forEach(function(group){
      const sid = group.getAttribute('data-id');
      group.querySelectorAll('.rate-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          const v = parseInt(btn.getAttribute('data-val'), 10);
          stateGame.ratings[sid] = v;
          stateGame.picked = null;
          renderRatings();
          renderRecommendation();
        });
      });
    });
  }

  function renderRatings(){
    // highlight picked rate buttons
    STRETCHES.forEach(function(s){
      const group = stretchesCol.querySelector('.rating-btns[data-id="'+s.id+'"]');
      if(!group) return;
      const rating = stateGame.ratings[s.id];
      group.querySelectorAll('.rate-btn').forEach(function(btn){
        const v = parseInt(btn.getAttribute('data-val'), 10);
        btn.classList.remove('picked','dim');
        if(rating){
          if(v === rating) btn.classList.add('picked');
          else btn.classList.add('dim');
        }
      });
      // fit bar update
      updateFitBar(s);
    });
    // progress
    const rated = Object.keys(stateGame.ratings).length;
    document.getElementById('progFill').style.width = (rated/5*100) + '%';
    document.getElementById('counterRated').textContent = rated;
    document.getElementById('recoRatedVal').textContent = rated + ' / 5';
    // dots
    const dotsEl = document.getElementById('progDots');
    dotsEl.innerHTML = '';
    STRETCHES.forEach(function(s, i){
      const d = document.createElement('div');
      d.className = 'pd' + (stateGame.ratings[s.id] ? ' rated' : '');
      d.textContent = (i+1);
      dotsEl.appendChild(d);
    });
  }

  // score = my rating (0..5) * persona-natural-fit (1..5) / 5
  // 综合得分 = 我的偏好 × persona契合度的几何平均, 再 normalize 到 0..100
  function computeScore(s){
    const r = stateGame.ratings[s.id] || 0;
    if(!r || !stateGame.persona) return 0;
    const fit = s.personaFit[stateGame.persona];
    // 综合 = 我评分 × persona 契合 / 25 (max=5*5=25) * 100
    return Math.round((r * fit / 25) * 100);
  }

  function updateFitBar(s){
    const score = computeScore(s);
    const fill = document.getElementById('fit-' + s.id);
    const val = document.getElementById('fitv-' + s.id);
    if(fill) fill.style.width = score + '%';
    if(val) val.textContent = score ? (score + '%') : '—';
  }

  function renderRecommendation(){
    const rated = Object.keys(stateGame.ratings).length;
    const empty = document.getElementById('recoEmpty');
    const result = document.getElementById('recoResult');
    const lang = stateGame.lang;
    const t = I18N[lang];

    const pName = stateGame.persona
      ? (lang === 'cn' ? PERSONAS[stateGame.persona].cn : PERSONAS[stateGame.persona].en)
      : (lang === 'cn' ? '未选' : 'not set');
    document.getElementById('recoPersonaVal').textContent = pName;

    // clear recommended highlight first
    document.querySelectorAll('.stretch-card').forEach(function(c){ c.classList.remove('recommended'); });
    document.getElementById('badgeBlock').classList.remove('show');

    if(rated < 5 || !stateGame.persona){
      empty.style.display = 'flex';
      result.classList.remove('show');
      return;
    }
    empty.style.display = 'none';
    result.classList.add('show');

    // ranked list
    const ranked = STRETCHES.slice().map(function(s){
      return { s: s, score: computeScore(s) };
    }).sort(function(a,b){ return b.score - a.score; });

    const rankEl = document.getElementById('recoRanking');
    rankEl.innerHTML = '';
    ranked.forEach(function(r, i){
      const row = document.createElement('div');
      row.className = 'rank-row' + (i === 0 ? ' top' : '');
      row.innerHTML =
        '<span class="rank-pos">'+(i+1)+'</span>'
       +'<span class="rank-name">'+ r.s[lang].title +'</span>'
       +'<span class="rank-score">'+ r.score +'</span>';
      rankEl.appendChild(row);
    });

    // highlight top card
    const topCard = document.getElementById('card-' + ranked[0].s.id);
    if(topCard) topCard.classList.add('recommended');

    // rationale (top-only)
    const top = ranked[0].s;
    const reason = lang === 'cn' ? top.reasonCN[stateGame.persona] : top.reasonEN[stateGame.persona];
    document.getElementById('recoRationale').innerHTML = t.rationalePrefix + reason;

    // pick button enabled
    document.getElementById('pickBtn').disabled = false;
  }

  function onPick(){
    // award badge
    document.getElementById('badgeBlock').classList.add('show');
    stateGame.picked = 'committed';
  }

  function onReset(){
    stateGame.ratings = {};
    stateGame.picked = null;
    renderRatings();
    renderRecommendation();
  }

  // ===== Persona switch =====
  function setPersona(p){
    stateGame.persona = p;
    document.querySelectorAll('.persona-btn').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-persona') === p);
    });
    // re-render so fit bars + ranking update
    renderRatings();
    renderRecommendation();
  }
  document.querySelectorAll('.persona-btn').forEach(function(b){
    b.addEventListener('click', function(){
      setPersona(b.getAttribute('data-persona'));
    });
  });

  // ===== i18n switch =====
  function applyI18n(){
    const lang = stateGame.lang;
    const t = I18N[lang];
    document.getElementById('brandTag').textContent = t.brandTag;
    document.getElementById('brandName').innerHTML = t.brandName;
    document.getElementById('personaLabel').textContent = t.personaLabel;
    document.getElementById('progLabel').textContent = t.progLabel;
    document.getElementById('g1').textContent = t.g1;
    document.getElementById('g2').textContent = t.g2;
    document.getElementById('g3').textContent = t.g3;
    document.getElementById('pSummerN').textContent = t.pSummerN;
    document.getElementById('pSummerM').textContent = t.pSummerM;
    document.getElementById('pWeekendN').textContent = t.pWeekendN;
    document.getElementById('pWeekendM').textContent = t.pWeekendM;
    document.getElementById('pAppN').textContent = t.pAppN;
    document.getElementById('pAppM').textContent = t.pAppM;
    document.getElementById('sceneNum').textContent = t.sceneNum;
    document.getElementById('sceneTitle').textContent = t.sceneTitle;
    document.getElementById('sceneSub').textContent = t.sceneSub;
    document.getElementById('recoTag').textContent = t.recoTag;
    document.getElementById('recoTitle').textContent = t.recoTitle;
    document.getElementById('recoPersonaLabel').textContent = t.recoPersonaLabel;
    document.getElementById('recoRatedLabel').textContent = t.recoRatedLabel;
    document.getElementById('recoEmptyTxt').textContent = t.recoEmptyTxt;
    document.getElementById('pickBtnTxt').textContent = t.pickBtnTxt;
    document.getElementById('badgeTitle').textContent = t.badgeTitle;
    document.getElementById('resetBtn').textContent = t.resetBtn;
    buildCards();
    renderRatings();
    renderRecommendation();
  }

  document.getElementById('langBtn').addEventListener('click', function(){
    stateGame.lang = (stateGame.lang === 'cn') ? 'en' : 'cn';
    applyI18n();
  });

  document.getElementById('pickBtn').addEventListener('click', onPick);
  document.getElementById('resetBtn').addEventListener('click', onReset);

  // ===== Init =====
  buildCards();
  renderRatings();
  renderRecommendation();
  document.getElementById('pickBtn').disabled = true;
})();
</script>
