<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e14;color:#f6f6fc;font-family:'Noto Sans SC','Inter',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.sidebar-btns{display:flex;gap:6px;align-self:flex-start;}
.sidebar-lang,.sidebar-sound{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,181,156,0.3);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-lang:hover,.sidebar-sound:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);}
.game-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#50ffb0;}
.game-header .info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#aaabb0;}
.game-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.game-body canvas{display:block;}
.control-panel{padding:8px 16px;display:flex;gap:12px;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);flex-wrap:wrap;}
.hud-bar{display:flex;justify-content:space-around;padding:6px 16px;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#aaabb0;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#50ffb0;transition:transform 0.15s;}
.btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;border:none;cursor:pointer;color:#0c0e14;background:linear-gradient(135deg,#50ffb0,#17df93);letter-spacing:0.08em;transition:transform 0.1s;}
.btn:hover{transform:scale(1.04);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(23,26,31,0.92);color:#aaabb0;backdrop-filter:blur(12px);border:none;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;cursor:pointer;letter-spacing:0.08em;transition:transform 0.1s;}
.btn-secondary:hover{color:#50ffb0;}
.force-btns{display:flex;gap:4px;flex-wrap:wrap;}
.force-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;border:1px solid rgba(80,255,176,0.3);background:transparent;color:#aaabb0;cursor:pointer;transition:all 0.15s;}
.force-btn:hover{border-color:#50ffb0;color:#50ffb0;}
.force-btn.active{background:rgba(80,255,176,0.15);border-color:#50ffb0;color:#50ffb0;}
.force-btn.correct-pick{background:rgba(80,255,176,0.25);border-color:#50ffb0;color:#50ffb0;}
.force-btn.wrong-pick{background:rgba(255,80,80,0.2);border-color:#ff5050;color:#ff5050;}
.force-btn.missed{background:rgba(255,200,80,0.15);border-color:#ffc850;color:#ffc850;}
.result-panel{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(12,14,20,0.95);border:1px solid rgba(80,255,176,0.3);padding:20px 28px;text-align:center;z-index:20;min-width:280px;}
.result-panel h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#50ffb0;margin-bottom:8px;}
.result-panel p{font-size:13px;color:#aaabb0;margin:4px 0;}
.result-panel .verdict{font-size:15px;color:#ffb59c;font-weight:700;margin-top:10px;}
.result-panel .insight{font-size:12px;color:#666;margin-top:8px;font-style:italic;}
.option-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border:1px solid rgba(80,255,176,0.3);background:transparent;color:#aaabb0;cursor:pointer;transition:all 0.15s;margin:4px;}
.option-btn:hover{border-color:#50ffb0;color:#50ffb0;background:rgba(80,255,176,0.1);}
.option-btn.selected{background:rgba(80,255,176,0.2);border-color:#50ffb0;color:#50ffb0;}
.option-btn.correct-ans{background:rgba(80,255,176,0.3);border-color:#50ffb0;color:#50ffb0;}
.option-btn.wrong-ans{background:rgba(255,80,80,0.2);border-color:#ff5050;color:#ff5050;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="sidebar-btns">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <button class="sidebar-sound" id="soundBtn">MUTE</button>
    </div>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-guide" id="guideContent"></div>
  </div>
  <div class="game-main">
    <div class="game-header">
      <h1 id="gameTitle"></h1>
      <div class="info" id="roundInfo"></div>
    </div>
    <div class="game-body" id="gameBody">
      <canvas id="cv"></canvas>
      <div class="result-panel" id="resultPanel">
        <h2 id="rpTitle"></h2>
        <p id="rpLine1"></p>
        <p id="rpLine2"></p>
        <p id="rpLine3"></p>
        <div class="verdict" id="rpVerdict"></div>
        <div class="insight" id="rpInsight"></div>
      </div>
    </div>
    <div class="control-panel" id="controlPanel">
      <div class="force-btns" id="forceBtns"></div>
      <button class="btn" id="btnAction"></button>
      <button class="btn" id="btnUndo" style="background:linear-gradient(135deg,#ffb59c,#e08060);display:none;"></button>
      <button class="btn-secondary" id="btnReset"></button>
    </div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4">--</div></div>
    </div>
  </div>
</div>

  ballAir:     {en:'Ball in the air', cn:'\u7a7a\u4e2d\u7684\u7403'},

  rocketPhase2:{en:'Phase 2: Ascending (engine ON)', cn:'\u9636\u6bb52\uff1a\u4e0a\u5347\uff08\u53d1\u52a8\u673a\u5f00\u542f\uff09'},
  rocketPhase3:{en:'Phase 3: Coasting (engine OFF)', cn:'\u9636\u6bb53\uff1a\u6ed1\u884c\uff08\u53d1\u52a8\u673a\u5173\u95ed\uff09'},

  // Insights

var lang = 'cn';
function t(key) { return I18N[key] ? (I18N[key][lang] || I18N[key].en) : key; }
function tf(key, vars) {
  var s = t(key);
  if (vars) { for (var k in vars) { s = s.replace('{'+k+'}', vars[k]); } }
  return s;
}

// --- DOM refs ---
var $ = function(id) { return document.getElementById(id); };
var langBtn = $('langBtn');
var soundBtn = $('soundBtn');
var sidebarTitle = $('sidebarTitle');
var guideContent = $('guideContent');
var gameTitle = $('gameTitle');
var roundInfo = $('roundInfo');
var gameBody = $('gameBody');
var canvas = $('cv');
var ctx = canvas.getContext('2d');
var forceBtns = $('forceBtns');
var btnAction = $('btnAction');
var btnUndo = $('btnUndo');
var btnReset = $('btnReset');
var resultPanel = $('resultPanel');
var controlPanel = $('controlPanel');

// --- Audio (Web Audio API synth, default muted) ---
var audioCtx = null;
var soundMuted = true;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  if (soundMuted) return;
  var ac = getAudio();
  if (!ac) return;
  try {
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sndCorrect() { playTone(523,0.1,'sine',0.1); setTimeout(function(){playTone(659,0.1,'sine',0.08);},60); setTimeout(function(){playTone(784,0.15,'sine',0.08);},120); }
function sndWrong() { playTone(200,0.3,'sawtooth',0.08); playTone(150,0.4,'sawtooth',0.06); }
function sndPlace() { playTone(440,0.08,'triangle',0.1); }
function sndComplete() { playTone(523,0.15,'triangle',0.12); setTimeout(function(){playTone(659,0.12,'triangle',0.1);},100); setTimeout(function(){playTone(784,0.12,'triangle',0.1);},200); setTimeout(function(){playTone(1047,0.25,'triangle',0.12);},300); }
function sndClick() { playTone(660,0.06,'sine',0.06); }
function sndSnap() { playTone(880,0.05,'sine',0.08); }

// --- Sound / Lang buttons ---
soundBtn.onclick = function() {
  soundMuted = !soundMuted;
  soundBtn.textContent = soundMuted ? 'MUTE' : 'SND';
  if (!soundMuted) getAudio();
};
langBtn.onclick = function() {
  lang = lang === 'cn' ? 'en' : 'cn';
  langBtn.textContent = lang === 'cn' ? 'CN' : 'EN';
  refreshUI();
};

// --- Canvas sizing ---
var W = 100, H = 100, DPR = 1;
function resizeCanvas() {
  var parent = gameBody;
  var availW = parent.clientWidth;
  var availH = parent.clientHeight;
  DPR = window.devicePixelRatio || 1;
  W = availW;
  H = availH;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', function() { resizeCanvas(); render(); });

// --- Easing / Utility ---
function lerp(a, b, tt) { return a + (b - a) * tt; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function easeOutCubic(tt) { return 1 - Math.pow(1 - tt, 3); }
function easeOutElastic(tt) {
  if (tt === 0 || tt === 1) return tt;
  return Math.pow(2, -10 * tt) * Math.sin((tt - 0.075) * (2 * Math.PI) / 0.3) + 1;
}

// PARTICLES
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 3;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color: color
    });
  }
}
function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SCREEN SHAKE
// ============================================================
var shakeAmount = 0;
var shakeDecay = 0.9;
function triggerShake(amt) { shakeAmount = amt; }
function getShakeOffset() {
  if (shakeAmount < 0.5) { shakeAmount = 0; return {x:0,y:0}; }
  var ox = (Math.random() - 0.5) * shakeAmount;
  var oy = (Math.random() - 0.5) * shakeAmount;
  shakeAmount *= shakeDecay;
  return {x:ox, y:oy};
}

// ============================================================
function drawArrow(x, y, dx, dy, len, color, lineW, alpha, glowing) {
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lineW || 3;
  ctx.lineCap = 'round';
  var ex = x + dx * len;
  var ey = y + dy * len;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  // Arrowhead
  var headLen = 10 + (lineW || 3);
  var angle = Math.atan2(dy, dx);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - headLen * Math.cos(angle - 0.4), ey - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(ex - headLen * Math.cos(angle + 0.4), ey - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  // Glow
  if (glowing) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawFBDArrows(cx, cy, arrows, animated) {
  for (var i = 0; i < arrows.length; i++) {
    var a = arrows[i];
    var d = DIRS[a.dir] || DIRS.down;
    var mag = (typeof a.mag === 'number') ? a.mag : (MAG_VALS[a.mag] || 70);
    var color = getForceColor(a.forceId);
    var alpha = 1;
    var glow = false;
    if (animated && a.snapAnim !== undefined && a.snapAnim < 1) {
      var ease = easeOutElastic(a.snapAnim);
      mag = mag * ease;
      alpha = 0.5 + 0.5 * ease;
      glow = true;
    }
    drawArrow(cx, cy, d.dx, d.dy, mag, color, 3, alpha, glow);
    // Label
    var lx = cx + d.dx * (mag + 16);
    var ly = cy + d.dy * (mag + 16);
    ctx.font = '11px "Space Grotesk"';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t(a.forceId), lx, ly);
  }
}

function drawDot(cx, cy, r, color) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = color || '#f6f6fc';
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,255,176,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawRocket(cx, cy, scale, flameOn) {
  var s = scale || 1;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  // Body
  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.moveTo(0, -40);
  ctx.lineTo(12, -20);
  ctx.lineTo(12, 25);
  ctx.lineTo(-12, 25);
  ctx.lineTo(-12, -20);
  ctx.closePath();
  ctx.fill();
  // Nose
  ctx.fillStyle = '#ff6644';
  ctx.beginPath();
  ctx.moveTo(0, -55);
  ctx.lineTo(12, -40);
  ctx.lineTo(-12, -40);
  ctx.closePath();
  ctx.fill();
  // Fins
  ctx.fillStyle = '#4488cc';
  ctx.beginPath(); ctx.moveTo(-12,15); ctx.lineTo(-22,30); ctx.lineTo(-12,25); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12,15); ctx.lineTo(22,30); ctx.lineTo(12,25); ctx.closePath(); ctx.fill();
  // Flame
  if (flameOn) {
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.moveTo(-8, 25);
    ctx.lineTo(0, 25 + 18 + Math.random() * 10);
    ctx.lineTo(8, 25);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(-4, 25);
    ctx.lineTo(0, 25 + 10 + Math.random() * 6);
    ctx.lineTo(4, 25);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

  for (var i = 0; i < FORCE_TYPES.length; i++) {
    var ft = FORCE_TYPES[i];
    var btn = document.createElement('button');
    btn.className = 'force-btn';
    btn.textContent = t(ft.i18n);
    btn.setAttribute('data-type', ft.id);
    btn.onclick = (function(fid, b) {

          b.classList.add('active');

    forceBtns.appendChild(btn);

  btnAction.style.display = '';

  btnAction.onclick = checkLevel1;
  btnUndo.style.display = 'none';

  if (gs.l1checked) return;
  gs.l1checked = true;
  var scen = L1_SCENARIOS[gs.l1round];
  var correct = scen.correctForces;
  var selected = Object.keys(gs.l1selected);
  var allCorrect = true;
  var btns = forceBtns.querySelectorAll('.force-btn');
  for (var i = 0; i < btns.length; i++) {
    var fid = btns[i].getAttribute('data-type');
    var isCorrect = correct.indexOf(fid) >= 0;

  });

function checkLevel2() {
  if (gs.l2checked) return;
  gs.l2checked = true;
  var scen = L2_SCENARIOS[gs.l2round];
  var expected = scen.expected;
  var placed = gs.l2arrows;
  var dirScore = 0;
  var magScore = 0;
  var maxDir = expected.length;
  var maxMag = expected.length;
  var matched = 0;
  for (var i = 0; i < expected.length; i++) {
    var exp = expected[i];
    var found = null;
    for (var j = 0; j < placed.length; j++) {
      if (placed[j].forceId === exp.forceId) { found = placed[j]; break; }
    }
    if (found) {
      if (found.dir === exp.dir) dirScore++;
      if (found.mag === exp.mag) magScore++;
      matched++;
    }
  }
  // Penalty for extra arrows
  var extraPenalty = Math.max(0, placed.length - expected.length);
  var totalPossible = maxDir + maxMag;
  var earned = dirScore + magScore - extraPenalty;
  var pct = totalPossible > 0 ? Math.max(0, earned / totalPossible) : 0;
  var pts = Math.round(pct * 25);
  gs.totalScore += pts;
  gs.scorePopT = 1;
  gs.scorePopVal = pts;
  if (pct >= 0.9) {
    sndCorrect();
    spawnParticles(W/2, H/2, '#50ffb0', 20);
    showResult(t('perfect'), t(scen.insightKey), '+' + pts);
  } else if (pct >= 0.5) {
    sndCorrect();
    spawnParticles(W/2, H/2, '#ffcc44', 10);
    showResult(t('partial'), t(scen.insightKey), '+' + pts);
  } else {
    sndWrong();
    triggerShake(8);
    showResult(t('wrong'), t(scen.insightKey), '+' + pts);
  }
  if (gs.l2round < L2_SCENARIOS.length - 1) {
    btnAction.textContent = t('next');
    btnAction.onclick = function() {
      hideResult();
      gs.l2round++;
      buildLevel2Controls();
      render();
    };
  } else {
    btnAction.textContent = t('nextLevel');
    btnAction.onclick = function() {
      hideResult();
      startLevel(3);
    };
  }
  btnUndo.style.display = 'none';
}

var rocketSimState = {y:0, vy:0, phase:0};
function renderRocketSim() {
  var cx = W / 2;
  var cy = H / 2;
  // Background parallax stars
  ctx.fillStyle = '#0c0e14';
  ctx.fillRect(0, 0, W, H);
  var starSeed = 42;
  for (var i = 0; i < 40; i++) {
    starSeed = (starSeed * 1103515245 + 12345) & 0x7fffffff;
    var sx = (starSeed % W);
    starSeed = (starSeed * 1103515245 + 12345) & 0x7fffffff;
    var sy = ((starSeed % H) + rocketSimState.y * 0.3) % H;
    if (sy < 0) sy += H;
    ctx.fillStyle = 'rgba(255,255,255,' + (0.2 + (starSeed%5)*0.1) + ')';
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  // Rocket
  var rocketScreenY = cy - rocketSimState.y * 0.5;
  rocketScreenY = clamp(rocketScreenY, 60, H - 60);
  var flameOn = gs.l4phase <= 1 && rocketSimState.phase === 1;
  drawRocket(cx, rocketScreenY, 1.2, flameOn);
  // FBD mini overlay
  var fbdX = cx + 120;
  var fbdY = rocketScreenY;
  drawDot(fbdX, fbdY, 6, 'rgba(246,246,252,0.5)');
  var phaseData = L4_PHASES[rocketSimState.phase];
  if (phaseData) {
    drawFBDArrows(fbdX, fbdY, phaseData.expected.map(function(e) {
      return {forceId:e.forceId, dir:e.dir, mag:MAG_VALS[e.mag]*0.5};
    }), false);
  }
  // Phase description
  var desc = phaseData ? (phaseData.simDesc[lang] || phaseData.simDesc.en) : '';
  ctx.font = '12px "Noto Sans SC"';
  ctx.fillStyle = '#50ffb0';
  ctx.textAlign = 'center';
  ctx.fillText(desc, cx, H - 30);
  // Ground line for phase 0
  if (rocketSimState.phase === 0) {
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(0, cy + 50, W, 4);
  }
}

  gs.l4simActive = true;
  rocketSimState = {y: 0, vy: 0, phase: phaseIdx};
  controlPanel.style.display = 'none';
  var simDur = 2500;
  var startT = performance.now();
  function simLoop() {
    var elapsed = performance.now() - startT;
    var frac = elapsed / simDur;
    if (frac > 1) frac = 1;
    // Simulate based on phase
    if (phaseIdx === 0) {
      rocketSimState.y = 0;
    } else if (phaseIdx === 1) {
      rocketSimState.y = easeOutCubic(frac) * 200;
      rocketSimState.vy = 5;
    } else {
      rocketSimState.y = 200 + frac * 60 - frac * frac * 30;
      rocketSimState.vy = Math.max(0, 5 - frac * 8);
    }
    rocketSimState.phase = phaseIdx;
    render();
    if (frac < 1) {
      requestAnimationFrame(simLoop);
    } else {
      gs.l4simActive = false;
      controlPanel.style.display = '';
      if (gs.l4phase < L4_PHASES.length - 1) {
        gs.l4phase++;
        buildLevel4Controls();
        render();
      } else {
        // All phases done
        if (gs.l4allCorrect) {
          sndComplete();
          spawnParticles(W/2, H/2, '#50ffb0', 30);
        }
        showFinalResult();
      }
    }
  }
  requestAnimationFrame(simLoop);
}

// ============================================================
// RESULT PANEL
// ============================================================
function showResult(title, insight, verdict) {
  resultPanel.style.display = 'block';
  $('rpTitle').textContent = title;
  $('rpLine1').textContent = '';
  $('rpLine2').textContent = '';
  $('rpLine3').textContent = '';
  $('rpVerdict').textContent = verdict || '';
  $('rpInsight').textContent = insight || '';
}
function hideResult() {
  resultPanel.style.display = 'none';
}

function showFinalResult() {
  resultPanel.style.display = 'block';
  $('rpTitle').textContent = t('complete');
  $('rpLine1').textContent = t('totalScore') + ': ' + gs.totalScore;
  $('rpLine2').textContent = '';
  $('rpLine3').textContent = '';
  $('rpVerdict').textContent = t('ins_rocket');
  $('rpInsight').textContent = '';
  btnAction.textContent = t('reset');
  btnAction.onclick = resetGame;
  btnUndo.style.display = 'none';
  sndComplete();
}

// ============================================================
// LEVEL TRANSITIONS
// ============================================================
function startLevel(lvl) {
  gs.currentLevel = lvl;
  gs.transitioning = true;
  gs.transitionT = 0;
  // Animate transition
  var startT = performance.now();
  var dur = 600;
  function transLoop() {
    var elapsed = performance.now() - startT;
    gs.transitionT = Math.min(1, elapsed / dur);
    render();
    if (gs.transitionT < 1) {
      requestAnimationFrame(transLoop);
    } else {
      gs.transitioning = false;
      initLevel(lvl);
    }
  }
  requestAnimationFrame(transLoop);
}

function initLevel(lvl) {
  hideResult();
  forceBtns.innerHTML = '';
  if (lvl === 1) {
    gs.l1round = 0;
    buildLevel1Controls();
  } else if (lvl === 2) {
    gs.l2round = 0;
    buildLevel2Controls();
  } else if (lvl === 3) {
    gs.l3round = 0;
    buildLevel3Controls();
  } else if (lvl === 4) {
    gs.l4phase = 0;
    gs.l4allCorrect = true;
    buildLevel4Controls();
  }
  refreshUI();
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  resizeCanvas();
  var shake = getShakeOffset();
  ctx.save();
  ctx.translate(shake.x, shake.y);
  // Clear
  ctx.fillStyle = '#0c0e14';
  ctx.fillRect(-10, -10, W + 20, H + 20);
  // Parallax grid bg
  ctx.strokeStyle = 'rgba(80,255,176,0.03)';
  ctx.lineWidth = 1;
  var gridSize = 40;
  for (var gx = 0; gx < W; gx += gridSize) {
    ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke();
  }
  for (var gy = 0; gy < H; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  }
  // Level transition overlay
  if (gs.transitioning) {
    var alpha = 1 - Math.abs(gs.transitionT * 2 - 1);
    ctx.fillStyle = 'rgba(12,14,20,' + alpha + ')';
    ctx.fillRect(0, 0, W, H);
    if (gs.transitionT < 0.5) {
      ctx.font = '22px "Space Grotesk"';
      ctx.fillStyle = 'rgba(80,255,176,' + (1-gs.transitionT*2) + ')';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t('lvl' + gs.currentLevel), W/2, H/2);
    }
    ctx.restore();
    return;
  }
  // Render current level
  if (gs.currentLevel === 1) renderLevel1();
  else if (gs.currentLevel === 2) renderLevel2();
  else if (gs.currentLevel === 3) renderLevel3();
  else if (gs.currentLevel === 4) renderLevel4();
  // Particles
  updateParticles();
  drawParticles();
  ctx.restore();
  // Update arrow snap animations
  var anyAnimating = false;
  var arrows = gs.currentLevel === 2 ? gs.l2arrows : gs.l4arrows;
  for (var ai = 0; ai < arrows.length; ai++) {
    if (arrows[ai].snapAnim !== undefined && arrows[ai].snapAnim < 1) {
      arrows[ai].snapAnim += 0.04;
      if (arrows[ai].snapAnim > 1) arrows[ai].snapAnim = 1;
      anyAnimating = true;
    }
  }
  if (anyAnimating || particles.length > 0 || shakeAmount > 0 || gs.l4simActive) {
    requestAnimationFrame(render);
  }
}

// ============================================================
// HUD + UI REFRESH
// ============================================================
function refreshUI() {
  gameTitle.textContent = t('title');
  sidebarTitle.textContent = t('sideTitle');
  // Guide
  var guideKey = 'guide' + gs.currentLevel;
  guideContent.textContent = t(guideKey);
  // Level label
  var lvlKey = 'lvl' + gs.currentLevel;
  roundInfo.textContent = t(lvlKey);
  // HUD
  $('hudL1').textContent = t('level');
  $('hudV1').textContent = gs.currentLevel + '/' + TOTAL_LEVELS;
  $('hudL2').textContent = t('score');
  $('hudV2').textContent = gs.totalScore;
  $('hudL3').textContent = t('round');
  if (gs.currentLevel === 1) {
    $('hudV3').textContent = (gs.l1round + 1) + '/' + L1_SCENARIOS.length;
  } else if (gs.currentLevel === 2) {
    $('hudV3').textContent = (gs.l2round + 1) + '/' + L2_SCENARIOS.length;
  } else if (gs.currentLevel === 3) {
    $('hudV3').textContent = (gs.l3round + 1) + '/' + L3_SCENARIOS.length;
  } else if (gs.currentLevel === 4) {
    $('hudV3').textContent = (gs.l4phase + 1) + '/' + L4_PHASES.length;
  }
  $('hudL4').textContent = t('accuracy');
  $('hudV4').textContent = '--';
  // Score juice
  if (gs.scorePopT > 0) {
    $('hudV2').style.transform = 'scale(' + (1 + gs.scorePopT * 0.3) + ')';
    $('hudV2').style.color = '#ffcc44';
    gs.scorePopT -= 0.03;
    if (gs.scorePopT <= 0) {
      $('hudV2').style.transform = 'scale(1)';
      $('hudV2').style.color = '#50ffb0';
    }
    requestAnimationFrame(refreshUI);
  }
  // Button labels for current language
  btnReset.textContent = t('reset');
  btnReset.onclick = resetGame;
  // Add check button behavior for L2 and L4
  if (gs.currentLevel === 2 && !gs.l2checked) {
    // Swap action to check if arrows placed
    if (gs.l2arrows.length > 0) {
      // Add separate check trigger: the main button adds, we need a check mechanism
      // Use double purpose: if force selected, add; else check
    }
  }
}

// ============================================================
// RESET
// ============================================================
function resetGame() {
  gs.currentLevel = 1;
  gs.totalScore = 0;
  gs.l1round = 0;
  gs.l2round = 0;
  gs.l3round = 0;
  gs.l4phase = 0;
  gs.l4allCorrect = true;
  gs.l4simActive = false;
  gs.transitioning = false;
  particles = [];
  shakeAmount = 0;
  hideResult();
  controlPanel.style.display = '';
  initLevel(1);
}

// ============================================================
// KEYBOARD: Enter to check, Escape to undo
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (gs.currentLevel === 2 && !gs.l2checked && gs.l2arrows.length > 0) {
      checkLevel2();
    } else if (gs.currentLevel === 4 && !gs.l4checked && gs.l4arrows.length > 0) {
      checkLevel4();
    }
  }
});

// Also add a check button for L2 and L4 inside the control panel when needed
// We use a second action bar: the undo button area
function updateCheckButton() {
  // For levels 2 and 4, change undo button area to include check
  if ((gs.currentLevel === 2 && !gs.l2checked) || (gs.currentLevel === 4 && !gs.l4checked)) {
    var arrows = gs.currentLevel === 2 ? gs.l2arrows : gs.l4arrows;
    if (arrows.length > 0) {
      // Show a check option via the action button
      // We'll use a timer to detect "done adding" or a separate check btn
    }
  }
}

// Override the add button for L2: it also acts as check if clicked with no force selected
(function() {
  var origBtnAction = btnAction;
  // We'll create a dedicated check button
  var checkBtn = document.createElement('button');
  checkBtn.className = 'btn';
  checkBtn.style.background = 'linear-gradient(135deg,#66aaff,#4488dd)';
  checkBtn.id = 'btnCheck';
  controlPanel.insertBefore(checkBtn, btnUndo);
  checkBtn.style.display = 'none';

  // Update check button visibility in render loop
  var origRender = render;
  var checkInterval = setInterval(function() {
    if (gs.currentLevel === 2 && !gs.l2checked && gs.l2arrows.length > 0) {
      checkBtn.style.display = '';
      checkBtn.textContent = t('check');
      checkBtn.onclick = checkLevel2;
    } else if (gs.currentLevel === 4 && !gs.l4checked && gs.l4arrows.length > 0) {
      checkBtn.style.display = '';
      checkBtn.textContent = t('check');
      checkBtn.onclick = checkLevel4;
    } else {
      checkBtn.style.display = 'none';
    }
  }, 200);
})();

// ============================================================
// IDLE PULSE on palette arrows
// ============================================================
(function() {
  setInterval(function() {
    if (gs.currentLevel === 1 && !gs.l1checked) {
      var btns = forceBtns.querySelectorAll('.force-btn:not(.active)');
      var pulse = 0.6 + 0.4 * Math.sin(gs.idlePulseT * 3);
      for (var i = 0; i < btns.length; i++) {
        btns[i].style.borderColor = 'rgba(80,255,176,' + (0.15 + pulse * 0.15) + ')';
      }
    }
  }, 50);
})();

// ============================================================
// INIT
// ============================================================
function init() {
  resizeCanvas();
  initLevel(1);
  render();
}

init();
</script>
