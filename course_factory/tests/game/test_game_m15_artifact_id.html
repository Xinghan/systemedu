<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artifact Hunter</title>
<style>
:root{
  /* 第 1 层 — 共享深空底 */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg: oklch(0.96 0.01 265);
  --fg-dim: oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold: oklch(0.85 0.14 85);
  /* 第 2 层 — neuro accent */
  --neuro: oklch(0.75 0.17 25);
  /* 第 3 层 — neuro 5 色 palette */
  --synaptic: oklch(0.75 0.17 25);
  --dendrite: oklch(0.55 0.15 25);
  --axon: oklch(0.32 0.10 25);
  --firing: oklch(0.92 0.08 25);
  --memory: oklch(0.85 0.14 85);
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);
  font-family:'Noto Sans SC',system-ui,sans-serif;color:var(--fg);}
.app{display:flex;height:100vh;width:100%;}

/* ---------- 200px sidebar ---------- */
.game-sidebar{width:200px;flex-shrink:0;background:var(--bg-1);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:14px 12px;gap:12px;overflow-y:auto;}
.brand{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--neuro);
  letter-spacing:1px;text-transform:uppercase;line-height:1.3;}
.brand small{display:block;font-size:9px;color:var(--fg-mute);letter-spacing:2px;margin-top:2px;}
.mascot{display:flex;flex-direction:column;align-items:center;gap:4px;}
.mascot svg{width:88px;height:88px;}
.mascot .m-name{font-family:var(--mono);font-size:9px;color:var(--fg-mute);letter-spacing:1px;}
.progress-list{display:flex;flex-direction:column;gap:5px;}
.progress-list .pl-head{font-size:10px;color:var(--fg-mute);letter-spacing:1px;text-transform:uppercase;}
.pl-item{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;
  color:var(--fg-dim);padding:3px 0;}
.pl-dot{width:11px;height:11px;border:1px solid var(--line-strong);flex-shrink:0;background:var(--bg-2);}
.pl-item.current .pl-dot{border-color:var(--neuro);background:var(--neuro);}
.pl-item.done .pl-dot{border-color:var(--synaptic);background:var(--synaptic);}
.pl-item.wrong .pl-dot{border-color:var(--dendrite);background:var(--dendrite);}
.pl-item.current{color:var(--firing);}
.guide{font-size:11px;color:var(--fg-dim);line-height:1.55;}
.guide .g-head{font-size:10px;color:var(--fg-mute);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.spacer{flex:1;}
.lang-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 0;cursor:pointer;
  border:1px solid var(--line-strong);background:var(--bg-2);color:var(--neuro);letter-spacing:2px;}
.lang-btn:hover{background:var(--bg-3);}

/* ---------- main stage ---------- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;padding:14px;gap:12px;}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar h1{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--firing);letter-spacing:1px;}
.topbar h1 span{color:var(--fg-mute);font-size:11px;font-weight:400;}
.hud{display:flex;gap:18px;font-family:var(--mono);}
.hud-item{text-align:right;}
.hud-label{font-size:8px;color:var(--fg-mute);letter-spacing:1px;text-transform:uppercase;}
.hud-value{font-size:14px;color:var(--neuro);font-weight:700;}

/* canvas zone — 父容器 flex column */
.scope-wrap{flex:1;min-height:0;display:flex;flex-direction:column;
  background:var(--bg-1);border:1px solid var(--line);position:relative;}
.scope-meta{display:flex;gap:14px;padding:7px 12px;border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:10px;color:var(--fg-dim);flex-shrink:0;}
.scope-meta b{color:var(--firing);}
canvas{flex:1;min-height:0;width:100%;display:block;}

/* options */
.opts-head{font-size:11px;color:var(--fg-dim);flex-shrink:0;}
.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex-shrink:0;}
.opt{padding:10px 8px;background:var(--bg-2);border:1px solid var(--line-strong);cursor:pointer;
  text-align:center;transition:transform 0.12s,background 0.12s;border-radius:0;}
.opt:hover{transform:translateY(-2px);background:var(--bg-3);}
.opt .o-name{font-size:12px;font-weight:700;color:var(--fg);}
.opt .o-hint{font-family:var(--mono);font-size:9px;color:var(--fg-mute);margin-top:2px;}
.opt.correct{background:color-mix(in oklch,var(--synaptic) 28%,var(--bg-2));border-color:var(--synaptic);}
.opt.miss{background:color-mix(in oklch,var(--dendrite) 28%,var(--bg-2));border-color:var(--dendrite);}
.opt.reveal{border-color:var(--gold);}
.opt[disabled]{cursor:default;pointer-events:none;}

.fb-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;
  min-height:34px;padding:6px 10px;background:var(--bg-1);border:1px solid var(--line);}
.fb-msg{font-size:12px;color:var(--fg-dim);line-height:1.4;}
.fb-msg b{color:var(--firing);}
.fb-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 18px;cursor:pointer;
  border:1px solid var(--neuro);background:var(--bg-2);color:var(--neuro);letter-spacing:1px;flex-shrink:0;}
.fb-btn:hover{background:var(--bg-3);}
.fb-btn.hidden{display:none;}

/* result overlay */
.result-overlay{display:none;position:absolute;inset:0;background:oklch(0.10 0.03 265 / 0.92);
  z-index:50;justify-content:center;align-items:center;}
.result-overlay.show{display:flex;}
.result-card{background:var(--bg-1);border:1px solid var(--neuro);padding:28px;max-width:380px;
  width:90%;text-align:center;box-shadow:5px 5px 0 var(--bg-0);}
.result-card .badge{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--gold);
  text-transform:uppercase;margin-bottom:6px;}
.result-card h2{font-size:20px;color:var(--firing);margin-bottom:10px;}
.result-card .score-big{font-family:var(--mono);font-size:40px;color:var(--neuro);font-weight:700;margin-bottom:8px;}
.result-card p{font-size:13px;line-height:1.6;color:var(--fg-dim);margin-bottom:14px;}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="game-sidebar">
    <div class="brand" id="brandText">ARTIFACT<br>HUNTER<small id="brandSub">EEG / NRO-20</small></div>
    <div class="mascot">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <!-- Spark: branching dendrite creature -->
        <line x1="50" y1="58" x2="50" y2="40" stroke="var(--dendrite)" stroke-width="3"/>
        <line x1="50" y1="44" x2="34" y2="30" stroke="var(--dendrite)" stroke-width="2.5"/>
        <line x1="50" y1="44" x2="66" y2="30" stroke="var(--dendrite)" stroke-width="2.5"/>
        <line x1="34" y1="30" x2="26" y2="20" stroke="var(--axon)" stroke-width="2"/>
        <line x1="34" y1="30" x2="40" y2="18" stroke="var(--axon)" stroke-width="2"/>
        <line x1="66" y1="30" x2="74" y2="20" stroke="var(--axon)" stroke-width="2"/>
        <line x1="66" y1="30" x2="60" y2="18" stroke="var(--axon)" stroke-width="2"/>
        <circle cx="50" cy="64" r="13" fill="var(--synaptic)"/>
        <circle cx="45" cy="61" r="2.4" fill="var(--bg-0)"/>
        <circle cx="55" cy="61" r="2.4" fill="var(--bg-0)"/>
        <circle cx="26" cy="20" r="3" fill="var(--firing)"/>
        <circle cx="40" cy="18" r="3" fill="var(--firing)"/>
        <circle cx="74" cy="20" r="3" fill="var(--firing)"/>
        <circle cx="60" cy="18" r="3" fill="var(--memory)"/>
      </svg>
      <div class="m-name">SPARK</div>
    </div>
    <div class="progress-list">
      <div class="pl-head" id="plHead">CASES</div>
      <div id="plItems"></div>
    </div>
    <div class="guide">
      <div class="g-head" id="guideHead">HOW TO PLAY</div>
      <div id="guideBody"></div>
    </div>
    <div class="spacer"></div>
    <button class="lang-btn" id="langBtn">CN</button>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="game-main">
    <div class="topbar">
      <h1 id="caseTitle">CASE <span id="caseIdx"></span></h1>
      <div class="hud">
        <div class="hud-item"><div class="hud-label" id="hudLScore"></div><div class="hud-value" id="hudVScore"></div></div>
        <div class="hud-item"><div class="hud-label" id="hudLCase"></div><div class="hud-value" id="hudVCase"></div></div>
      </div>
    </div>

    <div class="scope-wrap">
      <div class="scope-meta">
        <span id="metaChan"></span>
        <span id="metaScale"></span>
        <span id="metaDur"></span>
      </div>
      <canvas id="scope"></canvas>
      <!-- result overlay anchored to scope -->
      <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
          <div class="badge" id="resultBadge"></div>
          <h2 id="resultTitle"></h2>
          <div class="score-big" id="resultScore"></div>
          <p id="resultMsg"></p>
          <button class="fb-btn" id="retryBtn"></button>
        </div>
      </div>
    </div>

    <div class="opts-head" id="optsHead"></div>
    <div class="opts" id="opts"></div>

    <div class="fb-bar">
      <span class="fb-msg" id="fbMsg"></span>
      <button class="fb-btn hidden" id="nextBtn"></button>
    </div>
  </main>
</div>

<script>
(function(){
var LANG='cn';

/* ---------------- i18n ---------------- */
var I18N={
  brandSub:{en:'EEG / NRO-20',cn:'脑电 / NRO-20'},
  cases:{en:'CASES',cn:'案例'},
  howto:{en:'HOW TO PLAY',cn:'玩法'},
  guideBody:{en:'Read the waveform shape, channel position and rhythm. Click the artifact type that matches. 6 correct unlocks ARTIFACT HUNTER.',
    cn:'看波形、通道位置和节律，点击匹配的伪迹类型。连对 6 题解锁“伪迹猎人”。'},
  caseWord:{en:'CASE',cn:'案例'},
  score:{en:'SCORE',cn:'得分'},
  caseHud:{en:'CASE',cn:'进度'},
  optsHead:{en:'Identify the artifact type:',cn:'识别这段伪迹的类型：'},
  next:{en:'NEXT CASE',cn:'下一例'},
  finish:{en:'SEE RESULT',cn:'查看结果'},
  retry:{en:'PLAY AGAIN',cn:'重新开始'},
  chan:{en:'CHANNEL',cn:'通道'},
  scale:{en:'SCALE',cn:'量程'},
  dur:{en:'WINDOW',cn:'窗口'},
  /* feedback */
  fbHint:{en:'Look at peak shape, where it sits, and how regular it is.',
    cn:'看峰形、出现位置、以及是否规律。'},
  correct:{en:'Correct.',cn:'正确。'},
  wrong:{en:'Not quite.',cn:'不对。'},
  /* artifact type names */
  tBlink:{en:'Eye blink',cn:'眨眼'},
  tEmg:{en:'Jaw EMG',cn:'咬牙肌电'},
  tLine:{en:'50Hz line noise',cn:'50Hz 工频'},
  tDrift:{en:'Electrode drift',cn:'电极漂移'},
  tEcg:{en:'ECG / heartbeat',cn:'心电 / 心跳'},
  tClean:{en:'Clean EEG',cn:'正常脑波'},
  /* type hints (frequency clue) */
  hBlink:{en:'frontal, slow',cn:'前额 慢'},
  hEmg:{en:'temporal, fast',cn:'颐侧 高频'},
  hLine:{en:'50 Hz sine',cn:'50Hz 正弦'},
  hDrift:{en:'<0.5 Hz roll',cn:'<0.5Hz 漂'},
  hEcg:{en:'~1 Hz spike',cn:'~1Hz 规律'},
  hClean:{en:'8-12 Hz mix',cn:'8-12Hz 混合'},
  /* per-case explanations (why) */
  eBlink:{en:'Single large slow deflection at frontal channel Fp1 — classic eye-blink. Eyeball is a dipole; a blink sweeps it and dumps a big slow spike into front electrodes.',
    cn:'前额通道 Fp1 单个缓慢大偏转——典型眨眼。眼球是个偶极子，眨眼扫过时把一个慢大峰注入前端电极。'},
  eEmg:{en:'Dense high-frequency burst at temporal channel T4 — jaw/face muscle (EMG). Muscle fires at 20-100 Hz, far faster than brain rhythms.',
    cn:'颐侧通道 T4 密集高频爆发——颐/面部肌电（EMG）。肌肉以 20-100 Hz 放电，远快于脑节律。'},
  eLine:{en:'A perfectly regular 50 Hz sine on every channel — mains line noise from the power grid, not the brain.',
    cn:'每个通道上完美规律的 50 Hz 正弦——来自电网的工频噪声，不是大脑。'},
  eDrift:{en:'A very slow baseline roll (<0.5 Hz) — the electrode is loosening or sweat is changing skin contact. The whole trace wanders up then down.',
    cn:'极慢的基线漂移（<0.5 Hz）——电极松动或出汗改变接触。整条迹线先上后下游走。'},
  eEcg:{en:'A regular ~1 Hz sharp spike repeating like a metronome — that is the heartbeat (ECG) leaking into EEG, common at the ear/mastoid reference.',
    cn:'规律的 ~1 Hz 尖峰像节拍器一样重复——是心跳（ECG）泄入脑电，常见于耳/乳突参考。'},
  eClean:{en:'No spikes, no line buzz, no drift — just a smooth 8-12 Hz alpha-band mix. This trace is clean. Do not over-flag normal brain activity.',
    cn:'没有尖峰、没有工频嗡鸣、没有漂移——只是平滑的 8-12 Hz alpha 混合。这段是干净的。别把正常脑活动误判。'},
  /* result */
  badge:{en:'NEURO LAB',cn:'神经实验室'},
  rTitleHunter:{en:'ARTIFACT HUNTER',cn:'伪迹猎人'},
  rTitleGood:{en:'SHARP EYE',cn:'火眼金睛'},
  rTitleOk:{en:'KEEP TRAINING',cn:'继续训练'},
  rMsgHunter:{en:'All 6 correct. You can read blink, EMG, line, drift, ECG and clean EEG at a glance. Badge unlocked: ARTIFACT HUNTER.',
    cn:'6 题全对。你能一眼读出眨眼、肌电、工频、漂移、心电和干净脑波。解锁徽章：伪迹猎人。'},
  rMsgGood:{en:'Strong run. Review the ones you missed — morphology + position + rhythm is the trick.',
    cn:'表现不错。回顾错的题——形态+位置+节律 是关键。'},
  rMsgOk:{en:'Re-read the clues: where the spike sits and how regular it repeats tell you the source.',
    cn:'重读线索：峰出现在哪、重复多规律，告诉你源头。'},
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

/* ---------------- artifact types (6 options, shared) ---------------- */
var TYPES=[
  {id:'tBlink', hint:'hBlink'},
  {id:'tEmg',   hint:'hEmg'},
  {id:'tLine',  hint:'hLine'},
  {id:'tDrift', hint:'hDrift'},
  {id:'tEcg',   hint:'hEcg'},
  {id:'tClean', hint:'hClean'},
];

/* ---------------- 6 cases (each = a rendered EEG segment) ---------------- */
var CASES=[
  {kind:'blink', answer:0, chan:'Fp1', scale:'±150 uV', explain:'eBlink'},
  {kind:'emg',   answer:1, chan:'T4',  scale:'±60 uV',  explain:'eEmg'},
  {kind:'line',  answer:2, chan:'all', scale:'±30 uV',  explain:'eLine'},
  {kind:'drift', answer:3, chan:'O2',  scale:'±200 uV', explain:'eDrift'},
  {kind:'ecg',   answer:4, chan:'A2',  scale:'±50 uV',  explain:'eEcg'},
  {kind:'clean', answer:5, chan:'C3',  scale:'±25 uV',  explain:'eClean'},
];

/* shuffle case order so it's not memorizable */
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}
var order=shuffle([0,1,2,3,4,5]);

/* ---------------- state ---------------- */
var cur=0;
var score=0;
var answered=false;
var results=[];
for(var i=0;i<6;i++)results.push('pending');
var phase=0;

/* ---------------- canvas waveform drawing ---------------- */
var canvas=document.getElementById('scope');
var ctx=canvas.getContext('2d');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);

function resize(){
  var r=canvas.getBoundingClientRect();
  W=Math.max(320,r.width);H=Math.max(180,r.height);
  canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

function cssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}
var COL={};
function loadColors(){
  COL.neuro=cssVar('--neuro');COL.synaptic=cssVar('--synaptic');
  COL.dendrite=cssVar('--dendrite');COL.firing=cssVar('--firing');
  COL.memory=cssVar('--memory');COL.line=cssVar('--line');
  COL.bg1=cssVar('--bg-1');COL.bg2=cssVar('--bg-2');COL.fgmute=cssVar('--fg-mute');
}

/* signal value for a case kind at sample x in [0,1], row index, time tt */
function signal(kind,x,row,tt){
  var px=x;
  var n=(Math.sin(x*811.7+row*40)+Math.sin(x*317.3-row*13))*0.04;
  var alpha=Math.sin(x*Math.PI*2*10 + row*1.3)*0.10 + Math.sin(x*Math.PI*2*6 - row)*0.06;
  switch(kind){
    case 'blink':{
      var v=alpha*0.5+n;
      if(row===0){var c=0.32;var g=Math.exp(-Math.pow((px-c)/0.07,2));v-=g*0.85;}
      return v;
    }
    case 'emg':{
      var v=alpha*0.5+n;
      if(row===2){
        var env=Math.exp(-Math.pow((px-0.5)/0.18,2));
        v+=env*Math.sin(x*Math.PI*2*70+row*3+tt*0.5)*0.55;
        v+=env*Math.sin(x*Math.PI*2*45-row*2)*0.3;
      }
      return v;
    }
    case 'line':{
      return Math.sin(x*Math.PI*2*50 + row*0.4)*0.42 + n + alpha*0.25;
    }
    case 'drift':{
      var roll=Math.sin(px*Math.PI*2*0.6 + 0.4 + tt*0.1)*0.6;
      return roll + alpha*0.35 + n;
    }
    case 'ecg':{
      var v=alpha*0.4+n;
      var period=0.22;
      var ph=((px+0.05)%period)/period;
      var qrs=Math.exp(-Math.pow((ph-0.5)/0.018,2));
      v-=qrs*0.7;
      return v;
    }
    case 'clean':default:{
      return Math.sin(x*Math.PI*2*10 + row*1.3)*0.22
           + Math.sin(x*Math.PI*2*8 - row*0.7)*0.14
           + Math.sin(x*Math.PI*2*12 + row)*0.08 + n*0.6;
    }
  }
}

function monoFont(){return "'JetBrains Mono',ui-monospace,Menlo,monospace";}

function channelLabels(c){
  if(c.kind==='blink')return ['Fp1','Fz','Pz'];
  if(c.kind==='emg')return ['Fz','Cz','T4'];
  if(c.kind==='line')return ['C3','Cz','C4'];
  if(c.kind==='drift')return ['Fz','Pz','O2'];
  if(c.kind==='ecg')return ['Cz','Pz','A2'];
  return ['F3','C3','P3'];
}
function traceColor(c,row){
  var hot=COL.neuro;
  if(c.kind==='blink')return row===0?COL.firing:hot;
  if(c.kind==='emg')return row===2?COL.firing:hot;
  if(c.kind==='line')return COL.firing;
  if(c.kind==='drift')return COL.firing;
  if(c.kind==='ecg')return row===2?COL.firing:COL.synaptic;
  return COL.synaptic;
}

function draw(){
  if(!W)resize();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=COL.bg1;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=COL.line;ctx.lineWidth=1;
  for(var gx=0;gx<=10;gx++){var X=gx/10*W;ctx.beginPath();ctx.moveTo(X,0);ctx.lineTo(X,H);ctx.stroke();}
  var c=CASES[order[cur]];
  var rows=3;
  var rowLabels=channelLabels(c);
  var pad=14, usableH=H-pad*2, rowH=usableH/rows;
  var tt=phase;
  for(var row=0;row<rows;row++){
    var midY=pad+rowH*row+rowH/2;
    var amp=rowH*0.40;
    ctx.strokeStyle=COL.line;ctx.beginPath();ctx.moveTo(0,midY);ctx.lineTo(W,midY);ctx.stroke();
    ctx.fillStyle=COL.fgmute;ctx.font='10px '+monoFont();ctx.textAlign='left';
    ctx.fillText(rowLabels[row], 6, pad+rowH*row+12);
    ctx.beginPath();
    ctx.strokeStyle=traceColor(c,row);ctx.lineWidth=1.6;
    var steps=Math.floor(W);
    for(var s=0;s<=steps;s++){
      var x=s/steps;
      var v=signal(c.kind,x,row,tt);
      var Y=midY - v*amp;
      if(s===0)ctx.moveTo(x*W,Y);else ctx.lineTo(x*W,Y);
    }
    ctx.stroke();
  }
}

var lastT=0;
function loop(ts){
  if(!lastT)lastT=ts;
  var dt=(ts-lastT)/1000;lastT=ts;
  phase+=dt;
  draw();
  requestAnimationFrame(loop);
}

/* ---------------- UI build ---------------- */
function buildSidebarCases(){
  var box=document.getElementById('plItems');
  box.innerHTML='';
  for(var i=0;i<6;i++){
    var d=document.createElement('div');
    d.className='pl-item';d.dataset.slot=i;
    var dot=document.createElement('span');dot.className='pl-dot';
    var lbl=document.createElement('span');lbl.textContent='Case '+(i+1);
    d.appendChild(dot);d.appendChild(lbl);
    box.appendChild(d);
  }
  refreshSidebar();
}
function refreshSidebar(){
  var items=document.querySelectorAll('#plItems .pl-item');
  items.forEach(function(el,i){
    el.classList.remove('current','done','wrong');
    if(results[i]==='done')el.classList.add('done');
    else if(results[i]==='wrong')el.classList.add('wrong');
    if(i===cur)el.classList.add('current');
  });
}

function buildOptions(){
  var box=document.getElementById('opts');
  box.innerHTML='';
  TYPES.forEach(function(ty,idx){
    var o=document.createElement('div');
    o.className='opt';o.dataset.idx=idx;
    var nm=document.createElement('div');nm.className='o-name';nm.textContent=t(ty.id);nm.dataset.i18n=ty.id;
    var ht=document.createElement('div');ht.className='o-hint';ht.textContent=t(ty.hint);ht.dataset.i18n=ty.hint;
    o.appendChild(nm);o.appendChild(ht);
    o.addEventListener('click',function(){onPick(parseInt(this.dataset.idx,10));});
    box.appendChild(o);
  });
}

function onPick(idx){
  if(answered)return;
  answered=true;
  var c=CASES[order[cur]];
  var correct=(idx===c.answer);
  if(correct){score++;results[cur]='done';}else{results[cur]='wrong';}
  var opts=document.querySelectorAll('#opts .opt');
  opts.forEach(function(o){
    var oi=parseInt(o.dataset.idx,10);
    o.setAttribute('disabled','');
    if(oi===c.answer){o.classList.add('correct');o.classList.add('reveal');}
    if(oi===idx && !correct)o.classList.add('miss');
  });
  var msg=document.getElementById('fbMsg');
  msg.innerHTML='<b>'+(correct?t('correct'):t('wrong'))+'</b> '+t(c.explain);
  var nb=document.getElementById('nextBtn');
  nb.classList.remove('hidden');
  nb.textContent=(cur>=5)?t('finish'):t('next');
  refreshSidebar();
  updateHUD();
}

function nextCase(){
  if(!answered)return;
  if(cur>=5){showResult();return;}
  cur++;answered=false;
  loadCase();
}

function loadCase(){
  var c=CASES[order[cur]];
  document.getElementById('caseIdx').textContent=(cur+1)+'/6';
  document.getElementById('metaChan').innerHTML=t('chan')+': <b>'+c.chan+'</b>';
  document.getElementById('metaScale').innerHTML=t('scale')+': <b>'+c.scale+'</b>';
  document.getElementById('metaDur').innerHTML=t('dur')+': <b>2.0 s</b>';
  document.getElementById('fbMsg').textContent=t('fbHint');
  document.getElementById('nextBtn').classList.add('hidden');
  var opts=document.querySelectorAll('#opts .opt');
  opts.forEach(function(o){o.classList.remove('correct','miss','reveal');o.removeAttribute('disabled');});
  refreshSidebar();
  updateHUD();
}

function updateHUD(){
  document.getElementById('hudLScore').textContent=t('score');
  document.getElementById('hudVScore').textContent=score+'/6';
  document.getElementById('hudLCase').textContent=t('caseHud');
  document.getElementById('hudVCase').textContent=(cur+1)+'/6';
}

function showResult(){
  var ov=document.getElementById('resultOverlay');
  ov.classList.add('show');
  document.getElementById('resultBadge').textContent=t('badge');
  document.getElementById('resultScore').textContent=score+'/6';
  var title,msg;
  if(score===6){title=t('rTitleHunter');msg=t('rMsgHunter');}
  else if(score>=4){title=t('rTitleGood');msg=t('rMsgGood');}
  else{title=t('rTitleOk');msg=t('rMsgOk');}
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('retryBtn').textContent=t('retry');
}

function retry(){
  document.getElementById('resultOverlay').classList.remove('show');
  order=shuffle([0,1,2,3,4,5]);
  cur=0;score=0;answered=false;
  results=['pending','pending','pending','pending','pending','pending'];
  loadCase();
}

/* ---------------- i18n refresh ---------------- */
function refreshI18N(){
  document.getElementById('brandSub').textContent=t('brandSub');
  document.getElementById('plHead').textContent=t('cases');
  document.getElementById('guideHead').textContent=t('howto');
  document.getElementById('guideBody').textContent=t('guideBody');
  document.getElementById('caseTitle').childNodes[0].nodeValue=t('caseWord')+' ';
  document.getElementById('optsHead').textContent=t('optsHead');
  document.querySelectorAll('#opts [data-i18n]').forEach(function(el){el.textContent=t(el.dataset.i18n);});
  var c=CASES[order[cur]];
  document.getElementById('metaChan').innerHTML=t('chan')+': <b>'+c.chan+'</b>';
  document.getElementById('metaScale').innerHTML=t('scale')+': <b>'+c.scale+'</b>';
  document.getElementById('metaDur').innerHTML=t('dur')+': <b>2.0 s</b>';
  if(answered){
    var correct=(results[cur]==='done');
    document.getElementById('fbMsg').innerHTML='<b>'+(correct?t('correct'):t('wrong'))+'</b> '+t(c.explain);
    var nb=document.getElementById('nextBtn');nb.textContent=(cur>=5)?t('finish'):t('next');
  }else{
    document.getElementById('fbMsg').textContent=t('fbHint');
  }
  var ov=document.getElementById('resultOverlay');
  if(ov.classList.contains('show')){
    document.getElementById('resultBadge').textContent=t('badge');
    var title,msg;
    if(score===6){title=t('rTitleHunter');msg=t('rMsgHunter');}
    else if(score>=4){title=t('rTitleGood');msg=t('rMsgGood');}
    else{title=t('rTitleOk');msg=t('rMsgOk');}
    document.getElementById('resultTitle').textContent=title;
    document.getElementById('resultMsg').textContent=msg;
    document.getElementById('retryBtn').textContent=t('retry');
  }
  updateHUD();
}

/* ---------------- events ---------------- */
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  this.textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('nextBtn').addEventListener('click',nextCase);
document.getElementById('retryBtn').addEventListener('click',retry);
window.addEventListener('resize',resize);

/* ---------------- init ---------------- */
loadColors();
resize();
buildSidebarCases();
buildOptions();
loadCase();
refreshI18N();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
