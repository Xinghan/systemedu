<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>M15 · 信号质检员 — Cortex Map</title>
<style>
  :root{
    /* Layer 1 — shared deep space canvas */
    --bg-0: oklch(0.14 0.03 25);
    --bg-1: oklch(0.18 0.035 25);
    --bg-2: oklch(0.22 0.04 25);
    --bg-3: oklch(0.27 0.045 25);
    --line: oklch(0.36 0.05 25 / 0.35);
    --line-strong: oklch(0.55 0.08 25 / 0.55);
    --fg:      oklch(0.96 0.012 25);
    --fg-dim:  oklch(0.76 0.02 25);
    --fg-mute: oklch(0.56 0.03 25);

    /* Layer 2 — neuroscience signature accent */
    --neuro: oklch(0.75 0.17 25);

    /* Layer 3 — neuro 5-color palette (themes.js NRO-20) */
    --SYNAPTIC: oklch(0.75 0.17 25);
    --DENDRITE: oklch(0.55 0.15 25);
    --AXON:     oklch(0.32 0.10 25);
    --FIRING:   oklch(0.92 0.08 25);
    --MEMORY:   oklch(0.85 0.14 85);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;font-family:'Inter','PingFang SC',sans-serif;color:var(--fg);background:var(--bg-0);overflow:hidden}

  .stage{display:flex;flex-direction:row;height:100vh;width:100vw}

  /* ============ 200px sidebar ============ */
  .game-sidebar{
    width:200px;flex:0 0 200px;
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    padding:14px 12px;gap:11px;
    overflow-y:auto;
  }
  .brand{display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--line);padding-bottom:9px}
  .brand .code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-mute);letter-spacing:1.2px}
  .brand .title{font-size:13px;color:var(--fg);font-weight:600}
  .brand .sub{font-size:10px;color:var(--fg-dim);margin-top:2px;line-height:1.4}

  .mascot{
    width:100%;height:84px;display:flex;align-items:center;justify-content:center;
    background:var(--bg-2);border:1px solid var(--line);
  }
  .mascot svg{width:100%;height:100%}

  .panel{background:var(--bg-2);border:1px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:6px}
  .panel-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--neuro);letter-spacing:1.1px}
  .guide-line{font-size:10px;color:var(--fg-dim);line-height:1.45}

  /* 巡查进度 */
  .prog-bar{height:8px;background:var(--bg-3);border:1px solid var(--line);position:relative;overflow:hidden}
  .prog-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--neuro);transition:width .25s}
  .prog-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-mute)}

  /* 质检统计 */
  .stat-row{display:flex;justify-content:space-between;align-items:baseline}
  .stat-label{font-size:10px;color:var(--fg-dim)}
  .stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
  .stat-val.clean{color:var(--MEMORY)}
  .stat-val.del{color:var(--FIRING)}
  .stat-val.miss{color:var(--DENDRITE)}

  .spacer{flex:1 1 auto}

  .lang-btn{
    width:100%;background:var(--bg-2);border:1px solid var(--line-strong);
    color:var(--fg-dim);font-family:'JetBrains Mono',monospace;font-size:11px;
    padding:8px;cursor:pointer;letter-spacing:1px;
    transition:background .15s,color .15s,border-color .15s;
  }
  .lang-btn:hover{background:var(--bg-3);color:var(--fg);border-color:var(--neuro)}

  /* ============ main ============ */
  .game-main{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;position:relative}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:12px 18px;border-bottom:1px solid var(--line);background:var(--bg-1);
  }
  .topbar .corq{font-size:13px;color:var(--fg);font-weight:600}
  .topbar .corq small{display:block;font-size:10px;color:var(--fg-dim);font-weight:400;margin-top:2px}
  .controls{display:flex;gap:8px;align-items:center}
  .btn{
    background:var(--bg-2);border:1px solid var(--line-strong);color:var(--fg);
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;cursor:pointer;
    letter-spacing:.5px;transition:background .15s,border-color .15s,opacity .15s;
  }
  .btn:hover{background:var(--bg-3);border-color:var(--neuro)}
  .btn.primary{background:var(--neuro);border-color:var(--neuro);color:var(--bg-0);font-weight:600}
  .btn.primary:hover{background:var(--FIRING)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--neuro)}

  /* recording stage */
  .scope-wrap{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;padding:16px 18px;gap:12px}
  .scope-frame{
    flex:1 1 auto;min-height:0;position:relative;
    background:var(--bg-1);border:1px solid var(--line);overflow:hidden;
    display:flex;flex-direction:column;
  }
  canvas#scope{display:block;width:100%;flex:1 1 auto}

  /* judgement overlay */
  .verdict{
    position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    width:min(560px,90%);
    background:var(--bg-2);border:1px solid var(--neuro);
    box-shadow:4px 4px 0 var(--bg-0);
    padding:14px 16px;display:none;flex-direction:column;gap:10px;
  }
  .verdict.show{display:flex}
  .verdict .vq{font-size:13px;color:var(--fg);font-weight:600}
  .verdict .vhint{font-size:10px;color:var(--fg-dim);line-height:1.4}
  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .opt-btn{
    background:var(--bg-3);border:1px solid var(--line-strong);color:var(--fg);
    font-size:12px;padding:9px 8px;cursor:pointer;text-align:left;
    display:flex;flex-direction:column;gap:2px;
    transition:background .12s,border-color .12s;
  }
  .opt-btn:hover{background:var(--bg-2);border-color:var(--neuro)}
  .opt-btn .ok{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-mute);letter-spacing:.5px}

  /* consequence feedback toast */
  .toast{
    position:absolute;left:50%;top:16px;transform:translateX(-50%);
    width:min(560px,90%);
    padding:11px 14px;border:1px solid var(--line-strong);background:var(--bg-2);
    box-shadow:3px 3px 0 var(--bg-0);
    display:none;flex-direction:column;gap:3px;
  }
  .toast.show{display:flex}
  .toast.good{border-color:var(--MEMORY)}
  .toast.bad{border-color:var(--FIRING)}
  .toast .tt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.8px}
  .toast.good .tt{color:var(--MEMORY)}
  .toast.bad .tt{color:var(--FIRING)}
  .toast .tb{font-size:11px;color:var(--fg-dim);line-height:1.45}

  /* finish / unlock card */
  .finish{
    position:absolute;inset:0;background:oklch(0.14 0.03 25 / 0.92);
    display:none;align-items:center;justify-content:center;z-index:5;
  }
  .finish.show{display:flex}
  .finish-card{
    width:min(460px,86%);background:var(--bg-1);border:1px solid var(--neuro);
    box-shadow:6px 6px 0 var(--bg-0);padding:24px;display:flex;flex-direction:column;gap:14px;align-items:center;
  }
  .finish-card .badge{
    width:96px;height:96px;border:2px solid var(--MEMORY);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .finish-card .badge.lock{border-color:var(--DENDRITE)}
  .finish-card .badge svg{width:64px;height:64px}
  .finish-card .ftitle{font-size:17px;font-weight:700;color:var(--fg);text-align:center}
  .finish-card .fline{font-size:12px;color:var(--fg-dim);line-height:1.5;text-align:center}
  .finish-card .fstat{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--neuro);
    width:100%;display:flex;flex-direction:column;gap:4px;
    border-top:1px solid var(--line);padding-top:12px;
  }
  .finish-card .fstat .r{display:flex;justify-content:space-between}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-mute)}
  .legend i{display:inline-block;width:18px;height:3px;vertical-align:middle;margin-right:4px}
</style>
</head>
<body>
<div class="stage">
  <!-- ============ SIDEBAR ============ -->
  <aside class="game-sidebar">
    <div class="brand">
      <span class="code">NRO-20 · M15</span>
      <span class="title" data-i18n="brandTitle">信号质检员</span>
      <span class="sub" data-i18n="brandSub">巡查一段连续 EEG 录音，揪出眨眼、咬牙、动作这些假脑波。</span>
    </div>

    <div class="mascot" aria-hidden="true">
      <svg viewBox="0 0 120 120">
        <!-- Spark — branching dendrite -->
        <g fill="none" stroke="var(--neuro)" stroke-width="2.4" stroke-linecap="round">
          <path d="M60 96 L60 64"/>
          <path d="M60 64 L42 46"/><path d="M60 64 L78 46"/>
          <path d="M42 46 L30 34"/><path d="M42 46 L40 28"/>
          <path d="M78 46 L90 34"/><path d="M78 46 L80 28"/>
          <path d="M60 64 L60 40"/>
        </g>
        <g fill="var(--FIRING)">
          <circle cx="60" cy="96" r="6"/>
          <circle cx="30" cy="34" r="3.4"/><circle cx="40" cy="28" r="3.4"/>
          <circle cx="90" cy="34" r="3.4"/><circle cx="80" cy="28" r="3.4"/>
          <circle cx="60" cy="40" r="3.4"/>
        </g>
        <circle cx="60" cy="64" r="5" fill="var(--MEMORY)"/>
      </svg>
    </div>

    <div class="panel">
      <span class="panel-title" data-i18n="dutyTitle">质检守则</span>
      <span class="guide-line" data-i18n="duty1">录音自动滚动播放，遇到大跳动会自动暂停等你判定。</span>
      <span class="guide-line" data-i18n="duty2">先认它是什么，再决定「标记伪迹」或「放行」。</span>
      <span class="guide-line" data-i18n="duty3">误删真脑波会丢有用数据；漏标伪迹会污染训练集。</span>
    </div>

    <div class="panel">
      <span class="panel-title" data-i18n="progTitle">巡查进度</span>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <span class="prog-text" id="progText">0 / 8 段</span>
    </div>

    <div class="panel">
      <span class="panel-title" data-i18n="statTitle">质检台账</span>
      <div class="stat-row"><span class="stat-label" data-i18n="sClean">正确处理</span><span class="stat-val clean" id="sClean">0</span></div>
      <div class="stat-row"><span class="stat-label" data-i18n="sDel">误删真波</span><span class="stat-val del" id="sDel">0</span></div>
      <div class="stat-row"><span class="stat-label" data-i18n="sMiss">漏标伪迹</span><span class="stat-val miss" id="sMiss">0</span></div>
    </div>

    <div class="spacer"></div>
    <button class="lang-btn" id="langBtn" type="button">EN / 中文</button>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="game-main">
    <div class="topbar">
      <div class="corq">
        <span data-i18n="corqMain">你的班次：揪出假脑波</span>
        <small data-i18n="corqSub">眨眼、咬牙、动作伪迹长得像脑波，却不是大脑发出的。</small>
      </div>
      <div class="controls">
        <span class="clock" id="clock">t = 0.0 s</span>
        <button class="btn primary" id="patrolBtn" type="button" data-i18n="btnStart">开始巡查</button>
        <button class="btn" id="resetBtn" type="button" data-i18n="btnReset">重置</button>
      </div>
    </div>

    <div class="scope-wrap">
      <div class="scope-frame">
        <canvas id="scope"></canvas>

        <!-- consequence toast -->
        <div class="toast" id="toast">
          <span class="tt" id="toastTitle"></span>
          <span class="tb" id="toastBody"></span>
        </div>

        <!-- judgement overlay -->
        <div class="verdict" id="verdict">
          <span class="vq" id="verdictQ" data-i18n="verdictQ">这段大跳动是什么？该怎么处理？</span>
          <span class="vhint" id="verdictHint"></span>
          <div class="opt-grid" id="optGrid"></div>
        </div>

        <!-- finish / unlock -->
        <div class="finish" id="finish">
          <div class="finish-card">
            <div class="badge" id="finishBadge">
              <svg viewBox="0 0 64 64" fill="none" stroke="var(--MEMORY)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 6 L54 16 V32 C54 46 44 54 32 58 C20 54 10 46 10 32 V16 Z"/>
                <path d="M22 32 L29 39 L43 24"/>
              </svg>
            </div>
            <span class="ftitle" id="finishTitle"></span>
            <span class="fline" id="finishLine"></span>
            <div class="fstat" id="finishStat"></div>
            <button class="btn primary" id="finishBtn" type="button" data-i18n="btnAgain">再巡查一遍</button>
          </div>
        </div>
      </div>

      <div class="legend">
        <span><i style="background:var(--neuro)"></i><span data-i18n="legSig">信号</span></span>
        <span><i style="background:var(--FIRING)"></i><span data-i18n="legNow">当前判定窗</span></span>
        <span><i style="background:var(--MEMORY)"></i><span data-i18n="legClean">已确认干净</span></span>
        <span><i style="background:var(--DENDRITE)"></i><span data-i18n="legMark">已标记伪迹</span></span>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  'use strict';

  // ---------- i18n ----------
  var I18N = {
    'zh-CN': {
      brandTitle:'信号质检员', brandSub:'巡查一段连续 EEG 录音，揪出眨眼、咬牙、动作这些假脑波。',

      duty1:'录音自动滚动播放，遇到大跳动会自动暂停等你判定。',
      duty2:'先认它是什么，再决定「标记伪迹」或「放行」。',
      duty3:'误删真脑波会丢有用数据；漏标伪迹会污染训练集。',
      progTitle:'巡查进度', statTitle:'质检台账',
      sClean:'正确处理', sDel:'误删真波', sMiss:'漏标伪迹',
      corqMain:'你的班次：揪出假脑波',
      corqSub:'眨眼、咬牙、动作伪迹长得像脑波，却不是大脑发出的。',
      btnStart:'开始巡查', btnPause:'暂停巡查', btnReset:'重置', btnAgain:'再巡查一遍',
      verdictQ:'这段大跳动是什么？该怎么处理？',
      legSig:'信号', legNow:'当前判定窗', legClean:'已确认干净', legMark:'已标记伪迹',
      segLabel:'段',
      k_blink:'眨眼伪迹', k_jaw:'咬牙伪迹', k_move:'动作伪迹', k_mains:'工频干扰', k_real:'真实脑波',
      optMarkBlink:'标记为眨眼伪迹', optMarkJaw:'标记为咬牙伪迹', optMarkMove:'标记为动作伪迹',
      optMarkMains:'标记为工频干扰', optPass:'放行（真脑波，保留）',
      sub_mark:'剔除，不进训练集', sub_pass:'保留进训练集',

      hint_mains:'非常规整的等距正弦叠加，像电网哼声。',
      hint_real:'平滑连续的约 10 Hz 节律，幅度温和，符合正常脑电。',
      goodMark:'处理正确', goodPass:'处理正确',
      msgGoodMark:'你认出了{k}并剔除，这段数据被清理干净。',
      msgGoodPass:'你认出这是真脑波并放行，宝贵数据被保留下来。',
      badDel:'误删！', msgBadDel:'这其实是真实脑波，被你当伪迹删掉了——一段有用数据永久丢失。',
      badMiss:'漏标！', msgBadMiss:'这其实是{k}，你放行了它——脏数据混进了训练集。',
      badWrongType:'类型认错', msgWrongType:'你把{got}误判成了{exp}，不过它确实是伪迹，已剔除（类型记错了）。',
      finPass:'通过！解锁「信号质检员」', finFail:'未通过质检',
      finLinePass:'你的误删率和漏标率都够低，数据质量过关，正式获得「信号质检员」资格。',
      finLineFail:'误删或漏标太多，数据质量不达标。看清波形再决策，重试一次。',
      fAcc:'判读准确', fDel:'误删真波', fMiss:'漏标伪迹', fGate:'通关线'
    },
    'en': {
      brandTitle:'Signal Inspector', brandSub:'Patrol a continuous EEG recording and catch the fake brain waves: blinks, jaw clenches, motion.',
      dutyTitle:'Inspector Duties',
      duty1:'The recording auto-scrolls and pauses on big jumps for your call.',
      duty2:'Identify what it is first, then choose Flag as artifact or Pass.',
      duty3:'Deleting a real wave loses good data; missing an artifact pollutes the training set.',
      progTitle:'Patrol Progress', statTitle:'Inspection Log',
      sClean:'Handled right', sDel:'Real wave deleted', sMiss:'Artifact missed',
      corqMain:'Your shift: catch the fake brain waves',
      corqSub:'Blink, jaw and motion artifacts look like waves but the brain never sent them.',
      btnStart:'Start Patrol', btnPause:'Pause Patrol', btnReset:'Reset', btnAgain:'Patrol Again',
      verdictQ:'What is this big jump, and how do you handle it?',
      legSig:'Signal', legNow:'Decision window', legClean:'Confirmed clean', legMark:'Flagged artifact',
      segLabel:'seg',
      k_blink:'Blink artifact', k_jaw:'Jaw-clench artifact', k_move:'Motion artifact', k_mains:'Mains noise', k_real:'Real brain wave',
      optMarkBlink:'Flag as blink artifact', optMarkJaw:'Flag as jaw-clench', optMarkMove:'Flag as motion artifact',
      optMarkMains:'Flag as mains noise', optPass:'Pass (real wave, keep)',
      sub_mark:'Remove, drop from set', sub_pass:'Keep in training set',
      hint_blink:'A tall, rounded slow bump on the frontal channel, about 0.3 s, like a single hump.',
      hint_jaw:'A dense, jittery burst of high-frequency fuzz, sustained, over the temporal side.',
      hint_move:'The whole baseline suddenly shifts and drifts away, huge and irregular.',
      hint_mains:'A very regular, evenly spaced sine sitting on top, like a power-line hum.',
      hint_real:'A smooth, continuous about 10 Hz rhythm with mild amplitude, normal EEG.',
      goodMark:'Correct call', goodPass:'Correct call',
      msgGoodMark:'You recognised the {k} and removed it. This stretch is clean.',
      msgGoodPass:'You recognised a real brain wave and passed it. Precious data kept.',
      badDel:'Wrongly deleted!', msgBadDel:'That was a real brain wave you flagged as an artifact. Good data lost for good.',
      badMiss:'Missed!', msgBadMiss:'That was a {k} you passed. Dirty data slipped into the training set.',
      badWrongType:'Wrong type', msgWrongType:'You called a {got} a {exp}, but it was an artifact, so it was removed (type mislabelled).',
      finPass:'Passed! "Signal Inspector" unlocked', finFail:'Inspection not passed',
      finLinePass:'Both your false-delete and miss rates are low enough. Data quality passes. You are now a certified Signal Inspector.',
      finLineFail:'Too many false deletes or misses; data quality fails. Read the waveform before deciding and try again.',
      fAcc:'Read accuracy', fDel:'Real waves deleted', fMiss:'Artifacts missed', fGate:'Pass line'
    }
  };
  var lang = 'zh-CN';
  function t(k){ return (I18N[lang] && I18N[lang][k]) || k; }
  function applyI18n(){
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    document.documentElement.lang = lang;
  }

  // ---------- recording script: 8 segments along a timeline ----------
  // kind: blink/jaw/move/mains = artifact ; real = keep
  var SEGMENTS = [
    { kind:'real'  },
    { kind:'blink' },
    { kind:'real'  },
    { kind:'jaw'   },
    { kind:'move'  },
    { kind:'real'  },
    { kind:'mains' },
    { kind:'blink' }
  ];
  var TOTAL = SEGMENTS.length;

  // ---------- canvas scope ----------
  var canvas = document.getElementById('scope');
  var gtx = canvas.getContext('2d');
  function fitCanvas(){
    var r = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(2, Math.floor(r.width * dpr));
    canvas.height = Math.max(2, Math.floor(r.height * dpr));
    gtx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', function(){ fitCanvas(); });

  var SEG_DUR = 2.6;            // seconds of "tape" per segment
  var WIN_FRAC = 0.34;          // playhead position from left as fraction of visible span
  var stateGame = {
    running:false, paused:false, finished:false,
    tape:0,                     // current playhead in seconds
    idx:0,                      // next segment awaiting verdict
    pendingDecision:false,
    clean:0, del:0, miss:0,
    handled:[]                  // per-segment outcome: 'clean'|'del'|'miss'|'wrongtype'|null
  };
  for (var i=0;i<TOTAL;i++) stateGame.handled.push(null);

  var col = {
    neuro:'oklch(0.75 0.17 25)', firing:'oklch(0.92 0.08 25)',
    memory:'oklch(0.85 0.14 85)', dendrite:'oklch(0.55 0.15 25)',
    dim:'oklch(0.5 0.04 25)', line:'oklch(0.36 0.05 25 / 0.4)'
  };

  // deterministic per-segment waveform; gT = global tape time in seconds
  function wave(kind, gT){
    var base = Math.sin(gT * 2*Math.PI * 1.6) * 0.12;     // gentle slow drift baseline
    switch(kind){
      case 'real':
        return base + Math.sin(gT*2*Math.PI*10)*0.22 + Math.sin(gT*2*Math.PI*6)*0.08;
      case 'blink': {
        var c = (Math.floor(gT/SEG_DUR)+0.5)*SEG_DUR;
        var d = gT - c;
        var bump = Math.exp(-(d*d)/(2*0.18*0.18)) * 0.95;
        return base*0.5 + bump + Math.sin(gT*2*Math.PI*9)*0.06;
      }
      case 'jaw':
        return base + (Math.sin(gT*2*Math.PI*55)+Math.sin(gT*2*Math.PI*78))*0.28 + Math.sin(gT*2*Math.PI*40)*0.18;
      case 'move': {
        var s = Math.floor(gT/SEG_DUR)*SEG_DUR;
        var lt = (gT - s)/SEG_DUR;
        return base + (lt-0.5)*1.6 + Math.sin(gT*2*Math.PI*2.2)*0.3;
      }
      case 'mains':
        return base*0.6 + Math.sin(gT*2*Math.PI*50)*0.4;
      default:
        return base;
    }
  }
  function isArtifact(kind){ return kind !== 'real'; }

  // ---------- drawing ----------
  function draw(){
    var W = canvas.getBoundingClientRect().width;
    var H = canvas.getBoundingClientRect().height;
    if (W < 2 || H < 2) return;
    gtx.clearRect(0,0,W,H);
    gtx.fillStyle = 'oklch(0.16 0.03 25)';
    gtx.fillRect(0,0,W,H);

    var midY = H*0.5;
    var amp = H*0.30;
    var spanSec = SEG_DUR * 2.4;                 // visible seconds
    var leftSec = stateGame.tape - WIN_FRAC*spanSec;
    var pxPerSec = W / spanSec;

    // baseline
    gtx.strokeStyle = col.line; gtx.lineWidth = 1;
    gtx.beginPath(); gtx.moveTo(0,midY); gtx.lineTo(W,midY); gtx.stroke();

    // segment shading (resolved outcomes)
    for (var s=0;s<TOTAL;s++){
      var segStart = s*SEG_DUR;
      var x0 = (segStart - leftSec)*pxPerSec;
      var x1 = (segStart+SEG_DUR - leftSec)*pxPerSec;
      if (x1 < 0 || x0 > W) continue;
      var oc = stateGame.handled[s];
      if (oc === 'clean'){ gtx.fillStyle = 'oklch(0.85 0.14 85 / 0.08)'; gtx.fillRect(x0,0,x1-x0,H); }
      else if (oc === 'del'){ gtx.fillStyle = 'oklch(0.92 0.08 25 / 0.10)'; gtx.fillRect(x0,0,x1-x0,H); }
      else if (oc === 'miss' || oc === 'wrongtype'){ gtx.fillStyle = 'oklch(0.55 0.15 25 / 0.12)'; gtx.fillRect(x0,0,x1-x0,H); }
      gtx.strokeStyle = col.line;
      gtx.beginPath(); gtx.moveTo(x1,0); gtx.lineTo(x1,H); gtx.stroke();
    }

    // decision window highlight
    if (stateGame.idx < TOTAL && stateGame.pendingDecision){
      var ws = stateGame.idx*SEG_DUR;
      var wx0 = (ws - leftSec)*pxPerSec;
      var wx1 = (ws+SEG_DUR - leftSec)*pxPerSec;
      gtx.fillStyle = 'oklch(0.92 0.08 25 / 0.07)';
      gtx.fillRect(wx0,0,wx1-wx0,H);
      gtx.strokeStyle = col.firing; gtx.lineWidth = 1.5;
      gtx.strokeRect(wx0,2,wx1-wx0,H-4);
    }

    // waveform — only up to playhead
    gtx.strokeStyle = col.neuro; gtx.lineWidth = 1.6;
    gtx.beginPath();
    var started = false;
    for (var px=0; px<=W; px++){
      var ts = leftSec + px/pxPerSec;
      if (ts < 0 || ts > stateGame.tape) continue;
      var segIdx = Math.floor(ts/SEG_DUR);
      if (segIdx<0 || segIdx>=TOTAL) continue;
      var y = midY - wave(SEGMENTS[segIdx].kind, ts)*amp;
      if (!started){ gtx.moveTo(px,y); started = true; } else gtx.lineTo(px,y);
    }
    gtx.stroke();

    // playhead
    var phx = WIN_FRAC*spanSec*pxPerSec;
    gtx.strokeStyle = col.firing; gtx.lineWidth = 1;
    gtx.setLineDash([4,4]);
    gtx.beginPath(); gtx.moveTo(phx,0); gtx.lineTo(phx,H); gtx.stroke();
    gtx.setLineDash([]);

    // segment labels
    gtx.fillStyle = col.dim;
    gtx.font = "10px 'JetBrains Mono', monospace";
    for (var s2=0;s2<TOTAL;s2++){
      var lx = (s2*SEG_DUR - leftSec)*pxPerSec + 4;
      if (lx<0 || lx>W-30) continue;
      gtx.fillText(t('segLabel')+' '+(s2+1), lx, 14);
    }
  }

  // ---------- timeline loop ----------
  var lastTs = 0;
  function loop(now){
    if (!lastTs) lastTs = now;
    var dt = Math.min(0.05, (now - lastTs)/1000);
    lastTs = now;
    if (stateGame.running && !stateGame.paused && !stateGame.pendingDecision && !stateGame.finished){
      stateGame.tape += dt;
      var reachEnd = (stateGame.idx+1)*SEG_DUR;
      if (stateGame.tape >= reachEnd){
        stateGame.tape = reachEnd;
        stateGame.pendingDecision = true;
        stateGame.paused = true;
        openVerdict();
        setPatrolLabel();
      }
    }
    document.getElementById('clock').textContent = 't = ' + stateGame.tape.toFixed(1) + ' s';
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- verdict UI ----------
  var verdictEl = document.getElementById('verdict');
  var optGrid = document.getElementById('optGrid');
  var verdictHint = document.getElementById('verdictHint');

  function makeOpt(labelKey, subKey, value){
    var b = document.createElement('button');
    b.className = 'opt-btn'; b.type='button';
    var l = document.createElement('span'); l.textContent = t(labelKey);
    var sub = document.createElement('span'); sub.className='ok'; sub.textContent = t(subKey);
    b.appendChild(l); b.appendChild(sub);
    b.setAttribute('data-val', value);
    b.addEventListener('click', function(){ decide(value); });
    return b;
  }

  function openVerdict(){
    var seg = SEGMENTS[stateGame.idx];
    verdictHint.textContent = t('hint_'+seg.kind);
    optGrid.innerHTML = '';
    optGrid.appendChild(makeOpt('optMarkBlink','sub_mark','blink'));
    optGrid.appendChild(makeOpt('optMarkJaw','sub_mark','jaw'));
    optGrid.appendChild(makeOpt('optMarkMove','sub_mark','move'));
    optGrid.appendChild(makeOpt('optMarkMains','sub_mark','mains'));
    var pass = makeOpt('optPass','sub_pass','pass');
    pass.style.gridColumn = '1 / span 2';
    optGrid.appendChild(pass);
    verdictEl.classList.add('show');
  }

  function showToast(cls, titleKey, body){
    var toast = document.getElementById('toast');
    toast.className = 'toast show ' + cls;
    document.getElementById('toastTitle').textContent = t(titleKey);
    document.getElementById('toastBody').textContent = body;
    clearTimeout(showToast._tm);
    showToast._tm = setTimeout(function(){ toast.classList.remove('show'); }, 2600);
  }

  function decide(value){
    if (!stateGame.pendingDecision) return;
    var seg = SEGMENTS[stateGame.idx];
    var kind = seg.kind;
    var artifact = isArtifact(kind);
    var outcome;

    if (value === 'pass'){
      if (!artifact){
        outcome = 'clean'; stateGame.clean++;
        showToast('good','goodPass', t('msgGoodPass'));
      } else {
        outcome = 'miss'; stateGame.miss++;
        showToast('bad','badMiss', t('msgBadMiss').replace('{k}', t('k_'+kind)));
      }
    } else {
      if (!artifact){
        outcome = 'del'; stateGame.del++;
        showToast('bad','badDel', t('msgBadDel'));
      } else if (value === kind){
        outcome = 'clean'; stateGame.clean++;
        showToast('good','goodMark', t('msgGoodMark').replace('{k}', t('k_'+kind)));
      } else {
        outcome = 'wrongtype'; stateGame.clean++;
        showToast('bad','badWrongType',
          t('msgWrongType').replace('{got}', t('k_'+value)).replace('{exp}', t('k_'+kind)));
      }
    }

    stateGame.handled[stateGame.idx] = outcome;
    stateGame.idx++;
    stateGame.pendingDecision = false;
    verdictEl.classList.remove('show');
    updateHud();

    if (stateGame.idx >= TOTAL){
      finishPatrol();
    } else {
      stateGame.paused = false;
      setPatrolLabel();
    }
  }

  // ---------- HUD ----------
  function updateHud(){
    document.getElementById('sClean').textContent = stateGame.clean;
    document.getElementById('sDel').textContent = stateGame.del;
    document.getElementById('sMiss').textContent = stateGame.miss;
    var done = stateGame.idx;
    document.getElementById('progFill').style.width = (done/TOTAL*100)+'%';
    document.getElementById('progText').textContent = done + ' / ' + TOTAL + ' ' + t('segLabel');
  }

  // ---------- finish ----------
  function finishPatrol(){
    stateGame.finished = true;
    stateGame.running = false;
    setPatrolLabel();
    var acc = Math.round((stateGame.clean / TOTAL) * 100);
    var pass = (stateGame.del === 0 && stateGame.miss <= 1 && acc >= 75);
    var fin = document.getElementById('finish');
    var badge = document.getElementById('finishBadge');
    var svg = badge.querySelector('svg');
    if (pass){
      badge.className = 'badge';
      svg.setAttribute('stroke','var(--MEMORY)');
      document.getElementById('finishTitle').textContent = t('finPass');
      document.getElementById('finishLine').textContent = t('finLinePass');
    } else {
      badge.className = 'badge lock';
      svg.setAttribute('stroke','var(--DENDRITE)');
      document.getElementById('finishTitle').textContent = t('finFail');
      document.getElementById('finishLine').textContent = t('finLineFail');
    }
    document.getElementById('finishStat').innerHTML =
      '<div class="r"><span>'+t('fAcc')+'</span><span>'+acc+'%</span></div>'+
      '<div class="r"><span>'+t('fDel')+'</span><span>'+stateGame.del+'</span></div>'+
      '<div class="r"><span>'+t('fMiss')+'</span><span>'+stateGame.miss+'</span></div>'+
      '<div class="r"><span>'+t('fGate')+'</span><span>del=0 / miss&le;1 / acc&ge;75%</span></div>';
    fin.classList.add('show');
  }

  // ---------- controls ----------
  var patrolBtn = document.getElementById('patrolBtn');
  function setPatrolLabel(){
    patrolBtn.textContent = (stateGame.running && !stateGame.paused && !stateGame.pendingDecision && !stateGame.finished)
      ? t('btnPause') : t('btnStart');
  }
  patrolBtn.addEventListener('click', function(){
    if (stateGame.finished) return;
    if (!stateGame.running){
      stateGame.running = true; stateGame.paused = false;
    } else if (!stateGame.pendingDecision){
      stateGame.paused = !stateGame.paused;
    }
    setPatrolLabel();
  });

  function resetAll(){
    stateGame.running=false; stateGame.paused=false; stateGame.finished=false;
    stateGame.tape=0; stateGame.idx=0; stateGame.pendingDecision=false;
    stateGame.clean=0; stateGame.del=0; stateGame.miss=0;
    for (var i=0;i<TOTAL;i++) stateGame.handled[i]=null;
    verdictEl.classList.remove('show');
    document.getElementById('finish').classList.remove('show');
    document.getElementById('toast').classList.remove('show');
    updateHud(); setPatrolLabel();
  }
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('finishBtn').addEventListener('click', resetAll);

  // ---------- lang ----------
  document.getElementById('langBtn').addEventListener('click', function(){
    lang = (lang === 'zh-CN') ? 'en' : 'zh-CN';
    applyI18n();
    setPatrolLabel();
    updateHud();
    if (stateGame.pendingDecision) openVerdict();
    if (stateGame.finished) finishPatrol();
  });

  // ---------- init ----------
  applyI18n();
  fitCanvas();
  updateHud();
  setPatrolLabel();
  requestAnimationFrame(loop);

  // expose for test harness
  window.__m15 = {
    state: stateGame,
    decide: decide,
    start: function(){ if(!stateGame.running){ stateGame.running=true; stateGame.paused=false; setPatrolLabel(); } },
    segments: SEGMENTS
  };
})();
</script>
</body>
</html>
