<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方差分左右手 — 实验设计</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg: oklch(0.96 0.01 265);
    --fg-dim: oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    /* 第 2 层 — math signature accent */
    --accent: oklch(0.72 0.17 245);
    /* 第 3 层 — math 5 色 palette (themes.js id:math) */
    --m-axis: oklch(0.72 0.17 245);
    --m-proof: oklch(0.52 0.16 245);
    --m-shadow: oklch(0.35 0.10 245);
    --m-solution: oklch(0.92 0.08 240);
    --m-qed: oklch(0.85 0.14 85);
    /* 两类: 左手 / 右手 */
    --c-left: oklch(0.72 0.17 245);
    --c-right: oklch(0.85 0.14 85);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100vh;overflow:hidden;
    background:var(--bg-0);color:var(--fg);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;}
  body{display:flex;}

  /* ---- sidebar 200px ---- */
  .game-sidebar{
    width:208px;flex-shrink:0;height:100vh;
    background:var(--bg-1);border-right:1px solid var(--line);
    display:flex;flex-direction:column;gap:13px;padding:15px 13px;overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand h1{font-size:13.5px;font-weight:700;margin:0;line-height:1.25;color:var(--fg);}
  .brand .code{font-size:9px;color:var(--fg-mute);letter-spacing:1px;}
  .mascot{width:33px;height:33px;flex-shrink:0;}

  /* 路线图 S1-S6 */
  .road{display:flex;flex-direction:column;gap:0;background:var(--bg-2);
    border:1px solid var(--line);padding:9px 10px;}
  .road .rh{font-size:9px;color:var(--fg-mute);letter-spacing:.5px;margin-bottom:6px;}
  .rstep{display:flex;align-items:center;gap:7px;padding:2.5px 0;font-size:10px;color:var(--fg-mute);}
  .rstep .dot{width:8px;height:8px;flex-shrink:0;border:1px solid var(--line-strong);
    background:var(--bg-3);border-radius:50%;}
  .rstep.done{color:var(--fg-dim);}
  .rstep.done .dot{background:var(--m-proof);border-color:var(--m-proof);}
  .rstep.here{color:var(--m-qed);font-weight:700;}
  .rstep.here .dot{background:var(--m-qed);border-color:var(--m-qed);
    box-shadow:0 0 0 3px oklch(0.85 0.14 85 / 0.2);}

  /* 实验参数 */
  .param{background:var(--bg-2);border:1px solid var(--line);padding:8px 9px;}
  .param .ph{font-size:9.5px;color:var(--accent);font-weight:700;letter-spacing:.4px;margin-bottom:6px;}
  .opts{display:flex;gap:5px;}
  .opt{flex:1;background:var(--bg-3);border:1px solid var(--line-strong);color:var(--fg-dim);
    font-family:inherit;font-size:11px;font-weight:600;padding:6px 4px;cursor:pointer;text-align:center;
    box-shadow:2px 2px 0 var(--bg-0);transition:transform .07s,box-shadow .07s;}
  .opt:hover{transform:translate(-1px,-1px);}
  .opt.sel{border-color:var(--accent);background:var(--m-shadow);color:var(--fg);
    box-shadow:2px 2px 0 var(--accent);}
  .param .sub{font-size:8.5px;color:var(--fg-mute);margin-top:5px;line-height:1.3;}

  .lang-btn,.btn{background:var(--bg-2);border:1px solid var(--line-strong);
    color:var(--fg);font-family:inherit;font-size:11px;font-weight:600;
    padding:8px 10px;cursor:pointer;box-shadow:3px 3px 0 var(--bg-0);
    transition:transform .08s,box-shadow .08s;}
  .lang-btn:hover,.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--bg-0);}
  .lang-btn:active,.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--bg-0);}
  .btn-run{border-color:var(--accent);color:var(--m-solution);font-weight:700;}
  .mt-auto{margin-top:auto;}

  /* ---- main ---- */
  .game-main{flex:1;height:100vh;display:flex;flex-direction:column;
    padding:15px;gap:11px;min-width:0;position:relative;}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;}
  .topbar h2{font-size:14px;font-weight:700;margin:0;color:var(--fg);}
  .topbar .hint{font-size:10px;color:var(--fg-mute);margin-top:3px;}
  .hud{display:flex;gap:8px;}
  .hud .cell{background:var(--bg-2);border:1px solid var(--line);padding:5px 11px;text-align:center;min-width:78px;}
  .hud .lbl{font-size:9px;color:var(--fg-mute);letter-spacing:.5px;}
  .hud .val{font-size:18px;font-weight:700;color:var(--accent);line-height:1.1;}
  .hud .cell.accCell .val{color:var(--m-qed);}

  .stage-wrap{flex:1;display:flex;flex-direction:column;min-height:0;
    background:var(--bg-1);border:1px solid var(--line);position:relative;}
  #stage{flex:1;width:100%;height:100%;display:block;}

  /* 阈值控制条 */
  .threshbar{flex-shrink:0;background:var(--bg-1);border:1px solid var(--line);
    padding:9px 14px;display:flex;align-items:center;gap:14px;}
  .threshbar .tl{font-size:10px;color:var(--fg-dim);white-space:nowrap;}
  .threshbar .tv{font-size:13px;color:var(--m-solution);font-weight:700;min-width:42px;}
  input[type=range]{flex:1;accent-color:oklch(0.72 0.17 245);cursor:pointer;}

  /* 终点徽记 */
  .endgoal{position:absolute;bottom:14px;right:18px;display:flex;align-items:center;gap:8px;
    opacity:0.85;pointer-events:none;z-index:5;}
  .endgoal svg{width:34px;height:34px;}
  .endgoal .et{font-size:9px;color:var(--fg-mute);line-height:1.3;max-width:130px;}

  #toast{position:absolute;top:16px;left:50%;transform:translateX(-50%);
    background:var(--bg-3);border:1px solid var(--m-qed);color:var(--m-qed);
    padding:9px 18px;font-size:13px;font-weight:700;display:none;z-index:30;
    box-shadow:3px 3px 0 var(--bg-0);max-width:80%;text-align:center;}

  /* 解锁横幅 */
  #unlock{position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:oklch(0.14 0.035 265 / 0.92);z-index:40;text-align:center;padding:24px;}
  #unlock .ut{font-size:20px;font-weight:800;color:var(--m-qed);}
  #unlock .us{font-size:13px;color:var(--fg-dim);line-height:1.6;max-width:480px;}
  #unlock .ubadge{font-size:12px;color:var(--m-solution);border:1px solid var(--accent);
    padding:8px 16px;background:var(--bg-2);box-shadow:3px 3px 0 var(--bg-0);font-weight:700;}
</style>
</head>
<body>

<aside class="game-sidebar">
  <div class="brand">
    <svg class="mascot" viewBox="0 0 40 40" aria-hidden="true">
      <polygon points="20,5 35,31 5,31" fill="none" stroke="var(--m-axis)" stroke-width="1.6"/>
      <polygon points="20,5 35,31 20,23" fill="var(--m-proof)" opacity="0.55"/>
      <polygon points="20,5 5,31 20,23" fill="var(--m-shadow)" opacity="0.7"/>
      <line x1="20" y1="5" x2="20" y2="23" stroke="var(--m-axis)" stroke-width="1.2"/>
      <text x="20" y="20" text-anchor="middle" font-size="9" fill="var(--m-solution)"
            font-family="Times,serif" font-style="italic">&#960;</text>
    </svg>
    <div>
      <h1 id="title">方差分左右手</h1>
      <div class="code">MTH-06 · M23</div>
    </div>
  </div>

  <div class="road">
    <div class="rh" id="roadHead">脑控 Minecraft 路线</div>
    <div class="rstep done"><span class="dot"></span><span id="r1">S1 读懂脑电</span></div>
    <div class="rstep done"><span class="dot"></span><span id="r2">S2 清洗信号</span></div>
    <div class="rstep here"><span class="dot"></span><span id="r3">S3 提取特征 ← 你在这</span></div>
    <div class="rstep"><span class="dot"></span><span id="r4">S4 训练分类器</span></div>
    <div class="rstep"><span class="dot"></span><span id="r5">S5 实时解码</span></div>
    <div class="rstep"><span class="dot"></span><span id="r6">S6 脑控方块</span></div>
  </div>

  <div class="param">
    <div class="ph" id="pe">实验 1 · 选电极</div>
    <div class="opts" id="elecOpts">
      <button class="opt" data-elec="C3">C3</button>
      <button class="opt" data-elec="Cz">Cz</button>
      <button class="opt" data-elec="C4">C4</button>
    </div>
    <div class="sub" id="eSub">C3=左脑(控右手) · C4=右脑(控左手) · Cz=中线</div>
  </div>

  <div class="param">
    <div class="ph" id="pf">实验 2 · 选特征</div>
    <div class="opts" id="featOpts">
      <button class="opt" data-feat="var">方差</button>
      <button class="opt" data-feat="mean">均值</button>
    </div>
    <div class="sub" id="fSub">想象动作让节律抖动 → 方差变化</div>
  </div>

  <button class="btn btn-run" id="btnRun">跑实验 / Run</button>
  <button class="lang-btn mt-auto" id="langBtn">中 / EN</button>
</aside>

<main class="game-main">
  <div class="topbar">
    <div>
      <h2 id="stageTitle">第一次让电脑自动猜你想哪只手</h2>
      <div class="hint" id="stageHint">选电极+特征+阈值, 跑实验看用一个数能不能把左右手分开</div>
    </div>
    <div class="hud">
      <div class="cell"><div class="lbl" id="hElec">电极</div><div class="val" id="vElec">—</div></div>
      <div class="cell"><div class="lbl" id="hFeat">特征</div><div class="val" id="vFeat">—</div></div>
      <div class="cell accCell"><div class="lbl" id="hAcc">准确率</div><div class="val" id="vAcc">—</div></div>
    </div>
  </div>

  <div class="stage-wrap">
    <canvas id="stage"></canvas>
    <div id="toast"></div>
    <div class="endgoal">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <rect x="6" y="6" width="28" height="28" fill="none" stroke="var(--fg-mute)" stroke-width="1.4"/>
        <rect x="6" y="6" width="14" height="14" fill="var(--m-shadow)" opacity="0.6"/>
        <rect x="20" y="20" width="14" height="14" fill="var(--m-proof)" opacity="0.5"/>
        <rect x="20" y="6" width="14" height="14" fill="none" stroke="var(--fg-mute)" stroke-width="1"/>
        <rect x="6" y="20" width="14" height="14" fill="none" stroke="var(--fg-mute)" stroke-width="1"/>
      </svg>
      <div class="et" id="endText">终点: 用念头放下方块</div>
    </div>
  </div>

  <div class="threshbar">
    <span class="tl" id="threshLbl">阈值: 特征 &gt; 此值 → 判为左手</span>
    <input id="thresh" type="range" min="0" max="100" value="30" step="1">
    <span class="tv" id="threshVal">30</span>
  </div>

  <div id="unlock">
    <div class="ut" id="unlockTitle">解锁: 特征分类器设计者</div>
    <div class="us" id="unlockSub"></div>
    <div class="ubadge" id="unlockBadge">你做出了 BCI 第一个能用的特征!</div>
    <button class="btn" id="btnAgain">再试别的方案 / Try again</button>
  </div>
</main>

<script>
var LANG='cn';
var I18N={
  title:{cn:'方差分左右手', en:'Variance vs L/R Hand'},
  roadHead:{cn:'脑控 Minecraft 路线', en:'Brain-Minecraft Route'},
  r1:{cn:'S1 读懂脑电', en:'S1 Read EEG'},
  r2:{cn:'S2 清洗信号', en:'S2 Clean signal'},
  r3:{cn:'S3 提取特征 ← 你在这', en:'S3 Features <- you'},
  r4:{cn:'S4 训练分类器', en:'S4 Train clf'},
  r5:{cn:'S5 实时解码', en:'S5 Live decode'},
  r6:{cn:'S6 脑控方块', en:'S6 Mind blocks'},
  pe:{cn:'实验 1 · 选电极', en:'EXP 1 · Electrode'},
  eSub:{cn:'C3=左脑(控右手) · C4=右脑(控左手) · Cz=中线',
        en:'C3=left brain(R hand) · C4=right brain(L hand) · Cz=midline'},
  pf:{cn:'实验 2 · 选特征', en:'EXP 2 · Feature'},
  featVar:{cn:'方差', en:'variance'},
  featMean:{cn:'均值', en:'mean'},
  fSub:{cn:'想象动作让节律抖动 → 方差变化', en:'imagined move shakes rhythm -> variance changes'},
  run:{cn:'跑实验 / Run', en:'Run / Run experiment'},
  stageTitle:{cn:'第一次让电脑自动猜你想哪只手', en:'First time the computer guesses your hand'},
  stageHint:{cn:'选电极+特征+阈值, 跑实验看用一个数能不能把左右手分开',
             en:'pick electrode+feature+threshold, run to see if one number separates L/R'},
  hElec:{cn:'电极', en:'electrode'},
  hFeat:{cn:'特征', en:'feature'},
  hAcc:{cn:'准确率', en:'accuracy'},
  threshLbl:{cn:'阈值: 特征 > 此值 → 判为某只手', en:'threshold: feature > this -> one hand'},
  endText:{cn:'终点: 用念头放下方块', en:'goal: place blocks by thought'},
  axisLeft:{cn:'想象左手', en:'imagine LEFT'},
  axisRight:{cn:'想象右手', en:'imagine RIGHT'},
  pleaseRun:{cn:'选好电极和特征, 点"跑实验"', en:'pick electrode+feature, click Run'},
  needBoth:{cn:'请先选电极和特征', en:'pick electrode AND feature first'},
  resultBad:{cn:'分不开, 准确率只有 ', en:'cannot separate, accuracy only '},
  win:{cn:'达标! 准确率 ', en:'cleared! accuracy '},
  unlockTitle:{cn:'解锁: 特征分类器设计者', en:'Unlocked: Feature Classifier Designer'},
  unlockBadge:{cn:'你做出了 BCI 第一个能用的特征!', en:'You built the first usable BCI feature!'},
  again:{cn:'再试别的方案 / Try again', en:'Try again / try another plan'},
  noteCz:{cn:'Cz 在中线, 左右手时抖动差不多 — 选错电极, 信息几乎没有。',
          en:'Cz sits on the midline; both hands jitter alike — wrong electrode, almost no info.'},
  noteMean:{cn:'均值几乎不随想象动作变 (基线漂移才动) — 错误特征。能量/抖动才是关键, 所以要用方差。',
            en:'Mean barely moves with imagery (only baseline drift) — wrong feature. Energy/jitter is the key, so use variance.'},
  noteThresh:{cn:'电极和特征对了, 但阈值没卡在两堆中间 — 拖阈值线到重叠区中央。',
              en:'Right electrode+feature, but the threshold misses the gap — drag it to the middle of the overlap.'},
  noteWin:{cn:'两堆方差点被一条阈值线大致分开了 — 你用一个数完成了左右手分类! 但中间有重叠 (单通道方差的天花板)。S6 会用多通道 CSP 把它推得更高。',
           en:'One threshold roughly splits the two variance piles — you classified L/R with a single number! But the overlap is the ceiling of single-channel variance. S6 uses multi-channel CSP to push higher.'}
};
function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}
function byId(id){return document.getElementById(id);}

/* ---------------- 数据: 每类 14 个 trial, 用对侧 ERD 生理 ----------------
   想象左手 (LEFT)  -> 右脑 C4 抖动加大 => C4 方差大
   想象右手 (RIGHT) -> 左脑 C3 抖动加大 => C3 方差大
   Cz (中线): 两类方差都中等且重叠
   均值 (mean): 两类几乎一样 (只有微小基线差)
------------------------------------------------------------------- */
function seeded(seed){ // 确定性伪随机, 结果可复现可实测
  var s=seed%2147483647; if(s<=0)s+=2147483646;
  return function(){ s=s*16807%2147483647; return (s-1)/2147483646; };
}
function buildTrials(){
  var rnd=seeded(7);
  var L=[], R=[];
  // 两类方差中心相距 ~26 但各自展宽 ~44, 故在阈值附近真有重叠 (单通道天花板)
  for(var i=0;i<14;i++){
    L.push({
      C4_var: 64+(rnd()-0.5)*44,
      C3_var: 38+(rnd()-0.5)*44,
      Cz_var: 50+(rnd()-0.5)*46,
      C4_mean: 50+(rnd()-0.5)*8,
      C3_mean: 50+(rnd()-0.5)*8,
      Cz_mean: 50+(rnd()-0.5)*8
    });
  }
  for(var j=0;j<14;j++){
    R.push({
      C4_var: 38+(rnd()-0.5)*44,
      C3_var: 64+(rnd()-0.5)*44,
      Cz_var: 50+(rnd()-0.5)*46,
      C4_mean: 51+(rnd()-0.5)*8,
      C3_mean: 49+(rnd()-0.5)*8,
      Cz_mean: 50+(rnd()-0.5)*8
    });
  }
  return {L:L, R:R};
}
var TRIALS=buildTrials();

/* ---------------- state ---------------- */
var stateGame={ elec:null, feat:null, thresh:30, ran:false, acc:0, lastNote:'' };

function featOf(tr){
  if(!stateGame.elec||!stateGame.feat) return 50;
  var key=stateGame.elec+'_'+stateGame.feat;
  return tr[key];
}

/* 跑实验: 比较两类哪边特征高, 用阈值划线, 算准确率 */
function runExperiment(){
  if(!stateGame.elec||!stateGame.feat){ showToast(t('needBoth')); return; }
  var lMean=avg(TRIALS.L.map(featOf)), rMean=avg(TRIALS.R.map(featOf));
  var leftIsHigh = lMean>=rMean;
  var correct=0, total=TRIALS.L.length+TRIALS.R.length;
  TRIALS.L.forEach(function(tr){
    var hi=featOf(tr)>stateGame.thresh;
    if((leftIsHigh&&hi)||(!leftIsHigh&&!hi)) correct++;
  });
  TRIALS.R.forEach(function(tr){
    var hi=featOf(tr)>stateGame.thresh;
    if((leftIsHigh&&!hi)||(!leftIsHigh&&hi)) correct++;
  });
  stateGame.acc=correct/total;
  stateGame.ran=true;
  stateGame.lastNote=diagnose();
  byId('vAcc').textContent=Math.round(stateGame.acc*100)+'%';
  draw();
  reportResult();
}
function avg(a){return a.reduce(function(x,y){return x+y;},0)/a.length;}

/* 诊断: 各失败分支针对性反馈 */
function diagnose(){
  if(stateGame.feat==='mean') return t('noteMean');
  if(stateGame.elec==='Cz') return t('noteCz');
  if(stateGame.acc>=0.75) return t('noteWin');
  return t('noteThresh');
}

function reportResult(){
  var pct=Math.round(stateGame.acc*100);
  if(stateGame.acc>=0.75){
    showToast(t('win')+pct+'%');
    setTimeout(showUnlock,900);
  }else{
    showToast(t('resultBad')+pct+'%');
  }
}

function showUnlock(){
  byId('unlockSub').textContent=stateGame.lastNote;
  byId('unlock').style.display='flex';
}

function showToast(msg){
  var el=byId('toast');
  el.style.display='block';
  el.textContent=msg;
  clearTimeout(showToast._t);
  showToast._t=setTimeout(function(){el.style.display='none';},2600);
}

/* ---------------- 选项交互 ---------------- */
Array.prototype.forEach.call(byId('elecOpts').querySelectorAll('.opt'),function(b){
  b.addEventListener('click',function(){
    stateGame.elec=b.getAttribute('data-elec');
    Array.prototype.forEach.call(byId('elecOpts').querySelectorAll('.opt'),function(x){x.classList.remove('sel');});
    b.classList.add('sel');
    byId('vElec').textContent=stateGame.elec;
    stateGame.ran=false; byId('vAcc').textContent='—';
    draw();
  });
});
Array.prototype.forEach.call(byId('featOpts').querySelectorAll('.opt'),function(b){
  b.addEventListener('click',function(){
    stateGame.feat=b.getAttribute('data-feat');
    Array.prototype.forEach.call(byId('featOpts').querySelectorAll('.opt'),function(x){x.classList.remove('sel');});
    b.classList.add('sel');
    byId('vFeat').textContent=stateGame.feat==='var'?t('featVar'):t('featMean');
    stateGame.ran=false; byId('vAcc').textContent='—';
    draw();
  });
});
byId('thresh').addEventListener('input',function(){
  stateGame.thresh=parseFloat(byId('thresh').value);
  byId('threshVal').textContent=stateGame.thresh.toFixed(0);
  if(stateGame.elec&&stateGame.feat){ runExperiment(); }
  else draw();
});
byId('btnRun').addEventListener('click',runExperiment);
byId('btnAgain').addEventListener('click',function(){
  byId('unlock').style.display='none';
});
byId('langBtn').addEventListener('click',function(){
  LANG=LANG==='cn'?'en':'cn'; refreshI18N();
});

function refreshI18N(){
  byId('title').textContent=t('title');
  ['roadHead','r1','r2','r3','r4','r5','r6','pe','eSub','pf','fSub',
   'stageTitle','stageHint','hElec','hFeat','hAcc','threshLbl','endText',
   'unlockTitle','unlockBadge'].forEach(function(k){
    var el=byId(k); if(el) el.textContent=t(k);
  });
  byId('btnRun').textContent=t('run');
  byId('btnAgain').textContent=t('again');
  var fb=byId('featOpts').querySelectorAll('.opt');
  fb[0].textContent=t('featVar'); fb[1].textContent=t('featMean');
  if(stateGame.feat) byId('vFeat').textContent=stateGame.feat==='var'?t('featVar'):t('featMean');
  byId('langBtn').textContent=LANG==='cn'?'中 / EN':'EN / 中';
  draw();
}

/* ---------------- canvas: 数轴 + 两类分布 + 阈值线 ---------------- */
var canvas=byId('stage');
var ctx=canvas.getContext('2d');
var W=0,H=0,DPR=1;
var padL=70, padR=30, padT=44, padB=64;

function resize(){
  var rect=canvas.parentElement.getBoundingClientRect();
  if(rect.width<2||rect.height<2) return;
  DPR=window.devicePixelRatio||1;
  canvas.width=rect.width*DPR; canvas.height=rect.height*DPR;
  canvas.style.width=rect.width+'px'; canvas.style.height=rect.height+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W=rect.width; H=rect.height;
  draw();
}
window.addEventListener('resize',resize);

function valToX(v){var inner=W-padL-padR; return padL+inner*(v/100);}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='oklch(0.18 0.04 265)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='oklch(0.75 0.02 265)';
  ctx.font='11px JetBrains Mono, monospace';
  var axisName;
  if(stateGame.elec&&stateGame.feat){
    axisName=stateGame.elec+' '+(stateGame.feat==='var'?(LANG==='cn'?'方差':'variance'):(LANG==='cn'?'均值':'mean'));
  }else{
    axisName=t('pleaseRun');
  }
  ctx.fillText((LANG==='cn'?'横轴 = ':'x-axis = ')+axisName, padL, 12);

  var lineY=H*0.5;

  ctx.strokeStyle='oklch(0.55 0.08 265 / 0.55)';
  ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(padL,lineY);ctx.lineTo(W-padR,lineY);ctx.stroke();

  ctx.strokeStyle='oklch(0.35 0.05 265 / 0.3)';
  ctx.fillStyle='oklch(0.55 0.03 265)';
  ctx.font='9px JetBrains Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(var g=0;g<=100;g+=20){
    var gx=valToX(g);
    ctx.beginPath();ctx.moveTo(gx,padT);ctx.lineTo(gx,H-padB);ctx.stroke();
    ctx.fillText(g, gx, H-padB+6);
  }

  // 阈值竖线 — 始终绘制 (即使还没选电极/特征), 拖滑块即可见反馈
  var tx=valToX(stateGame.thresh);
  ctx.strokeStyle='oklch(0.92 0.08 240)';
  ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(tx,padT);ctx.lineTo(tx,H-padB);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='oklch(0.92 0.08 240)';
  ctx.font='700 11px JetBrains Mono, monospace';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText((LANG==='cn'?'阈值 ':'thresh ')+stateGame.thresh.toFixed(0), tx, padT-4);

  if(stateGame.elec&&stateGame.feat){
    drawClass(TRIALS.L, lineY-26, 'oklch(0.72 0.17 245)', t('axisLeft'), -1);
    drawClass(TRIALS.R, lineY+26, 'oklch(0.85 0.14 85)', t('axisRight'), 1);

    if(stateGame.ran){
      var pct=Math.round(stateGame.acc*100);
      ctx.fillStyle = stateGame.acc>=0.75?'oklch(0.85 0.14 85)':'oklch(0.75 0.02 265)';
      ctx.font='800 20px JetBrains Mono, monospace';
      ctx.textAlign='right';ctx.textBaseline='top';
      ctx.fillText((LANG==='cn'?'准确率 ':'acc ')+pct+'%', W-padR, 10);
      ctx.fillStyle='oklch(0.75 0.02 265)';
      ctx.font='10px JetBrains Mono, monospace';
      ctx.textAlign='left';ctx.textBaseline='bottom';
      wrapText(stateGame.lastNote, padL, H-6, W-padL-padR, 13);
    }
  }else{
    ctx.fillStyle='oklch(0.55 0.03 265)';
    ctx.font='13px JetBrains Mono, monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t('pleaseRun'), W/2, lineY-60);
  }
}

function drawClass(arr, cy, color, label, dir){
  ctx.fillStyle=color;
  ctx.font='700 11px JetBrains Mono, monospace';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(label, padL, cy + (dir<0?-16:16));
  arr.forEach(function(tr,i){
    var v=featOf(tr);
    var x=valToX(Math.max(0,Math.min(100,v)));
    var jit=((i%4)-1.5)*5*dir;
    var y=cy+jit;
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.strokeStyle='oklch(0.14 0.035 265)'; ctx.lineWidth=1.5; ctx.stroke();
  });
}

function wrapText(text, x, yBottom, maxW, lh){
  if(!text) return;
  var words = LANG==='cn' ? text.split('') : text.split(' ');
  var lines=[], cur='';
  for(var i=0;i<words.length;i++){
    var test = cur + (LANG==='cn'?'':(cur?' ':'')) + words[i];
    if(ctx.measureText(test).width>maxW && cur){ lines.push(cur); cur=words[i]; }
    else cur=test;
  }
  if(cur) lines.push(cur);
  lines=lines.slice(-2);
  for(var k=0;k<lines.length;k++){
    ctx.fillText(lines[k], x, yBottom-(lines.length-1-k)*lh);
  }
}

/* ---------------- init ---------------- */
resize();
setTimeout(resize,180);
setTimeout(resize,560);
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(resize);}
byId('vElec').textContent='—';
byId('vFeat').textContent='—';
byId('vAcc').textContent='—';
draw();
</script>
