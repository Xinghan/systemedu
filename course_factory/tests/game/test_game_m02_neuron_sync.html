<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脑波起源 · 同步度因果链</title>
<style>
  /* ===== neuro 主题 (NRO-20) — B 类深空底 ===== */
  :root{
    --bg-0: oklch(0.18 0.03 25);      /* 深空底 */
    --bg-1: oklch(0.23 0.04 25);      /* 面板 */
    --accent: oklch(0.75 0.17 25);    /* 学科 accent (红橙) */
    --synaptic: oklch(0.75 0.17 25);
    --dendrite: oklch(0.55 0.15 25);
    --axon: oklch(0.32 0.10 25);
    --firing: oklch(0.92 0.08 25);
    --memory: oklch(0.85 0.14 85);
    --ink: oklch(0.94 0.02 25);
    --ink-dim: oklch(0.70 0.03 25);
    --line: oklch(0.40 0.05 25);
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background: var(--bg-0);
    color: var(--ink);
    font-family: var(--mono);
    overflow:hidden;
  }
  .wrapper{display:flex;height:100vh;width:100vw;}

  /* ===== 200px sidebar ===== */
  .game-sidebar{
    width:200px;min-width:200px;
    background: var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    padding:18px 16px;
  }
  .mascot{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    padding-bottom:14px;border-bottom:1px solid var(--line);
  }
  .mascot svg{width:64px;height:64px;}
  .mascot .name{font-size:13px;color:var(--accent);letter-spacing:1px;}
  .mascot .sub{font-size:10px;color:var(--ink-dim);}

  .task{margin-top:16px;font-size:11.5px;line-height:1.65;color:var(--ink-dim);}
  .task b{color:var(--ink);font-weight:600;}
  .task .core-q{
    color:var(--accent);font-size:12.5px;display:block;margin-bottom:10px;
    line-height:1.5;
  }

  .legend{margin-top:16px;font-size:10px;line-height:1.6;color:var(--ink-dim);}
  .legend .row{display:flex;align-items:center;gap:6px;margin:4px 0;}
  .legend .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;}

  .spacer{flex:1;}
  .progress-wrap{margin-top:14px;}
  .progress-label{font-size:10px;color:var(--ink-dim);margin-bottom:5px;}
  .progress-bar{height:8px;background:var(--axon);border:1px solid var(--line);position:relative;}
  .progress-fill{height:100%;width:0%;background:var(--accent);transition:width .35s ease;}

  .lang-btn{
    margin-top:14px;
    background:transparent;color:var(--ink-dim);
    border:1px solid var(--line);
    font-family:var(--mono);font-size:11px;letter-spacing:1px;
    padding:7px 0;cursor:pointer;width:100%;
    transition:.18s;
  }
  .lang-btn:hover{color:var(--accent);border-color:var(--accent);}

  /* ===== main ===== */
  .game-main{flex:1;display:flex;flex-direction:column;min-width:0;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  .topbar h1{font-size:15px;font-weight:600;letter-spacing:.5px;}
  .topbar .hud{display:flex;gap:22px;font-size:11px;color:var(--ink-dim);}
  .topbar .hud span b{color:var(--firing);font-size:14px;}

  /* 脑区 chips + 动作按钮 区 */
  .controls{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 22px;border-bottom:1px solid var(--line);flex:0 0 auto;
  }
  .controls .grp-label{font-size:10px;color:var(--ink-dim);margin-right:2px;}
  .chip{
    background:var(--bg-1);color:var(--ink-dim);
    border:1px solid var(--line);
    font-family:var(--mono);font-size:11px;
    padding:6px 12px;cursor:pointer;transition:.15s;
  }
  .chip.active{
    background:var(--accent);color:var(--bg-0);
    border-color:var(--accent);box-shadow:3px 3px 0 var(--bg-0);
  }
  .chip:hover:not(.active){color:var(--ink);border-color:var(--accent);}
  .divider{width:1px;height:22px;background:var(--line);margin:0 6px;}

  .act-btn{
    font-family:var(--mono);font-size:12px;font-weight:600;
    padding:9px 16px;cursor:pointer;transition:.15s;letter-spacing:.3px;
  }
  .act-btn.sync{
    background:var(--accent);color:var(--bg-0);border:1px solid var(--accent);
    box-shadow:3px 3px 0 var(--bg-0);
  }
  .act-btn.sync:hover{background:var(--firing);}
  .act-btn.scatter{
    background:transparent;color:var(--ink);border:1px solid var(--line);
  }
  .act-btn.scatter:hover{border-color:var(--firing);color:var(--firing);}
  .act-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

  /* canvas 双区: 神经元群 (上) + 头皮电极波形 (下) — 父容器 flex column */
  .stage{flex:1;display:flex;flex-direction:column;min-height:0;padding:14px 22px 18px;gap:14px;}
  .panel{
    display:flex;flex-direction:column;min-height:0;
    border:1px solid var(--line);background:var(--bg-1);position:relative;
  }
  .panel .cap{
    position:absolute;top:8px;left:10px;font-size:10px;
    color:var(--ink-dim);letter-spacing:.5px;z-index:2;pointer-events:none;
  }
  .panel-neurons{flex:1.3;}
  .panel-scope{flex:1;}
  .panel canvas{flex:1;width:100%;height:100%;display:block;}

  .verdict{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:oklch(0.18 0.03 25 / 0.92);z-index:5;gap:10px;padding:0 20px;
  }
  .verdict.show{display:flex;}
  .verdict .badge{
    font-size:18px;color:var(--memory);font-weight:600;letter-spacing:1px;
  }
  .verdict .desc{font-size:12px;color:var(--ink-dim);line-height:1.6;max-width:380px;}
</style>
</head>
<body>
<div class="wrapper">

  <!-- ===== sidebar ===== -->
  <aside class="game-sidebar">
    <div class="mascot">
      <!-- Spark — 分叉树突生物 (SVG, 无 emoji) -->
      <svg viewBox="0 0 64 64" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round">
        <circle cx="32" cy="32" r="9" fill="var(--firing)" stroke="none"/>
        <line x1="32" y1="23" x2="32" y2="8"/>
        <line x1="32" y1="8" x2="26" y2="3"/><line x1="32" y1="8" x2="38" y2="3"/>
        <line x1="41" y1="32" x2="56" y2="28"/>
        <line x1="56" y1="28" x2="61" y2="22"/><line x1="56" y1="28" x2="62" y2="33"/>
        <line x1="32" y1="41" x2="38" y2="56"/>
        <line x1="38" y1="56" x2="34" y2="62"/><line x1="38" y1="56" x2="44" y2="60"/>
        <line x1="23" y1="32" x2="8" y2="36"/>
        <line x1="8" y1="36" x2="2" y2="32"/><line x1="8" y1="36" x2="4" y2="42"/>
        <circle cx="32" cy="30" r="2" fill="var(--bg-0)" stroke="none"/>
      </svg>
      <span class="name" id="mascotName">SPARK</span>
      <span class="sub" id="mascotSub">树突向导</span>
    </div>

    <div class="task">
      <span class="core-q" id="coreQ">脑电波从哪来?</span>
      <span id="taskBody"></span>
    </div>

    <div class="legend">
      <div class="row"><span class="dot" style="background:var(--axon)"></span><span id="lg0">未放电神经元</span></div>
      <div class="row"><span class="dot" style="background:var(--firing)"></span><span id="lg1">同步放电中</span></div>
      <div class="row"><span class="dot" style="background:var(--memory)"></span><span id="lg2">头皮可测电压</span></div>
    </div>

    <div class="spacer"></div>

    <div class="progress-wrap">
      <div class="progress-label" id="progLabel">同步度 → 电压</div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>

    <button class="lang-btn" id="langBtn">EN</button>
  </aside>

  <!-- ===== main ===== -->
  <main class="game-main">
    <div class="topbar">
      <h1 id="title">同步度 → 头皮电压 · 因果链</h1>
      <div class="hud">
        <span id="hudSync">同步度 <b id="syncVal">0%</b></span>
        <span id="hudVolt">头皮电压 <b id="voltVal">2 µV</b></span>
        <span id="hudRhythm">节律 <b id="rhythmVal">--</b></span>
      </div>
    </div>

    <div class="controls">
      <span class="grp-label" id="regionLabel">脑区:</span>
      <button class="chip active" id="chipOcc" data-region="occ">枕叶</button>
      <button class="chip" id="chipMot" data-region="mot">运动区</button>
      <div class="divider"></div>
      <button class="act-btn sync" id="btnSync">让更多神经元同步</button>
      <button class="act-btn scatter" id="btnScatter">打散同步</button>
    </div>

    <div class="stage">
      <div class="panel panel-neurons">
        <span class="cap" id="capNeurons">一片皮层神经元 (放大)</span>
        <canvas id="cvNeurons"></canvas>
      </div>
      <div class="panel panel-scope">
        <span class="cap" id="capScope">头皮电极读数 (EEG)</span>
        <canvas id="cvScope"></canvas>
        <div class="verdict" id="verdict">
          <span class="badge" id="verdictBadge">解锁: 脑波起源观察者</span>
          <span class="desc" id="verdictDesc"></span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";
// ============ i18n ============
var LANG = 'zh';
var I18N = {
  zh: {
    mascotName:'SPARK', mascotSub:'树突向导',
    coreQ:'脑电波从哪来?',
    taskBody:'<b>任务</b>: 点击 <b>"让更多神经元同步"</b>, 看头皮电极上的电压如何被一级级推高, 从噪声平线推到清晰可测的节律。点 <b>"打散同步"</b> 看它塌回噪声。把任一脑区推到可测节律即可解锁 <b>脑波起源观察者</b>。',
    lg0:'未放电神经元', lg1:'同步放电中', lg2:'头皮可测电压',
    progLabel:'同步度 → 电压',
    title:'同步度 → 头皮电压 · 因果链',
    hudSync:'同步度', hudVolt:'头皮电压', hudRhythm:'节律',
    regionLabel:'脑区:', chipOcc:'枕叶', chipMot:'运动区',
    btnSync:'让更多神经元同步', btnScatter:'打散同步',
    capNeurons:'一片皮层神经元 (放大)', capScope:'头皮电极读数 (EEG)',
    langBtn:'EN',
    verdictBadge:'解锁: 脑波起源观察者',
    verdictOcc:'枕叶神经元高度同步, 头皮测到清晰的 alpha 节律 (8–12 Hz)。单个神经元的微电流太弱, 是成千上万个一起同步放电, 才在头皮叠加成可测的宏观脑波。',
    verdictMot:'运动区神经元同步, 头皮测到 beta 节律 (13–30 Hz)。脑波不是某个神经元"发出"的, 而是大量神经元同步放电的宏观结果。',
    rhythmFlat:'噪声', unit:'µV',
    syncNeurons:'神经元同步放电', peak:'峰值'
  },
  en: {
    mascotName:'SPARK', mascotSub:'Dendrite Guide',
    coreQ:'Where do brain waves come from?',
    taskBody:'<b>Goal</b>: Click <b>"Sync more neurons"</b> and watch the scalp electrode voltage get pushed up step by step, from a noisy flat line into a clear measurable rhythm. Click <b>"Scatter sync"</b> to collapse it back to noise. Push either region to a measurable rhythm to unlock <b>Brain-Wave Origin Observer</b>.',
    lg0:'Resting neuron', lg1:'Firing in sync', lg2:'Scalp voltage',
    progLabel:'Synchrony → Voltage',
    title:'Synchrony → Scalp Voltage · Causal Chain',
    hudSync:'Synchrony', hudVolt:'Scalp V', hudRhythm:'Rhythm',
    regionLabel:'Region:', chipOcc:'Occipital', chipMot:'Motor',
    btnSync:'Sync more neurons', btnScatter:'Scatter sync',
    capNeurons:'A patch of cortical neurons (zoom)', capScope:'Scalp electrode reading (EEG)',
    langBtn:'CN',
    verdictBadge:'Unlocked: Brain-Wave Origin Observer',
    verdictOcc:'Occipital neurons are highly synchronized; the scalp picks up a clear alpha rhythm (8–12 Hz). A single neuron is far too weak — only when tens of thousands fire together does it sum into a measurable macroscopic brain wave.',
    verdictMot:'Motor-cortex neurons synced; the scalp reads a beta rhythm (13–30 Hz). A brain wave is not "emitted" by one neuron — it is the macroscopic result of many neurons firing in sync.',
    rhythmFlat:'noise', unit:'µV',
    syncNeurons:'neurons firing in sync', peak:'peak'
  }
};
function t(k){ return I18N[LANG][k]; }

// ============ 因果链状态 (非调参: 离散级别, 由动作推进) ============
var REGIONS = {
  occ: { sync:0, baseHz:10, rhythmZh:'alpha', verdict:'verdictOcc' }, // alpha 8-12Hz
  mot: { sync:0, baseHz:20, rhythmZh:'beta',  verdict:'verdictMot' }  // beta 13-30Hz
};
var current = 'occ';
var MAX_SYNC = 5;          // 5 个离散同步级别
var WIN_SYNC = 5;          // 达到顶级 = 可测节律
var won = false;           // 是否已首次解锁 (用于显示 verdict 一次)
var wonRegions = {};       // 各脑区是否已达可测节律
var pulsePhase = 0;        // 神经元放电脉冲相位
var scopeBuf = [];         // 波形历史
var SCOPE_LEN = 220;

function syncFrac(){ return REGIONS[current].sync / MAX_SYNC; }
// 电压: 同步度的强非线性放大 (单神经元弱 -> 群体叠加宏观可测)
function voltageUV(){
  var f = syncFrac();
  return 2 + Math.round(78 * Math.pow(f, 1.6));   // 噪声底 2µV -> ~80µV
}
function rhythmName(){
  var f = syncFrac();
  if(f <= 0.3) return t('rhythmFlat');
  return REGIONS[current].rhythmZh;   // alpha / beta (拉丁字母, 双语通用)
}

// ============ canvas 设置 ============
var cvN = document.getElementById('cvNeurons');
var cvS = document.getElementById('cvScope');
var ctxN = cvN.getContext('2d');
var ctxS = cvS.getContext('2d');

function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
var C = {}, MONO='';
function loadColors(){
  C.bg0=css('--bg-0'); C.bg1=css('--bg-1'); C.accent=css('--accent');
  C.axon=css('--axon'); C.firing=css('--firing'); C.memory=css('--memory');
  C.dendrite=css('--dendrite'); C.line=css('--line'); C.inkdim=css('--ink-dim');
  MONO = "11px 'JetBrains Mono', monospace";
}

function fitCanvas(cv){
  var r = cv.parentElement.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  cv.width = Math.max(2, Math.floor(r.width * dpr));
  cv.height = Math.max(2, Math.floor(r.height * dpr));
  cv.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
  return { w:r.width, h:r.height };
}

// 神经元网格布局
var neurons = [];
function buildNeurons(w,h){
  neurons = [];
  var cols = 14, rows = 8;
  var mx = w*0.10, my = h*0.20;
  var gw = (w - mx*2)/(cols-1), gh = (h - my*2)/(rows-1);
  for(var rI=0;rI<rows;rI++){
    for(var cI=0;cI<cols;cI++){
      neurons.push({
        x: mx + cI*gw + (Math.random()-0.5)*gw*0.25,
        y: my + rI*gh + (Math.random()-0.5)*gh*0.25,
        phase: Math.random()*Math.PI*2
      });
    }
  }
}

function drawNeurons(w,h){
  ctxN.clearRect(0,0,w,h);
  if(neurons.length===0) return;
  var f = syncFrac();
  var nSync = Math.round(neurons.length * f);
  var sharedPhase = pulsePhase;
  for(var i=0;i<neurons.length;i++){
    var n = neurons[i];
    var isSync = i < nSync;
    var ph = isSync ? sharedPhase : (pulsePhase*0.6 + n.phase);
    var fire = Math.max(0, Math.sin(ph));
    var r = 5 + fire*5*(isSync?1:0.5);
    if(isSync && (i % 14)!==0 && (i-1) < nSync && i>0){
      var prev = neurons[i-1];
      ctxN.strokeStyle = C.dendrite;
      ctxN.globalAlpha = 0.18 + fire*0.25;
      ctxN.lineWidth = 1;
      ctxN.beginPath(); ctxN.moveTo(prev.x,prev.y); ctxN.lineTo(n.x,n.y); ctxN.stroke();
      ctxN.globalAlpha = 1;
    }
    if(isSync && fire>0.3){
      ctxN.fillStyle = C.firing;
      ctxN.globalAlpha = 0.12*fire;
      ctxN.beginPath(); ctxN.arc(n.x,n.y,r*2.4,0,Math.PI*2); ctxN.fill();
      ctxN.globalAlpha = 1;
    }
    ctxN.fillStyle = isSync ? (fire>0.25 ? C.firing : C.dendrite) : C.axon;
    ctxN.beginPath(); ctxN.arc(n.x,n.y,r,0,Math.PI*2); ctxN.fill();
  }
  ctxN.fillStyle = C.inkdim;
  ctxN.font = MONO;
  ctxN.textAlign='left';
  ctxN.fillText(nSync + ' / ' + neurons.length + ' ' + t('syncNeurons'), w*0.10, h*0.12);
}

// 头皮电极波形采样: 同步度低=噪声平线, 高=清晰节律
function sampleScope(tms){
  var f = syncFrac();
  var rhythmAmp = (voltageUV()-2);
  var hz = REGIONS[current].baseHz;
  var rhythm = Math.sin(tms/1000 * hz * 2*Math.PI) * rhythmAmp;
  var noiseAmp = 6 * (1-f) + 1.5;
  var noise = (Math.random()-0.5)*2 * noiseAmp;
  return rhythm + noise;   // µV
}

function drawScope(w,h){
  ctxS.clearRect(0,0,w,h);
  var midY = h*0.55;
  ctxS.strokeStyle = C.line; ctxS.globalAlpha=0.5; ctxS.lineWidth=1;
  ctxS.beginPath(); ctxS.moveTo(0,midY); ctxS.lineTo(w,midY); ctxS.stroke();
  ctxS.globalAlpha=1;
  ctxS.fillStyle=C.inkdim; ctxS.font="9px 'JetBrains Mono', monospace"; ctxS.textAlign='left';
  ctxS.fillText('0 '+t('unit'), 4, midY-4);
  var f = syncFrac();
  var col = f>=0.99 ? C.memory : (f>0.3 ? C.firing : C.inkdim);
  ctxS.strokeStyle = col; ctxS.lineWidth = f>0.3?2:1.4; ctxS.globalAlpha = 0.95;
  ctxS.beginPath();
  var scaleY = (h*0.42)/90;
  for(var i=0;i<scopeBuf.length;i++){
    var x = (i/(SCOPE_LEN-1))*w;
    var y = midY - scopeBuf[i]*scaleY;
    if(i===0) ctxS.moveTo(x,y); else ctxS.lineTo(x,y);
  }
  ctxS.stroke(); ctxS.globalAlpha=1;
  ctxS.fillStyle = col; ctxS.font=MONO; ctxS.textAlign='right';
  ctxS.fillText(t('peak')+' '+voltageUV()+' '+t('unit'), w-6, h*0.16);
}

// ============ HUD ============
function updateHUD(){
  var f = syncFrac();
  document.getElementById('syncVal').textContent = Math.round(f*100)+'%';
  document.getElementById('voltVal').textContent = voltageUV()+' '+t('unit');
  document.getElementById('rhythmVal').textContent = rhythmName();
  document.getElementById('progFill').style.width = (f*100)+'%';
}

// ============ 因果动作 (核心交互, 非调参) ============
function regionDone(){ return wonRegions[current] === true; }

function doSync(){
  if(regionDone()) return;
  var R = REGIONS[current];
  if(R.sync < MAX_SYNC) R.sync += 1;   // 离散推进一级
  updateHUD();
  checkWin();
}
function doScatter(){
  if(regionDone()) return;
  var R = REGIONS[current];
  R.sync = Math.max(0, R.sync - 2);    // 打散: 同步度塌回
  updateHUD();
}
function switchRegion(reg){
  current = reg;
  document.getElementById('chipOcc').classList.toggle('active', reg==='occ');
  document.getElementById('chipMot').classList.toggle('active', reg==='mot');
  // 切区后按当前区是否已达成, 决定 verdict 与 sync 按钮可用性
  refreshRegionState();
  updateHUD();
}
function refreshRegionState(){
  var vd = document.getElementById('verdict');
  if(regionDone()){
    document.getElementById('verdictBadge').textContent = t('verdictBadge');
    document.getElementById('verdictDesc').textContent = t(REGIONS[current].verdict);
    vd.classList.add('show');
    document.getElementById('btnSync').disabled = true;
  } else {
    vd.classList.remove('show');
    document.getElementById('btnSync').disabled = false;
  }
}
function checkWin(){
  var R = REGIONS[current];
  if(R.sync >= WIN_SYNC && !wonRegions[current]){
    wonRegions[current] = true;
    won = true;
    refreshRegionState();
  }
}

// ============ 渲染循环 ============
var dimN={w:0,h:0}, dimS={w:0,h:0};
function relayout(){
  dimN = fitCanvas(cvN);
  dimS = fitCanvas(cvS);
  buildNeurons(dimN.w, dimN.h);
}
function loop(ts){
  pulsePhase += 0.12;
  scopeBuf.push(sampleScope(ts));
  while(scopeBuf.length > SCOPE_LEN) scopeBuf.shift();
  drawNeurons(dimN.w, dimN.h);
  drawScope(dimS.w, dimS.h);
  requestAnimationFrame(loop);
}

// ============ i18n 应用 ============

  document.getElementById('mascotName').textContent = t('mascotName');
  document.getElementById('mascotSub').textContent = t('mascotSub');
  document.getElementById('coreQ').textContent = t('coreQ');

  document.getElementById('lg1').textContent = t('lg1');
  document.getElementById('lg2').textContent = t('lg2');
  document.getElementById('progLabel').textContent = t('progLabel');
  document.getElementById('title').textContent = t('title');

  document.getElementById('hudVolt').childNodes[0].nodeValue = t('hudVolt')+' ';
  document.getElementById('hudRhythm').childNodes[0].nodeValue = t('hudRhythm')+' ';

  document.getElementById('chipMot').textContent = t('chipMot');
  document.getElementById('btnSync').textContent = t('btnSync');
  document.getElementById('btnScatter').textContent = t('btnScatter');
  document.getElementById('capNeurons').textContent = t('capNeurons');
  document.getElementById('capScope').textContent = t('capScope');
  document.getElementById('langBtn').textContent = t('langBtn');
  refreshRegionState();
  updateHUD();
}

// ============ 事件绑定 (addEventListener, 无 onclick) ============
document.getElementById('btnSync').addEventListener('click', doSync);
document.getElementById('btnScatter').addEventListener('click', doScatter);
document.getElementById('chipOcc').addEventListener('click', function(){ switchRegion('occ'); });
document.getElementById('chipMot').addEventListener('click', function(){ switchRegion('mot'); });
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = (LANG==='zh') ? 'en' : 'zh';
  applyLang();
});
window.addEventListener('resize', relayout);

// ============ 启动 ============
loadColors();
relayout();
applyLang();
requestAnimationFrame(loop);
</script>
