<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fix Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1;}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%;}
.header{padding:8px 16px;background:rgba(28,27,27,0.92);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#ffb59c;letter-spacing:1px;text-transform:uppercase;}
.header .round-display{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886;}
.main-area,.game-area{flex:1;min-height:0;display:flex;gap:10px;padding:10px;overflow:hidden;}
.scenario-panel{flex:1;display:flex;flex-direction:column;background:rgba(28,27,27,0.6);border:1px solid rgba(255,255,255,0.06);padding:12px;overflow-y:auto;}
.scenario-panel h2{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#ffb59c;margin-bottom:8px;letter-spacing:1px;}
.scenario-desc{font-size:12px;line-height:1.6;color:#c6c6c6;margin-bottom:12px;}
.layer-badge{display:inline-block;padding:2px 8px;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.fix-section{margin-top:8px;}
.fix-section label{display:block;font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.fix-option{display:block;padding:8px;margin-bottom:4px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);background:rgba(53,53,52,0.4);transition:background 0.2s,border-color 0.2s;border-radius:0;}
.fix-option:hover{background:rgba(255,127,80,0.1);}
.fix-option.selected{border-color:#ffb59c;background:rgba(255,127,80,0.15);}
.fix-option.correct{border-color:#10b981;background:rgba(16,185,129,0.15);}
.fix-option.wrong{border-color:#ff5f1f;background:rgba(255,95,31,0.15);}
.verify-section{margin-top:8px;}
.verify-option{display:block;padding:8px;margin-bottom:4px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);background:rgba(53,53,52,0.4);transition:background 0.2s,border-color 0.2s;border-radius:0;}
.verify-option:hover{background:rgba(0,218,243,0.1);}
.verify-option.selected{border-color:#00daf3;background:rgba(0,218,243,0.15);}
.verify-option.correct{border-color:#10b981;background:rgba(16,185,129,0.15);}
.verify-option.wrong{border-color:#ff5f1f;background:rgba(255,95,31,0.15);}
.result-panel{flex:1;display:flex;flex-direction:column;background:rgba(28,27,27,0.6);border:1px solid rgba(255,255,255,0.06);padding:12px;overflow-y:auto;}
.result-panel h2{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#00daf3;margin-bottom:8px;letter-spacing:1px;}
.result-log{flex:1;overflow-y:auto;font-size:12px;line-height:1.6;}
.result-entry{padding:6px 8px;margin-bottom:4px;border-left:3px solid #8a8886;}
.result-entry.pass{border-left-color:#10b981;}
.result-entry.fail{border-left-color:#ff5f1f;}
.controls-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(28,27,27,0.92);flex-shrink:0;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 16px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(53,53,52,0.4);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;text-transform:uppercase;border-radius:0;}
.ctrl-btn:hover{background:rgba(255,127,80,0.2);}
.ctrl-btn:disabled{opacity:0.4;cursor:not-allowed;}
.fb-msg{font-size:13px;color:#c6c6c6;}
.hud{display:flex;align-items:center;justify-content:space-around;padding:6px 16px;background:rgba(0,0,0,0.55);height:42px;flex-shrink:0;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;}
.hud-value{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#00daf3;font-weight:700;}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;border-radius:0;}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:34vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);border-radius:0;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c;}
.guide-panel ul{padding-left:14px;line-height:1.5;}
.guide-panel .guide-content{transition:max-height 0.3s;overflow:hidden;}
.summary-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:200;justify-content:center;align-items:center;}
.summary-overlay.show{display:flex;}
.summary-card{background:rgba(28,27,27,0.95);border:1px solid rgba(255,127,80,0.3);padding:24px;max-width:440px;width:90%;text-align:center;}
.summary-card h2{font-family:'Space Grotesk',sans-serif;color:#ffb59c;font-size:18px;margin-bottom:12px;}
.summary-card .score-big{font-family:'Space Grotesk',sans-serif;font-size:36px;color:#00daf3;font-weight:700;margin-bottom:8px;}
.summary-card p{font-size:13px;line-height:1.6;margin-bottom:8px;color:#c6c6c6;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideGoal" style="margin-bottom:6px;"></p>
    <ul id="guideSteps"></ul>
    <p id="guideTips" style="margin-top:6px;font-style:italic;color:#8a8886;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="titleText"></h1>
    <span class="round-display" id="roundDisplay"></span>
  </div>
  <div class="main-area game-area">
    <div class="scenario-panel" id="scenarioPanel">
      <h2 id="scenarioTitle"></h2>
      <div id="layerBadge" class="layer-badge"></div>
      <div class="scenario-desc" id="scenarioDesc"></div>
      <div class="fix-section">
        <label id="fixLabel"></label>
        <div id="fixOptions"></div>
      </div>
      <div class="verify-section">
        <label id="verifyLabel"></label>
        <div id="verifyOptions"></div>
      </div>
    </div>
    <div class="result-panel">
      <h2 id="resultTitle"></h2>
      <div class="result-log" id="resultLog"></div>
    </div>
  </div>
  <div class="controls-bar">
    <span class="fb-msg" id="fbMsg"></span>
    <div style="display:flex;gap:8px;">
      <button class="ctrl-btn" id="submitBtn"></button>
      <button class="ctrl-btn" id="nextBtn" disabled></button>
    </div>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL0"></div><div class="hud-value" id="hudV0"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3"></div></div>
  </div>
</div>
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-card">
    <h2 id="summaryTitle"></h2>
    <div class="score-big" id="summaryScore"></div>
    <p id="summaryMsg"></p>
    <button class="ctrl-btn" id="retryBtn" style="margin-top:12px;"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'FIX DESIGNER',cn:'\u6539\u8fdb\u4efb\u52a1\u8bbe\u8ba1\u5668'},
  guide:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideGoal:{en:'For each failure scenario, choose the best fix and the correct verification method.',cn:'\u5bf9\u6bcf\u4e2a\u5931\u8d25\u573a\u666f\uff0c\u9009\u62e9\u6700\u4f73\u4fee\u590d\u65b9\u6848\u548c\u6b63\u786e\u7684\u9a8c\u8bc1\u65b9\u5f0f\u3002'},
  guideStep1:{en:'Read the failure scenario description',cn:'\u8bfb\u53d6\u5931\u8d25\u573a\u666f\u63cf\u8ff0'},

  guideStep3:{en:'Select a verification method',cn:'\u9009\u62e9\u9a8c\u8bc1\u65b9\u5f0f'},

  round:{en:'ROUND',cn:'\u8f6e\u6b21'},
  score:{en:'SCORE',cn:'\u5f97\u5206'},
  progress:{en:'PROGRESS',cn:'\u8fdb\u5ea6'},
  accuracy:{en:'ACCURACY',cn:'\u51c6\u786e\u7387'},
  status:{en:'STATUS',cn:'\u72b6\u6001'},
  inProgress:{en:'IN PROGRESS',cn:'\u8fdb\u884c\u4e2d'},
  fixAction:{en:'SELECT FIX ACTION',cn:'\u9009\u62e9\u4fee\u590d\u52a8\u4f5c'},

  // Scenario titles
  sc0t:{en:'SCENARIO: Sand Terrain Misclassification',cn:'\u573a\u666f\uff1a\u6c99\u5730\u5730\u5f62\u8bef\u5206\u7c7b'},
  sc1t:{en:'SCENARIO: Cost Inflation Too Low',cn:'\u573a\u666f\uff1a\u4ee3\u4ef7\u81a8\u80c0\u4e0d\u8db3'},
  sc2t:{en:'SCENARIO: GPS Coordinate Drift',cn:'\u573a\u666f\uff1aGPS \u5750\u6807\u6f02\u79fb'},
  sc3t:{en:'SCENARIO: Shadow Misclassification',cn:'\u573a\u666f\uff1a\u9634\u5f71\u8bef\u5206\u7c7b'},
  // Scenario descriptions
  sc0d:{en:'The rover entered an area of soft sand and got stuck. The terrain classifier labeled it as "safe rock". Investigation shows only 12 sand images existed in the 5000-image training set.',cn:'\u706b\u661f\u8f66\u8fdb\u5165\u677e\u8f6f\u6c99\u5730\u5e76\u9677\u4f4f\u3002\u5730\u5f62\u5206\u7c7b\u5668\u5c06\u5176\u6807\u8bb0\u4e3a\u201c\u5b89\u5168\u5ca9\u77f3\u201d\u3002\u8c03\u67e5\u53d1\u73b0 5000 \u5f20\u8bad\u7ec3\u96c6\u4e2d\u4ec5\u6709 12 \u5f20\u6c99\u5730\u56fe\u50cf\u3002'},
  sc1d:{en:'The path planner routed through a narrow gap between two boulders. The rover barely fit but scraped its side panels. The cost map showed the gap as low-cost because inflation radius was only 0.3m while the rover is 1.1m wide.',cn:'\u8def\u5f84\u89c4\u5212\u5668\u7a7f\u8fc7\u4e24\u5757\u5de8\u77f3\u95f4\u7684\u7a84\u7f1d\u3002\u706b\u661f\u8f66\u52c9\u5f3a\u901a\u8fc7\u4f46\u64e6\u4f24\u4fa7\u677f\u3002\u4ee3\u4ef7\u5730\u56fe\u663e\u793a\u7f1d\u9699\u4e3a\u4f4e\u4ee3\u4ef7\uff0c\u56e0\u4e3a\u81a8\u80c0\u534a\u5f84\u4ec5 0.3m\uff0c\u800c\u706b\u661f\u8f66\u5bbd 1.1m\u3002'},
  sc2d:{en:'After a system reboot mid-mission, the rover\'s planned path shifted 4m east from the intended corridor. The IMU data was consistent but GPS readings jumped after reboot. The path itself was safe, but the rover went off-course.',cn:'\u4efb\u52a1\u4e2d\u7cfb\u7edf\u91cd\u542f\u540e\uff0c\u706b\u661f\u8f66\u89c4\u5212\u8def\u5f84\u5411\u4e1c\u504f\u79fb 4m\u3002IMU \u6570\u636e\u4e00\u81f4\u4f46 GPS \u8bfb\u6570\u5728\u91cd\u542f\u540e\u8df3\u53d8\u3002\u8def\u5f84\u672c\u8eab\u5b89\u5168\uff0c\u4f46\u706b\u661f\u8f66\u504f\u79bb\u4e86\u9884\u5b9a\u8def\u7ebf\u3002'},
  sc3d:{en:'The classifier labeled a dark shadow behind a large rock as "dangerous obstacle". The rover took a 200m detour. In reality, the shadow was just a flat, safe area. The model was trained mostly on bright-lit images.',cn:'\u5206\u7c7b\u5668\u5c06\u5927\u5ca9\u77f3\u540e\u7684\u6697\u5f71\u6807\u8bb0\u4e3a\u201c\u5371\u9669\u969c\u788d\u201d\u3002\u706b\u661f\u8f66\u7ed5\u884c 200m\u3002\u5b9e\u9645\u4e0a\u9634\u5f71\u5904\u662f\u5e73\u5766\u5b89\u5168\u533a\u3002\u6a21\u578b\u4e3b\u8981\u7528\u660e\u4eae\u5149\u7167\u56fe\u50cf\u8bad\u7ec3\u3002'},

  lb1:{en:'COST MAP LAYER',cn:'\u4ee3\u4ef7\u5730\u56fe\u5c42'},
  lb2:{en:'INTERFACE LAYER',cn:'\u63a5\u53e3\u5c42'},
  lb3:{en:'MODEL LAYER',cn:'\u6a21\u578b\u5c42'},

  s0f0:{en:'Add 200+ soft-sand terrain images to training set',cn:'\u5411\u8bad\u7ec3\u96c6\u6dfb\u52a0 200+ \u5f20\u677e\u8f6f\u6c99\u5730\u56fe\u50cf'},
  s0f1:{en:'Increase model learning rate by 2x',cn:'\u5c06\u6a21\u578b\u5b66\u4e60\u7387\u63d0\u9ad8 2 \u500d'},

  s1f0:{en:'Retrain model with more rock images',cn:'\u7528\u66f4\u591a\u5ca9\u77f3\u56fe\u50cf\u91cd\u65b0\u8bad\u7ec3\u6a21\u578b'},
  s1f1:{en:'Increase cost inflation radius to match rover width + safety margin',cn:'\u5c06\u4ee3\u4ef7\u81a8\u80c0\u534a\u5f84\u589e\u5927\u5230\u706b\u661f\u8f66\u5bbd\u5ea6 + \u5b89\u5168\u4f59\u91cf'},

  s3f1:{en:'Increase cost map inflation for all dark areas',cn:'\u5bf9\u6240\u6709\u6697\u533a\u57df\u589e\u5927\u4ee3\u4ef7\u81a8\u80c0'},

  s0v1:{en:'Run the rover for 100km and see if it gets stuck',cn:'\u8ba9\u706b\u661f\u8f66\u8dd1 100km \u770b\u662f\u5426\u9677\u4f4f'},
  s0v2:{en:'Visually inspect 10 random training images',cn:'\u76ee\u89c6\u68c0\u67e5 10 \u5f20\u968f\u673a\u8bad\u7ec3\u56fe\u50cf'},

  s1v1:{en:'Count the total number of obstacles on the map',cn:'\u7edf\u8ba1\u5730\u56fe\u4e0a\u969c\u788d\u7269\u603b\u6570'},
  s1v2:{en:'Check if pathfinding completes within 1 second',cn:'\u68c0\u67e5\u5bfb\u8def\u662f\u5426\u5728 1 \u79d2\u5185\u5b8c\u6210'},
  s2v0:{en:'Compare pre/post-reboot GPS readings with IMU ground truth, offset <0.5m',cn:'\u5bf9\u6bd4\u91cd\u542f\u524d\u540e GPS \u4e0e IMU \u57fa\u51c6\uff0c\u504f\u79fb <0.5m'},
  s2v1:{en:'Check if GPS signal strength is above threshold',cn:'\u68c0\u67e5 GPS \u4fe1\u53f7\u5f3a\u5ea6\u662f\u5426\u8d85\u8fc7\u9608\u503c'},
  s2v2:{en:'Verify the rover reaches the destination eventually',cn:'\u9a8c\u8bc1\u706b\u661f\u8f66\u6700\u7ec8\u5230\u8fbe\u76ee\u7684\u5730'},
  s3v0:{en:'Test shadow classification accuracy on augmented test set >85%',cn:'\u5728\u589e\u5f3a\u6d4b\u8bd5\u96c6\u4e0a\u6d4b\u8bd5\u9634\u5f71\u5206\u7c7b\u51c6\u786e\u7387 >85%'},
  s3v1:{en:'Run a full traversal test in sunlight',cn:'\u5728\u9633\u5149\u4e0b\u8fd0\u884c\u5b8c\u6574\u7a7f\u8d8a\u6d4b\u8bd5'},
  s3v2:{en:'Check total detour distance per mission',cn:'\u68c0\u67e5\u6bcf\u6b21\u4efb\u52a1\u7684\u603b\u7ed5\u884c\u8ddd\u79bb'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

// Scenarios: each has title, desc, layer, fixOptions(with correct index), verifyOptions(with correct index)
var SCENARIOS=[
  {title:'sc0t',desc:'sc0d',layer:'lb0',layerColor:'#ff7f50',
   fixes:['s0f0','s0f1','s0f2'],correctFix:0,
   verifies:['s0v0','s0v1','s0v2'],correctVerify:0},
  {title:'sc1t',desc:'sc1d',layer:'lb1',layerColor:'#ffb59c',
   fixes:['s1f0','s1f1','s1f2'],correctFix:1,
   verifies:['s1v0','s1v1','s1v2'],correctVerify:0},
  {title:'sc2t',desc:'sc2d',layer:'lb2',layerColor:'#10b981',
   fixes:['s2f0','s2f1','s2f2'],correctFix:0,
   verifies:['s2v0','s2v1','s2v2'],correctVerify:0},
  {title:'sc3t',desc:'sc3d',layer:'lb3',layerColor:'#00daf3',
   fixes:['s3f0','s3f1','s3f2'],correctFix:0,
   verifies:['s3v0','s3v1','s3v2'],correctVerify:0}
];

var currentRound=0;
var totalScore=0;
var selectedFix=-1;
var selectedVerify=-1;
var submitted=false;
var results=[];

function loadRound(r){
  var sc=SCENARIOS[r];
  submitted=false;
  selectedFix=-1;
  selectedVerify=-1;
  document.getElementById('scenarioTitle').textContent=t(sc.title);
  document.getElementById('scenarioDesc').textContent=t(sc.desc);
  var badge=document.getElementById('layerBadge');
  badge.textContent=t(sc.layer);
  badge.style.background=sc.layerColor+'22';
  badge.style.color=sc.layerColor;
  badge.style.borderLeft='3px solid '+sc.layerColor;
  // Fix options
  var fixDiv=document.getElementById('fixOptions');
  fixDiv.innerHTML='';
  sc.fixes.forEach(function(fk,i){
    var opt=document.createElement('div');
    opt.className='fix-option';
    opt.textContent=t(fk);
    opt.dataset.idx=i;
    opt.dataset.i18n=fk;
    opt.addEventListener('click',function(){
      if(submitted)return;
      selectedFix=i;
      fixDiv.querySelectorAll('.fix-option').forEach(function(el){el.classList.remove('selected');});
      opt.classList.add('selected');
    });
    fixDiv.appendChild(opt);
  });
  // Verify options
  var verDiv=document.getElementById('verifyOptions');
  verDiv.innerHTML='';
  sc.verifies.forEach(function(vk,i){
    var opt=document.createElement('div');
    opt.className='verify-option';
    opt.textContent=t(vk);
    opt.dataset.idx=i;
    opt.dataset.i18n=vk;
    opt.addEventListener('click',function(){
      if(submitted)return;
      selectedVerify=i;
      verDiv.querySelectorAll('.verify-option').forEach(function(el){el.classList.remove('selected');});
      opt.classList.add('selected');
    });
    verDiv.appendChild(opt);
  });
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('fbMsg').textContent='';
  document.getElementById('roundDisplay').textContent=t('round')+' '+(r+1)+'/'+SCENARIOS.length;
  updateHUD();
}

function submitAnswer(){
  if(submitted)return;
  if(selectedFix<0||selectedVerify<0){
    document.getElementById('fbMsg').textContent=t('selectBoth');
    return;
  }
  submitted=true;
  var sc=SCENARIOS[currentRound];
  var fixCorrect=selectedFix===sc.correctFix;
  var verifyCorrect=selectedVerify===sc.correctVerify;
  var passed=fixCorrect&&verifyCorrect;
  if(passed)totalScore++;
  // Highlight correct/wrong
  var fixOpts=document.querySelectorAll('#fixOptions .fix-option');
  fixOpts.forEach(function(el){
    var idx=parseInt(el.dataset.idx);
    if(idx===sc.correctFix)el.classList.add('correct');
    else if(idx===selectedFix&&!fixCorrect)el.classList.add('wrong');
  });
  var verOpts=document.querySelectorAll('#verifyOptions .verify-option');
  verOpts.forEach(function(el){
    var idx=parseInt(el.dataset.idx);
    if(idx===sc.correctVerify)el.classList.add('correct');
    else if(idx===selectedVerify&&!verifyCorrect)el.classList.add('wrong');
  });
  // Log result
  var entry=document.createElement('div');
  entry.className='result-entry '+(passed?'pass':'fail');
  entry.innerHTML='<b>'+t(sc.title)+'</b>: '+(passed?t('pass'):t('fail'));
  document.getElementById('resultLog').appendChild(entry);
  results.push(passed);
  document.getElementById('submitBtn').disabled=true;
  if(currentRound<SCENARIOS.length-1){
    document.getElementById('nextBtn').disabled=false;
  }else{
    // Final
    setTimeout(showSummary,600);
  }
  updateHUD();
}

function nextRound(){
  currentRound++;
  loadRound(currentRound);
}

function showSummary(){
  var pct=Math.round(totalScore/SCENARIOS.length*100);
  var overlay=document.getElementById('summaryOverlay');
  overlay.classList.add('show');
  document.getElementById('summaryScore').textContent=totalScore+'/'+SCENARIOS.length;
  if(pct>=75){
    document.getElementById('summaryTitle').textContent=t('summaryGood');
    document.getElementById('summaryMsg').textContent=t('summaryMsgGood');
  }else if(pct>=50){
    document.getElementById('summaryTitle').textContent=t('summaryOk');
    document.getElementById('summaryMsg').textContent=t('summaryMsgOk');
  }else{
    document.getElementById('summaryTitle').textContent=t('summaryBad');
    document.getElementById('summaryMsg').textContent=t('summaryMsgBad');
  }
}

function retry(){
  document.getElementById('summaryOverlay').classList.remove('show');
  currentRound=0;totalScore=0;results=[];
  document.getElementById('resultLog').innerHTML='';
  loadRound(0);
}

function updateHUD(){
  document.getElementById('hudL0').textContent=t('round');
  document.getElementById('hudV0').textContent=(currentRound+1)+'/'+SCENARIOS.length;
  document.getElementById('hudL1').textContent=t('score');
  document.getElementById('hudV1').textContent=totalScore+'/'+SCENARIOS.length;
  document.getElementById('hudL2').textContent=t('accuracy');
  var done=results.length;
  document.getElementById('hudV2').textContent=done>0?Math.round(totalScore/done*100)+'%':'--';
  document.getElementById('hudL3').textContent=t('status');
  document.getElementById('hudV3').textContent=t('inProgress');
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('guideTitle').textContent=t('guide');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  var steps=document.getElementById('guideSteps');
  steps.innerHTML='';
  ['guideStep1','guideStep2','guideStep3','guideStep4'].forEach(function(k){
    var li=document.createElement('li');li.textContent=t(k);steps.appendChild(li);
  });
  document.getElementById('guideTips').textContent=t('guideTips');
  document.getElementById('submitBtn').textContent=t('submit');
  document.getElementById('nextBtn').textContent=t('next');
  document.getElementById('retryBtn').textContent=t('retry');
  document.getElementById('fixLabel').textContent=t('fixAction');
  document.getElementById('verifyLabel').textContent=t('verifyMethod');
  document.getElementById('resultTitle').textContent=t('resultLog');
  // Reload current scenario texts
  var sc=SCENARIOS[currentRound];
  document.getElementById('scenarioTitle').textContent=t(sc.title);
  document.getElementById('scenarioDesc').textContent=t(sc.desc);
  document.getElementById('layerBadge').textContent=t(sc.layer);
  document.querySelectorAll('#fixOptions .fix-option').forEach(function(el){if(el.dataset.i18n)el.textContent=t(el.dataset.i18n);});
  document.querySelectorAll('#verifyOptions .verify-option').forEach(function(el){if(el.dataset.i18n)el.textContent=t(el.dataset.i18n);});
  document.getElementById('roundDisplay').textContent=t('round')+' '+(currentRound+1)+'/'+SCENARIOS.length;
  updateHUD();
}

// Events
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('submitBtn').addEventListener('click',submitAnswer);
document.getElementById('nextBtn').addEventListener('click',nextRound);
document.getElementById('retryBtn').addEventListener('click',retry);
document.getElementById('guideToggle').addEventListener('click',function(){
  var content=document.getElementById('guideContent');
  var arrow=document.getElementById('guideArrow');
  if(content.style.maxHeight==='0px'){content.style.maxHeight='300px';arrow.textContent='-';}
  else{content.style.maxHeight='0px';arrow.textContent='+';}
});

// Init
loadRound(0);
refreshI18N();

})();
</script>
</body>
</html>
