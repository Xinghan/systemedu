<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e14;color:#f6f6fc;font-family:'Noto Sans SC','Inter',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.sidebar-btns{display:flex;gap:6px;align-self:flex-start;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,181,156,0.3);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-lang:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar-sound{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,181,156,0.3);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-sound:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);}
.game-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#50ffb0;}
.game-header .info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#aaabb0;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.control-panel{display:flex;justify-content:center;align-items:center;gap:10px;padding:8px 16px;background:rgba(0,0,0,0.4);flex-wrap:wrap;}
.mod-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border:1px solid rgba(80,255,176,0.3);cursor:pointer;color:#aaabb0;background:rgba(30,30,45,0.9);transition:all 0.15s;}
.mod-btn:hover{color:#50ffb0;border-color:#50ffb0;}
.mod-btn.active{color:#0c0e14;background:linear-gradient(135deg,#50ffb0,#17df93);border-color:#50ffb0;box-shadow:0 0 8px rgba(80,255,176,0.3);}
.mod-btn:disabled{opacity:0.3;cursor:default;transform:none;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 16px;border:none;cursor:pointer;color:#0c0e14;background:linear-gradient(135deg,#50ffb0,#17df93);box-shadow:0 0 10px rgba(80,255,176,0.3);transition:transform 0.1s;}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.ctrl-btn.secondary{background:rgba(30,30,45,0.9);color:#aaabb0;box-shadow:none;border:none;}
.ctrl-btn.secondary:hover{color:#50ffb0;}
.hud-bar{height:44px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaabb0;text-transform:uppercase;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#50ffb0;transition:transform 0.15s;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="sidebar-btns">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <button class="sidebar-sound" id="soundBtn">MUTE</button>
    </div>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-guide" id="guideContent"></div>
  </div>
  <div class="game-main">
    <div class="game-header">
      <h1 id="gameTitle"></h1>
      <div class="info" id="roundInfo"></div>
    </div>
    <div class="game-body" id="gameBody">
      <canvas id="c"></canvas>
    </div>
    <div class="control-panel" id="controlPanel">
      <button class="mod-btn" id="modClip" data-mod="clip"></button>
      <button class="mod-btn" id="modWing" data-mod="wing"></button>
      <button class="mod-btn" id="modTail" data-mod="tail"></button>
      <button class="ctrl-btn" id="btnLaunch"></button>
      <button class="ctrl-btn secondary" id="btnReset"></button>
    </div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4">--</div></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// K11 Game: Paper Airplane Modification Workshop
//
// Level 1: Baseline -- fly the original plane 3 times
// Level 2: Paperclip -- add weight to nose, observe CG shift
// Level 3: Wingtip fold -- reduce drag, improve stability
// Level 4: Tail fin -- add pitch control
// Level 5: Free combo -- combine mods for best distance
//
// Physics: modifications affect CG position, lift coefficient,
// drag coefficient -> flight distance and stability.
// Canvas 2D, sidebar layout, dark theme.
// ============================================================

// --- I18N ---
var I18N = {
  title:       {en:'PAPER AIRPLANE WORKSHOP', cn:'\u7eb8\u98de\u673a\u6539\u9020\u5de5\u574a'},
  guide_l1:    {en:'Fly the original plane 3 times to collect baseline data. Click LAUNCH to throw!', cn:'\u98de\u539f\u59cb\u98de\u673a3\u6b21\uff0c\u6536\u96c6\u57fa\u51c6\u6570\u636e\u3002\u70b9\u201c\u53d1\u5c04\u201d\u6765\u6295\u63b7\uff01'},
  guide_l2:    {en:'Add a paperclip to the nose. The extra weight shifts the center of gravity forward -- does it fly straighter?', cn:'\u5728\u673a\u5934\u52a0\u66f2\u522b\u9488\u3002\u989d\u5916\u91cd\u91cf\u8ba9\u91cd\u5fc3\u524d\u79fb\u2014\u2014\u98de\u5f97\u66f4\u76f4\u4e86\u5417\uff1f'},
  guide_l3:    {en:'Fold the wingtips up. This reduces tip vortex drag and improves stability. Compare with baseline!', cn:'\u628a\u7ffc\u5c16\u5411\u4e0a\u6298\u3002\u8fd9\u80fd\u51cf\u5c11\u7ffc\u5c16\u6da1\u6d41\u963b\u529b\uff0c\u63d0\u9ad8\u7a33\u5b9a\u6027\u3002\u548c\u57fa\u51c6\u5bf9\u6bd4\uff01'},
  guide_l4:    {en:'Add a small tail fin. It controls pitch angle and can prevent nose-diving. Does distance improve?', cn:'\u52a0\u4e00\u4e2a\u5c0f\u5c3e\u7ffc\u3002\u5b83\u63a7\u5236\u4fef\u4ef0\u89d2\u5ea6\uff0c\u80fd\u9632\u6b62\u4fef\u51b2\u3002\u8ddd\u79bb\u53d8\u8fdc\u4e86\u5417\uff1f'},
  guide_l5:    {en:'Free combo! Toggle any modifications on/off to find the best combination. Can you beat all previous records?', cn:'\u81ea\u7531\u7ec4\u5408\uff01\u5f00\u5173\u4efb\u610f\u6539\u9020\uff0c\u627e\u5230\u6700\u4f73\u7ec4\u5408\u3002\u80fd\u6253\u7834\u4e4b\u524d\u7684\u8bb0\u5f55\u5417\uff1f'},
  launch:      {en:'LAUNCH', cn:'\u53d1\u5c04'},
  reset:       {en:'RESTART', cn:'\u91cd\u65b0\u5f00\u59cb'},
  clip:        {en:'PAPERCLIP', cn:'\u66f2\u522b\u9488'},
  wingfold:    {en:'WINGTIP FOLD', cn:'\u7ffc\u5c16\u6298\u53e0'},
  tailfin:     {en:'TAIL FIN', cn:'\u5c3e\u7ffc'},
  level:       {en:'Level', cn:'\u5173\u5361'},
  flight:      {en:'Flight', cn:'\u7b2c'},
  flightSuf:   {en:'', cn:'\u6b21'},
  distance:    {en:'DISTANCE', cn:'\u8ddd\u79bb'},
  stability:   {en:'STABILITY', cn:'\u7a33\u5b9a\u6027'},
  bestDist:    {en:'BEST', cn:'\u6700\u8fdc'},
  avgDist:     {en:'AVG', cn:'\u5e73\u5747'},
  baseline:    {en:'Baseline Flight', cn:'\u57fa\u51c6\u98de\u884c'},
  clipMod:     {en:'Paperclip Mod', cn:'\u66f2\u522b\u9488\u6539\u9020'},
  wingMod:     {en:'Wingtip Fold Mod', cn:'\u7ffc\u5c16\u6298\u53e0\u6539\u9020'},
  tailMod:     {en:'Tail Fin Mod', cn:'\u5c3e\u7ffc\u6539\u9020'},
  freeCombo:   {en:'Free Combo', cn:'\u81ea\u7531\u7ec4\u5408'},
  complete:    {en:'ALL LEVELS COMPLETE!', cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  bestCombo:   {en:'Best combination found:', cn:'\u627e\u5230\u7684\u6700\u4f73\u7ec4\u5408\uff1a'},
  insight:     {en:'Small changes to a plane affect how it flies. Systematic testing reveals the best design!', cn:'\u5c0f\u5c0f\u7684\u6539\u52a8\u5c31\u80fd\u5f71\u54cd\u98de\u884c\u3002\u7cfb\u7edf\u6d4b\u8bd5\u624d\u80fd\u627e\u5230\u6700\u4f73\u8bbe\u8ba1\uff01'},
  mLabel:      {en:'m', cn:'\u7c73'},
  flying:      {en:'Flying...', cn:'\u98de\u884c\u4e2d...'},
  landed:      {en:'Landed!', cn:'\u843d\u5730\uff01'},
  ready:       {en:'Ready', cn:'\u5c31\u7eea'},
  none:        {en:'None', cn:'\u65e0'},
  clickStart:  {en:'Click LAUNCH to begin', cn:'\u70b9\u51fb\u201c\u53d1\u5c04\u201d\u5f00\u59cb'},
};

var lang = 'cn';
function t(key) { return I18N[key] ? (I18N[key][lang] || I18N[key].en) : key; }

// --- Audio (Web Audio API synth, default muted) ---
var audioCtx = null;
var soundMuted = true;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  if (soundMuted) return;
  var ac = getAudio();
  if (!ac) return;
  try {
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sndLaunch() { playTone(440, 0.12, 'sine', 0.1); setTimeout(function(){playTone(660, 0.15, 'sine', 0.08);}, 60); }
function sndLand() { playTone(523, 0.2, 'triangle', 0.12); setTimeout(function(){playTone(659, 0.15, 'triangle', 0.1);}, 100); }
function sndComplete() { playTone(523, 0.15, 'sine', 0.1); setTimeout(function(){playTone(659, 0.15, 'sine', 0.1);}, 100); setTimeout(function(){playTone(784, 0.25, 'sine', 0.1);}, 200); }
function sndClick() { playTone(660, 0.06, 'sine', 0.06); }

// --- DOM refs ---
var $ = function(id) { return document.getElementById(id); };
var canvas = $('c');
var ctx2d = canvas.getContext('2d');

// --- Sizing ---
var cW = 800, cH = 400;
function resize() {
  var body = $('gameBody');
  var dpr = window.devicePixelRatio || 1;
  var availW = body.clientWidth;
  var availH = body.clientHeight;
  var sz = Math.min(availW, availH);
  sz = Math.max(sz, 80);
  cW = availW;
  cH = availH;
  canvas.width = cW * dpr;
  canvas.height = cH * dpr;
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', function() { resize(); draw(); });

// --- Physics model ---
// Base parameters for an unmodified paper airplane
var BASE_PLANE = {
  cgOffset: 0,        // 0 = neutral, positive = forward
  liftCoeff: 0.4,     // lift coefficient
  dragCoeff: 0.12,     // drag coefficient
  stabFactor: 0.5,    // 0..1, higher = more stable
  mass: 5,            // grams
};

// Modification effects
var MOD_EFFECTS = {
  clip: { cgOffset: 0.3, liftCoeff: 0, dragCoeff: 0.01, stabFactor: 0.25, mass: 2 },
  wing: { cgOffset: 0, liftCoeff: 0.05, dragCoeff: -0.03, stabFactor: 0.2, mass: 0 },
  tail: { cgOffset: -0.05, liftCoeff: 0.02, dragCoeff: 0.02, stabFactor: 0.15, mass: 0.3 },
};

function getPlaneParams(mods) {
  var p = {
    cgOffset: BASE_PLANE.cgOffset,
    liftCoeff: BASE_PLANE.liftCoeff,
    dragCoeff: BASE_PLANE.dragCoeff,
    stabFactor: BASE_PLANE.stabFactor,
    mass: BASE_PLANE.mass,
  };
  for (var k in mods) {
    if (mods[k]) {
      var fx = MOD_EFFECTS[k];
      p.cgOffset += fx.cgOffset;
      p.liftCoeff += fx.liftCoeff;
      p.dragCoeff += fx.dragCoeff;
      p.stabFactor = Math.min(1, p.stabFactor + fx.stabFactor);
      p.mass += fx.mass;
    }
  }
  return p;
}

function simulateFlight(params) {
  // Simple flight simulation
  var throwSpeed = 8;  // m/s
  var angle = 15 * Math.PI / 180;  // launch angle in radians
  var dt = 0.02;
  var posX = 0, posY = 1.5;  // start at hand height
  var vx = throwSpeed * Math.cos(angle);
  var vy = throwSpeed * Math.sin(angle);
  var g = 9.81;
  var trajectory = [{x: posX, y: posY}];
  var wobbleAmp = (1 - params.stabFactor) * 0.8;
  var time = 0;

  // CG effect: forward CG reduces pitch oscillation
  var cgStab = 1 + params.cgOffset * 0.5;

  while (posY > 0 && time < 5) {
    // Lift
    var speed = Math.sqrt(vx * vx + vy * vy);
    var liftForce = 0.5 * 1.225 * speed * speed * params.liftCoeff * 0.01;
    // Drag
    var dragForce = 0.5 * 1.225 * speed * speed * params.dragCoeff * 0.01;

    // Apply forces
    var ax = -dragForce * (vx / (speed + 0.001)) / (params.mass * 0.001);
    var ay = liftForce / (params.mass * 0.001) - g - dragForce * (vy / (speed + 0.001)) / (params.mass * 0.001);

    // Wobble: unstable planes oscillate vertically
    var wobble = wobbleAmp * Math.sin(time * 8) * (1 - params.stabFactor) / cgStab;
    ay += wobble * 3;

    vx += ax * dt;
    vy += ay * dt;
    posX += vx * dt;
    posY += vy * dt;
    time += dt;

    if (posY < 0) posY = 0;
    trajectory.push({x: posX, y: posY});
  }

  // Add randomness (real flights vary)
  var distVariation = (Math.random() - 0.5) * 0.8;
  var finalDist = posX + distVariation;
  if (finalDist < 0.5) finalDist = 0.5;

  // Stability score based on trajectory smoothness
  var stabScore = params.stabFactor * 100;
  stabScore += (Math.random() - 0.5) * 15;
  stabScore = Math.max(10, Math.min(100, stabScore));

  return {
    distance: Math.round(finalDist * 10) / 10,
    stability: Math.round(stabScore),
    trajectory: trajectory,
  };
}

// --- Game State ---
var LEVELS = [
  { name: 'baseline', mods: {clip:false, wing:false, tail:false}, locked: {clip:true, wing:true, tail:true}, flights: 3 },
  { name: 'clipMod',  mods: {clip:true, wing:false, tail:false},  locked: {clip:true, wing:true, tail:true}, flights: 3 },
  { name: 'wingMod',  mods: {clip:false, wing:true, tail:false},  locked: {clip:true, wing:true, tail:true}, flights: 3 },
  { name: 'tailMod',  mods: {clip:false, wing:false, tail:true},  locked: {clip:true, wing:true, tail:true}, flights: 3 },
  { name: 'freeCombo', mods: {clip:false, wing:false, tail:false}, locked: {clip:false, wing:false, tail:false}, flights: 3 },
];

var gs = {
  phase: 'ready',     // ready, flying, landed, complete
  levelIdx: 0,
  flightIdx: 0,
  mods: {clip:false, wing:false, tail:false},
  currentResult: null,
  flightAnim: 0,      // 0..1 animation progress
  results: [],        // per-level results: [{distance, stability, mods}...]
  allResults: [],     // flat list for all levels
  bestDist: 0,
  bestCombo: null,
};

function currentLevel() { return LEVELS[gs.levelIdx]; }

function resetGame() {
  gs.phase = 'ready';
  gs.levelIdx = 0;
  gs.flightIdx = 0;
  gs.mods = {clip:false, wing:false, tail:false};
  gs.currentResult = null;
  gs.flightAnim = 0;
  gs.results = [];
  gs.allResults = [];
  gs.bestDist = 0;
  gs.bestCombo = null;
  for (var i = 0; i < LEVELS.length; i++) gs.results.push([]);
  applyLevelMods();
  refreshUI();
  draw();
}

function applyLevelMods() {
  var lv = currentLevel();
  // For locked levels, force the mods
  if (lv.name !== 'freeCombo') {
    gs.mods = {clip: lv.mods.clip, wing: lv.mods.wing, tail: lv.mods.tail};
  }
}

// --- Drawing ---
function drawPlaneSide(cx, cy, sc, rot, mods, alpha) {
  ctx2d.save();
  ctx2d.globalAlpha = alpha || 1;
  ctx2d.translate(cx, cy);
  ctx2d.rotate(rot);
  ctx2d.scale(sc, sc);

  // Main body
  ctx2d.fillStyle = '#d0d8f0';
  ctx2d.beginPath();
  ctx2d.moveTo(30, 0);
  ctx2d.lineTo(-18, -14);
  ctx2d.lineTo(-10, 0);
  ctx2d.lineTo(-18, 14);
  ctx2d.closePath();
  ctx2d.fill();

  // Wing crease
  ctx2d.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx2d.lineWidth = 0.8;
  ctx2d.beginPath(); ctx2d.moveTo(30, 0); ctx2d.lineTo(-10, 0); ctx2d.stroke();

  // Paperclip
  if (mods.clip) {
    ctx2d.strokeStyle = '#acf900';
    ctx2d.lineWidth = 1.8;
    ctx2d.beginPath();
    ctx2d.moveTo(26, -4);
    ctx2d.lineTo(32, -4);
    ctx2d.arc(32, -1, 3, -Math.PI/2, Math.PI/2);
    ctx2d.lineTo(28, 2);
    ctx2d.arc(28, -1, 3, Math.PI/2, -Math.PI/2, true);
    ctx2d.stroke();
  }

  // Wingtip fold
  if (mods.wing) {
    ctx2d.fillStyle = '#85ecff';
    ctx2d.globalAlpha = 0.6;
    ctx2d.beginPath();
    ctx2d.moveTo(-18, -14); ctx2d.lineTo(-14, -14); ctx2d.lineTo(-16, -20);
    ctx2d.closePath(); ctx2d.fill();
    ctx2d.beginPath();
    ctx2d.moveTo(-18, 14); ctx2d.lineTo(-14, 14); ctx2d.lineTo(-16, 20);
    ctx2d.closePath(); ctx2d.fill();
    ctx2d.globalAlpha = alpha || 1;
  }

  // Tail fin
  if (mods.tail) {
    ctx2d.fillStyle = '#acf900';
    ctx2d.globalAlpha = 0.7;
    ctx2d.beginPath();
    ctx2d.moveTo(-16, 0);
    ctx2d.lineTo(-22, -10);
    ctx2d.lineTo(-22, 0);
    ctx2d.closePath();
    ctx2d.fill();
    ctx2d.globalAlpha = alpha || 1;
  }

  ctx2d.restore();
}

function drawGround(groundY) {
  ctx2d.fillStyle = '#1a2618';
  ctx2d.fillRect(0, groundY, cW, cH - groundY);
  ctx2d.strokeStyle = 'rgba(80,255,176,0.3)';
  ctx2d.lineWidth = 2;
  ctx2d.beginPath(); ctx2d.moveTo(0, groundY); ctx2d.lineTo(cW, groundY); ctx2d.stroke();

  // Distance markers
  ctx2d.fillStyle = 'rgba(80,255,176,0.3)';
  ctx2d.font = "9px 'Space Grotesk', sans-serif";
  ctx2d.textAlign = 'center';
  var meterScale = (cW - 80) / 12;
  for (var m = 0; m <= 12; m++) {
    var mx = 40 + m * meterScale;
    ctx2d.strokeStyle = 'rgba(80,255,176,0.15)';
    ctx2d.lineWidth = 1;
    ctx2d.beginPath(); ctx2d.moveTo(mx, groundY); ctx2d.lineTo(mx, groundY + 8); ctx2d.stroke();
    if (m % 2 === 0) {
      ctx2d.fillText(m + 'm', mx, groundY + 18);
    }
  }
}

function draw() {
  // Background
  var grad = ctx2d.createLinearGradient(0, 0, 0, cH);
  grad.addColorStop(0, '#0c0e14');
  grad.addColorStop(0.7, '#101828');
  grad.addColorStop(1, '#0c0e14');
  ctx2d.fillStyle = grad;
  ctx2d.fillRect(0, 0, cW, cH);

  // Grid
  ctx2d.strokeStyle = 'rgba(80,255,176,0.03)';
  ctx2d.lineWidth = 0.5;
  for (var gx = 0; gx < cW; gx += 40) { ctx2d.beginPath(); ctx2d.moveTo(gx,0); ctx2d.lineTo(gx,cH); ctx2d.stroke(); }
  for (var gy = 0; gy < cH; gy += 40) { ctx2d.beginPath(); ctx2d.moveTo(0,gy); ctx2d.lineTo(cW,gy); ctx2d.stroke(); }

  var groundY = cH * 0.75;
  drawGround(groundY);

  if (gs.phase === 'complete') {
    drawCompleteScreen(groundY);
    return;
  }

  var launchX = 50;
  var launchY = groundY - 30;
  var meterScale = (cW - 80) / 12;

  if (gs.phase === 'ready') {
    // Draw plane at launch position
    drawPlaneSide(launchX + 30, launchY - 20, 2.2, -0.15, gs.mods, 1);
    // Status text
    ctx2d.fillStyle = '#aaabb0';
    ctx2d.font = "13px 'Noto Sans SC', sans-serif";
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t('clickStart'), cW / 2, groundY - cH * 0.35);

    // Show previous results for this level
    drawLevelHistory(groundY);
  }

  if (gs.phase === 'flying' && gs.currentResult) {
    var traj = gs.currentResult.trajectory;
    var progress = gs.flightAnim;
    var totalPts = traj.length;
    var idx = Math.floor(progress * (totalPts - 1));
    idx = Math.min(idx, totalPts - 1);

    // Draw trajectory path up to current position
    ctx2d.strokeStyle = 'rgba(80,255,176,0.4)';
    ctx2d.lineWidth = 1.5;
    ctx2d.setLineDash([4, 3]);
    ctx2d.beginPath();
    for (var i = 0; i <= idx; i++) {
      var px = launchX + traj[i].x * meterScale;
      var py = groundY - traj[i].y * meterScale * 0.8;
      if (i === 0) ctx2d.moveTo(px, py);
      else ctx2d.lineTo(px, py);
    }
    ctx2d.stroke();
    ctx2d.setLineDash([]);

    // Draw plane at current position
    var cp = traj[idx];
    var planeX = launchX + cp.x * meterScale;
    var planeY = groundY - cp.y * meterScale * 0.8;
    // Calculate angle from trajectory
    var nextIdx = Math.min(idx + 1, totalPts - 1);
    var np = traj[nextIdx];
    var angle = Math.atan2(-(np.y - cp.y), np.x - cp.x);
    drawPlaneSide(planeX, planeY, 2, angle, gs.mods, 1);

    // Draw previous results for this level
    drawLevelHistory(groundY);
  }

  if (gs.phase === 'landed' && gs.currentResult) {
    var traj2 = gs.currentResult.trajectory;

    // Draw full trajectory
    ctx2d.strokeStyle = 'rgba(80,255,176,0.3)';
    ctx2d.lineWidth = 1.5;
    ctx2d.setLineDash([4, 3]);
    ctx2d.beginPath();
    for (var j = 0; j < traj2.length; j++) {
      var tx = launchX + traj2[j].x * meterScale;
      var ty = groundY - traj2[j].y * meterScale * 0.8;
      if (j === 0) ctx2d.moveTo(tx, ty);
      else ctx2d.lineTo(tx, ty);
    }
    ctx2d.stroke();
    ctx2d.setLineDash([]);

    // Landed plane
    var lastPt = traj2[traj2.length - 1];
    var landX = launchX + lastPt.x * meterScale;
    drawPlaneSide(landX, groundY - 5, 1.8, 0.05, gs.mods, 0.8);

    // Landing spot marker
    ctx2d.fillStyle = '#50ffb0';
    ctx2d.beginPath();
    ctx2d.arc(landX, groundY - 2, 4, 0, Math.PI * 2);
    ctx2d.fill();

    // Distance label
    ctx2d.fillStyle = '#50ffb0';
    ctx2d.font = "bold 14px 'Space Grotesk', sans-serif";
    ctx2d.textAlign = 'center';
    ctx2d.fillText(gs.currentResult.distance.toFixed(1) + t('mLabel'), landX, groundY - 20);

    // Stability label
    ctx2d.fillStyle = '#85ecff';
    ctx2d.font = "12px 'Space Grotesk', sans-serif";
    ctx2d.fillText(t('stability') + ': ' + gs.currentResult.stability + '%', landX, groundY - 38);

    // Draw previous results for this level
    drawLevelHistory(groundY);
  }
}

function drawLevelHistory(groundY) {
  var results = gs.results[gs.levelIdx];
  if (!results || results.length === 0) return;

  var launchX = 50;
  var meterScale = (cW - 80) / 12;

  // Draw small markers for previous flights
  for (var i = 0; i < results.length; i++) {
    if (gs.phase === 'landed' && i === results.length - 1) continue; // current flight is drawn separately
    var r = results[i];
    var rx = launchX + r.distance * meterScale;
    // Small circle
    ctx2d.fillStyle = 'rgba(80,255,176,0.3)';
    ctx2d.beginPath();
    ctx2d.arc(rx, groundY - 2, 3, 0, Math.PI * 2);
    ctx2d.fill();
    // Tiny label
    ctx2d.fillStyle = 'rgba(255,255,255,0.4)';
    ctx2d.font = "9px 'Space Grotesk', sans-serif";
    ctx2d.textAlign = 'center';
    ctx2d.fillText(r.distance.toFixed(1), rx, groundY + 28);
  }
}

function drawCompleteScreen(groundY) {
  ctx2d.fillStyle = '#50ffb0';
  ctx2d.font = "bold 22px 'Space Grotesk', 'Noto Sans SC', sans-serif";
  ctx2d.textAlign = 'center';
  ctx2d.fillText(t('complete'), cW / 2, 50);

  // Summary table
  var tableTop = 80;
  var colW = (cW - 60) / 5;
  var rowH = 24;
  var tableLeft = 30;

  // Headers
  var levelNames = ['baseline', 'clipMod', 'wingMod', 'tailMod', 'freeCombo'];
  ctx2d.font = "bold 10px 'Space Grotesk', 'Noto Sans SC', sans-serif";
  for (var c = 0; c < 5; c++) {
    ctx2d.fillStyle = c === 4 ? '#acf900' : '#50ffb0';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t(levelNames[c]), tableLeft + colW * c + colW / 2, tableTop);
  }

  // Data rows
  for (var lv = 0; lv < 5; lv++) {
    var lvResults = gs.results[lv];
    for (var r = 0; r < lvResults.length; r++) {
      var ry = tableTop + 18 + r * rowH;
      ctx2d.fillStyle = r % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.06)';
      ctx2d.fillRect(tableLeft + colW * lv, ry - 8, colW - 4, rowH);
      ctx2d.fillStyle = '#cccccc';
      ctx2d.font = "11px 'Space Grotesk', sans-serif";
      ctx2d.textAlign = 'center';
      ctx2d.fillText(lvResults[r].distance.toFixed(1) + 'm', tableLeft + colW * lv + colW / 2, ry + 6);
    }
    // Average
    if (lvResults.length > 0) {
      var avgD = 0;
      for (var a = 0; a < lvResults.length; a++) avgD += lvResults[a].distance;
      avgD /= lvResults.length;
      var avgY = tableTop + 18 + 3 * rowH + 4;
      ctx2d.fillStyle = '#50ffb0';
      ctx2d.font = "bold 11px 'Space Grotesk', sans-serif";
      ctx2d.fillText(t('avgDist') + ': ' + avgD.toFixed(1) + 'm', tableLeft + colW * lv + colW / 2, avgY);
    }
  }

  // Best combo info
  if (gs.bestCombo) {
    var comboY = tableTop + 18 + 4 * rowH + 30;
    ctx2d.fillStyle = '#acf900';
    ctx2d.font = "bold 14px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t('bestCombo'), cW / 2, comboY);

    var comboDesc = [];
    if (gs.bestCombo.clip) comboDesc.push(t('clip'));
    if (gs.bestCombo.wing) comboDesc.push(t('wingfold'));
    if (gs.bestCombo.tail) comboDesc.push(t('tailfin'));
    if (comboDesc.length === 0) comboDesc.push(t('none'));
    ctx2d.fillStyle = '#ffffff';
    ctx2d.font = "13px 'Noto Sans SC', sans-serif";
    ctx2d.fillText(comboDesc.join(' + ') + '  (' + gs.bestDist.toFixed(1) + 'm)', cW / 2, comboY + 24);
  }

  // Insight
  ctx2d.fillStyle = '#aaabb0';
  ctx2d.font = "12px 'Noto Sans SC', sans-serif";
  ctx2d.textAlign = 'center';
  ctx2d.fillText(t('insight'), cW / 2, cH - 30);
}

// --- Flight animation ---
var animRAF = null;
var animStart = 0;
var FLIGHT_DURATION = 2000; // ms

function startFlightAnim() {
  gs.phase = 'flying';
  gs.flightAnim = 0;
  animStart = performance.now();
  sndLaunch();

  function step(ts) {
    var elapsed = ts - animStart;
    gs.flightAnim = Math.min(elapsed / FLIGHT_DURATION, 1);
    draw();
    if (gs.flightAnim < 1) {
      animRAF = requestAnimationFrame(step);
    } else {
      // Flight complete
      gs.phase = 'landed';
      gs.results[gs.levelIdx].push(gs.currentResult);
      gs.allResults.push({
        level: gs.levelIdx,
        distance: gs.currentResult.distance,
        stability: gs.currentResult.stability,
        mods: {clip: gs.mods.clip, wing: gs.mods.wing, tail: gs.mods.tail},
      });
      // Track best
      if (gs.currentResult.distance > gs.bestDist) {
        gs.bestDist = gs.currentResult.distance;
        gs.bestCombo = {clip: gs.mods.clip, wing: gs.mods.wing, tail: gs.mods.tail};
      }
      sndLand();
      gs.flightIdx++;
      refreshUI();
      draw();
      // Auto-advance after short delay
      setTimeout(function() {
        if (gs.flightIdx >= currentLevel().flights) {
          // Level complete
          gs.flightIdx = 0;
          gs.levelIdx++;
          if (gs.levelIdx >= LEVELS.length) {
            gs.phase = 'complete';
            sndComplete();
          } else {
            gs.phase = 'ready';
            applyLevelMods();
          }
        } else {
          gs.phase = 'ready';
        }
        refreshUI();
        draw();
      }, 1200);
    }
  }
  animRAF = requestAnimationFrame(step);
}

// --- Launch ---
function doLaunch() {
  if (gs.phase !== 'ready') return;
  if (gs.phase === 'complete') return;
  var params = getPlaneParams(gs.mods);
  gs.currentResult = simulateFlight(params);
  startFlightAnim();
  refreshUI();
}

// --- UI refresh ---
function refreshUI() {
  $('gameTitle').textContent = t('title');
  $('langBtn').textContent = lang === 'cn' ? 'CN' : 'EN';
  $('soundBtn').textContent = soundMuted ? 'MUTE' : 'SND';
  $('btnLaunch').textContent = t('launch');
  $('btnReset').textContent = t('reset');
  $('modClip').textContent = t('clip');
  $('modWing').textContent = t('wingfold');
  $('modTail').textContent = t('tailfin');

  // Level info
  if (gs.phase === 'complete') {
    $('roundInfo').textContent = t('complete');
  } else {
    $('roundInfo').textContent = t('level') + ' ' + (gs.levelIdx + 1) + '/5  |  ' +
      t('flight') + (gs.flightIdx + 1) + '/' + currentLevel().flights + t('flightSuf');
  }

  // Sidebar
  var lv = currentLevel();
  var guideKeys = ['guide_l1', 'guide_l2', 'guide_l3', 'guide_l4', 'guide_l5'];
  $('sidebarTitle').textContent = t('level') + ' ' + (gs.levelIdx + 1);
  $('guideContent').textContent = gs.phase === 'complete' ? t('insight') : t(guideKeys[gs.levelIdx]);

  // Mod buttons state
  var modBtns = {clip: $('modClip'), wing: $('modWing'), tail: $('modTail')};
  for (var mk in modBtns) {
    var btn = modBtns[mk];
    if (gs.phase === 'complete' || lv.locked[mk]) {
      btn.disabled = true;
    } else {
      btn.disabled = gs.phase !== 'ready';
    }
    btn.classList.toggle('active', gs.mods[mk]);
  }

  // Launch button
  $('btnLaunch').disabled = gs.phase !== 'ready' || gs.phase === 'complete';

  // HUD
  $('hudL1').textContent = t('distance');
  $('hudL2').textContent = t('stability');
  $('hudL3').textContent = t('bestDist');
  $('hudL4').textContent = t('avgDist');

  if (gs.currentResult && (gs.phase === 'landed' || gs.phase === 'flying')) {
    $('hudV1').textContent = gs.currentResult.distance.toFixed(1) + t('mLabel');
    $('hudV2').textContent = gs.currentResult.stability + '%';
  } else {
    $('hudV1').textContent = '--';
    $('hudV2').textContent = '--';
  }

  $('hudV3').textContent = gs.bestDist > 0 ? gs.bestDist.toFixed(1) + t('mLabel') : '--';

  // Average for current level
  var lvResults = gs.results[gs.levelIdx] || [];
  if (lvResults.length > 0) {
    var sum = 0;
    for (var i = 0; i < lvResults.length; i++) sum += lvResults[i].distance;
    $('hudV4').textContent = (sum / lvResults.length).toFixed(1) + t('mLabel');
  } else {
    $('hudV4').textContent = '--';
  }
}

// --- Event handlers ---
$('btnLaunch').addEventListener('click', function() { doLaunch(); });
$('btnReset').addEventListener('click', function() { sndClick(); resetGame(); });

$('langBtn').addEventListener('click', function() {
  lang = lang === 'cn' ? 'en' : 'cn';
  refreshUI();
  draw();
});

$('soundBtn').addEventListener('click', function() {
  soundMuted = !soundMuted;
  $('soundBtn').textContent = soundMuted ? 'MUTE' : 'SND';
  if (!soundMuted) { getAudio(); sndClick(); }
});

// Mod toggle buttons (only for free combo level)
$('modClip').addEventListener('click', function() {
  if (currentLevel().locked.clip) return;
  if (gs.phase !== 'ready') return;
  gs.mods.clip = !gs.mods.clip;
  sndClick();
  refreshUI();
  draw();
});
$('modWing').addEventListener('click', function() {
  if (currentLevel().locked.wing) return;
  if (gs.phase !== 'ready') return;
  gs.mods.wing = !gs.mods.wing;
  sndClick();
  refreshUI();
  draw();
});
$('modTail').addEventListener('click', function() {
  if (currentLevel().locked.tail) return;
  if (gs.phase !== 'ready') return;
  gs.mods.tail = !gs.mods.tail;
  sndClick();
  refreshUI();
  draw();
});

// --- Init ---
resize();
resetGame();
</script>
