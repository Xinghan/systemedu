<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:240px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.5;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.game-title-bar{
  display:flex;align-items:center;justify-content:center;
  padding:8px 16px;
  background:rgba(28,27,27,0.95);
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.game-title-bar h2{
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;
}
.game-area{
  flex:1;min-height:0;display:flex;
  overflow:hidden;
}
.sample-panel{
  width:280px;min-width:280px;
  overflow-y:auto;
  padding:8px;
  background:rgba(19,19,19,0.95);
  border-right:1px solid rgba(138,136,134,0.15);
}
.sample-card{
  padding:8px;margin-bottom:6px;cursor:grab;
  background:linear-gradient(135deg, rgba(53,53,52,0.9), rgba(28,27,27,0.9));
  border:1px solid rgba(138,136,134,0.15);
  transition:border-color 0.2s, box-shadow 0.2s;
  user-select:none;
  -webkit-user-select:none;
}
.sample-card:hover{border-color:rgba(255,181,156,0.4);}
.sample-card.dragging{opacity:0.4;}
.sample-card.correct{border-color:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.3);}
.sample-card.wrong{border-color:#ff5f1f;box-shadow:0 0 8px rgba(255,95,31,0.3);}
.sample-card .card-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:4px;
}
.sample-card .card-id{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  color:#8a8886;letter-spacing:1px;
}
.sample-card .card-conf{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  color:#ff5f1f;
}
.sample-card .card-labels{
  display:flex;gap:12px;margin-bottom:4px;
}
.sample-card .label-pair{
  font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:#c6c6c6;
}
.sample-card .label-pair span{font-weight:700;color:#e5e2e1;}
.sample-card .card-desc{
  font-family:'Noto Sans SC',sans-serif;font-size:11px;
  color:rgba(255,255,255,0.7);line-height:1.4;
}
.sample-card .card-feedback{
  font-family:'Noto Sans SC',sans-serif;font-size:10px;
  color:#10b981;margin-top:4px;line-height:1.3;
  display:none;
}
.sample-card .card-feedback.wrong-fb{color:#ff5f1f;}
.bucket-panel{
  flex:1;display:flex;flex-direction:column;gap:6px;
  padding:8px;overflow-y:auto;
}
.bucket{
  flex:1;min-height:60px;
  padding:6px 8px;
  border:1.5px dashed rgba(138,136,134,0.3);
  transition:border-color 0.2s, background 0.2s;
  position:relative;
}
.bucket.dragover{
  border-style:solid;
}
.bucket .bucket-header{
  display:flex;align-items:center;gap:8px;margin-bottom:4px;
}
.bucket .bucket-icon{
  width:12px;height:12px;
}
.bucket .bucket-title{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;
}
.bucket .bucket-desc{
  font-family:'Noto Sans SC',sans-serif;font-size:10px;
  color:rgba(255,255,255,0.5);margin-bottom:4px;
}
.bucket .bucket-items{
  display:flex;flex-wrap:wrap;gap:4px;
}
.bucket .bucket-chip{
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;
  padding:2px 6px;
  border:1px solid rgba(138,136,134,0.15);
  background:rgba(28,27,27,0.8);
  color:#c6c6c6;
}
.feedback-bar{
  display:flex;align-items:center;gap:12px;
  padding:8px 16px;
  background:rgba(28,27,27,0.92);
  border-top:1px solid rgba(138,136,134,0.15);
  min-height:44px;
}
.feedback-bar .score-chip{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  padding:2px 10px;border:1px solid rgba(138,136,134,0.15);
  color:#ffb59c;
}
.feedback-bar .msg{
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  color:rgba(255,255,255,0.7);flex:1;
}
.feedback-bar .reset-btn{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 12px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#ffb59c;
}
.feedback-bar .reset-btn:hover{background:#353534;}
.summary-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
  z-index:200;display:none;
  justify-content:center;align-items:center;
}
.summary-overlay.active{display:flex;}
.summary-box{
  width:400px;max-width:90vw;
  padding:24px;
  background:linear-gradient(135deg, rgba(28,27,27,0.98), rgba(19,19,19,0.98));
  border:1px solid rgba(255,255,255,0.08);
}
.summary-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;
  color:#ffb59c;margin-bottom:12px;letter-spacing:1px;
}
.summary-box .stat-row{
  display:flex;justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid rgba(138,136,134,0.1);
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
}
.summary-box .stat-row .stat-label{color:#8a8886;}
.summary-box .stat-row .stat-val{font-weight:700;color:#e5e2e1;}
.summary-box .close-btn{
  margin-top:16px;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:6px 20px;cursor:pointer;letter-spacing:1px;
  border:2px solid #ff7f50;
  background:rgba(255,127,80,0.15);color:#ffb59c;
  display:block;width:100%;
}
.summary-box .close-btn:hover{background:rgba(255,127,80,0.35);}
/* drag ghost */
.drag-ghost{
  position:fixed;z-index:300;pointer-events:none;
  padding:6px 10px;
  background:rgba(53,53,52,0.95);
  border:1px solid #ffb59c;
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  color:#ffb59c;
  box-shadow:0 0 12px rgba(255,181,156,0.3);
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <ul id="guideList"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="game-title-bar"><h2 id="gameTitle"></h2></div>
  <div class="game-area">
    <div class="sample-panel" id="samplePanel"></div>
    <div class="bucket-panel" id="bucketPanel"></div>
  </div>
  <div class="feedback-bar" id="feedbackBar">
    <div class="score-chip" id="scoreChip">0 / 12</div>
    <div class="msg" id="feedbackMsg"></div>
    <button class="reset-btn" id="resetBtn"></button>
  </div>
</div>
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-box" id="summaryBox">
    <h2 id="summaryTitle"></h2>
    <div id="summaryStats"></div>
    <button class="close-btn" id="closeBtn"></button>
  </div>
</div>

  {id:'S10', pred:'unknown', truth:'rock',    conf:42, answer:'bCapacity',
   desc:{en:'Layered bedrock with parallel striations; model uncertain between rock subtypes', cn:'\u5c42\u7406\u57fa\u5ca9\u6709\u5e73\u884c\u6761\u7eb9\uff1b\u6a21\u578b\u5728\u5ca9\u77f3\u5b50\u7c7b\u4e4b\u95f4\u4e0d\u786e\u5b9a'},
   fb:{en:'Model cannot tell apart rock subtypes (rubble vs bedrock) - capacity limitation', cn:'\u6a21\u578b\u65e0\u6cd5\u533a\u5206\u5ca9\u77f3\u5b50\u7c7b\uff08\u788e\u77f3 vs \u57fa\u5ca9\uff09-- \u8868\u8fbe\u529b\u4e0d\u8db3'}},
  {id:'S11', pred:'soil',    truth:'dune',    conf:64, answer:'bImbalance',
   desc:{en:'Flat inter-dune area with thin sand layer; dune class has 5x fewer samples', cn:'\u6c99\u4e18\u95f4\u5e73\u5766\u533a\u57df\u6709\u8584\u6c99\u5c42\uff1b\u6c99\u4e18\u7c7b\u6837\u672c\u5c11 5 \u500d'},
   fb:{en:'Inter-dune flat area defaulted to soil due to severe class imbalance', cn:'\u6c99\u4e18\u95f4\u5e73\u5766\u533a\u57df\u88ab\u9ed8\u8ba4\u4e3a\u571f\u58e4\uff0c\u56e0\u4e3a\u4e25\u91cd\u7c7b\u522b\u4e0d\u5e73\u8861'}},
  {id:'S12', pred:'soil',    truth:'unknown', conf:39, answer:'bRes',
   desc:{en:'Night-time image with minimal illumination, only faint outlines visible', cn:'\u591c\u95f4\u56fe\u50cf\u5149\u7167\u6781\u5f31\uff0c\u53ea\u80fd\u770b\u5230\u6a21\u7cca\u8f6e\u5ed3'},
   fb:{en:'Near-zero illumination destroys all texture - imaging quality issue', cn:'\u63a5\u8fd1\u96f6\u5149\u7167\u6467\u6bc1\u4e86\u6240\u6709\u7eb9\u7406 -- \u6210\u50cf\u8d28\u91cf\u95ee\u9898'}},
];

/* ── bucket definitions ── */
var BUCKETS = [
  {key:'bNoise', color:'#ff7f50', borderColor:'rgba(255,127,80,0.4)', bgColor:'rgba(255,127,80,0.06)'},
  {key:'bRes', color:'#00daf3', borderColor:'rgba(0,218,243,0.4)', bgColor:'rgba(0,218,243,0.06)'},
  {key:'bImbalance', color:'#a78bfa', borderColor:'rgba(167,139,250,0.4)', bgColor:'rgba(167,139,250,0.06)'},
  {key:'bCapacity', color:'#ff5f1f', borderColor:'rgba(255,95,31,0.4)', bgColor:'rgba(255,95,31,0.06)'},
];

/* ── state ── */
var placed = {}; /* sampleId -> bucketKey */
var correctCount = 0;
var wrongCount = 0;
var dragSampleId = null;
var ghost = null;

/* ── render ── */
function renderSamples(){
  var panel = document.getElementById('samplePanel');
  panel.innerHTML = '';
  SAMPLES.forEach(function(s){
    if(placed[s.id]) return;
    var card = document.createElement('div');
    card.className = 'sample-card';
    card.setAttribute('data-id', s.id);
    card.innerHTML =
      '<div class="card-header"><span class="card-id">'+s.id+'</span><span class="card-conf">'+s.conf+'%</span></div>'+
      '<div class="card-labels">'+
        '<span class="label-pair">'+t('pred')+': <span>'+t(s.pred)+'</span></span>'+
        '<span class="label-pair">'+t('truth')+': <span>'+t(s.truth)+'</span></span>'+
      '</div>'+
      '<div class="card-desc">'+s.desc[LANG]+'</div>';
    /* mouse drag */
    card.addEventListener('mousedown', function(e){ startDrag(e, s.id); });
    card.addEventListener('touchstart', function(e){ startDrag(e, s.id); }, {passive:false});
    panel.appendChild(card);
  });
}

function renderBuckets(){
  var panel = document.getElementById('bucketPanel');
  panel.innerHTML = '';
  BUCKETS.forEach(function(b){
    var bucket = document.createElement('div');
    bucket.className = 'bucket';
    bucket.setAttribute('data-key', b.key);
    bucket.style.borderColor = b.borderColor;
    bucket.style.background = b.bgColor;
    bucket.innerHTML =
      '<div class="bucket-header">'+
        '<div class="bucket-icon" style="background:'+b.color+';"></div>'+
        '<span class="bucket-title" style="color:'+b.color+';">'+t(b.key)+'</span>'+
      '</div>'+
      '<div class="bucket-desc">'+t(b.key+'Desc')+'</div>'+
      '<div class="bucket-items" data-bucket="'+b.key+'"></div>';
    panel.appendChild(bucket);
  });
}

function renderPlacedChips(){
  BUCKETS.forEach(function(b){
    var container = document.querySelector('[data-bucket="'+b.key+'"]');
    if(!container) return;
    container.innerHTML = '';
    SAMPLES.forEach(function(s){
      if(placed[s.id] === b.key){
        var chip = document.createElement('span');
        chip.className = 'bucket-chip';
        chip.textContent = s.id;
        container.appendChild(chip);
      }
    });
  });
}

function updateScore(){
  document.getElementById('scoreChip').textContent = (correctCount+wrongCount)+' / 12';
}

/* ── drag and drop ── */
function startDrag(e, sampleId){
  e.preventDefault();
  dragSampleId = sampleId;
  var card = document.querySelector('[data-id="'+sampleId+'"]');
  if(card) card.classList.add('dragging');

  ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.textContent = sampleId;
  document.body.appendChild(ghost);

  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;
  ghost.style.left = clientX + 'px';
  ghost.style.top = clientY + 'px';

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, {passive:false});
  document.addEventListener('touchend', onDragEnd);
}

function onDragMove(e){
  if(!ghost) return;
  if(e.touches) e.preventDefault();
  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;
  ghost.style.left = clientX + 'px';
  ghost.style.top = clientY + 'px';

  /* highlight bucket on hover */
  var buckets = document.querySelectorAll('.bucket');
  buckets.forEach(function(b){
    var rect = b.getBoundingClientRect();
    if(clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom){
      b.classList.add('dragover');
      b.style.borderStyle = 'solid';
      b.style.borderWidth = '2px';
    } else {
      b.classList.remove('dragover');
      b.style.borderStyle = 'dashed';
      b.style.borderWidth = '1.5px';
    }
  });
}

function onDragEnd(e){
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);

  if(ghost){ ghost.remove(); ghost = null; }

  var card = document.querySelector('[data-id="'+dragSampleId+'"]');

  var clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  var clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

  var droppedBucket = null;
  var buckets = document.querySelectorAll('.bucket');
  buckets.forEach(function(b){
    b.classList.remove('dragover');
    b.style.borderStyle = 'dashed';
    b.style.borderWidth = '1.5px';
    var rect = b.getBoundingClientRect();
    if(clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom){
      droppedBucket = b.getAttribute('data-key');
    }
  });

  if(droppedBucket && dragSampleId){
    var sample = SAMPLES.find(function(s){ return s.id === dragSampleId; });
    if(sample){
      placed[sample.id] = droppedBucket;
      var isCorrect = droppedBucket === sample.answer;
      if(isCorrect){
        correctCount++;
        if(card){
          card.classList.remove('dragging');
          card.classList.add('correct');
        }
      } else {
        wrongCount++;
        if(card){
          card.classList.remove('dragging');
          card.classList.add('wrong');
          /* show feedback */
          var fbDiv = document.createElement('div');
          fbDiv.className = 'card-feedback wrong-fb';
          fbDiv.style.display = 'block';
          fbDiv.textContent = sample.fb[LANG] + ' [' + t(sample.answer) + ']';
          card.appendChild(fbDiv);
        }
      }
      updateScore();
      renderPlacedChips();

      /* remove card after short delay */
      setTimeout(function(){
        renderSamples();
        checkWin();
      }, 800);
    }
  } else {
    if(card) card.classList.remove('dragging');
  }

  dragSampleId = null;
}

function checkWin(){
  var totalPlaced = correctCount + wrongCount;
  if(totalPlaced >= 12){
    showSummary();
  }
}

function showSummary(){
  var overlay = document.getElementById('summaryOverlay');
  overlay.classList.add('active');
  document.getElementById('summaryTitle').textContent = t('summaryTitle');
  var accuracy = Math.round(correctCount / 12 * 100);
  var passed = correctCount >= 9;
  document.getElementById('summaryStats').innerHTML =
    '<div class="stat-row"><span class="stat-label">'+t('statCorrect')+'</span><span class="stat-val" style="color:#10b981;">'+correctCount+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">'+t('statWrong')+'</span><span class="stat-val" style="color:#ff5f1f;">'+wrongCount+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">'+t('statAccuracy')+'</span><span class="stat-val">'+accuracy+'%</span></div>'+
    '<div class="stat-row"><span class="stat-label">'+t('statVerdict')+'</span><span class="stat-val" style="color:'+(passed?'#10b981':'#ff5f1f')+';">'+(passed?t('verdictPass'):t('verdictFail'))+'</span></div>';
  document.getElementById('closeBtn').textContent = t('closeBtn');
}

function resetGame(){
  placed = {};
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('summaryOverlay').classList.remove('active');
  renderSamples();
  renderBuckets();
  updateScore();
  document.getElementById('feedbackMsg').textContent = t('msgReady');
}

/* ── guide ── */
function updateGuide(){
  document.getElementById('guideTitle').textContent = t('guideTitle');
  var items = t('guideItems');
  var html = '';
  if(Array.isArray(items)){
    items.forEach(function(item){ html += '<li>'+item+'</li>'; });
  }
  document.getElementById('guideList').innerHTML = html;
}
document.getElementById('guideHeader').addEventListener('click', function(){
  var content = document.getElementById('guideContent');
  var toggle = document.getElementById('guideToggle');
  if(content.classList.contains('collapsed')){
    content.classList.remove('collapsed');
    toggle.textContent = '[-]';
  } else {
    content.classList.add('collapsed');
    toggle.textContent = '[+]';
  }
});

/* ── i18n ── */
function refreshI18N(){
  document.getElementById('gameTitle').textContent = t('gameTitle');
  document.getElementById('resetBtn').textContent = t('resetBtn');
  document.getElementById('feedbackMsg').textContent = t('msgReady');
  updateGuide();
  renderSamples();
  renderBuckets();
  renderPlacedChips();
  updateScore();
}

document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG === 'en' ? 'cn' : 'en';
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  refreshI18N();
});

/* ── events ── */
document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('closeBtn').addEventListener('click', function(){
  document.getElementById('summaryOverlay').classList.remove('active');
});

/* ── init ── */
refreshI18N();

})();
</script>
</body>
</html>
