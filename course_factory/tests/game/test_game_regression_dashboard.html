<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Regression Test Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0!important}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:8px 16px 4px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .sub{font-size:11px;color:#8a8886;margin-top:2px}
.game-area{flex:1;min-height:0;display:flex;gap:8px;padding:8px 12px;overflow:hidden}
.control-panel{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.panel-section{background:rgba(28,27,27,0.92);border:1px solid rgba(255,255,255,0.06);padding:10px}
.panel-section h3{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#ffb59c;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.slider-group{margin-bottom:10px}
.slider-group label{display:block;font-size:10px;color:#8a8886;margin-bottom:4px;font-family:'Space Grotesk',sans-serif;letter-spacing:0.5px;text-transform:uppercase}
.slider-group input[type=range]{width:100%;appearance:none;-webkit-appearance:none;height:4px;background:linear-gradient(90deg,#ff7f50,#00daf3);outline:none;cursor:pointer}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#ffb59c;cursor:pointer}
.slider-group .slider-val{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#00daf3;font-weight:700;float:right}
.run-btn{width:100%;padding:10px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,127,80,0.3);background:linear-gradient(180deg,rgba(255,127,80,0.2),rgba(255,127,80,0.05));color:#ffb59c}
.run-btn:hover{background:linear-gradient(180deg,rgba(255,127,80,0.35),rgba(255,127,80,0.1))}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.dashboard{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0}
.test-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;min-height:0;overflow-y:auto}
.test-card{background:rgba(28,27,27,0.92);border:1px solid rgba(255,255,255,0.06);padding:10px;display:flex;flex-direction:column;justify-content:space-between}
.test-card .tc-name{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8a8886;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.test-card .tc-status{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;text-align:center;margin:6px 0}
.test-card .tc-detail{font-size:10px;color:#8a8886;line-height:1.4}
.test-card.pass{border-color:rgba(16,185,129,0.3)}.test-card.pass .tc-status{color:#10b981}
.test-card.fail{border-color:rgba(255,95,31,0.3)}.test-card.fail .tc-status{color:#ff5f1f}
.test-card.pending .tc-status{color:#8a8886}
.test-card.running{border-color:rgba(0,218,243,0.3)}.test-card.running .tc-status{color:#00daf3}
.summary-bar{display:flex;gap:8px;flex-shrink:0}
.summary-item{flex:1;background:rgba(28,27,27,0.92);border:1px solid rgba(255,255,255,0.06);padding:8px;text-align:center}
.summary-item .si-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.summary-item .si-value{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#ffb59c;margin-top:2px}
.verdict-panel{flex-shrink:0;padding:8px;background:rgba(0,0,0,0.55);text-align:center}
.verdict-panel .verdict{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:36vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:14px;line-height:1.6}
.guide-content.collapsed{display:none}
.complete-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center}
.complete-box{background:rgba(20,20,35,0.95);backdrop-filter:blur(16px);border:1px solid rgba(255,127,80,0.3);padding:28px;width:360px;text-align:center}
.complete-box h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#ffb59c;margin-bottom:12px}
.complete-box .cval{font-family:'Space Grotesk',sans-serif;font-size:28px;color:#10b981;font-weight:700;margin:12px 0}
.complete-box p{font-size:12px;color:#e5e2e1;line-height:1.6}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideDesc" style="margin-bottom:6px"></p>
    <ul id="guideList"></ul>
  </div>
</div>
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-box">
    <h2 id="completeTitle"></h2>
    <div class="cval" id="completeScore"></div>
    <p id="completeMsg"></p>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="titleText"></h1>
    <div class="sub" id="subtitleText"></div>
  </div>
  <div class="game-area">
    <div class="control-panel">
      <div class="panel-section">
        <h3 id="paramTitle"></h3>
        <div class="slider-group">
          <label id="sliderLabel0"></label>
          <input type="range" id="slider0" min="50" max="100" value="85"/>
          <span class="slider-val" id="sliderVal0">85%</span>
        </div>
        <div class="slider-group">
          <label id="sliderLabel1"></label>
          <input type="range" id="slider1" min="0" max="20" value="5"/>
          <span class="slider-val" id="sliderVal1">5</span>
        </div>
        <div class="slider-group">
          <label id="sliderLabel2"></label>
          <input type="range" id="slider2" min="60" max="100" value="90"/>
          <span class="slider-val" id="sliderVal2">90%</span>
        </div>
      </div>
      <button class="run-btn" id="btnRun"></button>
      <div class="panel-section" id="decisionPanel" style="display:none">
        <h3 id="decisionTitle"></h3>
        <p id="decisionDesc" style="font-size:11px;color:#e5e2e1;margin-bottom:8px"></p>
        <button class="run-btn" id="btnApprove" style="margin-bottom:6px"></button>
        <button class="run-btn" id="btnReject" style="border-color:rgba(255,95,31,0.3);background:linear-gradient(180deg,rgba(255,95,31,0.15),rgba(255,95,31,0.05))"></button>
      </div>
    </div>
    <div class="dashboard">
      <div class="test-grid" id="testGrid"></div>
      <div class="summary-bar">
        <div class="summary-item"><div class="si-label" id="sumLabel0"></div><div class="si-value" id="sumValue0">--</div></div>
        <div class="summary-item"><div class="si-label" id="sumLabel1"></div><div class="si-value" id="sumValue1">--</div></div>
        <div class="summary-item"><div class="si-label" id="sumLabel2"></div><div class="si-value" id="sumValue2">--</div></div>
        <div class="summary-item"><div class="si-label" id="sumLabel3"></div><div class="si-value" id="sumValue3">--</div></div>
      </div>
      <div class="verdict-panel">
        <div class="verdict" id="verdictText" style="color:#8a8886"></div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'REGRESSION TEST DASHBOARD',cn:'\u56de\u5f52\u6d4b\u8bd5\u4eea\u8868\u76d8'},
  subtitle:{en:'Configure parameters and run the test suite to validate System 1.0',cn:'\u914d\u7f6e\u53c2\u6570\u5e76\u8fd0\u884c\u6d4b\u8bd5\u5957\u4ef6\u9a8c\u8bc1\u7cfb\u7edf 1.0'},
  paramTitle:{en:'TEST PARAMETERS',cn:'\u6d4b\u8bd5\u53c2\u6570'},
  sliderLabel0:{en:'CLASSIFIER THRESHOLD',cn:'\u5206\u7c7b\u5668\u9608\u503c'},
  sliderLabel1:{en:'MAX FAILURE TOLERANCE',cn:'\u6700\u5927\u5bb9\u9519\u6570'},
  sliderLabel2:{en:'PATH CONSISTENCY',cn:'\u8def\u5f84\u4e00\u81f4\u6027'},
  btnRun:{en:'RUN REGRESSION SUITE',cn:'\u8fd0\u884c\u56de\u5f52\u5957\u4ef6'},
  sumPass:{en:'PASSED',cn:'\u901a\u8fc7'},
  sumFail:{en:'FAILED',cn:'\u5931\u8d25'},
  sumTotal:{en:'TOTAL',cn:'\u603b\u6570'},
  sumRate:{en:'PASS RATE',cn:'\u901a\u8fc7\u7387'},
  verdictWait:{en:'Configure parameters and run tests',cn:'\u914d\u7f6e\u53c2\u6570\u5e76\u8fd0\u884c\u6d4b\u8bd5'},
  verdictRunning:{en:'Running regression tests...',cn:'\u6b63\u5728\u8fd0\u884c\u56de\u5f52\u6d4b\u8bd5...'},
  verdictPass:{en:'ALL TESTS PASSED - SYSTEM READY FOR RELEASE',cn:'\u5168\u90e8\u6d4b\u8bd5\u901a\u8fc7 - \u7cfb\u7edf\u53ef\u4ee5\u53d1\u5e03'},
  verdictFail:{en:'SOME TESTS FAILED - REVIEW PARAMETERS',cn:'\u90e8\u5206\u6d4b\u8bd5\u5931\u8d25 - \u8bf7\u68c0\u67e5\u53c2\u6570'},
  decisionTitle:{en:'RELEASE DECISION',cn:'\u53d1\u5e03\u51b3\u7b56'},
  decisionDescPass:{en:'All tests passed. Approve release v1.0?',cn:'\u6240\u6709\u6d4b\u8bd5\u901a\u8fc7\u3002\u6279\u51c6\u53d1\u5e03 v1.0\uff1f'},
  decisionDescFail:{en:'Tests have failures. Release anyway or reject?',cn:'\u6d4b\u8bd5\u6709\u5931\u8d25\u9879\u3002\u5f3a\u884c\u53d1\u5e03\u8fd8\u662f\u62d2\u7edd\uff1f'},
  btnApprove:{en:'APPROVE RELEASE',cn:'\u6279\u51c6\u53d1\u5e03'},
  btnReject:{en:'REJECT & FIX',cn:'\u62d2\u7edd\u5e76\u4fee\u590d'},
  completeGood:{en:'CORRECT DECISION',cn:'\u51b3\u7b56\u6b63\u786e'},
  completeBad:{en:'WRONG DECISION',cn:'\u51b3\u7b56\u9519\u8bef'},
  completeMsgGood:{en:'You correctly approved a passing build. System 1.0 is released!',cn:'\u4f60\u6b63\u786e\u5730\u6279\u51c6\u4e86\u901a\u8fc7\u7684\u6784\u5efa\u3002\u7cfb\u7edf 1.0 \u5df2\u53d1\u5e03\uff01'},
  completeMsgRejectGood:{en:'You correctly rejected a failing build. Fix the issues and re-test.',cn:'\u4f60\u6b63\u786e\u5730\u62d2\u7edd\u4e86\u5931\u8d25\u7684\u6784\u5efa\u3002\u4fee\u590d\u95ee\u9898\u540e\u91cd\u65b0\u6d4b\u8bd5\u3002'},
  completeMsgBadApprove:{en:'You approved a failing build! In real engineering, this could cause system failure.',cn:'\u4f60\u6279\u51c6\u4e86\u5931\u8d25\u7684\u6784\u5efa\uff01\u5728\u771f\u5b9e\u5de5\u7a0b\u4e2d\uff0c\u8fd9\u53ef\u80fd\u5bfc\u81f4\u7cfb\u7edf\u6545\u969c\u3002'},
  completeMsgBadReject:{en:'You rejected a passing build. While cautious, this delays delivery unnecessarily.',cn:'\u4f60\u62d2\u7edd\u4e86\u901a\u8fc7\u7684\u6784\u5efa\u3002\u867d\u7136\u8c28\u614e\uff0c\u4f46\u8fd9\u4f1a\u4e0d\u5fc5\u8981\u5730\u5ef6\u8fdf\u4ea4\u4ed8\u3002'},
  guideTitle:{en:'GAME GUIDE',cn:'\u6e38\u620f\u6307\u5357'},
  guideDesc:{en:'Simulate running a regression test suite and make a release decision.',cn:'\u6a21\u62df\u8fd0\u884c\u56de\u5f52\u6d4b\u8bd5\u5957\u4ef6\u5e76\u505a\u51fa\u53d1\u5e03\u51b3\u7b56\u3002'},
  guideStep1:{en:'Adjust the 3 test parameters with sliders',cn:'\u7528\u6ed1\u5757\u8c03\u6574 3 \u4e2a\u6d4b\u8bd5\u53c2\u6570'},
  guideStep2:{en:'Click RUN to execute the test suite',cn:'\u70b9\u51fb\u8fd0\u884c\u6267\u884c\u6d4b\u8bd5\u5957\u4ef6'},
  guideStep3:{en:'Review results and make the release decision',cn:'\u5ba1\u67e5\u7ed3\u679c\u5e76\u505a\u51fa\u53d1\u5e03\u51b3\u7b56'},
  // Test names
  t0:{en:'Risk Map Accuracy',cn:'\u98ce\u9669\u56fe\u51c6\u786e\u7387'},
  t1:{en:'Path Safety Score',cn:'\u8def\u5f84\u5b89\u5168\u5206'},
  t2:{en:'Cost Map Consistency',cn:'\u4ee3\u4ef7\u56fe\u4e00\u81f4\u6027'},
  t3:{en:'Rover Sim Success',cn:'\u706b\u661f\u8f66\u4eff\u771f\u6210\u529f'},
  t4:{en:'Baseline Diff',cn:'\u57fa\u7ebf\u5dee\u5f02'},
  t5:{en:'Edge Case Coverage',cn:'\u8fb9\u754c\u7528\u4f8b\u8986\u76d6'},
  t6:{en:'Performance Bench',cn:'\u6027\u80fd\u57fa\u51c6'},
  t7:{en:'Log Integrity',cn:'\u65e5\u5fd7\u5b8c\u6574\u6027'},
  t8:{en:'Version Traceability',cn:'\u7248\u672c\u53ef\u8ffd\u6eaf\u6027'},
  tPending:{en:'PENDING',cn:'\u7b49\u5f85'},
  tRunning:{en:'...',cn:'...'},
  tPass:{en:'PASS',cn:'\u901a\u8fc7'},
  tFail:{en:'FAIL',cn:'\u5931\u8d25'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var TEST_KEYS=['t0','t1','t2','t3','t4','t5','t6','t7','t8'];
var testResults=[];// {status:'pending'|'running'|'pass'|'fail', detail:'...'}
var runCompleted=false;
var allPassed=false;
var decisionMade=false;

function initTests(){
  testResults=[];
  for(var i=0;i<9;i++){testResults.push({status:'pending',detail:''});}
  runCompleted=false;allPassed=false;decisionMade=false;
  document.getElementById('decisionPanel').style.display='none';
  document.getElementById('completeOverlay').style.display='none';
  document.getElementById('btnRun').disabled=false;
  renderTestGrid();
  updateSummary();
  document.getElementById('verdictText').textContent=t('verdictWait');
  document.getElementById('verdictText').style.color='#8a8886';
}

function renderTestGrid(){
  var grid=document.getElementById('testGrid');
  grid.innerHTML='';
  for(var i=0;i<9;i++){
    var card=document.createElement('div');
    card.className='test-card '+testResults[i].status;
    card.id='tc'+i;
    var statusText='';
    if(testResults[i].status==='pending')statusText=t('tPending');
    else if(testResults[i].status==='running')statusText=t('tRunning');
    else if(testResults[i].status==='pass')statusText=t('tPass');
    else statusText=t('tFail');
    card.innerHTML='<div class="tc-name">'+t(TEST_KEYS[i])+'</div>'+
      '<div class="tc-status">'+statusText+'</div>'+
      '<div class="tc-detail">'+testResults[i].detail+'</div>';
    grid.appendChild(card);
  }
}

function updateSummary(){
  var pass=0,fail=0,total=9;
  testResults.forEach(function(r){if(r.status==='pass')pass++;if(r.status==='fail')fail++;});
  document.getElementById('sumValue0').textContent=pass;
  document.getElementById('sumValue1').textContent=fail;
  document.getElementById('sumValue2').textContent=total;
  var rate=runCompleted?(Math.round(pass/total*100)+'%'):'--';
  document.getElementById('sumValue3').textContent=rate;
}

function runTests(){
  if(runCompleted)return;
  document.getElementById('btnRun').disabled=true;
  document.getElementById('verdictText').textContent=t('verdictRunning');
  document.getElementById('verdictText').style.color='#00daf3';

  var threshold=parseInt(document.getElementById('slider0').value);
  var tolerance=parseInt(document.getElementById('slider1').value);
  var consistency=parseInt(document.getElementById('slider2').value);

  // Simulate test results based on parameters
  // threshold affects: t0 risk accuracy, t4 baseline diff
  // tolerance affects: t3 rover sim, t5 edge cases
  // consistency affects: t1 path safety, t2 cost map, t6 perf
  var results=[
    threshold>=80,      // t0: risk map accuracy
    consistency>=85,    // t1: path safety
    consistency>=80,    // t2: cost map consistency
    tolerance<=10,      // t3: rover sim
    threshold>=75,      // t4: baseline diff
    tolerance<=8,       // t5: edge case coverage
    consistency>=75,    // t6: performance bench
    true,               // t7: log integrity (always pass)
    true                // t8: version traceability (always pass)
  ];

  var details=[
    (threshold>=80?'Accuracy: '+threshold+'%':'Accuracy: '+threshold+'% (below 80% threshold)'),
    (consistency>=85?'Score: '+consistency:'Score: '+consistency+' (below 85 min)'),
    (consistency>=80?'Match: '+consistency+'%':'Match: '+consistency+'% (below 80% required)'),
    (tolerance<=10?'Failures: '+tolerance+' (within limit)':'Failures: '+tolerance+' (exceeds 10 limit)'),
    (threshold>=75?'Delta: '+(100-threshold)+'% (acceptable)':'Delta: '+(100-threshold)+'% (too large)'),
    (tolerance<=8?'Coverage: '+(100-tolerance*5)+'%':'Coverage: '+(100-tolerance*5)+'% (insufficient)'),
    (consistency>=75?'Latency: '+(200-consistency)+'ms':'Latency: '+(200-consistency)+'ms (too slow)'),
    'All entries verified',
    'Tag v1.0 linked to commit'
  ];

  // Animate test execution sequentially
  var idx=0;
  function runNext(){
    if(idx>=9){
      runCompleted=true;
      allPassed=results.every(function(r){return r;});
      if(allPassed){
        document.getElementById('verdictText').textContent=t('verdictPass');
        document.getElementById('verdictText').style.color='#10b981';
      }else{
        document.getElementById('verdictText').textContent=t('verdictFail');
        document.getElementById('verdictText').style.color='#ff5f1f';
      }
      // Show decision panel
      document.getElementById('decisionPanel').style.display='block';
      document.getElementById('decisionDesc').textContent=allPassed?t('decisionDescPass'):t('decisionDescFail');
      updateSummary();
      return;
    }
    testResults[idx].status='running';
    renderTestGrid();
    setTimeout(function(){
      testResults[idx].status=results[idx]?'pass':'fail';
      testResults[idx].detail=details[idx];
      renderTestGrid();
      updateSummary();
      idx++;
      setTimeout(runNext,200);
    },300+Math.random()*200);
  }
  runNext();
}

function makeDecision(approved){
  if(decisionMade)return;
  decisionMade=true;
  var correct=(approved&&allPassed)||(!approved&&!allPassed);
  var overlay=document.getElementById('completeOverlay');
  overlay.style.display='flex';
  document.getElementById('completeTitle').textContent=correct?t('completeGood'):t('completeBad');
  document.getElementById('completeScore').textContent=correct?'v1.0':'--';
  document.getElementById('completeScore').style.color=correct?'#10b981':'#ff5f1f';
  var msgKey='';
  if(approved&&allPassed)msgKey='completeMsgGood';
  else if(!approved&&!allPassed)msgKey='completeMsgRejectGood';
  else if(approved&&!allPassed)msgKey='completeMsgBadApprove';
  else msgKey='completeMsgBadReject';
  document.getElementById('completeMsg').textContent=t(msgKey);
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('subtitleText').textContent=t('subtitle');
  document.getElementById('paramTitle').textContent=t('paramTitle');
  document.getElementById('sliderLabel0').textContent=t('sliderLabel0');
  document.getElementById('sliderLabel1').textContent=t('sliderLabel1');
  document.getElementById('sliderLabel2').textContent=t('sliderLabel2');
  document.getElementById('btnRun').textContent=t('btnRun');
  document.getElementById('sumLabel0').textContent=t('sumPass');
  document.getElementById('sumLabel1').textContent=t('sumFail');
  document.getElementById('sumLabel2').textContent=t('sumTotal');
  document.getElementById('sumLabel3').textContent=t('sumRate');
  document.getElementById('decisionTitle').textContent=t('decisionTitle');
  document.getElementById('btnApprove').textContent=t('btnApprove');
  document.getElementById('btnReject').textContent=t('btnReject');
  document.getElementById('guideTitle').innerHTML='<span>'+t('guideTitle')+'</span><span id="guideArrow">-</span>';
  document.getElementById('guideDesc').textContent=t('guideDesc');
  document.getElementById('guideList').innerHTML='<li>'+t('guideStep1')+'</li><li>'+t('guideStep2')+'</li><li>'+t('guideStep3')+'</li>';
  renderTestGrid();
}

// Event bindings
document.getElementById('slider0').addEventListener('input',function(){document.getElementById('sliderVal0').textContent=this.value+'%';});
document.getElementById('slider1').addEventListener('input',function(){document.getElementById('sliderVal1').textContent=this.value;});
document.getElementById('slider2').addEventListener('input',function(){document.getElementById('sliderVal2').textContent=this.value+'%';});
document.getElementById('btnRun').addEventListener('click',function(){initTests();runTests();});
document.getElementById('btnApprove').addEventListener('click',function(){makeDecision(true);});
document.getElementById('btnReject').addEventListener('click',function(){makeDecision(false);});
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';document.getElementById('langBtn').textContent=LANG.toUpperCase();refreshI18N();
});
document.getElementById('guideToggle').addEventListener('click',function(){
  var c=document.getElementById('guideContent');c.classList.toggle('collapsed');
  document.getElementById('guideArrow').textContent=c.classList.contains('collapsed')?'+':'-';
});

initTests();
refreshI18N();
})();
</script>
</body>
</html>
