<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Down Projection Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 15% 0%, rgba(140,192,255,0.1), transparent 60%),
    radial-gradient(ellipse at 85% 100%, rgba(196,168,255,0.1), transparent 55%),
    linear-gradient(180deg,#070813 0%,#0e1020 50%,#060710 100%);
  color:#f0f2fa;
  font-family:'Inter','Noto Sans SC',sans-serif;
  display:flex;flex-direction:column;
}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;}

/* Header */
.header{
  padding:10px 18px 6px;display:flex;justify-content:space-between;align-items:flex-end;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);
}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:clamp(16px,2.2vw,22px);font-weight:700;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,#8cc0ff,#c4a8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px rgba(140,192,255,0.4));
}
.header .sub{font-size:10px;color:#9094a8;letter-spacing:0.18em;text-transform:uppercase;margin-top:3px;}
.header-right{display:flex;align-items:center;gap:10px;}
.lang-btn{
  background:rgba(255,255,255,0.05);border:1px solid rgba(140,192,255,0.3);
  color:#8cc0ff;padding:5px 10px;font-family:'Space Grotesk',sans-serif;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;
  transition:background 0.2s,border-color 0.2s;
}
.lang-btn:hover{background:rgba(140,192,255,0.12);border-color:#8cc0ff;}

.stage-nav{
  display:flex;gap:2px;align-items:center;
  background:rgba(255,255,255,0.04);padding:3px;
  border:1px solid rgba(255,255,255,0.08);
}
.stage-dot{
  font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.12em;
  text-transform:uppercase;padding:4px 8px;color:#9094a8;cursor:pointer;
  transition:color 0.2s,background 0.2s;
}
.stage-dot.active{color:#070813;background:linear-gradient(90deg,#8cc0ff,#c4a8ff);font-weight:700;}
.stage-dot.done{color:#4ade80;}
.stage-dot.locked{opacity:0.4;cursor:not-allowed;}

.main{
  flex:1;min-height:0;display:grid;
  grid-template-columns:220px 1fr 220px;
  gap:10px;padding:8px 18px;overflow:hidden;
}

.panel{
  background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.01));
  border:1px solid rgba(255,255,255,0.08);
  padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
}
.panel::-webkit-scrollbar{width:4px;}
.panel::-webkit-scrollbar-thumb{background:rgba(140,192,255,0.3);}
.panel-title{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.18em;text-transform:uppercase;color:#8cc0ff;
  padding-bottom:5px;border-bottom:1px solid rgba(140,192,255,0.15);
}

.ctrl{display:flex;flex-direction:column;gap:4px;}
.ctrl-label{
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:10px;color:#c9c9d0;
}
.ctrl-label .name{font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:0.12em;font-size:9px;color:#9094a8;}
.ctrl-label .val{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:#8cc0ff;}
.ctrl input[type=range]{
  -webkit-appearance:none;width:100%;height:4px;
  background:linear-gradient(90deg,#1c1c35,#3a2e5c);
  outline:none;cursor:pointer;
}
.ctrl input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:#8cc0ff;border:2px solid #070813;cursor:grab;
  box-shadow:0 0 10px rgba(140,192,255,0.7);
}
.ctrl input[type=range]::-moz-range-thumb{
  width:14px;height:14px;background:#8cc0ff;border:2px solid #070813;cursor:grab;
  box-shadow:0 0 10px rgba(140,192,255,0.7);
}
.ctrl-hint{font-size:9px;color:#7a7b85;line-height:1.4;font-style:italic;}

.btns{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.btn{
  padding:7px 10px;border:1px solid rgba(140,192,255,0.35);
  background:linear-gradient(180deg,rgba(140,192,255,0.15),rgba(196,168,255,0.08));
  color:#8cc0ff;font-family:'Space Grotesk',sans-serif;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;
  cursor:pointer;transition:background 0.15s,border-color 0.15s,transform 0.1s;
}
.btn:hover{background:linear-gradient(180deg,rgba(140,192,255,0.28),rgba(196,168,255,0.15));border-color:#8cc0ff;}
.btn:active{transform:scale(0.98);}
.btn.primary{
  background:linear-gradient(135deg,#8cc0ff,#c4a8ff);color:#070813;border-color:#c4a8ff;
}
.btn.primary:hover{background:linear-gradient(135deg,#a5cdff,#d4bcff);}
.btn.ghost{background:transparent;color:#c9c9d0;border-color:rgba(255,255,255,0.15);}
.btn.ghost:hover{background:rgba(255,255,255,0.05);color:#fff;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}

.viewport{
  display:flex;flex-direction:column;min-width:0;min-height:0;gap:6px;
}
.canvas-wrap{
  flex:1;min-height:0;position:relative;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(140,192,255,0.06), transparent 70%),
    linear-gradient(180deg,#060812 0%,#0a0d1c 100%);
  border:1px solid rgba(255,255,255,0.08);overflow:hidden;
}
#mainCanvas{display:block;width:100%;height:100%;}

.hud{
  position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;
  pointer-events:none;font-family:'Space Grotesk',sans-serif;
}
.hud-box{
  display:flex;gap:6px;background:rgba(10,12,25,0.7);
  border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px);
  padding:5px 8px;
}
.hud-stat{display:flex;flex-direction:column;align-items:flex-start;min-width:50px;}
.hud-stat .k{font-size:8px;color:#9094a8;letter-spacing:0.12em;text-transform:uppercase;}
.hud-stat .v{font-size:13px;color:#8cc0ff;font-weight:700;}
.hud-stat.ok .v{color:#4ade80;}
.hud-stat.warn .v{color:#ff8a5c;}

.status{
  flex-shrink:0;display:flex;gap:8px;padding:6px 10px;
  background:rgba(10,12,25,0.6);border:1px solid rgba(255,255,255,0.08);
  font-size:10px;min-height:42px;align-items:center;
}
.status-icon{
  width:28px;height:28px;flex-shrink:0;border:1px solid rgba(140,192,255,0.35);
  display:flex;align-items:center;justify-content:center;
  background:rgba(140,192,255,0.08);
}
.status-txt{flex:1;color:#c9c9d0;line-height:1.3;font-size:10px;}
.status-txt strong{color:#8cc0ff;}

.info-panel .section{display:flex;flex-direction:column;gap:4px;}
.info-box{
  font-size:10px;line-height:1.5;padding:6px;
  background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);
  color:#aaabb0;
}
.info-box .label{color:#c4a8ff;font-weight:700;font-family:'Space Grotesk',sans-serif;letter-spacing:0.05em;font-size:9px;}

.obj-palette{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.obj-card{
  width:100%;aspect-ratio:1;background:rgba(140,192,255,0.08);
  border:1px solid rgba(140,192,255,0.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:grab;user-select:none;padding:4px;
  transition:background 0.15s,border-color 0.15s,transform 0.1s;
}
.obj-card:hover{background:rgba(140,192,255,0.2);border-color:#8cc0ff;transform:scale(1.04);}
.obj-card.dragging{opacity:0.4;}
.obj-card svg{width:28px;height:28px;flex-shrink:0;}
.obj-card .lbl{
  font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.08em;
  text-transform:uppercase;color:#8cc0ff;margin-top:2px;text-align:center;
}

.modal-bg{
  position:fixed;inset:0;background:rgba(5,6,15,0.85);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
}
.modal-bg.open{display:flex;}
.modal{
  background:linear-gradient(180deg,#0e1020 0%,#060812 100%);
  border:1px solid rgba(140,192,255,0.35);
  padding:22px 26px;max-width:480px;width:100%;
  box-shadow:0 0 40px rgba(140,192,255,0.2);
}
.modal h2{
  font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;
  color:#8cc0ff;margin-bottom:10px;letter-spacing:-0.01em;
}
.modal .body{font-size:12px;line-height:1.6;color:#c9c9d0;margin-bottom:14px;}
.modal .body p{margin-bottom:8px;}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;}
.stars{display:flex;gap:4px;margin:8px 0;}
.star{font-size:20px;color:#444;}
.star.on{color:#8cc0ff;filter:drop-shadow(0 0 6px rgba(140,192,255,0.7));}

.tutorial{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  max-width:400px;padding:16px 20px;background:rgba(10,12,25,0.92);
  border:1px solid rgba(140,192,255,0.4);text-align:center;
  backdrop-filter:blur(10px);z-index:20;
}
.tutorial h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#8cc0ff;margin-bottom:8px;letter-spacing:0.02em;
}
.tutorial p{font-size:11px;line-height:1.5;color:#c9c9d0;margin-bottom:10px;}

@media (max-width: 900px){
  .main{grid-template-columns:170px 1fr 170px;gap:6px;padding:6px 10px;}
  .panel{padding:7px;gap:8px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div>
      <h1 data-i18n="title">俯视投影实验室</h1>
      <div class="sub" data-i18n="subtitle">TOP-DOWN PROJECTION LAB</div>
    </div>
    <div class="header-right">
      <div class="stage-nav" id="stageNav">
        <div class="stage-dot active" data-stage="0" data-i18n="stage_1_nav">1. 投影</div>
        <div class="stage-dot locked" data-stage="1" data-i18n="stage_2_nav">2. 比例尺</div>
        <div class="stage-dot locked" data-stage="2" data-i18n="stage_3_nav">3. 绘图</div>
      </div>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </div>

  <div class="main">
    <div class="panel" id="leftPanel"></div>
    <div class="viewport">
      <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
        <div class="hud" id="hud">
          <div class="hud-box" id="hudLeft"></div>
          <div class="hud-box" id="hudRight"></div>
        </div>
        <div class="tutorial" id="tutorial">
          <h3 data-i18n="tut_title">欢迎，地图绘制师</h3>
          <p data-i18n="tut_body">你将通过三个阶段学会把一个三维空间"拍扁"成一张可用的二维地图。第一阶段：把相机从侧视慢慢调到俯视，观察投影图的变化。理解"俯视"是地图的关键。</p>
          <button class="btn primary" id="tutClose" data-i18n="tut_btn">开始</button>
        </div>
      </div>
      <div class="status">
        <div class="status-icon">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" fill="none" stroke="#8cc0ff" stroke-width="1.5"/><circle cx="8" cy="8" r="1.5" fill="#8cc0ff"/></svg>
        </div>
        <div class="status-txt" id="statusTxt">--</div>
      </div>
    </div>
    <div class="panel info-panel" id="rightPanel"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">--</h2>
    <div class="stars" id="modalStars"></div>
    <div class="body" id="modalBody"></div>
    <div class="actions">
      <button class="btn ghost" id="modalClose" data-i18n="modal_close">关闭</button>
      <button class="btn primary" id="modalNext" data-i18n="modal_next">下一阶段</button>
    </div>
  </div>
</div>

  function resizeCanvas(){
    var wrap = canvas.parentElement;
    var dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;

  // ------------------- Object drawing (top-down sprites) -------------------
  function drawObjectTopDown(cx, cy, ew, eh, type){
    ctx.save();
    ctx.translate(cx, cy);
    var colors = {
      desk:'#8cc0ff', chair:'#c4a8ff', board:'#6ec3ff',
      door:'#ffb59c', window:'#a8e4ff', treasure:'#ffd447',
    };
    var col = colors[type] || '#888';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.2;
    ctx.fillStyle = col + '33';
    if(type==='desk'){
      ctx.fillRect(-ew/2,-eh/2,ew,eh);
      ctx.strokeRect(-ew/2,-eh/2,ew,eh);
      ctx.beginPath();
      ctx.moveTo(-ew/2,-eh/2 + eh*0.2);
      ctx.lineTo(ew/2,-eh/2 + eh*0.2);
      ctx.stroke();
    } else if(type==='chair'){
      ctx.beginPath();
      ctx.arc(0, 0, Math.min(ew,eh)*0.45, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(1,Math.min(ew,eh)*0.2), 0, Math.PI*2);
      ctx.stroke();
    } else if(type==='board'){
      ctx.fillRect(-ew/2,-eh/2,ew,eh);
      ctx.strokeRect(-ew/2,-eh/2,ew,eh);
      for(var i=-3;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(-ew/2 + (i+3)*ew/7, -eh/2);
        ctx.lineTo(-ew/2 + (i+3)*ew/7, eh/2);
        ctx.stroke();
      }
    } else if(type==='door'){
      ctx.strokeRect(-ew/2,-eh/2,ew,eh);
      ctx.beginPath();
      ctx.arc(-ew/2, -eh/2, Math.max(4,ew), 0, Math.PI/2);
      ctx.stroke();
    } else if(type==='window'){
      ctx.fillRect(-ew/2,-eh/2,ew,eh);
      ctx.strokeRect(-ew/2,-eh/2,ew,eh);
      if(ew > eh){
        ctx.beginPath();
        ctx.moveTo(0,-eh/2); ctx.lineTo(0,eh/2);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(-ew/2,0); ctx.lineTo(ew/2,0);
        ctx.stroke();
      }
    } else if(type==='treasure'){
      ctx.fillStyle = '#ffd447';
      var r = Math.min(ew,eh)*0.45;
      ctx.beginPath();
      for(var p=0;p<10;p++){
        var ang = (p/10)*Math.PI*2 - Math.PI/2;
        var rr = (p%2===0) ? r : r*0.4;
        var px = Math.cos(ang)*rr;
        var py = Math.sin(ang)*rr;
        if(p===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.stroke();
    }
    ctx.restore();
  }

  // ------------------- STAGE 1: 3D camera + 2D projection -------------------
  function drawStage1(){
    var leftW = W * 0.58;
    var rightW = W - leftW - 20;
    var topY = 45;
    var viewH = H - 90;

    ctx.font = '10px "Space Grotesk"';
    ctx.fillStyle = '#8cc0ff';
    ctx.textAlign = 'left';
    ctx.fillText(lang==='zh' ? '3D 教室（相机视角）' : '3D ROOM (CAMERA)', 15, topY - 8);
    ctx.fillText(lang==='zh' ? '2D 投影图' : '2D PROJECTION', 15 + leftW + 8, topY - 8);

    drawView3D(10, topY, leftW, viewH);
    drawProjection2D(10 + leftW + 6, topY, rightW, viewH);

    ctx.font = '9px "Inter"';
    ctx.fillStyle = '#9094a8';
    ctx.textAlign = 'center';
    ctx.fillText(
      lang==='zh'
        ? '左：相机在 3D 空间中看到的画面。右：将 3D 投射到水平面的结果。'
        : 'Left: 3D scene from camera. Right: projection onto horizontal plane.',
      W/2, H - 30
    );
  }

  function drawView3D(x, y, w, h){
    ctx.save();
    ctx.fillStyle = 'rgba(20,22,38,0.6)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(140,192,255,0.25)';
    ctx.strokeRect(x, y, w, h);

    // clip
    ctx.beginPath();
    ctx.rect(x+1, y+1, w-2, h-2);
    ctx.clip();

    var cx = x + w/2;
    var cy = y + h/2 + 30;
    var angleDeg = state.s1.angle;
    var angleRad = angleDeg * Math.PI / 180;
    var height = state.s1.height;

    function project(wx, wy, wz){
      var rx = wx - 4;
      var ry = wy - 3;
      var rz = wz;
      var cosA = Math.cos(angleRad);
      var sinA = Math.sin(angleRad);
      var y2 = ry * cosA + rz * sinA;
      var z2 = -ry * sinA + rz * cosA;
      var zoom = Math.min(w, h) * 0.085;
      var perspDiv = Math.max(0.1, height - z2*0.1);
      var scaleP = zoom * 4 / perspDiv;
      var sx = cx + rx * scaleP;
      var sy = cy - y2 * scaleP * 0.7;
      return {sx:sx, sy:sy};
    }

    // Floor grid
    ctx.strokeStyle = 'rgba(140,192,255,0.18)';
    ctx.lineWidth = 1;
    for(var gx=0;gx<=8;gx++){
      var p1 = project(gx, 0, 0);
      var p2 = project(gx, 6, 0);
      ctx.beginPath();
      ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
      ctx.stroke();
    }
    for(var gy=0;gy<=6;gy++){
      var p1b = project(0, gy, 0);
      var p2b = project(8, gy, 0);
      ctx.beginPath();
      ctx.moveTo(p1b.sx, p1b.sy); ctx.lineTo(p2b.sx, p2b.sy);
      ctx.stroke();
    }
    // Floor fill
    ctx.fillStyle = 'rgba(140,192,255,0.08)';
    var c1 = project(0,0,0), c2 = project(8,0,0), c3 = project(8,6,0), c4 = project(0,6,0);
    ctx.beginPath();
    ctx.moveTo(c1.sx,c1.sy); ctx.lineTo(c2.sx,c2.sy);
    ctx.lineTo(c3.sx,c3.sy); ctx.lineTo(c4.sx,c4.sy); ctx.closePath();
    ctx.fill();

    // Walls
    function wallPoly(x1,y1,x2,y2,h3){
      var a1 = project(x1,y1,0), a2 = project(x2,y2,0);
      var a3 = project(x2,y2,h3), a4 = project(x1,y1,h3);
      ctx.beginPath();
      ctx.moveTo(a1.sx,a1.sy);
      ctx.lineTo(a2.sx,a2.sy);
      ctx.lineTo(a3.sx,a3.sy);
      ctx.lineTo(a4.sx,a4.sy);
      ctx.closePath();
      ctx.fillStyle = 'rgba(196,168,255,0.04)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(196,168,255,0.35)';
      ctx.stroke();
    }
    var wallH = 2.5;
    wallPoly(0,0,8,0,wallH);
    wallPoly(0,0,0,6,wallH);
    wallPoly(8,0,8,6,wallH);

    // Objects
    var objs = REAL_ROOM.objects;
    var sorted = objs.slice().sort(function(a,b){
      return (b.fy + b.fh/2) - (a.fy + a.fh/2);
    });
    for(var i=0;i<sorted.length;i++){
      var o = sorted[i];
      var ox = o.fx * 8;
      var oy = o.fy * 6;
      var ow = o.fw * 8;
      var oh = o.fh * 6;
      var oz = o.h || 0.5;
      drawBox3D(project, ox, oy, ox+ow, oy+oh, oz, o.type);
    }

    ctx.restore();
  }

  function drawBox3D(project, x1, y1, x2, y2, h, type){
    var colors = {
      desk:'#8cc0ff', chair:'#c4a8ff', board:'#6ec3ff',
      door:'#ffb59c', window:'#a8e4ff', treasure:'#ffd447'
    };
    var col = colors[type] || '#888';
    var p000 = project(x1, y1, 0);
    var p100 = project(x2, y1, 0);
    var p110 = project(x2, y2, 0);
    var p010 = project(x1, y2, 0);
    var p001 = project(x1, y1, h);
    var p101 = project(x2, y1, h);
    var p111 = project(x2, y2, h);
    var p011 = project(x1, y2, h);

    ctx.fillStyle = col + '55';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;

    // Top
    ctx.beginPath();
    ctx.moveTo(p001.sx,p001.sy);
    ctx.lineTo(p101.sx,p101.sy);
    ctx.lineTo(p111.sx,p111.sy);
    ctx.lineTo(p011.sx,p011.sy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = col + '33';
    // front
    ctx.beginPath();
    ctx.moveTo(p000.sx,p000.sy); ctx.lineTo(p100.sx,p100.sy);
    ctx.lineTo(p101.sx,p101.sy); ctx.lineTo(p001.sx,p001.sy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // right
    ctx.beginPath();
    ctx.moveTo(p100.sx,p100.sy); ctx.lineTo(p110.sx,p110.sy);
    ctx.lineTo(p111.sx,p111.sy); ctx.lineTo(p101.sx,p101.sy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // back
    ctx.beginPath();
    ctx.moveTo(p110.sx,p110.sy); ctx.lineTo(p010.sx,p010.sy);
    ctx.lineTo(p011.sx,p011.sy); ctx.lineTo(p111.sx,p111.sy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  function drawProjection2D(x, y, w, h){
    ctx.save();
    ctx.fillStyle = 'rgba(20,22,38,0.6)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(196,168,255,0.25)';
    ctx.strokeRect(x, y, w, h);

    var angleRad = state.s1.angle * Math.PI / 180;
    var topness = Math.sin(angleRad);

    var pad = 20;
    var mapW = w - pad*2;
    var mapH = h - pad*2 - 30;
    var cellScale = Math.min(mapW/8, mapH/6) * (0.55 + topness * 0.45);
    var rw = 8 * cellScale;
    var rhBase = 6 * cellScale;
    var rh = Math.max(8, rhBase * topness);
    var mcx = x + w/2 - rw/2;
    var mcy = y + h/2 - rh/2 - 10;

    // Frame
    ctx.strokeStyle = 'rgba(196,168,255,0.5)';
    ctx.setLineDash([3,3]);
    ctx.strokeRect(mcx, mcy, rw, rh);
    ctx.setLineDash([]);

    var objs = REAL_ROOM.objects;
    for(var i=0;i<objs.length;i++){
      var o = objs[i];
      var ox = mcx + o.fx * rw;
      var oy = mcy + o.fy * rh;
      var ow = Math.max(2, o.fw * rw);
      var oh = Math.max(2, o.fh * rh);
      drawObjectTopDown(ox + ow/2, oy + oh/2, ow, oh, o.type);
    }

    ctx.font = '11px "Space Grotesk"';
    ctx.textAlign = 'left';
    var msg = topness > 0.95 ? t('s1_obs_good') : (topness > 0.6 ? t('s1_obs_mid') : t('s1_obs_bad'));
    ctx.fillStyle = topness > 0.95 ? '#4ade80' : (topness > 0.7 ? '#8cc0ff' : '#ff8a5c');
    ctx.fillText(msg, x + 10, y + h - 14);

    ctx.restore();
  }

  // ------------------- STAGE 2: Scale selection -------------------
  function drawStage2(){
    var midY = H * 0.46;
    var topH = midY - 65;
    var botH = H - midY - 75;

    ctx.font = '10px "Space Grotesk"';
    ctx.fillStyle = '#8cc0ff';
    ctx.textAlign = 'center';
    ctx.fillText(lang==='zh' ? '真实房间（俯视）8m × 6m' : 'REAL ROOM (TOP-DOWN) 8m × 6m', W/2, 45);

    drawRealRoomTopDown(40, 55, W-80, topH);

    ctx.fillStyle = '#c4a8ff';
    var label = (lang==='zh'
      ? '比例尺 1:'+state.s2.scale+' 在 '+state.s2.paperW+'cm 纸上的效果'
      : 'SCALE 1:'+state.s2.scale+' ON '+state.s2.paperW+'cm PAPER');
    ctx.fillText(label, W/2, midY + 20);

    drawPaperWithMap(40, midY + 30, W-80, botH);
  }

  function drawRealRoomTopDown(x, y, w, h){
    ctx.save();
    ctx.fillStyle = 'rgba(20,22,38,0.6)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(140,192,255,0.3)';
    ctx.strokeRect(x, y, w, h);

    var cellScale = Math.min((w-40)/8, (h-20)/6);
    var roomW = 8 * cellScale;
    var roomH = 6 * cellScale;
    var cx = x + w/2 - roomW/2;
    var cy = y + h/2 - roomH/2;

    ctx.strokeStyle = 'rgba(140,192,255,0.15)';
    ctx.lineWidth = 0.5;
    for(var gx=0;gx<=8;gx++){
      ctx.beginPath();
      ctx.moveTo(cx + gx*cellScale, cy);
      ctx.lineTo(cx + gx*cellScale, cy + roomH);
      ctx.stroke();
    }
    for(var gy=0;gy<=6;gy++){
      ctx.beginPath();
      ctx.moveTo(cx, cy + gy*cellScale);
      ctx.lineTo(cx + roomW, cy + gy*cellScale);
      ctx.stroke();
    }

    ctx.strokeStyle = '#8cc0ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx, cy, roomW, roomH);

    var objs = REAL_ROOM.objects;
    for(var i=0;i<objs.length;i++){
      var o = objs[i];
      var ox = cx + o.fx * roomW;
      var oy = cy + o.fy * roomH;
      var ow = Math.max(3, o.fw * roomW);
      var oh = Math.max(3, o.fh * roomH);
      drawObjectTopDown(ox + ow/2, oy + oh/2, ow, oh, o.type);
    }

    ctx.font = '9px "Space Grotesk"';
    ctx.fillStyle = '#c4a8ff';
    ctx.textAlign = 'left';
    ctx.fillText('8 m', cx + roomW - 18, cy - 4);
    ctx.textAlign = 'right';
    ctx.fillText('6 m', cx - 4, cy + roomH);

    ctx.restore();
  }

  function drawPaperWithMap(x, y, w, h){
    ctx.save();
    var paperWcm = state.s2.paperW;
    var paperHcm = paperWcm * 0.707;
    var pixelPerCm = Math.min(w / paperWcm, h / paperHcm) * 0.85;
    var drawPaperW = paperWcm * pixelPerCm;
    var drawPaperH = paperHcm * pixelPerCm;
    var px = x + w/2 - drawPaperW/2;
    var py = y + h/2 - drawPaperH/2;

    ctx.fillStyle = 'rgba(245,245,250,0.08)';
    ctx.fillRect(px, py, drawPaperW, drawPaperH);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.setLineDash([4,4]);
    ctx.strokeRect(px, py, drawPaperW, drawPaperH);
    ctx.setLineDash([]);

    var mapWcm = 800 / state.s2.scale;
    var mapHcm = 600 / state.s2.scale;
    var mapW = mapWcm * pixelPerCm;
    var mapH = mapHcm * pixelPerCm;

    var overflow = mapWcm > paperWcm || mapHcm > paperHcm;
    var mcx = px + drawPaperW/2 - mapW/2;
    var mcy = py + drawPaperH/2 - mapH/2;

    if(overflow){
      ctx.fillStyle = 'rgba(248,113,113,0.18)';
      ctx.strokeStyle = '#f87171';
    } else {
      ctx.fillStyle = 'rgba(140,192,255,0.18)';
      ctx.strokeStyle = '#8cc0ff';
    }
    ctx.fillRect(mcx, mcy, mapW, mapH);
    ctx.lineWidth = 1.5;
    ctx.strokeRect(mcx, mcy, mapW, mapH);

    var objs = REAL_ROOM.objects;
    for(var i=0;i<objs.length;i++){
      var o = objs[i];
      var ox = mcx + o.fx * mapW;
      var oy = mcy + o.fy * mapH;
      var ow = Math.max(2, o.fw * mapW);
      var oh = Math.max(2, o.fh * mapH);
      drawObjectTopDown(ox + ow/2, oy + oh/2, ow, oh, o.type);
    }

    ctx.font = '11px "Space Grotesk"';
    ctx.textAlign = 'center';
    var verdict, verdictColor;
    var frac = (mapWcm * mapHcm) / (state.s2.paperW * paperHcm);
    if(overflow){
      verdict = t('s2_advice_big');
      verdictColor = '#f87171';
    } else if(frac < 0.25){
      verdict = t('s2_advice_small');
      verdictColor = '#ff8a5c';
    } else {
      verdict = t('s2_advice_ok');
      verdictColor = '#4ade80';
    }
    ctx.fillStyle = verdictColor;
    ctx.fillText(verdict, W/2, y + h - 6);

    ctx.restore();
  }

  // ------------------- STAGE 3: Drawing + walker validation -------------------
  var mapCanvasArea = {x:0, y:0, w:0, h:0};

  function drawStage3(){
    var leftW = W * 0.62;
    var gap = 14;
    var rightW = W - leftW - gap - 30;
    var topY = 50;
    var bodyH = H - 80;

    ctx.font = '10px "Space Grotesk"';
    ctx.fillStyle = '#8cc0ff';
    ctx.textAlign = 'left';
    ctx.fillText(lang==='zh' ? '绘图画布' : 'MAP CANVAS', 15, topY - 8);
    ctx.fillStyle = '#c4a8ff';
    ctx.fillText(lang==='zh' ? '参考房间' : 'REFERENCE', 15 + leftW + gap, topY - 8);

    drawMapCanvas(15, topY, leftW, bodyH);
    drawMiniReferenceRoom(15 + leftW + gap, topY, rightW, bodyH);
  }

  function drawMapCanvas(x, y, w, h){
    ctx.save();
    ctx.fillStyle = 'rgba(20,22,38,0.65)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(140,192,255,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    mapCanvasArea = {x:x, y:y, w:w, h:h};

    // Grid
    ctx.strokeStyle = 'rgba(140,192,255,0.1)';
    ctx.lineWidth = 0.5;
    var gridSize = 20;
    for(var gx=0;gx<w;gx+=gridSize){
      ctx.beginPath();
      ctx.moveTo(x+gx, y); ctx.lineTo(x+gx, y+h);
      ctx.stroke();
    }
    for(var gy=0;gy<h;gy+=gridSize){
      ctx.beginPath();
      ctx.moveTo(x, y+gy); ctx.lineTo(x+w, y+gy);
      ctx.stroke();
    }

    // Border marker for room outline
    ctx.strokeStyle = 'rgba(140,192,255,0.4)';
    ctx.setLineDash([6,4]);
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x+6, y+6, w-12, h-12);
    ctx.setLineDash([]);

    // Compass
    ctx.save();
    ctx.translate(x + w - 32, y + 30);
    ctx.fillStyle = '#c4a8ff';
    ctx.beginPath();
    ctx.moveTo(0,-12);
    ctx.lineTo(6,10);
    ctx.lineTo(0,4);
    ctx.lineTo(-6,10);
    ctx.closePath();
    ctx.fill();
    ctx.font = '10px "Space Grotesk"';
    ctx.fillStyle = '#c4a8ff';
    ctx.textAlign = 'center';
    ctx.fillText('N', 0, -14);
    ctx.restore();

    // Placed objects
    var objs = state.s3.canvasObjs;
    for(var i=0;i<objs.length;i++){
      var o = objs[i];
      var ox = x + o.x * w;
      var oy = y + o.y * h;
      var ow = 22, oh = 18;
      if(o.type === 'board'){ ow = 70; oh = 9; }
      else if(o.type === 'door'){ ow = 22; oh = 10; }
      else if(o.type === 'window'){ ow = 8; oh = 32; }
      else if(o.type === 'chair'){ ow = 14; oh = 14; }
      else if(o.type === 'treasure'){ ow = 24; oh = 24; }
      drawObjectTopDown(ox, oy, ow, oh, o.type);
    }

    // Walker
    if(state.s3.walker){
      var wk = state.s3.walker;
      var wx = x + wk.x * w;
      var wy = y + wk.y * h;
      // trail
      ctx.strokeStyle = 'rgba(255,212,71,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      for(var ti=0;ti<wk.trail.length;ti++){
        var tp = wk.trail[ti];
        var tx = x + tp.x * w;
        var ty = y + tp.y * h;
        if(ti===0) ctx.moveTo(tx,ty); else ctx.lineTo(tx,ty);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      // walker body
      ctx.fillStyle = '#ffd447';
      ctx.beginPath();
      ctx.arc(wx, wy, 7, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#070813';
      ctx.beginPath();
      ctx.arc(wx+2, wy-2, 1.2, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawMiniReferenceRoom(x, y, w, h){
    ctx.save();
    ctx.fillStyle = 'rgba(20,22,38,0.6)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(196,168,255,0.35)';
    ctx.strokeRect(x, y, w, h);

    var cellScale = Math.min((w-16)/8, (h-50)/6);
    var drawW = 8 * cellScale;
    var drawH = 6 * cellScale;
    var rx = x + w/2 - drawW/2;
    var ry = y + 30;

    ctx.strokeStyle = '#c4a8ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(rx, ry, drawW, drawH);

    var objs = REAL_ROOM.objects;
    for(var i=0;i<objs.length;i++){
      var o = objs[i];
      var ox = rx + o.fx * drawW;
      var oy = ry + o.fy * drawH;
      var ow = Math.max(3, o.fw * drawW);
      var oh = Math.max(3, o.fh * drawH);
      drawObjectTopDown(ox + ow/2, oy + oh/2, ow, oh, o.type);
    }

    ctx.font = '9px "Inter"';
    ctx.fillStyle = '#9094a8';
    ctx.textAlign = 'center';
    ctx.fillText('8m × 6m', x + w/2, ry + drawH + 14);

    ctx.restore();
  }

  // ------------------- Walker simulation -------------------
  function stepWalker(dt){
    var wk = state.s3.walker;
    if(!wk) return;
    var target = wk.currentTarget;
    if(!target){
      // find treasure in student's map
      for(var i=0;i<state.s3.canvasObjs.length;i++){
        var o = state.s3.canvasObjs[i];
        if(o.type === 'treasure'){ target = {x:o.x, y:o.y}; break; }
      }
      if(!target){ wk.status = 'lost'; wk.done = true; return; }
      wk.currentTarget = target;
    }

    var dx = target.x - wk.x;
    var dy = target.y - wk.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var speed = 0.17 * dt;
    if(dist < 0.015){
      // Reached the map target — check if real treasure is nearby
      var realDx = TREASURE_POS.x - wk.x;
      var realDy = TREASURE_POS.y - wk.y;
      var realDist = Math.sqrt(realDx*realDx + realDy*realDy);
      if(realDist < 0.10){ wk.status = 'found'; }
      else { wk.status = 'lost'; }
      wk.done = true;
      return;
    }
    var vx = dx / dist * speed;
    var vy = dy / dist * speed;
    var nx = wk.x + vx;
    var ny = wk.y + vy;

    // Check collision with real obstacles (desks, chairs, etc. that the walker must navigate around)
    var blocked = false;
    for(var oi=0;oi<REAL_ROOM.objects.length;oi++){
      var ro = REAL_ROOM.objects[oi];
      if(ro.type === 'treasure' || ro.type === 'window' || ro.type === 'door') continue;
      if(nx > ro.fx - 0.005 && nx < ro.fx + ro.fw + 0.005 &&
         ny > ro.fy - 0.005 && ny < ro.fy + ro.fh + 0.005){
        blocked = true;
        break;
      }
    }
    if(nx < 0.02 || nx > 0.98 || ny < 0.02 || ny > 0.98) blocked = true;

    if(blocked){
      wk.hp -= dt * 25;
      // nudge instead of fully moving
      wk.x += vx * 0.2;
      wk.y += vy * 0.2;
      if(wk.hp <= 0){
        wk.status = 'crashed';
        wk.done = true;
      }
    } else {
      wk.x = nx;
      wk.y = ny;
      wk.trail.push({x:wk.x, y:wk.y});
      if(wk.trail.length > 200) wk.trail.shift();
      wk.hp -= dt * 4;
      if(wk.hp <= 0){ wk.status = 'lost'; wk.done = true; }
    }
  }

  var walkAnimId = null;
  function walkLoop(ts){
    if(!state.s3.walking) return;
    if(!state.s3.walkLastT) state.s3.walkLastT = ts;
    var dt = Math.min(0.05, (ts - state.s3.walkLastT)/1000);
    state.s3.walkLastT = ts;
    stepWalker(dt);
    updateStage3HUD();
    render();
    if(state.s3.walker && state.s3.walker.done){
      state.s3.walking = false;
      var status = state.s3.walker.status;
      if(status === 'found'){
        state.stageDone[2] = true;
        setStatus(t('s3_status_success'));
        showFinalResult(true);
      } else {
        setStatus(t('s3_status_fail'));
        showFinalResult(false);
      }
      return;
    }
    walkAnimId = requestAnimationFrame(walkLoop);
  }

  function startWalker(){
    var hasTreasure = false;
    for(var i=0;i<state.s3.canvasObjs.length;i++){
      if(state.s3.canvasObjs[i].type === 'treasure'){ hasTreasure = true; break; }
    }
    if(state.s3.canvasObjs.length < 5){ setStatus(t('s3_need_more')); return; }
    if(!hasTreasure){ setStatus(t('s3_need_treasure')); return; }
    state.s3.walker = {
      x: WALKER_START.x, y: WALKER_START.y,
      hp: 100,
      trail: [{x:WALKER_START.x, y:WALKER_START.y}],
      status: 'searching',
      done: false,
      currentTarget: null,
    };
    state.s3.walking = true;
    state.s3.walkLastT = 0;
    setStatus(t('s3_status_walking'));
    walkAnimId = requestAnimationFrame(walkLoop);
  }

  // ------------------- Render dispatcher -------------------
  function render(){
    ctx.clearRect(0,0,W,H);
    // Full background fill (never pure black)
    var bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0c0e1c');
    bg.addColorStop(0.55,'#141630');
    bg.addColorStop(1,'#06070f');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = 'rgba(140,192,255,0.25)';
    for(var s=0;s<30;s++){
      var sx = (s * 73) % W;
      var sy = (s * 41) % (H*0.4);
      ctx.fillRect(sx, sy, 1, 1);
    }

    if(state.stage === 0) drawStage1();
    else if(state.stage === 1) drawStage2();
    else drawStage3();
  }

  function makeSlider(labelKey, hintKey, min, max, step, initial, unit, prefix, onChange){
    var wrap = document.createElement('div');
    wrap.className = 'ctrl';
    var row = document.createElement('div');
    row.className = 'ctrl-label';
    var name = document.createElement('span');
    name.className = 'name';
    name.textContent = t(labelKey);
    var val = document.createElement('span');
    val.className = 'val';
    val.textContent = (prefix||'') + initial + (unit||'');
    row.appendChild(name); row.appendChild(val);
    wrap.appendChild(row);
    var slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min; slider.max = max; slider.step = step; slider.value = initial;
    slider.addEventListener('input', function(){
      var v = parseFloat(slider.value);
      val.textContent = (prefix||'') + v + (unit||'');
      onChange(v);
    });
    wrap.appendChild(slider);
    var hint = document.createElement('div');
    hint.className = 'ctrl-hint';
    hint.textContent = t(hintKey);
    wrap.appendChild(hint);
    return wrap;
  }

  function mkBtn(kind, label, onClick){
    var b = document.createElement('button');
    b.className = 'btn ' + (kind||'');
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }

  function objMiniSvg(type){
    var col = {
      desk:'#8cc0ff', chair:'#c4a8ff', board:'#6ec3ff',
      door:'#ffb59c', window:'#a8e4ff', treasure:'#ffd447',
    }[type] || '#888';
    if(type==='desk') return '<svg viewBox="0 0 30 30"><rect x="5" y="9" width="20" height="12" fill="'+col+'33" stroke="'+col+'" stroke-width="1.5"/><line x1="5" y1="13" x2="25" y2="13" stroke="'+col+'"/></svg>';
    if(type==='chair') return '<svg viewBox="0 0 30 30"><circle cx="15" cy="15" r="8" fill="'+col+'33" stroke="'+col+'" stroke-width="1.5"/><circle cx="15" cy="15" r="3" fill="none" stroke="'+col+'"/></svg>';
    if(type==='board') return '<svg viewBox="0 0 30 30"><rect x="3" y="12" width="24" height="6" fill="'+col+'33" stroke="'+col+'" stroke-width="1.5"/><line x1="10" y1="12" x2="10" y2="18" stroke="'+col+'"/><line x1="20" y1="12" x2="20" y2="18" stroke="'+col+'"/></svg>';
    if(type==='door') return '<svg viewBox="0 0 30 30"><rect x="8" y="10" width="15" height="10" fill="'+col+'33" stroke="'+col+'" stroke-width="1.5"/><path d="M8,10 A15,15 0 0,1 23,20" fill="none" stroke="'+col+'"/></svg>';
    if(type==='window') return '<svg viewBox="0 0 30 30"><rect x="12" y="5" width="6" height="20" fill="'+col+'33" stroke="'+col+'" stroke-width="1.5"/><line x1="15" y1="5" x2="15" y2="25" stroke="'+col+'"/></svg>';
    if(type==='treasure') return '<svg viewBox="0 0 30 30"><polygon points="15,4 18,12 26,13 20,18 22,26 15,22 8,26 10,18 4,13 12,12" fill="'+col+'" stroke="#fff"/></svg>';
    return '';
  }

  function wirePaletteDrag(){
    var cards = document.querySelectorAll('.obj-card');
    for(var i=0;i<cards.length;i++){
      (function(card){
        card.addEventListener('dragstart', function(e){
          card.classList.add('dragging');
          e.dataTransfer.setData('text/plain', card.getAttribute('data-type'));
        });
        card.addEventListener('dragend', function(){
          card.classList.remove('dragging');
        });
      })(cards[i]);
    }
  }

  // ------------------- Canvas drag/drop -------------------
  canvas.addEventListener('dragover', function(e){
    if(state.stage === 2) e.preventDefault();
  });
  canvas.addEventListener('drop', function(e){
    if(state.stage !== 2) return;
    e.preventDefault();
    var type = e.dataTransfer.getData('text/plain');
    if(!type) return;
    var rect = canvas.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    if(cx < mapCanvasArea.x || cx > mapCanvasArea.x + mapCanvasArea.w ||
       cy < mapCanvasArea.y || cy > mapCanvasArea.y + mapCanvasArea.h) return;
    var nx = (cx - mapCanvasArea.x) / mapCanvasArea.w;
    var ny = (cy - mapCanvasArea.y) / mapCanvasArea.h;
    state.s3.canvasObjs.push({id: state.s3.nextId++, type:type, x:nx, y:ny});
    updateStage3HUD();
    render();
  });
  canvas.addEventListener('dblclick', function(e){
    if(state.stage !== 2) return;
    var rect = canvas.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    if(cx < mapCanvasArea.x || cx > mapCanvasArea.x + mapCanvasArea.w) return;
    var nx = (cx - mapCanvasArea.x) / mapCanvasArea.w;
    var ny = (cy - mapCanvasArea.y) / mapCanvasArea.h;
    for(var i=state.s3.canvasObjs.length-1;i>=0;i--){
      var o = state.s3.canvasObjs[i];
      var dx = (o.x - nx) * mapCanvasArea.w;
      var dy = (o.y - ny) * mapCanvasArea.h;
      if(Math.sqrt(dx*dx + dy*dy) < 20){
        state.s3.canvasObjs.splice(i, 1);
        break;
      }
    }
    updateStage3HUD();
    render();
  });

  // ------------------- HUD updaters -------------------
  function updateStage1HUD(){
    var hl = document.getElementById('hudLeft');
    var hr = document.getElementById('hudRight');
    hl.innerHTML = '<div class="hud-stat"><div class="k">'+t('s1_obs_angle')+'</div><div class="v">'+Math.round(state.s1.angle)+'°</div></div>';
    var topness = Math.sin(state.s1.angle * Math.PI / 180);
    var match = Math.round(topness*topness*100);
    var cls = match >= 90 ? 'ok' : (match >= 50 ? '' : 'warn');
    hr.innerHTML = '<div class="hud-stat '+cls+'"><div class="k">'+t('s1_obs_match')+'</div><div class="v">'+match+'%</div></div>';
    var obs = document.getElementById('s1Obs');
    if(obs){
      var msg = topness > 0.95 ? t('s1_obs_good') : (topness > 0.6 ? t('s1_obs_mid') : t('s1_obs_bad'));
      obs.innerHTML = '<div class="label">'+ t('s1_obs_angle') +' '+Math.round(state.s1.angle)+'°</div><div>'+ msg +'</div>';
    }
    if(state.s1.angle >= 85 && state.s1.height >= 6){
      setStatus(t('s1_status_done'));
    } else if(state.s1.angle >= 80){
      setStatus(t('s1_status_good'));
    } else {
      setStatus(t('s1_status_init'));
    }
  }

  function updateStage2HUD(){
    var hl = document.getElementById('hudLeft');
    var hr = document.getElementById('hudRight');
    var mapWcm = 800 / state.s2.scale;
    var mapHcm = 600 / state.s2.scale;
    hl.innerHTML = '<div class="hud-stat"><div class="k">'+t('s2_scale')+'</div><div class="v">1:'+state.s2.scale+'</div></div>' +
      '<div class="hud-stat"><div class="k">MAP</div><div class="v">'+mapWcm.toFixed(1)+'cm</div></div>';
    var paperHcm = state.s2.paperW * 0.707;
    var overflow = mapWcm > state.s2.paperW || mapHcm > paperHcm;
    var fit = overflow ? 'NO' : 'YES';
    var cls = overflow ? 'warn' : 'ok';
    hr.innerHTML = '<div class="hud-stat '+cls+'"><div class="k">'+t('s2_paper_fit')+'</div><div class="v">'+fit+'</div></div>';
    var infoEl = document.getElementById('s2Info');
    if(infoEl){
      infoEl.innerHTML = '<div class="label">'+ t('s2_room_real') +'</div><div>8m × 6m</div>' +
        '<div class="label" style="margin-top:4px;">MAP</div><div>'+mapWcm.toFixed(1)+'cm × '+mapHcm.toFixed(1)+'cm</div>' +
        '<div class="label" style="margin-top:4px;">PAPER</div><div>'+state.s2.paperW+'cm × '+paperHcm.toFixed(1)+'cm</div>';
    }
    var adviceEl = document.getElementById('s2AdviceTxt');
    if(adviceEl){
      var frac = (mapWcm * mapHcm) / (state.s2.paperW * paperHcm);
      var msg;
      if(overflow) msg = t('s2_advice_big');
      else if(frac < 0.25) msg = t('s2_advice_small');
      else msg = t('s2_advice_ok');
      adviceEl.textContent = msg;
    }
    if(!overflow && (mapWcm * mapHcm) > state.s2.paperW * paperHcm * 0.25){
      setStatus(t('s2_status_good'));
    } else if(overflow){
      setStatus(t('s2_status_over'));
    } else {
      setStatus(t('s2_status_small'));
    }
  }

  function updateStage3HUD(){
    var hl = document.getElementById('hudLeft');
    var hr = document.getElementById('hudRight');
    hl.innerHTML = '<div class="hud-stat"><div class="k">PLACED</div><div class="v">'+state.s3.canvasObjs.length+'</div></div>';
    if(state.s3.walker){
      var wk = state.s3.walker;
      var statusMsg = wk.status === 'found' ? t('s3_walker_found')
        : (wk.status === 'lost' ? t('s3_walker_lost')
          : (wk.status === 'crashed' ? t('s3_walker_crashed') : t('s3_walker_searching')));
      var cls = wk.status === 'found' ? 'ok' : (wk.status === 'searching' ? '' : 'warn');
      hr.innerHTML = '<div class="hud-stat"><div class="k">'+t('s3_walker_hp')+'</div><div class="v">'+Math.round(wk.hp)+'%</div></div>' +
        '<div class="hud-stat '+cls+'"><div class="k">'+t('s3_walker_status')+'</div><div class="v" style="font-size:10px;">'+statusMsg+'</div></div>';
    } else {
      hr.innerHTML = '<div class="hud-stat"><div class="k">'+t('s3_walker_status')+'</div><div class="v" style="font-size:10px;">IDLE</div></div>';
    }
    var cl = document.getElementById('s3CheckList');
    if(cl){
      var hasEnough = state.s3.canvasObjs.length >= 5;
      var hasTreasure = false;
      for(var i=0;i<state.s3.canvasObjs.length;i++){
        if(state.s3.canvasObjs[i].type === 'treasure'){ hasTreasure = true; break; }
      }
      var items = '';
      items += '<div style="color:'+(hasEnough?'#4ade80':'#ff8a5c')+';font-size:10px;">'+(hasEnough?'[Y]':'[ ]')+' '+t('s3_need_more')+'</div>';
      items += '<div style="color:'+(hasTreasure?'#4ade80':'#ff8a5c')+';font-size:10px;">'+(hasTreasure?'[Y]':'[ ]')+' '+t('s3_need_treasure')+'</div>';
      cl.innerHTML = '<div class="label">'+ t('s3_checklist') +'</div>' + items;
    }
    if(!state.s3.walking && state.s3.canvasObjs.length > 0 && state.s3.canvasObjs.length < 5){
      setStatus(t('s3_status_draw', {n: state.s3.canvasObjs.length}));
    }
  }

  function setStatus(text){
    document.getElementById('statusTxt').textContent = text;
  }

  // ------------------- Stage transitions -------------------
  function submitStage1(){
    if(state.s1.angle < 85 || state.s1.height < 6){
      setStatus(t('s1_status_init'));
      return;
    }
    state.stageDone[0] = true;
    showStageResult(0);
  }

  function submitStage2(){
    var mapWcm = 800 / state.s2.scale;
    var mapHcm = 600 / state.s2.scale;
    var paperHcm = state.s2.paperW * 0.707;
    var overflow = mapWcm > state.s2.paperW || mapHcm > paperHcm;
    var frac = (mapWcm * mapHcm) / (state.s2.paperW * paperHcm);
    if(overflow || frac < 0.25){
      setStatus(overflow ? t('s2_status_over') : t('s2_status_small'));
      return;
    }
    state.stageDone[1] = true;
    showStageResult(1);
  }

  function showStageResult(stageIdx){
    var modal = document.getElementById('modalBg');
    var title = document.getElementById('modalTitle');
    var body = document.getElementById('modalBody');
    var stars = document.getElementById('modalStars');
    modal.classList.add('open');
    stars.innerHTML = '';
    for(var s=0;s<3;s++){
      var el = document.createElement('div');
      el.className = 'star on';
      el.textContent = '★';
      stars.appendChild(el);
    }
    if(stageIdx === 0){
      title.textContent = t('s1_result_title');
      body.innerHTML = '<p>'+ t('s1_result_body') +'</p>';
    } else if(stageIdx === 1){
      title.textContent = t('s2_result_title');
      body.innerHTML = '<p>'+ t('s2_result_body') +'</p>';
    }
    document.getElementById('modalNext').textContent = t('modal_next');
    document.getElementById('modalNext').onclick = function(){
      modal.classList.remove('open');
      if(state.stage < 2) goToStage(state.stage + 1);
    };
  }

  function showFinalResult(success){
    var modal = document.getElementById('modalBg');
    var title = document.getElementById('modalTitle');
    var body = document.getElementById('modalBody');
    var stars = document.getElementById('modalStars');
    modal.classList.add('open');
    if(success){
      title.textContent = t('s3_result_ok');
      body.innerHTML = '<p>'+t('s3_result_body_ok')+'</p><p>'+t('final_body')+'</p>';
      stars.innerHTML = '';
      for(var s=0;s<3;s++){
        var el = document.createElement('div');
        el.className = 'star on';
        el.textContent = '★';
        stars.appendChild(el);
      }
      document.getElementById('modalNext').textContent = t('final_next');
      document.getElementById('modalNext').onclick = function(){ modal.classList.remove('open'); };
    } else {
      title.textContent = t('s3_result_fail');
      body.innerHTML = '<p>'+t('s3_result_body_fail')+'</p>';
      stars.innerHTML = '';
      document.getElementById('modalNext').textContent = t('modal_close');
      document.getElementById('modalNext').onclick = function(){ modal.classList.remove('open'); };
    }
  }

  function goToStage(idx){
    if(idx < 0 || idx > 2) return;
    if(idx > 0 && !state.stageDone[idx-1]) return;
    state.stage = idx;
    refreshStageNav();
    buildLeftPanel();
    buildRightPanel();
    render();
    if(idx === 0){ updateStage1HUD(); setStatus(t('s1_status_init')); }
    else if(idx === 1){ updateStage2HUD(); setStatus(t('s2_status_init')); }
    else { updateStage3HUD(); setStatus(t('s3_status_init')); }
  }

  function refreshStageNav(){
    var dots = document.querySelectorAll('.stage-dot');
    for(var i=0;i<dots.length;i++){
      dots[i].classList.remove('active','locked','done');
      var idx = parseInt(dots[i].getAttribute('data-stage'));
      if(idx === state.stage) dots[i].classList.add('active');
      else if(idx > 0 && !state.stageDone[idx-1]) dots[i].classList.add('locked');
      if(state.stageDone[idx]) dots[i].classList.add('done');
    }
  }

  function init(){
    document.getElementById('langBtn').addEventListener('click', function(){
      lang = (lang === 'zh') ? 'en' : 'zh';
      applyI18n();
      buildLeftPanel();
      buildRightPanel();
      render();
      if(state.stage === 0) updateStage1HUD();
      else if(state.stage === 1) updateStage2HUD();
      else updateStage3HUD();
    });
    document.getElementById('tutClose').addEventListener('click', function(){
      document.getElementById('tutorial').style.display = 'none';
    });
    document.getElementById('modalClose').addEventListener('click', function(){
      document.getElementById('modalBg').classList.remove('open');
    });
    var dots = document.querySelectorAll('.stage-dot');
    for(var i=0;i<dots.length;i++){
      (function(d){
        d.addEventListener('click', function(){
          var idx = parseInt(d.getAttribute('data-stage'));
          goToStage(idx);
        });
      })(dots[i]);
    }
    window.addEventListener('resize', resizeCanvas);

    applyI18n();
    goToStage(0);

    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(function(){
        setTimeout(function(){ resizeCanvas(); render(); }, 50);
      });
    }
    setTimeout(function(){ resizeCanvas(); render(); }, 120);
    resizeCanvas();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
