<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e14;color:#f6f6fc;font-family:'Noto Sans SC','Inter',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.sidebar-btns{display:flex;gap:6px;align-self:flex-start;}
.sidebar-lang,.sidebar-sound{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,181,156,0.3);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-lang:hover,.sidebar-sound:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);}
.game-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#50ffb0;}
.game-header .info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#aaabb0;}
.game-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.game-body canvas{display:block;}
.control-panel{padding:8px 16px;display:flex;gap:12px;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);flex-wrap:wrap;}
.hud-bar{display:flex;justify-content:space-around;padding:6px 16px;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#aaabb0;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#50ffb0;}
.btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;border:none;cursor:pointer;color:#0c0e14;background:linear-gradient(135deg,#50ffb0,#17df93);letter-spacing:0.08em;transition:transform 0.1s;}
.btn:hover{transform:scale(1.04);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(23,26,31,0.92);color:#aaabb0;backdrop-filter:blur(12px);border:none;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;cursor:pointer;letter-spacing:0.08em;transition:transform 0.1s;}
.btn-secondary:hover{color:#50ffb0;}
.slider-group{display:flex;flex-direction:column;align-items:center;gap:2px;}
.slider-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#aaabb0;letter-spacing:0.08em;}
.slider-val{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#50ffb0;font-weight:700;min-width:50px;text-align:center;}
input[type=range]{width:100px;accent-color:#50ffb0;}
.input-group{display:flex;align-items:center;gap:4px;}
.input-group label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#aaabb0;}
.input-group input[type=number]{width:60px;padding:3px 6px;background:rgba(255,255,255,0.08);border:1px solid rgba(80,255,176,0.3);color:#f6f6fc;font-family:'Space Grotesk',sans-serif;font-size:12px;text-align:center;}
.input-group input[type=number]:focus{outline:none;border-color:#50ffb0;}
.input-group select{padding:3px 6px;background:rgba(255,255,255,0.08);border:1px solid rgba(80,255,176,0.3);color:#f6f6fc;font-family:'Space Grotesk',sans-serif;font-size:12px;}
.input-group select:focus{outline:none;border-color:#50ffb0;}
.result-panel{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(12,14,20,0.95);border:1px solid rgba(80,255,176,0.3);padding:20px 28px;text-align:center;z-index:20;min-width:280px;}
.result-panel h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#50ffb0;margin-bottom:8px;}
.result-panel p{font-size:13px;color:#aaabb0;margin:4px 0;}
.result-panel .verdict{font-size:15px;color:#ffb59c;font-weight:700;margin-top:10px;}
.result-panel .insight{font-size:12px;color:#666;margin-top:8px;font-style:italic;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="sidebar-btns">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <button class="sidebar-sound" id="soundBtn">MUTE</button>
    </div>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-guide" id="guideContent"></div>
  </div>
  <div class="game-main">
    <div class="game-header">
      <h1 id="gameTitle"></h1>
      <div class="info" id="roundInfo"></div>
    </div>
    <div class="game-body" id="gameBody">
      <canvas id="cv"></canvas>
      <div class="result-panel" id="resultPanel">
        <h2 id="rpTitle"></h2>
        <p id="rpLine1"></p>
        <p id="rpLine2"></p>
        <p id="rpLine3"></p>
        <div class="verdict" id="rpVerdict"></div>
        <div class="insight" id="rpInsight"></div>
        <button class="btn" id="rpBtn" style="margin-top:14px;"></button>
      </div>
    </div>
    <div class="control-panel" id="controlPanel"></div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4">--</div></div>
    </div>
  </div>
</div>

// Level 2: Collision predictor (elastic collision, predict directions + velocities, 4 rounds)

// Canvas 2D rendering. Sidebar standard layout. Dark theme.
// ============================================================

var lang = 'cn';
function t(key) { return I18N[key] ? (I18N[key][lang] || I18N[key].en) : key; }
function tf(key, vars) {
  var s = t(key);
  if (vars) { for (var k in vars) { s = s.replace('{'+k+'}', vars[k]); } }
  return s;
}

// --- DOM refs ---
var $ = function(id) { return document.getElementById(id); };
var langBtn = $('langBtn');
var soundBtn = $('soundBtn');
var sidebarTitle = $('sidebarTitle');
var guideContent = $('guideContent');
var gameTitle = $('gameTitle');
var roundInfo = $('roundInfo');
var gameBody = $('gameBody');
var canvas = $('cv');
var ctx = canvas.getContext('2d');
var controlPanel = $('controlPanel');
var resultPanel = $('resultPanel');

// --- Audio (Web Audio API synth, default muted) ---
var audioCtx = null;
var soundMuted = true;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  if (soundMuted) return;
  var ac = getAudio();
  if (!ac) return;
  try {
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playNoise(dur, vol) {
  if (soundMuted) return;
  var ac = getAudio();
  if (!ac) return;
  try {
    var bufSz = ac.sampleRate * dur;
    var buf = ac.createBuffer(1, bufSz, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSz; i++) data[i] = (Math.random() * 2 - 1) * vol;
    var src = ac.createBufferSource();
    src.buffer = buf;
    var g = ac.createGain();
    g.gain.value = 1;
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.connect(g); g.connect(ac.destination);
    src.start(ac.currentTime);
  } catch(e) {}
}
function sndClack() { playTone(800, 0.06, 'square', 0.12); setTimeout(function(){ playTone(400, 0.08, 'triangle', 0.08); }, 30); }
function sndThrust() { playNoise(0.3, 0.08); playTone(120, 0.3, 'sawtooth', 0.05); }
function sndCorrect() { playTone(523, 0.1, 'sine', 0.1); setTimeout(function(){ playTone(659, 0.1, 'sine', 0.08); }, 60); setTimeout(function(){ playTone(784, 0.15, 'sine', 0.08); }, 120); }
function sndWrong() { playTone(200, 0.2, 'square', 0.08); setTimeout(function(){ playTone(160, 0.25, 'square', 0.06); }, 100); }
function sndPocket() { playTone(880, 0.08, 'sine', 0.1); setTimeout(function(){ playTone(1200, 0.12, 'sine', 0.08); }, 50); }
function sndComplete() { playTone(523, 0.15, 'triangle', 0.12); setTimeout(function(){ playTone(659, 0.12, 'triangle', 0.1); }, 100); setTimeout(function(){ playTone(784, 0.12, 'triangle', 0.1); }, 200); setTimeout(function(){ playTone(1047, 0.25, 'triangle', 0.12); }, 300); }
function sndClick() { playTone(660, 0.06, 'sine', 0.06); }

// --- Sound / Lang buttons ---
soundBtn.onclick = function() {
  soundMuted = !soundMuted;
  soundBtn.textContent = soundMuted ? 'MUTE' : 'SND';
  if (!soundMuted) getAudio();
};
langBtn.onclick = function() {
  lang = lang === 'cn' ? 'en' : 'cn';
  langBtn.textContent = lang === 'cn' ? 'CN' : 'EN';
  refreshUI();
};

// --- Canvas sizing ---
var W = 100, H = 100;
function resizeCanvas() {
  var parent = gameBody;
  var availW = parent.clientWidth;
  var availH = parent.clientHeight;
  var dpr = window.devicePixelRatio || 1;
  W = availW;
  H = availH;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', function() { resizeCanvas(); });

// --- Easing ---
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function easeInOutQuad(x) { return x < 0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; }

// --- Colors ---
var COL_A = '#ff6b6b';
var COL_B = '#4ecdc4';
var COL_FUEL = '#ffd93d';
var COL_CUE = '#f6f6fc';
var COL_POOL = [COL_A, COL_B, '#ffd93d', '#a78bfa', '#fb923c'];
var COL_TABLE = '#1a5c36';
var COL_TRACK = 'rgba(255,255,255,0.06)';

// --- Utility ---
function lightenColor(hex, amt) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// GAME STATE
// ============================================================
var PHASE_IDLE = 0, PHASE_ANIMATING = 1, PHASE_INPUT = 2, PHASE_RESULT = 3, PHASE_LEVEL_DONE = 4, PHASE_COMPLETE = 5;
var TOTAL_LEVELS = 4;

var gs = {
  phase: PHASE_IDLE,
  levelIdx: 0,

  totalScore: 0,
  levelScore: 0,
  timer: 0,
  roundData: null,
  // L1 ball
  balls: [],
  simTime: 0,

  // momentum bars
  pBefore: [],

// --- Generate star field for parallax ---
function genStarField() {
  gs.starField = [];
  for (var i = 0; i < 120; i++) {
    gs.starField.push({
      x: Math.random(),
      y: Math.random(),
      size: 0.5 + Math.random() * 1.5,
      depth: 0.2 + Math.random() * 0.8,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}

// ============================================================
// LEVEL 1: MOMENTUM CALCULATOR  (5 rounds, objects: car/bullet/bowling/runner/rocket)
// ============================================================
function genLevel1Rounds() {
  var objects = [
    { nameKey: 'car',        mass: 1200, vel: 25,   color: '#4ecdc4', emoji: 'CAR' },
    { nameKey: 'bullet',     mass: 0.008, vel: 900, color: '#ff6b6b', emoji: 'BLT' },
    { nameKey: 'bowlingBall', mass: 7,   vel: 8,    color: '#a78bfa', emoji: 'BWL' },
    { nameKey: 'personRun',  mass: 70,  vel: 10,    color: '#fb923c', emoji: 'RUN' },
    { nameKey: 'rocket',     mass: 5000, vel: 200,  color: '#ffd93d', emoji: 'RKT' },
  ];
  var rounds = [];
  for (var i = 0; i < objects.length; i++) {
    var o = objects[i];
    rounds.push({ nameKey: o.nameKey, mass: o.mass, vel: o.vel, answer: o.mass * o.vel, color: o.color, emoji: o.emoji });
  }
  return rounds;
}

// ============================================================
// LEVEL 2: COLLISION PREDICTOR (4 rounds, elastic collisions)
// ============================================================
function genLevel2Rounds() {
  var configs = [
    { mA: 5, mB: 3, vA: 4, vB: -2 },
    { mA: 2, mB: 8, vA: 6, vB: 0 },
    { mA: 4, mB: 4, vA: 5, vB: -3 },
    { mA: 10, mB: 2, vA: 3, vB: -5 },
  ];
  var rounds = [];
  for (var i = 0; i < configs.length; i++) {
    var c = configs[i];
    var vA2 = ((c.mA - c.mB) * c.vA + 2 * c.mB * c.vB) / (c.mA + c.mB);
    var vB2 = ((c.mB - c.mA) * c.vB + 2 * c.mA * c.vA) / (c.mA + c.mB);
    rounds.push({
      massA: c.mA, massB: c.mB, velA: c.vA, velB: c.vB,
      ansVelA: Math.round(vA2 * 100) / 100,
      ansVelB: Math.round(vB2 * 100) / 100,
    });
  }
  return rounds;
}

function initLevel() {
  gs.roundIdx = 0;
  gs.levelScore = 0;
  gs.simDone = false;
  gs.showBars = false;
  gs.particles = [];
  gs.feedbackMsg = '';
  gs.feedbackTimer = 0;
  gs.shakeTimer = 0;
  gs.idleTimer = 0;
  gs.showIdleHint = false;
  resultPanel.style.display = 'none';

  if (gs.levelIdx === 0) {
    gs.roundData = genLevel1Rounds();
    buildControlsL1();
    setupL1Round();
  } else if (gs.levelIdx === 1) {
    gs.roundData = genLevel2Rounds();
    buildControlsL2();
    setupL2Round();
  } else if (gs.levelIdx === 2) {
    buildControlsL3();
    setupL3();
  } else if (gs.levelIdx === 3) {
    genStarField();
    var cfg = genLevel4Config();
    gs.rocketMass = cfg.rocketMass;
    gs.fuelTotal = cfg.fuelTotal;
    gs.fuelRemaining = cfg.fuelTotal;
    gs.rocketVel = 0;
    gs.targetVel = cfg.targetVel;
    gs.ejections = [];
    gs.totalExhaustP = 0;
    gs.rocketX = W * 0.3;
    gs.rocketY = H * 0.5;
    gs.rocketDone = false;
    buildControlsL4();
    gs.phase = PHASE_INPUT;
  }
  refreshUI();
}

// --- Level 3 pool setup ---
function setupL3() {
  var ballDefs = genLevel3Balls();
  gs.poolBalls = [];
  var tableX = W * 0.08;
  var tableY = H * 0.08;
  var tableW = W * 0.84;
  var tableH = H * 0.84;
  var ballR = Math.max(8, Math.min(14, tableW * 0.02));
  for (var i = 0; i < ballDefs.length; i++) {
    var bd = ballDefs[i];
    gs.poolBalls.push({
      x: tableX + bd.nx * tableW,
      y: tableY + bd.ny * tableH,
      vx: 0, vy: 0,
      mass: 1, radius: ballR,
      color: bd.color, num: bd.num,
      pocketed: false,
    });
  }
  gs.cueBall = {
    x: tableX + 0.22 * tableW,
    y: tableY + 0.5 * tableH,
    vx: 0, vy: 0,
    mass: 1, radius: ballR,
    color: COL_CUE, num: 0,
    pocketed: false,
  };
  gs.pockets = [];
  gs.shotCount = 0;
  gs.maxShots = 3;
  gs.pocketedCount = 0;
  gs.totalPoolBalls = ballDefs.length;
  gs.poolSimRunning = false;
  gs.showPoolVectors = false;
  gs.aiming = false;
  gs.phase = PHASE_INPUT;
  gs.idleTimer = 0;
  gs.showIdleHint = false;
  updatePocketPositions();
}

function getPoolTableRect() {
  var tx = W * 0.08, ty = H * 0.08;
  var tw = W * 0.84, th = H * 0.84;
  return { x: tx, y: ty, w: tw, h: th };
}

function updatePocketPositions() {
  var tbl = getPoolTableRect();
  gs.pockets = [
    { x: tbl.x + 4, y: tbl.y + 4 },
    { x: tbl.x + tbl.w / 2, y: tbl.y + 2 },
    { x: tbl.x + tbl.w - 4, y: tbl.y + 4 },
    { x: tbl.x + 4, y: tbl.y + tbl.h - 4 },
    { x: tbl.x + tbl.w / 2, y: tbl.y + tbl.h - 2 },
    { x: tbl.x + tbl.w - 4, y: tbl.y + tbl.h - 4 },
  ];
}

// ============================================================
// LEVEL 1 LOGIC
// ============================================================
function onConfirmL1() {
  var inp = $('pInput');
  if (!inp) return;
  var userP = parseFloat(inp.value);
  if (isNaN(userP)) return;
  var rd = gs.roundData[gs.roundIdx];
  var correctP = rd.answer;
  var relErr = Math.abs(userP - correctP) / Math.abs(correctP);
  var pts = 0;
  if (relErr <= 0.10) {
    pts = 100;
    if (relErr < 0.01) {
      showFeedback(t('correct'), '#50ffb0');
    } else {
      var pct = Math.round(relErr * 100);
      showFeedback(tf('close', {e: pct}), '#50ffb0');
    }
    sndCorrect();
    spawnParticles(W * 0.5, H * 0.3, '#50ffb0', 12);
  } else {
    pts = 0;
    showFeedback(tf('wrong', {a: correctP.toFixed(1)}), '#ff6b6b');
    sndWrong();
    triggerShake(0.3, 4);
  }
  gs.levelScore += pts;
  inp.disabled = true;
  var bc = $('btnConfirm');
  if (bc) bc.disabled = true;

  gs.roundIdx++;
  if (gs.roundIdx >= gs.roundData.length) {
    setTimeout(function() { showLevelDone(); }, 1500);
  } else {
    setTimeout(function() { setupL1Round(); }, 1500);
  }
}

// ============================================================
// LEVEL 2 LOGIC
// ============================================================
function onPredictL2() {
  var rd = gs.roundData[gs.roundIdx];
  var da = $('dirASelect'); var db = $('dirBSelect');
  var sa = $('sliderA'); var sb = $('sliderB');
  var dirAVal = da ? da.value : 'right';
  var dirBVal = db ? db.value : 'right';
  var speedA = parseFloat(sa ? sa.value : 0);
  var speedB = parseFloat(sb ? sb.value : 0);

  // Convert user input to signed velocity
  var userVA = dirAVal === 'stop' ? 0 : (dirAVal === 'left' ? -speedA : speedA);
  var userVB = dirBVal === 'stop' ? 0 : (dirBVal === 'left' ? -speedB : speedB);

  // Store predictions
  gs._predVA = userVA;
  gs._predVB = userVB;

  // Compute before momentum
  gs.pBefore = [
    { label: t('objA'), value: rd.massA * rd.velA, color: COL_A },
    { label: t('objB'), value: rd.massB * rd.velB, color: COL_B },
  ];

  // Start animation: move objects toward each other
  gs.balls[0].vx = rd.velA * 30;
  gs.balls[1].vx = rd.velB * 30;
  gs.simDone = false;
  gs.simTime = 0;
  gs.phase = PHASE_ANIMATING;
  gs.showBars = false;

  var btn = $('btnPredict'); if (btn) btn.disabled = true;
  if (da) da.disabled = true;
  if (db) db.disabled = true;
  if (sa) sa.disabled = true;
  if (sb) sb.disabled = true;
  sndClick();
}

function onCollideL2Done(rd) {
  gs.balls[0].vx = rd.ansVelA * 30;
  gs.balls[1].vx = rd.ansVelB * 30;

  gs.pAfter = [
    { label: t('objA'), value: rd.massA * rd.ansVelA, color: COL_A },
    { label: t('objB'), value: rd.massB * rd.ansVelB, color: COL_B },
  ];
  gs.showBars = true;
  gs.simDone = true;

  // Score: check direction + velocity accuracy
  var errA = Math.abs(gs._predVA - rd.ansVelA);
  var errB = Math.abs(gs._predVB - rd.ansVelB);
  // Check direction correctness
  var dirACorrect = (rd.ansVelA > 0.01 && gs._predVA > 0) || (rd.ansVelA < -0.01 && gs._predVA < 0) || (Math.abs(rd.ansVelA) < 0.01 && Math.abs(gs._predVA) < 0.01);
  var dirBCorrect = (rd.ansVelB > 0.01 && gs._predVB > 0) || (rd.ansVelB < -0.01 && gs._predVB < 0) || (Math.abs(rd.ansVelB) < 0.01 && Math.abs(gs._predVB) < 0.01);

  var pts = 0;
  var totalErr = errA + errB;
  if (dirACorrect && dirBCorrect && totalErr < 1) {
    pts = 100;
    showFeedback(t('perfect'), '#50ffb0');
    spawnParticles(W * 0.5, H * 0.3, '#50ffb0', 15);
  } else if (dirACorrect && dirBCorrect && totalErr < 3) {
    pts = 70;
    showFeedback(t('good'), '#ffd93d');
    spawnParticles(W * 0.5, H * 0.3, '#ffd93d', 8);
  } else if (dirACorrect || dirBCorrect) {
    pts = 30;
    showFeedback(t('pConserved'), '#ffb59c');
  } else {
    pts = 10;
    showFeedback(t('pConserved'), '#ff6b6b');
    triggerShake(0.2, 3);
  }
  gs.levelScore += pts;
  sndClack();

  var btnN = $('btnNext');
  if (btnN) btnN.style.display = '';
}

// ============================================================
// LEVEL 3 LOGIC (Billiard)
// ============================================================
function startPoolSim() {
  gs.poolSimRunning = true;
  gs.showPoolVectors = false;
}

function updatePool(dt) {
  if (!gs.poolSimRunning) return;
  var tbl = getPoolTableRect();
  var allBalls = [gs.cueBall].concat(gs.poolBalls);
  var friction = 0.992;
  var moving = false;

  for (var i = 0; i < allBalls.length; i++) {
    var b = allBalls[i];
    if (b.pocketed) continue;
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    b.vx *= friction;
    b.vy *= friction;
    if (Math.abs(b.vx) < 0.05 && Math.abs(b.vy) < 0.05) { b.vx = 0; b.vy = 0; }
    else moving = true;

    if (b.x - b.radius < tbl.x) { b.x = tbl.x + b.radius; b.vx = Math.abs(b.vx) * 0.85; }
    if (b.x + b.radius > tbl.x + tbl.w) { b.x = tbl.x + tbl.w - b.radius; b.vx = -Math.abs(b.vx) * 0.85; }
    if (b.y - b.radius < tbl.y) { b.y = tbl.y + b.radius; b.vy = Math.abs(b.vy) * 0.85; }
    if (b.y + b.radius > tbl.y + tbl.h) { b.y = tbl.y + tbl.h - b.radius; b.vy = -Math.abs(b.vy) * 0.85; }
  }

  // Ball-ball collisions (elastic, momentum conservation)
  for (var i = 0; i < allBalls.length; i++) {
    if (allBalls[i].pocketed) continue;
    for (var j = i + 1; j < allBalls.length; j++) {
      if (allBalls[j].pocketed) continue;
      var a = allBalls[i], b2 = allBalls[j];
      var dx = b2.x - a.x, dy = b2.y - a.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var minD = a.radius + b2.radius;
      if (dist < minD && dist > 0) {
        var nx = dx / dist, ny = dy / dist;
        var dvx = a.vx - b2.vx, dvy = a.vy - b2.vy;
        var dvDotN = dvx * nx + dvy * ny;
        if (dvDotN > 0) {
          var mSum = a.mass + b2.mass;
          var impulse = 2 * dvDotN / mSum;
          a.vx -= impulse * b2.mass * nx;
          a.vy -= impulse * b2.mass * ny;
          b2.vx += impulse * a.mass * nx;
          b2.vy += impulse * a.mass * ny;
          sndClack();
          spawnParticles((a.x + b2.x) / 2, (a.y + b2.y) / 2, '#ffd93d', 6);
        }
        var overlap = minD - dist;
        a.x -= overlap * 0.5 * nx;
        a.y -= overlap * 0.5 * ny;
        b2.x += overlap * 0.5 * nx;
        b2.y += overlap * 0.5 * ny;
      }
    }
  }

  // Pocket detection
  updatePocketPositions();
  var pocketR = Math.max(16, tbl.w * 0.03);
  for (var i = 0; i < allBalls.length; i++) {
    var b = allBalls[i];
    if (b.pocketed) continue;
    for (var p = 0; p < gs.pockets.length; p++) {
      var pk = gs.pockets[p];
      var dx = b.x - pk.x, dy = b.y - pk.y;
      if (Math.sqrt(dx * dx + dy * dy) < pocketR) {
        b.pocketed = true;
        b.vx = 0; b.vy = 0;
        if (b === gs.cueBall) {
          setTimeout(function() {
            var tbl2 = getPoolTableRect();
            gs.cueBall.pocketed = false;
            gs.cueBall.x = tbl2.x + 0.22 * tbl2.w;
            gs.cueBall.y = tbl2.y + 0.5 * tbl2.h;
            gs.cueBall.vx = 0;
            gs.cueBall.vy = 0;
          }, 500);
        } else {
          gs.pocketedCount++;
          sndPocket();
          spawnParticles(b.x, b.y, b.color, 10);
        }
        break;
      }
    }
  }

  if (!moving) {
    gs.poolSimRunning = false;
    gs.showPoolVectors = true;
    gs.phase = PHASE_INPUT;

    // Check completion
    if (gs.pocketedCount >= gs.totalPoolBalls) {
      var pts = Math.max(30, 150 - (gs.shotCount - 1) * 30);
      gs.levelScore += pts;
      showFeedback(t('allPocketed'), '#50ffb0');
      sndComplete();
      setTimeout(function() { showLevelDone(); }, 2000);
    } else if (gs.shotCount >= gs.maxShots) {
      // Out of shots
      var pts = Math.round(gs.pocketedCount / gs.totalPoolBalls * 100);
      gs.levelScore += pts;
      showFeedback(tf('pocketed', {n: gs.pocketedCount}), '#ffb59c');
      setTimeout(function() { showLevelDone(); }, 2000);
    }
  }
}

// ============================================================
// LEVEL 4 LOGIC (Rocket)
// ============================================================
function onFireRocket() {
  if (gs.rocketDone) return;
  if (gs.fuelRemaining <= 0) {
    showFeedback(t('noFuel'), '#ff6b6b');
    sndWrong();
    return;
  }
  var evSlider = $('sliderExhVel');
  var mfSlider = $('sliderMassFlow');
  var exhaustVel = parseFloat(evSlider ? evSlider.value : 100);
  var massFlowRate = parseFloat(mfSlider ? mfSlider.value : 5);

  // Simulate 1-second burst
  var fuelUsed = Math.min(massFlowRate, gs.fuelRemaining);
  var totalMassBefore = gs.rocketMass + gs.fuelRemaining;
  var pBefore = totalMassBefore * gs.rocketVel;

  gs.fuelRemaining -= fuelUsed;
  var totalMassAfter = gs.rocketMass + gs.fuelRemaining;

  // Fuel ejected at (rocketVel - exhaustVel) in lab frame
  var fuelVelLab = gs.rocketVel - exhaustVel;
  // Momentum conservation: totalMassAfter * V_new + fuelUsed * fuelVelLab = pBefore
  var newRocketVel = (pBefore - fuelUsed * fuelVelLab) / totalMassAfter;
  gs.rocketVel = Math.round(newRocketVel * 100) / 100;

  // Track total exhaust momentum
  gs.totalExhaustP += fuelUsed * fuelVelLab;

  // Ejection particles
  gs.ejections.push({
    mass: fuelUsed, vel: exhaustVel,
    x: gs.rocketX, y: gs.rocketY,
    time: 0, particles: makeExhaustParticles(gs.rocketX, gs.rocketY)
  });

  sndThrust();
  triggerShake(0.15, 3);

  // Check target
  if (gs.rocketVel >= gs.targetVel) {
    gs.rocketDone = true;
    gs.levelScore += 100;
    showFeedback(t('reached'), '#50ffb0');
    sndCorrect();
    spawnParticles(W * 0.5, H * 0.3, '#50ffb0', 20);
    setTimeout(function() { showLevelDone(); }, 2500);
  } else if (gs.fuelRemaining <= 0) {
    gs.rocketDone = true;
    var diff = Math.round((gs.targetVel - gs.rocketVel) * 100) / 100;
    gs.levelScore += Math.max(0, Math.round((gs.rocketVel / gs.targetVel) * 60));
    showFeedback(tf('notReached', {v: diff}), '#ff6b6b');
    sndWrong();
    setTimeout(function() { showLevelDone(); }, 2500);
  }
}

function makeExhaustParticles(px, py) {
  var parts = [];
  for (var i = 0; i < 16; i++) {
    parts.push({
      x: px, y: py,
      vx: -3 - Math.random() * 6,
      vy: (Math.random() - 0.5) * 4,
      life: 0.5 + Math.random() * 0.5,
      age: 0,
      size: 2 + Math.random() * 4,
    });
  }
  return parts;
}

// --- Particles ---
function spawnParticles(px, py, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 4;
    gs.particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.3 + Math.random() * 0.5,
      age: 0,
      size: 2 + Math.random() * 3,
      color: color,
    });
  }
}

function updateParticles(dt) {
  for (var i = gs.particles.length - 1; i >= 0; i--) {
    var p = gs.particles[i];
    p.age += dt;
    if (p.age > p.life) { gs.particles.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.5; // slight gravity
  }
}

function drawParticles() {
  for (var i = 0; i < gs.particles.length; i++) {
    var p = gs.particles[i];
    var alpha = 1 - p.age / p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha * 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// MOUSE / TOUCH for Level 3 (billiard aiming)
// ============================================================
canvas.addEventListener('mousedown', function(e) {
  if (gs.levelIdx !== 2 || gs.phase !== PHASE_INPUT || gs.poolSimRunning) return;
  if (gs.shotCount >= gs.maxShots || gs.pocketedCount >= gs.totalPoolBalls) return;
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var dx = mx - gs.cueBall.x, dy = my - gs.cueBall.y;
  if (Math.sqrt(dx * dx + dy * dy) < gs.cueBall.radius * 3) {
    gs.aiming = true;
    gs.aimStartX = gs.cueBall.x;
    gs.aimStartY = gs.cueBall.y;
    gs.aimEndX = mx;
    gs.aimEndY = my;
  }
});
canvas.addEventListener('mousemove', function(e) {
  if (!gs.aiming) return;
  var rect = canvas.getBoundingClientRect();
  gs.aimEndX = e.clientX - rect.left;
  gs.aimEndY = e.clientY - rect.top;
});
canvas.addEventListener('mouseup', function(e) {
  if (!gs.aiming) return;
  gs.aiming = false;
  var dx = gs.aimStartX - gs.aimEndX;
  var dy = gs.aimStartY - gs.aimEndY;
  var power = Math.sqrt(dx * dx + dy * dy);
  if (power < 5) return;
  var maxPower = 200;
  power = Math.min(power, maxPower);
  var scale = power / maxPower * 12;
  var len = Math.sqrt(dx * dx + dy * dy);
  gs.cueBall.vx = (dx / len) * scale;
  gs.cueBall.vy = (dy / len) * scale;
  gs.shotCount++;
  gs.showPoolVectors = false;
  startPoolSim();
  gs.phase = PHASE_ANIMATING;
  sndClack();
});

// ============================================================
// DRAW HELPERS
// ============================================================
function drawBall(b, showVelArrow) {
  if (!b || b.pocketed) return;
  // Glow effect
  var glowAlpha = 0.1 + 0.05 * Math.sin(gs.glowPhase * 2 + (b.num || 0));
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius + 4, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.globalAlpha = glowAlpha;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Shadow
  ctx.beginPath();
  ctx.arc(b.x + 2, b.y + 2, b.radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  // Ball gradient
  var grad = ctx.createRadialGradient(b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.1, b.x, b.y, b.radius);
  grad.addColorStop(0, lightenColor(b.color, 40));
  grad.addColorStop(1, b.color);
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Label
  if (b.label) {
    ctx.font = '700 ' + Math.max(8, b.radius * 0.55) + 'px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#0c0e14';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x, b.y);
  } else if (b.num !== undefined && b.num > 0) {
    ctx.font = '700 ' + Math.max(9, b.radius * 0.8) + 'px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#0c0e14';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.num + '', b.x, b.y);
  }
  // Velocity arrow
  if (showVelArrow && (Math.abs(b.vx) > 0.5 || Math.abs(b.vy) > 0.5)) {
    var arrowScale = 5;
    var ax = b.x + b.vx * arrowScale;
    var ay = b.y + b.vy * arrowScale;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(ax, ay);
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    var angle = Math.atan2(ay - b.y, ax - b.x);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 8 * Math.cos(angle - 0.4), ay - 8 * Math.sin(angle - 0.4));
    ctx.lineTo(ax - 8 * Math.cos(angle + 0.4), ay - 8 * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = b.color;
    ctx.fill();
  }
}

function drawTrack(y) {
  ctx.fillStyle = COL_TRACK;
  ctx.fillRect(0, y - 2, W, 4);
  ctx.font = '9px "Space Grotesk",sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.textAlign = 'center';
  for (var mx = 50; mx < W; mx += 50) {
    ctx.fillRect(mx, y - 6, 1, 12);
  }
}

function drawMomentumBars(yBase) {
  if (!gs.showBars) return;
  var barH = 16;
  var maxP = 1;
  var allP = gs.pBefore.concat(gs.pAfter);
  for (var i = 0; i < allP.length; i++) {
    if (Math.abs(allP[i].value) > maxP) maxP = Math.abs(allP[i].value);
  }
  var scale = (W * 0.25) / maxP;
  var centerX = W * 0.5;

  ctx.font = '700 10px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#aaabb0';
  ctx.textAlign = 'center';
  ctx.fillText(t('before'), centerX, yBase);

  var y = yBase + 6;
  var totalBefore = 0;
  for (var i = 0; i < gs.pBefore.length; i++) {
    var p = gs.pBefore[i];
    var bw = p.value * scale;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.6;
    if (bw >= 0) ctx.fillRect(centerX, y, bw, barH);
    else ctx.fillRect(centerX + bw, y, -bw, barH);
    ctx.globalAlpha = 1;
    ctx.font = '9px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#f6f6fc';
    ctx.textAlign = bw >= 0 ? 'left' : 'right';
    ctx.fillText(p.label + ': ' + p.value.toFixed(1), bw >= 0 ? centerX + bw + 4 : centerX + bw - 4, y + 11);
    totalBefore += p.value;
    y += barH + 4;
  }
  ctx.fillStyle = '#50ffb0';
  ctx.font = '700 10px "Space Grotesk",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Total: ' + totalBefore.toFixed(1), centerX, y + 2);

  y += 18;
  ctx.fillStyle = '#aaabb0';
  ctx.fillText(t('after'), centerX, y);
  y += 6;
  var totalAfter = 0;
  for (var i = 0; i < gs.pAfter.length; i++) {
    var p = gs.pAfter[i];
    var bw = p.value * scale;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.6;
    if (bw >= 0) ctx.fillRect(centerX, y, bw, barH);
    else ctx.fillRect(centerX + bw, y, -bw, barH);
    ctx.globalAlpha = 1;
    ctx.font = '9px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#f6f6fc';
    ctx.textAlign = bw >= 0 ? 'left' : 'right';
    ctx.fillText(p.label + ': ' + p.value.toFixed(1), bw >= 0 ? centerX + bw + 4 : centerX + bw - 4, y + 11);
    totalAfter += p.value;
    y += barH + 4;
  }
  ctx.fillStyle = '#50ffb0';
  ctx.font = '700 10px "Space Grotesk",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Total: ' + totalAfter.toFixed(1), centerX, y + 2);
}

function drawPoolTable() {
  var tbl = getPoolTableRect();
  ctx.fillStyle = COL_TABLE;
  ctx.fillRect(tbl.x, tbl.y, tbl.w, tbl.h);
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = 6;
  ctx.strokeRect(tbl.x - 3, tbl.y - 3, tbl.w + 6, tbl.h + 6);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.strokeRect(tbl.x + 10, tbl.y + 10, tbl.w - 20, tbl.h - 20);

  var pocketR = Math.max(12, tbl.w * 0.025);
  for (var i = 0; i < gs.pockets.length; i++) {
    var pk = gs.pockets[i];
    ctx.beginPath();
    ctx.arc(pk.x, pk.y, pocketR, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  for (var i = 0; i < gs.poolBalls.length; i++) {
    drawBall(gs.poolBalls[i], gs.showPoolVectors);
  }
  drawBall(gs.cueBall, false);

  // Aiming line
  if (gs.aiming) {
    ctx.beginPath();
    ctx.setLineDash([6, 4]);
    ctx.moveTo(gs.cueBall.x, gs.cueBall.y);
    var dx = gs.aimStartX - gs.aimEndX;
    var dy = gs.aimStartY - gs.aimEndY;
    var len = Math.sqrt(dx * dx + dy * dy);
    if (len > 0) {
      var nx = dx / len, ny = dy / len;
      ctx.lineTo(gs.cueBall.x + nx * 150, gs.cueBall.y + ny * 150);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    var power = Math.min(len, 200);
    var powerPct = Math.round(power / 200 * 100);
    ctx.font = '11px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#ffb59c';
    ctx.textAlign = 'center';
    ctx.fillText(powerPct + '%', gs.aimEndX, gs.aimEndY - 12);
  }

  ctx.font = '11px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#aaabb0';
  ctx.textAlign = 'left';
  ctx.fillText(t('shots') + ': ' + gs.shotCount + '/' + gs.maxShots, tbl.x + 10, tbl.y - 8);
  ctx.textAlign = 'right';
  ctx.fillText(t('balls') + ': ' + (gs.totalPoolBalls - gs.pocketedCount), tbl.x + tbl.w - 10, tbl.y - 8);
}

function drawRocket() {
  var rx = gs.rocketX;
  var ry = gs.rocketY;
  var size = 30 + (gs.rocketMass + gs.fuelRemaining) * 0.15;

  // Rocket body
  ctx.save();
  ctx.translate(rx, ry);
  ctx.beginPath();
  ctx.moveTo(size * 0.6, 0);
  ctx.lineTo(-size * 0.4, -size * 0.25);
  ctx.lineTo(-size * 0.3, 0);
  ctx.lineTo(-size * 0.4, size * 0.25);
  ctx.closePath();
  var grad = ctx.createLinearGradient(-size * 0.4, 0, size * 0.6, 0);
  grad.addColorStop(0, '#888');
  grad.addColorStop(0.5, '#ccc');
  grad.addColorStop(1, '#ff4444');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Window
  ctx.beginPath();
  ctx.arc(size * 0.15, 0, size * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#4ecdc4';
  ctx.fill();
  // Flame
  if (gs.ejections.length > 0) {
    var lastEj = gs.ejections[gs.ejections.length - 1];
    if (lastEj.time < 0.6) {
      var flameLen = 20 + Math.random() * 18;
      ctx.beginPath();
      ctx.moveTo(-size * 0.3, -size * 0.12);
      ctx.lineTo(-size * 0.3 - flameLen, 0);
      ctx.lineTo(-size * 0.3, size * 0.12);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,200,50,0.7)';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-size * 0.3, -size * 0.06);
      ctx.lineTo(-size * 0.3 - flameLen * 0.6, 0);
      ctx.lineTo(-size * 0.3, size * 0.06);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,100,50,0.8)';
      ctx.fill();
    }
  }
  ctx.restore();

  // Velocity label
  ctx.font = '700 13px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#50ffb0';
  ctx.textAlign = 'center';
  ctx.fillText('v = ' + gs.rocketVel.toFixed(1) + ' m/s', rx, ry - size * 0.4 - 10);

  // Mass label
  ctx.font = '10px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#aaabb0';
  ctx.fillText('m = ' + (gs.rocketMass + gs.fuelRemaining).toFixed(1) + ' kg', rx, ry + size * 0.4 + 16);

  // Target indicator
  ctx.strokeStyle = '#50ffb0';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(W * 0.85, ry - 30);
  ctx.lineTo(W * 0.85, ry + 30);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '10px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#50ffb0';
  ctx.textAlign = 'center';
  ctx.fillText(t('targetV') + ': ' + gs.targetVel + ' m/s', W * 0.85, ry - 36);

  // Momentum conservation bar (p_rocket + p_exhaust = 0)
  var barY = H * 0.78;
  var totalRocketP = (gs.rocketMass + gs.fuelRemaining) * gs.rocketVel;
  var totalSum = totalRocketP + gs.totalExhaustP;
  var barMaxP = Math.max(Math.abs(totalRocketP), Math.abs(gs.totalExhaustP), 100);
  var barScale = (W * 0.3) / barMaxP;
  var barCenterX = W * 0.5;

  // Bar background
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(barCenterX - W * 0.3, barY, W * 0.6, 16);
  ctx.fillRect(barCenterX - W * 0.3, barY + 22, W * 0.6, 16);

  // Rocket momentum bar (positive, right)
  var rBarW = totalRocketP * barScale;
  ctx.fillStyle = '#4ecdc4';
  ctx.globalAlpha = 0.7;
  if (rBarW >= 0) ctx.fillRect(barCenterX, barY, rBarW, 16);
  else ctx.fillRect(barCenterX + rBarW, barY, -rBarW, 16);
  ctx.globalAlpha = 1;

  // Exhaust momentum bar (negative, left)
  var eBarW = gs.totalExhaustP * barScale;
  ctx.fillStyle = '#ffd93d';
  ctx.globalAlpha = 0.7;
  if (eBarW >= 0) ctx.fillRect(barCenterX, barY + 22, eBarW, 16);
  else ctx.fillRect(barCenterX + eBarW, barY + 22, -eBarW, 16);
  ctx.globalAlpha = 1;

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(barCenterX, barY - 4);
  ctx.lineTo(barCenterX, barY + 42);
  ctx.stroke();

  // Labels
  ctx.font = '700 10px "Space Grotesk",sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#4ecdc4';
  ctx.fillText('p_rocket = ' + totalRocketP.toFixed(1), barCenterX - W * 0.3, barY - 4);
  ctx.fillStyle = '#ffd93d';
  ctx.fillText('p_exhaust = ' + gs.totalExhaustP.toFixed(1), barCenterX - W * 0.3, barY + 18);
  ctx.fillStyle = '#50ffb0';
  ctx.textAlign = 'center';
  // Glow on sum = 0
  var sumGlow = Math.abs(totalSum) < 0.1 ? 1 : 0.5;
  ctx.globalAlpha = sumGlow;
  ctx.fillText('p_rocket + p_exhaust = ' + totalSum.toFixed(1), barCenterX, barY + 52);
  ctx.globalAlpha = 1;

  // Fuel remaining bar
  var fuelBarY = barY + 64;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(W * 0.15, fuelBarY, W * 0.7, 10);
  var fuelFrac = gs.fuelRemaining / gs.fuelTotal;
  ctx.fillStyle = COL_FUEL;
  ctx.globalAlpha = 0.6;
  ctx.fillRect(W * 0.15, fuelBarY, W * 0.7 * fuelFrac, 10);
  ctx.globalAlpha = 1;
  ctx.font = '9px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#aaabb0';
  ctx.textAlign = 'left';
  ctx.fillText(t('fuelMass') + ': ' + gs.fuelRemaining.toFixed(1) + ' / ' + gs.fuelTotal + ' kg', W * 0.15, fuelBarY + 20);
}

function drawExhaustParticles(dt) {
  for (var e = 0; e < gs.ejections.length; e++) {
    var ej = gs.ejections[e];
    ej.time += dt;
    var parts = ej.particles;
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      p.age += dt;
      if (p.age > p.life) continue;
      p.x += p.vx;
      p.y += p.vy;
      var alpha = 1 - p.age / p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,200,80,' + (alpha * 0.6) + ')';
      ctx.fill();
    }
  }
}

function drawStarField(scrollOffset) {
  for (var i = 0; i < gs.starField.length; i++) {
    var s = gs.starField[i];
    var sx = ((s.x * W) - scrollOffset * s.depth * 0.3) % W;
    if (sx < 0) sx += W;
    var sy = s.y * H;
    var twinkle = 0.3 + 0.3 * Math.sin(gs.timer * 2 + s.twinkle);
    ctx.beginPath();
    ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + twinkle + ')';
    ctx.fill();
  }
}

// ============================================================
// DRAW LEVELS
// ============================================================
function drawLevel1() {
  var trackY = H * 0.5;
  drawTrack(trackY);

  if (gs.roundIdx < gs.roundData.length) {
    var rd = gs.roundData[gs.roundIdx];
    var b = gs.balls[0];
    if (b) {
      b.y = trackY;
      drawBall(b, false);

      // Object info
      ctx.font = '700 14px "Space Grotesk","Noto Sans SC",sans-serif';
      ctx.fillStyle = '#f6f6fc';
      ctx.textAlign = 'center';
      ctx.fillText(t(rd.nameKey) + ':  m = ' + rd.mass + ' kg,  v = ' + rd.vel + ' m/s', W * 0.5, trackY - 55);
      ctx.font = '12px "Space Grotesk",sans-serif';
      ctx.fillStyle = '#50ffb0';
      ctx.fillText(t('pFormula') + '  -->  p = ?', W * 0.5, trackY - 35);

      // Velocity arrow on object
      var arrowLen = Math.min(60, rd.vel * 0.3);
      ctx.beginPath();
      ctx.moveTo(b.x + b.radius + 5, trackY);
      ctx.lineTo(b.x + b.radius + 5 + arrowLen, trackY);
      ctx.strokeStyle = rd.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      var ax = b.x + b.radius + 5 + arrowLen;
      ctx.beginPath();
      ctx.moveTo(ax, trackY);
      ctx.lineTo(ax - 6, trackY - 4);
      ctx.lineTo(ax - 6, trackY + 4);
      ctx.closePath();
      ctx.fillStyle = rd.color;
      ctx.fill();
    }
  }
  // Round info
  ctx.font = '10px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#aaabb0';
  ctx.textAlign = 'right';
  ctx.fillText(t('round') + ' ' + (Math.min(gs.roundIdx + 1, gs.roundData.length)) + '/' + gs.roundData.length, W - 20, 20);

  // Idle hint
  if (gs.showIdleHint && gs.phase === PHASE_INPUT) {
    ctx.font = '12px "Noto Sans SC",sans-serif';
    ctx.fillStyle = 'rgba(80,255,176,0.5)';
    ctx.textAlign = 'center';
    var hintAlpha = 0.3 + 0.3 * Math.sin(gs.timer * 3);
    ctx.globalAlpha = hintAlpha;
    ctx.fillText(lang === 'cn' ? '\u8f93\u5165 p = m x v \u7684\u7ed3\u679c' : 'Enter p = m x v result', W * 0.5, H * 0.75);
    ctx.globalAlpha = 1;
  }
}

function drawLevel2() {
  var trackY = H * 0.38;
  drawTrack(trackY);
  for (var i = 0; i < gs.balls.length; i++) {
    gs.balls[i].y = trackY;
    drawBall(gs.balls[i], true);
  }
  // Velocity labels
  if (gs.roundIdx < gs.roundData.length) {
    var rd = gs.roundData[gs.roundIdx];
    for (var i = 0; i < gs.balls.length; i++) {
      var b = gs.balls[i];
      var vel = (gs.phase === PHASE_INPUT) ? (i === 0 ? rd.velA : rd.velB) : (b.vx / 30);
      ctx.font = '10px "Space Grotesk",sans-serif';
      ctx.fillStyle = b.color;
      ctx.textAlign = 'center';
      ctx.fillText('v=' + vel.toFixed(1) + ' m/s', b.x, trackY - b.radius - 12);
      ctx.fillText('p=' + (b.mass * vel).toFixed(1), b.x, trackY - b.radius - 24);
    }
    // Show setup info before collision
    if (gs.phase === PHASE_INPUT) {
      ctx.font = '700 12px "Space Grotesk",sans-serif';
      ctx.fillStyle = '#ffb59c';
      ctx.textAlign = 'center';
      ctx.fillText('A: m=' + rd.massA + 'kg, v=' + rd.velA + 'm/s    B: m=' + rd.massB + 'kg, v=' + rd.velB + 'm/s', W * 0.5, 25);
      // Direction arrows
      if (rd.velA > 0) drawArrow(gs.balls[0].x + gs.balls[0].radius + 8, trackY, gs.balls[0].x + gs.balls[0].radius + 35, trackY, COL_A);
      else if (rd.velA < 0) drawArrow(gs.balls[0].x - gs.balls[0].radius - 8, trackY, gs.balls[0].x - gs.balls[0].radius - 35, trackY, COL_A);
      if (rd.velB > 0) drawArrow(gs.balls[1].x + gs.balls[1].radius + 8, trackY, gs.balls[1].x + gs.balls[1].radius + 35, trackY, COL_B);
      else if (rd.velB < 0) drawArrow(gs.balls[1].x - gs.balls[1].radius - 8, trackY, gs.balls[1].x - gs.balls[1].radius - 35, trackY, COL_B);
    }
  }
  drawMomentumBars(H * 0.58);
  ctx.font = '10px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#aaabb0';
  ctx.textAlign = 'right';
  ctx.fillText(t('round') + ' ' + (Math.min(gs.roundIdx + 1, gs.roundData.length)) + '/' + gs.roundData.length, W - 20, 20);
}

function drawArrow(x1, y1, x2, y2, color) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  var angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 7 * Math.cos(angle - 0.4), y2 - 7 * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - 7 * Math.cos(angle + 0.4), y2 - 7 * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawLevel3() {
  drawPoolTable();
}

function drawLevel4() {
  // Space background
  ctx.fillStyle = '#080a10';
  ctx.fillRect(0, 0, W, H);
  // Parallax star field
  drawStarField(gs.rocketVel * gs.timer * 0.5);
  drawExhaustParticles(1 / 60);
  drawRocket();
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  // Shake offset
  var shakeX = 0, shakeY = 0;
  if (gs.shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * gs.shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * gs.shakeIntensity * 2;
  }
  ctx.save();
  ctx.translate(shakeX, shakeY);

  ctx.clearRect(-10, -10, W + 20, H + 20);
  // Background grid
  ctx.strokeStyle = 'rgba(80,255,176,0.03)';
  ctx.lineWidth = 1;
  for (var gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
  for (var gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

  if (gs.levelIdx === 0) drawLevel1();
  else if (gs.levelIdx === 1) drawLevel2();
  else if (gs.levelIdx === 2) drawLevel3();
  else if (gs.levelIdx === 3) drawLevel4();

  // Particles
  drawParticles();

  // Feedback overlay with easing
  if (gs.feedbackTimer > 0) {
    var fadeT = Math.min(1, gs.feedbackTimer);
    var yOff = (1 - easeOutCubic(Math.min(1, (2 - gs.feedbackTimer) * 2))) * 20;
    ctx.font = '700 20px "Space Grotesk","Noto Sans SC",sans-serif';
    ctx.fillStyle = gs.feedbackColor;
    ctx.globalAlpha = fadeT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gs.feedbackMsg, W * 0.5, H * 0.13 + yOff);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// UPDATE LOOP
// ============================================================
var lastTime = 0;
function update(time) {
  var dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  gs.timer += dt;
  gs.glowPhase += dt;
  if (gs.feedbackTimer > 0) gs.feedbackTimer -= dt;
  if (gs.shakeTimer > 0) gs.shakeTimer -= dt;

  // Idle hint timer
  if (gs.phase === PHASE_INPUT) {
    gs.idleTimer += dt;
    if (gs.idleTimer > 5) gs.showIdleHint = true;
  } else {
    gs.idleTimer = 0;
    gs.showIdleHint = false;
  }

  // Level-specific updates
  if (gs.levelIdx === 0) updateL1(dt);
  else if (gs.levelIdx === 1) updateL2(dt);
  else if (gs.levelIdx === 2) updateL3(dt);
  else if (gs.levelIdx === 3) updateL4(dt);

  updateParticles(dt);

  // HUD
  var totalP = computeTotalMomentum();
  $('hudV2').textContent = totalP;
  $('hudV3').textContent = gs.totalScore + gs.levelScore + '';
  $('hudV4').textContent = Math.floor(gs.timer) + 's';

  draw();
  requestAnimationFrame(update);
}

function computeTotalMomentum() {
  if (gs.levelIdx === 0) {
    if (gs.roundIdx < gs.roundData.length) {
      var rd = gs.roundData[gs.roundIdx];
      return (rd.mass * rd.vel).toFixed(1);
    }
    return '--';
  } else if (gs.levelIdx === 1) {
    var total = 0;
    for (var i = 0; i < gs.balls.length; i++) {
      total += gs.balls[i].mass * (gs.balls[i].vx / 30);
    }
    return total.toFixed(1);
  } else if (gs.levelIdx === 2) {
    var px = 0, py = 0;
    var allBalls = [gs.cueBall].concat(gs.poolBalls);
    for (var i = 0; i < allBalls.length; i++) {
      if (!allBalls[i] || allBalls[i].pocketed) continue;
      px += allBalls[i].mass * allBalls[i].vx;
      py += allBalls[i].mass * allBalls[i].vy;
    }
    return Math.sqrt(px * px + py * py).toFixed(1);
  } else if (gs.levelIdx === 3) {
    return '0.0';
  }
  return '--';
}

function updateL1(dt) {
  if (gs.phase !== PHASE_ANIMATING) return;
  gs.simTime += dt;
  var b = gs.balls[0];
  if (b) {
    b.x += b.vx * dt;
    if (b.x > W + 50) b.x = -50;
    if (gs.simTime > 1.2) {
      gs.phase = PHASE_INPUT;
    }
  }
}

function updateL2(dt) {
  if (gs.phase !== PHASE_ANIMATING) return;
  gs.simTime += dt;
  for (var i = 0; i < gs.balls.length; i++) {
    gs.balls[i].x += gs.balls[i].vx * dt;
  }
  var a = gs.balls[0], b = gs.balls[1];
  var dist = Math.abs(a.x - b.x);
  if (dist <= a.radius + b.radius && !gs.simDone) {
    var rd = gs.roundData[gs.roundIdx];
    onCollideL2Done(rd);
    spawnParticles((a.x + b.x) / 2, a.y, '#ffd93d', 15);
    triggerShake(0.15, 3);
  }
}

function updateL3(dt) {
  if (gs.poolSimRunning) {
    updatePool(dt);
  }
}

function updateL4(dt) {
  if (gs.rocketVel > 0) {
    gs.rocketX += gs.rocketVel * dt * 3;
    if (gs.rocketX > W * 0.75) gs.rocketX = W * 0.3;
  }
}

// ============================================================
// LEVEL TRANSITION EFFECTS
// ============================================================
// (level transitions use the result panel overlay with eased fade)

// ============================================================
// INIT
// ============================================================
resizeCanvas();
genStarField();
initLevel();
gs.timer = 0;
requestAnimationFrame(update);

</script>
</body>
</html>
