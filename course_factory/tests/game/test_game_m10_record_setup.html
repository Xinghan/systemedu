<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脑波录制装配台</title>
<style>
  :root{
    /* Surfaces — Claude warm cream */
    --paper:    #FAF9F5;
    --paper-2:  #F1EDDF;
    --card:     #FFFFFF;
    --ink:      #191814;
    --ink-2:    #2B2924;
    --sub:      #6B6557;
    --sub-2:    #9D978A;
    --border:   #EBE5D6;
    --border-2: #D9D1BD;
    --hairline: #F2EDE0;

    /* Primary — Claude coral */
    --primary:      #D97757;
    --primary-ink:  #9A4A2E;
    --primary-soft: #F8EDE5;
    --primary-line: #ECCFB8;

    /* Domain accent — robotics 紫 */
    --robotics:     #7C4569;
    --robotics-soft:#E9DBE3;

    --good:     #5A8A5E;
    --good-soft:#E2ECE1;
    --warn:     #C0823C;
    --warn-soft:#F6ECDB;

    --shadow-sm: 0 1px 2px 0 rgba(25,24,20,.04);
    --shadow:    0 1px 3px 0 rgba(25,24,20,.06), 0 1px 2px -1px rgba(25,24,20,.04);
    --shadow-md: 0 4px 8px -2px rgba(25,24,20,.06), 0 2px 4px -2px rgba(25,24,20,.04);
    --shadow-lg: 0 12px 24px -6px rgba(25,24,20,.1), 0 4px 8px -4px rgba(25,24,20,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;overflow:hidden;display:flex;
    background:var(--paper);color:var(--ink);
    font-family:'PingFang SC','Noto Sans SC','Inter',sans-serif;
  }
  .mono{font-family:'JetBrains Mono','SF Mono','Roboto Mono',ui-monospace,monospace;}

  /* ---------------- Sidebar ---------------- */
  .game-sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--paper-2);border-right:1px solid var(--border-2);
    display:flex;flex-direction:column;gap:12px;padding:16px 14px;
    overflow-y:auto;
  }
  .brand{display:flex;flex-direction:column;gap:3px;}
  .brand .kicker{font-size:10px;letter-spacing:.14em;color:var(--robotics);font-weight:700;text-transform:uppercase;}
  .brand h1{font-size:17px;margin:0;line-height:1.25;color:var(--ink);}

  .step-box{
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:10px 11px;box-shadow:var(--shadow-sm);
  }
  .step-box .lbl{font-size:10px;font-weight:700;color:var(--primary-ink);letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase;}
  .step-box .now{font-size:12.5px;color:var(--ink-2);line-height:1.45;}
  .step-box .now b{color:var(--robotics);}

  .tray-lbl{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.05em;text-transform:uppercase;}
  .tray{display:flex;flex-direction:column;gap:7px;}
  .chip{
    padding:8px 10px;border-radius:9px;cursor:grab;user-select:none;
    background:var(--card);border:1px solid var(--border-2);box-shadow:var(--shadow-sm);
    display:flex;align-items:center;gap:8px;touch-action:none;
    transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
  }
  .chip:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);border-color:var(--robotics);}
  .chip:active{cursor:grabbing;}
  .chip.dragging{opacity:.4;}
  .chip.used{opacity:.3;pointer-events:none;}
  .chip .ic{width:22px;height:22px;flex-shrink:0;}
  .chip .txt{display:flex;flex-direction:column;gap:1px;line-height:1.1;}
  .chip .name{font-size:12px;font-weight:700;color:var(--ink);}
  .chip .role{font-size:9px;color:var(--sub-2);}

  .actions{display:flex;flex-direction:column;gap:7px;margin-top:2px;}
  .btn{
    padding:8px 11px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;
    border:1px solid var(--border-2);background:var(--card);color:var(--ink-2);
    box-shadow:var(--shadow-sm);transition:transform .1s ease,box-shadow .1s ease;
    text-align:center;
  }
  .btn:hover{box-shadow:var(--shadow-md);}
  .btn:active{transform:translateY(1px);}
  .btn-rec{background:var(--primary);border-color:var(--primary);color:#fff;}
  .btn-rec:hover{background:var(--primary-ink);}
  .btn-rec:disabled{background:var(--border-2);border-color:var(--border-2);color:var(--sub-2);cursor:not-allowed;box-shadow:none;}
  .lang-btn{margin-top:auto;}

  /* ---------------- Main ---------------- */
  .game-main{
    flex:1;height:100vh;display:flex;flex-direction:column;position:relative;
    padding:16px 22px;overflow:hidden;gap:12px;
  }
  .hud{
    align-self:stretch;
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;box-shadow:var(--shadow);font-size:13px;color:var(--sub);
    min-height:20px;line-height:1.45;flex-shrink:0;
  }
  .hud.good{border-color:var(--good);color:var(--good);background:var(--good-soft);}
  .hud.warn{border-color:var(--warn);color:var(--warn);background:var(--warn-soft);}

  /* assembly chain */
  .chain-wrap{
    flex:1;display:flex;flex-direction:column;min-height:0;gap:12px;
  }
  .chain{
    flex:1;width:100%;display:flex;align-items:stretch;justify-content:center;
    min-height:0;gap:0;
  }
  .node{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    position:relative;min-width:0;
  }
  .slot{
    width:100%;max-width:150px;flex:1;min-height:0;border-radius:13px;
    border:2px dashed var(--border-2);background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px;gap:6px;transition:border-color .15s,background .15s,box-shadow .15s;
    position:relative;
  }
  .slot.over{border-color:var(--robotics);background:var(--robotics-soft);border-style:solid;}
  .slot.filled{border-style:solid;border-color:var(--ink-2);box-shadow:var(--shadow-md);cursor:pointer;}
  .slot.filled.correct{border-color:var(--good);}
  .slot.filled.wrong{border-color:var(--primary);background:var(--primary-soft);}
  .slot.locked{cursor:default;}
  .slot-hint{font-size:11px;color:var(--sub-2);text-align:center;line-height:1.35;}
  .slot-stepno{
    position:absolute;top:6px;left:8px;font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;color:var(--sub-2);
  }
  .slot svg.dev{width:62px;height:62px;}
  .slot .placed-name{font-size:11.5px;font-weight:700;color:var(--ink);text-align:center;line-height:1.2;}
  .gel-dot{position:absolute;top:6px;right:8px;width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 0 2px var(--good-soft);display:none;}
  .gel-dot.show{display:block;}

  .arrow{
    width:30px;flex-shrink:0;align-self:center;display:flex;align-items:center;justify-content:center;color:var(--sub-2);
  }
  .arrow svg{width:22px;height:22px;}

  /* signal quality panel */
  .signal-panel{
    flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;
    box-shadow:var(--shadow);padding:11px 14px;display:flex;gap:16px;align-items:center;
  }
  .scope{flex:1;min-width:0;}
  .scope-lbl{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
  .scope svg{width:100%;height:64px;display:block;}
  .meter{width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
  .meter-row{display:flex;justify-content:space-between;align-items:baseline;}
  .meter-row .k{font-size:11px;color:var(--sub);}
  .meter-row .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--ink);}
  .meter-row .v.good{color:var(--good);}
  .meter-row .v.bad{color:var(--primary);}
  .meter-bar{height:9px;border-radius:5px;background:var(--paper-2);overflow:hidden;border:1px solid var(--border);}
  .meter-bar i{display:block;height:100%;width:0%;border-radius:5px;background:var(--primary);transition:width .5s ease,background .5s ease;}
  .meter-bar i.good{background:var(--good);}

  .award{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(250,249,245,.86);backdrop-filter:blur(2px);z-index:30;
  }
  .award.show{display:flex;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .award-card{
    background:var(--card);border:1px solid var(--primary-line);border-radius:16px;
    padding:28px 36px;box-shadow:var(--shadow-lg);text-align:center;max-width:430px;
  }
  .award-card .seal{
    width:70px;height:70px;margin:0 auto 14px;border-radius:50%;
    background:var(--primary-soft);border:2px solid var(--primary);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--primary-ink);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .award-card h2{margin:0 0 8px;font-size:21px;color:var(--ink);}
  .award-card p{margin:0 0 18px;font-size:13px;color:var(--sub);line-height:1.6;}

  /* drag ghost */
  .ghost{position:fixed;pointer-events:none;z-index:90;transform:translate(-50%,-50%);
    background:var(--card);border:1px solid var(--robotics);border-radius:9px;padding:6px 11px;
    box-shadow:var(--shadow-md);font-size:12px;font-weight:700;color:var(--robotics);}
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="brand">
      <span class="kicker" id="kicker">OpenBCI · 录制配置</span>
      <h1 id="title">脑波录制装配台</h1>
    </div>

    <div class="step-box">
      <div class="lbl" id="stepLbl">当前步骤</div>
      <div class="now" id="stepNow">把 <b>电极帽</b> 拖到第 1 个槽位</div>
    </div>

    <div class="tray-lbl" id="trayLbl">零件库（拖到右侧装配链）</div>
    <div class="tray" id="tray"></div>

    <div class="actions">
      <button class="btn btn-rec" id="recBtn" disabled>开始录制</button>
      <button class="btn" id="resetBtn">重置</button>
    </div>

    <button class="btn lang-btn" id="langBtn">EN / 中</button>
  </aside>

  <main class="game-main">
    <div class="hud" id="hud">按正确顺序把零件拖进装配链：戴帽 → 涂导电膏降阻抗 → 电极插 Cyton → Cyton 配对 dongle → dongle 插电脑 → 开 GUI 录制。</div>

    <div class="chain-wrap">
      <div class="chain" id="chain"></div>

      <div class="signal-panel">
        <div class="scope">
          <div class="scope-lbl" id="scopeLbl">通道信号 · CH1 (O1, alpha)</div>
          <svg id="scope" viewBox="0 0 600 64" preserveAspectRatio="none" aria-label="signal scope">
            <line x1="0" y1="32" x2="600" y2="32" stroke="var(--hairline)" stroke-width="1"></line>
            <path id="wave" d="M0 32 L600 32" fill="none" stroke="var(--sub-2)" stroke-width="2"></path>
          </svg>
        </div>
        <div class="meter">
          <div class="meter-row"><span class="k" id="impLbl">电极阻抗</span><span class="v bad mono" id="impVal">—</span></div>
          <div class="meter-bar"><i id="impBar"></i></div>
          <div class="meter-row" style="margin-top:2px;"><span class="k" id="qLbl">信号质量</span><span class="v bad mono" id="qVal">—</span></div>
          <div class="meter-bar"><i id="qBar"></i></div>
        </div>
      </div>
    </div>

    <div class="award" id="award">
      <div class="award-card">
        <div class="seal mono">REC OK</div>
        <h2 id="awTitle">录到了真脑波</h2>
        <p id="awBody">装配链全对，导电膏把阻抗压到 5 kΩ 以下，GUI 录到了一段干净的 alpha 波。这就是一套真实可用的 OpenBCI 录制系统。</p>
        <button class="btn btn-rec" id="awBtn">再玩一次</button>
      </div>
    </div>
  </main>

<script>
(function(){
  "use strict";
  var LANG='cn';

  // 装配链 6 步, 每步期望一个零件 id
  var STAGES=[
    {pos:0, want:'cap',     stepKey:'s1'},
    {pos:1, want:'gel',     stepKey:'s2'},
    {pos:2, want:'cyton',   stepKey:'s3'},
    {pos:3, want:'dongle',  stepKey:'s4'},
    {pos:4, want:'computer',stepKey:'s5'},
    {pos:5, want:'gui',     stepKey:'s6'}
  ];

  // 零件库 (含 1 个干扰项: 参考/地电极合并为 ref —— 已集成在帽里, 单拖会被判错位)
  var PARTS=[
    {id:'cap'},
    {id:'gel'},
    {id:'ref'},
    {id:'cyton'},
    {id:'dongle'},
    {id:'computer'},
    {id:'gui'}
  ];

  // ---- SVG 设备图标 (抽象描边, 无 emoji) ----
  function devSVG(id,color){
    var c=color||'var(--ink-2)';
    var inner;
    switch(id){
      case 'cap': inner='<circle cx="31" cy="34" r="20" fill="none" stroke="'+c+'" stroke-width="3"/><path d="M11 34 Q31 8 51 34" fill="none" stroke="'+c+'" stroke-width="3"/><circle cx="22" cy="30" r="2.6" fill="'+c+'"/><circle cx="31" cy="26" r="2.6" fill="'+c+'"/><circle cx="40" cy="30" r="2.6" fill="'+c+'"/><circle cx="26" cy="40" r="2.6" fill="'+c+'"/><circle cx="36" cy="40" r="2.6" fill="'+c+'"/>'; break;
      case 'gel': inner='<path d="M24 14 h14 v8 l4 6 v22 a4 4 0 0 1 -4 4 h-14 a4 4 0 0 1 -4 -4 v-22 l4 -6 z" fill="none" stroke="'+c+'" stroke-width="3"/><path d="M27 38 h8" stroke="'+c+'" stroke-width="3"/><path d="M31 34 v8" stroke="'+c+'" stroke-width="3"/>'; break;
      case 'ref': inner='<circle cx="31" cy="22" r="9" fill="none" stroke="'+c+'" stroke-width="3"/><path d="M31 31 v18 M22 49 h18" stroke="'+c+'" stroke-width="3" fill="none"/>'; break;
      case 'cyton': inner='<rect x="14" y="18" width="34" height="28" rx="3" fill="none" stroke="'+c+'" stroke-width="3"/><circle cx="22" cy="40" r="2.4" fill="'+c+'"/><circle cx="29" cy="40" r="2.4" fill="'+c+'"/><circle cx="36" cy="40" r="2.4" fill="'+c+'"/><circle cx="43" cy="40" r="2.4" fill="'+c+'"/><rect x="24" y="24" width="14" height="8" rx="1.5" fill="none" stroke="'+c+'" stroke-width="2.4"/>'; break;
      case 'dongle': inner='<rect x="16" y="26" width="24" height="14" rx="3" fill="none" stroke="'+c+'" stroke-width="3"/><rect x="40" y="30" width="8" height="6" fill="none" stroke="'+c+'" stroke-width="3"/><path d="M22 26 v-6 M30 26 v-6" stroke="'+c+'" stroke-width="2.6"/>'; break;
      case 'computer': inner='<rect x="13" y="16" width="36" height="24" rx="2.5" fill="none" stroke="'+c+'" stroke-width="3"/><path d="M22 48 h18 M27 40 v8 M35 40 v8" stroke="'+c+'" stroke-width="2.8" fill="none"/>'; break;
      case 'gui': inner='<rect x="13" y="16" width="36" height="28" rx="2.5" fill="none" stroke="'+c+'" stroke-width="3"/><line x1="13" y1="24" x2="49" y2="24" stroke="'+c+'" stroke-width="2.4"/><path d="M18 36 q5 -10 9 0 t9 0 t9 0" fill="none" stroke="'+c+'" stroke-width="2.4"/>'; break;
      default: inner='';
    }
    return '<svg class="dev" viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';
  }

  var I18N={
    kicker:{cn:'OpenBCI · 录制配置',en:'OpenBCI · Recording Setup'},
    title:{cn:'脑波录制装配台',en:'Brainwave Rig Builder'},
    stepLbl:{cn:'当前步骤',en:'Current step'},
    trayLbl:{cn:'零件库（拖到右侧装配链）',en:'Parts bin (drag onto chain)'},
    recBtn:{cn:'开始录制',en:'Start recording'},
    resetBtn:{cn:'重置',en:'Reset'},
    scopeLbl:{cn:'通道信号 · CH1 (O1, alpha)',en:'Channel · CH1 (O1, alpha)'},
    impLbl:{cn:'电极阻抗',en:'Impedance'},
    qLbl:{cn:'信号质量',en:'Signal quality'},
    hudStart:{cn:'按正确顺序把零件拖进装配链：戴帽 → 涂导电膏降阻抗 → 电极插 Cyton → Cyton 配对 dongle → dongle 插电脑 → 开 GUI 录制。',
              en:'Drag parts into the chain in order: cap → gel (lowers impedance) → electrodes into Cyton → Cyton pairs dongle → dongle into PC → open GUI to record.'},
    hudNeed:{cn:'第 {n} 槽需要：{name}。拖错会留在原位。',en:'Slot {n} needs: {name}. A wrong part stays put.'},
    hudReady:{cn:'六步全部就位，点「开始录制」检验整条链路。',en:'All six steps placed — hit "Start recording" to test the chain.'},
    hudNoGel:{cn:'警告：跳过了导电膏！头皮-电极阻抗 230 kΩ，信号全是噪声，录不到脑波。',
              en:'Warning: gel skipped! Scalp-electrode impedance 230 kΩ — pure noise, no brainwaves.'},
    hudBadOrder:{cn:'警告：链路顺序不对，dongle 没配上 Cyton，GUI 收不到数据。',
                 en:'Warning: chain order wrong — dongle never paired Cyton, GUI gets no data.'},
    hudRecording:{cn:'录制中… 阻抗 4.6 kΩ，CH1 收到清晰 alpha 波。',en:'Recording… impedance 4.6 kΩ, clean alpha on CH1.'},
    // parts
    p_cap:{cn:'电极帽',en:'Electrode cap'}, r_cap:{cn:'8 通道 · 戴头上',en:'8-ch · on head'},
    p_gel:{cn:'导电膏',en:'Conductive gel'}, r_gel:{cn:'降阻抗 · 注电极孔',en:'lowers impedance'},
    p_ref:{cn:'参考/地电极',en:'Ref / Ground'}, r_ref:{cn:'已集成在帽里',en:'built into cap'},
    p_cyton:{cn:'Cyton 板',en:'Cyton board'}, r_cyton:{cn:'8 通道放大采样',en:'8-ch amp + ADC'},
    p_dongle:{cn:'USB dongle',en:'USB dongle'}, r_dongle:{cn:'无线接 Cyton',en:'RF link'},
    p_computer:{cn:'电脑',en:'Computer'}, r_computer:{cn:'插 dongle',en:'hosts dongle'},
    p_gui:{cn:'GUI 软件',en:'GUI software'}, r_gui:{cn:'查看/录制',en:'view & record'},
    // slot hints
    h_cap:{cn:'戴上电极帽',en:'Put on cap'},
    h_gel:{cn:'注入导电膏',en:'Inject gel'},
    h_cyton:{cn:'电极插 Cyton',en:'Plug into Cyton'},
    h_dongle:{cn:'Cyton 配对 dongle',en:'Pair dongle'},
    h_computer:{cn:'dongle 插电脑',en:'Dongle to PC'},
    h_gui:{cn:'打开 GUI',en:'Open GUI'},
    awTitle:{cn:'录到了真脑波',en:'Real brainwaves recorded'},
    awBody:{cn:'装配链全对，导电膏把阻抗压到 5 kΩ 以下，GUI 录到了一段干净的 alpha 波。这就是一套真实可用的 OpenBCI 录制系统。',
            en:'The chain is correct, gel pushed impedance below 5 kΩ, and the GUI captured a clean alpha rhythm. That is a real, working OpenBCI recording rig.'},
    awBtn:{cn:'再玩一次',en:'Play again'}
  };
  function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}
  function partName(id){return t('p_'+id);}
  function partRole(id){return t('r_'+id);}

  // ---- state ----
  // filled[pos] = part id (放对则等于 STAGES[pos].want)
  var filled={};
  var recording=false;
  var won=false;
  var waveTimer=null;

  var chainEl=document.getElementById('chain');

  // ---- render assembly chain ----
  function nextEmptyStage(){
    for(var i=0;i<STAGES.length;i++){if(!filled[i])return i;}
    return -1;
  }

  function renderChain(){
    chainEl.innerHTML='';
    STAGES.forEach(function(st,i){
      var node=document.createElement('div');node.className='node';

      var slot=document.createElement('div');
      slot.className='slot';
      slot.setAttribute('data-pos',i);

      var stepno=document.createElement('div');stepno.className='slot-stepno mono';stepno.textContent=(i+1);
      slot.appendChild(stepno);

      var pid=filled[i];
      if(pid){
        slot.classList.add('filled');
        var ok=(pid===st.want);
        if(recording||won){slot.classList.add(ok?'correct':'wrong');}
        var icCol=(recording||won)?(ok?'var(--good)':'var(--primary)'):'var(--robotics)';
        slot.insertAdjacentHTML('beforeend',devSVG(pid,icCol));
        var nm=document.createElement('div');nm.className='placed-name';nm.textContent=partName(pid);
        slot.appendChild(nm);
        // gel marker: 第2槽放对 gel -> 显示降阻抗指示点
        if(st.want==='gel'&&pid==='gel'){
          var dot=document.createElement('div');dot.className='gel-dot show';slot.appendChild(dot);
        }
        if(!recording&&!won){
          slot.classList.remove('locked');
          slot.style.cursor='pointer';
          slot.addEventListener('click',function(){
            if(recording||won)return;
            delete filled[i];
            renderChain();renderTray();updateStep();drawWave(false);
          });
        }else{slot.classList.add('locked');}
      }else{
        var hint=document.createElement('div');hint.className='slot-hint';hint.textContent=t('h_'+st.want);
        slot.appendChild(hint);
      }
      node.appendChild(slot);
      chainEl.appendChild(node);

      // arrow between nodes
      if(i<STAGES.length-1){
        var arr=document.createElement('div');arr.className='arrow';
        arr.innerHTML='<svg viewBox="0 0 22 22"><path d="M3 11 H17 M12 6 L18 11 L12 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        chainEl.appendChild(arr);
      }
    });
    bindDropTargets();
  }

  // ---- render tray ----
  function renderTray(){
    var tray=document.getElementById('tray');tray.innerHTML='';
    var used={};
    Object.keys(filled).forEach(function(p){used[filled[p]]=true;});
    PARTS.forEach(function(part){
      var id=part.id;
      var chip=document.createElement('div');
      chip.className='chip'+(used[id]?' used':'');
      chip.setAttribute('data-pid',id);
      if(!used[id]&&!recording&&!won)chip.setAttribute('draggable','true');

      var icWrap=document.createElement('div');icWrap.className='ic';
      icWrap.innerHTML=devSVG(id,'var(--robotics)').replace('class="dev"','class="dev" width="22" height="22"');
      var txt=document.createElement('div');txt.className='txt';
      var nm=document.createElement('div');nm.className='name';nm.textContent=partName(id);
      var role=document.createElement('div');role.className='role';role.textContent=partRole(id);
      txt.appendChild(nm);txt.appendChild(role);
      chip.appendChild(icWrap);chip.appendChild(txt);

      if(!used[id]&&!recording&&!won){
        chip.addEventListener('dragstart',function(e){
          e.dataTransfer.setData('text/plain',id);
          e.dataTransfer.effectAllowed='move';
          chip.classList.add('dragging');
        });
        chip.addEventListener('dragend',function(){chip.classList.remove('dragging');});
        addTouchDrag(chip,id);
      }
      tray.appendChild(chip);
    });
  }

  // ---- place a part into a stage ----
  function placePart(pid,pos){
    if(recording||won)return;
    if(filled[pos])return; // 槽已占
    // 若该零件已放别处, 先移除
    Object.keys(filled).forEach(function(p){if(filled[p]===pid)delete filled[p];});
    filled[pos]=pid;
    renderChain();renderTray();updateStep();
    updateRecBtn();
  }

  // ---- SVG/DOM drop targets ----
  function bindDropTargets(){
    var slots=chainEl.querySelectorAll('.slot');
    slots.forEach(function(slot){
      if(slot.classList.contains('filled'))return;
      var pos=parseInt(slot.getAttribute('data-pos'),10);
      slot.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';slot.classList.add('over');});
      slot.addEventListener('dragleave',function(){slot.classList.remove('over');});
      slot.addEventListener('drop',function(e){
        e.preventDefault();slot.classList.remove('over');
        var pid=e.dataTransfer.getData('text/plain');
        if(pid)placePart(pid,pos);
      });
    });
  }

  // ---- touch drag ----
  var ghost=null;
  function addTouchDrag(chip,pid){
    chip.addEventListener('touchstart',function(e){
      if(recording||won)return;
      e.preventDefault();
      ghost=document.createElement('div');ghost.className='ghost';ghost.textContent=partName(pid);
      document.body.appendChild(ghost);moveGhost(e.touches[0]);
    },{passive:false});
    chip.addEventListener('touchmove',function(e){
      e.preventDefault();if(ghost)moveGhost(e.touches[0]);
    },{passive:false});
    chip.addEventListener('touchend',function(e){
      if(!ghost)return;
      var tch=e.changedTouches[0];
      ghost.style.display='none';
      var below=document.elementFromPoint(tch.clientX,tch.clientY);
      var slot=below&&below.closest?below.closest('.slot'):null;
      if(slot&&!slot.classList.contains('filled')){
        placePart(pid,parseInt(slot.getAttribute('data-pos'),10));
      }
      ghost.remove();ghost=null;
    });
  }
  function moveGhost(tch){ghost.style.left=tch.clientX+'px';ghost.style.top=tch.clientY+'px';}

  // ---- step indicator + HUD ----
  function setHud(txt,cls){var h=document.getElementById('hud');h.textContent=txt;h.className='hud'+(cls?(' '+cls):'');}
  function setStep(txt){document.getElementById('stepNow').innerHTML=txt;}

  function updateStep(){
    if(recording||won)return;
    var ne=nextEmptyStage();
    if(ne<0){
      setStep('<b>'+(LANG==='cn'?'全部就位':'all set')+'</b> — '+(LANG==='cn'?'点开始录制':'start recording'));
      setHud(t('hudReady'),'');
    }else{
      var want=STAGES[ne].want;
      setStep((LANG==='cn'?'第 ':'Slot ')+(ne+1)+(LANG==='cn'?' 槽需要 ':' needs ')+'<b>'+partName(want)+'</b>');
      setHud(t('hudNeed').replace('{n}',(ne+1)).replace('{name}',partName(want)),'');
    }
  }

  function updateRecBtn(){
    var ne=nextEmptyStage();
    document.getElementById('recBtn').disabled=(ne>=0)||recording||won;
  }

  // ---- signal scope ----
  function buildPath(amp,noise,phase){
    // amp: alpha 幅度 (0..1), noise: 噪声幅度 (0..1)
    var pts=[];
    for(var x=0;x<=600;x+=6){
      var alpha=Math.sin((x/600)*Math.PI*2*6 + phase)*amp*22; // ~10Hz 样式
      var nz=(Math.random()-0.5)*noise*48;
      var y=32 - alpha - nz;
      pts.push((x===0?'M':'L')+x+' '+y.toFixed(1));
    }
    return pts.join(' ');
  }
  function drawWave(active){
    var wave=document.getElementById('wave');
    if(!active){
      if(waveTimer){clearInterval(waveTimer);waveTimer=null;}
      wave.setAttribute('d','M0 32 L600 32');
      wave.setAttribute('stroke','var(--sub-2)');
      setMeter(null);
      return;
    }
  }

  // clean alpha animation
  function startCleanWave(){
    var wave=document.getElementById('wave');
    wave.setAttribute('stroke','var(--good)');
    var ph=0;
    if(waveTimer)clearInterval(waveTimer);
    waveTimer=setInterval(function(){
      ph+=0.5;
      wave.setAttribute('d',buildPath(1.0,0.06,ph));
    },120);
  }
  // noisy / flat-noise animation (failure)
  function startNoiseWave(){
    var wave=document.getElementById('wave');
    wave.setAttribute('stroke','var(--primary)');
    var ph=0;
    if(waveTimer)clearInterval(waveTimer);
    waveTimer=setInterval(function(){
      ph+=0.5;
      wave.setAttribute('d',buildPath(0.12,1.0,ph));
    },120);
  }

  function setMeter(state){
    var impVal=document.getElementById('impVal'),qVal=document.getElementById('qVal');
    var impBar=document.getElementById('impBar'),qBar=document.getElementById('qBar');
    if(state==='good'){
      impVal.textContent='4.6 kΩ';impVal.className='v good mono';
      qVal.textContent='98%';qVal.className='v good mono';
      impBar.style.width='12%';impBar.className='good';
      qBar.style.width='98%';qBar.className='good';
    }else if(state==='bad'){
      impVal.textContent='230 kΩ';impVal.className='v bad mono';
      qVal.textContent='6%';qVal.className='v bad mono';
      impBar.style.width='96%';impBar.className='';
      qBar.style.width='6%';qBar.className='';
    }else{
      impVal.textContent='—';impVal.className='v bad mono';
      qVal.textContent='—';qVal.className='v bad mono';
      impBar.style.width='0%';impBar.className='';
      qBar.style.width='0%';qBar.className='';
    }
  }

  // ---- evaluate the chain ----
  function record(){
    var ne=nextEmptyStage();
    if(ne>=0||recording||won)return;

    // 检查整条链
    var orderOk=true, gelOk=true;
    STAGES.forEach(function(st,i){
      if(filled[i]!==st.want)orderOk=false;
    });
    // 导电膏特判: 第2槽必须是 gel
    if(filled[1]!=='gel')gelOk=false;

    recording=true;
    updateRecBtn();
    renderChain();renderTray();

    if(orderOk&&gelOk){
      setHud(t('hudRecording'),'good');
      setMeter('good');
      startCleanWave();
      won=true;
      setTimeout(function(){
        document.getElementById('award').classList.add('show');
      },1100);
    }else{
      // 失败: 区分缺导电膏 vs 顺序错
      setMeter('bad');
      startNoiseWave();
      if(!gelOk){setHud(t('hudNoGel'),'warn');}
      else{setHud(t('hudBadOrder'),'warn');}
      // 失败可重试: 1.6s 后解锁 (保留布局, 标红错位)
      setTimeout(function(){
        recording=false;
        drawWave(false);
        renderChain();renderTray();updateRecBtn();
      },1900);
    }
  }

  // ---- reset ----
  function reset(){
    filled={};recording=false;won=false;
    if(waveTimer){clearInterval(waveTimer);waveTimer=null;}
    document.getElementById('award').classList.remove('show');
    drawWave(false);
    renderChain();renderTray();updateRecBtn();
    setStep((LANG==='cn'?'把 ':'Drag ')+'<b>'+partName('cap')+'</b>'+(LANG==='cn'?' 拖到第 1 个槽位':' to slot 1'));
    setHud(t('hudStart'),'');
  }

  // ---- i18n refresh ----
  function refreshI18N(){
    document.getElementById('kicker').textContent=t('kicker');
    document.getElementById('title').textContent=t('title');
    document.getElementById('stepLbl').textContent=t('stepLbl');
    document.getElementById('trayLbl').textContent=t('trayLbl');
    document.getElementById('recBtn').textContent=t('recBtn');
    document.getElementById('resetBtn').textContent=t('resetBtn');
    document.getElementById('scopeLbl').textContent=t('scopeLbl');
    document.getElementById('impLbl').textContent=t('impLbl');
    document.getElementById('qLbl').textContent=t('qLbl');
    document.getElementById('awTitle').textContent=t('awTitle');
    document.getElementById('awBody').textContent=t('awBody');
    document.getElementById('awBtn').textContent=t('awBtn');
    renderChain();renderTray();
    if(won){setHud(t('hudRecording'),'good');}
    else if(recording){/* 进行中, 不覆盖 */}
    else{updateStep();}
  }

  // ---- wire up ----
  document.getElementById('recBtn').addEventListener('click',record);
  document.getElementById('resetBtn').addEventListener('click',reset);
  document.getElementById('awBtn').addEventListener('click',reset);
  document.getElementById('langBtn').addEventListener('click',function(){
    LANG=(LANG==='cn')?'en':'cn';
    this.textContent=(LANG==='cn')?'EN / 中':'中 / EN';
    refreshI18N();
  });

  // init
  renderChain();renderTray();
  setMeter(null);
  reset();
})();
</script>
</body>
</html>
