<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录制流程建造台 / EEG Recording Setup — M10 Game</title>
<style>
  /* ============== Layer 1 — Deep-space canvas (shared across 26 subjects) ============== */
  :root {
    --bg-0: oklch(0.14 0.035 275);
    --bg-1: oklch(0.18 0.04 275);
    --bg-2: oklch(0.22 0.045 275);
    --bg-3: oklch(0.28 0.05 275);
    --line: oklch(0.40 0.06 275 / 0.35);
    --line-strong: oklch(0.55 0.10 275 / 0.55);

    --fg:      oklch(0.96 0.01 275);
    --fg-dim:  oklch(0.78 0.02 275);
    --fg-mute: oklch(0.58 0.03 275);
    --gold:    oklch(0.85 0.14 85);

    /* Layer 2 — electrical engineering accent (indigo) */
    --elec: oklch(0.72 0.17 275);

    /* Layer 3 — elec 5-color palette (themes.js id=elec, mascot Volt) */
    --CURRENT: oklch(0.72 0.17 275);   /* bright current */
    --TRACE:   oklch(0.52 0.16 275);   /* deep trace */
    --BOARD:   oklch(0.35 0.10 275);   /* board */
    --PULSE:   oklch(0.92 0.08 275);   /* pale pulse */
    --RELAY:   oklch(0.85 0.14 85);    /* gold relay (warning) */

    --bad: oklch(0.65 0.20 25);        /* fail red */
    --ok:  oklch(0.78 0.16 150);       /* success green */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: var(--bg-0);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: 0.02em;
  }

  /* ============== Layout — sidebar + main ============== */
  .stage-wrap {
    display: flex;
    flex-direction: row;
    width: 100%;
    height: 100vh;
  }

  .game-sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }

  .game-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    background: var(--bg-0);
    padding: 16px 20px;
    gap: 12px;
  }

  /* ============== Sidebar ============== */
  .sb-brand {
    font-size: 13px;
    font-weight: 700;
    color: var(--elec);
    line-height: 1.35;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    letter-spacing: 0.04em;
  }
  .sb-brand .sub {
    display: block;
    font-size: 10px;
    color: var(--fg-dim);
    margin-top: 4px;
    letter-spacing: 0.14em;
    font-weight: 400;
  }

  .sb-mascot {
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 8px;
    box-shadow: 3px 3px 0 var(--bg-0);
  }
  .sb-mascot svg { width: 100%; height: 64px; display: block; }
  .sb-mascot .mascot-name {
    font-size: 9px;
    color: var(--elec);
    text-align: center;
    margin-top: 5px;
    letter-spacing: 0.2em;
  }

  .sb-section { display: flex; flex-direction: column; gap: 6px; }
  .sb-section h4 {
    font-size: 9px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }
  .sb-section li {
    font-size: 10px;
    color: var(--fg-dim);
    line-height: 1.5;
  }
  .sb-section ol { padding-left: 14px; }

  /* step-card tray in sidebar */
  .tray {
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-height: 40px;
    padding: 6px;
    background: var(--bg-2);
    border: 1px dashed var(--line);
  }
  .tray.empty::after {
    content: attr(data-empty);
    font-size: 9px;
    color: var(--fg-mute);
    text-align: center;
    padding: 8px 0;
    letter-spacing: 0.1em;
  }

  .step-card {
    background: var(--bg-3);
    border: 1px solid var(--line-strong);
    border-left: 3px solid var(--TRACE);
    padding: 7px 8px;
    font-size: 10px;
    color: var(--fg);
    cursor: grab;
    box-shadow: 2px 2px 0 var(--bg-0);
    line-height: 1.35;
    user-select: none;
  }
  .step-card:hover { border-left-color: var(--elec); }
  .step-card:active { cursor: grabbing; }
  .step-card.dragging { opacity: 0.4; }
  .step-card .sc-tag {
    display: block;
    font-size: 8px;
    color: var(--elec);
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }

  .lang-btn {
    margin-top: auto;
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    color: var(--fg-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 8px;
    cursor: pointer;
    letter-spacing: 0.06em;
    box-shadow: 2px 2px 0 var(--bg-0);
  }
  .lang-btn:hover { background: var(--elec); color: var(--bg-0); }
  .lang-btn:active { box-shadow: 1px 1px 0 var(--bg-0); transform: translate(2px, 2px); }

  /* ============== Main — header ============== */
  .main-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    flex-shrink: 0;
  }
  .main-head .title { font-size: 15px; font-weight: 700; color: var(--PULSE); letter-spacing: 0.04em; }
  .main-head .q { font-size: 10px; color: var(--fg-dim); }

  /* ============== Main — pipeline slots ============== */
  .slot-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .slot {
    flex: 1;
    min-width: 116px;
    min-height: 62px;
    background: var(--bg-1);
    border: 1px dashed var(--line);
    border-radius: 4px;
    padding: 5px 6px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    position: relative;
  }
  .slot .slot-idx {
    position: absolute;
    top: 3px;
    right: 6px;
    font-size: 16px;
    font-weight: 700;
    color: var(--BOARD);
  }
  .slot.over { border-color: var(--elec); background: var(--bg-2); }
  .slot.filled { border-style: solid; border-color: var(--TRACE); }
  .slot .placed {
    font-size: 10px;
    color: var(--fg);
    cursor: grab;
    line-height: 1.3;
  }
  .slot .placed .sc-tag {
    display: block;
    font-size: 8px;
    color: var(--elec);
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .slot .ph {
    font-size: 9px;
    color: var(--fg-mute);
    letter-spacing: 0.08em;
  }

  /* ============== Main — signal panel ============== */
  .signal-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    min-height: 120px;
  }
  .sp-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    border-bottom: 1px solid var(--line);
    font-size: 10px;
    color: var(--fg-dim);
  }
  .sp-head .imp { color: var(--gold); }
  .scope-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    min-height: 80px;
  }
  #scope { display: block; width: 100%; height: 100%; }

  .verdict {
    padding: 6px 10px;
    font-size: 10px;
    line-height: 1.45;
    border-top: 1px solid var(--line);
    min-height: 30px;
    color: var(--fg-dim);
  }
  .verdict.fail { color: var(--bad); border-top-color: var(--bad); }
  .verdict.win { color: var(--ok); border-top-color: var(--ok); }

  /* ============== Main — controls ============== */
  .ctrl-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .btn {
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    color: var(--fg);
    font-family: inherit;
    font-size: 12px;
    padding: 9px 16px;
    cursor: pointer;
    letter-spacing: 0.04em;
    box-shadow: 2px 2px 0 var(--bg-0);
  }
  .btn:hover { border-color: var(--elec); }
  .btn:active { box-shadow: 1px 1px 0 var(--bg-0); transform: translate(1px, 1px); }
  .btn.primary { background: var(--elec); color: var(--bg-0); font-weight: 700; border-color: var(--elec); }
  .btn.primary:hover { background: var(--PULSE); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .badge.shown { opacity: 1; }
</style>
</head>
<body>
<div class="stage-wrap">
  <!-- ============== SIDEBAR ============== -->
  <aside class="game-sidebar">
    <div class="sb-brand" data-i18n-zh="录制流程建造台" data-i18n-en="RECORDING SETUP RIG">录制流程建造台
      <span class="sub">M10 · OpenBCI Cyton</span>
    </div>

    <div class="sb-mascot">
      <svg viewBox="0 0 100 64" aria-hidden="true">
        <polygon points="46,6 38,34 50,32 40,58 64,26 50,28 58,6"
                 fill="var(--elec)" stroke="var(--PULSE)" stroke-width="1.4"/>
        <circle cx="20" cy="20" r="2.4" fill="var(--RELAY)"/>
        <circle cx="80" cy="44" r="2.4" fill="var(--RELAY)"/>
        <line x1="20" y1="20" x2="40" y2="20" stroke="var(--TRACE)" stroke-width="1"/>
        <line x1="62" y1="44" x2="80" y2="44" stroke="var(--TRACE)" stroke-width="1"/>
      </svg>
      <div class="mascot-name">VOLT</div>
    </div>

    <div class="sb-section">
      <h4 data-i18n-zh="步骤卡 · 待用" data-i18n-en="STEP CARDS · TRAY">步骤卡 · 待用</h4>
      <div id="tray" class="tray" data-empty="全部已放入流程槽"></div>
    </div>

    <div class="sb-section">
      <h4 data-i18n-zh="操作说明" data-i18n-en="HOW TO PLAY">操作说明</h4>
      <ol>
        <li data-i18n-zh="把步骤卡拖到右边流程槽" data-i18n-en="Drag step cards into the pipeline slots">把步骤卡拖到右边流程槽</li>
        <li data-i18n-zh="按正确顺序排满 6 槽" data-i18n-en="Order all 6 slots correctly">按正确顺序排满 6 槽</li>
        <li data-i18n-zh="点开始录制看信号质量" data-i18n-en="Hit RECORD, check signal">点开始录制看信号质量</li>
        <li data-i18n-zh="跳过导电胶=阻抗高=噪声" data-i18n-en="Skip gel = high impedance = noise">跳过导电胶=阻抗高=噪声</li>
      </ol>
    </div>

    <button id="langBtn" class="lang-btn">EN / 中文</button>
  </aside>

  <!-- ============== MAIN ============== -->
  <main class="game-main">
    <div class="main-head">
      <div class="title" data-i18n-zh="用 Cyton 录第一段真脑波" data-i18n-en="Record your first real EEG with Cyton">用 Cyton 录第一段真脑波</div>
      <div class="q" data-i18n-zh="顺序对了，信号才干净" data-i18n-en="Right order = clean signal">顺序对了，信号才干净</div>
    </div>

    <div id="slotRow" class="slot-row"></div>

    <div class="signal-panel">
      <div class="sp-head">
        <span data-i18n-zh="信号示波器 · C3 / C4" data-i18n-en="Signal scope · C3 / C4">信号示波器 · C3 / C4</span>
        <span class="imp" id="impLabel" data-i18n-zh="阻抗：—" data-i18n-en="Impedance: —">阻抗：—</span>
      </div>
      <div class="scope-wrap">
        <canvas id="scope"></canvas>
      </div>
      <div id="verdict" class="verdict" data-i18n-zh="排好顺序，按下开始录制。" data-i18n-en="Order the steps, then hit RECORD.">排好顺序，按下开始录制。</div>
    </div>

    <div class="ctrl-row">
      <button id="recordBtn" class="btn primary" data-i18n-zh="开始录制" data-i18n-en="RECORD">开始录制</button>
      <button id="resetBtn" class="btn" data-i18n-zh="重置" data-i18n-en="RESET">重置</button>
      <span id="badge" class="badge" data-i18n-zh="已解锁：录制工程师" data-i18n-en="UNLOCKED: Recording Engineer">已解锁：录制工程师</span>
    </div>
  </main>
</div>

<script>
(function () {
  'use strict';

  // ---- i18n ----
  let lang = 'zh';
  function applyLang() {
    document.querySelectorAll('[data-i18n-zh]').forEach(function (el) {
      const txt = lang === 'zh' ? el.getAttribute('data-i18n-zh') : el.getAttribute('data-i18n-en');
      if (el.children.length === 0) {
        el.textContent = txt;
      } else {
        let replaced = false;
        for (const n of el.childNodes) {
          if (n.nodeType === 3 && n.textContent.trim()) { n.textContent = txt; replaced = true; break; }
        }
        if (!replaced) {
          el.insertBefore(document.createTextNode(txt), el.firstChild);
        }
      }
    });
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  }
  document.getElementById('langBtn').addEventListener('click', function () {
    lang = lang === 'zh' ? 'en' : 'zh';
    applyLang();
    renderTray();
    renderSlots();
  });

  // ---- step definitions (correct order index = position in array) ----
  const STEPS = [
    { id: 'electrode', tag: 'C3 / C4', zh: '贴 C3 / C4 电极', en: 'Place C3 / C4 electrodes' },
    { id: 'gel',       tag: 'GEL',     zh: '上导电胶降阻抗', en: 'Apply conductive gel' },
    { id: 'bluetooth', tag: 'CYTON BT', zh: '连 Cyton 蓝牙', en: 'Pair Cyton over Bluetooth' },
    { id: 'srate',     tag: '250 Hz',  zh: '设采样率 250 Hz', en: 'Set sample rate 250 Hz' },
    { id: 'acquire',   tag: 'STREAM',  zh: '开始采集脑波', en: 'Start acquiring EEG' },
    { id: 'save',      tag: '.BDF',    zh: '存盘 .bdf', en: 'Save to .bdf file' }
  ];
  const N = STEPS.length;
  const CANON = ['electrode', 'gel', 'bluetooth', 'srate', 'acquire', 'save'];

  function stepLabel(s) { return lang === 'zh' ? s.zh : s.en; }
  function findStep(id) { return STEPS.find(function (s) { return s.id === id; }); }

  // state
  let trayIds = STEPS.map(function (s) { return s.id; });
  let slots = new Array(N).fill(null);
  let dragId = null;
  let dragFromSlot = -1;
  let won = false;

  const trayEl = document.getElementById('tray');
  const slotRowEl = document.getElementById('slotRow');

  // ---- render tray (sidebar) ----
  function renderTray() {
    trayEl.innerHTML = '';
    trayEl.classList.toggle('empty', trayIds.length === 0);
    trayEl.setAttribute('data-empty', lang === 'zh' ? '全部已放入流程槽' : 'All cards placed');
    trayIds.forEach(function (id) {
      const s = findStep(id);
      const card = document.createElement('div');
      card.className = 'step-card';
      card.draggable = true;
      card.dataset.id = id;
      card.innerHTML = '<span class="sc-tag"></span>';
      card.querySelector('.sc-tag').textContent = s.tag;
      card.appendChild(document.createTextNode(stepLabel(s)));
      attachDragSource(card, id, -1);
      trayEl.appendChild(card);
    });
  }

  // ---- render slots (main pipeline) ----
  function renderSlots() {
    slotRowEl.innerHTML = '';
    for (let i = 0; i < N; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.slot = String(i);
      const idx = document.createElement('span');
      idx.className = 'slot-idx';
      idx.textContent = String(i + 1);
      slot.appendChild(idx);

      const filledId = slots[i];
      if (filledId) {
        slot.classList.add('filled');
        const s = findStep(filledId);
        const placed = document.createElement('div');
        placed.className = 'placed';
        placed.draggable = true;
        placed.dataset.id = filledId;
        const tag = document.createElement('span');
        tag.className = 'sc-tag';
        tag.textContent = s.tag;
        placed.appendChild(tag);
        placed.appendChild(document.createTextNode(stepLabel(s)));
        attachDragSource(placed, filledId, i);
        slot.appendChild(placed);
      } else {
        const ph = document.createElement('div');
        ph.className = 'ph';
        ph.textContent = lang === 'zh' ? '拖步骤到此' : 'drop step';
        slot.appendChild(ph);
      }

      attachDropTarget(slot, i);
      slotRowEl.appendChild(slot);
    }
  }

  function attachDragSource(el, id, fromSlot) {
    el.addEventListener('dragstart', function (e) {
      dragId = id;
      dragFromSlot = fromSlot;
      el.classList.add('dragging');
      if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); }
    });
    el.addEventListener('dragend', function () { el.classList.remove('dragging'); });
  }

  function attachDropTarget(slot, slotIdx) {
    slot.addEventListener('dragover', function (e) {
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      slot.classList.add('over');
    });
    slot.addEventListener('dragleave', function () { slot.classList.remove('over'); });
    slot.addEventListener('drop', function (e) {
      e.preventDefault();
      slot.classList.remove('over');
      placeIntoSlot(slotIdx);
    });
  }

  // shared place logic (also reused by headless harness)
  function placeIntoSlot(slotIdx) {
    if (!dragId) return;
    const incoming = dragId;
    const occupant = slots[slotIdx];

    if (dragFromSlot >= 0) {
      slots[dragFromSlot] = null;
    } else {
      trayIds = trayIds.filter(function (x) { return x !== incoming; });
    }

    if (occupant) {
      if (dragFromSlot >= 0) {
        slots[dragFromSlot] = occupant; // swap between two slots
      } else {
        trayIds.push(occupant);
      }
    }
    slots[slotIdx] = incoming;

    dragId = null;
    dragFromSlot = -1;
    renderTray();
    renderSlots();
    resetVerdict();
  }

  // expose for headless testing (native HTML5 DnD is impractical in Playwright)
  window.__placeStep = function (id, slotIdx) {
    dragId = id;
    const inTray = trayIds.indexOf(id);
    dragFromSlot = inTray >= 0 ? -1 : slots.indexOf(id);
    placeIntoSlot(slotIdx);
  };

  // ---- scope canvas ----
  const cv = document.getElementById('scope');
  const ctx = cv.getContext('2d');
  let raf = 0;
  let mode = 'idle'; // idle | clean | noise | flat
  let t = 0;

  function fitCanvas() {
    const wrap = cv.parentElement;
    const r = wrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.max(2, Math.round(r.width * dpr));
    cv.height = Math.max(2, Math.round(r.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w: r.width, h: r.height };
  }
  function css(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  function draw() {
    const dim = fitCanvas();
    const w = dim.w, h = dim.h;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = css('--line');
    ctx.lineWidth = 1;
    for (let gx = 0; gx <= w; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke(); }
    const mid = h / 2;
    ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();

    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      let y = mid;
      if (mode === 'clean') {
        const phase = (x / w) * Math.PI * 14 + t * 0.06;
        y = mid + Math.sin(phase) * (h * 0.22) + Math.sin(phase * 2.3) * (h * 0.05);
        ctx.strokeStyle = css('--ok');
      } else if (mode === 'noise') {
        y = mid + (Math.random() - 0.5) * h * 0.78;
        ctx.strokeStyle = css('--bad');
      } else if (mode === 'flat') {
        y = mid + Math.sin(x * 0.05 + t * 0.01) * 0.6;
        ctx.strokeStyle = css('--fg-mute');
      } else {
        y = mid + Math.sin((x / w) * Math.PI * 4 + t * 0.02) * (h * 0.04);
        ctx.strokeStyle = css('--TRACE');
      }
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    t += 1;
    raf = requestAnimationFrame(draw);
  }

  // ---- verdict / verification ----
  const verdictEl = document.getElementById('verdict');
  const impEl = document.getElementById('impLabel');
  const badgeEl = document.getElementById('badge');
  const recordBtn = document.getElementById('recordBtn');

  function setVerdict(state, zh, en, imp) {
    verdictEl.className = 'verdict' + (state ? ' ' + state : '');
    verdictEl.setAttribute('data-i18n-zh', zh);
    verdictEl.setAttribute('data-i18n-en', en);
    verdictEl.textContent = lang === 'zh' ? zh : en;
    if (imp !== undefined) {
      const z = '阻抗：' + imp, e = 'Impedance: ' + imp;
      impEl.setAttribute('data-i18n-zh', z);
      impEl.setAttribute('data-i18n-en', e);
      impEl.textContent = lang === 'zh' ? z : e;
    }
  }

  function resetVerdict() {
    if (won) return;
    mode = 'idle';
    setVerdict('', '顺序变了，重新按开始录制验证。', 'Order changed, hit RECORD to verify.', '—');
    badgeEl.classList.remove('shown');
  }

  // returns { kind: 'incomplete' | 'noise' | 'nodata' | 'win' }
  function evaluate() {
    if (slots.indexOf(null) !== -1) return { kind: 'incomplete' };
    const order = slots.slice();
    const at = function (id) { return order.indexOf(id); };

    const eIdx = at('electrode');
    const gIdx = at('gel');
    const bIdx = at('bluetooth');
    const aIdx = at('acquire');
    const sIdx = at('save');

    // hard fail: bluetooth paired after acquisition -> Cyton link never opened, no data
    if (bIdx > aIdx) return { kind: 'nodata' };
    // hard fail: gel not before acquisition or not after electrode -> high impedance noise
    if (gIdx > aIdx || gIdx < eIdx) return { kind: 'noise' };

    // exact canonical?
    let exact = true;
    for (let i = 0; i < N; i++) { if (order[i] !== CANON[i]) { exact = false; break; } }
    if (exact) return { kind: 'win' };

    // any other deviation produces noisy / unstable signal
    return { kind: 'noise' };
  }

  recordBtn.addEventListener('click', function () {
    const r = evaluate();
    if (r.kind === 'incomplete') {
      mode = 'idle';
      setVerdict('fail', '还有空槽，先把 6 步全排进流程槽。', 'Empty slots remain — place all 6 steps first.', '—');
      return;
    }
    if (r.kind === 'nodata') {
      mode = 'flat';
      setVerdict('fail',
        '先采集后连蓝牙：Cyton 没建立链路，收不到任何数据。',
        'Acquired before pairing Bluetooth: Cyton link never opened, no data received.',
        '— (no link)');
      return;
    }
    if (r.kind === 'noise') {
      mode = 'noise';
      setVerdict('fail',
        '没在采集前上导电胶，电极阻抗高，记录全是噪声。',
        'Gel not applied before acquisition: electrode impedance high, recording is pure noise.',
        '> 750 kΩ');
      return;
    }
    // win
    mode = 'clean';
    won = true;
    setVerdict('win',
      '顺序正确：阻抗降到 5 kΩ，C3/C4 录到干净脑波节律，已存盘 .bdf。',
      'Correct order: impedance down to 5 kΩ, clean EEG rhythm on C3/C4, saved to .bdf.',
      '5 kΩ');
    badgeEl.classList.add('shown');
  });

  document.getElementById('resetBtn').addEventListener('click', function () {
    trayIds = STEPS.map(function (s) { return s.id; });
    slots = new Array(N).fill(null);
    won = false;
    mode = 'idle';
    badgeEl.classList.remove('shown');
    renderTray();
    renderSlots();
    setVerdict('', '排好顺序，按下开始录制。', 'Order the steps, then hit RECORD.', '—');
  });

  // expose state for headless assertions
  window.__state = function () { return { slots: slots.slice(), mode: mode, won: won, imp: impEl.textContent }; };

  // ---- init ----
  applyLang();
  renderTray();
  renderSlots();
  window.addEventListener('resize', fitCanvas);
  draw();
})();
</script>
</body>
</html>
