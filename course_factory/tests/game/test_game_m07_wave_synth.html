<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Wave Synth Sandbox</title>
<style>
:root{
  --bg-0: oklch(0.15 0.03 240);
  --bg-1: oklch(0.19 0.035 240);
  --bg-2: oklch(0.23 0.04 240);
  --bg-3: oklch(0.29 0.045 240);
  --line: oklch(0.40 0.05 240 / 0.32);
  --line-strong: oklch(0.58 0.07 240 / 0.55);
  --fg:      oklch(0.96 0.01 240);
  --fg-dim:  oklch(0.76 0.02 240);
  --fg-mute: oklch(0.56 0.03 240);
  --gold:    oklch(0.85 0.14 85);
  /* phys signature accent (theme_style/themes.js id:'phys') */
  --phys:    oklch(0.78 0.13 215);
  --p-field:    oklch(0.78 0.13 215);
  --p-wave:     oklch(0.55 0.13 215);
  --p-mass:     oklch(0.35 0.10 215);
  --p-photon:   oklch(0.92 0.08 215);
  --p-constant: oklch(0.85 0.14 85);
  --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
  font-family:system-ui,'Noto Sans SC',sans-serif;}
.shell{display:flex;height:100vh;width:100%;}

/* ---- 200px sidebar ---- */
.game-sidebar{width:200px;flex:0 0 200px;height:100vh;background:var(--bg-1);
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  padding:13px 13px 11px;gap:12px;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:9px;}
.brand svg{width:36px;height:36px;flex:0 0 36px;}
.brand-txt{display:flex;flex-direction:column;}
.brand-name{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--phys);
  letter-spacing:1px;text-transform:uppercase;}
.brand-sub{font-size:10px;color:var(--fg-mute);margin-top:1px;}

.panel-title{font-family:var(--mono);font-size:10px;color:var(--fg-dim);
  letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--line);
  padding-bottom:4px;}
.howto{font-size:10.5px;line-height:1.5;color:var(--fg-mute);}
.howto b{color:var(--fg-dim);font-weight:600;}

.tasks{display:flex;flex-direction:column;gap:7px;}
.task{padding:7px 8px;background:var(--bg-2);border:1px solid var(--line);
  box-shadow:3px 3px 0 var(--bg-0);}
.task.match{border-color:var(--gold);}
.task-row{display:flex;justify-content:space-between;align-items:center;gap:4px;}
.task-name{font-size:11.5px;font-weight:600;color:var(--fg);}
.task-state{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;color:var(--fg-mute);}
.task.match .task-state{color:var(--gold);}
.task-hint{font-size:9.5px;color:var(--fg-mute);margin-top:3px;line-height:1.4;}

.new-target{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:6px 10px;cursor:pointer;border:1px solid var(--line-strong);
  background:var(--bg-2);color:var(--phys);box-shadow:3px 3px 0 var(--bg-0);}
.new-target:hover{background:var(--bg-3);}

.lang-btn{margin-top:auto;align-self:flex-start;font-family:var(--mono);font-size:11px;
  font-weight:700;padding:4px 12px;cursor:pointer;border:1px solid var(--line-strong);
  background:var(--bg-2);color:var(--phys);letter-spacing:1px;
  box-shadow:3px 3px 0 var(--bg-0);}
.lang-btn:hover{background:var(--bg-3);}

/* ---- main stage ---- */
.game-main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;
  padding:11px 13px;gap:9px;}
.stage-card{flex:1;min-height:0;display:flex;flex-direction:column;
  background:var(--bg-1);border:1px solid var(--line);}
.stage-card.components{flex:1.25;}
.stage-head{display:flex;justify-content:space-between;align-items:center;
  padding:6px 11px;border-bottom:1px solid var(--line);}
.stage-title{font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--fg-dim);}
.stage-hint{font-size:10px;color:var(--fg-mute);}
.canvas-wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;}
canvas{flex:1;display:block;width:100%;min-height:0;cursor:grab;}
canvas.grabbing{cursor:grabbing;}
#sumC{cursor:default;}

.hud{display:flex;gap:20px;align-items:center;padding:7px 13px;background:var(--bg-1);
  border:1px solid var(--line);}
.hud .item{display:flex;flex-direction:column;}
.hud .label{font-family:var(--mono);font-size:9px;text-transform:uppercase;
  letter-spacing:1px;color:var(--fg-mute);}
.hud .value{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--phys);margin-top:2px;}
.hud .value.gold{color:var(--gold);}
.hud .progress{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--fg-dim);}

/* ---- victory ---- */
.victory{position:fixed;inset:0;background:oklch(0.15 0.03 240 / 0.84);
  display:none;align-items:center;justify-content:center;z-index:50;}
.victory.show{display:flex;}
.victory-box{background:var(--bg-2);border:1px solid var(--gold);
  box-shadow:6px 6px 0 var(--bg-0);padding:26px 32px;max-width:440px;text-align:center;}
.victory-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:11px;}
.victory-text{font-size:13px;color:var(--fg-dim);line-height:1.65;margin-bottom:16px;}
.victory-btn{font-family:var(--mono);font-size:12px;font-weight:700;padding:7px 24px;
  cursor:pointer;border:1px solid var(--phys);background:var(--bg-3);color:var(--phys);
  text-transform:uppercase;letter-spacing:1px;box-shadow:3px 3px 0 var(--bg-0);}
</style>
</head>
<body>
<div class="shell">
  <!-- ===== sidebar ===== -->
  <aside class="game-sidebar">
    <div class="brand">
      <!-- mascot Echo: tuning-fork + waveform halo -->
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <g fill="none" stroke-width="2.4" stroke-linecap="round">
          <path d="M14 6 L14 20 Q14 27 20 27 Q26 27 26 20 L26 6" stroke="var(--p-field)"/>
          <line x1="20" y1="27" x2="20" y2="36" stroke="var(--p-field)"/>
        </g>
        <path d="M3 33 Q6 24 9 33 Q12 42 15 33" fill="none" stroke="var(--p-photon)" stroke-width="1.6" opacity="0.85"/>
        <path d="M25 33 Q28 24 31 33 Q34 42 37 33" fill="none" stroke="var(--p-photon)" stroke-width="1.6" opacity="0.85"/>
        <circle cx="20" cy="6" r="2.4" fill="var(--gold)"/>
      </svg>
      <div class="brand-txt">
        <span class="brand-name">Echo</span>
        <span class="brand-sub" id="brandSub">力之观测台</span>
      </div>
    </div>

    <div class="panel-title" id="ttlHow">玩法</div>
    <div class="howto" id="howto">
      上半区有三条<b>成分波</b>：慢波 / 中波 / 快波。
      直接<b>拖动每条波上的手柄</b>：左右拖改快慢，上下拖改强弱。
      下半区是它们叠加成的<b>复合波</b>，会随手实时改变。
    </div>

    <div class="panel-title" id="ttlTasks">匹配挑战</div>
    <div class="tasks">
      <div class="task match-target" id="taskA">
        <div class="task-row">
          <span class="task-name" id="tnA">目标复合波</span>
          <span class="task-state" id="tsA">进行中</span>
        </div>
        <div class="task-hint" id="thA">调成分让你的复合波贴合虚线目标</div>
      </div>
    </div>
    <button class="new-target" id="newTargetBtn">换一个目标</button>

    <button class="lang-btn" id="langBtn">EN</button>
  </aside>

  <!-- ===== main ===== -->
  <main class="game-main">
    <div class="stage-card components">
      <div class="stage-head">
        <span class="stage-title" id="ttlComp">三条成分波 (拖手柄)</span>
        <span class="stage-hint" id="hintComp">左右拖=快慢 · 上下拖=强弱</span>
      </div>
      <div class="canvas-wrap"><canvas id="compC"></canvas></div>
    </div>

    <div class="stage-card">
      <div class="stage-head">
        <span class="stage-title" id="ttlSum">复合波 = 三条之和</span>
        <span class="stage-hint" id="hintSum">虚线 = 目标 · 实线 = 你的</span>
      </div>
      <div class="canvas-wrap"><canvas id="sumC"></canvas></div>
    </div>

    <div class="hud">
      <div class="item">
        <span class="label" id="hudL1">贴合度</span>
        <span class="value" id="hudV1">--</span>
      </div>
      <div class="item">
        <span class="label" id="hudL2">主导成分</span>
        <span class="value" id="hudV2">--</span>
      </div>
      <span class="progress" id="hudProg">0 / 3</span>
    </div>
  </main>
</div>

<div class="victory" id="victory">
  <div class="victory-box">
    <div class="victory-title" id="vTitle">已解锁 傅里叶合成师</div>
    <div class="victory-text" id="vText"></div>
    <button class="victory-btn" id="vBtn">继续</button>
  </div>
</div>

<script>
(function(){
var LANG='cn';
var I18N={
  brandSub:{cn:'力之观测台',en:'Force Observatory'},
  ttlHow:{cn:'玩法',en:'HOW TO PLAY'},
  howto:{cn:'上半区有三条<b>成分波</b>：慢波 / 中波 / 快波。直接<b>拖动每条波上的手柄</b>：左右拖改快慢，上下拖改强弱。下半区是它们叠加成的<b>复合波</b>，会随手实时改变。',
         en:'Top shows three <b>component waves</b>: slow / mid / fast. <b>Drag the handle</b> on each wave: drag left-right for speed, up-down for strength. The bottom shows their summed <b>composite wave</b>, updating live.'},
  ttlTasks:{cn:'匹配挑战',en:'MATCH CHALLENGE'},
  tnA:{cn:'目标复合波',en:'Target composite'},
  thA:{cn:'调成分让你的复合波贴合虚线目标',en:'Tune components so your composite hugs the dashed target'},
  newTargetBtn:{cn:'换一个目标',en:'NEW TARGET'},
  ttlComp:{cn:'三条成分波 (拖手柄)',en:'THREE COMPONENTS (drag handles)'},
  hintComp:{cn:'左右拖=快慢 · 上下拖=强弱',en:'L/R = speed · U/D = strength'},
  ttlSum:{cn:'复合波 = 三条之和',en:'COMPOSITE = sum of three'},
  hintSum:{cn:'虚线 = 目标 · 实线 = 你的',en:'Dashed = target · Solid = yours'},
  hudL1:{cn:'贴合度',en:'MATCH'},
  hudL2:{cn:'主导成分',en:'DOMINANT'},
  stProgress:{cn:'进行中',en:'IN PROGRESS'},
  stMatched:{cn:'已贴合',en:'MATCHED'},
  cSlow:{cn:'慢波',en:'Slow'},
  cMid:{cn:'中波',en:'Mid'},
  cFast:{cn:'快波',en:'Fast'},
  vTitle:{cn:'已解锁 傅里叶合成师',en:'UNLOCKED: Fourier Synthesist'},
  vText:{cn:'你刚才做的事就是傅里叶的核心想法：再复杂的脑波，也只是几条简单的快波加慢波叠加而成。反过来，把复合波拆成这几条成分，就是傅里叶分析。',
         en:'What you just did is the core idea of Fourier: any complex brain wave is just a few simple fast and slow waves summed together. Splitting a composite back into those components is Fourier analysis.'},
  vBtn:{cn:'继续',en:'Continue'},
};
function t(k){var e=I18N[k];return e?(e[LANG]||e.en):k;}

// ---- color resolve ----
function resolveColor(varExpr){
  var probe=document.createElement('span');
  probe.style.color=varExpr;document.body.appendChild(probe);
  var c=getComputedStyle(probe).color;document.body.removeChild(probe);
  return c;
}
var COL={
  slow: resolveColor('var(--p-mass)'),
  mid:  resolveColor('var(--p-field)'),
  fast: resolveColor('var(--p-wave)'),
  sum:  resolveColor('var(--phys)'),
  gold: resolveColor('var(--gold)'),
  photon:resolveColor('var(--p-photon)'),
  mute: resolveColor('var(--fg-mute)'),
  dim:  resolveColor('var(--fg-dim)'),
  fg:   resolveColor('var(--fg)'),
  line: resolveColor('var(--line)'),
  bg1:  resolveColor('var(--bg-1)'),
  bg0:  resolveColor('var(--bg-0)'),
};
var MONO='"JetBrains Mono",ui-monospace,monospace';

// ---- component-wave model ----
// freq: cycles across plot width (1..8); amp: 0..1 relative strength
var comps=[
  {id:'cSlow', key:'slow', freq:1.0, amp:0.62, col:COL.slow},
  {id:'cMid',  key:'mid',  freq:2.4, amp:0.45, col:COL.mid },
  {id:'cFast', key:'fast', freq:4.6, amp:0.30, col:COL.fast},
];
var FREQ_MIN=0.6, FREQ_MAX=7.5;

// target recipe (what the dashed composite is built from)
var target=null;
function makeTarget(){
  function rf(){return FREQ_MIN+Math.random()*(FREQ_MAX-FREQ_MIN);}
  function ra(){return 0.25+Math.random()*0.65;}
  target=[
    {freq:1.0+Math.random()*0.8, amp:ra()},
    {freq:2.0+Math.random()*1.6, amp:ra()},
    {freq:3.8+Math.random()*2.4, amp:ra()},
  ];
  matched=false;
}
var matched=false;
var won=false;
var solvedCount=0;
var NEED=3;

// ---- canvas setup ----
var compC=document.getElementById('compC'),cc=compC.getContext('2d');
var sumC=document.getElementById('sumC'),sc=sumC.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);
var CW=0,CH=0,SW=0,SH=0;

function setupCanvas(cv,c2){
  var wrap=cv.parentElement;var r=wrap.getBoundingClientRect();
  if(r.width<1||r.height<1) return [0,0];
  cv.width=Math.round(r.width*DPR);cv.height=Math.round(r.height*DPR);
  cv.style.width=r.width+'px';cv.style.height=r.height+'px';
  c2.setTransform(DPR,0,0,DPR,0,0);
  return [r.width,r.height];
}
function resize(){
  var a=setupCanvas(compC,cc);CW=a[0];CH=a[1];
  var b=setupCanvas(sumC,sc);SW=b[0];SH=b[1];
}

var PAD=16;
// vertical lane for each component on the top canvas
function laneY(i){
  var lTop=14, lBot=CH-14;
  var n=comps.length;
  var slot=(lBot-lTop)/n;
  return lTop+slot*(i+0.5);
}
function laneH(){
  var lTop=14, lBot=CH-14;
  return (lBot-lTop)/comps.length;
}

// handle position for a component (where you grab it). x by freq, y by amp(offset from lane center)
function handlePos(i){
  var c=comps[i];
  var cy=laneY(i);
  var lh=laneH();
  var plotW=CW-PAD*2;
  // x maps freq within range across the plot
  var fx=(c.freq-FREQ_MIN)/(FREQ_MAX-FREQ_MIN);
  var hx=PAD+fx*plotW;
  // y maps amp: bigger amp -> higher above lane center
  var maxA=lh*0.40;
  var hy=cy-c.amp*maxA;
  return {x:hx,y:hy,cy:cy,lh:lh,maxA:maxA,plotW:plotW};
}

// ---- match scoring: sample composite vs target, normalized RMS similarity ----
function sampleSum(list,tphase,n){
  // returns array of n y-values in [-1,1]-ish (sum of sines), normalized by amp sum
  var arr=new Array(n);
  var ampSum=0;for(var k=0;k<list.length;k++) ampSum+=list[k].amp;
  if(ampSum<1e-6) ampSum=1;
  for(var i=0;i<n;i++){
    var tt=i/(n-1);var s=0;
    for(var j=0;j<list.length;j++){
      s+=Math.sin(2*Math.PI*list[j].freq*tt+tphase)*list[j].amp;
    }
    arr[i]=s/ampSum;
  }
  return arr;
}
function matchScore(){
  if(!target) return 0;
  // phase-independent shape comparison: align both at phase 0
  var N=120;
  var mine=sampleSum(comps,0,N);
  var tgt=sampleSum(target,0,N);
  var sse=0;
  for(var i=0;i<N;i++){var d=mine[i]-tgt[i];sse+=d*d;}
  var rms=Math.sqrt(sse/N);
  // rms 0 => perfect; map to 0..100
  var score=Math.max(0,100-rms*135);
  return score;
}

function dominantKey(){
  var m=comps[0];
  for(var i=1;i<comps.length;i++) if(comps[i].amp>m.amp) m=comps[i];
  return m.key;
}

// ---- draw ----
var phase=0;
function draw(){
  if(CW<2){resize();}
  var score=matchScore();
  if(score>=88 && !matched){
    matched=true;solvedCount++;
    if(solvedCount>=NEED && !won){
      won=true;
      setTimeout(function(){document.getElementById('victory').classList.add('show');},420);
    } else {
      // auto-roll next target after a short beat
      setTimeout(function(){ if(!won) makeTarget(); },900);
    }
  }
  drawComponents();
  drawSum(score);
  updateHUD(score);
}

function drawComponents(){
  if(CW<2||CH<2) return;
  cc.clearRect(0,0,CW,CH);
  cc.fillStyle=COL.bg1;cc.fillRect(0,0,CW,CH);
  var plotW=CW-PAD*2;
  for(var i=0;i<comps.length;i++){
    var c=comps[i];
    var hp=handlePos(i);
    var cy=hp.cy, maxA=hp.maxA;
    // lane baseline
    cc.strokeStyle=COL.line;cc.lineWidth=1;
    cc.beginPath();cc.moveTo(PAD,cy);cc.lineTo(CW-PAD,cy);cc.stroke();
    // the component wave
    cc.strokeStyle=c.col;cc.lineWidth=2.2;cc.lineJoin='round';
    cc.beginPath();
    for(var x=0;x<=plotW;x+=1.5){
      var tt=x/plotW;
      var y=cy-Math.sin(2*Math.PI*c.freq*tt+phase)*c.amp*maxA;
      if(x===0) cc.moveTo(PAD+x,y);else cc.lineTo(PAD+x,y);
    }
    cc.stroke();
    // label
    cc.textAlign='left';cc.textBaseline='bottom';
    cc.fillStyle=c.col;cc.font='bold 10px '+MONO;
    cc.fillText(t(c.id).toUpperCase()+'  '+c.freq.toFixed(1)+'x  '+Math.round(c.amp*100),
                PAD+2, cy-maxA-3>10? cy-maxA-3 : cy-maxA-3);
    // grab handle (knob on the wave at its first crest area)
    var grabbing=(dragIdx===i);
    cc.fillStyle=grabbing?COL.gold:c.col;
    cc.beginPath();cc.arc(hp.x,hp.y,grabbing?8:6.5,0,Math.PI*2);cc.fill();
    cc.strokeStyle=COL.bg0;cc.lineWidth=2.4;cc.stroke();
    // tiny cross inside handle to read as draggable
    cc.strokeStyle=COL.bg0;cc.lineWidth=1.4;
    cc.beginPath();
    cc.moveTo(hp.x-2.6,hp.y);cc.lineTo(hp.x+2.6,hp.y);
    cc.moveTo(hp.x,hp.y-2.6);cc.lineTo(hp.x,hp.y+2.6);
    cc.stroke();
  }
}

function drawSum(score){
  if(SW<2||SH<2) return;
  sc.clearRect(0,0,SW,SH);
  sc.fillStyle=COL.bg1;sc.fillRect(0,0,SW,SH);
  var midY=SH/2;
  sc.strokeStyle=COL.line;sc.lineWidth=1;
  sc.beginPath();sc.moveTo(0,midY);sc.lineTo(SW,midY);sc.stroke();

  var plotW=SW-PAD*2;
  var scaleY=SH*0.36;

  // target (dashed)
  if(target){
    var tArr=sampleSum(target,0,Math.max(40,Math.floor(plotW/2)));
    sc.strokeStyle=score>=88?COL.gold:COL.photon;
    sc.globalAlpha=0.75;sc.lineWidth=1.8;sc.setLineDash([6,5]);
    sc.beginPath();
    for(var i=0;i<tArr.length;i++){
      var x=PAD+ (i/(tArr.length-1))*plotW;
      var y=midY-tArr[i]*scaleY;
      if(i===0) sc.moveTo(x,y);else sc.lineTo(x,y);
    }
    sc.stroke();sc.setLineDash([]);sc.globalAlpha=1;
  }

  // mine (solid, phys accent) — animated phase so it's visibly alive
  var mArr=sampleSum(comps,phase,Math.max(60,Math.floor(plotW/1.5)));
  sc.strokeStyle=COL.sum;sc.lineWidth=2.6;sc.lineJoin='round';
  sc.beginPath();
  for(var j=0;j<mArr.length;j++){
    var mx=PAD+(j/(mArr.length-1))*plotW;
    var my=midY-mArr[j]*scaleY;
    if(j===0) sc.moveTo(mx,my);else sc.lineTo(mx,my);
  }
  sc.stroke();

  if(score>=88){
    sc.strokeStyle=COL.gold;sc.globalAlpha=0.55;sc.lineWidth=1;
    sc.strokeRect(2,2,SW-4,SH-4);sc.globalAlpha=1;
  }
}

function updateHUD(score){
  var v1=document.getElementById('hudV1');
  v1.textContent=Math.round(score)+'%';
  v1.className='value'+(score>=88?' gold':'');
  var dk=dominantKey();
  document.getElementById('hudV2').textContent=t('c'+dk.charAt(0).toUpperCase()+dk.slice(1));
  document.getElementById('hudProg').textContent=Math.min(solvedCount,NEED)+' / '+NEED;
  var box=document.getElementById('taskA');var st=document.getElementById('tsA');
  if(score>=88){box.className='task match-target match';st.textContent=t('stMatched');}
  else{box.className='task match-target';st.textContent=t('stProgress');}
}

function loop(){phase+=0.02;draw();requestAnimationFrame(loop);}

// ---- drag interaction on top canvas ----
var dragIdx=-1;
function canvasXY(ev){
  var r=compC.getBoundingClientRect();
  var px=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
  var py=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;
  return {x:px,y:py};
}
function pickComponent(px,py){
  // pick nearest handle within radius, else nearest lane by y
  var best=-1,bestD=1e9;
  for(var i=0;i<comps.length;i++){
    var hp=handlePos(i);
    var d=Math.hypot(px-hp.x,py-hp.y);
    if(d<bestD){bestD=d;best=i;}
  }
  if(bestD<26) return best;
  // fallback: pick by lane band
  for(var k=0;k<comps.length;k++){
    var cy=laneY(k);var lh=laneH();
    if(py>=cy-lh/2 && py<=cy+lh/2) return k;
  }
  return best;
}
function applyDrag(px,py){
  if(dragIdx<0) return;
  var c=comps[dragIdx];
  var hp=handlePos(dragIdx);
  var plotW=hp.plotW, maxA=hp.maxA, cy=hp.cy;
  // x -> freq
  var fx=Math.max(0,Math.min(1,(px-PAD)/plotW));
  c.freq=FREQ_MIN+fx*(FREQ_MAX-FREQ_MIN);
  // y -> amp (distance above lane center). below center clamps to small
  var dy=cy-py;
  var a=dy/maxA;
  c.amp=Math.max(0.02,Math.min(1,a));
}
function onDown(ev){
  var p=canvasXY(ev);
  dragIdx=pickComponent(p.x,p.y);
  if(dragIdx>=0){applyDrag(p.x,p.y);compC.classList.add('grabbing');ev.preventDefault();}
}
function onMove(ev){
  if(dragIdx<0) return;
  var p=canvasXY(ev);applyDrag(p.x,p.y);ev.preventDefault();
}
function onUp(){dragIdx=-1;compC.classList.remove('grabbing');}
compC.addEventListener('mousedown',onDown);
window.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);
compC.addEventListener('touchstart',onDown,{passive:false});
compC.addEventListener('touchmove',onMove,{passive:false});
window.addEventListener('touchend',onUp);
