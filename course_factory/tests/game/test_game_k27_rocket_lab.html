<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
.slider-group{display:flex;flex-direction:column;gap:3px;}
.slider-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:999px;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--primary);cursor:pointer;border-radius:50%;box-shadow:0 0 6px var(--glow-strong);}
.slider-group .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-align:right;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;border-radius:999px;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;border-radius:999px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
/* Type selector buttons */
.type-btns{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.type-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:6px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));background:transparent;color:var(--sb-dim,#8e90a6);letter-spacing:0.1em;text-transform:uppercase;text-align:left;border-radius:14px;transition:all 0.2s;}
.type-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.type-btn.active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(249,115,22,0.12);}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">ROCKET LAB</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="typeLabel">PROPULSION TYPE</div>
    <div class="type-btns" id="typeBtns"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="veLabel">EXHAUST VELOCITY</div>
    <div class="slider-group">
      <input type="range" id="veSlider" min="1" max="100" value="20">
      <div class="val" id="veVal">20 m/s</div>
    </div>
    <div class="sidebar-section" id="dmLabel">MASS FLOW RATE</div>
    <div class="slider-group">
      <input type="range" id="dmSlider" min="1" max="50" value="5">
      <div class="val" id="dmVal">5 kg/s</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="launchBtn">LAUNCH</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <span class="hud-tag" id="hudTag">THRUST LAB</span>
      <div class="hud-item"><div class="hud-label" id="hl1">THRUST</div><div class="hud-val" id="hv1">0 N</div></div>
      <div class="hud-item"><div class="hud-label" id="hl2">ALTITUDE</div><div class="hud-val" id="hv2">0 m</div></div>
      <div class="hud-item"><div class="hud-label" id="hl3">VELOCITY</div><div class="hud-val" id="hv3">0 m/s</div></div>
      <div class="hud-item"><div class="hud-label" id="hl4">TRIALS</div><div class="hud-val" id="hv4">0</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">READY</span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#f97316';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c2d, w, h) {
  var mc = gameModeColors();
  var g = c2d.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c2d.fillStyle = g; c2d.fillRect(0,0,w,h);
  var gc2 = mc.grid || (ACCENT ? 'rgba(249,115,22,0.06)' : 'rgba(255,255,255,0.04)');
  c2d.strokeStyle = gc2; c2d.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c2d.beginPath();c2d.moveTo(x,0);c2d.lineTo(x,h);c2d.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c2d.beginPath();c2d.moveTo(0,y);c2d.lineTo(w,y);c2d.stroke();}
  if(mc.innerBorder){c2d.strokeStyle=mc.innerBorderColor;c2d.lineWidth=0.5;c2d.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c2d.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,ACCENT);tg.addColorStop(0.6,ACCENT);tg.addColorStop(1,'transparent');c2d.strokeStyle=tg;c2d.lineWidth=1;c2d.beginPath();c2d.moveTo(0,0.5);c2d.lineTo(w,0.5);c2d.stroke();}
  if(mc.scanlines){c2d.strokeStyle='rgba(255,255,255,0.025)';c2d.lineWidth=1;for(var sy=0;sy<h;sy+=3){c2d.beginPath();c2d.moveTo(0,sy);c2d.lineTo(w,sy);c2d.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c2d.strokeStyle=ACCENT;c2d.lineWidth=1.5;c2d.globalAlpha=0.5;c2d.beginPath();c2d.moveTo(8,8+bl);c2d.lineTo(8,8);c2d.lineTo(8+bl,8);c2d.stroke();c2d.beginPath();c2d.moveTo(w-8-bl,8);c2d.lineTo(w-8,8);c2d.lineTo(w-8,8+bl);c2d.stroke();c2d.beginPath();c2d.moveTo(8,h-8-bl);c2d.lineTo(8,h-8);c2d.lineTo(8+bl,h-8);c2d.stroke();c2d.beginPath();c2d.moveTo(w-8-bl,h-8);c2d.lineTo(w-8,h-8);c2d.lineTo(w-8,h-8+bl);c2d.stroke();c2d.globalAlpha=1;}
  if(mc.glow){var rg=c2d.createRadialGradient(w*0.5,h*0.7,0,w*0.5,h*0.7,w*0.5);rg.addColorStop(0,'rgba(249,115,22,0.06)');rg.addColorStop(1,'transparent');c2d.fillStyle=rg;c2d.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'ROCKET THRUST LAB', cn:'\u706b\u7bad\u63a8\u529b\u5b9e\u9a8c\u5ba4'},
  subtitle:  {en:'Adjust exhaust to control thrust', cn:'\u8c03\u8282\u55b7\u6c14\u53c2\u6570\u63a7\u5236\u63a8\u529b'},
  guide:     {en:'1. Select propulsion type\n2. Adjust exhaust velocity and mass flow rate\n3. Press LAUNCH to fly\n4. Observe how parameters affect altitude\n5. Try all 3 types and compare!', cn:'1. \u9009\u62e9\u63a8\u8fdb\u7c7b\u578b\n2. \u8c03\u8282\u55b7\u6c14\u901f\u5ea6\u548c\u8d28\u91cf\u6d41\u91cf\n3. \u70b9\u51fb\u53d1\u5c04\u8d77\u98de\n4. \u89c2\u5bdf\u53c2\u6570\u5982\u4f55\u5f71\u54cd\u9ad8\u5ea6\n5. \u5c1d\u8bd5\u4e09\u79cd\u7c7b\u578b\u5e76\u5bf9\u6bd4\uff01'},
  type_label:{en:'PROPULSION TYPE', cn:'\u63a8\u8fdb\u7c7b\u578b'},
  ve_label:  {en:'EXHAUST VELOCITY', cn:'\u55b7\u6c14\u901f\u5ea6'},
  dm_label:  {en:'MASS FLOW RATE', cn:'\u8d28\u91cf\u6d41\u91cf'},
  launch:    {en:'LAUNCH', cn:'\u53d1\u5c04'},
  reset:     {en:'RESET', cn:'\u91cd\u7f6e'},
  ready:     {en:'READY', cn:'\u5c31\u7eea'},
  flying:    {en:'FLYING...', cn:'\u98de\u884c\u4e2d...'},
  landed:    {en:'LANDED', cn:'\u5df2\u7740\u9646'},
  thrust:    {en:'THRUST', cn:'\u63a8\u529b'},
  altitude:  {en:'ALTITUDE', cn:'\u9ad8\u5ea6'},
  velocity:  {en:'VELOCITY', cn:'\u901f\u5ea6'},
  trials:    {en:'TRIALS', cn:'\u8bd5\u9a8c\u6b21\u6570'},
  balloon:   {en:'BALLOON', cn:'\u6c14\u7403'},
  waterRocket:{en:'WATER ROCKET', cn:'\u6c34\u706b\u7bad'},
  solidRocket:{en:'SOLID ROCKET', cn:'\u56fa\u4f53\u706b\u7bad'},
  maxAlt:    {en:'MAX ALTITUDE', cn:'\u6700\u9ad8\u9ad8\u5ea6'},
  summary:   {en:'FLIGHT SUMMARY', cn:'\u98de\u884c\u603b\u7ed3'},
  thrustNote:{en:'F = dm/dt x Ve', cn:'F = dm/dt x Ve'},
  guide_label:{en:'GUIDE', cn:'\u64cd\u4f5c\u6307\u5357'},
  soundOn:   {en:'SOUND ON', cn:'\u5f00\u542f\u97f3\u6548'},
  soundOff:  {en:'SOUND OFF', cn:'\u5173\u95ed\u97f3\u6548'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

// ================================================================
// Game State
// ================================================================
var PROPULSION_TYPES = [
  {key:'balloon', veRange:[1,15], dmRange:[0.05,0.5], mass:0.05, color:'#f97316', defaultVe:5, defaultDm:0.1},
  {key:'waterRocket', veRange:[5,50], dmRange:[1,15], mass:1.5, color:'#3b82f6', defaultVe:20, defaultDm:5},
  {key:'solidRocket', veRange:[500,3500], dmRange:[0.5,5], mass:5, color:'#ef4444', defaultVe:2500, defaultDm:2},
];
var selectedType = 0;
var currentVe = 5;
var currentDm = 0.1;
var rocketY = 0; // altitude in meters
var rocketVel = 0; // velocity m/s
var rocketThrust = 0;
var isFlying = false;
var fuelRemaining = 1; // 0 to 1
var maxAltitude = 0;
var trialCount = 0;
var flights = []; // {type, ve, dm, maxAlt, thrust}
var gParticles = [];
var shakeX = 0, shakeY = 0;
var summaryAlpha = 0;
var showSummary = false;
var soundMuted = true;
var gc, c2d;

// Easing
function easeOutCubic(tt) { return 1 - Math.pow(1 - tt, 3); }

// Audio
function playTone(freq, duration, type) {
  if (soundMuted) return;
  try {
    var actx = window._audioCtx || (window._audioCtx = new (window.AudioContext || window.webkitAudioContext)());
    var osc = actx.createOscillator();
    var gain = actx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + duration);
  } catch(e) {}
}

// Particles
function spawnGParticles(x, y, count, color, speed) {
  for (var i = 0; i < count; i++) {
    gParticles.push({
      x: x + (Math.random()-0.5)*10, y: y,
      vx: (Math.random()-0.5) * speed * 0.5,
      vy: Math.random() * speed,
      life: 1, decay: 0.015 + Math.random() * 0.02,
      r: 2 + Math.random() * 2.5,
      color: (i % 5 === 0) ? 'oklch(0.85 0.14 85)' : color
    });
  }
}

function updateGParticles() {
  for (var i = gParticles.length - 1; i >= 0; i--) {
    var p = gParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) gParticles.splice(i, 1);
  }
}

function drawGParticles(ctx) {
  for (var i = 0; i < gParticles.length; i++) {
    var p = gParticles[i];
    ctx.globalAlpha = p.life * 0.7;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ================================================================
// Canvas resize
// ================================================================
function resizeCanvas() {
  if (!gc) return;
  var parent = gc.parentElement;
  var rect = parent.getBoundingClientRect();
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  gc.width = rect.width * dpr;
  gc.height = rect.height * dpr;
  c2d = gc.getContext('2d');
  c2d.scale(dpr, dpr);
}

// ================================================================
// Main draw
// ================================================================
function draw() {
  if(!c2d) return;
  var rect = gc.parentElement.getBoundingClientRect();
  var w = rect.width, h = rect.height;
  var mc = gameModeColors();

  // Apply shake
  c2d.save();
  c2d.translate(shakeX, shakeY);
  shakeX *= 0.85; shakeY *= 0.85;
  if (Math.abs(shakeX) < 0.3) shakeX = 0;
  if (Math.abs(shakeY) < 0.3) shakeY = 0;

  drawGameBg(c2d, w, h);

  // Ground
  var groundY = h * 0.85;
  c2d.fillStyle = mc.strokeDim;
  c2d.fillRect(0, groundY, w, 2);

  // Launch pad
  var padX = w * 0.35;
  c2d.fillStyle = mc.dim;
  c2d.fillRect(padX - 25, groundY - 3, 50, 6);

  // Stars (background)
  c2d.fillStyle = mc.text;
  for (var si = 0; si < 15; si++) {
    c2d.globalAlpha = 0.1 + Math.random() * 0.15;
    c2d.beginPath();
    c2d.arc((si * 97.3 + 30) % w, (si * 67.1 + 10) % (groundY * 0.5), 0.5 + Math.random() * 0.7, 0, Math.PI * 2);
    c2d.fill();
  }
  c2d.globalAlpha = 1;

  // Altitude scale on right
  var scaleX = w * 0.88;
  c2d.strokeStyle = mc.strokeDim;
  c2d.lineWidth = 0.5;
  c2d.beginPath(); c2d.moveTo(scaleX, 30); c2d.lineTo(scaleX, groundY); c2d.stroke();
  var maxScale = selectedType === 2 ? 5000 : (selectedType === 1 ? 200 : 20);
  for (var si2 = 0; si2 <= 5; si2++) {
    var sy = groundY - (groundY - 30) * si2 / 5;
    c2d.beginPath(); c2d.moveTo(scaleX - 4, sy); c2d.lineTo(scaleX + 4, sy); c2d.stroke();
    c2d.font = '400 9px "JetBrains Mono"';
    c2d.fillStyle = mc.dim;
    c2d.textAlign = 'left';
    c2d.fillText((maxScale * si2 / 5).toFixed(0) + 'm', scaleX + 8, sy + 3);
  }

  // Rocket drawing
  var typeConf = PROPULSION_TYPES[selectedType];
  var rocketScreenY = groundY - 5 - (rocketY / maxScale) * (groundY - 30);
  rocketScreenY = Math.max(30, Math.min(groundY - 5, rocketScreenY));

  // Rocket body
  var rw = 20, rh = 45;
  if (selectedType === 0) { rw = 24; rh = 30; } // balloon wider/shorter
  if (selectedType === 2) { rw = 18; rh = 55; } // solid taller/thinner

  var rocketCX = padX;
  var rocketTopY = rocketScreenY - rh;

  if (selectedType === 0) {
    // Balloon shape
    var bg = c2d.createRadialGradient(rocketCX, rocketScreenY - rh/2, 2, rocketCX, rocketScreenY - rh/2, rw);
    bg.addColorStop(0, ACCENT); bg.addColorStop(1, 'oklch(0.55 0.16 50)');
    c2d.fillStyle = bg;
    c2d.beginPath();
    c2d.ellipse(rocketCX, rocketScreenY - rh/2, rw/2, rh/2, 0, 0, Math.PI * 2);
    c2d.fill();
    c2d.strokeStyle = ACCENT; c2d.lineWidth = 1; c2d.stroke();
    // Nozzle
    c2d.beginPath();
    c2d.moveTo(rocketCX - 3, rocketScreenY);
    c2d.lineTo(rocketCX, rocketScreenY + 5);
    c2d.lineTo(rocketCX + 3, rocketScreenY);
    c2d.strokeStyle = mc.dim; c2d.lineWidth = 0.8; c2d.stroke();
  } else {
    // Rocket body
    var rg = c2d.createLinearGradient(rocketCX, rocketTopY, rocketCX, rocketScreenY);
    rg.addColorStop(0, typeConf.color); rg.addColorStop(1, 'oklch(0.35 0.10 ' + (selectedType === 1 ? '230' : '20') + ')');
    c2d.fillStyle = rg;
    c2d.beginPath();
    c2d.moveTo(rocketCX - rw/2, rocketScreenY);
    c2d.lineTo(rocketCX - rw/2, rocketTopY + 15);
    c2d.quadraticCurveTo(rocketCX, rocketTopY - 5, rocketCX + rw/2, rocketTopY + 15);
    c2d.lineTo(rocketCX + rw/2, rocketScreenY);
    c2d.closePath();
    c2d.fill();
    c2d.strokeStyle = typeConf.color; c2d.lineWidth = 1; c2d.stroke();
    // Nozzle
    c2d.fillStyle = 'oklch(0.3 0.05 55)';
    c2d.beginPath();
    c2d.moveTo(rocketCX - rw/3, rocketScreenY);
    c2d.lineTo(rocketCX - rw/2.5, rocketScreenY + 8);
    c2d.lineTo(rocketCX + rw/2.5, rocketScreenY + 8);
    c2d.lineTo(rocketCX + rw/3, rocketScreenY);
    c2d.closePath();
    c2d.fill();
    // Fins
    c2d.globalAlpha = 0.5;
    c2d.fillStyle = typeConf.color;
    c2d.beginPath();
    c2d.moveTo(rocketCX - rw/2, rocketScreenY - 10);
    c2d.lineTo(rocketCX - rw/2 - 8, rocketScreenY + 3);
    c2d.lineTo(rocketCX - rw/2, rocketScreenY);
    c2d.closePath();
    c2d.fill();
    c2d.beginPath();
    c2d.moveTo(rocketCX + rw/2, rocketScreenY - 10);
    c2d.lineTo(rocketCX + rw/2 + 8, rocketScreenY + 3);
    c2d.lineTo(rocketCX + rw/2, rocketScreenY);
    c2d.closePath();
    c2d.fill();
    c2d.globalAlpha = 1;
  }

  // Exhaust particles during flight
  if (isFlying && fuelRemaining > 0) {
    spawnGParticles(rocketCX, rocketScreenY + 10, 3, typeConf.color, 3);
  }
  updateGParticles();
  drawGParticles(c2d);

  // Thrust formula display
  c2d.font = '700 11px "JetBrains Mono"';
  c2d.fillStyle = ACCENT;
  c2d.textAlign = 'center';
  c2d.fillText(t('thrustNote'), w * 0.65, 30);

  // Current thrust calculation display
  var thrustVal = currentVe * currentDm;
  c2d.font = '400 10px "JetBrains Mono"';
  c2d.fillStyle = mc.text;
  c2d.fillText(currentDm.toFixed(2) + ' kg/s x ' + currentVe.toFixed(0) + ' m/s = ' + thrustVal.toFixed(1) + ' N', w * 0.65, 48);

  // Fuel bar
  if (isFlying || fuelRemaining < 1) {
    var fbarX = padX - 40, fbarY = groundY + 12, fbarW = 80, fbarH = 6;
    c2d.fillStyle = 'oklch(0.25 0.04 55)';
    c2d.beginPath(); c2d.roundRect(fbarX, fbarY, fbarW, fbarH, 999); c2d.fill();
    c2d.fillStyle = fuelRemaining > 0.3 ? ACCENT : '#ef4444';
    c2d.shadowColor = ACCENT; c2d.shadowBlur = 8;
    c2d.beginPath(); c2d.roundRect(fbarX, fbarY, fbarW * fuelRemaining, fbarH, 999); c2d.fill();
    c2d.shadowBlur = 0;
    c2d.font = '400 8px "JetBrains Mono"';
    c2d.fillStyle = mc.dim;
    c2d.textAlign = 'center';
    c2d.fillText('FUEL ' + (fuelRemaining * 100).toFixed(0) + '%', padX, fbarY + 16);
  }

  // Flight trail
  if (rocketY > 0) {
    c2d.setLineDash([3, 3]);
    c2d.strokeStyle = ACCENT;
    c2d.lineWidth = 0.8;
    c2d.globalAlpha = 0.4;
    c2d.beginPath();
    c2d.moveTo(rocketCX, groundY);
    c2d.lineTo(rocketCX, rocketScreenY + rh/2);
    c2d.stroke();
    c2d.setLineDash([]);
    c2d.globalAlpha = 1;
  }

  // Summary panel after landing
  if (showSummary && summaryAlpha < 1) summaryAlpha += 0.03;
  if (showSummary && summaryAlpha > 0) {
    c2d.globalAlpha = Math.min(summaryAlpha, 0.95);
    var pw = 260, ph = 140;
    var px = w * 0.6 - pw/2, py = h * 0.35 - ph/2;
    c2d.fillStyle = 'oklch(0.15 0.04 55 / 0.85)';
    c2d.beginPath(); c2d.roundRect(px, py, pw, ph, 14); c2d.fill();
    c2d.strokeStyle = 'oklch(0.35 0.05 55 / 0.4)';
    c2d.lineWidth = 1; c2d.stroke();
    // Corner ticks
    var tl = 10;
    c2d.strokeStyle = ACCENT; c2d.lineWidth = 1; c2d.globalAlpha = summaryAlpha * 0.5;
    c2d.beginPath(); c2d.moveTo(px+8, py+8+tl); c2d.lineTo(px+8, py+8); c2d.lineTo(px+8+tl, py+8); c2d.stroke();
    c2d.beginPath(); c2d.moveTo(px+pw-8-tl, py+8); c2d.lineTo(px+pw-8, py+8); c2d.lineTo(px+pw-8, py+8+tl); c2d.stroke();
    c2d.beginPath(); c2d.moveTo(px+8, py+ph-8-tl); c2d.lineTo(px+8, py+ph-8); c2d.lineTo(px+8+tl, py+ph-8); c2d.stroke();
    c2d.beginPath(); c2d.moveTo(px+pw-8-tl, py+ph-8); c2d.lineTo(px+pw-8, py+ph-8); c2d.lineTo(px+pw-8, py+ph-8+tl); c2d.stroke();
    c2d.globalAlpha = summaryAlpha;
    c2d.font = '700 12px "JetBrains Mono"';
    c2d.fillStyle = ACCENT;
    c2d.textAlign = 'center';
    c2d.fillText(t('summary'), px + pw/2, py + 28);
    c2d.font = '400 11px "Inter"';
    c2d.fillStyle = mc.text;
    var lastFlight = flights[flights.length - 1];
    if (lastFlight) {
      c2d.fillText(t(lastFlight.type) + '  |  Ve=' + lastFlight.ve.toFixed(0) + ' m/s', px + pw/2, py + 52);
      c2d.fillText('dm/dt=' + lastFlight.dm.toFixed(2) + ' kg/s', px + pw/2, py + 72);
      c2d.font = '700 13px "Space Grotesk"';
      c2d.fillStyle = ACCENT;
      c2d.fillText(t('thrust') + ': ' + lastFlight.thrust.toFixed(1) + ' N', px + pw/2, py + 96);
      c2d.fillText(t('maxAlt') + ': ' + lastFlight.maxAlt.toFixed(1) + ' m', px + pw/2, py + 116);
    }
    c2d.globalAlpha = 1;
  }

  c2d.restore();
  requestAnimationFrame(draw);
}

// ================================================================
// Physics simulation step
// ================================================================
function simStep() {
  if (!isFlying) return;
  var typeConf = PROPULSION_TYPES[selectedType];
  var gravity = 9.81;
  var dt = 0.05;
  var thrust = 0;

  if (fuelRemaining > 0) {
    thrust = currentVe * currentDm;
    fuelRemaining -= dt * 0.08;
    if (fuelRemaining < 0) fuelRemaining = 0;
  }
  rocketThrust = thrust;

  var totalMass = typeConf.mass * (0.3 + 0.7 * fuelRemaining);
  var accel = (thrust / totalMass) - gravity;
  rocketVel += accel * dt;
  rocketY += rocketVel * dt;

  if (rocketY > maxAltitude) maxAltitude = rocketY;

  // Shake during thrust
  if (thrust > 0 && rocketY < 5) {
    shakeX = (Math.random() - 0.5) * 3;
    shakeY = (Math.random() - 0.5) * 2;
  }

  // Landing
  if (rocketY <= 0 && rocketVel < 0) {
    rocketY = 0;
    rocketVel = 0;
    isFlying = false;
    showSummary = true;
    summaryAlpha = 0;
    flights.push({
      type: typeConf.key,
      ve: currentVe,
      dm: currentDm,
      maxAlt: maxAltitude,
      thrust: currentVe * currentDm
    });
    playTone(523, 0.15, 'sine');
    setTimeout(function(){ playTone(659, 0.15, 'sine'); }, 100);
    setTimeout(function(){ playTone(784, 0.2, 'sine'); }, 200);
    updateHUD();
    document.getElementById('statusVal').textContent = t('landed');
    return;
  }

  updateHUD();
  setTimeout(simStep, 50);
}

// ================================================================
// HUD update
// ================================================================
function updateHUD() {
  document.getElementById('hv1').textContent = rocketThrust.toFixed(1) + ' N';
  document.getElementById('hv2').textContent = rocketY.toFixed(1) + ' m';
  document.getElementById('hv3').textContent = rocketVel.toFixed(1) + ' m/s';
  document.getElementById('hv4').textContent = trialCount.toString();
}

// ================================================================
// Controls
// ================================================================
function selectType(idx) {
  selectedType = idx;
  var conf = PROPULSION_TYPES[idx];
  currentVe = conf.defaultVe;
  currentDm = conf.defaultDm;
  var veSlider = document.getElementById('veSlider');
  var dmSlider = document.getElementById('dmSlider');
  veSlider.min = conf.veRange[0];
  veSlider.max = conf.veRange[1];
  veSlider.value = conf.defaultVe;
  dmSlider.min = Math.round(conf.dmRange[0] * 100);
  dmSlider.max = Math.round(conf.dmRange[1] * 100);
  dmSlider.value = Math.round(conf.defaultDm * 100);
  document.getElementById('veVal').textContent = currentVe.toFixed(0) + ' m/s';
  document.getElementById('dmVal').textContent = currentDm.toFixed(2) + ' kg/s';
  document.querySelectorAll('.type-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === idx);
  });
}

function doLaunch() {
  if (isFlying) return;
  trialCount++;
  rocketY = 0;
  rocketVel = 0;
  maxAltitude = 0;
  fuelRemaining = 1;
  isFlying = true;
  showSummary = false;
  summaryAlpha = 0;
  rocketThrust = currentVe * currentDm;
  document.getElementById('statusVal').textContent = t('flying');
  playTone(440, 0.1, 'triangle');
  shakeX = (Math.random() - 0.5) * 5;
  shakeY = (Math.random() - 0.5) * 4;
  simStep();
}

function doReset() {
  isFlying = false;
  rocketY = 0;
  rocketVel = 0;
  maxAltitude = 0;
  fuelRemaining = 1;
  rocketThrust = 0;
  showSummary = false;
  summaryAlpha = 0;
  gParticles = [];
  document.getElementById('statusVal').textContent = t('ready');
  updateHUD();
}

// ================================================================
// refreshI18N
// ================================================================
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('typeLabel').textContent = t('type_label');
  document.getElementById('veLabel').textContent = t('ve_label');
  document.getElementById('dmLabel').textContent = t('dm_label');
  document.getElementById('launchBtn').textContent = t('launch');
  document.getElementById('resetBtn').textContent = t('reset');
  document.getElementById('guideLabel').textContent = t('guide_label');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('hl1').textContent = t('thrust');
  document.getElementById('hl2').textContent = t('altitude');
  document.getElementById('hl3').textContent = t('velocity');
  document.getElementById('hl4').textContent = t('trials');
  document.getElementById('hudTag').textContent = t('title');
  document.getElementById('statusLabel').textContent = 'STATUS';
  // Update type buttons
  document.querySelectorAll('.type-btn').forEach(function(b, i) {
    b.textContent = t(PROPULSION_TYPES[i].key);
  });
}

// ================================================================
// Init
// ================================================================
(function init() {
  gc = document.getElementById('gc');
  c2d = gc.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();

  // Build type selector buttons
  var typeBtns = document.getElementById('typeBtns');
  PROPULSION_TYPES.forEach(function(pt, idx) {
    var btn = document.createElement('button');
    btn.className = 'type-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = t(pt.key);
    btn.addEventListener('click', function() { selectType(idx); });
    typeBtns.appendChild(btn);
  });

  // Sliders
  document.getElementById('veSlider').addEventListener('input', function() {
    currentVe = parseFloat(this.value);
    document.getElementById('veVal').textContent = currentVe.toFixed(0) + ' m/s';
  });
  document.getElementById('dmSlider').addEventListener('input', function() {
    currentDm = parseFloat(this.value) / 100;
    document.getElementById('dmVal').textContent = currentDm.toFixed(2) + ' kg/s';
  });

  // Buttons
  document.getElementById('launchBtn').addEventListener('click', doLaunch);
  document.getElementById('resetBtn').addEventListener('click', doReset);

  // Initial type setup
  selectType(0);
  refreshI18N();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Delayed first draw for fonts
  setTimeout(function() {
    resizeCanvas();
    draw();
  }, 100);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() {
      resizeCanvas();
    });
  }
})();
</script>
