<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滤波质检员 · Filter Inspector</title>
<style>
  :root{
    --bg-0: oklch(0.18 0.02 240);
    --bg-1: oklch(0.23 0.03 240);
    --field: oklch(0.78 0.13 215);
    --wave:  oklch(0.55 0.13 215);
    --mass:  oklch(0.35 0.10 215);
    --photon:oklch(0.92 0.08 215);
    --constant: oklch(0.85 0.14 85);
    --ink: oklch(0.92 0.02 240);
    --dim: oklch(0.62 0.03 240);
    --bad: oklch(0.65 0.18 25);
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg-0);
    color:var(--ink);
    font-family:var(--mono);
    display:flex;
    height:100vh;
    overflow:hidden;
  }
  /* ===== sidebar ===== */
  .game-sidebar{
    width:200px;
    min-width:200px;
    background:var(--bg-1);
    border-right:2px solid var(--mass);
    display:flex;
    flex-direction:column;
    padding:18px 16px;
    gap:16px;
  }
  .mascot{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .mascot svg{width:74px;height:74px;}
  .mascot .name{
    font-size:12px;
    letter-spacing:1px;
    color:var(--field);
    text-transform:uppercase;
  }
  .mascot .say{
    font-size:11px;
    line-height:1.5;
    color:var(--dim);
    text-align:center;
    min-height:46px;
  }
  .title-block{border-top:1px solid var(--mass);padding-top:14px;}
  .title-block .t1{font-size:14px;color:var(--photon);letter-spacing:1px;}
  .title-block .t2{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px;}
  .progress{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .progress .ph{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
  .dots{display:flex;gap:8px;flex-wrap:wrap;}
  .dot{
    width:26px;height:26px;
    border:1.5px solid var(--mass);
    background:transparent;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--dim);
  }
  .dot.done{border-color:var(--field);background:var(--field);color:var(--bg-0);}
  .dot.cur{border-color:var(--constant);color:var(--constant);}
  .dot.fail{border-color:var(--bad);color:var(--bad);}
  .score-line{font-size:11px;color:var(--dim);letter-spacing:1px;}
  .score-line b{color:var(--constant);}
  .spacer{flex:1;}
  #langBtn{
    border:1.5px solid var(--field);
    background:transparent;
    color:var(--field);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1px;
    padding:8px 0;
    cursor:pointer;
  }
  #langBtn:hover{background:var(--field);color:var(--bg-0);}

  /* ===== main ===== */
  .game-main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:22px 26px;
    gap:16px;
    overflow:hidden;
  }
  .head{display:flex;justify-content:space-between;align-items:flex-end;}
  .head .core-q{font-size:13px;color:var(--photon);letter-spacing:0.5px;}
  .head .case-tag{font-size:11px;color:var(--constant);letter-spacing:1px;text-transform:uppercase;}
  .stage-wrap{position:relative;flex:1;display:flex;flex-direction:column;min-height:0;}
  #cv{
    flex:1;
    width:100%;
    background:var(--bg-1);
    border:1.5px solid var(--mass);
  }
  .verdict-bar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .vbtn{
    flex:1;
    min-width:130px;
    border:1.5px solid var(--wave);
    background:var(--bg-1);
    color:var(--ink);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.4px;
    padding:11px 10px;
    cursor:pointer;
    text-align:left;
    line-height:1.4;
    transition:border-color .12s;
  }
  .vbtn .vk{display:block;color:var(--field);font-size:10px;letter-spacing:1px;margin-bottom:3px;text-transform:uppercase;}
  .vbtn:hover:not(:disabled){border-color:var(--field);}
  .vbtn:disabled{opacity:0.4;cursor:default;}
  .vbtn.picked-ok{border-color:var(--field);background:color-mix(in oklch,var(--field) 20%,var(--bg-1));}
  .vbtn.picked-bad{border-color:var(--bad);background:color-mix(in oklch,var(--bad) 18%,var(--bg-1));}
  .feedback{
    min-height:62px;
    border-left:3px solid var(--mass);
    padding:10px 14px;
    font-size:12px;
    line-height:1.55;
    color:var(--dim);
    background:var(--bg-1);
  }
  .feedback.ok{border-left-color:var(--field);color:var(--photon);}
  .feedback.bad{border-left-color:var(--bad);color:var(--ink);}
  .feedback .conseq{color:var(--bad);display:block;margin-top:5px;font-size:11px;}
  .feedback .gain{color:var(--constant);display:block;margin-top:5px;font-size:11px;}
  .next-row{display:flex;justify-content:flex-end;gap:12px;}
  #nextBtn,#resetBtn{
    border:1.5px solid var(--constant);
    background:transparent;
    color:var(--constant);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:1px;
    padding:9px 22px;
    cursor:pointer;
  }
  #nextBtn:hover,#resetBtn:hover{background:var(--constant);color:var(--bg-0);}
  #nextBtn:disabled{opacity:0.35;cursor:default;border-color:var(--mass);color:var(--mass);}
  #resetBtn{border-color:var(--wave);color:var(--wave);}
  #resetBtn:hover{background:var(--wave);color:var(--bg-0);}
  .win-overlay{
    position:absolute;inset:0;
    background:color-mix(in oklch,var(--bg-0) 88%, transparent);
    display:none;
    align-items:center;justify-content:center;
    flex-direction:column;
    gap:18px;
    text-align:center;
    padding:20px;
  }
  .win-overlay.show{display:flex;}
  .win-overlay .badge{font-size:22px;color:var(--field);letter-spacing:2px;}
  .win-overlay .sub{font-size:13px;color:var(--photon);max-width:440px;line-height:1.6;}
  .win-overlay .scr{font-size:12px;color:var(--constant);letter-spacing:1px;}
  #resetBtn2{
    border:1.5px solid var(--constant);
    background:transparent;color:var(--constant);
    font-family:var(--mono);font-size:12px;letter-spacing:1px;
    padding:9px 22px;cursor:pointer;
  }
  #resetBtn2:hover{background:var(--constant);color:var(--bg-0);}
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="mascot">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <line x1="40" y1="20" x2="40" y2="70" stroke="var(--field)" stroke-width="5"/>
        <line x1="60" y1="20" x2="60" y2="70" stroke="var(--field)" stroke-width="5"/>
        <line x1="40" y1="70" x2="60" y2="70" stroke="var(--field)" stroke-width="5"/>
        <line x1="50" y1="70" x2="50" y2="88" stroke="var(--field)" stroke-width="5"/>
        <circle cx="50" cy="50" r="30" fill="none" stroke="var(--wave)" stroke-width="1.5" opacity="0.6"/>
        <circle cx="50" cy="50" r="40" fill="none" stroke="var(--constant)" stroke-width="1.2" opacity="0.4"/>
        <circle cx="40" cy="20" r="4" fill="var(--photon)"/>
        <circle cx="60" cy="20" r="4" fill="var(--photon)"/>
      </svg>
      <div class="name">ECHO</div>
      <div class="say" id="mascotSay"></div>
    </div>
    <div class="title-block">
      <div class="t1" id="sideTitle"></div>
      <div class="t2" id="sideSub"></div>
    </div>
    <div class="progress">
      <div class="ph" id="phLabel"></div>
      <div class="dots" id="dots"></div>
      <div class="score-line" id="scoreLine"></div>
    </div>
    <div class="spacer"></div>
    <button id="langBtn" type="button">中文 / EN</button>
  </aside>

  <main class="game-main">
    <div class="head">
      <div class="core-q" id="coreQ"></div>
      <div class="case-tag" id="caseTag"></div>
    </div>
    <div class="stage-wrap">
      <canvas id="cv"></canvas>
      <div class="win-overlay" id="winOverlay">
        <div class="badge" id="winBadge"></div>
        <div class="sub" id="winSub"></div>
        <div class="scr" id="winScr"></div>
        <button id="resetBtn2" type="button"></button>
      </div>
    </div>
    <div class="verdict-bar" id="verdictBar"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-row">
      <button id="resetBtn" type="button"></button>
      <button id="nextBtn" type="button" disabled></button>
    </div>
  </main>

<script>
(function(){
  'use strict';

  // ===== i18n =====
  const I18N = {
    zh:{
      coreQ:'对比滤波前后 —— 噪声真的少了吗?',
      sideTitle:'滤波质检员',
      sideSub:'判读 5 组前后对比',
      phLabel:'案卷进度',
      mascotSay:[
        '看左右两幅波形和频谱, 滤波到底干了什么?',
        '别只看变没变, 看噪声走了、信号还在吗?',
        '欠滤波: 噪声还在. 过滤波: 信号也削了.',
        '波形扭了是相位失真; 截止边出现振铃是 Gibbs.',
        '判错会带坏后面的特征提取 —— 慎重下结论.'
      ],
      caseTag:c=>'案卷 '+c+' / 5',
      score:s=>'判定正确 <b>'+s+'</b> / 5',
      verdict:{
        good:{k:'通过 PASS',t:'噪声没了, 信号还在 —— 合格滤波'},
        under:{k:'欠滤波',t:'噪声还在, 通带太宽'},
        over:{k:'过滤波',t:'信号也被削, 通带太窄'},
        phase:{k:'相位失真',t:'波形被扭曲, 阶数有问题'},
        ring:{k:'边缘振铃',t:'Gibbs 振铃, 截止太陡'}
      },
      next:'下一组',
      finish:'完成质检',
      reset:'重置',
      okPre:'判对了. ',
      badPre:'判错了. ',
      winBadge:'解锁: 滤波质检员',
      winSub:'你能在波形和频谱里读出滤波的真实代价 —— 不会被"看起来干净"骗到, 后续特征提取才靠得住.',
      winScr:s=>'最终得分 '+s+' / 5',
      again:'重新质检',
      labelBefore:'滤波前 BEFORE',
      labelAfter:'滤波后 AFTER',
      labelWave:'时域波形',
      labelSpec:'频谱',
      hint:'逐格对比: 噪声峰走了吗? alpha 峰还在吗? 波形扭了吗? 边缘有振铃吗? 然后下结论.',
      conseqPrefix:'后果: ',
      gainPrefix:'收获: '
    },
    en:{
      coreQ:'Compare before / after — did the noise really go away?',
      sideTitle:'Filter Inspector',
      sideSub:'Judge 5 before/after cases',
      phLabel:'Case progress',
      mascotSay:[
        'Look at both waveforms and spectra — what did the filter actually do?',
        'Not just "did it change" — did noise leave AND signal stay?',
        'Under-filter: noise remains. Over-filter: signal cut too.',
        'Warped wave = phase distortion; ringing at cutoff = Gibbs.',
        'A wrong call corrupts later feature extraction — judge carefully.'
      ],
      caseTag:c=>'CASE '+c+' / 5',
      score:s=>'Correct <b>'+s+'</b> / 5',
      verdict:{
        good:{k:'PASS',t:'Noise gone, signal kept — good filter'},
        under:{k:'UNDER-FILTER',t:'Noise remains, passband too wide'},
        over:{k:'OVER-FILTER',t:'Signal cut too, passband too narrow'},
        phase:{k:'PHASE DISTORT',t:'Waveform warped, wrong order'},
        ring:{k:'EDGE RINGING',t:'Gibbs ringing, cutoff too steep'}
      },
      next:'Next',
      finish:'Finish',
      reset:'Reset',
      okPre:'Correct. ',
      badPre:'Wrong. ',
      winBadge:'UNLOCKED: Filter Inspector',
      winSub:'You can read a filter\'s true cost in waveform and spectrum — never fooled by "looks clean". Now downstream features are trustworthy.',
      winScr:s=>'Final score '+s+' / 5',
      again:'Inspect again',
      labelBefore:'BEFORE',
      labelAfter:'AFTER',
      labelWave:'Time domain',
      labelSpec:'Spectrum',
      hint:'Cell by cell: noise peak gone? alpha peak kept? wave warped? edge ringing? Then decide.',
      conseqPrefix:'Consequence: ',
      gainPrefix:'Gain: '
    }
  };

  let lang = 'zh';
  function T(){ return I18N[lang]; }

  // ===== cases =====
  const CASES = [
    {
      kind:'good', answer:'good',
      fb:{
        zh:{ok:'AFTER 频谱里 50Hz 工频和高频毛刺被压平, 而 8-12Hz alpha 峰原样保留, 时域波形干净又没变形 —— 这就是教科书级合格滤波.',
            bad:'这其实是合格滤波: 噪声峰消失、alpha 峰保留、波形不扭. 别把做对了当成出错.'},
        en:{ok:'In AFTER spectrum the 50Hz mains and HF hash are flattened while the 8-12Hz alpha peak stays intact, waveform clean and undistorted — textbook good filter.',
            bad:'This is actually a good filter: noise peaks gone, alpha peak kept, no warp. Do not mistake done-right for an error.'},
        conseq:{zh:'你把合格数据当废品扔了, 重做浪费一轮.', en:'You discarded clean data as junk — a wasted re-run.'},
        gain:{zh:'保住了一段高质量数据.', en:'Preserved a clean, usable segment.'}
      }
    },
    {
      kind:'under', answer:'under',
      fb:{
        zh:{ok:'看 AFTER 频谱 —— 50Hz 那根尖峰几乎没动, 时域里高频抖动还在. 滤波器通带留太宽, 工频噪声根本没被拦住, 这是欠滤波.',
            bad:'再看 AFTER 频谱: 50Hz 尖峰还在, 时域高频抖动也在. 噪声没走就是欠滤波, 通带太宽.'},
        en:{ok:'Look at AFTER spectrum — the 50Hz spike barely moved, HF jitter still in the trace. Passband left too wide, mains noise not blocked: under-filter.',
            bad:'Check AFTER spectrum: 50Hz spike still there, HF jitter remains. Noise stayed equals under-filter, passband too wide.'},
        conseq:{zh:'后续提 alpha 功率时混入工频, 特征值偏高失真.', en:'Later alpha-power features get inflated by leftover mains.'},
        gain:{zh:'识别出噪声没除尽, 退回收窄通带.', en:'Caught residual noise, sent back to narrow the band.'}
      }
    },
    {
      kind:'over', answer:'over',
      fb:{
        zh:{ok:'AFTER 频谱里 8-12Hz alpha 峰被一起压扁了, 时域振幅整体缩水. 通带切得太窄, 把有用的脑节律也削掉了 —— 过滤波.',
            bad:'再看一次: AFTER 的 alpha 峰矮了一大截, 信号一起被削. 这是过滤波, 通带太窄.'},
        en:{ok:'In AFTER spectrum the 8-12Hz alpha peak got flattened too, amplitude shrank overall. Passband too narrow, useful rhythm removed — over-filter.',
            bad:'Look again: AFTER alpha peak dropped a lot, signal cut with noise. Over-filter, passband too narrow.'},
        conseq:{zh:'真实 alpha 节律被削弱, 后续判睁眼闭眼会失灵.', en:'Real alpha rhythm weakened — eyes-open/closed decode will fail.'},
        gain:{zh:'守住了脑信号, 退回放宽通带.', en:'Protected brain signal, sent back to widen the band.'}
      }
    },
    {
      kind:'phase', answer:'phase',
      fb:{
        zh:{ok:'频谱看着噪声是少了, 但 AFTER 时域波形相对 BEFORE 整体扭曲、峰位错开 —— 频率成分没变形而波形变形, 是相位失真, 滤波器阶数/相位特性出了问题.',
            bad:'光看频谱会以为没事. 但 AFTER 时域波形扭了、峰错位了 —— 频谱对而波形歪就是相位失真, 是阶数问题.'},
        en:{ok:'Spectrum looks denoised, but AFTER time waveform is warped and peaks shifted vs BEFORE — components intact yet shape distorted equals phase distortion, an order/phase issue.',
            bad:'Spectrum alone looks fine. But AFTER waveform is warped, peaks shifted — spectrum OK yet shape off equals phase distortion, an order issue.'},
        conseq:{zh:'ERP 等依赖波形时刻的分析全错, 峰潜伏期不可信.', en:'ERP and latency analyses go wrong — peak timing untrustworthy.'},
        gain:{zh:'抓到了波形扭曲, 改用零相位滤波.', en:'Caught the warp, switch to zero-phase filtering.'}
      }
    },
    {
      kind:'ring', answer:'ring',
      fb:{
        zh:{ok:'AFTER 时域在突变边缘冒出一圈圈对称的衰减振荡 —— 这是 Gibbs 振铃, 截止做得太陡(过渡带太窄)逼出来的伪迹.',
            bad:'仔细看 AFTER 波形边缘: 那一串对称小振荡是 Gibbs 振铃, 因为截止太陡. 不是真信号.'},
        en:{ok:'AFTER time trace shows rings of symmetric decaying oscillation around sharp edges — that is Gibbs ringing, forced by an over-steep cutoff (too-narrow transition band).',
            bad:'Look at AFTER edges: that train of symmetric ripples is Gibbs ringing from an over-steep cutoff. Not real signal.'},
        conseq:{zh:'振铃被当成尖波/伪节律, 污染后续事件检测.', en:'Ringing mistaken for spikes/rhythms, poisoning event detection.'},
        gain:{zh:'识破振铃伪迹, 放缓过渡带.', en:'Spotted the ringing artifact, soften the transition band.'}
      }
    }
  ];

  // ===== state =====
  const stateGame = {
    idx:0,
    correct:0,
    results:[],
    judged:false,
    picked:null,
    won:false
  };

  // ===== DOM =====
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const dotsEl = document.getElementById('dots');
  const verdictBar = document.getElementById('verdictBar');
  const feedbackEl = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextBtn');
  const resetBtn = document.getElementById('resetBtn');
  const resetBtn2 = document.getElementById('resetBtn2');
  const langBtn = document.getElementById('langBtn');
  const winOverlay = document.getElementById('winOverlay');

  const VERDICT_ORDER = ['good','under','over','phase','ring'];

  // ===== waveform generators =====
  function pseudo(x){
    const s = Math.sin(x * 127.1 + 311.7) * 43758.5453;
    return s - Math.floor(s);
  }

  function genCase(kind){
    const N = 256;
    const before = new Array(N);
    const after = new Array(N);
    for(let i=0;i<N;i++){
      const t = i / N;
      const alpha = Math.sin(t * Math.PI * 2 * 10);
      const drift = 0.25 * Math.sin(t * Math.PI * 2 * 1.5);
      const mains = 0.55 * Math.sin(t * Math.PI * 2 * 50);
      const hash = 0.22 * (pseudo(i*7.13) - 0.5);
      before[i] = alpha + drift + mains + hash;
      let a;
      if(kind==='good'){
        a = alpha + 0.05*drift;
      } else if(kind==='under'){
        a = alpha + 0.05*drift + 0.5*mains + 0.18*(pseudo(i*7.13)-0.5);
      } else if(kind==='over'){
        a = 0.4*alpha;
      } else if(kind==='phase'){
        const ts = (t + 0.06);
        a = Math.sin(ts * Math.PI * 2 * 10) * (1 + 0.4*Math.sin(t*Math.PI*2*2));
      } else if(kind==='ring'){
        a = alpha + 0.04*drift;
        const edge = Math.abs(t - 0.5);
        if(edge < 0.18){
          a += 0.6 * Math.exp(-edge*16) * Math.sin((t-0.5)*Math.PI*2*45);
        }
      }
      after[i] = a;
    }
    return {before, after, N};
  }

  function spectrum(arr){
    const freqs = [1.5,4,8,10,12,20,30,50];
    return freqs.map(f=>{
      let re=0, im=0;
      const N = arr.length;
      for(let i=0;i<N;i++){
        const ph = 2*Math.PI*f*(i/N);
        re += arr[i]*Math.cos(ph);
        im -= arr[i]*Math.sin(ph);
      }
      return {f, mag: Math.sqrt(re*re+im*im)/N*4};
    });
  }

  // ===== rendering =====
  function cssColor(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function fitCanvas(){
    const r = cv.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.max(2, Math.floor(r.width * dpr));
    cv.height = Math.max(2, Math.floor(r.height * dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawCase();
  }

  function drawCase(){
    const r = cv.getBoundingClientRect();
    const W = r.width, H = r.height;
    if(W<2||H<2) return;
    ctx.clearRect(0,0,W,H);
    const data = genCase(CASES[stateGame.idx].kind);
    const tt = T();

    const colBefore = cssColor('--wave');
    const colAfter = cssColor('--field');
    const colDim = cssColor('--dim');

    const padX = 14, padY = 26, gap = 14;
    const colW = (W - padX*2 - gap)/2;
    const rowH = (H - padY*2 - gap)/2;
    const cells = [
      {x:padX, y:padY, w:colW, h:rowH, type:'wave', dat:data.before, col:colBefore, label:tt.labelBefore+' · '+tt.labelWave},
      {x:padX+colW+gap, y:padY, w:colW, h:rowH, type:'wave', dat:data.after, col:colAfter, label:tt.labelAfter+' · '+tt.labelWave},
      {x:padX, y:padY+rowH+gap, w:colW, h:rowH, type:'spec', dat:data.before, col:colBefore, label:tt.labelBefore+' · '+tt.labelSpec},
      {x:padX+colW+gap, y:padY+rowH+gap, w:colW, h:rowH, type:'spec', dat:data.after, col:colAfter, label:tt.labelAfter+' · '+tt.labelSpec}
    ];

    ctx.font = '11px JetBrains Mono, monospace';
    for(const c of cells){
      ctx.strokeStyle = cssColor('--mass');
      ctx.lineWidth = 1;
      ctx.strokeRect(c.x, c.y, c.w, c.h);
      ctx.fillStyle = colDim;
      ctx.textAlign = 'left';
      ctx.fillText(c.label, c.x+4, c.y-8);
      if(c.type==='wave'){
        drawWave(c, c.dat, c.col);
      } else {
        drawSpec(c, spectrum(c.dat), c.col, colDim);
      }
    }
  }

  function drawWave(cell, arr, col){
    const {x,y,w,h} = cell;
    const midY = y + h/2;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, midY); ctx.lineTo(x+w, midY); ctx.stroke();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    const N = arr.length;
    const amp = h*0.40;
    let max=0; for(let i=0;i<N;i++){ if(Math.abs(arr[i])>max) max=Math.abs(arr[i]); }
    const scale = max>0 ? 1/Math.max(max,1.6) : 1;
    for(let i=0;i<N;i++){
      const px = x + (i/(N-1))*w;
      const py = midY - arr[i]*amp*scale;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  function drawSpec(cell, spec, col, colDim){
    const {x,y,w,h} = cell;
    const base = y + h - 14;
    let max = 0; for(const s of spec) if(s.mag>max) max=s.mag;
    max = Math.max(max, 0.4);
    const n = spec.length;
    const bw = w/n*0.6;
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.textAlign='center';
    for(let i=0;i<n;i++){
      const bx = x + (i+0.5)*(w/n) - bw/2;
      const bh = (spec[i].mag/max)*(h-28);
      const isAlpha = spec[i].f>=8 && spec[i].f<=12;
      const isMains = spec[i].f===50;
      ctx.fillStyle = isAlpha ? col : (isMains ? cssColor('--bad') : 'rgba(255,255,255,0.30)');
      ctx.fillRect(bx, base-bh, bw, bh);
      ctx.fillStyle = colDim;
      ctx.fillText(spec[i].f+'', bx+bw/2, base+11);
    }
  }

  // ===== UI render =====
  function renderSidebar(){
    const tt = T();
    document.getElementById('sideTitle').textContent = tt.sideTitle;
    document.getElementById('sideSub').textContent = tt.sideSub;
    document.getElementById('phLabel').textContent = tt.phLabel;
    document.getElementById('mascotSay').textContent = tt.mascotSay[stateGame.idx];
    document.getElementById('scoreLine').innerHTML = tt.score(stateGame.correct);
    dotsEl.innerHTML = '';
    for(let i=0;i<CASES.length;i++){
      const d = document.createElement('div');
      d.className='dot';
      d.textContent = (i+1)+'';
      if(stateGame.results[i]==='done') d.classList.add('done');
      else if(stateGame.results[i]==='fail') d.classList.add('fail');
      else if(i===stateGame.idx) d.classList.add('cur');
      dotsEl.appendChild(d);
    }
  }

  function renderHead(){
    const tt = T();
    document.getElementById('coreQ').textContent = tt.coreQ;
    document.getElementById('caseTag').textContent = tt.caseTag(stateGame.idx+1);
  }

  function renderVerdicts(){
    const tt = T();
    verdictBar.innerHTML = '';
    const correctKey = CASES[stateGame.idx].answer;
    for(const key of VERDICT_ORDER){
      const v = tt.verdict[key];
      const b = document.createElement('button');
      b.type='button';
      b.className='vbtn';
      b.dataset.key = key;
      b.innerHTML = '<span class="vk">'+v.k+'</span>'+v.t;
      if(stateGame.judged){
        b.disabled = true;
        if(key===stateGame.picked){
          b.classList.add(stateGame.picked===correctKey ? 'picked-ok':'picked-bad');
        }
        if(key===correctKey && stateGame.picked!==key){
          b.classList.add('picked-ok');
        }
      }
      b.addEventListener('click', onVerdict);
      verdictBar.appendChild(b);
    }
  }

  function renderFeedback(){
    const tt = T();
    feedbackEl.className='feedback';
    if(!stateGame.judged){
      feedbackEl.textContent = tt.hint;
      return;
    }
    const cs = CASES[stateGame.idx];
    const isOk = stateGame.picked===cs.answer;
    const fb = cs.fb[lang];
    feedbackEl.classList.add(isOk?'ok':'bad');
    let html = (isOk?tt.okPre:tt.badPre) + (isOk?fb.ok:fb.bad);
    if(isOk){
      html += '<span class="gain">'+tt.gainPrefix+cs.fb.gain[lang]+'</span>';
    } else {
      html += '<span class="conseq">'+tt.conseqPrefix+cs.fb.conseq[lang]+'</span>';
    }
    feedbackEl.innerHTML = html;
  }

  function renderButtons(){
    const tt = T();
    nextBtn.textContent = (stateGame.idx===CASES.length-1) ? tt.finish : tt.next;
    resetBtn.textContent = tt.reset;
    resetBtn2.textContent = tt.again;
    nextBtn.disabled = !stateGame.judged;
  }

  function renderAll(){
    renderSidebar();
    renderHead();
    renderVerdicts();
    renderFeedback();
    renderButtons();
    drawCase();
  }

  // ===== handlers =====
  function onVerdict(e){
    if(stateGame.judged) return;
    const key = e.currentTarget.dataset.key;
    stateGame.picked = key;
    stateGame.judged = true;
    const cs = CASES[stateGame.idx];
    if(key===cs.answer){
      stateGame.correct++;
      stateGame.results[stateGame.idx]='done';
    } else {
      stateGame.results[stateGame.idx]='fail';
    }
    renderAll();
  }

  function onNext(){
    if(!stateGame.judged) return;
    if(stateGame.idx===CASES.length-1){
      showWin();
      return;
    }
    stateGame.idx++;
    stateGame.judged=false;
    stateGame.picked=null;
    renderAll();
  }

  function showWin(){
    const tt = T();
    stateGame.won = true;
    document.getElementById('winBadge').textContent = tt.winBadge;
    document.getElementById('winSub').textContent = tt.winSub;
    document.getElementById('winScr').textContent = tt.winScr(stateGame.correct);
    winOverlay.classList.add('show');
  }

  function resetGame(){
    stateGame.idx=0;
    stateGame.correct=0;
    stateGame.results=[];
    stateGame.judged=false;
    stateGame.picked=null;
    stateGame.won=false;
    winOverlay.classList.remove('show');
    renderAll();
  }

  function toggleLang(){
    lang = lang==='zh' ? 'en' : 'zh';
    document.documentElement.lang = lang==='zh'?'zh':'en';
    if(stateGame.won){
      const tt=T();
      document.getElementById('winBadge').textContent = tt.winBadge;
      document.getElementById('winSub').textContent = tt.winSub;
      document.getElementById('winScr').textContent = tt.winScr(stateGame.correct);
    }
    renderAll();
  }

  // ===== bind =====
  nextBtn.addEventListener('click', onNext);
  resetBtn.addEventListener('click', resetGame);
  resetBtn2.addEventListener('click', resetGame);
  langBtn.addEventListener('click', toggleLang);
  window.addEventListener('resize', fitCanvas);

  renderAll();
  requestAnimationFrame(fitCanvas);
})();
</script>
</body>
