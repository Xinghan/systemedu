<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>采样率调参 · Sampling Tuner</title>
<style>
:root{
  /* 第 1 层 — 共享深空底 */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg: oklch(0.96 0.01 265);
  --fg-dim: oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold: oklch(0.85 0.14 85);
  /* 第 2 层 — neuro accent */
  --neuro: oklch(0.75 0.17 25);
  /* 第 3 层 — neuro 5 色 palette */
  --synaptic: oklch(0.75 0.17 25);
  --dendrite: oklch(0.55 0.15 25);
  --axon: oklch(0.32 0.10 25);
  --firing: oklch(0.92 0.08 25);
  --memory: oklch(0.85 0.14 85);
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background: var(--bg-0);
  color: var(--fg);
  font-family: var(--mono);
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ---------- sidebar ---------- */
.game-sidebar{
  width:200px;
  min-width:200px;
  background: var(--bg-1);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  padding:14px 13px;
  gap:13px;
  overflow-y:auto;
}
.brand{font-size:11px; letter-spacing:.12em; color:var(--fg-mute);}
.brand b{display:block; font-size:14px; letter-spacing:.04em; color:var(--neuro); margin-top:3px;}

.mascot-box{
  background: var(--bg-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:9px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.mascot-name{font-size:10px; color:var(--fg-dim); letter-spacing:.06em;}

.ctrl{display:flex; flex-direction:column; gap:6px;}
.ctrl label{font-size:11px; color:var(--fg-dim); display:flex; justify-content:space-between; align-items:baseline;}
.ctrl .val{font-size:14px; color:var(--neuro); font-weight:700;}
input[type=range]{
  -webkit-appearance:none; appearance:none;
  width:100%; height:5px; border-radius:3px;
  background: linear-gradient(90deg, var(--axon), var(--dendrite), var(--synaptic));
  outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:16px; height:16px; border-radius:50%;
  background: var(--firing);
  border:2px solid var(--bg-0);
  cursor:pointer;
  box-shadow: 2px 2px 0 var(--bg-0);
}
input[type=range]::-moz-range-thumb{
  width:16px; height:16px; border-radius:50%;
  background: var(--firing); border:2px solid var(--bg-0); cursor:pointer;
}

.task{
  background: var(--bg-2);
  border:1px solid var(--line);
  border-left:3px solid var(--neuro);
  border-radius:6px;
  padding:9px;
  font-size:11px;
  line-height:1.55;
  color:var(--fg-dim);
}
.task b{color:var(--firing);}
.task .nyq{color:var(--neuro);}

.status{
  background: var(--bg-2);
  border:1px solid var(--line);
  border-radius:6px;
  padding:9px;
  font-size:11px;
  line-height:1.5;
}
.status .s-line{display:flex; justify-content:space-between; margin-bottom:3px;}
.status .s-key{color:var(--fg-mute);}
.status .s-ok{color:var(--memory); font-weight:700;}
.status .s-bad{color:var(--dendrite); font-weight:700;}

.legend{font-size:10px; color:var(--fg-mute); line-height:1.7;}
.legend .sw{display:inline-block; width:18px; height:3px; vertical-align:middle; margin-right:5px;}
.legend .sw.real{background:var(--fg-mute);}
.legend .sw.samp{background:var(--synaptic);}
.legend .dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--firing); vertical-align:middle; margin-right:5px;}

.lang-btn{
  margin-top:auto;
  background: var(--bg-3);
  color: var(--fg);
  border:1px solid var(--line-strong);
  border-radius:6px;
  padding:7px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.08em;
  cursor:pointer;
  box-shadow: 3px 3px 0 var(--bg-0);
}
.lang-btn:hover{border-color:var(--neuro); color:var(--neuro);}

/* ---------- main ---------- */
.game-main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:16px;
  gap:10px;
  min-width:0;
}
.head{display:flex; justify-content:space-between; align-items:baseline;}
.head h1{font-size:16px; letter-spacing:.03em; font-weight:700;}
.head .hud{font-size:12px; color:var(--fg-dim);}
.head .hud b{color:var(--neuro);}

.stage{
  flex:1;
  display:flex;
  flex-direction:column;
  background: var(--bg-1);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  min-height:0;
}
canvas{
  flex:1;
  width:100%;
  display:block;
  border-radius:6px;
}
.caption{
  font-size:12px;
  color:var(--fg-dim);
  line-height:1.5;
  min-height:34px;
  padding:2px 4px;
}
.caption b{color:var(--firing);}
.caption .win{color:var(--memory); font-weight:700;}
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="brand">CORTEX MAP · NRO-20<b data-i18n="brand">采样率调参</b></div>

    <div class="mascot-box">
      <svg width="92" height="72" viewBox="0 0 92 72" aria-hidden="true">
        <!-- Spark — branching dendrite creature -->
        <g stroke="var(--dendrite)" stroke-width="2.4" fill="none" stroke-linecap="round">
          <path d="M46 60 L46 40"/>
          <path d="M46 44 L32 30"/>
          <path d="M46 44 L60 30"/>
          <path d="M32 30 L24 20"/>
          <path d="M32 30 L38 18"/>
          <path d="M60 30 L68 20"/>
          <path d="M60 30 L54 18"/>
        </g>
        <circle cx="46" cy="40" r="7" fill="var(--synaptic)"/>
        <circle cx="24" cy="20" r="4" fill="var(--firing)"/>
        <circle cx="38" cy="18" r="4" fill="var(--firing)"/>
        <circle cx="68" cy="20" r="4" fill="var(--firing)"/>
        <circle cx="54" cy="18" r="4" fill="var(--firing)"/>
        <circle cx="46" cy="40" r="3" fill="var(--bg-0)"/>
      </svg>
      <div class="mascot-name">Spark</div>
    </div>

    <div class="ctrl">
      <label><span data-i18n="rateLabel">采样率 fs</span><span class="val"><span id="rateVal">120</span> Hz</span></label>
      <input type="range" id="rate" min="10" max="500" step="2" value="120">
    </div>

    <div class="task">
      <b data-i18n="taskTitle">任务</b><br>
      <span data-i18n="taskBody">脑波里藏着一段 30Hz 的 beta 节律。拨动滑块，找到能还原这段快波的最低采样率。</span><br>
      <span class="nyq" data-i18n="taskHint">提示：奈奎斯特说 fs 至少要 2× 信号最高频率。</span>
    </div>

    <div class="status">
      <div class="s-line"><span class="s-key" data-i18n="stBeta">beta 还原</span><span id="stBeta" class="s-bad">失真</span></div>
      <div class="s-line"><span class="s-key" data-i18n="stNyq">奈奎斯特</span><span id="stNyq" class="s-bad">不足</span></div>
      <div class="s-line"><span class="s-key" data-i18n="stMin">达标最低 fs</span><span id="stMin" class="s-key">60 Hz</span></div>
    </div>

    <div class="legend">
      <div><span class="sw real"></span><span data-i18n="lgReal">真实脑波</span></div>
      <div><span class="sw samp"></span><span data-i18n="lgRecon">采样重建</span></div>
      <div><span class="dot"></span><span data-i18n="lgDot">采样点</span></div>
    </div>

    <button class="lang-btn" id="langBtn">EN / 中文</button>
  </aside>

  <main class="game-main">
    <div class="head">
      <h1 data-i18n="title">采样率 vs 波形重建</h1>
      <div class="hud" data-i18n="hud1">最高频率 <b>30 Hz</b> · 奈奎斯特 <b>60 Hz</b></div>
    </div>
    <div class="stage">
      <canvas id="cv"></canvas>
    </div>
    <div class="caption" id="caption"></div>
  </main>

<script>
(function(){
  "use strict";

  // ---------- 真实连续脑波: alpha 10Hz + beta 30Hz + 低频漂移 ----------
  // 单位: 振幅无量纲, 时间窗 0.3s 显示
  var WIN_SEC = 0.3;        // 显示时间窗 (秒)
  var F_ALPHA = 10;         // alpha 节律 Hz
  var F_BETA = 30;          // beta 节律 Hz (任务目标)
  var F_DRIFT = 2;          // 慢漂移 Hz
  var NYQUIST = 2 * F_BETA; // 60 Hz — 还原 beta 的理论下限

  function trueWave(t){
    return 0.55 * Math.sin(2*Math.PI*F_ALPHA*t)
         + 0.40 * Math.sin(2*Math.PI*F_BETA*t + 0.6)
         + 0.30 * Math.sin(2*Math.PI*F_DRIFT*t);
  }

  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var rate = document.getElementById('rate');
  var rateVal = document.getElementById('rateVal');
  var stBeta = document.getElementById('stBeta');
  var stNyq = document.getElementById('stNyq');
  var captionEl = document.getElementById('caption');

  var css = getComputedStyle(document.documentElement);
  function C(name){ return css.getPropertyValue(name).trim(); }
  var COL = {
    bg0: C('--bg-0'), bg2: C('--bg-2'),
    line: C('--line'), lineStrong: C('--line-strong'),
    fg: C('--fg'), fgDim: C('--fg-dim'), fgMute: C('--fg-mute'),
    neuro: C('--neuro'), synaptic: C('--synaptic'),
    dendrite: C('--dendrite'), firing: C('--firing'), gold: C('--gold')
  };

  var dpr = Math.max(1, window.devicePixelRatio || 1);
  var W = 0, H = 0, pad = {l:46, r:18, t:22, b:26};

  function resize(){
    var r = cv.getBoundingClientRect();
    W = Math.max(320, r.width);
    H = Math.max(220, r.height);
    cv.width = Math.round(W * dpr);
    cv.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  // 坐标映射
  function px(t){ return pad.l + (t / WIN_SEC) * (W - pad.l - pad.r); }
  function py(v){
    var mid = pad.t + (H - pad.t - pad.b) / 2;
    var amp = (H - pad.t - pad.b) / 2 - 6;
    return mid - v * (amp / 1.4); // 1.4 ≈ 信号峰值
  }

  function draw(){
    var fs = parseInt(rate.value, 10);
    ctx.clearRect(0, 0, W, H);

    // 背景
    ctx.fillStyle = COL.bg0;
    ctx.fillRect(0, 0, W, H);

    // 中线
    ctx.strokeStyle = COL.line;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, py(0)); ctx.lineTo(W - pad.r, py(0));
    ctx.stroke();

    // 竖向网格 (每 0.05s)
    ctx.strokeStyle = COL.line;
    ctx.globalAlpha = 0.5;
    for (var g = 0; g <= WIN_SEC + 1e-9; g += 0.05){
      ctx.beginPath();
      ctx.moveTo(px(g), pad.t); ctx.lineTo(px(g), H - pad.b);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // 轴标签
    ctx.fillStyle = COL.fgMute;
    ctx.font = '10px ' + COL_FONT;
    ctx.textAlign = 'left';
    ctx.fillText('+', 6, py(1.2) + 3);
    ctx.fillText('0', 8, py(0) + 3);
    ctx.fillText('-', 6, py(-1.2) + 3);
    ctx.textAlign = 'center';
    ctx.fillText('0', px(0), H - pad.b + 14);
    ctx.fillText('0.15s', px(0.15), H - pad.b + 14);
    ctx.fillText('0.30s', px(0.30) - 12, H - pad.b + 14);

    // (1) 真实连续脑波 — 细灰线
    ctx.strokeStyle = COL.fgMute;
    ctx.lineWidth = 1.4;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    var steps = 600;
    for (var i = 0; i <= steps; i++){
      var t = (i / steps) * WIN_SEC;
      var x = px(t), y = py(trueWave(t));
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // (2) 采样点 + 折线重建 (zero-order interpolation between samples)
    var dt = 1 / fs;
    var samples = [];
    for (var tt = 0; tt <= WIN_SEC + 1e-9; tt += dt){
      samples.push({ t: tt, v: trueWave(tt) });
    }

    // 重建折线 (linear interpolation 连接采样点)
    ctx.strokeStyle = COL.synaptic;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    for (var j = 0; j < samples.length; j++){
      var sx = px(samples[j].t), sy = py(samples[j].v);
      if (j === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // 采样点 — 只在采样不太密时画点 (避免堆成一团)
    if (samples.length <= 80){
      ctx.fillStyle = COL.firing;
      for (var k = 0; k < samples.length; k++){
        ctx.beginPath();
        ctx.arc(px(samples[k].t), py(samples[k].v), 3, 0, Math.PI*2);
        ctx.fill();
      }
    }

    // ---------- 判定: beta 是否还原 ----------
    // 用重建波在密集采样下与真实波的均方误差作为还原度
    var err = reconError(samples);
    var betaOk = fs >= NYQUIST && err < 0.16;   // 达到奈奎斯特且误差小
    var nyqOk = fs >= NYQUIST;
    var goldWin = fs >= NYQUIST && fs <= 100;    // 找到接近最低的达标区间

    // HUD 框 (右上角, fs 与状态)
    drawHud(fs, betaOk, nyqOk);

    // gold 高亮: 250Hz 区间提示 (在画布顶部标注典型 EEG 设置)
    if (fs >= 200){
      ctx.fillStyle = COL.gold;
      ctx.font = 'bold 11px ' + COL_FONT;
      ctx.textAlign = 'right';
      ctx.fillText(LANG === 'zh' ? '250Hz 临床档：alpha/beta 全捕捉' : '250Hz clinical: alpha+beta captured', W - pad.r - 4, pad.t + 12);
    }

    // 更新侧栏状态 + caption
    updatePanels(fs, betaOk, nyqOk, goldWin);
  }

  var COL_FONT = 'JetBrains Mono, monospace';

  function reconError(samples){
    // 线性插值重建, 与真实波 600 点比较均方误差
    if (samples.length < 2) return 1;
    var sum = 0, n = 0;
    for (var i = 0; i <= 600; i++){
      var t = (i / 600) * WIN_SEC;
      // 找到 t 所在采样区间
      var idx = Math.min(samples.length - 2, Math.floor(t / (1/parseInt(rate.value,10))));
      var a = samples[idx], b = samples[idx+1];
      var rec;
      if (b && b.t !== a.t){
        var frac = (t - a.t) / (b.t - a.t);
        rec = a.v + (b.v - a.v) * Math.max(0, Math.min(1, frac));
      } else {
        rec = a.v;
      }
      var d = rec - trueWave(t);
      sum += d * d; n++;
    }
    return Math.sqrt(sum / n);
  }

  function drawHud(fs, betaOk, nyqOk){
    var bw = 116, bh = 50, bx = pad.l + 6, by = pad.t + 4;
    ctx.fillStyle = COL.bg2;
    ctx.strokeStyle = COL.lineStrong;
    ctx.lineWidth = 1;
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.textAlign = 'left';
    ctx.fillStyle = COL.fgDim;
    ctx.font = '10px ' + COL_FONT;
    ctx.fillText('fs', bx + 8, by + 16);
    ctx.fillStyle = COL.neuro;
    ctx.font = 'bold 15px ' + COL_FONT;
    ctx.fillText(fs + ' Hz', bx + 26, by + 17);
    ctx.font = '10px ' + COL_FONT;
    ctx.fillStyle = betaOk ? COL.gold : COL.dendrite;
    ctx.fillText(LANG === 'zh' ? (betaOk ? 'beta 已还原' : 'beta 失真') : (betaOk ? 'beta OK' : 'beta lost'), bx + 8, by + 36);
  }

  // ---------- i18n ----------
  var LANG = 'zh';
  var I18N = {
    brand:    {zh:'采样率调参', en:'Sampling Tuner'},
    rateLabel:{zh:'采样率 fs', en:'Sample rate fs'},
    taskTitle:{zh:'任务', en:'TASK'},
    taskBody: {zh:'脑波里藏着一段 30Hz 的 beta 节律。拨动滑块，找到能还原这段快波的最低采样率。',
               en:'A 30Hz beta rhythm hides in the wave. Drag the slider to find the lowest sample rate that rebuilds it.'},
    taskHint: {zh:'提示：奈奎斯特说 fs 至少要 2× 信号最高频率。',
               en:'Hint: Nyquist says fs must be at least 2x the highest frequency.'},
    stBeta:   {zh:'beta 还原', en:'beta recon'},
    stNyq:    {zh:'奈奎斯特', en:'Nyquist'},
    stMin:    {zh:'达标最低 fs', en:'min ok fs'},
    lgReal:   {zh:'真实脑波', en:'true wave'},
    lgRecon:  {zh:'采样重建', en:'reconstructed'},
    lgDot:    {zh:'采样点', en:'sample pts'},
    title:    {zh:'采样率 vs 波形重建', en:'Sample rate vs reconstruction'},
    hud1:     {zh:'最高频率 <b>30 Hz</b> · 奈奎斯特 <b>60 Hz</b>', en:'max freq <b>30 Hz</b> · Nyquist <b>60 Hz</b>'}
  };

  function applyI18N(){
    var els = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < els.length; i++){
      var key = els[i].getAttribute('data-i18n');
      if (I18N[key]) els[i].innerHTML = I18N[key][LANG];
    }
  }

  function updatePanels(fs, betaOk, nyqOk, goldWin){
    stBeta.textContent = LANG === 'zh' ? (betaOk ? '已还原' : '失真') : (betaOk ? 'OK' : 'lost');
    stBeta.className = betaOk ? 's-ok' : 's-bad';
    stNyq.textContent = LANG === 'zh' ? (nyqOk ? '达到' : '不足') : (nyqOk ? 'met' : 'under');
    stNyq.className = nyqOk ? 's-ok' : 's-bad';

    var cap;
    if (fs < 25){
      cap = LANG === 'zh'
        ? '采样太稀，连线只剩锯齿——快波完全丢失，甚至出现<b>虚假的慢波</b>（混叠）。'
        : 'Too sparse. The line is jagged, the fast wave is gone, and a <b>false slow wave</b> appears (aliasing).';
    } else if (fs < NYQUIST){
      cap = LANG === 'zh'
        ? '比 alpha 够，但还<b>没到 beta 的奈奎斯特 60Hz</b>，30Hz 快波被压扁、错位。'
        : 'Enough for alpha, but <b>below beta Nyquist 60Hz</b>; the 30Hz fast wave is flattened and shifted.';
    } else if (goldWin){
      cap = LANG === 'zh'
        ? '<span class="win">达标！</span>fs 越过 60Hz 后，重建波贴住真实脑波，30Hz beta 被完整捕捉。'
        : '<span class="win">Got it!</span> Past 60Hz the reconstruction hugs the true wave; 30Hz beta is fully captured.';
    } else {
      cap = LANG === 'zh'
        ? '采样很充足，重建几乎与真实波重合。临床 EEG 常用 250Hz 留足余量。'
        : 'Plenty of samples; reconstruction nearly overlaps the truth. Clinical EEG often uses 250Hz for margin.';
    }
    captionEl.innerHTML = cap;
  }

  // ---------- events ----------
  rate.addEventListener('input', function(){
    rateVal.textContent = rate.value;
    draw();
  });

  document.getElementById('langBtn').addEventListener('click', function(){
    LANG = (LANG === 'zh') ? 'en' : 'zh';
    document.documentElement.lang = LANG;
    applyI18N();
    rateVal.textContent = rate.value;
    draw();
  });

  window.addEventListener('resize', resize);

  // init
  applyI18N();
  // 等一帧拿到布局尺寸
  requestAnimationFrame(function(){ resize(); });
})();
</script>
</body>
</html>
