<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>造波沙盒 · Wave Forge</title>
<style>
:root{
  /* 第 1 层 — 共享深空底 */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg: oklch(0.96 0.01 265);
  --fg-dim: oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold: oklch(0.85 0.14 85);
  /* 第 2 层 — neuro accent */
  --neuro: oklch(0.75 0.17 25);
  /* 第 3 层 — neuro 5 色 palette */
  --synaptic: oklch(0.75 0.17 25);
  --dendrite: oklch(0.55 0.15 25);
  --axon: oklch(0.32 0.10 25);
  --firing: oklch(0.92 0.08 25);
  --memory: oklch(0.85 0.14 85);
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background: var(--bg-0);
  color: var(--fg);
  font-family: var(--mono);
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ---------- sidebar ---------- */
.game-sidebar{
  width:200px;
  min-width:200px;
  background: var(--bg-1);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  padding:13px 12px;
  gap:11px;
  overflow-y:auto;
}
.brand{font-size:10px; letter-spacing:.12em; color:var(--fg-mute);}
.brand b{display:block; font-size:14px; letter-spacing:.04em; color:var(--neuro); margin-top:3px;}

.mascot-box{
  background: var(--bg-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.mascot-name{font-size:10px; color:var(--fg-dim); letter-spacing:.06em;}

.ctrl{display:flex; flex-direction:column; gap:5px;}
.ctrl label{font-size:11px; color:var(--fg-dim); display:flex; justify-content:space-between; align-items:baseline;}
.ctrl .val{font-size:13px; font-weight:700;}
.ctrl .val.f{color:var(--firing);}
.ctrl .val.a{color:var(--synaptic);}
.ctrl .val.fs{color:var(--neuro);}
input[type=range]{
  -webkit-appearance:none; appearance:none;
  width:100%; height:5px; border-radius:3px;
  outline:none;
}
#freq{background: linear-gradient(90deg, var(--axon), var(--firing));}
#amp{background: linear-gradient(90deg, var(--axon), var(--synaptic));}
#rate{background: linear-gradient(90deg, var(--axon), var(--dendrite), var(--synaptic));}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:16px; height:16px; border-radius:50%;
  background: var(--firing);
  border:2px solid var(--bg-0);
  cursor:pointer;
  box-shadow: 2px 2px 0 var(--bg-0);
}
input[type=range]::-moz-range-thumb{
  width:16px; height:16px; border-radius:50%;
  background: var(--firing); border:2px solid var(--bg-0); cursor:pointer;
}

.task{
  background: var(--bg-2);
  border:1px solid var(--line);
  border-left:3px solid var(--neuro);
  border-radius:6px;
  padding:8px;
  font-size:11px;
  line-height:1.5;
  color:var(--fg-dim);
}
.task b{color:var(--firing);}
.task .goal{color:var(--memory); font-weight:700;}
.task .prog{color:var(--neuro); font-weight:700;}

.legend{font-size:10px; color:var(--fg-mute); line-height:1.7;}
.legend .sw{display:inline-block; width:18px; height:3px; vertical-align:middle; margin-right:5px;}
.legend .sw.real{background:var(--fg-mute);}
.legend .sw.samp{background:var(--synaptic);}
.legend .sw.tgt{background:var(--memory); height:2px;}
.legend .dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--firing); vertical-align:middle; margin-right:5px;}

.lang-btn{
  margin-top:auto;
  background: var(--bg-3);
  color: var(--fg);
  border:1px solid var(--line-strong);
  border-radius:6px;
  padding:7px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.08em;
  cursor:pointer;
  box-shadow: 3px 3px 0 var(--bg-0);
}
.lang-btn:hover{border-color:var(--neuro); color:var(--neuro);}

/* ---------- main ---------- */
.game-main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:16px;
  gap:10px;
  min-width:0;
}
.head{display:flex; justify-content:space-between; align-items:baseline; gap:12px;}
.head h1{font-size:16px; letter-spacing:.03em; font-weight:700;}
.head .hud{font-size:12px; color:var(--fg-dim); display:flex; gap:14px;}
.head .hud span b{color:var(--neuro);}
.head .hud .aliasFlag{color:var(--dendrite); font-weight:700;}
.head .hud .aliasFlag.hide{display:none;}

.stage{
  flex:1;
  display:flex;
  flex-direction:column;
  background: var(--bg-1);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  min-height:0;
}
canvas{
  flex:1;
  width:100%;
  display:block;
  border-radius:6px;
}
.caption{
  font-size:12px;
  color:var(--fg-dim);
  line-height:1.5;
  min-height:34px;
  padding:2px 4px;
}
.caption b{color:var(--firing);}
.caption .win{color:var(--memory); font-weight:700;}
.caption .alias{color:var(--dendrite); font-weight:700;}
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="brand">CORTEX MAP · NRO-20<b data-i18n="brand">造波沙盒</b></div>

    <div class="mascot-box">
      <svg width="88" height="66" viewBox="0 0 92 72" aria-hidden="true">
        <g stroke="var(--dendrite)" stroke-width="2.4" fill="none" stroke-linecap="round">
          <path d="M46 60 L46 40"/>
          <path d="M46 44 L32 30"/>
          <path d="M46 44 L60 30"/>
          <path d="M32 30 L24 20"/>
          <path d="M32 30 L38 18"/>
          <path d="M60 30 L68 20"/>
          <path d="M60 30 L54 18"/>
        </g>
        <circle cx="46" cy="40" r="7" fill="var(--synaptic)"/>
        <circle cx="24" cy="20" r="4" fill="var(--firing)"/>
        <circle cx="38" cy="18" r="4" fill="var(--firing)"/>
        <circle cx="68" cy="20" r="4" fill="var(--firing)"/>
        <circle cx="54" cy="18" r="4" fill="var(--firing)"/>
        <circle cx="46" cy="40" r="3" fill="var(--bg-0)"/>
      </svg>
      <div class="mascot-name">Spark</div>
    </div>

    <div class="ctrl">
      <label><span data-i18n="freqLabel">频率 f</span><span class="val f"><span id="freqVal">10</span> Hz</span></label>
      <input type="range" id="freq" min="2" max="40" step="1" value="10">
    </div>
    <div class="ctrl">
      <label><span data-i18n="ampLabel">幅度 A</span><span class="val a"><span id="ampVal">0.6</span></span></label>
      <input type="range" id="amp" min="0.2" max="1.0" step="0.05" value="0.6">
    </div>
    <div class="ctrl">
      <label><span data-i18n="rateLabel">采样率 fs</span><span class="val fs"><span id="rateVal">200</span> Hz</span></label>
      <input type="range" id="rate" min="10" max="400" step="2" value="200">
    </div>

    <div class="task">
      <b data-i18n="taskTitle">目标波</b><br>
      <span data-i18n="taskBody">把你的波调成虚线目标的样子：</span><br>
      <span class="goal">f = <span id="tgtF">18</span> Hz · A = <span id="tgtA">0.8</span></span><br>
      <span class="prog" data-i18n="progLabel">已造</span> <span class="prog"><span id="doneN">0</span>/3</span>
    </div>

    <div class="legend">
      <div><span class="sw real"></span><span data-i18n="lgReal">真实脑波</span></div>
      <div><span class="sw samp"></span><span data-i18n="lgRecon">采样重建</span></div>
      <div><span class="sw tgt"></span><span data-i18n="lgTgt">目标波</span></div>
      <div><span class="dot"></span><span data-i18n="lgDot">采样点</span></div>
    </div>

    <button class="lang-btn" id="langBtn">EN / 中文</button>
  </aside>

  <main class="game-main">
    <div class="head">
      <h1 data-i18n="title">造波沙盒 · 调出你的脑波</h1>
      <div class="hud">
        <span data-i18n="hudNyq">奈奎斯特 <b id="nyqHud">20</b> Hz</span>
        <span class="aliasFlag hide" id="aliasFlag" data-i18n="aliasFlag">混叠！</span>
      </div>
    </div>
    <div class="stage">
      <canvas id="cv"></canvas>
    </div>
    <div class="caption" id="caption"></div>
  </main>

<script>
(function(){
  "use strict";

  var COL_FONT = 'JetBrains Mono, monospace';
  var WIN_SEC = 0.3;        // 显示时间窗 (秒)
  var F_DRIFT = 2;          // 慢漂移 Hz, 给波形一点底子让它"像脑波"
  var A_DRIFT = 0.18;

  // ---------- 玩家可调参数 ----------
  var stateWave = { f: 10, a: 0.6, fs: 200 };

  // ---------- 目标波序列 (达成解锁波形造物主) ----------
  var TARGETS = [
    { f: 18, a: 0.80 },
    { f: 8,  a: 0.40 },
    { f: 30, a: 0.95 }
  ];
  var tgtIdx = 0;
  var doneN = 0;
  var unlocked = false;
  var matchHoldFrames = 0;   // 连续匹配帧计数, 防抖

  // 玩家造的真实连续脑波: 主节律 f + 慢漂移
  function trueWave(t, p){
    return p.a * Math.sin(2*Math.PI*p.f*t)
         + A_DRIFT * Math.sin(2*Math.PI*F_DRIFT*t);
  }

  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var freq = document.getElementById('freq');
  var amp = document.getElementById('amp');
  var rate = document.getElementById('rate');
  var freqVal = document.getElementById('freqVal');
  var ampVal = document.getElementById('ampVal');
  var rateVal = document.getElementById('rateVal');
  var captionEl = document.getElementById('caption');
  var aliasFlag = document.getElementById('aliasFlag');
  var nyqHud = document.getElementById('nyqHud');
  var doneNEl = document.getElementById('doneN');
  var tgtFEl = document.getElementById('tgtF');
  var tgtAEl = document.getElementById('tgtA');

  var css = getComputedStyle(document.documentElement);
  function C(name){ return css.getPropertyValue(name).trim(); }
  var COL = {
    bg0: C('--bg-0'), bg2: C('--bg-2'),
    line: C('--line'), lineStrong: C('--line-strong'),
    fg: C('--fg'), fgDim: C('--fg-dim'), fgMute: C('--fg-mute'),
    neuro: C('--neuro'), synaptic: C('--synaptic'),
    dendrite: C('--dendrite'), firing: C('--firing'),
    memory: C('--memory'), gold: C('--gold')
  };

  var dpr = Math.max(1, window.devicePixelRatio || 1);
  var W = 0, H = 0, pad = {l:46, r:18, t:22, b:26};

  function resize(){
    var r = cv.getBoundingClientRect();
    W = Math.max(320, r.width);
    H = Math.max(220, r.height);
    cv.width = Math.round(W * dpr);
    cv.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  function px(t){ return pad.l + (t / WIN_SEC) * (W - pad.l - pad.r); }
  function py(v){
    var mid = pad.t + (H - pad.t - pad.b) / 2;
    var amplPx = (H - pad.t - pad.b) / 2 - 6;
    return mid - v * (amplPx / 1.25); // 1.25 ≈ 信号峰值上限
  }

  function targetWave(t){
    var tg = TARGETS[tgtIdx];
    return tg.a * Math.sin(2*Math.PI*tg.f*t)
         + A_DRIFT * Math.sin(2*Math.PI*F_DRIFT*t);
  }

  // 玩家波是否匹配目标 (频率精确 + 幅度容差)
  function isMatch(){
    var tg = TARGETS[tgtIdx];
    var fOk = Math.abs(stateWave.f - tg.f) < 0.6;       // 整数步进, 精确命中
    var aOk = Math.abs(stateWave.a - tg.a) < 0.06;
    var fsOk = stateWave.fs >= 2 * stateWave.f;          // 采样率必须够: 自己造的波能被采下来
    return fOk && aOk && fsOk;
  }

  function drawGrid(){
    ctx.strokeStyle = COL.line;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, py(0)); ctx.lineTo(W - pad.r, py(0));
    ctx.stroke();
    ctx.globalAlpha = 0.5;
    for (var g = 0; g <= WIN_SEC + 1e-9; g += 0.05){
      ctx.beginPath();
      ctx.moveTo(px(g), pad.t); ctx.lineTo(px(g), H - pad.b);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // 轴标签
    ctx.fillStyle = COL.fgMute;
    ctx.font = '10px ' + COL_FONT;
    ctx.textAlign = 'left';
    ctx.fillText('+', 6, py(1.1) + 3);
    ctx.fillText('0', 8, py(0) + 3);
    ctx.fillText('-', 6, py(-1.1) + 3);
    ctx.textAlign = 'center';
    ctx.fillText('0', px(0), H - pad.b + 14);
    ctx.fillText('0.15s', px(0.15), H - pad.b + 14);
    ctx.fillText('0.30s', px(0.30) - 12, H - pad.b + 14);
  }

  // 线性插值重建波在 t 处的值 (用采样点连线)
  function reconAt(t, samples, dt){
    if (samples.length < 2) return samples.length ? samples[0].v : 0;
    var idx = Math.min(samples.length - 2, Math.max(0, Math.floor(t / dt)));
    var a = samples[idx], b = samples[idx + 1];
    var frac = (t - a.t) / (b.t - a.t);
    frac = Math.max(0, Math.min(1, frac));
    return a.v + (b.v - a.v) * frac;
  }

  function draw(){
    var p = stateWave;
    var fs = p.fs;
    var nyq = 2 * p.f;
    var aliasing = fs < nyq;   // 采样不足 → 混叠

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = COL.bg0;
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    var matched = isMatch();

    // (0) 目标波 — 金色虚线 (仅当本关未达成时显示)
    if (!unlocked){
      ctx.save();
      ctx.strokeStyle = COL.memory;
      ctx.lineWidth = 1.6;
      ctx.setLineDash([6, 5]);
      ctx.globalAlpha = matched ? 0.45 : 0.9;
      ctx.beginPath();
      var ts = 600;
      for (var ti = 0; ti <= ts; ti++){
        var tt = (ti / ts) * WIN_SEC;
        var x = px(tt), y = py(targetWave(tt));
        if (ti === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    // (1) 玩家真实连续脑波 — 细灰线
    ctx.strokeStyle = COL.fgMute;
    ctx.lineWidth = 1.4;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    var steps = 600;
    for (var i = 0; i <= steps; i++){
      var t = (i / steps) * WIN_SEC;
      var xx = px(t), yy = py(trueWave(t, p));
      if (i === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // (2) 采样点 + 折线重建
    var dt = 1 / fs;
    var samples = [];
    for (var s = 0; s <= WIN_SEC + 1e-9; s += dt){
      samples.push({ t: s, v: trueWave(s, p) });
    }
    // 重建折线 (连采样点) — 采样不足时, 这条线会画出"虚假的慢波"= 混叠
    ctx.strokeStyle = aliasing ? COL.dendrite : COL.synaptic;
    ctx.lineWidth = 2.3;
    ctx.beginPath();
    for (var j = 0; j < samples.length; j++){
      var jx = px(samples[j].t), jy = py(samples[j].v);
      if (j === 0) ctx.moveTo(jx, jy); else ctx.lineTo(jx, jy);
    }
    ctx.stroke();

    // 采样点 (太密就不画, 避免堆团)
    if (samples.length <= 80){
      ctx.fillStyle = COL.firing;
      for (var k = 0; k < samples.length; k++){
        ctx.beginPath();
        ctx.arc(px(samples[k].t), py(samples[k].v), 3, 0, Math.PI*2);
        ctx.fill();
      }
    }

    // HUD 框 (画布左上)
    drawHud(p, aliasing, matched);

    // 解锁横幅
    if (unlocked){
      ctx.save();
      ctx.fillStyle = COL.memory;
      ctx.font = 'bold ' + Math.min(26, W/22) + 'px ' + COL_FONT;
      ctx.textAlign = 'center';
      ctx.fillText(LANG === 'zh' ? '波形造物主' : 'WAVE FORGER', W/2, pad.t + 30);
      ctx.font = '12px ' + COL_FONT;
      ctx.fillStyle = COL.fgDim;
      ctx.fillText(LANG === 'zh' ? '三个目标波全部造出 — 脑波就是随时间起伏的线，你能任意塑形它'
                                 : 'All three target waves forged — a brain wave is just a line rising over time, and you shaped it',
                   W/2, pad.t + 50);
      ctx.restore();
    }

    // 匹配防抖: 连续匹配 ~30 帧 (≈0.5s) 才判达成, 防止扫过去误触
    if (!unlocked && matched){
      matchHoldFrames++;
      if (matchHoldFrames >= 18){
        advanceTarget();
      }
    } else {
      matchHoldFrames = 0;
    }

    updatePanels(p, aliasing, matched, nyq);
  }

  function drawHud(p, aliasing, matched){
    var bw = 132, bh = 56, bx = pad.l + 6, by = pad.t + 4;
    ctx.fillStyle = COL.bg2;
    ctx.strokeStyle = matched ? COL.memory : COL.lineStrong;
    ctx.lineWidth = matched ? 1.8 : 1;
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.textAlign = 'left';
    ctx.font = '10px ' + COL_FONT;
    ctx.fillStyle = COL.fgDim;
    ctx.fillText('f  ' + p.f + ' Hz', bx + 8, by + 15);
    ctx.fillText('A  ' + p.a.toFixed(2), bx + 8, by + 29);
    ctx.fillStyle = aliasing ? COL.dendrite : COL.neuro;
    ctx.fillText('fs ' + p.fs + ' Hz', bx + 8, by + 43);
    if (aliasing){
      ctx.fillStyle = COL.dendrite;
      ctx.font = 'bold 10px ' + COL_FONT;
      ctx.textAlign = 'right';
      ctx.fillText(LANG === 'zh' ? '混叠' : 'ALIAS', bx + bw - 8, by + 43);
    }
  }

  function advanceTarget(){
    doneN++;
    matchHoldFrames = 0;
    if (tgtIdx < TARGETS.length - 1){
      tgtIdx++;
      syncTargetLabels();
    } else {
      unlocked = true;
    }
  }

  function syncTargetLabels(){
    var tg = TARGETS[tgtIdx];
    tgtFEl.textContent = tg.f;
    tgtAEl.textContent = tg.a.toFixed(2);
    doneNEl.textContent = doneN;
  }

  // ---------- i18n ----------
  var LANG = 'zh';
  var I18N = {
    brand:    {zh:'造波沙盒', en:'Wave Forge'},
    freqLabel:{zh:'频率 f', en:'Freq f'},
    ampLabel: {zh:'幅度 A', en:'Amp A'},
    rateLabel:{zh:'采样率 fs', en:'Sample rate fs'},
    taskTitle:{zh:'目标波', en:'TARGET'},
    taskBody: {zh:'把你的波调成虚线目标的样子：', en:'Match your wave to the dashed target:'},
    progLabel:{zh:'已造', en:'forged'},
    lgReal:   {zh:'真实脑波', en:'true wave'},
    lgRecon:  {zh:'采样重建', en:'reconstructed'},
    lgTgt:    {zh:'目标波', en:'target'},
    lgDot:    {zh:'采样点', en:'sample pts'},
    title:    {zh:'造波沙盒 · 调出你的脑波', en:'Wave Forge · shape your brain wave'},
    hudNyq:   {zh:'奈奎斯特 <b id="nyqHud">20</b> Hz', en:'Nyquist <b id="nyqHud">20</b> Hz'},
    aliasFlag:{zh:'混叠！', en:'ALIASING!'}
  };

  function applyI18N(){
    var els = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < els.length; i++){
      var key = els[i].getAttribute('data-i18n');
      if (I18N[key]) els[i].innerHTML = I18N[key][LANG];
    }
    // hudNyq 重新生成了 #nyqHud, 重新抓引用
    nyqHud = document.getElementById('nyqHud');
  }

  function updatePanels(p, aliasing, matched, nyq){
    if (nyqHud) nyqHud.textContent = nyq;
    aliasFlag.classList.toggle('hide', !aliasing);

    var cap;
    if (unlocked){
      cap = LANG === 'zh'
        ? '<span class="win">波形造物主解锁！</span>你刚刚明白了：脑波不过是一条<b>随时间起伏的线</b>——频率决定它多快，幅度决定它多高，采样率决定你能不能如实记下它。'
        : '<span class="win">Wave Forger unlocked!</span> You just learned: a brain wave is only a <b>line rising and falling over time</b> — frequency sets how fast, amplitude how tall, and sample rate whether you can record it faithfully.';
    } else if (aliasing){
      cap = LANG === 'zh'
        ? '<span class="alias">采样不足！</span>fs 比 2×f 还小，采样点连出的红线变成了一条<b>虚假的慢波</b>——这就是混叠。先把采样率提上去。'
        : '<span class="alias">Undersampled!</span> fs is below 2x f, so the dots connect into a <b>false slow wave</b> — that is aliasing. Raise the sample rate first.';
    } else if (matched){
      cap = LANG === 'zh'
        ? '<span class="win">对上了！</span>你的波贴住了目标，采样率也够。再稳住半秒就记一笔。'
        : '<span class="win">Matched!</span> Your wave hugs the target and the sample rate is enough. Hold steady for half a second to log it.';
    } else {
      cap = LANG === 'zh'
        ? '拨 <b>频率</b> 让波变快变慢，拨 <b>幅度</b> 让它变高变矮，拨 <b>采样率</b> 看采样点是否跟得上。自由造，看波怎么随你的手起伏。'
        : 'Drag <b>frequency</b> to speed it up or down, <b>amplitude</b> to make it taller, <b>sample rate</b> to see if the dots keep up. Forge freely and watch the wave answer your hand.';
    }
    captionEl.innerHTML = cap;
  }

  // ---------- events ----------
  freq.addEventListener('input', function(){
    stateWave.f = parseInt(freq.value, 10);
    freqVal.textContent = stateWave.f;
    draw();
  });
  amp.addEventListener('input', function(){
    stateWave.a = parseFloat(amp.value);
    ampVal.textContent = stateWave.a.toFixed(2);
    draw();
  });
  rate.addEventListener('input', function(){
    stateWave.fs = parseInt(rate.value, 10);
    rateVal.textContent = stateWave.fs;
    draw();
  });

  document.getElementById('langBtn').addEventListener('click', function(){
    LANG = (LANG === 'zh') ? 'en' : 'zh';
    document.documentElement.lang = LANG;
    applyI18N();
    draw();
  });

  window.addEventListener('resize', resize);

  // 当玩家把滑块停在匹配区间但不动时, 也要让防抖计数累加 → 用一个轻量定时器持续重绘判定
  setInterval(function(){
    if (!unlocked && isMatch()){ draw(); }
  }, 28);

  // init
  applyI18N();
  syncTargetLabels();
  requestAnimationFrame(function(){ resize(); });
})();
</script>
</body>
</html>
