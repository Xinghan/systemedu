<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:240px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.5;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
.canvas-wrap canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
.control-bar{
  display:flex;align-items:center;gap:12px;
  padding:8px 16px;
  background:rgba(28,27,27,0.95);
  border-top:1px solid rgba(138,136,134,0.15);
  flex-wrap:wrap;
}
.slider-group{display:flex;flex-direction:column;align-items:flex-start;min-width:110px;}
.slider-group label{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  color:#8a8886;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:2px;
}
.slider-group .val{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  color:#00daf3;
}
.slider-group input[type=range]{
  width:100px;height:4px;-webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,#353534,#ffb59c);outline:none;cursor:pointer;
}
.slider-group input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:#ffb59c;cursor:pointer;border:none;
}
.toggle-group{display:flex;flex-direction:column;align-items:flex-start;min-width:100px;}
.toggle-group label{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  color:#8a8886;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:2px;
}
.toggle-btn{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:3px 12px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#8a8886;
  transition:all 0.2s;
}
.toggle-btn.active{border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.15);}
.train-btn{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:6px 18px;cursor:pointer;letter-spacing:1px;
  border:2px solid #ff7f50;
  background:rgba(255,127,80,0.15);color:#ffb59c;
  transition:background 0.2s;
  margin-left:auto;
}
.train-btn:hover{background:rgba(255,127,80,0.35);}
.train-btn.running{border-color:#00daf3;color:#00daf3;background:rgba(0,218,243,0.1);pointer-events:none;}
.train-btn.success{border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.15);}
.feedback-panel{
  padding:8px 12px;
  background:rgba(28,27,27,0.92);
  border-top:1px solid rgba(138,136,134,0.15);
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  min-height:36px;
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}
.feedback-panel .score-chip{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  padding:2px 10px;border:1px solid rgba(138,136,134,0.15);
}
.result-overlay{
  display:none;
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(19,19,19,0.92);
  z-index:50;
  justify-content:center;align-items:center;
  flex-direction:column;gap:12px;
}
.result-overlay.show{display:flex;}
.result-overlay h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
  color:#ffb59c;
}
.result-overlay .result-table{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  border-collapse:collapse;
}
.result-overlay .result-table th,.result-overlay .result-table td{
  padding:4px 14px;text-align:center;
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.result-overlay .result-table th{color:#8a8886;font-weight:700;letter-spacing:1px;}
.result-overlay .retry-btn{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:6px 20px;cursor:pointer;letter-spacing:1px;
  border:2px solid #ffb59c;background:transparent;color:#ffb59c;
  margin-top:8px;
}
.result-overlay .retry-btn:hover{background:rgba(255,181,156,0.15);}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <ul id="guideList"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="result-overlay" id="resultOverlay">
      <h2 id="resultTitle"></h2>
      <table class="result-table" id="resultTable"></table>
      <button class="retry-btn" id="retryBtn"></button>
    </div>
  </div>
  <div class="control-bar" id="controlBar">
    <div class="slider-group">
      <label id="lblLR"></label>
      <input type="range" id="sliderLR" min="1" max="10" value="5">
      <span class="val" id="valLR"></span>
    </div>
    <div class="slider-group">
      <label id="lblEpochs"></label>
      <input type="range" id="sliderEpochs" min="5" max="50" value="20" step="5">
      <span class="val" id="valEpochs"></span>
    </div>
    <div class="slider-group">
      <label id="lblBatch"></label>
      <input type="range" id="sliderBatch" min="1" max="4" value="2">
      <span class="val" id="valBatch"></span>
    </div>
    <div class="toggle-group">
      <label id="lblAug"></label>
      <button class="toggle-btn" id="btnAug"></button>
    </div>
    <button class="train-btn" id="btnTrain"></button>
  </div>
  <div class="feedback-panel" id="feedback">
    <span id="feedbackText"></span>
  </div>
</div>
<script>
(function(){
"use strict";

/* ── palette ── */
var P = {
  bg:"#131313",surface:"#1c1b1b",surface_high:"#353534",
  primary:"#ffb59c",primary_container:"#ff7f50",
  secondary:"#c6c6c6",tertiary:"#00daf3",
  signal:"#ff5f1f",success:"#10b981",
  text:"#e5e2e1",muted:"#8a8886"
};

/* ── i18n ── */
var LANG = 'cn';
var I18N = {
  title:      {en:'TRAIN YOUR CLASSIFIER', cn:'\u8bad\u7ec3\u4f60\u7684\u5206\u7c7b\u5668'},
  subtitle:   {en:'Adjust hyperparameters and beat the rule-based baseline', cn:'\u8c03\u8282\u8d85\u53c2\u6570\uff0c\u8d85\u8d8a\u89c4\u5219\u6cd5\u57fa\u7ebf'},
  guideTitle: {en:'GAME GUIDE', cn:'\u6e38\u620f\u6307\u5357'},
  guide1:     {en:'1. Adjust learning rate, epochs, batch size', cn:'1. \u8c03\u8282\u5b66\u4e60\u7387\u3001\u8f6e\u6b21\u3001\u6279\u5927\u5c0f'},
  guide2:     {en:'2. Toggle data augmentation on/off', cn:'2. \u5f00\u5173\u6570\u636e\u589e\u5f3a'},
  guide3:     {en:'3. Click TRAIN to start training simulation', cn:'3. \u70b9\u51fb \u8bad\u7ec3 \u5f00\u59cb\u8bad\u7ec3\u6a21\u62df'},
  guide4:     {en:'4. Watch loss curve and compare with baseline', cn:'4. \u89c2\u5bdf\u635f\u5931\u66f2\u7ebf\u5e76\u4e0e\u57fa\u7ebf\u5bf9\u6bd4'},
  guide5:     {en:'5. Win: CNN accuracy > 80% on all categories', cn:'5. \u80dc\u5229\uff1aCNN \u5728\u6240\u6709\u7c7b\u522b\u4e0a\u7cbe\u5ea6 > 80%'},
  lblLR:      {en:'LEARNING RATE', cn:'\u5b66\u4e60\u7387'},
  lblEpochs:  {en:'EPOCHS', cn:'\u8f6e\u6b21'},
  lblBatch:   {en:'BATCH SIZE', cn:'\u6279\u5927\u5c0f'},
  lblAug:     {en:'AUGMENTATION', cn:'\u6570\u636e\u589e\u5f3a'},
  augOn:      {en:'ON', cn:'\u5f00'},
  augOff:     {en:'OFF', cn:'\u5173'},
  btnTrain:   {en:'TRAIN', cn:'\u8bad\u7ec3'},
  btnTraining:{en:'TRAINING...', cn:'\u8bad\u7ec3\u4e2d...'},
  feedReady:  {en:'Set hyperparameters and click TRAIN', cn:'\u8bbe\u7f6e\u8d85\u53c2\u6570\u540e\u70b9\u51fb \u8bad\u7ec3'},
  feedDone:   {en:'Training complete! Check results.', cn:'\u8bad\u7ec3\u5b8c\u6210\uff01\u67e5\u770b\u7ed3\u679c\u3002'},
  feedWin:    {en:'CNN beat the baseline on all categories!', cn:'CNN \u5728\u6240\u6709\u7c7b\u522b\u4e0a\u8d85\u8d8a\u4e86\u57fa\u7ebf\uff01'},
  feedLose:   {en:'Some categories still below baseline. Try again!', cn:'\u90e8\u5206\u7c7b\u522b\u4ecd\u4f4e\u4e8e\u57fa\u7ebf\uff0c\u518d\u8bd5\u8bd5\uff01'},
  resultWin:  {en:'MISSION SUCCESS', cn:'\u4efb\u52a1\u6210\u529f'},
  resultLose: {en:'NEEDS TUNING', cn:'\u9700\u8981\u8c03\u4f18'},
  retry:      {en:'TRY AGAIN', cn:'\u518d\u8bd5\u4e00\u6b21'},
  catSmooth:  {en:'SMOOTH', cn:'\u5e73\u5766'},
  catRough:   {en:'ROUGH', cn:'\u7c97\u7cd9'},
  catHazard:  {en:'HAZARD', cn:'\u5371\u9669'},
  catUnknown: {en:'UNKNOWN', cn:'\u672a\u77e5'},
  colCat:     {en:'CATEGORY', cn:'\u7c7b\u522b'},
  colRule:    {en:'RULE', cn:'\u89c4\u5219\u6cd5'},
  colCNN:     {en:'CNN', cn:'CNN'},
  colDiff:    {en:'DIFF', cn:'\u5dee\u503c'},
  lblLoss:    {en:'LOSS', cn:'\u635f\u5931'},
  lblAcc:     {en:'ACCURACY', cn:'\u7cbe\u5ea6'},
  lblBaseline:{en:'RULE BASELINE', cn:'\u89c4\u5219\u6cd5\u57fa\u7ebf'},
  lblCNNLine: {en:'CNN', cn:'CNN'}
};
function t(key){return (I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}

/* ── canvas setup ── */
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 700, H = 400;
var DPR = Math.min(window.devicePixelRatio||1, 2);
function resize(){
  var wrap = canvas.parentElement;
  var rect = wrap ? wrap.getBoundingClientRect() : canvas.getBoundingClientRect();
  if(rect.width < 1 || rect.height < 1) return;
  canvas.width = rect.width * DPR;
  canvas.height = rect.height * DPR;
  var scale = Math.min(rect.width / W, rect.height / H);
  var drawW = W * scale;
  var drawH = H * scale;
  var offsetX = (rect.width - drawW) / 2;
  var offsetY = (rect.height - drawH) / 2;
  ctx.setTransform(DPR*scale, 0, 0, DPR*scale, DPR*offsetX, DPR*offsetY);
}
resize();
window.addEventListener('resize', function(){resize(); drawScene();});
if(typeof ResizeObserver !== 'undefined' && canvas.parentElement){
  try{new ResizeObserver(function(){resize(); drawScene();}).observe(canvas.parentElement);}catch(e){}
}

/* ── simulation state ── */
var augEnabled = false;
var trainState = 'idle'; // idle, training, done
var trainProgress = 0;
var trainMaxEpochs = 20;
var lossHistory = [];
var accHistory = [];
var finalAccPerCat = [0,0,0,0];
var ruleBaseline = [0.72, 0.55, 0.48, 0.35];
var CAT_COLORS = ['#10b981','#ffb59c','#ff5f1f','#8a8886'];
var CAT_KEYS = ['catSmooth','catRough','catHazard','catUnknown'];
var BATCH_LABELS = ['8','16','32','64'];
var animFrame = null;

/* ── simulation model ── */
function simulateTraining(lr, epochs, batchIdx, aug){
  // lr: 0.0001 to 0.01 (slider 1-10 mapped)
  // batchIdx: 0-3 -> batch 8,16,32,64
  // aug: boolean
  var lrVal = lr * 0.001; // 0.001 to 0.01
  var batchSize = [8,16,32,64][batchIdx];

  // Compute effective convergence rate based on hyperparams
  var convRate = 0.08 + lrVal * 8; // higher lr -> faster convergence
  if(lrVal > 0.007) convRate *= 0.5; // too high lr -> instability
  var batchFactor = 1.0 - Math.abs(batchIdx - 2) * 0.1; // batch 32 is optimal
  convRate *= batchFactor;
  if(aug) convRate *= 1.15; // augmentation helps slightly

  // Base final accuracy
  var baseAcc = 0.6 + convRate * 2.5;
  if(lrVal > 0.008) baseAcc -= 0.15; // too high lr hurts final acc
  if(lrVal < 0.002) baseAcc -= 0.05; // too low lr may underfit
  if(epochs < 15) baseAcc -= (15-epochs)*0.01;
  if(aug) baseAcc += 0.05;
  baseAcc = Math.min(0.95, Math.max(0.3, baseAcc));

  // Generate loss and acc curves
  var losses = [];
  var accs = [];
  var initLoss = 2.2 + Math.random()*0.3;
  for(var i=0;i<=epochs;i++){
    var progress = i / epochs;
    var noise = (Math.random()-0.5)*0.08;
    var loss = initLoss * Math.exp(-convRate * i * 0.5) + 0.2 + noise;
    if(lrVal > 0.007 && i > epochs*0.6) loss += Math.sin(i*0.8)*0.15; // oscillation
    loss = Math.max(0.15, loss);
    losses.push(loss);

    var acc = baseAcc * (1 - Math.exp(-convRate * i * 0.4)) + 0.05 + noise*0.3;
    acc = Math.min(0.98, Math.max(0.05, acc));
    accs.push(acc);
  }

  // Per-category accuracy
  var catAcc = [];
  var catDiffs = [0.05, -0.02, -0.08, -0.15]; // smooth easiest, unknown hardest
  for(var c=0;c<4;c++){
    var ca = baseAcc + catDiffs[c] + (Math.random()-0.5)*0.04;
    if(aug && c >= 2) ca += 0.06; // augmentation helps rare classes most
    ca = Math.min(0.98, Math.max(0.2, ca));
    catAcc.push(ca);
  }

  return {losses:losses, accs:accs, catAcc:catAcc, epochs:epochs};
}

/* ── draw functions ── */
function drawBg(){
  var g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#131313');g.addColorStop(1,'#1a1518');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(var x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawTitle(){
  ctx.font="bold 16px 'Space Grotesk',sans-serif";ctx.textAlign='center';
  ctx.fillStyle=P.primary;ctx.shadowColor=P.primary;ctx.shadowBlur=10;
  ctx.fillText(t('title'),W/2,22);ctx.shadowBlur=0;
  ctx.font="12px 'Noto Sans SC',sans-serif";ctx.fillStyle=P.secondary;
  ctx.fillText(t('subtitle'),W/2,40);
}

function drawIdleScene(){
  drawBg();drawTitle();
  // Draw 4 terrain patches in center
  var patchW=80, patchH=60, gap=20;
  var totalW = 4*patchW + 3*gap;
  var startX = (W-totalW)/2;
  var startY = H*0.35;
  for(var i=0;i<4;i++){
    var px = startX + i*(patchW+gap);
    var g = ctx.createLinearGradient(px,startY,px+patchW,startY+patchH);
    g.addColorStop(0, CAT_COLORS[i]);g.addColorStop(1, CAT_COLORS[i]+'55');
    ctx.fillStyle=g;ctx.shadowColor=CAT_COLORS[i];ctx.shadowBlur=8;
    ctx.fillRect(px,startY,patchW,patchH);ctx.shadowBlur=0;
    ctx.strokeStyle=CAT_COLORS[i];ctx.lineWidth=1;ctx.strokeRect(px,startY,patchW,patchH);
    // texture
    ctx.strokeStyle='rgba(0,0,0,0.2)';
    for(var j=0;j<3;j++){
      var lx=px+(j+1)*patchW/4;
      ctx.beginPath();ctx.moveTo(lx,startY);ctx.lineTo(lx,startY+patchH);ctx.stroke();
    }
    // label
    ctx.font="bold 10px 'Space Grotesk',sans-serif";ctx.textAlign='center';
    ctx.fillStyle=CAT_COLORS[i];
    ctx.fillText(t(CAT_KEYS[i]),px+patchW/2,startY+patchH+14);
  }
  // hint text
  ctx.font="13px 'Noto Sans SC',sans-serif";ctx.textAlign='center';ctx.fillStyle=P.muted;
  ctx.fillText(t('feedReady'),W/2,H*0.75);
}

function drawTrainingScene(progress){
  drawBg();drawTitle();
  var pad=50;
  var gx=pad, gy=55, gw=(W-pad*2)*0.55, gh=H-120;

  // Left panel: loss curve
  ctx.strokeStyle=P.muted;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gh);ctx.lineTo(gx+gw,gy+gh);ctx.stroke();
  // y axis
  ctx.font="9px 'Space Grotesk',sans-serif";ctx.textAlign='right';ctx.fillStyle=P.muted;
  ctx.fillText('2.5',gx-4,gy+5);ctx.fillText('0',gx-4,gy+gh+3);
  ctx.textAlign='center';ctx.fillText('EPOCH',gx+gw/2,gy+gh+18);

  var visibleEpochs = Math.floor(progress * lossHistory.length);
  if(visibleEpochs < 1) visibleEpochs = 1;

  // loss line
  if(lossHistory.length > 0){
    ctx.strokeStyle=P.signal;ctx.lineWidth=2;
    ctx.shadowColor=P.signal;ctx.shadowBlur=6;
    ctx.beginPath();
    for(var i=0;i<visibleEpochs&&i<lossHistory.length;i++){
      var lx = gx + i*gw/(lossHistory.length-1||1);
      var ly = gy + (1 - lossHistory[i]/2.5)*gh;
      if(i===0)ctx.moveTo(lx,ly);else ctx.lineTo(lx,ly);
    }
    ctx.stroke();ctx.shadowBlur=0;
  }

  // accuracy line
  if(accHistory.length > 0){
    ctx.strokeStyle=P.success;ctx.lineWidth=2;
    ctx.shadowColor=P.success;ctx.shadowBlur=6;
    ctx.beginPath();
    for(var j=0;j<visibleEpochs&&j<accHistory.length;j++){
      var ax = gx + j*gw/(accHistory.length-1||1);
      var ay = gy + (1 - accHistory[j])*gh;
      if(j===0)ctx.moveTo(ax,ay);else ctx.lineTo(ax,ay);
    }
    ctx.stroke();ctx.shadowBlur=0;
  }

  // legend
  ctx.fillStyle=P.signal;ctx.fillRect(gx+6,gy+6,12,3);
  ctx.font="10px 'Space Grotesk',sans-serif";ctx.textAlign='left';ctx.fillStyle=P.signal;
  ctx.fillText(t('lblLoss'),gx+22,gy+10);
  ctx.fillStyle=P.success;ctx.fillRect(gx+6,gy+18,12,3);
  ctx.fillStyle=P.success;
  ctx.fillText(t('lblAcc'),gx+22,gy+22);

  // Right panel: bar chart (baseline vs CNN)
  var rx = gx + gw + 40;
  var rw = W - rx - pad;
  var rh = gh;

  ctx.strokeStyle=P.muted;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(rx,gy);ctx.lineTo(rx,gy+rh);ctx.lineTo(rx+rw,gy+rh);ctx.stroke();

  ctx.font="bold 10px 'Space Grotesk',sans-serif";ctx.textAlign='center';
  ctx.fillStyle=P.primary;
  ctx.fillText(t('lblCNNLine')+' vs '+t('lblBaseline'),rx+rw/2,gy-6);

  var groupW = rw / 4;
  var barW = groupW * 0.3;

  for(var c=0;c<4;c++){
    var cx2 = rx + c*groupW + groupW/2;
    // rule bar
    var rbh = ruleBaseline[c] * rh;
    var g1 = ctx.createLinearGradient(0,gy+rh-rbh,0,gy+rh);
    g1.addColorStop(0,P.muted);g1.addColorStop(1,P.surface_high);
    ctx.fillStyle=g1;ctx.fillRect(cx2-barW-2, gy+rh-rbh, barW, rbh);

    // cnn bar (animated)
    var cnnVal = trainState==='done' ? finalAccPerCat[c] : (finalAccPerCat[c]||0) * progress;
    var cbh = cnnVal * rh;
    if(cbh > 0){
      var g2 = ctx.createLinearGradient(0,gy+rh-cbh,0,gy+rh);
      g2.addColorStop(0,CAT_COLORS[c]);g2.addColorStop(1,CAT_COLORS[c]+'66');
      ctx.fillStyle=g2;ctx.shadowColor=CAT_COLORS[c];ctx.shadowBlur=6;
      ctx.fillRect(cx2+2, gy+rh-cbh, barW, cbh);ctx.shadowBlur=0;
    }

    // cat label
    ctx.font="9px 'Space Grotesk',sans-serif";ctx.textAlign='center';ctx.fillStyle=P.text;
    ctx.fillText(t(CAT_KEYS[c]),cx2,gy+rh+12);

    // values
    if(trainState==='done'){
      ctx.font="bold 8px 'Space Grotesk',sans-serif";
      ctx.fillStyle=P.muted;ctx.fillText(Math.round(ruleBaseline[c]*100)+'%',cx2-barW/2-2,gy+rh-rbh-4);
      ctx.fillStyle=CAT_COLORS[c];ctx.fillText(Math.round(finalAccPerCat[c]*100)+'%',cx2+barW/2+2,gy+rh-cbh-4);
    }
  }

  // current epoch indicator
  if(trainState==='training'){
    var currentEp = Math.floor(progress * trainMaxEpochs);
    ctx.font="bold 14px 'Space Grotesk',sans-serif";ctx.textAlign='center';
    ctx.fillStyle=P.tertiary;
    ctx.fillText('EPOCH '+currentEp+'/'+trainMaxEpochs, W/2, H-10);
  }
}

function drawScene(){
  if(trainState==='idle'){drawIdleScene();}
  else{drawTrainingScene(trainProgress);}
}

/* ── training animation ── */
function startTraining(){
  if(trainState==='training') return;
  trainState='training';
  var lr = parseInt(document.getElementById('sliderLR').value);
  var epochs = parseInt(document.getElementById('sliderEpochs').value);
  var batchIdx = parseInt(document.getElementById('sliderBatch').value) - 1;

  trainMaxEpochs = epochs;
  var result = simulateTraining(lr, epochs, batchIdx, augEnabled);
  lossHistory = result.losses;
  accHistory = result.accs;
  finalAccPerCat = result.catAcc;

  document.getElementById('btnTrain').classList.add('running');
  document.getElementById('btnTrain').textContent = t('btnTraining');
  document.getElementById('feedbackText').textContent = t('btnTraining');

  trainProgress = 0;
  var startTime = null;
  var totalDuration = Math.min(epochs * 100, 4000); // animation duration

  function step(ts){
    if(!startTime) startTime = ts;
    trainProgress = Math.min((ts - startTime) / totalDuration, 1);
    drawScene();
    if(trainProgress < 1){
      animFrame = requestAnimationFrame(step);
    } else {
      finishTraining();
    }
  }
  animFrame = requestAnimationFrame(step);
}

function finishTraining(){
  trainState = 'done';
  trainProgress = 1;
  drawScene();

  var btn = document.getElementById('btnTrain');
  btn.classList.remove('running');

  // Check win condition: all cat accuracies > 0.80
  var won = true;
  for(var i=0;i<4;i++){
    if(finalAccPerCat[i] < 0.80) won = false;
  }

  if(won){
    btn.classList.add('success');
    btn.textContent = t('feedWin');
    document.getElementById('feedbackText').textContent = t('feedWin');
  } else {
    btn.textContent = t('btnTrain');
    document.getElementById('feedbackText').textContent = t('feedLose');
  }

  // Show result overlay
  showResult(won);
}

function showResult(won){
  var overlay = document.getElementById('resultOverlay');
  overlay.classList.add('show');
  document.getElementById('resultTitle').textContent = won ? t('resultWin') : t('resultLose');
  document.getElementById('resultTitle').style.color = won ? P.success : P.signal;
  document.getElementById('retryBtn').textContent = t('retry');

  var table = document.getElementById('resultTable');
  var html = '<tr><th>'+t('colCat')+'</th><th>'+t('colRule')+'</th><th>'+t('colCNN')+'</th><th>'+t('colDiff')+'</th></tr>';
  for(var i=0;i<4;i++){
    var diff = finalAccPerCat[i] - ruleBaseline[i];
    var diffStr = (diff>=0?'+':'')+Math.round(diff*100)+'%';
    var diffColor = diff >= 0 ? P.success : P.signal;
    html += '<tr><td style="color:'+CAT_COLORS[i]+'">'+t(CAT_KEYS[i])+'</td>';
    html += '<td style="color:'+P.muted+'">'+Math.round(ruleBaseline[i]*100)+'%</td>';
    html += '<td style="color:'+CAT_COLORS[i]+'">'+Math.round(finalAccPerCat[i]*100)+'%</td>';
    html += '<td style="color:'+diffColor+'">'+diffStr+'</td></tr>';
  }
  table.innerHTML = html;
}

function resetGame(){
  trainState = 'idle';
  trainProgress = 0;
  lossHistory = [];
  accHistory = [];
  finalAccPerCat = [0,0,0,0];
  if(animFrame) cancelAnimationFrame(animFrame);
  document.getElementById('resultOverlay').classList.remove('show');
  var btn = document.getElementById('btnTrain');
  btn.classList.remove('running','success');
  btn.textContent = t('btnTrain');
  document.getElementById('feedbackText').textContent = t('feedReady');
  drawScene();
}

/* ── slider value display ── */
function updateSliderDisplays(){
  var lr = parseInt(document.getElementById('sliderLR').value);
  document.getElementById('valLR').textContent = (lr * 0.001).toFixed(3);
  document.getElementById('valEpochs').textContent = document.getElementById('sliderEpochs').value;
  var batchIdx = parseInt(document.getElementById('sliderBatch').value) - 1;
  document.getElementById('valBatch').textContent = BATCH_LABELS[batchIdx];
}

/* ── event bindings ── */
document.getElementById('sliderLR').addEventListener('input', updateSliderDisplays);
document.getElementById('sliderEpochs').addEventListener('input', updateSliderDisplays);
document.getElementById('sliderBatch').addEventListener('input', updateSliderDisplays);

document.getElementById('btnAug').addEventListener('click', function(){
  augEnabled = !augEnabled;
  this.classList.toggle('active', augEnabled);
  this.textContent = augEnabled ? t('augOn') : t('augOff');
});

document.getElementById('btnTrain').addEventListener('click', function(){
  if(trainState==='done') resetGame();
  startTraining();
});

document.getElementById('retryBtn').addEventListener('click', function(){
  resetGame();
});

/* ── guide panel ── */
function refreshGuide(){
  document.getElementById('guideTitle').textContent=t('guideTitle');
  var list=document.getElementById('guideList');
  list.innerHTML='';
  for(var i=1;i<=5;i++){
    var li=document.createElement('li');li.textContent=t('guide'+i);list.appendChild(li);
  }
}
document.getElementById('guideHeader').addEventListener('click',function(){
  var gc=document.getElementById('guideContent');
  gc.classList.toggle('collapsed');
  document.getElementById('guideToggle').textContent=gc.classList.contains('collapsed')?'[+]':'[-]';
});

/* ── i18n ── */
function refreshI18N(){
  refreshGuide();
  document.getElementById('lblLR').textContent=t('lblLR');
  document.getElementById('lblEpochs').textContent=t('lblEpochs');
  document.getElementById('lblBatch').textContent=t('lblBatch');
  document.getElementById('lblAug').textContent=t('lblAug');
  document.getElementById('btnAug').textContent=augEnabled?t('augOn'):t('augOff');
  var btn=document.getElementById('btnTrain');
  if(trainState==='training'){btn.textContent=t('btnTraining');}
  else{btn.textContent=t('btnTrain');}
  document.getElementById('feedbackText').textContent=
    trainState==='idle'?t('feedReady'):
    trainState==='training'?t('btnTraining'):t('feedDone');
  updateSliderDisplays();
  drawScene();
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG = LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});

/* ── init ── */
refreshGuide();
refreshI18N();
drawIdleScene();
setTimeout(function(){resize();drawScene();},200);
setTimeout(function(){resize();drawScene();},600);
document.fonts.ready.then(function(){resize();drawScene();});

})();
</script>
</body>
</html>
