<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>IC Detective</title>
<style>
:root{
  /* 深空底 (neuro 偏暖红色相 25) */
  --bg-0: oklch(0.13 0.025 25);
  --bg-1: oklch(0.17 0.03 25);
  --bg-2: oklch(0.21 0.035 25);
  --bg-3: oklch(0.27 0.04 25);
  --line: oklch(0.40 0.05 25 / 0.35);
  --line-strong: oklch(0.58 0.08 25 / 0.55);
  --fg: oklch(0.96 0.01 25);
  --fg-dim: oklch(0.78 0.02 25);
  --fg-mute: oklch(0.56 0.03 25);
  /* neuro accent + 5 色 palette */
  --neuro:    oklch(0.75 0.17 25);
  --synaptic: oklch(0.75 0.17 25);
  --dendrite: oklch(0.55 0.15 25);
  --axon:     oklch(0.32 0.10 25);
  --firing:   oklch(0.92 0.08 25);
  --memory:   oklch(0.85 0.14 85);
  /* 判读语义色: 保留=真脑波(青绿) 剔除=伪迹(琥珀/红) */
  --keep:   oklch(0.78 0.15 165);
  --reject: oklch(0.80 0.16 55);
  --danger: oklch(0.65 0.20 25);
  --mono:'JetBrains Mono','SF Mono','Fira Code',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
  font-family:'Noto Sans SC','Inter',sans-serif;}
.wrapper{display:flex;height:100vh;}

/* ---- 200px 左侧栏 ---- */
.game-sidebar{width:200px;flex:0 0 200px;display:flex;flex-direction:column;
  background:var(--bg-1);border-right:1px solid var(--line);padding:12px 12px 10px;
  overflow-y:auto;gap:10px;}
.brand{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--neuro);
  letter-spacing:1px;text-transform:uppercase;line-height:1.3;}
.brand .sub{display:block;font-size:9px;color:var(--fg-mute);letter-spacing:0.5px;margin-top:2px;}
.mascot-wrap{display:flex;justify-content:center;padding:2px 0;}
.mascot-cap{font-family:var(--mono);font-size:9px;color:var(--fg-mute);text-align:center;
  letter-spacing:0.5px;margin-top:1px;}

.panel-title{font-family:var(--mono);font-size:10px;color:var(--neuro);letter-spacing:1px;
  text-transform:uppercase;border-top:1px solid var(--line);padding-top:8px;}

/* 6 IC 进度点 */
.ic-list{display:flex;flex-direction:column;gap:5px;}
.ic-dot{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
  color:var(--fg-dim);padding:4px 6px;border:1px solid var(--line);background:var(--bg-2);
  cursor:default;letter-spacing:0.5px;}
.ic-dot .mark{width:12px;height:12px;flex:0 0 12px;border:1px solid var(--line-strong);
  background:var(--bg-3);display:inline-block;}
.ic-dot.current{border-color:var(--neuro);color:var(--firing);background:var(--bg-3);}
.ic-dot.solved-keep .mark{background:var(--keep);border-color:var(--keep);}
.ic-dot.solved-reject .mark{background:var(--reject);border-color:var(--reject);}
.ic-dot.solved-wrong .mark{background:var(--danger);border-color:var(--danger);}

.legend{border-top:1px solid var(--line);padding-top:8px;font-size:10px;color:var(--fg-dim);
  line-height:1.55;}
.legend b{color:var(--firing);font-weight:600;}
.legend .row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.legend .sw{width:10px;height:10px;flex:0 0 10px;display:inline-block;}

.lang-btn{margin-top:auto;font-family:var(--mono);font-size:11px;font-weight:700;
  padding:6px 0;cursor:pointer;border:1px solid var(--line-strong);background:var(--bg-2);
  color:var(--neuro);letter-spacing:1px;}
.lang-btn:hover{background:var(--bg-3);}

/* ---- 右侧主舞台 ---- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;}
.hud{display:flex;align-items:center;gap:18px;padding:8px 18px;background:var(--bg-1);
  border-bottom:1px solid var(--line);}
.hud .title{font-family:var(--mono);font-size:12px;color:var(--neuro);letter-spacing:1px;
  font-weight:700;text-transform:uppercase;margin-right:auto;}
.hud .item{display:flex;flex-direction:column;align-items:flex-end;}
.hud .label{font-family:var(--mono);font-size:8px;color:var(--fg-mute);letter-spacing:0.8px;
  text-transform:uppercase;}
.hud .value{font-family:var(--mono);font-size:14px;color:var(--firing);font-weight:700;margin-top:1px;}
.hud .value.bad{color:var(--danger);}

.stage{flex:1;min-height:0;display:flex;flex-direction:column;padding:14px 18px;gap:12px;}
.evidence-row{flex:1;min-height:0;display:flex;gap:12px;}
.ev-card{flex:1;min-width:0;background:var(--bg-1);border:1px solid var(--line);
  display:flex;flex-direction:column;}
.ev-head{font-family:var(--mono);font-size:10px;color:var(--neuro);letter-spacing:1px;
  text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;}
.ev-head .sub{color:var(--fg-mute);font-size:8px;}
.canvas-wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;}
.canvas-wrap canvas{display:block;width:100%;height:100%;}

/* 决策区 */
.decide{display:flex;flex-direction:column;gap:9px;}
.verdict-q{font-family:var(--mono);font-size:11px;color:var(--fg-dim);letter-spacing:0.5px;
  text-align:center;}
.verdict-q b{color:var(--firing);}
.type-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.type-btn{font-family:var(--mono);font-size:11px;padding:6px 12px;cursor:pointer;
  border:1px solid var(--line-strong);background:var(--bg-2);color:var(--fg-dim);
  letter-spacing:0.5px;transition:all 0.12s;}
.type-btn:hover{border-color:var(--neuro);color:var(--firing);}
.type-btn.sel{background:var(--neuro);color:var(--bg-0);border-color:var(--neuro);font-weight:700;}
.act-row{display:flex;gap:14px;justify-content:center;}
.act-btn{font-family:var(--mono);font-size:13px;font-weight:700;padding:9px 30px;cursor:pointer;
  letter-spacing:1px;text-transform:uppercase;transition:all 0.12s;}
.act-btn.keep{border:1px solid var(--keep);background:var(--bg-2);color:var(--keep);}
.act-btn.keep:hover:not(:disabled){background:var(--keep);color:var(--bg-0);}
.act-btn.reject{border:1px solid var(--reject);background:var(--bg-2);color:var(--reject);}
.act-btn.reject:hover:not(:disabled){background:var(--reject);color:var(--bg-0);}
.act-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* 反馈条 */
.feedback{min-height:46px;padding:9px 14px;border:1px solid var(--line);background:var(--bg-2);
  font-size:12px;line-height:1.5;color:var(--fg-dim);display:flex;align-items:center;gap:10px;}
.feedback.good{border-color:var(--keep);}
.feedback.harm{border-color:var(--danger);background:oklch(0.22 0.06 25);}
.feedback.miss{border-color:var(--reject);}
.feedback .tag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;
  padding:3px 8px;flex:0 0 auto;text-transform:uppercase;}
.feedback.good .tag{background:var(--keep);color:var(--bg-0);}
.feedback.harm .tag{background:var(--danger);color:var(--bg-0);}
.feedback.miss .tag{background:var(--reject);color:var(--bg-0);}
.feedback .next{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;
  padding:5px 16px;cursor:pointer;border:1px solid var(--neuro);background:var(--bg-1);
  color:var(--neuro);letter-spacing:1px;text-transform:uppercase;flex:0 0 auto;display:none;}
.feedback .next.show{display:inline-block;}
.feedback .next:hover{background:var(--neuro);color:var(--bg-0);}

/* 通关弹窗 */
.victory{position:absolute;inset:0;background:oklch(0.10 0.03 25 / 0.85);display:none;
  align-items:center;justify-content:center;z-index:50;}
.victory.show{display:flex;}
.victory-box{background:var(--bg-2);border:1px solid var(--neuro);padding:26px 36px;max-width:460px;
  text-align:center;box-shadow:5px 5px 0 var(--bg-0);}
.victory-title{font-family:var(--mono);font-size:17px;color:var(--memory);font-weight:700;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.victory-text{font-size:13px;color:var(--fg-dim);line-height:1.7;margin-bottom:16px;}
.victory-stat{font-family:var(--mono);font-size:12px;color:var(--firing);margin-bottom:16px;}
.victory-btn{font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;
  padding:8px 24px;border:1px solid var(--neuro);background:var(--bg-1);color:var(--neuro);
  letter-spacing:1px;text-transform:uppercase;}
.victory-btn:hover{background:var(--neuro);color:var(--bg-0);}
</style>
</head>
<body>
<div class="wrapper">
  <aside class="game-sidebar">
    <div class="brand" id="brandTitle">IC DETECTIVE<span class="sub" id="brandSub">P-EEG · M17 · ICA 成分质检</span></div>
    <div class="mascot-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72" aria-hidden="true">
        <!-- Spark: 分叉树突生物 -->
        <g transform="translate(36,38)" stroke="var(--synaptic)" stroke-width="2" fill="none" stroke-linecap="round">
          <circle cx="0" cy="0" r="9" fill="var(--axon)" stroke="var(--synaptic)"/>
          <path d="M0,-9 L0,-22 M0,-22 L-7,-29 M0,-22 L7,-29"/>
          <path d="M8,-4 L20,-12 M20,-12 L28,-12 M20,-12 L25,-19"/>
          <path d="M9,3 L22,7 M22,7 L30,4 M22,7 L29,13"/>
          <path d="M-8,4 L-20,11 M-20,11 L-28,9 M-20,11 L-25,18"/>
          <path d="M-8,-4 L-19,-11 M-19,-11 L-27,-13 M-19,-11 L-24,-18"/>
          <path d="M0,9 L0,21 M0,21 L-6,28 M0,21 L6,28"/>
        </g>
        <circle cx="36" cy="38" r="3.2" fill="var(--firing)"/>
        <circle cx="56" cy="26" r="2" fill="var(--memory)"/>
        <circle cx="14" cy="49" r="2" fill="var(--memory)"/>
      </svg>
    </div>
    <div class="mascot-cap" id="mascotCap">SPARK · 质检助手</div>

    <div class="panel-title" id="caseTitle">案卷 · 6 路成分</div>
    <div class="ic-list" id="icList"></div>

    <div class="legend">
      <div class="panel-title" style="border:none;padding-top:0" id="legendTitle">三证据</div>
      <div class="row"><span class="sw" style="background:var(--keep)"></span><span id="legKeep">保留 = 真脑波</span></div>
      <div class="row"><span class="sw" style="background:var(--reject)"></span><span id="legReject">剔除 = 伪迹</span></div>
      <div id="legHint" style="margin-top:5px;color:var(--fg-mute)">看 <b>头皮图</b> · <b>波形</b> · <b>频谱</b> 三证据再判读</div>
    </div>

    <button class="lang-btn" id="langBtn" type="button">EN / 中文</button>
  </aside>

  <main class="game-main">
    <div class="hud">
      <div class="title" id="hudTitle">认出哪一路是眨眼，把它扔掉</div>
      <div class="item"><span class="label" id="hudProgLbl">已结案</span><span class="value" id="hudProg">0 / 6</span></div>
      <div class="item"><span class="label" id="hudHarmLbl">误剔脑波</span><span class="value" id="hudHarm">0</span></div>
    </div>

    <div class="stage">
      <div class="evidence-row">
        <div class="ev-card">
          <div class="ev-head"><span id="evTopoTitle">头皮地形图</span><span class="sub">TOPOMAP</span></div>
          <div class="canvas-wrap"><canvas id="topoCv"></canvas></div>
        </div>
        <div class="ev-card">
          <div class="ev-head"><span id="evWaveTitle">时间波形</span><span class="sub">TIME · 2s</span></div>
          <div class="canvas-wrap"><canvas id="waveCv"></canvas></div>
        </div>
        <div class="ev-card">
          <div class="ev-head"><span id="evSpecTitle">频谱</span><span class="sub">0–60 Hz</span></div>
          <div class="canvas-wrap"><canvas id="specCv"></canvas></div>
        </div>
      </div>

      <div class="decide">
        <div class="verdict-q" id="verdictQ">这是什么成分？先选类型，再判 <b>保留 / 剔除</b></div>
        <div class="type-row" id="typeRow"></div>
        <div class="act-row">
          <button class="act-btn keep" id="keepBtn" type="button" disabled>保留 KEEP</button>
          <button class="act-btn reject" id="rejectBtn" type="button" disabled>剔除 REJECT</button>
        </div>
      </div>

      <div class="feedback" id="feedback">
        <span class="tag" id="fbTag" style="display:none"></span>
        <span id="fbText">逐路审 6 个独立成分。判对推进，剔错脑波会损坏重建数据。</span>
        <button class="next" id="nextBtn" type="button">下一路</button>
      </div>
    </div>

    <div class="victory" id="victory">
      <div class="victory-box">
        <div class="victory-title" id="vicTitle">成分质检员 已认证</div>
        <div class="victory-stat" id="vicStat"></div>
        <div class="victory-text" id="vicText"></div>
        <button class="victory-btn" id="vicBtn" type="button">重新质检</button>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";
(function(){
  // ============ i18n ============
  const I18N = {
    zh:{
      brand:'IC DETECTIVE', brandSub:'P-EEG · M17 · ICA 成分质检',
      mascot:'SPARK · 质检助手', caseTitle:'案卷 · 6 路成分',
      legendTitle:'三证据', legKeep:'保留 = 真脑波', legReject:'剔除 = 伪迹',
      legHint:'看 <b>头皮图</b> · <b>波形</b> · <b>频谱</b> 三证据再判读',
      lang:'EN / 中文', hudTitle:'认出哪一路是眨眼，把它扔掉',
      progLbl:'已结案', harmLbl:'误剔脑波',
      evTopo:'头皮地形图', evWave:'时间波形', evSpec:'频谱',
      verdictQ:'这是什么成分？先选类型，再判 <b>保留 / 剔除</b>',
      keep:'保留 KEEP', reject:'剔除 REJECT', next:'下一路',
      intro:'逐路审 6 个独立成分。判对推进，剔错脑波会损坏重建数据。',
      vicTitle:'成分质检员 已认证', vicBtn:'重新质检',
      tagGood:'结案', tagHarm:'数据受损', tagMiss:'误判',
      types:{ blink:'眨眼伪迹', emg:'肌电伪迹', alpha:'枕区脑波', bad:'坏电极', mu:'运动脑波', line:'工频干扰' },
    },
    en:{
      brand:'IC DETECTIVE', brandSub:'P-EEG · M17 · ICA QA',
      mascot:'SPARK · QA aide', caseTitle:'CASEFILE · 6 ICs',
      legendTitle:'EVIDENCE', legKeep:'KEEP = real brain', legReject:'REJECT = artifact',
      legHint:'read <b>topomap</b> · <b>waveform</b> · <b>spectrum</b> before you rule',
      lang:'中文 / EN', hudTitle:'Spot the blink and throw it out',
      progLbl:'CLOSED', harmLbl:'BRAIN KILLED',
      evTopo:'Scalp topomap', evWave:'Time waveform', evSpec:'Spectrum',
      verdictQ:'What component is this? Pick a type, then rule <b>KEEP / REJECT</b>',
      keep:'KEEP', reject:'REJECT', next:'NEXT IC',
      intro:'Inspect 6 independent components one by one. Reject a real brain source and you corrupt the reconstruction.',
      vicTitle:'COMPONENT QA · CERTIFIED', vicBtn:'INSPECT AGAIN',
      tagGood:'CLOSED', tagHarm:'DATA HARMED', tagMiss:'MISRULED',
      types:{ blink:'Blink artifact', emg:'EMG artifact', alpha:'Occipital brain', bad:'Bad channel', mu:'Motor brain', line:'Line noise' },
    }
  };
  let lang = 'zh';
  const t = () => I18N[lang];

  // ============ 6 IC 数据定义 ============
  // verdict: 'keep'(真脑波) | 'reject'(伪迹)
  // topo: 头皮活动分布; wave/spec: 信号特征参数
  const ICS = [
    { id:'IC1', type:'blink', verdict:'reject',
      topo:'frontal', wave:'blink', spec:'lowdom',
      fb:{ zh:'前额一个大红斑 + 波形里慢而大的尖峰 + 能量全堆在低频——这是<b>眨眼</b>。眼球带电，每眨一下就在前额电极上画出大慢波。扔掉它，脑波就干净了。',
           en:'A big frontal blob + slow large spikes in the waveform + energy piled at low freq — this is a <b>blink</b>. The charged eyeball paints a large slow wave on frontal channels each blink. Drop it and the brain signal cleans up.' } },
    { id:'IC2', type:'emg', verdict:'reject',
      topo:'temporal', wave:'emg', spec:'highdom',
      fb:{ zh:'活动挤在颞侧（耳朵上方肌肉处）+ 波形是密集高频毛刺 + 能量集中在高频（>20Hz）——这是咬牙/皱眉的<b>肌电</b>。肌肉放电比脑波快得多，剔除。',
           en:'Activity hugs the temporal sites (over the jaw muscles) + dense high-freq fuzz in the waveform + energy bunched at high freq (>20Hz) — this is jaw/brow <b>EMG</b>. Muscle fires far faster than brain. Reject.' } },
    { id:'IC3', type:'alpha', verdict:'keep',
      topo:'occipital', wave:'alpha', spec:'alphapeak',
      fb:{ zh:'活动在后脑（枕区）+ 波形是规则的~10Hz节律 + 频谱有一个漂亮的 alpha 峰（8–12Hz）——这是<b>真脑波</b>（闭眼放松时的枕区 alpha）。保留它！',
           en:'Activity sits at the back of the head (occipital) + a regular ~10Hz rhythm + a clean alpha peak (8–12Hz) in the spectrum — this is a <b>real brain</b> source (occipital alpha when eyes close). Keep it!' } },
    { id:'IC4', type:'bad',  verdict:'reject',
      topo:'single', wave:'noisy', spec:'flat',
      fb:{ zh:'活动只集中在<b>单个电极</b>上（其余头皮全暗）+ 波形是无规律乱跳 + 频谱平坦无峰——这是<b>坏电极</b>（接触不良）。它不是大脑，剔除。',
           en:'Activity lives on a <b>single electrode</b> only (rest of scalp dark) + erratic jitter in the waveform + flat featureless spectrum — this is a <b>bad channel</b> (loose contact). Not the brain. Reject.' } },
    { id:'IC5', type:'mu',   verdict:'keep',
      topo:'central', wave:'mu', spec:'mupeak',
      fb:{ zh:'活动在头顶中央（运动皮层 C3/C4）+ 波形是带形的~10Hz节律 + 频谱在 mu 段有峰——这是运动相关的<b>真脑波</b>（mu 节律）。它是大脑，保留！',
           en:'Activity over the central vertex (motor cortex C3/C4) + a banded ~10Hz rhythm + a mu-band peak in the spectrum — this is a motor-related <b>real brain</b> source (mu rhythm). It is the brain. Keep!' } },
    { id:'IC6', type:'line', verdict:'reject',
      topo:'diffuse', wave:'line', spec:'spike50',
      fb:{ zh:'活动在<b>整个头皮</b>均匀铺开 + 波形是完美的固定正弦 + 频谱在 50Hz 有一根尖刺——这是市电<b>工频干扰</b>。大脑不会这么规整。剔除。',
           en:'Activity spreads evenly across the <b>whole scalp</b> + a perfect fixed sine in the waveform + a sharp spike at 50Hz in the spectrum — this is mains <b>line noise</b>. The brain is never this regular. Reject.' } },
  ];

  // 类型按钮顺序 (混合, 不暗示答案)
  const TYPE_ORDER = ['blink','emg','alpha','bad','mu','line'];

  // ============ 状态 ============
  const stateGame = {
    cur: 0,
    solved: new Array(ICS.length).fill(null), // null | 'keep' | 'reject' | 'wrong'
    selType: null,
    locked: false,
    harm: 0,
  };

  // ============ DOM ============
  const $ = id => document.getElementById(id);
  const topoCv = $('topoCv'), waveCv = $('waveCv'), specCv = $('specCv');
  const tCtx = topoCv.getContext('2d'), wCtx = waveCv.getContext('2d'), sCtx = specCv.getContext('2d');

  function fitCanvas(cv, ctx){
    const r = cv.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.max(2, Math.round(r.width * dpr));
    cv.height = Math.max(2, Math.round(r.height * dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return { w:r.width, h:r.height };
  }

  function css(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  // ============ 绘制：头皮地形图 ============
  function drawTopo(){
    const { w, h } = fitCanvas(topoCv, tCtx);
    tCtx.clearRect(0,0,w,h);
    const cx = w/2, cy = h/2, R = Math.min(w,h)*0.40;
    // 头形圆 + 鼻子 + 耳朵
    tCtx.strokeStyle = css('--line-strong'); tCtx.lineWidth = 1.5;
    tCtx.beginPath(); tCtx.arc(cx,cy,R,0,Math.PI*2); tCtx.stroke();
    tCtx.beginPath(); tCtx.moveTo(cx-R*0.16,cy-R); tCtx.lineTo(cx,cy-R*1.18); tCtx.lineTo(cx+R*0.16,cy-R); tCtx.stroke(); // nose
    tCtx.beginPath(); tCtx.arc(cx-R,cy,R*0.13,Math.PI*0.5,Math.PI*1.5); tCtx.stroke(); // L ear
    tCtx.beginPath(); tCtx.arc(cx+R,cy,R*0.13,-Math.PI*0.5,Math.PI*0.5); tCtx.stroke(); // R ear

    const ic = ICS[stateGame.cur];
    // hotspots: 每个 {x,y,s,r} 相对 cx/cy 半径, s 控制颜色冷暖
    let spots = [];
    switch(ic.topo){
      case 'frontal':   spots=[{x:0,y:-0.62,s:1,r:0.55}]; break;                 // 前额一个大斑
      case 'temporal':  spots=[{x:-0.78,y:0.05,s:1,r:0.38},{x:0.78,y:0.05,s:1,r:0.38}]; break; // 双颞
      case 'occipital': spots=[{x:0,y:0.66,s:1,r:0.5}]; break;                   // 后脑
      case 'single':    spots=[{x:0.55,y:-0.35,s:1,r:0.22}]; break;             // 单电极
      case 'central':   spots=[{x:-0.34,y:-0.02,s:1,r:0.30},{x:0.34,y:-0.02,s:-1,r:0.30}]; break; // C3/C4 双极
      case 'diffuse':   spots=[]; break;                                         // 全头均匀
    }
    // 像素填充 (低分辨网格, iframe 中也快)
    const step = 6;
    for(let py=cy-R; py<=cy+R; py+=step){
      for(let px=cx-R; px<=cx+R; px+=step){
        const dx=(px-cx)/R, dy=(py-cy)/R;
        if(dx*dx+dy*dy>1) continue;
        let v=0;
        if(ic.topo==='diffuse'){ v=0.55; }
        else for(const sp of spots){
          const ddx=dx-sp.x, ddy=dy-sp.y;
          v += sp.s * Math.exp(-(ddx*ddx+ddy*ddy)/(2*sp.r*sp.r));
        }
        v=Math.max(-1,Math.min(1,v));
        let col;
        if(v>=0){ const a=Math.min(1,v); col=`oklch(${0.30+0.55*a} ${0.06+0.13*a} 25 / ${0.18+0.8*a})`; }
        else { const a=Math.min(1,-v); col=`oklch(${0.32+0.50*a} ${0.05+0.12*a} 235 / ${0.18+0.8*a})`; }
        tCtx.fillStyle=col;
        tCtx.fillRect(px-step/2,py-step/2,step,step);
      }
    }
    // 19 电极点
    tCtx.fillStyle = css('--fg-mute');
    const elec=[[0,-0.7],[-0.4,-0.6],[0.4,-0.6],[-0.7,-0.3],[0.7,-0.3],[-0.4,0],[0.4,0],[0,0],
                [-0.7,0.3],[0.7,0.3],[-0.4,0.6],[0.4,0.6],[0,0.7],[-0.55,0.55],[0.55,0.55],[-0.55,-0.55],[0.55,-0.55],[0,-0.35],[0,0.35]];
    for(const e of elec){ tCtx.beginPath(); tCtx.arc(cx+e[0]*R,cy+e[1]*R,1.6,0,Math.PI*2); tCtx.fill(); }
  }

  // ============ 绘制：时间波形 ============
  function drawWave(){
    const { w, h } = fitCanvas(waveCv, wCtx);
    wCtx.clearRect(0,0,w,h);
    const mid=h/2, amp=h*0.32, pad=8;
    wCtx.strokeStyle = css('--line'); wCtx.lineWidth=1;
    wCtx.beginPath(); wCtx.moveTo(pad,mid); wCtx.lineTo(w-pad,mid); wCtx.stroke();
    const ic=ICS[stateGame.cur];
    const isBrain = ic.verdict==='keep';
    wCtx.strokeStyle = isBrain ? css('--keep') : css('--reject');
    wCtx.lineWidth=1.6; wCtx.beginPath();
    const N=420;
    for(let i=0;i<=N;i++){
      const x=pad+(w-2*pad)*i/N;
      const tt=i/N; // 0..1 over 2s
      let y=0;
      switch(ic.wave){
        case 'blink': { // 慢而大的尖峰, 几次
          for(const c of [0.18,0.52,0.82]){ const d=tt-c; y+=Math.exp(-d*d/0.0009)*1.0; }
          y=y*0.95+0.04*Math.sin(tt*60); break; }
        case 'emg': { // 密集高频毛刺
          y=0.55*Math.sin(tt*420)+0.3*Math.sin(tt*610+1)+0.2*Math.sin(tt*790+2); break; }
        case 'alpha': { y=0.7*Math.sin(tt*2*Math.PI*20)+0.06*Math.sin(tt*90); break; } // ~10Hz over 2s -> 20 cycles
        case 'noisy': { let s=0; for(let k=0;k<6;k++) s+=Math.sin(tt*(150+k*97)+k); y=s*0.16+(Math.sin(tt*9991)*0.25); break; }
        case 'mu': { // 带形包络的 10Hz
          const env=0.5+0.5*Math.sin(tt*2*Math.PI*2.2); y=0.75*env*Math.sin(tt*2*Math.PI*20); break; }
        case 'line': { y=0.78*Math.sin(tt*2*Math.PI*100); break; } // 50Hz over 2s -> 100 cycles
      }
      const py=mid - y*amp;
      if(i===0) wCtx.moveTo(x,py); else wCtx.lineTo(x,py);
    }
    wCtx.stroke();
  }

  // ============ 绘制：频谱 ============
  function drawSpec(){
    const { w, h } = fitCanvas(specCv, sCtx);
    sCtx.clearRect(0,0,w,h);
    const pad=10, base=h-18, top=14, gw=w-2*pad;
    // 轴
    sCtx.strokeStyle=css('--line'); sCtx.lineWidth=1;
    sCtx.beginPath(); sCtx.moveTo(pad,base); sCtx.lineTo(w-pad,base); sCtx.stroke();
    sCtx.fillStyle=css('--fg-mute'); sCtx.font="9px 'JetBrains Mono',monospace";
    for(const f of [0,10,20,30,40,50,60]){
      const x=pad+gw*f/60;
      sCtx.fillText(String(f), x-5, base+13);
      sCtx.strokeStyle=css('--line'); sCtx.beginPath(); sCtx.moveTo(x,base); sCtx.lineTo(x,base-3); sCtx.stroke();
    }
    const ic=ICS[stateGame.cur];
    const isBrain = ic.verdict==='keep';
    // 频谱形状函数 power(f) 0..60Hz
    function pw(f){
      switch(ic.spec){
        case 'lowdom':   return Math.exp(-f/4)*1.0 + 0.03;                 // 能量全在低频
        case 'highdom':  return 0.08 + 0.7/(1+Math.exp(-(f-25)/4));        // 高频抬升
        case 'alphapeak':return 0.12*Math.exp(-f/30) + 0.9*Math.exp(-Math.pow(f-10,2)/8); // alpha 峰
        case 'flat':     return 0.42 + 0.05*Math.sin(f*0.7);               // 平坦
        case 'mupeak':   return 0.10*Math.exp(-f/30) + 0.8*Math.exp(-Math.pow(f-11,2)/6); // mu 峰
        case 'spike50':  return 0.06 + 0.95*Math.exp(-Math.pow(f-50,2)/1.2); // 50Hz 尖刺
      }
      return 0.2;
    }
    sCtx.fillStyle = isBrain ? css('--keep') : css('--reject');
    sCtx.strokeStyle = isBrain ? css('--keep') : css('--reject');
    sCtx.beginPath(); sCtx.moveTo(pad,base);
    for(let i=0;i<=120;i++){
      const f=60*i/120; const x=pad+gw*i/120;
      const y=base-(base-top)*Math.min(1,pw(f));
      sCtx.lineTo(x,y);
    }
    sCtx.lineTo(w-pad,base); sCtx.closePath();
    sCtx.globalAlpha=0.28; sCtx.fill(); sCtx.globalAlpha=1; sCtx.stroke();
  }

  function drawAll(){ drawTopo(); drawWave(); drawSpec(); }

  // ============ UI 渲染 ============
  function renderTexts(){
    const T=t();
    $('brandTitle').childNodes[0].nodeValue = T.brand;
    $('brandSub').textContent = T.brandSub;
    $('mascotCap').textContent = T.mascot;
    $('caseTitle').textContent = T.caseTitle;
    $('legendTitle').textContent = T.legendTitle;
    $('legKeep').textContent = T.legKeep;
    $('legReject').textContent = T.legReject;
    $('legHint').innerHTML = T.legHint;
    $('langBtn').textContent = T.lang;
    $('hudTitle').textContent = T.hudTitle;
    $('hudProgLbl').textContent = T.progLbl;
    $('hudHarmLbl').textContent = T.harmLbl;
    $('evTopoTitle').textContent = T.evTopo;
    $('evWaveTitle').textContent = T.evWave;
    $('evSpecTitle').textContent = T.evSpec;
    $('verdictQ').innerHTML = T.verdictQ;
    $('keepBtn').textContent = T.keep;
    $('rejectBtn').textContent = T.reject;
    $('nextBtn').textContent = T.next;
    $('vicBtn').textContent = T.vicBtn;
    $('vicTitle').textContent = T.vicTitle;
    renderTypeButtons();
    renderICList();
  }

  function renderTypeButtons(){
    const row=$('typeRow'); row.innerHTML='';
    const T=t();
    for(const key of TYPE_ORDER){
      const b=document.createElement('button');
      b.type='button'; b.className='type-btn'; b.dataset.type=key;
      b.textContent=T.types[key];
      if(stateGame.selType===key) b.classList.add('sel');
      if(stateGame.locked) b.disabled=true;
      b.addEventListener('click',()=>{ if(stateGame.locked) return; stateGame.selType=key; renderTypeButtons(); updateActButtons(); });
      row.appendChild(b);
    }
  }

  function renderICList(){
    const list=$('icList'); list.innerHTML='';
    ICS.forEach((ic,i)=>{
      const d=document.createElement('div');
      d.className='ic-dot';
      const st=stateGame.solved[i];
      if(st==='keep') d.classList.add('solved-keep');
      else if(st==='reject') d.classList.add('solved-reject');
      else if(st==='wrong') d.classList.add('solved-wrong');
      if(i===stateGame.cur && st===null) d.classList.add('current');
      const mark=document.createElement('span'); mark.className='mark';
      const label=document.createElement('span'); label.textContent=ic.id;
      d.appendChild(mark); d.appendChild(label);
      if(st!==null){
        const v=document.createElement('span');
        v.style.cssText='margin-left:auto;font-size:9px;color:var(--fg-mute)';
        v.textContent = st==='wrong' ? (lang==='zh'?'误判':'MISS') : (st==='keep'?'KEEP':'REJECT');
        d.appendChild(v);
      }
      list.appendChild(d);
    });
  }

  function updateActButtons(){
    const ready = stateGame.selType!==null && !stateGame.locked;
    $('keepBtn').disabled = !ready;
    $('rejectBtn').disabled = !ready;
  }

  function setHud(){
    const resolved = stateGame.solved.filter(s=>s!==null).length;
    $('hudProg').textContent = resolved+' / '+ICS.length;
    const harmEl=$('hudHarm'); harmEl.textContent=String(stateGame.harm);
    harmEl.classList.toggle('bad', stateGame.harm>0);
  }

  // ============ 判读 ============
  function rule(action){ // action: 'keep' | 'reject'
    if(stateGame.locked || stateGame.selType===null) return;
    const ic=ICS[stateGame.cur];
    const T=t();
    const fb=$('feedback'), fbTag=$('fbTag'), fbText=$('fbText'), nextBtn=$('nextBtn');
    fb.className='feedback'; fbTag.style.display='inline-block';

    const typeRight = stateGame.selType===ic.type;
    const actRight = action===ic.verdict;

    if(actRight && typeRight){
      // 完全正确
      stateGame.locked=true;
      stateGame.solved[stateGame.cur] = ic.verdict;
      fb.classList.add('good'); fbTag.textContent=T.tagGood;
      fbText.innerHTML = ic.fb[lang];
      nextBtn.classList.add('show');
    } else if(action==='reject' && ic.verdict==='keep'){
      // 把真脑波剔了 —— 后果！
      stateGame.locked=true;
      stateGame.solved[stateGame.cur]='wrong';
      stateGame.harm++;
      fb.classList.add('harm'); fbTag.textContent=T.tagHarm;
      fbText.innerHTML = (lang==='zh'
        ? '你把一路<b>真脑波</b>当成伪迹扔掉了！重建出来的 EEG 少了真实的大脑节律，数据被你弄坏了。这一路其实该<b>保留</b>—— '
        : 'You threw away a <b>real brain</b> source as if it were an artifact! The reconstructed EEG now misses a true brain rhythm — you corrupted the data. This one should have been <b>kept</b> — ') + ic.fb[lang];
      nextBtn.classList.add('show');
    } else {
      // 动作或类型错 (但没误剔脑波): 针对性提示, 不锁, 让重判
      fb.classList.add('miss'); fbTag.textContent=T.tagMiss;
      let hint;
      if(!actRight && action==='keep' && ic.verdict==='reject'){
        hint = lang==='zh'
          ? '你想保留它，但三证据指向伪迹——再看一眼头皮分布和频谱，这不是大脑该有的样子。'
          : 'You want to keep it, but the three pieces of evidence point to an artifact — look again at the scalp map and spectrum, this is not what brain looks like.';
      } else { // 动作对但类型选错
        hint = lang==='zh'
          ? '保留/剔除的方向对了，但<b>类型</b>选错了。对照头皮位置 + 波形 + 频谱峰的位置，重新选类型。'
          : 'Your keep/reject call is right, but the <b>type</b> is wrong. Match the scalp location + waveform + spectral peak, then re-pick the type.';
      }
      fbText.innerHTML = hint;
      nextBtn.classList.remove('show');
    }
    setHud(); renderICList(); renderTypeButtons(); updateActButtons();
  }

  // ============ 推进 ============
  function advance(){
    const allDone = stateGame.solved.every(s=>s!==null);
    if(allDone){ showVictory(); return; }
    // 找下一个未结案的
    let next=-1;
    for(let i=1;i<=ICS.length;i++){
      const idx=(stateGame.cur+i)%ICS.length;
      if(stateGame.solved[idx]===null){ next=idx; break; }
    }
    stateGame.cur = next>=0 ? next : stateGame.cur;
    stateGame.selType=null; stateGame.locked=false;
    const fb=$('feedback'); fb.className='feedback';
    $('fbTag').style.display='none';
    $('fbText').textContent = t().intro;
    $('nextBtn').classList.remove('show');
    drawAll(); renderTypeButtons(); renderICList(); updateActButtons(); setHud();
  }

  function showVictory(){
    const correct = stateGame.solved.filter(s=>s==='keep'||s==='reject').length;
    $('vicStat').textContent = (lang==='zh'
      ? `结案 ${ICS.length} / ${ICS.length} · 正确判读 ${correct} · 误剔脑波 ${stateGame.harm}`
      : `Closed ${ICS.length}/${ICS.length} · Correct ${correct} · Brain killed ${stateGame.harm}`);
    $('vicText').innerHTML = stateGame.harm===0
      ? (lang==='zh'
        ? '完美！你认出了眨眼、肌电、坏电极、工频四类伪迹并扔掉，同时守住了枕区 alpha 和中央 mu 两路真脑波。这就是 ICA 成分质检的核心：<b>看头皮图 + 波形 + 频谱三证据，留脑波、扔伪迹</b>。'
        : 'Perfect. You spotted blink, EMG, bad-channel and line-noise artifacts and dropped them, while protecting the occipital alpha and central mu brain sources. That is the heart of ICA QA: <b>read topomap + waveform + spectrum, keep brain, drop artifacts</b>.')
      : (lang==='zh'
        ? `你完成了质检，但误剔了 ${stateGame.harm} 路真脑波，重建数据已受损。记住：拿不准时宁可多看一眼三证据，也别把大脑当伪迹扔掉。再来一次？`
        : `You finished the pass but rejected ${stateGame.harm} real brain source(s) — the reconstruction is damaged. Lesson: when unsure, read the three evidences again rather than discarding the brain as an artifact. Try again?`);
    $('victory').classList.add('show');
  }

  function resetGame(){
    stateGame.cur=0;
    stateGame.solved=new Array(ICS.length).fill(null);
    stateGame.selType=null; stateGame.locked=false; stateGame.harm=0;
    $('victory').classList.remove('show');
    const fb=$('feedback'); fb.className='feedback';
    $('fbTag').style.display='none';
    $('fbText').textContent=t().intro;
    $('nextBtn').classList.remove('show');
    drawAll(); renderTexts(); updateActButtons(); setHud();
  }

  // ============ 事件 ============
  $('keepBtn').addEventListener('click',()=>rule('keep'));
  $('rejectBtn').addEventListener('click',()=>rule('reject'));
  $('nextBtn').addEventListener('click',advance);
  $('vicBtn').addEventListener('click',resetGame);
  $('langBtn').addEventListener('click',()=>{
    lang = lang==='zh' ? 'en' : 'zh';
    document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
    renderTexts(); updateActButtons(); setHud();
    if($('victory').classList.contains('show')) showVictory();
  });

  let rt;
  window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(drawAll,120); });

  // ============ init ============
  function init(){
    renderTexts();
    drawAll();
    updateActButtons();
    setHud();
    // 二次重绘, 等布局稳定 (iframe 场景)
    requestAnimationFrame(()=>requestAnimationFrame(drawAll));
  }
  init();
})();
</script>
</body>
</html>
