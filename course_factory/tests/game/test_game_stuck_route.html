<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TERRAIN STUCK ASSESSMENT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;padding:8px}
.header{text-align:center;padding:4px 0;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,#ffb59c,#ff7f50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:10px;color:#8a8886;margin-top:2px}
.progress-bar{flex-shrink:0;display:flex;gap:4px;padding:6px 0;justify-content:center}
.progress-dot{width:32px;height:4px;background:rgba(138,136,134,0.2)}
.progress-dot.done{background:#10b981}
.progress-dot.current{background:linear-gradient(90deg,#ffb59c,#ff7f50)}
.question-area{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;padding:0 12px;overflow-y:auto}
.scenario{padding:12px;background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);margin-bottom:10px}
.scenario-title{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:#00daf3;letter-spacing:1px;margin-bottom:6px}
.scenario-desc{font-size:12px;color:#c6c6c6;line-height:1.6}
.scenario-visual{font-size:11px;color:#8a8886;margin-top:6px;font-style:italic}
.options{display:flex;flex-direction:column;gap:6px}
.option{padding:10px 14px;background:rgba(28,27,27,0.6);border:1px solid rgba(138,136,134,0.15);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px}
.option:hover{background:rgba(53,53,52,0.8);border-color:rgba(255,181,156,0.3)}
.option .opt-key{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:#ffb59c;min-width:20px}
.option .opt-text{font-size:12px;color:#e5e2e1}
.option.correct{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.5)}
.option.wrong{background:rgba(255,95,31,0.1);border-color:rgba(255,95,31,0.3)}
.option.disabled{pointer-events:none;opacity:0.7}
.option.correct .opt-key{color:#10b981}
.option.wrong .opt-key{color:#ff5f1f}
.feedback{padding:10px 12px;margin-top:8px;font-size:11px;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.ok{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:#c6c6c6}
.feedback.fail{background:rgba(255,95,31,0.08);border:1px solid rgba(255,95,31,0.2);color:#c6c6c6}
.feedback .fb-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;margin-bottom:4px}
.bottom-bar{flex-shrink:0;display:flex;justify-content:center;align-items:center;padding:6px;gap:12px}
.btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:6px 20px;cursor:pointer;border:none;color:#131313;background:linear-gradient(135deg,#ffb59c,#ff7f50);transition:box-shadow 0.2s}
.btn:hover{box-shadow:0 0 20px rgba(255,127,80,0.4)}
.btn:disabled{opacity:0.3;cursor:default;box-shadow:none}
.score-text{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886}
.result-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(19,19,19,0.92);backdrop-filter:blur(12px);display:none;justify-content:center;align-items:center;z-index:200;flex-direction:column;padding:20px}
.result-overlay.show{display:flex}
.result-panel{max-width:480px;width:100%;max-height:80vh;overflow-y:auto;padding:20px}
.result-panel h2{font-family:'Space Grotesk',sans-serif;font-size:20px;text-align:center;margin-bottom:8px;background:linear-gradient(90deg,#ffb59c,#ff7f50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-panel .score-big{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;margin-bottom:16px}
.result-row{padding:8px;margin-bottom:4px;background:rgba(28,27,27,0.6);border:1px solid rgba(138,136,134,0.1);font-size:11px}
.result-row .rr-q{font-weight:700;color:#ffb59c;font-family:'Space Grotesk',sans-serif;font-size:11px}
.result-row .rr-a{color:#c6c6c6;margin-top:3px;line-height:1.4}
.guide-panel{position:fixed;top:8px;right:8px;width:230px;max-height:38vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;cursor:pointer;color:#ffb59c;display:flex;justify-content:space-between;align-items:center}
.guide-panel ul{padding-left:14px;line-height:1.5}
.guide-panel .collapsed{display:none}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>TERRAIN STUCK ASSESSMENT</h1>
    <p>IDENTIFY THE HAZARD TYPE FOR EACH TERRAIN</p>
  </div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="question-area" id="questionArea"></div>
  <div class="bottom-bar">
    <span class="score-text" id="scoreText">Q1 / 5</span>
    <button class="btn" id="btnNext" disabled>NEXT</button>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-panel" id="resultPanel"></div>
  <div style="margin-top:12px;display:flex;gap:10px">
    <button class="btn" id="btnRetry" style="background:rgba(28,27,27,0.92);color:#c6c6c6;border:1px solid rgba(138,136,134,0.15)">RETRY</button>
  </div>
</div>

<div class="guide-panel">
  <h3 id="guideToggle">GUIDE <span id="guideArrow">-</span></h3>
  <div id="guideContent">
    <ul>
      <li>5 个火星地形场景，判断每个的风险类型</li>
      <li>区分：安全通行 / 打滑风险 / 卡轮风险</li>
      <li>选择后查看详细解析</li>
      <li>目标：至少答对 4/5 题</li>
      <li>结合上一节"打滑"知识做综合判断</li>
    </ul>
  </div>
</div>

<script>
(function(){
  var QUESTIONS = [
    {
      title: 'SCENARIO A -- COBBLE FIELD',
      desc: '导航相机拍到前方地面密集分布着拳头到篮球大小的石块，高度参差不齐，部分石块高度接近 30cm。石块之间有不规则的缝隙。',
      visual: 'NavCam image: dense angular rocks, height variation 10-35cm, irregular gaps between rocks',
      options: ['SAFE -- 石块密集说明地面稳固', 'SLIP RISK -- 石块表面光滑可能打滑', 'STUCK RISK -- 高中心搁浅 + 机械卡阻双重风险'],
      correct: 2,
      explain: '密集石块区是典型的卡轮高危区。石块高度接近底盘间隙（30cm）可能导致高中心搁浅，石块之间的缝隙可能卡住车轮。这里的风险不是打滑（因为石头表面有足够摩擦力），而是物理卡阻。'
    },
    {
      title: 'SCENARIO B -- WIND-POLISHED SLOPE',
      desc: '一片坡度约 12 度的岩石斜面，表面被风沙打磨得非常光滑，几乎没有可见的纹理或裂缝。',
      visual: 'NavCam image: smooth rock surface, 12-degree incline, no visible texture or cracks',
      options: ['SAFE -- 坡度只有 12 度，很平缓', 'SLIP RISK -- 光滑面摩擦系数低', 'STUCK RISK -- 可能卡进岩石裂缝'],
      correct: 1,
      explain: '光滑岩面 + 坡度的组合是打滑风险，不是卡轮风险。虽然 12 度不算陡，但光滑面大幅降低了摩擦系数，车轮可能在坡面上侧滑。没有裂缝和凸岩，所以不存在卡轮的物理阻碍。'
    },
    {
      title: 'SCENARIO C -- FRACTURE ZONE',
      desc: '地面出现多条平行裂缝，宽度在 8-12cm 之间，深度看起来超过 20cm。裂缝方向与预定行驶方向垂直。',
      visual: 'NavCam image: parallel fractures, 8-12cm wide, >20cm deep, perpendicular to travel direction',
      options: ['SAFE -- 裂缝不宽，可以直接碾过', 'SLIP RISK -- 裂缝边缘可能松软', 'STUCK RISK -- 裂缝宽度刚好可能卡住车轮'],
      correct: 2,
      explain: '8-12cm 的裂缝宽度恰好落在车轮卡阻的危险区间（5-15cm）。垂直于行驶方向意味着车轮会直接落入裂缝。超过 20cm 的深度意味着一旦卡入很难脱出。这是典型的机械卡阻风险。'
    },
    {
      title: 'SCENARIO D -- GRADUAL DARKENING',
      desc: '地面颜色从右侧的浅褐色逐渐过渡到左侧的深灰色。过渡带约 3 米宽。浅色区域看起来松软，深色区域是坚硬基岩。',
      visual: 'NavCam image: gradual color transition over ~3m, light brown (loose) to dark gray (bedrock)',
      options: ['SAFE -- 颜色变化只是光照角度不同', 'SLIP RISK -- 松软区域摩擦力不够', 'STUCK RISK -- 软硬交界可能导致前轮陷入式卡轮'],
      correct: 2,
      explain: '渐变的软硬交界带是"交界陷落"（Transition Trap）的典型触发场景。车辆从硬面驶入软面时，前轮开始下沉而后轮还在推进，导致车头越陷越深。和纯打滑不同，这种卡轮是前后不对称的——不是所有轮子同时失去抓地力。'
    },
    {
      title: 'SCENARIO E -- RIPPLE DUNES',
      desc: '前方是一片开阔的沙丘，表面有整齐的波纹纹路，坡度平缓（约 5 度）。沙粒看起来很细，没有石块也没有裂缝。',
      visual: 'NavCam image: open dune field, regular ripples, fine sand, ~5-degree slope, no rocks',
      options: ['SAFE -- 坡度很小，没有障碍物', 'SLIP RISK -- 波纹沙面松散，车轮会空转', 'STUCK RISK -- 细沙可能卡住车轮转动'],
      correct: 1,
      explain: '波纹沙面是打滑的典型信号（上一节学过的内容）。没有石块裂缝意味着不存在机械卡阻风险；坡度平缓不会搁浅。风险是车轮在松散沙面上空转打滑，而不是被物理卡住。这道题考验你是否能区分打滑和卡轮。'
    }
  ];

  var currentQ = 0;
  var score = 0;
  var answers = [];
  var answered = false;

  function renderProgress() {
    var bar = document.getElementById('progressBar');
    bar.innerHTML = '';
    for (var i = 0; i < QUESTIONS.length; i++) {
      var dot = document.createElement('div');
      dot.className = 'progress-dot' + (i < currentQ ? ' done' : (i === currentQ ? ' current' : ''));
      bar.appendChild(dot);
    }
  }

  function renderQuestion() {
    var q = QUESTIONS[currentQ];
    answered = false;
    document.getElementById('btnNext').disabled = true;
    document.getElementById('scoreText').textContent = 'Q' + (currentQ + 1) + ' / ' + QUESTIONS.length;
    renderProgress();

    var area = document.getElementById('questionArea');
    var html = '<div class="scenario"><div class="scenario-title">' + q.title + '</div>';
    html += '<div class="scenario-desc">' + q.desc + '</div>';
    html += '<div class="scenario-visual">' + q.visual + '</div></div>';
    html += '<div class="options" id="optionsContainer">';
    var keys = ['A', 'B', 'C'];
    q.options.forEach(function(opt, i) {
      html += '<div class="option" data-idx="' + i + '"><span class="opt-key">' + keys[i] + '</span><span class="opt-text">' + opt + '</span></div>';
    });
    html += '</div>';
    html += '<div class="feedback" id="feedback"></div>';
    area.innerHTML = html;

    var options = area.querySelectorAll('.option');
    options.forEach(function(el) {
      el.addEventListener('click', function() {
        if (answered) return;
        answered = true;
        var idx = parseInt(el.getAttribute('data-idx'));
        var isCorrect = idx === q.correct;
        if (isCorrect) score++;
        answers.push({q: currentQ, pick: idx, correct: q.correct, ok: isCorrect});

        options.forEach(function(o) {
          o.classList.add('disabled');
          var oi = parseInt(o.getAttribute('data-idx'));
          if (oi === q.correct) o.classList.add('correct');
          else if (oi === idx && !isCorrect) o.classList.add('wrong');
        });

        var fb = document.getElementById('feedback');
        fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'fail');
        fb.innerHTML = '<div class="fb-title">' + (isCorrect ? 'CORRECT' : 'INCORRECT') + '</div>' + q.explain;
        document.getElementById('btnNext').disabled = false;
      });
    });
  }

  function showResult() {
    var overlay = document.getElementById('resultOverlay');
    var panel = document.getElementById('resultPanel');
    var color = score >= 4 ? '#10b981' : (score >= 3 ? '#ff7f50' : '#ff5f1f');
    var pass = score >= 4;
    var html = '<h2>ASSESSMENT COMPLETE</h2>';
    html += '<div class="score-big" style="color:' + color + '">' + score + ' / ' + QUESTIONS.length + '</div>';
    QUESTIONS.forEach(function(q, i) {
      var a = answers[i];
      var icon = a.ok ? 'OK' : 'X';
      var ic = a.ok ? '#10b981' : '#ff5f1f';
      html += '<div class="result-row"><div class="rr-q" style="color:' + ic + '">' + icon + ' ' + q.title + '</div><div class="rr-a">' + q.explain + '</div></div>';
    });
    html += '<div style="text-align:center;margin-top:12px;font-size:13px;color:' + (pass ? '#10b981' : '#ff7f50') + '">' + (pass ? 'MISSION PASSED -- You can distinguish stuck from slip hazards.' : 'NEEDS REVIEW -- Study the three stuck mechanisms again.') + '</div>';
    panel.innerHTML = html;
    overlay.classList.add('show');
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ >= QUESTIONS.length) {
      showResult();
    } else {
      renderQuestion();
    }
  }

  function reset() {
    currentQ = 0; score = 0; answers = []; answered = false;
    document.getElementById('resultOverlay').classList.remove('show');
    renderQuestion();
  }

  document.getElementById('btnNext').addEventListener('click', nextQuestion);
  document.getElementById('btnRetry').addEventListener('click', reset);

  var guideCollapsed = false;
  document.getElementById('guideToggle').addEventListener('click', function() {
    guideCollapsed = !guideCollapsed;
    document.getElementById('guideContent').className = guideCollapsed ? 'collapsed' : '';
    document.getElementById('guideArrow').textContent = guideCollapsed ? '+' : '-';
  });

  renderQuestion();
})();
</script>
</body>
</html>
