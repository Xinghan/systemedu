<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>EEG Reconstruction Lab</title>
<style>
:root{
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.27 0.05 265);
  --line: oklch(0.40 0.05 265 / 0.40);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg: oklch(0.96 0.01 265);
  --fg-dim: oklch(0.78 0.02 265);
  --fg-mute: oklch(0.58 0.03 265);
  /* cs palette: SIGNAL / CORE / DEPTH / FLASH / QUERY */
  --signal: oklch(0.75 0.17 200);
  --core: oklch(0.55 0.16 200);
  --depth: oklch(0.35 0.10 210);
  --flash: oklch(0.92 0.08 190);
  --query: oklch(0.85 0.14 85);
  --bad: oklch(0.62 0.19 25);
  --mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
  --sans: ui-sans-serif, system-ui, 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);font-family:var(--sans);}
.layout{display:flex;height:100vh;}

/* ---------- sidebar ---------- */
.game-sidebar{
  width:200px;min-width:200px;display:flex;flex-direction:column;
  background:var(--bg-1);border-right:1px solid var(--line);
  padding:12px 10px;gap:9px;overflow-y:auto;
}
.brand{font-size:13px;font-weight:700;color:var(--signal);letter-spacing:1px;line-height:1.25;text-transform:uppercase;}
.brand .sub{display:block;font-size:9px;color:var(--fg-mute);letter-spacing:.5px;margin-top:3px;text-transform:none;}
.mascot-card{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--line);padding:8px;}
.mascot-svg{flex:0 0 auto;}
.mascot-text{font-family:var(--mono);font-size:9.5px;color:var(--flash);line-height:1.35;}
.mascot-text b{color:var(--signal);}
.sec-title{font-size:9.5px;color:var(--fg-dim);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:3px;}
.sw-list{display:flex;flex-direction:column;gap:6px;}
.sw{
  display:flex;align-items:center;gap:7px;padding:5px 6px;
  background:var(--bg-2);border:1px solid var(--line);cursor:pointer;user-select:none;
  transition:border-color .12s,background .12s;
}
.sw:hover{border-color:var(--line-strong);}
.sw .toggle{width:28px;height:15px;border-radius:8px;background:var(--depth);position:relative;flex:0 0 auto;transition:background .14s;}
.sw .knob{position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:var(--fg);transition:left .14s,background .14s;}
.sw.kept .toggle{background:var(--core);}
.sw.kept .knob{left:15px;background:var(--flash);}
.sw .nm{flex:1;min-width:0;}
.sw .nid{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--fg);}
.sw .nst{font-family:var(--mono);font-size:8.5px;letter-spacing:.4px;display:block;}
.sw.kept .nst{color:var(--signal);}
.sw.zeroed .nst{color:var(--bad);}
.spacer{flex:1;}
.btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.6px;color:var(--fg);
  background:var(--bg-2);border:1px solid var(--line);padding:7px 8px;cursor:pointer;
  text-align:center;transition:border-color .12s,background .12s;text-transform:uppercase;
}
.btn:hover{border-color:var(--signal);}
#langBtn{color:var(--signal);}

/* ---------- main ---------- */
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;padding:14px 16px;gap:11px;overflow:hidden;}
.topbar{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.title{font-size:16px;font-weight:700;color:var(--fg);}
.coreq{font-family:var(--mono);font-size:10.5px;color:var(--query);}
.hint{font-size:11px;color:var(--fg-dim);line-height:1.5;}
.hint b{color:var(--signal);}

.stage{flex:1;display:flex;flex-direction:column;min-height:0;gap:10px;}
.canvas-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--bg-1);border:1px solid var(--line);position:relative;}
#scope{width:100%;flex:1;display:block;}

.status{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  font-family:var(--mono);font-size:11px;background:var(--bg-1);
  border:1px solid var(--line);padding:8px 12px;
}
.status .lbl{color:var(--fg-mute);}
.status .v{color:var(--flash);font-weight:700;}
.status .v.good{color:var(--signal);}
.status .v.warn{color:var(--query);}
.status .v.bad{color:var(--bad);}

.toast{
  position:absolute;left:50%;top:14px;transform:translateX(-50%);
  font-family:var(--mono);font-size:11.5px;padding:8px 14px;max-width:80%;text-align:center;
  border:1px solid var(--line-strong);background:var(--bg-2);color:var(--fg);
  opacity:0;transition:opacity .25s;pointer-events:none;line-height:1.45;z-index:5;
}
.toast.show{opacity:1;}
.toast.good{border-color:var(--signal);color:var(--flash);}
.toast.bad{border-color:var(--bad);color:var(--bad);}
.toast.win{border-color:var(--query);color:var(--query);}

.banner{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;background:oklch(0.14 0.035 265 / 0.92);text-align:center;padding:24px;z-index:8;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.banner.show{opacity:1;pointer-events:auto;}
.banner .big{font-size:22px;font-weight:700;color:var(--query);letter-spacing:1px;}
.banner .sm{font-size:12px;color:var(--fg-dim);max-width:430px;line-height:1.6;}
.banner .badge{font-family:var(--mono);font-size:11px;color:var(--signal);border:1px solid var(--signal);padding:6px 12px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="layout">

  <!-- ============ SIDEBAR ============ -->
  <aside class="game-sidebar">
    <div class="brand" data-i18n="brand">EEG 重建工作台<span class="sub" data-i18n="brandSub">CS-01 · Data Cathedral</span></div>

    <div class="mascot-card">
      <svg class="mascot-svg" width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
        <rect x="7" y="7" width="20" height="20" rx="3" fill="none" stroke="var(--signal)" stroke-width="2"/>
        <rect x="11" y="11" width="5" height="5" fill="var(--flash)"/>
        <rect x="18" y="11" width="5" height="5" fill="var(--signal)"/>
        <rect x="11" y="18" width="5" height="5" fill="var(--core)"/>
        <rect x="18" y="18" width="5" height="5" fill="var(--query)"/>
      </svg>
      <div class="mascot-text"><b>Bit</b><br><span data-i18n="bitSay">点开关清零成分</span></div>
    </div>

    <div class="sec-title" data-i18n="secComp">独立成分 (IC)</div>
    <div class="sw-list" id="swList"></div>

    <div class="spacer"></div>
    <button class="btn" id="resetBtn" data-i18n="reset">重置 RESET</button>
    <button class="btn" id="langBtn">EN / 中文</button>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="game-main">
    <div class="topbar">
      <span class="title" data-i18n="title">去伪迹重建</span>
      <span class="coreq" data-i18n="coreq">核心问题：重建一段干净的脑波</span>
    </div>
    <div class="hint" data-i18n="hint">
      这段脑波被<b>眨眼</b>污染了。ICA 已把它拆成 6 个独立成分。点左侧开关<b>清零</b>某个成分，
      看它如何沿混合矩阵反向影响每条通道——清掉伪迹通道变干净，清掉真脑波则节律永久丢失。
    </div>

    <div class="stage">
      <div class="canvas-wrap">
        <canvas id="scope"></canvas>
        <div class="toast" id="toast"></div>
        <div class="banner" id="banner">
          <div class="big" data-i18n="winBig">脑波重建师</div>
          <div class="sm" id="winMsg"></div>
          <div class="badge" data-i18n="winBadge">解锁：BRAINWAVE RECONSTRUCTIONIST</div>
        </div>
      </div>

      <div class="status">
        <span><span class="lbl" data-i18n="stArtifact">残余伪迹</span> <span class="v" id="stArtifact">--</span></span>
        <span><span class="lbl" data-i18n="stBrain">脑节律保留</span> <span class="v" id="stBrain">--</span></span>
        <span><span class="lbl" data-i18n="stState">状态</span> <span class="v" id="stState">--</span></span>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";
/* ============================================================
   EEG M18 — 去伪迹重建 (Pattern 3 因果链, 非调参)
   真实混合矩阵模型: x_c(t) = sum_i A[c][i] * s_i(t)
   清零成分 i = 在重建里把 s_i 置 0, 沿矩阵反向影响每条通道。
   ============================================================ */

// ---- i18n ----
const I18N = {
  zh: {
    brand:'EEG 重建工作台', brandSub:'CS-01 · Data Cathedral', bitSay:'点开关清零成分',
    secComp:'独立成分 (IC)', reset:'重置 RESET',
    title:'去伪迹重建', coreq:'核心问题：重建一段干净的脑波',
    hint:'这段脑波被<b>眨眼</b>污染了。ICA 已把它拆成 6 个独立成分。点左侧开关<b>清零</b>某个成分，看它如何沿混合矩阵反向影响每条通道——清掉伪迹通道变干净，清掉真脑波则节律永久丢失。',
    stArtifact:'残余伪迹', stBrain:'脑节律保留', stState:'状态',
    winBig:'脑波重建师', winBadge:'解锁：BRAINWAVE RECONSTRUCTIONIST',
    chOrig:'原始（含伪迹）', chRecon:'重建结果',
    kept:'保留', zeroed:'已清零',
    stClean:'干净', stContam:'有伪迹', stLoss:'信息丢失', stWin:'重建成功',
    tBlink:'眨眼成分清零 → 前额大峰消失，脑活动保留。干净！',
    tMuscle:'肌电成分清零 → 高频毛刺被抹掉。好。',
    tLine:'工频噪声清零 → 50Hz 抖动消失。好。',
    tBrainGone:'你清掉了真脑波成分 → 对应节律永久丢失，这是信息损失！',
    tBackBrain:'重新保留脑波成分 → 节律回来了。',
    tBackArt:'重新保留伪迹成分 → 伪迹又混回通道了。',
    winMsg:'你只清掉了 3 个伪迹成分（眨眼 / 肌电 / 工频），保住了全部脑节律。重建 = 把好成分混回去。',
  },
  en: {
    brand:'EEG RECONSTRUCTION', brandSub:'CS-01 · Data Cathedral', bitSay:'Tap to zero a component',
    secComp:'Independent Comps (IC)', reset:'RESET',
    title:'Artifact Removal & Reconstruction', coreq:'Core question: reconstruct one clean brainwave',
    hint:'This signal is contaminated by <b>eye blinks</b>. ICA split it into 6 independent components. Tap a switch to <b>zero</b> a component and watch it propagate back through the mixing matrix into every channel — remove an artifact and channels get clean; remove a real brain rhythm and that rhythm is gone for good.',
    stArtifact:'Residual artifact', stBrain:'Brain rhythm kept', stState:'State',
    winBig:'Brainwave Reconstructionist', winBadge:'UNLOCKED: BRAINWAVE RECONSTRUCTIONIST',
    chOrig:'Original (contaminated)', chRecon:'Reconstruction',
    kept:'KEEP', zeroed:'ZEROED',
    stClean:'Clean', stContam:'Has artifact', stLoss:'Info lost', stWin:'Reconstructed',
    tBlink:'Blink IC zeroed → frontal spike gone, brain activity kept. Clean!',
    tMuscle:'Muscle IC zeroed → high-freq fuzz wiped out. Good.',
    tLine:'Line-noise IC zeroed → 50Hz jitter gone. Good.',
    tBrainGone:'You zeroed a real brain IC → that rhythm is lost forever. Information loss!',
    tBackBrain:'Brain IC restored → the rhythm is back.',
    tBackArt:'Artifact IC restored → it mixed back into the channels.',
    winMsg:'You zeroed only the 3 artifact ICs (blink / muscle / line noise) and kept every brain rhythm. Reconstruction = mix the good components back in.',
  }
};
let lang = 'zh';
const t = (k) => I18N[lang][k];

// ---- IC definitions ----
// kind: 'artifact' = should be zeroed ; 'brain' = must be kept
const ICS = [
  { id:'IC1', kind:'artifact', tag:{zh:'眨眼', en:'Blink'},   freq:0.9,  amp:1.0,  shape:'blink', toast:'tBlink'  },
  { id:'IC2', kind:'artifact', tag:{zh:'肌电', en:'Muscle'},  freq:28,   amp:0.45, shape:'emg',   toast:'tMuscle' },
  { id:'IC3', kind:'brain',    tag:{zh:'α 节律', en:'Alpha'}, freq:10,   amp:0.55, shape:'sine'                 },
  { id:'IC4', kind:'brain',    tag:{zh:'β 节律', en:'Beta'},  freq:20,   amp:0.32, shape:'sine'                 },
  { id:'IC5', kind:'brain',    tag:{zh:'θ 节律', en:'Theta'}, freq:6,    amp:0.42, shape:'sine'                 },
  { id:'IC6', kind:'artifact', tag:{zh:'工频噪声', en:'Line 50Hz'}, freq:50, amp:0.22, shape:'sine', toast:'tLine' },
];

// channels (front 2 are frontal -> blink heavy)
const CHANNELS = ['Fp1','Fp2','F3','F4','C3','C4'];

// mixing matrix A[channel][ic] — how strongly each IC appears in each channel
// cols: IC1(blink) IC2(emg) IC3(alpha) IC4(beta) IC5(theta) IC6(line)
const A = [
  /*Fp1*/[1.00, 0.30, 0.20, 0.15, 0.35, 0.40],
  /*Fp2*/[0.95, 0.28, 0.18, 0.14, 0.33, 0.40],
  /*F3 */[0.40, 0.80, 0.55, 0.45, 0.55, 0.45],
  /*F4 */[0.38, 0.78, 0.52, 0.43, 0.52, 0.45],
  /*C3 */[0.15, 0.35, 0.95, 0.85, 0.70, 0.45],
  /*C4 */[0.14, 0.33, 0.92, 0.83, 0.68, 0.45],
];

// state: kept[i] === true -> component kept ; false -> zeroed
let kept = ICS.map(() => true);
let won = false;

// ---- source signal s_i(t) ----
function srcValue(ic, x){ // x in seconds
  switch(ic.shape){
    case 'sine': return ic.amp * Math.sin(2*Math.PI*ic.freq*x);
    case 'emg': { // bursty high-freq fuzz
      const burst = Math.max(0, Math.sin(2*Math.PI*1.1*x + 0.7));
      return ic.amp * burst * Math.sin(2*Math.PI*ic.freq*x) * (0.6+0.4*Math.sin(31.3*x));
    }
    case 'blink': { // sparse sharp positive spikes
      const period = 1.6;
      const p = ((x % period)+period)%period;
      const c = 0.45;          // spike center
      const w = 0.10;          // width
      const d = (p - c)/w;
      return ic.amp * Math.exp(-d*d) * 1.4;
    }
  }
  return 0;
}

// ---- metrics ----
function computeMetrics(){
  let artifactKeptEnergy = 0, artifactTotal = 0;
  let brainKeptEnergy = 0, brainTotal = 0;
  for (let i=0;i<ICS.length;i++){
    let load = 0;
    for (let c=0;c<CHANNELS.length;c++) load += A[c][i]*A[c][i];
    load *= ICS[i].amp*ICS[i].amp;
    if (ICS[i].kind === 'artifact'){
      artifactTotal += load;
      if (kept[i]) artifactKeptEnergy += load;
    } else {
      brainTotal += load;
      if (kept[i]) brainKeptEnergy += load;
    }
  }
  const residual = artifactTotal>0 ? artifactKeptEnergy/artifactTotal : 0; // 0=clean
  const brainKept = brainTotal>0 ? brainKeptEnergy/brainTotal : 1;          // 1=all kept
  return { residual, brainKept };
}

function checkWin(){
  for (let i=0;i<ICS.length;i++){
    if (ICS[i].kind==='artifact' && kept[i]) return false;
    if (ICS[i].kind==='brain' && !kept[i]) return false;
  }
  return true;
}

// ---- canvas drawing ----
const canvas = document.getElementById('scope');
const ctx = canvas.getContext('2d');
let W=0,H=0,dpr=1;

function resize(){
  const r = canvas.getBoundingClientRect();
  dpr = Math.min(window.devicePixelRatio||1, 2);
  W = Math.max(320, Math.floor(r.width));
  H = Math.max(220, Math.floor(r.height));
  canvas.width = Math.floor(W*dpr);
  canvas.height = Math.floor(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

function channelSeries(c, useKept){
  const N = 260, dur = 4.0;
  const arr = new Array(N);
  for (let k=0;k<N;k++){
    const x = (k/(N-1))*dur;
    let v = 0;
    for (let i=0;i<ICS.length;i++){
      if (useKept && !kept[i]) continue;
      v += A[c][i]*srcValue(ICS[i], x);
    }
    arr[k] = v;
  }
  return arr;
}

function draw(){
  resize();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = cssVar('--bg-1'); ctx.fillRect(0,0,W,H);

  const colSig = cssVar('--signal'), colFlash = cssVar('--flash'),
        colMute = cssVar('--fg-mute'), colDim = cssVar('--fg-dim'),
        colLine = cssVar('--line');

  const padL = 96, padR = 18, padT = 26, padB = 14;
  const plotW = W - padL - padR;
  const rows = CHANNELS.length;
  const rowH = (H - padT - padB) / rows;

  // headers (legend)
  ctx.font = "11px 'JetBrains Mono', monospace";
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = colMute;
  ctx.fillText(t('chOrig'), padL, 16);
  ctx.fillStyle = colSig;
  ctx.fillText(t('chRecon'), padL + plotW*0.55, 16);

  for (let c=0;c<rows;c++){
    const cy = padT + rowH*c + rowH/2;
    ctx.fillStyle = (c<2) ? colFlash : colDim;
    ctx.font = "bold 11px 'JetBrains Mono', monospace";
    ctx.textBaseline = 'middle';
    ctx.fillText(CHANNELS[c], 12, cy);
    if (c<2){
      ctx.fillStyle=colMute; ctx.font="8px 'JetBrains Mono', monospace";
      ctx.fillText(lang==='zh'?'前额':'frontal', 12, cy+12);
    }

    ctx.strokeStyle = colLine; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, cy); ctx.lineTo(W-padR, cy); ctx.stroke();

    const amp = rowH*0.40;
    const orig = channelSeries(c, false);
    const recon = channelSeries(c, true);

    drawWave(orig, padL, plotW, cy, amp, colMute, 1, 0.45);
    drawWave(recon, padL, plotW, cy, amp, colSig, 1.8, 1);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawWave(arr, x0, w, cy, amp, color, lw, alpha){
  const N = arr.length;
  const scale = amp/2.4;
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath();
  for (let k=0;k<N;k++){
    const px = x0 + (k/(N-1))*w;
    let py = cy - arr[k]*scale;
    py = Math.max(cy-amp, Math.min(cy+amp, py));
    if (k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ---- UI render ----
const swList = document.getElementById('swList');
function buildSwitches(){
  swList.innerHTML = '';
  ICS.forEach((ic, i) => {
    const row = document.createElement('div');
    row.className = 'sw' + (kept[i] ? ' kept' : ' zeroed');
    row.dataset.idx = String(i);
    row.innerHTML =
      '<span class="toggle"><span class="knob"></span></span>' +
      '<span class="nm"><span class="nid"></span>' +
      '<span class="nst"></span></span>';
    swList.appendChild(row);
  });
  refreshSwitchLabels();
}
function refreshSwitchLabels(){
  [...swList.children].forEach((row,i) => {
    const ic = ICS[i];
    const nm = row.querySelector('.nm');
    nm.querySelector('.nid').textContent = ic.id;
    const tag = ic.tag[lang];
    const state = kept[i] ? t('kept') : t('zeroed');
    nm.querySelector('.nst').textContent = tag + ' · ' + state;
    row.classList.toggle('kept', kept[i]);
    row.classList.toggle('zeroed', !kept[i]);
  });
}

const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(key, cls){
  toastEl.textContent = t(key);
  toastEl.className = 'toast show' + (cls?(' '+cls):'');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ toastEl.classList.remove('show'); }, 2600);
}

const bannerEl = document.getElementById('banner');
const winMsgEl = document.getElementById('winMsg');

function updateStatus(){
  const { residual, brainKept } = computeMetrics();
  const stA = document.getElementById('stArtifact');
  const stB = document.getElementById('stBrain');
  const stS = document.getElementById('stState');

  const resPct = Math.round(residual*100);
  const brainPct = Math.round(brainKept*100);
  stA.textContent = resPct + '%';
  stB.textContent = brainPct + '%';

  stA.className = 'v ' + (resPct<=1 ? 'good' : (resPct<25?'warn':'bad'));
  stB.className = 'v ' + (brainPct>=99 ? 'good' : (brainPct>=60?'warn':'bad'));

  let state, scls;
  if (won){ state = t('stWin'); scls='good'; }
  else if (brainPct < 99){ state = t('stLoss'); scls='bad'; }
  else if (resPct <= 1){ state = t('stClean'); scls='good'; }
  else { state = t('stContam'); scls='warn'; }
  stS.textContent = state; stS.className = 'v ' + scls;
}

function showWin(){
  won = true;
  winMsgEl.textContent = t('winMsg');
  bannerEl.classList.add('show');
}

// ---- interaction: toggle a component (causal action) ----
function toggle(i){
  if (won) return;
  const ic = ICS[i];
  const wasKept = kept[i];
  kept[i] = !kept[i];

  if (wasKept){ // just ZEROED it
    if (ic.kind === 'brain') showToast('tBrainGone','bad');
    else if (ic.toast) showToast(ic.toast,'good');
  } else {      // just RESTORED it
    if (ic.kind === 'brain') showToast('tBackBrain','good');
    else showToast('tBackArt','bad');
  }

  refreshSwitchLabels();
  draw();

  if (checkWin()) showWin();
  updateStatus();
}

swList.addEventListener('click', (e) => {
  const row = e.target.closest('.sw');
  if (!row) return;
  toggle(parseInt(row.dataset.idx,10));
});

// reset
document.getElementById('resetBtn').addEventListener('click', () => {
  kept = ICS.map(()=>true);
  won = false;
  bannerEl.classList.remove('show');
  toastEl.classList.remove('show');
  refreshSwitchLabels();
  draw();
  updateStatus();
});

// lang
function applyLang(){
  document.documentElement.lang = (lang==='zh'?'zh-CN':'en');
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if (I18N[lang][k] !== undefined) el.innerHTML = I18N[lang][k];
  });
  refreshSwitchLabels();
  if (won) winMsgEl.textContent = t('winMsg');
  draw();
  updateStatus();
}
document.getElementById('langBtn').addEventListener('click', ()=>{
  lang = (lang==='zh') ? 'en' : 'zh';
  applyLang();
});

// ---- boot ----
function boot(){
  buildSwitches();
  draw();
  updateStatus();
}
window.addEventListener('resize', ()=>{ draw(); });
boot();
</script>
