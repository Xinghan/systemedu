<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scoring Dimension Sort</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh}
.header{padding:8px 16px 4px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .subtitle{font-size:11px;color:#8a8886;margin-top:2px}
.game-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:8px 12px;gap:8px;overflow:hidden}
.source-area{flex-shrink:0;display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);min-height:60px;align-content:flex-start}
.source-area h3{width:100%;font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.targets-area{flex:1;display:flex;gap:8px;min-height:0}
.target-col{flex:1;display:flex;flex-direction:column;background:rgba(28,27,27,0.92);border:1px solid rgba(138,136,134,0.15);padding:8px;overflow-y:auto}
.target-col h3{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;flex-shrink:0;text-align:center;padding-bottom:6px;border-bottom:1px solid rgba(138,136,134,0.1)}
.target-col .drop-zone{flex:1;min-height:40px;display:flex;flex-direction:column;gap:4px}
.card{padding:6px 10px;font-size:11px;cursor:grab;border:1px solid rgba(138,136,134,0.15);background:rgba(53,53,52,0.4);backdrop-filter:blur(8px);user-select:none;-webkit-user-select:none;touch-action:none;transition:transform 0.15s,box-shadow 0.15s}
.card:active{cursor:grabbing;transform:scale(1.03)}
.card.dragging{opacity:0.5}
.card.correct{border-color:#10b981;background:rgba(16,185,129,0.15)}
.card.incorrect{border-color:#ff5f1f;background:rgba(255,95,31,0.15)}
.card .card-text{font-family:'Noto Sans SC',sans-serif}
.card .card-hint{font-size:9px;color:#8a8886;margin-top:2px;font-family:'Space Grotesk',sans-serif}
.hud{display:flex;justify-content:space-around;padding:6px 16px;flex-shrink:0;background:rgba(0,0,0,0.55);height:40px;align-items:center}
.hud-item{text-align:center}
.hud-item .hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.hud-item .hud-value{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#00daf3;font-weight:700}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:36vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:14px;line-height:1.5}
.check-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 24px;cursor:pointer;border:1px solid #00daf3;background:rgba(0,218,243,0.1);color:#00daf3;letter-spacing:1px;text-transform:uppercase;align-self:center;flex-shrink:0;margin-top:4px}
.check-btn:hover{background:rgba(0,218,243,0.2)}
.feedback-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:360px;background:rgba(20,20,35,0.95);backdrop-filter:blur(16px);border:1px solid rgba(0,218,243,0.3);padding:20px;z-index:200;text-align:center}
.feedback-panel h2{font-family:'Space Grotesk',sans-serif;font-size:16px;color:#00daf3;margin-bottom:10px}
.feedback-panel p{font-size:12px;color:#c6c6c6;line-height:1.6;margin-bottom:6px}
.feedback-panel .close-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;padding:6px 20px;cursor:pointer;border:1px solid #00daf3;background:rgba(0,218,243,0.1);color:#00daf3;margin-top:10px}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideGoal" style="margin-bottom:6px"></p>
    <ul id="guideSteps"></ul>
    <p id="guideTips" style="margin-top:6px;color:#ffb59c;font-size:10px"></p>
  </div>
</div>
<div class="feedback-panel" id="feedbackPanel">
  <h2 id="fbTitle"></h2>
  <p id="fbBody"></p>
  <p id="fbScore" style="font-size:18px;font-weight:700;color:#00daf3"></p>
  <button class="close-btn" id="fbClose"></button>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="mainTitle"></h1>
    <div class="subtitle" id="mainSubtitle"></div>
  </div>
  <div class="game-area">
    <div class="source-area" id="sourceArea">
      <h3 id="sourceTitle"></h3>
    </div>
    <div class="targets-area" id="targetsArea"></div>
    <button class="check-btn" id="checkBtn"></button>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1">0/12</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2">0</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3">0</div></div>
    <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-value" id="hudV4">--</div></div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'SCORING DIMENSION SORT',cn:'\u8BC4\u5206\u7EF4\u5EA6\u5206\u7C7B\u8BAD\u7EC3'},
  subtitle:{en:'Drag each metric to the correct scoring dimension',cn:'\u628A\u6BCF\u4E2A\u6307\u6807\u62D6\u5230\u6B63\u786E\u7684\u8BC4\u5206\u7EF4\u5EA6'},
  guideTitle:{en:'GAME GUIDE',cn:'\u6E38\u620F\u6307\u5357'},
  guideGoal:{en:'Sort 12 metrics into 4 scoring dimensions: safety, efficiency, coverage, time.',cn:'\u5C0612\u4E2A\u6307\u6807\u5206\u522B\u62D6\u5165\u5B89\u5168\u6027\u3001\u6548\u7387\u3001\u8986\u76D6\u7387\u3001\u7528\u65F64\u4E2A\u8BC4\u5206\u7EF4\u5EA6\u3002'},
  guideS1:{en:'1. Drag metric cards from the top area',cn:'1. \u4ECE\u9876\u90E8\u62D6\u52A8\u6307\u6807\u5361\u7247'},
  guideS2:{en:'2. Drop them into the correct dimension column',cn:'2. \u653E\u5165\u6B63\u786E\u7684\u7EF4\u5EA6\u5217'},
  guideS3:{en:'3. Click CHECK to verify your sorting',cn:'3. \u70B9\u51FB\u68C0\u67E5\u9A8C\u8BC1\u5206\u7C7B\u7ED3\u679C'},
  guideTips:{en:'Tip: Think about what each metric actually measures.',cn:'\u63D0\u793A\uFF1A\u601D\u8003\u6BCF\u4E2A\u6307\u6807\u5B9E\u9645\u8861\u91CF\u7684\u662F\u4EC0\u4E48\u3002'},
  sourceTitle:{en:'METRICS TO SORT',cn:'\u5F85\u5206\u7C7B\u6307\u6807'},
  safety:{en:'SAFETY',cn:'\u5B89\u5168\u6027'},
  efficiency:{en:'EFFICIENCY',cn:'\u6548\u7387'},
  coverage:{en:'COVERAGE',cn:'\u8986\u76D6\u7387'},
  time:{en:'TIME',cn:'\u7528\u65F6'},
  checkBtn:{en:'CHECK SORTING',cn:'\u68C0\u67E5\u5206\u7C7B'},
  hudPlaced:{en:'PLACED',cn:'\u5DF2\u653E\u7F6E'},
  hudCorrect:{en:'CORRECT',cn:'\u6B63\u786E'},
  hudWrong:{en:'WRONG',cn:'\u9519\u8BEF'},
  hudAccuracy:{en:'ACCURACY',cn:'\u51C6\u786E\u7387'},
  fbTitlePerfect:{en:'PERFECT SORTING!',cn:'\u5B8C\u7F8E\u5206\u7C7B\uFF01'},
  fbTitleGood:{en:'GOOD JOB!',cn:'\u505A\u5F97\u4E0D\u9519\uFF01'},
  fbTitleRetry:{en:'TRY AGAIN',cn:'\u518D\u8BD5\u4E00\u6B21'},
  fbPerfect:{en:'You correctly sorted all 12 metrics into their scoring dimensions. You understand exactly what each dimension measures.',cn:'\u4F60\u6B63\u786E\u5730\u5C0612\u4E2A\u6307\u6807\u5206\u5165\u4E86\u5BF9\u5E94\u7684\u8BC4\u5206\u7EF4\u5EA6\u3002\u4F60\u5B8C\u5168\u7406\u89E3\u4E86\u6BCF\u4E2A\u7EF4\u5EA6\u8861\u91CF\u7684\u5185\u5BB9\u3002'},
  fbGood:{en:'Most metrics are correctly sorted. Review the highlighted incorrect ones to understand the differences between dimensions.',cn:'\u5927\u90E8\u5206\u6307\u6807\u5206\u7C7B\u6B63\u786E\u3002\u67E5\u770B\u6807\u7EA2\u7684\u9519\u8BEF\u9879\uFF0C\u7406\u89E3\u7EF4\u5EA6\u4E4B\u95F4\u7684\u533A\u522B\u3002'},
  fbRetry:{en:'Too many incorrect placements. Think about what each metric actually measures -- is it about avoiding danger, path quality, area visited, or speed?',cn:'\u9519\u8BEF\u592A\u591A\u3002\u601D\u8003\u6BCF\u4E2A\u6307\u6807\u5B9E\u9645\u8861\u91CF\u7684\u662F\u4EC0\u4E48 -- \u662F\u907F\u514D\u5371\u9669\u3001\u8DEF\u5F84\u8D28\u91CF\u3001\u533A\u57DF\u8BBF\u95EE\u8FD8\u662F\u901F\u5EA6\uFF1F'},
  close:{en:'CLOSE',cn:'\u5173\u95ED'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k}

var CATEGORIES=['safety','efficiency','coverage','time'];
var CAT_COLORS={'safety':'#ff7f50','efficiency':'#00daf3','coverage':'#10b981','time':'#ffb59c'};

var METRICS=[
  {id:'m1',text:{en:'Collision avoidance rate',cn:'\u78B0\u649E\u89C4\u907F\u7387'},cat:'safety'},
  {id:'m2',text:{en:'Forbidden zone violations',cn:'\u7981\u533A\u8FDB\u5165\u6B21\u6570'},cat:'safety'},
  {id:'m3',text:{en:'Emergency stop success rate',cn:'\u7D27\u6025\u505C\u8F66\u6210\u529F\u7387'},cat:'safety'},
  {id:'m4',text:{en:'Path length vs optimal ratio',cn:'\u8DEF\u5F84\u957F\u5EA6\u4E0E\u6700\u4F18\u6BD4'},cat:'efficiency'},
  {id:'m5',text:{en:'Energy consumption per km',cn:'\u6BCF\u516C\u91CC\u80FD\u8017'},cat:'efficiency'},
  {id:'m6',text:{en:'Redundant maneuver count',cn:'\u5197\u4F59\u673A\u52A8\u6B21\u6570'},cat:'efficiency'},
  {id:'m7',text:{en:'Waypoint visit percentage',cn:'\u8DEF\u70B9\u8BBF\u95EE\u767E\u5206\u6BD4'},cat:'coverage'},
  {id:'m8',text:{en:'Terrain type diversity',cn:'\u5730\u5F62\u7C7B\u578B\u8986\u76D6\u591A\u6837\u6027'},cat:'coverage'},
  {id:'m9',text:{en:'Mapped area ratio',cn:'\u5DF2\u6620\u5C04\u533A\u57DF\u6BD4\u4F8B'},cat:'coverage'},
  {id:'m10',text:{en:'Task completion time',cn:'\u4EFB\u52A1\u5B8C\u6210\u65F6\u95F4'},cat:'time'},
  {id:'m11',text:{en:'Response latency average',cn:'\u5E73\u5747\u54CD\u5E94\u5EF6\u8FDF'},cat:'time'},
  {id:'m12',text:{en:'Time budget utilization',cn:'\u65F6\u95F4\u9884\u7B97\u5229\u7528\u7387'},cat:'time'}
];

var placed={};
var checked=false;
var dragCard=null;
var dragOffsetX=0,dragOffsetY=0;
var ghost=null;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp}
  return a;
}

var shuffledMetrics=shuffle(METRICS);

function buildUI(){
  var src=document.getElementById('sourceArea');
  src.innerHTML='';
  var srcTitle=document.createElement('h3');srcTitle.id='sourceTitle';srcTitle.textContent=t('sourceTitle');
  src.appendChild(srcTitle);

  shuffledMetrics.forEach(function(m){
    if(!placed[m.id]){
      var card=createCard(m);
      src.appendChild(card);
    }
  });

  var targetsArea=document.getElementById('targetsArea');targetsArea.innerHTML='';
  CATEGORIES.forEach(function(cat){
    var col=document.createElement('div');col.className='target-col';
    col.dataset.cat=cat;
    var h3=document.createElement('h3');h3.style.color=CAT_COLORS[cat];h3.textContent=t(cat);
    var dz=document.createElement('div');dz.className='drop-zone';dz.dataset.cat=cat;
    col.appendChild(h3);col.appendChild(dz);

    shuffledMetrics.forEach(function(m){
      if(placed[m.id]===cat){
        var card=createCard(m);
        if(checked){
          card.classList.add(m.cat===cat?'correct':'incorrect');
        }
        dz.appendChild(card);
      }
    });

    targetsArea.appendChild(col);
  });

  document.getElementById('checkBtn').textContent=t('checkBtn');
  updateHUD();
}

function createCard(m){
  var card=document.createElement('div');card.className='card';
  card.dataset.id=m.id;
  var txt=document.createElement('div');txt.className='card-text';
  txt.textContent=m.text[LANG]||m.text.en;
  card.appendChild(txt);

  card.addEventListener('mousedown',function(e){startDrag(e,card,m)});
  card.addEventListener('touchstart',function(e){startDrag(e,card,m)},{passive:false});
  return card;
}

function startDrag(e,card,m){
  if(checked)return;
  e.preventDefault();
  var touch=e.touches?e.touches[0]:e;
  var rect=card.getBoundingClientRect();
  dragOffsetX=touch.clientX-rect.left;
  dragOffsetY=touch.clientY-rect.top;
  dragCard=m;
  card.classList.add('dragging');

  ghost=document.createElement('div');
  ghost.className='card';
  ghost.style.position='fixed';
  ghost.style.zIndex='300';
  ghost.style.width=rect.width+'px';
  ghost.style.pointerEvents='none';
  ghost.style.opacity='0.9';
  ghost.textContent=m.text[LANG]||m.text.en;
  ghost.style.left=(touch.clientX-dragOffsetX)+'px';
  ghost.style.top=(touch.clientY-dragOffsetY)+'px';
  document.body.appendChild(ghost);

  function onMove(ev){
    ev.preventDefault();
    var t2=ev.touches?ev.touches[0]:ev;
    ghost.style.left=(t2.clientX-dragOffsetX)+'px';
    ghost.style.top=(t2.clientY-dragOffsetY)+'px';
  }
  function onEnd(ev){
    var t3=ev.changedTouches?ev.changedTouches[0]:ev;
    if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost);
    ghost=null;
    card.classList.remove('dragging');
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onEnd);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);

    var dropTarget=findDropTarget(t3.clientX,t3.clientY);
    if(dropTarget){
      placed[m.id]=dropTarget;
    }else{
      delete placed[m.id];
    }
    dragCard=null;
    buildUI();
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

function findDropTarget(x,y){
  var zones=document.querySelectorAll('.drop-zone');
  for(var i=0;i<zones.length;i++){
    var r=zones[i].getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){
      return zones[i].dataset.cat;
    }
  }
  var cols=document.querySelectorAll('.target-col');
  for(var j=0;j<cols.length;j++){
    var r2=cols[j].getBoundingClientRect();
    if(x>=r2.left&&x<=r2.right&&y>=r2.top&&y<=r2.bottom){
      return cols[j].dataset.cat;
    }
  }
  return null;
}

function checkSorting(){
  checked=true;
  var correct=0,wrong=0,total=Object.keys(placed).length;
  METRICS.forEach(function(m){
    if(placed[m.id]){
      if(placed[m.id]===m.cat)correct++;
      else wrong++;
    }
  });
  document.getElementById('hudV2').textContent=correct;
  document.getElementById('hudV3').textContent=wrong;
  document.getElementById('hudV4').textContent=total>0?Math.round(correct/total*100)+'%':'--';
  buildUI();

  var fb=document.getElementById('feedbackPanel');fb.style.display='block';
  if(correct===12){
    document.getElementById('fbTitle').textContent=t('fbTitlePerfect');
    document.getElementById('fbBody').textContent=t('fbPerfect');
  }else if(correct>=8){
    document.getElementById('fbTitle').textContent=t('fbTitleGood');
    document.getElementById('fbBody').textContent=t('fbGood');
  }else{
    document.getElementById('fbTitle').textContent=t('fbTitleRetry');
    document.getElementById('fbBody').textContent=t('fbRetry');
  }
  document.getElementById('fbScore').textContent=correct+'/12';
  document.getElementById('fbClose').textContent=t('close');
}

function updateHUD(){
  var total=Object.keys(placed).length;
  document.getElementById('hudV1').textContent=total+'/12';
  if(!checked){
    document.getElementById('hudV2').textContent='--';
    document.getElementById('hudV3').textContent='--';
    document.getElementById('hudV4').textContent='--';
  }
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSubtitle').textContent=t('subtitle');
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  document.getElementById('guideTips').textContent=t('guideTips');
  var list=document.getElementById('guideSteps');list.innerHTML='';
  [t('guideS1'),t('guideS2'),t('guideS3')].forEach(function(s){
    var li=document.createElement('li');li.textContent=s;list.appendChild(li)
  });
  document.getElementById('hudL1').textContent=t('hudPlaced');
  document.getElementById('hudL2').textContent=t('hudCorrect');
  document.getElementById('hudL3').textContent=t('hudWrong');
  document.getElementById('hudL4').textContent=t('hudAccuracy');
  document.getElementById('fbClose').textContent=t('close');
  buildUI();
}

document.getElementById('langBtn').addEventListener('click',function(){LANG=LANG==='en'?'cn':'en';refreshI18N()});
document.getElementById('guideToggle').addEventListener('click',function(){
  var c=document.getElementById('guideContent');var a=document.getElementById('guideArrow');
  if(c.style.display==='none'){c.style.display='block';a.textContent='-'}else{c.style.display='none';a.textContent='+'}
});
document.getElementById('checkBtn').addEventListener('click',function(){
  if(!checked&&Object.keys(placed).length>=12){checkSorting()}
  else if(!checked){
    var remaining=12-Object.keys(placed).length;
    alert(LANG==='cn'?'\u8FD8\u6709'+remaining+'\u4E2A\u6307\u6807\u672A\u653E\u7F6E':'Still '+remaining+' metrics to place');
  }
});
document.getElementById('fbClose').addEventListener('click',function(){document.getElementById('feedbackPanel').style.display='none'});

refreshI18N();
})();
</script>
</body>
</html>
