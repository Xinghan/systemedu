<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<title>TWR Launch Lab</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e12;color:#f6f6fc;font-family:'Inter','Noto Sans SC',sans-serif;}
body{margin:0;padding:0;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(23,26,31,0.92);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;backdrop-filter:blur(12px);}
.sidebar-btns{display:flex;gap:6px;align-self:flex-start;}
.sidebar-lang,.sidebar-sound{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(80,255,176,0.25);background:transparent;color:#50ffb0;letter-spacing:1px;border-radius:0;}
.sidebar-lang:hover,.sidebar-sound:hover{border-color:#50ffb0;background:rgba(80,255,176,0.08);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-subtitle{font-family:'Inter','Noto Sans SC',sans-serif;font-size:10px;color:#aaabb0;margin-top:2px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;margin-top:6px;}
.sidebar-score{margin-top:8px;padding:8px;background:rgba(80,255,176,0.06);border:1px solid rgba(80,255,176,0.12);}
.sidebar-score-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaabb0;text-transform:uppercase;}
.sidebar-score-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#50ffb0;transition:transform 0.15s ease-out;}
.sidebar-level{margin-top:6px;}
.sidebar-level-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaabb0;text-transform:uppercase;}
.sidebar-level-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ff6b4a;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
canvas{flex:1;width:100%;display:block;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="sidebar-btns">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <button class="sidebar-sound" id="soundBtn">MUTE</button>
    </div>
    <div class="sidebar-title" id="gameTitle"></div>
    <div class="sidebar-subtitle" id="gameSubtitle"></div>
    <div class="sidebar-guide" id="guidePanel"></div>
    <div class="sidebar-score">
      <div class="sidebar-score-label" id="scoreLbl"></div>
      <div class="sidebar-score-val" id="scoreVal">0</div>
    </div>
    <div class="sidebar-level">
      <div class="sidebar-level-label" id="levelLbl"></div>
      <div class="sidebar-level-val" id="levelVal"></div>
    </div>
  </div>
  <div class="game-main">
    <canvas id="gc"></canvas>
  </div>
</div>

<script>
// ============================================================
// K31 Game: TWR Launch Lab (v2)
// Pick engine + rocket mass, predict launch outcome, watch sim.
// TWR < 1 = pad, 1-3 = wobbly, >=5 = clean. Score on predictions.
// 3 levels with increasing complexity.
// ============================================================

// --- I18N ---
var I18N = {
  title:          {en:'TWR LAUNCH LAB',             cn:'\u63a8\u91cd\u6bd4\u53d1\u5c04\u5b9e\u9a8c\u5ba4'},

  guide_l2:       {en:'4 engines x 2 masses.\nPredict launch/no-launch/unstable\nfor each combo. Then verify!',
                   cn:'4\u53f0\u53d1\u52a8\u673a x 2\u79cd\u8d28\u91cf\u3002\n\u9884\u6d4b\u6bcf\u79cd\u7ec4\u5408\u7684\u53d1\u5c04\u7ed3\u679c\u3002\n\u7136\u540e\u9a8c\u8bc1\uff01'},
  guide_l3:       {en:'Full 4x4 matrix challenge!\nFill in TWR predictions.\nTimer adds pressure!',
                   cn:'\u5b8c\u6574 4x4 \u77e9\u9635\u6311\u6218\uff01\n\u586b\u5199\u63a8\u91cd\u6bd4\u9884\u6d4b\u3002\n\u8ba1\u65f6\u5668\u589e\u52a0\u538b\u529b\uff01'},
  score:          {en:'SCORE',           cn:'\u5206\u6570'},
  level:          {en:'LEVEL',           cn:'\u5173\u5361'},
  levelN:         {en:'Level',           cn:'\u7b2c'},
  levelSuffix:    {en:'',                cn:'\u5173'},
  launch:         {en:'LAUNCH',          cn:'\u53d1\u5c04'},
  predict:        {en:'PREDICT',         cn:'\u9884\u6d4b'},
  next:           {en:'NEXT',            cn:'\u4e0b\u4e00\u5173'},
  retry:          {en:'RETRY',           cn:'\u91cd\u8bd5'},
  verify:         {en:'VERIFY ALL',      cn:'\u5168\u90e8\u9a8c\u8bc1'},
  engine:         {en:'Engine',          cn:'\u53d1\u52a8\u673a'},
  mass:           {en:'Mass',            cn:'\u8d28\u91cf'},
  thrust:         {en:'Thrust',          cn:'\u63a8\u529b'},
  twr:            {en:'TWR',             cn:'\u63a8\u91cd\u6bd4'},
  willLaunch:     {en:'Will launch!',    cn:'\u80fd\u8d77\u98de\uff01'},
  noLaunch:       {en:'Cannot launch',   cn:'\u4e0d\u80fd\u8d77\u98de'},
  unstable:       {en:'Unstable!',       cn:'\u4e0d\u7a33\u5b9a\uff01'},
  clean:          {en:'Clean launch!',   cn:'\u5e72\u51c0\u5229\u843d\uff01'},
  correct:        {en:'Correct!',        cn:'\u6b63\u786e\uff01'},
  wrong:          {en:'Wrong!',          cn:'\u9519\u8bef\uff01'},
  padStay:        {en:'Stays on pad',    cn:'\u7559\u5728\u53d1\u5c04\u53f0'},
  selectEngine:   {en:'Select engine',   cn:'\u9009\u62e9\u53d1\u52a8\u673a'},
  selectMass:     {en:'Select mass',     cn:'\u9009\u62e9\u8d28\u91cf'},
  yourPrediction: {en:'Your prediction', cn:'\u4f60\u7684\u9884\u6d4b'},
  pickLaunch:     {en:'LAUNCH',          cn:'\u80fd\u98de'},
  pickNoLaunch:   {en:'NO LAUNCH',       cn:'\u4e0d\u80fd\u98de'},
  pickUnstable:   {en:'UNSTABLE',        cn:'\u4e0d\u7a33\u5b9a'},
  pickClean:      {en:'CLEAN',           cn:'\u5e72\u51c0'},
  complete:       {en:'ALL LEVELS COMPLETE!',  cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  completeMsg:    {en:'TWR = Thrust / Weight. TWR < 1 means the rocket cannot lift off. TWR 1-3 is unstable. TWR >= 5 is a clean launch!',
                   cn:'\u63a8\u91cd\u6bd4 = \u63a8\u529b / \u91cd\u529b\u3002\u63a8\u91cd\u6bd4 < 1 \u706b\u7bad\u65e0\u6cd5\u8d77\u98de\u3002\u63a8\u91cd\u6bd4 1-3 \u4e0d\u7a33\u5b9a\u3002\u63a8\u91cd\u6bd4 >= 5 \u5e72\u51c0\u5229\u843d\uff01'},
  timerLabel:     {en:'TIME',            cn:'\u65f6\u95f4'},
  matrixTitle:    {en:'TWR MATRIX',      cn:'\u63a8\u91cd\u6bd4\u77e9\u9635'},
  fillAll:        {en:'Fill all cells',  cn:'\u586b\u5199\u6240\u6709\u683c\u5b50'},
  twrFormula:     {en:'TWR = Thrust / (mass x g)', cn:'\u63a8\u91cd\u6bd4 = \u63a8\u529b / (\u8d28\u91cf x g)'},
  simulating:     {en:'Simulating...',   cn:'\u6a21\u62df\u4e2d...'},
  clickToSim:     {en:'Click a cell to simulate', cn:'\u70b9\u51fb\u683c\u5b50\u67e5\u770b\u6a21\u62df'},
};

var lang = 'cn';
function t(key) { return I18N[key] ? (I18N[key][lang] || I18N[key].en || key) : key; }

// --- Audio ---
var soundMuted = true;
var audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
}
function playTone(freq, dur, type, vol) {
  if (soundMuted || !audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.12));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + (dur || 0.12));
  } catch(e) {}
}
function playSelect() { playTone(880, 0.08, 'sine', 0.05); }
function playCorrect() { playTone(660, 0.15, 'sine', 0.07); setTimeout(function(){ playTone(880, 0.2, 'sine', 0.07); }, 120); }
function playWrong() { playTone(200, 0.25, 'sawtooth', 0.06); }
function playLaunch() { playTone(120, 0.5, 'sawtooth', 0.04); setTimeout(function(){ playTone(180, 0.4, 'sawtooth', 0.05); }, 200); }
function playLevelComplete() { playTone(523, 0.15, 'sine', 0.06); setTimeout(function(){ playTone(659, 0.15, 'sine', 0.06); }, 100); setTimeout(function(){ playTone(784, 0.15, 'sine', 0.06); }, 200); setTimeout(function(){ playTone(1047, 0.3, 'sine', 0.07); }, 300); }
function playThud() { playTone(60, 0.3, 'square', 0.08); }

// --- Engines & Masses ---
var ENGINES = [
  {id:'HT-0', thrust:8,  impulse:2.5, color:'#50ffb0'},
  {id:'HT-3', thrust:8,  impulse:2.5, color:'#4de8ff'},
  {id:'C5-0', thrust:12, impulse:10,  color:'#ff6b4a'},
  {id:'C5-3', thrust:12, impulse:10,  color:'#ffb347'}
];
var MASSES = [0.2, 0.3, 0.4, 0.5]; // kg
var G = 9.8;

function calcTWR(thrustN, massKg) { return thrustN / (massKg * G); }
function twrCategory(twr) {
  if (twr < 1) return 'nolaunch';
  if (twr < 5) return 'unstable';
  return 'clean';
}

// --- State ---
var canvas, ctx, gameMain;
var cw = 800, ch = 600;
var score = 0;
var currentLevel = 1;
var phase = 'select'; // select, predict, simulate, result, levelcomplete, allcomplete
var selectedEngine = -1;
var selectedMass = -1;
var playerPrediction = ''; // 'nolaunch','unstable','clean'
var simTime = 0;
var simRocket = null;
var simResult = '';
var fadeAlpha = 0;
var fadeDir = 0;
var shakeX = 0, shakeY = 0, shakeTime = 0;
var scorePunch = 0;
var feedbackText = '';
var feedbackTimer = 0;
var feedbackColor = '#50ffb0';
var particles = [];
var resizeTimer = null;

// L2/L3 matrix
var matrixPredictions = {};
var matrixVerified = {};
var matrixSimCell = null;
var matrixSimDone = false;
var matrixVerifyIdx = 0;
var matrixVerifying = false;
var l3Timer = 0;
var l3TimerRunning = false;
var l3StartTime = 0;

// Parallax stars
var stars = [];
var gridLines = [];

// Idle rocket pulse
var idlePulse = 0;

// --- Level configs ---
var L1_ENGINES = [0, 2]; // HT-0, C5-0
var L1_MASSES = [0, 2];  // 200g, 400g
var L2_ENGINES = [0, 1, 2, 3];
var L2_MASSES = [0, 2];  // 200g, 400g
var L3_ENGINES = [0, 1, 2, 3];
var L3_MASSES = [0, 1, 2, 3];

// --- Canvas Setup ---
function initCanvas() {
  canvas = document.getElementById('gc');
  gameMain = document.querySelector('.game-main');
  ctx = canvas.getContext('2d');
  resizeCanvas();
}

function resizeCanvas() {
  var w = gameMain.clientWidth;
  var h = gameMain.clientHeight;
  var sz = Math.min(w, h);
  sz = Math.max(sz, 80);
  var dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  cw = w;
  ch = h;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function delayedResize() {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() { resizeCanvas(); }, 150);
}

// --- Stars init ---
function initStars() {
  stars = [];
  gridLines = [];
  var i;
  for (i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * 2000,
      y: Math.random() * 1400,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.15 + 0.03,
      alpha: Math.random() * 0.5 + 0.2,
      twinkle: Math.random() * Math.PI * 2
    });
  }
  for (i = 0; i < 30; i++) {
    gridLines.push({
      x: Math.random() * 2000,
      y: Math.random() * 1400,
      len: Math.random() * 80 + 20,
      angle: (Math.random() < 0.5) ? 0 : Math.PI / 2,
      speed: Math.random() * 0.4 + 0.1,
      alpha: Math.random() * 0.08 + 0.02
    });
  }
}

// --- Particles ---
function spawnParticles(x, y, count, color, spread) {
  var i;
  for (i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = Math.random() * (spread || 3) + 1;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      r: Math.random() * 3 + 1.5,
      color: color || '#50ffb0'
    });
  }
}

function updateParticles(dt) {
  var i = particles.length;
  while (i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  var i;
  for (i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// --- Shake ---
function triggerShake(intensity, dur) {
  shakeTime = dur || 200;
  shakeX = (Math.random() - 0.5) * (intensity || 4);
  shakeY = (Math.random() - 0.5) * (intensity || 4);
}

function updateShake(dt) {
  if (shakeTime > 0) {
    shakeTime -= dt;
    shakeX = (Math.random() - 0.5) * 4 * (shakeTime / 200);
    shakeY = (Math.random() - 0.5) * 4 * (shakeTime / 200);
    if (shakeTime <= 0) { shakeX = 0; shakeY = 0; }
  }
}

// --- Easing ---
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2) / 2; }

// --- Draw helpers ---
function drawGlassPanel(x, y, w, h, glowColor) {
  ctx.save();
  ctx.fillStyle = 'rgba(23,26,31,0.92)';
  ctx.strokeStyle = (glowColor || 'rgba(80,255,176,0.2)');
  ctx.lineWidth = 1;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
  if (glowColor) {
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 12;
    ctx.strokeRect(x, y, w, h);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawButton(x, y, w, h, text, active, hovered, accentColor) {
  var col = accentColor || '#50ffb0';
  ctx.save();
  if (active) {
    var grd = ctx.createLinearGradient(x, y, x + w, y + h);
    grd.addColorStop(0, col);
    grd.addColorStop(1, shiftColor(col, -30));
    ctx.fillStyle = grd;
    ctx.shadowColor = col;
    ctx.shadowBlur = 14;
  } else if (hovered) {
    ctx.fillStyle = 'rgba(23,26,31,0.95)';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
  } else {
    ctx.fillStyle = 'rgba(23,26,31,0.8)';
    ctx.strokeStyle = 'rgba(170,171,176,0.25)';
    ctx.lineWidth = 1;
  }
  ctx.fillRect(x, y, w, h);
  if (!active) ctx.strokeRect(x, y, w, h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = active ? '#0c0e12' : (hovered ? col : '#f6f6fc');
  ctx.font = '700 13px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.restore();
}

function shiftColor(hex, amount) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return '#' + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
}

// --- Draw background (parallax) ---
function drawBackground(time) {
  ctx.fillStyle = '#0c0e12';
  ctx.fillRect(0, 0, cw, ch);

  // Layer 1: slow stars
  var i, s;
  for (i = 0; i < stars.length; i++) {
    s = stars[i];
    var sx = (s.x - time * s.speed * 8) % cw;
    if (sx < 0) sx += cw;
    var sy = (s.y + Math.sin(time * 0.001 + s.twinkle) * 2) % ch;
    if (sy < 0) sy += ch;
    var twinkleAlpha = s.alpha + Math.sin(time * 0.003 + s.twinkle) * 0.15;
    ctx.globalAlpha = Math.max(0.05, twinkleAlpha);
    ctx.fillStyle = '#f6f6fc';
    ctx.fillRect(sx, sy, s.r, s.r);
  }
  ctx.globalAlpha = 1;

  // Layer 2: fast grid lines
  for (i = 0; i < gridLines.length; i++) {
    var g = gridLines[i];
    var gx = (g.x - time * g.speed * 15) % cw;
    if (gx < 0) gx += cw;
    var gy = g.y % ch;
    ctx.globalAlpha = g.alpha;
    ctx.strokeStyle = '#50ffb0';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    if (g.angle === 0) ctx.lineTo(gx + g.len, gy);
    else ctx.lineTo(gx, gy + g.len);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// --- Draw rocket ---
function drawRocket(x, y, scale, engineColor, pulsePhase, flameOn, flameIntensity) {
  ctx.save();
  ctx.translate(x, y);
  var sc = scale || 1;
  ctx.scale(sc, sc);

  // Pulse when idle
  var pulseScale = 1 + Math.sin(pulsePhase || 0) * 0.02;
  ctx.scale(pulseScale, pulseScale);

  // Body
  var bw = 20, bh = 60;
  ctx.fillStyle = '#e0e0e6';
  ctx.fillRect(-bw/2, -bh, bw, bh);

  // Nose cone
  ctx.fillStyle = '#ff6b4a';
  ctx.beginPath();
  ctx.moveTo(-bw/2, -bh);
  ctx.lineTo(0, -bh - 20);
  ctx.lineTo(bw/2, -bh);
  ctx.closePath();
  ctx.fill();

  // Fins
  ctx.fillStyle = '#50ffb0';
  ctx.beginPath();
  ctx.moveTo(-bw/2, 0);
  ctx.lineTo(-bw/2 - 10, 12);
  ctx.lineTo(-bw/2, -10);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bw/2, 0);
  ctx.lineTo(bw/2 + 10, 12);
  ctx.lineTo(bw/2, -10);
  ctx.closePath();
  ctx.fill();

  // Engine nozzle
  ctx.fillStyle = engineColor || '#aaabb0';
  ctx.fillRect(-6, 0, 12, 8);

  // Flame
  if (flameOn) {
    var fi = flameIntensity || 1;
    var flameH = 25 + fi * 35 + Math.random() * 10;
    var grd = ctx.createLinearGradient(0, 8, 0, 8 + flameH);
    grd.addColorStop(0, 'rgba(255,200,50,0.95)');
    grd.addColorStop(0.3, 'rgba(255,107,74,0.8)');
    grd.addColorStop(1, 'rgba(255,50,20,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(-8, 8);
    ctx.lineTo(0, 8 + flameH);
    ctx.lineTo(8, 8);
    ctx.closePath();
    ctx.fill();

    // Flame glow
    ctx.shadowColor = '#ff6b4a';
    ctx.shadowBlur = 20 * fi;
    ctx.fillStyle = 'rgba(255,107,74,0.3)';
    ctx.fillRect(-4, 6, 8, 4);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// --- Draw launch pad ---
function drawPad(x, y, w) {
  ctx.save();
  ctx.fillStyle = '#2a2d34';
  ctx.fillRect(x - w/2, y, w, 8);
  ctx.fillStyle = '#ff6b4a';
  ctx.fillRect(x - w/2 - 4, y - 20, 4, 28);
  ctx.fillRect(x + w/2, y - 20, 4, 28);
  // Glow
  ctx.shadowColor = '#ff6b4a';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(255,107,74,0.3)';
  ctx.fillRect(x - w/2, y + 6, w, 2);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- Level 1: Simple pick ---
var hoverEngine = -1;
var hoverMass = -1;
var hoverPrediction = '';
var hoverLaunch = false;
var hoverNext = false;
var hoverRetry = false;
var l1Combos;

function getL1Layout() {
  var centerX = cw / 2;
  var centerY = ch / 2;
  var engines = (currentLevel === 1) ? L1_ENGINES : L2_ENGINES;
  var masses = (currentLevel === 1) ? L1_MASSES : L2_MASSES;
  return {centerX: centerX, centerY: centerY, engines: engines, masses: masses};
}

// --- Draw Level 1 ---
function drawLevel1(time) {
  var cx = cw / 2;
  var topY = 30;

  // Title
  ctx.fillStyle = '#50ffb0';
  ctx.font = '700 18px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#50ffb0';
  ctx.shadowBlur = 10;
  ctx.fillText(t('levelN') + ' 1' + t('levelSuffix'), cx, topY + 10);
  ctx.shadowBlur = 0;

  // TWR formula hint
  ctx.fillStyle = '#aaabb0';
  ctx.font = '500 12px "Inter", "Noto Sans SC", sans-serif';
  ctx.fillText(t('twrFormula'), cx, topY + 30);

  if (phase === 'select') {
    drawSelectPhase(time, cx);
  } else if (phase === 'predict') {
    drawPredictPhase(time, cx);
  } else if (phase === 'simulate') {
    drawSimPhase(time, cx);
  } else if (phase === 'result') {
    drawResultPhase(time, cx);
  } else if (phase === 'levelcomplete') {
    drawLevelComplete(time, cx);
  }
}

function drawSelectPhase(time, cx) {
  var engY = 80;
  var massY = 200;

  // Engine selector
  ctx.fillStyle = '#f6f6fc';
  ctx.font = '700 14px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t('selectEngine'), cx, engY);

  var engines = (currentLevel === 1) ? L1_ENGINES : ((currentLevel === 2) ? L2_ENGINES : L3_ENGINES);
  var ew = 130, eh = 55, gap = 12;
  var totalW = engines.length * ew + (engines.length - 1) * gap;
  var startX = cx - totalW / 2;

  var i;
  for (i = 0; i < engines.length; i++) {
    var eng = ENGINES[engines[i]];
    var ex = startX + i * (ew + gap);
    var ey = engY + 15;
    var isSelected = (selectedEngine === engines[i]);
    var isHovered = (hoverEngine === engines[i]);

    drawGlassPanel(ex, ey, ew, eh, isSelected ? eng.color : (isHovered ? 'rgba(80,255,176,0.3)' : null));
    if (isSelected) {
      ctx.shadowColor = eng.color;
      ctx.shadowBlur = 16;
      ctx.strokeStyle = eng.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(ex, ey, ew, eh);
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = eng.color;
    ctx.font = '700 13px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(eng.id, ex + ew/2, ey + 18);
    ctx.fillStyle = '#aaabb0';
    ctx.font = '400 11px "Inter", sans-serif';
    ctx.fillText(t('thrust') + ': ' + eng.thrust + 'N', ex + ew/2, ey + 35);
    ctx.fillText('Impulse: ' + eng.impulse + 'Ns', ex + ew/2, ey + 48);
  }

  // Mass selector
  ctx.fillStyle = '#f6f6fc';
  ctx.font = '700 14px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t('selectMass'), cx, massY);

  var masses = (currentLevel === 1) ? L1_MASSES : ((currentLevel === 2) ? L2_MASSES : L3_MASSES);
  var mw = 100, mh = 45;
  var totalMW = masses.length * mw + (masses.length - 1) * gap;
  var mStartX = cx - totalMW / 2;

  for (i = 0; i < masses.length; i++) {
    var mIdx = masses[i];
    var mx = mStartX + i * (mw + gap);
    var my = massY + 15;
    var mSelected = (selectedMass === mIdx);
    var mHovered = (hoverMass === mIdx);

    drawGlassPanel(mx, my, mw, mh, mSelected ? '#ff6b4a' : (mHovered ? 'rgba(255,107,74,0.3)' : null));
    if (mSelected) {
      ctx.shadowColor = '#ff6b4a';
      ctx.shadowBlur = 16;
      ctx.strokeStyle = '#ff6b4a';
      ctx.lineWidth = 2;
      ctx.strokeRect(mx, my, mw, mh);
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = mSelected ? '#ff6b4a' : '#f6f6fc';
    ctx.font = '700 14px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText((MASSES[mIdx] * 1000) + 'g', mx + mw/2, my + 28);
  }

  // Show TWR if both selected
  if (selectedEngine >= 0 && selectedMass >= 0) {
    var twr = calcTWR(ENGINES[selectedEngine].thrust, MASSES[selectedMass]);
    var twrY = massY + 85;
    ctx.fillStyle = '#50ffb0';
    ctx.font = '700 16px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#50ffb0';
    ctx.shadowBlur = 10;
    ctx.fillText(t('twr') + ' = ' + twr.toFixed(2), cx, twrY);
    ctx.shadowBlur = 0;

    // Prediction buttons
    var predY = twrY + 25;
    ctx.fillStyle = '#f6f6fc';
    ctx.font = '700 13px "Space Grotesk", sans-serif';
    ctx.fillText(t('yourPrediction') + ':', cx, predY);

    var btnW = 120, btnH = 36;
    var predBtns = ['nolaunch', 'unstable', 'clean'];
    var predLabels = [t('pickNoLaunch'), t('pickUnstable'), t('pickClean')];
    var predColors = ['#ff6b4a', '#ffb347', '#50ffb0'];
    var totalBW = predBtns.length * btnW + (predBtns.length - 1) * 10;
    var bStartX = cx - totalBW / 2;

    for (i = 0; i < predBtns.length; i++) {
      var bx = bStartX + i * (btnW + 10);
      var by = predY + 12;
      drawButton(bx, by, btnW, btnH, predLabels[i],
        playerPrediction === predBtns[i],
        hoverPrediction === predBtns[i],
        predColors[i]);
    }

    // Launch button
    if (playerPrediction) {
      var launchY = predY + 70;
      var lbw = 160, lbh = 44;
      drawButton(cx - lbw/2, launchY, lbw, lbh, t('launch'), false, hoverLaunch, '#ff6b4a');
    }
  }

  // Idle rocket
  var rocketX = cw - 100;
  var rocketY = ch - 60;
  idlePulse += 0.04;
  drawPad(rocketX, rocketY, 50);
  drawRocket(rocketX, rocketY, 1, (selectedEngine >= 0) ? ENGINES[selectedEngine].color : '#aaabb0', idlePulse, false, 0);
}

function drawPredictPhase(time, cx) {
  // Actually same as select but with prediction highlighted
  drawSelectPhase(time, cx);
}

function drawSimPhase(time, cx) {
  if (!simRocket) return;

  var padX = cx;
  var padY = ch - 80;
  drawPad(padX, padY, 60);

  var eng = ENGINES[simRocket.engineIdx];
  var twr = simRocket.twr;
  var cat = twrCategory(twr);

  // Sim physics
  var rocketY = simRocket.y;
  var rocketX = padX + simRocket.wobbleX;
  var flameOn = simTime < 2.5;
  var flameIntensity = Math.max(0, 1 - simTime / 3);

  drawRocket(rocketX, padY - (padY - rocketY), simRocket.scale, eng.color, idlePulse, flameOn, flameIntensity);

  // Exhaust particles during flight
  if (flameOn && simTime > 0.1 && Math.random() < 0.4) {
    spawnParticles(rocketX, padY - (padY - rocketY) + 15 * simRocket.scale, 2, '#ff6b4a', 2);
  }

  // TWR display
  ctx.fillStyle = '#50ffb0';
  ctx.font = '700 22px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#50ffb0';
  ctx.shadowBlur = 14;
  ctx.fillText(t('twr') + ' = ' + twr.toFixed(2), cx, 60);
  ctx.shadowBlur = 0;

  // Category label
  var catText = '';
  var catColor = '#aaabb0';
  if (cat === 'nolaunch') { catText = t('padStay'); catColor = '#ff6b4a'; }
  else if (cat === 'unstable') { catText = t('unstable'); catColor = '#ffb347'; }
  else { catText = t('clean'); catColor = '#50ffb0'; }

  ctx.fillStyle = catColor;
  ctx.font = '700 16px "Space Grotesk", sans-serif';
  ctx.fillText(catText, cx, 88);

  // Engine + mass info
  ctx.fillStyle = '#aaabb0';
  ctx.font = '500 13px "Inter", "Noto Sans SC", sans-serif';
  ctx.fillText(eng.id + ' (' + eng.thrust + 'N) + ' + (MASSES[simRocket.massIdx] * 1000) + 'g', cx, 112);

  // Simulating text
  ctx.fillStyle = '#aaabb0';
  ctx.font = '500 12px "Inter", "Noto Sans SC", sans-serif';
  ctx.fillText(t('simulating'), cx, ch - 30);
}

function drawResultPhase(time, cx) {
  var panelW = 340, panelH = 200;
  var px = cx - panelW/2, py = ch/2 - panelH/2 - 20;

  drawGlassPanel(px, py, panelW, panelH, feedbackColor);

  // Result header
  ctx.fillStyle = feedbackColor;
  ctx.font = '700 20px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = feedbackColor;
  ctx.shadowBlur = 12;
  ctx.fillText(feedbackText, cx, py + 40);
  ctx.shadowBlur = 0;

  // Show TWR and category
  if (simRocket) {
    var twr = simRocket.twr;

    ctx.fillText(t('twr') + ' = ' + twr.toFixed(2), cx, py + 70);

    ctx.fillStyle = '#aaabb0';
    ctx.fillText(t(catKey), cx, py + 92);

    // Your prediction vs actual
    ctx.fillStyle = '#aaabb0';
    ctx.font = '400 12px "Inter", "Noto Sans SC", sans-serif';
    ctx.fillText(t('yourPrediction') + ': ' + playerPrediction, cx, py + 120);

  }

  var btnY = py + panelH + 15;

}

function drawLevelComplete(time, cx) {
  var panelW = 380, panelH = 180;
  var px = cx - panelW/2, py = ch/2 - panelH/2;

  drawGlassPanel(px, py, panelW, panelH, '#50ffb0');

  ctx.fillStyle = '#50ffb0';
  ctx.font = '700 22px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#50ffb0';
  ctx.shadowBlur = 16;

  if (currentLevel > 3) {
    ctx.fillText(t('complete'), cx, py + 50);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaabb0';
    ctx.font = '500 13px "Inter", "Noto Sans SC", sans-serif';
    // Wrap completeMsg
    var msg = t('completeMsg');
    var words = msg.split('');
    var line = '';
    var lines = [];
    var maxW = panelW - 40;
    var ii;
    for (ii = 0; ii < words.length; ii++) {
      var testLine = line + words[ii];
      if (ctx.measureText(testLine).width > maxW && line.length > 0) {
        lines.push(line);
        line = words[ii];
      } else {
        line = testLine;
      }
    }
    if (line) lines.push(line);
    for (ii = 0; ii < lines.length; ii++) {
      ctx.fillText(lines[ii], cx, py + 80 + ii * 18);
    }

    ctx.fillStyle = '#f6f6fc';
    ctx.font = '700 28px "Space Grotesk", sans-serif';
    ctx.shadowColor = '#50ffb0';
    ctx.shadowBlur = 10;
    ctx.fillText(t('score') + ': ' + score, cx, py + panelH - 20);
    ctx.shadowBlur = 0;
  } else {
    var lvl = currentLevel - 1;
    ctx.fillText(t('levelN') + ' ' + lvl + t('levelSuffix') + ' ' + t('correct') + '', cx, py + 50);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#f6f6fc';
    ctx.font = '700 22px "Space Grotesk", sans-serif';
    ctx.fillText(t('score') + ': ' + score, cx, py + 90);

    var nby = py + panelH + 15;
    var nbw2 = 150, nbh2 = 40;
    drawButton(cx - nbw2/2, nby, nbw2, nbh2, t('next'), false, hoverNext, '#50ffb0');
  }
}

// --- Level 2/3: Matrix ---
function drawMatrixLevel(time) {
  var cx = cw / 2;
  var topY = 20;
  var isL3 = (currentLevel === 3);

  // Title
  ctx.fillStyle = '#50ffb0';
  ctx.font = '700 18px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#50ffb0';
  ctx.shadowBlur = 10;
  ctx.fillText(t('levelN') + ' ' + currentLevel + t('levelSuffix') + ' - ' + t('matrixTitle'), cx, topY + 10);
  ctx.shadowBlur = 0;

  // Timer for L3
  if (isL3 && l3TimerRunning) {
    var elapsed = (Date.now() - l3StartTime) / 1000;
    ctx.fillStyle = elapsed > 45 ? '#ff6b4a' : '#aaabb0';
    ctx.font = '700 14px "Space Grotesk", sans-serif';
    ctx.fillText(t('timerLabel') + ': ' + elapsed.toFixed(1) + 's', cx, topY + 30);
  }

  var engines = isL3 ? L3_ENGINES : L2_ENGINES;
  var masses = isL3 ? L3_MASSES : L2_MASSES;

  var cellW = 110, cellH = 50, hdrW = 70, hdrH = 40;
  var gap = 4;
  var gridW = hdrW + engines.length * (cellW + gap);
  var gridH = hdrH + masses.length * (cellH + gap);
  var gx = cx - gridW / 2;
  var gy = 55;

  // Header row: engines
  var i, j;
  for (i = 0; i < engines.length; i++) {
    var eng = ENGINES[engines[i]];
    var hx = gx + hdrW + i * (cellW + gap);
    drawGlassPanel(hx, gy, cellW, hdrH, eng.color);
    ctx.fillStyle = eng.color;
    ctx.font = '700 12px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(eng.id, hx + cellW/2, gy + 16);
    ctx.fillStyle = '#aaabb0';
    ctx.font = '400 10px "Inter", sans-serif';
    ctx.fillText(eng.thrust + 'N', hx + cellW/2, gy + 32);
  }

  // Rows: masses
  for (j = 0; j < masses.length; j++) {
    var mIdx = masses[j];
    var ry = gy + hdrH + gap + j * (cellH + gap);

    // Mass header
    drawGlassPanel(gx, ry, hdrW, cellH, 'rgba(255,107,74,0.2)');
    ctx.fillStyle = '#ff6b4a';
    ctx.font = '700 13px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText((MASSES[mIdx]*1000) + 'g', gx + hdrW/2, ry + cellH/2 + 1);

    // Cells
    for (i = 0; i < engines.length; i++) {
      var eIdx = engines[i];
      var cellX = gx + hdrW + i * (cellW + gap);
      var cellY = ry;
      var key = eIdx + '_' + mIdx;
      var twr = calcTWR(ENGINES[eIdx].thrust, MASSES[mIdx]);
      var cat = twrCategory(twr);
      var pred = matrixPredictions[key] || '';
      var verified = matrixVerified[key];
      var isSim = (matrixSimCell && matrixSimCell.key === key);

      // Cell background
      var cellGlow = null;
      if (verified !== undefined) {
        cellGlow = verified ? 'rgba(80,255,176,0.35)' : 'rgba(255,107,74,0.35)';
      } else if (isSim) {
        cellGlow = 'rgba(255,179,71,0.35)';
      } else if (hoverEngine === eIdx && hoverMass === mIdx) {
        cellGlow = 'rgba(80,255,176,0.15)';
      }
      drawGlassPanel(cellX, cellY, cellW, cellH, cellGlow);

      if (verified !== undefined) {
        // Show result
        ctx.fillStyle = verified ? '#50ffb0' : '#ff6b4a';
        ctx.font = '700 13px "Space Grotesk", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('TWR ' + twr.toFixed(2), cellX + cellW/2, cellY + 18);

        var catLabel = (cat === 'nolaunch') ? t('pickNoLaunch') : (cat === 'unstable' ? t('pickUnstable') : t('pickClean'));
        ctx.fillStyle = '#aaabb0';
        ctx.font = '400 11px "Inter", "Noto Sans SC", sans-serif';
        ctx.fillText(catLabel, cellX + cellW/2, cellY + 34);

        // Checkmark or X
        ctx.fillStyle = verified ? '#50ffb0' : '#ff6b4a';
        ctx.font = '700 11px "Space Grotesk", sans-serif';
        ctx.fillText(verified ? 'OK' : 'X', cellX + cellW - 14, cellY + 44);
      } else if (pred) {
        // Show prediction
        var predColor = (pred === 'nolaunch') ? '#ff6b4a' : (pred === 'unstable' ? '#ffb347' : '#50ffb0');
        ctx.fillStyle = predColor;
        ctx.font = '700 12px "Space Grotesk", sans-serif';
        ctx.textAlign = 'center';
        var predLabel = (pred === 'nolaunch') ? t('pickNoLaunch') : (pred === 'unstable' ? t('pickUnstable') : t('pickClean'));
        ctx.fillText(predLabel, cellX + cellW/2, cellY + cellH/2 + 1);
      } else {
        // Empty - click to predict
        ctx.fillStyle = 'rgba(170,171,176,0.3)';
        ctx.font = '400 10px "Inter", "Noto Sans SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('?', cellX + cellW/2, cellY + cellH/2 + 2);
      }
    }
  }

  // Prediction picker (when a cell is selected but not filled)
  if (phase === 'select' && hoverEngine >= 0 && hoverMass >= 0) {
    var pickerY = gy + gridH + 20;
    ctx.fillStyle = '#f6f6fc';
    ctx.font = '700 13px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    var hTwr = calcTWR(ENGINES[hoverEngine].thrust, MASSES[hoverMass]);
    ctx.fillText(ENGINES[hoverEngine].id + ' + ' + (MASSES[hoverMass]*1000) + 'g  |  TWR = ?', cx, pickerY);
  }

  // Prediction buttons below matrix
  var predY = gy + gridH + 15;
  if (phase === 'select') {
    var btnW3 = 110, btnH3 = 32;
    var predBtns2 = ['nolaunch', 'unstable', 'clean'];
    var predLabels2 = [t('pickNoLaunch'), t('pickUnstable'), t('pickClean')];
    var predColors2 = ['#ff6b4a', '#ffb347', '#50ffb0'];
    var totalBW2 = predBtns2.length * btnW3 + (predBtns2.length - 1) * 10;
    var bStartX2 = cx - totalBW2 / 2;

    ctx.fillStyle = '#aaabb0';
    ctx.font = '500 11px "Inter", "Noto Sans SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('fillAll'), cx, predY + 5);

    for (i = 0; i < predBtns2.length; i++) {
      var bx2 = bStartX2 + i * (btnW3 + 10);
      var by2 = predY + 15;
      drawButton(bx2, by2, btnW3, btnH3, predLabels2[i], false, hoverPrediction === predBtns2[i], predColors2[i]);
    }

    // Check if all filled
    var allFilled = true;
    for (j = 0; j < masses.length; j++) {
      for (i = 0; i < engines.length; i++) {
        var k2 = engines[i] + '_' + masses[j];
        if (!matrixPredictions[k2]) { allFilled = false; break; }
      }
      if (!allFilled) break;
    }

    if (allFilled) {
      var verifyY = predY + 60;
      var vbw = 160, vbh = 40;
      drawButton(cx - vbw/2, verifyY, vbw, vbh, t('verify'), false, hoverLaunch, '#ff6b4a');
    }
  }

  // During matrix verify animation
  if (phase === 'simulate' && matrixSimCell) {
    // Mini rocket sim at bottom
    var simY = ch - 120;
    var simX = cx;
    drawPad(simX, simY + 50, 40);

    var eng2 = ENGINES[matrixSimCell.eIdx];
    var twr2 = matrixSimCell.twr;
    var cat2 = twrCategory(twr2);
    var rY = simY + 50;
    if (cat2 !== 'nolaunch') {
      var progress = Math.min(1, simTime / 1.5);
      var dist = easeOutCubic(progress) * 80;
      if (cat2 === 'unstable') {
        dist *= 0.5;
      }
      rY = simY + 50 - dist;
    }
    var wobX = 0;
    if (cat2 === 'unstable') {
      wobX = Math.sin(simTime * 12) * 4;
    }
    drawRocket(simX + wobX, rY, 0.7, eng2.color, idlePulse, simTime < 1.2, Math.max(0, 1 - simTime));
  }

  // Show verify results
  if (phase === 'result') {
    drawMatrixResults(time, cx, gy, gridH);
  }
}

function drawMatrixResults(time, cx, gy, gridH) {
  var engines2 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
  var masses2 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;

  var totalCells = engines2.length * masses2.length;
  var correctCount = 0;
  var j2, i2;
  for (j2 = 0; j2 < masses2.length; j2++) {
    for (i2 = 0; i2 < engines2.length; i2++) {
      var k3 = engines2[i2] + '_' + masses2[j2];
      if (matrixVerified[k3]) correctCount++;
    }
  }

  var resultY = gy + gridH + 80;
  if (phase === 'result') resultY = ch - 80;
  ctx.fillStyle = (correctCount === totalCells) ? '#50ffb0' : '#ffb347';
  ctx.font = '700 16px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#50ffb0';
  ctx.shadowBlur = 10;
  ctx.fillText(correctCount + ' / ' + totalCells + ' ' + t('correct'), cx, resultY);
  ctx.shadowBlur = 0;

  // Next button
  var nby2 = resultY + 15;
  var nbw3 = 140, nbh3 = 36;
  drawButton(cx - nbw3/2, nby2, nbw3, nbh3, t('next'), false, hoverNext, '#50ffb0');
}

// --- Sim update ---
function updateSim(dt) {
  if (phase !== 'simulate') return;
  simTime += dt / 1000;

  if (currentLevel === 1) {
    updateSimSingle(dt);
  } else {
    updateSimMatrix(dt);
  }
}

function updateSimSingle(dt) {
  if (!simRocket) return;
  var twr = simRocket.twr;
  var cat = twrCategory(twr);

  if (cat === 'nolaunch') {
    // Shake on pad
    simRocket.wobbleX = Math.sin(simTime * 15) * 2 * Math.max(0, 1 - simTime);
    if (simTime > 0.2 && !simRocket.shaken) {
      triggerShake(5, 200);
      playThud();
      simRocket.shaken = true;
    }
    if (simTime > 2) {
      finishSim();
    }
  } else if (cat === 'unstable') {
    // Wobbly ascent
    var progress = Math.min(1, simTime / 3);
    var dist = easeOutCubic(progress) * (ch * 0.3);
    simRocket.y = simRocket.startY - dist;
    simRocket.wobbleX = Math.sin(simTime * 8) * 8 * (1 - progress * 0.5);
    simRocket.scale = 1 - progress * 0.15;
    if (simTime > 3) {
      finishSim();
    }
  } else {
    // Clean launch
    var progress2 = Math.min(1, simTime / 2);
    var dist2 = easeOutCubic(progress2) * (ch * 0.8);
    simRocket.y = simRocket.startY - dist2;
    simRocket.wobbleX = 0;
    simRocket.scale = 1 - progress2 * 0.3;
    if (progress2 > 0.3 && !simRocket.launched) {
      simRocket.launched = true;
      spawnParticles(cw/2, ch - 60, 15, '#ff6b4a', 5);
      spawnParticles(cw/2, ch - 60, 10, '#ffb347', 4);
    }
    if (simTime > 2.5) {
      finishSim();
    }
  }
}

function updateSimMatrix(dt) {
  if (!matrixSimCell) return;
  simTime += 0; // already incremented

  var cat = twrCategory(matrixSimCell.twr);
  if (simTime > 1.5) {
    // Mark this cell
    var pred = matrixPredictions[matrixSimCell.key] || '';
    var isCorrect = (pred === cat);
    matrixVerified[matrixSimCell.key] = isCorrect;

    if (isCorrect) {
      score += 10;
      scorePunch = 1;
      playCorrect();
      spawnParticles(cw/2, ch - 80, 10, '#50ffb0', 4);
    } else {
      playWrong();
      triggerShake(4, 150);
      spawnParticles(cw/2, ch - 80, 8, '#ff6b4a', 3);
    }

    // Next cell
    matrixVerifyIdx++;
    var engines3 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
    var masses3 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;
    var totalCells = engines3.length * masses3.length;

    if (matrixVerifyIdx >= totalCells) {
      // All done
      phase = 'result';
      matrixSimCell = null;
      if (currentLevel === 3 && l3TimerRunning) {
        l3TimerRunning = false;
      }
    } else {
      // Set up next cell
      var ci = matrixVerifyIdx % engines3.length;
      var ri = Math.floor(matrixVerifyIdx / engines3.length);
      var eIdx3 = engines3[ci];
      var mIdx3 = masses3[ri];
      var key3 = eIdx3 + '_' + mIdx3;
      var twr3 = calcTWR(ENGINES[eIdx3].thrust, MASSES[mIdx3]);
      matrixSimCell = {key: key3, eIdx: eIdx3, mIdx: mIdx3, twr: twr3};
      simTime = 0;
    }
  }
}

function finishSim() {
  var cat = twrCategory(simRocket.twr);
  var isCorrect = (playerPrediction === cat);

  if (isCorrect) {
    score += 20;
    scorePunch = 1;
    feedbackText = t('correct');
    feedbackColor = '#50ffb0';
    playCorrect();
    spawnParticles(cw/2, ch/2, 15, '#50ffb0', 5);
  } else {
    feedbackText = t('wrong');
    feedbackColor = '#ff6b4a';
    playWrong();
    triggerShake(6, 200);
    spawnParticles(cw/2, ch/2, 12, '#ff6b4a', 4);
  }

  phase = 'result';
}

function startSim() {
  var eng = ENGINES[selectedEngine];
  var massKg = MASSES[selectedMass];
  var twr = calcTWR(eng.thrust, massKg);
  simRocket = {
    engineIdx: selectedEngine,
    massIdx: selectedMass,
    twr: twr,
    y: ch - 80,
    startY: ch - 80,
    wobbleX: 0,
    scale: 1,
    shaken: false,
    launched: false
  };
  simTime = 0;
  phase = 'simulate';
  playLaunch();
  spawnParticles(cw/2, ch - 70, 8, '#ffb347', 3);
}

function startMatrixVerify() {
  var engines4 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
  var masses4 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;
  matrixVerifyIdx = 0;
  matrixVerified = {};
  var eIdx4 = engines4[0];
  var mIdx4 = masses4[0];
  var key4 = eIdx4 + '_' + mIdx4;
  var twr4 = calcTWR(ENGINES[eIdx4].thrust, MASSES[mIdx4]);
  matrixSimCell = {key: key4, eIdx: eIdx4, mIdx: mIdx4, twr: twr4};
  simTime = 0;
  phase = 'simulate';
  playLaunch();
}

function nextLevel() {
  currentLevel++;
  if (currentLevel > 3) {
    phase = 'levelcomplete';
    playLevelComplete();
    spawnParticles(cw/2, ch/2, 20, '#50ffb0', 6);
    spawnParticles(cw/2, ch/2, 15, '#ffb347', 5);
  } else {
    resetLevel();
    if (currentLevel >= 2) {
      phase = 'select';
    }
    if (currentLevel === 3) {
      l3TimerRunning = true;
      l3StartTime = Date.now();
    }
    playLevelComplete();
  }
  updateSidebarText();
}

function resetLevel() {
  selectedEngine = -1;
  selectedMass = -1;
  playerPrediction = '';
  simRocket = null;
  simTime = 0;
  simResult = '';
  phase = 'select';
  matrixPredictions = {};
  matrixVerified = {};
  matrixSimCell = null;
  matrixVerifyIdx = 0;
  feedbackText = '';
  feedbackTimer = 0;
}

// --- Hit testing ---
var mouseX = 0, mouseY = 0;

function getEngineButtons() {
  var engines = (currentLevel === 1) ? L1_ENGINES : ((currentLevel === 2) ? L2_ENGINES : L3_ENGINES);
  var cx2 = cw / 2;
  var ew2 = 130, eh2 = 55, gap2 = 12;
  var totalW2 = engines.length * ew2 + (engines.length - 1) * gap2;
  var startX2 = cx2 - totalW2 / 2;
  var engY2 = 95;
  var rects = [];
  var i;
  for (i = 0; i < engines.length; i++) {
    rects.push({x: startX2 + i * (ew2 + gap2), y: engY2, w: ew2, h: eh2, idx: engines[i]});
  }
  return rects;
}

function getMassButtons() {
  var masses = (currentLevel === 1) ? L1_MASSES : ((currentLevel === 2) ? L2_MASSES : L3_MASSES);
  var cx3 = cw / 2;
  var mw2 = 100, mh2 = 45, gap3 = 12;
  var totalMW2 = masses.length * mw2 + (masses.length - 1) * gap3;
  var mStartX2 = cx3 - totalMW2 / 2;
  var massY2 = 215;
  var rects2 = [];
  var i;
  for (i = 0; i < masses.length; i++) {
    rects2.push({x: mStartX2 + i * (mw2 + gap3), y: massY2, w: mw2, h: mh2, idx: masses[i]});
  }
  return rects2;
}

function getPredictionButtons() {
  var cx4 = cw / 2;
  var btnW4 = 120, btnH4 = 36;
  var predBtns3 = ['nolaunch', 'unstable', 'clean'];
  var totalBW3 = predBtns3.length * btnW4 + (predBtns3.length - 1) * 10;
  var bStartX3 = cx4 - totalBW3 / 2;

  if (currentLevel === 1) {
    var massY3 = 200;
    var twrY2 = massY3 + 85;
    var predY2 = twrY2 + 37;
    var rects3 = [];
    var i;
    for (i = 0; i < predBtns3.length; i++) {
      rects3.push({x: bStartX3 + i * (btnW4 + 10), y: predY2, w: btnW4, h: btnH4, pred: predBtns3[i]});
    }
    return rects3;
  }
  return [];
}

function getLaunchButton() {
  if (currentLevel === 1) {
    var cx5 = cw / 2;
    var massY4 = 200;
    var twrY3 = massY4 + 85;
    var predY3 = twrY3 + 37;
    var launchY2 = predY3 + btnH_launch + 34;
    var lbw2 = 160, lbh2 = 44;
    return {x: cx5 - lbw2/2, y: launchY2, w: lbw2, h: lbh2};
  }
  return null;
}
var btnH_launch = 36;

function getMatrixCells() {
  var engines5 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
  var masses5 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;
  var cx6 = cw / 2;
  var cellW2 = 110, cellH2 = 50, hdrW2 = 70, hdrH2 = 40, gap4 = 4;
  var gridW2 = hdrW2 + engines5.length * (cellW2 + gap4);
  var gx2 = cx6 - gridW2 / 2;
  var gy2 = 55;
  var cells = [];
  var j3, i3;
  for (j3 = 0; j3 < masses5.length; j3++) {
    for (i3 = 0; i3 < engines5.length; i3++) {
      var cellX2 = gx2 + hdrW2 + i3 * (cellW2 + gap4);
      var cellY2 = gy2 + hdrH2 + gap4 + j3 * (cellH2 + gap4);
      cells.push({x: cellX2, y: cellY2, w: cellW2, h: cellH2, eIdx: engines5[i3], mIdx: masses5[j3]});
    }
  }
  return cells;
}

function getMatrixPredBtns() {
  var engines6 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
  var masses6 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;
  var cx7 = cw / 2;
  var cellW3 = 110, cellH3 = 50, hdrW3 = 70, hdrH3 = 40, gap5 = 4;
  var gridH2 = hdrH3 + masses6.length * (cellH3 + gap5);
  var predY4 = 55 + gridH2 + 30;
  var btnW5 = 110, btnH5 = 32;
  var predBtns4 = ['nolaunch', 'unstable', 'clean'];
  var totalBW4 = predBtns4.length * btnW5 + (predBtns4.length - 1) * 10;
  var bStartX4 = cx7 - totalBW4 / 2;
  var rects4 = [];
  var i;
  for (i = 0; i < predBtns4.length; i++) {
    rects4.push({x: bStartX4 + i * (btnW5 + 10), y: predY4, w: btnW5, h: btnH5, pred: predBtns4[i]});
  }
  return rects4;
}

function getMatrixVerifyBtn() {
  var engines7 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
  var masses7 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;
  var cx8 = cw / 2;
  var cellH4 = 50, hdrH4 = 40, gap6 = 4;
  var gridH3 = hdrH4 + masses7.length * (cellH4 + gap6);
  var predY5 = 55 + gridH3 + 75;
  var vbw2 = 160, vbh2 = 40;
  return {x: cx8 - vbw2/2, y: predY5, w: vbw2, h: vbh2};
}

function hitTest(rect, mx, my) {
  return mx >= rect.x && mx <= rect.x + rect.w && my >= rect.y && my <= rect.y + rect.h;
}

// Selected matrix cell for prediction
var selectedMatrixCell = null;

// --- Mouse events ---
function onMouseMove(e) {
  var rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  updateHovers();
}

function updateHovers() {
  hoverEngine = -1;
  hoverMass = -1;
  hoverPrediction = '';
  hoverLaunch = false;
  hoverNext = false;
  hoverRetry = false;

  if (currentLevel === 1 && (phase === 'select' || phase === 'predict')) {
    var engBtns = getEngineButtons();
    var massBtns = getMassButtons();
    var i;
    for (i = 0; i < engBtns.length; i++) {
      if (hitTest(engBtns[i], mouseX, mouseY)) { hoverEngine = engBtns[i].idx; break; }
    }
    for (i = 0; i < massBtns.length; i++) {
      if (hitTest(massBtns[i], mouseX, mouseY)) { hoverMass = massBtns[i].idx; break; }
    }
    if (selectedEngine >= 0 && selectedMass >= 0) {
      var predBtns5 = getPredictionButtons();
      for (i = 0; i < predBtns5.length; i++) {
        if (hitTest(predBtns5[i], mouseX, mouseY)) { hoverPrediction = predBtns5[i].pred; break; }
      }
      if (playerPrediction) {
        var lb = getLaunchButton();
        if (lb && hitTest(lb, mouseX, mouseY)) hoverLaunch = true;
      }
    }
  }

  if (currentLevel >= 2 && phase === 'select') {
    var cells = getMatrixCells();
    for (i = 0; i < cells.length; i++) {
      if (hitTest(cells[i], mouseX, mouseY)) {
        hoverEngine = cells[i].eIdx;
        hoverMass = cells[i].mIdx;
        break;
      }
    }
    var mpBtns = getMatrixPredBtns();
    for (i = 0; i < mpBtns.length; i++) {
      if (hitTest(mpBtns[i], mouseX, mouseY)) { hoverPrediction = mpBtns[i].pred; break; }
    }
    var vBtn = getMatrixVerifyBtn();
    if (hitTest(vBtn, mouseX, mouseY)) hoverLaunch = true;
  }

  if (phase === 'result') {
    if (currentLevel === 1) {
      var cx9 = cw / 2;
      var panelW2 = 340, panelH2 = 200;
      var py2 = ch/2 - panelH2/2 - 20;
      var btnY2 = py2 + panelH2 + 15;
      var nbw4 = 130, nbh4 = 38;
      if (hitTest({x: cx9 - nbw4 - 8, y: btnY2, w: nbw4, h: nbh4}, mouseX, mouseY)) hoverRetry = true;
      if (hitTest({x: cx9 + 8, y: btnY2, w: nbw4, h: nbh4}, mouseX, mouseY)) hoverNext = true;
    } else {
      var cx10 = cw / 2;
      var resultY2 = ch - 80;
      var nby3 = resultY2 + 15;
      var nbw5 = 140, nbh5 = 36;
      if (hitTest({x: cx10 - nbw5/2, y: nby3, w: nbw5, h: nbh5}, mouseX, mouseY)) hoverNext = true;
    }
  }

  if (phase === 'levelcomplete' && currentLevel <= 3) {
    var cx11 = cw / 2;
    var panelH3 = 180;
    var py3 = ch/2 - panelH3/2;
    var nby4 = py3 + panelH3 + 15;
    var nbw6 = 150, nbh6 = 40;
    if (hitTest({x: cx11 - nbw6/2, y: nby4, w: nbw6, h: nbh6}, mouseX, mouseY)) hoverNext = true;
  }
}

function onClick(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  ensureAudioCtx();

  if (currentLevel === 1 && (phase === 'select' || phase === 'predict')) {
    var engBtns2 = getEngineButtons();
    var massBtns2 = getMassButtons();
    var i;
    for (i = 0; i < engBtns2.length; i++) {
      if (hitTest(engBtns2[i], mx, my)) {
        selectedEngine = engBtns2[i].idx;
        playerPrediction = '';
        playSelect();
        return;
      }
    }
    for (i = 0; i < massBtns2.length; i++) {
      if (hitTest(massBtns2[i], mx, my)) {
        selectedMass = massBtns2[i].idx;
        playerPrediction = '';
        playSelect();
        return;
      }
    }
    if (selectedEngine >= 0 && selectedMass >= 0) {
      var predBtns6 = getPredictionButtons();
      for (i = 0; i < predBtns6.length; i++) {
        if (hitTest(predBtns6[i], mx, my)) {
          playerPrediction = predBtns6[i].pred;
          playSelect();
          return;
        }
      }
      if (playerPrediction) {
        var lb2 = getLaunchButton();
        if (lb2 && hitTest(lb2, mx, my)) {
          startSim();
          return;
        }
      }
    }
  }

  if (currentLevel >= 2 && phase === 'select') {
    // Click prediction buttons
    var mpBtns2 = getMatrixPredBtns();
    for (i = 0; i < mpBtns2.length; i++) {
      if (hitTest(mpBtns2[i], mx, my)) {
        // Apply prediction to selected cell or all empty
        if (selectedMatrixCell) {
          matrixPredictions[selectedMatrixCell] = mpBtns2[i].pred;
          selectedMatrixCell = null;
        } else {
          // Apply to hovered cell if any
          if (hoverEngine >= 0 && hoverMass >= 0) {
            var key5 = hoverEngine + '_' + hoverMass;
            matrixPredictions[key5] = mpBtns2[i].pred;
          }
        }
        playSelect();
        return;
      }
    }

    // Click matrix cell to select it
    var cells2 = getMatrixCells();
    for (i = 0; i < cells2.length; i++) {
      if (hitTest(cells2[i], mx, my)) {
        var key6 = cells2[i].eIdx + '_' + cells2[i].mIdx;
        if (!matrixVerified[key6]) {
          selectedMatrixCell = key6;
          hoverEngine = cells2[i].eIdx;
          hoverMass = cells2[i].mIdx;
          // Cycle through predictions on repeated clicks
          var currentPred = matrixPredictions[key6] || '';
          if (!currentPred) matrixPredictions[key6] = 'nolaunch';
          else if (currentPred === 'nolaunch') matrixPredictions[key6] = 'unstable';
          else if (currentPred === 'unstable') matrixPredictions[key6] = 'clean';
          else matrixPredictions[key6] = 'nolaunch';
          playSelect();
        }
        return;
      }
    }

    // Click verify button
    var engines8 = (currentLevel === 3) ? L3_ENGINES : L2_ENGINES;
    var masses8 = (currentLevel === 3) ? L3_MASSES : L2_MASSES;
    var allFilled2 = true;
    var j4, i4;
    for (j4 = 0; j4 < masses8.length; j4++) {
      for (i4 = 0; i4 < engines8.length; i4++) {
        var k4 = engines8[i4] + '_' + masses8[j4];
        if (!matrixPredictions[k4]) { allFilled2 = false; break; }
      }
      if (!allFilled2) break;
    }
    if (allFilled2) {
      var vBtn2 = getMatrixVerifyBtn();
      if (hitTest(vBtn2, mx, my)) {
        startMatrixVerify();
        return;
      }
    }
  }

  if (phase === 'result') {
    if (currentLevel === 1) {
      var cx12 = cw / 2;
      var panelW3 = 340, panelH4 = 200;
      var py4 = ch/2 - panelH4/2 - 20;
      var btnY3 = py4 + panelH4 + 15;
      var nbw7 = 130, nbh7 = 38;
      if (hitTest({x: cx12 - nbw7 - 8, y: btnY3, w: nbw7, h: nbh7}, mx, my)) {
        resetLevel();
        playSelect();
        return;
      }
      if (hitTest({x: cx12 + 8, y: btnY3, w: nbw7, h: nbh7}, mx, my)) {
        nextLevel();
        return;
      }
    } else {
      var cx13 = cw / 2;
      var resultY3 = ch - 80;
      var nby5 = resultY3 + 15;
      var nbw8 = 140, nbh8 = 36;
      if (hitTest({x: cx13 - nbw8/2, y: nby5, w: nbw8, h: nbh8}, mx, my)) {
        nextLevel();
        return;
      }
    }
  }

  if (phase === 'levelcomplete' && currentLevel <= 3) {
    var cx14 = cw / 2;
    var panelH5 = 180;
    var py5 = ch/2 - panelH5/2;
    var nby6 = py5 + panelH5 + 15;
    var nbw9 = 150, nbh9 = 40;
    if (hitTest({x: cx14 - nbw9/2, y: nby6, w: nbw9, h: nbh9}, mx, my)) {
      nextLevel();
      return;
    }
  }
}

// --- Sidebar ---
function updateSidebarText() {
  document.getElementById('gameTitle').textContent = t('title');
  document.getElementById('gameSubtitle').textContent = t('subtitle');
  document.getElementById('scoreLbl').textContent = t('score');
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('levelLbl').textContent = t('level');
  document.getElementById('levelVal').textContent = (currentLevel > 3) ? '---' : currentLevel;

  var guideKey = 'guide_l' + Math.min(currentLevel, 3);
  document.getElementById('guidePanel').textContent = t(guideKey);
}

// --- Main loop ---
var lastTime = 0;
var globalTime = 0;

function gameLoop(timestamp) {
  var dt = timestamp - lastTime;
  if (dt > 100) dt = 16;
  lastTime = timestamp;
  globalTime += dt;

  // Update
  idlePulse += 0.03;
  updateSim(dt);
  updateParticles(dt);
  updateShake(dt);
  if (scorePunch > 0) {
    scorePunch -= 0.03;
    if (scorePunch < 0) scorePunch = 0;
    document.getElementById('scoreVal').style.transform = 'scale(' + (1 + scorePunch * 0.4) + ')';
    document.getElementById('scoreVal').textContent = score;
  }
  if (feedbackTimer > 0) feedbackTimer -= dt;

  // Draw
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground(globalTime);

  if (currentLevel === 1) {
    drawLevel1(globalTime);
  } else if (currentLevel <= 3 && phase !== 'levelcomplete' && phase !== 'allcomplete') {
    drawMatrixLevel(globalTime);
  } else {
    drawLevelComplete(globalTime, cw / 2);
  }

  drawParticles();

  // Feedback text overlay
  if (feedbackTimer > 0) {
    var fAlpha = Math.min(1, feedbackTimer / 300);
    ctx.globalAlpha = fAlpha;
    ctx.fillStyle = feedbackColor;
    ctx.font = '700 28px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = feedbackColor;
    ctx.shadowBlur = 20;
    ctx.fillText(feedbackText, cw/2, ch/2 - 50);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// --- Init ---
function init() {
  initCanvas();
  initStars();
  resetLevel();
  updateSidebarText();

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onClick);
  window.addEventListener('resize', delayedResize);

  document.getElementById('langBtn').addEventListener('click', function() {
    lang = (lang === 'cn') ? 'en' : 'cn';
    document.getElementById('langBtn').textContent = lang.toUpperCase();
    updateSidebarText();
  });

  document.getElementById('soundBtn').addEventListener('click', function() {
    ensureAudioCtx();
    soundMuted = !soundMuted;
    document.getElementById('soundBtn').textContent = soundMuted ? 'MUTE' : 'SFX';
  });

  requestAnimationFrame(gameLoop);
}

init();
</script>
