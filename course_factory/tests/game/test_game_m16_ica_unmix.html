<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>ICA Pipeline Builder</title>
<style>
:root{
  /* math (06) deep-space + 5 色 palette */
  --bg-0: oklch(0.13 0.03 245);
  --bg-1: oklch(0.17 0.038 245);
  --bg-2: oklch(0.22 0.045 245);
  --bg-3: oklch(0.28 0.05 245);
  --line: oklch(0.40 0.06 245 / 0.40);
  --line-strong: oklch(0.60 0.10 245 / 0.55);
  --fg: oklch(0.96 0.01 245);
  --fg-dim: oklch(0.76 0.02 245);
  --fg-mute: oklch(0.56 0.03 245);
  /* math accent */
  --axis:     oklch(0.72 0.17 245);
  --proof:    oklch(0.52 0.16 245);
  --shadow:   oklch(0.35 0.10 245);
  --solution: oklch(0.92 0.08 240);
  --qed:      oklch(0.85 0.14 85);
  --accent:   oklch(0.72 0.17 245);
  /* 信号源色: brain=axis, blink=qed, heart=warm */
  --c-brain: oklch(0.72 0.17 245);
  --c-blink: oklch(0.85 0.14 85);
  --c-heart: oklch(0.72 0.16 25);
  --bad:     oklch(0.66 0.18 25);
  --mono:'JetBrains Mono','SF Mono','Fira Code',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
  font-family:'Noto Sans SC','Inter',sans-serif;}
.wrapper{display:flex;height:100vh;}

/* ---- 200px 左侧栏 ---- */
.game-sidebar{width:200px;flex:0 0 200px;display:flex;flex-direction:column;
  background:var(--bg-1);border-right:1px solid var(--line);padding:12px 12px 10px;
  overflow-y:auto;gap:10px;}
.brand{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--axis);
  letter-spacing:1px;text-transform:uppercase;line-height:1.3;}
.brand .sub{display:block;font-size:9px;color:var(--fg-mute);letter-spacing:0.5px;margin-top:2px;}
.mascot-wrap{display:flex;justify-content:center;}
.mascot-cap{font-family:var(--mono);font-size:9px;color:var(--fg-mute);text-align:center;
  letter-spacing:0.5px;margin-top:2px;}

.tray-title{font-family:var(--mono);font-size:10px;color:var(--axis);letter-spacing:1px;
  text-transform:uppercase;border-top:1px solid var(--line);padding-top:8px;}
.tray{display:flex;flex-direction:column;gap:7px;}
.part-card{font-family:var(--mono);font-size:10px;line-height:1.3;color:var(--fg);
  background:var(--bg-2);border:1px solid var(--line-strong);padding:7px 8px;cursor:grab;
  letter-spacing:0.3px;user-select:none;position:relative;transition:opacity 0.15s,transform 0.1s;}
.part-card .pc-step{display:block;font-size:8px;color:var(--axis);letter-spacing:1px;margin-bottom:2px;}
.part-card.dragging{opacity:0.35;}
.part-card.placed{opacity:0.28;pointer-events:none;border-style:dashed;}
.part-card:active{cursor:grabbing;}

.guide{border-top:1px solid var(--line);padding-top:8px;font-size:10px;color:var(--fg-dim);
  line-height:1.5;}
.guide b{color:var(--solution);font-weight:600;}

.lang-btn{margin-top:auto;font-family:var(--mono);font-size:11px;font-weight:700;
  padding:5px 0;cursor:pointer;border:1px solid var(--line-strong);background:var(--bg-2);
  color:var(--axis);letter-spacing:1px;}

/* ---- 右侧主舞台 ---- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;}
.hud{display:flex;align-items:center;gap:18px;padding:8px 16px;background:var(--bg-1);
  border-bottom:1px solid var(--line);}
.hud .title{font-family:var(--mono);font-size:11px;color:var(--fg-dim);letter-spacing:1px;
  text-transform:uppercase;margin-right:auto;}
.hud .item{display:flex;flex-direction:column;align-items:flex-end;}
.hud .label{font-family:var(--mono);font-size:8px;color:var(--fg-mute);letter-spacing:0.8px;
  text-transform:uppercase;}
.hud .value{font-family:var(--mono);font-size:14px;color:var(--solution);font-weight:700;margin-top:1px;}

.stage{flex:1;min-height:0;display:flex;flex-direction:column;padding:14px 16px;gap:12px;}

/* 管线槽行 */
.pipeline{display:flex;align-items:stretch;gap:0;}
.slot-wrap{flex:1;display:flex;align-items:center;}
.slot{flex:1;min-height:78px;border:1px dashed var(--line-strong);background:var(--bg-1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  position:relative;transition:background 0.12s,border-color 0.12s;padding:6px;text-align:center;}
.slot.over{background:var(--bg-2);border-color:var(--axis);border-style:solid;}
.slot .slot-idx{position:absolute;top:4px;left:6px;font-family:var(--mono);font-size:9px;
  color:var(--fg-mute);letter-spacing:0.5px;}
.slot .slot-hint{font-family:var(--mono);font-size:9px;color:var(--fg-mute);letter-spacing:0.5px;}
.slot .chip{font-family:var(--mono);font-size:10px;line-height:1.25;color:var(--fg);font-weight:600;
  letter-spacing:0.3px;}
.slot .chip .ord{display:block;font-size:8px;color:var(--axis);letter-spacing:1px;margin-bottom:2px;}
.slot.filled{border-style:solid;border-color:var(--proof);background:var(--bg-2);cursor:pointer;}
.slot.filled.ok{border-color:var(--axis);}
.arrow{flex:0 0 22px;display:flex;align-items:center;justify-content:center;color:var(--fg-mute);
  font-family:var(--mono);font-size:14px;}

.controls{display:flex;align-items:center;gap:12px;}
.run-btn{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:8px 24px;cursor:pointer;border:1px solid var(--axis);
  background:var(--axis);color:var(--bg-0);}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;background:var(--bg-2);color:var(--fg-mute);
  border-color:var(--line);}
.reset-btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;padding:8px 16px;cursor:pointer;border:1px solid var(--line-strong);
  background:var(--bg-2);color:var(--fg-dim);}
.verdict{font-family:var(--mono);font-size:11px;letter-spacing:0.4px;color:var(--fg-mute);
  flex:1;line-height:1.4;}
.verdict.good{color:var(--qed);}
.verdict.bad{color:var(--bad);}

.canvas-wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;
  border:1px solid var(--line);background:var(--bg-1);}
canvas{display:block;width:100%;height:100%;}

.victory{position:absolute;inset:0;background:oklch(0.10 0.025 245 / 0.84);display:none;
  align-items:center;justify-content:center;z-index:50;}
.victory.show{display:flex;}
.victory-box{background:var(--bg-2);border:1px solid var(--axis);padding:26px 34px;max-width:440px;
  text-align:center;box-shadow:5px 5px 0 var(--bg-0);}
.victory-title{font-family:var(--mono);font-size:17px;color:var(--qed);font-weight:700;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.victory-text{font-size:13px;color:var(--fg-dim);line-height:1.65;margin-bottom:16px;}
.victory-btn{font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;
  padding:7px 22px;border:1px solid var(--axis);background:var(--bg-1);color:var(--axis);
  letter-spacing:1px;text-transform:uppercase;}
.victory-btn:hover{background:var(--axis);color:var(--bg-0);}
</style>
</head>
<body>
<div class="wrapper">
  <aside class="game-sidebar">
    <div class="brand" id="brandTitle">ICA PIPELINE<span class="sub" id="brandSub">P-EEG · M16 · 去伪迹流程</span></div>
    <div class="mascot-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72" aria-hidden="true">
        <!-- Pi: rotating tetrahedron, math 系吉祥物 -->
        <g transform="translate(36,38)">
          <polygon points="0,-24 22,12 -22,12" fill="var(--shadow)" stroke="var(--axis)" stroke-width="1.5"/>
          <polygon points="0,-24 22,12 0,2" fill="var(--proof)"/>
          <polygon points="0,-24 -22,12 0,2" fill="var(--axis)" opacity="0.85"/>
          <polygon points="-22,12 22,12 0,2" fill="var(--solution)" opacity="0.55"/>
          <rect x="-9" y="-7" width="5" height="5" fill="var(--solution)"/>
          <rect x="4" y="-7" width="5" height="5" fill="var(--solution)"/>
          <rect x="-6" y="3" width="12" height="2.5" fill="var(--qed)"/>
        </g>
      </svg>
    </div>
    <div class="mascot-cap" id="mascotCap">Pi · 盲源分离师</div>

    <div class="tray-title" id="trayTitle">流程零件</div>
    <div class="tray" id="tray"></div>

    <div class="guide" id="guideBox"></div>
    <button class="lang-btn" id="langBtn">EN</button>
  </aside>

  <main class="game-main">
    <div class="hud">
      <div class="title" id="hudTitle">把零件按正确顺序拖进管线</div>
      <div class="item"><div class="label" id="hudL1">FILLED</div><div class="value" id="hudV1">0 / 5</div></div>
      <div class="item"><div class="label" id="hudL2">CLEAN</div><div class="value" id="hudV2">--</div></div>
    </div>
    <div class="stage">
      <div class="pipeline" id="pipeline"></div>
      <div class="controls">
        <button class="run-btn" id="runBtn" disabled>RUN</button>
        <button class="reset-btn" id="resetBtn">RESET</button>
        <div class="verdict" id="verdict"></div>
      </div>
      <div class="canvas-wrap"><canvas id="c"></canvas></div>
    </div>
    <div class="victory" id="victory">
      <div class="victory-box">
        <div class="victory-title" id="vicTitle">盲源分离师</div>
        <div class="victory-text" id="vicText"></div>
        <button class="victory-btn" id="vicBtn">CLOSE</button>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
"use strict";
var LANG='cn';

// ---- 流程零件定义 (正确顺序 0..4) ----
// id: 内部键; correct: 正确槽位 index
var PARTS=[
  {id:'decompose', correct:0},
  {id:'inspect',   correct:1},
  {id:'mark',      correct:2},
  {id:'remove',    correct:3},
  {id:'rebuild',   correct:4}
];
var NSLOT=5;

var I18N={
  brandTitle:{cn:'ICA 流程',en:'ICA PIPELINE'},
  brandSub:{cn:'P-EEG · M16 · 去伪迹流程',en:'P-EEG · M16 · ARTIFACT REMOVAL'},
  mascotCap:{cn:'Pi · 盲源分离师',en:'Pi · The Unmixer'},
  trayTitle:{cn:'流程零件',en:'PIPELINE PARTS'},
  hudTitle:{cn:'把零件按正确顺序拖进管线',en:'DRAG PARTS INTO THE PIPELINE IN ORDER'},
  hudL1:{cn:'已放置',en:'FILLED'},
  hudL2:{cn:'干净',en:'CLEAN'},
  runBtn:{cn:'运行',en:'RUN'},
  resetBtn:{cn:'重置',en:'RESET'},
  slotHint:{cn:'空槽 · 拖入',en:'EMPTY · DROP HERE'},
  // 零件名 + 说明
  pn_decompose:{cn:'分解 ICA',en:'DECOMPOSE (ICA)'},
  pn_inspect:{cn:'看各路成分',en:'INSPECT COMPONENTS'},
  pn_mark:{cn:'标记眨眼成分',en:'MARK BLINK COMP'},
  pn_remove:{cn:'剔除该成分',en:'REMOVE COMP'},
  pn_rebuild:{cn:'重建脑波',en:'RECONSTRUCT'},
  // verdicts
  v_empty:{cn:'管线未填满 —— 把 5 个零件都拖进去。',en:'Pipeline incomplete — drop all 5 parts.'},
  v_clean:{cn:'顺序正确：拆开→看→标记眨眼→剔除→重建，眨眼伪迹被干净去除。',en:'Correct order: decompose → inspect → mark → remove → reconstruct. Blink artifact cleanly removed.'},
  v_wrongorder:{cn:'顺序错了。先重建再剔除？那时眨眼已混回信号 —— 伪迹残留。',en:'Wrong order. Reconstruct before remove? The blink is already mixed back — artifact remains.'},
  v_norebuild_late:{cn:'成分还没分解/标记就想剔除 —— 不知道哪一路是眨眼，剔不掉。',en:'Trying to remove before decomposing/marking — you do not know which component is the blink.'},
  v_skipremove:{cn:'漏了剔除这一步：眨眼成分仍在，重建出的是脏数据。',en:'Removal skipped: the blink component is still there, reconstruction yields dirty data.'},
  // canvas heads
  headRaw:{cn:'原始脑波（混入眨眼尖峰）',en:'Raw EEG (blink spikes mixed in)'},
  headOut:{cn:'流程输出',en:'Pipeline output'},
  outIdle:{cn:'运行流程后在此显示结果',en:'Run the pipeline to see output here'},
  outClean:{cn:'干净脑波节律',en:'Clean EEG rhythm'},
  outDirty:{cn:'脏数据 · 眨眼伪迹残留',en:'Dirty · blink artifact remains'},
  guide:{
    cn:'<b>目标</b>：ICA 去伪迹有 5 个步骤。把零件按正确顺序拖进管线再点<b>运行</b>。<br>顺序错（先重建后剔除）→ 眨眼没去掉；漏剔除 → 脏数据。<br>正确顺序解锁<b>盲源分离师</b>。',
    en:'<b>Goal</b>: ICA artifact removal has 5 steps. Drag parts into the pipeline in the right order, then <b>RUN</b>.<br>Wrong order (reconstruct before remove) → blink stays; skip removal → dirty data.<br>Correct order unlocks <b>The Unmixer</b>.'
  },
  vicTitle:{cn:'盲源分离师',en:'THE UNMIXER'},
  vicText:{
    cn:'你搭对了 ICA 去伪迹流程。把混在一起的信号拆成独立来源，挑出眨眼那一路剔掉，再把剩下的拼回去 —— 这就是从脑电里去掉眨眼伪迹的标准步骤。顺序不能乱：必须先拆开、看清、标记、剔除，最后才能重建。',
    en:'You built the ICA artifact-removal pipeline. Split the blended signal into independent sources, find the blink one, drop it, then rebuild from the rest — the standard way to clean blink artifacts out of EEG. Order matters: decompose, inspect, mark, remove, only then reconstruct.'
  },
  vicBtn:{cn:'关闭',en:'CLOSE'}
};
function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}
function partName(id){return t('pn_'+id);}

// ---- 状态 ----
// slots[i] = part id 或 null
var slots=[null,null,null,null,null];
var ran=false;
var lastResult=null; // 'clean' | 'dirty' | null

// ============ 渲染 tray ============
var trayEl=document.getElementById('tray');
function buildTray(){
  trayEl.innerHTML='';
  PARTS.forEach(function(p){
    var card=document.createElement('div');
    card.className='part-card';
    card.setAttribute('draggable','true');
    card.dataset.part=p.id;
    card.id='card-'+p.id;
    var placed = slots.indexOf(p.id)>=0;
    if(placed) card.classList.add('placed');
    card.innerHTML='<span class="pc-step">PART</span>'+partName(p.id);
    card.addEventListener('dragstart',function(ev){
      if(this.classList.contains('placed')){ ev.preventDefault(); return; }
      ev.dataTransfer.setData('text/plain',p.id);
      ev.dataTransfer.effectAllowed='move';
      this.classList.add('dragging');
    });
    card.addEventListener('dragend',function(){ this.classList.remove('dragging'); });
    trayEl.appendChild(card);
  });
}

// ============ 渲染管线槽 ============
var pipelineEl=document.getElementById('pipeline');
function buildPipeline(){
  pipelineEl.innerHTML='';
  for(var i=0;i<NSLOT;i++){
    var sw=document.createElement('div');
    sw.className='slot-wrap';
    var slot=document.createElement('div');
    slot.className='slot';
    slot.dataset.idx=String(i);
    sw.appendChild(slot);
    pipelineEl.appendChild(sw);
    if(i<NSLOT-1){
      var arr=document.createElement('div');
      arr.className='arrow';
      arr.textContent='>';
      pipelineEl.appendChild(arr);
    }
    bindSlot(slot,i);
  }
  refreshSlots();
}

function bindSlot(slot,idx){
  slot.addEventListener('dragover',function(ev){ ev.preventDefault(); ev.dataTransfer.dropEffect='move'; this.classList.add('over'); });
  slot.addEventListener('dragleave',function(){ this.classList.remove('over'); });
  slot.addEventListener('drop',function(ev){
    ev.preventDefault(); this.classList.remove('over');
    var pid=ev.dataTransfer.getData('text/plain');
    if(!pid) return;
    placePart(pid,idx);
  });
  // 点已填的槽 -> 取回零件
  slot.addEventListener('click',function(){
    if(slots[idx]){
      slots[idx]=null;
      ran=false; lastResult=null;
      buildTray(); refreshSlots(); updateHud(); draw();
      setVerdict('',null);
    }
  });
}

function placePart(pid,idx){
  // 若该零件已在别处, 先清掉旧位
  var old=slots.indexOf(pid);
  if(old>=0) slots[old]=null;
  // 若目标槽已有别的零件, 把它退回 tray (置 null)
  slots[idx]=pid;
  ran=false; lastResult=null;
  buildTray(); refreshSlots(); updateHud(); draw();
  setVerdict('',null);
}

function refreshSlots(){
  var slotEls=pipelineEl.querySelectorAll('.slot');
  for(var i=0;i<slotEls.length;i++){
    var el=slotEls[i];
    var pid=slots[i];
    el.classList.remove('filled','ok');
    if(pid){
      el.classList.add('filled');
      el.innerHTML='<span class="slot-idx">'+(i+1)+'</span>'+
        '<span class="chip"><span class="ord">STEP '+(i+1)+'</span>'+partName(pid)+'</span>';
      // 正确槽位高亮 (仅在 run 后给反馈, 平时只标 filled)
    } else {
      el.innerHTML='<span class="slot-idx">'+(i+1)+'</span><span class="slot-hint">'+t('slotHint')+'</span>';
    }
  }
}

function filledCount(){ var c=0; for(var i=0;i<NSLOT;i++) if(slots[i])c++; return c; }

function updateHud(){
  document.getElementById('hudV1').textContent=filledCount()+' / '+NSLOT;
  var clean='--';
  if(ran) clean = (lastResult==='clean')? (LANG==='cn'?'是':'YES') : (LANG==='cn'?'否':'NO');
  document.getElementById('hudV2').textContent=clean;
  document.getElementById('hudV2').style.color = ran? (lastResult==='clean'?'var(--qed)':'var(--bad)') : 'var(--solution)';
  document.getElementById('runBtn').disabled = (filledCount()!==NSLOT);
}

function setVerdict(txt,kind){
  var v=document.getElementById('verdict');
  v.textContent=txt;
  v.className='verdict'+(kind==='good'?' good':kind==='bad'?' bad':'');
}

// ============ 评估逻辑 ============
// 正确顺序: decompose(0) inspect(1) mark(2) remove(3) rebuild(4)
function evaluate(){
  var order=slots.slice(); // part ids in slot order
  var idxOf={};
  order.forEach(function(pid,i){ if(pid) idxOf[pid]=i; });

  var hasRemove = idxOf.remove!=null;
  var hasRebuild = idxOf.rebuild!=null;
  var hasMark = idxOf.mark!=null;
  var hasDecomp = idxOf.decompose!=null;

  // 正确: 5 个零件且严格 0,1,2,3,4
  var perfect = order[0]==='decompose'&&order[1]==='inspect'&&order[2]==='mark'&&
                order[3]==='remove'&&order[4]==='rebuild';
  if(perfect) return {result:'clean', verdict:'v_clean', kind:'good'};

  // 漏剔除 (remove 不在管线里) —— 题面保证 5 件齐全才能 run, 故此分支理论少见,
  // 但若 remove 放错且 rebuild 在 remove 前, 视为残留
  if(!hasRemove) return {result:'dirty', verdict:'v_skipremove', kind:'bad'};

  // remove 必须在 rebuild 之前; 否则眨眼混回
  if(hasRebuild && hasRemove && idxOf.remove>idxOf.rebuild)
    return {result:'dirty', verdict:'v_wrongorder', kind:'bad'};

  // remove 必须在 decompose 和 mark 之后, 否则不知剔哪路
  if(hasRemove && hasMark && idxOf.remove<idxOf.mark)
    return {result:'dirty', verdict:'v_norebuild_late', kind:'bad'};
  if(hasRemove && hasDecomp && idxOf.remove<idxOf.decompose)
    return {result:'dirty', verdict:'v_norebuild_late', kind:'bad'};

  // 其它乱序统一归为顺序错
  return {result:'dirty', verdict:'v_wrongorder', kind:'bad'};
}

var allDone=false;
function runPipeline(){
  if(filledCount()!==NSLOT) return;
  var r=evaluate();
  ran=true; lastResult=r.result;
  setVerdict(t(r.verdict), r.kind);
  // 标正确槽位
  var slotEls=pipelineEl.querySelectorAll('.slot');
  for(var i=0;i<slotEls.length;i++){
    var pid=slots[i];
    var correct = pid && PARTS.filter(function(p){return p.id===pid;})[0].correct===i;
    if(r.result==='clean' && correct) slotEls[i].classList.add('ok');
    else slotEls[i].classList.remove('ok');
  }
  updateHud();
  startAnim();
  if(r.result==='clean' && !allDone){
    allDone=true;
    setTimeout(function(){document.getElementById('victory').classList.add('show');},900);
  }
}

// ===================== Canvas 信号流 =====================
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);
var W_=0,H_=0;

function resize(){
  var wrap=canvas.parentElement;
  var rect=wrap.getBoundingClientRect();
  if(rect.width<2||rect.height<2) return;
  W_=rect.width; H_=rect.height;
  canvas.width=W_*DPR; canvas.height=H_*DPR;
  canvas.style.width=W_+'px'; canvas.style.height=H_+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  draw();
}
function cssVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

// 源波形
var NSAMP=300, TSPAN=3.2;
function brainWave(tt){ return Math.sin(tt*9.5)*0.62 + Math.sin(tt*19.0)*0.16; }
function blinkWave(tt){
  var p=tt%1.6, d=p-0.4;
  return Math.exp(-(d*d)/0.004)*1.0;
}
var RAW=[], BRAIN=[], BLINK=[];
(function precompute(){
  for(var n=0;n<NSAMP;n++){
    var tt=n/NSAMP*TSPAN;
    var b=brainWave(tt), k=blinkWave(tt);
    BRAIN.push(b); BLINK.push(k); RAW.push(b+k);
  }
})();

function drawWave(samples, x0, y0, w, h, color, lineW, normRef){
  var maxA=normRef||0;
  if(!maxA){ for(var k=0;k<samples.length;k++){var a=Math.abs(samples[k]); if(a>maxA)maxA=a;} }
  if(maxA<1e-6) maxA=1;
  ctx.beginPath();
  for(var n=0;n<samples.length;n++){
    var x=x0 + n/(samples.length-1)*w;
    var y=y0 + h/2 - (samples[n]/maxA)*(h/2)*0.84;
    if(n===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle=color; ctx.lineWidth=lineW; ctx.lineJoin='round';
  ctx.stroke();
}

// 动画进度 (运行时让输出从 raw 渐变到目标)
var animT=1; var animRAF=0;
function startAnim(){
  animT=0;
  if(animRAF) cancelAnimationFrame(animRAF);
  function step(){
    animT=Math.min(1, animT+0.035);
    draw();
    if(animT<1) animRAF=requestAnimationFrame(step);
  }
  animRAF=requestAnimationFrame(step);
}

function draw(){
  if(W_<2||H_<2) return;
  ctx.fillStyle=cssVar('--bg-0')||'#0c1018';
  ctx.fillRect(0,0,W_,H_);

  var padL=18,padR=18,padT=24,padB=14,gap=24;
  var plotW=W_-padL-padR;
  var regionH=(H_-padT-padB-gap)/2;
  var topY=padT, botY=padT+regionH+gap;

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.font='11px "Noto Sans SC",sans-serif';

  // 上: 原始混合
  ctx.fillStyle=cssVar('--fg-dim');
  ctx.fillText(t('headRaw'), padL, topY-8);
  ctx.fillStyle=cssVar('--bg-2'); ctx.fillRect(padL,topY,plotW,regionH);
  ctx.strokeStyle=cssVar('--line'); ctx.lineWidth=1; ctx.strokeRect(padL,topY,plotW,regionH);
  ctx.strokeStyle=cssVar('--line'); ctx.beginPath();
  ctx.moveTo(padL,topY+regionH/2); ctx.lineTo(padL+plotW,topY+regionH/2); ctx.stroke();
  drawWave(RAW, padL, topY, plotW, regionH, cssVar('--c-blink'), 1.6, 1.9);

  // 下: 输出
  var headOut=t('headOut');
  ctx.fillStyle=cssVar('--fg-dim');
  ctx.fillText(headOut, padL, botY-8);
  // 边框依结果
  var borderCol=cssVar('--line'); var borderW=1;
  if(ran && lastResult==='clean'){ borderCol=cssVar('--qed'); borderW=2; }
  else if(ran && lastResult==='dirty'){ borderCol=cssVar('--bad'); borderW=2; }
  ctx.fillStyle=cssVar('--bg-2'); ctx.fillRect(padL,botY,plotW,regionH);
  ctx.strokeStyle=borderCol; ctx.lineWidth=borderW; ctx.strokeRect(padL,botY,plotW,regionH);
  ctx.strokeStyle=cssVar('--line'); ctx.beginPath();
  ctx.moveTo(padL,botY+regionH/2); ctx.lineTo(padL+plotW,botY+regionH/2); ctx.stroke();

  if(!ran){
    ctx.fillStyle=cssVar('--fg-mute');
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='11px "JetBrains Mono",monospace';
    ctx.fillText(t('outIdle'), padL+plotW/2, botY+regionH/2);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  } else {
    // 目标波形: clean -> brain; dirty -> raw (眨眼残留)
    var target = (lastResult==='clean')? BRAIN : RAW;
    var blended=[];
    for(var n=0;n<NSAMP;n++){
      blended.push(RAW[n]*(1-animT) + target[n]*animT);
    }
    var col = (lastResult==='clean')? cssVar('--c-brain') : cssVar('--bad');
    drawWave(blended, padL, botY, plotW, regionH, col, 2.0, 1.9);
    // 标签
    ctx.fillStyle=col;
    ctx.font='10px "JetBrains Mono",monospace';
    ctx.textAlign='right'; ctx.textBaseline='alphabetic';
    ctx.fillText(lastResult==='clean'? t('outClean'):t('outDirty'), padL+plotW, botY+regionH+12);
    ctx.textAlign='left';
  }
}

// ===================== i18n / events =====================
function refreshI18N(){
  document.getElementById('brandTitle').childNodes[0].nodeValue=t('brandTitle');
  document.getElementById('brandSub').textContent=t('brandSub');
  document.getElementById('mascotCap').textContent=t('mascotCap');
  document.getElementById('trayTitle').textContent=t('trayTitle');
  document.getElementById('hudTitle').textContent=t('hudTitle');
  document.getElementById('hudL1').textContent=t('hudL1');
  document.getElementById('hudL2').textContent=t('hudL2');
  document.getElementById('runBtn').textContent=t('runBtn');
  document.getElementById('resetBtn').textContent=t('resetBtn');
  document.getElementById('guideBox').innerHTML=t('guide');
  document.getElementById('vicTitle').textContent=t('vicTitle');
  document.getElementById('vicText').textContent=t('vicText');
  document.getElementById('vicBtn').textContent=t('vicBtn');
  buildTray(); refreshSlots(); updateHud();
  // 重新渲染 verdict 文案
  if(ran && lastResult){
    var r=evaluate();
    setVerdict(t(r.verdict), r.kind);
  }
  draw();
}

document.getElementById('runBtn').addEventListener('click',runPipeline);
document.getElementById('resetBtn').addEventListener('click',function(){
  slots=[null,null,null,null,null];
  ran=false; lastResult=null; allDone=false; animT=1;
  buildTray(); refreshSlots(); updateHud(); setVerdict('',null); draw();
});
document.getElementById('langBtn').addEventListener('click',function(){
  LANG = LANG==='cn'?'en':'cn';
  this.textContent = LANG==='cn'?'EN':'CN';
  refreshI18N();
});
document.getElementById('vicBtn').addEventListener('click',function(){
  document.getElementById('victory').classList.remove('show');
});
window.addEventListener('resize',resize);

// init
buildTray();
buildPipeline();
updateHud();
refreshI18N();
resize();
setTimeout(resize,200);
setTimeout(resize,600);
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){resize();});}
})();
