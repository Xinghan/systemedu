<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Topomap Detective</title>
<style>
:root{
  /* Industrial Atelier — warm cream */
  --paper:    #FAF9F5;
  --paper-2:  #F1EDDF;
  --card:     #FFFFFF;
  --ink:      #191814;
  --ink-2:    #2B2924;
  --sub:      #6B6557;
  --sub-2:    #9D978A;
  --border:   #EBE5D6;
  --border-2: #D9D1BD;
  --hairline: #F2EDE0;
  /* Primary — Claude coral */
  --primary:      #D97757;
  --primary-ink:  #9A4A2E;
  --primary-soft: #F8EDE5;
  --primary-line: #ECCFB8;
  /* Domain accent — robotics */
  --robotics:      #7C4569;
  --robotics-soft: #E9DBE3;
  /* heat ramp (cool -> hot, on cream substrate) */
  --heat-0: #2C4A6E;   /* deep cool */
  --heat-1: #4E84A8;
  --heat-2: #8FB89E;
  --heat-3: #E2C25A;
  --heat-4: #D97757;   /* warm */
  --heat-5: #9A2F2F;   /* hottest */
  --shadow-sm: 0 1px 2px 0 rgba(25,24,20,.04);
  --shadow:    0 1px 3px 0 rgba(25,24,20,.06), 0 1px 2px -1px rgba(25,24,20,.04);
  --shadow-md: 0 4px 8px -2px rgba(25,24,20,.06), 0 2px 4px -2px rgba(25,24,20,.04);
  --shadow-lg: 0 12px 24px -6px rgba(25,24,20,.1), 0 4px 8px -4px rgba(25,24,20,.05);
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --sans: 'PingFang SC', 'Inter', 'Noto Sans SC', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--paper);
  font-family:var(--sans);color:var(--ink);}
.app{display:flex;height:100vh;width:100%;}

/* ---------- 200px sidebar ---------- */
.game-sidebar{width:200px;flex-shrink:0;background:var(--paper-2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 14px;gap:14px;overflow-y:auto;}
.brand{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--robotics);
  letter-spacing:1px;text-transform:uppercase;line-height:1.3;}
.brand small{display:block;font-size:9px;color:var(--sub-2);letter-spacing:2px;margin-top:3px;font-weight:600;}
.head-emblem{display:flex;flex-direction:column;align-items:center;gap:5px;}
.head-emblem svg{width:78px;height:78px;}
.head-emblem .e-name{font-family:var(--mono);font-size:8px;color:var(--sub-2);letter-spacing:1px;}
.progress-list{display:flex;flex-direction:column;gap:5px;}
.progress-list .pl-head{font-size:10px;color:var(--sub-2);letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.pl-item{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
  color:var(--sub);padding:3px 0;}
.pl-dot{width:11px;height:11px;border:1px solid var(--border-2);border-radius:50%;flex-shrink:0;background:var(--card);}
.pl-item.current .pl-dot{border-color:var(--primary);background:var(--primary);animation:pulse 1.6s ease-in-out infinite;}
.pl-item.done .pl-dot{border-color:var(--robotics);background:var(--robotics);}
.pl-item.wrong .pl-dot{border-color:var(--primary-ink);background:var(--primary-soft);}
.pl-item.current{color:var(--ink);font-weight:600;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,119,87,.4);}50%{box-shadow:0 0 0 4px rgba(217,119,87,0);}}
.guide{font-size:11px;color:var(--sub);line-height:1.6;}
.guide .g-head{font-size:10px;color:var(--sub-2);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:700;}
.spacer{flex:1;}
.lang-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 0;cursor:pointer;
  border:1px solid var(--border-2);background:var(--card);color:var(--robotics);letter-spacing:2px;border-radius:6px;}
.lang-btn:hover{background:var(--robotics-soft);}

/* ---------- main stage ---------- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;padding:18px 20px;gap:14px;}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;}
.topbar h1{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:.3px;}
.topbar h1 small{display:block;font-family:var(--mono);font-size:10px;font-weight:600;
  color:var(--sub-2);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.hud{display:flex;gap:22px;font-family:var(--mono);}
.hud-item{text-align:right;}
.hud-label{font-size:8px;color:var(--sub-2);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.hud-value{font-size:16px;color:var(--robotics);font-weight:700;}

/* stage = topomap + meta. canvas parent flex column */
.stage{flex:1;min-height:0;display:flex;gap:16px;}
.topomap-wrap{flex:1.1;min-width:0;display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  box-shadow:var(--shadow-md);position:relative;overflow:hidden;}
.tm-meta{display:flex;gap:16px;padding:10px 16px;border-bottom:1px solid var(--hairline);
  font-family:var(--mono);font-size:10px;color:var(--sub);flex-shrink:0;align-items:center;}
.tm-meta b{color:var(--robotics);}
.tm-tag{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:1px;
  padding:3px 9px;border-radius:99px;background:var(--robotics-soft);color:var(--robotics);font-weight:700;}
canvas{flex:1;min-height:0;width:100%;display:block;}
.tm-legend{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--hairline);flex-shrink:0;}
.legend-bar{flex:1;height:9px;border-radius:5px;
  background:linear-gradient(90deg,var(--heat-0),var(--heat-1),var(--heat-2),var(--heat-3),var(--heat-4),var(--heat-5));}
.legend-cap{font-family:var(--mono);font-size:9px;color:var(--sub-2);letter-spacing:.5px;}

/* options column */
.panel{flex:.9;min-width:240px;display:flex;flex-direction:column;gap:10px;}
.panel-head{font-size:12px;color:var(--ink);font-weight:600;flex-shrink:0;}
.opts{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;overflow-y:auto;}
.opt{padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;
  transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;box-shadow:var(--shadow-sm);}
.opt:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--robotics);}
.opt .o-name{font-size:13px;font-weight:700;color:var(--ink-2);line-height:1.35;}
.opt .o-hint{font-family:var(--mono);font-size:10px;color:var(--sub);margin-top:3px;line-height:1.4;}
.opt.correct{background:var(--robotics-soft);border-color:var(--robotics);}
.opt.correct .o-name{color:var(--robotics);}
.opt.miss{background:var(--primary-soft);border-color:var(--primary);}
.opt.miss .o-name{color:var(--primary-ink);}
.opt[disabled]{cursor:default;pointer-events:none;}

.fb-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;
  min-height:60px;padding:11px 14px;background:var(--paper-2);border:1px solid var(--border);border-radius:10px;}
.fb-msg{font-size:12px;color:var(--sub);line-height:1.5;}
.fb-msg b{color:var(--ink);}
.fb-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:9px 20px;cursor:pointer;
  border:1px solid var(--robotics);background:var(--robotics);color:#fff;letter-spacing:1px;flex-shrink:0;border-radius:8px;}
.fb-btn:hover{background:var(--robotics-soft);color:var(--robotics);}
.fb-btn.hidden{display:none;}

/* result overlay anchored to stage */
.result-overlay{display:none;position:absolute;inset:0;background:rgba(250,249,245,.94);
  z-index:50;justify-content:center;align-items:center;backdrop-filter:blur(2px);}
.result-overlay.show{display:flex;}
.result-card{background:var(--card);border:1px solid var(--border-2);border-radius:16px;padding:30px;
  max-width:400px;width:88%;text-align:center;box-shadow:var(--shadow-lg);}
.result-card .badge{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--robotics);
  text-transform:uppercase;margin-bottom:8px;font-weight:700;}
.result-card h2{font-size:21px;color:var(--ink);margin-bottom:12px;}
.result-card .score-big{font-family:var(--mono);font-size:42px;color:var(--robotics);font-weight:700;margin-bottom:10px;}
.result-card p{font-size:13px;line-height:1.65;color:var(--sub);margin-bottom:18px;}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="game-sidebar">
    <div class="brand" id="brandText">TOPOMAP<br>DETECTIVE<small id="brandSub">CSP / NRO-30</small></div>
    <div class="head-emblem">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <!-- top-down head with two hotspots -->
        <circle cx="50" cy="52" r="34" fill="none" stroke="var(--border-2)" stroke-width="2"/>
        <path d="M42 19 Q50 12 58 19" fill="none" stroke="var(--border-2)" stroke-width="2"/>
        <line x1="50" y1="18" x2="50" y2="26" stroke="var(--border-2)" stroke-width="2"/>
        <!-- nasion notch -->
        <path d="M46 20 L50 14 L54 20 Z" fill="var(--paper-2)" stroke="var(--border-2)" stroke-width="1.5"/>
        <!-- C3 / C4 hotspots -->
        <circle cx="36" cy="52" r="9" fill="var(--heat-1)" opacity="0.85"/>
        <circle cx="64" cy="52" r="11" fill="var(--robotics)" opacity="0.9"/>
        <text x="36" y="55" font-family="var(--mono)" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">C3</text>
        <text x="64" y="55" font-family="var(--mono)" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">C4</text>
      </svg>
      <div class="e-name">SCALP MAP</div>
    </div>
    <div class="progress-list">
      <div class="pl-head" id="plHead">PATTERNS</div>
      <div id="plItems"></div>
    </div>
    <div class="guide">
      <div class="g-head" id="guideHead">HOW TO PLAY</div>
      <div id="guideBody"></div>
    </div>
    <div class="spacer"></div>
    <button class="lang-btn" id="langBtn">CN</button>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="game-main">
    <div class="topbar">
      <h1 id="mainTitle">CSP 头皮判读师<small id="mainSub">PATTERN <span id="patIdx"></span></small></h1>
      <div class="hud">
        <div class="hud-item"><div class="hud-label" id="hudLScore"></div><div class="hud-value" id="hudVScore"></div></div>
        <div class="hud-item"><div class="hud-label" id="hudLPat"></div><div class="hud-value" id="hudVPat"></div></div>
      </div>
    </div>

    <div class="stage">
      <div class="topomap-wrap">
        <div class="tm-meta">
          <span id="metaFilter"></span>
          <span id="metaPattern"></span>
          <span class="tm-tag" id="tmTag">CSP W</span>
        </div>
        <canvas id="topomap"></canvas>
        <div class="tm-legend">
          <span class="legend-cap" id="legCool"></span>
          <span class="legend-bar"></span>
          <span class="legend-cap" id="legHot"></span>
        </div>
        <!-- result overlay anchored to topomap area -->
        <div class="result-overlay" id="resultOverlay">
          <div class="result-card">
            <div class="badge" id="resultBadge"></div>
            <h2 id="resultTitle"></h2>
            <div class="score-big" id="resultScore"></div>
            <p id="resultMsg"></p>
            <button class="fb-btn" id="retryBtn"></button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head" id="panelHead"></div>
        <div class="opts" id="opts"></div>
        <div class="fb-bar">
          <span class="fb-msg" id="fbMsg"></span>
          <button class="fb-btn hidden" id="nextBtn"></button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
var LANG='cn';

/* ---------------- i18n ---------------- */
var I18N={
  brandSub:{en:'CSP / NRO-30',cn:'CSP / NRO-30'},
  patterns:{en:'PATTERNS',cn:'判读题'},
  howto:{en:'HOW TO PLAY',cn:'玩法'},
  guideBody:{en:'Read where the topomap is HOT. CSP weight patterns put motor activity at C3/C4. Hot at C4 (right) = LEFT-hand imagery (crossed). Hot off the motor strip = CSP missed. 5 correct unlocks the badge.',
    cn:'看头皮图哪里最“热”。CSP 权重图把运动活动放在 C3/C4。热点在 C4（右脑）= 想象左手（交叉对侧）。热点不在运动带上 = CSP 没找对。连判 5 题解锁徽章。'},
  patWord:{en:'PATTERN',cn:'判读'},
  score:{en:'SCORE',cn:'得分'},
  patHud:{en:'PATTERN',cn:'进度'},
  panelHead:{en:'What does this CSP pattern mean?',cn:'这张 CSP 头皮图意味着什么？'},
  next:{en:'NEXT PATTERN',cn:'下一张'},
  finish:{en:'SEE RESULT',cn:'查看结果'},
  retry:{en:'PLAY AGAIN',cn:'重新开始'},
  filter:{en:'BAND',cn:'频带'},
  patMeta:{en:'CSP COMP',cn:'CSP 成分'},
  legCool:{en:'cool / low',cn:'冷 / 低'},
  legHot:{en:'hot / high',cn:'热 / 高'},
  fbHint:{en:'Find the brightest electrode. Is it on the motor strip (C3 left / C4 right), or somewhere else?',
    cn:'找出最亮的电极。它在运动带上（C3 左 / C4 右）吗，还是别处？'},
  correct:{en:'Correct.',cn:'正确。'},
  wrong:{en:'Not quite.',cn:'判错了。'},
  /* the 5 answer options (shared across all patterns) */
  oLeft:{en:'Left-hand motor imagery',cn:'想象左手运动'},
  oRight:{en:'Right-hand motor imagery',cn:'想象右手运动'},
  oOcc:{en:'Not motor — occipital alpha / eyes',cn:'不是运动 — 枕叶 alpha / 眼动'},
  oBoth:{en:'Both hands / ambiguous',cn:'双手 / 不清晰'},
  oArt:{en:'Artifact — CSP misled by noise',cn:'伪迹 — CSP 被噪声带偏'},
  /* option hints */
  hLeft:{en:'hot at C4 (right)',cn:'C4(右) 热'},
  hRight:{en:'hot at C3 (left)',cn:'C3(左) 热'},
  hOcc:{en:'hot at O1/O2 (back)',cn:'O1/O2(枕) 热'},
  hBoth:{en:'C3 & C4 both hot',cn:'C3 与 C4 都热'},
  hArt:{en:'edges scattered hot',cn:'边缘散乱热'},
  /* per-pattern explanations (why) */
  eLeft:{en:'The hottest weight sits at C4 over the RIGHT sensorimotor cortex. Movement is controlled by the OPPOSITE hemisphere, so right-cortex activity means the person imagined moving the LEFT hand. CSP found the motor source — this filter is good.',
    cn:'最热的权重落在右侧感觉运动皮层上方的 C4。运动由对侧半球控制，所以右脑活动代表想象动的是左手。CSP 找到了运动源——这个滤波器是好的。'},
  eRight:{en:'The peak is at C3 over the LEFT sensorimotor cortex. By the crossed-control rule, left-cortex activity maps to the RIGHT hand. CSP locked onto the correct motor region — clean, usable component.',
    cn:'峰值在左侧感觉运动皮层上方的 C3。按交叉控制规则，左脑活动对应右手。CSP 锁定了正确的运动区——干净、可用的成分。'},
  eOcc:{en:'The heat is at O1/O2 at the BACK of the head — the occipital visual cortex, not the motor strip. This is most likely alpha rhythm from closing the eyes, not movement intent. CSP picked the wrong source; reject or re-train this filter.',
    cn:'热点在头后部的 O1/O2——枕叶视觉皮层，不在运动带上。这多半是闭眼产生的 alpha 节律，不是运动意图。CSP 选错了源；应剔除或重训这个滤波器。'},
  eBoth:{en:'Both C3 AND C4 light up symmetrically. A good CSP pattern is LATERALIZED (one side), because left vs right hand differ by which hemisphere is busy. Symmetric heat carries no left/right information — the component is ambiguous and weak for classification.',
    cn:'C3 与 C4 对称地同时变亮。好的 CSP 模式应是单侧化的（偏一侧），因为左右手的差别就在于哪个半球更活跃。对称的热点不含左右信息——这个成分含混、对分类几乎无用。'},
  eArt:{en:'Hot spots scatter on the OUTER edge electrodes (Fp/T/O rim), not concentrated on a cortical region. CSP maximizes variance difference and will happily lock onto a strong artifact (muscle, motion, bad electrode). This pattern is noise-driven — drop it.',
    cn:'热点散落在最外圈边缘电极（Fp/T/O 边缘），不集中在某个皮层区。CSP 追求方差差异最大，会乐于锁定强伪迹（肌电、运动、坏电极）。这个模式由噪声驱动——必须丢弃。'},
  /* result */
  badge:{en:'NEURO LAB',cn:'神经实验室'},
  rTitleReader:{en:'CSP TOPOMAP READER',cn:'CSP 头皮判读师'},
  rTitleGood:{en:'SHARP EYE',cn:'火眼金睛'},
  rTitleOk:{en:'KEEP TRAINING',cn:'继续训练'},
  rMsgReader:{en:'All 5 correct. You read a CSP topomap like a pro: hot on C3/C4 means CSP found the motor source (and the OPPOSITE hand was imagined); hot anywhere else means CSP chased noise. Badge unlocked: CSP TOPOMAP READER.',
    cn:'5 题全对。你已能像专家一样读 CSP 头皮图：热点落在 C3/C4 = CSP 找到了运动区（且想象的是对侧手）；热在别处 = CSP 追了噪声。解锁徽章：CSP 头皮判读师。'},
  rMsgGood:{en:'Strong run. The key rule: a usable CSP pattern is lateralized and sits on the motor strip (C3/C4). Re-check the ones you missed.',
    cn:'表现不错。核心规则：可用的 CSP 模式是单侧化的、落在运动带（C3/C4）上。回看判错的题。'},
  rMsgOk:{en:'Re-read the rule: locate the hottest electrode first, then ask "is it on the motor strip, and which side?" Right-side hot = left hand (crossed control).',
    cn:'重读规则：先找最热的电极，再问“它在运动带上吗、偏哪侧？”右侧热 = 左手（交叉控制）。'},
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

/* ---------------- options (5, shared) ---------------- */
var OPTS=[
  {id:'oLeft',  hint:'hLeft'},
  {id:'oRight', hint:'hRight'},
  {id:'oOcc',   hint:'hOcc'},
  {id:'oBoth',  hint:'hBoth'},
  {id:'oArt',   hint:'hArt'},
];

/* ---------------- 10-20 electrode layout (x,y in [0,1] head disc) ----------------
   head disc center (0.5,0.5), radius ~0.46. Nasion at top (y small). */
var ELEC=[
  {n:'Fp1',x:0.40,y:0.13},{n:'Fp2',x:0.60,y:0.13},
  {n:'F7', x:0.20,y:0.27},{n:'F3', x:0.37,y:0.30},{n:'Fz',x:0.50,y:0.30},{n:'F4',x:0.63,y:0.30},{n:'F8',x:0.80,y:0.27},
  {n:'T3', x:0.13,y:0.50},{n:'C3', x:0.34,y:0.50},{n:'Cz',x:0.50,y:0.50},{n:'C4',x:0.66,y:0.50},{n:'T4',x:0.87,y:0.50},
  {n:'T5', x:0.20,y:0.73},{n:'P3', x:0.37,y:0.70},{n:'Pz',x:0.50,y:0.70},{n:'P4',x:0.63,y:0.70},{n:'T6',x:0.80,y:0.73},
  {n:'O1', x:0.40,y:0.87},{n:'O2', x:0.60,y:0.87},
];
function elecIdx(name){for(var i=0;i<ELEC.length;i++)if(ELEC[i].n===name)return i;return -1;}

/* ---------------- 5 patterns. weights[name] in [-1,1]; abs => heat intensity ----------------
   answer index maps to OPTS order. */
function mkW(spec){
  var w=[];for(var i=0;i<ELEC.length;i++)w.push(0);
  for(var k in spec){var idx=elecIdx(k);if(idx>=0)w[idx]=spec[k];}
  return w;
}
var PATTERNS=[
  { /* C4 hot -> left hand */
    answer:0, filter:'8-30 Hz', comp:'#1',
    w:mkW({C4:1.0,'F4':0.45,'P4':0.5,'T4':0.3,Cz:0.25,C3:-0.18}),
    explain:'eLeft'
  },
  { /* C3 hot -> right hand */
    answer:1, filter:'8-30 Hz', comp:'#2',
    w:mkW({C3:1.0,'F3':0.45,'P3':0.5,'T3':0.3,Cz:0.25,C4:-0.18}),
    explain:'eRight'
  },
  { /* occipital -> not motor */
    answer:2, filter:'8-13 Hz', comp:'#4',
    w:mkW({O1:0.95,O2:1.0,'P3':0.4,'P4':0.45,Pz:0.5,T5:0.25,T6:0.25}),
    explain:'eOcc'
  },
  { /* bilateral symmetric -> both / ambiguous */
    answer:3, filter:'8-30 Hz', comp:'#3',
    w:mkW({C3:0.9,C4:0.9,Cz:0.6,'F3':0.3,'F4':0.3,'P3':0.3,'P4':0.3}),
    explain:'eBoth'
  },
  { /* edge scatter -> artifact */
    answer:4, filter:'1-45 Hz', comp:'#7',
    w:mkW({Fp1:0.95,Fp2:0.7,'F7':0.85,'F8':0.6,T3:0.8,T4:0.9,O1:0.5,O2:0.55,P3:-0.1,Cz:-0.05}),
    explain:'eArt'
  },
];

/* shuffle pattern order */
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}
var order=shuffle([0,1,2,3,4]);

/* ---------------- state ---------------- */
var cur=0, score=0, answered=false;
var results=[];for(var ri=0;ri<5;ri++)results.push('pending');
var phase=0;

/* ---------------- canvas topomap drawing ---------------- */
var canvas=document.getElementById('topomap');
var ctxc=canvas.getContext('2d');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
function resize(){
  var r=canvas.getBoundingClientRect();
  W=Math.max(300,r.width);H=Math.max(220,r.height);
  canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
  ctxc.setTransform(DPR,0,0,DPR,0,0);
}
function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim();}
var COL={};
function loadColors(){
  COL.h0=cssVar('--heat-0');COL.h1=cssVar('--heat-1');COL.h2=cssVar('--heat-2');
  COL.h3=cssVar('--heat-3');COL.h4=cssVar('--heat-4');COL.h5=cssVar('--heat-5');
  COL.ink=cssVar('--ink');COL.sub=cssVar('--sub');COL.border=cssVar('--border-2');
  COL.paper=cssVar('--paper');COL.card=cssVar('--card');
}
/* parse #rrggbb -> [r,g,b] */
function hex(c){c=c.replace('#','');return [parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)];}
var RAMP=[];
function buildRamp(){RAMP=[hex(COL.h0),hex(COL.h1),hex(COL.h2),hex(COL.h3),hex(COL.h4),hex(COL.h5)];}
function rampColor(t){ /* t in [0,1] */
  if(t<=0)return RAMP[0];if(t>=1)return RAMP[RAMP.length-1];
  var seg=t*(RAMP.length-1);var i=Math.floor(seg);var f=seg-i;
  var a=RAMP[i],b=RAMP[i+1];
  return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];
}

/* interpolate field at point (px,py) using inverse-distance from electrode abs-weights */
function fieldAt(px,py,w,jitter){
  var num=0,den=0;
  for(var i=0;i<ELEC.length;i++){
    var dx=px-ELEC[i].x, dy=py-ELEC[i].y;
    var d2=dx*dx+dy*dy+0.0009;
    var wt=1/(d2*d2);
    var val=Math.abs(w[i]);
    num+=wt*val;den+=wt;
  }
  var v=den>0?num/den:0;
  v+=jitter;
  return v;
}

function draw(){
  if(!W)resize();
  ctxc.clearRect(0,0,W,H);
  ctxc.fillStyle=COL.card;ctxc.fillRect(0,0,W,H);
  var p=PATTERNS[order[cur]];
  var w=p.w;
  // disc geometry
  var cx=W*0.5, cy=H*0.52, R=Math.min(W,H)*0.42;
  // heat field rendered as coarse grid cells clipped to disc
  var cell=Math.max(6,Math.round(R/22));
  var shimmer=Math.sin(phase*1.4)*0.018;
  for(var gy=cy-R;gy<cy+R;gy+=cell){
    for(var gx=cx-R;gx<cx+R;gx+=cell){
      var ddx=(gx+cell/2-cx), ddy=(gy+cell/2-cy);
      var rr=Math.sqrt(ddx*ddx+ddy*ddy);
      if(rr>R)continue;
      var nx=0.5+ddx/(R*2.0), ny=0.5+ddy/(R*2.0);
      var v=fieldAt(nx,ny,w,shimmer);
      // normalize: max abs weight ~1, scale
      var tnorm=Math.max(0,Math.min(1,v*1.05));
      var rgb=rampColor(tnorm);
      // fade near rim for round look
      var edge=rr/R; var alpha=edge>0.92?(1-(edge-0.92)/0.08):1;
      ctxc.fillStyle='rgba('+Math.round(rgb[0])+','+Math.round(rgb[1])+','+Math.round(rgb[2])+','+(0.92*alpha)+')';
      ctxc.fillRect(gx,gy,cell+1,cell+1);
    }
  }
  // head outline
  ctxc.save();
  ctxc.beginPath();ctxc.arc(cx,cy,R,0,Math.PI*2);ctxc.lineWidth=2.5;ctxc.strokeStyle=COL.ink;ctxc.stroke();
  // nose
  ctxc.beginPath();ctxc.moveTo(cx-R*0.12,cy-R+4);ctxc.lineTo(cx,cy-R-R*0.13);ctxc.lineTo(cx+R*0.12,cy-R+4);
  ctxc.lineWidth=2.5;ctxc.strokeStyle=COL.ink;ctxc.stroke();
  // ears
  ctxc.beginPath();ctxc.arc(cx-R,cy,R*0.13,Math.PI*0.5,Math.PI*1.5);ctxc.stroke();
  ctxc.beginPath();ctxc.arc(cx+R,cy,R*0.13,-Math.PI*0.5,Math.PI*0.5);ctxc.stroke();
  ctxc.restore();
  // electrode dots + labels for the motor strip + occipital + frontal (reference markers)
  ctxc.font="9px 'JetBrains Mono',ui-monospace,Menlo,monospace";
  for(var i=0;i<ELEC.length;i++){
    var e=ELEC[i];
    var ex=cx+(e.x-0.5)*R*2.0, ey=cy+(e.y-0.5)*R*2.0;
    ctxc.beginPath();ctxc.arc(ex,ey,2.4,0,Math.PI*2);
    ctxc.fillStyle='rgba(25,24,20,0.55)';ctxc.fill();
    // label key landmarks
    if(/^(C3|C4|Cz|O1|O2)$/.test(e.n)){
      ctxc.fillStyle=COL.ink;ctxc.textAlign='center';
      var lift=(e.n==='O1'||e.n==='O2')?13:-7;
      ctxc.fillText(e.n,ex,ey+lift);
    }
  }
  // L / R hemisphere markers
  ctxc.fillStyle=COL.sub;ctxc.font="bold 11px 'JetBrains Mono',ui-monospace,Menlo,monospace";
  ctxc.textAlign='center';
  ctxc.fillText(LANG==='cn'?'左':'L', cx-R-2, cy+R*0.42);
  ctxc.fillText(LANG==='cn'?'右':'R', cx+R+2, cy+R*0.42);
}

var timer=null;
function startLoop(){
  if(timer)return;
  timer=setInterval(function(){phase+=0.05;draw();},66);
}

/* ---------------- UI build ---------------- */
function buildSidebar(){
  var box=document.getElementById('plItems');box.innerHTML='';
  for(var i=0;i<5;i++){
    var d=document.createElement('div');d.className='pl-item';d.dataset.slot=i;
    var dot=document.createElement('span');dot.className='pl-dot';
    var lbl=document.createElement('span');lbl.textContent='Pattern '+(i+1);
    d.appendChild(dot);d.appendChild(lbl);box.appendChild(d);
  }
  refreshSidebar();
}
function refreshSidebar(){
  var items=document.querySelectorAll('#plItems .pl-item');
  items.forEach(function(el,i){
    el.classList.remove('current','done','wrong');
    if(results[i]==='done')el.classList.add('done');
    else if(results[i]==='wrong')el.classList.add('wrong');
    if(i===cur)el.classList.add('current');
  });
}
function buildOptions(){
  var box=document.getElementById('opts');box.innerHTML='';
  OPTS.forEach(function(op,idx){
    var o=document.createElement('div');o.className='opt';o.dataset.idx=idx;
    var nm=document.createElement('div');nm.className='o-name';nm.textContent=t(op.id);nm.dataset.i18n=op.id;
    var ht=document.createElement('div');ht.className='o-hint';ht.textContent=t(op.hint);ht.dataset.i18n=op.hint;
    o.appendChild(nm);o.appendChild(ht);
    o.addEventListener('click',function(){onPick(parseInt(this.dataset.idx,10));});
    box.appendChild(o);
  });
}

function onPick(idx){
  if(answered)return;answered=true;
  var p=PATTERNS[order[cur]];
  var correct=(idx===p.answer);
  if(correct){score++;results[cur]='done';}else{results[cur]='wrong';}
  var opts=document.querySelectorAll('#opts .opt');
  opts.forEach(function(o){
    var oi=parseInt(o.dataset.idx,10);o.setAttribute('disabled','');
    if(oi===p.answer)o.classList.add('correct');
    if(oi===idx && !correct)o.classList.add('miss');
  });
  document.getElementById('fbMsg').innerHTML='<b>'+(correct?t('correct'):t('wrong'))+'</b> '+t(p.explain);
  var nb=document.getElementById('nextBtn');nb.classList.remove('hidden');
  nb.textContent=(cur>=4)?t('finish'):t('next');
  refreshSidebar();updateHUD();
}
function nextPattern(){
  if(!answered)return;
  if(cur>=4){showResult();return;}
  cur++;answered=false;loadPattern();
}
function loadPattern(){
  var p=PATTERNS[order[cur]];
  document.getElementById('patIdx').textContent=(cur+1)+'/5';
  document.getElementById('metaFilter').innerHTML=t('filter')+': <b>'+p.filter+'</b>';
  document.getElementById('metaPattern').innerHTML=t('patMeta')+': <b>'+p.comp+'</b>';
  document.getElementById('fbMsg').textContent=t('fbHint');
  document.getElementById('nextBtn').classList.add('hidden');
  var opts=document.querySelectorAll('#opts .opt');
  opts.forEach(function(o){o.classList.remove('correct','miss');o.removeAttribute('disabled');});
  refreshSidebar();updateHUD();draw();
}
function updateHUD(){
  document.getElementById('hudLScore').textContent=t('score');
  document.getElementById('hudVScore').textContent=score+'/5';
  document.getElementById('hudLPat').textContent=t('patHud');
  document.getElementById('hudVPat').textContent=(cur+1)+'/5';
}
function showResult(){
  var ov=document.getElementById('resultOverlay');ov.classList.add('show');
  document.getElementById('resultBadge').textContent=t('badge');
  document.getElementById('resultScore').textContent=score+'/5';
  var title,msg;
  if(score===5){title=t('rTitleReader');msg=t('rMsgReader');}
  else if(score>=3){title=t('rTitleGood');msg=t('rMsgGood');}
  else{title=t('rTitleOk');msg=t('rMsgOk');}
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('retryBtn').textContent=t('retry');
}
function retry(){
  document.getElementById('resultOverlay').classList.remove('show');
  order=shuffle([0,1,2,3,4]);
  cur=0;score=0;answered=false;
  results=['pending','pending','pending','pending','pending'];
  loadPattern();
}

/* ---------------- i18n refresh ---------------- */
function refreshI18N(){
  document.getElementById('brandSub').textContent=t('brandSub');
  document.getElementById('plHead').textContent=t('patterns');
  document.getElementById('guideHead').textContent=t('howto');
  document.getElementById('guideBody').textContent=t('guideBody');
  document.getElementById('mainTitle').childNodes[0].nodeValue=(LANG==='cn'?'CSP 头皮判读师':'CSP Topomap Reader');
  document.getElementById('panelHead').textContent=t('panelHead');
  document.getElementById('legCool').textContent=t('legCool');
  document.getElementById('legHot').textContent=t('legHot');
  document.querySelectorAll('#opts [data-i18n]').forEach(function(el){el.textContent=t(el.dataset.i18n);});
  var p=PATTERNS[order[cur]];
  document.getElementById('metaFilter').innerHTML=t('filter')+': <b>'+p.filter+'</b>';
  document.getElementById('metaPattern').innerHTML=t('patMeta')+': <b>'+p.comp+'</b>';
  if(answered){
    var correct=(results[cur]==='done');
    document.getElementById('fbMsg').innerHTML='<b>'+(correct?t('correct'):t('wrong'))+'</b> '+t(p.explain);
    document.getElementById('nextBtn').textContent=(cur>=4)?t('finish'):t('next');
  }else{
    document.getElementById('fbMsg').textContent=t('fbHint');
  }
  var ov=document.getElementById('resultOverlay');
  if(ov.classList.contains('show')){
    document.getElementById('resultBadge').textContent=t('badge');
    var title,msg;
    if(score===5){title=t('rTitleReader');msg=t('rMsgReader');}
    else if(score>=3){title=t('rTitleGood');msg=t('rMsgGood');}
    else{title=t('rTitleOk');msg=t('rMsgOk');}
    document.getElementById('resultTitle').textContent=title;
    document.getElementById('resultMsg').textContent=msg;
    document.getElementById('retryBtn').textContent=t('retry');
  }
  updateHUD();draw();
}

/* ---------------- events ---------------- */
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';this.textContent=LANG.toUpperCase();refreshI18N();
});
document.getElementById('nextBtn').addEventListener('click',nextPattern);
document.getElementById('retryBtn').addEventListener('click',retry);
window.addEventListener('resize',function(){resize();draw();});

/* ---------------- init ---------------- */
loadColors();buildRamp();resize();
buildSidebar();buildOptions();loadPattern();refreshI18N();
draw();startLoop();

})();
</script>
</body>
</html>
