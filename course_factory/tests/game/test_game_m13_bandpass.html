<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Bandpass Tuner</title>
<style>
:root{
  --bg-0: oklch(0.14 0.03 240);
  --bg-1: oklch(0.18 0.035 240);
  --bg-2: oklch(0.22 0.04 240);
  --bg-3: oklch(0.28 0.045 240);
  --line: oklch(0.40 0.05 240 / 0.32);
  --line-strong: oklch(0.58 0.08 240 / 0.55);
  --fg:      oklch(0.96 0.01 240);
  --fg-dim:  oklch(0.78 0.02 240);
  --fg-mute: oklch(0.58 0.03 240);
  /* phys signature accent (theme_style/themes.js id:'phys' Force Observatory) */
  --phys:    oklch(0.78 0.13 215);
  /* phys 5-color palette */
  --p-field:    oklch(0.78 0.13 215);
  --p-wave:     oklch(0.55 0.13 215);
  --p-mass:     oklch(0.35 0.10 215);
  --p-photon:   oklch(0.92 0.08 215);
  --p-constant: oklch(0.85 0.14 85);
  --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
  font-family:system-ui,'Noto Sans SC',sans-serif;}
.shell{display:flex;height:100vh;width:100%;}

/* ---- 200px sidebar ---- */
.game-sidebar{width:200px;flex:0 0 200px;height:100vh;background:var(--bg-1);
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  padding:12px 12px 10px;gap:10px;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:8px;}
.brand svg{width:34px;height:34px;flex:0 0 34px;}
.brand-txt{display:flex;flex-direction:column;}
.brand-name{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--phys);
  letter-spacing:1px;text-transform:uppercase;}
.brand-sub{font-size:10px;color:var(--fg-mute);margin-top:1px;}

.panel-title{font-family:var(--mono);font-size:10px;color:var(--fg-dim);
  letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--line);
  padding-bottom:4px;}

.hud-band{display:flex;flex-direction:column;gap:6px;}
.hud-row{display:flex;justify-content:space-between;align-items:baseline;
  background:var(--bg-2);border:1px solid var(--line);padding:5px 8px;
  box-shadow:3px 3px 0 var(--bg-0);}
.hud-row .k{font-size:10px;color:var(--fg-mute);font-family:var(--mono);
  text-transform:uppercase;letter-spacing:0.5px;}
.hud-row .v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--phys);}
.hud-row .v.lo{color:var(--p-photon);}
.hud-row .v.hi{color:var(--p-field);}
.hud-row .v.gold{color:var(--p-constant);}
.hud-row .v.bad{color:oklch(0.70 0.16 25);}

.legend{display:flex;flex-direction:column;gap:4px;font-size:9.5px;color:var(--fg-mute);
  line-height:1.4;}
.legend .row{display:flex;align-items:center;gap:6px;}
.legend .sw{width:14px;height:3px;flex:0 0 14px;}
.legend .sw.keep{background:var(--p-constant);}
.legend .sw.drop{background:oklch(0.50 0.10 25);}
.legend .sw.resp{background:var(--p-field);}

.task{padding:7px 8px;background:var(--bg-2);border:1px solid var(--line);
  box-shadow:3px 3px 0 var(--bg-0);}
.task.match{border-color:var(--p-constant);}
.task-name{font-size:11px;font-weight:600;color:var(--fg);}
.task-state{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;color:var(--fg-mute);margin-top:3px;display:block;}
.task.match .task-state{color:var(--p-constant);}
.task-hint{font-size:9.5px;color:var(--fg-mute);margin-top:4px;line-height:1.4;}

.btn-reset{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;
  cursor:pointer;border:1px solid var(--line-strong);background:var(--bg-2);
  color:var(--fg-dim);letter-spacing:0.5px;box-shadow:3px 3px 0 var(--bg-0);
  align-self:flex-start;text-transform:uppercase;}
.btn-reset:hover{background:var(--bg-3);}

.lang-btn{margin-top:auto;align-self:flex-start;font-family:var(--mono);font-size:11px;
  font-weight:700;padding:4px 12px;cursor:pointer;border:1px solid var(--line-strong);
  background:var(--bg-2);color:var(--phys);letter-spacing:1px;
  box-shadow:3px 3px 0 var(--bg-0);}
.lang-btn:hover{background:var(--bg-3);}

/* ---- main stage ---- */
.game-main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;
  padding:10px 12px;gap:8px;}
.stage-card{flex:1;min-height:0;display:flex;flex-direction:column;
  background:var(--bg-1);border:1px solid var(--line);}
.stage-head{display:flex;justify-content:space-between;align-items:center;
  padding:5px 10px;border-bottom:1px solid var(--line);}
.stage-title{font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--fg-dim);}
.stage-hint{font-size:10px;color:var(--fg-mute);}
.canvas-wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;}
canvas{flex:1;display:block;width:100%;min-height:0;cursor:ew-resize;}

/* ---- victory ---- */
.victory{position:fixed;inset:0;background:oklch(0.14 0.03 240 / 0.85);
  display:none;align-items:center;justify-content:center;z-index:50;}
.victory.show{display:flex;}
.victory-box{background:var(--bg-2);border:1px solid var(--p-constant);
  box-shadow:6px 6px 0 var(--bg-0);padding:24px 30px;max-width:440px;text-align:center;}
.victory-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--p-constant);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.victory-text{font-size:13px;color:var(--fg-dim);line-height:1.6;margin-bottom:14px;}
.victory-btn{font-family:var(--mono);font-size:12px;font-weight:700;padding:7px 22px;
  cursor:pointer;border:1px solid var(--phys);background:var(--bg-3);color:var(--phys);
  text-transform:uppercase;letter-spacing:1px;box-shadow:3px 3px 0 var(--bg-0);}
</style>
</head>
<body>
<div class="shell">
  <!-- ===== sidebar ===== -->
  <aside class="game-sidebar">
    <div class="brand">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <!-- Echo: tuning-fork shape with waveform halo -->
        <circle cx="20" cy="20" r="18" fill="none" stroke="var(--p-wave)" stroke-width="1" opacity="0.5"/>
        <path d="M14 8 L14 20 Q14 26 20 26 Q26 26 26 20 L26 8" fill="none"
              stroke="var(--phys)" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="20" y1="26" x2="20" y2="34" stroke="var(--phys)" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M5 20 Q8 14 11 20 T17 20" fill="none" stroke="var(--p-photon)" stroke-width="1.4" opacity="0.85"/>
        <path d="M23 20 Q26 26 29 20 T35 20" fill="none" stroke="var(--p-photon)" stroke-width="1.4" opacity="0.85"/>
      </svg>
      <div class="brand-txt">
        <span class="brand-name">ECHO</span>
        <span class="brand-sub" data-i18n="sub">滤波调参</span>
      </div>
    </div>

    <div class="panel-title" data-i18n="passband">通带 PASSBAND</div>
    <div class="hud-band">
      <div class="hud-row">
        <span class="k" data-i18n="lowK">低截止 Low</span>
        <span class="v lo" id="hudLow">2 Hz</span>
      </div>
      <div class="hud-row">
        <span class="k" data-i18n="highK">高截止 High</span>
        <span class="v hi" id="hudHigh">60 Hz</span>
      </div>
      <div class="hud-row">
        <span class="k" data-i18n="widthK">带宽 Width</span>
        <span class="v" id="hudWidth">58 Hz</span>
      </div>
    </div>

    <div class="panel-title" data-i18n="readK">读数 STATUS</div>
    <div class="hud-band">
      <div class="hud-row">
        <span class="k" data-i18n="mu">运动想象 8-30</span>
        <span class="v" id="hudMu">--</span>
      </div>
      <div class="hud-row">
        <span class="k" data-i18n="hum">工频 50Hz</span>
        <span class="v" id="hudHum">--</span>
      </div>
    </div>

    <div class="legend">
      <div class="row"><span class="sw resp"></span><span data-i18n="legResp">滤波器响应</span></div>
      <div class="row"><span class="sw keep"></span><span data-i18n="legKeep">保留的成分</span></div>
      <div class="row"><span class="sw drop"></span><span data-i18n="legDrop">扔掉的成分</span></div>
    </div>

    <div class="panel-title" data-i18n="taskK">任务 TASK</div>
    <div class="task" id="taskCard">
      <span class="task-name" data-i18n="taskName">框出运动想象通带</span>
      <span class="task-state" id="taskState" data-i18n="stTuning">调参中</span>
      <span class="task-hint" data-i18n="taskHint">拖响应图上的两条把手：扔掉 50Hz 工频和慢漂移，保住 8-30Hz。</span>
    </div>

    <button class="btn-reset" id="btnReset" type="button" data-i18n="reset">重置</button>
    <button class="lang-btn" id="langBtn" type="button">EN</button>
  </aside>

  <!-- ===== main stage ===== -->
  <main class="game-main">
    <div class="stage-card">
      <div class="stage-head">
        <span class="stage-title" data-i18n="respTitle">滤波器响应 · 频率域</span>
        <span class="stage-hint" data-i18n="respHint">拖蓝色竖线 = 低/高截止</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="cResp"></canvas>
      </div>
    </div>
    <div class="stage-card">
      <div class="stage-head">
        <span class="stage-title" data-i18n="waveTitle">滤波后波形 · 时间域</span>
        <span class="stage-hint" data-i18n="waveHint">通带变了，干净度就变</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="cWave"></canvas>
      </div>
    </div>
  </main>
</div>

<div class="victory" id="victory">
  <div class="victory-box">
    <div class="victory-title" data-i18n="vTitle">滤波调参师 解锁</div>
    <div class="victory-text" id="vText" data-i18n="vText">你框出了 8-30Hz 通带：工频被压扁、慢漂移被砍掉，运动想象的 mu/beta 节律完整保住。这就是带通滤波的本事。</div>
    <button class="victory-btn" id="vBtn" type="button" data-i18n="vBtn">继续</button>
  </div>
</div>

<script>
"use strict";
// ---------------- i18n ----------------
var I18N = {
  zh:{
    sub:'滤波调参', passband:'通带 PASSBAND', lowK:'低截止 Low', highK:'高截止 High',
    widthK:'带宽 Width', readK:'读数 STATUS', mu:'运动想象 8-30', hum:'工频 50Hz',
    legResp:'滤波器响应', legKeep:'保留的成分', legDrop:'扔掉的成分',
    taskK:'任务 TASK', taskName:'框出运动想象通带', stTuning:'调参中',
    stPass:'达标', stNarrow:'太窄', stWide:'太宽',
    taskHint:'拖响应图上的两条把手：扔掉 50Hz 工频和慢漂移，保住 8-30Hz。',
    reset:'重置', respTitle:'滤波器响应 · 频率域', respHint:'拖蓝色竖线 = 低/高截止',
    waveTitle:'滤波后波形 · 时间域', waveHint:'通带变了，干净度就变',
    vTitle:'滤波调参师 解锁',
    vText:'你框出了 8-30Hz 通带：工频被压扁、慢漂移被砍掉，运动想象的 mu/beta 节律完整保住。这就是带通滤波的本事。',
    vBtn:'继续',
    keep:'保', kill:'砍',
    lowLab:'低截止', highLab:'高截止', passLab:'通带', dropLab:'扔掉',
    humLab:'50Hz 工频', driftLab:'慢漂移', muLab:'mu 10Hz', betaLab:'beta 20Hz',
    rawLab:'含噪原始', filtLab:'滤波后'
  },
  en:{
    sub:'Filter Tuning', passband:'PASSBAND', lowK:'Low cut', highK:'High cut',
    widthK:'Width', readK:'STATUS', mu:'Motor 8-30', hum:'Mains 50Hz',
    legResp:'Filter response', legKeep:'Kept content', legDrop:'Dropped content',
    taskK:'TASK', taskName:'Frame the motor-imagery band', stTuning:'Tuning',
    stPass:'Pass', stNarrow:'Too narrow', stWide:'Too wide',
    taskHint:'Drag the two handles on the response chart: drop 50Hz mains & slow drift, keep 8-30Hz.',
    reset:'Reset', respTitle:'Filter response · frequency', respHint:'Drag blue lines = low/high cut',
    waveTitle:'Filtered wave · time', waveHint:'Move the band, cleanliness changes',
    vTitle:'Filter Tuner Unlocked',
    vText:'You framed the 8-30Hz band: mains crushed, slow drift cut, the mu/beta motor rhythms kept intact. That is what a bandpass does.',
    vBtn:'Continue',
    keep:'keep', kill:'kill',
    lowLab:'Low cut', highLab:'High cut', passLab:'passband', dropLab:'drop',
    humLab:'50Hz mains', driftLab:'slow drift', muLab:'mu 10Hz', betaLab:'beta 20Hz',
    rawLab:'noisy raw', filtLab:'filtered'
  }
};
var lang = 'zh';
function T(){ return I18N[lang]; }
function applyI18n(){
  var t = T();
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k = el.getAttribute('data-i18n');
    if (t[k] != null) el.textContent = t[k];
  });
  document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
}

// ---------------- model ----------------
// frequency axis 0..70 Hz. Spectral peaks present in the noisy signal.
var FMAX = 70;
// peaks: freq, label key, amplitude, isNoise
var PEAKS = [
  {f:0.5, lab:'driftLab', amp:0.95, noise:true},   // slow drift / DC wander
  {f:10,  lab:'muLab',   amp:0.80, noise:false},   // mu rhythm (motor imagery)
  {f:20,  lab:'betaLab', amp:0.62, noise:false},   // beta rhythm (motor imagery)
  {f:50,  lab:'humLab',  amp:1.00, noise:true}     // mains hum
];
// passband state
var stateFilter = { low: 2, high: 60 };
var TARGET = { lowMin:6, lowMax:9, highMin:28, highMax:34 }; // classic 8-30 zone tolerance
var solved = false;

// transfer magnitude of a soft bandpass at frequency f (Butterworth-ish, order 4)
function response(f){
  var lo = stateFilter.low, hi = stateFilter.high;
  if (hi <= lo) return 0;
  var n = 4;
  var hp = 1 / Math.sqrt(1 + Math.pow(lo / Math.max(f, 0.001), 2 * n));
  var lp = 1 / Math.sqrt(1 + Math.pow(f / hi, 2 * n));
  return hp * lp;
}

function evaluate(){
  // is mu+beta (8-30) preserved and noise (drift+hum) killed?
  var muKept   = response(10) > 0.7 && response(20) > 0.7;
  var humKilled = response(50) < 0.15;
  var driftKilled = response(0.5) < 0.15;
  var width = stateFilter.high - stateFilter.low;
  var lowOk = stateFilter.low >= TARGET.lowMin && stateFilter.low <= TARGET.lowMax;
  var highOk = stateFilter.high >= TARGET.highMin && stateFilter.high <= TARGET.highMax;
  var pass = muKept && humKilled && driftKilled && lowOk && highOk;
  // classify failure mode
  var mode;
  if (pass) mode = 'pass';
  else if (!muKept && width < 12) mode = 'narrow';   // squeezed too tight, ate mu/beta
  else if ((!humKilled || !driftKilled) && width > 40) mode = 'wide'; // too wide, kept noise
  else if (!muKept) mode = 'narrow';
  else mode = 'wide';
  return {pass:pass, mode:mode, muKept:muKept, humKilled:humKilled, driftKilled:driftKilled};
}

// ---------------- canvas ----------------
var cResp = document.getElementById('cResp');
var cWave = document.getElementById('cWave');
var rCtx = cResp.getContext('2d');
var wCtx = cWave.getContext('2d');
var DPR = Math.max(1, window.devicePixelRatio || 1);
var respGeom = {x0:0, x1:0, y0:0, y1:0}; // plotting area for hit-test

function fitCanvas(cv, ctx){
  var r = cv.parentElement.getBoundingClientRect();
  var w = Math.max(40, r.width), h = Math.max(40, r.height);
  cv.width = Math.round(w * DPR); cv.height = Math.round(h * DPR);
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  return {w:w, h:h};
}
function cssv(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function fToX(f, x0, x1){ return x0 + (f / FMAX) * (x1 - x0); }
function xToF(x, x0, x1){ return Math.max(0, Math.min(FMAX, (x - x0) / (x1 - x0) * FMAX)); }

function drawResponse(){
  var s = fitCanvas(cResp, rCtx);
  var w = s.w, h = s.h;
  rCtx.clearRect(0,0,w,h);
  var padL = 44, padR = 16, padT = 18, padB = 30;
  var x0 = padL, x1 = w - padR, y0 = h - padB, y1 = padT;
  respGeom = {x0:x0, x1:x1, y0:y0, y1:y1};
  var t = T();

  // grid + axis labels (frequency)
  rCtx.font = '10px ' + cssv('--mono');
  rCtx.textAlign = 'center';
  rCtx.strokeStyle = cssv('--line');
  rCtx.fillStyle = cssv('--fg-mute');
  rCtx.lineWidth = 1;
  [0,10,20,30,40,50,60,70].forEach(function(fq){
    var x = fToX(fq, x0, x1);
    rCtx.beginPath(); rCtx.moveTo(x, y1); rCtx.lineTo(x, y0); rCtx.globalAlpha = 0.4; rCtx.stroke(); rCtx.globalAlpha = 1;
    rCtx.fillText(fq, x, y0 + 14);
  });
  rCtx.fillText('Hz', x1, y0 + 14);

  // shaded passband region
  var xl = fToX(stateFilter.low, x0, x1), xh = fToX(stateFilter.high, x0, x1);
  rCtx.fillStyle = 'oklch(0.78 0.13 215 / 0.10)';
  rCtx.fillRect(xl, y1, xh - xl, y0 - y1);

  // spectral peaks as bars (kept = gold, dropped = red), with attenuation applied
  PEAKS.forEach(function(p){
    var x = fToX(p.f, x0, x1);
    var gain = response(p.f);
    var fullH = (y0 - y1) * p.amp;
    var keptH = fullH * gain;
    // ghost of original amplitude
    rCtx.fillStyle = 'oklch(0.55 0.04 240 / 0.30)';
    rCtx.fillRect(x - 4, y0 - fullH, 8, fullH);
    // remaining after filter
    var kept = gain > 0.5;
    rCtx.fillStyle = kept ? cssv('--p-constant') : 'oklch(0.55 0.13 25)';
    rCtx.fillRect(x - 4, y0 - keptH, 8, keptH);
    // label
    rCtx.fillStyle = kept ? cssv('--p-constant') : 'oklch(0.62 0.13 25)';
    rCtx.font = '9px ' + cssv('--mono');
    rCtx.fillText(t[p.lab], x, y0 - fullH - 5);
  });

  // response curve
  rCtx.beginPath();
  rCtx.strokeStyle = cssv('--p-field');
  rCtx.lineWidth = 2;
  for (var px = x0; px <= x1; px += 2){
    var f = xToF(px, x0, x1);
    var g = response(f);
    var y = y0 - g * (y0 - y1);
    if (px === x0) rCtx.moveTo(px, y); else rCtx.lineTo(px, y);
  }
  rCtx.stroke();

  // draggable cut lines
  function cutLine(f, color, label){
    var x = fToX(f, x0, x1);
    rCtx.strokeStyle = color; rCtx.lineWidth = 2;
    rCtx.setLineDash([5,4]);
    rCtx.beginPath(); rCtx.moveTo(x, y1 - 6); rCtx.lineTo(x, y0); rCtx.stroke();
    rCtx.setLineDash([]);
    // handle grip
    rCtx.fillStyle = color;
    rCtx.fillRect(x - 6, y1 - 12, 12, 10);
    rCtx.fillStyle = cssv('--bg-0');
    rCtx.font = '9px ' + cssv('--mono'); rCtx.textAlign = 'center';
    rCtx.fillText(label, x, y1 - 4);
  }
  cutLine(stateFilter.low,  cssv('--p-photon'), 'L');
  cutLine(stateFilter.high, cssv('--p-field'),  'H');
}

// generate a fixed noisy EEG-ish signal as sum of the peaks
var N = 480;
function sampleSignal(filtered){
  var arr = new Float32Array(N);
  for (var i = 0; i < N; i++){
    var t = i / N * 2; // 2 seconds
    var v = 0;
    PEAKS.forEach(function(p){
      var g = filtered ? response(p.f) : 1;
      v += g * p.amp * Math.sin(2 * Math.PI * p.f * t + p.f);
    });
    arr[i] = v;
  }
  return arr;
}

function drawWave(){
  var s = fitCanvas(cWave, wCtx);
  var w = s.w, h = s.h;
  wCtx.clearRect(0,0,w,h);
  var padL = 44, padR = 16, padT = 16, padB = 16;
  var x0 = padL, x1 = w - padR, mid = (h) / 2;
  var t = T();

  // baseline
  wCtx.strokeStyle = cssv('--line'); wCtx.lineWidth = 1;
  wCtx.beginPath(); wCtx.moveTo(x0, mid); wCtx.lineTo(x1, mid); wCtx.stroke();

  var raw = sampleSignal(false);
  var filt = sampleSignal(true);
  // normalize by raw max for consistent scale
  var maxA = 0;
  for (var i=0;i<N;i++){ if (Math.abs(raw[i])>maxA) maxA = Math.abs(raw[i]); }
  if (maxA < 0.001) maxA = 1;
  var amp = (h/2 - padT);

  function plot(arr, color, alpha, lw){
    wCtx.beginPath(); wCtx.strokeStyle = color; wCtx.globalAlpha = alpha; wCtx.lineWidth = lw;
    for (var i=0;i<N;i++){
      var x = x0 + (i/(N-1))*(x1-x0);
      var y = mid - (arr[i]/maxA)*amp;
      if (i===0) wCtx.moveTo(x,y); else wCtx.lineTo(x,y);
    }
    wCtx.stroke(); wCtx.globalAlpha = 1;
  }
  plot(raw, cssv('--fg-mute'), 0.45, 1);          // noisy raw ghost
  plot(filt, cssv('--p-field'), 1, 2);            // filtered

  // labels
  wCtx.font = '10px ' + cssv('--mono'); wCtx.textAlign = 'left';
  wCtx.fillStyle = cssv('--fg-mute'); wCtx.fillText(t.rawLab, x0, padT - 2);
  wCtx.fillStyle = cssv('--p-field'); wCtx.fillText(t.filtLab, x0 + 90, padT - 2);
}

// ---------------- HUD + state ----------------
function updateHud(){
  document.getElementById('hudLow').textContent  = stateFilter.low.toFixed(1) + ' Hz';
  document.getElementById('hudHigh').textContent = stateFilter.high.toFixed(0) + ' Hz';
  var width = stateFilter.high - stateFilter.low;
  document.getElementById('hudWidth').textContent = width.toFixed(0) + ' Hz';

  var ev = evaluate();
  var t = T();
  var mu = document.getElementById('hudMu');
  var hum = document.getElementById('hudHum');
  mu.textContent  = ev.muKept ? t.keep : t.kill;
  mu.className = 'v ' + (ev.muKept ? 'gold' : 'bad');
  hum.textContent = ev.humKilled ? t.kill : t.keep;
  hum.className = 'v ' + (ev.humKilled ? 'gold' : 'bad');

  var card = document.getElementById('taskCard');
  var st = document.getElementById('taskState');
  card.classList.toggle('match', ev.pass);
  if (ev.pass) st.textContent = t.stPass;
  else if (ev.mode === 'narrow') st.textContent = t.stNarrow;
  else if (ev.mode === 'wide') st.textContent = t.stWide;
  else st.textContent = t.stTuning;

  if (ev.pass && !solved){
    solved = true;
    document.getElementById('victory').classList.add('show');
  }
}

function render(){
  drawResponse();
  drawWave();
  updateHud();
}

// ---------------- drag interaction ----------------
var dragging = null; // 'low' | 'high'
function pickHandle(px){
  var g = respGeom;
  var xl = fToX(stateFilter.low, g.x0, g.x1);
  var xh = fToX(stateFilter.high, g.x0, g.x1);
  if (Math.abs(px - xl) <= Math.abs(px - xh)){
    return (Math.abs(px - xl) < 60) ? 'low' : null;
  }
  return (Math.abs(px - xh) < 60) ? 'high' : null;
}
function canvasX(e){
  var r = cResp.getBoundingClientRect();
  var cx = (e.touches ? e.touches[0].clientX : e.clientX);
  return cx - r.left;
}
function startDrag(e){
  var px = canvasX(e);
  dragging = pickHandle(px);
  if (dragging){ e.preventDefault(); moveDrag(e); }
}
function moveDrag(e){
  if (!dragging) return;
  var g = respGeom;
  var f = xToF(canvasX(e), g.x0, g.x1);
  if (dragging === 'low'){
    stateFilter.low = Math.max(0.5, Math.min(f, stateFilter.high - 2));
  } else {
    stateFilter.high = Math.min(FMAX, Math.max(f, stateFilter.low + 2));
  }
  render();
}
function endDrag(){ dragging = null; }

cResp.addEventListener('mousedown', startDrag);
window.addEventListener('mousemove', moveDrag);
window.addEventListener('mouseup', endDrag);
cResp.addEventListener('touchstart', startDrag, {passive:false});
cResp.addEventListener('touchmove', moveDrag, {passive:false});
cResp.addEventListener('touchend', endDrag);

// ---------------- controls ----------------
function setFilter(lo, hi){
  stateFilter.low = lo; stateFilter.high = hi;
  if (!evaluate().pass) solved = false;
  render();
}
document.getElementById('btnReset').addEventListener('click', function(){
  solved = false;
  document.getElementById('victory').classList.remove('show');
  setFilter(2, 60);
});
document.getElementById('langBtn').addEventListener('click', function(){
  lang = (lang === 'zh') ? 'en' : 'zh';
  this.textContent = (lang === 'zh') ? 'EN' : '中文';
  applyI18n();
  render();
});
document.getElementById('vBtn').addEventListener('click', function(){
  document.getElementById('victory').classList.remove('show');
});

// expose a tiny helper for automated verification (drag is hard for probes)
window.__setBand = setFilter;

window.addEventListener('resize', render);
applyI18n();
render();
</script>
