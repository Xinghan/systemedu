<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<title>Drop Tower Lab</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e14;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
body{margin:0;padding:0;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-lang:hover{border-color:#ffb59c;background:rgba(255,181,156,0.08);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);}
.game-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#50ffb0;}
.game-header .info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#aaabb0;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
canvas{width:100%;height:100%;display:block;}
.control-panel{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;background:rgba(0,0,0,0.4);flex-wrap:wrap;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;border:none;cursor:pointer;color:#0c0e14;background:linear-gradient(135deg,#50ffb0,#17df93);box-shadow:0 0 10px rgba(80,255,176,0.3);transition:transform 0.1s;}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.ctrl-btn.secondary{background:rgba(30,30,45,0.9);color:#aaabb0;box-shadow:none;border:1px solid rgba(170,171,176,0.2);}
.ctrl-btn.secondary:hover{color:#50ffb0;border-color:rgba(80,255,176,0.3);}
.hud-bar{height:44px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaabb0;text-transform:uppercase;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#50ffb0;transition:transform 0.15s;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-guide" id="guideContent"></div>
  </div>
  <div class="game-main">
    <div class="game-header">
      <h1 id="gameTitle"></h1>
      <div class="info" id="roundInfo"></div>
    </div>
    <div class="game-body">
      <canvas id="c"></canvas>
    </div>
    <div class="control-panel" id="controlPanel">
      <button class="ctrl-btn" id="btnAction"></button>
      <button class="ctrl-btn secondary" id="btnReset"></button>
    </div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// K22 Game: Drop Tower Lab -- Free-fall sandbox
// 4 levels:
//   L1 Vacuum Drop: predict which object lands first (always tie)
//   L2 Measure g: drop ball, calculate g = 2h/t^2
//   L3 Velocity Challenge: click when velocity reaches target
//   L4 Planet Gravity: compare fall on Earth/Moon/Mars/Jupiter
// Physics: y = 0.5*g*t^2, v = g*t, t = sqrt(2*h/g)
// ============================================================

// --- I18N ---
var I18N = {
  title:       {en:'DROP TOWER LAB',              cn:'\u81ea\u7531\u843d\u4f53\u5854\u5b9e\u9a8c\u5ba4'},
  guide1:      {en:'Predict which object hits the ground first in a vacuum chamber. In vacuum ALL objects fall at the same rate regardless of mass!', cn:'\u9884\u6d4b\u5728\u771f\u7a7a\u5ba4\u4e2d\u54ea\u4e2a\u7269\u4f53\u5148\u843d\u5730\u3002\u771f\u7a7a\u4e2d\u6240\u6709\u7269\u4f53\u4e0d\u8bba\u8d28\u91cf\u90fd\u4ee5\u76f8\u540c\u901f\u7387\u4e0b\u843d\uff01'},
  guide2:      {en:'Drop a ball from known height. Measure the fall time, then calculate g = 2h/t\u00b2. Each drop should give ~9.8 m/s\u00b2.', cn:'\u4ece\u5df2\u77e5\u9ad8\u5ea6\u91ca\u653e\u5c0f\u7403\u3002\u6d4b\u91cf\u4e0b\u843d\u65f6\u95f4\uff0c\u7136\u540e\u8ba1\u7b97 g = 2h/t\u00b2\u3002\u6bcf\u6b21\u5e94\u5f97 ~9.8 m/s\u00b2\u3002'},
  guide3:      {en:'A ball falls freely. Click at the exact moment the speedometer needle reaches the red target mark. v = g*t!', cn:'\u5c0f\u7403\u81ea\u7531\u4e0b\u843d\u3002\u5728\u901f\u5ea6\u8868\u6307\u9488\u8fbe\u5230\u7ea2\u8272\u76ee\u6807\u7ebf\u7684\u77ac\u95f4\u70b9\u51fb\uff01v = g\u00d7t\uff01'},
  guide4:      {en:'Drop objects on different planets (g varies). Predict fall time from 20m, observe the drop, then rank planets fastest to slowest.', cn:'\u5728\u4e0d\u540c\u661f\u7403\u4e0a\u843d\u4f53\uff08g\u4e0d\u540c\uff09\u3002\u9884\u6d4b 20m \u4e0b\u843d\u65f6\u95f4\uff0c\u89c2\u5bdf\u843d\u4f53\uff0c\u7136\u540e\u6309\u901f\u5ea6\u6392\u5e8f\u3002'},
  level1:      {en:'Level 1: Vacuum Drop',         cn:'\u7b2c1\u5173\uff1a\u771f\u7a7a\u843d\u4f53'},
  level2:      {en:'Level 2: Measure g',            cn:'\u7b2c2\u5173\uff1a\u6d4b\u91cf g'},
  level3:      {en:'Level 3: Velocity Challenge',   cn:'\u7b2c3\u5173\uff1a\u901f\u5ea6\u6311\u6218'},
  level4:      {en:'Level 4: Planet Gravity',       cn:'\u7b2c4\u5173\uff1a\u661f\u7403\u91cd\u529b'},
  levelLbl:    {en:'LEVEL',      cn:'\u5173\u5361'},
  roundLbl:    {en:'ROUND',      cn:'\u56de\u5408'},
  scoreLbl:    {en:'SCORE',      cn:'\u5f97\u5206'},
  heightLbl:   {en:'HEIGHT',     cn:'\u9ad8\u5ea6'},
  timeLbl:     {en:'TIME',       cn:'\u65f6\u95f4'},
  gLbl:        {en:'g VALUE',    cn:'g \u503c'},
  velLbl:      {en:'VELOCITY',   cn:'\u901f\u5ea6'},
  planetLbl:   {en:'PLANET',     cn:'\u661f\u7403'},
  targetLbl:   {en:'TARGET',     cn:'\u76ee\u6807'},
  accuracyLbl: {en:'ACCURACY',   cn:'\u7cbe\u5ea6'},
  drop:        {en:'DROP',       cn:'\u91ca\u653e'},
  next:        {en:'NEXT',       cn:'\u4e0b\u4e00\u8f6e'},
  nextLv:      {en:'NEXT LEVEL', cn:'\u4e0b\u4e00\u5173'},
  reset:       {en:'RESET',      cn:'\u91cd\u7f6e'},
  submit:      {en:'SUBMIT',     cn:'\u63d0\u4ea4'},
  rank:        {en:'RANK',       cn:'\u6392\u5217'},
  clickNow:    {en:'CLICK!',     cn:'\u70b9\u51fb\uff01'},
  leftFirst:   {en:'LEFT FIRST', cn:'\u5de6\u8fb9\u5148'},
  sameTime:    {en:'SAME TIME',  cn:'\u540c\u65f6'},
  rightFirst:  {en:'RIGHT FIRST',cn:'\u53f3\u8fb9\u5148'},
  correct:     {en:'CORRECT!',   cn:'\u6b63\u786e\uff01'},
  wrong:       {en:'WRONG!',     cn:'\u9519\u8bef\uff01'},
  tieMsg:      {en:'In vacuum ALL objects fall at the same rate! Mass does not matter.', cn:'\u771f\u7a7a\u4e2d\u6240\u6709\u7269\u4f53\u4ee5\u76f8\u540c\u901f\u7387\u4e0b\u843d\uff01\u8d28\u91cf\u65e0\u5173\u3002'},
  goodG:       {en:'g \u2248 9.8 m/s\u00b2', cn:'g \u2248 9.8 m/s\u00b2'},
  feather:     {en:'Feather',       cn:'\u7fbd\u6bdb'},
  hammer:      {en:'Hammer',        cn:'\u9524\u5b50'},
  elephant:    {en:'Elephant',      cn:'\u5927\u8c61'},
  mouse:       {en:'Mouse',         cn:'\u8001\u9f20'},
  bowling:     {en:'Bowling ball',  cn:'\u4fdd\u9f84\u7403'},
  tennis:      {en:'Tennis ball',   cn:'\u7f51\u7403'},
  coin:        {en:'Coin',          cn:'\u786c\u5e01'},
  paperBall:   {en:'Paper ball',    cn:'\u7eb8\u56e2'},
  earth:       {en:'Earth',   cn:'\u5730\u7403'},
  moon:        {en:'Moon',    cn:'\u6708\u7403'},
  mars:        {en:'Mars',    cn:'\u706b\u661f'},
  jupiter:     {en:'Jupiter', cn:'\u6728\u661f'},
  vacuum:      {en:'VACUUM CHAMBER', cn:'\u771f\u7a7a\u5ba4'},
  inputG:      {en:'Your g =',      cn:'\u4f60\u7684 g ='},
  inputTime:   {en:'Predicted t =', cn:'\u9884\u6d4b t ='},
  rankTitle:   {en:'Rank: fastest to slowest fall', cn:'\u6392\u5e8f\uff1a\u4e0b\u843d\u6700\u5feb\u2192\u6700\u6162'},
  rankOk:      {en:'Correct! Stronger gravity = faster fall.', cn:'\u6b63\u786e\uff01\u91cd\u529b\u8d8a\u5f3a\u2192\u4e0b\u843d\u8d8a\u5feb\u3002'},
  rankBad:     {en:'Wrong! Stronger g means shorter fall time.', cn:'\u9519\u8bef\uff01g \u8d8a\u5927 \u2192 \u4e0b\u843d\u65f6\u95f4\u8d8a\u77ed\u3002'},
  complete:    {en:'ALL LEVELS COMPLETE!',  cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  summaryT:    {en:'LEARNING SUMMARY',     cn:'\u5b66\u4e60\u603b\u7ed3'},
  summaryTxt:  {en:'Free-fall: y = 0.5gt\u00b2, v = gt. All objects fall identically in vacuum. g \u2248 9.8 m/s\u00b2 on Earth but varies by planet.', cn:'\u81ea\u7531\u843d\u4f53\uff1ay = 0.5gt\u00b2\uff0cv = gt\u3002\u771f\u7a7a\u4e2d\u6240\u6709\u7269\u4f53\u4e0b\u843d\u901f\u7387\u76f8\u540c\u3002\u5730\u7403 g \u2248 9.8\uff0c\u4e0d\u540c\u661f\u7403\u4e0d\u540c\u3002'},
};

var lang = 'cn';
function t(k) { return I18N[k] ? (I18N[k][lang] || I18N[k].en || k) : k; }
var soundMuted = true;

// ============================================================
// DATA
// ============================================================
var G_EARTH = 9.8;
var PAIRS = [
  {left:'feather', right:'hammer',   lR:8,  rR:22, lC:'#eeddcc', rC:'#7788aa'},
  {left:'elephant',right:'mouse',    lR:26, rR:6,  lC:'#999999', rC:'#ccaa88'},
  {left:'bowling', right:'tennis',   lR:18, rR:10, lC:'#334466', rC:'#aaee44'},
  {left:'coin',    right:'paperBall',lR:7,  rR:14, lC:'#ffcc33', rC:'#dddddd'}
];
var L2H = [5, 10, 20, 45];
var L3T = [
  {tMark:1,   tV:9.8},
  {tMark:2,   tV:19.6},
  {tMark:3,   tV:29.4},
  {tMark:1.5, tV:14.7}
];
var PLANETS = [
  {key:'earth',   g:9.8,  col:'#4488ff', bg:['#0a1628','#1a3a5c','#2a5a8c']},
  {key:'moon',    g:1.6,  col:'#bbbbbb', bg:['#111114','#2a2a30','#444448']},
  {key:'mars',    g:3.7,  col:'#ff6644', bg:['#1a0808','#4a1a10','#8a3a20']},
  {key:'jupiter', g:24.8, col:'#ffaa44', bg:['#1a1208','#3a2a10','#6a4a20']}
];
var L4H = 20;

// ============================================================
// STATE
// ============================================================
var cLev = 0, cRnd = 0, score = 0, levSc = [0,0,0,0];
var phase = 'ready'; // ready, dropping, result, ranking, complete

// L1
var l1Choice = -1, l1T = 0, l1Dropping = false, l1Done = false, l1Ok = false;
var l1Dur = 2.0;

// L2
var l2Drop = false, l2T = 0, l2Landed = false, l2MeasT = 0, l2Input = '', l2Active = false;
var l2Sub = false, l2G = 0, l2Hist = [];
var l2InputR = null, l2SubR = null;

// L3
var l3Drop = false, l3T = 0, l3V = 0, l3Clicked = false, l3ClickV = 0, l3Acc = 0;
var l3MaxV = 50;

// L4
var l4PI = 0, l4Drop = false, l4T = 0, l4Landed = false;
var l4Input = '', l4Active = false, l4Sub = false;
var l4ObsT = [], l4Done = [], l4ShakeT = 0, l4ShakeI = 0;
var l4Rank = false, l4RankOrd = [], l4RankSub = false, l4RankOk = false;
var l4InputR = null, l4PBtns = [], l4RBtns = [], l4RSub = null;

// particles
var parts = [];
// canvas
var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var cW = 100, cH = 100, dpr = Math.min(window.devicePixelRatio || 1, 2);
var frame = 0, lastT = 0, dt = 0, idleP = 0;
var compAlpha = 0;

// ============================================================
// CANVAS
// ============================================================
function resizeCanvas() {
  var r = cv.getBoundingClientRect();
  cW = Math.max(r.width, 80);
  cH = Math.max(r.height, 80);
  cv.width = Math.round(cW * dpr);
  cv.height = Math.round(cH * dpr);
  cv.style.width = cW + 'px';
  cv.style.height = cH + 'px';
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ============================================================
// PARTICLES
// ============================================================
function spawnP(px, py, n, col, spread) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = 40 + Math.random() * (spread || 120);
    parts.push({x:px, y:py, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 30, life:0.5+Math.random()*0.6, age:0, r:1.5+Math.random()*2.5, c:col||'#50ffb0'});
  }
}
function updParts(d) {
  for (var i = parts.length - 1; i >= 0; i--) {
    var p = parts[i]; p.age += d;
    if (p.age >= p.life) { parts.splice(i, 1); continue; }
    p.x += p.vx * d; p.y += p.vy * d; p.vy += 120 * d;
  }
}
function drawParts() {
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i], al = 1 - p.age / p.life;
    cx.globalAlpha = al * 0.8; cx.fillStyle = p.c;
    cx.beginPath(); cx.arc(p.x, p.y, p.r * (1 - p.age / p.life * 0.5), 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawBg(cols) {
  var g = cx.createLinearGradient(0, 0, 0, cH);
  var c = cols || ['#0c0e14','#10131c'];
  for (var i = 0; i < c.length; i++) g.addColorStop(i / (c.length - 1), c[i]);
  cx.fillStyle = g; cx.fillRect(0, 0, cW, cH);
}

function drawStars(seed) {
  var rng = seed || 42;
  function nr() { rng = (rng * 1103515245 + 12345) & 0x7fffffff; return (rng % 1000) / 1000; }
  cx.fillStyle = 'rgba(255,255,255,0.4)';
  for (var i = 0; i < 60; i++) {
    var sx = nr() * cW, sy = nr() * cH * 0.5, sr = 0.5 + nr() * 1.2;
    var fl = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(frame * 0.02 + i));
    cx.globalAlpha = fl * 0.5; cx.beginPath(); cx.arc(sx, sy, sr, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;
}

function drawGround(gy, gw, gx) {
  cx.fillStyle = 'rgba(80,255,176,0.15)'; cx.fillRect(gx, gy, gw, 3);
  cx.strokeStyle = 'rgba(80,255,176,0.1)'; cx.lineWidth = 1;
  for (var i = 0; i < gw; i += 12) { cx.beginPath(); cx.moveTo(gx + i, gy + 3); cx.lineTo(gx + i + 6, gy + 10); cx.stroke(); }
}

function drawObj(ox, oy, r, col, lbl) {
  cx.shadowColor = col; cx.shadowBlur = 8; cx.fillStyle = col;
  cx.beginPath(); cx.arc(ox, oy, r, 0, Math.PI * 2); cx.fill(); cx.shadowBlur = 0;
  if (lbl) { cx.font = '10px "Noto Sans SC","Inter",sans-serif'; cx.fillStyle = '#e2e2e9'; cx.textAlign = 'center'; cx.fillText(lbl, ox, oy + r + 14); }
}

function drawChamber(ccx, ccy, cw, ch) {
  cx.strokeStyle = 'rgba(80,255,176,0.2)'; cx.lineWidth = 2;
  cx.strokeRect(ccx - cw / 2, ccy - ch / 2, cw, ch);
  cx.fillStyle = 'rgba(80,255,176,0.03)'; cx.fillRect(ccx - cw / 2, ccy - ch / 2, cw, ch);
  cx.font = '10px "Space Grotesk",sans-serif'; cx.fillStyle = 'rgba(80,255,176,0.4)'; cx.textAlign = 'center';
  cx.fillText(t('vacuum'), ccx, ccy - ch / 2 - 6);
}

function drawMsg(msg, sub, my) {
  var y = my || cH * 0.4;
  cx.font = 'bold 20px "Space Grotesk","Noto Sans SC",sans-serif';
  cx.fillStyle = '#50ffb0'; cx.textAlign = 'center';
  cx.shadowColor = '#50ffb0'; cx.shadowBlur = 12; cx.fillText(msg, cW / 2, y); cx.shadowBlur = 0;
  if (sub) { cx.font = '13px "Noto Sans SC","Inter",sans-serif'; cx.fillStyle = '#aaabb0'; wrapText(sub, cW / 2, y + 28, cW * 0.7); }
}

function wrapText(txt, x, y, maxW) {
  var line = '', ly = y;
  for (var i = 0; i < txt.length; i++) {
    var test = line + txt[i];
    if (cx.measureText(test).width > maxW && line.length > 0) { cx.fillText(line, x, ly); line = txt[i]; ly += 18; }
    else line = test;
  }
  cx.fillText(line, x, ly);
}

function drawSpeedometer(sx, sy, sr, curV, maxV, targV) {
  var startA = Math.PI * 0.75, span = Math.PI * 1.5;
  // outer ring
  cx.strokeStyle = 'rgba(80,255,176,0.2)'; cx.lineWidth = 3;
  cx.beginPath(); cx.arc(sx, sy, sr, startA, startA + span); cx.stroke();
  // filled arc
  var frac = Math.min(curV / maxV, 1);
  cx.strokeStyle = '#50ffb0'; cx.lineWidth = 5;
  cx.beginPath(); cx.arc(sx, sy, sr, startA, startA + frac * span); cx.stroke();
  // target mark
  if (targV > 0) {
    var tf = Math.min(targV / maxV, 1), ta = startA + tf * span;
    cx.strokeStyle = '#ff6644'; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(sx + Math.cos(ta) * (sr - 10), sy + Math.sin(ta) * (sr - 10));
    cx.lineTo(sx + Math.cos(ta) * (sr + 10), sy + Math.sin(ta) * (sr + 10)); cx.stroke();
  }
  // needle
  var na = startA + frac * span;
  cx.strokeStyle = '#ffdd44'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(sx, sy); cx.lineTo(sx + Math.cos(na) * (sr - 8), sy + Math.sin(na) * (sr - 8)); cx.stroke();
  cx.fillStyle = '#ffdd44'; cx.beginPath(); cx.arc(sx, sy, 4, 0, Math.PI * 2); cx.fill();
  // value
  cx.font = 'bold 16px "Space Grotesk",sans-serif'; cx.fillStyle = '#50ffb0'; cx.textAlign = 'center';
  cx.fillText(curV.toFixed(1) + ' m/s', sx, sy + sr + 24);
  // scale ticks
  cx.font = '8px "Space Grotesk",sans-serif'; cx.fillStyle = '#666';
  for (var ti = 0; ti <= 5; ti++) {
    var tv = (maxV / 5) * ti, tfa = startA + (tv / maxV) * span;
    var tx2 = sx + Math.cos(tfa) * (sr + 16), ty2 = sy + Math.sin(tfa) * (sr + 16);
    cx.fillText(tv.toFixed(0), tx2, ty2 + 3);

    const targetW = Math.round(rect.width * dpr);
    const targetH = Math.round(rect.height * dpr);
    // 允许 1 像素误差
    if (Math.abs(canvas.width - targetW) > 1 || Math.abs(canvas.height - targetH) > 1) {
      return true; // 需要修复
    }
    return false;
  };

  // 调用动画内部的 resize 钩子。优先级：
  //   1) window.resize（老式全局挂载）
  //   2) window 上的 'resize' 事件（addEventListener 注册的 local resize）
  // 多数 knode 动画通过 addEventListener('resize', resize) 挂事件监听，
  // 此时 window.resize 是 undefined，唯一能驱动它的方式是 dispatchEvent。
  const callInternalResize = function () {
    try {
      if (typeof window.resize === 'function') {
        window.resize();
        return true;
      }
    } catch (e) {}
    try {
      window.dispatchEvent(new Event('resize'));
      return true;
    } catch (e) {}
    return false;
  };

  const doResize = function () {
    // 让动画的 local resize 读最新 rect 并重写 canvas backing store
    callInternalResize();

    // 校正 backing store：若 canvas.width/height 与 CSS 显示尺寸不一致
    // （典型症状：文字被水平或垂直拉伸），反复触发 local resize 让它
    // 重新计算。浏览器 layout 已稳定时通常一次就能修复。
    try {
      let guard = 0;
      while (enforceSizeConsistency() && guard < 3) {
        guard++;
        // 触发 reflow 让 getBoundingClientRect 读到最新值
        void canvas.offsetHeight;
        callInternalResize();
      }
      // 最终保障：某些动画的 resize 可能读到错值（例如 parentElement 被
      // 缓存，或 CSS !important 锁死尺寸）。此时直接硬写 canvas.width/height
      // 保证宽高比正确；drawCurrent 会把内容重新画到正确的 backing store。
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const tw = Math.round(rect.width * dpr);
      const th = Math.round(rect.height * dpr);
      if (rect.width >= 1 && rect.height >= 1 &&
          (Math.abs(canvas.width - tw) > 1 || Math.abs(canvas.height - th) > 1)) {
        canvas.width = tw;
        canvas.height = th;
        // 同步动画内部坐标系变量（若挂在 window 上）
        try {
          if (typeof window.W !== 'undefined') window.W = rect.width;
          if (typeof window.H !== 'undefined') window.H = rect.height;
        } catch (e) {}
        // 再跑一次 local resize，让它重新 setTransform 并更新自身 W/H
        callInternalResize();
      }
    } catch (e) {}

    redraw();
  };

  const ro = new ResizeObserver(function (entries) {
    const entry = entries[0];
    if (!entry) return;
    const cr = entry.contentRect;
    const w = cr.width, h = cr.height;
    if (w < 1 || h < 1) return;
    if (Math.abs(w - prevW) < 1 && Math.abs(h - prevH) < 1) return;
    prevW = w; prevH = h;

    // 第一次回调也要处理：iframe 内的动画可能把错值写到 canvas backing
    // store（例如 load 时 parent rect 还不稳定），第一次 RO 回调正是
    // layout 已稳定的时机，必须借此纠正。
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(function () {
      rafId = 0;
      doResize();
    });
  });

  try { ro.observe(container); } catch (e) {}

  // iframe 初始化阶段 parent rect 可能不稳定，导致动画原始 resize()
  // 写入错误的 canvas.width/height（尤其在 iframe 外层 div 宽高变化时）。
  // load 后始终跑一次 doResize 做最终校正，不依赖 canvas.width<4 的判断。
  window.addEventListener('load', function () {
    setTimeout(function () { doResize(); }, 50);
  });
})();

</script>
</body>
</html>
