<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.game-header{
  padding:10px 16px 6px;text-align:center;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.game-header h1{
  font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;margin-bottom:2px;
}
.game-header p{
  font-family:'Noto Sans SC',sans-serif;font-size:12px;color:#8a8886;
}
.game-area{
  flex:1;min-height:0;display:flex;gap:0;overflow:hidden;
}
.module-pool{
  width:220px;padding:12px;overflow-y:auto;
  background:rgba(20,20,35,0.6);
  border-right:1px solid rgba(138,136,134,0.15);
}
.module-pool h2{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  color:#8a8886;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;
}
.pipeline-area{
  flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
}
.pipeline-area h2{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  color:#8a8886;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;
}
.module-card{
  padding:10px 14px;cursor:grab;user-select:none;
  background:rgba(28,27,27,0.85);
  border:1px solid rgba(138,136,134,0.2);
  margin-bottom:6px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.module-card:hover{
  border-color:rgba(255,181,156,0.4);
}
.module-card.dragging{
  opacity:0.5;
}
.module-card .card-title{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  color:#e5e2e1;margin-bottom:3px;
}
.module-card .card-desc{
  font-family:'Noto Sans SC',sans-serif;font-size:11px;color:#8a8886;
}
.module-card .card-stage{
  font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:#00daf3;letter-spacing:1px;margin-top:4px;
}
.slot{
  min-height:56px;padding:8px 12px;
  background:rgba(0,218,243,0.03);
  border:2px dashed rgba(0,218,243,0.15);
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.2s,background 0.2s;
}
.slot.drag-over{
  border-color:rgba(0,218,243,0.6);
  background:rgba(0,218,243,0.08);
}
.slot.filled{
  border-style:solid;
  border-color:rgba(16,185,129,0.4);
  background:rgba(16,185,129,0.05);
}
.slot.wrong{
  border-color:rgba(255,95,31,0.6);
  background:rgba(255,95,31,0.05);
}
.slot .slot-label{
  font-family:'Space Grotesk',sans-serif;font-size:11px;
  color:#8a8886;letter-spacing:1px;
}
.slot .slot-num{
  font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:#00daf3;margin-right:8px;font-weight:700;
}
.feedback-panel{
  padding:8px 16px;
  background:rgba(28,27,27,0.92);
  border-top:1px solid rgba(138,136,134,0.15);
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  min-height:40px;display:flex;align-items:center;justify-content:space-between;
}
.feedback-panel .score{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;
}
.feedback-panel button{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:5px 16px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#00daf3;
}
.feedback-panel button:hover{background:#353534;}
.success-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);z-index:200;
  justify-content:center;align-items:center;
}
.success-overlay.show{display:flex;}
.success-box{
  background:rgba(20,20,35,0.95);backdrop-filter:blur(12px);
  border:1px solid rgba(0,218,243,0.3);
  padding:30px 40px;max-width:420px;text-align:center;
}
.success-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
  color:#10b981;margin-bottom:12px;letter-spacing:1px;
}
.success-box p{
  font-family:'Noto Sans SC',sans-serif;font-size:14px;color:#c6c6c6;
  line-height:1.7;margin-bottom:16px;
}
.success-box button{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(0,218,243,0.3);
  background:transparent;color:#00daf3;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <ul id="guideList"></ul>
  </div>
</div>
<div class="wrapper">
  <div class="game-header">
    <h1 id="gameTitle"></h1>
    <p id="gameSubtitle"></p>
  </div>
  <div class="game-area">
    <div class="module-pool" id="modulePool">
      <h2 id="poolTitle"></h2>
    </div>
    <div class="pipeline-area" id="pipelineArea">
      <h2 id="pipeTitle"></h2>
    </div>
  </div>
  <div class="feedback-panel" id="feedback">
    <span id="feedbackText"></span>
    <span class="score" id="scoreDisplay"></span>
    <button id="btnCheck"></button>
    <button id="btnReset"></button>
  </div>
</div>
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <h2 id="successTitle"></h2>
    <p id="successMsg"></p>
    <button id="btnReplay"></button>
  </div>
</div>
<script>
(function(){
"use strict";

var LANG = 'cn';
var I18N = {
  guideTitle:  {en:'GUIDE',cn:'\u89c2\u770b\u6307\u5357'},
  gameTitle:   {en:'ENGINE ASSEMBLY SIMULATOR',cn:'\u5f15\u64ce\u7ec4\u88c5\u6a21\u62df\u5668'},
  gameSubtitle:{en:'Drag modules into the correct pipeline slots to build the risk map + safe path engine',
                cn:'\u5c06\u6a21\u5757\u62d6\u653e\u5230\u6b63\u786e\u7684\u6d41\u6c34\u7ebf\u69fd\u4f4d\uff0c\u7ec4\u88c5\u98ce\u9669\u5730\u56fe + \u5b89\u5168\u8def\u5f84\u5f15\u64ce'},
  poolTitle:   {en:'MODULE POOL',cn:'\u6a21\u5757\u6c60'},
  pipeTitle:   {en:'PIPELINE (drag modules here in order)',cn:'\u6d41\u6c34\u7ebf\uff08\u6309\u987a\u5e8f\u62d6\u5165\u6a21\u5757\uff09'},
  btnCheck:    {en:'CHECK',cn:'\u68c0\u67e5'},
  btnReset:    {en:'RESET',cn:'\u91cd\u7f6e'},
  btnReplay:   {en:'PLAY AGAIN',cn:'\u518d\u6765\u4e00\u6b21'},
  successTitle:{en:'ENGINE ASSEMBLED!',cn:'\u5f15\u64ce\u7ec4\u88c5\u5b8c\u6210\uff01'},
  successMsg:  {en:'You have correctly assembled all 8 modules into a working risk map + safe path engine. The pipeline flows from image input through segmentation, risk encoding, path search, to unified API output.',
                cn:'\u4f60\u5df2\u6b63\u786e\u5730\u5c06\u51688\u4e2a\u6a21\u5757\u7ec4\u88c5\u6210\u4e86\u4e00\u4e2a\u53ef\u8fd0\u884c\u7684\u98ce\u9669\u5730\u56fe + \u5b89\u5168\u8def\u5f84\u5f15\u64ce\u3002\u6d41\u6c34\u7ebf\u4ece\u56fe\u50cf\u8f93\u5165\u5f00\u59cb\uff0c\u7ecf\u8fc7\u5730\u8c8c\u5206\u5272\u3001\u98ce\u9669\u7f16\u7801\u3001\u8def\u5f84\u641c\u7d22\uff0c\u6700\u7ec8\u7edf\u4e00API\u8f93\u51fa\u3002'},
  feedbackCorrect:  {en:'Correct! Module in the right position.',cn:'\u6b63\u786e\uff01\u6a21\u5757\u5728\u6b63\u786e\u4f4d\u7f6e\u3002'},
  feedbackWrong:    {en:'Some modules are in wrong positions. Try again!',cn:'\u90e8\u5206\u6a21\u5757\u4f4d\u7f6e\u4e0d\u5bf9\uff0c\u518d\u8bd5\u8bd5\uff01'},
  feedbackDrag:     {en:'Drag modules from the pool to the pipeline slots',cn:'\u4ece\u6a21\u5757\u6c60\u62d6\u62fd\u6a21\u5757\u5230\u6d41\u6c34\u7ebf\u69fd\u4f4d'},
  scoreLabel:       {en:'SCORE',cn:'\u5f97\u5206'},
  g1: {en:'Drag each module card from the left pool to the correct pipeline slot on the right',
       cn:'\u4ece\u5de6\u4fa7\u6a21\u5757\u6c60\u62d6\u52a8\u6bcf\u4e2a\u6a21\u5757\u5361\u7247\u5230\u53f3\u4fa7\u6b63\u786e\u7684\u6d41\u6c34\u7ebf\u69fd\u4f4d'},
  g2: {en:'The pipeline has 8 slots representing the engine execution order',
       cn:'\u6d41\u6c34\u7ebf\u67098\u4e2a\u69fd\u4f4d\uff0c\u4ee3\u8868\u5f15\u64ce\u6267\u884c\u987a\u5e8f'},
  g3: {en:'Click CHECK to verify your arrangement, then fix any errors',
       cn:'\u70b9\u51fb\u68c0\u67e5\u9a8c\u8bc1\u4f60\u7684\u6392\u5217\uff0c\u7136\u540e\u4fee\u6b63\u9519\u8bef'},
};
function t(key){return(I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}

// Module definitions: correct order for the pipeline
var MODULES = [
  {id:'m_input',   titleEn:'Image Input',       titleCn:'\u56fe\u50cf\u8f93\u5165',     descEn:'Navcam/Hazcam raw image or prediction mask',           descCn:'Navcam/Hazcam\u539f\u59cb\u56fe\u50cf\u6216\u9884\u6d4b\u63a9\u819c',    stage:'S1', color:'#fb923c'},
  {id:'m_segment', titleEn:'Terrain Segmentation',titleCn:'\u5730\u8c8c\u5206\u5272',    descEn:'S3 model classifies terrain: soil, rock, sand, bedrock',descCn:'S3\u6a21\u578b\u5206\u7c7b\u5730\u8c8c\uff1a\u571f\u58e4\u3001\u5ca9\u77f3\u3001\u6c99\u5730\u3001\u57fa\u5ca9', stage:'S3', color:'#818cf8'},
  {id:'m_riskdict',titleEn:'Risk Dictionary',    titleCn:'\u98ce\u9669\u8bcd\u5178',     descEn:'Maps terrain class to risk cost value',                descCn:'\u5c06\u5730\u8c8c\u7c7b\u522b\u6620\u5c04\u4e3a\u98ce\u9669\u4ee3\u4ef7\u503c',  stage:'S1', color:'#f472b6'},
  {id:'m_margin',  titleEn:'Safety Margin',      titleCn:'\u5b89\u5168\u4f59\u91cf',     descEn:'Inflate risk zones + add unknown area penalty',        descCn:'\u81a8\u80c0\u98ce\u9669\u533a\u57df + \u672a\u77e5\u533a\u60e9\u7f5a',  stage:'S4', color:'#f472b6'},
  {id:'m_coord',   titleEn:'Coord Transform',    titleCn:'\u5750\u6807\u53d8\u6362',     descEn:'Pixel coords -> local map coords',                     descCn:'\u50cf\u7d20\u5750\u6807 -> \u5c40\u90e8\u5730\u56fe\u5750\u6807',       stage:'S4', color:'#00daf3'},
  {id:'m_astar',   titleEn:'A* Path Search',     titleCn:'A*\u8def\u5f84\u641c\u7d22',   descEn:'Find optimal path on cost map',                        descCn:'\u5728\u4ee3\u4ef7\u5730\u56fe\u4e0a\u641c\u7d22\u6700\u4f18\u8def\u5f84',stage:'S4', color:'#34d399'},
  {id:'m_replan',  titleEn:'Dynamic Replan',     titleCn:'\u52a8\u6001\u91cd\u89c4\u5212', descEn:'Re-route when new observations arrive',                descCn:'\u65b0\u89c2\u6d4b\u5230\u6765\u65f6\u91cd\u65b0\u89c4\u5212\u8def\u5f84',stage:'S4', color:'#10b981'},
  {id:'m_api',     titleEn:'Unified API',        titleCn:'\u7edf\u4e00\u63a5\u53e3',     descEn:'engine.run(img) -> {risk_map, path, replan_log}',       descCn:'engine.run(img) -> {risk_map, path, replan_log}',     stage:'API',color:'#00daf3'},
];

// Correct order indices (0-7 in the order defined above)
var CORRECT_ORDER = [0,1,2,3,4,5,6,7]; // The MODULES array is already in correct pipeline order

var slotContents = []; // slotContents[i] = module index or -1
var score = 0;
var checked = false;

function shuffleArray(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}

var shuffledIndices = shuffleArray([0,1,2,3,4,5,6,7]);

function renderPool(){
  var pool = document.getElementById('modulePool');
  // Keep h2
  var cards = pool.querySelectorAll('.module-card');
  cards.forEach(function(c){c.remove();});
  shuffledIndices.forEach(function(mi){
    // Check if this module is already placed in a slot
    if(slotContents.indexOf(mi) >= 0) return;
    var m = MODULES[mi];
    var card = document.createElement('div');
    card.className = 'module-card';
    card.setAttribute('data-module-idx', mi);
    card.setAttribute('draggable', 'true');
    card.innerHTML = '<div class="card-title">'+(LANG==='cn'?m.titleCn:m.titleEn)+'</div>'
      +'<div class="card-desc">'+(LANG==='cn'?m.descCn:m.descEn)+'</div>'
      +'<div class="card-stage" style="color:'+m.color+'">'+m.stage+'</div>';
    card.style.borderLeftColor = m.color;
    card.style.borderLeftWidth = '3px';

    // Drag events
    card.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/plain', String(mi));
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', function(){
      card.classList.remove('dragging');
    });

    // Touch events
    card.addEventListener('touchstart', handleTouchStart, {passive:false});

    pool.appendChild(card);
  });
}

function renderSlots(){
  var pipe = document.getElementById('pipelineArea');
  var slots = pipe.querySelectorAll('.slot');
  slots.forEach(function(s){s.remove();});
  for(var i=0;i<8;i++){
    var slot = document.createElement('div');
    slot.className = 'slot';
    slot.setAttribute('data-slot-idx', i);
    if(slotContents[i] >= 0){
      var m = MODULES[slotContents[i]];
      slot.classList.add('filled');
      slot.innerHTML = '<span class="slot-num">#'+(i+1)+'</span>'
        +'<div class="module-card" data-module-idx="'+slotContents[i]+'" draggable="true" style="margin:0;border-left:3px solid '+m.color+'">'
        +'<div class="card-title">'+(LANG==='cn'?m.titleCn:m.titleEn)+'</div>'
        +'<div class="card-desc" style="font-size:10px">'+(LANG==='cn'?m.descCn:m.descEn)+'</div>'
        +'</div>';
      // Allow dragging out of slot
      var innerCard = slot.querySelector('.module-card');
      innerCard.addEventListener('dragstart', function(e){
        var idx = parseInt(this.getAttribute('data-module-idx'));
        e.dataTransfer.setData('text/plain', String(idx));
        this.classList.add('dragging');
        // Remove from slot
        var si = parseInt(this.parentElement.getAttribute('data-slot-idx'));
        slotContents[si] = -1;
        setTimeout(function(){renderAll();},0);
      });
      innerCard.addEventListener('touchstart', handleTouchStart, {passive:false});
    } else {
      slot.innerHTML = '<span class="slot-num">#'+(i+1)+'</span><span class="slot-label">'
        +(LANG==='cn'?'\u62d6\u5165\u6a21\u5757':'Drop module here')+'</span>';
    }

    // Drop events
    slot.addEventListener('dragover', function(e){
      e.preventDefault();
      this.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', function(){
      this.classList.remove('drag-over');
    });
    slot.addEventListener('drop', function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      var mi = parseInt(e.dataTransfer.getData('text/plain'));
      var si = parseInt(this.getAttribute('data-slot-idx'));
      handleDrop(mi, si);
    });

    pipe.appendChild(slot);
  }
}

function handleDrop(moduleIdx, slotIdx){
  // If slot already has a module, swap back to pool
  if(slotContents[slotIdx] >= 0){
    // Move existing module back
  }
  // Remove module from any other slot
  for(var i=0;i<slotContents.length;i++){
    if(slotContents[i] === moduleIdx) slotContents[i] = -1;
  }
  slotContents[slotIdx] = moduleIdx;
  checked = false;
  renderAll();
}

// Touch drag support
var touchDragModule = -1;
var ghostEl = null;

function handleTouchStart(e){
  e.preventDefault();
  var card = e.currentTarget;
  touchDragModule = parseInt(card.getAttribute('data-module-idx'));
  // If from slot, remove it
  var parentSlot = card.closest('.slot');
  if(parentSlot){
    var si = parseInt(parentSlot.getAttribute('data-slot-idx'));
    slotContents[si] = -1;
    renderAll();
  }
  // Create ghost
  ghostEl = card.cloneNode(true);
  ghostEl.style.position = 'fixed';
  ghostEl.style.zIndex = '300';
  ghostEl.style.width = '180px';
  ghostEl.style.opacity = '0.85';
  ghostEl.style.pointerEvents = 'none';
  document.body.appendChild(ghostEl);
  var touch = e.touches[0];
  ghostEl.style.left = (touch.clientX-90)+'px';
  ghostEl.style.top = (touch.clientY-30)+'px';

  document.addEventListener('touchmove', handleTouchMove, {passive:false});
  document.addEventListener('touchend', handleTouchEnd);
}

function handleTouchMove(e){
  e.preventDefault();
  if(!ghostEl) return;
  var touch = e.touches[0];
  ghostEl.style.left = (touch.clientX-90)+'px';
  ghostEl.style.top = (touch.clientY-30)+'px';

  // Highlight slots under touch
  var slots = document.querySelectorAll('.slot');
  slots.forEach(function(s){
    var r = s.getBoundingClientRect();
    if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
      s.classList.add('drag-over');
    } else {
      s.classList.remove('drag-over');
    }
  });
}

function handleTouchEnd(e){
  document.removeEventListener('touchmove', handleTouchMove);
  document.removeEventListener('touchend', handleTouchEnd);
  if(ghostEl){
    document.body.removeChild(ghostEl);
    ghostEl = null;
  }
  if(touchDragModule < 0) return;
  // Find slot under last touch position
  var touch = e.changedTouches[0];
  var slots = document.querySelectorAll('.slot');
  var dropped = false;
  slots.forEach(function(s){
    s.classList.remove('drag-over');
    var r = s.getBoundingClientRect();
    if(!dropped && touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
      var si = parseInt(s.getAttribute('data-slot-idx'));
      handleDrop(touchDragModule, si);
      dropped = true;
    }
  });
  if(!dropped){
    // Return to pool
    renderAll();
  }
  touchDragModule = -1;
}

function checkOrder(){
  checked = true;
  var correct = 0;
  var slots = document.querySelectorAll('.slot');
  for(var i=0;i<8;i++){
    if(slotContents[i] === CORRECT_ORDER[i]){
      correct++;
      if(slots[i]) slots[i].classList.remove('wrong');
    } else {
      if(slots[i] && slotContents[i] >= 0) slots[i].classList.add('wrong');
    }
  }
  score = correct;
  updateFeedback();
  if(correct === 8){
    showSuccess();
  }
}

function resetGame(){
  slotContents = [-1,-1,-1,-1,-1,-1,-1,-1];
  shuffledIndices = shuffleArray([0,1,2,3,4,5,6,7]);
  score = 0;
  checked = false;
  document.getElementById('successOverlay').classList.remove('show');
  renderAll();
}

function showSuccess(){
  document.getElementById('successOverlay').classList.add('show');
}

function updateFeedback(){
  var fb = document.getElementById('feedbackText');
  var sc = document.getElementById('scoreDisplay');
  if(checked){
    fb.textContent = score===8 ? t('feedbackCorrect') : t('feedbackWrong');
    fb.style.color = score===8 ? '#10b981' : '#ff5f1f';
  } else {
    fb.textContent = t('feedbackDrag');
    fb.style.color = '#8a8886';
  }
  sc.textContent = t('scoreLabel') + ': ' + score + '/8';
}

function renderAll(){
  document.getElementById('gameTitle').textContent = t('gameTitle');
  document.getElementById('gameSubtitle').textContent = t('gameSubtitle');
  document.getElementById('poolTitle').textContent = t('poolTitle');
  document.getElementById('pipeTitle').textContent = t('pipeTitle');
  document.getElementById('btnCheck').textContent = t('btnCheck');
  document.getElementById('btnReset').textContent = t('btnReset');
  document.getElementById('successTitle').textContent = t('successTitle');
  document.getElementById('successMsg').textContent = t('successMsg');
  document.getElementById('btnReplay').textContent = t('btnReplay');
  var list = document.getElementById('guideList');
  if(list) list.innerHTML = '<li>'+t('g1')+'</li><li>'+t('g2')+'</li><li>'+t('g3')+'</li>';
  document.getElementById('guideTitle').textContent = t('guideTitle');
  renderPool();
  renderSlots();
  updateFeedback();
}

function refreshI18N(){
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  renderAll();
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  refreshI18N();
});

document.getElementById('btnCheck').addEventListener('click', checkOrder);
document.getElementById('btnReset').addEventListener('click', resetGame);
document.getElementById('btnReplay').addEventListener('click', resetGame);

/* ── guide panel toggle ── */
(function(){
  var tog=document.getElementById('guideToggle');
  var gc=document.getElementById('guideContent');
  if(tog&&gc){
    document.getElementById('guideHeader').addEventListener('click',function(){
      var collapsed=gc.classList.toggle('collapsed');
      tog.textContent=collapsed?'[+]':'[-]';
    });
  }
})();

// Init
slotContents = [-1,-1,-1,-1,-1,-1,-1,-1];
renderAll();

})();
</script>
</body>
</html>
