<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alpha Experiment Designer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:oklch(0.18 0.03 245);
  --bg-1:oklch(0.23 0.035 245);
  --axis:oklch(0.72 0.17 245);
  --proof:oklch(0.52 0.16 245);
  --shadow:oklch(0.35 0.10 245);
  --solution:oklch(0.92 0.08 240);
  --qed:oklch(0.85 0.14 85);
  --ink:oklch(0.93 0.02 245);
  --muted:oklch(0.66 0.03 245);
  --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
  --disp:'Space Grotesk',var(--mono);
  --cn:'Noto Sans SC','PingFang SC',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);
  font-family:var(--cn);color:var(--ink)}

.wrap{display:flex;height:100vh;overflow:hidden}

/* ---- sidebar ---- */
.game-sidebar{flex:0 0 200px;display:flex;flex-direction:column;
  background:var(--bg-1);border-right:1px solid color-mix(in oklch,var(--axis) 22%,transparent);
  padding:14px 12px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tetra{width:30px;height:30px;flex:0 0 30px}
.brand .nm{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.06em;
  color:var(--axis);text-transform:uppercase;line-height:1.15}
.brand .nm small{display:block;font-size:9px;color:var(--muted);letter-spacing:.12em}

.sec{font-family:var(--disp);font-size:9.5px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);margin:12px 0 6px}
.ctrl{margin-bottom:9px}
.ctrl-label{display:flex;justify-content:space-between;align-items:baseline;
  font-size:11px;color:var(--ink);margin-bottom:3px}
.ctrl-label .val{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--axis)}
.opts{display:flex;gap:4px}
.opt{flex:1;text-align:center;padding:5px 2px;cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:500;
  border:1px solid color-mix(in oklch,var(--axis) 26%,transparent);
  background:transparent;color:var(--muted);transition:.12s;user-select:none}
.opt:hover{border-color:var(--axis);color:var(--ink)}
.opt.on{background:color-mix(in oklch,var(--axis) 22%,transparent);
  border-color:var(--axis);color:var(--solution);
  box-shadow:3px 3px 0 var(--bg-0)}

.run-btn{margin-top:14px;width:100%;padding:11px 0;cursor:pointer;
  font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--bg-0);background:var(--axis);
  border:none;transition:.12s}
.run-btn:hover{background:var(--solution)}
.run-btn:disabled{opacity:.45;cursor:wait}

.budget{margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--muted);
  line-height:1.5;border-top:1px solid color-mix(in oklch,var(--axis) 14%,transparent);
  padding-top:8px}
.budget b{color:var(--qed)}

.spacer{flex:1}
.lang-btn{margin-top:10px;align-self:flex-start;cursor:pointer;
  font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.14em;
  padding:4px 12px;color:var(--axis);background:transparent;
  border:1px solid color-mix(in oklch,var(--axis) 35%,transparent)}
.lang-btn:hover{background:color-mix(in oklch,var(--axis) 18%,transparent)}

/* ---- main ---- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:42px;min-height:42px;display:flex;align-items:center;
  padding:0 18px;gap:14px;border-bottom:1px solid color-mix(in oklch,var(--axis) 14%,transparent)}
.topbar h1{font-family:var(--disp);font-size:14px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--solution)}
.topbar .q{font-size:11px;color:var(--muted)}

.stage{flex:1;min-height:0;display:flex;flex-direction:column;padding:14px 18px;gap:12px;overflow:hidden}

.canvas-host{flex:1;min-height:0;display:flex;flex-direction:column;
  background:var(--bg-1);border:1px solid color-mix(in oklch,var(--axis) 16%,transparent);position:relative}
canvas{width:100%;height:100%;display:block}
.canvas-overlay{position:absolute;top:8px;left:12px;font-family:var(--disp);
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);pointer-events:none}

/* results */
.results{display:flex;gap:12px;min-height:120px}
.res-card{flex:1;background:var(--bg-1);
  border:1px solid color-mix(in oklch,var(--axis) 16%,transparent);padding:10px 12px;
  display:flex;flex-direction:column;gap:5px}
.res-card .lbl{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted)}
.res-card .big{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
.res-card .ci{font-family:var(--mono);font-size:11px;color:var(--muted)}
.res-card.open .big{color:var(--qed)}
.res-card.closed .big{color:var(--axis)}
.res-card.verdict{flex:1.3}
.verdict .vmsg{font-size:12px;line-height:1.55;color:var(--ink)}
.verdict .tag{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;
  padding:2px 8px;margin-bottom:4px;width:max-content}
.tag.good{color:var(--bg-0);background:var(--qed)}
.tag.bad{color:var(--solution);background:var(--proof)}
.tag.idle{color:var(--muted);border:1px solid color-mix(in oklch,var(--axis) 26%,transparent)}

/* unlock overlay */
.overlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;
  background:color-mix(in oklch,var(--bg-0) 78%,transparent);backdrop-filter:blur(6px)}
.overlay.show{display:flex}
.ovpanel{width:440px;max-width:90%;background:var(--bg-1);
  border:1px solid var(--qed);padding:26px;box-shadow:6px 6px 0 var(--bg-0)}
.ovpanel h2{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--qed);margin-bottom:6px}
.ovpanel .sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:.08em}
.ovpanel p{font-size:12.5px;line-height:1.7;color:var(--ink);margin-bottom:9px}
.ovpanel .close{margin-top:6px;padding:8px 22px;cursor:pointer;
  font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--bg-0);background:var(--qed);border:none}
</style>
</head>
<body>
<div class="wrap">
  <!-- ===== sidebar ===== -->
  <aside class="game-sidebar">
    <div class="brand">
      <svg class="tetra" id="tetra" viewBox="0 0 40 40" aria-hidden="true">
        <polygon points="20,4 36,30 4,30" fill="none" stroke="var(--axis)" stroke-width="2"/>
        <line x1="20" y1="4" x2="20" y2="30" stroke="var(--proof)" stroke-width="1.4"/>
        <line x1="4" y1="30" x2="20" y2="22" stroke="var(--proof)" stroke-width="1.4"/>
        <line x1="36" y1="30" x2="20" y2="22" stroke="var(--proof)" stroke-width="1.4"/>
      </svg>
      <div class="nm">Pi<small id="brandSub">DESIGNER</small></div>
    </div>

    <div class="sec" id="secProtocol">PROTOCOL</div>

    <div class="ctrl">
      <div class="ctrl-label"><span id="lblDur">Record / state</span><span class="val" id="valDur">8s</span></div>
      <div class="opts" data-group="dur">
        <button class="opt" data-v="2" type="button">2s</button>
        <button class="opt" data-v="8" type="button">8s</button>
        <button class="opt" data-v="20" type="button">20s</button>
      </div>
    </div>

    <div class="ctrl">
      <div class="ctrl-label"><span id="lblAvg">Avg samples</span><span class="val" id="valAvg">40</span></div>
      <div class="opts" data-group="avg">
        <button class="opt" data-v="3" type="button">3</button>
        <button class="opt" data-v="40" type="button">40</button>
        <button class="opt" data-v="120" type="button">120</button>
      </div>
    </div>

    <div class="ctrl">
      <div class="ctrl-label"><span id="lblReps">Repeats</span><span class="val" id="valReps">5</span></div>
      <div class="opts" data-group="reps">
        <button class="opt" data-v="1" type="button">1</button>
        <button class="opt" data-v="5" type="button">5</button>
        <button class="opt" data-v="12" type="button">12</button>
      </div>
    </div>

    <div class="ctrl">
      <div class="ctrl-label"><span id="lblOrder">Order</span><span class="val" id="valOrder">ALT</span></div>
      <div class="opts" data-group="order">
        <button class="opt" data-v="block" type="button" id="optBlock">BLOCK</button>
        <button class="opt" data-v="alt" type="button" id="optAlt">ALT</button>
      </div>
    </div>

    <button class="run-btn" id="runBtn" type="button">RUN EXPERIMENT</button>

    <div class="budget" id="budgetBox">
      <span id="budgetLine">N per state: <b>0</b></span>
    </div>

    <div class="spacer"></div>
    <button class="lang-btn" id="langBtn" type="button">EN</button>
  </aside>

  <!-- ===== main ===== -->
  <main class="game-main">
    <div class="topbar">
      <h1 id="title">ALPHA EXPERIMENT DESIGNER</h1>
      <span class="q" id="coreQ">Q: Is eyes-closed alpha truly higher than eyes-open?</span>
    </div>

    <div class="stage">
      <div class="canvas-host">
        <span class="canvas-overlay" id="canvasLabel">DESIGN PREVIEW</span>
        <canvas id="cv"></canvas>
      </div>

      <div class="results">
        <div class="res-card open">
          <div class="lbl" id="lblOpen">Eyes-open mean</div>
          <div class="big" id="meanOpen">--</div>
          <div class="ci" id="ciOpen">95% CI --</div>
        </div>
        <div class="res-card closed">
          <div class="lbl" id="lblClosed">Eyes-closed mean</div>
          <div class="big" id="meanClosed">--</div>
          <div class="ci" id="ciClosed">95% CI --</div>
        </div>
        <div class="res-card verdict">
          <span class="tag idle" id="verdictTag">NO DATA</span>
          <div class="vmsg" id="verdictMsg"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- unlock -->
<div class="overlay" id="overlay">
  <div class="ovpanel">
    <h2 id="ovTitle">EXPERIMENT DESIGNER</h2>
    <div class="sub" id="ovSub">BADGE UNLOCKED</div>
    <p id="ovP1"></p>
    <p id="ovP2"></p>
    <button class="close" id="ovClose" type="button">CONTINUE</button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ---------------- i18n ---------------- */
var LANG='en';
var I18N={
  brandSub:{en:'DESIGNER',cn:'设计师'},
  secProtocol:{en:'PROTOCOL',cn:'实验方案'},
  lblDur:{en:'Record / state',cn:'每状态录制'},
  lblAvg:{en:'Avg samples',cn:'平均取样点'},
  lblReps:{en:'Repeats',cn:'重复轮数'},
  lblOrder:{en:'Order',cn:'睁闭眼顺序'},
  run:{en:'RUN EXPERIMENT',cn:'跑实验'},
  running:{en:'RECORDING...',cn:'录制中...'},
  title:{en:'ALPHA EXPERIMENT DESIGNER',cn:'Alpha 对比实验设计台'},
  coreQ:{en:'Q: Is eyes-closed alpha truly higher than eyes-open?',cn:'问题: 闭眼 alpha 真的比睁眼更强吗?'},
  canvasLabel:{en:'DESIGN PREVIEW',cn:'设计预览'},
  canvasRunning:{en:'RECORDING SESSIONS',cn:'录制会话中'},
  canvasResult:{en:'SAMPLED ALPHA POWER',cn:'采样 alpha 强度'},
  lblOpen:{en:'Eyes-open mean',cn:'睁眼均值'},
  lblClosed:{en:'Eyes-closed mean',cn:'闭眼均值'},
  ci:{en:'95% CI',cn:'95% 置信区间'},
  budget:{en:'N per state:',cn:'每状态总样本:'},
  ALT:{en:'ALT',cn:'交替'},
  BLOCK:{en:'BLOCK',cn:'分块'},
  tagIdle:{en:'NO DATA',cn:'无数据'},
  tagGood:{en:'RELIABLE',cn:'结论可信'},
  tagBad:{en:'UNRELIABLE',cn:'结论不可信'},
  vIdle:{en:'Configure the protocol on the left, then run. Watch whether the two means separate cleanly.',
         cn:'在左侧配置实验方案后点跑实验。观察两个均值能否被干净地区分开。'},
  vFew:{en:'Means jumped around between runs: with only a few samples per average, noise dominates. The confidence bands overlap, so you cannot trust the difference.',
        cn:'多轮之间均值乱跳: 每次平均只取少数几个点, 噪声盖过信号。置信区间重叠, 无法相信这个差异。'},
  vNoRep:{en:'A single run is one lucky (or unlucky) draw. Without repeats you have no idea how much the result wobbles.',
          cn:'只跑一轮是一次偶然抽样。没有重复, 你完全不知道结果会抖动多少。'},
  vOrder:{en:'BLOCK order (all eyes-open, then all eyes-closed) lets drift and fatigue bias one state. The gap is contaminated by order, not just brain state.',
          cn:'分块顺序(先全睁眼再全闭眼)让漂移和疲劳偏向某个状态。这个差距被顺序污染了, 不只是脑状态。'},
  vGood:{en:'Clean separation: closed-eye alpha sits well above open-eye, and the confidence bands do not overlap. Enough samples, repeated runs, and a balanced order make this difference trustworthy.',
         cn:'干净区分: 闭眼 alpha 明显高于睁眼, 且置信区间不重叠。足够的样本、重复的轮数、平衡的顺序, 让这个差异值得相信。'},
  ovTitle:{en:'EXPERIMENT DESIGNER',cn:'实验设计师'},
  ovSub:{en:'BADGE UNLOCKED',cn:'徽章解锁'},
  ovP1:{en:'You proved eyes-closed alpha is reliably higher. A good comparison needs enough samples per average, repeated runs to measure wobble, and a balanced (alternating) order so neither state gets an unfair advantage.',
        cn:'你证明了闭眼 alpha 确实更高。一个好的对比需要每次平均有足够样本、重复多轮以衡量抖动、平衡(交替)的顺序使任一状态都不占便宜。'},
  ovP2:{en:'Now the difference you report is not a fluke — it is design.',
        cn:'现在你报告的差异不是侥幸 —— 它是设计出来的。'},
  ovClose:{en:'CONTINUE',cn:'继续'}
};
function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

/* ---------------- state ---------------- */
var design={dur:8,avg:40,reps:5,order:'alt'};
var lastResult=null;
var unlocked=false;
var rafId=0, phase='idle', phaseT=0; // idle | design | running | result

/* ---------------- ground-truth model ----------------
   闭眼 alpha 真实均值显著高于睁眼; 单点取样含高噪声。
   样本均值标准误 ~ NOISE_SD / sqrt(N), N = avg * reps。
------------------------------------------------------- */
var TRUE_OPEN=2.6, TRUE_CLOSED=6.4, NOISE_SD=3.1;

function gauss(){ // Box-Muller
  var u=0,v=0;
  while(u===0)u=Math.random();
  while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function sampleMean(trueMu,n){
  var s=0;
  for(var i=0;i<n;i++) s+=trueMu+gauss()*NOISE_SD;
  return s/n;
}
function avg(a){var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length;}

/* one full experiment: means + CIs + reliability */
function runExperiment(d){
  var nPer=d.avg*d.reps;
  var repMeansO=[], repMeansC=[];
  for(var r=0;r<d.reps;r++){
    repMeansO.push(sampleMean(TRUE_OPEN,d.avg));
    repMeansC.push(sampleMean(TRUE_CLOSED,d.avg));
  }
  // BLOCK order injects a slow drift bias on the later block.
  var driftBias=0;
  if(d.order==='block'){
    driftBias=1.8;
    for(var k=0;k<repMeansC.length;k++) repMeansC[k]+=driftBias*((k+1)/repMeansC.length);
  }
  var mO=avg(repMeansO), mC=avg(repMeansC);
  var seO=NOISE_SD/Math.sqrt(Math.max(1,nPer));
  var seC=NOISE_SD/Math.sqrt(Math.max(1,nPer));
  var repPenalty = d.reps<=1 ? 2.4 : (d.reps<5 ? 1.4 : 1.0);
  var ciO=1.96*seO*repPenalty, ciC=1.96*seC*repPenalty;
  var separated = (mC-ciC) > (mO+ciO);
  var reliable=separated, reason='good';
  if(d.avg<=3){ reliable=false; reason='few'; }
  else if(d.reps<=1){ reliable=false; reason='norep'; }
  else if(d.order==='block'){ reliable=false; reason='order'; }
  else if(!separated){ reliable=false; reason='few'; }
  return {meanOpen:mO,meanClosed:mC,ciOpen:ciO,ciClosed:ciC,
    nPer:nPer,reliable:reliable,reason:reason,
    repMeansO:repMeansO,repMeansC:repMeansC};
}

/* ---------------- canvas ---------------- */
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function fit(){
  var host=cv.parentElement.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  cv.width=Math.max(40,Math.floor(host.width*dpr));
  cv.height=Math.max(40,Math.floor(host.height*dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',function(){fit();draw();});
function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function draw(){
  var w=cv.clientWidth||cv.width, h=cv.clientHeight||cv.height;
  ctx.clearRect(0,0,w,h);
  if(phase==='idle'||phase==='design') drawPreview(w,h);
  else if(phase==='running') drawRunning(w,h);
  else if(phase==='result') drawResult(w,h);
}

function drawPreview(w,h){
  var pad=24, top=h*0.30, blockH=Math.min(34,h*0.16);
  ctx.font='600 11px '+css('--disp'); ctx.fillStyle=css('--muted');
  ctx.fillText(LANG==='cn'?'实验时间轴 (每格 = 一段录制)':'TIMELINE (each block = one recording)',pad,top-18);
  var seq=[];
  if(design.order==='alt'){
    for(var r=0;r<design.reps;r++){ seq.push('O'); seq.push('C'); }
  }else{
    for(var a=0;a<design.reps;a++) seq.push('O');
    for(var b=0;b<design.reps;b++) seq.push('C');
  }
  var n=seq.length, gap=4, avail=w-pad*2;
  var bw=Math.max(6,(avail-gap*(n-1))/n), x=pad;
  for(var i=0;i<n;i++){
    ctx.fillStyle = seq[i]==='C' ? css('--axis') : css('--proof');
    ctx.globalAlpha = seq[i]==='C' ? 0.9 : 0.55;
    ctx.fillRect(x,top,bw,blockH);
    ctx.globalAlpha=1;
    if(bw>14){ ctx.fillStyle=css('--bg-0'); ctx.font='700 10px '+css('--mono');
      ctx.fillText(seq[i],x+bw/2-3,top+blockH/2+4); }
    x+=bw+gap;
  }
  ctx.font='600 10px '+css('--mono');
  ctx.fillStyle=css('--proof'); ctx.fillText(LANG==='cn'?'O 睁眼':'O = open',pad,top+blockH+24);
  ctx.fillStyle=css('--axis');  ctx.fillText(LANG==='cn'?'C 闭眼':'C = closed',pad+90,top+blockH+24);
  var nPer=design.avg*design.reps;
  ctx.fillStyle=css('--muted'); ctx.font='600 11px '+css('--disp');
  ctx.fillText((LANG==='cn'?'每状态样本: ':'samples per state: ')+nPer
    +(nPer<60?(LANG==='cn'?'  (偏少 — 均值会抖)':'  (sparse — mean will wobble)')
             :(LANG==='cn'?'  (充足)':'  (plenty)')),pad,top+blockH+52);
}

var runDots=[];
function drawRunning(w,h){
  var pad=30, midY=h*0.5;
  ctx.strokeStyle=css('--shadow'); ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,midY);ctx.lineTo(w-pad,midY);ctx.stroke();
  ctx.font='600 11px '+css('--disp'); ctx.fillStyle=css('--muted');
  ctx.fillText(LANG==='cn'?'闭眼':'closed',pad,midY-h*0.22-6);
  ctx.fillText(LANG==='cn'?'睁眼':'open',pad,midY+h*0.22+18);
  var span=(w-pad*2);
  var shown=Math.min(runDots.length,Math.floor(phaseT*runDots.length)+1);
  for(var i=0;i<shown;i++){
    var d=runDots[i];
    var x=pad+span*(i/Math.max(1,runDots.length));
    var y=midY - d.v*(h*0.034);
    ctx.fillStyle = d.s==='C'?css('--axis'):css('--proof');
    ctx.globalAlpha=0.7;
    ctx.beginPath();ctx.arc(x,y,2.6,0,7);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawResult(w,h){
  if(!lastResult)return;
  var R=lastResult, pad=46;
  var hi=Math.max(R.meanClosed+R.ciClosed+1, TRUE_CLOSED+2);
  function yOf(v){ return h-30 - (v/hi)*(h-70); }
  ctx.strokeStyle=css('--shadow');ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,h-30);ctx.lineTo(w-pad,h-30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad,h-30);ctx.lineTo(pad,30);ctx.stroke();
  ctx.fillStyle=css('--muted');ctx.font='600 9px '+css('--mono');
  ctx.save();ctx.translate(14,h*0.5);ctx.rotate(-Math.PI/2);
  ctx.fillText(LANG==='cn'?'ALPHA 强度 (uV^2)':'ALPHA POWER (uV^2)',-40,0);ctx.restore();
  var cols=[
    {label:LANG==='cn'?'睁眼':'OPEN', m:R.meanOpen, ci:R.ciOpen, color:css('--proof'), x:w*0.36},
    {label:LANG==='cn'?'闭眼':'CLOSED', m:R.meanClosed, ci:R.ciClosed, color:css('--axis'), x:w*0.64}
  ];
  cols.forEach(function(c){
    var cy=yOf(c.m), cyTop=yOf(c.m+c.ci), cyBot=yOf(c.m-c.ci);
    ctx.fillStyle=c.color;ctx.globalAlpha=0.16;
    ctx.fillRect(c.x-30,cyTop,60,(cyBot-cyTop));
    ctx.globalAlpha=1;
    ctx.strokeStyle=c.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(c.x,cyTop);ctx.lineTo(c.x,cyBot);ctx.stroke();
    ctx.beginPath();ctx.moveTo(c.x-12,cyTop);ctx.lineTo(c.x+12,cyTop);
    ctx.moveTo(c.x-12,cyBot);ctx.lineTo(c.x+12,cyBot);ctx.stroke();
    ctx.fillStyle=c.color;
    ctx.beginPath();ctx.arc(c.x,cy,5,0,7);ctx.fill();
    ctx.fillStyle=css('--solution');ctx.font='700 13px '+css('--mono');
    ctx.fillText(c.m.toFixed(2),c.x-16,cy-12);
    ctx.fillStyle=css('--muted');ctx.font='600 10px '+css('--disp');
    ctx.fillText(c.label,c.x-18,h-14);
  });
  var oTop=yOf(R.meanOpen+R.ciOpen), cBot=yOf(R.meanClosed-R.ciClosed);
  if(cBot>oTop){
    ctx.strokeStyle=css('--proof');ctx.setLineDash([4,4]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad,oTop);ctx.lineTo(w-pad,oTop);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad,cBot);ctx.lineTo(w-pad,cBot);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=css('--proof');ctx.font='600 10px '+css('--disp');
    ctx.fillText(LANG==='cn'?'置信区间重叠':'CI bands overlap',w*0.5-50,(oTop+cBot)/2);
  }
}

/* ---------------- loop ---------------- */
function loop(){
  if(phase==='running'){
    phaseT+=0.02;
    if(phaseT>=1){ phase='result'; phaseT=1; applyResult(); draw(); return; }
    draw();
    rafId=requestAnimationFrame(loop);
  }
}

/* ---------------- run ---------------- */
function startRun(){
  if(phase==='running')return;
  lastResult=runExperiment(design);
  runDots=[];
  if(design.order==='alt'){
    for(var i=0;i<lastResult.repMeansO.length;i++){
      runDots.push({s:'O',v:lastResult.meanOpen+gauss()*1.4});
      runDots.push({s:'C',v:lastResult.meanClosed+gauss()*1.4});
    }
  }else{
    for(var a=0;a<lastResult.repMeansO.length;a++) runDots.push({s:'O',v:lastResult.meanOpen+gauss()*1.4});
    for(var b=0;b<lastResult.repMeansC.length;b++) runDots.push({s:'C',v:lastResult.meanClosed+gauss()*1.4});
  }
  phase='running'; phaseT=0;
  var rb=document.getElementById('runBtn');
  rb.disabled=true; rb.textContent=t('running');
  document.getElementById('canvasLabel').textContent=t('canvasRunning');
  cancelAnimationFrame(rafId); rafId=requestAnimationFrame(loop);
}

function applyResult(){
  var R=lastResult;
  var rb=document.getElementById('runBtn');
  rb.disabled=false; rb.textContent=t('run');
  document.getElementById('canvasLabel').textContent=t('canvasResult');
  document.getElementById('meanOpen').textContent=R.meanOpen.toFixed(2);
  document.getElementById('meanClosed').textContent=R.meanClosed.toFixed(2);
  document.getElementById('ciOpen').textContent=t('ci')+' ±'+R.ciOpen.toFixed(2);
  document.getElementById('ciClosed').textContent=t('ci')+' ±'+R.ciClosed.toFixed(2);
  var tag=document.getElementById('verdictTag'), msg=document.getElementById('verdictMsg');
  if(R.reliable){
    tag.className='tag good'; tag.textContent=t('tagGood');
    msg.textContent=t('vGood');
    if(!unlocked){ unlocked=true; setTimeout(showUnlock,500); }
  }else{
    tag.className='tag bad'; tag.textContent=t('tagBad');
    var key = R.reason==='norep'?'vNoRep':R.reason==='order'?'vOrder':'vFew';
    msg.textContent=t(key);
  }
}
function showUnlock(){ document.getElementById('overlay').classList.add('show'); }

/* ---------------- controls ---------------- */
function setOpt(group,v){
  design[group]=group==='order'?v:parseFloat(v);
  var box=document.querySelector('.opts[data-group="'+group+'"]');
  box.querySelectorAll('.opt').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-v')===String(v));
  });
  if(group==='dur') document.getElementById('valDur').textContent=design.dur+'s';
  if(group==='avg') document.getElementById('valAvg').textContent=design.avg;
  if(group==='reps') document.getElementById('valReps').textContent=design.reps;
  if(group==='order') document.getElementById('valOrder').textContent=design.order==='alt'?t('ALT'):t('BLOCK');
  refreshBudget();
  if(phase!=='running'){ phase='design'; draw(); }
}
function refreshBudget(){
  document.getElementById('budgetLine').innerHTML=t('budget')+' <b>'+(design.avg*design.reps)+'</b>';
}

document.querySelectorAll('.opts').forEach(function(box){
  var g=box.getAttribute('data-group');
  box.querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click',function(){ setOpt(g,b.getAttribute('data-v')); });
  });
});
document.getElementById('runBtn').addEventListener('click',startRun);
document.getElementById('ovClose').addEventListener('click',function(){
  document.getElementById('overlay').classList.remove('show');
});

/* ---------------- i18n apply ---------------- */
function applyLang(){
  document.getElementById('langBtn').textContent=LANG==='en'?'EN':'CN';
  document.getElementById('brandSub').textContent=t('brandSub');
  document.getElementById('secProtocol').textContent=t('secProtocol');
  document.getElementById('lblDur').textContent=t('lblDur');
  document.getElementById('lblAvg').textContent=t('lblAvg');
  document.getElementById('lblReps').textContent=t('lblReps');
  document.getElementById('lblOrder').textContent=t('lblOrder');
  var rb=document.getElementById('runBtn');
  if(!rb.disabled) rb.textContent=t('run');
  document.getElementById('title').textContent=t('title');
  document.getElementById('coreQ').textContent=t('coreQ');
  document.getElementById('lblOpen').textContent=t('lblOpen');
  document.getElementById('lblClosed').textContent=t('lblClosed');
  document.getElementById('optBlock').textContent=t('BLOCK');
  document.getElementById('optAlt').textContent=t('ALT');
  document.getElementById('valOrder').textContent=design.order==='alt'?t('ALT'):t('BLOCK');
  document.getElementById('ovTitle').textContent=t('ovTitle');
  document.getElementById('ovSub').textContent=t('ovSub');
  document.getElementById('ovP1').textContent=t('ovP1');
  document.getElementById('ovP2').textContent=t('ovP2');
  document.getElementById('ovClose').textContent=t('ovClose');
  document.getElementById('canvasLabel').textContent=
    phase==='result'?t('canvasResult'):phase==='running'?t('canvasRunning'):t('canvasLabel');
  if(lastResult){
    document.getElementById('ciOpen').textContent=t('ci')+' ±'+lastResult.ciOpen.toFixed(2);
    document.getElementById('ciClosed').textContent=t('ci')+' ±'+lastResult.ciClosed.toFixed(2);
    var tag=document.getElementById('verdictTag');
    if(lastResult.reliable){tag.textContent=t('tagGood');document.getElementById('verdictMsg').textContent=t('vGood');}
    else{tag.textContent=t('tagBad');var k=lastResult.reason==='norep'?'vNoRep':lastResult.reason==='order'?'vOrder':'vFew';document.getElementById('verdictMsg').textContent=t(k);}
  }else{
    document.getElementById('verdictTag').textContent=t('tagIdle');
    document.getElementById('verdictMsg').textContent=t('vIdle');
  }
  refreshBudget();
  draw();
}
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en'; applyLang();
});

/* ---------------- init ---------------- */
function init(){
  fit();
  setOpt('dur',8); setOpt('avg',40); setOpt('reps',5); setOpt('order','alt');
  document.getElementById('verdictMsg').textContent=t('vIdle');
  applyLang();
  phase='design'; draw();
}
init();
})();
</script>
