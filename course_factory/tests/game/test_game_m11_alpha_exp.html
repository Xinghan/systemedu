<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>睁闭眼 Alpha 实验台</title>
<style>
:root{
  /* 第 1 层 — 共享深空底 (所有 26 套统一) */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg:      oklch(0.96 0.01 265);
  --fg-dim:  oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold:    oklch(0.85 0.14 85);
  /* 第 2 层 — neuro signature accent (NRO-20 cortex-coral) */
  --neuro:   oklch(0.75 0.17 25);
  /* 第 3 层 — neuro 5 色 palette (themes.js NRO-20) */
  --synaptic: oklch(0.75 0.17 25);
  --dendrite: oklch(0.55 0.15 25);
  --axon:     oklch(0.32 0.10 25);
  --firing:   oklch(0.92 0.08 25);
  --memory:   oklch(0.85 0.14 85);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
  font-family:'Noto Sans SC',system-ui,sans-serif;}
.app{display:flex;height:100vh;}

/* ---------- 200px sidebar ---------- */
.game-sidebar{width:200px;flex-shrink:0;background:var(--bg-1);border-right:1px solid var(--line);
  display:flex;flex-direction:column;gap:10px;padding:14px 12px;overflow-y:auto;}
.brand{font-size:13px;font-weight:700;color:var(--synaptic);letter-spacing:.5px;line-height:1.3;}
.brand .sub{display:block;font-size:10px;color:var(--fg-mute);font-weight:400;margin-top:2px;
  font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.5px;}

.mascot{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg-2);
  border:1px solid var(--line);}
.mascot svg{flex:none;}
.mascot .m-name{font-size:11px;font-weight:700;color:var(--firing);}
.mascot .m-role{font-size:9px;color:var(--fg-mute);line-height:1.35;margin-top:2px;}

.sec-title{font-size:10px;color:var(--synaptic);letter-spacing:1px;text-transform:uppercase;
  font-family:'JetBrains Mono',ui-monospace,monospace;margin-top:2px;}

.eye-row{display:flex;gap:8px;}
.eye-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:700;cursor:pointer;color:var(--fg-dim);
  background:var(--bg-2);border:1.5px solid var(--line-strong);
  box-shadow:3px 3px 0 var(--bg-0);transition:transform .05s;}
.eye-btn:active{transform:translate(3px,3px);box-shadow:none;}
.eye-btn.active{color:var(--bg-0);background:var(--synaptic);border-color:var(--synaptic);
  box-shadow:3px 3px 0 var(--dendrite);}
.eye-btn .ec{display:block;font-size:9px;font-weight:400;margin-top:3px;opacity:.8;
  font-family:'JetBrains Mono',ui-monospace,monospace;}

.hint{font-size:10px;color:var(--fg-mute);line-height:1.5;}

/* round progress */
.rounds{display:flex;flex-direction:column;gap:6px;}
.round-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--fg-mute);
  font-family:'JetBrains Mono',ui-monospace,monospace;}
.round-dot{width:13px;height:13px;flex:none;border:1.5px solid var(--line-strong);
  background:var(--bg-2);}
.round-item.done .round-dot{background:var(--memory);border-color:var(--memory);}
.round-item.done{color:var(--memory);}
.round-item.cur .round-dot{border-color:var(--synaptic);box-shadow:0 0 0 2px var(--synaptic) inset;}

.guide{font-size:10px;color:var(--fg-mute);line-height:1.55;border-top:1px solid var(--line);
  padding-top:8px;}
.guide li{margin-left:14px;margin-bottom:3px;}

.lang-btn{margin-top:auto;padding:7px;font-size:11px;font-weight:700;cursor:pointer;
  color:var(--synaptic);background:var(--bg-2);border:1.5px solid var(--line-strong);
  box-shadow:3px 3px 0 var(--bg-0);font-family:'JetBrains Mono',ui-monospace,monospace;
  letter-spacing:1px;}
.lang-btn:active{transform:translate(3px,3px);box-shadow:none;}

/* ---------- main ---------- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;}

.hud{display:flex;gap:0;border-bottom:1px solid var(--line);background:var(--bg-1);}
.hud .item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;
  border-right:1px solid var(--line);}
.hud .item:last-child{border-right:0;}
.hud .label{font-size:9px;color:var(--fg-mute);text-transform:uppercase;letter-spacing:.8px;
  font-family:'JetBrains Mono',ui-monospace,monospace;}
.hud .value{font-size:18px;font-weight:700;color:var(--firing);margin-top:2px;
  font-family:'JetBrains Mono',ui-monospace,monospace;}
.hud .value.coral{color:var(--synaptic);}
.hud .value.gold{color:var(--memory);}

/* canvas 父容器 flex column chain */
.stage{flex:1;min-height:0;display:flex;flex-direction:column;}
canvas{display:block;flex:1;width:100%;height:100%;}

.victory{position:absolute;inset:0;background:oklch(0.10 0.03 265 / 0.82);display:none;
  align-items:center;justify-content:center;z-index:50;}
.victory.show{display:flex;}
.victory-box{background:var(--bg-1);border:1.5px solid var(--memory);padding:26px 34px;
  max-width:430px;text-align:center;box-shadow:6px 6px 0 var(--bg-0);}
.victory-box h2{font-size:18px;color:var(--memory);letter-spacing:1px;margin-bottom:10px;}
.victory-box p{font-size:13px;color:var(--fg);line-height:1.7;margin-bottom:16px;}
.victory-box .badge{font-size:11px;color:var(--gold);font-family:'JetBrains Mono',ui-monospace,monospace;
  letter-spacing:1px;margin-bottom:14px;}
.victory-btn{padding:8px 22px;font-size:12px;font-weight:700;cursor:pointer;color:var(--memory);
  background:var(--bg-2);border:1.5px solid var(--memory);box-shadow:3px 3px 0 var(--bg-0);
  font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:1px;}
.victory-btn:active{transform:translate(3px,3px);box-shadow:none;}
</style>
</head>
<body>
<div class="app">
  <aside class="game-sidebar">
    <div class="brand" id="brand">睁闭眼 Alpha 实验台
      <span class="sub" id="brandSub">OCCIPITAL EEG · BERGER 1929</span>
    </div>

    <div class="mascot">
      <svg width="34" height="38" viewBox="0 0 34 38" aria-hidden="true">
        <!-- Spark: 分叉树突小生物 -->
        <line x1="17" y1="36" x2="17" y2="20" stroke="oklch(0.32 0.10 25)" stroke-width="2.4"/>
        <line x1="17" y1="24" x2="8"  y2="14" stroke="oklch(0.55 0.15 25)" stroke-width="2"/>
        <line x1="17" y1="24" x2="26" y2="14" stroke="oklch(0.55 0.15 25)" stroke-width="2"/>
        <line x1="8"  y1="14" x2="4"  y2="7"  stroke="oklch(0.55 0.15 25)" stroke-width="1.6"/>
        <line x1="8"  y1="14" x2="11" y2="6"  stroke="oklch(0.55 0.15 25)" stroke-width="1.6"/>
        <line x1="26" y1="14" x2="30" y2="7"  stroke="oklch(0.55 0.15 25)" stroke-width="1.6"/>
        <line x1="26" y1="14" x2="23" y2="6"  stroke="oklch(0.55 0.15 25)" stroke-width="1.6"/>
        <circle cx="17" cy="20" r="5" fill="oklch(0.75 0.17 25)"/>
        <circle cx="17" cy="20" r="2.4" fill="oklch(0.92 0.08 25)"/>
        <circle cx="4"  cy="7" r="1.8" fill="oklch(0.92 0.08 25)"/>
        <circle cx="11" cy="6" r="1.8" fill="oklch(0.92 0.08 25)"/>
        <circle cx="30" cy="7" r="1.8" fill="oklch(0.92 0.08 25)"/>
        <circle cx="23" cy="6" r="1.8" fill="oklch(0.92 0.08 25)"/>
      </svg>
      <div>
        <div class="m-name">Spark</div>
        <div class="m-role" id="mascotRole">枕叶向导。闭眼时它会亮成一片波。</div>
      </div>
    </div>

    <div class="sec-title" id="ttlEye">受试者状态</div>
    <div class="eye-row">
      <button class="eye-btn" id="btnOpen">睁眼<span class="ec">EYES OPEN</span></button>
      <button class="eye-btn active" id="btnClose">闭眼<span class="ec">EYES CLOSED</span></button>
    </div>
    <div class="hint" id="hint">切到"闭眼"，看枕叶波形里慢慢涌出 alpha 节律 (8–12 Hz)。</div>

    <div class="sec-title" id="ttlRound">实验轮次 0 / 3</div>
    <div class="rounds" id="rounds"></div>

    <ul class="guide">
      <li id="g1">每轮：闭眼采 2 秒 + 睁眼采 2 秒</li>
      <li id="g2">看下方柱状对比两种状态 alpha</li>
      <li id="g3">完成 3 轮，验证 Berger 效应</li>
    </ul>

    <button class="lang-btn" id="langBtn">中 / EN</button>
  </aside>

  <main class="game-main">
    <div class="hud">
      <div class="item">
        <span class="label" id="hl1">当前状态</span>
        <span class="value coral" id="hudState">闭眼</span>
      </div>
      <div class="item">
        <span class="label">ALPHA NOW</span>
        <span class="value" id="hudAlpha">0.0</span>
      </div>
      <div class="item">
        <span class="label">CLOSED AVG</span>
        <span class="value gold" id="hudClosed">--</span>
      </div>
      <div class="item">
        <span class="label">OPEN AVG</span>
        <span class="value" id="hudOpen">--</span>
      </div>
    </div>
    <div class="stage">
      <canvas id="cv"></canvas>
    </div>
    <div class="victory" id="victory">
      <div class="victory-box">
        <h2 id="vTitle">Berger 效应验证完成</h2>
        <div class="badge" id="vBadge">BADGE · BERGER 效应验证者</div>
        <p id="vText"></p>
        <button class="victory-btn" id="vBtn">再做一次 / AGAIN</button>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- i18n ---------------- */
  var LANG='cn';
  var I18N={
    brand:{cn:'睁闭眼 Alpha 实验台',en:'Eyes Open/Closed Alpha Lab'},
    mascotRole:{cn:'枕叶向导。闭眼时它会亮成一片波。',en:'Occipital guide. It lights up in waves when eyes close.'},
    ttlEye:{cn:'受试者状态',en:'SUBJECT STATE'},
    btnOpen:{cn:'睁眼',en:'OPEN'},
    btnClose:{cn:'闭眼',en:'CLOSED'},
    hintClosed:{cn:'切到"闭眼"，看枕叶波形里慢慢涌出 alpha 节律 (8–12 Hz)。',
                en:'Switch to CLOSED — watch alpha rhythm (8–12 Hz) surge in the occipital trace.'},
    hintOpen:{cn:'睁眼时 alpha 被压住，波形变小变乱 (去同步)。',
              en:'With eyes open alpha is suppressed — the trace shrinks and desynchronizes.'},
    ttlRound:{cn:'实验轮次 ',en:'ROUND '},
    g1:{cn:'每轮：闭眼采 2 秒 + 睁眼采 2 秒',en:'Each round: 2s closed + 2s open sampling'},
    g2:{cn:'看下方柱状对比两种状态 alpha',en:'Compare alpha bars below for both states'},
    g3:{cn:'完成 3 轮，验证 Berger 效应',en:'Finish 3 rounds to verify the Berger effect'},
    hl1:{cn:'当前状态',en:'STATE NOW'},
    stClosed:{cn:'闭眼',en:'CLOSED'},
    stOpen:{cn:'睁眼',en:'OPEN'},
    waveTitle:{cn:'枕叶 O1 脑电 (uV)',en:'Occipital O1 EEG (uV)'},
    barTitle:{cn:'Alpha 平均功率对比',en:'Average Alpha Power'},
    barClosed:{cn:'闭眼',en:'CLOSED'},
    barOpen:{cn:'睁眼',en:'OPEN'},
    samplingClosed:{cn:'采样中 · 闭眼',en:'SAMPLING · CLOSED'},
    samplingOpen:{cn:'采样中 · 睁眼',en:'SAMPLING · OPEN'},
    needClosed:{cn:'本轮还差：闭眼采样',en:'This round needs: CLOSED sampling'},
    needOpen:{cn:'本轮还差：睁眼采样',en:'This round needs: OPEN sampling'},
    roundDone:{cn:'本轮完成，切换状态开始下一轮',en:'Round done — switch state for next round'},
    vTitle:{cn:'Berger 效应验证完成',en:'Berger Effect Verified'},
    vBadge:{cn:'BADGE · BERGER 效应验证者',en:'BADGE · BERGER EFFECT VERIFIER'},
    vText:{cn:'三轮统计下来，闭眼 alpha 平均功率明显高于睁眼——这正是 1929 年 Hans Berger 发现的事实：闭眼放松时枕叶产生强 alpha 节律，睁眼后被压制。你用自己的实验复现了它。',
           en:'Across three rounds, closed-eye alpha clearly exceeds open-eye — exactly what Hans Berger found in 1929: relaxed eyes-closed produces strong occipital alpha, suppressed when eyes open. You reproduced it yourself.'},
    vBtn:{cn:'再做一次 / AGAIN',en:'AGAIN'},
    badgeWait:{cn:'-- 等闭眼平均显著高于睁眼 --',en:'-- waiting: closed avg >> open avg --'}
  };
  function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

  /* ---------------- state ---------------- */
  var TOTAL_ROUNDS=3;
  var SAMPLE_MS=2000;                 // 每个状态采样窗 2 秒
  var eyesClosed=true;                // true=闭眼
  var sampleStart=0;                  // 当前状态采样开始时间, 0=未在采
  var alphaNow=0;
  // 每轮记录 {closed:val, open:val}
  var rounds=[];
  function freshRound(){return {closed:null, open:null};}
  rounds.push(freshRound());
  var solved=false;

  /* ---------------- DOM ---------------- */
  var btnOpen=document.getElementById('btnOpen');
  var btnClose=document.getElementById('btnClose');
  var hudState=document.getElementById('hudState');
  var hudAlpha=document.getElementById('hudAlpha');
  var hudClosed=document.getElementById('hudClosed');
  var hudOpen=document.getElementById('hudOpen');
  var roundsBox=document.getElementById('rounds');
  var ttlRound=document.getElementById('ttlRound');
  var hintEl=document.getElementById('hint');
  var victory=document.getElementById('victory');

  /* ---------------- canvas ---------------- */
  var canvas=document.getElementById('cv'), cx=canvas.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    var p=canvas.parentElement.getBoundingClientRect();
    if(p.width<1||p.height<1)return;
    W=p.width;H=p.height;
    canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    cx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize);
  setTimeout(resize,60);setTimeout(resize,300);setTimeout(resize,700);
  var C=function(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();};

  /* ---------------- 信号模型 ----------------
     枕叶 O1 = alpha(8-12Hz) 节律 + beta(13-30Hz) 去同步小波 + 噪声.
     闭眼: alpha 振幅大 (Berger 效应); 睁眼: alpha 被压, beta/噪声占主导.
     alphaEnv 平滑跟随目标振幅, 模拟 alpha 随状态切换"涌现/消退". */
  var alphaEnv=0.85;                 // alpha 振幅包络 0..1 (初始闭眼)
  function targetAlpha(){return eyesClosed?0.92:0.14;}

  // 滚动波形缓冲
  var trace=[];
  var TRACE_N=520;

  function step(dt){
    // alpha 包络平滑追目标 (闭眼上升 / 睁眼下降, 模拟生理时滞)
    var tgt=targetAlpha();
    var rate=(tgt>alphaEnv)?2.2:3.0;  // 睁眼压制稍快
    alphaEnv += (tgt-alphaEnv)*Math.min(1,rate*dt);

    // 当前 alpha 瞬时功率读数 (0..100), 含轻微抖动
    var jitter=(Math.random()-0.5)*4;
    alphaNow=Math.max(0, Math.min(100, alphaEnv*alphaEnv*100 + jitter));
  }

  // 生成某一时刻的波形采样值 (uV 量级 -1..1 归一)
  function sampleAt(time){
    var a=alphaEnv;
    var alpha=Math.sin(2*Math.PI*10*time) * a;                       // 10Hz alpha
    alpha+=Math.sin(2*Math.PI*9*time+0.7)*a*0.4;                     // 9Hz 成分
    var beta=Math.sin(2*Math.PI*22*time+1.3)*(0.20+(1-a)*0.30);      // beta 去同步, 睁眼时更明显
    var noise=(Math.random()-0.5)*0.10;
    return (alpha*0.72 + beta*0.5 + noise);
  }

  /* ---------------- 采样累积 ---------------- */
  function startSampling(){ sampleStart=performance.now(); }
  function curRound(){return rounds[rounds.length-1];}

  function commitSample(){
    // 把当前状态的稳定 alpha 平均功率写入本轮
    var val=Math.round(alphaEnv*alphaEnv*100);
    var r=curRound();
    if(eyesClosed) r.closed=val; else r.open=val;
    sampleStart=0;

    // 若本轮闭眼+睁眼都采到, 进入下一轮
    if(r.closed!==null && r.open!==null && rounds.length<TOTAL_ROUNDS){
      rounds.push(freshRound());
    }
    checkSolved();
    renderRounds();
    renderHud();
  }

  function completedRounds(){
    var n=0;
    for(var i=0;i<rounds.length;i++){if(rounds[i].closed!==null&&rounds[i].open!==null)n++;}
    return n;
  }
  function avg(key){
    var s=0,n=0;
    for(var i=0;i<rounds.length;i++){if(rounds[i][key]!==null){s+=rounds[i][key];n++;}}
    return n?s/n:null;
  }

  function checkSolved(){
    if(solved)return;
    if(completedRounds()>=TOTAL_ROUNDS){
      var ac=avg('closed'), ao=avg('open');
      // 闭眼平均显著高于睁眼 (差 > 25 功率单位)
      if(ac!==null&&ao!==null&&(ac-ao)>25){
        solved=true;
        showVictory();
      }
    }
  }

  /* ---------------- render ---------------- */
  function renderRounds(){
    roundsBox.innerHTML='';
    for(var i=0;i<TOTAL_ROUNDS;i++){
      var r=rounds[i];
      var done=r&&r.closed!==null&&r.open!==null;
      var cur=(i===rounds.length-1)&&!done;
      var div=document.createElement('div');
      div.className='round-item'+(done?' done':'')+(cur?' cur':'');
      var dot=document.createElement('span');dot.className='round-dot';
      var lbl=document.createElement('span');
      var cTxt=r&&r.closed!==null?('C '+r.closed):'C --';
      var oTxt=r&&r.open!==null?('O '+r.open):'O --';
      lbl.textContent='R'+(i+1)+'  '+cTxt+'  '+oTxt;
      div.appendChild(dot);div.appendChild(lbl);
      roundsBox.appendChild(div);
    }
    ttlRound.textContent=t('ttlRound')+completedRounds()+' / '+TOTAL_ROUNDS;
  }

  function renderHud(){
    hudState.textContent=eyesClosed?t('stClosed'):t('stOpen');
    hudState.className='value '+(eyesClosed?'coral':'');
    hudAlpha.textContent=alphaNow.toFixed(1);
    var ac=avg('closed'), ao=avg('open');
    hudClosed.textContent=ac===null?'--':ac.toFixed(0);
    hudOpen.textContent=ao===null?'--':ao.toFixed(0);
  }

  function refreshI18N(){
    document.getElementById('brand').childNodes[0].nodeValue=t('brand');
    document.getElementById('mascotRole').textContent=t('mascotRole');
    document.getElementById('ttlEye').textContent=t('ttlEye');
    btnOpen.childNodes[0].nodeValue=t('btnOpen');
    btnClose.childNodes[0].nodeValue=t('btnClose');
    document.getElementById('g1').textContent=t('g1');
    document.getElementById('g2').textContent=t('g2');
    document.getElementById('g3').textContent=t('g3');
    document.getElementById('hl1').textContent=t('hl1');
    document.getElementById('vTitle').textContent=t('vTitle');
    document.getElementById('vBadge').textContent=t('vBadge');
    document.getElementById('vText').textContent=t('vText');
    document.getElementById('vBtn').textContent=t('vBtn');
    hintEl.textContent=eyesClosed?t('hintClosed'):t('hintOpen');
    renderRounds();renderHud();
  }

  /* ---------------- draw ---------------- */
  function drawWave(x0,y0,w,h){
    var bg2=C('--bg-2'),line=C('--line'),syn=C('--synaptic'),fire=C('--firing'),
        dim=C('--fg-dim'),mute=C('--fg-mute');
    // panel
    cx.fillStyle=bg2;cx.fillRect(x0,y0,w,h);
    cx.strokeStyle=line;cx.lineWidth=1;cx.strokeRect(x0+0.5,y0+0.5,w-1,h-1);
    // grid
    cx.strokeStyle=C('--line');
    for(var gx=x0;gx<x0+w;gx+=40){cx.beginPath();cx.moveTo(gx,y0);cx.lineTo(gx,y0+h);cx.globalAlpha=0.25;cx.stroke();}
    cx.globalAlpha=1;
    var midY=y0+h*0.5;
    cx.strokeStyle=line;cx.beginPath();cx.moveTo(x0,midY);cx.lineTo(x0+w,midY);cx.stroke();
    // title
    cx.fillStyle=syn;cx.font="12px 'JetBrains Mono',ui-monospace,monospace";cx.textAlign='left';
    cx.fillText(t('waveTitle'),x0+10,y0+18);
    // sampling badge
    if(sampleStart>0){
      var label=eyesClosed?t('samplingClosed'):t('samplingOpen');
      cx.fillStyle=fire;cx.textAlign='right';
      cx.fillText(label,x0+w-10,y0+18);
    }
    // waveform
    var amp=h*0.34;
    cx.strokeStyle=eyesClosed?syn:dim;cx.lineWidth=eyesClosed?2.2:1.6;
    cx.beginPath();
    for(var i=0;i<trace.length;i++){
      var px=x0+ (i/(TRACE_N-1))*w;
      var py=midY - trace[i]*amp;
      if(i===0)cx.moveTo(px,py);else cx.lineTo(px,py);
    }
    cx.stroke();
    cx.textAlign='left';
  }

  function drawBars(x0,y0,w,h){
    var bg2=C('--bg-2'),line=C('--line'),syn=C('--synaptic'),mem=C('--memory'),
        dim=C('--fg-dim'),mute=C('--fg-mute'),fg=C('--fg');
    cx.fillStyle=bg2;cx.fillRect(x0,y0,w,h);
    cx.strokeStyle=line;cx.lineWidth=1;cx.strokeRect(x0+0.5,y0+0.5,w-1,h-1);
    cx.fillStyle=syn;cx.font="12px 'JetBrains Mono',ui-monospace,monospace";cx.textAlign='left';
    cx.fillText(t('barTitle'),x0+10,y0+18);

    var ac=avg('closed'), ao=avg('open');
    var baseY=y0+h-34, maxBarH=h-66;
    var bw=Math.min(90,(w-100)/2);
    var gap=46;
    var cx0=x0+w*0.5-bw-gap*0.5;
    var ox0=x0+w*0.5+gap*0.5;

    function bar(bx,val,col,labelKey){
      var bh=val===null?0:(val/100)*maxBarH;
      // base line
      cx.strokeStyle=line;cx.beginPath();cx.moveTo(bx-6,baseY+0.5);cx.lineTo(bx+bw+6,baseY+0.5);cx.stroke();
      // bar
      cx.fillStyle=col;cx.fillRect(bx,baseY-bh,bw,bh);
      cx.strokeStyle=col;cx.lineWidth=1.5;cx.strokeRect(bx+0.5,baseY-bh+0.5,bw-1,bh-1>0?bh-1:0);
      // value
      cx.fillStyle=fg;cx.font="13px 'JetBrains Mono',ui-monospace,monospace";cx.textAlign='center';
      cx.fillText(val===null?'--':String(Math.round(val)), bx+bw/2, baseY-bh-8);
      // label
      cx.fillStyle=mute;cx.font="11px 'Noto Sans SC',sans-serif";
      cx.fillText(t(labelKey), bx+bw/2, baseY+18);
    }
    bar(cx0,ac,mem,'barClosed');
    bar(ox0,ao,dim,'barOpen');

    // verify indicator
    cx.textAlign='center';
    if(ac!==null&&ao!==null){
      var diff=ac-ao;
      cx.fillStyle=diff>25?mem:mute;
      cx.font="11px 'JetBrains Mono',ui-monospace,monospace";
      var msg=(LANG==='cn')
        ? ('闭眼 - 睁眼 = '+Math.round(diff)+(diff>25?'  (显著!)':'  (继续采样)'))
        : ('closed - open = '+Math.round(diff)+(diff>25?'  (significant!)':'  (keep sampling)'));
      cx.fillText(msg, x0+w*0.5, y0+38);
    }else{
      cx.fillStyle=mute;cx.font="11px 'Noto Sans SC',sans-serif";
      cx.fillText(t('badgeWait'), x0+w*0.5, y0+38);
    }
    cx.textAlign='left';
  }

  /* ---------------- loop ---------------- */
  var lastT=0, sigTime=0;
  function loop(now){
    if(!W||!H){requestAnimationFrame(loop);return;}
    var dt=lastT?Math.min(0.05,(now-lastT)/1000):0.016;lastT=now;
    step(dt);

    // 推进信号 + 滚动 trace
    sigTime+=dt;
    var newSamples=Math.max(1,Math.round(dt*240)); // 视觉滚动速度
    for(var s=0;s<newSamples;s++){
      sigTime+=1/240;
      trace.push(sampleAt(sigTime));
      if(trace.length>TRACE_N)trace.shift();
    }

    // 采样窗到时 -> commit
    if(sampleStart>0 && (now-sampleStart)>=SAMPLE_MS){
      commitSample();
    }

    // draw
    cx.clearRect(0,0,W,H);
    var pad=14;
    var topH=Math.round((H-pad*3)*0.55);
    var botH=(H-pad*3)-topH;
    drawWave(pad, pad, W-pad*2, topH);
    drawBars(pad, pad*2+topH, W-pad*2, botH);

    hudAlpha.textContent=alphaNow.toFixed(1);
    requestAnimationFrame(loop);
  }

  /* ---------------- victory ---------------- */
  function showVictory(){ victory.classList.add('show'); }
  function resetAll(){
    rounds.length=0;rounds.push(freshRound());
    eyesClosed=true;sampleStart=0;solved=false;alphaEnv=0.85;alphaNow=0;
    setEye(true,true);
    victory.classList.remove('show');
    renderRounds();renderHud();
  }

  /* ---------------- interaction ---------------- */
  function setEye(closed){
    if(eyesClosed===closed && sampleStart>0) return; // 同状态点击不重启已在采样的窗
    eyesClosed=closed;
    btnClose.classList.toggle('active',closed);
    btnOpen.classList.toggle('active',!closed);
    hintEl.textContent=closed?t('hintClosed'):t('hintOpen');
    // 切换状态即开始本状态的采样窗
    startSampling();
    renderHud();
  }
  btnOpen.addEventListener('click',function(){setEye(false);});
  btnClose.addEventListener('click',function(){setEye(true);});
  document.getElementById('vBtn').addEventListener('click',resetAll);
  document.getElementById('langBtn').addEventListener('click',function(){
    LANG=(LANG==='cn')?'en':'cn';refreshI18N();
  });

  /* ---------------- init ---------------- */
  renderRounds();renderHud();
  startSampling();           // 初始闭眼即开始采第一轮闭眼
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
