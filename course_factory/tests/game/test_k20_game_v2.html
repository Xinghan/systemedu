<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e14;color:#f6f6fc;font-family:'Noto Sans SC','Inter',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.sidebar-btns{display:flex;gap:6px;align-self:flex-start;}
.sidebar-lang,.sidebar-sound{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,181,156,0.3);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-lang:hover,.sidebar-sound:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#50ffb0;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;white-space:pre-wrap;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);}
.game-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#50ffb0;}
.game-header .info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#aaabb0;}
.game-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.game-body canvas{display:block;}
.control-panel{padding:8px 16px;display:flex;gap:12px;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);flex-wrap:wrap;}
.hud-bar{display:flex;justify-content:space-around;padding:6px 16px;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#aaabb0;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#50ffb0;}
.btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;border:none;cursor:pointer;color:#0c0e14;background:linear-gradient(135deg,#50ffb0,#17df93);letter-spacing:0.08em;transition:transform 0.1s;}
.btn:hover{transform:scale(1.04);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(23,26,31,0.92);color:#aaabb0;backdrop-filter:blur(12px);border:none;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;cursor:pointer;letter-spacing:0.08em;transition:transform 0.1s;}
.btn-secondary:hover{color:#50ffb0;}
.slider-wrap{display:flex;align-items:center;gap:6px;}
.slider-wrap label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#aaabb0;white-space:nowrap;}
.slider-wrap input[type=range]{width:120px;accent-color:#50ffb0;}
.slider-val{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#50ffb0;font-weight:700;min-width:40px;text-align:center;}
.dir-btns{display:flex;gap:4px;}
.dir-btns button{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;border:1px solid rgba(80,255,176,0.3);background:transparent;color:#aaabb0;cursor:pointer;transition:all 0.15s;}
.dir-btns button.active{border-color:#50ffb0;color:#50ffb0;background:rgba(80,255,176,0.1);}
.dir-btns button:hover{border-color:#50ffb0;}
.predict-wrap{display:flex;align-items:center;gap:6px;}
.predict-wrap label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#aaabb0;white-space:nowrap;}
.predict-wrap input[type=number]{width:60px;background:rgba(80,255,176,0.08);border:1px solid rgba(80,255,176,0.3);color:#f6f6fc;font-family:'Space Grotesk',sans-serif;font-size:12px;padding:3px 6px;text-align:center;}
.predict-wrap input[type=number]:focus{outline:none;border-color:#50ffb0;}
.result-panel{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(12,14,20,0.95);border:1px solid rgba(80,255,176,0.3);padding:20px 28px;text-align:center;z-index:20;min-width:280px;}
.result-panel h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#50ffb0;margin-bottom:8px;}
.result-panel p{font-size:13px;color:#aaabb0;margin:4px 0;}
.result-panel .verdict{font-size:15px;color:#ffb59c;font-weight:700;margin-top:10px;}
.result-panel .insight{font-size:12px;color:#666;margin-top:8px;font-style:italic;}
.engine-cfg{display:flex;flex-direction:column;gap:4px;background:rgba(0,0,0,0.3);padding:6px 10px;border:1px solid rgba(80,255,176,0.15);font-size:11px;}
.engine-cfg label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#aaabb0;}
.engine-cfg input[type=range]{width:80px;accent-color:#50ffb0;}
.engine-cfg .ev{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#50ffb0;font-weight:700;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="sidebar-btns">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <button class="sidebar-sound" id="soundBtn">MUTE</button>
    </div>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-guide" id="guideContent"></div>
  </div>
  <div class="game-main">
    <div class="game-header">
      <h1 id="gameTitle"></h1>
      <div class="info" id="roundInfo"></div>
    </div>
    <div class="game-body" id="gameBody">
      <canvas id="cv"></canvas>
      <div class="result-panel" id="resultPanel">
        <h2 id="rpTitle"></h2>
        <p id="rpLine1"></p>
        <p id="rpLine2"></p>
        <p id="rpLine3"></p>
        <div class="verdict" id="rpVerdict"></div>
        <div class="insight" id="rpInsight"></div>
      </div>
    </div>
    <div class="control-panel" id="controlPanel"></div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4">--</div></div>
    </div>
  </div>
</div>

<script>
// ============================================================

//
// Newton's Third Law: for every action there is an equal and
// opposite reaction. 5 levels of increasing complexity from
// identifying force pairs to designing jet cars.
//
// Canvas 2D rendering. Sidebar standard layout. Dark theme.
// 19 hard HTML + 9 mandatory polish constraints.

// --- I18N ---
var I18N = {

  guide2:       {en:'Balloon racer!\nInflate by clicking PUMP.\nSet nozzle angle.\nPredict flight direction.\nRelease to fly!', cn:'\u6c14\u7403\u8d5b\u8f66\uff01\n\u70b9\u51fb\u201c\u5145\u6c14\u201d\u7ed9\u6c14\u7403\u5145\u6c14\u3002\n\u8bbe\u7f6e\u55b7\u5634\u89d2\u5ea6\u3002\n\u9884\u6d4b\u98de\u884c\u65b9\u5411\u3002\n\u91ca\u653e\u8d77\u98de\uff01'},
  guide3:       {en:'Ice skating push!\nTwo skaters push apart.\nSame force, different mass.\nPredict who slides farther.\n4 rounds.', cn:'\u6ed1\u51b0\u63a8\u4eba\u5b9e\u9a8c\uff01\n\u4e24\u4e2a\u6ed1\u51b0\u8005\u4e92\u63a8\u3002\n\u540c\u6837\u7684\u529b\uff0c\u4e0d\u540c\u7684\u8d28\u91cf\u3002\n\u9884\u6d4b\u8c01\u6ed1\u5f97\u66f4\u8fdc\u3002\n\u5171 4 \u8f6e\u3002'},
  guide4:       {en:'Rocket thrust calculator!\nT = mass_flow x exhaust_vel\na = T / rocket_mass\nCalculate thrust & acceleration.\n3 rounds.', cn:'\u706b\u7bad\u63a8\u529b\u8ba1\u7b97\u5668\uff01\nT = \u8d28\u91cf\u6d41\u7387 x \u55b7\u5c04\u901f\u5ea6\na = T / \u706b\u7bad\u8d28\u91cf\n\u8ba1\u7b97\u63a8\u529b\u548c\u52a0\u901f\u5ea6\u3002\n\u5171 3 \u8f6e\u3002'},
  guide5:       {en:'Design a jet car!\nMount 1-3 balloon engines.\nSet air volume & nozzle angle.\nReach the finish line!\nMultiple solutions possible.', cn:'\u8bbe\u8ba1\u55b7\u6c14\u8f66\uff01\n\u5b89\u88c5 1-3 \u4e2a\u6c14\u7403\u5f15\u64ce\u3002\n\u8bbe\u7f6e\u5145\u6c14\u91cf\u548c\u55b7\u5634\u89d2\u5ea6\u3002\n\u5230\u8fbe\u7ec8\u70b9\u5373\u53ef\uff01\n\u591a\u79cd\u65b9\u6848\u53ef\u884c\u3002'},
  confirm:      {en:'CONFIRM', cn:'\u786e\u8ba4'},
  pump:         {en:'PUMP', cn:'\u5145\u6c14'},
  release:      {en:'RELEASE', cn:'\u91ca\u653e'},
  push:         {en:'PUSH', cn:'\u63a8'},
  submit:       {en:'SUBMIT', cn:'\u63d0\u4ea4'},

  reset:        {en:'RESTART', cn:'\u91cd\u65b0\u5f00\u59cb'},

  nextLevel:    {en:'NEXT LEVEL', cn:'\u4e0b\u4e00\u5173'},
  level:        {en:'LEVEL', cn:'\u5173\u5361'},
  score:        {en:'SCORE', cn:'\u5f97\u5206'},
  correct:      {en:'Correct!', cn:'\u6b63\u786e\uff01'},
  wrong:        {en:'Wrong!', cn:'\u9519\u8bef\uff01'},
  partial:      {en:'Close!', cn:'\u63a5\u8fd1\uff01'},
  complete:     {en:'ALL LEVELS COMPLETE!', cn:'\u5168\u90e8\u5173\u5361\u5b8c\u6210\uff01'},
  totalScore:   {en:'Total Score', cn:'\u603b\u5206'},
  levelDone:    {en:'Level Complete!', cn:'\u672c\u5173\u5b8c\u6210\uff01'},
  levelScore:   {en:'Level Score', cn:'\u672c\u5173\u5f97\u5206'},
  magnitude:    {en:'Magnitude', cn:'\u5927\u5c0f'},
  direction:    {en:'Direction', cn:'\u65b9\u5411'},
  up:           {en:'Up', cn:'\u5411\u4e0a'},
  down:         {en:'Down', cn:'\u5411\u4e0b'},
  left:         {en:'Left', cn:'\u5411\u5de6'},
  right:        {en:'Right', cn:'\u5411\u53f3'},
  nozzleAngle:  {en:'Nozzle', cn:'\u55b7\u5634\u89d2\u5ea6'},
  airVolume:    {en:'Air', cn:'\u5145\u6c14\u91cf'},
  predictDir:   {en:'Flight dir?', cn:'\u98de\u884c\u65b9\u5411?'},
  massFlow:     {en:'Mass flow', cn:'\u8d28\u91cf\u6d41\u7387'},
  exhaustVel:   {en:'Exhaust vel', cn:'\u55b7\u5c04\u901f\u5ea6'},
  rocketMass:   {en:'Rocket mass', cn:'\u706b\u7bad\u8d28\u91cf'},
  thrust:       {en:'Thrust(N)', cn:'\u63a8\u529b(N)'},
  accel:        {en:'Accel(m/s\u00b2)', cn:'\u52a0\u901f\u5ea6(m/s\u00b2)'},
  yourThrust:   {en:'Your T', cn:'\u4f60\u7684T'},
  yourAccel:    {en:'Your a', cn:'\u4f60\u7684a'},
  engines:      {en:'Engines', cn:'\u5f15\u64ce\u6570'},
  addEngine:    {en:'+ENGINE', cn:'+\u5f15\u64ce'},
  rmEngine:     {en:'-ENGINE', cn:'-\u5f15\u64ce'},
  finish:       {en:'FINISH', cn:'\u7ec8\u70b9'},
  skaterA:      {en:'Skater A', cn:'\u6ed1\u51b0\u8005A'},
  skaterB:      {en:'Skater B', cn:'\u6ed1\u51b0\u8005B'},
  whoFarther:   {en:'Who slides farther?', cn:'\u8c01\u6ed1\u5f97\u66f4\u8fdc\uff1f'},
  same:         {en:'Same', cn:'\u4e00\u6837\u8fdc'},
  insight1:     {en:'Forces always come in equal, opposite pairs acting on different objects!', cn:'\u529b\u603b\u662f\u6210\u5bf9\u51fa\u73b0\uff0c\u5927\u5c0f\u76f8\u7b49\u3001\u65b9\u5411\u76f8\u53cd\uff0c\u4f5c\u7528\u5728\u4e0d\u540c\u7269\u4f53\u4e0a\uff01'},
  insight2:     {en:'Air rushes out one way, balloon flies the opposite way -- action & reaction!', cn:'\u7a7a\u6c14\u5411\u4e00\u4e2a\u65b9\u5411\u55b7\u51fa\uff0c\u6c14\u7403\u5411\u53cd\u65b9\u5411\u98de\u2014\u2014\u4f5c\u7528\u4e0e\u53cd\u4f5c\u7528\uff01'},
  insight3:     {en:'Same force on both, but lighter one accelerates more! F=ma at work.', cn:'\u540c\u6837\u7684\u529b\uff0c\u8f83\u8f7b\u7684\u52a0\u901f\u66f4\u5927\uff01F=ma \u5728\u8d77\u4f5c\u7528\u3002'},
  insight4:     {en:'Rockets work by Newton\'s 3rd: exhaust backward, rocket forward! T=m_dot*v_e', cn:'\u706b\u7bad\u539f\u7406\u5c31\u662f\u725b\u987f\u7b2c\u4e09\u5b9a\u5f8b\uff1a\u5bfc\u6c14\u5411\u540e\u55b7\uff0c\u706b\u7bad\u5411\u524d\u98de\uff01T=m_dot*v_e'},
  insight5:     {en:'Jet propulsion: total thrust = sum of all nozzle force vectors!', cn:'\u55b7\u6c14\u63a8\u8fdb\uff1a\u603b\u63a8\u529b = \u6240\u6709\u55b7\u5634\u529b\u7684\u5411\u91cf\u548c\uff01'},
  scenarioOf:   {en:'{n}/{t}', cn:'{n}/{t}'},
  forceN:       {en:'{f}N', cn:'{f}N'},
  deg:          {en:'\u00b0', cn:'\u00b0'},
  kgps:         {en:'kg/s', cn:'kg/s'},
  ms:           {en:'m/s', cn:'m/s'},

var lang = 'cn';
function t(key) { return I18N[key] ? (I18N[key][lang] || I18N[key].en) : key; }
function tf(key, vars) {
  var s = t(key);
  if (vars) { for (var k in vars) s = s.replace('{'+k+'}', vars[k]); }
  return s;
}

// --- DOM refs ---
var $ = function(id) { return document.getElementById(id); };
var langBtn = $('langBtn');
var soundBtn = $('soundBtn');
var sidebarTitle = $('sidebarTitle');
var guideContent = $('guideContent');
var gameTitle = $('gameTitle');
var roundInfo = $('roundInfo');
var gameBody = $('gameBody');
var canvas = $('cv');
var ctx = canvas.getContext('2d');
var controlPanel = $('controlPanel');
var resultPanel = $('resultPanel');

// --- Audio (Web Audio API synth, default muted) ---
var audioCtx = null;
var soundMuted = true;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  if (soundMuted) return;
  var ac = getAudio(); if (!ac) return;
  try {
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sndCorrect() { playTone(523,0.1,'sine',0.1); setTimeout(function(){playTone(659,0.1,'sine',0.08);},60); setTimeout(function(){playTone(784,0.15,'sine',0.08);},120); }
function sndWrong() { playTone(200,0.3,'sawtooth',0.08); playTone(150,0.4,'sawtooth',0.06); }
function sndPump() { playTone(330,0.08,'triangle',0.1); playTone(440,0.06,'sine',0.06); }
function sndRelease() { playTone(880,0.06,'sine',0.08); setTimeout(function(){playTone(660,0.08,'sine',0.06);},40); setTimeout(function(){playTone(440,0.12,'sine',0.06);},100); }
function sndPush() { playTone(220,0.15,'triangle',0.12); playTone(330,0.1,'sine',0.08); }
function sndLaunch() { playTone(150,0.2,'sawtooth',0.1); setTimeout(function(){playTone(300,0.15,'sine',0.08);},100); }
function sndComplete() { playTone(523,0.15,'triangle',0.12); setTimeout(function(){playTone(659,0.12,'triangle',0.1);},100); setTimeout(function(){playTone(784,0.12,'triangle',0.1);},200); setTimeout(function(){playTone(1047,0.25,'triangle',0.12);},300); }
function sndClick() { playTone(660,0.06,'sine',0.06); }
function sndImpact() { playTone(80,0.2,'sawtooth',0.12); playTone(120,0.15,'square',0.06); }

// --- Sound / Lang buttons ---
soundBtn.onclick = function() {
  soundMuted = !soundMuted;
  soundBtn.textContent = soundMuted ? 'MUTE' : 'SND';
  if (!soundMuted) getAudio();
};
langBtn.onclick = function() {
  lang = lang === 'cn' ? 'en' : 'cn';
  langBtn.textContent = lang === 'cn' ? 'CN' : 'EN';
  rebuildControls();
  refreshUI();
};

// --- Canvas sizing ---
var W = 100, H = 100;
function resizeCanvas() {
  var parent = gameBody;
  var availW = parent.clientWidth;
  var availH = parent.clientHeight;
  var dpr = window.devicePixelRatio || 1;
  W = availW; H = availH;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', function() { resizeCanvas(); });

// --- Easing ---
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function easeOutBounce(x) { var n1=7.5625,d1=2.75; if(x<1/d1)return n1*x*x; if(x<2/d1)return n1*(x-=1.5/d1)*x+0.75; if(x<2.5/d1)return n1*(x-=2.25/d1)*x+0.9375; return n1*(x-=2.625/d1)*x+0.984375; }
function easeInOutQuad(x) { return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2; }
function lerp(a, b, tt) { return a + (b - a) * tt; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

// ============================================================
// SCREEN SHAKE
// ============================================================
var shakeX = 0, shakeY = 0, shakeMag = 0, shakeDecay = 0.9;
function triggerShake(mag) { shakeMag = mag; }
function updateShake() {
  if (shakeMag > 0.3) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= shakeDecay;
  } else { shakeX = 0; shakeY = 0; shakeMag = 0; }
}

// ============================================================
// PARTICLES
// ============================================================
var particles = [];
function spawnParticle(x, y, vx, vy, r, life, cr, cg, cb) {
  particles.push({x:x,y:y,vx:vx,vy:vy,r:r,life:life,maxLife:life,cr:cr,cg:cg,cb:cb});
}
function spawnExhaustParticle(x, y, dirAngle) {
  var speed = 80 + Math.random() * 80;
  var spread = (Math.random() - 0.5) * 0.6;
  var a = dirAngle + spread;
  spawnParticle(x, y, Math.cos(a)*speed, Math.sin(a)*speed, 2+Math.random()*3, 0.3+Math.random()*0.3, 255, Math.floor(100+Math.random()*120), 0);
}
function spawnCorrectParticles(x, y) {
  for (var i = 0; i < 12; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = 40 + Math.random() * 80;
    spawnParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 1.5+Math.random()*2, 0.5+Math.random()*0.3, 80, 255, 176);
  }
}
function spawnImpactParticles(x, y) {
  for (var i = 0; i < 8; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = 30 + Math.random() * 50;
    spawnParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 1+Math.random()*2, 0.3+Math.random()*0.2, 255, 181, 156);
  }
}
function updateAndDrawParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    var alpha = p.life / p.maxLife;
    var rr = p.r * (1 + (1 - alpha) * 0.5);
    ctx.beginPath();
    ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba('+p.cr+','+p.cg+','+p.cb+','+(alpha*0.7)+')';
    ctx.fill();
  }
}

function maxScenarios() {
  if (gs.currentLevel === 1) return L1_SCENARIOS.length;
  if (gs.currentLevel === 2) return L2_ROUNDS.length;
  if (gs.currentLevel === 3) return L3_MASSES.length;
  if (gs.currentLevel === 4) return L4_ROUNDS.length;
  if (gs.currentLevel === 5) return 1;
  return 1;
}

function initLevel() {
  gs.scenario = 0;
  gs.phase = PH_READY;
  gs.levelScore = 0;
  gs.feedback = '';
  gs.feedbackT = 0;
  initScenario();
}

function initScenario() {
  gs.phase = PH_READY;
  gs.animT = 0;
  gs.feedback = '';
  gs.feedbackT = 0;
  gs.idleT = 0;
  resultPanel.style.display = 'none';

  if (gs.currentLevel === 1) {
    var sc = L1_SCENARIOS[gs.scenario];
    gs.l1_chosenDir = 'up';
    gs.l1_chosenMag = Math.round(sc.actionForce / 2);
  } else if (gs.currentLevel === 2) {
    gs.l2_airPumps = 0;
    gs.l2_nozzleAngle = L2_ROUNDS[gs.scenario].nozzle;
    gs.l2_balloonX = 0; gs.l2_balloonY = 0;
    gs.l2_balloonVX = 0; gs.l2_balloonVY = 0;
    gs.l2_predictedDir = ''; gs.l2_actualDir = '';
  } else if (gs.currentLevel === 3) {
    var m = L3_MASSES[gs.scenario];
    gs.l3_massA = m[0]; gs.l3_massB = m[1];
    gs.l3_force = 100; gs.l3_prediction = '';
    gs.l3_aX = 0; gs.l3_bX = 0;
    gs.l3_aVX = 0; gs.l3_bVX = 0;
  } else if (gs.currentLevel === 4) {
    gs.l4_userThrust = 0; gs.l4_userAccel = 0;
  } else if (gs.currentLevel === 5) {
    gs.l5_engines = [{air: 5, angle: 180}];
    gs.l5_carX = 0; gs.l5_carVX = 0; gs.l5_carVY = 0; gs.l5_carY = 0;
    gs.l5_simTime = 0; gs.l5_finished = false;
  }
  rebuildControls();
  refreshUI();
}

function onAction() {
  if (gs.phase === PH_LEVEL_DONE) {
    gs.currentLevel++;
    if (gs.currentLevel > 5) {
      gs.phase = PH_ALL_DONE;
      sndComplete();
      showResult(t('complete'), t('totalScore') + ': ' + gs.score, '', '', t('insight1'));
      refreshUI();
      return;
    }
    gs.phase = PH_TRANSITION; gs.transT = 0;
    return;
  }
  if (gs.phase === PH_DONE) {
    gs.scenario++;
    if (gs.scenario >= maxScenarios()) {
      gs.phase = PH_LEVEL_DONE;
      sndComplete();
      showResult(t('levelDone'), t('levelScore') + ': ' + gs.levelScore, '', '', t('insight' + gs.currentLevel));
      rebuildControls();
      updateActionButton(t('nextLevel'));
      return;
    }
    initScenario();
    return;
  }
  if (gs.phase !== PH_READY) return;
  sndClick();

  if (gs.currentLevel === 1) doLevel1Action();
  else if (gs.currentLevel === 2) doLevel2Action();
  else if (gs.currentLevel === 3) doLevel3Action();
  else if (gs.currentLevel === 4) doLevel4Action();
  else if (gs.currentLevel === 5) doLevel5Action();
}

function updateActionButton(text) {
  var btn = document.getElementById('btnAction');
  if (btn) btn.textContent = text;
}

// --- Level 1: check force pair ---
function doLevel1Action() {
  var sc = L1_SCENARIOS[gs.scenario];
  var magCorrect = Math.abs(gs.l1_chosenMag - sc.actionForce) <= sc.actionForce * 0.15;
  var dirCorrect = gs.l1_chosenDir === sc.reactionDir;
  var points = 0;
  if (magCorrect && dirCorrect) {
    points = 100; gs.feedback = t('correct'); sndCorrect();
    spawnCorrectParticles(W/2, H/2);
  } else if (dirCorrect) {
    points = 40; gs.feedback = t('partial') + ' (' + t('magnitude') + ')'; sndWrong();
  } else if (magCorrect) {
    points = 30; gs.feedback = t('partial') + ' (' + t('direction') + ')'; sndWrong();
  } else {
    points = 0; gs.feedback = t('wrong'); sndWrong();
    triggerShake(4);
  }
  gs.feedbackT = 2.0;
  gs.levelScore += points; gs.score += points;
  gs.phase = PH_DONE; gs.animT = 0; gs.animDuration = 1.2;
  updateActionButton(t('next'));
  refreshUI();
}

// --- Level 2: balloon racer ---
function doLevel2Action() {
  if (gs.l2_airPumps === 0) return;
  // Nozzle angle -> flight is opposite to exhaust direction
  var nozzleRad = gs.l2_nozzleAngle * Math.PI / 180;
  // Exhaust goes in nozzle direction, balloon flies opposite
  var flightAngle = nozzleRad + Math.PI;
  var thrust = gs.l2_airPumps * 3;
  gs.l2_balloonVX = Math.cos(flightAngle) * thrust;
  gs.l2_balloonVY = Math.sin(flightAngle) * thrust;
  gs.l2_balloonX = W * 0.5;
  gs.l2_balloonY = H * 0.4;

  // Determine actual direction label
  var dx = gs.l2_balloonVX, dy = gs.l2_balloonVY;
  if (Math.abs(dx) > Math.abs(dy)) gs.l2_actualDir = dx > 0 ? 'right' : 'left';
  else gs.l2_actualDir = dy > 0 ? 'down' : 'up';

  gs.phase = PH_ANIM;
  gs.animT = 0; gs.animDuration = 2.5;
  sndRelease();
  refreshUI();
}

// --- Level 3: skating push ---
function doLevel3Action() {
  if (!gs.l3_prediction) return;
  var impulse = gs.l3_force * L3_PUSH_DURATION;
  gs.l3_aVX = -impulse / gs.l3_massA;
  gs.l3_bVX = impulse / gs.l3_massB;
  gs.l3_aX = 0; gs.l3_bX = 0;
  gs.phase = PH_ANIM;
  gs.animT = 0; gs.animDuration = 2.5;
  sndPush();
  triggerShake(3);
  spawnImpactParticles(W/2, H*0.5);
  refreshUI();
}

// --- Level 4: rocket calculator ---
function doLevel4Action() {
  var rd = L4_ROUNDS[gs.scenario];
  var correctThrust = rd.massFlow * rd.exhaustVel;
  var correctAccel = correctThrust / rd.rocketMass;

  var thrustErr = Math.abs(gs.l4_userThrust - correctThrust) / correctThrust;
  var accelErr = Math.abs(gs.l4_userAccel - correctAccel) / correctAccel;

  var points = 0;
  if (thrustErr < 0.05 && accelErr < 0.1) {
    points = 100; gs.feedback = t('correct'); sndCorrect();
    spawnCorrectParticles(W/2, H/2);
  } else if (thrustErr < 0.15 && accelErr < 0.2) {
    points = 60; gs.feedback = t('partial'); sndCorrect();
  } else {
    points = 10; gs.feedback = t('wrong'); sndWrong(); triggerShake(3);
  }
  gs.feedbackT = 2.0;
  gs.levelScore += points; gs.score += points;

  // Show correct answer
  showResult(
    gs.feedback,
    'T = ' + rd.massFlow + ' x ' + rd.exhaustVel + ' = ' + correctThrust + 'N',
    'a = ' + correctThrust + ' / ' + rd.rocketMass + ' = ' + correctAccel.toFixed(1) + ' m/s\u00b2',
    (lang === 'cn' ? '\u4f60\u7684\u7b54\u6848: T=' : 'Your answer: T=') + gs.l4_userThrust + 'N, a=' + gs.l4_userAccel + 'm/s\u00b2',
    ''
  );

  gs.phase = PH_DONE; gs.animT = 0; gs.animDuration = 1.0;
  updateActionButton(t('next'));
  refreshUI();
}

// --- Level 5: jet car launch ---
function doLevel5Action() {
  gs.l5_carX = 0; gs.l5_carVX = 0; gs.l5_carVY = 0;
  gs.l5_carY = 0;
  gs.l5_simTime = 0; gs.l5_finished = false;
  gs.phase = PH_ANIM;
  gs.animT = 0; gs.animDuration = 8.0;
  sndLaunch();
  refreshUI();
}

    $('hudL2').textContent = lang === 'cn' ? '\u4f5c\u7528\u529b' : 'ACTION';
    $('hudV2').textContent = sc.actionForce + 'N ' + t(sc.actionDir);
    $('hudL3').textContent = lang === 'cn' ? '\u4f60\u7684\u7b54\u6848' : 'YOUR ANS';
    $('hudV3').textContent = gs.l1_chosenMag + 'N ' + t(gs.l1_chosenDir);
  } else if (gs.currentLevel === 2) {
    $('hudL2').textContent = t('airVolume');
    $('hudV2').textContent = gs.l2_airPumps + '/' + L2_ROUNDS[gs.scenario].airMax;
    $('hudL3').textContent = t('nozzleAngle');
    $('hudV3').textContent = gs.l2_nozzleAngle + t('deg');
  } else if (gs.currentLevel === 3) {
    $('hudL2').textContent = 'A: ' + gs.l3_massA + t('kg');
    $('hudV2').textContent = '--';
    $('hudL3').textContent = 'B: ' + gs.l3_massB + t('kg');
    $('hudV3').textContent = '--';
  } else if (gs.currentLevel === 4) {
    var rd = L4_ROUNDS[gs.scenario];
    $('hudL2').textContent = t('massFlow');
    $('hudV2').textContent = rd.massFlow + t('kgps');
    $('hudL3').textContent = t('exhaustVel');
    $('hudV3').textContent = rd.exhaustVel + t('ms');
  } else if (gs.currentLevel === 5) {
    $('hudL2').textContent = t('engines');
    $('hudV2').textContent = gs.l5_engines.length;
    $('hudL3').textContent = t('finish');
    $('hudV3').textContent = L5_FINISH_DIST + 'm';
  }
}

function showResult(title, line1, line2, line3, insight) {
  resultPanel.style.display = 'block';
  $('rpTitle').textContent = title || '';
  $('rpLine1').textContent = line1 || '';
  $('rpLine2').textContent = line2 || '';

// ============================================================
// DRAWING HELPERS
// ============================================================

function drawParallaxBg() {
  var grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#080a10');
  grad.addColorStop(0.5, '#0c0e14');
  grad.addColorStop(1, '#141822');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Parallax stars
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var sx = ((s.x * W + parallaxOffset * s.speed * 20) % W + W) % W;
    var sy = s.y * H;
    // Ambient twinkle
    var twinkle = 0.5 + 0.5 * Math.sin(gs.idleT * 2 + i * 1.7);
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,210,255,' + (s.bright * twinkle) + ')';
    ctx.fill();
  }
}

function drawGroundScene() {
  drawParallaxBg();
  var gy = H * 0.75;
  ctx.strokeStyle = 'rgba(80,255,176,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  ctx.fillStyle = 'rgba(80,255,176,0.03)';
  ctx.fillRect(0, gy, W, H - gy);
  return gy;
}

function drawIceSurface() {
  drawParallaxBg();
  var gy = H * 0.72;
  // Ice surface
  ctx.fillStyle = 'rgba(120,180,220,0.08)';
  ctx.fillRect(0, gy, W, H - gy);
  ctx.strokeStyle = 'rgba(120,200,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  // Ice reflections
  for (var i = 0; i < 8; i++) {
    var ix = (i * W / 8 + parallaxOffset * 5) % W;
    ctx.strokeStyle = 'rgba(160,220,255,0.06)';
    ctx.beginPath(); ctx.moveTo(ix, gy+2); ctx.lineTo(ix + 30, gy+2); ctx.stroke();
  }
  return gy;
}

function drawArrow(x1, y1, x2, y2, color, label, lineW) {
  var dx = x2-x1, dy = y2-y1;
  var len = Math.sqrt(dx*dx+dy*dy);
  if (len < 2) return;
  var headLen = Math.min(12, len*0.3);
  var angle = Math.atan2(dy, dx);
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = lineW || 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1);
  ctx.lineTo(x2 - Math.cos(angle)*headLen*0.5, y2 - Math.sin(angle)*headLen*0.5);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-headLen*Math.cos(angle-0.4), y2-headLen*Math.sin(angle-0.4));
  ctx.lineTo(x2-headLen*Math.cos(angle+0.4), y2-headLen*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fill();
  if (label) {
    ctx.font = '700 10px "Space Grotesk",sans-serif';
    ctx.fillStyle = color;
    var mx = (x1+x2)/2, my = (y1+y2)/2;
    var offX = -dy/len*14, offY = dx/len*14;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, mx+offX, my+offY);
  }
}

function drawDirArrow(cx, cy, dir, length, color, label) {
  var x2=cx, y2=cy;
  if (dir==='up') y2=cy-length;
  else if (dir==='down') y2=cy+length;
  else if (dir==='left') x2=cx-length;
  else if (dir==='right') x2=cx+length;
  drawArrow(cx,cy,x2,y2,color,label);
}

function drawStickFigure(cx, cy, scale, color) {
  var s = scale || 1;
  ctx.strokeStyle = color || '#f6f6fc'; ctx.lineWidth = 2*s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx, cy-28*s, 6*s, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy-22*s); ctx.lineTo(cx, cy-4*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-10*s, cy-16*s); ctx.lineTo(cx+10*s, cy-16*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy-4*s); ctx.lineTo(cx-7*s, cy+8*s); ctx.moveTo(cx, cy-4*s); ctx.lineTo(cx+7*s, cy+8*s); ctx.stroke();
}

function drawSkater(cx, cy, massVal, color, label) {
  var s = 0.8 + massVal / 150;
  s = clamp(s, 0.7, 1.3);
  drawStickFigure(cx, cy, s, color);
  // Skate blades
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx-8*s, cy+8*s); ctx.lineTo(cx-12*s, cy+10*s);
  ctx.moveTo(cx+8*s, cy+8*s); ctx.lineTo(cx+12*s, cy+10*s);
  ctx.stroke();
  // Label
  ctx.font = '700 10px "Space Grotesk",sans-serif';
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(label + ' (' + massVal + 'kg)', cx, cy + 14*s);
}

function drawBalloon(cx, cy, airAmount, maxAir) {
  var ratio = clamp(airAmount / maxAir, 0.15, 1);
  var rx = 12 + ratio * 22;
  var ry = 16 + ratio * 28;
  // Glow (ambient)
  ctx.beginPath(); ctx.ellipse(cx, cy, rx+6, ry+6, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,107,107,0.08)';
  ctx.fill();
  // Body
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  ctx.fillStyle = '#ff6b6b'; ctx.fill();
  ctx.strokeStyle = '#ff9999'; ctx.lineWidth = 1.5; ctx.stroke();
  // Knot
  ctx.beginPath(); ctx.moveTo(cx-3, cy+ry); ctx.lineTo(cx, cy+ry+6); ctx.lineTo(cx+3, cy+ry);
  ctx.fillStyle = '#cc4444'; ctx.fill();
  // Highlight
  ctx.beginPath(); ctx.ellipse(cx-rx*0.3, cy-ry*0.3, rx*0.2, ry*0.15, -0.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
}

function drawNozzle(cx, cy, angle, airAmt) {
  var rad = angle * Math.PI / 180;
  var nLen = 10;
  var nx = cx + Math.cos(rad) * nLen;
  var ny = cy + Math.sin(rad) * nLen;
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nx,ny); ctx.stroke();
  // Nozzle opening
  ctx.beginPath(); ctx.arc(nx, ny, 3, 0, Math.PI*2);
  ctx.fillStyle = '#666'; ctx.fill();
}

function drawRocket(cx, cy, scale) {
  var s = scale || 1;
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.moveTo(cx, cy-18*s); ctx.lineTo(cx+10*s, cy+10*s); ctx.lineTo(cx-10*s, cy+10*s);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy-4*s, 3*s, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(100,200,255,0.6)'; ctx.fill();
  // Fins
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.moveTo(cx-10*s, cy+6*s); ctx.lineTo(cx-16*s, cy+14*s); ctx.lineTo(cx-8*s, cy+10*s);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx+10*s, cy+6*s); ctx.lineTo(cx+16*s, cy+14*s); ctx.lineTo(cx+8*s, cy+10*s);
  ctx.closePath(); ctx.fill();
}

function drawCar(cx, cy, w) {
  w = w || 50;
  var h = 18;
  // Body
  ctx.fillStyle = '#3a7bd5';
  ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h, w, h, 4); ctx.fill();
  // Cabin
  ctx.fillStyle = '#5a9be5';
  ctx.beginPath(); ctx.roundRect(cx-w/4, cy-h-8, w/2, 8, [3,3,0,0]); ctx.fill();
  // Window
  ctx.fillStyle = 'rgba(100,200,255,0.4)';
  ctx.fillRect(cx-w/6, cy-h-6, w/3, 5);
  // Wheels
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx-w/3, cy+2, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+w/3, cy+2, 5, 0, Math.PI*2); ctx.fill();
  // Axle
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(cx-w/3, cy+2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+w/3, cy+2, 2, 0, Math.PI*2); ctx.fill();
}

function drawFeedback() {
  if (gs.feedbackT <= 0 || !gs.feedback) return;
  var alpha = Math.min(1, gs.feedbackT);
  ctx.font = '700 20px "Space Grotesk",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var isGood = gs.feedback.indexOf(t('correct')) >= 0;
  ctx.fillStyle = isGood ? 'rgba(80,255,176,'+alpha+')' : 'rgba(255,181,156,'+alpha+')';
  ctx.fillText(gs.feedback, W/2, H*0.15);
}

// Idle pulse on interactive objects
function idlePulse(cx, cy, radius, colorStr) {
  var pulse = 0.5 + 0.5 * Math.sin(gs.idleT * 3);
  ctx.beginPath(); ctx.arc(cx, cy, radius + pulse * 4, 0, Math.PI*2);
  ctx.strokeStyle = colorStr.replace('1)', (0.15 + pulse * 0.15) + ')');
  ctx.lineWidth = 1.5; ctx.stroke();
}

// Ambient glow
function ambientGlow(cx, cy, radius, r, g, b) {
  var pulse = 0.5 + 0.5 * Math.sin(gs.idleT * 2);
  var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, 'rgba('+r+','+g+','+b+','+(0.12+pulse*0.08)+')');
  grad.addColorStop(1, 'rgba('+r+','+g+','+b+',0)');
  ctx.fillStyle = grad;
  ctx.fillRect(cx-radius, cy-radius, radius*2, radius*2);
}

// LEVEL DRAWING
// ============================================================

function drawLevel1() {
  var gy = drawGroundScene();
  var sc = L1_SCENARIOS[gs.scenario];
  var cx = W/2, cy = gy - 80;

  // Scene title
  ctx.font = '700 13px "Noto Sans SC",sans-serif';
  ctx.fillStyle = '#aaabb0'; ctx.textAlign = 'center';
  ctx.fillText(lang === 'cn' ? sc.title_cn : sc.title_en, cx, 30);

  if (sc.scene === 'swimmerWall') {
    // Wall
    ctx.fillStyle = '#555';
    ctx.fillRect(cx+80, gy-120, 16, 120);
    for (var rr = 0; rr < 6; rr++) {
      ctx.strokeStyle = 'rgba(100,100,100,0.4)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(cx+80, gy-120+rr*20); ctx.lineTo(cx+96, gy-120+rr*20); ctx.stroke();
    }
    ctx.font = '600 11px "Noto Sans SC",sans-serif';
    ctx.fillStyle = '#aaabb0'; ctx.textAlign = 'center';
    ctx.fillText(lang==='cn' ? sc.obj2_cn : sc.obj2_en, cx+88, gy+14);
    // Swimmer
    drawStickFigure(cx-20, cy+20, 1, '#4fc3f7');
    // Arms extended toward wall
    ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-10, cy+4); ctx.lineTo(cx+80, cy+4); ctx.stroke();
    ctx.font = '600 11px "Noto Sans SC",sans-serif'; ctx.fillStyle = '#aaabb0';
    ctx.fillText(lang==='cn' ? sc.obj1_cn : sc.obj1_en, cx-20, cy+40);
    // Action arrow
    drawDirArrow(cx+40, cy-20, 'left', 50, '#ff6b6b', sc.actionForce+'N');
    if (gs.phase === PH_READY) {
      idlePulse(cx+88, cy, 20, 'rgba(80,255,176,1)');
      ambientGlow(cx-20, cy+10, 30, 80, 255, 176);
    }
  } else if (sc.scene === 'hammerNail') {
    ctx.fillStyle = '#aaa'; ctx.fillRect(cx+20, cy-2, 30, 4);
    ctx.beginPath(); ctx.moveTo(cx+50, cy-5); ctx.lineTo(cx+56, cy); ctx.lineTo(cx+50, cy+5);
    ctx.fillStyle = '#888'; ctx.fill();
    ctx.font = '600 11px "Noto Sans SC",sans-serif'; ctx.fillStyle = '#aaabb0'; ctx.textAlign = 'center';
    ctx.fillText(lang==='cn' ? sc.obj2_cn : sc.obj2_en, cx+40, cy+20);
    ctx.fillStyle = '#8b5e3c'; ctx.fillRect(cx-40, cy-4, 30, 8);
    ctx.fillStyle = '#666'; ctx.fillRect(cx-10, cy-10, 18, 20);
    ctx.fillText(lang==='cn' ? sc.obj1_cn : sc.obj1_en, cx-25, cy-20);
    drawDirArrow(cx-10, cy-30, 'right', 60, '#ff6b6b', sc.actionForce+'N');
    if (gs.phase === PH_READY) ambientGlow(cx+40, cy, 25, 80, 255, 176);
  } else if (sc.scene === 'birdWing') {
    // Bird body
    ctx.fillStyle = '#e0c06a';
    ctx.beginPath(); ctx.ellipse(cx, cy-10, 15, 10, 0, 0, Math.PI*2); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(cx+14, cy-18, 6, 0, Math.PI*2);
    ctx.fillStyle = '#e0c06a'; ctx.fill();
    // Beak
    ctx.fillStyle = '#ff9800';
    ctx.beginPath(); ctx.moveTo(cx+20, cy-18); ctx.lineTo(cx+28, cy-16); ctx.lineTo(cx+20, cy-14); ctx.closePath(); ctx.fill();
    // Eye
    ctx.beginPath(); ctx.arc(cx+16, cy-20, 1.5, 0, Math.PI*2);
    ctx.fillStyle = '#000'; ctx.fill();
    // Wings (flapping)
    var flapAngle = Math.sin(gs.idleT * 6) * 0.4;
    ctx.save(); ctx.translate(cx-5, cy-10); ctx.rotate(-0.5+flapAngle);
    ctx.fillStyle = '#c4a63a';
    ctx.beginPath(); ctx.ellipse(0, 0, 25, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.font = '600 11px "Noto Sans SC",sans-serif'; ctx.fillStyle = '#aaabb0'; ctx.textAlign = 'center';
    ctx.fillText(lang==='cn' ? sc.obj1_cn : sc.obj1_en, cx-20, cy+20);
    ctx.fillText(lang==='cn' ? sc.obj2_cn : sc.obj2_en, cx, cy+50);
    drawDirArrow(cx-30, cy+5, 'down', 40, '#ff6b6b', sc.actionForce+'N');
    if (gs.phase === PH_READY) ambientGlow(cx, cy, 35, 80, 255, 176);
  } else if (sc.scene === 'skaterIce') {
    // Ice surface
    ctx.fillStyle = 'rgba(120,180,220,0.06)';
    ctx.fillRect(0, gy, W, H-gy);
    ctx.strokeStyle = 'rgba(120,200,255,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    drawStickFigure(cx-20, cy+20, 1, '#ab47bc');
    // Blade
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-28, cy+28); ctx.lineTo(cx-12, cy+28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+28-40, cy+28); ctx.lineTo(cx+12-40, cy+28); ctx.stroke();
    ctx.font = '600 11px "Noto Sans SC",sans-serif'; ctx.fillStyle = '#aaabb0'; ctx.textAlign = 'center';
    ctx.fillText(lang==='cn' ? sc.obj1_cn : sc.obj1_en, cx-20, cy+42);
    ctx.fillText(lang==='cn' ? sc.obj2_cn : sc.obj2_en, cx+30, gy+14);
    // Push arrow on ice (right)
    drawDirArrow(cx-8, gy-10, 'right', 40, '#ff6b6b', sc.actionForce+'N');
    if (gs.phase === PH_READY) ambientGlow(cx-20, cy+10, 30, 80, 255, 176);
  }

  // Player's reaction arrow (blue)
  if (gs.phase === PH_READY) {
    var arrowLen = Math.max(20, gs.l1_chosenMag / sc.actionForce * 50);
    var arrowCx, arrowCy;
    if (sc.scene === 'swimmerWall') { arrowCx = cx+88; arrowCy = cy-20; }
    else if (sc.scene === 'hammerNail') { arrowCx = cx+40; arrowCy = cy-30; }
    else if (sc.scene === 'birdWing') { arrowCx = cx-5; arrowCy = cy+35; }
    else { arrowCx = cx-20; arrowCy = gy-10; }
    drawDirArrow(arrowCx, arrowCy, gs.l1_chosenDir, arrowLen, '#6baeff', gs.l1_chosenMag+'N');
  }

  // Show correct after submission
  if (gs.phase === PH_DONE) {
    ctx.font = '600 12px "Noto Sans SC",sans-serif';
    ctx.fillStyle = '#50ffb0'; ctx.textAlign = 'center';
    ctx.fillText(
      (lang==='cn' ? '\u6b63\u786e: ' : 'Correct: ') + sc.actionForce + 'N ' + t(sc.reactionDir),
      cx, H*0.9
    );
    // Draw correct arrow in green
    var correctLen = 50;
    var arrowCx2, arrowCy2;
    if (sc.scene === 'swimmerWall') { arrowCx2 = cx+88; arrowCy2 = cy-20; }
    else if (sc.scene === 'hammerNail') { arrowCx2 = cx+40; arrowCy2 = cy-30; }
    else if (sc.scene === 'birdWing') { arrowCx2 = cx-5; arrowCy2 = cy+35; }
    else { arrowCx2 = cx-20; arrowCy2 = gy-10; }
    drawDirArrow(arrowCx2, arrowCy2, sc.reactionDir, correctLen, '#50ffb0', sc.actionForce+'N');
  }
}

function drawLevel2(dt) {
  var gy = drawGroundScene();
  var rd = L2_ROUNDS[gs.scenario];
  var startX = W*0.25, startY = H*0.4;

  if (gs.phase === PH_READY) {
    // Balloon at start
    drawBalloon(startX, startY, gs.l2_airPumps, rd.airMax);
    drawNozzle(startX, startY + 16 + gs.l2_airPumps * 2, gs.l2_nozzleAngle, gs.l2_airPumps);

    // Show nozzle direction arrow
    var nRad = gs.l2_nozzleAngle * Math.PI / 180;
    var aLen = 30;
    drawArrow(startX, startY, startX + Math.cos(nRad)*aLen, startY + Math.sin(nRad)*aLen,
      'rgba(255,181,156,0.6)', (lang==='cn' ? '\u55b7\u5634' : 'Nozzle'), 1.5);

    // Show predicted flight direction (opposite)
    var fRad = nRad + Math.PI;
    drawArrow(startX, startY, startX + Math.cos(fRad)*aLen, startY + Math.sin(fRad)*aLen,
      'rgba(80,255,176,0.4)', (lang==='cn' ? '\u98de\u884c?' : 'Flight?'), 1.5);

    // Idle pulse on balloon
    if (gs.l2_airPumps > 0) idlePulse(startX, startY, 20 + gs.l2_airPumps * 2, 'rgba(255,107,107,1)');

    // Air amount
    ctx.font = '700 12px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#50ffb0'; ctx.textAlign = 'center';
    ctx.fillText(t('airVolume') + ': ' + gs.l2_airPumps + '/' + rd.airMax, startX, gy+20);
  } else if (gs.phase === PH_ANIM) {
    var progress = gs.animT / gs.animDuration;
    var eased = easeOutCubic(Math.min(progress * 1.5, 1));

    // Balloon moves
    var bx = startX + gs.l2_balloonVX * eased * 8;
    var by = startY + gs.l2_balloonVY * eased * 8;
    var remainingAir = Math.max(0, gs.l2_airPumps * (1 - progress * 2));
    drawBalloon(bx, by, remainingAir, rd.airMax);

    // Exhaust particles
    if (progress < 0.6) {
      var nRad2 = gs.l2_nozzleAngle * Math.PI / 180;
      for (var i = 0; i < 3; i++) {
        spawnExhaustParticle(bx + Math.cos(nRad2)*15, by + Math.sin(nRad2)*15, nRad2);
      }
    }

    // Force arrows
    if (progress < 0.4) {
      var nRad3 = gs.l2_nozzleAngle * Math.PI / 180;
      drawArrow(bx, by, bx+Math.cos(nRad3)*40, by+Math.sin(nRad3)*40, '#ff6b6b',
        (lang==='cn' ? '\u7a7a\u6c14\u55b7\u51fa' : 'Air out'), 2);
      drawArrow(bx, by, bx+Math.cos(nRad3+Math.PI)*40, by+Math.sin(nRad3+Math.PI)*40, '#6baeff',
        (lang==='cn' ? '\u63a8\u529b' : 'Thrust'), 2);
    }
  } else if (gs.phase === PH_DONE) {
    var finalBx = startX + gs.l2_balloonVX * 8;
    var finalBy = startY + gs.l2_balloonVY * 8;
    // Clamp to canvas
    finalBx = clamp(finalBx, 30, W-30);
    finalBy = clamp(finalBy, 30, H-30);
    drawBalloon(finalBx, finalBy, 0, rd.airMax);

    ctx.font = '700 13px "Space Grotesk",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#50ffb0';
    ctx.fillText((lang==='cn' ? '\u5b9e\u9645\u65b9\u5411: ' : 'Actual: ') + t(gs.l2_actualDir), W/2, gy+20);
  }
}

function drawLevel3(dt) {
  var gy = drawIceSurface();
  var centerX = W/2;
  var metersToPixels = W * 0.02;

  if (gs.phase === PH_READY) {
    drawSkater(centerX - 35, gy - 20, gs.l3_massA, '#ff6b6b', 'A');
    drawSkater(centerX + 35, gy - 20, gs.l3_massB, '#6baeff', 'B');
    // Push force arrows
    drawArrow(centerX-15, gy-60, centerX+15, gy-60, '#ffb59c', gs.l3_force+'N', 2);
    ctx.font = '600 11px "Noto Sans SC",sans-serif'; ctx.fillStyle = '#aaabb0';
    ctx.textAlign = 'center';
    ctx.fillText(lang==='cn' ? 'A\u63a8B' : 'A pushes B', centerX, gy-72);
    // Idle pulse
    idlePulse(centerX, gy-40, 30, 'rgba(80,255,176,1)');
  } else if (gs.phase === PH_ANIM) {
    var progress = gs.animT / gs.animDuration;
    var eased = easeOutCubic(Math.min(progress * 1.8, 1));
    // Friction deceleration (ice, very low)
    var friction = 0.05 * 9.8;
    var timeStep = gs.animT;

    var vA = gs.l3_aVX;
    var vB = gs.l3_bVX;
    var posA = vA * timeStep;
    var posB = vB * timeStep;
    // Apply friction (slow down)
    if (Math.abs(vA) > 0) posA = vA * timeStep - 0.5 * friction * timeStep * timeStep * (vA > 0 ? 1 : -1);
    if (Math.abs(vB) > 0) posB = vB * timeStep - 0.5 * friction * timeStep * timeStep * (vB > 0 ? 1 : -1);

    var pxA = centerX - 35 + posA * metersToPixels;
    var pxB = centerX + 35 + posB * metersToPixels;

    drawSkater(pxA, gy-20, gs.l3_massA, '#ff6b6b', 'A');
    drawSkater(pxB, gy-20, gs.l3_massB, '#6baeff', 'B');

    // Force arrows at start
    if (progress < 0.25) {
      drawArrow(pxA+10, gy-60, pxB-10, gy-60, '#ff6b6b', (lang==='cn' ? '\u4f5c\u7528\u529b' : 'Action'), 2);
      drawArrow(pxB-10, gy-75, pxA+10, gy-75, '#6baeff', (lang==='cn' ? '\u53cd\u4f5c\u7528\u529b' : 'Reaction'), 2);
    }

    // Velocity labels
    ctx.font = '600 10px "Space Grotesk",sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ff6b6b';
    ctx.fillText('v='+Math.abs(vA).toFixed(2)+'m/s', pxA, gy+20);
    ctx.fillStyle = '#6baeff';
    ctx.fillText('v='+Math.abs(vB).toFixed(2)+'m/s', pxB, gy+20);
  } else if (gs.phase === PH_DONE) {
    var tEnd = gs.animDuration;
    var friction2 = 0.05 * 9.8;
    var finalA = gs.l3_aVX * tEnd - 0.5*friction2*tEnd*tEnd*(gs.l3_aVX > 0 ? 1 : -1);
    var finalB = gs.l3_bVX * tEnd - 0.5*friction2*tEnd*tEnd*(gs.l3_bVX > 0 ? 1 : -1);

    var pxA2 = centerX - 35 + finalA * metersToPixels;
    var pxB2 = centerX + 35 + finalB * metersToPixels;

    drawSkater(pxA2, gy-20, gs.l3_massA, '#ff6b6b', 'A');
    drawSkater(pxB2, gy-20, gs.l3_massB, '#6baeff', 'B');

    ctx.font = '700 12px "Space Grotesk",sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#50ffb0';
    ctx.fillText('A: '+Math.abs(finalA).toFixed(1)+'m  |  B: '+Math.abs(finalB).toFixed(1)+'m', W/2, gy+25);
    ctx.font = '600 11px "Space Grotesk",sans-serif'; ctx.fillStyle = '#aaabb0';
    ctx.fillText('F='+gs.l3_force+'N  |  a_A=F/m_A='+gs.l3_force+'/'+gs.l3_massA+'='+(gs.l3_force/gs.l3_massA).toFixed(2)
      +'  |  a_B='+gs.l3_force+'/'+gs.l3_massB+'='+(gs.l3_force/gs.l3_massB).toFixed(2), W/2, gy+42);
  }
}

function drawLevel4() {
  drawParallaxBg();
  var rd = L4_ROUNDS[gs.scenario];
  var correctThrust = rd.massFlow * rd.exhaustVel;
  var correctAccel = correctThrust / rd.rocketMass;
  var cx = W/2, cy = H * 0.35;

  // Rocket display
  drawRocket(cx, cy, 2.5);
  ambientGlow(cx, cy+16, 40, 255, 130, 50);

  // Problem statement
  ctx.font = '700 14px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#50ffb0'; ctx.textAlign = 'center';
  ctx.fillText(t('massFlow') + ' = ' + rd.massFlow + ' ' + t('kgps'), cx, cy+60);
  ctx.fillText(t('exhaustVel') + ' = ' + rd.exhaustVel + ' ' + t('ms'), cx, cy+80);
  ctx.fillText(t('rocketMass') + ' = ' + rd.rocketMass + ' ' + t('kg'), cx, cy+100);

  // Formula hint
  ctx.font = '600 12px "Space Grotesk",sans-serif';
  ctx.fillStyle = '#ffb59c';
  ctx.fillText('T = m_dot x v_e     a = T / M', cx, cy+130);

  if (gs.phase === PH_READY) {
    idlePulse(cx, cy, 30, 'rgba(80,255,176,1)');
  }

  // Exhaust particles for ambiance
  if (gs.phase === PH_READY && gs.idleT % 0.15 < 0.02) {
    spawnExhaustParticle(cx, cy+16, Math.PI/2);
  }
}

function drawLevel5(dt) {
  var gy = drawGroundScene();
  var trackY = gy - 15;
  var metersToPixels = (W * 0.75) / L5_FINISH_DIST;
  var startX = W * 0.1;
  var finishX = startX + L5_FINISH_DIST * metersToPixels;

  // Track
  ctx.strokeStyle = 'rgba(80,255,176,0.2)'; ctx.lineWidth = 1;
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(startX, trackY); ctx.lineTo(finishX, trackY); ctx.stroke();
  ctx.setLineDash([]);

  // Start line
  ctx.strokeStyle = '#aaabb0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(startX, trackY-20); ctx.lineTo(startX, trackY+5); ctx.stroke();
  ctx.font = '600 9px "Space Grotesk",sans-serif'; ctx.fillStyle = '#aaabb0'; ctx.textAlign = 'center';
  ctx.fillText('0m', startX, trackY+16);

  // Finish line
  ctx.strokeStyle = '#50ffb0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(finishX, trackY-20); ctx.lineTo(finishX, trackY+5); ctx.stroke();
  // Finish flag
  ctx.fillStyle = '#50ffb0';
  ctx.beginPath(); ctx.moveTo(finishX, trackY-20); ctx.lineTo(finishX+15, trackY-14); ctx.lineTo(finishX, trackY-8); ctx.closePath(); ctx.fill();
  ctx.font = '600 9px "Space Grotesk",sans-serif'; ctx.fillStyle = '#50ffb0';
  ctx.fillText(L5_FINISH_DIST+'m', finishX, trackY+16);

  // Distance markers
  for (var dm = 5; dm < L5_FINISH_DIST; dm += 5) {
    var dmx = startX + dm * metersToPixels;
    ctx.strokeStyle = 'rgba(170,171,176,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(dmx, trackY-5); ctx.lineTo(dmx, trackY+3); ctx.stroke();
    ctx.font = '600 8px "Space Grotesk",sans-serif'; ctx.fillStyle = 'rgba(170,171,176,0.3)'; ctx.textAlign = 'center';
    ctx.fillText(dm+'m', dmx, trackY+14);
  }

  if (gs.phase === PH_READY) {
    // Car at start
    drawCar(startX + 25, trackY - 10, 50);
    // Engines on car
    gs.l5_engines.forEach(function(eng, idx) {
      var eY = trackY - 10 - 4 + idx * 6;
      var eX = startX + 10;
      // Small balloon
      ctx.beginPath(); ctx.ellipse(eX, eY, 6, 4, 0, 0, Math.PI*2);
      ctx.fillStyle = ['#ff6b6b','#6baeff','#ffb59c'][idx]; ctx.fill();
      // Nozzle direction
      var nRad = eng.angle * Math.PI / 180;
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(eX, eY);
      ctx.lineTo(eX+Math.cos(nRad)*8, eY+Math.sin(nRad)*8);
      ctx.stroke();
    });
    idlePulse(startX+25, trackY-15, 25, 'rgba(80,255,176,1)');
    ambientGlow(startX+25, trackY-10, 30, 80, 255, 176);
  } else if (gs.phase === PH_ANIM) {
    var simDt = dt;
    // Calculate net thrust from all engines
    var netFx = 0, netFy = 0;
    var totalAir = 0;
    gs.l5_engines.forEach(function(eng) { totalAir += eng.air; });

    // Burn duration proportional to total air
    var burnDuration = totalAir * 0.3;
    var stillBurning = gs.l5_simTime < burnDuration;

    if (stillBurning) {
      gs.l5_engines.forEach(function(eng) {
        var nRad = eng.angle * Math.PI / 180;
        // Thrust opposite to nozzle direction
        var thrustMag = eng.air * 2.0;
        netFx += -Math.cos(nRad) * thrustMag;
        netFy += -Math.sin(nRad) * thrustMag;
      });
    }

    var totalMass = L5_CAR_MASS;
    var ax = netFx / totalMass;
    var ay = netFy / totalMass;
    // Drag
    var drag = 0.1;
    ax -= gs.l5_carVX * drag;

    gs.l5_carVX += ax * simDt;
    gs.l5_carVY += ay * simDt;
    gs.l5_carX += gs.l5_carVX * simDt;
    gs.l5_carY += gs.l5_carVY * simDt;
    gs.l5_carY = clamp(gs.l5_carY, -50, 50); // constrain vertical
    gs.l5_simTime += simDt;

    var carScreenX = startX + 25 + gs.l5_carX * metersToPixels;
    var carScreenY = trackY - 10 + gs.l5_carY;
    carScreenX = clamp(carScreenX, 20, W-20);

    drawCar(carScreenX, carScreenY, 50);

    // Exhaust from each engine
    if (stillBurning) {
      gs.l5_engines.forEach(function(eng, idx) {
        var nRad = eng.angle * Math.PI / 180;
        var eX = carScreenX - 15;
        var eY = carScreenY - 4 + idx * 6;
        if (Math.random() < 0.7) {
          spawnExhaustParticle(eX + Math.cos(nRad)*10, eY + Math.sin(nRad)*10, nRad);
        }
      });
    }

    // Check finish
    if (gs.l5_carX >= L5_FINISH_DIST && !gs.l5_finished) {
      gs.l5_finished = true;
      gs.feedback = t('correct');
      gs.feedbackT = 2.0;
      sndComplete();
      spawnCorrectParticles(finishX, trackY-15);
      triggerShake(3);
      var points = Math.max(20, 100 - Math.floor(gs.l5_simTime * 8));
      gs.levelScore += points; gs.score += points;
      gs.phase = PH_DONE; gs.animDuration = gs.animT;
      showResult(t('levelDone'), (lang==='cn' ? '\u5230\u8fbe\u7ec8\u70b9! \u65f6\u95f4: ' : 'Finished! Time: ') + gs.l5_simTime.toFixed(1) + 's',
        (lang==='cn' ? '\u5f15\u64ce\u6570: ' : 'Engines: ') + gs.l5_engines.length,
        t('levelScore') + ': ' + gs.levelScore, t('insight5'));
      updateActionButton(t('nextLevel'));
      refreshUI();
      return;
    }

    // HUD overlay
    ctx.font = '700 12px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#50ffb0'; ctx.textAlign = 'center';
    ctx.fillText((lang==='cn' ? '\u8ddd\u79bb: ' : 'Dist: ') + gs.l5_carX.toFixed(1) + 'm / ' + L5_FINISH_DIST + 'm', W/2, 30);
    ctx.font = '600 11px "Space Grotesk",sans-serif'; ctx.fillStyle = '#aaabb0';
    ctx.fillText('v=' + gs.l5_carVX.toFixed(1) + 'm/s  t=' + gs.l5_simTime.toFixed(1) + 's', W/2, 48);

    // Parallax movement
    parallaxOffset = gs.l5_carX * 0.05;
  } else if (gs.phase === PH_DONE) {
    var finalCarX = startX + 25 + Math.min(gs.l5_carX, L5_FINISH_DIST) * metersToPixels;
    drawCar(clamp(finalCarX, 20, W-20), trackY-10, 50);
  }

  // Fail: time runs out without finishing
  if (gs.phase === PH_ANIM && gs.animT >= gs.animDuration && !gs.l5_finished) {
    gs.feedback = (lang==='cn' ? '\u672a\u5230\u8fbe\u7ec8\u70b9' : 'Did not finish');
    gs.feedbackT = 2.0;
    sndWrong();
    gs.levelScore += 10; gs.score += 10;
    gs.phase = PH_DONE;
    showResult(gs.feedback,
      (lang==='cn' ? '\u8ddd\u79bb: ' : 'Dist: ') + gs.l5_carX.toFixed(1) + 'm / ' + L5_FINISH_DIST + 'm',
      (lang==='cn' ? '\u8c03\u6574\u5f15\u64ce\u914d\u7f6e\u518d\u8bd5' : 'Adjust engines and retry'), '', t('insight5'));
    updateActionButton(t('next'));
    refreshUI();
  }
}

// ============================================================
// ANIMATION COMPLETION (L2, L3)
// ============================================================

function onLevel2AnimDone() {
  // Check prediction
  var nRad = gs.l2_nozzleAngle * Math.PI / 180;
  var flightAngle = nRad + Math.PI;
  var dx = Math.cos(flightAngle), dy = Math.sin(flightAngle);
  if (Math.abs(dx) > Math.abs(dy)) gs.l2_actualDir = dx > 0 ? 'right' : 'left';
  else gs.l2_actualDir = dy > 0 ? 'down' : 'up';

  // The prediction is whichever direction button the student picks.
  // We check if the nozzle determines clear result
  var points = 0;
  gs.l2_predCorrect = (gs.l2_predictedDir === gs.l2_actualDir);
  if (gs.l2_predCorrect) {
    points = 100; gs.feedback = t('correct'); sndCorrect();
    spawnCorrectParticles(W/2, H/2);
  } else {
    points = 20; gs.feedback = t('wrong') + ' (' + t(gs.l2_actualDir) + ')'; sndWrong();
    triggerShake(3);
  }
  gs.feedbackT = 2.0;
  gs.levelScore += points; gs.score += points;
  gs.phase = PH_DONE;
  updateActionButton(t('next'));
  refreshUI();
}

function onLevel3AnimDone() {
  var distA = Math.abs(gs.l3_aVX * gs.animDuration);
  var distB = Math.abs(gs.l3_bVX * gs.animDuration);
  var actualWinner;
  if (Math.abs(distA - distB) < 0.01) actualWinner = 'same';
  else actualWinner = distA > distB ? 'A' : 'B';

  var points = 0;
  if (gs.l3_prediction === actualWinner) {
    points = 100; gs.feedback = t('correct'); sndCorrect();
    spawnCorrectParticles(W/2, H/2);
  } else {
    points = 20; gs.feedback = t('wrong'); sndWrong();
    triggerShake(3);
  }
  gs.feedbackT = 2.0;
  gs.levelScore += points; gs.score += points;
  gs.phase = PH_DONE;
  updateActionButton(t('next'));
  refreshUI();
}

// ============================================================
// LEVEL 2: prediction (direction buttons appear before release)
// ============================================================

// Override level 2 rebuild to include prediction buttons
var _origRebuild = rebuildControls;
rebuildControls = function() {
  _origRebuild();
  if (gs.currentLevel === 2 && gs.phase === PH_READY) {
    // Insert prediction buttons before the action button
    var actionBtn = document.getElementById('btnAction');
    if (!actionBtn) return;
    var predWrap = document.createElement('div'); predWrap.className = 'dir-btns'; predWrap.id = 'predDirBtns';
    var predLabel = document.createElement('span');
    predLabel.style.cssText = 'font-family:"Space Grotesk",sans-serif;font-size:10px;color:#aaabb0;margin-right:4px;';
    predLabel.textContent = t('predictDir');
    predWrap.appendChild(predLabel);
    ['left','right','up','down'].forEach(function(d) {
      var b = document.createElement('button');
      b.textContent = t(d);
      b.dataset.dir = d;
      if (d === gs.l2_predictedDir) b.className = 'active';
      b.onclick = function() { gs.l2_predictedDir = d; sndClick(); rebuildControls(); };
      predWrap.appendChild(b);
    });
    controlPanel.insertBefore(predWrap, actionBtn);
  }
};

// ============================================================
// MAIN LOOP
// ============================================================

var lastTime = 0;

function mainLoop(ts) {
  var dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0.016;
  lastTime = ts;

  resizeCanvas();
  gs.idleT += dt;

  // Screen shake
  updateShake();
  ctx.save();
  ctx.translate(shakeX, shakeY);

  ctx.clearRect(-10, -10, W+20, H+20);

  // Level transition fade
  if (gs.phase === PH_TRANSITION) {
    gs.transT += dt;
    var tp = gs.transT / gs.transDur;
    if (tp >= 1) {
      initLevel();
      gs.phase = PH_READY;
      rebuildControls();
      refreshUI();
    } else {
      drawParallaxBg();
      ctx.fillStyle = 'rgba(12,14,20,' + (0.5 + 0.5*Math.sin(tp * Math.PI)) + ')';
      ctx.fillRect(0, 0, W, H);
      ctx.font = '700 20px "Space Grotesk",sans-serif';
      ctx.fillStyle = '#50ffb0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(t('level') + ' ' + gs.currentLevel, W/2, H/2);
    }
    ctx.restore();
    requestAnimationFrame(mainLoop);
    return;
  }

  // Update feedback timer
  if (gs.feedbackT > 0) gs.feedbackT -= dt;

  // Update animation
  if (gs.phase === PH_ANIM) {
    gs.animT += dt;
    if (gs.animT >= gs.animDuration) {
      gs.animT = gs.animDuration;
      if (gs.currentLevel === 2) onLevel2AnimDone();
      else if (gs.currentLevel === 3) onLevel3AnimDone();
      // L5 checks inline in drawLevel5
    }
  }

  // Draw current level
  if (gs.currentLevel === 1) drawLevel1();
  else if (gs.currentLevel === 2) drawLevel2(dt);
  else if (gs.currentLevel === 3) drawLevel3(dt);
  else if (gs.currentLevel === 4) drawLevel4();
  else if (gs.currentLevel === 5) drawLevel5(dt);

  // Particles
  updateAndDrawParticles(dt);

  // Feedback
  drawFeedback();

  // All-done overlay
  if (gs.phase === PH_ALL_DONE) {
    ctx.fillStyle = 'rgba(12,14,20,0.85)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '700 24px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#50ffb0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('complete'), W/2, H*0.35);
    ctx.font = '700 18px "Space Grotesk",sans-serif';
    ctx.fillStyle = '#ffb59c';
    ctx.fillText(t('totalScore') + ': ' + gs.score, W/2, H*0.5);
    ctx.font = '600 12px "Noto Sans SC",sans-serif';
    ctx.fillStyle = '#aaabb0';
    ctx.fillText(t('insight1'), W/2, H*0.63);
    ctx.fillText(t('insight3'), W/2, H*0.69);
    ctx.fillText(t('insight4'), W/2, H*0.75);
  }

  ctx.restore();
  requestAnimationFrame(mainLoop);
}

// --- Kick off ---
resizeCanvas();
initLevel();
rebuildControls();
refreshUI();
requestAnimationFrame(mainLoop);
</script>
