<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#ffb59c);text-shadow:0 0 15px var(--glow,rgba(255,181,156,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#aaabb0;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:220px;max-height:35vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:#ffb59c;cursor:pointer;}
.reset-btn{position:fixed;bottom:50px;right:16px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 14px;cursor:pointer;border:none;background:linear-gradient(135deg,#ffb59c,#ff8a6a);color:#1a0e08;letter-spacing:0.1em;}
.reset-btn:hover{transform:scale(1.04);}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide"><h3>GUIDE</h3><div id="guideContent"></div></div>
<button class="reset-btn" id="resetBtn">RESET</button>
<div class="wrapper">
<div class="header"><div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div></div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
</div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W, H;
  var lang = 'cn';

  // Colors (ares_mission)
  var PAL = {
    bg:'#0c0e12', bg2:'#0a0c10', primary:'#ffb59c', secondary:'#00cc88',
    error:'#ff4444', text:'#f6f6fc', muted:'#aaabb0', glow:'rgba(255,181,156,0.3)',
    surface:'rgba(23,26,31,0.92)'
  };

  var i18n = {
    title:{en:'MARS TERRAIN SORT',cn:'火星地形分类'},
    subtitle:{en:'DRAG FEATURES TO CATEGORIES',cn:'拖拽地形特征到正确分类'},
    guide:{en:'Drag each terrain card into the correct category: Earth-like or Mars-unique. Get all 8 correct to win!',
           cn:'把每张地形卡片拖到正确的分类中：地球也有 或 火星独有。全部8张正确即可通关!'},
    earth_cat:{en:'EARTH TOO',cn:'地球也有'},
    mars_cat:{en:'MARS ONLY',cn:'火星独有'},
    correct:{en:'CORRECT!',cn:'正确!'},
    wrong:{en:'TRY AGAIN',cn:'再试试'},
    win:{en:'ALL CORRECT!',cn:'全部正确!'},
    score:{en:'SCORE',cn:'得分'},
    sorted:{en:'SORTED',cn:'已分类'},
    remaining:{en:'REMAINING',cn:'剩余'},
    // terrain features
    t0:{en:'Sand dunes',cn:'沙丘'},
    t1:{en:'Impact craters',cn:'撞击坑'},
    t2:{en:'Basalt rocks',cn:'玄武岩'},
    t3:{en:'Red regolith',cn:'红色风化层'},
    t4:{en:'River valleys',cn:'河谷地形'},
    t5:{en:'Volcanic peaks',cn:'火山山峰'},
    t6:{en:'Dust devils',cn:'尘卷风痕迹'},
    t7:{en:'Polar ice caps',cn:'极地冰盖'},
  };

  function t(key){ return i18n[key] ? i18n[key][lang] : key; }

  // Terrain cards: {id, key, answer:'earth'|'mars', color}
  var allCards = [
    {id:0, key:'t0', answer:'earth', color:'#d4a574'},  // sand dunes - both planets
    {id:1, key:'t1', answer:'earth', color:'#8a7a6a'},  // craters - both
    {id:2, key:'t2', answer:'earth', color:'#5a6a5a'},  // basalt - both
    {id:3, key:'t3', answer:'mars',  color:'#c85a3a'},  // red regolith - Mars
    {id:4, key:'t4', answer:'earth', color:'#4a8a9a'},  // river valleys - both
    {id:5, key:'t5', answer:'earth', color:'#7a5a4a'},  // volcanic - both
    {id:6, key:'t6', answer:'mars',  color:'#b8956a'},  // dust devils - Mars characteristic
    {id:7, key:'t7', answer:'earth', color:'#a0c8e0'},  // polar ice - both
  ];

  var cards = [];
  var dragging = null;
  var dragOffX = 0, dragOffY = 0;
  var score = 0;
  var sorted = 0;
  var feedback = null;
  var feedbackTimer = null;
  var wonGame = false;

  // Category zones
  var earthZone = {x:0, y:0, w:0, h:0};
  var marsZone = {x:0, y:0, w:0, h:0};

  function shuffle(arr){
    for(var i=arr.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    }
    return arr;
  }

  function initCards(){
    cards = [];
    score = 0; sorted = 0; wonGame = false; feedback = null;
    var shuffled = shuffle(allCards.map(function(c){return Object.assign({},c);}));
    var startX = W*0.15;
    var startY = H*0.42;
    var cardW = Math.min(W*0.18, 100);
    var cardH = cardW * 0.65;
    var gap = 8;
    var cols = 4;
    for(var i=0;i<shuffled.length;i++){
      var col = i % cols;
      var row = Math.floor(i / cols);
      shuffled[i].x = startX + col * (cardW + gap);
      shuffled[i].y = startY + row * (cardH + gap + 4);
      shuffled[i].w = cardW;
      shuffled[i].h = cardH;
      shuffled[i].placed = false;
      shuffled[i].correct = null;
      cards.push(shuffled[i]);
    }
    draw();
  }

  function resize(){
    var rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);

    // Update zones
    earthZone = {x:W*0.05, y:H*0.08, w:W*0.4, h:H*0.28};
    marsZone = {x:W*0.55, y:H*0.08, w:W*0.4, h:H*0.28};

    if(cards.length === 0) initCards();
    else draw();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Background
    var bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0, PAL.bg);
    bg.addColorStop(1, PAL.bg2);
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for(var gx=0;gx<W;gx+=30){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<H;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

    // Category zones
    drawZone(earthZone, PAL.secondary, t('earth_cat'));
    drawZone(marsZone, PAL.primary, t('mars_cat'));

    // Cards (unplaced first, then placed)
    for(var i=0;i<cards.length;i++){
      if(cards[i] !== dragging) drawCard(cards[i]);
    }
    if(dragging) drawCard(dragging);

    // Feedback text
    if(feedback){
      ctx.font = '700 18px "Space Grotesk"';
      ctx.textAlign = 'center';
      ctx.fillStyle = feedback.correct ? PAL.secondary : PAL.error;
      ctx.fillText(feedback.correct ? t('correct') : t('wrong'), W*0.5, H*0.85);
    }

    // Win message
    if(wonGame){
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,W,H);
      ctx.font = '700 28px "Space Grotesk"';
      ctx.fillStyle = PAL.secondary;
      ctx.textAlign = 'center';
      ctx.fillText(t('win'), W*0.5, H*0.45);
      ctx.font = '500 16px "Noto Sans SC"';
      ctx.fillStyle = PAL.text;
      ctx.fillText(score+'/'+allCards.length, W*0.5, H*0.55);
    }

    // HUD
    document.getElementById('hudL1').textContent = t('score').toUpperCase();
    document.getElementById('hudV1').textContent = score+'/'+allCards.length;
    document.getElementById('hudL2').textContent = t('sorted').toUpperCase();
    document.getElementById('hudV2').textContent = sorted+'/'+allCards.length;
    document.getElementById('hudL3').textContent = t('remaining').toUpperCase();
    document.getElementById('hudV3').textContent = (allCards.length - sorted);

    // Header
    document.getElementById('title').textContent = t('title');
    document.getElementById('subtitle').textContent = t('subtitle');
    document.getElementById('guideContent').textContent = t('guide');
  }

  function drawZone(zone, color, label){
    ctx.fillStyle = color.replace(')',',0.08)').replace('rgb','rgba');
    if(color.charAt(0)==='#'){
      ctx.fillStyle = hexToRgba(color, 0.08);
    }
    roundRect(ctx, zone.x, zone.y, zone.w, zone.h, 8);
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6,4]);
    roundRect(ctx, zone.x, zone.y, zone.w, zone.h, 8);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = '700 11px "Space Grotesk"';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(label, zone.x+zone.w/2, zone.y+16);
  }

  function drawCard(card){
    var alpha = card.placed ? 0.5 : 1;
    ctx.globalAlpha = alpha;

    // Shadow
    if(!card.placed){
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      roundRect(ctx, card.x+2, card.y+2, card.w, card.h, 6);
      ctx.fill();
    }

    // Card bg
    ctx.fillStyle = card.placed ? (card.correct ? hexToRgba(PAL.secondary,0.3) : hexToRgba(PAL.error,0.3)) : PAL.surface;
    roundRect(ctx, card.x, card.y, card.w, card.h, 6);
    ctx.fill();

    // Color strip
    ctx.fillStyle = card.color;
    roundRect(ctx, card.x, card.y, card.w, 4, 0);
    ctx.fill();

    // Text
    ctx.font = '600 '+ Math.min(12, card.w*0.12) +'px "Noto Sans SC"';
    ctx.fillStyle = PAL.text;
    ctx.textAlign = 'center';
    ctx.fillText(t(card.key), card.x+card.w/2, card.y+card.h/2+4);

    ctx.globalAlpha = 1;
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
    c.closePath();
  }

  function hexToRgba(hex, a){
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  function hitCard(mx, my){
    for(var i=cards.length-1;i>=0;i--){
      var c=cards[i];
      if(!c.placed && mx>=c.x && mx<=c.x+c.w && my>=c.y && my<=c.y+c.h) return c;
    }
    return null;
  }

  function inZone(x,y,zone){
    return x>=zone.x && x<=zone.x+zone.w && y>=zone.y && y<=zone.y+zone.h;
  }

  // Mouse events
  canvas.addEventListener('mousedown', function(e){
    if(wonGame) return;
    var rect=canvas.getBoundingClientRect();
    var mx=(e.clientX-rect.left), my=(e.clientY-rect.top);
    var card = hitCard(mx, my);
    if(card){
      dragging = card;
      dragOffX = mx - card.x;
      dragOffY = my - card.y;
    }
  });

  canvas.addEventListener('mousemove', function(e){
    if(!dragging) return;
    var rect=canvas.getBoundingClientRect();
    dragging.x = (e.clientX-rect.left) - dragOffX;
    dragging.y = (e.clientY-rect.top) - dragOffY;
    draw();
  });

  canvas.addEventListener('mouseup', function(e){
    if(!dragging) return;
    var rect=canvas.getBoundingClientRect();
    var mx=(e.clientX-rect.left), my=(e.clientY-rect.top);
    var card = dragging;
    dragging = null;

    var droppedInEarth = inZone(card.x+card.w/2, card.y+card.h/2, earthZone);
    var droppedInMars = inZone(card.x+card.w/2, card.y+card.h/2, marsZone);

    if(droppedInEarth || droppedInMars){
      var userAnswer = droppedInEarth ? 'earth' : 'mars';
      var isCorrect = (userAnswer === card.answer);
      card.placed = true;
      card.correct = isCorrect;
      sorted++;
      if(isCorrect) score++;

      // Place card neatly in zone
      var zone = droppedInEarth ? earthZone : marsZone;
      var placedInZone = cards.filter(function(c){ return c.placed && inZone(c.x+c.w/2,c.y+c.h/2,zone); }).length;
      card.x = zone.x + 8 + ((placedInZone-1) % 3) * (card.w + 4);
      card.y = zone.y + 24 + Math.floor((placedInZone-1) / 3) * (card.h + 4);

      showFeedback(isCorrect);

      if(sorted >= allCards.length){
        setTimeout(function(){ wonGame = true; draw(); }, 800);
      }
    }
    draw();
  });

  // Touch events
  canvas.addEventListener('touchstart', function(e){
    if(wonGame) return;
    e.preventDefault();
    var touch=e.touches[0];
    var rect=canvas.getBoundingClientRect();
    var mx=touch.clientX-rect.left, my=touch.clientY-rect.top;
    var card=hitCard(mx,my);
    if(card){dragging=card;dragOffX=mx-card.x;dragOffY=my-card.y;}
  },{passive:false});

  canvas.addEventListener('touchmove', function(e){
    if(!dragging) return;
    e.preventDefault();
    var touch=e.touches[0];
    var rect=canvas.getBoundingClientRect();
    dragging.x=touch.clientX-rect.left-dragOffX;
    dragging.y=touch.clientY-rect.top-dragOffY;
    draw();
  },{passive:false});

  canvas.addEventListener('touchend', function(e){
    if(!dragging) return;
    e.preventDefault();
    var card=dragging;
    dragging=null;
    var droppedInEarth=inZone(card.x+card.w/2,card.y+card.h/2,earthZone);
    var droppedInMars=inZone(card.x+card.w/2,card.y+card.h/2,marsZone);
    if(droppedInEarth||droppedInMars){
      var userAnswer=droppedInEarth?'earth':'mars';
      var isCorrect=(userAnswer===card.answer);
      card.placed=true;card.correct=isCorrect;sorted++;
      if(isCorrect) score++;
      var zone=droppedInEarth?earthZone:marsZone;
      var placedInZone=cards.filter(function(c){return c.placed&&inZone(c.x+c.w/2,c.y+c.h/2,zone);}).length;
      card.x=zone.x+8+((placedInZone-1)%3)*(card.w+4);
      card.y=zone.y+24+Math.floor((placedInZone-1)/3)*(card.h+4);
      showFeedback(isCorrect);
      if(sorted>=allCards.length){setTimeout(function(){wonGame=true;draw();},800);}
    }
    draw();
  },{passive:false});

  function showFeedback(correct){
    feedback = {correct:correct};
    clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(function(){ feedback=null; draw(); }, 1200);
  }

  // Language toggle
  document.getElementById('langBtn').addEventListener('click', function(){
    lang = lang==='cn'?'en':'cn';
    this.textContent = lang.toUpperCase();
    draw();
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', function(){
    initCards();
  });

  window.addEventListener('resize', resize);
  document.fonts.ready.then(function(){ resize(); });
  setTimeout(resize, 100);
})();
</script>
</body>
</html>
