<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.game-header{
  padding:8px 16px;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
  display:flex;align-items:center;justify-content:space-between;
}
.game-header h2{
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;
}
.game-header .score{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  color:#00daf3;
}
.game-area{
  flex:1;min-height:0;overflow:hidden;
  display:flex;flex-direction:column;
  padding:10px 16px;
  gap:8px;
}
/* pipeline row */
.pipeline-row{
  display:flex;align-items:center;gap:6px;
  justify-content:center;
  flex-shrink:0;
}
.pipe-module{
  width:90px;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.5px;
  border:1px solid rgba(138,136,134,0.3);
  background:#1c1b1b;
  color:#8a8886;
  cursor:pointer;
  transition:background 0.2s,color 0.2s,border-color 0.2s;
  position:relative;
}
.pipe-module.active{
  color:#131313;
  border-color:currentColor;
}
.pipe-module.checked{
  border-style:solid;
  border-width:2px;
}
.pipe-module.pass{border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.1);}
.pipe-module.fail{border-color:#ff5f1f;color:#ff5f1f;background:rgba(255,95,31,0.1);}
.pipe-arrow{
  font-size:14px;color:#8a8886;
  flex-shrink:0;
}
.pipe-arrow.active-arrow{color:#00daf3;}

/* detail panel */
.detail-panel{
  flex:1;min-height:0;
  display:flex;gap:10px;
  overflow:hidden;
}
.detail-left{
  flex:1;min-width:0;
  background:rgba(28,27,27,0.6);
  backdrop-filter:blur(8px);
  border:1px solid rgba(138,136,134,0.12);
  padding:10px;
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.detail-right{
  width:240px;flex-shrink:0;
  background:rgba(28,27,27,0.6);
  backdrop-filter:blur(8px);
  border:1px solid rgba(138,136,134,0.12);
  padding:10px;
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.section-title{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:6px;
}
.data-block{
  background:#1c1b1b;
  border:1px solid rgba(138,136,134,0.15);
  padding:8px;
  font-family:'Inter',monospace;font-size:11px;
  color:#c6c6c6;
  margin-bottom:8px;
  white-space:pre-wrap;
  line-height:1.5;
}
.data-block .highlight{color:#00daf3;font-weight:700;}
.data-block .error-text{color:#ff5f1f;font-weight:700;}

/* check buttons */
.check-row{
  display:flex;gap:8px;
  margin-top:8px;
  flex-wrap:wrap;
}
.check-btn{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:6px 14px;cursor:pointer;letter-spacing:0.5px;
  border:1px solid rgba(138,136,134,0.3);
  background:transparent;color:#e5e2e1;
}
.check-btn:hover{background:#353534;}
.check-btn.selected{border-color:#00daf3;color:#00daf3;background:rgba(0,218,243,0.08);}
.check-btn.correct{border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.1);}
.check-btn.wrong{border-color:#ff5f1f;color:#ff5f1f;background:rgba(255,95,31,0.1);}

.confirm-btn{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:8px 20px;cursor:pointer;letter-spacing:1px;
  border:1px solid #ffb59c;
  background:transparent;color:#ffb59c;
  margin-top:10px;
  align-self:flex-start;
}
.confirm-btn:hover{background:rgba(255,181,156,0.1);}
.confirm-btn:disabled{opacity:0.3;cursor:not-allowed;}

.feedback-text{
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  margin-top:8px;line-height:1.6;
  min-height:40px;
}
.feedback-text.pass-text{color:#10b981;}
.feedback-text.fail-text{color:#ff5f1f;}

/* completion panel */
.completion-panel{
  display:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(19,19,19,0.92);
  backdrop-filter:blur(16px);
  z-index:200;
  justify-content:center;align-items:center;
}
.completion-panel.show{display:flex;}
.completion-card{
  background:#1c1b1b;
  border:1px solid rgba(138,136,134,0.2);
  padding:32px 40px;
  max-width:420px;text-align:center;
}
.completion-card h2{
  font-family:'Space Grotesk',sans-serif;font-size:20px;
  color:#ffb59c;margin-bottom:12px;letter-spacing:2px;
}
.completion-card .final-score{
  font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;
  color:#00daf3;margin:16px 0;
}
.completion-card p{
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  color:#c6c6c6;line-height:1.6;
}
.completion-card .retry-btn{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;cursor:pointer;letter-spacing:1px;
  border:1px solid #ffb59c;
  background:transparent;color:#ffb59c;
  margin-top:20px;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideGoal"></p>
    <ul>
      <li id="guideStep1"></li>
      <li id="guideStep2"></li>
      <li id="guideStep3"></li>
    </ul>
    <p id="guideTips" style="margin-top:8px;font-style:italic;opacity:0.8;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="game-header">
    <h2 id="gameTitle"></h2>
    <span class="score" id="scoreDisplay"></span>
  </div>
  <div class="game-area">
    <div class="pipeline-row" id="pipelineRow"></div>
    <div class="detail-panel">
      <div class="detail-left" id="detailLeft">
        <div class="section-title" id="inputTitle"></div>
        <div class="data-block" id="inputData"></div>
        <div class="section-title" id="outputTitle"></div>
        <div class="data-block" id="outputData"></div>
      </div>
      <div class="detail-right" id="detailRight">
        <div class="section-title" id="questionTitle"></div>
        <p id="questionText" style="font-size:13px;line-height:1.6;margin-bottom:8px;font-family:'Noto Sans SC',sans-serif;"></p>
        <div class="check-row" id="checkRow"></div>
        <button class="confirm-btn" id="confirmBtn" disabled></button>
        <div class="feedback-text" id="feedbackText"></div>
      </div>
    </div>
  </div>
</div>

<div class="completion-panel" id="completionPanel">
  <div class="completion-card">
    <h2 id="completionTitle"></h2>
    <div class="final-score" id="finalScore"></div>
    <p id="completionMsg"></p>
    <button class="retry-btn" id="retryBtn"></button>
  </div>
</div>

    output:{en:'UPDATED PIPELINE\n---------\nAction: feed new image to perception\nExpected: new risk map + new path\nLoop iteration: #2\nAll interface formats unchanged',
            cn:'\u66f4\u65b0\u6d41\u6c34\u7ebf\n---------\n\u52a8\u4f5c: \u5c06\u65b0\u56fe\u50cf\u9001\u5165\u611f\u77e5\u6a21\u5757\n\u9884\u671f: \u65b0\u98ce\u9669\u56fe + \u65b0\u8def\u5f84\n\u5faa\u73af\u8fed\u4ee3: #2\n\u6240\u6709\u63a5\u53e3\u683c\u5f0f\u4e0d\u53d8'},

             cn:'\u91cd\u89c4\u5212\u56de\u5230\u8d77\u70b9\uff1a\u65b0\u4f20\u611f\u5668\u6570\u636e\u9996\u5148\u8fdb\u5165\u611f\u77e5\u6a21\u5757\uff0c\u7136\u540e\u91cd\u65b0\u6d41\u7ecf\u6574\u6761\u6d41\u6c34\u7ebf\u3002'}

/* game state */
var currentModule = 0;
var moduleResults = [null,null,null,null,null]; /* null=unchecked, true=pass, false=fail */
var score = 0;
var selectedOption = -1;
var answered = false;

/* ── build pipeline row ── */
function buildPipelineRow(){
  var row = document.getElementById('pipelineRow');
  row.innerHTML = '';
  for(var i=0;i<5;i++){
    if(i>0){
      var arrow = document.createElement('span');
      arrow.className = 'pipe-arrow' + (i<=currentModule?' active-arrow':'');
      arrow.textContent = '\u2192';
      arrow.id = 'pipeArrow'+(i-1);
      row.appendChild(arrow);
    }
    var mod = document.createElement('div');
    mod.className = 'pipe-module';
    mod.id = 'pipeMod'+i;
    mod.dataset.idx = i;
    mod.style.borderColor = MODULES[i].color+'44';
    if(i===currentModule){
      mod.classList.add('active');
      mod.style.background = MODULES[i].color+'22';
      mod.style.color = MODULES[i].color;
      mod.style.borderColor = MODULES[i].color;
    }
    if(moduleResults[i]===true){
      mod.classList.add('checked','pass');
    } else if(moduleResults[i]===false){
      mod.classList.add('checked','fail');
    }
    mod.textContent = tArr('modNames',i);
    (function(idx){
      mod.addEventListener('click',function(){
        if(answered || idx===currentModule) return;
        /* only allow clicking completed or current */
      });
    })(i);
    row.appendChild(mod);
  }
}

/* ── render current module detail ── */
function renderModule(){
  var m = MODULES[currentModule];
  document.getElementById('inputTitle').textContent = t('inputLabel');
  document.getElementById('inputData').textContent = LANG==='cn' ? m.input.cn : m.input.en;
  document.getElementById('outputTitle').textContent = t('outputLabel');
  document.getElementById('outputData').textContent = LANG==='cn' ? m.output.cn : m.output.en;

  document.getElementById('questionTitle').textContent = t('checkLabel');
  document.getElementById('questionText').textContent = LANG==='cn' ? m.question.cn : m.question.en;

  var checkRow = document.getElementById('checkRow');
  checkRow.innerHTML = '';
  var opts = LANG==='cn' ? m.options.cn : m.options.en;
  opts.forEach(function(opt,i){
    var btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = opt;
    btn.dataset.idx = i;
    btn.addEventListener('click',function(){
      if(answered) return;
      selectedOption = parseInt(this.dataset.idx);
      var btns = checkRow.querySelectorAll('.check-btn');
      btns.forEach(function(b){b.classList.remove('selected');});
      this.classList.add('selected');
      document.getElementById('confirmBtn').disabled = false;
    });
    checkRow.appendChild(btn);
  });

  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('feedbackText').textContent = '';
  document.getElementById('feedbackText').className = 'feedback-text';
  selectedOption = -1;
  answered = false;
}

/* ── confirm answer ── */
function onConfirm(){
  if(selectedOption < 0 || answered) return;
  answered = true;
  var m = MODULES[currentModule];
  var correct = selectedOption === m.correct;
  moduleResults[currentModule] = correct;
  if(correct) score += 20;

  /* highlight correct/wrong */
  var btns = document.getElementById('checkRow').querySelectorAll('.check-btn');
  btns.forEach(function(b,i){
    if(i===m.correct) b.classList.add('correct');
    else if(i===selectedOption && !correct) b.classList.add('wrong');
  });

  var fb = document.getElementById('feedbackText');
  if(correct){
    fb.textContent = t('passMsg') + ' ' + (LANG==='cn' ? m.explain.cn : m.explain.en);
    fb.className = 'feedback-text pass-text';
  } else {
    fb.textContent = t('failMsg') + ' ' + (LANG==='cn' ? m.explain.cn : m.explain.en);
    fb.className = 'feedback-text fail-text';
  }

  updateScore();
  buildPipelineRow();

  /* auto advance after delay */
  setTimeout(function(){
    if(currentModule < 4){
      currentModule++;
      renderModule();
      buildPipelineRow();
    } else {
      showCompletion();
    }
  }, 2500);
}

function updateScore(){
  document.getElementById('scoreDisplay').textContent = t('score') + ': ' + score + '/100';
}

function showCompletion(){
  document.getElementById('completionTitle').textContent = t('completionTitle');
  document.getElementById('finalScore').textContent = score + '/100';
  document.getElementById('completionMsg').textContent = t('completionMsg');
  document.getElementById('retryBtn').textContent = t('retry');
  document.getElementById('completionPanel').classList.add('show');
}

function resetGame(){
  currentModule = 0;
  moduleResults = [null,null,null,null,null];
  score = 0;
  selectedOption = -1;
  answered = false;
  document.getElementById('completionPanel').classList.remove('show');
  updateScore();
  buildPipelineRow();
  renderModule();
}

/* ── event bindings ── */
document.getElementById('confirmBtn').addEventListener('click', onConfirm);
document.getElementById('retryBtn').addEventListener('click', resetGame);

/* ── guide toggle ── */
(function(){
  var tog=document.getElementById('guideToggle');
  var gc=document.getElementById('guideContent');
  if(tog&&gc){
    document.getElementById('guideHeader').addEventListener('click',function(){
      var collapsed=gc.classList.toggle('collapsed');
      tog.textContent=collapsed?'[+]':'[-]';
    });
  }
})();

/* ── i18n refresh ── */
function refreshI18N(){
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  document.getElementById('gameTitle').textContent=t('gameTitle');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideGoal').textContent=t('guideGoal');
  document.getElementById('guideStep1').textContent=t('guideStep1');
  document.getElementById('guideStep2').textContent=t('guideStep2');
  document.getElementById('guideStep3').textContent=t('guideStep3');
  document.getElementById('guideTips').textContent=t('guideTips');
  document.getElementById('confirmBtn').textContent=t('confirm');
  updateScore();
  buildPipelineRow();
  renderModule();
}
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  refreshI18N();
});

/* ── init ── */
refreshI18N();

})();
</script>
