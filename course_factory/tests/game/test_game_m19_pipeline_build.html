<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>预处理流水线工程师 — 把脏脑波洗成干净信号</title>
<style>
:root{
  --paper:#FAF9F5; --paper-2:#F1EDDF; --card:#FFFFFF;
  --ink:#191814; --ink-2:#2B2924; --sub:#6B6557; --sub-2:#9D978A;
  --border:#EBE5D6; --border-2:#D9D1BD; --hairline:#F2EDE0;
  /* domain accent: computing #C04E68 */
  --primary:#C04E68; --primary-ink:#8F3149; --primary-soft:#F8E7EC; --primary-line:#ECC4CF;
  --ok:#3F7A52; --ok-soft:#E0EBE2; --ok-line:#BFD8C6;
  --bad:#B5462F; --bad-soft:#F3DED6; --bad-line:#E4BDAE;
  --warn:#9A7A1E; --warn-soft:#F3ECD3; --warn-line:#E0D0A0;
  --shadow-sm:0 1px 2px 0 rgba(25,24,20,.04);
  --shadow:0 1px 3px 0 rgba(25,24,20,.06),0 1px 2px -1px rgba(25,24,20,.04);
  --shadow-md:0 4px 8px -2px rgba(25,24,20,.07),0 2px 4px -2px rgba(25,24,20,.04);
  --shadow-lg:0 14px 30px -8px rgba(25,24,20,.12),0 4px 10px -4px rgba(25,24,20,.06);
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:'PingFang SC','Inter','Noto Sans SC',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--paper);
  font-family:var(--sans);color:var(--ink);}
.wrapper{display:flex;height:100vh;}

/* ── 200px sidebar: block tray + run/reset + langBtn ── */
.game-sidebar{
  width:200px;flex-shrink:0;height:100vh;overflow-y:auto;
  background:var(--paper-2);border-right:1px solid var(--border);
  padding:14px 12px;display:flex;flex-direction:column;gap:12px;
}
.brand{display:flex;flex-direction:column;gap:3px;}
.brand .kicker{font-family:var(--mono);font-size:9.5px;letter-spacing:1.6px;
  color:var(--primary-ink);text-transform:uppercase;}
.brand .title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.25;}
.brand .sub{font-size:10.5px;color:var(--sub);line-height:1.4;}

.tray h3,.task-box h3{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;
  color:var(--sub);text-transform:uppercase;margin-bottom:6px;}
.tray{display:flex;flex-direction:column;gap:6px;}
.tray-list{display:flex;flex-direction:column;gap:6px;min-height:22px;
  border:1.5px dashed transparent;border-radius:8px;transition:border-color .18s;}
.tray-list.over{border-color:var(--primary-line);}
.block{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:8px;
  background:var(--card);border:1.5px solid var(--border);font-size:11px;color:var(--ink-2);
  cursor:grab;transition:border-color .18s,box-shadow .18s,transform .12s;box-shadow:var(--shadow-sm);
  user-select:none;}
.block:hover{border-color:var(--primary-line);box-shadow:var(--shadow-md);}
.block:active{cursor:grabbing;}
.block.dragging{opacity:.35;}
.block .glyph{width:22px;height:22px;flex-shrink:0;border-radius:6px;
  background:var(--primary-soft);border:1px solid var(--primary-line);
  display:flex;align-items:center;justify-content:center;}
.block .glyph svg{width:13px;height:13px;}
.block .b-lbl{line-height:1.25;}

.task-box{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;box-shadow:var(--shadow-sm);}
.task-box p{font-size:11px;line-height:1.55;color:var(--ink-2);}

.spacer{flex:1;min-height:6px;}
.ctrl-row{display:flex;flex-direction:column;gap:7px;}
.btn{font-family:var(--mono);font-size:11.5px;letter-spacing:.5px;padding:10px;border-radius:8px;
  border:1.5px solid var(--border-2);cursor:pointer;transition:all .18s;background:var(--card);color:var(--ink-2);}
.btn:hover:not(:disabled){background:var(--primary-soft);border-color:var(--primary-line);color:var(--primary-ink);}
.btn:disabled{opacity:.5;cursor:default;}
.btn.run{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn.run:hover:not(:disabled){background:var(--primary-ink);border-color:var(--primary-ink);color:#fff;}
.lang-btn{font-family:var(--mono);font-size:11px;letter-spacing:.5px;
  padding:9px 10px;border-radius:7px;background:var(--card);border:1px solid var(--border-2);
  color:var(--ink-2);cursor:pointer;transition:all .2s;}
.lang-btn:hover{background:var(--primary-soft);border-color:var(--primary-line);color:var(--primary-ink);}

/* ── main: pipeline canvas + data flow viewer ── */
.game-main{flex:1;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  padding:20px 24px;gap:14px;}

.head{display:flex;align-items:center;gap:14px;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:13px 18px;box-shadow:var(--shadow);}
.head .icon{width:44px;height:44px;flex-shrink:0;border-radius:11px;
  background:var(--primary-soft);border:1px solid var(--primary-line);
  display:flex;align-items:center;justify-content:center;}
.head .icon svg{width:24px;height:24px;}
.head .meta{display:flex;flex-direction:column;gap:2px;}
.head .name{font-size:13.5px;font-weight:700;color:var(--ink);}
.head .desc{font-size:11.5px;color:var(--sub);line-height:1.45;}
.head .status{margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;
  padding:6px 12px;border-radius:20px;background:var(--paper-2);border:1px solid var(--border-2);
  color:var(--sub);white-space:nowrap;}
.head .status.fail{background:var(--bad-soft);border-color:var(--bad-line);color:var(--bad);}
.head .status.win{background:var(--ok-soft);border-color:var(--ok-line);color:var(--ok);}

/* pipeline canvas */
.canvas-wrap{flex:1;display:flex;flex-direction:column;min-height:0;gap:14px;}

.pipeline{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;box-shadow:var(--shadow-md);}
.pipeline .lane-title{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;
  color:var(--primary-ink);text-transform:uppercase;margin-bottom:10px;}
.lane{display:flex;align-items:stretch;gap:0;}
.src,.sink{flex-shrink:0;width:86px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;padding:10px 6px;border-radius:10px;
  background:var(--paper-2);border:1px dashed var(--border-2);}
.src .tag,.sink .tag{font-family:var(--mono);font-size:9px;letter-spacing:.8px;color:var(--sub);text-transform:uppercase;}
.src .wave,.sink .wave{width:62px;height:24px;}
.flow-mid{flex:1;display:flex;align-items:center;gap:0;padding:0 4px;min-width:0;}
.slot{flex:1;min-width:0;min-height:78px;border-radius:10px;border:1.5px dashed var(--border-2);
  background:var(--paper);margin:0 4px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;position:relative;transition:border-color .18s,background .18s,box-shadow .18s;}
.slot .slot-num{position:absolute;top:5px;left:7px;font-family:var(--mono);font-size:9px;color:var(--sub-2);}
.slot .placeholder{font-size:10px;color:var(--sub-2);text-align:center;padding:0 6px;line-height:1.3;}
.slot.over{border-color:var(--primary);background:var(--primary-soft);}
.slot.filled{border-style:solid;border-color:var(--border-2);background:var(--card);box-shadow:var(--shadow-sm);}
.slot.active{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
.slot.clean-step{border-color:var(--ok-line);background:var(--ok-soft);}
.slot.dirty-step{border-color:var(--bad-line);background:var(--bad-soft);}
.placed{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;user-select:none;padding:6px 4px;width:100%;}
.placed .glyph{width:24px;height:24px;border-radius:7px;background:var(--primary-soft);
  border:1px solid var(--primary-line);display:flex;align-items:center;justify-content:center;}
.placed .glyph svg{width:14px;height:14px;}
.placed .p-lbl{font-size:9.5px;color:var(--ink-2);text-align:center;line-height:1.2;max-width:88px;}
.placed .p-eff{font-family:var(--mono);font-size:8.5px;color:var(--sub);}
.arrow{flex-shrink:0;width:18px;display:flex;align-items:center;justify-content:center;color:var(--border-2);transition:color .2s;}
.arrow svg{width:14px;height:14px;}
.arrow.flowing{color:var(--primary);}

/* signal viewer */
.viewer{flex:1;min-height:0;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px;}
.viewer .v-head{display:flex;align-items:center;justify-content:space-between;}
.viewer .v-title{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;
  color:var(--sub);text-transform:uppercase;}
.metrics{display:flex;gap:16px;}
.metric{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.metric .m-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);}
.metric .m-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.6px;color:var(--sub-2);text-transform:uppercase;}
.metric.good .m-val{color:var(--ok);}
.metric.poor .m-val{color:var(--bad);}
.canvas-host{flex:1;min-height:0;display:flex;flex-direction:column;}
#scope{width:100%;height:100%;display:block;border-radius:8px;background:var(--paper-2);
  border:1px solid var(--border);}

/* log / verdict */
.log{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;box-shadow:var(--shadow-sm);min-height:42px;display:flex;align-items:center;gap:10px;}
.log .badge{font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:4px 8px;border-radius:6px;
  background:var(--paper-2);border:1px solid var(--border-2);color:var(--sub);text-transform:uppercase;flex-shrink:0;}
.log .badge.fail{background:var(--bad-soft);border-color:var(--bad-line);color:var(--bad);}
.log .badge.win{background:var(--ok-soft);border-color:var(--ok-line);color:var(--ok);}
.log .msg{font-size:12px;line-height:1.5;color:var(--ink-2);}

@media (max-height:720px){
  .src .wave,.sink .wave{height:18px;}
  .slot{min-height:64px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <!-- ── 200px sidebar ── -->
  <aside class="game-sidebar">
    <div class="brand">
      <div class="kicker" data-i18n="kicker">EEG · 预处理</div>
      <div class="title" data-i18n="title">流水线工程师</div>
      <div class="sub" data-i18n="brandSub">把处理块按正确顺序串成预处理管线</div>
    </div>

    <div class="tray">
      <h3 data-i18n="trayTitle">处理块库</h3>
      <div class="tray-list" id="trayList"></div>
    </div>

    <div class="task-box">
      <h3 data-i18n="taskTitle">任务</h3>
      <p data-i18n="taskBody">把 4 个处理块拖入 4 个槽位，顺序决定脏脑波能否被洗净。点执行让信号流过管线。</p>
    </div>

    <div class="spacer"></div>

    <div class="ctrl-row">
      <button class="btn run" id="runBtn" disabled data-i18n="runBtn">执行管线</button>
      <button class="btn" id="resetBtn" data-i18n="resetBtn">重置</button>
      <button class="lang-btn" id="langBtn">EN / 中</button>
    </div>
  </aside>

  <!-- ── main: pipeline canvas + data flow viewer ── -->
  <main class="game-main">
    <div class="head">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8F3149" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h3l2-6 4 12 3-9 2 3h4"/>
        </svg>
      </div>
      <div class="meta">
        <div class="name" data-i18n="headName">原始脑波：脏数据一段</div>
        <div class="desc" data-i18n="headDesc">含 50Hz 工频、慢漂移、眨眼伪迹，需经预处理才能用</div>
      </div>
      <div class="status" id="statusPill" data-i18n="statusIdle">待执行</div>
    </div>

    <div class="canvas-wrap">
      <div class="pipeline">
        <div class="lane-title" data-i18n="laneTitle">预处理管线（从左到右流过）</div>
        <div class="lane">
          <div class="src">
            <div class="tag" data-i18n="srcTag">脏脑波</div>
            <svg class="wave" id="srcWave" viewBox="0 0 62 24"></svg>
          </div>
          <div class="arrow" id="arrIn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </div>
          <div class="flow-mid" id="flowMid"></div>
          <div class="arrow" id="arrOut">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </div>
          <div class="sink">
            <div class="tag" data-i18n="sinkTag">输出</div>
            <svg class="wave" id="sinkWave" viewBox="0 0 62 24"></svg>
          </div>
        </div>
      </div>

      <div class="viewer">
        <div class="v-head">
          <div class="v-title" data-i18n="viewerTitle">信号示波器 — 逐级变化</div>
          <div class="metrics">
            <div class="metric" id="mSnr"><span class="m-val" id="snrVal">--</span><span class="m-lbl">SNR dB</span></div>
            <div class="metric" id="mArt"><span class="m-val" id="artVal">--</span><span class="m-lbl" data-i18n="artLbl">残余伪迹%</span></div>
          </div>
        </div>
        <div class="canvas-host">
          <canvas id="scope"></canvas>
        </div>
      </div>

      <div class="log">
        <span class="badge" id="logBadge" data-i18n="logBadgeIdle">提示</span>
        <span class="msg" id="logMsg" data-i18n="logIdle">拖块入槽，凑齐 4 块后点「执行管线」。处理顺序错了，污染会一路传下去。</span>
      </div>
    </div>
  </main>
</div>

<script>

  "use strict";

  var I18N = {

  var arrOut   = document.getElementById("arrOut");
  var srcWaveEl= document.getElementById("srcWave");
  var sinkWaveEl=document.getElementById("sinkWave");

  // ── apply i18n to static [data-i18n] nodes ──
  function applyStaticI18n(){
    var nodes = document.querySelectorAll("[data-i18n]");
    nodes.forEach(function(el){
      var k = el.getAttribute("data-i18n");
      var v = t(k);
      if (typeof v === "string") el.textContent = v;
    });
    document.documentElement.lang = (lang==="zh")?"zh":"en";
  }

  // ── build tray ──
  function renderTray(){
    trayList.innerHTML = "";
    trayState.forEach(function(id){
      var b = I18N[lang].blocks[id];
      var el = document.createElement("div");
      el.className = "block";
      el.setAttribute("draggable","true");
      el.dataset.id = id;
      el.innerHTML = '<span class="glyph">'+GLYPH[id]+'</span><span class="b-lbl">'+b.name+'</span>';
      el.addEventListener("dragstart", function(e){ onDragStart(e, id, "tray"); });
      el.addEventListener("dragend", onDragEnd);
      trayList.appendChild(el);
    });
  }

  // ── build slots ──
  function renderSlots(){
    flowMid.innerHTML = "";
    for (var i=0;i<4;i++){
      if (i>0){
        var arr = document.createElement("div");
        arr.className = "arrow";
        arr.dataset.arr = String(i);
        arr.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
        flowMid.appendChild(arr);
      }
      var slot = document.createElement("div");
      slot.className = "slot";
      slot.dataset.slot = String(i);
      var id = slots[i];
      var numEl = document.createElement("span");
      numEl.className = "slot-num";
      numEl.textContent = "0"+(i+1);
      slot.appendChild(numEl);

      if (id){
        slot.classList.add("filled");
        var b = I18N[lang].blocks[id];
        var p = document.createElement("div");
        p.className = "placed";
        p.setAttribute("draggable","true");
        p.dataset.id = id;
        p.innerHTML = '<span class="glyph">'+GLYPH[id]+'</span>'+
                      '<span class="p-lbl">'+b.name+'</span>'+
                      '<span class="p-eff">'+b.eff+'</span>';
        (function(idx){
          p.addEventListener("dragstart", function(e){ onDragStart(e, slots[idx], idx); });
          p.addEventListener("dragend", onDragEnd);
        })(i);
        slot.appendChild(p);
      } else {
        var ph = document.createElement("span");
        ph.className = "placeholder";
        ph.textContent = t("placeholder");
        slot.appendChild(ph);
      }
      (function(idx, slotEl){
        slotEl.addEventListener("dragover", function(e){ e.preventDefault(); slotEl.classList.add("over"); });
        slotEl.addEventListener("dragleave", function(){ slotEl.classList.remove("over"); });
        slotEl.addEventListener("drop", function(e){ e.preventDefault(); slotEl.classList.remove("over"); onDropSlot(idx); });
      })(i, slot);
      flowMid.appendChild(slot);
    }
    updateRunBtn();
  }

  // ── tray as drop target (return a block) ──
  trayList.addEventListener("dragover", function(e){ e.preventDefault(); trayList.classList.add("over"); });
  trayList.addEventListener("dragleave", function(){ trayList.classList.remove("over"); });
  trayList.addEventListener("drop", function(e){ e.preventDefault(); trayList.classList.remove("over"); onDropTray(); });

  function onDragStart(e, id, from){
    if (running || won) { e.preventDefault(); return; }
    dragId = id; dragFrom = from;
    try { e.dataTransfer.setData("text/plain", String(id)); e.dataTransfer.effectAllowed = "move"; } catch(_){}
    if (e.target && e.target.classList) e.target.classList.add("dragging");
  }
  function onDragEnd(e){
    if (e.target && e.target.classList) e.target.classList.remove("dragging");
  }

  function onDropSlot(idx){
    if (running || won || dragId===null) return;
    var moving = dragId;
    var existing = slots[idx];
    if (dragFrom === "tray"){
      var pos = trayState.indexOf(moving);
      if (pos>=0) trayState.splice(pos,1);
      if (existing) trayState.push(existing);
      slots[idx] = moving;
    } else {
      var srcIdx = dragFrom;
      if (srcIdx === idx){ clearDrag(); return; }
      slots[srcIdx] = existing; // may be null -> swap
      slots[idx] = moving;
    }
    clearDrag();
    resetVerdict();
    renderTray(); renderSlots();
  }

  function onDropTray(){
    if (running || won || dragId===null) return;
    if (dragFrom !== "tray" && typeof dragFrom === "number"){
      slots[dragFrom] = null;
      if (trayState.indexOf(dragId)<0) trayState.push(dragId);
    }
    clearDrag();
    resetVerdict();
    renderTray(); renderSlots();
  }

  function clearDrag(){ dragId=null; dragFrom=null; }

  function updateRunBtn(){
    var full = slots.every(function(s){ return s!==null; });
    runBtn.disabled = !full || running || won;
  }

  function resetVerdict(){
    if (won) return;
    setStatus("idle");
    setLog("idle", t("logIdle"));
    var ss = flowMid.querySelectorAll(".slot");
    ss.forEach(function(s){ s.classList.remove("clean-step","dirty-step","active"); });
  }

  function setStatus(kind){
    statusPill.classList.remove("fail","win");
    if (kind==="idle"){ statusPill.textContent = t("statusIdle"); }
    else if (kind==="run"){ statusPill.textContent = t("statusRun"); }
    else if (kind==="fail"){ statusPill.textContent = t("statusFail"); statusPill.classList.add("fail"); }
    else if (kind==="win"){ statusPill.textContent = t("statusWin"); statusPill.classList.add("win"); }
  }
  function setLog(kind, msg){
    logBadge.classList.remove("fail","win");
    if (kind==="idle"){ logBadge.textContent=t("logBadgeIdle"); }
    else if (kind==="fail"){ logBadge.textContent=t("logBadgeFail"); logBadge.classList.add("fail"); }
    else if (kind==="win"){ logBadge.textContent=t("logBadgeWin"); logBadge.classList.add("win"); }
    logMsg.textContent = msg;
  }

  // ════════════════════════════════════════════════════════════════
  //  Signal model — a dirty EEG segment + per-block transforms.
  //  Each sample tracks separable contaminant channels so order-
  //  dependent pollution propagation is modeled honestly.
  // ════════════════════════════════════════════════════════════════
  var N = 320;
  function buildDirty(){
    var arr = [];
    for (var i=0;i<N;i++){
      var x = i/N;
      var neural = Math.sin(x*Math.PI*2*9)*0.55 + Math.sin(x*Math.PI*2*16)*0.18;
      // icaQuality: set when ICA runs — "clean" only if line already removed.
      arr.push({ neural:neural, line:1, drift:1, blink:1, driftJump:false, icaClean:false });
    }
    return arr;
  }
  function lineComp(i){ var x=i/N; return Math.sin(x*Math.PI*2*50)*0.45; }
  function driftComp(i){ var x=i/N; return (x-0.5)*1.6 + Math.sin(x*Math.PI*2*0.6)*0.35; }
  function blinkComp(i){
    var b=0; var centers=[70,210];
    for (var c=0;c<centers.length;c++){
      var d=i-centers[c];
      if (d>=-6) b += 1.4*Math.exp(-(d*d)/110);
    }
    return b;
  }
  function sampleVal(seg, i){
    var v = seg[i].neural;
    if (seg[i].line)  v += seg[i].line  * lineComp(i);
    if (seg[i].drift) v += seg[i].drift * driftComp(i);
    if (seg[i].blink) v += seg[i].blink * blinkComp(i);
    if (seg[i].driftJump) v += 1.2;
    return v;
  }

  function applyBlock(seg, id, prior){
    if (id==="bandpass"){
      for (var i=0;i<seg.length;i++){ seg[i].line=0; seg[i].drift=0; }
      return;
    }
    if (id==="slice"){
      var filteredFirst = prior.indexOf("bandpass") >= 0;
      for (var j=0;j<seg.length;j++){
        if (!filteredFirst && (j%80<3)) seg[j].driftJump = true;
      }
      return;
    }
    if (id==="ica"){
      // Decomposition quality is decided NOW: a clean blink IC is only
      // obtained if 50Hz line noise was already filtered out. If ICA runs
      // on un-filtered data it absorbs line noise into the components and
      // the blink IC is corrupted — captured per-sample, propagates forward.
      var lineAlreadyGone = prior.indexOf("bandpass") >= 0;
      for (var m=0;m<seg.length;m++){ seg[m].icaClean = lineAlreadyGone; }
      return;
    }
    if (id==="reject"){
      // Can only drop the blink IC if ICA ran AND produced a clean decomposition.
      var icaOk = prior.indexOf("ica") >= 0;
      for (var k=0;k<seg.length;k++){
        if (icaOk && seg[k].icaClean) seg[k].blink = 0;
      }
      return;
    }
  }

  function residualArtifact(seg){
    var line=0, drift=0, blink=0, jump=0;
    for (var i=0;i<seg.length;i++){
      if (seg[i].line)  line  += Math.abs(lineComp(i));
      if (seg[i].drift) drift += Math.abs(driftComp(i));
      if (seg[i].blink) blink += Math.abs(blinkComp(i));
      if (seg[i].driftJump) jump += 0.5;
    }
    return (line+drift+blink+jump)/N*4;
  }

  function getCss(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#000";
  }

  // ── draw scope: stacked traces for each pipeline stage ──
  function drawScope(stages){
    var dpr = window.devicePixelRatio||1;
    var rect = scope.getBoundingClientRect();
    var W = Math.max(320, rect.width), H = Math.max(110, rect.height);
    scope.width = Math.round(W*dpr); scope.height = Math.round(H*dpr);
    var ctx = scope.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    var n = stages.length || 1;
    var rowH = H/n;
    stages.forEach(function(st, r){
      var y0 = rowH*r;
      var mid = y0 + rowH*0.58;
      ctx.strokeStyle = getCss('--hairline'); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(W,mid); ctx.stroke();
      ctx.fillStyle = getCss('--sub-2');
      ctx.font = "9px 'JetBrains Mono', monospace";
      ctx.fillText(st.label, 6, y0+12);
      ctx.strokeStyle = st.color; ctx.lineWidth=1.4;
      ctx.beginPath();
      var amp = rowH*0.34;
      for (var i=0;i<N;i++){
        var v = sampleVal(st.seg, i);
        var px = (i/(N-1))*(W-12)+6;
        var py = mid - v*amp/2.6;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });
  }

  function drawSpark(svgEl, seg, color){
    var pts=[];
    for (var i=0;i<N;i+=6){
      var v=sampleVal(seg,i);
      var px = (i/(N-1))*60+1;
      var py = 12 - v*3.0;
      py = Math.max(2, Math.min(22, py));
      pts.push(px.toFixed(1)+","+py.toFixed(1));
    }
    svgEl.innerHTML = '<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+color+'" stroke-width="1.2" stroke-linejoin="round"/>';
  }

  function classifyFailure(order){
    var iFilter = order.indexOf("bandpass");
    var iSlice  = order.indexOf("slice");
    var iICA    = order.indexOf("ica");
    var iReject = order.indexOf("reject");
    if (iICA < iFilter) return "failICAbeforeFilter";
    if (iReject < iICA) return "failRejectBeforeICA";
    if (iSlice < iFilter) return "failSliceBeforeFilter";
    return "failGeneric";
  }

  // is this block constructive given the prior steps?
  function stepIsConstructive(id, prior){
    if (id==="bandpass") return true;
    if (id==="slice")    return prior.indexOf("bandpass")>=0;
    if (id==="ica")      return prior.indexOf("bandpass")>=0;
    if (id==="reject")   return prior.indexOf("ica")>=0 && prior.indexOf("bandpass")>=0;
    return false;
  }

  function cloneSeg(seg){
    return seg.map(function(s){ return Object.assign({}, s); });
  }

  // ════════════════════════════════════════════════════════════════
  //  RUN: flow the dirty signal through, stage by stage, animated.
  // ════════════════════════════════════════════════════════════════
  var flowTimer = null;
  function runPipeline(){
    if (running || won) return;
    var order = slots.slice();
    if (order.some(function(s){ return s===null; })) return;
    running = true;
    updateRunBtn();
    setStatus("run");
    setLog("idle", t("flowStart"));
    flowMid.querySelectorAll(".slot").forEach(function(s){ s.classList.remove("clean-step","dirty-step","active"); });
    arrIn.classList.add("flowing"); arrOut.classList.remove("flowing");

    var isCorrect = CORRECT.every(function(id,i){ return order[i]===id; });

    var seg = buildDirty();
    var stages = [{ label: lang==="zh"?"脏脑波":"dirty", seg: cloneSeg(seg), color: getCss('--bad') }];
    drawScope(stages);
    drawSpark(srcWaveEl, seg, getCss('--bad'));

    var step = 0;
    if (flowTimer) clearInterval(flowTimer);
    flowTimer = setInterval(function(){
      if (step >= order.length){
        clearInterval(flowTimer); flowTimer=null;
        finishRun(order, isCorrect, seg);
        return;
      }
      var id = order[step];
      var prior = order.slice(0, step);
      applyBlock(seg, id, prior);

      var slotEls = flowMid.querySelectorAll(".slot");
      slotEls.forEach(function(s){ s.classList.remove("active"); });
      var goodHere = stepIsConstructive(id, prior);
      var thisSlot = slotEls[step];
      if (thisSlot){
        thisSlot.classList.add("active");
        thisSlot.classList.add(goodHere ? "clean-step" : "dirty-step");
      }
      var arrEl = flowMid.querySelector('[data-arr="'+step+'"]');
      if (arrEl) arrEl.classList.add("flowing");

      setLog("idle", I18N[lang].stepOk[id]);

      var col = goodHere ? getCss('--ok') : getCss('--bad');
      var lbl = (lang==="zh"?"第":"S")+(step+1)+" · "+I18N[lang].blocks[id].name;
      stages.push({ label: lbl, seg: cloneSeg(seg), color: col });
      drawScope(stages);
      step++;
    }, 740);
  }

  function finishRun(order, isCorrect, seg){
    arrIn.classList.remove("flowing");
    arrOut.classList.add("flowing");
    var resid = residualArtifact(seg);
    var artPct = Math.round(Math.min(100, resid*100));
    var snr = 14 - resid*60;
    snr = Math.max(-4, Math.min(18, snr));
    snrVal.textContent = snr.toFixed(1);
    artVal.textContent = String(artPct);

    mSnr.classList.remove("good","poor"); mArt.classList.remove("good","poor");
    var clean = isCorrect && artPct <= 6;
    if (clean){ mSnr.classList.add("good"); mArt.classList.add("good"); }
    else { mSnr.classList.add("poor"); mArt.classList.add("poor"); }

    drawSpark(sinkWaveEl, seg, clean? getCss('--ok'): getCss('--bad'));

    if (clean){
      won = true;
      setStatus("win");
      setLog("win", t("verdictWin"));
    } else {
      setStatus("fail");
      setLog("fail", t(classifyFailure(order)));
    }
    running = false;
    updateRunBtn();
  }

  // ── reset ──
  function doReset(){
    if (flowTimer){ clearInterval(flowTimer); flowTimer=null; }
    slots = [null,null,null,null];
    trayState = BLOCK_IDS.slice();
    running = false; won = false;
    clearDrag();
    snrVal.textContent = "--"; artVal.textContent = "--";
    mSnr.classList.remove("good","poor"); mArt.classList.remove("good","poor");
    arrIn.classList.remove("flowing"); arrOut.classList.remove("flowing");
    setStatus("idle");
    setLog("idle", t("logIdle"));
    renderTray(); renderSlots();
    var d = buildDirty();
    drawScope([{ label: lang==="zh"?"脏脑波":"dirty", seg:d, color:getCss('--bad') }]);
    drawSpark(srcWaveEl, d, getCss('--bad'));
    sinkWaveEl.innerHTML = "";
  }

  // ── lang toggle ──
  function toggleLang(){
    lang = (lang==="zh") ? "en" : "zh";
    applyStaticI18n();
    renderTray(); renderSlots();
    if (won){ setStatus("win"); setLog("win", t("verdictWin")); }
    else if (running){ setStatus("run"); }
    else { setStatus("idle"); setLog("idle", t("logIdle")); }
    if (!running && !won){
      var d=buildDirty();
      drawScope([{ label: lang==="zh"?"脏脑波":"dirty", seg:d, color:getCss('--bad') }]);
      drawSpark(srcWaveEl, d, getCss('--bad'));
    }
  }

  // ── wire events ──
  runBtn.addEventListener("click", runPipeline);
  resetBtn.addEventListener("click", doReset);
  langBtn.addEventListener("click", toggleLang);
  window.addEventListener("resize", function(){
    if (!running && !won){
      var d=buildDirty();
      drawScope([{ label: lang==="zh"?"脏脑波":"dirty", seg:d, color:getCss('--bad') }]);
    }
  });

  // ── init ──
  applyStaticI18n();
  renderTray();
  renderSlots();
  requestAnimationFrame(function(){
    var d=buildDirty();
    drawScope([{ label: lang==="zh"?"脏脑波":"dirty", seg:d, color:getCss('--bad') }]);
    drawSpark(srcWaveEl, d, getCss('--bad'));
  });

})();
</script>
</body>
</html>
