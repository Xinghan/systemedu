<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>频谱侦探 · Spectrum Detective</title>
<style>
  :root{
    --bg-0: oklch(0.18 0.03 250);
    --bg-1: oklch(0.23 0.035 250);
    --field:    oklch(0.78 0.13 215);
    --wave:     oklch(0.55 0.13 215);
    --mass:     oklch(0.35 0.10 215);
    --photon:   oklch(0.92 0.08 215);
    --constant: oklch(0.85 0.14 85);
    --ink: oklch(0.95 0.01 250);
    --ink-dim: oklch(0.70 0.02 250);
    --line: oklch(0.40 0.04 250);
    --good: oklch(0.78 0.15 150);
    --bad:  oklch(0.65 0.18 25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg-0);
    color:var(--ink);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;
    display:flex;
    height:100vh;
    overflow:hidden;
  }
  /* ---------- sidebar ---------- */
  .game-sidebar{
    width:200px;
    flex-shrink:0;
    background:var(--bg-1);
    border-right:2px solid var(--line);
    display:flex;
    flex-direction:column;
    padding:18px 16px;
    gap:16px;
  }
  .mascot{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .mascot svg{width:62px;height:62px}
  .mascot-name{
    font-size:13px;
    letter-spacing:1px;
    color:var(--field);
    font-weight:700;
  }
  .mascot-role{
    font-size:10px;
    color:var(--ink-dim);
    text-align:center;
    line-height:1.4;
  }
  .panel-title{
    font-size:11px;
    letter-spacing:2px;
    color:var(--ink-dim);
    text-transform:uppercase;
    border-bottom:1px solid var(--line);
    padding-bottom:6px;
  }
  .progress-list{
    display:flex;
    flex-direction:column;
    gap:7px;
  }
  .prog-item{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:11px;
    color:var(--ink-dim);
  }
  .prog-dot{
    width:12px;height:12px;
    border:2px solid var(--line);
    border-radius:50%;
    flex-shrink:0;
  }
  .prog-item.active .prog-dot{border-color:var(--field);background:var(--field)}
  .prog-item.active{color:var(--ink)}
  .prog-item.solved .prog-dot{border-color:var(--good);background:var(--good)}
  .prog-item.solved{color:var(--ink)}
  .prog-item.wrong .prog-dot{border-color:var(--bad);background:var(--bad)}
  .case-file{
    margin-top:auto;
    font-size:10px;
    color:var(--ink-dim);
    line-height:1.5;
    border-top:1px solid var(--line);
    padding-top:12px;
  }
  .case-file b{color:var(--constant)}
  #langBtn{
    font-family:inherit;
    font-size:11px;
    letter-spacing:1px;
    background:transparent;
    color:var(--field);
    border:1px solid var(--field);
    padding:7px 0;
    cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);
  }
  #langBtn:hover{background:var(--field);color:var(--bg-0)}
  /* ---------- main ---------- */
  .game-main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:22px 28px;
    gap:16px;
    min-width:0;
  }
  .head-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:18px;
  }
  .head-row h1{
    font-size:20px;
    letter-spacing:1px;
    color:var(--field);
    font-weight:700;
  }
  .core-q{
    font-size:12px;
    color:var(--ink-dim);
    max-width:340px;
    text-align:right;
    line-height:1.4;
  }
  .scope{
    flex:1;
    display:flex;
    flex-direction:column;
    background:var(--bg-1);
    border:2px solid var(--line);
    box-shadow:5px 5px 0 var(--bg-0);
    min-height:0;
  }
  .scope-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 14px;
    border-bottom:1px solid var(--line);
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:1px;
  }
  .scope-bar .trace-id{color:var(--constant)}
  .canvas-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    position:relative;
  }
  canvas{display:block;width:100%;flex:1}
  .verdict{
    min-height:42px;
    font-size:13px;
    line-height:1.5;
    padding:0 2px;
    display:flex;
    align-items:center;
  }
  .verdict.good{color:var(--good)}
  .verdict.bad{color:var(--bad)}
  .verdict.hint{color:var(--ink-dim)}
  .options{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
  }
  .opt{
    font-family:inherit;
    background:var(--bg-1);
    color:var(--ink);
    border:2px solid var(--line);
    padding:12px 8px;
    cursor:pointer;
    text-align:left;
    box-shadow:3px 3px 0 var(--bg-0);
    transition:transform .08s;
    min-height:84px;
  }
  .opt:hover:not(:disabled){border-color:var(--field);transform:translate(-1px,-1px)}
  .opt:disabled{cursor:default;opacity:.55}
  .opt.picked-good{border-color:var(--good);background:color-mix(in oklch,var(--good) 18%,var(--bg-1))}
  .opt.picked-bad{border-color:var(--bad);background:color-mix(in oklch,var(--bad) 18%,var(--bg-1))}
  .opt .freq{
    font-size:11px;
    color:var(--field);
    letter-spacing:1px;
  }
  .opt .label{
    font-size:13px;
    font-weight:700;
    margin:5px 0 3px;
  }
  .opt .desc{
    font-size:10px;
    color:var(--ink-dim);
    line-height:1.35;
  }
  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #nextBtn,#restartBtn{
    font-family:inherit;
    font-size:12px;
    letter-spacing:1px;
    padding:9px 20px;
    cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);
  }
  #nextBtn{
    background:var(--field);
    color:var(--bg-0);
    border:none;
    font-weight:700;
  }
  #nextBtn:disabled{background:var(--mass);color:var(--ink-dim);cursor:default}
  #restartBtn{
    background:transparent;
    color:var(--constant);
    border:1px solid var(--constant);
    display:none;
  }
  .badge{
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:1px;
  }
  .badge b{color:var(--constant)}
  .solved-banner{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
  }
  .solved-banner h2{
    font-size:26px;
    letter-spacing:2px;
    color:var(--constant);
  }
  .solved-banner p{
    font-size:13px;
    color:var(--ink-dim);
    max-width:460px;
    line-height:1.6;
  }
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="mascot">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <line x1="22" y1="42" x2="22" y2="14" stroke="var(--field)" stroke-width="4" stroke-linecap="round"/>
        <line x1="42" y1="42" x2="42" y2="14" stroke="var(--field)" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="42" x2="46" y2="42" stroke="var(--field)" stroke-width="4" stroke-linecap="round"/>
        <line x1="32" y1="46" x2="32" y2="56" stroke="var(--field)" stroke-width="4" stroke-linecap="round"/>
        <path d="M6 30 Q14 18 22 30 T38 30" fill="none" stroke="var(--photon)" stroke-width="2" opacity="0.8"/>
        <path d="M42 30 Q50 18 58 30" fill="none" stroke="var(--constant)" stroke-width="2" opacity="0.8"/>
      </svg>
      <div class="mascot-name">ECHO</div>
      <div class="mascot-role" data-i18n="mascotRole">频谱侦探的搭档<br>读懂每条波的峰</div>
    </div>

    <div class="panel-title" data-i18n="casesTitle">案卷进度</div>
    <div class="progress-list" id="progressList"></div>

    <div class="case-file">
      <span data-i18n="caseHint">线索: 看主导峰落在<b> 哪个频段</b>, 推断这段脑波的状态。</span>
    </div>

    <button id="langBtn" data-i18n="langBtn">EN / 中</button>
  </aside>

  <main class="game-main">
    <div class="head-row">
      <h1 data-i18n="title">频谱侦探</h1>
      <div class="core-q" data-i18n="coreQ">核心问题: 哪个频段的“快慢”在图里最强 —— 谁就是脑子现在的状态?</div>
    </div>

    <div class="scope">
      <div class="scope-bar">
        <span data-i18n="scopeLabel">功率谱密度 PSD · 1–35 Hz</span>
        <span class="trace-id" id="traceId">案卷 01 / 06</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="psd"></canvas>
      </div>
    </div>

    <div class="verdict hint" id="verdict" data-i18n="prompt">读出主导峰所在频段, 选出对应的脑波状态。</div>

    <div class="options" id="options"></div>

    <div class="solved-banner" id="solvedBanner">
      <h2 data-i18n="badgeUnlock">频谱侦探 已解锁</h2>
      <p id="solvedText" data-i18n="solvedText">六张谱图全部判读正确。你已经能只凭峰的位置, 读出脑子在放松、专注、困倦还是被伪迹污染。</p>
    </div>

    <div class="footer-row">
      <span class="badge" id="badge"></span>
      <div>
        <button id="restartBtn" data-i18n="restart">重新侦办</button>
        <button id="nextBtn" disabled data-i18n="next">下一案卷</button>
      </div>
    </div>
  </main>

<script>
(function(){
  "use strict";

  // ---------- i18n ----------
  var lang = "zh";
  var I18N = {
    zh:{
      mascotRole:"频谱侦探的搭档<br>读懂每条波的峰",
      casesTitle:"案卷进度",
      caseHint:"线索: 看主导峰落在<b> 哪个频段</b>, 推断这段脑波的状态。",
      title:"频谱侦探",
      coreQ:"核心问题: 哪个频段的“快慢”在图里最强 —— 谁就是脑子现在的状态?",
      scopeLabel:"功率谱密度 PSD · 1–35 Hz",
      prompt:"读出主导峰所在频段, 选出对应的脑波状态。",
      next:"下一案卷",
      restart:"重新侦办",
      langBtn:"EN / 中",
      badgeUnlock:"频谱侦探 已解锁",
      solvedText:"六张谱图全部判读正确。你已经能只凭峰的位置, 读出脑子在放松、专注、困倦还是被伪迹污染。"
    },
    en:{
      mascotRole:"Your spectrum-reading<br>partner. Reads every peak.",
      casesTitle:"Case Files",
      caseHint:"Clue: see which <b>frequency band</b> the dominant peak sits in, then infer the brain state.",
      title:"Spectrum Detective",
      coreQ:"Core question: which band's rhythm is strongest in the plot — that is the brain's current state.",
      scopeLabel:"Power Spectral Density PSD · 1–35 Hz",
      prompt:"Read where the dominant peak sits, then pick the matching brain state.",
      next:"Next Case",
      restart:"Reopen Cases",
      langBtn:"EN / 中",
      badgeUnlock:"Spectrum Detective unlocked",
      solvedText:"All six spectra read correctly. You can now name the brain state — relaxed, focused, drowsy or artifact-spoiled — from peak position alone."
    }
  };

  // ---------- option dictionary (5 states) ----------
  var STATES = [
    {key:"alpha", freq:"~10 Hz", zh:"放松闭眼", en:"Relaxed, eyes closed",
      zhDesc:"alpha 峰主导", enDesc:"alpha peak dominates"},
    {key:"beta", freq:"~20 Hz", zh:"专注", en:"Focused",
      zhDesc:"beta 宽带升高", enDesc:"broad beta rise"},
    {key:"theta", freq:"~6 Hz", zh:"困倦", en:"Drowsy",
      zhDesc:"theta 峰主导", enDesc:"theta peak dominates"},
    {key:"flat", freq:"无峰 / no peak", zh:"睁眼警觉", en:"Eyes open, alert",
      zhDesc:"谱图平坦", enDesc:"flat spectrum"},
    {key:"delta", freq:"< 4 Hz", zh:"眨眼伪迹", en:"Blink artifact",
      zhDesc:"超低频巨大", enDesc:"huge sub-band power"}
  ];

  function stateByKey(k){ for(var i=0;i<STATES.length;i++){ if(STATES[i].key===k) return STATES[i]; } return null; }

  // ---------- cases (6) ----------
  var CASES = [
    {answer:"alpha", peakHz:10, peakAmp:1.0, width:1.4,
      zhFb:"对。10 Hz 一根尖峰 = alpha 节律, 这是闭眼放松的招牌。",
      enFb:"Correct. A sharp 10 Hz peak is the alpha rhythm — the hallmark of relaxed, eyes-closed."},
    {answer:"beta", peakHz:21, peakAmp:0.62, width:5.5,
      zhFb:"对。20 Hz 附近一片抬高而非尖峰 = beta 宽带, 提示正在专注。",
      enFb:"Correct. A broad rise around 20 Hz (not a spike) is beta band — a sign of active focus."},
    {answer:"theta", peakHz:6, peakAmp:0.92, width:1.6,
      zhFb:"对。峰挪到 6 Hz = theta, 比 alpha 更慢, 提示困倦/走神。",
      enFb:"Correct. The peak slid down to 6 Hz — theta, slower than alpha, signalling drowsiness."},
    {answer:"flat", peakHz:0, peakAmp:0, width:1,
      zhFb:"对。没有明显峰、整体压平 = 睁眼警觉, alpha 被抑制。",
      enFb:"Correct. No clear peak, flattened spectrum — eyes open and alert, alpha suppressed."},
    {answer:"delta", peakHz:2, peakAmp:1.0, width:1.0,
      zhFb:"对。能量全砸在 4 Hz 以下 = 眨眼伪迹, 不是真脑节律, 要先清掉。",
      enFb:"Correct. Power dumped below 4 Hz — a blink artifact, not a true rhythm; clean it first."},
    {answer:"alpha", peakHz:9.5, peakAmp:0.95, width:1.5,
      zhFb:"对。约 10 Hz 的清晰峰再次出现 = alpha, 受试者又闭眼放松了。",
      enFb:"Correct. The clear ~10 Hz peak is back — alpha again; the subject relaxed with eyes closed."}
  ];

  // why-wrong targeted feedback
  function wrongFeedback(c, pickedKey){
    var s = stateByKey(pickedKey);
    var label = lang==="zh"? s.zh : s.en;
    if(lang==="zh"){
      var why = {
        alpha:"但峰不在 10 Hz。", beta:"但没有 20 Hz 的宽带抬高。",
        theta:"但峰不在 6 Hz 附近。", flat:"但图里其实有明显峰。",
        delta:"但 4 Hz 以下没有巨大能量。"
      }[pickedKey] || "";
      return "判错了 — 你选了 “"+label+"”。"+why+" 后续分析会沿这个错误状态跑偏 —— 再看一次主导峰在哪。";
    } else {
      var whyE = {
        alpha:"But the peak is not at 10 Hz.", beta:"But there is no broad 20 Hz rise.",
        theta:"But the peak is not near 6 Hz.", flat:"But the plot does have a clear peak.",
        delta:"But there is no huge power below 4 Hz."
      }[pickedKey] || "";
      return "Wrong — you picked “"+label+"”. "+whyE+" Downstream analysis would chase the wrong state — re-read where the dominant peak sits.";
    }
  }

  // ---------- DOM ----------
  var canvas = document.getElementById("psd");
  var ctx = canvas.getContext("2d");
  var optionsEl = document.getElementById("options");
  var progressEl = document.getElementById("progressList");
  var verdictEl = document.getElementById("verdict");
  var nextBtn = document.getElementById("nextBtn");
  var restartBtn = document.getElementById("restartBtn");
  var traceEl = document.getElementById("traceId");
  var badgeEl = document.getElementById("badge");
  var bannerEl = document.getElementById("solvedBanner");
  var scopeEl = document.querySelector(".scope");
  var langBtn = document.getElementById("langBtn");

  var current = 0;
  var answered = false;
  var results = [];
  var bannerVisible = false;

  function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

  // ---------- canvas sizing ----------
  function resize(){
    var wrap = canvas.parentElement;
    var r = wrap.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(2, Math.floor(r.width * dpr));
    canvas.height = Math.max(2, Math.floor(r.height * dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawSpectrum(CASES[current]);
  }

  function powerAt(hz, c){
    var oneOverF = 0.42 / (hz + 1.2);
    var peak = 0;
    if(c.peakAmp > 0){
      var d = (hz - c.peakHz) / (c.width);
      peak = c.peakAmp * Math.exp(-0.5 * d * d);
    }
    return oneOverF + peak;
  }

  function drawSpectrum(c){
    var w = canvas.clientWidth, h = canvas.clientHeight;
    if(w<=0||h<=0) return;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = cssVar("--bg-1");
    ctx.fillRect(0,0,w,h);

    var padL = 46, padR = 18, padT = 16, padB = 30;
    var x0 = padL, x1 = w - padR, y0 = h - padB, y1 = padT;
    var fmin = 1, fmax = 35;
    var pmax = 1.45;

    function fx(hz){ return x0 + (hz - fmin)/(fmax-fmin) * (x1-x0); }
    function fy(p){ return y0 - (p/pmax) * (y0-y1); }

    var bands = [
      {lo:1, hi:4,  col:"--mass"},
      {lo:4, hi:8,  col:"--wave"},
      {lo:8, hi:13, col:"--field"},
      {lo:13,hi:35, col:"--photon"}
    ];
    ctx.globalAlpha = 0.10;
    for(var b=0;b<bands.length;b++){
      ctx.fillStyle = cssVar(bands[b].col);
      ctx.fillRect(fx(bands[b].lo), y1, fx(bands[b].hi)-fx(bands[b].lo), y0-y1);
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = cssVar("--line");
    ctx.lineWidth = 1;
    ctx.fillStyle = cssVar("--ink-dim");
    ctx.font = "11px 'JetBrains Mono',monospace";
    ctx.textAlign = "center";
    var ticks = [5,10,15,20,25,30,35];
    for(var t=0;t<ticks.length;t++){
      var xx = fx(ticks[t]);
      ctx.globalAlpha = 0.35;
      ctx.beginPath(); ctx.moveTo(xx,y1); ctx.lineTo(xx,y0); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillText(ticks[t]+"", xx, y0+18);
    }
    ctx.textAlign = "right";
    ctx.fillText("Hz", x1, y0+18);
    ctx.save();
    ctx.translate(14, (y0+y1)/2);
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = "center";
    ctx.fillText("Power", 0, 0);
    ctx.restore();

    ctx.strokeStyle = cssVar("--ink-dim");
    ctx.beginPath();
    ctx.moveTo(x0,y1); ctx.lineTo(x0,y0); ctx.lineTo(x1,y0);
    ctx.stroke();

    // fill under curve
    ctx.beginPath();
    var first = true;
    for(var hz=fmin; hz<=fmax; hz+=0.25){
      var jitter = (Math.sin(hz*7.3)+Math.cos(hz*3.1))*0.012;
      var p = powerAt(hz,c) + jitter;
      var px = fx(hz), py = fy(p);
      if(first){ ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
    }
    ctx.lineTo(fx(fmax), y0);
    ctx.lineTo(fx(fmin), y0);
    ctx.closePath();
    ctx.fillStyle = "color-mix(in oklch, "+cssVar("--field")+" 22%, transparent)";
    ctx.fill();

    // stroke curve
    ctx.beginPath();
    first = true;
    for(var hz2=fmin; hz2<=fmax; hz2+=0.25){
      var jitter2 = (Math.sin(hz2*7.3)+Math.cos(hz2*3.1))*0.012;
      var p2 = powerAt(hz2,c) + jitter2;
      var px2 = fx(hz2), py2 = fy(p2);
      if(first){ ctx.moveTo(px2,py2); first=false; } else ctx.lineTo(px2,py2);
    }
    ctx.strokeStyle = cssVar("--field");
    ctx.lineWidth = 2.2;
    ctx.lineJoin = "round";
    ctx.stroke();
  }

  // ---------- render ----------
  function renderOptions(){
    optionsEl.innerHTML = "";
    for(var i=0;i<STATES.length;i++){
      (function(s){
        var btn = document.createElement("button");
        btn.className = "opt";
        btn.type = "button";
        btn.dataset.key = s.key;
        var lbl = lang==="zh"? s.zh : s.en;
        var desc = lang==="zh"? s.zhDesc : s.enDesc;
        btn.innerHTML = '<div class="freq">'+s.freq+'</div>'+
                        '<div class="label">'+lbl+'</div>'+
                        '<div class="desc">'+desc+'</div>';
        btn.addEventListener("click", function(){ onPick(s.key, btn); });
        optionsEl.appendChild(btn);
      })(STATES[i]);
    }
  }

  function renderProgress(){
    progressEl.innerHTML = "";
    for(var i=0;i<CASES.length;i++){
      var item = document.createElement("div");
      var cls = "prog-item";
      if(i===current && !bannerVisible) cls += " active";
      if(results[i]==="solved") cls += " solved";
      else if(results[i]==="wrong") cls += " wrong";
      item.className = cls;
      var dot = document.createElement("span"); dot.className="prog-dot";
      var lab = document.createElement("span");
      var n = (i+1<10?"0":"")+(i+1);
      lab.textContent = (lang==="zh"?"案卷 ":"CASE ")+n;
      item.appendChild(dot); item.appendChild(lab);
      progressEl.appendChild(item);
    }
  }

  function onPick(key, btn){
    if(answered) return;
    var c = CASES[current];
    if(key === c.answer){
      answered = true;
      results[current] = "solved";
      btn.classList.add("picked-good");
      verdictEl.className = "verdict good";
      verdictEl.textContent = lang==="zh"? c.zhFb : c.enFb;
      var all = optionsEl.querySelectorAll(".opt");
      for(var i=0;i<all.length;i++) all[i].disabled = true;
      nextBtn.disabled = (current === CASES.length-1);
      updateBadge();
      renderProgress();
      if(current === CASES.length-1) maybeSolve();
    } else {
      if(results[current] !== "solved") results[current] = "wrong";
      btn.classList.add("picked-bad");
      btn.disabled = true;
      verdictEl.className = "verdict bad";
      verdictEl.textContent = wrongFeedback(c, key);
      renderProgress();
      updateBadge();
    }
  }

  function maybeSolve(){
    var allSolved = true;
    for(var i=0;i<CASES.length;i++){ if(results[i] !== "solved"){ allSolved=false; break; } }
    if(allSolved){
      bannerVisible = true;
      scopeEl.style.display = "none";
      optionsEl.style.display = "none";
      verdictEl.style.display = "none";
      bannerEl.style.display = "flex";
      bannerEl.style.flex = "1";
      nextBtn.style.display = "none";
      restartBtn.style.display = "inline-block";
      renderProgress();
    }
  }

  function updateBadge(){
    var solved = 0, wrong = 0;
    for(var i=0;i<CASES.length;i++){
      if(results[i]==="solved") solved++;
      else if(results[i]==="wrong") wrong++;
    }
    if(lang==="zh"){
      badgeEl.innerHTML = "已判读 <b>"+solved+"/"+CASES.length+"</b> · 误判 "+wrong;
    } else {
      badgeEl.innerHTML = "Solved <b>"+solved+"/"+CASES.length+"</b> · misreads "+wrong;
    }
  }

  function loadCase(){
    answered = (results[current]==="solved");
    verdictEl.className = "verdict hint";
    verdictEl.textContent = I18N[lang].prompt;
    var n = (current+1<10?"0":"")+(current+1);
    var tot = (CASES.length<10?"0":"")+CASES.length;
    traceEl.textContent = (lang==="zh"?"案卷 ":"CASE ")+n+" / "+tot;
    nextBtn.disabled = !answered || current===CASES.length-1;
    renderOptions();
    if(answered){
      var all = optionsEl.querySelectorAll(".opt");
      for(var i=0;i<all.length;i++){
        all[i].disabled = true;
        if(all[i].dataset.key === CASES[current].answer) all[i].classList.add("picked-good");
      }
      verdictEl.className = "verdict good";
      verdictEl.textContent = lang==="zh"? CASES[current].zhFb : CASES[current].enFb;
    }
    renderProgress();
    resize();
  }

  nextBtn.addEventListener("click", function(){
    if(nextBtn.disabled) return;
    if(current < CASES.length-1){ current++; loadCase(); }
  });

  restartBtn.addEventListener("click", function(){
    current = 0; answered = false; results = []; bannerVisible = false;
    scopeEl.style.display = "";
    optionsEl.style.display = "grid";
    verdictEl.style.display = "flex";
    bannerEl.style.display = "none";
    nextBtn.style.display = "inline-block";
    restartBtn.style.display = "none";
    updateBadge();
    loadCase();
  });

  function applyLang(){
    document.documentElement.lang = (lang==="zh")?"zh":"en";
    var els = document.querySelectorAll("[data-i18n]");
    for(var i=0;i<els.length;i++){
      var k = els[i].getAttribute("data-i18n");
      if(I18N[lang][k] !== undefined) els[i].innerHTML = I18N[lang][k];
    }
    loadCase();
    updateBadge();
  }
  langBtn.addEventListener("click", function(){
    lang = (lang==="zh")?"en":"zh";
    applyLang();
  });

  window.addEventListener("resize", resize);

  // boot
  results = [];
  updateBadge();
  loadCase();
})();
</script>
</body>
</html>
