<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;
  font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;
  color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.game-header{
  padding:6px 16px;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
  display:flex;align-items:center;justify-content:space-between;
}
.game-header h2{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;
}
.game-header .score{
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  color:#00daf3;
}
.game-area{
  flex:1;min-height:0;overflow:hidden;
  display:flex;flex-direction:column;
  padding:8px 16px;
  gap:6px;
}
/* pipeline row */
.pipeline-row{
  display:flex;align-items:center;gap:4px;
  justify-content:center;flex-shrink:0;
}
.pipe-module{
  width:85px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:0.5px;
  border:1px solid rgba(138,136,134,0.3);
  background:#1c1b1b;color:#8a8886;
  transition:background 0.2s,color 0.2s,border-color 0.2s;
}
.pipe-module.active{color:#131313;border-width:2px;}
.pipe-module.pass{border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.1);}
.pipe-module.fail{border-color:#ff5f1f;color:#ff5f1f;background:rgba(255,95,31,0.1);}
.pipe-module.current{border-color:#00daf3;color:#00daf3;background:rgba(0,218,243,0.1);}
.pipe-arrow{font-size:12px;color:#8a8886;flex-shrink:0;}
.pipe-arrow.active-arrow{color:#00daf3;}

/* detail panel */
.detail-panel{
  flex:1;min-height:0;
  display:flex;gap:8px;
  overflow:hidden;
}
.detail-left,.detail-right{
  flex:1;
  background:rgba(28,27,27,0.7);
  border:1px solid rgba(138,136,134,0.15);
  padding:10px;
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.detail-left h4,.detail-right h4{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  color:#ffb59c;margin-bottom:6px;letter-spacing:0.5px;
}
.data-row{
  font-family:'Inter','Noto Sans SC',sans-serif;font-size:12px;
  padding:3px 0;color:#e5e2e1;line-height:1.4;
}
.data-row .label{color:#8a8886;font-size:11px;}
.data-row .value{color:#00daf3;font-weight:700;}
.data-row .mismatch{color:#ff5f1f;font-weight:700;}

/* action buttons */
.action-row{
  display:flex;gap:8px;justify-content:center;
  padding:6px 0;flex-shrink:0;
}
.action-btn{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 28px;cursor:pointer;letter-spacing:1px;
  border:2px solid rgba(138,136,134,0.3);
  background:transparent;color:#e5e2e1;
  transition:all 0.2s;
}
.action-btn:hover{background:#353534;}
.action-btn.pass-btn{border-color:#10b981;color:#10b981;}
.action-btn.pass-btn:hover{background:rgba(16,185,129,0.15);}
.action-btn.fail-btn{border-color:#ff5f1f;color:#ff5f1f;}
.action-btn.fail-btn:hover{background:rgba(255,95,31,0.15);}
.action-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* reason select */
.reason-panel{
  display:none;flex-direction:column;gap:4px;
  padding:8px;background:rgba(53,53,52,0.6);
  border:1px solid rgba(255,95,31,0.3);
  flex-shrink:0;
}
.reason-panel.visible{display:flex;}
.reason-btn{
  font-family:'Noto Sans SC',sans-serif;font-size:12px;
  padding:6px 12px;cursor:pointer;text-align:left;
  border:1px solid rgba(138,136,134,0.2);
  background:transparent;color:#e5e2e1;
  transition:all 0.15s;
}
.reason-btn:hover{background:#353534;border-color:#ff5f1f;}

/* feedback */
.feedback-bar{
  padding:6px 16px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  min-height:36px;
  display:flex;align-items:center;
}
.feedback-bar.correct{color:#10b981;}
.feedback-bar.wrong{color:#ff5f1f;}

/* summary overlay */
.summary-overlay{
  display:none;
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(19,19,19,0.92);
  z-index:200;
  justify-content:center;align-items:center;
}
.summary-overlay.visible{display:flex;}
.summary-box{
  width:420px;max-height:80vh;overflow-y:auto;
  background:rgba(28,27,27,0.95);
  border:1px solid rgba(255,181,156,0.2);
  padding:24px;
}
.summary-box h2{
  font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;
  color:#ffb59c;margin-bottom:16px;
}
.summary-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(138,136,134,0.1);
  font-family:'Inter','Noto Sans SC',sans-serif;font-size:13px;
}
.summary-row .if-name{color:#e5e2e1;}
.summary-row .if-result{font-weight:700;font-family:'Space Grotesk',sans-serif;}
.summary-row .if-result.pass{color:#10b981;}
.summary-row .if-result.fail{color:#ff5f1f;}
.summary-score{
  margin-top:16px;text-align:center;
  font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
  color:#00daf3;
}
.summary-msg{
  margin-top:8px;text-align:center;
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  color:#e5e2e1;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideWhat"></p>
    <ul>
      <li id="guideObs1"></li>
      <li id="guideObs2"></li>
      <li id="guideObs3"></li>
    </ul>
    <p id="guideTakeaway" style="margin-top:8px;font-style:italic;opacity:0.8;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="game-header">
    <h2 id="gameTitle"></h2>
    <span class="score" id="scoreDisplay"></span>
  </div>
  <div class="game-area" id="gameArea">
    <div class="pipeline-row" id="pipelineRow"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-left" id="detailLeft"></div>
      <div class="detail-right" id="detailRight"></div>
    </div>
    <div class="action-row" id="actionRow">
      <button class="action-btn pass-btn" id="btnPass"></button>
      <button class="action-btn fail-btn" id="btnFail"></button>
    </div>
    <div class="reason-panel" id="reasonPanel"></div>
  </div>
  <div class="feedback-bar" id="feedbackBar"></div>
</div>
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-box" id="summaryBox"></div>
</div>

    answer:'fail',
    upstream:{
      titleCn:'\u8def\u5f84\u641c\u7d22\u6a21\u5757\u8f93\u51fa',titleEn:'Path Search Output',
      rows:[
        {label:'format',value:'List of (x, y) tuples',cn:'\u683c\u5f0f: (x, y) \u5143\u7ec4\u5217\u8868',mismatch:true},
        {label:'coord',value:'(x, y) = (col, row)',cn:'\u5750\u6807\u7cfb: (x, y) = (col, row)',mismatch:true},
        {label:'example',value:'[(0,7), (1,6), (2,5), ...]',cn:'\u793a\u4f8b: [(0,7), (1,6), (2,5), ...]'},
        {label:'length',value:'8 waypoints',cn:'\u957f\u5ea6: 8 \u4e2a\u8def\u70b9'}
      ]
    },
    downstream:{
      titleCn:'\u6267\u884c\u6a21\u5757\u671f\u671b\u8f93\u5165',titleEn:'Execution Expected Input',
      rows:[
        {label:'format',value:'List of (row, col) tuples',cn:'\u683c\u5f0f: (row, col) \u5143\u7ec4\u5217\u8868',mismatch:true},
        {label:'coord',value:'(row, col) origin top-left',cn:'\u5750\u6807\u7cfb: (row, col) \u539f\u70b9\u5de6\u4e0a\u89d2',mismatch:true},
        {label:'example',value:'[(7,0), (6,1), (5,2), ...]',cn:'\u793a\u4f8b: [(7,0), (6,1), (5,2), ...]'},
        {label:'speed',value:'max 0.5 m/s',cn:'\u6700\u5927\u901f\u5ea6: 0.5 m/s'}
      ]
    },
    reasonsCn:['\u6570\u636e\u7c7b\u578b\u4e0d\u5339\u914d (tuple vs dict)','\u5750\u6807\u7cfb\u4e0d\u5339\u914d (\u4e0a\u6e38\u7528 (x,y)=(col,row)\uff0c\u4e0b\u6e38\u671f\u671b (row,col))','\u8def\u70b9\u6570\u91cf\u8d85\u51fa\u9650\u5236'],
    reasonsEn:['dtype mismatch (tuple vs dict)','coord mismatch (upstream uses (x,y)=(col,row), downstream expects (row,col))','waypoint count exceeds limit'],
    correctReason:1,
    explainCn:'\u8def\u5f84\u641c\u7d22\u8f93\u51fa (x,y)=(col,row) \u683c\u5f0f\uff0c\u4f46\u6267\u884c\u6a21\u5757\u671f\u671b (row,col) \u683c\u5f0f\u3002\u5750\u6807\u7cfb\u4e0d\u4e00\u81f4\u4f1a\u5bfc\u81f4\u706b\u661f\u8f66\u884c\u9a76\u65b9\u5411\u9519\u8bef -- \u628a\u884c\u53f7\u5f53\u4f5c\u5217\u53f7\uff0c\u5411\u9519\u8bef\u65b9\u5411\u79fb\u52a8\u3002',
    explainEn:'Path outputs (x,y)=(col,row) but execution expects (row,col). Coordinate mismatch would cause rover to move in wrong direction -- treating row as column.'
  }
];

/* ── game state ── */
var currentCheck=0;
var totalChecks=CHECKS.length;
var correctCount=0;
var results=[];/* 'correct'|'wrong' */
var answered=false;

function refreshI18N(){
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideWhat').textContent=t('guideWhat');
  document.getElementById('guideObs1').textContent=t('guideObs1');
  document.getElementById('guideObs2').textContent=t('guideObs2');
  document.getElementById('guideObs3').textContent=t('guideObs3');
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  document.getElementById('gameTitle').textContent=t('title');
  document.getElementById('btnPass').textContent=t('pass');
  document.getElementById('btnFail').textContent=t('fail');
  renderStation();
}

function renderPipeline(){
  var row=document.getElementById('pipelineRow');
  row.innerHTML='';
  var mn=LANG==='cn'?I18N.modNames.cn:I18N.modNames.en;
  for(var i=0;i<5;i++){
    if(i>0){
      var ar=document.createElement('span');
      ar.className='pipe-arrow';
      /* highlight arrow for current interface */
      if(i-1<currentCheck){ar.className+=' active-arrow';}
      else if(i-1===currentCheck){ar.className+=' active-arrow';}
      ar.textContent='\u2192';
      row.appendChild(ar);
    }
    var m=document.createElement('div');
    m.className='pipe-module';
    /* determine state */
    var ifIdx=i-1;/* interface between module i-1 and i */
    if(currentCheck<totalChecks){
      if(i===currentCheck||i===currentCheck+1) m.className+=' current';
      /* previous checked interfaces */
      for(var j=0;j<results.length;j++){
        if(j===i-1||j===i){
          m.className+=' '+(results[j]==='correct'?'pass':'');
        }
      }
    }
    m.textContent=mn[i];
    row.appendChild(m);
  }
}

function renderStation(){
  if(currentCheck>=totalChecks){showSummary();return;}
  var ck=CHECKS[currentCheck];
  renderPipeline();
  document.getElementById('scoreDisplay').textContent=t('score')+': '+correctCount+'/'+totalChecks+' | '+t('checkpoint')+' '+(currentCheck+1)+'/'+totalChecks;

  /* left panel: upstream output */
  var dl=document.getElementById('detailLeft');
  dl.innerHTML='';
  var h4l=document.createElement('h4');
  h4l.textContent=LANG==='cn'?ck.upstream.titleCn:ck.upstream.titleEn;
  dl.appendChild(h4l);
  ck.upstream.rows.forEach(function(r){
    var div=document.createElement('div');div.className='data-row';
    div.innerHTML='<span class="label">'+r.label+': </span><span class="'+(r.mismatch?'mismatch':'value')+'">'+
      (LANG==='cn'?r.cn:(r.label+': '+r.value))+'</span>';
    dl.appendChild(div);
  });

  /* right panel: downstream expected */
  var dr=document.getElementById('detailRight');
  dr.innerHTML='';
  var h4r=document.createElement('h4');
  h4r.textContent=LANG==='cn'?ck.downstream.titleCn:ck.downstream.titleEn;
  dr.appendChild(h4r);
  ck.downstream.rows.forEach(function(r){
    var div=document.createElement('div');div.className='data-row';
    div.innerHTML='<span class="label">'+r.label+': </span><span class="'+(r.mismatch?'mismatch':'value')+'">'+
      (LANG==='cn'?r.cn:(r.label+': '+r.value))+'</span>';
    dr.appendChild(div);
  });

  /* reset action state */
  answered=false;
  document.getElementById('btnPass').disabled=false;
  document.getElementById('btnFail').disabled=false;
  document.getElementById('reasonPanel').className='reason-panel';
  document.getElementById('reasonPanel').innerHTML='';
  document.getElementById('feedbackBar').textContent='';
  document.getElementById('feedbackBar').className='feedback-bar';
}

function handleAnswer(choice){
  if(answered)return;
  var ck=CHECKS[currentCheck];

  if(choice==='pass'){
    if(ck.answer==='pass'){
      /* correct: it is a pass */
      answered=true;correctCount++;results.push('correct');
      showFeedback(true,LANG==='cn'?ck.explainCn:ck.explainEn);
      document.getElementById('btnPass').disabled=true;
      document.getElementById('btnFail').disabled=true;
      setTimeout(function(){currentCheck++;renderStation();},2500);
    }else{
      /* wrong: it should be fail */
      answered=true;results.push('wrong');
      showFeedback(false,(LANG==='cn'?'\u5e94\u8be5\u662f FAIL\u3002':'Should be FAIL. ')+(LANG==='cn'?ck.explainCn:ck.explainEn));
      document.getElementById('btnPass').disabled=true;
      document.getElementById('btnFail').disabled=true;
      setTimeout(function(){currentCheck++;renderStation();},3000);
    }
  } else {
    /* chose FAIL - need to pick reason */
    if(ck.answer==='pass'){
      /* wrong: it is actually a pass */
      answered=true;results.push('wrong');
      showFeedback(false,(LANG==='cn'?'\u5e94\u8be5\u662f PASS\u3002':'Should be PASS. ')+(LANG==='cn'?ck.explainCn:ck.explainEn));
      document.getElementById('btnPass').disabled=true;
      document.getElementById('btnFail').disabled=true;
      setTimeout(function(){currentCheck++;renderStation();},3000);
    } else {
      /* correct direction, now pick reason */
      showReasonPanel();
    }
  }
}

function showReasonPanel(){
  var ck=CHECKS[currentCheck];
  var rp=document.getElementById('reasonPanel');
  rp.innerHTML='<div style="font-size:12px;color:#ff5f1f;margin-bottom:4px;">'+(t('selectReason'))+'</div>';
  rp.className='reason-panel visible';
  var reasons=LANG==='cn'?ck.reasonsCn:ck.reasonsEn;
  reasons.forEach(function(r,i){
    var btn=document.createElement('button');
    btn.className='reason-btn';
    btn.textContent=r;
    btn.addEventListener('click',function(){handleReasonChoice(i);});
    rp.appendChild(btn);
  });
  document.getElementById('btnPass').disabled=true;
  document.getElementById('btnFail').disabled=true;
}

function handleReasonChoice(idx){
  if(answered)return;
  answered=true;
  var ck=CHECKS[currentCheck];
  if(idx===ck.correctReason){
    correctCount++;results.push('correct');
    showFeedback(true,(LANG==='cn'?ck.explainCn:ck.explainEn));
  }else{
    results.push('wrong');
    var correctText=LANG==='cn'?ck.reasonsCn[ck.correctReason]:ck.reasonsEn[ck.correctReason];
    showFeedback(false,(LANG==='cn'?'\u6b63\u786e\u539f\u56e0: ':'Correct reason: ')+correctText+'. '+(LANG==='cn'?ck.explainCn:ck.explainEn));
  }
  document.getElementById('reasonPanel').className='reason-panel';
  setTimeout(function(){currentCheck++;renderStation();},3000);
}

function showFeedback(isCorrect,msg){
  var fb=document.getElementById('feedbackBar');
  fb.className='feedback-bar '+(isCorrect?'correct':'wrong');
  fb.textContent=(isCorrect?t('correct'):t('wrong'))+' '+msg;
}

function showSummary(){
  var overlay=document.getElementById('summaryOverlay');
  overlay.className='summary-overlay visible';
  var box=document.getElementById('summaryBox');
  var ifLabels=LANG==='cn'?I18N.ifLabels.cn:I18N.ifLabels.en;
  var html='<h2>'+t('complete')+'</h2>';
  for(var i=0;i<totalChecks;i++){
    var res=results[i]||'wrong';
    html+='<div class="summary-row"><span class="if-name">'+ifLabels[i]+'</span>';
    html+='<span class="if-result '+(res==='correct'?'pass':'fail')+'">'+(res==='correct'?'PASS':'FAIL')+'</span></div>';
  }
  html+='<div class="summary-score">'+t('finalScore')+': '+correctCount+' / '+totalChecks+'</div>';
  html+='<div class="summary-msg">'+(correctCount>=3?t('passMsg'):t('failMsg'))+'</div>';
  box.innerHTML=html;
}

/* ── event bindings ── */
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';refreshI18N();
});
document.getElementById('btnPass').addEventListener('click',function(){handleAnswer('pass');});
document.getElementById('btnFail').addEventListener('click',function(){handleAnswer('fail');});

/* guide toggle */
(function(){
  var tog=document.getElementById('guideToggle');
  var gc=document.getElementById('guideContent');
  if(tog&&gc){
    document.getElementById('guideHeader').addEventListener('click',function(){
      var cl=gc.classList.toggle('collapsed');tog.textContent=cl?'[+]':'[-]';
    });
  }
})();

/* ── init ── */
refreshI18N();

})();
</script>
</body>
</html>
