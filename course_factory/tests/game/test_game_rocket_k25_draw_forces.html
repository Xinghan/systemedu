<!DOCTYPE html>
<html lang="zh">
<head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.sidebar-lang{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.6;}
/* force buttons in sidebar */
.force-btn-group{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.force-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:6px 8px;border:1px solid rgba(128,128,128,0.2);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;display:flex;align-items:center;gap:6px;background:transparent;}
.force-btn .swatch{width:12px;height:3px;display:inline-block;}
.force-btn:hover{border-color:var(--sb-accent,var(--primary));}
.force-btn.selected{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.15);}
.force-btn.placed{opacity:0.5;}
.scene-select{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.scene-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;padding:4px 6px;border:1px solid rgba(128,128,128,0.15);cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;text-align:left;letter-spacing:0.05em;transition:all 0.2s;}
.scene-btn:hover{border-color:var(--sb-accent,var(--primary));color:var(--sb-accent,var(--primary));}
.scene-btn.active{border-color:var(--sb-accent,var(--primary));color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ctrl-bg,var(--primary)),var(--primary-dim));color:var(--ctrl-color,var(--bg));letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 14px var(--glow-strong);margin-top:6px;width:100%;}
.action-btn:hover{box-shadow:0 0 20px var(--glow-strong);}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.15em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#ef4444;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <button class="sidebar-lang" id="langBtn">CN</button>
    <div class="style-switcher" id="styleSwitcher"></div>
    <div class="sidebar-title" id="sideTitle">FORCE DIAGRAM</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="sceneLabel">SCENE</div>
    <div class="scene-select" id="sceneSelect"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="forceLabel">FORCES</div>
    <div class="force-btn-group" id="forceButtons"></div>
    <div class="sidebar-divider"></div>
    <button class="action-btn" id="btnCheck" disabled>CHECK</button>
    <button class="reset-btn" id="btnReset">RESET</button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <span class="hud-tag" id="hudTag">FBD WORKSHOP</span>
      <div class="hud-item"><div class="hud-label" id="hudL1">SCENE</div><div class="hud-val" id="hudV1">1/4</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2">PLACED</div><div class="hud-val" id="hudV2">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3">SCORE</div><div class="hud-val" id="hudV3">0</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4">BEST</div><div class="hud-val" id="hudV4">--</div></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">STATUS</span>
      <span class="status-val" id="statusVal">--</span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.04)',gridStep:24,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.03)',gridStep:64,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0d0e1a',canvasGrid:null,gridStep:64,
    canvasText:'#e2e8f0',canvasTextDim:'#cbd5e1',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',
  },
};
var GAME_MODE = 'cyberpunk';
var ACCENT = '#5ba3d9';

function gameModeColors() {
  var m = GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk;
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 64,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  if(!c) return;
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(91,163,217,0.06)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.025)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.06;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.3,0,w*0.5,h*0.3,w*0.6);rg.addColorStop(0,'rgba(91,163,217,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// I18N
// ================================================================
var LANG = 'cn';
var I18N = {
  title:     {en:'FORCE DIAGRAM WORKSHOP', cn:'\u529B\u56FE\u7ED8\u5236\u5DE5\u5757'},
  subtitle:  {en:'Draw forces on objects', cn:'\u7ED9\u7269\u4F53\u753B\u4E0A\u529B'},
  guide:     {en:'Select a scene, then click force buttons to add arrows. Click on the object to place forces. Press CHECK when done.',
              cn:'\u9009\u62E9\u573A\u666F\uFF0C\u7136\u540E\u70B9\u51FB\u529B\u6309\u94AE\u9009\u62E9\u8981\u6DFB\u52A0\u7684\u529B\uFF0C\u518D\u70B9\u51FB\u7269\u4F53\u653E\u7F6E\u7BAD\u5934\u3002\u5B8C\u6210\u540E\u6309\u68C0\u67E5\u3002'},
  scene:     {en:'SCENE', cn:'\u573A\u666F'},
  forces:    {en:'FORCES', cn:'\u529B'},
  check:     {en:'CHECK', cn:'\u68C0\u67E5'},
  resetTxt:  {en:'RESET', cn:'\u91CD\u7F6E'},
  guideLbl:  {en:'GUIDE', cn:'\u64CD\u4F5C\u6307\u5357'},
  hudTag:    {en:'FBD WORKSHOP', cn:'\u529B\u56FE\u5DE5\u5757'},
  hudScene:  {en:'SCENE', cn:'\u573A\u666F'},
  hudPlaced: {en:'PLACED', cn:'\u5DF2\u653E\u7F6E'},
  hudScore:  {en:'SCORE', cn:'\u5F97\u5206'},
  hudBest:   {en:'BEST', cn:'\u6700\u9AD8'},
  statusLbl: {en:'STATUS', cn:'\u72B6\u6001'},
  ready:     {en:'READY', cn:'\u51C6\u5907\u5C31\u7EEA'},
  // Scene names
  s_launch:  {en:'ROCKET LAUNCH', cn:'\u706B\u7BAD\u53D1\u5C04'},
  s_freefall:{en:'FREE FALL', cn:'\u81EA\u7531\u843D\u4F53'},
  s_table:   {en:'BOOK ON TABLE', cn:'\u684C\u4E0A\u7684\u4E66'},
  s_push:    {en:'PUSH A CART', cn:'\u63A8\u8F66'},
  // Force names

  f_thrust:  {en:'THRUST', cn:'\u63A8\u529B'},

  f_push:    {en:'PUSH', cn:'\u63A8\u529B'},

  // Feedback
  correct:   {en:'ALL CORRECT!', cn:'\u5168\u90E8\u6B63\u786E\uFF01'},
  missing:   {en:'MISSING FORCES', cn:'\u8FD8\u7F3A\u529B'},

  perfect:   {en:'PERFECT! +25', cn:'\u5B8C\u7F8E\uFF01+25'},
  partial:   {en:'CLOSE! +10', cn:'\u63A5\u8FD1\uFF01+10'},
  tryAgain:  {en:'TRY AGAIN', cn:'\u518D\u8BD5\u8BD5'},
  wellDone:  {en:'WELL DONE! ALL SCENES COMPLETE!', cn:'\u592A\u68D2\u4E86\uFF01\u6240\u6709\u573A\u666F\u5B8C\u6210\uFF01'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }

// ================================================================
// GAME DATA: 4 scenes with expected forces
// ================================================================
var FORCE_DEFS = {
  gravity:  {key:'f_gravity', color:'#ef4444', dir:'down'},
  normal:   {key:'f_normal',  color:'#22c55e', dir:'up'},
  thrust:   {key:'f_thrust',  color:'#f59e0b', dir:'up'},
  drag:     {key:'f_drag',    color:'#a855f7', dir:'down'},
  push_r:   {key:'f_push',    color:'#f59e0b', dir:'right'},
  friction: {key:'f_friction', color:'#a855f7', dir:'left'},
};

var SCENES = [
  {
    id:'launch', nameKey:'s_launch',
    objectType:'rocket', objectY:0.45,
    groundY: 0.82, hasFlame: true,
    expectedForces: ['gravity','thrust','drag'],

    expectedForces: ['gravity','normal'],

// ================================================================
// GAME STATE
// ================================================================
var currentScene = 0;
var placedForces = []; // [{forceId, dir}]
var selectedForce = null;
var totalScore = 0;
var bestScore = 0;
var sceneCompleted = [false, false, false, false];
var feedbackMsg = '';
var feedbackTimer = 0;
var canvasEl, c2d, cw, ch;

// ================================================================
// DRAWING HELPERS
// ================================================================
function drawObject(c, type, cx, cy, w, h, flame, mc) {
  if(!c) return;
  if (type === 'rocket') {
    // Rocket body
    c.fillStyle = mc.accent;
    c.globalAlpha = 0.7;
    c.fillRect(cx - w/2, cy - h/2, w, h);
    c.strokeStyle = mc.accent;
    c.lineWidth = 1.5;
    c.globalAlpha = 1;
    c.strokeRect(cx - w/2, cy - h/2, w, h);
    // Nose cone
    c.fillStyle = mc.text;
    c.globalAlpha = 0.85;
    c.beginPath();
    c.moveTo(cx, cy - h/2 - h*0.25);
    c.lineTo(cx - w/2, cy - h/2);
    c.lineTo(cx + w/2, cy - h/2);
    c.closePath();
    c.fill();
    c.globalAlpha = 1;
    // Fins
    c.fillStyle = mc.dim;
    c.globalAlpha = 0.5;
    c.beginPath(); c.moveTo(cx-w/2,cy+h/2); c.lineTo(cx-w/2-w*0.3,cy+h/2+h*0.15); c.lineTo(cx-w/2,cy+h/2-h*0.15); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(cx+w/2,cy+h/2); c.lineTo(cx+w/2+w*0.3,cy+h/2+h*0.15); c.lineTo(cx+w/2,cy+h/2-h*0.15); c.closePath(); c.fill();
    c.globalAlpha = 1;
    // Flame
    if (flame) {
      var gf = c.createLinearGradient(cx, cy+h/2, cx, cy+h/2+h*0.4);
      gf.addColorStop(0, '#f59e0b'); gf.addColorStop(0.5, '#ef4444'); gf.addColorStop(1, 'rgba(239,68,68,0)');
      c.fillStyle = gf;
      c.beginPath(); c.moveTo(cx-w*0.25,cy+h/2); c.quadraticCurveTo(cx,cy+h/2+h*0.4,cx+w*0.25,cy+h/2); c.closePath(); c.fill();
    }
  } else if (type === 'ball') {
    c.fillStyle = mc.accent;
    c.globalAlpha = 0.7;
    c.beginPath(); c.arc(cx, cy, w/2, 0, Math.PI*2); c.fill();
    c.strokeStyle = mc.accent;
    c.lineWidth = 1.5;
    c.globalAlpha = 1;
    c.beginPath(); c.arc(cx, cy, w/2, 0, Math.PI*2); c.stroke();
  } else if (type === 'book') {
    c.fillStyle = mc.accent;
    c.globalAlpha = 0.7;
    c.fillRect(cx - w, cy - h/2, w*2, h);
    c.strokeStyle = mc.accent;
    c.lineWidth = 1.5;
    c.globalAlpha = 1;
    c.strokeRect(cx - w, cy - h/2, w*2, h);
    // Pages
    c.strokeStyle = mc.dim;
    c.lineWidth = 0.5;
    for(var i=1;i<4;i++){c.beginPath();c.moveTo(cx-w+i*w*0.5,cy-h/2+2);c.lineTo(cx-w+i*w*0.5,cy+h/2-2);c.stroke();}
  } else if (type === 'cart') {
    // Cart body
    c.fillStyle = mc.accent;
    c.globalAlpha = 0.7;
    c.fillRect(cx - w, cy - h, w*2, h);
    c.strokeStyle = mc.accent;
    c.lineWidth = 1.5;
    c.globalAlpha = 1;
    c.strokeRect(cx - w, cy - h, w*2, h);
    // Wheels
    c.fillStyle = mc.dim;
    c.beginPath(); c.arc(cx - w*0.6, cy+2, 6, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx + w*0.6, cy+2, 6, 0, Math.PI*2); c.fill();
  }
}

function drawForceArrow(c, x, y, dir, color, label, mc, arrowLen) {
  if(!c) return;
  var dx = 0, dy = 0;
  var len = arrowLen || 70;
  if (dir === 'up')    { dx=0;  dy=-len; }
  if (dir === 'down')  { dx=0;  dy=len;  }
  if (dir === 'left')  { dx=-len; dy=0;  }
  if (dir === 'right') { dx=len;  dy=0;  }

  var ex = x + dx, ey = y + dy;
  c.save();
  c.strokeStyle = color;
  c.lineWidth = 2.5;
  c.lineCap = 'round';
  c.shadowColor = color;
  c.shadowBlur = 8;
  c.beginPath();
  c.moveTo(x, y);
  c.lineTo(ex, ey);
  c.stroke();
  c.shadowBlur = 0;

  var angle = Math.atan2(dy, dx);
  var headLen = 10;
  c.fillStyle = color;
  c.beginPath();
  c.moveTo(ex, ey);
  c.lineTo(ex - headLen*Math.cos(angle-0.4), ey - headLen*Math.sin(angle-0.4));
  c.lineTo(ex - headLen*Math.cos(angle+0.4), ey - headLen*Math.sin(angle+0.4));
  c.closePath();
  c.fill();

  c.font = "700 10px 'JetBrains Mono', monospace";
  c.fillStyle = color;
  c.textAlign = 'center';
  var lx = ex, ly = ey;
  if (dir === 'up')    { ly = ey - 10; }
  if (dir === 'down')  { ly = ey + 14; }
  if (dir === 'left')  { lx = ex - 6; ly = y; c.textAlign = 'right'; }
  if (dir === 'right') { lx = ex + 6; ly = y; c.textAlign = 'left'; }
  c.fillText(label, lx, ly);
  c.restore();
}

function drawGroundLine(c, w, groundY, mc) {
  if(!c) return;
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(w*0.1, groundY);
  c.lineTo(w*0.9, groundY);
  c.stroke();
  // hatching
  c.strokeStyle = mc.strokeDim;
  c.lineWidth = 0.5;
  for(var hx=w*0.1; hx<w*0.9; hx+=12){
    c.beginPath(); c.moveTo(hx, groundY); c.lineTo(hx-6, groundY+8); c.stroke();
  }
}

function drawCornerTicks(c, x, y, w, h, color) {
  if(!c) return;
  c.strokeStyle = color; c.lineWidth = 1; c.globalAlpha = 0.5;
  var s = 8;
  c.beginPath(); c.moveTo(x+6,y+6); c.lineTo(x+6,y+6+s); c.stroke();
  c.beginPath(); c.moveTo(x+6,y+6); c.lineTo(x+6+s,y+6); c.stroke();
  c.beginPath(); c.moveTo(x+w-6,y+h-6); c.lineTo(x+w-6,y+h-6-s); c.stroke();
  c.beginPath(); c.moveTo(x+w-6,y+h-6); c.lineTo(x+w-6-s,y+h-6); c.stroke();
  c.globalAlpha = 1;
}

// ================================================================
// MAIN DRAW
// ================================================================
function draw() {
  if(!c2d) return;
  if(!cw || !ch || cw < 1 || ch < 1) return;
  var mc = gameModeColors();
  drawGameBg(c2d, cw, ch);

  var scene = SCENES[currentScene];
  var objCx = cw * 0.5;
  var objCy = ch * scene.objectY;
  var objW, objH;

  if (scene.objectType === 'rocket') { objW = 30; objH = 70; }
  else if (scene.objectType === 'ball') { objW = 40; objH = 40; }
  else if (scene.objectType === 'book') { objW = 40; objH = 16; }
  else if (scene.objectType === 'cart') { objW = 45; objH = 28; }

  // Ground
  if (scene.groundY) {
    drawGroundLine(c2d, cw, ch * scene.groundY, mc);
  }

  // Object
  drawObject(c2d, scene.objectType, objCx, objCy, objW, objH, scene.hasFlame, mc);

  // Placed forces
  for (var i = 0; i < placedForces.length; i++) {
    var pf = placedForces[i];
    var fd = FORCE_DEFS[pf.forceId];
    if (!fd) continue;
    var arrowLen = 60;
    // Thrust/push is longer
    if (pf.forceId === 'thrust' || pf.forceId === 'push_r') arrowLen = 80;
    // Drag/friction is shorter
    if (pf.forceId === 'drag' || pf.forceId === 'friction') arrowLen = 45;

    drawForceArrow(c2d, objCx, objCy, fd.dir, fd.color, t(fd.key), mc, arrowLen);
  }

  // Selected force indicator
  if (selectedForce) {
    var sf = FORCE_DEFS[selectedForce];
    if (sf) {
      c2d.font = "700 11px 'JetBrains Mono', monospace";
      c2d.fillStyle = sf.color;
      c2d.textAlign = 'center';
      c2d.globalAlpha = 0.6;
      c2d.fillText(t('click_to_place') || (LANG==='cn'?'\u70B9\u51FB\u7269\u4F53\u653E\u7F6E':'CLICK OBJECT'), cw*0.5, ch*0.92);
      c2d.globalAlpha = 1;
    }
  }

  // Scene title
  c2d.font = "700 14px 'JetBrains Mono', monospace";
  c2d.fillStyle = mc.accent;
  c2d.textAlign = 'center';
  c2d.fillText(t(scene.nameKey), cw*0.5, 30);

  // Feedback message
  if (feedbackMsg) {
    var panelW = 220, panelH = 40;
    var px = cw/2 - panelW/2, py = ch/2 - panelH/2 - 50;
    c2d.fillStyle = 'rgba(5,6,15,0.85)';
    c2d.fillRect(px, py, panelW, panelH);
    c2d.strokeStyle = mc.accent;
    c2d.lineWidth = 1;
    c2d.strokeRect(px, py, panelW, panelH);
    drawCornerTicks(c2d, px, py, panelW, panelH, mc.accent);
    c2d.font = "700 13px 'JetBrains Mono', monospace";
    c2d.fillStyle = feedbackMsg.indexOf('!') >= 0 ? '#22c55e' : '#ef4444';
    c2d.textAlign = 'center';
    c2d.fillText(feedbackMsg, cw/2, py + panelH/2 + 5);
  }

  // Completed badge
  if (sceneCompleted[currentScene]) {
    c2d.font = "700 12px 'JetBrains Mono', monospace";
    c2d.fillStyle = '#22c55e';
    c2d.textAlign = 'right';
    c2d.fillText('PASS', cw - 20, 30);
  }
}

// ================================================================
// CANVAS RESIZE
// ================================================================
function resizeCanvas() {
  var container = canvasEl.parentElement;
  if (!container) return;
  var rect = container.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = rect.width;
  ch = rect.height;
  canvasEl.width = cw * dpr;
  canvasEl.height = ch * dpr;
  canvasEl.style.width = cw + 'px';
  canvasEl.style.height = ch + 'px';
  c2d.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

// ================================================================
// UI UPDATE
// ================================================================
function refreshI18N() {
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('subtitle');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('guideLabel').textContent = t('guideLbl');
  document.getElementById('sceneLabel').textContent = t('scene');
  document.getElementById('forceLabel').textContent = t('forces');
  document.getElementById('btnCheck').textContent = t('check');
  document.getElementById('btnReset').textContent = t('resetTxt');
  document.getElementById('hudTag').textContent = t('hudTag');
  document.getElementById('hudL1').textContent = t('hudScene');
  document.getElementById('hudL2').textContent = t('hudPlaced');
  document.getElementById('hudL3').textContent = t('hudScore');
  document.getElementById('hudL4').textContent = t('hudBest');
  document.getElementById('statusLabel').textContent = t('statusLbl');

  // Scene buttons
  SCENES.forEach(function(s, i){
    var btn = document.querySelector('.scene-btn[data-idx="'+i+'"]');
    if(btn) btn.textContent = t(s.nameKey);
  });

  // Force buttons
  updateForceButtons();
  updateHud();
  draw();
}

function updateForceButtons() {
  var scene = SCENES[currentScene];
  var container = document.getElementById('forceButtons');
  container.innerHTML = '';
  scene.availableForces.forEach(function(fId){
    var fd = FORCE_DEFS[fId];
    var btn = document.createElement('button');
    btn.className = 'force-btn';
    if (selectedForce === fId) btn.classList.add('selected');
    if (placedForces.some(function(p){return p.forceId===fId;})) btn.classList.add('placed');

    var swatch = document.createElement('span');
    swatch.className = 'swatch';
    swatch.style.background = fd.color;
    btn.appendChild(swatch);

    var label = document.createTextNode(t(fd.key));
    btn.appendChild(label);

    btn.addEventListener('click', function(){
      if (placedForces.some(function(p){return p.forceId===fId;})) return;
      selectedForce = (selectedForce === fId) ? null : fId;
      updateForceButtons();
      draw();
    });
    container.appendChild(btn);
  });
}

function updateHud() {
  document.getElementById('hudV1').textContent = (currentScene+1) + '/4';
  document.getElementById('hudV2').textContent = '' + placedForces.length;
  document.getElementById('hudV3').textContent = '' + totalScore;
  document.getElementById('hudV4').textContent = bestScore > 0 ? '' + bestScore : '--';
  document.getElementById('statusVal').textContent = t('ready');
  document.getElementById('btnCheck').disabled = placedForces.length === 0;
}

function buildSceneButtons() {
  var container = document.getElementById('sceneSelect');
  container.innerHTML = '';
  SCENES.forEach(function(s, i){
    var btn = document.createElement('button');
    btn.className = 'scene-btn' + (i === currentScene ? ' active' : '');
    btn.dataset.idx = i;
    btn.textContent = t(s.nameKey);
    if (sceneCompleted[i]) btn.textContent += ' \u2713';
    btn.addEventListener('click', function(){
      switchScene(i);
    });
    container.appendChild(btn);
  });
}

function switchScene(idx) {
  currentScene = idx;
  placedForces = [];
  selectedForce = null;
  feedbackMsg = '';
  buildSceneButtons();
  updateForceButtons();
  updateHud();
  draw();
}

// ================================================================
// CHECK ANSWER
// ================================================================
function checkAnswer() {
  var scene = SCENES[currentScene];
  var expected = scene.expectedForces.slice();
  var placed = placedForces.map(function(p){return p.forceId;});

  // Check for missing
  var missing = expected.filter(function(e){return placed.indexOf(e)<0;});
  // Check for extra
  var extra = placed.filter(function(p){return expected.indexOf(p)<0;});

  if (missing.length === 0 && extra.length === 0) {
    feedbackMsg = t('perfect');
    totalScore += 25;
    sceneCompleted[currentScene] = true;
    document.getElementById('statusVal').textContent = t('correct');
    document.getElementById('statusVal').className = 'status-val';
    document.getElementById('statusVal').style.color = '#22c55e';
  } else if (missing.length === 0 && extra.length > 0) {
    feedbackMsg = t('wrong');
    totalScore += 5;
    document.getElementById('statusVal').textContent = t('wrong');
    document.getElementById('statusVal').style.color = '#ef4444';
  } else {
    feedbackMsg = t('missing') + ' (' + missing.length + ')';
    document.getElementById('statusVal').textContent = t('tryAgain');
    document.getElementById('statusVal').style.color = '#f59e0b';
  }

  if (totalScore > bestScore) bestScore = totalScore;

  // Check if all scenes done
  if (sceneCompleted.every(function(c){return c;})) {
    feedbackMsg = t('wellDone');
  }

  buildSceneButtons();
  updateHud();
  draw();

  setTimeout(function(){feedbackMsg=''; draw();}, 2500);
}

// ================================================================
// CANVAS CLICK: place force
// ================================================================
function onCanvasClick(evt) {
  if (!selectedForce) return;
  if (placedForces.some(function(p){return p.forceId===selectedForce;})) return;

  var rect = canvasEl.getBoundingClientRect();
  var mx = evt.clientX - rect.left;
  var my = evt.clientY - rect.top;

  var scene = SCENES[currentScene];
  var objCx = cw * 0.5;
  var objCy = ch * scene.objectY;

  // Check if click is near the object (within ~80px)
  var dist = Math.sqrt((mx-objCx)*(mx-objCx) + (my-objCy)*(my-objCy));
  if (dist < 100) {
    placedForces.push({forceId: selectedForce});
    selectedForce = null;
    updateForceButtons();
    updateHud();
    draw();
  }
}

// ================================================================
// INIT
// ================================================================
function init() {
  // Set CSS variables
  document.documentElement.style.setProperty('--primary', ACCENT);
  document.documentElement.style.setProperty('--primary-dim', '#3d7ab8');
  document.documentElement.style.setProperty('--glow-strong', 'rgba(91,163,217,0.3)');

  canvasEl = document.getElementById('gc');
  c2d = canvasEl.getContext('2d');

  buildGameStyleSwitcher();
  applyGameMode('cyberpunk');
  setupLangToggle();
  buildSceneButtons();
  updateForceButtons();
  refreshI18N();

  window.addEventListener('resize', resizeCanvas);
  canvasEl.addEventListener('click', onCanvasClick);
  document.getElementById('btnCheck').addEventListener('click', checkAnswer);
  document.getElementById('btnReset').addEventListener('click', function(){
    placedForces = [];
    selectedForce = null;
    feedbackMsg = '';
    updateForceButtons();
    updateHud();
    draw();
  });

  // Delay initial resize to allow layout to settle
  setTimeout(function(){ resizeCanvas(); }, 100);
  setTimeout(function(){ resizeCanvas(); }, 300);
  document.fonts.ready.then(function(){ setTimeout(resizeCanvas, 200); });
}

function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}

init();
</script>
