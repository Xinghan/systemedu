<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>window.__systemedu_resize_patch_optout=true;</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0,#05060f);color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.95));border-right:1px solid var(--sb-border,rgba(128,128,128,0.2));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.mascot{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.mascot svg{flex-shrink:0;}
.mascot-txt{font-family:'JetBrains Mono',monospace;font-size:9px;line-height:1.4;color:var(--sb-dim,#8e90a6);}
.mascot-txt b{color:var(--sb-accent,var(--primary));font-size:11px;letter-spacing:0.08em;}
.sidebar-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-sub{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,#8e90a6);margin-top:-2px;}
.sidebar-divider{height:1px;background:var(--sb-btn-bd,rgba(128,128,128,0.15));margin:4px 0;}
.sidebar-section{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sb-mute,rgba(128,128,128,0.6));letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:11px;color:var(--sb-dim,#8e90a6);line-height:1.55;}
.tray{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.tray-marker{display:flex;align-items:center;gap:7px;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));background:var(--sb-btn-bg,transparent);cursor:grab;transition:border-color 0.2s,opacity 0.2s;user-select:none;}
.tray-marker:hover{border-color:var(--sb-accent,var(--primary));}
.tray-marker.placed{opacity:0.35;cursor:default;}
.tray-marker .dot{width:10px;height:10px;background:var(--sb-accent,var(--primary));flex-shrink:0;}
.tray-marker .tm-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-text,#e2e8f0);letter-spacing:0.06em;}
.tray-marker .tm-state{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.1em;margin-left:auto;color:var(--sb-mute,#5e6070);}
.win-group{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.win-group .row{display:flex;justify-content:space-between;align-items:baseline;}
.win-group label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-dim,#8e90a6);letter-spacing:0.06em;text-transform:uppercase;}
.win-group input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:rgba(128,128,128,0.15);height:4px;outline:none;border-radius:2px;}
.win-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;background:var(--primary);cursor:pointer;border-radius:0;box-shadow:0 0 5px var(--glow-strong);}
.win-group input[type=range]::-moz-range-thumb{width:13px;height:13px;background:var(--primary);cursor:pointer;border:none;border-radius:0;}
.win-group .val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.08em;}
.act-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:7px 8px;border:1px solid var(--sb-accent,var(--primary));cursor:pointer;color:var(--ctrl-color,#05060f);background:var(--sb-accent,var(--primary));letter-spacing:0.12em;text-transform:uppercase;width:100%;margin-top:6px;transition:opacity 0.2s;}
.act-btn:hover{opacity:0.85;}
.act-btn:disabled{opacity:0.3;cursor:not-allowed;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 8px;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.25));cursor:pointer;color:var(--sb-dim,#8e90a6);background:transparent;letter-spacing:0.1em;text-transform:uppercase;width:100%;margin-top:4px;}
.reset-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.sidebar-lang{margin-top:auto;align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#3ec7e0));letter-spacing:0.15em;text-transform:uppercase;}
.sidebar-lang:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:2px 0;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-hud{display:flex;align-items:center;justify-content:flex-start;gap:18px;padding:6px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-bottom:1px solid var(--hud-border,transparent);flex-shrink:0;flex-wrap:wrap;transition:background 0.3s;}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--sb-accent,var(--primary));letter-spacing:0.15em;text-transform:uppercase;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;color:var(--hud-label,#5e6070);text-transform:uppercase;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary)));letter-spacing:0.1em;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.game-body canvas{width:100%!important;height:100%!important;display:block;cursor:default;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:var(--hud-bg,rgba(5,6,15,0.9));border-top:1px solid var(--hud-border,transparent);flex-shrink:0;}
.status-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--hud-label,#5e6070);letter-spacing:0.15em;text-transform:uppercase;}
.status-val{font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:500;color:var(--sb-dim,#8e90a6);letter-spacing:0.02em;text-align:center;}
.status-result{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;}
.status-result.pass{color:#22c55e;}
.status-result.fail{color:#e8b94a;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="mascot">
      <svg width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
        <rect x="6" y="6" width="18" height="18" fill="none" stroke="var(--sb-accent,#3ec7e0)" stroke-width="1.5"/>
        <rect x="9" y="9" width="5" height="5" fill="var(--sb-accent,#3ec7e0)"/>
        <rect x="16" y="9" width="5" height="5" fill="rgba(232,185,74,0.85)"/>
        <rect x="9" y="16" width="5" height="5" fill="rgba(232,185,74,0.85)"/>
        <rect x="16" y="16" width="5" height="5" fill="var(--sb-accent,#3ec7e0)"/>
      </svg>
      <div class="mascot-txt"><b>BIT</b><br><span id="mascotSay">把指令对到信号里</span></div>
    </div>
    <div class="sidebar-title" id="sideTitle">EPOCH BUILDER</div>
    <div class="sidebar-sub" id="sideSub"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="guideLabel">GUIDE</div>
    <div class="sidebar-guide" id="guideText"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="trayLabel">MARKERS</div>
    <div class="tray" id="tray"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section" id="winLabel">CUT WINDOW</div>
    <div class="win-group">
      <div class="row"><label id="lblTmin">tmin</label><span class="val" id="valTmin">-0.5 s</span></div>
      <input type="range" id="sldTmin" min="-1" max="0" step="0.1" value="-0.5">
    </div>
    <div class="win-group">
      <div class="row"><label id="lblTmax">tmax</label><span class="val" id="valTmax">+4.0 s</span></div>
      <input type="range" id="sldTmax" min="1" max="6" step="0.1" value="4">
    </div>
    <button class="act-btn" id="cutBtn">CUT EPOCHS</button>
    <button class="reset-btn" id="resetBtn">RESET</button>
    <button class="sidebar-lang" id="langBtn">CN</button>
  </div>
  <div class="game-main">
    <div class="game-hud">
      <span class="hud-tag" id="hudTag">EEG-EPOCH</span>
      <div class="hud-item"><span class="hud-label" id="hudL1">PLACED</span><span class="hud-val" id="hudV1">0 / 4</span></div>
      <div class="hud-item"><span class="hud-label" id="hudL2">WINDOW</span><span class="hud-val" id="hudV2">4.5 s</span></div>
      <div class="hud-item"><span class="hud-label" id="hudL3">CLEAN EPOCHS</span><span class="hud-val" id="hudV3">--</span></div>
      <div class="hud-item"><span class="hud-label" id="hudL4">RANK</span><span class="hud-val" id="hudV4">--</span></div>
      <div class="style-switcher" id="styleSwitcher" style="margin-left:auto;"></div>
    </div>
    <div class="game-body"><canvas id="gc"></canvas></div>
    <div class="status-bar">
      <span class="status-label" id="statusLabel">HINT</span>
      <span class="status-val" id="statusText"></span>
      <span class="status-result fail" id="statusResult"></span>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAME VISUAL MODE SYSTEM
// ================================================================
var GAME_VISUAL_MODES = {
  light: {
    label:'LIGHT',bg:'#fafaf5',
    canvasBg1:'#fafaf5',canvasBg2:'#f0f0ea',canvasGrid:'rgba(15,23,42,0.05)',gridStep:32,
    canvasText:'#0f172a',canvasTextDim:'#475569',canvasStroke:'#0f172a',canvasStrokeDim:'rgba(15,23,42,0.3)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,
    canvasInnerBorder:true,canvasInnerBorderColor:'rgba(15,23,42,0.2)',
    sbBg:'rgba(250,250,245,0.96)',sbBorder:'#d4d4c8',sbText:'#0f172a',sbDim:'#475569',sbMute:'#94a3b8',
    hudBg:'rgba(250,250,245,0.92)',hudBorder:'#d4d4c8',hudLabel:'#64748b',hudValue:'#0f172a',
    ctrlBg:'#0f172a',ctrlColor:'#fafaf5',waveColor:'#1e3a52',bandColor:'#0f172a',
  },
  dark: {
    label:'DARK',bg:'#0a0a0a',
    canvasBg1:'#0a0a0a',canvasBg2:'#111111',canvasGrid:'rgba(255,255,255,0.04)',gridStep:48,
    canvasText:'#e5e5e5',canvasTextDim:'#a3a3a3',canvasStroke:'#e5e5e5',canvasStrokeDim:'rgba(255,255,255,0.2)',
    canvasGlow:false,canvasScanlines:false,canvasCornerBrackets:false,canvasTopLine:true,
    sbBg:'rgba(10,10,10,0.96)',sbBorder:'#1f1f1f',sbText:'#fafafa',sbDim:'#737373',sbMute:'#525252',
    hudBg:'rgba(10,10,10,0.9)',hudBorder:'#1f1f1f',hudLabel:'#525252',
    ctrlBg:null,ctrlColor:null,waveColor:'#cbd5e1',bandColor:'#e5e5e5',
  },
  cyberpunk: {
    label:'CYBER',bg:'#05060f',
    canvasBg1:'#05060f',canvasBg2:'#0b1320',canvasGrid:null,gridStep:48,
    canvasText:'#e2e8f0',canvasTextDim:'#9fb3c8',canvasStroke:'#e2e8f0',canvasStrokeDim:'rgba(255,255,255,0.12)',
    canvasGlow:true,canvasScanlines:true,canvasCornerBrackets:true,
    sbBg:'rgba(5,6,15,0.92)',sbBorder:null,sbText:null,sbDim:null,sbMute:null,
    hudBg:'rgba(5,6,15,0.9)',hudBorder:null,
    ctrlColor:'#05060f',waveColor:'#7fd8ea',bandColor:'#cdebf3',
  },
};
var GAME_MODE = 'cyberpunk';
// cs (Data Cathedral) palette — accent oklch(0.75 0.17 200) SIGNAL
var ACCENT = '#3ec7e0';   // cs SIGNAL cyan
var CORE   = '#2f8aa8';   // cs CORE
var DEPTH  = '#2c4a5a';   // cs DEPTH
var FLASH  = '#cdeef5';   // cs FLASH
var QUERY  = '#e8b94a';   // cs QUERY gold

function modeMeta(){ return GAME_VISUAL_MODES[GAME_MODE] || GAME_VISUAL_MODES.cyberpunk; }

function gameModeColors() {
  var m = modeMeta();
  return {
    bg1: m.canvasBg1, bg2: m.canvasBg2,
    grid: m.canvasGrid, gridStep: m.gridStep || 48,
    text: m.canvasText || '#e2e8f0', dim: m.canvasTextDim || '#a3a3a3',
    stroke: m.canvasStroke || '#e2e8f0', strokeDim: m.canvasStrokeDim || 'rgba(255,255,255,0.12)',
    accent: ACCENT,
    wave: m.waveColor || ACCENT, band: m.bandColor || '#e2e8f0',
    glow: !!m.canvasGlow, scanlines: !!m.canvasScanlines,
    cornerBrackets: !!m.canvasCornerBrackets,
    innerBorder: !!m.canvasInnerBorder,
    innerBorderColor: m.canvasInnerBorderColor || 'rgba(0,0,0,0.15)',
    topLine: !!m.canvasTopLine,
  };
}

function drawGameBg(c, w, h) {
  var mc = gameModeColors();
  var g = c.createLinearGradient(0,0,0,h);
  g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
  c.fillStyle = g; c.fillRect(0,0,w,h);
  var gc2 = mc.grid || 'rgba(62,199,224,0.05)';
  c.strokeStyle = gc2; c.lineWidth = 0.5;
  for(var x=0;x<w;x+=mc.gridStep){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
  for(var y=0;y<h;y+=mc.gridStep){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  if(mc.innerBorder){c.strokeStyle=mc.innerBorderColor;c.lineWidth=0.5;c.strokeRect(6,6,w-12,h-12);}
  if(mc.topLine){var tg=c.createLinearGradient(w*0.15,0,w*0.85,0);tg.addColorStop(0,'transparent');tg.addColorStop(0.4,mc.accent);tg.addColorStop(0.6,mc.accent);tg.addColorStop(1,'transparent');c.strokeStyle=tg;c.lineWidth=1;c.beginPath();c.moveTo(0,0.5);c.lineTo(w,0.5);c.stroke();}
  if(mc.scanlines){c.strokeStyle='rgba(255,255,255,0.022)';c.lineWidth=1;for(var sy=0;sy<h;sy+=3){c.beginPath();c.moveTo(0,sy);c.lineTo(w,sy);c.stroke();}}
  if(mc.cornerBrackets){var bl=Math.min(w,h)*0.05;c.strokeStyle=mc.accent;c.lineWidth=1.5;c.globalAlpha=0.5;c.beginPath();c.moveTo(8,8+bl);c.lineTo(8,8);c.lineTo(8+bl,8);c.stroke();c.beginPath();c.moveTo(w-8-bl,8);c.lineTo(w-8,8);c.lineTo(w-8,8+bl);c.stroke();c.beginPath();c.moveTo(8,h-8-bl);c.lineTo(8,h-8);c.lineTo(8+bl,h-8);c.stroke();c.beginPath();c.moveTo(w-8-bl,h-8);c.lineTo(w-8,h-8);c.lineTo(w-8,h-8+bl);c.stroke();c.globalAlpha=1;}
  if(mc.glow){var rg=c.createRadialGradient(w*0.5,h*0.4,0,w*0.5,h*0.4,w*0.6);rg.addColorStop(0,'rgba(62,199,224,0.06)');rg.addColorStop(1,'transparent');c.fillStyle=rg;c.fillRect(0,0,w,h);}
}

function applyGameMode(mode) {
  GAME_MODE = mode;
  var m = GAME_VISUAL_MODES[mode] || GAME_VISUAL_MODES.cyberpunk;
  var r = document.documentElement;
  r.style.setProperty('--bg-0', m.bg || '#05060f');
  r.style.setProperty('--bg', m.bg || '#05060f');
  r.style.setProperty('--sb-bg', m.sbBg || 'rgba(5,6,15,0.92)');
  r.style.setProperty('--sb-border', m.sbBorder || ACCENT);
  r.style.setProperty('--sb-text', m.sbText || '#e2e8f0');
  r.style.setProperty('--sb-dim', m.sbDim || '#8e90a6');
  r.style.setProperty('--sb-mute', m.sbMute || '#5e6070');
  r.style.setProperty('--sb-accent', ACCENT);
  r.style.setProperty('--sb-btn-bg', 'transparent');
  r.style.setProperty('--sb-btn-bd', m.sbBorder || 'transparent');
  r.style.setProperty('--hud-bg', m.hudBg || 'rgba(5,6,15,0.9)');
  r.style.setProperty('--hud-border', m.hudBorder || 'transparent');
  r.style.setProperty('--hud-label', m.hudLabel || '#5e6070');
  r.style.setProperty('--hud-value', m.hudValue || ACCENT);
  r.style.setProperty('--ctrl-bg', m.ctrlBg || ACCENT);
  r.style.setProperty('--ctrl-color', m.ctrlColor || '#05060f');
  r.style.setProperty('--primary', ACCENT);
  var dimColor = ACCENT.replace(/^#/, '');
  var rr = parseInt(dimColor.slice(0,2),16), gg = parseInt(dimColor.slice(2,4),16), bb = parseInt(dimColor.slice(4,6),16);
  r.style.setProperty('--primary-dim', 'rgba('+Math.round(rr*0.6)+','+Math.round(gg*0.6)+','+Math.round(bb*0.6)+',0.8)');
  r.style.setProperty('--glow-strong', 'rgba('+rr+','+gg+','+bb+',0.5)');
  document.querySelectorAll('.vm-btn').forEach(function(b){
    b.classList.toggle('vm-active', b.dataset.mode === mode);
  });
  if (typeof draw === 'function') draw();
}

function buildGameStyleSwitcher() {
  var c = document.getElementById('styleSwitcher');
  if (!c) return;
  c.innerHTML = '';
  ['light','dark','cyberpunk'].forEach(function(k){
    var btn = document.createElement('button');
    btn.className = 'vm-btn' + (k === GAME_MODE ? ' vm-active' : '');
    btn.dataset.mode = k;
    btn.textContent = GAME_VISUAL_MODES[k].label;
    btn.addEventListener('click', function(){ applyGameMode(k); });
    c.appendChild(btn);
  });
}

// ================================================================
// i18n
// ================================================================
var LANG = 'cn';
var I18N = {
  title:    {cn:'EPOCH 切片台', en:'EPOCH BUILDER'},
  sub:      {cn:'运动想象 · BCI 预处理', en:'Motor imagery · BCI prep'},
  mascot:   {cn:'把指令对到信号里', en:'Align each cue to its signal'},
  guide:    {cn:'这是一段 20 秒的连续录音。每次"想象"会让脑波出现一段下陷（ERD）。把左边 4 个 cue 标记拖到信号里想象真正发生的时刻——对准下陷的起点（想象提示出现处）。再用 tmin/tmax 调好切窗，点"切片"验证：每段是否恰好抓住一次完整想象。', en:'A 20-second continuous recording. Each imagery makes the wave dip (ERD). Drag the 4 cue markers onto the moments imagery actually happened — onto the start of each dip (where the cue appeared). Set tmin/tmax, then hit CUT to check: does each slice hold exactly one full imagery?'},
  trayLbl:  {cn:'CUE 标记', en:'CUE MARKERS'},
  winLbl:   {cn:'切窗', en:'CUT WINDOW'},
  tmin:     {cn:'tmin（前）', en:'tmin (pre)'},
  tmax:     {cn:'tmax（后）', en:'tmax (post)'},
  cut:      {cn:'切片', en:'CUT EPOCHS'},
  reset:    {cn:'重置', en:'RESET'},
  guideLbl: {cn:'玩法', en:'GUIDE'},
  hudPlaced:{cn:'已放置', en:'PLACED'},
  hudWin:   {cn:'窗长', en:'WINDOW'},
  hudClean: {cn:'干净 EPOCH', en:'CLEAN EPOCHS'},
  hudRank:  {cn:'称号', en:'RANK'},
  hint:     {cn:'提示', en:'HINT'},
  cueLbl:   {cn:'CUE', en:'CUE'},
  drop:     {cn:'拖我到下陷起点', en:'drag to dip start'},
  placed:   {cn:'已放', en:'SET'},
  // dynamic hints
  hStart:   {cn:'从左边把 CUE 标记拖到波形里——找信号下陷开始的地方放下。', en:'Drag CUE markers from the left onto the wave — drop them where the dip begins.'},
  hPlaceMore:{cn:'还有标记没放。每一次想象都要放一个 cue。', en:'Markers left to place. One cue per imagery.'},
  hReady:   {cn:'4 个标记都放好了。调好切窗，点"切片"验证。', en:'All 4 placed. Set the window and hit CUT to validate.'},
  hMissAll: {cn:'标记放歪了——切片落到了休息段或跨了两次想象。把标记对到下陷起点再试。', en:'Markers are off — slices landed on rest or spanned two imageries. Snap them to the dip start.'},
  hMissSome:{cn:'还差一点：有的 epoch 没抓住完整想象。微调那几个偏掉的标记。', en:'Almost: some epochs missed a full imagery. Nudge the off markers.'},
  hWinShort:{cn:'标记对得不错，但窗太短切掉了想象尾部。把 tmax 往后拉到约 +4s。', en:'Markers good, but window too short — cut off the imagery tail. Push tmax to about +4s.'},
  hWinLong: {cn:'标记对得不错，但窗太长串进了下一次想象。把 tmax 收回 4s 以内。', en:'Markers good, but window too long — bled into the next imagery. Pull tmax back under 4s.'},
  hWin:     {cn:'4 段干净对齐的 epoch！每段恰好抓住一次完整想象——你是切片工程师了。', en:'4 clean aligned epochs! Each holds exactly one full imagery — you are an Epoch Engineer.'},
  rTune:    {cn:'建造中', en:'BUILDING'},
  rWin:     {cn:'切片工程师', en:'EPOCH ENGINEER'},
  rng:      {cn:'称号未解锁', en:'locked'},
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || (I18N[key] && I18N[key]['en']) || key; }
function setupLangToggle() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  btn.textContent = LANG.toUpperCase();
  btn.addEventListener('click', function() {
    LANG = LANG === 'en' ? 'cn' : 'en';
    btn.textContent = LANG.toUpperCase();
    refreshI18N();
  });
}
function refreshI18N(){
  document.getElementById('sideTitle').textContent = t('title');
  document.getElementById('sideSub').textContent = t('sub');
  document.getElementById('mascotSay').textContent = t('mascot');
  document.getElementById('guideLabel').textContent = t('guideLbl');
  document.getElementById('guideText').textContent = t('guide');
  document.getElementById('trayLabel').textContent = t('trayLbl');
  document.getElementById('winLabel').textContent = t('winLbl');
  document.getElementById('lblTmin').textContent = t('tmin');
  document.getElementById('lblTmax').textContent = t('tmax');
  document.getElementById('cutBtn').textContent = t('cut');
  document.getElementById('resetBtn').textContent = t('reset');
  document.getElementById('hudL1').textContent = t('hudPlaced');
  document.getElementById('hudL2').textContent = t('hudWin');
  document.getElementById('hudL3').textContent = t('hudClean');
  document.getElementById('hudL4').textContent = t('hudRank');
  document.getElementById('statusLabel').textContent = t('hint');
  buildTray();
  update();
}

// ================================================================
// GAME LOGIC — Pattern 2 Build & Test (drag markers, then cut+validate)
// ================================================================
var T_START = 0, T_END = 20;                 // seconds of continuous recording
// TRUE imagery onsets hidden in the wave (player must find these). Spaced 4.8s.
var TRUE_ONSETS = [2.4, 7.2, 12.0, 16.8];
var ERD_LO = 0.5, ERD_HI = 2.5;              // ERD relative to onset (where the dip sits)
var SNAP_TOL = 0.55;                          // a marker counts "aligned" if within 0.55s of true onset
var N_MARKERS = TRUE_ONSETS.length;

var tmin = -0.5, tmax = 4.0;

// markers: placed=null means still in tray; else its time (s) on the timeline
var markers = [];
function resetMarkers(){
  markers = [];
  for (var i = 0; i < N_MARKERS; i++) markers.push({ id: i, time: null });
}
resetMarkers();

var lastCut = null;   // null until CUT pressed; then array of per-epoch results

// continuous EEG samples (precomputed once, deterministic — no Math.random)
var SR = 60;
var SAMPLES = [];
function buildSignal(){
  SAMPLES = [];
  var n = Math.round((T_END - T_START) * SR);
  for (var i = 0; i <= n; i++) {
    var time = T_START + i / SR;
    var v = 0.9 * Math.sin(2 * Math.PI * 1.6 * time + 0.6)
          + 0.35 * Math.sin(2 * Math.PI * 3.3 * time + 1.1);
    for (var k = 0; k < TRUE_ONSETS.length; k++) {
      var rel = time - TRUE_ONSETS[k];
      if (rel > ERD_LO && rel < ERD_HI) {
        var center = (ERD_LO + ERD_HI) / 2;
        var dist = Math.abs(rel - center) / ((ERD_HI - ERD_LO) / 2);
        var atten = 0.22 + 0.78 * dist;     // strongest suppression at center of dip
        v *= atten;
      }
      if (rel > -0.05 && rel < 0.18) v += 0.7 * Math.exp(-Math.pow((rel - 0.06) / 0.05, 2));
    }
    v += 0.07 * Math.sin(2 * Math.PI * 13.0 * time);
    SAMPLES.push({ time: time, v: v });
  }
}

function clamp(x,a,b){ return x<a?a:(x>b?b:x); }

function placedCount(){ var c=0; for(var i=0;i<markers.length;i++) if(markers[i].time!==null) c++; return c; }

// Evaluate one epoch built at marker 'mt' with window [tmin,tmax].
// Returns {ok, reason} where reason in 'good'|'rest'|'span'|'shortcut'|'leak'
function evalEpoch(mt){
  // find the true onset this marker is closest to
  var best = -1, bestD = 1e9;
  for (var k = 0; k < TRUE_ONSETS.length; k++){
    var d = Math.abs(mt - TRUE_ONSETS[k]);
    if (d < bestD){ bestD = d; best = k; }
  }
  var onset = TRUE_ONSETS[best];
  var epLo = mt + tmin, epHi = mt + tmax;       // absolute window of this epoch
  // ERD zone of the matched imagery (absolute)
  var erdLo = onset + ERD_LO, erdHi = onset + ERD_HI;
  // marker far from any true onset -> sits on rest
  if (bestD > SNAP_TOL) return { ok:false, reason:'rest', onset:onset, d:bestD };
  // window must fully contain the ERD zone
  if (epHi < erdHi - 0.05) return { ok:false, reason:'shortcut', onset:onset, d:bestD };
  if (epLo > erdLo + 0.05) return { ok:false, reason:'shortcut', onset:onset, d:bestD };
  // window must not bleed into the NEXT or PREV imagery's ERD zone
  for (var j = 0; j < TRUE_ONSETS.length; j++){
    if (j === best) continue;
    var oErdLo = TRUE_ONSETS[j] + ERD_LO, oErdHi = TRUE_ONSETS[j] + ERD_HI;
    var overlap = Math.min(epHi, oErdHi) - Math.max(epLo, oErdLo);
    if (overlap > 0.1) return { ok:false, reason:'span', onset:onset, d:bestD };
  }
  return { ok:true, reason:'good', onset:onset, d:bestD };
}

function runCut(){
  if (placedCount() < N_MARKERS) return;
  lastCut = [];
  for (var i = 0; i < markers.length; i++){
    if (markers[i].time === null){ lastCut.push(null); continue; }
    lastCut.push(evalEpoch(markers[i].time));
  }
  update();
}

function cleanEpochs(){
  if (!lastCut) return 0;
  var c = 0; for (var i=0;i<lastCut.length;i++) if(lastCut[i] && lastCut[i].ok) c++;
  return c;
}
function solved(){ return cleanEpochs() === N_MARKERS; }

function hintFor(){
  var pc = placedCount();
  if (pc === 0) return 'hStart';
  if (pc < N_MARKERS) return 'hPlaceMore';
  if (!lastCut) return 'hReady';
  if (solved()) return 'hWin';
  // classify dominant failure
  var rest=0, span=0, shortcut=0;
  for (var i=0;i<lastCut.length;i++){
    if (lastCut[i] && !lastCut[i].ok){
      if (lastCut[i].reason==='rest') rest++;
      else if (lastCut[i].reason==='span') span++;
      else if (lastCut[i].reason==='shortcut') shortcut++;
    }
  }
  if (rest >= 2) return 'hMissAll';
  if (rest >= 1) return 'hMissSome';
  if (span >= 1) return 'hWinLong';
  if (shortcut >= 1) return (tmax < 4.0 ? 'hWinShort' : 'hMissSome');
  return 'hMissSome';
}

// ================================================================
// CANVAS
// ================================================================
var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var W = 0, H = 0;

function resize(){
  var body = canvas.parentElement;
  var rect = body.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  W = rect.width; H = rect.height;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}

function plotRect(){
  var padL = 64, padR = 26, padT = 34, padB = 44;
  return { x: padL, y: padT, w: W - padL - padR, h: H - padT - padB };
}
function xOf(time, pr){ return pr.x + (time - T_START) / (T_END - T_START) * pr.w; }
function timeOf(px, pr){ return T_START + (px - pr.x) / pr.w * (T_END - T_START); }
function yOf(v, pr){ return pr.y + pr.h * 0.5 - v * (pr.h * 0.30); }

// marker draw geometry: a flag head near top of plot
function markerHeadRect(mt, pr){
  var cx = xOf(mt, pr);
  return { cx: cx, y: pr.y - 4, w: 26, h: 16 };
}

function draw(){
  if (W < 1 || H < 1) return;
  var mc = gameModeColors();
  drawGameBg(ctx, W, H);
  var pr = plotRect();

  // --- zero baseline ---
  ctx.strokeStyle = mc.strokeDim; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pr.x, yOf(0, pr)); ctx.lineTo(pr.x + pr.w, yOf(0, pr)); ctx.stroke();

  // --- after CUT: draw epoch windows behind the wave so cuts are visible ---
  if (lastCut){
    for (var e = 0; e < markers.length; e++){
      if (markers[e].time === null) continue;
      var res = lastCut[e];
      var ok = res && res.ok;
      var wx0 = clamp(xOf(markers[e].time + tmin, pr), pr.x, pr.x + pr.w);
      var wx1 = clamp(xOf(markers[e].time + tmax, pr), pr.x, pr.x + pr.w);
      ctx.fillStyle = ok ? 'rgba(62,199,224,0.15)' : 'rgba(232,185,74,0.13)';
      ctx.fillRect(wx0, pr.y, wx1 - wx0, pr.h);
      ctx.strokeStyle = ok ? 'rgba(62,199,224,0.85)' : 'rgba(232,185,74,0.85)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(wx0, pr.y); ctx.lineTo(wx0, pr.y+pr.h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx1, pr.y); ctx.lineTo(wx1, pr.y+pr.h); ctx.stroke();
    }
  }

  // --- continuous EEG waveform ---
  ctx.beginPath();
  for (var i = 0; i < SAMPLES.length; i++){
    var px = xOf(SAMPLES[i].time, pr), py = yOf(SAMPLES[i].v, pr);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  if (mc.glow){ ctx.shadowColor = ACCENT; ctx.shadowBlur = 6; }
  ctx.strokeStyle = mc.wave; ctx.lineWidth = 1.4; ctx.stroke();
  ctx.shadowBlur = 0;

  // --- time axis ticks ---
  ctx.fillStyle = mc.dim;
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (var sec = 0; sec <= T_END; sec += 2){
    var tx = xOf(sec, pr);
    ctx.strokeStyle = mc.strokeDim; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(tx, pr.y + pr.h); ctx.lineTo(tx, pr.y + pr.h + 4); ctx.stroke();
    ctx.fillText(sec + 's', tx, pr.y + pr.h + 7);
  }
  // y axis label
  ctx.save();
  ctx.fillStyle = mc.dim; ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.translate(16, pr.y + pr.h / 2); ctx.rotate(-Math.PI/2);
  ctx.fillText('EEG  uV', 0, 0);
  ctx.restore();

  // --- placed markers (draggable flags) ---
  for (var k = 0; k < markers.length; k++){
    if (markers[k].time === null) continue;
    var mt = markers[k].time;
    var cx = xOf(mt, pr);
    var res2 = lastCut ? lastCut[k] : null;
    var col = res2 ? (res2.ok ? ACCENT : QUERY) : ACCENT;
    var beingDragged = (dragState && dragState.idx === k);
    // stem
    ctx.strokeStyle = col; ctx.lineWidth = beingDragged ? 2.2 : 1.6;
    ctx.beginPath(); ctx.moveTo(cx, pr.y); ctx.lineTo(cx, pr.y + pr.h); ctx.stroke();
    // flag head
    var hr = markerHeadRect(mt, pr);
    ctx.fillStyle = col;
    ctx.fillRect(cx, hr.y - hr.h, hr.w, hr.h);
    ctx.fillStyle = (GAME_MODE==='light') ? '#fafaf5' : '#05060f';
    ctx.font = 'bold 9px "JetBrains Mono", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t('cueLbl') + (k + 1), cx + 4, hr.y - hr.h/2);
    // time readout under flag
    ctx.fillStyle = mc.dim;
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(mt.toFixed(1) + 's', cx, pr.y + pr.h - 2);
  }

  // --- ghost marker following pointer when dragging from tray ---
  if (dragState && dragState.fromTray && dragState.ghostX !== null){
    var gx = clamp(dragState.ghostX, pr.x, pr.x + pr.w);
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = ACCENT; ctx.setLineDash([3,3]); ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(gx, pr.y); ctx.lineTo(gx, pr.y + pr.h); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = ACCENT;
    ctx.fillRect(gx, pr.y - 20, 26, 16);
    ctx.fillStyle = (GAME_MODE==='light') ? '#fafaf5' : '#05060f';
    ctx.font = 'bold 9px "JetBrains Mono", monospace';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(t('cueLbl') + (dragState.idx + 1), gx + 4, pr.y - 12);
    ctx.restore();
  }

  // --- legend / prompt ---
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = '9px "JetBrains Mono", monospace';
  var lx = pr.x + 4, ly = pr.y - 18;
  if (placedCount() < N_MARKERS && !dragState){
    ctx.fillStyle = QUERY;
    ctx.fillText(LANG==='cn' ? '从左侧拖 CUE 标记到信号下陷起点处' : 'drag CUE markers onto the dip starts', lx, ly);
  } else if (lastCut){
    ctx.fillStyle = solved() ? '#22c55e' : QUERY;
    ctx.fillText((LANG==='cn'?'干净 epoch: ':'clean epochs: ') + cleanEpochs() + ' / ' + N_MARKERS, lx, ly);
  }
}

// ================================================================
// DRAG INTERACTION (canvas-level, pointer-based)
// ================================================================
var dragState = null;   // {idx, fromTray, ghostX}

function canvasPoint(ev){
  var rect = canvas.getBoundingClientRect();
  return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
}

// hit-test a placed marker flag head
function hitMarker(px, py){
  var pr = plotRect();
  for (var k = markers.length - 1; k >= 0; k--){
    if (markers[k].time === null) continue;
    var cx = xOf(markers[k].time, pr);
    var hr = markerHeadRect(markers[k].time, pr);
    // hit on flag head OR anywhere along the stem (generous)
    if (py >= pr.y - 22 && py <= pr.y + pr.h && Math.abs(px - cx) <= 12) return k;
  }
  return -1;
}

function startTrayDrag(idx, clientX){
  if (markers[idx].time !== null) return;
  var pr = plotRect();
  var rect = canvas.getBoundingClientRect();
  dragState = { idx: idx, fromTray: true, ghostX: clientX - rect.left };
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragUp);
  draw();
}

function onCanvasDown(ev){
  var p = canvasPoint(ev);
  var k = hitMarker(p.x, p.y);
  if (k >= 0){
    dragState = { idx: k, fromTray: false, ghostX: null };
    canvas.setPointerCapture && canvas.setPointerCapture(ev.pointerId);
    document.addEventListener('pointermove', onDragMove);
    document.addEventListener('pointerup', onDragUp);
    ev.preventDefault();
  }
}

function onDragMove(ev){
  if (!dragState) return;
  var pr = plotRect();
  var rect = canvas.getBoundingClientRect();
  var lx = ev.clientX - rect.left;
  if (dragState.fromTray){
    dragState.ghostX = lx;
  } else {
    var nt = clamp(timeOf(lx, pr), T_START, T_END);
    markers[dragState.idx].time = nt;
    lastCut = null;  // moving a marker invalidates previous cut
  }
  draw();
}

function onDragUp(ev){
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragUp);
  if (!dragState){ return; }
  var pr = plotRect();
  var rect = canvas.getBoundingClientRect();
  var lx = ev.clientX - rect.left, ly = ev.clientY - rect.top;
  if (dragState.fromTray){
    // drop only if released over the plot area
    var inPlot = ly >= pr.y - 24 && ly <= pr.y + pr.h + 6 && lx >= pr.x - 10 && lx <= pr.x + pr.w + 10;
    if (inPlot){
      markers[dragState.idx].time = clamp(timeOf(lx, pr), T_START, T_END);
      lastCut = null;
    }
  }
  dragState = null;
  buildTray();
  update();
}

// support placing via dragstart from tray for environments without pointer drag:
// we implement tray markers as pointerdown->document drag

// ================================================================
// TRAY (sidebar marker chips)
// ================================================================
function buildTray(){
  var tray = document.getElementById('tray');
  tray.innerHTML = '';
  for (var i = 0; i < markers.length; i++){
    (function(idx){
      var placed = markers[idx].time !== null;
      var el = document.createElement('div');
      el.className = 'tray-marker' + (placed ? ' placed' : '');
      el.innerHTML = '<span class="dot"></span><span class="tm-label">'+ t('cueLbl') + (idx+1) +'</span>'
                   + '<span class="tm-state">'+ (placed ? t('placed') : t('drop')) +'</span>';
      if (!placed){
        el.addEventListener('pointerdown', function(ev){
          ev.preventDefault();
          startTrayDrag(idx, ev.clientX);
        });
      }
      tray.appendChild(el);
    })(i);
  }
}

// ================================================================
// UI UPDATE
// ================================================================
function update(){
  document.getElementById('valTmin').textContent = tmin.toFixed(1) + ' s';
  document.getElementById('valTmax').textContent = '+' + tmax.toFixed(1) + ' s';
  document.getElementById('hudV1').textContent = placedCount() + ' / ' + N_MARKERS;
  document.getElementById('hudV2').textContent = (tmax - tmin).toFixed(1) + 's';
  var ceEl = document.getElementById('hudV3');
  if (lastCut){ ceEl.textContent = cleanEpochs() + ' / ' + N_MARKERS; ceEl.style.color = solved() ? '#22c55e' : QUERY; }
  else { ceEl.textContent = '--'; ceEl.style.color = ''; }
  var rkEl = document.getElementById('hudV4');
  rkEl.textContent = solved() ? t('rWin') : t('rng');
  rkEl.style.color = solved() ? '#22c55e' : '';
  document.getElementById('cutBtn').disabled = (placedCount() < N_MARKERS);
  document.getElementById('statusText').textContent = t(hintFor());
  var res = document.getElementById('statusResult');
  res.textContent = solved() ? t('rWin') : t('rTune');
  res.className = 'status-result ' + (solved() ? 'pass' : 'fail');
  draw();
}

// ================================================================
// WIRING
// ================================================================
document.getElementById('sldTmin').addEventListener('input', function(e){
  tmin = parseFloat(e.target.value); lastCut = null; update();
});
document.getElementById('sldTmax').addEventListener('input', function(e){
  tmax = parseFloat(e.target.value); lastCut = null; update();
});
document.getElementById('cutBtn').addEventListener('click', runCut);
document.getElementById('resetBtn').addEventListener('click', function(){
  resetMarkers(); lastCut = null;
  tmin = -0.5; tmax = 4.0;
  document.getElementById('sldTmin').value = tmin;
  document.getElementById('sldTmax').value = tmax;
  buildTray(); update();
});
canvas.addEventListener('pointerdown', onCanvasDown);

window.addEventListener('resize', resize);
if (window.ResizeObserver){
  new ResizeObserver(function(){ resize(); }).observe(canvas.parentElement);
}

// expose a tiny test hook (used only by verification, harmless in prod)
window.__epochTest = {
  place: function(idx, time){ markers[idx].time = time; lastCut = null; buildTray(); update(); },
  setWin: function(a, b){ tmin = a; tmax = b; document.getElementById('sldTmin').value=a; document.getElementById('sldTmax').value=b; lastCut=null; update(); },
  cut: function(){ runCut(); },
  state: function(){ return { placed: placedCount(), clean: cleanEpochs(), solved: solved(), markers: markers.map(function(m){return m.time;}), lastCut: lastCut }; },
  truth: TRUE_ONSETS,
};

// init
buildSignal();
buildGameStyleSwitcher();
applyGameMode('cyberpunk');
setupLangToggle();
buildTray();
refreshI18N();
setTimeout(resize, 30);
setTimeout(resize, 200);
</script>
