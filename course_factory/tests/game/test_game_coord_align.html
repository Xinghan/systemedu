<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#131313;font-family:'Space Grotesk','Inter','Noto Sans SC',sans-serif;color:#e5e2e1;
}
.lang-btn{
  position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px;
}
.guide-panel{
  position:fixed;top:8px;right:8px;width:260px;max-height:40vh;
  overflow-y:auto;z-index:100;
  background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);padding:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);
}
.guide-panel h3{
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  margin-bottom:8px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;color:#ffb59c;
}
.guide-panel .toggle{font-size:12px;opacity:0.6;}
.guide-panel ul{padding-left:16px;line-height:1.6;}
.guide-panel .guide-content.collapsed{display:none;}
.wrapper{display:flex;flex-direction:column;height:100vh;}
.top-bar{
  display:flex;align-items:center;justify-content:center;
  padding:6px 12px;
  background:rgba(28,27,27,0.92);
  border-bottom:1px solid rgba(138,136,134,0.15);
}
.top-bar .title-text{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;letter-spacing:1px;
}
.game-area{display:flex;flex:1;min-height:0;}
.left-panel{
  width:200px;
  display:flex;flex-direction:column;gap:10px;
  padding:12px;
  background:rgba(20,20,20,0.7);
  border-right:1px solid rgba(138,136,134,0.15);
  overflow-y:auto;
}
.slider-group{display:flex;flex-direction:column;gap:4px;}
.slider-group label{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  color:#8a8886;letter-spacing:1px;text-transform:uppercase;
}
.slider-group .val{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  color:#ffb59c;
}
.slider-group input[type=range]{
  width:100%;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(138,136,134,0.3);outline:none;
}
.slider-group input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:14px;height:14px;
  background:#ff5f1f;cursor:pointer;
}
.canvas-wrap{flex:1;min-height:0;position:relative;}
.canvas-wrap canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
.controls-bar{
  display:flex;align-items:center;gap:8px;justify-content:center;
  padding:6px 12px;
  background:rgba(28,27,27,0.92);
  border-top:1px solid rgba(138,136,134,0.15);
}
.controls-bar button{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  padding:4px 16px;cursor:pointer;letter-spacing:1px;
  border:1px solid rgba(138,136,134,0.15);
  background:transparent;color:#ffb59c;
}
.controls-bar button:hover{background:#353534;}
.controls-bar button.primary{background:rgba(255,95,31,0.2);border-color:#ff5f1f;}
.hud{
  display:flex;align-items:center;justify-content:space-around;
  height:52px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid rgba(255,255,255,0.06);
}
.hud .hud-col{text-align:center;}
.hud .hud-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:#8a8886;letter-spacing:1px;text-transform:uppercase;}
.hud .hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#e5e2e1;}
.feedback-overlay{
  display:none;
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;
  background:rgba(0,0,0,0.8);
  justify-content:center;align-items:center;
}
.feedback-overlay.show{display:flex;}
.feedback-box{
  padding:32px;max-width:420px;text-align:center;
  background:rgba(20,20,35,0.95);backdrop-filter:blur(12px);
  border:1px solid rgba(16,185,129,0.3);
}
.feedback-box h2{font-family:'Space Grotesk',sans-serif;font-size:18px;color:#10b981;margin-bottom:12px;}
.feedback-box p{font-family:'Noto Sans SC',sans-serif;font-size:14px;color:#c6c6c6;line-height:1.6;margin-bottom:16px;}
.feedback-box button{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  padding:8px 24px;cursor:pointer;letter-spacing:1px;
  border:1px solid #10b981;background:rgba(16,185,129,0.15);color:#10b981;
}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideHeader"><span id="guideTitle"></span> <span class="toggle" id="guideToggle">[-]</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideWhat"></p>
    <ul id="guidePoints"></ul>
    <p id="guideTips" style="margin-top:6px;font-weight:700;"></p>
  </div>
</div>
<div class="wrapper">
  <div class="top-bar"><span class="title-text" id="titleText"></span></div>
  <div class="game-area">
    <div class="left-panel" id="leftPanel">
      <div class="slider-group">
        <label id="lblCamX">CAM OFFSET X</label>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="sliderCamX" min="-50" max="50" value="0" step="1"/>
          <span class="val" id="valCamX">0</span>
        </div>
      </div>
      <div class="slider-group">
        <label id="lblCamY">CAM OFFSET Y</label>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="sliderCamY" min="-50" max="50" value="0" step="1"/>
          <span class="val" id="valCamY">0</span>
        </div>
      </div>
      <div class="slider-group">
        <label id="lblCamRot">CAM ROTATION</label>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="sliderCamRot" min="-30" max="30" value="0" step="1"/>
          <span class="val" id="valCamRot">0&deg;</span>
        </div>
      </div>
      <div class="slider-group">
        <label id="lblHeading">ROVER HEADING</label>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="sliderHeading" min="0" max="360" value="30" step="1"/>
          <span class="val" id="valHeading">30&deg;</span>
        </div>
      </div>
      <div style="border-top:1px solid rgba(138,136,134,0.15);padding-top:8px;margin-top:4px;">
        <div class="slider-group">
          <label id="lblTarget" style="color:#10b981;">TARGET</label>
          <p id="targetInfo" style="font-size:12px;color:#c6c6c6;line-height:1.4;"></p>
        </div>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="c"></canvas>
    </div>
  </div>
  <div class="controls-bar" id="controlsBar">
    <button id="btnReset"></button>
    <button id="btnDrive" class="primary"></button>
  </div>
  <div class="hud" id="hud"></div>
</div>
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-box">
    <h2 id="fbTitle"></h2>
    <p id="fbText"></p>
    <button id="fbBtn"></button>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideWhat:{en:'Adjust camera mount offset and rotation to align coordinate frames. Then drive the rover to reach the target.',cn:'\u8c03\u6574\u76f8\u673a\u5b89\u88c5\u504f\u79fb\u548c\u65cb\u8f6c\u89d2\u4ee5\u5bf9\u9f50\u5750\u6807\u7cfb\u3002\u7136\u540e\u9a7e\u9a76\u706b\u661f\u8f66\u5230\u8fbe\u76ee\u6807\u70b9\u3002'},
  guideStep1:{en:'Step 1: Set camera offset X/Y to match physical mount position',cn:'\u6b65\u9aa4 1: \u8bbe\u7f6e\u76f8\u673a X/Y \u504f\u79fb\u4ee5\u5339\u914d\u5b9e\u9645\u5b89\u88c5\u4f4d\u7f6e'},
  guideStep2:{en:'Step 2: Set camera rotation to match actual mounting angle',cn:'\u6b65\u9aa4 2: \u8bbe\u7f6e\u76f8\u673a\u65cb\u8f6c\u89d2\u4ee5\u5339\u914d\u5b9e\u9645\u5b89\u88c5\u89d2\u5ea6'},
  guideStep3:{en:'Step 3: Click DRIVE and observe if rover reaches the target or drifts',cn:'\u6b65\u9aa4 3: \u70b9\u51fb\u9a7e\u9a76\u5e76\u89c2\u5bdf\u706b\u661f\u8f66\u662f\u5230\u8fbe\u76ee\u6807\u8fd8\u662f\u504f\u79fb'},
  guideTips:{en:'Tip: The actual camera is at X=15, Y=-8, Rot=5deg. Try to match these values!',cn:'\u63d0\u793a: \u5b9e\u9645\u76f8\u673a\u5728 X=15, Y=-8, Rot=5\u00b0\u3002\u8bd5\u7740\u5339\u914d\u8fd9\u4e9b\u503c!'},
  title:{en:'COORD ALIGN SIMULATOR',cn:'\u5750\u6807\u5bf9\u9f50\u6a21\u62df\u5668'},
  lblCamX:{en:'CAM OFFSET X',cn:'\u76f8\u673a X \u504f\u79fb'},
  lblCamY:{en:'CAM OFFSET Y',cn:'\u76f8\u673a Y \u504f\u79fb'},
  lblCamRot:{en:'CAM ROTATION',cn:'\u76f8\u673a\u65cb\u8f6c'},
  lblHeading:{en:'ROVER HEADING',cn:'\u8f66\u5934\u671d\u5411'},
  lblTarget:{en:'TARGET',cn:'\u76ee\u6807'},
  targetInfo:{en:'Reach the green target. If camera params are wrong, the rover will miss it.',cn:'\u5230\u8fbe\u7eff\u8272\u76ee\u6807\u70b9\u3002\u5982\u679c\u76f8\u673a\u53c2\u6570\u9519\u8bef\uff0c\u706b\u661f\u8f66\u4f1a\u504f\u79bb\u76ee\u6807\u3002'},
  btnReset:{en:'RESET',cn:'\u91cd\u7f6e'},
  btnDrive:{en:'DRIVE',cn:'\u9a7e\u9a76'},
  hudDrift:{en:'DRIFT',cn:'\u504f\u79fb'},
  hudStatus:{en:'STATUS',cn:'\u72b6\u6001'},
  hudAttempt:{en:'ATTEMPT',cn:'\u5c1d\u8bd5'},
  hudAccuracy:{en:'ACCURACY',cn:'\u7cbe\u5ea6'},
  statusReady:{en:'READY',cn:'\u5c31\u7eea'},
  statusDriving:{en:'DRIVING...',cn:'\u9a7e\u9a76\u4e2d...'},
  statusHit:{en:'HIT!',cn:'\u547d\u4e2d!'},
  statusMiss:{en:'MISSED',cn:'\u504f\u79bb'},
  fbWinTitle:{en:'ALIGNMENT COMPLETE!',cn:'\u5bf9\u9f50\u5b8c\u6210!'},
  fbWinText:{en:'You matched the camera parameters correctly. The rover reached the target with minimal drift. This is exactly what real calibration achieves: software path matches physical motion.',cn:'\u4f60\u6b63\u786e\u5339\u914d\u4e86\u76f8\u673a\u53c2\u6570\u3002\u706b\u661f\u8f66\u4ee5\u6700\u5c0f\u504f\u79fb\u5230\u8fbe\u76ee\u6807\u3002\u8fd9\u6b63\u662f\u771f\u5b9e\u6807\u5b9a\u7684\u76ee\u7684: \u8f6f\u4ef6\u8def\u5f84\u4e0e\u7269\u7406\u8fd0\u52a8\u5339\u914d\u3002'},
  fbTryAgain:{en:'TRY AGAIN',cn:'\u518d\u8bd5\u4e00\u6b21'},
  fbClose:{en:'CLOSE',cn:'\u5173\u95ed'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);

/* Game state */
var actualCamX=15, actualCamY=-8, actualCamRot=5; /* ground truth */
var userCamX=0, userCamY=0, userCamRot=0, roverHeading=30;
var attempt=0, status='ready', driftDist=0, animProgress=0, animId=null;
var roverStartX=0.2, roverStartY=0.75; /* normalized field coords */
var targetNX=0.7, targetNY=0.3; /* normalized target */

function fieldToCanvas(nx,ny,fx,fy,fw,fh){return [fx+nx*fw, fy+ny*fh];}

function drawBg(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#131313');g.addColorStop(1,'#1a1035');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  var step=20*DPR;
  for(var x=0;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawField(){
  var pad=30*DPR;
  var fw=W-pad*2, fh=H-pad*2;
  var fx=pad, fy=pad;
  /* grid */
  ctx.strokeStyle='rgba(0,218,243,0.1)';ctx.lineWidth=1;
  var cs=fw/12;
  for(var i=0;i<=12;i++){
    ctx.beginPath();ctx.moveTo(fx+i*cs,fy);ctx.lineTo(fx+i*cs,fy+fh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,fy+i*(fh/12));ctx.lineTo(fx+fw,fy+i*(fh/12));ctx.stroke();
  }
  /* world axes */
  var axLen=50*DPR;
  ctx.save();
  ctx.strokeStyle='#00daf3';ctx.fillStyle='#00daf3';ctx.lineWidth=2*DPR;
  var ox=fx+15*DPR, oy=fy+fh-15*DPR;
  /* N (up) */
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy-axLen);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy-axLen);ctx.lineTo(ox-4*DPR,oy-axLen+8*DPR);ctx.lineTo(ox+4*DPR,oy-axLen+8*DPR);ctx.closePath();ctx.fill();
  ctx.font='bold '+Math.round(10*DPR)+'px "Space Grotesk"';ctx.textAlign='center';
  ctx.fillText('N',ox,oy-axLen-6*DPR);
  /* E (right) */
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+axLen,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox+axLen,oy);ctx.lineTo(ox+axLen-8*DPR,oy-4*DPR);ctx.lineTo(ox+axLen-8*DPR,oy+4*DPR);ctx.closePath();ctx.fill();
  ctx.fillText('E',ox+axLen+8*DPR,oy+4*DPR);
  ctx.restore();

  /* target */
  var tp=fieldToCanvas(targetNX,targetNY,fx,fy,fw,fh);
  ctx.save();
  var tg=ctx.createRadialGradient(tp[0],tp[1],0,tp[0],tp[1],18*DPR);
  tg.addColorStop(0,'rgba(16,185,129,0.5)');tg.addColorStop(1,'rgba(16,185,129,0)');
  ctx.fillStyle=tg;ctx.beginPath();ctx.arc(tp[0],tp[1],18*DPR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#10b981';ctx.beginPath();ctx.arc(tp[0],tp[1],6*DPR,0,Math.PI*2);ctx.fill();
  ctx.font='bold '+Math.round(10*DPR)+'px "Space Grotesk"';
  ctx.fillStyle='#10b981';ctx.textAlign='center';
  ctx.fillText('TARGET',tp[0],tp[1]-12*DPR);
  ctx.restore();

  /* Rover */
  var headRad=(roverHeading*Math.PI/180);
  var rp;
  if(status==='driving'||status==='hit'||status==='miss'){
    /* Compute actual driven path vs intended path */
    var errX=(userCamX-actualCamX)/100;
    var errY=(userCamY-actualCamY)/100;
    var errRot=(userCamRot-actualCamRot)*Math.PI/180;
    /* intended direction toward target */
    var dx=targetNX-roverStartX, dy=targetNY-roverStartY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    /* actual direction: intended + error */
    var intendedAngle=Math.atan2(dy,dx);
    var actualAngle=intendedAngle+errRot;
    var offsetX=errX*animProgress;
    var offsetY=errY*animProgress;
    var rx=roverStartX+dist*animProgress*Math.cos(actualAngle)+offsetX;
    var ry=roverStartY+dist*animProgress*Math.sin(actualAngle)+offsetY;
    rp=fieldToCanvas(rx,ry,fx,fy,fw,fh);
    /* planned path (dashed green) */
    var pp0=fieldToCanvas(roverStartX,roverStartY,fx,fy,fw,fh);
    var pp1=fieldToCanvas(targetNX,targetNY,fx,fy,fw,fh);
    ctx.save();ctx.strokeStyle='#10b981';ctx.lineWidth=1.5*DPR;ctx.setLineDash([5*DPR,3*DPR]);
    ctx.beginPath();ctx.moveTo(pp0[0],pp0[1]);ctx.lineTo(pp1[0],pp1[1]);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
    /* actual trail (solid orange) */
    ctx.save();ctx.strokeStyle='#ff5f1f';ctx.lineWidth=2*DPR;
    ctx.beginPath();ctx.moveTo(pp0[0],pp0[1]);
    for(var si=1;si<=20;si++){
      var sf=Math.min(si/20,animProgress);
      var sx=roverStartX+dist*sf*Math.cos(actualAngle)+errX*sf;
      var sy=roverStartY+dist*sf*Math.sin(actualAngle)+errY*sf;
      var sp=fieldToCanvas(sx,sy,fx,fy,fw,fh);
      ctx.lineTo(sp[0],sp[1]);
    }
    ctx.stroke();ctx.restore();
  }else{
    rp=fieldToCanvas(roverStartX,roverStartY,fx,fy,fw,fh);
  }

  /* draw rover body */
  var rSize=Math.min(fw,fh)*0.04;
  ctx.save();ctx.translate(rp[0],rp[1]);
  var drawAngle;
  if(status==='driving'||status==='hit'||status==='miss'){
    var dx2=targetNX-roverStartX,dy2=targetNY-roverStartY;
    var errRot2=(userCamRot-actualCamRot)*Math.PI/180;
    drawAngle=Math.atan2(dy2,dx2)+errRot2;
  }else{
    drawAngle=-headRad;
  }
  ctx.rotate(drawAngle);
  var bw=rSize*1.6,bh=rSize;
  var bg=ctx.createLinearGradient(-bw/2,-bh/2,-bw/2,bh/2);
  bg.addColorStop(0,'#555');bg.addColorStop(0.5,'#888');bg.addColorStop(1,'#444');
  ctx.fillStyle=bg;ctx.fillRect(-bw/2,-bh/2,bw,bh);
  ctx.fillStyle='#ff5f1f';
  ctx.beginPath();ctx.moveTo(bw/2,0);ctx.lineTo(bw/2-rSize*0.3,-bh*0.3);ctx.lineTo(bw/2-rSize*0.3,bh*0.3);ctx.closePath();ctx.fill();
  /* camera box on rover */
  ctx.fillStyle='#00daf3';
  ctx.fillRect(bw/2-rSize*0.12,-bh*0.12,rSize*0.18,bh*0.24);
  ctx.restore();

  /* drift distance line */
  if((status==='hit'||status==='miss')&&driftDist>0.01){
    ctx.save();
    ctx.strokeStyle='rgba(255,95,31,0.5)';ctx.lineWidth=1;ctx.setLineDash([3*DPR,3*DPR]);
    ctx.beginPath();ctx.moveTo(rp[0],rp[1]);ctx.lineTo(tp[0],tp[1]);ctx.stroke();
    ctx.setLineDash([]);
    var mdx=(rp[0]+tp[0])/2,mdy=(rp[1]+tp[1])/2;
    ctx.font='bold '+Math.round(11*DPR)+'px "Space Grotesk"';
    ctx.fillStyle='#ff5f1f';ctx.textAlign='center';
    ctx.fillText((driftDist*100).toFixed(1)+' cm',mdx,mdy-8*DPR);
    ctx.restore();
  }
}

function render(){
  drawBg();
  drawField();
}

function updateHUD(){
  var statusText;
  switch(status){
    case 'ready':statusText=t('statusReady');break;
    case 'driving':statusText=t('statusDriving');break;
    case 'hit':statusText=t('statusHit');break;
    case 'miss':statusText=t('statusMiss');break;
    default:statusText='--';
  }
  var accPct=status==='hit'||status==='miss'?Math.max(0,(1-driftDist*10)*100).toFixed(0)+'%':'--';
  var html='';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudAttempt')+'</div><div class="hud-val">'+attempt+'</div></div>';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudStatus')+'</div><div class="hud-val" style="color:'+(status==='hit'?'#10b981':status==='miss'?'#ff5f1f':'#e5e2e1')+'">'+statusText+'</div></div>';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudDrift')+'</div><div class="hud-val">'+(driftDist>0?(driftDist*100).toFixed(1)+' cm':'--')+'</div></div>';
  html+='<div class="hud-col"><div class="hud-label">'+t('hudAccuracy')+'</div><div class="hud-val">'+accPct+'</div></div>';
  document.getElementById('hud').innerHTML=html;
}

function updateGuide(){
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideWhat').textContent=t('guideWhat');
  var ul=document.getElementById('guidePoints');
  ul.innerHTML='<li>'+t('guideStep1')+'</li><li>'+t('guideStep2')+'</li><li>'+t('guideStep3')+'</li>';
  document.getElementById('guideTips').textContent=t('guideTips');
}

function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('lblCamX').textContent=t('lblCamX');
  document.getElementById('lblCamY').textContent=t('lblCamY');
  document.getElementById('lblCamRot').textContent=t('lblCamRot');
  document.getElementById('lblHeading').textContent=t('lblHeading');
  document.getElementById('lblTarget').textContent=t('lblTarget');
  document.getElementById('targetInfo').textContent=t('targetInfo');
  document.getElementById('btnReset').textContent=t('btnReset');
  document.getElementById('btnDrive').textContent=t('btnDrive');
  updateGuide();updateHUD();render();
}

function resize(){
  var wrap=document.querySelector('.canvas-wrap');
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width*DPR;H=rect.height*DPR;
  canvas.width=W;canvas.height=H;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  render();
}

/* slider events */
document.getElementById('sliderCamX').addEventListener('input',function(){
  userCamX=parseInt(this.value);document.getElementById('valCamX').textContent=userCamX;render();
});
document.getElementById('sliderCamY').addEventListener('input',function(){
  userCamY=parseInt(this.value);document.getElementById('valCamY').textContent=userCamY;render();
});
document.getElementById('sliderCamRot').addEventListener('input',function(){
  userCamRot=parseInt(this.value);document.getElementById('valCamRot').textContent=userCamRot+'\u00b0';render();
});
document.getElementById('sliderHeading').addEventListener('input',function(){
  roverHeading=parseInt(this.value);document.getElementById('valHeading').textContent=roverHeading+'\u00b0';render();
});

/* drive button */
document.getElementById('btnDrive').addEventListener('click',function(){
  if(status==='driving')return;
  status='driving';attempt++;animProgress=0;driftDist=0;
  updateHUD();
  var startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var elapsed=(ts-startTime)/2000;/* 2 seconds drive */
    animProgress=Math.min(elapsed,1);
    render();updateHUD();
    if(animProgress<1){
      animId=requestAnimationFrame(step);
    }else{
      /* calculate final drift */
      var errX=(userCamX-actualCamX)/100;
      var errY=(userCamY-actualCamY)/100;
      var errRot=(userCamRot-actualCamRot)*Math.PI/180;
      var dx=targetNX-roverStartX, dy=targetNY-roverStartY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var intendedAngle=Math.atan2(dy,dx);
      var actualAngle=intendedAngle+errRot;
      var finalX=roverStartX+dist*Math.cos(actualAngle)+errX;
      var finalY=roverStartY+dist*Math.sin(actualAngle)+errY;
      driftDist=Math.sqrt((finalX-targetNX)*(finalX-targetNX)+(finalY-targetNY)*(finalY-targetNY));
      if(driftDist<0.03){
        status='hit';
        showFeedback();
      }else{
        status='miss';
      }
      render();updateHUD();
    }
  }
  animId=requestAnimationFrame(step);
});

/* reset */
document.getElementById('btnReset').addEventListener('click',function(){
  if(animId)cancelAnimationFrame(animId);
  status='ready';animProgress=0;driftDist=0;
  document.getElementById('sliderCamX').value=0;userCamX=0;document.getElementById('valCamX').textContent='0';
  document.getElementById('sliderCamY').value=0;userCamY=0;document.getElementById('valCamY').textContent='0';
  document.getElementById('sliderCamRot').value=0;userCamRot=0;document.getElementById('valCamRot').textContent='0\u00b0';
  render();updateHUD();
});

function showFeedback(){
  document.getElementById('fbTitle').textContent=t('fbWinTitle');
  document.getElementById('fbText').textContent=t('fbWinText');
  document.getElementById('fbBtn').textContent=t('fbClose');
  document.getElementById('feedbackOverlay').classList.add('show');
}
document.getElementById('fbBtn').addEventListener('click',function(){
  document.getElementById('feedbackOverlay').classList.remove('show');
});

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});
document.getElementById('guideHeader').addEventListener('click',function(){
  var gc=document.getElementById('guideContent');var gt=document.getElementById('guideToggle');
  if(gc.classList.contains('collapsed')){gc.classList.remove('collapsed');gt.textContent='[-]';}
  else{gc.classList.add('collapsed');gt.textContent='[+]';}
});

window.addEventListener('resize',resize);
refreshI18N();resize();
setTimeout(resize,200);setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});
})();
</script>
