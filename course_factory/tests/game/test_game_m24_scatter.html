<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Covariance Observer — 协方差观察者</title>
<style>
:root{
  /* 第 1 层 — 共享深空底 */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg: oklch(0.96 0.01 265);
  --fg-dim: oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold: oklch(0.85 0.14 85);
  /* 第 2 层 — math signature accent (electric blue) */
  --math: oklch(0.72 0.17 245);
  /* 第 3 层 — math 5 色 palette */
  --axis: oklch(0.72 0.17 245);
  --proof: oklch(0.52 0.16 245);
  --shadow: oklch(0.35 0.10 245);
  --solution: oklch(0.92 0.08 240);
  --qed: oklch(0.85 0.14 85);
}
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html,body{
  width:100%;height:100vh;overflow:hidden;
  background:var(--bg-0);
  font-family:'JetBrains Mono','SF Mono','Cascadia Code',ui-monospace,Menlo,Consolas,monospace;
  color:var(--fg);
}
.shell{display:flex;height:100vh;width:100vw;}

/* ── 200px 左侧栏 ── */
.game-sidebar{
  width:200px;flex:0 0 200px;
  display:flex;flex-direction:column;
  background:var(--bg-1);
  border-right:1px solid var(--line);
  padding:14px 12px;
  overflow-y:auto;
}
.brand{display:flex;flex-direction:column;gap:2px;margin-bottom:14px;}
.brand .code{font-size:10px;letter-spacing:2px;color:var(--math);}
.brand .title{font-size:14px;font-weight:700;color:var(--fg);letter-spacing:0.5px;line-height:1.2;}
.brand .sub{font-size:9px;color:var(--fg-mute);letter-spacing:1px;}

.mascot{margin:4px auto 14px;display:block;}

.panel{
  background:var(--bg-2);
  border:1px solid var(--line);
  padding:10px;margin-bottom:12px;
}
.panel .ph{font-size:10px;letter-spacing:1.5px;color:var(--fg-dim);text-transform:uppercase;margin-bottom:8px;}

.slider-row{margin-bottom:6px;}
.slider-row .lab{display:flex;justify-content:space-between;font-size:11px;color:var(--fg-dim);margin-bottom:5px;}
.slider-row .lab b{color:var(--math);font-weight:700;}
input[type=range]{
  width:100%;height:5px;-webkit-appearance:none;appearance:none;
  background:var(--bg-3);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:16px;height:16px;
  background:var(--math);cursor:pointer;border:2px solid var(--bg-0);
}
input[type=range]::-moz-range-thumb{
  width:16px;height:16px;background:var(--math);cursor:pointer;border:2px solid var(--bg-0);
}
.scale-row{display:flex;justify-content:space-between;font-size:8px;color:var(--fg-mute);margin-top:3px;letter-spacing:0.5px;}

.task-text{font-size:11px;line-height:1.55;color:var(--fg);}
.task-text .hl{color:var(--qed);font-weight:700;}

.btn{
  font-family:inherit;font-size:11px;font-weight:700;letter-spacing:1px;
  padding:8px 10px;cursor:pointer;width:100%;
  border:1px solid var(--math);
  background:var(--bg-2);color:var(--math);
  box-shadow:3px 3px 0 var(--bg-0);
  margin-bottom:8px;text-transform:uppercase;
}
.btn:hover{background:var(--math);color:var(--bg-0);}
.btn.ghost{border-color:var(--line-strong);color:var(--fg-dim);}
.btn.ghost:hover{background:var(--bg-3);color:var(--fg);}

.guess-row{display:flex;gap:6px;margin-bottom:8px;}
.guess-row .btn{margin-bottom:0;}

.spacer{flex:1;}
.progress{font-size:10px;color:var(--fg-mute);letter-spacing:1px;margin-bottom:10px;text-align:center;}
.progress b{color:var(--qed);}
#langBtn{
  font-family:inherit;font-size:11px;font-weight:700;letter-spacing:2px;
  padding:6px 10px;cursor:pointer;width:100%;
  border:1px solid var(--line-strong);
  background:var(--bg-2);color:var(--fg-dim);
}
#langBtn:hover{border-color:var(--math);color:var(--math);}

/* ── 右侧主舞台 ── */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column;}
.main-head{
  display:flex;align-items:baseline;gap:14px;
  padding:10px 18px;border-bottom:1px solid var(--line);
  background:var(--bg-1);
}
.main-head .h-title{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:0.5px;}
.main-head .h-mode{font-size:10px;color:var(--math);letter-spacing:1.5px;text-transform:uppercase;}

/* 上 = 波形, 下 = 散点 */
.stage{flex:1;min-height:0;display:flex;flex-direction:column;padding:14px 18px;gap:12px;}
.wave-zone{flex:0 0 34%;min-height:0;display:flex;flex-direction:column;position:relative;border:1px solid var(--line);background:var(--bg-1);}
.wave-zone .zlab{position:absolute;top:6px;left:8px;font-size:9px;color:var(--fg-mute);letter-spacing:1.5px;z-index:2;}
.wave-zone canvas{flex:1;display:block;width:100%;height:100%;}
.scatter-zone{flex:1;min-height:0;display:flex;flex-direction:row;gap:12px;}
.scatter-box{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;border:1px solid var(--line);background:var(--bg-1);}
.scatter-box .zlab{position:absolute;top:6px;left:8px;font-size:9px;color:var(--fg-mute);letter-spacing:1.5px;z-index:2;}
.scatter-box canvas{flex:1;display:block;width:100%;height:100%;}

/* HUD 列 */
.hud{flex:0 0 156px;display:flex;flex-direction:column;gap:10px;}
.hud .card{flex:1;background:var(--bg-2);border:1px solid var(--line);padding:12px 10px;display:flex;flex-direction:column;justify-content:center;}
.hud .card .k{font-size:9px;letter-spacing:1.5px;color:var(--fg-mute);text-transform:uppercase;margin-bottom:6px;}
.hud .card .v{font-size:24px;font-weight:700;letter-spacing:0.5px;font-variant-numeric:tabular-nums;}
.hud .card .v.pos{color:var(--axis);}
.hud .card .v.neg{color:var(--qed);}
.hud .card .v.zero{color:var(--fg-dim);}
.hud .card .note{font-size:10px;color:var(--fg-dim);margin-top:6px;line-height:1.4;}
.hud .card.sign .v{font-size:18px;}

/* toast / 反馈 */
.toast{
  position:absolute;left:50%;top:14px;transform:translateX(-50%);
  background:var(--bg-2);border:1px solid var(--math);
  box-shadow:4px 4px 0 var(--bg-0);
  padding:10px 18px;font-size:12px;color:var(--fg);
  letter-spacing:0.5px;z-index:30;opacity:0;pointer-events:none;
  transition:opacity 0.25s;max-width:520px;text-align:center;
}
.toast.show{opacity:1;}
.toast.good{border-color:var(--qed);}
.toast.good b{color:var(--qed);}
.toast.bad{border-color:var(--proof);}
.toast b{color:var(--math);}

.hidden{display:none !important;}
</style>
</head>
<body>
<div class="shell">

  <!-- ── 200px sidebar ── -->
  <aside class="game-sidebar">
    <div class="brand">
      <span class="code">MTH-06 / EEG-M24</span>
      <span class="title" data-i18n="brandTitle">协方差观察者</span>
      <span class="sub" data-i18n="brandSub">COVARIANCE OBSERVER</span>
    </div>

    <!-- Pi mascot: rotating tetrahedron -->
    <svg class="mascot" width="92" height="92" viewBox="0 0 92 92" aria-hidden="true">
      <g id="piTetra" transform="translate(46,46)">
        <polygon id="tf1" points="0,-30 26,16 -26,16" fill="var(--proof)" stroke="var(--axis)" stroke-width="1.5"/>
        <polygon id="tf2" points="0,-30 26,16 0,30" fill="var(--shadow)" stroke="var(--axis)" stroke-width="1.5"/>
        <line x1="0" y1="-30" x2="0" y2="30" stroke="var(--axis)" stroke-width="1"/>
        <text id="piGlyph" x="0" y="6" text-anchor="middle" font-size="20" font-weight="700"
              font-family="JetBrains Mono,monospace" fill="var(--solution)">r</text>
      </g>
    </svg>

    <div class="panel">
      <div class="ph" data-i18n="phControl">关联强度 r</div>
      <div class="slider-row">
        <div class="lab"><span data-i18n="rLabel">C4 跟随 C3</span><b id="rVal">+0.00</b></div>
        <input type="range" id="rSlider" min="-100" max="100" value="0" step="1"/>
        <div class="scale-row">
          <span data-i18n="scaleNeg">-1 反向</span>
          <span data-i18n="scaleZero">0 无关</span>
          <span data-i18n="scalePos">+1 同向</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="ph" data-i18n="phTask">本轮任务</div>
      <div class="task-text" id="taskText"></div>
    </div>

    <!-- tune 模式按钮 -->
    <div id="tuneCtl">
      <button class="btn" id="submitBtn" data-i18n="submitBtn">提交关联度</button>
    </div>
    <!-- detective 模式按钮 -->
    <div id="guessCtl" class="hidden">
      <div class="guess-row">
        <button class="btn" id="guessNeg" data-i18n="guessNeg">负</button>
        <button class="btn" id="guessZero" data-i18n="guessZero">零</button>
        <button class="btn" id="guessPos" data-i18n="guessPos">正</button>
      </div>
    </div>
    <button class="btn ghost" id="nextBtn" data-i18n="nextBtn">下一轮</button>

    <div class="spacer"></div>
    <div class="progress">
      <span data-i18n="progLabel">已通关</span> <b id="progNum">0</b> / 5
      <div id="badge" class="hidden" style="color:var(--qed);margin-top:6px;letter-spacing:1px;" data-i18n="badge">已解锁 协方差观察者</div>
    </div>
    <button id="langBtn">EN / 中文</button>
  </aside>

  <!-- ── 主舞台 ── -->
  <main class="game-main">
    <div class="main-head">
      <span class="h-title" data-i18n="headTitle">两电极信号关系</span>
      <span class="h-mode" id="modeBadge"></span>
    </div>
    <div class="stage">
      <div class="toast" id="toast"></div>

      <div class="wave-zone">
        <span class="zlab" data-i18n="zlabWave">时间序列 — C3 (基准) 与 C4 (跟随)</span>
        <canvas id="waveCanvas"></canvas>
      </div>

      <div class="scatter-zone">
        <div class="scatter-box">
          <span class="zlab" data-i18n="zlabScatter">散点图 — 每时刻 (C3, C4) 一个点</span>
          <canvas id="scatterCanvas"></canvas>
        </div>
        <div class="hud">
          <div class="card">
            <div class="k" data-i18n="hudCov">协方差 Cov(C3,C4)</div>
            <div class="v zero" id="covVal">0.000</div>
            <div class="note" id="covNote" data-i18n="covNoteZero">接近 0：两信号无明显关联</div>
          </div>
          <div class="card sign">
            <div class="k" data-i18n="hudShape">散点形态</div>
            <div class="v zero" id="shapeVal" data-i18n="shapeRound">圆球</div>
            <div class="note" id="targetNote"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";
/* ───────── i18n ───────── */
const I18N = {
  zh:{
    brandTitle:"协方差观察者", brandSub:"COVARIANCE OBSERVER",
    phControl:"关联强度 r", rLabel:"C4 跟随 C3",
    scaleNeg:"-1 反向", scaleZero:"0 无关", scalePos:"+1 同向",
    phTask:"本轮任务", submitBtn:"提交关联度",
    guessNeg:"负", guessZero:"零", guessPos:"正", nextBtn:"下一轮",
    progLabel:"已通关", badge:"已解锁 协方差观察者",
    headTitle:"两电极信号关系", zlabWave:"时间序列 — C3 (基准) 与 C4 (跟随)",
    zlabScatter:"散点图 — 每时刻 (C3, C4) 一个点",
    hudCov:"协方差 Cov(C3,C4)", hudShape:"散点形态",
    shapeRound:"圆球", shapeTiltUp:"右上倾斜", shapeTiltDown:"左上倾斜",
    covNotePos:"为正：C3 高时 C4 也高，散点向右上拉伸",
    covNoteNeg:"为负：C3 高时 C4 反而低，散点向左上拉伸",
    covNoteZero:"接近 0：两信号无明显关联，散点呈圆球",
    modeTune:"调参模式 — 调到目标形态", modeDetective:"侦探模式 — 读散点猜符号",
    taskTunePos:"把散点调成 <span class='hl'>正向强相关</span>（右上倾斜的细长云）。",
    taskTuneNeg:"把散点调成 <span class='hl'>负向强相关</span>（左上倾斜的细长云）。",
    taskTuneZero:"把散点调成 <span class='hl'>近乎无关</span>（圆球，看不出方向）。",
    taskDetect:"看右侧散点图，<span class='hl'>它的协方差是正、负还是零？</span> 点下面的按钮回答。",
    targetHint:"目标：",
    toastTuneGood:"<b>命中！</b> 你的 r=R0，形态匹配。Cov 同号说明关联方向对了。",
    toastTuneBad:"还差一点 — 当前形态是 SHAPE，目标是 TARGET。继续拨滑块。",
    toastDetectGood:"<b>判断正确！</b> 散点 SHAPE，协方差 SIGN。",
    toastDetectBad:"再看一次 — 散点 SHAPE，协方差其实是 SIGN。",
    win:"<b>全部通关！</b> 你已经能从波形 到 散点 到 协方差符号一眼读懂两信号的关系。",
    signPos:"正", signNeg:"负", signZero:"零",
  },
  en:{
    brandTitle:"Covariance Observer", brandSub:"协方差观察者",
    phControl:"Coupling r", rLabel:"C4 follows C3",
    scaleNeg:"-1 anti", scaleZero:"0 none", scalePos:"+1 same",
    phTask:"This Round", submitBtn:"Submit r",
    guessNeg:"Neg", guessZero:"Zero", guessPos:"Pos", nextBtn:"Next",
    progLabel:"Cleared", badge:"Unlocked: Covariance Observer",
    headTitle:"Two-Electrode Signal Relation", zlabWave:"Time series — C3 (base) & C4 (follower)",
    zlabScatter:"Scatter — one dot per moment (C3, C4)",
    hudCov:"Cov(C3,C4)", hudShape:"Cloud Shape",
    shapeRound:"Round", shapeTiltUp:"Tilt up-right", shapeTiltDown:"Tilt up-left",
    covNotePos:"Positive: C3 high then C4 high, cloud stretches up-right",
    covNoteNeg:"Negative: C3 high then C4 low, cloud stretches up-left",
    covNoteZero:"Near 0: no clear relation, cloud is round",
    modeTune:"Tune mode — match the target shape", modeDetective:"Detective mode — read cloud, guess sign",
    taskTunePos:"Tune the cloud to <span class='hl'>strong positive</span> (a thin cloud tilting up-right).",
    taskTuneNeg:"Tune the cloud to <span class='hl'>strong negative</span> (a thin cloud tilting up-left).",
    taskTuneZero:"Tune the cloud to <span class='hl'>near-zero</span> (round, no direction).",
    taskDetect:"Look at the scatter. <span class='hl'>Is the covariance positive, negative or zero?</span> Tap a button.",
    targetHint:"Target: ",
    toastTuneGood:"<b>Match!</b> Your r=R0, shape matches. Same-sign Cov means the direction is right.",
    toastTuneBad:"Not yet — current shape is SHAPE, target is TARGET. Keep sliding.",
    toastDetectGood:"<b>Correct!</b> Cloud SHAPE, covariance SIGN.",
    toastDetectBad:"Look again — cloud SHAPE, covariance is actually SIGN.",
    win:"<b>All cleared!</b> You can now read two-signal relations from waveform to scatter to covariance sign at a glance.",
    signPos:"positive", signNeg:"negative", signZero:"zero",
  }
};
let lang = "zh";
function t(k){ return I18N[lang][k]; }
function refreshI18N(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if (I18N[lang][k] !== undefined) el.innerHTML = I18N[lang][k];
  });
  renderTask();
  updateHUD(true);
}

/* ───────── 关卡定义 ───────── */
// mode: 'tune' 玩家调到目标; 'detective' 给固定 r 让玩家猜符号
const LEVELS = [
  { mode:'tune', target:0.8 },      // 正向强相关
  { mode:'detective', fixed:-0.75 },// 读负相关
  { mode:'tune', target:-0.8 },     // 负向强相关
  { mode:'detective', fixed:0.05 }, // 读零相关
  { mode:'tune', target:0.0 },      // 近乎无关
];
let levelIdx = 0;
let cleared = 0;
let roundDone = false;   // 本轮是否已判定
let detectiveAnswered = false;

/* ───────── 信号生成 (确定性, 给定 r 与种子) ───────── */
const N = 160;            // 采样点
let phase = 0;            // 波形动画相位
let c3 = new Float32Array(N);
let c4 = new Float32Array(N);
let noise3 = new Float32Array(N);
let noise4 = new Float32Array(N);

// 固定噪声序列 (确定性, 不随帧变, 保证散点稳定)
(function seedNoise(){
  let s = 12345;
  function rnd(){ s = (s*1103515245 + 12345) & 0x7fffffff; return (s/0x7fffffff)*2-1; }
  for(let i=0;i<N;i++){ noise3[i]=rnd(); noise4[i]=rnd(); }
})();

let rNow = 0;            // 当前关联度 [-1,1]

// 由 r 重建 c3/c4 (C3 基准正弦+噪声; C4 = r*C3 的形 + sqrt(1-r^2)*独立噪声)
function rebuildSignals(){
  const k = Math.sqrt(Math.max(0,1 - rNow*rNow));
  for(let i=0;i<N;i++){
    const base = Math.sin((i/N)*Math.PI*4 + phase) + 0.35*noise3[i];
    c3[i] = base;
    // C4 跟随 base*r，加独立噪声维持总方差
    c4[i] = rNow*base + k*(0.9*Math.sin((i/N)*Math.PI*4 + phase + 1.7) + 0.5*noise4[i]);
  }
}

// 计算样本协方差 (用当前 c3/c4)
function covariance(){
  let m3=0,m4=0;
  for(let i=0;i<N;i++){ m3+=c3[i]; m4+=c4[i]; }
  m3/=N; m4/=N;
  let cov=0;
  for(let i=0;i<N;i++){ cov += (c3[i]-m3)*(c4[i]-m4); }
  return cov/N;
}

/* ───────── canvas ───────── */
const waveC = document.getElementById("waveCanvas");
const scatC = document.getElementById("scatterCanvas");
const wctx = waveC.getContext("2d");
const sctx = scatC.getContext("2d");

function fitCanvas(cv){
  const r = cv.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.max(2, Math.floor(r.width*dpr));
  cv.height = Math.max(2, Math.floor(r.height*dpr));
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return { w:r.width, h:r.height };
}

function cssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function drawWave(){
  const {w,h} = fitCanvas(waveC);
  wctx.clearRect(0,0,w,h);
  const axis = cssVar("--axis"), proof = cssVar("--proof"), line = cssVar("--line"), mute = cssVar("--fg-mute");
  // 中线
  wctx.strokeStyle = line; wctx.lineWidth = 1;
  wctx.beginPath(); wctx.moveTo(0,h/2); wctx.lineTo(w,h/2); wctx.stroke();
  const amp = h*0.18;
  // C3 (proof 暗蓝)
  function plot(arr,color,off){
    wctx.strokeStyle = color; wctx.lineWidth = 2; wctx.beginPath();
    for(let i=0;i<N;i++){
      const x = (i/(N-1))*w;
      const y = h/2 + off - arr[i]*amp;
      i===0?wctx.moveTo(x,y):wctx.lineTo(x,y);
    }
    wctx.stroke();
  }
  plot(c3, proof, -h*0.14);
  plot(c4, axis, h*0.14);
  // 标签
  wctx.font = "10px JetBrains Mono, monospace";
  wctx.fillStyle = proof; wctx.fillText("C3", 8, h/2 - h*0.14 - amp - 4);
  wctx.fillStyle = axis;  wctx.fillText("C4", 8, h/2 + h*0.14 + amp + 12);
}

function drawScatter(){
  const {w,h} = fitCanvas(scatC);
  sctx.clearRect(0,0,w,h);
  const axis = cssVar("--axis"), line = cssVar("--line"), mute = cssVar("--fg-mute"), sol = cssVar("--solution"), qed = cssVar("--qed");
  const pad = 26;
  const cx0 = pad, cx1 = w-pad, cy0 = h-pad, cy1 = pad;
  const midX = (cx0+cx1)/2, midY = (cy0+cy1)/2;
  // 坐标轴
  sctx.strokeStyle = line; sctx.lineWidth = 1;
  sctx.beginPath(); sctx.moveTo(cx0,midY); sctx.lineTo(cx1,midY);
  sctx.moveTo(midX,cy0); sctx.lineTo(midX,cy1); sctx.stroke();
  sctx.font = "9px JetBrains Mono, monospace"; sctx.fillStyle = mute;
  sctx.fillText("C3", cx1-22, midY-5);
  sctx.fillText("C4", midX+5, cy1+10);
  const sx = (cx1-cx0)/2/2.2;   // x scale (信号幅度约 ±2.2)
  const sy = (cy0-cy1)/2/2.2;
  // 点
  for(let i=0;i<N;i++){
    const px = midX + c3[i]*sx;
    const py = midY - c4[i]*sy;
    sctx.fillStyle = axis;
    sctx.globalAlpha = 0.55;
    sctx.beginPath(); sctx.arc(px,py,2.4,0,Math.PI*2); sctx.fill();
  }
  sctx.globalAlpha = 1;
}

/* ───────── 形态判定 ───────── */
function shapeFromCov(cov){
  if (cov > 0.18) return "up";       // 右上倾斜 (正)
  if (cov < -0.18) return "down";    // 左上倾斜 (负)
  return "round";                    // 圆球 (零)
}
function shapeLabel(s){
  return s==="up"?t("shapeTiltUp"):s==="down"?t("shapeTiltDown"):t("shapeRound");
}
function signOf(s){ return s==="up"?"pos":s==="down"?"neg":"zero"; }

/* ───────── HUD ───────── */
function updateHUD(skipDraw){
  const cov = covariance();
  const sh = shapeFromCov(cov);
  const covEl = document.getElementById("covVal");
  const covNote = document.getElementById("covNote");
  covEl.textContent = (cov>=0?"+":"") + cov.toFixed(3);
  covEl.className = "v " + (sh==="up"?"pos":sh==="down"?"neg":"zero");
  covNote.textContent = sh==="up"?t("covNotePos"):sh==="down"?t("covNoteNeg"):t("covNoteZero");
  const shapeEl = document.getElementById("shapeVal");
  shapeEl.textContent = shapeLabel(sh);
  shapeEl.className = "v " + (sh==="up"?"pos":sh==="down"?"neg":"zero");
  if(!skipDraw){ drawWave(); drawScatter(); }
}

/* ───────── 任务渲染 ───────── */
function renderTask(){
  const lv = LEVELS[levelIdx];
  const taskEl = document.getElementById("taskText");
  const targetNote = document.getElementById("targetNote");
  const modeBadge = document.getElementById("modeBadge");
  const tuneCtl = document.getElementById("tuneCtl");
  const guessCtl = document.getElementById("guessCtl");
  if(lv.mode==="tune"){
    tuneCtl.classList.remove("hidden");
    guessCtl.classList.add("hidden");
    modeBadge.textContent = t("modeTune");
    let tk;
    if(lv.target>0.4) tk="taskTunePos";
    else if(lv.target<-0.4) tk="taskTuneNeg";
    else tk="taskTuneZero";
    taskEl.innerHTML = t(tk);
    const tShape = lv.target>0.18?t("shapeTiltUp"):lv.target<-0.18?t("shapeTiltDown"):t("shapeRound");
    targetNote.textContent = t("targetHint") + tShape;
  } else {
    tuneCtl.classList.add("hidden");
    guessCtl.classList.remove("hidden");
    modeBadge.textContent = t("modeDetective");
    taskEl.innerHTML = t("taskDetect");
    targetNote.textContent = "";
  }
}

/* ───────── 关卡装载 ───────── */
function loadLevel(){
  const lv = LEVELS[levelIdx];
  roundDone = false; detectiveAnswered = false;
  document.getElementById("nextBtn").disabled = false;
  const slider = document.getElementById("rSlider");
  if(lv.mode==="detective"){
    rNow = lv.fixed;
    slider.value = Math.round(lv.fixed*100);
    slider.disabled = true;
  } else {
    rNow = 0;
    slider.value = 0;
    slider.disabled = false;
  }
  document.getElementById("rVal").textContent = (rNow>=0?"+":"") + rNow.toFixed(2);
  rebuildSignals();
  renderTask();
  updateHUD();
}

/* ───────── toast ───────── */
let toastTimer = null;
function showToast(html, kind){
  const el = document.getElementById("toast");
  el.innerHTML = html;
  el.className = "toast show" + (kind?(" "+kind):"");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.classList.remove("show"); }, 3600);
}

/* ───────── 判定 ───────── */
function markCleared(){
  cleared++;
  document.getElementById("progNum").textContent = cleared;
  if(cleared>=LEVELS.length){
    document.getElementById("badge").classList.remove("hidden");
    showToast(t("win"), "good");
  }
}

function submitTune(){
  if(roundDone) return;
  const lv = LEVELS[levelIdx];
  const cov = covariance();
  const sh = shapeFromCov(cov);
  // 目标形态
  const tShapeKey = lv.target>0.18?"up":lv.target<-0.18?"down":"round";
  const ok = (sh===tShapeKey);
  if(ok){
    roundDone = true;
    let msg = t("toastTuneGood").replace("R0", (rNow>=0?"+":"")+rNow.toFixed(2));
    showToast(msg, "good");
    markCleared();
    document.getElementById("piGlyph").textContent = "QED";
    setTimeout(()=>{document.getElementById("piGlyph").textContent="r";}, 1400);
  } else {
    let msg = t("toastTuneBad")
      .replace("SHAPE", shapeLabel(sh))
      .replace("TARGET", shapeLabel(tShapeKey==="up"?"up":tShapeKey==="down"?"down":"round"));
    showToast(msg, "bad");
  }
}

function submitGuess(guess){
  if(detectiveAnswered) return;
  const cov = covariance();
  const sh = shapeFromCov(cov);
  const truth = signOf(sh);   // pos / neg / zero
  const ok = (guess===truth);
  const signWord = truth==="pos"?t("signPos"):truth==="neg"?t("signNeg"):t("signZero");
  if(ok){
    detectiveAnswered = true; roundDone = true;
    let msg = t("toastDetectGood").replace("SHAPE", shapeLabel(sh)).replace("SIGN", signWord);
    showToast(msg, "good");
    markCleared();
    document.getElementById("piGlyph").textContent = "QED";
    setTimeout(()=>{document.getElementById("piGlyph").textContent="r";}, 1400);
  } else {
    let msg = t("toastDetectBad").replace("SHAPE", shapeLabel(sh)).replace("SIGN", signWord);
    showToast(msg, "bad");
  }
}

function nextLevel(){
  levelIdx = (levelIdx+1) % LEVELS.length;
  loadLevel();
}

/* ───────── 事件 ───────── */
document.getElementById("rSlider").addEventListener("input", (e)=>{
  rNow = parseInt(e.target.value,10)/100;
  document.getElementById("rVal").textContent = (rNow>=0?"+":"") + rNow.toFixed(2);
  rebuildSignals();
  updateHUD();
});
document.getElementById("submitBtn").addEventListener("click", submitTune);
document.getElementById("guessPos").addEventListener("click", ()=>submitGuess("pos"));
document.getElementById("guessZero").addEventListener("click", ()=>submitGuess("zero"));
document.getElementById("guessNeg").addEventListener("click", ()=>submitGuess("neg"));
document.getElementById("nextBtn").addEventListener("click", nextLevel);
document.getElementById("langBtn").addEventListener("click", ()=>{
  lang = (lang==="zh")?"en":"zh";
  refreshI18N();
});

/* ───────── mascot 旋转 + 波形相位推进 ───────── */
let lastT = 0;
function tick(ts){
  if(!lastT) lastT = ts;
  const dt = (ts-lastT)/1000; lastT = ts;
  // 波形缓慢流动 (散点形态由 r 决定, 不受相位影响)
  phase += dt*0.6;
  rebuildSignals();
  // tetra 轻微 scale 动画 (旋转感)
  const tetra = document.getElementById("piTetra");
  const sc = 1 + 0.06*Math.sin(ts/600);
  tetra.setAttribute("transform", `translate(46,46) scale(${sc.toFixed(3)},1)`);
  drawWave();
  drawScatter();
  updateHUD(true);
  requestAnimationFrame(tick);
}

window.addEventListener("resize", ()=>{ rebuildSignals(); updateHUD(); });

/* init */
refreshI18N();
loadLevel();
requestAnimationFrame(tick);
</script>
</body>
