<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<title>Binding Workshop</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:#05070a;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;background:#070a14;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(15px,2vw,18px);font-weight:700;color:#ffb000;letter-spacing:-0.02em;}
.header .sub{font-size:11px;color:#8e90a6;letter-spacing:0.1em;text-transform:uppercase;}
.stage-wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;gap:6px;padding:6px 10px;}
.challenge-bar{display:flex;gap:8px;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.1em;padding:6px 0;background:rgba(17,20,37,0.6);flex-wrap:wrap;}
.challenge-bar .chip{padding:4px 12px;background:#171a1f;color:#8e90a6;border:1px solid transparent;}
.challenge-bar .chip.active{background:rgba(255,176,0,0.18);color:#ffb000;border-color:#ffb000;}
.canvas-col{flex:1;min-height:0;min-width:0;display:flex;flex-direction:column;position:relative;background:linear-gradient(145deg,rgba(17,20,37,.9),rgba(3,4,8,.95));box-shadow:inset 0 0 0 1px rgba(142,144,166,0.2);overflow:hidden;}
canvas{width:100%;height:100%;display:block;touch-action:none;cursor:grab;}
canvas.dragging{cursor:grabbing;}
.hud{height:52px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;gap:4px;background:rgba(0,0,0,0.55);padding:4px 12px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#8e90a6;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb000;}
.controls{display:flex;gap:8px;padding:6px 12px;justify-content:center;flex-wrap:wrap;background:#070a14;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer;color:#05070a;background:linear-gradient(135deg,#ffb000,#ff5f1f);transition:transform 0.1s;}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:#171a1f;color:#8e90a6;}
.ctrl-btn.secondary:hover{color:#ffb000;}
.ctrl-btn.blue{background:linear-gradient(135deg,#00daf3,#0fa3bd);color:#05070a;}
.panel{position:absolute;background:rgba(17,20,37,0.92);backdrop-filter:blur(10px);padding:10px 14px;border:1px solid rgba(255,176,0,0.3);font-size:12px;color:#e2e2e9;z-index:8;pointer-events:none;}
.panel.tl{top:8px;left:8px;max-width:46%;line-height:1.6;}
.panel.br{bottom:8px;right:8px;max-width:40%;text-align:right;line-height:1.6;}
.panel b{color:#ffb000;}
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(17,20,37,0.95);color:#e2e2e9;padding:14px 22px;font-size:13px;border:2px solid #ffb000;z-index:20;display:none;text-align:center;line-height:1.6;min-width:240px;max-width:88%;}
.toast.show{display:block;}
.toast .big{font-size:17px;color:#ffb000;display:block;margin-bottom:6px;font-weight:700;}
.toast .pass{color:#50ffb0;}
.toast .fail{color:#ff716c;}
.lang-btn{position:absolute;top:8px;right:8px;z-index:50;font-family:'Space Grotesk',sans-serif;font-size:11px;padding:4px 10px;cursor:pointer;border:none;background:rgba(17,20,37,0.85);color:#ffb59c;letter-spacing:1px;}
</style>
</head>
<body>
<div class="wrapper">
  <header class="header">
    <div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
    <div id="roundInfo" style="font-family:'Space Grotesk';font-size:11px;color:#8e90a6;"></div>
  </header>
  <div class="challenge-bar">
    <span id="challengePrompt" style="color:#e2e2e9;font-size:12px;letter-spacing:normal;margin-right:6px;"></span>
    <div class="chip" id="chip1"></div>
    <div class="chip" id="chip2"></div>
    <div class="chip" id="chip3"></div>
  </div>
  <div class="stage-wrap">
    <div class="canvas-col">
      <button class="lang-btn" id="langBtn">EN</button>
      <canvas id="c"></canvas>
      <div class="panel tl" id="panelTL"></div>
      <div class="panel br" id="panelBR"></div>
      <div class="toast" id="toast"><span class="big" id="toastBig"></span><span id="toastBody"></span></div>
    </div>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btnBind"></button>
    <button class="ctrl-btn blue" id="btnNext"></button>
    <button class="ctrl-btn secondary" id="btnReset"></button>
  </div>
</div>
<script>
'use strict';

// ─── i18n ──────────────────────────────────────────────
var LANG = 'cn';
var I18N = {
  title:      {cn:'装订工坊',                 en:'Binding Workshop'},
  subtitle:   {cn:'把 8 张旧作业做成一本书',     en:'8 scraps, one book'},
  r1:         {cn:'关卡 1/3',                 en:'Round 1/3'},
  r2:         {cn:'关卡 2/3',                 en:'Round 2/3'},
  r3:         {cn:'关卡 3/3',                 en:'Round 3/3'},
  prompt:     {cn:'挑战：',                    en:'Challenge:'},
  chip1:      {cn:'拖 8 张纸到书脊',           en:'Drag 8 scraps to the spine'},
  chip2:      {cn:'顺序必须对',               en:'Order must match'},
  chip3:      {cn:'按"装订"完成手册',          en:'Press "Bind" to finish'},
  btnBind:    {cn:'装订',                     en:'BIND'},
  btnNext:    {cn:'下一关',                   en:'NEXT'},
  btnReset:   {cn:'重摆',                     en:'RESET'},
  hudL1:      {cn:'关卡',   en:'ROUND'},
  hudL2:      {cn:'已归位', en:'PLACED'},
  hudL3:      {cn:'顺序',   en:'ORDER'},
  hudL4:      {cn:'状态',   en:'STATUS'},
  hudFree:    {cn:'自由摆',  en:'free'},
  hudOk:      {cn:'正确',    en:'ok'},
  hudBad:     {cn:'错',      en:'wrong'},
  hudReady:   {cn:'可装订',  en:'ready'},
  hudBound:   {cn:'已装订',  en:'bound'},
  panelTL_1:  {cn:'<b>任务</b>：把桌面上的 8 张旧作业，按 S0 八节课的顺序拖到左边书脊上的 8 个槽位。<br>提示：1=推拉 → 8=故事。', en:'<b>Task</b>: drag the 8 scraps to the 8 slots on the spine, in S0 lesson order.<br>Hint: 1=Push → 8=Story.'},
  panelTL_2:  {cn:'<b>任务</b>：这一关槽位被打乱，看槽位上标注的章节号放纸。', en:'<b>Task</b>: slots are shuffled this round — match by chapter number.'},
  panelTL_3:  {cn:'<b>任务</b>：多了两张干扰纸，只放 8 张对应的。', en:'<b>Task</b>: 2 extra decoy scraps added. Place only the 8 that match.'},
  panelBR:    {cn:'<b>规则</b><br>拖到槽位自动吸附<br>放错把纸拖回桌面即可', en:'<b>Rules</b><br>drop near a slot to snap<br>drag back to the table to undo'},
  toastOk:    {cn:'成册！',  en:'BOUND!'},
  toastOkBody:{cn:'8 章全部就位，封面已生成。翻到最后一页补上"火箭为什么能飞"的猜想吧。', en:'8 chapters seated, cover printed. Now add your "why rockets fly" page at the end!'},
  toastWrong: {cn:'顺序不对', en:'Wrong order'},
  toastWrongBody:{cn:'有章节错位，点亮红色槽位的纸需要调整。', en:'Check the red slots — wrong scrap there.'},
  toastNeed:  {cn:'还没放满', en:'Not full'},
  toastNeedBody:{cn:'空槽位还没放纸，再拖一些过去。', en:'Still empty slots — drag more scraps.'},
  p0: {cn:'推拉',  en:'Push'},
  p1: {cn:'轻重',  en:'Weight'},
  p2: {cn:'下落',  en:'Fall'},
  p3: {cn:'快慢',  en:'Speed'},
  p4: {cn:'方向',  en:'Path'},
  p5: {cn:'部件',  en:'Parts'},
  p6: {cn:'气球',  en:'Balloon'},
  p7: {cn:'故事',  en:'Story'},
  decoyA: {cn:'水',   en:'Water'},
  decoyB: {cn:'彩虹', en:'Rainbow'},
};
function t(k){ return (I18N[k]||{})[LANG] || k; }

// ─── DOM ───────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var toastEl = document.getElementById('toast');
var toastBig = document.getElementById('toastBig');
var toastBody = document.getElementById('toastBody');

function resizeCanvas(){
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', ()=>{ resizeCanvas(); layoutRound(); draw(); });

// ─── State ─────────────────────────────────────────────
// Each "scrap" = paper card with themeIdx (0..7 for real, 8/9 for decoys)
// Each "slot" on the spine expects a specific themeIdx (chapter).
// state.papers[]: {id, themeIdx, x, y, rot, placedSlot: slotIdx | null, isDecoy}
// state.slots[]: {idx, chapterIdx (expected themeIdx), x, y}
// state.round: 1..3

var state = {
  round: 1,
  papers: [],
  slots: [],
  dragging: null, // {id, offsetX, offsetY}
  bound: false,
  result: null, // {ok, correctCount}
};

var PAPER_COLORS = ['#fff2d1','#ffe1b3','#ffd1a3','#ffc2b0','#f8d9ff','#d9ecff','#d1f5e6','#fff8cc','#e0d0b0','#c5b5a0'];
var THEME_KEYS = ['p0','p1','p2','p3','p4','p5','p6','p7','decoyA','decoyB'];
var CARD_W = 58, CARD_H = 76;
var SLOT_W = 44, SLOT_H = 62;

function rand(seed){ var s = seed; return function(){ s = (s*9301+49297)%233280; return s/233280; }; }

function layoutRound(){
  var rect = canvas.getBoundingClientRect();
  var W = rect.width, H = rect.height;
  // Spine on left (x = 70), 8 slots stacked vertically
  var spineX = Math.max(80, W * 0.14);
  var spineTop = Math.max(50, H * 0.10);
  var spineBottom = Math.min(H - 40, H * 0.94);
  var slotGap = (spineBottom - spineTop) / 8;

  // Determine chapterIdx per slot based on round
  var chapterOrder;
  if (state.round === 1){
    chapterOrder = [0,1,2,3,4,5,6,7];
  } else if (state.round === 2){
    // shuffle order to test reading slot label
    chapterOrder = [2,0,5,1,7,3,6,4];
  } else {
    chapterOrder = [0,1,2,3,4,5,6,7]; // back to order but with decoys on table
  }

  state.slots = [];
  for (var i=0; i<8; i++){
    state.slots.push({
      idx: i,
      chapterIdx: chapterOrder[i],
      x: spineX,
      y: spineTop + slotGap * (i + 0.5),
    });
  }

  // Papers scatter on the right table region
  var tableLeft = spineX + 80;
  var tableRight = W - 40;
  var tableTop = Math.max(60, H * 0.12);
  var tableBottom = Math.min(H - 50, H * 0.92);

  // Reset paper set (start-of-round)
  state.papers = [];
  var themeCount = (state.round === 3) ? 10 : 8;
  var r = rand(state.round * 77);
  for (var k=0; k<themeCount; k++){
    // deterministic but varied position
    var px = tableLeft + r() * (tableRight - tableLeft - CARD_W) + CARD_W/2;
    var py = tableTop  + r() * (tableBottom - tableTop - CARD_H) + CARD_H/2;
    var rot = (r() - 0.5) * 0.6;
    state.papers.push({
      id: 'pa' + k,
      themeIdx: k,
      x: px, y: py, rot: rot,
      placedSlot: null,
      isDecoy: (k >= 8),
    });
  }
  state.bound = false;
  state.result = null;
}

// ─── Draw helpers ─────────────────────────────────────

function drawSpine(){
  var rect = canvas.getBoundingClientRect();
  var W = rect.width, H = rect.height;
  if (!state.slots.length) return;
  var spineX = state.slots[0].x;
  var top = state.slots[0].y - SLOT_H/2 - 20;
  var bottom = state.slots[state.slots.length-1].y + SLOT_H/2 + 20;
  // book backing
  ctx.save();
  var grd = ctx.createLinearGradient(spineX - 60, 0, spineX + 60, 0);
  grd.addColorStop(0, '#1a1330');
  grd.addColorStop(1, '#3a1a08');
  ctx.fillStyle = grd;
  ctx.fillRect(spineX - 50, top, 100, bottom - top);
  ctx.strokeStyle = '#ffb000';
  ctx.lineWidth = 2;
  ctx.strokeRect(spineX - 50 + 3, top + 3, 100 - 6, bottom - top - 6);
  // spine title
  ctx.save();
  ctx.translate(spineX - 35, (top+bottom)/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = '#ffb000';
  ctx.font = "bold 11px 'Noto Sans SC',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(LANG==='cn' ? '力与运动观察手册' : 'Force & Motion Handbook', 0, 0);
  ctx.restore();
  ctx.restore();
}

function drawSlot(slot, highlight){
  var x = slot.x, y = slot.y;
  ctx.save();
  ctx.translate(x, y);
  // slot frame (dashed)
  ctx.strokeStyle = highlight === 'ok' ? '#50ffb0' :
                    highlight === 'bad' ? '#ff716c' :
                    highlight === 'hover' ? '#ffb000' : 'rgba(255,176,0,0.45)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(-SLOT_W/2, -SLOT_H/2, SLOT_W, SLOT_H);
  ctx.setLineDash([]);
  // chapter number + expected label
  ctx.fillStyle = '#ffb000';
  ctx.font = "bold 10px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText((slot.idx + 1) + '', -SLOT_W/2 - 10, 0);
  // expected theme hint (small, muted, below)
  ctx.fillStyle = 'rgba(226,226,233,0.55)';
  ctx.font = "9px 'Noto Sans SC',sans-serif";
  ctx.fillText(t(THEME_KEYS[slot.chapterIdx]), 0, SLOT_H/2 + 10);
  ctx.restore();
}

function drawPaper(p, isActive){
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot || 0);
  // shadow
  ctx.fillStyle = isActive ? 'rgba(255,176,0,0.25)' : 'rgba(0,0,0,0.4)';
  ctx.fillRect(-CARD_W/2+2, -CARD_H/2+3, CARD_W, CARD_H);
  // body
  ctx.fillStyle = PAPER_COLORS[p.themeIdx] || '#fff';
  ctx.fillRect(-CARD_W/2, -CARD_H/2, CARD_W, CARD_H);
  // fold corner
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.moveTo(CARD_W/2 - 10, -CARD_H/2);
  ctx.lineTo(CARD_W/2, -CARD_H/2);
  ctx.lineTo(CARD_W/2, -CARD_H/2 + 10);
  ctx.closePath(); ctx.fill();
  // ruled lines
  ctx.strokeStyle = 'rgba(60,60,80,0.3)';
  ctx.lineWidth = 0.7;
  for (var i=1; i<=3; i++){
    var ly = -CARD_H/2 + i * (CARD_H/4);
    ctx.beginPath();
    ctx.moveTo(-CARD_W/2 + 5, ly);
    ctx.lineTo(CARD_W/2 - 5, ly);
    ctx.stroke();
  }
  // theme label
  ctx.fillStyle = p.isDecoy ? '#801010' : '#2a1a00';
  ctx.font = "bold 11px 'Noto Sans SC',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t(THEME_KEYS[p.themeIdx]), 0, -CARD_H/2 + 13);
  // small doodle
  drawDoodle(0, 8, p.themeIdx);
  // active ring
  if (isActive){
    ctx.strokeStyle = '#ffb000';
    ctx.lineWidth = 2;
    ctx.strokeRect(-CARD_W/2 - 2, -CARD_H/2 - 2, CARD_W + 4, CARD_H + 4);
  }
  ctx.restore();
}

function drawDoodle(x, y, kind){
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#5a4a30';
  ctx.fillStyle = '#5a4a30';
  ctx.lineWidth = 1.1;
  if (kind === 0){
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(6,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(3,-3); ctx.moveTo(6,0); ctx.lineTo(3,3); ctx.stroke();
  } else if (kind === 1){
    ctx.beginPath(); ctx.moveTo(-7,2); ctx.lineTo(7,-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(-3,8); ctx.lineTo(3,8); ctx.closePath(); ctx.fill();
  } else if (kind === 2){
    ctx.fillRect(-1,-6,2,2);
    ctx.setLineDash([2,2]);
    ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(0,7); ctx.stroke();
    ctx.setLineDash([]);
  } else if (kind === 3){
    ctx.beginPath(); ctx.moveTo(-7,-3); ctx.lineTo(7,-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-7,3); ctx.lineTo(2,3); ctx.stroke();
  } else if (kind === 4){
    ctx.beginPath(); ctx.moveTo(-7,4); ctx.lineTo(-2,-4); ctx.lineTo(3,3); ctx.lineTo(7,-2); ctx.stroke();
  } else if (kind === 5){
    ctx.beginPath();
    ctx.moveTo(0,-7); ctx.lineTo(3,-2); ctx.lineTo(3,5); ctx.lineTo(-3,5); ctx.lineTo(-3,-2);
    ctx.closePath(); ctx.fill();
  } else if (kind === 6){
    ctx.beginPath(); ctx.ellipse(0,-2,5,6,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,8); ctx.stroke();
  } else if (kind === 7){
    ctx.strokeRect(-6,-4,12,8);
    ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(0,4); ctx.stroke();
  } else if (kind === 8){
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3,-2); ctx.lineTo(3,-2); ctx.stroke();
  } else if (kind === 9){
    ctx.strokeStyle = '#c0496f';
    ctx.beginPath(); ctx.arc(0,2,6,Math.PI,0,false); ctx.stroke();
  }
  ctx.restore();
}

function drawBinding(progress){
  // Draw a gold thread through all placed slots — used on bound result
  if (!state.slots.length) return;
  ctx.save();
  ctx.strokeStyle = '#ffb000';
  ctx.lineWidth = 2.2;
  ctx.shadowColor = 'rgba(255,176,0,0.6)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  var startS = state.slots[0];
  ctx.moveTo(startS.x - SLOT_W/2 + 6, startS.y - SLOT_H/2 + 6);
  for (var i=1; i<state.slots.length; i++){
    var s = state.slots[i];
    var tx = s.x - SLOT_W/2 + 6;
    var ty = s.y - SLOT_H/2 + 6 + (i % 2 ? 12 : -4);
    ctx.lineTo(tx, ty);
    if (i/state.slots.length > progress) break;
  }
  ctx.stroke();
  ctx.restore();
}

// ─── Interaction ─────────────────────────────────────────

function getPointer(ev){
  var rect = canvas.getBoundingClientRect();
  var x = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
  var y = (ev.touches ? ev.touches[0].clientY : ev.clientY) - rect.top;
  return {x:x, y:y};
}

function hitPaper(px, py){
  // Top-most (last drawn) first — iterate reverse
  for (var i = state.papers.length - 1; i >= 0; i--){
    var p = state.papers[i];
    if (Math.abs(px - p.x) < CARD_W/2 && Math.abs(py - p.y) < CARD_H/2) return p;
  }
  return null;
}

function nearestSlot(px, py, excludePaperId){
  // Prefer empty slots. If none within range, allow swap with occupied.
  var bestEmpty = null, bestEmptyD = Infinity;
  var bestAny = null, bestAnyD = Infinity;
  for (var i=0; i<state.slots.length; i++){
    var s = state.slots[i];
    var d = Math.hypot(px - s.x, py - s.y);
    var occupant = state.papers.find(x => x.placedSlot === s.idx && x.id !== excludePaperId);
    if (d < bestAnyD){ bestAnyD = d; bestAny = s; }
    if (!occupant && d < bestEmptyD){ bestEmptyD = d; bestEmpty = s; }
  }
  if (bestEmpty) return { slot: bestEmpty, dist: bestEmptyD };
  return { slot: bestAny, dist: bestAnyD };
}

function onDown(ev){
  ev.preventDefault();
  if (state.bound) return;
  var p = getPointer(ev);
  var paper = hitPaper(p.x, p.y);
  if (!paper) return;
  // Unplace if was in a slot
  if (paper.placedSlot !== null) paper.placedSlot = null;
  // Bring to top
  var idx = state.papers.indexOf(paper);
  state.papers.splice(idx, 1);
  state.papers.push(paper);
  state.dragging = { id: paper.id, dx: p.x - paper.x, dy: p.y - paper.y };
  canvas.classList.add('dragging');
  draw();
}

function onMove(ev){
  if (!state.dragging) return;
  ev.preventDefault();
  var p = getPointer(ev);
  var paper = state.papers.find(x=>x.id===state.dragging.id);
  if (!paper) return;
  paper.x = p.x - state.dragging.dx;
  paper.y = p.y - state.dragging.dy;
  paper.rot = 0; // straighten while dragging
  draw();
}

function onUp(ev){
  if (!state.dragging) return;
  var paper = state.papers.find(x=>x.id===state.dragging.id);
  state.dragging = null;
  canvas.classList.remove('dragging');
  if (!paper) { draw(); return; }
  // Check if near a slot — snap if empty (or swap if occupied)
  var ns = nearestSlot(paper.x, paper.y, paper.id);
  if (ns.slot && ns.dist < 110){
    // If slot occupied by another paper, swap
    var occupant = state.papers.find(x => x.placedSlot === ns.slot.idx && x.id !== paper.id);
    if (occupant){
      // swap: push occupant onto table at paper's previous-drop area
      occupant.placedSlot = null;
      occupant.x = paper.x + 80; occupant.y = paper.y;
    }
    paper.placedSlot = ns.slot.idx;
    paper.x = ns.slot.x;
    paper.y = ns.slot.y;
    paper.rot = 0;
  }
  updateHud();
  draw();
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp);

// ─── Bind check & draw  ──────────────────────────────────

function evaluate(){
  var placed = 0, correct = 0, wrongSlots = [];
  for (var i=0; i<state.slots.length; i++){
    var s = state.slots[i];
    var paper = state.papers.find(p => p.placedSlot === s.idx);
    if (paper){
      placed++;
      if (paper.themeIdx === s.chapterIdx) correct++;
      else wrongSlots.push(s.idx);
    }
  }
  return { placed, correct, total: state.slots.length, wrongSlots };
}

function updateHud(){
  var ev = evaluate();
  document.getElementById('hudV1').textContent = state.round + '/3';
  document.getElementById('hudV2').textContent = ev.placed + '/' + ev.total;
  if (state.bound){
    document.getElementById('hudV3').textContent = ev.correct + '/' + ev.total;
    document.getElementById('hudV4').textContent = (ev.correct === ev.total ? t('hudBound') : t('hudBad'));
  } else {
    document.getElementById('hudV3').textContent = t('hudFree');
    document.getElementById('hudV4').textContent = (ev.placed === ev.total ? t('hudReady') : '--');
  }
}

function bindAndEvaluate(){
  var ev = evaluate();
  if (ev.placed < ev.total){
    showToast(t('toastNeed'), t('toastNeedBody'), 'fail');
    return;
  }
  state.bound = true;
  state.result = ev;
  updateHud();
  if (ev.correct === ev.total){
    showToast(t('toastOk'), t('toastOkBody'), 'pass');
  } else {
    showToast(t('toastWrong'), t('toastWrongBody'), 'fail');
  }
  draw();
}

function showToast(big, body, kind){
  toastBig.textContent = big;
  toastBody.innerHTML = body;
  toastBig.className = 'big ' + (kind === 'pass' ? 'pass' : 'fail');
  toastEl.classList.add('show');
  setTimeout(()=>{ toastEl.classList.remove('show'); }, 3500);
}

function draw(){
  var rect = canvas.getBoundingClientRect();
  var W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  // Table background gradient
  var grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0e1222');
  grd.addColorStop(1, '#060810');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Wood table stripe on right region
  var spineX = state.slots.length ? state.slots[0].x : 100;
  var tableLeft = spineX + 30;
  var tGrd = ctx.createLinearGradient(0, 0, 0, H);
  tGrd.addColorStop(0, 'rgba(60,40,20,0.08)');
  tGrd.addColorStop(1, 'rgba(60,40,20,0.25)');
  ctx.fillStyle = tGrd;
  ctx.fillRect(tableLeft, 0, W - tableLeft, H);

  // Spine
  drawSpine();

  // Slots
  var ev = state.bound ? state.result : null;
  for (var i=0; i<state.slots.length; i++){
    var slot = state.slots[i];
    var paper = state.papers.find(p => p.placedSlot === slot.idx);
    var hl = null;
    if (state.bound){
      if (!paper) hl = 'bad';
      else if (paper.themeIdx === slot.chapterIdx) hl = 'ok';
      else hl = 'bad';
    } else if (paper) {
      hl = 'hover';
    }
    drawSlot(slot, hl);
  }

  // Papers (placed ones then dragging)
  for (var j=0; j<state.papers.length; j++){
    var p = state.papers[j];
    var active = state.dragging && state.dragging.id === p.id;
    drawPaper(p, active);
  }

  // Binding thread if bound & all correct
  if (state.bound && state.result && state.result.correct === state.result.total){
    drawBinding(1);
  }
}

// ─── Controls  ──────────────────────────────────────────

function setRound(r){
  state.round = r;
  layoutRound();
  updatePanel();
  updateHud();
  draw();
}

function updatePanel(){
  document.getElementById('title').textContent = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('roundInfo').textContent = t('r' + state.round);
  document.getElementById('challengePrompt').textContent = t('prompt');
  document.getElementById('chip1').textContent = t('chip1');
  document.getElementById('chip2').textContent = t('chip2');
  document.getElementById('chip3').textContent = t('chip3');
  // Active chip = round
  for (var i=1; i<=3; i++){
    document.getElementById('chip'+i).classList.toggle('active', i === state.round);
  }
  document.getElementById('btnBind').textContent = t('btnBind');
  document.getElementById('btnNext').textContent = t('btnNext');
  document.getElementById('btnReset').textContent = t('btnReset');
  document.getElementById('hudL1').textContent = t('hudL1');
  document.getElementById('hudL2').textContent = t('hudL2');
  document.getElementById('hudL3').textContent = t('hudL3');
  document.getElementById('hudL4').textContent = t('hudL4');
  document.getElementById('panelTL').innerHTML = t('panelTL_' + state.round);
  document.getElementById('panelBR').innerHTML = t('panelBR');
  document.getElementById('langBtn').textContent = (LANG === 'cn' ? 'EN' : 'CN');
}

document.getElementById('btnBind').addEventListener('click', bindAndEvaluate);
document.getElementById('btnReset').addEventListener('click', ()=>{ setRound(state.round); });
document.getElementById('btnNext').addEventListener('click', ()=>{
  var next = (state.round % 3) + 1;
  setRound(next);
});
document.getElementById('langBtn').addEventListener('click', ()=>{
  LANG = (LANG === 'cn' ? 'en' : 'cn');
  updatePanel();
  draw();
});

// ─── Boot ────────────────────────────────────────────────
resizeCanvas();
setRound(1);
</script>
</body>
