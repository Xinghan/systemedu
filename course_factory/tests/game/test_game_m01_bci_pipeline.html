<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BCI 工程师 — 接通脑控全链路</title>
<style>
:root{
  --paper:#FAF9F5; --paper-2:#F1EDDF; --card:#FFFFFF;
  --ink:#191814; --ink-2:#2B2924; --sub:#6B6557; --sub-2:#9D978A;
  --border:#EBE5D6; --border-2:#D9D1BD; --hairline:#F2EDE0;
  /* domain accent: computing #C04E68 */
  --primary:#C04E68; --primary-ink:#8F3149; --primary-soft:#F8E7EC; --primary-line:#ECC4CF;
  --ok:#3F7A52; --ok-soft:#E0EBE2; --ok-line:#BFD8C6;
  --bad:#B5462F; --bad-soft:#F3DED6; --bad-line:#E4BDAE;
  --shadow-sm:0 1px 2px 0 rgba(25,24,20,.04);
  --shadow:0 1px 3px 0 rgba(25,24,20,.06),0 1px 2px -1px rgba(25,24,20,.04);
  --shadow-md:0 4px 8px -2px rgba(25,24,20,.07),0 2px 4px -2px rgba(25,24,20,.04);
  --shadow-lg:0 14px 30px -8px rgba(25,24,20,.12),0 4px 10px -4px rgba(25,24,20,.06);
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:'PingFang SC','Inter','Noto Sans SC',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--paper);
  font-family:var(--sans);color:var(--ink);}
.wrapper{display:flex;height:100vh;}

/* ── 200px sidebar ── */
.game-sidebar{
  width:200px;flex-shrink:0;height:100vh;overflow-y:auto;
  background:var(--paper-2);border-right:1px solid var(--border);
  padding:14px 12px;display:flex;flex-direction:column;gap:12px;
}
.brand{display:flex;flex-direction:column;gap:3px;}
.brand .kicker{font-family:var(--mono);font-size:9.5px;letter-spacing:1.6px;
  color:var(--primary-ink);text-transform:uppercase;}
.brand .title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.25;}
.brand .sub{font-size:10.5px;color:var(--sub);line-height:1.4;}

.steps{display:flex;flex-direction:column;gap:5px;}
.steps h3{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;
  color:var(--sub);text-transform:uppercase;margin-bottom:2px;}
.step-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;
  background:var(--card);border:1px solid var(--border);font-size:11px;color:var(--sub);
  transition:all .25s;}
.step-item .num{font-family:var(--mono);font-size:10px;width:18px;height:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;border-radius:5px;
  background:var(--paper-2);border:1px solid var(--border-2);color:var(--sub);}
.step-item .lbl{line-height:1.25;}
.step-item.active{border-color:var(--primary-line);background:var(--primary-soft);color:var(--primary-ink);box-shadow:var(--shadow-sm);}
.step-item.active .num{background:var(--primary);color:#fff;border-color:var(--primary);}
.step-item.done{border-color:var(--ok-line);background:var(--ok-soft);color:var(--ok);}
.step-item.done .num{background:var(--ok);color:#fff;border-color:var(--ok);}

.task-box{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;box-shadow:var(--shadow-sm);}
.task-box h3{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;
  color:var(--sub);text-transform:uppercase;margin-bottom:6px;}
.task-box p{font-size:11.5px;line-height:1.55;color:var(--ink-2);}

.spacer{flex:1;}
.lang-btn{align-self:stretch;font-family:var(--mono);font-size:11px;letter-spacing:.5px;
  padding:9px 10px;border-radius:7px;background:var(--card);border:1px solid var(--border-2);
  color:var(--ink-2);cursor:pointer;transition:all .2s;}
.lang-btn:hover{background:var(--primary-soft);border-color:var(--primary-line);color:var(--primary-ink);}

/* ── main ── */
.game-main{flex:1;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  padding:22px 26px;gap:16px;}

/* patient header strip */
.patient{display:flex;align-items:center;gap:14px;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);}
.avatar{width:46px;height:46px;flex-shrink:0;border-radius:50%;
  background:var(--primary-soft);border:1px solid var(--primary-line);
  display:flex;align-items:center;justify-content:center;}
.avatar svg{width:26px;height:26px;}
.patient .meta{display:flex;flex-direction:column;gap:2px;}
.patient .name{font-size:13px;font-weight:700;color:var(--ink);}
.patient .desc{font-size:11.5px;color:var(--sub);line-height:1.45;}
.patient .status{margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;
  padding:6px 11px;border-radius:20px;background:var(--paper-2);border:1px solid var(--border-2);color:var(--sub);white-space:nowrap;}
.patient .status.fail{background:var(--bad-soft);border-color:var(--bad-line);color:var(--bad);}
.patient .status.win{background:var(--ok-soft);border-color:var(--ok-line);color:var(--ok);}

/* scene */
.scene{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.scene-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;box-shadow:var(--shadow-md);}
.scene-card .step-tag{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;
  color:var(--primary-ink);text-transform:uppercase;margin-bottom:8px;}
.scene-card .q{font-size:16px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:6px;}
.scene-card .ctx{font-size:12.5px;color:var(--sub);line-height:1.6;}

/* pipeline rail */
.rail{display:flex;align-items:stretch;gap:0;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-sm);}
.rail-node{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;}
.rail-node:not(:last-child)::after{content:'';position:absolute;top:13px;right:-50%;width:100%;height:2px;
  background:var(--border-2);z-index:0;}
.rail-node.lit:not(:last-child)::after{background:var(--ok-line);}
.rail-dot{width:26px;height:26px;border-radius:50%;background:var(--paper-2);
  border:1.5px solid var(--border-2);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;color:var(--sub);z-index:1;transition:all .3s;}
.rail-node.lit .rail-dot{background:var(--ok);border-color:var(--ok);color:#fff;}
.rail-node.cur .rail-dot{background:var(--primary);border-color:var(--primary);color:#fff;
  box-shadow:0 0 0 4px var(--primary-soft);}
.rail-lbl{font-size:10px;color:var(--sub);text-align:center;line-height:1.25;max-width:90px;}
.rail-node.cur .rail-lbl{color:var(--primary-ink);font-weight:600;}

/* option cards */
.options{display:flex;flex-direction:column;gap:11px;}
.opt{display:flex;align-items:flex-start;gap:13px;text-align:left;width:100%;
  background:var(--card);border:1.5px solid var(--border);border-radius:11px;
  padding:14px 16px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);font-family:var(--sans);}
.opt:hover:not(:disabled){border-color:var(--primary-line);background:var(--primary-soft);
  transform:translateY(-1px);box-shadow:var(--shadow-md);}
.opt:disabled{cursor:default;opacity:.85;}
.opt .pick{width:24px;height:24px;flex-shrink:0;border-radius:6px;
  background:var(--paper-2);border:1px solid var(--border-2);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-size:11px;color:var(--sub);font-weight:600;}
.opt .body{display:flex;flex-direction:column;gap:3px;}
.opt .body .head{font-size:13px;font-weight:700;color:var(--ink);}
.opt .body .note{font-size:11.5px;color:var(--sub);line-height:1.5;}
.opt.correct{border-color:var(--ok-line);background:var(--ok-soft);}
.opt.correct .pick{background:var(--ok);border-color:var(--ok);color:#fff;}
.opt.wrong{border-color:var(--bad-line);background:var(--bad-soft);}
.opt.wrong .pick{background:var(--bad);border-color:var(--bad);color:#fff;}

/* feedback panel */
.feedback{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:0;box-shadow:var(--shadow);overflow:hidden;}
.feedback .fb-head{display:flex;align-items:center;gap:9px;padding:12px 16px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  border-bottom:1px solid var(--hairline);}
.feedback .fb-head .ico{width:20px;height:20px;flex-shrink:0;}
.feedback .fb-body{padding:13px 16px;font-size:12.5px;line-height:1.65;color:var(--ink-2);}
.feedback.bad .fb-head{color:var(--bad);background:var(--bad-soft);}
.feedback.bad{border-color:var(--bad-line);}
.feedback.good .fb-head{color:var(--ok);background:var(--ok-soft);}
.feedback.good{border-color:var(--ok-line);}
.fb-actions{display:flex;gap:9px;padding:0 16px 14px;}
.btn{font-family:var(--mono);font-size:11.5px;letter-spacing:.4px;padding:9px 16px;border-radius:8px;
  cursor:pointer;border:1px solid var(--border-2);background:var(--card);color:var(--ink-2);transition:all .18s;}
.btn:hover{border-color:var(--primary-line);background:var(--primary-soft);color:var(--primary-ink);}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn.primary:hover{background:var(--primary-ink);}

/* live cursor stage (win) */
.cursor-stage{position:relative;height:120px;background:var(--paper-2);border:1px dashed var(--border-2);
  border-radius:10px;overflow:hidden;margin-top:4px;}
.cursor-dot{position:absolute;top:50%;left:18px;width:16px;height:16px;border-radius:50%;
  background:var(--primary);transform:translateY(-50%);transition:left .9s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 0 5px var(--primary-soft);}
.cursor-target{position:absolute;top:50%;right:20px;width:34px;height:34px;border-radius:8px;
  border:2px dashed var(--primary-line);transform:translateY(-50%);
  display:flex;align-items:center;justify-content:center;}
.cursor-target svg{width:18px;height:18px;}

/* win banner */
.win-banner{background:var(--ok-soft);border:1px solid var(--ok-line);border-radius:12px;
  padding:18px 20px;box-shadow:var(--shadow-md);}
.win-banner .badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);
  font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ok);
  background:var(--card);border:1px solid var(--ok-line);border-radius:20px;padding:6px 13px;margin-bottom:10px;}
.win-banner h2{font-size:17px;color:var(--ink);margin-bottom:6px;line-height:1.4;}
.win-banner p{font-size:12.5px;color:var(--ink-2);line-height:1.6;}
.hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrapper">

  <!-- ── 200px sidebar ── -->
  <aside class="game-sidebar">
    <div class="brand">
      <span class="kicker" data-i18n="kicker">BCI ENGINEER</span>
      <span class="title" data-i18n="brandTitle">脑控全链路</span>
      <span class="sub" data-i18n="brandSub">五步接通脑机接口</span>
    </div>

    <div class="steps">
      <h3 data-i18n="pipeline">PIPELINE</h3>
      <div class="step-item" data-step="0"><span class="num">1</span><span class="lbl" data-i18n="s0">选意图任务</span></div>
      <div class="step-item" data-step="1"><span class="num">2</span><span class="lbl" data-i18n="s1">放电极位置</span></div>
      <div class="step-item" data-step="2"><span class="num">3</span><span class="lbl" data-i18n="s2">采集脑信号</span></div>
      <div class="step-item" data-step="3"><span class="num">4</span><span class="lbl" data-i18n="s3">选解码算法</span></div>
      <div class="step-item" data-step="4"><span class="num">5</span><span class="lbl" data-i18n="s4">配指令映射</span></div>
    </div>

    <div class="task-box">
      <h3 data-i18n="missionTag">MISSION</h3>
      <p data-i18n="mission">帮无法用手的小林接通脑控系统：每一步都要做对的工程决策，错一步病人就控制不了。</p>
    </div>

    <div class="spacer"></div>
    <button class="lang-btn" id="langBtn" type="button">EN / 中文</button>
  </aside>

  <!-- ── main ── -->
  <main class="game-main">

    <!-- patient header -->
    <div class="patient" id="patient">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C04E68" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="meta">
        <span class="name" data-i18n="pName">小林 · 28 岁</span>
        <span class="desc" data-i18n="pDesc">脊髓损伤后双手无法活动，意识与思维完全清醒，希望用念头控制屏幕光标。</span>
      </div>
      <span class="status" id="pStatus" data-i18n="stIdle">待接通</span>
    </div>

    <!-- pipeline rail -->
    <div class="rail" id="rail"></div>

    <!-- scene -->
    <div class="scene">
      <div class="scene-card" id="sceneCard">
        <div class="step-tag" id="stepTag"></div>
        <div class="q" id="sceneQ"></div>
        <div class="ctx" id="sceneCtx"></div>
      </div>

      <div class="options" id="options"></div>

      <div class="feedback hidden" id="feedback">
        <div class="fb-head" id="fbHead"></div>
        <div class="fb-body" id="fbBody"></div>
        <div class="fb-actions" id="fbActions"></div>
      </div>

      <!-- win -->
      <div class="win-banner hidden" id="winBanner">
        <span class="badge" data-i18n="unlocked">UNLOCKED · BCI ENGINEER</span>
        <h2 data-i18n="winTitle">链路接通！小林用念头让光标动了起来。</h2>
        <p data-i18n="winBody">从意图、信号、采集、解码到指令，五步全部对齐——这就是脑波控制游戏背后真正在做的事：把一个想法，一路翻译成屏幕上的动作。</p>
        <div class="cursor-stage">
          <div class="cursor-dot" id="cursorDot"></div>
          <div class="cursor-target">
            <svg viewBox="0 0 24 24" fill="none" stroke="#C04E68" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

      ctxZh:"信号已经存在了（前两步对了），现在要把它从微弱、夹杂噪声的状态变成可分析的数据。",
      ctxEn:"The signal now exists (steps 1-2 done right); the job is to turn it from a tiny, noisy trace into analysable data.",
      opts:[
        {kZh:"放大 + 带通滤波 + 数字化",kEn:"Amplify + band-pass + digitise",
         nZh:"先放大微伏级信号，滤掉工频和无关频段，再采样成数字序列——标准采集链路。",
         nEn:"Amplify the microvolt signal, band-pass out line noise and irrelevant bands, then sample into digits — the standard chain.",
         correct:true},
        {kZh:"直接拿原始电压判读",kEn:"Read raw voltage directly",
         nZh:"未放大未滤波的原始信号几乎被噪声淹没，无法稳定区分意图。",
         nEn:"Unamplified, unfiltered raw signal is buried in noise and can't separate intents reliably.",
         failZh:"原始信号太弱、噪声太大，运动想象的节律被淹没了。采集没做好，解码器拿到的是垃圾。回退重做采集。",
         failEn:"Raw signal is too weak and noisy; the motor rhythm drowns. Bad acquisition feeds the decoder garbage. Go back and redo acquisition."},
        {kZh:"只滤掉所有低频",kEn:"Just cut all low freq",
         nZh:"运动想象关键节律就在较低的 mu/beta 频段，全砍低频等于把有用信号也扔了。",
         nEn:"Motor-imagery rhythms live in the lower mu/beta bands; cutting all low freq throws the useful signal away too.",
         failZh:"过度滤波把 mu 节律一起滤没了，信号是干净了，但有用的部分也没了。回退重设采集。",
         failEn:"Over-filtering removed the mu rhythm too; the signal is 'clean' but the useful part is gone. Go back and reset acquisition."}
      ]
    },
    {
      tagZh:"第 4 步 · 解码", tagEn:"STEP 4 · DECODE",
      qZh:"采集好的信号里，怎么判断小林到底想动左手还是右手？",
      qEn:"From the acquired signal, how do we tell if Lin imagined left or right hand?",
      ctxZh:"解码 = 从一段脑电里提取能区分左右的特征，再用分类器给出判断。",
      ctxEn:"Decoding = extract features that separate left vs right from the EEG, then classify.",
      opts:[
        {kZh:"CSP 提特征 + LDA 分类",kEn:"CSP features + LDA classifier",
         nZh:"CSP 找出左右手最有区分度的空间模式，LDA 据此做稳定的二分类——运动想象的经典解码法。",
         nEn:"CSP finds the most discriminative spatial patterns for left vs right; LDA classifies them — the classic motor-imagery decoder.",
         correct:true},
        {kZh:"瞎猜（抛硬币）",kEn:"Random guess (coin flip)",
         nZh:"不看信号直接随机，准确率 50%，等于没解码。",
         nEn:"Ignoring the signal and guessing gives 50% accuracy — no decoding at all.",
         failZh:"系统在乱猜，光标随机乱跳，小林想左它往右。没有真正的解码，链路断在第四步。回退重选算法。",
         failEn:"The system guesses; the cursor jumps randomly, going right when Lin thinks left. No real decoding — the chain breaks at step 4. Go back and pick a method."},
        {kZh:"直接读出她的想法",kEn:"Directly read her thoughts",
         nZh:"不存在读心术式直读，脑电只能给出统计上可区分的模式，必须靠特征 + 分类。",
         nEn:"There is no 'mind reading'; EEG only yields statistically separable patterns that need features + a classifier.",
         failZh:"没有任何设备能直接读出想法——这是科幻不是工程。链路无法实现。回退选真实可行的解码法。",
         failEn:"No device can literally 'read thoughts' — that's sci-fi, not engineering. The chain can't be built. Go back and pick a real method."}
      ]
    },
    {
      tagZh:"第 5 步 · 指令", tagEn:"STEP 5 · COMMAND",
      qZh:"最后一步：把解码结果接到光标动作上，怎么映射才直觉？",
      qEn:"Last step: wire the decoded result to cursor action. Which mapping feels intuitive?",
      ctxZh:"链路终点是指令：把分类结果翻译成屏幕上真实的动作。映射要符合人的直觉，否则病人学不会。",
      ctxEn:"The chain ends in command: translate the class result into real on-screen action. The mapping must match human intuition, or the patient can't learn it.",
      opts:[
        {kZh:"想左则左移，想右则右移",kEn:"Imagine left to move left; right to right",
         nZh:"动作与意图方向一致，小林几乎不用学就能上手，形成稳定的闭环控制。",
         nEn:"Action matches intent direction; Lin needs almost no training and a stable closed loop forms.",
         correct:true},
        {kZh:"想左却右移（反着接）",kEn:"Imagine left to move right (swapped)",
         nZh:"映射与直觉相反，每次都要在脑子里反向翻译，极难形成稳定控制。",
         nEn:"Mapping is reversed from intuition; she must mentally invert every time, making stable control nearly impossible.",
         failZh:"映射接反了，小林想往左光标却往右，越用越累、越用越乱。最后一步功亏一篑。回退重接映射。",
         failEn:"Mapping is swapped: Lin thinks left but the cursor goes right, getting more confusing with every try. So close, yet the last step fails. Go back and rewire."},
        {kZh:"随机分配方向",kEn:"Assign directions at random",
         nZh:"每次方向都变，小林无法建立稳定的因果，等于没有可用指令。",
         nEn:"Directions change each time; Lin can't build stable cause-effect, so there's no usable command.",
         failZh:"方向随机变化，小林根本摸不清规律，控制完全不可预测。回退重接成固定直觉映射。",
         failEn:"Directions shift randomly; Lin can't find any rule and control is unpredictable. Go back to a fixed, intuitive mapping."}
      ]
    }
  ];

  /* ── state ── */
  var cur = 0;
  var solved = new Array(STEPS.length).fill(false);
  var locked = false;
  var won = false;

  /* ── elements ── */
  var $ = function(id){ return document.getElementById(id); };
  var elRail = $("rail"), elOptions = $("options"), elFeedback = $("feedback"),
      elFbHead = $("fbHead"), elFbBody = $("fbBody"), elFbActions = $("fbActions"),
      elStepTag = $("stepTag"), elSceneQ = $("sceneQ"), elSceneCtx = $("sceneCtx"),
      elWin = $("winBanner"), elScene = $("sceneCard"), elPStatus = $("pStatus"),
      elCursorDot = $("cursorDot");

  var ICON_BAD = '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
  var ICON_OK = '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="8.5 12.2 11 14.7 15.6 9.4"/></svg>';

  function T(k){ return I18N[lang][k]; }

  function renderRail(){
    elRail.innerHTML = "";
    var labels = T("railLbl");
    for (var i=0;i<STEPS.length;i++){
      var node = document.createElement("div");
      node.className = "rail-node";
      if (solved[i]) node.classList.add("lit");
      if (i === cur && !won) node.classList.add("cur");
      var dot = document.createElement("div");
      dot.className = "rail-dot";
      dot.textContent = (i+1);
      var lbl = document.createElement("div");
      lbl.className = "rail-lbl";
      lbl.textContent = labels[i];
      node.appendChild(dot); node.appendChild(lbl);
      elRail.appendChild(node);
    }
  }

  function renderSidebarSteps(){
    var items = document.querySelectorAll(".step-item");
    for (var i=0;i<items.length;i++){
      items[i].classList.remove("active","done");
      if (solved[i]) items[i].classList.add("done");
      else if (i === cur && !won) items[i].classList.add("active");
    }
  }

  function renderScene(){
    var st = STEPS[cur];
    elStepTag.textContent = lang === "zh" ? st.tagZh : st.tagEn;
    elSceneQ.textContent  = lang === "zh" ? st.qZh   : st.qEn;
    elSceneCtx.textContent= lang === "zh" ? st.ctxZh : st.ctxEn;

    elOptions.innerHTML = "";
    var picks = ["A","B","C"];
    for (var i=0;i<st.opts.length;i++){
      (function(idx){
        var o = st.opts[idx];
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "opt";
        btn.setAttribute("data-opt", idx);
        btn.innerHTML =
          '<span class="pick">'+picks[idx]+'</span>' +
          '<span class="body">' +
            '<span class="head">'+(lang==="zh"?o.kZh:o.kEn)+'</span>' +
            '<span class="note">'+(lang==="zh"?o.nZh:o.nEn)+'</span>' +
          '</span>';
        btn.addEventListener("click", function(){ choose(idx, btn); });
        elOptions.appendChild(btn);
      })(i);
    }
    elFeedback.className = "feedback hidden";
    renderRail();
    renderSidebarSteps();
  }

  function setOptionsDisabled(state){
    var btns = elOptions.querySelectorAll(".opt");
    for (var i=0;i<btns.length;i++) btns[i].disabled = state;
  }

  /* ── core decision branch ── */
  function choose(idx, btn){
    if (locked) return;
    var st = STEPS[cur];
    var o = st.opts[idx];
    locked = true;
    setOptionsDisabled(true);
    btn.classList.add(o.correct ? "correct" : "wrong");

    if (o.correct){
      solved[cur] = true;
      showFeedback(true, o);
    } else {
      elPStatus.className = "status fail";
      elPStatus.textContent = T("stFail");
      showFeedback(false, o);
    }
  }

  function showFeedback(good, o){
    elFeedback.className = "feedback " + (good ? "good" : "bad");
    elFbHead.innerHTML = (good ? ICON_OK : ICON_BAD) +
      '<span>'+(good ? (lang==="zh"?"决策正确":"CORRECT") : (lang==="zh"?"控制失败":"CONTROL FAILED"))+'</span>';
    elFbBody.textContent = good ? (lang==="zh"?o.nZh:o.nEn) : (lang==="zh"?o.failZh:o.failEn);

    elFbActions.innerHTML = "";
    if (good){
      var isLast = (cur === STEPS.length - 1);
      var nbtn = document.createElement("button");
      nbtn.type = "button";
      nbtn.className = "btn primary";
      nbtn.textContent = isLast ? (lang==="zh"?"接通链路":"Go online") : T("next");
      nbtn.addEventListener("click", function(){ advance(); });
      elFbActions.appendChild(nbtn);
    } else {
      var rbtn = document.createElement("button");
      rbtn.type = "button";
      rbtn.className = "btn primary";
      rbtn.textContent = T("retry");
      rbtn.addEventListener("click", function(){ retryStep(); });
      elFbActions.appendChild(rbtn);
    }
    renderRail();
    renderSidebarSteps();
  }

  function retryStep(){
    elPStatus.className = "status";
    elPStatus.textContent = T("stIdle");
    locked = false;
    renderScene();
  }

  function advance(){
    locked = false;
    if (cur < STEPS.length - 1){
      cur += 1;
      renderScene();
    } else {
      winGame();
    }
  }

  function winGame(){
    won = true;
    elScene.classList.add("hidden");
    elOptions.classList.add("hidden");
    elFeedback.classList.add("hidden");
    elWin.classList.remove("hidden");
    elPStatus.className = "status win";
    elPStatus.textContent = T("stWin");
    renderRail();
    renderSidebarSteps();
    var stage = elCursorDot.parentElement;
    var run = function(){
      var w = stage.getBoundingClientRect().width || 400;
      elCursorDot.style.left = Math.max(18, w - 66) + "px";
      window.setTimeout(function(){ elCursorDot.style.left = "18px"; }, 1100);
      window.setTimeout(run, 2300);
    };
    window.setTimeout(run, 350);
  }

  function applyStaticI18n(){
    var nodes = document.querySelectorAll("[data-i18n]");
    for (var i=0;i<nodes.length;i++){
      var k = nodes[i].getAttribute("data-i18n");
      if (I18N[lang][k] !== undefined) nodes[i].textContent = I18N[lang][k];
    }
    document.documentElement.lang = lang;
    if (elPStatus.classList.contains("fail")) elPStatus.textContent = T("stFail");
    else if (elPStatus.classList.contains("win")) elPStatus.textContent = T("stWin");
    else elPStatus.textContent = T("stIdle");
  }

  function toggleLang(){
    lang = (lang === "zh") ? "en" : "zh";
    applyStaticI18n();
    if (!won){ renderScene(); }
    else { renderRail(); renderSidebarSteps(); }
  }

  /* ── init ── */
  document.getElementById("langBtn").addEventListener("click", toggleLang);
  applyStaticI18n();
  renderScene();

  /* test hooks (own namespace, no window same-name vars) */
  window.__bci = {
    pickOpt:function(i){ var b = elOptions.querySelector('[data-opt="'+i+'"]'); if (b) b.click(); },
    clickAction:function(){ var b = elFbActions.querySelector("button"); if (b) b.click(); },
    state:function(){ return { cur:cur, solved:solved.slice(), won:won, status:elPStatus.textContent }; }
  };
})();
</script>
</body>
</html>
