<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M14 · 冗余传感器对照 — 哪台设备坏了？</title>
<style>
  :root{
    /* Surfaces — Claude warm cream */
    --paper:    #FAF9F5;
    --paper-2:  #F1EDDF;
    --card:     #FFFFFF;
    --ink:      #191814;
    --ink-2:    #2B2924;
    --sub:      #6B6557;
    --sub-2:    #9D978A;
    --border:   #EBE5D6;
    --border-2: #D9D1BD;
    --hairline: #F2EDE0;

    /* Primary — Claude coral */
    --primary:      #D97757;
    --primary-ink:  #9A4A2E;
    --primary-soft: #F8EDE5;
    --primary-line: #ECCFB8;

    /* Domain accent — aerospace */
    --accent:       #B85A33;
    --accent-soft:  #F2DDD0;

    /* States */
    --safe:     #6F8B5C;
    --safe-soft:#E3ECDB;
    --warn:     #B0593F;
    --warn-soft:#F3DDD2;

    /* Two-sensor line colors (区分 5003 vs 7003) */
    --line-5003: #527B95;  /* climate blue */
    --line-7003: #B85A33;  /* aerospace orange */
    --line-5003-soft: #DEE5EC;
    --line-7003-soft: #F2DDD0;

    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgba(25,24,20,.04);
    --shadow:    0 1px 3px 0 rgba(25,24,20,.06), 0 1px 2px -1px rgba(25,24,20,.04);
    --shadow-md: 0 4px 8px -2px rgba(25,24,20,.06), 0 2px 4px -2px rgba(25,24,20,.04);
    --shadow-lg: 0 12px 24px -6px rgba(25,24,20,.1), 0 4px 8px -4px rgba(25,24,20,.05);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;width:100vw;overflow:hidden;
    background:var(--paper);color:var(--ink);
    font-family:'Inter','PingFang SC','Noto Sans SC',sans-serif;
    display:flex;
  }
  .mono{font-family:'JetBrains Mono','Menlo',monospace;}

  /* ---------------- 200px sidebar ---------------- */
  .game-sidebar{
    width:200px;flex-shrink:0;
    background:var(--paper-2);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    padding:20px 16px;gap:18px;
  }
  .brand{display:flex;flex-direction:column;gap:4px;}
  .brand-tag{font-size:10px;letter-spacing:.16em;color:var(--accent);font-weight:600;font-family:'JetBrains Mono',monospace;}
  .brand-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;}

  .progress-block{display:flex;flex-direction:column;gap:8px;}
  .progress-label{font-size:11px;color:var(--sub);letter-spacing:.05em;}
  .progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--primary);width:0%;transition:width 300ms ease;}
  .progress-dots{display:flex;gap:6px;}
  .pd{
    width:22px;height:22px;border-radius:50%;
    border:1.5px solid var(--border-2);background:var(--card);
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:var(--sub-2);
    font-family:'JetBrains Mono',monospace;
  }
  .pd.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-ink);}
  .pd.done{border-color:var(--safe);background:var(--safe-soft);color:var(--safe);}
  .pd.miss{border-color:var(--warn);background:var(--warn-soft);color:var(--warn);}

  .legend-block{
    background:var(--card);border:1px solid var(--border);
    border-radius:8px;padding:10px 12px;
    display:flex;flex-direction:column;gap:6px;
  }
  .legend-title{
    font-size:10px;letter-spacing:.14em;color:var(--sub);
    font-family:'JetBrains Mono',monospace;font-weight:700;
  }
  .legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ink-2);}
  .legend-sw{width:18px;height:3px;border-radius:1.5px;flex-shrink:0;}

  .guide{display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--sub);line-height:1.5;list-style:none;padding:0;margin:0;}
  .guide-li{padding-left:10px;border-left:2px solid var(--accent);}

  .lang-btn{
    margin-top:auto;
    border:1px solid var(--border-2);background:var(--card);
    color:var(--ink-2);font-size:11px;font-weight:600;
    padding:8px 12px;border-radius:6px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
    transition:background 200ms;
  }
  .lang-btn:hover{background:var(--paper);}

  /* ---------------- Main stage ---------------- */
  .game-main{
    flex:1;display:flex;flex-direction:column;
    padding:24px 32px;overflow:hidden;min-width:0;
  }

  .scene-header{
    display:flex;align-items:flex-end;justify-content:space-between;
    padding-bottom:12px;border-bottom:1px solid var(--hairline);margin-bottom:16px;
  }
  .scene-title-block{display:flex;flex-direction:column;gap:4px;max-width:75%;}
  .scene-num{
    font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;
    text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  }
  .scene-title{font-size:20px;font-weight:700;color:var(--ink);line-height:1.3;}
  .scene-sub{font-size:12.5px;color:var(--sub);line-height:1.5;margin-top:2px;}
  .scene-counter{
    font-family:'JetBrains Mono',monospace;font-size:13px;
    color:var(--sub);padding:6px 12px;background:var(--card);
    border:1px solid var(--border);border-radius:6px;flex-shrink:0;
  }

  /* The scrollable game stage */
  .scene-stage{
    flex:1;display:flex;flex-direction:column;gap:14px;overflow-y:auto;min-height:0;
    padding-right:6px;
  }

  /* SVG dual-line chart card */
  .chart-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;box-shadow:var(--shadow-sm);
    padding:16px 18px;display:flex;flex-direction:column;gap:8px;
    flex-shrink:0;
  }
  .chart-meta{
    display:flex;align-items:center;justify-content:space-between;
    font-size:11px;color:var(--sub);
    font-family:'JetBrains Mono',monospace;letter-spacing:.06em;
  }
  .chart-meta .unit{color:var(--sub-2);}
  .chart-wrap{
    width:100%;height:220px;position:relative;
  }
  .chart-wrap svg{width:100%;height:100%;display:block;}

  /* Options row */
  .options-title{
    font-size:11px;color:var(--sub);letter-spacing:.14em;
    font-family:'JetBrains Mono',monospace;font-weight:700;
    margin:4px 0 0 2px;
  }
  .options{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
  }
  .option-btn{
    background:var(--card);border:1.5px solid var(--border-2);
    border-radius:10px;padding:14px 16px;
    cursor:pointer;text-align:left;font-family:inherit;
    transition:border-color 200ms, transform 150ms, box-shadow 200ms, background 200ms;
    display:flex;flex-direction:column;gap:4px;min-height:74px;
  }
  .option-btn:hover:not(:disabled){border-color:var(--accent);box-shadow:var(--shadow);}
  .option-btn:disabled{cursor:default;}
  .option-key{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;
    color:var(--sub);font-weight:700;
  }
  .option-text{font-size:13.5px;color:var(--ink-2);font-weight:600;line-height:1.45;}
  .option-btn.picked-correct{
    border-color:var(--primary);background:var(--primary-soft);
  }
  .option-btn.picked-correct .option-key{color:var(--primary-ink);}
  .option-btn.picked-correct .option-text{color:var(--primary-ink);}
  .option-btn.picked-wrong{
    border-color:var(--warn);background:var(--warn-soft);
  }
  .option-btn.picked-wrong .option-key{color:var(--warn);}
  .option-btn.dimmed{opacity:.45;}

  /* Feedback */
  .feedback{
    background:var(--card);border-radius:12px;
    border:1px solid var(--border);box-shadow:var(--shadow-sm);
    padding:16px 20px;display:none;
    border-left:4px solid var(--primary);
  }
  .feedback.show{display:block;}
  .feedback.is-wrong{border-left-color:var(--warn);}
  .fb-head{
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
  }
  .fb-badge{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;
    font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;
    background:var(--primary-soft);color:var(--primary-ink);
  }
  .feedback.is-wrong .fb-badge{background:var(--warn-soft);color:var(--warn);}
  .fb-title{font-size:14px;font-weight:700;color:var(--ink);}
  .fb-body{font-size:13px;line-height:1.65;color:var(--ink-2);}
  .fb-clue{
    margin-top:10px;padding:10px 12px;background:var(--paper-2);
    border-radius:6px;border-left:3px solid var(--accent);
    font-size:12px;color:var(--sub);line-height:1.55;
  }
  .fb-clue strong{color:var(--accent);font-weight:700;}
  .fb-next{
    margin-top:12px;display:flex;justify-content:flex-end;
  }
  .next-btn{
    background:var(--primary);color:#fff;border:none;border-radius:6px;
    padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;letter-spacing:.04em;
    transition:background 200ms;
  }
  .next-btn:hover{background:var(--primary-ink);}

  /* Reward */
  .reward-screen{
    display:none;flex-direction:column;align-items:center;justify-content:center;
    flex:1;text-align:center;gap:16px;padding:40px;
  }
  .reward-screen.show{display:flex;}
  .badge{
    width:130px;height:130px;border-radius:50%;
    background:var(--primary-soft);border:3px solid var(--primary);
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-md);
    animation:badgePulse 2.4s ease-in-out infinite;
  }
  @keyframes badgePulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.04);}
  }
  .reward-title{font-size:22px;font-weight:700;color:var(--ink);}
  .reward-sub{font-size:13.5px;color:var(--sub);max-width:520px;line-height:1.65;}
  .reward-stats{
    display:flex;gap:32px;margin-top:8px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);
  }
  .reward-stat-val{color:var(--accent);font-size:22px;font-weight:700;}
  .restart-btn{
    margin-top:8px;background:var(--card);color:var(--ink-2);
    border:1.5px solid var(--border-2);border-radius:8px;
    padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:border-color 200ms;
  }
  .restart-btn:hover{border-color:var(--accent);}
</style>
</head>
<body>
  <aside class="game-sidebar">
    <div class="brand">
      <div class="brand-tag" id="brandTag">AEROSPACE · M14</div>
      <div class="brand-name" id="brandName">冗余传感器侦探<br/>哪台坏了？</div>
    </div>

    <div class="progress-block">
      <div class="progress-label" id="progLabel">侦查进度</div>
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-dots" id="progDots"></div>
    </div>

    <div class="legend-block">
      <div class="legend-title" id="legendTitle">SENSORS</div>
      <div class="legend-row">
        <span class="legend-sw" style="background:var(--line-5003);"></span>
        <span class="mono">PMS5003</span>
      </div>
      <div class="legend-row">
        <span class="legend-sw" style="background:var(--line-7003);"></span>
        <span class="mono">PMS7003</span>
      </div>
    </div>

    <ul class="guide">
      <li class="guide-li" id="g1">先盯曲线再判定</li>
      <li class="guide-li" id="g2">对比偏差与趋势</li>
      <li class="guide-li" id="g3">5 组全对得徽章</li>
    </ul>

    <button class="lang-btn" id="langBtn" type="button">中 / EN</button>

  <main class="game-main" id="gameMain">
    <div class="scene-header" id="sceneHeader">
      <div class="scene-title-block">
        <div class="scene-num" id="sceneNum">CASE 01</div>
        <div class="scene-title" id="sceneTitle">案件一</div>
        <div class="scene-sub" id="sceneSub"></div>

      <div class="scene-counter" id="sceneCounter">01 / 05</div>
    </div>

    <div class="scene-stage" id="sceneStage">
      <div class="chart-card">
        <div class="chart-meta">
          <span id="chartUnit">PM2.5 · μg/m³  ·  24h</span>
          <span class="unit" id="chartHint">两台设备同一阳台并排 24 小时</span>
        </div>
        <div class="chart-wrap">
          <svg id="dualChart" viewBox="0 0 720 220" preserveAspectRatio="none">
            <!-- chart axes + lines drawn by JS -->
          </svg>
        </div>
      </div>

      <div class="options-title" id="optionsTitle">你的判定 · pick a verdict</div>
      <div class="options" id="optionsGrid">
        <button class="option-btn" data-key="A" type="button">
          <span class="option-key">VERDICT A</span>
          <span class="option-text" data-text="A"></span>
        </button>
        <button class="option-btn" data-key="B" type="button">
          <span class="option-key">VERDICT B</span>
          <span class="option-text" data-text="B"></span>
        </button>
        <button class="option-btn" data-key="C" type="button">
          <span class="option-key">VERDICT C</span>
          <span class="option-text" data-text="C"></span>
        </button>
        <button class="option-btn" data-key="D" type="button">
          <span class="option-key">VERDICT D</span>
          <span class="option-text" data-text="D"></span>
        </button>
      </div>

      <div class="feedback" id="feedback">
        <div class="fb-head">
          <span class="fb-badge" id="fbBadge">VERDICT</span>
          <span class="fb-title" id="fbTitle"></span>
        </div>
        <div class="fb-body" id="fbBody"></div>
        <div class="fb-clue" id="fbClue"></div>
        <div class="fb-next">
          <button class="next-btn" id="nextBtn" type="button">下一组</button>
        </div>
      </div>
    </div>

    <div class="reward-screen" id="rewardScreen">
      <div class="badge">
        <svg viewBox="0 0 64 64" style="width:62%;height:62%" fill="none">
          <circle cx="22" cy="32" r="11" stroke="#B85A33" stroke-width="3" fill="#F2DDD0"/>
          <circle cx="42" cy="32" r="11" stroke="#D97757" stroke-width="3" fill="#F8EDE5"/>
          <path d="M22 32 L42 32" stroke="#9A4A2E" stroke-width="2" stroke-dasharray="2 2"/>
        </svg>
      </div>
      <div class="reward-title" id="rewardTitle">冗余思维徽章</div>
      <div class="reward-sub" id="rewardSub">你已经会用两台设备互相印证读数 — 这就是工程师对付传感器故障的第一道防线。</div>
      <div class="reward-stats">
        <div>
          <div class="reward-stat-val" id="statCorrect">0</div>
          <div id="statCorrectLbl">首次判对</div>
        </div>
        <div>
          <div class="reward-stat-val" id="statTotal">5</div>
          <div id="statTotalLbl">案件总数</div>
        </div>
      </div>
      <button class="restart-btn" id="restartBtn" type="button">再来一轮</button>
    </div>
  </main>

<script>
(function(){
  "use strict";

  // ============================================================
  // i18n strings
  // ============================================================
  var LANG = 'cn';
  var STR = {
    brandTag:   { cn:'AEROSPACE · M14', en:'AEROSPACE · M14' },
    brandName:  { cn:'冗余传感器侦探<br/>哪台坏了？', en:'Redundant Sensor Detective<br/>Which one failed?' },
    progLabel:  { cn:'侦查进度', en:'CASE PROGRESS' },
    legendTitle:{ cn:'SENSORS', en:'SENSORS' },
    g1: { cn:'先盯曲线再判定', en:'Read curves before deciding' },
    g2: { cn:'对比偏差与趋势', en:'Compare offset and trend' },
    g3: { cn:'5 组全对得徽章', en:'5/5 unlocks the badge' },
    langToggle: { cn:'中 / EN', en:'EN / 中' },
    optionsTitle:{ cn:'你的判定 · 选一个最合理的解释', en:'YOUR VERDICT · pick the best explanation' },
    chartHint:  { cn:'两台设备同一阳台并排 24 小时', en:'Two units side-by-side on the same balcony · 24h' },
    chartUnit:  { cn:'PM2.5 · μg/m³ · 24h', en:'PM2.5 · μg/m³ · 24h' },
    nextBtn:    { cn:'下一组', en:'Next case' },
    finishBtn:  { cn:'查看徽章', en:'See badge' },
    rewardTitle:{ cn:'冗余思维徽章', en:'Redundancy Mindset Badge' },
    rewardSub:  { cn:'你已经会用两台设备互相印证读数 — 这就是工程师对付传感器故障的第一道防线。',
                  en:'You now use two devices to cross-check readings — engineers’ first line of defense against sensor failure.' },
    rewardAlmost:{ cn:'答对 {ok}/5。再玩一轮看看那 {miss} 组的曲线特征。',
                   en:'You got {ok}/5 first try. Replay to nail the {miss} you missed.' },
    statCorrectLbl:{ cn:'首次判对', en:'First-try correct' },
    statTotalLbl:  { cn:'案件总数', en:'Total cases' },
    restartBtn: { cn:'再来一轮', en:'Replay' },
    caseLabelCn:'案件 0', caseLabelEn:'CASE 0',
    badgeCorrect:{ cn:'判定 · 正确', en:'VERDICT · CORRECT' },
    badgeWrong:  { cn:'判定 · 待复盘', en:'VERDICT · MISSED' }
  };

  function t(k){ return STR[k] ? STR[k][LANG] : k; }
  function pick(o){ return o && o[LANG] != null ? o[LANG] : ''; }

  // ============================================================
  // 5 cases — each is 24h x 24pts, two sensors
  // 数据由确定性公式生成 (无 Math.random 重新洗牌, 每次进入数值一致, 但有 seed 抖动)
  // ============================================================
  function seedRand(seed){
    var s = seed;
    return function(){
      s = (s * 9301 + 49297) % 233280;
      return s / 233280;
    };
  }

  // 基础白天活动曲线 (PM2.5 早晚高峰)
  function baseCurve(rng){
    var arr = [];
    for(var h=0; h<24; h++){
      // 双峰: 7-9 am 通勤 + 18-20 pm 做饭, 凌晨低
      var morning = 18 * Math.exp(-Math.pow(h-8, 2)/8);
      var evening = 22 * Math.exp(-Math.pow(h-19, 2)/6);
      var baseLine = 12 + morning + evening;
      var noise = (rng()-0.5) * 3;
      arr.push(Math.max(2, baseLine + noise));
    }
    return arr;
  }

  // Case 1 — 健康: 两条几乎吻合 (差异 < 3 μg/m³)
  function case1(){
    var rng = seedRand(101);
    var a = baseCurve(rng);
    var rng2 = seedRand(202);
    var b = a.map(function(v){ return v + (rng2()-0.5)*2.4; });
    return { s5003:a, s7003:b };
  }
  // Case 2 — 5003 系统偏高 (积灰): 整体 +35%
  function case2(){
    var rng = seedRand(303);
    var b = baseCurve(rng);
    var rng2 = seedRand(404);
    var a = b.map(function(v){ return v * 1.35 + 6 + (rng2()-0.5)*2; });
    return { s5003:a, s7003:b };
  }
  // Case 3 — 7003 系统偏低且变迟钝: 缩到 0.55 + 平滑
  function case3(){
    var rng = seedRand(505);
    var a = baseCurve(rng);
    var b = a.map(function(v){ return v * 0.55 - 2; });
    // smoothing 模拟卡死
    for(var k=0;k<2;k++){
      var nb = b.slice();
      for(var i=1;i<b.length-1;i++){
        nb[i] = (b[i-1] + b[i]*2 + b[i+1]) / 4;
      }
      b = nb;
    }
    return { s5003:a, s7003:b.map(function(v){ return Math.max(1, v); }) };
  }
  // Case 4 — 两条同步飙升 (火灾/沙尘): 中段乘 4-6x, 两条仍吻合
  function case4(){
    var rng = seedRand(606);
    var base = baseCurve(rng);
    var a = base.map(function(v, h){
      var spike = (h>=12 && h<=17) ? Math.exp(-Math.pow(h-14.5, 2)/4) * 180 : 0;
      return v + spike;
    });
    var rng2 = seedRand(707);
    var b = a.map(function(v){ return v + (rng2()-0.5)*4; });
    return { s5003:a, s7003:b };
  }
  // Case 5 — 接线松动: 大部分时段吻合, 但某段时间 7003 闪断 → 跳到 0 附近 / 突跳
  function case5(){
    var rng = seedRand(808);
    var a = baseCurve(rng);
    var b = a.slice();
    // 9-13 点 7003 数据卡住在 4 μg/m³ 然后 14 点闪断
    for(var i=9;i<=13;i++){ b[i] = 3 + (i%2)*1.5; }
    b[14] = 0.5; // dropout
    b[15] = a[15] + 22; // 复位时尖峰
    return { s5003:a, s7003:b };
  }

  var CASES = [
    {
      data: case1(),
      title: { cn:'平常的周三', en:'An ordinary Wednesday' },
      sub:   { cn:'两台传感器在阳台上跑了 24 小时，外面没什么异常。先看曲线再做判断。',

  // ============================================================
  // SVG chart renderer
  // ============================================================
  var W = 720, H = 220;
  var PAD = { l:48, r:18, t:16, b:32 };
  var plotW = W - PAD.l - PAD.r;
  var plotH = H - PAD.t - PAD.b;

  function buildChart(data){
    var all5 = data.s5003, all7 = data.s7003;
    var maxV = 0;
    for(var i=0;i<24;i++){
      if(all5[i] > maxV) maxV = all5[i];
      if(all7[i] > maxV) maxV = all7[i];
    }
    // round up
    var yMax = Math.ceil(maxV / 50) * 50;
    if(yMax < 50) yMax = 50;

    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.getElementById('dualChart');
    while(svg.firstChild) svg.removeChild(svg.firstChild);

    // grid + Y axis labels (0, mid, max)
    var yTicks = 4;
    for(var t=0; t<=yTicks; t++){
      var yVal = yMax * (1 - t / yTicks);
      var y = PAD.t + plotH * (t / yTicks);
      var line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', PAD.l);
      line.setAttribute('x2', PAD.l + plotW);
      line.setAttribute('y1', y);
      line.setAttribute('y2', y);
      line.setAttribute('stroke', '#EBE5D6');
      line.setAttribute('stroke-width', '1');
      if(t === yTicks){
        line.setAttribute('stroke', '#D9D1BD');
      }
      svg.appendChild(line);

      var lbl = document.createElementNS(svgNS, 'text');
      lbl.setAttribute('x', PAD.l - 8);
      lbl.setAttribute('y', y + 4);
      lbl.setAttribute('text-anchor', 'end');
      lbl.setAttribute('font-family', 'JetBrains Mono,monospace');
      lbl.setAttribute('font-size', '10');
      lbl.setAttribute('fill', '#9D978A');
      lbl.textContent = Math.round(yVal);
      svg.appendChild(lbl);
    }

    // X axis hour labels (0, 6, 12, 18, 23)
    var xLabels = [0, 6, 12, 18, 23];
    for(var xi=0; xi<xLabels.length; xi++){
      var h = xLabels[xi];
      var x = PAD.l + (plotW * (h / 23));
      var xt = document.createElementNS(svgNS, 'text');
      xt.setAttribute('x', x);
      xt.setAttribute('y', PAD.t + plotH + 18);
      xt.setAttribute('text-anchor', 'middle');
      xt.setAttribute('font-family', 'JetBrains Mono,monospace');
      xt.setAttribute('font-size', '10');
      xt.setAttribute('fill', '#9D978A');
      xt.textContent = (h < 10 ? '0' + h : h) + ':00';
      svg.appendChild(xt);
    }

    // axis labels
    var ylabel = document.createElementNS(svgNS, 'text');
    ylabel.setAttribute('x', 12);
    ylabel.setAttribute('y', PAD.t + plotH / 2);
    ylabel.setAttribute('transform', 'rotate(-90 12 ' + (PAD.t + plotH/2) + ')');
    ylabel.setAttribute('text-anchor', 'middle');
    ylabel.setAttribute('font-family', 'JetBrains Mono,monospace');
    ylabel.setAttribute('font-size', '10');
    ylabel.setAttribute('fill', '#6B6557');
    ylabel.textContent = 'μg/m³';
    svg.appendChild(ylabel);

    // build path strings
    function pathFor(arr){
      var d = '';
      for(var i=0;i<arr.length;i++){
        var x = PAD.l + plotW * (i / 23);
        var y = PAD.t + plotH * (1 - arr[i] / yMax);
        d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
      }
      return d;
    }

    // PMS5003 line (blue, drawn first)
    var p5 = document.createElementNS(svgNS, 'path');
    p5.setAttribute('d', pathFor(all5));
    p5.setAttribute('stroke', '#527B95');
    p5.setAttribute('stroke-width', '2.4');
    p5.setAttribute('fill', 'none');
    p5.setAttribute('stroke-linecap', 'round');
    p5.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(p5);

    // PMS7003 line (orange, drawn second, slightly transparent so overlap is visible)
    var p7 = document.createElementNS(svgNS, 'path');
    p7.setAttribute('d', pathFor(all7));
    p7.setAttribute('stroke', '#B85A33');
    p7.setAttribute('stroke-width', '2.4');
    p7.setAttribute('fill', 'none');
    p7.setAttribute('stroke-linecap', 'round');
    p7.setAttribute('stroke-linejoin', 'round');
    p7.setAttribute('opacity', '0.92');
    svg.appendChild(p7);

    // dots for each hour (small)
    function addDots(arr, color){
      for(var i=0;i<arr.length;i++){
        var x = PAD.l + plotW * (i / 23);
        var y = PAD.t + plotH * (1 - arr[i] / yMax);
        var c = document.createElementNS(svgNS, 'circle');
        c.setAttribute('cx', x);
        c.setAttribute('cy', y);
        c.setAttribute('r', '1.8');
        c.setAttribute('fill', color);
        svg.appendChild(c);
      }
    }
    addDots(all5, '#527B95');
    addDots(all7, '#B85A33');

    // inline mini-legend (top-right)
    var lg5 = document.createElementNS(svgNS, 'g');
    lg5.setAttribute('transform', 'translate(' + (PAD.l + plotW - 160) + ',' + (PAD.t + 4) + ')');
    var rect5 = document.createElementNS(svgNS, 'rect');
    rect5.setAttribute('x', 0); rect5.setAttribute('y', -8);
    rect5.setAttribute('width', 160); rect5.setAttribute('height', 22);
    rect5.setAttribute('fill', '#FFFFFF'); rect5.setAttribute('opacity', '0.85');
    rect5.setAttribute('rx', '4'); rect5.setAttribute('stroke', '#EBE5D6');
    lg5.appendChild(rect5);

    var sw1 = document.createElementNS(svgNS, 'rect');
    sw1.setAttribute('x', 6); sw1.setAttribute('y', -1);
    sw1.setAttribute('width', 14); sw1.setAttribute('height', 3);
    sw1.setAttribute('fill', '#527B95');
    lg5.appendChild(sw1);
    var lbl1 = document.createElementNS(svgNS, 'text');
    lbl1.setAttribute('x', 24); lbl1.setAttribute('y', 4);
    lbl1.setAttribute('font-family', 'JetBrains Mono,monospace');
    lbl1.setAttribute('font-size', '10'); lbl1.setAttribute('fill', '#2B2924');
    lbl1.textContent = 'PMS5003';
    lg5.appendChild(lbl1);

    var sw2 = document.createElementNS(svgNS, 'rect');
    sw2.setAttribute('x', 86); sw2.setAttribute('y', -1);
    sw2.setAttribute('width', 14); sw2.setAttribute('height', 3);
    sw2.setAttribute('fill', '#B85A33');
    lg5.appendChild(sw2);
    var lbl2 = document.createElementNS(svgNS, 'text');
    lbl2.setAttribute('x', 104); lbl2.setAttribute('y', 4);
    lbl2.setAttribute('font-family', 'JetBrains Mono,monospace');
    lbl2.setAttribute('font-size', '10'); lbl2.setAttribute('fill', '#2B2924');
    lbl2.textContent = 'PMS7003';
    lg5.appendChild(lbl2);

    svg.appendChild(lg5);
  }

    dom.optionsTitle.textContent = t('optionsTitle');
    dom.chartUnit.textContent = t('chartUnit');
    dom.chartHint.textContent = t('chartHint');
    dom.statCorrectLbl.textContent = t('statCorrectLbl');
    dom.statTotalLbl.textContent = t('statTotalLbl');
    dom.restartBtn.textContent = t('restartBtn');
  }

  function renderProgressDots(){
    dom.progDots.innerHTML = '';
    for(var i=0;i<CASES.length;i++){
      var d = document.createElement('div');
      d.className = 'pd';
      d.textContent = (i+1);
      if(i < caseIdx) d.classList.add('done');
      else if(i === caseIdx) d.classList.add('active');
      dom.progDots.appendChild(d);
    }
    var pct = Math.round((caseIdx / CASES.length) * 100);
    dom.progFill.style.width = pct + '%';
  }

  function renderCase(){
    if(caseIdx >= CASES.length){
      showReward();
      return;
    }
    var c = CASES[caseIdx];
    caseAnswered = false;
    lastPicked = null;

    var labelPrefix = (LANG === 'cn') ? STR.caseLabelCn : STR.caseLabelEn;
    dom.sceneNum.textContent = labelPrefix + (caseIdx + 1);
    dom.sceneTitle.textContent = pick(c.title);
    dom.sceneSub.textContent = pick(c.sub);
    dom.sceneCounter.textContent = '0' + (caseIdx + 1) + ' / 0' + CASES.length;

    // options text
    var optBtns = dom.optionsGrid.querySelectorAll('.option-btn');
    var keys = ['A','B','C','D'];
    for(var i=0;i<optBtns.length;i++){
      var k = keys[i];
      var span = optBtns[i].querySelector('[data-text]');
      span.textContent = pick(c.options[k]);
      optBtns[i].disabled = false;
      optBtns[i].classList.remove('picked-correct','picked-wrong','dimmed');
    }

    dom.feedback.classList.remove('show','is-wrong');
    buildChart(c.data);
    renderProgressDots();
  }

  function pickVerdict(which){
    if(caseAnswered) return;
    caseAnswered = true;
    lastPicked = which;
    var c = CASES[caseIdx];
    var isCorrect = (which === c.correctVerdict);
    if(isCorrect) firstTryCorrect++;

    var optBtns = dom.optionsGrid.querySelectorAll('.option-btn');
    var keys = ['A','B','C','D'];
    for(var i=0;i<optBtns.length;i++){
      var k = keys[i];
      optBtns[i].disabled = true;
      if(k === c.correctVerdict){
        optBtns[i].classList.add('picked-correct');
      }else if(k === which){
        optBtns[i].classList.add('picked-wrong');
      }else{
        optBtns[i].classList.add('dimmed');
      }
    }

    showFeedback(isCorrect, c, which);

    var dots = dom.progDots.querySelectorAll('.pd');
    if(dots[caseIdx]){
      dots[caseIdx].classList.remove('active');
      dots[caseIdx].classList.add(isCorrect ? 'done' : 'miss');
    }
  }

  function showFeedback(isCorrect, c, picked){
    dom.feedback.classList.remove('is-wrong');
    if(!isCorrect) dom.feedback.classList.add('is-wrong');
    dom.fbBadge.textContent = isCorrect ? t('badgeCorrect') : t('badgeWrong');
    dom.fbTitle.textContent = pick(c.options[c.correctVerdict])
      + ' · ' + (LANG === 'cn' ? '正解' : 'correct verdict');
    dom.fbBody.textContent = pick(c.rationale[picked]);
    dom.fbClue.innerHTML = pick(c.clue);

    if(caseIdx === CASES.length - 1){
      dom.nextBtn.textContent = t('finishBtn');
    }else{
      dom.nextBtn.textContent = t('nextBtn');
    }
    dom.feedback.classList.add('show');

    setTimeout(function(){
      dom.feedback.scrollIntoView({ behavior:'smooth', block:'end' });
    }, 100);
  }

  function nextCase(){
    caseIdx++;
    if(caseIdx >= CASES.length){
      showReward();
    }else{
      renderCase();
    }
  }

  function showReward(){
    dom.sceneHeader.style.display = 'none';
    dom.sceneStage.style.display = 'none';
    dom.rewardScreen.classList.add('show');
    dom.statCorrect.textContent = firstTryCorrect;
    dom.statTotal.textContent = CASES.length;
    dom.rewardTitle.textContent = t('rewardTitle');
    var wrong = CASES.length - firstTryCorrect;
    if(wrong === 0){
      dom.rewardSub.textContent = t('rewardSub');
    }else{
      dom.rewardSub.textContent = t('rewardAlmost')
        .replace('{ok}', firstTryCorrect)
        .replace('{miss}', wrong);
    }
    caseIdx = CASES.length;
    renderProgressDots();
  }

  function restart(){
    caseIdx = 0;
    firstTryCorrect = 0;
    caseAnswered = false;
    dom.sceneHeader.style.display = '';
    dom.sceneStage.style.display = '';
    dom.rewardScreen.classList.remove('show');
    renderCase();
  }

  function toggleLang(){
    LANG = (LANG === 'cn') ? 'en' : 'cn';
    applyStaticI18N();
    if(dom.rewardScreen.classList.contains('show')){
      dom.rewardTitle.textContent = t('rewardTitle');
      var wrong = CASES.length - firstTryCorrect;
      if(wrong === 0){
        dom.rewardSub.textContent = t('rewardSub');
      }else{
        dom.rewardSub.textContent = t('rewardAlmost')
          .replace('{ok}', firstTryCorrect)
          .replace('{miss}', wrong);
      }
    }else{
      // re-render case + restore answered state
      var savedAnswered = caseAnswered;
      var savedPicked = lastPicked;
      var c = CASES[caseIdx];
      renderCase();
      if(savedAnswered){
        var optBtns = dom.optionsGrid.querySelectorAll('.option-btn');
        var keys = ['A','B','C','D'];
        for(var i=0;i<optBtns.length;i++){
          var k = keys[i];
          optBtns[i].disabled = true;
          if(k === c.correctVerdict){
            optBtns[i].classList.add('picked-correct');
          }else if(k === savedPicked){
            optBtns[i].classList.add('picked-wrong');
          }else{
            optBtns[i].classList.add('dimmed');
          }
        }
        caseAnswered = true;
        lastPicked = savedPicked;
        showFeedback(savedPicked === c.correctVerdict, c, savedPicked);
      }
    }
  }

  // ============================================================
  // wire up
  // ============================================================
  var optBtns = dom.optionsGrid.querySelectorAll('.option-btn');
  for(var i=0;i<optBtns.length;i++){
    (function(btn){
      btn.addEventListener('click', function(){
        pickVerdict(btn.getAttribute('data-key'));
      });
    })(optBtns[i]);
  }
  dom.nextBtn.addEventListener('click', nextCase);
  dom.restartBtn.addEventListener('click', restart);
  dom.langBtn.addEventListener('click', toggleLang);

  // ============================================================
  // init
  // ============================================================
  applyStaticI18N();
  renderCase();
})();
</script>
</body>
</html>
