<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Electrode Placement Planner</title>
<style>
:root{
  --bg-0:oklch(0.18 0.03 25);
  --bg-1:oklch(0.23 0.04 25);
  --accent:oklch(0.75 0.17 25);
  --synaptic:oklch(0.75 0.17 25);
  --dendrite:oklch(0.55 0.15 25);
  --axon:oklch(0.32 0.10 25);
  --firing:oklch(0.92 0.08 25);
  --memory:oklch(0.85 0.14 85);
  --ink:oklch(0.94 0.02 60);
  --muted:oklch(0.66 0.03 40);
  --mono:'JetBrains Mono','SFMono-Regular',ui-monospace,'Menlo',Consolas,monospace;
  --sans:'JetBrains Mono',ui-monospace,system-ui,'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:var(--sans)}
.shell{display:flex;flex-direction:row;height:100vh}

/* ---------- sidebar ---------- */
.game-sidebar{width:200px;flex:0 0 200px;background:var(--bg-1);border-right:1px solid var(--axon);
  display:flex;flex-direction:column;padding:14px 14px 12px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.mascot{width:34px;height:34px;flex:0 0 34px}
.brand .who{line-height:1.15}
.brand .who b{font-size:12px;letter-spacing:.5px;color:var(--firing)}
.brand .who span{display:block;font-size:9px;color:var(--muted);letter-spacing:.5px}

.card{background:var(--axon);border:1px solid var(--dendrite);padding:9px 10px;margin-bottom:11px}
.card h4{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--memory);margin-bottom:6px;font-weight:700}
.card p{font-size:11px;line-height:1.6;color:var(--ink)}

.budget{display:flex;align-items:baseline;gap:6px}
.budget .num{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--firing);line-height:1}
.budget .of{font-size:11px;color:var(--muted)}
.budget .lbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-left:auto}

.stat{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0}
.stat .k{color:var(--muted)}
.stat .v{font-family:var(--mono);color:var(--ink)}
.stat .v.good{color:var(--memory)}
.stat .v.bad{color:var(--accent)}

.barwrap{height:8px;background:var(--bg-0);border:1px solid var(--dendrite);margin-top:6px;position:relative}
.barfill{height:100%;width:0%;background:var(--memory);transition:width .35s ease}

.actions{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:10px}
.btn{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.5px;padding:9px 0;cursor:pointer;
  border:1px solid var(--accent);background:var(--bg-0);color:var(--firing);text-align:center;
  box-shadow:3px 3px 0 var(--bg-0)}
.btn:hover{background:var(--axon)}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn.ghost{border-color:var(--dendrite);color:var(--muted);box-shadow:none}
#langBtn{font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:6px 0;cursor:pointer;
  border:1px solid var(--dendrite);background:transparent;color:var(--muted)}
#langBtn:hover{color:var(--firing);border-color:var(--accent)}

/* ---------- main ---------- */
.game-main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--axon)}
.topbar .ttl{font-size:13px;font-weight:700;color:var(--firing);letter-spacing:.5px}
.topbar .sub{font-size:10px;color:var(--muted);letter-spacing:.5px}
.legend{margin-left:auto;display:flex;gap:14px}
.legend .li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.legend .dot{width:10px;height:10px;border-radius:50%}
.stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.stage canvas{display:block;cursor:pointer}
.hint{font-size:11px;color:var(--muted);padding:6px 0 2px;min-height:20px;text-align:center}
.hint.bad{color:var(--accent)}
.hint.good{color:var(--memory)}

/* ---------- modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;z-index:40}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(440px,86vw);
  background:var(--bg-1);border:1px solid var(--accent);padding:26px 28px;z-index:41;display:none;
  box-shadow:6px 6px 0 var(--bg-0)}
.modal h2{font-size:17px;color:var(--firing);margin-bottom:6px;letter-spacing:.5px}
.modal .verdict{font-family:var(--mono);font-size:34px;font-weight:700;margin:10px 0}
.modal .verdict.win{color:var(--memory)}
.modal .verdict.fail{color:var(--accent)}
.modal p{font-size:12px;line-height:1.7;color:var(--ink);margin-bottom:8px}
.modal .sim{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg-0);
  border:1px solid var(--axon);padding:8px 10px;margin:8px 0;line-height:1.7}
.modal .sim b{color:var(--firing)}
.modal .row{display:flex;gap:10px;margin-top:14px}
.unlock{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--bg-0);
  background:var(--memory);padding:5px 12px;margin-top:4px}
</style>
</head>
<body>
<div class="shell">
  <aside class="game-sidebar">
    <div class="brand">
      <svg class="mascot" viewBox="0 0 34 34" aria-hidden="true">
        <g fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round">
          <line x1="17" y1="17" x2="17" y2="5"/>
          <line x1="17" y1="17" x2="7" y2="11"/>
          <line x1="17" y1="17" x2="27" y2="11"/>
          <line x1="17" y1="17" x2="9" y2="26"/>
          <line x1="17" y1="17" x2="25" y2="26"/>
        </g>
        <circle cx="17" cy="17" r="3.4" fill="var(--firing)"/>
        <circle cx="17" cy="5" r="2" fill="var(--memory)"/>
        <circle cx="7" cy="11" r="2" fill="var(--dendrite)"/>
        <circle cx="27" cy="11" r="2" fill="var(--dendrite)"/>
        <circle cx="9" cy="26" r="2" fill="var(--dendrite)"/>
        <circle cx="25" cy="26" r="2" fill="var(--dendrite)"/>
      </svg>
      <div class="who"><b>Spark</b><span data-i="role"></span></div>
    </div>

    <div class="card">
      <h4 data-i="taskH"></h4>
      <p data-i="taskBody"></p>
    </div>

    <div class="card">
      <h4 data-i="budgetH"></h4>
      <div class="budget">
        <span class="num" id="budgetNum">8</span>
        <span class="of">/ 8</span>
        <span class="lbl" data-i="budgetUnit"></span>
      </div>
    </div>

    <div class="card">
      <h4 data-i="coverH"></h4>
      <div class="stat"><span class="k" data-i="covMotor"></span><span class="v" id="sMotor">0 / 4</span></div>
      <div class="stat"><span class="k" data-i="covRef"></span><span class="v" id="sRef">0 / 1</span></div>
      <div class="stat"><span class="k" data-i="covWaste"></span><span class="v" id="sWaste">0</span></div>
      <div class="barwrap"><div class="barfill" id="covBar"></div></div>
    </div>

    <div class="actions">
      <button class="btn" id="btnRun" data-i="run"></button>
      <button class="btn ghost" id="btnReset" data-i="reset"></button>
      <button id="langBtn">EN / 中文</button>
    </div>
  </aside>

  <main class="game-main">
    <div class="topbar">
      <div>
        <div class="ttl" data-i="hTitle"></div>
        <div class="sub">P-EEG-01-M05 · neuro · 10-20 system</div>
      </div>
      <div class="legend">
        <div class="li"><span class="dot" style="background:var(--memory)"></span><span data-i="lgMotor"></span></div>
        <div class="li"><span class="dot" style="background:var(--firing)"></span><span data-i="lgRef"></span></div>
        <div class="li"><span class="dot" style="background:var(--dendrite)"></span><span data-i="lgOther"></span></div>
      </div>
    </div>
    <div class="stage">
      <canvas id="scalp"></canvas>
      <div class="hint" id="hint" data-i="hintIdle"></div>
    </div>
  </main>
</div>

<div class="scrim" id="scrim"></div>
<div class="modal" id="modal">
  <h2 id="mTitle"></h2>
  <div class="verdict" id="mVerdict"></div>
  <p id="mMsg"></p>
  <div class="sim" id="mSim"></div>
  <div id="mUnlock"></div>
  <div class="row">
    <button class="btn" id="mAgain" data-i="again"></button>
    <button class="btn ghost" id="mClose" data-i="close"></button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- i18n ----------
  var LANG='cn';
  var I18N={
    role:{cn:'电极布局向导',en:'Montage guide'},
    taskH:{cn:'任务',en:'MISSION'},
    taskBody:{cn:'你只有 8 个电极。规划贴在头皮哪几个位置，才能最好地抓到「想象左手 / 右手」的脑信号，再预演解码。',
              en:'You have only 8 electrodes. Plan where on the scalp to place them so the imagined left/right-hand signal is best captured, then run the decode rehearsal.'},
    budgetH:{cn:'电极预算',en:'ELECTRODE BUDGET'},
    budgetUnit:{cn:'剩余',en:'left'},
    coverH:{cn:'运动区覆盖',en:'MOTOR COVERAGE'},
    covMotor:{cn:'运动区命中',en:'Motor sites'},
    covRef:{cn:'参考点',en:'Reference'},
    covWaste:{cn:'浪费(远区)',en:'Wasted'},
    run:{cn:'预演解码',en:'RUN REHEARSAL'},
    reset:{cn:'清空重排',en:'CLEAR'},
    hTitle:{cn:'头皮 10-20 电极规划',en:'Scalp 10-20 Electrode Planner'},
    lgMotor:{cn:'运动区',en:'Motor strip'},
    lgRef:{cn:'参考点',en:'Reference'},
    lgOther:{cn:'其它位置',en:'Other sites'},
    hintIdle:{cn:'点头皮上的位置放/取电极。运动想象信号最强在中央运动区 C3 / C4。',
              en:'Click a site to add/remove an electrode. Imagined-movement signal is strongest over the central motor strip C3 / C4.'},
    hintNoBudget:{cn:'电极用完了。先取下一个，或直接预演。',en:'Out of electrodes. Remove one, or run the rehearsal.'},
    hintPlaced:{cn:'已放置 {n} 个电极。',en:'{n} electrode(s) placed.'},
    again:{cn:'再排一次',en:'PLAN AGAIN'},
    close:{cn:'关闭',en:'CLOSE'},
    // outcomes
    winT:{cn:'布局通过',en:'Montage passed'},
    winV:{cn:'解码成功',en:'DECODE OK'},
    winM:{cn:'你的电极盖住了双侧运动区，并留了参考点。预演用这套布局清楚分出了左右手想象。',
          en:'Your electrodes cover both motor strips and keep a reference. The rehearsal cleanly separated left vs right imagery.'},
    failMotorT:{cn:'预演失败',en:'Rehearsal failed'},
    failV:{cn:'无法解码',en:'CANNOT DECODE'},
    failMotorM:{cn:'电极没盖住中央运动区 C3 / C4，运动想象的 ERD 信号根本没被采到，后续解码无从下手。',
                en:'No electrode over the central motor strip C3 / C4 — the movement-imagery ERD signal was never recorded, so decoding has nothing to work with.'},
    failOneT:{cn:'只盖了一侧',en:'Only one side'},
    failOneM:{cn:'只有一侧运动区被采到。要区分左 vs 右手，必须同时拿到对侧 C3 和 C4 的信号。',
              en:'Only one motor strip was recorded. To tell left from right you need both C3 and C4 on opposite sides.'},
    failRefT:{cn:'缺参考点',en:'No reference'},
    failRefM:{cn:'运动区盖到了，但没有参考电极。脑电是电位差，没有参考点信号会漂、噪声压不住，解码不稳。',
              en:'Motor strips covered, but no reference electrode. EEG is a potential difference — without a reference the signal drifts and noise dominates.'},
    answer:{cn:'核心答案：很多电极是为了在头皮不同位置同时取样，把对侧运动区 C3 / C4 一起看，才能比较左右、分出想象的是哪只手。',
            en:'Core idea: many electrodes sample many scalp sites at once. Seeing C3 and C4 (opposite motor strips) together lets you compare sides and decode which hand was imagined.'},
    unlock:{cn:'解锁称号：电极布局师',en:'Unlocked: Montage Designer'}
  };

  // ---------- 10-20 sites (normalized coords on a head circle) ----------
  // type: motor (C3/C4 + flanking FC/CP central row), ref (Cz / mastoid reference),
  //       other (frontal / occipital / temporal — not useful for hand MI)
  var SITES=[
    {id:'Fp1',x:-0.30,y:-0.82,type:'other'},
    {id:'Fp2',x: 0.30,y:-0.82,type:'other'},
    {id:'F7', x:-0.66,y:-0.50,type:'other'},
    {id:'F3', x:-0.32,y:-0.46,type:'other'},
    {id:'Fz', x: 0.00,y:-0.44,type:'other'},
    {id:'F4', x: 0.32,y:-0.46,type:'other'},
    {id:'F8', x: 0.66,y:-0.50,type:'other'},
    {id:'FC3',x:-0.34,y:-0.18,type:'motor'},
    {id:'FC4',x: 0.34,y:-0.18,type:'motor'},
    {id:'T7', x:-0.86,y: 0.00,type:'other'},
    {id:'C3', x:-0.40,y: 0.00,type:'motor'},
    {id:'Cz', x: 0.00,y: 0.00,type:'ref'},
    {id:'C4', x: 0.40,y: 0.00,type:'motor'},
    {id:'T8', x: 0.86,y: 0.00,type:'other'},
    {id:'CP3',x:-0.34,y: 0.18,type:'motor'},
    {id:'CP4',x: 0.34,y: 0.18,type:'motor'},
    {id:'P3', x:-0.32,y: 0.46,type:'other'},
    {id:'Pz', x: 0.00,y: 0.44,type:'other'},
    {id:'P4', x: 0.32,y: 0.46,type:'other'},
    {id:'P7', x:-0.66,y: 0.50,type:'other'},
    {id:'P8', x: 0.66,y: 0.50,type:'other'},
    {id:'O1', x:-0.30,y: 0.82,type:'other'},
    {id:'O2', x: 0.30,y: 0.82,type:'other'},
    {id:'A1', x:-0.98,y: 0.30,type:'ref'},
    {id:'A2', x: 0.98,y: 0.30,type:'ref'}
  ];

  var BUDGET=8;
  var placed={};            // id -> true
  var canvas=document.getElementById('scalp');
  var ctx=canvas.getContext('2d');
  var geom={cx:0,cy:0,R:0}; // current head geometry in px

  function placedCount(){var n=0;for(var k in placed){if(placed[k])n++;}return n;}
  function placedList(){var a=[];for(var k in placed){if(placed[k])a.push(k);}return a;}

  // ---------- analysis ----------
  function analyze(){
    var leftMotor=false,rightMotor=false,motorHits=0,refHits=0,waste=0;
    SITES.forEach(function(s){
      if(!placed[s.id])return;
      if(s.type==='motor'){motorHits++; if(s.x<0)leftMotor=true; else rightMotor=true;}
      else if(s.type==='ref'){refHits++;}
      else {waste++;}
    });
    return {leftMotor:leftMotor,rightMotor:rightMotor,motorHits:motorHits,refHits:refHits,waste:waste};
  }

  // ---------- rendering ----------
  function resize(){
    var stage=canvas.parentElement;
    var r=stage.getBoundingClientRect();
    var w=Math.max(260,r.width-8);
    var h=Math.max(260,r.height-34);
    var size=Math.min(w,h);
    var dpr=window.devicePixelRatio||1;
    canvas.width=size*dpr; canvas.height=size*dpr;
    canvas.style.width=size+'px'; canvas.style.height=size+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    geom.cx=size/2; geom.cy=size/2; geom.R=size*0.40;
    draw();
  }

  function siteXY(s){return {x:geom.cx+s.x*geom.R, y:geom.cy+s.y*geom.R};}
  function colVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim();}

  function draw(){
    var w=canvas.width/(window.devicePixelRatio||1);
    ctx.clearRect(0,0,w,w);
    var cx=geom.cx,cy=geom.cy,R=geom.R;
    var memory=colVar('--memory'),firing=colVar('--firing'),dend=colVar('--dendrite'),
        axon=colVar('--axon'),accent=colVar('--accent'),muted=colVar('--muted'),ink=colVar('--ink');

    // head outline
    ctx.lineWidth=2; ctx.strokeStyle=dend;
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    // nose
    ctx.beginPath(); ctx.moveTo(cx-R*0.12,cy-R); ctx.lineTo(cx,cy-R*1.16); ctx.lineTo(cx+R*0.12,cy-R); ctx.stroke();
    // ears
    ctx.beginPath(); ctx.arc(cx-R,cy,R*0.10,Math.PI*0.5,Math.PI*1.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+R,cy,R*0.10,-Math.PI*0.5,Math.PI*0.5); ctx.stroke();

    // motor-strip band highlight (central column)
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
    ctx.globalAlpha=0.12; ctx.fillStyle=memory;
    ctx.fillRect(0,cy-R*0.30,w,R*0.60);
    ctx.globalAlpha=1;
    ctx.restore();
    // band label
    ctx.font='10px JetBrains Mono, monospace'; ctx.fillStyle=muted;
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText('motor strip', cx-R+6, cy-R*0.30-4);

    // midline
    ctx.strokeStyle=axon; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
    ctx.setLineDash([]);

    // sites
    SITES.forEach(function(s){
      var p=siteXY(s);
      var on=!!placed[s.id];
      var base = s.type==='motor'?memory : s.type==='ref'?firing : dend;
      ctx.beginPath(); ctx.arc(p.x,p.y,8,0,Math.PI*2);
      if(on){
        ctx.fillStyle=base; ctx.fill();
        ctx.lineWidth=3; ctx.strokeStyle=accent; ctx.stroke();
        ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,Math.PI*2); ctx.fillStyle=colVar('--bg-0'); ctx.fill();
      } else {
        ctx.fillStyle='rgba(0,0,0,0)';
        ctx.lineWidth=1.4; ctx.strokeStyle=base; ctx.stroke();
      }
      ctx.font='9px JetBrains Mono, monospace';
      ctx.fillStyle= on? ink : muted;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(s.id, p.x, p.y-14);
    });
  }

  // ---------- hit test ----------
  canvas.addEventListener('click',function(e){
    var rect=canvas.getBoundingClientRect();
    var mx=(e.clientX-rect.left), my=(e.clientY-rect.top);
    var best=null,bd=15;
    SITES.forEach(function(s){
      var p=siteXY(s);
      var d=Math.hypot(p.x-mx,p.y-my);
      if(d<bd){bd=d;best=s;}
    });
    if(!best)return;
    if(placed[best.id]){
      delete placed[best.id];
    } else {
      if(placedCount()>=BUDGET){
        flash(t('hintNoBudget'),'bad'); refresh(); return;
      }
      placed[best.id]=true;
    }
    refresh();
  });

  function flash(msg,cls){
    var h=document.getElementById('hint');
    h.textContent=msg; h.className='hint'+(cls?' '+cls:'');
  }

  // ---------- sidebar refresh ----------
  function refresh(){
    var a=analyze();
    var used=placedCount();
    document.getElementById('budgetNum').textContent=(BUDGET-used);
    document.getElementById('sMotor').textContent=a.motorHits+' / 4';
    document.getElementById('sMotor').className='v'+(a.leftMotor&&a.rightMotor?' good':'');
    document.getElementById('sRef').textContent=a.refHits+' / 1';
    document.getElementById('sRef').className='v'+(a.refHits>=1?' good':'');
    document.getElementById('sWaste').textContent=a.waste;
    document.getElementById('sWaste').className='v'+(a.waste>0?' bad':'');
    var pct=0;
    if(a.leftMotor)pct+=25; if(a.rightMotor)pct+=25;
    if(a.refHits>=1)pct+=30;
    pct+=Math.max(0,20-a.waste*7);
    pct=Math.max(0,Math.min(100,pct));
    document.getElementById('covBar').style.width=pct+'%';

    document.getElementById('btnRun').disabled = used===0;
    if(used===0){ flash(t('hintIdle'),''); }
    else if(used<BUDGET){ flash(t('hintPlaced').replace('{n}',used),''); }
    draw();
  }

  // ---------- run rehearsal ----------
  function runRehearsal(){
    var a=analyze();
    var pl=placedList().join(' ');
    var title,verdict,verdictCls,msg,simLines,showUnlock=false;

    if(!a.leftMotor && !a.rightMotor){
      title=t('failMotorT'); verdict=t('failV'); verdictCls='fail'; msg=t('failMotorM');
      simLines=[
        line('montage', pl||'—'),
        line('C3 / C4 captured', 'no'),
        line('ERD over motor cortex', 'not recorded'),
        line('left vs right separable', 'no')
      ];
    } else if(!(a.leftMotor && a.rightMotor)){
      title=t('failOneT'); verdict=t('failV'); verdictCls='fail'; msg=t('failOneM');
      simLines=[
        line('montage', pl),
        line('motor side covered', a.leftMotor?'left only':'right only'),
        line('contralateral compare', 'impossible'),
        line('left vs right separable', 'no')
      ];
    } else if(a.refHits<1){
      title=t('failRefT'); verdict=t('failV'); verdictCls='fail'; msg=t('failRefM');
      simLines=[
        line('montage', pl),
        line('C3 & C4 captured', 'yes'),
        line('reference electrode', 'missing'),
        line('signal drift / noise', 'high — unstable')
      ];
    } else {
      showUnlock=true;
      title=t('winT'); verdict=t('winV'); verdictCls='win'; msg=t('winM');
      var acc=Math.max(78, 96 - a.waste*4);
      simLines=[
        line('montage', pl),
        line('C3 & C4 captured', 'yes'),
        line('reference electrode', 'yes'),
        line('decode left vs right', acc+'% acc')
      ];
    }
    openModal(title,verdict,verdictCls,msg,simLines,showUnlock);
  }

  function line(k,v){return '<div><b>'+k+':</b> '+v+'</div>';}

  function openModal(title,verdict,vcls,msg,simLines,showUnlock){
    document.getElementById('mTitle').textContent=title;
    var v=document.getElementById('mVerdict'); v.textContent=verdict; v.className='verdict '+vcls;
    document.getElementById('mMsg').textContent=msg;
    document.getElementById('mSim').innerHTML=simLines.join('');
    var u=document.getElementById('mUnlock');
    if(showUnlock){
      u.innerHTML='<span class="unlock">'+t('unlock')+'</span>'+
        '<p style="margin-top:10px">'+t('answer')+'</p>';
    } else {
      u.innerHTML='<p style="margin-top:6px;color:var(--muted)">'+t('answer')+'</p>';
    }
    document.getElementById('scrim').style.display='block';
    document.getElementById('modal').style.display='block';
  }
  function closeModal(){
    document.getElementById('scrim').style.display='none';
    document.getElementById('modal').style.display='none';
  }

  // ---------- reset ----------
  function resetAll(){placed={}; closeModal(); refresh();}

  // ---------- i18n apply ----------
  function t(key){return I18N[key]?I18N[key][LANG]:key;}
  function applyLang(){
    document.querySelectorAll('[data-i]').forEach(function(el){
      var k=el.getAttribute('data-i'); if(I18N[k])el.textContent=I18N[k][LANG];
    });
    document.documentElement.lang = LANG==='cn'?'zh-CN':'en';
    refresh();
  }

  // ---------- wire ----------
  document.getElementById('langBtn').addEventListener('click',function(){
    LANG = LANG==='cn'?'en':'cn'; applyLang();
  });
  document.getElementById('btnRun').addEventListener('click',runRehearsal);
  document.getElementById('btnReset').addEventListener('click',resetAll);
  document.getElementById('mAgain').addEventListener('click',resetAll);
  document.getElementById('mClose').addEventListener('click',closeModal);
  document.getElementById('scrim').addEventListener('click',closeModal);
  window.addEventListener('resize',resize);

  applyLang();
  resize();
})();
</script>
</body>
</html>
