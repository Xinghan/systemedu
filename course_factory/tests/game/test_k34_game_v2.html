<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<title>Drop Race Lab</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0c0e14;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;}
body{margin:0;padding:0;}
.game-wrap{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.game-sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(255,181,156,0.15);overflow-y:auto;}
.sidebar-btns{display:flex;gap:6px;align-self:flex-start;}
.sidebar-lang,.sidebar-sound{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;}
.sidebar-lang:hover,.sidebar-sound:hover{border-color:#ffb59c;background:rgba(255,181,156,0.08);}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#ffb59c;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.sidebar-guide{font-size:12px;color:#aaabb0;line-height:1.6;}
.sidebar-level-chips{display:flex;gap:4px;margin-top:6px;}
.level-chip{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.2);background:transparent;color:#aaabb0;letter-spacing:0.5px;transition:all 0.2s;}
.level-chip.active{border-color:#ffb59c;color:#ffb59c;background:rgba(255,181,156,0.1);}
.level-chip.done{border-color:rgba(80,255,176,0.4);color:#50ffb0;}
.game-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);}
.game-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;color:#ffb59c;}
.game-header .info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#aaabb0;}
.game-body{flex:1;display:flex;flex-direction:column;min-height:0;}
canvas{width:100%;height:100%;display:block;}
.control-panel{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;background:rgba(0,0,0,0.4);flex-wrap:wrap;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:6px 18px;border:none;cursor:pointer;color:#0c0e14;background:linear-gradient(135deg,#ffb59c,#e08870);box-shadow:0 0 10px rgba(255,181,156,0.3);transition:transform 0.1s;letter-spacing:0.08em;}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.ctrl-btn.secondary{background:rgba(30,30,45,0.9);color:#aaabb0;box-shadow:none;border:1px solid rgba(170,171,176,0.2);}
.ctrl-btn.secondary:hover{color:#ffb59c;border-color:rgba(255,181,156,0.3);}
.hud-bar{height:44px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);padding:0 16px;backdrop-filter:blur(12px);}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaabb0;text-transform:uppercase;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb59c;transition:transform 0.15s ease-out;}
.hud-val.juice{animation:hudJuice 0.35s ease-out;}
@keyframes hudJuice{0%{transform:scale(1.3);color:#50ffb0;}100%{transform:scale(1);color:#ffb59c;}}
.slider-wrap{display:flex;align-items:center;gap:6px;}
.slider-wrap label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#aaabb0;white-space:nowrap;}
.slider-wrap input[type=range]{width:100px;accent-color:#ffb59c;}
.slider-val{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#ffb59c;font-weight:700;min-width:45px;text-align:center;}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-sidebar">
    <div class="sidebar-btns">
      <button class="sidebar-lang" id="langBtn">CN</button>
      <button class="sidebar-sound" id="soundBtn">MUTE</button>
    </div>
    <div class="sidebar-title" id="sidebarTitle"></div>
    <div class="sidebar-guide" id="guideContent"></div>
    <div class="sidebar-level-chips">
      <button class="level-chip active" id="chip1" data-round="1">L1</button>
      <button class="level-chip" id="chip2" data-round="2">L2</button>
      <button class="level-chip" id="chip3" data-round="3">L3</button>
    </div>
  </div>
  <div class="game-main">
    <div class="game-header">
      <h1 id="gameTitle"></h1>
      <div class="info" id="roundInfo"></div>
    </div>
    <div class="game-body">
      <canvas id="c"></canvas>
    </div>
    <div class="control-panel" id="controlPanel">
      <button class="ctrl-btn" id="btnDrop"></button>
      <button class="ctrl-btn secondary" id="btnReset"></button>
      <div class="slider-wrap" id="sliderWrap" style="display:none;">
        <label id="sliderLabel"></label>
        <input type="range" id="airSlider" min="0" max="120" value="120">
        <span class="slider-val" id="sliderVal">1.20</span>
      </div>
    </div>
    <div class="hud-bar">
      <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3">--</div></div>
      <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4">--</div></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// K34 Game: Drop Race Lab (v2)
// Core question: Why does a crumpled paper ball fall faster than a flat sheet?
// Pattern 1: Sandbox Simulation
// 3 levels with adjustable air density
// ============================================================

// --- I18N ---
var I18N = {
  title:       {en:'DROP RACE LAB',           cn:'\u4e0b\u843d\u7ade\u8d5b\u5b9e\u9a8c\u5ba4'},
  guide:       {en:'Drag objects to the drop zone at the top.\nClick DROP to release them.\nWatch which one lands first!\n\nL1: Paper vs paper ball\nL2: Rank 4 objects by fall order\nL3: Vacuum chamber -- adjust air density slider and discover Galileo\'s truth!',
                cn:'\u628a\u7269\u4f53\u62d6\u5230\u9876\u90e8\u6295\u653e\u533a\u3002\n\u70b9\u51fb\u201c\u6295\u653e\u201d\u91ca\u653e\u5b83\u4eec\u3002\n\u89c2\u5bdf\u54ea\u4e2a\u5148\u843d\u5730\uff01\n\nL1: \u7eb8\u7247 vs \u7eb8\u56e2\n\nL2: \u7ed9 4 \u4e2a\u7269\u4f53\u7684\u4e0b\u843d\u987a\u5e8f\u6392\u540d\n\nL3: \u771f\u7a7a\u5ba4 -- \u8c03\u8282\u7a7a\u6c14\u5bc6\u5ea6\u6ed1\u5757\uff0c\u53d1\u73b0\u4f3d\u5229\u7565\u7684\u771f\u7406\uff01'},
  levelLabel:  {en:'LEVEL',                   cn:'\u5173\u5361'},
  dropBtn:     {en:'DROP',                    cn:'\u6295\u653e'},
  resetBtn:    {en:'RESET',                   cn:'\u91cd\u7f6e'},
  nextBtn:     {en:'NEXT LEVEL',              cn:'\u4e0b\u4e00\u5173'},
  airDensity:  {en:'AIR DENSITY',             cn:'\u7a7a\u6c14\u5bc6\u5ea6'},
  unitKg:      {en:'kg/m\u00b3',              cn:'kg/m\u00b3'},
  hudLevel:    {en:'LEVEL',                   cn:'\u5173\u5361'},
  hudAir:      {en:'AIR',                     cn:'\u7a7a\u6c14'},
  hudTime:     {en:'TIME',                    cn:'\u65f6\u95f4'},
  hudResult:   {en:'RESULT',                  cn:'\u7ed3\u679c'},

  l1Title:     {en:'L1: Paper vs Paper Ball',                         cn:'L1: \u7eb8\u7247 vs \u7eb8\u56e2'},
  l2Title:     {en:'L2: Rank the Fall Order',                         cn:'L2: \u6392\u51fa\u4e0b\u843d\u987a\u5e8f'},
  l3Title:     {en:'L3: Vacuum Chamber',                              cn:'L3: \u771f\u7a7a\u5ba4\u5b9e\u9a8c'},

  l1Desc:      {en:'Which falls first: flat paper or paper ball?',    cn:'\u54ea\u4e2a\u5148\u843d\u5730\uff1a\u5e73\u5c55\u7684\u7eb8 \u8fd8\u662f \u7eb8\u56e2\uff1f'},
  l2Desc:      {en:'Drag to predict the fall order, then verify!',    cn:'\u62d6\u62fd\u9884\u6d4b\u4e0b\u843d\u987a\u5e8f\uff0c\u7136\u540e\u9a8c\u8bc1\uff01'},
  l3Desc:      {en:'Slide air density to 0 -- everything falls at the same speed!', cn:'\u628a\u7a7a\u6c14\u5bc6\u5ea6\u6ed1\u5230 0 -- \u6240\u6709\u7269\u4f53\u4ee5\u76f8\u540c\u901f\u5ea6\u4e0b\u843d\uff01'},

  paperSheet:  {en:'Paper Sheet',             cn:'\u7eb8\u7247'},
  paperBall:   {en:'Paper Ball',              cn:'\u7eb8\u56e2'},
  feather:     {en:'Feather',                 cn:'\u7fbd\u6bdb'},
  coin:        {en:'Coin',                    cn:'\u786c\u5e01'},
  balloon:     {en:'Balloon',                 cn:'\u6c14\u7403'},

  predictPrompt:{en:'Which lands first? Click to predict!',           cn:'\u54ea\u4e2a\u5148\u843d\u5730\uff1f\u70b9\u51fb\u9884\u6d4b\uff01'},
  rankPrompt:  {en:'Drag to rank fall order (fastest first)',         cn:'\u62d6\u62fd\u6392\u5e8f\uff08\u6700\u5148\u843d\u5730\u7684\u6392\u524d\u9762\uff09'},
  correct:     {en:'CORRECT!',                cn:'\u6b63\u786e\uff01'},
  incorrect:   {en:'NOT QUITE...',            cn:'\u4e0d\u592a\u5bf9...'},
  galileoMsg:  {en:'Galileo was right! Without air, everything falls at the same speed!',
                cn:'\u4f3d\u5229\u7565\u662f\u5bf9\u7684\uff01\u6ca1\u6709\u7a7a\u6c14\u65f6\uff0c\u6240\u6709\u7269\u4f53\u4ee5\u76f8\u540c\u901f\u5ea6\u4e0b\u843d\uff01'},
  vacuumHint:  {en:'Try sliding air density to 0!',                   cn:'\u8bd5\u8bd5\u628a\u7a7a\u6c14\u5bc6\u5ea6\u6ed1\u5230 0\uff01'},
  whyFaster:   {en:'Less surface area = less air resistance = falls faster!',
                cn:'\u8868\u9762\u79ef\u8d8a\u5c0f = \u7a7a\u6c14\u963b\u529b\u8d8a\u5c0f = \u4e0b\u843d\u8d8a\u5feb\uff01'},
  complete:    {en:'ALL LEVELS COMPLETE!',     cn:'\u5168\u90e8\u5b8c\u6210\uff01'},
  summaryMsg:  {en:'Air resistance depends on surface area and shape. In a vacuum, all objects fall at the same rate regardless of weight!',
                cn:'\u7a7a\u6c14\u963b\u529b\u53d6\u51b3\u4e8e\u7269\u4f53\u7684\u8868\u9762\u79ef\u548c\u5f62\u72b6\u3002\u5728\u771f\u7a7a\u4e2d\uff0c\u6240\u6709\u7269\u4f53\u4ee5\u76f8\u540c\u901f\u7387\u4e0b\u843d\uff0c\u4e0e\u91cd\u91cf\u65e0\u5173\uff01'},
  dragHint:    {en:'Drag objects up to the drop line',                cn:'\u628a\u7269\u4f53\u62d6\u5230\u4e0a\u65b9\u6295\u653e\u7ebf'},
  watching:    {en:'WATCHING...',              cn:'\u89c2\u5bdf\u4e2d...'},
  tapPredict:  {en:'Tap to predict winner',   cn:'\u70b9\u51fb\u9884\u6d4b\u8d62\u5bb6'},
  rankCheck:   {en:'CHECK ORDER',             cn:'\u68c0\u67e5\u987a\u5e8f'},
  tryVacuum:   {en:'TRY VACUUM',              cn:'\u8bd5\u8bd5\u771f\u7a7a'},
  replay:      {en:'REPLAY',                  cn:'\u91cd\u64ad'},
  rankCorrect: {en:'Perfect ranking!',        cn:'\u6392\u5e8f\u5b8c\u7f8e\uff01'},
  rankPartial: {en:'Almost! Check the order.',cn:'\u5dee\u4e00\u70b9\uff01\u518d\u770b\u770b\u987a\u5e8f\u3002'},
  discovered:  {en:'DISCOVERED!',             cn:'\u53d1\u73b0\u4e86\uff01'},
  kgm3:        {en:'kg/m\u00b3',              cn:'kg/m\u00b3'},
  seconds:     {en:'s',                       cn:'\u79d2'},
};

var lang = 'cn';
function t(key) { return I18N[key] ? (I18N[key][lang] || I18N[key].en || key) : key; }

// --- Audio (soundMuted=true default) ---
var soundMuted = true;
var audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
}
function playTone(freq, dur, vol) {
  if (soundMuted || !audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.1));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + (dur || 0.1));
  } catch(e) {}
}
function playDropSound() { ensureAudioCtx(); playTone(220, 0.15, 0.06); }
function playLandSound() { ensureAudioCtx(); playTone(150, 0.2, 0.1); }
function playCorrectSound() {
  ensureAudioCtx();
  var freqs = [523, 659, 784];
  for (var i = 0; i < freqs.length; i++) {
    (function(j) { setTimeout(function() { playTone(freqs[j], 0.15, 0.07); }, j * 100); })(i);
  }
}
function playWrongSound() { ensureAudioCtx(); playTone(200, 0.3, 0.08); }
function playGalileoSound() {
  ensureAudioCtx();
  var seq = [392, 440, 494, 523, 587, 659, 784];
  for (var i = 0; i < seq.length; i++) {
    (function(j) { setTimeout(function() { playTone(seq[j], 0.2, 0.06); }, j * 100); })(i);
  }
}

// --- Easing ---
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function easeInOutQuad(x) { return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2; }
function easeOutBounce(x) {
  var n1 = 7.5625, d1 = 2.75;
  if (x < 1/d1) return n1*x*x;
  if (x < 2/d1) return n1*(x-=1.5/d1)*x+0.75;
  if (x < 2.5/d1) return n1*(x-=2.25/d1)*x+0.9375;
  return n1*(x-=2.625/d1)*x+0.984375;
}

// --- Physics objects ---
var OBJECTS = {
  paperSheet: { mass: 0.005, dragCoeff: 1.2,  area: 0.06,   color: '#e8e0d0', label: 'paperSheet' },
  paperBall:  { mass: 0.005, dragCoeff: 0.47,  area: 0.002,  color: '#d4cbb8', label: 'paperBall' },
  feather:    { mass: 0.001, dragCoeff: 1.5,   area: 0.01,   color: '#f0e6ff', label: 'feather' },
  coin:       { mass: 0.008, dragCoeff: 0.3,   area: 0.0005, color: '#ffd700', label: 'coin' },
  balloon:    { mass: 0.003, dragCoeff: 0.5,   area: 0.03,   color: '#ff6b6b', label: 'balloon' },
};

var GRAVITY = 9.81;
var FALL_HEIGHT = 5.0; // meters

// Physics simulation: compute fall time with air drag
// F_drag = 0.5 * rho * Cd * A * v^2
// F_net = m*g - F_drag => a = g - (0.5*rho*Cd*A*v^2)/m
function simulateFall(obj, airDensity) {
  var dt = 0.0005;
  var v = 0, y = 0;
  var totalTime = 0;
  var maxIter = 200000;
  for (var i = 0; i < maxIter; i++) {
    var dragForce = 0.5 * airDensity * obj.dragCoeff * obj.area * v * v;
    var accel = GRAVITY - dragForce / obj.mass;
    v += accel * dt;
    if (v < 0) v = 0;
    y += v * dt;
    totalTime += dt;
    if (y >= FALL_HEIGHT) break;
  }
  return totalTime;
}

// --- Canvas refs ---
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 100, H = 100;
var dpr = Math.min(window.devicePixelRatio || 1, 2);

// --- Game state ---
var currentLevel = 0; // 0,1,2
var gamePhase = 'idle'; // idle, predict, dropping, landed, result, complete
var airDensity = 1.2;
var simTime = 0;
var simSpeed = 1.5; // visual speed multiplier
var dropStartTime = 0;
var elapsedSim = 0;

// Per-level object sets
var levelObjects = [
  ['paperSheet', 'paperBall'],
  ['feather', 'coin', 'paperSheet', 'paperBall'],
  ['paperSheet', 'paperBall', 'feather', 'coin', 'balloon'],
];

// Active objects for current level
var activeObjs = [];
var fallTimes = [];
var maxFallTime = 0;
var prediction = -1; // index in activeObjs user predicted as fastest
var rankPrediction = []; // L2 rank order
var dragIdx = -1;
var dragOffsetY = 0;
var levelComplete = [false, false, false];
var galileoDiscovered = false;

// Particles
var particles = [];
function spawnParticles(x, y, col, count) {
  for (var i = 0; i < (count || 12); i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 3;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1.0,
      decay: 0.015 + Math.random() * 0.015,
      size: 2 + Math.random() * 3,
      color: col || '#ffb59c'
    });
  }
}

// Screen shake
var shakeX = 0, shakeY = 0, shakeIntensity = 0;
function triggerShake(intensity) { shakeIntensity = intensity || 4; }

// Background stars (parallax)
var bgStars = [];
for (var si = 0; si < 80; si++) {
  bgStars.push({
    x: Math.random(), y: Math.random(),
    size: 0.5 + Math.random() * 1.5,
    brightness: 0.3 + Math.random() * 0.7,
    speed: 0.1 + Math.random() * 0.4
  });
}

// Transition
var transAlpha = 0;
var transDir = 0; // 1=fading in, -1=fading out
var transCallback = null;

function startTransition(cb) {
  transAlpha = 0;
  transDir = 1;
  transCallback = cb;
}

// Idle float
var idleTime = 0;

// --- Object visual rendering ---
function drawObject(ox, oy, objKey, sz, alpha, landed) {
  ctx.save();
  ctx.globalAlpha = alpha;
  var ob = OBJECTS[objKey];
  var half = sz / 2;

  if (objKey === 'paperSheet') {
    // Flat rectangle - flutters when falling
    var flutter = (gamePhase === 'dropping' && !landed) ? Math.sin(elapsedSim * 12) * 0.3 : 0;
    ctx.translate(ox, oy);
    ctx.rotate(flutter);
    var grad = ctx.createLinearGradient(-half, -half*0.2, half, half*0.2);
    grad.addColorStop(0, '#f0e8d8');
    grad.addColorStop(1, '#d8d0c0');
    ctx.fillStyle = grad;
    ctx.fillRect(-half, -half * 0.15, sz, sz * 0.3);
    // Lines on paper
    ctx.strokeStyle = 'rgba(150,140,120,0.4)';
    ctx.lineWidth = 0.5;
    for (var li = 0; li < 3; li++) {
      var ly = -half * 0.1 + li * sz * 0.08;
      ctx.beginPath();
      ctx.moveTo(-half * 0.7, ly);
      ctx.lineTo(half * 0.7, ly);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  if (objKey === 'paperBall') {
    // Crumpled ball
    ctx.translate(ox, oy);
    var breathe = 1.0 + Math.sin(idleTime * 2) * 0.015;
    if (gamePhase !== 'dropping') ctx.scale(breathe, breathe);
    var rr = half * 0.6;
    var grad2 = ctx.createRadialGradient(-rr*0.3, -rr*0.3, 0, 0, 0, rr);
    grad2.addColorStop(0, '#ede5d5');
    grad2.addColorStop(0.7, '#ccc4b4');
    grad2.addColorStop(1, '#b0a898');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.arc(0, 0, rr, 0, Math.PI * 2);
    ctx.fill();
    // Crumple lines
    ctx.strokeStyle = 'rgba(120,110,95,0.5)';
    ctx.lineWidth = 0.7;
    for (var ci = 0; ci < 4; ci++) {
      var ca = ci * 1.3 + 0.5;
      ctx.beginPath();
      ctx.arc(Math.cos(ca) * rr * 0.3, Math.sin(ca) * rr * 0.3, rr * 0.3, ca, ca + 1.2);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  if (objKey === 'feather') {
    // Feather shape
    var drift = (gamePhase === 'dropping' && !landed) ? Math.sin(elapsedSim * 8) * 0.4 : Math.sin(idleTime * 1.5) * 0.1;
    ctx.translate(ox, oy);
    ctx.rotate(drift);
    var fh = sz * 0.8;
    var fw = sz * 0.3;
    var fgrad = ctx.createLinearGradient(0, -fh/2, 0, fh/2);
    fgrad.addColorStop(0, '#e8d8ff');
    fgrad.addColorStop(0.5, '#d0c0f0');
    fgrad.addColorStop(1, '#f0e8ff');
    ctx.fillStyle = fgrad;
    ctx.beginPath();
    ctx.moveTo(0, -fh/2);
    ctx.quadraticCurveTo(fw, -fh*0.1, fw*0.6, fh/2);
    ctx.lineTo(0, fh * 0.35);
    ctx.lineTo(-fw*0.6, fh/2);
    ctx.quadraticCurveTo(-fw, -fh*0.1, 0, -fh/2);
    ctx.fill();
    // Quill
    ctx.strokeStyle = 'rgba(180,160,200,0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -fh/2);
    ctx.lineTo(0, fh * 0.35);
    ctx.stroke();
    // Barbs
    ctx.strokeStyle = 'rgba(200,180,220,0.3)';
    ctx.lineWidth = 0.5;
    for (var bi = 0; bi < 5; bi++) {
      var by = -fh*0.3 + bi * fh * 0.15;
      ctx.beginPath();
      ctx.moveTo(0, by);
      ctx.lineTo(fw * 0.5, by + fh*0.05);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, by);
      ctx.lineTo(-fw * 0.5, by + fh*0.05);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  if (objKey === 'coin') {
    ctx.translate(ox, oy);
    var bCoin = 1.0 + Math.sin(idleTime * 2.5) * 0.01;
    if (gamePhase !== 'dropping') ctx.scale(bCoin, bCoin);
    var cr = half * 0.5;
    var cg = ctx.createRadialGradient(-cr*0.3, -cr*0.3, 0, 0, 0, cr);
    cg.addColorStop(0, '#fff4b0');
    cg.addColorStop(0.6, '#ffd700');
    cg.addColorStop(1, '#cc9900');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(0, 0, cr, 0, Math.PI * 2);
    ctx.fill();
    // Edge highlight
    ctx.strokeStyle = 'rgba(255,255,200,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, cr, -0.8, 0.8);
    ctx.stroke();
    // Inner ring
    ctx.strokeStyle = 'rgba(180,140,0,0.4)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(0, 0, cr * 0.65, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    return;
  }

  if (objKey === 'balloon') {
    var bFloat = (gamePhase !== 'dropping') ? Math.sin(idleTime * 1.2) * 0.08 : 0;
    ctx.translate(ox, oy);
    ctx.rotate(bFloat);
    var br = half * 0.55;
    var bg = ctx.createRadialGradient(-br*0.3, -br*0.4, 0, 0, 0, br);
    bg.addColorStop(0, '#ff9999');
    bg.addColorStop(0.5, '#ff5555');
    bg.addColorStop(1, '#cc2222');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, -br*0.15, br, br*1.15, 0, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(-br*0.3, -br*0.5, br*0.2, br*0.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // Tie + string
    ctx.strokeStyle = '#cc2222';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, br);
    ctx.lineTo(0, br + sz * 0.2);
    ctx.stroke();
    // Tie triangle
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.moveTo(-3, br);
    ctx.lineTo(3, br);
    ctx.lineTo(0, br + 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return;
  }

  // Fallback circle
  ctx.fillStyle = ob.color;
  ctx.beginPath();
  ctx.arc(ox, oy, half * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// --- Level setup ---
function setupLevel(lvl) {
  currentLevel = lvl;
  gamePhase = (lvl === 0) ? 'predict' : (lvl === 1 ? 'rank' : 'idle');
  prediction = -1;
  rankPrediction = [];
  elapsedSim = 0;
  simTime = 0;

  var keys = levelObjects[lvl];
  activeObjs = [];
  var spacing = W / (keys.length + 1);
  for (var i = 0; i < keys.length; i++) {
    var fallTime = simulateFall(OBJECTS[keys[i]], airDensity);
    activeObjs.push({
      key: keys[i],
      x: spacing * (i + 1),
      startY: H * 0.12,
      y: H * 0.12,
      groundY: H * 0.82,
      fallTime: fallTime,
      landed: false,
      landTime: 0,
      size: Math.min(W, H) * 0.08,
      alpha: 1.0,
      selected: false,
      rankPos: -1,
    });
  }

  fallTimes = activeObjs.map(function(o) { return o.fallTime; });
  maxFallTime = Math.max.apply(null, fallTimes);

  // L3 show slider
  var sw = document.getElementById('sliderWrap');
  if (lvl === 2) {
    sw.style.display = 'flex';
  } else {
    sw.style.display = 'none';
  }

  updateUI();
}

// --- Recalc physics on air density change ---
function recalcFallTimes() {
  for (var i = 0; i < activeObjs.length; i++) {
    activeObjs[i].fallTime = simulateFall(OBJECTS[activeObjs[i].key], airDensity);
  }
  fallTimes = activeObjs.map(function(o) { return o.fallTime; });
  maxFallTime = Math.max.apply(null, fallTimes);
}

// --- UI update ---
function updateUI() {
  document.getElementById('gameTitle').textContent = t('title');
  var levelTitles = ['l1Title', 'l2Title', 'l3Title'];
  var levelDescs = ['l1Desc', 'l2Desc', 'l3Desc'];
  document.getElementById('roundInfo').textContent = t(levelTitles[currentLevel]);

  document.getElementById('hudL1').textContent = t('hudLevel');
  document.getElementById('hudV1').textContent = 'L' + (currentLevel + 1);
  document.getElementById('hudL2').textContent = t('hudAir');
  document.getElementById('hudV2').textContent = airDensity.toFixed(2) + ' ' + t('kgm3');
  document.getElementById('hudL3').textContent = t('hudTime');
  document.getElementById('hudV3').textContent = elapsedSim > 0 ? elapsedSim.toFixed(2) + t('seconds') : '--';
  document.getElementById('hudL4').textContent = t('hudResult');
  document.getElementById('hudV4').textContent = '--';

  var dropBtn = document.getElementById('btnDrop');
  var resetBtn = document.getElementById('btnReset');
  resetBtn.textContent = t('resetBtn');

  if (gamePhase === 'predict') {
    dropBtn.textContent = t('tapPredict');
    dropBtn.disabled = true;
  } else if (gamePhase === 'rank') {
    dropBtn.textContent = t('rankCheck');
    dropBtn.disabled = rankPrediction.length < activeObjs.length;
  } else if (gamePhase === 'idle') {
    dropBtn.textContent = t('dropBtn');
    dropBtn.disabled = false;
  } else if (gamePhase === 'dropping') {
    dropBtn.textContent = t('watching');
    dropBtn.disabled = true;
  } else if (gamePhase === 'landed' || gamePhase === 'result') {
    if (currentLevel < 2 && !levelComplete[currentLevel]) {
      dropBtn.textContent = t('dropBtn');
      dropBtn.disabled = true;
    } else if (currentLevel < 2) {
      dropBtn.textContent = t('nextBtn');
      dropBtn.disabled = false;
    } else {
      dropBtn.textContent = t('replay');
      dropBtn.disabled = false;
    }
  } else if (gamePhase === 'complete') {
    dropBtn.textContent = t('complete');
    dropBtn.disabled = true;
  }

  document.getElementById('sliderLabel').textContent = t('airDensity');

  // Level chips
  for (var ci = 0; ci < 3; ci++) {
    var chip = document.getElementById('chip' + (ci + 1));
    chip.className = 'level-chip' + (ci === currentLevel ? ' active' : '') + (levelComplete[ci] ? ' done' : '');
  }
}

// --- Resize ---
function resizeCanvas() {
  var parent = canvas.parentElement;
  var rect = parent.getBoundingClientRect();
  var availW = rect.width;
  var availH = rect.height;
  W = Math.max(availW, 80);
  H = Math.max(availH, 80);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Reposition objects
  if (activeObjs.length > 0) {
    var spacing = W / (activeObjs.length + 1);
    for (var i = 0; i < activeObjs.length; i++) {
      activeObjs[i].x = spacing * (i + 1);
      activeObjs[i].startY = H * 0.12;
      activeObjs[i].groundY = H * 0.82;
      activeObjs[i].size = Math.min(W, H) * 0.08;
      if (gamePhase === 'idle' || gamePhase === 'predict' || gamePhase === 'rank') {
        activeObjs[i].y = activeObjs[i].startY;
      }
    }
  }
}

window.addEventListener('resize', resizeCanvas);

// --- Drawing ---
function drawBg() {
  // Deep space gradient
  var bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#08090d');
  bgGrad.addColorStop(0.5, '#0e1018');
  bgGrad.addColorStop(1, '#141822');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Parallax stars
  for (var i = 0; i < bgStars.length; i++) {
    var star = bgStars[i];
    var sx = star.x * W;
    var sy = (star.y + idleTime * star.speed * 0.002) % 1.0 * H;
    var pulse = 0.6 + Math.sin(idleTime * 2 + i * 1.7) * 0.4;
    ctx.fillStyle = 'rgba(255,220,200,' + (star.brightness * pulse * 0.3) + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle radial glow (atmosphere)
  var atmoGrad = ctx.createRadialGradient(W * 0.5, H, 0, W * 0.5, H, H * 0.6);
  atmoGrad.addColorStop(0, 'rgba(255,181,156,0.04)');
  atmoGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = atmoGrad;
  ctx.fillRect(0, 0, W, H);
}

function drawGround() {
  var gy = H * 0.85;
  // Ground gradient
  var gGrad = ctx.createLinearGradient(0, gy, 0, H);
  gGrad.addColorStop(0, 'rgba(255,181,156,0.08)');
  gGrad.addColorStop(0.3, 'rgba(120,80,60,0.15)');
  gGrad.addColorStop(1, 'rgba(60,40,30,0.2)');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, gy, W, H - gy);

  // Ground line
  ctx.strokeStyle = 'rgba(255,181,156,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(W, gy);
  ctx.stroke();

  // Ground glow
  ctx.shadowColor = 'rgba(255,181,156,0.15)';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(255,181,156,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(W, gy);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawDropLine() {
  var dy = H * 0.12;
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = 'rgba(255,181,156,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, dy);
  ctx.lineTo(W, dy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Label
  ctx.fillStyle = 'rgba(255,181,156,0.3)';
  ctx.font = '9px "Space Grotesk", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(t('dragHint'), W - 10, dy - 4);
}

function drawHeightScale() {
  // Vertical scale on left side
  var topY = H * 0.12;
  var botY = H * 0.85;
  ctx.strokeStyle = 'rgba(170,171,176,0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(20, topY);
  ctx.lineTo(20, botY);
  ctx.stroke();

  // Tick marks
  var numTicks = 5;
  ctx.font = '8px "Space Grotesk", sans-serif';
  ctx.fillStyle = 'rgba(170,171,176,0.3)';
  ctx.textAlign = 'right';
  for (var ti = 0; ti <= numTicks; ti++) {
    var ty = topY + (botY - topY) * ti / numTicks;
    ctx.beginPath();
    ctx.moveTo(16, ty);
    ctx.lineTo(24, ty);
    ctx.stroke();
    var meters = (FALL_HEIGHT * ti / numTicks).toFixed(1);
    ctx.fillText(meters + 'm', 14, ty + 3);
  }
}

function drawObjectLabels() {
  ctx.font = '10px "Noto Sans SC", "Inter", sans-serif';
  ctx.textAlign = 'center';
  for (var i = 0; i < activeObjs.length; i++) {
    var ao = activeObjs[i];
    var labelY = (gamePhase === 'dropping' || gamePhase === 'landed' || gamePhase === 'result') ? ao.y + ao.size * 0.7 : ao.y + ao.size * 0.6;
    ctx.fillStyle = ao.selected ? 'rgba(255,181,156,0.9)' : 'rgba(170,171,176,0.6)';
    ctx.fillText(t(ao.key), ao.x, labelY);

    // In landed state show fall time
    if ((gamePhase === 'landed' || gamePhase === 'result') && ao.landed) {
      ctx.fillStyle = 'rgba(80,255,176,0.8)';
      ctx.font = '9px "Space Grotesk", sans-serif';
      ctx.fillText(ao.fallTime.toFixed(2) + t('seconds'), ao.x, labelY + 13);
      ctx.font = '10px "Noto Sans SC", "Inter", sans-serif';
    }
  }
}

// L1 prediction indicator
function drawPredictionUI() {
  if (currentLevel !== 0 || gamePhase !== 'predict') return;
  ctx.font = '11px "Noto Sans SC", "Inter", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,181,156,0.6)';
  ctx.fillText(t('predictPrompt'), W * 0.5, H * 0.5);

  // Highlight clickable objects
  for (var i = 0; i < activeObjs.length; i++) {
    var ao = activeObjs[i];
    if (prediction === i) {
      ctx.strokeStyle = '#ffb59c';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(255,181,156,0.5)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(ao.x, ao.y, ao.size * 0.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }
}

// L2 ranking UI
function drawRankUI() {
  if (currentLevel !== 1 || gamePhase !== 'rank') return;
  ctx.font = '11px "Noto Sans SC", "Inter", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,181,156,0.5)';
  ctx.fillText(t('rankPrompt'), W * 0.5, H * 0.55);

  // Show rank numbers on ranked objects
  for (var i = 0; i < rankPrediction.length; i++) {
    var ao = activeObjs[rankPrediction[i]];
    ctx.fillStyle = 'rgba(255,181,156,0.8)';
    ctx.font = 'bold 14px "Space Grotesk", sans-serif';
    ctx.fillText('#' + (i + 1), ao.x, ao.y - ao.size * 0.5);
    ctx.font = '11px "Noto Sans SC", "Inter", sans-serif';
  }
}

// L3 vacuum indicator
function drawVacuumUI() {
  if (currentLevel !== 2) return;
  if (airDensity < 0.05) {
    // Pulsing vacuum label
    var vPulse = 0.6 + Math.sin(idleTime * 3) * 0.4;
    ctx.fillStyle = 'rgba(80,255,176,' + (vPulse * 0.7) + ')';
    ctx.font = 'bold 13px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('VACUUM', W * 0.5, H * 0.04 + 12);

    // Glow ring
    ctx.strokeStyle = 'rgba(80,255,176,' + (vPulse * 0.2) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(W * 0.5, H * 0.04 + 8, 40, 0, Math.PI * 2);

  }

// Result overlay
function drawResultOverlay() {
  if (gamePhase !== 'result' && gamePhase !== 'complete') return;

  // Semi-transparent overlay
  ctx.fillStyle = 'rgba(8,9,13,0.75)';
  ctx.fillRect(W * 0.15, H * 0.2, W * 0.7, H * 0.55);

  // Border
  ctx.strokeStyle = 'rgba(255,181,156,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(W * 0.15, H * 0.2, W * 0.7, H * 0.55);

  // Glow
  ctx.shadowColor = 'rgba(255,181,156,0.15)';
  ctx.shadowBlur = 20;
  ctx.strokeRect(W * 0.15, H * 0.2, W * 0.7, H * 0.55);
  ctx.shadowBlur = 0;

  ctx.textAlign = 'center';

  if (gamePhase === 'complete') {
    ctx.fillStyle = '#50ffb0';
    ctx.font = 'bold 18px "Space Grotesk", sans-serif';
    ctx.fillText(t('complete'), W * 0.5, H * 0.34);

    ctx.fillStyle = '#aaabb0';
    ctx.font = '12px "Noto Sans SC", "Inter", sans-serif';
    var summaryLines = wrapText(t('summaryMsg'), W * 0.55);
    for (var sl = 0; sl < summaryLines.length; sl++) {
      ctx.fillText(summaryLines[sl], W * 0.5, H * 0.42 + sl * 18);
    }
    return;
  }

  // Level result
  if (currentLevel === 0) {
    var isCorrect = prediction === fastestIndex();
    ctx.fillStyle = isCorrect ? '#50ffb0' : '#ffb59c';
    ctx.font = 'bold 16px "Space Grotesk", sans-serif';
    ctx.fillText(isCorrect ? t('correct') : t('incorrect'), W * 0.5, H * 0.32);

    ctx.fillStyle = '#aaabb0';
    ctx.font = '12px "Noto Sans SC", "Inter", sans-serif';
    var lines = wrapText(t('whyFaster'), W * 0.55);
    for (var wl = 0; wl < lines.length; wl++) {
      ctx.fillText(lines[wl], W * 0.5, H * 0.40 + wl * 18);
    }

    // Show fall times
    ctx.font = '11px "Space Grotesk", sans-serif';
    for (var fi = 0; fi < activeObjs.length; fi++) {
      ctx.fillStyle = fi === fastestIndex() ? '#50ffb0' : '#ffb59c';
      ctx.fillText(t(activeObjs[fi].key) + ': ' + activeObjs[fi].fallTime.toFixed(3) + t('seconds'),
        W * 0.5, H * 0.52 + fi * 18);
    }
  } else if (currentLevel === 1) {
    var correctOrder = getRankOrder();
    var match = true;
    for (var ri = 0; ri < rankPrediction.length; ri++) {
      if (rankPrediction[ri] !== correctOrder[ri]) { match = false; break; }
    }
    ctx.fillStyle = match ? '#50ffb0' : '#ffb59c';
    ctx.font = 'bold 16px "Space Grotesk", sans-serif';
    ctx.fillText(match ? t('rankCorrect') : t('rankPartial'), W * 0.5, H * 0.32);

    // Show correct order
    ctx.font = '11px "Space Grotesk", sans-serif';
    ctx.fillStyle = '#aaabb0';
    ctx.fillText(lang === 'cn' ? '\u6b63\u786e\u987a\u5e8f:' : 'Correct order:', W * 0.5, H * 0.42);
    for (var co = 0; co < correctOrder.length; co++) {
      var isRight = rankPrediction[co] === correctOrder[co];
      ctx.fillStyle = isRight ? '#50ffb0' : '#ffb59c';
      ctx.fillText('#' + (co+1) + ' ' + t(activeObjs[correctOrder[co]].key) + ' (' + activeObjs[correctOrder[co]].fallTime.toFixed(3) + t('seconds') + ')',
        W * 0.5, H * 0.48 + co * 16);
    }
  } else if (currentLevel === 2) {
    if (galileoDiscovered) {
      ctx.fillStyle = '#50ffb0';
      ctx.font = 'bold 16px "Space Grotesk", sans-serif';
      ctx.fillText(t('discovered'), W * 0.5, H * 0.30);
      ctx.font = '12px "Noto Sans SC", "Inter", sans-serif';
      ctx.fillStyle = '#aaabb0';
      var gLines = wrapText(t('galileoMsg'), W * 0.55);
      for (var gl = 0; gl < gLines.length; gl++) {
        ctx.fillText(gLines[gl], W * 0.5, H * 0.40 + gl * 18);
      }
    } else {
      ctx.fillStyle = '#ffb59c';
      ctx.font = '12px "Noto Sans SC", "Inter", sans-serif';
      var vLines = wrapText(t('vacuumHint'), W * 0.5);
      for (var vl = 0; vl < vLines.length; vl++) {
        ctx.fillText(vLines[vl], W * 0.5, H * 0.4 + vl * 18);
      }
    }
  }
}

function wrapText(text, maxWidth) {
  var words = text.split('');
  var lines = [];
  var currentLine = '';
  for (var i = 0; i < words.length; i++) {
    var testLine = currentLine + words[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = words[i];
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine.length > 0) lines.push(currentLine);
  return lines;
}

function fastestIndex() {
  var minTime = Infinity;
  var idx = 0;
  for (var i = 0; i < activeObjs.length; i++) {
    if (activeObjs[i].fallTime < minTime) {
      minTime = activeObjs[i].fallTime;
      idx = i;
    }
  }
  return idx;
}

function getRankOrder() {
  // Returns indices sorted by fallTime ascending (fastest first)
  var indices = [];
  for (var i = 0; i < activeObjs.length; i++) indices.push(i);
  indices.sort(function(a, b) { return activeObjs[a].fallTime - activeObjs[b].fallTime; });
  return indices;
}

// --- Particles drawing ---
function drawParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1.0;
  }
}

// --- Drop simulation (visual) ---
function updateDrop(dt) {
  if (gamePhase !== 'dropping') return;

  elapsedSim += dt * simSpeed;
  var allLanded = true;

  for (var i = 0; i < activeObjs.length; i++) {
    var ao = activeObjs[i];
    if (ao.landed) continue;

    var progress = elapsedSim / ao.fallTime;
    if (progress >= 1.0) {
      progress = 1.0;
      ao.landed = true;
      ao.landTime = elapsedSim;
      ao.y = ao.groundY;
      spawnParticles(ao.x, ao.groundY, OBJECTS[ao.key].color, 15);
      triggerShake(3);
      playLandSound();
    } else {
      // Eased fall position
      var eased = easeInOutQuad(progress);
      ao.y = ao.startY + (ao.groundY - ao.startY) * eased;
      allLanded = false;
    }
  }

  if (allLanded) {
    gamePhase = 'landed';
    // Auto-show result after brief pause
    setTimeout(function() {
      if (gamePhase === 'landed') {
        showResult();
      }
    }, 600);
  }

  updateUI();
}

function showResult() {
  gamePhase = 'result';
  levelComplete[currentLevel] = true;

  // L3 check galileo
  if (currentLevel === 2 && airDensity < 0.05) {
    galileoDiscovered = true;
    playGalileoSound();
  } else if (currentLevel === 0) {
    if (prediction === fastestIndex()) {
      playCorrectSound();
    } else {
      playWrongSound();
    }
  } else if (currentLevel === 1) {
    var correctOrder = getRankOrder();
    var match = true;
    for (var ri = 0; ri < rankPrediction.length; ri++) {
      if (rankPrediction[ri] !== correctOrder[ri]) { match = false; break; }
    }
    if (match) playCorrectSound(); else playWrongSound();
  }

  // Juice HUD
  var hv4 = document.getElementById('hudV4');
  if (currentLevel === 0) {
    hv4.textContent = prediction === fastestIndex() ? t('correct') : t('incorrect');
  } else if (currentLevel === 1) {
    hv4.textContent = t('rankCorrect');
  } else {
    hv4.textContent = galileoDiscovered ? t('discovered') : t('vacuumHint');
  }
  hv4.classList.remove('juice');
  void hv4.offsetWidth;
  hv4.classList.add('juice');

  updateUI();
}

// --- Drop action ---
function startDrop() {
  if (gamePhase === 'result') {
    // Next level or replay
    if (currentLevel < 2) {
      startTransition(function() {
        setupLevel(currentLevel + 1);
      });
    } else {
      // L3 replay
      startTransition(function() {
        setupLevel(2);
      });
    }
    return;
  }

  if (currentLevel === 1 && gamePhase === 'rank') {
    if (rankPrediction.length < activeObjs.length) return;
    // Verify rank then drop
    gamePhase = 'dropping';
    elapsedSim = 0;
    recalcFallTimes();
    playDropSound();
    updateUI();
    return;
  }

  if (gamePhase !== 'idle' && gamePhase !== 'predict') return;
  if (currentLevel === 0 && prediction < 0) return;

  gamePhase = 'dropping';
  elapsedSim = 0;
  recalcFallTimes();
  playDropSound();
  updateUI();
}

// --- Input handling ---
var mouseX = 0, mouseY = 0;
var isDragging = false;
var dragObjIdx = -1;

function getCanvasPos(ev) {
  var rect = canvas.getBoundingClientRect();
  var x, y;
  if (ev.touches) {
    x = ev.touches[0].clientX - rect.left;
    y = ev.touches[0].clientY - rect.top;
  } else {
    x = ev.clientX - rect.left;
    y = ev.clientY - rect.top;
  }
  return { x: x, y: y };
}

function hitTestObj(mx, my) {
  for (var i = activeObjs.length - 1; i >= 0; i--) {
    var ao = activeObjs[i];
    var dx = mx - ao.x;
    var dy = my - ao.y;
    if (Math.abs(dx) < ao.size * 0.6 && Math.abs(dy) < ao.size * 0.6) {
      return i;
    }
  }
  return -1;
}

canvas.addEventListener('mousedown', function(ev) {
  ev.preventDefault();
  var pos = getCanvasPos(ev);
  handlePointerDown(pos.x, pos.y);
});
canvas.addEventListener('touchstart', function(ev) {
  ev.preventDefault();
  var pos = getCanvasPos(ev);
  handlePointerDown(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('mousemove', function(ev) {
  var pos = getCanvasPos(ev);
  handlePointerMove(pos.x, pos.y);
});
canvas.addEventListener('touchmove', function(ev) {
  ev.preventDefault();
  var pos = getCanvasPos(ev);
  handlePointerMove(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('mouseup', function(ev) { handlePointerUp(); });
canvas.addEventListener('touchend', function(ev) { handlePointerUp(); });

function handlePointerDown(mx, my) {
  mouseX = mx;
  mouseY = my;

  if (gamePhase === 'predict' && currentLevel === 0) {
    var idx = hitTestObj(mx, my);
    if (idx >= 0) {
      prediction = idx;
      for (var i = 0; i < activeObjs.length; i++) activeObjs[i].selected = (i === idx);
      document.getElementById('btnDrop').disabled = false;
      document.getElementById('btnDrop').textContent = t('dropBtn');
      gamePhase = 'idle';
      updateUI();
    }
    return;
  }

  if (gamePhase === 'rank' && currentLevel === 1) {
    var ridx = hitTestObj(mx, my);
    if (ridx >= 0) {
      // Toggle rank: remove if already in list, else append
      var rpos = rankPrediction.indexOf(ridx);
      if (rpos >= 0) {
        rankPrediction.splice(rpos, 1);
      } else {
        rankPrediction.push(ridx);
      }
      document.getElementById('btnDrop').disabled = rankPrediction.length < activeObjs.length;
      updateUI();
    }
    return;
  }
}

function handlePointerMove(mx, my) {
  mouseX = mx;
  mouseY = my;
}

function handlePointerUp() {
  isDragging = false;
  dragObjIdx = -1;
}

// --- Button handlers ---
document.getElementById('btnDrop').addEventListener('click', function() {
  startDrop();
});

document.getElementById('btnReset').addEventListener('click', function() {
  startTransition(function() {
    setupLevel(currentLevel);
  });
});

// Level chip clicks
document.getElementById('chip1').addEventListener('click', function() {
  if (currentLevel !== 0) startTransition(function() { setupLevel(0); });
});
document.getElementById('chip2').addEventListener('click', function() {
  if (currentLevel !== 1) startTransition(function() { setupLevel(1); });
});
document.getElementById('chip3').addEventListener('click', function() {
  if (currentLevel !== 2) startTransition(function() { setupLevel(2); });
});

// Air density slider
document.getElementById('airSlider').addEventListener('input', function() {
  var val = parseInt(this.value, 10);
  airDensity = val / 100;
  document.getElementById('sliderVal').textContent = airDensity.toFixed(2);

  var hv2 = document.getElementById('hudV2');
  hv2.textContent = airDensity.toFixed(2) + ' ' + t('kgm3');
  hv2.classList.remove('juice');
  void hv2.offsetWidth;
  hv2.classList.add('juice');

  if (gamePhase === 'idle' || gamePhase === 'result' || gamePhase === 'landed') {
    recalcFallTimes();
    // Reset to idle for re-drop
    if (gamePhase === 'result' || gamePhase === 'landed') {
      for (var i = 0; i < activeObjs.length; i++) {
        activeObjs[i].y = activeObjs[i].startY;
        activeObjs[i].landed = false;
      }
      gamePhase = 'idle';
      elapsedSim = 0;
      updateUI();
    }
  }
});

// --- Air density indicator visuals ---
function drawAirDensityVisual() {
  if (currentLevel !== 2) return;

  // Draw "air particles" based on density
  var numDots = Math.floor(airDensity * 60);
  ctx.fillStyle = 'rgba(180,200,220,0.08)';
  for (var i = 0; i < numDots; i++) {
    var ax = ((i * 137.5 + idleTime * 15) % W);
    var ay = ((i * 97.3 + idleTime * 8 + i * 23.7) % (H * 0.72)) + H * 0.13;
    ctx.beginPath();
    ctx.arc(ax, ay, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Vacuum chamber walls (visual)
  if (airDensity < 1.0) {
    var wallAlpha = (1.0 - airDensity) * 0.2;
    ctx.strokeStyle = 'rgba(80,255,176,' + wallAlpha + ')';
    ctx.lineWidth = 2;
    // Left wall
    ctx.beginPath();
    ctx.moveTo(W * 0.08, H * 0.08);
    ctx.lineTo(W * 0.08, H * 0.88);
    ctx.stroke();
    // Right wall
    ctx.beginPath();
    ctx.moveTo(W * 0.92, H * 0.08);
    ctx.lineTo(W * 0.92, H * 0.88);
    ctx.stroke();
    // Top
    ctx.beginPath();
    ctx.moveTo(W * 0.08, H * 0.08);
    ctx.lineTo(W * 0.92, H * 0.08);
    ctx.stroke();
  }
}

// --- Trailing ghost (for falling objects) ---
function drawTrails() {
  if (gamePhase !== 'dropping') return;
  for (var i = 0; i < activeObjs.length; i++) {
    var ao = activeObjs[i];
    if (ao.landed) continue;
    // Ghost trail
    var trailCount = 3;
    for (var ti = 1; ti <= trailCount; ti++) {
      var trailY = ao.y - ti * ao.size * 0.3;
      if (trailY < ao.startY) continue;
      var trailAlpha = (1 - ti / (trailCount + 1)) * 0.15;
      drawObject(ao.x, trailY, ao.key, ao.size * (1 - ti * 0.05), trailAlpha, false);
    }
  }
}

// --- Main render loop ---
var lastTime = 0;
function mainLoop(timestamp) {
  var dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
  lastTime = timestamp;
  idleTime += dt;

  // Shake decay
  if (shakeIntensity > 0) {
    shakeX = (Math.random() - 0.5) * shakeIntensity;
    shakeY = (Math.random() - 0.5) * shakeIntensity;
    shakeIntensity *= 0.85;
    if (shakeIntensity < 0.3) { shakeIntensity = 0; shakeX = 0; shakeY = 0; }
  }

  // Transition
  if (transDir !== 0) {
    transAlpha += transDir * dt * 3;
    if (transDir === 1 && transAlpha >= 1.0) {
      transAlpha = 1.0;
      transDir = -1;
      if (transCallback) { transCallback(); transCallback = null; }
    }
    if (transDir === -1 && transAlpha <= 0) {
      transAlpha = 0;
      transDir = 0;
    }
  }

  // Physics update
  updateDrop(dt);

  // --- Draw ---
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBg();
  drawAirDensityVisual();
  drawGround();
  drawDropLine();
  drawHeightScale();
  drawTrails();

  // Draw objects
  for (var i = 0; i < activeObjs.length; i++) {
    var ao = activeObjs[i];
    var idleBob = 0;
    if (gamePhase !== 'dropping' && !ao.landed) {
      idleBob = Math.sin(idleTime * 1.5 + i * 1.2) * 2;
    }
    // Landing bounce effect
    var bounceOff = 0;
    if (ao.landed && ao.landTime > 0) {
      var sinceLand = elapsedSim - ao.landTime;
      if (sinceLand < 0.4) {
        bounceOff = -ao.size * 0.15 * easeOutBounce(sinceLand / 0.4) * (1 - sinceLand / 0.4);
      }
    }
    drawObject(ao.x, ao.y + idleBob + bounceOff, ao.key, ao.size, ao.alpha, ao.landed);

    // Glow for selected (L1 prediction)
    if (ao.selected && (gamePhase === 'idle' || gamePhase === 'predict')) {
      ctx.strokeStyle = 'rgba(255,181,156,0.4)';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(255,181,156,0.3)';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(ao.x, ao.y + idleBob, ao.size * 0.55, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  drawObjectLabels();
  drawPredictionUI();
  drawRankUI();
  drawVacuumUI();
  drawParticles();
  drawResultOverlay();

  ctx.restore();

  // Transition overlay
  if (transAlpha > 0) {
    ctx.fillStyle = 'rgba(8,9,13,' + transAlpha + ')';
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(mainLoop);
}

// --- Init ---
function init() {
  resizeCanvas();
  setupLevel(0);
  refreshI18N();
  // Delayed font ready
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() {
      setTimeout(function() { resizeCanvas(); }, 100);
    });
  }
  setTimeout(function() { resizeCanvas(); }, 300);
  requestAnimationFrame(mainLoop);
}

init();
</script>
</body>
</html>
