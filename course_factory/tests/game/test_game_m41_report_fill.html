<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M41 — 你是论文作者: 5 段报告填空</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Industrial Atelier — warm cream + Claude coral */
    --paper:    #FAF9F5;
    --paper-2:  #F1EDDF;
    --card:     #FFFFFF;
    --ink:      #191814;
    --ink-2:    #2B2924;
    --sub:      #6B6557;
    --sub-2:    #9D978A;
    --border:   #EBE5D6;
    --border-2: #D9D1BD;
    --hairline: #F2EDE0;
    --primary:      #D97757;
    --primary-ink:  #9A4A2E;
    --primary-soft: #F8EDE5;
    --primary-line: #ECCFB8;
    --climate:      #527B95;
    --climate-soft: #DEE5EC;
    --danger:       #B5482D;
    --danger-soft:  #F4E0D6;
    --shadow-sm: 0 1px 2px 0 rgba(25,24,20,.04);
    --shadow:    0 1px 3px 0 rgba(25,24,20,.06), 0 1px 2px -1px rgba(25,24,20,.04);
    --shadow-md: 0 4px 8px -2px rgba(25,24,20,.06), 0 2px 4px -2px rgba(25,24,20,.04);
    --shadow-lg: 0 12px 24px -6px rgba(25,24,20,.1), 0 4px 8px -4px rgba(25,24,20,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100vh;overflow:hidden;background:var(--paper);color:var(--ink);font-family:'Noto Sans SC','Inter',-apple-system,sans-serif;font-size:13px;line-height:1.5;}
  .root{display:flex;height:100vh;width:100vw;overflow:hidden;}

  /* Sidebar — 200px */
  .sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--paper-2);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    padding:18px 14px;gap:14px;overflow-y:auto;
  }
  .brand{
    font-family:'Inter','Noto Sans SC',sans-serif;
    font-weight:800;font-size:14px;color:var(--ink);
    letter-spacing:.02em;line-height:1.3;
  }
  .brand-sub{
    font-size:10.5px;color:var(--sub);font-weight:500;
    margin-top:3px;letter-spacing:.02em;
  }
  .progress-title{
    font-size:10px;font-weight:700;color:var(--sub);
    letter-spacing:.12em;text-transform:uppercase;
    margin-top:4px;margin-bottom:2px;
  }
  .sec-item{
    background:var(--card);border:1px solid var(--border);
    border-radius:6px;padding:8px 10px;
    display:flex;align-items:center;gap:8px;
    cursor:pointer;transition:all .2s;
    box-shadow:var(--shadow-sm);
  }
  .sec-item:hover{border-color:var(--border-2);}
  .sec-item.active{
    border-color:var(--primary);background:var(--primary-soft);
    box-shadow:var(--shadow);
  }
  .sec-item.done{border-color:var(--climate);background:var(--climate-soft);}
  .sec-dot{
    width:18px;height:18px;border-radius:50%;
    border:1.5px solid var(--border-2);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
    color:var(--sub);
  }
  .sec-item.active .sec-dot{border-color:var(--primary);color:var(--primary);}
  .sec-item.done .sec-dot{background:var(--climate);border-color:var(--climate);color:#fff;}
  .sec-label{
    font-size:11.5px;color:var(--ink-2);font-weight:600;line-height:1.3;
  }
  .sec-item.done .sec-label{color:var(--ink);}

  .lang-btn{
    margin-top:auto;
    background:var(--card);border:1px solid var(--border);
    color:var(--ink);font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:600;padding:7px 12px;
    border-radius:6px;cursor:pointer;letter-spacing:.05em;
    transition:all .15s;box-shadow:var(--shadow-sm);
  }
  .lang-btn:hover{border-color:var(--primary);color:var(--primary);}

  /* Main area */
  .main{
    flex:1;height:100vh;overflow:hidden;
    display:flex;flex-direction:column;
    padding:22px 28px 18px 28px;gap:14px;
    background:var(--paper);
  }
  .stage-head{
    display:flex;align-items:flex-start;justify-content:space-between;gap:18px;
  }
  .stage-title-wrap{flex:1;min-width:0;}
  .stage-eyebrow{
    font-size:10.5px;font-weight:700;color:var(--primary-ink);
    letter-spacing:.16em;text-transform:uppercase;
  }
  .stage-title{
    font-family:'Inter','Noto Sans SC',sans-serif;
    font-size:22px;font-weight:800;color:var(--ink);
    line-height:1.25;margin-top:4px;
  }
  .stage-desc{
    font-size:12.5px;color:var(--sub);line-height:1.55;
    margin-top:6px;max-width:680px;
  }
  .badge-slot{
    flex-shrink:0;display:flex;align-items:center;gap:8px;
    background:var(--card);border:1px solid var(--border);
    padding:8px 12px;border-radius:8px;
    font-family:'JetBrains Mono',monospace;font-size:11px;
    color:var(--sub);font-weight:600;letter-spacing:.04em;
    box-shadow:var(--shadow-sm);
  }
  .badge-slot.earned{
    background:var(--primary-soft);border-color:var(--primary-line);
    color:var(--primary-ink);
  }
  .badge-mark{
    width:14px;height:14px;border-radius:50%;
    border:1.5px solid var(--sub-2);flex-shrink:0;
  }
  .badge-slot.earned .badge-mark{
    background:var(--primary);border-color:var(--primary);
  }

  .grid{
    flex:1;min-height:0;
    display:grid;grid-template-columns:1.05fr 1fr;gap:14px;
  }

  /* Sentence library (left) */
  .panel{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:14px 16px;
    display:flex;flex-direction:column;gap:10px;
    overflow:hidden;box-shadow:var(--shadow-sm);
  }
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--hairline);padding-bottom:8px;
  }
  .panel-title{
    font-family:'Inter','Noto Sans SC',sans-serif;
    font-size:12px;font-weight:700;color:var(--ink);
    letter-spacing:.08em;text-transform:uppercase;
  }
  .panel-meta{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;
    color:var(--sub);font-weight:600;
  }
  .lib-scroll{flex:1;overflow-y:auto;padding-right:4px;display:flex;flex-direction:column;gap:8px;}
  .sentence{
    background:var(--paper);border:1px solid var(--border);
    border-radius:7px;padding:10px 12px;
    cursor:pointer;transition:all .15s;
    font-size:12.5px;line-height:1.55;color:var(--ink-2);
    position:relative;
  }
  .sentence:hover{border-color:var(--climate);background:var(--climate-soft);}
  .sentence.picked{
    background:var(--climate-soft);border-color:var(--climate);
    color:var(--ink);
  }
  .sentence.picked::after{
    content:"已选";font-family:'Inter';font-size:9.5px;font-weight:700;
    color:#fff;background:var(--climate);
    padding:2px 6px;border-radius:4px;
    position:absolute;top:8px;right:8px;letter-spacing:.05em;
  }
  .sentence.picked.lang-en::after{content:"PICKED";}
  .sentence.locked{opacity:.45;cursor:not-allowed;}
  .sentence.locked:hover{border-color:var(--border);background:var(--paper);}
  .sentence-tag{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;
    color:var(--sub-2);letter-spacing:.08em;margin-bottom:4px;display:block;
  }

  /* Report draft (right) */
  .report-scroll{flex:1;overflow-y:auto;padding-right:4px;}
  .report-doc{
    background:var(--paper);border:1px dashed var(--border-2);
    border-radius:8px;padding:14px 16px;min-height:100%;
    font-family:'Inter','Noto Sans SC',sans-serif;
  }
  .report-h{
    font-size:13px;font-weight:700;color:var(--primary-ink);
    letter-spacing:.04em;margin:0 0 6px 0;
  }
  .report-body{
    font-size:12px;line-height:1.7;color:var(--ink-2);
    margin:0 0 14px 0;
  }
  .report-body .empty{color:var(--sub-2);font-style:italic;}
  .report-body .chosen{
    background:var(--climate-soft);padding:1px 4px;border-radius:3px;
    border-bottom:1px solid var(--climate);
  }

  /* Action bar */
  .action-bar{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding-top:6px;
    border-top:1px solid var(--hairline);
  }
  .feedback{
    flex:1;font-size:12.5px;line-height:1.5;color:var(--sub);
    min-height:18px;font-weight:500;
  }
  .feedback.ok{color:var(--climate);font-weight:600;}
  .feedback.warn{color:var(--danger);font-weight:600;}
  .btn-group{display:flex;gap:8px;}
  .btn{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
    padding:8px 16px;border-radius:6px;border:1px solid var(--border);
    background:var(--card);color:var(--ink-2);cursor:pointer;
    transition:all .15s;letter-spacing:.02em;
    box-shadow:var(--shadow-sm);
  }
  .btn:hover{border-color:var(--border-2);}
  .btn.primary{
    background:var(--primary);border-color:var(--primary);color:#fff;
  }
  .btn.primary:hover{background:var(--primary-ink);border-color:var(--primary-ink);}
  .btn.primary:disabled{
    background:var(--sub-2);border-color:var(--sub-2);
    cursor:not-allowed;opacity:.7;
  }
  .btn.ghost{background:transparent;}

  /* Section selector pill row inside main */
  .sec-tabs{
    display:flex;gap:6px;flex-wrap:wrap;
  }
  .sec-tab{
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
    padding:4px 10px;border-radius:99px;
    border:1px solid var(--border);background:var(--card);color:var(--sub);
    cursor:pointer;letter-spacing:.06em;transition:all .15s;
  }
  .sec-tab.active{
    border-color:var(--primary);color:var(--primary);background:var(--primary-soft);
  }
  .sec-tab.done{
    border-color:var(--climate);color:var(--climate);background:var(--climate-soft);
  }

  /* Final badge overlay */
  .finale{
    position:fixed;inset:0;background:rgba(25,24,20,.55);
    display:none;align-items:center;justify-content:center;z-index:50;
    backdrop-filter:blur(4px);
  }
  .finale.show{display:flex;}
  .finale-card{
    background:var(--card);border-radius:14px;padding:32px 40px;
    max-width:480px;text-align:center;box-shadow:var(--shadow-lg);
    border:1px solid var(--border);
  }
  .finale-eyebrow{
    font-size:10.5px;font-weight:700;color:var(--primary-ink);
    letter-spacing:.2em;text-transform:uppercase;
  }
  .finale-title{
    font-family:'Inter','Noto Sans SC',sans-serif;
    font-size:24px;font-weight:800;color:var(--ink);
    margin:10px 0 8px 0;line-height:1.25;
  }
  .finale-sub{
    font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:20px;
  }
  .seal{
    width:88px;height:88px;border-radius:50%;
    background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px auto;
    font-family:'Inter',sans-serif;font-weight:800;font-size:13px;
    letter-spacing:.08em;text-align:center;line-height:1.2;
    box-shadow:0 0 0 6px var(--primary-soft), inset 0 0 0 2px rgba(255,255,255,.35);
    padding:8px;
    animation:seal-pulse 2.4s ease-in-out infinite;
  }
  @keyframes seal-pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.04);}
  }

  /* Scrollbar */
  .lib-scroll::-webkit-scrollbar, .report-scroll::-webkit-scrollbar, .sidebar::-webkit-scrollbar{width:6px;}
  .lib-scroll::-webkit-scrollbar-thumb, .report-scroll::-webkit-scrollbar-thumb, .sidebar::-webkit-scrollbar-thumb{
    background:var(--border-2);border-radius:3px;
  }
</style>
</head>
<body>
<div class="root">
  <!-- Sidebar 200px -->
  <aside class="sidebar">
    <div>
      <div class="brand" id="brand">论文作者模拟</div>
      <div class="brand-sub" id="brandSub">M41 · PurpleAir 报告 5 段</div>
    </div>
    <div class="progress-title" id="progTitle">报告进度</div>
    <div id="secList"></div>
    <button id="langBtn" class="lang-btn">中 / EN</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="stage-head">
      <div class="stage-title-wrap">
        <div class="stage-eyebrow" id="stageEyebrow">SECTION 1 / 5</div>
        <h1 class="stage-title" id="stageTitle">数据集说明</h1>
        <p class="stage-desc" id="stageDesc">挑 3 句严谨的描述写进报告. 避免误导句 (会被科学审查打回).</p>
      </div>
      <div class="badge-slot" id="badgeSlot">
        <span class="badge-mark"></span>
        <span id="badgeLabel">可信报告作者 (0 / 5)</span>
      </div>
    </div>

    <div class="grid">
      <!-- 句子库 -->
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title" id="libTitle">句子库 SENTENCE BANK</div>
          <div class="panel-meta" id="libMeta">已选 0 / 3</div>
        </div>
        <div class="lib-scroll" id="libScroll"></div>
      </section>

      <!-- 报告草稿 -->
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title" id="draftTitle">报告草稿 REPORT DRAFT</div>
          <div class="panel-meta" id="draftMeta">PurpleAir · v0.1</div>
        </div>
        <div class="report-scroll">
          <div class="report-doc" id="reportDoc"></div>
        </div>
        <div class="action-bar">
          <div class="feedback" id="feedback"></div>
          <div class="btn-group">
            <button class="btn primary" id="submitBtn">提交本段</button>
            <button class="btn ghost" id="undoBtn">撤回上一句</button>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<!-- 完成弹窗 -->
<div class="finale" id="finale">
  <div class="finale-card">
    <div class="seal" id="sealText">CERTIFIED<br>AUTHOR</div>
    <div class="finale-eyebrow" id="finaleEyebrow">M41 · 任务完成</div>
    <h2 class="finale-title" id="finaleTitle">徽章: 可信报告作者</h2>
    <p class="finale-sub" id="finaleSub">5 段全部通过严谨性检查. 这份报告可以提交给科学审查了.</p>
    <button class="btn primary" id="restartBtn">再来一次</button>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
var LANG = 'cn';
var SECTIONS = [
  {
    key: 'dataset',
    titleCn: '数据集说明',
    titleEn: 'Dataset description',
    descCn: '挑 3 句严谨的描述写进报告. 避免误导句 (会被科学审查打回).',
    descEn: 'Pick 3 rigorous sentences. Avoid misleading ones (peer review will reject them).',
    sentences: [
      {tag:'S1-A', good:true,  cn:'本研究使用 PurpleAir 低成本传感器 30 天的 PM2.5 小时均值, 共 720 条记录.', en:'We used 30 days of hourly PM2.5 from a PurpleAir low-cost sensor, totaling 720 records.'},
      {tag:'S1-B', good:true,  cn:'参考站使用国家环境监测点 EPA 数据, 与传感器位置直线距离 1.8 km.', en:'Reference data comes from an EPA monitoring station 1.8 km from the sensor.'},
      {tag:'S1-C', good:true,  cn:'同期采集了温度与相对湿度, 用于后续校正分析.', en:'Temperature and relative humidity were collected concurrently for downstream correction.'},
      {tag:'S1-D', good:false, cn:'我们只用了最近 7 天数据, 30 天太麻烦, 7 天也能代表全年.', en:'We used only the last 7 days; 30 days is too much work and 7 days represents the year.'},
      {tag:'S1-E', good:true,  cn:'传感器与参考站的时间戳已统一到 UTC+8 并按小时对齐.', en:'Sensor and reference timestamps were unified to UTC+8 and hourly-aligned.'},
    ],
  },
  {
    key: 'calibration',
    titleCn: '校正公式',
    titleEn: 'Calibration formula',
    descCn: '说明你用的校正模型与变量, 拒绝"不需要校正"的陷阱.',
    descEn: 'Describe your calibration model and variables. Reject "no calibration needed" traps.',
    sentences: [
      {tag:'S2-A', good:true,  cn:'采用美国 EPA 推荐的 RH 校正: PM2.5_corr = 0.524 × PM2.5_raw - 0.0852 × RH + 5.71.', en:'Used the EPA-recommended RH correction: PM2.5_corr = 0.524·raw - 0.0852·RH + 5.71.'},
      {tag:'S2-B', good:true,  cn:'校正参数通过对参考站数据做最小二乘回归得到, 不是直接照搬公式.', en:'Coefficients were fit by OLS on reference-station data, not copied blindly.'},
      {tag:'S2-C', good:false, cn:'PurpleAir 的原始数据已经很准, 不需要任何校正.', en:'PurpleAir raw data is already accurate; no correction is needed.'},
      {tag:'S2-D', good:true,  cn:'当 RH > 90% 时数据标记为高湿度区间, 单独评估.', en:'Samples with RH > 90% were flagged as high-humidity and evaluated separately.'},
      {tag:'S2-E', good:true,  cn:'公式中所有变量的量纲与采样频率均与参考站对齐.', en:'All variables in the formula match the reference station in units and sampling rate.'},
    ],
  },
  {
    key: 'metrics',
    titleCn: '评估指标',
    titleEn: 'Evaluation metrics',
    descCn: '汇报模型精度. 拒绝 "R²=1 完美" 的虚假声明.',
    descEn: 'Report model accuracy. Reject false claims like "R²=1 means perfect".',
    sentences: [
      {tag:'S3-A', good:true,  cn:'校正前 R² = 0.42, 校正后 R² = 0.81, 提升明显.', en:'R² improved from 0.42 (raw) to 0.81 (corrected) — notable gain.'},
      {tag:'S3-B', good:true,  cn:'平均绝对误差 MAE 从 8.6 μg/m³ 降到 3.1 μg/m³.', en:'MAE dropped from 8.6 μg/m³ to 3.1 μg/m³.'},
      {tag:'S3-C', good:true,  cn:'采用 30% 留出集验证, 训练集与验证集时间不重叠.', en:'30% hold-out validation with no temporal overlap between train and test.'},
      {tag:'S3-D', good:false, cn:'我们的公式 R² = 1.00, 是完美的拟合, 不存在任何误差.', en:'Our formula achieves R² = 1.00 — a perfect fit with zero error.'},
      {tag:'S3-E', good:true,  cn:'同时报告 RMSE = 4.2 μg/m³ 与偏差 bias = -0.3 μg/m³.', en:'Also report RMSE = 4.2 μg/m³ and bias = -0.3 μg/m³.'},
    ],
  },
  {
    key: 'error',
    titleCn: '误差分析',
    titleEn: 'Error analysis',
    descCn: '客观分析残差来源. 不要把锅全甩给"仪器问题".',
    descEn: 'Analyze residual sources objectively. Don\'t blame everything on "sensor issues".',
    sentences: [
      {tag:'S4-A', good:true,  cn:'残差在 RH > 85% 区间系统性偏高, 提示湿度校正仍有改进空间.', en:'Residuals are systematically larger at RH > 85%, suggesting the humidity term needs work.'},
      {tag:'S4-B', good:true,  cn:'夜间 0-5 时残差略大, 可能与本地排放源时段性变化有关.', en:'Residuals are slightly larger between 00:00-05:00, possibly tied to local emission timing.'},
      {tag:'S4-C', good:false, cn:'所有误差都是因为仪器坏了, 跟我们的模型没关系.', en:'All errors are sensor faults; our model has nothing to do with them.'},
      {tag:'S4-D', good:true,  cn:'参考站与传感器空间距离 1.8 km, 这本身会引入小尺度差异.', en:'The 1.8 km spatial gap between reference and sensor introduces small-scale variance.'},
      {tag:'S4-E', good:true,  cn:'高浓度 (> 80 μg/m³) 区间样本数偏少, 估计置信度较低.', en:'Samples above 80 μg/m³ are sparse, lowering confidence in that range.'},
    ],
  },
  {
    key: 'limits',
    titleCn: '局限',
    titleEn: 'Limitations',
    descCn: '老老实实写出本研究的边界. 不要声称"没有局限".',
    descEn: 'Honestly state the study\'s boundaries. Don\'t claim "no limitations".',
    sentences: [
      {tag:'S5-A', good:true,  cn:'本结论仅适用于本地区类似气候条件, 不能直接推广到其他城市.', en:'Findings apply only to similar local climate; not directly generalizable to other cities.'},
      {tag:'S5-B', good:true,  cn:'30 天数据未覆盖完整四季, 缺少冬季高浓度场景.', en:'30 days do not cover all four seasons; winter high-pollution scenarios are missing.'},
      {tag:'S5-C', good:true,  cn:'未独立验证传感器在 PM10 / PM1 上的表现.', en:'PM10 and PM1 performance was not independently validated.'},
      {tag:'S5-D', good:false, cn:'本研究方法严谨, 数据完整, 不存在任何局限.', en:'The methodology is rigorous and the dataset is complete — there are no limitations.'},
      {tag:'S5-E', good:true,  cn:'校正系数随季节可能漂移, 需要每季度重新拟合.', en:'Calibration coefficients may drift seasonally; refit every quarter is recommended.'},
    ],
  },
];

var I18N = {
  brand:       {cn:'论文作者模拟',        en:'Author Sim'},
  brandSub:    {cn:'M41 · PurpleAir 报告 5 段', en:'M41 · PurpleAir Report (5 sections)'},
  progTitle:   {cn:'报告进度',            en:'REPORT PROGRESS'},
  libTitle:    {cn:'句子库 SENTENCE BANK', en:'SENTENCE BANK'},
  draftTitle:  {cn:'报告草稿 REPORT DRAFT', en:'REPORT DRAFT'},
  draftMeta:   {cn:'PurpleAir · v0.1',    en:'PurpleAir · v0.1'},
  undo:        {cn:'撤回上一句',          en:'Undo last'},
  submit:      {cn:'提交本段',            en:'Submit section'},
  badge0:      {cn:'可信报告作者',         en:'Certified author'},
  metaPick:    {cn:'已选',                en:'Picked'},
  sectionLbl:  {cn:'SECTION',             en:'SECTION'},
  fbNeed3:     {cn:'还需要选 3 句严谨的描述.', en:'Pick 3 rigorous sentences.'},
  fbNotEnough: {cn:'本段需要刚好 3 句, 当前 ', en:'This section needs exactly 3 sentences; you have '},
  fbMisleading:{cn:'有误导句被选中: ',     en:'Misleading sentence selected: '},
  fbReject:    {cn:' — 会被科学审查打回.',  en:' — peer review would reject this.'},
  fbPass:      {cn:'通过! 这段够严谨, 进入下一段.', en:'Pass! This section is rigorous — moving on.'},
  fbAllDone:   {cn:'5 段全部通过! 你拿到了"可信报告作者"徽章.', en:'All 5 sections passed! You earned the "Certified Author" badge.'},
  emptyDraft:  {cn:'(此段尚未填入句子)',   en:'(no sentences picked yet)'},
  finaleEye:   {cn:'M41 · 任务完成',       en:'M41 · TASK COMPLETE'},
  finaleTitle: {cn:'徽章: 可信报告作者',    en:'Badge: Certified Author'},
  finaleSub:   {cn:'5 段全部通过严谨性检查. 这份报告可以提交给科学审查了.', en:'All 5 sections passed the rigor check. The report is peer-review ready.'},
  restart:     {cn:'再来一次',             en:'Restart'},
  sealText:    {cn:'CERTIFIED<br>AUTHOR',  en:'CERTIFIED<br>AUTHOR'},
};

function t(k){ return (I18N[k] && I18N[k][LANG]) || k; }

// per-section state: { picked: [tag,...], passed: bool }
var sectionState = SECTIONS.map(function(){ return { picked: [], passed: false }; });
var curIdx = 0;

// ============================================================
// Render
// ============================================================
function renderSidebar(){
  var html = '';
  SECTIONS.forEach(function(sec, i){
    var st = sectionState[i];
    var cls = 'sec-item';
    if (i === curIdx) cls += ' active';
    if (st.passed) cls += ' done';
    var dot = st.passed ? 'OK' : (i + 1);
    var label = LANG === 'cn' ? sec.titleCn : sec.titleEn;
    html += '<div class="' + cls + '" data-idx="' + i + '">' +
            '<span class="sec-dot">' + dot + '</span>' +
            '<span class="sec-label">' + label + '</span>' +
            '</div>';
  });
  var box = document.getElementById('secList');
  box.innerHTML = html;
  Array.prototype.forEach.call(box.querySelectorAll('.sec-item'), function(el){
    el.addEventListener('click', function(){
      var idx = parseInt(el.getAttribute('data-idx'), 10);
      switchSection(idx);
    });
  });
}

function renderSecTabs(){ /* removed — sidebar already shows progress */ }

function renderHeader(){
  var sec = SECTIONS[curIdx];
  document.getElementById('stageEyebrow').textContent = t('sectionLbl') + ' ' + (curIdx + 1) + ' / 5';
  document.getElementById('stageTitle').textContent = LANG === 'cn' ? sec.titleCn : sec.titleEn;
  document.getElementById('stageDesc').textContent = LANG === 'cn' ? sec.descCn : sec.descEn;
  // badge
  var passCount = sectionState.filter(function(s){ return s.passed; }).length;
  var slot = document.getElementById('badgeSlot');
  var lbl = document.getElementById('badgeLabel');
  lbl.textContent = t('badge0') + ' (' + passCount + ' / 5)';
  if (passCount === 5) slot.classList.add('earned');
  else slot.classList.remove('earned');
}

function renderLibrary(){
  var sec = SECTIONS[curIdx];
  var st = sectionState[curIdx];
  var html = '';
  sec.sentences.forEach(function(s){
    var picked = st.picked.indexOf(s.tag) >= 0;
    var locked = !picked && st.picked.length >= 3;
    var cls = 'sentence';
    if (picked) cls += ' picked' + (LANG === 'en' ? ' lang-en' : '');
    if (locked) cls += ' locked';
    var txt = LANG === 'cn' ? s.cn : s.en;
    html += '<div class="' + cls + '" data-tag="' + s.tag + '">' +
            '<span class="sentence-tag">' + s.tag + '</span>' +
            txt +
            '</div>';
  });
  var box = document.getElementById('libScroll');
  box.innerHTML = html;
  Array.prototype.forEach.call(box.querySelectorAll('.sentence'), function(el){
    el.addEventListener('click', function(){
      if (el.classList.contains('locked')) return;
      var tag = el.getAttribute('data-tag');
      togglePick(tag);
    });
  });
  document.getElementById('libMeta').textContent = t('metaPick') + ' ' + st.picked.length + ' / 3';
}

function renderReport(){
  var html = '';
  SECTIONS.forEach(function(sec, i){
    var st = sectionState[i];
    var heading = (i + 1) + '. ' + (LANG === 'cn' ? sec.titleCn : sec.titleEn);
    html += '<div class="report-h">' + heading + '</div>';
    if (st.picked.length === 0){
      html += '<p class="report-body"><span class="empty">' + t('emptyDraft') + '</span></p>';
    } else {
      var paragraph = st.picked.map(function(tag){
        var s = sec.sentences.find(function(x){ return x.tag === tag; });
        return '<span class="chosen">' + (LANG === 'cn' ? s.cn : s.en) + '</span>';
      }).join(' ');
      html += '<p class="report-body">' + paragraph + '</p>';
    }
  });
  document.getElementById('reportDoc').innerHTML = html;
}

function renderAll(){
  renderSidebar();
  renderSecTabs();
  renderHeader();
  renderLibrary();
  renderReport();
  document.getElementById('undoBtn').textContent = t('undo');
  document.getElementById('submitBtn').textContent = t('submit');
  document.getElementById('brand').textContent = t('brand');
  document.getElementById('brandSub').textContent = t('brandSub');
  document.getElementById('progTitle').textContent = t('progTitle');
  document.getElementById('libTitle').textContent = t('libTitle');
  document.getElementById('draftTitle').textContent = t('draftTitle');
  document.getElementById('draftMeta').textContent = t('draftMeta');
  document.getElementById('langBtn').textContent = LANG === 'cn' ? '中 / EN' : 'EN / 中';
  document.getElementById('finaleEyebrow').textContent = t('finaleEye');
  document.getElementById('finaleTitle').textContent = t('finaleTitle');
  document.getElementById('finaleSub').textContent = t('finaleSub');
  document.getElementById('restartBtn').textContent = t('restart');
  document.getElementById('sealText').innerHTML = t('sealText');
}

// ============================================================
// Logic
// ============================================================
function togglePick(tag){
  var st = sectionState[curIdx];
  var idx = st.picked.indexOf(tag);
  if (idx >= 0){
    st.picked.splice(idx, 1);
  } else {
    if (st.picked.length >= 3) return; // hard cap
    st.picked.push(tag);
  }
  setFeedback('', '');
  renderLibrary();
  renderReport();
}

function switchSection(idx){
  if (idx < 0 || idx >= SECTIONS.length) return;
  curIdx = idx;
  setFeedback('', '');
  renderAll();
}

function setFeedback(msg, kind){
  var fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = 'feedback' + (kind ? ' ' + kind : '');
}

function submitSection(){
  var sec = SECTIONS[curIdx];
  var st = sectionState[curIdx];
  if (st.picked.length === 0){
    setFeedback(t('fbNeed3'), 'warn');
    return;
  }
  if (st.picked.length !== 3){
    setFeedback(t('fbNotEnough') + st.picked.length + (LANG === 'cn' ? ' 句.' : '.'), 'warn');
    return;
  }
  // check misleading
  var badPicks = st.picked.filter(function(tag){
    var s = sec.sentences.find(function(x){ return x.tag === tag; });
    return s && !s.good;
  });
  if (badPicks.length > 0){
    setFeedback(t('fbMisleading') + badPicks.join(', ') + t('fbReject'), 'warn');
    return;
  }
  // pass
  st.passed = true;
  setFeedback(t('fbPass'), 'ok');
  renderHeader();
  renderSidebar();
  renderSecTabs();
  // auto-advance after a beat
  setTimeout(function(){
    var allDone = sectionState.every(function(s){ return s.passed; });
    if (allDone){
      showFinale();
      return;
    }
    // jump to next unfinished
    for (var i = 0; i < SECTIONS.length; i++){
      var next = (curIdx + 1 + i) % SECTIONS.length;
      if (!sectionState[next].passed){
        switchSection(next);
        return;
      }
    }
  }, 900);
}

function undoLast(){
  var st = sectionState[curIdx];
  if (st.passed) return;
  if (st.picked.length === 0) return;
  st.picked.pop();
  setFeedback('', '');
  renderLibrary();
  renderReport();
}

function showFinale(){
  setFeedback(t('fbAllDone'), 'ok');
  document.getElementById('finale').classList.add('show');
}

function restartAll(){
  sectionState = SECTIONS.map(function(){ return { picked: [], passed: false }; });
  curIdx = 0;
  document.getElementById('finale').classList.remove('show');
  setFeedback('', '');
  renderAll();
}

// ============================================================
// Wire up
// ============================================================
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG === 'cn' ? 'en' : 'cn';
  renderAll();
});
document.getElementById('submitBtn').addEventListener('click', submitSection);
document.getElementById('undoBtn').addEventListener('click', undoLast);
document.getElementById('restartBtn').addEventListener('click', restartAll);

renderAll();
</script>
</body>
</html>
