<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E2E Dataflow Chain</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC','Inter',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh;width:100%}
.header{padding:10px 16px 6px;text-align:center;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#ffb59c;letter-spacing:2px;text-transform:uppercase}
.header .subtitle{font-size:12px;color:#8a8886;margin-top:2px;letter-spacing:1px}
.canvas-wrap{flex:1;min-height:0;position:relative}
canvas{display:block;width:100%;height:100%}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;flex-shrink:0;background:rgba(28,27,27,0.92)}
.controls button{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1px solid rgba(138,136,134,0.15);background:rgba(53,53,52,0.4);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;text-transform:uppercase}
.controls button:hover{background:rgba(255,127,80,0.15)}
.controls .frame-info{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886;min-width:60px;text-align:center}
.hud{display:flex;justify-content:space-around;padding:8px 16px;flex-shrink:0;background:rgba(0,0,0,0.55);height:48px;align-items:center}
.hud-item{text-align:center}
.hud-item .hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;color:#8a8886;letter-spacing:1px;text-transform:uppercase}
.hud-item .hud-value{font-family:'Space Grotesk',sans-serif;font-size:14px;color:#00daf3;font-weight:700}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:16px;line-height:1.6}
.guide-panel .guide-content{transition:max-height 0.3s}
.guide-panel .collapsed .guide-content{max-height:0;overflow:hidden}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
  <div class="guide-content" id="guideContent">
    <p id="guideWhat" style="margin-bottom:8px"></p>
    <ul id="guideList"></ul>
    <p id="guideTakeaway" style="margin-top:8px;color:#00daf3"></p>
  </div>
</div>
<div class="wrapper">
  <div class="header">
    <h1 id="mainTitle"></h1>
    <div class="subtitle" id="mainSubtitle"></div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <button id="btnPrev"></button>
    <button id="btnPlay"></button>
    <button id="btnNext"></button>
    <span class="frame-info" id="frameInfo"></span>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3"></div></div>
    <div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-value" id="hudV4"></div></div>
  </div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'E2E DATAFLOW CHAIN',cn:'\u5168\u94FE\u8DEF\u6570\u636E\u6D41\u8054\u52A8'},
  subtitle:{en:'Image -> Segmentation -> Risk Map -> Path -> Control',cn:'\u56FE\u50CF -> \u5206\u5272 -> \u98CE\u9669\u56FE -> \u8DEF\u5F84 -> \u8F66\u63A7'},
  btnPrev:{en:'PREV',cn:'\u4E0A\u4E00\u5E27'},
  btnPlay:{en:'PLAY',cn:'\u64AD\u653E'},
  btnPause:{en:'PAUSE',cn:'\u6682\u505C'},
  btnNext:{en:'NEXT',cn:'\u4E0B\u4E00\u5E27'},
  guideTitle:{en:'VIEWING GUIDE',cn:'\u89C2\u770B\u6307\u5357'},
  guideWhat:{en:'Shows how data flows through the full pipeline (Image->Segmentation->RiskMap->Path->Control) and how each stage transforms its input.',cn:'\u5C55\u793A\u6570\u636E\u5982\u4F55\u6D41\u7ECF\u5168\u94FE\u8DEF\uFF08\u56FE\u50CF->\u5206\u5272->\u98CE\u9669\u56FE->\u8DEF\u5F84->\u8F66\u63A7\uFF09\uFF0C\u4EE5\u53CA\u6BCF\u4E2A\u9636\u6BB5\u5982\u4F55\u8F6C\u6362\u8F93\u5165\u3002'},
  guideObs1:{en:'Frame 1: Raw Mars image enters the pipeline',cn:'\u7B2C1\u5E27\uFF1A\u539F\u59CB\u706B\u661F\u56FE\u50CF\u8FDB\u5165\u7BA1\u7EBF'},
  guideObs2:{en:'Frame 2-3: Watch data transform at each stage boundary',cn:'\u7B2C2-3\u5E27\uFF1A\u89C2\u5BDF\u6570\u636E\u5728\u6BCF\u4E2A\u9636\u6BB5\u8FB9\u754C\u5904\u7684\u8F6C\u6362'},
  guideObs3:{en:'Frame 4-5: See full chain output and timing bottleneck',cn:'\u7B2C4-5\u5E27\uFF1A\u67E5\u770B\u5168\u94FE\u8DEF\u8F93\u51FA\u548C\u65F6\u95F4\u74F6\u9888'},
  guideTakeaway:{en:'Takeaway: Each stage is an interface contract -- breaking one breaks everything downstream.',cn:'\u6838\u5FC3\u7ED3\u8BBA\uFF1A\u6BCF\u4E2A\u9636\u6BB5\u90FD\u662F\u4E00\u4E2A\u63A5\u53E3\u5951\u7EA6\uFF0C\u7834\u574F\u4E00\u4E2A\u5C31\u4F1A\u6253\u7834\u6240\u6709\u4E0B\u6E38\u3002'},
  hudStage:{en:'STAGE',cn:'\u9636\u6BB5'},
  hudInput:{en:'INPUT',cn:'\u8F93\u5165'},
  hudOutput:{en:'OUTPUT',cn:'\u8F93\u51FA'},
  hudLatency:{en:'LATENCY',cn:'\u5EF6\u8FDF'},
  stageImg:{en:'IMAGE',cn:'\u56FE\u50CF'},
  stageSeg:{en:'SEGMENTATION',cn:'\u5206\u5272'},
  stageRisk:{en:'RISK MAP',cn:'\u98CE\u9669\u56FE'},
  stagePath:{en:'PATH',cn:'\u8DEF\u5F84'},
  stageCtrl:{en:'CONTROL',cn:'\u8F66\u63A7'},
  f0Title:{en:'RAW IMAGE INPUT',cn:'\u539F\u59CB\u56FE\u50CF\u8F93\u5165'},
  f0Desc:{en:'Mars Navcam image enters pipeline -- 1024x1024 grayscale',cn:'\u706B\u661F Navcam \u56FE\u50CF\u8FDB\u5165\u7BA1\u7EBF -- 1024x1024 \u7070\u5EA6'},
  f1Title:{en:'SEMANTIC SEGMENTATION',cn:'\u8BED\u4E49\u5206\u5272'},
  f1Desc:{en:'Image -> pixel-level terrain labels (traversable/hazard/unknown)',cn:'\u56FE\u50CF -> \u50CF\u7D20\u7EA7\u5730\u5F62\u6807\u7B7E\uFF08\u53EF\u901A\u884C/\u5371\u9669/\u672A\u77E5\uFF09'},
  f2Title:{en:'RISK COST MAP',cn:'\u98CE\u9669\u4EE3\u4EF7\u56FE'},
  f2Desc:{en:'Labels -> cost values per cell (0=safe, 255=impassable)',cn:'\u6807\u7B7E -> \u6BCF\u683C\u4EE3\u4EF7\u503C\uFF080=\u5B89\u5168\uFF0C255=\u4E0D\u53EF\u901A\u884C\uFF09'},
  f3Title:{en:'PATH PLANNING',cn:'\u8DEF\u5F84\u89C4\u5212'},
  f3Desc:{en:'Cost map -> optimal waypoints avoiding high-risk cells',cn:'\u4EE3\u4EF7\u56FE -> \u907F\u5F00\u9AD8\u98CE\u9669\u533A\u57DF\u7684\u6700\u4F18\u8DEF\u70B9'},
  f4Title:{en:'VEHICLE CONTROL OUTPUT',cn:'\u8F66\u8F86\u63A7\u5236\u8F93\u51FA'},
  f4Desc:{en:'Waypoints -> steering angle, throttle, brake commands',cn:'\u8DEF\u70B9 -> \u8F6C\u5411\u89D2\u3001\u6CB9\u95E8\u3001\u5236\u52A8\u6307\u4EE4'},
  inputPixels:{en:'PIXELS',cn:'\u50CF\u7D20'},
  inputLabels:{en:'LABELS',cn:'\u6807\u7B7E'},
  inputCosts:{en:'COSTS',cn:'\u4EE3\u4EF7'},
  inputWaypts:{en:'WAYPOINTS',cn:'\u8DEF\u70B9'},
  inputCmds:{en:'COMMANDS',cn:'\u6307\u4EE4'},
  outputLabels:{en:'LABEL MAP',cn:'\u6807\u7B7E\u56FE'},
  outputCosts:{en:'COST GRID',cn:'\u4EE3\u4EF7\u7F51\u683C'},
  outputWaypts:{en:'WAYPOINT SEQ',cn:'\u8DEF\u70B9\u5E8F\u5217'},
  outputCmds:{en:'CTRL CMDS',cn:'\u63A7\u5236\u6307\u4EE4'},
  outputExec:{en:'EXECUTED',cn:'\u5DF2\u6267\u884C'},
  ms120:{en:'120ms',cn:'120ms'},
  ms340:{en:'340ms',cn:'340ms'},
  ms80:{en:'80ms',cn:'80ms'},
  ms45:{en:'45ms',cn:'45ms'},
  ms15:{en:'15ms',cn:'15ms'},
  totalTime:{en:'TOTAL: 600ms',cn:'\u603B\u8BA1: 600ms'},
  pipelineLabel:{en:'PIPELINE',cn:'\u7BA1\u7EBF'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvasWrap');
var W=800,H=500;
var dpr=Math.min(window.devicePixelRatio||1,2);
var currentFrame=0;
var totalFrames=5;
var playing=false;
var playTimer=null;
var transitioning=false;

var STAGES=[
  {key:'stageImg',color:'#ffb59c',x:0.1},
  {key:'stageSeg',color:'#00daf3',x:0.3},
  {key:'stageRisk',color:'#ff5f1f',x:0.5},
  {key:'stagePath',color:'#10b981',x:0.7},
  {key:'stageCtrl',color:'#c6c6c6',x:0.9}
];

var HUD_DATA=[
  [{l:'hudStage',v:'stageImg'},{l:'hudInput',v:'inputPixels'},{l:'hudOutput',v:'outputLabels'},{l:'hudLatency',v:'ms120'}],
  [{l:'hudStage',v:'stageSeg'},{l:'hudInput',v:'inputLabels'},{l:'hudOutput',v:'outputCosts'},{l:'hudLatency',v:'ms340'}],
  [{l:'hudStage',v:'stageRisk'},{l:'hudInput',v:'inputCosts'},{l:'hudOutput',v:'outputWaypts'},{l:'hudLatency',v:'ms80'}],
  [{l:'hudStage',v:'stagePath'},{l:'hudInput',v:'inputWaypts'},{l:'hudOutput',v:'outputCmds'},{l:'hudLatency',v:'ms45'}],
  [{l:'hudStage',v:'stageCtrl'},{l:'hudInput',v:'inputCmds'},{l:'hudOutput',v:'outputExec'},{l:'hudLatency',v:'ms15'}]
];

function resize(){
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;H=rect.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawFrame(currentFrame);
}
window.addEventListener('resize',resize);

function drawBg(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#131313');g.addColorStop(1,'#1a1018');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  for(var i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for(var j=0;j<H;j+=40){ctx.beginPath();ctx.moveTo(0,j);ctx.lineTo(W,j);ctx.stroke();}
}

function drawStageBox(x,y,w,h,color,label,active,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,color+'33');g.addColorStop(1,color+'11');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=active?color:color+'66';ctx.lineWidth=active?2:1;
  ctx.strokeRect(x,y,w,h);
  if(active){ctx.shadowColor=color;ctx.shadowBlur=16;ctx.strokeRect(x,y,w,h);ctx.shadowBlur=0;}
  ctx.fillStyle=active?color:'#8a8886';
  ctx.font="bold 11px 'Space Grotesk',sans-serif";ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h/2+4);
  ctx.restore();
}

function drawArrowBetween(x1,y1,x2,y2,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.shadowColor=color;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  var angle=Math.atan2(y2-y1,x2-x1);
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-10*Math.cos(angle-0.3),y2-10*Math.sin(angle-0.3));
  ctx.lineTo(x2-10*Math.cos(angle+0.3),y2-10*Math.sin(angle+0.3));
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
}

function drawDataPacket(cx,cy,color,label,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.shadowColor=color;ctx.shadowBlur=12;
  var g=ctx.createRadialGradient(cx,cy,2,cx,cy,16);
  g.addColorStop(0,color);g.addColorStop(1,color+'44');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,14,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font="bold 8px 'Space Grotesk',sans-serif";ctx.textAlign='center';
  ctx.fillText(label,cx,cy+3);
  ctx.restore();
}

function drawTimingBar(x,y,w,h,elapsed,total,color,label,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var ratio=elapsed/total;
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(x,y,w,h);
  var g=ctx.createLinearGradient(x,y,x+w*ratio,y);
  g.addColorStop(0,color+'88');g.addColorStop(1,color);
  ctx.fillStyle=g;ctx.fillRect(x,y,w*ratio,h);
  ctx.fillStyle='#e5e2e1';ctx.font="10px 'Space Grotesk',sans-serif";ctx.textAlign='left';
  ctx.fillText(label+' '+elapsed+'ms',x+4,y+h/2+3);
  ctx.restore();
}

function lerp(a,b,p){return a+(b-a)*p}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2}
function merge(base,over){var r={};for(var k in base)r[k]=base[k];for(var k2 in over)r[k2]=over[k2];return r}

function getFrameElements(f){
  var elems=[];
  var pipeY=H*0.35;
  var boxW=W*0.12;
  var boxH=40;
  var gap=(W-5*boxW)/6;

  // Stage boxes -- always present
  for(var i=0;i<5;i++){
    var bx=gap+(boxW+gap)*i;
    var active=(i<=f);
    elems.push({id:'stage'+i,type:'custom',x:bx,y:pipeY,w:boxW,h:boxH,
      draw:function(a,bi,ba,bc){return function(alpha){
        drawStageBox(bi,pipeY,boxW,boxH,bc,t(STAGES[ba].key),ba<=f,alpha);
      }}(0,bx,i,STAGES[i].color),alpha:1});
  }

  // Arrows between active stages
  for(var j=0;j<Math.min(f,4);j++){
    var ax1=gap+(boxW+gap)*j+boxW;
    var ax2=gap+(boxW+gap)*(j+1);
    var aColor=STAGES[j+1].color;
    elems.push({id:'arrow'+j,type:'custom',x:ax1,y:pipeY+boxH/2,w:ax2-ax1,h:1,
      draw:function(a1,a2,ac){return function(alpha){
        drawArrowBetween(a1,pipeY+boxH/2,a2,pipeY+boxH/2,ac,alpha);
      }}(ax1,ax2,aColor),alpha:1});
  }

  // Data packet at current stage
  var packetX=gap+(boxW+gap)*f+boxW/2;
  var packetLabels=['IMG','SEG','CST','WPT','CMD'];
  elems.push({id:'packet',type:'custom',x:packetX,y:pipeY-30,w:28,h:28,
    draw:function(px,pl){return function(alpha){
      drawDataPacket(px,pipeY-30,STAGES[f].color,pl,alpha);
    }}(packetX,packetLabels[f]),alpha:1});

  // Title + description
  elems.push({id:'frameTitle',type:'label',text:t('f'+f+'Title'),x:W/2,y:H*0.12,color:'#ffb59c',size:16,align:'center',alpha:1});
  elems.push({id:'frameDesc',type:'label',text:t('f'+f+'Desc'),x:W/2,y:H*0.19,color:'#8a8886',size:12,align:'center',alpha:1});

  // Timing bars (appear from frame 1 onward)
  if(f>=1){
    var timings=[120,340,80,45,15];
    var barX=W*0.15;var barW=W*0.7;var barH=14;var barGap=20;
    var barStartY=H*0.58;
    for(var ti=0;ti<=f;ti++){
      var by=barStartY+ti*barGap;
      elems.push({id:'timing'+ti,type:'custom',x:barX,y:by,w:barW,h:barH,
        draw:function(bx2,by2,bw2,bh2,elapsed,col,lab){return function(alpha){
          drawTimingBar(bx2,by2,bw2,bh2,elapsed,400,col,lab,alpha);
        }}(barX,by,barW,barH,timings[ti],STAGES[ti].color,t(STAGES[ti].key)),alpha:1});
    }
  }

  // Total time label at frame 4
  if(f===4){
    elems.push({id:'totalTime',type:'label',text:t('totalTime'),x:W/2,y:H*0.58+5*20+10,color:'#ff5f1f',size:14,align:'center',alpha:1});
  }

  return elems;
}

function drawLabelPrimitive(text,x,y,color,size,align){
  ctx.fillStyle=color||'#e5e2e1';
  ctx.font='bold '+size+'px "Space Grotesk",sans-serif';
  ctx.textAlign=align||'center';
  ctx.fillText(text,x,y);
}

function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  switch(el.type){
    case 'label':drawLabelPrimitive(el.text,el.x,el.y,el.color,el.size,el.align);break;
    case 'custom':el.draw(el.alpha);break;
  }
  ctx.restore();
}

function drawFrame(f){
  drawBg();
  var elems=getFrameElements(f);
  elems.forEach(function(el){drawElement(el)});
}

function transitionTo(newFrame){
  if(newFrame<0)newFrame=0;
  if(newFrame>=totalFrames)newFrame=totalFrames-1;
  if(newFrame===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return}
  if(transitioning)return;

  var oldElems=getFrameElements(currentFrame);
  var newElems=getFrameElements(newFrame);
  var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e});
  var newMap={};newElems.forEach(function(e){newMap[e.id]=e});

  currentFrame=newFrame;
  updateHUD(newFrame);
  transitioning=true;
  var startTime=null;var duration=500;

  function step(timestamp){
    if(!startTime)startTime=timestamp;
    var raw=Math.min((timestamp-startTime)/duration,1);
    var p=easeInOut(raw);
    drawBg();

    oldElems.forEach(function(oe){
      if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}));
    });
    newElems.forEach(function(ne){
      var oe=oldMap[ne.id];
      if(oe){
        var merged=merge(ne,{
          x:lerp(oe.x||0,ne.x||0,p),
          y:lerp(oe.y||0,ne.y||0,p),
          w:lerp(oe.w||0,ne.w||0,p),
          h:lerp(oe.h||0,ne.h||0,p),
          alpha:1
        });
        if((ne.type==='label')&&oe.text!==ne.text){
          drawElement(merge(oe,{alpha:1-p}));
          drawElement(merge(ne,{alpha:p}));
        } else {
          drawElement(merged);
        }
      } else {
        drawElement(merge(ne,{alpha:p}));
      }
    });
    if(raw<1){requestAnimationFrame(step)}else{transitioning=false}
  }
  requestAnimationFrame(step);
}

function updateHUD(f){
  var d=HUD_DATA[f];
  document.getElementById('hudL1').textContent=t(d[0].l);
  document.getElementById('hudV1').textContent=t(d[0].v);
  document.getElementById('hudL2').textContent=t(d[1].l);
  document.getElementById('hudV2').textContent=t(d[1].v);
  document.getElementById('hudL3').textContent=t(d[2].l);
  document.getElementById('hudV3').textContent=t(d[2].v);
  document.getElementById('hudL4').textContent=t(d[3].l);
  document.getElementById('hudV4').textContent=t(d[3].v);
  document.getElementById('frameInfo').textContent=(f+1)+' / '+totalFrames;
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSubtitle').textContent=t('subtitle');
  document.getElementById('btnPrev').textContent=t('btnPrev');
  document.getElementById('btnPlay').textContent=playing?t('btnPause'):t('btnPlay');
  document.getElementById('btnNext').textContent=t('btnNext');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideWhat').textContent=t('guideWhat');
  var list=document.getElementById('guideList');
  list.innerHTML='';
  ['guideObs1','guideObs2','guideObs3'].forEach(function(k){
    var li=document.createElement('li');li.textContent=t(k);list.appendChild(li);
  });
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  updateHUD(currentFrame);
  drawFrame(currentFrame);
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});

document.getElementById('guideToggle').addEventListener('click',function(){
  document.getElementById('guidePanel').classList.toggle('collapsed');
  document.getElementById('guideArrow').textContent=document.getElementById('guidePanel').classList.contains('collapsed')?'+':'-';
});

document.getElementById('btnPrev').addEventListener('click',function(){
  if(playing){playing=false;if(playTimer)cancelAnimationFrame(playTimer);}
  document.getElementById('btnPlay').textContent=t('btnPlay');
  transitionTo(currentFrame-1);
});

document.getElementById('btnNext').addEventListener('click',function(){
  if(playing){playing=false;if(playTimer)cancelAnimationFrame(playTimer);}
  document.getElementById('btnPlay').textContent=t('btnPlay');
  transitionTo(currentFrame+1);
});

document.getElementById('btnPlay').addEventListener('click',function(){
  if(playing){
    playing=false;if(playTimer)cancelAnimationFrame(playTimer);
    document.getElementById('btnPlay').textContent=t('btnPlay');
  } else {
    playing=true;
    document.getElementById('btnPlay').textContent=t('btnPause');
    if(currentFrame>=totalFrames-1)currentFrame=-1;
    function autoPlay(){
      if(!playing)return;
      if(currentFrame<totalFrames-1){
        transitionTo(currentFrame+1);
        playTimer=setTimeout(function(){requestAnimationFrame(autoPlay)},1800);
      } else {
        playing=false;
        document.getElementById('btnPlay').textContent=t('btnPlay');
      }
    }
    autoPlay();
  }
});

refreshI18N();
resize();
setTimeout(resize,200);
setTimeout(resize,600);
document.fonts.ready.then(function(){resize()});
})();
</script>
</body>
</html>
