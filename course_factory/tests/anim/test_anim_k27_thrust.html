<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
var CONFIG = {
  style: 'mech',
  totalFrames: 5,
  i18n: {
    title:    {en:'THRUST PRINCIPLE', cn:'\u63a8\u529b\u539f\u7406'},
    subtitle: {en:'Why faster exhaust = more thrust', cn:'\u4e3a\u4ec0\u4e48\u55b7\u6c14\u8d8a\u5feb\u63a8\u529b\u8d8a\u5927'},
    // Frame 0
    f0_title: {en:'BALLOON ROCKET', cn:'\u6c14\u7403\u706b\u7bad'},
    f0_desc:  {en:'Air rushes out, balloon flies forward', cn:'\u7a7a\u6c14\u5411\u540e\u55b7\u51fa\uff0c\u6c14\u7403\u5411\u524d\u98de'},
    f0_gas:   {en:'EXHAUST', cn:'\u55b7\u51fa\u6c14\u4f53'},
    f0_force: {en:'THRUST', cn:'\u63a8\u529b'},
    f0_eq:    {en:'Momentum of gas = Momentum of balloon (opposite)', cn:'\u6c14\u4f53\u52a8\u91cf = \u6c14\u7403\u52a8\u91cf\uff08\u65b9\u5411\u76f8\u53cd\uff09'},
    // Frame 1
    f1_title: {en:'THRUST EQUATION (Intuition)', cn:'\u63a8\u529b\u516c\u5f0f\uff08\u76f4\u89c9\u7248\uff09'},
    f1_eq:    {en:'F = dm/dt x Ve', cn:'F = dm/dt x Ve'},
    f1_dm:    {en:'dm/dt: mass flow rate', cn:'dm/dt: \u6bcf\u79d2\u55b7\u51fa\u591a\u5c11\u8d28\u91cf'},
    f1_ve:    {en:'Ve: exhaust velocity', cn:'Ve: \u55b7\u6c14\u901f\u5ea6'},
    f1_note:  {en:'More mass per second + faster exhaust = greater thrust', cn:'\u6bcf\u79d2\u55b7\u51fa\u8d8a\u591a + \u55b7\u5f97\u8d8a\u5feb = \u63a8\u529b\u8d8a\u5927'},
    // Frame 2
    f2_title:  {en:'WATER ROCKET', cn:'\u6c34\u706b\u7bad'},
    f2_desc:   {en:'Pressurized water jets out at high speed', cn:'\u52a0\u538b\u6c34\u9ad8\u901f\u55b7\u51fa'},
    f2_water:  {en:'WATER JET', cn:'\u6c34\u67f1'},
    f2_force:  {en:'THRUST ~100N', cn:'\u63a8\u529b ~100N'},
    f2_note:   {en:'Water is heavier than air -- more momentum per second', cn:'\u6c34\u6bd4\u7a7a\u6c14\u91cd\u2014\u2014\u6bcf\u79d2\u52a8\u91cf\u66f4\u5927'},
    // Frame 3
    f3_title: {en:'SOLID ROCKET', cn:'\u56fa\u4f53\u706b\u7bad'},
    f3_desc:  {en:'Burning propellant creates hot gas at extreme speed', cn:'\u71c3\u70e7\u63a8\u8fdb\u5242\u4ea7\u751f\u9ad8\u6e29\u71c3\u6c14\u6781\u9ad8\u901f\u55b7\u51fa'},
    f3_gas:   {en:'HOT GAS ~2500 m/s', cn:'\u9ad8\u6e29\u71c3\u6c14 ~2500 m/s'},
    f3_force: {en:'THRUST ~5000N+', cn:'\u63a8\u529b ~5000N+'},
    f3_note:  {en:'Extreme exhaust velocity = massive thrust', cn:'\u6781\u9ad8\u55b7\u6c14\u901f\u5ea6 = \u5de8\u5927\u63a8\u529b'},
    // Frame 4
    f4_title:  {en:'COMPARISON', cn:'\u4e09\u8005\u5bf9\u6bd4'},
    f4_balloon:{en:'BALLOON', cn:'\u6c14\u7403'},
    f4_water:  {en:'WATER ROCKET', cn:'\u6c34\u706b\u7bad'},
    f4_solid:  {en:'SOLID ROCKET', cn:'\u56fa\u4f53\u706b\u7bad'},
    f4_ve_label:{en:'EXHAUST VELOCITY', cn:'\u55b7\u6c14\u901f\u5ea6'},
    f4_thrust_label:{en:'THRUST', cn:'\u63a8\u529b'},
    f4_conclusion:{en:'Higher exhaust velocity = Greater thrust!', cn:'\u55b7\u6c14\u901f\u5ea6\u8d8a\u9ad8 = \u63a8\u529b\u8d8a\u5927\uff01'},
    // Guide
    guideTitle: {en:'VIEWING GUIDE', cn:'\u89c2\u770b\u6307\u5357'},
    g1: {en:'Observe exhaust direction vs thrust direction', cn:'\u89c2\u5bdf\u55b7\u6c14\u65b9\u5411\u4e0e\u63a8\u529b\u65b9\u5411\u7684\u5173\u7cfb'},
    g2: {en:'Notice how exhaust velocity affects thrust magnitude', cn:'\u6ce8\u610f\u55b7\u6c14\u901f\u5ea6\u5982\u4f55\u5f71\u54cd\u63a8\u529b\u5927\u5c0f'},
    g3: {en:'Compare three propulsion types in the final frame', cn:'\u5728\u6700\u540e\u4e00\u5e27\u5bf9\u6bd4\u4e09\u79cd\u63a8\u8fdb\u65b9\u5f0f'},
    // HUD
    hudL1: {en:'TYPE', cn:'\u7c7b\u578b'},
    hudL2: {en:'Ve (m/s)', cn:'Ve (m/s)'},
    hudL3: {en:'THRUST', cn:'\u63a8\u529b'},
    hudL4: {en:'dm/dt', cn:'dm/dt'},
  },
  hudLabels: ['hudL1', 'hudL2', 'hudL3', 'hudL4'],
  hudValues: [
    ['\u6c14\u7403','~5','~0.5N','~0.1 kg/s'],
    ['F=dm/dt\u00d7Ve','--','--','--'],
    ['\u6c34\u706b\u7bad','~20','~100N','~5 kg/s'],
    ['\u56fa\u4f53\u706b\u7bad','~2500','~5000N+','~2 kg/s'],
    ['\u5bf9\u6bd4','5 / 20 / 2500','0.5 / 100 / 5000+','--'],
  ],
  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

// Particle system for exhaust effects
var particles = [];
var animFrame = 0;

function spawnParticles(x, y, dirX, count, color, speed) {
  for (var i = 0; i < count; i++) {
    particles.push({
      x: x, y: y + (Math.random() - 0.5) * 30,
      vx: dirX * (speed + Math.random() * speed * 0.5),
      vy: (Math.random() - 0.5) * speed * 0.3,
      life: 1, decay: 0.01 + Math.random() * 0.02,
      r: 1.5 + Math.random() * 2, color: color
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  var mc = AnimRuntime.modeColors;
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// Draw arrow with triangle head
function drawArrow(ctx, x1, y1, x2, y2, color, lw) {
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw || 1.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  var angle = Math.atan2(y2 - y1, x2 - x1);
  var hl = 8;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.4), y2 - hl * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.4), y2 - hl * Math.sin(angle + 0.4));
  ctx.closePath(); ctx.fill();
}

// Draw a simple rocket/balloon shape
function drawBalloon(ctx, x, y, w, h, color1, color2) {
  var g = ctx.createLinearGradient(x - w/2, y - h/2, x + w/2, y + h/2);
  g.addColorStop(0, color1); g.addColorStop(1, color2);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = color1;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawRocketBody(ctx, x, y, w, h, color1, color2, withNozzle) {
  var g = ctx.createLinearGradient(x, y - h/2, x, y + h/2);
  g.addColorStop(0, color1); g.addColorStop(1, color2);
  ctx.fillStyle = g;
  // Body
  ctx.beginPath();
  ctx.moveTo(x - w/2, y + h/2);
  ctx.lineTo(x - w/2, y - h/3);
  ctx.quadraticCurveTo(x, y - h/2 - 10, x + w/2, y - h/3);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = color1; ctx.lineWidth = 1; ctx.stroke();
  // Nozzle
  if (withNozzle) {
    ctx.fillStyle = color2;
    ctx.beginPath();
    ctx.moveTo(x - w/3, y + h/2);
    ctx.lineTo(x - w/2.2, y + h/2 + 12);
    ctx.lineTo(x + w/2.2, y + h/2 + 12);
    ctx.lineTo(x + w/3, y + h/2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = color1; ctx.lineWidth = 0.8; ctx.stroke();
  }
  // Fins
  ctx.fillStyle = color2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(x - w/2, y + h/3);
  ctx.lineTo(x - w/2 - 10, y + h/2 + 5);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w/2, y + h/3);
  ctx.lineTo(x + w/2 + 10, y + h/2 + 5);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawCornerTicks(ctx, x, y, w, h, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
  var s = 10;
  ctx.beginPath(); ctx.moveTo(x, y + s); ctx.lineTo(x, y); ctx.lineTo(x + s, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + w - s, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + h - s); ctx.lineTo(x, y + h); ctx.lineTo(x + s, y + h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + w - s, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - s); ctx.stroke();
  ctx.globalAlpha = 1;
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;
  var mc = AnimRuntime.modeColors;

  // Update particles animation
  animFrame++;
  if (animFrame % 3 === 0) {
    if (f === 0) spawnParticles(cx - 30, cy + 10, -1, 2, P.primary, 2);
    if (f === 2) spawnParticles(cx - 10, cy + 50, 0, 3, 'oklch(0.6 0.15 230)', 1.5);
    if (f === 3) spawnParticles(cx - 10, cy + 80, 0, 4, P.primary, 3);
  }
  updateParticles();

  if (f === 0) {
    // Frame 0: Balloon rocket
    return [
      {id:'f0title', type:'label', text:t('f0_title'), x:cx, y:40, color:P.primary, size:16, align:'center', font:'Space Grotesk'},
      {id:'f0desc', type:'label', text:t('f0_desc'), x:cx, y:65, color:mc.dim || P.muted, size:11, align:'center'},
      {id:'balloon', type:'custom', x:cx + 40, y:cy - 20},
      {id:'f0eq_box', type:'custom', x:cx, y:H - 65},
      {id:'f0eq', type:'label', text:t('f0_eq'), x:cx, y:H - 50, color:P.primary, size:10, align:'center', font:'JetBrains Mono'},
    ];
  }
  if (f === 1) {
    // Frame 1: Thrust equation intuition
    return [
      {id:'f1title', type:'label', text:t('f1_title'), x:cx, y:40, color:P.primary, size:16, align:'center', font:'Space Grotesk'},
      {id:'f1eq', type:'label', text:t('f1_eq'), x:cx, y:cy - 50, color:P.primary, size:28, align:'center', font:'Space Grotesk'},
      {id:'f1dm', type:'label', text:t('f1_dm'), x:cx - 100, y:cy + 10, color:mc.text || '#e2e8f0', size:12, align:'center'},
      {id:'f1ve', type:'label', text:t('f1_ve'), x:cx + 100, y:cy + 10, color:mc.text || '#e2e8f0', size:12, align:'center'},
      {id:'f1note_box', type:'custom', x:cx, y:cy + 60},
      {id:'f1note', type:'label', text:t('f1_note'), x:cx, y:cy + 80, color:P.primary, size:11, align:'center', font:'JetBrains Mono'},
    ];
  }
  if (f === 2) {
    // Frame 2: Water rocket
    return [
      {id:'f2title', type:'label', text:t('f2_title'), x:cx, y:40, color:P.primary, size:16, align:'center', font:'Space Grotesk'},
      {id:'f2desc', type:'label', text:t('f2_desc'), x:cx, y:65, color:mc.dim || P.muted, size:11, align:'center'},
      {id:'waterrocket', type:'custom', x:cx + 30, y:cy - 10},
      {id:'f2note_box', type:'custom', x:cx, y:H - 65},
      {id:'f2note', type:'label', text:t('f2_note'), x:cx, y:H - 50, color:P.primary, size:10, align:'center', font:'JetBrains Mono'},
    ];
  }
  if (f === 3) {
    // Frame 3: Solid rocket
    return [
      {id:'f3title', type:'label', text:t('f3_title'), x:cx, y:40, color:P.primary, size:16, align:'center', font:'Space Grotesk'},
      {id:'f3desc', type:'label', text:t('f3_desc'), x:cx, y:65, color:mc.dim || P.muted, size:11, align:'center'},
      {id:'solidrocket', type:'custom', x:cx + 30, y:cy - 30},
      {id:'f3note_box', type:'custom', x:cx, y:H - 65},
      {id:'f3note', type:'label', text:t('f3_note'), x:cx, y:H - 50, color:P.primary, size:10, align:'center', font:'JetBrains Mono'},
    ];
  }
  if (f === 4) {
    // Frame 4: Comparison chart
    return [
      {id:'f4title', type:'label', text:t('f4_title'), x:cx, y:35, color:P.primary, size:16, align:'center', font:'Space Grotesk'},
      {id:'comparison', type:'custom', x:cx, y:cy},
      {id:'f4conclusion', type:'label', text:t('f4_conclusion'), x:cx, y:H - 40, color:P.primary, size:13, align:'center', font:'Space Grotesk'},
    ];
  }
  return [];
}

function customDrawElement(ctx, el, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var mc = AnimRuntime.modeColors;
  var textColor = mc.text || '#e2e8f0';
  var dimColor = mc.dim || '#a3a3a3';
  var accentColor = P.primary;

  if (el.id === 'balloon') {
    var bx = el.x, by = el.y;
    // Draw balloon body
    drawBalloon(ctx, bx, by, 50, 60, accentColor, P.primaryDim || 'oklch(0.55 0.16 50)');
    // Nozzle opening at bottom-left
    ctx.strokeStyle = dimColor; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx - 8, by + 30); ctx.lineTo(bx - 20, by + 40);
    ctx.stroke();
    // Exhaust arrow (leftward)
    drawArrow(ctx, bx - 25, by + 40, bx - 100, by + 40, 'oklch(0.6 0.15 230)', 1.5);
    ctx.font = '700 9px "JetBrains Mono"';
    ctx.fillStyle = 'oklch(0.6 0.15 230)';
    ctx.textAlign = 'center';
    ctx.fillText(t('f0_gas'), bx - 70, by + 55);
    // Thrust arrow (rightward)
    drawArrow(ctx, bx + 30, by, bx + 100, by, accentColor, 2);
    ctx.fillStyle = accentColor;
    ctx.fillText(t('f0_force'), bx + 70, by - 12);
    // Draw exhaust particles
    drawParticles(ctx);
    return true;
  }

  if (el.id === 'waterrocket') {
    var rx = el.x, ry = el.y;
    // Water rocket body
    drawRocketBody(ctx, rx, ry, 30, 80, 'oklch(0.6 0.15 230)', 'oklch(0.4 0.12 230)', true);
    // Water jet downward from nozzle
    for (var wi = 0; wi < 15; wi++) {
      ctx.globalAlpha = 0.6 - wi * 0.03;
      ctx.fillStyle = 'oklch(0.65 0.17 230)';
      ctx.beginPath();
      ctx.arc(rx + (Math.random() - 0.5) * (5 + wi), ry + 52 + wi * 5, 2 - wi * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Water jet arrow (downward)
    drawArrow(ctx, rx, ry + 55, rx, ry + 130, 'oklch(0.65 0.17 230)', 1.5);
    ctx.font = '700 9px "JetBrains Mono"';
    ctx.fillStyle = 'oklch(0.65 0.17 230)';
    ctx.textAlign = 'center';
    ctx.fillText(t('f2_water'), rx + 50, ry + 100);
    // Thrust arrow (upward)
    drawArrow(ctx, rx, ry - 50, rx, ry - 110, accentColor, 2);
    ctx.fillStyle = accentColor;
    ctx.fillText(t('f2_force'), rx + 55, ry - 85);
    drawParticles(ctx);
    return true;
  }

  if (el.id === 'solidrocket') {
    var sx = el.x, sy = el.y;
    // Solid rocket body (larger)
    drawRocketBody(ctx, sx, sy, 35, 100, accentColor, P.primaryDim || 'oklch(0.55 0.16 50)', true);
    // Hot gas exhaust (downward, intense)
    for (var gi = 0; gi < 25; gi++) {
      var spread = gi * 1.2;
      ctx.globalAlpha = 0.7 - gi * 0.025;
      ctx.fillStyle = gi < 8 ? 'oklch(0.9 0.15 60)' : accentColor;
      ctx.shadowColor = accentColor;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(sx + (Math.random() - 0.5) * spread, sy + 62 + gi * 4.5, 2.5 - gi * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    // Hot gas label
    drawArrow(ctx, sx, sy + 65, sx, sy + 155, accentColor, 1.5);
    ctx.font = '700 9px "JetBrains Mono"';
    ctx.fillStyle = accentColor;
    ctx.textAlign = 'center';
    ctx.fillText(t('f3_gas'), sx + 65, sy + 120);
    // Thrust arrow (upward, strong)
    drawArrow(ctx, sx, sy - 60, sx, sy - 140, accentColor, 2.5);
    ctx.fillStyle = accentColor;
    ctx.fillText(t('f3_force'), sx + 60, sy - 105);
    drawParticles(ctx);
    return true;
  }

  // Equation/note boxes (panel with corner ticks)
  if (el.id === 'f0eq_box' || el.id === 'f1note_box' || el.id === 'f2note_box' || el.id === 'f3note_box') {
    var bw = 380, bh = 32;
    var bx2 = el.x - bw/2, by2 = el.y - bh/2;
    ctx.fillStyle = 'oklch(0.18 0.04 55 / 0.6)';
    ctx.beginPath();
    ctx.roundRect(bx2, by2, bw, bh, 14);
    ctx.fill();
    ctx.strokeStyle = 'oklch(0.35 0.05 55 / 0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    drawCornerTicks(ctx, bx2, by2, bw, bh, accentColor);
    return true;
  }

  if (el.id === 'comparison') {
    var cx2 = el.x, cy2 = el.y;
    var colW = 130, rowH = 40;
    var startX = cx2 - colW * 1.5 - 30;
    var startY = cy2 - 55;

    // Header row
    ctx.font = '700 10px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillStyle = dimColor;
    ctx.fillText('', startX + colW/2, startY);
    ctx.fillText(t('f4_ve_label'), startX + colW * 1.5 + 30, startY);
    ctx.fillText(t('f4_thrust_label'), startX + colW * 2.8 + 30, startY);

    // Separator line
    ctx.strokeStyle = 'oklch(0.35 0.05 55 / 0.35)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(startX - 20, startY + 12);
    ctx.lineTo(startX + colW * 3.2 + 30, startY + 12);
    ctx.stroke();

    var items = [
      {name: t('f4_balloon'), ve: '~5 m/s', thrust: '~0.5 N', barW: 0.05},
      {name: t('f4_water'),   ve: '~20 m/s', thrust: '~100 N', barW: 0.2},
      {name: t('f4_solid'),   ve: '~2500 m/s', thrust: '~5000+ N', barW: 1.0},
    ];

    for (var ri = 0; ri < items.length; ri++) {
      var ry2 = startY + 30 + ri * rowH;
      var item = items[ri];

      // Name
      ctx.font = '700 11px "Space Grotesk"';
      ctx.fillStyle = textColor;
      ctx.textAlign = 'left';
      ctx.fillText(item.name, startX, ry2);

      // Ve value
      ctx.font = '700 11px "JetBrains Mono"';
      ctx.fillStyle = accentColor;
      ctx.textAlign = 'center';
      ctx.fillText(item.ve, startX + colW * 1.5 + 30, ry2);

      // Thrust value
      ctx.fillText(item.thrust, startX + colW * 2.8 + 30, ry2);

      // Thrust bar
      var barX = startX + colW * 2.2;
      var barMaxW = 100;
      ctx.fillStyle = 'oklch(0.18 0.04 55 / 0.4)';
      ctx.beginPath();
      ctx.roundRect(barX - 60, ry2 + 6, barMaxW, 6, 999);
      ctx.fill();
      ctx.fillStyle = accentColor;
      ctx.shadowColor = accentColor;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.roundRect(barX - 60, ry2 + 6, barMaxW * item.barW, 6, 999);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    return true;
  }

  return false;
}

function drawBg(ctx, W, H, mode) {
  var mc = AnimRuntime.modeColors;
  var P = AnimRuntime.PAL;
  // Deep space gradient with mech tint
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, mc.bg1 || 'oklch(0.12 0.04 55)');
  g.addColorStop(1, mc.bg2 || 'oklch(0.18 0.06 55)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Grid
  var gridC = mc.grid || 'oklch(0.35 0.05 55 / 0.06)';
  ctx.strokeStyle = gridC;
  ctx.lineWidth = 0.5;
  var step = mc.gridStep || 64;
  for (var x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // Star field
  ctx.fillStyle = 'oklch(0.9 0.04 55)';
  for (var i = 0; i < 20; i++) {
    ctx.globalAlpha = 0.15 + Math.random() * 0.25;
    ctx.beginPath();
    ctx.arc(((i * 137.5) % W), ((i * 83.7 + 20) % (H * 0.7)), 0.5 + Math.random() * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

AnimRuntime.boot();
</script>
