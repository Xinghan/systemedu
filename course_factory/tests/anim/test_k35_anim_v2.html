<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* ── Outer: sidebar + main ── */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;}
.lang-btn:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar h1{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);margin-top:4px;line-height:1.3;}
.sidebar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.06em;text-transform:uppercase;}
.sidebar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary,#50ffb0);margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* ── Main area: canvas + controls + hud ── */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">

<button class="lang-btn" id="langBtn">CN</button>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>

</div>

// ============================================================
// Animation state
// ============================================================
var _time = 0;
var _idleTimer = null;
var _prevFrameK35 = -1;
var _frameCheckTimer = null;
var animState = {progress: 0, frameTracked: -1};
var animTimer = null;

// Seeded RNG for deterministic particles
var _rngSeed = 35;
function seededRand() {
  _rngSeed = (_rngSeed * 1103515245 + 12345) & 0x7fffffff;
  return (_rngSeed & 0xffff) / 0xffff;
}
function resetSeed(s) { _rngSeed = s; }

// Pre-generate particle arrays for streamlines
var streamParticles = [];
(function() {
  resetSeed(777);
  for (var i = 0; i < 60; i++) {
    streamParticles.push({
      xOff: seededRand() * 200 - 100,
      yOff: seededRand() * 120 - 60,
      speed: 0.3 + seededRand() * 0.7,
      phase: seededRand() * Math.PI * 2,
      size: 1 + seededRand() * 2
    });
  }
})();

// Pre-generate molecule positions for density frame
var moleculesSeaLevel = [];
var moleculesAltitude = [];
(function() {
  resetSeed(888);
  for (var i = 0; i < 80; i++) {
    moleculesSeaLevel.push({
      x: seededRand() * 180,
      y: seededRand() * 160,
      r: 1.5 + seededRand() * 1.5,
      vx: (seededRand() - 0.5) * 0.8,
      vy: (seededRand() - 0.5) * 0.8
    });
  }
  resetSeed(999);
  for (var i = 0; i < 25; i++) {
    moleculesAltitude.push({
      x: seededRand() * 180,
      y: seededRand() * 160,
      r: 1.2 + seededRand() * 1.0,
      vx: (seededRand() - 0.5) * 0.5,
      vy: (seededRand() - 0.5) * 0.5
    });
  }
})();

function startAnim(targetFrame) {
  if (animTimer) { cancelAnimationFrame(animTimer); animTimer = null; }
  animState = {progress: 0, frameTracked: targetFrame};
  var lastTime = 0;
  function tick(ts) {
    if (animState.frameTracked !== AnimRuntime.currentFrame) return;
    if (!lastTime) lastTime = ts;
    var delta = (ts - lastTime) / 1000;
    lastTime = ts;
    animState.progress += delta * 0.5;
    if (animState.progress > 1.0) animState.progress = 1.0;
    AnimRuntime.drawFrame(AnimRuntime.currentFrame);
    if (animState.progress < 1.0) {
      animTimer = requestAnimationFrame(tick);
    }
  }
  animTimer = requestAnimationFrame(tick);
}

function startIdleTick() {
  if (_idleTimer) return;
  var lastTs = 0;
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    _time += (ts - lastTs) / 1000;
    lastTs = ts;
    AnimRuntime.drawFrame(AnimRuntime.currentFrame);
    _idleTimer = requestAnimationFrame(loop);
  }
  _idleTimer = requestAnimationFrame(loop);
}

function frameCheck() {
  var cf = AnimRuntime.currentFrame;
  if (cf !== _prevFrameK35) {
    _prevFrameK35 = cf;
    startAnim(cf);
  }
  _frameCheckTimer = requestAnimationFrame(frameCheck);
}
_frameCheckTimer = requestAnimationFrame(frameCheck);
startIdleTick();

// ============================================================
// Audio (muted by default)
// ============================================================
var soundMuted = true;
var audioCtx = null;

function playWhoosh() {
  if (soundMuted) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.2)) * 0.08;
  }
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start();
}

// ============================================================
// Drawing helpers
// ============================================================

// Draw a simplified rocket shape
// cx,cy = nose tip, rocketH = total height, rocketW = body width
function drawRocket(ctx2, cx, cy, rocketH, rocketW, P, showFlame) {
  var bodyH = rocketH * 0.65;
  var noseH = rocketH * 0.25;
  var finH = rocketH * 0.15;
  var bodyTop = cy + noseH;
  var bodyBot = bodyTop + bodyH;

  // Nose cone
  ctx2.beginPath();
  ctx2.moveTo(cx, cy);
  ctx2.quadraticCurveTo(cx + rocketW * 0.6, bodyTop - noseH * 0.2, cx + rocketW / 2, bodyTop);
  ctx2.lineTo(cx - rocketW / 2, bodyTop);
  ctx2.quadraticCurveTo(cx - rocketW * 0.6, bodyTop - noseH * 0.2, cx, cy);
  ctx2.closePath();
  ctx2.fillStyle = P.primary;
  ctx2.fill();

  // Body
  var bGrad = ctx2.createLinearGradient(cx - rocketW / 2, bodyTop, cx + rocketW / 2, bodyTop);
  bGrad.addColorStop(0, '#555');
  bGrad.addColorStop(0.3, '#888');
  bGrad.addColorStop(0.7, '#888');
  bGrad.addColorStop(1, '#555');
  ctx2.fillStyle = bGrad;
  ctx2.fillRect(cx - rocketW / 2, bodyTop, rocketW, bodyH);

  // Fins
  ctx2.fillStyle = P.primaryDim;
  // Left fin
  ctx2.beginPath();
  ctx2.moveTo(cx - rocketW / 2, bodyBot - finH);
  ctx2.lineTo(cx - rocketW / 2 - rocketW * 0.4, bodyBot + 2);
  ctx2.lineTo(cx - rocketW / 2, bodyBot + 2);
  ctx2.closePath();
  ctx2.fill();
  // Right fin
  ctx2.beginPath();
  ctx2.moveTo(cx + rocketW / 2, bodyBot - finH);
  ctx2.lineTo(cx + rocketW / 2 + rocketW * 0.4, bodyBot + 2);
  ctx2.lineTo(cx + rocketW / 2, bodyBot + 2);
  ctx2.closePath();
  ctx2.fill();

  // Flame
  if (showFlame) {
    var flameH = 15 + Math.sin(_time * 8) * 5;
    var flameGrad = ctx2.createLinearGradient(cx, bodyBot, cx, bodyBot + flameH);
    flameGrad.addColorStop(0, 'rgba(255,200,50,0.9)');
    flameGrad.addColorStop(0.5, 'rgba(255,100,20,0.6)');
    flameGrad.addColorStop(1, 'rgba(255,50,10,0)');
    ctx2.fillStyle = flameGrad;
    ctx2.beginPath();
    ctx2.moveTo(cx - rocketW * 0.3, bodyBot);
    ctx2.quadraticCurveTo(cx, bodyBot + flameH, cx + rocketW * 0.3, bodyBot);
    ctx2.closePath();
    ctx2.fill();
  }
}

// Draw flowing streamlines around a rocket area
function drawStreamlines(ctx2, cx, cy, count, spread, speed, color, alpha) {
  ctx2.save();
  ctx2.globalAlpha = alpha;
  for (var i = 0; i < Math.min(count, streamParticles.length); i++) {
    var sp = streamParticles[i];
    var px = cx + sp.xOff * (spread / 100);
    var rawY = ((_time * speed * sp.speed + sp.phase) % 3.0) / 3.0;
    var py = cy - 80 + rawY * 160;
    ctx2.fillStyle = color;
    ctx2.globalAlpha = alpha * (1 - Math.abs(rawY - 0.5) * 1.5);
    ctx2.beginPath();
    ctx2.arc(px, py, sp.size, 0, Math.PI * 2);
    ctx2.fill();
  }
  ctx2.restore();
}

// Draw a drag arrow (horizontal)
function drawDragArrow(ctx2, x1, y1, x2, color, thickness, glowColor) {
  ctx2.save();
  if (glowColor) {
    ctx2.shadowColor = glowColor;
    ctx2.shadowBlur = 12;
  }
  ctx2.strokeStyle = color;
  ctx2.lineWidth = thickness;
  ctx2.beginPath();
  ctx2.moveTo(x1, y1);
  ctx2.lineTo(x2, y1);
  ctx2.stroke();
  // arrowhead
  var dir = x2 > x1 ? 1 : -1;
  var hs = thickness * 2.5;
  ctx2.fillStyle = color;
  ctx2.beginPath();
  ctx2.moveTo(x2, y1);
  ctx2.lineTo(x2 - dir * hs, y1 - hs * 0.6);
  ctx2.lineTo(x2 - dir * hs, y1 + hs * 0.6);
  ctx2.closePath();
  ctx2.fill();
  ctx2.restore();
}

// Draw bar chart for v-squared
function drawBarChart(ctx2, x, y, barW, maxH, values, maxVal, colors, labels, P) {
  var gap = 6;
  var totalW = values.length * (barW + gap) - gap;
  var startX = x - totalW / 2;

  for (var i = 0; i < values.length; i++) {
    var bx = startX + i * (barW + gap);
    var bh = (values[i] / maxVal) * maxH;
    var targetH = bh * Math.min(animState.progress * 2, 1.0);

    // Bar glow
    ctx2.save();
    ctx2.shadowColor = colors[i];
    ctx2.shadowBlur = 6;
    var barGrad = ctx2.createLinearGradient(bx, y - targetH, bx, y);
    barGrad.addColorStop(0, colors[i]);
    barGrad.addColorStop(1, colors[i] + '88');
    ctx2.fillStyle = barGrad;
    ctx2.fillRect(bx, y - targetH, barW, targetH);
    ctx2.restore();

    // Value on top
    ctx2.fillStyle = P.text;
    ctx2.font = "bold 8px 'Space Grotesk',sans-serif";
    ctx2.textAlign = 'center';
    ctx2.fillText(values[i], bx + barW / 2, y - targetH - 5);

    // Label below
    ctx2.fillStyle = P.muted;
    ctx2.font = "9px 'Inter','Noto Sans SC',sans-serif";
    ctx2.fillText(labels[i], bx + barW / 2, y + 12);
  }
}

// Draw airflow shape outline
function drawAeroShape(ctx2, cx, cy, shapeType, scaleW, scaleH, P) {
  ctx2.save();
  ctx2.strokeStyle = P.text;
  ctx2.lineWidth = 1.5;
  ctx2.fillStyle = P.glass;

  switch(shapeType) {
    case 'flat':
      ctx2.fillRect(cx - 2, cy - scaleH, 4, scaleH * 2);
      ctx2.strokeRect(cx - 2, cy - scaleH, 4, scaleH * 2);
      break;
    case 'sphere':
      ctx2.beginPath();
      ctx2.arc(cx, cy, scaleW * 0.5, 0, Math.PI * 2);
      ctx2.fill(); ctx2.stroke();
      break;
    case 'cylinder':
      ctx2.fillRect(cx - scaleW * 0.35, cy - scaleH * 0.5, scaleW * 0.7, scaleH);
      ctx2.strokeRect(cx - scaleW * 0.35, cy - scaleH * 0.5, scaleW * 0.7, scaleH);
      break;
    case 'bullet':
      ctx2.beginPath();
      ctx2.moveTo(cx - scaleW * 0.5, cy);
      ctx2.quadraticCurveTo(cx - scaleW * 0.5, cy - scaleH * 0.5, cx, cy - scaleH * 0.6);
      ctx2.quadraticCurveTo(cx + scaleW * 0.5, cy - scaleH * 0.5, cx + scaleW * 0.5, cy);
      ctx2.lineTo(cx + scaleW * 0.35, cy + scaleH * 0.4);
      ctx2.lineTo(cx - scaleW * 0.35, cy + scaleH * 0.4);
      ctx2.closePath();
      ctx2.fill(); ctx2.stroke();
      break;
    case 'streamlined':
      ctx2.beginPath();
      ctx2.moveTo(cx, cy - scaleH * 0.7);
      ctx2.bezierCurveTo(cx + scaleW * 0.35, cy - scaleH * 0.5,
                          cx + scaleW * 0.25, cy + scaleH * 0.5,
                          cx, cy + scaleH * 0.7);
      ctx2.bezierCurveTo(cx - scaleW * 0.25, cy + scaleH * 0.5,
                          cx - scaleW * 0.35, cy - scaleH * 0.5,
                          cx, cy - scaleH * 0.7);
      ctx2.fill(); ctx2.stroke();
      break;
  }

  // Draw airflow lines around shape
  ctx2.strokeStyle = P.tertiary;
  ctx2.lineWidth = 0.8;
  ctx2.globalAlpha = 0.5 + Math.sin(_time * 2) * 0.15;
  var flowCount = shapeType === 'flat' ? 5 : (shapeType === 'streamlined' ? 3 : 4);
  for (var i = 0; i < flowCount; i++) {
    var yOff = (i - (flowCount - 1) / 2) * (scaleH * 0.4);
    var deflection = shapeType === 'flat' ? scaleW * 0.8 : (shapeType === 'streamlined' ? scaleW * 0.15 : scaleW * 0.4);
    ctx2.beginPath();
    ctx2.moveTo(cx - scaleW * 1.2, cy + yOff);
    ctx2.quadraticCurveTo(cx, cy + yOff + (yOff > 0 ? deflection : -deflection),
                          cx + scaleW * 1.2, cy + yOff);
    ctx2.stroke();
  }

  ctx2.restore();
}

// Draw animated molecules
function drawMolecules(ctx2, molecules, ox, oy, boxW, boxH, color, alpha) {
  ctx2.save();
  ctx2.globalAlpha = alpha;
  for (var i = 0; i < molecules.length; i++) {
    var m = molecules[i];
    var mx = ox + ((m.x + m.vx * _time * 30) % boxW + boxW) % boxW;
    var my = oy + ((m.y + m.vy * _time * 30) % boxH + boxH) % boxH;
    ctx2.fillStyle = color;
    ctx2.beginPath();
    ctx2.arc(mx, my, m.r, 0, Math.PI * 2);
    ctx2.fill();
  }
  ctx2.restore();
}

// Draw cross-section circle with radius line
function drawCrossSection(ctx2, cx, cy, radius, color, label, P) {
  ctx2.save();
  // Filled circle
  ctx2.fillStyle = color + '33';
  ctx2.beginPath();
  ctx2.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx2.fill();
  // Outline
  ctx2.strokeStyle = color;
  ctx2.lineWidth = 1.5;
  ctx2.stroke();
  // Radius line
  ctx2.setLineDash([3, 3]);
  ctx2.beginPath();
  ctx2.moveTo(cx, cy);
  ctx2.lineTo(cx + radius, cy);
  ctx2.stroke();
  ctx2.setLineDash([]);
  // "r" label
  ctx2.fillStyle = color;
  ctx2.font = "bold 9px 'Space Grotesk',sans-serif";
  ctx2.textAlign = 'center';
  ctx2.fillText(label, cx + radius / 2, cy - 5);
  ctx2.restore();
}

// ============================================================
// customDrawElement -- handles all custom rendering
// ============================================================
function customDrawElement(ctx2, el, W, H) {
  var P = AnimRuntime.PAL;

  if (el.type === 'rocketWithStream') {
    drawRocket(ctx2, el.x, el.y, el.rocketH, el.rocketW, P, el.showFlame);
    drawStreamlines(ctx2, el.x, el.y + el.rocketH * 0.3, el.streamCount, el.spread || 60, el.streamSpeed || 1, el.streamColor || P.tertiary, el.streamAlpha || 0.4);
    return true;
  }

  if (el.type === 'dragArrowCustom') {
    var prog = Math.min(animState.progress * 1.5, 1.0);
    var len = el.length * prog;
    drawDragArrow(ctx2, el.x, el.y, el.x - len, el.color, el.thickness, el.glowColor);
    return true;
  }

  if (el.type === 'barChart') {
    drawBarChart(ctx2, el.x, el.y, el.barW, el.maxH, el.values, el.maxVal, el.colors, el.labels, P);
    return true;
  }

  if (el.type === 'aeroShape') {
    drawAeroShape(ctx2, el.x, el.y, el.shape, el.scaleW, el.scaleH, P);
    return true;
  }

  if (el.type === 'moleculeBox') {
    // Box outline
    ctx2.save();
    ctx2.strokeStyle = el.borderColor || P.outline;
    ctx2.lineWidth = 1;
    ctx2.setLineDash([4, 4]);
    ctx2.strokeRect(el.x, el.y, el.bw, el.bh);
    ctx2.setLineDash([]);
    ctx2.restore();
    drawMolecules(ctx2, el.molecules, el.x, el.y, el.bw, el.bh, el.dotColor, el.dotAlpha || 0.7);
    return true;
  }

  if (el.type === 'crossSection') {
    drawCrossSection(ctx2, el.x, el.y, el.radius, el.color, el.label, P);
    return true;
  }

  if (el.type === 'formulaHighlight') {
    // Draw formula with each variable colored differently
    var parts = el.parts; // [{text, color}]
    ctx2.save();
    ctx2.font = "bold " + (el.size || 16) + "px 'Space Grotesk','Inter',sans-serif";
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    // Measure total width
    var totalW = 0;
    for (var i = 0; i < parts.length; i++) {
      totalW += ctx2.measureText(parts[i].text).width;
    }
    var startX = el.x - totalW / 2;
    // Glow pass
    for (var i = 0; i < parts.length; i++) {
      var pw = ctx2.measureText(parts[i].text).width;
      ctx2.shadowColor = parts[i].color;
      ctx2.shadowBlur = 8 + Math.sin(_time * 2 + i) * 3;
      ctx2.fillStyle = parts[i].color;
      ctx2.textAlign = 'left';
      ctx2.fillText(parts[i].text, startX, el.y);
      startX += pw;
    }
    ctx2.restore();
    return true;
  }

  if (el.type === 'rocketSideView') {
    drawRocket(ctx2, el.x, el.y, el.rocketH, el.rocketW, P, el.showFlame);
    return true;
  }

  if (el.type === 'pulseCircle') {
    var pulse = 1 + Math.sin(_time * 3) * 0.08;
    ctx2.save();
    ctx2.beginPath();
    ctx2.arc(el.x, el.y, el.r * pulse, 0, Math.PI * 2);
    ctx2.strokeStyle = el.color;
    ctx2.lineWidth = 2;
    ctx2.shadowColor = el.color;
    ctx2.shadowBlur = 15;
    ctx2.stroke();
    ctx2.restore();
    return true;
  }

  return false;
}

    elems.push({id:'f4slimVal', type:'text', text:t('f4slimVal'), x:rightX, y:315, color:P.muted, size:9, align:'center'});

    // VS in middle
    elems.push({id:'f4vs', type:'label', text:'vs', x:cx, y:150, color:P.muted, size:14, align:'center', alpha:0.6});

    // Result
    var resAlpha = Math.min(Math.max((animState.progress - 0.4) * 2.5, 0), 1);
    elems.push({id:'f4ratio', type:'label', text:t('f4ratio'), x:cx, y:H-40, color:'#f5c842', size:14, align:'center', glow:'rgba(245,200,66,0.5)', alpha:resAlpha});
    elems.push({id:'f4insight', type:'text', text:t('f4insight'), x:cx, y:H-22, color:P.muted, size:10, align:'center', alpha:resAlpha});

    return elems;
  }

  return [];
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
