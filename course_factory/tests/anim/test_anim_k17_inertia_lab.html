<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
/* ── Top bar: lang-btn + title + guide toggle + frame indicator ── */
.top-bar{display:flex;align-items:center;gap:8px;padding:6px 12px 4px;min-height:36px;}
.lang-btn{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;flex-shrink:0;}
.top-bar .titles{flex:1;min-width:0;overflow:hidden;}
.top-bar h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(12px,1.8vw,16px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 12px var(--glow,rgba(80,255,176,0.3));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-bar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-bar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;flex-shrink:0;white-space:nowrap;}
/* ── Guide panel: collapsible, in document flow ── */
.guide-bar{background:rgba(0,0,0,0.3);overflow:hidden;transition:max-height 0.25s ease;}
.guide-bar.collapsed{max-height:0!important;padding:0 12px!important;}
.guide-bar-inner{padding:4px 12px 6px;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.guide-bar-inner ul{padding-left:16px;margin:0;}
.guide-bar-inner li{margin-bottom:1px;}
.guide-toggle{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.2);background:transparent;color:var(--primary,#50ffb0);flex-shrink:0;}
.guide-toggle .arrow{display:inline-block;transition:transform 0.2s;font-size:8px;margin-left:3px;}
.guide-bar.collapsed+.top-bar .guide-toggle .arrow,
.guide-toggle.collapsed .arrow{transform:rotate(-90deg);}
/* ── Canvas area ── */
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">
<!-- Top bar: lang button, title, guide toggle, frame indicator -->
<div class="top-bar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="titles"><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<button class="guide-toggle" id="guideToggle"><span id="guideTitle"></span><span class="arrow">&#9660;</span></button>
<div class="frame-ind" id="frameIndicator"></div>
</div>
<!-- Guide panel: document flow, collapsible -->
<div class="guide-bar" id="guide">
<div class="guide-bar-inner" id="guideContent"></div>
</div>
<!-- Canvas: fills remaining space, nothing overlaps it -->
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
// ============================================================
// Knode 17: Inertia Lab
// Newton's First Law through 4 classic experiments:
// Frame 0: Title
// Frame 1: Tablecloth pull - glass stays while cloth moves
// Frame 2: Coin stack trick - flick bottom coin, stack stays
// Frame 3: Ball on a cart - cart stops, ball keeps moving
// Frame 4: Summary - Newton's First Law statement
// ============================================================

var CONFIG = {
  style: 'helix_lab',
  totalFrames: 5,

  i18n: {
    title:     {en:'INERTIA LAB', cn:'\u60ef\u6027\u5b9e\u9a8c\u5ba4'},
    subtitle:  {en:"NEWTON'S FIRST LAW", cn:'\u725b\u987f\u7b2c\u4e00\u5b9a\u5f8b'},

    f0title:   {en:'WHY DOES THE CUP\nSTAY ON THE TABLE?', cn:'\u4e3a\u4ec0\u4e48\u676f\u5b50\n\u4e0d\u4f1a\u8ddf\u7740\u98de\u8d70\uff1f'},
    f0sub:     {en:'4 experiments reveal the secret', cn:'4\u4e2a\u5b9e\u9a8c\u63ed\u5f00\u79d8\u5bc6'},

    f1title:   {en:'TABLECLOTH PULL', cn:'\u62bd\u684c\u5e03\u5b9e\u9a8c'},
    f1desc:    {en:'Pull fast: cup stays!\nPull slow: cup slides off', cn:'\u5feb\u62bd\uff1a\u676f\u5b50\u4e0d\u52a8\uff01\n\u6162\u62bd\uff1a\u676f\u5b50\u88ab\u62d6\u8d70'},
    f1why:     {en:'The cup wants to STAY\nwhere it is (inertia)', cn:'\u676f\u5b50\u201c\u60f3\u201d\u7559\u5728\u539f\u5730\n\u2014\u2014\u8fd9\u5c31\u662f\u60ef\u6027'},
    fast:      {en:'FAST!', cn:'\u5feb\u62bd\uff01'},
    slow:      {en:'slow...', cn:'\u6162\u62bd...'},

    f2title:   {en:'COIN STACK TRICK', cn:'\u786c\u5e01\u53e0\u53e0\u4e50'},
    f2desc:    {en:'Flick the bottom coin out —\nthe stack stays!', cn:'\u5f39\u8d70\u6700\u4e0b\u9762\u7684\u786c\u5e01\n\u4e0a\u9762\u7684\u4e0d\u4f1a\u5012\uff01'},
    f2why:     {en:'Each coin\'s inertia\nkeeps it in place', cn:'\u6bcf\u679a\u786c\u5e01\u7684\u60ef\u6027\n\u8ba9\u5b83\u7559\u5728\u539f\u4f4d'},

    f3title:   {en:'BALL ON A CART', cn:'\u5c0f\u8f66\u4e0a\u7684\u7403'},
    f3desc:    {en:'Cart hits the wall and stops.\nBall keeps rolling forward!', cn:'\u5c0f\u8f66\u649e\u5899\u505c\u4e0b\u6765\n\u7403\u7ee7\u7eed\u5411\u524d\u6eda\uff01'},
    f3why:     {en:'The ball was moving and\nwants to KEEP moving', cn:'\u7403\u5728\u8fd0\u52a8\u4e2d\uff0c\n\u5b83\u201c\u60f3\u201d\u7ee7\u7eed\u8fd0\u52a8'},

    f4title:   {en:"NEWTON'S FIRST LAW", cn:'\u725b\u987f\u7b2c\u4e00\u5b9a\u5f8b'},
    f4law:     {en:'An object at rest stays at rest.\nAn object in motion stays in motion.\nUnless a force acts on it.', cn:'\u9759\u6b62\u7684\u4e1c\u897f\u4f1a\u4e00\u76f4\u9759\u6b62\u3002\n\u8fd0\u52a8\u7684\u4e1c\u897f\u4f1a\u4e00\u76f4\u8fd0\u52a8\u3002\n\u9664\u975e\u6709\u529b\u4f5c\u7528\u5728\u5b83\u8eab\u4e0a\u3002'},
    f4aka:     {en:'Also known as: the Law of Inertia', cn:'\u53c8\u53eb\uff1a\u60ef\u6027\u5b9a\u5f8b'},

    hudExpt:   {en:'EXPERIMENT', cn:'\u5b9e\u9a8c'},
    hudConcept:{en:'CONCEPT', cn:'\u6982\u5ff5'},
    hudForce:  {en:'FORCE', cn:'\u529b'},
    hudResult: {en:'RESULT', cn:'\u7ed3\u679c'},

    inertia:   {en:'Inertia', cn:'\u60ef\u6027'},
    noForce:   {en:'No ext. force', cn:'\u65e0\u5916\u529b'},
    staysStill:{en:'Stays still', cn:'\u4fdd\u6301\u9759\u6b62'},
    keepsMoving:{en:'Keeps moving', cn:'\u7ee7\u7eed\u8fd0\u52a8'},

    guideTitle:{en:'Key Ideas', cn:'\u6838\u5fc3\u8981\u70b9'},
    g1:        {en:'Objects resist changes to their motion', cn:'\u7269\u4f53\u4f1a\u62b5\u6297\u8fd0\u52a8\u72b6\u6001\u7684\u6539\u53d8'},
    g2:        {en:'Resting objects want to stay at rest', cn:'\u9759\u6b62\u7684\u7269\u4f53\u201c\u60f3\u201d\u4fdd\u6301\u9759\u6b62'},
    g3:        {en:'Moving objects want to keep moving', cn:'\u8fd0\u52a8\u7684\u7269\u4f53\u201c\u60f3\u201d\u7ee7\u7eed\u8fd0\u52a8'},
    g4:        {en:'This resistance to change is called inertia', cn:'\u8fd9\u79cd\u62b5\u6297\u53eb\u505a\u60ef\u6027'},
  },

  hudLabels: ['hudExpt', 'hudConcept', 'hudForce', 'hudResult'],
  hudValues: [
    ['--',            '--',       '--',         '--'],
    ['\u684c\u5e03',  '\u60ef\u6027', '\u65e0\u5916\u529b', '\u676f\u5b50\u4e0d\u52a8'],
    ['\u786c\u5e01',  '\u60ef\u6027', '\u65e0\u5916\u529b', '\u5806\u53e0\u4e0d\u5012'],
    ['\u5c0f\u8f66',  '\u60ef\u6027', '\u5c0f\u8f66\u505c\u6b62', '\u7403\u7ee7\u7eed\u6eda'],
    ['--',            '\u60ef\u6027\u5b9a\u5f8b', '--', '\u725b\u987f\u7b2c\u4e00'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],
};

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H) {
  var els = [];
  var t = CONFIG.i18n;

  if (f === 0) {
    // Title
    els.push({type:'text', text:t.f0title, x:W/2, y:H*0.35, font:'bold 30px Space Grotesk', fill:'#50ffb0', align:'center', baseline:'middle'});
    els.push({type:'text', text:t.f0sub, x:W/2, y:H*0.58, font:'14px Noto Sans SC', fill:'#aaabb0', align:'center'});

    // Decorative: a cup sitting peacefully
    els.push({type:'custom', draw: function(ctx) {
      var cx = W/2, cy = H*0.78;
      // Table surface
      ctx.fillStyle = '#2a2e3a';
      ctx.fillRect(cx - 100, cy, 200, 8);
      // Cup
      ctx.fillStyle = '#4488cc';
      ctx.beginPath();
      ctx.moveTo(cx - 15, cy - 35);
      ctx.lineTo(cx - 12, cy);
      ctx.lineTo(cx + 12, cy);
      ctx.lineTo(cx + 15, cy - 35);
      ctx.closePath();
      ctx.fill();
      // Question mark
      ctx.font = 'bold 24px Space Grotesk';
      ctx.fillStyle = '#ffcc44';
      ctx.textAlign = 'center';
      ctx.fillText('?', cx, cy - 50);
    }});
  }

  else if (f === 1) {
    // Tablecloth pull
    els.push({type:'text', text:t.f1title, x:W/2, y:H*0.06, font:'bold 18px Space Grotesk', fill:'#50ffb0', align:'center'});

    // Two scenarios side by side
    els.push({type:'custom', draw: function(ctx) {
      var lang = window.__anim_lang || 'cn';
      var leftX = W * 0.25;
      var rightX = W * 0.75;
      var tableY = H * 0.55;

      // -- LEFT: FAST PULL (success) --
      // Table
      ctx.fillStyle = '#3a3e4a';
      ctx.fillRect(leftX - 80, tableY, 160, 10);

      // Cloth (pulled away, shown mid-pull)
      ctx.fillStyle = '#cc4444';
      ctx.globalAlpha = 0.7;
      ctx.fillRect(leftX - 60, tableY - 3, 80, 6);
      ctx.globalAlpha = 1;

      // Arrow showing fast pull
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(leftX + 30, tableY);
      ctx.lineTo(leftX + 80, tableY);
      ctx.stroke();
      // Arrowhead
      ctx.fillStyle = '#50ffb0';
      ctx.beginPath();
      ctx.moveTo(leftX + 80, tableY - 5);
      ctx.lineTo(leftX + 90, tableY);
      ctx.lineTo(leftX + 80, tableY + 5);
      ctx.closePath();
      ctx.fill();

      // Cup (stays in place!)
      ctx.fillStyle = '#4488cc';
      ctx.beginPath();
      ctx.moveTo(leftX - 15, tableY - 40);
      ctx.lineTo(leftX - 12, tableY);
      ctx.lineTo(leftX + 12, tableY);
      ctx.lineTo(leftX + 15, tableY - 40);
      ctx.closePath();
      ctx.fill();

      // Checkmark
      ctx.font = 'bold 24px Space Grotesk';
      ctx.fillStyle = '#50ffb0';
      ctx.textAlign = 'center';
      ctx.fillText('\u2713', leftX, tableY - 55);

      ctx.font = 'bold 14px Space Grotesk';
      ctx.fillText(t.fast[lang], leftX, tableY + 35);

      // -- RIGHT: SLOW PULL (failure) --
      ctx.fillStyle = '#3a3e4a';
      ctx.fillRect(rightX - 80, tableY, 160, 10);

      // Cloth (dragging the cup)
      ctx.fillStyle = '#cc4444';
      ctx.globalAlpha = 0.7;
      ctx.fillRect(rightX - 60, tableY - 3, 120, 6);
      ctx.globalAlpha = 1;

      // Arrow showing slow pull
      ctx.strokeStyle = '#ff6b6b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rightX + 30, tableY);
      ctx.lineTo(rightX + 60, tableY);
      ctx.stroke();

      // Cup (tilting, being dragged)
      ctx.save();
      ctx.translate(rightX + 20, tableY - 20);
      ctx.rotate(0.3);
      ctx.fillStyle = '#4488cc';
      ctx.beginPath();
      ctx.moveTo(-15, -20);
      ctx.lineTo(-12, 20);
      ctx.lineTo(12, 20);
      ctx.lineTo(15, -20);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // X mark
      ctx.font = 'bold 24px Space Grotesk';
      ctx.fillStyle = '#ff6b6b';
      ctx.textAlign = 'center';
      ctx.fillText('\u2717', rightX, tableY - 55);

      ctx.font = 'bold 14px Space Grotesk';
      ctx.fillText(t.slow[lang], rightX, tableY + 35);

      // Description and explanation
      var descLines = t.f1desc[lang].split('\n');
      ctx.font = '13px Noto Sans SC';
      ctx.fillStyle = '#f6f6fc';
      ctx.textAlign = 'center';
      descLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, H*0.17 + i * 20);
      });

      // Why box
      ctx.fillStyle = 'rgba(80,255,176,0.08)';
      ctx.fillRect(W*0.2, H*0.72, W*0.6, H*0.2);
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 1;
      ctx.strokeRect(W*0.2, H*0.72, W*0.6, H*0.2);

      var whyLines = t.f1why[lang].split('\n');
      ctx.font = 'bold 13px Noto Sans SC';
      ctx.fillStyle = '#50ffb0';
      whyLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, H*0.78 + i * 20);
      });
    }});
  }

  else if (f === 2) {
    // Coin stack trick
    els.push({type:'text', text:t.f2title, x:W/2, y:H*0.06, font:'bold 18px Space Grotesk', fill:'#50ffb0', align:'center'});

    els.push({type:'custom', draw: function(ctx) {
      var lang = window.__anim_lang || 'cn';
      var cx = W/2;
      var baseY = H * 0.6;

      // Table surface
      ctx.fillStyle = '#3a3e4a';
      ctx.fillRect(cx - 120, baseY, 240, 10);

      // Stack of 5 coins
      var coinH = 8;
      var coinW = 40;
      var colors = ['#d4a038','#c4902e','#d4a038','#c4902e','#d4a038'];

      for (var i = 0; i < 5; i++) {
        var cy = baseY - (i + 1) * coinH;
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        ctx.ellipse(cx, cy, coinW/2, coinH/2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#a0802a';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Bottom coin being flicked out (offset)
      var flickedX = cx + 80;
      ctx.fillStyle = '#d4a038';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.ellipse(flickedX, baseY - coinH, coinW/2, coinH/2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Flick arrow
      ctx.strokeStyle = '#ff6b6b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx + 25, baseY - coinH);
      ctx.lineTo(flickedX - 25, baseY - coinH);
      ctx.stroke();
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.moveTo(flickedX - 25, baseY - coinH - 4);
      ctx.lineTo(flickedX - 15, baseY - coinH);
      ctx.lineTo(flickedX - 25, baseY - coinH + 4);
      ctx.closePath();
      ctx.fill();

      // "Stack stays!" label with arrow
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.moveTo(cx, baseY - 5*coinH - 15);
      ctx.lineTo(cx, baseY - 5*coinH - 40);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.font = 'bold 13px Space Grotesk';
      ctx.fillStyle = '#50ffb0';
      ctx.textAlign = 'center';
      ctx.fillText('\u2713', cx, baseY - 5*coinH - 50);

      // Description
      var descLines = t.f2desc[lang].split('\n');
      ctx.font = '13px Noto Sans SC';
      ctx.fillStyle = '#f6f6fc';
      descLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, H*0.15 + i * 20);
      });

      // Why box
      ctx.fillStyle = 'rgba(80,255,176,0.08)';
      ctx.fillRect(W*0.2, H*0.75, W*0.6, H*0.18);
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 1;
      ctx.strokeRect(W*0.2, H*0.75, W*0.6, H*0.18);

      var whyLines = t.f2why[lang].split('\n');
      ctx.font = 'bold 13px Noto Sans SC';
      ctx.fillStyle = '#50ffb0';
      whyLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, H*0.81 + i * 20);
      });
    }});
  }

  else if (f === 3) {
    // Ball on a cart
    els.push({type:'text', text:t.f3title, x:W/2, y:H*0.06, font:'bold 18px Space Grotesk', fill:'#50ffb0', align:'center'});

    els.push({type:'custom', draw: function(ctx) {
      var lang = window.__anim_lang || 'cn';
      var groundY = H * 0.6;

      // Ground line
      ctx.strokeStyle = '#3a3e4a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(W*0.05, groundY);
      ctx.lineTo(W*0.95, groundY);
      ctx.stroke();

      // Wall
      ctx.fillStyle = '#5a5e6a';
      ctx.fillRect(W*0.72, groundY - 60, 12, 60);
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 11px Space Grotesk';
      ctx.textAlign = 'center';
      ctx.fillText('WALL', W*0.72 + 6, groundY - 65);

      // Cart (stopped at wall)
      var cartX = W * 0.65;
      var cartW = 60, cartH = 25;
      ctx.fillStyle = '#3388aa';
      ctx.fillRect(cartX - cartW/2, groundY - cartH - 10, cartW, cartH);
      // Wheels
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(cartX - 15, groundY - 8, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cartX + 15, groundY - 8, 8, 0, Math.PI*2);
      ctx.fill();

      // "STOP" on cart
      ctx.font = 'bold 10px Space Grotesk';
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('STOP', cartX, groundY - cartH + 5);

      // Ball (has continued past the cart)
      var ballX = W * 0.82;
      var ballR = 12;
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(ballX, groundY - ballR - 2, ballR, 0, Math.PI*2);
      ctx.fill();

      // Ball motion arrow
      ctx.strokeStyle = '#ffcc44';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cartX + cartW/2 + 5, groundY - cartH/2 - 10);
      ctx.lineTo(ballX - ballR - 5, groundY - ballR - 2);
      ctx.stroke();
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath();
      ctx.moveTo(ballX - ballR - 5, groundY - ballR - 7);
      ctx.lineTo(ballX - ballR + 5, groundY - ballR - 2);
      ctx.lineTo(ballX - ballR - 5, groundY - ballR + 3);
      ctx.closePath();
      ctx.fill();

      // Arrow showing original motion direction
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 2;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(W*0.25, groundY - cartH/2 - 10);
      ctx.lineTo(cartX - cartW/2 - 5, groundY - cartH/2 - 10);
      ctx.stroke();
      ctx.setLineDash([]);

      // Desc
      var descLines = t.f3desc[lang].split('\n');
      ctx.font = '13px Noto Sans SC';
      ctx.fillStyle = '#f6f6fc';
      ctx.textAlign = 'center';
      descLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, H*0.15 + i * 20);
      });

      // Why box
      ctx.fillStyle = 'rgba(80,255,176,0.08)';
      ctx.fillRect(W*0.2, H*0.75, W*0.6, H*0.18);
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 1;
      ctx.strokeRect(W*0.2, H*0.75, W*0.6, H*0.18);

      var whyLines = t.f3why[lang].split('\n');
      ctx.font = 'bold 13px Noto Sans SC';
      ctx.fillStyle = '#50ffb0';
      whyLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, H*0.81 + i * 20);
      });
    }});
  }

  else if (f === 4) {
    // Summary: Newton's First Law
    els.push({type:'text', text:t.f4title, x:W/2, y:H*0.1, font:'bold 22px Space Grotesk', fill:'#50ffb0', align:'center'});

    // Law text in a bordered box
    els.push({type:'custom', draw: function(ctx) {
      var lang = window.__anim_lang || 'cn';
      var boxX = W*0.12, boxW = W*0.76;
      var boxY = H*0.2, boxH = H*0.35;

      ctx.fillStyle = 'rgba(80,255,176,0.06)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeStyle = '#50ffb0';
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      var lawLines = t.f4law[lang].split('\n');
      ctx.font = 'bold 16px Noto Sans SC';
      ctx.fillStyle = '#f6f6fc';
      ctx.textAlign = 'center';
      lawLines.forEach(function(line, i) {
        ctx.fillText(line, W/2, boxY + 40 + i * 30);
      });

      // AKA line
      ctx.font = '13px Noto Sans SC';
      ctx.fillStyle = '#aaabb0';
      ctx.fillText(t.f4aka[lang], W/2, boxY + boxH - 15);

      // Three mini experiment icons below
      var iconY = H * 0.65;
      var icons = [
        {x: W*0.22, label: t.f1title[lang], col: '#50ffb0'},
        {x: W*0.50, label: t.f2title[lang], col: '#ffcc44'},
        {x: W*0.78, label: t.f3title[lang], col: '#ff6b6b'},
      ];

      icons.forEach(function(icon) {
        ctx.beginPath();
        ctx.arc(icon.x, iconY, 18, 0, Math.PI*2);
        ctx.strokeStyle = icon.col;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.font = 'bold 14px Space Grotesk';
        ctx.fillStyle = icon.col;
        ctx.fillText('\u2713', icon.x, iconY + 1);
        ctx.font = '11px Noto Sans SC';
        ctx.fillStyle = '#aaabb0';
        ctx.fillText(icon.label, icon.x, iconY + 35);
      });

      // Connecting line
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(icons[0].x + 20, iconY);
      ctx.lineTo(icons[1].x - 20, iconY);
      ctx.moveTo(icons[1].x + 20, iconY);
      ctx.lineTo(icons[2].x - 20, iconY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Bottom insight
      ctx.font = 'bold 14px Noto Sans SC';
      ctx.fillStyle = '#50ffb0';
      ctx.fillText(lang === 'cn' ? '\u6240\u6709\u5b9e\u9a8c\u90fd\u6307\u5411\u540c\u4e00\u6761\u89c4\u5f8b' : 'All experiments point to one law', W/2, H*0.92);
    }});
  }

  return els;
}

window.getFrameElements = getFrameElements;
</script>
</body>
</html>
