<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M11 — 一串乱跳的 alpha 强度值坍缩成一个均值</title>
<style>
  /* ===== F2 第 1 层 — 共享深空底 (theme_style/styles.css L8-21, 26 学科统一, 不换) ===== */
  :root{
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg: oklch(0.96 0.01 265);
    --fg-dim: oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold: oklch(0.85 0.14 85);

    /* ===== F2 第 2 层 — math accent (electric blue), Geometry Void ===== */
    --math: oklch(0.72 0.17 245);
    --math-dim: oklch(0.52 0.16 245);

    /* ===== F2 第 3 层 — math 5 色 palette (themes.js L97-103) ===== */
    --AXIS:     oklch(0.72 0.17 245); /* electric blue 主, mascot Pi 主体 / 数轴 / 当前数据点 */
    --PROOF:    oklch(0.52 0.16 245); /* 中蓝, 累加过程线 / 次级元素 / mascot 面 */
    --SHADOW:   oklch(0.35 0.10 245); /* 深蓝, 底纹 / 已抵消的偏差 / 阴影 */
    --SOLUTION: oklch(0.92 0.08 240); /* 近白蓝, 坍缩后的均值 / 高光 */
    --QED:      oklch(0.85 0.14 85);  /* 金 (math 5色含 QED=金), 均值锁定 key moment */
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{
    background: var(--bg-0);
    color: var(--fg);
    font-family: 'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
    display: flex;
    height: 100vh;
  }

  /* ===== 200px 左侧 sidebar ===== */
  .sidebar{
    width: 200px;
    flex-shrink: 0;
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .brand{ border-bottom: 1px solid var(--line); padding-bottom: 10px; }
  .brand .badge{
    display: inline-block;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--math);
    background: var(--bg-2);
    padding: 3px 7px;
    border: 1px solid var(--line);
    box-shadow: 2px 2px 0 var(--bg-0);
    margin-bottom: 6px;
  }
  .brand h1{ font-size: 14px; font-weight: 700; color: var(--fg); line-height: 1.3; }
  .brand .sub{
    font-size: 10px; color: var(--fg-mute); margin-top: 4px;
    font-family: 'JetBrains Mono',ui-monospace,monospace; letter-spacing: 0.04em;
  }

  .mascot-box{
    background: var(--bg-2);
    border: 1px solid var(--line);
    box-shadow: 3px 3px 0 var(--bg-0);
    padding: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .mascot-box .label{
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 9px; color: var(--fg-dim); letter-spacing: 0.08em;
  }
  .mascot-box .name{ font-size: 11px; color: var(--fg); font-weight: 600; margin-top: 2px; }

  .guide{ display: flex; flex-direction: column; gap: 8px; }
  .guide-item{
    font-size: 11px; line-height: 1.45; color: var(--fg-dim);
    padding-left: 9px; border-left: 2px solid var(--math);
    padding-top: 2px; padding-bottom: 2px;
  }

  .lang-btn{
    margin-top: auto;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--fg-dim);
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    box-shadow: 3px 3px 0 var(--bg-0);
    padding: 7px 10px;
    cursor: pointer;
  }
  .lang-btn:hover{ color: var(--math); border-color: var(--math); }

  /* ===== 右侧主舞台 ===== */
  .stage{ flex: 1; position: relative; overflow: hidden; }
  #canvas{ display: block; width: 100%; height: 100%; }

  .hud{
    position: absolute; top: 16px; right: 18px;
    text-align: right;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    pointer-events: none;
  }
  .hud .phase{
    font-size: 12px; letter-spacing: 0.1em; color: var(--math);
    text-transform: uppercase;
  }
  .hud .metric{ font-size: 11px; color: var(--fg-dim); margin-top: 5px; }
  .hud .metric b{ color: var(--SOLUTION); font-weight: 700; }

  .subcue{
    position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
    max-width: 70%; text-align: center;
    font-size: 14px; line-height: 1.5; color: var(--fg);
    background: oklch(0.18 0.04 265 / 0.82);
    border: 1px solid var(--line);
    box-shadow: 4px 4px 0 var(--bg-0);
    padding: 9px 18px;
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="badge" data-i18n="badge">MTH-06 / EEG</span>
      <h1 data-i18n="title">把一串乱跳的 alpha 值<br>坍缩成一个均值</h1>
      <div class="sub">M11 · MEAN = SUM / n</div>
    </div>

    <div class="mascot-box">
      <svg width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
        <!-- mascot Pi: 旋转四面体 -->
        <polygon id="piA" points="20,5 34,30 6,30" fill="var(--PROOF)" stroke="var(--AXIS)" stroke-width="1.5"/>
        <polygon id="piB" points="20,5 34,30 20,22" fill="var(--SHADOW)" stroke="var(--AXIS)" stroke-width="1"/>
        <text x="20" y="26" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" fill="var(--SOLUTION)" font-weight="700">Pi</text>
      </svg>
      <div>
        <div class="label">MASCOT</div>
        <div class="name">Pi</div>
      </div>
    </div>

    <div class="guide">
      <div class="guide-item" data-i18n="g1">闭眼时 alpha 强度每刻都在乱跳, 单看一个数没意义</div>
      <div class="guide-item" data-i18n="g2">把一串值排开, 逐个加总再除以个数, 上下噪声相互抵消</div>
      <div class="guide-item" data-i18n="g3">它们坍缩成一条稳定的均值线 — 一个代表整段的数</div>
    </div>

    <button class="lang-btn" id="langBtn" type="button">中 / EN</button>
  </aside>

  <main class="stage">
    <canvas id="canvas"></canvas>
    <div class="hud">
      <div class="phase" id="hudPhase">SCATTER</div>
      <div class="metric">n = <b id="hudN">0</b> / 32</div>
      <div class="metric">SUM = <b id="hudSum">0.0</b></div>
      <div class="metric">MEAN = <b id="hudMean">0.0</b> µV</div>
    </div>
    <div class="subcue" id="subcue">闭眼记录的 alpha 强度在乱跳</div>
  </main>

<script>
(function(){
  'use strict';

  // ---------- i18n ----------
  const I18N = {
    zh: {
      badge: 'MTH-06 / EEG',
      title: '把一串乱跳的 alpha 值<br>坍缩成一个均值',
      g1: '闭眼时 alpha 强度每刻都在乱跳, 单看一个数没意义',
      g2: '把一串值排开, 逐个加总再除以个数, 上下噪声相互抵消',
      g3: '它们坍缩成一条稳定的均值线 — 一个代表整段的数',
      cue_scatter: '闭眼记录的 alpha 强度在乱跳 — 一串值, 上下都是噪声',
      cue_line: '把这一串值在数轴上排开: 没有一个数能单独代表它',
      cue_sum: '从左到右逐个加总: SUM 不断累积',
      cue_div: 'SUM 除以个数 n = 32 — 这就是平均',
      cue_collapse: '散点向均值线坍缩: 高的拉低、低的拉高, 噪声抵消',
      cue_lock: '坍缩成一个稳定的数: 闭眼 alpha 均值 ≈ 11.2 µV',
      cue_compare: '同样算法量睁眼: 均值只有 ≈ 4.1 µV — 闭眼 alpha 明显更强',
      lab_open: '睁眼',
      lab_close: '闭眼',
      lab_mean: '均值',
      lab_samples: '一串值',
    },
    en: {
      badge: 'MTH-06 / EEG',
      title: 'Collapse a jittery string of<br>alpha values into one mean',
      g1: 'With eyes closed, alpha strength jitters every instant — one sample means nothing',
      g2: 'Lay the values out, add them up, divide by count — the noise cancels out',
      g3: 'They collapse onto one stable mean line — a single number for the whole stretch',
      cue_scatter: 'Recorded alpha strength jitters — a string of values, noise up and down',
      cue_line: 'Lay the string out on an axis: no single value can represent it',
      cue_sum: 'Add them left to right: SUM keeps accumulating',
      cue_div: 'Divide SUM by the count n = 32 — that is the mean',
      cue_collapse: 'Points collapse to the mean line: highs pulled down, lows pulled up',
      cue_lock: 'Collapsed to one stable number: eyes-closed alpha mean ≈ 11.2 µV',
      cue_compare: 'Same math on eyes-open: mean only ≈ 4.1 µV — closed-eye alpha is far stronger',
      lab_open: 'eyes open',
      lab_close: 'eyes closed',
      lab_mean: 'mean',
      lab_samples: 'string of values',
    }
  };
  let lang = 'zh';

  function refreshI18N(){
    const t = I18N[lang];
    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const k = el.getAttribute('data-i18n');
      if (t[k] !== undefined) el.innerHTML = t[k];
    });
    document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
  }

  document.getElementById('langBtn').addEventListener('click', ()=>{
    lang = (lang === 'zh') ? 'en' : 'zh';
    refreshI18N();
  });
  refreshI18N();

  // ---------- canvas ----------
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const r = canvas.getBoundingClientRect();
    W = Math.max(640, r.width);
    H = Math.max(400, r.height);
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- 数据: 唯一核心对象 = 一串 alpha 强度值 ----------
  // 闭眼 alpha: 围绕 11.2 µV 上下乱跳 (噪声 ±, 但均值高)
  // 睁眼 alpha: 围绕 4.1 µV  上下乱跳 (均值低) —— 对比用
  const N = 32;
  function genSamples(meanVal, jitter, seed){
    const arr = [];
    let s = seed;
    for (let i = 0; i < N; i++){
      // 确定性伪随机, 保证可复现 + 噪声上下都有
      s = (s * 9301 + 49297) % 233280;
      const r = s / 233280;            // 0..1
      const noise = (r - 0.5) * 2 * jitter;
      arr.push(meanVal + noise);
    }
    return arr;
  }
  const closedSamples = genSamples(11.2, 6.5, 12345);
  const openSamples   = genSamples(4.1, 3.2, 6789);

  function meanOf(arr){ let s = 0; for (const v of arr) s += v; return s / arr.length; }
  const closedMean = meanOf(closedSamples);  // ~11.2
  const openMean   = meanOf(openSamples);    // ~4.1

  // 数轴范围 (µV)
  const V_MIN = 0, V_MAX = 20;

  // ---------- 阶段时间轴 (连续演化, 不是翻页) ----------
  // 围绕同一串值: 乱跳 -> 排开 -> 累加 -> 除n -> 坍缩 -> 锁定 -> 切到睁眼再坍缩对比
  // 单位: 秒. 总长一轮后无限循环.
  const PH = [
    { key:'SCATTER',  cue:'cue_scatter',  t:0,    dur:4.0 },
    { key:'LAY OUT',  cue:'cue_line',     t:4.0,  dur:3.5 },
    { key:'SUM',      cue:'cue_sum',      t:7.5,  dur:4.0 },
    { key:'DIVIDE n', cue:'cue_div',      t:11.5, dur:2.5 },
    { key:'COLLAPSE', cue:'cue_collapse', t:14.0, dur:4.5 },
    { key:'MEAN LOCK',cue:'cue_lock',     t:18.5, dur:3.5 },
    { key:'OPEN vs CLOSED', cue:'cue_compare', t:22.0, dur:6.0 },
  ];
  const CYCLE = 28.0;

  function easeInOut(x){ return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2,2)/2; }
  function clamp01(x){ return Math.max(0, Math.min(1, x)); }

  // 把 µV 值映射到画布 y (高值在上)
  function valToY(v, plotTop, plotBot){
    const f = (v - V_MIN) / (V_MAX - V_MIN);
    return plotBot - f * (plotBot - plotTop);
  }

  // ---------- 渲染 ----------
  const hudPhase = document.getElementById('hudPhase');
  const hudN = document.getElementById('hudN');
  const hudSum = document.getElementById('hudSum');
  const hudMean = document.getElementById('hudMean');
  const subcue = document.getElementById('subcue');

  const piA = document.getElementById('piA');
  const piB = document.getElementById('piB');

  const startT = performance.now();

  function colorVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  const C = {
    axis: colorVar('--AXIS'),
    proof: colorVar('--PROOF'),
    shadow: colorVar('--SHADOW'),
    solution: colorVar('--SOLUTION'),
    qed: colorVar('--QED'),
    line: colorVar('--line'),
    lineStrong: colorVar('--line-strong'),
    fgDim: colorVar('--fg-dim'),
    fgMute: colorVar('--fg-mute'),
    bg2: colorVar('--bg-2'),
  };

  function currentPhase(tt){
    for (let i = PH.length - 1; i >= 0; i--){
      if (tt >= PH[i].t) return { idx:i, ph:PH[i], local:(tt - PH[i].t) };
    }
    return { idx:0, ph:PH[0], local:tt };
  }

  function draw(now){
    const elapsed = (now - startT) / 1000;
    const tt = elapsed % CYCLE;
    const { idx, ph, local } = currentPhase(tt);
    const localFrac = clamp01(local / ph.dur);

    ctx.clearRect(0, 0, W, H);

    // 布局
    const padL = 90, padR = 70, padT = 70, padB = 90;
    const plotLeft = padL, plotRight = W - padR;
    const plotTop = padT, plotBot = H - padB;
    const baseY = (plotTop + plotBot) / 2;   // SCATTER 时序列基线
    const plotW = plotRight - plotLeft;

    // 当前展示哪一串值: 阶段 0-5 闭眼, 阶段 6 切换到对比
    const showCompare = (ph.key === 'OPEN vs CLOSED');

    // ---- 背景: 数轴 (LAY OUT 起淡入) ----
    const axisFade = idx >= 1 ? clamp01((idx===1)? localFrac : 1) : 0;
    if (axisFade > 0){
      ctx.globalAlpha = axisFade;
      // 竖直数值轴 (µV)
      ctx.strokeStyle = C.lineStrong;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(plotLeft - 8, plotTop - 10);
      ctx.lineTo(plotLeft - 8, plotBot + 10);
      ctx.stroke();
      // 刻度
      ctx.fillStyle = C.fgMute;
      ctx.font = "11px 'JetBrains Mono', monospace";
      ctx.textAlign = 'right';
      for (let v = 0; v <= 20; v += 5){
        const y = valToY(v, plotTop, plotBot);
        ctx.fillText(String(v), plotLeft - 16, y + 4);
        ctx.strokeStyle = C.line;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(plotLeft - 8, y); ctx.lineTo(plotRight, y); ctx.stroke();
      }
      ctx.save();
      ctx.translate(plotLeft - 52, baseY);
      ctx.rotate(-Math.PI/2);
      ctx.textAlign = 'center';
      ctx.fillStyle = C.fgDim;
      ctx.font = "12px 'JetBrains Mono', monospace";
      ctx.fillText('alpha (uV)', 0, 0);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // ---- 主体: 一串值 closedSamples ----
    const samples = closedSamples;
    const trueMean = closedMean;

    // 每个点的 x 位置: 排开后均匀分布
    function xOf(i){ return plotLeft + 16 + (plotW - 32) * (i / (N - 1)); }

    // 阶段插值参数
    // layout: 点从"挤在中间随时间乱跳"过渡到"沿 x 排开"
    let layoutP = 0;
    if (idx === 0) layoutP = 0;
    else if (idx === 1) layoutP = easeInOut(localFrac);
    else layoutP = 1;

    // sum 进度: SUM 阶段从左到右逐个点亮累加
    let sumCount = 0;
    if (idx < 2) sumCount = 0;
    else if (idx === 2) sumCount = Math.floor(easeInOut(localFrac) * N);
    else sumCount = N;
    sumCount = Math.max(0, Math.min(N, sumCount));

    // collapse 进度: 点向均值线坍缩
    let collapseP = 0;
    if (idx < 4) collapseP = 0;
    else if (idx === 4) collapseP = easeInOut(localFrac);
    else collapseP = 1;

    // 均值线淡入 (DIVIDE 起)
    let meanFade = 0;
    if (idx === 3) meanFade = easeInOut(localFrac);
    else if (idx >= 4) meanFade = 1;

    // SCATTER 时整串值随时间整体上下乱跳 (强调"乱跳的一串值")
    const jitterPhase = elapsed * 2.2;

    // running sum 累加值
    let runSum = 0;
    for (let i = 0; i < sumCount; i++) runSum += samples[i];
    const shownMean = (sumCount === N) ? trueMean : (sumCount>0? runSum/sumCount : 0);

    // 均值线 y
    const meanY = valToY(trueMean, plotTop, plotBot);

    // ---- 画累加“扫描条” (SUM 阶段) ----
    if (idx === 2 && sumCount > 0 && sumCount < N){
      const sx = xOf(Math.min(sumCount, N-1));
      ctx.strokeStyle = C.qed;
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx, plotTop - 6); ctx.lineTo(sx, plotBot + 6); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // ---- 画均值线 ----
    if (meanFade > 0){
      ctx.save();
      ctx.globalAlpha = meanFade;
      ctx.strokeStyle = C.solution;
      ctx.lineWidth = 2.5;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(plotLeft, meanY);
      ctx.lineTo(plotRight, meanY);
      ctx.stroke();
      ctx.setLineDash([]);
      // 标签
      ctx.fillStyle = C.solution;
      ctx.font = "12px 'JetBrains Mono', monospace";
      ctx.textAlign = 'left';
      const meanLabel = (lang==='zh'? I18N.zh.lab_mean : I18N.en.lab_mean);
      ctx.fillText(meanLabel + ' = ' + trueMean.toFixed(1) + ' uV', plotRight - 150, meanY - 9);
      ctx.restore();
    }

    // ---- 画每个数据点 ----
    for (let i = 0; i < N; i++){
      // SCATTER: 挤在中间区域随机带 + 整体乱跳
      const scatterY = baseY + Math.sin(jitterPhase + i*1.7) * 60 + ((i%7)-3)*14;
      const scatterX = plotLeft + 20 + (plotW - 40) * (0.35 + 0.3*Math.sin(i*2.1));

      // LAID OUT: 沿 x 排开, y = 真实值
      const laidX = xOf(i);
      const laidY = valToY(samples[i], plotTop, plotBot);

      // 当前 x / y (layout 插值)
      let x = scatterX + (laidX - scatterX) * layoutP;
      let y = scatterY + (laidY - scatterY) * layoutP;

      // COLLAPSE: y 向均值线坍缩
      y = y + (meanY - y) * collapseP;

      // 颜色: 累加已纳入的点用 AXIS 亮, 未纳入用 PROOF 暗
      const counted = (i < sumCount);
      let r = 4.5;
      if (idx === 0){ // 乱跳时呼吸
        r = 4.5 + Math.sin(jitterPhase*1.3 + i)*1.2;
      }
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      if (collapseP > 0.6){
        // 坍缩后融为均值线上的点
        ctx.fillStyle = C.solution;
        ctx.globalAlpha = 0.85;
      } else if (counted){
        ctx.fillStyle = C.axis;
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = C.proof;
        ctx.globalAlpha = (idx===0)? 0.95 : 0.7;
      }
      ctx.fill();
      ctx.globalAlpha = 1;

      // 偏差竖线 (LAID OUT / COLLAPSE 时显示每个值到均值的距离, 表达"上下抵消")
      if (meanFade > 0 && collapseP < 0.95 && layoutP > 0.9){
        ctx.strokeStyle = C.shadow;
        ctx.globalAlpha = 0.5 * (1 - collapseP);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(laidX, laidY);
        ctx.lineTo(laidX, meanY);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // ---- 坍缩后: 收束成"一个数"的发光胶囊 (MEAN LOCK) ----
    if (idx === 5){
      const glow = 0.5 + 0.5*Math.sin(elapsed*4);
      const cx = plotLeft + plotW/2;
      ctx.save();
      ctx.globalAlpha = clamp01(localFrac*1.5);
      // 金色高亮 — key moment
      ctx.shadowColor = C.qed;
      ctx.shadowBlur = 18 + glow*12;
      ctx.fillStyle = C.bg2;
      ctx.strokeStyle = C.qed;
      ctx.lineWidth = 2;
      const bw = 220, bh = 56;
      roundRect(ctx, cx - bw/2, meanY - bh - 14, bw, bh, 8);
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = C.qed;
      ctx.font = "700 26px 'JetBrains Mono', monospace";
      ctx.textAlign = 'center';
      ctx.fillText(trueMean.toFixed(1) + ' uV', cx, meanY - 30);
      ctx.fillStyle = C.fgDim;
      ctx.font = "11px 'JetBrains Mono', monospace";
      ctx.fillText('MEAN = SUM / n', cx, meanY - 50);
      ctx.restore();
    }

    // ---- OPEN vs CLOSED 对比 (用同样坍缩算法演睁眼) ----
    if (showCompare){
      drawCompare(plotLeft, plotRight, plotTop, plotBot, plotW, localFrac, elapsed);
    }

    // ---- mascot Pi 旋转 ----
    if (piA && piB){
      const ang = (elapsed*40) % 360;
      piA.setAttribute('transform', `rotate(${ang} 20 20)`);
      piB.setAttribute('transform', `rotate(${-ang*0.6} 20 20)`);
    }

    // ---- HUD ----
    hudPhase.textContent = ph.key;
    hudN.textContent = String(sumCount);
    hudSum.textContent = runSum.toFixed(1);
    hudMean.textContent = (sumCount>0 ? shownMean.toFixed(1) : '0.0');

    // ---- subcue ----
    const cueText = I18N[lang][ph.cue] || '';
    if (subcue.textContent !== cueText) subcue.textContent = cueText;

    requestAnimationFrame(draw);
  }

  function roundRect(c, x, y, w, h, r){
    c.beginPath();
    c.moveTo(x+r, y);
    c.arcTo(x+w, y, x+w, y+h, r);
    c.arcTo(x+w, y+h, x, y+h, r);
    c.arcTo(x, y+h, x, y, r);
    c.arcTo(x, y, x+w, y, r);
    c.closePath();
  }

  // 对比阶段: 两串值 -> 各自坍缩成均值线, 闭眼高 / 睁眼低
  function drawCompare(plotLeft, plotRight, plotTop, plotBot, plotW, frac, elapsed){
    const cp = easeInOut(clamp01(frac*1.4));   // 坍缩进度
    const closedY = valToY(closedMean, plotTop, plotBot);
    const openY = valToY(openMean, plotTop, plotBot);

    function plotSet(samples, mean, col, lab, labKey){
      const my = valToY(mean, plotTop, plotBot);
      for (let i = 0; i < N; i++){
        const x = plotLeft + 16 + (plotW - 32) * (i/(N-1));
        const y0 = valToY(samples[i], plotTop, plotBot);
        const y = y0 + (my - y0)*cp;
        ctx.beginPath();
        ctx.arc(x, y, 3.6, 0, Math.PI*2);
        ctx.fillStyle = col;
        ctx.globalAlpha = (cp>0.6)? 0.85 : 0.65;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      // 均值线
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.setLineDash([8,6]);
      ctx.beginPath(); ctx.moveTo(plotLeft, my); ctx.lineTo(plotRight, my); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = col;
      ctx.font = "13px 'JetBrains Mono', monospace";
      ctx.textAlign = 'left';
      const labTxt = (lang==='zh'? I18N.zh[labKey] : I18N.en[labKey]);
      ctx.fillText(labTxt + ' = ' + mean.toFixed(1) + ' uV', plotLeft + 8, my - 8);
    }
    // 闭眼 (高, 用 SOLUTION 亮蓝 + QED 金标线强调) / 睁眼 (低, 用 PROOF 暗蓝)
    plotSet(openSamples, openMean, C.proof, 'open', 'lab_open');
    plotSet(closedSamples, closedMean, C.solution, 'closed', 'lab_close');

    // 差距箭头 (闭眼 - 睁眼)
    if (cp > 0.75){
      const ax = plotRight - 30;
      ctx.strokeStyle = C.qed;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(ax, openY); ctx.lineTo(ax, closedY); ctx.stroke();
      // 箭头端点
      ctx.beginPath(); ctx.moveTo(ax-4, closedY+6); ctx.lineTo(ax, closedY); ctx.lineTo(ax+4, closedY+6); ctx.stroke();
      ctx.fillStyle = C.qed;
      ctx.font = "12px 'JetBrains Mono', monospace";
      ctx.textAlign = 'left';
      ctx.fillText('+' + (closedMean-openMean).toFixed(1), ax + 8, (openY+closedY)/2);
    }
  }

  requestAnimationFrame(draw);
})();
</script>
