<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
/* ── Top bar: lang-btn + title + guide toggle + frame indicator ── */
.top-bar{display:flex;align-items:center;gap:8px;padding:6px 12px 4px;min-height:36px;}
.lang-btn{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;flex-shrink:0;}
.top-bar .titles{flex:1;min-width:0;overflow:hidden;}
.top-bar h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(12px,1.8vw,16px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 12px var(--glow,rgba(80,255,176,0.3));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-bar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-bar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;flex-shrink:0;white-space:nowrap;}
/* ── Guide panel: collapsible, in document flow ── */
.guide-bar{background:rgba(0,0,0,0.3);overflow:hidden;transition:max-height 0.25s ease;}
.guide-bar.collapsed{max-height:0!important;padding:0 12px!important;}
.guide-bar-inner{padding:4px 12px 6px;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.guide-bar-inner ul{padding-left:16px;margin:0;}
.guide-bar-inner li{margin-bottom:1px;}
.guide-toggle{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.2);background:transparent;color:var(--primary,#50ffb0);flex-shrink:0;}
.guide-toggle .arrow{display:inline-block;transition:transform 0.2s;font-size:8px;margin-left:3px;}
.guide-bar.collapsed+.top-bar .guide-toggle .arrow,
.guide-toggle.collapsed .arrow{transform:rotate(-90deg);}
/* ── Canvas area ── */
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">
<!-- Top bar: lang button, title, guide toggle, frame indicator -->
<div class="top-bar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="titles"><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<button class="guide-toggle" id="guideToggle"><span id="guideTitle"></span><span class="arrow">&#9660;</span></button>
<div class="frame-ind" id="frameIndicator"></div>
</div>
<!-- Guide panel: document flow, collapsible -->
<div class="guide-bar" id="guide">
<div class="guide-bar-inner" id="guideContent"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="../../../course_factory/runtime/animation_runtime.js"></script>

<script>
// ============================================================
// Knode 14: Glider vs Parachute - Descent Comparison
// Frame 0: Title
// Frame 1: Free fall (no device) - fast drop
// Frame 2: Glider - forward glide + slow descent
// Frame 3: Parachute - slow vertical descent
// Frame 4: Side-by-side comparison
// ============================================================

var CONFIG = {
  style: 'ares_mission',
  totalFrames: 5,

  i18n: {
    title:    {en:'GLIDER vs PARACHUTE', cn:'\u6ed1\u7fd4\u673a vs \u964d\u843d\u4f1e'},
    subtitle: {en:'The art of falling slowly', cn:'\u6162\u6162\u843d\u4e0b\u7684\u827a\u672f'},
    freefall: {en:'Free Fall', cn:'\u81ea\u7531\u4e0b\u843d'},
    glider:   {en:'Paper Glider', cn:'\u7eb8\u6ed1\u7fd4\u673a'},
    parachute:{en:'Parachute', cn:'\u964d\u843d\u4f1e'},
    compare:  {en:'Comparison', cn:'\u4e09\u8005\u5bf9\u6bd4'},
    introL1:  {en:'Three ways to come down from the sky', cn:'\u4ece\u5929\u4e0a\u4e0b\u6765\u7684\u4e09\u79cd\u65b9\u5f0f'},
    introL2:  {en:'Which one is safest?', cn:'\u54ea\u79cd\u6700\u5b89\u5168\uff1f'},
    fast:     {en:'FAST!', cn:'\u5f88\u5feb\uff01'},
    gentle:   {en:'Gentle glide', cn:'\u5e73\u7a33\u6ed1\u7fd4'},
    slow:     {en:'Very slow', cn:'\u975e\u5e38\u6162'},
    guideTitle:{en:'Key Concepts', cn:'\u6838\u5fc3\u6982\u5ff5'},
    g1:       {en:'Free fall: only gravity, no air help', cn:'\u81ea\u7531\u4e0b\u843d\uff1a\u53ea\u6709\u91cd\u529b\uff0c\u6ca1\u6709\u7a7a\u6c14\u5e2e\u52a9'},
    g2:       {en:'Glider: wings create lift', cn:'\u6ed1\u7fd4\u673a\uff1a\u7fc5\u8180\u4ea7\u751f\u5347\u529b'},
    g3:       {en:'Parachute: large area = big drag', cn:'\u964d\u843d\u4f1e\uff1a\u5927\u9762\u79ef = \u5927\u963b\u529b'},
    g4:       {en:'Rockets use parachutes to land safely', cn:'\u706b\u7bad\u7528\u964d\u843d\u4f1e\u5b89\u5168\u7740\u9646'},
    hudMode:  {en:'MODE', cn:'\u6a21\u5f0f'},
    hudSpeed: {en:'SPEED', cn:'\u901f\u5ea6'},
    hudLift:  {en:'LIFT', cn:'\u5347\u529b'},
    hudDrag:  {en:'DRAG', cn:'\u963b\u529b'},
  },

  hudLabels: ['hudMode', 'hudSpeed', 'hudLift', 'hudDrag'],
  hudValues: [
    ['--', '--', '--', '--'],
    ['\u81ea\u7531\u4e0b\u843d', '\u2191\u2191\u2191', '\u65e0', '\u6781\u5c0f'],
    ['\u7eb8\u6ed1\u7fd4\u673a', '\u2191', '\u6709\u2191', '\u4e2d\u7b49'],
    ['\u964d\u843d\u4f1e', '\u2193\u2193', '\u65e0', '\u6781\u5927\u2191\u2191'],
    ['\u5bf9\u6bd4', '--', '--', '--'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],
};

// Animation state
var animState = {time: 0, phase: 'idle'};
var animTimer = null;

function startAnim(frame) {
  if (animTimer) clearInterval(animTimer);
  animState = {time: 0, frame: frame};
  if (frame < 1) return;
  animTimer = setInterval(function() {
    animState.time += 0.025;
    if (animState.time > 4) animState.time = 0; // loop
    if (typeof AnimRuntime !== 'undefined' && AnimRuntime.requestRedraw) {
      AnimRuntime.requestRedraw();
    }
  }, 25);
}

function drawBg(ctx, W, H) {
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0c1428');
  grad.addColorStop(0.6, '#162040');
  grad.addColorStop(1, '#1a3020');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Ground
  ctx.fillStyle = '#2a3a28';
  ctx.fillRect(0, H * 0.85, W, H * 0.15);
  ctx.strokeStyle = 'rgba(80,255,176,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H * 0.85); ctx.lineTo(W, H * 0.85); ctx.stroke();
  // Grid
  ctx.strokeStyle = 'rgba(80,255,176,0.03)';
  ctx.lineWidth = 1;
  for (var x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H*0.85); ctx.stroke(); }
  for (var y = 0; y < H*0.85; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawGlider(ctx, x, y, scale) {
  var s = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  // Body
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath();
  ctx.moveTo(-30*s, 0);
  ctx.lineTo(30*s, 0);
  ctx.lineTo(20*s, -3*s);
  ctx.lineTo(-20*s, -3*s);
  ctx.closePath();
  ctx.fill();
  // Wings
  ctx.fillStyle = '#d0d8f0';
  ctx.beginPath();
  ctx.moveTo(-5*s, -2*s);
  ctx.lineTo(-40*s, 5*s);
  ctx.lineTo(-35*s, -2*s);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5*s, -2*s);
  ctx.lineTo(40*s, 5*s);
  ctx.lineTo(35*s, -2*s);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawParachute(ctx, x, y, scale) {
  var s = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  // Canopy
  ctx.fillStyle = 'rgba(80,255,176,0.5)';
  ctx.beginPath();
  ctx.arc(0, -30*s, 35*s, Math.PI, 0);
  ctx.fill();
  ctx.strokeStyle = '#50ffb0';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Lines
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-30*s, -25*s); ctx.lineTo(0, 10*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30*s, -25*s); ctx.lineTo(0, 10*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-15*s, -30*s); ctx.lineTo(0, 10*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(15*s, -30*s); ctx.lineTo(0, 10*s); ctx.stroke();
  // Payload
  ctx.fillStyle = '#f0c040';
  ctx.beginPath();
  ctx.arc(0, 15*s, 6*s, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBall(ctx, x, y, r) {
  ctx.fillStyle = '#f0c040';
  ctx.beginPath();
  ctx.arc(x, y, r || 8, 0, Math.PI*2);
  ctx.fill();
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2;

  if (f === 0) {
    return [
      {id:'t1', type:'label', text:t('title'), x:cx, y:130, color:P.primary, size:22, align:'center', font:'Space Grotesk'},
      {id:'t2', type:'label', text:t('subtitle'), x:cx, y:165, color:P.muted, size:13, align:'center'},
      {id:'t3', type:'label', text:t('introL1'), x:cx, y:230, color:'#ffffff', size:15, align:'center'},
      {id:'t4', type:'label', text:t('introL2'), x:cx, y:260, color:P.accent || '#ffb59c', size:16, align:'center', font:'Space Grotesk'},
    ];
  }

  if (animState.frame !== f) startAnim(f);
  return [{id:'_custom_' + f, type:'custom_descent', frame:f}];
}

function customDrawElement(ctx, el, W, H) {
  if (el.type !== 'custom_descent') return false;
  var f = el.frame;
  var t_fn = AnimRuntime.t;
  var tm = animState.time;
  var groundY = H * 0.85;
  var startY = H * 0.08;
  var range = groundY - startY - 30;

  if (f === 1) {
    // Free fall - fast
    var progress = Math.min(1, 0.5 * 2.5 * tm * tm);
    var by = startY + progress * range;
    drawBall(ctx, W/2, by, 10);
    // Speed arrow
    if (progress < 1) {
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 3;
      var arrowLen = 30 + progress * 50;
      ctx.beginPath(); ctx.moveTo(W/2+20, by); ctx.lineTo(W/2+20, by+arrowLen); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W/2+15, by+arrowLen-5); ctx.lineTo(W/2+20, by+arrowLen); ctx.lineTo(W/2+25, by+arrowLen-5); ctx.stroke();
    }
    ctx.fillStyle = '#ff4444';
    ctx.font = "bold 16px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('fast'), W/2, startY - 10);
    ctx.fillStyle = '#ffffff';
    ctx.font = "13px 'Noto Sans SC', sans-serif";
    ctx.fillText(t_fn('freefall'), W/2, startY + 20);
  } else if (f === 2) {
    // Glider - forward + slow descent
    var gx = W * 0.15 + tm * W * 0.18;
    var gy = startY + tm * range * 0.08;
    if (gx > W * 0.85) { gx = W * 0.15; } // wrap
    drawGlider(ctx, gx, gy, 1.5);
    // Lift arrow
    ctx.strokeStyle = '#50ffb0';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(gx, gy-10); ctx.lineTo(gx, gy-40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx-5, gy-35); ctx.lineTo(gx, gy-40); ctx.lineTo(gx+5, gy-35); ctx.stroke();
    ctx.fillStyle = '#50ffb0';
    ctx.font = "11px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('LIFT', gx, gy - 45);
    // Forward arrow
    ctx.strokeStyle = '#88ccff';
    ctx.beginPath(); ctx.moveTo(gx+35, gy); ctx.lineTo(gx+65, gy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx+60, gy-4); ctx.lineTo(gx+65, gy); ctx.lineTo(gx+60, gy+4); ctx.stroke();
    ctx.fillStyle = '#88ccff';
    ctx.font = "bold 14px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('gentle'), W/2, startY - 10);
  } else if (f === 3) {
    // Parachute - slow vertical
    var progress = Math.min(1, tm * 0.15);
    var py = startY + progress * range;
    drawParachute(ctx, W/2, py, 1.8);
    // Drag arrow (up)
    ctx.strokeStyle = '#ffb59c';
    ctx.lineWidth = 3;
    var dragLen = 40;
    ctx.beginPath(); ctx.moveTo(W/2+50, py+10); ctx.lineTo(W/2+50, py+10-dragLen); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W/2+45, py+10-dragLen+5); ctx.lineTo(W/2+50, py+10-dragLen); ctx.lineTo(W/2+55, py+10-dragLen+5); ctx.stroke();
    ctx.fillStyle = '#ffb59c';
    ctx.font = "11px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText('DRAG', W/2+60, py - 20);
    ctx.fillStyle = '#50ffb0';
    ctx.font = "bold 14px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('slow'), W/2, startY - 10);
  } else if (f === 4) {
    // Side by side comparison
    var col1 = W * 0.2, col2 = W * 0.5, col3 = W * 0.8;
    var fastP = Math.min(1, 0.5 * 2.5 * tm * tm);
    var glideP = Math.min(1, tm * 0.06);
    var paraP = Math.min(1, tm * 0.18);
    // Free fall
    drawBall(ctx, col1, startY + fastP * range, 8);
    ctx.fillStyle = '#ff4444';
    ctx.font = "11px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('freefall'), col1, groundY + 18);
    // Glider
    var gx2 = col2 - 30 + tm * 15;
    drawGlider(ctx, gx2, startY + glideP * range, 1);
    ctx.fillStyle = '#88ccff';
    ctx.fillText(t_fn('glider'), col2, groundY + 18);
    // Parachute
    drawParachute(ctx, col3, startY + paraP * range, 1.2);
    ctx.fillStyle = '#50ffb0';
    ctx.fillText(t_fn('parachute'), col3, groundY + 18);
    // Title
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 14px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('compare'), W/2, startY - 10);
  }
  return true;
}

AnimRuntime.boot();

// Hook frame changes
var _lastFrame = -1;
setInterval(function() {
  if (typeof AnimRuntime !== 'undefined' && AnimRuntime.currentFrame !== undefined) {
    if (AnimRuntime.currentFrame !== _lastFrame) {
      _lastFrame = AnimRuntime.currentFrame;
      startAnim(_lastFrame);
    }
  }
}, 100);
</script>
</body>
</html>
