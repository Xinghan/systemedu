<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>脑电波从哪来 — 神经元同步叠加</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 (所有 26 套统一) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg: oklch(0.96 0.01 265);
    --fg-dim: oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold: oklch(0.85 0.14 85);

    /* 第 2 层 — neuro signature accent (cortex-coral) */
    --neuro: oklch(0.75 0.17 25);

    /* 第 3 层 — neuro 5 色 palette (theme_style/themes.js neuro 段) */
    --syn:   oklch(0.75 0.17 25);   /* SYNAPTIC */
    --dend:  oklch(0.55 0.15 25);   /* DENDRITE */
    --axon:  oklch(0.32 0.10 25);   /* AXON */
    --fire:  oklch(0.92 0.08 25);   /* FIRING */
    --mem:   oklch(0.85 0.14 85);   /* MEMORY (= gold) */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg-0);
    color:var(--fg);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;
    height:100vh;width:100vw;overflow:hidden;display:flex;
  }

  /* ---- 200px 左侧栏 ---- */
  .sidebar{
    width:200px;min-width:200px;height:100vh;
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    padding:20px 16px;gap:18px;
  }
  .brand{display:flex;flex-direction:column;gap:4px;}
  .brand .code{font-size:10px;letter-spacing:.18em;color:var(--neuro);}
  .brand .ttl{font-size:15px;font-weight:700;line-height:1.25;color:var(--fg);
    font-family:'Inter','Noto Sans SC',sans-serif;}
  .brand .sub{font-size:10px;color:var(--fg-mute);line-height:1.4;}

  .mascot-wrap{display:flex;align-items:center;gap:8px;}
  .mascot-wrap svg{width:46px;height:46px;}
  .mascot-wrap .m-name{font-size:10px;color:var(--fg-dim);line-height:1.3;}
  .mascot-wrap .m-name b{color:var(--neuro);}

  .guide{display:flex;flex-direction:column;gap:8px;}
  .guide .g-ttl{font-size:10px;letter-spacing:.16em;color:var(--fg-mute);}
  .guide ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .guide li{
    font-size:11px;color:var(--fg-dim);line-height:1.45;
    padding-left:12px;position:relative;
    font-family:'Inter','Noto Sans SC',sans-serif;
  }
  .guide li::before{content:'';position:absolute;left:0;top:6px;
    width:5px;height:5px;background:var(--neuro);}

  .spacer{flex:1;}
  .lang-btn{
    align-self:flex-start;
    background:transparent;color:var(--fg-dim);
    border:1px solid var(--line-strong);
    font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.1em;padding:6px 14px;cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);
  }
  .lang-btn:hover{color:var(--fg);border-color:var(--neuro);}

  /* ---- 右侧主舞台 ---- */
  .stage{position:relative;flex:1;height:100vh;}
  #c{display:block;width:100%;height:100%;}

  .hud{
    position:absolute;top:16px;right:18px;
    display:flex;gap:20px;
    background:oklch(0.18 0.04 265 / 0.78);
    border:1px solid var(--line);padding:9px 16px;
    backdrop-filter:blur(4px);
  }
  .hud .cell{display:flex;flex-direction:column;gap:2px;min-width:64px;}
  .hud .lab{font-size:9px;letter-spacing:.12em;color:var(--fg-mute);}
  .hud .val{font-size:15px;font-weight:700;color:var(--neuro);
    font-family:'JetBrains Mono',monospace;}
  .hud .val.gold{color:var(--gold);}

  .stage-tag{
    position:absolute;top:18px;left:20px;
    font-size:10px;letter-spacing:.14em;color:var(--fg-mute);
  }
  .stage-tag b{color:var(--neuro);}
</style>
</head>
<body>
  <!-- ====== 左侧栏 ====== -->
  <aside class="sidebar">
    <div class="brand">
      <span class="code">NRO-20 · M02</span>
      <span class="ttl" data-i18n="title">脑电波从哪来</span>
      <span class="sub" data-i18n="subtitle">神经元同步叠加成头皮电压</span>
    </div>

    <div class="mascot-wrap">
      <!-- mascot Spark: 一只会在想法连接时成波点亮的分叉树突小生物 -->
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <g fill="none" stroke="var(--dend)" stroke-width="2" stroke-linecap="round">
          <line x1="24" y1="30" x2="24" y2="40"/>
          <line x1="24" y1="30" x2="14" y2="18"/>
          <line x1="24" y1="30" x2="34" y2="18"/>
          <line x1="14" y1="18" x2="9" y2="11"/>
          <line x1="14" y1="18" x2="18" y2="9"/>
          <line x1="34" y1="18" x2="39" y2="11"/>
          <line x1="34" y1="18" x2="30" y2="9"/>
        </g>
        <circle cx="24" cy="30" r="5" fill="var(--syn)"/>
        <circle cx="9" cy="11" r="2.6" fill="var(--fire)"/>
        <circle cx="18" cy="9" r="2.6" fill="var(--fire)"/>
        <circle cx="39" cy="11" r="2.6" fill="var(--fire)"/>
        <circle cx="30" cy="9" r="2.6" fill="var(--fire)"/>
      </svg>
      <span class="m-name"><b>Spark</b><br><span data-i18n="mascot">树突小生物</span></span>
    </div>

    <div class="guide">
      <span class="g-ttl" data-i18n="guideTitle">观看指南</span>
      <ul>
        <li data-i18n="g1">每个神经元只产生 uV 级微电流，单独测不到</li>
        <li data-i18n="g2">看同步度上升，放电时刻渐渐对齐</li>
        <li data-i18n="g3">同相叠加，头皮波从噪声里浮现</li>
      </ul>
    </div>

    <div class="spacer"></div>
    <button class="lang-btn" id="langBtn" type="button">EN</button>
  </aside>

  <!-- ====== 主舞台 ====== -->
  <main class="stage">
    <span class="stage-tag"><b data-i18n="coreLab">核心</b> · <span data-i18n="coreQ">这第一段脑电波到底从哪来?</span></span>
    <div class="hud">
      <div class="cell">
        <span class="lab" data-i18n="hSync">同步度 SYNC</span>
        <span class="val" id="vSync">0%</span>
      </div>
      <div class="cell">
        <span class="lab" data-i18n="hFire">同步放电 / 总数</span>
        <span class="val" id="vFire">0 / 120</span>
      </div>
      <div class="cell">
        <span class="lab" data-i18n="hAmp">头皮电压 AMP</span>
        <span class="val gold" id="vAmp">0.4 uV</span>
      </div>
    </div>
    <canvas id="c"></canvas>
  </main>

<script>
'use strict';
(function(){
  var I18N = {
    title:    {cn:'脑电波从哪来',           en:'Where EEG comes from'},
    subtitle: {cn:'神经元同步叠加成头皮电压', en:'Synchrony sums into scalp voltage'},
    mascot:   {cn:'树突小生物',             en:'a dendrite sprite'},
    guideTitle:{cn:'观看指南',              en:'GUIDE'},
    g1:{cn:'每个神经元只产生 uV 级微电流，单独测不到',
        en:'One neuron makes only a uV current — too small to measure'},
    g2:{cn:'看同步度上升，放电时刻渐渐对齐',
        en:'As synchrony rises, firing times line up'},
    g3:{cn:'同相叠加，头皮波从噪声里浮现',
        en:'In-phase sum — the scalp wave emerges from noise'},
    coreLab:{cn:'核心', en:'CORE'},
    coreQ:{cn:'这第一段脑电波到底从哪来?', en:'Where does this first EEG wave come from?'},
    hSync:{cn:'同步度 SYNC', en:'SYNCHRONY'},
    hFire:{cn:'同步放电 / 总数', en:'IN-SYNC / TOTAL'},
    hAmp:{cn:'头皮电压 AMP', en:'SCALP AMP'},
    cueField:{cn:'一片皮层锥体神经元 — 各自随机放电', en:'A patch of cortical neurons — each firing at random'},
    cueElectrode:{cn:'头皮电极读到的：随机电流相互抵消，近平线噪声',
                  en:'Scalp electrode reads: random currents cancel, near-flat noise'},
    cueRising:{cn:'同步度上升 — 越来越多神经元在同一时刻放电',
               en:'Synchrony rising — more neurons fire at the same instant'},
    cueSum:{cn:'同相微电流不再抵消，而是累加', en:'In-phase currents stop cancelling — they add up'},
    cueWave:{cn:'头皮电压从噪声里浮现成可测的节律', en:'Scalp voltage emerges as a measurable rhythm'},
    cueIsWave:{cn:'这条起伏，就是 EEG 一个电极读到的波', en:'This swell IS the wave one EEG electrode records'},
    cueFade:{cn:'同步度回落，波又沉回噪声 — 它一直由同步度驱动',
             en:'Synchrony falls, the wave sinks back — driven by synchrony all along'},
    lblScalp:{cn:'头皮电极读数 (一个通道)', en:'SCALP ELECTRODE (one channel)'},
    lblCortex:{cn:'皮层神经元场', en:'CORTICAL NEURON FIELD'},
    lblSum:{cn:'微电流叠加', en:'CURRENT SUM'},
    sumCancel:{cn:'相互抵消', en:'cancel'},
    sumAdd:{cn:'同相叠加', en:'add up'}
  };
  var LANG = 'cn';
  function t(k){ var e=I18N[k]; return e ? (e[LANG]||e.cn) : k; }

  // ---- color helpers (resolve oklch vars once) ----
  function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
  var COL = {};
  function loadColors(){
    COL.bg0=cssVar('--bg-0'); COL.bg2=cssVar('--bg-2'); COL.line=cssVar('--line');
    COL.fg=cssVar('--fg'); COL.dim=cssVar('--fg-dim'); COL.mute=cssVar('--fg-mute');
    COL.gold=cssVar('--gold'); COL.neuro=cssVar('--neuro');
    COL.syn=cssVar('--syn'); COL.dend=cssVar('--dend'); COL.axon=cssVar('--axon');
    COL.fire=cssVar('--fire'); COL.mem=cssVar('--mem');
  }

  var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  var W=0,H=0, DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    var r=canvas.parentElement.getBoundingClientRect();
    if(r.width<1||r.height<1) return;
    W=r.width; H=r.height;
    canvas.width=W*DPR; canvas.height=H*DPR;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    layout();
  }

  // ====== 唯一核心对象: 神经元同步叠加 ======
  // 一群皮层锥体神经元, 每个有固有相位与固有频率;
  // sync 高时被一个共同节律 (alpha ~10Hz) 牵引, 放电时刻渐渐对齐。
  // 每次放电贡献一个微小电偶极子电流 (uV 级); 头皮电极读到的是所有贡献的瞬时和。
  var N = 120;
  var neurons = [];
  var COMMON_HZ = 10; // 共同节律 alpha ~10Hz
  function initNeurons(){
    neurons.length=0;
    for(var i=0;i<N;i++){
      neurons.push({
        gx: Math.random(),
        gy: Math.random(),
        phase: Math.random()*Math.PI*2,
        ownHz: 8 + Math.random()*5,   // 各自固有频率 8-13Hz
        fire: 0
      });
    }
  }
  initNeurons();

  // 头皮波滚动历史
  var SCALP_LEN=260;
  var scalpHist=[];
  for(var k=0;k<SCALP_LEN;k++) scalpHist.push(0);

  // 布局区
  var L={};
  function layout(){
    var pad=Math.max(22, W*0.03);
    var topH=H*0.52, botY=H*0.60;
    L.field={x:pad, y:64, w:(W-pad*3)*0.6, h:topH-64};
    L.sum ={x:L.field.x+L.field.w+pad, y:64, w:(W-pad*3)*0.4, h:topH-64};
    L.scalp={x:pad, y:botY, w:W-pad*2, h:H-botY-pad};
  }

  // ---- sync 一个量: 三角往返, 一个完整周期 ~30s ----
  var CYCLE=30;
  function syncAt(elapsed){
    var ph=(elapsed % CYCLE)/CYCLE;
    var tri = ph<0.5 ? (ph/0.5) : (1-(ph-0.5)/0.5);
    var x=tri;
    return x*x*x*(x*(x*6-15)+10); // smootherstep, 0..1
  }

  function cueFor(sync, rising){
    if(sync<0.12) return rising? 'cueField':'cueFade';
    if(sync<0.30) return rising? 'cueElectrode':'cueFade';
    if(sync<0.55) return 'cueRising';
    if(sync<0.78) return 'cueSum';
    if(sync<0.93) return 'cueWave';
    return 'cueIsWave';
  }

  // ---- 头皮瞬时电压 = 所有神经元微电流的和 ----
  // 随机相位时正负抵消 -> 近 0 (噪声); sync 高时相位对齐 -> 同号叠加成可测节律。
  function scalpVoltage(timeS, sync){
    var common = timeS*COMMON_HZ*Math.PI*2;
    var sum=0;
    for(var i=0;i<N;i++){
      var nu=neurons[i];
      var own = timeS*nu.ownHz*Math.PI*2 + nu.phase;
      var eff = own*(1-sync) + common*sync;
      sum += Math.sin(eff);   // 每个 ~ 单元微电流
    }
    var perUnit=0.5; // 单元约 0.5uV
    return sum*perUnit; // uV
  }

  // 更新放电亮度(可视化) + 统计与共同节律同步的神经元数
  function updateFiring(timeS, sync){
    var common = timeS*COMMON_HZ*Math.PI*2;
    var inSync=0;
    for(var i=0;i<N;i++){
      var nu=neurons[i];
      var own = timeS*nu.ownHz*Math.PI*2 + nu.phase;
      var eff = own*(1-sync) + common*sync;
      var s=Math.sin(eff);
      var f = Math.max(0, (s-0.78)/0.22); // 峰顶才点亮
      nu.fire = nu.fire*0.72 + f*0.28;
      var dp = Math.abs(((eff-common)%(Math.PI*2)));
      if(dp>Math.PI) dp=Math.PI*2-dp;
      if(sync*Math.cos(dp) > 0.55) inSync++;
    }
    return inSync;
  }

  // ====== 绘制 ======
  function drawBg(){
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, COL.bg0); g.addColorStop(1, COL.bg2);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='oklch(0.35 0.05 265 / 0.10)'; ctx.lineWidth=1;
    for(var x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(var y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    var rg=ctx.createRadialGradient(W*0.45,H*0.32,0,W*0.45,H*0.32,W*0.5);
    rg.addColorStop(0,'oklch(0.75 0.17 25 / 0.06)'); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  }

  function sectionLabel(x,y,txt){
    ctx.fillStyle=COL.mute; ctx.font="10px 'JetBrains Mono',monospace";
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText(txt, x, y);
  }

  function drawField(sync){
    var f=L.field;
    sectionLabel(f.x, f.y-10, t('lblCortex'));
    ctx.strokeStyle=COL.line; ctx.lineWidth=1; ctx.strokeRect(f.x,f.y,f.w,f.h);
    for(var i=0;i<N;i++){
      var nu=neurons[i];
      var px=f.x+6 + nu.gx*(f.w-12);
      var py=f.y+6 + nu.gy*(f.h-12);
      var fire=nu.fire;
      var r = 2.2 + fire*3.4;
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
      if(fire>0.15){
        ctx.fillStyle = COL.fire;
        ctx.shadowColor = COL.syn; ctx.shadowBlur = 6+fire*14*sync;
      }else{
        ctx.fillStyle = COL.axon; ctx.shadowBlur=0;
      }
      ctx.fill(); ctx.shadowBlur=0;
      if(sync>0.45 && fire>0.4){
        ctx.strokeStyle='oklch(0.75 0.17 25 / '+(0.25*sync*fire).toFixed(3)+')';
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px, py-8-10*fire); ctx.stroke();
      }
    }
  }

  // 微电流叠加: 24 个代表神经元的瞬时电流画成小竖线; 中线粗条 = 抵消后净和
  function drawSum(timeS, sync){
    var s=L.sum;
    sectionLabel(s.x, s.y-10, t('lblSum'));
    ctx.strokeStyle=COL.line; ctx.lineWidth=1; ctx.strokeRect(s.x,s.y,s.w,s.h);
    var midX=s.x+s.w/2, baseY=s.y+s.h-26;
    var common=timeS*COMMON_HZ*Math.PI*2;
    var M=24, total=0;
    ctx.lineWidth=2; ctx.lineCap='round';
    for(var j=0;j<M;j++){
      var nu=neurons[j*5];
      var own=timeS*nu.ownHz*Math.PI*2+nu.phase;
      var eff=own*(1-sync)+common*sync;
      var c=Math.sin(eff);
      total+=c;
      var x= s.x+10 + j*((s.w-20)/(M-1));
      var len = c*26;
      ctx.strokeStyle = c>=0 ? 'oklch(0.75 0.17 25 / 0.55)' : 'oklch(0.55 0.15 25 / 0.45)';
      ctx.beginPath(); ctx.moveTo(x, baseY); ctx.lineTo(x, baseY-len); ctx.stroke();
    }
    ctx.strokeStyle=COL.mute; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(s.x+6, baseY); ctx.lineTo(s.x+s.w-6, baseY); ctx.stroke();
    var net = total/M;
    var netLen = net*(s.h-50);
    ctx.fillStyle = Math.abs(net)>0.35 ? COL.gold : COL.dend;
    var bw=14;
    ctx.fillRect(midX-bw/2, Math.min(baseY,baseY-netLen), bw, Math.abs(netLen)+0.5);
    ctx.fillStyle=COL.dim; ctx.font="9px 'JetBrains Mono',monospace"; ctx.textAlign='center';
    ctx.fillText('SUM', midX, s.y+s.h-10);
    ctx.fillText(sync<0.3 ? t('sumCancel') : t('sumAdd'), midX, s.y+12);
  }

  function drawScalp(sync){
    var s=L.scalp;
    sectionLabel(s.x, s.y-10, t('lblScalp'));
    ctx.strokeStyle=COL.line; ctx.lineWidth=1; ctx.strokeRect(s.x,s.y,s.w,s.h);
    var midY=s.y+s.h/2;
    ctx.strokeStyle='oklch(0.55 0.03 265 / 0.5)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(s.x+4,midY); ctx.lineTo(s.x+s.w-4,midY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=COL.mute; ctx.font="9px 'JetBrains Mono',monospace";
    ctx.textAlign='left'; ctx.fillText('0 uV', s.x+6, midY-4);

    var scaleY=(s.h*0.42)/60; // 约 60uV 满幅
    ctx.lineWidth=2.2; ctx.lineJoin='round';
    var col = sync>0.9 ? COL.gold : COL.neuro;
    ctx.strokeStyle=col;
    if(sync>0.6){ ctx.shadowColor=COL.syn; ctx.shadowBlur=8*sync; }
    ctx.beginPath();
    for(var i=0;i<scalpHist.length;i++){
      var x=s.x+4 + i*((s.w-8)/(scalpHist.length-1));
      var y=midY - scalpHist[i]*scaleY;
      if(y<s.y+4) y=s.y+4; if(y>s.y+s.h-4) y=s.y+s.h-4;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.shadowBlur=0;
  }

  function drawCue(key, sync){
    ctx.fillStyle = sync>0.9 ? COL.gold : COL.fg;
    ctx.font="13px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(t(key), W/2, H-8);
  }

  function updateHUD(sync, inSync, amp){
    document.getElementById('vSync').textContent = Math.round(sync*100)+'%';
    document.getElementById('vFire').textContent = inSync+' / '+N;
    var ampEl=document.getElementById('vAmp');
    ampEl.textContent = amp.toFixed(1)+' uV';
    ampEl.classList.toggle('gold', amp>20);
  }

  var prevSync=0, startT=null;
  function frame(ts){
    if(startT===null) startT=ts;
    var elapsed=(ts-startT)/1000;
    var sync=syncAt(elapsed);
    var rising = sync>=prevSync;
    prevSync=sync;

    var timeS = elapsed;
    var v = scalpVoltage(timeS, sync);
    scalpHist.push(v);
    if(scalpHist.length>SCALP_LEN) scalpHist.shift();
    var inSync = updateFiring(timeS, sync);

    var lo=1e9, hi=-1e9;
    for(var i=Math.max(0,scalpHist.length-80);i<scalpHist.length;i++){
      if(scalpHist[i]<lo)lo=scalpHist[i]; if(scalpHist[i]>hi)hi=scalpHist[i];
    }
    var amp=(hi-lo)/2;

    drawBg();
    drawField(sync);
    drawSum(timeS, sync);
    drawScalp(sync);
    drawCue(cueFor(sync, rising), sync);
    updateHUD(sync, inSync, amp);

    requestAnimationFrame(frame);
  }

  function refreshI18N(){
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    document.getElementById('langBtn').textContent = LANG==='cn' ? 'EN' : '中';
  }

  document.getElementById('langBtn').addEventListener('click', function(){
    LANG = LANG==='cn' ? 'en' : 'cn';
    refreshI18N();
  });

  window.addEventListener('resize', resize);

  var booted=false;
  function boot(){
    if(booted) return; booted=true;
    loadColors();
    refreshI18N();
    resize();
    setTimeout(resize, 250);
    requestAnimationFrame(frame);
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(boot); }
  setTimeout(boot, 300);
})();
</script>
</body>
</html>
