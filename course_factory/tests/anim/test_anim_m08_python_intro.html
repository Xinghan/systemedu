<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M08 — 写第一段 Python 操作传感器数据</title>
<style>
  /* ===== F2 第 1 层 — 共享深空底 (theme_style/styles.css L8-21, 26 学科统一) ===== */
  :root{
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg: oklch(0.96 0.01 265);
    --fg-dim: oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold: oklch(0.85 0.14 85);

    /* ===== F2 第 2 层 — cs accent (cyan) ===== */
    --cs: oklch(0.75 0.17 200);
    --cs-dim: oklch(0.55 0.16 200);

    /* ===== F2 第 3 层 — cs 5 色 palette (themes.js L8-23) ===== */
    --SIGNAL: oklch(0.75 0.17 200);  /* cyan 主, Bit mascot 主体 / list[0] / 当前执行光环 */
    --CORE:   oklch(0.55 0.16 200);  /* 中等 cyan, Bit 内核 / list[1] / 推导链 */
    --DEPTH:  oklch(0.35 0.10 210);  /* 深 cyan, Bit 阴影 / 未激活槽位 / 内存底色 */
    --FLASH:  oklch(0.92 0.08 190);  /* 近白 cyan, Bit 像素闪 / list[2] / 高光 */
    --QUERY:  oklch(0.85 0.14 85);   /* 金 (cs 5 色含 QUERY = 金), list[3] / True 命中 / key moment */
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{
    background: var(--bg-0);
    color: var(--fg);
    font-family: 'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
    display: flex;
    height: 100vh;
  }

  /* ===== 200px 左侧 sidebar ===== */
  .sidebar{
    width: 200px;
    flex-shrink: 0;
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .brand{
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 4px;
  }
  .brand .badge{
    display: inline-block;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--cs);
    background: var(--bg-2);
    padding: 3px 7px;
    border: 1px solid var(--line);
    box-shadow: 2px 2px 0 var(--bg-0);
    margin-bottom: 6px;
  }
  .brand h1{
    font-size: 14px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1.3;
  }
  .brand .sub{
    font-size: 10px;
    color: var(--fg-mute);
    margin-top: 4px;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    letter-spacing: 0.04em;
  }

  /* ===== Bit mascot 在 sidebar ===== */
  .mascot-box{
    background: var(--bg-2);
    border: 1px solid var(--line);
    box-shadow: 3px 3px 0 var(--bg-0);
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mascot-box .label{
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 9px;
    color: var(--fg-dim);
    letter-spacing: 0.08em;
  }
  .mascot-box .name{
    font-size: 11px;
    color: var(--fg);
    font-weight: 600;
    margin-top: 2px;
  }

  /* ===== Guide 3 条 ===== */
  .guide{
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .guide-item{
    font-size: 11px;
    line-height: 1.45;
    color: var(--fg-dim);
    padding-left: 9px;
    border-left: 2px solid var(--cs);
    padding-top: 2px;
    padding-bottom: 2px;
  }
  .guide-item .num{
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    color: var(--cs);
    font-weight: 700;
    margin-right: 4px;
  }

  .sidebar .spacer{flex: 1;}

  .lang-btn{
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    box-shadow: 2px 2px 0 var(--bg-0);
    color: var(--fg);
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 7px 10px;
    cursor: pointer;
    width: 100%;
  }
  .lang-btn:hover{
    border-color: var(--cs);
    color: var(--cs);
  }
  .lang-btn:active{
    transform: translate(2px, 2px);
    box-shadow: none;
  }

  /* ===== Main stage ===== */
  .main{
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-0);
  }
  #stage{
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ===== HUD 右上 ===== */
  .hud{
    position: absolute;
    top: 18px;
    right: 18px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    box-shadow: 3px 3px 0 var(--bg-0);
    padding: 10px 14px;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    min-width: 256px;
  }
  .hud .row{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    line-height: 1.6;
  }
  .hud .label{color: var(--fg-mute); letter-spacing: 0.06em;}
  .hud .value{color: var(--fg); font-weight: 700;}
  .hud .value.accent{color: var(--cs);}
  .hud .value.gold{color: var(--gold);}
  .hud .sep{
    height: 1px;
    background: var(--line);
    margin: 6px 0;
  }

  /* ===== Subtitle 底部 ===== */
  .subtitle{
    position: absolute;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%);
    text-align: center;
    max-width: 80%;
    pointer-events: none;
  }
  .subtitle .cn{
    font-size: 17px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: 0.01em;
  }
  .subtitle .en{
    font-size: 12px;
    color: var(--fg-mute);
    margin-top: 4px;
    font-style: italic;
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    letter-spacing: 0.03em;
  }

  /* ===== Frame chip 左下 — 5 步进度 ===== */
  .frame-progress{
    position: absolute;
    left: 24px;
    bottom: 28px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .chip{
    width: 24px;
    height: 6px;
    background: var(--bg-2);
    border: 1px solid var(--line);
  }
  .chip.active{
    background: var(--cs);
    border-color: var(--cs);
  }
  .chip.done{
    background: var(--cs-dim);
    border-color: var(--cs-dim);
  }
  .frame-progress .stepname{
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 10px;
    color: var(--fg-dim);
    margin-left: 8px;
    letter-spacing: 0.08em;
  }

  /* ===== key moment 完成 overlay ===== */
  .flash{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'JetBrains Mono',ui-monospace,monospace;
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.18em;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 24px var(--gold);
    text-align: center;
  }
  .flash.on{ opacity: 1; }
  .flash .small{
    display: block;
    text-align: center;
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: 0.08em;
    margin-top: 8px;
    text-shadow: none;
    font-weight: 400;
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="badge" id="badgeMod">MOD-M08 / CS-01</span>
      <h1 id="brandH1">写第一段 Python</h1>
      <div class="sub" id="brandSub">pm25 = 38 -> print -> alert</div>
    </div>

    <div class="mascot-box">
      <svg width="44" height="44" viewBox="0 0 60 60" aria-hidden="true">
        <!-- Bit mascot: a levitating cubic sprite that rearranges its pixels (themes.js cs) -->
        <!-- shadow -->
        <rect x="14" y="48" width="32" height="3" fill="var(--DEPTH)" opacity="0.5"/>
        <!-- cube: 3x3 pixel grid -->
        <rect x="14" y="14" width="32" height="32" fill="var(--DEPTH)" opacity="0.45"/>
        <rect x="14" y="14" width="32" height="32" fill="none" stroke="var(--SIGNAL)" stroke-width="1.4"/>
        <rect x="17" y="17" width="8" height="8" fill="var(--SIGNAL)"/>
        <rect x="26" y="17" width="8" height="8" fill="var(--CORE)"/>
        <rect x="35" y="17" width="8" height="8" fill="var(--FLASH)"/>
        <rect x="17" y="26" width="8" height="8" fill="var(--CORE)"/>
        <rect x="26" y="26" width="8" height="8" fill="var(--QUERY)"/>
        <rect x="35" y="26" width="8" height="8" fill="var(--SIGNAL)"/>
        <rect x="17" y="35" width="8" height="8" fill="var(--FLASH)"/>
        <rect x="26" y="35" width="8" height="8" fill="var(--SIGNAL)"/>
        <rect x="35" y="35" width="8" height="8" fill="var(--CORE)"/>
      </svg>
      <div>
        <div class="label">MASCOT</div>
        <div class="name" id="mascotName">Bit · 比特</div>
      </div>
    </div>

    <div class="guide">
      <div class="guide-item" id="g1"><span class="num">01</span><span class="gtxt">变量 = 给数字起名, 内存里有个"箱子"装它</span></div>
      <div class="guide-item" id="g2"><span class="num">02</span><span class="gtxt">列表把多个箱子排成一队, for 循环一个个看</span></div>
      <div class="guide-item" id="g3"><span class="num">03</span><span class="gtxt">函数把判断打包, pm > 35 就喊"不健康"</span></div>
    </div>

    <div class="spacer"></div>
    <button id="langBtn" class="lang-btn" type="button">CN / EN</button>
  </aside>

  <main class="main">
    <svg id="stage" viewBox="0 0 1080 720" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>

    <div class="hud">
      <div class="row"><span class="label" id="hudL1">FRAME</span><span class="value accent" id="hudV1">1 / 5</span></div>
      <div class="row"><span class="label" id="hudL2">STAGE</span><span class="value" id="hudV2">Variable</span></div>
      <div class="sep"></div>
      <div class="row"><span class="label" id="hudL3">LINES</span><span class="value" id="hudV3">1</span></div>
      <div class="row"><span class="label" id="hudL4">RESULT</span><span class="value gold" id="hudV4">-</span></div>
    </div>

    <div class="subtitle">
      <div class="cn" id="subCn">Python 长啥样? 一行代码先看看</div>
      <div class="en" id="subEn">What does Python look like? Start with one line</div>
    </div>

    <div class="frame-progress">
      <div class="chip" id="chip0"></div>
      <div class="chip" id="chip1"></div>
      <div class="chip" id="chip2"></div>
      <div class="chip" id="chip3"></div>
      <div class="chip" id="chip4"></div>
      <span class="stepname" id="stepName">01 · VARIABLE</span>
    </div>

    <div class="flash" id="flash">
      <span id="flashMain">RUN OK</span>
      <span class="small" id="flashSub">你刚刚写了一段会跑的 Python</span>
    </div>
  </main>

<script>
(function(){
  "use strict";

  // ====== i18n ======
  var LANG = 'cn';
  var I18N = {
    badgeMod:  { cn: 'MOD-M08 / CS-01', en: 'MOD-M08 / CS-01' },
    brandH1:   { cn: '写第一段 Python', en: 'Write Your First Python' },
    brandSub:  { cn: 'pm25 = 38 -> print -> alert', en: 'pm25 = 38 -> print -> alert' },
    mascotName:{ cn: 'Bit · 比特', en: 'Bit · the cubic sprite' },
    g1: { cn: '变量 = 给数字起名, 内存里有个"箱子"装它',
          en: 'Variable = naming a number; a box in memory holds it' },
    g2: { cn: '列表把多个箱子排成一队, for 循环一个个看',
          en: 'A list lines up many boxes; for-loop visits each' },
    g3: { cn: '函数把判断打包, pm > 35 就喊"不健康"',
          en: 'A function packages a check: pm > 35 means "unhealthy"' },
    hudL1: { cn: '帧',     en: 'FRAME' },
    hudL2: { cn: '阶段',   en: 'STAGE' },
    hudL3: { cn: '代码行', en: 'LINES' },
    hudL4: { cn: '结果',   en: 'RESULT' }
  };

  // ====== 5 帧故事 ======
  var FRAME_MS = 6500;
  var FRAMES = [
    {
      id: 'variable',
      stepName: '01 · VARIABLE',
      hudStage: { cn: '变量', en: 'Variable' },
      hudLines: '1',
      hudResult: 'pm25 = 38',
      subCn: '一行代码: pm25 = 38 — 内存里出现一个叫 pm25 的箱子, 里面装 38',
      subEn: 'One line: pm25 = 38 — a box named pm25 appears in memory, holding 38'
    },
    {
      id: 'list',
      stepName: '02 · LIST',
      hudStage: { cn: '列表', en: 'List' },
      hudLines: '2',
      hudResult: 'pms_list[4]',
      subCn: '4 个传感器读数排成一队 — pms_list = [38, 42, 51, 28]',
      subEn: 'Four sensor reads in a row — pms_list = [38, 42, 51, 28]'
    },
    {
      id: 'for',
      stepName: '03 · FOR',
      hudStage: { cn: '循环', en: 'For loop' },
      hudLines: '4',
      hudResult: 'print x 4',
      subCn: 'for x in pms_list: print(x) — x 跳过每个箱子, 每跳一次打印一个',
      subEn: 'for x in pms_list: print(x) — x walks each box, prints on every visit'
    },
    {
      id: 'function',
      stepName: '04 · FUNCTION',
      hudStage: { cn: '函数', en: 'Function' },
      hudLines: '6',
      hudResult: 'True / False',
      subCn: 'def is_unhealthy(pm): return pm > 35 — 把判断打包, 38 进去 True 出来',
      subEn: 'def is_unhealthy(pm): return pm > 35 — pack the check; 38 in, True out'
    },
    {
      id: 'run',
      stepName: '05 · RUN',
      hudStage: { cn: '运行', en: 'Run' },
      hudLines: '8',
      hudResult: '3 alerts',
      subCn: '4 个读数全跑一遍, 3 个 > 35 触发警告 — 你已经会写 Python 了',
      subEn: 'All 4 reads checked, 3 above 35 trigger alerts — you just wrote Python'
    }
  ];

  // ====== State ======
  var currentFrame = 0;
  var frameStartTs = 0;
  var rafId = null;
  var stage = document.getElementById('stage');
  var SVGNS = 'http://www.w3.org/2000/svg';

  // ====== Utility ======
  function el(name, attrs, parent){
    var n = document.createElementNS(SVGNS, name);
    if (attrs){
      for (var k in attrs){
        if (Object.prototype.hasOwnProperty.call(attrs, k)){
          n.setAttribute(k, attrs[k]);
        }
      }
    }
    if (parent) parent.appendChild(n);
    return n;
  }
  function clearStage(){ while(stage.firstChild) stage.removeChild(stage.firstChild); }
  function tr(key){
    if (!I18N[key]) return key;
    return I18N[key][LANG] || I18N[key].en || key;
  }
  function lerp(a, b, p){ return a + (b - a) * p; }
  function easeOut(x){ return 1 - Math.pow(1 - x, 3); }
  function clamp(x, lo, hi){ return x < lo ? lo : (x > hi ? hi : x); }

  // ====== 共享: 背景 grid + 中央 glow ======
  function drawBgGrid(){
    var g = el('g', { opacity: '0.18' }, stage);
    for (var x = 0; x <= 1080; x += 60){
      el('line', { x1: x, y1: 0, x2: x, y2: 720, stroke: 'var(--line)', 'stroke-width': '0.5' }, g);
    }
    for (var y = 0; y <= 720; y += 60){
      el('line', { x1: 0, y1: y, x2: 1080, y2: y, stroke: 'var(--line)', 'stroke-width': '0.5' }, g);
    }
    var defs = el('defs', null, stage);
    var rg = el('radialGradient', { id: 'centerGlow', cx: '50%', cy: '45%', r: '60%' }, defs);
    el('stop', { offset: '0%', 'stop-color': 'var(--cs)', 'stop-opacity': '0.07' }, rg);
    el('stop', { offset: '100%', 'stop-color': 'var(--bg-0)', 'stop-opacity': '0' }, rg);
    el('rect', { x: 0, y: 0, width: 1080, height: 720, fill: 'url(#centerGlow)' }, stage);
  }

  // ====== 共享: 5 步进度链 ======
  function drawStepChain(activeIdx){
    var labels = [
      { cn: '变量', en: 'Var' },
      { cn: '列表', en: 'List' },
      { cn: '循环', en: 'For' },
      { cn: '函数', en: 'Func' },
      { cn: '运行', en: 'Run' }
    ];
    var y = 650;
    var startX = 110;
    var gap = (1080 - 220) / 4;
    var g = el('g', null, stage);
    for (var i = 0; i < 5; i++){
      var cx = startX + gap * i;
      var on = i <= activeIdx;
      var ringColor = on ? 'var(--cs)' : 'var(--line)';
      var fillColor = on ? 'var(--bg-2)' : 'var(--bg-1)';
      var textColor = on ? 'var(--fg)' : 'var(--fg-mute)';
      el('rect', {
        x: cx - 44, y: y - 16, width: 88, height: 32,
        fill: fillColor, stroke: ringColor, 'stroke-width': on ? '1.6' : '1', rx: '2'
      }, g);
      var tx = el('text', {
        x: cx, y: y + 4, fill: textColor,
        'font-family': "'Inter','Noto Sans SC',sans-serif",
        'font-size': '12', 'font-weight': on ? '700' : '500',
        'text-anchor': 'middle'
      }, g);
      tx.textContent = labels[i][LANG] || labels[i].en;
      var ix = el('text', {
        x: cx, y: y - 22, fill: on ? 'var(--cs)' : 'var(--fg-mute)',
        'font-family': "'JetBrains Mono',ui-monospace,monospace",
        'font-size': '9', 'text-anchor': 'middle', 'letter-spacing': '0.1em'
      }, g);
      ix.textContent = '0' + (i+1);
      if (i < 4){
        var x1 = cx + 44;
        var x2 = cx + gap - 44;
        var connColor = (on && (i+1) <= activeIdx) ? 'var(--cs)' : 'var(--line)';
        el('line', {
          x1: x1, y1: y, x2: x2 - 6, y2: y,
          stroke: connColor, 'stroke-width': '1.2'
        }, g);
        el('polygon', {
          points: (x2-6)+','+(y-4)+' '+(x2)+','+y+' '+(x2-6)+','+(y+4),
          fill: connColor
        }, g);
      }
    }
  }

  // ====== 共享: 代码 panel ======
  // lines: [{tokens: [{txt, kind}], indent?}]
  // activeLine: 高亮当前执行行 (cs cyan 光环)
  function drawCodePanel(parent, lines, activeLine, originX, originY, width){
    var W = width || 460;
    var H = 26 + lines.length * 26 + 12;
    var g = el('g', { transform: 'translate('+originX+','+originY+')' }, parent);
    // panel frame
    el('rect', { x: 0, y: 0, width: W, height: H, fill: 'var(--bg-1)',
                 stroke: 'var(--line-strong)', 'stroke-width': '1.4', rx: '2' }, g);
    // title bar
    el('rect', { x: 0, y: 0, width: W, height: 22, fill: 'var(--bg-2)',
                 stroke: 'var(--line)', 'stroke-width': '0.8' }, g);
    // window dots
    el('circle', { cx: 12, cy: 11, r: 3.2, fill: 'var(--DEPTH)' }, g);
    el('circle', { cx: 24, cy: 11, r: 3.2, fill: 'var(--CORE)' }, g);
    el('circle', { cx: 36, cy: 11, r: 3.2, fill: 'var(--SIGNAL)' }, g);
    var title = el('text', {
      x: W/2, y: 15, fill: 'var(--fg-dim)',
      'font-family': "'JetBrains Mono',ui-monospace,monospace",
      'font-size': '10', 'text-anchor': 'middle', 'letter-spacing': '0.08em'
    }, g);
    title.textContent = 'sensor.py';
    // lines
    for (var i = 0; i < lines.length; i++){
      var L = lines[i];
      var ly = 44 + i * 26;
      var isActive = (activeLine != null && i === activeLine);
      // active line highlight (cs cyan box)
      if (isActive){
        el('rect', { x: 4, y: ly - 16, width: W - 8, height: 24,
                     fill: 'var(--CORE)', opacity: 0.18,
                     stroke: 'var(--cs)', 'stroke-width': '1' }, g);
        var ar = el('text', {
          x: 10, y: ly + 1, fill: 'var(--cs)',
          'font-family': "'JetBrains Mono',ui-monospace,monospace",
          'font-size': '12', 'font-weight': '700'
        }, g);
        ar.textContent = '>';
      }
      // line number
      var lnStr = (i + 1) < 10 ? '0' + (i + 1) : String(i + 1);
      var ln = el('text', {
        x: 28, y: ly + 1, fill: 'var(--fg-mute)',
        'font-family': "'JetBrains Mono',ui-monospace,monospace",
        'font-size': '10'
      }, g);
      ln.textContent = lnStr;
      // tokens
      var tx0 = 50 + (L.indent || 0) * 14;
      var cursor = tx0;
      for (var k = 0; k < L.tokens.length; k++){
        var tok = L.tokens[k];
        var col = tokColor(tok.kind);
        var t = el('text', {
          x: cursor, y: ly + 1, fill: col,

      }, fg);
      dTx.textContent = LANG === 'cn' ? '38 不健康 -> True' : '38 unhealthy -> True';
      var dSub = el('text', {
        x: 190, y: 210, fill: 'var(--fg-dim)',
        'font-family': "'Inter','Noto Sans SC',sans-serif",
        'font-size': '11', 'text-anchor': 'middle', opacity: dAlpha
      }, fg);
      dSub.textContent = LANG === 'cn'
        ? '函数把判断打包, 想用就调一下'
        : 'Function packages the check; call to use';
    }
  }

  // ====== Frame 5 — RUN ======
  function drawFrame5(p){
    drawBgGrid();
    drawStepChain(4);

    var capAlpha = clamp((p - 0.05) / 0.15, 0, 1);
    var capTx = el('text', {
      x: 540, y: 76, fill: 'var(--fg-dim)',
      'font-family': "'Inter','Noto Sans SC',sans-serif",
      'font-size': '14', 'text-anchor': 'middle', opacity: capAlpha
    }, stage);
    capTx.textContent = LANG === 'cn'
      ? '8 行代码 = 一个完整的传感器警报程序'
      : '8 lines = a complete sensor alert program';

    var lines = [
      { tokens: [
        { txt: 'pms_list', kind: 'name' },
        { txt: ' = ', kind: 'op' },
        { txt: '[', kind: 'punct' },
        { txt: '38', kind: 'num' },
        { txt: ',', kind: 'punct' },
        { txt: '42', kind: 'num' },
        { txt: ',', kind: 'punct' },
        { txt: '51', kind: 'num' },
        { txt: ',', kind: 'punct' },
        { txt: '28', kind: 'num' },
        { txt: ']', kind: 'punct' }
      ]},
      { tokens: [
        { txt: 'def', kind: 'kw' },
        { txt: ' ', kind: 'op' },
        { txt: 'is_unhealthy', kind: 'fn' },
        { txt: '(', kind: 'paren' },
        { txt: 'pm', kind: 'name' },
        { txt: ')', kind: 'paren' },
        { txt: ':', kind: 'punct' }
      ]},
      { tokens: [
        { txt: 'return', kind: 'kw' },
        { txt: ' pm ', kind: 'name' },
        { txt: '>', kind: 'op' },
        { txt: ' ', kind: 'op' },
        { txt: '35', kind: 'num' }
      ], indent: 1},
      { tokens: [
        { txt: 'for', kind: 'kw' },
        { txt: ' x ', kind: 'name' },
        { txt: 'in', kind: 'kw' },
        { txt: ' pms_list', kind: 'name' },
        { txt: ':', kind: 'punct' }
      ]},
      { tokens: [
        { txt: 'if', kind: 'kw' },
        { txt: ' ', kind: 'op' },
        { txt: 'is_unhealthy', kind: 'fn' },
        { txt: '(', kind: 'paren' },
        { txt: 'x', kind: 'name' },
        { txt: ')', kind: 'paren' },
        { txt: ':', kind: 'punct' }
      ], indent: 1},
      { tokens: [
        { txt: 'print', kind: 'fn' },
        { txt: '(', kind: 'paren' },
        { txt: '"ALERT", x', kind: 'str' },
        { txt: ')', kind: 'paren' }
      ], indent: 2}
    ];
    var execP = clamp((p - 0.05) / 0.65, 0, 1);
    var activeLine;
    if (execP < 0.25) activeLine = 3;
    else if (execP < 0.5) activeLine = 4;
    else if (execP < 0.7) activeLine = 5;
    else activeLine = null;
    drawCodePanel(stage, lines, activeLine, 40, 100, 440);

    // 右上: list
    var listG = el('g', { transform: 'translate(620, 130)' }, stage);
    el('rect', { x: 0, y: 0, width: 420, height: 110,
                 fill: 'var(--bg-1)', stroke: 'var(--line-strong)',
                 'stroke-width': '1.2', 'stroke-dasharray': '4 4', rx: '2' }, listG);
    var listTtl = el('text', {
      x: 210, y: 18, fill: 'var(--cs)',
      'font-family': "'JetBrains Mono',ui-monospace,monospace",
      'font-size': '10', 'text-anchor': 'middle', 'letter-spacing': '0.14em', 'font-weight': '700'
    }, listG);
    listTtl.textContent = LANG === 'cn' ? '读数列表 (> 35 标金)' : 'sensor reads (> 35 = alert)';
    for (var i = 0; i < 4; i++){
      var bx = 60 + i * 90;
      var isAlert = LIST_VALUES[i] > 35;
      var reached = p >= 0.1 + i * 0.13;
      drawMemoryBox(listG, bx, 55, '['+i+']', String(LIST_VALUES[i]),
                    (isAlert && reached) ? 'var(--gold)' : LIST_COLORS[i],
                    { fill: 'var(--bg-2)',
                      stroke: (isAlert && reached) ? 'var(--gold)' : LIST_COLORS[i] });
      if (isAlert && reached){
        var badge = el('text', {
          x: bx, y: 90, fill: 'var(--gold)',
          'font-family': "'JetBrains Mono',ui-monospace,monospace",
          'font-size': '9', 'text-anchor': 'middle', 'font-weight': '700', 'letter-spacing': '0.08em'
        }, listG);
        badge.textContent = 'ALERT';
      }
    }

    // 右下: stdout
    var og = el('g', { transform: 'translate(620, 280)' }, stage);
    el('rect', { x: 0, y: 0, width: 420, height: 240,
                 fill: 'var(--bg-0)', stroke: 'var(--cs)', 'stroke-width': '1.2', rx: '2' }, og);
    el('rect', { x: 0, y: 0, width: 420, height: 22,
                 fill: 'var(--bg-2)', stroke: 'var(--line)' }, og);
    var stTtl = el('text', {
      x: 210, y: 15, fill: 'var(--cs)',
      'font-family': "'JetBrains Mono',ui-monospace,monospace",
      'font-size': '10', 'text-anchor': 'middle', 'letter-spacing': '0.16em', 'font-weight': '700'
    }, og);
    stTtl.textContent = 'STDOUT';
    var alerts = [{val:38, t:0.15}, {val:42, t:0.32}, {val:51, t:0.49}];
    var nOut = 0;
    for (var a = 0; a < alerts.length; a++){
      if (p >= alerts[a].t){
        var lineAlpha = clamp((p - alerts[a].t) / 0.06, 0, 1);
        var prompt = el('text', {
          x: 20, y: 55 + nOut * 30, fill: 'var(--fg-mute)',
          'font-family': "'JetBrains Mono',ui-monospace,monospace",
          'font-size': '13', opacity: lineAlpha
        }, og);
        prompt.textContent = '>>>';
        var lineTx = el('text', {
          x: 60, y: 55 + nOut * 30, fill: 'var(--gold)',
          'font-family': "'JetBrains Mono',ui-monospace,monospace",
          'font-size': '15', 'font-weight': '700', opacity: lineAlpha
        }, og);
        lineTx.textContent = 'ALERT ' + alerts[a].val;
        nOut++;
      }
    }
    if (p >= 0.6){
      var skipAlpha = clamp((p - 0.6) / 0.08, 0, 1);
      var skipTx = el('text', {
        x: 20, y: 55 + nOut * 30, fill: 'var(--fg-mute)',
        'font-family': "'JetBrains Mono',ui-monospace,monospace",
        'font-size': '12', opacity: skipAlpha
      }, og);
      skipTx.textContent = LANG === 'cn'
        ? '# 28 <= 35, 不打印'
        : '# 28 <= 35, skipped';
    }
    if (p >= 0.7){
      var sumAlpha = clamp((p - 0.7) / 0.15, 0, 1);
      el('line', { x1: 20, y1: 180, x2: 400, y2: 180,
                   stroke: 'var(--line)', 'stroke-width': '0.6',
                   'stroke-dasharray': '3 3', opacity: sumAlpha }, og);
      var sumTx = el('text', {
        x: 210, y: 205, fill: 'var(--gold)',
        'font-family': "'JetBrains Mono',ui-monospace,monospace",
        'font-size': '15', 'text-anchor': 'middle', 'font-weight': '700',
        opacity: sumAlpha, 'letter-spacing': '0.1em'
      }, og);
      sumTx.textContent = '3 alerts / 4 reads';
      var sumSub = el('text', {
        x: 210, y: 225, fill: 'var(--fg-dim)',
        'font-family': "'Inter','Noto Sans SC',sans-serif",
        'font-size': '11', 'text-anchor': 'middle', opacity: sumAlpha
      }, og);
      sumSub.textContent = LANG === 'cn'
        ? '8 行代码做完整数据流'
        : '8 lines = full data pipeline';
    }

    // key moment overlay
    var flash = document.getElementById('flash');
    var flashMain = document.getElementById('flashMain');
    var fSub = document.getElementById('flashSub');
    if (p >= 0.85){
      flash.classList.add('on');
      flashMain.textContent = 'RUN OK';
      fSub.textContent = LANG === 'cn'
        ? '你刚刚写了一段会跑的 Python'
        : 'You just wrote running Python';
    } else {
      flash.classList.remove('on');
    }
  }

  // ====== Frame chip ======
  function updateChips(idx){
    for (var i = 0; i < 5; i++){
      var c = document.getElementById('chip' + i);
      c.classList.remove('active', 'done');
      if (i < idx) c.classList.add('done');
      else if (i === idx) c.classList.add('active');
    }
    document.getElementById('stepName').textContent = FRAMES[idx].stepName;
  }

  function updateHud(idx){
    var F = FRAMES[idx];
    document.getElementById('hudV1').textContent = (idx+1) + ' / 5';
    document.getElementById('hudV2').textContent = F.hudStage[LANG] || F.hudStage.en;
    document.getElementById('hudV3').textContent = F.hudLines;
    document.getElementById('hudV4').textContent = F.hudResult;
  }

  function updateSubtitle(idx){
    var F = FRAMES[idx];
    document.getElementById('subCn').textContent = LANG === 'cn' ? F.subCn : F.subEn;
    document.getElementById('subEn').textContent = LANG === 'cn' ? F.subEn : F.subCn;
  }

  function refreshI18N(){
    document.getElementById('badgeMod').textContent = tr('badgeMod');
    document.getElementById('brandH1').textContent = tr('brandH1');
    document.getElementById('brandSub').textContent = tr('brandSub');
    document.getElementById('mascotName').textContent = tr('mascotName');
    document.getElementById('g1').lastChild.textContent = I18N.g1[LANG];
    document.getElementById('g2').lastChild.textContent = I18N.g2[LANG];
    document.getElementById('g3').lastChild.textContent = I18N.g3[LANG];
    document.getElementById('hudL1').textContent = tr('hudL1');
    document.getElementById('hudL2').textContent = tr('hudL2');
    document.getElementById('hudL3').textContent = tr('hudL3');
    document.getElementById('hudL4').textContent = tr('hudL4');
    updateHud(currentFrame);
    updateSubtitle(currentFrame);
  }

  function drawFrame(idx, p){
    clearStage();
    if (idx === 0) drawFrame1(p);
    else if (idx === 1) drawFrame2(p);
    else if (idx === 2) drawFrame3(p);
    else if (idx === 3) drawFrame4(p);
    else if (idx === 4) drawFrame5(p);
  }

  function tick(ts){
    if (!frameStartTs) frameStartTs = ts;
    var elapsed = ts - frameStartTs;
    var p = elapsed / FRAME_MS;
    if (p >= 1){
      currentFrame = (currentFrame + 1) % FRAMES.length;
      frameStartTs = ts;
      updateChips(currentFrame);
      updateHud(currentFrame);
      updateSubtitle(currentFrame);
      if (currentFrame === 0){
        document.getElementById('flash').classList.remove('on');
      }
      p = 0;
    }
    drawFrame(currentFrame, p);
    rafId = requestAnimationFrame(tick);
  }

  document.getElementById('langBtn').addEventListener('click', function(){
    LANG = (LANG === 'cn') ? 'en' : 'cn';
    refreshI18N();
  });

  updateChips(0);
  updateHud(0);
  updateSubtitle(0);
  rafId = requestAnimationFrame(tick);
})();
</script>
</body>
</html>
