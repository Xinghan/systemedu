<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>想左手 vs 想右手 — C3/C4 对侧脑波对比</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* 第1层 共享深空底 */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg: oklch(0.96 0.01 265);
    --fg-dim: oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold: oklch(0.85 0.14 85);
    /* 第2层 neuro accent (cortex-coral) */
    --neuro: oklch(0.75 0.17 25);
    /* 第3层 neuro 5色 palette */
    --synaptic: oklch(0.75 0.17 25);
    --dendrite: oklch(0.55 0.15 25);
    --axon: oklch(0.32 0.10 25);
    --firing: oklch(0.92 0.08 25);
    --memory: oklch(0.85 0.14 85);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100vh;overflow:hidden;}
  body{
    background:var(--bg-0);
    color:var(--fg);
    font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
    display:flex;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    padding:20px 16px;gap:16px;
  }
  .brand{
    font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--fg);
    padding-bottom:14px;border-bottom:1px solid var(--line);
  }
  .brand-sub{display:block;margin-top:6px;font-size:11px;font-weight:500;color:var(--fg-dim);}
  .deco{
    width:100%;height:118px;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
  }
  .deco svg{width:108px;height:104px;}
  .guide{display:flex;flex-direction:column;gap:10px;margin-top:2px;list-style:none;padding:0;}
  .guide-li{
    font-size:11.5px;line-height:1.5;color:var(--fg-dim);
    padding:2px 0 2px 10px;border-left:2px solid var(--line-strong);
    transition:color .25s,border-color .25s;
  }
  .guide-li.hl{border-left-color:var(--neuro);color:var(--fg);}

  /* ---------- 项目进度路线图 (S1-S6) ---------- */
  .route{display:flex;flex-direction:column;gap:0;margin-top:2px;}
  .route-ttl{
    font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--fg-mute);
    font-family:'JetBrains Mono',monospace;margin-bottom:7px;text-transform:uppercase;
  }
  .route-step{
    display:flex;align-items:center;gap:8px;
    font-size:10.5px;line-height:1.25;color:var(--fg-mute);
    padding:3px 0;position:relative;
  }
  .route-dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
    background:var(--bg-3);border:1.5px solid var(--line-strong);
  }
  .route-step.done .route-dot{background:var(--dendrite);border-color:var(--dendrite);}
  .route-step.cur{color:var(--fg);font-weight:700;}
  .route-step.cur .route-dot{
    background:var(--neuro);border-color:var(--firing);
    box-shadow:0 0 0 3px oklch(0.75 0.17 25 / 0.25);
  }
  /* connecting rail behind dots */
  .route-step::before{
    content:'';position:absolute;left:3.5px;top:-6px;width:1.5px;height:12px;
    background:var(--line);
  }
  .route-step:first-of-type::before{display:none;}
  .route-step.done::before{background:var(--dendrite);}
  .route-here{
    font-size:8.5px;font-family:'JetBrains Mono',monospace;font-weight:700;
    color:var(--neuro);margin-left:auto;letter-spacing:.04em;
  }

  /* ---------- 终点徽记 (Minecraft 角色剪影, 右下角) ---------- */
  .goal-badge{
    position:absolute;right:16px;bottom:16px;z-index:5;
    display:flex;align-items:center;gap:9px;
    background:oklch(0.18 0.04 265 / 0.78);
    border:1px solid var(--line-strong);
    border-radius:8px;padding:7px 11px 7px 8px;
    box-shadow:3px 3px 0 var(--bg-0);backdrop-filter:blur(2px);
  }
  .goal-badge svg{width:26px;height:30px;flex-shrink:0;}
  .goal-badge .gtxt{font-size:10px;line-height:1.35;color:var(--fg-dim);max-width:130px;}
  .goal-badge .gtxt b{color:var(--fg);font-weight:700;}

  .lang-btn{
    margin-top:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:600;letter-spacing:.06em;
    padding:8px 12px;cursor:pointer;
    background:var(--bg-2);color:var(--fg);
    border:1px solid var(--line-strong);
    border-radius:6px;
    box-shadow:3px 3px 0 var(--bg-0);
    transition:transform .1s, background .12s;
  }
  .lang-btn:hover{background:var(--bg-3);transform:translate(-1px,-1px);}
  .lang-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--bg-0);}

  /* ---------- Main stage ---------- */
  .main{
    flex:1;height:100vh;position:relative;overflow:hidden;
    background:var(--bg-0);
  }
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;}

  .hud{
    position:absolute;top:16px;right:16px;z-index:5;
    background:oklch(0.18 0.04 265 / 0.82);
    border:1px solid var(--line-strong);
    border-radius:8px;padding:10px 13px;
    font-family:'JetBrains Mono',monospace;font-size:11px;
    min-width:158px;box-shadow:3px 3px 0 var(--bg-0);
    backdrop-filter:blur(2px);
  }
  .hud-row{display:flex;justify-content:space-between;gap:14px;line-height:1.7;}
  .hud-lbl{color:var(--fg-dim);}
  .hud-val{color:var(--neuro);font-weight:700;}
  .hud-val.gold{color:var(--gold);}

  .sub{
    position:absolute;left:50%;bottom:26px;transform:translateX(-50%);
    z-index:5;text-align:center;width:86%;max-width:760px;pointer-events:none;
  }
  .sub-zh{
    display:inline-block;font-size:20px;font-weight:700;color:var(--fg);
    background:oklch(0.18 0.04 265 / 0.85);
    border:1px solid var(--line-strong);
    padding:7px 20px;border-radius:8px;
    box-shadow:3px 3px 0 var(--bg-0);
  }
  .sub-en{margin-top:6px;font-size:12.5px;font-style:italic;color:var(--fg-dim);}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">SystemEdu<span class="brand-sub" id="brandSub">脑波对比 · EEG M21</span></div>
  <!-- mascot: Spark 树突生物 -->
  <div class="deco">
    <svg viewBox="0 0 108 104" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g stroke="var(--dendrite)" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.9">
        <path d="M54 56 L30 30 M30 30 L18 22 M30 30 L24 14"/>
        <path d="M54 56 L78 30 M78 30 L90 22 M78 30 L84 14"/>
        <path d="M54 56 L34 80 M34 80 L22 88"/>
        <path d="M54 56 L74 80 M74 80 L86 88"/>
      </g>
      <path d="M54 56 L54 96" stroke="var(--axon)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="54" cy="56" r="15" fill="var(--synaptic)"/>
      <circle cx="54" cy="56" r="15" fill="none" stroke="var(--firing)" stroke-width="1.6" opacity="0.7"/>
      <circle cx="48" cy="53" r="3.2" fill="var(--bg-0)"/>
      <circle cx="60" cy="53" r="3.2" fill="var(--bg-0)"/>
      <circle cx="48.8" cy="52.2" r="1" fill="var(--firing)"/>
      <circle cx="60.8" cy="52.2" r="1" fill="var(--firing)"/>
      <circle cx="18" cy="22" r="2.6" fill="var(--firing)"/>
      <circle cx="90" cy="22" r="2.6" fill="var(--memory)"/>
      <circle cx="22" cy="88" r="2.4" fill="var(--memory)"/>
    </svg>
  </div>
  <ul class="guide" id="guide">
    <li class="guide-li" data-f="0">头顶看 C3 / C4 电极</li>
    <li class="guide-li" data-f="1">对侧控制：左手->右脑</li>
    <li class="guide-li" data-f="2">想动那侧 mu 振幅塌陷</li>
    <li class="guide-li" data-f="3">多次平均把噪声抵消</li>
    <li class="guide-li" data-f="4">左右镜像，电脑能看出</li>
  </ul>

  <!-- 项目进度路线图: 高亮 S3 (你在这) -->
  <nav class="route" id="route" aria-label="project route">
    <div class="route-ttl" id="routeTtl">BCI 项目路线</div>
    <div class="route-step done"><span class="route-dot"></span><span data-s="1">S1 认识脑波</span></div>
    <div class="route-step done"><span class="route-dot"></span><span data-s="2">S2 清洁信号</span></div>
    <div class="route-step cur"><span class="route-dot"></span><span data-s="3">S3 找特征训分类器</span><span class="route-here" id="routeHere">你在这</span></div>
    <div class="route-step"><span class="route-dot"></span><span data-s="4">S4 自录冲准</span></div>
    <div class="route-step"><span class="route-dot"></span><span data-s="5">S5 接 Minecraft</span></div>
    <div class="route-step"><span class="route-dot"></span><span data-s="6">S6 分享</span></div>
  </nav>

  <button id="langBtn" class="lang-btn">中 / EN</button>
</aside>

<main class="main">
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="hud-row"><span class="hud-lbl">frame</span><span class="hud-val" id="hF">1/5</span></div>
    <div class="hud-row"><span class="hud-lbl">stage</span><span class="hud-val" id="hStage">scalp map</span></div>
    <div class="hud-row"><span class="hud-lbl">band</span><span class="hud-val">mu ~10Hz</span></div>
    <div class="hud-row"><span class="hud-lbl">ERD</span><span class="hud-val" id="hERD">--</span></div>
  </div>

  <div class="sub">
    <div class="sub-zh" id="subZh">头顶往下看，左右两个运动区电极</div>
    <div class="sub-en" id="subEn">Top-down scalp view: two motor-cortex electrodes</div>
  </div>

  <!-- 终点徽记: Minecraft 角色剪影 (用念头让它动) -->
  <div class="goal-badge" aria-label="project goal">
    <svg viewBox="0 0 26 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- 方块角色头 + 身体剪影 -->
      <rect x="6" y="1" width="14" height="13" rx="1" fill="var(--dendrite)" stroke="var(--firing)" stroke-width="1"/>
      <rect x="9" y="5" width="2.6" height="2.6" fill="var(--bg-0)"/>
      <rect x="14.4" y="5" width="2.6" height="2.6" fill="var(--bg-0)"/>
      <rect x="10" y="9.5" width="6" height="1.6" fill="var(--bg-0)" opacity="0.7"/>
      <rect x="7" y="15" width="12" height="10" rx="1" fill="var(--axon)" stroke="var(--line-strong)" stroke-width="0.8"/>
      <rect x="3" y="16" width="3.5" height="8" rx="0.6" fill="var(--axon)"/>
      <rect x="19.5" y="16" width="3.5" height="8" rx="0.6" fill="var(--axon)"/>
      <rect x="9" y="25" width="3" height="4" fill="var(--axon)"/>
      <rect x="14" y="25" width="3" height="4" fill="var(--axon)"/>
    </svg>
    <span class="gtxt" id="goalTxt">终点：<b>用念头让它动</b></span>
  </div>
</main>

<script>
/* ===================== i18n ===================== */
var LANG = 'cn';
var I18N = {
  brandSub: {cn:'脑波对比 · EEG M21', en:'Brainwave Compare · EEG M21'},
  guide: {
    cn:['头顶看 C3 / C4 电极','对侧控制：左手->右脑','想动那侧 mu 振幅塌陷','多次平均把噪声抵消','左右镜像，电脑能看出'],
    en:['Top view: C3 / C4 sites','Contralateral: left hand->right brain','mu amplitude collapses (ERD)','Averaging cancels the noise','Mirror pattern — computable']
  },
  /* subCues per frame */
  s0:{cn:'想让角色听念头动，先得让电脑看出你想的是左还是右', en:'To make the character obey your thought, first the computer must tell left from right'},
  s1:{cn:'想动左手 -> 右脑 C4 亮；想动右手 -> 左脑 C3 亮（交叉）', en:'Imagine left hand -> right brain C4; right hand -> left brain C3 (crossed)'},
  s2:{cn:'想左手时，对侧 C4 的 mu 节律振幅塌陷 = ERD', en:'On left imagery, contralateral C4 mu amplitude collapses = ERD'},
  s3:{cn:'单次太吵；很多次叠起来平均，噪声互相抵消', en:'One trial is noisy; stack many and average — noise cancels out'},
  s4:{cn:'看出左右手不一样，是脑控分类的第一步', en:'Telling left from right apart — the first step of mind-controlled classification'},
  routeTtl:{cn:'BCI 项目路线', en:'BCI Project Route'},
  routeHere:{cn:'你在这', en:'YOU'},
  route:{
    cn:['S1 认识脑波','S2 清洁信号','S3 找特征训分类器','S4 自录冲准','S5 接 Minecraft','S6 分享'],
    en:['S1 Read EEG','S2 Clean signal','S3 Feature + classifier','S4 Self-train','S5 To Minecraft','S6 Share']
  },
  goalTxt:{cn:'终点：用念头让它动', en:'Goal: move it with thought'}
};
function tt(o){return (o&&o[LANG])||(o&&o.en)||'';}

function refreshI18N(){
  document.getElementById('brandSub').textContent = tt(I18N.brandSub);
  var g = document.querySelectorAll('#guide .guide-li');
  for(var i=0;i<g.length;i++){ g[i].textContent = I18N.guide[LANG][i]; }
  // 路线图
  document.getElementById('routeTtl').textContent = tt(I18N.routeTtl);
  document.getElementById('routeHere').textContent = tt(I18N.routeHere);
  var rs = document.querySelectorAll('#route .route-step span[data-s]');
  for(var j=0;j<rs.length;j++){ rs[j].textContent = I18N.route[LANG][j]; }
  // 终点徽记 (CN 加粗后半句, EN 加粗后半句)
  var gt = tt(I18N.goalTxt);
  if(LANG==='cn'){ document.getElementById('goalTxt').innerHTML = '终点：<b>用念头让它动</b>'; }
  else { document.getElementById('goalTxt').innerHTML = 'Goal: <b>move it with thought</b>'; }
  document.getElementById('langBtn').textContent = LANG==='cn' ? '中 / EN' : 'EN / 中';
  syncSub();
  syncGuideHL();
}
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG==='cn' ? 'en' : 'cn';
  refreshI18N();
});

/* ===================== Canvas ===================== */
var canvas = document.getElementById('stage');
var ctx = canvas.getContext('2d');
var W=0,H=0,DPR=1;
function resize(){
  var rect = canvas.parentElement.getBoundingClientRect();
  if(rect.width<1||rect.height<1) return;
  DPR = window.devicePixelRatio||1;
  canvas.width = rect.width*DPR; canvas.height = rect.height*DPR;
  canvas.style.width = rect.width+'px'; canvas.style.height = rect.height+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W = rect.width; H = rect.height;
}
window.addEventListener('resize', resize);
resize();
setTimeout(resize,200); setTimeout(resize,600);
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(resize);}

/* ===================== Palette (canvas) — deep space ===================== */
var C = {
  bg0:'#0c0f1c', bg1:'#141a2e', bg2:'#1b2238',
  line:'rgba(150,160,210,0.30)', lineStrong:'rgba(170,180,225,0.55)',
  fg:'#eef0f8', fgDim:'#aab0c8', fgMute:'#7b8198',
  neuro:'#ee6a52', dendrite:'#c0503e', axon:'#7a3528', firing:'#ffb0a0',
  gold:'#f2cf6e', skull:'#262d44', skullEdge:'#3a4262',
  left:'#ee6a52', right:'#f2a36e'
};

var animFrames = 5;
var FRAME_DUR = 6200;           // 6.2s x 5 = ~31s cycle
var animStart = performance.now();
var curFrame = 0;

function syncSub(){
  var o = I18N['s'+curFrame];
  document.getElementById('subZh').textContent = LANG==='cn' ? o.cn : o.en;
  document.getElementById('subEn').textContent = o.en;
}
function syncGuideHL(){
  var g = document.querySelectorAll('#guide .guide-li');
  for(var i=0;i<g.length;i++){ g[i].classList.toggle('hl', i===curFrame); }
}

/* ===================== draw helpers ===================== */
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function panel(x,y,w,h,fill){
  ctx.save();
  ctx.fillStyle = fill||C.bg1;
  ctx.strokeStyle = C.line;
  ctx.lineWidth = 1.2;
  rr(x,y,w,h,10); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function frameTitle(s){
  ctx.save();
  ctx.fillStyle = C.fg;
  ctx.font = '700 19px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline='alphabetic';
  ctx.fillText(s, W/2, 38);
  ctx.restore();
}

/* head top-view: C3 on left hemisphere, C4 on right hemisphere */
function drawHead(cx, cy, R, lit){
  ctx.save();
  ctx.fillStyle = C.skull;
  ctx.strokeStyle = C.skullEdge;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, R, R*1.12, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  // nose (top = front)
  ctx.beginPath();
  ctx.moveTo(cx-9, cy-R*1.12);
  ctx.lineTo(cx, cy-R*1.12-12);
  ctx.lineTo(cx+9, cy-R*1.12);
  ctx.fillStyle = C.skullEdge; ctx.fill();
  ctx.fillStyle = C.fgMute;
  ctx.font = '600 11px JetBrains Mono, monospace';
  ctx.textAlign='center';
  ctx.fillText(LANG==='cn'?'前 front':'front', cx, cy-R*1.12-18);
  // midline
  ctx.strokeStyle = C.line; ctx.setLineDash([5,5]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx, cy-R*1.05); ctx.lineTo(cx, cy+R*1.05); ctx.stroke();
  ctx.setLineDash([]);
  // hemisphere labels
  ctx.fillStyle = C.fgMute;
  ctx.font='600 10px JetBrains Mono, monospace';
  ctx.fillText(LANG==='cn'?'左半球':'L hemi', cx-R*0.55, cy-R*0.92);
  ctx.fillText(LANG==='cn'?'右半球':'R hemi', cx+R*0.55, cy-R*0.92);
  ctx.restore();
  var c3 = {x:cx-R*0.5, y:cy};
  var c4 = {x:cx+R*0.5, y:cy};
  drawElectrode(c3.x,c3.y,'C3', lit==='C3');
  drawElectrode(c4.x,c4.y,'C4', lit==='C4');
  return {c3:c3,c4:c4};
}
function drawElectrode(x,y,name,on){
  ctx.save();
  if(on){
    var g = ctx.createRadialGradient(x,y,2,x,y,34);
    g.addColorStop(0,'rgba(238,106,82,0.55)');
    g.addColorStop(1,'rgba(238,106,82,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,34,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = on ? C.neuro : C.bg2;
  ctx.strokeStyle = on ? C.firing : C.lineStrong;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = on ? C.bg0 : C.fgDim;
  ctx.font='700 10px JetBrains Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(name, x, y);
  ctx.restore();
}

/* mu-band trace: amp drops post-cue by erd */
function drawTrace(x,y,w,h,opts){
  var erd = opts.erd||0, color = opts.color||C.neuro, alpha = opts.alpha==null?1:opts.alpha;
  var seed = opts.seed||1;
  ctx.save();
  ctx.globalAlpha = alpha;
  panel(x,y,w,h,C.bg1);
  ctx.fillStyle = color; rr(x,y,w,20,10); ctx.fill();
  ctx.fillStyle = C.bg0;
  ctx.font='600 10px JetBrains Mono, monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(opts.label||'', x+8, y+10);
  ctx.textAlign='right';
  ctx.fillText(opts.elec||'', x+w-8, y+10);
  var px=x+8, py=y+24, pw=w-16, ph=h-32;
  var mid = py+ph/2;
  var cueX = px + pw*0.32;
  ctx.strokeStyle = C.line; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px,mid); ctx.lineTo(px+pw,mid); ctx.stroke();
  if(erd>0.05){
    ctx.fillStyle = 'rgba(238,106,82,0.10)';
    ctx.fillRect(cueX, py, px+pw-cueX, ph);
  }
  ctx.strokeStyle = C.gold; ctx.lineWidth=1.6; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(cueX,py); ctx.lineTo(cueX,py+ph); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = C.gold; ctx.font='600 9px JetBrains Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('cue', cueX, py+ph+2);
  ctx.strokeStyle = color; ctx.lineWidth=1.8;
  ctx.beginPath();
  var N=200;
  for(var i=0;i<=N;i++){
    var fx = px + pw*i/N;
    var u = i/N;
    var tNorm = (fx-cueX)/(px+pw-cueX);
    var amp = 1;
    if(tNorm>0){
      var ramp = Math.min(1, tNorm/0.18);
      var hold = (tNorm<0.78)?1:Math.max(0,1-(tNorm-0.78)/0.22*0.6);
      amp = 1 - erd*ramp*hold;
    }
    var carrier = Math.sin(u*Math.PI*2*9 + seed);
    var noise = Math.sin(u*Math.PI*2*2.3 + seed*1.7)*0.18 + Math.sin(u*53+seed*9)*0.08;
    var val = (carrier*amp + noise);
    var fy = mid - val*(ph*0.38);
    if(i===0) ctx.moveTo(fx,fy); else ctx.lineTo(fx,fy);
  }
  ctx.stroke();
  ctx.restore();
}

function drawArrow(x1,y1,x2,y2,color,label,alpha){
  ctx.save();
  ctx.globalAlpha = alpha==null?1:alpha;
  ctx.strokeStyle = color; ctx.fillStyle=color; ctx.lineWidth=2.6;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  var a = Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-13*Math.cos(a-0.35), y2-13*Math.sin(a-0.35));
  ctx.lineTo(x2-13*Math.cos(a+0.35), y2-13*Math.sin(a+0.35));
  ctx.closePath(); ctx.fill();
  if(label){
    ctx.font='700 11px Inter, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    var mx=(x1+x2)/2, my=(y1+y2)/2-7;
    var tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(12,15,28,0.82)';
    rr(mx-tw/2-5, my-15, tw+10, 17, 4); ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(label, mx, my);
  }
  ctx.restore();
}

function circleHi(x,y,rx,ry,color,label,alpha){
  ctx.save();
  ctx.globalAlpha = alpha==null?1:alpha;
  ctx.strokeStyle = color; ctx.lineWidth=2.6; ctx.setLineDash([7,5]);
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  if(label){
    ctx.fillStyle = color; ctx.font='700 12px Inter, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(label, x, y-ry-6);
  }
  ctx.restore();
}

/* ===================== Frames ===================== */
function bgFill(){ ctx.fillStyle = C.bg0; ctx.fillRect(0,0,W,H); }

// F1 — head top view, label C3 (left) / C4 (right)
function frame0(p){
  bgFill();
  frameTitle(LANG==='cn'?'头顶俯视：标出 C3 / C4 运动皮层电极':'Top-down view: locate C3 / C4 motor electrodes');
  var R = Math.min(W*0.20, H*0.30);
  var cx=W/2, cy=H*0.50;
  drawHead(cx,cy,R, null);
  var a = Math.min(1,p*2.5);
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle=C.fgDim; ctx.font='600 12px Inter, sans-serif'; ctx.textAlign='center';
  ctx.fillText(LANG==='cn'?'C3 在左脑运动区':'C3 over left motor cortex', cx-R*0.5, cy+R*1.12+24);
  ctx.fillText(LANG==='cn'?'C4 在右脑运动区':'C4 over right motor cortex', cx+R*0.5, cy+R*1.12+24);
  ctx.restore();
  document.getElementById('hStage').textContent = 'scalp map';
  document.getElementById('hERD').textContent = '--';
  document.getElementById('hERD').className = 'hud-val';
}

// F2 — contralateral control: left hand->C4, right hand->C3 (crossed)
function frame1(p){
  bgFill();
  frameTitle(LANG==='cn'?'对侧控制：想动左手点亮右脑，想动右手点亮左脑':'Contralateral: left hand lights right brain, and vice versa');
  var R = Math.min(W*0.135, H*0.205);
  var cyTop = H*0.30, cyBot = H*0.71;
  var cx = W*0.54;
  var half = p<0.5 ? 0 : 1;            // 0=left hand, 1=right hand
  var litTop = half===0 ? 'C4' : null;
  var litBot = half===1 ? 'C3' : null;
  var pT = drawHead(cx,cyTop,R, litTop);
  var pB = drawHead(cx,cyBot,R, litBot);
  ctx.save();
  ctx.font='700 13px Inter, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle = half===0?C.left:C.fgMute;
  ctx.fillText(LANG==='cn'?'想动 左手':'imagine LEFT hand', 24, cyTop);
  ctx.fillStyle = half===1?C.right:C.fgMute;
  ctx.fillText(LANG==='cn'?'想动 右手':'imagine RIGHT hand', 24, cyBot);
  ctx.restore();
  if(half===0){
    drawArrow(168, cyTop-6, pT.c4.x-16, pT.c4.y, C.left, LANG==='cn'?'交叉 -> 右脑 C4':'crossed -> right C4', Math.min(1,p*3));
  } else {
    drawArrow(178, cyBot-6, pB.c3.x-16, pB.c3.y, C.right, LANG==='cn'?'交叉 -> 左脑 C3':'crossed -> left C3', Math.min(1,(p-0.5)*3));
  }
  document.getElementById('hStage').textContent = half===0?'left imagery':'right imagery';
  document.getElementById('hERD').textContent = 'cross';
  document.getElementById('hERD').className='hud-val';
}

// F3 — left imagery: C4 mu collapses (ERD); C3 holds
function frame2(p){
  bgFill();
  frameTitle(LANG==='cn'?'想左手时：对侧 C4 的 mu 节律塌陷（ERD），C3 几乎不变':'Left imagery: contralateral C4 mu collapses (ERD); C3 stays');
  var colW = Math.min(W*0.40, 420), colH = Math.min(H*0.26, 180);
  var gap = 26;
  var x0 = W/2 - colW - gap/2;
  var x1 = W/2 + gap/2;
  var yTop = H*0.21;
  var erdGrow = Math.min(1, p*1.6);
  drawTrace(x0, yTop, colW, colH, {erd:0.05, color:C.fgDim, label:LANG==='cn'?'同侧 C3':'ipsi C3', elec:'C3', seed:1.0});
  drawTrace(x1, yTop, colW, colH, {erd:0.62*erdGrow, color:C.neuro, label:LANG==='cn'?'对侧 C4':'contra C4', elec:'C4', seed:3.4});
  ctx.save();
  ctx.font='600 12px Inter, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=C.fgDim;
  ctx.fillText(LANG==='cn'?'振幅维持':'amplitude held', x0+colW/2, yTop+colH+24);
  ctx.fillStyle=C.neuro;
  ctx.fillText(LANG==='cn'?'振幅塌陷 = ERD':'amplitude collapses = ERD', x1+colW/2, yTop+colH+24);
  ctx.restore();
  if(p>0.35){
    var ha = Math.min(1,(p-0.35)*3);
    circleHi(x1+colW*0.66, yTop+colH*0.54, colW*0.20, colH*0.30, C.gold, LANG==='cn'?'mu 变弱':'mu drops', ha);
  }
  document.getElementById('hStage').textContent = 'left imagery';
  document.getElementById('hERD').textContent = '~'+Math.round(62*erdGrow)+'%';
  document.getElementById('hERD').className='hud-val';
}

// F4 — multi-trial stacking + averaging cancels noise
function frame3(p){
  bgFill();
  frameTitle(LANG==='cn'?'单次太吵：很多次叠起来平均，噪声互相抵消':'One trial is noisy: stack many, average — noise cancels');
  var colW = Math.min(W*0.62, 660);
  var x = W/2 - colW/2;
  var topY = H*0.155;
  var nTrials = 7;
  var rowH = 25;
  ctx.save();
  ctx.font='600 11px JetBrains Mono, monospace'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle=C.fgDim;
  ctx.fillText(LANG==='cn'?'C4 单次 trial（吵）':'C4 single trials (noisy)', x, topY-12);
  ctx.restore();
  for(var i=0;i<nTrials;i++){
    var a = Math.min(1, p*2.2 - i*0.12);
    if(a<=0) continue;
    var ty = topY + i*rowH;
    ctx.save();
    ctx.globalAlpha = a*0.55;
    ctx.strokeStyle = C.dendrite; ctx.lineWidth=1.1;
    ctx.beginPath();
    var px=x, pw=colW, cueX=px+pw*0.32, mid=ty+rowH/2;
    for(var k=0;k<=160;k++){
      var fx=px+pw*k/160, u=k/160;
      var tNorm=(fx-cueX)/(px+pw-cueX);
      var amp = tNorm>0 ? (1-0.6*Math.min(1,tNorm/0.18)) : 1;
      var carrier=Math.sin(u*Math.PI*2*9 + i*1.3);
      var noise=Math.sin(u*Math.PI*2*(3+i*0.4)+i*2.1)*0.5 + Math.sin(u*(40+i*7)+i*5)*0.35;
      var val=carrier*amp + noise;
      var fy=mid - val*(rowH*0.40);
      if(k===0)ctx.moveTo(fx,fy);else ctx.lineTo(fx,fy);
    }
    ctx.stroke();
    ctx.restore();
  }
  var avgY = topY + nTrials*rowH + 22;
  var avgH = Math.min(H*0.19, 120);
  var ar = Math.min(1, Math.max(0,(p-0.4))*2.2);
  if(ar>0){
    drawArrow(W/2, avgY-16, W/2, avgY+4, C.gold, LANG==='cn'?'平均 average ('+nTrials+'+)':'average ('+nTrials+'+)', ar);
    drawTrace(x, avgY+12, colW, avgH, {erd:0.6, color:C.neuro, label:LANG==='cn'?'C4 平均（干净）':'C4 average (clean)', elec:'mean', seed:2.2, alpha:ar});
  }
  document.getElementById('hStage').textContent = 'avg '+nTrials+'+ trials';
  document.getElementById('hERD').textContent = ar>0.5?'~60%':'noisy';
  document.getElementById('hERD').className='hud-val';
}

// F5 — left avg vs right avg; C3/C4 ERD mirror-swapped; gold reveal
function frame4(p){
  bgFill();
  frameTitle(LANG==='cn'?'左手平均 vs 右手平均：C3 / C4 的 ERD 镜像对调':'Left avg vs Right avg: C3 / C4 ERD mirror-swapped');
  var colW = Math.min(W*0.40, 400), colH = Math.min(H*0.17, 118);
  var gap = 30;
  var x0 = W/2 - colW - gap/2;
  var x1 = W/2 + gap/2;
  var yA = H*0.155, yB = H*0.155 + colH + 16;
  ctx.save();
  ctx.font='800 15px Inter, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=C.left;  ctx.fillText(LANG==='cn'?'想左手 平均':'LEFT-hand avg', x0+colW/2, yA-12);
  ctx.fillStyle=C.right; ctx.fillText(LANG==='cn'?'想右手 平均':'RIGHT-hand avg', x1+colW/2, yA-12);
  ctx.restore();
  // LEFT class: C3 holds, C4 ERD
  drawTrace(x0, yA, colW, colH, {erd:0.06, color:C.fgDim, label:LANG==='cn'?'C3 同侧':'C3 ipsi', elec:'C3', seed:1.1});
  drawTrace(x0, yB, colW, colH, {erd:0.60, color:C.neuro, label:LANG==='cn'?'C4 对侧 ERD':'C4 contra ERD', elec:'C4', seed:3.3});
  // RIGHT class: C3 ERD, C4 holds (mirror)
  drawTrace(x1, yA, colW, colH, {erd:0.60, color:C.neuro, label:LANG==='cn'?'C3 对侧 ERD':'C3 contra ERD', elec:'C3', seed:5.7});
  drawTrace(x1, yB, colW, colH, {erd:0.06, color:C.fgDim, label:LANG==='cn'?'C4 同侧':'C4 ipsi', elec:'C4', seed:7.2});
  if(p>0.25){
    var ma=Math.min(1,(p-0.25)*3);
    circleHi(x0+colW*0.66, yB+colH*0.52, colW*0.18, colH*0.34, C.gold, '', ma);
    circleHi(x1+colW*0.66, yA+colH*0.52, colW*0.18, colH*0.34, C.gold, '', ma);
    ctx.save(); ctx.globalAlpha=ma;
    ctx.strokeStyle=C.gold; ctx.lineWidth=1.6; ctx.setLineDash([6,5]);
    ctx.beginPath();
    ctx.moveTo(x0+colW*0.66, yB+colH*0.52);
    ctx.lineTo(x1+colW*0.66, yA+colH*0.52);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=C.gold; ctx.font='700 11px Inter, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(LANG==='cn'?'镜像对调 mirror':'mirror-swapped', W/2, (yB+colH*0.52+yA+colH*0.52)/2-8);
    ctx.restore();
  }
  if(p>0.45){
    var ba=Math.min(1,(p-0.45)*3);
    var bw=Math.min(W*0.72,580), bh=54, bx=W/2-bw/2, by=H-118;
    ctx.save(); ctx.globalAlpha=ba;
    ctx.fillStyle='rgba(20,26,46,0.92)';
    ctx.strokeStyle=C.gold; ctx.lineWidth=1.6;
    rr(bx,by,bw,bh,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle=C.gold; ctx.font='800 16px Inter, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(LANG==='cn'?'想左手 / 右手脑波真不一样，电脑能看出来':'Left vs right imagery really differ — the computer can tell', W/2, by+24);
    ctx.fillStyle=C.fgDim; ctx.font='500 12px Inter, sans-serif';
    ctx.fillText(LANG==='cn'?'对侧 ERD 稳定可测 -> 可被分类器学习':'Contralateral ERD is stable & measurable -> learnable by a classifier', W/2, by+42);
    ctx.restore();
  }
  document.getElementById('hStage').textContent = 'left vs right';
  document.getElementById('hERD').textContent = 'mirror';
  document.getElementById('hERD').className = p>0.45?'hud-val gold':'hud-val';
}

/* ===================== loop ===================== */
function render(){
  var now = performance.now();
  var total = now - animStart;
  var idx = Math.floor((total % (FRAME_DUR*animFrames)) / FRAME_DUR);
  var p = ((total % (FRAME_DUR*animFrames)) % FRAME_DUR) / FRAME_DUR;
  if(idx !== curFrame){
    curFrame = idx;
    document.getElementById('hF').textContent = (curFrame+1)+'/5';
    syncSub();
    syncGuideHL();
  }
  ctx.clearRect(0,0,W,H);
  if(curFrame===0) frame0(p);
  else if(curFrame===1) frame1(p);
  else if(curFrame===2) frame2(p);
  else if(curFrame===3) frame3(p);
  else frame4(p);
  requestAnimationFrame(render);
}

/* init */
document.getElementById('hF').textContent = '1/5';
refreshI18N();
requestAnimationFrame(render);
</script>
