<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
/* ── Top bar: lang-btn + title + guide toggle + frame indicator ── */
.top-bar{display:flex;align-items:center;gap:8px;padding:6px 12px 4px;min-height:36px;}
.lang-btn{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;flex-shrink:0;}
.top-bar .titles{flex:1;min-width:0;overflow:hidden;}
.top-bar h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(12px,1.8vw,16px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 12px var(--glow,rgba(80,255,176,0.3));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-bar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-bar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;flex-shrink:0;white-space:nowrap;}
/* ── Guide panel: collapsible, in document flow ── */
.guide-bar{background:rgba(0,0,0,0.3);overflow:hidden;transition:max-height 0.25s ease;}
.guide-bar.collapsed{max-height:0!important;padding:0 12px!important;}
.guide-bar-inner{padding:4px 12px 6px;font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.guide-bar-inner ul{padding-left:16px;margin:0;}
.guide-bar-inner li{margin-bottom:1px;}
.guide-toggle{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.2);background:transparent;color:var(--primary,#50ffb0);flex-shrink:0;}
.guide-toggle .arrow{display:inline-block;transition:transform 0.2s;font-size:8px;margin-left:3px;}
.guide-bar.collapsed+.top-bar .guide-toggle .arrow,
.guide-toggle.collapsed .arrow{transform:rotate(-90deg);}
/* ── Canvas area ── */
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* ── Controls + HUD ── */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">
<!-- Top bar: lang button, title, guide toggle, frame indicator -->
<div class="top-bar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="titles"><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<button class="guide-toggle" id="guideToggle"><span id="guideTitle"></span><span class="arrow">&#9660;</span></button>
<div class="frame-ind" id="frameIndicator"></div>
</div>
<!-- Guide panel: document flow, collapsible -->
<div class="guide-bar" id="guide">
<div class="guide-bar-inner" id="guideContent"></div>
</div>
<!-- Canvas: fills remaining space, nothing overlaps it -->
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="../../../course_factory/runtime/animation_runtime.js"></script>

<script>
// ============================================================
// Knode 15: How to Measure a Flight
// Frame 0: Title
// Frame 1: Setting up - tape measure on ground
// Frame 2: Launching & timing - stopwatch + distance
// Frame 3: Recording data in a table
// Frame 4: Comparing two planes with data
// ============================================================

var SAMPLE_DATA = [
  {plane:'A', trials:[{d:4.2,t:1.8},{d:3.8,t:1.5},{d:4.5,t:2.0},{d:3.9,t:1.6},{d:4.1,t:1.7}]},
  {plane:'B', trials:[{d:6.1,t:2.5},{d:5.8,t:2.3},{d:6.4,t:2.7},{d:5.5,t:2.1},{d:6.0,t:2.4}]},
];

var CONFIG = {
  style: 'ares_mission',
  totalFrames: 5,
  i18n: {
    title:     {en:'HOW TO MEASURE A FLIGHT', cn:'\u600e\u4e48\u6d4b\u91cf\u4e00\u6b21\u98de\u884c'},
    subtitle:  {en:'From watching to measuring', cn:'\u4ece\u89c2\u5bdf\u5230\u6d4b\u91cf'},
    step1:     {en:'Step 1: Set up measurement line', cn:'\u7b2c\u4e00\u6b65\uff1a\u5e03\u7f6e\u6d4b\u91cf\u7ebf'},
    step2:     {en:'Step 2: Launch + Time + Measure', cn:'\u7b2c\u4e8c\u6b65\uff1a\u53d1\u5c04+\u8ba1\u65f6+\u6d4b\u91cf'},
    step3:     {en:'Step 3: Record in data table', cn:'\u7b2c\u4e09\u6b65\uff1a\u586b\u5199\u6570\u636e\u8868'},
    step4:     {en:'Step 4: Compare with data!', cn:'\u7b2c\u56db\u6b65\uff1a\u7528\u6570\u636e\u6bd4\u8f83\uff01'},
    tape:      {en:'Tape measure', cn:'\u76ae\u5c3a'},
    stopwatch: {en:'Stopwatch', cn:'\u79d2\u8868'},
    startLine: {en:'Start line', cn:'\u8d77\u98de\u7ebf'},
    landing:   {en:'Landing spot', cn:'\u843d\u70b9'},
    distance:  {en:'Distance', cn:'\u8ddd\u79bb'},
    time:      {en:'Time', cn:'\u65f6\u95f4'},
    trial:     {en:'Trial', cn:'\u6b21\u6570'},
    plane:     {en:'Plane', cn:'\u98de\u673a'},
    avg:       {en:'Average', cn:'\u5e73\u5747'},
    winner:    {en:'Winner: Plane B!', cn:'\u80dc\u8005\uff1a\u98de\u673aB\uff01'},
    dataProves:{en:'Data proves it, not just "I think"!', cn:'\u6570\u636e\u8bc1\u660e\uff0c\u4e0d\u662f\u201c\u6211\u89c9\u5f97\u201d\uff01'},
    guideTitle:{en:'Measurement Guide', cn:'\u6d4b\u91cf\u6307\u5357'},
    g1:        {en:'Always start from the same line', cn:'\u6bcf\u6b21\u4ece\u540c\u4e00\u6761\u7ebf\u8d77\u98de'},
    g2:        {en:'Measure to where it lands, not where it stops rolling', cn:'\u6d4b\u91cf\u5230\u843d\u5730\u70b9\uff0c\u4e0d\u662f\u6eda\u505c\u70b9'},
    g3:        {en:'Do at least 5 trials per plane', cn:'\u6bcf\u67b6\u98de\u673a\u81f3\u5c115\u6b21'},
    g4:        {en:'Use averages to compare fairly', cn:'\u7528\u5e73\u5747\u503c\u6bd4\u8f83\u624d\u516c\u5e73'},
    hudStep:   {en:'STEP', cn:'\u6b65\u9aa4'},
    hudTool:   {en:'TOOL', cn:'\u5de5\u5177'},
    hudWhat:   {en:'MEASURING', cn:'\u6d4b\u91cf\u5185\u5bb9'},
    hudWhy:    {en:'WHY', cn:'\u4e3a\u4ec0\u4e48'},
  },
  hudLabels: ['hudStep', 'hudTool', 'hudWhat', 'hudWhy'],
  hudValues: [
    ['--','--','--','--'],
    ['1/4','\u76ae\u5c3a','\u5730\u9762\u57fa\u51c6\u7ebf','\u7edf\u4e00\u8d77\u70b9'],
    ['2/4','\u76ae\u5c3a+\u79d2\u8868','\u8ddd\u79bb+\u65f6\u95f4','\u5b9a\u91cf\u8bb0\u5f55'],
    ['3/4','\u8868\u683c','\u586b\u5199\u6570\u636e','\u4e0d\u9057\u6f0f'],
    ['4/4','\u5e73\u5747\u503c','\u5bf9\u6bd4\u4e24\u67b6','\u7528\u6570\u636e\u8bf4\u8bdd'],
  ],
  guideTitle: 'guideTitle',
  guideItems: ['g1','g2','g3','g4'],
};

function drawBg(ctx, W, H) {
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0c1420');
  grad.addColorStop(1, '#162030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(80,255,176,0.04)';
  ctx.lineWidth = 1;
  for (var x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (var y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2;

  if (f === 0) {
    return [
      {id:'t1', type:'label', text:t('title'), x:cx, y:120, color:P.primary, size:22, align:'center', font:'Space Grotesk'},
      {id:'t2', type:'label', text:t('subtitle'), x:cx, y:155, color:P.muted, size:13, align:'center'},
    ];
  }
  return [{id:'_custom_'+f, type:'custom_measure', frame:f}];
}

function customDrawElement(ctx, el, W, H) {
  if (el.type !== 'custom_measure') return false;
  var f = el.frame;
  var t_fn = AnimRuntime.t;
  var P = AnimRuntime.PAL;

  // Common ground
  var groundY = H * 0.75;
  ctx.fillStyle = '#2a3528';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = 'rgba(80,255,176,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();

  if (f === 1) {
    // Setting up measurement line
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('step1'), W/2, 40);

    // Start line
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 5]);
    ctx.beginPath(); ctx.moveTo(W*0.15, groundY-5); ctx.lineTo(W*0.15, groundY-80); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff4444';
    ctx.font = "bold 12px 'Noto Sans SC', sans-serif";
    ctx.fillText(t_fn('startLine'), W*0.15, groundY - 85);

    // Tape measure on ground
    ctx.strokeStyle = '#f0c040';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(W*0.15, groundY-2); ctx.lineTo(W*0.85, groundY-2); ctx.stroke();
    // Markers every meter
    for (var m = 0; m <= 10; m++) {
      var mx = W*0.15 + m * (W*0.7/10);
      ctx.strokeStyle = '#f0c040';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(mx, groundY-8); ctx.lineTo(mx, groundY+2); ctx.stroke();
      ctx.fillStyle = '#f0c040';
      ctx.font = "10px 'Space Grotesk', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(m+'m', mx, groundY+15);
    }
    ctx.fillStyle = '#f0c040';
    ctx.font = "bold 13px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('tape'), W*0.5, groundY+35);
  } else if (f === 2) {
    // Launch + timing
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('step2'), W/2, 40);

    // Start line
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2;
    ctx.setLineDash([8,4]);
    ctx.beginPath(); ctx.moveTo(W*0.15, groundY-5); ctx.lineTo(W*0.15, groundY-60); ctx.stroke();
    ctx.setLineDash([]);

    // Paper plane in flight
    var planeX = W * 0.55, planeY = groundY - 120;
    ctx.save();
    ctx.translate(planeX, planeY);
    ctx.rotate(-0.1);
    ctx.fillStyle = '#d0d8f0';
    ctx.beginPath();
    ctx.moveTo(20, 0); ctx.lineTo(-15, -8); ctx.lineTo(-15, 8); ctx.closePath();
    ctx.fill();
    ctx.restore();
    // Flight arc
    ctx.strokeStyle = 'rgba(80,255,176,0.3)';
    ctx.setLineDash([5,3]);
    ctx.beginPath();
    ctx.moveTo(W*0.15, groundY-40);
    ctx.quadraticCurveTo(W*0.35, groundY-160, planeX, planeY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Landing spot
    ctx.fillStyle = '#50ffb0';
    ctx.beginPath(); ctx.arc(W*0.72, groundY-3, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#50ffb0';
    ctx.font = "11px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('landing'), W*0.72, groundY+18);

    // Distance arrow
    ctx.strokeStyle = '#50ffb0';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W*0.15, groundY-20); ctx.lineTo(W*0.72, groundY-20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W*0.70, groundY-24); ctx.lineTo(W*0.72, groundY-20); ctx.lineTo(W*0.70, groundY-16); ctx.stroke();
    ctx.fillStyle = '#50ffb0';
    ctx.font = "bold 14px 'Space Grotesk', sans-serif";
    ctx.fillText('4.2m', W*0.43, groundY-28);

    // Stopwatch
    ctx.fillStyle = 'rgba(30,30,50,0.8)';
    ctx.beginPath(); ctx.arc(W*0.85, 100, 35, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ffb59c';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ffb59c';
    ctx.font = "bold 16px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('1.8s', W*0.85, 105);
    ctx.font = "10px 'Noto Sans SC', sans-serif";
    ctx.fillText(t_fn('stopwatch'), W*0.85, 145);
  } else if (f === 3) {
    // Data table
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('step3'), W/2, 40);

    // Draw table
    var tLeft = W * 0.1, tTop = 70, colW = (W * 0.8) / 4, rowH = 28;
    var headers = [t_fn('trial'), t_fn('plane'), t_fn('distance'), t_fn('time')];
    // Header row
    ctx.fillStyle = 'rgba(80,255,176,0.15)';
    ctx.fillRect(tLeft, tTop, W*0.8, rowH);
    ctx.fillStyle = '#50ffb0';
    ctx.font = "bold 12px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    for (var c = 0; c < 4; c++) {
      ctx.fillText(headers[c], tLeft + colW * c + colW/2, tTop + 18);
    }
    // Data rows
    var allTrials = [];
    SAMPLE_DATA.forEach(function(p) {
      p.trials.forEach(function(tr, i) {
        allTrials.push({trial: allTrials.length+1, plane: p.plane, d: tr.d, t: tr.t});
      });
    });
    for (var r = 0; r < Math.min(allTrials.length, 10); r++) {
      var ry = tTop + rowH * (r + 1);
      ctx.fillStyle = r % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.06)';
      ctx.fillRect(tLeft, ry, W*0.8, rowH);
      ctx.fillStyle = '#cccccc';
      ctx.font = "12px 'Space Grotesk', sans-serif";
      var row = allTrials[r];
      ctx.fillText(row.trial, tLeft + colW*0 + colW/2, ry + 18);
      ctx.fillText(row.plane, tLeft + colW*1 + colW/2, ry + 18);
      ctx.fillStyle = '#50ffb0';
      ctx.fillText(row.d.toFixed(1)+'m', tLeft + colW*2 + colW/2, ry + 18);
      ctx.fillStyle = '#ffb59c';
      ctx.fillText(row.t.toFixed(1)+'s', tLeft + colW*3 + colW/2, ry + 18);
    }
    // Table border
    ctx.strokeStyle = 'rgba(80,255,176,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(tLeft, tTop, W*0.8, rowH * (Math.min(allTrials.length,10)+1));
  } else if (f === 4) {
    // Comparison with averages
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('step4'), W/2, 40);

    // Calculate averages
    var avgA = {d:0, t:0}, avgB = {d:0, t:0};
    SAMPLE_DATA[0].trials.forEach(function(tr) { avgA.d += tr.d; avgA.t += tr.t; });
    SAMPLE_DATA[1].trials.forEach(function(tr) { avgB.d += tr.d; avgB.t += tr.t; });
    avgA.d /= 5; avgA.t /= 5; avgB.d /= 5; avgB.t /= 5;

    // Bar chart for distance
    var chartLeft = W*0.15, chartRight = W*0.85, barY1 = 100, barY2 = 160, barH = 40;
    var maxD = 7;
    // Plane A bar
    var barWA = (avgA.d / maxD) * (chartRight - chartLeft);
    ctx.fillStyle = 'rgba(255,100,100,0.6)';
    ctx.fillRect(chartLeft, barY1, barWA, barH);
    ctx.strokeStyle = '#ff6666';
    ctx.lineWidth = 1;
    ctx.strokeRect(chartLeft, barY1, barWA, barH);
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 13px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText(t_fn('plane') + ' A: ' + avgA.d.toFixed(1) + 'm', chartLeft + barWA + 10, barY1 + 25);

    // Plane B bar
    var barWB = (avgB.d / maxD) * (chartRight - chartLeft);
    ctx.fillStyle = 'rgba(80,255,176,0.6)';
    ctx.fillRect(chartLeft, barY2, barWB, barH);
    ctx.strokeStyle = '#50ffb0';
    ctx.lineWidth = 1;
    ctx.strokeRect(chartLeft, barY2, barWB, barH);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(t_fn('plane') + ' B: ' + avgB.d.toFixed(1) + 'm', chartLeft + barWB + 10, barY2 + 25);

    // Winner text
    ctx.fillStyle = '#50ffb0';
    ctx.font = "bold 18px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('winner'), W/2, 250);
    ctx.fillStyle = '#ffb59c';
    ctx.font = "14px 'Noto Sans SC', sans-serif";
    ctx.fillText(t_fn('dataProves'), W/2, 280);

    // Average label
    ctx.fillStyle = '#aaabb0';
    ctx.font = "12px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('avg') + ' ' + t_fn('distance'), W/2, 80);
  }
  return true;
}

AnimRuntime.boot();
</script>
</body>
</html>
