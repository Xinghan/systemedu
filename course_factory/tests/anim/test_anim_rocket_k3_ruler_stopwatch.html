<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:#05070a;color:#e2e2e9;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:#ffb000;text-shadow:0 0 15px rgba(255,176,0,0.3);}
.header .sub{font-size:11px;color:#8e90a6;letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:#05070a;background:linear-gradient(135deg,#ffb000,#ff5f1f);transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px rgba(255,176,0,0.3);}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(255,176,0,0.5);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:rgba(17,20,37,0.92);color:#8e90a6;box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:#ffb000;}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#8e90a6;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#ffb000;}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:#ffb000;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:#8e90a6;letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="animation_runtime.js"></script>
<script>

var CONFIG = {
  style: 'rocketry_control',
  totalFrames: 3,

  i18n: {
    title:    {en:'RULER vs STOPWATCH', cn:'\u5c3a\u5b50\u548c\u79d2\u8868'},
    subtitle: {en:'Two tools, two measurements', cn:'\u4e24\u4ef6\u5de5\u5177\uff0c\u4e24\u4e2a\u6d4b\u91cf'},

    f0_title: {en:'Tools on the field', cn:'\u6bd4\u8d5b\u5e26\u4ec0\u4e48'},
    f0_lead:  {en:'A stopwatch measures time. A tape measures distance. You need both to describe speed.', cn:'\u79d2\u8868\u91cf\u65f6\u95f4\uff0c\u7c89\u7b14/\u7c73\u5c3a\u91cf\u8ddd\u79bb\u3002\u4e24\u6837\u90fd\u8981\uff0c\u624d\u80fd\u8bf4\u901f\u5ea6\u3002'},
    f0_stop:  {en:'Stopwatch', cn:'\u79d2\u8868'},
    f0_ruler: {en:'Measuring tape', cn:'\u7c73\u5c3a'},
    f0_stopU: {en:'reads seconds (s)',  cn:'\u8bfb\u6570\u79d2 (s)'},
    f0_rulerU:{en:'reads meters (m)',   cn:'\u8bfb\u6570\u7c73 (m)'},

    f1_title: {en:'Rule A: measure time', cn:'\u89c4\u5219 A\uff1a\u6d4b\u65f6\u95f4'},
    f1_lead:  {en:'Distance is already fixed at 20 m. Watch the stopwatch at the finish line.', cn:'\u8ddd\u79bb\u5df2\u56fa\u5b9a\u4e3a 20 \u7c73\uff0c\u5728\u7ec8\u70b9\u770b\u79d2\u8868\u8bfb\u6570\u3002'},
    f1_ming:  {en:'Ming: 4 s', cn:'\u5c0f\u660e\uff1a4 \u79d2'},
    f1_hua:   {en:'Hua: 5 s',  cn:'\u5c0f\u534e\uff1a5 \u79d2'},
    f1_fix:   {en:'Distance FIXED · 20 m', cn:'\u56fa\u5b9a\u00b720 \u7c73'},

    f2_title: {en:'Rule B: measure distance', cn:'\u89c4\u5219 B\uff1a\u6d4b\u8ddd\u79bb'},
    f2_lead:  {en:'Time is already fixed at 5 s. Walk the tape from start to where each runner stopped.', cn:'\u65f6\u95f4\u5df2\u56fa\u5b9a\u4e3a 5 \u79d2\uff0c\u6574\u62c9\u7c73\u5c3a\u91cf\u5230\u6bcf\u4e2a\u4eba\u7684\u505c\u4f4d\u3002'},
    f2_ming:  {en:'Ming: 20 m', cn:'\u5c0f\u660e\uff1a20 \u7c73'},
    f2_hua:   {en:'Hua: 15 m',  cn:'\u5c0f\u534e\uff1a15 \u7c73'},
    f2_fix:   {en:'Time FIXED · 5 s', cn:'\u56fa\u5b9a\u00b75 \u79d2'},

    hudL1: {en:'FRAME',  cn:'\u5e27'},
    hudL2: {en:'FIXED',  cn:'\u56fa\u5b9a'},
    hudL3: {en:'MEASURE',cn:'\u6d4b\u91cf'},
    hudL4: {en:'UNIT',   cn:'\u5355\u4f4d'},

    guideTitle: {en:'How to watch', cn:'\u89c2\u770b\u6307\u5357'},
    g1: {en:'Distance and time are two separate measurements', cn:'\u8ddd\u79bb\u548c\u65f6\u95f4\u662f\u4e24\u4e2a\u5355\u72ec\u6d4b\u91cf'},
    g2: {en:'Each rule fixes one and measures the other', cn:'\u6bcf\u6761\u89c4\u5219\u56fa\u5b9a\u4e00\u4e2a\u3001\u6d4b\u53e6\u4e00\u4e2a'},
    g3: {en:'Always write down both numbers', cn:'\u4e24\u4e2a\u6570\u5b57\u90fd\u8981\u8bb0\u5f55'},
  },

  hudLabels: ['hudL1', 'hudL2', 'hudL3', 'hudL4'],
  hudValues: [
    ['1/3', '—',    'both',    's · m'],
    ['2/3', '20 m', 'time',    's'],
    ['3/3', '5 s',  'distance','m'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

function drawStopwatch(ctx, x, y, r, display) {
  ctx.save();
  // body
  ctx.fillStyle = '#111425';
  ctx.strokeStyle = '#ffb000';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // crown
  ctx.fillStyle = '#ffb000';
  ctx.fillRect(x - 5, y - r - 6, 10, 6);
  // ticks
  ctx.strokeStyle = '#8e90a6';
  ctx.lineWidth = 1;
  for (var i = 0; i < 12; i++) {
    var a = i / 12 * Math.PI * 2 - Math.PI / 2;
    var ix = x + Math.cos(a) * (r - 6);
    var iy = y + Math.sin(a) * (r - 6);
    var ox = x + Math.cos(a) * (r - 2);
    var oy = y + Math.sin(a) * (r - 2);
    ctx.beginPath(); ctx.moveTo(ix, iy); ctx.lineTo(ox, oy); ctx.stroke();
  }
  // digital window
  ctx.fillStyle = '#05070a';
  ctx.fillRect(x - 26, y - 10, 52, 20);
  ctx.fillStyle = '#ffb000';
  ctx.font = "bold 14px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(display, x, y);
  ctx.restore();
}

function drawRuler(ctx, x1, y, x2, labelLeft, labelRight) {
  ctx.save();
  var h = 22;
  // body
  ctx.fillStyle = '#ffb000';
  ctx.fillRect(x1, y - h/2, x2 - x1, h);
  // tick marks every 40px
  ctx.fillStyle = '#05070a';
  ctx.font = "bold 9px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var step = 40;
  var n = Math.floor((x2 - x1) / step);
  for (var i = 0; i <= n; i++) {
    var tx = x1 + i * step;
    ctx.fillStyle = '#05070a';
    ctx.fillRect(tx, y - h/2, 1, (i % 2 === 0) ? h : h*0.6);
    if (i % 2 === 0) {
      ctx.fillStyle = '#05070a';
      ctx.fillText(String(i), tx, y + h/2 + 6);
    }
  }
  // end labels
  ctx.fillStyle = '#8e90a6';
  ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
  ctx.textAlign = 'left';
  ctx.fillText(labelLeft || '', x1, y - h/2 - 8);
  ctx.textAlign = 'right';
  ctx.fillText(labelRight || '', x2, y - h/2 - 8);
  ctx.restore();
}

function customDrawElement(ctx, el) {
  if (el.type === 'stopwatchIcon') {
    drawStopwatch(ctx, el.x, el.y, el.r || 36, el.display || '00:00');
    return true;
  }
  if (el.type === 'rulerIcon') {
    drawRuler(ctx, el.x1, el.y, el.x2, el.labelLeft, el.labelRight);
    return true;
  }
  if (el.type === 'marker') {
    // A small flag
    ctx.save();
    ctx.fillStyle = el.color || '#ff5f1f';
    ctx.fillRect(el.x - 1, el.y - 24, 2, 24);
    ctx.beginPath();
    ctx.moveTo(el.x + 1, el.y - 24);
    ctx.lineTo(el.x + 16, el.y - 18);
    ctx.lineTo(el.x + 1, el.y - 12);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = el.color || '#ff5f1f';
    ctx.font = "bold 10px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(el.label || '', el.x, el.y + 6);
    ctx.restore();
    return true;
  }
  return false;
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2;
  var els = [];

  if (f === 0) {
    els.push({id:'t', type:'label', text:t('f0_title'), x:cx, y:60, color:P.primary, size:22, align:'center'});
    els.push({id:'l', type:'label', text:t('f0_lead'), x:cx, y:100, color:P.text, size:13, align:'center'});
    // stopwatch on left
    els.push({id:'stp', type:'stopwatchIcon', x:cx - 140, y:220, r:44, display:'00:00'});
    els.push({id:'stpN', type:'label', text:t('f0_stop'),  x:cx - 140, y:285, color:P.primary, size:14, align:'center'});
    els.push({id:'stpU', type:'label', text:t('f0_stopU'), x:cx - 140, y:308, color:P.muted, size:11, align:'center'});
    // ruler on right
    els.push({id:'rlr', type:'rulerIcon', x1:cx + 50, x2:cx + 230, y:220});
    els.push({id:'rlrN', type:'label', text:t('f0_ruler'),  x:cx + 140, y:285, color:P.primary, size:14, align:'center'});
    els.push({id:'rlrU', type:'label', text:t('f0_rulerU'), x:cx + 140, y:308, color:P.muted, size:11, align:'center'});
    return els;
  }

  if (f === 1) {
    els.push({id:'t', type:'label', text:t('f1_title'), x:cx, y:60, color:P.primary, size:20, align:'center'});
    els.push({id:'l', type:'label', text:t('f1_lead'),  x:cx, y:95, color:P.text, size:13, align:'center'});
    // measuring tape fixed across (visual = distance fixed)
    els.push({id:'rlr', type:'rulerIcon', x1:60, x2:W - 60, y:170,
              labelLeft:'0 m', labelRight:'20 m'});
    els.push({id:'fix', type:'label', text:t('f1_fix'), x:cx, y:200, color:'#ff5f1f', size:12, align:'center'});
    // stopwatches at finish (right side)
    els.push({id:'stpM', type:'stopwatchIcon', x:W - 120, y:270, r:30, display:'00:04'});
    els.push({id:'mL',   type:'label', text:t('f1_ming'), x:W - 120, y:315, color:'#ffb000', size:13, align:'center'});
    els.push({id:'stpH', type:'stopwatchIcon', x:W - 230, y:270, r:30, display:'00:05'});
    els.push({id:'hL',   type:'label', text:t('f1_hua'),  x:W - 230, y:315, color:'#00daf3', size:13, align:'center'});
    els.push({id:'note', type:'label', text:t('f0_stopU'), x:cx, y:360, color:P.muted, size:11, align:'center'});
    return els;
  }

  if (f === 2) {
    els.push({id:'t', type:'label', text:t('f2_title'), x:cx, y:60, color:P.primary, size:20, align:'center'});
    els.push({id:'l', type:'label', text:t('f2_lead'),  x:cx, y:95, color:P.text, size:13, align:'center'});
    // stopwatch fixed at top center
    els.push({id:'stp', type:'stopwatchIcon', x:cx, y:160, r:32, display:'00:05'});
    els.push({id:'fix', type:'label', text:t('f2_fix'), x:cx, y:205, color:'#ff5f1f', size:12, align:'center'});
    // ruler across
    var x1 = 60, x2 = W - 60;
    els.push({id:'rlr', type:'rulerIcon', x1:x1, x2:x2, y:280,
              labelLeft:'0 m', labelRight:'20 m'});
    var mingX = x1 + (x2 - x1) * (20/20);
    var huaX  = x1 + (x2 - x1) * (15/20);
    els.push({id:'mM', type:'marker', x:mingX, y:280, color:'#ffb000', label:t('f2_ming')});
    els.push({id:'mH', type:'marker', x:huaX,  y:280, color:'#00daf3', label:t('f2_hua')});
    els.push({id:'note', type:'label', text:t('f0_rulerU'), x:cx, y:360, color:P.muted, size:11, align:'center'});
    return els;
  }

  return [];
}

AnimRuntime.boot();
</script>
</body>
</html>
