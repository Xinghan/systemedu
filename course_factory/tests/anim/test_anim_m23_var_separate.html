<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M23 — 用方差区分想左手 / 想右手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* F2 第 1 层 — 共享深空底 (所有 26 套统一不换) */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg: oklch(0.96 0.01 265);
  --fg-dim: oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold: oklch(0.85 0.14 85);
  /* F2 第 2 层 — math signature accent (electric blue) */
  --accent: oklch(0.72 0.17 245);
  /* F2 第 3 层 — math 5 色 palette (themes.js id:math) */
  --axis: oklch(0.72 0.17 245);     /* AXIS — electric blue 主轴/主链路 */
  --proof: oklch(0.52 0.16 245);    /* PROOF — mid blue 右手堆 */
  --shadow: oklch(0.35 0.10 245);   /* SHADOW — 背景区/网格 */
  --solution: oklch(0.92 0.08 240); /* SOLUTION — 近白蓝 左手堆/数值 */
  --qed: oklch(0.85 0.14 85);       /* QED — gold 阈值命中/仪式高潮 */
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg-0);color:var(--fg);font-family:'Noto Sans SC','Inter',sans-serif;display:flex;}
/* 左侧栏 */
.sidebar{width:200px;min-width:200px;height:100vh;flex-shrink:0;display:flex;flex-direction:column;gap:9px;

.brand{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--accent);}
.mascot{display:flex;align-items:center;gap:8px;margin-top:2px;}
.mascot svg{filter:drop-shadow(0 0 6px oklch(0.72 0.17 245 / 0.4));}
.mascot .mname{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-mute);letter-spacing:0.1em;}
.s-title{font-family:'Inter','Noto Sans SC',sans-serif;font-size:14px;font-weight:800;line-height:1.3;color:var(--fg);margin-top:2px;}
.s-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-mute);letter-spacing:0.06em;line-height:1.4;}
/* 项目路线图 S1-S6 */
.route-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--fg-mute);margin-top:6px;}
.route{display:flex;flex-direction:column;gap:0;margin-top:2px;}
.route .stop{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;
  font-size:9.5px;color:var(--fg-mute);line-height:1.55;position:relative;padding-left:2px;}
.route .dot{width:7px;height:7px;border-radius:50%;background:var(--shadow);flex-shrink:0;border:1px solid var(--line-strong);}
.route .stop.here{color:var(--accent);font-weight:700;}
.route .stop.here .dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px var(--accent);}
.route .stop.done .dot{background:var(--proof);border-color:var(--proof);}
.guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--accent);margin-top:7px;}
.guide-content{font-size:10.5px;color:var(--fg-dim);line-height:1.5;}
.guide-content li{margin-bottom:3px;list-style:none;padding-left:10px;position:relative;}
.guide-content li::before{content:'·';position:absolute;left:0;color:var(--accent);}
.lang-btn{align-self:flex-start;margin-top:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  padding:4px 10px;cursor:pointer;border:1px solid var(--line-strong);background:var(--bg-2);
  color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;
  box-shadow:2px 2px 0 var(--bg-0);transition:transform .1s;}
.lang-btn:hover{transform:translate(-1px,-1px);}
.lang-btn:active{transform:translate(1px,1px);}
/* 主舞台 */
.main{flex:1;height:100vh;position:relative;overflow:hidden;min-width:0;}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
.hud{position:absolute;top:16px;right:16px;background:var(--bg-1);border:1px solid var(--line-strong);
  padding:9px 13px;font-family:'JetBrains Mono',monospace;font-size:11px;box-shadow:3px 3px 0 var(--bg-0);min-width:158px;}
.hud-row{display:flex;justify-content:space-between;gap:14px;line-height:1.7;}
.hud-lbl{color:var(--fg-mute);text-transform:uppercase;font-size:8px;letter-spacing:0.1em;}
.hud-val{color:var(--accent);font-weight:700;}
.sub{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;width:90%;pointer-events:none;}
.sub-zh{font-size:19px;font-weight:700;color:var(--fg);background:oklch(0.18 0.04 265 / 0.92);
  padding:6px 18px;display:inline-block;border:1px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0);}
.sub-en{font-size:12px;font-style:italic;color:var(--fg-dim);margin-top:5px;}
</style>

<script>
/* ============================================================
   i18n
   ============================================================ */
var LANG = 'cn';
var I18N = {
  title:   {cn:'方差: 第一个特征', en:'Variance: first feature'},
  subt:    {cn:'用一个数把想左手/想右手分两堆', en:'one number splits L vs R'},
  routeLabel: {cn:'项目路线', en:'project route'},
  route: {cn:['S1 认识脑波','S2 清洁信号','S3 找特征(在这)','S4 自录冲准','S5 接 Minecraft','S6 分享'],
          en:['S1 read brainwaves','S2 clean signal','S3 features (here)','S4 record & tune','S5 wire Minecraft','S6 share']},
  guideTitle: {cn:'看这一条数轴', en:'Watch one axis'},
  guide:   {cn:['每个 trial 算 C4 方差 = 一个点', '左手点落小, 右手点落大', '中间画一条线 = 第一个分类器'],
            en:['each trial -> one C4 variance dot', 'left hand lands low, right lands high', 'a line between piles = first classifier']},
  hL1:{cn:'stage',en:'stage'}, hL2:{cn:'trials',en:'trials'}, hL3:{cn:'C4 var',en:'C4 var'}, hL4:{cn:'guess',en:'guess'},
  // 阶段字幕
  s0_zh:{cn:'还记得目标吗? 让角色听念头动。现在第一次, 电脑能自动猜你想的是哪只手了。',en:'Remember the goal? Make the avatar move by thought. Now, for the first time, the computer can guess which hand you imagined.'},
  s0_en:{cn:'想右手时 C4 电极会抖得更厉害 — 给这一个 trial 算出它的方差。',en:'Imagining the right hand makes C4 jitter more — compute the variance of this one trial.'},
  s1_zh:{cn:'多录几十个 trial, 每个都算 C4 方差, 一个个落到这根数轴上。',en:'Run dozens of trials; each C4 variance drops onto this single number line.'},
  s1_en:{cn:'左手 trial 方差小, 聚到左边; 右手方差大, 聚到右边 — 自动分成两堆。',en:'Left-hand variances cluster low; right-hand cluster high — two piles, on their own.'},
  s2_zh:{cn:'两堆基本分开了! 在中间画一条阈值线: 落左边猜左手, 落右边猜右手。',en:'The piles separate! Draw one threshold between them: left side = guess L, right = guess R.'},
  s2_en:{cn:'这条线就是你做出的第一个分类器 — 只用方差这一个数。',en:'That line is your first classifier — built from variance alone.'},
  s3_zh:{cn:'终点预演: 来一个新 trial, 算方差, 落右边 -> 电脑判定"右手", 角色真的动了!',en:'Endpoint preview: a fresh trial, compute variance, lands right -> computer says "RIGHT", the avatar moves!'},
  s3_en:{cn:'你做出了 BCI 的第一个特征! 坦白说: 两堆边缘还重叠, 单通道会猜错 — 下一步用 CSP 把堆拉得更开。',en:'You built the first BCI feature! Honestly: the piles still overlap at the edge — next, CSP pulls them further apart.'},
};
function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}
function refreshI18N(){
  document.getElementById('title').textContent = t('title');
  document.getElementById('subt').textContent = t('subt');
  document.getElementById('routeLabel').textContent = t('routeLabel');
  document.getElementById('guideTitle').textContent = t('guideTitle');
  document.getElementById('guideList').innerHTML = t('guide').map(function(x){return '<li>'+x+'</li>';}).join('');
  // 路线图
  var rArr = t('route');
  var classes = ['done','done','here','','',''];
  document.getElementById('route').innerHTML = rArr.map(function(x,i){
    return '<div class="stop '+classes[i]+'"><span class="dot"></span>'+x+'</div>';
  }).join('');
  document.getElementById('hL1').textContent = t('hL1');
  document.getElementById('hL2').textContent = t('hL2');
  document.getElementById('hL3').textContent = t('hL3');
  document.getElementById('hL4').textContent = t('hL4');
  document.getElementById('langBtn').textContent = LANG==='cn' ? '中 / EN' : 'EN / 中';
  updateSubtitle(currentScene);
}
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG==='cn' ? 'en' : 'cn';
  refreshI18N();
});

/* ============================================================
   palette (canvas-usable oklch strings)
   ============================================================ */
var COL = {
  bg0:'oklch(0.14 0.035 265)', bg1:'oklch(0.18 0.04 265)', bg2:'oklch(0.22 0.045 265)', bg3:'oklch(0.28 0.05 265)',
  line:'oklch(0.35 0.05 265)', lineStrong:'oklch(0.55 0.08 265)',
  fg:'oklch(0.96 0.01 265)', fgDim:'oklch(0.75 0.02 265)', fgMute:'oklch(0.55 0.03 265)',
  gold:'oklch(0.85 0.14 85)',
  axis:'oklch(0.72 0.17 245)',      // AXIS — electric blue, 数轴/主体
  proof:'oklch(0.52 0.16 245)',     // PROOF — mid blue, 右手堆
  shadow:'oklch(0.35 0.10 245)',    // SHADOW — 网格/区底
  solution:'oklch(0.92 0.08 240)',  // SOLUTION — 近白蓝, 左手堆/数值
  qed:'oklch(0.85 0.14 85)',        // QED — gold key moment
};

/* ============================================================
   Canvas setup
   ============================================================ */
var canvas = document.getElementById('stage');
var ctx = canvas.getContext('2d');
var W=0, H=0, DPR=1;
function resize(){
  var rect = canvas.parentElement.getBoundingClientRect();
  if(rect.width<1||rect.height<1) return;
  DPR = window.devicePixelRatio||1;
  canvas.width = rect.width*DPR; canvas.height = rect.height*DPR;
  canvas.style.width = rect.width+'px'; canvas.style.height = rect.height+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W = rect.width; H = rect.height;
}
window.addEventListener('resize', resize);
resize();
setTimeout(resize,200); setTimeout(resize,600);
document.fonts.ready.then(resize);

/* ============================================================
   Data — 固定种子, 数值科学严谨
   每个 trial 是一段 C4 电极信号; 想左手时 C4 ERD 强 -> 振幅小 -> 方差小;
   想右手时 C4 振幅大 -> 方差大。两类分布各自有散布, 边缘重叠 (单通道现实)。
   ============================================================ */
// 确定性伪随机 (mulberry32)
function makeRng(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    var tt = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    tt = (tt + Math.imul(tt ^ (tt >>> 7), 61 | tt)) ^ tt;
    return ((tt ^ (tt >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rng){ // Box-Muller
  var u=1-rng(), v=rng();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
var N_PER = 26;            // 每类 trial 数
// 左手类: 方差均值 0.38, 散布 0.16 ; 右手类: 均值 0.82, 散布 0.20
// 散布故意偏大 -> 两堆边缘真实重叠 (单通道方差的现实局限), 不是完美分开
var trials = [];           // {cls:'L'|'R', v:variance, x,y 等运行时填}
(function(){
  var rng = makeRng(20260528);
  for(var i=0;i<N_PER;i++){
    var vl = 0.38 + 0.16*gauss(rng);
    if(vl<0.06) vl=0.06;
    trials.push({cls:'L', v:vl});
  }
  for(var i=0;i<N_PER;i++){
    var vr = 0.82 + 0.20*gauss(rng);
    if(vr<0.10) vr=0.10;
    trials.push({cls:'R', v:vr});
  }
})();
var V_MIN = 0.0, V_MAX = 1.5;       // 数轴范围
// 阈值: 取在两堆之间 (两类均值中点附近), 边缘几个点会被分错 -> 准确率不到 100%
var THRESHOLD = 0.60;
// 计算阈值下的准确率 (科学诚实: 不是 100%)
var correctCount = 0;
for(var i=0;i<trials.length;i++){
  var guessR = trials[i].v >= THRESHOLD;
  var actualR = trials[i].cls==='R';
  if(guessR===actualR) correctCount++;
}
var ACC = correctCount/trials.length; // ~0.88 左右

// 一段示例 C4 信号 (用于 F1 左侧波形): 右手 trial -> 大振幅
var SIG_N = 90;
var sigRight = [];
(function(){
  var rng = makeRng(77);
  for(var i=0;i<SIG_N;i++){
    var p=i/SIG_N*Math.PI*2;
    sigRight.push(0.9*Math.sin(p*4)+0.5*Math.sin(p*9+0.6)+0.18*gauss(rng));
  }
})();
// 一段左手 C4 信号 (小振幅, ERD)
var sigLeft = [];
(function(){
  var rng = makeRng(99);
  for(var i=0;i<SIG_N;i++){
    var p=i/SIG_N*Math.PI*2;
    sigLeft.push(0.28*Math.sin(p*4)+0.14*Math.sin(p*9+0.6)+0.06*gauss(rng));
  }
})();

// 数轴 -> 屏幕 x 坐标 (主舞台留出 sidebar 后的可用区)
function axisGeom(){
  var x0 = 110, x1 = W-90;
  var y = H*0.60;
  return {x0:x0, x1:x1, y:y, vx:function(v){return x0 + (v-V_MIN)/(V_MAX-V_MIN)*(x1-x0);}};
}

/* ============================================================
   Scene timeline — 4 阶段 (承接同一根数轴 + 同一批 trial 方差点)
   ============================================================ */
var currentScene = 0;
var SCENE_DUR = [8500, 9500, 8000, 11000]; // ceremonial: 高潮更长, 总 ~37s
var CYCLE = SCENE_DUR.reduce(function(a,b){return a+b;},0);
var animStart = performance.now();

function updateSubtitle(s){
  document.getElementById('subZh').textContent = t('s'+s+'_zh');
  document.getElementById('subEn').textContent = t('s'+s+'_en');
  document.getElementById('hScene').textContent = (s+1)+'/4';
}

/* ============================================================
   Drawing helpers
   ============================================================ */
function clearBg(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = COL.bg0;
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'oklch(0.35 0.10 265 / 0.16)';
  ctx.lineWidth = 1;
  var gs = 44;
  for(var x=gs;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=gs;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}
function topTitle(txt){
  ctx.fillStyle = COL.fg;
  ctx.font = '800 17px Inter, "Noto Sans SC", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(txt, W/2, 38);
}
// Minecraft 角色剪影 (终点徽记) — 像素方头
function drawMascotMinecraft(cx, cy, s, alpha, moved){
  ctx.save();
  ctx.globalAlpha = alpha;
  // 头
  ctx.fillStyle = COL.bg3; ctx.strokeStyle = COL.lineStrong; ctx.lineWidth=1.2;
  ctx.fillRect(cx-s*0.6, cy-s*1.4, s*1.2, s*1.1);
  ctx.strokeRect(cx-s*0.6, cy-s*1.4, s*1.2, s*1.1);
  // 眼睛
  ctx.fillStyle = moved ? COL.gold : COL.axis;
  ctx.fillRect(cx-s*0.38, cy-s*1.05, s*0.26, s*0.26);
  ctx.fillRect(cx+s*0.12, cy-s*1.05, s*0.26, s*0.26);
  // 身体
  ctx.fillStyle = COL.bg2; ctx.strokeStyle = COL.lineStrong;
  ctx.fillRect(cx-s*0.5, cy-s*0.3, s*1.0, s*1.0);
  ctx.strokeRect(cx-s*0.5, cy-s*0.3, s*1.0, s*1.0);
  // 右手臂 (moved 时抬起 = 听念头动)
  ctx.fillStyle = moved ? COL.gold : COL.bg3;
  if(moved){
    ctx.fillRect(cx+s*0.5, cy-s*0.9, s*0.32, s*0.9);
  }else{
    ctx.fillRect(cx+s*0.5, cy-s*0.3, s*0.32, s*0.9);
  }
  // 左手臂
  ctx.fillStyle = COL.bg3;
  ctx.fillRect(cx-s*0.82, cy-s*0.3, s*0.32, s*0.9);
  ctx.restore();
}
// 画一段信号波形
function drawSignal(arr, x0, y0, w, h, amp, color, alpha, drawTo){
  ctx.save();
  ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin='round';
  ctx.beginPath();
  var n = Math.max(2, Math.floor(arr.length*drawTo));
  for(var i=0;i<n;i++){
    var fx = x0 + i*(w/(arr.length-1));
    var fy = y0 + h/2 - arr[i]*amp;
    if(i===0) ctx.moveTo(fx,fy); else ctx.lineTo(fx,fy);
  }
  ctx.stroke(); ctx.restore();
}
// 数轴 (本动画唯一核心对象的舞台) — 全程同一根
function drawAxis(g, labelAlpha){
  ctx.save();
  ctx.strokeStyle = COL.lineStrong; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(g.x0, g.y); ctx.lineTo(g.x1, g.y); ctx.stroke();
  // 刻度
  ctx.fillStyle = COL.fgMute; ctx.font='600 9px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  for(var v=0; v<=1.5+1e-6; v+=0.25){
    var x = g.vx(v);
    ctx.strokeStyle = COL.line; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x, g.y-4); ctx.lineTo(x, g.y+4); ctx.stroke();
    ctx.fillText(v.toFixed(2), x, g.y+8);
  }
  // 轴标题
  ctx.globalAlpha = labelAlpha;
  ctx.fillStyle = COL.axis; ctx.font='700 12px JetBrains Mono,monospace'; ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillText(LANG==='cn'?'C4 方差 (一个 trial = 一个点) ->':'C4 variance (one trial = one dot) ->', g.x1, g.y-22);
  ctx.restore();
}
// 一个 trial 方差点 (堆叠避免重叠: 用 stack 高度)
function drawDot(x, y, cls, alpha, r){
  ctx.save();
  ctx.globalAlpha = alpha;
  var c = (cls==='L') ? COL.solution : COL.proof;
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.arc(x, y, r||5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = COL.bg0; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}
function setHUD(scene, trialN, vVal, guess){
  document.getElementById('hTrials').textContent = trialN;
  document.getElementById('hVar').textContent = vVal;
  document.getElementById('hGuess').textContent = guess;
}

// 给每个 trial 分配在数轴上的堆叠 y (按 x 邻近分桶)
function assignStacks(g, list){
  var buckets = {};
  for(var i=0;i<list.length;i++){
    var x = g.vx(list[i].v);
    var key = Math.round(x/14); // 14px 桶宽
    if(!buckets[key]) buckets[key]=0;
    list[i]._x = x;
    list[i]._stack = buckets[key];
    buckets[key]++;
  }
}

/* ============================================================
   F1 — 引入唯一核心对象: 一个右手 trial 的 C4 信号 -> 算方差 -> 落到数轴
   ============================================================ */
function drawF1(p){
  clearBg();
  topTitle(LANG==='cn'?'一个 trial 的 C4 信号 -> 一个方差 -> 数轴上一个点':'one trial C4 signal -> one variance -> one dot');
  var g = axisGeom();
  // 上方: 一段右手 C4 信号
  var sx=140, sy=H*0.16, sw=W-sx-90, sh=H*0.22;
  ctx.save();
  ctx.fillStyle=COL.bg1; ctx.strokeStyle=COL.lineStrong; ctx.lineWidth=1.2;
  ctx.fillRect(sx,sy,sw,sh); ctx.strokeRect(sx,sy,sw,sh);
  ctx.strokeStyle='oklch(0.55 0.08 265 / 0.4)'; ctx.setLineDash([4,4]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx+10, sy+sh/2); ctx.lineTo(sx+sw-10, sy+sh/2); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle=COL.proof; ctx.font='700 11px JetBrains Mono,monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(LANG==='cn'?'C4 电极 · 想右手 (抖得厉害)':'C4 electrode · imagine RIGHT (jittery)', sx+10, sy+8);
  ctx.restore();
  drawSignal(sigRight, sx+12, sy+6, sw-24, sh-26, sh*0.20, COL.axis, 1, Math.min(1,p*1.6));
  // 数轴常驻
  drawAxis(g, Math.min(1,p*2));
  // 方差计算 -> 一个点从信号"掉"到数轴
  var sampleV = 0.98; // 这个右手 trial 的方差
  if(p>0.35){
    var dp = Math.min(1,(p-0.35)/0.5); // 下落进度
    var startX = sx+sw*0.5, startY = sy+sh+10;
    var endX = g.vx(sampleV), endY = g.y;
    var cx = startX + (endX-startX)*dp;
    var cy = startY + (endY-startY)*(dp*dp); // 加速下落
    // 计算标注
    ctx.save();
    ctx.fillStyle=COL.solution; ctx.font='700 13px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Var(C4) = '+sampleV.toFixed(2), cx, cy-16);
    ctx.restore();
    drawDot(cx, cy, 'R', 1, 6);
    if(dp>=1){
      // 落定 gold 一闪
      var fl = 0.5+0.5*Math.sin(p*16);
      ctx.save(); ctx.globalAlpha=fl*0.8; ctx.strokeStyle=COL.gold; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(endX, endY, 11, 0, Math.PI*2); ctx.stroke(); ctx.restore();
    }
  }
  setHUD('1/4', '1', 'Var(C4) = '+sampleV.toFixed(2), '--');
}

/* ============================================================
   F2 — 累积: 几十个 trial 方差点连续落到同一根数轴, 自动分两堆
   ============================================================ */
function drawF2(p){
  clearBg();
  topTitle(LANG==='cn'?'几十个 trial 落到同一根数轴 -> 自动分成两堆':'dozens of trials land -> two piles form on their own');
  var g = axisGeom();
  drawAxis(g, 1);
  assignStacks(g, trials);
  // 逐个落点 (按时间累积)
  var shown = Math.floor(p*trials.length*1.15);
  var lastV = 0, nShown=0, nL=0, nR=0;
  for(var i=0;i<trials.length;i++){
    var T = trials[i];
    var appear = (i<shown) ? 1 : (i===shown ? Math.min(1,(p*trials.length*1.15 - shown)) : 0);
    if(appear<=0) continue;
    var x = T._x;
    var y = g.y - 11 - T._stack*12; // 往上堆
    // 下落动画 (最新一个)
    if(i===shown && appear<1){
      y = g.y - 60*appear; x = T._x;
    }
    drawDot(x, y, T.cls, appear, 5);
    nShown++; lastV=T.v;
    if(T.cls==='L') nL++; else nR++;
  }
  // 两堆区域标签 (后半程出现)
  if(p>0.5){
    var la = Math.min(1,(p-0.5)*3);
    ctx.save(); ctx.globalAlpha=la;
    ctx.fillStyle=COL.solution; ctx.font='700 12px Inter,"Noto Sans SC",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(LANG==='cn'?'想左手 (方差小)':'imagine LEFT (small var)', g.vx(0.34), g.y-92);
    ctx.fillStyle=COL.proof;
    ctx.fillText(LANG==='cn'?'想右手 (方差大)':'imagine RIGHT (big var)', g.vx(0.95), g.y-92);
    ctx.restore();
  }
  setHUD('2/4', nShown+'', lastV?lastV.toFixed(2):'--', '--');
}

/* ============================================================
   F3 — 阈值线: 中间画一条线 = 第一个分类器
   ============================================================ */
function drawF3(p){
  clearBg();
  topTitle(LANG==='cn'?'画一条阈值线 = 你的第一个分类器':'draw one threshold = your first classifier');
  var g = axisGeom();
  drawAxis(g, 1);
  assignStacks(g, trials);
  // 全部点常驻
  for(var i=0;i<trials.length;i++){
    var T=trials[i];
    var x=T._x, y=g.y-11-T._stack*12;
    drawDot(x, y, T.cls, 1, 5);
  }
  // 阈值线从中间向上"画"出来
  var tx = g.vx(THRESHOLD);
  var grow = Math.min(1, p*1.8);
  ctx.save();
  ctx.strokeStyle=COL.gold; ctx.lineWidth=2.4; ctx.setLineDash([7,5]);
  ctx.beginPath(); ctx.moveTo(tx, g.y+18); ctx.lineTo(tx, g.y - (130*grow)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=COL.gold; ctx.font='700 12px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('threshold = '+THRESHOLD.toFixed(2), tx, g.y - 130*grow - 6);
  ctx.restore();
  // 左右判定区底色 (淡)
  if(p>0.4){
    var za=Math.min(1,(p-0.4)*3)*0.10;
    ctx.save(); ctx.globalAlpha=za;
    ctx.fillStyle=COL.solution; ctx.fillRect(g.x0, g.y-130, tx-g.x0, 130);
    ctx.fillStyle=COL.proof; ctx.fillRect(tx, g.y-130, g.x1-tx, 130);
    ctx.restore();
    ctx.save(); ctx.globalAlpha=Math.min(1,(p-0.4)*3);
    ctx.fillStyle=COL.fgDim; ctx.font='600 11px Inter,"Noto Sans SC",sans-serif'; ctx.textBaseline='top';
    ctx.textAlign='left';  ctx.fillText(LANG==='cn'?'落左边 -> 猜左手':'left side -> guess LEFT', g.x0+6, g.y+22);
    ctx.textAlign='right'; ctx.fillText(LANG==='cn'?'落右边 -> 猜右手':'right side -> guess RIGHT', g.x1-6, g.y+22);
    ctx.restore();
  }
  // 准确率诚实标注
  if(p>0.62){
    var aa=Math.min(1,(p-0.62)*3);
    ctx.save(); ctx.globalAlpha=aa;
    var bw=Math.min(420,W-60), bh=38, bx=tx-bw/2, by=H-150;
    if(bx<g.x0) bx=g.x0; if(bx+bw>g.x1) bx=g.x1-bw;
    ctx.fillStyle=COL.bg2; ctx.strokeStyle=COL.gold; ctx.lineWidth=1.6;
    ctx.fillRect(bx,by,bw,bh); ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle=COL.gold; ctx.font='800 13px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((LANG==='cn'?'这条线就分对了 ':'this line gets ')+(ACC*100).toFixed(0)+'%', bx+bw/2, by+bh/2);
    ctx.restore();
  }
  setHUD('3/4', trials.length+'', 'thr '+THRESHOLD.toFixed(2), (ACC*100).toFixed(0)+'%');
}

/* ============================================================
   F4 — 终点预演 (ceremonial wow): 新 trial -> 算方差 -> 落右边 -> 电脑判右手 -> Minecraft 动
   ============================================================ */
function drawF4(p){
  clearBg();
  topTitle(LANG==='cn'?'终点预演: 就用方差这一个数, 电脑替你按下了右手':'preview: variance alone — the computer pressed RIGHT for you');
  var g = axisGeom();
  drawAxis(g, 0.85);
  assignStacks(g, trials);
  // 背景两堆 (淡)
  for(var i=0;i<trials.length;i++){
    var T=trials[i]; var x=T._x, y=g.y-11-T._stack*12;
    drawDot(x, y, T.cls, 0.32, 4);
  }
  // 阈值线常驻
  var tx=g.vx(THRESHOLD);
  ctx.save(); ctx.strokeStyle=COL.gold; ctx.lineWidth=2; ctx.globalAlpha=0.7; ctx.setLineDash([7,5]);
  ctx.beginPath(); ctx.moveTo(tx, g.y+18); ctx.lineTo(tx, g.y-130); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  // 新 trial (右手) 方差 = 1.05, 从上落下 -> 右侧
  var newV = 1.05;
  var nx = g.vx(newV);
  var phase = p; // 0..1
  // 阶段 a: 新信号闪现并算方差 (0-0.3); b: 落点 (0.3-0.55); c: 判定+角色动 (0.55-1)
  // 新信号缩略
  var sx=W*0.5-150, sy=H*0.12, sw=300, sh=H*0.13;
  var sigA = Math.min(1, phase/0.25);
  ctx.save(); ctx.globalAlpha=sigA;
  ctx.fillStyle=COL.bg1; ctx.strokeStyle=COL.lineStrong; ctx.lineWidth=1.2;
  ctx.fillRect(sx,sy,sw,sh); ctx.strokeRect(sx,sy,sw,sh);
  ctx.fillStyle=COL.fgMute; ctx.font='600 10px JetBrains Mono,monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(LANG==='cn'?'新 trial (没见过)':'new trial (unseen)', sx+8, sy+6);
  ctx.restore();
  drawSignal(sigRight, sx+10, sy+4, sw-20, sh-20, sh*0.18, COL.axis, sigA, 1);
  // 下落点
  var guessText='--';
  if(phase>0.3){
    var dp=Math.min(1,(phase-0.3)/0.25);
    var startX=sx+sw/2, startY=sy+sh+8;
    var cx=startX+(nx-startX)*dp;
    var cy=startY+(g.y-startY)*(dp*dp);
    ctx.save(); ctx.fillStyle=COL.solution; ctx.font='700 12px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Var = '+newV.toFixed(2), cx, cy-16); ctx.restore();
    drawDot(cx, cy, 'R', 1, 7);
  }
  // 判定: 落右边 -> 右手
  var decided = phase>0.58;
  if(decided){
    guessText = LANG==='cn'?'右手':'RIGHT';
    var da=Math.min(1,(phase-0.58)*4);
    // 命中阈值高亮
    ctx.save(); ctx.globalAlpha=da;
    ctx.fillStyle=COL.qed; ctx.font='800 16px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText((LANG==='cn'?'Var '+newV.toFixed(2)+' > 阈值 '+THRESHOLD.toFixed(2)+'  ->  判定: 右手':'Var '+newV.toFixed(2)+' > thr '+THRESHOLD.toFixed(2)+'  ->  decision: RIGHT'), W/2, g.y+44);
    ctx.restore();
  }
  // Minecraft 角色 — 终点徽记常驻右下, 判定后抬手"动了"
  drawMascotMinecraft(W-58, H-70, 16, 0.95, decided);
  ctx.save();
  ctx.fillStyle=COL.fgMute; ctx.font='600 9px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(LANG==='cn'?'终点: 听念头动':'goal: move by thought', W-58, H-44);
  ctx.restore();
  // 庆祝 + 诚实局限
  if(phase>0.66){
    var ca=Math.min(1,(phase-0.66)*3);
    var pulse=0.85+0.15*Math.sin(phase*14);
    ctx.save(); ctx.globalAlpha=Math.min(1,ca)*pulse;
    var bw=Math.min(560,W-60), bh=44, bx=W/2-bw/2, by=H-150;
    ctx.fillStyle=COL.bg2; ctx.strokeStyle=COL.gold; ctx.lineWidth=2.2;
    ctx.fillRect(bx,by,bw,bh); ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle=COL.gold; ctx.font='800 15px Inter,"Noto Sans SC",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(LANG==='cn'?'你做出了 BCI 的第一个特征!':'You built the first BCI feature!', W/2, by+bh/2);
    ctx.restore();
    if(phase>0.78){
      var ha=Math.min(1,(phase-0.78)*3);
      ctx.save(); ctx.globalAlpha=ha;
      ctx.fillStyle=COL.fgDim; ctx.font='600 11px Inter,"Noto Sans SC",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(LANG==='cn'?('坦白: 两堆边缘还重叠, 单通道方差会猜错约 '+(100-ACC*100).toFixed(0)+'% — 下一步 CSP 把堆拉更开'):('honest: piles overlap at the edge, ~'+(100-ACC*100).toFixed(0)+'% wrong with one channel — next, CSP separates them further'), W/2, by+bh+8);
      ctx.restore();
    }
  }
  setHUD('4/4', '+1 new', 'Var = '+newV.toFixed(2), guessText);
}

/* ============================================================
   Main render loop — autoplay rAF, 变长阶段
   ============================================================ */
var drawers = [drawF1, drawF2, drawF3, drawF4];
function sceneAt(tt){
  var acc=0;
  for(var i=0;i<SCENE_DUR.length;i++){
    if(tt < acc+SCENE_DUR[i]) return {idx:i, p:(tt-acc)/SCENE_DUR[i]};
    acc+=SCENE_DUR[i];
  }
  return {idx:SCENE_DUR.length-1, p:1};
}
function render(){
  var now = performance.now();
  var tt = (now - animStart) % CYCLE;
  var s = sceneAt(tt);
  if(s.idx !== currentScene){
    currentScene = s.idx;
    updateSubtitle(currentScene);
  }
  drawers[s.idx](s.p);
  requestAnimationFrame(render);
}
refreshI18N();
updateSubtitle(0);
requestAnimationFrame(render);
</script>
