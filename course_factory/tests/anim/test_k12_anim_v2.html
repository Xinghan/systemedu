<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:transparent;backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>

<script>

    // Frame 2: composite arc
    f2_title: {en:'Combine Them = Arc!', cn:'\u5408\u5728\u4e00\u8d77 = \u5f27\u7ebf\uff01'},
    f2_desc:  {en:'Horizontal + vertical together make a curved path', cn:'\u6c34\u5e73\u8fd0\u52a8 + \u5782\u76f4\u4e0b\u843d \u540c\u65f6\u53d1\u751f = \u5f2f\u66f2\u8f68\u8ff9'},

    // Frame 3: angle comparison
    f3_title: {en:'Three Angles Compared', cn:'\u4e09\u79cd\u89d2\u5ea6\u5bf9\u6bd4'},
    f3_desc:  {en:'30 / 45 / 60 degrees -- 45 goes farthest!', cn:'30\u00b0 / 45\u00b0 / 60\u00b0\u2014\u201445\u00b0\u98de\u5f97\u6700\u8fdc\uff01'},

    // HUD labels
    hudL1: {en:'FRAME', cn:'\u5e27'},

    hudL3: {en:'MOTION', cn:'\u8fd0\u52a8'},
    hudL4: {en:'KEY POINT', cn:'\u5173\u952e'},

    hud_concept1: {en:'decompose', cn:'\u5206\u89e3'},
    hud_concept2: {en:'synthesis', cn:'\u5408\u6210'},
    hud_concept3: {en:'angles', cn:'\u89d2\u5ea6\u5bf9\u6bd4'},

    hud_motion0: {en:'--', cn:'--'},
    hud_motion1: {en:'H + V separate', cn:'\u6c34\u5e73+\u5782\u76f4\u5206\u79bb'},
    hud_motion2: {en:'H + V combined', cn:'\u6c34\u5e73+\u5782\u76f4\u5408\u6210'},
    hud_motion3: {en:'3 arcs', cn:'3\u6761\u5f27\u7ebf'},

    hud_key0: {en:'straight or curved?', cn:'\u76f4\u8fd8\u662f\u5f2f\uff1f'},
    hud_key1: {en:'two independent motions', cn:'\u4e24\u4e2a\u72ec\u7acb\u8fd0\u52a8'},
    hud_key2: {en:'parabola = arc', cn:'\u629b\u7269\u7ebf = \u5f27\u7ebf'},

    // Guide
    guideTitle: {en:'Why Is It Curved?', cn:'\u4e3a\u4ec0\u4e48\u662f\u5f2f\u7684\uff1f'},
    g1: {en:'Horizontal: the ball keeps moving forward at constant speed (no force pushing it back).', cn:'\u6c34\u5e73\u65b9\u5411\uff1a\u7403\u4ee5\u5300\u901f\u5411\u524d\uff08\u6ca1\u6709\u529b\u62c9\u5b83\u56de\u6765\uff09\u3002'},
    g2: {en:'Vertical: gravity keeps pulling it down, faster and faster.', cn:'\u5782\u76f4\u65b9\u5411\uff1a\u91cd\u529b\u4e0d\u505c\u5730\u5f80\u4e0b\u62c9\uff0c\u8d8a\u6765\u8d8a\u5feb\u3002'},
    g3: {en:'Together: forward + downward = a curved arc called a parabola.', cn:'\u5408\u5728\u4e00\u8d77\uff1a\u5411\u524d + \u5411\u4e0b = \u5f2f\u66f2\u7684\u5f27\u7ebf\uff0c\u53eb\u629b\u7269\u7ebf\u3002'},
    g4: {en:'45 degrees balances height and distance for max range.', cn:'45\u00b0\u89d2\u5e73\u8861\u4e86\u9ad8\u5ea6\u548c\u8ddd\u79bb\uff0c\u5c04\u7a0b\u6700\u5927\u3002'},

    // Labels used in drawing
    lbl_horizontal: {en:'Horizontal', cn:'\u6c34\u5e73\u65b9\u5411'},
    lbl_vertical:   {en:'Vertical', cn:'\u5782\u76f4\u65b9\u5411'},
    lbl_constant:   {en:'Constant speed', cn:'\u5300\u901f'},
    lbl_accelerate:  {en:'Accelerating', cn:'\u52a0\u901f'},
    lbl_plus:       {en:'+', cn:'+'},
    lbl_equals_arc: {en:'= ARC', cn:'= \u5f27\u7ebf'},
    lbl_30:         {en:'30\u00b0', cn:'30\u00b0'},
    lbl_45:         {en:'45\u00b0', cn:'45\u00b0'},
    lbl_60:         {en:'60\u00b0', cn:'60\u00b0'},
    lbl_farthest:   {en:'FARTHEST!', cn:'\u6700\u8fdc\uff01'},

  },

  hudLabels: ['hudL1', 'hudL2', 'hudL3', 'hudL4'],
  hudValues: [
    ['1/4', 'hud_concept0', 'hud_motion0', 'hud_key0'],
    ['2/4', 'hud_concept1', 'hud_motion1', 'hud_key1'],
    ['3/4', 'hud_concept2', 'hud_motion2', 'hud_key2'],
    ['4/4', 'hud_concept3', 'hud_motion3', 'hud_key3'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],

// ============================================================
// Projectile trajectory animation
// Concept: horizontal motion + vertical fall = parabolic arc
// ============================================================

// Physics helper: generate parabolic arc points
// v0 = initial speed (m/s), angleDeg = launch angle, g = gravity
function parabolicArc(v0, angleDeg, g, steps) {
  var rad = angleDeg * Math.PI / 180;
  var tFlight = 2 * v0 * Math.sin(rad) / g;
  var pts = [];
  for (var i = 0; i <= steps; i++) {
    var tt = (i / steps) * tFlight;
    var x = v0 * Math.cos(rad) * tt;
    var y = v0 * Math.sin(rad) * tt - 0.5 * g * tt * tt;
    pts.push({x: x, y: y});
  }
  return pts;
}

// Draw a polyline from points array (canvas pixel coords)
function drawPath(ctx, pts, color, lineWidth, dash) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth || 2;
  if (dash) ctx.setLineDash(dash);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
  ctx.restore();
}

// Draw a filled circle
function drawDot(ctx, x, y, r, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Draw an arrow from (x1,y1) to (x2,y2)
function drawArrowCustom(ctx, x1, y1, x2, y2, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw || 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  var angle = Math.atan2(y2 - y1, x2 - x1);
  var hs = 7;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function customDrawElement(ctx, el, W, H) {
  // Frame 1: horizontal vs vertical decomposition
  if (el.type === 'h_motion_demo') {
    var ox = el.ox, oy = el.oy, span = el.span, progress = el.progress;
    var ballCount = 6;

    // Draw arrow axis
    drawArrowCustom(ctx, ox, oy, ox + span, oy, '#50ffb0', 1.5);

    // Equal-spaced dots (uniform velocity)
    for (var i = 0; i <= ballCount; i++) {
      var frac = i / ballCount;
      if (frac > progress) break;
      var bx = ox + frac * span;
      var alpha = (i === ballCount && progress >= 1) ? 1 : 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      drawDot(ctx, bx, oy, i === ballCount ? 6 : 4, '#50ffb0');
      ctx.restore();
    }
    return true;
  }

  if (el.type === 'v_motion_demo') {
    var ox = el.ox, oy = el.oy, span = el.span, progress = el.progress;
    var ballCount = 6;

    // Draw arrow axis (downward)
    drawArrowCustom(ctx, ox, oy, ox, oy + span, '#ff6b6b', 1.5);

    // Accelerating-spaced dots (gravity: spacing increases)
    for (var i = 0; i <= ballCount; i++) {
      var frac = (i / ballCount);
      frac = frac * frac; // quadratic spacing = acceleration
      if (frac > progress * progress) break;
      var by = oy + frac * span;
      var alpha = (i === ballCount && progress >= 1) ? 1 : 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      drawDot(ctx, ox, by, i === ballCount ? 6 : 4, '#ff6b6b');
      ctx.restore();
    }
    return true;
  }

  // Frame 2: composite trajectory with decomposition lines
  if (el.type === 'composite_arc') {
    var baseX = el.baseX, baseY = el.baseY, scaleX = el.scaleX, scaleY = el.scaleY;
    var v0 = 10, g = 9.8, angleDeg = 45;
    var pts = parabolicArc(v0, angleDeg, g, 50);

    // Convert to canvas coords
    var canvasPts = [];
    for (var i = 0; i < pts.length; i++) {
      canvasPts.push({x: baseX + pts[i].x * scaleX, y: baseY - pts[i].y * scaleY});
    }

    // Draw the arc
    drawPath(ctx, canvasPts, '#ffdd00', 3);

    // Mark key positions with dots and decomposition
    var keyFrames = [0, 10, 20, 30, 40, 50];
    for (var k = 0; k < keyFrames.length; k++) {
      var idx = keyFrames[k];
      var cx = canvasPts[idx].x;
      var cy = canvasPts[idx].y;

      drawDot(ctx, cx, cy, 5, '#ffdd00');

      // Horizontal dashed line from launch column
      if (idx > 0) {
        drawPath(ctx, [{x: baseX, y: cy}, {x: cx, y: cy}], 'rgba(80,255,176,0.3)', 1, [3, 3]);
        // Vertical dashed line from ground
        drawPath(ctx, [{x: cx, y: baseY}, {x: cx, y: cy}], 'rgba(255,107,107,0.3)', 1, [3, 3]);
      }
    }

    // Velocity decomposition arrow at a mid-point (index 15)
    var midIdx = 15;
    var mpx = canvasPts[midIdx].x;
    var mpy = canvasPts[midIdx].y;
    // horizontal component arrow
    drawArrowCustom(ctx, mpx, mpy, mpx + 35, mpy, '#50ffb0', 2);
    // vertical component arrow (downward at this point)
    var vyDir = (midIdx > 25) ? 25 : 15;
    drawArrowCustom(ctx, mpx, mpy, mpx, mpy + vyDir, '#ff6b6b', 2);

    return true;
  }

  // Frame 3: three angle arcs
  if (el.type === 'three_arcs') {
    var baseX = el.baseX, baseY = el.baseY, scaleX = el.scaleX, scaleY = el.scaleY;
    var v0 = 10, g = 9.8;
    var arcs = [
      {angle: 30, color: '#ff6b6b', label: el.lbl30},
      {angle: 45, color: '#ffdd00', label: el.lbl45},
      {angle: 60, color: '#4488ff', label: el.lbl60},
    ];

    for (var a = 0; a < arcs.length; a++) {
      var arc = arcs[a];
      var pts = parabolicArc(v0, arc.angle, g, 50);
      var canvasPts = [];
      for (var i = 0; i < pts.length; i++) {
        canvasPts.push({x: baseX + pts[i].x * scaleX, y: baseY - pts[i].y * scaleY});
      }
      drawPath(ctx, canvasPts, arc.color, 3);

      // End dot + label
      var endPt = canvasPts[canvasPts.length - 1];
      drawDot(ctx, endPt.x, endPt.y, 5, arc.color);

      // Label
      ctx.save();
      ctx.fillStyle = arc.color;
      ctx.font = "bold 12px 'Space Grotesk','Noto Sans SC',sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(arc.label, endPt.x, endPt.y + 16);
      ctx.restore();

      // Peak dot
      var peakIdx = 0;
      var peakY = Infinity;
      for (var j = 0; j < canvasPts.length; j++) {
        if (canvasPts[j].y < peakY) { peakY = canvasPts[j].y; peakIdx = j; }
      }
      drawDot(ctx, canvasPts[peakIdx].x, canvasPts[peakIdx].y, 3, arc.color);
    }

    // Highlight 45 degree as farthest
    var pts45 = parabolicArc(v0, 45, g, 50);
    var endX45 = baseX + pts45[pts45.length - 1].x * scaleX;
    ctx.save();
    ctx.fillStyle = '#ffdd00';
    ctx.font = "bold 14px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(el.lblFarthest, endX45, baseY + 34);
    ctx.restore();

    // Range comparison bracket
    ctx.save();
    ctx.strokeStyle = 'rgba(255,221,0,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(endX45, baseY);
    ctx.lineTo(endX45, baseY + 20);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    return true;
  }

  return false;
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  var els = [];

  // --- Frame 0: Title + core question ---
  if (f === 0) {
    els.push({id:'f0_title', type:'label', text:t('f0_title'), x:cx, y:cy - 30, color:P.primary, size:22, align:'center', bold:true, glow:P.glowStrong});
    els.push({id:'f0_desc', type:'label', text:t('f0_desc'), x:cx, y:cy + 10, color:P.muted, size:15, align:'center'});

    // Simple illustration: a ball with a question-mark path
    var ballX = cx - 80;
    var ballY = cy + 60;
    els.push({id:'ball0', type:'circle', x:ballX, y:ballY, r:8, fill:P.primary, glow:P.glowStrong, glowSize:15});

    // Dotted question path going right and slightly down
    els.push({id:'qpath', type:'line', x1:ballX + 12, y1:ballY, x2:ballX + 140, y2:ballY + 30, color:'rgba(255,255,255,0.15)', lineWidth:2, dash:[6, 4]});
    // Curved alternative
    els.push({id:'qpath2', type:'custom', draw: function(ctx, el) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,221,0,0.25)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(ballX + 12, ballY);
      ctx.quadraticCurveTo(ballX + 80, ballY - 50, ballX + 140, ballY + 30);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }});

    // Question mark near the paths
    els.push({id:'qmark', type:'label', text:'?', x:ballX + 100, y:ballY - 20, color:'rgba(255,255,255,0.4)', size:28, align:'center', bold:true});
  }

  // --- Frame 1: Horizontal vs Vertical ---
  if (f === 1) {
    els.push({id:'f1_title', type:'label', text:t('f1_title'), x:cx, y:30, color:P.primary, size:18, align:'center', bold:true});
    els.push({id:'f1_desc', type:'label', text:t('f1_desc'), x:cx, y:52, color:P.muted, size:12, align:'center'});

    // Left half: horizontal motion
    var leftCx = W * 0.25;
    var rightCx = W * 0.75;
    var demoY = cy + 10;
    var demoSpan = W * 0.3;

    // Section labels
    els.push({id:'lbl_h', type:'label', text:t('lbl_horizontal'), x:leftCx, y:demoY - 60, color:'#50ffb0', size:14, align:'center', bold:true});
    els.push({id:'lbl_h_sub', type:'label', text:t('lbl_constant'), x:leftCx, y:demoY - 42, color:P.muted, size:11, align:'center'});

    els.push({id:'h_demo', type:'h_motion_demo', ox:leftCx - demoSpan * 0.5, oy:demoY, span:demoSpan, progress:1});

    // Equal spacing markers
    els.push({id:'h_note', type:'label', text:'=  =  =  =  =', x:leftCx, y:demoY + 20, color:'rgba(80,255,176,0.3)', size:10, align:'center'});

    // Plus sign in the middle
    els.push({id:'plus', type:'label', text:t('lbl_plus'), x:cx, y:demoY, color:'rgba(255,255,255,0.6)', size:30, align:'center', bold:true});

    // Right half: vertical motion
    els.push({id:'lbl_v', type:'label', text:t('lbl_vertical'), x:rightCx, y:demoY - 60, color:'#ff6b6b', size:14, align:'center', bold:true});
    els.push({id:'lbl_v_sub', type:'label', text:t('lbl_accelerate'), x:rightCx, y:demoY - 42, color:P.muted, size:11, align:'center'});

    var vSpan = H * 0.35;
    els.push({id:'v_demo', type:'v_motion_demo', ox:rightCx, oy:demoY - vSpan * 0.15, span:vSpan, progress:1});

    // Increasing spacing note
    els.push({id:'v_note', type:'label', text:'> > > >', x:rightCx + 20, y:demoY + vSpan * 0.35, color:'rgba(255,107,107,0.3)', size:10, align:'left'});

    // Divider line
    els.push({id:'divider', type:'line', x1:cx, y1:demoY - 70, x2:cx, y2:demoY + 80, color:'rgba(255,255,255,0.06)', lineWidth:1, dash:[4, 4]});
  }

  // --- Frame 2: Composite trajectory ---
  if (f === 2) {
    els.push({id:'f2_title', type:'label', text:t('f2_title'), x:cx, y:30, color:P.primary, size:18, align:'center', bold:true});
    els.push({id:'f2_desc', type:'label', text:t('f2_desc'), x:cx, y:52, color:P.muted, size:12, align:'center'});

    var groundY = H * 0.82;
    var launchX = W * 0.1;
    // Scale: v0=10, 45 deg -> range ~10.2m, height ~2.55m
    var scaleX = (W * 0.7) / 10.5;
    var scaleY = (H * 0.45) / 3.0;

    // Ground line
    els.push({id:'ground2', type:'line', x1:0, y1:groundY, x2:W, y2:groundY, color:P.muted, lineWidth:1, dash:[4, 4]});
    els.push({id:'groundLbl2', type:'label', text:t('lbl_ground'), x:W - 40, y:groundY + 14, color:P.muted, size:9, align:'right'});

    // Launch dot
    els.push({id:'launch2', type:'circle', x:launchX, y:groundY, r:5, fill:P.primary});

    // Composite arc element
    els.push({id:'comp_arc', type:'composite_arc', baseX:launchX, baseY:groundY, scaleX:scaleX, scaleY:scaleY});

    // Equals arc label
    els.push({id:'eq_arc', type:'label', text:t('lbl_equals_arc'), x:cx, y:groundY + 28, color:'#ffdd00', size:14, align:'center', bold:true});

    // Legend
    els.push({id:'leg_h', type:'label', text:'\u2192 ' + t('lbl_horizontal'), x:W * 0.7, y:H * 0.18, color:'#50ffb0', size:10, align:'left'});
    els.push({id:'leg_v', type:'label', text:'\u2193 ' + t('lbl_vertical'), x:W * 0.7, y:H * 0.24, color:'#ff6b6b', size:10, align:'left'});
    els.push({id:'leg_arc', type:'label', text:'\u2312 ' + t('lbl_equals_arc'), x:W * 0.7, y:H * 0.30, color:'#ffdd00', size:10, align:'left'});
  }

  // --- Frame 3: Three angle comparison ---
  if (f === 3) {
    els.push({id:'f3_title', type:'label', text:t('f3_title'), x:cx, y:30, color:P.primary, size:18, align:'center', bold:true});
    els.push({id:'f3_desc', type:'label', text:t('f3_desc'), x:cx, y:52, color:P.muted, size:12, align:'center'});

    var groundY = H * 0.82;
    var launchX = W * 0.08;
    var scaleX = (W * 0.8) / 10.5;
    var scaleY = (H * 0.5) / 5.0;

    // Ground line
    els.push({id:'ground3', type:'line', x1:0, y1:groundY, x2:W, y2:groundY, color:P.muted, lineWidth:1, dash:[4, 4]});
    els.push({id:'groundLbl3', type:'label', text:t('lbl_ground'), x:W - 40, y:groundY + 14, color:P.muted, size:9, align:'right'});

    // Launch dot
    els.push({id:'launch3', type:'circle', x:launchX, y:groundY, r:5, fill:P.primary});

    // Three arcs custom element
    els.push({id:'three_arcs', type:'three_arcs', baseX:launchX, baseY:groundY, scaleX:scaleX, scaleY:scaleY,
      lbl30:t('lbl_30'), lbl45:t('lbl_45'), lbl60:t('lbl_60'), lblFarthest:t('lbl_farthest')});

    // Angle indicator lines at launch point
    var angles = [30, 45, 60];
    var aColors = ['#ff6b6b', '#ffdd00', '#4488ff'];
    for (var i = 0; i < angles.length; i++) {
      var rad = angles[i] * Math.PI / 180;
      var lineLen = 40;
      var lx2 = launchX + Math.cos(rad) * lineLen;
      var ly2 = groundY - Math.sin(rad) * lineLen;
      els.push({id:'angle_line_' + i, type:'line', x1:launchX, y1:groundY, x2:lx2, y2:ly2, color:aColors[i], lineWidth:1.5});
    }
  }

  return els;
}

function drawBg(ctx, W, H) {
  // Dark gradient background
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#060810');
  grad.addColorStop(0.6, '#0a0e18');
  grad.addColorStop(1, '#0c1220');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(80,255,176,0.03)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

AnimRuntime.boot();
</script>
