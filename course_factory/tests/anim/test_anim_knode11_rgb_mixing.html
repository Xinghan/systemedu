<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
var CONFIG = {
  style: 'ares_mission',
  totalFrames: 5,

  i18n: {
    title:    {en:'RGB PRIMARY COLORS', cn:'\u989c\u8272\u7684\u4e09\u539f\u8272'},
    subtitle: {en:'HOW THREE COLORS MAKE ALL COLORS', cn:'\u4e09\u79cd\u989c\u8272\u5982\u4f55\u53d8\u51fa\u4e07\u79cd\u8272\u5f69'},
    // Frame 0
    f0_title:   {en:'THE THREE PRIMARY LIGHTS', cn:'\u4e09\u76cf\u63a2\u7167\u706f'},
    f0_desc:    {en:'Every screen uses only Red, Green, Blue', cn:'\u6240\u6709\u5c4f\u5e55\u53ea\u7528\u7ea2\u3001\u7eff\u3001\u84dd\u4e09\u79cd\u5149'},
    f0_red:     {en:'RED', cn:'\u7ea2'},
    f0_green:   {en:'GREEN', cn:'\u7eff'},
    f0_blue:    {en:'BLUE', cn:'\u84dd'},
    // Frame 1
    f1_title:   {en:'MIXING TWO COLORS', cn:'\u4e24\u4e24\u6df7\u5408'},
    f1_rg:      {en:'Red + Green = Yellow', cn:'\u7ea2 + \u7eff = \u9ec4'},
    f1_rb:      {en:'Red + Blue = Magenta', cn:'\u7ea2 + \u84dd = \u54c1\u7ea2'},
    f1_gb:      {en:'Green + Blue = Cyan', cn:'\u7eff + \u84dd = \u9752'},
    // Frame 2
    f2_title:   {en:'ALL THREE = WHITE', cn:'\u4e09\u8272\u53e0\u52a0 = \u767d\u8272'},
    f2_desc:    {en:'This is called additive color mixing', cn:'\u8fd9\u5c31\u662f\u52a0\u8272\u6df7\u5408'},
    f2_white:   {en:'WHITE', cn:'\u767d\u8272'},
    // Frame 3
    f3_title:   {en:'INSIDE A PIXEL', cn:'\u50cf\u7d20\u5185\u90e8'},
    f3_desc:    {en:'Each pixel has 3 tiny sub-pixels: R, G, B', cn:'\u6bcf\u4e2a\u50cf\u7d20\u6709 3 \u4e2a\u5c0f\u5b50\u50cf\u7d20\uff1aR\u3001G\u3001B'},
    f3_sub:     {en:'Sub-pixels', cn:'\u5b50\u50cf\u7d20'},
    // Frame 4
    f4_title:   {en:'COLORS AS NUMBERS', cn:'\u989c\u8272 = \u6570\u5b57'},
    f4_desc:    {en:'Each channel: 0 (off) to 255 (max)', cn:'\u6bcf\u4e2a\u901a\u9053\uff1a0\uff08\u5173\uff09\u5230 255\uff08\u6700\u4eae\uff09'},
    f4_black:   {en:'Black (0,0,0)', cn:'\u9ed1\u8272 (0,0,0)'},
    f4_white:   {en:'White (255,255,255)', cn:'\u767d\u8272 (255,255,255)'},
    f4_mars:    {en:'Mars Orange (255,127,80)', cn:'\u706b\u661f\u6a59 (255,127,80)'},

    guideTitle: {en:'LEARNING GUIDE', cn:'\u5b66\u4e60\u5bfc\u822a'},
    g1: {en:'Screen colors are made from light, not paint', cn:'\u5c4f\u5e55\u989c\u8272\u7531\u5149\u6df7\u5408\uff0c\u4e0d\u662f\u989c\u6599\u6df7\u5408'},
    g2: {en:'Mixing light adds brightness (additive)', cn:'\u5149\u6df7\u5408\u8d8a\u6df7\u8d8a\u4eae\uff08\u52a0\u8272\uff09'},
    g3: {en:'Each color = 3 numbers (R, G, B) from 0 to 255', cn:'\u6bcf\u79cd\u989c\u8272 = 3\u4e2a\u6570\u5b57 (R,G,B)\uff0c\u8303\u56f4 0-255'},
  },

  hudLabels: ['hudL1','hudL2','hudL3','hudL4'],
  hudValues: [
    [{en:'MODE',cn:'\u6a21\u5f0f'}, {en:'COLORS',cn:'\u989c\u8272\u6570'}, {en:'MIXING',cn:'\u6df7\u5408'}, {en:'RESULT',cn:'\u7ed3\u679c'}],
    [{en:'ADDITIVE',cn:'\u52a0\u8272'}, '3', {en:'2 PAIRS',cn:'\u4e24\u4e24'}, {en:'Y / M / C',cn:'\u9ec4/\u54c1\u7ea2/\u9752'}],
    [{en:'ADDITIVE',cn:'\u52a0\u8272'}, '3', {en:'ALL THREE',cn:'\u4e09\u8272'}, {en:'WHITE',cn:'\u767d\u8272'}],
    [{en:'PIXEL',cn:'\u50cf\u7d20'}, '3', {en:'SUB-PX',cn:'\u5b50\u50cf\u7d20'}, 'R + G + B'],
    [{en:'DIGITAL',cn:'\u6570\u5b57'}, '0-255', {en:'CHANNELS',cn:'\u901a\u9053'}, '16.7M'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1','g2','g3'],
};

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;
  var els = [];

  if (f === 0) {
    // Three spotlights: Red, Green, Blue
    els.push({id:'f0t', type:'label', text:t('f0_title'), x:cx, y:40, color:P.primary, size:17, align:'center', glow:P.glowStrong});
    els.push({id:'f0d', type:'text', text:t('f0_desc'), x:cx, y:62, color:P.muted, size:11, align:'center'});

    var spotY = cy - 20;
    var spotR = Math.min(W * 0.12, 60);
    var gap = Math.min(W * 0.25, 140);

    // Red spotlight
    els.push({id:'sr', type:'custom', draw: function(c, el) {
      var grd = c.createRadialGradient(cx - gap, spotY, 0, cx - gap, spotY, spotR * 2);
      grd.addColorStop(0, 'rgba(255,60,60,0.7)');
      grd.addColorStop(0.5, 'rgba(255,30,30,0.2)');
      grd.addColorStop(1, 'rgba(255,0,0,0)');
      c.fillStyle = grd;
      c.fillRect(cx - gap - spotR * 2, spotY - spotR * 2, spotR * 4, spotR * 4);
    }});
    els.push({id:'cr', type:'circle', x:cx - gap, y:spotY, r:spotR, fill:'rgba(255,60,60,0.9)', glow:'rgba(255,60,60,0.6)', glowSize:20});
    els.push({id:'lr', type:'label', text:t('f0_red'), x:cx - gap, y:spotY + spotR + 20, color:'#ff4444', size:13, align:'center'});

    // Green spotlight
    els.push({id:'sg', type:'custom', draw: function(c, el) {
      var grd = c.createRadialGradient(cx, spotY, 0, cx, spotY, spotR * 2);
      grd.addColorStop(0, 'rgba(60,255,60,0.7)');
      grd.addColorStop(0.5, 'rgba(30,255,30,0.2)');
      grd.addColorStop(1, 'rgba(0,255,0,0)');
      c.fillStyle = grd;
      c.fillRect(cx - spotR * 2, spotY - spotR * 2, spotR * 4, spotR * 4);
    }});
    els.push({id:'cg', type:'circle', x:cx, y:spotY, r:spotR, fill:'rgba(60,255,60,0.9)', glow:'rgba(60,255,60,0.6)', glowSize:20});
    els.push({id:'lg', type:'label', text:t('f0_green'), x:cx, y:spotY + spotR + 20, color:'#44ff44', size:13, align:'center'});

    // Blue spotlight
    els.push({id:'sb', type:'custom', draw: function(c, el) {
      var grd = c.createRadialGradient(cx + gap, spotY, 0, cx + gap, spotY, spotR * 2);
      grd.addColorStop(0, 'rgba(60,60,255,0.7)');
      grd.addColorStop(0.5, 'rgba(30,30,255,0.2)');
      grd.addColorStop(1, 'rgba(0,0,255,0)');
      c.fillStyle = grd;
      c.fillRect(cx + gap - spotR * 2, spotY - spotR * 2, spotR * 4, spotR * 4);
    }});
    els.push({id:'cb', type:'circle', x:cx + gap, y:spotY, r:spotR, fill:'rgba(60,60,255,0.9)', glow:'rgba(60,60,255,0.6)', glowSize:20});
    els.push({id:'lb', type:'label', text:t('f0_blue'), x:cx + gap, y:spotY + spotR + 20, color:'#4444ff', size:13, align:'center'});
  }

  if (f === 1) {
    // Two-color mixing: R+G=Yellow, R+B=Magenta, G+B=Cyan
    els.push({id:'f1t', type:'label', text:t('f1_title'), x:cx, y:40, color:P.primary, size:17, align:'center', glow:P.glowStrong});

    var mixR = Math.min(W * 0.09, 48);
    var row1Y = cy - 40;
    var colW = W / 4;

    // R + G = Yellow
    els.push({id:'m1r', type:'circle', x:colW - 14, y:row1Y, r:mixR, fill:'rgba(255,60,60,0.8)', glow:'rgba(255,60,60,0.4)', glowSize:12});
    els.push({id:'m1g', type:'circle', x:colW + 14, y:row1Y, r:mixR, fill:'rgba(60,255,60,0.8)', glow:'rgba(60,255,60,0.4)', glowSize:12});
    // Overlap area = yellow
    els.push({id:'m1y', type:'custom', draw: function(c) {
      c.globalCompositeOperation = 'lighter';
      c.beginPath(); c.arc(colW - 14, row1Y, mixR, 0, Math.PI * 2); c.fillStyle = 'rgba(255,60,60,0.5)'; c.fill();
      c.beginPath(); c.arc(colW + 14, row1Y, mixR, 0, Math.PI * 2); c.fillStyle = 'rgba(60,255,60,0.5)'; c.fill();
      c.globalCompositeOperation = 'source-over';
    }});
    els.push({id:'m1l', type:'text', text:t('f1_rg'), x:colW, y:row1Y + mixR + 18, color:'#ffff44', size:11, align:'center'});

    // R + B = Magenta
    els.push({id:'m2r', type:'circle', x:cx * 2 / 2 - 14, y:row1Y, r:mixR, fill:'rgba(255,60,60,0.8)', glow:'rgba(255,60,60,0.4)', glowSize:12});
    els.push({id:'m2b', type:'circle', x:cx * 2 / 2 + 14, y:row1Y, r:mixR, fill:'rgba(60,60,255,0.8)', glow:'rgba(60,60,255,0.4)', glowSize:12});
    els.push({id:'m2m', type:'custom', draw: function(c) {
      c.globalCompositeOperation = 'lighter';
      c.beginPath(); c.arc(cx - 14, row1Y, mixR, 0, Math.PI * 2); c.fillStyle = 'rgba(255,60,60,0.5)'; c.fill();
      c.beginPath(); c.arc(cx + 14, row1Y, mixR, 0, Math.PI * 2); c.fillStyle = 'rgba(60,60,255,0.5)'; c.fill();
      c.globalCompositeOperation = 'source-over';
    }});
    els.push({id:'m2l', type:'text', text:t('f1_rb'), x:cx, y:row1Y + mixR + 18, color:'#ff44ff', size:11, align:'center'});

    // G + B = Cyan
    els.push({id:'m3g', type:'circle', x:colW * 3 - 14, y:row1Y, r:mixR, fill:'rgba(60,255,60,0.8)', glow:'rgba(60,255,60,0.4)', glowSize:12});
    els.push({id:'m3b', type:'circle', x:colW * 3 + 14, y:row1Y, r:mixR, fill:'rgba(60,60,255,0.8)', glow:'rgba(60,60,255,0.4)', glowSize:12});
    els.push({id:'m3c', type:'custom', draw: function(c) {
      c.globalCompositeOperation = 'lighter';
      c.beginPath(); c.arc(colW * 3 - 14, row1Y, mixR, 0, Math.PI * 2); c.fillStyle = 'rgba(60,255,60,0.5)'; c.fill();
      c.beginPath(); c.arc(colW * 3 + 14, row1Y, mixR, 0, Math.PI * 2); c.fillStyle = 'rgba(60,60,255,0.5)'; c.fill();
      c.globalCompositeOperation = 'source-over';
    }});
    els.push({id:'m3l', type:'text', text:t('f1_gb'), x:colW * 3, y:row1Y + mixR + 18, color:'#44ffff', size:11, align:'center'});
  }

  if (f === 2) {
    // All three = white
    els.push({id:'f2t', type:'label', text:t('f2_title'), x:cx, y:40, color:P.primary, size:17, align:'center', glow:P.glowStrong});

    var bigR = Math.min(W * 0.18, 90);
    var off = bigR * 0.45;

    // Venn diagram with additive blending
    els.push({id:'venn', type:'custom', draw: function(c) {
      c.globalCompositeOperation = 'lighter';
      // Red circle (top left)
      c.beginPath(); c.arc(cx - off, cy - off * 0.6 - 10, bigR, 0, Math.PI * 2);
      c.fillStyle = 'rgba(255,0,0,0.55)'; c.fill();
      // Green circle (top right)
      c.beginPath(); c.arc(cx + off, cy - off * 0.6 - 10, bigR, 0, Math.PI * 2);
      c.fillStyle = 'rgba(0,255,0,0.55)'; c.fill();
      // Blue circle (bottom)
      c.beginPath(); c.arc(cx, cy + off * 0.7 - 10, bigR, 0, Math.PI * 2);
      c.fillStyle = 'rgba(0,0,255,0.55)'; c.fill();
      c.globalCompositeOperation = 'source-over';
    }});

    els.push({id:'f2w', type:'label', text:t('f2_white'), x:cx, y:cy - 10, color:'#ffffff', size:14, align:'center', glow:'rgba(255,255,255,0.6)'});
    els.push({id:'f2d', type:'text', text:t('f2_desc'), x:cx, y:cy + bigR + 20, color:P.muted, size:11, align:'center'});
  }

  if (f === 3) {
    // Inside a pixel: 3 sub-pixels
    els.push({id:'f3t', type:'label', text:t('f3_title'), x:cx, y:40, color:P.primary, size:17, align:'center', glow:P.glowStrong});
    els.push({id:'f3d', type:'text', text:t('f3_desc'), x:cx, y:62, color:P.muted, size:11, align:'center'});

    // Draw a large "pixel" with 3 sub-pixels
    var pixW = Math.min(W * 0.6, 300);
    var pixH = Math.min(H * 0.4, 180);
    var px = cx - pixW / 2;
    var py = cy - pixH / 2;
    var subW = pixW / 3;

    els.push({id:'pxbg', type:'box', x:px - 3, y:py - 3, w:pixW + 6, h:pixH + 6, stroke:P.outline, lineWidth:2});

    // R sub-pixel
    els.push({id:'subr', type:'custom', draw: function(c) {
      var grd = c.createLinearGradient(px, py, px, py + pixH);
      grd.addColorStop(0, '#ff4444'); grd.addColorStop(1, '#aa0000');
      c.fillStyle = grd; c.fillRect(px, py, subW - 2, pixH);
    }});
    els.push({id:'subrl', type:'label', text:'R', x:px + subW / 2, y:py + pixH + 18, color:'#ff4444', size:14, align:'center'});

    // G sub-pixel
    els.push({id:'subg', type:'custom', draw: function(c) {
      var grd = c.createLinearGradient(px + subW, py, px + subW, py + pixH);
      grd.addColorStop(0, '#44ff44'); grd.addColorStop(1, '#00aa00');
      c.fillStyle = grd; c.fillRect(px + subW + 1, py, subW - 2, pixH);
    }});
    els.push({id:'subgl', type:'label', text:'G', x:px + subW * 1.5, y:py + pixH + 18, color:'#44ff44', size:14, align:'center'});

    // B sub-pixel
    els.push({id:'subb', type:'custom', draw: function(c) {
      var grd = c.createLinearGradient(px + subW * 2, py, px + subW * 2, py + pixH);
      grd.addColorStop(0, '#4444ff'); grd.addColorStop(1, '#0000aa');
      c.fillStyle = grd; c.fillRect(px + subW * 2 + 2, py, subW - 2, pixH);
    }});
    els.push({id:'subbl', type:'label', text:'B', x:px + subW * 2.5, y:py + pixH + 18, color:'#4444ff', size:14, align:'center'});

    els.push({id:'f3sub', type:'text', text:t('f3_sub'), x:cx, y:py - 14, color:P.muted, size:10, align:'center'});
  }

  if (f === 4) {
    // Colors as numbers: RGB values
    els.push({id:'f4t', type:'label', text:t('f4_title'), x:cx, y:36, color:P.primary, size:17, align:'center', glow:P.glowStrong});
    els.push({id:'f4d', type:'text', text:t('f4_desc'), x:cx, y:56, color:P.muted, size:11, align:'center'});

    var barW = Math.min(W * 0.6, 280);
    var barH = 28;
    var bx = cx - barW / 2;
    var startY = cy - 70;
    var rowGap = 52;

    // Color samples: black, white, mars orange
    var samples = [
      {r:0, g:0, b:0, label:t('f4_black'), color:'#666666'},
      {r:255, g:255, b:255, label:t('f4_white'), color:'#ffffff'},
      {r:255, g:127, b:80, label:t('f4_mars'), color:'#ff7f50'},
    ];

    for (var i = 0; i < samples.length; i++) {
      var s = samples[i];
      var yy = startY + i * rowGap;

      // Color swatch
      var swatchColor = 'rgb(' + s.r + ',' + s.g + ',' + s.b + ')';
      els.push({id:'sw' + i, type:'box', x:bx - 40, y:yy - 12, w:28, h:28, fill:swatchColor, stroke:P.outline, lineWidth:1});

      // R bar
      var rw = barW * (s.r / 255);
      els.push({id:'rb' + i, type:'gradient_box', x:bx, y:yy - 10, w:Math.max(rw, 2), h:8, color1:'#ff4444', color2:'#cc0000'});
      // G bar
      var gw = barW * (s.g / 255);
      els.push({id:'gb' + i, type:'gradient_box', x:bx, y:yy, w:Math.max(gw, 2), h:8, color1:'#44ff44', color2:'#00cc00'});
      // B bar
      var bw = barW * (s.b / 255);
      els.push({id:'bb' + i, type:'gradient_box', x:bx, y:yy + 10, w:Math.max(bw, 2), h:8, color1:'#4444ff', color2:'#0000cc'});

      // Background track
      els.push({id:'trk' + i, type:'box', x:bx, y:yy - 10, w:barW, h:28, stroke:'rgba(255,255,255,0.1)', lineWidth:0.5});

      // Label
      els.push({id:'sl' + i, type:'text', text:s.label, x:bx + barW + 10, y:yy + 4, color:s.color, size:11, align:'left'});
    }
  }

  return els;
}

AnimRuntime.boot();
</script>
