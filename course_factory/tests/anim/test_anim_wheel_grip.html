<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WHEEL GRIP DYNAMICS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;font-family:'Noto Sans SC',sans-serif;color:#e5e2e1}
.wrapper{display:flex;flex-direction:column;height:100vh}
.header{text-align:center;padding:8px 0 4px;flex-shrink:0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,#ffb59c,#ff7f50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:11px;color:#8a8886;margin-top:2px}
.canvas-wrap{flex:1;min-height:0;position:relative}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.controls{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:12px;padding:6px;background:rgba(28,27,27,0.92)}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:5px 16px;cursor:pointer;border:none;color:#e5e2e1;background:rgba(53,53,52,0.8);border:1px solid rgba(138,136,134,0.15);transition:box-shadow 0.2s}
.ctrl-btn:hover{box-shadow:0 0 15px rgba(255,127,80,0.2)}
.ctrl-btn.active{color:#131313;background:linear-gradient(135deg,#ffb59c,#ff7f50)}
.frame-indicator{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8a8886;min-width:60px;text-align:center}
.hud{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;height:44px;background:rgba(0,0,0,0.55);padding:0 16px}
.hud-item{text-align:center}
.hud-item .label{font-size:9px;color:#8a8886;letter-spacing:1px;font-family:'Space Grotesk',sans-serif}
.hud-item .value{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:10px;z-index:100;font-size:11px;color:rgba(255,255,255,0.85)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:12px;margin-bottom:6px;cursor:pointer;color:#ffb59c;display:flex;justify-content:space-between;align-items:center}
.guide-panel ul{padding-left:14px;line-height:1.6}
.guide-panel .collapsed{display:none}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>WHEEL GRIP DYNAMICS</h1>
    <p>FRICTION ANALYSIS ACROSS TERRAIN TYPES</p>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btnPrev">PREV</button>
    <button class="ctrl-btn" id="btnPlay">PLAY</button>
    <button class="ctrl-btn" id="btnNext">NEXT</button>
    <span class="frame-indicator" id="frameInd">1 / 5</span>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="label">SURFACE</div><div class="value" id="hudSurface" style="color:#ffb59c">BEDROCK</div></div>
    <div class="hud-item"><div class="label">GRIP</div><div class="value" id="hudGrip" style="color:#10b981">HIGH</div></div>
    <div class="hud-item"><div class="label">SINKAGE</div><div class="value" id="hudSink" style="color:#10b981">0 mm</div></div>
    <div class="hud-item"><div class="label">SLIP RATE</div><div class="value" id="hudSlip" style="color:#10b981">2%</div></div>
  </div>
</div>

<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle">GUIDE <span id="guideArrow">-</span></h3>
  <div id="guideContent">
    <ul>
      <li>展示车轮在不同地面上的摩擦力变化</li>
      <li>观察：基岩上车轮几乎不下沉</li>
      <li>观察：波纹沙面车轮大幅下沉并空转</li>
      <li>最后一帧对比三种地面的关键数据</li>
      <li>PREV/NEXT 切换帧，PLAY 自动播放</li>
    </ul>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var wrap = document.getElementById('canvasWrap');
  var W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);

  var currentFrame = 0;
  var totalFrames = 5;
  var playing = false;
  var playTimer = null;
  var animProgress = 0;
  var rafId = null;

  var FRAMES = [
    {surface:'BEDROCK', grip:'HIGH', gripColor:'#10b981', sinkage:0, slip:2, desc:'Wheel on bedrock -- high friction, stable grip'},
    {surface:'BEDROCK', grip:'HIGH', gripColor:'#10b981', sinkage:0, slip:2, desc:'Rolling on bedrock -- shallow uniform tracks'},
    {surface:'RIPPLE SAND', grip:'LOW', gripColor:'#ff5f1f', sinkage:35, slip:45, desc:'Transition to ripple sand -- sinkage begins'},
    {surface:'RIPPLE SAND', grip:'CRITICAL', gripColor:'#ff5f1f', sinkage:60, slip:80, desc:'Wheel spinning in sand -- slip rate 80%'},
    {surface:'COMPARISON', grip:'---', gripColor:'#ffb59c', sinkage:0, slip:0, desc:'Three terrain types compared'}
  ];

  function resize() {
    var rect = wrap.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawFrame(currentFrame, 1);
  }

  function updateHUD(f) {
    var d = FRAMES[f];
    document.getElementById('hudSurface').textContent = d.surface;
    document.getElementById('hudSurface').style.color = '#ffb59c';
    document.getElementById('hudGrip').textContent = d.grip;
    document.getElementById('hudGrip').style.color = d.gripColor;
    var sinkColor = d.sinkage > 30 ? '#ff5f1f' : '#10b981';
    document.getElementById('hudSink').textContent = d.sinkage + ' mm';
    document.getElementById('hudSink').style.color = sinkColor;
    var slipColor = d.slip > 30 ? '#ff5f1f' : (d.slip > 10 ? '#ff7f50' : '#10b981');
    document.getElementById('hudSlip').textContent = d.slip + '%';
    document.getElementById('hudSlip').style.color = slipColor;
    document.getElementById('frameInd').textContent = (f + 1) + ' / ' + totalFrames;
  }

  function drawBg() {
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0f0a1e');
    grad.addColorStop(1, '#1a1035');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    var step = 40;
    for (var x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (var y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawWheel(cx, cy, r, rotation, sinkDepth) {
    ctx.save();
    ctx.translate(cx, cy);

    // wheel body
    var wGrad = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r);
    wGrad.addColorStop(0, '#555555');
    wGrad.addColorStop(0.7, '#333333');
    wGrad.addColorStop(1, '#1a1a1a');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = wGrad;
    ctx.fill();

    // wheel rim glow
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,181,156,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // tread marks
    ctx.save();
    ctx.rotate(rotation);
    ctx.strokeStyle = 'rgba(255,181,156,0.15)';
    ctx.lineWidth = 3;
    for (var i = 0; i < 8; i++) {
      var angle = (Math.PI * 2 / 8) * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * r * 0.6, Math.sin(angle) * r * 0.6);
      ctx.lineTo(Math.cos(angle) * r * 0.95, Math.sin(angle) * r * 0.95);
      ctx.stroke();
    }
    ctx.restore();

    // hub
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#ffb59c';
    ctx.shadowColor = '#ff7f50';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function drawBedrockGround(groundY) {
    var gGrad = ctx.createLinearGradient(0, groundY, 0, H);
    gGrad.addColorStop(0, '#4a3f35');
    gGrad.addColorStop(0.3, '#3a2f25');
    gGrad.addColorStop(1, '#1a1510');
    ctx.fillStyle = gGrad;
    ctx.fillRect(0, groundY, W, H - groundY);

    // texture lines
    ctx.strokeStyle = 'rgba(255,181,156,0.08)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 12; i++) {
      var lx = Math.random() * W;
      ctx.beginPath();
      ctx.moveTo(lx, groundY + 5);
      ctx.lineTo(lx + 30 + Math.random() * 40, groundY + 5 + Math.random() * 15);
      ctx.stroke();
    }

    // label
    ctx.font = '700 11px "Space Grotesk"';
    ctx.fillStyle = 'rgba(255,181,156,0.5)';
    ctx.fillText('BEDROCK', 20, groundY + 25);
  }

  function drawSandGround(groundY) {
    var gGrad = ctx.createLinearGradient(0, groundY, 0, H);
    gGrad.addColorStop(0, '#8B7355');
    gGrad.addColorStop(0.3, '#6B5340');
    gGrad.addColorStop(1, '#3B2820');
    ctx.fillStyle = gGrad;
    ctx.fillRect(0, groundY, W, H - groundY);

    // ripple waves
    ctx.strokeStyle = 'rgba(255,200,150,0.2)';
    ctx.lineWidth = 1.5;
    for (var row = 0; row < 6; row++) {
      ctx.beginPath();
      var ry = groundY + 8 + row * 12;
      for (var x = 0; x < W; x += 2) {
        var yOff = Math.sin(x * 0.08 + row * 1.5) * 3;
        if (x === 0) ctx.moveTo(x, ry + yOff);
        else ctx.lineTo(x, ry + yOff);
      }
      ctx.stroke();
    }

    ctx.font = '700 11px "Space Grotesk"';
    ctx.fillStyle = 'rgba(255,95,31,0.6)';
    ctx.fillText('RIPPLE SAND', 20, groundY + 25);
  }

  function drawFrictionArrow(x, y, length, color, label) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 3;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;

    // arrow line (pointing right = forward motion)
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + length, y);
    ctx.stroke();

    // arrowhead
    ctx.beginPath();
    ctx.moveTo(x + length, y);
    ctx.lineTo(x + length - 8, y - 5);
    ctx.lineTo(x + length - 8, y + 5);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.font = '700 10px "Space Grotesk"';
    ctx.fillText(label, x, y - 12);
    ctx.restore();
  }

  function drawSinkLine(cx, groundY, depth, wheelR) {
    if (depth <= 0) return;
    var depthPx = depth * 0.8;
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = '#ff5f1f';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - wheelR - 10, groundY);
    ctx.lineTo(cx + wheelR + 10, groundY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - wheelR - 10, groundY + depthPx);
    ctx.lineTo(cx + wheelR + 10, groundY + depthPx);
    ctx.stroke();
    ctx.setLineDash([]);

    // depth label
    ctx.font = '700 10px "Space Grotesk"';
    ctx.fillStyle = '#ff5f1f';
    ctx.shadowColor = '#ff5f1f';
    ctx.shadowBlur = 6;
    ctx.fillText(depth + 'mm', cx + wheelR + 15, groundY + depthPx / 2 + 4);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawSandParticles(cx, cy, count, spread) {
    ctx.save();
    for (var i = 0; i < count; i++) {
      var angle = -Math.PI * 0.2 + Math.random() * Math.PI * 0.6;
      var dist = 20 + Math.random() * spread;
      var px = cx + Math.cos(angle) * dist;
      var py = cy - Math.sin(angle) * dist;
      var sz = 1 + Math.random() * 2;
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(139,115,85,' + (0.3 + Math.random() * 0.5) + ')';
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFrame(f, progress) {
    drawBg();
    var wheelR = Math.min(W, H) * 0.12;
    var groundY = H * 0.62;
    var centerX = W * 0.5;
    var centerY = groundY - wheelR;

    if (f === 0) {
      // Frame 0: Wheel on bedrock, high grip
      drawBedrockGround(groundY);
      drawWheel(centerX, centerY, wheelR, 0, 0);
      drawFrictionArrow(centerX + wheelR + 15, centerY + wheelR * 0.3, 80, '#10b981', 'FRICTION: HIGH');

      ctx.font = '700 14px "Space Grotesk"';
      ctx.fillStyle = '#10b981';
      ctx.shadowColor = '#10b981';
      ctx.shadowBlur = 12;
      ctx.fillText('HIGH GRIP', centerX - 35, H * 0.2);
      ctx.shadowBlur = 0;
      ctx.font = '400 12px "Noto Sans SC"';
      ctx.fillStyle = '#c6c6c6';
      ctx.fillText('粗糙基岩表面 -- 车轮咬合力强', centerX - 90, H * 0.2 + 22);

    } else if (f === 1) {
      // Frame 1: Rolling on bedrock, shallow tracks
      drawBedrockGround(groundY);
      var rot = progress * Math.PI * 0.5;
      drawWheel(centerX, centerY, wheelR, rot, 0);
      drawFrictionArrow(centerX + wheelR + 15, centerY + wheelR * 0.3, 80, '#10b981', 'FRICTION: HIGH');

      // track marks behind
      ctx.save();
      ctx.strokeStyle = 'rgba(255,181,156,0.15)';
      ctx.lineWidth = wheelR * 0.15;
      ctx.beginPath();
      ctx.moveTo(centerX - W * 0.3, groundY);
      ctx.lineTo(centerX, groundY);
      ctx.stroke();
      ctx.restore();

      ctx.font = '700 14px "Space Grotesk"';
      ctx.fillStyle = '#10b981';
      ctx.shadowColor = '#10b981';
      ctx.shadowBlur = 12;
      ctx.fillText('NORMAL ROLLING', centerX - 55, H * 0.2);
      ctx.shadowBlur = 0;
      ctx.font = '400 12px "Noto Sans SC"';
      ctx.fillStyle = '#c6c6c6';
      ctx.fillText('车辙浅而均匀 -- 地面稳定', centerX - 80, H * 0.2 + 22);

    } else if (f === 2) {
      // Frame 2: Transition to sand, sinkage begins
      // left half bedrock, right half sand
      var midX = W * 0.4;
      drawBg();

      // bedrock left
      var gL = ctx.createLinearGradient(0, groundY, 0, H);
      gL.addColorStop(0, '#4a3f35'); gL.addColorStop(1, '#1a1510');
      ctx.fillStyle = gL;
      ctx.fillRect(0, groundY, midX, H - groundY);

      // sand right
      var gR = ctx.createLinearGradient(0, groundY, 0, H);
      gR.addColorStop(0, '#8B7355'); gR.addColorStop(1, '#3B2820');
      ctx.fillStyle = gR;
      ctx.fillRect(midX, groundY, W - midX, H - groundY);

      // color boundary line
      ctx.save();
      ctx.strokeStyle = '#ff7f50';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(midX, groundY);
      ctx.lineTo(midX, H);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '700 9px "Space Grotesk"';
      ctx.fillStyle = '#ff7f50';
      ctx.fillText('BOUNDARY', midX + 5, groundY + 15);
      ctx.restore();

      // ripples on right
      ctx.strokeStyle = 'rgba(255,200,150,0.15)';
      ctx.lineWidth = 1;
      for (var rr = 0; rr < 4; rr++) {
        ctx.beginPath();
        var rry = groundY + 8 + rr * 10;
        for (var rx = midX; rx < W; rx += 2) {
          var ryOff = Math.sin(rx * 0.08 + rr) * 2;
          if (rx === midX) ctx.moveTo(rx, rry + ryOff);
          else ctx.lineTo(rx, rry + ryOff);
        }
        ctx.stroke();
      }

      var sinkPx = 35 * 0.6;
      drawWheel(centerX + W * 0.1, centerY + sinkPx, wheelR, Math.PI * 0.3, 35);
      drawFrictionArrow(centerX + W * 0.1 + wheelR + 15, centerY + sinkPx + wheelR * 0.3, 35, '#ff7f50', 'FRICTION: DROPPING');
      drawSinkLine(centerX + W * 0.1, groundY, 35, wheelR);

      ctx.font = '700 14px "Space Grotesk"';
      ctx.fillStyle = '#ff7f50';
      ctx.shadowColor = '#ff7f50';
      ctx.shadowBlur = 12;
      ctx.fillText('SINKAGE BEGINS', centerX - 50, H * 0.18);
      ctx.shadowBlur = 0;
      ctx.font = '400 12px "Noto Sans SC"';
      ctx.fillStyle = '#c6c6c6';
      ctx.fillText('车轮进入波纹沙面 -- 开始下沉', centerX - 90, H * 0.18 + 22);

    } else if (f === 3) {
      // Frame 3: Wheel spinning in sand
      drawSandGround(groundY);
      var sinkPx3 = 60 * 0.7;
      var spinRot = performance.now() * 0.005;
      drawWheel(centerX, centerY + sinkPx3, wheelR, spinRot, 60);
      drawFrictionArrow(centerX + wheelR + 15, centerY + sinkPx3 + wheelR * 0.3, 15, '#ff5f1f', 'FRICTION: CRITICAL');
      drawSinkLine(centerX, groundY, 60, wheelR);

      // flying sand particles
      drawSandParticles(centerX, groundY, 20, 60);

      // slip rate display
      ctx.font = '700 20px "Space Grotesk"';
      ctx.fillStyle = '#ff5f1f';
      ctx.shadowColor = '#ff5f1f';
      ctx.shadowBlur = 15;
      ctx.fillText('WHEEL SLIP 80%', centerX - 75, H * 0.18);
      ctx.shadowBlur = 0;
      ctx.font = '400 12px "Noto Sans SC"';
      ctx.fillStyle = '#c6c6c6';
      ctx.fillText('车轮空转，沙粒飞溅 -- 驱动效率极低', centerX - 105, H * 0.18 + 24);

    } else if (f === 4) {
      // Frame 4: Comparison view
      var colW = W / 3;
      var cols = [
        {name:'BEDROCK', grip:'HIGH', sink:'0 mm', slip:'2%', color:'#10b981', gColor1:'#4a3f35', gColor2:'#1a1510'},
        {name:'SMOOTH ROCK', grip:'MEDIUM', sink:'0 mm', slip:'15%', color:'#ff7f50', gColor1:'#5a5550', gColor2:'#2a2520'},
        {name:'RIPPLE SAND', grip:'CRITICAL', sink:'60 mm', slip:'80%', color:'#ff5f1f', gColor1:'#8B7355', gColor2:'#3B2820'}
      ];

      ctx.font = '700 14px "Space Grotesk"';
      ctx.fillStyle = '#ffb59c';
      ctx.shadowColor = '#ffb59c';
      ctx.shadowBlur = 10;
      ctx.textAlign = 'center';
      ctx.fillText('TERRAIN COMPARISON', W / 2, H * 0.1);
      ctx.shadowBlur = 0;
      ctx.textAlign = 'left';

      cols.forEach(function(col, i) {
        var cx2 = colW * i + colW / 2;
        var gy = H * 0.55;

        // ground
        var g = ctx.createLinearGradient(0, gy, 0, H);
        g.addColorStop(0, col.gColor1); g.addColorStop(1, col.gColor2);
        ctx.fillStyle = g;
        ctx.fillRect(colW * i + 2, gy, colW - 4, H - gy);

        // separator
        if (i > 0) {
          ctx.strokeStyle = 'rgba(138,136,134,0.15)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(colW * i, H * 0.15);
          ctx.lineTo(colW * i, H);
          ctx.stroke();
        }

        // mini wheel
        var mR = wheelR * 0.55;
        var sinkOff = (i === 2) ? 20 : 0;
        drawWheel(cx2, gy - mR + sinkOff, mR, 0, 0);

        // labels
        ctx.textAlign = 'center';
        ctx.font = '700 11px "Space Grotesk"';
        ctx.fillStyle = col.color;
        ctx.fillText(col.name, cx2, H * 0.22);

        ctx.font = '400 10px "Space Grotesk"';
        ctx.fillStyle = '#c6c6c6';
        var dataY = H * 0.32;
        ctx.fillText('GRIP: ' + col.grip, cx2, dataY);
        ctx.fillText('SINKAGE: ' + col.sink, cx2, dataY + 16);
        ctx.fillText('SLIP: ' + col.slip, cx2, dataY + 32);
        ctx.textAlign = 'left';
      });

      ctx.textAlign = 'center';
      ctx.font = '400 11px "Noto Sans SC"';
      ctx.fillStyle = '#8a8886';
      ctx.fillText('地面材质决定摩擦力大小，进而决定车辆能否正常行驶', W / 2, H * 0.92);
      ctx.textAlign = 'left';
    }

    // frame description at bottom
    ctx.font = '400 10px "Noto Sans SC"';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(FRAMES[f].desc, 10, H - 50);
  }

  function goToFrame(f) {
    if (f < 0) f = 0;
    if (f >= totalFrames) f = totalFrames - 1;
    currentFrame = f;
    animProgress = 1;
    drawFrame(f, 1);
    updateHUD(f);
  }

  function startPlay() {
    if (playing) return;
    playing = true;
    document.getElementById('btnPlay').textContent = 'PAUSE';
    document.getElementById('btnPlay').classList.add('active');
    if (currentFrame >= totalFrames - 1) currentFrame = 0;
    updateHUD(currentFrame);
    drawFrame(currentFrame, 1);
    scheduleNext();
  }

  function scheduleNext() {
    if (!playing) return;
    playTimer = setTimeout(function() {
      if (!playing) return;
      currentFrame++;
      if (currentFrame >= totalFrames) {
        stopPlay();
        currentFrame = totalFrames - 1;
        return;
      }
      drawFrame(currentFrame, 1);
      updateHUD(currentFrame);
      scheduleNext();
    }, 2000);
  }

  function stopPlay() {
    playing = false;
    document.getElementById('btnPlay').textContent = 'PLAY';
    document.getElementById('btnPlay').classList.remove('active');
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  }

  document.getElementById('btnPrev').addEventListener('click', function() {
    stopPlay();
    goToFrame(currentFrame - 1);
  });
  document.getElementById('btnNext').addEventListener('click', function() {
    stopPlay();
    goToFrame(currentFrame + 1);
  });
  document.getElementById('btnPlay').addEventListener('click', function() {
    if (playing) stopPlay();
    else startPlay();
  });

  var guideCollapsed = false;
  document.getElementById('guideToggle').addEventListener('click', function() {
    guideCollapsed = !guideCollapsed;
    document.getElementById('guideContent').className = guideCollapsed ? 'collapsed' : '';
    document.getElementById('guideArrow').textContent = guideCollapsed ? '+' : '-';
  });

  window.addEventListener('resize', resize);
  resize();
  setTimeout(resize, 200);
  setTimeout(resize, 600);
  document.fonts.ready.then(function() { resize(); });
  updateHUD(0);
})();
</script>
</body>
</html>
