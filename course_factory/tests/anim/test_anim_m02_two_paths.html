<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>两条路，同一座山 · M02</title>
<style>
:root{
  --paper:#FAF9F5; --paper-2:#F1EDDF; --card:#FFFFFF;
  --ink:#191814; --ink-2:#2B2924; --sub:#6B6557; --sub-2:#9D978A;
  --border:#EBE5D6; --border-2:#D9D1BD; --hairline:#F2EDE0;
  --primary:#D97757; --primary-ink:#9A4A2E; --primary-soft:#F8EDE5; --primary-line:#ECCFB8;
  --robotics:#7C4569; --robotics-soft:#E9DBE3;
  --shadow-sm:0 1px 2px 0 rgba(25,24,20,.04);
  --shadow:0 1px 3px 0 rgba(25,24,20,.06),0 1px 2px -1px rgba(25,24,20,.04);
  --shadow-md:0 4px 8px -2px rgba(25,24,20,.06),0 2px 4px -2px rgba(25,24,20,.04);
  --mono:"JetBrains Mono","SF Mono",ui-monospace,"Cascadia Code",Menlo,monospace;
  --sans:"PingFang SC","Inter","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  display:flex;
  height:100vh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ---------- sidebar ---------- */
.sidebar{
  width:200px;
  flex-shrink:0;
  background:var(--paper-2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:20px 18px;
}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.brand-mark{width:34px;height:34px;flex-shrink:0;}
.brand-name{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--ink);line-height:1.25;}
.brand-tag{font-family:var(--mono);font-size:9px;color:var(--sub-2);letter-spacing:.08em;margin-top:2px;}
.side-divider{height:1px;background:var(--border);margin:16px 0;}
.side-title{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--sub-2);text-transform:uppercase;margin-bottom:12px;}
.guide{list-style:none;display:flex;flex-direction:column;gap:13px;}
.guide li{display:flex;gap:9px;font-size:11.5px;line-height:1.5;color:var(--sub);}
.guide .gn{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--primary-ink);background:var(--primary-soft);border:1px solid var(--primary-line);border-radius:5px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.side-spacer{flex:1;}
.lang-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:9px 0;
  background:var(--card);border:1px solid var(--border-2);border-radius:8px;
  font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink-2);
  cursor:pointer;transition:all .2s ease;box-shadow:var(--shadow-sm);
}
.lang-btn:hover{border-color:var(--primary-line);color:var(--primary-ink);background:var(--primary-soft);}
.lang-btn .seg{opacity:.4;}
.lang-btn .seg.on{opacity:1;color:var(--primary-ink);}

/* ---------- main ---------- */
.main{flex:1;display:flex;flex-direction:column;padding:22px 30px 18px;overflow:hidden;min-width:0;}
.head{margin-bottom:6px;}
.kicker{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--primary-ink);text-transform:uppercase;font-weight:600;}
.h-title{font-size:22px;font-weight:800;letter-spacing:-.01em;margin-top:3px;color:var(--ink);}
.h-sub{font-size:12.5px;color:var(--sub);margin-top:3px;}

/* mountain ribbon */
.mountain{position:relative;height:96px;margin:8px 0 4px;flex-shrink:0;}
.mountain svg{width:100%;height:100%;display:block;}
.peak-pulse{transform-origin:center;animation:peakBreath 2.6s ease-in-out infinite;}
@keyframes peakBreath{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.14);opacity:.82;}}

/* paths grid */
.stage{flex:1;display:grid;grid-template-columns:1fr 168px 1fr;gap:16px;min-height:0;}
.lane{display:flex;flex-direction:column;min-height:0;}
.lane-head{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.lane-badge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lane-l .lane-badge{background:var(--robotics-soft);border:1px solid #d9c2d2;}
.lane-r .lane-badge{background:var(--primary-soft);border:1px solid var(--primary-line);}
.lane-name{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.2;}
.lane-who{font-size:10.5px;color:var(--sub);margin-top:1px;}
.lane-l .lane-who{color:var(--robotics);}
.lane-r .lane-who{color:var(--primary-ink);}

.steps{display:flex;flex-direction:column;gap:9px;overflow-y:auto;padding-right:2px;}
.step{
  background:var(--card);border:1px solid var(--border);border-radius:11px;
  box-shadow:var(--shadow-sm);cursor:pointer;
  transition:border-color .25s ease,box-shadow .25s ease,transform .25s ease;
  overflow:hidden;
}
.step:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.lane-l .step:hover,.lane-l .step.open{border-color:#c79cb9;}
.lane-r .step:hover,.lane-r .step.open{border-color:var(--primary-line);}
.step-top{display:flex;align-items:center;gap:11px;padding:11px 12px;}
.step-no{
  font-family:var(--mono);font-size:11px;font-weight:700;
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.lane-l .step-no{color:var(--robotics);background:var(--robotics-soft);}
.lane-r .step-no{color:var(--primary-ink);background:var(--primary-soft);}
.step-ico{width:26px;height:26px;flex-shrink:0;}
.step-txt{flex:1;font-size:12.5px;font-weight:600;line-height:1.32;color:var(--ink-2);}
.step-caret{width:9px;height:9px;flex-shrink:0;border-right:2px solid var(--sub-2);border-bottom:2px solid var(--sub-2);transform:rotate(45deg);transition:transform .25s ease;margin-right:2px;}
.step.open .step-caret{transform:rotate(-135deg);}
.step-detail{max-height:0;opacity:0;transition:max-height .28s ease,opacity .2s ease,padding .28s ease;padding:0 12px;}
.step.open .step-detail{max-height:140px;opacity:1;padding:0 12px 12px 45px;}
.step-detail p{font-size:11.5px;line-height:1.6;color:var(--sub);padding-top:2px;position:relative;}
.step-detail p::after{content:"";position:absolute;left:-12px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--primary-line);}

.lane-tag{
  margin-top:10px;font-size:10.5px;font-family:var(--mono);letter-spacing:.02em;
  padding:7px 10px;border-radius:8px;line-height:1.4;display:flex;align-items:center;gap:7px;
}
.lane-l .lane-tag{background:var(--robotics-soft);color:var(--robotics);}
.lane-r .lane-tag{background:var(--primary-soft);color:var(--primary-ink);}
.lane-tag svg{flex-shrink:0;}

/* center meet */
.meet{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.meet-bridge{
  background:linear-gradient(180deg,#fff,var(--primary-soft));
  border:1.5px solid var(--primary-line);border-radius:16px;
  box-shadow:var(--shadow-md);
  padding:18px 14px;text-align:center;width:100%;
  position:relative;
}
.meet-arrow{position:absolute;top:50%;width:30px;height:2px;background:var(--primary-line);}
.meet-arrow.left{left:-30px;}
.meet-arrow.right{right:-30px;}
.meet-arrow::after{content:"";position:absolute;top:-4px;width:8px;height:8px;border-top:2px solid var(--primary);border-right:2px solid var(--primary);}
.meet-arrow.left::after{right:0;transform:rotate(45deg);}
.meet-arrow.right::after{right:0;transform:rotate(45deg);}
.meet-icon{margin:0 auto 8px;width:42px;height:42px;}
.meet-kicker{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--primary-ink);text-transform:uppercase;font-weight:700;}
.meet-big{font-size:14px;font-weight:800;color:var(--ink);line-height:1.32;margin-top:6px;}
.meet-small{font-size:10.5px;color:var(--sub);line-height:1.5;margin-top:8px;font-style:italic;}

.footer-tag{
  flex-shrink:0;margin-top:12px;
  display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:11px 16px;box-shadow:var(--shadow-sm);
}
.ft-item{font-size:12px;font-weight:700;color:var(--ink-2);display:flex;align-items:center;gap:7px;}
.ft-item .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.ft-eq{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--primary);}
.ft-result{color:var(--primary-ink);}
.ft-result .dot{background:var(--primary);}

/* bilingual: text lives in data-cn / data-en attributes, rendered via ::before */
[data-cn]::before{content:attr(data-cn);}
body.en [data-cn]::before{content:attr(data-en);}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 34 34" fill="none">
      <rect x="1" y="1" width="32" height="32" rx="8" fill="var(--primary-soft)" stroke="var(--primary-line)"/>
      <path d="M6 25 L13 12 L17 19 L21 9 L28 25 Z" fill="none" stroke="var(--primary)" stroke-width="1.6" stroke-linejoin="round"/>
      <circle cx="21" cy="9" r="2.4" fill="var(--primary)"/>
    </svg>
    <div>
      <div class="brand-name" data-cn="蚁群行为学家" data-en="Ant Ethologist"></div>
      <div class="brand-tag">M02 · CONCEPT</div>
    </div>
  </div>
  <div class="side-divider"></div>
  <div class="side-title" data-cn="怎么看这张图" data-en="How to read"></div>
  <ul class="guide">
    <li><span class="gn">1</span><span data-cn="看顶上的山：两条路从山脚出发" data-en="Look at the mountain: two paths start from the base"></span></li>
    <li><span class="gn">2</span><span data-cn="左是真科学家，右是你的方法" data-en="Left is the real scientists, right is your method"></span></li>
    <li><span class="gn">3</span><span data-cn="点开每个步骤卡看细节" data-en="Click each step card to see details"></span></li>
  </ul>
  <div class="side-spacer"></div>
  <button class="lang-btn" id="langBtn" type="button">
    <span class="seg on" data-seg="cn">中文</span>
    <span>/</span>
    <span class="seg" data-seg="en">EN</span>
  </button>
</aside>

<main class="main">
  <div class="head">
    <div class="kicker" data-cn="真科学 · 身份认同" data-en="Real Science · Identity"></div>
    <h1 class="h-title" data-cn="两条路，同一座山" data-en="Two Paths, One Mountain"></h1>
    <p class="h-sub" data-cn="真科学家是怎么观察整个蚁群的？我能模仿吗？" data-en="How do real scientists watch a whole ant colony? Can I copy them?"></p>
  </div>

  <!-- mountain ribbon -->
  <div class="mountain">
    <svg viewBox="0 0 920 96" preserveAspectRatio="none">
      <path d="M460 14 L300 90 L620 90 Z" fill="none" stroke="var(--border-2)" stroke-width="1.4"/>
      <path d="M460 14 L375 90" fill="none" stroke="var(--robotics)" stroke-width="2" stroke-dasharray="5 5" stroke-linecap="round"/>
      <path d="M460 14 L545 90" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="5 5" stroke-linecap="round"/>
      <circle cx="375" cy="90" r="4" fill="var(--robotics)"/>
      <circle cx="545" cy="90" r="4" fill="var(--primary)"/>
      <g class="peak-pulse">
        <circle cx="460" cy="14" r="9" fill="var(--primary-soft)" stroke="var(--primary)" stroke-width="2"/>
      </g>
      <circle cx="460" cy="14" r="3" fill="var(--primary)"/>
    </svg>
  </div>

  <!-- stage -->
  <div class="stage">

    <!-- LEFT lane -->
    <section class="lane lane-l">
      <div class="lane-head">
        <div class="lane-badge">
          <svg width="18" height="18" viewBox="0 0 18 18"><rect x="1" y="1" width="16" height="16" rx="2" fill="none" stroke="var(--robotics)" stroke-width="1.4"/><rect x="3.5" y="3.5" width="3.5" height="3.5" fill="var(--robotics)"/><rect x="11" y="3.5" width="3.5" height="3.5" fill="var(--robotics)"/><rect x="3.5" y="11" width="3.5" height="3.5" fill="var(--robotics)"/><rect x="9" y="9" width="2" height="2" fill="var(--robotics)"/><rect x="13" y="13" width="1.5" height="1.5" fill="var(--robotics)"/></svg>
        </div>
        <div>
          <div class="lane-name" data-cn="真科学家的方法" data-en="The Scientists' Way"></div>
          <div class="lane-who" data-cn="Kronauer 实验室 · 相机 + 二维码" data-en="Kronauer Lab · camera + barcodes"></div>
        </div>
      </div>
      <div class="steps">
        <div class="step">
          <div class="step-top">
            <span class="step-no">1</span>
            <svg class="step-ico" viewBox="0 0 26 26"><rect x="3" y="3" width="20" height="20" rx="2" fill="var(--robotics-soft)" stroke="var(--robotics)" stroke-width="1.3"/><rect x="6" y="6" width="4" height="4" fill="var(--robotics)"/><rect x="16" y="6" width="4" height="4" fill="var(--robotics)"/><rect x="6" y="16" width="4" height="4" fill="var(--robotics)"/><rect x="13" y="13" width="2.5" height="2.5" fill="var(--robotics)"/><rect x="18" y="17" width="2" height="2" fill="var(--robotics)"/></svg>
            <span class="step-txt" data-cn="给每只蚂蚁贴一个微型二维码" data-en="Glue a tiny barcode on each ant"></span>
            <span class="step-caret"></span>
          </div>
          <div class="step-detail">
            <p data-cn="像超市商品上的小方块码，每只蚂蚁背上一个，号码都不一样。" data-en="Like the little square code on supermarket items — one per ant, every number unique."></p>
            <p data-cn="贴在背上不影响走路，几百只也能一只一只分清楚。" data-en="It sits on the back without slowing them — even hundreds stay tellable apart."></p>
          </div>
        </div>
        <div class="step">
          <div class="step-top">
            <span class="step-no">2</span>
            <svg class="step-ico" viewBox="0 0 26 26"><rect x="3" y="8" width="16" height="11" rx="2" fill="var(--robotics-soft)" stroke="var(--robotics)" stroke-width="1.3"/><circle cx="11" cy="13.5" r="3.2" fill="none" stroke="var(--robotics)" stroke-width="1.3"/><path d="M19 11 L23 8.5 V18.5 L19 16 Z" fill="var(--robotics)"/></svg>
            <span class="step-txt" data-cn="蚁巢正上方架一台相机连续拍" data-en="Mount a camera right above the nest"></span>
            <span class="step-caret"></span>
          </div>
          <div class="step-detail">
            <p data-cn="相机固定在巢的正上方，像监控一样不停拍画面。" data-en="The camera is fixed straight over the nest, filming non-stop like CCTV."></p>
            <p data-cn="一整窝蚂蚁全在镜头里，谁去哪都跑不掉。" data-en="The whole colony stays in frame — nobody slips away unseen."></p>
          </div>
        </div>
        <div class="step">
          <div class="step-top">
            <span class="step-no">3</span>
            <svg class="step-ico" viewBox="0 0 26 26"><rect x="3" y="4" width="20" height="18" rx="2" fill="var(--robotics-soft)" stroke="var(--robotics)" stroke-width="1.3"/><path d="M7 9 L11 13 L7 17" fill="none" stroke="var(--robotics)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="13" y1="17" x2="19" y2="17" stroke="var(--robotics)" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span class="step-txt" data-cn="计算机视觉认出每一帧里的码" data-en="Computer vision reads every code per frame"></span>
            <span class="step-caret"></span>
          </div>
          <div class="step-detail">
            <p data-cn="一个程序自动扫每张照片，找出所有二维码在哪。" data-en="A program scans every photo automatically and finds where each barcode is."></p>
            <p data-cn="于是计算机知道：几号蚂蚁，此刻在画面的哪个位置。" data-en="So the computer knows which ant is at which spot at each moment."></p>
          </div>
        </div>
      </div>
      <div class="lane-tag">
        <svg width="13" height="13" viewBox="0 0 13 13"><path d="M6.5 1 L8 4.6 L12 5 L9 7.7 L9.8 11.6 L6.5 9.6 L3.2 11.6 L4 7.7 L1 5 L5 4.6 Z" fill="none" stroke="var(--robotics)" stroke-width="1"/></svg>
        <span data-cn="发表在《自然》《科学》上的真研究" data-en="Real research published in Nature & Science"></span>
      </div>
    </section>

    <!-- CENTER meet -->
    <section class="meet">
      <div class="meet-bridge">
        <div class="meet-arrow left"></div>
        <div class="meet-arrow right"></div>
        <svg class="meet-icon" viewBox="0 0 42 42"><circle cx="21" cy="21" r="19" fill="none" stroke="var(--primary-line)" stroke-width="1.4"/><path d="M9 27 L17 14 L21 20 L25 12 L33 27 Z" fill="none" stroke="var(--primary)" stroke-width="1.7" stroke-linejoin="round"/><circle cx="25" cy="12" r="2.6" fill="var(--primary)"/></svg>
        <div class="meet-kicker" data-cn="会合点" data-en="They Meet"></div>
        <div class="meet-big" data-cn="目的完全一样：让每一只蚂蚁都可识别、可追踪" data-en="Same goal: make every single ant identifiable and trackable"></div>
        <div class="meet-small" data-cn="就像爬同一座山，东坡西坡都登顶。" data-en="Like climbing one mountain — east slope or west, both reach the summit."></div>
      </div>
    </section>

    <!-- RIGHT lane -->
    <section class="lane lane-r">
      <div class="lane-head">
        <div class="lane-badge">
          <svg width="18" height="18" viewBox="0 0 18 18"><rect x="2" y="5" width="11" height="8" rx="1.5" fill="none" stroke="var(--primary)" stroke-width="1.4"/><path d="M13 6.5 C15 7.5 15 10.5 13 11.5" fill="none" stroke="var(--primary)" stroke-width="1.3" stroke-linecap="round"/><path d="M14.5 5 C17.5 7 17.5 11 14.5 13" fill="none" stroke="var(--primary)" stroke-width="1.3" stroke-linecap="round"/><line x1="5" y1="9" x2="9" y2="9" stroke="var(--primary)" stroke-width="1.3"/></svg>
        </div>
        <div>
          <div class="lane-name" data-cn="你的方法" data-en="Your Way"></div>
          <div class="lane-who" data-cn="后院蚁群 · RFID 标签 + 读卡门" data-en="Backyard colony · RFID tags + reader gate"></div>
        </div>
      </div>
      <div class="steps">
        <div class="step">
          <div class="step-top">
            <span class="step-no">1</span>
            <svg class="step-ico" viewBox="0 0 26 26"><rect x="4" y="8" width="14" height="10" rx="1.6" fill="var(--primary-soft)" stroke="var(--primary)" stroke-width="1.3"/><path d="M18 10 C20.5 11 20.5 15 18 16" fill="none" stroke="var(--primary)" stroke-width="1.3" stroke-linecap="round"/><path d="M20.5 8 C24 10.5 24 15.5 20.5 18" fill="none" stroke="var(--primary)" stroke-width="1.3" stroke-linecap="round"/><line x1="8" y1="13" x2="14" y2="13" stroke="var(--primary)" stroke-width="1.3"/></svg>
            <span class="step-txt" data-cn="给每只蚂蚁贴一个 RFID 小标签" data-en="Glue a tiny RFID tag on each ant"></span>
            <span class="step-caret"></span>
          </div>
          <div class="step-detail">
            <p data-cn="RFID 标签不用电池，能被读卡器隔空读到自己的号码。" data-en="An RFID tag needs no battery — a reader can sense its number from a small distance."></p>
            <p data-cn="跟二维码一样：每只蚂蚁一个独一无二的号。" data-en="Just like the barcode: each ant carries one unique number."></p>
          </div>
        </div>
        <div class="step">
          <div class="step-top">
            <span class="step-no">2</span>
            <svg class="step-ico" viewBox="0 0 26 26"><rect x="5" y="3" width="3" height="20" fill="var(--primary)"/><rect x="18" y="3" width="3" height="20" fill="var(--primary)"/><rect x="5" y="3" width="16" height="3" fill="var(--primary)"/><line x1="11" y1="11" x2="15" y2="11" stroke="var(--primary)" stroke-width="1.3"/><line x1="11" y1="15" x2="15" y2="15" stroke="var(--primary)" stroke-width="1.3"/></svg>
            <span class="step-txt" data-cn="巢口装一道“读卡门”" data-en="Build a reader gate at the nest entrance"></span>
            <span class="step-caret"></span>
          </div>
          <div class="step-detail">
            <p data-cn="巢口窄窄一条通道，里面藏着读卡天线，像地铁闸机。" data-en="A narrow passage at the entrance hides a reader antenna — like a subway gate."></p>
            <p data-cn="蚂蚁要进出，就必须从这道门穿过。" data-en="To go in or out, every ant must pass through this gate."></p>
          </div>
        </div>
        <div class="step">
          <div class="step-top">
            <span class="step-no">3</span>

<script>
(function(){
  // language toggle
  var pageLang="cn";
  var btn=document.getElementById("langBtn");
  var segs=btn.querySelectorAll(".seg");
  btn.addEventListener("click",function(){
    pageLang=(pageLang==="cn")?"en":"cn";
    document.body.classList.toggle("en",pageLang==="en");
    document.documentElement.lang=(pageLang==="en")?"en":"zh-CN";
    segs.forEach(function(s){s.classList.toggle("on",s.dataset.seg===pageLang);});
  });

  // step expand toggle (static, no frame timers)
  var steps=document.querySelectorAll(".step");
  steps.forEach(function(st){
    st.addEventListener("click",function(){
      st.classList.toggle("open");
    });
  });
})();
</script>
