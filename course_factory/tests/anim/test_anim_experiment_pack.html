<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Experiment Pack Assembly</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;
  font-family:'Noto Sans SC','PingFang SC',system-ui,sans-serif;color:#e5e2e1}

.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.guide-panel{position:fixed;top:8px;right:8px;width:250px;max-height:40vh;
  overflow-y:auto;z-index:200;padding:10px 12px;
  background:rgba(28,27,27,0.92);backdrop-filter:blur(14px);
  border:1px solid rgba(255,127,80,0.22);font-size:12px;line-height:1.55;
  color:rgba(229,226,225,0.88)}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  color:#ffb59c;text-transform:uppercase;letter-spacing:0.05em}
.guide-panel h3 .arrow{transition:transform .2s;font-size:10px}
.guide-panel h3 .arrow.collapsed{transform:rotate(-90deg)}
.guide-panel ul{padding-left:14px;margin:4px 0}
.guide-panel .gl{color:#8a8886;font-size:11px;text-transform:uppercase;
  letter-spacing:0.08em;margin-top:6px;font-family:'Space Grotesk',sans-serif}

.lang-btn{position:fixed;top:8px;left:8px;z-index:100;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:4px 10px;cursor:pointer;
  border:1px solid rgba(255,127,80,0.35);
  background:rgba(20,20,25,0.85);backdrop-filter:blur(12px);
  color:#ffb59c;letter-spacing:1px}

.header{height:42px;min-height:42px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:rgba(28,27,27,0.95);border-bottom:1px solid rgba(255,127,80,0.15)}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  color:#ffb59c;text-transform:uppercase;letter-spacing:0.08em}

.canvas-wrap{flex:1;min-height:0;position:relative;overflow:hidden;background:#131313}
.canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}

.controls{height:46px;min-height:46px;display:flex;align-items:center;justify-content:center;gap:12px;
  background:rgba(28,27,27,0.95);border-top:1px solid rgba(255,127,80,0.15);
  border-bottom:1px solid rgba(255,127,80,0.15)}
.ctrl-btn{padding:6px 16px;border:1px solid rgba(255,127,80,0.35);background:transparent;
  color:#ffb59c;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;
  font-weight:700;text-transform:uppercase;letter-spacing:0.06em;transition:all .15s}
.ctrl-btn:hover{background:rgba(255,127,80,0.18);box-shadow:0 0 18px rgba(255,127,80,0.25)}
.ctrl-btn.active{background:linear-gradient(45deg,rgba(255,127,80,0.3),rgba(255,181,156,0.2))}
.frame-dots{display:flex;gap:6px;align-items:center;margin:0 12px}
.frame-dot{width:10px;height:10px;border:1px solid rgba(255,127,80,0.35);cursor:pointer;
  transition:all .2s;border-radius:50%}
.frame-dot.active{background:#ff7f50;border-color:#ff7f50;box-shadow:0 0 12px rgba(255,127,80,0.6)}
.frame-dot:hover{border-color:#ffb59c}

.hud{height:54px;min-height:54px;display:flex;align-items:center;
  background:rgba(0,0,0,0.6);border-top:1px solid rgba(255,255,255,0.06);padding:0 16px}
.hud-col{flex:1;text-align:center}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:10px;
  color:rgba(255,181,156,0.6);text-transform:uppercase;letter-spacing:0.1em}
.hud-val{font-family:'JetBrains Mono','Space Grotesk',monospace;font-size:13px;font-weight:700;
  color:rgba(229,226,225,0.9);margin-top:2px}
</style>
</head>
<body>

<button class="lang-btn" id="langBtn">CN</button>

<div class="guide-panel" id="guidePanel">
  <h3 id="guideToggle"><span id="guideTitle">OBSERVER GUIDE</span> <span class="arrow" id="guideArrow">&#9660;</span></h3>
  <div id="guideContent">
    <div class="gl" id="glShow">WHAT IT SHOWS</div>
    <p id="guideShow"></p>
    <div class="gl" style="margin-top:6px" id="glObserve">OBSERVE</div>
    <ul id="guideObserve"></ul>
    <div class="gl" style="margin-top:6px" id="glControls">CONTROLS</div>
    <p id="guideControls"></p>
    <div class="gl" style="margin-top:6px" id="glTakeaway">TAKEAWAY</div>
    <p style="color:#ffb59c" id="guideTakeaway"></p>
  </div>
</div>

<div class="wrapper">
  <div class="header">
    <h1 id="titleText"></h1>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btnPrev"></button>
    <button class="ctrl-btn" id="btnPlay"></button>
    <button class="ctrl-btn" id="btnNext"></button>
    <div class="frame-dots" id="frameDots"></div>
  </div>
  <div class="hud">
    <div class="hud-col"><div class="hud-label" id="hudL0"></div><div class="hud-val" id="hudV0"></div></div>
    <div class="hud-col"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
    <div class="hud-col"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
    <div class="hud-col"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
  </div>
</div>

  ruleBaseline:{en:'Rule Baseline',cn:'\u89c4\u5219\u6cd5\u57fa\u7ebf'},

  splitProtocol:{en:'Split Protocol',cn:'\u5207\u5206\u534f\u8bae'},

  evalScript:{en:'Eval Script',cn:'\u8bc4\u6d4b\u811a\u672c'},
  modelWeights:{en:'Model Weights',cn:'\u6a21\u578b\u6743\u91cd'},
  modelCard:{en:'Model Card',cn:'\u6a21\u578b\u5361'},
  errorLog:{en:'Error Log',cn:'\u9519\u8bef\u7c3f'},
  dirData:{en:'data/',cn:'data/'},
  dirModels:{en:'models/',cn:'models/'},

  mcPurpose:{en:'Purpose: Terrain Classification',cn:'\u7528\u9014: \u5730\u8c8c\u5206\u7c7b'},

  mcMetrics:{en:'IoU: 0.72 | Acc: 0.85',cn:'IoU: 0.72 | Acc: 0.85'},
  mcBias:{en:'Bias: Shadow regions',cn:'\u504f\u5dee: \u9634\u5f71\u533a\u57df'},
  elMiss:{en:'Missed Detection',cn:'\u6f0f\u68c0'},
  elFalse:{en:'False Positive',cn:'\u8bef\u68c0'},
  elEdge:{en:'Edge Ambiguity',cn:'\u8fb9\u754c\u6a21\u7cca'},
  verifyExpected:{en:'Expected IoU: 0.72',cn:'\u9884\u671f IoU: 0.72'},
  verifyActual:{en:'Actual IoU: 0.72',cn:'\u5b9e\u9645 IoU: 0.72'},
  verifyPass:{en:'REPRODUCIBLE',cn:'\u53ef\u590d\u73b0'},
  scattered:{en:'Scattered',cn:'\u5206\u6563'},
  grouped:{en:'Grouped',cn:'\u5df2\u5206\u7ec4'},
  assembled:{en:'Assembled',cn:'\u5df2\u7ec4\u88c5'},
  documented:{en:'Documented',cn:'\u5df2\u8bb0\u5f55'},
  verified:{en:'Verified',cn:'\u5df2\u9a8c\u8bc1'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvasWrap');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
var currentFrame=0,totalFrames=5,playing=false,playTimer=null;
var transitioning=false;

// Asset definitions: [{key, stage, color, dirTarget}]
var ASSETS=[
  {key:'dictionary',stage:'s1',color:'#38bdf8',dir:'docs'},
  {key:'obsNotes',stage:'s1',color:'#38bdf8',dir:'docs'},
  {key:'ruleBaseline',stage:'s2',color:'#a78bfa',dir:'scripts'},
  {key:'baselineReport',stage:'s2',color:'#a78bfa',dir:'docs'},
  {key:'dataLedger',stage:'s3',color:'#fb923c',dir:'data'},
  {key:'splitProtocol',stage:'s3',color:'#fb923c',dir:'data'},
  {key:'trainScript',stage:'s3',color:'#fb923c',dir:'scripts'},
  {key:'inferScript',stage:'s3',color:'#fb923c',dir:'scripts'},
  {key:'evalScript',stage:'s3',color:'#fb923c',dir:'scripts'},
  {key:'modelWeights',stage:'s3',color:'#fb923c',dir:'models'},
  {key:'modelCard',stage:'s3',color:'#fb923c',dir:'docs'},
  {key:'errorLog',stage:'s3',color:'#fb923c',dir:'docs'}
];

var STAGE_COLORS={s1:'#38bdf8',s2:'#a78bfa',s3:'#fb923c'};
var DIR_COLORS={data:'#34d399',models:'#f472b6',scripts:'#818cf8',docs:'#ffb59c'};

function lerp(a,b,p){return a+(b-a)*p;}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function merge(base,ov){var r={};for(var k in base)r[k]=base[k];for(var k2 in ov)r[k2]=ov[k2];return r;}

function hexToRgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// Primitives
function drawBg(){
  var grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#131313');grd.addColorStop(0.5,'#1a1035');grd.addColorStop(1,'#131313');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  var gs=40;
  for(var x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawCard(x,y,w,h,color,label,alpha){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  // card bg gradient
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,hexToRgba(color,0.25));g.addColorStop(1,hexToRgba(color,0.08));
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  // border
  ctx.strokeStyle=hexToRgba(color,0.5);ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
  // glow
  ctx.shadowColor=color;ctx.shadowBlur=8;ctx.fillStyle='transparent';ctx.fillRect(x,y,w,h);ctx.shadowBlur=0;
  // label
  ctx.fillStyle='rgba(229,226,225,0.92)';ctx.font='bold '+Math.max(9,Math.min(11,w/8))+'px "Space Grotesk",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2);
  ctx.restore();
}

function drawDirSlot(x,y,w,h,color,label,count,alpha){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,hexToRgba(color,0.12));g.addColorStop(1,hexToRgba(color,0.04));
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=hexToRgba(color,0.4);ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  // dir label
  ctx.fillStyle=color;ctx.font='bold 13px "JetBrains Mono",monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(label,x+w/2,y+6);
  // count
  if(count>0){
    ctx.fillStyle='rgba(229,226,225,0.7)';ctx.font='11px "Space Grotesk",sans-serif';
    ctx.fillText(count+' items',x+w/2,y+h-18);
  }
  ctx.restore();
}

function drawStageBadge(x,y,stage,alpha){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  var col=STAGE_COLORS[stage]||'#888';
  ctx.fillStyle=hexToRgba(col,0.3);
  ctx.fillRect(x-20,y-10,40,20);
  ctx.strokeStyle=hexToRgba(col,0.6);ctx.lineWidth=1;ctx.strokeRect(x-20,y-10,40,20);
  ctx.fillStyle=col;ctx.font='bold 12px "Space Grotesk",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(t(stage).toUpperCase(),x,y);
  ctx.restore();
}

function drawModelCardDetail(x,y,w,h,alpha){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'rgba(255,181,156,0.15)');g.addColorStop(1,'rgba(255,181,156,0.03)');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(255,181,156,0.4)';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  // title
  ctx.fillStyle='#ffb59c';ctx.font='bold 13px "Space Grotesk",sans-serif';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(t('modelCard'),x+10,y+8);
  // fields
  var fields=[t('mcPurpose'),t('mcData'),t('mcMetrics'),t('mcBias')];
  ctx.fillStyle='rgba(229,226,225,0.8)';ctx.font='11px "Noto Sans SC",sans-serif';
  for(var i=0;i<fields.length;i++){
    ctx.fillText(fields[i],x+10,y+30+i*18);
  }
  // glow
  ctx.shadowColor='#ffb59c';ctx.shadowBlur=15;
  ctx.strokeStyle='rgba(255,181,156,0.25)';ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawErrorLogDetail(x,y,w,h,alpha){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'rgba(255,95,31,0.15)');g.addColorStop(1,'rgba(255,95,31,0.03)');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(255,95,31,0.4)';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#ff5f1f';ctx.font='bold 13px "Space Grotesk",sans-serif';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(t('errorLog'),x+10,y+8);
  var items=[t('elMiss'),t('elFalse'),t('elEdge')];
  ctx.fillStyle='rgba(229,226,225,0.8)';ctx.font='11px "Noto Sans SC",sans-serif';
  for(var i=0;i<items.length;i++){
    // bullet
    ctx.fillStyle='#ff5f1f';
    ctx.fillRect(x+10,y+30+i*20+4,6,6);
    ctx.fillStyle='rgba(229,226,225,0.8)';
    ctx.fillText(items[i],x+22,y+30+i*20);
  }
  ctx.shadowColor='#ff5f1f';ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(255,95,31,0.2)';ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawVerifyPanel(x,y,w,h,alpha){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'rgba(16,185,129,0.15)');g.addColorStop(1,'rgba(16,185,129,0.03)');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(16,185,129,0.5)';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#10b981';ctx.font='bold 14px "Space Grotesk",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(t('verifyPass'),x+w/2,y+8);
  ctx.fillStyle='rgba(229,226,225,0.85)';ctx.font='12px "JetBrains Mono",monospace';
  ctx.fillText(t('verifyExpected'),x+w/2,y+32);
  ctx.fillText(t('verifyActual'),x+w/2,y+52);
  // check mark
  ctx.strokeStyle='#10b981';ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(x+w/2-12,y+h-20);ctx.lineTo(x+w/2-4,y+h-12);ctx.lineTo(x+w/2+12,y+h-30);
  ctx.stroke();
  ctx.shadowColor='#10b981';ctx.shadowBlur=20;
  ctx.strokeStyle='rgba(16,185,129,0.3)';ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawLabelPrimitive(text,x,y,color,size,align){
  ctx.fillStyle=color||'#ffb59c';
  ctx.font='bold '+(size||14)+'px "Space Grotesk",sans-serif';
  ctx.textAlign=align||'center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
}

function drawTextPrimitive(text,x,y,color,size,align){
  ctx.fillStyle=color||'rgba(229,226,225,0.85)';
  ctx.font=(size||12)+'px "Noto Sans SC",sans-serif';
  ctx.textAlign=align||'center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
}

function drawArrowPrimitive(x1,y1,x2,y2,color){
  ctx.strokeStyle=color||'#ffb59c';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  var angle=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-8*Math.cos(angle-0.4),y2-8*Math.sin(angle-0.4));
  ctx.lineTo(x2-8*Math.cos(angle+0.4),y2-8*Math.sin(angle+0.4));
  ctx.closePath();ctx.fillStyle=color||'#ffb59c';ctx.fill();
}

// Element drawing dispatcher
function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  switch(el.type){
    case'label':drawLabelPrimitive(el.text,el.x,el.y,el.color,el.size,el.align);break;
    case'text':drawTextPrimitive(el.text,el.x,el.y,el.color,el.size,el.align);break;
    case'arrow':drawArrowPrimitive(el.x1,el.y1,el.x2,el.y2,el.color);break;
    case'card':drawCard(el.x,el.y,el.w,el.h,el.color,el.label,1);break;
    case'dirSlot':drawDirSlot(el.x,el.y,el.w,el.h,el.color,el.label,el.count,1);break;
    case'stageBadge':drawStageBadge(el.x,el.y,el.stage,1);break;
    case'modelCardDetail':drawModelCardDetail(el.x,el.y,el.w,el.h,1);break;
    case'errorLogDetail':drawErrorLogDetail(el.x,el.y,el.w,el.h,1);break;
    case'verifyPanel':drawVerifyPanel(el.x,el.y,el.w,el.h,1);break;
    case'custom':if(el.draw)el.draw(el.alpha);break;
  }
  ctx.restore();
}

// Frame element definitions
function getFrameElements(f){
  var els=[];
  var cx=W/2, cy=H/2;
  var cw=Math.min(100,W/13), ch=28;
  var titleKeys=['f0title','f1title','f2title','f3title','f4title'];
  var descKeys=['f0desc','f1desc','f2desc','f3desc','f4desc'];

  // Title always present
  els.push({id:'frameTitle',type:'label',text:t(titleKeys[f]),x:cx,y:30,color:'#ffb59c',size:16,align:'center',alpha:1});
  els.push({id:'frameDesc',type:'text',text:t(descKeys[f]),x:cx,y:52,color:'rgba(229,226,225,0.7)',size:12,align:'center',alpha:1});

  if(f===0){
    // Scattered: 12 cards randomly distributed
    var positions=[
      {x:0.08,y:0.2},{x:0.22,y:0.15},{x:0.38,y:0.25},{x:0.52,y:0.12},
      {x:0.65,y:0.28},{x:0.78,y:0.18},{x:0.12,y:0.55},{x:0.28,y:0.62},
      {x:0.45,y:0.5},{x:0.6,y:0.6},{x:0.72,y:0.48},{x:0.85,y:0.55}
    ];
    for(var i=0;i<ASSETS.length;i++){
      var a=ASSETS[i];
      var px=positions[i].x*W;
      var py=positions[i].y*H+40;
      els.push({id:'card'+i,type:'card',x:px,y:py,w:cw,h:ch,color:a.color,label:t(a.key),alpha:1});
    }
  }
  else if(f===1){
    // Grouped by stage
    var stageGroups={s1:[],s2:[],s3:[]};
    ASSETS.forEach(function(a,i){stageGroups[a.stage].push({idx:i,asset:a});});
    var stageX={s1:W*0.15,s2:W*0.45,s3:W*0.75};
    var stages=['s1','s2','s3'];
    for(var si=0;si<stages.length;si++){
      var s=stages[si];
      var sx=stageX[s];
      els.push({id:'badge'+s,type:'stageBadge',x:sx,y:90,stage:s,alpha:1});
      var items=stageGroups[s];
      for(var j=0;j<items.length;j++){
        var it=items[j];
        els.push({id:'card'+it.idx,type:'card',x:sx-cw/2,y:120+j*(ch+6),w:cw,h:ch,color:it.asset.color,label:t(it.asset.key),alpha:1});
      }
    }
    // arrows from badges to group
    els.push({id:'arrow_s1',type:'arrow',x1:stageX.s1,y1:102,x2:stageX.s1,y2:116,color:'#38bdf8',alpha:1});
    els.push({id:'arrow_s2',type:'arrow',x1:stageX.s2,y1:102,x2:stageX.s2,y2:116,color:'#a78bfa',alpha:1});
    els.push({id:'arrow_s3',type:'arrow',x1:stageX.s3,y1:102,x2:stageX.s3,y2:116,color:'#fb923c',alpha:1});
  }
  else if(f===2){
    // Directory structure with cards inside
    var dirs=['data','models','scripts','docs'];
    var dirAssets={data:[],models:[],scripts:[],docs:[]};
    ASSETS.forEach(function(a,i){dirAssets[a.dir].push({idx:i,asset:a});});
    var dw=W/4-16, dh=H-120;
    for(var di=0;di<dirs.length;di++){
      var d=dirs[di];
      var dx=12+di*(dw+12);
      var dy=75;
      els.push({id:'dir'+d,type:'dirSlot',x:dx,y:dy,w:dw,h:dh,color:DIR_COLORS[d],label:t('dir'+d.charAt(0).toUpperCase()+d.slice(1)),count:dirAssets[d].length,alpha:1});
      var dassets=dirAssets[d];
      for(var j=0;j<dassets.length;j++){
        var da=dassets[j];
        els.push({id:'card'+da.idx,type:'card',x:dx+8,y:dy+30+j*(ch+4),w:dw-16,h:ch,color:DIR_COLORS[d],label:t(da.asset.key),alpha:1});
      }
    }
  }
  else if(f===3){
    // Model card and error log detail, with directory tree in background
    var dirs2=['data','models','scripts','docs'];
    var dw2=W/4-16,dh2=H*0.35;
    for(var di2=0;di2<dirs2.length;di2++){
      var d2=dirs2[di2];
      var dx2=12+di2*(dw2+12);
      els.push({id:'dir'+d2,type:'dirSlot',x:dx2,y:70,w:dw2,h:dh2,color:DIR_COLORS[d2],label:t('dir'+d2.charAt(0).toUpperCase()+d2.slice(1)),count:0,alpha:0.4});
    }
    // Model card detail panel
    var mcW=W*0.42,mcH=H*0.32;
    els.push({id:'mcDetail',type:'modelCardDetail',x:W*0.05,y:H*0.48,w:mcW,h:mcH,alpha:1});
    // Error log detail panel
    var elW=W*0.42,elH=H*0.32;
    els.push({id:'elDetail',type:'errorLogDetail',x:W*0.53,y:H*0.48,w:elW,h:elH,alpha:1});
    // highlight arrow
    els.push({id:'arrowMc',type:'arrow',x1:W*0.26,y1:H*0.44,x2:W*0.26,y2:H*0.48,color:'#ffb59c',alpha:1});
    els.push({id:'arrowEl',type:'arrow',x1:W*0.74,y1:H*0.44,x2:W*0.74,y2:H*0.48,color:'#ff5f1f',alpha:1});
  }
  else if(f===4){
    // Complete pack with verify panel
    var dirs3=['data','models','scripts','docs'];
    var dw3=W/4-16,dh3=H*0.3;
    for(var di3=0;di3<dirs3.length;di3++){
      var d3=dirs3[di3];
      var dx3=12+di3*(dw3+12);
      els.push({id:'dir'+d3,type:'dirSlot',x:dx3,y:70,w:dw3,h:dh3,color:DIR_COLORS[d3],label:t('dir'+d3.charAt(0).toUpperCase()+d3.slice(1)),count:0,alpha:1});
    }
    // Verify panel centered
    var vpW=W*0.4,vpH=H*0.3;
    els.push({id:'verifyPanel',type:'verifyPanel',x:cx-vpW/2,y:H*0.5,w:vpW,h:vpH,alpha:1});
    // Glow pulse around everything (via custom draw)
    els.push({id:'glowPulse',type:'custom',alpha:1,draw:function(a){
      var time=Date.now()/1000;
      var pulse=0.3+0.15*Math.sin(time*2);
      ctx.save();ctx.globalAlpha=pulse*a;
      ctx.strokeStyle='#10b981';ctx.lineWidth=2;
      ctx.shadowColor='#10b981';ctx.shadowBlur=30;
      ctx.strokeRect(6,64,W-12,H*0.3+12);
      ctx.shadowBlur=0;ctx.restore();
    }});
  }

  return els;
}

// HUD update
var hudLabels=['hudPhase','hudAssets','hudDirs','hudStatus'];
var hudVals=[
  ['f0title','12','0','scattered'],
  ['f1title','12','3','grouped'],
  ['f2title','12','4','assembled'],
  ['f3title','12','4','documented'],
  ['f4title','12','4','verified']
];

function updateHUD(f){
  for(var i=0;i<4;i++){
    document.getElementById('hudL'+i).textContent=t(hudLabels[i]);
    if(i===0) document.getElementById('hudV'+i).textContent=t(hudVals[f][i]);
    else if(i===3) document.getElementById('hudV'+i).textContent=t(hudVals[f][i]);
    else document.getElementById('hudV'+i).textContent=hudVals[f][i];
  }
}

// Frame drawing
function drawFrame(f){
  drawBg();
  var elems=getFrameElements(f);
  elems.forEach(function(el){drawElement(el);});
}

// Transition
function transitionTo(newFrame){
  if(newFrame<0)newFrame=0;
  if(newFrame>=totalFrames)newFrame=totalFrames-1;
  if(newFrame===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return;}
  if(transitioning)return;

  var oldElems=getFrameElements(currentFrame);
  var newElems=getFrameElements(newFrame);
  var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e;});
  var newMap={};newElems.forEach(function(e){newMap[e.id]=e;});

  currentFrame=newFrame;
  updateHUD(newFrame);
  updateDots();
  transitioning=true;

  var startTime=null;
  var duration=500;

  function step(timestamp){
    if(!startTime)startTime=timestamp;
    var raw=Math.min((timestamp-startTime)/duration,1);
    var p=easeInOut(raw);

    drawBg();

    oldElems.forEach(function(oe){
      if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}));
    });

    newElems.forEach(function(ne){
      var oe=oldMap[ne.id];
      if(oe){
        var merged=merge(ne,{
          x:lerp(oe.x||0,ne.x||0,p),
          y:lerp(oe.y||0,ne.y||0,p),
          w:lerp(oe.w||0,ne.w||0,p),
          h:lerp(oe.h||0,ne.h||0,p),
          alpha:lerp(oe.alpha||1,ne.alpha||1,p)
        });
        if(ne.type==='arrow'&&oe.type==='arrow'){
          merged.x1=lerp(oe.x1,ne.x1,p);merged.y1=lerp(oe.y1,ne.y1,p);
          merged.x2=lerp(oe.x2,ne.x2,p);merged.y2=lerp(oe.y2,ne.y2,p);
        }
        if((ne.type==='label'||ne.type==='text')&&oe.text!==ne.text){
          drawElement(merge(oe,{alpha:1-p}));
          drawElement(merge(ne,{alpha:p}));
        }else{
          drawElement(merged);
        }
      }else{
        drawElement(merge(ne,{alpha:p}));
      }
    });

    if(raw<1){requestAnimationFrame(step);}
    else{transitioning=false;}
  }
  requestAnimationFrame(step);
}

// Dots
function buildDots(){
  var cont=document.getElementById('frameDots');
  cont.innerHTML='';
  for(var i=0;i<totalFrames;i++){
    var d=document.createElement('div');
    d.className='frame-dot'+(i===currentFrame?' active':'');
    d.setAttribute('data-f',i);
    d.addEventListener('click',function(){transitionTo(parseInt(this.getAttribute('data-f')));});
    cont.appendChild(d);
  }
}
function updateDots(){
  var dots=document.querySelectorAll('.frame-dot');
  dots.forEach(function(d,i){d.className='frame-dot'+(i===currentFrame?' active':'');});
}

// Resize
function resize(){
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;H=rect.height;
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawFrame(currentFrame);
}

// Controls
document.getElementById('btnPrev').addEventListener('click',function(){
  if(playing)stopPlay();
  transitionTo(currentFrame-1);
});
document.getElementById('btnNext').addEventListener('click',function(){
  if(playing)stopPlay();
  transitionTo(currentFrame+1);
});
document.getElementById('btnPlay').addEventListener('click',function(){
  if(playing){stopPlay();}
  else{startPlay();}
});

function startPlay(){
  playing=true;
  document.getElementById('btnPlay').textContent=t('pause');
  if(currentFrame>=totalFrames-1){currentFrame=-1;}
  function tick(){
    if(!playing)return;
    if(currentFrame<totalFrames-1){
      transitionTo(currentFrame+1);
      playTimer=setTimeout(tick,1800);
    }else{
      stopPlay();
    }
  }
  tick();
}
function stopPlay(){
  playing=false;
  document.getElementById('btnPlay').textContent=t('play');
  if(playTimer){clearTimeout(playTimer);playTimer=null;}
}

// Guide toggle
var guideOpen=true;
document.getElementById('guideToggle').addEventListener('click',function(){
  guideOpen=!guideOpen;
  document.getElementById('guideContent').style.display=guideOpen?'block':'none';
  document.getElementById('guideArrow').className='arrow'+(guideOpen?'':' collapsed');
});

// i18n refresh
function refreshI18N(){
  document.getElementById('titleText').textContent=t('title');
  document.getElementById('btnPrev').textContent=t('prev');
  document.getElementById('btnPlay').textContent=playing?t('pause'):t('play');
  document.getElementById('btnNext').textContent=t('next');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('glShow').textContent=t('glShow');
  document.getElementById('guideShow').textContent=t('guideShow');
  document.getElementById('glObserve').textContent=t('glObserve');
  var obsUl=document.getElementById('guideObserve');
  obsUl.innerHTML='';
  ['obs1','obs2','obs3'].forEach(function(k){
    var li=document.createElement('li');li.textContent=t(k);obsUl.appendChild(li);
  });
  document.getElementById('glControls').textContent=t('glControls');
  document.getElementById('guideControls').textContent=t('guideControls');
  document.getElementById('glTakeaway').textContent=t('glTakeaway');
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  updateHUD(currentFrame);
  drawFrame(currentFrame);
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  refreshI18N();
});

// Init
window.addEventListener('resize',resize);
buildDots();
refreshI18N();
resize();
setTimeout(resize,200);
setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});

})();
</script>
