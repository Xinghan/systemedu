<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;}
.lang-btn:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar h1{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);margin-top:4px;line-height:1.3;}
.sidebar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.06em;text-transform:uppercase;}
.sidebar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary,#50ffb0);margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>
<script src="../../../course_factory/runtime/animation_runtime.js"></script>
<script>
// ============================================================
// K11: Modify Your Paper Airplane -- Why modifications matter
//
// Frame 0: Title + core question
// Frame 1: Adding a paperclip -- center of gravity shift
// Frame 2: Wing modifications -- wingtip folds & ailerons
// Frame 3: Comparison summary -- 3 modifications side by side
// ============================================================

var CONFIG = {
  style: 'helix_lab',
  totalFrames: 4,
  i18n: {
    title:     {en:'FLY FARTHER: MODIFY YOUR PLANE', cn:'\u98de\u5f97\u66f4\u8fdc\uff1a\u6539\u9020\u4f60\u7684\u7eb8\u98de\u673a'},
    subtitle:  {en:'How modifications change flight', cn:'\u6539\u9020\u5982\u4f55\u6539\u53d8\u98de\u884c'},
    fTitle:    {en:'THE CORE QUESTION', cn:'\u6838\u5fc3\u95ee\u9898'},
    fQ:        {en:'If you add a paperclip to the nose,\nwill it fly farther or worse? Why?', cn:'\u5982\u679c\u5728\u673a\u5934\u52a0\u4e00\u4e2a\u66f2\u522b\u9488\uff0c\n\u5b83\u4f1a\u98de\u5f97\u66f4\u8fdc\u8fd8\u662f\u66f4\u5dee\uff1f\u4e3a\u4ec0\u4e48\uff1f'},
    f1Title:   {en:'MOD 1: ADD WEIGHT TO NOSE', cn:'\u6539\u9020\u4e00\uff1a\u673a\u5934\u52a0\u91cd'},
    f1Before:  {en:'BEFORE: CG too far back', cn:'\u6539\u9020\u524d\uff1a\u91cd\u5fc3\u9760\u540e'},
    f1After:   {en:'AFTER: CG moves forward', cn:'\u6539\u9020\u540e\uff1a\u91cd\u5fc3\u524d\u79fb'},
    f1Note:    {en:'Paperclip shifts center of gravity forward\n= more stable nose-down pitch = straighter flight', cn:'\u66f2\u522b\u9488\u8ba9\u91cd\u5fc3\u524d\u79fb\n= \u673a\u5934\u5fae\u4fef\u66f4\u7a33\u5b9a = \u98de\u884c\u66f4\u76f4'},
    f2Title:   {en:'MOD 2: WING MODIFICATIONS', cn:'\u6539\u9020\u4e8c\uff1a\u673a\u7ffc\u6539\u9020'},
    f2FoldTip: {en:'Fold wingtips up', cn:'\u7ffc\u5c16\u4e0a\u6298'},
    f2FoldEff: {en:'Reduce tip vortex\n= less drag, more stable', cn:'\u51cf\u5c11\u7ffc\u5c16\u6da1\u6d41\n= \u963b\u529b\u66f4\u5c0f\uff0c\u66f4\u7a33\u5b9a'},
    f2Aileron: {en:'Add ailerons (small flaps)', cn:'\u52a0\u526f\u7ffc\uff08\u5c0f\u8974\u7ffc\uff09'},
    f2AilEff:  {en:'Control roll direction\n= can turn left or right', cn:'\u63a7\u5236\u6a2a\u6eda\u65b9\u5411\n= \u53ef\u4ee5\u5de6\u8f6c\u6216\u53f3\u8f6c'},
    f3Title:   {en:'COMPARISON: 3 MODIFICATIONS', cn:'\u5bf9\u6bd4\uff1a\u4e09\u79cd\u6539\u9020\u65b9\u6848'},
    f3Weight:  {en:'Add Weight', cn:'\u52a0\u91cd'},
    f3Wing:    {en:'Wing Mod', cn:'\u6539\u7ffc'},
    f3Tail:    {en:'Add Tail', cn:'\u52a0\u5c3e\u7ffc'},
    f3Stab:    {en:'Stability', cn:'\u7a33\u5b9a\u6027'},
    f3Dist:    {en:'Distance', cn:'\u8ddd\u79bb'},
    f3Diff:    {en:'Difficulty', cn:'\u96be\u5ea6'},
    f3High:    {en:'HIGH', cn:'\u9ad8'},
    f3Med:     {en:'MEDIUM', cn:'\u4e2d'},
    f3Low:     {en:'LOW', cn:'\u4f4e'},
    f3Easy:    {en:'EASY', cn:'\u7b80\u5355'},
    f3Normal:  {en:'NORMAL', cn:'\u666e\u901a'},
    f3Hard:    {en:'HARD', cn:'\u8f83\u96be'},
    f3WeightP: {en:'+Stability, +Distance\n-Adds mass', cn:'+\u7a33\u5b9a\u6027\uff0c+\u8ddd\u79bb\n-\u589e\u52a0\u8d28\u91cf'},
    f3WingP:   {en:'+Less drag, +Stability\n-Less lift if overdone', cn:'+\u51cf\u5c11\u963b\u529b\uff0c+\u7a33\u5b9a\n-\u8fc7\u5ea6\u4f1a\u51cf\u5c11\u5347\u529b'},
    f3TailP:   {en:'+Pitch control\n-More drag, harder to make', cn:'+\u63a7\u5236\u4fef\u4ef0\n-\u589e\u52a0\u963b\u529b\uff0c\u5236\u4f5c\u8f83\u96be'},
    cg:        {en:'CG', cn:'\u91cd\u5fc3'},
    guideTitle:{en:'MODIFICATION GUIDE', cn:'\u6539\u9020\u6307\u5357'},
    g1:        {en:'Each mod changes at least one flight parameter', cn:'\u6bcf\u79cd\u6539\u9020\u81f3\u5c11\u6539\u53d8\u4e00\u4e2a\u98de\u884c\u53c2\u6570'},
    g2:        {en:'Test each mod separately first', cn:'\u5148\u5355\u72ec\u6d4b\u8bd5\u6bcf\u79cd\u6539\u9020'},
    g3:        {en:'Fly at least 3 times per mod', cn:'\u6bcf\u79cd\u6539\u9020\u81f3\u5c11\u8bd5\u98de3\u6b21'},
    g4:        {en:'Record before AND after data', cn:'\u8bb0\u5f55\u6539\u9020\u524d\u540e\u7684\u6570\u636e'},
    hudFrame:  {en:'FRAME', cn:'\u5e27'},
    hudTopic:  {en:'TOPIC', cn:'\u4e3b\u9898'},
    hudParam:  {en:'KEY PARAM', cn:'\u5173\u952e\u53c2\u6570'},
    hudEffect: {en:'EFFECT', cn:'\u6548\u679c'},
  },
  hudLabels: ['hudFrame', 'hudTopic', 'hudParam', 'hudEffect'],
  hudValues: [
    ['0/3', '\u6838\u5fc3\u95ee\u9898', '--', '--'],
    ['1/3', '\u673a\u5934\u52a0\u91cd', '\u91cd\u5fc3\u4f4d\u7f6e', '\u98de\u884c\u66f4\u7a33'],
    ['2/3', '\u673a\u7ffc\u6539\u9020', '\u5347\u529b/\u963b\u529b', '\u8ddd\u79bb/\u8f6c\u5411'],
    ['3/3', '\u4e09\u65b9\u5bf9\u6bd4', '\u7efc\u5408', '\u5404\u6709\u4f18\u52a3'],
  ],
  guideTitle: 'guideTitle',
  guideItems: ['g1','g2','g3','g4'],
};

// ============================================================
// Background: dark gradient + subtle grid
// ============================================================
function drawBg(ctx, W, H) {
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0c0e12');
  grad.addColorStop(1, '#111318');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(80,255,176,0.03)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (var y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

// ============================================================
// Helper: draw a paper airplane shape
// cx, cy = center, sc = scale, rot = rotation in radians
// color = fill color, clipColor = paperclip color (null = no clip)
// ============================================================
function drawPlane(ctx, cx, cy, sc, rot, color, clipColor) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.scale(sc, sc);
  // Fuselage + wings
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(30, 0);      // nose
  ctx.lineTo(-18, -14);   // top wing
  ctx.lineTo(-10, 0);     // center notch
  ctx.lineTo(-18, 14);    // bottom wing
  ctx.closePath();
  ctx.fill();
  // Wing crease line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(-10, 0);
  ctx.stroke();
  // Paperclip on nose
  if (clipColor) {
    ctx.strokeStyle = clipColor;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(26, -4);
    ctx.lineTo(32, -4);
    ctx.arc(32, -1, 3, -Math.PI/2, Math.PI/2);
    ctx.lineTo(28, 2);
    ctx.arc(28, -1, 3, Math.PI/2, -Math.PI/2, true);
    ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
// Helper: draw a dashed flight trajectory arc
// ============================================================
function drawTrajectory(ctx, x0, y0, cpx, cpy, x1, y1, color, wobbly) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  if (wobbly) {
    // Wobbly path: multiple small segments with random offsets
    var steps = 20;
    for (var i = 1; i <= steps; i++) {
      var t = i / steps;
      var bx = (1-t)*(1-t)*x0 + 2*(1-t)*t*cpx + t*t*x1;
      var by = (1-t)*(1-t)*y0 + 2*(1-t)*t*cpy + t*t*y1;
      var wobble = Math.sin(t * 12) * (8 - t * 6);
      ctx.lineTo(bx, by + wobble);
    }
  } else {
    ctx.quadraticCurveTo(cpx, cpy, x1, y1);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ============================================================
// Helper: draw CG marker (small triangle)
// ============================================================
function drawCGMarker(ctx, cx, cy, color, label) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy - 8);
  ctx.lineTo(cx - 5, cy + 2);
  ctx.lineTo(cx + 5, cy + 2);
  ctx.closePath();
  ctx.fill();
  ctx.font = "bold 9px 'Space Grotesk', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText(label, cx, cy + 14);
  ctx.restore();
}

// ============================================================
// Helper: draw wingtip fold indicator
// ============================================================
function drawWingtipFold(ctx, cx, cy, sc, up) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  ctx.fillStyle = '#d0d8f0';
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(-18, -14);
  ctx.lineTo(-10, 0);
  ctx.lineTo(-18, 14);
  ctx.closePath();
  ctx.fill();
  // Wing crease
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(30,0); ctx.lineTo(-10,0); ctx.stroke();
  // Folded tips
  if (up) {
    ctx.fillStyle = '#85ecff';
    ctx.globalAlpha = 0.6;
    // Top tip fold
    ctx.beginPath();
    ctx.moveTo(-18, -14);
    ctx.lineTo(-14, -14);
    ctx.lineTo(-16, -20);
    ctx.closePath();
    ctx.fill();
    // Bottom tip fold
    ctx.beginPath();
    ctx.moveTo(-18, 14);
    ctx.lineTo(-14, 14);
    ctx.lineTo(-16, 20);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ============================================================
// getFrameElements: returns element array for each frame
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2;

  if (f === 0) {
    // Title frame: title + core question
    return [
      {id:'t0_title', type:'label', text:t('fTitle'), x:cx, y:80, color:P.primary, size:20, glow:P.glowStrong},
      {id:'t0_q', type:'custom_frame', frame:0},
    ];
  }
  // All other frames use custom drawing
  return [{id:'_custom_'+f, type:'custom_frame', frame:f}];
}

// ============================================================
// customDrawElement: detailed per-frame rendering
// ============================================================
function customDrawElement(ctx, el, W, H) {
  if (el.type !== 'custom_frame') return false;
  var f = el.frame;
  var t_fn = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2;

  if (f === 0) {
    // Core question text -- multiline
    var lines = t_fn('fQ').split('\n');
    ctx.fillStyle = P.text;
    ctx.font = "15px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    for (var i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], cx, 160 + i * 28);
    }

    // Decorative plane illustration
    drawPlane(ctx, cx - 80, 260, 2.2, -0.15, '#d0d8f0', null);
    // Arrow pointing to a question mark at nose
    ctx.fillStyle = P.secondary;
    ctx.font = "bold 28px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('?', cx - 20, 250);

    // Paperclip illustration near the plane
    ctx.strokeStyle = '#acf900';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx + 20, 260);
    ctx.lineTo(cx + 40, 260);
    ctx.arc(cx + 40, 264, 4, -Math.PI/2, Math.PI/2);
    ctx.lineTo(cx + 25, 268);
    ctx.stroke();

    ctx.fillStyle = P.muted;
    ctx.font = "11px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('cg') + ' = Center of Gravity / \u91cd\u5fc3', cx, 340);
    return true;
  }

  if (f === 1) {
    // Frame 1: Paperclip on nose -- CG shift
    var halfW = W / 2;
    var leftCx = halfW * 0.5;
    var rightCx = halfW + halfW * 0.5;

    // Section title
    ctx.fillStyle = P.text;
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f1Title'), cx, 35);

    // LEFT: Before modification
    ctx.fillStyle = P.error;
    ctx.font = "bold 12px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f1Before'), leftCx, 65);

    // Draw plane without clip
    drawPlane(ctx, leftCx, 120, 2.5, -0.1, '#d0d8f0', null);
    // CG marker -- too far back
    drawCGMarker(ctx, leftCx - 8, 145, P.error, t_fn('cg'));

    // Wobbly trajectory
    drawTrajectory(ctx, leftCx - 60, 190, leftCx, 170, leftCx + 80, 240, P.error, true);
    // Landing: nose up, unstable
    drawPlane(ctx, leftCx + 70, 235, 1.5, 0.6, 'rgba(208,216,240,0.5)', null);

    // Divider line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(cx, 55); ctx.lineTo(cx, H - 20); ctx.stroke();
    ctx.setLineDash([]);

    // RIGHT: After modification
    ctx.fillStyle = P.primary;
    ctx.font = "bold 12px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f1After'), rightCx, 65);

    // Draw plane with paperclip
    drawPlane(ctx, rightCx, 120, 2.5, -0.05, '#d0d8f0', '#acf900');
    // CG marker -- forward
    drawCGMarker(ctx, rightCx + 12, 145, P.primary, t_fn('cg'));

    // Smooth trajectory
    drawTrajectory(ctx, rightCx - 60, 190, rightCx + 20, 160, rightCx + 100, 220, P.primary, false);
    // Landing: stable glide
    drawPlane(ctx, rightCx + 90, 215, 1.5, -0.05, 'rgba(208,216,240,0.7)', '#acf900');

    // Explanation at bottom
    var noteLines = t_fn('f1Note').split('\n');
    ctx.fillStyle = P.muted;
    ctx.font = "12px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    for (var i = 0; i < noteLines.length; i++) {
      ctx.fillText(noteLines[i], cx, 290 + i * 20);
    }

    // Arrow from clip to CG shift
    ctx.strokeStyle = P.secondary;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(rightCx + 25, 130);
    ctx.lineTo(rightCx + 12, 138);
    ctx.stroke();
    // Arrowhead
    ctx.fillStyle = P.secondary;
    ctx.beginPath();
    ctx.moveTo(rightCx + 12, 138);
    ctx.lineTo(rightCx + 16, 132);
    ctx.lineTo(rightCx + 18, 139);
    ctx.closePath();
    ctx.fill();

    return true;
  }

  if (f === 2) {
    // Frame 2: Wing modifications
    ctx.fillStyle = P.text;
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f2Title'), cx, 35);

    var leftCx = W * 0.28;
    var rightCx = W * 0.72;

    // LEFT: Wingtip fold
    ctx.fillStyle = P.tertiary;
    ctx.font = "bold 12px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f2FoldTip'), leftCx, 65);

    // Draw plane with folded tips
    ctx.save();
    ctx.translate(leftCx, 130);
    drawWingtipFold(ctx, 0, 0, 2.8, true);
    ctx.restore();

    // Upward arrows at tips
    ctx.strokeStyle = P.tertiary;
    ctx.lineWidth = 1.5;
    // top tip arrow
    ctx.beginPath(); ctx.moveTo(leftCx - 48, 110); ctx.lineTo(leftCx - 48, 95); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(leftCx - 52, 100); ctx.lineTo(leftCx - 48, 95); ctx.lineTo(leftCx - 44, 100); ctx.stroke();
    // bottom tip arrow
    ctx.beginPath(); ctx.moveTo(leftCx - 48, 150); ctx.lineTo(leftCx - 48, 165); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(leftCx - 52, 160); ctx.lineTo(leftCx - 48, 165); ctx.lineTo(leftCx - 44, 160); ctx.stroke();

    // Effect text
    var foldLines = t_fn('f2FoldEff').split('\n');
    ctx.fillStyle = P.muted;
    ctx.font = "11px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    for (var i = 0; i < foldLines.length; i++) {
      ctx.fillText(foldLines[i], leftCx, 195 + i * 18);
    }

    // Smooth trajectory for fold
    drawTrajectory(ctx, leftCx - 50, 245, leftCx + 10, 230, leftCx + 70, 260, P.tertiary, false);

    // Divider
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(cx, 55); ctx.lineTo(cx, H - 20); ctx.stroke();
    ctx.setLineDash([]);

    // RIGHT: Ailerons
    ctx.fillStyle = P.secondary;
    ctx.font = "bold 12px 'Space Grotesk', 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f2Aileron'), rightCx, 65);

    // Draw plane with ailerons
    ctx.save();
    ctx.translate(rightCx, 130);
    ctx.scale(2.8, 2.8);
    ctx.fillStyle = '#d0d8f0';
    ctx.beginPath();
    ctx.moveTo(30, 0);
    ctx.lineTo(-18, -14);
    ctx.lineTo(-10, 0);
    ctx.lineTo(-18, 14);
    ctx.closePath();
    ctx.fill();
    // Wing crease
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.4;
    ctx.beginPath(); ctx.moveTo(30,0); ctx.lineTo(-10,0); ctx.stroke();
    // Ailerons (small flaps at trailing edge)
    ctx.fillStyle = '#acf900';
    ctx.globalAlpha = 0.7;
    // Top aileron - deflected up
    ctx.beginPath();
    ctx.moveTo(-14, -10);
    ctx.lineTo(-18, -10);
    ctx.lineTo(-20, -14);
    ctx.lineTo(-16, -12);
    ctx.closePath();
    ctx.fill();
    // Bottom aileron - deflected down
    ctx.beginPath();
    ctx.moveTo(-14, 10);
    ctx.lineTo(-18, 10);
    ctx.lineTo(-20, 14);
    ctx.lineTo(-16, 12);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    // Curved arrow showing roll
    ctx.strokeStyle = P.secondary;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(rightCx, 130, 50, -0.8, 0.8);
    ctx.stroke();
    // Arrowhead
    var aex = rightCx + 50 * Math.cos(0.8);
    var aey = 130 + 50 * Math.sin(0.8);
    ctx.fillStyle = P.secondary;
    ctx.beginPath();
    ctx.moveTo(aex, aey);
    ctx.lineTo(aex - 6, aey - 4);
    ctx.lineTo(aex - 2, aey + 5);
    ctx.closePath();
    ctx.fill();

    // Effect text
    var ailLines = t_fn('f2AilEff').split('\n');
    ctx.fillStyle = P.muted;
    ctx.font = "11px 'Noto Sans SC', sans-serif";
    ctx.textAlign = 'center';
    for (var i = 0; i < ailLines.length; i++) {
      ctx.fillText(ailLines[i], rightCx, 195 + i * 18);
    }

    // Curved trajectory for aileron plane
    drawTrajectory(ctx, rightCx - 50, 245, rightCx, 230, rightCx + 70, 270, P.secondary, false);

    return true;
  }

  if (f === 3) {
    // Frame 3: Comparison table -- 3 modifications
    ctx.fillStyle = P.text;
    ctx.font = "bold 16px 'Noto Sans SC', 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t_fn('f3Title'), cx, 30);

    var colW = (W - 40) / 3;
    var colStart = 20;
    var headY = 55;
    var iconY = 100;
    var barStartY = 160;

    var mods = [
      {name: t_fn('f3Weight'), color: P.primary,   stab: 0.9, dist: 0.75, diff: 0.3,
       stabL: t_fn('f3High'), distL: t_fn('f3Med'), diffL: t_fn('f3Easy'),
       desc: t_fn('f3WeightP')},
      {name: t_fn('f3Wing'),   color: P.tertiary,  stab: 0.7, dist: 0.8,  diff: 0.5,
       stabL: t_fn('f3Med'), distL: t_fn('f3High'), diffL: t_fn('f3Normal'),
       desc: t_fn('f3WingP')},
      {name: t_fn('f3Tail'),   color: P.secondary, stab: 0.8, dist: 0.6,  diff: 0.8,
       stabL: t_fn('f3High'), distL: t_fn('f3Med'), diffL: t_fn('f3Hard'),
       desc: t_fn('f3TailP')},
    ];

    for (var m = 0; m < 3; m++) {
      var mod = mods[m];
      var mcx = colStart + colW * m + colW / 2;

      // Column header
      ctx.fillStyle = mod.color;
      ctx.font = "bold 13px 'Space Grotesk', 'Noto Sans SC', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(mod.name, mcx, headY);

      // Icon area -- small plane illustrations
      if (m === 0) {
        drawPlane(ctx, mcx, iconY, 1.8, -0.05, '#d0d8f0', '#acf900');
      } else if (m === 1) {
        ctx.save();
        ctx.translate(mcx, iconY);
        drawWingtipFold(ctx, 0, 0, 1.8, true);
        ctx.restore();
      } else {
        // Plane with tail fin
        ctx.save();
        ctx.translate(mcx, iconY);
        ctx.scale(1.8, 1.8);
        ctx.fillStyle = '#d0d8f0';
        ctx.beginPath();
        ctx.moveTo(30, 0);
        ctx.lineTo(-18, -14);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-18, 14);
        ctx.closePath();
        ctx.fill();
        // Tail fin
        ctx.fillStyle = '#acf900';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(-16, 0);
        ctx.lineTo(-22, -10);
        ctx.lineTo(-22, 0);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Rating bars
      var barW = colW * 0.6;
      var barH = 10;
      var barX = mcx - barW / 2;
      var metrics = [
        {label: t_fn('f3Stab'), val: mod.stab, valLabel: mod.stabL},
        {label: t_fn('f3Dist'), val: mod.dist, valLabel: mod.distL},
        {label: t_fn('f3Diff'), val: mod.diff, valLabel: mod.diffL},
      ];

      for (var b = 0; b < 3; b++) {
        var by = barStartY + b * 32;
        // Label
        ctx.fillStyle = P.muted;
        ctx.font = "9px 'Space Grotesk', 'Noto Sans SC', sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText(metrics[b].label, mcx, by);
        // Bar background
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(barX, by + 4, barW, barH);
        // Bar fill
        ctx.fillStyle = mod.color;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(barX, by + 4, barW * metrics[b].val, barH);
        ctx.globalAlpha = 1;
        // Value label
        ctx.fillStyle = mod.color;
        ctx.font = "bold 9px 'Space Grotesk', sans-serif";
        ctx.fillText(metrics[b].valLabel, mcx, by + 24);
      }

      // Description text at bottom
      var descLines = mod.desc.split('\n');
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = "10px 'Noto Sans SC', sans-serif";
      ctx.textAlign = 'center';
      for (var d = 0; d < descLines.length; d++) {
        ctx.fillText(descLines[d], mcx, 270 + d * 16);
      }

      // Column separator
      if (m < 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(colStart + colW * (m + 1), headY - 10);
        ctx.lineTo(colStart + colW * (m + 1), 310);
        ctx.stroke();
      }
    }

    return true;
  }

  return false;
}

AnimRuntime.boot();
</script>
