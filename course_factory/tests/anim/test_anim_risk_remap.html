<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>Risk Remapping Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden;background:#131313;color:#e5e2e1;font-family:'Noto Sans SC','Inter',sans-serif}
.wrapper{display:flex;flex-direction:column;height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px 8px;border-bottom:1px solid rgba(138,136,134,0.15)}
.title-area{display:flex;flex-direction:column}
.title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#ffb59c;letter-spacing:0.5px}
.subtitle{font-size:11px;color:#8a8886;margin-top:2px}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px}
.canvas-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative}
canvas{width:100%;height:100%;display:block}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 0;background:rgba(28,27,27,0.92)}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 16px;cursor:pointer;border:1px solid rgba(138,136,134,0.15);background:rgba(53,53,52,0.7);color:#e5e2e1;letter-spacing:0.5px}
.ctrl-btn:hover{border-color:#ffb59c;color:#ffb59c}
.hud{display:flex;justify-content:space-around;align-items:center;padding:8px 16px;background:rgba(0,0,0,0.55);min-height:44px}
.hud-item{display:flex;flex-direction:column;align-items:center}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#8a8886}
.hud-value{font-family:'Space Grotesk',sans-serif;font-size:13px;color:#e5e2e1;font-weight:500;margin-top:2px}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#ffb59c}
.guide-panel ul{padding-left:16px;line-height:1.7;font-size:11px}
.guide-content.collapsed{display:none}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guidePanel">
<h3 id="guideToggle"><span id="guideTitle"></span><span id="guideArrow">-</span></h3>
<div class="guide-content" id="guideContent">
<p id="guideDesc" style="margin-bottom:8px"></p>
<ul id="guidePoints"></ul>
<p id="guideTakeaway" style="margin-top:8px;font-style:italic;color:#ffb59c;font-size:11px"></p>
</div>
</div>
<div class="wrapper">
<div class="header">
<div class="title-area">
<div class="title" id="mainTitle"></div>
<div class="subtitle" id="mainSubtitle"></div>
</div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn" id="btnNext"></button>
<span style="font-family:'Space Grotesk',sans-serif;font-size:12px;color:#8a8886;margin-left:8px" id="frameCounter"></span>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-value" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-value" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-value" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-value" id="hudV4"></div></div>
</div>
</div>
<script>
(function(){
var LANG='cn';
var I18N={
  title:{en:'RISK REMAPPING PIPELINE',cn:'\u91cd\u7f16\u7801\uff1a\u6807\u7b7e\u53d8\u98ce\u9669'},
  subtitle:{en:'P-MARS-01-M21 \u00b7 Segmentation to Risk Map',cn:'P-MARS-01-M21 \u00b7 \u5206\u5272\u6807\u7b7e\u5230\u98ce\u9669\u5730\u56fe'},
  btnPrev:{en:'PREV',cn:'\u4e0a\u4e00\u5e27'},
  btnPlay:{en:'PLAY',cn:'\u64ad\u653e'},
  btnPause:{en:'PAUSE',cn:'\u6682\u505c'},
  btnNext:{en:'NEXT',cn:'\u4e0b\u4e00\u5e27'},
  guideTitle:{en:'GUIDE',cn:'\u64cd\u4f5c\u6307\u5357'},
  guideDesc:{en:'Shows how segmentation labels are remapped to navigable risk values via a lookup table (LUT).',cn:'\u5c55\u793a\u5206\u5272\u6807\u7b7e\u5982\u4f55\u7ecf\u8fc7\u67e5\u627e\u8868\uff08LUT\uff09\u9010\u6b65\u53d8\u6210\u53ef\u7528\u4e8e\u5bfc\u822a\u7684\u98ce\u9669\u6570\u503c'},
  guideP1:{en:'Each terrain class gets a risk value from the LUT',cn:'\u6ce8\u610f\u6bcf\u79cd\u5730\u8c8c\u7c7b\u522b\u5bf9\u5e94\u7684\u98ce\u9669\u503c\u4e0d\u662f\u7b80\u5355\u7f16\u53f7'},
  guideP2:{en:'Observe how different terrains get different risk colors',cn:'\u89c2\u5bdf\u4e0d\u540c\u5730\u8c8c\u7684\u98ce\u9669\u8272\u5dee\u5f02'},
  guideP3:{en:'Unknown areas get high risk due to uncertainty penalty',cn:'\u5173\u6ce8 unknown \u533a\u57df\u88ab\u8d4b\u4e88\u8f83\u9ad8\u98ce\u9669\u503c\u7684\u539f\u56e0'},
  guideTakeaway:{en:'Remapping = mission-dependent LUT lookup',cn:'\u91cd\u7f16\u7801\u7684\u672c\u8d28\u662f\u4efb\u52a1\u76f8\u5173\u7684\u67e5\u8868\u6620\u5c04'},
  controls:{en:'Use PREV/NEXT to step through, PLAY for auto',cn:'\u4f7f\u7528 PREV/NEXT \u9010\u5e27\u5207\u6362\uff0cPLAY \u81ea\u52a8\u64ad\u653e'},
  hL1:{en:'FRAME',cn:'\u5e27'},
  hL2:{en:'STAGE',cn:'\u9636\u6bb5'},
  hL3:{en:'DATA',cn:'\u6570\u636e'},
  hL4:{en:'OUTPUT',cn:'\u8f93\u51fa'},
  f0stage:{en:'RAW TERRAIN',cn:'\u539f\u59cb\u5730\u8c8c'},
  f1stage:{en:'SEGMENTATION',cn:'\u8bed\u4e49\u5206\u5272'},
  f2stage:{en:'LUT LOOKUP',cn:'LUT \u67e5\u8868'},
  f3stage:{en:'RISK MAP',cn:'\u98ce\u9669\u5730\u56fe'},
  f0data:{en:'25 cells',cn:'25 \u4e2a\u7f51\u683c'},
  f1data:{en:'5 classes',cn:'5 \u79cd\u7c7b\u522b'},
  f2data:{en:'5 \u2192 0-4',cn:'5 \u2192 0-4'},
  f3data:{en:'64% passable',cn:'64% \u53ef\u901a\u884c'},
  f0out:{en:'gray image',cn:'\u7070\u5ea6\u56fe\u50cf'},
  f1out:{en:'label map',cn:'\u6807\u7b7e\u56fe'},
  f2out:{en:'risk values',cn:'\u98ce\u9669\u503c'},
  f3out:{en:'risk map',cn:'\u98ce\u9669\u5730\u56fe'},
  lbl_SOL:{en:'SOL',cn:'SOL'},
  lbl_BED:{en:'BED',cn:'BED'},
  lbl_SND:{en:'SND',cn:'SND'},
  lbl_ROK:{en:'ROK',cn:'ROK'},
  lbl_UNK:{en:'UNK',cn:'UNK'},
  lutTitle:{en:'LOOKUP TABLE',cn:'\u67e5\u627e\u8868 LUT'},
  riskLow:{en:'SAFE',cn:'\u5b89\u5168'},
  riskHigh:{en:'DANGER',cn:'\u5371\u9669'},
  navTitle:{en:'NAV-READY RISK MAP',cn:'\u5bfc\u822a\u53ef\u7528\u98ce\u9669\u5730\u56fe'},
  passable:{en:'PASSABLE',cn:'\u53ef\u901a\u884c'},
  narr0:{en:'Raw Mars terrain',cn:'\u539f\u59cb\u706b\u661f\u5730\u8c8c'},
  narr1:{en:'Segmentation labels applied',cn:'\u5206\u5272\u6a21\u578b\u7ed9\u51fa\u5730\u8c8c\u5206\u7c7b'},
  narr2:{en:'LUT translates labels to risk',cn:'LUT \u628a\u6807\u7b7e\u7ffb\u8bd1\u6210\u98ce\u9669\u503c'},
  narr3:{en:'Navigation-ready risk map',cn:'\u5bfc\u822a\u7cfb\u7edf\u53ef\u7528\u7684\u98ce\u9669\u5730\u56fe'}
};
function t(k){return(I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k]['en'])||k;}

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
var currentFrame=0,totalFrames=4;
var playing=false,playTimer=null;
var transitioning=false;

// Grid data: 5x5 terrain map
// 0=soil, 1=bedrock, 2=sand, 3=big_rock, 4=unknown
var terrainGrid=[
  [1,1,0,2,4],
  [0,1,0,2,2],
  [0,0,3,2,4],
  [1,0,0,3,3],
  [1,1,0,0,4]
];
var terrainLabels=['SOL','BED','SND','ROK','UNK'];
var terrainNames=['lbl_SOL','lbl_BED','lbl_SND','lbl_ROK','lbl_UNK'];
// Semantic colors for segmentation view
var semanticColors=['#c4a882','#8b9dc3','#e8d44d','#d35400','#7f8c8d'];
// Risk LUT: soil=1, bedrock=0, sand=2, big_rock=4, unknown=3
var riskLUT=[1,0,2,4,3];
// Risk colors: 0=green, 1=lime, 2=yellow, 3=orange, 4=red
var riskColors=['#22c55e','#84cc16','#eab308','#f97316','#ef4444'];
// Gray tones for raw view
var grayTones=['#6b6b6b','#8a8a8a','#5a5a5a','#4a4a4a','#707070'];
// Texture patterns per terrain
var texturePatterns=[
  function(cx,cy,s){/* soil: dots */
    ctx.fillStyle='rgba(255,255,255,0.15)';
    for(var i=0;i<4;i++){ctx.beginPath();ctx.arc(cx-s*0.2+i*s*0.15,cy-s*0.1+i*s*0.08,1.5,0,Math.PI*2);ctx.fill();}
  },
  function(cx,cy,s){/* bedrock: horizontal lines */
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
    for(var i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(cx-s*0.3,cy+i*s*0.12);ctx.lineTo(cx+s*0.3,cy+i*s*0.12);ctx.stroke();}
  },
  function(cx,cy,s){/* sand: wavy */
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.beginPath();
    ctx.moveTo(cx-s*0.3,cy);ctx.quadraticCurveTo(cx-s*0.1,cy-s*0.1,cx,cy);ctx.quadraticCurveTo(cx+s*0.1,cy+s*0.1,cx+s*0.3,cy);ctx.stroke();
  },
  function(cx,cy,s){/* rock: angular */
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;ctx.beginPath();
    ctx.moveTo(cx-s*0.15,cy+s*0.15);ctx.lineTo(cx,cy-s*0.15);ctx.lineTo(cx+s*0.15,cy+s*0.1);ctx.closePath();ctx.stroke();
  },
  function(cx,cy,s){/* unknown: ? */
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold '+Math.round(s*0.35)+'px Space Grotesk';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',cx,cy);
  }
];

function lerp(a,b,p){return a+(b-a)*p;}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function merge(base,over){var r={};for(var k in base)r[k]=base[k];for(var k2 in over)r[k2]=over[k2];return r;}

function resize(){
  var wrap=canvas.parentElement;
  var rect=wrap.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return;
  W=rect.width;H=rect.height;
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawFrame(currentFrame);
}

function drawBg(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#131313');g.addColorStop(1,'#1a1035');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// Compute cell size based on canvas
function gridMetrics(gx,gy,gw,gh){
  var cs=Math.min(gw,gh)/5;
  var ox=gx+(gw-cs*5)/2;
  var oy=gy+(gh-cs*5)/2;
  return{cs:cs,ox:ox,oy:oy};
}

function drawCell(x,y,w,h,color,label,labelColor,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  // gradient fill
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,color);
  // slightly darker at bottom
  g.addColorStop(1,darken(color,0.2));
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  // border
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
  // label
  if(label){
    ctx.fillStyle=labelColor||'rgba(255,255,255,0.9)';
    ctx.font='bold '+Math.max(10,Math.round(w*0.22))+'px Space Grotesk';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,x+w/2,y+h/2);
  }
  ctx.restore();
}

function darken(hex,amount){
  var r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*(1-amount));g2=Math.round(g2*(1-amount));b=Math.round(b*(1-amount));
  return'#'+((1<<24)|(r<<16)|(g2<<8)|b).toString(16).slice(1);
}

// --- Frame Elements (declarative) ---
function getFrameElements(f){
  var elems=[];
  var gridW=Math.min(W*0.42,H*0.7);
  var gridH=gridW;
  var gx,gy;

  if(f<=1){
    gx=W*0.5-gridW/2; gy=H*0.12;
  } else {
    gx=W*0.08; gy=H*0.12;
  }

  // Title / narration at top
  var narrKey='narr'+f;
  elems.push({id:'narr',type:'label',text:t(narrKey),x:W*0.5,y:H*0.06,color:'#ffb59c',size:14,align:'center',alpha:1});

  // Grid element
  elems.push({id:'grid',type:'custom',x:gx,y:gy,w:gridW,h:gridH,alpha:1,
    frameIdx:f,
    draw:function(alpha){
      drawGridForFrame(this.frameIdx,this.x,this.y,this.w,this.h,alpha);
    }
  });

  // LUT panel (frames 2-3 only)
  if(f>=2){
    var lutX=gx+gridW+W*0.06;
    var lutY=gy;
    var lutW=Math.min(W*0.35,220);
    var lutH=gridH*0.7;
    elems.push({id:'lut',type:'custom',x:lutX,y:lutY,w:lutW,h:lutH,alpha:1,
      frameIdx:f,
      draw:function(alpha){
        drawLUTPanel(this.x,this.y,this.w,this.h,alpha,this.frameIdx);
      }
    });
  }

  // Risk bar (frame 3)
  if(f===3){
    var barX=gx;
    var barY=gy+gridH+16;
    var barW=gridW;
    elems.push({id:'riskbar',type:'custom',x:barX,y:barY,w:barW,h:24,alpha:1,
      draw:function(alpha){
        drawRiskBar(this.x,this.y,this.w,this.h,alpha);
      }
    });
    // passable stat
    elems.push({id:'passable',type:'label',text:'64% '+t('passable'),x:gx+gridW/2,y:barY+50,color:'#22c55e',size:16,align:'center',alpha:1});
  }

  return elems;
}

function drawGridForFrame(f,gx,gy,gw,gh,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var m=gridMetrics(gx,gy,gw,gh);
  var cs=m.cs,ox=m.ox,oy=m.oy;
  for(var r=0;r<5;r++){
    for(var c=0;c<5;c++){
      var ti=terrainGrid[r][c];
      var x=ox+c*cs,y=oy+r*cs;
      var color,label,labelColor;
      if(f===0){
        color=grayTones[ti];label='';labelColor='';
      } else if(f===1){
        color=semanticColors[ti];
        label=t(terrainNames[ti]);
        labelColor='rgba(255,255,255,0.95)';
      } else if(f===2){
        // transition from semantic to risk color
        var rc=riskColors[riskLUT[ti]];
        color=rc;
        label=''+riskLUT[ti];
        labelColor='rgba(255,255,255,0.95)';
      } else {
        color=riskColors[riskLUT[ti]];
        label=''+riskLUT[ti];
        labelColor='rgba(255,255,255,0.95)';
      }
      drawCell(x,y,cs-2,cs-2,color,label,labelColor,1);
      // texture for frame 0
      if(f===0){
        texturePatterns[ti](x+cs/2,y+cs/2,cs);
      }
    }
  }
  ctx.restore();
}

function drawLUTPanel(px,py,pw,ph,alpha,frameIdx){
  ctx.save();ctx.globalAlpha=alpha;
  // panel bg
  ctx.fillStyle='rgba(28,27,27,0.92)';
  ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='rgba(255,181,156,0.3)';ctx.lineWidth=1;
  ctx.strokeRect(px,py,pw,ph);
  // title
  ctx.fillStyle='#ffb59c';
  ctx.font='bold 12px Space Grotesk';ctx.textAlign='center';
  ctx.fillText(t('lutTitle'),px+pw/2,py+20);
  // rows
  var rowH=(ph-40)/5;
  var labels=['SOL','BED','SND','ROK','UNK'];
  var riskVals=[1,0,2,4,3];
  for(var i=0;i<5;i++){
    var ry=py+35+i*rowH;
    // semantic color swatch
    ctx.fillStyle=semanticColors[i];
    ctx.fillRect(px+10,ry,16,16);
    // label
    ctx.fillStyle='#e5e2e1';ctx.font='12px Space Grotesk';ctx.textAlign='left';
    ctx.fillText(labels[i],px+32,ry+13);
    // arrow
    ctx.fillStyle='#8a8886';ctx.font='12px Space Grotesk';
    ctx.fillText('\u2192',px+pw*0.45,ry+13);
    // risk value + color
    var rv=riskVals[i];
    ctx.fillStyle=riskColors[rv];
    ctx.fillRect(px+pw*0.58,ry,16,16);
    ctx.fillStyle='#e5e2e1';ctx.font='bold 12px Space Grotesk';ctx.textAlign='left';
    ctx.fillText(''+rv,px+pw*0.58+22,ry+13);
    // highlight active row in frame 2
    if(frameIdx===2){
      ctx.strokeStyle='rgba(255,181,156,0.4)';ctx.lineWidth=1;
      ctx.strokeRect(px+4,ry-3,pw-8,rowH-2);
    }
  }
  ctx.restore();
}

function drawRiskBar(bx,by,bw,bh,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createLinearGradient(bx,by,bx+bw,by);
  g.addColorStop(0,'#22c55e');g.addColorStop(0.25,'#84cc16');g.addColorStop(0.5,'#eab308');g.addColorStop(0.75,'#f97316');g.addColorStop(1,'#ef4444');
  ctx.fillStyle=g;ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  // labels
  ctx.fillStyle='#22c55e';ctx.font='10px Space Grotesk';ctx.textAlign='left';
  ctx.fillText('0 '+t('riskLow'),bx,by+bh+14);
  ctx.fillStyle='#ef4444';ctx.textAlign='right';
  ctx.fillText('4 '+t('riskHigh'),bx+bw,by+bh+14);
  ctx.restore();
}

function drawElement(el){
  if(!el||el.alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=el.alpha;
  switch(el.type){
    case 'label':
      ctx.fillStyle=el.color||'#e5e2e1';
      ctx.font=(el.size>=14?'bold ':'')+el.size+'px '+(el.size>=14?'Space Grotesk':'Noto Sans SC');
      ctx.textAlign=el.align||'center';ctx.textBaseline='middle';
      ctx.fillText(el.text,el.x,el.y);
      break;
    case 'custom':
      el.draw.call(el,el.alpha);
      break;
  }
  ctx.restore();
}

function drawFrame(f){
  drawBg();
  var elems=getFrameElements(f);
  elems.forEach(function(el){drawElement(el);});
}

function transitionTo(newFrame){
  if(newFrame<0)newFrame=0;
  if(newFrame>=totalFrames)newFrame=totalFrames-1;
  if(newFrame===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return;}
  if(transitioning)return;

  var oldElems=getFrameElements(currentFrame);
  var newElems=getFrameElements(newFrame);
  var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e;});
  var newMap={};newElems.forEach(function(e){newMap[e.id]=e;});

  currentFrame=newFrame;
  updateHUD(newFrame);
  transitioning=true;

  var startTime=null;
  var duration=500;

  function step(timestamp){
    if(!startTime)startTime=timestamp;
    var raw=Math.min((timestamp-startTime)/duration,1);
    var p=easeInOut(raw);

    drawBg();

    // old-only: fade out
    oldElems.forEach(function(oe){
      if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}));
    });

    // new elements
    newElems.forEach(function(ne){
      var oe=oldMap[ne.id];
      if(oe){
        // shared element lerp
        var merged=merge(ne,{
          x:lerp(oe.x||0,ne.x||0,p),
          y:lerp(oe.y||0,ne.y||0,p),
          w:lerp(oe.w||0,ne.w||0,p),
          h:lerp(oe.h||0,ne.h||0,p),
          alpha:1
        });
        if((ne.type==='label')&&oe.text!==ne.text){
          drawElement(merge(oe,{alpha:1-p}));
          drawElement(merge(ne,{alpha:p}));
        } else {
          drawElement(merged);
        }
      } else {
        drawElement(merge(ne,{alpha:p}));
      }
    });

    if(raw<1){requestAnimationFrame(step);}
    else{transitioning=false;}
  }
  requestAnimationFrame(step);
}

function updateHUD(f){
  var stageKeys=['f0stage','f1stage','f2stage','f3stage'];
  var dataKeys=['f0data','f1data','f2data','f3data'];
  var outKeys=['f0out','f1out','f2out','f3out'];
  document.getElementById('hudV1').textContent=(f+1)+' / '+totalFrames;
  document.getElementById('hudV2').textContent=t(stageKeys[f]);
  document.getElementById('hudV3').textContent=t(dataKeys[f]);
  document.getElementById('hudV4').textContent=t(outKeys[f]);
  document.getElementById('frameCounter').textContent=(f+1)+'/'+totalFrames;
}

function refreshI18N(){
  document.getElementById('mainTitle').textContent=t('title');
  document.getElementById('mainSubtitle').textContent=t('subtitle');
  document.getElementById('btnPrev').textContent=t('btnPrev');
  document.getElementById('btnPlay').textContent=playing?t('btnPause'):t('btnPlay');
  document.getElementById('btnNext').textContent=t('btnNext');
  document.getElementById('guideTitle').textContent=t('guideTitle');
  document.getElementById('guideDesc').textContent=t('guideDesc');
  document.getElementById('guideTakeaway').textContent=t('guideTakeaway');
  var pts=document.getElementById('guidePoints');
  pts.innerHTML='';
  ['guideP1','guideP2','guideP3'].forEach(function(k){
    var li=document.createElement('li');li.textContent=t(k);pts.appendChild(li);
  });
  document.getElementById('hudL1').textContent=t('hL1');
  document.getElementById('hudL2').textContent=t('hL2');
  document.getElementById('hudL3').textContent=t('hL3');
  document.getElementById('hudL4').textContent=t('hL4');
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  updateHUD(currentFrame);
  drawFrame(currentFrame);
}

// Events
document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='en'?'cn':'en';
  refreshI18N();
});

document.getElementById('btnPrev').addEventListener('click',function(){
  if(playing)stopPlay();
  transitionTo(currentFrame-1);
});

document.getElementById('btnNext').addEventListener('click',function(){
  if(playing)stopPlay();
  transitionTo(currentFrame+1);
});

document.getElementById('btnPlay').addEventListener('click',function(){
  if(playing){stopPlay();return;}
  playing=true;
  document.getElementById('btnPlay').textContent=t('btnPause');
  if(currentFrame>=totalFrames-1)currentFrame=-1;
  function tick(){
    if(!playing)return;
    if(currentFrame<totalFrames-1){
      transitionTo(currentFrame+1);
      playTimer=setTimeout(tick,1800);
    } else {
      stopPlay();
    }
  }
  tick();
});

function stopPlay(){
  playing=false;
  if(playTimer){clearTimeout(playTimer);playTimer=null;}
  document.getElementById('btnPlay').textContent=t('btnPlay');
}

document.getElementById('guideToggle').addEventListener('click',function(){
  var gc=document.getElementById('guideContent');
  var arr=document.getElementById('guideArrow');
  if(gc.classList.contains('collapsed')){gc.classList.remove('collapsed');arr.textContent='-';}
  else{gc.classList.add('collapsed');arr.textContent='+';}
});

window.addEventListener('resize',resize);
refreshI18N();
resize();
setTimeout(resize,200);
setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});
})();
</script>
</body>
</html>
