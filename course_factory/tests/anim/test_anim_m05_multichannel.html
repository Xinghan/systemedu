<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>很多电极一起听 - 多通道脑波的空间分布</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 (所有 26 套统一) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);

    /* 第 2 层 — neuro 学科 accent (cortex-coral) */
    --accent: oklch(0.75 0.17 25);

    /* 第 3 层 — neuro 5 色 palette (Cortex Map) */
    --synaptic: oklch(0.75 0.17 25);
    --dendrite: oklch(0.55 0.15 25);
    --axon:     oklch(0.32 0.10 25);
    --firing:   oklch(0.92 0.08 25);
    --memory:   oklch(0.85 0.14 85);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
    font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
    display:flex;
  }
  .sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--bg-1);border-right:1px solid var(--line);
    padding:18px 16px;display:flex;flex-direction:column;gap:14px;
  }
  .brand{font-size:11px;letter-spacing:0.14em;color:var(--fg-mute);
         font-family:'JetBrains Mono',monospace;}
  .brand b{color:var(--accent);}
  .title{font-size:16px;font-weight:700;color:var(--fg);line-height:1.35;}
  .subtitle{font-size:11px;color:var(--fg-dim);line-height:1.5;font-style:italic;}
  .mascot-wrap{display:flex;justify-content:center;padding:6px 0;}
  .guide{display:flex;flex-direction:column;gap:8px;}
  .guide-li{
    font-size:11px;color:var(--fg-dim);line-height:1.5;
    padding:6px 8px;border-left:2px solid var(--accent);
    background:var(--bg-2);
  }
  .lang-btn{
    margin-top:auto;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    padding:8px 12px;background:var(--bg-2);color:var(--fg);
    border:1px solid var(--line-strong);cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);
  }
  .lang-btn:active{transform:translate(2px,2px);box-shadow:none;}

  main{flex:1;height:100vh;position:relative;overflow:hidden;}
  canvas#stage{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hud{
    position:absolute;top:14px;right:14px;
    background:oklch(0.18 0.04 265 / 0.78);backdrop-filter:blur(6px);
    border:1px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0);
    padding:10px 14px;font-family:'JetBrains Mono',monospace;
    font-size:11px;min-width:188px;
  }
  .hud-ttl{font-size:10px;letter-spacing:0.12em;color:var(--accent);
           font-weight:700;margin-bottom:4px;}
  .hud-stage{font-size:15px;font-weight:700;color:var(--fg);}
  .hud-sub{color:var(--fg-dim);margin-top:3px;font-size:11px;}
  .hud-val{color:var(--gold);margin-top:5px;font-size:11px;}

  .subtitles{
    position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    text-align:center;max-width:78%;
    pointer-events:none;
  }
  .sub-zh{font-size:18px;font-weight:700;color:var(--fg);line-height:1.4;}
  .sub-en{font-size:12px;font-style:italic;color:var(--fg-mute);margin-top:4px;}
  .sub-zh.gold{color:var(--gold);}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><b>NRO-20</b> / CORTEX MAP</div>
    <div class="title" id="ttl">很多电极一起听</div>
    <div class="subtitle" id="subtitle">为什么要在头上放这么多电极?</div>

    <div class="mascot-wrap">
      <svg width="80" height="86" viewBox="0 0 80 86" aria-label="Spark mascot">
        <defs>
          <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"  stop-color="oklch(0.92 0.08 25)" stop-opacity="0.95"/>
            <stop offset="55%" stop-color="oklch(0.75 0.17 25)" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="oklch(0.55 0.15 25)" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="40" cy="42" rx="24" ry="27" fill="url(#sparkGlow)"
                 stroke="oklch(0.75 0.17 25)" stroke-width="1.4" opacity="0.85"/>
        <path d="M40 56 L40 40 M40 40 L30 30 M30 30 L24 24 M30 30 L34 22
                 M40 40 L50 30 M50 30 L56 24 M50 30 L46 22 M40 40 L40 26"
              fill="none" stroke="oklch(0.75 0.17 25)" stroke-width="2"
              stroke-linecap="round"/>
        <circle cx="24" cy="24" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0s" repeatCount="indefinite"/>
        </circle>
        <circle cx="34" cy="22" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="26" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="1.0s" repeatCount="indefinite"/>
        </circle>
        <circle cx="46" cy="22" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="56" cy="24" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="42" r="4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="r" values="3.2;5;3.2" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <text x="40" y="80" text-anchor="middle" font-family="JetBrains Mono,monospace"
              font-size="8" fill="oklch(0.55 0.03 265)" letter-spacing="1">SPARK</text>
      </svg>
    </div>

    <div class="guide">
      <div class="guide-li" id="g1">每个电极贴在头皮不同位置</div>
      <div class="guide-li" id="g2">不同位置抓到不同的波</div>
      <div class="guide-li" id="g3">C3/C4 在运动区 管手脚</div>
    </div>

    <button id="langBtn" class="lang-btn">CN / EN</button>
  </aside>

  <main>
    <canvas id="stage"></canvas>
    <div class="hud">
      <div class="hud-ttl" id="hudTtl">阶段</div>
      <div class="hud-stage" id="hudStage">头顶俯视</div>
      <div class="hud-sub" id="hudSub">电极阵列就位</div>
      <div class="hud-val" id="hudVal">8 个通道</div>
    </div>
    <div class="subtitles">
      <div class="sub-zh" id="subZh">这是从头顶往下看, 每个亮点是一个电极, 贴在头皮不同位置。</div>
      <div class="sub-en" id="subEn">Top-down view of the head. Each dot is one electrode, on a different scalp spot.</div>
    </div>
  </main>

<script>
(function(){
  "use strict";

  var LANG = 'cn';

  // ---- 8 个电极 (10-20 系统简化), 头顶俯视坐标用极坐标 (角度 deg, 半径比例) ----
  // 主角 C3 / C4 在运动区 (左右两侧靠中). 不同区域给不同节律特征.
  // band: 'alpha' 枕叶强 alpha, 'mu' 运动区 mu(~10Hz 但带 beta), 'mixed' 额叶杂, 'low' 弱
  var ELECS = [
    {id:'Fp1', ang:-58, r:0.86, band:'mixed', amp:0.55, hero:false},
    {id:'Fp2', ang: 58, r:0.86, band:'mixed', amp:0.55, hero:false},
    {id:'C3',  ang:-90, r:0.46, band:'mu',    amp:0.85, hero:true },
    {id:'Cz',  ang:  0, r:0.00, band:'low',   amp:0.40, hero:false},
    {id:'C4',  ang: 90, r:0.46, band:'mu',    amp:0.85, hero:true },
    {id:'P3',  ang:-130,r:0.62, band:'alpha', amp:0.70, hero:false},
    {id:'P4',  ang: 130,r:0.62, band:'alpha', amp:0.70, hero:false},
    {id:'Oz',  ang:180, r:0.84, band:'alpha', amp:1.00, hero:false}
  ];
  var NCH = ELECS.length;

  // 每个电极的波形合成 (确定式, 单位归一 -1..1 已乘 amp). 体现"位置不同 -> 波不同".
  var FS = 256, SECONDS = 2.0;
  var NS = Math.round(FS*SECONDS);
  function buildWave(e, seed){
    var w = [];
    for (var i=0;i<NS;i++){
      var tt = i/FS, v=0;
      if (e.band==='alpha'){               // 枕/顶: 强 alpha 10Hz
        v += 1.00*Math.sin(2*Math.PI*10*tt + seed);
        v += 0.18*Math.sin(2*Math.PI*22*tt + seed*1.3);
      } else if (e.band==='mu'){           // 运动区: mu 10Hz + beta 20Hz 拱形
        v += 0.80*Math.sin(2*Math.PI*10*tt + seed);
        v += 0.45*Math.sin(2*Math.PI*20*tt + seed*0.7);
        v += 0.12*Math.sin(2*Math.PI*6*tt  + seed*2.1);
      } else if (e.band==='mixed'){        // 额叶: 慢 + 杂 + 慢漂
        v += 0.45*Math.sin(2*Math.PI*4*tt  + seed);
        v += 0.35*Math.sin(2*Math.PI*15*tt + seed*1.7);
        v += 0.30*Math.sin(2*Math.PI*2*tt  + seed*0.4);
      } else {                              // Cz: 弱而平
        v += 0.30*Math.sin(2*Math.PI*10*tt + seed);
        v += 0.20*Math.sin(2*Math.PI*7*tt  + seed*1.1);
      }
      v += 0.10*Math.sin(i*12.9898+seed)*Math.cos(i*4.1414); // 确定式噪声
      w.push(v*e.amp);
    }
    return w;
  }
  for (var ei=0; ei<NCH; ei++) ELECS[ei].wave = buildWave(ELECS[ei], ei*0.91 + 0.3);

  var canvas = document.getElementById('stage');
  var ctx = canvas.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    var host=canvas.parentElement, r=host.getBoundingClientRect();
    if (r.width<2||r.height<2) return;
    W=r.width;H=r.height;
    canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  setTimeout(resize,60); setTimeout(resize,400);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(resize);

  var CSSV=function(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();};

  // ---- 连续时间轴: 一个对象 (多通道空间分布) 的连续演化, 不是翻页 ----
  // 阶段是同一对象的承接深化, 用平滑过渡参数控制几何变形.
  // S0 阵列就位 -> S1 波从电极位置长出 -> S2 并排展开成堆叠图 -> S3 高亮 C3/C4 (wow gold)
  // -> S4 对比不同位置的波各不相同 (枕 alpha / 运动 mu) -> loop
  var STAGE_DUR = [5200, 6000, 6500, 7000, 7800];
  var NSTAGE = STAGE_DUR.length;
  var CYCLE = STAGE_DUR.reduce(function(a,b){return a+b;},0);
  var startT=null, lastStageShown=-1;

  function clock(now){
    if (startT===null) startT=now;
    var el=(now-startT)%CYCLE;
    var acc=0, idx=0, local=0;
    for (var s=0;s<NSTAGE;s++){
      if (el < acc+STAGE_DUR[s]){ idx=s; local=(el-acc)/STAGE_DUR[s]; break; }
      acc+=STAGE_DUR[s];
    }
    return {idx:idx, u:local, t:now, el:el};
  }
  function ease(u){return u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;}
  function clamp(x){return x<0?0:(x>1?1:x);}
  function lerp(a,b,u){return a+(b-a)*u;}

  // 头部俯视圆 (左半舞台). 同一组电极坐标在两套布局间插值:
  //  layout A = 头皮极坐标(俯视圆);  layout B = 右侧并排堆叠的多通道行.
  function headGeom(){
    var cx=W*0.30, cy=H*0.50, R=Math.min(W*0.20, H*0.36);
    return {cx:cx, cy:cy, R:R};
  }
  function elecHeadXY(e, g){
    var a=(e.ang-90)*Math.PI/180;           // -90 让 0deg 朝上(鼻方向)
    return {x:g.cx + Math.cos(a)*g.R*e.r, y:g.cy + Math.sin(a)*g.R*e.r};
  }
  function stackGeom(){
    var x0=W*0.50, x1=W*0.93;
    var top=H*0.18, bot=H*0.88;
    var rowH=(bot-top)/NCH;
    return {x0:x0, x1:x1, top:top, rowH:rowH, amp:rowH*0.36};
  }
  function elecStackXY(i, sg){
    return {x:sg.x0, y:sg.top + sg.rowH*(i+0.5)};
  }

  // 画头部俯视轮廓 + 鼻 + 耳
  function drawHead(g, alpha){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = CSSV('--line-strong');
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(g.cx, g.cy, g.R, 0, Math.PI*2); ctx.stroke();
    // 鼻 (朝上的小三角)
    ctx.beginPath();
    ctx.moveTo(g.cx-9, g.cy-g.R+2);
    ctx.lineTo(g.cx,   g.cy-g.R-12);
    ctx.lineTo(g.cx+9, g.cy-g.R+2);
    ctx.stroke();
    // 双耳
    ctx.beginPath(); ctx.arc(g.cx-g.R, g.cy, 9, Math.PI*0.5, Math.PI*1.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(g.cx+g.R, g.cy, 9, -Math.PI*0.5, Math.PI*0.5); ctx.stroke();
    // 内圈 + 十字 (区域分隔感)
    ctx.strokeStyle = CSSV('--line');
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(g.cx, g.cy, g.R*0.46, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(g.cx-g.R, g.cy); ctx.lineTo(g.cx+g.R, g.cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(g.cx, g.cy-g.R); ctx.lineTo(g.cx, g.cy+g.R); ctx.stroke();
    ctx.restore();
  }

  // 取波形某通道在可见窗内的折线 (随 now 滚动 -> 持续起伏)
  function strokeWave(wave, baseX, endX, baseY, amp, now, winN, color, lw, glowOn, growU){
    var off = Math.floor((now/1000)*40);   // 滚动速度
    var n = winN;
    var drawN = Math.max(2, Math.floor(n * clamp(growU)));
    ctx.save();
    if (glowOn){ ctx.shadowColor=color; ctx.shadowBlur=7; }
    ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.beginPath();
    for (var k=0;k<drawN;k++){
      var idx=(k+off)%wave.length;
      var x=lerp(baseX, endX, k/(n-1));
      var y=baseY - wave[idx]*amp;
      if (k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // 电极点
  function drawElec(x, y, e, now, highlight, joy){
    var pulse=0.5+0.5*Math.sin(now/320 + e.ang);
    var col = highlight ? CSSV('--gold') : (e.hero ? CSSV('--firing') : CSSV('--synaptic'));
    ctx.save();
    ctx.fillStyle = col;
    ctx.globalAlpha = highlight ? (0.30+0.25*pulse) : 0.18;
    ctx.beginPath(); ctx.arc(x, y, highlight ? 16+joy*8 : 11, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x, y, highlight ? 6 : 4.5, 0, Math.PI*2); ctx.fill();
    if (highlight){
      ctx.strokeStyle = CSSV('--gold');
      ctx.globalAlpha = 0.5+0.4*pulse;
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(x, y, 12+joy*6, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
  function elecLabel(x, y, id, dim){
    ctx.fillStyle = dim ? CSSV('--fg-mute') : CSSV('--fg-dim');
    ctx.font = "700 11px 'JetBrains Mono',monospace";
    ctx.textAlign='center';
    ctx.fillText(id, x, y-12);
  }

  // 主绘制: 同一对象 (8 通道空间分布) 连续演化
  function draw(now){
    if (!W||!H){ requestAnimationFrame(draw); return; }
    var cl = clock(now);

    // 背景
    ctx.fillStyle=CSSV('--bg-0'); ctx.fillRect(0,0,W,H);
    // 微网格
    ctx.strokeStyle=CSSV('--line'); ctx.lineWidth=1;
    for (var gx=40;gx<W;gx+=64){ ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke(); }
    for (var gy=40;gy<H;gy+=64){ ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke(); }

    var g = headGeom();
    var sg = stackGeom();
    var idx = cl.idx, u = cl.u;

    // ---- 连续控制参数 (整段动画里平滑推进, 阶段只是给它打节拍) ----
    var grow=0, unfold=0, heroOn=0, compare=0, headFade=1, joy=0;
    if (idx===0){ grow=ease(clamp((u-0.4)/0.6))*0.25; }
    else if (idx===1){ grow=0.25+ease(u)*0.75; }
    else if (idx===2){ grow=1; unfold=ease(u); }
    else if (idx===3){ grow=1; unfold=1; heroOn=ease(clamp(u/0.5)); joy=ease(clamp((u-0.2)/0.6)); }
    else { grow=1; unfold=1; heroOn=1; compare=ease(u); joy=0.4+0.3*Math.sin(now/500); }
    headFade = 1 - unfold*0.55;   // 展开后头图淡一点但不消失 (保留空间锚点)

    // ---- 头部俯视图 (始终在左, 是空间锚点) ----
    drawHead(g, 0.55+0.45*headFade);

    // ---- 8 通道: 每个电极在头皮位置 与 右侧堆叠行 之间插值, 波连续从位置长出 ----
    for (var i=0;i<NCH;i++){
      var e=ELECS[i];
      var hp=elecHeadXY(e,g);
      var sp=elecStackXY(i,sg);
      var ex=lerp(hp.x, sp.x, unfold);
      var ey=lerp(hp.y, sp.y, unfold);
      var isHero=e.hero;
      var hl = isHero && heroOn>0.05;

      var endX = lerp(ex + g.R*0.5, sg.x1, unfold);
      var amp  = lerp(g.R*0.10, sg.amp, unfold) * (0.7+0.3*grow);
      var col;
      if (hl) col=CSSV('--gold');
      else if (e.band==='alpha') col=CSSV('--dendrite');
      else if (e.band==='mu') col=CSSV('--firing');
      else col=CSSV('--synaptic');
      var chAlpha=1;
      if (compare>0.2){
        if (e.band==='alpha' || e.band==='mu') chAlpha=1;
        else chAlpha=lerp(1,0.32,compare);
      }
      ctx.globalAlpha=chAlpha;

      // 堆叠行基线 (淡)
      if (unfold>0.15){
        ctx.strokeStyle=CSSV('--line');
        ctx.globalAlpha=chAlpha*0.5*unfold;
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(ex+8, ey); ctx.lineTo(endX, ey); ctx.stroke();
        ctx.globalAlpha=chAlpha;
      }

      var winN = Math.round(lerp(48, NS, unfold));
      var lw = hl ? 2.8 : 2.0;
      strokeWave(e.wave, ex+8, endX, ey, amp, now, winN, col, lw, hl, grow);

      drawElec(ex, ey, e, now, hl, joy);
      elecLabel(ex, ey, e.id, !hl && compare>0.4 && !(e.band==='alpha'||e.band==='mu'));

      // hero 飞线: 头皮位置 -> 堆叠行 (展开过程中可见)
      if (isHero && unfold>0.05 && unfold<0.98){
        ctx.strokeStyle=CSSV('--gold');
        ctx.globalAlpha=0.5*(1-unfold);
        ctx.setLineDash([5,4]); ctx.lineWidth=1.4;
        ctx.beginPath(); ctx.moveTo(hp.x,hp.y); ctx.lineTo(ex,ey); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.globalAlpha=1;
    }

    // ---- S3: C3/C4 运动区高亮 (wow_1 gold) ----
    if (heroOn>0.05){
      ctx.save();
      var c3=elecHeadXY(ELECS[2],g), c4=elecHeadXY(ELECS[4],g);
      ctx.strokeStyle=CSSV('--gold');
      ctx.globalAlpha=heroOn*(0.35+0.25*Math.sin(now/360));
      ctx.lineWidth=10*headFade+2;
      ctx.beginPath(); ctx.moveTo(c3.x,c3.y); ctx.lineTo(c4.x,c4.y); ctx.stroke();
      ctx.globalAlpha=heroOn;
      ctx.fillStyle=CSSV('--gold');
      ctx.font="700 12px 'JetBrains Mono',monospace";
      ctx.textAlign='center';
      ctx.fillText(LANG==='cn'?'运动区':'MOTOR', g.cx, c3.y - 22);
      ctx.restore();

      if (joy>0.1){
        for (var p=0;p<18;p++){
          var ang=(p/18)*Math.PI*2 + now/1800;
          var rad=joy*(50+(p%4)*26)*(0.6+0.4*Math.sin(now/420+p));
          var src = (p%2===0)?elecHeadXY(ELECS[2],g):elecHeadXY(ELECS[4],g);
          var px=src.x+Math.cos(ang)*rad, py=src.y+Math.sin(ang)*rad*0.8;
          ctx.fillStyle=(p%3===0)?CSSV('--gold'):CSSV('--firing');
          ctx.globalAlpha=Math.max(0,0.7-joy*0.4);
          ctx.beginPath(); ctx.arc(px,py,2.2+(p%3),0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha=1;
      }
    }

    // ---- S4: 对比标注 (枕叶 alpha 强 / 运动区 mu) ----
    if (compare>0.25){
      ctx.save();
      ctx.globalAlpha=clamp((compare-0.25)/0.4);
      var ozY=elecStackXY(7,sg).y, c3Y=elecStackXY(2,sg).y, c4Y=elecStackXY(4,sg).y;
      ctx.fillStyle=CSSV('--dendrite');
      ctx.font="700 12px 'Inter','Noto Sans SC',sans-serif";
      ctx.textAlign='left';
      ctx.fillText(LANG==='cn'?'枕叶: alpha 最强':'occipital: strong alpha', sg.x0+6, ozY-sg.amp-8);
      ctx.fillStyle=CSSV('--gold');
      ctx.fillText(LANG==='cn'?'C3/C4: mu 节律 (管手脚)':'C3/C4: mu rhythm (limbs)', sg.x0+6, c3Y-sg.amp-8);
      ctx.strokeStyle=CSSV('--gold'); ctx.lineWidth=2;
      var bx=sg.x1-2;
      ctx.beginPath();
      ctx.moveTo(bx, c3Y-sg.amp);
      ctx.lineTo(bx+10, c3Y-sg.amp);
      ctx.lineTo(bx+10, c4Y+sg.amp);
      ctx.lineTo(bx, c4Y+sg.amp);
      ctx.stroke();
      ctx.restore();
    }

    // ---- 标题水印 (左上, 弱) ----
    ctx.fillStyle=CSSV('--fg-mute');
    ctx.font="700 13px 'JetBrains Mono',monospace";
    ctx.textAlign='left';
    ctx.fillText(LANG==='cn'?'多通道脑波 · 空间分布':'MULTI-CHANNEL · SPATIAL MAP', 18, 26);

    // HUD + 字幕 (随阶段更新)
    if (idx!==lastStageShown){
      lastStageShown=idx;
      document.getElementById('hudStage').textContent=I18N.stages[LANG][idx];
      document.getElementById('hudSub').textContent  =I18N.hudSub[LANG][idx];
      document.getElementById('hudVal').textContent  =I18N.hudVal[LANG][idx];
      document.getElementById('subZh').textContent   =I18N.subs[LANG][idx];
      document.getElementById('subEn').textContent   =I18N.subs.en[idx];
      var z=document.getElementById('subZh');
      if (idx===3) z.classList.add('gold'); else z.classList.remove('gold');
    }

    requestAnimationFrame(draw);
  }

  // ---- i18n ----
  var I18N = {
    ttl:{cn:'很多电极一起听', en:'Many Electrodes, Listening'},
    subtitle:{cn:'为什么要在头上放这么多电极?', en:'Why put so many electrodes on the head?'},
    g1:{cn:'每个电极贴在头皮不同位置', en:'Each electrode sits on a different spot'},
    g2:{cn:'不同位置抓到不同的波', en:'Different spots catch different waves'},
    g3:{cn:'C3/C4 在运动区 管手脚', en:'C3/C4 over motor cortex, run the limbs'},
    hudTtl:{cn:'阶段', en:'STAGE'},
    stages:{
      cn:['头顶俯视','波从位置长出','并排展开','C3/C4 点亮','位置各不同'],
      en:['TOP-DOWN','WAVES GROW','UNFOLD SIDE-BY-SIDE','C3/C4 LIT','SPOTS DIFFER']
    },
    hudSub:{
      cn:['电极阵列就位','每点冒出自己的波','搬成多通道堆叠','运动区主角','枕 alpha vs 运动 mu'],
      en:['array placed','a wave per spot','stacked channels','motor stars','occipital vs motor']
    },
    hudVal:{
      cn:['8 个通道','从位置生长','8 行并排','C3 / C4 = gold','波形不一样'],
      en:['8 channels','growing in place','8 rows','C3 / C4 = gold','waves differ']
    },
    subs:{
      cn:[
        '这是从头顶往下看, 每个亮点是一个电极, 贴在头皮不同位置。',
        '每个电极都在听自己脚下那块脑区, 各自冒出一条波。',
        '把这些波从头皮位置搬出来, 并排叠成一张多通道图。',
        '中间这两个 C3 和 C4 在运动区 -- 你动手脚, 它们最先反应。',
        '看: 枕叶 alpha 最强, 运动区是 mu 节律 -- 位置不同, 抓到的波就不同。'
      ],
      en:[
        'Top-down view of the head. Each dot is one electrode, on a different scalp spot.',
        'Every electrode listens to the brain area beneath it, each growing its own wave.',
        'Lift those waves off the scalp and stack them side by side into one multi-channel chart.',
        'These two in the middle, C3 and C4, sit over motor cortex -- move a limb and they react first.',
        'See: occipital alpha is strongest, motor cortex shows mu rhythm -- different spot, different wave.'
      ]
    }
  };
  function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

  function refreshI18N(){
    document.getElementById('ttl').textContent=t('ttl');
    document.getElementById('subtitle').textContent=t('subtitle');
    document.getElementById('g1').textContent=t('g1');
    document.getElementById('g2').textContent=t('g2');
    document.getElementById('g3').textContent=t('g3');
    document.getElementById('hudTtl').textContent=t('hudTtl');
    lastStageShown=-1;
  }

  document.getElementById('langBtn').addEventListener('click', function(){
    LANG=(LANG==='cn')?'en':'cn';
    this.textContent=LANG==='cn'?'CN / EN':'EN / CN';
    refreshI18N();
  });

  resize();
  requestAnimationFrame(draw);
})();
</script>
