<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滤波前后对比 - 噪声真的少了吗</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 (所有 26 套统一, 不换) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);

    /* 第 2 层 — phys 学科 accent (sky-teal) */
    --accent: oklch(0.78 0.13 215);

    /* 第 3 层 — phys 5 色 palette (Force Observatory) */
    --field:    oklch(0.78 0.13 215);  /* FIELD  - 滤波后干净波 */
    --wave:     oklch(0.55 0.13 215);  /* WAVE   - 原始脏波 */
    --mass:     oklch(0.35 0.10 215);  /* MASS   - 网格/底层 */
    --photon:   oklch(0.92 0.08 215);  /* PHOTON - mascot 高光 */
    --constant: oklch(0.85 0.14 85);   /* CONSTANT = gold key moment */
    --noise:    oklch(0.75 0.16 15);   /* 被剥掉的噪声层 (rose, 与信号对立) */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
    font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
    display:flex;
  }
  /* ===== 左侧 200px sidebar ===== */
  .sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--bg-1);border-right:1px solid var(--line);
    padding:18px 16px;display:flex;flex-direction:column;gap:14px;
  }
  .brand{font-size:11px;letter-spacing:0.14em;color:var(--fg-mute);
         font-family:'JetBrains Mono',monospace;}
  .brand b{color:var(--accent);}
  .title{font-size:16px;font-weight:700;color:var(--fg);line-height:1.35;}
  .subtitle{font-size:11px;color:var(--fg-dim);line-height:1.5;font-style:italic;}
  .mascot-wrap{display:flex;justify-content:center;padding:4px 0;}
  .guide{display:flex;flex-direction:column;gap:8px;}
  .guide-li{
    font-size:11px;color:var(--fg-dim);line-height:1.5;
    padding:6px 8px;border-left:2px solid var(--accent);
    background:var(--bg-2);
  }
  .guide-li b{color:var(--fg);}
  .lang-btn{
    margin-top:auto;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    padding:8px 12px;background:var(--bg-2);color:var(--fg);
    border:1px solid var(--line-strong);cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);letter-spacing:0.08em;
  }
  .lang-btn:hover{background:var(--bg-3);}
  /* ===== 右侧主舞台 ===== */
  .stage{flex:1;height:100vh;position:relative;display:flex;flex-direction:column;}
  .hud{
    position:absolute;top:16px;right:18px;z-index:5;text-align:right;
    font-family:'JetBrains Mono',monospace;pointer-events:none;
  }
  .hud-phase{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.06em;}
  .hud-val{font-size:11px;color:var(--fg-dim);margin-top:4px;line-height:1.6;}
  .hud-val .num{color:var(--photon);}
  .hud-val .warn{color:var(--constant);}
  .cue{
    position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    z-index:5;max-width:74%;text-align:center;
    font-size:13px;color:var(--fg-dim);line-height:1.55;
    background:oklch(0.18 0.04 265 / 0.78);
    border:1px solid var(--line);padding:8px 16px;
    backdrop-filter:blur(2px);
  }
  .cue b{color:var(--accent);}
  .cue .g{color:var(--constant);}
  svg{flex:1;width:100%;height:100%;display:block;}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">SYSTEM<b>EDU</b> · EEG M14</div>
    <div class="title" data-i18n="title">滤波前后对比</div>
    <div class="subtitle" data-i18n="sub">同一段脏脑波，被滤波器连续抚平成干净波</div>
    <div class="mascot-wrap">
      <!-- mascot Echo: 音叉 + 波形光环 (phys palette: field/photon/constant) -->
      <svg width="92" height="92" viewBox="0 0 92 92" aria-label="Echo mascot">
        <circle cx="46" cy="46" r="40" fill="none" stroke="var(--field)" stroke-width="1.5" opacity="0.35"/>
        <circle cx="46" cy="46" r="32" fill="none" stroke="var(--field)" stroke-width="1.5" opacity="0.55">
          <animate attributeName="r" values="30;34;30" dur="2.6s" repeatCount="indefinite"/>
        </circle>
        <!-- 音叉本体 -->
        <path d="M40 64 L40 42 M52 64 L52 42 M40 42 Q46 30 52 42" fill="none"
              stroke="var(--photon)" stroke-width="3.2" stroke-linecap="round"/>
        <rect x="42" y="64" width="8" height="14" rx="2" fill="var(--photon)"/>
        <!-- 波形光环 -->
        <path d="M14 46 Q22 40 30 46 T46 46" fill="none" stroke="var(--constant)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <path d="M78 46 Q70 52 62 46 T46 46" fill="none" stroke="var(--constant)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <circle cx="46" cy="46" r="2.6" fill="var(--constant)"/>
      </svg>
    </div>
    <div class="guide">
      <div class="guide-li" data-i18n="g1"><b>脏波</b>：快毛刺 + 慢漂移混进真节律</div>
      <div class="guide-li" data-i18n="g2"><b>扫过</b>：滤波门抹掉快抖、拉回慢漂</div>
      <div class="guide-li" data-i18n="g3"><b>过度</b>：截止太狠会连真节律一起削平</div>
    </div>
    <button class="lang-btn" id="langBtn">EN / 中</button>
  </aside>

  <main class="stage">
    <div class="hud">
      <div class="hud-phase" id="hudPhase">PHASE</div>
      <div class="hud-val" id="hudVal"></div>
    </div>
    <svg id="scene" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="cue" id="cue"></div>
  </main>

<script>
(function(){
  'use strict';
  const SVGNS = 'http://www.w3.org/2000/svg';
  const scene = document.getElementById('scene');
  const W = 1000, H = 640;

  /* ---------- i18n ---------- */
  let lang = 'zh';
  const I18N = {
    zh:{
      title:'滤波前后对比', sub:'同一段脏脑波，被滤波器连续抚平成干净波',
      g1:'<b>脏波</b>：快毛刺 + 慢漂移混进真节律',
      g2:'<b>扫过</b>：滤波门抹掉快抖、拉回慢漂',
      g3:'<b>过度</b>：截止太狠会连真节律一起削平',
      labRaw:'原始脏波  RAW', labClean:'滤波后  FILTERED', labNoise:'被剥掉的噪声层  RAW − FILTERED',
      tagGate:'滤波门', tagFast:'快毛刺', tagSlow:'慢漂移', tagRhythm:'真节律(alpha)',
      cues:[
        '这是<b>一段脑波</b>：真正的 alpha 节律里，混进了快<b>毛刺</b>和慢<b>漂移</b>。',
        '一个<b>滤波门</b>从左往右扫过同一段波 —— 注意：它走过的地方，波被连续抚平。',
        '门左侧的快抖被抹掉、慢漂被拉回基线，<b>干净的真节律</b>浮现出来。',
        '下方实时显示 <b>原始 − 滤波</b> 差值：这就是被<span class="g">剥掉的噪声层</span>，只剩毛刺和漂移。',
        '看清楚了：噪声真的少了，而<b>有用的节律完整保留</b>。这是滤波该有的样子。',
        '但若把截止收得<span class="g">太狠</span>（过度滤波）——',
        '连真节律也被一起削平：波<span class="g">失真</span>了。差值层里出现了本该保留的信号。',
        '结论：好的滤波<b>去噪保信号</b>；过度滤波会<span class="g">误伤有用信息</span>。'
      ]
    },
    en:{
      title:'Filter Before / After', sub:'One messy brain wave, continuously smoothed clean by a filter',
      g1:'<b>Messy</b>: fast spikes + slow drift over the real rhythm',
      g2:'<b>Sweep</b>: the filter gate erases fast jitter, pulls back slow drift',
      g3:'<b>Too much</b>: a cutoff too tight flattens the real rhythm too',
      labRaw:'RAW  messy wave', labClean:'FILTERED  clean', labNoise:'STRIPPED NOISE  RAW − FILTERED',
      tagGate:'FILTER GATE', tagFast:'fast spikes', tagSlow:'slow drift', tagRhythm:'real rhythm (alpha)',
      cues:[
        'This is <b>one brain wave</b>: a real alpha rhythm with fast <b>spikes</b> and slow <b>drift</b> mixed in.',
        'A <b>filter gate</b> sweeps left to right over the same wave — where it passes, the wave is smoothed.',
        'Behind the gate the fast jitter is erased and slow drift pulled to baseline; the <b>clean rhythm</b> emerges.',
        'Below, the <b>RAW − FILTERED</b> difference shows in real time: the <span class="g">stripped noise layer</span>.',
        'See it: the noise is truly gone, yet the <b>useful rhythm stays intact</b>. This is filtering done right.',
        'But push the cutoff <span class="g">too tight</span> (over-filtering) —',
        'the real rhythm gets flattened too: the wave is <span class="g">distorted</span>. Real signal leaks into the difference.',
        'Takeaway: good filtering <b>removes noise, keeps signal</b>; over-filtering <span class="g">harms useful information</span>.'
      ]
    }
  };

  /* ---------- 唯一核心对象: 同一段波 ----------
     raw(x)  = 真节律(alpha) + 快毛刺(高频) + 慢漂移(低频基线)
     clean(x)= 真节律 (温和过度滤波时真节律也被削)
     一个扫描门 gateX 从左到右移动: 门左 = 已滤波(clean), 门右 = raw, 门中为过渡带
  */
  // 信号分量 (相对中线 y=0 的振幅, 单位 px)
  const A_RHYTHM = 46;   // 真 alpha 节律
  const A_SLOW   = 34;   // 慢漂移
  const A_FAST   = 20;   // 快毛刺
  const F_RHYTHM = 5.2;  // 真节律频率 (相对相位)
  const F_SLOW   = 0.85; // 慢漂移
  const F_FAST   = 34;   // 快毛刺 (高频)

  function rhythm(p, phase){ return A_RHYTHM*Math.sin(p*F_RHYTHM + phase*0.6); }
  function slow(p){ return A_SLOW*Math.sin(p*F_SLOW + 0.7) + 0.30*A_SLOW*Math.sin(p*0.4); }
  function fast(p, phase){
    // 高频 + 不规则毛刺
    return A_FAST*Math.sin(p*F_FAST + phase*4.1)
         + 0.5*A_FAST*Math.sin(p*F_FAST*1.7 + 1.3)
         + 0.35*A_FAST*Math.sin(p*F_FAST*2.6 + 4.0);
  }
  function raw(p, phase){ return rhythm(p,phase) + slow(p) + fast(p,phase); }
  // clean: 保留节律(+残留极小慢分量). overK=0 正常; overK 越大代表过度滤波, 节律也被衰减
  function clean(p, phase, overK){
    const keep = 1 - 0.78*overK;       // 过度滤波时真节律被衰减
    const slowResid = 0.06*slow(p);    // 正常滤波留下极小慢残留
    return rhythm(p,phase)*keep + slowResid;
  }

  // 屏幕几何
  const PLOT_X0 = 60, PLOT_X1 = 940, PLOT_W = PLOT_X1 - PLOT_X0;
  const MID_Y   = 250;   // 主波中线
  const NOISE_Y = 520;   // 噪声差值层中线
  const NOISE_BASE = 470;
  const SAMPLES = 220;

  function px(i){ return PLOT_X0 + PLOT_W*(i/(SAMPLES-1)); }
  function pval(i){ return (i/(SAMPLES-1))*Math.PI*4.2; } // 波形相位坐标

  /* ---------- 静态场景骨架 ---------- */
  function el(tag, attrs){
    const n = document.createElementNS(SVGNS, tag);
    for(const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }
  // 网格底
  for(let gy=120; gy<=420; gy+=50){
    scene.appendChild(el('line',{x1:PLOT_X0,y1:gy,x2:PLOT_X1,y2:gy,stroke:'var(--mass)','stroke-width':1,opacity:0.4}));
  }
  scene.appendChild(el('line',{x1:PLOT_X0,y1:MID_Y,x2:PLOT_X1,y2:MID_Y,stroke:'var(--line-strong)','stroke-width':1,'stroke-dasharray':'4 6'}));
  scene.appendChild(el('line',{x1:PLOT_X0,y1:NOISE_BASE,x2:PLOT_X1,y2:NOISE_BASE,stroke:'var(--line)','stroke-width':1,'stroke-dasharray':'2 6'}));

  // 标签
  const labRaw   = el('text',{x:PLOT_X1, y:118, 'text-anchor':'end', fill:'var(--wave)','font-family':'JetBrains Mono, monospace','font-size':13});
  const labClean = el('text',{x:PLOT_X0, y:118, 'text-anchor':'start', fill:'var(--field)','font-family':'JetBrains Mono, monospace','font-size':13,'font-weight':700});
  const labNoise = el('text',{x:PLOT_X0, y:NOISE_BASE+26, 'text-anchor':'start', fill:'var(--noise)','font-family':'JetBrains Mono, monospace','font-size':12});
  scene.appendChild(labRaw); scene.appendChild(labClean); scene.appendChild(labNoise);

  // 主波路径 (左=clean 已滤波, 右=raw 脏) — 用同一条 path, 门处切换
  const wavePath = el('path',{fill:'none','stroke-width':2.6,'stroke-linejoin':'round','stroke-linecap':'round'});
  scene.appendChild(wavePath);
  // 节律基准虚影 (淡, 让人对比真节律是否被保留)
  const ghostPath = el('path',{fill:'none',stroke:'var(--field)','stroke-width':1,opacity:0.22,'stroke-dasharray':'3 5'});
  scene.appendChild(ghostPath);
  // 噪声差值层
  const noisePath = el('path',{fill:'none',stroke:'var(--noise)','stroke-width':1.8,'stroke-linejoin':'round'});
  scene.appendChild(noisePath);
  const noiseFill = el('path',{fill:'var(--noise)',opacity:0.10,stroke:'none'});
  scene.appendChild(noiseFill);

  // 扫描门 (过渡带): 一条竖线 + 半透明前缘
  const gateBand = el('rect',{y:96, height:340, fill:'var(--accent)', opacity:0.07});
  scene.appendChild(gateBand);
  const gateLine = el('line',{y1:96, y2:436, stroke:'var(--accent)','stroke-width':2.4});
  scene.appendChild(gateLine);
  const gateGlow = el('line',{y1:96, y2:436, stroke:'var(--photon)','stroke-width':5, opacity:0.18});
  scene.appendChild(gateGlow);
  const gateTag = el('text',{y:88,'text-anchor':'middle', fill:'var(--accent)','font-family':'JetBrains Mono, monospace','font-size':12,'font-weight':700});
  scene.appendChild(gateTag);

  // 局部标注 (快毛刺 / 慢漂移 / 真节律) — 随阶段淡入淡出
  const annFast = el('text',{x:760,y:300,'text-anchor':'middle',fill:'var(--noise)','font-family':'JetBrains Mono, monospace','font-size':12,opacity:0});
  const annSlow = el('text',{x:840,y:200,'text-anchor':'middle',fill:'var(--fg-mute)','font-family':'JetBrains Mono, monospace','font-size':12,opacity:0});
  const annRhythm = el('text',{x:200,y:340,'text-anchor':'middle',fill:'var(--field)','font-family':'JetBrains Mono, monospace','font-size':12,opacity:0});
  scene.appendChild(annFast); scene.appendChild(annSlow); scene.appendChild(annRhythm);

  // gold 警示闪 (过度滤波)
  const warnFlash = el('rect',{x:0,y:0,width:W,height:H,fill:'var(--constant)',opacity:0});
  scene.appendChild(warnFlash);

  /* ---------- 时间轴 / 阶段 ----------
     单一 rAF 连续推进 phase. cue 索引随 t 切, 但波形本身全程连续演化, 不切帧.
     阶段安排 (总 ~34s):
       seg0 0-3.5    脏波全裸 (gate 在最左, 全 raw)
       seg1 3.5-9    gate 扫过 (左 clean 右 raw)
       seg2 9-13     gate 到中部, 强调干净浮现
       seg3 13-18    噪声差值层强调
       seg4 18-22    gate 到底, 全 clean, 保信号确认
       seg5 22-25    过渡到过度滤波 (overK 渐升)
       seg6 25-30    过度滤波削平节律 (失真)
       seg7 30-34    结论
  */
  const SEG = [3.5, 9, 13, 18, 22, 25, 30, 34];
  function segIndex(t){
    for(let i=0;i<SEG.length;i++){ if(t < SEG[i]) return i; }
    return SEG.length-1;
  }
  function smooth(a,b,t){ // t in [a,b] -> 0..1 ease
    if(t<=a) return 0; if(t>=b) return 1;
    const u=(t-a)/(b-a); return u*u*(3-2*u);
  }

  const cueEl = document.getElementById('cue');
  const hudPhase = document.getElementById('hudPhase');
  const hudVal = document.getElementById('hudVal');
  let lastCue = -1;

  function build(){
    const t0 = performance.now();
    function tick(now){
      const t = ((now - t0)/1000) % 34;     // 34s 循环
      const phase = (now - t0)/1000 * 2.2;   // 波形持续滚动相位

      // 扫描门位置: seg1-4 从左扫到右; 其他段保持端点
      let gateFrac;
      if(t < SEG[0]) gateFrac = 0.0;                                   // 全 raw
      else if(t < SEG[3]) gateFrac = smooth(SEG[0], SEG[3], t);         // 连续扫过
      else gateFrac = 1.0;                                             // 全 clean
      const gateX = PLOT_X0 + PLOT_W*gateFrac;
      const bandW = 26;

      // 过度滤波强度: seg5 起渐升, seg6 满, seg7 略回稳定在失真态
      let overK = 0;
      if(t >= SEG[4] && t < SEG[5]) overK = smooth(SEG[4], SEG[5], t)*1.0;
      else if(t >= SEG[5]) overK = 1.0;

      // ----- 主波 path: 左(clean) 右(raw), 门处过渡 -----
      let d = '', dg = '';
      for(let i=0;i<SAMPLES;i++){
        const x = px(i), p = pval(i);
        // 门混合系数: x 在 gate 左侧=clean(1), 右侧=raw(0), 过渡带平滑
        let m = (gateX - x)/bandW; m = Math.max(0, Math.min(1, m+0.5));
        const r = raw(p, phase);
        const c = clean(p, phase, overK);
        const y = MID_Y - (m*c + (1-m)*r);
        d += (i===0?'M':'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
        // ghost = 纯真节律 (基准, 看是否被保留)
        const gy = MID_Y - rhythm(p, phase);
        dg += (i===0?'M':'L') + x.toFixed(1) + ' ' + gy.toFixed(1) + ' ';
      }
      wavePath.setAttribute('d', d);
      ghostPath.setAttribute('d', dg);
      // 主波颜色: 随 gate 位置在 wave->field 间渐变 (用 clean 占比近似), 过度滤波偏 constant 警示
      const cleanShare = gateFrac;
      wavePath.setAttribute('stroke', overK>0.5 ? 'var(--constant)' : (cleanShare>0.55 ? 'var(--field)' : 'var(--wave)'));
      ghostPath.setAttribute('opacity', (t>=SEG[1] ? 0.30 : 0.12).toFixed(2));

      // ----- 噪声差值层: raw - filtered (= 被剥掉的部分) -----
      // 仅在 gate 左侧 (已滤波) 有差值; 右侧未滤波, 差值=0 (尚未剥离)
      let dn = '', dnf = '';
      const showNoise = t >= SEG[1]*0.85; // 扫过后开始显现
      for(let i=0;i<SAMPLES;i++){
        const x = px(i), p = pval(i);
        let m = (gateX - x)/bandW; m = Math.max(0, Math.min(1, m+0.5));
        const r = raw(p, phase);
        const c = clean(p, phase, overK);
        const diff = (r - c) * m;        // 被剥掉的层, 仅门左侧
        const y = NOISE_BASE - diff*0.62;
        dn  += (i===0?'M':'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
        dnf += (i===0? ('M'+x.toFixed(1)+' '+NOISE_BASE.toFixed(1)+' L') : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
      }
      dnf += 'L' + PLOT_X1.toFixed(1) + ' ' + NOISE_BASE.toFixed(1) + ' Z';
      noisePath.setAttribute('d', dn);
      noiseFill.setAttribute('d', dnf);
      const noiseOp = showNoise ? smooth(SEG[1]*0.85, SEG[1]+1.5, t) : 0;
      noisePath.setAttribute('opacity', (0.9*noiseOp).toFixed(2));
      noiseFill.setAttribute('opacity', (0.12*noiseOp).toFixed(2));
      // 过度滤波时差值层里混入了真节律 -> 变 gold 警示
      noisePath.setAttribute('stroke', overK>0.5 ? 'var(--constant)' : 'var(--noise)');

      // ----- 扫描门 -----
      const gateOn = (t >= SEG[0]*0.6 && t < SEG[3]+0.5);
      const gOp = gateOn ? smooth(SEG[0]*0.6, SEG[0], t) * (1 - smooth(SEG[3], SEG[3]+0.5, t)) : 0;
      gateLine.setAttribute('x1', gateX); gateLine.setAttribute('x2', gateX);
      gateGlow.setAttribute('x1', gateX); gateGlow.setAttribute('x2', gateX);
      gateBand.setAttribute('x', gateX - bandW); gateBand.setAttribute('width', bandW*1.4);
      gateLine.setAttribute('opacity', gOp.toFixed(2));
      gateGlow.setAttribute('opacity', (gOp*0.6).toFixed(2));
      gateBand.setAttribute('opacity', (gOp*0.10).toFixed(2));
      gateTag.setAttribute('x', Math.max(PLOT_X0+44, Math.min(PLOT_X1-44, gateX)));
      gateTag.setAttribute('opacity', gOp.toFixed(2));
      gateTag.textContent = I18N[lang].tagGate;

      // ----- 局部标注 -----
      annFast.setAttribute('opacity', (t<SEG[0]? smooth(1.0, SEG[0]-0.5, t):0).toFixed(2));
      annSlow.setAttribute('opacity', (t<SEG[0]? smooth(1.4, SEG[0]-0.3, t):0).toFixed(2));
      annRhythm.setAttribute('opacity', (t>=SEG[2]&&t<SEG[4]? smooth(SEG[2], SEG[2]+1, t)*(1-smooth(SEG[4]-0.5,SEG[4],t)):0).toFixed(2));
      annFast.textContent = '< ' + I18N[lang].tagFast;
      annSlow.textContent = '~ ' + I18N[lang].tagSlow;
      annRhythm.textContent = I18N[lang].tagRhythm;

      // ----- gold 警示闪 (进入过度滤波瞬间) -----
      const flashWin = (t>=SEG[5] && t<SEG[5]+0.8) ? Math.sin((t-SEG[5])/0.8*Math.PI)*0.14 : 0;
      warnFlash.setAttribute('opacity', flashWin.toFixed(3));

      // ----- 标签文字 -----
      labRaw.textContent = I18N[lang].labRaw;
      labClean.textContent = I18N[lang].labClean;
      labNoise.textContent = I18N[lang].labNoise;

      // ----- HUD -----
      const seg = segIndex(t);
      const phaseNames = ['1/8 messy','2/8 sweep','3/8 emerge','4/8 stripped','5/8 keep','6/8 over','7/8 distort','8/8 verdict'];
      hudPhase.textContent = phaseNames[seg];
      const sweepPct = Math.round(gateFrac*100);
      if(overK > 0.05){
        hudVal.innerHTML = 'over-filter <span class="warn">'+Math.round(overK*100)+'%</span><br>'
          + 'rhythm kept <span class="warn">'+Math.round((1-0.78*overK)*100)+'%</span>';
      } else {
        hudVal.innerHTML = 'sweep <span class="num">'+sweepPct+'%</span><br>'
          + 'rhythm kept <span class="num">100%</span>';
      }

      // ----- cue 字幕 (索引随阶段, 仅辅助) -----
      const cueIdx = Math.min(seg, I18N[lang].cues.length-1);
      if(cueIdx !== lastCue){
        cueEl.innerHTML = I18N[lang].cues[cueIdx];
        lastCue = cueIdx;
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ---------- i18n 刷新 ---------- */
  function refreshI18N(){
    document.querySelectorAll('[data-i18n]').forEach(n=>{
      n.innerHTML = I18N[lang][n.getAttribute('data-i18n')];
    });
    lastCue = -1; // 强制下一帧刷新 cue
    document.documentElement.lang = (lang==='zh'?'zh-CN':'en');
  }
  document.getElementById('langBtn').addEventListener('click', function(){
    lang = (lang==='zh') ? 'en' : 'zh';
    refreshI18N();
  });

  refreshI18N();
  build();
})();
</script>
</body>
</html>
