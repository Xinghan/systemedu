<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录下你的第一段真脑波 — 信号流过 OpenBCI 采集链路</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- 第1层 共享深空底 (26套统一) ---- */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);

    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);

    /* ---- 第2层 学科 accent: elec indigo-purple ---- */
    --elec: oklch(0.72 0.17 275);

    /* ---- 第3层 elec 5色 palette (themes.js elec段) ---- */
    --pal-current: oklch(0.72 0.17 275);
    --pal-trace:   oklch(0.52 0.16 275);
    --pal-board:   oklch(0.35 0.10 275);
    --pal-pulse:   oklch(0.92 0.08 275);
    --pal-relay:   oklch(0.85 0.14 85);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;overflow:hidden;
    background:var(--bg-0);
    color:var(--fg);
    font-family:'Inter','PingFang SC','Noto Sans SC',system-ui,sans-serif;
    display:flex;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;}

  /* ---------- Sidebar 200px ---------- */
  .sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    padding:20px 16px;gap:18px;
  }
  .brand{display:flex;flex-direction:column;gap:4px;}
  .brand .code{
    font-size:10px;letter-spacing:.18em;color:var(--elec);
    font-weight:600;text-transform:uppercase;
  }
  .brand .ttl{font-size:14px;font-weight:700;color:var(--fg);line-height:1.3;}
  .brand .sub{font-size:11px;color:var(--fg-mute);}

  .mascot-box{
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .mascot-box svg{width:64px;height:64px;}
  .mascot-box .m-name{
    font-size:10px;color:var(--fg-dim);text-align:center;line-height:1.4;
  }
  .mascot-box .m-name b{color:var(--elec);}

  .guide{display:flex;flex-direction:column;gap:10px;}
  .guide .g-row{display:flex;gap:8px;align-items:flex-start;}
  .guide .g-dot{
    width:18px;height:18px;flex-shrink:0;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:var(--bg-0);
    background:var(--elec);margin-top:1px;
  }
  .guide .g-txt{font-size:11px;line-height:1.45;color:var(--fg-dim);}

  .spacer{flex:1;}
  .lang-btn{
    align-self:stretch;
    background:var(--bg-2);
    border:1px solid var(--line-strong);
    color:var(--fg-dim);
    border-radius:8px;
    padding:8px 10px;
    font-size:11px;font-weight:600;letter-spacing:.04em;
    cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);
    transition:background .15s,color .15s;
  }
  .lang-btn:hover{background:var(--bg-3);color:var(--fg);}

  /* ---------- Stage ---------- */
  .stage{
    flex:1;height:100vh;position:relative;overflow:hidden;
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--bg-1), transparent 70%),
      var(--bg-0);
  }
  #scene{position:absolute;inset:0;width:100%;height:100%;display:block;}

  .hud{
    position:absolute;top:18px;right:20px;
    display:flex;flex-direction:column;gap:6px;align-items:flex-end;
    z-index:5;pointer-events:none;
  }
  .hud .stage-name{
    font-size:12px;font-weight:600;letter-spacing:.08em;
    color:var(--elec);text-transform:uppercase;
    background:var(--bg-1);border:1px solid var(--line);
    padding:5px 11px;border-radius:7px;
  }
  .hud .metric{
    font-size:11px;color:var(--fg-dim);
    background:var(--bg-1);border:1px solid var(--line);
    padding:4px 10px;border-radius:7px;
    min-width:148px;text-align:right;
  }
  .hud .metric b{color:var(--pal-pulse);font-weight:600;}

  .subcue{
    position:absolute;left:50%;bottom:26px;transform:translateX(-50%);
    max-width:62%;text-align:center;z-index:5;pointer-events:none;
  }
  .subcue .cue-main{
    font-size:15px;font-weight:600;color:var(--fg);line-height:1.5;
    text-shadow:0 1px 4px var(--bg-0);
  }
  .subcue .cue-sub{
    margin-top:4px;font-size:12px;color:var(--fg-mute);line-height:1.4;
  }

  .title-card{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    text-align:center;z-index:6;pointer-events:none;
    transition:opacity .6s;
  }
  .title-card .tc-q{
    font-size:13px;color:var(--elec);letter-spacing:.1em;
    text-transform:uppercase;font-weight:600;
  }
  .title-card .tc-main{
    margin-top:10px;font-size:26px;font-weight:700;color:var(--fg);
    line-height:1.35;
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="code mono">ELC-12 · M10</div>
      <div class="ttl" data-i18n="brandTtl">信号流入</div>
      <div class="sub" data-i18n="brandSub">OpenBCI Cyton 上机</div>
    </div>

    <div class="mascot-box">
      <!-- mascot: Volt — lightning-shard with soft rounded edges -->
      <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="voltG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="var(--pal-pulse)"/>
            <stop offset="1" stop-color="var(--pal-current)"/>
          </linearGradient>
        </defs>
        <path d="M36 6 L18 34 H30 L26 58 L48 26 H34 Z"
              fill="url(#voltG)" stroke="var(--pal-current)" stroke-width="2"
              stroke-linejoin="round">
          <animate attributeName="opacity" values="1;.6;1" dur="1.6s" repeatCount="indefinite"/>
        </path>
        <circle cx="30" cy="34" r="2.4" fill="var(--pal-relay)">
          <animate attributeName="r" values="2.4;3.4;2.4" dur="1.2s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div class="m-name"><b>Volt</b><span data-i18n="mascotDesc"> · 在节点上嗡鸣放电的闪电碎片</span></div>
    </div>

    <div class="guide">
      <div class="g-row"><div class="g-dot mono">1</div><div class="g-txt" data-i18n="g1">电极在头皮上拾取微弱脑电压</div></div>
      <div class="g-row"><div class="g-dot mono">2</div><div class="g-txt" data-i18n="g2">Cyton 放大并数字化成采样点</div></div>
      <div class="g-row"><div class="g-dot mono">3</div><div class="g-txt" data-i18n="g3">蓝牙无线把数据传到电脑</div></div>
      <div class="g-row"><div class="g-dot mono">4</div><div class="g-txt" data-i18n="g4">屏幕画出你的第一段真脑波</div></div>
    </div>

    <div class="spacer"></div>
    <button class="lang-btn mono" id="langBtn" type="button">EN / 中</button>
  </aside>

  <main class="stage">
    <canvas id="scene"></canvas>
    <div class="hud">
      <div class="stage-name mono" id="hudStage">--</div>
      <div class="metric mono" id="hudMetric">--</div>
    </div>
    <div class="title-card" id="titleCard">
      <div class="tc-q mono" data-i18n="tcQ">CORE QUESTION</div>
      <div class="tc-main" data-i18n="tcMain">用 OpenBCI Cyton 录下你的<br>第一段真脑波</div>
    </div>
    <div class="subcue">
      <div class="cue-main" id="cueMain">--</div>
      <div class="cue-sub mono" id="cueSub">--</div>
    </div>
  </main>

<script>
(function(){
  "use strict";

  // ---------- i18n ----------
  var I18N = {
    cn: {
      brandTtl:"信号流入", brandSub:"OpenBCI Cyton 上机",
      mascotDesc:" · 在节点上嗡鸣放电的闪电碎片",
      g1:"电极在头皮上拾取微弱脑电压",
      g2:"Cyton 放大并数字化成采样点",
      g3:"蓝牙无线把数据传到电脑",
      g4:"屏幕画出你的第一段真脑波",
      tcQ:"CORE QUESTION",
      tcMain:"用 OpenBCI Cyton 录下你的<br>第一段真脑波",
      stage:{
        scalp:"头皮·电极",
        amp:"Cyton·放大+数字化",
        radio:"蓝牙·无线传输",
        screen:"电脑屏幕·成像"
      },
      cue:{
        scalp:["同一个脑波信号从头皮出发","电极拾取 ±20 µV 的微弱电压，沿导线流向 Cyton"],
        amp:["Cyton 把它放大上千倍、再切成采样点","连续电压 -> 24 位 ADC -> 每秒 250 个数字 (250 Hz)"],
        radio:["数字打包成蓝牙数据块无线飞出","RFduino dongle 接收，不用一根插线连电脑"],
        screen:["同一个信号在屏幕上展开成曲线","这就是你录下的第一段真脑波 — 它一路流到了这里"]
      }
    },
    en: {
      brandTtl:"Signal Inflow", brandSub:"OpenBCI Cyton boot-up",
      mascotDesc:" · a lightning-shard that hums at junctions",
      g1:"Electrode picks up faint scalp voltage",
      g2:"Cyton amplifies & digitizes into samples",
      g3:"Bluetooth streams the data wirelessly",
      g4:"Screen draws your first real brainwave",
      tcQ:"CORE QUESTION",
      tcMain:"Record your first real brainwave<br>with the OpenBCI Cyton",
      stage:{
        scalp:"Scalp · Electrode",
        amp:"Cyton · Amplify + Digitize",
        radio:"Bluetooth · Wireless",
        screen:"Computer Screen · Render"
      },
      cue:{
        scalp:["One brainwave signal sets off from the scalp","The electrode grabs a faint +/-20 µV and feeds Cyton"],
        amp:["Cyton amplifies it ~1000x, then slices it into samples","Continuous volts -> 24-bit ADC -> 250 numbers/sec (250 Hz)"],
        radio:["Samples are packed into Bluetooth blocks and fly off","An RFduino dongle catches them — no cable to the laptop"],
        screen:["The same signal unfolds into a curve on screen","Your first real brainwave — it flowed all the way here"]
      }
    }
  };
  var lang = "cn";

  function refreshI18N(){
    var dict = I18N[lang];
    document.querySelectorAll("[data-i18n]").forEach(function(el){
      var k = el.getAttribute("data-i18n");
      if(dict[k] !== undefined) el.innerHTML = dict[k];
    });
  }

  document.getElementById("langBtn").addEventListener("click", function(){
    lang = (lang === "cn") ? "en" : "cn";
    refreshI18N();
  });
  refreshI18N();

  // ---------- canvas ----------
  var cv = document.getElementById("scene");
  var ctx = cv.getContext("2d");
  var W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    var r = cv.getBoundingClientRect();
    W = r.width; H = r.height;
    cv.width = Math.round(W * DPR);
    cv.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- palette helpers ----------
  var COL = {
    bg0:"oklch(0.14 0.035 265)",
    bg1:"oklch(0.18 0.04 265)",
    bg2:"oklch(0.22 0.045 265)",
    bg3:"oklch(0.28 0.05 265)",
    line:"oklch(0.35 0.05 265 / 0.5)",
    fg:"oklch(0.96 0.01 265)",
    fgDim:"oklch(0.75 0.02 265)",
    fgMute:"oklch(0.55 0.03 265)",
    gold:"oklch(0.85 0.14 85)",
    elec:"oklch(0.72 0.17 275)",
    current:"oklch(0.72 0.17 275)",
    trace:"oklch(0.52 0.16 275)",
    board:"oklch(0.35 0.10 275)",
    pulse:"oklch(0.92 0.08 275)",
    relay:"oklch(0.85 0.14 85)"
  };

  // ---------- layout of the acquisition chain ----------
  // 单一对象 = 一个信号包, 沿 4 段链路连续流动:
  //   head(scalp electrode) -> cyton(amp+adc) -> dongle(bluetooth) -> screen(curve)
  // 节点 x 比例位置 (相对舞台宽度)
  var NODES = [
    {key:"scalp",  xr:0.13, label:"HEAD"},
    {key:"amp",    xr:0.40, label:"CYTON"},
    {key:"radio",  xr:0.66, label:"DONGLE"},
    {key:"screen", xr:0.88, label:"SCREEN"}
  ];

  // 信号一个完整旅程的时间轴 (秒). 4 段 + 末尾停留, 然后循环.
  var SEG = [
    {key:"scalp",  t0:0.0,  t1:7.0},   // 在头皮电极, 拾取
    {key:"amp",    t0:7.0,  t1:15.0},  // 流到 cyton, 放大数字化
    {key:"radio",  t0:15.0, t1:21.0},  // 无线飞行
    {key:"screen", t0:21.0, t1:31.0}   // 屏幕成像 (wow)
  ];
  var CYCLE = 31.0;

  function nodeX(i){ return NODES[i].xr * W; }
  function chainY(){ return H * 0.50; }

  // 原始脑波形状 (确定性, 不随机), 用相位生成
  function brainSample(phase){
    // alpha (10Hz) + theta (5Hz) + slow drift + 少量高频
    return 1.00*Math.sin(phase*2*Math.PI*1.0)
         + 0.55*Math.sin(phase*2*Math.PI*0.5 + 0.7)
         + 0.30*Math.sin(phase*2*Math.PI*2.0 + 1.9)
         + 0.18*Math.sin(phase*2*Math.PI*4.0 + 0.3);
  }

  // ---------- draw helpers ----------
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // 画整条链路骨架 (始终全程可见; active 段点亮)
  function drawChain(activeIdx, prog){
    var cy = chainY();
    // 连线
    for(var i=0;i<NODES.length-1;i++){
      var x1 = nodeX(i), x2 = nodeX(i+1);
      ctx.strokeStyle = COL.line;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, cy); ctx.lineTo(x2, cy);
      ctx.stroke();
    }
    // active 段 (信号正在流过的那段连线) 点亮 trace 色
    if(activeIdx>0){
      var ax1 = nodeX(activeIdx-1), ax2 = nodeX(activeIdx);
      ctx.strokeStyle = COL.trace;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(ax1, cy); ctx.lineTo(ax2, cy);
      ctx.stroke();
    }
    // 节点
    for(var n=0;n<NODES.length;n++){
      var nx = nodeX(n);
      var isActive = (n === activeIdx);
      drawNode(n, nx, cy, isActive, prog);
    }
  }

  function drawNode(idx, x, cy, active, prog){
    var key = NODES[idx].key;
    ctx.save();
    ctx.translate(x, cy);
    var glow = active ? (0.6 + 0.4*Math.sin(prog*2*Math.PI*1.5)) : 0;

    if(key === "scalp"){
      // 头皮侧脸 + 一个电极盘
      ctx.fillStyle = COL.bg2; ctx.strokeStyle = active?COL.current:COL.line;
      ctx.lineWidth = active?2.5:1.5;
      ctx.beginPath();
      // 头部弧
      ctx.arc(0, -4, 34, Math.PI*0.85, Math.PI*1.95);
      ctx.stroke();
      // 电极盘
      ctx.beginPath(); ctx.arc(-18, -30, 8, 0, Math.PI*2);
      ctx.fillStyle = active?COL.current:COL.board; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=COL.pulse; ctx.stroke();
      if(active){
        ctx.globalAlpha = glow;
        ctx.beginPath(); ctx.arc(-18,-30, 13, 0, Math.PI*2);
        ctx.strokeStyle = COL.current; ctx.lineWidth=2; ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if(key === "amp"){
      // Cyton 板 (PCB 矩形 + 引脚 + 芯片)
      ctx.fillStyle = COL.board;
      roundRect(-40,-26,80,52,7); ctx.fill();
      ctx.strokeStyle = active?COL.current:COL.line; ctx.lineWidth=active?2.5:1.5;
      roundRect(-40,-26,80,52,7); ctx.stroke();
      // 芯片 (ADC)
      ctx.fillStyle = active?COL.current:COL.bg3;
      roundRect(-14,-12,28,24,4); ctx.fill();
      ctx.strokeStyle=COL.pulse; ctx.lineWidth=1.2; roundRect(-14,-12,28,24,4); ctx.stroke();
      // 引脚
      ctx.strokeStyle = COL.trace; ctx.lineWidth=2;
      for(var p=-3;p<=3;p++){
        ctx.beginPath(); ctx.moveTo(p*9,-26); ctx.lineTo(p*9,-32); ctx.stroke();
      }
      if(active){
        ctx.globalAlpha = glow*0.8;
        ctx.fillStyle = COL.current;
        roundRect(-44,-30,88,60,9); ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if(key === "radio"){
      // 蓝牙 dongle + 无线弧
      ctx.fillStyle = COL.bg2;
      roundRect(-16,-12,32,24,5); ctx.fill();
      ctx.strokeStyle = active?COL.current:COL.line; ctx.lineWidth=active?2.5:1.5;
      roundRect(-16,-12,32,24,5); ctx.stroke();
      // 天线
      ctx.strokeStyle = COL.pulse; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(0,-26); ctx.stroke();
      // 无线波弧
      for(var w=0;w<3;w++){
        var rr = 14 + w*9;
        var a = active ? Math.max(0, 1 - Math.abs(((prog*3)%3) - w)*0.7) : 0.18;
        ctx.globalAlpha = a;
        ctx.strokeStyle = COL.current; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,-26, rr, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } else if(key === "screen"){
      // 电脑屏幕 (画脑波的地方)
      ctx.fillStyle = COL.bg1;
      roundRect(-52,-38,104,72,6); ctx.fill();
      ctx.strokeStyle = active?COL.current:COL.line; ctx.lineWidth=active?2.5:1.5;
      roundRect(-52,-38,104,72,6); ctx.stroke();
      // 底座
      ctx.fillStyle = COL.bg3;
      roundRect(-14,34,28,8,2); ctx.fill();
    }
    ctx.restore();

    // 节点标签
    ctx.font = "600 11px 'JetBrains Mono', monospace";
    ctx.fillStyle = active ? COL.current : COL.fgMute;
    ctx.textAlign = "center";
    ctx.fillText(NODES[idx].label, x, cy + 62);
  }

  // 信号包: 沿当前段位流动的发光小包, 形态随段变 (波形->放大->阶梯采样->数据块)
  function drawPacket(segKey, segProg, t){
    var cy = chainY();
    var idx = NODES.findIndex(function(n){return n.key===segKey;});
    var x, y = cy;

    if(segKey === "scalp"){
      // 从电极 (头部上方) 沿导线下行 -> 进入链路, 微弱小波
      var x0 = nodeX(0) - 18, y0 = cy - 30;
      var x1 = nodeX(0),      y1 = cy;
      x = x0 + (x1-x0)*Math.min(1,segProg*1.4);
      y = y0 + (y1-y0)*Math.min(1,segProg*1.4);
      drawWavePacket(x, y, 16, 0.30, t, COL.current, segProg);
    } else if(segKey === "amp"){
      // 在 Cyton 内部: 先放大 (振幅长高), 再数字化 (变阶梯采样点)
      x = nodeX(1);
      if(segProg < 0.5){
        // 放大: 振幅从 0.30 -> 1.0
        var amp = 0.30 + (1.0-0.30)*(segProg/0.5);
        drawWavePacket(x, cy, 30, amp, t, COL.current, segProg);
      } else {
        // 数字化: 阶梯采样
        drawSampledPacket(x, cy, 36, t, (segProg-0.5)/0.5);
      }
    } else if(segKey === "radio"){
      // 从 cyton 飞向 dongle, 形态 = 数据块 (一串方块), 边飞边过去
      var rx0 = nodeX(1), rx1 = nodeX(2);
      x = rx0 + (rx1-rx0)*segProg;
      drawDataBlock(x, cy - 8 - 14*Math.sin(segProg*Math.PI), segProg);
    } else if(segKey === "screen"){
      // 进入屏幕, 数据重新展开成连续脑波曲线 (一路画过来)
      x = nodeX(3);
      // 在 screen 内画曲线; packet 不再独立, 转为曲线绘制 (见 drawScreenCurve)
    }
  }

  // 微弱/放大的连续波包
  function drawWavePacket(cx, cy, halfW, amp, t, col, glow){
    ctx.save();
    var pts = 26;
    ctx.beginPath();
    for(var i=0;i<=pts;i++){
      var f = i/pts;            // 0..1 沿包宽
      var ph = f*2 - 1;         // -1..1
      var s = brainSample(f*1.3 + t*0.9);
      var px = cx + ph*halfW;
      var py = cy - s*amp*18;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.strokeStyle = col;
    ctx.lineWidth = 2.4;
    ctx.shadowColor = col; ctx.shadowBlur = 8 + 6*Math.sin(t*4);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // 数字化阶梯采样点
  function drawSampledPacket(cx, cy, halfW, t, fill){
    ctx.save();
    var n = 14;
    ctx.strokeStyle = COL.trace; ctx.lineWidth = 1.6;
    var prevx=null, prevy=null;
    for(var i=0;i<n;i++){
      var f = i/(n-1);
      var s = brainSample(f*1.3 + t*0.9);
      var px = cx + (f*2-1)*halfW;
      var py = cy - s*1.0*18;
      var shown = (i/n) <= fill;
      // 阶梯线 (sample-and-hold)
      if(prevx!==null){
        ctx.beginPath();
        ctx.moveTo(prevx, prevy); ctx.lineTo(px, prevy); ctx.lineTo(px, py);
        ctx.stroke();
      }
      if(shown){
        ctx.beginPath(); ctx.arc(px, py, 2.6, 0, Math.PI*2);
        ctx.fillStyle = COL.pulse; ctx.fill();
      }
      prevx=px; prevy=py;
    }
    ctx.restore();
  }

  // 蓝牙数据块 (一串发光方块)
  function drawDataBlock(cx, cy, prog){
    ctx.save();
    for(var i=0;i<4;i++){
      var bx = cx - 18 + i*12;
      var a = 0.55 + 0.45*Math.sin(prog*8 + i);
      ctx.globalAlpha = a;
      ctx.fillStyle = (i%2===0)? COL.current : COL.pulse;
      roundRect(bx, cy-5, 9, 10, 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 在屏幕内画脑波曲线; reveal = 0..1 控制画到哪 (从左到右一路画过来)
  var goldFlash = 0;       // wow 闪
  var goldFlashed = false;
  function drawScreenCurve(reveal, t){
    var sx = nodeX(3) - 46, sy = chainY();
    var sw = 92, sh = 50;
    // 屏幕内裁剪区
    ctx.save();
    ctx.beginPath(); roundRect(sx, sy-30, sw, sh, 4); ctx.clip();
    // 网格
    ctx.strokeStyle = COL.line; ctx.lineWidth=1;
    for(var gx=0; gx<=4; gx++){
      var X = sx + gx*(sw/4);
      ctx.beginPath(); ctx.moveTo(X, sy-30); ctx.lineTo(X, sy+20); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(sx, sy-5); ctx.lineTo(sx+sw, sy-5); ctx.stroke();
    // 曲线 (同一个 brainSample, 现在连续展开)
    var pts = 120;
    ctx.beginPath();
    var maxI = Math.floor(pts*reveal);
    for(var i=0;i<=maxI;i++){
      var f = i/pts;
      var s = brainSample(f*4.5 + (t*0.0));  // 静态展开形状 (录下的那一段)
      var px = sx + f*sw;
      var py = (sy-5) - s*9;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.lineWidth = 2.2;
    if(goldFlash > 0.02){
      ctx.strokeStyle = COL.gold;
      ctx.shadowColor = COL.gold; ctx.shadowBlur = 14*goldFlash;
    } else {
      ctx.strokeStyle = COL.current;
      ctx.shadowColor = COL.current; ctx.shadowBlur = 6;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    // 笔头光点
    if(maxI < pts && maxI>0){
      var ff = maxI/pts;
      var ss = brainSample(ff*4.5);
      ctx.beginPath(); ctx.arc(sx+ff*sw, (sy-5)-ss*9, 3, 0, Math.PI*2);
      ctx.fillStyle = COL.pulse; ctx.fill();
    }
    ctx.restore();
  }

  // wow gold 圈
  function drawGoldBurst(){
    if(goldFlash <= 0.02) return;
    var sx = nodeX(3), sy = chainY();
    ctx.save();
    var r = 60 * (1 - goldFlash) + 30;
    ctx.globalAlpha = goldFlash * 0.8;
    ctx.strokeStyle = COL.gold; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = goldFlash * 0.4;
    ctx.beginPath(); ctx.arc(sx, sy, r*0.6, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // 背景: 静默 PCB 网格点 (board 色)
  function drawBackdrop(t){
    ctx.fillStyle = COL.bg0;
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = COL.board;
    var step = 46;
    for(var y=step; y<H; y+=step){
      for(var x=step; x<W; x+=step){
        ctx.beginPath(); ctx.arc(x,y,1.1,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
  }

  // ---------- HUD / subcue update ----------
  var hudStage = document.getElementById("hudStage");
  var hudMetric = document.getElementById("hudMetric");
  var cueMain = document.getElementById("cueMain");
  var cueSub = document.getElementById("cueSub");
  var titleCard = document.getElementById("titleCard");
  var lastSeg = null;

  function metricFor(segKey, segProg){
    if(segKey==="scalp")  return "EEG ~ " + (15 + Math.round(8*Math.sin(segProg*6))) + " µV";
    if(segKey==="amp")    return segProg<0.5 ? "GAIN x" + Math.round(24*(segProg/0.5)) + " / 24"
                                              : "ADC 24-bit · 250 Hz";
    if(segKey==="radio")  return "BLE " + (Math.round(segProg*250)) + " / 250 sps";
    if(segKey==="screen") return goldFlashed ? "REC · 1st wave OK" : "drawing...";
    return "--";
  }

  function updateText(segKey, segProg){
    var d = I18N[lang];
    if(segKey !== lastSeg){
      hudStage.textContent = d.stage[segKey];
      cueMain.textContent = d.cue[segKey][0];
      cueSub.textContent  = d.cue[segKey][1];
      lastSeg = segKey;
    } else {
      // keep text, just refresh language if changed mid-seg
      hudStage.textContent = d.stage[segKey];
      cueMain.textContent = d.cue[segKey][0];
      cueSub.textContent  = d.cue[segKey][1];
    }
    hudMetric.innerHTML = metricFor(segKey, segProg);
  }

  // ---------- main loop ----------
  var t0 = performance.now();
  function frame(now){
    var t = (now - t0) / 1000;
    var loopT = t % CYCLE;

    // title card 前 2.2s 淡出
    titleCard.style.opacity = loopT < 2.4 ? Math.max(0, 1 - (loopT/2.4)) : 0;

    // 找当前段
    var seg = SEG[0], segProg = 0;
    for(var i=0;i<SEG.length;i++){
      if(loopT >= SEG[i].t0 && loopT < SEG[i].t1){
        seg = SEG[i];
        segProg = (loopT - SEG[i].t0) / (SEG[i].t1 - SEG[i].t0);
        break;
      }
    }
    // 末尾 hold 在 screen
    if(loopT >= SEG[SEG.length-1].t1){ seg = SEG[SEG.length-1]; segProg = 1; }

    var activeIdx = NODES.findIndex(function(n){return n.key===seg.key;});

    // wow: 进入 screen 段, reveal 推进; reveal 达到一定值触发 gold flash 一次
    var reveal = 0;
    if(seg.key === "screen"){
      reveal = Math.min(1, segProg / 0.65);
      if(reveal >= 1 && !goldFlashed){
        goldFlashed = true;
        goldFlash = 1;
      }
    }
    // 每个 cycle 起点重置 wow
    if(loopT < 0.2){ goldFlashed = false; goldFlash = 0; }
    if(goldFlash > 0) goldFlash = Math.max(0, goldFlash - 0.012);

    // ---- draw ----
    drawBackdrop(t);
    drawChain(activeIdx, segProg);
    drawScreenCurve(reveal, t);
    drawGoldBurst();
    // 信号包 (screen 段交给曲线, 不再独立画包)
    if(seg.key !== "screen"){
      drawPacket(seg.key, segProg, t);
    }

    updateText(seg.key, segProg);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

})();
</script>
</body>
