<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>傅里叶分解 — 一条脑波拆成几条快慢不同的波</title>
<style>
  :root {
    /* 第 1 层 — 共享深空底 (26 套统一) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);

    /* 第 2 层 — phys signature accent (sky-teal) */
    --phys: oklch(0.78 0.13 215);

    /* 第 3 层 — phys 5 色 palette (theme_style/themes.js phys 段) */
    --field:    oklch(0.78 0.13 215);  /* FIELD  — 复合波 / 主波 */
    --wave:     oklch(0.55 0.13 215);  /* WAVE   — 中速分量 */
    --mass:     oklch(0.35 0.10 215);  /* MASS   — 慢分量底 */
    --photon:   oklch(0.92 0.08 215);  /* PHOTON — 快分量 */
    --constant: oklch(0.85 0.14 85);   /* CONSTANT = gold */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: var(--bg-0);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ---------- 200px 左侧栏 ---------- */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    padding: 18px 16px;
    gap: 16px;
  }
  .brand { display: flex; flex-direction: column; gap: 4px; }
  .brand-title {
    font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--fg);
  }
  .brand-code {
    font-size: 10px; color: var(--phys); letter-spacing: 0.12em;
  }

  .mascot-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 8px 0;
  }
  .mascot-name {
    font-size: 10px; color: var(--fg-dim); letter-spacing: 0.08em;
  }

  .guide { display: flex; flex-direction: column; gap: 10px; }
  .guide-item {
    font-size: 11px; line-height: 1.45; color: var(--fg-dim);
    padding-left: 12px; position: relative;
  }
  .guide-item::before {
    content: ''; position: absolute; left: 0; top: 6px;
    width: 5px; height: 5px; background: var(--phys);
    box-shadow: 2px 2px 0 var(--bg-0);
  }

  .spacer { flex: 1; }

  .lang-btn {
    align-self: flex-start;
    background: var(--bg-2);
    color: var(--fg);
    border: 1px solid var(--line-strong);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--bg-0);
  }
  .lang-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--bg-0); }

  /* ---------- 右侧主舞台 ---------- */
  .stage {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .stage svg { width: 100%; height: 100%; display: block; }

  .hud {
    position: absolute; top: 16px; right: 18px;
    text-align: right;
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 10px 14px;
    box-shadow: 3px 3px 0 var(--bg-0);
    min-width: 168px;
  }
  .hud-phase {
    font-size: 12px; color: var(--phys); letter-spacing: 0.06em;
    font-weight: 700; margin-bottom: 6px;
  }
  .hud-row {
    font-size: 10px; color: var(--fg-dim);
    display: flex; justify-content: space-between; gap: 14px;
    line-height: 1.6;
  }
  .hud-val { color: var(--fg); }

  .cue {
    position: absolute; left: 50%; bottom: 26px;
    transform: translateX(-50%);
    text-align: center;
    max-width: 70%;
    font-size: 13px; line-height: 1.5;
    color: var(--fg);
    background: oklch(0.18 0.04 265 / 0.82);
    border: 1px solid var(--line);
    padding: 8px 18px;
    box-shadow: 3px 3px 0 var(--bg-0);
  }
  .cue-sub { display: block; font-size: 10px; color: var(--fg-mute); margin-top: 3px; }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-title" data-i18n="brandTitle">力之观测台</span>
      <span class="brand-code">PHY-09 · M07</span>
    </div>

    <div class="mascot-wrap">
      <!-- mascot Echo: 音叉 + 波形光晕 -->
      <svg width="78" height="78" viewBox="0 0 78 78" aria-hidden="true">
        <g fill="none" stroke-width="2.2" stroke-linecap="round">
          <!-- 波纹光晕 (photon/wave 渐淡) -->
          <circle cx="39" cy="39" r="30" stroke="var(--mass)" opacity="0.45"/>
          <circle cx="39" cy="39" r="22" stroke="var(--wave)" opacity="0.6"/>
          <circle cx="39" cy="39" r="14" stroke="var(--photon)" opacity="0.8"/>
          <!-- 音叉 -->
          <path d="M30 50 L30 26 M48 50 L48 26 M30 50 Q39 60 48 50 M39 56 L39 70"
                stroke="var(--field)" stroke-width="3"/>
          <!-- 顶端发声点 -->
          <circle cx="39" cy="70" r="3" fill="var(--gold)" stroke="none"/>
        </g>
      </svg>
      <span class="mascot-name">Echo</span>
    </div>

    <div class="guide">
      <p class="guide-item" data-i18n="g1">这条杂乱的脑波，其实是几条波叠成的。</p>
      <p class="guide-item" data-i18n="g2">看它连续地裂开成快慢不同的分量。</p>
      <p class="guide-item" data-i18n="g3">再看它们相加，重组回原来的波。</p>
    </div>

    <div class="spacer"></div>

    <button class="lang-btn" id="langBtn" type="button" data-i18n="langLabel">EN / 中</button>
  </aside>

  <main class="stage">
    <svg id="scene" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
      <!-- 网格基线 -->
      <g id="grid" stroke="var(--line)" stroke-width="1"></g>

      <!-- 三条分量波 (慢/中/快) -->
      <path id="comp0" fill="none" stroke="var(--mass)"   stroke-width="2.6" opacity="0"/>
      <path id="comp1" fill="none" stroke="var(--wave)"   stroke-width="2.6" opacity="0"/>
      <path id="comp2" fill="none" stroke="var(--photon)" stroke-width="2.6" opacity="0"/>

      <!-- 分量标签 -->
      <g font-family="'JetBrains Mono', monospace" font-size="13">
        <text id="lbl0" x="24" fill="var(--mass)"   opacity="0"></text>
        <text id="lbl1" x="24" fill="var(--wave)"   opacity="0"></text>
        <text id="lbl2" x="24" fill="var(--photon)" opacity="0"></text>
      </g>

      <!-- 复合波 (唯一核心对象, 主角) -->
      <path id="composite" fill="none" stroke="var(--field)" stroke-width="3.4"
            stroke-linecap="round" filter="url(#glow)"/>

      <!-- 重组发现高亮 -->
      <text id="aha" x="500" y="64" text-anchor="middle"
            font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700"
            fill="var(--gold)" opacity="0"></text>

      <defs>
        <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
          <feGaussianBlur stdDeviation="2.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <div class="hud">
      <div class="hud-phase" id="hudPhase"></div>
      <div class="hud-row"><span data-i18n="hudSlow">慢波</span><span class="hud-val" id="vSlow">0.0 Hz</span></div>
      <div class="hud-row"><span data-i18n="hudMid">中波</span><span class="hud-val" id="vMid">0.0 Hz</span></div>
      <div class="hud-row"><span data-i18n="hudFast">快波</span><span class="hud-val" id="vFast">0.0 Hz</span></div>
      <div class="hud-row"><span data-i18n="hudSep">分离度</span><span class="hud-val" id="vSep">0%</span></div>
    </div>

    <div class="cue">
      <span id="cueMain"></span>
      <span class="cue-sub" id="cueSub"></span>
    </div>
  </main>

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // i18n
  // ---------------------------------------------------------------------------
  var LANG = 'zh';
  var I18N = {
    zh: {
      brandTitle: '力之观测台',
      g1: '这条杂乱的脑波，其实是几条波叠成的。',
      g2: '看它连续地裂开成快慢不同的分量。',
      g3: '再看它们相加，重组回原来的波。',
      langLabel: 'EN / 中',
      hudSlow: '慢波', hudMid: '中波', hudFast: '快波', hudSep: '分离度',
      lblSlow: '慢波 · 3 Hz · delta-theta',
      lblMid:  '中波 · 10 Hz · alpha',
      lblFast: '快波 · 22 Hz · beta',
      phases: ['复合脑波', '正在分离', '三条分量', '正在重组'],
      cues: [
        { m: '这条脑波看起来杂乱无章。', s: '它其实不是一条波 — 而是几条波叠在一起。' },
        { m: '看它连续地裂开。', s: '杂乱的波正分离成快慢不同的几条分量。' },
        { m: '原来只有三条简单正弦波。', s: '慢的 3 Hz、中的 10 Hz、快的 22 Hz，各自规整。' },
        { m: '把三条加回去 — 又变回原波。', s: '复合波 = 这几条单频波之和，这就是傅里叶分解。' }
      ],
      aha: '复合波 = 慢 + 中 + 快'
    },
    en: {
      brandTitle: 'Force Observatory',
      g1: 'This messy brainwave is really several waves stacked.',
      g2: 'Watch it split, continuously, into slow & fast parts.',
      g3: 'Then watch them add back into the original wave.',
      langLabel: '中 / EN',
      hudSlow: 'slow', hudMid: 'mid', hudFast: 'fast', hudSep: 'split',
      lblSlow: 'slow . 3 Hz . delta-theta',
      lblMid:  'mid . 10 Hz . alpha',
      lblFast: 'fast . 22 Hz . beta',
      phases: ['composite wave', 'separating', 'three parts', 'recombining'],
      cues: [
        { m: 'This brainwave looks chaotic.', s: "It isn't one wave — it's several waves added together." },
        { m: 'Watch it split apart, continuously.', s: 'The mess separates into parts of different speeds.' },
        { m: 'Just three plain sine waves.', s: 'slow 3 Hz, mid 10 Hz, fast 22 Hz — each perfectly regular.' },
        { m: 'Add the three back — the original returns.', s: 'composite = sum of single-frequency waves. This is Fourier.' }
      ],
      aha: 'composite = slow + mid + fast'
    }
  };

  // ---------------------------------------------------------------------------
  // 几何常量
  // ---------------------------------------------------------------------------
  var W = 1000, H = 600;
  var MID = 300;          // 复合波合并时的中心 y
  var N = 360;            // 采样点数
  var X0 = 70, X1 = 940;  // 绘制 x 范围

  // 三条分量: 频率(周期数) / 幅度 / 相位 / 分离轨道 y
  var COMPS = [
    { freq: 3.0,  amp: 64, phase: 0.0,  laneY: 150, hz: '3 Hz' },   // 慢
    { freq: 10.0, amp: 40, phase: 1.1,  laneY: 300, hz: '10 Hz' },  // 中
    { freq: 22.0, amp: 22, phase: 2.3,  laneY: 450, hz: '22 Hz' }   // 快
  ];

  var EL = {
    scene: document.getElementById('scene'),
    grid: document.getElementById('grid'),
    composite: document.getElementById('composite'),
    aha: document.getElementById('aha'),
    comp: [document.getElementById('comp0'), document.getElementById('comp1'), document.getElementById('comp2')],
    lbl:  [document.getElementById('lbl0'), document.getElementById('lbl1'), document.getElementById('lbl2')],
    hudPhase: document.getElementById('hudPhase'),
    vSlow: document.getElementById('vSlow'),
    vMid: document.getElementById('vMid'),
    vFast: document.getElementById('vFast'),
    vSep: document.getElementById('vSep'),
    cueMain: document.getElementById('cueMain'),
    cueSub: document.getElementById('cueSub')
  };

  // 画静态网格基线
  (function drawGrid() {
    var s = '';
    for (var gx = X0; gx <= X1; gx += 96) {
      s += '<line x1="' + gx + '" y1="40" x2="' + gx + '" y2="560" opacity="0.4"/>';
    }
    for (var gy = 80; gy <= 540; gy += 92) {
      s += '<line x1="' + X0 + '" y1="' + gy + '" x2="' + X1 + '" y2="' + gy + '" opacity="0.5"/>';
    }
    EL.grid.innerHTML = s;
  })();

  // ---------------------------------------------------------------------------
  // 单条分量在 x 处的位移 (相对其零线), tWave = 全局流动相位
  // ---------------------------------------------------------------------------
  function compDisp(c, u, tWave) {
    // u in [0,1] across the screen; freq = 屏内可见周期数
    return c.amp * Math.sin(2 * Math.PI * c.freq * u + c.phase + tWave);
  }

  function smooth(x) { return x * x * (3 - 2 * x); } // smoothstep

  // ---------------------------------------------------------------------------
  // 主循环: 一个连续 cyc 参数 (0..1 循环) 驱动 同一组波 的 separation 形态
  //   cyc 弧线:
  //     0.00-0.22  composite     (sep=0, 三波重叠在 MID, 只显复合波)
  //     0.22-0.45  separating    (sep 0->1, 分量从复合波连续下移到各自 lane)
  //     0.45-0.68  three parts   (sep=1, 三条分量各自荡漾, 标签亮)
  //     0.68-0.92  recombining   (sep 1->0, 分量连续回升相加, aha 闪)
  //     0.92-1.00  composite     (sep=0, 收束, 循环)
  // separation = 0 时三分量都画在 MID 处叠加(即复合波); =1 时各回 laneY.
  // 复合波 composite 始终 = 三分量在 MID 叠加 (永远显示, 它是主角)
  // ---------------------------------------------------------------------------
  var CYCLE_MS = 30000; // 30s 一圈连续演化
  var start = null;

  function phaseOf(cyc) {
    if (cyc < 0.22) return 0;
    if (cyc < 0.45) return 1;
    if (cyc < 0.68) return 2;
    if (cyc < 0.92) return 3;
    return 0;
  }

  // separation 0..1: 分量离开复合波、下沉到各自 lane 的程度
  function separationOf(cyc) {
    if (cyc < 0.22) return 0;
    if (cyc < 0.45) return smooth((cyc - 0.22) / 0.23);       // 0 -> 1
    if (cyc < 0.68) return 1;
    if (cyc < 0.92) return 1 - smooth((cyc - 0.68) / 0.24);   // 1 -> 0
    return 0;
  }

  function buildPath(yOf) {
    var d = 'M';
    for (var i = 0; i <= N; i++) {
      var u = i / N;
      var x = X0 + u * (X1 - X0);
      var y = yOf(u);
      d += (i === 0 ? '' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
    }
    return d;
  }

  function frame(ts) {
    if (start === null) start = ts;
    var elapsed = (ts - start) % CYCLE_MS;
    var cyc = elapsed / CYCLE_MS;
    var tWave = (ts - start) / 1000 * 1.4; // 波形持续流动

    var sep = separationOf(cyc);
    var ph = phaseOf(cyc);
    var T = I18N[LANG];

    // ---- 复合波 (主角): 三分量在 MID 处的实时叠加, 永远可见 ----
    EL.composite.setAttribute('d', buildPath(function (u) {
      var sum = 0;
      for (var k = 0; k < COMPS.length; k++) sum += compDisp(COMPS[k], u, tWave);
      return MID - sum;
    }));
    // 分离时主复合波渐隐, 让位给分量; 重组完成又实
    var compOpacity = 1 - 0.78 * sep;
    EL.composite.setAttribute('opacity', compOpacity.toFixed(3));

    // ---- 三条分量: y 在 (MID) 与 (各自 lane) 之间按 sep 插值, 连续浮现 ----
    for (var k = 0; k < COMPS.length; k++) {
      var c = COMPS[k];
      var lane = MID + (c.laneY - MID) * sep;   // 连续从复合中心滑到各自轨道
      (function (cc, laneY, idx) {
        EL.comp[idx].setAttribute('d', buildPath(function (u) {
          return laneY - compDisp(cc, u, tWave);
        }));
        EL.comp[idx].setAttribute('opacity', (0.15 + 0.85 * sep).toFixed(3));
        // 分量标签跟随轨道
        EL.lbl[idx].setAttribute('y', (laneY - cc.amp - 14).toFixed(1));
        EL.lbl[idx].setAttribute('opacity', sep > 0.4 ? (Math.min(1, (sep - 0.4) / 0.3)).toFixed(3) : '0');
      })(c, lane, k);
    }
    EL.lbl[0].textContent = T.lblSlow;
    EL.lbl[1].textContent = T.lblMid;
    EL.lbl[2].textContent = T.lblFast;

    // ---- aha 高亮 (重组阶段闪现) ----
    var ahaOp = 0;
    if (cyc >= 0.72 && cyc < 0.92) {
      var a = (cyc - 0.72) / 0.20;
      ahaOp = Math.sin(a * Math.PI); // 0->1->0
    }
    EL.aha.textContent = T.aha;
    EL.aha.setAttribute('opacity', ahaOp.toFixed(3));

    // ---- HUD ----
    EL.hudPhase.textContent = T.phases[ph];
    // 频率读数: 随 sep 显现真实频率, sep=0 时显示复合 "?"
    EL.vSlow.textContent = sep > 0.15 ? '3.0 Hz' : '— Hz';
    EL.vMid.textContent  = sep > 0.15 ? '10.0 Hz' : '— Hz';
    EL.vFast.textContent = sep > 0.15 ? '22.0 Hz' : '— Hz';
    EL.vSep.textContent  = Math.round(sep * 100) + '%';

    // ---- 字幕 (辅助点睛) ----
    EL.cueMain.textContent = T.cues[ph].m;
    EL.cueSub.textContent = T.cues[ph].s;

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  // ---------------------------------------------------------------------------
  // i18n 刷新 + lang 切换
  // ---------------------------------------------------------------------------
  function refreshI18N() {
    var T = I18N[LANG];
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (T[key] != null) el.textContent = T[key];
    });
    document.documentElement.lang = LANG;
    // 动态文本下一帧由 frame() 同步
  }

  document.getElementById('langBtn').addEventListener('click', function () {
    LANG = (LANG === 'zh') ? 'en' : 'zh';
    refreshI18N();
  });

  refreshI18N();
})();
</script>
</body>
</html>
