<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>找出想象动手那几秒 · Epoching</title>
<style>
:root{
  /* 第 1 层 — 共享深空底 (所有 26 套统一) */
  --bg-0: oklch(0.14 0.035 265);
  --bg-1: oklch(0.18 0.04 265);
  --bg-2: oklch(0.22 0.045 265);
  --bg-3: oklch(0.28 0.05 265);
  --line: oklch(0.35 0.05 265 / 0.35);
  --line-strong: oklch(0.55 0.08 265 / 0.55);
  --fg:      oklch(0.96 0.01 265);
  --fg-dim:  oklch(0.75 0.02 265);
  --fg-mute: oklch(0.55 0.03 265);
  --gold:    oklch(0.85 0.14 85);
  /* 第 2 层 — cs signature accent (cyan) */
  --accent:  oklch(0.75 0.17 200);
  /* 第 3 层 — cs Data Cathedral 5 色 palette */
  --signal:  oklch(0.75 0.17 200);
  --core:    oklch(0.55 0.16 200);
  --depth:   oklch(0.35 0.10 210);
  --flash:   oklch(0.92 0.08 190);
  --query:   oklch(0.85 0.14 85);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;overflow:hidden}
body{background:var(--bg-0);color:var(--fg);
  font-family:'Noto Sans SC',system-ui,sans-serif;display:flex}
.mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace}
.sidebar{width:200px;flex-shrink:0;height:100vh;background:var(--bg-1);
  border-right:1px solid var(--line);display:flex;flex-direction:column;gap:14px;padding:18px 16px}
.brand{font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.mascot-wrap{display:flex;justify-content:center;padding:6px 0}
.title-cn{font-size:15px;font-weight:700;line-height:1.4}
.title-en{font-size:11px;color:var(--fg-mute);font-style:italic;line-height:1.4}
.guide{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:4px}
.guide li{font-size:11.5px;color:var(--fg-dim);line-height:1.45;padding-left:9px;
  border-left:2px solid var(--core)}
.lang-btn{margin-top:auto;font-size:11px;font-weight:700;letter-spacing:1px;
  padding:6px 10px;cursor:pointer;color:var(--accent);background:var(--bg-2);
  border:1px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0)}
.lang-btn:active{transform:translate(3px,3px);box-shadow:none}
.stage-wrap{flex:1;min-width:0;height:100vh;position:relative}
canvas{display:block;width:100%;height:100%}
.hud{position:absolute;top:14px;right:14px;min-width:188px;padding:11px 13px;
  background:var(--bg-2);border:1px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0)}
.hud-row{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:5px}
.hud-row:last-child{margin-bottom:0}
.hud-k{color:var(--fg-mute);letter-spacing:1px}
.hud-v{color:var(--accent);font-weight:700}
.frame-tag{position:absolute;top:14px;left:14px;font-size:10.5px;letter-spacing:1.5px;
  color:var(--fg-mute);padding:4px 9px;background:var(--bg-1);border:1px solid var(--line)}
.cap{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
  text-align:center;width:78%;pointer-events:none}
.cap-zh{font-size:18px;font-weight:700;color:var(--fg);line-height:1.4;
  text-shadow:0 2px 12px var(--bg-0)}
.cap-en{font-size:12px;font-style:italic;color:var(--fg-mute);margin-top:4px}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand mono">CS-01 · EPOCHING</div>
  <div class="mascot-wrap" id="mascotWrap"></div>
  <div>
    <div class="title-cn" id="ttlZh">找出想象动手那几秒</div>
    <div class="title-en mono" id="ttlEn">Cut out the imagining seconds</div>
  </div>
  <ul class="guide">
    <li id="g1">一整条连续的脑波录音</li>
    <li id="g2">每次提示落一个事件标记</li>
    <li id="g3">以标记为锚切出对齐的 epoch</li>
  </ul>
  <button class="lang-btn mono" id="langBtn">中 / EN</button>
</aside>
<main class="stage-wrap">
  <canvas id="stage"></canvas>
  <div class="frame-tag mono" id="frameTag">PHASE</div>
  <div class="hud">
    <div class="hud-row"><span class="hud-k mono" id="hk1">PHASE</span><span class="hud-v mono" id="hv1">--</span></div>
    <div class="hud-row"><span class="hud-k mono" id="hk2">EVENTS</span><span class="hud-v mono" id="hv2">0</span></div>
    <div class="hud-row"><span class="hud-k mono" id="hk3">EPOCHS</span><span class="hud-v mono" id="hv3">0</span></div>
    <div class="hud-row"><span class="hud-k mono" id="hk4">WINDOW</span><span class="hud-v mono" id="hv4">-0.5~4s</span></div>
  </div>
  <div class="cap">
    <div class="cap-zh" id="capZh"></div>
    <div class="cap-en mono" id="capEn"></div>
  </div>
</main>
<script>
(function(){
"use strict";
var LANG='cn';
var I18N={
  ttlZh:{cn:'找出想象动手那几秒',en:'Find the imagining seconds'},
  ttlEn:{cn:'把一条长录音切成对齐的 epoch',en:'Slice one long recording into epochs'},
  g1:{cn:'一整条连续的脑波录音',en:'One long continuous EEG recording'},
  g2:{cn:'每次提示落一个事件标记',en:'Each cue drops an event marker'},
  g3:{cn:'以标记为锚切出对齐的 epoch',en:'Anchor on markers, cut aligned epochs'},
  hk1:{cn:'阶段',en:'PHASE'},hk2:{cn:'事件数',en:'EVENTS'},hk3:{cn:'切片数',en:'EPOCHS'},hk4:{cn:'窗口',en:'WINDOW'},
  ph:{cn:['流出录音','落下标记','滑窗切片','对齐堆叠'],
      en:['STREAMING','MARKING','WINDOWING','STACKING']},
  caps:{
    cn:['这是一整条几分钟的连续脑波——想象、休息全混在一条线里流过。',
        '实验里每次提示「想象动手」，就在那一刻落下一个事件标记。',
        '以每个标记为锚，向前 0.5 秒、向后 4 秒框出一个窗口，抽成一段 epoch。',
        '每段都这样抽出来、对齐时间零点叠成一摞——这就是 [288, 22, 1125]。'],
    en:['One long continuous brain wave — imagining and rest all flow in a single line.',
        'Each "imagine movement" cue drops an event marker at that exact moment.',
        'Anchor on each marker: window -0.5s to +4s, lift out one epoch segment.',
        'Lift every segment, align on t=0, stack them — the array [288, 22, 1125].']
  }
};
function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

// ---- Bit mascot (levitating cubic sprite, cs palette) ----
function mascotSVG(){
  return '<svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">'
    +'<g>'
    +'<polygon points="32,8 52,18 52,40 32,50 12,40 12,18" fill="var(--core)" opacity="0.35"/>'
    +'<polygon points="32,8 52,18 32,28 12,18" fill="var(--signal)" opacity="0.9"/>'
    +'<polygon points="12,18 32,28 32,50 12,40" fill="var(--depth)" opacity="0.9"/>'
    +'<polygon points="52,18 32,28 32,50 52,40" fill="var(--core)" opacity="0.9"/>'
    +'<rect x="27" y="20" width="4" height="4" fill="var(--flash)"/>'
    +'<rect x="35" y="24" width="4" height="4" fill="var(--query)"/>'
    +'<rect x="22" y="32" width="4" height="4" fill="var(--flash)"/>'
    +'</g></svg>';
}

var canvas=document.getElementById('stage'),ctx=canvas.getContext('2d');
var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
function resize(){var r=canvas.parentElement.getBoundingClientRect();
  if(r.width<1||r.height<1)return;
  W=r.width;H=r.height;canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);
setTimeout(resize,200);setTimeout(resize,600);
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(resize);

function cssv(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function lerp(a,b,p){return a+(b-a)*p;}
function easeIO(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function clamp01(x){return x<0?0:x>1?1:x;}

// the ONE long recording: events along it (position 0..1, hand L/R)
var EVENTS=[{p:0.10,h:'L'},{p:0.235,h:'R'},{p:0.37,h:'L'},
            {p:0.505,h:'R'},{p:0.64,h:'L'},{p:0.775,h:'R'},{p:0.90,h:'L'}];
var PRE=0.022;   // -0.5s portion, fraction of full recording
var POST=0.078;  // +4s portion

// ---- single continuous timeline (no frame switching) ----
var startT=null, CYCLE=34000;       // 34s loop
// phase boundaries within the cycle (cumulative progress 0..1)
var PH=[0.20,0.42,0.74,1.00];       // stream / mark / window / stack
function phaseOf(p){
  if(p<PH[0])return 0; if(p<PH[1])return 1; if(p<PH[2])return 2; return 3;
}
var lastPhase=-1;

// recording waveform sample (deterministic, smooth)
function waveAt(tt,now,seed){
  return Math.sin(tt*52+now/640+seed)*0.40
       + Math.sin(tt*135+seed*2)*0.15
       + Math.sin(tt*20+now/980)*0.27;
}

function drawGrid(){
  ctx.strokeStyle=cssv('--line');ctx.lineWidth=0.5;ctx.globalAlpha=0.5;
  for(var gx=0;gx<W;gx+=36){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(var gy=0;gy<H;gy+=36){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  ctx.globalAlpha=1;
}

function label(txt,x,y,col,size,align){
  ctx.save();
  ctx.font='700 '+size+"px 'JetBrains Mono',ui-monospace,monospace";
  ctx.fillStyle=col;ctx.textAlign=align||'left';ctx.textBaseline='middle';
  ctx.fillText(txt,x,y);ctx.restore();
}

// geometry of the one long recording lane
var REC={};
function recGeom(){
  REC.x0=46; REC.x1=W-150; REC.y=H*0.26; REC.h=H*0.165;
  REC.span=REC.x1-REC.x0;
}
// x position of recording fraction
function rfx(p){return REC.x0+p*REC.span;}

// draw the long recording, only up to fraction "drawn"; segments under
// extracted windows fade once lifted (lift 0..1 global)
function drawRecording(now,drawn,activeWinCenter,lift){
  ctx.save();
  ctx.lineWidth=1.7;
  ctx.beginPath();
  var started=false;
  var maxX=rfx(drawn);
  for(var x=REC.x0;x<=maxX;x+=2){
    var tt=(x-REC.x0)/REC.span;
    var yy=REC.y - waveAt(tt,now,0)*REC.h/2;
    if(!started){ctx.moveTo(x,yy);started=true;}else ctx.lineTo(x,yy);
  }
  // recording dims as epochs get lifted out
  var dim=1-0.45*lift;
  ctx.globalAlpha=dim;
  ctx.strokeStyle=cssv('--signal');
  ctx.stroke();
  ctx.restore();
  // baseline + time axis
  ctx.save();
  ctx.strokeStyle=cssv('--line-strong');ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(REC.x0,REC.y+REC.h/2+16);ctx.lineTo(maxX,REC.y+REC.h/2+16);ctx.stroke();
  ctx.restore();
  label(LANG==='cn'?'一整条连续录音   时间 ->':'one continuous recording   time ->',
        REC.x0,REC.y-REC.h/2-18,cssv('--fg-mute'),11,'left');
}

// flag marker at fraction p, grow 0..1
function flagMarker(p,col,lab,grow){
  var ex=rfx(p);
  var ytop=REC.y-REC.h/2-10, ybot=REC.y+REC.h/2+16;
  ctx.save();
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.globalAlpha=grow;
  ctx.beginPath();ctx.moveTo(ex,ybot);ctx.lineTo(ex,lerp(ybot,ytop,grow));ctx.stroke();
  ctx.fillStyle=col;
  var fy=lerp(ybot,ytop,grow);
  ctx.beginPath();ctx.moveTo(ex,fy);ctx.lineTo(ex+15,fy+5);ctx.lineTo(ex,fy+10);ctx.closePath();ctx.fill();
  if(grow>0.7){
    ctx.globalAlpha=(grow-0.7)/0.3;
    ctx.font="9px 'JetBrains Mono',monospace";ctx.fillStyle=col;ctx.textAlign='center';
    ctx.fillText(lab,ex,fy-7);
  }
  ctx.restore();
}

// extracted epoch waveform (re-samples the SAME recording in [p-PRE, p+POST])
function epochWaveOf(p,bx,by,bw,bh,col,now){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1.4;ctx.beginPath();
  var t0=p-PRE, t1=p+POST, started=false;
  for(var i=0;i<=bw;i+=2){
    var ftt=t0+(i/bw)*(t1-t0);
    var v=waveAt(ftt,now,0);
    var yy=by+bh/2 - v*bh*0.40;
    if(!started){ctx.moveTo(bx+i,yy);started=true;}else ctx.lineTo(bx+i,yy);
  }
  ctx.stroke();ctx.restore();
}

function draw(now){
  if(startT===null)startT=now;
  if(!W||!H){requestAnimationFrame(draw);return;}
  recGeom();
  var prog=((now-startT)%CYCLE)/CYCLE;
  var phase=phaseOf(prog);
  if(phase!==lastPhase){updateHUDtext(phase);updateCaption(phase);lastPhase=phase;}

  var signal=cssv('--signal'),core=cssv('--core'),flash=cssv('--flash'),
      query=cssv('--query'),accent=cssv('--accent'),
      fgmute=cssv('--fg-mute'),fgdim=cssv('--fg-dim'),gold=cssv('--gold');
  var colL=signal, colR=query;

  // ---- phase-local progress (continuous, overlapping; nothing ever cleared) ----
  // p0: recording draws out 0..1
  var p0=clamp01(prog/PH[0]);
  var drawn=easeIO(p0);
  // p1: markers fall in, staggered across [PH0..PH1]
  var p1=clamp01((prog-PH[0])/(PH[1]-PH[0]));
  // p2: window slides across, lifting epochs, across [PH1..PH2]
  var p2=clamp01((prog-PH[1])/(PH[2]-PH[1]));
  // p3: final stack settle + gold takeaway, across [PH2..1]
  var p3=clamp01((prog-PH[2])/(1-PH[2]));

  ctx.clearRect(0,0,W,H);
  drawGrid();

  // how much the recording has been "consumed" into epochs (drives dim)
  var lift = phase>=2 ? p2 : 0;

  // ===== THE ONE LONG RECORDING (always present) =====
  drawRecording(now,drawn,0,lift);

  // ===== event markers (persist once dropped) =====
  var marksShown=0;
  if(phase>=1){
    for(var i=0;i<EVENTS.length;i++){
      var startF=i/EVENTS.length, endF=(i+1)/EVENTS.length;
      var grow = phase===1 ? clamp01((p1-startF)/(endF-startF)) : 1;
      if(grow<=0)continue;
      var ev=EVENTS[i];
      flagMarker(ev.p,ev.h==='L'?colL:colR,'EV'+(i+1),grow);
      if(grow>0.6)marksShown++;
    }
    // legend (right of recording)
    label(LANG==='cn'?'L 想象左手':'L hand',REC.x1+14,REC.y-REC.h/2,colL,10,'left');
    label(LANG==='cn'?'R 想象右手':'R hand',REC.x1+14,REC.y-REC.h/2+16,colR,10,'left');
  }

  // ===== stack area below: epochs lifted out, aligned on t=0 =====
  var sx=W*0.30, sTop=H*0.55, eh=Math.max(15,(H*0.36)/EVENTS.length-6), gap=6, ew=W*0.30;
  var t0x=sx+ew*(PRE/(PRE+POST)); // aligned t=0 column

  // which events have been lifted (sliding window passes each)
  if(phase>=2){
    for(var s=0;s<EVENTS.length;s++){
      var ev2=EVENTS[s];
      // window reaches event s at fraction s/N of the slide
      var reach = clamp01((p2*EVENTS.length)-s);
      if(reach<=0)continue;
      var col=ev2.h==='L'?colL:colR;
      // source box position on the recording (around the marker)
      var srcX=rfx(ev2.p-PRE), srcY=REC.y-eh/2, srcW=ew*((PRE+POST)/(PRE+POST));
      // we draw a small lift-out rect interpolating from recording to the stack slot
      var dstX=sx, dstY=sTop+s*(eh+gap);
      var ease=easeIO(reach);
      var bx=lerp(rfx(ev2.p)-ew/2,dstX,ease);
      var by=lerp(REC.y-eh/2,dstY,ease);
      ctx.save();ctx.globalAlpha=0.35+0.65*reach;
      ctx.fillStyle=cssv('--bg-2');ctx.fillRect(bx,by,ew,eh);
      ctx.strokeStyle=col;ctx.lineWidth=1.4;ctx.strokeRect(bx,by,ew,eh);
      epochWaveOf(ev2.p,bx+4,by+2,ew-34,eh-4,col,now);
      ctx.font="8px 'JetBrains Mono',monospace";ctx.fillStyle=col;ctx.textAlign='right';
      ctx.fillText(ev2.h,bx+ew-6,by+eh/2+3);
      ctx.restore();
    }
    // aligned t=0 guide line through the settled stack
    if(p2>0.15){
      ctx.save();ctx.globalAlpha=clamp01((p2-0.15)*2)*0.8;
      ctx.strokeStyle=accent;ctx.lineWidth=1.4;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(t0x,sTop-12);ctx.lineTo(t0x,sTop+EVENTS.length*(eh+gap));ctx.stroke();
      ctx.setLineDash([]);
      label('t=0',t0x,sTop-22,accent,10,'center');
      ctx.restore();
    }
    label(LANG==='cn'?'抽出对齐 -> 叠成一摞':'lift & align -> stack',sx,sTop-22,fgdim,11,'left');
  }

  // ===== sliding window head (the cutter), visible during phase 2 =====
  if(phase===2){
    var headP=lerp(EVENTS[0].p,EVENTS[EVENTS.length-1].p,p2);
    var wx=rfx(headP-PRE), wW=(PRE+POST)*REC.span;
    var wy=REC.y-REC.h/2-12, wh=REC.h+28;
    ctx.save();
    ctx.fillStyle=accent;ctx.globalAlpha=0.12;ctx.fillRect(wx,wy,wW,wh);
    ctx.globalAlpha=0.95;ctx.strokeStyle=accent;ctx.lineWidth=2;ctx.strokeRect(wx,wy,wW,wh);
    label('-0.5s',wx,wy-8,fgmute,9,'left');
    label('+4s',wx+wW,wy-8,fgmute,9,'right');
    ctx.restore();
  }

  // ===== phase 3: count badge + 3D-array gold takeaway =====
  if(phase>=3){
    // count growing toward 288
    var cnt=Math.round(lerp(EVENTS.length, 288, easeIO(clamp01(p3*1.4))));
    label('... x  '+cnt,sx+ew+18,sTop+EVENTS.length*(eh+gap)/2,accent,15,'left');

    if(p3>0.35){
      var ap=clamp01((p3-0.35)/0.5);
      ctx.save();ctx.globalAlpha=ap;
      var tx=W*0.50, tyc=H*0.50;
      var bw2=W*0.30,bh2=104;
      ctx.fillStyle=cssv('--bg-1');ctx.strokeStyle=gold;ctx.lineWidth=2;
      ctx.fillRect(tx-bw2/2,tyc-bh2/2,bw2,bh2);ctx.strokeRect(tx-bw2/2,tyc-bh2/2,bw2,bh2);
      ctx.fillStyle=gold;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='700 16px "JetBrains Mono",monospace';
      ctx.fillText('[ 288, 22, 1125 ]',tx,tyc-26);
      ctx.font='600 11px "JetBrains Mono",monospace';ctx.fillStyle=cssv('--fg-dim');
      ctx.fillText('trials  x  channels  x  time',tx,tyc-4);
      ctx.fillStyle=gold;ctx.font='700 13px "Noto Sans SC",sans-serif';
      var key=LANG==='cn'?'长录音 -> 一摞对齐的 epoch':'long recording -> a stack of aligned epochs';
      ctx.fillText(key,tx,tyc+26);
      ctx.restore();
    }
  }

  // HUD numbers
  var evNum = phase<1?0 : (phase===1?marksShown : EVENTS.length);
  var epoNum;
  if(phase<2)epoNum=0;
  else if(phase===2)epoNum=Math.min(EVENTS.length,Math.floor(p2*EVENTS.length)+1);
  else epoNum=288;
  document.getElementById('hv2').textContent= phase>=2 ? '288' : String(evNum);
  document.getElementById('hv3').textContent= String(epoNum);

  requestAnimationFrame(draw);
}

function updateHUDtext(phase){
  document.getElementById('hv1').textContent=t('ph')[phase];
  document.getElementById('frameTag').textContent='PHASE '+(phase+1)+' / 4';
}
function updateCaption(phase){
  var caps=I18N.caps[LANG]||I18N.caps.en;
  document.getElementById('capZh').textContent=caps[phase]||'';
  document.getElementById('capEn').textContent=I18N.caps.en[phase]||'';
}

function refreshI18N(){
  document.getElementById('ttlZh').textContent=t('ttlZh');
  document.getElementById('ttlEn').textContent=t('ttlEn');
  document.getElementById('g1').textContent=t('g1');
  document.getElementById('g2').textContent=t('g2');
  document.getElementById('g3').textContent=t('g3');
  document.getElementById('hk1').textContent=t('hk1');
  document.getElementById('hk2').textContent=t('hk2');
  document.getElementById('hk3').textContent=t('hk3');
  document.getElementById('hk4').textContent=t('hk4');
  document.getElementById('mascotWrap').innerHTML=mascotSVG();
  var ph=lastPhase<0?0:lastPhase;
  updateHUDtext(ph);updateCaption(ph);
}

document.getElementById('langBtn').addEventListener('click',function(){
  LANG=LANG==='cn'?'en':'cn';refreshI18N();
});

document.getElementById('mascotWrap').innerHTML=mascotSVG();
refreshI18N();
resize();
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
