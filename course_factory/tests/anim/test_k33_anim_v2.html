<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(255,181,156,0.15);overflow-y:auto;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;}
.lang-btn:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar h1{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);margin-top:4px;line-height:1.3;}
.sidebar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.06em;text-transform:uppercase;}
.sidebar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary,#50ffb0);margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
// ============================================================
// K33: S3 Capstone - Engine Selection Report
// 4 engines for a 300g rocket targeting 150m altitude
// ============================================================

// --- Engine data ---
// Model rocket engines: HT = half-thrust hobby class, C5 = C-class
// Impulse in N-s, thrust in N, burn in seconds
var ENGINES = [
  {id:'HT-0', thrust:4.2,  burn:0.4, impulse:1.7,  isp:65,  delay:0, small:true},
  {id:'HT-3', thrust:4.2,  burn:0.4, impulse:1.7,  isp:65,  delay:3, small:true},
  {id:'C5-0', thrust:14.0, burn:0.6, impulse:8.8,  isp:100, delay:0, small:false},
  {id:'C5-3', thrust:14.0, burn:0.6, impulse:8.8,  isp:100, delay:3, small:false},
];
var ROCKET_MASS = 0.3; // kg (300g)
var G = 9.81;
var TARGET_ALT = 150;

// Derived computations
// TWR = thrust / weight
function calcTWR(eng) { return eng.thrust / (ROCKET_MASS * G); }
// Ideal altitude: burnout velocity v = I/m, then h_ideal = v^2 / (2g)
function calcIdealAlt(eng) { return (eng.impulse * eng.impulse) / (2 * ROCKET_MASS * ROCKET_MASS * G); }
// Corrected altitude ~ 60% of ideal (drag + mass loss + real losses)
function calcCorrectedAlt(eng) { return calcIdealAlt(eng) * 0.6; }

// TWR >= 2 is minimum for stable liftoff; >= 5 is ideal
var TWR_THRESHOLD = 5;
var ENGINE_COLORS = ['#ff716c', '#85ecff', '#ffb59c', '#acf900'];
var ENGINE_GLOW   = ['rgba(255,113,108,0.3)', 'rgba(133,236,255,0.3)', 'rgba(255,181,156,0.3)', 'rgba(172,249,0,0.3)'];

// --- Particle system for F4 ---
var particles = [];
var particleTick = 0;

function spawnParticles(cx, cy) {
  for (var i = 0; i < 8; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.3 + Math.random() * 0.8;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 60 + Math.floor(Math.random() * 40),
      age: 0,
      color: ENGINE_COLORS[3],
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.005;
    p.age++;
    if (p.age > p.life) particles.splice(i, 1);
  }
}

// --- Sound (muted by default) ---
var soundMuted = true;

// --- CONFIG ---
var CONFIG = {
  style: 'ares_mission',
  totalFrames: 5,

  i18n: {
    title:     {en:'ENGINE SELECTION REPORT', cn:'\u53d1\u52a8\u673a\u9009\u578b\u62a5\u544a'},
    subtitle:  {en:'S3 CAPSTONE', cn:'S3 \u5927\u4f5c\u4e1a'},
    coreQ:     {en:'Which engine to reach 150m with a 300g rocket?', cn:'\u5982\u679c\u8981\u8ba9300g\u7684\u706b\u7bad\u63a5\u8fd1150m\uff0c\u4f60\u4f1a\u9009\u54ea\u6b3e\u53d1\u52a8\u673a\uff1f'},
    target:    {en:'TARGET: 150m', cn:'\u76ee\u6807\uff1a150m'},
    rocket300: {en:'300g Rocket', cn:'300g \u706b\u7bad'},
    // F1: Spec cards
    f1title:   {en:'ENGINE SPECIFICATIONS', cn:'\u53d1\u52a8\u673a\u53c2\u6570\u5361'},
    thrustL:   {en:'Thrust', cn:'\u63a8\u529b'},
    burnL:     {en:'Burn Time', cn:'\u71c3\u70e7\u65f6\u95f4'},
    impulseL:  {en:'Total Impulse', cn:'\u603b\u51b2\u91cf'},
    ispL:      {en:'Isp', cn:'\u6bd4\u51b2'},
    delayL:    {en:'Delay', cn:'\u5ef6\u8fdf'},
    unitN:     {en:'N', cn:'N'},
    unitS:     {en:'s', cn:'s'},
    unitNs:    {en:'N-s', cn:'N\u00b7s'},
    // F2: TWR
    f2title:   {en:'TWR CHECK (Thrust-to-Weight Ratio)', cn:'TWR \u68c0\u67e5\uff08\u63a8\u91cd\u6bd4\uff09'},
    twrLabel:  {en:'TWR', cn:'\u63a8\u91cd\u6bd4'},
    twrThresh: {en:'TWR >= 5 required', cn:'\u8981\u6c42 TWR >= 5'},
    passLabel: {en:'PASS', cn:'\u901a\u8fc7'},
    failLabel: {en:'FAIL', cn:'\u4e0d\u901a\u8fc7'},
    formula:   {en:'TWR = Thrust / (mass x g)', cn:'TWR = \u63a8\u529b / (\u8d28\u91cf x g)'},
    // F3: Altitude
    f3title:   {en:'IDEAL ALTITUDE COMPARISON', cn:'\u7406\u60f3\u5c04\u9ad8\u5bf9\u6bd4'},
    idealAlt:  {en:'Ideal Altitude', cn:'\u7406\u60f3\u5c04\u9ad8'},
    corrAlt:   {en:'~Corrected', cn:'\u4fee\u6b63\u540e'},
    targetLine:{en:'TARGET 150m', cn:'\u76ee\u6807 150m'},
    meterUnit: {en:'m', cn:'m'},
    tooLow:    {en:'Too low', cn:'\u5c04\u9ad8\u4e0d\u8db3'},

    f4title:   {en:'RECOMMENDATION', cn:'\u63a8\u8350\u7ed3\u679c'},
    recommend: {en:'RECOMMENDED', cn:'\u63a8\u8350'},
    winner:    {en:'C5-3', cn:'C5-3'},
    reason1:   {en:'Ideal alt ~245m, corrected ~147m', cn:'\u7406\u60f3\u5c04\u9ad8~245m\uff0c\u4fee\u6b63\u540e~147m'},
    reason2:   {en:'3s delay for parachute deployment', cn:'3\u79d2\u5ef6\u8fdf\u7528\u4e8e\u5f00\u4f1e'},
    reason3:   {en:'TWR=3.4, adequate for stable flight', cn:'TWR=3.4\uff0c\u8db3\u591f\u7a33\u5b9a\u98de\u884c'},
    rejectHT0: {en:'HT-0: Low impulse, no delay', cn:'HT-0: \u51b2\u91cf\u4f4e\uff0c\u65e0\u5ef6\u8fdf'},
    rejectHT3: {en:'HT-3: Low impulse (alt ~7m)', cn:'HT-3: \u51b2\u91cf\u4f4e\uff08\u5c04\u9ad8~7m\uff09'},
    rejectC50: {en:'C5-0: No delay, chute risk', cn:'C5-0: \u65e0\u5ef6\u8fdf\uff0c\u5f00\u4f1e\u98ce\u9669'},
    complete:  {en:'REPORT COMPLETE', cn:'\u62a5\u544a\u5b8c\u6210'},
    // HUD
    hudFrame:  {en:'FRAME', cn:'\u5e27'},
    hudStep:   {en:'STEP', cn:'\u6b65\u9aa4'},
    hudEngines:{en:'ENGINES', cn:'\u53d1\u52a8\u673a'},
    hudTarget: {en:'TARGET', cn:'\u76ee\u6807'},
    stepIntro: {en:'INTRO',    cn:'\u5f15\u5165'},
    stepSpec:  {en:'SPECS',    cn:'\u53c2\u6570'},
    stepTWR:   {en:'TWR',      cn:'\u63a8\u91cd\u6bd4'},
    stepAlt:   {en:'ALTITUDE', cn:'\u5c04\u9ad8'},
    stepPick:  {en:'PICK',     cn:'\u9009\u578b'},
    // Guide
    guideTitle:{en:'ANALYSIS GUIDE', cn:'\u5206\u6790\u6307\u5357'},
    g1: {en:'Compare thrust, impulse, Isp of 4 engines', cn:'\u5bf9\u6bd44\u6b3e\u53d1\u52a8\u673a\u7684\u63a8\u529b\u3001\u51b2\u91cf\u3001\u6bd4\u51b2'},
    g2: {en:'Check TWR >= 5 for safe liftoff', cn:'\u68c0\u67e5\u63a8\u91cd\u6bd4\u662f\u5426>=5\u4fdd\u8bc1\u5b89\u5168\u8d77\u98de'},
    g3: {en:'Calculate ideal altitude for each engine', cn:'\u8ba1\u7b97\u6bcf\u6b3e\u53d1\u52a8\u673a\u7684\u7406\u60f3\u5c04\u9ad8'},
    g4: {en:'Pick the engine that meets the 150m target', cn:'\u9009\u62e9\u80fd\u8fbe\u5230150m\u76ee\u6807\u7684\u53d1\u52a8\u673a'},
  },

  hudLabels: ['hudFrame', 'hudStep', 'hudEngines', 'hudTarget'],
  hudValues: [
    ['1/5', 'stepIntro', '4', '150m'],
    ['2/5', 'stepSpec',  '4', '150m'],
    ['3/5', 'stepTWR',   '4', '150m'],
    ['4/5', 'stepAlt',   '4', '150m'],
    ['5/5', 'stepPick',  '4', '150m'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],
};

// ============================================================
// CUSTOM DRAW HELPERS
// ============================================================

// Glass panel card
function drawGlassCard(ctx, x, y, w, h, borderColor, glowColor) {
  ctx.save();
  ctx.fillStyle = 'rgba(32,31,31,0.55)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = borderColor || 'rgba(255,181,156,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  if (glowColor) {
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 12;
    ctx.strokeRect(x, y, w, h);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// Engine silhouette (nozzle shape)
function drawEngineSilhouette(ctx, cx, cy, scl, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scl, scl);
  // Body cylinder
  ctx.fillStyle = color;
  ctx.fillRect(-8, -20, 16, 28);
  // Nozzle
  ctx.beginPath();
  ctx.moveTo(-8, 8);
  ctx.lineTo(-12, 18);
  ctx.lineTo(12, 18);
  ctx.lineTo(8, 8);
  ctx.closePath();
  ctx.fill();
  // Top cap
  ctx.beginPath();
  ctx.arc(0, -20, 8, Math.PI, 0);
  ctx.fill();
  ctx.restore();
}

// Rocket shape
function drawRocket(ctx, cx, cy, scl, bodyColor) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scl, scl);
  // Body
  ctx.fillStyle = bodyColor || '#e5e2e1';
  ctx.fillRect(-6, -20, 12, 30);
  // Nose cone
  ctx.beginPath();
  ctx.moveTo(0, -32);
  ctx.lineTo(-6, -20);
  ctx.lineTo(6, -20);
  ctx.closePath();
  ctx.fillStyle = '#ffb59c';
  ctx.fill();
  // Fins
  ctx.beginPath();
  ctx.moveTo(-6, 10);
  ctx.lineTo(-14, 16);
  ctx.lineTo(-6, 6);
  ctx.closePath();
  ctx.fillStyle = '#ff7f50';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(6, 10);
  ctx.lineTo(14, 16);
  ctx.lineTo(6, 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Checkmark
function drawCheck(ctx, x, y, size, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x - size * 0.4, y);
  ctx.lineTo(x - size * 0.1, y + size * 0.35);
  ctx.lineTo(x + size * 0.45, y - size * 0.3);
  ctx.stroke();
  ctx.restore();
}

// Cross mark
function drawCross(ctx, x, y, size, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - size * 0.3, y - size * 0.3);
  ctx.lineTo(x + size * 0.3, y + size * 0.3);
  ctx.moveTo(x + size * 0.3, y - size * 0.3);
  ctx.lineTo(x - size * 0.3, y + size * 0.3);
  ctx.stroke();
  ctx.restore();
}

// Star badge
function drawStarBadge(ctx, cx, cy, r, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var angle = -Math.PI / 2 + i * Math.PI * 2 / 5;
    var innerAngle = angle + Math.PI / 5;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    else ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.lineTo(cx + r * 0.45 * Math.cos(innerAngle), cy + r * 0.45 * Math.sin(innerAngle));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============================================================
// customDrawElement -- handles complex types
// ============================================================
function customDrawElement(ctx, el, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;

  // --- F0: title frame ---
  if (el.type === 'engine_lineup') {
    var baseY = el.y;
    var spacing = el.spacing || 120;
    var startX = el.x - spacing * 1.5;
    for (var i = 0; i < 4; i++) {
      var ex = startX + i * spacing;
      var scl = ENGINES[i].small ? 0.8 : 1.2;
      drawEngineSilhouette(ctx, ex, baseY, scl, ENGINE_COLORS[i]);
      ctx.fillStyle = P.text;
      ctx.font = "bold 10px 'Space Grotesk',sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(ENGINES[i].id, ex, baseY + 30);
    }
    return true;
  }

  if (el.type === 'target_line') {
    // Dashed target line across frame
    ctx.save();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = P.error;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(el.x1, el.y);
    ctx.lineTo(el.x2, el.y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Flag
    ctx.fillStyle = P.error;
    ctx.fillRect(el.x2 - 30, el.y - 12, 28, 10);
    ctx.fillStyle = P.text;
    ctx.font = "bold 8px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('150m', el.x2 - 16, el.y - 5);
    // Flagpole
    ctx.strokeStyle = P.error;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(el.x2 - 2, el.y - 14);
    ctx.lineTo(el.x2 - 2, el.y + 6);
    ctx.stroke();
    ctx.restore();
    return true;
  }

  // --- F1: spec cards ---
  if (el.type === 'spec_card') {
    var eng = ENGINES[el.engineIdx];
    var cardW = el.cardW || 130;
    var cardH = el.cardH || 160;
    var cx = el.x;
    var cy = el.y;

    drawGlassCard(ctx, cx - cardW/2, cy - cardH/2, cardW, cardH, ENGINE_COLORS[el.engineIdx] + '60', ENGINE_GLOW[el.engineIdx]);

    // Engine name header
    ctx.fillStyle = ENGINE_COLORS[el.engineIdx];
    ctx.font = "bold 14px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(eng.id, cx, cy - cardH/2 + 22);

    // Silhouette
    drawEngineSilhouette(ctx, cx, cy - cardH/2 + 50, eng.small ? 0.6 : 0.85, ENGINE_COLORS[el.engineIdx]);

    // Specs
    var specY = cy - cardH/2 + 80;
    var specGap = 18;
    ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'left';
    var specData = [
      [t('thrustL'), eng.thrust + ' ' + t('unitN')],
      [t('burnL'),   eng.burn + ' ' + t('unitS')],
      [t('impulseL'), eng.impulse + ' ' + t('unitNs')],
      [t('ispL'),    eng.isp + ' ' + t('unitS')],
    ];
    for (var si = 0; si < specData.length; si++) {
      ctx.fillStyle = P.muted;
      ctx.fillText(specData[si][0], cx - cardW/2 + 10, specY + si * specGap);
      ctx.fillStyle = P.text;
      ctx.textAlign = 'right';
      ctx.fillText(specData[si][1], cx + cardW/2 - 10, specY + si * specGap);
      ctx.textAlign = 'left';
    }

    return true;
  }

  // --- F2: TWR bar ---
  if (el.type === 'twr_bar') {
    var eng2 = ENGINES[el.engineIdx];
    var twr = calcTWR(eng2);
    var pass = twr >= TWR_THRESHOLD;
    var barX = el.x;
    var barY = el.y;
    var barW = el.barW || 100;
    var barH = el.barH || 24;

    // Rocket icon
    drawRocket(ctx, barX - 30, barY + barH/2, 0.5, ENGINE_COLORS[el.engineIdx]);

    // Engine label
    ctx.fillStyle = ENGINE_COLORS[el.engineIdx];
    ctx.font = "bold 11px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText(eng2.id, barX - 10, barY + 6);

    // TWR bar background
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(barX + 50, barY, barW, barH);

    // TWR bar fill
    var maxTWR = 12;
    var fillW = Math.min(twr / maxTWR, 1) * barW;
    var barColor = pass ? '#acf900' : P.error;
    ctx.fillStyle = barColor;
    ctx.fillRect(barX + 50, barY, fillW, barH);

    // Glow on bar
    ctx.save();
    ctx.shadowColor = barColor;
    ctx.shadowBlur = 8;
    ctx.fillRect(barX + 50, barY, fillW, barH);
    ctx.shadowBlur = 0;
    ctx.restore();

    // TWR value
    ctx.fillStyle = P.text;
    ctx.font = "bold 12px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText(twr.toFixed(1), barX + 50 + fillW + 8, barY + barH/2 + 4);

    // Threshold marker
    var threshX = barX + 50 + (TWR_THRESHOLD / maxTWR) * barW;
    ctx.strokeStyle = P.muted;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(threshX, barY - 4);
    ctx.lineTo(threshX, barY + barH + 4);
    ctx.stroke();
    ctx.setLineDash([]);

    // Check or cross
    var markX = barX + 50 + barW + 50;
    if (pass) {
      drawCheck(ctx, markX, barY + barH/2, 16, '#acf900');
      ctx.fillStyle = '#acf900';
      ctx.font = "bold 10px 'Space Grotesk',sans-serif";
      ctx.textAlign = 'left';
      ctx.fillText(t('passLabel'), markX + 14, barY + barH/2 + 4);
    } else {
      drawCross(ctx, markX, barY + barH/2, 16, P.error);
      ctx.fillStyle = P.error;
      ctx.font = "bold 10px 'Space Grotesk',sans-serif";
      ctx.textAlign = 'left';
      ctx.fillText(t('failLabel'), markX + 14, barY + barH/2 + 4);
    }

    return true;
  }

  // --- F3: altitude bar chart ---
  if (el.type === 'alt_bar') {
    var eng3 = ENGINES[el.engineIdx];
    var ideal = calcIdealAlt(eng3);
    var corrected = calcCorrectedAlt(eng3);
    var bx = el.x;
    var by = el.baseY;
    var bw = el.barWidth || 60;
    var maxH = el.maxBarH || 200;
    var maxVal = 300; // scale up to 300m for chart

    // Ideal altitude bar
    var idealH = Math.min(ideal / maxVal, 1) * maxH;
    var corrH  = Math.min(corrected / maxVal, 1) * maxH;

    // Bar fill (ideal)
    var grad = ctx.createLinearGradient(bx, by, bx, by - idealH);
    grad.addColorStop(0, ENGINE_COLORS[el.engineIdx] + '40');
    grad.addColorStop(1, ENGINE_COLORS[el.engineIdx]);
    ctx.fillStyle = grad;
    ctx.fillRect(bx, by - idealH, bw, idealH);

    // Glow
    ctx.save();
    ctx.shadowColor = ENGINE_GLOW[el.engineIdx];
    ctx.shadowBlur = 10;
    ctx.fillRect(bx, by - idealH, bw, idealH);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Corrected line marker
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = ENGINE_COLORS[el.engineIdx];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(bx - 5, by - corrH);
    ctx.lineTo(bx + bw + 5, by - corrH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Engine name label
    ctx.fillStyle = ENGINE_COLORS[el.engineIdx];
    ctx.font = "bold 11px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(eng3.id, bx + bw/2, by + 16);

    // Ideal value
    ctx.fillStyle = P.text;
    ctx.font = "bold 10px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(ideal) + 'm', bx + bw/2, by - idealH - 8);

    // Corrected value (smaller)
    ctx.fillStyle = P.muted;
    ctx.font = "9px 'Inter',sans-serif";
    ctx.fillText('~' + Math.round(corrected) + 'm', bx + bw/2, by - corrH - 6);

    return true;
  }

  // --- F4: winner highlight ---
  if (el.type === 'winner_card') {
    var cardW4 = el.cardW || 200;
    var cardH4 = el.cardH || 180;
    var wx = el.x - cardW4/2;
    var wy = el.y - cardH4/2;

    // Glow background
    ctx.save();
    ctx.shadowColor = ENGINE_GLOW[3];
    ctx.shadowBlur = 30;
    ctx.fillStyle = 'rgba(172,249,0,0.06)';
    ctx.fillRect(wx, wy, cardW4, cardH4);
    ctx.shadowBlur = 0;
    ctx.restore();

    drawGlassCard(ctx, wx, wy, cardW4, cardH4, '#acf900', 'rgba(172,249,0,0.4)');

    // Star badge
    drawStarBadge(ctx, el.x, wy + 30, 16, '#acf900');

    // RECOMMENDED label
    ctx.fillStyle = '#acf900';
    ctx.font = "bold 10px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('recommend'), el.x, wy + 52);

    // Engine name
    ctx.fillStyle = P.text;
    ctx.font = "bold 22px 'Space Grotesk',sans-serif";
    ctx.fillText(t('winner'), el.x, wy + 80);

    // Reasons
    var reasons = [t('reason1'), t('reason2'), t('reason3')];
    ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillStyle = P.muted;
    for (var ri = 0; ri < reasons.length; ri++) {
      ctx.fillText(reasons[ri], el.x, wy + 105 + ri * 18);
    }

    // Particles
    updateParticles();
    for (var pi = 0; pi < particles.length; pi++) {
      var pp = particles[pi];
      var alpha = 1 - pp.age / pp.life;
      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = pp.color;
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    return true;
  }

  if (el.type === 'reject_card') {
    var rcW = el.cardW || 140;
    var rcH = el.cardH || 50;
    var rx = el.x - rcW/2;
    var ry = el.y - rcH/2;

    drawGlassCard(ctx, rx, ry, rcW, rcH, 'rgba(255,255,255,0.08)', null);

    // Dimmed engine name
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = "bold 11px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(ENGINES[el.engineIdx].id, el.x, el.y - 8);

    // Rejection reason
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = "9px 'Inter','Noto Sans SC',sans-serif";
    ctx.fillText(el.reason, el.x, el.y + 10);

    // Strikethrough
    ctx.strokeStyle = 'rgba(255,180,171,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(rx + 10, el.y);
    ctx.lineTo(rx + rcW - 10, el.y);
    ctx.stroke();

    return true;
  }

  if (el.type === 'complete_badge') {
    var bw2 = 160;
    var bh2 = 28;
    var bx2 = el.x - bw2/2;
    var by2 = el.y - bh2/2;

    ctx.fillStyle = '#acf900';
    ctx.fillRect(bx2, by2, bw2, bh2);
    ctx.save();
    ctx.shadowColor = 'rgba(172,249,0,0.5)';
    ctx.shadowBlur = 16;
    ctx.fillRect(bx2, by2, bw2, bh2);
    ctx.shadowBlur = 0;
    ctx.restore();

    ctx.fillStyle = '#131313';
    ctx.font = "bold 12px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t('complete'), el.x, el.y);

    return true;
  }

  return false;
}

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  // ---- F0: TITLE ----
  if (f === 0) {
    return [
      {id:'header', type:'label', text:t('title'), x:cx, y:50, color:P.primary, size:22, align:'center', glow:P.glowStrong, bold:true},
      {id:'sub', type:'label', text:t('subtitle'), x:cx, y:75, color:P.muted, size:11, align:'center', bold:false},
      {id:'coreQ', type:'label', text:t('coreQ'), x:cx, y:105, color:P.secondary, size:13, align:'center', bold:true},
      {id:'engines', type:'engine_lineup', x:cx, y:cy + 20, spacing:130, alpha:1},
      {id:'targetLine', type:'target_line', x1:cx - 260, x2:cx + 260, y:cy - 50, alpha:1},
      {id:'rocketIcon', type:'custom', x:cx, y:cy + 80, alpha:1, draw:function(c, el) {
        drawRocket(c, cx, cy + 80, 0.9, P.text);
        c.fillStyle = P.muted;
        c.font = "10px 'Inter','Noto Sans SC',sans-serif";
        c.textAlign = 'center';
        c.fillText(t('rocket300'), cx, cy + 120);
      }},
    ];
  }

  // ---- F1: SPEC CARDS ----
  if (f === 1) {
    var cardSpacing = 150;
    var cardStartX = cx - cardSpacing * 1.5;
    var elems = [
      {id:'header', type:'label', text:t('f1title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong, bold:true},
    ];
    for (var i = 0; i < 4; i++) {
      elems.push({
        id:'card' + i, type:'spec_card', engineIdx:i,
        x:cardStartX + i * cardSpacing, y:cy + 20,
        cardW:130, cardH:170, alpha:1
      });
    }
    return elems;
  }

  // ---- F2: TWR CHECK ----
  if (f === 2) {
    var barStartY = 90;
    var barGap = 65;
    var barOffX = cx - 120;
    var elems2 = [
      {id:'header', type:'label', text:t('f2title'), x:cx, y:30, color:P.primary, size:14, align:'center', glow:P.glowStrong, bold:true},
      {id:'formula', type:'text', text:t('formula'), x:cx, y:55, color:P.muted, size:10, align:'center'},
      {id:'threshNote', type:'text', text:t('twrThresh'), x:cx + 130, y:55, color:P.secondary, size:10, align:'center'},
    ];
    for (var j = 0; j < 4; j++) {
      elems2.push({
        id:'twr' + j, type:'twr_bar', engineIdx:j,
        x:barOffX, y:barStartY + j * barGap,
        barW:140, barH:28, alpha:1
      });
    }
    // Rocket for scale reference
    elems2.push({id:'rocketIcon', type:'custom', x:cx + 200, y:cy + 80, alpha:1, draw:function(c) {
      drawRocket(c, cx + 200, cy + 80, 0.7, P.text);
      c.fillStyle = P.muted;
      c.font = "9px 'Inter','Noto Sans SC',sans-serif";
      c.textAlign = 'center';
      c.fillText('300g', cx + 200, cy + 112);
    }});
    return elems2;
  }

  // ---- F3: ALTITUDE COMPARISON ----
  if (f === 3) {
    var chartBaseY = H - 50;
    var chartMaxH = H - 120;
    var barWidth = 55;
    var chartSpacing = 90;
    var chartStartX = cx - chartSpacing * 1.5 - barWidth/2;

    var elems3 = [
      {id:'header', type:'label', text:t('f3title'), x:cx, y:30, color:P.primary, size:14, align:'center', glow:P.glowStrong, bold:true},
    ];

    // Altitude bars
    for (var k = 0; k < 4; k++) {
      elems3.push({
        id:'altbar' + k, type:'alt_bar', engineIdx:k,
        x:chartStartX + k * chartSpacing, baseY:chartBaseY,
        barWidth:barWidth, maxBarH:chartMaxH, alpha:1
      });
    }

    // Target line at 150m
    var targetFrac = TARGET_ALT / 300;
    var targetY = chartBaseY - targetFrac * chartMaxH;
    elems3.push({
      id:'targetLine', type:'line',
      x1:chartStartX - 20, y1:targetY,
      x2:chartStartX + 3 * chartSpacing + barWidth + 20, y2:targetY,
      color:P.error, lineWidth:1.5, dash:[6, 4], alpha:1
    });
    elems3.push({
      id:'targetLabel', type:'label',
      text:t('targetLine'), x:chartStartX + 3 * chartSpacing + barWidth + 50, y:targetY,
      color:P.error, size:10, align:'left', bold:true
    });

    // Baseline
    elems3.push({
      id:'baseline', type:'line',
      x1:chartStartX - 20, y1:chartBaseY,
      x2:chartStartX + 3 * chartSpacing + barWidth + 20, y2:chartBaseY,
      color:'rgba(255,255,255,0.15)', lineWidth:1, alpha:1
    });

    return elems3;
  }

  // ---- F4: RECOMMENDATION ----
  if (f === 4) {
    // Spawn particles continuously
    particleTick++;
    if (particleTick % 6 === 0) {
      spawnParticles(cx - 80 + Math.random() * 160, cy - 50 + Math.random() * 100);
    }

    var elems4 = [
      {id:'header', type:'label', text:t('f4title'), x:cx, y:30, color:P.primary, size:16, align:'center', glow:P.glowStrong, bold:true},
      // Winner card
      {id:'winnerCard', type:'winner_card', x:cx - 100, y:cy + 10, cardW:220, cardH:200, alpha:1},
      // Rejected engines
      {id:'reject0', type:'reject_card', engineIdx:0, x:cx + 140, y:cy - 60, cardW:180, cardH:46, alpha:1, reason:t('rejectHT0')},
      {id:'reject1', type:'reject_card', engineIdx:1, x:cx + 140, y:cy - 5, cardW:180, cardH:46, alpha:1, reason:t('rejectHT3')},
      {id:'reject2', type:'reject_card', engineIdx:2, x:cx + 140, y:cy + 50, cardW:180, cardH:46, alpha:1, reason:t('rejectC50')},
      // Complete badge
      {id:'badge', type:'complete_badge', x:cx, y:H - 40, alpha:1},
    ];
    return elems4;
  }

  return [];
}

// ============================================================
// BACKGROUND: subtle grid + gradient
// ============================================================
function drawBg(ctx, W, H) {
  var P = AnimRuntime.PAL;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, P.bg);
  g.addColorStop(1, P.bg2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Subtle radial glow at center
  var rg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.5);
  rg.addColorStop(0, 'rgba(255,127,80,0.04)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
