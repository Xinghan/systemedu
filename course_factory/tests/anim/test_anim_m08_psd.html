<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给脑波画一张"哪种快慢最强"的图</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 (所有 26 套统一, 不换) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);
    /* 第 2 层 — phys signature accent (sky-teal) */
    --accent: oklch(0.78 0.13 215);
    /* 第 3 层 — phys 5 色 palette (themes.js PHY-09 Force Observatory) 给 5 个频段 */
    --p-field:    oklch(0.78 0.13 215);  /* FIELD    -> beta  */
    --p-wave:     oklch(0.55 0.13 215);  /* WAVE     -> delta */
    --p-mass:     oklch(0.35 0.10 215);  /* MASS     -> theta (深) */
    --p-photon:   oklch(0.92 0.08 215);  /* PHOTON   -> gamma (亮) */
    --p-constant: oklch(0.85 0.14 85);   /* CONSTANT -> alpha (金, 主峰/key) */
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;overflow:hidden;height:100vh;background:var(--bg-0);
       font-family:'Noto Sans SC',system-ui,sans-serif;color:var(--fg);
       display:flex;}
  .sidebar{width:200px;flex-shrink:0;height:100vh;background:var(--bg-1);
           border-right:1.5px solid var(--line-strong);
           display:flex;flex-direction:column;gap:14px;padding:18px 16px;}
  .brand{font-size:11px;letter-spacing:2px;color:var(--accent);
         font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:700;}
  .ttl{font-size:15px;font-weight:700;line-height:1.4;margin:0;}
  .desc{font-size:11.5px;line-height:1.5;color:var(--fg-dim);}
  .desc .en{font-style:italic;color:var(--fg-mute);margin-top:4px;display:block;}
  .guide{list-style:none;padding:0;margin:4px 0 0;display:flex;flex-direction:column;gap:9px;}
  .guide li{font-size:11.5px;line-height:1.4;color:var(--fg-dim);
            border-left:3px solid var(--accent);padding-left:8px;}
  .mascot{margin-top:6px;align-self:center;}
  .langbtn{margin-top:auto;border:1.5px solid var(--line-strong);background:var(--bg-2);
           color:var(--fg);box-shadow:3px 3px 0 var(--bg-0);cursor:pointer;
           padding:7px 12px;font-size:11.5px;font-weight:700;border-radius:4px;
           font-family:'JetBrains Mono',ui-monospace,monospace;}
  .langbtn:active{transform:translate(3px,3px);box-shadow:none;}
  main{flex:1;height:100vh;position:relative;overflow:hidden;}
  #stage{display:block;position:absolute;inset:0;width:100%;height:100%;}
  .hud{position:absolute;top:16px;right:16px;background:var(--bg-1);
       border:1.5px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0);
       padding:11px 13px;font-size:11.5px;min-width:178px;border-radius:5px;
       font-family:'JetBrains Mono',ui-monospace,monospace;}
  .hud .ht{font-weight:700;color:var(--accent);margin-bottom:5px;font-size:12px;}
  .hud .hrow{color:var(--fg-dim);margin-top:3px;}
  .hud .hv{color:var(--p-constant);}
  .caption{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
           text-align:center;max-width:80%;}
  .caption .cz{font-size:18px;font-weight:700;color:var(--fg);line-height:1.4;}
  .caption .ce{font-size:12.5px;font-style:italic;color:var(--fg-mute);margin-top:3px;}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand" id="brand">PHY-09 / PSD</div>
    <h1 class="ttl" id="ttl">给脑波画一张"哪种快慢最强"的图</h1>
    <div class="desc">
      <span id="desc1">同一段脑波，慢慢长成一张"频率配方表"。</span>
      <span class="en" id="desc2">One brain wave slowly grows into a recipe of frequencies.</span>
    </div>
    <ul class="guide">
      <li id="g1">一段波里藏着快慢成分</li>
      <li id="g2">每个频率长出一根柱子</li>
      <li id="g3">最高的柱 = 最强的快慢</li>
    </ul>
    <!-- mascot: Echo — 音叉 + 波纹光环 (phys) -->
    <svg class="mascot" width="64" height="64" viewBox="0 0 64 64" id="mascot">
      <g id="echoRing">
        <circle cx="32" cy="32" r="26" fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.30"/>
        <circle cx="32" cy="32" r="20" fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.45"/>
      </g>
      <!-- 音叉本体 -->
      <path d="M26 20 L26 36 Q26 44 32 44 Q38 44 38 36 L38 20" fill="none"
            stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="32" y1="44" x2="32" y2="54" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="32" cy="54" r="3" fill="var(--p-constant)"/>
      <circle cx="26" cy="18" r="2.2" fill="var(--p-photon)"/>
      <circle cx="38" cy="18" r="2.2" fill="var(--p-photon)"/>
    </svg>
    <button class="langbtn" id="langBtn">中 / EN</button>
  </aside>
  <main>
    <canvas id="stage"></canvas>
    <div class="hud">
      <div class="ht" id="hudTtl">波 -&gt; 频谱</div>
      <div class="hrow" id="hudStage">读入时域脑波</div>
      <div class="hrow"><span id="hudPeakLbl">峰值频率</span> <span class="hv" id="hudPeak">--</span></div>
      <div class="hrow">PSD = <span class="hv" id="hudFormula">振幅 x 振幅</span></div>
    </div>
    <div class="caption">
      <div class="cz" id="subZh">这是一段脑波……</div>
      <div class="ce" id="subEn">This is a brain wave...</div>
    </div>
  </main>
<script>
(function(){
  "use strict";
  var LANG='cn';
  var I18N={
    brand:{cn:'PHY-09 / 功率谱',en:'PHY-09 / PSD'},
    ttl:{cn:'给脑波画一张"哪种快慢最强"的图',en:'A Chart of Which Speed Wins'},
    desc1:{cn:'同一段脑波，慢慢长成一张"频率配方表"。',en:'One brain wave slowly grows into a recipe of frequencies.'},
    g1:{cn:'一段波里藏着快慢成分',en:'A wave hides fast & slow parts'},
    g2:{cn:'每个频率长出一根柱子',en:'Each frequency grows a bar'},
    g3:{cn:'最高的柱 = 最强的快慢',en:'Tallest bar = strongest speed'},
    hudTtl:{cn:'波 -> 频谱',en:'wave -> spectrum'},
    peakLbl:{cn:'峰值频率',en:'peak freq'},
    formula:{cn:'振幅 x 振幅',en:'amp x amp'},
    // 连续演化分阶段的点睛字幕 (画面是主体, 字幕只点睛)
    subs:{
      cn:['这是一段脑波，横轴是时间。慢波快波全叠在一起，看不出哪种最强。',
          '把每一种"快慢"从波里抽出来——每个频率，都在右边长出属于它的一根柱子。',
          '柱子越高，说明这种快慢的能量越强：功率 = 振幅 x 振幅。',
          '所有柱子连起来，就是一张频谱图：10Hz 这根 alpha 柱子，长得最高。',
          '闭眼时 alpha 这根柱子还会再窜高一截——一张频谱，看清脑波的快慢配方。'],
      en:['A brain wave, time on the x-axis. Slow and fast pile up — you cannot tell which wins.',
          'Pull each speed out of the wave — every frequency grows its own bar on the right.',
          'Taller bar = stronger energy for that speed: power = amplitude x amplitude.',
          'Join the bars and you get a spectrum: the 10Hz alpha bar stands tallest.',
          'Close your eyes and that alpha bar climbs even higher — one spectrum, the brain wave recipe.']
    }
  };
  function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

  var canvas=document.getElementById('stage'),ctx=canvas.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){var r=canvas.parentElement.getBoundingClientRect();if(r.width<1||r.height<1)return;
    W=r.width;H=r.height;canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
  window.addEventListener('resize',resize);setTimeout(resize,200);setTimeout(resize,600);
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(resize);
  var C=function(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();};

  // 5 个频段: delta(2) theta(6) alpha(10) beta(20) gamma(38) Hz, 用 phys 5 色 palette
  // amp 是各成分的真实振幅 (用于合成波 + 频谱高度), 科学严谨: PSD = 振幅平方
  var BANDS=[
    {hz:2,  name:'delta', amp:0.50, col:'--p-wave'},
    {hz:6,  name:'theta', amp:0.40, col:'--p-mass'},
    {hz:10, name:'alpha', amp:0.95, col:'--p-constant'},  // 主峰 (闭眼态)
    {hz:20, name:'beta',  amp:0.32, col:'--p-field'},
    {hz:38, name:'gamma', amp:0.18, col:'--p-photon'}
  ];
  var FMAX=42;

  // 连续单循环时间轴 (一个对象 = 波->频谱 变换的一段连续过程)
  var startT=null, TOTAL=34000;

  function lerp(a,b,k){return a+(b-a)*k;}
  function clamp(k){return k<0?0:k>1?1:k;}
  function ease(k){k=clamp(k);return k*k*(3-2*k);}

  // 当前 alpha 增益 (睁眼 0.45, 闭眼 1.0) 在 morph 完成后做一次连续过渡
  function alphaGain(eyeK){return lerp(0.45,1.0,eyeK);}

  // 合成时域信号: 各频段 sin 相加 (同一段波始终在屏)
  function timeSignal(tt, phase, eyeK){
    var v=0;
    for(var i=0;i<BANDS.length;i++){
      var a=BANDS[i].amp;
      if(BANDS[i].name==='alpha') a*=alphaGain(eyeK);
      v+=Math.sin(tt*Math.PI*2*BANDS[i].hz + phase*(1+i*0.15))*a;
    }
    return v;
  }
  // 单个频段成分波 (用于"抽取"那根分量从波里被拉出来)
  function compSignal(band, tt, phase, eyeK){
    var a=band.amp; if(band.name==='alpha')a*=alphaGain(eyeK);
    return Math.sin(tt*Math.PI*2*band.hz + phase*(1+0.15))*a;
  }
  function bandPower(band, eyeK){
    var a=band.amp; if(band.name==='alpha')a*=alphaGain(eyeK);
    return a*a; // PSD = 振幅平方
  }
  // 平滑频谱曲线 (各频段高斯峰之和) — 柱子连成谱线
  function psd(f, eyeK){
    var p=0;
    for(var i=0;i<BANDS.length;i++){
      var pw=bandPower(BANDS[i],eyeK);
      var sig=BANDS[i].hz*0.16+1.1;
      p+=pw*Math.exp(-Math.pow(f-BANDS[i].hz,2)/(2*sig*sig));
    }
    return p;
  }

  function arrowTo(x1,y1,x2,y2,col,wd){
    ctx.strokeStyle=col;ctx.lineWidth=wd||2;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    var ang=Math.atan2(y2-y1,x2-x1),hl=8;
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-hl*Math.cos(ang-0.4),y2-hl*Math.sin(ang-0.4));
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-hl*Math.cos(ang+0.4),y2-hl*Math.sin(ang+0.4));
    ctx.stroke();
  }

  function draw(now){
    if(startT===null)startT=now;
    var el=now-startT; if(el>TOTAL){startT=now;el=0;}
    var T=el/TOTAL; // 全局进度 0..1
    if(!W||!H){requestAnimationFrame(draw);return;}
    ctx.clearRect(0,0,W,H);

    var fg=C('--fg'),dim=C('--fg-dim'),mute=C('--fg-mute'),acc=C('--accent'),gold=C('--gold');
    var phase=now/650;

    // 背景淡格
    ctx.strokeStyle=C('--line');ctx.lineWidth=1;
    for(var gx=0;gx<W;gx+=44){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<H;gy+=44){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

    // mascot Echo 波纹光环呼吸
    var ring=document.getElementById('echoRing');
    if(ring) ring.setAttribute('opacity', (0.55+0.4*Math.sin(now/420)).toFixed(2));

    /* ============================================================
       连续演化时间轴 (同一个对象: 波 -> 频谱 的一次连续变换)
       morph: 波从满铺右移收缩到左侧, 频谱坐标在右侧展开
       grow : 每个频率成分从波里被抽出, 飞到频谱上长成一根柱子
       curve: 柱子连成 PSD 谱线, 标出 alpha 主峰
       eye  : alpha 增益连续从睁眼->闭眼, 主峰再窜高 (gold key moment)
       ============================================================ */
    var morph = ease((T-0.10)/0.18);   // 0.10-0.28 波收缩到左 + 频谱坐标长出
    var grow  = clamp((T-0.26)/0.34);  // 0.26-0.60 各柱子依次长出
    var curve = ease((T-0.58)/0.16);   // 0.58-0.74 柱子连成谱线
    var eye   = ease((T-0.78)/0.16);   // 0.78-0.94 睁眼->闭眼 alpha 窜高

    // --- 波区几何: 从满铺(morph=0) 收缩到左侧条带(morph=1) ---
    var padL=70;
    var waveFullR = W-50;
    var wavePanelR = lerp(waveFullR, padL+ (W-padL-60)*0.32, morph); // 波右边界左移
    var waveMidY = H*0.50;
    var waveAmp  = lerp(H*0.26, H*0.16, morph);

    // --- 频谱区几何 (右侧, morph 时长出) ---
    var specL = wavePanelR + 70;
    var specR = W-46;
    var specBaseY = H*0.82;
    var specMaxH  = H*0.60;
    var specReady = morph; // 坐标 alpha

    // ---------- 始终在屏: 同一段时域脑波 ----------
    // 波的相位用连续 eye 增益, 让 alpha 成分实时反映状态
    ctx.save();
    ctx.strokeStyle=acc;ctx.lineWidth=2.2;ctx.globalAlpha=1;ctx.beginPath();
    for(var x=padL;x<=wavePanelR;x++){
      var tt=(x-padL)/(waveFullR-padL);
      var y=waveMidY - timeSignal(tt,phase,eye)*waveAmp*0.42;
      if(x===padL)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();ctx.restore();
    // 波区轴
    ctx.strokeStyle=C('--line-strong');ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(padL,H*0.18);ctx.lineTo(padL,H*0.86);ctx.lineTo(wavePanelR,H*0.86);ctx.stroke();
    ctx.fillStyle=mute;ctx.font="11px 'JetBrains Mono',ui-monospace,monospace";
    ctx.textAlign='center';ctx.fillText(LANG==='cn'?'时间 ->':'time ->',(padL+wavePanelR)/2,H*0.90);
    ctx.save();ctx.translate(padL-16,H*0.52);ctx.rotate(-Math.PI/2);ctx.textAlign='center';
    ctx.fillText(LANG==='cn'?'电压 uV':'uV',0,0);ctx.restore();

    // morph=0 (开场) 时给一句"看不出哪种最强"
    if(morph<0.35){
      ctx.globalAlpha=1-ease(morph/0.35);
      ctx.fillStyle=mute;ctx.font="13px 'Noto Sans SC',sans-serif";ctx.textAlign='center';
      ctx.fillText(LANG==='cn'?'慢波快波全叠在一起 — 看不出哪种最强':'slow & fast piled up — which one wins?',
                   (padL+waveFullR)/2, H*0.13);
      ctx.globalAlpha=1;
    }

    // ---------- 频谱坐标 (morph 时展开) ----------
    if(specReady>0.02){
      ctx.globalAlpha=clamp(specReady);
      ctx.strokeStyle=C('--line-strong');ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(specL,specBaseY-specMaxH);ctx.lineTo(specL,specBaseY);ctx.lineTo(specR,specBaseY);ctx.stroke();
      ctx.fillStyle=mute;ctx.font="11px 'JetBrains Mono',ui-monospace,monospace";
      ctx.textAlign='right';ctx.fillText(LANG==='cn'?'频率 Hz ->':'frequency Hz ->',specR,specBaseY+44);
      ctx.save();ctx.translate(specL-16,specBaseY-specMaxH*0.5);ctx.rotate(-Math.PI/2);ctx.textAlign='center';
      ctx.fillText(LANG==='cn'?'功率 PSD':'power PSD',0,0);ctx.restore();
      // 频段刻度
      ctx.font="10px 'JetBrains Mono',ui-monospace,monospace";ctx.textAlign='center';
      for(var bk=0;bk<BANDS.length;bk++){
        var bxk=specL+(BANDS[bk].hz/FMAX)*(specR-specL);
        ctx.fillStyle=C(BANDS[bk].col);ctx.fillText(BANDS[bk].hz+'',bxk,specBaseY+15);
      }
      ctx.globalAlpha=1;
    }

    // ---------- 核心变换: 每个频率成分从波里被抽出 -> 飞 -> 长成柱子 ----------
    // grow 把 5 根柱子依次点亮 (delta..gamma), 每根有自己的进度
    var scale=specMaxH/1.05;
    for(var b=0;b<BANDS.length;b++){
      var band=BANDS[b];
      var bx=specL+(band.hz/FMAX)*(specR-specL);
      var pw=bandPower(band, eye);
      // 该柱的独立生长进度: grow 从 delta 到 gamma 依次推进
      var seg = clamp((grow - b*0.13)/0.30);
      if(seg<=0 && morph>0.5) continue;
      var hgt=pw*scale*ease(seg);
      var col=C(band.col);

      // (a) 从波里抽出的分量波 (短暂浮现, 表示"被提取")
      var pull = clamp(seg*1.6) * (1-clamp((seg-0.55)/0.45));
      if(pull>0.02 && morph>0.5){
        ctx.save();ctx.globalAlpha=0.55*pull;
        ctx.strokeStyle=col;ctx.lineWidth=1.6;ctx.beginPath();
        var cy0=waveMidY;
        for(var cx=padL;cx<=wavePanelR;cx++){
          var ctt=(cx-padL)/(waveFullR-padL);
          var cyv=cy0 - compSignal(band,ctt,phase,eye)*waveAmp*0.42;
          if(cx===padL)ctx.moveTo(cx,cyv);else ctx.lineTo(cx,cyv);
        }
        ctx.stroke();
        // 抽出箭头: 分量波 -> 它的柱子顶
        arrowTo(wavePanelR+6, cy0, bx, specBaseY-hgt-6, col, 1.6);
        ctx.restore();
      }

      // (b) 长出的柱子
      if(seg>0){
        var isAlpha=(band.name==='alpha');
        ctx.save();
        ctx.fillStyle=col;ctx.globalAlpha=isAlpha?0.92:0.8;
        ctx.fillRect(bx-13, specBaseY-hgt, 26, hgt);
        ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=1.4;
        ctx.strokeRect(bx-13, specBaseY-hgt, 26, hgt);
        ctx.restore();
        // 频段名
        if(seg>0.6){
          ctx.fillStyle=dim;ctx.font="10px 'JetBrains Mono',ui-monospace,monospace";ctx.textAlign='center';
          ctx.fillText(band.name, bx, specBaseY+27);
        }
      }
    }

    // ---------- 柱子连成 PSD 谱线 ----------
    if(curve>0.02){
      ctx.save();ctx.globalAlpha=clamp(curve);
      ctx.strokeStyle=acc;ctx.lineWidth=2.6;ctx.beginPath();
      var lastX=specL+(specR-specL); // 全宽
      for(var sx=specL;sx<=lastX;sx++){
        var f=(sx-specL)/(specR-specL)*FMAX;
        var sy=specBaseY - psd(f,eye)*scale;
        if(sx===specL)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
      }
      ctx.stroke();
      ctx.lineTo(lastX,specBaseY);ctx.lineTo(specL,specBaseY);ctx.closePath();
      ctx.fillStyle=acc;ctx.globalAlpha=clamp(curve)*0.12;ctx.fill();
      ctx.restore();
    }

    // ---------- alpha 主峰标注 + eye(闭眼)窜高 ----------
    if(curve>0.5){
      var alphaX=specL+(10/FMAX)*(specR-specL);
      var alphaY=specBaseY - psd(10,eye)*scale;
      var pulse=0.55+0.45*Math.sin(now/300);
      // 闭眼相对睁眼的高度差 (gold key moment)
      if(eye>0.05){
        var yOpen=specBaseY - psd(10,0)*scale;
        ctx.save();ctx.strokeStyle=gold;ctx.lineWidth=2;ctx.globalAlpha=0.5+0.5*pulse;
        arrowTo(alphaX, yOpen, alphaX, alphaY+4, gold, 2);
        ctx.restore();
        ctx.fillStyle=gold;ctx.font="11px 'JetBrains Mono',ui-monospace,monospace";ctx.textAlign='center';
        ctx.fillText(LANG==='cn'?'闭眼 alpha 窜高':'closed-eye alpha rises', alphaX, yOpen+16);
      }
      ctx.fillStyle=C('--p-constant');ctx.beginPath();ctx.arc(alphaX,alphaY,5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=C('--p-constant');ctx.setLineDash([3,3]);ctx.lineWidth=1;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.moveTo(alphaX,alphaY);ctx.lineTo(alphaX,specBaseY);ctx.stroke();
      ctx.setLineDash([]);ctx.globalAlpha=1;
      ctx.fillStyle=C('--p-constant');ctx.font="12px 'JetBrains Mono',ui-monospace,monospace";ctx.textAlign='center';
      ctx.fillText('alpha 10Hz', alphaX, alphaY-12);
    }

    // ---------- 收束: gold 印章 ----------
    if(eye>0.55){
      ctx.save();ctx.globalAlpha=ease((eye-0.55)/0.45);
      ctx.fillStyle=gold;ctx.font="700 16px 'Noto Sans SC',sans-serif";ctx.textAlign='center';
      ctx.fillText(LANG==='cn'?'一张频谱，看清脑波的快慢配方':'one spectrum — the brain wave recipe',
                   (specL+specR)/2, specBaseY-specMaxH-6);
      ctx.restore();
    }

    // ---------- HUD ----------
    var stageLbls={
      cn:['读入时域脑波','抽取各频率成分','长成功率柱','连成 PSD 谱线','闭眼 alpha 窜高'],
      en:['read time-domain wave','extract frequencies','grow power bars','join into PSD curve','closed-eye alpha rises']
    };
    var si=0;
    if(eye>0.05)si=4; else if(curve>0.05)si=3; else if(grow>0.05)si=2; else if(morph>0.05)si=1;
    document.getElementById('hudStage').textContent=stageLbls[LANG][si];
    document.getElementById('hudPeak').textContent= curve>0.4 ? '10 Hz (alpha)' : (LANG==='cn'?'计算中':'computing');
    document.getElementById('hudPeakLbl').textContent=t('peakLbl');
    document.getElementById('hudFormula').textContent=t('formula');

    // 字幕跟随阶段
    document.getElementById('subZh').textContent=I18N.subs.cn[si];
    document.getElementById('subEn').textContent=I18N.subs.en[si];
    requestAnimationFrame(draw);
  }

  function refreshI18N(){
    document.getElementById('brand').textContent=t('brand');
    document.getElementById('ttl').textContent=t('ttl');
    document.getElementById('desc1').textContent=t('desc1');
    document.getElementById('desc2').textContent=I18N.desc1.en;
    document.getElementById('g1').textContent=t('g1');
    document.getElementById('g2').textContent=t('g2');
    document.getElementById('g3').textContent=t('g3');
    document.getElementById('hudTtl').textContent=t('hudTtl');
  }
  document.getElementById('desc2').textContent=I18N.desc1.en;

  document.getElementById('langBtn').addEventListener('click',function(){
    LANG=LANG==='cn'?'en':'cn';
    this.textContent=LANG==='cn'?'中 / EN':'EN / 中';
    document.getElementById('desc2').textContent=LANG==='cn'?I18N.desc1.en:I18N.desc1.cn;
    refreshI18N();
  });
  resize();requestAnimationFrame(draw);
})();
</script>
</body>
</html>
