<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方差 — 用一个数说清脑波抖多厉害</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Layer 1 — shared deep-space canvas (all 26 subjects, fixed) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg: oklch(0.96 0.01 265);
    --fg-dim: oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold: oklch(0.85 0.14 85);
    /* Layer 2 — math signature accent (electric blue) */
    --accent: oklch(0.72 0.17 245);
    /* Layer 3 — math 5-color palette (themes.js id:'math', MTH-06) */
    --axis:     oklch(0.72 0.17 245);   /* AXIS — the C4 waveform / value axis */
    --proof:    oklch(0.52 0.16 245);   /* PROOF — deviation drop-lines / secondary */
    --shadow:   oklch(0.35 0.10 245);   /* SHADOW — grid / mean baseline shade */
    --solution: oklch(0.92 0.08 240);   /* SOLUTION — squared bars / highlight */
    --qed:      oklch(0.85 0.14 85);    /* QED — the collapsed variance number (== gold) */
  }
  html,body{margin:0;padding:0;height:100vh;width:100%;overflow:hidden;
    background:var(--bg-0);font-family:'Noto Sans SC','Inter',sans-serif;color:var(--fg);}
  .wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
  /* Sidebar 200px */
  .sidebar{width:200px;min-width:200px;max-width:200px;flex-shrink:0;
    display:flex;flex-direction:column;gap:9px;padding:13px 12px;
    background:var(--bg-1);border-right:1px solid var(--line);overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:8px;}
  .mascot{flex-shrink:0;}
  .sidebar h1{font-family:'Space Grotesk','Inter',sans-serif;font-size:13px;font-weight:700;
    line-height:1.3;color:var(--accent);letter-spacing:0.02em;}
  .sidebar .code{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;
    color:var(--fg-mute);text-transform:uppercase;}
  .intro{font-size:11px;line-height:1.55;color:var(--fg-dim);}
  .intro .en{font-style:italic;font-size:10px;color:var(--fg-mute);margin-top:4px;}
  .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-top:2px;}
  .guide{list-style:none;padding:0;margin:0;font-size:11px;line-height:1.55;color:var(--fg-dim);}
  .guide li{margin-bottom:2px;}
  /* project roadmap S1-S6 */
  .road-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-mute);margin-top:6px;}
  .road{list-style:none;padding:0;margin:3px 0 0;}
  .road li{display:flex;align-items:center;gap:7px;font-size:10px;line-height:1.5;
    color:var(--fg-mute);margin-bottom:1px;}
  .road .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;
    background:var(--bg-3);border:1px solid var(--line-strong);}
  .road li.done{color:var(--fg-dim);}
  .road li.done .dot{background:var(--proof);border-color:var(--proof);}
  .road li.here{color:var(--accent);font-weight:700;}
  .road li.here .dot{background:var(--accent);border-color:var(--accent);
    box-shadow:0 0 0 3px oklch(0.72 0.17 245 / 0.25);}
  .lang-btn{margin-top:auto;align-self:flex-start;font-family:'JetBrains Mono',monospace;
    font-size:10px;font-weight:700;letter-spacing:0.1em;padding:5px 12px;cursor:pointer;
    color:var(--accent);background:transparent;border:1px solid var(--line-strong);
    box-shadow:3px 3px 0 var(--bg-0);transition:transform .1s;}
  .lang-btn:hover{transform:translate(-1px,-1px);}
  .lang-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--bg-0);}
  /* Main stage */
  .stage{flex:1;min-width:0;position:relative;overflow:hidden;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hud{position:absolute;top:16px;right:16px;background:oklch(0.18 0.04 265 / 0.85);
    border:1px solid var(--line-strong);padding:9px 13px;font-family:'JetBrains Mono',monospace;
    font-size:11px;box-shadow:3px 3px 0 var(--bg-0);min-width:184px;}
  .hud-row{display:flex;justify-content:space-between;gap:14px;line-height:1.7;}
  .hud-lbl{color:var(--fg-mute);font-size:7px;letter-spacing:0.14em;text-transform:uppercase;
    align-self:center;}
  .hud-val{color:var(--accent);font-weight:700;}
  /* Minecraft endpoint silhouette, bottom-left corner of stage */
  .goal{position:absolute;left:14px;bottom:16px;display:flex;align-items:center;gap:8px;
    opacity:0.72;pointer-events:none;}
  .goal .cap{font-family:'JetBrains Mono',monospace;font-size:8px;line-height:1.3;
    letter-spacing:0.06em;color:var(--fg-mute);max-width:128px;}
  .sub{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
    text-align:center;width:80%;pointer-events:none;}
  .sub-zh{font-size:18px;font-weight:700;color:var(--fg);
    background:oklch(0.18 0.04 265 / 0.85);padding:7px 18px;display:inline-block;
    border:1px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0);}
  .sub-en{font-size:12px;font-style:italic;color:var(--fg-dim);margin-top:5px;}
</style>
</head>
<body>
<div class="wrapper">

<aside class="sidebar">
  <div class="brand">
    <!-- mascot: Pi — rotating tetrahedron, math signature -->
    <svg class="mascot" width="30" height="30" viewBox="0 0 40 40" aria-hidden="true">
      <polygon points="20,5 35,30 5,30" fill="none" stroke="var(--accent)" stroke-width="1.6"/>
      <polygon points="20,5 35,30 20,22" fill="var(--proof)" opacity="0.55"/>
      <polygon points="20,5 5,30 20,22" fill="var(--axis)" opacity="0.35"/>
      <circle cx="20" cy="22" r="2.4" fill="var(--solution)"/>
      <text x="20" y="20" text-anchor="middle" font-family="JetBrains Mono,monospace"
            font-size="8" fill="var(--qed)">Pi</text>
    </svg>
    <div>
      <h1 id="title">方差 · 抖动多厉害</h1>
      <div class="code">EEG · M22 · VAR</div>
    </div>
  </div>

  <div class="intro" id="intro">
    <span id="introZh">想让电脑分出你想左手还是右手, 先得能用一个数说清某个电极抖得多厉害。这个数 = 方差。</span>
    <div class="en" id="introEn">One number for "how jittery is this brain-wave?" That number is the variance.</div>
  </div>

  <div class="guide-label" id="guideLabel">三步算法</div>
  <ul class="guide" id="guide"></ul>

  <div class="road-label" id="roadLabel">项目路线</div>
  <ul class="road" id="road"></ul>

  <button class="lang-btn" id="langBtn">中 / EN</button>
</aside>

<main class="stage">
  <canvas id="c"></canvas>
  <div class="hud">
    <div class="hud-row"><span class="hud-lbl" id="hudL1">step</span><span class="hud-val" id="hudV1">1/5</span></div>
    <div class="hud-row"><span class="hud-lbl" id="hudL2">mean mu</span><span class="hud-val" id="hudV2">--</span></div>
    <div class="hud-row"><span class="hud-lbl" id="hudL3">sum sq</span><span class="hud-val" id="hudV3">--</span></div>
    <div class="hud-row"><span class="hud-lbl" id="hudL4">variance</span><span class="hud-val" id="hudV4">--</span></div>
  </div>

  <!-- endpoint silhouette: Minecraft character driven by thought -->
  <div class="goal">
    <svg width="30" height="34" viewBox="0 0 30 34" aria-hidden="true">
      <rect x="6" y="2" width="18" height="16" fill="none" stroke="var(--fg-mute)" stroke-width="1.4"/>
      <rect x="10" y="7" width="4" height="4" fill="var(--accent)"/>
      <rect x="17" y="7" width="4" height="4" fill="var(--accent)"/>
      <rect x="8" y="18" width="14" height="11" fill="none" stroke="var(--fg-mute)" stroke-width="1.4"/>
      <rect x="2" y="19" width="5" height="9" fill="none" stroke="var(--fg-mute)" stroke-width="1.2"/>
      <rect x="23" y="19" width="5" height="9" fill="none" stroke="var(--fg-mute)" stroke-width="1.2"/>
    </svg>
    <div class="cap" id="goalCap">终点: 用念头操控 Minecraft</div>
  </div>

  <div class="sub">
    <div class="sub-zh" id="subZh"></div>
    <div class="sub-en" id="subEn"></div>
  </div>
</main>

</div>

<script>
'use strict';

// ====================== Palette (resolved oklch) ======================
var P = {
  bg0:'oklch(0.14 0.035 265)', bg1:'oklch(0.18 0.04 265)', bg2:'oklch(0.22 0.045 265)',
  bg3:'oklch(0.28 0.05 265)',
  line:'oklch(0.35 0.05 265 / 0.35)', lineStrong:'oklch(0.55 0.08 265 / 0.55)',
  fg:'oklch(0.96 0.01 265)', fgDim:'oklch(0.75 0.02 265)', fgMute:'oklch(0.55 0.03 265)',
  accent:'oklch(0.72 0.17 245)',
  axis:'oklch(0.72 0.17 245)', proof:'oklch(0.52 0.16 245)', shadow:'oklch(0.35 0.10 245)',
  solution:'oklch(0.92 0.08 240)', qed:'oklch(0.85 0.14 85)', gold:'oklch(0.85 0.14 85)',
  pos:'oklch(0.72 0.17 245)',   // positive deviation = blue
  neg:'oklch(0.62 0.14 28)'     // negative deviation = warm rose (only to show +/- before squaring)
};

// ====================== i18n ======================
var LANG='cn';
var I18N = {
  title:{cn:'方差 · 抖动多厉害', en:'Variance · how jittery'},
  introZh:{cn:'想让电脑分出你想左手还是右手, 先得能用一个数说清某个电极抖得多厉害。这个数 = 方差。',
           en:'To let the computer tell "imagine left" from "imagine right", we first need ONE number for how much an electrode jitters. That number is variance.'},
  introEn:{cn:'One number for "how jittery is this brain-wave?" That number is the variance.',
           en:'var = average of (each point minus mean), squared.'},
  guideLabel:{cn:'三步算法', en:'3-STEP RECIPE'},
  guide:{cn:['1. 减均值 -> 偏差 (有正负)','2. 平方 -> 消符号, 放大','3. 求平均 = 方差 (一个数)'],
         en:['1. minus mean -> deviation','2. square -> kill sign, amplify','3. average -> variance (one number)']},
  roadLabel:{cn:'项目路线', en:'PROJECT PATH'},
  hudL1:{cn:'step', en:'step'}, hudL2:{cn:'mean mu', en:'mean mu'},
  hudL3:{cn:'sum sq', en:'sum sq'}, hudL4:{cn:'variance', en:'variance'},
  goalCap:{cn:'终点: 用念头操控 Minecraft', en:'GOAL: control Minecraft by thought'},
  // step titles
  f1t:{cn:'第 1 步 · 这是想象左手时 C4 电极的一段脑波 — 先求出它的均值 mu', en:'Step 1 - a slice of C4 while imagining left hand; first find its mean mu'},
  f2t:{cn:'第 1 步 · 每个点减去均值, 得到偏差 (有正有负)', en:'Step 1 - subtract the mean from each point to get its deviation (signed)'},
  f3t:{cn:'第 2 步 · 偏差平方: 负号消失, 大的抖动被放大', en:'Step 2 - square each deviation: signs vanish, big jitters get amplified'},
  f4t:{cn:'第 3 步 · 把平方求平均 -> 坍缩成一个数 = 方差', en:'Step 3 - average the squares -> collapse to one number = variance'},
  f5t:{cn:'同样三步: 平稳的一段方差小, 抖动的一段方差大', en:'Same three steps: a calm slice gives small variance, a jittery slice gives large variance'},
  // subtitles
  s1zh:{cn:'这是想象左手时 C4 电极的一段脑波振幅, 沿时间起起伏伏',
        en:'A slice of C4 amplitude while you imagine your left hand, rising and falling over time'},
  s1en:{cn:'先把所有点加起来除以个数, 得到这条波的均值 mu (中线)。',
        en:'Add all points and divide by the count -> the mean mu (the centre line).'},
  s2zh:{cn:'每个点减去中线 mu, 留下的就是偏差: 在线上方为正, 下方为负',
        en:'Each point minus the centre line mu leaves a deviation: positive above, negative below'},
  s2en:{cn:'偏差有正有负, 直接相加会互相抵消 -> 没法直接当抖动量。',
        en:'Deviations are signed; adding them they cancel -> cannot measure jitter directly.'},
  s3zh:{cn:'于是把每个偏差平方: 负号没了, 而且大的抖动被放得更大',
        en:'So square each deviation: the sign disappears, and big jitters become even bigger'},
  s3en:{cn:'平方 = 偏差自己乘自己, 永远 >= 0, 大偏差贡献远超小偏差。',
        en:'Squaring = deviation times itself, always >= 0; large deviations dominate.'},
  s4zh:{cn:'把所有平方加起来再除以点数 -> 整段波坍缩成一个数: 方差',
        en:'Sum all squares and divide by the count -> the whole slice collapses to one number: variance'},
  s4en:{cn:'var = (偏差平方的) 平均。这一个数, 客观说清这段波抖得多厉害。',
        en:'var = average of squared deviations. This one number says how jittery the slice is.'},
  s5zh:{cn:'平稳那段方差小, 抖动那段方差大 — 一个数就把两段分开了',
        en:'Calm slice -> small variance, jittery slice -> large variance; one number separates them'},
  s5en:{cn:'有了方差这个数, 下一步就能比较左右手哪个电极抖得不一样。',
        en:'With variance, next we can compare which electrode jitters differently for left vs right hand.'},
  // canvas labels
  lblWave:{cn:'C4 脑波 (想象左手)', en:'C4 brain-wave (imagine left)'},
  lblMean:{cn:'均值 mu (中线)', en:'mean mu (centre line)'},
  lblTime:{cn:'时间', en:'time'},
  lblAmp:{cn:'振幅', en:'amp'},
  lblDevPos:{cn:'偏差 +', en:'deviation +'},
  lblDevNeg:{cn:'偏差 -', en:'deviation -'},
  lblSq:{cn:'偏差平方 (>= 0)', en:'squared deviation (>= 0)'},
  lblAvg:{cn:'求平均 = 方差线', en:'average = variance level'},
  lblVar:{cn:'方差', en:'variance'},
  lblCalm:{cn:'平稳段 C4', en:'calm slice C4'},
  lblJitter:{cn:'抖动段 C4', en:'jittery slice C4'},
  lblSmall:{cn:'方差小', en:'small var'},
  lblBig:{cn:'方差大', en:'large var'},
  road:{cn:[
      ['S1 认识脑波','done'],
      ['S2 清洁信号','done'],
      ['S3 找特征 (你在这)','here'],
      ['S4 自录冲准','todo'],
      ['S5 接 Minecraft','todo'],
      ['S6 分享','todo']],
       en:[
      ['S1 read brain-waves','done'],
      ['S2 clean signal','done'],
      ['S3 features (you are here)','here'],
      ['S4 record + tune','todo'],
      ['S5 wire Minecraft','todo'],
      ['S6 share','todo']]}
};
function t(k){ return (I18N[k]&&I18N[k][LANG]) || (I18N[k]&&I18N[k].en) || k; }

function refreshI18N(){
  document.getElementById('title').textContent = t('title');
  document.getElementById('introZh').textContent = t('introZh');
  document.getElementById('introEn').textContent = t('introEn');
  document.getElementById('guideLabel').textContent = t('guideLabel');
  document.getElementById('guide').innerHTML = t('guide').map(function(x){return '<li>'+x+'</li>';}).join('');
  document.getElementById('roadLabel').textContent = t('roadLabel');
  document.getElementById('road').innerHTML = t('road').map(function(r){
    return '<li class="'+r[1]+'"><span class="dot"></span><span>'+r[0]+'</span></li>';
  }).join('');
  document.getElementById('goalCap').textContent = t('goalCap');
  document.getElementById('hudL1').textContent = t('hudL1');
  document.getElementById('hudL2').textContent = t('hudL2');
  document.getElementById('hudL3').textContent = t('hudL3');
  document.getElementById('hudL4').textContent = t('hudL4');
  document.getElementById('langBtn').textContent = LANG==='cn' ? '中 / EN' : 'EN / 中';
  updateSub(curStep);
}
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = LANG==='cn' ? 'en' : 'cn'; refreshI18N();
});

// ====================== Canvas ======================
var cv = document.getElementById('c');
var ctx = cv.getContext('2d');
var W=0, H=0, DPR=1;
function resize(){
  var rect = cv.parentElement.getBoundingClientRect();
  if(rect.width<1 || rect.height<1) return;
  DPR = Math.min(window.devicePixelRatio||1, 2);
  cv.width = rect.width*DPR; cv.height = rect.height*DPR;
  cv.style.width = rect.width+'px'; cv.style.height = rect.height+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W = rect.width; H = rect.height;
}
window.addEventListener('resize', resize);
resize(); setTimeout(resize,200); setTimeout(resize,600);
document.fonts.ready.then(function(){ resize(); });

// ====================== The ONE core object: a slice of C4 amplitude ======================
// N sample points. Same data used across step 1-3, then a calm & jittery pair in step 5.
var N = 14;
// the main C4 slice (imagine-left): moderately jittery (arbitrary uV units)
var SLICE = [0.62, 1.35, 0.20, 0.95, -0.30, 1.10, 0.05, 1.55, 0.45, -0.10, 1.25, 0.35, 0.85, 0.40];
// calm vs jittery pair for step 5 (similar mean, different spread)
var CALM   = [0.50, 0.62, 0.45, 0.58, 0.52, 0.66, 0.48, 0.60, 0.55, 0.47, 0.63, 0.51, 0.57, 0.51];
var JITTER = [0.10, 1.55,-0.25, 1.30, 0.05, 1.70,-0.15, 1.20, 0.20, 1.60,-0.05, 1.45, 0.15, 1.35];

function meanOf(a){ var s=0; for(var i=0;i<a.length;i++) s+=a[i]; return s/a.length; }
function varOf(a){ var m=meanOf(a),s=0; for(var i=0;i<a.length;i++){var d=a[i]-m; s+=d*d;} return s/a.length; }
var MU = meanOf(SLICE);
var SUMSQ = (function(){ var s=0; for(var i=0;i<N;i++){var d=SLICE[i]-MU; s+=d*d;} return s; })();
var VAR = SUMSQ / N;

// ====================== Timeline ======================
var STEP_DUR = 7000;          // ms per step -> 35s cycle for 5 steps
var NST = 5;
var curStep = 0;
var animStart = performance.now();

function updateSub(f){
  var z=['s1zh','s2zh','s3zh','s4zh','s5zh'][f];
  var e=['s1en','s2en','s3en','s4en','s5en'][f];
  document.getElementById('subZh').textContent = t(z);
  document.getElementById('subEn').textContent = t(e);
  document.getElementById('hudV1').textContent = (f+1)+'/5';
}

// ====================== Drawing helpers ======================
function easeIO(x){ return x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; }
function clamp(x,a,b){ return x<a?a:(x>b?b:x); }

function frameTitle(txt){
  ctx.fillStyle = P.fg;
  ctx.font = "800 18px 'Space Grotesk','Inter',sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText(txt, W/2, 36);
}

// plot layout. returns mapping funcs px(i)/py(v).
function plot(cx0, cw, cy0, ch, valLo, valHi){
  return {
    px:function(i){ return cx0 + (i/(N-1))*cw; },
    py:function(v){ return cy0 + (1-(v-valLo)/(valHi-valLo))*ch; },
    cx0:cx0, cw:cw, cy0:cy0, ch:ch
  };
}

function drawAxes(pl, lblAmp, lblTime){
  ctx.save();
  ctx.strokeStyle=P.line; ctx.lineWidth=1;
  ctx.strokeRect(pl.cx0, pl.cy0, pl.cw, pl.ch);
  ctx.fillStyle=P.fgMute; ctx.font="600 10px 'JetBrains Mono',monospace";
  if(lblAmp){ ctx.textAlign='left';  ctx.fillText(lblAmp, pl.cx0+4, pl.cy0+12); }
  if(lblTime){ ctx.textAlign='right'; ctx.fillText(lblTime, pl.cx0+pl.cw-4, pl.cy0+pl.ch-6); }
  ctx.restore();
}

function drawSlice(pl, data, color, alpha){
  ctx.save(); ctx.globalAlpha=alpha==null?1:alpha;
  ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.beginPath();
  for(var i=0;i<data.length;i++){ var x=pl.px(i), y=pl.py(data[i]); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
  ctx.stroke();
  ctx.fillStyle=color;
  for(var j=0;j<data.length;j++){ ctx.beginPath(); ctx.arc(pl.px(j), pl.py(data[j]), 2.6, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function dot(x,y,r,color,alpha){
  ctx.save(); ctx.globalAlpha=alpha==null?1:alpha;
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

var VLO=-0.7, VHI=1.9;   // value range shared by step 1-3 so the wave never jumps

// ====================== Step 1: the slice + mean line drawn in ======================
function drawF1(pr){
  frameTitle(t('f1t'));
  var pl = plot(W*0.10, W*0.80, H*0.20, H*0.56, VLO, VHI);
  drawAxes(pl, t('lblAmp'), t('lblTime'));
  drawSlice(pl, SLICE, P.axis, 0.95);
  ctx.fillStyle=P.axis; ctx.font="700 12px 'Inter',sans-serif"; ctx.textAlign='left';
  ctx.fillText(t('lblWave'), pl.cx0+6, pl.cy0-8);

  // mean line sweeps in from left
  var sw = easeIO(clamp(pr*1.6,0,1));
  var my = pl.py(MU);
  ctx.save();
  ctx.strokeStyle=P.gold; ctx.lineWidth=2; ctx.setLineDash([7,5]);
  ctx.beginPath(); ctx.moveTo(pl.cx0, my); ctx.lineTo(pl.cx0 + pl.cw*sw, my); ctx.stroke();
  ctx.setLineDash([]);
  if(sw>0.9){
    ctx.fillStyle=P.gold; ctx.font="700 12px 'JetBrains Mono',monospace"; ctx.textAlign='right';
    ctx.fillText(t('lblMean')+' = '+MU.toFixed(2), pl.cx0+pl.cw-4, my-7);
  }
  ctx.restore();

  document.getElementById('hudV2').textContent = sw>0.9 ? MU.toFixed(2) : '...';
  document.getElementById('hudV3').textContent = '--';
  document.getElementById('hudV4').textContent = '--';
}

// ====================== Step 2: each point minus mean -> signed deviation drop-lines ======================
function drawF2(pr){
  frameTitle(t('f2t'));
  var pl = plot(W*0.10, W*0.80, H*0.20, H*0.56, VLO, VHI);
  drawAxes(pl, t('lblAmp'), t('lblTime'));
  var my = pl.py(MU);
  // mean line (established)
  ctx.save(); ctx.strokeStyle=P.gold; ctx.lineWidth=2; ctx.setLineDash([7,5]);
  ctx.beginPath(); ctx.moveTo(pl.cx0, my); ctx.lineTo(pl.cx0+pl.cw, my); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  // faint original wave so the SAME object persists
  drawSlice(pl, SLICE, P.axis, 0.35);

  // deviation drop-lines from each point to the mean line, staggered reveal
  for(var i=0;i<N;i++){
    var x=pl.px(i), y=pl.py(SLICE[i]);
    var d = SLICE[i]-MU;
    var local = clamp(pr*1.5 - (i/N)*0.5, 0, 1);
    var yy = my + (y - my)*easeIO(local);
    var col = d>=0 ? P.pos : P.neg;
    ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=3; ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.moveTo(x, my); ctx.lineTo(x, yy); ctx.stroke(); ctx.restore();
    dot(x, yy, 2.8, col, 0.95);
  }
  // +/- legend (placed low-left, away from drop-lines)
  ctx.font="700 11px 'JetBrains Mono',monospace"; ctx.textAlign='left';
  ctx.fillStyle=P.pos; ctx.fillText(t('lblDevPos'), pl.cx0+6, pl.cy0+pl.ch-26);
  ctx.fillStyle=P.neg; ctx.fillText(t('lblDevNeg'), pl.cx0+6, pl.cy0+pl.ch-12);
  // formula hint (top-right)
  ctx.fillStyle=P.fgDim; ctx.font="700 13px 'JetBrains Mono',monospace"; ctx.textAlign='right';
  ctx.fillText('d = x - mu', pl.cx0+pl.cw-4, pl.cy0-8);

  document.getElementById('hudV2').textContent = MU.toFixed(2);
  document.getElementById('hudV3').textContent = 'signed';
  document.getElementById('hudV4').textContent = '--';
}

// ====================== Step 3: square each deviation -> bars above baseline (sign gone) ======================
function drawF3(pr){
  frameTitle(t('f3t'));
  var pl = plot(W*0.10, W*0.80, H*0.24, H*0.50, 0, 2.0);  // squared values, all >= 0
  var zy = pl.py(0);
  ctx.save(); ctx.strokeStyle=P.lineStrong; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pl.cx0, zy); ctx.lineTo(pl.cx0+pl.cw, zy); ctx.stroke(); ctx.restore();
  ctx.fillStyle=P.fgMute; ctx.font="600 10px 'JetBrains Mono',monospace"; ctx.textAlign='right';
  ctx.fillText('0', pl.cx0-4, zy+4);
  ctx.textAlign='right'; ctx.fillText(t('lblTime'), pl.cx0+pl.cw-4, zy+16);

  var bw = pl.cw/N * 0.5;
  for(var i=0;i<N;i++){
    var d = SLICE[i]-MU;
    var sq = d*d;
    var x = pl.px(i);
    var grow = easeIO(clamp(pr*1.6 - (i/N)*0.4, 0, 1));
    var topY = pl.py(sq*grow);
    ctx.fillStyle = P.solution; ctx.globalAlpha=0.9;
    ctx.fillRect(x-bw/2, topY, bw, zy-topY);
    ctx.globalAlpha=1;
    ctx.strokeStyle=P.accent; ctx.lineWidth=1; ctx.strokeRect(x-bw/2, topY, bw, zy-topY);
  }
  // ghost of the signed deviation dots early on -> "same points, now squared"
  if(pr<0.45){
    var ga=clamp((0.45-pr)*2.4,0,1);
    for(var k=0;k<N;k++){
      var dk=SLICE[k]-MU;
      var col=dk>=0?P.pos:P.neg;
      var yk = zy - Math.abs(dk)*(pl.ch/2.0);
      dot(pl.px(k), yk, 2.4, col, ga*0.5);
    }
  }
  ctx.fillStyle=P.solution; ctx.font="700 12px 'Inter',sans-serif"; ctx.textAlign='left';
  ctx.fillText(t('lblSq'), pl.cx0+6, pl.cy0-8);
  ctx.fillStyle=P.fgDim; ctx.font="700 13px 'JetBrains Mono',monospace"; ctx.textAlign='right';
  ctx.fillText('d * d  (>= 0)', pl.cx0+pl.cw-4, pl.cy0-8);

  document.getElementById('hudV2').textContent = MU.toFixed(2);
  document.getElementById('hudV3').textContent = (SUMSQ*easeIO(clamp(pr*1.4,0,1))).toFixed(2);
  document.getElementById('hudV4').textContent = '--';
}

// ====================== Step 4: average the squares -> collapse to ONE number = variance ======================
function drawF4(pr){
  frameTitle(t('f4t'));
  var pl = plot(W*0.07, W*0.52, H*0.24, H*0.50, 0, 2.0);
  var zy = pl.py(0);
  ctx.save(); ctx.strokeStyle=P.lineStrong; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pl.cx0, zy); ctx.lineTo(pl.cx0+pl.cw, zy); ctx.stroke(); ctx.restore();

  // every bar slides from its squared height toward the average (collapse)
  var collapse = easeIO(clamp(pr*1.5, 0, 1));
  var avgVal = VAR;
  var bw = pl.cw/N * 0.5;
  for(var i=0;i<N;i++){
    var d = SLICE[i]-MU; var sq=d*d;
    var hv = sq + (avgVal - sq)*collapse;
    var x = pl.px(i);
    var topY = pl.py(hv);
    ctx.fillStyle=P.solution; ctx.globalAlpha=0.85 - 0.25*collapse;
    ctx.fillRect(x-bw/2, topY, bw, zy-topY);
    ctx.globalAlpha=1;
    ctx.strokeStyle=P.accent; ctx.lineWidth=1; ctx.strokeRect(x-bw/2, topY, bw, zy-topY);
  }
  // the average level line (gold)
  if(collapse>0.2){
    var ay=pl.py(avgVal);
    ctx.save(); ctx.strokeStyle=P.gold; ctx.lineWidth=2.4; ctx.globalAlpha=clamp((collapse-0.2)*1.6,0,1);
    ctx.beginPath(); ctx.moveTo(pl.cx0, ay); ctx.lineTo(pl.cx0+pl.cw, ay); ctx.stroke();
    ctx.fillStyle=P.gold; ctx.font="700 11px 'JetBrains Mono',monospace"; ctx.textAlign='left';
    ctx.fillText(t('lblAvg'), pl.cx0+6, ay-7);
    ctx.restore();
  }

  // ---- the ONE number panel on the right ----
  var bx=W*0.64, by=H*0.30, bw2=W*0.31, bh=H*0.40;
  ctx.save();
  ctx.fillStyle=P.bg2; ctx.strokeStyle=P.lineStrong; ctx.lineWidth=1.4;
  ctx.fillRect(bx,by,bw2,bh); ctx.strokeRect(bx,by,bw2,bh);
  ctx.fillStyle=P.fgMute; ctx.font="700 11px 'JetBrains Mono',monospace"; ctx.textAlign='left';
  ctx.fillText('var = (1/n) SUM (x - mu)^2', bx+18, by+30);
  ctx.fillStyle=P.fgDim; ctx.font="600 15px 'JetBrains Mono',monospace";
  ctx.fillText('= '+SUMSQ.toFixed(2)+' / '+N, bx+18, by+66);
  // the collapsed number, gold, grows at climax
  var na = easeIO(clamp((pr-0.45)*2.2, 0, 1));
  ctx.globalAlpha = na;
  ctx.shadowColor=P.gold; ctx.shadowBlur=14*na;
  ctx.fillStyle=P.gold; ctx.font="800 38px 'JetBrains Mono',monospace"; ctx.textAlign='left';
  ctx.fillText('var = '+VAR.toFixed(2), bx+18, by+122);
  ctx.shadowBlur=0;
  ctx.fillStyle=P.solution; ctx.font="700 12px 'Inter',sans-serif";
  ctx.fillText(t('lblVar') + ' (' + (LANG==='cn'?'一个数':'one number') + ')', bx+18, by+152);
  ctx.globalAlpha=1;
  ctx.restore();

  document.getElementById('hudV2').textContent = MU.toFixed(2);
  document.getElementById('hudV3').textContent = SUMSQ.toFixed(2);
  document.getElementById('hudV4').textContent = (VAR*easeIO(clamp(pr*1.6,0,1))).toFixed(2);
}

// ====================== Step 5: calm vs jittery -> same recipe, small vs large var ======================
function drawF5(pr){
  frameTitle(t('f5t'));
  var vCalm = varOf(CALM), vJit = varOf(JITTER);

  function row(label, data, color, cy0){
    var pl = plot(W*0.07, W*0.38, cy0, H*0.21, -0.5, 1.95);
    var mu=meanOf(data);
    drawAxes(pl,'','');
    drawSlice(pl, data, color, 0.92);
    var my=pl.py(mu);
    ctx.save(); ctx.strokeStyle=P.gold; ctx.lineWidth=1.6; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pl.cx0,my); ctx.lineTo(pl.cx0+pl.cw,my); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    // deviation drop-lines, recalling step 1-2 recipe on each slice
    var rev=clamp(pr*1.4,0,1);
    for(var i=0;i<data.length;i++){
      var x=pl.px(i), y=pl.py(data[i]);
      var yy = my + (y-my)*easeIO(rev);
      ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.6; ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.moveTo(x,my); ctx.lineTo(x,yy); ctx.stroke(); ctx.restore();
    }
    ctx.fillStyle=color; ctx.font="700 12px 'Inter',sans-serif"; ctx.textAlign='left';
    ctx.fillText(label, pl.cx0+4, pl.cy0-7);
    return pl;
  }
  row(t('lblCalm'),   CALM,   P.accent,   H*0.17);
  row(t('lblJitter'), JITTER, P.solution, H*0.57);

  // variance bars on the right comparing the two slices
  var bx=W*0.52, baseY=H*0.76, barMaxH=H*0.50, maxV=Math.max(vCalm,vJit)*1.18;
  ctx.save(); ctx.strokeStyle=P.line; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(bx-10, baseY); ctx.lineTo(bx+W*0.34, baseY); ctx.stroke(); ctx.restore();

  function vbar(x, v, color, label){
    var grow=easeIO(clamp(pr*1.5,0,1));
    var h=(v/maxV)*barMaxH*grow;
    ctx.fillStyle=color; ctx.globalAlpha=0.9; ctx.fillRect(x, baseY-h, W*0.11, h); ctx.globalAlpha=1;
    ctx.strokeStyle=P.lineStrong; ctx.lineWidth=1; ctx.strokeRect(x, baseY-h, W*0.11, h);
    ctx.fillStyle=P.gold; ctx.font="800 17px 'JetBrains Mono',monospace"; ctx.textAlign='center';
    ctx.fillText('var='+v.toFixed(2), x+W*0.055, baseY-h-10);
    ctx.fillStyle=color; ctx.font="700 12px 'Inter',sans-serif";
    ctx.fillText(label, x+W*0.055, baseY+18);
  }
  vbar(bx,         vCalm, P.accent,   t('lblSmall'));
  vbar(bx+W*0.17,  vJit,  P.solution, t('lblBig'));

  // takeaway at climax (gold key moment)
  if(pr>0.55){
    var ta=clamp((pr-0.55)*2.2,0,1);
    ctx.save(); ctx.globalAlpha=ta;
    ctx.fillStyle=P.gold; ctx.font="800 15px 'Space Grotesk','Inter',sans-serif"; ctx.textAlign='center';
    ctx.fillText(LANG==='cn'?'一个数 var, 就把两段脑波分开了':'one number var separates the two slices',
                 bx+W*0.14, H*0.14);
    ctx.restore();
  }

  document.getElementById('hudV2').textContent = 'recipe x2';
  document.getElementById('hudV3').textContent = vCalm.toFixed(2);
  document.getElementById('hudV4').textContent = vJit.toFixed(2);
}

// ====================== Render loop ======================
function render(){
  var now = performance.now();
  var tt = now - animStart;
  var idx = Math.floor((tt % (STEP_DUR*NST)) / STEP_DUR);
  var pr = ((tt % (STEP_DUR*NST)) % STEP_DUR) / STEP_DUR;
  if(idx !== curStep){ curStep = idx; updateSub(curStep); }

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = P.bg0; ctx.fillRect(0,0,W,H);

  if(curStep===0) drawF1(pr);
  else if(curStep===1) drawF2(pr);
  else if(curStep===2) drawF3(pr);
  else if(curStep===3) drawF4(pr);
  else drawF5(pr);

  requestAnimationFrame(render);
}

refreshI18N();
updateSub(0);
requestAnimationFrame(render);
</script>
