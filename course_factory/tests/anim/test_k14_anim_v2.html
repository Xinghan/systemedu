<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
/* -- Outer: sidebar + main -- */
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:rgba(0,0,0,0.5);border-right:1px solid rgba(80,255,176,0.15);overflow-y:auto;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid rgba(255,181,156,0.25);background:transparent;color:#ffb59c;letter-spacing:1px;}
.lang-btn:hover{border-color:#ffb59c;background:rgba(255,181,156,0.1);}
.sidebar h1{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);margin-top:4px;line-height:1.3;}
.sidebar .sub{font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.06em;text-transform:uppercase;}
.sidebar .frame-ind{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted,#aaabb0);letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary,#50ffb0);margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* -- Main area: canvas + controls + hud -- */
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
/* -- Controls + HUD -- */
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--primary,#50ffb0);}
</style>
</head>
<body>
<div class="wrapper">
<!-- Sidebar: lang-btn, title, guide (completely separate from canvas) -->
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<!-- Main: canvas fills all space, nothing overlaps -->
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<!-- Runtime (shared skeleton) -->
<script src="../../../course_factory/runtime/animation_runtime.js"></script>

<!-- Content script -->
<script>
// ============================================================
// Knode 14 v2: Gliders and Parachutes - The Art of Falling Slowly
// Frame 0: Title -- both objects falling through sky
// Frame 1: Glider principle -- airfoil cross-section with airflow
// Frame 2: Parachute principle -- dome with drag area, terminal velocity
// Frame 3: Comparison summary -- side-by-side paths and stats
// ============================================================

var CONFIG = {
  style: 'celestial_observatory',
  totalFrames: 4,

  i18n: {
    title:       {en:'GLIDERS & PARACHUTES',       cn:'\u6ed1\u7fd4\u673a\u4e0e\u964d\u843d\u4f1e'},
    subtitle:    {en:'THE ART OF FALLING SLOWLY',   cn:'\u6162\u6162\u843d\u4e0b\u7684\u827a\u672f'},
    f0intro:     {en:'Two ways to tame gravity',     cn:'\u9a6f\u670d\u91cd\u529b\u7684\u4e24\u79cd\u65b9\u5f0f'},
    f0sub:       {en:'Same sky, different paths',    cn:'\u540c\u4e00\u7247\u5929\u7a7a\uff0c\u4e0d\u540c\u7684\u8f68\u8ff9'},
    f1title:     {en:'GLIDER PRINCIPLE',             cn:'\u6ed1\u7fd4\u673a\u539f\u7406'},
    f1wing:      {en:'Airfoil Cross-Section',        cn:'\u7fc5\u578b\u622a\u9762'},
    f1fast:      {en:'Faster airflow (low pressure)',cn:'\u6c14\u6d41\u5feb(\u4f4e\u538b)'},
    f1slow:      {en:'Slower airflow (high pressure)',cn:'\u6c14\u6d41\u6162(\u9ad8\u538b)'},
    f1lift:      {en:'LIFT',                         cn:'\u5347\u529b'},
    f1weight:    {en:'WEIGHT',                       cn:'\u91cd\u529b'},
    f1explain:   {en:'Wing shape makes air flow faster above, creating lift', cn:'\u7fc5\u578b\u8ba9\u4e0a\u65b9\u6c14\u6d41\u52a0\u901f\uff0c\u4ea7\u751f\u5411\u4e0a\u7684\u5347\u529b'},
    f2title:     {en:'PARACHUTE PRINCIPLE',          cn:'\u964d\u843d\u4f1e\u539f\u7406'},
    f2drag:      {en:'AIR DRAG',                     cn:'\u7a7a\u6c14\u963b\u529b'},
    f2weight:    {en:'WEIGHT',                       cn:'\u91cd\u529b'},
    f2with:      {en:'With parachute: ~5 m/s',       cn:'\u6709\u4f1e: ~5 m/s'},
    f2without:   {en:'Without: ~50 m/s',             cn:'\u65e0\u4f1e: ~50 m/s'},
    f2explain:   {en:'Large dome area captures air, creating massive drag', cn:'\u5927\u9762\u79ef\u4f1e\u76d6\u6355\u83b7\u7a7a\u6c14\uff0c\u4ea7\u751f\u5de8\u5927\u963b\u529b'},
    f3title:     {en:'COMPARISON',                   cn:'\u5bf9\u6bd4\u603b\u7ed3'},
    f3glider:    {en:'GLIDER',                       cn:'\u6ed1\u7fd4\u673a'},
    f3para:      {en:'PARACHUTE',                    cn:'\u964d\u843d\u4f1e'},
    f3ratio:     {en:'Glide ratio: 10:1~30:1',       cn:'\u6ed1\u7fd4\u6bd4: 10:1~30:1'},
    f3tv:        {en:'Terminal vel: ~5 m/s',          cn:'\u7ec8\u7aef\u901f\u5ea6: ~5 m/s'},
    f3app1:      {en:'SpaceX Dragon / Shenzhou',     cn:'SpaceX Dragon / \u795e\u821f'},
    f3app2:      {en:'Sailplanes / Hang gliders',    cn:'\u6ed1\u7fd4\u673a / \u60ac\u6302\u6ed1\u7fd4'},
    f3pathG:     {en:'Horizontal + gradual descent',  cn:'\u6c34\u5e73\u98de\u884c + \u7f13\u964d'},
    f3pathP:     {en:'Vertical slow descent',         cn:'\u5782\u76f4\u7f13\u964d'},
    guideTitle:  {en:'OBSERVATION GUIDE',            cn:'\u89c2\u5bdf\u6307\u5357'},
    g1:          {en:'Watch how airflow splits around the wing -- faster on top, slower below', cn:'\u89c2\u5bdf\u6c14\u6d41\u5982\u4f55\u5728\u7fc5\u578b\u4e0a\u4e0b\u5206\u6d41 -- \u4e0a\u5feb\u4e0b\u6162'},
    g2:          {en:'Notice the parachute dome deflecting air particles outward', cn:'\u6ce8\u610f\u964d\u843d\u4f1e\u4f1e\u76d6\u5c06\u7a7a\u6c14\u7c92\u5b50\u5411\u5916\u504f\u8f6c'},
    g3:          {en:'Compare: glider trades altitude for distance; parachute trades area for slowness', cn:'\u5bf9\u6bd4: \u6ed1\u7fd4\u673a\u7528\u9ad8\u5ea6\u6362\u8ddd\u79bb; \u964d\u843d\u4f1e\u7528\u9762\u79ef\u6362\u901f\u5ea6'},
    hudTopic:    {en:'TOPIC',    cn:'\u4e3b\u9898'},
    hudLift:     {en:'LIFT',     cn:'\u5347\u529b'},
    hudDrag:     {en:'DRAG',     cn:'\u963b\u529b'},
    hudSpeed:    {en:'DESCENT',  cn:'\u4e0b\u964d\u901f\u5ea6'},
    hvTitle:     {en:'Title',           cn:'\u6807\u9898'},
    hvAirfoil:   {en:'Airfoil',         cn:'\u7fc5\u578b'},
    hvDome:      {en:'Dome drag',       cn:'\u4f1e\u76d6\u963b\u529b'},
    hvCompare:   {en:'Side-by-side',    cn:'\u5e76\u6392\u5bf9\u6bd4'},
    hvHigh:      {en:'High',            cn:'\u5927'},
    hvLow:       {en:'Low',             cn:'\u5c0f'},
    hvMed:       {en:'Medium',          cn:'\u4e2d\u7b49'},
    hvNone:      {en:'None',            cn:'\u65e0'},
    hvVHigh:     {en:'Very high',       cn:'\u5f88\u5927'},
    hvFast:      {en:'Fast (50 m/s)',   cn:'\u5feb (50 m/s)'},
    hvSlow:      {en:'Slow (0.5 m/s)',  cn:'\u6162 (0.5 m/s)'},
    hvVSlow:     {en:'V.Slow (5 m/s)',  cn:'\u5f88\u6162 (5 m/s)'},
  },

  hudLabels: ['hudTopic', 'hudLift', 'hudDrag', 'hudSpeed'],
  hudValues: [
    ['hvTitle',   '--',    '--',     '--'],
    ['hvAirfoil', 'hvHigh','hvMed',  'hvSlow'],
    ['hvDome',    'hvNone','hvVHigh','hvVSlow'],
    ['hvCompare', '--',    '--',     '--'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

// ============================================================
// Animation state -- continuous animation loop for particles
// ============================================================
var _animTime = 0;
var _animFrame = -1;
var _particles = [];
var _rafId = null;

function _initParticles(count, bounds) {
  var arr = [];
  for (var i = 0; i < count; i++) {
    arr.push({
      x: bounds.x + Math.random() * bounds.w,
      y: bounds.y + Math.random() * bounds.h,
      vx: bounds.vx || 0,
      vy: bounds.vy || 0,
      r: 1 + Math.random() * 1.5,
      alpha: 0.3 + Math.random() * 0.5,
    });
  }
  return arr;
}

function _tickParticles(particles, dt, bounds) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    // wrap around
    if (p.x > bounds.x + bounds.w) p.x = bounds.x;
    if (p.x < bounds.x) p.x = bounds.x + bounds.w;
    if (p.y > bounds.y + bounds.h) p.y = bounds.y;
    if (p.y < bounds.y) p.y = bounds.y + bounds.h;
  }
}

// Continuous redraw loop
(function animLoop() {
  _animTime += 0.016;
  if (typeof AnimRuntime !== 'undefined' && AnimRuntime.currentFrame !== undefined) {
    var cf = AnimRuntime.currentFrame;
    if (cf !== _animFrame) {
      _animFrame = cf;
      _animTime = 0;
    }
    if (cf >= 1 && cf <= 2) {
      AnimRuntime.drawFrame(cf);
    }
  }
  _rafId = requestAnimationFrame(animLoop);
})();

// ============================================================
// FRAME ELEMENTS
// ============================================================
function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  if (f === 0) {
    return [
      {id:'bg0', type:'sky_bg', frame:0},
      {id:'titleMain', type:'label', text:t('title'), x:cx, y:cy - 80, color:P.primary, size:22, align:'center', glow:P.glowStrong},
      {id:'subtitleMain', type:'label', text:t('subtitle'), x:cx, y:cy - 50, color:P.muted, size:13, align:'center'},
      {id:'introLine', type:'label', text:t('f0intro'), x:cx, y:cy + 10, color:'#ffffff', size:15, align:'center'},
      {id:'subLine', type:'label', text:t('f0sub'), x:cx, y:cy + 40, color:P.secondary, size:12, align:'center'},
      {id:'fallingObjs', type:'title_scene', frame:0},
    ];
  }

  if (f === 1) {
    return [
      {id:'bg1', type:'sky_bg', frame:1},
      {id:'f1head', type:'label', text:t('f1title'), x:cx, y:22, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'airfoilScene', type:'airfoil_scene'},
      {id:'f1exp', type:'text', text:t('f1explain'), x:cx, y:H - 18, color:P.muted, size:10, align:'center'},
    ];
  }

  if (f === 2) {
    return [
      {id:'bg2', type:'sky_bg', frame:2},
      {id:'f2head', type:'label', text:t('f2title'), x:cx, y:22, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'paraScene', type:'parachute_scene'},
      {id:'f2exp', type:'text', text:t('f2explain'), x:cx, y:H - 18, color:P.muted, size:10, align:'center'},
    ];
  }

  if (f === 3) {
    return [
      {id:'bg3', type:'sky_bg', frame:3},
      {id:'f3head', type:'label', text:t('f3title'), x:cx, y:22, color:P.primary, size:16, align:'center', glow:P.glowStrong},
      {id:'compareScene', type:'compare_scene'},
    ];
  }

  return [];
}

// ============================================================
// CUSTOM DRAW ELEMENT
// ============================================================
function customDrawElement(ctx, el, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;
  var tm = _animTime;

  // ----- Sky gradient background per frame -----
  if (el.type === 'sky_bg') {
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    if (el.frame === 0) {
      grad.addColorStop(0, '#0a0d1a');
      grad.addColorStop(0.4, '#14183a');
      grad.addColorStop(0.8, '#1e2250');
      grad.addColorStop(1, '#282e5a');
    } else if (el.frame === 1) {
      grad.addColorStop(0, '#0c1025');
      grad.addColorStop(0.5, '#16204a');
      grad.addColorStop(1, '#1c2855');
    } else if (el.frame === 2) {
      grad.addColorStop(0, '#0a0e20');
      grad.addColorStop(0.5, '#121838');
      grad.addColorStop(1, '#1a2248');
    } else {
      grad.addColorStop(0, '#0c0f1e');
      grad.addColorStop(0.5, '#151a35');
      grad.addColorStop(1, '#1e2448');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // subtle stars
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (var si = 0; si < 30; si++) {
      var sx = (si * 137.5 + 50) % W;
      var sy = (si * 97.3 + 20) % (H * 0.6);
      var sr = 0.5 + (si % 3) * 0.3;
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    }
    // faint grid
    ctx.strokeStyle = 'rgba(201,191,255,0.04)';
    ctx.lineWidth = 0.5;
    for (var gx = 0; gx < W; gx += 50) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for (var gy = 0; gy < H; gy += 50) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    return true;
  }

  // ----- Title scene: falling glider and parachute silhouettes -----
  if (el.type === 'title_scene') {
    var gx = cx - 120, gy = cy + 90 + Math.sin(tm * 0.8) * 8;
    var px = cx + 120, py = cy + 70 + Math.sin(tm * 0.6 + 1) * 6;
    // glider silhouette
    _drawGliderShape(ctx, gx, gy, 1.2, P.primary, 0.6);
    // parachute silhouette
    _drawParachuteShape(ctx, px, py, 1.0, P.secondary, 0.6);
    // trailing particles
    ctx.fillStyle = 'rgba(201,191,255,0.2)';
    for (var ti = 0; ti < 8; ti++) {
      var tx = gx - 15 - ti * 12 + Math.sin(tm * 2 + ti) * 3;
      var ty = gy + 3 + Math.cos(tm * 1.5 + ti * 0.7) * 2;
      ctx.beginPath(); ctx.arc(tx, ty, 1.2, 0, Math.PI * 2); ctx.fill();
    }
    return true;
  }

  // ----- Frame 1: Airfoil scene -----
  if (el.type === 'airfoil_scene') {
    var wingCx = cx, wingCy = cy + 10;
    var scale = Math.min(W / 700, 1) * 1.2;

    // Draw airfoil shape with bezier curves
    ctx.save();
    ctx.translate(wingCx, wingCy);
    ctx.scale(scale, scale);

    // Airfoil body -- filled
    var airfoilGrad = ctx.createLinearGradient(0, -30, 0, 15);
    airfoilGrad.addColorStop(0, 'rgba(201,191,255,0.4)');
    airfoilGrad.addColorStop(1, 'rgba(201,191,255,0.15)');
    ctx.fillStyle = airfoilGrad;
    ctx.strokeStyle = P.primary;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-120, 0);
    ctx.bezierCurveTo(-80, -40, -20, -45, 120, -5);  // upper surface (cambered)
    ctx.lineTo(120, 0);
    ctx.bezierCurveTo(40, 10, -60, 8, -120, 0);      // lower surface (flatter)
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Glow on airfoil
    ctx.shadowColor = P.glowStrong;
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Chord line (dashed)
    ctx.strokeStyle = 'rgba(255,219,60,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(-120, 0); ctx.lineTo(120, 0); ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();

    // Airflow particles -- upper (fast, closer spacing)
    var upperColor = 'rgba(255,219,60,0.7)';
    var lowerColor = 'rgba(201,191,255,0.4)';
    var numUpper = 18, numLower = 12;
    var flowSpeed = tm * 80;

    // Upper airflow (faster, yellow/gold)
    for (var ui = 0; ui < numUpper; ui++) {
      var ux = ((ui * 45 + flowSpeed * 1.4) % (280 * scale)) - 140 * scale + wingCx;
      var uPhase = (ux - (wingCx - 140 * scale)) / (280 * scale);
      var uCurve = -25 * scale * Math.sin(uPhase * Math.PI) - 10 * scale;
      var uy = wingCy + uCurve - 10;
      ctx.fillStyle = upperColor;
      ctx.beginPath(); ctx.arc(ux, uy, 1.8, 0, Math.PI * 2); ctx.fill();
      // motion trail
      ctx.strokeStyle = 'rgba(255,219,60,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(ux, uy); ctx.lineTo(ux - 10, uy + 1); ctx.stroke();
    }

    // Lower airflow (slower, dimmer)
    for (var li = 0; li < numLower; li++) {
      var lx = ((li * 55 + flowSpeed * 0.7) % (280 * scale)) - 140 * scale + wingCx;
      var lPhase = (lx - (wingCx - 140 * scale)) / (280 * scale);
      var lCurve = 8 * scale * Math.sin(lPhase * Math.PI) + 6 * scale;
      var ly = wingCy + lCurve + 5;
      ctx.fillStyle = lowerColor;
      ctx.beginPath(); ctx.arc(lx, ly, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(201,191,255,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx - 6, ly); ctx.stroke();
    }

    // Speed arrows along flow
    // Upper speed indicator
    var arrowUX = wingCx + 60 * scale, arrowUY = wingCy - 35 * scale;
    ctx.strokeStyle = 'rgba(255,219,60,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(arrowUX - 25, arrowUY); ctx.lineTo(arrowUX + 25, arrowUY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(arrowUX + 20, arrowUY - 4); ctx.lineTo(arrowUX + 25, arrowUY); ctx.lineTo(arrowUX + 20, arrowUY + 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,219,60,0.9)';
    ctx.font = "10px 'Noto Sans SC','Inter',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f1fast'), arrowUX, arrowUY - 10);

    // Lower speed indicator
    var arrowLX = wingCx + 40 * scale, arrowLY = wingCy + 25 * scale;
    ctx.strokeStyle = 'rgba(201,191,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(arrowLX - 15, arrowLY); ctx.lineTo(arrowLX + 15, arrowLY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(arrowLX + 12, arrowLY - 3); ctx.lineTo(arrowLX + 15, arrowLY); ctx.lineTo(arrowLX + 12, arrowLY + 3); ctx.fill();
    ctx.fillStyle = 'rgba(201,191,255,0.7)';
    ctx.fillText(t('f1slow'), arrowLX, arrowLY + 14);

    // Lift force arrow (UP, big, green)
    var liftX = wingCx - 80 * scale, liftTopY = wingCy - 70 * scale;
    ctx.strokeStyle = P.primary;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(liftX, wingCy - 5); ctx.lineTo(liftX, liftTopY); ctx.stroke();
    ctx.fillStyle = P.primary;
    ctx.beginPath();
    ctx.moveTo(liftX, liftTopY - 5);
    ctx.lineTo(liftX - 6, liftTopY + 5);
    ctx.lineTo(liftX + 6, liftTopY + 5);
    ctx.closePath();
    ctx.fill();
    // Glow on lift arrow
    ctx.shadowColor = P.glowStrong;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = "bold 11px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f1lift'), liftX, liftTopY - 12);

    // Weight arrow (DOWN, orange/red)
    var weightX = liftX + 25, weightBotY = wingCy + 60 * scale;
    ctx.strokeStyle = P.error;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(weightX, wingCy + 10); ctx.lineTo(weightX, weightBotY); ctx.stroke();
    ctx.fillStyle = P.error;
    ctx.beginPath();
    ctx.moveTo(weightX, weightBotY + 5);
    ctx.lineTo(weightX - 6, weightBotY - 5);
    ctx.lineTo(weightX + 6, weightBotY - 5);
    ctx.closePath();
    ctx.fill();
    ctx.font = "bold 11px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.fillText(t('f1weight'), weightX, weightBotY + 18);

    // Wing label
    ctx.fillStyle = P.text;
    ctx.font = "bold 12px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f1wing'), wingCx, wingCy + 55 * scale);

    return true;
  }

  // ----- Frame 2: Parachute scene -----
  if (el.type === 'parachute_scene') {
    var paraCx = cx - 40, paraCy = cy - 20;
    var ps = Math.min(W / 700, 1) * 1.1;

    // Parachute dome with bezier curves
    ctx.save();
    ctx.translate(paraCx, paraCy);
    ctx.scale(ps, ps);

    // Dome glow
    ctx.shadowColor = 'rgba(255,219,60,0.15)';
    ctx.shadowBlur = 20;

    // Dome shape -- half ellipse with panel lines
    var domeGrad = ctx.createRadialGradient(0, -50, 10, 0, -30, 80);
    domeGrad.addColorStop(0, 'rgba(255,219,60,0.35)');
    domeGrad.addColorStop(0.5, 'rgba(201,191,255,0.25)');
    domeGrad.addColorStop(1, 'rgba(201,191,255,0.05)');
    ctx.fillStyle = domeGrad;
    ctx.beginPath();
    ctx.moveTo(-80, 0);
    ctx.bezierCurveTo(-80, -80, -40, -110, 0, -110);
    ctx.bezierCurveTo(40, -110, 80, -80, 80, 0);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Dome outline
    ctx.strokeStyle = P.secondary;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-80, 0);
    ctx.bezierCurveTo(-80, -80, -40, -110, 0, -110);
    ctx.bezierCurveTo(40, -110, 80, -80, 80, 0);
    ctx.stroke();

    // Panel lines on dome
    ctx.strokeStyle = 'rgba(201,191,255,0.2)';
    ctx.lineWidth = 1;
    for (var pi = -60; pi <= 60; pi += 30) {
      ctx.beginPath();
      ctx.moveTo(pi, 0);
      var cpY = -90 + Math.abs(pi) * 0.3;
      ctx.quadraticCurveTo(pi * 0.7, cpY, pi * 0.3, -105 + Math.abs(pi) * 0.15);
      ctx.stroke();
    }

    // Suspension lines (bezier curves)
    ctx.strokeStyle = 'rgba(201,191,255,0.5)';
    ctx.lineWidth = 1;
    var payloadY = 70;
    var anchors = [-70, -40, -15, 15, 40, 70];
    for (var ai = 0; ai < anchors.length; ai++) {
      ctx.beginPath();
      ctx.moveTo(anchors[ai], -5);
      ctx.quadraticCurveTo(anchors[ai] * 0.3, payloadY * 0.5, 0, payloadY);
      ctx.stroke();
    }

    // Payload capsule
    ctx.fillStyle = 'rgba(201,191,255,0.6)';
    ctx.strokeStyle = P.primary;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-10, payloadY - 5);
    ctx.lineTo(10, payloadY - 5);
    ctx.lineTo(8, payloadY + 10);
    ctx.lineTo(-8, payloadY + 10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.restore();

    // Drag area highlight -- dashed outline around dome
    ctx.strokeStyle = 'rgba(255,219,60,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.save();
    ctx.translate(paraCx, paraCy);
    ctx.scale(ps, ps);
    ctx.moveTo(-90, 5);
    ctx.bezierCurveTo(-90, -85, -45, -118, 0, -118);
    ctx.bezierCurveTo(45, -118, 90, -85, 90, 5);
    ctx.closePath();
    ctx.restore();
    ctx.stroke();
    ctx.setLineDash([]);

    // Air particles being deflected around dome
    var pCount = 24;
    for (var di = 0; di < pCount; di++) {
      var angle = (di / pCount) * Math.PI + Math.PI;  // semicircle below and sides
      var distBase = 90 * ps + 10;
      var timeOff = tm * 40 + di * 20;
      var dist = distBase + (timeOff % 60);
      var dx = paraCx + Math.cos(angle) * dist;
      var dy = paraCy - 55 * ps + Math.sin(angle) * dist * 0.7;
      // only draw if in canvas bounds
      if (dy > 0 && dy < H && dx > 0 && dx < W) {
        var pAlpha = Math.max(0, 1 - (dist - distBase) / 60) * 0.5;
        ctx.fillStyle = 'rgba(201,191,255,' + pAlpha + ')';
        ctx.beginPath(); ctx.arc(dx, dy, 1.5, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Falling air particles above (being captured)
    for (var fi = 0; fi < 10; fi++) {
      var fx = paraCx - 70 * ps + fi * 16 * ps;
      var fy = (paraCy - 130 * ps + tm * 30 + fi * 15) % (paraCy - 60 * ps);
      if (fy < 5) fy = 5;
      ctx.fillStyle = 'rgba(201,191,255,0.3)';
      ctx.beginPath(); ctx.arc(fx, fy, 1.2, 0, Math.PI * 2); ctx.fill();
    }

    // Drag force arrow (UP)
    var dragAX = paraCx + 110 * ps, dragTopY = paraCy - 90 * ps;
    ctx.strokeStyle = P.secondary;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(dragAX, paraCy + 20 * ps); ctx.lineTo(dragAX, dragTopY); ctx.stroke();
    ctx.fillStyle = P.secondary;
    ctx.beginPath();
    ctx.moveTo(dragAX, dragTopY - 5);
    ctx.lineTo(dragAX - 6, dragTopY + 5);
    ctx.lineTo(dragAX + 6, dragTopY + 5);
    ctx.closePath();
    ctx.fill();
    ctx.shadowColor = 'rgba(255,219,60,0.3)';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = "bold 11px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f2drag'), dragAX, dragTopY - 12);

    // Weight arrow (DOWN)
    var wAX = paraCx + 110 * ps, wBotY = paraCy + 80 * ps;
    ctx.strokeStyle = P.error;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(wAX, paraCy + 30 * ps); ctx.lineTo(wAX, wBotY); ctx.stroke();
    ctx.fillStyle = P.error;
    ctx.beginPath();
    ctx.moveTo(wAX, wBotY + 5);
    ctx.lineTo(wAX - 6, wBotY - 5);
    ctx.lineTo(wAX + 6, wBotY - 5);
    ctx.closePath();
    ctx.fill();
    ctx.font = "bold 11px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.fillText(t('f2weight'), wAX, wBotY + 18);

    // Terminal velocity comparison box (right side)
    var boxX = cx + 100, boxY = cy - 40;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.strokeStyle = 'rgba(201,191,255,0.2)';
    ctx.lineWidth = 1;
    _roundRect(ctx, boxX, boxY, 180, 80, 4);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = P.primary;
    ctx.font = "bold 11px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText(t('f2with'), boxX + 10, boxY + 25);
    ctx.fillStyle = P.error;
    ctx.fillText(t('f2without'), boxX + 10, boxY + 50);

    // Speed bars
    ctx.fillStyle = P.primary;
    ctx.fillRect(boxX + 10, boxY + 32, 20, 6);
    ctx.fillStyle = P.error;
    ctx.fillRect(boxX + 10, boxY + 57, 140, 6);

    return true;
  }

  // ----- Frame 3: Comparison scene -----
  if (el.type === 'compare_scene') {
    var leftX = W * 0.28, rightX = W * 0.72;
    var topY = 50, bottomY = H - 40;
    var midY = (topY + bottomY) / 2;

    // Divider line
    ctx.strokeStyle = 'rgba(201,191,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(cx, topY); ctx.lineTo(cx, bottomY); ctx.stroke();
    ctx.setLineDash([]);

    // -- Left side: Glider --
    ctx.fillStyle = P.primary;
    ctx.font = "bold 14px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f3glider'), leftX, topY + 10);

    // Glider flight path (diagonal descent)
    var pathStartX = leftX - 100, pathStartY = topY + 50;
    var pathEndX = leftX + 100, pathEndY = topY + 120;
    ctx.strokeStyle = P.primary;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath(); ctx.moveTo(pathStartX, pathStartY); ctx.lineTo(pathEndX, pathEndY); ctx.stroke();
    ctx.setLineDash([]);

    // Animated glider along path
    var gProgress = (tm * 0.15) % 1;
    var gAX = pathStartX + gProgress * (pathEndX - pathStartX);
    var gAY = pathStartY + gProgress * (pathEndY - pathStartY);
    _drawGliderShape(ctx, gAX, gAY, 1.0, P.primary, 0.9);

    // Angle indicator
    ctx.strokeStyle = 'rgba(255,219,60,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pathStartX + 40, pathStartY);
    ctx.lineTo(pathStartX + 80, pathStartY);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,219,60,0.7)';
    ctx.font = "9px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText('3-6 deg', pathStartX + 82, pathStartY + 3);

    // Path description
    ctx.fillStyle = P.muted;
    ctx.font = "10px 'Noto Sans SC','Inter',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f3pathG'), leftX, topY + 145);

    // Glider stats box
    var gsBoxY = midY + 20;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.strokeStyle = 'rgba(201,191,255,0.15)';
    ctx.lineWidth = 1;
    _roundRect(ctx, leftX - 85, gsBoxY, 170, 55, 3);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = P.secondary;
    ctx.font = "bold 10px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f3ratio'), leftX, gsBoxY + 18);
    ctx.fillStyle = P.muted;
    ctx.font = "9px 'Noto Sans SC','Inter',sans-serif";
    ctx.fillText(t('f3app2'), leftX, gsBoxY + 38);

    // -- Right side: Parachute --
    ctx.fillStyle = P.secondary;
    ctx.font = "bold 14px 'Space Grotesk','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f3para'), rightX, topY + 10);

    // Parachute descent path (vertical)
    var pPathX = rightX, pPathTopY = topY + 50, pPathBotY = topY + 140;
    ctx.strokeStyle = P.secondary;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath(); ctx.moveTo(pPathX, pPathTopY); ctx.lineTo(pPathX, pPathBotY); ctx.stroke();
    ctx.setLineDash([]);

    // Animated parachute along path
    var pProgress = (tm * 0.1) % 1;
    var pAY = pPathTopY + pProgress * (pPathBotY - pPathTopY);
    _drawParachuteShape(ctx, pPathX, pAY, 0.7, P.secondary, 0.9);

    // Path description
    ctx.fillStyle = P.muted;
    ctx.font = "10px 'Noto Sans SC','Inter',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f3pathP'), rightX, topY + 160);

    // Parachute stats box
    var psBoxY = midY + 20;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.strokeStyle = 'rgba(201,191,255,0.15)';
    ctx.lineWidth = 1;
    _roundRect(ctx, rightX - 85, psBoxY, 170, 55, 3);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = P.secondary;
    ctx.font = "bold 10px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(t('f3tv'), rightX, psBoxY + 18);
    ctx.fillStyle = P.muted;
    ctx.font = "9px 'Noto Sans SC','Inter',sans-serif";
    ctx.fillText(t('f3app1'), rightX, psBoxY + 38);

    return true;
  }

  return false;
}

// ============================================================
// Helper drawing functions
// ============================================================

function _roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function _drawGliderShape(ctx, x, y, scale, color, alpha) {
  var s = scale || 1;
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.translate(x, y);
  // Fuselage
  ctx.fillStyle = color || '#c9bfff';
  ctx.beginPath();
  ctx.moveTo(-25 * s, 0);
  ctx.lineTo(25 * s, -2 * s);
  ctx.lineTo(30 * s, 0);
  ctx.lineTo(25 * s, 2 * s);
  ctx.closePath();
  ctx.fill();
  // Wings
  ctx.fillStyle = color || '#c9bfff';
  ctx.globalAlpha = (alpha || 1) * 0.7;
  ctx.beginPath();
  ctx.moveTo(-5 * s, -1 * s);
  ctx.lineTo(-35 * s, -12 * s);
  ctx.lineTo(-25 * s, 0);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-5 * s, 1 * s);
  ctx.lineTo(-35 * s, 12 * s);
  ctx.lineTo(-25 * s, 0);
  ctx.closePath();
  ctx.fill();
  // Tail
  ctx.globalAlpha = (alpha || 1) * 0.5;
  ctx.beginPath();
  ctx.moveTo(-22 * s, 0);
  ctx.lineTo(-30 * s, -6 * s);
  ctx.lineTo(-28 * s, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function _drawParachuteShape(ctx, x, y, scale, color, alpha) {
  var s = scale || 1;
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.translate(x, y);
  // Canopy dome
  var domeGrad = ctx.createRadialGradient(0, -25 * s, 5, 0, -15 * s, 40 * s);
  domeGrad.addColorStop(0, color || '#ffdb3c');
  domeGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = domeGrad;
  ctx.globalAlpha = (alpha || 1) * 0.4;
  ctx.beginPath();
  ctx.arc(0, -25 * s, 30 * s, Math.PI, 0);
  ctx.fill();
  ctx.globalAlpha = alpha || 1;
  ctx.strokeStyle = color || '#ffdb3c';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, -25 * s, 30 * s, Math.PI, 0);
  ctx.stroke();
  // Suspension lines
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-25 * s, -20 * s); ctx.lineTo(0, 12 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(25 * s, -20 * s); ctx.lineTo(0, 12 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12 * s, -25 * s); ctx.lineTo(0, 12 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12 * s, -25 * s); ctx.lineTo(0, 12 * s); ctx.stroke();
  // Payload
  ctx.fillStyle = color || '#ffdb3c';
  ctx.globalAlpha = (alpha || 1) * 0.8;
  ctx.fillRect(-4 * s, 10 * s, 8 * s, 8 * s);
  ctx.restore();
}

// ============================================================
// BOOT
// ============================================================
AnimRuntime.boot();
</script>
