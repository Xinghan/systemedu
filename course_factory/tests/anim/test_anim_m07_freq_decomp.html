<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>把脑波拆成快波加慢波</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 (所有 26 套统一) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);
    /* 第 2 层 — phys signature accent (sky-teal) */
    --accent:  oklch(0.78 0.13 215);
    /* 第 3 层 — phys 5 色 palette (themes.js Force Observatory) */
    --field:   oklch(0.78 0.13 215);
    --wave:    oklch(0.55 0.13 215);
    --mass:    oklch(0.35 0.10 215);
    --photon:  oklch(0.92 0.08 215);
    --constant:oklch(0.85 0.14 85);
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;height:100vh;overflow:hidden;display:flex;
       background:var(--bg-0);color:var(--fg);
       font-family:'Noto Sans SC',system-ui,sans-serif;}
  .sidebar{width:200px;flex-shrink:0;height:100vh;display:flex;flex-direction:column;
           gap:14px;padding:18px 16px;background:var(--bg-1);
           border-right:1.5px solid var(--line-strong);}
  .brand{font-size:15px;font-weight:700;line-height:1.3;}
  .brand .code{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;
               color:var(--accent);letter-spacing:0.08em;display:block;margin-top:3px;}
  .mascot{display:flex;justify-content:center;padding:4px 0;}
  .lede{font-size:11px;line-height:1.5;color:var(--fg-dim);}
  .lede .en{font-style:italic;color:var(--fg-mute);margin-top:5px;}
  .guide{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}
  .guide li{font-size:11px;line-height:1.45;color:var(--fg-dim);
            padding-left:9px;border-left:3px solid var(--accent);}
  .lang-btn{margin-top:auto;padding:7px 10px;font-size:11px;font-weight:700;
            font-family:'JetBrains Mono',ui-monospace,monospace;cursor:pointer;
            color:var(--fg);background:var(--bg-2);
            border:1.5px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0);}
  .lang-btn:active{transform:translate(3px,3px);box-shadow:none;}
  .stage-wrap{flex:1;position:relative;overflow:hidden;height:100vh;}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hud{position:absolute;top:16px;right:16px;padding:11px 13px;min-width:172px;
       font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;
       background:var(--bg-2);border:1.5px solid var(--line-strong);
       box-shadow:3px 3px 0 var(--bg-0);}
  .hud .htitle{font-weight:700;color:var(--accent);margin-bottom:6px;}
  .hud .hrow{display:flex;justify-content:space-between;gap:10px;color:var(--fg-dim);margin-top:3px;}
  .hud .hrow b{color:var(--fg);font-weight:700;}
  .caption{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
           text-align:center;max-width:78%;}
  .caption .zh{font-size:20px;font-weight:700;color:var(--fg);}
  .caption .en{font-size:14px;font-style:italic;color:var(--fg-mute);margin-top:4px;}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">脑波拆解台<span class="code" id="brandCode">PHY-09 · FOURIER</span></div>
    <div class="mascot">
      <!-- Echo: tuning-fork mascot with waveform halo -->
      <svg width="78" height="78" viewBox="0 0 78 78" aria-hidden="true">
        <circle cx="39" cy="39" r="30" fill="none" stroke="var(--wave)" stroke-width="1.2" opacity="0.5"/>
        <path d="M14 39 q6 -13 12 0 q6 13 12 0 q6 -13 12 0 q6 13 12 0" fill="none"
              stroke="var(--field)" stroke-width="2"/>
        <path d="M33 22 L33 40 q0 6 6 6 q6 0 6 -6 L45 22" fill="none"
              stroke="var(--photon)" stroke-width="3" stroke-linecap="round"/>
        <line x1="39" y1="46" x2="39" y2="58" stroke="var(--photon)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="33" cy="22" r="3" fill="var(--constant)"/>
        <circle cx="45" cy="22" r="3" fill="var(--constant)"/>
      </svg>
    </div>
    <div class="lede">
      <div id="lede1">一段乱起伏的脑波，真能拆成几个干净的快波和慢波吗？</div>
      <div class="en" id="lede2">Can a messy brain wave split into clean fast + slow waves?</div>
    </div>
    <ul class="guide">
      <li id="g1">乱波看似无规律</li>
      <li id="g2">其实是慢中快三波叠加</li>
      <li id="g3">逐个分离再相加验证</li>
    </ul>
    <button class="lang-btn" id="langBtn">中 / EN</button>
  </aside>

  <main class="stage-wrap">
    <canvas id="stage"></canvas>
    <div class="hud">
      <div class="htitle" id="hudTtl">成分配方</div>
      <div class="hrow"><span id="hl1">慢波 theta 4Hz</span><b id="hv1">—</b></div>
      <div class="hrow"><span id="hl2">中波 alpha 10Hz</span><b id="hv2">—</b></div>
      <div class="hrow"><span id="hl3">快波 beta 25Hz</span><b id="hv3">—</b></div>
    </div>
    <div class="caption">
      <div class="zh" id="capZh">这是一段复杂的脑波……</div>
      <div class="en" id="capEn">A complex brain wave...</div>
    </div>
  </main>

<script>
(function(){
  "use strict";
  var LANG='cn';

  // 三个频率成分: 慢波 theta 4Hz / 中波 alpha 10Hz / 快波 beta 25Hz
  // freqVis = 在可视窗口内显示的周期数 (拉开快慢对比), amp = 振幅
  var COMP=[
    {key:'theta', label:'慢波 theta 4Hz',  labelEn:'slow theta 4Hz',  freqVis:1.5, amp:0.55, color:'--wave'},
    {key:'alpha', label:'中波 alpha 10Hz', labelEn:'mid alpha 10Hz',  freqVis:4.0, amp:0.95, color:'--photon'},
    {key:'beta',  label:'快波 beta 25Hz',  labelEn:'fast beta 25Hz',  freqVis:9.5, amp:0.40, color:'--field'}
  ];

  // F5 两种脑状态配方 (相对强度 0-1)
  var RECIPE={
    relax: [0.6, 1.0, 0.25],   // 放松: alpha 多
    focus: [0.35, 0.45, 1.0]   // 专注: beta 多
  };

  var I18N={
    brandCode:{cn:'PHY-09 · 傅里叶',en:'PHY-09 · FOURIER'},
    lede1:{cn:'一段乱起伏的脑波，真能拆成几个干净的快波和慢波吗？',en:'Can a messy brain wave really split into clean fast + slow waves?'},
    lede2:{cn:'拆成快波加慢波。',en:'Split into fast + slow waves.'},
    g1:{cn:'乱波看似无规律',en:'Messy wave seems patternless'},
    g2:{cn:'其实是慢中快三波叠加',en:'Really slow+mid+fast, added up'},
    g3:{cn:'逐个分离再相加验证',en:'Separate, then re-add to verify'},
    hudTtl:{cn:'成分配方',en:'recipe'},
    capZh:{cn:'这是一段复杂的脑波……',en:'A complex brain wave...'},
    subs:{
      cn:['这是一段复杂的脑波，又乱又起伏，看不出规律。',
          '其实它是三个干净的正弦波叠在一起：慢的、中的、快的。',
          '把它们逐个分离——慢波 theta、中波 alpha、快波 beta，各自都很干净。',
          '再把三条波相加，竟然又拼回了一开始那段乱波——叠加成立！',
          '不同脑状态只是配方不同：放松时 alpha 多，专注时 beta 多。'],
      en:['A complex brain wave — messy and bumpy, no obvious pattern.',
          'Actually it is three clean sine waves stacked: slow, mid, and fast.',
          'Separate them one by one — slow theta, mid alpha, fast beta, each clean.',
          'Add the three back up — it rebuilds the original messy wave. Superposition holds!',
          'Different brain states are just different recipes: relaxed = more alpha, focused = more beta.']
    },
    keyMoment:{cn:'任何波都是正弦波的合唱 —— 傅里叶',en:'Any wave is a chorus of sines — Fourier'}
  };
  function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

  var canvas=document.getElementById('stage'),ctx=canvas.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){var r=canvas.parentElement.getBoundingClientRect();
    if(r.width<1||r.height<1)return;
    W=r.width;H=r.height;canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
  window.addEventListener('resize',resize);
  setTimeout(resize,150);setTimeout(resize,500);
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(resize);

  var C=function(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();};

  var startT=null, DUR=6000, NF=5, TOTAL=NF*DUR;
  function easeIO(u){return u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;}
  function clamp01(x){return x<0?0:x>1?1:x;}

  // 在归一化 x (0..1) 上, 用相位 ph 算单个成分的值; weight 缩放强度
  function comp(x,ph,i,weight){
    var c=COMP[i];
    return Math.sin(x*Math.PI*2*c.freqVis + ph)*c.amp*(weight==null?1:weight);
  }
  function sumWave(x,ph,weights){
    var v=0;for(var i=0;i<COMP.length;i++)v+=comp(x,ph,i,weights?weights[i]:1);
    return v;
  }
  // 最大可能幅度 (用于归一化到画布)
  function maxAmp(weights){var m=0;for(var i=0;i<COMP.length;i++)m+=COMP[i].amp*(weights?weights[i]:1);return m;}

  // 画单条成分波 (干净正弦)
  function drawSingle(x0,x1,midY,ampPx,ph,i,weight){
    var c=COMP[i];
    ctx.strokeStyle=C(c.color);ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.beginPath();
    for(var px=x0;px<=x1;px++){
      var xn=(px-x0)/(x1-x0);
      var y=midY - comp(xn,ph,i,weight)/(c.amp||1)*ampPx;
      if(px===x0)ctx.moveTo(px,y);else ctx.lineTo(px,y);
    }
    ctx.stroke();
  }

  // 画合成波 (多成分叠加, 归一化)
  function drawSum(x0,x1,midY,ampPx,ph,weights,colorVar,lw){
    ctx.strokeStyle=C(colorVar);ctx.lineWidth=lw||2.8;ctx.lineJoin='round';ctx.beginPath();
    var norm=maxAmp(weights)||1;
    for(var px=x0;px<=x1;px++){
      var xn=(px-x0)/(x1-x0);
      var y=midY - sumWave(xn,ph,weights)/norm*ampPx;
      if(px===x0)ctx.moveTo(px,y);else ctx.lineTo(px,y);
    }
    ctx.stroke();
  }

  function bg(){
    ctx.fillStyle=C('--bg-0');ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=C('--line');ctx.lineWidth=1;
    for(var gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  }

  function label(text,x,y,colorVar,size,align){
    ctx.fillStyle=C(colorVar);ctx.textAlign=align||'left';
    ctx.font=(size||12)+"px 'JetBrains Mono',ui-monospace,monospace";
    ctx.fillText(text,x,y);
  }
  function labelCJK(text,x,y,colorVar,size,align){
    ctx.fillStyle=C(colorVar);ctx.textAlign=align||'left';
    ctx.font=(size||12)+"px 'Noto Sans SC',sans-serif";
    ctx.fillText(text,x,y);
  }

  function draw(now){
    if(startT===null)startT=now;
    var el=now-startT;if(el>=TOTAL){startT=now;el=0;}
    if(!W||!H){requestAnimationFrame(draw);return;}
    var frame=Math.min(Math.floor(el/DUR),NF-1);
    var fu=clamp01((el-frame*DUR)/DUR); // 帧内进度 0..1
    var ph=now/650;

    bg();

    var x0=70, x1=W-50, fullMid=H*0.46;
    var ampBig=H*0.18;

    if(frame===0){
      // F1: 一段乱脑波 (theta+alpha+beta 全 weight=1)
      drawSum(x0,x1,fullMid,ampBig,ph,[1,1,1],'--field',2.8);
      labelCJK(LANG==='cn'?'一段脑波 (随时间)':'a brain wave (over time)',x0,fullMid-ampBig-22,'--fg-mute',12);
      label('EEG',x0,fullMid+ampBig+30,'--accent',12);
      setHUD('—','—','—');
    }
    else if(frame===1){
      // F2: 揭示是三波叠加 — 上方合成波, 下方三条成分淡入分行
      var topMid=H*0.26, topAmp=H*0.11;
      drawSum(x0,x1,topMid,topAmp,ph,[1,1,1],'--field',2.6);
      labelCJK(LANG==='cn'?'它 = 三个简单波叠起来':'it = three simple waves stacked',x0,topMid-topAmp-16,'--fg-dim',12);
      // 三行成分, 渐次淡入
      var rows=[H*0.54,H*0.70,H*0.86], rowAmp=H*0.055;
      for(var i=0;i<3;i++){
        var appear=clamp01((fu-i*0.18)/0.4);
        if(appear<=0)continue;
        ctx.globalAlpha=appear;
        drawSingle(x0,x1,rows[i],rowAmp,ph,i,1);
        ctx.globalAlpha=1;
        labelCJK((LANG==='cn'?COMP[i].label:COMP[i].labelEn),x0,rows[i]-rowAmp-8,COMP[i].color,11);
        // 加号
        if(i>0){labelCJK('+',x0-26,rows[i]+4,'--fg-mute',18,'center');}
      }
      setHUD(LANG==='cn'?'慢':'slow',LANG==='cn'?'中':'mid',LANG==='cn'?'快':'fast');
    }
    else if(frame===2){
      // F3: 逐个分离 — 三条干净正弦各占一行, 标注频率
      var rows=[H*0.24,H*0.50,H*0.76], rowAmp=H*0.085;
      for(var i=0;i<3;i++){
        drawSingle(x0,x1,rows[i],rowAmp,ph,i,1);
        labelCJK((LANG==='cn'?COMP[i].label:COMP[i].labelEn),x0,rows[i]-rowAmp-10,COMP[i].color,13);
        label(['4 Hz','10 Hz','25 Hz'][i],x1,rows[i]-rowAmp-10,COMP[i].color,12,'right');
        // 基线
        ctx.strokeStyle=C('--line');ctx.lineWidth=1;ctx.setLineDash([4,5]);
        ctx.beginPath();ctx.moveTo(x0,rows[i]);ctx.lineTo(x1,rows[i]);ctx.stroke();ctx.setLineDash([]);
      }
      setHUD(LANG==='cn'?'分离':'split',LANG==='cn'?'分离':'split',LANG==='cn'?'分离':'split');
    }
    else if(frame===3){
      // F4: 三波相加 = 原始乱波. 上半三条淡色成分往中间汇聚求和, 下半合成线压在原波上重合
      var topMid=H*0.30, topAmp=H*0.09;
      // 三条成分半透明
      for(var i=0;i<3;i++){
        ctx.globalAlpha=0.45;
        drawSingle(x0,x1,topMid,topAmp,ph,i,1);
        ctx.globalAlpha=1;
      }
      labelCJK(LANG==='cn'?'三条波相加……':'add the three waves...',x0,topMid-topAmp-30,'--fg-dim',12);
      label('theta + alpha + beta',x0,topMid-topAmp-12,'--accent',11);
      // 下半: 原波 (粗淡) + 合成波 (gold 细线) 重合, 合成线从左往右"画出"
      var botMid=H*0.68, botAmp=H*0.17;
      // 原波 (参考, sky-teal 粗淡)
      ctx.globalAlpha=0.4;
      drawSum(x0,x1,botMid,botAmp,ph,[1,1,1],'--field',5);
      ctx.globalAlpha=1;
      // 合成波 gold, 按 fu 进度画出 (key moment: 重合)
      var drawTo=x0+(x1-x0)*easeIO(fu);
      ctx.strokeStyle=C('--gold');ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.beginPath();
      var norm=maxAmp([1,1,1]);
      for(var px=x0;px<=drawTo;px++){
        var xn=(px-x0)/(x1-x0);
        var y=botMid - sumWave(xn,ph,[1,1,1])/norm*botAmp;
        if(px===x0)ctx.moveTo(px,y);else ctx.lineTo(px,y);
      }
      ctx.stroke();
      labelCJK(LANG==='cn'?'= 原来那段乱波 (完全重合)':'= the original messy wave (perfect match)',x0,botMid+botAmp+30,fu>0.85?'--gold':'--fg-mute',13);
      setHUD('1.0','1.0','1.0');
    }
    else {
      // F5: 两种脑状态配方对比 + gold 金句
      var colW=(x1-x0-60)/2, gap=60;
      var states=[
        {name:LANG==='cn'?'放松':'relaxed', w:RECIPE.relax, cx0:x0},
        {name:LANG==='cn'?'专注':'focused', w:RECIPE.focus, cx0:x0+colW+gap}
      ];
      var midY=H*0.36, ampPx=H*0.12;
      for(var s=0;s<2;s++){
        var st=states[s], cx1=st.cx0+colW;
        // 该状态的合成波 (用 accent 色)
        drawSum(st.cx0,cx1,midY,ampPx, ph, st.w, s===0?'--photon':'--field',2.6);
        labelCJK(st.name,(st.cx0+cx1)/2,midY-ampPx-26,s===0?'--photon':'--field',16,'center');
        // 配方迷你柱 (theta/alpha/beta 强度)
        var barBase=H*0.74, barW=colW/5, bx=st.cx0+barW*0.5;
        for(var i=0;i<3;i++){
          var bh=st.w[i]*H*0.16;
          ctx.fillStyle=C(COMP[i].color);
          ctx.fillRect(bx-barW*0.3, barBase-bh, barW*0.6, bh);
          ctx.strokeStyle=C('--line-strong');ctx.lineWidth=1.2;
          ctx.strokeRect(bx-barW*0.3, barBase-bh, barW*0.6, bh);
          label(['T','A','B'][i],bx,barBase+16,'--fg-mute',11,'center');
          bx+=barW;
        }
        labelCJK(LANG==='cn'?'配方 (慢/中/快)':'recipe (slow/mid/fast)',(st.cx0+cx1)/2,barBase+34,'--fg-dim',11,'center');
      }
      // gold 金句
      var glow=0.55+0.45*Math.sin(now/400);
      ctx.globalAlpha=glow;
      labelCJK(t('keyMoment'),W/2,H*0.92,'--gold',16,'center');
      ctx.globalAlpha=1;
      var rw=RECIPE.relax, fw=RECIPE.focus;
      setHUD(LANG==='cn'?'放松多':'relax+', LANG==='cn'?'状态变':'varies', LANG==='cn'?'专注多':'focus+');
    }

    // caption
    document.getElementById('capZh').textContent=I18N.subs.cn[frame];
    document.getElementById('capEn').textContent=I18N.subs.en[frame];

    requestAnimationFrame(draw);
  }

  function setHUD(a,b,c){
    document.getElementById('hv1').textContent=a;
    document.getElementById('hv2').textContent=b;
    document.getElementById('hv3').textContent=c;
  }

  function refreshI18N(){
    document.getElementById('brandCode').textContent=t('brandCode');
    document.getElementById('lede1').textContent=t('lede1');
    document.getElementById('lede2').textContent=t('lede2');
    document.getElementById('g1').textContent=t('g1');
    document.getElementById('g2').textContent=t('g2');
    document.getElementById('g3').textContent=t('g3');
    document.getElementById('hudTtl').textContent=t('hudTtl');
    document.getElementById('hl1').textContent=LANG==='cn'?'慢波 theta 4Hz':'slow theta 4Hz';
    document.getElementById('hl2').textContent=LANG==='cn'?'中波 alpha 10Hz':'mid alpha 10Hz';
    document.getElementById('hl3').textContent=LANG==='cn'?'快波 beta 25Hz':'fast beta 25Hz';
  }

  document.getElementById('langBtn').addEventListener('click',function(){
    LANG=LANG==='cn'?'en':'cn';
    this.textContent=LANG==='cn'?'中 / EN':'EN / 中';
    refreshI18N();
  });

  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
