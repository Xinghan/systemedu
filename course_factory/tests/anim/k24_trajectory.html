<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<div class="style-switcher" id="styleSwitcher"></div>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<script src="../../../course_factory/runtime/animation_runtime.js"></script>

<script>
var CONFIG = {
  style: 'phys',
  totalFrames: 5,

  i18n: {
    title:       {en:'ROCKET FLIGHT TRAJECTORY', cn:'\u706b\u7bad\u98de\u884c\u8f68\u8ff9'},
    subtitle:    {en:'From launch to landing',   cn:'\u4ece\u70b9\u706b\u5230\u843d\u5730\u7684\u5b8c\u6574\u8def\u7ebf'},
    guideTitle:  {en:'OBSERVATION GUIDE',         cn:'\u89c2\u5bdf\u6307\u5357'},
    g1: {en:'Watch how speed changes at each phase', cn:'\u89c2\u5bdf\u6bcf\u4e2a\u9636\u6bb5\u901f\u5ea6\u5982\u4f55\u53d8\u5316'},
    g2: {en:'Notice where the rocket reaches maximum height', cn:'\u6ce8\u610f\u706b\u7bad\u5728\u54ea\u91cc\u8fbe\u5230\u6700\u9ad8\u70b9'},
    g3: {en:'Compare ascent vs descent symmetry', cn:'\u5bf9\u6bd4\u4e0a\u5347\u548c\u4e0b\u964d\u7684\u5bf9\u79f0\u6027'},
    g4: {en:'Count the 6 key phases of flight', cn:'\u6570\u4e00\u6570\u98de\u884c\u7684 6 \u4e2a\u5173\u952e\u9636\u6bb5'},

    hudL1: {en:'PHASE',    cn:'\u9636\u6bb5'},
    hudL2: {en:'ALTITUDE', cn:'\u9ad8\u5ea6'},
    hudL3: {en:'SPEED',    cn:'\u901f\u5ea6'},
    hudL4: {en:'ENGINE',   cn:'\u53d1\u52a8\u673a'},

    phase_title:   {en:'ROCKET TRAJECTORY', cn:'\u706b\u7bad\u98de\u884c\u8f68\u8ff9'},
    phase_sub:     {en:'Complete Flight Path', cn:'\u5b8c\u6574\u98de\u884c\u66f2\u7ebf'},
    phase_launch:  {en:'POWERED ASCENT', cn:'\u52a8\u529b\u4e0a\u5347'},
    phase_coast:   {en:'COASTING ASCENT', cn:'\u60ef\u6027\u4e0a\u5347'},
    phase_apex:    {en:'APEX / MAX HEIGHT', cn:'\u6700\u9ad8\u70b9 / \u5c04\u9ad8'},
    phase_descent: {en:'FREE FALL DESCENT', cn:'\u81ea\u7531\u4e0b\u964d'},
    phase_chute:   {en:'PARACHUTE LANDING', cn:'\u964d\u843d\u4f1e\u7740\u9646'},
    phase_full:    {en:'FULL TRAJECTORY', cn:'\u5b8c\u6574\u8f68\u8ff9'},

    label_ground:    {en:'Ground', cn:'\u5730\u9762'},
    label_ignition:  {en:'1. Ignition', cn:'1. \u70b9\u706b'},
    label_burnout:   {en:'2. Engine cutoff', cn:'2. \u53d1\u52a8\u673a\u71c4\u5c3d'},
    label_coast_up:  {en:'3. Coasting up', cn:'3. \u60ef\u6027\u4e0a\u5347'},
    label_apex:      {en:'4. Apex (max height)', cn:'4. \u6700\u9ad8\u70b9(\u5c04\u9ad8)'},
    label_freefall:  {en:'5. Free fall', cn:'5. \u81ea\u7531\u4e0b\u843d'},
    label_parachute: {en:'6. Parachute deploy', cn:'6. \u5f00\u4f1e\u7740\u9646'},

    lbl_speed_up:    {en:'Speed increasing', cn:'\u901f\u5ea6\u589e\u52a0'},
    lbl_speed_down:  {en:'Speed decreasing', cn:'\u901f\u5ea6\u51cf\u5c0f'},
    lbl_speed_zero:  {en:'Speed = 0', cn:'\u901f\u5ea6=0'},
    lbl_speed_fall:  {en:'Speed increasing (down)', cn:'\u901f\u5ea6\u589e\u52a0(\u5411\u4e0b)'},
    lbl_speed_slow:  {en:'Speed decreasing (drag)', cn:'\u51cf\u901f(\u962e\u529b)'},

    lbl_engine_on:   {en:'ENGINE ON', cn:'\u53d1\u52a8\u673a\u5f00\u542f'},
    lbl_engine_off:  {en:'ENGINE OFF', cn:'\u53d1\u52a8\u673a\u5173\u95ed'},
    lbl_gravity:     {en:'Gravity', cn:'\u91cd\u529b'},
    lbl_thrust:      {en:'Thrust', cn:'\u63a8\u529b'},
    lbl_drag_chute:  {en:'Drag (parachute)', cn:'\u962e\u529b(\u964d\u843d\u4f1e)'},
  },

  hudLabels: ['hudL1', 'hudL2', 'hudL3', 'hudL4'],
  hudValues: [
    ['--',          '--',    '--',      '--'],
    ['\u52a8\u529b\u4e0a\u5347', '0-150m', '0-80m/s', 'ON'],
    ['\u60ef\u6027\u4e0a\u5347', '150-300m','80-0m/s', 'OFF'],
    ['\u81ea\u7531\u4e0b\u964d', '300-50m', '0-70m/s', 'OFF'],
    ['\u5b8c\u6574\u8f68\u8ff9', '0-300m', '0-80m/s', 'ON/OFF'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],
};

// ---- Drawing helpers ----

function drawRocket(ctx, x, y, angle, scale, engineOn, mc) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  var s = scale || 1;
  // Body
  ctx.fillStyle = '#c0c8d8';
  ctx.beginPath();
  ctx.moveTo(0, -20*s);
  ctx.lineTo(-6*s, 0);
  ctx.lineTo(-5*s, 16*s);
  ctx.lineTo(5*s, 16*s);
  ctx.lineTo(6*s, 0);
  ctx.closePath();
  ctx.fill();
  // Nose cone
  ctx.fillStyle = AnimRuntime.PAL.primary;
  ctx.beginPath();
  ctx.moveTo(0, -28*s);
  ctx.lineTo(-5*s, -18*s);
  ctx.lineTo(5*s, -18*s);
  ctx.closePath();
  ctx.fill();
  // Fins
  ctx.fillStyle = AnimRuntime.PAL.primaryDim;
  ctx.beginPath();
  ctx.moveTo(-5*s, 12*s);
  ctx.lineTo(-12*s, 20*s);
  ctx.lineTo(-5*s, 16*s);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5*s, 12*s);
  ctx.lineTo(12*s, 20*s);
  ctx.lineTo(5*s, 16*s);
  ctx.closePath();
  ctx.fill();
  // Engine flame
  if (engineOn) {
    var flameH = 12*s + Math.random()*6*s;
    var grd = ctx.createLinearGradient(0, 16*s, 0, 16*s+flameH);
    grd.addColorStop(0, 'rgba(255,200,50,0.9)');
    grd.addColorStop(0.5, 'rgba(255,120,20,0.7)');
    grd.addColorStop(1, 'rgba(255,60,10,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(-4*s, 16*s);
    ctx.lineTo(0, 16*s+flameH);
    ctx.lineTo(4*s, 16*s);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2, color, label, labelSide) {
  var mc = AnimRuntime.modeColors;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // Arrowhead
  var ang = Math.atan2(y2-y1, x2-x1);
  var hl = 8;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl*Math.cos(ang-0.4), y2 - hl*Math.sin(ang-0.4));
  ctx.lineTo(x2 - hl*Math.cos(ang+0.4), y2 - hl*Math.sin(ang+0.4));
  ctx.closePath();
  ctx.fill();
  // Label
  if (label) {
    ctx.font = '500 10px "Noto Sans SC", sans-serif';
    ctx.fillStyle = color;
    var lx = (x1+x2)/2 + (labelSide === 'left' ? -50 : 8);
    var ly = (y1+y2)/2 + 4;
    ctx.fillText(label, lx, ly);
  }
  ctx.restore();
}

function drawParabola(ctx, points, color, alpha, lineWidth) {
  if (points.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.globalAlpha = alpha || 1;
  ctx.lineWidth = lineWidth || 2;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (var i = 1; i < points.length; i++) {
    ctx.lineTo(points[i][0], points[i][1]);
  }
  ctx.stroke();
  ctx.restore();
}

function buildTrajectoryPoints(startX, groundY, apexY, endX, steps) {
  var pts = [];
  var midX = (startX + endX) / 2;
  for (var i = 0; i <= steps; i++) {
    var frac = i / steps;
    var x = startX + (endX - startX) * frac;
    // Parabola: y = groundY - 4*h*t*(1-t) where h = groundY - apexY
    var h = groundY - apexY;
    var y = groundY - 4 * h * frac * (1 - frac);
    pts.push([x, y]);
  }
  return pts;
}

function drawGroundLine(ctx, W, H, mc) {
  var groundY = H * 0.82;
  ctx.save();
  ctx.strokeStyle = mc.dim || '#a3a3a3';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(40, groundY);
  ctx.lineTo(W - 40, groundY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '500 10px "Noto Sans SC", sans-serif';
  ctx.fillStyle = mc.dim || '#a3a3a3';
  ctx.fillText(AnimRuntime.t('label_ground'), 42, groundY + 14);
  ctx.restore();
  return groundY;
}

function drawPhaseLabel(ctx, x, y, text, color) {
  ctx.save();
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawKeyPoint(ctx, x, y, label, color, labelOffsetX, labelOffsetY) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  // Glow
  ctx.beginPath();
  ctx.arc(x, y, 7, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
  // Label
  ctx.font = '500 9px "Noto Sans SC", sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(label, x + (labelOffsetX || 0), y + (labelOffsetY || -12));
  ctx.restore();
}

// ---- Frame elements ----

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var mc = AnimRuntime.modeColors;
  var cx = W / 2, cy = H / 2;

  // Frame 0: Title
  if (f === 0) {
    return [
      {id:'t1', type:'label', text:t('phase_title'), x:cx, y:cy-50, color:P.primary, size:22, align:'center', font:'Space Grotesk'},
      {id:'t2', type:'label', text:t('phase_sub'), x:cx, y:cy-20, color:mc.dim, size:13, align:'center'},
      {id:'t3', type:'label', text:t('g4'), x:cx, y:cy+20, color:mc.text, size:11, align:'center'},
    ];
  }

  return [];
}

// Custom drawing for frames 1-4 (complex canvas ops)
function customDrawElement(ctx2d, el, W, H) {
  return false;
}

// Override drawBg to add custom per-frame content
var _origDrawBg = null;

function drawBg(ctx2d, W, H, mode) {
  // Let runtime draw default background first
  // We add per-frame content on top via onFrameChange
}

// Called by runtime after frame transition
var _lastFrame = -1;

function onReady() {
  // Hook into frame rendering
  var origRender = AnimRuntime._renderFrame;
  if (origRender) {
    AnimRuntime._renderFrame = function(f) {
      origRender.call(AnimRuntime, f);
      drawFrameOverlay(f);
    };
  }
}

function drawFrameOverlay(f) {
  var cv = document.getElementById('c');
  if (!cv) return;
  var ctx2d = cv.getContext('2d');
  if (!ctx2d) return;

  var mc = AnimRuntime.modeColors;
  var P = AnimRuntime.PAL;
  var t = AnimRuntime.t;
  // Get virtual dimensions from runtime
  var vw = AnimRuntime._vw || 700;
  var vh = AnimRuntime._vh || 400;

  // Apply content transform (same as runtime)
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var cw = cv.width / dpr;
  var ch = cv.height / dpr;
  var scale = Math.min(cw / vw, ch / vh);
  var ox = (cw - vw * scale) / 2;
  var oy = (ch - vh * scale) / 2;

  ctx2d.save();
  ctx2d.scale(dpr, dpr);
  ctx2d.translate(ox, oy);
  ctx2d.scale(scale, scale);

  var W = vw, H = vh;
  var groundY = H * 0.82;
  var startX = W * 0.12;
  var endX = W * 0.88;
  var apexY = H * 0.12;
  var midX = (startX + endX) / 2;
  var burnoutX = startX + (endX - startX) * 0.2;
  var burnoutY = groundY - 4 * (groundY - apexY) * 0.2 * 0.8;
  var chuteX = startX + (endX - startX) * 0.82;
  var chuteY = groundY - 4 * (groundY - apexY) * 0.82 * 0.18;

  if (f === 0) {
    // Title frame -- draw a faint trajectory preview
    ctx2d.save();
    ctx2d.globalAlpha = 0.15;
    var pts = buildTrajectoryPoints(startX, groundY, apexY, endX, 60);
    drawParabola(ctx2d, pts, P.primary, 0.15, 1.5);
    ctx2d.restore();
    // Small rocket at bottom
    drawRocket(ctx2d, midX, groundY - 30, -Math.PI * 0.03, 0.8, false, mc);
  }

  if (f === 1) {
    // Powered ascent phase
    // Ground line
    ctx2d.save();
    ctx2d.strokeStyle = mc.dim || '#a3a3a3';
    ctx2d.lineWidth = 1;
    ctx2d.setLineDash([4, 4]);
    ctx2d.beginPath();
    ctx2d.moveTo(40, groundY);
    ctx2d.lineTo(W - 40, groundY);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = mc.dim || '#a3a3a3';
    ctx2d.fillText(t('label_ground'), 42, groundY + 14);
    ctx2d.restore();

    // Partial trajectory (launch to burnout)
    var pts1 = buildTrajectoryPoints(startX, groundY, apexY, endX, 60);
    var showPts = pts1.slice(0, 13); // ~20% of trajectory
    drawParabola(ctx2d, showPts, P.primary, 0.8, 2.5);

    // Rocket at burnout position, angled upward
    var rocketAngle = -Math.PI * 0.35;
    drawRocket(ctx2d, burnoutX, burnoutY, rocketAngle, 1.0, true, mc);

    // Force arrows at rocket
    // Thrust arrow (up)
    drawArrow(ctx2d, burnoutX + 20, burnoutY + 10, burnoutX + 20, burnoutY - 40, '#ffcc33', t('lbl_thrust'), 'right');
    // Gravity arrow (down)
    drawArrow(ctx2d, burnoutX - 20, burnoutY - 10, burnoutX - 20, burnoutY + 25, P.error || '#e06060', t('lbl_gravity'), 'left');

    // Key points
    drawKeyPoint(ctx2d, startX, groundY, t('label_ignition'), P.primary, 0, 16);
    drawKeyPoint(ctx2d, burnoutX, burnoutY, t('label_burnout'), '#ffcc33', 40, -6);

    // Phase label
    drawPhaseLabel(ctx2d, midX, H * 0.06, t('phase_launch'), P.primary);
    // Speed annotation
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = P.primary;
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t('lbl_speed_up'), midX, H * 0.06 + 16);
    ctx2d.fillText(t('lbl_engine_on'), midX, H * 0.06 + 30);
  }

  if (f === 2) {
    // Coasting ascent + apex
    ctx2d.save();
    ctx2d.strokeStyle = mc.dim || '#a3a3a3';
    ctx2d.lineWidth = 1;
    ctx2d.setLineDash([4, 4]);
    ctx2d.beginPath();
    ctx2d.moveTo(40, groundY);
    ctx2d.lineTo(W - 40, groundY);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = mc.dim || '#a3a3a3';
    ctx2d.fillText(t('label_ground'), 42, groundY + 14);
    ctx2d.restore();

    // Full left half trajectory
    var pts2 = buildTrajectoryPoints(startX, groundY, apexY, endX, 60);
    var showPts2 = pts2.slice(0, 31); // to apex
    drawParabola(ctx2d, showPts2, P.primary, 0.7, 2.5);
    // Faded previous section
    drawParabola(ctx2d, pts2.slice(0, 13), P.primary, 0.3, 1.5);

    // Rocket at apex
    drawRocket(ctx2d, midX, apexY + 5, 0, 1.0, false, mc);

    // Only gravity arrow at apex
    drawArrow(ctx2d, midX + 18, apexY + 20, midX + 18, apexY + 55, P.error || '#e06060', t('lbl_gravity'), 'right');

    // Key points
    drawKeyPoint(ctx2d, startX, groundY, t('label_ignition'), P.primaryDim, 0, 16);
    drawKeyPoint(ctx2d, burnoutX, burnoutY, t('label_burnout'), P.primaryDim, 40, -6);
    drawKeyPoint(ctx2d, midX - 20, apexY + 40, t('label_coast_up'), P.primary, -30, -6);
    drawKeyPoint(ctx2d, midX, apexY + 5, t('label_apex'), '#ffcc33', 50, -4);

    // Apex height line
    ctx2d.save();
    ctx2d.strokeStyle = '#ffcc33';
    ctx2d.lineWidth = 0.8;
    ctx2d.setLineDash([3, 3]);
    ctx2d.beginPath();
    ctx2d.moveTo(midX, apexY + 5);
    ctx2d.lineTo(midX, groundY);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.font = '700 11px "JetBrains Mono", monospace';
    ctx2d.fillStyle = '#ffcc33';
    ctx2d.textAlign = 'center';
    ctx2d.fillText('h_max', midX + 30, (apexY + groundY) / 2);
    ctx2d.restore();

    // Phase labels
    drawPhaseLabel(ctx2d, midX, H * 0.06, t('phase_apex'), '#ffcc33');
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = '#ffcc33';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t('lbl_speed_zero'), midX, H * 0.06 + 16);
    ctx2d.fillText(t('lbl_engine_off'), midX, H * 0.06 + 30);
  }

  if (f === 3) {
    // Descent phase
    ctx2d.save();
    ctx2d.strokeStyle = mc.dim || '#a3a3a3';
    ctx2d.lineWidth = 1;
    ctx2d.setLineDash([4, 4]);
    ctx2d.beginPath();
    ctx2d.moveTo(40, groundY);
    ctx2d.lineTo(W - 40, groundY);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = mc.dim || '#a3a3a3';
    ctx2d.fillText(t('label_ground'), 42, groundY + 14);
    ctx2d.restore();

    // Full trajectory, descent highlighted
    var pts3 = buildTrajectoryPoints(startX, groundY, apexY, endX, 60);
    drawParabola(ctx2d, pts3.slice(0, 31), P.primaryDim, 0.25, 1.5);
    drawParabola(ctx2d, pts3.slice(30), P.primary, 0.8, 2.5);

    // Rocket descending with parachute
    var descentFrac = 0.75;
    var descentX = startX + (endX - startX) * descentFrac;
    var descentH = groundY - apexY;
    var descentY = groundY - 4 * descentH * descentFrac * (1 - descentFrac);

    // Draw parachute
    ctx2d.save();
    ctx2d.strokeStyle = P.primary;
    ctx2d.fillStyle = P.primary;
    ctx2d.globalAlpha = 0.6;
    ctx2d.beginPath();
    ctx2d.arc(descentX, descentY - 35, 22, Math.PI, 0);
    ctx2d.fill();
    ctx2d.globalAlpha = 1;
    // Parachute lines
    ctx2d.lineWidth = 1;
    ctx2d.beginPath();
    ctx2d.moveTo(descentX - 20, descentY - 35);
    ctx2d.lineTo(descentX - 3, descentY - 10);
    ctx2d.moveTo(descentX + 20, descentY - 35);
    ctx2d.lineTo(descentX + 3, descentY - 10);
    ctx2d.stroke();
    ctx2d.restore();

    drawRocket(ctx2d, descentX, descentY, Math.PI * 0.05, 0.8, false, mc);

    // Gravity + drag arrows
    drawArrow(ctx2d, descentX + 25, descentY - 5, descentX + 25, descentY + 30, P.error || '#e06060', t('lbl_gravity'), 'right');
    drawArrow(ctx2d, descentX - 25, descentY + 10, descentX - 25, descentY - 25, P.secondary || '#88ddff', t('lbl_drag_chute'), 'left');

    // Key points
    drawKeyPoint(ctx2d, midX, apexY + 5, t('label_apex'), P.primaryDim, 0, -10);
    var ffX = startX + (endX - startX) * 0.6;
    var ffY = groundY - 4 * descentH * 0.6 * 0.4;
    drawKeyPoint(ctx2d, ffX, ffY, t('label_freefall'), P.primary, -40, -6);
    drawKeyPoint(ctx2d, chuteX, chuteY, t('label_parachute'), P.secondary || '#88ddff', 40, 10);

    drawPhaseLabel(ctx2d, midX, H * 0.06, t('phase_descent'), P.primary);
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = P.primary;
    ctx2d.textAlign = 'center';
    ctx2d.fillText(t('lbl_speed_fall') + ' -> ' + t('lbl_speed_slow'), midX, H * 0.06 + 16);
  }

  if (f === 4) {
    // Complete trajectory with all 6 key points
    ctx2d.save();
    ctx2d.strokeStyle = mc.dim || '#a3a3a3';
    ctx2d.lineWidth = 1;
    ctx2d.setLineDash([4, 4]);
    ctx2d.beginPath();
    ctx2d.moveTo(40, groundY);
    ctx2d.lineTo(W - 40, groundY);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.font = '500 10px "Noto Sans SC", sans-serif';
    ctx2d.fillStyle = mc.dim || '#a3a3a3';
    ctx2d.fillText(t('label_ground'), 42, groundY + 14);
    ctx2d.restore();

    // Full trajectory curve
    var pts4 = buildTrajectoryPoints(startX, groundY, apexY, endX, 80);
    drawParabola(ctx2d, pts4, P.primary, 0.9, 3);

    // All 6 key points with labels positioned to avoid overlap
    // 1. Ignition (bottom left)
    drawKeyPoint(ctx2d, startX, groundY, t('label_ignition'), '#ffcc33', 30, 16);
    // 2. Burnout (~20%)
    drawKeyPoint(ctx2d, burnoutX, burnoutY, t('label_burnout'), '#ff9944', 45, 8);
    // 3. Coast up (~35%)
    var coastFrac = 0.35;
    var coastX = startX + (endX - startX) * coastFrac;
    var coastY = groundY - 4 * (groundY - apexY) * coastFrac * (1 - coastFrac);
    drawKeyPoint(ctx2d, coastX, coastY, t('label_coast_up'), P.primary, -45, -8);
    // 4. Apex (top center)
    drawKeyPoint(ctx2d, midX, apexY + 5, t('label_apex'), '#ffcc33', 0, -14);
    // 5. Free fall (~60%)
    var ffFrac4 = 0.62;
    var ffX4 = startX + (endX - startX) * ffFrac4;
    var ffY4 = groundY - 4 * (groundY - apexY) * ffFrac4 * (1 - ffFrac4);
    drawKeyPoint(ctx2d, ffX4, ffY4, t('label_freefall'), P.primary, 40, -8);
    // 6. Parachute (~82%)
    drawKeyPoint(ctx2d, chuteX, chuteY, t('label_parachute'), P.secondary || '#88ddff', 0, 16);

    // Height line
    ctx2d.save();
    ctx2d.strokeStyle = '#ffcc33';
    ctx2d.lineWidth = 0.8;
    ctx2d.setLineDash([3, 3]);
    ctx2d.beginPath();
    ctx2d.moveTo(midX, apexY + 5);
    ctx2d.lineTo(midX, groundY);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
    ctx2d.font = '700 11px "JetBrains Mono", monospace';
    ctx2d.fillStyle = '#ffcc33';
    ctx2d.textAlign = 'center';
    ctx2d.fillText('h_max', midX - 30, (apexY + groundY) / 2);
    ctx2d.restore();

    // Phase label
    drawPhaseLabel(ctx2d, midX, H * 0.04, t('phase_full'), P.primary);

    // Small speed arrows along trajectory
    var arrowPts = [0.1, 0.3, 0.5, 0.7, 0.9];
    for (var ai = 0; ai < arrowPts.length; ai++) {
      var af = arrowPts[ai];
      var ax = startX + (endX - startX) * af;
      var ay = groundY - 4 * (groundY - apexY) * af * (1 - af);
      // Tangent direction
      var df = 0.02;
      var ax2 = startX + (endX - startX) * (af + df);
      var ay2 = groundY - 4 * (groundY - apexY) * (af + df) * (1 - (af + df));
      var tang = Math.atan2(ay2 - ay, ax2 - ax);
      var aLen = 12;
      ctx2d.save();
      ctx2d.strokeStyle = P.primary;
      ctx2d.fillStyle = P.primary;
      ctx2d.globalAlpha = 0.5;
      ctx2d.lineWidth = 1.5;
      ctx2d.beginPath();
      ctx2d.moveTo(ax, ay);
      ctx2d.lineTo(ax + aLen * Math.cos(tang), ay + aLen * Math.sin(tang));
      ctx2d.stroke();
      // Small arrowhead
      var hx = ax + aLen * Math.cos(tang);
      var hy = ay + aLen * Math.sin(tang);
      ctx2d.beginPath();
      ctx2d.moveTo(hx, hy);
      ctx2d.lineTo(hx - 5 * Math.cos(tang - 0.5), hy - 5 * Math.sin(tang - 0.5));
      ctx2d.lineTo(hx - 5 * Math.cos(tang + 0.5), hy - 5 * Math.sin(tang + 0.5));
      ctx2d.closePath();
      ctx2d.fill();
      ctx2d.restore();
    }
  }

  ctx2d.restore();
}

AnimRuntime.boot();
</script>
