<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:transparent;backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="../../../course_factory/runtime/animation_runtime.js"></script>

<script>
var CONFIG = {
  style: 'rocketry_control',
  totalFrames: 5,

  i18n: {
    title:     {en:'FIVE ARCS, FIVE ANGLES', cn:'\u4e94\u79cd\u89d2\u5ea6\u7684\u5f27\u7ebf'},
    subtitle:  {en:'PROJECTILE TRAJECTORY COMPARISON', cn:'\u629b\u5c04\u8f68\u8ff9\u5bf9\u6bd4'},
    // guide
    guideTitle:{en:'OBSERVATION GUIDE', cn:'\u89c2\u5bdf\u6307\u5357'},
    g1: {en:'Watch how the arc shape changes with angle', cn:'\u89c2\u5bdf\u5f27\u7ebf\u5f62\u72b6\u968f\u89d2\u5ea6\u53d8\u5316'},
    g2: {en:'Notice which angle sends the ball farthest', cn:'\u6ce8\u610f\u54ea\u4e2a\u89d2\u5ea6\u8ba9\u7403\u98de\u5f97\u6700\u8fdc'},
    g3: {en:'Compare height vs distance for each arc', cn:'\u6bd4\u8f83\u6bcf\u6761\u5f27\u7ebf\u7684\u9ad8\u5ea6\u548c\u8ddd\u79bb'},
    // HUD labels
    hudAngle:  {en:'ANGLE', cn:'\u89d2\u5ea6'},
    hudHeight: {en:'MAX HEIGHT', cn:'\u6700\u5927\u9ad8\u5ea6'},
    hudRange:  {en:'RANGE', cn:'\u5c04\u7a0b'},
    hudArcs:   {en:'ARCS SHOWN', cn:'\u5df2\u663e\u793a'},
    // narration
    n0: {en:'Ready to launch \u2014 the platform awaits', cn:'\u51c6\u5907\u53d1\u5c04\u2014\u2014\u53d1\u5c04\u53f0\u5c31\u7eea'},
    n1: {en:'15\u00b0 \u2014 a flat, short arc', cn:'15\u00b0\u2014\u2014\u53c8\u5e73\u53c8\u77ed\u7684\u5f27\u7ebf'},
    n2: {en:'30\u00b0 and 45\u00b0 \u2014 arcs grow taller and farther', cn:'30\u00b0\u548c45\u00b0\u2014\u2014\u5f27\u7ebf\u53d8\u9ad8\u53d8\u8fdc'},
    n3: {en:'60\u00b0 and 75\u00b0 \u2014 high but landing closer', cn:'60\u00b0\u548c75\u00b0\u2014\u2014\u98de\u5f97\u9ad8\u4f46\u843d\u70b9\u8fd1'},
    n4: {en:'All 5 arcs \u2014 ~45\u00b0 wins the distance!', cn:'\u4e94\u6761\u5f27\u7ebf\u5168\u89c8\u2014\u2014\u7ea645\u00b0\u5c04\u7a0b\u6700\u5927\uff01'},
    // labels
    ground:    {en:'GROUND', cn:'\u5730\u9762'},
    launcher:  {en:'LAUNCH', cn:'\u53d1\u5c04\u70b9'},
    farthest:  {en:'FARTHEST!', cn:'\u6700\u8fdc\uff01'},
    arc15:     {en:'15\u00b0', cn:'15\u00b0'},
    arc30:     {en:'30\u00b0', cn:'30\u00b0'},
    arc45:     {en:'45\u00b0', cn:'45\u00b0'},
    arc60:     {en:'60\u00b0', cn:'60\u00b0'},
    arc75:     {en:'75\u00b0', cn:'75\u00b0'},
    protractor:{en:'PROTRACTOR', cn:'\u91cf\u89d2\u5668'},
    summary:   {en:'~45\u00b0 = max range', cn:'\u7ea645\u00b0 = \u6700\u5927\u5c04\u7a0b'},
  },

  hudLabels: ['hudAngle', 'hudHeight', 'hudRange', 'hudArcs'],
  hudValues: [
    ['--',    '--',   '--',   '0/5'],
    ['15\u00b0',  '0.3m', '5.0m', '1/5'],
    ['30-45\u00b0','2.6m','10.2m','3/5'],
    ['60-75\u00b0','4.8m','5.0m', '5/5'],
    ['ALL',   '--',   '10.2m','5/5'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

// Physics: parabolic arcs for v0=10 m/s, g=9.8 m/s^2
// Normalized to fit canvas: max range at 45deg ~ 10.2m, max height at 75deg ~ 4.7m
var ARCS = [
  {angle: 15, color: '#ff4444', range: 5.10, height: 0.34},
  {angle: 30, color: '#ff9900', range: 8.83, height: 1.28},
  {angle: 45, color: '#ffdd00', range: 10.2, height: 2.55},
  {angle: 60, color: '#44dd88', range: 8.83, height: 3.83},
  {angle: 75, color: '#4488ff', range: 5.10, height: 4.76},
];
var MAX_RANGE = 10.5;
var MAX_HEIGHT = 5.0;

function arcPoints(arc, baseX, baseY, scaleX, scaleY, steps) {
  var pts = [];
  var rad = arc.angle * Math.PI / 180;
  var v0 = 10;
  var g = 9.8;
  var tFlight = 2 * v0 * Math.sin(rad) / g;
  for (var i = 0; i <= steps; i++) {
    var tt = (i / steps) * tFlight;
    var x = v0 * Math.cos(rad) * tt;
    var y = v0 * Math.sin(rad) * tt - 0.5 * g * tt * tt;
    pts.push({x: baseX + x * scaleX, y: baseY - y * scaleY});
  }
  return pts;
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;

  // Layout
  var groundY = H * 0.82;
  var launchX = W * 0.08;
  var scaleX = (W * 0.8) / MAX_RANGE;
  var scaleY = (H * 0.6) / MAX_HEIGHT;

  var els = [];

  // Ground line
  els.push({id:'ground', type:'line', x1:0, y1:groundY, x2:W, y2:groundY, color:P.muted, width:1.5, dash:[4,4]});
  els.push({id:'groundLabel', type:'label', text:t('ground'), x:W-40, y:groundY+14, color:P.muted, size:9, align:'right'});

  // Launch point
  els.push({id:'launchDot', type:'circle', x:launchX, y:groundY, r:5, color:P.primary, fill:P.primary});
  els.push({id:'launchLabel', type:'label', text:t('launcher'), x:launchX, y:groundY+16, color:P.primary, size:9, align:'center'});

  // Protractor (quarter circle at launch point)
  if (f === 0) {
    // Show protractor lines
    for (var a = 0; a <= 90; a += 15) {
      var rad = a * Math.PI / 180;
      var pLen = 60;
      var px = launchX + Math.cos(rad) * pLen;
      var py = groundY - Math.sin(rad) * pLen;
      els.push({id:'prot_'+a, type:'line', x1:launchX, y1:groundY, x2:px, y2:py,
        color: a % 30 === 0 ? 'rgba(255,176,0,0.4)' : 'rgba(255,176,0,0.15)', width:1});
      if (a % 30 === 0 && a > 0 && a < 90) {
        els.push({id:'protL_'+a, type:'label', text:a+'\u00b0', x:px+8, y:py-4, color:'rgba(255,176,0,0.5)', size:8, align:'left'});
      }
    }
    els.push({id:'protLabel', type:'label', text:t('protractor'), x:launchX+70, y:groundY-65, color:'rgba(255,176,0,0.4)', size:9, align:'left'});
    // Narration
    els.push({id:'narr', type:'label', text:t('n0'), x:W/2, y:H*0.15, color:P.text, size:14, align:'center'});
  }

  // Frame 1: 15 degree arc
  if (f >= 1) {
    var a0 = ARCS[0];
    var pts = arcPoints(a0, launchX, groundY, scaleX, scaleY, 40);
    els.push({id:'arc0', type:'polyline', points:pts, color:a0.color, width:3, glow:a0.color});
    var endPt = pts[pts.length-1];
    els.push({id:'ball0', type:'circle', x:endPt.x, y:endPt.y, r:4, color:a0.color, fill:a0.color});
    els.push({id:'label0', type:'label', text:t('arc15'), x:endPt.x, y:endPt.y+14, color:a0.color, size:10, align:'center'});
  }
  if (f === 1) {
    els.push({id:'narr', type:'label', text:t('n1'), x:W/2, y:H*0.15, color:P.text, size:14, align:'center'});
  }

  // Frame 2: add 30 and 45 degree arcs
  if (f >= 2) {
    for (var i = 1; i <= 2; i++) {
      var ai = ARCS[i];
      var ptsi = arcPoints(ai, launchX, groundY, scaleX, scaleY, 40);
      els.push({id:'arc'+i, type:'polyline', points:ptsi, color:ai.color, width:3, glow:ai.color});
      var ep = ptsi[ptsi.length-1];
      els.push({id:'ball'+i, type:'circle', x:ep.x, y:ep.y, r:4, color:ai.color, fill:ai.color});
      els.push({id:'label'+i, type:'label', text:t(i===1?'arc30':'arc45'), x:ep.x, y:ep.y+14, color:ai.color, size:10, align:'center'});
    }
  }
  if (f === 2) {
    els.push({id:'narr', type:'label', text:t('n2'), x:W/2, y:H*0.15, color:P.text, size:14, align:'center'});
  }

  // Frame 3: add 60 and 75 degree arcs
  if (f >= 3) {
    for (var i = 3; i <= 4; i++) {
      var ai = ARCS[i];
      var ptsi = arcPoints(ai, launchX, groundY, scaleX, scaleY, 40);
      els.push({id:'arc'+i, type:'polyline', points:ptsi, color:ai.color, width:3, glow:ai.color});
      var ep = ptsi[ptsi.length-1];
      els.push({id:'ball'+i, type:'circle', x:ep.x, y:ep.y, r:4, color:ai.color, fill:ai.color});
      els.push({id:'label'+i, type:'label', text:t(i===3?'arc60':'arc75'), x:ep.x, y:ep.y+14, color:ai.color, size:10, align:'center'});
    }
  }
  if (f === 3) {
    els.push({id:'narr', type:'label', text:t('n3'), x:W/2, y:H*0.15, color:P.text, size:14, align:'center'});
  }

  // Frame 4: summary -- highlight 45 degree
  if (f === 4) {
    // Redraw all arcs (already drawn via f>=1,2,3 checks)
    // Add highlight on 45 deg
    var a45 = ARCS[2];
    var pts45 = arcPoints(a45, launchX, groundY, scaleX, scaleY, 40);
    // Bright glow overlay
    els.push({id:'glow45', type:'polyline', points:pts45, color:'rgba(255,221,0,0.4)', width:8});
    // Farthest label
    var ep45 = pts45[pts45.length-1];
    els.push({id:'farthestLabel', type:'label', text:t('farthest'), x:ep45.x, y:ep45.y-20, color:'#ffdd00', size:14, align:'center', bold:true});
    // Summary text
    els.push({id:'narr', type:'label', text:t('n4'), x:W/2, y:H*0.15, color:P.text, size:14, align:'center'});
    els.push({id:'summaryBox', type:'label', text:t('summary'), x:W/2, y:H*0.08, color:P.primary, size:11, align:'center'});

    // Distance markers
    for (var i = 0; i < 5; i++) {
      var ai = ARCS[i];
      var epx = launchX + ai.range * scaleX;
      els.push({id:'dist'+i, type:'line', x1:epx, y1:groundY, x2:epx, y2:groundY+8, color:ai.color, width:1.5});
    }
  }

  return els;
}

function drawBg(ctx, W, H) {
  var P = AnimRuntime.PAL;
  // Dark gradient sky
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050710');
  grad.addColorStop(0.7, '#0a0f1a');
  grad.addColorStop(1, '#111825');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,176,0,0.04)';
  ctx.lineWidth = 1;
  var step = 40;
  for (var x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

AnimRuntime.boot();
</script>
</body>
</html>
