<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg-0:oklch(0.14 0.035 265); --bg-1:oklch(0.18 0.04 265); --bg-2:oklch(0.22 0.045 265);
  --fg:oklch(0.96 0.01 265); --fg-dim:oklch(0.75 0.02 265); --gold:oklch(0.85 0.14 85);
  --bio:oklch(0.75 0.17 155);
  --LIFE:oklch(0.75 0.17 155); --MOSS:oklch(0.55 0.16 155); --SHADOW:oklch(0.35 0.10 160);
  --BLOOM:oklch(0.92 0.08 150); --MUTATE:oklch(0.85 0.14 85);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;}
.wrapper{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:6px;padding:10px;background:var(--sb-bg,rgba(5,6,15,0.92));border-right:1px solid var(--sb-border,rgba(80,255,176,0.15));overflow-y:auto;transition:background 0.3s,border-color 0.3s;}
.lang-btn{align-self:flex-start;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;border:1px solid var(--sb-btn-bd,transparent);background:var(--sb-btn-bg,transparent);color:var(--sb-accent,var(--primary,#50ffb0));letter-spacing:1px;text-transform:uppercase;}
.lang-btn:hover{border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.1);}
.style-switcher{display:flex;gap:4px;margin:4px 0 2px;}
.vm-btn{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 6px;cursor:pointer;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.2));background:var(--sb-btn-bg,transparent);color:var(--sb-dim,rgba(128,128,128,0.5));transition:all 0.2s;}
.vm-btn:hover{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));}
.vm-btn.vm-active{color:var(--sb-accent,var(--primary));border-color:var(--sb-accent,var(--primary));background:rgba(128,128,128,0.12);}
.sidebar h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:4px;line-height:1.3;text-transform:uppercase;letter-spacing:0.04em;}
.sidebar .sub{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:var(--sb-dim,rgba(128,128,128,0.7));letter-spacing:0.06em;}
.sidebar .frame-ind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sb-mute,rgba(128,128,128,0.5));letter-spacing:0.1em;margin-top:4px;}
.sidebar .guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-accent,var(--primary,#50ffb0));margin-top:8px;}
.sidebar .guide-content{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--sb-dim,rgba(255,255,255,0.7));line-height:1.5;}
.sidebar .guide-content ul{padding-left:16px;margin:0;}
.sidebar .guide-content li{margin-bottom:1px;}
/* project route map */
.route{margin-top:10px;border-top:1px solid var(--sb-btn-bd,rgba(128,128,128,0.18));padding-top:8px;}
.route-label{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sb-mute,rgba(128,128,128,0.55));}
.route-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.route-dot{width:8px;height:8px;flex-shrink:0;border-radius:50%;background:var(--sb-btn-bd,rgba(128,128,128,0.3));border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.3));}
.route-row.here .route-dot{background:var(--sb-accent,#50ffb0);border-color:var(--sb-accent,#50ffb0);box-shadow:3px 3px 0 rgba(0,0,0,0.4);}
.route-txt{font-family:'Noto Sans SC',sans-serif;font-size:9.5px;color:var(--sb-mute,rgba(128,128,128,0.55));line-height:1.2;}
.route-row.here .route-txt{color:var(--sb-accent,#50ffb0);font-weight:700;}
.goal{margin-top:9px;font-family:'Noto Sans SC',sans-serif;font-size:9px;color:var(--sb-mute,rgba(128,128,128,0.5));line-height:1.35;border-top:1px solid var(--sb-btn-bd,rgba(128,128,128,0.18));padding-top:7px;}
.anim-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 16px;background:rgba(0,0,0,0.35);}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 16px;border:none;cursor:pointer;color:var(--ctrl-color,var(--bg,#0c0e12));background:linear-gradient(135deg,var(--ctrl-bg,var(--primary,#50ffb0)),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 10px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--sb-btn-bg,rgba(23,26,31,0.92));color:var(--sb-mute,rgba(128,128,128,0.6));box-shadow:none;border:1px solid var(--sb-btn-bd,rgba(128,128,128,0.15));}
.ctrl-btn.secondary:hover{color:var(--sb-accent,var(--primary,#50ffb0));border-color:var(--sb-accent,var(--primary));}
.hud{height:40px;display:flex;align-items:center;justify-content:space-around;background:var(--hud-bg,rgba(0,0,0,0.55));border-top:1px solid var(--hud-border,transparent);padding:0 16px;transition:background 0.3s;}
.hud-item{text-align:center;}
.hud-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:0.15em;text-transform:uppercase;color:var(--hud-label,var(--sb-mute));}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--hud-value,var(--sb-accent,var(--primary,#50ffb0)));}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<button class="lang-btn" id="langBtn">CN</button>
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="frame-ind" id="frameIndicator"></div>
<div class="guide-label" id="guideTitle"></div>
<div class="guide-content" id="guideContent"></div>
<div class="route">
<div class="route-label" id="routeLabel"></div>
<div class="route-row" id="rr1"><span class="route-dot"></span><span class="route-txt" id="rt1"></span></div>
<div class="route-row here" id="rr2"><span class="route-dot"></span><span class="route-txt" id="rt2"></span></div>
<div class="route-row" id="rr3"><span class="route-dot"></span><span class="route-txt" id="rt3"></span></div>
<div class="route-row" id="rr4"><span class="route-dot"></span><span class="route-txt" id="rt4"></span></div>
</div>
<div class="goal" id="goalTxt"></div>
</div>
<div class="anim-main">
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn" id="btnPlay"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
</div>

<!-- Animation Runtime (inlined, shared skeleton) -->

<script>
/**
 * Animation Runtime -- shared skeleton for all course factory animations.
 *
 * Layout: sidebar (200px left column) contains lang-btn, style-mode
 * switcher, title, subtitle, frame indicator, and guide panel. The canvas
 * occupies the remaining right area with ZERO overlapping elements.
 *
 * Visual Modes: three built-in visual modes switchable via sidebar buttons:
 *   - 'light'     Technical Blueprint -- light bg, dark linework, CAD grid
 *   - 'dark'      Dark Editorial -- near-black, single-hue accent, minimal
 *   - 'cyberpunk' Sci-Fi Hologram -- deep blue, glow, scanlines, brackets
 *
 * Required globals before boot():
 *   - CONFIG: { title, subtitle, totalFrames, hudLabels, hudValues, guideItems, style }
 *   - getFrameElements(f, W, H): returns element array for frame f
 *
 * Optional globals:
 *   - drawBg(ctx, W, H, mode): draws background (mode = 'light'|'dark'|'cyberpunk')
 *   - customDrawElement(ctx, el, W, H): return true if handled
 *   - onReady(): called after boot
 */

var AnimRuntime = (function () {
  'use strict';

  // --- State ---
  var cv, ctx, W = 800, H = 400;
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var currentFrame = 0, totalFrames = 4;
  var transitioning = false, playing = false, playTimer = null;
  var LANG = 'cn';
  var I18N = {};

  // --- Sprite cache ---
  // Sprites are SVGs embedded as hidden <svg id="sprite-{name}"> in the HTML.
  // On first use, we rasterize to an offscreen canvas and cache the Image.
  var _spriteCache = {};

  // --- Visual Mode ---

  // Each mode provides colors for canvas drawing and sidebar CSS.
  var VISUAL_MODE = 'cyberpunk'; // default

    light: {

      canvasBg1: '#fafaf5', canvasBg2: '#f0f0ea',
      canvasGrid: 'rgba(15,23,42,0.04)', canvasGridWidth: 0.5,
      canvasText: '#0f172a', canvasTextDim: '#475569', canvasTextMute: '#94a3b8',
      canvasStroke: '#0f172a', canvasStrokeDim: 'rgba(15,23,42,0.3)',
      canvasAccent: null, // uses PAL.primary
      canvasGlow: false,
      canvasCornerBrackets: false,
      canvasScanlines: false,
      // Inner border (CAD style)
      canvasInnerBorder: true, canvasInnerBorderColor: 'rgba(15,23,42,0.2)',
      // Sidebar CSS
      sidebarBg: 'rgba(250,250,245,0.96)', sidebarBorder: '#d4d4c8',
      sidebarText: '#0f172a', sidebarTextDim: '#475569', sidebarTextMute: '#94a3b8',
      sidebarAccent: null, // uses PAL.primary
      sidebarBtnBg: 'transparent', sidebarBtnBorder: null,
      // HUD
      hudBg: 'rgba(250,250,245,0.92)', hudBorder: '#d4d4c8',
      hudLabel: '#64748b', hudValue: '#0f172a',

      ctrlBg: '#0f172a', ctrlColor: '#fafaf5',

      canvasText: '#e2e8f0', canvasTextDim: '#cbd5e1', canvasTextMute: '#64748b',
      canvasStroke: '#e2e8f0', canvasStrokeDim: 'rgba(255,255,255,0.12)',
      canvasAccent: null,
      canvasGlow: true,
      canvasCornerBrackets: true,
      canvasScanlines: true,
      canvasInnerBorder: false,
      canvasTopLine: false,
      sidebarBg: 'rgba(5,6,15,0.92)', sidebarBorder: null, // uses accent at 0.2
      sidebarText: null, sidebarTextDim: null, sidebarTextMute: null,
      sidebarAccent: null,
      sidebarBtnBg: 'transparent', sidebarBtnBorder: null,
      hudBg: 'rgba(5,6,15,0.9)', hudBorder: null,
      hudLabel: null, hudValue: null,
      ctrlBg: null, ctrlColor: '#05060f',
    },
  };

  // Reference coordinate system -- content is authored against this.
  // The runtime scales to fit the actual canvas while preserving aspect.
  var REF_W = 700, REF_H = 400;

  // Virtual dimensions passed to getFrameElements / customDrawElement.
  // Computed by _contentTransform() on each resize.
  var _vw = REF_W, _vh = REF_H;

  // --- Math helpers ---
  function lerp(a, b, p) { return a + (b - a) * p; }

      var pn = (value - input[n - 2]) / (input[n - 1] - input[n - 2]);
      return lerp(output[n - 2], output[n - 1], easing ? easing(pn) : pn);

    for (var i = 1; i < n; i++) {
      if (value <= input[i]) {
        var p = (value - input[i - 1]) / (input[i] - input[i - 1]);

  // --- Default background (mode-aware) ---
  function _defaultDrawBg(c, w, h) {
    var mc = _modeColors();

    // Background gradient
    var g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, mc.bg1); g.addColorStop(1, mc.bg2);
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Grid

    c.strokeStyle = gridColor; c.lineWidth = mc.gridW;

    for (var x = 0; x < w; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, h); c.stroke(); }
    for (var y = 0; y < h; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke(); }

    // Inner border (light / technical blueprint)
    if (mc.innerBorder) {
      c.strokeStyle = mc.innerBorderColor; c.lineWidth = 0.5;
      c.strokeRect(6, 6, w - 12, h - 12);

    // Top accent line (dark editorial)
    if (mc.topLine) {
      var tg = c.createLinearGradient(w * 0.15, 0, w * 0.85, 0);
      tg.addColorStop(0, 'transparent');
      tg.addColorStop(0.4, mc.accent); tg.addColorStop(0.6, mc.accent);
      tg.addColorStop(1, 'transparent');

      c.beginPath(); c.moveTo(0, 0.5); c.lineTo(w, 0.5); c.stroke();

    // Scanlines (cyberpunk)

      c.strokeStyle = 'rgba(255,255,255,0.025)'; c.lineWidth = 1;
      for (var sy = 0; sy < h; sy += 3) {

      }

    // Corner brackets (cyberpunk)

      c.strokeStyle = mc.accent; c.lineWidth = 1.5; c.globalAlpha = 0.5;

      c.beginPath(); c.moveTo(8, 8 + bLen); c.lineTo(8, 8); c.lineTo(8 + bLen, 8); c.stroke();
      // top-right
      c.beginPath(); c.moveTo(w - 8 - bLen, 8); c.lineTo(w - 8, 8); c.lineTo(w - 8, 8 + bLen); c.stroke();
      // bottom-left
      c.beginPath(); c.moveTo(8, h - 8 - bLen); c.lineTo(8, h - 8); c.lineTo(8 + bLen, h - 8); c.stroke();

      c.beginPath(); c.moveTo(w - 8 - bLen, h - 8); c.lineTo(w - 8, h - 8); c.lineTo(w - 8, h - 8 + bLen); c.stroke();

      rg.addColorStop(1, 'transparent');

  // --- Element drawing ---
  function drawElement(el) {
    if (!el || el.alpha <= 0.01) return;
    ctx.save();
    ctx.globalAlpha = el.alpha;

    // Allow user override -- pass virtual W/H (same as getFrameElements receives)
    if (typeof customDrawElement === 'function' && customDrawElement(ctx, el, _vw, _vh)) {
      ctx.restore();
      return;
    }

    switch (el.type) {
      case 'label':
        ctx.fillStyle = el.color || _modeColors().text;
        var isBold = el.bold !== undefined ? el.bold : (el.size >= 14);
        ctx.font = (isBold ? 'bold ' : '') + (el.size || 12) + "px " +
          (isBold ? "'Space Grotesk','Inter','Noto Sans SC'" : "'Inter','Noto Sans SC'") + ",sans-serif";
        ctx.textAlign = el.align || 'center';
        ctx.textBaseline = el.baseline || 'middle';
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = 10; }
        ctx.fillText(el.text, el.x, el.y);
        break;

      case 'text':
        ctx.fillStyle = el.color || _modeColors().dim;
        ctx.font = (el.size || 11) + "px 'Inter','Noto Sans SC',sans-serif";
        ctx.textAlign = el.align || 'left';
        ctx.textBaseline = el.baseline || 'middle';
        ctx.fillText(el.text, el.x, el.y);
        break;

      case 'box':
        if (el.fill) { ctx.fillStyle = el.fill; ctx.fillRect(el.x, el.y, el.w, el.h); }
        if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.lineWidth || 1; ctx.strokeRect(el.x, el.y, el.w, el.h); }
        break;

        ctx.beginPath(); ctx.arc(el.x, el.y, el.r || 10, 0, Math.PI * 2);
        if (el.fill) { ctx.fillStyle = el.fill; ctx.fill(); }
        if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.lineWidth || 1; ctx.stroke(); }
        if (el.glow) { ctx.shadowColor = el.glow; ctx.shadowBlur = el.glowSize || 12; ctx.fill(); ctx.shadowBlur = 0; }
        break;

      case 'arrow':
        _drawArrow(el.x1, el.y1, el.x2, el.y2, el.color || PAL.primary, el.lineWidth || 1.5, el.headSize || 6);
        break;

      case 'line':
        ctx.strokeStyle = el.color || PAL.muted;
        ctx.lineWidth = el.lineWidth || 1;
        if (el.dash) ctx.setLineDash(el.dash);
        ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();

        _drawSprite(el);
        break;

      case 'custom':
        if (typeof el.draw === 'function') el.draw(ctx, el);
        break;

      default:
        if (typeof el.draw === 'function') el.draw(ctx, el);
        break;

  function _drawArrow(x1, y1, x2, y2, color, lw, hs) {

    ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));

  // --- Sprite drawing ---

  // --- Content scaling ---
  // Scale based on canvas height to fit REF_H. Virtual width adapts
  // to fill the actual canvas width so content uses the full area.
  // No safe-area offsets -- nothing overlaps the canvas.
  function _contentTransform() {
    var s = H / REF_H;
    _vh = REF_H;

    if (_vw < REF_W) _vw = REF_W;

    ctx.save();
    ctx.scale(ct.s, ct.s);

  // --- Frame rendering ---
  function drawFrame(f) {
    var bgFn = (typeof drawBg === 'function') ? drawBg : _defaultDrawBg;
    bgFn(ctx, W, H, VISUAL_MODE);
    var ct = _contentTransform();
    _applyContentScale(ct);
    var elems = getFrameElements(f, ct.vw, ct.vh);
    elems.forEach(function (el) { drawElement(el); });
    ctx.restore();
  }

  // --- Shared element transition ---
  function transitionTo(nf) {
    if (nf < 0) nf = 0;
    if (nf >= totalFrames) nf = totalFrames - 1;
    if (nf === currentFrame && !transitioning) { drawFrame(currentFrame); _updateHUD(currentFrame); return; }
    if (transitioning) return;

    var ct0 = _contentTransform();
    var oldElems = getFrameElements(currentFrame, ct0.vw, ct0.vh);
    var newElems = getFrameElements(nf, ct0.vw, ct0.vh);
    var oldMap = {}; oldElems.forEach(function (e) { oldMap[e.id] = e; });
    var newMap = {}; newElems.forEach(function (e) { newMap[e.id] = e; });

    currentFrame = nf;
    _updateHUD(nf);
    transitioning = true;

    var startTime = null, duration = 500;
    var bgFn = (typeof drawBg === 'function') ? drawBg : _defaultDrawBg;

    function step(ts) {
      if (!startTime) startTime = ts;
      var raw = Math.min((ts - startTime) / duration, 1);
      var p = easeInOut(raw);

      bgFn(ctx, W, H, VISUAL_MODE);
      var ct = _contentTransform();
      _applyContentScale(ct);

      oldElems.forEach(function (oe) {
        if (!newMap[oe.id]) drawElement(merge(oe, { alpha: 1 - p }));
      });

      newElems.forEach(function (ne) {
        var oe = oldMap[ne.id];
        if (oe) {
          var merged = merge(ne, {
            x: lerp(oe.x || 0, ne.x || 0, p),
            y: lerp(oe.y || 0, ne.y || 0, p),
            w: lerp(oe.w || 0, ne.w || 0, p),
            h: lerp(oe.h || 0, ne.h || 0, p),
            r: lerp(oe.r || 0, ne.r || 0, p),
            alpha: 1
          });
          if (ne.type === 'arrow' && oe.type === 'arrow') {
            merged.x1 = lerp(oe.x1, ne.x1, p); merged.y1 = lerp(oe.y1, ne.y1, p);
            merged.x2 = lerp(oe.x2, ne.x2, p); merged.y2 = lerp(oe.y2, ne.y2, p);
          }
          if (ne.type === 'line' && oe.type === 'line') {
            merged.x1 = lerp(oe.x1, ne.x1, p); merged.y1 = lerp(oe.y1, ne.y1, p);
            merged.x2 = lerp(oe.x2, ne.x2, p); merged.y2 = lerp(oe.y2, ne.y2, p);
          }
          if ((ne.type === 'label' || ne.type === 'text') && oe.text !== ne.text) {
            drawElement(merge(oe, { alpha: 1 - p }));
            drawElement(merge(ne, { alpha: p }));
          } else {
            drawElement(merged);
          }
        } else {
          drawElement(merge(ne, { alpha: p }));
        }

      ctx.restore();

      if (raw < 1) { requestAnimationFrame(step); }
      else { transitioning = false; }
    }
    requestAnimationFrame(step);
  }

  // --- HUD ---
  function _updateHUD(f) {
    var cfg = window.CONFIG || {};
    var labels = cfg.hudLabels || [];
    var values = cfg.hudValues || [];
    for (var i = 0; i < 4; i++) {
      var lEl = document.getElementById('hudL' + (i + 1));
      var vEl = document.getElementById('hudV' + (i + 1));
      if (lEl && labels[i]) lEl.textContent = t(labels[i]);
      if (vEl && values[f] && values[f][i] !== undefined) {
        var val = values[f][i];
        vEl.textContent = (typeof val === 'string' && I18N[val]) ? t(val) : val;
      }
    }
    var fi = document.getElementById('frameIndicator');
    if (fi) fi.textContent = (f + 1) + ' / ' + totalFrames;
  }

  // --- Guide panel (sidebar layout -- always visible, no collapse) ---
  function _buildGuide() {
    var cfg = window.CONFIG || {};
    var guideTitle = document.getElementById('guideTitle');
    var guideContent = document.getElementById('guideContent');
    if (!guideContent) return;

    if (guideTitle) guideTitle.textContent = t(cfg.guideTitle || 'guideDefault');

    var items = cfg.guideItems || [];
    var html = '<ul>';
    items.forEach(function (key) { html += '<li>' + t(key) + '</li>'; });
    html += '</ul>';
    guideContent.innerHTML = html;
  }

  // --- refreshI18N ---
  function refreshI18N() {
    var titleEl = document.getElementById('title');
    var subEl = document.getElementById('subtitle');
    if (titleEl) titleEl.textContent = t('title');
    if (subEl) subEl.textContent = t('subtitle');

    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var btnPlay = document.getElementById('btnPlay');
    if (btnPrev) btnPrev.textContent = t('btnPrev');
    if (btnNext) btnNext.textContent = t('btnNext');
    if (btnPlay) btnPlay.textContent = playing ? t('btnPause') : t('btnPlay');

    var langBtn = document.getElementById('langBtn');

    _buildGuide();
    _updateHUD(currentFrame);
    drawFrame(currentFrame);

  // --- Resize ---
  function _resize() {
    var wrap = cv.parentElement;
    var rect = wrap.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    W = rect.width; H = rect.height;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    drawFrame(currentFrame);
  }

  // --- Play / Pause ---
  function _togglePlay() {
    if (playing) {
      playing = false;
      if (playTimer) clearTimeout(playTimer);
      document.getElementById('btnPlay').textContent = t('btnPlay');
      return;
    }
    playing = true;
    document.getElementById('btnPlay').textContent = t('btnPause');
    function autoNext() {
      if (!playing) return;
      if (currentFrame < totalFrames - 1) {
        transitionTo(currentFrame + 1);
        playTimer = setTimeout(autoNext, 1800);
      } else {
        playing = false;
        document.getElementById('btnPlay').textContent = t('btnPlay');
      }
    }
    if (currentFrame >= totalFrames - 1) { currentFrame = -1; }
    autoNext();
  }

  function boot() {
    var cfg = window.CONFIG || {};
    totalFrames = cfg.totalFrames || 4;

    // Apply palette

    cv = document.getElementById('c');

  }

  // --- Public API ---
  return {
    boot: boot,
    t: t,
    lerp: lerp,

    get PAL() { return PAL; },
    get W() { return _vw; },

    get totalFrames() { return totalFrames; },

    setMode: function(m) { if (VISUAL_MODES[m]) _applyVisualMode(m); },
    get REF_W() { return REF_W; },
    get REF_H() { return REF_H; },
    get realW() { return W; },
    get realH() { return H; },
    applyContentScale: function () { var ct = _contentTransform(); _applyContentScale(ct); },
    restoreContentScale: function () { ctx.restore(); },
  };
})();

// ---- bio 5-colour palette: one colour per caste (NOT background) ----
var CASTE = {
  LIFE:   'oklch(0.75 0.17 155)', // emerald  -> worker bodies (accent)
  MOSS:   'oklch(0.55 0.16 155)', // dark moss -> soldier
  SHADOW: 'oklch(0.35 0.10 160)', // deep      -> soil chamber walls
  BLOOM:  'oklch(0.92 0.08 150)', // pale bloom-> larvae / eggs
  MUTATE: 'oklch(0.85 0.14 85)',  // gold      -> the QUEEN + key moment
};

// ---------------------------------------------------------------
// Continuous master clock. We do NOT use the skeleton's frame
// snapshot transitions for motion. Instead one rAF loop advances a
// global time T; ants move continuously by lerping against T. Phases
// (0..4) are stretches of the SAME timeline, so the nest is one live
// scene that gradually fills with castes -- not five separate slides.
// ---------------------------------------------------------------
var CLOCK = { t0: 0, T: 0, running: true };
var PHASE_DUR = [5.0, 6.0, 7.5, 5.5, 7.0]; // seconds per phase (~31s cycle)
var CYCLE = PHASE_DUR.reduce(function(a,b){return a+b;}, 0);

function phaseAt(tt) {
  var x = tt % CYCLE, acc = 0;
  for (var i = 0; i < PHASE_DUR.length; i++) {
    if (x < acc + PHASE_DUR[i]) return { p: i, local: (x - acc) / PHASE_DUR[i], tt: x };
    acc += PHASE_DUR[i];
  }
  return { p: PHASE_DUR.length - 1, local: 1, tt: x };
}

// smoothstep fade-in helper
function fin(local, start, end) {
  if (local <= start) return 0;
  if (local >= end) return 1;
  var u = (local - start) / (end - start);
  return u * u * (3 - 2 * u);
}
function clamp01(v){return v<0?0:v>1?1:v;}
function lz(a,b,p){p=clamp01(p);return a+(b-a)*p;}

// ---------------------------------------------------------------
// Nest geometry (in REF coords, drawn into the SHARED deep-space bg).
// The soil cross-section is the single persistent object.
// ---------------------------------------------------------------
function nestGeo(W, H) {
  var cx = W / 2;
  var soilTop = H * 0.30;            // ground line
  // chambers: {x,y,w,h} ellipse rooms carved in soil
  return {
    cx: cx, soilTop: soilTop, W: W, H: H,
    gate:    { x: cx, y: soilTop, r: 26 },                       // surface opening
    store:   { x: cx - W*0.20, y: H*0.52, rx: W*0.10, ry: 30 },  // food store (upper-left)
    nursery: { x: cx + W*0.17, y: H*0.58, rx: W*0.11, ry: 34 },  // nursery (right)
    throne:  { x: cx - W*0.05, y: H*0.72, rx: W*0.15, ry: 38 },  // queen chamber (deep center, lifted clear of subcue band)
    // tunnels connect gate -> store, gate -> nursery, gate -> throne
  };
}

// ---------------------------------------------------------------
// Custom background = the deep-space canvas + the soil cross-section.
// This keeps the SAME nest on screen across all phases.
// ---------------------------------------------------------------
function drawBg(ctx, W, H) {
  // 1) shared deep-space base (NOT emerald, NOT paper)
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'oklch(0.16 0.04 265)');
  g.addColorStop(1, 'oklch(0.12 0.03 265)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // soft radial glow top
  var rg = ctx.createRadialGradient(W*0.5, H*0.14, 0, W*0.5, H*0.14, W*0.55);
  rg.addColorStop(0, 'oklch(0.75 0.17 155 / 0.07)');
  rg.addColorStop(1, 'transparent');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);

  // we draw the soil cross-section here too so it is ALWAYS present.
  var ct = AnimRuntime.modeColors; // unused but keeps parity
  drawSoil(ctx, W, H);
}

function drawSoil(ctx, W, H) {
  var G = nestGeo(W, H);
  // sky band above ground (very dark, with faint scanline already from bg)
  // ground / soil body
  var sg = ctx.createLinearGradient(0, G.soilTop, 0, H);
  sg.addColorStop(0, 'oklch(0.30 0.06 70)');   // surface earth
  sg.addColorStop(1, 'oklch(0.20 0.05 75)');   // deep earth
  ctx.fillStyle = sg;
  ctx.fillRect(0, G.soilTop, W, H - G.soilTop);

  // ground line
  ctx.strokeStyle = 'oklch(0.55 0.10 80 / 0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, G.soilTop); ctx.lineTo(W, G.soilTop); ctx.stroke();

  // a few grass blades on surface (left of gate)
  ctx.strokeStyle = 'oklch(0.55 0.16 155 / 0.7)';
  ctx.lineWidth = 1.5;
  for (var i = 0; i < 6; i++) {
    var gx = 40 + i * 34 + (i > 2 ? W * 0.4 : 0);
    if (Math.abs(gx - G.cx) < 40) continue;
    ctx.beginPath();
    ctx.moveTo(gx, G.soilTop);
    ctx.quadraticCurveTo(gx + 3, G.soilTop - 14, gx + (i%2?7:-6), G.soilTop - 20);
    ctx.stroke();
  }

  // tunnels (carved channels) -- draw as thick darker strokes
  ctx.lineCap = 'round';
  ctx.strokeStyle = 'oklch(0.14 0.04 70)';
  ctx.lineWidth = 16;
  tunnel(ctx, G.gate.x, G.soilTop + 4, G.throne.x, G.throne.y);                     // gate -> throne
  tunnel(ctx, G.gate.x, G.soilTop + 30, G.store.x, G.store.y);                      // -> store
  tunnel(ctx, G.gate.x, G.soilTop + 30, G.nursery.x, G.nursery.y);                  // -> nursery
  tunnel(ctx, G.store.x, G.store.y, G.throne.x - 30, G.throne.y);                   // store -> throne
  tunnel(ctx, G.nursery.x, G.nursery.y, G.throne.x + 30, G.throne.y);              // nursery -> throne

  // chambers (rooms) -- emptiness carved into soil
  room(ctx, G.store);
  room(ctx, G.nursery);
  roomEllipseBig(ctx, G.throne);

  // gate opening (funnel)
  ctx.fillStyle = 'oklch(0.14 0.04 70)';
  ctx.beginPath();
  ctx.moveTo(G.gate.x - 30, G.soilTop);
  ctx.lineTo(G.gate.x + 30, G.soilTop);
  ctx.lineTo(G.gate.x + 12, G.soilTop + 34);
  ctx.lineTo(G.gate.x - 12, G.soilTop + 34);
  ctx.closePath(); ctx.fill();
  // gate rim
  ctx.strokeStyle = CASTE.SHADOW; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(G.gate.x - 30, G.soilTop); ctx.lineTo(G.gate.x - 12, G.soilTop + 34);
  ctx.moveTo(G.gate.x + 30, G.soilTop); ctx.lineTo(G.gate.x + 12, G.soilTop + 34);
  ctx.stroke();
  ctx.lineCap = 'butt';
}

function tunnel(ctx, x1, y1, x2, y2) {
  var mx = (x1 + x2) / 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(mx, (y1 + y2) / 2 + 6, x2, y2);
  ctx.stroke();
}
function room(ctx, r) {
  ctx.fillStyle = 'oklch(0.14 0.04 70)';
  ctx.beginPath(); ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = CASTE.SHADOW; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI*2); ctx.stroke();
}
function roomEllipseBig(ctx, r) {
  ctx.fillStyle = 'oklch(0.15 0.045 70)';
  ctx.beginPath(); ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI*2); ctx.fill();
  // throne glow (queen presence) -- gold tint
  var tg = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, r.rx);
  tg.addColorStop(0, 'oklch(0.85 0.14 85 / 0.14)');
  tg.addColorStop(1, 'transparent');
  ctx.fillStyle = tg; ctx.beginPath(); ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'oklch(0.55 0.10 85 / 0.7)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI*2); ctx.stroke();
}

// ---------------------------------------------------------------
// Ant drawing helper. Three-segment body + 6 legs + antennae.
// size scales the whole ant. legPhase animates the legs.
// ---------------------------------------------------------------
function drawAnt(ctx, x, y, ang, size, color, legPhase, opts) {
  opts = opts || {};
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang);
  var s = size;
  // legs (3 each side)
  ctx.strokeStyle = color; ctx.lineWidth = Math.max(1, s*0.10); ctx.lineCap='round';
  for (var i = -1; i <= 1; i++) {
    var bx = i * s * 0.55;
    var sw = Math.sin(legPhase + i * 1.4) * s * 0.35;
    ctx.beginPath(); ctx.moveTo(bx, -s*0.3); ctx.lineTo(bx + sw, -s*0.95); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx,  s*0.3); ctx.lineTo(bx - sw,  s*0.95); ctx.stroke();
  }
  // body: gaster (rear), thorax (mid), head (front -> +x)
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(-s*0.95, 0, s*0.75, s*0.6, 0, 0, Math.PI*2); ctx.fill(); // gaster
  ctx.beginPath(); ctx.ellipse(0, 0, s*0.5, s*0.42, 0, 0, Math.PI*2); ctx.fill();        // thorax
  ctx.beginPath(); ctx.ellipse(s*0.85, 0, s*0.55, s*0.5, 0, 0, Math.PI*2); ctx.fill();   // head
  // antennae
  ctx.lineWidth = Math.max(1, s*0.08);
  ctx.beginPath(); ctx.moveTo(s*1.1, -s*0.2); ctx.lineTo(s*1.7, -s*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*1.1,  s*0.2); ctx.lineTo(s*1.7,  s*0.55); ctx.stroke();
  // mandibles for soldier (big jaws)
  if (opts.jaws) {
    ctx.lineWidth = Math.max(1.5, s*0.18);
    ctx.beginPath(); ctx.moveTo(s*1.3, -s*0.25); ctx.quadraticCurveTo(s*2.2,-s*0.35,s*2.4,-s*0.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*1.3,  s*0.25); ctx.quadraticCurveTo(s*2.2, s*0.35,s*2.4, s*0.05); ctx.stroke();
  }
  // crown dot for queen
  if (opts.crown) {
    ctx.fillStyle = 'oklch(0.92 0.10 95)';
    for (var k=-1;k<=1;k++){ctx.beginPath();ctx.arc(s*0.85 + k*s*0.3, -s*0.7, s*0.13, 0, Math.PI*2);ctx.fill();}
  }
  // carried crumb
  if (opts.carry > 0) {
    ctx.fillStyle = 'oklch(0.78 0.15 120)';
    ctx.beginPath(); ctx.arc(s*1.9, 0, s*0.5*opts.carry, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// quadratic path point + tangent angle, for ants walking tunnels
function qpt(x1,y1,cxp,cyp,x2,y2,u){
  var a=(1-u);
  var px=a*a*x1+2*a*u*cxp+u*u*x2;
  var py=a*a*y1+2*a*u*cyp+u*u*y2;
  var dx=2*a*(cxp-x1)+2*u*(x2-cxp);
  var dy=2*a*(cyp-y1)+2*u*(y2-cyp);
  return {x:px,y:py,ang:Math.atan2(dy,dx)};
}

// ---------------------------------------------------------------
// THE LIVE SCENE. A single 'custom' element whose draw() reads the
// global clock and renders every caste at its current position.
// Castes accumulate as phases progress; earlier castes keep moving.
// ---------------------------------------------------------------
function drawScene(ctx, el) {
  var W = AnimRuntime.W, H = AnimRuntime.H;
  var G = nestGeo(W, H);
  var P = AnimRuntime.PAL;
  var info = phaseAt(CLOCK.T);
  var p = info.p, T = CLOCK.T;
  var lp = T * 7; // global leg phase

  // visibility budgets: a caste, once it has appeared, STAYS for the rest
  // of the cycle (accumulation, not replacement).
  var showQueen   = p >= 1 ? 1 : 0;
  var showWorkers = p >= 2 ? 1 : 0;
  var showSoldier = p >= 3 ? 1 : 0;
  // soft fade as each first appears
  var aQueen   = p === 1 ? fin(info.local, 0.0, 0.45) : showQueen;
  var aWorkers = p === 2 ? fin(info.local, 0.0, 0.35) : showWorkers;
  var aSoldier = p === 3 ? fin(info.local, 0.0, 0.40) : showSoldier;

  ctx.textAlign='left'; ctx.textBaseline='middle';

  // ---- room labels (always, faint) ----
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.fillStyle = 'oklch(0.78 0.04 265 / 0.7)';
  labelRoom(ctx, AnimRuntime.t('lblGate'),    G.gate.x + 36,  G.soilTop + 10);
  labelRoom(ctx, AnimRuntime.t('lblStore'),   G.store.x - 6,  G.store.y - G.store.ry - 9, 'center');
  labelRoom(ctx, AnimRuntime.t('lblNursery'), G.nursery.x,    G.nursery.y - G.nursery.ry - 9, 'center');
  labelRoom(ctx, AnimRuntime.t('lblThrone'),  G.throne.x,     G.throne.y - G.throne.ry - 11, 'center', CASTE.MUTATE);

  // ---- phase 0: structure highlight pulse on rooms ----
  if (p === 0) {
    var pulse = 0.4 + 0.4 * Math.sin(T * 3);
    ctx.strokeStyle = 'oklch(0.75 0.17 155 / ' + (0.3 + 0.4*pulse) + ')';
    ctx.lineWidth = 2;
    [G.store, G.nursery].forEach(function(r){
      ctx.beginPath(); ctx.ellipse(r.x, r.y, r.rx+3, r.ry+3, 0, 0, Math.PI*2); ctx.stroke();
    });
    ctx.beginPath(); ctx.arc(G.gate.x, G.soilTop+4, 30+3*pulse, Math.PI*0.05, Math.PI*0.95); ctx.stroke();
  }

  // ======================================================
  // EGGS + LARVAE (laid by queen; eggs accumulate over time)
  // ======================================================
  // eggs near queen
  var eggCount = p === 0 ? 0 : Math.min(6, Math.floor(2 + (T % CYCLE) * 0.6));
  if (showQueen) {
    for (var e = 0; e < eggCount; e++) {
      var ea = (e / 6) * Math.PI - Math.PI*0.2;
      var ex = G.throne.x + Math.cos(ea) * (G.throne.rx*0.45) + (e%2?10:-8);
      var ey = G.throne.y + 6 + (e%3)*7 - Math.sin(ea)*6;
      var pop = aQueen * clamp01((T % CYCLE) * 0.8 - e*0.4);
      if (pop <= 0.02) continue;
      ctx.globalAlpha = pop;
      ctx.fillStyle = CASTE.BLOOM;
      ctx.beginPath(); ctx.ellipse(ex, ey, 4.5, 6, 0.4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // egg label
    if (eggCount > 0) {
      ctx.globalAlpha = aQueen;
      ctx.font = "8px 'JetBrains Mono',monospace"; ctx.fillStyle = CASTE.BLOOM;
      ctx.textAlign='left';
      ctx.fillText(AnimRuntime.t('lblEgg'), G.throne.x + G.throne.rx*0.5 + 14, G.throne.y + 2);
      ctx.globalAlpha = 1;
    }
  }
  // larvae in nursery (BLOOM blobs), wiggle
  if (showWorkers || p >= 2) {
    var aLarv = p === 2 ? fin(info.local, 0.05, 0.4) : (p > 2 ? 1 : 0);
    for (var l = 0; l < 4; l++) {
      var lx = G.nursery.x - 22 + l*15;
      var ly = G.nursery.y + 8 + Math.sin(T*3 + l)*2;
      ctx.globalAlpha = aLarv;
      ctx.fillStyle = CASTE.BLOOM;
      ctx.beginPath(); ctx.ellipse(lx, ly, 5, 8, 0.2, 0, Math.PI*2); ctx.fill();
      // segment lines
      ctx.strokeStyle = 'oklch(0.70 0.08 150 / 0.6)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(lx-3,ly-2); ctx.lineTo(lx+3,ly-2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (aLarv > 0.3) {
      ctx.globalAlpha = aLarv*0.9;
      ctx.font = "8px 'JetBrains Mono',monospace"; ctx.fillStyle = CASTE.BLOOM;
      ctx.textAlign='center';
      ctx.fillText(AnimRuntime.t('lblLarva'), G.nursery.x, G.nursery.y + 26);
      ctx.globalAlpha = 1;
    }
  }

  // ======================================================
  // QUEEN (MUTATE gold, biggest). Sits deep in throne, gentle laying.
  // ======================================================
  if (showQueen) {
    var qbob = Math.sin(T*2)*2;
    ctx.globalAlpha = aQueen;
    drawAnt(ctx, G.throne.x - G.throne.rx*0.35, G.throne.y + qbob, 0.05, 11, CASTE.MUTATE, lp*0.4,
            {crown:true});
    // queen label
    ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.fillStyle = CASTE.MUTATE; ctx.textAlign='center';
    ctx.fillText(AnimRuntime.t('lblQueen'), G.throne.x - G.throne.rx*0.35, G.throne.y - 22);
    ctx.globalAlpha = 1;
  }

  // ======================================================
  // WORKERS (LIFE emerald). 4 of them, each a distinct job, looping
  // along tunnel paths. They KEEP running in later phases.
  // ======================================================
  if (showWorkers) {
    ctx.globalAlpha = aWorkers;
    // worker A: forage -- gate <-> outside, brings crumb back
    var uA = (T*0.22) % 1;
    var goingOut = uA < 0.5;
    var uu = goingOut ? uA*2 : (1 - (uA-0.5)*2);
    // path: gate -> up out of nest (surface) ; we mirror by drawing on surface
    var ax = lz(G.gate.x, G.gate.x - W*0.16, uu);
    var ay = lz(G.soilTop - 2, G.soilTop - 14, uu);
    var aang = goingOut ? Math.PI : 0;
    drawAnt(ctx, ax, ay, aang, 6.5, CASTE.LIFE, lp, {carry: goingOut?0:1});
    jobTag(ctx, AnimRuntime.t('lblForage'), ax, ay - 16, CASTE.LIFE);

    // worker B: feed larvae -- moves between throne-ish food and nursery
    var uB = (T*0.20 + 0.3) % 1;
    var pb = qpt(G.gate.x, G.soilTop+30, (G.gate.x+G.nursery.x)/2, (G.soilTop+G.nursery.y)/2+6,
                 G.nursery.x - 18, G.nursery.y, uB);
    drawAnt(ctx, pb.x, pb.y, pb.ang, 6.5, CASTE.LIFE, lp, {carry: uB>0.6?0.7:0.3});
    if (uB > 0.55) jobTag(ctx, AnimRuntime.t('lblFeed'), pb.x, pb.y - 15, CASTE.LIFE);

    // worker C: haul food into store
    var uC = (T*0.18 + 0.6) % 1;
    var pc = qpt(G.gate.x, G.soilTop+30, (G.gate.x+G.store.x)/2, (G.soilTop+G.store.y)/2+6,
                 G.store.x + 10, G.store.y, uC);
    drawAnt(ctx, pc.x, pc.y, pc.ang, 6.5, CASTE.LIFE, lp, {carry: uC<0.5?1:0.2});
    if (uC < 0.5) jobTag(ctx, AnimRuntime.t('lblHaul'), pc.x, pc.y - 15, CASTE.LIFE);

    // worker D: repair -- patrols a tunnel wall, dabbing
    var uD = 0.5 + 0.4*Math.sin(T*1.1);
    var pd = qpt(G.store.x, G.store.y, (G.store.x+G.throne.x)/2-15, (G.store.y+G.throne.y)/2,
                 G.throne.x - 30, G.throne.y, uD);
    drawAnt(ctx, pd.x, pd.y, (Math.sin(T*1.1)>0?0:Math.PI), 6.5, CASTE.LIFE, lp);

    // worker label (one shared tag near a stable spot)
    ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.fillStyle = CASTE.LIFE; ctx.textAlign='left';
    ctx.fillText(AnimRuntime.t('lblWorker'), G.store.x - G.store.rx + 4, G.store.y - G.store.ry - 22);
    ctx.globalAlpha = 1;
  }

  // ======================================================
  // SOLDIER (MOSS) + INTRUDER at the gate.
  // ======================================================
  if (showSoldier) {
    ctx.globalAlpha = aSoldier;
    // intruder comes from upper-right toward gate, soldier blocks
    var push = 0.5 + 0.5*Math.sin(T*2.2);            // tug of war
    var ix = lz(G.gate.x + 70, G.gate.x + 30, 1 - push*0.5);
    var iy = lz(G.soilTop - 24, G.soilTop - 8, 1 - push*0.5);
    // intruder (error red, hostile)
    drawAnt(ctx, ix, iy, Math.PI*0.85, 7, P.error, lp*1.3, {jaws:true});
    jobTag(ctx, AnimRuntime.t('lblIntr'), ix + 10, iy - 14, P.error);

    // soldier at gate, big, jaws out, holding the line
    var sx = G.gate.x + 16 + push*4;
    var sy = G.soilTop - 6;
    drawAnt(ctx, sx, sy, -0.1, 9, CASTE.MOSS, lp*1.1, {jaws:true});
    ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.fillStyle = CASTE.MOSS; ctx.textAlign='left';
    ctx.fillText(AnimRuntime.t('lblSoldier'), G.gate.x - 78, G.soilTop - 22);
    ctx.globalAlpha = 1;
  }

  // ======================================================
  // PHASE 4: "no boss, perfect order" gold flash + linking pulses
  // ======================================================
  if (p === 4) {
    var harmony = fin(info.local, 0.1, 0.5);
    // gold connecting pulse rings around each active room (the colony hums)
    ctx.globalAlpha = harmony * (0.4 + 0.3*Math.sin(T*4));
    ctx.strokeStyle = CASTE.MUTATE; ctx.lineWidth = 1.5;
    [G.store, G.nursery, G.throne, {x:G.gate.x,y:G.soilTop+4,rx:28,ry:28}].forEach(function(r,idx){
      var rr = (r.rx||28) + 6 + 8*Math.abs(Math.sin(T*2 + idx));
      ctx.beginPath(); ctx.ellipse(r.x, r.y, rr, (r.ry||28)+6, 0, 0, Math.PI*2); ctx.stroke();
    });
    ctx.globalAlpha = 1;
    // key-moment caption -- moved into the open central band (between the
    // gate-top caste labels and the throne) so it no longer crowds the
    // SOLDIER / INTRUDER labels clustered up at the gate.
    ctx.globalAlpha = harmony;
    ctx.font = "bold 13px 'JetBrains Mono',monospace"; ctx.fillStyle = CASTE.MUTATE; ctx.textAlign='center';
    ctx.textBaseline = 'middle';
    ctx.fillText(AnimRuntime.t('lblOrder'), W/2, H*0.46);
    ctx.globalAlpha = 1;
  }

  // ======================================================
  // SUBCUE strip (caption follows picture; picture leads).
  // Sits inside a translucent deep-space bar so the text is visually
  // layered ABOVE the scene and never melts into ants / room labels.
  // ======================================================
  var cueKey = ['cue0','cue1','cue2','cue3','cue4'][p];
  var barH = 26;                 // height of the caption bar
  var barTop = H - barH;         // bar occupies the very bottom strip
  ctx.globalAlpha = 1;
  ctx.fillStyle = 'oklch(0.18 0.04 265 / 0.86)';   // --bg-1 translucent
  ctx.fillRect(0, barTop, W, barH);
  // thin accent rule along the top of the bar to seal the separation
  ctx.strokeStyle = 'oklch(0.75 0.17 155 / 0.35)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, barTop); ctx.lineTo(W, barTop); ctx.stroke();

  ctx.globalAlpha = 0.97;
  ctx.font = "12px 'Inter','Noto Sans SC',sans-serif";
  ctx.fillStyle = 'oklch(0.96 0.01 265)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(AnimRuntime.t(cueKey), W/2, barTop + barH/2 + 1);

  // why-now (phase 0) / payoff (phase 4) project re-anchor line.
  // Kept well clear of the caption bar (payoff lifted to ~0.84H).
  ctx.font = "10px 'Inter','Noto Sans SC',sans-serif";
  ctx.fillStyle = 'oklch(0.85 0.14 85 / 0.92)';
  ctx.textBaseline = 'middle';
  if (p === 0) ctx.fillText(AnimRuntime.t('whyNow'), W/2, 18);
  if (p === 4) ctx.fillText(AnimRuntime.t('payoff'), W/2, H*0.84);
  ctx.globalAlpha = 1;
}

function labelRoom(ctx, txt, x, y, align, col) {
  ctx.save();
  ctx.font = "9px 'JetBrains Mono',monospace";
  ctx.fillStyle = col || 'oklch(0.80 0.03 265 / 0.78)';
  ctx.textAlign = align || 'left'; ctx.textBaseline='middle';
  ctx.fillText(txt, x, y);
  ctx.restore();
}
function jobTag(ctx, txt, x, y, col) {
  ctx.save();
  ctx.font = "8px 'JetBrains Mono',monospace";
  ctx.fillStyle = col; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(txt, x, y);
  ctx.restore();
}

// ---------------------------------------------------------------
// getFrameElements: returns ONE live scene element. The element's
// draw() reads CLOCK.T so the picture is continuous, not a snapshot.
// (Phases just re-tint HUD / which castes are present.)
// ---------------------------------------------------------------
function getFrameElements(f, W, H) {
  return [ { id:'scene', type:'custom', alpha:1, draw: drawScene } ];
}

// ---------------------------------------------------------------
// Master autoplay loop: advance CLOCK.T every rAF, loop the 31s
// cycle forever, and keep the skeleton's frame index / HUD synced
// to the current phase so the sidebar + HUD reflect the live scene.
// No setInterval anywhere.
// ---------------------------------------------------------------
var _lastPhase = -1;
function masterLoop(ts) {
  if (!CLOCK.t0) CLOCK.t0 = ts;
  if (CLOCK.running) CLOCK.T = (ts - CLOCK.t0) / 1000;
  var info = phaseAt(CLOCK.T);
  if (info.p !== _lastPhase) {
    _lastPhase = info.p;
    syncPhaseHUD(info.p);
  }
  AnimRuntime.drawFrame(info.p); // redraw live scene every frame
  requestAnimationFrame(masterLoop);
}

function syncPhaseHUD(p) {
  // update HUD directly from CONFIG.hudValues for phase p, with i18n
  var labels = CONFIG.hudLabels, vals = CONFIG.hudValues[p];
  for (var i = 0; i < 4; i++) {
    var lEl = document.getElementById('hudL'+(i+1));
    var vEl = document.getElementById('hudV'+(i+1));
    if (lEl) lEl.textContent = AnimRuntime.t(labels[i]);
    if (vEl) {
      var v = vals[i];
      vEl.textContent = (typeof v === 'string' && CONFIG.i18n[v]) ? AnimRuntime.t(v) : v;
    }
  }
  var fi = document.getElementById('frameIndicator');
  if (fi) fi.textContent = (p+1) + ' / ' + CONFIG.totalFrames;
}

function buildRoute() {
  document.getElementById('routeLabel').textContent = AnimRuntime.t('routeLabel');
  document.getElementById('rt1').textContent = AnimRuntime.t('rt1');
  document.getElementById('rt2').textContent = AnimRuntime.t('rt2');
  document.getElementById('rt3').textContent = AnimRuntime.t('rt3');
  document.getElementById('rt4').textContent = AnimRuntime.t('rt4');
  document.getElementById('goalTxt').textContent = AnimRuntime.t('goalTxt');
}

function onReady() {
  buildRoute();
  // Play toggles the live clock (pause / resume). Pure autoplay otherwise.
  var btnPlay = document.getElementById('btnPlay');
  btnPlay.addEventListener('click', function(){
    CLOCK.running = !CLOCK.running;
    if (CLOCK.running) CLOCK.t0 = performance.now() - CLOCK.T*1000;
    btnPlay.textContent = CLOCK.running ? AnimRuntime.t('btnPause') : AnimRuntime.t('btnPlay');
  });
  // refresh route text on language switch
  var langBtn = document.getElementById('langBtn');
  langBtn.addEventListener('click', function(){ setTimeout(buildRoute, 0); });
  btnPlay.textContent = AnimRuntime.t('btnPause');
  requestAnimationFrame(masterLoop);
}

AnimRuntime.boot();
</script>
