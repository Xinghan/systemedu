<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M04 · 装 MNE 加载 BCI Competition IV 数据集 · 数据三维立方</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* 第 1 层 — 共享深空底 (所有 26 套统一) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);

    /* 第 2 层 — cs 学科 signature accent */
    --accent: oklch(0.75 0.17 200);

    /* 第 3 层 — cs 5 色 palette (themes.js cs 段) */
    --signal: oklch(0.75 0.17 200);
    --core:   oklch(0.55 0.16 200);
    --depth:  oklch(0.35 0.10 210);
    --flash:  oklch(0.92 0.08 190);
    --query:  oklch(0.85 0.14 85);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    height: 100vh; overflow: hidden;
    background: var(--bg-0); color: var(--fg);
    font-family: 'Inter', 'Noto Sans SC', 'PingFang SC', sans-serif;
    font-size: 14px; line-height: 1.5;
    display: flex;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ============ Sidebar 200px ============ */
  .sidebar {
    width: 200px; flex-shrink: 0; height: 100vh;
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 20px 16px 16px;
  }
  .brand-row { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
    box-shadow: 3px 3px 0 var(--bg-0); }
  .brand-name { font-weight: 700; font-size: 14px; letter-spacing: .5px; }
  .brand-code { font-size: 10px; color: var(--fg-mute); letter-spacing: 1.5px; margin: 2px 0 16px 19px; }

  /* mascot Bit */
  .mascot-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 16px; }
  .mascot-name { font-size: 10px; color: var(--fg-mute); letter-spacing: 1px; }

  .title-cn { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 5px; }
  .title-en { font-size: 10px; color: var(--fg-mute); letter-spacing: .5px; margin-bottom: 16px; }

  .guide-title { font-size: 10px; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
  .guide-list { list-style: none; padding: 0; margin: 0 0 auto; }
  .guide-list li { font-size: 11.5px; color: var(--fg-dim); line-height: 1.5; margin-bottom: 9px;
    padding-left: 12px; position: relative; }
  .guide-list li::before { content: ''; position: absolute; left: 0; top: 7px;
    width: 5px; height: 5px; background: var(--core); }

  .lang-btn {
    margin-top: 16px; align-self: flex-start;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; color: var(--fg); background: var(--bg-2);
    border: 1px solid var(--line-strong); padding: 6px 14px; cursor: pointer;
    box-shadow: 3px 3px 0 var(--bg-0);
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ============ Stage ============ */
  .stage { flex: 1; position: relative; height: 100vh; overflow: hidden; }
  #c { display: block; width: 100%; height: 100%; }

  .hud {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 10px; z-index: 5;
  }
  .hud-card {
    background: var(--bg-1); border: 1px solid var(--line);
    padding: 7px 12px; min-width: 78px; box-shadow: 3px 3px 0 var(--bg-0);
  }
  .hud-label { font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 1px; color: var(--fg-mute); margin-bottom: 3px; }
  .hud-value { font-family: 'JetBrains Mono', monospace; font-size: 15px;
    font-weight: 700; color: var(--accent); }
  .hud-value.gold { color: var(--gold); }

  .stage-name {
    position: absolute; top: 16px; left: 20px; z-index: 5;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 1.5px; color: var(--fg-dim);
  }
  .stage-name b { color: var(--accent); }

  .subcue {
    position: absolute; left: 0; right: 0; bottom: 22px; z-index: 5;
    text-align: center; padding: 0 40px; pointer-events: none;
  }
  .subcue-cn { font-size: 15px; font-weight: 600; color: var(--fg);
    text-shadow: 0 2px 8px var(--bg-0); }
  .subcue-en { font-size: 11px; color: var(--fg-mute); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .3px; }
</style>
</head>
<body>
  <!-- ============ Sidebar ============ -->
  <aside class="sidebar">
    <div class="brand-row">
      <span class="brand-dot"></span>
      <span class="brand-name">SystemEdu</span>
    </div>
    <div class="brand-code">CS-01 · DATA CUBE</div>

    <div class="mascot-wrap">
      <!-- mascot Bit — levitating cubic sprite (cs 5 色) -->
      <svg width="74" height="74" viewBox="0 0 74 74" aria-label="Bit">
        <g>
          <!-- top face -->
          <polygon points="37,8 60,20 37,32 14,20" fill="var(--flash)" opacity="0.9"/>
          <!-- left face -->
          <polygon points="14,20 37,32 37,58 14,46" fill="var(--core)"/>
          <!-- right face -->
          <polygon points="60,20 37,32 37,58 60,46" fill="var(--depth)"/>
          <!-- edges -->
          <polygon points="37,8 60,20 37,32 14,20" fill="none" stroke="var(--signal)" stroke-width="1.4"/>
          <line x1="14" y1="20" x2="14" y2="46" stroke="var(--signal)" stroke-width="1.4"/>
          <line x1="60" y1="20" x2="60" y2="46" stroke="var(--signal)" stroke-width="1.4"/>
          <line x1="37" y1="32" x2="37" y2="58" stroke="var(--signal)" stroke-width="1.4"/>
          <line x1="14" y1="46" x2="37" y2="58" stroke="var(--signal)" stroke-width="1.4"/>
          <line x1="60" y1="46" x2="37" y2="58" stroke="var(--signal)" stroke-width="1.4"/>
          <!-- pixel eyes -->
          <rect x="24" y="36" width="4" height="4" fill="var(--flash)"/>
          <rect x="46" y="36" width="4" height="4" fill="var(--query)"/>
        </g>
      </svg>
      <span class="mascot-name mono">BIT</span>
    </div>

    <div class="title-cn" id="titleCn">一份 EEG 数据的形状</div>
    <div class="title-en mono" id="titleEn">shape of one EEG dataset</div>

    <div class="guide-title mono" id="guideTitle">观看指南</div>
    <ul class="guide-list" id="guideList"></ul>

    <button class="lang-btn mono" id="langBtn">EN</button>
  </aside>

  <!-- ============ Stage ============ -->
  <main class="stage">
    <div class="stage-name mono"><b id="stageTag">LOAD</b> <span id="stageName">读入数据</span></div>

    <div class="hud">
      <div class="hud-card">
        <div class="hud-label" id="hudL1">TRIALS</div>
        <div class="hud-value" id="hudV1">288</div>
      </div>
      <div class="hud-card">
        <div class="hud-label" id="hudL2">CHANNELS</div>
        <div class="hud-value" id="hudV2">22</div>
      </div>
      <div class="hud-card">
        <div class="hud-label" id="hudL3">SAMPLES</div>
        <div class="hud-value" id="hudV3">1000</div>
      </div>
    </div>

    <canvas id="c"></canvas>

    <div class="subcue">
      <div class="subcue-cn" id="cueCn"></div>
      <div class="subcue-en mono" id="cueEn"></div>
    </div>
  </main>

<script>
'use strict';
(function () {
  // ---- i18n ----
  var LANG = 'cn';
  var I18N = {
    titleCn: { cn: '一份 EEG 数据的形状', en: 'Shape of one EEG dataset' },
    titleEn: { cn: 'shape of one EEG dataset', en: 'trials x channels x samples' },
    guideTitle: { cn: '观看指南', en: 'GUIDE' },
    guide: {
      cn: ['同一个立方体一直在转', '沿三条轴依次被剥开', '数 = 想象次 x 电极 x 时间点'],
      en: ['One cube keeps rotating', 'Peeled along three axes', 'data = trials x chans x samples']
    },
    stages: {
      load:  { cn: '读入数据', en: 'LOAD' },
      trial: { cn: '第一维 · 想象次数', en: 'AXIS-1 TRIALS' },
      chan:  { cn: '第二维 · 电极通道', en: 'AXIS-2 CHANNELS' },
      samp:  { cn: '第三维 · 时间采样', en: 'AXIS-3 SAMPLES' },
      shape: { cn: '完整三维形状', en: 'FULL SHAPE' }
    },
    cues: {
      load:  { cn: 'mne 把 BCI Competition IV 读成一个三维数字立方体', en: 'mne loads BCI Competition IV into one 3D number cube' },
      trial: { cn: '深度方向 = 288 次运动想象，每片是一次 trial', en: 'depth axis = 288 motor-imagery trials, one slab each' },
      chan:  { cn: '竖直方向 = 22 个电极通道，每行一条脑电波', en: 'vertical axis = 22 EEG electrode channels, one wave each' },
      samp:  { cn: '水平方向 = 每段 1000 个时间采样点', en: 'horizontal axis = 1000 time-sample points per segment' },
      shape: { cn: 'data.shape = (288, 22, 1000) 一个三维数组', en: 'data.shape = (288, 22, 1000) one 3D array' }
    },
    hud: {
      l1: { cn: 'TRIALS', en: 'TRIALS' },
      l2: { cn: 'CHANNELS', en: 'CHANNELS' },
      l3: { cn: 'SAMPLES', en: 'SAMPLES' }
    }
  };

  // ---- palette resolved from CSS vars ----
  function cssv(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
  var COL = {};
  function resolveColors() {
    COL = {
      bg0:    cssv('--bg-0'), bg1: cssv('--bg-1'), bg2: cssv('--bg-2'),
      line:   cssv('--line'), lineS: cssv('--line-strong'),
      fg:     cssv('--fg'), fgDim: cssv('--fg-dim'), fgMute: cssv('--fg-mute'),
      gold:   cssv('--gold'),
      accent: cssv('--accent'),
      signal: cssv('--signal'), core: cssv('--core'), depth: cssv('--depth'),
      flash:  cssv('--flash'), query: cssv('--query')
    };
  }

  // ---- canvas ----
  var cv = document.getElementById('c');
  var ctx = cv.getContext('2d');
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 800, H = 500;
  function resize() {
    var r = cv.parentElement.getBoundingClientRect();
    if (r.width < 1 || r.height < 1) return;
    W = r.width; H = r.height;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ---- math ----
  function lerp(a, b, p) { return a + (b - a) * p; }
  function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
  function ease(x) { return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2; }
  // smooth band: ramp up over [a,b], hold to [c], ramp down to [d]
  function band(t, a, b, c, d) {
    if (t < a || t > d) return 0;
    if (t < b) return ease((t - a) / (b - a));
    if (t < c) return 1;
    return 1 - ease((t - c) / (d - c));
  }

  // ---- isometric projection ----
  // 3D -> 2D, with a slowly-rotating yaw so the SAME cube spins continuously.
  var CX, CY;
  function project(x, y, z, yaw) {
    // rotate around vertical (y) axis by yaw
    var cosY = Math.cos(yaw), sinY = Math.sin(yaw);
    var rx = x * cosY - z * sinY;
    var rz = x * sinY + z * cosY;
    // isometric tilt
    var tilt = 0.52;
    var sx = (rx) * 0.92;
    var sy = (-y) * 0.92 + rz * tilt;
    return { x: CX + sx, y: CY + sy, z: rz };
  }

  function poly(pts, fill, stroke, lw, alpha) {
    if (alpha !== undefined) ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
    ctx.globalAlpha = 1;
  }

  // draw a box given center offset & half-extents, in cube-local coords
  function boxFaces(cx, cy, cz, hx, hy, hz, yaw) {
    function P(sx, sy, sz) { return project(cx + sx*hx, cy + sy*hy, cz + sz*hz, yaw); }
    return {
      // 8 corners
      ftl: P(-1, 1, 1), ftr: P(1, 1, 1), fbl: P(-1,-1, 1), fbr: P(1,-1, 1),
      btl: P(-1, 1,-1), btr: P(1, 1,-1), bbl: P(-1,-1,-1), bbr: P(1,-1,-1)
    };
  }

  // ---- mascot Bit hint in corner of stage (5-color) ----
  function drawBitHint(t) {
    var bx = CX + Math.min(W, 700)*0.0 + (W*0.5 - 150);
    // small floating cube near top to echo mascot
    var px = W - 0; // not used; keep mascot mainly in sidebar
  }

  // ---- EEG squiggle helper ----
  function eegPath(x0, y0, x1, amp, seed, t, alpha, color) {
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    var n = 48;
    for (var i = 0; i <= n; i++) {
      var p = i / n;
      var x = lerp(x0, x1, p);
      var ph = p * 22 + seed * 1.7 + t * 2.2;
      var v = Math.sin(ph) * 0.6 + Math.sin(ph * 2.3 + seed) * 0.3 + Math.sin(ph * 0.5) * 0.2;
      var y = y0 + v * amp;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ---- main render ----
  // The whole animation = ONE cube continuously rotating; each phase peels one axis.
  var CYCLE = 30.0; // seconds, full loop
  function render(now) {
    resolveColors();
    var tt = (now / 1000) % CYCLE;
    var phase = tt / CYCLE;

    ctx.clearRect(0, 0, W, H);
    // subtle deep-space radial glow
    var rg = ctx.createRadialGradient(W*0.5, H*0.42, 0, W*0.5, H*0.42, Math.max(W,H)*0.6);
    rg.addColorStop(0, 'oklch(0.20 0.05 265 / 0.55)');
    rg.addColorStop(1, 'oklch(0.13 0.03 265 / 0)');
    ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);

    CX = W * 0.50;
    CY = H * 0.46;

    // continuous slow yaw — the cube never stops turning
    var yaw = -0.62 + Math.sin(now / 1000 * 0.30) * 0.40;

    // cube half-extents (cube-local units)
    var HX = 150, HY = 105, HZ = 120;

    // phase activation weights (continuous overlaps -> smooth evolution)
    var wLoad  = band(phase, 0.00, 0.06, 0.14, 0.20);
    var wTrial = band(phase, 0.16, 0.24, 0.36, 0.42);
    var wChan  = band(phase, 0.40, 0.48, 0.60, 0.66);
    var wSamp  = band(phase, 0.64, 0.72, 0.84, 0.88);
    var wShape = band(phase, 0.86, 0.92, 1.00, 1.00);
    // baseline cube presence always > 0 so the object is always on screen
    var assembled = clamp(1 - (wTrial*0.85 + wChan*0.55 + wSamp*0.45), 0.18, 1);

    var c = boxFaces(0, 0, 0, HX, HY, HZ, yaw);

    // ---------- 1) base cube (always present, the single core object) ----------
    // back faces dim
    poly([c.bbl, c.bbr, c.btr, c.btl], COL.depth, COL.line, 1, 0.35 * assembled + 0.15);
    // left face (depth tone)
    poly([c.ftl, c.fbl, c.bbl, c.btl], COL.depth, COL.lineS, 1, 0.55);
    // bottom
    poly([c.fbl, c.fbr, c.bbr, c.bbl], COL.bg2, COL.line, 1, 0.5);
    // right face (core tone)
    poly([c.ftr, c.fbr, c.bbr, c.btr], COL.core, COL.lineS, 1, 0.6);
    // top face (flash-tinted, faint)
    poly([c.ftl, c.ftr, c.btr, c.btl], 'oklch(0.30 0.07 200)', COL.signal, 1, 0.5);
    // front face — canvas for EEG content
    poly([c.ftl, c.ftr, c.fbr, c.fbl], COL.bg1, COL.signal, 1.6, 0.92);

    // front-face geometry (for drawing samples grid)
    var fL = c.fbl, fR = c.fbr, fTL = c.ftl, fTR = c.ftr;
    var faceLeftX = c.fbl.x, faceRightX = c.fbr.x;
    var faceTopY  = (c.ftl.y + c.ftr.y) / 2;
    var faceBotY  = (c.fbl.y + c.fbr.y) / 2;

    // ---------- 2) AXIS-1 TRIALS: depth fans out into stacked slabs ----------
    if (wTrial > 0.01) {
      var nSlab = 7;
      ctx.globalAlpha = wTrial;
      for (var s = 0; s < nSlab; s++) {
        var spread = (s) * 26 * wTrial; // push slabs back along depth, separated
        var zc = -spread * 0.0; // we shift along projected depth by drawing offset cubes
        // draw a thin front-face copy translated along +depth direction
        var sc = boxFaces(0, 0, -s * 0.34 - spread*0.0, HX, HY, HZ, yaw);
        // approximate separation: translate in screen via projecting at increasing z offset
        var off = boxFaces(0, 0, 0, HX, HY, HZ, yaw);
        var dir = { x: (c.btl.x - c.ftl.x), y: (c.btl.y - c.ftl.y) };
        var k = (s) / (nSlab - 1);
        var sep = k * 70 * wTrial;
        var ox = dir.x !== 0 ? (dir.x / Math.hypot(dir.x, dir.y)) * sep : 0;
        var oy = (dir.y / (Math.hypot(dir.x, dir.y) || 1)) * sep;
        var col = s === 0 ? COL.signal : COL.core;
        ctx.save();
        ctx.translate(ox, oy);
        poly([c.ftl, c.ftr, c.fbr, c.fbl], 'oklch(0.20 0.05 200 / 0.9)', col, 1.2, 0.7 * wTrial);
        ctx.restore();
      }
      // label
      ctx.globalAlpha = wTrial;
      ctx.fillStyle = COL.signal;
      ctx.font = "700 13px 'JetBrains Mono', monospace";
      ctx.textAlign = 'left';
      var lblP = { x: c.btl.x + 18, y: c.btl.y - 14 };
      ctx.fillText('288 trials', lblP.x, lblP.y);
      ctx.globalAlpha = 1;
    }

    // ---------- 3) AXIS-2 CHANNELS: vertical split into electrode rows ----------
    if (wChan > 0.01) {
      var nCh = 8; // representative of 22
      ctx.save();
      // clip-ish: draw EEG waves on front face rows
      for (var r = 0; r < nCh; r++) {
        var ry = lerp(faceTopY + 10, faceBotY - 10, (r + 0.5) / nCh);
        var amp = 7 * wChan;
        var col2 = (r % 2 === 0) ? COL.signal : COL.flash;
        eegPath(faceLeftX + 14, ry, faceRightX - 10, amp, r, now / 1000, 0.85 * wChan, col2);
        // row divider
        ctx.globalAlpha = 0.25 * wChan;
        ctx.strokeStyle = COL.line; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(faceLeftX + 6, ry + amp + 3);
        ctx.lineTo(faceRightX - 6, ry + amp + 3);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      // bracket + label on the left edge
      ctx.globalAlpha = wChan;
      ctx.strokeStyle = COL.flash; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(c.ftl.x - 16, c.ftl.y);
      ctx.lineTo(c.ftl.x - 24, c.ftl.y);
      ctx.lineTo(c.fbl.x - 24, c.fbl.y);
      ctx.lineTo(c.fbl.x - 16, c.fbl.y);
      ctx.stroke();
      ctx.fillStyle = COL.flash;
      ctx.font = "700 13px 'JetBrains Mono', monospace";
      ctx.textAlign = 'right';
      ctx.fillText('22 ch', c.ftl.x - 30, (c.ftl.y + c.fbl.y) / 2);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ---------- 4) AXIS-3 SAMPLES: horizontal time ruler with running ticks ----------
    if (wSamp > 0.01) {
      var nTick = 20;
      ctx.globalAlpha = wSamp;
      // ruler along bottom edge of front face
      var by = faceBotY + 22;
      ctx.strokeStyle = COL.query; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(faceLeftX, by); ctx.lineTo(faceRightX, by); ctx.stroke();
      var runner = (now / 1000 * 3) % nTick;
      for (var i = 0; i <= nTick; i++) {
        var tx = lerp(faceLeftX, faceRightX, i / nTick);
        var big = (i % 5 === 0);
        var lit = Math.abs(i - runner) < 1.2;
        ctx.strokeStyle = lit ? COL.gold : COL.query;
        ctx.lineWidth = lit ? 2.2 : 1;
        ctx.globalAlpha = wSamp * (lit ? 1 : 0.7);
        ctx.beginPath();
        ctx.moveTo(tx, by);
        ctx.lineTo(tx, by + (big ? 9 : 5) + (lit ? 4 : 0));
        ctx.stroke();
      }
      ctx.globalAlpha = wSamp;
      ctx.fillStyle = COL.query;
      ctx.font = "700 13px 'JetBrains Mono', monospace";
      ctx.textAlign = 'center';
      ctx.fillText('1000 samples  (4s @ 250Hz)', (faceLeftX + faceRightX) / 2, by + 28);
      ctx.globalAlpha = 1;
    }

    // ---------- 5) FULL SHAPE: assembled cube + shape label ----------
    if (wShape > 0.01) {
      ctx.globalAlpha = wShape;
      // glowing edges (gold key moment)
      ctx.strokeStyle = COL.gold; ctx.lineWidth = 2.2;
      ctx.shadowColor = COL.gold; ctx.shadowBlur = 14;
      poly([c.ftl, c.ftr, c.fbr, c.fbl], null, COL.gold, 2.2, wShape);
      ctx.shadowBlur = 0;
      // shape readout
      ctx.fillStyle = COL.gold;
      ctx.font = "700 22px 'JetBrains Mono', monospace";
      ctx.textAlign = 'center';
      ctx.fillText('(288, 22, 1000)', CX, CY + HY + 70);
      ctx.fillStyle = COL.fgDim;
      ctx.font = "400 12px 'JetBrains Mono', monospace";
      ctx.fillText('data.shape', CX, CY + HY + 92);
      ctx.globalAlpha = 1;
    } else if (wLoad > 0.01) {
      // load phase: a small code chip dropping into the cube
      ctx.globalAlpha = wLoad;
      ctx.fillStyle = COL.signal;
      ctx.font = "500 13px 'JetBrains Mono', monospace";
      ctx.textAlign = 'center';
      ctx.fillText('mne.io.read_raw_gdf("A01T.gdf")', CX, CY - HY - 36);
      ctx.globalAlpha = 1;
    }

    // ---------- always-on axis legend (so picture stands alone) ----------
    ctx.globalAlpha = 0.9;
    ctx.font = "600 11px 'JetBrains Mono', monospace";
    ctx.textAlign = 'left';
    // depth axis tag (trials)
    ctx.fillStyle = wTrial > 0.2 ? COL.signal : COL.fgMute;
    ctx.fillText('. trials (depth)', 18, H - 70);
    ctx.fillStyle = wChan > 0.2 ? COL.flash : COL.fgMute;
    ctx.fillText('. channels (rows)', 18, H - 52);
    ctx.fillStyle = wSamp > 0.2 ? COL.query : COL.fgMute;
    ctx.fillText('. samples (time)', 18, H - 34);
    ctx.globalAlpha = 1;

    // ---------- HUD + stage + subcue sync ----------
    updateOverlay(phase, wLoad, wTrial, wChan, wSamp, wShape);

    requestAnimationFrame(render);
  }

  // ---- overlay (HUD / stage tag / subcue) ----
  var lastStage = '';
  function pick(phase) {
    if (phase < 0.16) return 'load';
    if (phase < 0.40) return 'trial';
    if (phase < 0.64) return 'chan';
    if (phase < 0.86) return 'samp';
    return 'shape';
  }
  function updateOverlay(phase) {
    var st = pick(phase);
    if (st === lastStage) return;
    lastStage = st;
    var tagMap = { load:'LOAD', trial:'AX-1', chan:'AX-2', samp:'AX-3', shape:'SHAPE' };
    document.getElementById('stageTag').textContent = tagMap[st];
    document.getElementById('stageName').textContent = I18N.stages[st][LANG];
    document.getElementById('cueCn').textContent = I18N.cues[st][LANG];
    document.getElementById('cueEn').textContent = I18N.cues[st].en;
    // gold-highlight the active HUD axis
    var v1 = document.getElementById('hudV1'), v2 = document.getElementById('hudV2'), v3 = document.getElementById('hudV3');
    v1.classList.toggle('gold', st === 'trial' || st === 'shape');
    v2.classList.toggle('gold', st === 'chan' || st === 'shape');
    v3.classList.toggle('gold', st === 'samp' || st === 'shape');
  }

  // ---- i18n apply ----
  function refreshI18N() {
    document.getElementById('titleCn').textContent = I18N.titleCn[LANG];
    document.getElementById('titleEn').textContent = I18N.titleEn[LANG];
    document.getElementById('guideTitle').textContent = I18N.guideTitle[LANG];
    var ul = document.getElementById('guideList');
    ul.innerHTML = '';
    I18N.guide[LANG].forEach(function (g) {
      var li = document.createElement('li'); li.textContent = g; ul.appendChild(li);
    });
    document.getElementById('hudL1').textContent = I18N.hud.l1[LANG];
    document.getElementById('hudL2').textContent = I18N.hud.l2[LANG];
    document.getElementById('hudL3').textContent = I18N.hud.l3[LANG];
    document.getElementById('langBtn').textContent = LANG === 'cn' ? 'EN' : 'CN';
    // force subcue refresh on next stage check
    lastStage = '';
  }
  document.getElementById('langBtn').addEventListener('click', function () {
    LANG = (LANG === 'cn') ? 'en' : 'cn';
    refreshI18N();
  });

  // ---- boot ----
  resolveColors();
  resize();
  refreshI18N();
  setTimeout(resize, 200);
  setTimeout(resize, 600);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(resize);
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
