<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>假脑波长什么样 - 认出伪迹形态</title>
<style>
  :root{
    /* 第 1 层 — 共享深空底 (所有 26 套统一) */
    --bg-0: oklch(0.14 0.035 265);
    --bg-1: oklch(0.18 0.04 265);
    --bg-2: oklch(0.22 0.045 265);
    --bg-3: oklch(0.28 0.05 265);
    --line: oklch(0.35 0.05 265 / 0.35);
    --line-strong: oklch(0.55 0.08 265 / 0.55);
    --fg:      oklch(0.96 0.01 265);
    --fg-dim:  oklch(0.75 0.02 265);
    --fg-mute: oklch(0.55 0.03 265);
    --gold:    oklch(0.85 0.14 85);

    /* 第 2 层 — neuro 学科 accent (cortex-coral) */
    --accent: oklch(0.75 0.17 25);

    /* 第 3 层 — neuro 5 色 palette (Cortex Map) */
    --synaptic: oklch(0.75 0.17 25);
    --dendrite: oklch(0.55 0.15 25);
    --axon:     oklch(0.32 0.10 25);
    --firing:   oklch(0.92 0.08 25);
    --memory:   oklch(0.85 0.14 85);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    height:100vh;overflow:hidden;background:var(--bg-0);color:var(--fg);
    font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
    display:flex;
  }
  .sidebar{
    width:200px;flex-shrink:0;height:100vh;
    background:var(--bg-1);border-right:1px solid var(--line);
    padding:18px 16px;display:flex;flex-direction:column;gap:14px;
  }
  .brand{font-size:11px;letter-spacing:0.14em;color:var(--fg-mute);
         font-family:'JetBrains Mono',monospace;}
  .brand b{color:var(--accent);}
  .title{font-size:16px;font-weight:700;color:var(--fg);line-height:1.35;}
  .subtitle{font-size:11px;color:var(--fg-dim);line-height:1.5;font-style:italic;}
  .mascot-wrap{display:flex;justify-content:center;padding:6px 0;}
  .guide{display:flex;flex-direction:column;gap:8px;}
  .guide-li{
    font-size:11px;color:var(--fg-dim);line-height:1.5;
    padding:6px 8px;border-left:2px solid var(--accent);
    background:var(--bg-2);
  }
  .lang-btn{
    margin-top:auto;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    padding:8px 12px;background:var(--bg-2);color:var(--fg);
    border:1px solid var(--line-strong);cursor:pointer;
    box-shadow:3px 3px 0 var(--bg-0);
  }
  .lang-btn:active{transform:translate(2px,2px);box-shadow:none;}

  main{flex:1;height:100vh;position:relative;overflow:hidden;}
  canvas#stage{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hud{
    position:absolute;top:14px;right:14px;
    background:oklch(0.18 0.04 265 / 0.78);backdrop-filter:blur(6px);
    border:1px solid var(--line-strong);box-shadow:3px 3px 0 var(--bg-0);
    padding:10px 14px;font-family:'JetBrains Mono',monospace;
    font-size:11px;min-width:190px;
  }
  .hud-ttl{font-size:10px;letter-spacing:0.12em;color:var(--accent);
           font-weight:700;margin-bottom:4px;}
  .hud-frame{font-size:18px;font-weight:700;color:var(--fg);}
  .hud-stage{color:var(--fg-dim);margin-top:3px;font-size:11px;}
  .hud-val{color:var(--gold);margin-top:5px;font-size:11px;}

  .subtitles{
    position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    text-align:center;max-width:80%;
    pointer-events:none;
  }
  .sub-zh{font-size:18px;font-weight:700;color:var(--fg);line-height:1.4;}
  .sub-en{font-size:12px;font-style:italic;color:var(--fg-mute);margin-top:4px;}
  .sub-zh.gold{color:var(--gold);}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><b>NRO-20</b> / CORTEX MAP</div>
    <div class="title" id="ttl">假脑波长什么样</div>
    <div class="subtitle" id="subtitle">那些特别大的跳动, 真是大脑活动吗?</div>

    <div class="mascot-wrap">
      <svg width="80" height="86" viewBox="0 0 80 86" aria-label="Spark mascot">
        <defs>
          <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"  stop-color="oklch(0.92 0.08 25)" stop-opacity="0.95"/>
            <stop offset="55%" stop-color="oklch(0.75 0.17 25)" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="oklch(0.55 0.15 25)" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="40" cy="42" rx="24" ry="27" fill="url(#sparkGlow)"
                 stroke="oklch(0.75 0.17 25)" stroke-width="1.4" opacity="0.85"/>
        <path d="M40 56 L40 40 M40 40 L30 30 M30 30 L24 24 M30 30 L34 22
                 M40 40 L50 30 M50 30 L56 24 M50 30 L46 22 M40 40 L40 26"
              fill="none" stroke="oklch(0.75 0.17 25)" stroke-width="2"
              stroke-linecap="round"/>
        <circle cx="24" cy="24" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0s" repeatCount="indefinite"/>
        </circle>
        <circle cx="34" cy="22" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="26" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="1.0s" repeatCount="indefinite"/>
        </circle>
        <circle cx="46" cy="22" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="56" cy="24" r="2.4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="42" r="4" fill="oklch(0.92 0.08 25)">
          <animate attributeName="r" values="3.2;5;3.2" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <text x="40" y="80" text-anchor="middle" font-family="JetBrains Mono,monospace"
              font-size="8" fill="oklch(0.55 0.03 265)" letter-spacing="1">SPARK</text>
      </svg>
    </div>

    <div class="guide">
      <div class="guide-li" id="g1">真脑波只有 ±20 微伏 平缓节律</div>
      <div class="guide-li" id="g2">眨眼/咬牙/电源 形态各不同</div>
      <div class="guide-li" id="g3">认出伪迹 是清洁数据第一步</div>
    </div>

    <button id="langBtn" class="lang-btn">CN / EN</button>
  </aside>

  <main>
    <canvas id="stage"></canvas>
    <div class="hud">
      <div class="hud-ttl" id="hudTtl">画面</div>
      <div class="hud-frame" id="hudFrame">1 / 5</div>
      <div class="hud-stage" id="hudStage">可疑大尖峰</div>
      <div class="hud-val" id="hudVal">峰值 ~200 uV</div>
    </div>
    <div class="subtitles">
      <div class="sub-zh" id="subZh">脑波里冒出几个特别大的跳动, 比正常波大 10 倍.</div>
      <div class="sub-en" id="subEn">A few huge jumps appear, 10x bigger than normal waves.</div>
    </div>
  </main>

<script>
(function(){
  "use strict";

  var LANG = 'cn';
  var I18N = {
    ttl: {cn:'假脑波长什么样', en:'What Fake Brainwaves Look Like'},
    subtitle: {cn:'那些特别大的跳动, 真是大脑活动吗?',
               en:'Those huge jumps -- are they really brain activity?'},
    g1: {cn:'真脑波只有 ±20 微伏 平缓节律', en:'Real EEG: ~±20 uV, smooth rhythm'},
    g2: {cn:'眨眼/咬牙/电源 形态各不同',     en:'Blink / jaw / mains -- distinct shapes'},
    g3: {cn:'认出伪迹 是清洁数据第一步',     en:'Spotting artifacts = step 1 to clean data'},
    hudTtl: {cn:'画面', en:'FRAME'},
    stages: {
      cn:['可疑大尖峰','眨眼伪迹','咬牙肌电','工频干扰','真脑波 vs 伪迹'],
      en:['SUSPICIOUS SPIKES','BLINK ARTIFACT','JAW MUSCLE (EMG)','MAINS 50Hz','REAL vs ARTIFACT']
    },
    hudVals: {
      cn:['峰值 ~200 uV','Fp1/Fp2 单峰','颞侧 20-100 Hz','50 Hz 正弦','形态辨认完成'],
      en:['peak ~200 uV','Fp1/Fp2 single hump','temporal 20-100Hz','50 Hz sine','shapes identified']
    },
    subs: {
      cn:[
        '脑波里冒出几个特别大的跳动, 比正常波大 10 倍.',
        '眨一下眼: 前额 Fp1/Fp2 出现一个慢慢的大鼓包, 100-300 微伏.',
        '咬一下牙: 颞侧冒出一团又密又快的毛刺, 那是肌肉在放电.',
        '插上电源: 一条规规矩矩的 50 赫兹正弦, 悄悄混进了整条数据.',
        '认出伪迹形态, 是清洁数据的第一步.'
      ],
      en:[
        'A few huge jumps appear, 10x bigger than normal waves.',
        'Blink once: a slow big hump shows at front Fp1/Fp2, 100-300 uV.',
        'Clench jaw: dense fast bristles burst near the temples -- muscles firing.',
        'Plug in power: a tidy 50 Hz sine quietly rides over the whole signal.',
        'Recognizing artifact shapes is the first step to clean data.'
      ]
    }
  };
  function t(k){return (I18N[k]&&I18N[k][LANG])||(I18N[k]&&I18N[k].en)||k;}

  // ---- 确定式伪随机 (保证每次渲染一致) ----
  function rnd(i){
    var s = Math.sin(i*12.9898 + 78.233) * 43758.5453;
    return (s - Math.floor(s)) * 2 - 1;   // [-1,1]
  }

  // ---- 真脑波合成 (alpha 主导, ±~18uV) ----
  var FS = 250;
  var SECONDS = 2.0;
  var N = Math.round(FS * SECONDS);
  var REAL = [];
  (function buildReal(){
    for (var i = 0; i < N; i++){
      var tt = i / FS;
      var v = 0;
      v += 14 * Math.sin(2*Math.PI*10*tt);        // 10 Hz alpha 主节律
      v +=  5 * Math.sin(2*Math.PI*22*tt + 0.7);  // beta
      v +=  4 * Math.sin(2*Math.PI*5*tt + 1.3);   // theta
      v +=  2 * rnd(i);                            // 微噪声
      REAL.push(v);
    }
  })();

  // 眨眼伪迹: 单个平滑大鼓包 (高斯样), 中心约 0.45s, 宽 ~300ms, 峰 ~220uV
  function blinkArtifact(tt){
    var c = 0.45, w = 0.13;
    var g = Math.exp(-Math.pow((tt - c)/w, 2));
    return 220 * g;
  }
  // 咬牙肌电: 在一段时间窗内的高频 (20-100Hz) 密集爆发
  function emgArtifact(tt){
    if (tt < 0.7 || tt > 1.3) return 0;
    var env = Math.sin(Math.PI * (tt - 0.7) / 0.6);   // 包络 0..1..0
    var hf = 0;
    hf += Math.sin(2*Math.PI*35*tt);
    hf += 0.8*Math.sin(2*Math.PI*60*tt + 1.1);
    hf += 0.7*Math.sin(2*Math.PI*88*tt + 2.3);
    hf += 0.6*Math.sin(2*Math.PI*45*tt + 0.4);
    return 70 * env * hf;
  }
  // 工频干扰: 全程 50Hz 规则正弦, 幅度 ~30uV
  function mainsArtifact(tt){
    return 30 * Math.sin(2*Math.PI*50*tt);
  }

  // F1 用波形: 真脑波 + 两个眨眼大尖峰 (制造"可疑")
  var SUSPECT = [];
  (function buildSuspect(){
    for (var i = 0; i < N; i++){
      var tt = i / FS;
      var spike = 0;
      spike += 200 * Math.exp(-Math.pow((tt - 0.55)/0.10, 2));
      spike += 180 * Math.exp(-Math.pow((tt - 1.40)/0.11, 2));
      SUSPECT.push(REAL[i] + spike);
    }
  })();

  var canvas = document.getElementById('stage');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize(){
    var host = canvas.parentElement;
    var r = host.getBoundingClientRect();
    if (r.width < 2 || r.height < 2) return;
    W = r.width; H = r.height;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  setTimeout(resize, 60);
  setTimeout(resize, 400);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(resize);

  var CSSV = function(v){
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  };

  // ---- 时间轴 ----
  var FRAME_DUR = 6500;
  var TOTAL_FRAMES = 5;
  var CYCLE = FRAME_DUR * TOTAL_FRAMES;
  var startT = null;
  var lastFrameShown = -1;

  function frameProgress(now){
    if (startT === null) startT = now;
    var el = (now - startT) % CYCLE;
    var idx = Math.floor(el / FRAME_DUR);
    var u   = (el - idx * FRAME_DUR) / FRAME_DUR;
    return {idx: idx, u: u, t: now};
  }

  function easeIO(u){return u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;}
  function lerp(a,b,u){return a+(b-a)*u;}

  // 主波形画框
  function plotBox(){
    var x0 = W*0.13, x1 = W*0.92;
    var yMid = H*0.50;
    var amp = Math.min(H*0.18, 130);
    return {x0:x0, x1:x1, yMid:yMid, amp:amp, scaleY: amp/30}; // 30uV -> amp px (尖峰会超框)
  }

  function drawAxes(box, label){
    ctx.strokeStyle = CSSV('--line-strong');
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(box.x0, box.yMid); ctx.lineTo(box.x1, box.yMid); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(box.x0, box.yMid - box.amp - 60); ctx.lineTo(box.x0, box.yMid + box.amp + 60); ctx.stroke();
    ctx.fillStyle = CSSV('--fg-mute');
    ctx.font = "600 11px 'JetBrains Mono',monospace";
    ctx.textAlign = 'left';
    ctx.fillText(LANG==='cn'?'电压 uV':'uV', box.x0 - 4, box.yMid - box.amp - 68);
    ctx.textAlign = 'right';
    ctx.fillText(label || (LANG==='cn'?'时间 ->':'time ->'), box.x1, box.yMid + box.amp + 78);
    ctx.fillText('0', box.x0 - 8, box.yMid + 4);
    // ±20uV 参考虚线 (真脑波量级)
    ctx.strokeStyle = CSSV('--line');
    ctx.setLineDash([4,4]); ctx.lineWidth = 1;
    var ref = 20 * box.scaleY;
    ctx.beginPath(); ctx.moveTo(box.x0, box.yMid - ref); ctx.lineTo(box.x1, box.yMid - ref); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(box.x0, box.yMid + ref); ctx.lineTo(box.x1, box.yMid + ref); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = CSSV('--fg-mute');
    ctx.font = "600 9px 'JetBrains Mono',monospace";
    ctx.textAlign = 'right';
    ctx.fillText(LANG==='cn'?'真脑波 ±20':'real ±20', box.x0 - 6, box.yMid - ref + 3);
  }

  // 通用: 画一条波形 (data 数组, 可选 clip 上下界, progress 控制从左展开)
  function drawWave(box, data, color, lw, progress){
    var lastIdx = Math.max(1, Math.floor((progress===undefined?1:progress) * (data.length - 1)));
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (var j = 0; j <= lastIdx; j++){
      var lx = lerp(box.x0, box.x1, j / (data.length - 1));
      var ly = box.yMid - data[j] * box.scaleY;
      // 限幅 (大尖峰超出绘图区时夹住)
      ly = Math.max(box.yMid - box.amp - 55, Math.min(box.yMid + box.amp + 55, ly));
      if (j === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
    }
    ctx.stroke();
  }

  // 头模 (顶视圆, 标出电极位置), 高亮某区域
  function drawHead(cx, cy, R, highlight){
    // 头轮廓
    ctx.strokeStyle = CSSV('--dendrite');
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.stroke();
    // 鼻子 (上方)
    ctx.beginPath();
    ctx.moveTo(cx - 7, cy - R);
    ctx.lineTo(cx, cy - R - 11);
    ctx.lineTo(cx + 7, cy - R);
    ctx.stroke();
    // 电极位置: Fp1/Fp2 (前额, 上方两侧), 颞侧 T3/T4 (左右)
    var elecs = [
      {x: cx - R*0.42, y: cy - R*0.72, name:'Fp1', zone:'front'},
      {x: cx + R*0.42, y: cy - R*0.72, name:'Fp2', zone:'front'},
      {x: cx - R*0.85, y: cy + R*0.05, name:'T3',  zone:'temporal'},
      {x: cx + R*0.85, y: cy + R*0.05, name:'T4',  zone:'temporal'},
      {x: cx,          y: cy + R*0.10, name:'Cz',  zone:'center'},
      {x: cx,          y: cy + R*0.72, name:'Oz',  zone:'back'}
    ];
    for (var e = 0; e < elecs.length; e++){
      var on = highlight && elecs[e].zone === highlight;
      ctx.fillStyle = on ? CSSV('--firing') : CSSV('--axon');
      if (on){
        ctx.strokeStyle = CSSV('--firing');
        ctx.globalAlpha = 0.35;
        ctx.beginPath(); ctx.arc(elecs[e].x, elecs[e].y, 9, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = CSSV('--firing');
      }
      ctx.beginPath(); ctx.arc(elecs[e].x, elecs[e].y, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = on ? CSSV('--firing') : CSSV('--fg-mute');
      ctx.font = "600 9px 'JetBrains Mono',monospace";
      ctx.textAlign = 'center';
      ctx.fillText(elecs[e].name, elecs[e].x, elecs[e].y - 8);
    }
  }

  // ============== 帧 1: 可疑大尖峰 ==============
  function drawFrame1(u, now){
    var box = plotBox();
    drawAxes(box);
    // 波形展开
    var prog = easeIO(Math.min(1, u/0.7));
    drawWave(box, SUSPECT, CSSV('--synaptic'), 2.2, prog);

    // 标注两个尖峰 "可疑"
    var spikes = [{t:0.55, v:200},{t:1.40, v:180}];
    for (var s = 0; s < spikes.length; s++){
      var fx = lerp(box.x0, box.x1, (spikes[s].t/SECONDS));
      if ((spikes[s].t/SECONDS) > prog) continue;
      var fy = box.yMid - box.amp - 30;
      var pulse = 0.5 + 0.5*Math.sin(now/220 + s);
      ctx.strokeStyle = CSSV('--firing');
      ctx.globalAlpha = 0.5 + 0.4*pulse;
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(fx, fy, 16, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = CSSV('--firing');
      ctx.font = "700 12px 'JetBrains Mono',monospace";
      ctx.textAlign = 'center';
      ctx.fillText('?', fx, fy + 4);
      ctx.fillStyle = CSSV('--fg-dim');
      ctx.font = "600 11px 'JetBrains Mono',monospace";
      ctx.fillText('~' + spikes[s].v + ' uV', fx, fy - 22);
    }

    // 提示框: 比真脑波大 10 倍
    if (prog > 0.6){
      ctx.fillStyle = CSSV('--firing');
      ctx.font = "700 18px 'Inter','Noto Sans SC',sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(LANG==='cn'?'这些跳动 比真脑波大 10 倍':'these jumps are 10x bigger than real EEG',
                   W*0.52, box.yMid + box.amp + 50);
      ctx.fillStyle = CSSV('--fg-dim');
      ctx.font = "600 13px 'Inter','Noto Sans SC',sans-serif";
      ctx.fillText(LANG==='cn'?'真的是大脑吗? 还是别的东西混进来了?':'really the brain? or something else got in?',
                   W*0.52, box.yMid + box.amp + 74);
    }
  }

  // ============== 帧 2: 眨眼伪迹 ==============
  function drawFrame2(u, now){
    var box = plotBox();
    drawAxes(box);
    // 头模 (左上小图) 高亮前额
    drawHead(W*0.30, H*0.20, 46, 'front');

    // 眨眼波形: 真脑波 + 眨眼鼓包, 从左展开
    var prog = easeIO(Math.min(1, u/0.7));
    var data = [];
    for (var i = 0; i < N; i++){
      data.push(REAL[i] + blinkArtifact(i/FS));
    }
    drawWave(box, data, CSSV('--synaptic'), 2.2, prog);

    // 鼓包高亮 + 标注
    var bc = 0.45/SECONDS;
    if (prog > bc){
      var bx = lerp(box.x0, box.x1, bc);
      var by = box.yMid - 220*box.scaleY;
      by = Math.max(box.yMid - box.amp - 50, by);
      ctx.fillStyle = CSSV('--firing');
      ctx.globalAlpha = 0.25 + 0.15*Math.sin(now/300);
      ctx.beginPath(); ctx.arc(bx, by, 26, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // 标注线
      ctx.strokeStyle = CSSV('--firing');
      ctx.lineWidth = 1.4;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(bx, by - 26); ctx.lineTo(bx + 90, by - 60); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = CSSV('--firing');
      ctx.font = "700 12px 'JetBrains Mono',monospace";
      ctx.textAlign = 'left';
      ctx.fillText(LANG==='cn'?'单峰大波':'single big hump', bx + 94, by - 64);
      ctx.fillStyle = CSSV('--fg-dim');
      ctx.font = "600 11px 'JetBrains Mono',monospace";
      ctx.fillText('100-300 uV / 200-400 ms', bx + 94, by - 48);
    }

    // 解释: 眼球是个电偶极
    ctx.fillStyle = CSSV('--fg-dim');
    ctx.font = "600 13px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(LANG==='cn'?'眼球转动像一个小电池, 眨眼时前额电极最先感到':'the eyeball is a tiny dipole; front electrodes feel a blink first',
                 W*0.55, box.yMid + box.amp + 54);
  }

  // ============== 帧 3: 咬牙肌电 ==============
  function drawFrame3(u, now){
    var box = plotBox();
    drawAxes(box);
    drawHead(W*0.30, H*0.20, 46, 'temporal');

    var prog = easeIO(Math.min(1, u/0.7));
    var data = [];
    for (var i = 0; i < N; i++){
      data.push(REAL[i] + emgArtifact(i/FS));
    }
    drawWave(box, data, CSSV('--synaptic'), 1.8, prog);

    // 爆发窗高亮 (0.7-1.3s)
    var w0 = 0.7/SECONDS, w1 = 1.3/SECONDS;
    if (prog > w0){
      var hx0 = lerp(box.x0, box.x1, w0);
      var hx1 = lerp(box.x0, box.x1, Math.min(prog, w1));
      ctx.fillStyle = CSSV('--firing');
      ctx.globalAlpha = 0.12;
      ctx.fillRect(hx0, box.yMid - box.amp - 50, hx1 - hx0, box.amp*2 + 100);
      ctx.globalAlpha = 1;
      // 标注
      if (prog > w1){
        ctx.fillStyle = CSSV('--firing');
        ctx.font = "700 12px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center';
        ctx.fillText(LANG==='cn'?'又密又快的毛刺':'dense fast bristles', (hx0+hx1)/2, box.yMid - box.amp - 36);
        ctx.fillStyle = CSSV('--fg-dim');
        ctx.font = "600 11px 'JetBrains Mono',monospace";
        ctx.fillText('20-100 Hz', (hx0+hx1)/2, box.yMid - box.amp - 20);
      }
    }

    ctx.fillStyle = CSSV('--fg-dim');
    ctx.font = "600 13px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(LANG==='cn'?'咬牙时颞肌放电, 是一团高频毛刺, 不是脑波':'jaw muscles fire as high-frequency bristles -- not brain waves',
                 W*0.55, box.yMid + box.amp + 54);
  }

  // ============== 帧 4: 工频干扰 50Hz ==============
  function drawFrame4(u, now){
    var box = plotBox();
    drawAxes(box);

    // 电源插头图标 (左上)
    var px = W*0.24, py = H*0.18;
    ctx.strokeStyle = CSSV('--dendrite');
    ctx.lineWidth = 2;
    ctx.strokeRect(px - 18, py - 12, 36, 24);
    ctx.beginPath();
    ctx.moveTo(px - 8, py - 12); ctx.lineTo(px - 8, py - 22);
    ctx.moveTo(px + 8, py - 12); ctx.lineTo(px + 8, py - 22);
    ctx.stroke();
    // 干扰闪动
    var zap = 0.5 + 0.5*Math.sin(now/120);
    ctx.fillStyle = CSSV('--firing');
    ctx.globalAlpha = 0.4 + 0.4*zap;
    ctx.font = "700 13px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.fillText('~ 50 Hz', px, py + 38);
    ctx.globalAlpha = 1;

    // 工频波形: 真脑波 + 50Hz 正弦
    var prog = easeIO(Math.min(1, u/0.7));
    // 先画真脑波底 (淡), 再叠 50Hz
    var data = [];
    for (var i = 0; i < N; i++){
      data.push(REAL[i] + mainsArtifact(i/FS));
    }
    // 纯 50Hz 参考 (淡 firing)
    var pure = [];
    for (var k = 0; k < N; k++) pure.push(mainsArtifact(k/FS) + 0);
    ctx.globalAlpha = 0.35;
    drawWave(box, pure, CSSV('--axon'), 1.2, prog);
    ctx.globalAlpha = 1;
    drawWave(box, data, CSSV('--synaptic'), 1.8, prog);

    // 标注: 规则正弦
    if (prog > 0.5){
      ctx.fillStyle = CSSV('--firing');
      ctx.font = "700 12px 'JetBrains Mono',monospace";
      ctx.textAlign = 'right';
      ctx.fillText(LANG==='cn'?'规规矩矩的 50 Hz 正弦':'tidy 50 Hz sine', box.x1, box.yMid - box.amp - 24);
      ctx.fillStyle = CSSV('--fg-dim');
      ctx.font = "600 11px 'JetBrains Mono',monospace";
      ctx.fillText(LANG==='cn'?'频率固定 形状重复':'fixed freq, repeating shape', box.x1, box.yMid - box.amp - 8);
    }

    ctx.fillStyle = CSSV('--fg-dim');
    ctx.font = "600 13px 'Inter','Noto Sans SC',sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(LANG==='cn'?'墙上的电源 50 赫兹, 悄悄叠在整条数据上':'wall power at 50 Hz quietly rides over the whole signal',
                 W*0.55, box.yMid + box.amp + 54);
  }

  // ============== 帧 5: 真脑波 vs 伪迹对比 (gold 收束) ==============
  function drawFrame5(u, now){
    // 四条小波形并列, 标注形态特征
    var rows = [
      {key:'real',  zh:'真脑波',   en:'REAL EEG',     col:'--synaptic', note_zh:'平缓节律 ±20 uV', note_en:'smooth ~±20 uV'},
      {key:'blink', zh:'眨眼',     en:'BLINK',        col:'--firing',   note_zh:'单个大鼓包',     note_en:'single big hump'},
      {key:'emg',   zh:'咬牙',     en:'JAW EMG',      col:'--firing',   note_zh:'密集高频毛刺',   note_en:'dense bristles'},
      {key:'mains', zh:'工频',     en:'MAINS 50Hz',   col:'--firing',   note_zh:'规则正弦',       note_en:'regular sine'}
    ];
    var rowH = H*0.16;
    var rowTop = H*0.10;
    var rx0 = W*0.30, rx1 = W*0.88;
    var rAmp = rowH*0.32;
    var reveal = easeIO(Math.min(1, u/0.55));
    var shown = Math.ceil(reveal * rows.length);

    for (var r = 0; r < rows.length; r++){
      if (r >= shown) continue;
      var cy = rowTop + r*rowH + rowH*0.5;
      // 行底
      ctx.strokeStyle = CSSV('--line');
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(rx0, cy); ctx.lineTo(rx1, cy); ctx.stroke();
      // 标签
      ctx.fillStyle = CSSV('--fg');
      ctx.font = "700 14px 'Inter','Noto Sans SC',sans-serif";
      ctx.textAlign = 'right';
      ctx.fillText(LANG==='cn'?rows[r].zh:rows[r].en, rx0 - 14, cy + 5);
      // 波
      ctx.strokeStyle = CSSV(rows[r].col);
      ctx.lineWidth = (rows[r].key==='real')?2:1.8;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      var samples = 200;
      for (var j = 0; j <= samples; j++){
        var tt = (j/samples) * 1.0;     // 1 秒窗
        var v = 0;
        if (rows[r].key === 'real')  v = (14*Math.sin(2*Math.PI*10*tt) + 4*Math.sin(2*Math.PI*5*tt+1.3) + 4*Math.sin(2*Math.PI*22*tt))/22;
        if (rows[r].key === 'blink') v = Math.exp(-Math.pow((tt-0.5)/0.12,2)) * 1.0;
        if (rows[r].key === 'emg'){
          var env = (tt>0.25 && tt<0.75) ? Math.sin(Math.PI*(tt-0.25)/0.5) : 0;
          v = env * (Math.sin(2*Math.PI*40*tt) + 0.8*Math.sin(2*Math.PI*70*tt+1))/1.8 * 0.9;
        }
        if (rows[r].key === 'mains') v = Math.sin(2*Math.PI*50*tt) * 0.55;
        var lx = lerp(rx0, rx1, j/samples);
        var ly = cy - v * rAmp;
        if (j === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
      }
      ctx.stroke();
      // 形态注释
      ctx.fillStyle = CSSV('--fg-dim');
      ctx.font = "600 11px 'JetBrains Mono',monospace";
      ctx.textAlign = 'left';
      ctx.fillText(LANG==='cn'?rows[r].note_zh:rows[r].note_en, rx1 + 12, cy + 4);
    }

    // gold 收束句 + 关键发现框
    if (u > 0.45){
      var fadeIn = Math.min(1, (u - 0.45)/0.18);
      ctx.globalAlpha = fadeIn;
      ctx.fillStyle = CSSV('--gold');
      ctx.font = "700 26px 'Inter','Noto Sans SC',sans-serif";
      ctx.textAlign = 'center';
      var keyText = LANG==='cn' ? '认出伪迹形态, 是清洁数据的第一步'
                                : 'Spotting artifact shapes = step 1 to clean data';
      ctx.fillText(keyText, W*0.55, H*0.93);

      // 关键发现框
      ctx.strokeStyle = CSSV('--gold');
      ctx.lineWidth = 2;
      var bw = 560, bh = 50;
      var bx = W*0.55 - bw/2, by = H*0.90 - 14;
      ctx.strokeRect(bx, by, bw, bh);
      var corner = 11;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(bx, by+corner); ctx.lineTo(bx, by); ctx.lineTo(bx+corner, by); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-corner, by); ctx.lineTo(bx+bw, by); ctx.lineTo(bx+bw, by+corner); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, by+bh-corner); ctx.lineTo(bx, by+bh); ctx.lineTo(bx+corner, by+bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-corner, by+bh); ctx.lineTo(bx+bw, by+bh); ctx.lineTo(bx+bw, by+bh-corner); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Spark 庆祝 (右上角)
    drawSparkSmall(W*0.93, H*0.10, 0.75, u > 0.45 ? (u-0.45)/0.55 : 0, now);
  }

  // Spark 小绘制
  function drawSparkSmall(x, y, scale, joy, now){
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    var glow = 0.6 + 0.4*joy;
    ctx.fillStyle = CSSV('--synaptic');
    ctx.globalAlpha = 0.18 + 0.18*joy;
    ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = CSSV('--synaptic');
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    var tips = [[-16,-18],[-6,-22],[0,-26],[6,-22],[16,-18]];
    for (var b = 0; b < tips.length; b++){
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(tips[b][0]*0.55, tips[b][1]*0.55);
      ctx.lineTo(tips[b][0], tips[b][1]);
      ctx.stroke();
      var tp = 0.5 + 0.5*Math.sin(now/250 + b);
      ctx.fillStyle = CSSV('--firing');
      ctx.globalAlpha = glow * (0.5 + 0.5*tp);
      ctx.beginPath(); ctx.arc(tips[b][0], tips[b][1], 2.6, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = CSSV('--firing');
    ctx.beginPath(); ctx.arc(0, 0, 4 + joy*2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = CSSV('--fg-mute');
    ctx.font = "600 9px 'JetBrains Mono',monospace";
    ctx.textAlign = 'center';
    ctx.fillText('SPARK', 0, 36);
    ctx.restore();
  }

  // ---- 帧切换淡入淡出 ----
  function frameAlpha(u){
    if (u > 0.92) return Math.max(0, 1 - (u - 0.92) / 0.08);
    if (u < 0.06) return u / 0.06;
    return 1;
  }

  function draw(now){
    if (!W || !H){
      requestAnimationFrame(draw);
      return;
    }
    var fp = frameProgress(now);

    // 背景
    ctx.fillStyle = CSSV('--bg-0');
    ctx.fillRect(0, 0, W, H);

    // 网格底纹
    ctx.strokeStyle = CSSV('--line');
    ctx.lineWidth = 1;
    for (var gx = 40; gx < W; gx += 60){
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    }
    for (var gy = 40; gy < H; gy += 60){
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    }

    ctx.globalAlpha = frameAlpha(fp.u);
    if      (fp.idx === 0) drawFrame1(fp.u, now);
    else if (fp.idx === 1) drawFrame2(fp.u, now);
    else if (fp.idx === 2) drawFrame3(fp.u, now);
    else if (fp.idx === 3) drawFrame4(fp.u, now);
    else                   drawFrame5(fp.u, now);
    ctx.globalAlpha = 1;

    // HUD + 字幕
    if (fp.idx !== lastFrameShown){
      lastFrameShown = fp.idx;
      document.getElementById('hudFrame').textContent = (fp.idx + 1) + ' / 5';
      document.getElementById('hudStage').textContent = I18N.stages[LANG][fp.idx];
      document.getElementById('hudVal').textContent   = I18N.hudVals[LANG][fp.idx];
      document.getElementById('subZh').textContent    = I18N.subs[LANG][fp.idx];
      document.getElementById('subEn').textContent    = I18N.subs.en[fp.idx];
      var subZhEl = document.getElementById('subZh');
      if (fp.idx === 4) subZhEl.classList.add('gold');
      else subZhEl.classList.remove('gold');
    }

    requestAnimationFrame(draw);
  }

  function refreshI18N(){
    document.getElementById('ttl').textContent      = t('ttl');
    document.getElementById('subtitle').textContent = t('subtitle');
    document.getElementById('g1').textContent = t('g1');
    document.getElementById('g2').textContent = t('g2');
    document.getElementById('g3').textContent = t('g3');
    document.getElementById('hudTtl').textContent = t('hudTtl');
    lastFrameShown = -1;
  }

  document.getElementById('langBtn').addEventListener('click', function(){
    LANG = (LANG === 'cn') ? 'en' : 'cn';
    this.textContent = LANG === 'cn' ? 'CN / EN' : 'EN / CN';
    refreshI18N();
  });

  resize();
  requestAnimationFrame(draw);
})();
</script>
