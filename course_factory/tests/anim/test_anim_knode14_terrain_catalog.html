<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
var CONFIG = {
  style: 'ares_mission',
  totalFrames: 4,

  i18n: {
    title:    {en:'MARS TERRAIN CATALOG', cn:'\u706b\u661f\u5730\u5f62\u56fe\u9274'},
    subtitle: {en:'AI4Mars Four Terrain Types', cn:'AI4Mars \u56db\u7c7b\u5730\u5f62'},
    prev:     {en:'PREV', cn:'\u4e0a\u4e00\u5e27'},
    next:     {en:'NEXT', cn:'\u4e0b\u4e00\u5e27'},
    play:     {en:'AUTO', cn:'\u81ea\u52a8'},
    pause:    {en:'PAUSE', cn:'\u6682\u505c'},
    guideTitle:{en:'Learning Guide', cn:'\u5b66\u4e60\u5bfc\u822a'},
    g1: {en:'Soil: fine-grained, uniform, safe terrain', cn:'\u571f\u58e4\uff1a\u7ec6\u7c92\u5747\u5300\uff0c\u5b89\u5168\u5730\u5f62'},
    g2: {en:'Bedrock: solid layered rock, rover-safe', cn:'\u57fa\u5ca9\uff1a\u575a\u56fa\u5c42\u72b6\u5ca9\u77f3\uff0c\u884c\u9a76\u5b89\u5168'},
    g3: {en:'Big rocks: obstacles for rover navigation', cn:'\u5927\u77f3\u5757\uff1a\u706b\u661f\u8f66\u5bfc\u822a\u7684\u969c\u788d\u7269'},
    g4: {en:'Sand: wind ripples, risk of wheel sinking', cn:'\u6c99\u5730\uff1a\u98ce\u8680\u6ce2\u7eb9\uff0c\u8f66\u8f6e\u53ef\u80fd\u9677\u5165'},
    // HUD labels
    hud_frame:  {en:'FRAME',  cn:'\u5e27'},
    hud_type:   {en:'TYPE',   cn:'\u7c7b\u578b'},
    hud_grain:  {en:'GRAIN',  cn:'\u7c92\u5ea6'},
    hud_danger: {en:'DANGER', cn:'\u5371\u9669'},
    // HUD values
    soil:    {en:'soil',    cn:'\u571f\u58e4'},
    bedrock: {en:'bedrock', cn:'\u57fa\u5ca9'},
    big_rock:{en:'big_rock',cn:'\u5927\u77f3\u5757'},
    sand:    {en:'sand',    cn:'\u6c99\u5730'},
    fine:    {en:'fine',    cn:'\u7ec6\u7c92'},
    solid:   {en:'solid',   cn:'\u5b9e\u5fc3'},
    large:   {en:'large',   cn:'\u5927\u578b'},
    medium:  {en:'medium',  cn:'\u4e2d\u7b49'},
    low:     {en:'low',     cn:'\u4f4e'},
    high:    {en:'high',    cn:'\u9ad8'},
    // Attribute labels for the right panel
    attr_grain:   {en:'Grain Size',    cn:'\u7c92\u5ea6\u5927\u5c0f'},
    attr_color:   {en:'Color',         cn:'\u989c\u8272'},
    attr_hard:    {en:'Hardness',      cn:'\u786c\u5ea6'},
    attr_danger:  {en:'Danger Level',  cn:'\u5371\u9669\u7b49\u7ea7'},
    // Soil attributes
    soil_grain:  {en:'Fine, uniform particles',  cn:'\u7ec6\u5c0f\u5747\u5300\u7684\u9897\u7c92'},
    soil_color:  {en:'Light brownish',            cn:'\u6d45\u68d5\u8272'},
    soil_hard:   {en:'Low',                       cn:'\u4f4e'},
    soil_danger: {en:'Low -- safe for rover',     cn:'\u4f4e -- \u706b\u661f\u8f66\u5b89\u5168'},
    // Bedrock attributes
    bed_grain:   {en:'N/A (solid mass)',           cn:'\u65e0\uff08\u6574\u4f53\u5b9e\u5fc3\uff09'},
    bed_color:   {en:'Gray / dark',                cn:'\u7070\u8272 / \u6df1\u8272'},
    bed_hard:    {en:'High',                       cn:'\u9ad8'},
    bed_danger:  {en:'Low -- stable surface',      cn:'\u4f4e -- \u8868\u9762\u7a33\u5b9a'},
    // Big rock attributes
    rock_grain:  {en:'Large (>0.5m)',              cn:'\u5927\u578b\uff08>0.5m\uff09'},
    rock_color:  {en:'Varied',                     cn:'\u591a\u6837'},
    rock_hard:   {en:'High',                       cn:'\u9ad8'},
    rock_danger: {en:'High -- obstacle for rover', cn:'\u9ad8 -- \u706b\u661f\u8f66\u969c\u788d'},
    // Sand attributes
    sand_grain:  {en:'Medium granules',            cn:'\u4e2d\u7b49\u9897\u7c92'},
    sand_color:  {en:'Reddish brown',              cn:'\u7ea2\u68d5\u8272'},
    sand_hard:   {en:'Low',                        cn:'\u4f4e'},
    sand_danger: {en:'Medium -- wheel sink risk',  cn:'\u4e2d -- \u8f66\u8f6e\u4e0b\u9677\u98ce\u9669'},
  },

  hudLabels: ['hud_frame', 'hud_type', 'hud_grain', 'hud_danger'],
  hudValues: [
    ['1/4', 'soil',    'fine',   'low'],
    ['2/4', 'bedrock', 'solid',  'low'],
    ['3/4', 'big_rock','large',  'high'],
    ['4/4', 'sand',    'medium', 'medium'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3', 'g4'],
};

/* ---- Drawing helpers ---- */

function _attrPanel(ctx, x, y, labels, values, P, spacing) {
  spacing = spacing || 50;
  for (var i = 0; i < labels.length; i++) {
    var ay = y + i * spacing;
    // Label background pill
    ctx.fillStyle = 'rgba(255,181,156,0.08)';
    ctx.beginPath();
    ctx.moveTo(x - 4, ay - 14);
    ctx.lineTo(x + 160, ay - 14);
    ctx.quadraticCurveTo(x + 168, ay - 14, x + 168, ay - 6);
    ctx.lineTo(x + 168, ay + 10);
    ctx.quadraticCurveTo(x + 168, ay + 18, x + 160, ay + 18);
    ctx.lineTo(x - 4, ay + 18);
    ctx.quadraticCurveTo(x - 12, ay + 18, x - 12, ay + 10);
    ctx.lineTo(x - 12, ay - 6);
    ctx.quadraticCurveTo(x - 12, ay - 14, x - 4, ay - 14);
    ctx.closePath();
    ctx.fill();
    // Border
    ctx.strokeStyle = P.primaryDim; ctx.lineWidth = 1;
    ctx.stroke();
    // Label text
    ctx.font = "bold 11px 'Space Grotesk',sans-serif";
    ctx.textAlign = 'left'; ctx.fillStyle = P.primary;
    ctx.fillText(labels[i], x, ay);
    // Value text
    ctx.font = "12px 'Noto Sans SC',sans-serif";
    ctx.fillStyle = P.text;
    ctx.fillText(values[i], x, ay + 15);
  }
}

function _roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ---- Frame elements ---- */

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var cx = W / 2, cy = H / 2;

  return [{
    id: 'scene', type: 'custom', x: cx, y: cy,
    draw: function(ctx) {
      if (f === 0) drawSoil(ctx, W, H, t, P);
      else if (f === 1) drawBedrock(ctx, W, H, t, P);
      else if (f === 2) drawBigRock(ctx, W, H, t, P);
      else if (f === 3) drawSand(ctx, W, H, t, P);
    }
  }];
}

/* ---- Frame 0: Soil ---- */
function drawSoil(ctx, W, H, t, P) {
  var lang = AnimRuntime._lang || 'cn';
  // Terrain area: left half
  var tx = W * 0.15, tw = W * 0.30, ty = H * 0.18, th = H * 0.54;
  var tcx = tx + tw / 2, tcy = ty + th / 2;

  // Background panel for terrain viz
  _roundedRect(ctx, tx, ty, tw, th, 6);
  ctx.fillStyle = 'rgba(255,181,156,0.04)';
  ctx.fill();
  ctx.strokeStyle = P.primaryDim; ctx.lineWidth = 1.5;
  ctx.stroke();

  // Draw soil texture: many small dots to simulate fine-grained terrain
  ctx.save();
  ctx.beginPath();
  _roundedRect(ctx, tx + 4, ty + 4, tw - 8, th - 8, 4);
  ctx.clip();

  // Base soil color
  ctx.fillStyle = 'rgba(180,140,90,0.35)';
  ctx.fillRect(tx, ty, tw, th);

  // Fine grain dots -- seeded pseudo-random pattern
  var seed = 42;
  function pseudoRand() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
  for (var i = 0; i < 300; i++) {
    var dx = tx + 8 + pseudoRand() * (tw - 16);
    var dy = ty + 8 + pseudoRand() * (th - 16);
    var dr = 1 + pseudoRand() * 2;
    var brightness = 120 + Math.floor(pseudoRand() * 80);
    ctx.fillStyle = 'rgba(' + brightness + ',' + Math.floor(brightness * 0.75) + ',' + Math.floor(brightness * 0.5) + ',0.6)';
    ctx.beginPath(); ctx.arc(dx, dy, dr, 0, Math.PI * 2); ctx.fill();
  }

  // Subtle horizontal texture lines
  ctx.strokeStyle = 'rgba(160,120,70,0.15)'; ctx.lineWidth = 0.5;
  for (var ly = ty + 12; ly < ty + th - 8; ly += 6) {
    ctx.beginPath();
    ctx.moveTo(tx + 8, ly + pseudoRand() * 3);
    ctx.lineTo(tx + tw - 8, ly + pseudoRand() * 3);
    ctx.stroke();
  }
  ctx.restore();

  // Type label below terrain
  ctx.font = "bold 13px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center'; ctx.fillStyle = P.primary;
  ctx.fillText('SOIL', tcx, ty + th + 20);
  ctx.font = "12px 'Noto Sans SC',sans-serif";
  ctx.fillStyle = P.muted;
  ctx.fillText(lang === 'cn' ? '\u571f\u58e4' : 'Soil', tcx, ty + th + 36);

  // Attribute panel: right half
  var ax = W * 0.55;
  var ay = H * 0.15;
  _attrPanel(ctx, ax, ay, [
    t('attr_grain'), t('attr_color'), t('attr_hard'), t('attr_danger')
  ], [
    t('soil_grain'), t('soil_color'), t('soil_hard'), t('soil_danger')
  ], P, H * 0.17);
}

/* ---- Frame 1: Bedrock ---- */
function drawBedrock(ctx, W, H, t, P) {
  var lang = AnimRuntime._lang || 'cn';
  var tx = W * 0.15, tw = W * 0.30, ty = H * 0.18, th = H * 0.54;
  var tcx = tx + tw / 2, tcy = ty + th / 2;

  _roundedRect(ctx, tx, ty, tw, th, 6);
  ctx.fillStyle = 'rgba(255,181,156,0.04)';
  ctx.fill();
  ctx.strokeStyle = P.primaryDim; ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  _roundedRect(ctx, tx + 4, ty + 4, tw - 8, th - 8, 4);
  ctx.clip();

  // Draw layered rock formation with striations
  var layerColors = [
    'rgba(90,85,80,0.8)',
    'rgba(110,105,95,0.7)',
    'rgba(75,72,68,0.85)',
    'rgba(100,95,88,0.75)',
    'rgba(65,62,58,0.9)',
    'rgba(85,80,75,0.7)',
    'rgba(95,90,82,0.8)',
  ];
  var layerH = (th - 8) / layerColors.length;
  for (var i = 0; i < layerColors.length; i++) {
    var ly = ty + 4 + i * layerH;
    ctx.fillStyle = layerColors[i];
    ctx.fillRect(tx + 4, ly, tw - 8, layerH + 1);

    // Striation lines within each layer
    ctx.strokeStyle = 'rgba(200,190,175,0.15)'; ctx.lineWidth = 0.8;
    for (var s = 0; s < 3; s++) {
      var sy = ly + (s + 1) * layerH / 4;
      ctx.beginPath();
      ctx.moveTo(tx + 6, sy);
      // Slightly wavy line
      var cp1x = tx + tw * 0.3, cp1y = sy + (s % 2 === 0 ? -2 : 2);
      var cp2x = tx + tw * 0.7, cp2y = sy + (s % 2 === 0 ? 2 : -1);
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tx + tw - 6, sy);
      ctx.stroke();
    }

    // Layer boundary -- stronger line
    if (i > 0) {
      ctx.strokeStyle = 'rgba(40,38,35,0.6)'; ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(tx + 4, ly);
      ctx.lineTo(tx + tw - 4, ly);
      ctx.stroke();
    }
  }

  // Crack detail
  ctx.strokeStyle = 'rgba(30,28,25,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tcx - 20, ty + th * 0.3);
  ctx.lineTo(tcx - 10, ty + th * 0.5);
  ctx.lineTo(tcx - 15, ty + th * 0.7);
  ctx.stroke();

  ctx.restore();

  ctx.font = "bold 13px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center'; ctx.fillStyle = P.primary;
  ctx.fillText('BEDROCK', tcx, ty + th + 20);
  ctx.font = "12px 'Noto Sans SC',sans-serif";
  ctx.fillStyle = P.muted;
  ctx.fillText(lang === 'cn' ? '\u57fa\u5ca9' : 'Bedrock', tcx, ty + th + 36);

  var ax = W * 0.55;
  var ay = H * 0.15;
  _attrPanel(ctx, ax, ay, [
    t('attr_grain'), t('attr_color'), t('attr_hard'), t('attr_danger')
  ], [
    t('bed_grain'), t('bed_color'), t('bed_hard'), t('bed_danger')
  ], P, H * 0.17);
}

/* ---- Frame 2: Big Rock ---- */
function drawBigRock(ctx, W, H, t, P) {
  var lang = AnimRuntime._lang || 'cn';
  var tx = W * 0.15, tw = W * 0.30, ty = H * 0.18, th = H * 0.54;
  var tcx = tx + tw / 2, tcy = ty + th / 2;

  _roundedRect(ctx, tx, ty, tw, th, 6);
  ctx.fillStyle = 'rgba(255,181,156,0.04)';
  ctx.fill();
  ctx.strokeStyle = P.primaryDim; ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  _roundedRect(ctx, tx + 4, ty + 4, tw - 8, th - 8, 4);
  ctx.clip();

  // Ground plane
  ctx.fillStyle = 'rgba(140,110,80,0.2)';
  ctx.fillRect(tx + 4, tcy + th * 0.15, tw - 8, th * 0.5);

  // Boulder 1 (large, center-left)
  var b1x = tcx - tw * 0.15, b1y = tcy - th * 0.05;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(b1x + 5, b1y + 35, 35, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // Rock body
  ctx.fillStyle = 'rgba(120,110,100,0.9)';
  ctx.beginPath();
  ctx.moveTo(b1x - 30, b1y + 25);
  ctx.lineTo(b1x - 25, b1y - 10);
  ctx.lineTo(b1x - 5, b1y - 28);
  ctx.lineTo(b1x + 15, b1y - 20);
  ctx.lineTo(b1x + 30, b1y + 5);
  ctx.lineTo(b1x + 28, b1y + 25);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,70,60,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
  // Highlight edge
  ctx.strokeStyle = 'rgba(200,190,170,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b1x - 25, b1y - 10); ctx.lineTo(b1x - 5, b1y - 28); ctx.lineTo(b1x + 15, b1y - 20); ctx.stroke();

  // Boulder 2 (medium, right)
  var b2x = tcx + tw * 0.18, b2y = tcy + th * 0.05;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(b2x + 3, b2y + 22, 22, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(140,125,105,0.85)';
  ctx.beginPath();
  ctx.moveTo(b2x - 20, b2y + 15);
  ctx.lineTo(b2x - 15, b2y - 8);
  ctx.lineTo(b2x + 5, b2y - 18);
  ctx.lineTo(b2x + 20, b2y - 5);
  ctx.lineTo(b2x + 18, b2y + 15);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,70,60,0.6)'; ctx.lineWidth = 1.2; ctx.stroke();

  // Boulder 3 (small, background)
  var b3x = tcx - tw * 0.02, b3y = tcy - th * 0.22;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(b3x + 2, b3y + 14, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(105,98,88,0.8)';
  ctx.beginPath();
  ctx.moveTo(b3x - 12, b3y + 10);
  ctx.lineTo(b3x - 8, b3y - 5);
  ctx.lineTo(b3x + 5, b3y - 12);
  ctx.lineTo(b3x + 14, b3y + 2);
  ctx.lineTo(b3x + 12, b3y + 10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,70,60,0.5)'; ctx.lineWidth = 1; ctx.stroke();

  ctx.restore();

  ctx.font = "bold 13px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center'; ctx.fillStyle = P.primary;
  ctx.fillText('BIG ROCK', tcx, ty + th + 20);
  ctx.font = "12px 'Noto Sans SC',sans-serif";
  ctx.fillStyle = P.muted;
  ctx.fillText(lang === 'cn' ? '\u5927\u77f3\u5757' : 'Big Rock', tcx, ty + th + 36);

  var ax = W * 0.55;
  var ay = H * 0.15;
  _attrPanel(ctx, ax, ay, [
    t('attr_grain'), t('attr_color'), t('attr_hard'), t('attr_danger')
  ], [
    t('rock_grain'), t('rock_color'), t('rock_hard'), t('rock_danger')
  ], P, H * 0.17);
}

/* ---- Frame 3: Sand ---- */
function drawSand(ctx, W, H, t, P) {
  var lang = AnimRuntime._lang || 'cn';
  var tx = W * 0.15, tw = W * 0.30, ty = H * 0.18, th = H * 0.54;
  var tcx = tx + tw / 2, tcy = ty + th / 2;

  _roundedRect(ctx, tx, ty, tw, th, 6);
  ctx.fillStyle = 'rgba(255,181,156,0.04)';
  ctx.fill();
  ctx.strokeStyle = P.primaryDim; ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  _roundedRect(ctx, tx + 4, ty + 4, tw - 8, th - 8, 4);
  ctx.clip();

  // Base sand color
  ctx.fillStyle = 'rgba(180,120,80,0.3)';
  ctx.fillRect(tx + 4, ty + 4, tw - 8, th - 8);

  // Wind-blown ripple patterns (sine waves)
  var rippleCount = 12;
  var rippleSpacing = (th - 16) / rippleCount;
  for (var r = 0; r < rippleCount; r++) {
    var ry = ty + 10 + r * rippleSpacing;
    var amplitude = 3 + (r % 3) * 1.5;
    var phase = r * 0.8;
    var alpha = 0.25 + (r % 3) * 0.1;

    // Shadow of ripple (darker below)
    ctx.strokeStyle = 'rgba(100,60,30,' + (alpha * 0.8) + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(tx + 6, ry + 2);
    for (var rx = tx + 6; rx <= tx + tw - 6; rx += 3) {
      var yOff = Math.sin((rx - tx) * 0.04 + phase) * amplitude;
      ctx.lineTo(rx, ry + yOff + 2);
    }
    ctx.stroke();

    // Ripple crest (lighter on top)
    ctx.strokeStyle = 'rgba(210,160,110,' + alpha + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tx + 6, ry);
    for (var rx = tx + 6; rx <= tx + tw - 6; rx += 3) {
      var yOff = Math.sin((rx - tx) * 0.04 + phase) * amplitude;
      ctx.lineTo(rx, ry + yOff);
    }
    ctx.stroke();
  }

  // A few scattered medium grains
  var seed = 77;
  function pseudoRand2() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
  for (var i = 0; i < 80; i++) {
    var gx = tx + 8 + pseudoRand2() * (tw - 16);
    var gy = ty + 8 + pseudoRand2() * (th - 16);
    var gr = 1.5 + pseudoRand2() * 2.5;
    ctx.fillStyle = 'rgba(190,130,80,' + (0.2 + pseudoRand2() * 0.3) + ')';
    ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI * 2); ctx.fill();
  }

  // Wind direction indicator arrow
  ctx.strokeStyle = P.primary; ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  var arrowY = ty + th - 20;
  ctx.beginPath();
  ctx.moveTo(tx + 15, arrowY);
  ctx.lineTo(tx + tw - 20, arrowY);
  ctx.stroke();
  ctx.setLineDash([]);
  // Arrowhead
  ctx.fillStyle = P.primary;
  ctx.beginPath();
  ctx.moveTo(tx + tw - 20, arrowY);
  ctx.lineTo(tx + tw - 28, arrowY - 4);
  ctx.lineTo(tx + tw - 28, arrowY + 4);
  ctx.closePath();
  ctx.fill();
  // Wind label
  ctx.font = "9px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'left'; ctx.fillStyle = P.primary;
  ctx.fillText(lang === 'cn' ? '\u98ce\u5411' : 'Wind', tx + 15, arrowY - 6);

  ctx.restore();

  ctx.font = "bold 13px 'Space Grotesk',sans-serif";
  ctx.textAlign = 'center'; ctx.fillStyle = P.primary;
  ctx.fillText('SAND', tcx, ty + th + 20);
  ctx.font = "12px 'Noto Sans SC',sans-serif";
  ctx.fillStyle = P.muted;
  ctx.fillText(lang === 'cn' ? '\u6c99\u5730' : 'Sand', tcx, ty + th + 36);

  var ax = W * 0.55;
  var ay = H * 0.15;
  _attrPanel(ctx, ax, ay, [
    t('attr_grain'), t('attr_color'), t('attr_hard'), t('attr_danger')
  ], [
    t('sand_grain'), t('sand_color'), t('sand_hard'), t('sand_danger')
  ], P, H * 0.17);
}

AnimRuntime.boot();
</script>
