<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:var(--bg,#0c0e12);color:var(--text,#f6f6fc);font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:var(--primary,#50ffb0);text-shadow:0 0 15px var(--glow,rgba(80,255,176,0.3));}
.header .sub{font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:var(--bg,#0c0e12);background:linear-gradient(135deg,var(--primary,#50ffb0),var(--primary-dim,#17df93));transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px var(--glow-strong,rgba(80,255,176,0.3));}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px var(--glow-strong,rgba(80,255,176,0.5));}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:var(--glass,rgba(23,26,31,0.92));color:var(--muted,#aaabb0);box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:var(--primary,#50ffb0);}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted,#aaabb0);}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--primary,#50ffb0);}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:var(--glass,rgba(20,20,35,0.85));backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:var(--primary,#50ffb0);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:var(--muted,#aaabb0);letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>

<script src="animation_runtime.js"></script>

<script>
// Terrain data: 4 surfaces, each with properties
var terrains = [
  {key:'rock',  hardness:0.9, friction:0.7, grain:0.8, traversability:0.65,
   baseColor:'#7a6e5d', grainColor:'#5c5244', highlightColor:'#9e917d'},
  {key:'sand',  hardness:0.2, friction:0.3, grain:0.4, traversability:0.3,
   baseColor:'#c9a96e', grainColor:'#b08c4a', highlightColor:'#e0c99b'},
  {key:'mud',   hardness:0.4, friction:0.5, grain:0.3, traversability:0.45,
   baseColor:'#6b5234', grainColor:'#4a3825', highlightColor:'#8a7050'},
  {key:'grass', hardness:0.3, friction:0.6, grain:0.2, traversability:0.85,
   baseColor:'#3d6b3a', grainColor:'#2d4f2b', highlightColor:'#5a9e55'}
];

// Draw terrain texture (procedural)
function drawTerrainTexture(ctx, x, y, w, h, terrain, seed) {
  // Base gradient
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, terrain.baseColor);
  grad.addColorStop(0.5, terrain.grainColor);
  grad.addColorStop(1, terrain.baseColor);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Grain particles
  var rng = seed;
  var grainCount = Math.floor(terrain.grain * 60) + 20;
  for (var i = 0; i < grainCount; i++) {
    rng = (rng * 1103515245 + 12345) & 0x7fffffff;
    var gx = x + (rng % Math.floor(w));
    rng = (rng * 1103515245 + 12345) & 0x7fffffff;
    var gy = y + (rng % Math.floor(h));
    rng = (rng * 1103515245 + 12345) & 0x7fffffff;
    var gs = 1 + (rng % 4) * terrain.grain;
    ctx.fillStyle = terrain.highlightColor;
    ctx.globalAlpha = 0.3 + terrain.grain * 0.4;
    ctx.beginPath();
    ctx.arc(gx, gy, gs, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Draw a simple rover
function drawRover(ctx, x, y, size, sinkDepth, wheelAngle) {
  var P = AnimRuntime.PAL;
  // Body
  ctx.fillStyle = P.muted;
  ctx.fillRect(x - size * 0.6, y - size * 0.4 + sinkDepth, size * 1.2, size * 0.35);
  // Cab
  ctx.fillStyle = P.primary;
  ctx.fillRect(x - size * 0.3, y - size * 0.7 + sinkDepth, size * 0.6, size * 0.35);
  // Wheels
  ctx.fillStyle = '#333';
  var wheelR = size * 0.18;
  var wheelY = y + sinkDepth;
  [-0.45, 0.45].forEach(function(offX) {
    ctx.save();
    ctx.translate(x + offX * size, wheelY);
    ctx.rotate(wheelAngle);
    ctx.beginPath();
    ctx.arc(0, 0, wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Wheel spokes
    ctx.strokeStyle = P.muted;
    ctx.lineWidth = 1;
    for (var s = 0; s < 4; s++) {
      var a = wheelAngle + s * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * wheelR * 0.8, Math.sin(a) * wheelR * 0.8);
      ctx.stroke();
    }
    ctx.restore();
  });
}

// Traversability bar
function drawTraversabilityBar(ctx, x, y, w, h, value) {
  var P = AnimRuntime.PAL;
  // Background
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x, y, w, h);
  // Fill
  var barColor = value >= 0.7 ? '#10b981' : value >= 0.4 ? '#fbbf24' : '#ef4444';
  var barGrad = ctx.createLinearGradient(x, y, x + w * value, y);
  barGrad.addColorStop(0, barColor);
  barGrad.addColorStop(1, barColor + '88');
  ctx.fillStyle = barGrad;
  ctx.fillRect(x, y, w * value, h);
  // Glow
  ctx.shadowColor = barColor;
  ctx.shadowBlur = 8;
  ctx.fillRect(x, y, w * value, h);
  ctx.shadowBlur = 0;
}

var CONFIG = {
  style: 'ares_mission',
  totalFrames: 4,

  i18n: {
    title:    {en: 'TERRAIN MATERIAL EXPLORER', cn: '\u5730\u9762\u6750\u8d28\u63a2\u6d4b\u5668'},
    subtitle: {en: 'Surface Traversability Analysis', cn: '\u5730\u8868\u901a\u884c\u6027\u5206\u6790'},
    guideTitle: {en: 'OBSERVATION GUIDE', cn: '\u89c2\u5bdf\u6307\u5357'},
    g1: {en: 'Each frame shows a different terrain type', cn: '\u6bcf\u4e00\u5e27\u5c55\u793a\u4e00\u79cd\u4e0d\u540c\u7684\u5730\u9762\u6750\u8d28'},
    g2: {en: 'Watch how deep the rover sinks', cn: '\u89c2\u5bdf\u706b\u661f\u8f66\u9677\u5165\u5730\u9762\u7684\u6df1\u5ea6'},
    g3: {en: 'Compare traversability bars across terrains', cn: '\u5bf9\u6bd4\u4e0d\u540c\u5730\u9762\u7684\u901a\u884c\u6027\u6761'},
    rock:  {en: 'ROCK',  cn: '\u5ca9\u77f3'},
    sand:  {en: 'SAND',  cn: '\u6c99\u5730'},
    mud:   {en: 'MUD',   cn: '\u6ce5\u571f'},
    grass: {en: 'GRASS', cn: '\u8349\u5730'},
    rock_desc:  {en: 'Hard, rough surface. Stable but bumpy.',
                 cn: '\u786c\u3001\u7c97\u7cd9\u7684\u8868\u9762\u3002\u7a33\u5b9a\u4f46\u98a0\u7c38\u3002'},
    sand_desc:  {en: 'Soft, flowing grains. Wheels may sink.',
                 cn: '\u8f6f\u3001\u6d41\u52a8\u7684\u7ec6\u7c92\u3002\u8f66\u8f6e\u53ef\u80fd\u4e0b\u9677\u3002'},
    mud_desc:   {en: 'Sticky when wet, hard when dry.',
                 cn: '\u6e7f\u65f6\u9ecf\u6ed1\uff0c\u5e72\u65f6\u575a\u786c\u3002'},
    grass_desc: {en: 'Soft with cushion. Easy to traverse.',
                 cn: '\u67d4\u8f6f\u6709\u7f13\u51b2\u3002\u5bb9\u6613\u901a\u884c\u3002'},
    hardness: {en: 'HARDNESS',   cn: '\u786c\u5ea6'},
    friction: {en: 'FRICTION',   cn: '\u6469\u64e6\u529b'},
    grainSize:{en: 'GRAIN SIZE', cn: '\u9897\u7c92\u5927\u5c0f'},
    traversability: {en: 'TRAVERSABILITY', cn: '\u901a\u884c\u6027'},
    hudL1: {en: 'TERRAIN',       cn: '\u5730\u9762\u7c7b\u578b'},
    hudL2: {en: 'HARDNESS',      cn: '\u786c\u5ea6'},
    hudL3: {en: 'FRICTION',      cn: '\u6469\u64e6\u529b'},
    hudL4: {en: 'TRAVERSABILITY', cn: '\u901a\u884c\u6027'},
  },

  hudLabels: ['hudL1', 'hudL2', 'hudL3', 'hudL4'],
  hudValues: [
    ['rock',  '90%', '70%', '65%'],
    ['sand',  '20%', '30%', '30%'],
    ['mud',   '40%', '50%', '45%'],
    ['grass', '30%', '60%', '85%'],
  ],

  guideTitle: 'guideTitle',
  guideItems: ['g1', 'g2', 'g3'],
};

function customDrawElement(ctx, el) {
  if (el.type === 'terrainBlock') {
    drawTerrainTexture(ctx, el.x, el.y, el.w, el.h, el.terrain, el.seed || 42);
    return true;
  }
  if (el.type === 'rover') {
    drawRover(ctx, el.rx, el.ry, el.roverSize, el.sinkDepth, el.wheelAngle);
    return true;
  }
  if (el.type === 'travBar') {
    drawTraversabilityBar(ctx, el.x, el.y, el.w, el.h, el.value);
    return true;
  }
  return false;
}

function getFrameElements(f, W, H) {
  var t = AnimRuntime.t;
  var P = AnimRuntime.PAL;
  var terrain = terrains[f];
  var elems = [];

  // Terrain name (large)
  elems.push({id:'terrName', type:'label', text: t(terrain.key),
    x: W * 0.5, y: H * 0.07, color: P.primary,
    size: Math.max(18, W * 0.035), align:'center', alpha:1});

  // Description
  elems.push({id:'terrDesc', type:'label', text: t(terrain.key + '_desc'),
    x: W * 0.5, y: H * 0.13, color: P.muted,
    size: Math.max(11, W * 0.016), align:'center', alpha:1});

  // Terrain texture block (left side)
  var blockW = W * 0.45;
  var blockH = H * 0.35;
  var blockX = W * 0.05;
  var blockY = H * 0.22;
  elems.push({id:'terrBlock', type:'terrainBlock',
    x: blockX, y: blockY, w: blockW, h: blockH,
    terrain: terrain, seed: f * 12345 + 7, alpha:1});

  // Terrain block border glow
  elems.push({id:'terrGlow', type:'custom', x: blockX, y: blockY, w: blockW, h: blockH,
    alpha:1, draw: function(ctx, el) {
      ctx.strokeStyle = P.primary;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = el.alpha * 0.4;
      ctx.strokeRect(el.x, el.y, el.w, el.h);
      ctx.globalAlpha = el.alpha;
    }});

  // Rover on terrain
  var roverSize = Math.min(40, W * 0.06);
  var sinkDepth = (1 - terrain.hardness) * roverSize * 0.5;
  var wheelAngle = f * 1.2;
  var roverX = blockX + blockW * 0.5;
  var roverY = blockY + blockH - roverSize * 0.2;
  elems.push({id:'rover', type:'rover',
    x: roverX - roverSize, y: roverY - roverSize,
    w: roverSize * 2, h: roverSize,
    rx: roverX, ry: roverY, roverSize: roverSize,
    sinkDepth: sinkDepth, wheelAngle: wheelAngle, alpha:1});

  // Right panel: property bars
  var panelX = W * 0.56;
  var panelW = W * 0.38;
  var barH = Math.max(14, H * 0.03);
  var props = [
    {key:'hardness', val: terrain.hardness},
    {key:'friction', val: terrain.friction},
    {key:'grainSize', val: terrain.grain},
  ];
  var startY = H * 0.25;

  props.forEach(function(prop, i) {
    var py = startY + i * (barH + 36);
    // Label
    elems.push({id:'propLabel' + i, type:'label', text: t(prop.key),
      x: panelX, y: py, color: P.muted,
      size: Math.max(10, W * 0.013), align:'left', alpha:1});
    // Value
    elems.push({id:'propVal' + i, type:'label', text: Math.round(prop.val * 100) + '%',
      x: panelX + panelW, y: py, color: P.text,
      size: Math.max(10, W * 0.013), align:'right', alpha:1});
    // Bar
    elems.push({id:'propBar' + i, type:'travBar',
      x: panelX, y: py + 14, w: panelW, h: barH,
      value: prop.val, alpha:1});
  });

  // Traversability (larger, highlighted)
  var travY = startY + 3 * (barH + 36) + 10;
  elems.push({id:'travLabel', type:'label', text: t('traversability'),
    x: panelX, y: travY, color: P.primary,
    size: Math.max(12, W * 0.016), align:'left', alpha:1});
  elems.push({id:'travVal', type:'label',
    text: Math.round(terrain.traversability * 100) + '%',
    x: panelX + panelW, y: travY, color: P.primary,
    size: Math.max(14, W * 0.02), align:'right', alpha:1});
  elems.push({id:'travBar', type:'travBar',
    x: panelX, y: travY + 18, w: panelW, h: barH + 4,
    value: terrain.traversability, alpha:1});

  // Comparison mini-bars at bottom
  var miniY = H * 0.78;
  var miniW = (W - 80) / 4;
  for (var i = 0; i < 4; i++) {
    var mx = 20 + i * (miniW + 14);
    var isCurrent = (i === f);
    var tt = terrains[i];
    // Mini label
    elems.push({id:'mini' + i, type:'label', text: t(tt.key),
      x: mx + miniW * 0.5, y: miniY, color: isCurrent ? P.primary : P.muted,
      size: Math.max(9, W * 0.011), align:'center', alpha: isCurrent ? 1 : 0.5});
    // Mini bar
    elems.push({id:'miniBar' + i, type:'travBar',
      x: mx, y: miniY + 14, w: miniW, h: 8,
      value: tt.traversability, alpha: isCurrent ? 1 : 0.4});
  }

  return elems;
}

AnimRuntime.boot();
</script>
</body>
</html>
