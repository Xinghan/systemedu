<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}
body{background:#0c0e12;color:#f6f6fc;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;flex-direction:column;}
.wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;letter-spacing:-0.02em;color:#50ffb0;text-shadow:0 0 15px rgba(80,255,176,0.3);}
.header .sub{font-size:11px;color:#aaabb0;letter-spacing:0.1em;text-transform:uppercase;}
.canvas-wrap{flex:1;min-height:0;position:relative;}
canvas{width:100%;height:100%;display:block;}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 16px;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 18px;border:none;cursor:pointer;color:#0c0e12;background:linear-gradient(135deg,#50ffb0,#17df93);transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 0 12px rgba(80,255,176,0.3);}
.ctrl-btn:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(80,255,176,0.5);}
.ctrl-btn:active{transform:scale(0.96);}
.ctrl-btn.secondary{background:rgba(23,26,31,0.92);color:#aaabb0;box-shadow:none;backdrop-filter:blur(12px);}
.ctrl-btn.secondary:hover{color:#50ffb0;}
.hud{height:48px;display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:0 16px;}
.hud-item{text-align:center;}
.hud-label{font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#aaabb0;}
.hud-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#50ffb0;}
.lang-btn{position:fixed;top:8px;left:8px;z-index:100;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;border:none;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);color:#ffb59c;letter-spacing:1px;}
.guide-panel{position:fixed;top:8px;right:8px;width:240px;max-height:40vh;overflow-y:auto;background:rgba(20,20,35,0.85);backdrop-filter:blur(12px);padding:12px;z-index:100;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.6;}
.guide-panel h3{font-family:'Space Grotesk',sans-serif;font-size:13px;margin-bottom:6px;color:#50ffb0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.guide-panel ul{padding-left:14px;}
.guide-panel .collapsed{display:none;}
</style>
</head>
<body>
<button class="lang-btn" id="langBtn">CN</button>
<div class="guide-panel" id="guide">
<h3 id="guideTitle"></h3>
<div class="guide-content" id="guideContent"></div>
</div>
<div class="wrapper">
<div class="header">
<div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div>
<div id="frameIndicator" style="font-family:'Space Grotesk';font-size:11px;color:#aaabb0;letter-spacing:0.1em;"></div>
</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="controls">
<button class="ctrl-btn secondary" id="btnPrev"></button>
<button class="ctrl-btn" id="btnPlay"></button>
<button class="ctrl-btn secondary" id="btnNext"></button>
</div>
<div class="hud">
<div class="hud-item"><div class="hud-label" id="hudL1"></div><div class="hud-val" id="hudV1"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL2"></div><div class="hud-val" id="hudV2"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL3"></div><div class="hud-val" id="hudV3"></div></div>
<div class="hud-item"><div class="hud-label" id="hudL4"></div><div class="hud-val" id="hudV4"></div></div>
</div>
</div>
<script>
var LANG='cn';
var I18N={
title:{en:'GENE STRUCTURE ZOOM',cn:'\u57fa\u56e0\u7ed3\u6784\u5c42\u5c42\u653e\u5927'},
subtitle:{en:'FROM DNA TO VARIANT POSITION',cn:'\u4ece DNA \u5230\u53d8\u5f02\u4f4d\u7f6e'},
btnPlay:{en:'PLAY',cn:'\u64ad\u653e'},btnPause:{en:'PAUSE',cn:'\u6682\u505c'},
btnPrev:{en:'PREV',cn:'\u4e0a\u4e00\u5e27'},btnNext:{en:'NEXT',cn:'\u4e0b\u4e00\u5e27'},
hudL1:{en:'LEVEL',cn:'\u5c42\u7ea7'},hudL2:{en:'ELEMENTS',cn:'\u5143\u7d20'},
hudL3:{en:'EXONS',cn:'\u5916\u663e\u5b50'},hudL4:{en:'VARIANTS',cn:'\u53d8\u5f02'},
hudV1_0:{en:'DNA',cn:'DNA'},hudV1_1:{en:'GENE',cn:'\u57fa\u56e0'},
hudV1_2:{en:'TRANSCRIPT',cn:'\u8f6c\u5f55\u672c'},hudV1_3:{en:'VARIANT',cn:'\u53d8\u5f02'},
hudV2_0:{en:'CHROMOSOMES',cn:'\u67d3\u8272\u4f53'},hudV2_1:{en:'EXON+INTRON',cn:'\u5916\u663e\u5b50+\u5185\u542b\u5b50'},
hudV2_2:{en:'2 TRANSCRIPTS',cn:'2 \u79cd\u8f6c\u5f55\u672c'},hudV2_3:{en:'4 TYPES',cn:'4 \u79cd\u540e\u679c'},
guideTitle:{en:'OBSERVATION GUIDE',cn:'\u89c2\u770b\u6307\u5357'},
g1:{en:'What it shows: Gene internal structure from DNA to variant consequence',cn:'\u5c55\u793a\u5185\u5bb9\uff1a\u4ece DNA \u5230\u53d8\u5f02\u540e\u679c\u7684\u57fa\u56e0\u5185\u90e8\u7ed3\u6784'},
g2:{en:'Observe: How exons and introns alternate inside a gene',cn:'\u89c2\u5bdf\u91cd\u70b9\uff1a\u5916\u663e\u5b50\u548c\u5185\u542b\u5b50\u5982\u4f55\u4ea4\u66ff\u6392\u5217'},
g3:{en:'Observe: Same gene can have different transcripts',cn:'\u89c2\u5bdf\u91cd\u70b9\uff1a\u540c\u4e00\u57fa\u56e0\u53ef\u4ee5\u6709\u4e0d\u540c\u8f6c\u5f55\u672c'},
g4:{en:'Observe: Different variant positions lead to different consequences',cn:'\u89c2\u5bdf\u91cd\u70b9\uff1a\u4e0d\u540c\u4f4d\u7f6e\u7684\u53d8\u5f02\u5bfc\u81f4\u4e0d\u540c\u540e\u679c'},
g5:{en:'Takeaway: Position determines consequence, consequence determines score',cn:'\u6536\u83b7\uff1a\u4f4d\u7f6e\u51b3\u5b9a\u540e\u679c\uff0c\u540e\u679c\u51b3\u5b9a\u8bc4\u5206'},
narr0:{en:'Step 1: A DNA double helix. Genes are marked regions on DNA, each encoding a protein.',cn:'\u7b2c 1 \u6b65\uff1aDNA \u53cc\u87ba\u65cb\u3002\u57fa\u56e0\u662f DNA \u4e0a\u7684\u6807\u8bb0\u533a\u57df\uff0c\u6bcf\u4e2a\u7f16\u7801\u4e00\u79cd\u86cb\u767d\u8d28\u3002'},
narr1:{en:'Step 2: Zoom into Gene A. Exons (green) encode protein; introns (dark) are spliced out.',cn:'\u7b2c 2 \u6b65\uff1a\u653e\u5927\u57fa\u56e0 A\u3002\u5916\u663e\u5b50\uff08\u7eff\u8272\uff09\u7f16\u7801\u86cb\u767d\u8d28\uff0c\u5185\u542b\u5b50\uff08\u6697\u8272\uff09\u88ab\u526a\u6389\u3002'},
narr2:{en:'Step 3: Introns spliced out, exons joined. Same gene can have multiple transcripts.',cn:'\u7b2c 3 \u6b65\uff1a\u5185\u542b\u5b50\u88ab\u526a\u6389\uff0c\u5916\u663e\u5b50\u62fc\u63a5\u3002\u540c\u4e00\u57fa\u56e0\u53ef\u4ee5\u6709\u591a\u79cd\u8f6c\u5f55\u672c\u3002'},
narr3:{en:'Step 4: Variants at different positions have vastly different consequences.',cn:'\u7b2c 4 \u6b65\uff1a\u4e0d\u540c\u4f4d\u7f6e\u7684\u53d8\u5f02\uff0c\u540e\u679c\u5929\u5dee\u5730\u522b\u3002'},
lbl_geneA:{en:'GENE A',cn:'\u57fa\u56e0 A'},lbl_zoom:{en:'ZOOM IN',cn:'\u653e\u5927'},
lbl_exon:{en:'EXON',cn:'\u5916\u663e\u5b50'},lbl_intron:{en:'INTRON',cn:'\u5185\u542b\u5b50'},
lbl_t1:{en:'Transcript 1 (all exons)',cn:'\u8f6c\u5f55\u672c 1\uff08\u5168\u90e8\u5916\u663e\u5b50\uff09'},
lbl_t2:{en:'Transcript 2 (skip E3)',cn:'\u8f6c\u5f55\u672c 2\uff08\u8df3\u8fc7 E3\uff09'},
lbl_missense:{en:'Missense',cn:'\u9519\u4e49'},lbl_nonsense:{en:'Nonsense',cn:'\u65e0\u4e49'},
lbl_splice:{en:'Splice site',cn:'\u526a\u63a5\u4f4d\u70b9'},lbl_intronic:{en:'Intronic',cn:'\u5185\u542b\u5b50\u533a'},
lbl_miss_d:{en:'Change 1 amino acid',cn:'\u6362 1 \u4e2a\u6c28\u57fa\u9178'},
lbl_nons_d:{en:'Early stop',cn:'\u63d0\u524d\u7ec8\u6b62'},
lbl_spl_d:{en:'Splice failure',cn:'\u526a\u63a5\u5931\u8d25'},
lbl_int_d:{en:'Usually benign',cn:'\u901a\u5e38\u65e0\u5bb3'},
lbl_bottom:{en:'Position determines consequence, consequence determines score',cn:'\u4f4d\u7f6e\u51b3\u5b9a\u540e\u679c\uff0c\u540e\u679c\u51b3\u5b9a\u8bc4\u5206'},
lbl_struct:{en:'Gene A internal structure',cn:'\u57fa\u56e0 A \u5185\u90e8\u7ed3\u6784'},
lbl_same:{en:'Same variant may differ across transcripts',cn:'\u540c\u4e00\u53d8\u5f02\u5728\u4e0d\u540c\u8f6c\u5f55\u672c\u4e0a\u53ef\u80fd\u540e\u679c\u4e0d\u540c'},
};
function t(key){return(I18N[key]&&I18N[key][LANG])||(I18N[key]&&I18N[key]['en'])||key;}

var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var W=800,H=400,DPR=Math.min(window.devicePixelRatio||1,2);
var totalFrames=4,currentFrame=0,transitioning=false,playing=false,playRAF=null;

function resize(){
var wrap=cv.parentElement;var rect=wrap.getBoundingClientRect();
if(rect.width<1||rect.height<1)return;
W=rect.width;H=rect.height;
cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
ctx.setTransform(DPR,0,0,DPR,0,0);
drawFrame(currentFrame);
}
window.addEventListener('resize',resize);
setTimeout(resize,200);setTimeout(resize,600);
document.fonts.ready.then(function(){resize();});

function lerp(a,b,p){return a+(b-a)*p;}
function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function merge(base,ov){var r={};for(var k in base)r[k]=base[k];for(var k2 in ov)r[k2]=ov[k2];return r;}

function drawBg(){
var g=ctx.createLinearGradient(0,0,0,H);
g.addColorStop(0,'#0c0e12');g.addColorStop(1,'#111318');
ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
// subtle grid
ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// Shared element system
function getFrameElements(f){
var cx=W/2,cy=H/2;
if(f===0){
// DNA helix with gene highlight
return [
{id:'title',type:'label',text:t('lbl_geneA'),x:cx,y:cy-H*0.32,color:'#50ffb0',size:16,align:'center',alpha:1},
{id:'helix',type:'custom',x:0,y:0,w:W,h:H,alpha:1,draw:function(a){
ctx.globalAlpha=a;
var grd=ctx.createLinearGradient(W*0.08,0,W*0.92,0);grd.addColorStop(0,'#50ffb0');grd.addColorStop(0.5,'#17df93');grd.addColorStop(1,'#50ffb0');
ctx.strokeStyle=grd;ctx.lineWidth=3;
for(var s=0;s<2;s++){ctx.beginPath();for(var x=W*0.08;x<=W*0.92;x++){var yy=cy+(s?1:-1)*Math.sin(x*0.025)*H*0.12;x===W*0.08?ctx.moveTo(x,yy):ctx.lineTo(x,yy);}ctx.stroke();}
// gene highlight box
ctx.fillStyle='rgba(80,255,176,0.08)';ctx.fillRect(W*0.35,cy-H*0.2,W*0.3,H*0.4);
ctx.strokeStyle='rgba(80,255,176,0.3)';ctx.lineWidth=1;ctx.strokeRect(W*0.35,cy-H*0.2,W*0.3,H*0.4);
ctx.globalAlpha=1;
}},
{id:'zoom',type:'label',text:t('lbl_zoom')+' -->',x:W*0.72,y:cy-H*0.26,color:'#85ecff',size:12,align:'left',alpha:1},
{id:'narr',type:'label',text:t('narr0'),x:cx,y:H*0.88,color:'#aaabb0',size:11,align:'center',alpha:1},
];
}else if(f===1){
// Gene with exons and introns
var exons=[[0.12,0.12],[0.3,0.1],[0.47,0.1],[0.64,0.13],[0.83,0.07]];
var elems=[
{id:'title',type:'label',text:t('lbl_struct'),x:W*0.12,y:cy-H*0.28,color:'#50ffb0',size:14,align:'left',alpha:1},
{id:'narr',type:'label',text:t('narr1'),x:cx,y:H*0.88,color:'#aaabb0',size:11,align:'center',alpha:1},
{id:'exlabel',type:'label',text:t('lbl_exon'),x:W*0.18,y:cy-H*0.16,color:'#50ffb0',size:10,align:'center',alpha:1},
{id:'inlabel',type:'label',text:t('lbl_intron'),x:W*0.26,y:cy+H*0.2,color:'#aaabb0',size:10,align:'center',alpha:1},
];
// gene bar
elems.push({id:'genebar',type:'custom',x:0,y:0,w:W,h:H,alpha:1,draw:function(a){
ctx.globalAlpha=a;ctx.fillStyle='rgba(23,26,31,0.92)';ctx.fillRect(W*0.08,cy-H*0.1,W*0.84,H*0.2);
exons.forEach(function(e,i){
var grd=ctx.createLinearGradient(W*e[0],cy-H*0.1,W*(e[0]+e[1]),cy+H*0.1);
grd.addColorStop(0,'#50ffb0');grd.addColorStop(1,'#17df93');
ctx.fillStyle=grd;ctx.fillRect(W*e[0],cy-H*0.1,W*e[1],H*0.2);
ctx.shadowColor='rgba(80,255,176,0.4)';ctx.shadowBlur=8;ctx.fillRect(W*e[0],cy-H*0.1,W*e[1],H*0.2);ctx.shadowBlur=0;
ctx.fillStyle='#0c0e12';ctx.font="bold 11px 'Space Grotesk'";ctx.textAlign='center';
ctx.fillText('E'+(i+1),W*(e[0]+e[1]/2),cy+4);
});
// intron dashes
ctx.strokeStyle='#aaabb0';ctx.lineWidth=1;ctx.setLineDash([4,4]);
[[0.24,0.3],[0.4,0.47],[0.57,0.64],[0.77,0.83]].forEach(function(p){ctx.beginPath();ctx.moveTo(W*p[0],cy);ctx.lineTo(W*p[1],cy);ctx.stroke();});
ctx.setLineDash([]);ctx.globalAlpha=1;
}});
return elems;
}else if(f===2){
// Transcripts
var y1=cy-H*0.18,y2=cy+H*0.12,bh=H*0.13;
return [
{id:'title',type:'label',text:t('lbl_t1'),x:W*0.12,y:y1-12,color:'#50ffb0',size:12,align:'left',alpha:1},
{id:'t2label',type:'label',text:t('lbl_t2'),x:W*0.12,y:y2-12,color:'#acf900',size:12,align:'left',alpha:1},
{id:'narr',type:'label',text:t('narr2'),x:cx,y:H*0.88,color:'#aaabb0',size:11,align:'center',alpha:1},
{id:'same',type:'label',text:t('lbl_same'),x:cx,y:H*0.78,color:'#85ecff',size:11,align:'center',alpha:1},
{id:'transcripts',type:'custom',x:0,y:0,w:W,h:H,alpha:1,draw:function(a){
ctx.globalAlpha=a;
var ws=[0.1,0.08,0.08,0.12,0.06],tx;
// Transcript 1 (all)
tx=W*0.12;
ws.forEach(function(w,i){var grd=ctx.createLinearGradient(tx,y1,tx+W*w,y1+bh);grd.addColorStop(0,'#50ffb0');grd.addColorStop(1,'#17df93');ctx.fillStyle=grd;ctx.fillRect(tx,y1,W*w,bh);ctx.shadowColor='rgba(80,255,176,0.3)';ctx.shadowBlur=6;ctx.fillRect(tx,y1,W*w,bh);ctx.shadowBlur=0;ctx.fillStyle='#0c0e12';ctx.font="bold 10px 'Space Grotesk'";ctx.textAlign='center';ctx.fillText('E'+(i+1),tx+W*w/2,y1+bh/2+3);tx+=W*w+3;});
// Transcript 2 (skip E3)
tx=W*0.12;
[0,1,3,4].forEach(function(i){var w=ws[i];var grd=ctx.createLinearGradient(tx,y2,tx+W*w,y2+bh);grd.addColorStop(0,'#50ffb0');grd.addColorStop(1,'#17df93');ctx.fillStyle=grd;ctx.fillRect(tx,y2,W*w,bh);ctx.shadowColor='rgba(80,255,176,0.3)';ctx.shadowBlur=6;ctx.fillRect(tx,y2,W*w,bh);ctx.shadowBlur=0;ctx.fillStyle='#0c0e12';ctx.font="bold 10px 'Space Grotesk'";ctx.textAlign='center';ctx.fillText('E'+(i+1),tx+W*w/2,y2+bh/2+3);tx+=W*w+3;});
// Arrow down
ctx.fillStyle='#85ecff';ctx.beginPath();ctx.moveTo(cx,y1-20);ctx.lineTo(cx-5,y1-28);ctx.lineTo(cx+5,y1-28);ctx.fill();
ctx.globalAlpha=1;
}},
];
}else{
// Variants at different positions
var gy=cy,gh=H*0.18;
var variants=[
{rx:0.18,label:'lbl_missense',color:'#acf900',desc:'lbl_miss_d'},
{rx:0.38,label:'lbl_nonsense',color:'#ef4444',desc:'lbl_nons_d'},
{rx:0.52,label:'lbl_splice',color:'#85ecff',desc:'lbl_spl_d'},
{rx:0.7,label:'lbl_intronic',color:'#50ffb0',desc:'lbl_int_d'},
];
var elems=[
{id:'narr',type:'label',text:t('narr3'),x:cx,y:H*0.88,color:'#aaabb0',size:11,align:'center',alpha:1},
{id:'bottom',type:'label',text:t('lbl_bottom'),x:cx,y:H*0.78,color:'#85ecff',size:11,align:'center',alpha:1},
{id:'varscene',type:'custom',x:0,y:0,w:W,h:H,alpha:1,draw:function(a){
ctx.globalAlpha=a;
// Gene bar with exons
ctx.fillStyle='rgba(23,26,31,0.92)';ctx.fillRect(W*0.08,gy-gh/2,W*0.84,gh);
var exons=[[0.12,0.12],[0.3,0.1],[0.47,0.1],[0.64,0.13],[0.83,0.07]];
exons.forEach(function(e,i){var grd=ctx.createLinearGradient(W*e[0],gy-gh/2,W*(e[0]+e[1]),gy+gh/2);grd.addColorStop(0,'#50ffb0');grd.addColorStop(1,'#17df93');ctx.fillStyle=grd;ctx.fillRect(W*e[0],gy-gh/2,W*e[1],gh);ctx.fillStyle='#0c0e12';ctx.font="bold 10px 'Space Grotesk'";ctx.textAlign='center';ctx.fillText('E'+(i+1),W*(e[0]+e[1]/2),gy+3);});
// Variant markers
variants.forEach(function(v){
var vx=W*v.rx;
ctx.fillStyle=v.color;ctx.beginPath();ctx.moveTo(vx,gy-gh/2-4);ctx.lineTo(vx-5,gy-gh/2-14);ctx.lineTo(vx+5,gy-gh/2-14);ctx.fill();
ctx.shadowColor=v.color;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
ctx.font="bold 11px 'Space Grotesk'";ctx.textAlign='center';ctx.fillText(t(v.label),vx,gy-gh/2-22);
ctx.font="10px 'Inter'";ctx.fillStyle=v.color+'cc';ctx.fillText(t(v.desc),vx,gy+gh/2+18);
});
ctx.globalAlpha=1;
}},
];
return elems;
}
}

function drawElement(el){
if(!el||el.alpha<=0.01)return;
ctx.save();ctx.globalAlpha=el.alpha;
if(el.type==='label'){
ctx.fillStyle=el.color||'#f6f6fc';
ctx.font=(el.size>=14?'bold ':'')+el.size+'px '+(el.size>=14?"'Space Grotesk'":"'Inter','Noto Sans SC'");
ctx.textAlign=el.align||'center';ctx.fillText(el.text,el.x,el.y);
}else if(el.type==='custom'){
el.draw(el.alpha);
}
ctx.restore();
}

function drawFrame(f){drawBg();var elems=getFrameElements(f);elems.forEach(function(el){drawElement(el);});}

function transitionTo(nf){
if(nf<0)nf=0;if(nf>=totalFrames)nf=totalFrames-1;
if(nf===currentFrame&&!transitioning){drawFrame(currentFrame);updateHUD(currentFrame);return;}
if(transitioning)return;
var oldElems=getFrameElements(currentFrame);var newElems=getFrameElements(nf);
var oldMap={};oldElems.forEach(function(e){oldMap[e.id]=e;});
var newMap={};newElems.forEach(function(e){newMap[e.id]=e;});
currentFrame=nf;updateHUD(nf);transitioning=true;
var startTime=null,duration=500;
function step(ts){
if(!startTime)startTime=ts;var raw=Math.min((ts-startTime)/duration,1);var p=easeInOut(raw);
drawBg();
oldElems.forEach(function(oe){if(!newMap[oe.id])drawElement(merge(oe,{alpha:1-p}));});
newElems.forEach(function(ne){
var oe=oldMap[ne.id];
if(oe){
var m2=merge(ne,{x:lerp(oe.x||0,ne.x||0,p),y:lerp(oe.y||0,ne.y||0,p),alpha:1});
if((ne.type==='label')&&oe.text!==ne.text){drawElement(merge(oe,{alpha:1-p}));drawElement(merge(ne,{alpha:p}));}
else drawElement(m2);
}else{drawElement(merge(ne,{alpha:p}));}
});
if(raw<1)requestAnimationFrame(step);else transitioning=false;
}
requestAnimationFrame(step);
}

function updateHUD(f){
document.getElementById('hudV1').textContent=t('hudV1_'+f);
document.getElementById('hudV2').textContent=t('hudV2_'+f);
document.getElementById('hudV3').textContent=['--','5','5','5'][f];
document.getElementById('hudV4').textContent=['--','--','--','4'][f];
document.getElementById('frameIndicator').textContent=(f+1)+' / '+totalFrames;
}

function refreshI18N(){
document.getElementById('title').textContent=t('title');
document.getElementById('subtitle').textContent=t('subtitle');
document.getElementById('btnPrev').textContent=t('btnPrev');
document.getElementById('btnNext').textContent=t('btnNext');
document.getElementById('btnPlay').textContent=playing?t('btnPause'):t('btnPlay');
document.getElementById('hudL1').textContent=t('hudL1');
document.getElementById('hudL2').textContent=t('hudL2');
document.getElementById('hudL3').textContent=t('hudL3');
document.getElementById('hudL4').textContent=t('hudL4');
document.getElementById('langBtn').textContent=LANG.toUpperCase();
// guide
document.getElementById('guideTitle').textContent=t('guideTitle');
document.getElementById('guideContent').innerHTML='<ul><li>'+t('g1')+'</li><li>'+t('g2')+'</li><li>'+t('g3')+'</li><li>'+t('g4')+'</li><li>'+t('g5')+'</li></ul>';
updateHUD(currentFrame);
drawFrame(currentFrame);
}

document.getElementById('langBtn').addEventListener('click',function(){LANG=LANG==='en'?'cn':'en';refreshI18N();});
document.getElementById('btnPrev').addEventListener('click',function(){if(playing){playing=false;cancelAnimationFrame(playRAF);}transitionTo(currentFrame-1);});
document.getElementById('btnNext').addEventListener('click',function(){if(playing){playing=false;cancelAnimationFrame(playRAF);}transitionTo(currentFrame+1);});
document.getElementById('btnPlay').addEventListener('click',function(){
if(playing){playing=false;cancelAnimationFrame(playRAF);document.getElementById('btnPlay').textContent=t('btnPlay');return;}
playing=true;document.getElementById('btnPlay').textContent=t('btnPause');
if(currentFrame>=totalFrames-1)currentFrame=-1;
function autoPlay(){if(!playing)return;if(currentFrame<totalFrames-1){transitionTo(currentFrame+1);playRAF=setTimeout(function(){requestAnimationFrame(autoPlay);},1500);}else{playing=false;document.getElementById('btnPlay').textContent=t('btnPlay');}}
autoPlay();
});
document.getElementById('guideTitle').addEventListener('click',function(){
var c=document.getElementById('guideContent');c.classList.toggle('collapsed');
});

refreshI18N();resize();
</script>
</body>
</html>
