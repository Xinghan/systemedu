# spec 027 P1: packages/student-app
[project]
name = "systemedu-student"
version = "0.1.0"
description = "Student-facing web service (auth + library proxy + my projects)"
requires-python = ">=3.12"
dependencies = [
    "systemedu-core",  # workspace dep (LibraryClient)
    # Web server
    "starlette>=1.0",
    "uvicorn>=0.30",
    "python-multipart>=0.0.9",
    "httpx>=0.27",
    # Auth (与 cloud-app 一致: JWT + bcrypt)
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.0,<5.0",
    # 独立 SQLite (student.db)
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/systemedu"]
