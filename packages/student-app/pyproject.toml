# spec 027 P1: packages/student-app
[project]
name = "systemedu-student"
version = "0.1.0"
description = "Student-facing web service (auth + library proxy + my projects)"
requires-python = ">=3.12"
dependencies = [
    "systemedu-core",  # workspace dep (LibraryClient)
    # Web server
    "starlette>=1.0",
    "uvicorn>=0.30",
    "python-multipart>=0.0.9",
    "httpx>=0.27",
    # Auth (与 cloud-app 一致: JWT + bcrypt)
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.0,<5.0",
    # DB (spec 031: PG via alembic)
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "alembic>=1.13",
    # Cache + Mem0
    "redis>=5.0",
    # SMS (Alibaba Cloud)
    "alibabacloud-dysmsapi20170525>=3.0",
    "alibabacloud-tea-openapi>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/systemedu"]
