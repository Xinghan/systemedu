# spec 023: packages/library-app
[project]
name = "systemedu-library"
version = "0.1.0"
description = "Content service for systemedu (library service, admin + public API)"
requires-python = ">=3.12"
dependencies = [
    "systemedu-core",                    # workspace dep, 共享 V5 schema + helpers
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "starlette>=1.0",
    "python-multipart>=0.0.9",           # multipart 上传 tarball
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
    "pydantic>=2.0",
    "python-jose[cryptography]>=3.3",    # JWT
    # passlib 1.7 跟 bcrypt 5.0 不兼容; 锁 bcrypt 4.x
    "passlib>=1.7",
    "bcrypt>=4.0,<5.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
test = [
    "pytest>=9.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
]

[project.scripts]
# 启动 service: python -m library.main
# (没有专门 entry point, 用 uvicorn 命令行)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/library"]
