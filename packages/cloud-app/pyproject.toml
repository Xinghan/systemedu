# spec 022 Phase 3: packages/cloud-app
[project]
name = "systemedu-cloud"
version = "0.1.0"
description = "Cloud SaaS gateway for systemedu (multi-tenant in spec 024)"
requires-python = ">=3.12"
dependencies = [
    "systemedu-core",  # workspace dep
    # Web server
    "starlette>=1.0",
    "uvicorn>=0.30",
    "python-multipart>=0.0.9",
    "websockets>=13.0",
    # Auth (spec 024-A: JWT + bcrypt)
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.0,<5.0",  # 跟 library-app 一致, 5.x 跟 passlib 不兼容
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/systemedu"]
