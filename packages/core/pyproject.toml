# spec 022 Phase 2: packages/core
[project]
name = "systemedu-core"
version = "0.1.0"
description = "Shared library for systemedu: LLM router, agents, course_factory, DB schema, tutor runtime"
requires-python = ">=3.12"
dependencies = [
    # LangChain stack (LLM + agent runtime)
    "langchain-core>=1.0",
    "langchain-openai>=1.0",
    "langgraph>=1.0",
    "langgraph-checkpoint>=4.0",
    "langgraph-checkpoint-sqlite>=3.0",
    "openai>=2.0",

    # Validation & config
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",

    # Storage
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
    "sqlite-vec>=0.1",

    # HTTP / async
    "httpx>=0.27",
    "aiohttp>=3.13",

    # Utilities
    "tiktoken>=0.10",
    "tqdm>=4.66",
    "tenacity>=9.0",
    "rich>=15.0",
    "typer>=0.25",

    # Search / Tavily
    "tavily-python>=0.7",

    # MCP / file ops
    "uuid-utils>=0.14",

    # DashScope (TTS, audio)
    "dashscope>=1.25",

    # Multimedia (manim 选装, course_factory_v3 用)
    # "manim>=0.20",   # 不强制, 用户/dev 按需装
    # "playwright>=1.59",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/systemedu"]
