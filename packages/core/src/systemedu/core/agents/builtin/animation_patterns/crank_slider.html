<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif}
svg{display:block;width:100%;height:100%}
</style>
</head>
<body>
<svg id="sv" viewBox="0 0 600 420" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="crankGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="rodGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="pistonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cylinderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="metalGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crankGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="hubGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
  </defs>

  <rect width="600" height="420" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="300" y="34" text-anchor="middle" font-size="17" font-weight="700"
        fill="#f1f5f9" letter-spacing="1">{{title}}</text>

  <!-- Cylinder walls -->
  <rect id="cylLeft"  x="390" y="100" width="14" height="200" rx="4" fill="url(#cylinderGrad)"/>
  <rect id="cylRight" x="490" y="100" width="14" height="200" rx="4" fill="url(#cylinderGrad)"/>
  <!-- Cylinder cap (right) -->
  <rect x="490" y="100" width="30" height="200" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <!-- Cylinder floor line -->
  <line x1="404" y1="100" x2="404" y2="300" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Cylinder labels -->
  <text x="525" y="205" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">气缸</text>

  <!-- Crankshaft center -->
  <circle id="crankHub" cx="200" cy="200" r="22" fill="url(#hubGrad)" filter="url(#crankGlow)"/>
  <circle cx="200" cy="200" r="8" fill="#1a1a2e"/>
  <text x="200" y="240" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="600">{{label_crank}}</text>

  <!-- Crank arm (updated by JS) -->
  <line id="crankArm" x1="200" y1="200" x2="260" y2="200"
        stroke="url(#crankGrad)" stroke-width="10" stroke-linecap="round"
        filter="url(#metalGlow)"/>

  <!-- Crank pin -->
  <circle id="crankPin" cx="260" cy="200" r="9" fill="#fde68a" stroke="#d97706" stroke-width="2"/>

  <!-- Connecting rod (updated by JS) -->
  <line id="connRod" x1="260" y1="200" x2="404" y2="200"
        stroke="url(#rodGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Rod label -->
  <text id="rodLabel" x="330" y="185" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">{{label_rod}}</text>

  <!-- Piston (updated by JS) -->
  <g id="pistonGroup">
    <rect id="pistonBody" x="360" y="172" width="48" height="56" rx="6"
          fill="url(#pistonGrad)" filter="url(#metalGlow)"/>
    <text id="pistonLabel" x="384" y="205" text-anchor="middle" font-size="12"
          font-weight="700" fill="white">{{label_piston}}</text>
    <!-- Piston rings -->
    <line id="ring1" x1="360" y1="185" x2="408" y2="185" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
    <line id="ring2" x1="360" y1="215" x2="408" y2="215" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
    <!-- Piston rod -->
    <line id="pistonRod" x1="408" y1="200" x2="490" y2="200" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Rotation arc indicator -->
  <circle id="rotArc" cx="200" cy="200" r="36" fill="none" stroke="#fbbf24"
          stroke-width="1.5" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Angle display -->
  <g id="angleGroup" opacity="{{show_angle}}">
    <path id="angleArc" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
    <text id="angleTxt" x="230" y="195" font-size="11" fill="#fbbf24" font-weight="600"/>
  </g>

  <!-- TDC / BDC markers -->
  <line x1="404" y1="95" x2="404" y2="105" stroke="#94a3b8" stroke-width="2"/>
  <text x="398" y="93" text-anchor="middle" font-size="9" fill="#94a3b8">上止点</text>
  <line x1="404" y1="295" x2="404" y2="305" stroke="#94a3b8" stroke-width="2"/>
  <text x="398" y="315" text-anchor="middle" font-size="9" fill="#94a3b8">下止点</text>

  <!-- Stroke indicator (right side) -->
  <line id="strokeLine" x1="450" y1="180" x2="450" y2="220" stroke="#818cf8" stroke-width="1.5"
        stroke-dasharray="3,3" opacity="0.5"/>
  <text id="strokeLabel" x="470" y="175" font-size="10" fill="#818cf8" font-weight="600"/>

  <!-- HUD bar -->
  <rect x="0" y="360" width="600" height="60" fill="#0f0f1a" opacity="0.85"/>
  <text x="50"  y="382" font-size="10" fill="#94a3b8" font-weight="600">转速</text>
  <text x="170" y="382" font-size="10" fill="#94a3b8" font-weight="600">曲柄角度</text>
  <text x="310" y="382" font-size="10" fill="#94a3b8" font-weight="600">活塞位移</text>
  <text x="460" y="382" font-size="10" fill="#94a3b8" font-weight="600">冲程</text>
  <text id="hud_rpm"    x="50"  y="400" font-size="14" fill="#fbbf24" font-weight="700"/>
  <text id="hud_angle"  x="170" y="400" font-size="14" fill="#f1f5f9" font-weight="700"/>
  <text id="hud_disp"   x="310" y="400" font-size="14" fill="#818cf8" font-weight="700"/>
  <text id="hud_stroke" x="460" y="400" font-size="14" fill="#f1f5f9" font-weight="700"/>
</svg>

<script>
(function(){
  var TITLE        = {{title}};
  var RPM          = {{rpm}};
  var CRANK_R      = {{crank_r}};   // px
  var ROD_LEN      = {{rod_len}};   // px
  var LABEL_CRANK  = {{label_crank}};
  var LABEL_PISTON = {{label_piston}};
  var LABEL_ROD    = {{label_rod}};
  var SHOW_ANGLE   = {{show_angle}};
  var COLOR_CRANK  = {{color_crank}};
  var COLOR_PISTON = {{color_piston}};

  var OMEGA = 2 * Math.PI * RPM / 60;  // rad/s

  // Geometry centers
  var CX = 200, CY = 200;   // crankshaft center
  var PISTON_TRACK_X = 404; // piston pin x (on cylinder axis)

  // DOM refs
  var crankArm  = document.getElementById("crankArm");
  var crankPin  = document.getElementById("crankPin");
  var connRod   = document.getElementById("connRod");
  var rodLabel  = document.getElementById("rodLabel");
  var pistonBody  = document.getElementById("pistonBody");
  var pistonLabel = document.getElementById("pistonLabel");
  var pistonRod   = document.getElementById("pistonRod");
  var ring1 = document.getElementById("ring1");
  var ring2 = document.getElementById("ring2");
  var angleArc = document.getElementById("angleArc");
  var angleTxt = document.getElementById("angleTxt");
  var strokeLabel = document.getElementById("strokeLabel");
  var hudRpm   = document.getElementById("hud_rpm");
  var hudAngle = document.getElementById("hud_angle");
  var hudDisp  = document.getElementById("hud_disp");
  var hudStroke = document.getElementById("hud_stroke");

  hudRpm.textContent = RPM + " RPM";

  // Piston position formula:
  // x_piston = CX + CRANK_R*cos(theta) + sqrt(ROD_LEN^2 - (CRANK_R*sin(theta))^2)
  function pistonX(theta) {
    var sinT = Math.sin(theta);
    var cosT = Math.cos(theta);
    return CX + CRANK_R * cosT + Math.sqrt(ROD_LEN * ROD_LEN - CRANK_R * CRANK_R * sinT * sinT);
  }

  var maxX = pistonX(0);          // TDC when crank at 0
  var minX = pistonX(Math.PI);    // BDC when crank at pi
  var strokePx = maxX - minX;

  var startTime = null;

  function frame(ts) {
    if (!startTime) startTime = ts;
    var t = (ts - startTime) / 1000;
    var theta = OMEGA * t;

    // Crank pin position
    var pinX = CX + CRANK_R * Math.cos(theta);
    var pinY = CY + CRANK_R * Math.sin(theta);

    // Piston position (constrained to horizontal axis CY)
    var sinT = Math.sin(theta);
    var innerSq = ROD_LEN * ROD_LEN - CRANK_R * CRANK_R * sinT * sinT;
    var pxPos = CX + CRANK_R * Math.cos(theta) + Math.sqrt(Math.max(0, innerSq));
    var pyPos = CY;  // piston moves horizontally

    // Update crank arm
    crankArm.setAttribute("x2", pinX.toFixed(1));
    crankArm.setAttribute("y2", pinY.toFixed(1));

    // Update crank pin
    crankPin.setAttribute("cx", pinX.toFixed(1));
    crankPin.setAttribute("cy", pinY.toFixed(1));

    // Update connecting rod
    connRod.setAttribute("x1", pinX.toFixed(1));
    connRod.setAttribute("y1", pinY.toFixed(1));
    connRod.setAttribute("x2", pxPos.toFixed(1));
    connRod.setAttribute("y2", pyPos.toFixed(1));

    // Rod label midpoint
    var midX = (pinX + pxPos) / 2;
    var midY = (pinY + pyPos) / 2;
    rodLabel.setAttribute("x", midX.toFixed(1));
    rodLabel.setAttribute("y", (midY - 10).toFixed(1));

    // Update piston group
    var pw = 48, ph = 56;
    pistonBody.setAttribute("x", (pxPos - pw).toFixed(1));
    pistonBody.setAttribute("y", (pyPos - ph/2).toFixed(1));
    pistonLabel.setAttribute("x", (pxPos - pw/2).toFixed(1));
    pistonLabel.setAttribute("y", (pyPos + 5).toFixed(1));

    ring1.setAttribute("x1", (pxPos - pw).toFixed(1));
    ring1.setAttribute("x2", pxPos.toFixed(1));
    ring1.setAttribute("y1", (pyPos - ph/2 + 13).toFixed(1));
    ring1.setAttribute("y2", (pyPos - ph/2 + 13).toFixed(1));

    ring2.setAttribute("x1", (pxPos - pw).toFixed(1));
    ring2.setAttribute("x2", pxPos.toFixed(1));
    ring2.setAttribute("y1", (pyPos + ph/2 - 13).toFixed(1));
    ring2.setAttribute("y2", (pyPos + ph/2 - 13).toFixed(1));

    // Piston rod (from piston right to cylinder cap)
    pistonRod.setAttribute("x1", pxPos.toFixed(1));
    pistonRod.setAttribute("y1", pyPos.toFixed(1));

    // Angle arc
    if (SHOW_ANGLE) {
      var arcR = 36;
      var arcAngle = ((theta % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      var ax = CX + arcR * Math.cos(arcAngle);
      var ay = CY + arcR * Math.sin(arcAngle);
      var largeArc = arcAngle > Math.PI ? 1 : 0;
      angleArc.setAttribute("d",
        "M " + (CX + arcR) + " " + CY +
        " A " + arcR + " " + arcR + " 0 " + largeArc + " 1 " + ax.toFixed(1) + " " + ay.toFixed(1));
      var degAngle = (arcAngle * 180 / Math.PI) % 360;
      angleTxt.textContent = degAngle.toFixed(0) + "°";
      angleTxt.setAttribute("x", (CX + arcR * Math.cos(arcAngle/2) + 14).toFixed(1));
      angleTxt.setAttribute("y", (CY + arcR * Math.sin(arcAngle/2) + 4).toFixed(1));
    }

    // HUD
    var dispPx = pxPos - minX;  // distance from BDC
    var dispFrac = dispPx / strokePx;
    var degA = (((theta * 180 / Math.PI) % 360) + 360) % 360;
    hudAngle.textContent = degA.toFixed(0) + "°";
    hudDisp.textContent = (dispFrac * 100).toFixed(0) + "%";

    var strokePhase;
    var norm = degA;
    if (norm < 180) strokePhase = "压缩";
    else strokePhase = "膨胀";
    hudStroke.textContent = strokePhase;
    strokeLabel.textContent = strokePhase;

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
