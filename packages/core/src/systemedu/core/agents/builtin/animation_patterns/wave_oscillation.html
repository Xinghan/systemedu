<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0a1e;
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif}
canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<script>
(function(){
"use strict";

/* ── injected params ─────────────────────────────────── */
var TITLE       = {{title}};
var MODE        = {{mode}};        // "spring" | "pendulum" | "wave"
var AMPLITUDE   = {{amplitude}};   // px (logical, 600×420 space)
var PERIOD      = {{period}};      // seconds
var LABEL_MASS  = {{label_mass}};
var LABEL_K     = {{label_k}};
var SHOW_ENERGY = {{show_energy}};
var COLOR_MAIN  = {{color_main}};

/* ── canvas setup ────────────────────────────────────── */
var canvas = document.getElementById("c");
var ctx = canvas.getContext("2d");
var W = 600, H = 420;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize(){
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * DPR;
  canvas.height = rect.height * DPR;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(DPR * rect.width / W, DPR * rect.height / H);
}
resize();
window.addEventListener("resize", resize);

/* ── physics ─────────────────────────────────────────── */
var OMEGA = 2 * Math.PI / PERIOD;

/* ── color helpers ───────────────────────────────────── */
function hex2rgb(h){
  h = h.replace("#","");
  if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}
var RGB = hex2rgb(COLOR_MAIN || "#818cf8");
var C = "rgb("+RGB[0]+","+RGB[1]+","+RGB[2]+")";
var CA = function(a){ return "rgba("+RGB[0]+","+RGB[1]+","+RGB[2]+","+a+")"; };

/* ── draw utils ──────────────────────────────────────── */
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ── background ──────────────────────────────────────── */
function drawBg(){
  var g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0f0a1e");
  g.addColorStop(1,"#1a1035");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // subtle grid
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  for(var x=0;x<=W;x+=40){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(var y=0;y<=H;y+=40){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

/* ── title ───────────────────────────────────────────── */
function drawTitle(){
  ctx.font = "bold 16px 'Noto Sans SC',system-ui,sans-serif";
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.fillText(TITLE, W/2, 28);
}

/* ── HUD ─────────────────────────────────────────────── */
function drawHUD(disp, vel){
  var bx=0, by=H-52, bw=W, bh=52;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  roundRect(bx,by,bw,bh,0); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.06)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(W,by); ctx.stroke();

  var cols = [
    {label:"位移", val: disp.toFixed(1)+" px"},
    {label:"速度", val: vel.toFixed(1)+" px/s"},
    {label:"周期", val: PERIOD.toFixed(1)+" s"},
    {label:LABEL_K||"劲度系数", val: LABEL_K||"k"},
  ];
  var cw = W/4;
  cols.forEach(function(c,i){
    var cx = cw*i + cw/2;
    ctx.font = "10px 'Noto Sans SC',system-ui";
    ctx.textAlign = "center";
    ctx.fillStyle = CA(0.5);
    ctx.fillText(c.label, cx, by+17);
    ctx.font = "bold 14px 'Noto Sans SC',system-ui";
    ctx.fillStyle = "rgba(255,255,255,0.88)";
    ctx.fillText(c.val, cx, by+38);
  });
}

/* ── energy bars ─────────────────────────────────────── */
function drawEnergy(peFrac, keFrac){
  if(!SHOW_ENERGY) return;
  var barsY = H - 52 - 34, barH = 14;

  // PE bar
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  roundRect(30, barsY, 130, barH, 7); ctx.fill();
  var peG = ctx.createLinearGradient(30,0,160,0);
  peG.addColorStop(0,CA(0.9)); peG.addColorStop(1,"rgba(139,92,246,0.9)");
  ctx.fillStyle = peG;
  roundRect(30, barsY, Math.max(4,peFrac*130), barH, 7); ctx.fill();
  ctx.font = "10px 'Noto Sans SC',system-ui";
  ctx.textAlign = "left";
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.fillText("弹性势能", 168, barsY+11);

  // KE bar
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  roundRect(280, barsY, 130, barH, 7); ctx.fill();
  var keG = ctx.createLinearGradient(280,0,410,0);
  keG.addColorStop(0,"rgba(251,191,36,0.9)"); keG.addColorStop(1,"rgba(249,115,22,0.9)");
  ctx.fillStyle = keG;
  roundRect(280, barsY, Math.max(4,keFrac*130), barH, 7); ctx.fill();
  ctx.font = "10px 'Noto Sans SC',system-ui";
  ctx.textAlign = "left";
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.fillText("动能", 418, barsY+11);
}

/* ══════════════════════════════════════════════════════
   SPRING MODE
═══════════════════════════════════════════════════════ */
function drawSpring(t){
  var EQ_Y = 240;          // equilibrium Y for mass center
  var CEILING_Y = 60;
  var disp  = AMPLITUDE * Math.cos(OMEGA * t);
  var vel   = -AMPLITUDE * OMEGA * Math.sin(OMEGA * t);
  var massY = EQ_Y + disp;   // mass center Y
  var massW = 70, massH = 56;

  /* glow behind mass */
  var glow = ctx.createRadialGradient(W/2, massY, 0, W/2, massY, 80);
  glow.addColorStop(0, CA(0.18));
  glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow;
  ctx.fillRect(W/2-100, massY-80, 200, 160);

  /* spring coil */
  var springTop  = CEILING_Y + 10;
  var springBot  = massY - massH/2;
  var coils = 10;
  var coilW = 22;
  var segH = (springBot - springTop) / (coils * 2 + 2);

  ctx.strokeStyle = C;
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.shadowColor = CA(0.4);
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(W/2, springTop);
  ctx.lineTo(W/2, springTop + segH);
  for(var i=0;i<coils;i++){
    var y0 = springTop + segH*(2*i+1);
    ctx.lineTo(W/2 + coilW, y0 + segH*0.5);
    ctx.lineTo(W/2 - coilW, y0 + segH*1.0);
    ctx.lineTo(W/2 + coilW, y0 + segH*1.5);
    ctx.lineTo(W/2,         y0 + segH*2.0);
  }
  ctx.lineTo(W/2, springBot);
  ctx.stroke();
  ctx.shadowBlur = 0;

  /* ceiling bracket */
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  roundRect(W/2-80, CEILING_Y-16, 160, 16, 4); ctx.fill();
  ctx.fillStyle = CA(0.85);
  roundRect(W/2-70, CEILING_Y, 140, 10, 3); ctx.fill();
  // hatch lines
  ctx.strokeStyle = CA(0.35);
  ctx.lineWidth = 1.5;
  for(var hx=W/2-65;hx<W/2+70;hx+=18){
    ctx.beginPath();
    ctx.moveTo(hx, CEILING_Y-14); ctx.lineTo(hx-12, CEILING_Y);
    ctx.stroke();
  }

  /* equilibrium dashed line */
  ctx.setLineDash([6,5]);
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(100, EQ_Y); ctx.lineTo(500, EQ_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = "11px 'Noto Sans SC',system-ui";
  ctx.textAlign = "left";
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillText("平衡位置", 508, EQ_Y+4);

  /* displacement arrow */
  if(Math.abs(disp) > 8){
    var ax = W/2 + massW/2 + 20;
    ctx.strokeStyle = "rgba(251,191,36,0.85)";
    ctx.lineWidth = 2;
    ctx.fillStyle  = "rgba(251,191,36,0.85)";
    ctx.beginPath();
    ctx.moveTo(ax, EQ_Y); ctx.lineTo(ax, massY);
    ctx.stroke();
    // arrowhead
    var dir = disp > 0 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(ax, massY);
    ctx.lineTo(ax-5, massY - dir*12);
    ctx.lineTo(ax+5, massY - dir*12);
    ctx.closePath(); ctx.fill();
    ctx.font = "bold 11px 'Noto Sans SC',system-ui";
    ctx.fillStyle = "rgba(251,191,36,0.9)";
    ctx.textAlign = "left";
    ctx.fillText("x="+disp.toFixed(0)+"px", ax+8, (EQ_Y+massY)/2+4);
  }

  /* mass block */
  var mx = W/2 - massW/2, my = massY - massH/2;
  // shadow
  ctx.shadowColor = CA(0.5);
  ctx.shadowBlur  = 20;
  ctx.shadowOffsetY = 8;
  // main body gradient
  var mg = ctx.createLinearGradient(mx, my, mx, my+massH);
  mg.addColorStop(0, "rgba(129,140,248,1)");
  mg.addColorStop(0.5, CA(0.95));
  mg.addColorStop(1, "rgba(67,56,202,1)");
  ctx.fillStyle = mg;
  roundRect(mx, my, massW, massH, 12); ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // top shine
  var shine = ctx.createLinearGradient(mx, my, mx, my+massH*0.45);
  shine.addColorStop(0,"rgba(255,255,255,0.3)");
  shine.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = shine;
  roundRect(mx+4, my+4, massW-8, massH*0.4, 10); ctx.fill();
  // border
  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 1.5;
  roundRect(mx, my, massW, massH, 12); ctx.stroke();
  // label
  ctx.font = "bold 18px 'Noto Sans SC',system-ui";
  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.shadowColor = "rgba(0,0,0,0.4)";
  ctx.shadowBlur = 4;
  ctx.fillText(LABEL_MASS||"m", W/2, massY+7);
  ctx.shadowBlur = 0;

  var peFrac = (disp/AMPLITUDE)*(disp/AMPLITUDE);
  drawEnergy(peFrac, 1-peFrac);
  drawHUD(disp, vel);
}

/* ══════════════════════════════════════════════════════
   PENDULUM MODE
═══════════════════════════════════════════════════════ */
function drawPendulum(t){
  var PIVOT_X = W/2, PIVOT_Y = 70;
  var ROD_LEN = 180;
  var theta = (AMPLITUDE / ROD_LEN) * Math.cos(OMEGA * t);
  var bobX  = PIVOT_X + ROD_LEN * Math.sin(theta);
  var bobY  = PIVOT_Y + ROD_LEN * Math.cos(theta);
  var vel   = -AMPLITUDE * OMEGA * Math.sin(OMEGA * t);
  var disp  = theta * ROD_LEN;

  /* arc trace */
  ctx.strokeStyle = CA(0.2);
  ctx.lineWidth = 1;
  ctx.setLineDash([4,5]);
  var maxA = Math.abs(AMPLITUDE / ROD_LEN);
  ctx.beginPath();
  ctx.arc(PIVOT_X, PIVOT_Y, ROD_LEN, Math.PI/2 - maxA, Math.PI/2 + maxA);
  ctx.stroke();
  ctx.setLineDash([]);

  /* vertical equilibrium */
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(PIVOT_X, PIVOT_Y); ctx.lineTo(PIVOT_X, PIVOT_Y+ROD_LEN+40);
  ctx.stroke();
  ctx.setLineDash([]);

  /* pivot bracket */
  ctx.fillStyle = CA(0.85);
  roundRect(PIVOT_X-60, 50, 120, 10, 3); ctx.fill();
  ctx.strokeStyle = CA(0.35);
  ctx.lineWidth = 1.5;
  for(var hx=PIVOT_X-55;hx<PIVOT_X+60;hx+=16){
    ctx.beginPath(); ctx.moveTo(hx, 42); ctx.lineTo(hx-10,52); ctx.stroke();
  }
  // pivot circle
  var pvg = ctx.createRadialGradient(PIVOT_X,PIVOT_Y,0,PIVOT_X,PIVOT_Y,10);
  pvg.addColorStop(0,"rgba(255,255,255,0.9)");
  pvg.addColorStop(1,C);
  ctx.fillStyle = pvg;
  ctx.beginPath(); ctx.arc(PIVOT_X,PIVOT_Y,10,0,Math.PI*2); ctx.fill();

  /* rod */
  ctx.strokeStyle = "rgba(255,255,255,0.6)";
  ctx.lineWidth = 3;
  ctx.shadowColor = "rgba(255,255,255,0.15)";
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(PIVOT_X, PIVOT_Y); ctx.lineTo(bobX, bobY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  /* bob glow */
  var bglow = ctx.createRadialGradient(bobX,bobY,0,bobX,bobY,50);
  bglow.addColorStop(0,CA(0.3)); bglow.addColorStop(1,"transparent");
  ctx.fillStyle = bglow; ctx.fillRect(bobX-60,bobY-60,120,120);

  /* bob */
  var br = 28;
  ctx.shadowColor = CA(0.6); ctx.shadowBlur = 16; ctx.shadowOffsetY = 6;
  var bobGrad = ctx.createRadialGradient(bobX-8,bobY-8,2,bobX,bobY,br);
  bobGrad.addColorStop(0,"rgba(165,180,252,1)");
  bobGrad.addColorStop(0.5,CA(1));
  bobGrad.addColorStop(1,"rgba(55,48,163,1)");
  ctx.fillStyle = bobGrad;
  ctx.beginPath(); ctx.arc(bobX,bobY,br,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // shine
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.beginPath(); ctx.arc(bobX-8,bobY-8,10,0,Math.PI*2); ctx.fill();
  // label
  ctx.font = "bold 16px 'Noto Sans SC',system-ui";
  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.fillText(LABEL_MASS||"m", bobX, bobY+6);

  var peFrac = (theta/((AMPLITUDE/ROD_LEN)))*(theta/((AMPLITUDE/ROD_LEN)));
  drawEnergy(peFrac, 1-peFrac);
  drawHUD(disp, vel);
}

/* ══════════════════════════════════════════════════════
   WAVE MODE
═══════════════════════════════════════════════════════ */
var waveTrails = [];
var NUM_PARTICLES = 9;
var WAVE_LAMBDA = 110; // px wavelength
var AXIS_Y = 200;

function drawWave(t){
  var phase = OMEGA * t;
  var disp  = AMPLITUDE * Math.cos(phase);
  var vel   = -AMPLITUDE * OMEGA * Math.sin(phase);

  /* axis */
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.lineWidth = 1;
  ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.moveTo(40,AXIS_Y); ctx.lineTo(560,AXIS_Y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = "10px 'Noto Sans SC',system-ui";
  ctx.textAlign = "left";
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillText("平衡轴", 570, AXIS_Y+4);

  /* wavelength bracket */
  var lx1 = 80, lx2 = lx1 + WAVE_LAMBDA;
  ctx.strokeStyle = CA(0.4);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(lx1, AXIS_Y+AMPLITUDE+20); ctx.lineTo(lx2, AXIS_Y+AMPLITUDE+20);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx1,AXIS_Y+AMPLITUDE+14); ctx.lineTo(lx1,AXIS_Y+AMPLITUDE+26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx2,AXIS_Y+AMPLITUDE+14); ctx.lineTo(lx2,AXIS_Y+AMPLITUDE+26); ctx.stroke();
  ctx.textAlign = "center";
  ctx.fillStyle = CA(0.7);
  ctx.font = "bold 11px 'Noto Sans SC',system-ui";
  ctx.fillText("λ = "+WAVE_LAMBDA+"px", (lx1+lx2)/2, AXIS_Y+AMPLITUDE+36);

  /* wave trail glow */
  for(var px=40; px<=560; px+=2){
    var wy = AXIS_Y + AMPLITUDE * Math.sin(2*Math.PI*(px/WAVE_LAMBDA) - phase);
    var alpha = 0.08 * (1 - Math.abs(px-300)/260);
    ctx.fillStyle = "rgba("+RGB[0]+","+RGB[1]+","+RGB[2]+","+alpha+")";
    ctx.fillRect(px-1, wy-2, 3, 4);
  }

  /* main wave curve */
  ctx.beginPath();
  var first = true;
  for(var px=40; px<=560; px+=3){
    var wy = AXIS_Y + AMPLITUDE * Math.sin(2*Math.PI*(px/WAVE_LAMBDA) - phase);
    if(first){ ctx.moveTo(px,wy); first=false; }
    else ctx.lineTo(px,wy);
  }
  ctx.strokeStyle = C;
  ctx.lineWidth = 3;
  ctx.shadowColor = CA(0.6); ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  /* particle markers */
  for(var i=0; i<NUM_PARTICLES; i++){
    var px2 = 80 + i*(WAVE_LAMBDA/3);
    if(px2 > 540) break;
    var wy2 = AXIS_Y + AMPLITUDE * Math.sin(2*Math.PI*(px2/WAVE_LAMBDA) - phase);
    // glow
    var pg = ctx.createRadialGradient(px2,wy2,0,px2,wy2,14);
    pg.addColorStop(0, CA(0.4)); pg.addColorStop(1,"transparent");
    ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(px2,wy2,14,0,Math.PI*2); ctx.fill();
    // dot
    ctx.fillStyle = C;
    ctx.strokeStyle = "rgba(255,255,255,0.6)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px2,wy2,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // vertical displacement line
    ctx.strokeStyle = CA(0.25);
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(px2,AXIS_Y); ctx.lineTo(px2,wy2); ctx.stroke();
    ctx.setLineDash([]);
  }

  drawHUD(disp, vel);
}

/* ── main loop ───────────────────────────────────────── */
var startTime = null;

function frame(ts){
  if(!startTime) startTime = ts;
  var t = (ts - startTime) / 1000;

  ctx.clearRect(0,0,W,H);
  drawBg();
  drawTitle();

  if(MODE === "spring")        drawSpring(t);
  else if(MODE === "pendulum") drawPendulum(t);
  else if(MODE === "wave")     drawWave(t);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
})();
</script>
</body>
</html>
