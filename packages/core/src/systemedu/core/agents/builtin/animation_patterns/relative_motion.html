<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f4ff;
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif}
svg{display:block;width:100%;height:100%}
</style>
</head>
<body>
<svg id="sv" viewBox="0 0 600 420" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="trackGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <filter id="glow" x="-30%" y="-80%" width="160%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill={{color_a}}/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill={{color_b}}/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="700"
        fill="#1e1b4b" letter-spacing="1">{{title}}</text>

  <!-- Track background -->
  <rect x="40" y="160" width="520" height="14" rx="7" fill="url(#trackGrad)" opacity="0.5"/>

  <!-- Distance markers (static) -->
  <g id="markers" fill="#6366f1" font-size="10" text-anchor="middle" opacity="0.6">
    <line x1="40"  y1="155" x2="40"  y2="182" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="300" y1="155" x2="300" y2="182" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="560" y1="155" x2="560" y2="182" stroke="#6366f1" stroke-width="1.5"/>
    <text x="40"  y="193">0</text>
    <text x="300" y="193">1/2</text>
    <text x="560" y="193">{{total_distance}}{{distance_unit}}</text>
  </g>

  <!-- Object A (left side) -->
  <g id="objA" filter="url(#shadow)">
    <rect id="bodyA" x="0" y="148" width="48" height="28" rx="6" fill={{color_a}}/>
    <text id="lblA" x="24" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">{{label_a}}</text>
    <!-- Arrow showing direction -->
    <line id="arrA" x1="52" y1="162" x2="72" y2="162" stroke={{color_a}} stroke-width="2.5"
          marker-end="url(#arrowA)" opacity="0.8"/>
  </g>

  <!-- Object B (right side) -->
  <g id="objB" filter="url(#shadow)">
    <rect id="bodyB" x="0" y="148" width="48" height="28" rx="6" fill={{color_b}}/>
    <text id="lblB" x="24" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">{{label_b}}</text>
    <!-- Arrow showing direction -->
    <line id="arrB" x1="-4" y1="162" x2="-24" y2="162" stroke={{color_b}} stroke-width="2.5"
          marker-end="url(#arrowB)" opacity="0.8"/>
  </g>

  <!-- Meeting point pulse -->
  <g id="meetPulse" opacity="0">
    <circle id="pulseRing1" cx="300" cy="167" r="18" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="300" cy="167" r="8" fill="#fbbf24" opacity="0.9"/>
    <text x="300" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">相遇！</text>
  </g>

  <!-- Real-time distance label between objects -->
  <text id="distLabel" x="300" y="122" text-anchor="middle" font-size="13" fill="#4338ca" font-weight="600"/>

  <!-- Velocity vectors (below track) -->
  <g id="velVectors" opacity="0.85">
    <text x="40" y="218" font-size="11" fill={{color_a}} font-weight="600" id="velA_txt"/>
    <text x="560" y="218" font-size="11" fill={{color_b}} font-weight="600" text-anchor="end" id="velB_txt"/>
  </g>

  <!-- Formula panel -->
  <rect x="170" y="240" width="260" height="72" rx="12"
        fill="white" stroke="#c7d2fe" stroke-width="1.5" opacity="0.95"/>
  <text x="300" y="262" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="700">相遇公式</text>
  <text id="formulaLine1" x="300" y="283" text-anchor="middle" font-size="13" fill="#1e1b4b" font-weight="600"/>
  <text id="formulaLine2" x="300" y="303" text-anchor="middle" font-size="12" fill="#4338ca"/>

  <!-- HUD bottom bar -->
  <rect x="0" y="360" width="600" height="60" fill="white" opacity="0.7"/>
  <text x="50"  y="383" font-size="10" fill="#6366f1" font-weight="700">已用时间</text>
  <text x="200" y="383" font-size="10" fill="#6366f1" font-weight="700">剩余距离</text>
  <text x="370" y="383" font-size="10" fill="#6366f1" font-weight="700">相遇时刻</text>
  <text id="hud_time"    x="50"  y="401" font-size="14" fill="#1e1b4b" font-weight="700"/>
  <text id="hud_remain"  x="200" y="401" font-size="14" fill="#1e1b4b" font-weight="700"/>
  <text id="hud_meeting" x="370" y="401" font-size="14" fill="#d97706" font-weight="700"/>

  <!-- Progress dots -->
  <g id="dots" transform="translate(490,388)">
    <circle id="d0" cx="0"  cy="0" r="4" fill="#c7d2fe"/>
    <circle id="d1" cx="12" cy="0" r="4" fill="#c7d2fe"/>
    <circle id="d2" cx="24" cy="0" r="4" fill="#c7d2fe"/>
    <circle id="d3" cx="36" cy="0" r="4" fill="#c7d2fe"/>
    <circle id="d4" cx="48" cy="0" r="4" fill="#c7d2fe"/>
  </g>
</svg>

<script>
(function(){
  // ── Parameters (injected) ──────────────────────────────────
  var TITLE    = {{title}};
  var TOTAL    = {{total_distance}};
  var VA       = {{speed_a}};
  var VB       = {{speed_b}};
  var LABEL_A  = {{label_a}};
  var LABEL_B  = {{label_b}};
  var UNIT     = {{unit}};
  var DIST_U   = {{distance_unit}};
  var MODE     = {{mode}};  // "toward" | "away" | "chase"
  var COLOR_A  = {{color_a}};
  var COLOR_B  = {{color_b}};

  // ── Derived physics ────────────────────────────────────────
  var meetingT, meetingX;
  if (MODE === "toward") {
    meetingT = TOTAL / (VA + VB);          // time to meet
    meetingX = VA * meetingT;              // distance A travels
  } else if (MODE === "chase") {
    meetingT = TOTAL / Math.abs(VA - VB);
    meetingX = VA * meetingT;
  } else { // away — they move apart; show for 2 × separation time
    meetingT = TOTAL / (VA + VB);
    meetingX = -1; // no meeting
  }

  var CYCLE   = meetingT * 1.6 * 1000; // ms per full cycle
  var PAUSE   = 800;  // ms pause at meeting point
  var TRACK_LEFT  = 40;
  var TRACK_RIGHT = 560;
  var TRACK_W     = TRACK_RIGHT - TRACK_LEFT;

  // ── DOM refs ───────────────────────────────────────────────
  var objA   = document.getElementById("objA");
  var objB   = document.getElementById("objB");
  var pulse  = document.getElementById("meetPulse");
  var ring1  = document.getElementById("pulseRing1");
  var distLb = document.getElementById("distLabel");
  var hudTime   = document.getElementById("hud_time");
  var hudRemain = document.getElementById("hud_remain");
  var hudMeet   = document.getElementById("hud_meeting");
  var f1        = document.getElementById("formulaLine1");
  var f2        = document.getElementById("formulaLine2");
  var velATxt   = document.getElementById("velA_txt");
  var velBTxt   = document.getElementById("velB_txt");
  var dots      = [0,1,2,3,4].map(function(i){ return document.getElementById("d"+i); });
  var arrA      = document.getElementById("arrA");
  var arrB      = document.getElementById("arrB");

  // ── Initial formula ────────────────────────────────────────
  velATxt.textContent = LABEL_A + ": " + VA + " " + UNIT;
  velBTxt.textContent = LABEL_B + ": " + VB + " " + UNIT;

  var meetT_str = meetingT.toFixed(1);
  var meetD_str = meetingX >= 0 ? meetingX.toFixed(0) : "--";
  if (MODE === "toward") {
    f1.textContent = "t = S ÷ (V" + LABEL_A + " + V" + LABEL_B + ")";
    f2.textContent = "= " + TOTAL + " ÷ (" + VA + "+" + VB + ") = " + meetT_str + " h";
  } else if (MODE === "chase") {
    f1.textContent = "t = S ÷ (V" + LABEL_A + " - V" + LABEL_B + ")";
    f2.textContent = "= " + TOTAL + " ÷ (" + VA + "-" + VB + ") = " + meetT_str + " h";
  } else {
    f1.textContent = "v相对 = V" + LABEL_A + " + V" + LABEL_B;
    f2.textContent = "= " + VA + " + " + VB + " = " + (VA+VB) + " " + UNIT;
  }
  hudMeet.textContent = meetingX >= 0 ? meetT_str + " h 后相遇" : "持续远离";

  // ── Animation loop ─────────────────────────────────────────
  var startTime = null;
  var pausing = false;
  var pauseStart = 0;

  function setPos(gElem, x) {
    gElem.setAttribute("transform", "translate(" + x + ",0)");
  }

  function setPulseR(r) { ring1.setAttribute("r", r); }

  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
  }

  function frame(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;

    // cycle wrapping
    var cycleT = elapsed % CYCLE;
    var progress; // 0..1 within active motion phase
    var inPause = false;

    if (MODE === "toward" || MODE === "chase") {
      var motionDur = CYCLE - PAUSE;
      if (cycleT < motionDur) {
        progress = easeInOut(cycleT / motionDur);
        pulse.setAttribute("opacity", "0");
        if (arrA) arrA.setAttribute("opacity", "0.8");
        if (arrB) arrB.setAttribute("opacity", "0.8");
      } else {
        // pause phase — show meeting flash
        progress = 1;
        inPause = true;
        var pf = (cycleT - motionDur) / PAUSE; // 0..1
        var pulseOp = pf < 0.5 ? pf * 2 : 2 - pf * 2;
        pulse.setAttribute("opacity", pulseOp.toFixed(3));
        setPulseR(18 + pf * 22);
        if (arrA) arrA.setAttribute("opacity", "0");
        if (arrB) arrB.setAttribute("opacity", "0");
      }
    } else {
      progress = easeInOut(Math.min(cycleT / CYCLE, 1));
    }

    // Compute positions
    var pxA, pxB;
    if (MODE === "toward") {
      var fracA = VA / (VA + VB);
      pxA = TRACK_LEFT + progress * TRACK_W * fracA - 0;   // starts left
      pxB = TRACK_LEFT + (1 - progress) * TRACK_W * (1 - fracA) + progress * TRACK_W * fracA - 48; // starts right
      // simpler: A travels fracA*TRACK_W, B travels (1-fracA)*TRACK_W toward each other
      pxA = TRACK_LEFT + progress * TRACK_W * fracA;
      pxB = TRACK_RIGHT - 48 - progress * TRACK_W * (1 - fracA);
    } else if (MODE === "chase") {
      pxA = TRACK_LEFT + progress * TRACK_W;
      pxB = TRACK_LEFT + progress * TRACK_W * (VB / VA);
    } else {
      // away
      pxA = TRACK_LEFT + progress * TRACK_W * (VA / (VA + VB));
      pxB = TRACK_RIGHT - 48 - progress * TRACK_W * (VB / (VA + VB));
    }

    setPos(objA, pxA);
    setPos(objB, pxB);

    // Current simulated time
    var simTime = progress * meetingT;
    var remain  = Math.max(0, TOTAL - (VA + VB) * simTime);

    // Distance label between objects
    var midX = (pxA + 24 + pxB + 24) / 2;
    var gapPx = Math.max(0, pxB - pxA - 48);
    distLb.setAttribute("x", midX);
    if (gapPx > 20 && !inPause) {
      var curDist = remain.toFixed(0);
      distLb.textContent = "间距: " + curDist + " " + DIST_U;
      distLb.setAttribute("opacity", "1");
    } else {
      distLb.setAttribute("opacity", inPause ? "0" : "0.7");
    }

    // HUD
    hudTime.textContent   = simTime.toFixed(1) + " h";
    hudRemain.textContent = remain.toFixed(0) + " " + DIST_U;

    // Progress dots
    var dotIdx = Math.floor(progress * 5);
    dots.forEach(function(d,i){
      d.setAttribute("fill", i <= dotIdx ? "#6366f1" : "#c7d2fe");
      d.setAttribute("r",    i === dotIdx ? "6" : "4");
    });

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
