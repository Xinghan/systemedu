[project]
name = "systemedu-student-admin"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "systemedu-student",
    "starlette>=1.0",
    "uvicorn>=0.30",
    "python-jose[cryptography]>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/systemedu"]
